document_id: 1CO.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Tompo, mpitsara tokana
  - type: text
    content: 'Koa aoka hataon’ny olona ho mpanompon’i '
  - type: text
    content: Kristy
  - type: text
    content: ' sy mpitantana fananana ny amin’ny zavamiafina izay an’Andriamanitra izahay. '
  '10':
  - type: text
    content: 'Izahay dia adala noho ny amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' fa ianareo no hendry ao amin’i Kristy! Izahay dia malemy fa ianareo no mahery! Ianareo dia manan-daza fa izahay no mavomavo! '
  '11':
  - type: text
    content: 'Mandraka ankehitriny izao dia noana, mangetaheta, tsy manan-kitafy, asiana totohondry ary tsy manam-ponenana izahay; '
  '12':
  - type: text
    content: 'misasatra miasa amin’ny tananay izahay; raha tevatevaina izahay dia misaotra; raha enjehina dia miaritra; '
  '13':
  - type: text
    content: raha endrikendrehina dia mamaly amin’ny fahalemem-panahy kosa; atao toy ny fakofakon’izao tontolo izao izahay, dia fakon’olona rehetra, mandraka ankehitriny.
  - type: heading
    content: Ny fanahian’i Paoly amin’ny maha ray azy
  '14':
  - type: text
    content: 'Tsy ny hahamenatra anareo anefa no anoratako izany zavatra izany, fa mananatra anareo toy ny zanako malalako aho. '
  '15':
  - type: text
    content: 'Fa na manana mpampianatra iray alina ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' aza ianareo dia tsy maro akory ny rainareo; fa izaho no niteraka anareo ao amin’i Kristy Jesosy tamin’ny Filazantsara.'
  '16':
  - type: text
    content: 'Koa mandrisika anareo aho: Manahafa ahy ianareo. '
  '17':
  - type: text
    content: Noho izany dia nirahiko ho any aminareo i Timoty, zanako malalako sady mahatoky ao amin’ny Tompo, koa izy no hampahatsiaro anareo ny fombam-piainako rehetra ao amin’i Kristy, tahaka ny ampianariko amin’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' rehetra eny tontolo eny.'
  '18':
  - type: text
    content: 'Fa mirehareha ny sasany ary ohatry ny hoe tsy mikasa ho avy any aminareo iny aho. '
  '19':
  - type: text
    content: 'Ho avy any aminareo haingana anefa aho, raha sitrapon’ny Tompo, dia ho fantatro izay herin’ireo mpirehareha ireo, fa tsy ny fiteniny. '
  '2':
  - type: text
    content: 'Ary raha izany, izay ilaina amin’ny mpitantana fananana dia ny ho mahatoky. '
  '20':
  - type: text
    content: 'Fa tsy amin’ny teny ny fanjakan’Andriamanitra fa amin’ny hery. '
  '21':
  - type: text
    content: Inona ary no tianareo? Ho avy aminareo mitondra tsorakazo va aho, sa amin’ny fitiavana sy ny fahalemem-panahy?
  '3':
  - type: text
    content: 'Fa raha ny amiko, dia tsy mampaninona ahy velively, na hotsarainareo aho na hotsarain’olona; fa ny tenako aza dia tsy mitsara ahy. '
  '4':
  - type: text
    content: 'Fa tsy hitako izay tsiniko, nefa tsy mahamarina ahy izany; fa ny Tompo no mitsara ahy. '
  '5':
  - type: text
    content: Koa amin’izany, aza mitsara na inona na inona alohan’ny fotoana, dia ny fiavian’ny Tompo, izay hampiharihary ny zavatra takona ao amin’ny maizina ka hampiseho ny fikasan’ny fo; dia samy hahazo izay dera sahaza azy avy amin’Andriamanitra ny tsirairay.
  - type: heading
    content: Izay tsy maintsy hiaretan’ny Apostoly
  '6':
  - type: text
    content: 'Izany zavatra izany, ry rahalahy, dia nataoko oha-teny noho ny aminareo, mba hilazana ahy sy i Apolosy, mba hianaranareo aminay ny tsy hihoatra noho izay voasoratra ianareo ka tsy hisy hireharehanareo hankalaza ny iray na hanevateva ny iray hafa kosa. '
  '7':
  - type: text
    content: 'Fa iza no nanome tombony anao amin’ny hafa? Ary inona no anananao, izay tsy noraisinao? Fa raha nandray ihany ianao, nahoana no mirehareha ohatra ny tsy nandray? '
  '8':
  - type: text
    content: 'Efa afa-po sahady ianareo, efa manankarena sahady ianareo, efa manjaka tsy miaraka aminay ianareo; kanefa hay tsy izahay akory no nahazoanareo izany! Enga anie ka hanjaka tokoa ianareo mba hiarahanay manjaka aminareo koa! '
  '9':
  - type: text
    content: 'Fa ataoko fa nasehon’Andriamanitra ho faraidiny izahay Apostoly, dia toy izay voaheloka ho faty; fa izahay dia natao ho fizahan’izao rehetra izao, na anjely na olona. '
