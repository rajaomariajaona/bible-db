document_id: 1CO.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Tompo, mpitsara tokana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa aoka hataon’ny olona ho mpanompon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' sy mpitantana fananana ny amin’ny zavamiafina izay an’Andriamanitra izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary raha izany, izay ilaina amin’ny mpitantana fananana dia ny ho mahatoky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa raha ny amiko, dia tsy mampaninona ahy velively, na hotsarainareo aho na hotsarain’olona; fa ny tenako aza dia tsy mitsara ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa tsy hitako izay tsiniko, nefa tsy mahamarina ahy izany; fa ny Tompo no mitsara ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa amin’izany, aza mitsara na inona na inona alohan’ny fotoana, dia ny fiavian’ny Tompo, izay hampiharihary ny zavatra takona ao amin’ny maizina ka hampiseho ny fikasan’ny fo; dia samy hahazo izay dera sahaza azy avy amin’Andriamanitra ny tsirairay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Izay tsy maintsy hiaretan’ny Apostoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izany zavatra izany, ry rahalahy, dia nataoko oha-teny noho ny aminareo, mba hilazana ahy sy i Apolosy, mba hianaranareo aminay ny tsy hihoatra noho izay voasoratra ianareo ka tsy hisy hireharehanareo hankalaza ny iray na hanevateva ny iray hafa kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa iza no nanome tombony anao amin’ny hafa? Ary inona no anananao, izay tsy noraisinao? Fa raha nandray ihany ianao, nahoana no mirehareha ohatra ny tsy nandray? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Efa afa-po sahady ianareo, efa manankarena sahady ianareo, efa manjaka tsy miaraka aminay ianareo; kanefa hay tsy izahay akory no nahazoanareo izany! Enga anie ka hanjaka tokoa ianareo mba hiarahanay manjaka aminareo koa! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ataoko fa nasehon’Andriamanitra ho faraidiny izahay Apostoly, dia toy izay voaheloka ho faty; fa izahay dia natao ho fizahan’izao rehetra izao, na anjely na olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izahay dia adala noho ny amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' fa ianareo no hendry ao amin’i Kristy! Izahay dia malemy fa ianareo no mahery! Ianareo dia manan-daza fa izahay no mavomavo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mandraka ankehitriny izao dia noana, mangetaheta, tsy manan-kitafy, asiana totohondry ary tsy manam-ponenana izahay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'misasatra miasa amin’ny tananay izahay; raha tevatevaina izahay dia misaotra; raha enjehina dia miaritra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: raha endrikendrehina dia mamaly amin’ny fahalemem-panahy kosa; atao toy ny fakofakon’izao tontolo izao izahay, dia fakon’olona rehetra, mandraka ankehitriny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanahian’i Paoly amin’ny maha ray azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy ny hahamenatra anareo anefa no anoratako izany zavatra izany, fa mananatra anareo toy ny zanako malalako aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa na manana mpampianatra iray alina ao amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' aza ianareo dia tsy maro akory ny rainareo; fa izaho no niteraka anareo ao amin’i Kristy Jesosy tamin’ny Filazantsara.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa mandrisika anareo aho: Manahafa ahy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Noho izany dia nirahiko ho any aminareo i Timoty, zanako malalako sady mahatoky ao amin’ny Tompo, koa izy no hampahatsiaro anareo ny fombam-piainako rehetra ao amin’i Kristy, tahaka ny ampianariko amin’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' rehetra eny tontolo eny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa mirehareha ny sasany ary ohatry ny hoe tsy mikasa ho avy any aminareo iny aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ho avy any aminareo haingana anefa aho, raha sitrapon’ny Tompo, dia ho fantatro izay herin’ireo mpirehareha ireo, fa tsy ny fiteniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa tsy amin’ny teny ny fanjakan’Andriamanitra fa amin’ny hery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Inona ary no tianareo? Ho avy aminareo mitondra tsorakazo va aho, sa amin’ny fitiavana sy ny fahalemem-panahy?
