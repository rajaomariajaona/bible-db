document_id: DEU.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Teny Folo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Eks 20.1-17
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niantso ny Israely rehetra i Mosesy ka niteny taminy hoe: Ry Israely ô, mihainoa ny didy sy ny fitsipika izay lazaiko eto anatrehanareo anio dia ianaro ireo, ary tandremo ny fankatoavana azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nefa kosa mamindra fo amin’ny olona arivo mandimby, izay tia Ahy ka mitandrina ny didiko.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza manonona foana ny anaran’NY TOMPO Andriamanitrao; fa tsy hataon’NY TOMPO ho afa-tsiny izay manonona foana ny anarany.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandremo ny andro Sabata mba hanamasinana azy, araka izay didy nomen’NY TOMPO Andriamanitrao anao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Henemana no hiasanao sy hanaovanao ny raharahanao rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Sabatan’NY TOMPO Andriamanitrao ny andro fahafito; koa aza manao raharaha akory ianao amin’izany, na ny zanakao lahy, na ny zanakao vavy, na ny mpanompolahinao, na ny mpanompovavinao, na ny ombinao, na ny borikinao, na ny biby fiompinao rehetra, na ny vahininao izay tafiditra eo am-bavahadinao; mba hitsaharan’ny mpanompolahinao sy ny mpanompovavinao tahaka anao koa. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsarovy fa andevo tany amin’ny tany Ejipta ianao ka tanana mahery sy sandry natsotra no nitondran’NY TOMPO Andriamanitrao anao nivoaka avy tany; izany no nandidian’NY TOMPO Andriamanitrao anao hitandrina ny andro Sabata.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manajà ny rainao sy ny reninao, araka izay nandidian’ny TOMPO Andriamanitrao anao, mba ho maro andro ianao, ary mba hahita soa any amin’ny tany izay omen’NY TOMPO Andriamanitrao ho anao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mamono olona.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mijangajanga.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mangalatra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mety ho vavolombelona mandainga hanameloka ny namanao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mitsiriritra ny vadin’ny namanao; aza mitsiriritra ny tranon’ny namanao, na ny taniny, na ny mpanompolahiny, na ny mpanompovaviny, na ny ombiny, na ny borikiny, na izay mety ho an’ny namanao akory aza.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo teny ireo no nolazain’NY TOMPO tamin’ny feo mahery avy tao afovoan’ny afo sy ny rahona ary ny haizim-pito, raha nivory tany an-tendrombohitra ianareo, dia tsy nampiany intsony; fa nosoratany tamin’ny vato fisaka roa ireo ka natolony ahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Mosesy, mpitondra tenin’Andriamanitra
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY TOMPO Andriamanitsika dia nanao fanekena tamintsika tany Horeba; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nandre ilay feo avy tao amin’ny haizina ianareo, raha mbola nirehitra afo iny ny tendrombohitra, dia nanatona ahy ny lehiben’ny fokonareo rehetra sy ny loholonareo '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nilaza hoe: Indro, efa nampahitan’NY TOMPO Andriamanitsika ny voninahiny sy ny fahalehibiazany isika, ary efa rentsika ny feony avy tao amin’ny afo; koa efa hitantsika androany fa Andriamanitra miteny amin’ny olona nefa velona ihany ireo olona ireo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, nahoana no ho faty izahay? Fa handevona anay io afo lehibe io; raha mbola mandre ny feon’NY TOMPO Andriamanitsika indray izahay dia ho faty. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa iza tamin’ny nofo rehetra moa no efa nandre ny feon’Andriamanitra velona niteny avy tao afovoan’ny afo, tahaka antsika, kanefa velona ihany? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manatòna ianao ka mihainoa izay rehetra holazain’NY TOMPO Andriamanitsika; ary ianao no aoka hilaza aminay izay rehetra holazain’NY TOMPO Andriamanitsika aminao, dia hohenoinay ka harahinay izany.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandre ny teninareo NY TOMPO, raha niteny tamiko ianareo, ka hoy Izy tamiko: Efa reko ny tenin’ireo olona ireo, izay nolazainy taminao, ka tsara izay rehetra voalazany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enga anie ka hanana fo toy izany izy hatahorany Ahy sy hitandremany mandrakariva ny didiko rehetra, mba hahita soa mandrakizay izy sy ny taranany! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandehana ka lazao aminy hoe: Miverena ianareo any an-dainareo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianao kosa, mijanòna eto anilako ka holazaiko aminao ny lalàna rehetra sy ny didy ary ny fitsipika izay hampianarinao azy mba harahiny any amin’ny tany izay omeko azy ho lovany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mitandrema mba hahatanteraka araka izay nandidian’NY TOMPO Andriamanitrareo anareo; aza mivily, na ho amin’ny ankavanana, na ho amin’ny ankavia; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy tamin’ny razantsika no nanaovan’NY TOMPO izany fanekena izany fa tamintsika, dia isika rehetra izay samy mbola velona eto anio. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny lalana rehetra izay nampandehanan’NY TOMPO Andriamanitrareo anareo no halehanareo, mba ho velona ianareo ka hahita soa, ary ho maro andro any amin’ny tany izay holovanareo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny nifanatrika taminareo NY TOMPO avy tao afovoan’ny afo tao an-tendrombohitra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitsangana teo anelanelan’NY TOMPO sy ianareo aho tamin’io andro io, hanambara aminareo ny tenin’NY TOMPO, satria natahotra noho ny fahitana ilay afo ianareo dia tsy niakatra tao amin’ny tendrombohitra ka hoy Izy:'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho no TOMPO Andriamanitrao izay nitondra anao nivoaka avy tany amin’ny tany Ejipta, tamin’ny trano nanandevozana.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza manana andriamanitra hafa fa Izaho ihany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manao sarin-javatra voasokitra ho anao, na izay mety ho endriky ny zavatra any amin’ny lanitra ambony, na izay etỳ amin’ny tany ambany, na izay any amin’ny rano ambanin’ny tany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza miankohoka eo anatrehany ary aza manompo azy; fa Izaho, TOMPO Andriamanitrao, dia Andriamanitra saro-piaro ka mamaly ny heloky ny ray amin’ny zanaka hatramin’ny zafiafy sy ny zafindohalika, dia amin’izay mankahala Ahy, '
