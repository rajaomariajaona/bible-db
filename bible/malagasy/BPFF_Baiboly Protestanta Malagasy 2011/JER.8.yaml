document_id: JER.8,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Amin’izany andro izany, hoy NY TOMPO, dia hofongarina avy ao am-pasana ny taolan’ny mpanjakan’ny Joda, ny taolan’ny lehibeny, ny taolan’ny mpisorona, ny taolan’ny mpaminany ary ny taolan’ny mponina any Jerosalema, '
  '10':
  - type: text
    content: Noho ireo dia homeko ho an’ny hafa ny vadiny
  - type: text
    content: ary ho an’izay maka azy ny sahany,
  - type: text
    content: satria izy rehetra, na ny kely na ny lehibe,
  - type: text
    content: dia samy fatra-pila harena;
  - type: text
    content: na mpaminany na mpisorona
  - type: text
    content: dia samy mamitaka avokoa.
  '11':
  - type: text
    content: Fa nataotaony foana ny fanasitranany
  - type: text
    content: ny faharatran’ny oloko zanakavavy
  - type: text
    content: 'tamin’ny nitenenany hoe: Fiadanana, fiadanana!'
  - type: text
    content: Kanjo tsy misy fiadanana akory!
  '12':
  - type: text
    content: Nitafy henatra izy noho ny nanaovany fahavetavetana;
  - type: text
    content: nefa tsy mba nahatsiaro menatra akory izy
  - type: text
    content: ary tsy mba tsapany ny hadisoany.
  - type: text
    content: Koa ho lavo miaraka amin’izay lavo izy,
  - type: text
    content: amin’ny andro hamaliana azy dia ho tafintohina izy,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Fahadisoam-panantenana
  '13':
  - type: text
    content: Hojinjaiko avokoa izy rehetra,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: tsy mamoa ny voaloboka
  - type: text
    content: ary tsy misy voany ny aviavy,
  - type: text
    content: malazo ny raviny
  - type: text
    content: ary nanendry
  - type: text
    content: izay hanitsakitsaka azy Aho.
  '14':
  - type: text
    content: Nahoana isika no mbola mipetra-poana?
  - type: text
    content: Mivoria ianareo,
  - type: text
    content: andeha isika hiditra any an-tanàna mimanda
  - type: text
    content: ka ho faty ao;
  - type: text
    content: fa efa nanendry antsika ho faty NY TOMPO Andriamanitsika
  - type: text
    content: ka nanome rano misy poizina hosotrointsika
  - type: text
    content: noho ny nanotantsika tamin’NY TOMPO.
  '15':
  - type: text
    content: Nanantena fiadanana isika,
  - type: text
    content: kanjo tsy nahita soa;
  - type: text
    content: ary andro fanasitranana,
  - type: text
    content: kanjo indro fampatahorana.
  '16':
  - type: text
    content: 'Ny fiefonefon’ny soavaly dia re hatrany Dana:'
  - type: text
    content: Mihorohoro ny tany rehetra
  - type: text
    content: noho ny fanenon’ny soavaliny matanjaka;
  - type: text
    content: fa avy izy ka handany
  - type: text
    content: ny tany mbamin’izay rehetra ao aminy,
  - type: text
    content: dia ny tanàna sy izay monina ao.
  '17':
  - type: text
    content: Fa indro Aho handefa
  - type: text
    content: bibilava hamely anareo,
  - type: text
    content: dia menarana izay tsy azon’ody
  - type: text
    content: ka hanaikitra anareo ireny,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Ny alahelon’i Jeremia
  '18':
  - type: text
    content: Indrisy! Enga anie ka hisy fampifaliana ho ahy eto amin’ny alaheloko
  - type: text
    content: fa reraka ny foko ato anatiko.
  '19':
  - type: text
    content: Injany! Misy feo fitarainan’ny oloko zanakavavy
  - type: text
    content: 'avy any amin’ny tany lavitra hoe:'
  - type: text
    content: 'Moa tsy ao '
  - type: text
    content: Ziona
  - type: text
    content: ' intsony va NY TOMPO?'
  - type: text
    content: Ary tsy ao aminy intsony va ny mpanjakany?
  - type: text
    content: Nahoana no nahatezitra Ahy tamin’ny sarin-javatra voasokitra ao aminy
  - type: text
    content: sy tamin’ny zava-poana avy amin’ny firenena hafa ireny?
  '2':
  - type: text
    content: 'ka haeliny eo anatrehan’ny masoandro sy ny volana ary ny kintana rehetra eny amin’ny lanitra izay tiany sy notompoiny, izay narahiny sy notadiaviny ary niankohofany teo anatrehany. Tsy hangonina na halevina intsony ireny fa hatao zezika eny ambonin’ny tany. '
  '20':
  - type: text
    content: Lasa ny fararano, tapitra ny taom-piotazana,
  - type: text
    content: nefa tsy voavonjy isika.
  '21':
  - type: text
    content: Torotoro aho noho ny fahatorotoroan’ny oloko zanakavavy;
  - type: text
    content: misaona aho,
  - type: text
    content: ary horohoro no mahazo ahy.
  '22':
  - type: text
    content: Moa tsy misy balisama va any Gileada?
  - type: text
    content: Moa tsy misy mpitsabo va any?
  - type: text
    content: Koa nahoana no tsy tanteraka ny fanasitranana ny oloko zanakavavy?
  '23':
  - type: text
    content: Enga anie ka ho feno rano ny lohako,
  - type: text
    content: ary ho loharanon-dranomaso ny masoko
  - type: text
    content: mba hitomaniako andro aman’alina
  - type: text
    content: ireo voavono amin’ny oloko zanakavavy!
  '3':
  - type: text
    content: Ary ny sisa rehetra amin’ity taranaka ratsy ity, izay mbola sisa any amin’ny tany rehetra nandroahako azy, dia haniry ny ho faty noho ny ho velona, hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: heading
    content: Mikiribiby amin’ny ratsy
  '4':
  - type: text
    content: 'Lazao aminy koa hoe: Izao no lazain’NY TOMPO:'
  - type: text
    content: Ho lavo va ny olona ka tsy hiarina?
  - type: text
    content: Hihodina hivily va ny olona ka tsy hitodika hiverina?
  '5':
  - type: text
    content: Nahoana ity firenena eto Jerosalema ity no mikomy
  - type: text
    content: ka tsy mety mitsahatra mihitsy?
  - type: text
    content: Mikikitra mafy amin’ny fitaka izy
  - type: text
    content: ka tsy mety miverina.
  '6':
  - type: text
    content: Nihaino Aho ka nandre
  - type: text
    content: fa milaza teny tsy marina izy.
  - type: text
    content: Ary tsy misy manenina ny amin’ny haratsiany
  - type: text
    content: 'hoe: Inona ity nataoko ity!'
  - type: text
    content: Izy rehetra dia samy mivily eny am-pandehanany avy
  - type: text
    content: tahaka ny soavaly miriotra ho amin’ny ady.
  '7':
  - type: text
    content: Na dia ny vano eny amin’ny lanitra aza dia mahalala ny fotoanandrony,
  - type: text
    content: ny domohina sy ny sidintsidina ary ny vanobe koa
  - type: text
    content: dia samy mitandrina ny fotoana fiverenany avy;
  - type: text
    content: fa ny oloko kosa dia tsy mba mahalala ny fitsipiky NY TOMPO.
  - type: heading
    content: Novan’ny mpanoradalàna ny lalànan’NY TOMPO
  '8':
  - type: text
    content: 'Ahoana no itenenanareo hoe:'
  - type: text
    content: Hendry izahay,
  - type: text
    content: ary ato aminay ny lalànan’NY TOMPO?
  - type: text
    content: Nefa ny fanoratan-daingan’ny mpanoradalàna
  - type: text
    content: no mahatonga azy ho lainga.
  '9':
  - type: text
    content: Mahazo henatra ny hendry,
  - type: text
    content: raiki-tahotra izy, voasambotra izy;
  - type: text
    content: indro, nolaviny ny tenin’NY TOMPO,
  - type: text
    content: koa inona intsony no fahendrena ananany?
  - type: heading
    content: Mandainga avokoa izy rehetra
