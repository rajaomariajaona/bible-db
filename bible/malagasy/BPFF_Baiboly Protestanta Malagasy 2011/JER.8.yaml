document_id: JER.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany, hoy NY TOMPO, dia hofongarina avy ao am-pasana ny taolan’ny mpanjakan’ny Joda, ny taolan’ny lehibeny, ny taolan’ny mpisorona, ny taolan’ny mpaminany ary ny taolan’ny mponina any Jerosalema, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ireo dia homeko ho an’ny hafa ny vadiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho an’izay maka azy ny sahany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria izy rehetra, na ny kely na ny lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy fatra-pila harena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mpaminany na mpisorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy mamitaka avokoa.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nataotaony foana ny fanasitranany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny faharatran’ny oloko zanakavavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tamin’ny nitenenany hoe: Fiadanana, fiadanana!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo tsy misy fiadanana akory!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitafy henatra izy noho ny nanaovany fahavetavetana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy mba nahatsiaro menatra akory izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba tsapany ny hadisoany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ho lavo miaraka amin’izay lavo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro hamaliana azy dia ho tafintohina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahadisoam-panantenana
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hojinjaiko avokoa izy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mamoa ny voaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy voany ny aviavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: malazo ny raviny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hanitsakitsaka azy Aho.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana isika no mbola mipetra-poana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoria ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andeha isika hiditra any an-tanàna mimanda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho faty ao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa nanendry antsika ho faty NY TOMPO Andriamanitsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanome rano misy poizina hosotrointsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny nanotantsika tamin’NY TOMPO.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanantena fiadanana isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo tsy nahita soa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary andro fanasitranana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo indro fampatahorana.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny fiefonefon’ny soavaly dia re hatrany Dana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihorohoro ny tany rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fanenon’ny soavaliny matanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa avy izy ka handany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tany mbamin’izay rehetra ao aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tanàna sy izay monina ao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa indro Aho handefa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bibilava hamely anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia menarana izay tsy azon’ody
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanaikitra anareo ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny alahelon’i Jeremia
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! Enga anie ka hisy fampifaliana ho ahy eto amin’ny alaheloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa reraka ny foko ato anatiko.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Injany! Misy feo fitarainan’ny oloko zanakavavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'avy any amin’ny tany lavitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Moa tsy ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' intsony va NY TOMPO?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy ao aminy intsony va ny mpanjakany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no nahatezitra Ahy tamin’ny sarin-javatra voasokitra ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tamin’ny zava-poana avy amin’ny firenena hafa ireny?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka haeliny eo anatrehan’ny masoandro sy ny volana ary ny kintana rehetra eny amin’ny lanitra izay tiany sy notompoiny, izay narahiny sy notadiaviny ary niankohofany teo anatrehany. Tsy hangonina na halevina intsony ireny fa hatao zezika eny ambonin’ny tany. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lasa ny fararano, tapitra ny taom-piotazana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy voavonjy isika.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torotoro aho noho ny fahatorotoroan’ny oloko zanakavavy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misaona aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary horohoro no mahazo ahy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy misy balisama va any Gileada?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy misy mpitsabo va any?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana no tsy tanteraka ny fanasitranana ny oloko zanakavavy?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka ho feno rano ny lohako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho loharanon-dranomaso ny masoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitomaniako andro aman’alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo voavono amin’ny oloko zanakavavy!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny sisa rehetra amin’ity taranaka ratsy ity, izay mbola sisa any amin’ny tany rehetra nandroahako azy, dia haniry ny ho faty noho ny ho velona, hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mikiribiby amin’ny ratsy
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazao aminy koa hoe: Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lavo va ny olona ka tsy hiarina?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihodina hivily va ny olona ka tsy hitodika hiverina?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana ity firenena eto Jerosalema ity no mikomy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mety mitsahatra mihitsy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mikikitra mafy amin’ny fitaka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mety miverina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nihaino Aho ka nandre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa milaza teny tsy marina izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy manenina ny amin’ny haratsiany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hoe: Inona ity nataoko ity!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy rehetra dia samy mivily eny am-pandehanany avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny soavaly miriotra ho amin’ny ady.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ny vano eny amin’ny lanitra aza dia mahalala ny fotoanandrony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny domohina sy ny sidintsidina ary ny vanobe koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy mitandrina ny fotoana fiverenany avy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny oloko kosa dia tsy mba mahalala ny fitsipiky NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Novan’ny mpanoradalàna ny lalànan’NY TOMPO
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ahoana no itenenanareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hendry izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ato aminay ny lalànan’NY TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ny fanoratan-daingan’ny mpanoradalàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mahatonga azy ho lainga.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahazo henatra ny hendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raiki-tahotra izy, voasambotra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro, nolaviny ny tenin’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa inona intsony no fahendrena ananany?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandainga avokoa izy rehetra
    marker-yv: yv-h
