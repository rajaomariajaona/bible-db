document_id: MRK.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanambaran’i Jaona Mpanao batisa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 3.1-6; Lio 3.1-6; ampit. Jao 1.19-23
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny niandohan’ny Filazantsaran’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', Zanak’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Araka izay voasoratra ao amin’Isaia mpaminany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro Aho maniraka ny irako hialoha Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izy no hanamboatra ny lalanao» (Mal 3.1);
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Injany! Misy feon’ny miantso mafy any an-tany efitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amboary ny lalan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy mahitsy ny lalan-kalehany» (Isa 40.3),
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia niseho i Jaona izay nanao batisa tany an-tany efitra ary nitory ny batisan’ny fibebahana ho famelan-keloka. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nandeha nanatona azy ny tany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' manontolo sy ny mponina tsy an-kanavaka tany Jerosalema ka nataony batisa tao amin’ny ony Jordana ireny rehefa niaiky ny fahotany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I Jaona dia nitafy lamba volon-drameva; fehikibo hoditra no teny aminy ary ny fihinany dia valala sy tantely remby.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 3.11-12; Lio 3.15-18; ampit. Jao 1.24-28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nitoriteny izy hoe: Indro, avy ao aorianako Ilay mahery noho izaho ary tsy mendrika hiondrika hamaha ny fehin-kapany akory aza aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izaho dia nanao batisa anareo tamin’ny rano fa Izy kosa hanao batisa anareo amin’ny Fanahy Masina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanaovana batisa an’i Jesosy sy ny nakan’ny devoly fanahy Azy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 3.13-17; Lio 3.21-22; ampit. Jao 1.29-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tamin’izany andro izany dia tonga avy tany Nazareta any Galilia Jesosy ka nataon’i Jaona batisa tao Jordana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary raha vao niakatra avy tao anaty rano Izy dia hitany ny lanitra nisokatra ary ny Fanahy nidina tahaka ny voromailala ka nankeo Aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nisy feo avy tany an-danitra niteny hoe: Ianao no Zanako malalako; Ianao no sitrako.'
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 4.1-11; Lio 4.1-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Niaraka tamin’izay dia natosiky ny Fanahy ho any an-tany efitra Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nitoetra tany an-tany efitra efapolo andro Izy ka nalain’i Satana fanahy. Teo amin’ny bibidia Izy, ary nanompo Azy ireo anjely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpianatra efatra voalohany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 4.12-17; Lio 4.14-15; ampit. Jao 4.1-3, 43-46
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa voasambotra i Jaona dia nankany Galilia Jesosy nitory ny Filazantsaran’Andriamanitra '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka nanambara hoe: Efa tonga izao ny fotoana ka efa akaiky ny fanjakan’Andriamanitra. Mibebaha ianareo ka minoa ny Filazantsara.'
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 4.18-22; ampit. Lio 5.1-11; Jao 1.35-51
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raha nandalo teny amoron’ny Ranomasin’i Galilia Izy dia nahita an’i Simona sy i Andrea, rahalahin’i Simona, nanarato teo amin’ny ranomasina, fa mpanarato izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy Jesosy taminy: Andeha hanaraka Ahy fa hataoko mpanarato olona ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nandao ny harato niaraka tamin’izay izy ireo ka nanaraka Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary rehefa nandroso kelikely Izy dia nahita an’i Jakoba, zanak’i Zebedio, sy i Jaona rahalahiny izay teo an-tsambokely koa nanamboatra ny haratony. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia niantso azy ireo niaraka tamin’izay Izy; ary nandao an’i Zebedio rainy mbamin’ny olona nokaramainy tao an-tsambokely izy mirahalahy dia nanaraka an’i Jesosy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanasitranan’i Jesosy ilay olona azon’ny fanahy maloto
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 4.31-37
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nankany Kapernaomy izy ireo; ary nony tamin’ny Sabata dia niditra avy hatrany tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' Jesosy ka nampianatra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia talanjona tamin’ny fampianarany ny olona, satria nampianatra azy toy izay manana fahefana Izy fa tsy mba tahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’izay indrindra dia nisy olona iray teo amin’ny sinagogany, izay azon’ny fanahy maloto; ary niantso mafy Ralehilahy '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'hoe: Moa mifaninona akory izahay sy Ianao, ry Jesosy avy any Nazareta? Avy handringana anay va Ianao? Fantatro fa Ilay Masin’Andriamanitra Ianao! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Jesosy niteny mafy azy hoe: Mangìna ianao ka mialà aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nampifanintontsintona ny tenan’ilay marary ny fanahy maloto, dia niantso tamin’ny feo mahery vao niala taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia gaga ny olona rehetra ka nifanontany hoe: Fa ahoana re izao zavatra izao? Fampianarana vaovao misy fahefana izao! Fa ny fanahy maloto aza no didiany dia manaiky Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary ny lazany dia niely niaraka tamin’izay teny amin’ny tontolo manodidina tamin’ny tany rehetra manerana an’i Galilia.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanasitranana marary maro
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 8.14-17; Lio 4.38-41
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa tamin’izay fotoana izay, raha niala avy tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' izy ireo, dia niditra tao an-tranon’i Simona sy i Andrea ry Jesosy sy i Jakoba ary i Jaona. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny rafozambavin’i Simona dia nandry tao, voan’ny tazo; avy hatrany dia nolazain’izy ireo Taminy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia nanatona Jesosy ka nandray ny tanany ary nampitsangana azy ka afaka ny tazony ary nanompo azy ireo izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nony hariva ny andro ka nilentika ny masoandro dia noentina tany Aminy ny marary rehetra sy ny demoniaka. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny tao an-tanàna rehetra dia tafangona teo anoloan’ny varavarana avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nanasitrana olona maro izay nararin’ny aretina samihafa Izy sady nandroaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' maro; tsy navelany hiteny ny demonia satria nahafantatra Azy ireny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nataon’i Jesosy tany Galilia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 4.42-43
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nifoha maraina be Izy dia nandeha nankany an-tany efitra, ary tany Izy no nivavaka. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nandeha nitady Azy i Simona sy ny namany, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'koa rehefa nahita Azy izy ireo dia niteny Taminy hoe: Mitady Anao ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa hoy kosa Izy taminy: Andeha isika hifindra hankany amin’ny tanàna hafa etỳ amin’ny manodidina mba hitoriako teny any koa; fa izay no nahatongavako.'
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 4.23; Lio 4.44
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia nandeha Izy ka nitoriteny tany amin’ny sinagogan’ny olona manerana an’i Galilia sady nandroaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanasitrana boka iray Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 8.1-4; Lio 5.12-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary nisy boka iray nanatona Azy ka nitaraina taminy sady nandohalika teo anatrehany no niteny taminy hoe: Raha mety Ianao dia afaka manadio ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary onena azy Jesosy ka nanatsotra ny tanany dia nikasika azy sady niteny taminy hoe: Mety Aho; madiova ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary niaraka tamin’izay dia niala taminy ny habokana ka nadio izy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary namepetra azy mafy Jesosy sady nampandeha azy avy hatrany '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'no niteny taminy hoe: Tandremo tsara mba tsy hisy holazainao na amin’iza na amin’iza izao, fa mandehana, misehoa aloha amin’ny mpisorona ka manolora ny fanatitra fanadiovana anao, izay nandidian’i Mosesy ho vavolombelona amin’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Nefa lasa Ralehilahy ka nanomboka nitantara sy nampiely izay zava-niseho, hany ka tsy nahazo niditra miharihary tao an-tanàna intsony Jesosy fa nitoetra tany ivelany tany amin’ny tany efitra Izy; dia nanatona Azy ny olona avy teny amin’ny manodidina rehetra.
