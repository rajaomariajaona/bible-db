document_id: MRK.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanambaran’i Jaona Mpanao batisa
  - type: heading
    content: Mat 3.1-6; Lio 3.1-6; ampit. Jao 1.19-23
  - type: text
    content: 'Ny niandohan’ny Filazantsaran’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', Zanak’Andriamanitra.'
  '10':
  - type: text
    content: 'Ary raha vao niakatra avy tao anaty rano Izy dia hitany ny lanitra nisokatra ary ny Fanahy nidina tahaka ny voromailala ka nankeo Aminy. '
  '11':
  - type: text
    content: 'Ary nisy feo avy tany an-danitra niteny hoe: Ianao no Zanako malalako; Ianao no sitrako.'
  - type: heading
    content: Mat 4.1-11; Lio 4.1-13
  '12':
  - type: text
    content: 'Niaraka tamin’izay dia natosiky ny Fanahy ho any an-tany efitra Izy. '
  '13':
  - type: text
    content: Nitoetra tany an-tany efitra efapolo andro Izy ka nalain’i Satana fanahy. Teo amin’ny bibidia Izy, ary nanompo Azy ireo anjely.
  - type: heading
    content: Ny mpianatra efatra voalohany
  - type: heading
    content: Mat 4.12-17; Lio 4.14-15; ampit. Jao 4.1-3, 43-46
  '14':
  - type: text
    content: 'Rehefa voasambotra i Jaona dia nankany Galilia Jesosy nitory ny Filazantsaran’Andriamanitra '
  '15':
  - type: text
    content: 'ka nanambara hoe: Efa tonga izao ny fotoana ka efa akaiky ny fanjakan’Andriamanitra. Mibebaha ianareo ka minoa ny Filazantsara.'
  - type: heading
    content: Mat 4.18-22; ampit. Lio 5.1-11; Jao 1.35-51
  '16':
  - type: text
    content: 'Ary raha nandalo teny amoron’ny Ranomasin’i Galilia Izy dia nahita an’i Simona sy i Andrea, rahalahin’i Simona, nanarato teo amin’ny ranomasina, fa mpanarato izy ireo. '
  '17':
  - type: text
    content: 'Hoy Jesosy taminy: Andeha hanaraka Ahy fa hataoko mpanarato olona ianareo. '
  '18':
  - type: text
    content: 'Dia nandao ny harato niaraka tamin’izay izy ireo ka nanaraka Azy. '
  '19':
  - type: text
    content: 'Ary rehefa nandroso kelikely Izy dia nahita an’i Jakoba, zanak’i Zebedio, sy i Jaona rahalahiny izay teo an-tsambokely koa nanamboatra ny haratony. '
  '2':
  - type: text
    content: 'Araka izay voasoratra ao amin’Isaia mpaminany hoe:'
  - type: text
    content: «Indro Aho maniraka ny irako hialoha Anao;
  - type: text
    content: izy no hanamboatra ny lalanao» (Mal 3.1);
  '20':
  - type: text
    content: Dia niantso azy ireo niaraka tamin’izay Izy; ary nandao an’i Zebedio rainy mbamin’ny olona nokaramainy tao an-tsambokely izy mirahalahy dia nanaraka an’i Jesosy.
  - type: heading
    content: Ny nanasitranan’i Jesosy ilay olona azon’ny fanahy maloto
  - type: heading
    content: Lio 4.31-37
  '21':
  - type: text
    content: 'Nankany Kapernaomy izy ireo; ary nony tamin’ny Sabata dia niditra avy hatrany tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' Jesosy ka nampianatra. '
  '22':
  - type: text
    content: 'Dia talanjona tamin’ny fampianarany ny olona, satria nampianatra azy toy izay manana fahefana Izy fa tsy mba tahaka ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: .
  '23':
  - type: text
    content: 'Tamin’izay indrindra dia nisy olona iray teo amin’ny sinagogany, izay azon’ny fanahy maloto; ary niantso mafy Ralehilahy '
  '24':
  - type: text
    content: 'hoe: Moa mifaninona akory izahay sy Ianao, ry Jesosy avy any Nazareta? Avy handringana anay va Ianao? Fantatro fa Ilay Masin’Andriamanitra Ianao! '
  '25':
  - type: text
    content: 'Ary Jesosy niteny mafy azy hoe: Mangìna ianao ka mialà aminy. '
  '26':
  - type: text
    content: 'Ary nampifanintontsintona ny tenan’ilay marary ny fanahy maloto, dia niantso tamin’ny feo mahery vao niala taminy. '
  '27':
  - type: text
    content: 'Dia gaga ny olona rehetra ka nifanontany hoe: Fa ahoana re izao zavatra izao? Fampianarana vaovao misy fahefana izao! Fa ny fanahy maloto aza no didiany dia manaiky Azy. '
  '28':
  - type: text
    content: Ary ny lazany dia niely niaraka tamin’izay teny amin’ny tontolo manodidina tamin’ny tany rehetra manerana an’i Galilia.
  - type: heading
    content: Ny nanasitranana marary maro
  - type: heading
    content: Mat 8.14-17; Lio 4.38-41
  '29':
  - type: text
    content: 'Fa tamin’izay fotoana izay, raha niala avy tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' izy ireo, dia niditra tao an-tranon’i Simona sy i Andrea ry Jesosy sy i Jakoba ary i Jaona. '
  '3':
  - type: text
    content: '«Injany! Misy feon’ny miantso mafy any an-tany efitra hoe:'
  - type: text
    content: Amboary ny lalan’NY TOMPO,
  - type: text
    content: ataovy mahitsy ny lalan-kalehany» (Isa 40.3),
  '30':
  - type: text
    content: 'Ary ny rafozambavin’i Simona dia nandry tao, voan’ny tazo; avy hatrany dia nolazain’izy ireo Taminy izany. '
  '31':
  - type: text
    content: Dia nanatona Jesosy ka nandray ny tanany ary nampitsangana azy ka afaka ny tazony ary nanompo azy ireo izy.
  '32':
  - type: text
    content: 'Nony hariva ny andro ka nilentika ny masoandro dia noentina tany Aminy ny marary rehetra sy ny demoniaka. '
  '33':
  - type: text
    content: 'Ny tao an-tanàna rehetra dia tafangona teo anoloan’ny varavarana avokoa. '
  '34':
  - type: text
    content: 'Ary nanasitrana olona maro izay nararin’ny aretina samihafa Izy sady nandroaka '
  - type: text
    content: demonia
  - type: text
    content: ' maro; tsy navelany hiteny ny demonia satria nahafantatra Azy ireny.'
  - type: heading
    content: Ny nataon’i Jesosy tany Galilia
  - type: heading
    content: Lio 4.42-43
  '35':
  - type: text
    content: 'Ary nifoha maraina be Izy dia nandeha nankany an-tany efitra, ary tany Izy no nivavaka. '
  '36':
  - type: text
    content: 'Nandeha nitady Azy i Simona sy ny namany, '
  '37':
  - type: text
    content: 'koa rehefa nahita Azy izy ireo dia niteny Taminy hoe: Mitady Anao ny olona rehetra. '
  '38':
  - type: text
    content: 'Fa hoy kosa Izy taminy: Andeha isika hifindra hankany amin’ny tanàna hafa etỳ amin’ny manodidina mba hitoriako teny any koa; fa izay no nahatongavako.'
  - type: heading
    content: Mat 4.23; Lio 4.44
  '39':
  - type: text
    content: 'Dia nandeha Izy ka nitoriteny tany amin’ny sinagogan’ny olona manerana an’i Galilia sady nandroaka ny '
  - type: text
    content: demonia
  - type: text
    content: .
  - type: heading
    content: Nanasitrana boka iray Jesosy
  - type: heading
    content: Mat 8.1-4; Lio 5.12-16
  '4':
  - type: text
    content: 'dia niseho i Jaona izay nanao batisa tany an-tany efitra ary nitory ny batisan’ny fibebahana ho famelan-keloka. '
  '40':
  - type: text
    content: 'Ary nisy boka iray nanatona Azy ka nitaraina taminy sady nandohalika teo anatrehany no niteny taminy hoe: Raha mety Ianao dia afaka manadio ahy. '
  '41':
  - type: text
    content: 'Ary onena azy Jesosy ka nanatsotra ny tanany dia nikasika azy sady niteny taminy hoe: Mety Aho; madiova ianao. '
  '42':
  - type: text
    content: 'Ary niaraka tamin’izay dia niala taminy ny habokana ka nadio izy. '
  '43':
  - type: text
    content: 'Ary namepetra azy mafy Jesosy sady nampandeha azy avy hatrany '
  '44':
  - type: text
    content: 'no niteny taminy hoe: Tandremo tsara mba tsy hisy holazainao na amin’iza na amin’iza izao, fa mandehana, misehoa aloha amin’ny mpisorona ka manolora ny fanatitra fanadiovana anao, izay nandidian’i Mosesy ho vavolombelona amin’ireo. '
  '45':
  - type: text
    content: Nefa lasa Ralehilahy ka nanomboka nitantara sy nampiely izay zava-niseho, hany ka tsy nahazo niditra miharihary tao an-tanàna intsony Jesosy fa nitoetra tany ivelany tany amin’ny tany efitra Izy; dia nanatona Azy ny olona avy teny amin’ny manodidina rehetra.
  '5':
  - type: text
    content: 'Dia nandeha nanatona azy ny tany '
  - type: text
    content: Jodia
  - type: text
    content: ' manontolo sy ny mponina tsy an-kanavaka tany Jerosalema ka nataony batisa tao amin’ny ony Jordana ireny rehefa niaiky ny fahotany avy. '
  '6':
  - type: text
    content: I Jaona dia nitafy lamba volon-drameva; fehikibo hoditra no teny aminy ary ny fihinany dia valala sy tantely remby.
  - type: heading
    content: Mat 3.11-12; Lio 3.15-18; ampit. Jao 1.24-28
  '7':
  - type: text
    content: 'Ary nitoriteny izy hoe: Indro, avy ao aorianako Ilay mahery noho izaho ary tsy mendrika hiondrika hamaha ny fehin-kapany akory aza aho. '
  '8':
  - type: text
    content: Izaho dia nanao batisa anareo tamin’ny rano fa Izy kosa hanao batisa anareo amin’ny Fanahy Masina.
  - type: heading
    content: Ny nanaovana batisa an’i Jesosy sy ny nakan’ny devoly fanahy Azy
  - type: heading
    content: Mat 3.13-17; Lio 3.21-22; ampit. Jao 1.29-34
  '9':
  - type: text
    content: 'Tamin’izany andro izany dia tonga avy tany Nazareta any Galilia Jesosy ka nataon’i Jaona batisa tao Jordana. '
