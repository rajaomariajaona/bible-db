verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I Paoly sy i Timoty, mpanompon’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy, no mamangy ny olona masina rehetra ao amin’i Kristy Jesosy mbamin’ny mpitandrina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eveka.
      marker-yv: yv-n
    - type: text
      text: ' sy ny diakona izay any Filipia: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'mba hamantaranareo izay zava-dehibe, mba ho madio am-po sy tsy hanan-tsiny ianareo amin’ny andron’i Kristy '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: sady ho feno ny vokatry ny fahamarinana, izay avy amin’ny alalan’i Jesosy Kristy, ho voninahitra sy fiderana an’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandrosoan’ny Filazantsara
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tiako ho fantatrareo, ry rahalahy, fa izay zavatra nanjo ahy dia vao mainka tonga fampandrosoana ny Filazantsara. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tonga fantatry ny mpiambina rehetra mbamin’ny olona hafa rehetra mantsy fa noho ny amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' no ifatorako, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary ny ankabeazan’ny rahalahy dia efa matoky ao amin’ny Tompo noho ny fifatorako ka mitombo fahasahiana hitory tsy amin-tahotra ny tenin’Andriamanitra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fialonana sy fifandirana aza no itorian’ny sasany an’i Kristy ary fikasana tsara kosa ny an’ny sasany; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'fitiavana ny an’ny sasany satria fantany fa voatendry ho mpiaro ny Filazantsara aho; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: fifampiandaniana kosa no itorian’ny sasany an’i Kristy, fa tsy mba amin’ny fo madio, ka mihevitra hanampy fahoriana ny fifatorako izy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ahoana ary? Amin’izay atao rehetra, na amin’ny fihatsarambelatsihy na amin’ny marina, dia Kristy no torina, ary mifaly amin’izany aho; eny, mbola hifaly ihany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fantatro mantsy fa ho tonga famonjena ahy izany noho ny fangatahanareo sy ny fanampian’ny Fanahin’i Jesosy Kristy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka fangatahana
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fatratra tokoa ny faniriako sy ny fanantenako fa tsy hitsanga-menatra aho, na amin’ny inona na amin’ny inona, fa tahaka ny isanandro; eny, ankehitriny koa dia amin’ny fahasahiana rehetra no hankalazana an’i Kristy ao amin’ny tenako, na amin’ny fiainana, na amin’ny fahafatesana.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa Kristy no antony ahavelomako ary ny fahafatesana no hahazoako tombony. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Kanefa raha ny ho velona amin’ny nofo no hampahavokatra ny asako dia tsy hitako izay hofidiko, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'fa sanganehana eo anelanelan’izy roa aho: Maniry hiala aho ka ho ao amin’i Kristy, satria tsara lavitra izany; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'kanefa ny hitoerako eo amin’ny nofo no mahasoa anareo kokoa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Matoky izany aho ka fantatro fa hitoetra sy haharitra eo aminareo rehetra mba hahazoanareo fandrosoana sy fifaliana amin’ny finoanareo '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ka hitombo noho ny ataoko ny firavoravoanareo ao amin’i Kristy Jesosy, amin’ny hankanesako atỳ aminareo indray.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiainana mifanaraka amin’ny Filazantsara
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Izao ihany no teniko: Aoka ny fitondrantenanareo ho mendrika ny Filazantsaran’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ka na ho tonga hahita anareo aho na tsy ho tonga dia handre ny momba anareo, fa maharitra amin’ny fanahy iray ianareo ka miray fo hiara-miezaka hampandroso ny finoana ny Filazantsara, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'ka tsy ho azon’ny fahavalo ampitahorina ianareo na amin’ny inona na amin’ny inona. Amin’ireo fahavalo dia mariky ny fahaverezana izany, fa aminareo kosa dia mariky ny famonjena sady avy amin’Andriamanitra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa efa nomena fahasoavana ianareo noho ny amin’i Kristy, tsy ny hino Azy ihany fa ny hiharam-pahoriana koa noho ny Aminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Misaotra an’Andriamanitra aho isaky ny mahatsiaro anareo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Manana izany ady izany ianareo, izay hitanareo teo amiko sady mbola renareo fa ato amiko ihany ankehitriny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mandrakariva, rehefa mivavaka ho anareo rehetra aho, dia mangataka amin’ny fifaliana, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'noho ny fiombonanareo amin’ny Filazantsara hatramin’ny andro voalohany ka mandraka ankehitriny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Matoky indrindra aho fa Izay nanomboka asa tsara tao anatinareo no hahatanteraka izany mandra-piavin’ny andron’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Marina izany fiheverako anareo rehetra izany, fa ato am-poko sady mpiombona amin’ny fahasoavana ananako ianareo rehetra, na amin’ny fifatorako na amin’ny fiarovako sy fanamafisako orina ny Filazantsara. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Andriamanitra no vavolombeloko, fa tia anareo rehetra tokoa aho amin’ny fitiavan’i Kristy Jesosy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary izao no angatahiko dia ny mbola hitomboan’ny fitiavanareo bebe kokoa amin’ny fahalalana tsara sy ny fahaiza-mamantatra rehetra '
