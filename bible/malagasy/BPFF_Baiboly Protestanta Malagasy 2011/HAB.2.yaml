document_id: HAB.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny valintenin’NY TOMPO: Ny marina sy ny mpampahory'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hitsangana eo ambonin’ny toerana fiambenako Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hijoro eo ambonin’ny manda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiandry Aho mba hahitako izay holazainy Amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay havaliko amin’ny fitarainako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia namaly ahy NY TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soraty ny fahitana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ataovy velona tsara ny soratra eo amin’ny fafana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho azon’izay mihazakazaka mamaky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny fahitana dia mbola ho amin’ny fotoana voatendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mikendry ny farany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho diso;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, na dia mitaredretra aza izy dia andraso ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho avy tokoa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hijanona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, feno avonavona ireny; tsy mahitsy ny fanahiny ao anatiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny marina kosa dia ho velon’ny finoany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eny tokoa, mamitaka ny divay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba mahatoetra ny lehilahy miavonavona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ilay mitanatana vava tahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, toy ny fahafatesana ka tsy mety voky.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa manangona ny firenena rehetra ho ao aminy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mamory ny olona rehetra ho ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy hanao oha-teny hamelezana azy va ireto olona rehetra ireto?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hanao eson-teny sy fitenenana hanoherana azy va izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no holazainy:'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo loza dimy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lozan’izay mahery manangona ny tsy azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay mivesatra tombon-trosa tsy voaloa ara-potoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy hitsangana tampoka va ny tompon-trosa?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hifoha va ireo izay hampijaly anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho babony ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa efa namabo firenena maro ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mba hobaboin’ny sisa rehetra amin’ny firenena kosa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny ran’olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny herisetra natao tamin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tamin’ny tanàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mponina rehetra ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lozan’izay fatra-pila harena amin’ny tsy marina ho an’ny taranany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanaovany ny akaniny any amin’ny avo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy ho tratry ny tanan’ny loza!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay hahatonga henatra ho an’ny taranakao no noheverinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny handringanana firenena maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niantso loza hihatra amin’ny ainao ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa hitaraina ny vato ao amin’ny rindrina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sakamandimby ao amin’ny trano no hamaly azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lozan’izay manangana vohitra amin’ny fandatsahan-dra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manorina tanàna amin’ny tsy fahamarinana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Moa tsy avy amin’Andriamanitra, Tompon’izao rehetra izao va
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hisasaran’ny olona ho an’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hisahiranan’ny firenena amin’ny zava-poana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ho feno ny fahalalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny voninahitry NY TOMPO ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny fanaron’ny rano ny fanambanin’ny ranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lozan’izay mampisotro toaka ny namany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianao izay manome poizina ka mampahamamo azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hijery ny fitanjahany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Efa feno henatra ianao fa tsy voninahitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba misotroa koa ka asehoy ny fitanjahanao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatolotra anao ny kapoaka eny an-tanana ankavanan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fahamenarana no ho solon’ny voninahitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa hanody anao ny herisetra natao tamin’i Libanona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fandringanana mahatahotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: namelezana ny biby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny ran’olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny herisetra natao tamin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tamin’ny tanàna sy ny mponina rehetra ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Inona moa no ilàna ny sarin-javatra voasokitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no misokitra azy ny mpanao azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny sarin-javatra voarendrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mpampianatra lainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no matoky azy izay namorona azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manao sampy moana aminy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lozan’izay miteny amin’ny hazo hoe: Mifohaza!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’ny vato moana hoe: Mitsangàna!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampianatra va ireo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: E! voapetaka takelaka volamena sy volafotsy ihany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy misy fanahy akory ao anatiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: NY TOMPO dia ao amin’ny tempoliny masina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hangina eo anatrehany ny tany rehetra!
