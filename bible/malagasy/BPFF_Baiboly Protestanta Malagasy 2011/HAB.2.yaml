document_id: HAB.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny valintenin’NY TOMPO: Ny marina sy ny mpampahory'
  - type: text
    content: Hitsangana eo ambonin’ny toerana fiambenako Aho
  - type: text
    content: ary hijoro eo ambonin’ny manda;
  - type: text
    content: hiandry Aho mba hahitako izay holazainy Amiko
  - type: text
    content: sy izay havaliko amin’ny fitarainako.
  '10':
  - type: text
    content: Izay hahatonga henatra ho an’ny taranakao no noheverinao,
  - type: text
    content: dia ny handringanana firenena maro;
  - type: text
    content: niantso loza hihatra amin’ny ainao ianao.
  '11':
  - type: text
    content: Fa hitaraina ny vato ao amin’ny rindrina
  - type: text
    content: ary ny sakamandimby ao amin’ny trano no hamaly azy.
  '12':
  - type: text
    content: Lozan’izay manangana vohitra amin’ny fandatsahan-dra
  - type: text
    content: sy manorina tanàna amin’ny tsy fahamarinana!
  '13':
  - type: text
    content: Moa tsy avy amin’Andriamanitra, Tompon’izao rehetra izao va
  - type: text
    content: no hisasaran’ny olona ho an’ny afo
  - type: text
    content: sy hisahiranan’ny firenena amin’ny zava-poana?
  '14':
  - type: text
    content: Fa ho feno ny fahalalana
  - type: text
    content: ny voninahitry NY TOMPO ny tany,
  - type: text
    content: toy ny fanaron’ny rano ny fanambanin’ny ranomasina.
  '15':
  - type: text
    content: Lozan’izay mampisotro toaka ny namany,
  - type: text
    content: dia ianao izay manome poizina ka mampahamamo azy
  - type: text
    content: mba hijery ny fitanjahany!
  '16':
  - type: text
    content: Efa feno henatra ianao fa tsy voninahitra;
  - type: text
    content: mba misotroa koa ka asehoy ny fitanjahanao!
  - type: text
    content: Hatolotra anao ny kapoaka eny an-tanana ankavanan’NY TOMPO,
  - type: text
    content: ary fahamenarana no ho solon’ny voninahitrao.
  '17':
  - type: text
    content: Fa hanody anao ny herisetra natao tamin’i Libanona
  - type: text
    content: sy ny fandringanana mahatahotra
  - type: text
    content: namelezana ny biby,
  - type: text
    content: noho ny ran’olona
  - type: text
    content: sy ny herisetra natao tamin’ny tany,
  - type: text
    content: dia tamin’ny tanàna sy ny mponina rehetra ao aminy.
  '18':
  - type: text
    content: Inona moa no ilàna ny sarin-javatra voasokitra,
  - type: text
    content: no misokitra azy ny mpanao azy?
  - type: text
    content: Na ny sarin-javatra voarendrika
  - type: text
    content: sy ny mpampianatra lainga,
  - type: text
    content: no matoky azy izay namorona azy
  - type: text
    content: ka manao sampy moana aminy?
  '19':
  - type: text
    content: 'Lozan’izay miteny amin’ny hazo hoe: Mifohaza!'
  - type: text
    content: 'Ary amin’ny vato moana hoe: Mitsangàna!'
  - type: text
    content: Hampianatra va ireo?
  - type: text
    content: E! voapetaka takelaka volamena sy volafotsy ihany izy,
  - type: text
    content: nefa tsy misy fanahy akory ao anatiny.
  '2':
  - type: text
    content: 'Dia namaly ahy NY TOMPO hoe:'
  - type: text
    content: Soraty ny fahitana
  - type: text
    content: ka ataovy velona tsara ny soratra eo amin’ny fafana
  - type: text
    content: mba ho azon’izay mihazakazaka mamaky.
  '20':
  - type: text
    content: NY TOMPO dia ao amin’ny tempoliny masina.
  - type: text
    content: Aoka hangina eo anatrehany ny tany rehetra!
  '3':
  - type: text
    content: Fa ny fahitana dia mbola ho amin’ny fotoana voatendry,
  - type: text
    content: ary mikendry ny farany izy
  - type: text
    content: ka tsy ho diso;
  - type: text
    content: eny, na dia mitaredretra aza izy dia andraso ihany,
  - type: text
    content: fa ho avy tokoa izy
  - type: text
    content: ka tsy hijanona.
  '4':
  - type: text
    content: Indro, feno avonavona ireny; tsy mahitsy ny fanahiny ao anatiny,
  - type: text
    content: fa ny marina kosa dia ho velon’ny finoany.
  '5':
  - type: text
    content: Eny tokoa, mamitaka ny divay.
  - type: text
    content: Tsy mba mahatoetra ny lehilahy miavonavona,
  - type: text
    content: 'dia ilay mitanatana vava tahaka ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ;
  - type: text
    content: eny, toy ny fahafatesana ka tsy mety voky.
  - type: text
    content: Fa manangona ny firenena rehetra ho ao aminy izy
  - type: text
    content: sady mamory ny olona rehetra ho ao aminy.
  '6':
  - type: text
    content: Tsy hanao oha-teny hamelezana azy va ireto olona rehetra ireto?
  - type: text
    content: Tsy hanao eson-teny sy fitenenana hanoherana azy va izy?
  - type: text
    content: 'Izao no holazainy:'
  - type: heading
    content: Ireo loza dimy
  - type: text
    content: Lozan’izay mahery manangona ny tsy azy!
  - type: text
    content: Mandra-pahoviana?
  - type: text
    content: Dia izay mivesatra tombon-trosa tsy voaloa ara-potoana.
  '7':
  - type: text
    content: Tsy hitsangana tampoka va ny tompon-trosa?
  - type: text
    content: Tsy hifoha va ireo izay hampijaly anao?
  - type: text
    content: Ho babony ianao!
  '8':
  - type: text
    content: Fa efa namabo firenena maro ianao
  - type: text
    content: ka mba hobaboin’ny sisa rehetra amin’ny firenena kosa,
  - type: text
    content: noho ny ran’olona
  - type: text
    content: sy ny herisetra natao tamin’ny tany,
  - type: text
    content: dia tamin’ny tanàna
  - type: text
    content: sy ny mponina rehetra ao aminy.
  '9':
  - type: text
    content: Lozan’izay fatra-pila harena amin’ny tsy marina ho an’ny taranany,
  - type: text
    content: hanaovany ny akaniny any amin’ny avo
  - type: text
    content: mba tsy ho tratry ny tanan’ny loza!
