document_id: DAN.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanasana nataon’i Belsazara mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanao fanasana lehibe ho an’ny mpanolotsainany arivo lahy i Belsazara mpanjaka, ary teo anatrehan’ireny no nisotroany divay. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nony efa nisotro divay i Belsazara, dia nasainy nalaina ny fanaka volamena sy volafotsy izay nalain’i Nebokadnezara rainy avy tao amin’ny tempoly tany Jerosalema mba hisotroan’ny mpanjaka sy ny mpanolotsainany, ny vadiny mbamin’ny vady tsindranony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia noentiny ny fanaka volamena, ilay nalaina avy teo amin’ny tempolin’ny tranon’Andriamanitra tany Jerosalema, ary ny mpanjaka sy ny mpanolotsainany, ny vadiny mbamin’ny vady tsindranony dia nisotro taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eny, nisotro divay izy ireo sady nankalaza ny andriamanitra volamena, volafotsy, varahina, vy, hazo ary vato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’izay dia nisy rantsantanan’olona niseho ka nanoratra tandrifin’ny jiro tamin’ny lalotra sokay teo amin’ny rindrin’ny lapan’ny mpanjaka; ary nahita ilay rantsantanana nanoratra ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nihahatsatra ny tarehin’ny mpanjaka ary naharaiki-tahotra azy ny eritreriny ka nivahavaha ny taolan’andilany sady nipararetra ny lohaliny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niantso mafy ny mpanjaka mba hampidirana ny mpisikidy sy ny Kaldeana ary ny mpanandro. Ary niteny tamin’ny olon-kendrin’i Babilona ny mpanjaka hoe: Na zovy na zovy no mahavaky io soratra io sady milaza ny heviny amiko dia hampiakanjoina volomparasy sy hasiana rojo volamena ny vozony ary ho isan’ireo mpanapaka telo lahy amin’ny fanjakana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niditra avokoa ny olon-kendrin’ny mpanjaka nefa tsy nisy nahavaky ny soratra na nampahalala ny mpanjaka ny heviny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia natahotra indrindra i Belsazara mpanjaka ka nihahatsatra ny tarehiny, ary vaka terỳ ny mpanolotsainany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manazava ny hevitr’ilay soratra hafahafa i Daniela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny renin’ny mpanjaka dia niditra tao amin’ny trano fanasana noho ny tenin’ny mpanjaka sy ny mpanolotsainany. Dia niteny ny renin’ny mpanjaka hoe: Ry mpanjaka ô, ho velona mandrakizay anie ianao! Aoka tsy haharaiki-tahotra anao ny eritreritrao, na ho hatsatra ny tarehinao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Misy lehilahy ato amin’ny fanjakanao izay manana fanahin’ireo andriamanitra masina ao anatiny. Fony fahavelon-drainao dia hita fa nisy fahazavan-tsaina sy fahalalana ary fahendrena tao aminy, tahaka ny fahendren’ireo andriamanitra. Koa nataon’i Nebokadnezara mpanjaka rainao, dia ny mpanjaka rainao, hoy aho, ho lehiben’ny ombiasy, ny mpisikidy, ny Kaldeana ary ny mpanandro izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa fanahy hafakely sy fahalalana sy saina ary fahaiza-milaza nofy sy fanambaràna teny sarotra sy famaliana fanontaniana sarotra no hita tao amin’izany Daniela izany, izay nomen’ny mpanjaka anarana hoe Beltesazara. Koa aoka hantsoina i Daniela, fa holazainy ny hevitry ny teny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nampidirina teo anatrehan’ny mpanjaka i Daniela. Ary niteny tamin’i Daniela ny mpanjaka hoe: Ianao va no Daniela, ilay isan’ny babo avy amin’ny taranak’i Joda, izay noentin’ny mpanjaka raiko avy tany Joda? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Efa reko ny aminao, fa manana fanahin’ireo andriamanitra ianao sady misy fahazavan-tsaina sy fahalalana ary fahendrena hafakely hita ao aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Teo vao teo dia nampidirina teto anatrehako ny olon-kendry sy ny mpisikidy hamaky io soratra io ary mba hampahafantatra ahy ny heviny, nefa tsy nahalaza ny hevitry ny teny izy ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Reko fa mahalaza hevitra sy mahay mamaly fanontaniana sarotra ianao. Koa raha mahavaky io soratra io sy mampahafantatra ahy ny heviny ianao dia hampiakanjoina volomparasy sy hasiana rojo volamena ny vozonao ary ho isan’ireo mpanapaka telo lahy amin’ny fanjakana ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Daniela hoe: Aoka ihany ho anao ny fanomezanao, ary ny valim-pitianao dia omeo ny hafa. Kanefa hovakiko amin’ny mpanjaka ihany ny soratra ary hampahafantariko azy koa ny heviny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny aminao, ry mpanjaka ô! Andriamanitra Avo Indrindra no efa nanome fanjakana sy fahalehibiazana sy voninahitra ary laza an’i Nebokadnezara rainao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary noho ny fahalehibiazana nomeny azy, ny fokom-pirenena sy ny firenena ary ny samihafa fiteny rehetra dia nangovitra sy natahotra teo anatrehany; izay tiany hovonoina dia novonoiny; ary izay tiany hovelomina dia novelominy; izay tiany hasandratra dia nasandrany; ary izay tiany haetry dia naetriny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa nony niavonavona kosa ny fony ary nikikitra tamin’ny fireharehana ny fanahiny, dia naetry niala tamin’ny sezafiandrianan’ny fanjakany izy ary nesorina taminy ny voninahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia noroahina niala tamin’ny zanak’olombelona izy, ny fony dia natao tahaka ny an’ny biby, ary tany amin’ny borikidia no fonenany; nampihinanina ahitra toy ny omby izy ary kotsan’ny andon’ny lanitra ny tenany, ambara-pahafantany fa Andriamanitra Avo Indrindra no mitondra ny fanjakan’ny olona ary izay tiany no tendreny ho mpanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ianao, ry Belsazara zanany, dia tsy mba nampietry ny fonao, na dia fantatrao aza izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Niavonavona tamin’ny Tompon’ny lanitra ianao; noentina teto anatrehanao ny fanaky ny tranon’Andriamanitra ka nisotro divay taminy ianao sy ny mpanolotsainanao, ny vadinao mbamin’ny vady tsindranonao; ary ianao dia nankalaza ny andriamanitra volafotsy, volamena, varahina, vy, hazo ary vato, izay tsy mahita na mandre na mahalala. Fa Andriamanitra izay mitana ny fofonainao sady Tompon’ny alehanao rehetra kosa tsy mba nankalazainao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Noho izany dia Izy no niavian’ilay rantsantanana nanoratra ireo teny ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny teny voasoratra dia izao: MENE, MENE, TEKELA, PARESINA. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izao no hevitry ny teny MENE: Voaisa: Voaisan’Andriamanitra ny nanjakanao ka taperiny amin’izao; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'TEKELA: Voalanja: Voalanja tamin’ny mizana ianao ka indro latsa-danja; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'PARESA: Voazara: Zarazaraina ny fanjakanao ka omena ho an’ny Mediana sy ny Persiana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia nanome baiko i Belsazara mba hampiakanjoina volomparasy i Daniela sady hasiana rojo volamena ny vozony, ary hambara fa isan’ny mpanapaka telo lahy amin’ny fanjakana izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tamin’io alina io ihany dia nisy namono i Belsazara, mpanjakan’ny Kaldeana.
