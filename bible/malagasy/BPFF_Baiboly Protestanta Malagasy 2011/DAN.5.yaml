document_id: DAN.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanasana nataon’i Belsazara mpanjaka
  - type: text
    content: 'Nanao fanasana lehibe ho an’ny mpanolotsainany arivo lahy i Belsazara mpanjaka, ary teo anatrehan’ireny no nisotroany divay. '
  '10':
  - type: text
    content: 'Ary ny renin’ny mpanjaka dia niditra tao amin’ny trano fanasana noho ny tenin’ny mpanjaka sy ny mpanolotsainany. Dia niteny ny renin’ny mpanjaka hoe: Ry mpanjaka ô, ho velona mandrakizay anie ianao! Aoka tsy haharaiki-tahotra anao ny eritreritrao, na ho hatsatra ny tarehinao. '
  '11':
  - type: text
    content: 'Misy lehilahy ato amin’ny fanjakanao izay manana fanahin’ireo andriamanitra masina ao anatiny. Fony fahavelon-drainao dia hita fa nisy fahazavan-tsaina sy fahalalana ary fahendrena tao aminy, tahaka ny fahendren’ireo andriamanitra. Koa nataon’i Nebokadnezara mpanjaka rainao, dia ny mpanjaka rainao, hoy aho, ho lehiben’ny ombiasy, ny mpisikidy, ny Kaldeana ary ny mpanandro izy. '
  '12':
  - type: text
    content: Fa fanahy hafakely sy fahalalana sy saina ary fahaiza-milaza nofy sy fanambaràna teny sarotra sy famaliana fanontaniana sarotra no hita tao amin’izany Daniela izany, izay nomen’ny mpanjaka anarana hoe Beltesazara. Koa aoka hantsoina i Daniela, fa holazainy ny hevitry ny teny.
  '13':
  - type: text
    content: 'Dia nampidirina teo anatrehan’ny mpanjaka i Daniela. Ary niteny tamin’i Daniela ny mpanjaka hoe: Ianao va no Daniela, ilay isan’ny babo avy amin’ny taranak’i Joda, izay noentin’ny mpanjaka raiko avy tany Joda? '
  '14':
  - type: text
    content: 'Efa reko ny aminao, fa manana fanahin’ireo andriamanitra ianao sady misy fahazavan-tsaina sy fahalalana ary fahendrena hafakely hita ao aminao. '
  '15':
  - type: text
    content: 'Teo vao teo dia nampidirina teto anatrehako ny olon-kendry sy ny mpisikidy hamaky io soratra io ary mba hampahafantatra ahy ny heviny, nefa tsy nahalaza ny hevitry ny teny izy ireny. '
  '16':
  - type: text
    content: Reko fa mahalaza hevitra sy mahay mamaly fanontaniana sarotra ianao. Koa raha mahavaky io soratra io sy mampahafantatra ahy ny heviny ianao dia hampiakanjoina volomparasy sy hasiana rojo volamena ny vozonao ary ho isan’ireo mpanapaka telo lahy amin’ny fanjakana ianao.
  '17':
  - type: text
    content: 'Dia hoy i Daniela hoe: Aoka ihany ho anao ny fanomezanao, ary ny valim-pitianao dia omeo ny hafa. Kanefa hovakiko amin’ny mpanjaka ihany ny soratra ary hampahafantariko azy koa ny heviny. '
  '18':
  - type: text
    content: 'Ny aminao, ry mpanjaka ô! Andriamanitra Avo Indrindra no efa nanome fanjakana sy fahalehibiazana sy voninahitra ary laza an’i Nebokadnezara rainao. '
  '19':
  - type: text
    content: 'Ary noho ny fahalehibiazana nomeny azy, ny fokom-pirenena sy ny firenena ary ny samihafa fiteny rehetra dia nangovitra sy natahotra teo anatrehany; izay tiany hovonoina dia novonoiny; ary izay tiany hovelomina dia novelominy; izay tiany hasandratra dia nasandrany; ary izay tiany haetry dia naetriny. '
  '2':
  - type: text
    content: 'Nony efa nisotro divay i Belsazara, dia nasainy nalaina ny fanaka volamena sy volafotsy izay nalain’i Nebokadnezara rainy avy tao amin’ny tempoly tany Jerosalema mba hisotroan’ny mpanjaka sy ny mpanolotsainany, ny vadiny mbamin’ny vady tsindranony. '
  '20':
  - type: text
    content: 'Fa nony niavonavona kosa ny fony ary nikikitra tamin’ny fireharehana ny fanahiny, dia naetry niala tamin’ny sezafiandrianan’ny fanjakany izy ary nesorina taminy ny voninahiny. '
  '21':
  - type: text
    content: 'Dia noroahina niala tamin’ny zanak’olombelona izy, ny fony dia natao tahaka ny an’ny biby, ary tany amin’ny borikidia no fonenany; nampihinanina ahitra toy ny omby izy ary kotsan’ny andon’ny lanitra ny tenany, ambara-pahafantany fa Andriamanitra Avo Indrindra no mitondra ny fanjakan’ny olona ary izay tiany no tendreny ho mpanjakany. '
  '22':
  - type: text
    content: 'Ary ianao, ry Belsazara zanany, dia tsy mba nampietry ny fonao, na dia fantatrao aza izany rehetra izany. '
  '23':
  - type: text
    content: 'Niavonavona tamin’ny Tompon’ny lanitra ianao; noentina teto anatrehanao ny fanaky ny tranon’Andriamanitra ka nisotro divay taminy ianao sy ny mpanolotsainanao, ny vadinao mbamin’ny vady tsindranonao; ary ianao dia nankalaza ny andriamanitra volafotsy, volamena, varahina, vy, hazo ary vato, izay tsy mahita na mandre na mahalala. Fa Andriamanitra izay mitana ny fofonainao sady Tompon’ny alehanao rehetra kosa tsy mba nankalazainao. '
  '24':
  - type: text
    content: 'Noho izany dia Izy no niavian’ilay rantsantanana nanoratra ireo teny ireo. '
  '25':
  - type: text
    content: 'Ary ny teny voasoratra dia izao: MENE, MENE, TEKELA, PARESINA. '
  '26':
  - type: text
    content: 'Izao no hevitry ny teny MENE: Voaisa: Voaisan’Andriamanitra ny nanjakanao ka taperiny amin’izao; '
  '27':
  - type: text
    content: 'TEKELA: Voalanja: Voalanja tamin’ny mizana ianao ka indro latsa-danja; '
  '28':
  - type: text
    content: 'PARESA: Voazara: Zarazaraina ny fanjakanao ka omena ho an’ny Mediana sy ny Persiana.'
  '29':
  - type: text
    content: Dia nanome baiko i Belsazara mba hampiakanjoina volomparasy i Daniela sady hasiana rojo volamena ny vozony, ary hambara fa isan’ny mpanapaka telo lahy amin’ny fanjakana izy.
  '3':
  - type: text
    content: 'Dia noentiny ny fanaka volamena, ilay nalaina avy teo amin’ny tempolin’ny tranon’Andriamanitra tany Jerosalema, ary ny mpanjaka sy ny mpanolotsainany, ny vadiny mbamin’ny vady tsindranony dia nisotro taminy. '
  '30':
  - type: text
    content: Tamin’io alina io ihany dia nisy namono i Belsazara, mpanjakan’ny Kaldeana.
  '4':
  - type: text
    content: Eny, nisotro divay izy ireo sady nankalaza ny andriamanitra volamena, volafotsy, varahina, vy, hazo ary vato.
  '5':
  - type: text
    content: 'Tamin’izay dia nisy rantsantanan’olona niseho ka nanoratra tandrifin’ny jiro tamin’ny lalotra sokay teo amin’ny rindrin’ny lapan’ny mpanjaka; ary nahita ilay rantsantanana nanoratra ny mpanjaka. '
  '6':
  - type: text
    content: 'Dia nihahatsatra ny tarehin’ny mpanjaka ary naharaiki-tahotra azy ny eritreriny ka nivahavaha ny taolan’andilany sady nipararetra ny lohaliny. '
  '7':
  - type: text
    content: 'Dia niantso mafy ny mpanjaka mba hampidirana ny mpisikidy sy ny Kaldeana ary ny mpanandro. Ary niteny tamin’ny olon-kendrin’i Babilona ny mpanjaka hoe: Na zovy na zovy no mahavaky io soratra io sady milaza ny heviny amiko dia hampiakanjoina volomparasy sy hasiana rojo volamena ny vozony ary ho isan’ireo mpanapaka telo lahy amin’ny fanjakana izy. '
  '8':
  - type: text
    content: 'Dia niditra avokoa ny olon-kendrin’ny mpanjaka nefa tsy nisy nahavaky ny soratra na nampahalala ny mpanjaka ny heviny. '
  '9':
  - type: text
    content: Dia natahotra indrindra i Belsazara mpanjaka ka nihahatsatra ny tarehiny, ary vaka terỳ ny mpanolotsainany.
  - type: heading
    content: Manazava ny hevitr’ilay soratra hafahafa i Daniela
