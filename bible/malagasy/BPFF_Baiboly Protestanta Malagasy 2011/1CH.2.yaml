document_id: 1CH.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak’i Joda
  - type: heading
    content: Ampit. Gen 35.23-26
  - type: text
    content: 'Ireto no zanakalahin’Israely: I Robena, i Simeona, i Levy, i Joda, Isakara, i Zebolona, '
  '10':
  - type: text
    content: 'I Rama no niteraka an’i Aminadaba; i Aminadaba no niteraka an’i Nasona, lohan’ny taranak’i Joda; '
  '11':
  - type: text
    content: 'ary i Nasona no niteraka an’i Salma; i Salma no niteraka an’i Boaza; '
  '12':
  - type: text
    content: 'i Boaza no niteraka an’i Obeda; i Obeda no niteraka an’i Jese; '
  '13':
  - type: text
    content: 'i Jese no niteraka an’i Eliaba, lahimatoa; i Abinadaba, lahiaivo; i Simea, fahatelo, '
  '14':
  - type: text
    content: 'i Netanela, fahefatra; i Raday, fahadimy; '
  '15':
  - type: text
    content: 'i Ozema, fahenina; ary i Davida, faralahy; '
  '16':
  - type: text
    content: 'ny anabavin-dry zareo dia i Zeroia sy i Abigaila; telo ny zanakalahin’i Zeroia, dia i Abisay, i Joaba ary i Asahela; '
  '17':
  - type: text
    content: ary i Abigaila no niteraka an’i Amasa; ary i Jitira ismaelita no rain’i Amasa.
  '18':
  - type: text
    content: 'Ary i Kaleba, zanakalahin’i Hezrona, no niteraka tamin’i Azoba vadiny sy tamin’i Jeriota. Ireto no zanakalahin’i Azoba: I Jasera sy i Sobaba ary i Ardona. '
  '19':
  - type: text
    content: 'Nony maty i Azoba dia i Efrata no nalain’i Kaleba ho vadiny, ary niteraka an’i Hora taminy izy. '
  '2':
  - type: text
    content: i Dana, i Josefa, i Benjamina, i Naftaly, i Gada ary i Asera.
  - type: heading
    content: Ampit. Gen 38; 46.12
  '20':
  - type: text
    content: 'I Hora no niteraka an’i Orỳ; i Orỳ no niteraka an’i Bezalila. '
  '21':
  - type: text
    content: 'Tatỳ aoriana dia niray tamin’ny zanakavavin’i Makira, rain’i Gileada, i Hezrona. Enimpolo taona izy raha naka azy ho vady; ary niteraka an’i Segoba taminy Ravehivavy; '
  '22':
  - type: text
    content: 'ary i Segoba no niteraka an’i Jaira, izay nanana tanàna madinika telo amby roapolo tany amin’ny tany Gileada. '
  '23':
  - type: text
    content: Nalain’i Gesora sy i Arama tamin’ny Jairita ny tanàna madinika an’i Jaira mbamin’i Kenata sy ny vohitra miankina aminy, dia tanàna enimpolo izany. Ireo rehetra ireo dia an’ny zanak’i Makira, rain’i Gileada.
  '24':
  - type: text
    content: 'Nony maty tany Kaleba-Efrata i Hezrona dia niteraka an’i Asora, rain’ny any Tekoa, taminy, i Abia vadin’i Hezrona. '
  '25':
  - type: text
    content: Ny zanakalahin’i Jeramela, lahimatoan’i Hezrona, dia i Rama, lahimatoa, i Bona, i Orena, i Ozema ary i Ahia.
  '26':
  - type: text
    content: 'Nanana vady hafa koa i Jeramela, Atara no anarany; izy no renin’i Onama. '
  '27':
  - type: text
    content: 'Ny zanakalahin’i Rama, lahimatoan’i Jeramela, dia i Maza sy i Jamina ary i Ekera. '
  '28':
  - type: text
    content: 'Ny zanakalahin’i Onama dia i Samay sy i Jada. Ny zanakalahin’i Samay dia i Nadaba sy i Abisora. '
  '29':
  - type: text
    content: 'Ny anaran’ny vadin’i Abisora dia i Abihaila; ary niteraka an’i Abana sy i Molida taminy izy. '
  '3':
  - type: text
    content: Ny zanakalahin’i Joda dia i Era sy i Onana ary i Sela; ireo telo ireo no naterak’i Baty-Soa kananita taminy. Ratsy fanahy teo imason’NY TOMPO i Era, lahimatoan’i Joda, ka nahafaty azy NY TOMPO.
  '30':
  - type: text
    content: 'Ny zanakalahin’i Nadaba dia i Seleda sy i Apaima. Maty momba kosa i Seleda. '
  '31':
  - type: text
    content: 'Ny zanakalahin’i Apaima dia i Jisy. Ny zanakalahin’i Jisy dia i Sesana. Ny zanakalahin’i Sesana dia i Ahelay. '
  '32':
  - type: text
    content: 'Ny zanakalahin’i Jada, rahalahin’i Samay, dia i Jetera sy i Jonatana; nefa maty momba i Jetera. '
  '33':
  - type: text
    content: Ny zanakalahin’i Jonatana dia i Paleta sy i Zazà. Ireo no zanakalahin’i Jeramela.
  '34':
  - type: text
    content: 'Tsy nanana zanakalahy i Sesana fa vavy avokoa. Nanana mpanompo ejiptiana i Sesana, i Jara no anarany. '
  '35':
  - type: text
    content: 'Nomen’i Sesana ho vadin’i Jara mpanompony ny zanany vavy; ary niteraka an’i Atahy taminy izy. '
  '36':
  - type: text
    content: 'I Atahy no niteraka an’i Natana; i Natana no niteraka an’i Zabada; '
  '37':
  - type: text
    content: 'i Zabada no niteraka an’i Efilala; i Efilala no niteraka an’i Obeda; '
  '38':
  - type: text
    content: 'i Obeda no niteraka an’i Jeho; i Jeho no niteraka an’i Azaria; '
  '39':
  - type: text
    content: 'i Azaria no niteraka an’i Heleza; i Heleza no niteraka an’i Elasa; '
  '4':
  - type: text
    content: I Tamara vinantovaviny no niteraka an’i Fareza sy i Zera taminy. Dimy no zanakalahin’i Joda rehetra.
  '40':
  - type: text
    content: 'i Elasa no niteraka an’i Sismay; i Sismay no niteraka an’i Saloma; '
  '41':
  - type: text
    content: i Saloma no niteraka an’i Jekamia; ary i Jekamia no niteraka an’i Elisama.
  '42':
  - type: text
    content: 'Ny zanakalahin’i Kaleba, rahalahin’i Jeramela, dia i Mesa, lahimatoa, rain’ny any Zifa, sy ny zanakalahin’i Maresa, rain’ny any Hebrona. '
  '43':
  - type: text
    content: 'Ny zanakalahin’i Hebrona dia i Kora, i Tapoa, i Rekema ary i Sema. '
  '44':
  - type: text
    content: 'I Sema no niteraka an’i Rahama, rain’i Jorkeama, i Rekema no niteraka an’i Samay; '
  '45':
  - type: text
    content: 'ny zanakalahin’i Samay dia i Maona; i Maona no rain’ny any Bety-Zora; '
  '46':
  - type: text
    content: 'ary i Efaha, vady tsindranon’i Kaleba, no niteraka an’i Harana sy i Moza ary i Gazeza. Ary i Harana no niteraka an’i Gazeza. '
  '47':
  - type: text
    content: 'Ny zanakalahin’i Jeday dia i Regema, i Jotama, i Gesana, i Paleta, i Efaha ary i Safa. '
  '48':
  - type: text
    content: 'Ary i Maka, vady tsindranon’i Kaleba, no niteraka an’i Sebera sy i Tirana. '
  '49':
  - type: text
    content: 'Niteraka an’i Safa, rain’ny any Madmana, sy i Seva, rain’ny any Makbena sady rain’ny any Gibea koa izy; ary ny zanakavavin’i Kaleba dia i Aksa. '
  '5':
  - type: text
    content: Ny zanakalahin’i Fareza dia i Hezrona sy i Hamola.
  - type: heading
    content: 1Mpa 5.11
  '50':
  - type: text
    content: 'Izao no zanakalahin’i Kaleba, zanak’i Hora, lahimatoan’i Efrata: I Sobala, rain’ny any Kiriata-Jearima; '
  '51':
  - type: text
    content: 'i Salma, rain’ny any Betlehema; i Harefa, rain’ny any Bety-Gadera. '
  '52':
  - type: text
    content: 'Nanan-janakalahy i Sobala, rain’ny any Kiriata-Jearima, dia i Haroe sy i Hatsỳ-Hamenokota. '
  '53':
  - type: text
    content: 'Ny fokon’i Kiriata-Jearima dia ny Jitirila, ny Potita, ny Somatita ary ny Misraita; avy tamin’ireo no niavian’ny Zoraìta sy ny Estaolita. '
  '54':
  - type: text
    content: 'Ny zanakalahin’i Salma dia i Betlehema, ny Netofatita, i Atarota-Bety-Joaba, i Hatsỳ-Hamanatita, ny Zoraìta '
  '55':
  - type: text
    content: ary ny fokon’ny mpanoratra izay nonina tany Jabeza, dia ny Tiratita sy ny Simeatita ary ny Sokatita. Ireo no Kenita avy tamin’i Hamata, rain’ny taranak’i Rekaba.
  '6':
  - type: text
    content: Ny zanakalahin’i Zera dia i Zimry, i Etana, i Hemana, i Kalkola ary i Dara; dimy lahy no isany.
  - type: heading
    content: Ampit. Jos 7
  '7':
  - type: text
    content: Ny zanakalahin’i Karmy dia i Akara, izay nampidi-doza ny Israely tamin’ny nandikany ny didy ny amin’ny zavatra voaozona.
  '8':
  - type: text
    content: Ny zanakalahin’i Etana dia i Azaria.
  '9':
  - type: text
    content: Ny zanakalahin’i Hezrona izay naterany dia i Jeramela sy i Rama ary i Kelobay.
  - type: heading
    content: Ampit. Nom 1.7; Rot 4.19-22
