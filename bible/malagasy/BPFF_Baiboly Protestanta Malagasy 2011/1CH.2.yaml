document_id: 1CH.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Gen 35.23-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ireto no zanakalahin’Israely: I Robena, i Simeona, i Levy, i Joda, Isakara, i Zebolona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: i Dana, i Josefa, i Benjamina, i Naftaly, i Gada ary i Asera.
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Gen 38; 46.12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny zanakalahin’i Joda dia i Era sy i Onana ary i Sela; ireo telo ireo no naterak’i Baty-Soa kananita taminy. Ratsy fanahy teo imason’NY TOMPO i Era, lahimatoan’i Joda, ka nahafaty azy NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I Tamara vinantovaviny no niteraka an’i Fareza sy i Zera taminy. Dimy no zanakalahin’i Joda rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny zanakalahin’i Fareza dia i Hezrona sy i Hamola.
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 5.11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny zanakalahin’i Zera dia i Zimry, i Etana, i Hemana, i Kalkola ary i Dara; dimy lahy no isany.
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Jos 7
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny zanakalahin’i Karmy dia i Akara, izay nampidi-doza ny Israely tamin’ny nandikany ny didy ny amin’ny zavatra voaozona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zanakalahin’i Etana dia i Azaria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny zanakalahin’i Hezrona izay naterany dia i Jeramela sy i Rama ary i Kelobay.
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Nom 1.7; Rot 4.19-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I Rama no niteraka an’i Aminadaba; i Aminadaba no niteraka an’i Nasona, lohan’ny taranak’i Joda; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary i Nasona no niteraka an’i Salma; i Salma no niteraka an’i Boaza; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'i Boaza no niteraka an’i Obeda; i Obeda no niteraka an’i Jese; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'i Jese no niteraka an’i Eliaba, lahimatoa; i Abinadaba, lahiaivo; i Simea, fahatelo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'i Netanela, fahefatra; i Raday, fahadimy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'i Ozema, fahenina; ary i Davida, faralahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny anabavin-dry zareo dia i Zeroia sy i Abigaila; telo ny zanakalahin’i Zeroia, dia i Abisay, i Joaba ary i Asahela; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary i Abigaila no niteraka an’i Amasa; ary i Jitira ismaelita no rain’i Amasa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary i Kaleba, zanakalahin’i Hezrona, no niteraka tamin’i Azoba vadiny sy tamin’i Jeriota. Ireto no zanakalahin’i Azoba: I Jasera sy i Sobaba ary i Ardona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nony maty i Azoba dia i Efrata no nalain’i Kaleba ho vadiny, ary niteraka an’i Hora taminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I Hora no niteraka an’i Orỳ; i Orỳ no niteraka an’i Bezalila. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tatỳ aoriana dia niray tamin’ny zanakavavin’i Makira, rain’i Gileada, i Hezrona. Enimpolo taona izy raha naka azy ho vady; ary niteraka an’i Segoba taminy Ravehivavy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary i Segoba no niteraka an’i Jaira, izay nanana tanàna madinika telo amby roapolo tany amin’ny tany Gileada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nalain’i Gesora sy i Arama tamin’ny Jairita ny tanàna madinika an’i Jaira mbamin’i Kenata sy ny vohitra miankina aminy, dia tanàna enimpolo izany. Ireo rehetra ireo dia an’ny zanak’i Makira, rain’i Gileada.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nony maty tany Kaleba-Efrata i Hezrona dia niteraka an’i Asora, rain’ny any Tekoa, taminy, i Abia vadin’i Hezrona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny zanakalahin’i Jeramela, lahimatoan’i Hezrona, dia i Rama, lahimatoa, i Bona, i Orena, i Ozema ary i Ahia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nanana vady hafa koa i Jeramela, Atara no anarany; izy no renin’i Onama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny zanakalahin’i Rama, lahimatoan’i Jeramela, dia i Maza sy i Jamina ary i Ekera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny zanakalahin’i Onama dia i Samay sy i Jada. Ny zanakalahin’i Samay dia i Nadaba sy i Abisora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny anaran’ny vadin’i Abisora dia i Abihaila; ary niteraka an’i Abana sy i Molida taminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny zanakalahin’i Nadaba dia i Seleda sy i Apaima. Maty momba kosa i Seleda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny zanakalahin’i Apaima dia i Jisy. Ny zanakalahin’i Jisy dia i Sesana. Ny zanakalahin’i Sesana dia i Ahelay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny zanakalahin’i Jada, rahalahin’i Samay, dia i Jetera sy i Jonatana; nefa maty momba i Jetera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny zanakalahin’i Jonatana dia i Paleta sy i Zazà. Ireo no zanakalahin’i Jeramela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tsy nanana zanakalahy i Sesana fa vavy avokoa. Nanana mpanompo ejiptiana i Sesana, i Jara no anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nomen’i Sesana ho vadin’i Jara mpanompony ny zanany vavy; ary niteraka an’i Atahy taminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'I Atahy no niteraka an’i Natana; i Natana no niteraka an’i Zabada; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Zabada no niteraka an’i Efilala; i Efilala no niteraka an’i Obeda; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'i Obeda no niteraka an’i Jeho; i Jeho no niteraka an’i Azaria; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'i Azaria no niteraka an’i Heleza; i Heleza no niteraka an’i Elasa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'i Elasa no niteraka an’i Sismay; i Sismay no niteraka an’i Saloma; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: i Saloma no niteraka an’i Jekamia; ary i Jekamia no niteraka an’i Elisama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ny zanakalahin’i Kaleba, rahalahin’i Jeramela, dia i Mesa, lahimatoa, rain’ny any Zifa, sy ny zanakalahin’i Maresa, rain’ny any Hebrona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ny zanakalahin’i Hebrona dia i Kora, i Tapoa, i Rekema ary i Sema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'I Sema no niteraka an’i Rahama, rain’i Jorkeama, i Rekema no niteraka an’i Samay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'ny zanakalahin’i Samay dia i Maona; i Maona no rain’ny any Bety-Zora; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'ary i Efaha, vady tsindranon’i Kaleba, no niteraka an’i Harana sy i Moza ary i Gazeza. Ary i Harana no niteraka an’i Gazeza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ny zanakalahin’i Jeday dia i Regema, i Jotama, i Gesana, i Paleta, i Efaha ary i Safa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary i Maka, vady tsindranon’i Kaleba, no niteraka an’i Sebera sy i Tirana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Niteraka an’i Safa, rain’ny any Madmana, sy i Seva, rain’ny any Makbena sady rain’ny any Gibea koa izy; ary ny zanakavavin’i Kaleba dia i Aksa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Izao no zanakalahin’i Kaleba, zanak’i Hora, lahimatoan’i Efrata: I Sobala, rain’ny any Kiriata-Jearima; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'i Salma, rain’ny any Betlehema; i Harefa, rain’ny any Bety-Gadera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Nanan-janakalahy i Sobala, rain’ny any Kiriata-Jearima, dia i Haroe sy i Hatsỳ-Hamenokota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ny fokon’i Kiriata-Jearima dia ny Jitirila, ny Potita, ny Somatita ary ny Misraita; avy tamin’ireo no niavian’ny Zoraìta sy ny Estaolita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ny zanakalahin’i Salma dia i Betlehema, ny Netofatita, i Atarota-Bety-Joaba, i Hatsỳ-Hamanatita, ny Zoraìta '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ary ny fokon’ny mpanoratra izay nonina tany Jabeza, dia ny Tiratita sy ny Simeatita ary ny Sokatita. Ireo no Kenita avy tamin’i Hamata, rain’ny taranak’i Rekaba.
