document_id: 2SA.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafa-baraka ireo irak’i Davida
  - type: heading
    content: 1Tan 19.1-5
  - type: text
    content: 'Rehefa afaka izany dia maty ny mpanjakan’ny taranak’i Amona ka i Hanona zanany no nanjaka nandimby azy. '
  '10':
  - type: text
    content: 'Ny olona sisa kosa dia nomeny hoentin’i Abisay rahalahiny mba halahany hiady amin’ny taranak’i Amona. '
  '11':
  - type: text
    content: 'Ary hoy izy: Raha tsy tohako ny Arameana dia vonjeo aho; fa raha tsy tohanao kosa ny taranak’i Amona dia hovonjeko ianao. '
  '12':
  - type: text
    content: 'Mahereza ary, koa aoka hitomban-dahy isika ho an’ny firenentsika sy ny tanànan’Andriamanitsika; ary aoka NY TOMPO hanao izay sitrapony. '
  '13':
  - type: text
    content: 'Dia nandroso hiady tamin’ny Arameana i Joaba sy ny olona nanaraka azy ka nandositra niala teo anoloany ireo. '
  '14':
  - type: text
    content: Nony hitan’ny taranak’i Amona fa nandositra ny Arameana dia mba nandositra niala teo anoloan’i Abisay koa izy ka niditra tao an-tanàna. Ary niverina avy namely ny taranak’i Amona i Joaba ka tonga tany Jerosalema.
  '15':
  - type: text
    content: 'Nony hitan’ny Arameana fa resy teo anoloan’ny Israely izy dia nivory izy ireo. '
  '16':
  - type: text
    content: 'Ary nandefa iraka haka ny Arameana izay tany andafin’ny ony Eofrata i Hadadezera ka tonga tany Helama izy ireo. I Sobaka, komandin’ny miaramilan’i Hadadezera, no nitarika azy. '
  '17':
  - type: text
    content: 'Nony nambara tamin’i Davida izany dia nampamory ny Israely rehetra izy ka lasa nita an’i Jordana dia tonga tany Helama. Ary nilahatra hiady amin’i Davida ny Arameana ka rafitra ny ady. '
  '18':
  - type: text
    content: 'Vaky nandositra teo anoloan’ny Israely ny Arameana. Nahafaty fitonjato an-kalesy fitondra miady sy efatra alina an-tsoavaly tamin’ny Arameana i Davida sady namely an’i Sobaka koa, ilay komandin’ny miaramila, ka nahafaty azy teo. '
  '19':
  - type: text
    content: Nony hitan’ny mpanjaka rehetra izay nanoa an’i Hadadezera fa resy teo anoloan’ny Israely izy dia nanao fihavanana tamin’ny Israely izy ireo ka nanompo azy. Dia natahotra ny Arameana ka tsy nety namonjy ny taranak’i Amona intsony.
  '2':
  - type: text
    content: 'Ary hoy i Davida: Hanisy soa an’i Hanona, zanak’i Nahasy, aho, toy ny soa nataon’ny rainy tamiko. Ary naniraka ny mpanompony i Davida mba hitsapa alahelo azy ny amin’ny rainy. Dia tonga tany amin’ny tanin’ny taranak’i Amona ny mpanompon’i Davida. '
  '3':
  - type: text
    content: 'Hoy anefa ireo mpanapaka ny taranak’i Amona tamin’i Hanona tompony: Moa heverinao ho fanajana ny rainao va no anirahan’i Davida olona hitsapa alahelo anao? Moa tsy hizaha ny tanàna sy hisafo azy ary handrava azy va no nanirahan’i Davida ireo mpanompony ireo hankaty aminao? '
  '4':
  - type: text
    content: 'Dia nosamborin’i Hanona ny mpanompon’i Davida ka noharatany ny ila somony sady notapahiny hatreo amin’ny foto-peny ny akanjony; dia nalefany hody izy ireo. '
  '5':
  - type: text
    content: 'Nisy lasa nanambara izany tamin’i Davida ka nandefa iraka izy hitsena azy ireo satria afa-baraka loatra ireo lehilahy ireo; ary hoy ny tenin’ny mpanjaka: Mitoera any Jeriko aloha ambara-panirin’ny somotrareo, amin’izay vao mody ianareo.'
  - type: heading
    content: Ny ady tamin’ny Amonita sy ny Arameana
  - type: heading
    content: 1Tan 19.6-19
  '6':
  - type: text
    content: 'Nony hitan’ny taranak’i Amona fa tonga mangidy hoditra eo anatrehan’i Davida izy dia nanakarama ny Arameana any Bety-Rehoba sy ny Arameana any Zoba izy, dia miaramila an-tongotra roa alina, ary olona arivo lahy tamin’ny mpanjakan’i Maka, ary roa arivo sy iray alina tamin’ny olona tany Toba. '
  '7':
  - type: text
    content: 'Nony ren’i Davida izany dia naniraka an’i Joaba sy ny miaramila rehetra izy, dia ny lehilahy mahery. '
  '8':
  - type: text
    content: 'Dia nivoaka hiady ny taranak’i Amona ka nilahatra teo anoloan’ny vavahady; ary ny Arameana avy any Zoba sy Rehoba sy ny olona avy tany Toba ary Maka kosa dia nitokana teny an-tsaha. '
  '9':
  - type: text
    content: 'Rehefa hitan’i Joaba fa teo anoloany sady teo aorianany ny fahavalo dia nifidy olona tamin’ireo voafantina tamin’ny Israely rehetra izy ka nalahany hiady tamin’ny Arameana. '
