document_id: 2SA.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafa-baraka ireo irak’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 19.1-5
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany dia maty ny mpanjakan’ny taranak’i Amona ka i Hanona zanany no nanjaka nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy i Davida: Hanisy soa an’i Hanona, zanak’i Nahasy, aho, toy ny soa nataon’ny rainy tamiko. Ary naniraka ny mpanompony i Davida mba hitsapa alahelo azy ny amin’ny rainy. Dia tonga tany amin’ny tanin’ny taranak’i Amona ny mpanompon’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy anefa ireo mpanapaka ny taranak’i Amona tamin’i Hanona tompony: Moa heverinao ho fanajana ny rainao va no anirahan’i Davida olona hitsapa alahelo anao? Moa tsy hizaha ny tanàna sy hisafo azy ary handrava azy va no nanirahan’i Davida ireo mpanompony ireo hankaty aminao? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nosamborin’i Hanona ny mpanompon’i Davida ka noharatany ny ila somony sady notapahiny hatreo amin’ny foto-peny ny akanjony; dia nalefany hody izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nisy lasa nanambara izany tamin’i Davida ka nandefa iraka izy hitsena azy ireo satria afa-baraka loatra ireo lehilahy ireo; ary hoy ny tenin’ny mpanjaka: Mitoera any Jeriko aloha ambara-panirin’ny somotrareo, amin’izay vao mody ianareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ady tamin’ny Amonita sy ny Arameana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 19.6-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony hitan’ny taranak’i Amona fa tonga mangidy hoditra eo anatrehan’i Davida izy dia nanakarama ny Arameana any Bety-Rehoba sy ny Arameana any Zoba izy, dia miaramila an-tongotra roa alina, ary olona arivo lahy tamin’ny mpanjakan’i Maka, ary roa arivo sy iray alina tamin’ny olona tany Toba. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nony ren’i Davida izany dia naniraka an’i Joaba sy ny miaramila rehetra izy, dia ny lehilahy mahery. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nivoaka hiady ny taranak’i Amona ka nilahatra teo anoloan’ny vavahady; ary ny Arameana avy any Zoba sy Rehoba sy ny olona avy tany Toba ary Maka kosa dia nitokana teny an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa hitan’i Joaba fa teo anoloany sady teo aorianany ny fahavalo dia nifidy olona tamin’ireo voafantina tamin’ny Israely rehetra izy ka nalahany hiady tamin’ny Arameana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny olona sisa kosa dia nomeny hoentin’i Abisay rahalahiny mba halahany hiady amin’ny taranak’i Amona. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy izy: Raha tsy tohako ny Arameana dia vonjeo aho; fa raha tsy tohanao kosa ny taranak’i Amona dia hovonjeko ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mahereza ary, koa aoka hitomban-dahy isika ho an’ny firenentsika sy ny tanànan’Andriamanitsika; ary aoka NY TOMPO hanao izay sitrapony. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nandroso hiady tamin’ny Arameana i Joaba sy ny olona nanaraka azy ka nandositra niala teo anoloany ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nony hitan’ny taranak’i Amona fa nandositra ny Arameana dia mba nandositra niala teo anoloan’i Abisay koa izy ka niditra tao an-tanàna. Ary niverina avy namely ny taranak’i Amona i Joaba ka tonga tany Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony hitan’ny Arameana fa resy teo anoloan’ny Israely izy dia nivory izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nandefa iraka haka ny Arameana izay tany andafin’ny ony Eofrata i Hadadezera ka tonga tany Helama izy ireo. I Sobaka, komandin’ny miaramilan’i Hadadezera, no nitarika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nony nambara tamin’i Davida izany dia nampamory ny Israely rehetra izy ka lasa nita an’i Jordana dia tonga tany Helama. Ary nilahatra hiady amin’i Davida ny Arameana ka rafitra ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vaky nandositra teo anoloan’ny Israely ny Arameana. Nahafaty fitonjato an-kalesy fitondra miady sy efatra alina an-tsoavaly tamin’ny Arameana i Davida sady namely an’i Sobaka koa, ilay komandin’ny miaramila, ka nahafaty azy teo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nony hitan’ny mpanjaka rehetra izay nanoa an’i Hadadezera fa resy teo anoloan’ny Israely izy dia nanao fihavanana tamin’ny Israely izy ireo ka nanompo azy. Dia natahotra ny Arameana ka tsy nety namonjy ny taranak’i Amona intsony.
