document_id: PRO.16
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny fikasan’ny fo no an’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny famalian’ny lela dia avy amin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ataon’ny olona ho madio avokoa ny lalana rehetra alehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO no mandanja ny fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ankino amin’NY TOMPO ny asanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tanteraka izay nokasainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny zavatra rehetra nataon’NY TOMPO dia samy misy antony avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny ratsy fanahy koa aza dia nataony ho amin’ny andro hahitan-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fahavetavetana eo imason’NY TOMPO izay rehetra miavonavona am-po;
- type: usfm
  marker: q1
  children:
  - type: text
    text: azo antoka fa tsy ho afa-tsiny izy ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny famindrampo sy ny fahamarinana no avotra amin’ny heloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahatahorana NY TOMPO no analavirana ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha sitraky NY TOMPO ny alehan’ny olona iray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia ny fahavalony aza dia hampihavaniny aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aleo ny kely omban’ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay ny tombony be azo amin’ny tsy rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny fon’ny olona dia mihevitra tsara ny halehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO ihany no mahalavorary ny diany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Momba ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny teny marina dia eo amin’ny molotry ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy diso teny izy raha mitsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: An’NY TOMPO ny fandanjana sy ny mizana marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: andraikiny avokoa ny vatomizana rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fahavetavetana eo imason’ny mpanjaka ny fanaovan-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa fahamarinana no iorenan’ny sezafiandrianana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sitraky ny mpanjaka ny molotra marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay miteny mahitsy no tiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fahatezeran’ny mpanjaka dia iraky ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olon-kendry no mampionona izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Amin’ny fahamiramiranan’ny tarehin’ny mpanjaka dia misy fiainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fankasitrahany dia toy ny rahona amin’ny fararano.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiainana mikasika ny fiarahamonina sy mikasika ny fitondrantena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsara ny mahazo fahendrena noho ny mahazo volamena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsara ny mahazo fahalalana noho ny mahazo volafotsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny manalavitra ny ratsy no lalamben’ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mitandrina ny alehany no miaro ny ainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny fiavonavonana dia mialoha ny fahapotehana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanahy mirehareha dia mialoha ny fahalavoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsara ny mietry miaraka amin’izay manetry tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny mizara babo amin’izay miavonavona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay mandinika ny teny no hahita soa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay matoky NY TOMPO no ho sambatra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay hendry am-po dia lazaina hoe manan-tsaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny teny mamy no mampandroso ny fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Loharanon’aina ny fahazavan-tsaina amin’izay manana izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fananarana ataon’ny adala dia fahadalana ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny fon’ny hendry dia mahafehy ny fiteniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manampy fahendrena eo amin’ny molony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Toho-tantely ny teny mahafinaritra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka sady mamin’ny fanahy no fanasitranana ho an’ny taolana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Misy lalana ataon’ny olona ho mahitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo ny iafarany dia lalana mivarina any amin’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny fahanoanan’ny mpiasa no mampiasa azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manery azy ny fahazotoany hihinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mihady lavaka hampidi-doza ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady misy toy ny afo mandoro eo amin’ny molony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mamafy fifandirana ny mpivadika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampisaraka ny tena mpisakaiza ny mpifosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny olon-doza dia mitaona ny namany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitarika azy amin’ny lalana tsy tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Izay manakimpy ny masony hieritreritra zava-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manaikitraiki-molotra dia efa manatanteraka ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Satroboninahitra tsara tarehy ny volo fotsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny lalan’ny fahamarinana no ahazoana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tsara ny olona mahatsindry fo noho ny mpiady mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mahafehy ny fahatezerany noho izay mahafa-bohitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny antsapaka dia atsipy ao ampofoany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fitsarana rehetra dia avy amin’NY TOMPO.
