document_id: PRO.16,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ny fikasan’ny fo no an’ny olona,
  - type: text
    content: fa ny famalian’ny lela dia avy amin’NY TOMPO.
  '10':
  - type: text
    content: Ny teny marina dia eo amin’ny molotry ny mpanjaka
  - type: text
    content: ary tsy diso teny izy raha mitsara.
  '11':
  - type: text
    content: An’NY TOMPO ny fandanjana sy ny mizana marina,
  - type: text
    content: andraikiny avokoa ny vatomizana rehetra.
  '12':
  - type: text
    content: Fahavetavetana eo imason’ny mpanjaka ny fanaovan-dratsy,
  - type: text
    content: fa fahamarinana no iorenan’ny sezafiandrianana.
  '13':
  - type: text
    content: Sitraky ny mpanjaka ny molotra marina
  - type: text
    content: ary izay miteny mahitsy no tiany.
  '14':
  - type: text
    content: Ny fahatezeran’ny mpanjaka dia iraky ny fahafatesana,
  - type: text
    content: fa ny olon-kendry no mampionona izany.
  '15':
  - type: text
    content: Amin’ny fahamiramiranan’ny tarehin’ny mpanjaka dia misy fiainana,
  - type: text
    content: ary ny fankasitrahany dia toy ny rahona amin’ny fararano.
  - type: heading
    content: Ny fiainana mikasika ny fiarahamonina sy mikasika ny fitondrantena
  '16':
  - type: text
    content: Tsara ny mahazo fahendrena noho ny mahazo volamena
  - type: text
    content: ary tsara ny mahazo fahalalana noho ny mahazo volafotsy.
  '17':
  - type: text
    content: Ny manalavitra ny ratsy no lalamben’ny marina
  - type: text
    content: ary izay mitandrina ny alehany no miaro ny ainy.
  '18':
  - type: text
    content: Ny fiavonavonana dia mialoha ny fahapotehana
  - type: text
    content: ary ny fanahy mirehareha dia mialoha ny fahalavoana.
  '19':
  - type: text
    content: Tsara ny mietry miaraka amin’izay manetry tena
  - type: text
    content: noho ny mizara babo amin’izay miavonavona.
  '2':
  - type: text
    content: Ataon’ny olona ho madio avokoa ny lalana rehetra alehany,
  - type: text
    content: fa NY TOMPO no mandanja ny fanahy.
  '20':
  - type: text
    content: Izay mandinika ny teny no hahita soa
  - type: text
    content: ary izay matoky NY TOMPO no ho sambatra!
  '21':
  - type: text
    content: Izay hendry am-po dia lazaina hoe manan-tsaina
  - type: text
    content: ary ny teny mamy no mampandroso ny fahalalana.
  '22':
  - type: text
    content: Loharanon’aina ny fahazavan-tsaina amin’izay manana izany,
  - type: text
    content: fa ny fananarana ataon’ny adala dia fahadalana ihany.
  '23':
  - type: text
    content: Ny fon’ny hendry dia mahafehy ny fiteniny
  - type: text
    content: sady manampy fahendrena eo amin’ny molony.
  '24':
  - type: text
    content: Toho-tantely ny teny mahafinaritra
  - type: text
    content: ka sady mamin’ny fanahy no fanasitranana ho an’ny taolana.
  '25':
  - type: text
    content: Misy lalana ataon’ny olona ho mahitsy,
  - type: text
    content: kanjo ny iafarany dia lalana mivarina any amin’ny fahafatesana.
  '26':
  - type: text
    content: Ny fahanoanan’ny mpiasa no mampiasa azy;
  - type: text
    content: manery azy ny fahazotoany hihinana.
  '27':
  - type: text
    content: Mihady lavaka hampidi-doza ny ratsy fanahy
  - type: text
    content: sady misy toy ny afo mandoro eo amin’ny molony.
  '28':
  - type: text
    content: Mamafy fifandirana ny mpivadika
  - type: text
    content: ary mampisaraka ny tena mpisakaiza ny mpifosa.
  '29':
  - type: text
    content: Ny olon-doza dia mitaona ny namany
  - type: text
    content: ka mitarika azy amin’ny lalana tsy tsara.
  '3':
  - type: text
    content: Ankino amin’NY TOMPO ny asanao
  - type: text
    content: dia ho tanteraka izay nokasainao.
  '30':
  - type: text
    content: Izay manakimpy ny masony hieritreritra zava-dratsy
  - type: text
    content: sady manaikitraiki-molotra dia efa manatanteraka ny ratsy.
  '31':
  - type: text
    content: Satroboninahitra tsara tarehy ny volo fotsy;
  - type: text
    content: eo amin’ny lalan’ny fahamarinana no ahazoana azy.
  '32':
  - type: text
    content: Tsara ny olona mahatsindry fo noho ny mpiady mahery
  - type: text
    content: ary izay mahafehy ny fahatezerany noho izay mahafa-bohitra.
  '33':
  - type: text
    content: Ny antsapaka dia atsipy ao ampofoany,
  - type: text
    content: fa ny fitsarana rehetra dia avy amin’NY TOMPO.
  '4':
  - type: text
    content: Ny zavatra rehetra nataon’NY TOMPO dia samy misy antony avokoa;
  - type: text
    content: eny, ny ratsy fanahy koa aza dia nataony ho amin’ny andro hahitan-doza.
  '5':
  - type: text
    content: Fahavetavetana eo imason’NY TOMPO izay rehetra miavonavona am-po;
  - type: text
    content: azo antoka fa tsy ho afa-tsiny izy ireo.
  '6':
  - type: text
    content: Ny famindrampo sy ny fahamarinana no avotra amin’ny heloka,
  - type: text
    content: ary ny fahatahorana NY TOMPO no analavirana ny ratsy.
  '7':
  - type: text
    content: Raha sitraky NY TOMPO ny alehan’ny olona iray,
  - type: text
    content: na dia ny fahavalony aza dia hampihavaniny aminy.
  '8':
  - type: text
    content: Aleo ny kely omban’ny fahamarinana
  - type: text
    content: toy izay ny tombony be azo amin’ny tsy rariny.
  '9':
  - type: text
    content: Ny fon’ny olona dia mihevitra tsara ny halehany,
  - type: text
    content: fa NY TOMPO ihany no mahalavorary ny diany.
  - type: heading
    content: Momba ny mpanjaka
