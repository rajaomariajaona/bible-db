document_id: LEV.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsipika momba ny mpisorona
    marker-yv: yv-h
  - type: usfm
    marker: s3
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny fanatitra dorana manontolo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tsy hasiana masirasira izany rehefa hendasina fa efa nomeko ho anjarany avy amin’ny fanatitra levonina amin’ny afo ho Ahy. Zavatra tena masina izany, tahaka ny fanatitra fanadiovana sy tahaka ny fanati-panonerana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny lehilahy rehetra amin’ny zanak’i Arona no mahazo mihinana azy io. Ho anjara maharitra ho an’ny taranakareo fara aman-dimby avy amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO izany, ary ho masina izay rehetra mikasika azy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izao no fanatitr’i Arona sy ireo zanany, hateriny ho an’NY TOMPO amin’izay andro anosorana azy: Koba tsara toto ampahafolon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efaha
    - type: text
      text: ' no hatao fanatitra avy amin’ny zavamaniry isanandro ka ny antsasany amin’ny maraina ary ny antsasany amin’ny hariva. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Amin’ny lapoaly no hanaovana azy ka asiana diloilo; rehefa mifangaro tsara izy dia ento; voaendy sady voavakivaky toy ny fanatitra avy amin’ny zavamaniry no hanateranao azy ho hanitra ankasitrahana ho an’NY TOMPO. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ilay mpisorona avy amin’ireo zanany izay voahosotra handimby azy no hanatanteraka izany. Lalàna maharitra izany ka hodorana ho fofona avokoa ho an’NY TOMPO. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Eny, ny fanatitra avy amin’ny zavamaniry rehetra izay aterin’ny mpisorona dia hodorana avokoa fa tsy hohanina.
  - type: usfm
    marker: s3
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny fanatitra fanadiovana
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mitenena amin’i Arona sy ireo zanany hoe: Izao no lalàna ny amin’ny fanatitra fanadiovana: Eo amin’ny toerana famonoana ny fanatitra dorana manontolo no hamonoana eo anatrehan’NY TOMPO ny fanatitra fanadiovana. Zavatra tena masina izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ilay mpisorona manao ny fanatitra fanadiovana no hihinana azy; eo amin’izay fitoerana masina no hihinanany azy, eo amin’ny kianjan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mandidia an’i Arona sy ireo zanany hoe: Izao no lalàna momba ny fanatitra dorana manontolo: Ny fanatitra dorana manontolo dia hatao eo amin’ny fatana eo an-tampon’ny alitara mandritra ny alina mandra-maraina ary ny afon’ny alitara dia hirehitra eo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ho masina izay rehetra mikasika ny henany, ary raha misy fitafiana ipitihan’ny rany dia hosasanao eo amin’izay fitoerana masina ny faritra nipitihany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ny vilany tany izay nahandroana azy dia hovakivakina; nefa raha vilany varahina kosa no nahandroana azy dia hofotsina sy hosasana amin’ny rano izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny lehilahy rehetra amin’ny mpisorona no mahazo mihinana azy. Zavatra tena masina izany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Koa ny fanatitra fanadiovana izay hakana ra hoentina ao amin’ny tranolay fihaonana, hanaovana fanavotana ao amin’ny fitoerana masina, dia tsy hohanina fa hodorana amin’ny afo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary hanaovan’ny mpisorona ny akanjony vita amin’ny lamba rongony, ary ny kalisaonina vita amin’ny lamba rongony dia hataony manolo-koditra; ary handraoka ny lavenona avy amin’ny fanatitra dorana manontolo izay nolevonin’ny afo teo ambonin’ny alitara izy ka hametraka azy eo anilan’ny alitara. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hanala ny fitafiany izy ary hitafy fitafiana hafa ka hamoaka ny lavenona ho eny ivelan’ny toby amin’izay toerana madio. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny afo eo ambonin’ny alitara dia hirehitra ka tsy havela ho faty, fa hotohofan’ny mpisorona kitay hazo isa-maraina; halahany eo amboniny ny fanatitra dorana manontolo ka hodorany ho fofona eo amboniny ny jaboran’ny fanati-pihavanana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hisy afo mirehitra mandrakariva eo ambonin’ny alitara fa tsy havela ho faty.
  - type: usfm
    marker: s3
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny fanatitra avy amin’ny zavamaniry
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Izao no lalàna ny amin’ny fanatitra avy amin’ny zavamaniry: Ireo zanak’i Arona no hanatitra azy eo anatrehan’NY TOMPO eo anoloan’ny alitara. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hakany eran’ny tanana ila ny koba tsara toto amin’ny fanatitra avy amin’ny zavamaniry, ny diloilo sy ny ditin-kazo manitra rehetra miaraka amin’ny fanatitra avy amin’ny zavamaniry, dia hodorany hanetroka eo ambonin’ny alitara izany fanati-pahatsiarovana izany ho hanitra ankasitrahana ho an’NY TOMPO. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izay sisa amin’izany dia hohanin’i Arona sy ireo zanany; hataony tsy misy masirasira izany ary eo amin’ny fitoerana masina iray ao anatin’ny kianjan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ' no hihinanany azy. '
