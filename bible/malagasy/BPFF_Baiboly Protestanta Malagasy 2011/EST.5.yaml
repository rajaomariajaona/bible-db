document_id: EST.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanatona ny mpanjaka i Estera
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tamin’ny andro fahatelo dia nanao akanjo fiandrianana i Estera ka nitsangana teo amin’ny kianja anatiny amin’ny tranon’ny mpanjaka, teo anoloan’ny tranon’ny mpanjaka, ary ny mpanjaka dia nipetraka teo ambonin’ny sezafiandrianan’ny fanjakana tao an-dapa, tandrifin’ny vavahadin’ny trano. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanindry fo ihany anefa i Hamana ka lasa nody tany an-tranony aloha. Dia naniraka olona haka ny sakaizany sy i Zaresy vadiny izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notanisain’i Hamana tamin’ireo ny haben’ny harenany sy ny hamaroan’ny zanany mbamin’izay voninahitra rehetra nomen’ny mpanjaka azy sy ny nanandratany azy ho ambony noho ny mpitondra sy ny mpanompon’ny mpanjaka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa i Hamana: E! I Estera, vadin’ny mpanjaka, aza dia tsy naka olona afa-tsy izaho ihany hiaraka amin’ny mpanjaka ho amin’ny fanasana izay namboariny sady nasainy hiaraka amin’ny mpanjaka koa aho rahampitso. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa na izany rehetra izany aza dia tsy mbola afa-po aho raha mahita an’i Mordekay jiosy mipetraka eo am-bavahadin’ny mpanjaka. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Zaresy vadiny sy ny sakaizany rehetra taminy: Asaivo misy manangana hazo, koa dimampolo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny haavony; ary rahampitso maraina dia lazao amin’ny mpanjaka mba hahantona eo i Mordekay. Koa mandehana miaraka amin’ny mpanjaka amin’ny hafaliana ho any amin’ny fanasana ianao. Ary sitrak’i Hamana izany zavatra izany ka nampanangana ilay hazo izy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitan’ny mpanjaka fa indro i Estera vadin’ny mpanjaka, nitsangana teo an-kianja, dia nahita fitia teo imasony izy. Ary nanondro an’i Estera tamin’ny tehina volamena izay teny an-tanany ny mpanjaka. Dia nanatona kosa i Estera ka nikasika ny tendron’ny tehina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka taminy: Inona no angatahinao, ry Estera, vadin’ny mpanjaka, ary inona no tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakana aza dia homena anao izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly i Estera hoe: Raha sitraky ny mpanjaka dia aoka ny mpanjaka sy i Hamana ho tonga anio amin’ny fanasana izay efa namboariko ho azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka: Asaivo manatanteraka haingana ny tenin’i Estera i Hamana. Ary ny mpanjaka sy i Hamana dia tonga tao amin’ny fanasana izay efa namboarin’i Estera. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’i Estera teo am-pisotroan-divay: Inona no angatahinao? Fa homena anao izany. Ary inona no tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakana aza dia homena izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly i Estera hoe: Izao no angatahiko sy tadiaviko: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mahita fitia eto imason’ny mpanjaka aho ka sitraky ny mpanjaka ny hanome izay angatahiko sy hanatanteraka izay tadiaviko dia aoka ny mpanjaka sy i Hamana ho tonga amin’ny fanasana izay hamboariko ho azy indray rahampitso, dia hanatanteraka ny tenin’ny mpanjaka ihany aho.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manangana hazo hanantonana an’i Mordekay i Hamana
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka ny trano tamin’izany andro izany i Hamana sady faly sy ravoravo ny fony. Nefa rehefa nahita an’i Mordekay teo am-bavahadin’ny mpanjaka izy dia feno hatezerana taminy satria tsy mba nitsangana na nihetsika hitsaoka azy akory i Mordekay. '
