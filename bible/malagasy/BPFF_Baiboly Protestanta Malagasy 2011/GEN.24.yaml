document_id: GEN.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nitadiavana vady Isaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Efa niha zokiolona i Abrahama sady nandroso fahanterana, ary NY TOMPO nitahy an’i Abrahama tamin’ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy i Abrahama tamin’ilay lehiben’ny mpanompony tao an-tranony izay mpanapaka ny fananany rehetra: Mba ataovy ato ambanin’ny feko ny tananao, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa hampianianiko amin’NY TOMPO, Andriamanitry ny lanitra sy ny tany, ianao mba tsy haka vady ho an’ny zanako avy amin’ny zanakavavin’ny Kananita izay iraisako monina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa any amin’ny tanindrazako sy any amin’ny havako no halehanao haka vady ho an’Isaka zanako. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ilay mpanompony taminy: Angamba tsy hety hanaraka ahy hankaty amin’ity tany ity Ravehivavy ka moa va hoentiko miverina any amin’ny tany izay nialanao ny zanakao? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy i Abrahama taminy: Tandremo mba tsy hoentinao miverina any ny zanako! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'NY TOMPO, Andriamanitry ny lanitra, izay naka ahy niala tamin’ny tranon’ny raiko sy tamin’ny tany nahaterahako, sady niteny tamiko sy nianiana tamiko hoe: Ny taranakao no homeko ity tany ity, Izy no haniraka ilay Anjeliny eo alohanao ka any no hakanao vady ho an’ny zanako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha tsy mety manaraka anao Ravehivavy dia afaka amin’izao fampianianako anao izao ianao. Fa izao ihany: Aza entinao miverina any mihitsy ny zanako. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nataon’ilay mpanompo tao ambanin’ny fen’i Abrahama tompony ny tanany ka nianiana taminy ny amin’izany zavatra izany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia naka rameva folo tamin’ny ramevan’ny tompony ilay mpanompo, ary izay zava-tsoa nananan’ny tompony dia samy nitondrany avokoa. Dia nandeha izy ka nankany Arama-Naharaima, ho any an-tanànan’i Nahora. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nampandohalehiny teo ivelan’ny tanàna teo akaikin’ny lavaka fantsakan-drano ireo rameva, nony harivariva ny andro, dia amin’ilay fotoana fandehanan’ny vehivavy mantsaka iny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy izy: Ry TOMPO, Andriamanitr’i Abrahama tompoko ô! Ambino aho anio ary asio soa i Abrahama tompoko! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Indro, mijoro eto anilan’ny fantsakana aho ary ho avy hantsaka rano ny zanakavavin’ny mponina ao an-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa izay zazavavy hilazako hoe: Mba atongilano kely ny sininao hisotroako ka hamaly hoe: Misotroa, sady hampisotro ny ramevanao koa aho, dia izy ihany no aoka ho voatendrinao ho an’Isaka mpanomponao. Izany no hahafantarako fa nasianao soa ny tompoko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha mbola tsy tapitra ny teniny dia indro, tamy i Rebeka izay naterak’i Betoela, zanakalahin’i Milka, vadin’i Nahora, rahalahin’i Abrahama, nilanja ny sininy teny an-tsorony. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsara tarehy tokoa ilay zazavavy sady virijiny fa tsy mbola nisy lehilahy nahalala azy. Nidina nankeo amin’ny fantsakana izy ka nameno ny sininy, dia niakatra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nihazakazaka nitsena azy ilay mpanompo ka niteny taminy hoe: Mba ampisotroy rano kely avy amin’ny sininao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy Razazavavy: Misotroa, tompokolahy! Sady nampidininy haingana ho eo amin’ny tanany ny sininy ka nampisotroiny Ralehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rehefa avy nampisotro azy izy dia niteny koa hoe: Andeha hantsakako koa ny ramevanao mba hisotroany mandra-pahatapi-misotro azy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia naidiny haingana ny rano tao an-tsininy ho ao amin’ny fampisotroana ny biby ka nihazakazaka indray izy nankeo amin’ny lavaka fantsakana hanovo rano ary nantsaka ho an’ireo ramevany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nandinika azy tsara Ralehilahy sady nangina mba hahafantarany na nambinin’NY TOMPO ny diany na tsia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa tapitra nisotro avokoa ny rameva dia nalain-dRalehilahy ny kavin’orona volamena iray, milanja antsasaky ny sekela, sy haba fehin-tanana volamena roa, milanja sekela folo '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ka hoy izy: Mba lazao amiko, zanak’iza moa ianao? Ary moa misy azonay hatoriana va ao an-tranon’ny rainao? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy Razazavavy taminy: Zanakavavin’i Betoela, ilay zanakalahin’i Milka, izay naterany tamin’i Nahora aho. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hoy koa izy taminy: Na ny mololo na ny vilona dia samy betsaka ao aminay, sady misy trano hatorianareo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia niondrika Ralehilahy ka niankohoka teo anatrehan’NY TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'sady niteny hoe: Isaorana anie NY TOMPO, Andriamanitr’i Abrahama tompoko, izay tsy nanaisotra ny famindrampony sy ny fahamarinany tamin’ny tompoko! Fa notantanan’NY TOMPO teny an-dalana aho ho atỳ an-tranon’ny havan’ny tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia lasa nihazakazaka Razazavavy ka nanambara araka izany teny izany tamin’ny tao an-tranon’ny reniny. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary i Rebeka dia nanana anadahy, Labana no anarany. Nihazakazaka i Labana nankeo amin-dRalehilahy teo ivelany, teo am-pantsakana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Rehefa hitany ny kavin’orona sy ny haba fehin-tanana teny amin’ny anabaviny, sady reny ny tenin’i Rebeka anabaviny hoe: Izany no nolazain-dRalehilahy tamiko, dia nankeo amin-dRalehilahy izy; ary indro, mbola nijoro teo akaikin’ny rameva teo am-pantsakana Ralehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia hoy i Labana: Mandrosoa, ry ilay notahin’NY TOMPO! Nahoana no mijanona atỳ ivelany ianao? Fa efa nanamboatra ny trano sy izay hitoeran’ny rameva aho. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia niditra tao an-trano Ralehilahy; ary novahan’i Labana ny entana tamin’ny rameva ka nomeny mololo sy vilona ny rameva sady nomeny rano hanasana ny tongony sy ny tongotr’ireo olona izay niaraka taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Avy eo dia narosony teo anoloany ny sakafo. Kanefa hoy Ralehilahy: Tsy mbola hisakafo aho raha tsy efa voalazako ny anton-diako. Ary hoy i Labana: Lazao ary!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy Ralehilahy: Mpanompon’i Abrahama aho. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary NY TOMPO nitahy indrindra ny tompoko ka efa tonga be ny fananany; Izy no nanome azy ondry aman’osy, omby, volafotsy, volamena, mpanompolahy sy mpanompovavy, ary rameva sy boriky maro. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Rehefa antitra i Saraha, vadin’ny tompoko, dia niteraka zazalahy tamin’ny tompoko izy, ary efa natolotry ny tompoko ho an’ny zanany izay rehetra ananany. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nampianiana ahy ny tompoko ka niteny hoe: Aza maka vady ho an’ny zanako avy amin’ny zanakavavin’ny Kananita, izay iraisako monina, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'fa any amin’ny tranon’Ikaky sy any amin’ny havako no halehanao ka hakanao vady ho an’ny zanako. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary hoy aho tamin’ny tompoko: Angamba tsy hety hanaraka ahy Ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia hoy izy tamiko: NY TOMPO, izay eo anoloako amin’izay alehako, dia haniraka Ilay Anjeliny homba anao sy hanambina ny dianao ka haka vady ho an’ny zanako avy amin’ny havako sy avy amin’ny fianakaviako ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia ho afaka amin’ny fampianianako anao ianao, raha tonga any amin’ny havako; ary raha tsy manome anao ry zareo dia ho afaka amin’ny fampianianako anao koa ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary androany aho dia tonga teo amin’ny fantsakana ka hoy aho: Ry TOMPO, Andriamanitr’i Abrahama tompoko ô, raha hambininao ny diako, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'indro, mijoro eto akaikin’ny fantsakana aho, koa izay zazavavy avy hantsaka ka hilazako hoe: Mba ampisotroy rano kely avy amin’ny sininao aho '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'ka hamaly hoe: Misotroa, ary hantsakako koa ny ramevanao, dia aoka izy no ho vehivavy voatendrin’NY TOMPO ho an’ny zanakalahin’ny tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Raha tsy mbola nitsahatra niteny anakampo aho dia indro tamy i Rebeka nilanja ny sininy teny an-tsorony, dia nidina nankeo amin’ny fantsakana izy ka nantsaka. Dia hoy aho taminy: Mba ampisotroy rano kely aho. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia nampidininy haingana ny sininy hiala teo an-tsorony ka hoy izy: Misotroa, ary hampisotroiko koa ny ramevanao! Dia nisotro aho ary nampisotro ny rameva koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Dia nanontany azy aho hoe: Zanak’iza moa ianao? Hoy izy: Zanak’i Betoela, zanakalahin’i Nahora, izay naterak’i Milka taminy. Dia nataoko teo amin’ny orony ny kavina ary teny amin’ny tanany ny haba. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia niondrika aho ka niankohoka teo anatrehan’NY TOMPO ary nisaotra NY TOMPO, Andriamanitr’i Abrahama tompoko, izay nitondra ahy tamin’ny lalana marina haka ny zanakavavin’ny rahalahin’ny tompoko, ho an’ny zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Koa ankehitriny, lazao amiko raha hanao izay soa sy marina amin’ny tompoko ianareo. Fa raha tsy izany kosa, dia lazao amiko, mba hiviliako na ho amin’ny ankavanana, na ho amin’ny ankavia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Dia namaly i Labana sy i Betoela hoe: Avy tamin’NY TOMPO no nisehoan’izany zavatra izany ka tsy mahazo milaza na inona na inona aminao izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Indro, eto anatrehanao i Rebeka; ento izy ka mandehana; ary aoka ho vadin’ny zanaky ny tomponao izy, araka izay nolazain’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Rehefa nandre ny tenin-dry zareo ilay mpanompon’i Abrahama dia niankohoka tamin’ny tany teo anatrehan’NY TOMPO izy. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary namoaka firavaka volafotsy sy firavaka volamena ary fitafiana ilay mpanompo ka nomeny an’i Rebeka; nomeny fanomezana sarobidy koa ny anadahiny sy ny reniny. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Dia izay vao nihinana sy nisotro izy mbamin’ireo lehilahy izay nomba azy, dia natory. Ary nifoha maraina izy ka niteny hoe: Avelao aho handeha ho any amin’ny tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Fa hoy ny anadahin’i Rebeka sy ny reniny: Aoka hitoetra atỳ aminay andro vitsivitsy Razazavavy na dia hafoloana ihany aza; aorianan’izay dia handeha izy. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Hoy anefa Ralehilahy taminy: Aza tananareo aho fa efa nanambina ny diako NY TOMPO; avelao aho mba handeha hankany amin’ny tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary hoy izy ireo: Aoka ary hantsoinay Razazavavy ka hanontanianay izay heviny. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Dia niantso an’i Rebeka izy ireo ka niteny taminy hoe: Handeha hiaraka amin’io lehilahy io va ianao? Dia hoy Razazavavy: Handeha aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Dia navelany handeha i Rebeka anabaviny sy ny mpitaiza azy ary ilay mpanompon’i Abrahama mbamin’ireo olony. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Nitsodrano an’i Rebeka izy ireo ka niteny taminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry anabavinay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tonga arivoarivo sy alinalina anie ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny taranakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahazo ny tanànan’ny fahavalony!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Dia niainga i Rebeka niaraka tamin’ireo mpanompovaviny ka nitaingina ny rameva, dia nanaraka an-dRalehilahy. Nitondra an’i Rebeka ilay mpanompo ka lasa nandeha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ary Isaka dia tonga avy tamin’izay nalehany tany Bera-Lahay-Roỳ. Fa nonina tany amin’ny tany Negeva izy. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Nony harivariva ny andro dia lasa tany an-tsaha Isaka mba hieritreritra, ary nitazana izy ka nahita fa indreny nisy rameva avy manatona. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ary nitazana koa i Rebeka ka nahita an’Isaka; dia nidina haingana niala tamin’ny rameva izy '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'sady niteny tamin’ilay mpanompo hoe: Iza moa irỳ lehilahy mitsangantsangana eny an-tsaha avy mitsena antsika irỳ? Ary hoy ilay mpanompo: Iny no tompoko. Dia nandray ny voaliny i Rebeka mba hanafenany ny tarehiny. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Dia nambaran’ilay mpanompo tamin’Isaka ny zavatra rehetra izay nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Ary nampandroso an’i Rebeka ho ao an-dain’i Saraha reniny Isaka ka nampakatra azy ho vadiny. Tia azy izy ka nionona ny alahelony ny reniny.
