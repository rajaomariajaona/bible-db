document_id: GEN.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nitadiavana vady Isaka
  - type: text
    content: 'Efa niha zokiolona i Abrahama sady nandroso fahanterana, ary NY TOMPO nitahy an’i Abrahama tamin’ny zavatra rehetra. '
  '10':
  - type: text
    content: 'Dia naka rameva folo tamin’ny ramevan’ny tompony ilay mpanompo, ary izay zava-tsoa nananan’ny tompony dia samy nitondrany avokoa. Dia nandeha izy ka nankany Arama-Naharaima, ho any an-tanànan’i Nahora. '
  '11':
  - type: text
    content: Nampandohalehiny teo ivelan’ny tanàna teo akaikin’ny lavaka fantsakan-drano ireo rameva, nony harivariva ny andro, dia amin’ilay fotoana fandehanan’ny vehivavy mantsaka iny.
  '12':
  - type: text
    content: 'Dia hoy izy: Ry TOMPO, Andriamanitr’i Abrahama tompoko ô! Ambino aho anio ary asio soa i Abrahama tompoko! '
  '13':
  - type: text
    content: 'Indro, mijoro eto anilan’ny fantsakana aho ary ho avy hantsaka rano ny zanakavavin’ny mponina ao an-tanàna. '
  '14':
  - type: text
    content: 'Koa izay zazavavy hilazako hoe: Mba atongilano kely ny sininao hisotroako ka hamaly hoe: Misotroa, sady hampisotro ny ramevanao koa aho, dia izy ihany no aoka ho voatendrinao ho an’Isaka mpanomponao. Izany no hahafantarako fa nasianao soa ny tompoko.'
  '15':
  - type: text
    content: 'Raha mbola tsy tapitra ny teniny dia indro, tamy i Rebeka izay naterak’i Betoela, zanakalahin’i Milka, vadin’i Nahora, rahalahin’i Abrahama, nilanja ny sininy teny an-tsorony. '
  '16':
  - type: text
    content: 'Tsara tarehy tokoa ilay zazavavy sady virijiny fa tsy mbola nisy lehilahy nahalala azy. Nidina nankeo amin’ny fantsakana izy ka nameno ny sininy, dia niakatra. '
  '17':
  - type: text
    content: 'Nihazakazaka nitsena azy ilay mpanompo ka niteny taminy hoe: Mba ampisotroy rano kely avy amin’ny sininao aho. '
  '18':
  - type: text
    content: 'Dia hoy Razazavavy: Misotroa, tompokolahy! Sady nampidininy haingana ho eo amin’ny tanany ny sininy ka nampisotroiny Ralehilahy. '
  '19':
  - type: text
    content: 'Rehefa avy nampisotro azy izy dia niteny koa hoe: Andeha hantsakako koa ny ramevanao mba hisotroany mandra-pahatapi-misotro azy rehetra. '
  '2':
  - type: text
    content: 'Ary hoy i Abrahama tamin’ilay lehiben’ny mpanompony tao an-tranony izay mpanapaka ny fananany rehetra: Mba ataovy ato ambanin’ny feko ny tananao, '
  '20':
  - type: text
    content: 'Dia naidiny haingana ny rano tao an-tsininy ho ao amin’ny fampisotroana ny biby ka nihazakazaka indray izy nankeo amin’ny lavaka fantsakana hanovo rano ary nantsaka ho an’ireo ramevany rehetra. '
  '21':
  - type: text
    content: Nandinika azy tsara Ralehilahy sady nangina mba hahafantarany na nambinin’NY TOMPO ny diany na tsia.
  '22':
  - type: text
    content: 'Rehefa tapitra nisotro avokoa ny rameva dia nalain-dRalehilahy ny kavin’orona volamena iray, milanja antsasaky ny sekela, sy haba fehin-tanana volamena roa, milanja sekela folo '
  '23':
  - type: text
    content: 'ka hoy izy: Mba lazao amiko, zanak’iza moa ianao? Ary moa misy azonay hatoriana va ao an-tranon’ny rainao? '
  '24':
  - type: text
    content: 'Dia hoy Razazavavy taminy: Zanakavavin’i Betoela, ilay zanakalahin’i Milka, izay naterany tamin’i Nahora aho. '
  '25':
  - type: text
    content: 'Hoy koa izy taminy: Na ny mololo na ny vilona dia samy betsaka ao aminay, sady misy trano hatorianareo koa. '
  '26':
  - type: text
    content: 'Dia niondrika Ralehilahy ka niankohoka teo anatrehan’NY TOMPO '
  '27':
  - type: text
    content: 'sady niteny hoe: Isaorana anie NY TOMPO, Andriamanitr’i Abrahama tompoko, izay tsy nanaisotra ny famindrampony sy ny fahamarinany tamin’ny tompoko! Fa notantanan’NY TOMPO teny an-dalana aho ho atỳ an-tranon’ny havan’ny tompoko. '
  '28':
  - type: text
    content: 'Dia lasa nihazakazaka Razazavavy ka nanambara araka izany teny izany tamin’ny tao an-tranon’ny reniny. '
  '29':
  - type: text
    content: 'Ary i Rebeka dia nanana anadahy, Labana no anarany. Nihazakazaka i Labana nankeo amin-dRalehilahy teo ivelany, teo am-pantsakana. '
  '3':
  - type: text
    content: 'fa hampianianiko amin’NY TOMPO, Andriamanitry ny lanitra sy ny tany, ianao mba tsy haka vady ho an’ny zanako avy amin’ny zanakavavin’ny Kananita izay iraisako monina. '
  '30':
  - type: text
    content: 'Rehefa hitany ny kavin’orona sy ny haba fehin-tanana teny amin’ny anabaviny, sady reny ny tenin’i Rebeka anabaviny hoe: Izany no nolazain-dRalehilahy tamiko, dia nankeo amin-dRalehilahy izy; ary indro, mbola nijoro teo akaikin’ny rameva teo am-pantsakana Ralehilahy. '
  '31':
  - type: text
    content: 'Dia hoy i Labana: Mandrosoa, ry ilay notahin’NY TOMPO! Nahoana no mijanona atỳ ivelany ianao? Fa efa nanamboatra ny trano sy izay hitoeran’ny rameva aho. '
  '32':
  - type: text
    content: 'Dia niditra tao an-trano Ralehilahy; ary novahan’i Labana ny entana tamin’ny rameva ka nomeny mololo sy vilona ny rameva sady nomeny rano hanasana ny tongony sy ny tongotr’ireo olona izay niaraka taminy. '
  '33':
  - type: text
    content: 'Avy eo dia narosony teo anoloany ny sakafo. Kanefa hoy Ralehilahy: Tsy mbola hisakafo aho raha tsy efa voalazako ny anton-diako. Ary hoy i Labana: Lazao ary!'
  '34':
  - type: text
    content: 'Dia hoy Ralehilahy: Mpanompon’i Abrahama aho. '
  '35':
  - type: text
    content: 'Ary NY TOMPO nitahy indrindra ny tompoko ka efa tonga be ny fananany; Izy no nanome azy ondry aman’osy, omby, volafotsy, volamena, mpanompolahy sy mpanompovavy, ary rameva sy boriky maro. '
  '36':
  - type: text
    content: 'Rehefa antitra i Saraha, vadin’ny tompoko, dia niteraka zazalahy tamin’ny tompoko izy, ary efa natolotry ny tompoko ho an’ny zanany izay rehetra ananany. '
  '37':
  - type: text
    content: 'Nampianiana ahy ny tompoko ka niteny hoe: Aza maka vady ho an’ny zanako avy amin’ny zanakavavin’ny Kananita, izay iraisako monina, '
  '38':
  - type: text
    content: 'fa any amin’ny tranon’Ikaky sy any amin’ny havako no halehanao ka hakanao vady ho an’ny zanako. '
  '39':
  - type: text
    content: 'Ary hoy aho tamin’ny tompoko: Angamba tsy hety hanaraka ahy Ravehivavy. '
  '4':
  - type: text
    content: 'Fa any amin’ny tanindrazako sy any amin’ny havako no halehanao haka vady ho an’Isaka zanako. '
  '40':
  - type: text
    content: 'Dia hoy izy tamiko: NY TOMPO, izay eo anoloako amin’izay alehako, dia haniraka Ilay Anjeliny homba anao sy hanambina ny dianao ka haka vady ho an’ny zanako avy amin’ny havako sy avy amin’ny fianakaviako ianao. '
  '41':
  - type: text
    content: 'Dia ho afaka amin’ny fampianianako anao ianao, raha tonga any amin’ny havako; ary raha tsy manome anao ry zareo dia ho afaka amin’ny fampianianako anao koa ianao. '
  '42':
  - type: text
    content: 'Ary androany aho dia tonga teo amin’ny fantsakana ka hoy aho: Ry TOMPO, Andriamanitr’i Abrahama tompoko ô, raha hambininao ny diako, '
  '43':
  - type: text
    content: 'indro, mijoro eto akaikin’ny fantsakana aho, koa izay zazavavy avy hantsaka ka hilazako hoe: Mba ampisotroy rano kely avy amin’ny sininao aho '
  '44':
  - type: text
    content: 'ka hamaly hoe: Misotroa, ary hantsakako koa ny ramevanao, dia aoka izy no ho vehivavy voatendrin’NY TOMPO ho an’ny zanakalahin’ny tompoko. '
  '45':
  - type: text
    content: 'Raha tsy mbola nitsahatra niteny anakampo aho dia indro tamy i Rebeka nilanja ny sininy teny an-tsorony, dia nidina nankeo amin’ny fantsakana izy ka nantsaka. Dia hoy aho taminy: Mba ampisotroy rano kely aho. '
  '46':
  - type: text
    content: 'Dia nampidininy haingana ny sininy hiala teo an-tsorony ka hoy izy: Misotroa, ary hampisotroiko koa ny ramevanao! Dia nisotro aho ary nampisotro ny rameva koa izy. '
  '47':
  - type: text
    content: 'Dia nanontany azy aho hoe: Zanak’iza moa ianao? Hoy izy: Zanak’i Betoela, zanakalahin’i Nahora, izay naterak’i Milka taminy. Dia nataoko teo amin’ny orony ny kavina ary teny amin’ny tanany ny haba. '
  '48':
  - type: text
    content: 'Dia niondrika aho ka niankohoka teo anatrehan’NY TOMPO ary nisaotra NY TOMPO, Andriamanitr’i Abrahama tompoko, izay nitondra ahy tamin’ny lalana marina haka ny zanakavavin’ny rahalahin’ny tompoko, ho an’ny zanany. '
  '49':
  - type: text
    content: Koa ankehitriny, lazao amiko raha hanao izay soa sy marina amin’ny tompoko ianareo. Fa raha tsy izany kosa, dia lazao amiko, mba hiviliako na ho amin’ny ankavanana, na ho amin’ny ankavia.
  '5':
  - type: text
    content: 'Hoy ilay mpanompony taminy: Angamba tsy hety hanaraka ahy hankaty amin’ity tany ity Ravehivavy ka moa va hoentiko miverina any amin’ny tany izay nialanao ny zanakao? '
  '50':
  - type: text
    content: 'Dia namaly i Labana sy i Betoela hoe: Avy tamin’NY TOMPO no nisehoan’izany zavatra izany ka tsy mahazo milaza na inona na inona aminao izahay. '
  '51':
  - type: text
    content: Indro, eto anatrehanao i Rebeka; ento izy ka mandehana; ary aoka ho vadin’ny zanaky ny tomponao izy, araka izay nolazain’NY TOMPO.
  '52':
  - type: text
    content: 'Rehefa nandre ny tenin-dry zareo ilay mpanompon’i Abrahama dia niankohoka tamin’ny tany teo anatrehan’NY TOMPO izy. '
  '53':
  - type: text
    content: 'Ary namoaka firavaka volafotsy sy firavaka volamena ary fitafiana ilay mpanompo ka nomeny an’i Rebeka; nomeny fanomezana sarobidy koa ny anadahiny sy ny reniny. '
  '54':
  - type: text
    content: 'Dia izay vao nihinana sy nisotro izy mbamin’ireo lehilahy izay nomba azy, dia natory. Ary nifoha maraina izy ka niteny hoe: Avelao aho handeha ho any amin’ny tompoko. '
  '55':
  - type: text
    content: 'Fa hoy ny anadahin’i Rebeka sy ny reniny: Aoka hitoetra atỳ aminay andro vitsivitsy Razazavavy na dia hafoloana ihany aza; aorianan’izay dia handeha izy. '
  '56':
  - type: text
    content: 'Hoy anefa Ralehilahy taminy: Aza tananareo aho fa efa nanambina ny diako NY TOMPO; avelao aho mba handeha hankany amin’ny tompoko. '
  '57':
  - type: text
    content: 'Ary hoy izy ireo: Aoka ary hantsoinay Razazavavy ka hanontanianay izay heviny. '
  '58':
  - type: text
    content: 'Dia niantso an’i Rebeka izy ireo ka niteny taminy hoe: Handeha hiaraka amin’io lehilahy io va ianao? Dia hoy Razazavavy: Handeha aho.'
  '59':
  - type: text
    content: 'Dia navelany handeha i Rebeka anabaviny sy ny mpitaiza azy ary ilay mpanompon’i Abrahama mbamin’ireo olony. '
  '6':
  - type: text
    content: 'Dia hoy i Abrahama taminy: Tandremo mba tsy hoentinao miverina any ny zanako! '
  '60':
  - type: text
    content: 'Nitsodrano an’i Rebeka izy ireo ka niteny taminy hoe:'
  - type: text
    content: Ry anabavinay,
  - type: text
    content: ho tonga arivoarivo sy alinalina anie ianao,
  - type: text
    content: ary aoka ny taranakao
  - type: text
    content: hahazo ny tanànan’ny fahavalony!
  '61':
  - type: text
    content: Dia niainga i Rebeka niaraka tamin’ireo mpanompovaviny ka nitaingina ny rameva, dia nanaraka an-dRalehilahy. Nitondra an’i Rebeka ilay mpanompo ka lasa nandeha.
  '62':
  - type: text
    content: 'Ary Isaka dia tonga avy tamin’izay nalehany tany Bera-Lahay-Roỳ. Fa nonina tany amin’ny tany Negeva izy. '
  '63':
  - type: text
    content: 'Nony harivariva ny andro dia lasa tany an-tsaha Isaka mba hieritreritra, ary nitazana izy ka nahita fa indreny nisy rameva avy manatona. '
  '64':
  - type: text
    content: 'Ary nitazana koa i Rebeka ka nahita an’Isaka; dia nidina haingana niala tamin’ny rameva izy '
  '65':
  - type: text
    content: 'sady niteny tamin’ilay mpanompo hoe: Iza moa irỳ lehilahy mitsangantsangana eny an-tsaha avy mitsena antsika irỳ? Ary hoy ilay mpanompo: Iny no tompoko. Dia nandray ny voaliny i Rebeka mba hanafenany ny tarehiny. '
  '66':
  - type: text
    content: 'Dia nambaran’ilay mpanompo tamin’Isaka ny zavatra rehetra izay nataony. '
  '67':
  - type: text
    content: Ary nampandroso an’i Rebeka ho ao an-dain’i Saraha reniny Isaka ka nampakatra azy ho vadiny. Tia azy izy ka nionona ny alahelony ny reniny.
  '7':
  - type: text
    content: 'NY TOMPO, Andriamanitry ny lanitra, izay naka ahy niala tamin’ny tranon’ny raiko sy tamin’ny tany nahaterahako, sady niteny tamiko sy nianiana tamiko hoe: Ny taranakao no homeko ity tany ity, Izy no haniraka ilay Anjeliny eo alohanao ka any no hakanao vady ho an’ny zanako. '
  '8':
  - type: text
    content: 'Ary raha tsy mety manaraka anao Ravehivavy dia afaka amin’izao fampianianako anao izao ianao. Fa izao ihany: Aza entinao miverina any mihitsy ny zanako. '
  '9':
  - type: text
    content: Dia nataon’ilay mpanompo tao ambanin’ny fen’i Abrahama tompony ny tanany ka nianiana taminy ny amin’izany zavatra izany izy.
