document_id: 1CO.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitondrantena tsy mendrika tao amin’ny fiangonana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Efa re hatraiza hatraiza fa misy fijangajangana atỳ aminareo; eny, fijangajangana izay tsy misy tahaka azy na dia amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' aza, fa misy olona ao aminareo manambady ny vadin-drainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ianareo indray va no mirehareha! Ary tsy nampalahelo anareo akory izany ka mba hesorina tsy ho ao aminareo ilay nanao izany zavatra izany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izaho, na dia tsy teo aza ny tenako, nefa teo ihany ny fanahiko, dia efa nitsara sahady an’ilay nanao fihetsika toy izany, tahaka ny nanatrika teo ihany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Amin’ny anaran’i Jesosy Tompontsika, rehefa tafangona ianareo sy ny fanahiko omban’ny herin’i Jesosy Tompontsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dia aoka hatolotra ho an’i Satana izany olona izany hanimbana ny nofony mba hahavoavonjy ny fanahiny amin’ny andron’i Jesosy Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy mety ny fireharehanareo. Tsy fantatrareo va fa ny masirasira kely dia mahazo ny vongana manontolo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Esory ny masirasira tranainy mba ho vongana vaovao ianareo, araka izay tsy isian’ny masirasira anareo. Fa voavono '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', Paska ho antsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: koa aoka isika hanao andro firavoravoana, tsy amin’ny masirasira tranainy, na amin’ny masirasiran’ny lolompo sy ny haratsiam-panahy, fa amin’ny mofo tsy misy masirasira, dia ny fahadiovam-po sy ny fahamarinana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanoratra taminareo teo amin’ny epistily aho mba tsy hiharoharoanareo amin’izay mpijangajanga; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'nefa tsy ny mpijangajanga rehetra amin’izao tontolo izao, na ny fatra-pitia harena sy ny mpanao an-keriny, na ny mpanompo sampy; fa raha izany dia tsy maintsy miala amin’izao tontolo izao ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny nanoratako taminareo dia ny mba tsy hiharoharoanareo amin’izay atao hoe rahalahy kanefa mpijangajanga, na fatra-pitia harena, na mpanompo sampy, na mpanala baraka olona, na mpimamo, na mpanao an-keriny. Aza miara-mihinana akory amin’ny olona toy izany ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ataoko ahoana moa ny hitsara ny any ivelany? Tsy ny ao anatiny va no tsarainareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ny any ivelany dia tsarain’Andriamanitra. Esory aminareo ilay mpanao ratsy.
