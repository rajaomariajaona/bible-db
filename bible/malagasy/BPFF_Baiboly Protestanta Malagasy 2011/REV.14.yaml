document_id: REV.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Zanak’ondry sy ny voaavotra
  - type: text
    content: 'Ary hitako fa indro, ny Zanak’ondry dia nitsangana teo amin’ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ', ary nisy efatra arivo sy efatra alina sy iray hetsy nomba Azy, samy manana ny anarany sy ny anaran’ny Rainy voasoratra eo amin’ny handriny. '
  '10':
  - type: text
    content: 'dia izy koa no hisotro ny divain’ny fahatezeran’Andriamanitra, izay naidina tao anatin’ny kapoaky ny fahatezerany, tsy mitampoka, miharoharo zavatra, sady hampijaliana amin’ny afo sy solifara eo anatrehan’ny anjely masina sy eo anatrehan’ny Zanak’ondry izy! '
  '11':
  - type: text
    content: 'Ny setroky ny fijaliany dia miakatra mandrakizay mandrakizay ary tsy manana fitsaharana, na andro na alina, izay miankohoka eo anoloan’ny bibidia sy ny sariny, na izay mandray ny mariky ny anarany. '
  '12':
  - type: text
    content: Indro ny faharetan’ny olona masina, dia izay mitandrina ny didin’Andriamanitra sy ny finoana an’i Jesosy.
  '13':
  - type: text
    content: 'Ary nahare feo avy tany an-danitra aho niteny hoe: Soraty:'
  - type: text
    content: Sambatra ny maty, dia izay maty ao amin’ny Tompo, hatramin’izao! Eny, hoy ny Fanahy, fa hitsahatra amin’izay nisasarany izy, fa ny asany manaraka azy.
  - type: heading
    content: Fijinjana ny tany
  '14':
  - type: text
    content: 'Ary indro, nahita rahona fotsy aho, ary nisy tahaka ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' nipetraka teo ambonin’ny rahona. Nisatroka satroboninahitra volamena Izy sady nitana antsimbary maranitra teny an-tanany. '
  '15':
  - type: text
    content: 'Ary nisy anjely iray koa nivoaka avy tao amin’ny tempoly, niantso tamin’ny feo mahery ka niteny tamin’Ilay nipetraka teo ambonin’ny rahona hoe:'
  - type: text
    content: Arosoy ny antsimbarinao ka mijinjà!
  - type: text
    content: Satria tonga ny andro fijinjana fa efa masaka ny vokatry ny tany.
  '16':
  - type: text
    content: Dia naroson’Ilay nipetraka teo ambonin’ny rahona tamin’ny tany ny antsimbariny ka voajinja ny tany.
  '17':
  - type: text
    content: 'Ary nisy anjely iray koa nivoaka avy tao amin’ny tempoly tany an-danitra, ary izy koa dia nitana antsimbary maranitra. '
  '18':
  - type: text
    content: 'Nisy anjely iray koa nivoaka avy teo amin’ny alitara, ary nanana fahefana tamin’ny afo izy; niantso ilay nanana ny antsimbary maranitra tamin’ny feo mahery izy hoe:'
  - type: text
    content: Arosoy ny antsimbarinao maranitra ka angony ny sampahom-boaloboka
  - type: text
    content: eo amin’ny tany; fa masaka tsara ny voalobony.
  '19':
  - type: text
    content: 'Ary naroson’ilay anjely tamin’ny tany ny antsimbariny dia nangoniny ny voaloboky ny tany ka nazerany tao amin’ny famiazam-boaloboka lehibe, dia ny fahatezeran’Andriamanitra. '
  '2':
  - type: text
    content: 'Ary nahare feo avy tany an-danitra aho, tahaka ny firohondrohon’ny ranobe sy tahaka ny fikotroky ny kotrokorana mafy; ary ny feo izay reko dia tahaka ny an’ny mpitendry lokanga mitendry ny lokangany. '
  '20':
  - type: text
    content: 'Ary nohitsakitsahina teny ivelan’ny tanàna ny famiazam-boaloboka ary avy tao amin’ny famiazam-boaloboka dia nisy ra nahadifotra hatramin’ny lamboridin-tsoavaly ka tonga hatramin’ny eninjato sy arivo '
  - type: text
    content: stadio
  - type: text
    content: .
  '3':
  - type: text
    content: 'Ary mihira toa tononkira vaovao eo anoloan’ny sezafiandrianana sy eo anatrehan’ny zavamananaina efatra sy ny loholona izy. Tsy nisy afaka nianatra izany tononkira izany, afa-tsy ny efatra arivo sy efatra alina sy iray hetsy izay navotana niala tamin’ny tany. '
  '4':
  - type: text
    content: 'Ireo no tsy voaloto tamin’ny vehivavy, fa virijiny izy. Ireo no manaraka ny Zanak’ondry na aiza na aiza no alehany. Ireo no navotana avy tamin’ny olona ho voaloham-bokatra ho an’Andriamanitra sy ny Zanak’ondry. '
  '5':
  - type: text
    content: Tsy nisy lainga hita teo am-bavany, sady tsy manan-tsiny izy.
  - type: heading
    content: Ny anjely telo nanambara ny fitsaran’Andriamanitra
  '6':
  - type: text
    content: 'Ary hitako fa indro, nisy anjely iray hafa koa nanidina teo afovoan’ny lanitra, nanana Filazantsara mandrakizay hotorina amin’izay monina ambonin’ny tany sy amin’ny firenena, ny fokom-pirenena, ny samihafa fiteny ary ny olom-pirenena rehetra, '
  '7':
  - type: text
    content: 'niteny tamin’ny feo mahery hoe:'
  - type: text
    content: Matahora an’Andriamanitra ka omeo voninahitra Izy, fa tonga ny andro fitsarany; miankohofa eo anoloan’Izay nanao ny lanitra sy ny tany sy ny ranomasina ary ny loharano!
  '8':
  - type: text
    content: 'Ary nisy iray hafa koa, dia anjely faharoa, nanaraka azy ka niteny hoe:'
  - type: text
    content: Rava! Rava i Babilona lehibe izay nampisotro ny firenena rehetra ny divain’ny fahatezerana noho ny fijangajangany!
  '9':
  - type: text
    content: 'Ary nisy iray hafa koa, dia anjely fahatelo, nanaraka ireny ka niteny tamin’ny feo mahery hoe:'
  - type: text
    content: 'Raha misy miankohoka eo anoloan’ny bibidia sy ny sariny ka mandray ny marika eo amin’ny handriny na amin’ny tanany, '
