document_id: REV.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Zanak’ondry sy ny voaavotra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako fa indro, ny Zanak’ondry dia nitsangana teo amin’ny tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ', ary nisy efatra arivo sy efatra alina sy iray hetsy nomba Azy, samy manana ny anarany sy ny anaran’ny Rainy voasoratra eo amin’ny handriny. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia izy koa no hisotro ny divain’ny fahatezeran’Andriamanitra, izay naidina tao anatin’ny kapoaky ny fahatezerany, tsy mitampoka, miharoharo zavatra, sady hampijaliana amin’ny afo sy solifara eo anatrehan’ny anjely masina sy eo anatrehan’ny Zanak’ondry izy! '
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny setroky ny fijaliany dia miakatra mandrakizay mandrakizay ary tsy manana fitsaharana, na andro na alina, izay miankohoka eo anoloan’ny bibidia sy ny sariny, na izay mandray ny mariky ny anarany. '
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro ny faharetan’ny olona masina, dia izay mitandrina ny didin’Andriamanitra sy ny finoana an’i Jesosy.
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary nahare feo avy tany an-danitra aho niteny hoe: Soraty:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra ny maty, dia izay maty ao amin’ny Tompo, hatramin’izao! Eny, hoy ny Fanahy, fa hitsahatra amin’izay nisasarany izy, fa ny asany manaraka azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fijinjana ny tany
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro, nahita rahona fotsy aho, ary nisy tahaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ' nipetraka teo ambonin’ny rahona. Nisatroka satroboninahitra volamena Izy sady nitana antsimbary maranitra teny an-tanany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anjely iray koa nivoaka avy tao amin’ny tempoly, niantso tamin’ny feo mahery ka niteny tamin’Ilay nipetraka teo ambonin’ny rahona hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arosoy ny antsimbarinao ka mijinjà!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tonga ny andro fijinjana fa efa masaka ny vokatry ny tany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia naroson’Ilay nipetraka teo ambonin’ny rahona tamin’ny tany ny antsimbariny ka voajinja ny tany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anjely iray koa nivoaka avy tao amin’ny tempoly tany an-danitra, ary izy koa dia nitana antsimbary maranitra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy anjely iray koa nivoaka avy teo amin’ny alitara, ary nanana fahefana tamin’ny afo izy; niantso ilay nanana ny antsimbary maranitra tamin’ny feo mahery izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arosoy ny antsimbarinao maranitra ka angony ny sampahom-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny tany; fa masaka tsara ny voalobony.
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary naroson’ilay anjely tamin’ny tany ny antsimbariny dia nangoniny ny voaloboky ny tany ka nazerany tao amin’ny famiazam-boaloboka lehibe, dia ny fahatezeran’Andriamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahare feo avy tany an-danitra aho, tahaka ny firohondrohon’ny ranobe sy tahaka ny fikotroky ny kotrokorana mafy; ary ny feo izay reko dia tahaka ny an’ny mpitendry lokanga mitendry ny lokangany. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary nohitsakitsahina teny ivelan’ny tanàna ny famiazam-boaloboka ary avy tao amin’ny famiazam-boaloboka dia nisy ra nahadifotra hatramin’ny lamboridin-tsoavaly ka tonga hatramin’ny eninjato sy arivo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: stadio
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mihira toa tononkira vaovao eo anoloan’ny sezafiandrianana sy eo anatrehan’ny zavamananaina efatra sy ny loholona izy. Tsy nisy afaka nianatra izany tononkira izany, afa-tsy ny efatra arivo sy efatra alina sy iray hetsy izay navotana niala tamin’ny tany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no tsy voaloto tamin’ny vehivavy, fa virijiny izy. Ireo no manaraka ny Zanak’ondry na aiza na aiza no alehany. Ireo no navotana avy tamin’ny olona ho voaloham-bokatra ho an’Andriamanitra sy ny Zanak’ondry. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy nisy lainga hita teo am-bavany, sady tsy manan-tsiny izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny anjely telo nanambara ny fitsaran’Andriamanitra
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako fa indro, nisy anjely iray hafa koa nanidina teo afovoan’ny lanitra, nanana Filazantsara mandrakizay hotorina amin’izay monina ambonin’ny tany sy amin’ny firenena, ny fokom-pirenena, ny samihafa fiteny ary ny olom-pirenena rehetra, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'niteny tamin’ny feo mahery hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matahora an’Andriamanitra ka omeo voninahitra Izy, fa tonga ny andro fitsarany; miankohofa eo anoloan’Izay nanao ny lanitra sy ny tany sy ny ranomasina ary ny loharano!
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary nisy iray hafa koa, dia anjely faharoa, nanaraka azy ka niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rava! Rava i Babilona lehibe izay nampisotro ny firenena rehetra ny divain’ny fahatezerana noho ny fijangajangany!
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary nisy iray hafa koa, dia anjely fahatelo, nanaraka ireny ka niteny tamin’ny feo mahery hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha misy miankohoka eo anoloan’ny bibidia sy ny sariny ka mandray ny marika eo amin’ny handriny na amin’ny tanany, '
