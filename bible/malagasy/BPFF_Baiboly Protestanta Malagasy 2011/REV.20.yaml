document_id: REV.20,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nafatotra arivo taona i Satana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hitako fa indro, nisy anjely nidina avy tany an-danitra, nanana ny fanalahidin’ny lavaka tsy hita noanoa sy gadra lehibe teny an-tanany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary ny devoly izay namitaka azy dia natsipy tany amin’ny farihy afo sy solifara izay misy ilay bibidia sy ilay mpaminany sandoka koa, ary hampijaliana andro aman’alina mandrakizay mandrakizay ireo.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hitako fa indro, nisy sezafiandrianana fotsy lehibe sy Ilay mipetraka eo amboniny. Ny tany sy ny lanitra dia nandositra Azy ka tsy nisy toerana ho azy intsony. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nahita ny maty aho, na ny lehibe na ny kely, nijoro teo anoloan’ny sezafiandrianana. Nisy boky maromaro novelarina; ary nisy boky iray hafa novelarina, dia ny bokin’ny fiainana izany. Ary ny maty dia notsaraina araka izay zavatra voasoratra tao anatin’ny boky, araka ny asany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ny ranomasina dia namoaka ny maty tao anatiny. Ary ny fahafatesana sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' dia namoaka ny maty tao aminy, ary samy notsaraina araka ny asany izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny fahafatesana sy ny fitoeran’ny maty dia natsipy tany amin’ny farihy afo. Izany no fahafatesana faharoa, dia ny farihy afo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary raha nisy tsy hita voasoratra tao anatin’ny bokin’ny fiainana dia natsipy tany amin’ny farihy afo izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nosamboriny ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: dragona
    - type: text
      text: ', dia ilay menarana tranainy, dia ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' sy i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satana
    - type: text
      text: ' ka nafatony arivo taona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nanipy azy ho amin’ny lavaka tsy hita noanoa izy ka nohidiny izany, dia nasiany tombo-kase teo amboniny mba tsy hamitahany ny firenena maro intsony mandra-pahatapitra ny arivo taona. Rehefa afaka izany dia tsy maintsy hovahana kelikely aloha izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nahita sezafiandrianana maro aho. Nisy nipetraka teo amboniny ary nomena fahefana hitsara izy ireo. Hitako koa ny fanahin’izay notapahin-doha noho ny fanambaràna an’i Jesosy sy ny tenin’Andriamanitra, ary izay rehetra tsy niankohoka teo anoloan’ny bibidia na teo anoloan’ny sariny ary tsy nandray ny marika ho eo amin’ny handriny na ho eo amin’ny tanany. Velona indray izy ireo ka niara-nanjaka tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' arivo taona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa ny sisa amin’ny maty dia tsy mbola velona mandra-pahatapitra ny arivo taona. Izany no fitsanganana voalohany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sambatra sy masina izay manana anjara amin’ny fitsanganana voalohany! Ireo dia tsy mba ananan’ny fahafatesana faharoa fahefana fa ho mpisoron’Andriamanitra sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ireo ka hiara-manjaka Aminy arivo taona.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary rehefa tapitra ny arivo taona dia hovahana i Satana ho afaka ao amin’ny tranomaizina nitoerany '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'ka hivoaka hamitaka ny firenena eny amin’ny vazan-tany efatra, dia i Goga sy i Magoga, mba hamory azy ho amin’ny ady. Tahaka ny fasiky ny ranomasina ny isany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary niakatra namakivaky ny tany manontolo izy dia nanodidina ny tobin’ny olona masina sy ny tanàna malala. Nisy afo anefa nidina avy tany an-danitra ka nandany azy. '
