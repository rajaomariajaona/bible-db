document_id: MRK.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitsaran’i Pilato an’i Jesosy
  - type: heading
    content: Mat 27.1-2, 11-14; Lio 23.1-5; Jao 18.28-38
  - type: text
    content: 'Ary raha vao maraina ny andro, ireo lehiben’ny mpisorona sy ny loholona ary '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' mbamin’ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' manontolo, dia nivory niara-nihevitra, koa rehefa avy namatotra an’i Jesosy izy dia nitondra Azy ka nanolotra Azy tamin’i Pilato.'
  '10':
  - type: text
    content: 'Fantany mantsy fa fialonana no nanoloran’ireo lehiben’ny mpisorona Azy. '
  '11':
  - type: text
    content: 'Fa nanome fo ny vahoaka ireo lehiben’ny mpisorona fa aleo, hoy izy ireo, i Barabasy no hafahan’i Pilato. '
  '12':
  - type: text
    content: 'Dia hoy indray i Pilato: Koa inona ary no hataoko amin’ilay ataonareo hoe Mpanjakan’ny Jiosy? '
  '13':
  - type: text
    content: 'Dia niantsoantso indray ny vahoaka hoe: Homboy amin’ny hazofijaliana Izy! '
  '14':
  - type: text
    content: 'Ary hoy i Pilato taminy: Fa inona moa no ratsy nataony? Nefa vao mainka niantsoantso izy ireo ka niteny hoe: Homboy amin’ny hazofijaliana Izy!'
  '15':
  - type: text
    content: Ary ta hanome fahafaham-po ny vahoaka i Pilato ka nanafaka an’i Barabasy ho azy ireo; fa Jesosy kosa dia natolony mba hokaravasina sy hohomboina amin’ny hazofijaliana.
  - type: heading
    content: Nataon’ny miaramila fihomehezana Jesosy
  - type: heading
    content: Mat 27.27-31; Jao 19.2-3
  '16':
  - type: text
    content: 'Ary ireo miaramila dia nitondra an’i Jesosy ho ao anatin’ny kianja izay ao anaty rova sady nanangona ny miaramila rehetra iray tarika aminy. '
  '17':
  - type: text
    content: 'Ary nampitafy Azy lamba volomparasy izy ireo sady nandrandrana satroka tsilo ho Azy ka nasatrony ny lohany. '
  '18':
  - type: text
    content: 'Dia niarahaba Azy izy ireo hoe: Arahaba, ry Mpanjakan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: '! '
  '19':
  - type: text
    content: 'Ary nikapoka ny lohany tamin’ny volotara izy ireo sady nandrora Azy ka nandohalika sy niankohoka teo anatrehany. '
  '2':
  - type: text
    content: 'Ary nanontany Azy i Pilato hoe: Ianao va no Mpanjakan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: '? Dia namaly azy Izy hoe: Voalazanao. '
  '20':
  - type: text
    content: Rehefa avy nanao Azy ho fihomehezana izy ireo dia nesoriny Taminy ilay lamba volomparasy ka nampitafiany Azy indray ny akanjony.
  - type: heading
    content: Nohomboina teo amin’ny hazofijaliana Jesosy
  - type: heading
    content: Mat 27.32-44; Lio 23.26-43; Jao 19.16-24
  - type: text
    content: Dia noentin’ireo hohomboany amin’ny hazofijaliana Izy.
  '21':
  - type: text
    content: Ary noterena hitondra ny hazofijalian’i Jesosy ny lehilahy iray izay nandalo avy tany an-tsaha, atao hoe Simona kireniana, rain’i Aleksandra sy i Rofosy.
  '22':
  - type: text
    content: 'Ary Jesosy dia noentin’ireo teo amin’ny toerana atao hoe Golgota, izany hoe, raha adika, Ikarandoha. '
  '23':
  - type: text
    content: 'Dia notolorany divay miharo miora Izy nefa tsy nety nisotro. '
  '24':
  - type: text
    content: 'Ary nohomboin’ireo tamin’ny hazofijaliana Izy, dia nataony antsapaka ny fizara ny fitafiany, hahitany izay ho azony avy. '
  '25':
  - type: text
    content: 'Tamin’ny ora fahatelo no nanomboany Azy tamin’ny hazofijaliana. '
  '26':
  - type: text
    content: 'Ary ny soratra milaza ny nanamelohana Azy dia voasoratra teo amboniny hoe: '
  - type: heading
    content: ny mpanjakan’ny jiosy.
  '27':
  - type: text
    content: 'Ary nisy jiolahy roa nohomboin’izy ireo niaraka Taminy tamin’ny hazofijaliana, ny iray dia teo ankavanany ary ny iray dia teo ankaviany '
  '28':
  - type: text
    content: 'Dia tanteraka ny Soratra Masina izay milaza hoe: «Ary natao ho isan’ny mpanota Izy» (Isa 53.12).'
  '29':
  - type: text
    content: 'Ary niteny ratsy Azy sady nihifikifi-doha ny mpandalo ka niteny hoe: Akory izay! Ry Ilay maharava ny tempoly sy mahatsangana azy ao anatin’ny hateloana, '
  '3':
  - type: text
    content: 'Ary ireo lehiben’ny mpisorona dia niampanga Azy tamin-javatra maro. '
  '30':
  - type: text
    content: 'vonjeo ny tenanao ka midìna hiala teo amin’ny hazofijaliana! '
  '31':
  - type: text
    content: 'Ary toy izany koa no faneson’ireo lehiben’ny mpisorona, fa niresaka izy ireo sy ny mpanoradalàna hoe: Namonjy ny sasany Izy fa ny tenany dia tsy hainy vonjena. '
  '32':
  - type: text
    content: 'Aoka ny '
  - type: text
    content: Kristy
  - type: text
    content: ', Mpanjakan’ny Israely, hidina hiala teo amin’ny hazofijaliana ankehitriny mba ho hitantsika ka hinoantsika! Ary ireo izay niaraka nohomboina Taminy tamin’ny hazofijaliana dia naneso Azy koa.'
  - type: heading
    content: Ny nahafatesan’i Jesosy
  - type: heading
    content: Mat 27.45-56; Lio 23.44-49; Jao 19.28-30
  '33':
  - type: text
    content: 'Ary nony tamin’ny ora fahenina dia tonga maizina ny tany rehetra ary naharitra hatramin’ny ora fahasivy izany. '
  '34':
  - type: text
    content: 'Ary tamin’ny ora fahasivy dia niantso tamin’ny feo mahery Jesosy ka niteny hoe:'
  - type: text
    content: Elỳ, Elỳ, lamà sabaktàny?
  - type: text
    content: 'Izany hoe raha adika: «Andriamanitro ô, Andriamanitro ô, nahoana no dia mahafoy Ahy Ianao?» (Sal 22.2)'
  '35':
  - type: text
    content: 'Ary ny sasany tamin’ireo izay nanatrika teo raha nandre izany dia niteny hoe: Indro, miantso an’i Elia Izy. '
  '36':
  - type: text
    content: 'Ary nisy iray nihazakazaka dia nanatsoboka sipaonjy tamin’ny vinaingitra ka natohiny tamin’ny volotara izany dia natohony hotsentsefin’i Jesosy ary hoy izy: Avelao ho hitantsika na ho avy hampidina Azy i Elia na tsia. '
  '37':
  - type: text
    content: Jesosy anefa niantso tamin’ny feo mahery dia afaka ny ainy.
  '38':
  - type: text
    content: 'Ary ny efitra lamba tao amin’ny tempoly dia triatra nizara roa hatrany ambony ka hatrany ambany. '
  '39':
  - type: text
    content: 'Ary ny kapiteny izay nanatrika nanandrify Azy, raha nahita fa toy izany no nahafaka ny ainy, dia niteny hoe: Marina tokoa fa Zanak’Andriamanitra io Lehilahy io.'
  '4':
  - type: text
    content: 'Dia nanontany Azy indray i Pilato hoe: Tsy manan-kavaly akory va Ianao? E izao hamaroan’ny zavatra iampangan’izy ireo Anao izao! '
  '40':
  - type: text
    content: 'Ary nisy vehivavy koa nitsinjo teny lavidavitra eny ary isan’ireny i Maria Magdalena sy i Maria, renin’i Jakoba kely, ary i Josesy sy i Salome; '
  '41':
  - type: text
    content: ireo dia nanaraka Azy ka nanompo Azy fony Izy tany Galilia; tao koa ireo vehivavy maro izay niara-niakatra Taminy tany Jerosalema.
  - type: heading
    content: Ny nandevenana an’i Jesosy
  - type: heading
    content: Mat 27.57-61; Lio 23.50-55; Jao 19.38-42
  '42':
  - type: text
    content: 'Nony hariva ny andro, satria andro fiomanana, dia ny andro alohan’ny '
  - type: text
    content: Sabata
  - type: text
    content: ', '
  '43':
  - type: text
    content: 'dia avy i Josefa avy any Arimatia, lehilahy manankaja izay isan’ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' sady niandry ny fanjakan’Andriamanitra koa. Sahy niditra tao amin’i Pilato izy nangataka ny fatin’i Jesosy. '
  '44':
  - type: text
    content: 'Ary gaga i Pilato raha maty sahady Jesosy ka niantso ny kapiteny hankao aminy izy ka nanontaniany azy raha efa ela ny nahafatesany. '
  '45':
  - type: text
    content: 'Ary rehefa nandre tamin’ilay kapiteny izy dia nomeny malalaka an’i Josefa ny faty. '
  '46':
  - type: text
    content: 'Ary nividy lamba hariry madinika i Josefa dia nampidininy ny fatin’i Jesosy ka nofonosiny an’ilay lamba hariry madinika ary napetrany tao amin’ny fasana izay voalavaka tao amin’ny vatolampy, dia nanakodia vato teo amin’ny varavaran’ny fasana izy. '
  '47':
  - type: text
    content: Ary i Maria Magdalena sy i Maria, renin’i Josesy, dia nijery izay nametrahany Azy.
  '5':
  - type: text
    content: Fa tsy namaly intsony Jesosy na dia indraimbava aza, hany ka gaga i Pilato.
  - type: heading
    content: Ny nanamelohana an’i Jesosy ho faty
  - type: heading
    content: Mat 27.15-26; Lio 23.13-25; Jao 18.39–19.16
  '6':
  - type: text
    content: 'Ary isaky ny andro firavoravoana dia manafaka mpifatotra iray izay angatahin’ny vahoaka izy. '
  '7':
  - type: text
    content: 'Ary nisy iray, ilay antsoina hoe Barabasy, niara-nifatotra tamin’ny mpikomy sasany, izay efa nahafaty olona tamin’ny fikomiana. '
  '8':
  - type: text
    content: 'Dia niakatra ny vahoaka ka nangataka an’i Pilato hanao araka izay fanaony aminy. '
  '9':
  - type: text
    content: 'Fa namaly azy ireo i Pilato hoe: Tianareo va raha ny Mpanjakan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' no hafahako ho anareo? '
