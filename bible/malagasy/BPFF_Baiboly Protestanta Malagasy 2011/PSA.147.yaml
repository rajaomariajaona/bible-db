document_id: PSA.147,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahefan’Andriamanitra eo amin’ny tantara sy eo amin’ny zavaboahary
  - type: text
    content: ' '
  - type: text
    content: Haleloia
  - type: text
    content: ','
  - type: text
    content: fa tsara ny mihira ho an’Andriamanitsika;
  - type: text
    content: eny, mamy sady mendrika ny fiderana.
  '10':
  - type: text
    content: Tsy ny herin’ny soavaly no mahafinaritra Azy
  - type: text
    content: ary tsy ny ranjon’ny lehilahy no ankasitrahany.
  '11':
  - type: text
    content: Mankasitraka izay matahotra Azy NY TOMPO,
  - type: text
    content: dia izay manantena ny famindrampony.
  '12':
  - type: text
    content: Mankalazà NY TOMPO, ry Jerosalema ô!
  - type: text
    content: 'Miderà an’Andriamanitrao, ry '
  - type: text
    content: Ziona
  - type: text
    content: ' ô.'
  '13':
  - type: text
    content: Fa manamafy ny hidim-bavahadinao Izy
  - type: text
    content: sady mitahy ny zanakao eo ampofoanao.
  '14':
  - type: text
    content: Mahatonga ny faritaninao handry fahalemana Izy;
  - type: text
    content: vokisany vary tsara indrindra ianao.
  '15':
  - type: text
    content: Mampandeha ny didiny ho amin’ny tany Izy;
  - type: text
    content: miely haingana be ny teniny.
  '16':
  - type: text
    content: Mandatsaka orampanala tahaka ny volon’ondry Izy;
  - type: text
    content: mampiely fanala tahaka ny lavenona Izy.
  '17':
  - type: text
    content: Mandatsaka ny havandrany tahaka ny sombintsombin-javatra Izy;
  - type: text
    content: iza no maharitra ny hatsiakany?
  '18':
  - type: text
    content: Mamoaka ny teniny Izy ka mampiempo ireny;
  - type: text
    content: mampifofofofo ny rivony Izy dia mandriaka ny rano.
  '19':
  - type: text
    content: Manambara ny teniny amin’i Jakoba Izy
  - type: text
    content: ary ny didiny sy ny fitsipiny amin’ny Israely.
  '2':
  - type: text
    content: Manangana an’i Jerosalema NY TOMPO;
  - type: text
    content: mamory ny Israely voaroaka Izy.
  '20':
  - type: text
    content: Tsy nanao toy izany tamin’izay firenena hafa Izy
  - type: text
    content: ary ny fitsipiny dia tsy mba fantatr’ireny.
  - type: text
    content: Haleloia.
  '3':
  - type: text
    content: Manasitrana ny torotoro fo Izy
  - type: text
    content: ary mamehy ny feriny.
  '4':
  - type: text
    content: Milaza ny isan’ny kintana Izy;
  - type: text
    content: samy tononiny amin’ny anarany avy ireny rehetra ireny.
  '5':
  - type: text
    content: Lehibe ny Tompontsika sady be hery;
  - type: text
    content: tsy hita lany ny fahalalany.
  '6':
  - type: text
    content: Manohana ny mpandefitra NY TOMPO,
  - type: text
    content: fa mampietry ny ratsy fanahy hatrany amin’ny tany.
  '7':
  - type: text
    content: Mihirà fiderana ho an’NY TOMPO;
  - type: text
    content: mankalazà an’Andriamanitsika amin’ny lokanga.
  '8':
  - type: text
    content: Izy no manaron-drahona ny lanitra,
  - type: text
    content: Izy no manamboatra ranonorana ho amin’ny tany,
  - type: text
    content: Izy no mampaniry ahitra ny tendrombohitra,
  '9':
  - type: text
    content: Izy no manome hanina ho an’ny biby
  - type: text
    content: sy ho an’ny zana-goaika izay mitaraina.
