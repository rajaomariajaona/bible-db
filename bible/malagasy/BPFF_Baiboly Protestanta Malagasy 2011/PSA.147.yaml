document_id: PSA.147
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahefan’Andriamanitra eo amin’ny tantara sy eo amin’ny zavaboahary
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Haleloia
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsara ny mihira ho an’Andriamanitsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mamy sady mendrika ny fiderana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Manangana an’i Jerosalema NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamory ny Israely voaroaka Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Manasitrana ny torotoro fo Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamehy ny feriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Milaza ny isan’ny kintana Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy tononiny amin’ny anarany avy ireny rehetra ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lehibe ny Tompontsika sady be hery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hita lany ny fahalalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manohana ny mpandefitra NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mampietry ny ratsy fanahy hatrany amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mihirà fiderana ho an’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mankalazà an’Andriamanitsika amin’ny lokanga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izy no manaron-drahona ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no manamboatra ranonorana ho amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no mampaniry ahitra ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izy no manome hanina ho an’ny biby
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho an’ny zana-goaika izay mitaraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy ny herin’ny soavaly no mahafinaritra Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ny ranjon’ny lehilahy no ankasitrahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mankasitraka izay matahotra Azy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay manantena ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mankalazà NY TOMPO, ry Jerosalema ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Miderà an’Andriamanitrao, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' ô.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa manamafy ny hidim-bavahadinao Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mitahy ny zanakao eo ampofoanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mahatonga ny faritaninao handry fahalemana Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vokisany vary tsara indrindra ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mampandeha ny didiny ho amin’ny tany Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miely haingana be ny teniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mandatsaka orampanala tahaka ny volon’ondry Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampiely fanala tahaka ny lavenona Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mandatsaka ny havandrany tahaka ny sombintsombin-javatra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: iza no maharitra ny hatsiakany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mamoaka ny teniny Izy ka mampiempo ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampifofofofo ny rivony Izy dia mandriaka ny rano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Manambara ny teniny amin’i Jakoba Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny didiny sy ny fitsipiny amin’ny Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy nanao toy izany tamin’izay firenena hafa Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fitsipiny dia tsy mba fantatr’ireny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haleloia.
