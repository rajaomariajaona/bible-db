document_id: JOS.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tanànan’ny levita
  - type: heading
    content: Ampit. 1Tan 6.39-66
  - type: text
    content: 'Ary ny lohan’ny fianakaviana tamin’ny '
  - type: text
    content: levita
  - type: text
    content: ' dia nanatona an’i Eleazara mpisorona sy i Josoa, zanak’i Nona, ary ny lohan’ny fianakaviana tamin’ny fokon’ny Zanak’Israely, '
  '10':
  - type: text
    content: 'izay azon’ny taranak’i Arona, isam-pianakavian’ny taranak’i Kehata, amin’ny taranak’i Levy; fa azy ny anjara voalohany tamin’ny antsapaka. '
  '11':
  - type: text
    content: 'Dia nomeny azy Kiriata-Arba na ny tanànan’i Arba, rain’i Anàka, dia i Hebrona izany, any amin’ny tany be havoana any Joda, mbamin’ny tany manodidina azy. '
  '12':
  - type: text
    content: 'Fa ny saha momba ny tanàna sy ny vohitra miankina aminy dia nomeny ho lovan’i Kaleba, zanak’i Jefone. '
  '13':
  - type: text
    content: 'Nomeny ny taranak’i Arona mpisorona i Hebrona sy ny tany manodidina azy, ho tanàna fialofana ho an’izay nahafaty olona, nanampiny azy i Libna sy ny tany manodidina azy, '
  '14':
  - type: text
    content: 'i Jatira sy ny tany manodidina azy, i Estemoa sy ny tany manodidina azy, '
  '15':
  - type: text
    content: 'i Holona sy ny tany manodidina azy, i Debira sy ny tany manodidina azy, '
  '16':
  - type: text
    content: 'i Aina sy ny tany manodidina azy, i Jota sy ny tany manodidina azy, i Bety-Semesy sy ny tany manodidina azy: Tanàna sivy avy tamin’ireo foko roa ireo; '
  '17':
  - type: text
    content: 'ary avy tamin’ny fokon’i Benjamina dia i Gibeona sy ny tany manodidina azy, i Geba sy ny tany manodidina azy, '
  '18':
  - type: text
    content: 'i Anatota sy ny tany manodidina azy, i Almona sy ny tany manodidina azy: Tanàna efatra. '
  '19':
  - type: text
    content: Ny tanàna rehetra an’ny mpisorona, taranak’i Arona, dia telo amby folo sy ny tany manodidina azy avy.
  '2':
  - type: text
    content: 'ka niteny taminy tao Silo tao amin’ny tany Kanana hoe: NY TOMPO efa nampandidy an’i Mosesy mba homena tanàna hitoerana sy tany manodidina azy ho an’ny biby fiompinay izahay. '
  '20':
  - type: text
    content: 'Ny amin’ny taranak’i Kehata, dia ny levita sisa tamin’ny taranak’i Kehata, ny tanàna azony tamin’ny antsapaka dia avy tamin’ny fokon’i Efraima. '
  '21':
  - type: text
    content: 'Nomen’ny zanak’Israely azy i Sekema sy ny tany manodidina azy any amin’ny tany be havoana any Efraima, ho tanàna fialofana ho an’izay nahafaty olona, niampy an’i Gezera sy ny tany manodidina azy, '
  '22':
  - type: text
    content: 'i Kibzaima sy ny tany manodidina azy, i Bety-Horona sy ny tany manodidina azy: Tanàna efatra; '
  '23':
  - type: text
    content: 'ary avy tamin’ny fokon’i Dana, dia i Elteke sy ny tany manodidina azy, i Gibetona sy ny tany manodidina azy, '
  '24':
  - type: text
    content: 'i Aialona sy ny tany manodidina azy, i Gata-Rimona sy ny tany manodidina azy: Tanàna efatra; '
  '25':
  - type: text
    content: 'avy tamin’ny antsasaky ny fokon’i Manase, dia i Tanàka sy ny tany manodidina azy, i Gata-Rimona sy ny tany manodidina azy: Tanàna roa. '
  '26':
  - type: text
    content: Ny tanàna rehetra azon’ny fianakavian’ny taranak’i Kehata sisa dia folo, miampy ny tany manodidina azy avy.
  '27':
  - type: text
    content: 'Izao no azon’ny taranak’i Gersona, isan’ny taranaky ny levita; avy tamin’ny antsasaky ny fokon’i Manase, dia i Golana any Basana sy ny tany manodidina azy, ho tanàna fialofana ho an’izay nahafaty olona, niampy an’i Bestera sy ny tany manodidina azy: Tanàna roa; '
  '28':
  - type: text
    content: 'ary avy tamin’ny fokon’Isakara dia i Kisiona sy ny tany manodidina azy, i Daberata sy ny tany manodidina azy, '
  '29':
  - type: text
    content: 'i Jarmota sy ny tany manodidina azy, i Eny-Ganima sy ny tany manodidina azy: Tanàna efatra; '
  '3':
  - type: text
    content: Avy tamin’ny lovany no nanomezan’ny Zanak’Israely ny levita ireny tanàna ireny sy ny tany manodidina azy avy, araka ny didin’NY TOMPO.
  '30':
  - type: text
    content: 'ary avy tamin’ny fokon’i Asera dia i Misala sy ny tany manodidina azy, i Abdona sy ny tany manodidina azy, '
  '31':
  - type: text
    content: 'i Helkata sy ny tany manodidina azy, i Rehoba sy ny tany manodidina azy: Tanàna efatra; '
  '32':
  - type: text
    content: 'avy tamin’ny fokon’i Naftaly dia i Kadesy any Galilia sy ny tany manodidina azy, ho tanàna fialofana ho an’izay nahafaty olona, niampy an’i Hamota-Dora sy ny tany manodidina azy, i Kartana sy ny tany manodidina azy: Tanàna telo. '
  '33':
  - type: text
    content: Ny tanàna rehetra an’ny Gersonita araka ny fianakaviany dia telo amby folo sy ny tany manodidina azy avy.
  '34':
  - type: text
    content: 'Izao no azon’ny fianakavian’ny taranak’i Merary, izay levita sisa: Avy tamin’ny fokon’i Zebolona dia i Jokneama sy ny tany manodidina azy, i Karta sy ny tany manodidina azy, '
  '35':
  - type: text
    content: 'i Dimna sy ny tany manodidina azy, i Nahalola sy ny tany manodidina azy: Tanàna efatra; '
  '36':
  - type: text
    content: 'avy tamin’ny fokon’i Robena dia i Bezera sy ny tany manodidina azy, i Jahaza sy ny tany manodidina azy, '
  '37':
  - type: text
    content: 'i Kedemota sy ny tany manodidina azy, i Mefata sy ny tany manodidina azy: Tanàna efatra; '
  '38':
  - type: text
    content: 'ary avy tamin’ny fokon’i Gada, dia i Ramota any Gileada sy ny tany manodidina azy, ho tanàna fialofana ho an’izay nahafaty olona, ao koa i Mahanaima sy ny tany manodidina azy, '
  '39':
  - type: text
    content: 'i Hesbona sy ny tany manodidina azy, i Jazera sy ny tany manodidina azy: Tanàna efatra izy rehetra. '
  '4':
  - type: text
    content: 'Dia nahazo anjara tamin’ny antsapaka ny fianakavian’ny Kehatita; ny anjara azon’ny taranak’i Arona mpisorona isan’ny levita dia tanàna telo amby folo, avy tamin’ny fokon’i Joda sy ny fokon’i Simeona ary ny fokon’i Benjamina. '
  '40':
  - type: text
    content: 'Ny tanàna rehetra an’ny taranak’i Merary araka ny fianakaviany, izay sisa tamin’ny fianakavian’ny levita, dia tanàna roa amby folo no anjara azony tamin’ny antsapaka. '
  '41':
  - type: text
    content: 'Ny tanàna rehetra an’ny levita tao anatin’ny lovan’ny Zanak’Israely dia valo amby efapolo, miampy ny tany manodidina azy avy. '
  '42':
  - type: text
    content: Ireo tanàna ireo dia samy manana ny taniny manodidina azy avy; tahaka izany avokoa ireo tanàna rehetra ireo.
  '43':
  - type: text
    content: 'Dia nomen’NY TOMPO ny Israely ny tany rehetra izay efa nianianany homena ny razany; ary nolovainy izany ka nonenany. '
  '44':
  - type: text
    content: 'Dia nomen’NY TOMPO fitsaharana amin’ny manodidina izy, araka izay rehetra nianianany tamin’ny razany, ka tsy nisy lehilahy tamin’ny fahavalony rehetra nahajanona teo anoloany; fa natolotry NY TOMPO teo an-tanany avokoa ny fahavalony rehetra. '
  '45':
  - type: text
    content: Tsy nisy latsaka na dia kely akory aza ny zava-tsoa rehetra izay nolazain’NY TOMPO tamin’ny taranak’Israely; fa tanteraka avokoa izany rehetra izany.
  '5':
  - type: text
    content: 'Ny anjara azon’ny taranak’i Kehata sisa tamin’ny antsapaka dia tanàna folo, avy tamin’ny fokon’i Efraima sy ny fokon’i Dana ary ny antsasaky ny fokon’i Manase. '
  '6':
  - type: text
    content: 'Ny anjara azon’ny taranak’i Gersona tamin’ny antsapaka dia tanàna telo amby folo, avy tamin’ny fokon’Isakara sy ny fokon’i Asera sy ny fokon’i Naftaly ary tamin’ny antsasaky ny fokon’i Manase any Basana. '
  '7':
  - type: text
    content: 'Ny anjara azon’ny taranak’i Merary isam-pokony tamin’ny antsapaka dia tanàna roa amby folo, avy tamin’ny fokon’i Robena sy ny fokon’i Gada ary fokon’i Zebolona. '
  '8':
  - type: text
    content: Nomen’ny Zanak’Israely ny levita tamin’ny antsapaka ireo tanàna ireo sy ny tany manodidina azy avy, araka izay nandidian’NY TOMPO tamin’ny alalan’i Mosesy.
  '9':
  - type: text
    content: 'Nomen’ny zanak’Israely avy tamin’ny foko taranak’i Joda sy ny foko taranak’i Simeona ireto tanàna hotononina anarana ireto, '
