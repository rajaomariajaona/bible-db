document_id: GAL.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny fotoan-tsarotra nolalovan’ny Fiangonana tany Galatia no nahatonga an’i Paoly apostoly hanoratra ity epistily ity. Nisy fampianarana sy fironan-kevitra ara-pivavahana maro nipoitra mantsy tamin’izany fotoana izany. Maro tamin’izy ireny no nifanohitra tamin’ny fotokevitra kristiana izay notorin’i Paoly ka hanarina izany indrindra no tanjon’ity epistily ity.
  - type: text
    content: Ny Galatiana dia mponina tany Azia Minora, tamin’ny faritany romana izay notetezin’i Paoly tamin’ny diany faharoa (Asa 18.23). Na dia teo ambanin’ny fahefana romana aza izy ireo dia mbola nitana mafy ny kolontsaina grika.
  - type: text
    content: Satria ny fanoherana ny famorana sy ny Lalàna ho famonjena ny Mino, sy ny fanamarinana amin’ny finoana no hita ato, dia heverina fa manodidina ny fivoriambe tany Jerosalema izay voalazan’ny Asa 15 no nanoratan’i Paoly azy, taorianan’ny epistily ho an’ny Romana.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: Hamafisin’i Paoly amin’ny Galatiana fa diso avokoa izay fampianarana mitaky ny famorana sy ny fankatoavana ny Lalànan’i Mosesy ho an’izay te ho voavonjy, satria ny finoana an’i Jesosy Kristy maty teo amin’ny hazofijaliana nefa nitsangana tamin’ny maty no hany mahavonjy sy manafaka.
  - type: text
    content: Asan’Andriamanitra amin’ny alalan’ny Fanahy Masina izany. Maimaimpoana ny famonjena fa tsy avy amin’ny asa. Dingana ihany ny Lalàna nilaina ho fanomanana ny fahatongavan’ny Mpamonjy. Sady mitondra fanafahana ny asan’ny Fanahy Masina no manangana ny Mino ho zanak’Andriamanitra.
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Tokana ny Filazantsara dia izay notorin’i Paoly apostolin’i Jesosy Kristy: 1–2.21'
  - type: text
    content: 'Ny Lalàna sy ny finoana: 3.1–4.31'
  - type: text
    content: 'Olona afaka ny Mino ka tokony handray andraikitra ary handeha araka ny Fanahy: 5.1–6.10'
  - type: text
    content: 'Anatra farany sy fanaovam-beloma: 6.11-18'
