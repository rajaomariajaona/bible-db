document_id: MAT.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Iray tamin’ireo Apostoly roa amby folo i Matio ary voalazan’ny Filazantsara telo ny fiantsoana azy fa mpamory hetra izy talohan’izany. I Levy koa no anarany. Jiosy niara-niasa tamin’ny Romana izy, araka izany.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny fomba fiteny ampiasainy dia hoe «Ny fanjakan’ny lanitra» fa tsy «Ny fanjakan’Andriamanitra». Fomba fiteny jiosy izany ary izany no ahazoana milaza fa nosoratana ho an’ny Kristiana Jiosy voalohany ity boky ity.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Mampifandray ny Testamenta Taloha sy ny Testamenta Vaovao ity boky ity noho ny filazana matetika ny fahatanterahan’ny Testamenta Taloha. Asehon’i Matio fa Jesosy dia sady mampianatra momba ny Lalàna ary maneho ny tena heviny no manasitrana ny olona mihaona Aminy. Izy koa no ilay Mesia efa nandrasan’ny Jiosy ela.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Misy fomba ampiasain’i Matio mba ho mora tadidy ny fampianaran’i Jesosy, ohatra ny isa 7: Ny fanoharana 7, ny loza 7, ilay vehivavy nanambady azy 7 mirahalahy nifandimby, ny famelan-keloka impito amby fitopolo.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Amin’ny fiandohan’ny Boky sy amin’ny famaranana azy dia asehony fa Andriamanitra eo amin’ny olona Jesosy. Ambarany fa Jesosy no Imanoela na: Amintsika Andriamanitra na Andriamanitra momba antsika. Ary ny famaranana ny Boky dia milaza hoe: «Indro Aho momba anareo mandrakariva, ambara-pahatongan’ny fahataperan’izao tontolo izao».'
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Tetiaran’i Jesosy sy tantaran’ny nahaterahany: 1–2'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fiainam-baovao noentin’i Jesosy: 3–7'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny mpianatr’i Jesosy: 8–10'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fanjakan’ny lanitra: 11–13.52'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny Fiangonana sy ny olon’i Jesosy: 13.53–18.35'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fampianarana sy fanasitranan’i Jesosy nifandona tamin’ny Fariseo: 19–25'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fahafatesana sy ny fitsanganan’i Jesosy tamin’ny maty ary ny fanirahana lehibe: 26–28'
