document_id: HOS.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hovaliana i Samaria noho ny helony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nikomy tamin’Andriamaniny izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lavon-tsabatra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanany madinika dia hotorotoroina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny kibon’ny bevohoka eo aminy dia hotatahana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hanasitranana ny firenena mpikomy
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahafantatra izany zavatra izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manan-tsaina dia hahalala izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mahitsy ny lalan’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny marina dia mizotra eny aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mpanota kosa dia ho tafintohina eny aminy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Israely ô, miverena amin’NY TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lavon-keloka ianao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitondrà teny ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, miverena amin’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka mitenena Aminy hoe: Mamelà ny heloka rehetra'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raiso izay tsara!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hatolotray ho fanatitra ny molotray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho solon’ny vantotra ombilahy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hamonjy anay i Asiria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hitaingin-tsoavaly izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady tsy hiteny amin’ny asan’ny tananay intsony hoe: Ry andriamanitray ô!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ao Aminao no ahitan’ny kamboty famindrampo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hositraniko ny fivadihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tia azy amin’ny foko tokoa Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa niala taminy ny fahatezerako.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tahaka ny ando Aho amin’ny Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamony tahaka ny lisy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamaka tahaka an’i Libanona.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisandrahaka ny rantsany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka ny an’ny hazo oliva ny hatsaran-tarehiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tahaka ny an’i Libanona ny hanitra avy aminy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiverina indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo izay nipetraka tao ambanin’ny alokalony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampahavokatra vary indray izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hamelana tahaka ny voaloboka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka ny an’ny divay avy any Libanona ny lazany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Efraima ô! Hataoko inona intsony izay sampy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia efa nihaino ka nitsinjo anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny hazo kipreso maitso Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy Amiko no hahazoana ny vokatrao.
