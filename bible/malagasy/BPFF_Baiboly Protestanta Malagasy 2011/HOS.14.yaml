document_id: HOS.14,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Hovaliana i Samaria noho ny helony
  - type: text
    content: satria nikomy tamin’Andriamaniny izy.
  - type: text
    content: Ho lavon-tsabatra izy,
  - type: text
    content: ny zanany madinika dia hotorotoroina
  - type: text
    content: ary ny kibon’ny bevohoka eo aminy dia hotatahana.
  - type: heading
    content: Ny hanasitranana ny firenena mpikomy
  '10':
  - type: text
    content: Iza no hendry
  - type: text
    content: ka hahafantatra izany zavatra izany?
  - type: text
    content: Izay manan-tsaina dia hahalala izany.
  - type: text
    content: Fa mahitsy ny lalan’NY TOMPO,
  - type: text
    content: ny marina dia mizotra eny aminy,
  - type: text
    content: fa ny mpanota kosa dia ho tafintohina eny aminy.
  '2':
  - type: text
    content: Ry Israely ô, miverena amin’NY TOMPO Andriamanitrao
  - type: text
    content: fa lavon-keloka ianao.
  '3':
  - type: text
    content: Mitondrà teny ianareo,
  - type: text
    content: eny, miverena amin’NY TOMPO
  - type: text
    content: 'ka mitenena Aminy hoe: Mamelà ny heloka rehetra'
  - type: text
    content: ary raiso izay tsara!
  - type: text
    content: Dia hatolotray ho fanatitra ny molotray
  - type: text
    content: ho solon’ny vantotra ombilahy.
  '4':
  - type: text
    content: Tsy hamonjy anay i Asiria,
  - type: text
    content: tsy hitaingin-tsoavaly izahay
  - type: text
    content: 'sady tsy hiteny amin’ny asan’ny tananay intsony hoe: Ry andriamanitray ô!'
  - type: text
    content: Fa ao Aminao no ahitan’ny kamboty famindrampo.
  '5':
  - type: text
    content: Hositraniko ny fivadihany,
  - type: text
    content: ho tia azy amin’ny foko tokoa Aho;
  - type: text
    content: fa efa niala taminy ny fahatezerako.
  '6':
  - type: text
    content: Ho tahaka ny ando Aho amin’ny Israely;
  - type: text
    content: hamony tahaka ny lisy izy
  - type: text
    content: ary hamaka tahaka an’i Libanona.
  '7':
  - type: text
    content: Hisandrahaka ny rantsany,
  - type: text
    content: ho tahaka ny an’ny hazo oliva ny hatsaran-tarehiny,
  - type: text
    content: ary ho tahaka ny an’i Libanona ny hanitra avy aminy.
  '8':
  - type: text
    content: Hiverina indray
  - type: text
    content: ireo izay nipetraka tao ambanin’ny alokalony,
  - type: text
    content: hampahavokatra vary indray izy,
  - type: text
    content: sady hamelana tahaka ny voaloboka;
  - type: text
    content: ho tahaka ny an’ny divay avy any Libanona ny lazany.
  '9':
  - type: text
    content: Ry Efraima ô! Hataoko inona intsony izay sampy?
  - type: text
    content: Izaho dia efa nihaino ka nitsinjo anao;
  - type: text
    content: tahaka ny hazo kipreso maitso Aho,
  - type: text
    content: avy Amiko no hahazoana ny vokatrao.
