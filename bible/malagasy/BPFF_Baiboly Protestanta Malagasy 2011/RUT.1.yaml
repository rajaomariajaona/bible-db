document_id: RUT.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mifindra monina any Moaba ny fianakavian’i Elimeleka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro nitondran’ny mpitsara dia nisy mosary teo amin’ny tany. Ary nisy lehilahy avy any Betleheman’i Joda nandeha nivahiny tany amin’ny tany Moaba, dia izy sy ny vadiny mbamin’ny zanany roa lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elimeleka no anaran-dRalehilahy, Naomy no anaran’ny vadiny, ary ny anaran’ny zanany roa lahy dia i Malòna sy i Kiliona; Efratita avy any Betleheman’i Joda izy ireo. Tonga tany amin’ny tany Moaba izy ka nitoetra tany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary maty i Elimeleka, vadin’i Naomy, ka izy sy ny zanany roa lahy ihany no sisa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary naka vady tamin’ny vehivavy moabita izy roa lahy: Orpa no anaran’ny iray, ary Rota no anaran’ny iray. Nitoetra tany Moaba tokony ho folo taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary maty koa izy mirahalahy, dia i Malòna sy i Kiliona, ka tavela irery Ravehivavy, namoy ny zanany roa lahy sy ny vadiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manapa-kevitra tsy hisaraka amin’i Naomy i Rota
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niainga izy sy ny vinantovaviny ka nody avy tany amin’ny tany Moaba. Fa reny tany amin’ny tany Moaba fa novangian’NY TOMPO ny olony ka nomeny hanina. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia niala tamin’izay nitoerany izy ary niaraka taminy ny vinantovaviny roa; nandeha hiverina any amin’ny tanin’ny Joda izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy i Naomy tamin’ny vinantovaviny roa: Andeha, samia mody any amin’ny tranon-dreninareo avy ianareo! NY TOMPO anie hanisy soa anareo araka izay nataonareo tamin’ny maty sy tamiko koa! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Homen’NY TOMPO tokantrano anie ianareo ka hahita fiadanana amin’izay tranon’ny vadinareo avy. Dia nanoroka azy i Naomy. Ary samy nanandratra ny feony izy roa vavy ka nitomany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izy roa vavy tamin’i Naomy: Tsia! Hiara-miverina aminao ho any amin’ny firenenao izahay! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy i Naomy: Mandehana miverena, anaka! Nahoana no hiara-mandeha amiko ianareo? Mbola misy zazalahy va ato an-kiboko mba ho vadinareo? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mandehana miverena, anaka! Fa efa antitra aho ka tsy hahazo vady intsony. Raha hoy aho: Mbola misy fanantenana ihany ho ahy, eny, na dia hanambady anio alina aza aho ka hiteraka zazalahy, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'moa hahandry azy mandra-pahalehibeny va ianareo ka hijanona tsy hanambady? Tsia, anaka! Fa mangidy lavitra ny manjo ahy noho ny manjo anareo, fa ny tanan’NY TOMPO no natsotrany hamely ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia samy nanandratra ny feony indray izy roa vavy ka nitomany. Ary nanoroka ny rafozany vavy i Orpa, fa i Rota kosa dia nifikitra taminy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy izy: Indro, ny rahavavinao dia lasa nody ho any amin’ny fireneny sy ny andriamaniny ka mba miverena koa ianao hanaraka ny rahavavinao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy anefa i Rota: Aza manery ahy handao anao sy hiverina tsy hanaraka anao! Izay alehanao no halehako, ary any amin’izay atorianao ho hatoriako; ny firenenao no ho fireneko, ary ny Andriamanitrao no ho Andriamanitro; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'izay tany hahafatesanao no hahafatesako, sady any koa no handevenana ahy; hataon’NY TOMPO amiko anie izany, eny, mihoatra noho izany aza, raha tsy ny fahafatesana ihany no hampisaraka antsika! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa hitany fa tapa-kevitra handeha hiaraka aminy i Rota dia nitsahatra tsy niteny taminy intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nandeha izy mianaka ka tonga tany Betlehema. Rehefa tonga tany Betlehema izy dia taitra ny iray tanàna manontolo nahita azy ka hoy ny vehivavy: I Naomy va re ity? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy izy taminy: Aza atao hoe Naomy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Naomy: Mahafinaritra.'
    marker-yv: yv-n
  - type: text
    text: ' intsony aho, fa ataovy hoe Mara'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mara: Mangidy.'
    marker-yv: yv-n
  - type: text
    text: ' satria mangidy loatra ny nataon’ny Tsitoha tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nivoaka nanam-be aho fa nampodìn’NY TOMPO ho tsy manana na inona na inona. Nahoana aho no mbola ataonareo hoe Naomy, nefa NY TOMPO nitsangana ho fahavaloko, ary ny Tsitoha nampahory ahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia niverina i Naomy sy i Rota vinantovaviny, vehivavy moabita, ilay niaraka taminy tamin’izy niverina avy tany amin’ny tany Moaba. Tonga tao Betlehema izy tamin’ny niandohan’ny taom-pijinjana ny varimbazaha.
