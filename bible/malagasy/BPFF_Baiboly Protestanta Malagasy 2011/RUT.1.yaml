document_id: RUT.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mifindra monina any Moaba ny fianakavian’i Elimeleka
  - type: text
    content: 'Tamin’ny andro nitondran’ny mpitsara dia nisy mosary teo amin’ny tany. Ary nisy lehilahy avy any Betleheman’i Joda nandeha nivahiny tany amin’ny tany Moaba, dia izy sy ny vadiny mbamin’ny zanany roa lahy. '
  '10':
  - type: text
    content: 'Dia hoy izy roa vavy tamin’i Naomy: Tsia! Hiara-miverina aminao ho any amin’ny firenenao izahay! '
  '11':
  - type: text
    content: 'Fa hoy i Naomy: Mandehana miverena, anaka! Nahoana no hiara-mandeha amiko ianareo? Mbola misy zazalahy va ato an-kiboko mba ho vadinareo? '
  '12':
  - type: text
    content: 'Mandehana miverena, anaka! Fa efa antitra aho ka tsy hahazo vady intsony. Raha hoy aho: Mbola misy fanantenana ihany ho ahy, eny, na dia hanambady anio alina aza aho ka hiteraka zazalahy, '
  '13':
  - type: text
    content: 'moa hahandry azy mandra-pahalehibeny va ianareo ka hijanona tsy hanambady? Tsia, anaka! Fa mangidy lavitra ny manjo ahy noho ny manjo anareo, fa ny tanan’NY TOMPO no natsotrany hamely ahy. '
  '14':
  - type: text
    content: Dia samy nanandratra ny feony indray izy roa vavy ka nitomany. Ary nanoroka ny rafozany vavy i Orpa, fa i Rota kosa dia nifikitra taminy ihany.
  '15':
  - type: text
    content: 'Hoy izy: Indro, ny rahavavinao dia lasa nody ho any amin’ny fireneny sy ny andriamaniny ka mba miverena koa ianao hanaraka ny rahavavinao. '
  '16':
  - type: text
    content: 'Hoy anefa i Rota: Aza manery ahy handao anao sy hiverina tsy hanaraka anao! Izay alehanao no halehako, ary any amin’izay atorianao ho hatoriako; ny firenenao no ho fireneko, ary ny Andriamanitrao no ho Andriamanitro; '
  '17':
  - type: text
    content: 'izay tany hahafatesanao no hahafatesako, sady any koa no handevenana ahy; hataon’NY TOMPO amiko anie izany, eny, mihoatra noho izany aza, raha tsy ny fahafatesana ihany no hampisaraka antsika! '
  '18':
  - type: text
    content: 'Rehefa hitany fa tapa-kevitra handeha hiaraka aminy i Rota dia nitsahatra tsy niteny taminy intsony izy. '
  '19':
  - type: text
    content: 'Dia nandeha izy mianaka ka tonga tany Betlehema. Rehefa tonga tany Betlehema izy dia taitra ny iray tanàna manontolo nahita azy ka hoy ny vehivavy: I Naomy va re ity? '
  '2':
  - type: text
    content: 'Elimeleka no anaran-dRalehilahy, Naomy no anaran’ny vadiny, ary ny anaran’ny zanany roa lahy dia i Malòna sy i Kiliona; Efratita avy any Betleheman’i Joda izy ireo. Tonga tany amin’ny tany Moaba izy ka nitoetra tany. '
  '20':
  - type: text
    content: 'Fa hoy izy taminy: Aza atao hoe Naomy'
  - type: note
    content: 'Naomy: Mahafinaritra.'
  - type: text
    content: ' intsony aho, fa ataovy hoe Mara'
  - type: note
    content: 'Mara: Mangidy.'
  - type: text
    content: ' satria mangidy loatra ny nataon’ny Tsitoha tamiko. '
  '21':
  - type: text
    content: Nivoaka nanam-be aho fa nampodìn’NY TOMPO ho tsy manana na inona na inona. Nahoana aho no mbola ataonareo hoe Naomy, nefa NY TOMPO nitsangana ho fahavaloko, ary ny Tsitoha nampahory ahy?
  '22':
  - type: text
    content: Dia niverina i Naomy sy i Rota vinantovaviny, vehivavy moabita, ilay niaraka taminy tamin’izy niverina avy tany amin’ny tany Moaba. Tonga tao Betlehema izy tamin’ny niandohan’ny taom-pijinjana ny varimbazaha.
  '3':
  - type: text
    content: 'Ary maty i Elimeleka, vadin’i Naomy, ka izy sy ny zanany roa lahy ihany no sisa. '
  '4':
  - type: text
    content: 'Ary naka vady tamin’ny vehivavy moabita izy roa lahy: Orpa no anaran’ny iray, ary Rota no anaran’ny iray. Nitoetra tany Moaba tokony ho folo taona izy. '
  '5':
  - type: text
    content: Ary maty koa izy mirahalahy, dia i Malòna sy i Kiliona, ka tavela irery Ravehivavy, namoy ny zanany roa lahy sy ny vadiny.
  - type: heading
    content: Manapa-kevitra tsy hisaraka amin’i Naomy i Rota
  '6':
  - type: text
    content: 'Dia niainga izy sy ny vinantovaviny ka nody avy tany amin’ny tany Moaba. Fa reny tany amin’ny tany Moaba fa novangian’NY TOMPO ny olony ka nomeny hanina. '
  '7':
  - type: text
    content: Dia niala tamin’izay nitoerany izy ary niaraka taminy ny vinantovaviny roa; nandeha hiverina any amin’ny tanin’ny Joda izy ireo.
  '8':
  - type: text
    content: 'Ary hoy i Naomy tamin’ny vinantovaviny roa: Andeha, samia mody any amin’ny tranon-dreninareo avy ianareo! NY TOMPO anie hanisy soa anareo araka izay nataonareo tamin’ny maty sy tamiko koa! '
  '9':
  - type: text
    content: 'Homen’NY TOMPO tokantrano anie ianareo ka hahita fiadanana amin’izay tranon’ny vadinareo avy. Dia nanoroka azy i Naomy. Ary samy nanandratra ny feony izy roa vavy ka nitomany. '
