type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Tsy voatonona anarana ato amin’ny Filazantsara ny mpanoratra, fa Irénée, eveka, isan’ireo Rain’ny Fiangonana tamin’ny taonjato faharoa, dia tsy nisalasala nilaza fa i Jaona apostoly no mpanoratra, ary izy no ilay mpianatra iray nipetraka nihinana teo anilan’i Jesosy, ary izy koa ilay mpianatra vavolombelona manambara izany sy nanoratra izany.
  - type: text
    content: Araka an’ny eveka Irénée ihany dia tany Efesosy i Jaona no nanoratra ity Filazantsara ity. Satria miteny matetika ny «Jiosy» ny mpanoratra dia heverina fa tsy any Palestina ny olona anoratany fa mety ho Fiangonana kristiana any Azia Minora.
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Miavaka amin’ny Filazantsara telo voalohany ity Filazantsara fahefatra ity. Hatrany am-piandohana dia ambara fa Jesosy no Tenin’Andriamanitra tonga nofo. Afa-tsy ny tantaran’ny fijaliana dia vitsy ihany ny tantara voalaza ao amin’ny Filazantsara telo no hita ato.
  - type: text
    content: Fito ihany ny fahagagana nataon’i Jesosy no tantaraina ato, ary izy rehetra dia ambara fa famantarana izay nanehoan’i Jesosy ny voninahiny mba hinoan’ny olona fa Izy no Zanak’Andriamanitra.
  - type: text
    content: Ny 20.31 no milaza izay nokendrena tamin’ny nanoratana ny Boky, dia ny mba hinoan’ny mpamaky fa Jesosy no Kristy, Zanak’Andriamanitra, ary mba hananany fiainana raha mino izy.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Fitarihanteny: 1.1-18'
  - type: text
    content: 'I Jaona Mpanao batisa sy ny mpianatra voalohany: 1.19-51'
  - type: text
    content: 'Ireo asa famantarana nataon’i Jesosy: 2.1–12.50'
  - type: text
    content: 'Ny didim-pananana navelan’i Jesosy: 13–17'
  - type: text
    content: 'Ny tantaran’ny fijaliana: 18–20'
  - type: text
    content: 'Famaranana: Fisehoan’i Jesosy tany Galilia: 21'
