document_id: MAT.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nakan’ny devoly fanahy an’i Jesosy
  - type: heading
    content: Mar 1.12-13; Lio 4.1-13
  - type: text
    content: 'Ary Jesosy dia noentin’ny Fanahy nankany an-tany efitra mba halain’ny '
  - type: text
    content: devoly
  - type: text
    content: ' fanahy. '
  '10':
  - type: text
    content: 'Fa hoy Jesosy taminy: Mandehana ianao, ry Satana: Fa voasoratra hoe: «NY TOMPO Andriamanitrao no hiankohofanao ary Izy irery ihany no hotompoinao.» (Deo 6.13)'
  '11':
  - type: text
    content: Dia nandao Azy ny devoly, ary indreo, nisy anjely tonga ka nanompo Azy.
  - type: heading
    content: Jesosy nihataka nankany Galilia
  - type: heading
    content: Mar 1.14-15; Lio 4.14-15; ampit. Jao 4.1-3, 43-46
  '12':
  - type: text
    content: 'Nony ren’i Jesosy fa voasambotra i Jaona dia nihataka nankany Galilia Izy. '
  '13':
  - type: text
    content: 'Koa rehefa niala tany Nazareta Izy dia nankany Kapernaomy, izay any amoron-dranomasina, ao amin’ny zaratanin’ny Zebolona sy ny Naftaly ka nonina tao '
  '14':
  - type: text
    content: 'mba hahatanteraka izay nampilazaina an’Isaia mpaminany hoe:'
  '15':
  - type: text
    content: «Ny tanin’i Zebolona sy ny tanin’i Naftaly,
  - type: text
    content: ny lalan’ny ranomasina, any andafin’i Jordana,
  - type: text
    content: 'dia Galilia, tanin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ','
  '16':
  - type: text
    content: ny olona izay nitoetra tao amin’ny maizina dia nahita mazava lehibe;
  - type: text
    content: ary ireo izay nitoetra tao amin’ny tany aloky ny fahafatesana no niposahan’ny fahazavana» (Isa 8.23; 9.1).
  '17':
  - type: text
    content: 'Tamin’izany andro izany no nanomboka nitoriteny Jesosy ka nilaza hoe: Mibebaha ianareo fa efa akaiky ny fanjakan’ny lanitra.'
  - type: heading
    content: Ireo mpianatra efatra voalohany
  - type: heading
    content: Mar 1.16-20; ampit. Lio 5.1-11; Jao 1.35-51
  '18':
  - type: text
    content: 'Raha nitsangantsangana teny amoron’ny ranomasin’i Galilia Jesosy dia nahita olona mirahalahy, dia i Simona, izay atao hoe: Petera, sy i Andrea rahalahiny, nanarato teny amin’ny ranomasina izy ireo fa mpanarato. '
  '19':
  - type: text
    content: 'Hoy Jesosy tamin’izy ireo: Andeha hanaraka Ahy fa hataoko mpanarato olona ianareo. '
  '2':
  - type: text
    content: 'Nifady hanina efapolo andro sy efapolo alina Izy, koa nony afaka izany dia noana. '
  '20':
  - type: text
    content: 'Dia nandao ny harato niaraka tamin’izay izy ireo ka nanaraka Azy. '
  '21':
  - type: text
    content: 'Ary raha mbola nandroso Izy dia nahita olona mirahalahy hafa koa, dia i Jakoba, zanak’i Zebedio, sy i Jaona, rahalahiny, izay niara-nipetraka tamin’i Zebedio rainy teo an-tsambokely ka nanamboatra ny haratony; ary niantso azy mirahalahy koa Izy. '
  '22':
  - type: text
    content: Dia nandao ny sambokely sy ny rainy niaraka tamin’izay izy ireo ka nanaraka Azy.
  - type: heading
    content: Jesosy nampianatra, nitory ny Filazantsara ary nanasitrana ny marary
  - type: heading
    content: Mar 1.39; Lio 4.44; 6.17-18
  '23':
  - type: text
    content: Ary Jesosy nandeha manerana an’i Galilia ka nampianatra tao amin’ny sinagogan’ny olona teo sy nitory ny Filazantsaran’ny fanjakana ary nanasitrana ny aretina rehetra mbamin’ny rofy rehetra tamin’ny olona.
  '24':
  - type: text
    content: 'Dia niely manerana an’i Siria ny lazany ka noentin’ny olona tany Aminy ny marary rehetra izay azon’ny aretina maro samihafa sy ireo nampahorin’ny adin-tsaina, dia ny demoniaka sy izay mararin’ny androbe ary ny malemy, ary nahasitrana ireny Izy. '
  '25':
  - type: text
    content: 'Dia nanaraka Azy ny vahoaka betsaka avy any Galilia, Dekapolisy, Jerosalema, '
  - type: text
    content: Jodia
  - type: text
    content: ' ary ny avy any andafin’i Jordana.'
  '3':
  - type: text
    content: 'Dia nanatona ny mpaka fanahy ka niteny Taminy hoe: Raha Zanak’Andriamanitra Ianao, teneno ho tonga mofo ireto vato ireto. '
  '4':
  - type: text
    content: 'Fa Izy kosa namaly hoe: Voasoratra hoe: «Tsy mofo ihany no hiveloman’ny olona, fa ny teny rehetra izay aloaky ny vavan’Andriamanitra» (Deo 8.3).'
  '5':
  - type: text
    content: 'Dia nitondra Azy nankany amin’ny tanàna masina indray ny devoly ka nampitoetra Azy teo an-tampon’ny tempoly '
  '6':
  - type: text
    content: 'sady niteny Taminy hoe: Raha Zanak’Andriamanitra Ianao, mianjerà any ambany any; fa voasoratra hoe:'
  - type: text
    content: «Izy handidy ny anjeliny ny Aminao;
  - type: text
    content: ary eny an-tanany no hitondran’ireo Anao,
  - type: text
    content: fandrao ho tafintohina amin’ny vato ny tongotrao» (Sal 91.11, 12).
  '7':
  - type: text
    content: 'Hoy Jesosy taminy: Voasoratra koa hoe: «Aza maka fanahy NY TOMPO Andriamanitrao.»'
  '8':
  - type: text
    content: 'Ary nitondra Azy nankany an-tendrombohitra avo dia avo indray ny devoly ka naneho Azy ny fanjakana rehetra eo amin’izao tontolo izao mbamin’ny voninahiny '
  '9':
  - type: text
    content: 'sady niteny Taminy hoe: Homeko Anao izao rehetra izao raha miankohoka eto anatrehako Ianao. '
