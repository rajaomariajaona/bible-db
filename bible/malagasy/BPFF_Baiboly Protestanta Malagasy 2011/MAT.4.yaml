document_id: MAT.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nakan’ny devoly fanahy an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 1.12-13; Lio 4.1-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jesosy dia noentin’ny Fanahy nankany an-tany efitra mba halain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nifady hanina efapolo andro sy efapolo alina Izy, koa nony afaka izany dia noana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nanatona ny mpaka fanahy ka niteny Taminy hoe: Raha Zanak’Andriamanitra Ianao, teneno ho tonga mofo ireto vato ireto. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Izy kosa namaly hoe: Voasoratra hoe: «Tsy mofo ihany no hiveloman’ny olona, fa ny teny rehetra izay aloaky ny vavan’Andriamanitra» (Deo 8.3).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nitondra Azy nankany amin’ny tanàna masina indray ny devoly ka nampitoetra Azy teo an-tampon’ny tempoly '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'sady niteny Taminy hoe: Raha Zanak’Andriamanitra Ianao, mianjerà any ambany any; fa voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Izy handidy ny anjeliny ny Aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eny an-tanany no hitondran’ireo Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao ho tafintohina amin’ny vato ny tongotrao» (Sal 91.11, 12).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy Jesosy taminy: Voasoratra koa hoe: «Aza maka fanahy NY TOMPO Andriamanitrao.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nitondra Azy nankany an-tendrombohitra avo dia avo indray ny devoly ka naneho Azy ny fanjakana rehetra eo amin’izao tontolo izao mbamin’ny voninahiny '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'sady niteny Taminy hoe: Homeko Anao izao rehetra izao raha miankohoka eto anatrehako Ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy Jesosy taminy: Mandehana ianao, ry Satana: Fa voasoratra hoe: «NY TOMPO Andriamanitrao no hiankohofanao ary Izy irery ihany no hotompoinao.» (Deo 6.13)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nandao Azy ny devoly, ary indreo, nisy anjely tonga ka nanompo Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy nihataka nankany Galilia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 1.14-15; Lio 4.14-15; ampit. Jao 4.1-3, 43-46
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony ren’i Jesosy fa voasambotra i Jaona dia nihataka nankany Galilia Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa rehefa niala tany Nazareta Izy dia nankany Kapernaomy, izay any amoron-dranomasina, ao amin’ny zaratanin’ny Zebolona sy ny Naftaly ka nonina tao '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'mba hahatanteraka izay nampilazaina an’Isaia mpaminany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Ny tanin’i Zebolona sy ny tanin’i Naftaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lalan’ny ranomasina, any andafin’i Jordana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia Galilia, tanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ny olona izay nitoetra tao amin’ny maizina dia nahita mazava lehibe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ireo izay nitoetra tao amin’ny tany aloky ny fahafatesana no niposahan’ny fahazavana» (Isa 8.23; 9.1).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin’izany andro izany no nanomboka nitoriteny Jesosy ka nilaza hoe: Mibebaha ianareo fa efa akaiky ny fanjakan’ny lanitra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpianatra efatra voalohany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 1.16-20; ampit. Lio 5.1-11; Jao 1.35-51
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha nitsangantsangana teny amoron’ny ranomasin’i Galilia Jesosy dia nahita olona mirahalahy, dia i Simona, izay atao hoe: Petera, sy i Andrea rahalahiny, nanarato teny amin’ny ranomasina izy ireo fa mpanarato. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hoy Jesosy tamin’izy ireo: Andeha hanaraka Ahy fa hataoko mpanarato olona ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nandao ny harato niaraka tamin’izay izy ireo ka nanaraka Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary raha mbola nandroso Izy dia nahita olona mirahalahy hafa koa, dia i Jakoba, zanak’i Zebedio, sy i Jaona, rahalahiny, izay niara-nipetraka tamin’i Zebedio rainy teo an-tsambokely ka nanamboatra ny haratony; ary niantso azy mirahalahy koa Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nandao ny sambokely sy ny rainy niaraka tamin’izay izy ireo ka nanaraka Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy nampianatra, nitory ny Filazantsara ary nanasitrana ny marary
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 1.39; Lio 4.44; 6.17-18
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary Jesosy nandeha manerana an’i Galilia ka nampianatra tao amin’ny sinagogan’ny olona teo sy nitory ny Filazantsaran’ny fanjakana ary nanasitrana ny aretina rehetra mbamin’ny rofy rehetra tamin’ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia niely manerana an’i Siria ny lazany ka noentin’ny olona tany Aminy ny marary rehetra izay azon’ny aretina maro samihafa sy ireo nampahorin’ny adin-tsaina, dia ny demoniaka sy izay mararin’ny androbe ary ny malemy, ary nahasitrana ireny Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nanaraka Azy ny vahoaka betsaka avy any Galilia, Dekapolisy, Jerosalema, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' ary ny avy any andafin’i Jordana.'
