document_id: AMO.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fahitana fahefatra: Ny harona feno voankazo masaka'
  - type: text
    content: 'Izao no nasehon’NY TOMPO Andriamanitra tamiko: Indro, nisy harona feno voankazo masaka fahavaratra. '
  '10':
  - type: text
    content: Hampodiko ho fisaonana ny andro firavoravoanareo
  - type: text
    content: ary ho hira fahalahelovana ny hiranareo rehetra;
  - type: text
    content: hosikinako lamba fisaonana ny olona rehetra
  - type: text
    content: sady hokakasako ny loha rehetra;
  - type: text
    content: hataoko ho toy ny fisaonana zanakalahy tokana izany
  - type: text
    content: ka ny fiafarany dia ho tahaka ny andro mangidy.
  '11':
  - type: text
    content: Indro, avy ny andro,
  - type: text
    content: hoy NY TOMPO Andriamanitra,
  - type: text
    content: izay handefasako mosary amin’ny tany;
  - type: text
    content: tsy mosarin-tsakafo anefa,
  - type: text
    content: na hetahetan-drano,
  - type: text
    content: fa hetaheta handre ny tenin’NY TOMPO.
  '12':
  - type: text
    content: Hivembena hatrany amin’ny ranomasina iray ka hatrany amin’ny ranomasina iray ny olona,
  - type: text
    content: hatrany avaratra ka hatrany atsinanana.
  - type: text
    content: Eny, hivezivezy hitady ny tenin’NY TOMPO izy
  - type: text
    content: nefa tsy hahita.
  '13':
  - type: text
    content: Amin’izany andro izany dia ho malemy noho ny hetaheta
  - type: text
    content: ny tovovavy tsara tarehy sy ny tovolahy,
  '14':
  - type: text
    content: dia ireo izay mianiana amin’ny helok’i Samaria
  - type: text
    content: 'ka miteny hoe: Raha velona koa ny andriamanitrao, ry Dana!'
  - type: text
    content: Raha velona koa ny fanaon’i Bery-Sheba!
  - type: text
    content: Ho lavo anefa izy ireo ka tsy hiarina intsony.
  '2':
  - type: text
    content: 'Hoy Izy: Inona no hitanao, ry Amosa? Dia hoy aho: Harona feno voankazo masaka fahavaratra. Dia hoy NY TOMPO tamiko:'
  - type: text
    content: Tonga amin’ny Israely oloko ny farany;
  - type: text
    content: tsy handefitra aminy intsony Aho.
  '3':
  - type: text
    content: Ho tonga fitarainana ny hira ao amin’ny tempoly amin’izany andro izany,
  - type: text
    content: hoy NY TOMPO Andriamanitra.
  - type: text
    content: Ho be ny faty
  - type: text
    content: ka eny rehetra eny no hanipazana azy.
  - type: text
    content: Mangìna re!
  - type: heading
    content: Ny fisolokian’ireo mpivarotra
  '4':
  - type: text
    content: Mihainoa izao, ianareo izay miandry izay hitelemana ny mahantra
  - type: text
    content: sy ta hanafongana ireo tsy manam-piaro eto amin’ny tany!
  '5':
  - type: text
    content: 'Hoy ianareo: Rahoviana no ho tapitra ny maizim-pito'
  - type: text
    content: mba hivarotantsika vary,
  - type: text
    content: ary ny Sabata mba hanokafantsika ny fitoeram-bary
  - type: text
    content: 'ka hanakelezana ny '
  - type: text
    content: efaha
  - type: text
    content: ' sy hanalehibiazana ny sekela'
  - type: note
    content: 'Hanalehibiazana ny sekela: mba hampiakarana ny vidin-javatra.'
  - type: text
    content: ary hanaovana mizana mandainga,
  '6':
  - type: text
    content: ka hividianantsika ny mahantra amin’ny volafotsy,
  - type: text
    content: sy ny sahirana amin’ny kapan’olona iray
  - type: text
    content: ary hivarotantsika ny akofam-bary?
  '7':
  - type: text
    content: 'NY TOMPO nianiana tamin’ny reharehan’i Jakoba hoe:'
  - type: text
    content: Tsy hisy hohadinoiko mandrakizay ny asany na dia iray akory aza!
  '8':
  - type: text
    content: Tsy hihorohoro noho izany va ny tany?
  - type: text
    content: Tsy hitomany va ny mponina rehetra ao aminy?
  - type: text
    content: Eny, hisondrotra tahaka an’i Neily ny tany rehetra
  - type: text
    content: ary hihena indray toy ny Neilin’i Ejipta.
  - type: heading
    content: Ho andro fisaonana Ny Andron’NY TOMPO
  '9':
  - type: text
    content: Amin’izany andro izany, hoy NY TOMPO Andriamanitra,
  - type: text
    content: dia halentiko mitataovovonana ny masoandro
  - type: text
    content: ary hohamaiziniko antoandrobenanahary ny tany.
