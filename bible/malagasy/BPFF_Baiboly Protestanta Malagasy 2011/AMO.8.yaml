document_id: AMO.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fahitana fahefatra: Ny harona feno voankazo masaka'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no nasehon’NY TOMPO Andriamanitra tamiko: Indro, nisy harona feno voankazo masaka fahavaratra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy Izy: Inona no hitanao, ry Amosa? Dia hoy aho: Harona feno voankazo masaka fahavaratra. Dia hoy NY TOMPO tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tonga amin’ny Israely oloko ny farany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy handefitra aminy intsony Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho tonga fitarainana ny hira ao amin’ny tempoly amin’izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho be ny faty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka eny rehetra eny no hanipazana azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangìna re!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fisolokian’ireo mpivarotra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mihainoa izao, ianareo izay miandry izay hitelemana ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ta hanafongana ireo tsy manam-piaro eto amin’ny tany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ianareo: Rahoviana no ho tapitra ny maizim-pito'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hivarotantsika vary,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Sabata mba hanokafantsika ny fitoeram-bary
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hanakelezana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efaha
  - type: text
    text: ' sy hanalehibiazana ny sekela'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hanalehibiazana ny sekela: mba hampiakarana ny vidin-javatra.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanaovana mizana mandainga,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ka hividianantsika ny mahantra amin’ny volafotsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny sahirana amin’ny kapan’olona iray
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hivarotantsika ny akofam-bary?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'NY TOMPO nianiana tamin’ny reharehan’i Jakoba hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy hohadinoiko mandrakizay ny asany na dia iray akory aza!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy hihorohoro noho izany va ny tany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hitomany va ny mponina rehetra ao aminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hisondrotra tahaka an’i Neily ny tany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihena indray toy ny Neilin’i Ejipta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ho andro fisaonana Ny Andron’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amin’izany andro izany, hoy NY TOMPO Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia halentiko mitataovovonana ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hohamaiziniko antoandrobenanahary ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hampodiko ho fisaonana ny andro firavoravoanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho hira fahalahelovana ny hiranareo rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hosikinako lamba fisaonana ny olona rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hokakasako ny loha rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hataoko ho toy ny fisaonana zanakalahy tokana izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny fiafarany dia ho tahaka ny andro mangidy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, avy ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay handefasako mosary amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mosarin-tsakafo anefa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hetahetan-drano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hetaheta handre ny tenin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hivembena hatrany amin’ny ranomasina iray ka hatrany amin’ny ranomasina iray ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrany avaratra ka hatrany atsinanana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hivezivezy hitady ny tenin’NY TOMPO izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy hahita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Amin’izany andro izany dia ho malemy noho ny hetaheta
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tovovavy tsara tarehy sy ny tovolahy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia ireo izay mianiana amin’ny helok’i Samaria
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka miteny hoe: Raha velona koa ny andriamanitrao, ry Dana!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha velona koa ny fanaon’i Bery-Sheba!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lavo anefa izy ireo ka tsy hiarina intsony.
