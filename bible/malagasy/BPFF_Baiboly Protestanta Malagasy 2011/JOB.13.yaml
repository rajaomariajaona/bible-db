document_id: JOB.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny teny navalin’i Joba (tohiny): Mitady fifanatrehana amin’Andriamanitra izy'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro izany rehetra izany dia efa hitan’ny masoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa ren’ny sofiko ka azony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izay fantatrareo dia mba fantatro koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy latsaka noho ianareo aho tsy akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa raha izaho dia ny Tsitoha no tiako hitenenana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Andriamanitra no iriko handaharan-teny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ianareo kosa dia mpamoron-dainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mpitsabo tsy mahomby ianareo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha mba nangina tanteraka ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fahendrenareo izany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miangavy anareo aho, henoy ny anatro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tandremo izay alahatry ny molotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hanao teny tsy marina hoenti-manamarina an’Andriamanitra va ianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiteny fitaka ho Azy va ianareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hiangatra va ianareo ka hiandany Aminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handaha-teny ho an’Andriamanitra va ianareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho tsara aminareo va raha mandinika anareo Izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa ho azonareo fitahina ohatra ny famitaka zanak’olombelona va Izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hanameloka anareo mihitsy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha miangatra ao amin’ny mangingina ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy hampahatahotra anareo va ny fahalehibiazany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hianjera aminareo va ny fahatahorana Azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ireo teny tononinareo ireo dia ohabolana lavenona foana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manda fotaka ihany ny mandanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mangìna ka mialà amiko ianareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mba hiteny aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa aoka hanjo ahy ihany izay hanjo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nahoana no hitondra ny nofoko amin’ny nifiko aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanaovako ny aiko tsy ho zavatra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Na dia hamono ahy aza Izy dia mbola hanantena Azy ihany aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa hanamarina ny lalako eo anatrehany aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary izany no ho famonjena ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny mpihatsaravelatsihy dia tsy ho sahy hankeo anatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Henoy tsara ny teniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho ren’ny sofinareo ny fanazavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indro, efa nalahatro ny adiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fantatro fa hanan-drariny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Iza no hifandahatra amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izao dia hangina aho ka hiala aina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izao zavatra roa loha izao ihany no aza mba atao amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia tsy hiery Anao aho:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Esory lavitra ahy ny tananao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy hampihorohoro ahy ny fampitahorana avy Aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia miantsoa fa hamaly aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na izaho no hiteny dia Ianao no hamaly ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Firy ary ny heloko sy ny fahotako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ampahafantaro ahy izay fikomiako sy izay fahotako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nahoana no manafina ny tavanao Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manao ahy ho fahavalonao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Moa izay ravin-kazo indaosin’ny rivotra avy va no ampitahorinao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay vodivary maina avy va no enjehinao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa zava-mangidy no tendrenao hamely ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ampanodiavinao ahy ny heloky ny fahatanorako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mampiditra ny tongotro eo amin’ny boloky hazo Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitsongo ny diako rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady alainao marika ny dian-tongotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia izaho ity izay mihalevona tahaka ny zavatra lanin’ny fositra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tahaka ny akanjo lanin’ny koroka.
