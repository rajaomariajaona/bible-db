document_id: JOB.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba (tohiny): Mitady fifanatrehana amin’Andriamanitra izy'
  - type: text
    content: Indro izany rehetra izany dia efa hitan’ny masoko
  - type: text
    content: ary efa ren’ny sofiko ka azony.
  '10':
  - type: text
    content: Hanameloka anareo mihitsy Izy
  - type: text
    content: raha miangatra ao amin’ny mangingina ianareo.
  '11':
  - type: text
    content: Tsy hampahatahotra anareo va ny fahalehibiazany?
  - type: text
    content: Ary tsy hianjera aminareo va ny fahatahorana Azy?
  '12':
  - type: text
    content: Ireo teny tononinareo ireo dia ohabolana lavenona foana
  - type: text
    content: ary manda fotaka ihany ny mandanareo.
  '13':
  - type: text
    content: Mangìna ka mialà amiko ianareo!
  - type: text
    content: Fa mba hiteny aho,
  - type: text
    content: koa aoka hanjo ahy ihany izay hanjo ahy.
  '14':
  - type: text
    content: Nahoana no hitondra ny nofoko amin’ny nifiko aho
  - type: text
    content: ka hanaovako ny aiko tsy ho zavatra?
  '15':
  - type: text
    content: Na dia hamono ahy aza Izy dia mbola hanantena Azy ihany aho,
  - type: text
    content: kanefa hanamarina ny lalako eo anatrehany aho.
  '16':
  - type: text
    content: Ary izany no ho famonjena ahy
  - type: text
    content: satria ny mpihatsaravelatsihy dia tsy ho sahy hankeo anatrehany.
  '17':
  - type: text
    content: Henoy tsara ny teniko
  - type: text
    content: ary aoka ho ren’ny sofinareo ny fanazavako.
  '18':
  - type: text
    content: Indro, efa nalahatro ny adiko;
  - type: text
    content: fantatro fa hanan-drariny aho.
  '19':
  - type: text
    content: Iza no hifandahatra amiko?
  - type: text
    content: Fa izao dia hangina aho ka hiala aina.
  '2':
  - type: text
    content: Izay fantatrareo dia mba fantatro koa;
  - type: text
    content: tsy latsaka noho ianareo aho tsy akory.
  '20':
  - type: text
    content: Izao zavatra roa loha izao ihany no aza mba atao amiko
  - type: text
    content: 'dia tsy hiery Anao aho:'
  '21':
  - type: text
    content: Esory lavitra ahy ny tananao
  - type: text
    content: ary aoka tsy hampihorohoro ahy ny fampitahorana avy Aminao.
  '22':
  - type: text
    content: Dia miantsoa fa hamaly aho;
  - type: text
    content: na izaho no hiteny dia Ianao no hamaly ahy.
  '23':
  - type: text
    content: Firy ary ny heloko sy ny fahotako?
  - type: text
    content: Mba ampahafantaro ahy izay fikomiako sy izay fahotako.
  '24':
  - type: text
    content: Nahoana no manafina ny tavanao Ianao
  - type: text
    content: ka manao ahy ho fahavalonao?
  '25':
  - type: text
    content: Moa izay ravin-kazo indaosin’ny rivotra avy va no ampitahorinao?
  - type: text
    content: Ary izay vodivary maina avy va no enjehinao?
  '26':
  - type: text
    content: Fa zava-mangidy no tendrenao hamely ahy
  - type: text
    content: ka ampanodiavinao ahy ny heloky ny fahatanorako.
  '27':
  - type: text
    content: Mampiditra ny tongotro eo amin’ny boloky hazo Ianao
  - type: text
    content: ary mitsongo ny diako rehetra
  - type: text
    content: sady alainao marika ny dian-tongotro.
  '28':
  - type: text
    content: Dia izaho ity izay mihalevona tahaka ny zavatra lanin’ny fositra;
  - type: text
    content: eny, tahaka ny akanjo lanin’ny koroka.
  '3':
  - type: text
    content: Kanefa raha izaho dia ny Tsitoha no tiako hitenenana
  - type: text
    content: ary Andriamanitra no iriko handaharan-teny.
  '4':
  - type: text
    content: Fa ianareo kosa dia mpamoron-dainga,
  - type: text
    content: mpitsabo tsy mahomby ianareo rehetra.
  '5':
  - type: text
    content: Raha mba nangina tanteraka ianareo
  - type: text
    content: dia ho fahendrenareo izany!
  '6':
  - type: text
    content: Miangavy anareo aho, henoy ny anatro
  - type: text
    content: ary tandremo izay alahatry ny molotro.
  '7':
  - type: text
    content: Hanao teny tsy marina hoenti-manamarina an’Andriamanitra va ianareo?
  - type: text
    content: Hiteny fitaka ho Azy va ianareo?
  '8':
  - type: text
    content: Hiangatra va ianareo ka hiandany Aminy?
  - type: text
    content: Handaha-teny ho an’Andriamanitra va ianareo?
  '9':
  - type: text
    content: Ho tsara aminareo va raha mandinika anareo Izy?
  - type: text
    content: Sa ho azonareo fitahina ohatra ny famitaka zanak’olombelona va Izy?
