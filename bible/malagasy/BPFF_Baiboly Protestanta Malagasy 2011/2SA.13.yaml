document_id: 2SA.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Amnona sy i Tamara
  - type: text
    content: 'Nony afaka izany dia izao no nitranga: Nanana anabavy tsara tarehy i Absaloma, zanak’i Davida, Tamara no anarany; ary tia azy i Amnona, zanak’i Davida. '
  '10':
  - type: text
    content: 'Ary hoy i Amnona tamin’i Tamara: Ento atỳ an’efitrano ny sakafo hihinanako ny avy eny an-tananao. Dia nalain’i Tamara ny mofo nataony ka noentiny tao amin’ny efitrano tao amin’i Amnona anadahiny. '
  '11':
  - type: text
    content: 'Nony noentiny tao aminy hohaniny izany dia nihazona an’i Tamara izy ka niteny taminy hoe: Avia handry amiko, Ranabaviko. '
  '12':
  - type: text
    content: 'Ary hoy ny anabaviny: Sanatria, Ranadahy! Aza misavika ahy fa tsy fanao eto amin’ny Israely izany; aza manao izany hadalana izany ianao. '
  '13':
  - type: text
    content: 'Ary ny amiko, hoentiko aiza moa ny henatro? Ianao koa dia ho toy ny iray amin’ny adala eto amin’ny Israely. Koa trara antitra ianao, lazao amin’ny mpanjaka; fa tsy hisakana ahy tsy ho anao izy. '
  '14':
  - type: text
    content: 'Nefa tsy nety nihaino ny feon-dRazazavavy izy fa natanjaka noho izy; dia nanolana azy izy ka nandry taminy. '
  '15':
  - type: text
    content: 'Dia tonga halan’i Amnona indrindra izy ka ny fankahalany azy dia be lavitra noho ny fitiavany azy taloha. Dia hoy i Amnona taminy: Mitsangàna, mandehana! '
  '16':
  - type: text
    content: 'Ary hoy izy taminy: Aza dia manao ratsy mandroaka ahy ianao fa ratsy noho ny zavatra hafa nataonao izao. Nefa tsy nety nihaino azy izy. '
  '17':
  - type: text
    content: 'Dia niantso ny zatovony izay nanompo azy izy ka niteny hoe: Esory hiala eto amiko ity vehivavy ity ka hidio ny varavarana rehefa tafavoaka izy! '
  '18':
  - type: text
    content: 'Niakanjo akanjo misoratsoratra Razazavavy; fa izany no fanaon’ny zanakavavin’ny mpanjaka ho akanjo ambony, raha mbola virijiny izy. Dia navoakan’ilay mpanompon’i Amnona izy ka nohidiny ny varavarana nony tafavoaka izy. '
  '19':
  - type: text
    content: 'Ary nasian’i Tamara lavenona ny lohany sady notriariny ny akanjo misoratsoratra izay nanaovany; dia niloloha tanana izy sady nitomany nidradradradra teny am-pandehanana. '
  '2':
  - type: text
    content: 'Nararim-pitia noho ny amin’i Tamara anabaviny i Amnona, satria virijiny izy ka sarotra tamin’i Amnona ny haka azy. '
  '20':
  - type: text
    content: 'Hoy i Absaloma anadahiny taminy: Efa niaraka taminao va i Amnona anadahinao? Mangìna ihany aloha, Ranabavy, fa anadahinao izy; fa aza malahelo noho izany. Dia nitoetra tao an-tranon’i Absaloma anadahiny i Tamara sady ory.'
  '21':
  - type: text
    content: 'Nony ren’i Davida mpanjaka kosa izany zavatra rehetra izany dia nirehitra ny fahatezerany. '
  '22':
  - type: text
    content: Ary tsy niteny na inona na inona intsony tamin’i Amnona rahalahiny i Absaloma satria halan’i Absaloma izy noho ny nanolanany an’i Tamara anabaviny.
  - type: heading
    content: Mampamono an’i Amnona i Absaloma ary nandositra avy eo
  '23':
  - type: text
    content: 'Nony afaka roa taona dia nampanety ondry teo Baala-Hazora ao akaikin’i Efraima i Absaloma ka nanasa ny zanakalahin’ny mpanjaka rehetra. '
  '24':
  - type: text
    content: 'Nankao amin’ny mpanjaka i Absaloma ka niteny hoe: Indro, mampanety ondry ny mpanomponao; koa trara antitra ianao, aoka ny mpanjaka sy ny mpanompony handeha hiaraka amiko mpanomponao. '
  '25':
  - type: text
    content: 'Fa hoy ny mpanjaka tamin’i Absaloma: Tsia, anaka! Aoka tsy handeha avokoa izahay rehetra, fandrao mahavaky tratra anao. Fa nanery azy ihany i Absaloma; nefa tsy nety nandeha izy fa nitsodrano azy ihany. '
  '26':
  - type: text
    content: 'Dia hoy i Absaloma: Raha tsy izany ary, trara antitra ianao, aoka i Amnona rahalahiko no handeha hiaraka aminay. Ary hoy ny mpanjaka taminy: Nahoana no handeha hiaraka aminao izy? '
  '27':
  - type: text
    content: Nanery azy anefa i Absaloma ka nalefany hiaraka aminy i Amnona sy ny zanakalahin’ny mpanjaka rehetra.
  '28':
  - type: text
    content: 'Ary nanome teny ny zatovony i Absaloma hoe: Miomàna tsara, fa rehefa faly ny fon’i Amnona azon’ny divay ka lazaiko aminareo hoe: Asio i Amnona! Dia vonoy ho faty izy, nefa aza matahotra; tsy izaho va no nanome teny anareo? Matokia, aoka hiseho ho lehilahy mahery ianareo! '
  '29':
  - type: text
    content: 'Ary ny zatovon’i Absaloma nanatanteraka tamin’i Amnona ny teny nomen’i Absaloma azy. Dia nitsangana avokoa ny zanakalahin’ny mpanjaka rehetra ary samy nitaingina ny ampondrany ka nandositra. '
  '3':
  - type: text
    content: 'Nana-namana i Amnona, Jonadaba no anarany, zanak’i Simea, rahalahin’i Davida; ary i Jonadaba dia olona fetsy tokoa. '
  '30':
  - type: text
    content: 'Raha mbola teny an-dalana izy ireo dia tonga tao amin’i Davida ny filazana hoe: Novonoin’i Absaloma avokoa ny zanakalahin’ny mpanjaka ka tsy nasiany miangana na dia iray akory aza. '
  '31':
  - type: text
    content: 'Dia nitsangana ny mpanjaka ka nandriatra ny fitafiany ary nandry tamin’ny tany; ny mpanompony rehetra kosa nitsangana teo, samy voatriatra avokoa ny fitafiany. '
  '32':
  - type: text
    content: 'Ary i Jonadaba, zanak’i Simea, rahalahin’i Davida, niteny hoe: Aoka ny tompoko tsy hilaza hoe: Matiny avokoa ny zatovo rehetra, zanakalahin’ny mpanjaka; fa i Amnona ihany no maty; satria i Absaloma efa nifofo azy hatramin’ny andro nanolanany an’i Tamara anabaviny. '
  '33':
  - type: text
    content: Koa aoka ny mpanjaka tompoko tsy hieritreritra am-po fa maty avokoa ny zanakalahin’ny mpanjaka rehetra; fa i Amnona ihany no maty.
  '34':
  - type: text
    content: Dia nandositra i Absaloma.
  - type: text
    content: 'Ary nanopy ny masony ny zatovo mpitily ka nahita fa indreo, nisy olona maro avy tao aorianany, teo anilan’ny tendrombohitra. '
  '35':
  - type: text
    content: 'Dia hoy i Jonadaba tamin’ny mpanjaka: Indreo, avy ny zanakalahin’ny mpanjaka; dia araka ny nolazain’ny mpanomponao tokoa. '
  '36':
  - type: text
    content: 'Nony efa voalazany izany teny izany dia indreo, tonga ny zanakalahin’ny mpanjaka ka nanandratra ny feony nitomany; ary mba nitomany mafy dia mafy koa ny mpanjaka sy ny mpanompony. '
  '37':
  - type: text
    content: Fa i Absaloma kosa dia nandositra nankany amin’i Talmay, zanakalahin’i Amihoda, mpanjakan’i Gesora. Ary nisaona ny zanany naharitra i Davida.
  '38':
  - type: text
    content: 'Nandositra nankany Gesora i Absaloma ka nitoetra tany nandritra ny telo taona. '
  '39':
  - type: text
    content: Dia nitsahatra tsy nanenjika an’i Absaloma intsony i Davida mpanjaka satria nionona izy noho ny amin’i Amnona izay efa maty.
  '4':
  - type: text
    content: 'Koa hoy izy taminy: Nahoana ianao, ry zanaky ny mpanjaka, no mihamahia isanandro isanandro? Tsy tianao hambara amiko va ny antony? Dia hoy i Amnona taminy: Tia an’i Tamara, anabavin’i Absaloma rahalahiko, aho. '
  '5':
  - type: text
    content: 'Ary hoy i Jonadaba taminy: Mandria eo amin’ny fandriananao ianao ka modia marary; ary rehefa tonga mamangy anao ny rainao dia lazao aminy hoe: Trara antitra ianao, aoka i Tamara anabaviko mba ho avy hampihinan-kanina ahy ary hanamboatra ny sakafo eto imasoko mba ho hitako ka hihinanako ny avy eny an-tanany. '
  '6':
  - type: text
    content: 'Dia nandry i Amnona ka nody narary; ary nony avy mamangy azy ny mpanjaka dia hoy izy taminy: Trara antitra ianao, aoka i Tamara anabaviko hankaty mba hanao mofo roa ho ahy eto imasoko hihinanako ny avy eny an-tanany. '
  '7':
  - type: text
    content: 'Ary nandefa iraka nankany amin’i Tamara any an-tranony i Davida hiteny hoe: Mankanesa kely any an-tranon’i Amnona anadahinao ka manamboara sakafo ho azy. '
  '8':
  - type: text
    content: 'Dia nandeha nankany an-tranon’i Amnona anadahiny i Tamara; ary nandry ny anadahiny. Dia naka koba Razazavavy, nofetafetainy ary nataony mofo teo imasony; ary nendasiny ny mofo. '
  '9':
  - type: text
    content: 'Dia noraisiny ny fanendasana ka narosony teo anoloany. Tsy nety nihinana anefa i Amnona. Hoy izy: Avoahy ny olona rehetra! Dia nivoaka ny trano ny olona rehetra. '
