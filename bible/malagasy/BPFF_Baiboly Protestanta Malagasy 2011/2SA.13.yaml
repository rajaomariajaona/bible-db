document_id: 2SA.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Amnona sy i Tamara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony afaka izany dia izao no nitranga: Nanana anabavy tsara tarehy i Absaloma, zanak’i Davida, Tamara no anarany; ary tia azy i Amnona, zanak’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nararim-pitia noho ny amin’i Tamara anabaviny i Amnona, satria virijiny izy ka sarotra tamin’i Amnona ny haka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nana-namana i Amnona, Jonadaba no anarany, zanak’i Simea, rahalahin’i Davida; ary i Jonadaba dia olona fetsy tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa hoy izy taminy: Nahoana ianao, ry zanaky ny mpanjaka, no mihamahia isanandro isanandro? Tsy tianao hambara amiko va ny antony? Dia hoy i Amnona taminy: Tia an’i Tamara, anabavin’i Absaloma rahalahiko, aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy i Jonadaba taminy: Mandria eo amin’ny fandriananao ianao ka modia marary; ary rehefa tonga mamangy anao ny rainao dia lazao aminy hoe: Trara antitra ianao, aoka i Tamara anabaviko mba ho avy hampihinan-kanina ahy ary hanamboatra ny sakafo eto imasoko mba ho hitako ka hihinanako ny avy eny an-tanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nandry i Amnona ka nody narary; ary nony avy mamangy azy ny mpanjaka dia hoy izy taminy: Trara antitra ianao, aoka i Tamara anabaviko hankaty mba hanao mofo roa ho ahy eto imasoko hihinanako ny avy eny an-tanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nandefa iraka nankany amin’i Tamara any an-tranony i Davida hiteny hoe: Mankanesa kely any an-tranon’i Amnona anadahinao ka manamboara sakafo ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nandeha nankany an-tranon’i Amnona anadahiny i Tamara; ary nandry ny anadahiny. Dia naka koba Razazavavy, nofetafetainy ary nataony mofo teo imasony; ary nendasiny ny mofo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia noraisiny ny fanendasana ka narosony teo anoloany. Tsy nety nihinana anefa i Amnona. Hoy izy: Avoahy ny olona rehetra! Dia nivoaka ny trano ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy i Amnona tamin’i Tamara: Ento atỳ an’efitrano ny sakafo hihinanako ny avy eny an-tananao. Dia nalain’i Tamara ny mofo nataony ka noentiny tao amin’ny efitrano tao amin’i Amnona anadahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nony noentiny tao aminy hohaniny izany dia nihazona an’i Tamara izy ka niteny taminy hoe: Avia handry amiko, Ranabaviko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ny anabaviny: Sanatria, Ranadahy! Aza misavika ahy fa tsy fanao eto amin’ny Israely izany; aza manao izany hadalana izany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny amiko, hoentiko aiza moa ny henatro? Ianao koa dia ho toy ny iray amin’ny adala eto amin’ny Israely. Koa trara antitra ianao, lazao amin’ny mpanjaka; fa tsy hisakana ahy tsy ho anao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa tsy nety nihaino ny feon-dRazazavavy izy fa natanjaka noho izy; dia nanolana azy izy ka nandry taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia tonga halan’i Amnona indrindra izy ka ny fankahalany azy dia be lavitra noho ny fitiavany azy taloha. Dia hoy i Amnona taminy: Mitsangàna, mandehana! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy izy taminy: Aza dia manao ratsy mandroaka ahy ianao fa ratsy noho ny zavatra hafa nataonao izao. Nefa tsy nety nihaino azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niantso ny zatovony izay nanompo azy izy ka niteny hoe: Esory hiala eto amiko ity vehivavy ity ka hidio ny varavarana rehefa tafavoaka izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Niakanjo akanjo misoratsoratra Razazavavy; fa izany no fanaon’ny zanakavavin’ny mpanjaka ho akanjo ambony, raha mbola virijiny izy. Dia navoakan’ilay mpanompon’i Amnona izy ka nohidiny ny varavarana nony tafavoaka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nasian’i Tamara lavenona ny lohany sady notriariny ny akanjo misoratsoratra izay nanaovany; dia niloloha tanana izy sady nitomany nidradradradra teny am-pandehanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy i Absaloma anadahiny taminy: Efa niaraka taminao va i Amnona anadahinao? Mangìna ihany aloha, Ranabavy, fa anadahinao izy; fa aza malahelo noho izany. Dia nitoetra tao an-tranon’i Absaloma anadahiny i Tamara sady ory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nony ren’i Davida mpanjaka kosa izany zavatra rehetra izany dia nirehitra ny fahatezerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary tsy niteny na inona na inona intsony tamin’i Amnona rahalahiny i Absaloma satria halan’i Absaloma izy noho ny nanolanany an’i Tamara anabaviny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampamono an’i Amnona i Absaloma ary nandositra avy eo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony afaka roa taona dia nampanety ondry teo Baala-Hazora ao akaikin’i Efraima i Absaloma ka nanasa ny zanakalahin’ny mpanjaka rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nankao amin’ny mpanjaka i Absaloma ka niteny hoe: Indro, mampanety ondry ny mpanomponao; koa trara antitra ianao, aoka ny mpanjaka sy ny mpanompony handeha hiaraka amiko mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hoy ny mpanjaka tamin’i Absaloma: Tsia, anaka! Aoka tsy handeha avokoa izahay rehetra, fandrao mahavaky tratra anao. Fa nanery azy ihany i Absaloma; nefa tsy nety nandeha izy fa nitsodrano azy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy i Absaloma: Raha tsy izany ary, trara antitra ianao, aoka i Amnona rahalahiko no handeha hiaraka aminay. Ary hoy ny mpanjaka taminy: Nahoana no handeha hiaraka aminao izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nanery azy anefa i Absaloma ka nalefany hiaraka aminy i Amnona sy ny zanakalahin’ny mpanjaka rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nanome teny ny zatovony i Absaloma hoe: Miomàna tsara, fa rehefa faly ny fon’i Amnona azon’ny divay ka lazaiko aminareo hoe: Asio i Amnona! Dia vonoy ho faty izy, nefa aza matahotra; tsy izaho va no nanome teny anareo? Matokia, aoka hiseho ho lehilahy mahery ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny zatovon’i Absaloma nanatanteraka tamin’i Amnona ny teny nomen’i Absaloma azy. Dia nitsangana avokoa ny zanakalahin’ny mpanjaka rehetra ary samy nitaingina ny ampondrany ka nandositra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Raha mbola teny an-dalana izy ireo dia tonga tao amin’i Davida ny filazana hoe: Novonoin’i Absaloma avokoa ny zanakalahin’ny mpanjaka ka tsy nasiany miangana na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia nitsangana ny mpanjaka ka nandriatra ny fitafiany ary nandry tamin’ny tany; ny mpanompony rehetra kosa nitsangana teo, samy voatriatra avokoa ny fitafiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary i Jonadaba, zanak’i Simea, rahalahin’i Davida, niteny hoe: Aoka ny tompoko tsy hilaza hoe: Matiny avokoa ny zatovo rehetra, zanakalahin’ny mpanjaka; fa i Amnona ihany no maty; satria i Absaloma efa nifofo azy hatramin’ny andro nanolanany an’i Tamara anabaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Koa aoka ny mpanjaka tompoko tsy hieritreritra am-po fa maty avokoa ny zanakalahin’ny mpanjaka rehetra; fa i Amnona ihany no maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia nandositra i Absaloma.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nanopy ny masony ny zatovo mpitily ka nahita fa indreo, nisy olona maro avy tao aorianany, teo anilan’ny tendrombohitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia hoy i Jonadaba tamin’ny mpanjaka: Indreo, avy ny zanakalahin’ny mpanjaka; dia araka ny nolazain’ny mpanomponao tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nony efa voalazany izany teny izany dia indreo, tonga ny zanakalahin’ny mpanjaka ka nanandratra ny feony nitomany; ary mba nitomany mafy dia mafy koa ny mpanjaka sy ny mpanompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa i Absaloma kosa dia nandositra nankany amin’i Talmay, zanakalahin’i Amihoda, mpanjakan’i Gesora. Ary nisaona ny zanany naharitra i Davida.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Nandositra nankany Gesora i Absaloma ka nitoetra tany nandritra ny telo taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Dia nitsahatra tsy nanenjika an’i Absaloma intsony i Davida mpanjaka satria nionona izy noho ny amin’i Amnona izay efa maty.
