document_id: 1PE.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa esory ny lolompo rehetra, ny fitaka rehetra, ny fihatsarambelatsihy, ny fialonana ary ny fanendrikendrehana rehetra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia ianareo izay tsy firenena akory fahiny, fa ankehitriny efa olon’Andriamanitra; izay tsy namindrana fo, fa ankehitriny efa namindrana fo (Hos 2.25).
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitondrantena tsara eo amin’ny fiarahamonina
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry malala, mananatra anareo aho, satria vahiny sy mpivahiny ianareo, fadio ny filan’ny nofo, fa miady amin’ny fanahy ireny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho tsara ny fitondrantenanareo eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ', mba ho eo amin’izay anendrikendrehany anareo indrindra ho mpanao ratsy no hahitany ny asa tsara ataonareo ka hankalazany an’Andriamanitra amin’ny andron’ny famangiany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanajana tokony homena ny manampahefana
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho ny Tompo dia maneke izay rehetra voatendrin’ny olona, na ny mpanjaka satria ambony izy, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na ny mpanapaka satria nirahiny hamaly izay manao ratsy izy, fa ho mpidera izay manao tsara. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa toy izany no sitrapon’Andriamanitra ka hampanginanareo amin’ny fanaovan-tsoa ny tsy fahalalan’ny olona adala; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa olona afaka ianareo, nefa aza mitondra ny fahafahanareo ho fanaronana ny ratsy, fa ho toy ny mpanompon’Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manajà ny olona rehetra, tiava ny rahalahy, matahora an’Andriamanitra, manajà ny mpanjaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpanompo kristiana
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianareo mpanompo, maneke ny tomponareo amin’ny fahatahorana rehetra, tsy ny tsara sy ny malemy fanahy ihany, fa ny saro-po koa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa fahasoavana ny fitondrana alahelo sy fandeferana amin’ny tsy rariny noho ny fieritreretana ny amin’Andriamanitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tahaka ny zaza vao teraka dia maniria ny ronono tsy mitampoka, dia ny Teny, mba hitomboanareo amin’izany ho amin’ny famonjena, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa inona no laza raha toa kapohina noho ny fahadisoana ianareo ka miaritra an’izany? Fa raha toa ka manao soa kosa ianareo ka mitondra fahoriana sy miaritra dia fahasoavana eo anatrehan’Andriamanitra izany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho amin’izany no niantsoana anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' aza nijaly hamonjy anareo ka namela fianarana ho anareo'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanarahanareo ny diany;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izay tsy nanota akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy nisy fitaka teo am-bavany» (Isa 53.9);
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha notevatevaina Izy dia tsy mba nanevateva;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha nijaly dia tsy nandrahona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nanolotra ny raharahany ho amin’ny Mpitsara marina;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izy no nitondra ny fahotantsika (Isa 53.12)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tao amin’ny tenany teo ambonin’ny hazo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho faty ny amin’ny ota isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho velona ny amin’ny fahamarinana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary «ny dian-kapoka taminy no nanasitranana anareo» (Isa 53.5).
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nania toy ny ondry ianareo (Isa 53.6)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ankehitriny dia efa niverina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho amin’ny Mpiandry sy Mpitandrina ny fanahinareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: raha efa nanandrana ianareo fa tsara ny Tompo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanompoam-pivavahana vaovao ao amin’ny tempoly vaovao
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy no hatoninareo toy ny vato velona, nolavin’ny olona, nefa voafidy sady sarobidy eo anatrehan’Andriamanitra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ianareo koa dia atsangana tahaka ny vato velona ho trano ara-panahy, ho fisoronana masina, mba hanolorana fanatitra ara-panahy sitrak’Andriamanitra amin’ny alalan’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa misy teny ao amin’ny Soratra Masina milaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Indro, mametraka vato fehizoro ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' Aho, dia vato voafidy sady sarobidy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mino Azy dia tsy hitsanga-menatra» (Isa 28.16).
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa ny voninahitra dia ho anareo izay mino. Fa amin’izay tsy mino kosa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «ny vato izay nolavin’ny mpanao trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tonga fehizoro» (Sal 118.22),
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «ary vato mahatafintohina sy vatolampy mahasolafaka» (Isa 8.14). Ary satria tsy nanaiky ireo dia tafintohina tamin’ny teny izy sady izany koa no nanendrena azy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianareo kosa dia taranaka voafidy, «fanjaka-mpisorona, firenena masina» (Eks 19.6), olona nalain’Andriamanitra ho an’ny tenany, mba hilazanareo ny hatsaran’Ilay niantso anareo hiala tamin’ny maizina ho amin’ny fahazavany mahagaga; '
