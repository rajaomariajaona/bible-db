document_id: 1PE.2,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Koa esory ny lolompo rehetra, ny fitaka rehetra, ny fihatsarambelatsihy, ny fialonana ary ny fanendrikendrehana rehetra, '
  '10':
  - type: text
    content: dia ianareo izay tsy firenena akory fahiny, fa ankehitriny efa olon’Andriamanitra; izay tsy namindrana fo, fa ankehitriny efa namindrana fo (Hos 2.25).
  - type: heading
    content: Fitondrantena tsara eo amin’ny fiarahamonina
  '11':
  - type: text
    content: 'Ry malala, mananatra anareo aho, satria vahiny sy mpivahiny ianareo, fadio ny filan’ny nofo, fa miady amin’ny fanahy ireny. '
  '12':
  - type: text
    content: 'Aoka ho tsara ny fitondrantenanareo eo amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ', mba ho eo amin’izay anendrikendrehany anareo indrindra ho mpanao ratsy no hahitany ny asa tsara ataonareo ka hankalazany an’Andriamanitra amin’ny andron’ny famangiany.'
  - type: heading
    content: Ny fanajana tokony homena ny manampahefana
  '13':
  - type: text
    content: 'Ary noho ny Tompo dia maneke izay rehetra voatendrin’ny olona, na ny mpanjaka satria ambony izy, '
  '14':
  - type: text
    content: 'na ny mpanapaka satria nirahiny hamaly izay manao ratsy izy, fa ho mpidera izay manao tsara. '
  '15':
  - type: text
    content: 'Fa toy izany no sitrapon’Andriamanitra ka hampanginanareo amin’ny fanaovan-tsoa ny tsy fahalalan’ny olona adala; '
  '16':
  - type: text
    content: 'fa olona afaka ianareo, nefa aza mitondra ny fahafahanareo ho fanaronana ny ratsy, fa ho toy ny mpanompon’Andriamanitra. '
  '17':
  - type: text
    content: Manajà ny olona rehetra, tiava ny rahalahy, matahora an’Andriamanitra, manajà ny mpanjaka.
  - type: heading
    content: Ny mpanompo kristiana
  '18':
  - type: text
    content: 'Ianareo mpanompo, maneke ny tomponareo amin’ny fahatahorana rehetra, tsy ny tsara sy ny malemy fanahy ihany, fa ny saro-po koa. '
  '19':
  - type: text
    content: Fa fahasoavana ny fitondrana alahelo sy fandeferana amin’ny tsy rariny noho ny fieritreretana ny amin’Andriamanitra.
  '2':
  - type: text
    content: 'fa tahaka ny zaza vao teraka dia maniria ny ronono tsy mitampoka, dia ny Teny, mba hitomboanareo amin’izany ho amin’ny famonjena, '
  '20':
  - type: text
    content: Fa inona no laza raha toa kapohina noho ny fahadisoana ianareo ka miaritra an’izany? Fa raha toa ka manao soa kosa ianareo ka mitondra fahoriana sy miaritra dia fahasoavana eo anatrehan’Andriamanitra izany.
  '21':
  - type: text
    content: Fa ho amin’izany no niantsoana anareo;
  - type: text
    content: 'fa '
  - type: text
    content: Kristy
  - type: text
    content: ' aza nijaly hamonjy anareo ka namela fianarana ho anareo'
  - type: text
    content: mba hanarahanareo ny diany;
  '22':
  - type: text
    content: «Izay tsy nanota akory
  - type: text
    content: sady tsy nisy fitaka teo am-bavany» (Isa 53.9);
  '23':
  - type: text
    content: raha notevatevaina Izy dia tsy mba nanevateva;
  - type: text
    content: raha nijaly dia tsy nandrahona,
  - type: text
    content: fa nanolotra ny raharahany ho amin’ny Mpitsara marina;
  '24':
  - type: text
    content: ary Izy no nitondra ny fahotantsika (Isa 53.12)
  - type: text
    content: tao amin’ny tenany teo ambonin’ny hazo,
  - type: text
    content: mba ho faty ny amin’ny ota isika
  - type: text
    content: fa ho velona ny amin’ny fahamarinana;
  - type: text
    content: ary «ny dian-kapoka taminy no nanasitranana anareo» (Isa 53.5).
  '25':
  - type: text
    content: Fa efa nania toy ny ondry ianareo (Isa 53.6)
  - type: text
    content: nefa ankehitriny dia efa niverina
  - type: text
    content: ho amin’ny Mpiandry sy Mpitandrina ny fanahinareo.
  '3':
  - type: text
    content: raha efa nanandrana ianareo fa tsara ny Tompo.
  - type: heading
    content: Fanompoam-pivavahana vaovao ao amin’ny tempoly vaovao
  '4':
  - type: text
    content: 'Izy no hatoninareo toy ny vato velona, nolavin’ny olona, nefa voafidy sady sarobidy eo anatrehan’Andriamanitra. '
  '5':
  - type: text
    content: 'Ary ianareo koa dia atsangana tahaka ny vato velona ho trano ara-panahy, ho fisoronana masina, mba hanolorana fanatitra ara-panahy sitrak’Andriamanitra amin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Fa misy teny ao amin’ny Soratra Masina milaza hoe:'
  - type: text
    content: '«Indro, mametraka vato fehizoro ao '
  - type: text
    content: Ziona
  - type: text
    content: ' Aho, dia vato voafidy sady sarobidy,'
  - type: text
    content: ary izay mino Azy dia tsy hitsanga-menatra» (Isa 28.16).
  '7':
  - type: text
    content: Koa ny voninahitra dia ho anareo izay mino. Fa amin’izay tsy mino kosa,
  - type: text
    content: «ny vato izay nolavin’ny mpanao trano
  - type: text
    content: no tonga fehizoro» (Sal 118.22),
  '8':
  - type: text
    content: «ary vato mahatafintohina sy vatolampy mahasolafaka» (Isa 8.14). Ary satria tsy nanaiky ireo dia tafintohina tamin’ny teny izy sady izany koa no nanendrena azy.
  '9':
  - type: text
    content: 'Fa ianareo kosa dia taranaka voafidy, «fanjaka-mpisorona, firenena masina» (Eks 19.6), olona nalain’Andriamanitra ho an’ny tenany, mba hilazanareo ny hatsaran’Ilay niantso anareo hiala tamin’ny maizina ho amin’ny fahazavany mahagaga; '
