verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Mitohy ato ny tantaran’ireo mpanjaka farany tao Joda sy Israely voalazan’ny Mpanjaka voalohany. Noho ny fialan’ireo mpanjaka tamin’ny Didin’Andriamanitra, tamin’ny fanompoan-tsampy sy ny tsy fahamarinana, dia navelan’Andriamanitra hopotehin’ny mpanjaka asiriana Salmanesera ny fanjakana Avaratra ka rava i Samaria tamin’ny taona 721 tal JK, ary lasan-ko babo ny mponina. Izay no fahababoana asiriana. Manomboka hatreo dia ny fanjakana Joda no sisa nijoro.
  - type: text
    content: Ny tapany faharoa amin’ny Boky (18–25) dia milaza ireo taona taorianan’ny 721 ka hatramin’ny 587 tal JK izay fanombohan’ny fahababoana an’i Joda.
  - type: text
    content: 'Ao amin’ny 22–23 dia tantaraina ilay atao hoe Ny Reforma na Fanitsiam-pivavahana Deoteronomika: Tamin’ny taona 622 tal JK dia nahitana tapaky ny Boky Deoteronomia tao amin’ny tempoly, ary avy tamin’izany no nanadiovan’i Josia mpanjaka ny tempoly sy ny tany manontolo, izay feno fanompoan-tsampy sy fomba jentilisa. Tsy nahasakana ny loza anefa izany satria fivoarana ivelany ihany fa tsy latsaka tao am-pon’ny olona, koa dia tonga koa ny faharavan’ny fanjakana Joda.'
  - type: text
    content: I Nebokadnezara, mpanjakan’i Babilona, no nitondra tafika nandrava an’i Jerosalema; tamin’izay dia nodorany ny tempoly, ary ny mpitondra sy ny olona ambony rehetra tamin’ny firenena dia nalefany ho babo tany Babilona. Izay ny fahababoana babiloniana.
  - type: text
    content: Tanteraka tokoa ny loza noho ny fialan’ny olona tamin’Andriamanitra, kanefa ambaran’ny mpanoratra amin’ny faran’ny Boky fa i Joiakina, mpanjakan’i Joda, izay noentina ho babo tany Babilona, dia nalain’ny mpanjaka babiloniana tao am-ponja ka nomeny toeram-boninahitra. Tian’ny mpanoratra hambara amin’izany fa mbola misy fanantenana ihany ho an’ny taranak’i Davida araka ny teny fikasana nomen’NY TOMPO.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Ny fanjakana roa, hatramin’ny faharavan’ny fanjakana Avaratra: 1–17'
  - type: text
    content: 'Ny taona farany tamin’ny fanjakan’i Joda sy ny fahatongavan’ny Babiloniana ary ny fiandohan’ny fahababoana babiloniana: 18–25'
