document_id: PSA.56,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Olona iray enjehina mametraka fitokisana amin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-ionat elem rehokim. Miktama nataon’i Davida, fony nisambotra azy tany Gata ny Filistina.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mamindrà fo amiko, Andriamanitra ô, fa misafoaka manenjika ahy ny olona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miady amiko mandrakariva izy ka mampahory ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Andriamanitra no deraiko noho ny teniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no deraiko noho ny teniny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Andriamanitra no itokiako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mba hatahotra aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no hataon’ny olona amiko?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nivoady taminao aho, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanolotra fanati-pisaorana ho Anao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa efa nanafaka ahy tamin’ny fahafatesana Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nanafaka ny tongotro Ianao mba tsy ho solafaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba handehanako eo anatrehan’Andriamanitra amin’ny fahazavan’ny velona.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Misafoaka manenjika mandrakariva ny mpampahory ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maro tokoa no mirehareha miady amiko!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Amin’ny andro atahorako no itokiako Anao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Andriamanitra no deraiko noho ny teniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra no itokiako ka tsy mba hatahotra aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no hataon’ny nofo amiko?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mamily ny teniko mandrakariva ireny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny heviny rehetra dia ny hanisy ratsy ahy ihany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mioko izy, mitily izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitsongo-dia ahy izy, satria mikendry ny aiko.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Amin’izany faharatsiany izany, moa hisy hahafahany va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aripaho amin’ny fahatezeranao ny firenena, Andriamanitra ô!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manisa ny firenireneko Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataovy an-tavoahanginao ny ranomasoko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ao amin’ny bokinao va ireny?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Amin’izay dia hiamboho ny fahavaloko, amin’ny andro iantsoako Anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao dia fantatro fa momba ahy Andriamanitra.
