document_id: PSA.56,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Olona iray enjehina mametraka fitokisana amin’Andriamanitra
  - type: text
    content: Ho an’ny mpiventy hira. Al-ionat elem rehokim. Miktama nataon’i Davida, fony nisambotra azy tany Gata ny Filistina.
  - type: text
    content: Mamindrà fo amiko, Andriamanitra ô, fa misafoaka manenjika ahy ny olona.
  - type: text
    content: Miady amiko mandrakariva izy ka mampahory ahy.
  '10':
  - type: text
    content: Andriamanitra no deraiko noho ny teniny;
  - type: text
    content: NY TOMPO no deraiko noho ny teniny.
  '11':
  - type: text
    content: Andriamanitra no itokiako
  - type: text
    content: ka tsy mba hatahotra aho.
  - type: text
    content: Inona no hataon’ny olona amiko?
  '12':
  - type: text
    content: Nivoady taminao aho, Andriamanitra ô,
  - type: text
    content: dia hanolotra fanati-pisaorana ho Anao.
  '13':
  - type: text
    content: Fa efa nanafaka ahy tamin’ny fahafatesana Ianao;
  - type: text
    content: eny, nanafaka ny tongotro Ianao mba tsy ho solafaka,
  - type: text
    content: mba handehanako eo anatrehan’Andriamanitra amin’ny fahazavan’ny velona.
  '2':
  - type: text
    content: Misafoaka manenjika mandrakariva ny mpampahory ahy;
  - type: text
    content: maro tokoa no mirehareha miady amiko!
  '3':
  - type: text
    content: Amin’ny andro atahorako no itokiako Anao.
  '4':
  - type: text
    content: Andriamanitra no deraiko noho ny teniny;
  - type: text
    content: Andriamanitra no itokiako ka tsy mba hatahotra aho.
  - type: text
    content: Inona no hataon’ny nofo amiko?
  '5':
  - type: text
    content: Mamily ny teniko mandrakariva ireny.
  - type: text
    content: Ny heviny rehetra dia ny hanisy ratsy ahy ihany.
  '6':
  - type: text
    content: Mioko izy, mitily izy,
  - type: text
    content: mitsongo-dia ahy izy, satria mikendry ny aiko.
  '7':
  - type: text
    content: Amin’izany faharatsiany izany, moa hisy hahafahany va?
  - type: text
    content: Aripaho amin’ny fahatezeranao ny firenena, Andriamanitra ô!
  '8':
  - type: text
    content: Manisa ny firenireneko Ianao;
  - type: text
    content: ataovy an-tavoahanginao ny ranomasoko.
  - type: text
    content: Tsy ao amin’ny bokinao va ireny?
  '9':
  - type: text
    content: Amin’izay dia hiamboho ny fahavaloko, amin’ny andro iantsoako Anao.
  - type: text
    content: Izao dia fantatro fa momba ahy Andriamanitra.
