document_id: GEN.31
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ren’i Jakoba ny resaky ny zanakalahin’i Labana hoe: Lasan’i Jakoba avokoa izay rehetra ananan’ny raintsika; avy tamin’ny fananan’ny raintsika no nahazoany ireo harena rehetra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hitan’i Jakoba ny tarehin’i Labana fa tsy mba miramirana taminy tahaka ny taloha intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Jakoba: Modia any amin’ny tanin’ny razanao sy any amin’ny havanao, fa homba anao Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary i Jakoba dia nampiantso an’i Rahely sy i Lea izay tany an-tsaha, teo amin’ny ondry aman’osiny, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka niteny tamin’izy ireo hoe: Hitako ny tarehin’ny rainareo fa tsy mba miramirana amiko tahaka ny taloha; nefa Andriamanitry ny raiko no nomba ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fantatrareo fa tamin’ny heriko rehetra no nanompoako ny rainareo, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'kanefa ny rainareo no namitaka ahy ka nanova ny karamako impolo; tsy navelan’Andriamanitra hahatonga loza tamiko anefa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha nilaza izy hoe: Ny mara rehetra no ho karamanao, dia niteraka mara ny ondry aman’osy rehetra; raha nilaza indray izy hoe: Ny sadika rehetra no ho karamanao, dia niteraka sadika ny ondry aman’osy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nalain’Andriamanitra ny fananan’ny rainareo ka nomeny ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary tamin’ny fotoana izay nikambanan’ny ondry aman’osy dia natopiko ny masoko ka hitako tamin’ny nofy fa indro, sadika sy mara ary sada ny lahy izay nikambana tamin’ny ondrivavy sy ny osivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy ilay Anjelin’Andriamanitra tamiko tamin’ny nofy: Ry Jakoba! Dia hoy aho: Inty aho! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Izy: Mba atopazy ny masonao ka jereo fa sadika sy mara ary sada ny lahy rehetra izay mikambana amin’ny ondrivavy sy ny osivavy, satria hitako izay rehetra nataon’i Labana taminao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izaho no Andriamanitr’i Betela izay nanosoranao tsangambato sy nanaovanao voady. Miaingà ankehitriny hiala amin’ity tany ity ka miverena any amin’ny tanin’ny razanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia namaly azy Rahely sy i Lea hoe: Mbola misy anjara lova ho anay va ao an-tranon’ny rainay? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy nataony toy ny vahiny va izahay? Fa namidiny izahay sady nohaniny hatrany ny volanay rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa ny harena rehetra izay nalain’Andriamanitra tamin’ny rainay dia anay sy an’ny zanakay. Koa ankehitriny, izay rehetra nolazain’Andriamanitra taminao dia ataovy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niainga i Jakoba ka nampitaingeniny rameva ireo zanany sy ireo vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Noentiny nandeha ny ombiny sy ny ondry aman’osiny rehetra, mbamin’ny fananana rehetra izay nohariny, dia ny omby aman’ondry izay azony tany Padana-Arama. Niainga izy mba hankany amin’Isaka rainy any amin’ny tany Kanana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha lasa nandeha hanety ny ondry aman’osiny i Labana dia nangalarin’i Rahely ireo terafiman’ny rainy; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'satria nangala-dia tamin’i Labana siriana i Jakoba fa tsy nambarany taminy ny amin’ny handosirany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nandositra izy ka nitondra ny fananany rehetra; niainga izy ka nita ny ony Eofrata, ary nizotra hankany amin’ny tendrombohitra any Gileada.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tratran’i Labana i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tamin’ny andro fahatelo dia nisy nanambara tamin’i Labana fa lasa nandositra i Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nitondra ny havany hiaraka aminy izy ka nanenjika azy lalan-kafitoana ary nahatratra azy tany amin’ny tendrombohitra any Gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa Andriamanitra nankao amin’i Labana arameana tamin’ny nofy nony alina ka niteny taminy hoe: Tandremo mba tsy hiteny na inona na inona amin’i Jakoba ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nahatratra an’i Jakoba i Labana. Efa nanorina ny tranolainy tany an-tendrombohitra i Jakoba; i Labana sy ny havany kosa dia nanorina ny tranolainy tany amin’ny tendrombohitra any Gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy i Labana tamin’i Jakoba: Inona izao ataonao izao no dia nangala-dia tamiko ianao ka nitondra ny zanako vavy toy ny babo azo tamin’ny sabatra? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nahoana no nandositra mangingina ianao ka nangala-dia tamiko? Tsy nanambara tamiko ianao mba hanaterako anao amin’ny fifaliana sy ny hira, amin’ny ampongatapaka sy ny lokanga, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'sady tsy mba navelanao hanoroka ny zanako lahy sy ny zanako vavy aho. Nahavita hadalana ianao izao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Manan-kery hanisy ratsy anareo ny tanako; nefa Andriamanitry ny rainareo no niteny tamiko alina hoe: Tandremo mba tsy hiteny na inona na inona amin’i Jakoba ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Koa ankehitriny, raha handeha tokoa ianao, satria manina ny tranon’ny rainao, nahoana no nangalarinao ireo andriamanitro?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia namaly an’i Labana i Jakoba hoe: Satria natahotra aho ka niteny anakampo hoe: Angamba halainao an-keriny amiko ireo zanakao vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izay hahitanao ireo andriamanitrao indray dia aoka tsy ho velona. Eto anatrehan’ny havantsika, savao izay ato amiko ka ento ny anao. Tsy fantatr’i Jakoba anefa fa Rahely no nangalatra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary niditra tao an-dain’i Jakoba sy tao an-dain’i Lea ary tao an-dain’ny mpanompo roa vavy i Labana nefa tsy nahita. Dia niala tao an-dain’i Lea izy ka niditra tao an-dain’i Rahely. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Rahely anefa efa naka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terafima
  - type: text
    text: ' ka nanao azy tao anatin’ny laselin’ny rameva, dia nipetraka teo amboniny izy. Nikaroka nanerana ny tranolay manontolo i Labana fa tsy nahita. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hoy Rahely tamin’ny rainy: Azafady, tompokolahy, fa tsy mahazo mitsangana eto anatrehanao aho satria azon’ny fombam-behivavy. Dia nikaroka fatratra izy nefa tsy nahita ny sampy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia tezitra i Jakoba ka nifamaly tamin’i Labana. Hoy izy tamin’i Labana hoe: Inona no heloko? Inona no otako no nilomay nanenjika ahy ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Efa nosavanao avokoa ny entako rehetra, koa inona no fanaka avy tany an-tranonao hitanao tao? Apetraho eto anatrehan’ny havako sy ny havanao izany, hitsarany antsika roa lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Roapolo taona izao no nitoerako tany aminao; ny ondrivavinao sy ny osivavinao dia tsy mba namotsotra, ary tsy mba nihinana ny ondrilahy avy tamin’ny ondrinao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Izay voaviraviram-biby dia tsy mba nentiko tany aminao fa izaho no nanolo azy; teo an-tanako no nitadiavanao azy, na ny nangalarina andro na ny nangalarina alina. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nony antoandro dia matin’ny hainandro aho, nony alina dia matin’ny fanala, ary nandositra ny masoko ny torimaso. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Roapolo taona izao no nitoerako tany an-tranonao ka efatra amby folo taona no nanompoako anao hahazoako azy mirahavavy zanakao, ary enin-taona kosa hahazoako ny ondry aman’osinao; efa nanova ny karamako impolo ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Raha tsy ny Andriamanitry ny raiko, dia Andriamanitr’i Abrahama, ilay natahoran’Isaka, no nomba ahy, dia ho nampandehaninao maina tokoa aho ankehitriny. Andriamanitra efa nitsinjo ny fahoriako sy ny fisasaran’ny tanako ka nananatra anao alina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanao fanekena i Labana sy i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia namaly i Labana hoe: Ireo zazavavy ireo dia zanako vavy; ireo zazalahy ireo dia zanako lahy; ireo ondry aman’osy ireo dia ondry aman’osiko, ary izao rehetra hitanao izao dia ahy avokoa. Koa inona no hataoko anio amin’ireto zanako vavy, na amin’ireto zanany naterany? '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Koa ankehitriny, andeha hanao fanekena isika, dia izaho sy ianao, koa aoka ho vavolombelona amiko sy aminao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Dia naka vato iray i Jakoba ka nanangana azy ho tsangambato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary hoy i Jakoba tamin’ireo havany: Manangòna vato. Dia naka vato izy ireo ka nataony antontany; dia nisakafo teo anilan’ny antontam-bato izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ary ny anaran’ny antontam-bato dia nataon’i Labana hoe Jegara-Sahadota, fa i Jakoba kosa dia niantso azy hoe Galeda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.47 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Na ny Arameana Jegara-Sahadota, na ny Hebreo Galeda dia samy midika hoe Antontam-bato vavolombelona.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary hoy i Labana: Ity antontam-bato ity no vavolombelona amintsika anio. Izany no nanaovany ny anarany hoe Galeda. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Nataony hoe Mizpa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.49 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mizpa: Toeram-pitazanana.'
    marker-yv: yv-n
  - type: text
    text: ' koa izy, fa hoy izy: NY TOMPO no hitazana ahy sy ianao rehefa tsy mifankahita isika. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Raha toa ka mampahory ireo zanako vavy ianao, na manambady ankoatra ireo zanako vavy ireo ary tsy misy olona vavolombelona eto amintsika, dia tandremo fa Andriamanitra no ho vavolombelona amiko sy aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Hoy ihany i Labana tamin’i Jakoba: Indro ity antontam-bato ity, ary indro ity tsangambato ity izay naoriko eto anelanelantsika, dia amiko sy aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ity antontam-bato ity dia vavolombelona, ary ity tsangambato ity dia vavolombelona, mba tsy hihoatra ity antontam-bato ity hankany aminao aho, ary ianao kosa dia tsy mba hihoatra ity antontam-bato ity sy ity tsangambato ity hankaty amiko hanisy ratsy ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Ny andriamanitr’i Abrahama sy ny andriamanitr’i Nahora, dia ny andriamanitry ny rain’izy mirahalahy, anie no hitsara antsika. Fa Ilay natahoran’Isaka rainy kosa no nianianan’i Jakoba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Dia namono zavatra hatao fanatitra teo an-tendrombohitra i Jakoba ka nanasa ny havany mba hisakafo; dia nisakafo izy ireo ka nitoetra teo an-tendrombohitra nandritra ny alina.
