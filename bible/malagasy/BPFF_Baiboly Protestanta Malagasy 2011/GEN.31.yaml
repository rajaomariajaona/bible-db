document_id: GEN.31,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa ren’i Jakoba ny resaky ny zanakalahin’i Labana hoe: Lasan’i Jakoba avokoa izay rehetra ananan’ny raintsika; avy tamin’ny fananan’ny raintsika no nahazoany ireo harena rehetra ireo. '
  '10':
  - type: text
    content: 'Ary tamin’ny fotoana izay nikambanan’ny ondry aman’osy dia natopiko ny masoko ka hitako tamin’ny nofy fa indro, sadika sy mara ary sada ny lahy izay nikambana tamin’ny ondrivavy sy ny osivavy. '
  '11':
  - type: text
    content: 'Ary hoy ilay Anjelin’Andriamanitra tamiko tamin’ny nofy: Ry Jakoba! Dia hoy aho: Inty aho! '
  '12':
  - type: text
    content: 'Ary hoy Izy: Mba atopazy ny masonao ka jereo fa sadika sy mara ary sada ny lahy rehetra izay mikambana amin’ny ondrivavy sy ny osivavy, satria hitako izay rehetra nataon’i Labana taminao. '
  '13':
  - type: text
    content: Izaho no Andriamanitr’i Betela izay nanosoranao tsangambato sy nanaovanao voady. Miaingà ankehitriny hiala amin’ity tany ity ka miverena any amin’ny tanin’ny razanao.
  '14':
  - type: text
    content: 'Dia namaly azy Rahely sy i Lea hoe: Mbola misy anjara lova ho anay va ao an-tranon’ny rainay? '
  '15':
  - type: text
    content: 'Tsy nataony toy ny vahiny va izahay? Fa namidiny izahay sady nohaniny hatrany ny volanay rehetra. '
  '16':
  - type: text
    content: Fa ny harena rehetra izay nalain’Andriamanitra tamin’ny rainay dia anay sy an’ny zanakay. Koa ankehitriny, izay rehetra nolazain’Andriamanitra taminao dia ataovy.
  '17':
  - type: text
    content: 'Dia niainga i Jakoba ka nampitaingeniny rameva ireo zanany sy ireo vadiny. '
  '18':
  - type: text
    content: 'Noentiny nandeha ny ombiny sy ny ondry aman’osiny rehetra, mbamin’ny fananana rehetra izay nohariny, dia ny omby aman’ondry izay azony tany Padana-Arama. Niainga izy mba hankany amin’Isaka rainy any amin’ny tany Kanana. '
  '19':
  - type: text
    content: 'Ary raha lasa nandeha hanety ny ondry aman’osiny i Labana dia nangalarin’i Rahely ireo terafiman’ny rainy; '
  '2':
  - type: text
    content: 'Ary hitan’i Jakoba ny tarehin’i Labana fa tsy mba miramirana taminy tahaka ny taloha intsony. '
  '20':
  - type: text
    content: 'satria nangala-dia tamin’i Labana siriana i Jakoba fa tsy nambarany taminy ny amin’ny handosirany. '
  '21':
  - type: text
    content: Nandositra izy ka nitondra ny fananany rehetra; niainga izy ka nita ny ony Eofrata, ary nizotra hankany amin’ny tendrombohitra any Gileada.
  - type: heading
    content: Tratran’i Labana i Jakoba
  '22':
  - type: text
    content: 'Tamin’ny andro fahatelo dia nisy nanambara tamin’i Labana fa lasa nandositra i Jakoba. '
  '23':
  - type: text
    content: 'Dia nitondra ny havany hiaraka aminy izy ka nanenjika azy lalan-kafitoana ary nahatratra azy tany amin’ny tendrombohitra any Gileada. '
  '24':
  - type: text
    content: 'Fa Andriamanitra nankao amin’i Labana arameana tamin’ny nofy nony alina ka niteny taminy hoe: Tandremo mba tsy hiteny na inona na inona amin’i Jakoba ianao.'
  '25':
  - type: text
    content: 'Ary nahatratra an’i Jakoba i Labana. Efa nanorina ny tranolainy tany an-tendrombohitra i Jakoba; i Labana sy ny havany kosa dia nanorina ny tranolainy tany amin’ny tendrombohitra any Gileada. '
  '26':
  - type: text
    content: 'Ary hoy i Labana tamin’i Jakoba: Inona izao ataonao izao no dia nangala-dia tamiko ianao ka nitondra ny zanako vavy toy ny babo azo tamin’ny sabatra? '
  '27':
  - type: text
    content: 'Nahoana no nandositra mangingina ianao ka nangala-dia tamiko? Tsy nanambara tamiko ianao mba hanaterako anao amin’ny fifaliana sy ny hira, amin’ny ampongatapaka sy ny lokanga, '
  '28':
  - type: text
    content: 'sady tsy mba navelanao hanoroka ny zanako lahy sy ny zanako vavy aho. Nahavita hadalana ianao izao. '
  '29':
  - type: text
    content: 'Manan-kery hanisy ratsy anareo ny tanako; nefa Andriamanitry ny rainareo no niteny tamiko alina hoe: Tandremo mba tsy hiteny na inona na inona amin’i Jakoba ianao. '
  '3':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Jakoba: Modia any amin’ny tanin’ny razanao sy any amin’ny havanao, fa homba anao Aho. '
  '30':
  - type: text
    content: Koa ankehitriny, raha handeha tokoa ianao, satria manina ny tranon’ny rainao, nahoana no nangalarinao ireo andriamanitro?
  '31':
  - type: text
    content: 'Dia namaly an’i Labana i Jakoba hoe: Satria natahotra aho ka niteny anakampo hoe: Angamba halainao an-keriny amiko ireo zanakao vavy. '
  '32':
  - type: text
    content: Izay hahitanao ireo andriamanitrao indray dia aoka tsy ho velona. Eto anatrehan’ny havantsika, savao izay ato amiko ka ento ny anao. Tsy fantatr’i Jakoba anefa fa Rahely no nangalatra azy.
  '33':
  - type: text
    content: 'Ary niditra tao an-dain’i Jakoba sy tao an-dain’i Lea ary tao an-dain’ny mpanompo roa vavy i Labana nefa tsy nahita. Dia niala tao an-dain’i Lea izy ka niditra tao an-dain’i Rahely. '
  '34':
  - type: text
    content: 'Rahely anefa efa naka ny '
  - type: text
    content: terafima
  - type: text
    content: ' ka nanao azy tao anatin’ny laselin’ny rameva, dia nipetraka teo amboniny izy. Nikaroka nanerana ny tranolay manontolo i Labana fa tsy nahita. '
  '35':
  - type: text
    content: 'Hoy Rahely tamin’ny rainy: Azafady, tompokolahy, fa tsy mahazo mitsangana eto anatrehanao aho satria azon’ny fombam-behivavy. Dia nikaroka fatratra izy nefa tsy nahita ny sampy.'
  '36':
  - type: text
    content: 'Dia tezitra i Jakoba ka nifamaly tamin’i Labana. Hoy izy tamin’i Labana hoe: Inona no heloko? Inona no otako no nilomay nanenjika ahy ianao? '
  '37':
  - type: text
    content: 'Efa nosavanao avokoa ny entako rehetra, koa inona no fanaka avy tany an-tranonao hitanao tao? Apetraho eto anatrehan’ny havako sy ny havanao izany, hitsarany antsika roa lahy. '
  '38':
  - type: text
    content: 'Roapolo taona izao no nitoerako tany aminao; ny ondrivavinao sy ny osivavinao dia tsy mba namotsotra, ary tsy mba nihinana ny ondrilahy avy tamin’ny ondrinao aho. '
  '39':
  - type: text
    content: 'Izay voaviraviram-biby dia tsy mba nentiko tany aminao fa izaho no nanolo azy; teo an-tanako no nitadiavanao azy, na ny nangalarina andro na ny nangalarina alina. '
  '4':
  - type: text
    content: 'Ary i Jakoba dia nampiantso an’i Rahely sy i Lea izay tany an-tsaha, teo amin’ny ondry aman’osiny, '
  '40':
  - type: text
    content: 'Nony antoandro dia matin’ny hainandro aho, nony alina dia matin’ny fanala, ary nandositra ny masoko ny torimaso. '
  '41':
  - type: text
    content: 'Roapolo taona izao no nitoerako tany an-tranonao ka efatra amby folo taona no nanompoako anao hahazoako azy mirahavavy zanakao, ary enin-taona kosa hahazoako ny ondry aman’osinao; efa nanova ny karamako impolo ianao. '
  '42':
  - type: text
    content: Raha tsy ny Andriamanitry ny raiko, dia Andriamanitr’i Abrahama, ilay natahoran’Isaka, no nomba ahy, dia ho nampandehaninao maina tokoa aho ankehitriny. Andriamanitra efa nitsinjo ny fahoriako sy ny fisasaran’ny tanako ka nananatra anao alina.
  - type: heading
    content: Nanao fanekena i Labana sy i Jakoba
  '43':
  - type: text
    content: 'Dia namaly i Labana hoe: Ireo zazavavy ireo dia zanako vavy; ireo zazalahy ireo dia zanako lahy; ireo ondry aman’osy ireo dia ondry aman’osiko, ary izao rehetra hitanao izao dia ahy avokoa. Koa inona no hataoko anio amin’ireto zanako vavy, na amin’ireto zanany naterany? '
  '44':
  - type: text
    content: 'Koa ankehitriny, andeha hanao fanekena isika, dia izaho sy ianao, koa aoka ho vavolombelona amiko sy aminao izany. '
  '45':
  - type: text
    content: Dia naka vato iray i Jakoba ka nanangana azy ho tsangambato.
  '46':
  - type: text
    content: 'Ary hoy i Jakoba tamin’ireo havany: Manangòna vato. Dia naka vato izy ireo ka nataony antontany; dia nisakafo teo anilan’ny antontam-bato izy rehetra. '
  '47':
  - type: text
    content: Ary ny anaran’ny antontam-bato dia nataon’i Labana hoe Jegara-Sahadota, fa i Jakoba kosa dia niantso azy hoe Galeda
  - type: note
    content: Na ny Arameana Jegara-Sahadota, na ny Hebreo Galeda dia samy midika hoe Antontam-bato vavolombelona.
  - type: text
    content: '. '
  '48':
  - type: text
    content: 'Ary hoy i Labana: Ity antontam-bato ity no vavolombelona amintsika anio. Izany no nanaovany ny anarany hoe Galeda. '
  '49':
  - type: text
    content: Nataony hoe Mizpa
  - type: note
    content: 'Mizpa: Toeram-pitazanana.'
  - type: text
    content: ' koa izy, fa hoy izy: NY TOMPO no hitazana ahy sy ianao rehefa tsy mifankahita isika. '
  '5':
  - type: text
    content: 'ka niteny tamin’izy ireo hoe: Hitako ny tarehin’ny rainareo fa tsy mba miramirana amiko tahaka ny taloha; nefa Andriamanitry ny raiko no nomba ahy. '
  '50':
  - type: text
    content: 'Raha toa ka mampahory ireo zanako vavy ianao, na manambady ankoatra ireo zanako vavy ireo ary tsy misy olona vavolombelona eto amintsika, dia tandremo fa Andriamanitra no ho vavolombelona amiko sy aminao. '
  '51':
  - type: text
    content: 'Hoy ihany i Labana tamin’i Jakoba: Indro ity antontam-bato ity, ary indro ity tsangambato ity izay naoriko eto anelanelantsika, dia amiko sy aminao. '
  '52':
  - type: text
    content: 'Ity antontam-bato ity dia vavolombelona, ary ity tsangambato ity dia vavolombelona, mba tsy hihoatra ity antontam-bato ity hankany aminao aho, ary ianao kosa dia tsy mba hihoatra ity antontam-bato ity sy ity tsangambato ity hankaty amiko hanisy ratsy ahy. '
  '53':
  - type: text
    content: Ny andriamanitr’i Abrahama sy ny andriamanitr’i Nahora, dia ny andriamanitry ny rain’izy mirahalahy, anie no hitsara antsika. Fa Ilay natahoran’Isaka rainy kosa no nianianan’i Jakoba.
  '54':
  - type: text
    content: Dia namono zavatra hatao fanatitra teo an-tendrombohitra i Jakoba ka nanasa ny havany mba hisakafo; dia nisakafo izy ireo ka nitoetra teo an-tendrombohitra nandritra ny alina.
  '6':
  - type: text
    content: 'Fantatrareo fa tamin’ny heriko rehetra no nanompoako ny rainareo, '
  '7':
  - type: text
    content: 'kanefa ny rainareo no namitaka ahy ka nanova ny karamako impolo; tsy navelan’Andriamanitra hahatonga loza tamiko anefa izy. '
  '8':
  - type: text
    content: 'Raha nilaza izy hoe: Ny mara rehetra no ho karamanao, dia niteraka mara ny ondry aman’osy rehetra; raha nilaza indray izy hoe: Ny sadika rehetra no ho karamanao, dia niteraka sadika ny ondry aman’osy rehetra. '
  '9':
  - type: text
    content: Dia nalain’Andriamanitra ny fananan’ny rainareo ka nomeny ahy.
