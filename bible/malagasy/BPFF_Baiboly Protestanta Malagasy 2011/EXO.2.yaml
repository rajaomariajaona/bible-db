document_id: EXO.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahaterahan’i Mosesy sy ny fahazazany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nisy lehilahy iray avy amin’ny ankohonan’i Levy lasa naka vady tamin’ny zanakavavin’i Levy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary rehefa lehibe ny zaza dia noentiny tao amin’ny zanakavavin’i Farao ka tonga zanany. Ary ny anarany nataony hoe Mosesy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mosesy: Nalaina tamin’ny rano.'
      marker-yv: yv-n
    - type: text
      text: ', fa hoy izy: Satria tamin’ny rano no nakako azy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandositra mankany Midiana i Mosesy
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tamin’izany andro izany, rehefa lehibe i Mosesy, dia nandeha nankany amin’ireo rahalahiny izy ka nijery ny fanompoany mafy ary nahita lehilahy ejiptiana nikapoka ny iray tamin’ny Hebreo rahalahiny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia niherikerika izy, ka nony hitany fa tsy nisy olona, dia novonoiny ilay Ejiptiana ary nasitriny tao anaty fasika ny fatiny.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny ampitson’iny, nandeha indray izy, ary indreo, nisy Hebreo roa lahy niady. Dia hoy izy tamin’ilay diso: Nahoana no mamono ny namanao ianao? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa hoy izy: Iza no nanendry an’Ialahy ho mpanapaka sy mpitsara anay? Moa mikasa hamono ahy koa va Ialahy, tahaka ny namonoan’Ialahy ilay Ejiptiana? Dia raiki-tahotra i Mosesy ka niteny hoe: Hay tena fantatr’olona izany ny raharaha!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Rehefa ren’i Farao izany zavatra izany dia nitady hamono an’i Mosesy izy. Fa nandositra an’i Farao i Mosesy ka nonina tany amin’ny tany Midiana. Ary nipetraka teo anilan’ny lavaka fantsakana iray izy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny mpisorona tany Midiana dia nanana zanaka fito mirahavavy. Tonga teo amin’ny fantsakana izy ireo nanovo rano ka nameno ny fampisotroan-drano, hampisotroany ny ondry aman’osin-drainy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nefa tonga teo kosa ny lehilahy mpiandry ondry sasany ka nandroaka azy ireo. Fa nitsangana i Mosesy namonjy azy dia nampisotro rano ny ondry aman’osiny.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Rehefa tonga teo amin’i Regoela rainy izy fito mirahavavy ireo dia hoy ny rainy: Nahoana no dia nalaky tonga toy izao ianareo androany? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hoy izy ireo: Nisy lehilahy ejiptiana iray namonjy anay tamin’ny tanan’ny mpiandry ondry sady nanovo rano ho anay, no nampisotro ny ondry aman’osy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nanana anaka Ravehivavy ka niteraka zazalahy. Ary rehefa hitany fa zaza tsara tarehy ilay izy dia nafeniny telo volana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary hoy izy tamin’ireo zanany vavy: Koa aiza izy izany? Nahoana no nilaozanareo any izao lehilahy izao? Antsoy izy mba hihinan-kanina.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary sitrak’i Mosesy ny hitoetra tao amin-dRalehilahy. Koa i Zipora zanany vavy dia nomeny ho vadin’i Mosesy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dia niteraka zazalahy Ravehivavy, ary ny anarany nataon’i Mosesy hoe Gersoma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gersoma: Vahiny. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Vahiny any.
      marker-yv: yv-n
    - type: text
      text: '; fa hoy izy: Vahiny atỳ amin’ny tany hafa aho.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Taona maro taorianan’izany dia maty ny mpanjakan’i Ejipta; ary ny Zanak’Israely dia nisento noho ny fanompoany ka nitaraina; dia niakatra tany amin’Andriamanitra ny fitarainany noho ny fanompoany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary Andriamanitra nandre ny fitarainany. Ary Andriamanitra nahatsiaro ny fanekeny tamin’i Abrahama sy Isaka ary i Jakoba. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary Andriamanitra nijery ny Zanak’Israely. Ary Andriamanitra nahafantatra azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary rehefa tsy azony nafenina intsony dia naka vata kely zozoro izy ka nopetahany godorao sy dity ilay vata kely, dia napetrany tao ny zaza; ary napetrany tao anaty zozoro teo amoron’ny Neily ny vata kely. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary nijanona teny lavidavitra teny ny anabaviny mba hahitany izay hanjo azy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nidina ny zanakavavin’i Farao mba handro tao amin’ny Neily fa ny mpanompovaviny dia nitsangantsangana teny amoron’ny Neily; koa raha nahita ilay vata kely teo anaty zozoro ny zanakavavin’i Farao dia naniraka ny mpanompovaviny iray izy mba haka izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony nosokafany dia hitany ny zazakely; ary indro zazalahy mitomany. Dia onena azy izy ka niteny hoe: Isan’ny zanaky ny Hebreo ity!'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa hoy ilay anabavin’ny zazakely tamin’ny zanakavavin’i Farao: Handeha haka mpitaiza amin’ny vehivavy hebreo va aho hankaty aminao mba hataonao mpitaiza azy? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia hoy ny zanakavavin’i Farao taminy: Andeha ary. Dia lasa Razazavavy niantso ny renin’ny zaza. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy ny zanakavavin’i Farao taminy: Ento ity zaza ity, fa ianao no ataoko mpitaiza azy, ary izaho no handoa ny karamanao. Dia noentin-dRavehivavy ny zaza ka nampinonoiny.'
