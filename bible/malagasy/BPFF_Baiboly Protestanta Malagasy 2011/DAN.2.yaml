document_id: DAN.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nofin’i Nebokadnezara voalohany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona faharoa nanjakany dia nanonofy i Nebokadnezara ka nitebiteby sady tsy nahita tory. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly teo anatrehan’ny mpanjaka ny Kaldeana hoe: Tsy misy olona mahay milaza izany nofin’ny mpanjaka izany etỳ ambonin’ny tany; fa tsy mbola nisy mpanjaka nila zavatra toy izany tamin’ny ombiasy sy ny mpisikidy ary ny Kaldeana, na dia izay lehibe sy mahery indrindra aza. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sarotra ny zavatra anontanian’ny mpanjaka ka tsy misy mahay milaza izany eo anatrehan’ny mpanjaka afa-tsy ireo andriamanitra izay tsy manam-ponenana miaraka amin’ny olona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’Andriamanitra amin’i Daniela ny nofin’ny mpanjaka
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia vinitra sady tezitra dia tezitra ny mpanjaka noho izany ka nasainy naringana ny olon-kendrin’i Babilona rehetra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary navoaka ny didy nampamono ny olon-kendry; i Daniela sy ny namany koa dia mba notadiaviny hovonoina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalin’i Daniela tamim-pahamendrehana sy feno fahendrena i Arioka, lehiben’ny mpiambina ny mpanjaka izay efa nivoaka hamono ny olon-kendrin’i Babilona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, hoy izy tamin’i Arioka, lehibe voatendrin’ny mpanjaka: Nahoana no dia mafy toy izany ny didy avy amin’ny mpanjaka? Dia nambaran’i Arioka tamin’i Daniela ny zava-nitranga. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niditra i Daniela ka nangataka tamin’ny mpanjaka mba hanome andro azy, fa holazainy amin’ny mpanjaka ny hevitry ny nofy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nody tany an-tranony i Daniela ka nanambara ilay zavatra tamin’i Hanania sy i Misaela ary i Azaria namany '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hangatahan’ireo famindrampo amin’Andriamanitry ny lanitra ny amin’izany zavamiafina izany ka tsy haringana i Daniela sy ny namany mbamin’ny olon-kendrin’i Babilona rehetra.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naseho an’i Daniela tamin’ny fahitana tamin’ny alina ilay zavamiafina ka nisaotra an’Andriamanitry ny lanitra i Daniela. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasain’ny mpanjaka nantsoina ny ombiasy, ny mpisikidy, ny mpitana ody ary ny Kaldeana mba hilaza amin’ny mpanjaka ny hevitry ny nofiny. Dia tonga ireny ka nitsangana teo anatrehan’ny mpanjaka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Daniela:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie ny anaran’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny taloha indrindra ka ho mandrakizay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azy ny fahendrena sy ny hery.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mandahatra ny andro sy ny fotoana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no manaisotra mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manangana mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no manome fahendrena ho an’ny hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fahalalana ho an’izay marani-tsaina.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mampiseho ny zava-dalina sy miafina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mahalala izay ao amin’ny maizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mazava dia mitoetra ao Aminy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao, ry Andriamanitry ny razako ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no deraiko sy isaorako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nomenao fahendrena sy hery aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ankehitriny dia nampahafantarinao ahy izay nangatahinay taminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nampahafantarinao anay ilay nofin’ny mpanjaka.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho izany i Daniela dia niditra nankao amin’i Arioka izay notendren’ny mpanjaka handringana ny olon-kendrin’i Babilona; eny, nandeha izy ka nilaza taminy hoe: Aza mandringana ny olon-kendrin’i Babilona; fa ento ho eo anatrehan’ny mpanjaka aho dia hambarako aminy ny hevitry ny nofiny.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay sariolona manana tongotra vita amin’ny tanimanga
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noentin’i Arioka haingana ho eo anatrehan’ny mpanjaka i Daniela, sady hoy izy taminy: Nahita lehilahy isan’ny babo avy any Joda aho, izay hilaza amin’ny mpanjaka ny hevitry ny nofy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka tamin’i Daniela izay antsoina koa hoe Beltesazara: Moa mahay manambara amiko ny nofy izay hitako mbamin’ny heviny va ianao? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly teo anatrehan’ny mpanjaka i Daniela hoe: Ilay zavamiafina nanontanian’ny mpanjaka dia tsy hain’ny olon-kendry, na ny mpisikidy, na ny ombiasy, na ny mpanandro nolazaina tamin’ny mpanjaka; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kanefa misy Andriamanitra any an-danitra, izay mampiseho zavamiafina ka mampahafantatra an’i Nebokadnezara mpanjaka izay ho tonga amin’ny ho avy. Ny nofinao sy ny fahitana hitanao teo amin’ny farafaranao dia izao: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny aminao, ry mpanjaka ô, raha natory ianao, dia tonga tao an-tsainao ny amin’izay ho avy rahatrizay; ary Ilay mampiseho zavamiafina dia mampahafantatra anao izay ho avy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka taminy: Nanonofy aho ka mitebiteby ta hahalala ny hevitry ny nofiko. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izaho aza, dia tsy noho ny fahendrena ananako mihoatra noho ny olombelona rehetra tsy akory no nampisehoana tamiko ny zavamiafina, fa ny mba hampahafantarana anao mpanjaka ilay hevitra ka hahafantaranao ny eritreritry ny fonao.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahita ianao, ry mpanjaka ô, fa indro nisy sariolona lehibe iray. Izany sary izany dia lehibe sady namirapiratra tsara. Nijoro teo anatrehanao izy ary ny fijery azy dia nampahatahotra. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lohan’izany sary izany dia volamena tsara, ny tratrany sy ny sandriny dia volafotsy, ny kibony sy ny feny dia varahina, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny ranjony dia vy ary ny tongony dia vy sy tanimanga. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nijery azy ianao dia nisy vato voaendaka nefa tsy nendahan-tanana, ary namely ilay sary teo amin’ny tongony vy sy tanimanga izany ka nahatorotoro azy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niara-torotoro ny vy, ny tanimanga, ny varahina, ny volafotsy ary ny volamena ka tonga toy ny akofa eo am-pamoloana amin’ny fahavaratra; ary nopaohin’ny rivotra izy ka tsy nisy tany hitoerany; ary ilay vato namely ny sary dia tonga tendrombohitra lehibe nahafeno ny tany rehetra.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no nofy ary holazainay eto anatrehan’ny mpanjaka koa ny heviny.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry mpanjaka ô, mpanjakan’ny mpanjaka ianao fa nomen’Andriamanitry ny lanitra fanjakana sy hery, fahaleovana sy voninahitra. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanak’olombelona sy ny bibidia ary ny voromanidina, na aiza na aiza itoerany, dia nomeny ho eo an-tananao, ary nataony ho mpanjakan’izy rehetra ianao; koa ianao izany loha volamena izany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manarakaraka anao dia hisy fanjakana hafa hitsangana, ambany noho ny anao, ary hisy fanjakana fahatelo koa izay varahina sady hanam-pahefana amin’ny tany rehetra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’ny mpanjaka amin’ny teny arameana ireny Kaldeana ireny hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry mpanjaka ô, ho velona mandrakizay anie ianao! Ambarao aminay mpanomponao ny nofy dia holazainay ny heviny. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanjakana fahefatra dia ho mafy toy ny vy; fa toy ny vy manorotoro sy mahamongomongo ny zavatra rehetra, ary toy ny famakivakin’ny vy ireo rehetra ireo, dia toy izany no hamakivakiany sy hanorotoroany azy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitanao ny tongony sy ny rantsantongony, fa ny tapany dia tanimangan’ny mpanefy tanimanga, ary ny tapany vy, dia ho fanjakana mizarazara izy; nefa hisy herim-by ao aminy, satria nahita vy miharo tanimanga mbola fotaka ianao. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary toy ny rantsantongony, ny tapany dia vy, ny tapany tanimanga, dia ho toy izany ny fanjakana, ny tapany dia ho mafy, ary ny tapany dia ho malemy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy ny nahitanao ny vy miharo tanimanga mbola fotaka, dia toy izany no hiharoany amin’ny taranak’olombelona: Nefa tsy hitambatra izy, toy ny tsy fetezan’ny vy miharo amin’ny tanimanga. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’ny andron’ireo mpanjaka ireo, Andriamanitry ny lanitra dia hanorina fanjakana tsy ho rava mandrakizay; tsy havela ho an’olon-kafa io fanjakana io, fa ireo fanjakana rehetra ireo dia hotorotoroiny sy holevoniny, nefa izy kosa dia hitoetra mandrakizay. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa toy ilay nahitanao ny vato nendahina tamin’ny tendrombohitra, nefa tsy nendahan-tanana, sy ny nanorotoroany ny vy sy ny varahina, ny tanimanga, ny volafotsy ary ny volamena, dia ampahafantarin’Andriamanitra lehibe ny mpanjaka ny amin’ny zavatra ho avy rahatrizay. Marina ny nofy, ary azo antoka ny fanazavana azy.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niankohoka teo anatrehan’i Daniela i Nebokadnezara mpanjaka ary nampanolotra fanatitra sy hanitra mani-pofona ho azy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’i Daniela: Marina tokoa fa Andriamanitrareo dia Andriamanitry ny andriamanitra sy Tompon’ny mpanjaka ary mpampiseho zavamiafina ka nahay nampiseho izany zavamiafina izany ianao. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’izay ny mpanjaka dia nanandratra an’i Daniela ho lehibe ka nanome azy zavatra maro sady lehibe ary nanendry azy ho mpanapaka ny faritanin’i Babilona manontolo sy ho lehiben’ny mpanapaka ny olon-kendrin’i Babilona rehetra. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nangataka tamin’ny mpanjaka i Daniela mba hanendreny an’i Sadraka sy i Mesaka ary i Abed-Nego ho tonian’ny raharahan’ny faritanin’i Babilona. Ary i Daniela kosa dia teo am-bavahadin’ny mpanjaka.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ireny Kaldeana ireny ny mpanjaka hoe: Efa niloa-bava aho, fa raha tsy ampahafantarinareo ahy ny nofy sy ny heviny dia hotetitetehina ianareo ary ny tranonareo dia hatao trano fivoahana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha milaza ny nofy sy ny heviny kosa ianareo dia hahazo fanomezana sy valim-pitia ary voninahitra be. Koa ambarao ahy ny nofy mbamin’ny heviny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly indray ireo hoe: Aoka ny mpanjaka hilaza ny nofy aminay mpanompony dia hambaranay ny heviny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly ny mpanjaka hoe: Fantatro marina tokoa fa mandany andro foana ianareo satria hitanareo fa efa niloa-bava aho. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tsy hampahafantarinareo ahy ny nofy dia didim-pitsarana iray ihany no miandry anareo; fa ianareo dia miray tetika hilaza teny lainga sy arirarira foana eto anatrehako mandra-piovan’ny toe-javatra. Koa ambarao ahy ny nofy dia ho fantatro fa mahalaza ny heviny amiko tokoa ianareo. '
