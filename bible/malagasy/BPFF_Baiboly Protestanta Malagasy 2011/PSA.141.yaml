document_id: PSA.141,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: TOMPO ô, ambeno ny teny lazaiko
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, miantso Anao aho, faingàna hankaty amiko;
  - type: text
    content: henoy ny feoko amin’ny fiantsoako Anao.
  '10':
  - type: text
    content: Aoka ho latsaka eo anatin’ny fandrika nataony ihany ny ratsy fanahy
  - type: text
    content: fa izaho kosa dia handalo fotsiny.
  '2':
  - type: text
    content: Aoka hankeo anatrehanao mandrakariva toy ny ditin-kazo manitra ny vavaka ataoko
  - type: text
    content: ary ho toy ny fanatitra hariva ny fanandratako ny tanako.
  '3':
  - type: text
    content: TOMPO ô, asio fiambenana ny vavako;
  - type: text
    content: ambeno ny varavaran’ny molotro.
  '4':
  - type: text
    content: Aza avela hirona ho amin’ny zava-dratsy ny foko
  - type: text
    content: hiray raharaha amin’ny olona mpanao ratsy
  - type: text
    content: ka hanao izay asa tsy mety,
  - type: text
    content: ary aoka tsy hihinana ny haniny matsiro aho.
  '5':
  - type: text
    content: Aoka ny marina hamely ahy
  - type: text
    content: amin’ny fahalemem-panahy ka hananatra ahy, fa diloilo ahosotra ny lohako izany,
  - type: text
    content: ary aoka tsy handa izany ny lohako;
  - type: text
    content: fa ny hany heriko dia ny mbola hivavaka ihany noho ny faharatsian’ireny.
  '6':
  - type: text
    content: Havarina amin’ny hantsam-bato ny mpitsara azy,
  - type: text
    content: dia hankasitraka ny teniko ny olona fa mamy izany.
  '7':
  - type: text
    content: Toy ny fiasa sy ny fihevo ny tany
  - type: text
    content: 'no nanelezana ny taolanay teo am-bavan’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: .
  '8':
  - type: text
    content: Fa Ianao no andrandrain’ny masoko, TOMPO Andriamanitra ô;
  - type: text
    content: Ianao no ialofako,
  - type: text
    content: aza mandatsaka ny aiko.
  '9':
  - type: text
    content: Arovy aho amin’ny fandrika amandrihany ahy
  - type: text
    content: sy amin’ny tadivavaran’ny mpanao ratsy.
