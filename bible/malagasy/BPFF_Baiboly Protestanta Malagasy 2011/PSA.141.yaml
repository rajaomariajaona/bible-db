document_id: PSA.141
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: TOMPO ô, ambeno ny teny lazaiko
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, miantso Anao aho, faingàna hankaty amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: henoy ny feoko amin’ny fiantsoako Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka hankeo anatrehanao mandrakariva toy ny ditin-kazo manitra ny vavaka ataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho toy ny fanatitra hariva ny fanandratako ny tanako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: TOMPO ô, asio fiambenana ny vavako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambeno ny varavaran’ny molotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aza avela hirona ho amin’ny zava-dratsy ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiray raharaha amin’ny olona mpanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanao izay asa tsy mety,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy hihinana ny haniny matsiro aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka ny marina hamely ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fahalemem-panahy ka hananatra ahy, fa diloilo ahosotra ny lohako izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy handa izany ny lohako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny hany heriko dia ny mbola hivavaka ihany noho ny faharatsian’ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Havarina amin’ny hantsam-bato ny mpitsara azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hankasitraka ny teniko ny olona fa mamy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Toy ny fiasa sy ny fihevo ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no nanelezana ny taolanay teo am-bavan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa Ianao no andrandrain’ny masoko, TOMPO Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no ialofako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza mandatsaka ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Arovy aho amin’ny fandrika amandrihany ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny tadivavaran’ny mpanao ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aoka ho latsaka eo anatin’ny fandrika nataony ihany ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho kosa dia handalo fotsiny.
