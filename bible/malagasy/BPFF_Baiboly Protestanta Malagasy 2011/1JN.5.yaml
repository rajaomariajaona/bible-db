document_id: 1JN.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mino ny fanambaràn’Andriamanitra
  - type: text
    content: 'Izay rehetra mino fa Jesosy no '
  - type: text
    content: Kristy
  - type: text
    content: ' dia naterak’Andriamanitra; ary izay rehetra tia Izay niteraka dia tia izay naterany koa. '
  '10':
  - type: text
    content: Izay mino ny Zanak’Andriamanitra no manana ny fanambaràna ao anatiny; izay tsy mino an’Andriamanitra dia efa nampandainga Azy, satria tsy mino ny fanambaràna izay nanambaràn’Andriamanitra ny Zanany izy.
  '11':
  - type: text
    content: 'Ary izao no fanambaràny: Fiainana mandrakizay no nomen’Andriamanitra antsika, ary ao amin’ny Zanany izany fiainana izany. '
  '12':
  - type: text
    content: Izay manana ny Zanaka no manana ny fiainana; izay tsy manana ny Zanak’Andriamanitra no tsy manana ny fiainana.
  - type: heading
    content: Ny toky ananana amin’ny finoana
  '13':
  - type: text
    content: 'Izany no nosoratako taminareo izay mino ny anaran’ny Zanak’Andriamanitra mba ho fantatrareo fa manana fiainana mandrakizay ianareo. '
  '14':
  - type: text
    content: 'Ary izao no toky ananantsika eo anatrehany: Raha mangataka zavatra araka ny sitrapony isika dia mihaino antsika Izy. '
  '15':
  - type: text
    content: Ary raha fantatsika fa mihaino antsika Izy, na inona na inona no angatahintsika, dia fantatsika fa azontsika izay angatahintsika Aminy.
  '16':
  - type: text
    content: 'Raha misy mahita ny rahalahiny manao ota tsy mitondra ho amin’ny fahafatesana dia aoka hifona ho azy izy, ary Andriamanitra no hanome azy fiainana; ho an’izay nanao ota tsy ho amin’ny fahafatesana izany. Misy ota ho amin’ny fahafatesana. Tsy mba lazaiko fa tokony hangataka ny amin’izany izy. '
  '17':
  - type: text
    content: Ota avokoa ny tsy fahamarinana rehetra; ary misy ota tsy ho amin’ny fahafatesana.
  '18':
  - type: text
    content: 'Fantatsika fa izay rehetra naterak’Andriamanitra dia tsy manota; fa Ilay naterak’Andriamanitra no miaro azy ka tsy mikasika azy akory ilay Ratsy. '
  '19':
  - type: text
    content: 'Fantatsika fa avy amin’Andriamanitra isika, ary izao tontolo izao kosa dia mipetraka eo amin’ilay Ratsy avokoa. '
  '2':
  - type: text
    content: 'Izao no ahafantarantsika fa tia ireo zanak’Andriamanitra isika, dia ny itiavantsika an’Andriamanitra sy ny anatanterahantsika ny didiny. '
  '20':
  - type: text
    content: 'Ary fantatsika fa tonga ny Zanak’Andriamanitra ka efa nanome antsika ny fahazavan-tsaina mba ho fantatsika Ilay Marina; ary isika dia ao amin’Ilay Marina, ao amin’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Zanany. Izy no Andriamanitra marina sy fiainana mandrakizay.'
  '21':
  - type: text
    content: Anaka, arovy ny tenanareo amin’ny sampy.
  '3':
  - type: text
    content: 'Fa izao no fitiavana an’Andriamanitra, dia ny hitandremantsika ny didiny. Ary tsy mavesatra ny didiny '
  '4':
  - type: text
    content: satria izay rehetra naterak’Andriamanitra dia maharesy izao tontolo izao; ary ny fandresena izay nandresy izao tontolo izao dia ny finoantsika.
  '5':
  - type: text
    content: 'Iza moa no maharesy izao tontolo izao afa-tsy izay mino fa Jesosy no Zanak’Andriamanitra? '
  '6':
  - type: text
    content: 'Izy ilay avy tamin’ny rano sy ny ra, dia Jesosy Kristy; tsy tamin’ny rano ihany, fa tamin’ny rano sy ny ra. Ary ny Fanahy no manambara satria ny Fanahy no fahamarinana. '
  '7':
  - type: text
    content: 'Fa misy telo izay manambara, '
  '8':
  - type: text
    content: 'dia ny Fanahy sy ny rano ary ny ra; ary mifanaraka tsara izy telo. '
  '9':
  - type: text
    content: 'Raha mandray ny fanambaràn’ny olona isika, lehibe lavitra ny fanambaràn’Andriamanitra; fa ny fanambaràn’Andriamanitra dia ny nanambaràny ny Zanany. '
