document_id: PRO.20
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mpaniratsira ny divay ary mpitabataba ny toaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa izay miraikiraiky azon’izany dia tsy hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny fandrahonana ataon’ny mpanjaka dia toy ny fieron’ny liona tanora;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mampahatezitra azy dia miantso loza hihatra amin’ny tenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voninahitry ny olona ny manalavitra ny fifandirana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny adala rehetra kosa misafoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny kamo dia tsy mety miasa tany amin’ny ririnina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy amin’ny fararano dia hangataka izy nefa tsy hahazo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rano lalina ny hevitra ao am-pon’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manan-tsaina dia mahay manovo ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Maro ny olona samy midera ny soa ataon’ny tenany avy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olona mahatoky, iza moa no mahita azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny olona marina dia mandeha amin’ny fahitsiany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sambatra ny zanany mandimby azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mipetraka eo amin’ny seza fitsarana ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny masony dia mikororòka manavaka ny ratsy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Iza no mahazo milaza hoe: Efa nahadio ny foko aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka madio afaka tamin’ny otako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny vato mizana tsy mitovy sy ny famarana tsy sahala
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy fahavetavetana eo imason’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Na dia ny tanora aza dia mampiseho amin’ny fanaony
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa madio sy mahitsy ny asany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny sofina mandre sy ny maso mahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy nataon’NY TOMPO avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza tia torimaso ianao, fandrao ho tonga mahantra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ahirato ny masonao dia ho voky hanina ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ratsy! Ratsy! Hoy ny mpividy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo nony lasa izy dia miarahaba tena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ao ihany ny volamena sy ny voahangy betsaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny molotra misy fahalalana no ravaka soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alao ny lambany fa efa niantoka olon-kafa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho solon’ny laniny tamin’ny fiantohana vahiny janga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mamin’ny olona ny hanina azo tamin’ny fitaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo avy eo dia fasika no mameno ny vavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny hevitra rehetra dia arafeto amin’ny fiaraha-misaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahaiza-mandamina tsara no entonao miady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay mandehandeha manaratsy dia manambara ny tsiambaratelo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa aza mifampiraharaha amin’izay mibedibedy foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay manozona ny rainy na ny reniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho faty ao amin’ny haizim-pito ny jirony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny lova norombahina teo am-boalohany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hotahìna amin’ny ho avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aza miteny hoe: Hamaly ny ratsy nataony aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa miandrasa NY TOMPO, fa Izy no hamonjy anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fahavetavetana eo imason’NY TOMPO ny vatomizana tsy mitovy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mizana mandainga dia tsy tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: NY TOMPO no mitantana ny dian’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olombelona, hataony ahoana ny hahafantatra ny lalany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fandrika amin’ny olona ny malaky miteny hoe: Zavatra masina ity,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nony vita ny voady vao mieritreritra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny mpanjaka hendry dia mikororòka manaisotra ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mandefa ny kodiarana eo amboniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Jiron’NY TOMPO ny fanahin’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitsilovana ny efitrefitra rehetra ao am-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Famindrampo sy fahamarinana no miaro ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampitoeriny amin’ny famindrampo ny sezafiandrianany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Voninahitry ny zatovo ny tanjany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ravaky ny zokiolona ny volo fotsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny ratra avy amin’ny kapoka dia mahafaka ny haratsiam-panahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kapoka dia tonga hatrany amin’ny aty fo.
