document_id: PRO.20,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Mpaniratsira ny divay ary mpitabataba ny toaka;
  - type: text
    content: koa izay miraikiraiky azon’izany dia tsy hendry.
  '10':
  - type: text
    content: Ny vato mizana tsy mitovy sy ny famarana tsy sahala
  - type: text
    content: dia samy fahavetavetana eo imason’NY TOMPO.
  '11':
  - type: text
    content: Na dia ny tanora aza dia mampiseho amin’ny fanaony
  - type: text
    content: fa madio sy mahitsy ny asany.
  '12':
  - type: text
    content: Ny sofina mandre sy ny maso mahita
  - type: text
    content: dia samy nataon’NY TOMPO avokoa.
  '13':
  - type: text
    content: Aza tia torimaso ianao, fandrao ho tonga mahantra;
  - type: text
    content: ahirato ny masonao dia ho voky hanina ianao.
  '14':
  - type: text
    content: Ratsy! Ratsy! Hoy ny mpividy;
  - type: text
    content: kanjo nony lasa izy dia miarahaba tena.
  '15':
  - type: text
    content: Ao ihany ny volamena sy ny voahangy betsaka,
  - type: text
    content: fa ny molotra misy fahalalana no ravaka soa.
  '16':
  - type: text
    content: Alao ny lambany fa efa niantoka olon-kafa izy
  - type: text
    content: ary ho solon’ny laniny tamin’ny fiantohana vahiny janga.
  '17':
  - type: text
    content: Mamin’ny olona ny hanina azo tamin’ny fitaka,
  - type: text
    content: kanjo avy eo dia fasika no mameno ny vavany.
  '18':
  - type: text
    content: Ny hevitra rehetra dia arafeto amin’ny fiaraha-misaina
  - type: text
    content: ary ny fahaiza-mandamina tsara no entonao miady.
  '19':
  - type: text
    content: Izay mandehandeha manaratsy dia manambara ny tsiambaratelo,
  - type: text
    content: koa aza mifampiraharaha amin’izay mibedibedy foana.
  '2':
  - type: text
    content: Ny fandrahonana ataon’ny mpanjaka dia toy ny fieron’ny liona tanora;
  - type: text
    content: izay mampahatezitra azy dia miantso loza hihatra amin’ny tenany.
  '20':
  - type: text
    content: Izay manozona ny rainy na ny reniny
  - type: text
    content: dia ho faty ao amin’ny haizim-pito ny jirony.
  '21':
  - type: text
    content: Ny lova norombahina teo am-boalohany
  - type: text
    content: dia tsy hotahìna amin’ny ho avy.
  '22':
  - type: text
    content: 'Aza miteny hoe: Hamaly ny ratsy nataony aho,'
  - type: text
    content: fa miandrasa NY TOMPO, fa Izy no hamonjy anao.
  '23':
  - type: text
    content: Fahavetavetana eo imason’NY TOMPO ny vatomizana tsy mitovy
  - type: text
    content: ary ny mizana mandainga dia tsy tsara.
  '24':
  - type: text
    content: NY TOMPO no mitantana ny dian’ny olona;
  - type: text
    content: fa ny olombelona, hataony ahoana ny hahafantatra ny lalany?
  '25':
  - type: text
    content: 'Fandrika amin’ny olona ny malaky miteny hoe: Zavatra masina ity,'
  - type: text
    content: ka nony vita ny voady vao mieritreritra.
  '26':
  - type: text
    content: Ny mpanjaka hendry dia mikororòka manaisotra ny ratsy fanahy
  - type: text
    content: sady mandefa ny kodiarana eo amboniny.
  '27':
  - type: text
    content: Jiron’NY TOMPO ny fanahin’ny olona
  - type: text
    content: hitsilovana ny efitrefitra rehetra ao am-po.
  '28':
  - type: text
    content: Famindrampo sy fahamarinana no miaro ny mpanjaka
  - type: text
    content: ary ampitoeriny amin’ny famindrampo ny sezafiandrianany.
  '29':
  - type: text
    content: Voninahitry ny zatovo ny tanjany
  - type: text
    content: ary ravaky ny zokiolona ny volo fotsy.
  '3':
  - type: text
    content: Voninahitry ny olona ny manalavitra ny fifandirana,
  - type: text
    content: fa ny adala rehetra kosa misafoaka.
  '30':
  - type: text
    content: Ny ratra avy amin’ny kapoka dia mahafaka ny haratsiam-panahy
  - type: text
    content: ary ny kapoka dia tonga hatrany amin’ny aty fo.
  '4':
  - type: text
    content: Ny kamo dia tsy mety miasa tany amin’ny ririnina,
  - type: text
    content: saingy amin’ny fararano dia hangataka izy nefa tsy hahazo.
  '5':
  - type: text
    content: Rano lalina ny hevitra ao am-pon’ny olona;
  - type: text
    content: izay manan-tsaina dia mahay manovo ao.
  '6':
  - type: text
    content: Maro ny olona samy midera ny soa ataon’ny tenany avy,
  - type: text
    content: fa ny olona mahatoky, iza moa no mahita azy?
  '7':
  - type: text
    content: Ny olona marina dia mandeha amin’ny fahitsiany;
  - type: text
    content: sambatra ny zanany mandimby azy.
  '8':
  - type: text
    content: Mipetraka eo amin’ny seza fitsarana ny mpanjaka
  - type: text
    content: ka ny masony dia mikororòka manavaka ny ratsy rehetra.
  '9':
  - type: text
    content: 'Iza no mahazo milaza hoe: Efa nahadio ny foko aho'
  - type: text
    content: ka madio afaka tamin’ny otako?
