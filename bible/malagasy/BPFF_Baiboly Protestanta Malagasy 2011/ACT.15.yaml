document_id: ACT.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy fitovian-kevitra momba ny famorana
  - type: text
    content: 'Nisy olona sasany izay nidina avy tany '
  - type: text
    content: Jodia
  - type: text
    content: ' nampianatra ny rahalahy hoe: Raha tsy foràna araka ny fanaon’i Mosesy ianareo dia tsy azo vonjena. '
  '10':
  - type: text
    content: 'Koa nahoana ianareo no maka fanahy an’Andriamanitra amin’ny fametrahanareo zioga amin’ny vozon’ny mpianatra, zioga izay tsy zakan’ny razantsika na isika hoentina? '
  '11':
  - type: text
    content: Kanefa mino isika fa ny fahasoavan’i Jesosy Tompo no hamonjena antsika, dia tahaka izany ihany koa ny amin’izy ireo.
  '12':
  - type: text
    content: 'Dia nangina ny olona rehetra ka nihaino an’i Barnabasy sy i Paoly izay nilaza ny famantarana sy ny fahagagana nampanaovin’Andriamanitra azy tany amin’ny Jentilisa. '
  '13':
  - type: text
    content: 'Rehefa nitsahatra tsy niteny izy roa lahy dia hoy i Jakoba: Ry rahalahy, mihainoa ahy! '
  '14':
  - type: text
    content: 'I Simeona dia efa nanambara izay nitsinjovan’Andriamanitra ny Jentilisa hatramin’ny voalohany mba handraisany firenena iray ho an’ny anarany. '
  '15':
  - type: text
    content: 'Mifanaraka amin’izany ny tenin’ny mpaminany, araka ny voasoratra hoe:'
  '16':
  - type: text
    content: «Rehefa afaka izany dia hiverina Aho
  - type: text
    content: ka hanangana indray ny tranolain’i Davida izay efa nianjera;
  - type: text
    content: ary hanangana indray izay efa rava ao Aho
  - type: text
    content: ka hanamboatra azy indray
  '17':
  - type: text
    content: mba hitady ny Tompo ny olona sisa
  - type: text
    content: sy ny Jentilisa rehetra izay efa niantsoana ny anarako,
  - type: text
    content: hoy NY TOMPO izay manao izany zavatra izany,
  '18':
  - type: text
    content: izay fantatra hatramin’ny voalohany indrindra» (Amo 9.11-12).
  '19':
  - type: text
    content: 'Koa izao no hevitro: Tsy mety ny hanomezantsika fahasahiranana ireo avy amin’ny Jentilisa izay miverina ho amin’Andriamanitra; '
  '2':
  - type: text
    content: Rehefa nifandìtra sy niady hevitra be ihany tamin’ireo i Paoly sy i Barnabasy dia nifanarahana ny hiakaran’izy roa lahy sy ny sasany koa hankany Jerosalema ho any amin’ny Apostoly sy ny loholona
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: ' mba hanadina ny amin’izany zavatra niadian-kevitra izany. '
  '20':
  - type: text
    content: 'fa aoka hanoratra epistily ho azy isika mba hifadiany ny hena fahavetavetana aterina amin’ny sampy sy ny fijangajangana ary ny biby nokendaina sy ny ra. '
  '21':
  - type: text
    content: 'Fa hatramin’ny razana fahiny dia manana izay mitory azy ao amin’ny isan-tanàna i Mosesy ary vakina ao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' rehetra isan-tSabata ny teniny.'
  - type: heading
    content: Fanapahan-kevitra sy taratasy iombonana
  '22':
  - type: text
    content: Ary sitraky ny Apostoly sy ny loholona
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: ' mbamin’ny fiangonana manontolo ny hifidy olona avy amin’izy ireo hirahina hiaraka amin’i Paoly sy i Barnabasy hankany Antiokia, koa i Joda izay antsoina hoe Barsabasy sy i Silasy, samy mpitarika teo amin’ny rahalahy, no voafidy; '
  '23':
  - type: text
    content: 'dia nanoratra izao taratasy izao izy hoentin’ireo:'
  - type: text
    content: 'Ny Apostoly sy ny rahalahy loholona dia miarahaba ny rahalahy avy amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' any Antiokia sy Siria ary Kilikia. '
  '24':
  - type: text
    content: 'Satria efa renay fa ny sasany izay avy tatỳ aminay dia tonga ka nitondra teny nampitabataba anareo ka nampikorontana ny sainareo, kanefa tsy nampanao izany izahay, '
  '25':
  - type: text
    content: 'dia sitrakay, rehefa nifanara-kevitra izahay, ny hifidy olona hirahina hankaty aminareo hiaraka amin’i Barnabasy sy i Paoly malalanay, '
  '26':
  - type: text
    content: 'lehilahy izay nanao ny ainy tsy ho zavatra ho voninahitry ny anaran’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika. '
  '27':
  - type: text
    content: 'Koa nirahinay i Joda sy i Silasy hilaza am-bava aminareo izao hafatra izao koa. '
  '28':
  - type: text
    content: 'Fa sitraky ny Fanahy Masina sy izahay ny tsy hampitondra enta-mavesatra anareo afa-tsy izao zavatra tsy maintsy hotandremana izao ihany: '
  '29':
  - type: text
    content: Ny hifadianareo ny hena aterina amin’ny sampy, ny ra, ny biby kendaina ary ny fijangajangana; hahasoa anareo raha mahatandrin-tena hifady izany ianareo. Veloma.
  '3':
  - type: text
    content: 'Namatsy azy tamin’izay nilainy ny fiangonana, dia nandeha namakivaky an’i Foinika sy Samaria izy ka nitantara ny niovan’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: '; ary nahafaly ny rahalahy rehetra tokoa izany. '
  '30':
  - type: text
    content: 'Rehefa nalefany izy ireo dia nidina nankany Antiokia; ary namory ny olona maro izy dia natolony ilay epistily. '
  '31':
  - type: text
    content: 'Novakina izany ary nifaly tamin’ny fananarana tao ny olona. '
  '32':
  - type: text
    content: 'Koa satria mpaminany i Joda sy i Silasy, dia nananatra ny rahalahy tamin’ny teny maro izy sady nampahery azy. '
  '33':
  - type: text
    content: 'Ary rehefa nijanona elaela teo izy ireo dia nampandehanin’ny rahalahy soa amantsara hiverina any amin’izay naniraka azy. '
  '34':
  - type: text
    content: Nefa mbola satrin’i Silasy nijanona teo.
  '35':
  - type: text
    content: Fa i Paoly sy i Barnabasy kosa dia nipetraka tany Antiokia; dia nampianatra sy nitory ny tenin’ny Tompo niaraka tamin’ny maro hafa koa izy roa lahy.
  - type: heading
    content: Nisara-dalana i Barnabasy sy i Paoly
  '36':
  - type: text
    content: 'Rehefa afaka andro vitsivitsy dia hoy i Paoly tamin’i Barnabasy: Andeha isika hiverina hamangy ny rahalahy any amin’ny tanàna rehetra izay efa nitoriantsika ny tenin’ny Tompo mba hahafantarantsika ny momba azy. '
  '37':
  - type: text
    content: 'Te hitondra an’i Jaona izay antsoina hoe Marka, hiaraka aminy i Barnabasy; '
  '38':
  - type: text
    content: 'nefa noheverin’i Paoly fa tsy tokony hoentiny miaraka aminy izy, satria nandao azy tany Pamfilia ka tsy niaraka taminy nanao ny raharaha. '
  '39':
  - type: text
    content: 'Dia nifanditra mafy izy roa lahy ka nisaraka; ary nitondra an’i Marka i Barnabasy ary niondrana an-tsambo nankany Sipra. '
  '4':
  - type: text
    content: 'Rehefa tonga tany Jerosalema izy ireo dia noraisin’ny fiangonana sy ny Apostoly ary ny loholona ka nilaza izay rehetra efa nataon’Andriamanitra tamin’ny niarahany taminy. '
  '40':
  - type: text
    content: 'Fa nifidy an’i Silasy kosa i Paoly, dia niainga rehefa natolotry ny rahalahy ho amin’ny fahasoavan’ny Tompo izy. '
  '41':
  - type: text
    content: Dia nandeha namakivaky an’i Siria sy Kilikia izy ka nampahery ny fiangonana tany.
  '5':
  - type: text
    content: 'Fa ny mino sasany izay isan’ny antokon’ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' kosa dia nitsangana ka niteny hoe: Tsy maintsy foràna ireny ka asaina mitandrina ny lalànan’i Mosesy.'
  - type: heading
    content: Ny adihevitra tany Jerosalema
  '6':
  - type: text
    content: 'Dia nivory ny Apostoly sy ny loholona mba handinika izany zavatra izany. '
  '7':
  - type: text
    content: 'Rehefa nafana ny adihevitra dia nitsangana i Petera ka niteny taminy hoe: Ry rahalahy, fantatrareo fa hatramin’ny ela Andriamanitra no nifidy teo aminareo fa avy amin’ny vavako no handrenesan’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ny tenin’ny Filazantsara ka hinoany. '
  '8':
  - type: text
    content: 'Koa Andriamanitra izay mahalala ny fo dia vavolombelony tamin’ny nanomezany azy ny Fanahy Masina tahaka antsika koa, '
  '9':
  - type: text
    content: 'satria tsy nataony misy hafa isika sy izy fa nodioviny tamin’ny finoana ny fony. '
