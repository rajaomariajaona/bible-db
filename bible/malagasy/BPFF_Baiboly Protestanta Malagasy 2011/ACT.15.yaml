document_id: ACT.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy fitovian-kevitra momba ny famorana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nisy olona sasany izay nidina avy tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' nampianatra ny rahalahy hoe: Raha tsy foràna araka ny fanaon’i Mosesy ianareo dia tsy azo vonjena. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Koa nahoana ianareo no maka fanahy an’Andriamanitra amin’ny fametrahanareo zioga amin’ny vozon’ny mpianatra, zioga izay tsy zakan’ny razantsika na isika hoentina? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Kanefa mino isika fa ny fahasoavan’i Jesosy Tompo no hamonjena antsika, dia tahaka izany ihany koa ny amin’izy ireo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nangina ny olona rehetra ka nihaino an’i Barnabasy sy i Paoly izay nilaza ny famantarana sy ny fahagagana nampanaovin’Andriamanitra azy tany amin’ny Jentilisa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Rehefa nitsahatra tsy niteny izy roa lahy dia hoy i Jakoba: Ry rahalahy, mihainoa ahy! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I Simeona dia efa nanambara izay nitsinjovan’Andriamanitra ny Jentilisa hatramin’ny voalohany mba handraisany firenena iray ho an’ny anarany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mifanaraka amin’izany ny tenin’ny mpaminany, araka ny voasoratra hoe:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: «Rehefa afaka izany dia hiverina Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanangana indray ny tranolain’i Davida izay efa nianjera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanangana indray izay efa rava ao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanamboatra azy indray
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: mba hitady ny Tompo ny olona sisa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny Jentilisa rehetra izay efa niantsoana ny anarako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO izay manao izany zavatra izany,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: izay fantatra hatramin’ny voalohany indrindra» (Amo 9.11-12).
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa izao no hevitro: Tsy mety ny hanomezantsika fahasahiranana ireo avy amin’ny Jentilisa izay miverina ho amin’Andriamanitra; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Rehefa nifandìtra sy niady hevitra be ihany tamin’ireo i Paoly sy i Barnabasy dia nifanarahana ny hiakaran’izy roa lahy sy ny sasany koa hankany Jerosalema ho any amin’ny Apostoly sy ny loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' mba hanadina ny amin’izany zavatra niadian-kevitra izany. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'fa aoka hanoratra epistily ho azy isika mba hifadiany ny hena fahavetavetana aterina amin’ny sampy sy ny fijangajangana ary ny biby nokendaina sy ny ra. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa hatramin’ny razana fahiny dia manana izay mitory azy ao amin’ny isan-tanàna i Mosesy ary vakina ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' rehetra isan-tSabata ny teniny.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanapahan-kevitra sy taratasy iombonana
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary sitraky ny Apostoly sy ny loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' mbamin’ny fiangonana manontolo ny hifidy olona avy amin’izy ireo hirahina hiaraka amin’i Paoly sy i Barnabasy hankany Antiokia, koa i Joda izay antsoina hoe Barsabasy sy i Silasy, samy mpitarika teo amin’ny rahalahy, no voafidy; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'dia nanoratra izao taratasy izao izy hoentin’ireo:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Apostoly sy ny rahalahy loholona dia miarahaba ny rahalahy avy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' any Antiokia sy Siria ary Kilikia. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Satria efa renay fa ny sasany izay avy tatỳ aminay dia tonga ka nitondra teny nampitabataba anareo ka nampikorontana ny sainareo, kanefa tsy nampanao izany izahay, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'dia sitrakay, rehefa nifanara-kevitra izahay, ny hifidy olona hirahina hankaty aminareo hiaraka amin’i Barnabasy sy i Paoly malalanay, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'lehilahy izay nanao ny ainy tsy ho zavatra ho voninahitry ny anaran’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Koa nirahinay i Joda sy i Silasy hilaza am-bava aminareo izao hafatra izao koa. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa sitraky ny Fanahy Masina sy izahay ny tsy hampitondra enta-mavesatra anareo afa-tsy izao zavatra tsy maintsy hotandremana izao ihany: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny hifadianareo ny hena aterina amin’ny sampy, ny ra, ny biby kendaina ary ny fijangajangana; hahasoa anareo raha mahatandrin-tena hifady izany ianareo. Veloma.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Namatsy azy tamin’izay nilainy ny fiangonana, dia nandeha namakivaky an’i Foinika sy Samaria izy ka nitantara ny niovan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: '; ary nahafaly ny rahalahy rehetra tokoa izany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Rehefa nalefany izy ireo dia nidina nankany Antiokia; ary namory ny olona maro izy dia natolony ilay epistily. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Novakina izany ary nifaly tamin’ny fananarana tao ny olona. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Koa satria mpaminany i Joda sy i Silasy, dia nananatra ny rahalahy tamin’ny teny maro izy sady nampahery azy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary rehefa nijanona elaela teo izy ireo dia nampandehanin’ny rahalahy soa amantsara hiverina any amin’izay naniraka azy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Nefa mbola satrin’i Silasy nijanona teo.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Fa i Paoly sy i Barnabasy kosa dia nipetraka tany Antiokia; dia nampianatra sy nitory ny tenin’ny Tompo niaraka tamin’ny maro hafa koa izy roa lahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nisara-dalana i Barnabasy sy i Paoly
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Rehefa afaka andro vitsivitsy dia hoy i Paoly tamin’i Barnabasy: Andeha isika hiverina hamangy ny rahalahy any amin’ny tanàna rehetra izay efa nitoriantsika ny tenin’ny Tompo mba hahafantarantsika ny momba azy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Te hitondra an’i Jaona izay antsoina hoe Marka, hiaraka aminy i Barnabasy; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'nefa noheverin’i Paoly fa tsy tokony hoentiny miaraka aminy izy, satria nandao azy tany Pamfilia ka tsy niaraka taminy nanao ny raharaha. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia nifanditra mafy izy roa lahy ka nisaraka; ary nitondra an’i Marka i Barnabasy ary niondrana an-tsambo nankany Sipra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Rehefa tonga tany Jerosalema izy ireo dia noraisin’ny fiangonana sy ny Apostoly ary ny loholona ka nilaza izay rehetra efa nataon’Andriamanitra tamin’ny niarahany taminy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Fa nifidy an’i Silasy kosa i Paoly, dia niainga rehefa natolotry ny rahalahy ho amin’ny fahasoavan’ny Tompo izy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Dia nandeha namakivaky an’i Siria sy Kilikia izy ka nampahery ny fiangonana tany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa ny mino sasany izay isan’ny antokon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' kosa dia nitsangana ka niteny hoe: Tsy maintsy foràna ireny ka asaina mitandrina ny lalànan’i Mosesy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny adihevitra tany Jerosalema
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nivory ny Apostoly sy ny loholona mba handinika izany zavatra izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rehefa nafana ny adihevitra dia nitsangana i Petera ka niteny taminy hoe: Ry rahalahy, fantatrareo fa hatramin’ny ela Andriamanitra no nifidy teo aminareo fa avy amin’ny vavako no handrenesan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' ny tenin’ny Filazantsara ka hinoany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa Andriamanitra izay mahalala ny fo dia vavolombelony tamin’ny nanomezany azy ny Fanahy Masina tahaka antsika koa, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'satria tsy nataony misy hafa isika sy izy fa nodioviny tamin’ny finoana ny fony. '
