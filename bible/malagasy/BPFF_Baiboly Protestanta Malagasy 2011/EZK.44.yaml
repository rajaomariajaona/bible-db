document_id: EZK.44,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny varavarana natokana ho an’ny mpanjaka
  - type: text
    content: 'Dia noentiny niverina tamin’ny lalana nankamin’ny vavahady ivelany amin’ny fitoerana masina aho, dia ilay manatrika ny atsinanana, ka indro, nirindrina io. '
  '10':
  - type: text
    content: 'Ary na dia ny '
  - type: text
    content: levita
  - type: text
    content: ' aza, izay nanalavitra Ahy tamin’ny nivilian’ny Israely, izay nivily niala tamiko ka nanaraka ny sampiny, dia hitondra ny helony izy. '
  '11':
  - type: text
    content: 'Ho mpanao fanompoana ao amin’ny fitoerako masina izy, ho mpiandraikitra ny amin’ny fiandrasana ny vavahadin’ny Trano sy ho mpanao fanompoana ao amin’ny Trano hisolo ny olona hamono ny fanatitra dorana manontolo sy ny fanatitra hafa izy ary hijoro eo anatrehany hanao fanompoana ho azy. '
  '12':
  - type: text
    content: 'Satria nanao fanompoana teo anatrehan’ny sampiny izy ka tonga fahatafintohinana nahameloka ny taranak’Israely dia izany no nananganako tanana hamely azy ka nilazako fa hitondra ny helony izy, hoy NY TOMPO Andriamanitra. '
  '13':
  - type: text
    content: 'Tsy hanakaiky Ahy ho mpisoronako izy, na hanakaiky izay zavatra masina na inona na inona, dia izay zavatra masina indrindra; fa hitambesaran’ny fahamenarany sy ny fahavetavetana nataony izy. '
  '14':
  - type: text
    content: Hotendreko ho mpitandrina ny anjara raharaha ny amin’ny Trano izy, dia ny fanompoana rehetra sy ny zavatra rehetra atao ao.
  - type: heading
    content: Fitsipika samihafa ho an’ny mpisorona
  '15':
  - type: text
    content: 'Fa ny '
  - type: text
    content: levita
  - type: text
    content: ' mpisorona, taranak’i Zadoka kosa, izay nitandrina ny anjara raharaha ny amin’ny fitoerako masina, tamin’ny nivilian’ny Zanak’Israely niala tamiko, dia izy no hanakaiky Ahy hanao fanompoana ho Ahy, ary izy no hijoro eo anatrehako hanatitra ny sabora sy ny ra ho Ahy, hoy NY TOMPO Andriamanitra. '
  '16':
  - type: text
    content: 'Eny, izy no hiditra ao amin’ny fitoerako masina sy hanakaiky ny latabatro hanao fanompoana ho Ahy ary hitandrina izay nasaiko hotandremana. '
  '17':
  - type: text
    content: 'Rehefa miditra ao amin’ny vavahadin’ny kianja anatiny izy dia hiakanjo rongony fotsy fa tsy hisy volon’ondry eny aminy rehefa manao fanompoana eo amin’ny vavahadin’ny kianja anatiny sy ao anatiny izy. '
  '18':
  - type: text
    content: 'Satroka rongony no ho eo an-dohany, ary kalisaonina fohy rongony fotsy no hanaovany, ary tsy hitondra fehikibo izay hiteraka hatsembohana izy. '
  '19':
  - type: text
    content: 'Rehefa mivoaka ho any amin’ny kianja ivelany hankany amin’ny olona izy dia hesoriny ilay fitafiana noentiny nanao fanompoana ka havelany ao amin’ny efitrano masina, ary hitafy fitafiana hafa izy fa tsy hanamasina ny olona amin’ireny fitafiany ireny. '
  '2':
  - type: text
    content: 'Dia hoy NY TOMPO tamiko: Ity vavahady ity dia hirindrina ka tsy hovohana ary tsy hidiran’olona; fa efa nidiran’NY TOMPO, Andriamanitry ny Israely, io, ka izany no hirindrinany. '
  '20':
  - type: text
    content: 'Tsy hanaratra ny lohany izy, nefa kosa dia tsy hanao lava volo fa hataony tsara hety. '
  '21':
  - type: text
    content: 'Tsy hisotro divay ny mpisorona rehefa miditra any amin’ny kianja anatiny izy. '
  '22':
  - type: text
    content: 'Tsy hanambady vehivavy efa maty vady na izay efa nisaorana izy fa virijiny avy amin’ny taranak’Israely, na izay novinadin’ny mpisorona efa maty, no hovadìny. '
  '23':
  - type: text
    content: 'Hampianatra ny oloko ny tsy itovian’ny masina sy ny tsy masina izy ary hampahafantatra azy ny tsy itovian’ny tsy madio sy ny madio. '
  '24':
  - type: text
    content: 'Raha misy mifanditra dia ireo no hitsangana hitsara ka araka ny fitsipiko no hitsarany azy; ary ny lalànako sy ny didiko dia hotandremany amin’ny fotoam-pivavahana rehetra voatendriko, ary ny Sabatako dia hohamasininy. '
  '25':
  - type: text
    content: 'Tsy hiditra am-paty handoto ny tenany izy ireny; kanefa raha rainy, na reniny na zanany lahy na zanany vavy na rahalahiny na anabaviny tsy manambady, dia mahazo miditra am-paty ihany izy. '
  '26':
  - type: text
    content: 'Rehefa voadio izy dia mbola hampiandrasina hafitoana aloha. '
  '27':
  - type: text
    content: Ary amin’ny andro hidirany ao amin’ny fitoerana masina, dia any amin’ny kianja anatiny, hanao fanompoana ao amin’ny fitoerana masina, dia hanolotra ny fanatiny noho ny ota izy, hoy NY TOMPO Andriamanitra.
  '28':
  - type: text
    content: 'Hisy lova ho azy, dia Izaho no lovany. Tsy homenareo zaratany eo amin’ny Israely izy, fa Izaho no anjarany. '
  '29':
  - type: text
    content: 'Ny fanatitra avy amin’ny zavamaniry sy ny fanatitra noho ny ota ary ny fanati-panonerana no hohaniny; ary ny zavatra rehetra izay natao ho zavatra voaozona amin’ny Israely dia ho azy koa. '
  '3':
  - type: text
    content: Kanefa kosa ny mpanjaka, amin’ny maha mpanjaka azy, no mahazo mipetraka ao hihinan-kanina eo anatrehan’NY TOMPO satria mpanjaka izy; amin’ny lalana mankany amin’ny lalantsaran’ny vavahady no hidirany ary amin’ny lalana nalehany ihany koa no hivoahany.
  - type: heading
    content: Tsy hahazo miditra ao amin’ny tempoly ny vahiny
  '30':
  - type: text
    content: 'Ny santatry ny voaloham-bokatra rehetra avy amin’ny zavatra rehetra sy ny fanomezana rehetra izay alaina amin’ny fanomezanareo dia ho an’ny mpisorona; ny santatry ny kobanareo voafetafeta dia homenareo ny mpisorona koa mba hampitoerana fitahiana ao an-tranonao. '
  '31':
  - type: text
    content: Ny zavatra maty ho azy sy izay noviraviraim-biby, na vorona na biby, dia samy tsy hohanin’ny mpisorona.
  '4':
  - type: text
    content: 'Dia noentiny nankany amin’ny vavahady avaratra ho eo anoloan’ny Trano koa aho, dia hitako fa indro, feno ny voninahitry NY TOMPO ny tranon’NY TOMPO ka niankarapoka tamin’ny tany aho. '
  '5':
  - type: text
    content: 'Ary hoy NY TOMPO tamiko: Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', mandiniha tsara ka mijere amin’ny masonao, ary aoka hohenoin’ny sofinao izay rehetra lazaiko aminao ny amin’ny didy sy ny lalàna rehetra momba ny tranon’NY TOMPO ary diniho tsara ny fidirana amin’ny Trano sy ny fivoahana rehetra avy ao amin’ny fitoerana masina. '
  '6':
  - type: text
    content: 'Ary lazao amin’ireo maditra, dia ny taranak’Israely hoe: Izao no lazain’NY TOMPO Andriamanitra: Aoka izay ny fahavetavetanareo, ry taranak’Israely! '
  '7':
  - type: text
    content: 'Ianareo dia nitondra vahiny tsy mifora fo na nofo hitoetra ao amin’ny fitoerako masina mba handoto ny tranoko tamin’ny nanoloranareo ny haniko, dia ny sabora sy ny ra, ka nivadika ny fanekeko ireo ho fanampin’ny fahavetavetanareo rehetra. '
  '8':
  - type: text
    content: Tsy nitandrina ny anjara raharaha ny amin’ny fitoerako masina ianareo fa nanendry izay ho mpitandrina ny anjara raharaha ao amin’ny fitoerako masina hisolo anareo.
  '9':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Ny vahiny tsy mifora fo sy nofo rehetra izay ao amin’ny Zanak’Israely dia tsy misy hahazo miditra ao amin’ny fitoerako masina.'
  - type: heading
    content: Fitsipika samihafa ho an’ny levita
