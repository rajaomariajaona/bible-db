document_id: EXO.34,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo vato fisaka vaovao misy ny Lalàna
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Aoka ianao hipaika vato fisaka roa tahaka ireo teo aloha dia hosoratako amin’ireo vato fisaka ireo ny teny izay tamin’ireo vato fisaka teo aloha izay nopotehinao; '
  '10':
  - type: text
    content: 'Ary hoy NY TOMPO: Indro ny tenako no manao fanekena ka eo anatrehan’ny olonao rehetra no hanaovako zava-mahagaga izay tsy mbola nisy natao tany amin’ny tany manontolo sy tany amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra; ary ny olona rehetra izay itoeranao dia hahita ny asan’NY TOMPO, fa mahatahotra izay zavatra hataoko miaraka aminao.'
  '11':
  - type: text
    content: 'Tandremo izay andidiako anao anio. Indro, horoahiko hiala eo anatrehanao ny Amorita, ny Kananita, ny Hetita, ny Perizita, ny Hivita ary ny Jebosita. '
  '12':
  - type: text
    content: 'Koa mitandrema, fandrao hanao fanekena amin’ny mponina eo amin’ny tany izay halehanao ianao ka ho fandrika eo afovoanao izany. '
  '13':
  - type: text
    content: 'Fa ravao ny alitarany, poteho ny tsangambaton-tsampiny ary jinjao ny tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aserahany
  - type: text
    content: .
  '14':
  - type: text
    content: Fa tsy hiankohoka eo anatrehan’izay andriamanitra hafa ianao; fa NY TOMPO dia saro-piaro, izany rahateo no anarany, satria Andriamanitra saro-piaro Izy.
  '15':
  - type: text
    content: 'Fandrao ianao hanao fanekena amin’ny mponina eo amin’ny tany ka hijangajanga hanaraka ny andriamaniny sy hamono zavatra hatao fanatitra ho an’ny andriamaniny, na koa hanasa anao izy ka hihinana amin’ny fanatiny ianao; '
  '16':
  - type: text
    content: ary fandrao koa haka amin’ny zanany vavy ho vadin’ny zanakao lahy ianao, ary hijangajanga hanaraka ny andriamaniny ny zanany vavy ka hampandeha ny zanakao lahy hijangajanga hanaraka ny andriamaniny.
  '17':
  - type: text
    content: Aza manao andriamanitra narendrika ho anao.
  '18':
  - type: text
    content: 'Tandremo ny andro firavoravoana, dia ny andro fihinanana ny mofo tsy misy masirasira. Hafitoana no hihinananao ny mofo tsy misy masirasira, araka izay nandidiako anao, amin’ny fotoana voatendry, dia amin’ny volana '
  - type: text
    content: Abiba
  - type: text
    content: ', fa tamin’ny volana Abiba no nivoahanao avy tany Ejipta. '
  '19':
  - type: text
    content: 'Izay voalohan-teraka rehetra no Ahy, dia ny lahy amin’ny voalohan-teraky ny bibinao, na omby na ondry aman’osy; '
  '2':
  - type: text
    content: 'ary aoka ho vonona ianao mandra-paharain’ny andro; dia miakara ho ao amin’ny tendrombohitra Sinay rehefa maraina ka mitsangàna eo anatrehako ao an-tampon’ny tendrombohitra. '
  '20':
  - type: text
    content: fa ny voalohan-teraky ny boriky kosa dia hosoloanao zanak’ondry; ary raha tsy hanolo azy ianao dia hofolahinao ny vozony; ary ny lahimatoa rehetra amin’ny zanakao dia havotanao. Ary aoka tsy hisy hiseho amin’ny tanam-polo, tsy hitondra fanatitra eo anatrehako.
  '21':
  - type: text
    content: Henemana no hiasanao, fa amin’ny andro fahafito dia hitsahatra ianao; na dia amin’ny fotoana fitrandrahan-tany sy amin’ny fotoana fijinjana aza dia hitsahatra ihany ianao.
  '22':
  - type: text
    content: Tandremo ny andro firavoravoana amin’ireo Herinandro
  - type: note
    content: Dia ny Pentekosta izany.
  - type: text
    content: ', amin’ny fanaterana ny voaloham-bokatra rehefa mijinja ny varimbazaha sy ny andro firavoravoana amin’ny fanangonam-bokatra amin’ny fitsingerenan’ny taona.'
  '23':
  - type: text
    content: 'Intelo isan-taona ny lehilahy rehetra aminao no hiseho eo anatrehan’NY TOMPO, Andriamanitry ny Israely. '
  '24':
  - type: text
    content: Fa handroaka firenena eo alohanao Aho ka hanitatra ny faritaninao; ary tsy hisy olona hitsiriritra ny taninao rehefa miakatra hiseho eo anatrehan’NY TOMPO Andriamanitrao intelo isan-taona ianao.
  '25':
  - type: text
    content: Aza manolotra ny ran’ny zavatra vonoina hatao fanatitra ho Ahy ianao, raha mbola misy masirasira ao aminao; ary aza avela ho tra-maraina ny zavatra vonoina hatao fanatitra ho Ahy amin’ny andro firavoravoana amin’ny Paska.
  '26':
  - type: text
    content: Ny santatra amin’ny voaloham-bokatry ny taninao dia haterinao ho ao amin’ny tranon’NY TOMPO Andriamanitrao.
  - type: text
    content: Aza mahandro zanak’osy amin’ny rononon-dreniny
  - type: note
    content: Zahao 23.19.
  - type: text
    content: .
  '27':
  - type: text
    content: 'Farany, hoy NY TOMPO tamin’i Mosesy: Soraty ireo teny ireo, fa araka ireo teny ireo no nanaovako fanekena aminao sy amin’ny Israely.'
  '28':
  - type: text
    content: Dia teo amin’NY TOMPO efapolo andro sy efapolo alina izy sady tsy nihinan-kanina na nisotro rano. Ary nosoratan’NY TOMPO tamin’ny vato fisaka ny tenin’ny fanekena, dia ny Teny Folo
  - type: note
    content: 'Ny Teny Folo. Io no antsointsika hoe: Ny Didy Folo.'
  - type: text
    content: .
  - type: heading
    content: Miverina ao amin’ny toby i Mosesy
  '29':
  - type: text
    content: 'Ary nidina avy eo an-tendrombohitra Sinay i Mosesy. Ary teny an-tanany ny vato roa izay nisy ny Vavolombelona tamin’izy nidina avy teo an-tendrombohitra, ary tsy fantany fa namirapiratra ny hoditry ny tavany noho ny nitenenany taminy. '
  '3':
  - type: text
    content: Ary aoka tsy hisy olona hiakatra miaraka aminao, sady aoka tsy hisy olona ho hita eny amin’ny tendrombohitra Sinay rehetra; ary ny ondry aman’osy koa sy ny omby dia aoka tsy hisy handrasana eny akaikin’izany tendrombohitra izany.
  '30':
  - type: text
    content: 'Nony hitan’i Arona sy ny Zanak’Israely rehetra i Mosesy fa indro, namirapiratra ny hodi-tavany, dia natahotra azy izy ireo. '
  '31':
  - type: text
    content: 'Nefa niantso azy ireo i Mosesy ka niverina ho eo aminy i Arona sy ny lohan’ny fiangonana rehetra; dia niteny taminy i Mosesy. '
  '32':
  - type: text
    content: Taorianan’izany dia nanakaiky koa ny Zanak’Israely rehetra; ary nandidy azy ireo i Mosesy araka izay rehetra nolazain’NY TOMPO taminy tao amin’ny tendrombohitra Sinay.
  '33':
  - type: text
    content: 'Rehefa tapitra ny teny nataon’i Mosesy taminy dia nasiany sarona ny tavany. '
  '34':
  - type: text
    content: 'Ary rehefa niditra teo anatrehan’NY TOMPO i Mosesy hiteny Aminy dia nanaisotra ny saron-tava mandra-pialany teo. Dia niala teo izy ka nilaza tamin’ny Zanak’Israely izay nandidiana azy. '
  '35':
  - type: text
    content: Ary hitan’ny Zanak’Israely ny tavan’i Mosesy ka indro, namirapiratra ny hoditry ny tavany; dia nasaron’i Mosesy ny tavany indray ny saron-tava mandra-pidiny hiteny Aminy fanindroany.
  '4':
  - type: text
    content: Dia nipaika vato fisaka roa tahaka ilay teo aloha i Mosesy, ary nifoha vao maraina izy ka niakatra tao amin’ny tendrombohitra Sinay, araka izay nandidian’NY TOMPO azy; ary noentiny teny an-tanany ny vato fisaka roa.
  '5':
  - type: text
    content: 'Ary NY TOMPO nidina tao anatin’ny rahona ka nijanona teo, teo akaikiny, dia nanonona ny anaran’NY TOMPO. '
  '6':
  - type: text
    content: 'Ary NY TOMPO nandalo teo anatrehany ka niantso hoe: NY TOMPO, NY TOMPO, Andriamanitra mamindra fo sy miantra, mahari-po sady be famindrampo sy fahamarinana, '
  '7':
  - type: text
    content: mitahiry famindrampo ho an’ny olona arivo mandimby, mamela heloka sy fahadisoana ary fahotana, kanefa tsy manamarina ny meloka fa mamaly ny heloky ny ray amin’ny zanaka sy ny zafy hatramin’ny zafiafy sy ny zafindohalika.
  '8':
  - type: text
    content: 'Ary i Mosesy dia niondrika haingana tamin’ny tany ka niankohoka, '
  '9':
  - type: text
    content: 'ary niteny hoe: Tompo ô, raha mba mahita fitia eo imasonao aho dia aoka Ianao, Tompo ô, handeha eo afovoanay ka hamela ny helokay sy ny fahotanay ary handray anay ho lovanao, na firenena mafy hatoka aza ity.'
  - type: heading
    content: Ny nanavaozana ny fanekena
