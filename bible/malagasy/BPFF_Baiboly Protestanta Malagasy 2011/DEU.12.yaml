document_id: DEU.12
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: IREO DIDIN’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toy izao ny didy sy fitsipika izay hotandremanareo ka harahinareo any amin’ny tany izay omen’NY TOMPO, Andriamanitry ny razanao, anao holovana amin’ny andro rehetra hiainanareo ambonin’ny tany:'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Toeram-pivavahana tokana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Horavanareo mihitsy ny toerana rehetra izay nanompoan’ireo firenen-tsamihafa izay noroahinareo, ny andriamaniny teny ambonin’ny tendrombohitra avo sy havoana ary teny ambanin’ny hazo maitso rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia horavanareo ny alitarany, hotorotoroinareo ny tsangambaton-tsampiny, hodoranareo amin’ny afo ny tsangankazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aserahany
  - type: text
    text: ' ary ny sarin-javatra voasokitra, izay andriamaniny, dia hokapainareo ka hofoananareo tsy ho eo amin’izany toerana izany intsony ny anarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza manao toy izany amin’NY TOMPO Andriamanitrareo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny tany izay hofidin’NY TOMPO Andriamanitrareo amin’ny fokonareo rehetra hasiany ny anarany sy honenany no hohatoninareo sy halehanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Any no hitondranareo ny fanatitrareo dorana manontolo, ny fanatitrareo hafa alatsa-dra, ny fahafolonkarenanareo, ny fanomezana atolotrareo, ny fanalam-boadinareo, ny fanatitrareo an-tsitrapo ary ny voalohan-teraky ny ombinareo sy ny ondry aman’osinareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: any ianareo sy ny ankohonanareo no hihinana eo anatrehan’NY TOMPO Andriamanitrareo; ary aoka hifaly ianareo amin’izay rehetra noharìn’ny tananareo, izay efa nitahian’NY TOMPO Andriamanitrao anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aza manao toy izay rehetra ataontsika eto ankehitriny intsony ianareo, dia izao samy manao izay heveriny ho mahitsy izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ianareo dia tsy mbola tonga any amin’ny fitsaharana sy ny lova omen’NY TOMPO Andriamanitrao anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa rehefa tafita an’i Jordana ianareo ka monina any amin’ny tany izay omen’NY TOMPO Andriamanitrareo anareo holovana, sady homeny fitsaharana amin’ny ady amin’ny fahavalonareo rehetra manodidina ianareo ka mandry fehizay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia eo amin’ny tany izay hofidin’NY TOMPO Andriamanitrareo hampitoerany ny anarany no hitondranareo izay rehetra andidiako anareo, dia ny fanatitrareo dorana manontolo, ny fanatitrareo hafa alatsa-dra, ny fahafolonkarenanareo, ny fanomezana atolotrareo ary izay zavatra tsara ataonareo voady amin’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hifaly eo anatrehan’NY TOMPO Andriamanitrareo ianareo, ny zanakareo lahy, ny zanakareo vavy, ny mpanompolahinareo, ny mpanompovavinareo, ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' izay ao an-tanànanareo; fa ny levita dia tsy mba manana anjara na lova eo aminareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mitandrema mba tsy hatolotrao eny amin’izay tany rehetra tianao any ny fanatitrao dorana manontolo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa ao amin’ny tany izay hofidin’NY TOMPO ihany amin’ny iray amin’ireo fokonao no hanoloranao azy, sady ao koa no hanatanterahanao izay rehetra andidiako anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Kanefa mahazo mamono zavatra sy mihinan-kena ianao, araka izay rehetra irinao eny amin’ny tanànanao rehetra, araka ny fitahian’NY TOMPO Andriamanitrao izay omeny anao; na ny olona tsy madio na ny madio, dia samy mahazo mihinana azy ihany, tahaka ny ahazoany mihinana ny gazela sy ny diera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Kanefa, aza hanina ny rany, fa aidino amin’ny tany toy ny rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy azonao hanina ao an-tanànanao, na ny ampahafolon’ny varinao sy ny ranom-boalobokao ary ny diloilonao, na ny voalohan-teraky ny ombinao sy ny ondry aman’osinao, na ny zavatra rehetra hataonao voady, na ny fanatitrao an-tsitrapo, na ny fanomezana atolotrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa eo anatrehan’NY TOMPO Andriamanitrao no hihinananao azy, dia eo amin’ny tany izay hofidin’NY TOMPO Andriamanitrao, dia ianao, ny zanakao lahy, ny zanakao vavy, ny mpanompolahinao, ny mpanompovavinao, ary ny levita izay ao an-tanànanao; hifaly eo anatrehan’NY TOMPO Andriamanitrao ianao amin’izay rehetra noharìn’ny tananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mitandrema mba tsy hataonao an-tsirambina ny levita amin’ny andro rehetra hiainanao amin’ny taninao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha hitarin’NY TOMPO Andriamanitrao ny faritaninao, araka izay nolazainy taminao, ka hoy ianao: Hihinan-kena aho, satria maniry hihinan-kena ianao, dia mahazo mihinan-kena araka izay rehetra irinao ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha lavitra anao loatra ny tany izay hofidin’NY TOMPO Andriamanitrao hasiany ny anarany dia hamonoanao ny ombinao sy ny ondry aman’osinao izay nomen’NY TOMPO anao, araka izay nandidiako anao, ary hohaninao ao an-tanànanao, araka izay rehetra irinao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kanefa tahaka ny ahazoanao mihinana ny gazela sy ny diera no hahazoanao mihinana ireny; na ny olona tsy madio na ny madio dia samy mahazo mihinana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanefa tandremo tsara mba tsy hohaninao ny ra, fa ny ra no aina, ary tsy mahazo mihinana ny aina miaraka amin’ny hena ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aza mihinana ny ra ianao fa aidino amin’ny tany toy ny rano izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: eny, aza mihinana azy ianao, mba hahita soa ianao sy ny taranakao mandimby anao, raha manao izay mahitsy eo imason’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa ny zava-masinao sy ny zavatra nataonao voady dia ento mankany amin’ny tany izay hofidin’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary atolory eo amin’ny alitaran’NY TOMPO Andriamanitrao ny fanatitrao dorana manontolo, dia ny henany sy ny rany; ary ny ran’ny fanatitrao hafa dia aidino eo amin’ny alitaran’NY TOMPO Andriamanitrao, fa ny henany dia azonao hohanina ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tandremo ka henoy izao teny rehetra izao izay omeko anao, mba hahita soa ianao sy ny taranakao mandimby anao mandrakizay, raha manatanteraka izay tsara sy mahitsy eo imason’NY TOMPO Andriamanitrao ianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoherana ny andriamanitry ny Kananita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rehefa aringan’NY TOMPO Andriamanitrao eo anoloanao ny firenen-tsamihafa izay alehanao ka horesenao, ary handresy azy ireny ianao ka honina eo amin’ny taniny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'dia mitandrema, fandrao voafandrika hanaraka ny fanaony ianao, rehefa voaringana eo anoloanao izy; ary andrao mamotopototra ny amin’ny andriamaniny ianao ka miteny hoe: Nanao ahoana no nanompoan’ireny firenena ireny ny andriamaniny? Fa izaho koa dia mba hanao toy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aza manao toy izany amin’NY TOMPO Andriamanitrao; fa ny fahavetavetana rehetra, izay halan’NY TOMPO, no nataony tamin’ny andriamaniny; ny zanany lahy sy ny zanany vavy aza dia nodorany tamin’ny afo ho an’ny andriamaniny.
