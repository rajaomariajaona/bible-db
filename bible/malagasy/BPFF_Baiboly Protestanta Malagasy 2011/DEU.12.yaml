document_id: DEU.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: IREO DIDIN’NY TOMPO
  - type: text
    content: 'Toy izao ny didy sy fitsipika izay hotandremanareo ka harahinareo any amin’ny tany izay omen’NY TOMPO, Andriamanitry ny razanao, anao holovana amin’ny andro rehetra hiainanareo ambonin’ny tany:'
  - type: heading
    content: Toeram-pivavahana tokana
  '10':
  - type: text
    content: 'Fa rehefa tafita an’i Jordana ianareo ka monina any amin’ny tany izay omen’NY TOMPO Andriamanitrareo anareo holovana, sady homeny fitsaharana amin’ny ady amin’ny fahavalonareo rehetra manodidina ianareo ka mandry fehizay, '
  '11':
  - type: text
    content: 'dia eo amin’ny tany izay hofidin’NY TOMPO Andriamanitrareo hampitoerany ny anarany no hitondranareo izay rehetra andidiako anareo, dia ny fanatitrareo dorana manontolo, ny fanatitrareo hafa alatsa-dra, ny fahafolonkarenanareo, ny fanomezana atolotrareo ary izay zavatra tsara ataonareo voady amin’NY TOMPO. '
  '12':
  - type: text
    content: 'Dia hifaly eo anatrehan’NY TOMPO Andriamanitrareo ianareo, ny zanakareo lahy, ny zanakareo vavy, ny mpanompolahinareo, ny mpanompovavinareo, ary ny '
  - type: text
    content: levita
  - type: text
    content: ' izay ao an-tanànanareo; fa ny levita dia tsy mba manana anjara na lova eo aminareo.'
  '13':
  - type: text
    content: 'Mitandrema mba tsy hatolotrao eny amin’izay tany rehetra tianao any ny fanatitrao dorana manontolo; '
  '14':
  - type: text
    content: 'fa ao amin’ny tany izay hofidin’NY TOMPO ihany amin’ny iray amin’ireo fokonao no hanoloranao azy, sady ao koa no hanatanterahanao izay rehetra andidiako anao. '
  '15':
  - type: text
    content: 'Kanefa mahazo mamono zavatra sy mihinan-kena ianao, araka izay rehetra irinao eny amin’ny tanànanao rehetra, araka ny fitahian’NY TOMPO Andriamanitrao izay omeny anao; na ny olona tsy madio na ny madio, dia samy mahazo mihinana azy ihany, tahaka ny ahazoany mihinana ny gazela sy ny diera. '
  '16':
  - type: text
    content: Kanefa, aza hanina ny rany, fa aidino amin’ny tany toy ny rano.
  '17':
  - type: text
    content: 'Tsy azonao hanina ao an-tanànanao, na ny ampahafolon’ny varinao sy ny ranom-boalobokao ary ny diloilonao, na ny voalohan-teraky ny ombinao sy ny ondry aman’osinao, na ny zavatra rehetra hataonao voady, na ny fanatitrao an-tsitrapo, na ny fanomezana atolotrao. '
  '18':
  - type: text
    content: 'Fa eo anatrehan’NY TOMPO Andriamanitrao no hihinananao azy, dia eo amin’ny tany izay hofidin’NY TOMPO Andriamanitrao, dia ianao, ny zanakao lahy, ny zanakao vavy, ny mpanompolahinao, ny mpanompovavinao, ary ny levita izay ao an-tanànanao; hifaly eo anatrehan’NY TOMPO Andriamanitrao ianao amin’izay rehetra noharìn’ny tananao. '
  '19':
  - type: text
    content: Mitandrema mba tsy hataonao an-tsirambina ny levita amin’ny andro rehetra hiainanao amin’ny taninao.
  '2':
  - type: text
    content: 'Horavanareo mihitsy ny toerana rehetra izay nanompoan’ireo firenen-tsamihafa izay noroahinareo, ny andriamaniny teny ambonin’ny tendrombohitra avo sy havoana ary teny ambanin’ny hazo maitso rehetra. '
  '20':
  - type: text
    content: 'Raha hitarin’NY TOMPO Andriamanitrao ny faritaninao, araka izay nolazainy taminao, ka hoy ianao: Hihinan-kena aho, satria maniry hihinan-kena ianao, dia mahazo mihinan-kena araka izay rehetra irinao ianao. '
  '21':
  - type: text
    content: 'Raha lavitra anao loatra ny tany izay hofidin’NY TOMPO Andriamanitrao hasiany ny anarany dia hamonoanao ny ombinao sy ny ondry aman’osinao izay nomen’NY TOMPO anao, araka izay nandidiako anao, ary hohaninao ao an-tanànanao, araka izay rehetra irinao izany. '
  '22':
  - type: text
    content: 'Kanefa tahaka ny ahazoanao mihinana ny gazela sy ny diera no hahazoanao mihinana ireny; na ny olona tsy madio na ny madio dia samy mahazo mihinana azy. '
  '23':
  - type: text
    content: 'Kanefa tandremo tsara mba tsy hohaninao ny ra, fa ny ra no aina, ary tsy mahazo mihinana ny aina miaraka amin’ny hena ianao. '
  '24':
  - type: text
    content: 'Aza mihinana ny ra ianao fa aidino amin’ny tany toy ny rano izy; '
  '25':
  - type: text
    content: eny, aza mihinana azy ianao, mba hahita soa ianao sy ny taranakao mandimby anao, raha manao izay mahitsy eo imason’NY TOMPO.
  '26':
  - type: text
    content: 'Fa ny zava-masinao sy ny zavatra nataonao voady dia ento mankany amin’ny tany izay hofidin’NY TOMPO. '
  '27':
  - type: text
    content: Ary atolory eo amin’ny alitaran’NY TOMPO Andriamanitrao ny fanatitrao dorana manontolo, dia ny henany sy ny rany; ary ny ran’ny fanatitrao hafa dia aidino eo amin’ny alitaran’NY TOMPO Andriamanitrao, fa ny henany dia azonao hohanina ihany.
  '28':
  - type: text
    content: Tandremo ka henoy izao teny rehetra izao izay omeko anao, mba hahita soa ianao sy ny taranakao mandimby anao mandrakizay, raha manatanteraka izay tsara sy mahitsy eo imason’NY TOMPO Andriamanitrao ianao.
  - type: heading
    content: Fanoherana ny andriamanitry ny Kananita
  '29':
  - type: text
    content: 'Rehefa aringan’NY TOMPO Andriamanitrao eo anoloanao ny firenen-tsamihafa izay alehanao ka horesenao, ary handresy azy ireny ianao ka honina eo amin’ny taniny, '
  '3':
  - type: text
    content: 'Dia horavanareo ny alitarany, hotorotoroinareo ny tsangambaton-tsampiny, hodoranareo amin’ny afo ny tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aserahany
  - type: text
    content: ' ary ny sarin-javatra voasokitra, izay andriamaniny, dia hokapainareo ka hofoananareo tsy ho eo amin’izany toerana izany intsony ny anarany.'
  '30':
  - type: text
    content: 'dia mitandrema, fandrao voafandrika hanaraka ny fanaony ianao, rehefa voaringana eo anoloanao izy; ary andrao mamotopototra ny amin’ny andriamaniny ianao ka miteny hoe: Nanao ahoana no nanompoan’ireny firenena ireny ny andriamaniny? Fa izaho koa dia mba hanao toy izany. '
  '31':
  - type: text
    content: Aza manao toy izany amin’NY TOMPO Andriamanitrao; fa ny fahavetavetana rehetra, izay halan’NY TOMPO, no nataony tamin’ny andriamaniny; ny zanany lahy sy ny zanany vavy aza dia nodorany tamin’ny afo ho an’ny andriamaniny.
  '4':
  - type: text
    content: 'Aza manao toy izany amin’NY TOMPO Andriamanitrareo ianareo. '
  '5':
  - type: text
    content: 'Fa ny tany izay hofidin’NY TOMPO Andriamanitrareo amin’ny fokonareo rehetra hasiany ny anarany sy honenany no hohatoninareo sy halehanareo. '
  '6':
  - type: text
    content: 'Any no hitondranareo ny fanatitrareo dorana manontolo, ny fanatitrareo hafa alatsa-dra, ny fahafolonkarenanareo, ny fanomezana atolotrareo, ny fanalam-boadinareo, ny fanatitrareo an-tsitrapo ary ny voalohan-teraky ny ombinareo sy ny ondry aman’osinareo; '
  '7':
  - type: text
    content: any ianareo sy ny ankohonanareo no hihinana eo anatrehan’NY TOMPO Andriamanitrareo; ary aoka hifaly ianareo amin’izay rehetra noharìn’ny tananareo, izay efa nitahian’NY TOMPO Andriamanitrao anao.
  '8':
  - type: text
    content: 'Aza manao toy izay rehetra ataontsika eto ankehitriny intsony ianareo, dia izao samy manao izay heveriny ho mahitsy izao. '
  '9':
  - type: text
    content: 'Fa ianareo dia tsy mbola tonga any amin’ny fitsaharana sy ny lova omen’NY TOMPO Andriamanitrao anao. '
