document_id: MAT.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ny mpamafy
  - type: heading
    content: Mar 4.1-9; Lio 8.4-8
  - type: text
    content: 'Ary tamin’izany andro izany dia niala tao an-trano Jesosy ka nipetraka teo amoron’ny ranomasina. '
  '10':
  - type: text
    content: 'Ary nanatona Azy ny mpianany dia nanontany hoe: Nahoana no fanoharana no itenenanao amin’izy ireo? '
  '11':
  - type: text
    content: 'Jesosy namaly azy hoe: Satria ianareo no nomena hahalala ny zavamiafina ny amin’ny fanjakan’ny lanitra, fa ireny kosa dia tsy mba navela. '
  '12':
  - type: text
    content: 'Fa izay manana no homena ka hanana be dia be izy; fa izay tsy manana kosa, na izay ananany aza dia hesorina aminy. '
  '13':
  - type: text
    content: 'Noho izany dia fanoharana no itenenako aminy: Satria mijery izy fa tsy mahita; ary mandre izy fa tsy mihaino na mahazo izay lazaina. '
  '14':
  - type: text
    content: 'Dia tanteraka tamin’izy ireo ny faminanian’Isaia hoe:'
  - type: text
    content: «Handre mandrakariva ihany ianareo nefa tsy hahazo izay lazaina
  - type: text
    content: ary hijery mandrakariva ihany ianareo nefa tsy hahita;
  '15':
  - type: text
    content: Fa efa adala ny fon’izao olona izao;
  - type: text
    content: efa lalodalovana ny sofiny,
  - type: text
    content: efa nakimpiny ny masony,
  - type: text
    content: fandrao hahita ny masony
  - type: text
    content: sy handre ny sofiny
  - type: text
    content: ka hahalala ny fony,
  - type: text
    content: dia hibebaka izy
  - type: text
    content: ka hanasitrana azy Aho» (Isa 6.9-10).
  '16':
  - type: text
    content: 'Sambatra kosa ny masonareo satria mahita ary ny sofinareo satria mandre. '
  '17':
  - type: text
    content: Lazaiko aminareo marina tokoa fa maro ny mpaminany sy ny olona marina naniry hahita izay hitanareo nefa tsy mba nahita; ary naniry handre izay renareo nefa tsy mba nandre.
  - type: heading
    content: Fanazavana ny fanoharana ny amin’ny mpamafy
  - type: heading
    content: Mar 4.13-20; Lio 8.11-15
  '18':
  - type: text
    content: 'Fa ianareo kosa, henoy ny fanoharana ny amin’ny mpamafy: '
  '19':
  - type: text
    content: 'Raha misy mandre ny tenin’ny fanjakan’ny lanitra, nefa tsy mahazo izay lazaina, dia avy ilay ratsy ka manaisotra izay nafafy tao am-pony. Dia izany no ilay nafafy teny amoron-dalana. '
  '2':
  - type: text
    content: Ary nisy vahoaka betsaka tafangona teo Aminy, dia niditra tao an-tsambokely Izy ka nipetraka; ary ny vahoaka rehetra kosa dia teny amoron-dranomasina.
  '20':
  - type: text
    content: 'Fa ilay nafafy teny amin’ny tany be vato, dia izay mandre ny teny ka malaky mandray azy amin’ny hafaliana; '
  '21':
  - type: text
    content: 'nefa tsy manam-paka ao anatiny ireny, fa maharitra vetivety foana; koa raha tonga izay fahoriana na fanenjehana noho ny teny dia malaky tafintohina izy. '
  '22':
  - type: text
    content: 'Ilay nafafy teny amin’ny tsilo indray dia izay mandre ny teny, ary ny fiahiahiana izao fiainana izao sy ny fitaky ny harena dia mangeja ny teny ka tsy manome vokatra izy. '
  '23':
  - type: text
    content: 'Fa ilay nafafy teny amin’ny tany tsara kosa dia izay mandre ny teny ka mahazo izay lazaina; dia izy no manome vokatra: Ny sasany dia zato, ny sasany dia enimpolo ary ny sasany dia telopolo.'
  - type: heading
    content: Fanoharana ny amin’ny tsimparifary
  '24':
  - type: text
    content: 'Ary niteny fanoharana hafa taminy koa Izy hoe: Ny fanjakan’ny lanitra dia tahaka ny lehilahy iray izay namafy voa tsara teny an-tanimbariny; '
  '25':
  - type: text
    content: 'nefa raha natory ny olona dia avy ny fahavalony ka namafy voan-tsimparifary teny amin’ny vary ary lasa nandeha. '
  '26':
  - type: text
    content: 'Rehefa naniry ny vary ka niteraka dia niseho koa ny tsimparifary. '
  '27':
  - type: text
    content: 'Dia avy ireo mpanompon-dRalehilahy ka niteny taminy hoe: Tompoko, tsy voa tsara va no nafafinao tany an-tanimbarinao? Koa avy taiza kosa ny tsimparifary? Dia hoy izy taminy: '
  '28':
  - type: text
    content: 'Fahavalo no nahavita izany. Ary hoy ireo mpanompony taminy: Koa tianao va ny handehananay hanongotra azy? '
  '29':
  - type: text
    content: 'Fa hoy izy: Tsia, fandrao, raha manongotra ny tsimparifary ianareo dia hongotanareo miaraka aminy koa ny vary. '
  '3':
  - type: text
    content: 'Ary nilaza zavatra maro tamin’ny fanoharana taminy Izy ka niteny hoe: Indro, niainga ny mpamafy mba hamafy; '
  '30':
  - type: text
    content: 'Avelao ihany hiara-maniry izy roa ambara-piavin’ny fararano; ary amin’ny fararano dia holazaiko amin’ny mpijinja hoe: Angony aloha ny tsimparifary ka afatory ho amboarany mba hodorana; fa ny vary dia taomy ho any an-tsompitro.'
  - type: heading
    content: Fanoharana ny amin’ny voantsinapy
  - type: heading
    content: Mar 4.30-32; Lio 13.18-19
  '31':
  - type: text
    content: 'Ary nilaza fanoharana hafa taminy koa Izy hoe: Ny fanjakan’ny lanitra dia tahaka ny voantsinapy izay nalain’olona ka nafafiny tany an-tsahany; '
  '32':
  - type: text
    content: fa kely noho ny voa rehetra izy, kanefa rehefa maniry dia lehibe noho ny anana ka tonga hazo, dia avy ny voromanidina ka manorina akany eo amin’ny rantsany.
  - type: heading
    content: Fanoharana ny amin’ny masirasira
  - type: heading
    content: Lio 13.20-21
  '33':
  - type: text
    content: 'Mbola nilaza fanoharana hafa taminy koa Izy hoe: Ny fanjakan’ny lanitra dia tahaka ny masirasira, izay nalain’ny vehivavy iray ka naharony tamin’ny koba intelon’ny famarana, mandra-pahazon’ny masirasira azy rehetra.'
  - type: heading
    content: Fampianarana amin’ny alalan’ny fanoharana
  - type: heading
    content: Mar 4.33-34
  '34':
  - type: text
    content: 'Fanoharana no nilazan’i Jesosy izany zavatra rehetra izany tamin’ny vahoaka ary tsy nisy nolazainy taminy, afa-tsy tamin’ny fanoharana '
  '35':
  - type: text
    content: mba hahatanteraka izay nampilazaina ny mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' hoe:'
  - type: text
    content: «Hiloa-bava hilaza fanoharana Aho;
  - type: text
    content: hanambara zavatra izay nafenina hatrizay nanorenana izao tontolo izao Aho» (Sal 78.2).
  - type: heading
    content: Manazava ny fanoharana ny amin’ny tsimparifary Jesosy
  '36':
  - type: text
    content: 'Rehefa avy nampody ny vahoaka Jesosy dia niditra tao an-trano ary nanatona Azy ny mpianany dia niteny hoe: mba lazao aminay ny hevitry ny fanoharana ny amin’ny tsimparifary tany an-tanimbary.'
  '37':
  - type: text
    content: 'Ary Izy namaly hoe: Ny mpamafy ny voa tsara dia ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: '; '
  '38':
  - type: text
    content: 'ny tanimbary dia izao tontolo izao; ny voa tsara dia ireo zanaky ny fanjakan’ny lanitra; ny tsimparifary dia ireo zanak’ilay ratsy; '
  '39':
  - type: text
    content: 'ny fahavalo izay namafy izany dia ny '
  - type: text
    content: devoly
  - type: text
    content: '; ny fararano dia ny fahataperan’izao tontolo izao ary ny mpijinja dia ny anjely. '
  '4':
  - type: text
    content: 'ary raha namafy izy, ny sasany dia voafafy teny amoron-dalana, dia avy ny vorona ka nandany izany. '
  '40':
  - type: text
    content: 'Koa tahaka ny anangonana ny tsimparifary sy andoroana azy amin’ny afo dia toy izany no hatao amin’ny fahataperan’izao tontolo izao. '
  '41':
  - type: text
    content: 'Ny Zanak’Olona haniraka ny anjeliny, ary ireny dia hanangona ka hamoaka amin’ny fanjakany ny zavatra mahatafintohina rehetra mbamin’izay manao meloka, '
  '42':
  - type: text
    content: 'dia hanipy azy any amin’ny fandoroana lehibe mirehitra afo; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  '43':
  - type: text
    content: Ary amin’izany ny marina dia hamirapiratra tahaka ny masoandro any amin’ny fanjakan’ny Rainy. Izay manan-tsofina, aoka izy hihaino.
  - type: heading
    content: Fanoharana ny amin’ny harena nafenina
  '44':
  - type: text
    content: Ny fanjakan’ny lanitra dia tahaka ny harena nafenina tany an-tsaha izay hitan’olona ka nafeniny; ary noho ny hafaliany dia lasa nandeha izy ka nivarotra ny fananany rehetra dia nividy izany saha izany.
  - type: heading
    content: Fanoharana ny amin’ny vatosoa
  '45':
  - type: text
    content: 'Ary koa, ny fanjakan’ny lanitra dia tahaka ny mpivaro-mandeha iray izay nikatsaka vatosoa; '
  '46':
  - type: text
    content: koa rehefa nahita vatosoa iray sarobidy izy dia lasa nivarotra ny fananany rehetra ka nividy azy.
  - type: heading
    content: Fanoharana ny amin’ny harato tarihina
  '47':
  - type: text
    content: 'Ary koa, ny fanjakan’ny lanitra dia tahaka ny harato tarihina, izay nalatsaka tao amin’ny ranomasina ka nahavory ny samihafa karazana rehetra; '
  '48':
  - type: text
    content: 'ary rehefa feno izany dia notarihiny ho eny an-tanety, dia nipetraka ny olona ka nifantina ny tsara hataony ao anaty harona fa ny ratsy kosa dia nariany. '
  '49':
  - type: text
    content: 'Dia tahaka izany no hatao amin’ny fahataperan’izao tontolo izao; hiainga ny anjely ka hanavaka ny ratsy fanahy hisaraka amin’ny marina, '
  '5':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin’ny tany be vato izay tsy ampy nofon-tany, dia nalaky nitsiry ireny satria tsy lalina ny tany. '
  '50':
  - type: text
    content: dia hatsipiny any amin’ny fandoroana lehibe mirehitra afo izy; any no hisy ny fitomaniana sy ny fikitroha-nify.
  - type: heading
    content: Ny taloha sy ny vaovao
  '51':
  - type: text
    content: 'Azonareo va izany rehetra izany? Hoy ireo Taminy: Eny. '
  '52':
  - type: text
    content: 'Dia hoy Izy taminy: Koa amin’izany ary ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' rehetra izay nampianarina ny amin’ny fanjakan’ny lanitra dia tahaka ny tompon-trano iray izay mamoaka zava-baovao sy tranainy avy ao amin’ny firaketany.'
  - type: heading
    content: Ny tsy finoan’ny olona an’i Jesosy tao Nazareta
  - type: heading
    content: Mar 6.1-6; Lio 4.16-24
  '53':
  - type: text
    content: 'Ary rehefa vitan’i Jesosy ireo fanoharana ireo dia niala teo Izy. '
  '54':
  - type: text
    content: 'Nony tonga tany amin’ny taniny Izy dia nampianatra ny olona tao amin’ny sinagogany, ary talanjona ny olona ka nilaza hoe: Avy taiza re no nahazoan’Ilehity izany fahendrena izany sy ireny fahagagana ireny? '
  '55':
  - type: text
    content: 'Tsy Ilehity va ilay zanaky ny mpandrafitra? Tsy Maria va no anaran’ny reniny? Ary tsy i Jakoba sy i Josefa ary i Simona sy i Jodasy va no rahalahiny? '
  '56':
  - type: text
    content: 'Ary ireo anabaviny, moa tsy etỳ amintsika avokoa va? Koa avy taiza no nahazoan’Ilehity izany zavatra rehetra izany? '
  '57':
  - type: text
    content: 'Ary tafintohina Taminy izy ireo. Fa hoy Jesosy taminy: Tsy misy mpaminany tsy homen-kaja, afa-tsy eo amin’ny taniny sy ny mpianakaviny ihany.'
  '58':
  - type: text
    content: Ary tsy nanao asa lehibe maro teo Izy noho ny tsy finoan’ireo.
  '6':
  - type: text
    content: 'Fa rehefa niposaka ny masoandro dia nalazo izy ireny, ary satria tsy nanam-paka tsara izy dia maty. '
  '7':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin’ny tsilo; ary naniry ny tsilo ka nangeja azy. '
  '8':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin’ny tany tsara, dia nanome vokatra: Ny sasany dia zato, ny sasany dia enimpolo ary ny sasany dia telopolo. '
  '9':
  - type: text
    content: Izay manan-tsofina, aoka izy hihaino.
  - type: heading
    content: Nahoana Jesosy no miteny amin’ny alalan’ny fanoharana
  - type: heading
    content: Mar 4.10-12; Lio 8.9-10
