document_id: MAT.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny mpamafy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 4.1-9; Lio 8.4-8
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin’izany andro izany dia niala tao an-trano Jesosy ka nipetraka teo amoron’ny ranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nisy vahoaka betsaka tafangona teo Aminy, dia niditra tao an-tsambokely Izy ka nipetraka; ary ny vahoaka rehetra kosa dia teny amoron-dranomasina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nilaza zavatra maro tamin’ny fanoharana taminy Izy ka niteny hoe: Indro, niainga ny mpamafy mba hamafy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary raha namafy izy, ny sasany dia voafafy teny amoron-dalana, dia avy ny vorona ka nandany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny sasany dia voafafy teny amin’ny tany be vato izay tsy ampy nofon-tany, dia nalaky nitsiry ireny satria tsy lalina ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa rehefa niposaka ny masoandro dia nalazo izy ireny, ary satria tsy nanam-paka tsara izy dia maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny sasany dia voafafy teny amin’ny tsilo; ary naniry ny tsilo ka nangeja azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny sasany dia voafafy teny amin’ny tany tsara, dia nanome vokatra: Ny sasany dia zato, ny sasany dia enimpolo ary ny sasany dia telopolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay manan-tsofina, aoka izy hihaino.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nahoana Jesosy no miteny amin’ny alalan’ny fanoharana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 4.10-12; Lio 8.9-10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nanatona Azy ny mpianany dia nanontany hoe: Nahoana no fanoharana no itenenanao amin’izy ireo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jesosy namaly azy hoe: Satria ianareo no nomena hahalala ny zavamiafina ny amin’ny fanjakan’ny lanitra, fa ireny kosa dia tsy mba navela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izay manana no homena ka hanana be dia be izy; fa izay tsy manana kosa, na izay ananany aza dia hesorina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Noho izany dia fanoharana no itenenako aminy: Satria mijery izy fa tsy mahita; ary mandre izy fa tsy mihaino na mahazo izay lazaina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia tanteraka tamin’izy ireo ny faminanian’Isaia hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Handre mandrakariva ihany ianareo nefa tsy hahazo izay lazaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hijery mandrakariva ihany ianareo nefa tsy hahita;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa efa adala ny fon’izao olona izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa lalodalovana ny sofiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nakimpiny ny masony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao hahita ny masony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handre ny sofiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahalala ny fony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hibebaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanasitrana azy Aho» (Isa 6.9-10).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Sambatra kosa ny masonareo satria mahita ary ny sofinareo satria mandre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lazaiko aminareo marina tokoa fa maro ny mpaminany sy ny olona marina naniry hahita izay hitanareo nefa tsy mba nahita; ary naniry handre izay renareo nefa tsy mba nandre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanazavana ny fanoharana ny amin’ny mpamafy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 4.13-20; Lio 8.11-15
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ianareo kosa, henoy ny fanoharana ny amin’ny mpamafy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha misy mandre ny tenin’ny fanjakan’ny lanitra, nefa tsy mahazo izay lazaina, dia avy ilay ratsy ka manaisotra izay nafafy tao am-pony. Dia izany no ilay nafafy teny amoron-dalana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ilay nafafy teny amin’ny tany be vato, dia izay mandre ny teny ka malaky mandray azy amin’ny hafaliana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'nefa tsy manam-paka ao anatiny ireny, fa maharitra vetivety foana; koa raha tonga izay fahoriana na fanenjehana noho ny teny dia malaky tafintohina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ilay nafafy teny amin’ny tsilo indray dia izay mandre ny teny, ary ny fiahiahiana izao fiainana izao sy ny fitaky ny harena dia mangeja ny teny ka tsy manome vokatra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa ilay nafafy teny amin’ny tany tsara kosa dia izay mandre ny teny ka mahazo izay lazaina; dia izy no manome vokatra: Ny sasany dia zato, ny sasany dia enimpolo ary ny sasany dia telopolo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny tsimparifary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary niteny fanoharana hafa taminy koa Izy hoe: Ny fanjakan’ny lanitra dia tahaka ny lehilahy iray izay namafy voa tsara teny an-tanimbariny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'nefa raha natory ny olona dia avy ny fahavalony ka namafy voan-tsimparifary teny amin’ny vary ary lasa nandeha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa naniry ny vary ka niteraka dia niseho koa ny tsimparifary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia avy ireo mpanompon-dRalehilahy ka niteny taminy hoe: Tompoko, tsy voa tsara va no nafafinao tany an-tanimbarinao? Koa avy taiza kosa ny tsimparifary? Dia hoy izy taminy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fahavalo no nahavita izany. Ary hoy ireo mpanompony taminy: Koa tianao va ny handehananay hanongotra azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa hoy izy: Tsia, fandrao, raha manongotra ny tsimparifary ianareo dia hongotanareo miaraka aminy koa ny vary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Avelao ihany hiara-maniry izy roa ambara-piavin’ny fararano; ary amin’ny fararano dia holazaiko amin’ny mpijinja hoe: Angony aloha ny tsimparifary ka afatory ho amboarany mba hodorana; fa ny vary dia taomy ho any an-tsompitro.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny voantsinapy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 4.30-32; Lio 13.18-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nilaza fanoharana hafa taminy koa Izy hoe: Ny fanjakan’ny lanitra dia tahaka ny voantsinapy izay nalain’olona ka nafafiny tany an-tsahany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: fa kely noho ny voa rehetra izy, kanefa rehefa maniry dia lehibe noho ny anana ka tonga hazo, dia avy ny voromanidina ka manorina akany eo amin’ny rantsany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny masirasira
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 13.20-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mbola nilaza fanoharana hafa taminy koa Izy hoe: Ny fanjakan’ny lanitra dia tahaka ny masirasira, izay nalain’ny vehivavy iray ka naharony tamin’ny koba intelon’ny famarana, mandra-pahazon’ny masirasira azy rehetra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampianarana amin’ny alalan’ny fanoharana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 4.33-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fanoharana no nilazan’i Jesosy izany zavatra rehetra izany tamin’ny vahoaka ary tsy nisy nolazainy taminy, afa-tsy tamin’ny fanoharana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: mba hahatanteraka izay nampilazaina ny mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: profeta.
    marker-yv: yv-n
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hiloa-bava hilaza fanoharana Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanambara zavatra izay nafenina hatrizay nanorenana izao tontolo izao Aho» (Sal 78.2).
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manazava ny fanoharana ny amin’ny tsimparifary Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Rehefa avy nampody ny vahoaka Jesosy dia niditra tao an-trano ary nanatona Azy ny mpianany dia niteny hoe: mba lazao aminay ny hevitry ny fanoharana ny amin’ny tsimparifary tany an-tanimbary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary Izy namaly hoe: Ny mpamafy ny voa tsara dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ny tanimbary dia izao tontolo izao; ny voa tsara dia ireo zanaky ny fanjakan’ny lanitra; ny tsimparifary dia ireo zanak’ilay ratsy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ny fahavalo izay namafy izany dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: '; ny fararano dia ny fahataperan’izao tontolo izao ary ny mpijinja dia ny anjely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Koa tahaka ny anangonana ny tsimparifary sy andoroana azy amin’ny afo dia toy izany no hatao amin’ny fahataperan’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ny Zanak’Olona haniraka ny anjeliny, ary ireny dia hanangona ka hamoaka amin’ny fanjakany ny zavatra mahatafintohina rehetra mbamin’izay manao meloka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'dia hanipy azy any amin’ny fandoroana lehibe mirehitra afo; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary amin’izany ny marina dia hamirapiratra tahaka ny masoandro any amin’ny fanjakan’ny Rainy. Izay manan-tsofina, aoka izy hihaino.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny harena nafenina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ny fanjakan’ny lanitra dia tahaka ny harena nafenina tany an-tsaha izay hitan’olona ka nafeniny; ary noho ny hafaliany dia lasa nandeha izy ka nivarotra ny fananany rehetra dia nividy izany saha izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny vatosoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary koa, ny fanjakan’ny lanitra dia tahaka ny mpivaro-mandeha iray izay nikatsaka vatosoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: koa rehefa nahita vatosoa iray sarobidy izy dia lasa nivarotra ny fananany rehetra ka nividy azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny harato tarihina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary koa, ny fanjakan’ny lanitra dia tahaka ny harato tarihina, izay nalatsaka tao amin’ny ranomasina ka nahavory ny samihafa karazana rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'ary rehefa feno izany dia notarihiny ho eny an-tanety, dia nipetraka ny olona ka nifantina ny tsara hataony ao anaty harona fa ny ratsy kosa dia nariany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Dia tahaka izany no hatao amin’ny fahataperan’izao tontolo izao; hiainga ny anjely ka hanavaka ny ratsy fanahy hisaraka amin’ny marina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: dia hatsipiny any amin’ny fandoroana lehibe mirehitra afo izy; any no hisy ny fitomaniana sy ny fikitroha-nify.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taloha sy ny vaovao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Azonareo va izany rehetra izany? Hoy ireo Taminy: Eny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Dia hoy Izy taminy: Koa amin’izany ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' rehetra izay nampianarina ny amin’ny fanjakan’ny lanitra dia tahaka ny tompon-trano iray izay mamoaka zava-baovao sy tranainy avy ao amin’ny firaketany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tsy finoan’ny olona an’i Jesosy tao Nazareta
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 6.1-6; Lio 4.16-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary rehefa vitan’i Jesosy ireo fanoharana ireo dia niala teo Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Nony tonga tany amin’ny taniny Izy dia nampianatra ny olona tao amin’ny sinagogany, ary talanjona ny olona ka nilaza hoe: Avy taiza re no nahazoan’Ilehity izany fahendrena izany sy ireny fahagagana ireny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Tsy Ilehity va ilay zanaky ny mpandrafitra? Tsy Maria va no anaran’ny reniny? Ary tsy i Jakoba sy i Josefa ary i Simona sy i Jodasy va no rahalahiny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ary ireo anabaviny, moa tsy etỳ amintsika avokoa va? Koa avy taiza no nahazoan’Ilehity izany zavatra rehetra izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary tafintohina Taminy izy ireo. Fa hoy Jesosy taminy: Tsy misy mpaminany tsy homen-kaja, afa-tsy eo amin’ny taniny sy ny mpianakaviny ihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ary tsy nanao asa lehibe maro teo Izy noho ny tsy finoan’ireo.
