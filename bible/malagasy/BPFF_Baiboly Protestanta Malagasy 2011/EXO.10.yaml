document_id: EXO.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza fahavalo: Ny valala'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy indray NY TOMPO tamin’i Mosesy: Mankanesa ao amin’i Farao, fa Izaho efa nanamafy ny fony sy ny fon’ny mpanompony mba hanehoako ireo famantarana izay hataoko eo aminy izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary mba hotantaraina ho ren’ny zanakao sy ny zafinao ny nanaovako ny Ejiptiana sy ny amin’ireo famantarana nataoko teo aminy, mba ho fantatrareo fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nankao amin’i Farao i Mosesy sy i Arona ka niteny taminy hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Hebreo: Mandra-pahoviana no handavanao tsy hanetry tena eo anatrehako? Avelao ny oloko handeha mba hanompo Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha mandà ka tsy mamela ny oloko handeha ianao, indro, hahatonga valala amin’ny taninao rehetra Aho rahampitso. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Handrakotra ny tany rehetra ireny ka tsy ho hita ny tany; dia hohaniny ny sisan’ny havandra izay navela ho anareo; hohaniny avokoa ny hazo rehetra any an-tsaha izay maniry ho anareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: hameno ny tranonao sy ny tranon’ny mpanomponao rehetra ary ny tranon’ny Ejiptiana rehetra ireny. Tsy mbola hitan’ny rainao na ny raibenao ny toy izany hatrizay andro niainany tetỳ ambonin’ny tany ka mandraka androany. Dia nihodina izy ka niala teo amin’i Farao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ny mpanompon’i Farao taminy: Mandra-pahoviana no ho fandrika amintsika iny lehilahy iny? Avelao handeha ireo olona ireo mba hanompo NY TOMPO Andriamaniny. Tsy mbola fantatrao va fa efa levona i Ejipta?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nisy nampiverina an’i Mosesy sy i Arona hankao amin’i Farao indray ka hoy izy taminy: Mandehana, manompoa NY TOMPO Andriamanitrareo. Nefa iza avy moa no handeha? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Mosesy: Hoentinay handeha miaraka aminay ny tanora sy ny antitra eo aminay, ary handeha miaraka aminay koa ny zanakay lahy sy ny zanakay vavy sy ny ondry aman’osinay ary ny ombinay; fa andro firavoravoanay ho an’NY TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy i Farao taminy: Aoka homba anareo ihany anie NY TOMPO, raha hamela anareo handeha miaraka amin’ny zanakareo madinika aho; mitandrema fa manana teti-dratsy ianareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: misy loza miandry anareo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy ho araka izany anefa, fa mandehana ianareo lehilahy lehibe ka manompoa NY TOMPO fa izany no tadiavinareo. Ary noroahina hiala teo anatrehan’i Farao izy roa lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa hoy NY TOMPO tamin’i Mosesy: Atsory ambonin’ny tany Ejipta ny tananao hiavian’ny valala, dia hiakatra ho eto amin’ny tany Ejipta ireny ary hihinana ny zavamaniry amin’ny tany, dia izay rehetra sisan’ny havandra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia natsotran’i Mosesy teo ambonin’ny tany Ejipta ny tehiny, ary NY TOMPO nampandeha rivotra avy any atsinanana hankany amin’ny tany nandritra iny andro iny sy nandritra ny alina. Nony maraina dia nitondra valala ny rivotra avy any atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny valala dia niakatra ho amin’ny tany Ejipta manontolo, dia nipetraka manerana ny tany Ejipta manontolo; natevina dia natevina izany ka tsy nisy valala toy izany tany aloha, ary any aorianany koa dia tsy hisy toy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa nandrakotra ny tany rehetra ireny ka tonga maizina ny tany; nohaniny ny anana rehetra teo amin’ny tany sy ny voankazo rehetra izay sisan’ny havandra ka tsy nisy sisa ny zava-maitso manerana ny tany Ejipta manontolo, na tamin’ny hazo na tamin’ny anana tany an-tsaha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nampiantso an’i Mosesy sy i Arona haingana i Farao ka niteny hoe: Efa nanota tamin’NY TOMPO Andriamanitrareo sy taminareo aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ankehitriny, miangavy anao aho, mamelà ny fahotako izao indray mandeha izao ihany ka mifonà amin’NY TOMPO Andriamanitrareo mba hampialany amiko izao zava-doza iray loha izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niala teo amin’i Farao izy ka nifona tamin’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary NY TOMPO nanodina ny rivotra ho rivotra tena mahery avy any andrefana, izay nitondra ny valala ka namarina azy tany amin’ny Ranomasina Mena; dia tsy nisy sisa intsony ny valala manerana ny tany Ejipta manontolo, na dia iray aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nefa NY TOMPO nanamafy ny fon’i Farao ka tsy namela ny Zanak’Israely handeha ihany izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza fahasivy: Ny haizim-pito'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy indray NY TOMPO tamin’i Mosesy: Atsory manandrify ny lanitra ny tananao mba hampisy haizina ao amin’ny tany Ejipta, dia haizina azo tsapain-tanana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia natsotran’i Mosesy nanandrify ny lanitra ny tanany ka nisy haizim-pito naharitra hateloana nanerana ny tany Ejipta manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy nifankahita ny olona ary tsy nisy nihetsika tamin’izay nitoerany nandritra ny hateloana. Fa ny Zanak’Israely rehetra kosa dia nanana ny mazava teo amin’ny fonenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nampiantso an’i Mosesy indray i Farao ka niteny hoe: Mandehana ianareo, manompoa NY TOMPO; fa ny ondry aman’osinareo sy ny ombinareo ihany no aoka hajanonareo; ary ny zanakareo madinika dia aoka hiaraka aminareo koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nefa hoy i Mosesy: Ianao no hanome ho eto an-tananay izay hatao fanatitra halatsa-dra sy fanatitra dorana manontolo hatolotray ho an’NY TOMPO Andriamanitray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny omby aman’ondrinay dia hoentinay hiaraka aminay koa; tsy hisy havela na dia ny kitrony iray aza, satria ireny no hakanay hanompoana NY TOMPO Andriamanitray; ary tsy mbola fantatray izay hoentinay hanompoana NY TOMPO mandra-pahatonganay any. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nefa NY TOMPO nanamafy ny fon’i Farao ka tsy nety namela ny olona handeha izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hoy i Farao tamin’i Mosesy: Mialà amiko! Tandremo! Aza mahita ny tavako intsony ianao; fa amin’izay andro hahitanao ny tavako dia ho faty ianao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Namaly koa i Mosesy hoe: Marina izay nolazainao; fa tsy hahita ny tavanao intsony aho.'
