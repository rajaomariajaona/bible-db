document_id: EXO.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny loza fahavalo: Ny valala'
  - type: text
    content: 'Hoy indray NY TOMPO tamin’i Mosesy: Mankanesa ao amin’i Farao, fa Izaho efa nanamafy ny fony sy ny fon’ny mpanompony mba hanehoako ireo famantarana izay hataoko eo aminy izao; '
  '10':
  - type: text
    content: 'Fa hoy i Farao taminy: Aoka homba anareo ihany anie NY TOMPO, raha hamela anareo handeha miaraka amin’ny zanakareo madinika aho; mitandrema fa manana teti-dratsy ianareo'
  - type: note
    content: 'Na: misy loza miandry anareo.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: Tsy ho araka izany anefa, fa mandehana ianareo lehilahy lehibe ka manompoa NY TOMPO fa izany no tadiavinareo. Ary noroahina hiala teo anatrehan’i Farao izy roa lahy.
  '12':
  - type: text
    content: 'Nefa hoy NY TOMPO tamin’i Mosesy: Atsory ambonin’ny tany Ejipta ny tananao hiavian’ny valala, dia hiakatra ho eto amin’ny tany Ejipta ireny ary hihinana ny zavamaniry amin’ny tany, dia izay rehetra sisan’ny havandra.'
  '13':
  - type: text
    content: 'Dia natsotran’i Mosesy teo ambonin’ny tany Ejipta ny tehiny, ary NY TOMPO nampandeha rivotra avy any atsinanana hankany amin’ny tany nandritra iny andro iny sy nandritra ny alina. Nony maraina dia nitondra valala ny rivotra avy any atsinanana. '
  '14':
  - type: text
    content: 'Ary ny valala dia niakatra ho amin’ny tany Ejipta manontolo, dia nipetraka manerana ny tany Ejipta manontolo; natevina dia natevina izany ka tsy nisy valala toy izany tany aloha, ary any aorianany koa dia tsy hisy toy izany. '
  '15':
  - type: text
    content: Fa nandrakotra ny tany rehetra ireny ka tonga maizina ny tany; nohaniny ny anana rehetra teo amin’ny tany sy ny voankazo rehetra izay sisan’ny havandra ka tsy nisy sisa ny zava-maitso manerana ny tany Ejipta manontolo, na tamin’ny hazo na tamin’ny anana tany an-tsaha.
  '16':
  - type: text
    content: 'Dia nampiantso an’i Mosesy sy i Arona haingana i Farao ka niteny hoe: Efa nanota tamin’NY TOMPO Andriamanitrareo sy taminareo aho. '
  '17':
  - type: text
    content: Ankehitriny, miangavy anao aho, mamelà ny fahotako izao indray mandeha izao ihany ka mifonà amin’NY TOMPO Andriamanitrareo mba hampialany amiko izao zava-doza iray loha izao.
  '18':
  - type: text
    content: 'Dia niala teo amin’i Farao izy ka nifona tamin’NY TOMPO. '
  '19':
  - type: text
    content: 'Ary NY TOMPO nanodina ny rivotra ho rivotra tena mahery avy any andrefana, izay nitondra ny valala ka namarina azy tany amin’ny Ranomasina Mena; dia tsy nisy sisa intsony ny valala manerana ny tany Ejipta manontolo, na dia iray aza. '
  '2':
  - type: text
    content: ary mba hotantaraina ho ren’ny zanakao sy ny zafinao ny nanaovako ny Ejiptiana sy ny amin’ireo famantarana nataoko teo aminy, mba ho fantatrareo fa Izaho no TOMPO.
  '20':
  - type: text
    content: Nefa NY TOMPO nanamafy ny fon’i Farao ka tsy namela ny Zanak’Israely handeha ihany izy.
  - type: heading
    content: 'Ny loza fahasivy: Ny haizim-pito'
  '21':
  - type: text
    content: 'Hoy indray NY TOMPO tamin’i Mosesy: Atsory manandrify ny lanitra ny tananao mba hampisy haizina ao amin’ny tany Ejipta, dia haizina azo tsapain-tanana.'
  '22':
  - type: text
    content: 'Dia natsotran’i Mosesy nanandrify ny lanitra ny tanany ka nisy haizim-pito naharitra hateloana nanerana ny tany Ejipta manontolo. '
  '23':
  - type: text
    content: Tsy nifankahita ny olona ary tsy nisy nihetsika tamin’izay nitoerany nandritra ny hateloana. Fa ny Zanak’Israely rehetra kosa dia nanana ny mazava teo amin’ny fonenany.
  '24':
  - type: text
    content: 'Ary nampiantso an’i Mosesy indray i Farao ka niteny hoe: Mandehana ianareo, manompoa NY TOMPO; fa ny ondry aman’osinareo sy ny ombinareo ihany no aoka hajanonareo; ary ny zanakareo madinika dia aoka hiaraka aminareo koa.'
  '25':
  - type: text
    content: 'Nefa hoy i Mosesy: Ianao no hanome ho eto an-tananay izay hatao fanatitra halatsa-dra sy fanatitra dorana manontolo hatolotray ho an’NY TOMPO Andriamanitray. '
  '26':
  - type: text
    content: 'Ny omby aman’ondrinay dia hoentinay hiaraka aminay koa; tsy hisy havela na dia ny kitrony iray aza, satria ireny no hakanay hanompoana NY TOMPO Andriamanitray; ary tsy mbola fantatray izay hoentinay hanompoana NY TOMPO mandra-pahatonganay any. '
  '27':
  - type: text
    content: Nefa NY TOMPO nanamafy ny fon’i Farao ka tsy nety namela ny olona handeha izy.
  '28':
  - type: text
    content: 'Hoy i Farao tamin’i Mosesy: Mialà amiko! Tandremo! Aza mahita ny tavako intsony ianao; fa amin’izay andro hahitanao ny tavako dia ho faty ianao! '
  '29':
  - type: text
    content: 'Namaly koa i Mosesy hoe: Marina izay nolazainao; fa tsy hahita ny tavanao intsony aho.'
  '3':
  - type: text
    content: 'Dia nankao amin’i Farao i Mosesy sy i Arona ka niteny taminy hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Hebreo: Mandra-pahoviana no handavanao tsy hanetry tena eo anatrehako? Avelao ny oloko handeha mba hanompo Ahy. '
  '4':
  - type: text
    content: 'Fa raha mandà ka tsy mamela ny oloko handeha ianao, indro, hahatonga valala amin’ny taninao rehetra Aho rahampitso. '
  '5':
  - type: text
    content: 'Handrakotra ny tany rehetra ireny ka tsy ho hita ny tany; dia hohaniny ny sisan’ny havandra izay navela ho anareo; hohaniny avokoa ny hazo rehetra any an-tsaha izay maniry ho anareo; '
  '6':
  - type: text
    content: hameno ny tranonao sy ny tranon’ny mpanomponao rehetra ary ny tranon’ny Ejiptiana rehetra ireny. Tsy mbola hitan’ny rainao na ny raibenao ny toy izany hatrizay andro niainany tetỳ ambonin’ny tany ka mandraka androany. Dia nihodina izy ka niala teo amin’i Farao.
  '7':
  - type: text
    content: 'Ary hoy ny mpanompon’i Farao taminy: Mandra-pahoviana no ho fandrika amintsika iny lehilahy iny? Avelao handeha ireo olona ireo mba hanompo NY TOMPO Andriamaniny. Tsy mbola fantatrao va fa efa levona i Ejipta?'
  '8':
  - type: text
    content: 'Dia nisy nampiverina an’i Mosesy sy i Arona hankao amin’i Farao indray ka hoy izy taminy: Mandehana, manompoa NY TOMPO Andriamanitrareo. Nefa iza avy moa no handeha? '
  '9':
  - type: text
    content: 'Dia hoy i Mosesy: Hoentinay handeha miaraka aminay ny tanora sy ny antitra eo aminay, ary handeha miaraka aminay koa ny zanakay lahy sy ny zanakay vavy sy ny ondry aman’osinay ary ny ombinay; fa andro firavoravoanay ho an’NY TOMPO izany. '
