document_id: PRO.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ny amin’ny vehivavy ratsy
  - type: text
    content: Anaka, tandremo ny fahendreko,
  - type: text
    content: ary atongilano ny sofinao ho amin’ny fahaizako mandinika
  '10':
  - type: text
    content: fandrao hivokisan’ny olon-kafa ny fanananao,
  - type: text
    content: ary ho lasa any an-tranon’ny vahiny ny vokatry ny fisasaranao;
  '11':
  - type: text
    content: fandrao hitoloko ianao aorianan’izany,
  - type: text
    content: raha mihalevona ny nofonao sy ny tenanao
  '12':
  - type: text
    content: 'ary hiteny ianao hoe: Nahoana re no nankahala fananarana aho?'
  - type: text
    content: Ary nahoana no naniratsira ny fanitsiana ny foko?
  '13':
  - type: text
    content: Ka tsy nihaino ny tenin’ny mpanoro hevitra ahy
  - type: text
    content: ary tsy nanongilana ny sofiko hihaino ny mpampianatra ahy?
  '14':
  - type: text
    content: Efa saika azon’ny loza rehetra aho
  - type: text
    content: tao amin’ny fiangonana sy ny fivorian’ny olona.
  - type: heading
    content: Tiavo ny vadin’ny fahatanoranao
  '15':
  - type: text
    content: Misotroa avy amin’ny lavaka famorian-drano izay anao samirery,
  - type: text
    content: dia ny rano miboiboika avy amin’ny fantsakanao.
  '16':
  - type: text
    content: Hitosaka eny ivelany va ny rano avy amin’ny loharanonao,
  - type: text
    content: ary eny an-dalambe ny ranovelonao?
  '17':
  - type: text
    content: Aoka ho anao irery ihany izany
  - type: text
    content: fa aza iombonana amin’ny hafa.
  '18':
  - type: text
    content: Aoka hotahina ny loharanonao,
  - type: text
    content: ary mifalia amin’ny vadin’ny fahatanoranao.
  '19':
  - type: text
    content: Fa dieravavy maha te ho tia sy osidia tsara bika izy;
  - type: text
    content: dia aoka ny tratrany no hahafeno fifaliana anao mandrakariva,
  - type: text
    content: ary aoka ho feno faharavoravoana lalandava amin’ny fitiavany ianao.
  '2':
  - type: text
    content: mba hitahirizanao tsara ny fahaiza-mandinika
  - type: text
    content: sy hitandreman’ny molotrao ny fahalalana.
  '20':
  - type: text
    content: Nahoana ianao anaka no ho renoka amin’ny fitiavana vehivavy jejo
  - type: text
    content: ka hamihina ny tratran’ny janga?
  '21':
  - type: text
    content: Fa eo imason’NY TOMPO ny alehan’ny olona,
  - type: text
    content: ary dinihiny avokoa ny diany rehetra.
  '22':
  - type: text
    content: Mamandrika ny tenany ihany ny heloky ny ratsy fanahy,
  - type: text
    content: ary ny kofehin’ny fahotany no hihazona azy.
  '23':
  - type: text
    content: Maty izy noho ny tsy nahazoany fananarana,
  - type: text
    content: very izy noho ny haben’ny hadalany.
  '3':
  - type: text
    content: Fa ny molotry ny vehivavy janga dia mitete toy ny tantely avy amin’ny tohotra,
  - type: text
    content: ary ny vavany dia malama noho ny diloilo;
  '4':
  - type: text
    content: nefa ny farany dia mafaitra toy ny zava-mangidy,
  - type: text
    content: ary maranitra toy ny sabatra roa lela.
  '5':
  - type: text
    content: Ny tongony dia midina ho any amin’ny fahafatesana,
  - type: text
    content: 'ary ny diany mizotra ho any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: .
  '6':
  - type: text
    content: Tsy mandia ny lalan’ny fiainana izy
  - type: text
    content: fa manjenjena ka tsy fantany akory izay halehany.
  '7':
  - type: text
    content: Koa mihainoa ahy ianareo anaka,
  - type: text
    content: ary aza mihataka amin’ny teny izay nolazaiko.
  '8':
  - type: text
    content: Ampanalaviro azy ny alehanao,
  - type: text
    content: ary aza manakaiky ny varavaran’ny tranony,
  '9':
  - type: text
    content: fandrao omenao ho an’ny sasany ny voninahitrao,
  - type: text
    content: ary ny taonanao ho an’izay olon-dozabe;
