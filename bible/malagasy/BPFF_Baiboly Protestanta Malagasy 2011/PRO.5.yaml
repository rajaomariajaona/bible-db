document_id: PRO.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana ny amin’ny vehivavy ratsy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, tandremo ny fahendreko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary atongilano ny sofinao ho amin’ny fahaizako mandinika
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hivokisan’ny olon-kafa ny fanananao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho lasa any an-tranon’ny vahiny ny vokatry ny fisasaranao;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hitoloko ianao aorianan’izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mihalevona ny nofonao sy ny tenanao
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary hiteny ianao hoe: Nahoana re no nankahala fananarana aho?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nahoana no naniratsira ny fanitsiana ny foko?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nihaino ny tenin’ny mpanoro hevitra ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nanongilana ny sofiko hihaino ny mpampianatra ahy?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa saika azon’ny loza rehetra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tao amin’ny fiangonana sy ny fivorian’ny olona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tiavo ny vadin’ny fahatanoranao
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misotroa avy amin’ny lavaka famorian-drano izay anao samirery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny rano miboiboika avy amin’ny fantsakanao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitosaka eny ivelany va ny rano avy amin’ny loharanonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eny an-dalambe ny ranovelonao?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho anao irery ihany izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aza iombonana amin’ny hafa.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hotahina ny loharanonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mifalia amin’ny vadin’ny fahatanoranao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa dieravavy maha te ho tia sy osidia tsara bika izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka ny tratrany no hahafeno fifaliana anao mandrakariva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ho feno faharavoravoana lalandava amin’ny fitiavany ianao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitahirizanao tsara ny fahaiza-mandinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hitandreman’ny molotrao ny fahalalana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana ianao anaka no ho renoka amin’ny fitiavana vehivavy jejo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamihina ny tratran’ny janga?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa eo imason’NY TOMPO ny alehan’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dinihiny avokoa ny diany rehetra.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamandrika ny tenany ihany ny heloky ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny kofehin’ny fahotany no hihazona azy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maty izy noho ny tsy nahazoany fananarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: very izy noho ny haben’ny hadalany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny molotry ny vehivavy janga dia mitete toy ny tantely avy amin’ny tohotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vavany dia malama noho ny diloilo;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny farany dia mafaitra toy ny zava-mangidy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary maranitra toy ny sabatra roa lela.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tongony dia midina ho any amin’ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny diany mizotra ho any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mandia ny lalan’ny fiainana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manjenjena ka tsy fantany akory izay halehany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa mihainoa ahy ianareo anaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mihataka amin’ny teny izay nolazaiko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampanalaviro azy ny alehanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza manakaiky ny varavaran’ny tranony,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao omenao ho an’ny sasany ny voninahitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taonanao ho an’izay olon-dozabe;
