document_id: REV.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lovia fito
  - type: text
    content: 'Ary nandre feo mahery avy tao amin’ny tempoly aho niteny tamin’ny anjely fito hoe: Mandehana, aidino amin’ny tany ny ao amin’ny lovia fito feno ny fahatezeran’Andriamanitra.'
  '10':
  - type: text
    content: 'Ary ny fahadimy dia nampidina ny tao an-doviany tamin’ny sezafiandrianan’ilay bibidia. Dia tonga maizina ny fanjakany ary ny olona nitsakotsako ny lelany noho ny fanaintainana; '
  '11':
  - type: text
    content: niteny ratsy an’Andriamanitry ny lanitra izy noho ny fanaintainany sy ny vainy sady tsy nibebaka tamin’ny asany.
  '12':
  - type: text
    content: 'Ary ny fahenina dia nampidina ny tao an-doviany tao amin’i Eofrata, ony lehibe. Dia ritra ny ranony, mba hanamboarana ny lalan’ireny mpanjaka avy any amin’ny fiposahan’ny masoandro ireny. '
  '13':
  - type: text
    content: 'Ary hitako fa indreo, fanahy maloto telo tahaka ny sahona avy tamin’ny vavan’ilay '
  - type: text
    content: dragona
  - type: text
    content: ' sy tamin’ny vavan’ilay bibidia ary tamin’ny vavan’ilay mpaminany sandoka. '
  '14':
  - type: text
    content: 'Fa fanahin’ny demonia ireo ka manao famantarana sady mankany amin’ny mpanjakan’ny tany rehetra manerana izao tontolo izao, mba hamory azy ho amin’ny adin’ilay andro lehiben’Andriamanitra Tsitoha! '
  '15':
  - type: text
    content: 'Indro, avy toy ny mpangalatra Aho. Sambatra izay miambina ka miaro ny fitafiany, fandrao mandeha mitanjaka izy ka ho hita ny fahamenarany! '
  '16':
  - type: text
    content: Ary novoriny ho any amin’ny toerana atao amin’ny teny hebreo hoe Haramagedona ireny.
  '17':
  - type: text
    content: 'Ary ny fahafito dia nampidina ny tao an-doviany tamin’ny rivotra. Dia nisy feo mahery nivoaka avy tao amin’ny tempoly, avy teo amin’ny sezafiandrianana, niteny hoe: Vita! '
  '18':
  - type: text
    content: 'Dia nisy tselatra sy feo ary kotrokorana; nisy koa horohoron-tany mafy izay tsy mbola nisy toy izany hatrizay nisian’olona tetỳ ambonin’ny tany, eny, tsy mbola nisy horohoron-tany mafy sy lehibe toy izany. '
  '19':
  - type: text
    content: 'Ary ny tanàna lehibe dia vaky ho telo toko ary rava ny tanànan’ny firenena maro; ary i Babilona lehibe dia notsarovana teo anatrehan’Andriamanitra mba homena azy ny kapoaky ny divain’ny firehetan’ny fahatezerany. '
  '2':
  - type: text
    content: Ary nandeha ny voalohany dia nampidina ny tao an-doviany tamin’ny tany. Dia nisy vay ratsy sady mampanaintaina tamin’ny olona izay nanana ny mariky ny bibidia sy niankohoka teo anatrehan’ny sariny.
  '20':
  - type: text
    content: 'Nandositra ny nosy rehetra ary ny tendrombohitra tsy hita intsony. '
  '21':
  - type: text
    content: 'Nisy havandra vaventy nilatsaka avy tany an-danitra teo amin’ny olona, milanja tokony ho '
  - type: text
    content: talenta
  - type: text
    content: ' iray avy; ary niteny ratsy an’Andriamanitra ny olona noho ny loza avy tamin’ny havandra; fa lehibe loatra izany loza izany.'
  '3':
  - type: text
    content: Ary ny faharoa dia nampidina ny tao an-doviany tamin’ny ranomasina. Dia nody ra tahaka ny ran’olona efa maty ny ranomasina ary maty ny zavamananaina rehetra tao aminy.
  '4':
  - type: text
    content: Ary ny fahatelo dia nampidina ny tao an-doviany tamin’ny ony sy ny loharano. Dia nody ra ireny.
  '5':
  - type: text
    content: 'Ary nandre ny anjelin’ny rano aho niteny hoe:'
  - type: text
    content: Marina Ianao, Ilay ankehitriny sy taloha, dia ny Iray Masina, satria nitsara toy izany Ianao.
  '6':
  - type: text
    content: Satria ny ran’ny olona masina sy ny mpaminany no nalatsany,
  - type: text
    content: koa ra no nomenao hosotroiny;
  - type: text
    content: tandrify azy izany.
  '7':
  - type: text
    content: 'Ary reko ny alitara niteny hoe:'
  - type: text
    content: Eny, Tompo, Andriamanitra Tsitoha ô,
  - type: text
    content: marina sady mahitsy ny fitsaranao.
  '8':
  - type: text
    content: 'Ary ny fahefatra dia nampidina ny tao an-doviany tamin’ny masoandro. Nasaina nandoro ny olona tamin’ny afo izy '
  '9':
  - type: text
    content: ka main’ny hafanana be ny olona. Dia niteny ratsy ny anaran’Andriamanitra izay manana fahefana amin’ireny loza ireny, izy, sady tsy nibebaka mba hanome voninahitra Azy.
