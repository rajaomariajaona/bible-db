document_id: REV.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lovia fito
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nandre feo mahery avy tao amin’ny tempoly aho niteny tamin’ny anjely fito hoe: Mandehana, aidino amin’ny tany ny ao amin’ny lovia fito feno ny fahatezeran’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nandeha ny voalohany dia nampidina ny tao an-doviany tamin’ny tany. Dia nisy vay ratsy sady mampanaintaina tamin’ny olona izay nanana ny mariky ny bibidia sy niankohoka teo anatrehan’ny sariny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny faharoa dia nampidina ny tao an-doviany tamin’ny ranomasina. Dia nody ra tahaka ny ran’olona efa maty ny ranomasina ary maty ny zavamananaina rehetra tao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ny fahatelo dia nampidina ny tao an-doviany tamin’ny ony sy ny loharano. Dia nody ra ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nandre ny anjelin’ny rano aho niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marina Ianao, Ilay ankehitriny sy taloha, dia ny Iray Masina, satria nitsara toy izany Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Satria ny ran’ny olona masina sy ny mpaminany no nalatsany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ra no nomenao hosotroiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandrify azy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary reko ny alitara niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Tompo, Andriamanitra Tsitoha ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: marina sady mahitsy ny fitsaranao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny fahefatra dia nampidina ny tao an-doviany tamin’ny masoandro. Nasaina nandoro ny olona tamin’ny afo izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ka main’ny hafanana be ny olona. Dia niteny ratsy ny anaran’Andriamanitra izay manana fahefana amin’ireny loza ireny, izy, sady tsy nibebaka mba hanome voninahitra Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny fahadimy dia nampidina ny tao an-doviany tamin’ny sezafiandrianan’ilay bibidia. Dia tonga maizina ny fanjakany ary ny olona nitsakotsako ny lelany noho ny fanaintainana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: niteny ratsy an’Andriamanitry ny lanitra izy noho ny fanaintainany sy ny vainy sady tsy nibebaka tamin’ny asany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny fahenina dia nampidina ny tao an-doviany tao amin’i Eofrata, ony lehibe. Dia ritra ny ranony, mba hanamboarana ny lalan’ireny mpanjaka avy any amin’ny fiposahan’ny masoandro ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hitako fa indreo, fanahy maloto telo tahaka ny sahona avy tamin’ny vavan’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: dragona
  - type: text
    text: ' sy tamin’ny vavan’ilay bibidia ary tamin’ny vavan’ilay mpaminany sandoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa fanahin’ny demonia ireo ka manao famantarana sady mankany amin’ny mpanjakan’ny tany rehetra manerana izao tontolo izao, mba hamory azy ho amin’ny adin’ilay andro lehiben’Andriamanitra Tsitoha! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Indro, avy toy ny mpangalatra Aho. Sambatra izay miambina ka miaro ny fitafiany, fandrao mandeha mitanjaka izy ka ho hita ny fahamenarany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary novoriny ho any amin’ny toerana atao amin’ny teny hebreo hoe Haramagedona ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny fahafito dia nampidina ny tao an-doviany tamin’ny rivotra. Dia nisy feo mahery nivoaka avy tao amin’ny tempoly, avy teo amin’ny sezafiandrianana, niteny hoe: Vita! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nisy tselatra sy feo ary kotrokorana; nisy koa horohoron-tany mafy izay tsy mbola nisy toy izany hatrizay nisian’olona tetỳ ambonin’ny tany, eny, tsy mbola nisy horohoron-tany mafy sy lehibe toy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny tanàna lehibe dia vaky ho telo toko ary rava ny tanànan’ny firenena maro; ary i Babilona lehibe dia notsarovana teo anatrehan’Andriamanitra mba homena azy ny kapoaky ny divain’ny firehetan’ny fahatezerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nandositra ny nosy rehetra ary ny tendrombohitra tsy hita intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nisy havandra vaventy nilatsaka avy tany an-danitra teo amin’ny olona, milanja tokony ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' iray avy; ary niteny ratsy an’Andriamanitra ny olona noho ny loza avy tamin’ny havandra; fa lehibe loatra izany loza izany.'
