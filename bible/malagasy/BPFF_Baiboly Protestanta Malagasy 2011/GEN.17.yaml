document_id: GEN.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Abrama nanjary Abrahama
  - type: text
    content: 'Rehefa sivy amby sivifolo taona i Abrama dia nisehoan’NY TOMPO izy ka nitenenany hoe: Izaho no Andriamanitra Tsitoha. Mandehana eo anatrehako ary aoka ho tsy misy tsiny ianao. '
  '10':
  - type: text
    content: 'Izao no fanekeko ho Amiko sy ho aminareo sy ny taranakao mandimby anao, izay hotandremanareo: Hoforana ny lehilahy rehetra eo aminareo. '
  '11':
  - type: text
    content: 'Hoforana ianareo; ho famantarana ny fanekena ho Amiko sy ho aminareo izany. '
  '12':
  - type: text
    content: 'Ny zazalahy teraka havaloana eo aminareo no hoforana, dia ny lehilahy rehetra amin’ny taranakareo fara aman-dimby: Na ny mpanompo izay teraka tao an-tranonao, na izay novidinao vola tamin’ny hafa firenena ka tsy avy amin’ny taranakao. '
  '13':
  - type: text
    content: 'Tsy maintsy hoforana ny mpanomponao izay teraka tao an-tranonao sy izay novidinao vola; ny fanekeko dia ho ao amin’ny nofonareo ho fanekena mandrakizay. '
  '14':
  - type: text
    content: 'Fa ny lehilahy tsy mifora dia hofongorana tsy ho amin’ny fireneny, satria nivadika tamin’ny fanekeko izy. '
  '15':
  - type: text
    content: 'Dia hoy Andriamanitra tamin’i Abrahama: Ny amin’i Saray vadinao dia tsy mba hataonao hoe Saray intsony ny anarany fa Saraha'
  - type: note
    content: 'Saraha: Zanak’andriana.'
  - type: text
    content: ' no ho anarany. '
  '16':
  - type: text
    content: 'Hitahy azy Aho ka hampanana azy zanakalahy ho anao; eny, hitahy azy Aho ka ho tonga firenena maro izy; ary hisy mpanjakan’ny firenena maro avy aminy. '
  '17':
  - type: text
    content: 'Dia niankohoka i Abrahama ary nihomehy sady niteny anakampo hoe: Efa zato taona va aho dia mbola hiteraka ihany? Ary i Saraha izay efa sivifolo taona va mbola hiteraka ihany koa? '
  '18':
  - type: text
    content: 'Ary hoy i Abrahama tamin’Andriamanitra: Enga anie ka Ismaela no ho velona eo anatrehanao! '
  '19':
  - type: text
    content: 'Ary hoy Andriamanitra: Tsia! Fa i Saraha vadinao no hiteraka zazalahy aminao; ary ny anarany dia hataonao hoe Isaka. Haoriko aminy ny fanekeko ho fanekena mandrakizay ho an’ny taranany mandimby azy. '
  '2':
  - type: text
    content: 'Fa Izaho hanao ny fanekeko ho Amiko sy ho aminao ary hahamaro anao indrindra. '
  '20':
  - type: text
    content: 'Ary ny amin’Ismaela dia efa nihaino anao Aho. Indro, hitahy azy Aho ka hahamaro ny taranany sy hampitombo azy indrindra; hiteraka andriana roa amby folo izy satria notendreko ho firenena lehibe. '
  '21':
  - type: text
    content: 'Nefa ny fanekeko dia haoriko amin’Isaka izay haterak’i Saraha aminao amin’ny herintaona toy izao. '
  '22':
  - type: text
    content: Rehefa vita ny teny nataon’Andriamanitra taminy dia niakatra Izy ka niala teo amin’i Abrahama.
  '23':
  - type: text
    content: 'Koa nalain’i Abrahama Ismaela zanany sy ny mpanompony rehetra izay teraka tao an-tranony, niaraka tamin’ireo rehetra izay novidiny vola, dia ny lehilahy rehetra tao an-tranony, koa noforany tamin’iny andro iny ihany, araka izay nolazain’Andriamanitra taminy. '
  '24':
  - type: text
    content: 'Sivy amby sivifolo taona i Abrahama fony izy noforana. '
  '25':
  - type: text
    content: 'Telo amby folo taona Ismaela zanany fony izy noforana. '
  '26':
  - type: text
    content: 'Tamin’iny andro iny ihany no namorana an’i Abrahama sy Ismaela zanany. '
  '27':
  - type: text
    content: Ary ny lehilahy rehetra tao an-tranony, dia ny mpanompony izay teraka tao an-tranony, niaraka tamin’ireo izay novidiny vola tamin’ny hafa firenena; eny, samy niara-noforana taminy avokoa ireo.
  '3':
  - type: text
    content: 'Dia niankohoka i Abrama; ary Andriamanitra niteny taminy hoe: '
  '4':
  - type: text
    content: 'Raha ny Amiko dia indro, aminao ny fanekeko ka ho tonga rain’ny firenena maro ianao. '
  '5':
  - type: text
    content: Ary ny anaranao dia tsy hatao hoe Abrama
  - type: note
    content: 'Abrama: Ray avo.'
  - type: text
    content: ' intsony fa hatao hoe Abrahama'
  - type: note
    content: 'Abrahama: Rain’ny maro.'
  - type: text
    content: ', satria nataoko rain’ny firenena maro ianao. '
  '6':
  - type: text
    content: 'Hahamaro ny taranakao indrindra Aho ka hataoko firenena maro ianao; hisy mpanjaka maro hiseho avy aminao. '
  '7':
  - type: text
    content: 'Haoriko ny fanekeko ho Amiko sy ho aminao mbamin’ny taranakao any aoriananao hatramin’ny taranaka fara aman-dimby, ho fanekena mandrakizay, mba ho Andriamanitrao sy ny taranakao mandimby anao Aho. '
  '8':
  - type: text
    content: Homeko anao sy ny taranakao any aoriananao ny tany fivahiniananao, dia ny tany Kanana rehetra, ho fananana mandrakizay. Ary ho Andriamaniny Aho.
  '9':
  - type: text
    content: 'Hoy ihany Andriamanitra tamin’i Abrahama: Fa ny aminao kosa dia hitandrina ny fanekeko ianao, dia ianao sy ny taranakao mandimby anao hatramin’ny taranaka fara aman-dimby. '
