document_id: NUM.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitoeran-jiro
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ento ny levita hankeo anatrehan’NY TOMPO ka ny Zanak’Israely dia hametraka ny tanany aminy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ary i Arona dia hanao ny levita ho fanatitra asandratra eo anatrehan’NY TOMPO avy amin’ny Zanak’Israely, mba hanaovan’izy ireo ny fanompoana NY TOMPO. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hametraka ny tanany amin’ny lohan’ireo vantotra ombilahy ny levita; dia atolory ny iray ho fanatitra noho ny ota, ary ny iray kosa ho fanatitra dorana manontolo ho an’NY TOMPO, hanaovana fanavotana ho an’ny levita. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ampijoroy eo anatrehan’i Arona sy ireo zanany ny levita ka ataovy fanatitra asandratra ho an’NY TOMPO izy ireo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Avaho amin’ny Zanak’Israely ny levita, dia ho Ahy ny levita. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Rehefa vita izany dia hiditra hanao fanompoana ao amin’ny tranolay fihaonana ny levita. Toy izany no hanadiovanao azy ka hataonao fanatitra asandratra izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa efa nomena ho Ahy avy tamin’ny Zanak’Israely mihitsy izy ireo; mba ho solon’izay voalohan-teraka rehetra, dia izay lahimatoa rehetra amin’ny Zanak’Israely no nanalako azy ho Ahy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa Ahy ny voalohan-teraka rehetra amin’ny Zanak’Israely, na olona na biby fiompy; tamin’ilay andro namelezako ny voalohan-teraka rehetra tany amin’ny tany Ejipta no nanamasinako azy ireo ho Ahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Efa nalaiko ho solon’ny lahimatoa rehetra amin’ny Zanak’Israely ny levita. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary nomeko ho an’i Arona sy ireo zanany mihitsy ny levita, avy amin’ny Zanak’Israely, mba hanatanteraka ny fanompoan’ny Zanak’Israely ao amin’ny tranolay fihaonana sady hanao fanavotana ho an’ny Zanak’Israely, mba tsy hisy areti-mandringana hanjo ny Zanak’Israely raha manakaiky ny fitoerana masina izy ireo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitenena amin’i Arona hoe: Rehefa mampirehitra ny jiro fito ianao dia ataovy mahazava ny eo anoloan’ny fitoeran-jiro ireo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary i Mosesy sy i Arona mbamin’ny fiangonan’ny Zanak’Israely manontolo dia nanatanteraka tamin’ny levita izay rehetra nandidian’NY TOMPO an’i Mosesy ny amin’ny levita. Araka izany no nataon’ny Zanak’Israely taminy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nanadio ny tenany ny levita sady nosasany ny fitafiany; ary i Arona dia nanao azy ireo ho fanatitra asandratra eo anatrehan’NY TOMPO sady nanao fanavotana hanadiovana azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Rehefa vita izany dia niditra hanao ny fanompoana tao amin’ny tranolay fihaonana ny levita, teo anatrehan’i Arona sy teo anatrehan’ireo zanany; araka izay nandidian’NY TOMPO an’i Mosesy ny amin’ny levita no nataony taminy.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ny amin’ny levita dia izao: Hatramin’ny dimy amby roapolo taona no ho miakatra izy ireo no hanatona, hilatsaka amin’ny antokony, hanao ny fanompoana ao amin’ny tranolay fihaonana; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'rehefa dimampolo taona kosa izy dia hiala amin’ny antokon’ny fanompoana ka tsy hanompo intsony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Hanampy ny rahalahiny ao amin’ny tranolay fihaonana ihany izy mba hitandrina raharaha; fa tsy hanao ny tena fanompoana akory. Izany no hataonao amin’ny levita ny amin’ny anjara raharahany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nataon’i Arona izany ka nampirehetiny ny jiro mba hahazava ny eo anoloan’ny fitoeran-jiro, araka izay nandidian’NY TOMPO an’i Mosesy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izao no nanaovana ny fitoeran-jiro: Volamena voatefy, koa hatramin’ny faladiany sy ny voniny aza dia samy voatefy avokoa; araka ny endrika izay nasehon’NY TOMPO an’i Mosesy no nanaovany ny fitoeran-jiro.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanokanana ny levita
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Alao ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' avy amin’ny Zanak’Israely ka diovy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Izao no hataonao aminy hanadiovana azy: Fafazo rano fanadiovana amin’ny ota izy, asaivo haratany avokoa ny tenany manontolo, ary aoka hosasany ny fitafiany ka hadio izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia asaivo maka vantotra ombilahy iray izy, mbamin’ny fanatitra avy amin’ny zavamaniry ampombaina azy, dia koba tsara toto voaharo diloilo; ary vantotra ombilahy iray koa no halainao ho fanatitra noho ny ota. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ento ny levita hankeo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: '; dia vorio ny fiangonan’ny Zanak’Israely manontolo. '
