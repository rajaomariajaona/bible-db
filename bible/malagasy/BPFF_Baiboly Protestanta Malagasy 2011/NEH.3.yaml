document_id: NEH.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manangana ny mandan’i Jerosalema indray ny Jiosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia nitsangana i Eliasiba mpisoronabe sy ny mpisorona rahalahiny ka nandrafitra ny vavahadin’ondry; nanamasina azy izy ka nandatsaka ny lelam-bavahadiny; hatreo amin’ny tilikambo fiambenan’i Hamea ka hatrany amin’ny tilikambo fiambenan’i Hananela no nohamasininy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary teo anilan’ireo dia nandrafitra koa ny vatan-dehilahin’i Jeriko.
- type: usfm
  marker: p
  children:
  - type: text
    text: Teo anilan’ireo indray dia nandrafitra koa i Zakora zanak’Imry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny vavahadin-kazandrano dia narafitry ny zanak’i Hasena; izy no nandatsaka ny rairainy sy ny lelam-bavahadiny mbamin’ny hidiny sy ny tsivalan-kazony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Meremota, zanak’i Oria, zanak’i Hakoza.
- type: usfm
  marker: p
  children:
  - type: text
    text: Teo anilan’io dia nanamboatra koa i Mesolama, zanak’i Berekia, zanak’i Mesezabela.
- type: usfm
  marker: p
  children:
  - type: text
    text: Teo anilan’io dia nanamboatra koa i Zadoka, zanak’i Bana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary teo anilan’io dia nanamboatra koa ny Tekoita; nefa ny olona ambonimbony teo aminy dia tsy nety nampiondrika ny lohany ho amin’ny fanompoana ny Tompony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny vavahady taloha dia namboarin’i Joiada, zanak’i Pasea, sy i Mesolama, zanak’i Besodia; izy roa lahy no nandatsaka ny rairainy sy ny lelam-bavahadiny mbamin’ny hidiny sy ny tsivalan-kazony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Melatia gibeonita sy i Jadona meronotita mbamin’ny mponina tany Gibeona sy Mizpa, hatramin’ny toerana misy ny sezafiandrianan’ny governora etỳ andafin’ny ony Eofrata.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Oziela, zanak’i Haraia, isan’ny mpanefy volamena.
- type: usfm
  marker: p
  children:
  - type: text
    text: Teo anilan’io dia nanamboatra koa i Hanania, izay isan’ny mpanao haro manitra. Nanamafy an’i Jerosalema hatrany amin’ny manda lehibe izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Refaia, zanak’i Hora, komandin’ny antsasak’ireo avy amin’ny faritr’i Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Jedaia, zanak’i Haromafa, dia ny teo amin’ny tandrifin’ny tranony ihany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Teo anilan’io dia nanamboatra koa i Hatosy, zanak’i Hasabnia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny sasany koa mbamin’ny tilikambo fiambenana misy ny fatana fandoroana dia namboarin’i Malkia, zanak’i Harima, sy i Hasoba, zanak’i Pahata-Moaba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Saloma, zanak’i Halohesy, komandin’ny antsasak’ireo avy amin’ny faritr’i Jerosalema, dia izy sy ny zanany vavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny vavahady mankany amin’ny lohasaha dia namboarin’i Hanona sy ny mponina tany Zanoa; ireo no nandrafitra izany sy nandatsaka ny lelam-bavahadiny mbamin’ny hidiny sy ny tsivalan-kazony, ary narafiny koa ny arivo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' amin’ny manda hatrany amin’ny vavahadin-jezika. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny vavahadin-jezika dia namboarin’i Malkia, zanak’i Rekaba, komandin’ny faritr’i Bety-Hakerema; izy no nandrafitra izany sy nandatsaka ny lelam-bavahadiny mbamin’ny hidiny sy ny tsivalan-kazony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny vavahadin-doharano dia namboarin’i Saloma, zanak’i Kola-Hoze, komandin’ny faritr’i Mizpa; izy no nandrafitra sy nanafo izany ary nandatsaka ny lelam-bavahadiny mbamin’ny hidiny sy ny tsivalan-kazony, ary narafiny koa ny mandan’ny farihy Siloa, teo anilan’ny sahan’ny mpanjaka ka hatrany amin’ny tohatra midina avy any an-Tanànan’i Davida.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Teo anilan’io dia nanamboatra koa i Nehemia, zanak’i Azboka, komandin’ny antsasaky ny faritr’i Bety-Zora, hatreo amin’ny tandrifin’ireo fasan’i Davida ka hatramin’ny farihy izay natao ary hatrany amin’ny tranon’ny lehilahy mahery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Teo anilan’io dia nanamboatra koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', dia i Rehoma, zanak’i Bany.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Hasabia, komandin’ny antsasaky ny faritr’i Keila, ho an’ny faritra misy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Teo anilan’io dia nanamboatra koa ireo rahalahiny, dia i Bavay, zanak’i Henadada, komandin’ny antsasaky ny faritr’i Keila.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Teo anilan’ireo dia nisy namboarin’i Ezera, zanak’i Josoa, komandin’i Mizpa, teo amin’ny tandrifin’ny fiakarana ho any amin’ny trano fitahirizam-piadiana eo amin’ny fiolahana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Teo anilan’io koa i Baroka zanak’i Zabay dia nazoto nanamboatra ny ampahany hatreo amin’ny fiolahana ka hatreny amin’ny varavaran’ny tranon’i Eliasiba mpisoronabe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Teo anilan’io koa dia nisy namboarin’i Meremota, zanak’i Oria, zanak’i Hakoza, hatreo amin’ny varavaran’ny tranon’i Eliasiba ka hatrany amin’ny faran’ny tranon’i Eliasiba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Teo anilan’io dia nanamboatra koa ny mpisorona, dia ireo avy tany amin’ny tany lemaka. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Benjamina sy i Hasoba, teo amin’ny tandrifin’ny tranony ihany koa.
- type: usfm
  marker: p
  children:
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Azaria, zanak’i Mahaseia, zanak’i Anania, teo anilan’ny tranony ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Teo anilan’io koa dia nisy namboarin’i Binoy, zanak’i Henadada, hatramin’ny tranon’i Azaria ka hatreo amin’ny fiolahana eo amin’ny zorony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary i Palala zanak’i Ozay koa dia nanamboatra teo amin’ny tandrifin’ny fiolahana sy izay mandroso eo amin’ny tilikambo fiambenana ambony, eo amin’ny tranon’ny mpanjaka, eo akaikin’ny tokotanin’ny trano fiambenana. Teo anilan’io koa i Pedaia, zanak’i Parosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Netinima
  - type: text
    text: ' izay nonina tany Ofela dia niasa hatreo amin’ny tandrifin’ny vavahadin-drano atsinanana sy ny tilikambo fiambenana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Teo anilan’ireo koa dia nisy namboarin’ny Tekoita, teo amin’ny tandrifin’ilay mandroso eo amin’ny tilikambo fiambenana lehibe ka hatreo amin’ny mandan’i Ofela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hatreo ambonin’ny vavahadin-tsoavaly dia namboarin’ny mpisorona tsirairay ny teo amin’ny tandrifin’ny tranony avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Zadoka, zanak’Imera, dia ny teo amin’ny tandrifin’ny tranony ihany. Teo anilan’io dia nanamboatra koa i Semaia, zanak’i Sekania, mpiandry ny vavahady atsinanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Teo anilan’io koa dia nisy namboarin’i Hanania, zanak’i Selemia, sy i Hanona, fahenin’ny zanak’i Zalafa.
- type: usfm
  marker: p
  children:
  - type: text
    text: Teo anilan’ireo dia nanamboatra koa i Mesolama, zanak’i Berekia, dia ny teo amin’ny tandrifin’ny efitranony ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Teo anilan’io dia nanamboatra koa i Malkia izay isan’ny mpanefy volamena, hatreo amin’ny tranon’ny Netinima sy ny mpanao varo-mandeha, dia ny teo amin’ny tandrifin’ny vavahady Mifikada ka hatrany amin’ny trano ambony teo an-jorony. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary ny teo anelanelan’ny trano ambony teo an-jorony sy ny vavahadin’ondry no namboarin’ny mpanefy volamena sy ny mpivaro-mandeha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Te hisakana ny asa ireo fahavalo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa ren’i Sanibala fa nataonay ny manda dia tezitra sady sosotra loatra izy ka nihomehezany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia niteny teo anatrehan’ny namany sy ny miaramilan’i Samaria izy hoe: Inona no ataon’ireo Jiosy osa ireo? Hahaleo tena va ireo? Moa havela hiasa va ireo? Hahavono zavatra hatao fanatitra va ireo? Hahatsangana indray andro va ireo? Hahatsangana ny vato avy amin’ny lavenona miavosa va ireo? '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary i Tobia amonita dia teo anilan’i Sanibala ka niteny hoe: Na amboahaolo aza no miakatra eo amin’izay atsangany dia haharava ny manda vato ataony!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Mihainoa, ry Andriamanitray ô, fa atao tsinontsinona izahay! Koa atsingereno ho eo an-dohany ihany ny latsa ataony ary aoka ho babo any amin’ny tany izay ahababoany izy! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Aza saronana ny helony ary aza vonoina tsy ho eo anatrehanao ny fahotany; fa efa nampahatezitra Anao teo anatrehan’ireo mandrafitra izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Dia narafitray ihany ny manda ka tafakambana avokoa hatramin’ny antsasany miakatra; satria nafana fo niasa ny olona.
