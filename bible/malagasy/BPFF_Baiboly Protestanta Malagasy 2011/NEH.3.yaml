document_id: NEH.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manangana ny mandan’i Jerosalema indray ny Jiosy
  - type: text
    content: Dia nitsangana i Eliasiba mpisoronabe sy ny mpisorona rahalahiny ka nandrafitra ny vavahadin’ondry; nanamasina azy izy ka nandatsaka ny lelam-bavahadiny; hatreo amin’ny tilikambo fiambenan’i Hamea ka hatrany amin’ny tilikambo fiambenan’i Hananela no nohamasininy.
  '10':
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Jedaia, zanak’i Haromafa, dia ny teo amin’ny tandrifin’ny tranony ihany.
  - type: text
    content: Teo anilan’io dia nanamboatra koa i Hatosy, zanak’i Hasabnia.
  '11':
  - type: text
    content: Ny sasany koa mbamin’ny tilikambo fiambenana misy ny fatana fandoroana dia namboarin’i Malkia, zanak’i Harima, sy i Hasoba, zanak’i Pahata-Moaba.
  '12':
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Saloma, zanak’i Halohesy, komandin’ny antsasak’ireo avy amin’ny faritr’i Jerosalema, dia izy sy ny zanany vavy.
  '13':
  - type: text
    content: 'Ny vavahady mankany amin’ny lohasaha dia namboarin’i Hanona sy ny mponina tany Zanoa; ireo no nandrafitra izany sy nandatsaka ny lelam-bavahadiny mbamin’ny hidiny sy ny tsivalan-kazony, ary narafiny koa ny arivo '
  - type: text
    content: hakiho
  - type: text
    content: ' amin’ny manda hatrany amin’ny vavahadin-jezika. '
  '14':
  - type: text
    content: Ny vavahadin-jezika dia namboarin’i Malkia, zanak’i Rekaba, komandin’ny faritr’i Bety-Hakerema; izy no nandrafitra izany sy nandatsaka ny lelam-bavahadiny mbamin’ny hidiny sy ny tsivalan-kazony.
  '15':
  - type: text
    content: Ny vavahadin-doharano dia namboarin’i Saloma, zanak’i Kola-Hoze, komandin’ny faritr’i Mizpa; izy no nandrafitra sy nanafo izany ary nandatsaka ny lelam-bavahadiny mbamin’ny hidiny sy ny tsivalan-kazony, ary narafiny koa ny mandan’ny farihy Siloa, teo anilan’ny sahan’ny mpanjaka ka hatrany amin’ny tohatra midina avy any an-Tanànan’i Davida.
  '16':
  - type: text
    content: Teo anilan’io dia nanamboatra koa i Nehemia, zanak’i Azboka, komandin’ny antsasaky ny faritr’i Bety-Zora, hatreo amin’ny tandrifin’ireo fasan’i Davida ka hatramin’ny farihy izay natao ary hatrany amin’ny tranon’ny lehilahy mahery.
  '17':
  - type: text
    content: 'Teo anilan’io dia nanamboatra koa ny '
  - type: text
    content: levita
  - type: text
    content: ', dia i Rehoma, zanak’i Bany.'
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Hasabia, komandin’ny antsasaky ny faritr’i Keila, ho an’ny faritra misy azy.
  '18':
  - type: text
    content: Teo anilan’io dia nanamboatra koa ireo rahalahiny, dia i Bavay, zanak’i Henadada, komandin’ny antsasaky ny faritr’i Keila.
  '19':
  - type: text
    content: Teo anilan’ireo dia nisy namboarin’i Ezera, zanak’i Josoa, komandin’i Mizpa, teo amin’ny tandrifin’ny fiakarana ho any amin’ny trano fitahirizam-piadiana eo amin’ny fiolahana.
  '2':
  - type: text
    content: Ary teo anilan’ireo dia nandrafitra koa ny vatan-dehilahin’i Jeriko.
  - type: text
    content: Teo anilan’ireo indray dia nandrafitra koa i Zakora zanak’Imry.
  '20':
  - type: text
    content: Teo anilan’io koa i Baroka zanak’i Zabay dia nazoto nanamboatra ny ampahany hatreo amin’ny fiolahana ka hatreny amin’ny varavaran’ny tranon’i Eliasiba mpisoronabe.
  '21':
  - type: text
    content: Teo anilan’io koa dia nisy namboarin’i Meremota, zanak’i Oria, zanak’i Hakoza, hatreo amin’ny varavaran’ny tranon’i Eliasiba ka hatrany amin’ny faran’ny tranon’i Eliasiba.
  '22':
  - type: text
    content: 'Teo anilan’io dia nanamboatra koa ny mpisorona, dia ireo avy tany amin’ny tany lemaka. '
  '23':
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Benjamina sy i Hasoba, teo amin’ny tandrifin’ny tranony ihany koa.
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Azaria, zanak’i Mahaseia, zanak’i Anania, teo anilan’ny tranony ihany.
  '24':
  - type: text
    content: 'Teo anilan’io koa dia nisy namboarin’i Binoy, zanak’i Henadada, hatramin’ny tranon’i Azaria ka hatreo amin’ny fiolahana eo amin’ny zorony. '
  '25':
  - type: text
    content: Ary i Palala zanak’i Ozay koa dia nanamboatra teo amin’ny tandrifin’ny fiolahana sy izay mandroso eo amin’ny tilikambo fiambenana ambony, eo amin’ny tranon’ny mpanjaka, eo akaikin’ny tokotanin’ny trano fiambenana. Teo anilan’io koa i Pedaia, zanak’i Parosy.
  '26':
  - type: text
    content: 'Ny '
  - type: text
    content: Netinima
  - type: text
    content: ' izay nonina tany Ofela dia niasa hatreo amin’ny tandrifin’ny vavahadin-drano atsinanana sy ny tilikambo fiambenana.'
  '27':
  - type: text
    content: Teo anilan’ireo koa dia nisy namboarin’ny Tekoita, teo amin’ny tandrifin’ilay mandroso eo amin’ny tilikambo fiambenana lehibe ka hatreo amin’ny mandan’i Ofela.
  '28':
  - type: text
    content: Hatreo ambonin’ny vavahadin-tsoavaly dia namboarin’ny mpisorona tsirairay ny teo amin’ny tandrifin’ny tranony avy.
  '29':
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Zadoka, zanak’Imera, dia ny teo amin’ny tandrifin’ny tranony ihany. Teo anilan’io dia nanamboatra koa i Semaia, zanak’i Sekania, mpiandry ny vavahady atsinanana.
  '3':
  - type: text
    content: Ny vavahadin-kazandrano dia narafitry ny zanak’i Hasena; izy no nandatsaka ny rairainy sy ny lelam-bavahadiny mbamin’ny hidiny sy ny tsivalan-kazony.
  '30':
  - type: text
    content: Teo anilan’io koa dia nisy namboarin’i Hanania, zanak’i Selemia, sy i Hanona, fahenin’ny zanak’i Zalafa.
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Mesolama, zanak’i Berekia, dia ny teo amin’ny tandrifin’ny efitranony ihany.
  '31':
  - type: text
    content: 'Teo anilan’io dia nanamboatra koa i Malkia izay isan’ny mpanefy volamena, hatreo amin’ny tranon’ny Netinima sy ny mpanao varo-mandeha, dia ny teo amin’ny tandrifin’ny vavahady Mifikada ka hatrany amin’ny trano ambony teo an-jorony. '
  '32':
  - type: text
    content: Ary ny teo anelanelan’ny trano ambony teo an-jorony sy ny vavahadin’ondry no namboarin’ny mpanefy volamena sy ny mpivaro-mandeha.
  - type: heading
    content: Te hisakana ny asa ireo fahavalo
  '33':
  - type: text
    content: 'Rehefa ren’i Sanibala fa nataonay ny manda dia tezitra sady sosotra loatra izy ka nihomehezany ny '
  - type: text
    content: Jiosy
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Dia niteny teo anatrehan’ny namany sy ny miaramilan’i Samaria izy hoe: Inona no ataon’ireo Jiosy osa ireo? Hahaleo tena va ireo? Moa havela hiasa va ireo? Hahavono zavatra hatao fanatitra va ireo? Hahatsangana indray andro va ireo? Hahatsangana ny vato avy amin’ny lavenona miavosa va ireo? '
  '35':
  - type: text
    content: 'Ary i Tobia amonita dia teo anilan’i Sanibala ka niteny hoe: Na amboahaolo aza no miakatra eo amin’izay atsangany dia haharava ny manda vato ataony!'
  '36':
  - type: text
    content: 'Mihainoa, ry Andriamanitray ô, fa atao tsinontsinona izahay! Koa atsingereno ho eo an-dohany ihany ny latsa ataony ary aoka ho babo any amin’ny tany izay ahababoany izy! '
  '37':
  - type: text
    content: 'Aza saronana ny helony ary aza vonoina tsy ho eo anatrehanao ny fahotany; fa efa nampahatezitra Anao teo anatrehan’ireo mandrafitra izy ireo. '
  '38':
  - type: text
    content: Dia narafitray ihany ny manda ka tafakambana avokoa hatramin’ny antsasany miakatra; satria nafana fo niasa ny olona.
  '4':
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Meremota, zanak’i Oria, zanak’i Hakoza.
  - type: text
    content: Teo anilan’io dia nanamboatra koa i Mesolama, zanak’i Berekia, zanak’i Mesezabela.
  - type: text
    content: Teo anilan’io dia nanamboatra koa i Zadoka, zanak’i Bana.
  '5':
  - type: text
    content: Ary teo anilan’io dia nanamboatra koa ny Tekoita; nefa ny olona ambonimbony teo aminy dia tsy nety nampiondrika ny lohany ho amin’ny fanompoana ny Tompony.
  '6':
  - type: text
    content: Ny vavahady taloha dia namboarin’i Joiada, zanak’i Pasea, sy i Mesolama, zanak’i Besodia; izy roa lahy no nandatsaka ny rairainy sy ny lelam-bavahadiny mbamin’ny hidiny sy ny tsivalan-kazony.
  '7':
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Melatia gibeonita sy i Jadona meronotita mbamin’ny mponina tany Gibeona sy Mizpa, hatramin’ny toerana misy ny sezafiandrianan’ny governora etỳ andafin’ny ony Eofrata.
  '8':
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Oziela, zanak’i Haraia, isan’ny mpanefy volamena.
  - type: text
    content: Teo anilan’io dia nanamboatra koa i Hanania, izay isan’ny mpanao haro manitra. Nanamafy an’i Jerosalema hatrany amin’ny manda lehibe izy.
  '9':
  - type: text
    content: Teo anilan’ireo dia nanamboatra koa i Refaia, zanak’i Hora, komandin’ny antsasak’ireo avy amin’ny faritr’i Jerosalema.
