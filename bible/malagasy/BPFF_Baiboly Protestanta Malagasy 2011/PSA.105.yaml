document_id: PSA.105
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tantaran’ny famindrampon’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 16.8-22
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miderà NY TOMPO, miantsoa ny anarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampahafantaro any amin’ny firenena ny asany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihirà ho Azy, mankalazà Azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saintsaino ny fahagagana rehetra ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ataovy ho reharehanareo ny anarany masina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hifaly ny fon’izay mitady NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mitadiava NY TOMPO sy ny heriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: katsaho mandrakariva ny tavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsarovy ny asa mahagaga nataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fahagagana nataony sy ny fitsaran’ny vavany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ry taranak’i Abrahama mpanompony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo olom-boafidiny, taranak’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: NY TOMPO, Izy no Andriamanitsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manerana ny tany rehetra ny fitsarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mahatsiaro mandrakariva ny fanekeny Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay teny izay voadidiny ho an’ny taranaka arivo mandimby;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: eny, ilay nataony tamin’i Abrahama
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fianianany tamin’Isaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: izay naoriny ho lalàna ho an’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho fanekena mandrakizay ho an’Israely
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka nilazany hoe: Homeko anao ny tany Kanana'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho anjara lovanareo voazara tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mbola olom-bitsy izy ireo tamin’izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, vitsy sady vahiny tao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: nifindrafindra firenena izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nifindrafindra fanjakana tany amin’ny firenen-kafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy nisy navelany hampahory azy anefa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa nananatra mpanjaka noho ny amin’ireo Izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aza mikasika ireo Voahosotro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza manisy ratsy ireo mpaminaniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia niantso ny mosary ho amin’ny tany Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nofoanany avokoa ny hanina rehetra izay tohan’aina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: naniraka lehilahy iray hialoha azy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia i Josefa izay namidy ho andevo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nampijalina tamin’ny fatorana ny tongony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nogadraina vy izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: mandra-pahatongan’ny fotoana nahatanterahan’ny teniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nizaha toetra azy ny tenin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nandefa iraka hamaha azy ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tamin’ny mpanapaka ny vahoaka izay nampandefa azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nametraka azy ho tompon’ny tranony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho mpanapaka ny fananany rehetra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: mba hamatotra ny mpitondra araka ny sitrapony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hampianatra fahendrena ny loholony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary nankany Ejipta Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, nivahiny tany amin’ny tanin’i Hama i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nahamaro ny taranaky ny olony ho be indrindra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampahery azy noho ny fahavalony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nampiova ny fon’ireny hankahala ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamitaka ny mpanompony Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Naniraka an’i Mosesy mpanompony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy i Arona izay nofidiny Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary izy ireo dia nanao ny famantarany teo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fahagagana tany amin’ny tanin’i Hama.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nandefa ny haizina Izy dia tonga ny haizina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nisy nanohitra ny teniny izy ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nahatonga ny rano teo aminy ho ra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nahafaty ny hazandranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nisy sahona betsaka ny taniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, na dia hatrao an’efitranon’ny mpanjakany aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Niteny Izy dia tonga ny fihitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny moka teny amin’ny faritaniny rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nahatonga havandra ho solon’ny ranonorana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary afo midedadeda teny amin’ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Namely ny voalobony sy ny aviaviny Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanapatapaka ny hazo teo amin’ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Niteny Izy dia tonga ny valala
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny sompanga tsy hita isa;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: dia nihinana ny zava-maitso rehetra teny amin’ny taniny ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandany ny vokatry ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Namely ny lahimatoa rehetra tany amin’ny taniny Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny voalohan-terany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Dia nitondra ny olony nivoaka avy tany Izy, niaraka tamin’ny volafotsy sy volamena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nisy nangozohozo na dia iray akory aza tamin’ireo fokony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Faly i Ejipta tamin’ny nahalasanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa nahazo azy ny fahatahorana ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Namelatra rahona ho fialokalofana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary afo ho fanazavana nony alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Nangataka izy ireo dia nahatonga papelika Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mofon-danitra no namokisany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Nanokatra ny vatolampy Izy dia nigororoana ny rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tonga renirano nandriaka tamin’ny tany maina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Fa nahatsiaro ny teniny masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy i Abrahama mpanompony Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Nitondra ny olony nivoaka avy tany tamin’ny fifaliana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny voafidiny tamin’ny fihobiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Nanome azy ny tanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' Izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nandova ny nisahiranan’ny firenena maro ireny
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: mba hitandremany ny didiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hankatoavany ny lalànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Haleloia
  - type: text
    text: .
