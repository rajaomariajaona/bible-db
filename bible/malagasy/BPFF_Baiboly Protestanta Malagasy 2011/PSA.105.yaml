document_id: PSA.105,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tantaran’ny famindrampon’Andriamanitra
  - type: heading
    content: 1Tan 16.8-22
  - type: text
    content: Miderà NY TOMPO, miantsoa ny anarany;
  - type: text
    content: ampahafantaro any amin’ny firenena ny asany.
  '10':
  - type: text
    content: izay naoriny ho lalàna ho an’i Jakoba
  - type: text
    content: sy ho fanekena mandrakizay ho an’Israely
  '11':
  - type: text
    content: 'ka nilazany hoe: Homeko anao ny tany Kanana'
  - type: text
    content: ho anjara lovanareo voazara tsara.
  '12':
  - type: text
    content: Mbola olom-bitsy izy ireo tamin’izany;
  - type: text
    content: eny, vitsy sady vahiny tao;
  '13':
  - type: text
    content: nifindrafindra firenena izy ireo
  - type: text
    content: ary nifindrafindra fanjakana tany amin’ny firenen-kafa.
  '14':
  - type: text
    content: Tsy nisy navelany hampahory azy anefa,
  - type: text
    content: 'fa nananatra mpanjaka noho ny amin’ireo Izy hoe:'
  '15':
  - type: text
    content: Aza mikasika ireo Voahosotro
  - type: text
    content: ary aza manisy ratsy ireo mpaminaniko.
  '16':
  - type: text
    content: Dia niantso ny mosary ho amin’ny tany Izy;
  - type: text
    content: nofoanany avokoa ny hanina rehetra izay tohan’aina;
  '17':
  - type: text
    content: naniraka lehilahy iray hialoha azy Izy,
  - type: text
    content: dia i Josefa izay namidy ho andevo.
  '18':
  - type: text
    content: Nampijalina tamin’ny fatorana ny tongony;
  - type: text
    content: nogadraina vy izy,
  '19':
  - type: text
    content: mandra-pahatongan’ny fotoana nahatanterahan’ny teniny;
  - type: text
    content: nizaha toetra azy ny tenin’NY TOMPO.
  '2':
  - type: text
    content: Mihirà ho Azy, mankalazà Azy!
  - type: text
    content: Saintsaino ny fahagagana rehetra ataony.
  '20':
  - type: text
    content: Nandefa iraka hamaha azy ny mpanjaka,
  - type: text
    content: dia tamin’ny mpanapaka ny vahoaka izay nampandefa azy.
  '21':
  - type: text
    content: Nametraka azy ho tompon’ny tranony izy
  - type: text
    content: ary ho mpanapaka ny fananany rehetra
  '22':
  - type: text
    content: mba hamatotra ny mpitondra araka ny sitrapony
  - type: text
    content: sy hampianatra fahendrena ny loholony.
  '23':
  - type: text
    content: Ary nankany Ejipta Israely;
  - type: text
    content: eny, nivahiny tany amin’ny tanin’i Hama i Jakoba.
  '24':
  - type: text
    content: Dia nahamaro ny taranaky ny olony ho be indrindra Izy
  - type: text
    content: ka nampahery azy noho ny fahavalony.
  '25':
  - type: text
    content: Nampiova ny fon’ireny hankahala ny olony
  - type: text
    content: sy hamitaka ny mpanompony Izy.
  '26':
  - type: text
    content: Naniraka an’i Mosesy mpanompony
  - type: text
    content: sy i Arona izay nofidiny Izy.
  '27':
  - type: text
    content: Ary izy ireo dia nanao ny famantarany teo aminy
  - type: text
    content: sy fahagagana tany amin’ny tanin’i Hama.
  '28':
  - type: text
    content: Nandefa ny haizina Izy dia tonga ny haizina;
  - type: text
    content: ary tsy nisy nanohitra ny teniny izy ireo.
  '29':
  - type: text
    content: Nahatonga ny rano teo aminy ho ra Izy
  - type: text
    content: ka nahafaty ny hazandranony.
  '3':
  - type: text
    content: Ataovy ho reharehanareo ny anarany masina!
  - type: text
    content: Aoka hifaly ny fon’izay mitady NY TOMPO.
  '30':
  - type: text
    content: Nisy sahona betsaka ny taniny;
  - type: text
    content: eny, na dia hatrao an’efitranon’ny mpanjakany aza.
  '31':
  - type: text
    content: Niteny Izy dia tonga ny fihitra
  - type: text
    content: sy ny moka teny amin’ny faritaniny rehetra.
  '32':
  - type: text
    content: Nahatonga havandra ho solon’ny ranonorana Izy
  - type: text
    content: ary afo midedadeda teny amin’ny taniny.
  '33':
  - type: text
    content: Namely ny voalobony sy ny aviaviny Izy
  - type: text
    content: ka nanapatapaka ny hazo teo amin’ny taniny.
  '34':
  - type: text
    content: Niteny Izy dia tonga ny valala
  - type: text
    content: sy ny sompanga tsy hita isa;
  '35':
  - type: text
    content: dia nihinana ny zava-maitso rehetra teny amin’ny taniny ireny
  - type: text
    content: ka nandany ny vokatry ny taniny.
  '36':
  - type: text
    content: Namely ny lahimatoa rehetra tany amin’ny taniny Izy,
  - type: text
    content: dia ny voalohan-terany rehetra.
  '37':
  - type: text
    content: Dia nitondra ny olony nivoaka avy tany Izy, niaraka tamin’ny volafotsy sy volamena;
  - type: text
    content: tsy nisy nangozohozo na dia iray akory aza tamin’ireo fokony.
  '38':
  - type: text
    content: Faly i Ejipta tamin’ny nahalasanany,
  - type: text
    content: satria efa nahazo azy ny fahatahorana ireo.
  '39':
  - type: text
    content: Namelatra rahona ho fialokalofana Izy
  - type: text
    content: ary afo ho fanazavana nony alina.
  '4':
  - type: text
    content: Mitadiava NY TOMPO sy ny heriny;
  - type: text
    content: katsaho mandrakariva ny tavany.
  '40':
  - type: text
    content: Nangataka izy ireo dia nahatonga papelika Izy
  - type: text
    content: ary mofon-danitra no namokisany azy.
  '41':
  - type: text
    content: Nanokatra ny vatolampy Izy dia nigororoana ny rano
  - type: text
    content: ka tonga renirano nandriaka tamin’ny tany maina.
  '42':
  - type: text
    content: Fa nahatsiaro ny teniny masina
  - type: text
    content: sy i Abrahama mpanompony Izy.
  '43':
  - type: text
    content: Nitondra ny olony nivoaka avy tany tamin’ny fifaliana Izy
  - type: text
    content: ary ny voafidiny tamin’ny fihobiana.
  '44':
  - type: text
    content: 'Nanome azy ny tanin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' Izy'
  - type: text
    content: ary nandova ny nisahiranan’ny firenena maro ireny
  '45':
  - type: text
    content: mba hitandremany ny didiny
  - type: text
    content: sy hankatoavany ny lalànany.
  - type: text
    content: Haleloia
  - type: text
    content: .
  '5':
  - type: text
    content: Tsarovy ny asa mahagaga nataony,
  - type: text
    content: dia ny fahagagana nataony sy ny fitsaran’ny vavany,
  '6':
  - type: text
    content: ry taranak’i Abrahama mpanompony,
  - type: text
    content: dia ianareo olom-boafidiny, taranak’i Jakoba.
  '7':
  - type: text
    content: NY TOMPO, Izy no Andriamanitsika;
  - type: text
    content: manerana ny tany rehetra ny fitsarany.
  '8':
  - type: text
    content: Mahatsiaro mandrakariva ny fanekeny Izy,
  - type: text
    content: dia ilay teny izay voadidiny ho an’ny taranaka arivo mandimby;
  '9':
  - type: text
    content: eny, ilay nataony tamin’i Abrahama
  - type: text
    content: sy ny fianianany tamin’Isaka;
