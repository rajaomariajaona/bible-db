document_id: 2KI.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanasitranana an’i Namàna boka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary i Namàna, komandin’ny miaramilan’ny mpanjakan’i Arama, dia olona lehibe teo anatrehan’ny tompony sady nanan-kaja, satria izy no namonjen’NY TOMPO an’i Arama. Izany lehilahy mahery izany anefa dia boka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nandefa iraka tany aminy i Elisa hilaza hoe: Mandehana, mandroa impito ao Jordana, dia hody aminao indray ny nofonao ka hadio ianao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa tezitra i Namàna dia lasa nandeha sady niteny hoe: Indro, nataoko fa hanatona atỳ amiko tokoa izy ka hijoro sy hiantso ny anaran’NY TOMPO Andriamaniny sady hanevaheva ny tanany eo ambonin’ny aretina ka hanafaka ny habokana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tsy tsara noho ny ranon’ny Israely rehetra va i Abana sy i Farpara, onin’i Damaskosy? Tsy mahazo mandro ao amin’ireo va aho ka hadio? Dia nihodina izy ka lasa an-katezerana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nanatona ny mpanompony ka niteny taminy hoe: Ry Ikaky ô! Na dia zavatra lehibe aza no nasain’ny mpaminany ho nataonao, moa tsy mba ho nataonao va izany? Koa mainka va, raha hoy izy aminao: Mandroa dia hadio ianao? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia nidina izy ka nisitrika tao Jordana impito araka ny tenin’ny lehilahin’Andriamanitra; ary ny nofony dia tonga tahaka ny nofon-jazakely indray ka nadio izy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary niverina nankao amin’ny lehilahin’Andriamanitra izy mbamin’izay rehetra nanaraka azy ka nony tonga tao dia nitsangana teo anatrehany sady niteny hoe: Indro, fantatro fa tsy misy Andriamanitra amin’ny tany rehetra afa-tsy ato amin’ny Israely ihany. Koa miangavy anao aho, raiso ny saotra aterin’ny mpanomponao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hoy anefa izy: Raha velona koa NY TOMPO izay tompoiko dia tsy handray mihitsy aho. Ary nanery azy handray izy nefa tsy nety i Elisa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy i Namàna: Raha izany ary no izy, miangavy anao aho mpanomponao, mba homena tany zakan’ny ampondra roa, fa ny mpanomponao dia tsy mba hanolotra fanatitra dorana manontolo na fanatitra hafa intsony ho an’ny andriamanitra hafa, fa ho an’NY TOMPO ihany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nefa aoka havelan’NY TOMPO ny heloky ny mpanomponao ny amin’izao zavatra izao: Rehefa miditra ao amin’ny tempolin’i Rimona hiankohoka ao ny tompoko, ary mitehina amin’ny tanako, ka mba miankohoka ao amin’ny tempolin’i Rimona aho, NY TOMPO anie hamela ny heloky ny mpanomponao amin’izany zavatra izany raha miankohoka ao aho! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy i Elisa taminy: Mandehana soa amantsara. Dia nisaraka taminy izy ary nandeha lavidavitra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Azon’ny habokana i Gehazy
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary raha nandeha nanafika ny Arameana dia nitondra zazavavy kely iray azony babo avy tany amin’ny tanin’ny Israely; nanompo ny vadin’i Namàna izy io. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary hoy i Gehazy, zatovon’i Elisa, lehilahin’Andriamanitra: Indro, ny tompoko dia namela fotsiny ity Namàna arameana ity ka tsy nandray izay zavatra noentiny akory; fa raha velona koa NY TOMPO dia hihazakazaka hanaraka azy aho ka handray zavatra avy aminy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia lasa i Gehazy nanaraka an’i Namàna. Nony nahatazana azy avy mihazakazaka manaraka azy i Namàna dia niala haingana tamin’ny kalesy mba hitsena azy ka niteny hoe: Tsara ihany va? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hoy izy: Tsara ihany. Fa naniraka ahy ny tompoko hilaza hoe: Indro ankehitriny misy zatovo roa lahy amin’ny zanaky ny mpaminany tonga atỳ amiko avy any amin’ny tany be havoana any Efraima; koa miangavy anao aho, mba omeo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ' volafotsy sy fitafiana indroa miova izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary hoy i Namàna: Mandraisa talenta roa. Ary nanery azy izy sady namehy talenta volafotsy roa tao anaty kitapo roa mbamin’ny fitafiana indroa miova, dia nampitondrainy ny zatovony roa lahy izany; ary ireo nitondra izany teo anoloan’i Gehazy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nony tonga teo Ofela izy dia nalainy izany ka napetrany tao an-trano; dia nampandehaniny ireo zatovo roalahy ka nisaraka taminy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa lasa kosa i Gehazy ka nitsangana teo anatrehan’ny tompony. Ary hoy i Elisa taminy: Avy taiza ianao, ry Gehazy? Dia hoy izy: Tsy avy taiza na taiza ny mpanomponao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Hoy anefa i Elisa taminy: Tsy niaraka taminao ihany va ny foko tamin’ilay nihodina niala tamin’ny kalesy hitsena anao Ralehilahy? Moa andro fandraisam-bola, na fandraisana fitafiana, na tanin’oliva, na tanim-boaloboka, na ondry aman’osy, na omby, na mpanompolahy, na mpanompovavy va izao? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Koa ny habokan’i Namàna dia hiraikitra aminao sy ny taranakao mandrakizay! Ary niala teo anatrehany i Gehazy ka indro, boka ka fotsy toa ny orampanala izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hoy io tamin’ny tompovaviny: Enga anie ka mba ho ao amin’ny mpaminany izay any Samaria ny tompoko! Fa hanafaka azy amin’ny habokany izy! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary niditra i Namàna ka nilaza tamin’ny tompony hoe: Izany ka izany no nolazain’ilay zazavavy izay avy tany amin’ny tanin’ny Israely. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy ny mpanjakan’i Arama: Mandehana ary, fa hampitondra taratasy ho any amin’ny mpanjakan’ny Israely aho. Dia lasa izy sady nitondra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ' volafotsy folo sy volamena enina arivo sekela ary akanjo impolo miova. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary izy dia nitondra ilay taratasy ho any amin’ny mpanjakan’ny Israely nilaza hoe: Rehefa tonga atỳ aminao ity taratasy ity dia ho fantatrao fa efa nampandeha an’i Namàna mpanompoko hankaty aminao aho, koa afaho amin’ny habokany izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nony novakin’ny mpanjakan’ny Israely ny taratasy dia nandriatra ny fitafiany izy ka niteny hoe: Andriamanitra va aho ka hahafaty na hahavelona, no andefasan’ilehiny iraka hankaty amiko mba hanafahako olona amin’ny habokany? Koa miangavy anareo aho, fantaro sy zahao fa mila ady amiko mihitsy izy! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nony ren’i Elisa, lehilahin’Andriamanitra, fa nandriatra ny fitafiany ny mpanjakan’ny Israely dia nandefa iraka tany amin’ny mpanjaka izy hilaza hoe: Nahoana no nandriatra ny fitafianao ianao? Aoka izy hankaty amiko, dia ho fantany fa misy mpaminany tokoa ato amin’ny Israely. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nandeha i Namàna nitondra ny soavaliny sy ny kalesiny ka nijanona teo am-baravaran’ny tranon’i Elisa. '
