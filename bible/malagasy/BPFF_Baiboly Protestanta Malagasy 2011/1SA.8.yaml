document_id: 1SA.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mangataka mpanjaka ny Israely
  - type: text
    content: 'Rehefa antitra i Samoela dia ny zanany no nataony mpitsara ny Israely. '
  '10':
  - type: text
    content: 'Dia nambaran’i Samoela tamin’ny olona izay nangataka mpanjaka taminy ny teny rehetra nolazain’NY TOMPO. '
  '11':
  - type: text
    content: 'Hoy izy: Izao no ho fahefan’ny mpanjaka izay hanjaka aminareo: Ny zanakareo lahy dia halainy ka hotendreny ho amin’ny kalesy fitondrany miady sy ho mpitaingin-tsoavaliny ary hihazakazaka eo alohan’ny kalesiny; '
  '12':
  - type: text
    content: 'hotendreny ho mpifehy arivo sy ho mpifehy dimampolo, ary hiasa ny taniny sy hijinja ny vokany ary hamboatra ny fiadiany sy ny fanaka momba ny kalesy fitondrany miady izy; '
  '13':
  - type: text
    content: 'ny zanakareo vavy dia halainy ho mpangaroharo zava-manitra ary ho mpahandro sy mpanao mofo; '
  '14':
  - type: text
    content: 'ny tsara indrindra amin’ny sahanareo sy ny tanim-boalobokareo sy ny tanin’olivanareo dia halainy ka homeny ny mpanompony; '
  '15':
  - type: text
    content: 'ny ampahafolon’ny voan-javatrareo sy ny tanim-boalobokareo dia halainy ka homeny ny tandapany sy ny mpanompony; '
  '16':
  - type: text
    content: 'ny mpanompolahinareo, ny mpanompovavinareo, ny zatovonareo tsara indrindra ary ny borikinareo dia halainy ka hampanaoviny ny asany. '
  '17':
  - type: text
    content: 'Halainy koa ny ampahafolon’ny ondry aman’osinareo; ary ny tenanareo dia ho tonga mpanompony. '
  '18':
  - type: text
    content: Dia hitaraina ianareo amin’izany andro izany noho ny mpanjakanareo izay nofidinareo ho anareo, nefa tsy hamaly anareo NY TOMPO amin’izany andro izany.
  '19':
  - type: text
    content: 'Kanefa tsy nety nihaino ny tenin’i Samoela ny olona, fa hoy izy: Tsia, fa aoka ihany hisy mpanjaka hanjaka aminay, '
  '2':
  - type: text
    content: 'Joela no anaran’ny lahimatoany, ary Abia kosa no anaran’ny faralahiny; mpitsara tany Bery-Sheba izy ireo. '
  '20':
  - type: text
    content: 'mba ho tahaka ny firenena hafa rehetra koa izahay ka ny mpanjakanay no hitondra anay sy handeha eo alohanay ary hitarika ny adinay. '
  '21':
  - type: text
    content: 'Dia ren’i Samoela ny teny rehetra nolazain’ny olona ka nolazainy teo anatrehan’NY TOMPO. '
  '22':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Samoela: Henoy ny teniny ka manendre mpanjaka ho azy. Dia hoy i Samoela tamin’ny lehilahin’ny Israely: Samia ary mandeha ho any amin’ny tanànanareo avy ianareo rehetra.'
  '3':
  - type: text
    content: 'Tsy nanaraka ny dian’ny rainy anefa ny zanany fa nivily nitady vola aman-karena ka nandray kolikoly sy nanao fitsarana miangatra. '
  '4':
  - type: text
    content: 'Ary nivory tao Rama ny loholon’ny Israely rehetra mba ho any amin’i Samoela '
  '5':
  - type: text
    content: 'ka niteny taminy hoe: Indro, efa antitra ianao, ary ny zanakao dia tsy manaraka ny dianao; koa manendre mpanjaka mba hitsara anay, tahaka ny firenena hafa rehetra. '
  '6':
  - type: text
    content: 'Tsy sitrak’i Samoela anefa ny nitenenan’ny olona hoe: Omeo mpanjaka izahay hitsara anay. Dia nivavaka tamin’NY TOMPO i Samoela. '
  '7':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Samoela: Henoy ihany ny tenin’ny olona amin’izay rehetra lazainy aminao; fa tsy ianao no laviny, fa Izaho no laviny tsy hanjaka aminy. '
  '8':
  - type: text
    content: 'Araka ny asa rehetra izay nataony hatramin’ny andro nitondrako azy nivoaka avy tany Ejipta ka mandraka androany, dia ny nahafoizany Ahy sy ny nanompoany andriamanitra hafa, dia toy izany koa no ataony aminao. '
  '9':
  - type: text
    content: Ary ankehitriny, henoy ihany ny feony, kanefa lazao marina aminy ka ambarao aminy ny ho fanaon’ny mpanjaka izay hanjaka aminy.
  - type: heading
    content: Ny fahefan’ny mpanjaka
