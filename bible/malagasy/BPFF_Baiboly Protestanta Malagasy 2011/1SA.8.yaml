document_id: 1SA.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mangataka mpanjaka ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa antitra i Samoela dia ny zanany no nataony mpitsara ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Joela no anaran’ny lahimatoany, ary Abia kosa no anaran’ny faralahiny; mpitsara tany Bery-Sheba izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy nanaraka ny dian’ny rainy anefa ny zanany fa nivily nitady vola aman-karena ka nandray kolikoly sy nanao fitsarana miangatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nivory tao Rama ny loholon’ny Israely rehetra mba ho any amin’i Samoela '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka niteny taminy hoe: Indro, efa antitra ianao, ary ny zanakao dia tsy manaraka ny dianao; koa manendre mpanjaka mba hitsara anay, tahaka ny firenena hafa rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy sitrak’i Samoela anefa ny nitenenan’ny olona hoe: Omeo mpanjaka izahay hitsara anay. Dia nivavaka tamin’NY TOMPO i Samoela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Samoela: Henoy ihany ny tenin’ny olona amin’izay rehetra lazainy aminao; fa tsy ianao no laviny, fa Izaho no laviny tsy hanjaka aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Araka ny asa rehetra izay nataony hatramin’ny andro nitondrako azy nivoaka avy tany Ejipta ka mandraka androany, dia ny nahafoizany Ahy sy ny nanompoany andriamanitra hafa, dia toy izany koa no ataony aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ankehitriny, henoy ihany ny feony, kanefa lazao marina aminy ka ambarao aminy ny ho fanaon’ny mpanjaka izay hanjaka aminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahefan’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nambaran’i Samoela tamin’ny olona izay nangataka mpanjaka taminy ny teny rehetra nolazain’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy izy: Izao no ho fahefan’ny mpanjaka izay hanjaka aminareo: Ny zanakareo lahy dia halainy ka hotendreny ho amin’ny kalesy fitondrany miady sy ho mpitaingin-tsoavaliny ary hihazakazaka eo alohan’ny kalesiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'hotendreny ho mpifehy arivo sy ho mpifehy dimampolo, ary hiasa ny taniny sy hijinja ny vokany ary hamboatra ny fiadiany sy ny fanaka momba ny kalesy fitondrany miady izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny zanakareo vavy dia halainy ho mpangaroharo zava-manitra ary ho mpahandro sy mpanao mofo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny tsara indrindra amin’ny sahanareo sy ny tanim-boalobokareo sy ny tanin’olivanareo dia halainy ka homeny ny mpanompony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny ampahafolon’ny voan-javatrareo sy ny tanim-boalobokareo dia halainy ka homeny ny tandapany sy ny mpanompony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny mpanompolahinareo, ny mpanompovavinareo, ny zatovonareo tsara indrindra ary ny borikinareo dia halainy ka hampanaoviny ny asany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Halainy koa ny ampahafolon’ny ondry aman’osinareo; ary ny tenanareo dia ho tonga mpanompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia hitaraina ianareo amin’izany andro izany noho ny mpanjakanareo izay nofidinareo ho anareo, nefa tsy hamaly anareo NY TOMPO amin’izany andro izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa tsy nety nihaino ny tenin’i Samoela ny olona, fa hoy izy: Tsia, fa aoka ihany hisy mpanjaka hanjaka aminay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'mba ho tahaka ny firenena hafa rehetra koa izahay ka ny mpanjakanay no hitondra anay sy handeha eo alohanay ary hitarika ny adinay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia ren’i Samoela ny teny rehetra nolazain’ny olona ka nolazainy teo anatrehan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Samoela: Henoy ny teniny ka manendre mpanjaka ho azy. Dia hoy i Samoela tamin’ny lehilahin’ny Israely: Samia ary mandeha ho any amin’ny tanànanareo avy ianareo rehetra.'
