document_id: HOS.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiafaran’ny fanjakana sy ny fivavahana amin’ny sampy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voaloboka nisandrahaka Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: namoa ho azy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: arakaraka ny habetsahan’ny voany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanaovany alitara betsaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: arakaraka ny hatsaran’ny taniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanaovany tsangambaton-tsampy tsara tarehy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mamitaka ny fony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa hovaliana izy izao noho ny helony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no hanimba ny alitarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handrava ny tsangambaton-tsampiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ankehitriny dia hoy izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy manana mpanjaka isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy natahorantsika NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa hahavita inona ho antsika moa izay mpanjaka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Namoaka teny maro izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanao fianianana mandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanao fifanekena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nitrebona toy ny zava-mangidy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny am-bava asa eny an-tsaha ny fitsarana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Matahotra ny mponina any Samaria noho ny amin’ny ombivavy kely ao Bety-Avena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitomany azy ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mangovitra noho ny aminy ny mpisorony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia noho ny amin’ny voninahiny izay lasan-ko babo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hoentina any Asiria koa iny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fanomezana ho an’i Jareba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.13.
    marker-yv: yv-n
  - type: text
    text: ' mpanjaka.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho afa-baraka i Efraima;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hangaihay Israely noho ny zavatra nosaininy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ho rava i Samaria, ho tonga toy ny sombin-javatra eny ambonin’ny rano ny mpanjakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ho rava koa ny toerana fanaovana sorona ao Avena izay anotan’ny Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho rakotry ny tsilo sy songosongo ny alitarany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hiteny amin’ny tendrombohitra izy hoe: Saròny izahay!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’ny havoana hoe: Mianjerà aminay!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hatramin’ilay tany Gibea fahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no efa nanotanao, ry Israely!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niziriziry tamin’izany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nahatratra azy tany Gibea ny ady namelezana ny zanaky ny faharatsiana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Araka ny sitrako no hamaizako azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hovorina hamely azy ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny hamatorana azy noho ny helony roa loha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tahaka ny ombivavy kely efa voafolaka i Efraima
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka faly manosihosy vary;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hasiako zioga ny vozony tsara tarehy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Horoahiko i Efraima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiasa tany i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handravona azy i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mamafaza ho anareo araka ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mijinjà araka ny fitiavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miasà tany vaovao ho anareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izao no andro hitadiavana NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambara-piaviny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handatsahany fahamarinana aminareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Asa ratsy no nataonareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy fahamarinana no nojinjainareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nihinana ny vokatry ny lainga ianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa satria nitoky tamin’ny lalanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny habetsahan’ny lehilahy maherinao ianao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia hisy tabataba hamelezana ny olonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka horavana ny tanànanao mimanda rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny nandravan’i Salamana an’i Bety-Arbela
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny andro niadiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka niara-torotoro ny reniny sy ny zanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Toy izany no hanjo anareo, ry Betela
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny haben’ny faharatsianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha maraina ny andro
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho levona tanteraka ny mpanjakan’ny Israely.
