document_id: HOS.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiafaran’ny fanjakana sy ny fivavahana amin’ny sampy
  - type: text
    content: Voaloboka nisandrahaka Israely,
  - type: text
    content: namoa ho azy izy;
  - type: text
    content: arakaraka ny habetsahan’ny voany
  - type: text
    content: no nanaovany alitara betsaka;
  - type: text
    content: arakaraka ny hatsaran’ny taniny
  - type: text
    content: no nanaovany tsangambaton-tsampy tsara tarehy.
  '10':
  - type: text
    content: Araka ny sitrako no hamaizako azy;
  - type: text
    content: hovorina hamely azy ny firenena
  - type: text
    content: amin’ny hamatorana azy noho ny helony roa loha.
  '11':
  - type: text
    content: Tahaka ny ombivavy kely efa voafolaka i Efraima
  - type: text
    content: ka faly manosihosy vary;
  - type: text
    content: hasiako zioga ny vozony tsara tarehy.
  - type: text
    content: Horoahiko i Efraima,
  - type: text
    content: hiasa tany i Joda
  - type: text
    content: ary handravona azy i Jakoba.
  '12':
  - type: text
    content: Mamafaza ho anareo araka ny fahamarinana,
  - type: text
    content: mijinjà araka ny fitiavana,
  - type: text
    content: miasà tany vaovao ho anareo.
  - type: text
    content: Fa izao no andro hitadiavana NY TOMPO
  - type: text
    content: ambara-piaviny
  - type: text
    content: sy handatsahany fahamarinana aminareo.
  '13':
  - type: text
    content: Asa ratsy no nataonareo
  - type: text
    content: ka tsy fahamarinana no nojinjainareo;
  - type: text
    content: nihinana ny vokatry ny lainga ianareo.
  - type: text
    content: Koa satria nitoky tamin’ny lalanao
  - type: text
    content: sy ny habetsahan’ny lehilahy maherinao ianao
  '14':
  - type: text
    content: dia hisy tabataba hamelezana ny olonao
  - type: text
    content: ka horavana ny tanànanao mimanda rehetra,
  - type: text
    content: toy ny nandravan’i Salamana an’i Bety-Arbela
  - type: text
    content: tamin’ny andro niadiana
  - type: text
    content: ka niara-torotoro ny reniny sy ny zanany.
  '15':
  - type: text
    content: Toy izany no hanjo anareo, ry Betela
  - type: text
    content: noho ny haben’ny faharatsianareo;
  - type: text
    content: raha maraina ny andro
  - type: text
    content: dia ho levona tanteraka ny mpanjakan’ny Israely.
  '2':
  - type: text
    content: Mamitaka ny fony,
  - type: text
    content: koa hovaliana izy izao noho ny helony.
  - type: text
    content: NY TOMPO no hanimba ny alitarany
  - type: text
    content: sy handrava ny tsangambaton-tsampiny.
  '3':
  - type: text
    content: 'Ankehitriny dia hoy izy hoe:'
  - type: text
    content: Tsy manana mpanjaka isika;
  - type: text
    content: fa tsy natahorantsika NY TOMPO,
  - type: text
    content: kanefa hahavita inona ho antsika moa izay mpanjaka?
  '4':
  - type: text
    content: Namoaka teny maro izy,
  - type: text
    content: nanao fianianana mandainga,
  - type: text
    content: nanao fifanekena;
  - type: text
    content: fa nitrebona toy ny zava-mangidy
  - type: text
    content: eny am-bava asa eny an-tsaha ny fitsarana azy.
  '5':
  - type: text
    content: Matahotra ny mponina any Samaria noho ny amin’ny ombivavy kely ao Bety-Avena;
  - type: text
    content: mitomany azy ny olony
  - type: text
    content: ary mangovitra noho ny aminy ny mpisorony,
  - type: text
    content: dia noho ny amin’ny voninahiny izay lasan-ko babo.
  '6':
  - type: text
    content: Hoentina any Asiria koa iny
  - type: text
    content: ho fanomezana ho an’i Jareba
  - type: note
    content: Zahao 5.13.
  - type: text
    content: ' mpanjaka.'
  - type: text
    content: Ho afa-baraka i Efraima;
  - type: text
    content: eny, hangaihay Israely noho ny zavatra nosaininy.
  '7':
  - type: text
    content: Ho rava i Samaria, ho tonga toy ny sombin-javatra eny ambonin’ny rano ny mpanjakany.
  '8':
  - type: text
    content: Ho rava koa ny toerana fanaovana sorona ao Avena izay anotan’ny Israely;
  - type: text
    content: ho rakotry ny tsilo sy songosongo ny alitarany.
  - type: text
    content: 'Hiteny amin’ny tendrombohitra izy hoe: Saròny izahay!'
  - type: text
    content: 'Ary amin’ny havoana hoe: Mianjerà aminay!'
  '9':
  - type: text
    content: Hatramin’ilay tany Gibea fahiny
  - type: text
    content: no efa nanotanao, ry Israely!
  - type: text
    content: Niziriziry tamin’izany izy;
  - type: text
    content: tsy nahatratra azy tany Gibea ny ady namelezana ny zanaky ny faharatsiana!
