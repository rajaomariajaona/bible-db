document_id: 2KI.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandrombaka ny fahefana ao Jerosalema i Atalia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 22.10-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony hitan’i Atalia, renin’i Ahazia, fa maty ny zanany, dia nitsangana izy ka nandringana ny taranaky ny mpanjaka rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa i Joseba, zanakavavin’i Jehorama mpanjaka, ary anabavin’i Ahazia, dia naka an’i Joasy, zanak’i Ahazia, ka nanala azy mbamin’ny mpitaiza azy avy teo amin’ireo zanaky ny mpanjaka izay novonoina, ary nitondra azy ho ao amin’ny efitrano toeram-pandriana. Nafenina an’i Atalia izy ka tsy mba voavono. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Niery nandritra ny enina taona niaraka taminy tao amin’ny tranon’NY TOMPO izy, fa i Atalia no nanjaka tamin’ny tany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voahosotra ho mpanjaka i Joasy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 23.1-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tamin’ny taona fahafito dia nandefa iraka haka ny mpifehy zato teo amin’ny Kariana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Kariana: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: mpikarama an’ady avy tany amin’ny faritra andrefana any Torkia.
    marker-yv: yv-n
  - type: text
    text: ' sy ny mpiambina i Joiada ka nampiditra azy tao amin’ny tranon’NY TOMPO. Nanao fanekena ho azy ireo izy dia nampianianiny tao amin’ny tranon’NY TOMPO ary nasehony azy ny zanakalahin’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary izy nandidy azy hoe: Izao no hataonareo: Ny ampahatelonareo izay milatsaka amin’ny Sabata dia hiambina ny tranon’ny mpanjaka; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ny ampahatelonareo dia ho eo am-bavahady Sora; ary ny ampahatelony sisa dia ho ao am-bavahady, ao aorianan’ny mpiambina; hifandimby hiambina ny trano ianareo ka hiaro azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny roa toko aminareo kosa, dia izay rehetra miala amin’ny andro Sabata, dia hiambina ny tranon’NY TOMPO hiarovana ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hanemitra manodidina ny mpanjaka amim-piadiana ianareo, koa na iza na iza mamaky laharana dia vonoy, ary ho eo akaikin’ny mpanjaka ianareo, na aiza na aiza alehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanatanteraka izay rehetra nandidian’i Joiada mpisorona ireo mpifehy zato ka samy nitondra ny olom-peheziny izay nilatsaka tamin’ny Sabata sy izay niala tamin’ny Sabata ary nankany amin’i Joiada mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny mpifehy zato dia nomen’ilay mpisorona ny lefona sy ampingan’i Davida mpanjaka izay tao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nitsangana ny mpiambina ka samy nitana ny fiadiany avy sady nanodidina ny mpanjaka hatreo amin’ny lafiny havana amin’ny Trano ka hatreo amin’ny lafiny havia, teo akaikin’ny alitara sy ny Trano. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia noentin’i Joiada nivoaka ny Trano ny zanakalahin’ny mpanjaka ka nosatrohany ny satroboninahitra ary notolorany ny Vavolombelona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deo 16.9-10.
    marker-yv: yv-n
  - type: text
    text: '. Nampanjakainy sy nohosorany izy, ary nitehaka ny olona ka niantso hoe: Ho ela velona anie ny mpanjaka!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony ren’i Atalia ny tabataban’ny mpiambina sy ny vahoaka dia mba nankao amin’ny vahoaka tao amin’ny tranon’NY TOMPO izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hitany fa indro nitsangana teo amin’ny lampihazo araka ny fomba fanao ny mpanjaka, ary ny andriandahy sy ny mpitsoka trompetra dia teo anilan’ny mpanjaka, ary ny vahoaka rehetra nifaly sady nampaneno trompetra; dia nandriatra ny fitafiany i Atalia ka niantso hoe: Fikomiana! Fikomiana! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa nandidy ny mpifehy zato, lehiben’ny miaramila i Joiada mpisorona ka niteny taminy hoe: Avoahy eny ivelan’ny laharana izy, ary izay manaraka azy dia vonoy amin’ny sabatra. Fa ny mpisorona dia efa nandrara hoe: Aza vonoina ao amin’ny tranon’NY TOMPO izy! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nisambotra azy ny olona dia nankany amin’ny fidirana amin’ny vavahadin-tsoavaly Ravehivavy ka niditra tao an-tranon’ny mpanjaka; dia novonoiny teo izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanitsiam-pivavahana nataon’i Joiada
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 23.16-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary i Joiada dia nampanao fanekena ny mpanjaka sy ny vahoaka tamin’NY TOMPO mba ho olon’NY TOMPO izy ireo, ary nampifanaiky koa ny mpanjaka sy ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny vahoaka rehetra dia niditra tao amin’ny tempolin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' ka nandrava azy; ny alitara sy ny sarin-javatra teo aminy dia notorotoroiny tanteraka ary novonoiny teo anoloan’ny alitara i Matana, mpisoron’ny Baala. Ary nanendry ny olona ho mpitandrina ny tranon’NY TOMPO ny mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nalainy ny mpifehy zato sy ny Kariana ary ny mpiambina mbamin’ny vahoaka rehetra dia noentina nidina avy tao amin’ny tranon’NY TOMPO ny mpanjaka, ary avy teo am-bavahadin’ny mpiambina no nalehany hankao an-tranon’ny mpanjaka. Ary nipetraka tamin’ny sezafiandrianan’ny mpanjaka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nifaly ny vahoaka rehetra ary nandry fehizay ny tanàna. Ary i Atalia moa dia novonoiny tamin’ny sabatra tao an-tranon’ny mpanjaka.
