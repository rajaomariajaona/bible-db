document_id: 2KI.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandrombaka ny fahefana ao Jerosalema i Atalia
  - type: heading
    content: 2Tan 22.10-12
  - type: text
    content: 'Nony hitan’i Atalia, renin’i Ahazia, fa maty ny zanany, dia nitsangana izy ka nandringana ny taranaky ny mpanjaka rehetra. '
  '10':
  - type: text
    content: 'Ary ny mpifehy zato dia nomen’ilay mpisorona ny lefona sy ampingan’i Davida mpanjaka izay tao amin’ny tranon’NY TOMPO. '
  '11':
  - type: text
    content: 'Ary nitsangana ny mpiambina ka samy nitana ny fiadiany avy sady nanodidina ny mpanjaka hatreo amin’ny lafiny havana amin’ny Trano ka hatreo amin’ny lafiny havia, teo akaikin’ny alitara sy ny Trano. '
  '12':
  - type: text
    content: Dia noentin’i Joiada nivoaka ny Trano ny zanakalahin’ny mpanjaka ka nosatrohany ny satroboninahitra ary notolorany ny Vavolombelona
  - type: note
    content: Zahao Deo 16.9-10.
  - type: text
    content: '. Nampanjakainy sy nohosorany izy, ary nitehaka ny olona ka niantso hoe: Ho ela velona anie ny mpanjaka!'
  '13':
  - type: text
    content: 'Nony ren’i Atalia ny tabataban’ny mpiambina sy ny vahoaka dia mba nankao amin’ny vahoaka tao amin’ny tranon’NY TOMPO izy. '
  '14':
  - type: text
    content: 'Ary hitany fa indro nitsangana teo amin’ny lampihazo araka ny fomba fanao ny mpanjaka, ary ny andriandahy sy ny mpitsoka trompetra dia teo anilan’ny mpanjaka, ary ny vahoaka rehetra nifaly sady nampaneno trompetra; dia nandriatra ny fitafiany i Atalia ka niantso hoe: Fikomiana! Fikomiana! '
  '15':
  - type: text
    content: 'Fa nandidy ny mpifehy zato, lehiben’ny miaramila i Joiada mpisorona ka niteny taminy hoe: Avoahy eny ivelan’ny laharana izy, ary izay manaraka azy dia vonoy amin’ny sabatra. Fa ny mpisorona dia efa nandrara hoe: Aza vonoina ao amin’ny tranon’NY TOMPO izy! '
  '16':
  - type: text
    content: Ary nisambotra azy ny olona dia nankany amin’ny fidirana amin’ny vavahadin-tsoavaly Ravehivavy ka niditra tao an-tranon’ny mpanjaka; dia novonoiny teo izy.
  - type: heading
    content: Ny fanitsiam-pivavahana nataon’i Joiada
  - type: heading
    content: 2Tan 23.16-21
  '17':
  - type: text
    content: 'Ary i Joiada dia nampanao fanekena ny mpanjaka sy ny vahoaka tamin’NY TOMPO mba ho olon’NY TOMPO izy ireo, ary nampifanaiky koa ny mpanjaka sy ny vahoaka. '
  '18':
  - type: text
    content: 'Ary ny vahoaka rehetra dia niditra tao amin’ny tempolin’ny '
  - type: text
    content: Baala
  - type: text
    content: ' ka nandrava azy; ny alitara sy ny sarin-javatra teo aminy dia notorotoroiny tanteraka ary novonoiny teo anoloan’ny alitara i Matana, mpisoron’ny Baala. Ary nanendry ny olona ho mpitandrina ny tranon’NY TOMPO ny mpisorona. '
  '19':
  - type: text
    content: 'Ary nalainy ny mpifehy zato sy ny Kariana ary ny mpiambina mbamin’ny vahoaka rehetra dia noentina nidina avy tao amin’ny tranon’NY TOMPO ny mpanjaka, ary avy teo am-bavahadin’ny mpiambina no nalehany hankao an-tranon’ny mpanjaka. Ary nipetraka tamin’ny sezafiandrianan’ny mpanjaka izy. '
  '2':
  - type: text
    content: 'Fa i Joseba, zanakavavin’i Jehorama mpanjaka, ary anabavin’i Ahazia, dia naka an’i Joasy, zanak’i Ahazia, ka nanala azy mbamin’ny mpitaiza azy avy teo amin’ireo zanaky ny mpanjaka izay novonoina, ary nitondra azy ho ao amin’ny efitrano toeram-pandriana. Nafenina an’i Atalia izy ka tsy mba voavono. '
  '20':
  - type: text
    content: Dia nifaly ny vahoaka rehetra ary nandry fehizay ny tanàna. Ary i Atalia moa dia novonoiny tamin’ny sabatra tao an-tranon’ny mpanjaka.
  '3':
  - type: text
    content: Niery nandritra ny enina taona niaraka taminy tao amin’ny tranon’NY TOMPO izy, fa i Atalia no nanjaka tamin’ny tany.
  - type: heading
    content: Voahosotra ho mpanjaka i Joasy
  - type: heading
    content: 2Tan 23.1-21
  '4':
  - type: text
    content: Tamin’ny taona fahafito dia nandefa iraka haka ny mpifehy zato teo amin’ny Kariana
  - type: note
    content: 'Kariana: mpikarama an’ady avy tany amin’ny faritra andrefana any Torkia.'
  - type: text
    content: ' sy ny mpiambina i Joiada ka nampiditra azy tao amin’ny tranon’NY TOMPO. Nanao fanekena ho azy ireo izy dia nampianianiny tao amin’ny tranon’NY TOMPO ary nasehony azy ny zanakalahin’ny mpanjaka. '
  '5':
  - type: text
    content: 'Ary izy nandidy azy hoe: Izao no hataonareo: Ny ampahatelonareo izay milatsaka amin’ny Sabata dia hiambina ny tranon’ny mpanjaka; '
  '6':
  - type: text
    content: 'ny ampahatelonareo dia ho eo am-bavahady Sora; ary ny ampahatelony sisa dia ho ao am-bavahady, ao aorianan’ny mpiambina; hifandimby hiambina ny trano ianareo ka hiaro azy. '
  '7':
  - type: text
    content: 'Ny roa toko aminareo kosa, dia izay rehetra miala amin’ny andro Sabata, dia hiambina ny tranon’NY TOMPO hiarovana ny mpanjaka. '
  '8':
  - type: text
    content: Hanemitra manodidina ny mpanjaka amim-piadiana ianareo, koa na iza na iza mamaky laharana dia vonoy, ary ho eo akaikin’ny mpanjaka ianareo, na aiza na aiza alehany.
  '9':
  - type: text
    content: 'Nanatanteraka izay rehetra nandidian’i Joiada mpisorona ireo mpifehy zato ka samy nitondra ny olom-peheziny izay nilatsaka tamin’ny Sabata sy izay niala tamin’ny Sabata ary nankany amin’i Joiada mpisorona. '
