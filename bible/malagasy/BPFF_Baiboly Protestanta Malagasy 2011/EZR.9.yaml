document_id: EZR.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanambady vehivavy hafa firenena ny Jiosy maro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa vita izany rehetra izany dia nanatona ahy ireo mpanapaka ka niteny hoe: Ny Israely sy ny mpisorona ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' dia tsy miavaka amin’ny olona tompon-tany fa mbola manao ny fahavetavetan’ny Kananita, ny Hetita, ny Perizita, ny Jebosita, ny Amonita, ny Moabita, ny Ejiptiana ary ny Amorita ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Satria efa naka vady ho azy sy ho an’ny zanany lahy tamin’ny zanakavavin’ireo izy ka zary miharoharo amin’ny olona tompon-tany ny taranaka masina; eny, ny lehibe sy ny mpanapaka azy no nitari-dalana tamin’izany fahadisoana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nony nandre izany zavatra izany aho dia nandriatra ny lambako sy ny akanjoko sady nanongotra ny voloko sy ny volombavako, dia nipetraka tahaka ny torana aho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nivory teo amiko izay rehetra nangovitra noho ny tenin’Andriamanitry ny Israely ny amin’ny hadisoan’ny olona izay efa niverina avy tamin’ny fahababoana; ary mbola nipetraka tahaka ilay torana iny ihany aho hatramin’ny fotoanan’ny fanatitra hariva.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Ezra ho an’ireo nanao hadisoana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony tamin’ny fotoanan’ny fanatitra hariva dia nody ny aiko ka nitsangana aho sady nandriatra ny lambako sy ny akanjoko indray, avy eo dia nandohalika nanandratra ny tanako ho amin’NY TOMPO Andriamanitro aho '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka niteny hoe: Andriamanitro ô, menatra sy mangaihay aho raha miandrandra aminao, ry Andriamanitro ô; fa efa nihamaro mihoatra ny lohanay ny helokay ary ny fahotanay dia lehibe manakatra ny lanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa hatramin’ny andron’ny razanay ka mandraka androany dia lehibe ny helokay; ny helokay no nanolorana anay sy ny mpanjakanay ary ny mpisorona ho eo an-tanan’ny mpanjakan’ny tany hafa, ho fatin-tsabatra sy ho babo ary ho voaroba sy hangaihay tahaka ny amin’izao anio izao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa ankehitriny vao mba niseho vetivety ny fahasoavana avy tamin’NY TOMPO Andriamanitray tamin’ny namelany anay ho nisy sisa niangana tamin’ny nanomezany anay toerana eo amin’ny fitoerany masina, mba hohazavain’Andriamanitray ny masonay ka homena famelombelomana kely amin’ny fahandevozanay izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa andevo izahay, nefa tsy nafoin’Andriamanitray, na dia tamin’ny fahandevozanay aza, fa nataony nahazo famindrampo eto imason’ireo mpanjakan’i Persia ihany mba hanomezany anay famelombelomana, hanangananay ny tranon’Andriamanitray sy hanamboaranay ny rava eo ary hanomezany anay manda any Joda sy Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa ankehitriny, ry Andriamanitray ô, inona no holazainay amin’izany? Fa efa nahafoy ny didinao izahay, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia ilay nampilazainao ny mpaminany mpanomponao hoe: Ny tany izay hidiranareo holovana dia tany maloto noho ny fahalotoan’ny tompon-tany sy ny fahavetavetany izay efa nataony manenika azy noho ny fahalotoany; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'koa aza manome ny zanakareo vavy ho vadin’ny zanany lahy, na maka ny zanany vavy ho vadin’ny zanakareo lahy; aza mitady izay hiadanany na izay hahasoa azy mandrakizay; izay no hampahery anareo ka hihinanareo ny soa avy amin’ny tany ka hamelanareo izany ho lovan’ny taranakareo mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Na dia efa nanjo anay aza izany rehetra izany noho ny asa ratsinay sy ny fahadisoanay betsaka dia tsy nampijaly anay araka ny helokay Ianao Andriamanitray fa namela anay ho nisy sisa afaka toy izao ihany, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa raha handika ny didinao indray izahay ka hifanambady amin’ireny olom-betaveta ireny, moa tsy ho tezitra aminay mandra-pahalany ritra anay va Ianao ka tsy hisy sisa ho afaka akory? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: RY TOMPO Andriamanitry ny Israely ô, marina Ianao, matoa izahay no hany sisa niangana tahaka ny amin’izao anio izao. Indreto izahay eto anatrehanao miaraka amin’ny fahadisoanay, kanefa noho izany ihany dia tsy mahajanona eto anatrehanao izahay.
