document_id: PRO.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahendrena, harena miafina
  - type: text
    content: Anaka, raha raisinao ny teniko,
  - type: text
    content: ary raketinao ao am-ponao ny didiko
  '10':
  - type: text
    content: Raha tafiditra ao am-ponao ny fahendrena,
  - type: text
    content: ary mamin’ny fanahinao ny fahalalana
  '11':
  - type: text
    content: dia hiaro anao ny fahaiza-mandinika,
  - type: text
    content: ary hiambina anao ny fahalalana
  '12':
  - type: text
    content: ka hamonjy anao amin’ny lalan-dratsy
  - type: text
    content: sy amin’ny lehilahy miteny fitaka,
  '13':
  - type: text
    content: amin’izay mahafoy ny lalana mahitsy
  - type: text
    content: ka mizotra ho amin’ny lalan’ny fahamaizinana,
  '14':
  - type: text
    content: dia izay faly hanao ratsy
  - type: text
    content: sady mibitaka amin’ny fanaovam-pitaka,
  '15':
  - type: text
    content: dia izay miolikolika lalana
  - type: text
    content: sy maniasia amin’ny alehany;
  '16':
  - type: text
    content: hanafaka anao amin’ny vehivavy jejo koa izany,
  - type: text
    content: dia amin’ny vehivavy janga izay mandokadoka amin’ny teniny,
  '17':
  - type: text
    content: izay mahafoy ny sakaizan’ny fahatanorany
  - type: text
    content: sy manadino ny fanekena nataony tamin’Andriamaniny;
  '18':
  - type: text
    content: fa mirona ho amin’ny fahafatesana ny tranony,
  - type: text
    content: ary mankany amin’ny maty ny lalany.
  '19':
  - type: text
    content: Tsy misy tafaverina izay mankany aminy
  - type: text
    content: sady tsy afaka mihazo ny lalan’ny fahavelomana.
  '2':
  - type: text
    content: ka atongilanao ho amin’ny fahendrena ny sofinao,
  - type: text
    content: ary atodikao ho amin’ny fahalalana ny fonao;
  '20':
  - type: text
    content: Izany no handehananao amin’ny lalan’ny tsara fanahy
  - type: text
    content: sy hitandremanao ny alehan’ny marina.
  '21':
  - type: text
    content: Fa ny olona mahitsy no honina amin’ny tany,
  - type: text
    content: ary ny tsy manan-tsiny ihany no ho sisa mitoetra ao.
  '22':
  - type: text
    content: Fa hofongorana amin’ny tany kosa ny ratsy fanahy,
  - type: text
    content: ary ny mpivadika dia hongotana.
  '3':
  - type: text
    content: eny, raha miantso ny fahalalana ianao,
  - type: text
    content: ary manandratra ny feonao mba hahazo fahaiza-mandinika,
  '4':
  - type: text
    content: raha mitady azy toy ny fitady volafotsy ianao,
  - type: text
    content: ary mikatsaka azy toy ny fikatsaka harena miafina,
  '5':
  - type: text
    content: dia ho fantatrao marina ny fahatahorana NY TOMPO,
  - type: text
    content: ary ho hitanao ny fahalalana an’Andriamanitra.
  '6':
  - type: text
    content: Fa NY TOMPO no manome fahendrena;
  - type: text
    content: avy amin’ny teniny no iavian’ny fahalalana sy ny fahiratan-tsaina.
  '7':
  - type: text
    content: Mitahiry fanambinana ho an’ny mahitsy fo Izy,
  - type: text
    content: ary ampinga ho an’izay mandeha tsy misy tsiny;
  '8':
  - type: text
    content: mitandrina ny lalan’ny fahamarinana Izy,
  - type: text
    content: ary miaro ny lalan’ny olony masina.
  '9':
  - type: text
    content: Amin’izay dia ho fantatrao ny fahamarinana sy ny rariny
  - type: text
    content: ary ny hitsiny, dia ny lalana tsara rehetra.
  - type: heading
    content: Miaro amin’ny ratsy ny fahendrena
