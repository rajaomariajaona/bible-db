document_id: PRO.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahendrena, harena miafina
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Anaka, raha raisinao ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raketinao ao am-ponao ny didiko
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ka atongilanao ho amin’ny fahendrena ny sofinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary atodikao ho amin’ny fahalalana ny fonao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: eny, raha miantso ny fahalalana ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manandratra ny feonao mba hahazo fahaiza-mandinika,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: raha mitady azy toy ny fitady volafotsy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mikatsaka azy toy ny fikatsaka harena miafina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dia ho fantatrao marina ny fahatahorana NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho hitanao ny fahalalana an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa NY TOMPO no manome fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny teniny no iavian’ny fahalalana sy ny fahiratan-tsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitahiry fanambinana ho an’ny mahitsy fo Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampinga ho an’izay mandeha tsy misy tsiny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: mitandrina ny lalan’ny fahamarinana Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miaro ny lalan’ny olony masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amin’izay dia ho fantatrao ny fahamarinana sy ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hitsiny, dia ny lalana tsara rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miaro amin’ny ratsy ny fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha tafiditra ao am-ponao ny fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamin’ny fanahinao ny fahalalana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: dia hiaro anao ny fahaiza-mandinika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiambina anao ny fahalalana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ka hamonjy anao amin’ny lalan-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny lehilahy miteny fitaka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: amin’izay mahafoy ny lalana mahitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mizotra ho amin’ny lalan’ny fahamaizinana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia izay faly hanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mibitaka amin’ny fanaovam-pitaka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia izay miolikolika lalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy maniasia amin’ny alehany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: hanafaka anao amin’ny vehivavy jejo koa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny vehivavy janga izay mandokadoka amin’ny teniny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: izay mahafoy ny sakaizan’ny fahatanorany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manadino ny fanekena nataony tamin’Andriamaniny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: fa mirona ho amin’ny fahafatesana ny tranony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mankany amin’ny maty ny lalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy misy tafaverina izay mankany aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy afaka mihazo ny lalan’ny fahavelomana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izany no handehananao amin’ny lalan’ny tsara fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hitandremanao ny alehan’ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa ny olona mahitsy no honina amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tsy manan-tsiny ihany no ho sisa mitoetra ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa hofongorana amin’ny tany kosa ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpivadika dia hongotana.
