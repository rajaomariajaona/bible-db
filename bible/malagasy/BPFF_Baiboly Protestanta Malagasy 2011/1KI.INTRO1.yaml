segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ny Boky dia tohin’ny 1, 2Samoela ary anatin’ireo atao hoe ny Mpaminany taloha. Manomboka amin’ny tantaran’ny fahanteran’i Davida sy ny nandraisan’i Solomona ny fanjakana izany. Ny zava-dehibe nataon’i Solomona dia ny nanangana ny tempoly sy ny lapan’ny mpanjaka. Nampalahelo anefa fa nivily niala tamin’Andriamanitra ny fony ka navelan’Andriamanitra hivaky roa ny fanjakany: Ireo foko tany Avaratra dia tsy nety hofehezin’ny taranak’i Davida fa nanangana mpanjaka ho azy, koa noho izany dia nanjary roa samihafa ny fanjakana, dia ny Avaratra na Israely, ary ny Atsimo na Joda. Naharitra roanjato taona ny fisian’izany fanjakana roa izany, koa indraindray izy ireo dia nihavana, indraindray nifandrafy.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Nisy mpaminany maro nananatra ireo mpanjaka, ary isan’izany i Elia.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny nifaranan’ny fiainan’i Davida sy ny nandraisan’i Solomona ny fanjakana: 1–2.12'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fanjakan’i Solomona: Ny nampiorenany azy, ny voninahiny ary ny fahotan’i Solomona: 2.13–11.43'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fivakisan’ny fanjakana ho roa: 12.1–14.20'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny tantaran’ny fanjakana roa: 14.21–22.54'
