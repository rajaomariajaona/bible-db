verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: 'Ny Boky dia tohin’ny 1, 2Samoela ary anatin’ireo atao hoe ny Mpaminany taloha. Manomboka amin’ny tantaran’ny fahanteran’i Davida sy ny nandraisan’i Solomona ny fanjakana izany. Ny zava-dehibe nataon’i Solomona dia ny nanangana ny tempoly sy ny lapan’ny mpanjaka. Nampalahelo anefa fa nivily niala tamin’Andriamanitra ny fony ka navelan’Andriamanitra hivaky roa ny fanjakany: Ireo foko tany Avaratra dia tsy nety hofehezin’ny taranak’i Davida fa nanangana mpanjaka ho azy, koa noho izany dia nanjary roa samihafa ny fanjakana, dia ny Avaratra na Israely, ary ny Atsimo na Joda. Naharitra roanjato taona ny fisian’izany fanjakana roa izany, koa indraindray izy ireo dia nihavana, indraindray nifandrafy.'
  - type: text
    content: Nisy mpaminany maro nananatra ireo mpanjaka, ary isan’izany i Elia.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Ny nifaranan’ny fiainan’i Davida sy ny nandraisan’i Solomona ny fanjakana: 1–2.12'
  - type: text
    content: 'Ny fanjakan’i Solomona: Ny nampiorenany azy, ny voninahiny ary ny fahotan’i Solomona: 2.13–11.43'
  - type: text
    content: 'Ny fivakisan’ny fanjakana ho roa: 12.1–14.20'
  - type: text
    content: 'Ny tantaran’ny fanjakana roa: 14.21–22.54'
