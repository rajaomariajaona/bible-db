document_id: ROM.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manao izay hahafaly ny hafa fa tsy ny tena
  - type: text
    content: 'Isika izay matanjaka dia tokony hitondra ny fahalemen’ny malemy ka tsy hitady izay hahafaly ny tenantsika ihany. '
  '10':
  - type: text
    content: 'Hoy koa Izy:'
  - type: text
    content: «Miravoravoa, ry Jentilisa mbamin’ny olony!» (Deo 32.43)
  '11':
  - type: text
    content: 'Ary koa:'
  - type: text
    content: «Miderà NY TOMPO, ry Jentilisa rehetra
  - type: text
    content: ary aoka hankalaza Azy ny firenena rehetra!» (Sal 117.1)
  '12':
  - type: text
    content: 'Hoy koa Isaia:'
  - type: text
    content: «Ho avy ny Solofon’i Jese,
  - type: text
    content: dia Ilay hitsangana hanapaka ny Jentilisa;
  - type: text
    content: Izy no hantenain’ny Jentilisa» (Isa 11.10).
  '13':
  - type: text
    content: Ary Andriamanitry ny fanantenana anie hameno anareo amin’ny fifaliana sy ny fiadanana rehetra amin’ny finoanareo, mba hitomboanareo amin’ny fanantenana noho ny herin’ny Fanahy Masina!
  - type: heading
    content: Ny fanompoan’i Paoly eo amin’ny tsy Jiosy
  '14':
  - type: text
    content: 'Koa ny aminareo, ry rahalahiko, dia matoky aho fa feno hatsaram-panahy ianareo, feno ny fahalalana rehetra sady mahay mifananatra koa. '
  '15':
  - type: text
    content: 'Kanefa amin’ny fahasahiana no anoratako ny teny sasany aminareo, toy ny mampahatsiaro anareo indray noho ny fahasoavana nomen’Andriamanitra ahy, '
  '16':
  - type: text
    content: 'mba ho mpanompon’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy ho an’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' aho ka manao fanompoam-pivavahana ho an’ny Filazantsaran’Andriamanitra, mba horaisina amin’ny fankasitrahana ny Jentilisa, ho fanatitra nohamasinin’ny Fanahy Masina. '
  '17':
  - type: text
    content: 'Koa manana izay reharehako ao amin’i Kristy Jesosy aho noho ny amin’Andriamanitra. '
  '18':
  - type: text
    content: 'Fa tsy sahiko lazaina izay zavatra tsy nataon’i Kristy tamin’ny alalako, na tamin’ny teny, na tamin’ny asa, mba hampanaiky ny Jentilisa, '
  '19':
  - type: text
    content: 'noho ny herin’ny famantarana sy ny fahagagana, ary tamin’ny herin’ny Fanahin’Andriamanitra. Noho izany dia hatrany Jerosalema ka manodidina hatrany Ilirikiona no nahatanterahako ny fitoriako ny Filazantsaran’i Kristy. '
  '2':
  - type: text
    content: 'Aoka isika rehetra samy hitady izay hahafaly ny namantsika amin’izay hahasoa sy hampandroso azy. '
  '20':
  - type: text
    content: 'Koa nataoko ho voninahitro ny hitory ny Filazantsara, tsy eo amin’izay efa niantsoana an’i Kristy anefa, fandrao hanovona eo ambonin’izay efa naorin’ny sasany aho, '
  '21':
  - type: text
    content: 'fa araka ny voasoratra hoe:'
  - type: text
    content: «Izay tsy nilazana Azy no hahita,
  - type: text
    content: ary izay tsy nandre no hahafantatra» (Isa 52.15).
  - type: heading
    content: Ny fikasan’i Paoly
  '22':
  - type: text
    content: 'Izay no nanakana ahy matetika tsy hankany aminareo. '
  '23':
  - type: text
    content: 'Ankehitriny kosa dia tsy misy antony hitoerako etỳ amin’ity faritra ity intsony, sady efa naniry hankany aminareo hatramin’ny taona maro aho '
  '24':
  - type: text
    content: rehefa mankany Espaina; koa manantena hahita anareo aho amin’ny fandalovako ka ho vatsinareo ny diako mankany rehefa avy nifaly vetivety tamin’ny fiarahana taminareo.
  '25':
  - type: text
    content: 'Fa ankehitriny dia efa hiainga hankany Jerosalema aho mba hanompo ny olona masina. '
  '26':
  - type: text
    content: 'Fa sitrapon’i Makedonia sy i Akaia ny hamory vola ho fifanohanana amin’ny mahantra amin’ny olona masina any Jerosalema. '
  '27':
  - type: text
    content: 'Eny, sitrapony izany sady tokony hataony aminy, fa raha ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' no niombona ny zava-panahy taminy dia tokony hanompo azy kosa amin’ny zavatra momba ny nofo izy. '
  '28':
  - type: text
    content: 'Rehefa vitako izay ka voatolotro azy soa amantsara izany vokatra izany dia ho any Espaina aho ka handalo any aminareo. '
  '29':
  - type: text
    content: Ary fantatro fa raha mankany aminareo aho dia handeha amin’ny fahafenoan’ny fitahian’i Kristy.
  '3':
  - type: text
    content: 'Fa '
  - type: text
    content: Kristy
  - type: text
    content: ' aza tsy nitady izay hahafaly ny tenany, fa araka ny voasoratra hoe: «Ny latsa nataon’izay nandatsa Anao dia nihatra tamiko» (Sal 69.9). '
  '30':
  - type: text
    content: 'Nefa mangataka aminareo aho, ry rahalahy, noho ny amin’i Jesosy Kristy Tompontsika sy ny fitiavana avy amin’ny Fanahy, mba hiarahanareo miezaka amiko amin’ny fivavahanareo amin’Andriamanitra ho ahy, '
  '31':
  - type: text
    content: 'mba ho voavonjy amin’ny tsy mino any '
  - type: text
    content: Jodia
  - type: text
    content: ' aho ary mba hankasitrahan’ny olona masina izay fanompoana hataoko any Jerosalema; '
  '32':
  - type: text
    content: rehefa vita izany dia hankany aminareo amin’ny fifaliana aho, raha sitrapon’Andriamanitra ka hiala sasatra kely any aminareo.
  '33':
  - type: text
    content: 'Andriamanitry ny fiadanana anie ho aminareo rehetra! '
  - type: text
    content: Amena
  - type: text
    content: '!'
  '4':
  - type: text
    content: 'Izay rehetra voasoratra fahiny dia nosoratana ho fianarantsika mba hananantsika ny fanantenana noho ny faharetana sy ny fiononana avy amin’ny Soratra Masina. '
  '5':
  - type: text
    content: 'Fa Andriamanitry ny faharetana sy ny fiononana anie hampiray hevitra anareo araka an’i Kristy Jesosy, '
  '6':
  - type: text
    content: mba ho saina iray sy vava iray no hiarahanareo mankalaza an’Andriamanitra Rain’i Jesosy Kristy Tompontsika!
  - type: heading
    content: Kristy, Mpanompon’ny olona rehetra
  '7':
  - type: text
    content: 'Koa mifandraisa ianareo tahaka ny nandraisan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' anareo koa ho voninahitr’Andriamanitra. '
  '8':
  - type: text
    content: 'Fa lazaiko fa tonga mpanompon’ny voafora Kristy noho ny fahamarinan’Andriamanitra, hahatò ny teny fikasana tamin’ny razana '
  '9':
  - type: text
    content: 'mba hankalazan’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' an’Andriamanitra koa noho ny famindrampo, araka ny voasoratra hoe:'
  - type: text
    content: «Izany no hiderako Anao any amin’ny Jentilisa
  - type: text
    content: sy hihirako ny anaranao» (Sal 18.49).
