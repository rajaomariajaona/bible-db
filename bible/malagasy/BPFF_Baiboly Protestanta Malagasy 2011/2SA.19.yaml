document_id: 2SA.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitomany ny zanany i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niontana terỳ ny fon’ny mpanjaka ka niakatra nankao amin’ny efitrano teo ambony vavahady izy sady nitomany teny am-pandehanana no niteny hoe: Ry Absaloma, zanako, ry zanako! Ry Absaloma, zanako ô! Inay anie aho no maty nisolo anao. Ry Absaloma zanako, ry zanako ô!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nambara tamin’i Joaba hoe: Indro, mitomany sy misaona an’i Absaloma ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny fandresena tamin’iny andro iny dia tonga fisaonana ho an’ny vahoaka rehetra, satria ren’ny vahoaka tamin’io andro io ny filazana hoe: Malahelo ny zanany ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niakatra an-tsokosoko tao an-tanàna ny olona tamin’io andro io, toy ny fisokosokon’ny olona menatra raha mandositra amin’ny ady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa nanarona ny tavany ny mpanjaka sady nidradradradra tamin’ny feo mafy hoe: Ry Absaloma, zanako! Ry Absaloma, zanako, ry zanako ô! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary niditra tao amin’ny mpanjaka tao an-trano i Joaba ka niteny hoe: Efa nomenarinao androany ny mpanomponao rehetra izay namonjy ny ainao sy ny ain’ny zanakao lahy sy ny zanakao vavy ary ny ain’ny vadinao sy ny vady tsindranonao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa ny mankahala anao no tianao, ary ny tia anao kosa no halanao ka nasehonao androany fa tsinontsinona aminao ny manamboninahitra sy ny miaramila; ary hitako izao fa raha velona i Absaloma ka izahay rehetra no maty androany dia izany no sitrakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa mitsangàna ankehitriny ka mivoaha ny trano ary manaova teny fampaherezana amin’ny mpanomponao; fa mianiana amin’NY TOMPO aho fa raha tsy mivoaka ianao dia tsy hisy na dia iray akory aza hitoetra eto aminao anio alina; koa izany no ho mafy lavitra aminao noho ny fahoriana rehetra izay nanjo anao hatry ny fony ianao vao zaza ka ambaraka ankehitriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nivoaka ny trano ny mpanjaka ka nijanona teo am-bavahady; ary nolazaina tamin’ny vahoaka rehetra hoe: Indro, mijanona eo am-bavahady ny mpanjaka. Ary nankeo anatrehan’ny mpanjaka ny vahoaka rehetra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nasaina nody any Jerosalema i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Samy efa lasa nandositra ho any amin’ny tranolainy avy ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia mifanditra ny vahoaka rehetra tamin’ny fokon’ny Israely hoe: Ny mpanjaka no namonjy antsika tamin’ny tanan’ny fahavalontsika, indrindra fa tamin’ny tanan’ny Filistina; nefa nandositra niala tamin’ny tany izy ankehitriny noho ny amin’i Absaloma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Efa maty tamin’ny ady i Absaloma, izay nohosorantsika hanjaka amintsika. Koa nahoana ianareo no tsy miteny akory ny amin’ny hampodiana ny mpanjaka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nandefa iraka tany amin’i Zadoka sy i Abiatara mpisorona i Davida mpanjaka hiteny hoe: Lazao amin’ny loholon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' hoe: Nahoana no dia ianareo indray no ho farany amin’ny fampodiana ny mpanjaka ho any an-tranony? Satria ny tenin’ny Israely rehetra dia efa tonga tao amin’ny mpanjaka tao an-tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rahalahiko ianareo sady taolako sy nofoko; koa nahoana no dia ianareo indray no ho farany amin’ny fampodiana ny mpanjaka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lazao amin’i Amasa koa hoe: Tsy taolako sy nofoko va ianao? Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy ho komandin’ny miaramila eo anatrehako mandrakariva ho solon’i Joaba ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nampitodika ny fon’ny lehilahy rehetra amin’ny Joda ho toy ny olona iray izy, koa nandefa iraka tany amin’ny mpanjaka hiteny hoe: Modia ianao sy ny mpanomponao rehetra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamindra fo amin’i Simey i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nody ny mpanjaka ka tonga tao Jordana; ary tonga tao Gilgala ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' mba hitsena ny mpanjaka ka hitondra azy hita an’i Jordana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nidodododo nidina niaraka tamin’ny lehilahin’ny Joda i Simey, zanak’i Gera, Benjaminita avy any Bahorima, mba hitsena an’i Davida mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nisy Benjaminita arivo lahy koa nanaraka azy. Teo koa i Ziba, mpanompon’ny taranak’i Saoly, mbamin’ny zanany lahy dimy amby folo sy ny mpanompony roapolo lahy izay nanaraka azy. Nita an’i Jordana teo alohan’ny mpanjaka izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia navoivoy teo ny lakana mba hampitana ny ankohonan’ny mpanjaka sy hanaovany izay sitrany. Nony efa hita an’i Jordana ny mpanjaka dia indro i Simey, zanak’i Gera, niankohoka teo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy izy tamin’ny mpanjaka: Aoka tsy hisain’ny tompoko heloka aho, ary aoka tsy hotsarovanao ny ratsy nataon’ny mpanomponao tamin’ny andro nivoahan’ny mpanjaka tompoko niala tany Jerosalema, ary aoka tsy hoeritreretin’ny mpanjaka izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'fa fantatro, izaho mpanomponao, fa nanota aho; ka e! Izaho no avy voalohany androany amin’ny taranak’i Josefa rehetra ka nidina hitsena ny mpanjaka tompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy anefa i Abisay, zanak’i Zeroia: Tsy hovonoina noho izany va i Simey, satria efa nanozona ny voahosotry NY TOMPO? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy i Davida: Moa mifaninona akory izaho sy ianareo, ry zanak’i Zeroia, no tonga mpanohitra ahy ianareo anio? Tokony hisy olona hovonoina va eto amin’ny Israely anio? Moa tsy fantatro va fa izaho no mpanjakan’ny Israely anio? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy ny mpanjaka tamin’i Simey: Tsy ho faty ianao. Ary nianiana taminy ny mpanjaka.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamitram-pihavanana amin’i Mefiboseta i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nidina hitsena ny mpanjaka i Mefiboseta, zanakalahin’i Saoly; tsy nanasa tongotra izy na nanamboatra volombava na nanasa lamba hatramin’ny andro nialan’ny mpanjaka ka hatramin’ny andro nahatongavany soa amantsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nony efa tonga hitsena ny mpanjaka ny avy any Jerosalema dia hoy ny mpanjaka taminy: Nahoana no tsy mba nandeha niaraka tamiko ianao, ry Mefiboseta? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy izy: Ry mpanjaka tompoko, nofitahin’ny mpanompoko aho: Hanisy lasely ny boriky aho hitaingenako ka hankany amin’ny mpanjaka, fa malemy tongotra moa ny mpanomponao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'nefa nendrikendrehiny tamin’ny mpanjaka tompoko izaho mpanomponao. Fa ny mpanjaka tompoko dia toy ilay irak’Andriamanitra; koa ataovy izay sitrakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa ny taranaky ny raiko rehetra dia samy olona tokony ho faty teo anatrehan’ny mpanjaka tompoko; nefa ianao dia nampitoetra ahy mpanomponao ho isan’izay mihinana amin’ny latabatrao. Koa inona intsony no rariny ho ahy, ary inona no mbola hitarainako amin’ny mpanjaka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Nahoana no lazainao indray ny raharahanao? Nefa efa nilaza aho hoe: Ianao sy i Ziba no hizara ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hoy i Mefiboseta tamin’ny mpanjaka: Aoka ho azy avokoa izy rehetra, fa ianao mpanjaka tompoko dia efa tonga soa amantsara ao amin’ny tranonao indray.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamaly soa an’i Barizilay i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nidina avy tany Rogelima i Barizilay gileadita; dia niara-nita an’i Jordana tamin’ny mpanjaka izy mba hanatitra azy hita an’i Jordana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'I Barizilay dia lehilahy antitra, efa valopolo taona; nanome hanina ny mpanjaka izy raha nitoetra tany Mahanaima ny mpanjaka; fa mpanankarem-be tokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy ny mpanjaka tamin’i Barizilay: Andeha hiara-mita amiko ianao ka hovelomiko any amiko any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hoy anefa i Barizilay tamin’ny mpanjaka: Firy taona moa sisa no hahavelomako, no hiara-miakatra amin’ny mpanjaka hankany Jerosalema aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Valopolo taona izay ny andro nahavelomako ka mahalala izay soa sy ratsy intsony va aho? Mahatsiaro ny tsiron-javatra haniko sy sotroiko intsony va aho mpanomponao? Mahare izay feon’ny mpihira lahy sy ny mpihira vavy intsony va aho? Koa nahoana ny mpanomponao no mbola ho enta-mavesatra amin’ny mpanjaka tompoko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Kely foana no handehanan’ny mpanomponao eo andafin’i Jordana hiaraka amin’ny mpanjaka; koa nahoana ny mpanjaka no dia hamaly fitia ahy toy izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Trara antitra ianao, aoka aho mpanomponao hody ihany ka ho faty any amin’ny vohitro ao akaikin’ny fasan’Ikaky sy Ineny. Fa indro i Kimama mpanomponao; aoka izy no hiaraka amin’ny mpanjaka tompoko, ary ataovy aminy izay sitrakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hoy ny mpanjaka: Handeha hiaraka amiko tokoa i Kimama ka hataoko aminy izay sitrakao, ary izay angatahinao dia hataoko ho anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary nita an’i Jordana ny vahoaka rehetra. Nony tafita ny mpanjaka dia norohany i Barizilay sady notsofiny rano. Dia lasa nody ho any amin’ny fonenany i Barizilay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Dia nandroso nankany Gilgala ny mpanjaka ary niaraka taminy i Kimama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifandiran’ny Joda sy ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nanatitra ny mpanjaka koa ny vahoaka rehetra tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' sy ny antsasaky ny vahoakan’ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary indreo, ny lehilahin’ny Israely rehetra dia nankao amin’ny mpanjaka ka niteny taminy hoe: Nahoana ny lehilahin’ny Joda, rahalahinay, no nangalatra anao ka nitondra ny mpanjaka sy ny ankohonany ary ny olon’i Davida rehetra teny aminy hita an’i Jordana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia namaly ny lehilahin’ny Israely ny lehilahin’ny Joda rehetra hoe: Satria havanay akaiky ny mpanjaka; koa ahoana no mahatezitra anareo amin’izany? Nandany ny harenan’ny mpanjaka va izahay sa nanome zavatra anay akory va izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Namaly ny lehilahin’ny Joda kosa ny lehilahin’ny Israely hoe: Izahay dia manana anjaram-polo amin’ny mpanjaka; eny, izahay dia manana an’i Davida mihoatra noho ianareo; koa nahoana ianareo no nanao tsinontsinona anay? Tsy izahay va no niteny talohanareo fa hampody ny mpanjakanay? Ary ny tenin’ny lehilahin’ny Joda dia mahery kokoa noho ny tenin’ny lehilahin’ny Israely.'
