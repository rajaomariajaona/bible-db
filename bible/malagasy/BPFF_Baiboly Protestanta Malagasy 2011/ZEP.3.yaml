document_id: ZEP.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy nihaino ny antson’Andriamanitra i Jerosalema
  - type: text
    content: Lozan’ny tanàna mikomy sady voaloto,
  - type: text
    content: dia ilay mampahory!
  '10':
  - type: text
    content: Avy any andafin’ny onin’i Etiopia
  - type: text
    content: no hitondran’ny mpivavaka Amiko,
  - type: text
    content: dia ny zanakavavin’ireo izay naeliko,
  - type: text
    content: ny fanatitra ho Ahy.
  - type: heading
    content: Ny sisa amin’ny Israely
  '11':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: dia tsy hitsanga-menatra ianao ny amin’izay nataonao rehetra,
  - type: text
    content: izay nanotanao Tamiko;
  - type: text
    content: fa hesoriko aminao
  - type: text
    content: ireo mibitaka amim-pireharehana
  - type: text
    content: ary tsy hiavonavona ao amin’ny tendrombohitro masina intsony ianao.
  '12':
  - type: text
    content: Nefa hamelako olona mahantra sy madinika ihany ao aminao
  - type: text
    content: ary ny anaran’NY TOMPO no hialofany.
  '13':
  - type: text
    content: Tsy hanao heloka na handainga intsony
  - type: text
    content: ny sisa amin’ny Israely.
  - type: text
    content: Tsy hisy lela mamitaka eo am-bavany
  - type: text
    content: fa ho afaka mihinana sy mandry izy
  - type: text
    content: ka tsy hisy hanaitaitra azy.
  - type: heading
    content: Ny fanarenana indray an’i Jerosalema
  '14':
  - type: text
    content: 'Mihobia, ry '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy!'
  - type: text
    content: Manaova feo fifaliana, ry Israely!
  - type: text
    content: Mifalia sy miravoravoa amin’ny fonao manontolo, ry Jerosalema zanakavavy!
  '15':
  - type: text
    content: NY TOMPO efa nampitsahatra ny fitsarana anao
  - type: text
    content: ka nandroaka ny fahavalonao.
  - type: text
    content: NY TOMPO, Mpanjakan’ny Israely, no ao aminao;
  - type: text
    content: tsy hahita loza intsony ianao.
  '16':
  - type: text
    content: 'Amin’izany andro izany dia holazaina amin’i Jerosalema hoe:'
  - type: text
    content: Aza matahotra ry Ziona;
  - type: text
    content: eny, aza miraviravy tanana!
  '17':
  - type: text
    content: NY TOMPO Andriamanitrao no ao aminao, mpiady mahery Izy sady mpamonjy;
  - type: text
    content: hifaly sy hiravoravo noho ny aminao Izy;
  - type: text
    content: hangina amin’ny fitiavany Izy;
  - type: text
    content: hifaly amin’ny fihobiana noho ny aminao Izy.
  '18':
  - type: text
    content: Hangoniko izay manina ny andro firavoravoana,
  - type: text
    content: dia ireo izay lavitra anao
  - type: text
    content: ka itambesaran’ny latsa.
  '19':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: dia hasiako izay rehetra nampahory anao;
  - type: text
    content: hovonjeko ny mandringa
  - type: text
    content: ary hovoriko ny noroahina.
  - type: text
    content: Hataoko ho fiderana sy ho voninahitra ireny,
  - type: text
    content: any amin’ny tany rehetra izay efa nitondrany henatra.
  '2':
  - type: text
    content: Tsy nihaino ny feo izy
  - type: text
    content: na nino anatra;
  - type: text
    content: tsy nitokiany NY TOMPO,
  - type: text
    content: tsy nanatona an’Andriamaniny izy.
  '20':
  - type: text
    content: Amin’izany andro izany no hitondrako anareo miverina;
  - type: text
    content: eny, amin’izany andro izany no hanangonako anareo.
  - type: text
    content: Fa hataoko ho voninahitra sy ho laza
  - type: text
    content: any amin’ny firenena rehetra ambonin’ny tany ianareo,
  - type: text
    content: rehefa hampodiko avy amin’ny fahababoana ianareo ka ho hitan’ny masonareo izany,
  - type: text
    content: hoy NY TOMPO.
  '3':
  - type: text
    content: Ireo lehibe ao aminy
  - type: text
    content: dia liona mierona.
  - type: text
    content: Ny mpitsarany dia ny amboadia hariva
  - type: text
    content: izay tsy mamela ho tra-maraina.
  '4':
  - type: text
    content: Ny mpaminaniny dia avo vava
  - type: text
    content: sady mpamitaka.
  - type: text
    content: Ny mpisorony dia mandoto izay masina;
  - type: text
    content: eny, manitsakitsaka ny lalàna izy.
  '5':
  - type: text
    content: NY TOMPO no marina ao afovoany,
  - type: text
    content: tsy manao izay tsy marina Izy.
  - type: text
    content: Isa-maraina isa-maraina no amoahany ny fitsarany ho amin’ny mazava
  - type: text
    content: ka tsy mba diso izany;
  - type: text
    content: nefa tsy mba mahalala henatra ny olona tsy marina.
  '6':
  - type: text
    content: Efa nahafongana firenena Aho,
  - type: text
    content: rava ny tilikambon’ny mpiambina eny amin’ny zoron’ny manda;
  - type: text
    content: nosimbako ny lalany
  - type: text
    content: ka tsy hisy mpandeha!
  - type: text
    content: Rava ny tanànany
  - type: text
    content: ka tsy misy olona; eny, tsy misy mponina.
  '7':
  - type: text
    content: 'Hoy Aho: Raha mba natahotra Ahy tokoa mantsy ianao'
  - type: text
    content: ka nino anatra
  - type: text
    content: dia tsy ho rava ny fonenanao
  - type: text
    content: araka izay rehetra namelezana anao.
  - type: text
    content: Kanefa nifoha vao maraina izy
  - type: text
    content: ka nanao izay ratsy rehetra.
  '8':
  - type: text
    content: Koa miandrasa Ahy ianareo,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: ambara-piavin’ny andro hitsanganako haka babo;
  - type: text
    content: 'fa izao no kasaiko hatao: Hamory firenena'
  - type: text
    content: sy hanangona fanjakana Aho
  - type: text
    content: mba hanamparako ny fahatezerako amin’ireo,
  - type: text
    content: dia ny firehetan’ny fahatezerako rehetra;
  - type: text
    content: koa ny afon’ny fahasaro-piaroko
  - type: text
    content: no handevona ny tany rehetra.
  - type: heading
    content: Hanova ny vahoakany Andriamanitra
  '9':
  - type: text
    content: Fa amin’izany dia hovako ho madio ny molotry ny firenena
  - type: text
    content: mba hiantsoan’izy rehetra ny anaran’NY TOMPO
  - type: text
    content: sy hanompoany Azy amin’ny firaisan-kina.
