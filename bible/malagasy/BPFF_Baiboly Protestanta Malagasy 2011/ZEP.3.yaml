document_id: ZEP.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy nihaino ny antson’Andriamanitra i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan’ny tanàna mikomy sady voaloto,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay mampahory!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy nihaino ny feo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nino anatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nitokiany NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nanatona an’Andriamaniny izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ireo lehibe ao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia liona mierona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpitsarany dia ny amboadia hariva
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy mamela ho tra-maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny mpaminaniny dia avo vava
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mpamitaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpisorony dia mandoto izay masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, manitsakitsaka ny lalàna izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: NY TOMPO no marina ao afovoany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy manao izay tsy marina Izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isa-maraina isa-maraina no amoahany ny fitsarany ho amin’ny mazava
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba diso izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy mba mahalala henatra ny olona tsy marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa nahafongana firenena Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rava ny tilikambon’ny mpiambina eny amin’ny zoron’ny manda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nosimbako ny lalany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy mpandeha!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rava ny tanànany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy olona; eny, tsy misy mponina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy Aho: Raha mba natahotra Ahy tokoa mantsy ianao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nino anatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho rava ny fonenanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka izay rehetra namelezana anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa nifoha vao maraina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanao izay ratsy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa miandrasa Ahy ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambara-piavin’ny andro hitsanganako haka babo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa izao no kasaiko hatao: Hamory firenena'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanangona fanjakana Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanamparako ny fahatezerako amin’ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny firehetan’ny fahatezerako rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny afon’ny fahasaro-piaroko
- type: usfm
  marker: q1
  children:
  - type: text
    text: no handevona ny tany rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hanova ny vahoakany Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa amin’izany dia hovako ho madio ny molotry ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hiantsoan’izy rehetra ny anaran’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanompoany Azy amin’ny firaisan-kina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Avy any andafin’ny onin’i Etiopia
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hitondran’ny mpivavaka Amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny zanakavavin’ireo izay naeliko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanatitra ho Ahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sisa amin’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hitsanga-menatra ianao ny amin’izay nataonao rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nanotanao Tamiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hesoriko aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo mibitaka amim-pireharehana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hiavonavona ao amin’ny tendrombohitro masina intsony ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nefa hamelako olona mahantra sy madinika ihany ao aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny anaran’NY TOMPO no hialofany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy hanao heloka na handainga intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sisa amin’ny Israely.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy lela mamitaka eo am-bavany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho afaka mihinana sy mandry izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy hanaitaitra azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanarenana indray an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mihobia, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' zanakavavy!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova feo fifaliana, ry Israely!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifalia sy miravoravoa amin’ny fonao manontolo, ry Jerosalema zanakavavy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: NY TOMPO efa nampitsahatra ny fitsarana anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandroaka ny fahavalonao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO, Mpanjakan’ny Israely, no ao aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hahita loza intsony ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Amin’izany andro izany dia holazaina amin’i Jerosalema hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra ry Ziona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, aza miraviravy tanana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: NY TOMPO Andriamanitrao no ao aminao, mpiady mahery Izy sady mpamonjy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hifaly sy hiravoravo noho ny aminao Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hangina amin’ny fitiavany Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hifaly amin’ny fihobiana noho ny aminao Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hangoniko izay manina ny andro firavoravoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo izay lavitra anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka itambesaran’ny latsa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hasiako izay rehetra nampahory anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hovonjeko ny mandringa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hovoriko ny noroahina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataoko ho fiderana sy ho voninahitra ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny tany rehetra izay efa nitondrany henatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amin’izany andro izany no hitondrako anareo miverina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, amin’izany andro izany no hanangonako anareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hataoko ho voninahitra sy ho laza
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny firenena rehetra ambonin’ny tany ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa hampodiko avy amin’ny fahababoana ianareo ka ho hitan’ny masonareo izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
