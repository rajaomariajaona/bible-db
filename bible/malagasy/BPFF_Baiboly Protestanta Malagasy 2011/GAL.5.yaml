document_id: GAL.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Lavo niala tamin’ny fahasoavana
  - type: text
    content: 'Ho amin’ny fahafahana no nanafahan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' antsika; koa miorena tsara fa aza mety hohazonin’ny ziogan’ny fanandevozana indray.'
  '10':
  - type: text
    content: 'Matoky anareo ao amin’ny Tompo aho, fa tsy hisaina zavatra hafa noho izay sainiko ianareo. Ilay mampikorontana anareo no hiharan’ny fanamelohana, na iza izy na iza. '
  '11':
  - type: text
    content: 'Fa raha mbola hitory ny famorana ihany aho, ry rahalahy, inona indray no mbola hanenjehana ahy? Raha izany dia ho foana ny fahatafintohinana noho ny hazofijaliana. '
  '12':
  - type: text
    content: Enga anie ka hanamelo-tena izay mampikorontana anareo.
  - type: heading
    content: Tsy miaina araka ny nofo fa araka ny Fanahy
  '13':
  - type: text
    content: 'Efa nantsoina ho amin’ny fahafahana ianareo, ry rahalahy; kanefa aoka tsy hoentina hanaraka ny nofo izany fahafahana izany. Mifanompoa amin’ny fitiavana '
  '14':
  - type: text
    content: 'fa tanteraka amin’ny teny iray ihany ny lalàna rehetra, dia izao: «Tiava ny namanao tahaka ny tenanao» (Lev 19.18). '
  '15':
  - type: text
    content: Fa raha mifandramatra sy mifampihinana ianareo, aoka tsy hifandringana!
  '16':
  - type: text
    content: 'Hoy kosa aho: Mandehana araka ny Fanahy dia tsy hahatanteraka ny filan’ny nofo ianareo. '
  '17':
  - type: text
    content: 'Manana filana manohitra ny Fanahy mantsy ny nofo, ary manohitra ny nofo ny Fanahy. Mifanohitra izy ireo mba tsy hahazoanareo manao izay zavatra tianareo hatao. '
  '18':
  - type: text
    content: 'Raha tarihin’ny Fanahy ianareo dia tsy mba ambanin’ny lalàna. '
  '19':
  - type: text
    content: 'Fa miharihary ny asan’ny nofo, dia izao: Fijangajangana, fahalotoana, fijejojejoana, '
  '2':
  - type: text
    content: 'Indro, izaho Paoly milaza aminareo fa raha mety hoforana ianareo dia tsy hahasoa anareo na dia kely akory aza Kristy. '
  '20':
  - type: text
    content: 'fanompoan-tsampy, fitahirizana ody ratsy, fandrafiana, fifandirana, adilahy, fialonana, lolompo, fifampiandaniana, fitsitokotokoana, '
  '21':
  - type: text
    content: 'fitsiriritana, fahamamoana, filalaovan-dratsy sy ny toy izany, izay ampitandremako anareo rahateo, tahaka ny nampitandremako anareo fahiny koa, fa tsy handova ny fanjakan’Andriamanitra izay manao izany. '
  '22':
  - type: text
    content: 'Ny vokatry ny Fanahy kosa dia fitiavana, fifaliana, fiadanana, fahari-po, fahamoram-panahy, fanaovan-tsoa, finoana, '
  '23':
  - type: text
    content: 'fahalemem-panahy, fifehezan-tena. Tsy misy lalàna manohitra izany. '
  '24':
  - type: text
    content: 'Fa izay an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy dia efa nanombo ny nofony mbamin’ny faniriany sy ny filany teo amin’ny hazofijaliana.'
  '25':
  - type: text
    content: 'Raha velona amin’ny Fanahy isika dia aoka handeha araka ny Fanahy. '
  '26':
  - type: text
    content: Aoka isika tsy hieboebo foana ka hifampihantsy sy hifampialona.
  '3':
  - type: text
    content: 'Ambarako marina amin’ny olona rehetra manaiky hoforana indray fa mpitrosa tsy maintsy mankatò ny lalàna rehetra izy. '
  '4':
  - type: text
    content: 'Tafasaraka amin’i Kristy ianareo na iza na iza mitady hohamarinina amin’ny lalàna. Efa lavo niala tamin’ny fahasoavana ianareo; '
  '5':
  - type: text
    content: 'fa izahay kosa, noho ny asan’ny Fanahy, amin’ny alalan’ny finoana no iandrasanay mafy ny fanantenana ny fanamarinana anay. '
  '6':
  - type: text
    content: Fa ao amin’i Kristy Jesosy dia samy tsy mahasoa na ny famorana na ny tsy famorana fa ny finoana miasa amin’ny fitiavana.
  '7':
  - type: text
    content: 'Nihazakazaka tsara ianareo. Iza no nisakana anareo tsy hanaiky ny marina? '
  '8':
  - type: text
    content: 'Tsy avy tamin’Ilay niantso anareo izany fandresen-dahatra izany. '
  '9':
  - type: text
    content: 'Ny masirasira kely dia mampitombo ny koba manontolo. '
