document_id: GAL.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lavo niala tamin’ny fahasoavana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho amin’ny fahafahana no nanafahan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' antsika; koa miorena tsara fa aza mety hohazonin’ny ziogan’ny fanandevozana indray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Indro, izaho Paoly milaza aminareo fa raha mety hoforana ianareo dia tsy hahasoa anareo na dia kely akory aza Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ambarako marina amin’ny olona rehetra manaiky hoforana indray fa mpitrosa tsy maintsy mankatò ny lalàna rehetra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tafasaraka amin’i Kristy ianareo na iza na iza mitady hohamarinina amin’ny lalàna. Efa lavo niala tamin’ny fahasoavana ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa izahay kosa, noho ny asan’ny Fanahy, amin’ny alalan’ny finoana no iandrasanay mafy ny fanantenana ny fanamarinana anay. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ao amin’i Kristy Jesosy dia samy tsy mahasoa na ny famorana na ny tsy famorana fa ny finoana miasa amin’ny fitiavana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nihazakazaka tsara ianareo. Iza no nisakana anareo tsy hanaiky ny marina? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy avy tamin’Ilay niantso anareo izany fandresen-dahatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny masirasira kely dia mampitombo ny koba manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Matoky anareo ao amin’ny Tompo aho, fa tsy hisaina zavatra hafa noho izay sainiko ianareo. Ilay mampikorontana anareo no hiharan’ny fanamelohana, na iza izy na iza. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa raha mbola hitory ny famorana ihany aho, ry rahalahy, inona indray no mbola hanenjehana ahy? Raha izany dia ho foana ny fahatafintohinana noho ny hazofijaliana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Enga anie ka hanamelo-tena izay mampikorontana anareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy miaina araka ny nofo fa araka ny Fanahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Efa nantsoina ho amin’ny fahafahana ianareo, ry rahalahy; kanefa aoka tsy hoentina hanaraka ny nofo izany fahafahana izany. Mifanompoa amin’ny fitiavana '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa tanteraka amin’ny teny iray ihany ny lalàna rehetra, dia izao: «Tiava ny namanao tahaka ny tenanao» (Lev 19.18). '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa raha mifandramatra sy mifampihinana ianareo, aoka tsy hifandringana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy kosa aho: Mandehana araka ny Fanahy dia tsy hahatanteraka ny filan’ny nofo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Manana filana manohitra ny Fanahy mantsy ny nofo, ary manohitra ny nofo ny Fanahy. Mifanohitra izy ireo mba tsy hahazoanareo manao izay zavatra tianareo hatao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha tarihin’ny Fanahy ianareo dia tsy mba ambanin’ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa miharihary ny asan’ny nofo, dia izao: Fijangajangana, fahalotoana, fijejojejoana, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fanompoan-tsampy, fitahirizana ody ratsy, fandrafiana, fifandirana, adilahy, fialonana, lolompo, fifampiandaniana, fitsitokotokoana, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'fitsiriritana, fahamamoana, filalaovan-dratsy sy ny toy izany, izay ampitandremako anareo rahateo, tahaka ny nampitandremako anareo fahiny koa, fa tsy handova ny fanjakan’Andriamanitra izay manao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny vokatry ny Fanahy kosa dia fitiavana, fifaliana, fiadanana, fahari-po, fahamoram-panahy, fanaovan-tsoa, finoana, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'fahalemem-panahy, fifehezan-tena. Tsy misy lalàna manohitra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa izay an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy dia efa nanombo ny nofony mbamin’ny faniriany sy ny filany teo amin’ny hazofijaliana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha velona amin’ny Fanahy isika dia aoka handeha araka ny Fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Aoka isika tsy hieboebo foana ka hifampihantsy sy hifampialona.
