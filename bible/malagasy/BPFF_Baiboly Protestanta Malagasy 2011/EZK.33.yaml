document_id: EZK.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Atsangan’Andriamanitra ho mpitily i Ezekiela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', mitenena amin’ny zanaky ny firenenao ka lazao aminy hoe: Raha mahatonga sabatra amin’ny tany iray Aho, ary ny tompon-tany dia maka lehilahy iray ao aminy ka manendry azy ho mpitily, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary hitan-dRalehilahy fa indro, avy ny sabatra ka mitsoka ny anjomara hampitaitra ny olona izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'nefa tsy mety taitra izay mandre ny feon’ny anjomara, dia tonga ny sabatra ka mandripaka azy, dia ho eo an-dohany ihany ny rany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nandre ny feon’ny anjomara ihany izy nefa tsy nety taitra: Ho eo aminy ihany ny rany. Fa raha nety taitra izy dia ho nahavonjy ny ainy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa raha hitan’ilay mpitily kosa fa indro, avy ny sabatra, nefa tsy nitsoka ny anjomara izy ka tsy notairina ny olona, ary tonga ny sabatra ka mandringana olona ao aminy, dia matin’ny helony ihany iny; nefa ny rany dia hadiniko amin’ny tanan’ilay mpitily.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa ianao, ry zanak’olona, dia notendreko ho mpitily ho an’ny taranak’Israely, koa raha mandre ny teny aloaky ny vavako ianao dia izany no hoentinao mananatra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha hoy Aho amin’ny ratsy fanahy: E! Ry ilay ratsy fanahy, ho faty tokoa ianao, nefa tsy mety mananatra azy ianao hiala amin’ny alehany, dia ho fatin’ny helony ihany izany ratsy fanahy izany, fa ny rany dia hadiniko amin’ny tananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa raha mananatra ny ratsy fanahy hiala amin’ny lalany ratsy ihany kosa ianao, fa izy no tsy mety miala amin’izany, dia ho fatin’ny helony ihany izy nefa voavonjinao ny ainao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Raha miverina amin’Andriamanitra ny ratsy fanahy dia hahavonjy ny ainy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ianao, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', mitenena amin’ny taranak’Israely hoe: Izao no fiteninareo: Eto aminay ny fahadisoanay sy ny fahotanay ka mihalevona amin’izany izahay, dia nahoana no mbola velona ihany izahay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lazao aminy hoe: Raha velona koa Aho, hoy NY TOMPO Andriamanitra dia tsy sitrako ny hahafatesan’ny ratsy fanahy, fa ny hialan’ny ratsy fanahy amin’ny lalany mba ho velona izy. Mialà, mialà amin’ny lalanareo ratsy, fa nahoana no te ho faty ianareo, ry taranak’Israely?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ianao, ry zanak’olona, lazao amin’ny zanaky ny firenenao hoe: Ny fahamarinan’ny marina dia tsy hahavonjy azy amin’ny andro ahadisoany, ary ny faharatsian’ny ratsy fanahy tsy hahavoa azy amin’ny andro ialany amin’ny faharatsiany; ary ny marina tsy ho velona noho ny fahamarinany amin’ny andro anotany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha lazaiko ny amin’ny marina hoe: Ho velona tokoa izy, nefa izy mitoky amin’ny fahamarinany ka manao meloka, dia tsy hotsarovana ny fahamarinana rehetra izay nataony, fa ny heloka nataony no hahafaty azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary koa, raha hoy kosa Aho amin’ny ratsy fanahy: Ho faty tokoa ianao, nefa miala amin’ny fahotany izy sady manao izay marina sy mahitsy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka mamerina ny natao antoka sady mampody izay nangalariny, ary mandeha araka ny didy mahavelona ka tsy manao meloka, dia ho velona tokoa izy fa tsy ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fahotana rehetra izay nataony dia tsy hotsarovana aminy intsony; manao izay marina sy mahitsy izy ka ho velona tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Kanefa, hoy ny zanaky ny firenenao: Tsy marina ny lalan’ny Tompo. Nefa ny lalan’ny tenany no tsy marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha ny marina no miala amin’ny fahamarinany ka manao meloka dia ho faty amin’izany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha ny ratsy fanahy no miala amin’ny faharatsiany ka manao izay marina sy mahitsy dia ho velona amin’izany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Kanefa, hoy ianareo: Tsy marina ny lalan’ny Tompo. E! Ry taranak’Israely, samy hotsaraiko araka ny lalany avy ianareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ho lao ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tamin’ny andro fahadimy tamin’ny volana fahafolo, tamin’ny taona faharoa amby folo taorianan’ny namaboana antsika, no nisy olona nandositra avy tany Jerosalema tonga tao amiko ka nanambara hoe: Azo ny tanàna! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Efa tonga tamiko ny tanan’NY TOMPO tamin’ny omaly harivan’ny andro nahatongavan’ilay nandositra izay tonga tao amiko ka nosokafany ny vavako raha tsy mbola tonga ilay mpandositra izay tonga tao amiko nony maraina. Efa nisokatra ny vavako ka tsy moana intsony aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', ny monina amin’ireny rava amin’ny tanin’ny Israely ireny dia miteny hoe: Irery ihany i Abrahama nefa nandova ny tany izy; fa isika kosa dia maro, ary omena antsika ho lovantsika ny tany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Homan-javatra misy ra sady miandrandra ny sampinareo ianareo ary mandatsa-dra; koa hahazo handova ny tany va ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mitoky amin’ny sabatrareo ianareo sady manao fahavetavetana, ary samy mandoto ny vadin’ny namany avy; koa hahazo handova ny tany va ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izao no holazainao aminy: Izao no lazain’NY TOMPO Andriamanitra: Raha velona koa Aho, dia tsy maintsy ho lavon’ny sabatra izay ao amin’ny tanàna rava, ary izay any an-tsaha dia homeko ho rembin’ny bibidia, ary izay any amin’ny fierena any an-tendrombohitra sy any amin’ny lavabato dia ho fatin’ny areti-mandringana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hataoko rava sy lao ny tany ary hitsahatra ny fiavonavonan’ny heriny; ho lao ny tendrombohitry ny Israely ka tsy hisy handia azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia ho fantany fa Izaho no TOMPO rehefa ataoko rava sy lao ny tany noho ny fahavetavetana nataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ianao, ry zanak’olona, ny zanaky ny firenenao dia miresaka anao eny am-bodirindrina sy eo am-baravaran’ny tranony ka samy milaza amin’ny rahalahiny hoe: Andeha isika, ary aoka handre izay teny avy amin’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia tonga maro ao aminao izy ka mipetraka eo anatrehanao toa oloko ary mahare ny teninao, nefa tsy mety mankatò azy; fa indro, teny mamy no lazain’ny vavany, nefa ny fony dia manaraka ny filan-karena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa indro, ianao dia ataony ho tahaka ny mpanao hira mahafinaritra, izay tsara feo sady mahay mitendry. Mandre ny teninao izy nefa tsy mety mankatò azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Rehefa tanteraka izany zavatra izany, ary efa ho tanteraka, dia ho fantany fa nisy mpaminany tokoa tao aminy.
