document_id: EZK.33,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Atsangan’Andriamanitra ho mpitily i Ezekiela
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Ary ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', mitenena amin’ny taranak’Israely hoe: Izao no fiteninareo: Eto aminay ny fahadisoanay sy ny fahotanay ka mihalevona amin’izany izahay, dia nahoana no mbola velona ihany izahay? '
  '11':
  - type: text
    content: 'Lazao aminy hoe: Raha velona koa Aho, hoy NY TOMPO Andriamanitra dia tsy sitrako ny hahafatesan’ny ratsy fanahy, fa ny hialan’ny ratsy fanahy amin’ny lalany mba ho velona izy. Mialà, mialà amin’ny lalanareo ratsy, fa nahoana no te ho faty ianareo, ry taranak’Israely?'
  '12':
  - type: text
    content: 'Ary ianao, ry zanak’olona, lazao amin’ny zanaky ny firenenao hoe: Ny fahamarinan’ny marina dia tsy hahavonjy azy amin’ny andro ahadisoany, ary ny faharatsian’ny ratsy fanahy tsy hahavoa azy amin’ny andro ialany amin’ny faharatsiany; ary ny marina tsy ho velona noho ny fahamarinany amin’ny andro anotany. '
  '13':
  - type: text
    content: 'Raha lazaiko ny amin’ny marina hoe: Ho velona tokoa izy, nefa izy mitoky amin’ny fahamarinany ka manao meloka, dia tsy hotsarovana ny fahamarinana rehetra izay nataony, fa ny heloka nataony no hahafaty azy. '
  '14':
  - type: text
    content: 'Ary koa, raha hoy kosa Aho amin’ny ratsy fanahy: Ho faty tokoa ianao, nefa miala amin’ny fahotany izy sady manao izay marina sy mahitsy '
  '15':
  - type: text
    content: 'ka mamerina ny natao antoka sady mampody izay nangalariny, ary mandeha araka ny didy mahavelona ka tsy manao meloka, dia ho velona tokoa izy fa tsy ho faty. '
  '16':
  - type: text
    content: Ny fahotana rehetra izay nataony dia tsy hotsarovana aminy intsony; manao izay marina sy mahitsy izy ka ho velona tokoa.
  '17':
  - type: text
    content: 'Kanefa, hoy ny zanaky ny firenenao: Tsy marina ny lalan’ny Tompo. Nefa ny lalan’ny tenany no tsy marina. '
  '18':
  - type: text
    content: 'Raha ny marina no miala amin’ny fahamarinany ka manao meloka dia ho faty amin’izany izy. '
  '19':
  - type: text
    content: 'Ary raha ny ratsy fanahy no miala amin’ny faharatsiany ka manao izay marina sy mahitsy dia ho velona amin’izany izy. '
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', mitenena amin’ny zanaky ny firenenao ka lazao aminy hoe: Raha mahatonga sabatra amin’ny tany iray Aho, ary ny tompon-tany dia maka lehilahy iray ao aminy ka manendry azy ho mpitily, '
  '20':
  - type: text
    content: 'Kanefa, hoy ianareo: Tsy marina ny lalan’ny Tompo. E! Ry taranak’Israely, samy hotsaraiko araka ny lalany avy ianareo.'
  - type: heading
    content: Ho lao ny Israely
  '21':
  - type: text
    content: 'Tamin’ny andro fahadimy tamin’ny volana fahafolo, tamin’ny taona faharoa amby folo taorianan’ny namaboana antsika, no nisy olona nandositra avy tany Jerosalema tonga tao amiko ka nanambara hoe: Azo ny tanàna! '
  '22':
  - type: text
    content: Efa tonga tamiko ny tanan’NY TOMPO tamin’ny omaly harivan’ny andro nahatongavan’ilay nandositra izay tonga tao amiko ka nosokafany ny vavako raha tsy mbola tonga ilay mpandositra izay tonga tao amiko nony maraina. Efa nisokatra ny vavako ka tsy moana intsony aho.
  '23':
  - type: text
    content: 'Dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '24':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', ny monina amin’ireny rava amin’ny tanin’ny Israely ireny dia miteny hoe: Irery ihany i Abrahama nefa nandova ny tany izy; fa isika kosa dia maro, ary omena antsika ho lovantsika ny tany! '
  '25':
  - type: text
    content: 'Koa lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Homan-javatra misy ra sady miandrandra ny sampinareo ianareo ary mandatsa-dra; koa hahazo handova ny tany va ianareo? '
  '26':
  - type: text
    content: 'Mitoky amin’ny sabatrareo ianareo sady manao fahavetavetana, ary samy mandoto ny vadin’ny namany avy; koa hahazo handova ny tany va ianareo? '
  '27':
  - type: text
    content: 'Izao no holazainao aminy: Izao no lazain’NY TOMPO Andriamanitra: Raha velona koa Aho, dia tsy maintsy ho lavon’ny sabatra izay ao amin’ny tanàna rava, ary izay any an-tsaha dia homeko ho rembin’ny bibidia, ary izay any amin’ny fierena any an-tendrombohitra sy any amin’ny lavabato dia ho fatin’ny areti-mandringana. '
  '28':
  - type: text
    content: 'Fa hataoko rava sy lao ny tany ary hitsahatra ny fiavonavonan’ny heriny; ho lao ny tendrombohitry ny Israely ka tsy hisy handia azy. '
  '29':
  - type: text
    content: Dia ho fantany fa Izaho no TOMPO rehefa ataoko rava sy lao ny tany noho ny fahavetavetana nataony.
  '3':
  - type: text
    content: 'ary hitan-dRalehilahy fa indro, avy ny sabatra ka mitsoka ny anjomara hampitaitra ny olona izy, '
  '30':
  - type: text
    content: 'Ary ianao, ry zanak’olona, ny zanaky ny firenenao dia miresaka anao eny am-bodirindrina sy eo am-baravaran’ny tranony ka samy milaza amin’ny rahalahiny hoe: Andeha isika, ary aoka handre izay teny avy amin’NY TOMPO. '
  '31':
  - type: text
    content: 'Dia tonga maro ao aminao izy ka mipetraka eo anatrehanao toa oloko ary mahare ny teninao, nefa tsy mety mankatò azy; fa indro, teny mamy no lazain’ny vavany, nefa ny fony dia manaraka ny filan-karena. '
  '32':
  - type: text
    content: 'Koa indro, ianao dia ataony ho tahaka ny mpanao hira mahafinaritra, izay tsara feo sady mahay mitendry. Mandre ny teninao izy nefa tsy mety mankatò azy. '
  '33':
  - type: text
    content: Rehefa tanteraka izany zavatra izany, ary efa ho tanteraka, dia ho fantany fa nisy mpaminany tokoa tao aminy.
  '4':
  - type: text
    content: 'nefa tsy mety taitra izay mandre ny feon’ny anjomara, dia tonga ny sabatra ka mandripaka azy, dia ho eo an-dohany ihany ny rany. '
  '5':
  - type: text
    content: 'Nandre ny feon’ny anjomara ihany izy nefa tsy nety taitra: Ho eo aminy ihany ny rany. Fa raha nety taitra izy dia ho nahavonjy ny ainy ihany. '
  '6':
  - type: text
    content: Fa raha hitan’ilay mpitily kosa fa indro, avy ny sabatra, nefa tsy nitsoka ny anjomara izy ka tsy notairina ny olona, ary tonga ny sabatra ka mandringana olona ao aminy, dia matin’ny helony ihany iny; nefa ny rany dia hadiniko amin’ny tanan’ilay mpitily.
  '7':
  - type: text
    content: 'Koa ianao, ry zanak’olona, dia notendreko ho mpitily ho an’ny taranak’Israely, koa raha mandre ny teny aloaky ny vavako ianao dia izany no hoentinao mananatra azy. '
  '8':
  - type: text
    content: 'Raha hoy Aho amin’ny ratsy fanahy: E! Ry ilay ratsy fanahy, ho faty tokoa ianao, nefa tsy mety mananatra azy ianao hiala amin’ny alehany, dia ho fatin’ny helony ihany izany ratsy fanahy izany, fa ny rany dia hadiniko amin’ny tananao. '
  '9':
  - type: text
    content: Fa raha mananatra ny ratsy fanahy hiala amin’ny lalany ratsy ihany kosa ianao, fa izy no tsy mety miala amin’izany, dia ho fatin’ny helony ihany izy nefa voavonjinao ny ainao.
  - type: heading
    content: Raha miverina amin’Andriamanitra ny ratsy fanahy dia hahavonjy ny ainy
