document_id: JHN.19,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Tamin’izay dia nalain’i Pilato i Jesosy ka nasainy nokapohina. '
  '10':
  - type: text
    content: 'Dia hoy Pilato Taminy: Tsy miteny amiko va Ianao? Tsy fantatrao va fa manana fahefana hanafaka Anao aho sady manana fahefana hanombo Anao amin’ny hazofijaliana koa? '
  '11':
  - type: text
    content: 'Dia hoy Jesosy taminy: Tsy manana fahefana Amiko akory ianao raha tsy nomena anao avy any ambony; koa izay nanolotra Ahy taminao no manan-keloka bebe kokoa.'
  '12':
  - type: text
    content: 'Hatreo dia nitady hanafaka Azy i Pilato; nefa niantsoantso ny Jiosy hoe: Raha afahanao io lehilahy io dia tsy mba sakaizan’i Kaisara ianao; fa izay rehetra manao ny tenany ho mpanjaka dia manao teny manohitra an’i Kaisara. '
  '13':
  - type: text
    content: 'Rehefa ren’i Pilato izany teny izany dia nitondra an’i Jesosy nivoaka avy tao izy ka nipetraka teo amin’ny seza fitsarana teo amin’ny toerana atao hoe Lampivato, na hoe Gabata amin’ny teny hebreo; '
  '14':
  - type: text
    content: 'andro fiomanana amin’ny Paska ny andro tamin’izay, tokony ho tamin’ny ora fahenina; dia hoy izy tamin’ny Jiosy: Indro ny Mpanjakanareo! '
  '15':
  - type: text
    content: 'Fa niantsoantso ireo hoe: Vonoy, vonoy, homboy amin’ny hazofijaliana Izy! Hoy Pilato tamin’izy ireo: Hohomboiko amin’ny hazofijaliana va ny Mpanjakanareo? Dia hoy ireo lehiben’ny mpisorona hoe: Tsy manana mpanjaka afa-tsy Kaisara izahay. '
  '16':
  - type: text
    content: Ary tamin’izay i Pilato dia nanolotra Azy taminy mba hohomboana amin’ny hazofijaliana.
  - type: heading
    content: Nohomboina teo amin’ny hazofijaliana Jesosy
  - type: heading
    content: Mat 27.32-44; Mar 15.21-32; Lio 23.26-43
  - type: text
    content: 'Dia noraisin’ireo Jesosy; '
  '17':
  - type: text
    content: 'ary Izy nitondra ny hazofijaliany, dia nankany amin’ny toerana atao hoe Ikarandoha, izay atao amin’ny teny hebreo hoe Golgota. '
  '18':
  - type: text
    content: 'Teo no nanomboana Azy tamin’ny hazofijaliana, ary nisy roa lahy koa niaraka Taminy, iray avy teo an-daniny roa, fa Jesosy no teo afovoany. '
  '19':
  - type: text
    content: 'Ary nanoratra anarana i Pilato ka napetany teo amin’ny hazofijaliana. Izao no voasoratra: '
  - type: heading
    content: jesosy avy any nazareta, mpanjakan’ny jiosy.
  '2':
  - type: text
    content: 'Ary nandrandrana satroka tsilo ny miaramila ka nasatrony ny lohany sady nampitafiany lamba volomparasy Izy, '
  '20':
  - type: text
    content: 'Ary izany anarana izany dia novakin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' maro, fa akaikin’ny tanàna ny toerana izay nanomboana an’i Jesosy tamin’ny hazofijaliana; voasoratra tamin’ny teny hebreo sy romana ary grika izany soratra izany. '
  '21':
  - type: text
    content: 'Noho izany ireo lehiben’ny mpisorona tamin’ny Jiosy dia niteny tamin’i Pilato hoe: Aza soratana hoe: Mpanjakan’ny Jiosy; fa izao: Izy no nilaza hoe: Mpanjakan’ny Jiosy Aho. '
  '22':
  - type: text
    content: 'Fa hoy i Pilato hoe: Izay voasoratro dia voasoratro.'
  '23':
  - type: text
    content: 'Rehefa voahombon’ny miaramila tamin’ny hazofijaliana Jesosy dia nalainy ny fitafiany ka nozarainy efatra, samy nanana ny anjarany avy ny miaramila; nalainy koa ny akanjony; tsy nisy vitrana izany akanjony izany fa tenona iray ihany. '
  '24':
  - type: text
    content: 'Dia niresaka izy ireo hoe: Aza triarintsika ity fa aoka hanaovantsika antsapaka ny amin’izay hahazo azy; mba hahatanteraka ny Soratra Masina hoe:'
  - type: text
    content: «Nozarainy ny fitafiako
  - type: text
    content: ary nanaovany antsapaka ny akanjoko» (Sal 22.18).
  - type: text
    content: Izany zavatra izany no nataon’ny miaramila.
  '25':
  - type: text
    content: 'Ary nijanona teo akaikin’ny hazofijalian’i Jesosy ny reniny sy ny rahavavin-dreniny, i Maria, vadin’i Klopa, sy i Maria Magdalena. '
  '26':
  - type: text
    content: 'Nony hitan’i Jesosy ny reniny sy ilay mpianatra tiany fa nijanona teo dia hoy Izy tamin’ny reniny: Ravehivavy, indro ny zanakao! '
  '27':
  - type: text
    content: 'Ary hoy koa Izy tamin’ilay mpianatra: Indro ny reninao! Hatramin’izay ora izay dia noraisin’ilay mpianatra ho any aminy i Maria.'
  - type: heading
    content: Ny nahafatesan’i Jesosy
  - type: heading
    content: Mat 27.45-56; Mar 15.33-41; Lio 23.44-49
  '28':
  - type: text
    content: 'Taorianan’izany dia fantatr’i Jesosy fa efa vita ny zavatra rehetra mba hahatanteraka ny Soratra Masina ka hoy Izy: Mangetaheta Aho. '
  '29':
  - type: text
    content: 'Ary nisy bakoly feno vinaingitra nipetraka teo; ary nisy sipaonjy feno vinaingitra naraikiny tamin’ny '
  - type: text
    content: hisopa
  - type: text
    content: ' ka nataon’ny miaramila tamin’ny vavan’i Jesosy. '
  '3':
  - type: text
    content: 'dia nanatona Azy ny miaramila ka niteny Taminy hoe: Arahaba, ry Mpanjakan’ny Jiosy! Sady namely tehamaina Azy izy.'
  '30':
  - type: text
    content: 'Ary rehefa nanandrana ny vinaingitra Jesosy dia niteny hoe: Vita; dia nanondrika ny lohany Izy ka nanolotra ny fanahiny.'
  - type: heading
    content: Ny nandefonana Azy
  '31':
  - type: text
    content: 'Ary satria andro fiomanana ny andro dia nangataka tamin’i Pilato ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' mba hotapahina ny ranjon’ireo ka hesorina ny faty, mba tsy ho tratry ny andro Sabata eo amin’ny hazofijaliana, satria andro lehibe izany Sabata izany. '
  '32':
  - type: text
    content: 'Dia tonga ny miaramila ka nanapaka ny ranjon’ny voalohany sy ny an’ny iray koa izay niaraka nohomboina tamin’i Jesosy tamin’ny hazofijaliana. '
  '33':
  - type: text
    content: 'Fa nony nankeo amin’i Jesosy izy dia hitany fa efa maty sahady Izy, koa tsy mba notapahiny ny ranjony. '
  '34':
  - type: text
    content: 'Nisy miaramila iray anefa nandefona ny lanivoany, ary niaraka tamin’izay dia nisy ra sy rano nandeha. '
  '35':
  - type: text
    content: 'Ilay nahita dia vavolombelona manambara, ary marina ny fanambaràny; ary fantany fa milaza ny marina izy mba hinoanareo koa. '
  '36':
  - type: text
    content: 'Fa tonga izany mba hahatanteraka ny Soratra Masina hoe: «Tsy hisy hotapahina ny taolany» (Eks 12.46; Sal 34.20). '
  '37':
  - type: text
    content: 'Hoy koa ny teny iray ao amin’ny Soratra Masina: «Hijery izay nolefoniny izy» (Zak 12.10).'
  - type: heading
    content: Ny nandevenana an’i Jesosy
  - type: heading
    content: Mat 27.57-61; Mar 15.42-47; Lio 23.50-56
  '38':
  - type: text
    content: 'Taorianan’izany dia nangataka tamin’i Pilato i Josefa avy any Arimatia mba hahazoany manaisotra ny fatin’i Jesosy. Mpianatr’i Jesosy i Josefa, nefa tamin’ny mangingina ihany noho ny fahatahorany ny '
  - type: text
    content: Jiosy
  - type: text
    content: '. Nomen’i Pilato lalana izy. Dia lasa izy ka nanaisotra ny fatin’i Jesosy. '
  '39':
  - type: text
    content: 'Tonga koa i Nikodemosy, ilay nankao amin’i Jesosy tamin’ny alina tamin’ny voalohany, ka nitondra miora sy hazo manitra voaharoharo, tokony ho zato livatra. '
  '4':
  - type: text
    content: 'Dia nivoaka nankeo ivelany indray i Pilato ka niteny tamin’izy ireo hoe: Indro, mitondra Azy mivoaka ho eto aminareo aho mba ho fantatrareo fa tsy hitako izay helony na dia kely akory aza. '
  '40':
  - type: text
    content: 'Dia noraisiny ny fatin’i Jesosy ka nofonosiny lambam-paty mbamin’ny zavamanitra, araka ny fanaon’ny Jiosy, raha manamboatra faty halevina. '
  '41':
  - type: text
    content: 'Nisy saha teo amin’ilay nanomboana Azy tamin’ny hazofijaliana; ary teo anatin’ilay saha dia nisy fasana vaovao izay tsy mbola nandevenana olona. '
  '42':
  - type: text
    content: Tao no nandevenany an’i Jesosy noho ny andro fiomanan’ny Jiosy satria akaiky teo ny fasana.
  '5':
  - type: text
    content: 'Ary navoaka avy tao Jesosy, misatroka tsilo sy mitafy lamba volomparasy. Dia hoy i Pilato tamin’ny vahoaka: Indro ny lehilahy!'
  '6':
  - type: text
    content: 'Rehefa hitan’ireo lehiben’ny mpisorona sy ny mpiandry raharaha Jesosy dia niantso ireo hoe: Homboy amin’ny hazofijaliana Izy! Homboy amin’ny hazofijaliana Izy! Hoy Pilato taminy: Entonareo Izy ka homboy amin’ny hazofijaliana; fa izaho anefa dia tsy mahita izay helony. '
  '7':
  - type: text
    content: 'Fa namaly azy ny Jiosy hoe: Izahay dia manana lalàna, ary araka izany lalàna izany dia tokony ho faty Izy satria nanao ny tenany ho Zanak’Andriamanitra.'
  '8':
  - type: text
    content: 'Nony ren’i Pilato izany teny izany dia vao mainka natahotra izy '
  '9':
  - type: text
    content: 'ka niditra tao an-dapa indray sady niteny tamin’i Jesosy hoe: Avy aiza moa Ianao? Nefa tsy namaly teny azy akory Jesosy. '
