document_id: EXO.21,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lalàna momba ny andevo hebreo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no lalàna izay hataonao eo anatrehany:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha maka vehivavy hafa ho vadiny izy dia tsy hahenany ny sakafony sy ny fitafiany ary ny fombam-panambadiany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha tsy hataony aminy izany zavatra telo loha izany dia hiala ka ho afaka madiodio Ravehivavy fa tsy handoa vola.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahadisoana mahatonga fanamelohana ho faty
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mamely olona ka mahafaty azy dia hovonoina ho faty. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay tsy ninia nahafaty, fa Andriamanitra no nanolotra azy eo an-tanany, dia hanondro toerana ho anareo Aho handosirany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha misy olona mivonona hamono ny namany amin’ny hafetsena dia halainao izy, na dia eo amin’ny alitarako aza, ka hovonoina ho faty.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mikapoka ny rainy na ny reniny dia hovonoina ho faty.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mangalatra olona ka na efa namidiny, na mbola hita eo an-tanany ihany ilay nangalariny, dia hovonoina ho faty.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manozona ny rainy na ny reniny dia hovonoina ho faty.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Kapoka sy ratra
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona miady ka ny iray mamely ny namany amin’ny vato na amin’ny totohondry, kanefa tsy maty ilay voa fa marary am-pandriana, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia ho afa-tsiny ilay namely azy rehefa afa-mitsangana indray ka mandehandeha mitehina eny alatrano ilay marary. Kanefa handoa ny onitr’ireo andro tsy niasany izy sady hitsabo azy mandra-pahasitrany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mividy andevo hebreo ianao dia enin-taona no hanompoany, ary amin’ny taona fahafito kosa dia hiala izy ka ho afaka madiodio. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona mikapoka ny andevolahiny na ny andevovaviny amin’ny hazo ka mahafaty azy eo am-pikapohana dia hovalina tokoa izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa raha mbola velona maharitra indray andro na indroa andro izy io dia tsy hovalina ilay tompony satria harenany ihany izy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona miady ka mandratra vehivavy manana anaka ka teraka tsy tonga volana ny zanany, kanefa tsy misy maninona, dia hosazina tokoa ilay olona araka izay hanaovan’ny vadin-dRavehivavy azy; handoa araka izay didy havoakan’ny mpitsara izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha misy maninona kosa dia hanome aina solon’ny aina ianao, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'maso solon’ny maso, nify solon’ny nify, tanana solon’ny tanana, tongotra solon’ny tongotra, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: may solon’ny may, ratra solon’ny ratra, fery solon’ny fery.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy olona mikapoka ny mason’ny andevolahiny na ny mason’ny andevovaviny ka mahasimba azy dia homeny fahafahana izy noho ny masony. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha ny nifin’ny andevolahy na ny andevovavy no afany dia homeny fahafahana izy noho ny nifiny.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy omby manoto lehilahy na vehivavy ka mahafaty azy dia hotoraham-bato tokoa ny omby ary tsy hohanina ny henany; fa ny tompon’ilay omby kosa dia ho afa-tsiny. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha omby efa zatra nanoto hatramin’ny teo aloha iny, sady efa nambara tamin’ny tompony izany, nefa izy no tsy niaro azy ka nahafaty lehilahy na vehivavy ny omby, dia hotoraham-bato ny omby ary ny tompony koa dia hovonoina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha izy irery no niditra dia izy irery no hiala; fa raha manambady izy dia hiala hiaraka aminy koa ny vadiny. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha sazina izy dia handoa vidin’aina araka izay sazy atao aminy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha manoto zazalahy na zazavavy ny omby dia araka izany lalàna izany koa no hanaovana azy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha manoto andevolahy na andevovavy izy dia homena sekela volafotsy telopolo ny tompon’andevo, ary ny omby dia hotoraham-bato.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona manokatra lavaka, na raha misy olona mihady lavaka ka tsy rakofany ka misy omby na boriky latsaka '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hanonitra vola ho an’ny tompon’ilay omby ny tompon’ilay lavaka; ary ho azy ilay biby maty.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy ombin’olona mandratra ny ombin’ny namany ka mahafaty azy dia hamidiny ny omby velona ary hozarainy ny vola vidiny, ary hozarainy koa ilay omby maty. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa raha fantatra fa omby zatra nanoto hatramin’ny teo aloha iny, saingy tsy niaro azy ny tompony, dia hanonitra omby ho solon’ny omby tokoa izy, fa ilay maty kosa dia ho azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Halatra biby
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy olona mangalatra omby, na ondry, na osy, ka mamono azy, na mivarotra azy, dia hanonitra omby dimy ho solon’ny omby iray izy, ary ondry na osy efatra ho solon’ny ondry na osy iray.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha manome vady azy ny tompony ka niteraka zazalahy na zazavavy taminy izy dia ho an’ny tompony ny vadiny sy ny zanany fa izy irery ihany no hiala. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tena milaza ilay andevo hoe: Tsy foiko ny tompoko sy ny vadiko ary ny zanako ka tsy te ho afaka aho '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hoentin’ny tompony ho eo anatrehan’Andriamanitra izy, ary hoentiny ho eo amin’ny varavarana na ho eo amin’ny tolanam-baravarana ka hotevehin’ny tompony amin’ny fanjaibe ny sofiny, dia hanompo azy mandrakizay izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy anefa mivarotra ny zanany vavy ho mpanompo dia tsy mba ho tahaka ny fialan’ny andevolahy ho afaka no fialany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy ankasitrahan’ny tompony izay efa nikasa hanambady azy Ravehivavy dia havelany havotana ihany izy; kanefa tsy mahazo mivarotra azy ho any amin’ny firenena hafa izy satria efa namitaka azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mikendry azy ho fofombadin’ny zanany lahy izy dia araka ny fitondra zanakavavy no hataony aminy. '
