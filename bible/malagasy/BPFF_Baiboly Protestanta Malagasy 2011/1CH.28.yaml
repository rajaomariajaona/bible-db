document_id: 1CH.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nampiseho an’i Solomona ho mpandimby azy i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Novorin’i Davida tany Jerosalema ny lehibe rehetra tamin’ny Israely, dia ny lohan’ny foko sy ny lehiben’ny antokony izay nanompo ny andriamanjaka, ny mpifehy arivo, ny mpifehy zato, ny mpitandrina ny harena mbamin’ny biby fiompy rehetra an’ny mpanjaka sy ny zanany mbamin’ny tandapa sy ny lehilahy mahery, ary ny olona manankaja rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nitsangana i Davida mpanjaka ka niteny hoe: Mihainoa ahy, ry rahalahiko sy ry vahoakako! Raha izaho, dia efa tato am-poko ny hanao trano fitsaharana ho an’ny vata misy ny faneken’NY TOMPO sy ho an’ny fitoeran-tongotr’Andriamanitsika. Efa nataoko vonona izay hoenti-manangana azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'nefa hoy Andriamanitra tamiko: Tsy hanao trano ho an’ny anarako ianao satria lehilahy mpiady sy mpandatsa-dra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nefa kosa NY TOMPO, Andriamanitry ny Israely, efa nifidy ahy tamin’ny ankohonan’ny raiko rehetra ho mpanjakan’ny Israely mandrakizay; fa i Joda no nofidiny ho mpitondra, ary tamin’ny taranak’i Joda indray dia ny ankohonan’ny raiko no nofidiny; ary tamin’ny ankohonan’ny raiko dia izaho kosa no nankasitrahany ka nataony mpanjaka amin’ny Israely rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary tamin’ny zanako rehetra, fa zanaka maro no nomen’NY TOMPO ahy, dia i Solomona zanako no nofidiny hipetraka amin’ny sezafiandrianan’ny fanjakan’NY TOMPO hanjaka amin’ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy NY TOMPO tamiko: I Solomona zanakao no hanao ny tranoko sy ny kianjako, fa efa nifidy azy ho zanako Aho, ary Izaho ho rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hampitoetra ny fanjakany ho mandrakizay Aho, raha maharitra mitandrina ny didiko sy ny fitsipiko mandrakariva tahaka ny amin’izao anio izao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ankehitriny, eto anatrehan’ny Israely rehetra, dia ny fiangonan’NY TOMPO, sy eto anatrehan’Andriamanitsika, tandremo sy diniho ny didin’NY TOMPO Andriamanitrareo rehetra, mba hahatananareo ity tany soa ity sy hamelanareo azy ho lovan’ny zanakareo mandimby anareo mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ianao, ry Solomona zanako, fantaro ny Andriamanitry ny rainao ka manompoa Azy amin’ny fo manontolo sy ny fanahy mazoto; fa NY TOMPO dia mpandinika ny fo manontolo, ary ny fieritreretana rehetra dia fantany avokoa. Raha mitady Azy ianao dia hahita Azy; fa raha mahafoy Azy kosa ianao dia hariany mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa mitandrema, fa efa nifidy anao hanao trano ho fitoerana masina NY TOMPO. Mahereza ka mahefà.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Natolotr’i Davida an’i Solomona ny mari-trano momba ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Natolotr’i Davida an’i Solomona zanany ny sarin’ny lalantsara fidirana sy ny trano, ny trano fitahirizan-drakitra, ny efitrano ambony, ny efitrano anatiny, ny trano misy ny rakotra fanaovam-panavotana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'natolony azy ny sarin’izay rehetra efa niseho tamin’ny fanahiny; dia ny amin’ny kianjan’ny tranon’NY TOMPO, ny efitrano rehetra manodidina azy ho an’ny efitrano fitahirizana ao amin’ny ny tranon’NY TOMPO, ny rakitra masina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'natolony azy koa ny ho an’ny antokon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' sy ny levita, ny ho an’ny fanompoana rehetra ao amin’ny tranon’NY TOMPO, ny ho an’ny fanaka rehetra hoenti-manompo ao amin’ny tranon’NY TOMPO, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny lanjan’ny volamena hanaovana ny fanaka volamena samihafa rehetra, ny lanjan’ny volafotsy hanaovana ny fanaka volafotsy samihafa rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny lanjan’ny volamena hanaovana ny fitoeran-jiro volamena sy ny jirony araka ny lanjany avy, ny lanjan’ny volafotsy hanaovana ny fitoeran-jiro volafotsy sy ny jirony araka ny fampiasana azy avy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny lanjan’ny volamena hanaovana ireo latabatra hametrahana ny mofo atao fanatitra, ny amin’ny volafotsy ho amin’ny latabatra volafotsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny amin’ny fitrebika sy ny lovia famafazana ary ny fitoeran-divay, izay samy volamena tsy mifangaro; ny amin’ny kapoaka misarona, na ny volamena, na ny volafotsy, araka ny lanjany avy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ny lanjan’ny volamena voadio hanaovana ny alitara fandoroana ditin-kazo manitra; nomeny koa ny sarin’ny fiaran’Andriamanitra, dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' volamena, izay manana elatra mivelatra ka manaloka ny vata misy ny faneken’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izany asa rehetra araka ny sary izany, hoy Davida, no nampahafantarin’NY TOMPO ahy tamin’ny soratra avy tamin’ny tanany, izay atỳ amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy koa i Davida tamin’i Solomona zanany: Mahereza sy matanjaha ka mahefà; aza matahotra na mivadi-po; fa NY TOMPO Andriamanitra, dia Andriamanitro, no momba anao; tsy handao na hahafoy anao Izy ambara-pahavitanao ny asa rehetra hanaovana ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary indreo, ny antokon’ny mpisorona sy ny levita dia hanao ny fanompoana rehetra ao amin’ny tranon’Andriamanitra; ao aminao koa dia misy hanampy amin’ny asa samihafa rehetra, dia ny olon-kendry izay manolo-tena mba hahavita ny fanompoana rehetra sy ny mpifehy ary ny vahoaka rehetra izay hankatò ny didinao.
