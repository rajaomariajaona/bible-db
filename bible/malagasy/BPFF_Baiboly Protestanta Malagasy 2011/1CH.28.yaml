document_id: 1CH.28,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nampiseho an’i Solomona ho mpandimby azy i Davida
  - type: text
    content: 'Novorin’i Davida tany Jerosalema ny lehibe rehetra tamin’ny Israely, dia ny lohan’ny foko sy ny lehiben’ny antokony izay nanompo ny andriamanjaka, ny mpifehy arivo, ny mpifehy zato, ny mpitandrina ny harena mbamin’ny biby fiompy rehetra an’ny mpanjaka sy ny zanany mbamin’ny tandapa sy ny lehilahy mahery, ary ny olona manankaja rehetra. '
  '10':
  - type: text
    content: Koa mitandrema, fa efa nifidy anao hanao trano ho fitoerana masina NY TOMPO. Mahereza ka mahefà.
  - type: heading
    content: Natolotr’i Davida an’i Solomona ny mari-trano momba ny tempoly
  '11':
  - type: text
    content: 'Natolotr’i Davida an’i Solomona zanany ny sarin’ny lalantsara fidirana sy ny trano, ny trano fitahirizan-drakitra, ny efitrano ambony, ny efitrano anatiny, ny trano misy ny rakotra fanaovam-panavotana; '
  '12':
  - type: text
    content: 'natolony azy ny sarin’izay rehetra efa niseho tamin’ny fanahiny; dia ny amin’ny kianjan’ny tranon’NY TOMPO, ny efitrano rehetra manodidina azy ho an’ny efitrano fitahirizana ao amin’ny ny tranon’NY TOMPO, ny rakitra masina; '
  '13':
  - type: text
    content: 'natolony azy koa ny ho an’ny antokon’ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny levita, ny ho an’ny fanompoana rehetra ao amin’ny tranon’NY TOMPO, ny ho an’ny fanaka rehetra hoenti-manompo ao amin’ny tranon’NY TOMPO, '
  '14':
  - type: text
    content: 'ny lanjan’ny volamena hanaovana ny fanaka volamena samihafa rehetra, ny lanjan’ny volafotsy hanaovana ny fanaka volafotsy samihafa rehetra, '
  '15':
  - type: text
    content: 'ny lanjan’ny volamena hanaovana ny fitoeran-jiro volamena sy ny jirony araka ny lanjany avy, ny lanjan’ny volafotsy hanaovana ny fitoeran-jiro volafotsy sy ny jirony araka ny fampiasana azy avy, '
  '16':
  - type: text
    content: 'ny lanjan’ny volamena hanaovana ireo latabatra hametrahana ny mofo atao fanatitra, ny amin’ny volafotsy ho amin’ny latabatra volafotsy, '
  '17':
  - type: text
    content: 'ny amin’ny fitrebika sy ny lovia famafazana ary ny fitoeran-divay, izay samy volamena tsy mifangaro; ny amin’ny kapoaka misarona, na ny volamena, na ny volafotsy, araka ny lanjany avy; '
  '18':
  - type: text
    content: 'ny lanjan’ny volamena voadio hanaovana ny alitara fandoroana ditin-kazo manitra; nomeny koa ny sarin’ny fiaran’Andriamanitra, dia ny '
  - type: text
    content: kerobima
  - type: text
    content: ' volamena, izay manana elatra mivelatra ka manaloka ny vata misy ny faneken’NY TOMPO. '
  '19':
  - type: text
    content: Izany asa rehetra araka ny sary izany, hoy Davida, no nampahafantarin’NY TOMPO ahy tamin’ny soratra avy tamin’ny tanany, izay atỳ amiko.
  '2':
  - type: text
    content: 'Dia nitsangana i Davida mpanjaka ka niteny hoe: Mihainoa ahy, ry rahalahiko sy ry vahoakako! Raha izaho, dia efa tato am-poko ny hanao trano fitsaharana ho an’ny vata misy ny faneken’NY TOMPO sy ho an’ny fitoeran-tongotr’Andriamanitsika. Efa nataoko vonona izay hoenti-manangana azy; '
  '20':
  - type: text
    content: 'Hoy koa i Davida tamin’i Solomona zanany: Mahereza sy matanjaha ka mahefà; aza matahotra na mivadi-po; fa NY TOMPO Andriamanitra, dia Andriamanitro, no momba anao; tsy handao na hahafoy anao Izy ambara-pahavitanao ny asa rehetra hanaovana ny tranon’NY TOMPO. '
  '21':
  - type: text
    content: Ary indreo, ny antokon’ny mpisorona sy ny levita dia hanao ny fanompoana rehetra ao amin’ny tranon’Andriamanitra; ao aminao koa dia misy hanampy amin’ny asa samihafa rehetra, dia ny olon-kendry izay manolo-tena mba hahavita ny fanompoana rehetra sy ny mpifehy ary ny vahoaka rehetra izay hankatò ny didinao.
  '3':
  - type: text
    content: 'nefa hoy Andriamanitra tamiko: Tsy hanao trano ho an’ny anarako ianao satria lehilahy mpiady sy mpandatsa-dra. '
  '4':
  - type: text
    content: 'Nefa kosa NY TOMPO, Andriamanitry ny Israely, efa nifidy ahy tamin’ny ankohonan’ny raiko rehetra ho mpanjakan’ny Israely mandrakizay; fa i Joda no nofidiny ho mpitondra, ary tamin’ny taranak’i Joda indray dia ny ankohonan’ny raiko no nofidiny; ary tamin’ny ankohonan’ny raiko dia izaho kosa no nankasitrahany ka nataony mpanjaka amin’ny Israely rehetra. '
  '5':
  - type: text
    content: 'Ary tamin’ny zanako rehetra, fa zanaka maro no nomen’NY TOMPO ahy, dia i Solomona zanako no nofidiny hipetraka amin’ny sezafiandrianan’ny fanjakan’NY TOMPO hanjaka amin’ny Israely. '
  '6':
  - type: text
    content: 'Ary hoy NY TOMPO tamiko: I Solomona zanakao no hanao ny tranoko sy ny kianjako, fa efa nifidy azy ho zanako Aho, ary Izaho ho rainy. '
  '7':
  - type: text
    content: 'Hampitoetra ny fanjakany ho mandrakizay Aho, raha maharitra mitandrina ny didiko sy ny fitsipiko mandrakariva tahaka ny amin’izao anio izao izy. '
  '8':
  - type: text
    content: 'Ary ankehitriny, eto anatrehan’ny Israely rehetra, dia ny fiangonan’NY TOMPO, sy eto anatrehan’Andriamanitsika, tandremo sy diniho ny didin’NY TOMPO Andriamanitrareo rehetra, mba hahatananareo ity tany soa ity sy hamelanareo azy ho lovan’ny zanakareo mandimby anareo mandrakizay. '
  '9':
  - type: text
    content: 'Ary ianao, ry Solomona zanako, fantaro ny Andriamanitry ny rainao ka manompoa Azy amin’ny fo manontolo sy ny fanahy mazoto; fa NY TOMPO dia mpandinika ny fo manontolo, ary ny fieritreretana rehetra dia fantany avokoa. Raha mitady Azy ianao dia hahita Azy; fa raha mahafoy Azy kosa ianao dia hariany mandrakizay. '
