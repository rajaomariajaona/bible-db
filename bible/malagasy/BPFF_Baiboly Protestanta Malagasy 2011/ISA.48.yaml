document_id: ISA.48,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antso, fananarana ary fampanantenana ho an’Israely
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa, ry taranak’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ianareo izay antsoina amin’ny anaran’Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy avy amin’ny loharanon’i Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo izay mianiana amin’ny anaran’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahatsiaro ny anaran’Andriamanitry ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy araka ny marina na araka ny hitsiny!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, nodioviko ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy toy ny volafotsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nizaha toetra anao tao amin’ny memin’ny fahoriana Aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny tenako; eny, noho ny tenako ihany no anaovako izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy, lotoina ny anarako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny voninahitro dia tsy homeko ny hafa.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa Ahy, ry Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ry Israely izay nantsoiko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho; eny, Izaho no voalohany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho koa no farany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tanako no nanorina ny fanambanin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanako ankavanana no namelatra ny lanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa antsoiko ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia indray miseho avokoa.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoria ianareo rehetra ka mihainoa!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza amin’ireny moa no mba efa nanambara izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay tian’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hahefa ny sitrapony amin’i Babilona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho amin’ny Kaldeana ny sandriny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia Izaho ihany no miteny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miantso azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitondra azy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hambinina ny lalany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manatòna Ahy ianareo ka mihainoa!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny taloha no efa tsy nitenenako tamin’ny mangingina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatry ny fony vao nisian’ireo zavatra ireo dia teo Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ankehitriny, NY TOMPO Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no naniraka Ahy miaraka amin’ny Fanahiny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no lazain’NY TOMPO Mpanavotra anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ny Iray Masin’ny Israely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho, TOMPO Andriamanitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nampianatra anao mba hahitanao soa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mitarika anao amin’ny lalana tokony halehanao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izay anie ianao mba nihaino ny didiko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tonga tahaka ny ony ny fiadananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tahaka ny onjan-dranomasina ny fahamarinanao;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka ny fasika ny taranakao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tahaka ny sombim-pasika ny aloaky ny kibonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho tapaka na ho foana eo anatrehako ny anarany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa milaza ny tenany ho avy amin’ny tanàna masina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miankina amin’Andriamanitry ny Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Tompon’izao rehetra izao, no anarany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoaha hiala any Babilona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandosira avy any amin’ny Kaldeana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torio amin’ny feo mahafaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ambarao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aelezo hatrany amin’ny faran’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka lazao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO efa nanavotra an’i Jakoba mpanompony!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nangetaheta ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny nitondrany azy tany an-tany efitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nampiboiboika rano ho azy avy tamin’ny vatolampy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nampitresaka ny vatolampy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nigororoana ny rano.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy fiadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny ratsy fanahy, hoy NY TOMPO.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zavatra taloha dia efa voalazako hatramin’ny fahiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: naloaky ny vavako izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nambarako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tampoka no nanaovako izany ary tanteraka ihany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria fantatro fa maditra ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hoza-by ny hatokao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary varahina ny handrinao,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nambarako taminao hatramin’ny fahiny izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, fony tsy mbola tonga aza izany dia efa nambarako taminao rahateo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fandrao hataonao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sampiko no nanao izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sarin-javatra voasokitra sy ny sarin-javatra voarendrika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nandidy izany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa renao ka jereo izany rehetra izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy hanambara izany va ianareo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampandre anao zava-baovao kosa Aho hatramin’izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia zavatra miafina izay tsy fantatrao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao izao no namoronana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hatramin’ny fahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mbola nandre azy ianao talohan’ny andro androany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fandrao lazainao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny efa fantatro ihany izany!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy nandre ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nahalala na inona na inona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hatramin’ny fahiny aza no tsy mbola nisokatra ny sofinao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fantatro fa tena mpivadika ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nantsoina hoe mpikomy hatrany an-kibo.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny anarako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mampitony ny fahatezerako Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mba hiderana Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia manindry fo ny aminao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hamongorana anao.
