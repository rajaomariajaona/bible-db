document_id: ISA.48,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Antso, fananarana ary fampanantenana ho an’Israely
  - type: text
    content: Mihainoa, ry taranak’i Jakoba,
  - type: text
    content: dia ianareo izay antsoina amin’ny anaran’Israely
  - type: text
    content: sy avy amin’ny loharanon’i Joda,
  - type: text
    content: ianareo izay mianiana amin’ny anaran’NY TOMPO
  - type: text
    content: ary mahatsiaro ny anaran’Andriamanitry ny Israely,
  - type: text
    content: kanefa tsy araka ny marina na araka ny hitsiny!
  '10':
  - type: text
    content: Indro, nodioviko ianao
  - type: text
    content: nefa tsy toy ny volafotsy;
  - type: text
    content: nizaha toetra anao tao amin’ny memin’ny fahoriana Aho.
  '11':
  - type: text
    content: Noho ny tenako; eny, noho ny tenako ihany no anaovako izany.
  - type: text
    content: Indrisy, lotoina ny anarako!
  - type: text
    content: Ny voninahitro dia tsy homeko ny hafa.
  '12':
  - type: text
    content: Mihainoa Ahy, ry Jakoba,
  - type: text
    content: sy ry Israely izay nantsoiko!
  - type: text
    content: Izaho; eny, Izaho no voalohany
  - type: text
    content: ary Izaho koa no farany.
  '13':
  - type: text
    content: Ny tanako no nanorina ny fanambanin’ny tany,
  - type: text
    content: ny tanako ankavanana no namelatra ny lanitra;
  - type: text
    content: rehefa antsoiko ireo
  - type: text
    content: dia indray miseho avokoa.
  '14':
  - type: text
    content: Mivoria ianareo rehetra ka mihainoa!
  - type: text
    content: Iza amin’ireny moa no mba efa nanambara izany?
  - type: text
    content: Ilay tian’NY TOMPO
  - type: text
    content: no hahefa ny sitrapony amin’i Babilona
  - type: text
    content: ary ho amin’ny Kaldeana ny sandriny.
  '15':
  - type: text
    content: Izaho dia Izaho ihany no miteny
  - type: text
    content: sady miantso azy,
  - type: text
    content: nitondra azy Aho
  - type: text
    content: ka hambinina ny lalany.
  '16':
  - type: text
    content: Manatòna Ahy ianareo ka mihainoa!
  - type: text
    content: Hatramin’ny taloha no efa tsy nitenenako tamin’ny mangingina,
  - type: text
    content: hatry ny fony vao nisian’ireo zavatra ireo dia teo Aho.
  - type: text
    content: Ary ankehitriny, NY TOMPO Andriamanitra
  - type: text
    content: no naniraka Ahy miaraka amin’ny Fanahiny.
  '17':
  - type: text
    content: Izao no lazain’NY TOMPO Mpanavotra anao,
  - type: text
    content: 'dia ny Iray Masin’ny Israely:'
  - type: text
    content: Izaho, TOMPO Andriamanitrao,
  - type: text
    content: no nampianatra anao mba hahitanao soa
  - type: text
    content: sady mitarika anao amin’ny lalana tokony halehanao.
  '18':
  - type: text
    content: Toy izay anie ianao mba nihaino ny didiko!
  - type: text
    content: Dia ho tonga tahaka ny ony ny fiadananao
  - type: text
    content: ary ho tahaka ny onjan-dranomasina ny fahamarinanao;
  '19':
  - type: text
    content: ho tahaka ny fasika ny taranakao
  - type: text
    content: ary ho tahaka ny sombim-pasika ny aloaky ny kibonao;
  - type: text
    content: tsy ho tapaka na ho foana eo anatrehako ny anarany.
  '2':
  - type: text
    content: Fa milaza ny tenany ho avy amin’ny tanàna masina izy
  - type: text
    content: ka miankina amin’Andriamanitry ny Israely;
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao, no anarany.
  '20':
  - type: text
    content: Mivoaha hiala any Babilona;
  - type: text
    content: mandosira avy any amin’ny Kaldeana!
  - type: text
    content: Torio amin’ny feo mahafaly
  - type: text
    content: ary ambarao,
  - type: text
    content: aelezo hatrany amin’ny faran’ny tany
  - type: text
    content: 'ka lazao hoe:'
  - type: text
    content: NY TOMPO efa nanavotra an’i Jakoba mpanompony!
  '21':
  - type: text
    content: Tsy nangetaheta ireo
  - type: text
    content: tamin’ny nitondrany azy tany an-tany efitra;
  - type: text
    content: nampiboiboika rano ho azy avy tamin’ny vatolampy Izy;
  - type: text
    content: eny, nampitresaka ny vatolampy Izy
  - type: text
    content: dia nigororoana ny rano.
  '22':
  - type: text
    content: Tsy misy fiadanana
  - type: text
    content: ho an’ny ratsy fanahy, hoy NY TOMPO.
  '3':
  - type: text
    content: Ny zavatra taloha dia efa voalazako hatramin’ny fahiny;
  - type: text
    content: naloaky ny vavako izany
  - type: text
    content: sady nambarako;
  - type: text
    content: tampoka no nanaovako izany ary tanteraka ihany.
  '4':
  - type: text
    content: Satria fantatro fa maditra ianao
  - type: text
    content: ka hoza-by ny hatokao,
  - type: text
    content: ary varahina ny handrinao,
  '5':
  - type: text
    content: dia nambarako taminao hatramin’ny fahiny izany;
  - type: text
    content: eny, fony tsy mbola tonga aza izany dia efa nambarako taminao rahateo,
  - type: text
    content: 'fandrao hataonao hoe:'
  - type: text
    content: Ny sampiko no nanao izany
  - type: text
    content: ary ny sarin-javatra voasokitra sy ny sarin-javatra voarendrika
  - type: text
    content: no nandidy izany.
  '6':
  - type: text
    content: Efa renao ka jereo izany rehetra izany!
  - type: text
    content: Moa tsy hanambara izany va ianareo?
  - type: text
    content: Mampandre anao zava-baovao kosa Aho hatramin’izao,
  - type: text
    content: dia zavatra miafina izay tsy fantatrao.
  '7':
  - type: text
    content: Vao izao no namoronana azy
  - type: text
    content: fa tsy hatramin’ny fahiny
  - type: text
    content: dia tsy mbola nandre azy ianao talohan’ny andro androany,
  - type: text
    content: 'fandrao lazainao hoe:'
  - type: text
    content: Indro, ny efa fantatro ihany izany!
  '8':
  - type: text
    content: Fa tsy nandre ianao
  - type: text
    content: na nahalala na inona na inona;
  - type: text
    content: eny, hatramin’ny fahiny aza no tsy mbola nisokatra ny sofinao.
  - type: text
    content: Fa fantatro fa tena mpivadika ianao
  - type: text
    content: sady nantsoina hoe mpikomy hatrany an-kibo.
  '9':
  - type: text
    content: Noho ny anarako
  - type: text
    content: dia mampitony ny fahatezerako Aho;
  - type: text
    content: ary mba hiderana Ahy
  - type: text
    content: dia manindry fo ny aminao Aho
  - type: text
    content: mba tsy hamongorana anao.
