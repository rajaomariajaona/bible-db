document_id: GEN.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahaterahan’Ismaela
  - type: text
    content: 'I Saray vadin’i Abrama dia tsy mba niteraka. Nanana mpanompovavy ejiptiana izy. Hagara no anarany. '
  '10':
  - type: text
    content: 'Hoy koa ilay Anjelin’NY TOMPO taminy: Hataoko maro be ny taranakao ka tsy ho azo isaina izany noho ny hamaroany. '
  '11':
  - type: text
    content: 'Hoy indray ilay Anjelin’NY TOMPO taminy:'
  - type: text
    content: Indro, manana anaka ianao
  - type: text
    content: ka hiteraka zazalahy,
  - type: text
    content: ary ny anarany dia hataonao hoe Ismaela
  - type: note
    content: 'Ismaela: Andriamanitra mihaino.'
  - type: text
    content: ','
  - type: text
    content: satria efa nihaino ny fahorianao NY TOMPO.
  '12':
  - type: text
    content: Ary ho lehilahy toy ny borikidia izy;
  - type: text
    content: hamely ny olona rehetra ny tanany
  - type: text
    content: ary hamely azy kosa ny tanan’ny olona rehetra;
  - type: text
    content: ary honina mifanatrika amin’ny rahalahiny rehetra izy.
  '13':
  - type: text
    content: 'Ary ny anaran’NY TOMPO izay niteny tamin’i Hagara dia nataony hoe: Ianao no Andriamanitra izay mahita, satria, hoy izy: Teto tokoa va no nahitako Azy taorianan’ny nahitany ahy? '
  '14':
  - type: text
    content: Izany no nanaovana ny lavaka fantsakana hoe Bera-Lahay-Roỳ
  - type: note
    content: 'Bera-Lahay-Roỳ: Fantsakan’ilay velona nahita ahy, na: Fantsakan’ilay velona na dia nahita aza.'
  - type: text
    content: '; eo anelanelan’i Kadesy sy i Bareda izy io. '
  '15':
  - type: text
    content: 'Ary i Hagara dia niteraka zazalahy tamin’i Abrama; ary ny anaran’ny zaza izay naterany dia nataon’i Abrama hoe Ismaela. '
  '16':
  - type: text
    content: Enina amby valopolo taona i Abrama raha niteraka an’Ismaela tamin’i Hagara.
  '2':
  - type: text
    content: 'Hoy i Saray tamin’i Abrama: Indro, efa tsy nanome zanaka ahy NY TOMPO; koa miangavy anao aho, vadio ny mpanompovaviko; angamba hahazo zaza aminy aho. Dia neken’i Abrama ny tenin’i Saray. '
  '3':
  - type: text
    content: 'Folo taona no nonenan’i Abrama teo amin’ny tany Kanana rehefa nalain’i Saray, vadin’i Abrama, i Hagara ejiptiana mpanompovaviny ka nomeny an’i Abrama vadiny mba hovadiny. '
  '4':
  - type: text
    content: 'Dia nivady tamin’i Hagara izy ka nanana anaka Ravehivavy. Rehefa hitan’ity farany fa manana anaka izy dia nataony toy ny tsinontsinona ny tompovaviny. '
  '5':
  - type: text
    content: 'Ary hoy i Saray tamin’i Abrama: Hanody anao anie ny manjo ahy! Izaho no nanome ny mpanompovaviko ho andefimandrinao, kanefa nony hitany fa manana anaka izy dia nataony toy ny tsinontsinona aho. NY TOMPO anie hitsara ahy sy ianao. '
  '6':
  - type: text
    content: 'Hoy i Abrama tamin’i Saray: Indro, eo am-pelatananao ny mpanompovavinao; ataovy izay tianao hatao aminy. Dia nampahorin’i Saray i Hagara ka nandositra niala teo aminy.'
  '7':
  - type: text
    content: 'Ary ny '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: ' nahita azy teo anilan’ny loharano iray tany an-tany efitra, teo anilan’ilay loharano eo amin’ny lalana mankany Sora. '
  '8':
  - type: text
    content: 'Hoy Izy: Ry Hagara, mpanompovavin’i Saray, avy taiza ianao, ary handeha ho aiza? Hoy Ravehivavy: Mandositra an’i Saray tompovaviko aho. '
  '9':
  - type: text
    content: 'Hoy ilay Anjelin’NY TOMPO taminy: Miverena any amin’ny tompovavinao ka miareta izay ataony aminao. '
