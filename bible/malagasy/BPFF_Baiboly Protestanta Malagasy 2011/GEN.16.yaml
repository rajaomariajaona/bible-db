document_id: GEN.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahaterahan’Ismaela
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Saray vadin’i Abrama dia tsy mba niteraka. Nanana mpanompovavy ejiptiana izy. Hagara no anarany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa ilay Anjelin’NY TOMPO taminy: Hataoko maro be ny taranakao ka tsy ho azo isaina izany noho ny hamaroany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray ilay Anjelin’NY TOMPO taminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, manana anaka ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiteraka zazalahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny anarany dia hataonao hoe Ismaela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ismaela: Andriamanitra mihaino.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa nihaino ny fahorianao NY TOMPO.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho lehilahy toy ny borikidia izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamely ny olona rehetra ny tanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamely azy kosa ny tanan’ny olona rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary honina mifanatrika amin’ny rahalahiny rehetra izy.
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ny anaran’NY TOMPO izay niteny tamin’i Hagara dia nataony hoe: Ianao no Andriamanitra izay mahita, satria, hoy izy: Teto tokoa va no nahitako Azy taorianan’ny nahitany ahy? '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izany no nanaovana ny lavaka fantsakana hoe Bera-Lahay-Roỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Bera-Lahay-Roỳ: Fantsakan’ilay velona nahita ahy, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fantsakan’ilay velona na dia nahita aza.
      marker-yv: yv-n
    - type: text
      text: '; eo anelanelan’i Kadesy sy i Bareda izy io. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary i Hagara dia niteraka zazalahy tamin’i Abrama; ary ny anaran’ny zaza izay naterany dia nataon’i Abrama hoe Ismaela. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Enina amby valopolo taona i Abrama raha niteraka an’Ismaela tamin’i Hagara.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Saray tamin’i Abrama: Indro, efa tsy nanome zanaka ahy NY TOMPO; koa miangavy anao aho, vadio ny mpanompovaviko; angamba hahazo zaza aminy aho. Dia neken’i Abrama ny tenin’i Saray. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Folo taona no nonenan’i Abrama teo amin’ny tany Kanana rehefa nalain’i Saray, vadin’i Abrama, i Hagara ejiptiana mpanompovaviny ka nomeny an’i Abrama vadiny mba hovadiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivady tamin’i Hagara izy ka nanana anaka Ravehivavy. Rehefa hitan’ity farany fa manana anaka izy dia nataony toy ny tsinontsinona ny tompovaviny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Saray tamin’i Abrama: Hanody anao anie ny manjo ahy! Izaho no nanome ny mpanompovaviko ho andefimandrinao, kanefa nony hitany fa manana anaka izy dia nataony toy ny tsinontsinona aho. NY TOMPO anie hitsara ahy sy ianao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Abrama tamin’i Saray: Indro, eo am-pelatananao ny mpanompovavinao; ataovy izay tianao hatao aminy. Dia nampahorin’i Saray i Hagara ka nandositra niala teo aminy.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anjelin’NY TOMPO
    - type: text
      text: ' nahita azy teo anilan’ny loharano iray tany an-tany efitra, teo anilan’ilay loharano eo amin’ny lalana mankany Sora. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Izy: Ry Hagara, mpanompovavin’i Saray, avy taiza ianao, ary handeha ho aiza? Hoy Ravehivavy: Mandositra an’i Saray tompovaviko aho. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ilay Anjelin’NY TOMPO taminy: Miverena any amin’ny tompovavinao ka miareta izay ataony aminao. '
