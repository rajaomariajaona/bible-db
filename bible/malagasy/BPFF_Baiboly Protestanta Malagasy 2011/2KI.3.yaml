document_id: 2KI.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jehorama, mpanjakan’ny Israely
  - type: text
    content: 'I Jehorama, zanak’i Ahaba, dia nanomboka nanjaka tamin’ny Israely tao Samaria tamin’ny fahavalo amby folo taona nanjakan’i Josafata, mpanjakan’ny Joda; ary nanjaka nandritra ny roa amby folo taona izy. '
  '10':
  - type: text
    content: 'Dia hoy ny mpanjakan’ny Israely: Indrisy! NY TOMPO efa niantso ireto mpanjaka telo ireto mba hatolony eo an-tanan’i Moaba! '
  '11':
  - type: text
    content: 'Ary hoy i Josafata: Tsy misy mpaminanin’NY TOMPO va eto mba hanontaniantsika amin’NY TOMPO? Dia nisy iray tamin’ny mpanompon’ny mpanjakan’ny Israely namaly hoe: Ato ihany i Elisa, zanak’i Safata, ilay mpanondraka rano ny tanan’i Elia. '
  '12':
  - type: text
    content: 'Hoy i Josafata: Ao amin’izy io tokoa ny tenin’NY TOMPO. Dia nidina nankany amin’i Elisa ny mpanjakan’ny Israely sy i Josafata ary ny mpanjakan’i Edoma. '
  '13':
  - type: text
    content: 'Ary hoy i Elisa tamin’ny mpanjakan’ny Israely: Moa mifaninona akory izaho sy ianao? Mandehana any amin’ny mpaminanin’ny rainao sy ny mpaminanin’ny reninao. Nefa hoy ny mpanjakan’ny Israely taminy: Tsia, fa NY TOMPO efa niantso ireto mpanjaka telo ireto mba hatolony eo an-tanan’i Moaba. '
  '14':
  - type: text
    content: 'Dia hoy i Elisa: Raha velona koa Andriamanitra, Tompon’izao rehetra izao, izay tompoiko, raha tsy noho ny fanajako an’i Josafata, mpanjakan’ny Joda, dia tsy hanatrika anao na hijery anao akory aho. '
  '15':
  - type: text
    content: 'Nefa itondray mpitendry lokanga aho. Rehefa nitendry ilay mpitendry lokanga dia nanindry an’i Elisa ny tanan’NY TOMPO. '
  '16':
  - type: text
    content: 'Ary hoy izy: Izao no lazain’NY TOMPO: Ataovy feno lavaka ity lohasahan-driaka ity! '
  '17':
  - type: text
    content: 'Fa hoy NY TOMPO: Tsy hahita rivotra na ranonorana akory ianareo; nefa ho feno rano io lohasahan-driaka io mba hosotroinareo, dia ianareo sy ny ombinareo ary ny biby fiompinareo. '
  '18':
  - type: text
    content: 'Ho zavatra kely ihany eo imason’NY TOMPO izany, fa hanolotra ny Moabita eo an-tananareo koa Izy. '
  '19':
  - type: text
    content: 'Ary handrava ny tanàna mimanda rehetra sy ny tanàna lehibe rehetra ianareo sady hikapa ny hazo tsara rehetra sy hanampina ny loharano rehetra sady hanipy vato amin’ny tany soa rehetra ho fanimbana azy. '
  '2':
  - type: text
    content: 'Nanao izay ratsy teo imason’NY TOMPO koa izy, nefa tsy dia tahaka ny rainy kosa na tahaka ny reniny. Nanaisotra ilay tsangambaton’ny '
  - type: text
    content: Baala
  - type: text
    content: ' izay nataon’ny rainy izy; '
  '20':
  - type: text
    content: Nony maraina, tokony ho tamin’ny fotoana fanolorana ny fanatitra, dia indro, nisy rano tokoa tonga avy tamin’ny lalana mankany Edoma ka feno rano ny tany.
  '21':
  - type: text
    content: 'Nony ren’ny Moabita rehetra fa tamy miakatra hiady aminy ireo mpanjaka ireo dia nivory izy, hatramin’izay rehetra nahatam-piadiana no ho miakatra, dia niandry teo amin’ny sisintaniny. '
  '22':
  - type: text
    content: 'Ary nony nifoha vao maraina ny Moabita, sady efa niposaka ny masoandro ka nitaratra tamin’ny rano, dia hitany ny rano tandrifiny fa mena tahaka ny ra. '
  '23':
  - type: text
    content: 'Dia hoy izy: Ra io! Efa nifandringana tokoa ireo mpanjaka ireo ary efa nifamely izy rehetra; koa baboy amin’izao, ry Moaba! '
  '24':
  - type: text
    content: 'Kanjo nony efa tonga teo an-tobin’ny Israely izy dia nitsangana ny Israely ka namely ny Moabita, dia nandositra teo anoloany ireo; fa niditra hatrany amin’ny tanin’ny Moabita ny Israely ka mbola namely azy ihany. '
  '25':
  - type: text
    content: 'Dia nandrava ny tanàna izy ary samy nanipy vato tamin’ny tany soa rehetra ka nahafeno azy, ary nanampina ny loharano rehetra koa izy sady nikapa ny hazo tsara rehetra. Nony farany, tsy nisy vato intsony afa-tsy ny tao Kira-Haresa ihany; ary na dia io aza dia nohodidinin’ny mpandefa antsamotady ka nasiany. '
  '26':
  - type: text
    content: 'Rehefa hitan’ny mpanjakan’i Moaba fa tsy tohany ny ady dia nitondra fitonjato lahy nahay sabatra nomba azy izy mba hanavatsava hatrany amin’ny mpanjakan’i Edoma, nefa tsy afaka izy ireo. '
  '27':
  - type: text
    content: Dia nalainy ny zanany lahimatoa izay natao hanjaka handimby azy ka natolony ho fanatitra dorana manontolo teo ambonin’ny manda. Dia niharan’ny fahatezerana mafy ny Israely ka niala taminy ary niverina ho any amin’ny taniny.
  '3':
  - type: text
    content: nefa izy dia nikikitra tamin’ny fahotan’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely fa tsy niala tamin’izany.
  - type: heading
    content: Fanafihana an’i Moaba
  '4':
  - type: text
    content: 'Ary i Mesa, mpanjakan’i Moaba dia nanana ondry betsaka; ary nandoa hetra ho an’ny mpanjakan’ny Israely izy, dia zanak’ondry iray hetsy sy ondrilahy iray hetsy mbamin’ny volon’ondry avy aminy. '
  '5':
  - type: text
    content: 'Fa rehefa maty i Ahaba dia nikomy tamin’ny mpanjakan’ny Israely ny mpanjakan’i Moaba. '
  '6':
  - type: text
    content: 'Ary niainga avy tany Samaria i Jehorama mpanjaka tamin’izany andro izany ka nandamina ny Israely rehetra. '
  '7':
  - type: text
    content: 'Nandeha izy, dia nandefa iraka ho any amin’i Josafata, mpanjakan’ny Joda hilaza hoe: Nikomy tamiko ny mpanjakan’i Moaba. Koa mba hiaraka amiko va ianao hiady aminy? Hoy i Josafata: Eny, handeha aho, fa tahaka ny tenanao ihany aho, koa ny oloko dia olonao, ary ny soavaliko dia soavalinao. '
  '8':
  - type: text
    content: 'Hoy koa izy: Aiza ary no lalana halehantsika? Dia namaly i Jehorama hoe: Ilay mamakivaky ny tany efitr’i Edoma.'
  '9':
  - type: text
    content: 'Dia nandeha ny mpanjakan’ny Israely sy ny mpanjakan’ny Joda ary ny mpanjakan’i Edoma; nandeha nanodidina lalan-kafitoana izy; ary tsy nisy rano ho an’ny miaramila sy ny biby fiompy izay noentiny. '
