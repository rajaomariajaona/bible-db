document_id: LUK.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo Galiliana novonoin’i Pilato
  - type: text
    content: 'Tamin’izany andro izany dia nisy ny sasany teo izay nanambara tamin’i Jesosy ny nanjo ireo Galiliana izay naharoharon’i Pilato tamin’ny fanatiny ny rany. '
  '10':
  - type: text
    content: 'Nampianatra tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' iray Jesosy tamin’ny '
  - type: text
    content: Sabata
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ary indro, nisy vehivavy izay nanana fanahy mahafarofy nandritra ny valo amby folo taona; nanjoko izy ka tsy afa-nitraka mihitsy. '
  '12':
  - type: text
    content: 'Rehefa nahita azy Jesosy dia niantso azy ka niteny hoe: Ravehivavy, afaka amin’ny rofinao ianao. '
  '13':
  - type: text
    content: Dia nametraka ny tanany taminy Izy; ary niaraka tamin’izay dia nitraka Ravehivavy ka nankalaza an’Andriamanitra.
  '14':
  - type: text
    content: 'Tezitra anefa ny mpanapaka ny sinagoga satria nanasitrana tamin’ny Sabata Jesosy ka niteny tamin’ny vahoaka hoe: Henemana no azo anaovan-draharaha; koa mandritra izany no tongava hositranina fa tsy amin’ny andro Sabata. '
  '15':
  - type: text
    content: 'Fa ny Tompo namaly azy hoe: Ry mpihatsaravelatsihy, moa tsy samy mamaha ny ombiny na ny borikiny hiala amin’ny fihinanam-bilona va ianareo amin’ny Sabata ka mitondra azy hisotro rano? '
  '16':
  - type: text
    content: 'Koa ity vehivavy zanak’i Abrahama ity, izay efa nafatotr’i Satana nandritra ny valo amby folo taona, moa tsy tokony hovahana ho afaka amin’izany fatorana izany amin’ny andro Sabata va? '
  '17':
  - type: text
    content: Ary raha nilaza izany Izy dia nangaihay izay rehetra nanohitra Azy; fa ny vahoaka rehetra dia nifaly noho ny zavatra malaza rehetra izay nataony.
  - type: heading
    content: Fanoharana ny amin’ny voantsinapy
  - type: heading
    content: Mat 13.31-32; Mar 4.30-32
  '18':
  - type: text
    content: 'Dia hoy Jesosy: Tahaka ny inona ny fanjakan’Andriamanitra? Ary inona no hanoharako azy? '
  '19':
  - type: text
    content: Tahaka ny voantsinapy izy, izay nalain’olona ka namboleny tao an-tanimboly, ary naniry ka tonga hazo; ary ny voromanidina dia nanorina ny akaniny teo amin’ny rantsany.
  - type: heading
    content: Fanoharana ny amin’ny masirasira
  - type: heading
    content: Mat 13.33
  '2':
  - type: text
    content: 'Fa Jesosy namaly azy hoe: Heverinareo va fa ireny Galiliana ireny no mpanota mihoatra noho ny Galiliana rehetra satria niharan’izany zavatra izany? '
  '20':
  - type: text
    content: 'Hoy koa Jesosy: Inona no hanoharako ny fanjakan’Andriamanitra? '
  '21':
  - type: text
    content: Tahaka ny masirasira izy, izay nalain’ny vehivavy iray ka nafangarony tamin’ny koba intelon’ny famarana, mandra-pahazon’ny masirasira azy rehetra.
  - type: heading
    content: Ilay varavarana ety
  '22':
  - type: text
    content: Nandeha nitety tanàna sy vohitra Jesosy ka nampianatra sady nandroso hankany Jerosalema.
  '23':
  - type: text
    content: 'Dia hoy ny olona iray taminy: Tompoko, moa vitsy va no hovonjena? Ary hoy Izy tamin’ny olona: '
  '24':
  - type: text
    content: 'Misisiha hiditra amin’ny varavarana ety ianareo; fa hoy Aho aminareo: Maro no hitady hiditra fa tsy ho afaka. '
  '25':
  - type: text
    content: 'Raha vao mitsangana ny tompon-trano ka manidy ny varavarana, ary mijanona eo alatrano ianareo ka manomboka mandondòna ny varavarana ka miteny hoe: Tompoko, vohay izahay! Dia hamaly Izy ka hilaza aminareo hoe: Tsy fantatro na avy taiza na avy taiza ianareo; '
  '26':
  - type: text
    content: 'ary amin’izay ianareo dia hilaza hoe: Nihinana sy nisotro teo anatrehanao izahay ary nampianatra teny an-dalambenay Ianao. '
  '27':
  - type: text
    content: 'Fa Izy hiteny aminareo hoe: Tsy fantatro na avy taiza na avy taiza ianareo; mialà amiko, ianareo rehetra mpanao heloka. '
  '28':
  - type: text
    content: 'Any no hisy ny fitomaniana sy ny fikitroha-nify, rehefa mahita an’i Abrahama sy Isaka ary i Jakoba sy ny mpaminany rehetra eo amin’ny fanjakan’Andriamanitra ianareo, fa ianareo kosa dia voaroaka any ivelany. '
  '29':
  - type: text
    content: 'Ary ho tonga ny avy any atsinanana sy ny avy any andrefana ary ny avy any avaratra sy ny avy any atsimo ka hipetraka hisakafo eo amin’ny fanjakan’Andriamanitra. '
  '3':
  - type: text
    content: 'Tsia, hoy Aho aminareo; fa raha tsy mibebaka ianareo rehetra dia ho ringana toy izany koa. '
  '30':
  - type: text
    content: Ary indro, misy izay farany ho voalohany ary izay voalohany ho farany.
  - type: heading
    content: Jesosy sy Jerosalema
  '31':
  - type: text
    content: 'Tamin’izany ora izany indrindra dia nisy '
  - type: text
    content: Fariseo
  - type: text
    content: ' sasany nankeo amin’i Jesosy ka niteny taminy hoe: Mandehana Ianao ka mialà eto; fa ta hamono Anao i Heroda. '
  '32':
  - type: text
    content: 'Fa hoy Izy taminy: Mandehana, lazao amin’izany amboahaolo izany hoe: Indro, mandroaka '
  - type: text
    content: demonia
  - type: text
    content: ' sy manasitrana Aho anio sy ampitso, ary raha afaka ampitso dia hotanterahina ny Amiko. '
  '33':
  - type: text
    content: Kanefa tsy maintsy mandeha ihany Aho anio sy ampitso ary raha afaka ampitso; fa ny mpaminany dia tsy azo vonoina, raha tsy any Jerosalema.
  - type: heading
    content: Mat 23.37-39
  '34':
  - type: text
    content: 'Ry Jerosalema, ry Jerosalema, izay mamono ny mpaminany sy mitora-bato izay nirahina ho any aminao, impiry Aho no ta hanangona ny zanakao tahaka ny fanòmban’ny akoho ny zanany ao ambanin’ny elany fa tsy nety ianareo! '
  '35':
  - type: text
    content: 'Indro, avela ho lao ny tranonareo! Ary lazaiko aminareo: Tsy hahita Ahy intsony ianareo mandra-pilazanareo hoe: «Isaorana anie Izay avy amin’ny anaran’NY TOMPO» (Sal 118.26).'
  '4':
  - type: text
    content: 'Ary ireny valo amby folo ireny, izay nianjeran’ny tilikambo tao Siloama ka maty, heverinareo va fa mpanota mihoatra noho ny olona rehetra izay monina ao Jerosalema ireny? '
  '5':
  - type: text
    content: Tsia, hoy Aho aminareo; fa raha tsy mibebaka ianareo rehetra dia ho ringana tahaka izany koa.
  - type: heading
    content: Fanoharana ny amin’ilay aviavy tsy namoa
  '6':
  - type: text
    content: 'Nilaza ity fanoharana ity koa Izy hoe: Nisy olona nanana aviavy nambolena teo amin’ny tanim-boalobony; dia nankeo izy nitady voa taminy fa tsy nahita. '
  '7':
  - type: text
    content: 'Dia hoy izy tamin’ny mpikarakara ny tanim-boaloboka: Indro, efa telo taona izay aho no tonga nitady voa tamin’ity aviavy ity fa tsy nahita; kapao io; nahoana io no manimba ny tany? '
  '8':
  - type: text
    content: 'Fa namaly ny mpikarakara hoe: Tompoko, avelao ihany izy amin’ity taona ity mandra-pihadiko manodidina azy ka hasiako zezika; '
  '9':
  - type: text
    content: mety mbola hamoa izy; fa raha tsy izany dia hokapainao ihany.
  - type: heading
    content: Ny nanasitranan’i Jesosy vehivavy kilemaina iray tamin’ny andro Sabata
