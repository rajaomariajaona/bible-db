document_id: LUK.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo Galiliana novonoin’i Pilato
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany dia nisy ny sasany teo izay nanambara tamin’i Jesosy ny nanjo ireo Galiliana izay naharoharon’i Pilato tamin’ny fanatiny ny rany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa Jesosy namaly azy hoe: Heverinareo va fa ireny Galiliana ireny no mpanota mihoatra noho ny Galiliana rehetra satria niharan’izany zavatra izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsia, hoy Aho aminareo; fa raha tsy mibebaka ianareo rehetra dia ho ringana toy izany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ireny valo amby folo ireny, izay nianjeran’ny tilikambo tao Siloama ka maty, heverinareo va fa mpanota mihoatra noho ny olona rehetra izay monina ao Jerosalema ireny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsia, hoy Aho aminareo; fa raha tsy mibebaka ianareo rehetra dia ho ringana tahaka izany koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ilay aviavy tsy namoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nilaza ity fanoharana ity koa Izy hoe: Nisy olona nanana aviavy nambolena teo amin’ny tanim-boalobony; dia nankeo izy nitady voa taminy fa tsy nahita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy izy tamin’ny mpikarakara ny tanim-boaloboka: Indro, efa telo taona izay aho no tonga nitady voa tamin’ity aviavy ity fa tsy nahita; kapao io; nahoana io no manimba ny tany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa namaly ny mpikarakara hoe: Tompoko, avelao ihany izy amin’ity taona ity mandra-pihadiko manodidina azy ka hasiako zezika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: mety mbola hamoa izy; fa raha tsy izany dia hokapainao ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanasitranan’i Jesosy vehivavy kilemaina iray tamin’ny andro Sabata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nampianatra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' iray Jesosy tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary indro, nisy vehivavy izay nanana fanahy mahafarofy nandritra ny valo amby folo taona; nanjoko izy ka tsy afa-nitraka mihitsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa nahita azy Jesosy dia niantso azy ka niteny hoe: Ravehivavy, afaka amin’ny rofinao ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nametraka ny tanany taminy Izy; ary niaraka tamin’izay dia nitraka Ravehivavy ka nankalaza an’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tezitra anefa ny mpanapaka ny sinagoga satria nanasitrana tamin’ny Sabata Jesosy ka niteny tamin’ny vahoaka hoe: Henemana no azo anaovan-draharaha; koa mandritra izany no tongava hositranina fa tsy amin’ny andro Sabata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa ny Tompo namaly azy hoe: Ry mpihatsaravelatsihy, moa tsy samy mamaha ny ombiny na ny borikiny hiala amin’ny fihinanam-bilona va ianareo amin’ny Sabata ka mitondra azy hisotro rano? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa ity vehivavy zanak’i Abrahama ity, izay efa nafatotr’i Satana nandritra ny valo amby folo taona, moa tsy tokony hovahana ho afaka amin’izany fatorana izany amin’ny andro Sabata va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary raha nilaza izany Izy dia nangaihay izay rehetra nanohitra Azy; fa ny vahoaka rehetra dia nifaly noho ny zavatra malaza rehetra izay nataony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny voantsinapy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 13.31-32; Mar 4.30-32
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy Jesosy: Tahaka ny inona ny fanjakan’Andriamanitra? Ary inona no hanoharako azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tahaka ny voantsinapy izy, izay nalain’olona ka namboleny tao an-tanimboly, ary naniry ka tonga hazo; ary ny voromanidina dia nanorina ny akaniny teo amin’ny rantsany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny masirasira
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 13.33
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy koa Jesosy: Inona no hanoharako ny fanjakan’Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tahaka ny masirasira izy, izay nalain’ny vehivavy iray ka nafangarony tamin’ny koba intelon’ny famarana, mandra-pahazon’ny masirasira azy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay varavarana ety
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nandeha nitety tanàna sy vohitra Jesosy ka nampianatra sady nandroso hankany Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy ny olona iray taminy: Tompoko, moa vitsy va no hovonjena? Ary hoy Izy tamin’ny olona: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Misisiha hiditra amin’ny varavarana ety ianareo; fa hoy Aho aminareo: Maro no hitady hiditra fa tsy ho afaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha vao mitsangana ny tompon-trano ka manidy ny varavarana, ary mijanona eo alatrano ianareo ka manomboka mandondòna ny varavarana ka miteny hoe: Tompoko, vohay izahay! Dia hamaly Izy ka hilaza aminareo hoe: Tsy fantatro na avy taiza na avy taiza ianareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary amin’izay ianareo dia hilaza hoe: Nihinana sy nisotro teo anatrehanao izahay ary nampianatra teny an-dalambenay Ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa Izy hiteny aminareo hoe: Tsy fantatro na avy taiza na avy taiza ianareo; mialà amiko, ianareo rehetra mpanao heloka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Any no hisy ny fitomaniana sy ny fikitroha-nify, rehefa mahita an’i Abrahama sy Isaka ary i Jakoba sy ny mpaminany rehetra eo amin’ny fanjakan’Andriamanitra ianareo, fa ianareo kosa dia voaroaka any ivelany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ho tonga ny avy any atsinanana sy ny avy any andrefana ary ny avy any avaratra sy ny avy any atsimo ka hipetraka hisakafo eo amin’ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary indro, misy izay farany ho voalohany ary izay voalohany ho farany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tamin’izany ora izany indrindra dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' sasany nankeo amin’i Jesosy ka niteny taminy hoe: Mandehana Ianao ka mialà eto; fa ta hamono Anao i Heroda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa hoy Izy taminy: Mandehana, lazao amin’izany amboahaolo izany hoe: Indro, mandroaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' sy manasitrana Aho anio sy ampitso, ary raha afaka ampitso dia hotanterahina ny Amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Kanefa tsy maintsy mandeha ihany Aho anio sy ampitso ary raha afaka ampitso; fa ny mpaminany dia tsy azo vonoina, raha tsy any Jerosalema.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 23.37-39
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ry Jerosalema, ry Jerosalema, izay mamono ny mpaminany sy mitora-bato izay nirahina ho any aminao, impiry Aho no ta hanangona ny zanakao tahaka ny fanòmban’ny akoho ny zanany ao ambanin’ny elany fa tsy nety ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Indro, avela ho lao ny tranonareo! Ary lazaiko aminareo: Tsy hahita Ahy intsony ianareo mandra-pilazanareo hoe: «Isaorana anie Izay avy amin’ny anaran’NY TOMPO» (Sal 118.26).'
