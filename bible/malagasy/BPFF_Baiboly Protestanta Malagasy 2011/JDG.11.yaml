document_id: JDG.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tonga mpitarika ny Israely i Jefta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jefta gileadita dia lehilahy mahery; zanaky ny vehivavy janga izy, ary i Gileada no rainy niteraka azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo loholon’i Gileada tamin’i Jefta: NY TOMPO no ho vavolombelona amintsika raha tsy manatanteraka araka izany teninao izany izahay. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandeha i Jefta niaraka tamin’ireo loholon’i Gileada ka nasandratry ny vahoaka ho lohany sy ho mpitarika azy izy. Ary nilaza ny teniny rehetra teo anatrehan’NY TOMPO tao Mizpa i Jefta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo hafatra nataon’i Jefta tamin’ny Amonita
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka ho any amin’ny mpanjakan’ny Amonita i Jefta hilaza hoe: Moa mifaninona akory izaho sy ianao no tonga atỳ amiko hiady amin’ny taniko ianao? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny mpanjakan’ny Amonita tamin’ireo irak’i Jefta: Satria nalain’Israely ny taniko hatrany Arnona ka hatrany Jaboka ary hatrany Jordana, fony izy niakatra avy tany Ejipta. Koa avereno amin’ny fihavanana ary izany ankehitriny.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka ho any amin’ny mpanjakan’ny Amonita indray i Jefta '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hilaza hoe: Izao no lazain’i Jefta: Ny Israely dia tsy naka ny tanin’i Moaba na ny tanin’ny Amonita. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fony niakatra avy tany Ejipta ny Israely dia nandeha nitety ny efitra hatrany amin’ny Ranomasina Mena izy ka tonga tany Kadesy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka ho any amin’ny mpanjakan’i Edoma ny Israely hiteny hoe: Aoka mba handeha hamakivaky ny taninao aho. Tsy nety nihaino izany anefa ny mpanjakan’i Edoma. Ary nandefa iraka tany amin’ny mpanjakan’i Moaba koa izy fa tsy nety koa io. Dia nitoetra tany Kadesy ny Israely. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha nitety ny tany efitra izy ka nanodidina ny tany Edoma sy ny tany Moaba, dia tonga teo atsinanan’i Moaba ka nitoby teo andafin’i Arnona, satria tsy niditra tao anatin’ny faritanin’i Moaba izy; fa i Arnona no sisintanin’i Moaba. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Israely dia nandefa iraka tany amin’i Sihona, mpanjakan’ny Amorita, izay mpanjakan’i Hesbona; hoy ny Israely taminy: Aoka mba handeha hamakivaky ny taninao izahay hankany amin’ny fonenanay. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vadin’i Gileada dia niteraka zazalahy maro taminy. Nony efa lehibe ireo zana-badiny ireo dia nandroaka an’i Jefta ka niteny taminy hoe: Tsy handova eto amin’ny taranaky ny rainay ianao fa zanaky ny vehivavy hafa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Sihona dia tsy natoky an’Israely ka tsy namela azy hamakivaky ny faritaniny, fa namory ny vahoakany rehetra izy, dia nitoby tany Jahaza ka niady tamin’ny Israely. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO, Andriamanitry ny Israely, nanolotra an’i Sihona sy ny vahoakany rehetra teo an-tanan’ny Israely ka namely azy ireo. Dia azon’ny Israely ny tanin’ny Amorita rehetra izay mponina tany amin’izany tany izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahazo ny tanin’ny Amorita rehetra izy, hatrany Arnona ka hatrany Jaboka, ary hatrany amin’ny tany efitra ka hatrany Jordana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, NY TOMPO, Andriamanitry ny Israely, no efa nandroaka ny Amorita teo anoloan’ny Israely olony, ary ianao kosa va dia ta haka ny tany? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hotananao va izay tany omen’i Kemosy andriamanitrao anao? Ary izay tany rehetra omen’NY TOMPO Andriamanitray anay dia mba hotananay kosa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa tsara noho i Balaka, zanak’i Zipora, mpanjakan’i Moaba, va ianao? Moa nanohitra ny Israely na niady taminy akory va izy? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nitoetra nandritra ny telonjato taona tany Hesbona mbamin’ireo vohitra miankina aminy sy tany Aroera mbamin’ireo vohitra miankina aminy ary tany amin’ny tanàna rehetra eny amoron’i Arnona ny Israely, nahoana no tsy nalainareo ny tany tamin’izany andro izany? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nanota taminao aho fa ianao no manisy ratsy ahy amin’ny iadianao amiko. Aoka NY TOMPO Mpitsara no hitsara ny Zanak’Israely sy ny Amonita anio. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy nohenoin’ny mpanjakan’ny Amonita anefa ny tenin’i Jefta izay nampitondrainy tany aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny voady nataon’i Jefta
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamin’i Jefta ny Fanahin’NY TOMPO, dia nandeha nitety an’i Gileada sy Manase izy; nitety an’i Mizpa any Gileada koa izy ka niala tany Mizpa any Gileada, dia nandroso nankany amin’ny Amonita. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nandositra ny rahalahiny i Jefta ka nonina tany amin’ny tany Toba; dia nisy olom-poana maromaro nanara-dia an’i Jefta ka niara-nanafika taminy.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nivoady tamin’NY TOMPO i Jefta ka niteny hoe: Raha atolotrao eo an-tanako tokoa ny Amonita '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia ho an’NY TOMPO izay mivoaka amin’ny varavaran’ny tranoko hitsena ahy rehefa miverina soa amantsara avy any amin’ny Amonita aho, ary hatolotro ho fanatitra dorana manontolo izany.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha i Jefta nankany amin’ny Amonita mba hiady aminy ary natolotry NY TOMPO teo an-tanany ireo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia namely azy hatrany Aroera ka hatrany akaikin’i Minita, dia tanàna roapolo, ary hatrany Abela-Keramima, ka be dia be no maty. Voaetry teo anoloan’ny Zanak’Israely ny Amonita.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tonga tany Mizpa ho any an-tranony i Jefta, dia indro, nivoaka hitsena azy ny zanany vavy nitondra ampongatapaka sy mpandihy. Vavy tokany izy io fa tsy nanana zanakalahy na zanakavavy afa-tsy io izy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa rehefa nahita azy i Jefta dia nandriatra ny fitafiany ka niteny hoe: Indrisy, ry zanako vavy! Tena mitondra fahoriana ho ahy ianao! Isan’izay mampidi-doza ahy ianao! Fa efa niloa-bava tamin’NY TOMPO aho ka tsy azoko iverenana intsony izany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny zanany vavy taminy: Ry dada ô, raha niloa-bava tamin’NY TOMPO ary ianao dia ataovy amiko araka izay naloaky ny vavanao satria NY TOMPO efa namaly anao tamin’ny Amonita fahavalonao. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa izy tamin’ny rainy: Izao no aoka hatao amiko: Aza maninona ahy aloha hatramin’ny roa volana fa handehandeha hankeny amin’ny havoana aho ka hitomany miaraka amin’ny namako noho izaho mbola tsy nanambady akory. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa ny rainy: Mandehana ary! Dia namela azy handeha roa volana izy. Dia nandeha Razazavavy sy ny namany ka nitomany teny amin’ny havoana noho izy tsy mbola nanambady akory. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tapitra ny roa volana dia niverina tany amin’ny rainy izy ka nataony taminy araka ny voadiny izay nataony. Tsy mbola nahalala lahy na oviana na oviana izy. Hatramin’izay dia tonga fanao teo amin’ny Israely '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka elaela dia nanafika ny Zanak’Israely ny Amonita. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny fandehanan’ny zazavavin’ny Israely isan-taona hankalaza ny zanakavavin’i Jefta gileadita, hefarana isan-taona.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nanafika ny Israely ny Amonita dia nandeha ny loholon’i Gileada haka an’i Jefta avy tany amin’ny tany Toba. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy ireo taminy: Avia, aoka ianao no ho mpitarika anay mba hiadiantsika amin’ny Amonita. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jefta tamin’ireo loholon’i Gileada: Tsy ianareo va no nankahala ahy ka nandroaka ahy hiala tao amin’ny tranon’ny raiko? Koa nahoana no mankaty amiko indray ianareo ankehitriny rehefa azom-pahoriana?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo loholon’i Gileada tamin’i Jefta: Izany no iverenanay atỳ aminao ankehitriny, mba handehananao miaraka aminay, ka hiadianao amin’ny Amonita, dia ho lohany aminay mponina rehetra any Gileada ianao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jefta tamin’ny loholon’i Gileada: Raha hoentinareo mody indray aho mba hiady amin’ny Amonita ka hatolotry NY TOMPO eo anoloako ireny, dia izaho hoe no ho lohany aminareo? '
