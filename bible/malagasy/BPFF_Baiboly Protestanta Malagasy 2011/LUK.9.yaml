document_id: LUK.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanirahan’i Jesosy ny roa amby folo lahy
  - type: heading
    content: Mat 10.1-14; Mar 6.7-13
  - type: text
    content: 'Niantso ny roa amby folo lahy hankeo Aminy Jesosy ka nanome azy hery sy fahefana handroaka ny '
  - type: text
    content: demonia
  - type: text
    content: ' rehetra sy hanasitrana aretina. '
  '10':
  - type: text
    content: Rehefa niverina ny Apostoly dia nanambara tamin’i Jesosy izay efa nataony.
  - type: text
    content: 'Ary nitondra azy ireo Izy ka nandeha nitokana nankany amin’ny tanàna atao hoe Betsaida. '
  '11':
  - type: text
    content: Nony nahafantatra ny vahoaka dia nanaraka Azy; dia nandray azy ireo tsara Izy ka nilaza taminy ny amin’ny fanjakan’Andriamanitra; ary izay marary dia nositraniny.
  '12':
  - type: text
    content: 'Rehefa ho hariva ny andro dia nanatona ny roa amby folo lahy ka niteny Taminy hoe: Ampodio ny vahoaka mba hankanesany eny amin’ny tanàna manodidina sy any amin’ny vohitra mba hiditra an-trano sy hitady sakafo, fa atỳ an-tany efitra isika. '
  '13':
  - type: text
    content: 'Fa hoy Izy taminy: Omeonareo hanina izy. Ary hoy ireo: Tsy manana mihoatra noho ny mofo dimy sy hazandrano roa izahay, raha tsy hoe handeha hividy sakafo ho an’ireo olona rehetra ireo. '
  '14':
  - type: text
    content: 'Fa tokony ho dimy arivo lahy ireo. Ary hoy Izy tamin’ny mpianany: Asaivo mipetraka mitsitokotoko tokony ho dimampolo avy izy ireo. '
  '15':
  - type: text
    content: 'Dia nataony izany ka nasainy nipetraka izy rehetra. '
  '16':
  - type: text
    content: 'Ary rehefa noraisin’i Jesosy ny mofo dimy sy ny hazandrano roa dia niandrandra ny lanitra Izy ka nisaotra, dia novakiny ka natolony ny mpianany harosony eny amin’ny vahoaka. '
  '17':
  - type: text
    content: Dia nihinana izy rehetra ka voky; ary nangonina izay sombintsombiny sisa tsy lany ka nisy roa amby folo harona.
  - type: heading
    content: Ny naneken’i Petera an’i Jesosy ho Kristy
  - type: heading
    content: Mat 16.13-20; Mar 8.27-30; ampit. Jao 6.67-71
  '18':
  - type: text
    content: 'Ary raha nivavaka tao amin’ny mangingina Jesosy, sady niaraka Taminy ny mpianany, dia nanontany azy ireo Izy hoe: Iza moa Aho araka ny filazan’ny olona? '
  '19':
  - type: text
    content: 'Dia namaly ireo hoe: I Jaona Mpanao batisa; nefa ny sasany kosa dia mihevitra Anao ho Elia, ary ny sasany indray dia hoe: Ny iray amin’ny mpaminany fahiny no efa nitsangana. '
  '2':
  - type: text
    content: 'Ary naniraka azy ireo handeha hitory ny fanjakan’Andriamanitra sy hanasitrana ny marary Izy. '
  '20':
  - type: text
    content: 'Fa hoy Izy taminy: Fa ianareo kosa dia milaza Ahy ho iza? Dia namaly i Petera hoe: Ny Kristin’Andriamanitra. '
  '21':
  - type: text
    content: 'Ary niteny mafy azy ireo Izy sady nandrara azy mba tsy hilazalaza izany amin’olona '
  '22':
  - type: text
    content: 'ka niteny hoe: Ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' tsy maintsy hijaly mafy ka holavin’ny loholona sy ireo lehiben’ny mpisorona mbamin’ny mpanoradalàna sady hovonoiny; ary amin’ny andro fahatelo dia hatsangana.'
  - type: heading
    content: Ny fomba fanarahana an’i Jesosy
  - type: heading
    content: Mat 16.24-28; Mar 8.34–9.1
  '23':
  - type: text
    content: 'Hoy Jesosy tamin’izy rehetra: Raha misy ta hanaraka Ahy, aoka izy handa ny tenany, dia hitondra ny hazofijaliany isanandro ka hanaraka Ahy. '
  '24':
  - type: text
    content: 'Koa na iza na iza no ta hamonjy ny ainy dia hahavery izany; ary na iza na iza no hahavery ny ainy noho ny Amiko, dia izy no hamonjy izany. '
  '25':
  - type: text
    content: 'Fa inona no tombony azon’ny olona, raha mahazo izao tontolo izao aza, kanefa ho very ny ainy, na ho faty antoka amin’izany izy? '
  '26':
  - type: text
    content: 'Na iza na iza no ho menatra Ahy sy ny teniko dia ho menatra azy kosa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ', raha avy amin’ny voninahiny sy ny an’ny Rainy ary ny an’ny anjely masina. '
  '27':
  - type: text
    content: 'Fa lazaiko aminareo marina: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny fanjakan’Andriamanitra.'
  - type: heading
    content: Ny niovan’i Jesosy tarehy tao an-tendrombohitra
  - type: heading
    content: Mat 17.1-9; Mar 9.2-10
  '28':
  - type: text
    content: 'Rehefa tokony ho havaloana taorianan’izany teny izany dia nitondra an’i Petera sy i Jaona ary i Jakoba Izy ka niakatra tany an-tendrombohitra hivavaka. '
  '29':
  - type: text
    content: 'Raha mbola nivavaka Izy dia niova ny toetry ny tarehiny, ary ny fitafiany dia tonga fotsy sady namirapiratra. '
  '3':
  - type: text
    content: 'Hoy Izy taminy: Aza mitondra zavatra eny an-dalana, na tehina, na kitapom-batsy, na mofo, na vola, ary aza misy mitondra akanjo roa. '
  '30':
  - type: text
    content: 'Ary indreo, nisy roa lahy niresaka taminy, dia i Mosesy sy i Elia, '
  '31':
  - type: text
    content: 'izay niseho tamim-boninahitra ka nilaza ny fialany izay efa ho tanteraka any Jerosalema. '
  '32':
  - type: text
    content: 'I Petera sy ny namany kosa dia navesatry ny torimaso, ary nony nahatsiaro izy ireo dia nahita ny voninahitr’i Jesosy sy izy roa lahy izay niaraka Taminy. '
  '33':
  - type: text
    content: 'Ary rehefa hisaraka Taminy ireo dia hoy i Petera tamin’i Jesosy: Tompoko, tsara raha mitoetra eto isika; ary aoka izahay hamboatra tranolay telo: Ny iray dia ho Anao, ny iray dia ho an’i Mosesy ary ny iray dia ho an’i Elia; nefa tsy fantany izay nolazainy. '
  '34':
  - type: text
    content: 'Ary raha mbola niteny izany izy dia nisy rahona niseho nanarona azy ireo; ary raha niditra tao anatin’ny rahona ireo dia raiki-tahotra ireo mpianatra telo lahy. '
  '35':
  - type: text
    content: 'Ary nisy feo avy tao amin’ny rahona hoe: Ity no Zanako voafidiko; Izy no henoy. '
  '36':
  - type: text
    content: Rehefa nitsahatra ilay feo dia Jesosy irery ihany no hita. Ary nangina izy ireo ka tsy nilazalaza tamin’olona na dia iray akory aza tamin’izany andro izany ny amin’izay zavatra efa hitany.
  - type: heading
    content: Ny nanasitranan’i Jesosy ilay zazalahy nampahorin’ny demonia
  - type: heading
    content: Mat 17.14-21; Mar 9.14-29
  '37':
  - type: text
    content: 'Nony ampitson’iny, raha nidina avy teo an-tendrombohitra izy ireo, dia nisy vahoaka betsaka nitsena an’i Jesosy. '
  '38':
  - type: text
    content: 'Ary indro, nisy lehilahy iray avy teo amin’ny vahoaka nitaraina mafy hoe: Mpampianatra ô, miangavy Anao aho mba hijery ny zanako! Fa zanako lahitokana izy. '
  '39':
  - type: text
    content: 'Indro, misy fanahy mahazo azy ka miantsoantso tampoka izy; mampifanintontsintona ny tenany sy mampandoa vory azy ilay fanahy, ary sarotra ny fialany aminy ka mahatorovana azy. '
  '4':
  - type: text
    content: 'Ao amin’izay trano idiranareo no itoero, ary avy ao indray no ialao. '
  '40':
  - type: text
    content: 'Nangataka tamin’ny mpianatrao aho mba handroaka izany fa tsy vitany. '
  '41':
  - type: text
    content: 'Ary hoy Jesosy: Ry taranaka sady tsy mino no efa nivadika, mandra-pahoviana no hitoerako aminareo sy handeferako aminareo? Ento atỳ ny zanakao. '
  '42':
  - type: text
    content: 'Rehefa nanatona izy dia nampihinjitrinjitra sy nampifanintontsintona azy ny '
  - type: text
    content: demonia
  - type: text
    content: '. Dia niteny mafy ilay fanahy maloto Jesosy ka nanasitrana ilay zazalahy; dia natolony ny rainy izy. '
  '43':
  - type: text
    content: Ary talanjona izy rehetra noho ny fahalehibiazan’Andriamanitra.
  - type: heading
    content: Ny nilazan’i Jesosy fanindroany ny hahafatesany
  - type: heading
    content: Mat 17.22-23; Mar 9.30-32
  - type: text
    content: 'Raha talanjona izy rehetra tamin’izay rehetra nataon’i Jesosy dia hoy Izy tamin’ny mpianany: '
  '44':
  - type: text
    content: 'Ampidiro ao amin’ny sofinareo izao teny izao, fa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' efa hatolotra eo an-tanan’ny olona. '
  '45':
  - type: text
    content: Nefa tsy azon’ny mpianatra io teny io sady nafenina azy ireo izany mba tsy ho fantany; ary natahotra hanontany Azy ny amin’io teny io izy.
  - type: heading
    content: Iza no lehibe indrindra?
  - type: heading
    content: Mat 18.1-5; Mar 9.33-37
  '46':
  - type: text
    content: 'Dia nisy eritreritra tao amin’izy ireo ny amin’izay mety ho lehibe eo aminy. '
  '47':
  - type: text
    content: 'Nahalala ny fisainan’ny fony Jesosy ka nandray zaza iray ary nametraka azy teo anoloany; '
  '48':
  - type: text
    content: 'ary hoy Izy tamin’ireo: Na zovy na zovy no mandray io zaza io noho ny anarako dia mandray Ahy; ary na zovy na zovy no mandray Ahy dia mandray Izay naniraka Ahy; fa izay kely indrindra ao aminareo rehetra dia izy no lehibe.'
  - type: heading
    content: Ireo mampiasa ny anaran’i Jesosy
  - type: heading
    content: Mar 9.38-41
  '49':
  - type: text
    content: 'Ary hoy i Jaona: Mpampianatra ô! Izahay nahita olona iray nandroaka '
  - type: text
    content: demonia
  - type: text
    content: ' tamin’ny anaranao, koa noraranay izy satria tsy manaraka antsika. '
  '5':
  - type: text
    content: 'Izay tsy mampandroso anareo, raha miala amin’izany tanàna izany ianareo, dia ahintsano ny vovoka ho afaka amin’ny tongotrareo ho vavolombelona miampanga azy. '
  '50':
  - type: text
    content: 'Fa hoy Jesosy taminy: Aza rarana, fa izay tsy manohitra anareo dia momba anareo.'
  - type: heading
    content: Nandà tsy handray an’i Jesosy ny tanàna iray an’ny Samaritana
  '51':
  - type: text
    content: 'Rehefa ho tonga ny fotoana hampiakarana an’i Jesosy dia nitodi-doha tamim-pahavononana tanteraka hankany Jerosalema Izy. '
  '52':
  - type: text
    content: 'Ary nandefa iraka hialoha Azy Izy; dia nandeha ireo ka niditra tao amin’ny vohitra iray izay an’ny '
  - type: text
    content: Samaritana
  - type: text
    content: ' mba hanomana ny fandraisana Azy. '
  '53':
  - type: text
    content: 'Fa tsy nandray Azy ny olona satria hita ho nandroso ho any Jerosalema Izy. '
  '54':
  - type: text
    content: 'Ary raha hitan’i Jakoba sy i Jaona mpianany izany dia hoy izy: Tompoko, tianao va raha hiteny izahay mba hisy afo milatsaka avy any an-danitra handevona azy ireo'
  - type: note
    content: Ampit. 2Mpa 1.10.
  - type: text
    content: '? '
  '55':
  - type: text
    content: 'Fa nitodika Izy dia niteny mafy azy hoe: Tsy fantatrareo ny toetry ny fanahy izay anareo. Fa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' tsy tonga hahavery ny ain’olona fa hamonjy azy. '
  '56':
  - type: text
    content: Dia nankany amin’ny vohitra hafa izy ireo.
  - type: heading
    content: Ireo izay maniry hanaraka an’i Jesosy
  - type: heading
    content: Mat 8.19-22
  '57':
  - type: text
    content: 'Nony nandroso teny an-dalana izy ireo dia nisy olona iray nilaza tamin’i Jesosy hoe: Hanaraka Anao aho na aiza na aiza alehanao. '
  '58':
  - type: text
    content: 'Fa hoy Jesosy taminy: Ny amboahaolo dia manan-davaka ary ny voromanidina dia manana akany; fa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' tsy mba manana izay hampandriany ny lohany. '
  '59':
  - type: text
    content: 'Ary hoy koa Izy tamin’ny olona iray hafa: Manaraha Ahy. Fa hoy kosa io: Tompoko, aoka aho aloha handeha handevina ny raiko. '
  '6':
  - type: text
    content: Dia lasa nandeha izy ireo ka nitety vohitra nitory ny Filazantsara sady nahasitrana teny rehetra teny.
  - type: heading
    content: Ny fahasahiranan-tsain’i Heroda
  - type: heading
    content: Mat 14.1-2; Mar 6.14-16
  '60':
  - type: text
    content: 'Fa hoy Jesosy taminy: Aoka ny maty handevina ny maty ao aminy; fa ianao kosa dia mandehana ka mitoria ny fanjakan’Andriamanitra. '
  '61':
  - type: text
    content: 'Hoy koa ny olona iray hafa: Tompoko, hanaraka Anao ihany aho; fa aoka aho aloha handeha hanao veloma ny ao an-tranoko. '
  '62':
  - type: text
    content: 'Fa hoy Jesosy taminy: Tsy misy olona mitana angadinomby sady miherika ka mendrika ny fanjakan’Andriamanitra.'
  '7':
  - type: text
    content: 'Nandre izay rehetra nitranga i Heroda mpanapaka ka very hevitra noho ny filazan’ny olona; fa hoy ny sasany: I Jaona no nitsangana tamin’ny maty; '
  '8':
  - type: text
    content: 'ary hoy ny sasany: I Elia no niseho; fa hoy kosa ny sasany: Ny iray amin’ny mpaminany fahiny no nitsangana. '
  '9':
  - type: text
    content: 'Fa hoy i Heroda: Raha i Jaona dia izaho no efa nanapaka ny lohany; fa iza indray moa izao, izay andrenesako izao zavatra izao? Ary naniry hahita Azy izy.'
  - type: heading
    content: Ny nampihinanan’i Jesosy ny dimy arivo lahy
  - type: heading
    content: Mat 14.13-21; Mar 6.30-44; Jao 6.1-15
