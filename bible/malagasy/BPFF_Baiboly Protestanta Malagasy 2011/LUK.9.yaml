document_id: LUK.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanirahan’i Jesosy ny roa amby folo lahy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 10.1-14; Mar 6.7-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niantso ny roa amby folo lahy hankeo Aminy Jesosy ka nanome azy hery sy fahefana handroaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' rehetra sy hanasitrana aretina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary naniraka azy ireo handeha hitory ny fanjakan’Andriamanitra sy hanasitrana ny marary Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy Izy taminy: Aza mitondra zavatra eny an-dalana, na tehina, na kitapom-batsy, na mofo, na vola, ary aza misy mitondra akanjo roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ao amin’izay trano idiranareo no itoero, ary avy ao indray no ialao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izay tsy mampandroso anareo, raha miala amin’izany tanàna izany ianareo, dia ahintsano ny vovoka ho afaka amin’ny tongotrareo ho vavolombelona miampanga azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia lasa nandeha izy ireo ka nitety vohitra nitory ny Filazantsara sady nahasitrana teny rehetra teny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahasahiranan-tsain’i Heroda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 14.1-2; Mar 6.14-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nandre izay rehetra nitranga i Heroda mpanapaka ka very hevitra noho ny filazan’ny olona; fa hoy ny sasany: I Jaona no nitsangana tamin’ny maty; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary hoy ny sasany: I Elia no niseho; fa hoy kosa ny sasany: Ny iray amin’ny mpaminany fahiny no nitsangana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy i Heroda: Raha i Jaona dia izaho no efa nanapaka ny lohany; fa iza indray moa izao, izay andrenesako izao zavatra izao? Ary naniry hahita Azy izy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nampihinanan’i Jesosy ny dimy arivo lahy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 14.13-21; Mar 6.30-44; Jao 6.1-15
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rehefa niverina ny Apostoly dia nanambara tamin’i Jesosy izay efa nataony.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nitondra azy ireo Izy ka nandeha nitokana nankany amin’ny tanàna atao hoe Betsaida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nony nahafantatra ny vahoaka dia nanaraka Azy; dia nandray azy ireo tsara Izy ka nilaza taminy ny amin’ny fanjakan’Andriamanitra; ary izay marary dia nositraniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa ho hariva ny andro dia nanatona ny roa amby folo lahy ka niteny Taminy hoe: Ampodio ny vahoaka mba hankanesany eny amin’ny tanàna manodidina sy any amin’ny vohitra mba hiditra an-trano sy hitady sakafo, fa atỳ an-tany efitra isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy Izy taminy: Omeonareo hanina izy. Ary hoy ireo: Tsy manana mihoatra noho ny mofo dimy sy hazandrano roa izahay, raha tsy hoe handeha hividy sakafo ho an’ireo olona rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa tokony ho dimy arivo lahy ireo. Ary hoy Izy tamin’ny mpianany: Asaivo mipetraka mitsitokotoko tokony ho dimampolo avy izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nataony izany ka nasainy nipetraka izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary rehefa noraisin’i Jesosy ny mofo dimy sy ny hazandrano roa dia niandrandra ny lanitra Izy ka nisaotra, dia novakiny ka natolony ny mpianany harosony eny amin’ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia nihinana izy rehetra ka voky; ary nangonina izay sombintsombiny sisa tsy lany ka nisy roa amby folo harona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny naneken’i Petera an’i Jesosy ho Kristy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 16.13-20; Mar 8.27-30; ampit. Jao 6.67-71
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha nivavaka tao amin’ny mangingina Jesosy, sady niaraka Taminy ny mpianany, dia nanontany azy ireo Izy hoe: Iza moa Aho araka ny filazan’ny olona? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia namaly ireo hoe: I Jaona Mpanao batisa; nefa ny sasany kosa dia mihevitra Anao ho Elia, ary ny sasany indray dia hoe: Ny iray amin’ny mpaminany fahiny no efa nitsangana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy Izy taminy: Fa ianareo kosa dia milaza Ahy ho iza? Dia namaly i Petera hoe: Ny Kristin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary niteny mafy azy ireo Izy sady nandrara azy mba tsy hilazalaza izany amin’olona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ka niteny hoe: Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' tsy maintsy hijaly mafy ka holavin’ny loholona sy ireo lehiben’ny mpisorona mbamin’ny mpanoradalàna sady hovonoiny; ary amin’ny andro fahatelo dia hatsangana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fomba fanarahana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 16.24-28; Mar 8.34–9.1
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hoy Jesosy tamin’izy rehetra: Raha misy ta hanaraka Ahy, aoka izy handa ny tenany, dia hitondra ny hazofijaliany isanandro ka hanaraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa na iza na iza no ta hamonjy ny ainy dia hahavery izany; ary na iza na iza no hahavery ny ainy noho ny Amiko, dia izy no hamonjy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa inona no tombony azon’ny olona, raha mahazo izao tontolo izao aza, kanefa ho very ny ainy, na ho faty antoka amin’izany izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Na iza na iza no ho menatra Ahy sy ny teniko dia ho menatra azy kosa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ', raha avy amin’ny voninahiny sy ny an’ny Rainy ary ny an’ny anjely masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa lazaiko aminareo marina: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny fanjakan’Andriamanitra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niovan’i Jesosy tarehy tao an-tendrombohitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 17.1-9; Mar 9.2-10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Rehefa tokony ho havaloana taorianan’izany teny izany dia nitondra an’i Petera sy i Jaona ary i Jakoba Izy ka niakatra tany an-tendrombohitra hivavaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha mbola nivavaka Izy dia niova ny toetry ny tarehiny, ary ny fitafiany dia tonga fotsy sady namirapiratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary indreo, nisy roa lahy niresaka taminy, dia i Mosesy sy i Elia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'izay niseho tamim-boninahitra ka nilaza ny fialany izay efa ho tanteraka any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I Petera sy ny namany kosa dia navesatry ny torimaso, ary nony nahatsiaro izy ireo dia nahita ny voninahitr’i Jesosy sy izy roa lahy izay niaraka Taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary rehefa hisaraka Taminy ireo dia hoy i Petera tamin’i Jesosy: Tompoko, tsara raha mitoetra eto isika; ary aoka izahay hamboatra tranolay telo: Ny iray dia ho Anao, ny iray dia ho an’i Mosesy ary ny iray dia ho an’i Elia; nefa tsy fantany izay nolazainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary raha mbola niteny izany izy dia nisy rahona niseho nanarona azy ireo; ary raha niditra tao anatin’ny rahona ireo dia raiki-tahotra ireo mpianatra telo lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nisy feo avy tao amin’ny rahona hoe: Ity no Zanako voafidiko; Izy no henoy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Rehefa nitsahatra ilay feo dia Jesosy irery ihany no hita. Ary nangina izy ireo ka tsy nilazalaza tamin’olona na dia iray akory aza tamin’izany andro izany ny amin’izay zavatra efa hitany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanasitranan’i Jesosy ilay zazalahy nampahorin’ny demonia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 17.14-21; Mar 9.14-29
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nony ampitson’iny, raha nidina avy teo an-tendrombohitra izy ireo, dia nisy vahoaka betsaka nitsena an’i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary indro, nisy lehilahy iray avy teo amin’ny vahoaka nitaraina mafy hoe: Mpampianatra ô, miangavy Anao aho mba hijery ny zanako! Fa zanako lahitokana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Indro, misy fanahy mahazo azy ka miantsoantso tampoka izy; mampifanintontsintona ny tenany sy mampandoa vory azy ilay fanahy, ary sarotra ny fialany aminy ka mahatorovana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nangataka tamin’ny mpianatrao aho mba handroaka izany fa tsy vitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary hoy Jesosy: Ry taranaka sady tsy mino no efa nivadika, mandra-pahoviana no hitoerako aminareo sy handeferako aminareo? Ento atỳ ny zanakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Rehefa nanatona izy dia nampihinjitrinjitra sy nampifanintontsintona azy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: '. Dia niteny mafy ilay fanahy maloto Jesosy ka nanasitrana ilay zazalahy; dia natolony ny rainy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary talanjona izy rehetra noho ny fahalehibiazan’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nilazan’i Jesosy fanindroany ny hahafatesany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 17.22-23; Mar 9.30-32
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Raha talanjona izy rehetra tamin’izay rehetra nataon’i Jesosy dia hoy Izy tamin’ny mpianany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ampidiro ao amin’ny sofinareo izao teny izao, fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' efa hatolotra eo an-tanan’ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Nefa tsy azon’ny mpianatra io teny io sady nafenina azy ireo izany mba tsy ho fantany; ary natahotra hanontany Azy ny amin’io teny io izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Iza no lehibe indrindra?
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 18.1-5; Mar 9.33-37
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia nisy eritreritra tao amin’izy ireo ny amin’izay mety ho lehibe eo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Nahalala ny fisainan’ny fony Jesosy ka nandray zaza iray ary nametraka azy teo anoloany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'ary hoy Izy tamin’ireo: Na zovy na zovy no mandray io zaza io noho ny anarako dia mandray Ahy; ary na zovy na zovy no mandray Ahy dia mandray Izay naniraka Ahy; fa izay kely indrindra ao aminareo rehetra dia izy no lehibe.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mampiasa ny anaran’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 9.38-41
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary hoy i Jaona: Mpampianatra ô! Izahay nahita olona iray nandroaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' tamin’ny anaranao, koa noraranay izy satria tsy manaraka antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Fa hoy Jesosy taminy: Aza rarana, fa izay tsy manohitra anareo dia momba anareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nandà tsy handray an’i Jesosy ny tanàna iray an’ny Samaritana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Rehefa ho tonga ny fotoana hampiakarana an’i Jesosy dia nitodi-doha tamim-pahavononana tanteraka hankany Jerosalema Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary nandefa iraka hialoha Azy Izy; dia nandeha ireo ka niditra tao amin’ny vohitra iray izay an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritana
  - type: text
    text: ' mba hanomana ny fandraisana Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Fa tsy nandray Azy ny olona satria hita ho nandroso ho any Jerosalema Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary raha hitan’i Jakoba sy i Jaona mpianany izany dia hoy izy: Tompoko, tianao va raha hiteny izahay mba hisy afo milatsaka avy any an-danitra handevona azy ireo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.54 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampit. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2Mpa 1.10.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Fa nitodika Izy dia niteny mafy azy hoe: Tsy fantatrareo ny toetry ny fanahy izay anareo. Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' tsy tonga hahavery ny ain’olona fa hamonjy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Dia nankany amin’ny vohitra hafa izy ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo izay maniry hanaraka an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 8.19-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Nony nandroso teny an-dalana izy ireo dia nisy olona iray nilaza tamin’i Jesosy hoe: Hanaraka Anao aho na aiza na aiza alehanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Fa hoy Jesosy taminy: Ny amboahaolo dia manan-davaka ary ny voromanidina dia manana akany; fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' tsy mba manana izay hampandriany ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ary hoy koa Izy tamin’ny olona iray hafa: Manaraha Ahy. Fa hoy kosa io: Tompoko, aoka aho aloha handeha handevina ny raiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Fa hoy Jesosy taminy: Aoka ny maty handevina ny maty ao aminy; fa ianao kosa dia mandehana ka mitoria ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Hoy koa ny olona iray hafa: Tompoko, hanaraka Anao ihany aho; fa aoka aho aloha handeha hanao veloma ny ao an-tranoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Fa hoy Jesosy taminy: Tsy misy olona mitana angadinomby sady miherika ka mendrika ny fanjakan’Andriamanitra.'
