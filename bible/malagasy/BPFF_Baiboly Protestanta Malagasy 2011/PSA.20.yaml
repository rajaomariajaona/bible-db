document_id: PSA.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ho an’ny mpanjaka
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: Hihaino anao anie NY TOMPO amin’ny andro fahoriana,
  - type: text
    content: hitondra anao ho any amin’ny avo anie ny anaran’Andriamanitr’i Jakoba!
  '2':
  - type: text
    content: Hahatonga famonjena ho anao avy amin’ny fitoerana masina anie Izy
  - type: text
    content: 'ary hanohana anao avy any '
  - type: text
    content: Ziona
  - type: text
    content: .
  '3':
  - type: text
    content: Hahatsiaro ny fanatitra rehetra avy amin’ny zavamaniry ataonao anie Izy
  - type: text
    content: 'ary hankasitraka ny fanatitra dorana manontolo ataonao! '
  - type: text
    content: Fiatoana
  '4':
  - type: text
    content: Hanome anao araka izay irin’ny fonao anie Izy
  - type: text
    content: ary hahatanteraka ny fikasanao rehetra.
  '5':
  - type: text
    content: Hihoby noho ny famonjena azonao izahay
  - type: text
    content: ary amin’ny anaran’Andriamanitray no hanangananay faneva;
  - type: text
    content: hotanterahin’NY TOMPO anie ny angatahinao rehetra.
  '6':
  - type: text
    content: 'Ankehitriny dia fantatro fa NY TOMPO dia mamonjy ny '
  - type: text
    content: Voahosony
  - type: text
    content: ;
  - type: text
    content: hamaly azy avy amin’ny lanitry ny fahamasinany Izy,
  - type: text
    content: amin’ny herin’ny famonjen’ny tanany ankavanana.
  '7':
  - type: text
    content: Ny sasany dia mitoky amin’ny kalesy fitondra miady, ary ny sasany dia amin’ny soavaly;
  - type: text
    content: fa raha izahay kosa dia ny anaran’NY TOMPO Andriamanitray no hantsoinay.
  '8':
  - type: text
    content: Ireo dia reraka sady lavo
  - type: text
    content: fa izahay kosa dia mitsangana sy mijoro.
  '9':
  - type: text
    content: TOMPO ô, vonjeo ny mpanjaka!
  - type: text
    content: Hamaly anay anie izy amin’izay andro iantsoanay Azy!
