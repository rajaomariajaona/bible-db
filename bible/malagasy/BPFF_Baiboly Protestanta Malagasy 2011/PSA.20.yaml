    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hahatsiaro ny fanatitra rehetra avy amin’ny zavamaniry ataonao anie Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hankasitraka ny fanatitra dorana manontolo ataonao! '
  - type: usfm
    marker: qs
