      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hanome anao araka izay irin’ny fonao anie Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahatanteraka ny fikasanao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hihoby noho ny famonjena azonao izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny anaran’Andriamanitray no hanangananay faneva;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hotanterahin’NY TOMPO anie ny angatahinao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ankehitriny dia fantatro fa NY TOMPO dia mamonjy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Voahosony
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamaly azy avy amin’ny lanitry ny fahamasinany Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny herin’ny famonjen’ny tanany ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny sasany dia mitoky amin’ny kalesy fitondra miady, ary ny sasany dia amin’ny soavaly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha izahay kosa dia ny anaran’NY TOMPO Andriamanitray no hantsoinay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ireo dia reraka sady lavo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izahay kosa dia mitsangana sy mijoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: TOMPO ô, vonjeo ny mpanjaka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamaly anay anie izy amin’izay andro iantsoanay Azy!
