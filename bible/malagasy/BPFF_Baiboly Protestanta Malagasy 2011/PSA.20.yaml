  - type: text
    text: Vavaka ho an’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hihaino anao anie NY TOMPO amin’ny andro fahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitondra anao ho any amin’ny avo anie ny anaran’Andriamanitr’i Jakoba!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hahatonga famonjena ho anao avy amin’ny fitoerana masina anie Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hanohana anao avy any '
  - type: usfm
    marker: w
