document_id: ECC.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahasahiana hanao zavatra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atsipazo eny ambonin’ny rano ny mofonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho hitanao ihany izy rehefa ela.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa esory ao am-ponao ny alahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avilio tsy hikasika ny nofonao ny ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fahatanorana sy ny fahatanjahana dia samy zava-poana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy omeo anjara ny fito, eny, na ny valo aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy fantatrao izay fahoriana hanjo etỳ ambonin’ny tany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa feno ranonorana ny rahona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia arotsany amin’ny tany izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na mianjera mianatsimo ny hazo na mianavaratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia eo amin’izay ianjerany ihany no handriany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay fatra-pihevitra ny rivotra dia tsy mba hamafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay manahy ny rahona dia tsy mba hijinja.
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Toy ny tsy ahafantaranao ny lalana alehan’ny rivotra, na ny amin’ny fitombon’ny taolana ao an-kibon’izay manana anaka, dia toy izany no tsy ahafantaranao ny asan’Andriamanitra, Mpanao ny zavatra rehetra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny maraina dia afafazo ny voanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny hariva dia aza atsahatra ny tananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy fantatrao izay ho vanona, na itsỳ, na irỳ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na angamba samy ho vanona avokoa izy roa tonta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahaiza manararaotra ny fiainana amim-pahendrena
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamy tokoa ny mazava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahafinaritra ny maso ny mijery ny masoandro;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha ela velona ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka ho faly amin’ny androny rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka izy hahatsiaro fa ho maro ny andro maizina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-poana avokoa izay rehetra ho avy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifalia, ry zatovo, dieny mbola tanora ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny fonao hampifalifaly anao amin’ny andron’ny fahatanoranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa mandehana any amin’izay sitraky ny fonao sy izay jeren’ny masonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa aoka ho fantatrao fa hoentin’Andriamanitra hotsaraina ianao amin’izany rehetra izany.
