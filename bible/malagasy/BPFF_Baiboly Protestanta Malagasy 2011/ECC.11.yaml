document_id: ECC.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahasahiana hanao zavatra
  - type: text
    content: Atsipazo eny ambonin’ny rano ny mofonao
  - type: text
    content: fa ho hitanao ihany izy rehefa ela.
  '10':
  - type: text
    content: Koa esory ao am-ponao ny alahelo
  - type: text
    content: ary avilio tsy hikasika ny nofonao ny ratsy;
  - type: text
    content: fa ny fahatanorana sy ny fahatanjahana dia samy zava-poana.
  '2':
  - type: text
    content: Samy omeo anjara ny fito, eny, na ny valo aza,
  - type: text
    content: fa tsy fantatrao izay fahoriana hanjo etỳ ambonin’ny tany.
  '3':
  - type: text
    content: Rehefa feno ranonorana ny rahona
  - type: text
    content: dia arotsany amin’ny tany izany;
  - type: text
    content: ary na mianjera mianatsimo ny hazo na mianavaratra,
  - type: text
    content: dia eo amin’izay ianjerany ihany no handriany.
  '4':
  - type: text
    content: Izay fatra-pihevitra ny rivotra dia tsy mba hamafy
  - type: text
    content: ary izay manahy ny rahona dia tsy mba hijinja.
  '5':
  - type: text
    content: Toy ny tsy ahafantaranao ny lalana alehan’ny rivotra, na ny amin’ny fitombon’ny taolana ao an-kibon’izay manana anaka, dia toy izany no tsy ahafantaranao ny asan’Andriamanitra, Mpanao ny zavatra rehetra.
  '6':
  - type: text
    content: Amin’ny maraina dia afafazo ny voanao
  - type: text
    content: ary amin’ny hariva dia aza atsahatra ny tananao;
  - type: text
    content: fa tsy fantatrao izay ho vanona, na itsỳ, na irỳ,
  - type: text
    content: na angamba samy ho vanona avokoa izy roa tonta.
  - type: heading
    content: Mahaiza manararaotra ny fiainana amim-pahendrena
  '7':
  - type: text
    content: Mamy tokoa ny mazava
  - type: text
    content: ary mahafinaritra ny maso ny mijery ny masoandro;
  '8':
  - type: text
    content: fa raha ela velona ny olona
  - type: text
    content: dia aoka ho faly amin’ny androny rehetra
  - type: text
    content: ary aoka izy hahatsiaro fa ho maro ny andro maizina.
  - type: text
    content: Zava-poana avokoa izay rehetra ho avy.
  '9':
  - type: text
    content: Mifalia, ry zatovo, dieny mbola tanora ianao;
  - type: text
    content: ary aoka ny fonao hampifalifaly anao amin’ny andron’ny fahatanoranao,
  - type: text
    content: koa mandehana any amin’izay sitraky ny fonao sy izay jeren’ny masonao;
  - type: text
    content: nefa aoka ho fantatrao fa hoentin’Andriamanitra hotsaraina ianao amin’izany rehetra izany.
