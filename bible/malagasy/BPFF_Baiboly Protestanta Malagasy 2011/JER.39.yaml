document_id: JER.39
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahazoana an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 25.1-21; ampit. Jer 52
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny volana fahafolo tamin’ny taona fahasivy nanjakan’i Zedekia, mpanjakan’ny Joda, no nahatongavan’i Nebokadnezara, mpanjakan’i Babilona, sy ny miaramilany rehetra, hamely an’i Jerosalema ka nanao fahirano azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’ny andro fahasivy tamin’ny volana fahefatra, tamin’ny taona fahiraika amby folo nanjakan’i Zedekia dia nisy voabanga ny tanàna, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia niditra ny mpanapaky ny mpanjakan’i Babilona rehetra ka nipetraka teo amin’ny vavahady afovoany, dia i Nergala-Sarezera, i Samgara-Nebo, i Sara-Sekima, Raba-Sarisa, i Nergala-Sarezera, ary Raba-Magy, mbamin’ny sisa rehetra amin’ny mpanapaky ny mpanjakan’i Babilona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa nahita ireo i Zedekia, mpanjakan’ny Joda, sy ny miaramilany rehetra, dia nandositra ka lasa nandeha alina niala tao an-tanàna, nahazo ny lalana mankany amin’ny sahan’ny mpanjaka, tamin’ny vavahady eo anelanelan’ny manda roa; ary lasa nivoaka nankany amin’ny lalana mankeny amin’ny tany ngazana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nanenjika azy anefa ny miaramilan’ny Kaldeana ka nahatratra an’i Zedekia teny amin’ny tany ngazana any Jeriko; ary nony azony izy dia noentiny niakatra ho any amin’i Nebokadnezara, mpanjakan’i Babilona, tao Ribla tao amin’ny tany Hamata; dia notsarainy tao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny zanakalahin’i Zedekia dia novonoin’ny mpanjakan’i Babilona tao Ribla teo imason’ny rainy; ny manankaja rehetra tamin’ny Joda koa dia novonoin’ny mpanjakan’i Babilona. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nopotsiriny ny mason’i Zedekia, dia nafatony tamin’ny gadra varahina izy hoentiny any Babilona. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nodoran’ny Kaldeana tamin’ny afo ny tranon’ny mpanjaka sy ny tranon’ny vahoaka, ary noravany ny mandan’i Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny olona sisa tao an-tanàna sy izay efa nanatona azy ary ny vahoaka sisa koa dia noentin’i Nebozaradana, lehiben’ny mpiambina, ho babo tany Babilona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Na izany aza, ny olona mahantra sasantsasany izay tsy nanana na inona na inona kosa dia nisy ihany ny navelan’i Nebozaradana, lehiben’ny mpiambina, tao amin’ny tanin’ny Joda sady nomeny tanim-boaloboka sy tanimboly tamin’io andro io ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nafahana i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary i Nebokadnezara, mpanjakan’i Babilona, dia nanome teny an’i Nebozaradana, lehiben’ny mpiambina, ny amin’i Jeremia hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ento izy ka tandremo tsara, fa aza asian-dratsy; fa araka izay lazainy aminao no tanteraho aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary i Nebozaradana, lehiben’ny mpiambina, i Nebosazbana, i Raba-Sarisa, i Nergala-Sarezera, i Raba-Magy ary ny mpanapaky ny mpanjakan’i Babilona rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia nandefa iraka haka an’i Jeremia teo amin’ny kianjan’ny trano fiambenana ka nanolotra azy an’i Gedalia, zanak’i Ahikama, zanak’i Safana, mba hoentiny any an-trano; dia niara-nitoetra tamin’ny olona tamin’izay izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voavonjy i Ebeda-Meleka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tonga tamin’i Jeremia ny tenin’NY TOMPO, fony izy mbola voatazona tao amin’ny kianjan’ny trano fiambenana ihany hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mandehana ka lazao amin’i Ebeda-Meleka kosita hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hotoviko amin’ity tanàna ity ny teniko hahatonga loza, fa tsy soa; ary ho tanteraka eo imasonao ireo amin’izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nefa hovonjeko ianao amin’izany andro izany, hoy NY TOMPO, fa tsy mba hatolotra eo an-tanan’ny olona izay atahoranao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa hovonjeko tokoa ianao ka tsy ho lavon-tsabatra; eny, ny ainao no ho babonao, satria natoky Ahy ianao, hoy NY TOMPO.
