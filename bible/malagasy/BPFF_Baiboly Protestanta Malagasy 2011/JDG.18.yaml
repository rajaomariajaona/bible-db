document_id: JDG.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanova ny toeram-ponenany ny Danita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany dia tsy nisy mpanjaka teo amin’ny Israely; tamin’izany andro izany koa dia nitady lova mba honenany ny fokon’i Dana, satria hatramin’izany andro izany dia tsy mbola nisy lova voatondro ho azy teo amin’ireo fokon’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary naniraka dimy lahy izay nofantenany avy tamin’ny fianakaviany ny Danita, dia lehilahy mahery, avy tany Zora sy Estaola, mba hisafo ny tany sy hanadihady ny momba azy. Hoy izy ireo taminy: Mandehana, zahao ny toetry ny tany. Dia tonga tany amin’ny tany be havoana any Efraima tao an-tranon’i Mika izy ireo ka nandry tao mandritra ny alina. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa satria teo akaikin’ny tranon’i Mika no nisy azy dia fantany ny feon’ilay zatovo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: '. Dia nivily tao izy ireo ka niteny taminy hoe: Iza no nitondra anao tatỳ? Maninona atỳ ianao? Ary inona no fanananao atỳ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy izy tamin’ireo: Izao sy izao no nataon’i Mika tamiko ary nanome karama ahy izy ka tonga mpisorony aho izao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy izy ireo taminy: Miangavy anao izahay, manontania amin’Andriamanitra hahafantaranay na hambinina amin’ny lalana alehanay izahay na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy ilay mpisorona taminy: Mandehana amin’ny fiadanana; fa eo anatrehan’NY TOMPO izao lalana alehanareo izao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nandeha izy dimy lahy ka tonga tany Laisy. Hitany ny olona tao, fa nonina tsy nanana ahiahy araka ny fomban’ny Sidoniana, nandry fehizay sady tsy nanana ahiahy; tsy nisy mpandroba natahorana teo amin’ny tany; ary lavitra ny Sidoniana izy ireo sady tsy nanana fifandraisana tamin’olon-kafa akory. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nandeha ho any amin’ny rahalahiny any Zora sy Estaola ireo; hoy ireo rahalahiny taminy: Ahoana ny hevitrareo ny amin’izany? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy ireo: Mitsangàna ka aoka isika hiakatra hamely azy. Efa nahita ny tany izahay fa indro, tena tany tsara. Kanefa ianareo tsy misy miteny! Aza malain-kandeha hiditra handray ny tany! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha mandeha ianareo dia ho tonga any amin’ny olona tsy manana ahiahy sy any amin’ny tany malalaka; fa efa natolotr’Andriamanitra ho eo an-tananareo izany, dia tany tapi-javatra irina etỳ ambonin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nisy niainga avy tamin’ny fianakavian’i Dana, avy tany Zora sy Estaola; eninjato lahy efa voaomana tamin’ny fiadiany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary niakatra ireo ka nitoby tany Kiriata-Jearima any Joda. Izany no nanaovana ny anaran’izany tany izany hoe Mahane-Dana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mahane-Dana: Ny tobin’i Dana.'
    marker-yv: yv-n
  - type: text
    text: ' mandraka androany; indro, eo andrefan’i Kiriata-Jearima izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niala tao izy ka nandroso nankany amin’ny tany be havoana any Efraima, dia tonga tao amin’ny tranon’i Mika. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoy izy dimy lahy izay nandeha hisafo ny tany Laisy, tamin’ireo rahalahiny hoe: Fantatrareo va fa ato amin’ireto trano ireto misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efoda
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terafima
  - type: text
    text: ' ary sarin-javatra voasokitra ary sarin-javatra voarendrika? Koa hevero izay hataonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nivily tao izy ireo ka tonga tao amin’ny tranon’ilay zatovo levita, tao an-tranon’i Mika, dia niarahaba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny eninjato lahy efa voaomana tamin’ny fiadiany izay avy tamin’ny taranak’i Dana, dia nijanona teo anoloan’ny vavahady. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niakatra izy dimy lahy izay nandeha hisafo ny tany ka niditra ary naka ny sarin-javatra voasokitra, ny efoda sy ny terafima ary ny sarin-javatra voarendrika; tamin’izany ilay mpisorona dia nijoro teo anoloan’ny vavahady, niaraka tamin’ny eninjato lahy efa voaomana tamin’ny fiadiany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Niditra tao amin’ny tranon’i Mika ireo ka naka ny sarin-javatra voasokitra, ny efoda sy ny terafima ary ny sarin-javatra voarendrika. Dia hoy ilay mpisorona taminy: Inona no ataonareo eto? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hoy ireo taminy: Mangìna ianao, tampeno amin’ny tananao ny vavanao ka andeha hiaraka aminay dia ho rainay sy ho mpisoronay ianao. Moa tsara ho anao va ny ho mpisorona ho an’ny olona iray trano monja noho ny ho mpisorona ho an’ny foko sy fianakaviana iray amin’ny Israely? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia faly ny fon’ilay mpisorona ka nalainy ny efoda sy ny terafima ary ny sarin-javatra voasokitra, dia nandeha voahodidin’ny olona izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia niainga izy ireo ka lasa nandeha ary ny zaza amam-behivavy sy ny omby aman’ondry mbamin’ny fananany dia nataony teo alohany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa lasa lavitra ny tranon’i Mika izy ireo dia nifamory ny lehilahy nifanolo-bodirindrina tamin’i Mika ka nanenjika ny taranak’i Dana. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia niantso ireo taranak’i Dana izy. Niherika ireo ka niteny tamin’i Mika hoe: Maninona ianao no miantsoantso toy izao? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hoy izy: Nalainareo ny andriamanitro izay namboariko ary nalainareo koa ny mpisorona; koa inona intsony no mba ho ahy? Ahoana no itenenanareo amiko hoe: Maninona ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hoy ny taranak’i Dana taminy: Aoka tsy ho re eto aminay intsony ny feonao, fandrao hisy olo-masiaka hamely anareo ka hanao izay hahafaty ny tenanao sy ny ankohonanao ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nandeha tamin’ny nalehany ny taranak’i Dana. Rehefa hitan’i Mika fa nahery noho izy ireo dia niverina izy ka nody tany an-tranony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tanànan’i Dana sy ny toeram-pivavahana natsangany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nalain’izy ireo ary ny zavatra nataon’i Mika sy ny mpisorona izay tao aminy. Notafihany i Laisy, izay olona mandry fehizay sady tsy manana ahiahy ka nasiany tamin’ny lelan-tsabatra; ary nodorany tamin’ny afo ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tsy nisy namonjy izy, satria lavitra an’i Sidona izany tanàna izany ary tsy nifandray tamin’olona akory, sady tao amin’ny lohasaha izay miitatra mankany Bety-Rehoba no nisy azy. Dia nanorina indray ny tanàna izy ireo ka nonina tao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny anaran’ny tanàna dia nataony hoe Dana, araka ny anaran’i Dana rainy izay naterak’Israely, fa Laisy no anaran’ny tanàna taloha. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia natsangan’ny taranak’i Dana ilay sarin-javatra voasokitra; ary i Jonatana, zanak’i Gersoma, zanak’i Mosesy, sy ireo zanany lahy, no mpisorona ho an’ny fokon’i Dana hatramin’ny fotoanan’ny fahababoana. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Natsangany ho azy ilay sarin-javatra voasokitra nataon’i Mika. Naharitra nandritra ny andro rehetra niorenan’ny tranon’Andriamanitra tao Silo izany.
