document_id: JDG.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanova ny toeram-ponenany ny Danita
  - type: text
    content: 'Tamin’izany andro izany dia tsy nisy mpanjaka teo amin’ny Israely; tamin’izany andro izany koa dia nitady lova mba honenany ny fokon’i Dana, satria hatramin’izany andro izany dia tsy mbola nisy lova voatondro ho azy teo amin’ireo fokon’ny Israely. '
  '10':
  - type: text
    content: Raha mandeha ianareo dia ho tonga any amin’ny olona tsy manana ahiahy sy any amin’ny tany malalaka; fa efa natolotr’Andriamanitra ho eo an-tananareo izany, dia tany tapi-javatra irina etỳ ambonin’ny tany.
  '11':
  - type: text
    content: 'Dia nisy niainga avy tamin’ny fianakavian’i Dana, avy tany Zora sy Estaola; eninjato lahy efa voaomana tamin’ny fiadiany. '
  '12':
  - type: text
    content: Ary niakatra ireo ka nitoby tany Kiriata-Jearima any Joda. Izany no nanaovana ny anaran’izany tany izany hoe Mahane-Dana
  - type: note
    content: 'Mahane-Dana: Ny tobin’i Dana.'
  - type: text
    content: ' mandraka androany; indro, eo andrefan’i Kiriata-Jearima izany. '
  '13':
  - type: text
    content: 'Dia niala tao izy ka nandroso nankany amin’ny tany be havoana any Efraima, dia tonga tao amin’ny tranon’i Mika. '
  '14':
  - type: text
    content: 'Hoy izy dimy lahy izay nandeha hisafo ny tany Laisy, tamin’ireo rahalahiny hoe: Fantatrareo va fa ato amin’ireto trano ireto misy '
  - type: text
    content: efoda
  - type: text
    content: ' sy '
  - type: text
    content: terafima
  - type: text
    content: ' ary sarin-javatra voasokitra ary sarin-javatra voarendrika? Koa hevero izay hataonareo. '
  '15':
  - type: text
    content: 'Dia nivily tao izy ireo ka tonga tao amin’ny tranon’ilay zatovo levita, tao an-tranon’i Mika, dia niarahaba azy. '
  '16':
  - type: text
    content: 'Ary ny eninjato lahy efa voaomana tamin’ny fiadiany izay avy tamin’ny taranak’i Dana, dia nijanona teo anoloan’ny vavahady. '
  '17':
  - type: text
    content: 'Dia niakatra izy dimy lahy izay nandeha hisafo ny tany ka niditra ary naka ny sarin-javatra voasokitra, ny efoda sy ny terafima ary ny sarin-javatra voarendrika; tamin’izany ilay mpisorona dia nijoro teo anoloan’ny vavahady, niaraka tamin’ny eninjato lahy efa voaomana tamin’ny fiadiany. '
  '18':
  - type: text
    content: 'Niditra tao amin’ny tranon’i Mika ireo ka naka ny sarin-javatra voasokitra, ny efoda sy ny terafima ary ny sarin-javatra voarendrika. Dia hoy ilay mpisorona taminy: Inona no ataonareo eto? '
  '19':
  - type: text
    content: 'Hoy ireo taminy: Mangìna ianao, tampeno amin’ny tananao ny vavanao ka andeha hiaraka aminay dia ho rainay sy ho mpisoronay ianao. Moa tsara ho anao va ny ho mpisorona ho an’ny olona iray trano monja noho ny ho mpisorona ho an’ny foko sy fianakaviana iray amin’ny Israely? '
  '2':
  - type: text
    content: 'Ary naniraka dimy lahy izay nofantenany avy tamin’ny fianakaviany ny Danita, dia lehilahy mahery, avy tany Zora sy Estaola, mba hisafo ny tany sy hanadihady ny momba azy. Hoy izy ireo taminy: Mandehana, zahao ny toetry ny tany. Dia tonga tany amin’ny tany be havoana any Efraima tao an-tranon’i Mika izy ireo ka nandry tao mandritra ny alina. '
  '20':
  - type: text
    content: Dia faly ny fon’ilay mpisorona ka nalainy ny efoda sy ny terafima ary ny sarin-javatra voasokitra, dia nandeha voahodidin’ny olona izy.
  '21':
  - type: text
    content: 'Dia niainga izy ireo ka lasa nandeha ary ny zaza amam-behivavy sy ny omby aman’ondry mbamin’ny fananany dia nataony teo alohany. '
  '22':
  - type: text
    content: 'Rehefa lasa lavitra ny tranon’i Mika izy ireo dia nifamory ny lehilahy nifanolo-bodirindrina tamin’i Mika ka nanenjika ny taranak’i Dana. '
  '23':
  - type: text
    content: 'Dia niantso ireo taranak’i Dana izy. Niherika ireo ka niteny tamin’i Mika hoe: Maninona ianao no miantsoantso toy izao? '
  '24':
  - type: text
    content: 'Hoy izy: Nalainareo ny andriamanitro izay namboariko ary nalainareo koa ny mpisorona; koa inona intsony no mba ho ahy? Ahoana no itenenanareo amiko hoe: Maninona ianao? '
  '25':
  - type: text
    content: 'Hoy ny taranak’i Dana taminy: Aoka tsy ho re eto aminay intsony ny feonao, fandrao hisy olo-masiaka hamely anareo ka hanao izay hahafaty ny tenanao sy ny ankohonanao ianao. '
  '26':
  - type: text
    content: Dia nandeha tamin’ny nalehany ny taranak’i Dana. Rehefa hitan’i Mika fa nahery noho izy ireo dia niverina izy ka nody tany an-tranony.
  - type: heading
    content: Ny tanànan’i Dana sy ny toeram-pivavahana natsangany
  '27':
  - type: text
    content: 'Nalain’izy ireo ary ny zavatra nataon’i Mika sy ny mpisorona izay tao aminy. Notafihany i Laisy, izay olona mandry fehizay sady tsy manana ahiahy ka nasiany tamin’ny lelan-tsabatra; ary nodorany tamin’ny afo ny tanàna. '
  '28':
  - type: text
    content: 'Tsy nisy namonjy izy, satria lavitra an’i Sidona izany tanàna izany ary tsy nifandray tamin’olona akory, sady tao amin’ny lohasaha izay miitatra mankany Bety-Rehoba no nisy azy. Dia nanorina indray ny tanàna izy ireo ka nonina tao. '
  '29':
  - type: text
    content: 'Ary ny anaran’ny tanàna dia nataony hoe Dana, araka ny anaran’i Dana rainy izay naterak’Israely, fa Laisy no anaran’ny tanàna taloha. '
  '3':
  - type: text
    content: 'Koa satria teo akaikin’ny tranon’i Mika no nisy azy dia fantany ny feon’ilay zatovo '
  - type: text
    content: levita
  - type: text
    content: '. Dia nivily tao izy ireo ka niteny taminy hoe: Iza no nitondra anao tatỳ? Maninona atỳ ianao? Ary inona no fanananao atỳ? '
  '30':
  - type: text
    content: 'Dia natsangan’ny taranak’i Dana ilay sarin-javatra voasokitra; ary i Jonatana, zanak’i Gersoma, zanak’i Mosesy, sy ireo zanany lahy, no mpisorona ho an’ny fokon’i Dana hatramin’ny fotoanan’ny fahababoana. '
  '31':
  - type: text
    content: Natsangany ho azy ilay sarin-javatra voasokitra nataon’i Mika. Naharitra nandritra ny andro rehetra niorenan’ny tranon’Andriamanitra tao Silo izany.
  '4':
  - type: text
    content: 'Hoy izy tamin’ireo: Izao sy izao no nataon’i Mika tamiko ary nanome karama ahy izy ka tonga mpisorony aho izao. '
  '5':
  - type: text
    content: 'Hoy izy ireo taminy: Miangavy anao izahay, manontania amin’Andriamanitra hahafantaranay na hambinina amin’ny lalana alehanay izahay na tsia. '
  '6':
  - type: text
    content: 'Hoy ilay mpisorona taminy: Mandehana amin’ny fiadanana; fa eo anatrehan’NY TOMPO izao lalana alehanareo izao.'
  '7':
  - type: text
    content: 'Dia nandeha izy dimy lahy ka tonga tany Laisy. Hitany ny olona tao, fa nonina tsy nanana ahiahy araka ny fomban’ny Sidoniana, nandry fehizay sady tsy nanana ahiahy; tsy nisy mpandroba natahorana teo amin’ny tany; ary lavitra ny Sidoniana izy ireo sady tsy nanana fifandraisana tamin’olon-kafa akory. '
  '8':
  - type: text
    content: 'Dia nandeha ho any amin’ny rahalahiny any Zora sy Estaola ireo; hoy ireo rahalahiny taminy: Ahoana ny hevitrareo ny amin’izany? '
  '9':
  - type: text
    content: 'Dia hoy ireo: Mitsangàna ka aoka isika hiakatra hamely azy. Efa nahita ny tany izahay fa indro, tena tany tsara. Kanefa ianareo tsy misy miteny! Aza malain-kandeha hiditra handray ny tany! '
