document_id: MAL.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tia an’Israely Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Teny faminaniana avy tamin’NY TOMPO nampitondrainy an’i Malakia ho an’ny Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Efa tia anareo Aho, hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nefa hoy ianareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no noentinao nitia anay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy rahalahin’i Jakoba va i Esao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa i Jakoba no tiako
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: fa i Esao no halako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa nataoko tany lao ny tendrombohiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lovany dia natolotro ho an’ny amboadia any an-tany efitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Na dia hiteny aza i Edoma hoe: Torotoro izahay,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mbola hatsanganay indray ny efa rava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo dia hanangana fa Izaho kosa handrava;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia hantsoina hoe: Tanin’ny faharatsiam-panahy izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia firenena eo ambanin’ny fahatezeran’NY TOMPO mandrakariva izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny masonareo no hahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hiteny ianareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO dia lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: any ankoatran’ny tanin’ny Israely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanompoam-pivavahana tsy mendrika NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny zanaka dia manaja ny rainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpanompo dia manaja ny tompony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa raha Ray Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aiza ary izay mba hajako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha Tompo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aiza izay tahotra Ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aminareo mpisorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manamavo ny anarako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy ianareo hoe: Amin’inona no anamavoanay ny anaranao?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’ny fitondrana hanina voaloto ho eo amin’ny alitarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nefa hoy ianareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’inona no andotoanay Anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Amin’ny filazanareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny latabatry NY TOMPO dia fanimbazimba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary raha biby jamba no entinareo hovonoina hatao fanatitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hoe tsy ratsy va izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha mandringa sy marary no entinareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hoe tsy ratsy va izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba atolory ho an’ny governora manapaka anao ange izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moa hahazo sitraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: na fitia aminy va ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa miangavy anareo aho, andeha mifona amin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamindrany fo amintsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa ny tananareo no nahatonga izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa handray anareo amim-pankasitrahana va Izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Enga anie ka hisy aminareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: handrindrina ny varavarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy handrehetana afo foana
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo ambonin’ny alitarako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hankasitraka anareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na handray fanatitra avy amin’ny tananareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa hatramin’ny fiposahan’ny masoandro ka hatramin’ny filentehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia lehibe ny anarako any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: .
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Any amin’ny tany rehetra no handoroana ditin-kazo manitra sy hanolorana fanatitra madio ho an’ny anarako; fa lehibe ny anarako any amin’ny Jentilisa, hoy Andriamanitra, Tompon’izao rehetra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa manamavo izany kosa ianareo amin’ny ilazanareo hoe: Voaloto ny latabatry NY TOMPO, ary ny hanina raisina avy eo dia tsinontsinona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy koa ianareo: Zava-manasatra foana izao! Dia ahifikareo izany, hoy Andriamanitra, Tompon’izao rehetra izao. Zavatra nalaina an-keriny sy mandringa ary marary no entinareo atolotra ho fanatitra. Moa handray izany avy amin’ny tananareo va Aho? Hoy NY TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ho voaozona ny mpamitaka izay manana ondrilahy ao amin’ny andian’ondriny ary mivoady, nefa mamono zavatra misy kilema hatao fanatitra ho an’ny Tompo. Fa Mpanjaka lehibe Aho, Andriamanitra, Tompon’izao rehetra izao, ary ny anarako dia atahorana any amin’ny Jentilisa.
