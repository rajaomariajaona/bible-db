document_id: MAL.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tia an’Israely Andriamanitra
  - type: text
    content: Teny faminaniana avy tamin’NY TOMPO nampitondrainy an’i Malakia ho an’ny Israely.
  '10':
  - type: text
    content: Enga anie ka hisy aminareo
  - type: text
    content: handrindrina ny varavarana
  - type: text
    content: mba tsy handrehetana afo foana
  - type: text
    content: eo ambonin’ny alitarako!
  - type: text
    content: Tsy hankasitraka anareo Aho,
  - type: text
    content: na handray fanatitra avy amin’ny tananareo,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '11':
  - type: text
    content: Fa hatramin’ny fiposahan’ny masoandro ka hatramin’ny filentehany
  - type: text
    content: 'dia lehibe ny anarako any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: .
  - type: text
    content: 'Any amin’ny tany rehetra no handoroana ditin-kazo manitra sy hanolorana fanatitra madio ho an’ny anarako; fa lehibe ny anarako any amin’ny Jentilisa, hoy Andriamanitra, Tompon’izao rehetra izao. '
  '12':
  - type: text
    content: 'Fa manamavo izany kosa ianareo amin’ny ilazanareo hoe: Voaloto ny latabatry NY TOMPO, ary ny hanina raisina avy eo dia tsinontsinona. '
  '13':
  - type: text
    content: 'Hoy koa ianareo: Zava-manasatra foana izao! Dia ahifikareo izany, hoy Andriamanitra, Tompon’izao rehetra izao. Zavatra nalaina an-keriny sy mandringa ary marary no entinareo atolotra ho fanatitra. Moa handray izany avy amin’ny tananareo va Aho? Hoy NY TOMPO.'
  '14':
  - type: text
    content: Ho voaozona ny mpamitaka izay manana ondrilahy ao amin’ny andian’ondriny ary mivoady, nefa mamono zavatra misy kilema hatao fanatitra ho an’ny Tompo. Fa Mpanjaka lehibe Aho, Andriamanitra, Tompon’izao rehetra izao, ary ny anarako dia atahorana any amin’ny Jentilisa.
  '2':
  - type: text
    content: Efa tia anareo Aho, hoy NY TOMPO,
  - type: text
    content: 'nefa hoy ianareo:'
  - type: text
    content: Inona no noentinao nitia anay?
  - type: text
    content: Tsy rahalahin’i Jakoba va i Esao?
  - type: text
    content: Hoy NY TOMPO;
  - type: text
    content: nefa i Jakoba no tiako
  '3':
  - type: text
    content: fa i Esao no halako,
  - type: text
    content: koa nataoko tany lao ny tendrombohiny
  - type: text
    content: ary ny lovany dia natolotro ho an’ny amboadia any an-tany efitra.
  '4':
  - type: text
    content: 'Na dia hiteny aza i Edoma hoe: Torotoro izahay,'
  - type: text
    content: nefa mbola hatsanganay indray ny efa rava,
  - type: text
    content: 'dia izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Ireo dia hanangana fa Izaho kosa handrava;
  - type: text
    content: 'dia hantsoina hoe: Tanin’ny faharatsiam-panahy izy,'
  - type: text
    content: dia firenena eo ambanin’ny fahatezeran’NY TOMPO mandrakariva izy.
  '5':
  - type: text
    content: Ny masonareo no hahita
  - type: text
    content: 'ka hiteny ianareo hoe:'
  - type: text
    content: NY TOMPO dia lehibe
  - type: text
    content: any ankoatran’ny tanin’ny Israely.
  - type: heading
    content: Fanompoam-pivavahana tsy mendrika NY TOMPO
  '6':
  - type: text
    content: Ny zanaka dia manaja ny rainy
  - type: text
    content: ary ny mpanompo dia manaja ny tompony.
  - type: text
    content: Koa raha Ray Aho,
  - type: text
    content: aiza ary izay mba hajako?
  - type: text
    content: Ary raha Tompo Aho,
  - type: text
    content: aiza izay tahotra Ahy?
  - type: text
    content: Hoy Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: aminareo mpisorona
  - type: text
    content: izay manamavo ny anarako.
  - type: text
    content: 'Hoy ianareo hoe: Amin’inona no anamavoanay ny anaranao?'
  '7':
  - type: text
    content: Amin’ny fitondrana hanina voaloto ho eo amin’ny alitarako,
  - type: text
    content: 'nefa hoy ianareo hoe:'
  - type: text
    content: Amin’inona no andotoanay Anao?
  - type: text
    content: 'Amin’ny filazanareo hoe:'
  - type: text
    content: Ny latabatry NY TOMPO dia fanimbazimba.
  '8':
  - type: text
    content: Ary raha biby jamba no entinareo hovonoina hatao fanatitra
  - type: text
    content: dia hoe tsy ratsy va izany?
  - type: text
    content: Ary raha mandringa sy marary no entinareo
  - type: text
    content: dia hoe tsy ratsy va izany?
  - type: text
    content: Mba atolory ho an’ny governora manapaka anao ange izany,
  - type: text
    content: moa hahazo sitraka
  - type: text
    content: na fitia aminy va ianao?
  - type: text
    content: Hoy Andriamanitra, Tompon’izao rehetra izao.
  '9':
  - type: text
    content: Koa miangavy anareo aho, andeha mifona amin’Andriamanitra
  - type: text
    content: mba hamindrany fo amintsika,
  - type: text
    content: 'fa ny tananareo no nahatonga izao:'
  - type: text
    content: Moa handray anareo amim-pankasitrahana va Izy?
  - type: text
    content: Hoy Andriamanitra, Tompon’izao rehetra izao.
