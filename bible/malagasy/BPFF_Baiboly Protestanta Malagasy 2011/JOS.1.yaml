document_id: JOS.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: NY NAHAZOANA AN’I KANANA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandimby an’i Mosesy i Josoa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Mosesy, mpanompon’NY TOMPO, dia hoy NY TOMPO tamin’i Josoa, zanak’i Nona, mpanompon’i Mosesy: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandidy ny mpifehy ny vahoaka i Josoa hoe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andeha mamakivaky ny toby ka mandidia ny olona hoe: Manamboara vatsy ho anareo fa raha afaka hateloana dia hita ity Jordana ity ianareo ka hiditra sy handray ny tany izay omen’NY TOMPO Andriamanitrareo ho lovanareo.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase dia nilazan’i Josoa hoe: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsarovy ny teny izay nandidian’i Mosesy, mpanompon’NY TOMPO, anareo hoe: NY TOMPO Andriamanitrareo manome fitsaharana ho anareo, koa homeny anareo izao tany izao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vadinareo sy ny zanakareo madinika ary ny biby fiompinareo dia hitoetra eo amin’ny tany izay nomen’i Mosesy anareo etỳ andafin’i Jordana ary ianareo lehilahy mahery rehetra dia samy ho voaomana hiady ka hita eo alohan’ny rahalahinareo hanampy azy, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mandra-panomen’NY TOMPO fitsaharana ny rahalahinareo tahaka anareo ka handraisany an-tanana ny tany izay nomen’NY TOMPO Andriamanitrareo azy. Dia hiverina ho any amin’ny taninareo ianareo ka handray an-tanana ilay nomen’i Mosesy, mpanompon’NY TOMPO, anareo etỳ andafy atsinanan’i Jordana.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Josoa ireo hoe: Izay rehetra andidianao anay dia hataonay ary izay rehetra anirahanao anay dia halehanay. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny nihainoanay an’i Mosesy tamin’ny zavatra rehetra no hihainoanay anao koa. Homba anao anie NY TOMPO Andriamanitrao tahaka ny nombany an’i Mosesy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay rehetra mandà ny didinao ka tsy mihaino ny teninao amin’izay rehetra ibaikoanao azy dia hovonoina ho faty, koa mahereza sy matanjaha ianao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa maty i Mosesy mpanompoko; koa mitsangàna, mità ity Jordana ity ianao sy ireo olona rehetra ireo ho any amin’ny tany izay omeko ho an’ny Zanak’Israely. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tany rehetra izay hodiavin’ny faladianareo dia efa nomeko anareo, araka izay voalazako tamin’i Mosesy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatreo amin’ny tany efitra sy irỳ Libanona irỳ ary hatrany amin’ny ony lehibe na ny ony Eofrata, ny tany rehetra izay an’ny Hetita ka hatrany amin’ny Ranomasina Lehibe any andrefana no ho taninareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hisy olona hahajanona eo anoloanao amin’ny andro rehetra hiainanao; tahaka ny nombako an’i Mosesy no hombako anao koa; tsy handao anao na hahafoy anao Aho. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahereza sy matanjaha fa ianao no hampandova ity firenena ity ny tany izay nianianako tamin’ny razany homena azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mahereza sy matanjaha tsara ianao, hitandremanao hanatanteraka araka ny lalàna rehetra izay nandidian’i Mosesy mpanompoko anao; aza miala aminy, na ho amin’ny ankavanana na ho amin’ny ankavia, mba hambinina ianao amin’izay rehetra alehanao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy hiala amin’ny vavanao ity bokin’ny lalàna ity fa saintsaino andro aman’alina, hitandremanao hanatanteraka araka izay rehetra voasoratra ao; fa amin’izany dia hahalavorary ny lalanao ianao sady hambinina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy efa nandidy anao va Aho? Koa mahereza sy matanjaha, aza matahotra na mivadi-po fa momba anao NY TOMPO Andriamanitrao amin’izay rehetra alehanao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manomana ny fitàna an’i Jordana i Josoa
    marker-yv: yv-h
