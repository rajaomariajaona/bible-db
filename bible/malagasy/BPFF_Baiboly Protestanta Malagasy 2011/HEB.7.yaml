document_id: HEB.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mpisoronabe araka ny fomban’i Melkizedeka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa io Melkizedeka io dia mpanjakan’i Salema sy mpisoron’Andriamanitra Avo Indrindra, ilay nitsena an’i Abrahama rehefa niverina avy nandresy ny mpanjaka maro izy ka nitsodrano azy '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria mbola tao an-kibon’ny rainy ihany izy tamin’ny nitsenan’i Melkizedaka an’i Abrahama.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha nisy fanatanterahana tamin’ny fisoronan’i Levy, fa tamin’izany no nahazoan’ny olona ny lalàna, ahoana no mbola ilàna mpisorona hafa hiseho araka ny fomban’i Melkizedeka ihany, izay tsy hotononina araka ny fomban’i Arona? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha ovana ny fisoronana dia tsy maintsy ovana koa ny lalàna. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay nolazaina amin’izany teny izany dia avy tamin’ny firenena hafa izay tsy nisy olona nanompo teo amin’ny alitara. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hita marimarina fa avy tamin’i Joda no nisehoan’ny Tompontsika, ary izany foko izany dia tsy nisy nolazain’i Mosesy akory rehefa niteny ny amin’izay ho mpisorona izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary vao mainka hita mazava kokoa indray izany raha misy mpisorona hafa miseho ka tahaka an’i Melkizedeka '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay natao tsy araka ny lalànan’izay didy araka ny nofo fa araka ny herin’ny fiainana tsy manam-pahataperana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no nambara ny Aminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianao no mpisorona mandrakizay araka ny fomban’i Melkizedeka» (Sal 110.4).
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Eny, foana ny didy teo aloha noho ny halemeny sy noho izy tsy nahasoa, '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: fa ny lalàna dia tsy nahatanteraka na inona na inona, ary misy kosa fampidirana ny fanantenana tsaratsara kokoa, izay anatonantsika an’Andriamanitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nomen’i Abrahama ny ampahafolon’ny zavatra rehetra aza. Raha adika ny anarany, ny heviny voalohany dia mpanjakan’ny fahamarinana aloha, izay vao mpanjakan’i Salema koa, izany hoe: Mpanjakan’ny fiadanana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tahaka an’i Melkizedeka tsy natao mpisorona raha tsy tamin’ny fianianana, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa ny hafa dia natao mpisorona tsy tamin’ny fianianana, fa Izy kosa dia tamin’ny fianianana nataon’ilay nilaza taminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Efa nianiana NY TOMPO ka tsy hanenina:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no mpisorona mandrakizay» (Sal 110.4).
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia tahaka izany no nanaovana an’i Jesosy ho mpiantoka ny fanekena tsara lavitra.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa natao maro ireny mpisorona ireny satria tsy navelan’ny fahafatesana haharitra izy; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa Izy kosa dia manana fisoronana tsy dimbiasana satria maharitra mandrakizay Izy; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: koa amin’izany dia mahavonjy tanteraka izay manatona an’Andriamanitra amin’ny alalany Izy satria velona mandrakizay hanao fifonana ho azy.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Mpisoronabe tahaka izany no mendrika ho antsika: Dia izay masina, tsy misy tsiny, tsy misy loto, miavaka amin’ny mpanota ka natao avo noho ny lanitra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy dia tsy mila hanolotra fanatitra isanandro tahaka ny ataon’ireny Mpisoronabe ireny, voalohany noho ny otan’ny tenany, vao noho ny an’ny olona kosa; fa izany dia nataony indray mandeha ihany raha nanolotra ny tenany Izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny lalàna dia manendry olona izay manana fahalemena ho Mpisoronabe; fa ny tenin’ny fianianana kosa, izay tato aorianan’ny lalàna, dia manendry ny Zanaka izay tonga amin’ny fahatanterahana mandrakizay.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy dia tsy manan-dray, tsy manan-dreny, tsy manana tantaram-pirazanana, tsy manana andro niandohana na fiafaran’ny fiainana, fa natao tahaka ny Zanak’Andriamanitra ary mitoetra ho mpisorona mandrakizay.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hevero ny halehiben’io lehilahy io izay nomen’i Abrahama patriarka ny ampahafolon’izay tsara tamin’ny zavatra nobaboiny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay avy tamin’ny taranak’i Levy ka mandray ny fisoronana no mahazo teny haka ny fahafolonkarena amin’ny olona araka ny lalàna, dia amin’ny rahalahiny izany, na dia teraky ny kibon’i Abrahama aza ireny; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay tsy isan’ny firazanan’ireo akory no nandray ny fahafolonkarena tamin’i Abrahama sy nitsodrano ilay nanana ny teny fikasana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy azo lavina akory anefa fa ny kely no mahazo tsodrano amin’ny lehibe noho ny tenany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary etỳ dia izay olona mety maty no mandray ny fahafolonkarena, fa any kosa dia izay ambara fa velona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary azo lazaina aza fa i Levy, izay mandray ny fahafolonkarena, dia mba nandoa ny fahafolonkarena koa tao anatin’i Abrahama, '
