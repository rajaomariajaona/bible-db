document_id: HEB.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mpisoronabe araka ny fomban’i Melkizedeka
  - type: text
    content: 'Fa io Melkizedeka io dia mpanjakan’i Salema sy mpisoron’Andriamanitra Avo Indrindra, ilay nitsena an’i Abrahama rehefa niverina avy nandresy ny mpanjaka maro izy ka nitsodrano azy '
  '10':
  - type: text
    content: satria mbola tao an-kibon’ny rainy ihany izy tamin’ny nitsenan’i Melkizedaka an’i Abrahama.
  '11':
  - type: text
    content: 'Koa raha nisy fanatanterahana tamin’ny fisoronan’i Levy, fa tamin’izany no nahazoan’ny olona ny lalàna, ahoana no mbola ilàna mpisorona hafa hiseho araka ny fomban’i Melkizedeka ihany, izay tsy hotononina araka ny fomban’i Arona? '
  '12':
  - type: text
    content: 'Fa raha ovana ny fisoronana dia tsy maintsy ovana koa ny lalàna. '
  '13':
  - type: text
    content: 'Fa izay nolazaina amin’izany teny izany dia avy tamin’ny firenena hafa izay tsy nisy olona nanompo teo amin’ny alitara. '
  '14':
  - type: text
    content: 'Fa hita marimarina fa avy tamin’i Joda no nisehoan’ny Tompontsika, ary izany foko izany dia tsy nisy nolazain’i Mosesy akory rehefa niteny ny amin’izay ho mpisorona izy. '
  '15':
  - type: text
    content: 'Ary vao mainka hita mazava kokoa indray izany raha misy mpisorona hafa miseho ka tahaka an’i Melkizedeka '
  '16':
  - type: text
    content: 'izay natao tsy araka ny lalànan’izay didy araka ny nofo fa araka ny herin’ny fiainana tsy manam-pahataperana. '
  '17':
  - type: text
    content: 'Fa izao no nambara ny Aminy:'
  - type: text
    content: «Ianao no mpisorona mandrakizay araka ny fomban’i Melkizedeka» (Sal 110.4).
  '18':
  - type: text
    content: 'Eny, foana ny didy teo aloha noho ny halemeny sy noho izy tsy nahasoa, '
  '19':
  - type: text
    content: fa ny lalàna dia tsy nahatanteraka na inona na inona, ary misy kosa fampidirana ny fanantenana tsaratsara kokoa, izay anatonantsika an’Andriamanitra.
  '2':
  - type: text
    content: 'sady nomen’i Abrahama ny ampahafolon’ny zavatra rehetra aza. Raha adika ny anarany, ny heviny voalohany dia mpanjakan’ny fahamarinana aloha, izay vao mpanjakan’i Salema koa, izany hoe: Mpanjakan’ny fiadanana. '
  '20':
  - type: text
    content: 'Ary tahaka an’i Melkizedeka tsy natao mpisorona raha tsy tamin’ny fianianana, '
  '21':
  - type: text
    content: 'nefa ny hafa dia natao mpisorona tsy tamin’ny fianianana, fa Izy kosa dia tamin’ny fianianana nataon’ilay nilaza taminy hoe:'
  - type: text
    content: '«Efa nianiana NY TOMPO ka tsy hanenina:'
  - type: text
    content: Ianao no mpisorona mandrakizay» (Sal 110.4).
  '22':
  - type: text
    content: Dia tahaka izany no nanaovana an’i Jesosy ho mpiantoka ny fanekena tsara lavitra.
  '23':
  - type: text
    content: 'Fa natao maro ireny mpisorona ireny satria tsy navelan’ny fahafatesana haharitra izy; '
  '24':
  - type: text
    content: 'fa Izy kosa dia manana fisoronana tsy dimbiasana satria maharitra mandrakizay Izy; '
  '25':
  - type: text
    content: koa amin’izany dia mahavonjy tanteraka izay manatona an’Andriamanitra amin’ny alalany Izy satria velona mandrakizay hanao fifonana ho azy.
  '26':
  - type: text
    content: 'Fa Mpisoronabe tahaka izany no mendrika ho antsika: Dia izay masina, tsy misy tsiny, tsy misy loto, miavaka amin’ny mpanota ka natao avo noho ny lanitra. '
  '27':
  - type: text
    content: 'Izy dia tsy mila hanolotra fanatitra isanandro tahaka ny ataon’ireny Mpisoronabe ireny, voalohany noho ny otan’ny tenany, vao noho ny an’ny olona kosa; fa izany dia nataony indray mandeha ihany raha nanolotra ny tenany Izy. '
  '28':
  - type: text
    content: Fa ny lalàna dia manendry olona izay manana fahalemena ho Mpisoronabe; fa ny tenin’ny fianianana kosa, izay tato aorianan’ny lalàna, dia manendry ny Zanaka izay tonga amin’ny fahatanterahana mandrakizay.
  '3':
  - type: text
    content: Izy dia tsy manan-dray, tsy manan-dreny, tsy manana tantaram-pirazanana, tsy manana andro niandohana na fiafaran’ny fiainana, fa natao tahaka ny Zanak’Andriamanitra ary mitoetra ho mpisorona mandrakizay.
  '4':
  - type: text
    content: 'Hevero ny halehiben’io lehilahy io izay nomen’i Abrahama patriarka ny ampahafolon’izay tsara tamin’ny zavatra nobaboiny. '
  '5':
  - type: text
    content: 'Ary izay avy tamin’ny taranak’i Levy ka mandray ny fisoronana no mahazo teny haka ny fahafolonkarena amin’ny olona araka ny lalàna, dia amin’ny rahalahiny izany, na dia teraky ny kibon’i Abrahama aza ireny; '
  '6':
  - type: text
    content: 'izay tsy isan’ny firazanan’ireo akory no nandray ny fahafolonkarena tamin’i Abrahama sy nitsodrano ilay nanana ny teny fikasana. '
  '7':
  - type: text
    content: 'Tsy azo lavina akory anefa fa ny kely no mahazo tsodrano amin’ny lehibe noho ny tenany. '
  '8':
  - type: text
    content: 'Ary etỳ dia izay olona mety maty no mandray ny fahafolonkarena, fa any kosa dia izay ambara fa velona. '
  '9':
  - type: text
    content: 'Ary azo lazaina aza fa i Levy, izay mandray ny fahafolonkarena, dia mba nandoa ny fahafolonkarena koa tao anatin’i Abrahama, '
