document_id: REV.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjerana an’i Babilona
  - type: text
    content: 'Rehefa afaka izany dia hitako fa indro, nisy anjely iray koa nidina avy tany an-danitra, nanana fahefana lehibe; ary ny tany dia nohazavain’ny voninahiny. '
  '10':
  - type: text
    content: 'Hijanona eny lavitra eny izy ireny noho ny fahatahorana ny fanaintainana manjo azy ka hiteny hoe:'
  - type: text
    content: Indrisy! Indrisy! Ilay tanàna lehibe!
  - type: text
    content: Ry Babilona, tanàna mafy!
  - type: text
    content: Fa tamin’ny ora iray monja dia tonga ny fitsarana anao!
  '11':
  - type: text
    content: 'Ary ny mpivaro-mandeha amin’ny tany dia hitomany sy hisaona azy satria tsy hisy mpividy intsony ny entany, '
  '12':
  - type: text
    content: 'dia entana volamena, volafotsy, vatosoa, perila, rongony fotsy madinika, lamba volomparasy, landy, jaky, hazo mani-pofona, ny fanaka ivoara rehetra mbamin’ny fanaka rehetra amin’ny hazo sarobidy indrindra, varahina, vy ary marbra, '
  '13':
  - type: text
    content: kanelina, zavatra mani-pofona, ditin-kazo, menaka manitra, ditin-kazo mani-pofona, divay, diloilo, lafarinina tsara toto, varimbazaha, omby, ondry, soavaly, kalesy ary tena sy ain’olona.
  '14':
  - type: text
    content: Ny vokatra soa nirinao
  - type: text
    content: dia efa niala taminao;
  - type: text
    content: ny zava-tsoa rehetra sy ny zava-malaza rehetra
  - type: text
    content: dia efa levona tsy ho anao
  - type: text
    content: ary tsy ho hita intsony mandrakizay ireo.
  '15':
  - type: text
    content: 'Ny mpivaro-mandeha izay tonga mpanankarena tamin’izany dia hijanona eny lavitra eny noho ny fahatahorana ny fanaintainana manjo azy ka hitomany sy hisaona '
  '16':
  - type: text
    content: 'ary hiteny hoe:'
  - type: text
    content: Indrisy! Indrisy! Ilay tanàna lehibe
  - type: text
    content: izay nitafy lamba rongony fotsy madinika sy lamba volomparasy sy jaky
  - type: text
    content: ary niravaka volamena sy vatosoa ary perila!
  '17':
  - type: text
    content: Fa tamin’ny ora iray monja no nahafoana ny harena be toy izany!
  - type: text
    content: 'Ary ny mpitondra sambo rehetra sy izay rehetra mandeha eny ambonin’ny ranomasina sy ny tantsambo ary izay rehetra manao raharaha any an-dranomasina dia nijanona teny lavitra eny '
  '18':
  - type: text
    content: 'ary rehefa nahita ny setroky ny fandoroana azy dia niantsoantso hoe: Aiza intsony re no misy tahaka izany tanàna lehibe izany? '
  '19':
  - type: text
    content: 'Ary nanipy vovoka hiraraka tamin’ny lohany izy dia niantsoantso sady nitomany sy nisaona ka niteny hoe:'
  - type: text
    content: Indrisy! Indrisy! Ilay tanàna lehibe
  - type: text
    content: izay nampanankarena izay rehetra manan-tsambo eny amin’ny ranomasina noho ny zava-tsarobidy tao aminy!
  - type: text
    content: Fa tamin’ny ora iray monja no nahafoana izany!
  '2':
  - type: text
    content: 'Ary niantso tamin’ny feo mahery izy hoe: Rava! Rava i Babilona lehibe! Tonga fonenan’ny '
  - type: text
    content: demonia
  - type: text
    content: ' sy fieren’ny fanahy maloto rehetra ary akanin’ny vorona rehetra izay maloto sy ankahalaina izy. '
  '20':
  - type: text
    content: Mifalia noho izay zavatra nanjo azy ianao, ry lanitra,
  - type: text
    content: sy ianareo olona masina, sy ianareo Apostoly, ary ianareo mpaminany!
  - type: text
    content: Fa Andriamanitra efa nitsara azy ka nanome rariny anareo.
  '21':
  - type: text
    content: 'Ary nisy anjely mahery iray nibata vato tahaka ny vato lehibe fikosoham-bary, dia nanipy izany tany an-dranomasina ka niteny hoe:'
  - type: text
    content: Hatsipy mafy toy izany no ho fandrava an’i Babilona,
  - type: text
    content: ilay tanàna lehibe,
  - type: text
    content: ka tsy ho hita intsony izy.
  '22':
  - type: text
    content: Ary ny feon’ny mpitendry lokanga sy ny mpitsoka mozika
  - type: text
    content: sy ny mpitsoka sodina ary ny mpitsoka trompetra
  - type: text
    content: dia tsy ho re eo aminao intsony.
  - type: text
    content: Ary ny mpahay taozavatra rehetra, na inona na inona sokajiny,
  - type: text
    content: dia tsy ho hita eo aminao intsony;
  - type: text
    content: ary ny feon’ny vato fikosoham-bary
  - type: text
    content: dia tsy ho re eo aminao intsony;
  '23':
  - type: text
    content: ary ny fahazavan’ny jiro
  - type: text
    content: dia tsy mba hahazava eo aminao intsony;
  - type: text
    content: ary ny feon’ny mpampakatra sy ny ampakarina
  - type: text
    content: dia tsy ho re eo aminao intsony
  - type: text
    content: satria ny mpivaro-mandeha teo aminao no lehiben’ny tany
  - type: text
    content: ary ny ody ratsinao no noentinao namitaka ny firenena rehetra;
  '24':
  - type: text
    content: tao anatin’ny tanàna no nahitana ny ran’ny mpaminany sy ny olona masina ary izay rehetra novonoina teny ambonin’ny tany.
  '3':
  - type: text
    content: Fa tamin’ny divain’ny fahatezerana noho ny fijangajangany no nahalavoan’ny firenena rehetra, ary ny mpanjakan’ny tany dia nijangajanga taminy, ary ny mpivaro-mandeha amin’ny tany dia tonga mpanankarena noho ny fanaranam-pony tamin’ny fiainam-ben-dRavehivavy.
  '4':
  - type: text
    content: 'Ary nandre feo iray hafa koa avy tany an-danitra aho niteny hoe:'
  - type: text
    content: Mialà aminy ianareo, ry oloko, mba tsy hiombonanareo ota aminy ary mba tsy hisy hahazo anareo ny loza manjo azy.
  '5':
  - type: text
    content: Fa ny fahotany dia nitehika hatrany amin’ny lanitra, ary Andriamanitra dia nahatsiaro ny ratsy nataony.
  '6':
  - type: text
    content: 'Mamalia azy araka izay nataony ka omeo indroa heny toy ny nataony izy! Ny kapoaka izay nofenoiny dia fenoy indroa heny ho azy. '
  '7':
  - type: text
    content: 'Toraka izay niderany tena sy nanaranany fo tamin’ny harembe, dia omeo fanaintainana sy alahelo toraka izany koa izy satria hoy izy anakampo: Mipetraka ho mpanjakavavy aho fa tsy mpitondratena, ary tsy mba hahita alahelo mihitsy aho; '
  '8':
  - type: text
    content: koa noho izany dia ho tonga indray andro monja izao loza hanjo azy izao, dia fahafatesana sy fisaonana ary mosary, ary ho levon’ny afo izy. Fa mahery ny Tompo Andriamanitra izay nitsara azy.
  '9':
  - type: text
    content: 'Ary ny mpanjakan’ny tany izay nijangajanga taminy sy niara-nanaram-po taminy tamin’ny fiainam-be, dia hiteha-tratra sy hitomany azy rehefa mahita ny setroky ny fandoroana azy. '
