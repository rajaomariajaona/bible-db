document_id: REV.18,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjerana an’i Babilona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa afaka izany dia hitako fa indro, nisy anjely iray koa nidina avy tany an-danitra, nanana fahefana lehibe; ary ny tany dia nohazavain’ny voninahiny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hijanona eny lavitra eny izy ireny noho ny fahatahorana ny fanaintainana manjo azy ka hiteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! Indrisy! Ilay tanàna lehibe!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Babilona, tanàna mafy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tamin’ny ora iray monja dia tonga ny fitsarana anao!
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny mpivaro-mandeha amin’ny tany dia hitomany sy hisaona azy satria tsy hisy mpividy intsony ny entany, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'dia entana volamena, volafotsy, vatosoa, perila, rongony fotsy madinika, lamba volomparasy, landy, jaky, hazo mani-pofona, ny fanaka ivoara rehetra mbamin’ny fanaka rehetra amin’ny hazo sarobidy indrindra, varahina, vy ary marbra, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: kanelina, zavatra mani-pofona, ditin-kazo, menaka manitra, ditin-kazo mani-pofona, divay, diloilo, lafarinina tsara toto, varimbazaha, omby, ondry, soavaly, kalesy ary tena sy ain’olona.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny vokatra soa nirinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia efa niala taminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zava-tsoa rehetra sy ny zava-malaza rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia efa levona tsy ho anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho hita intsony mandrakizay ireo.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny mpivaro-mandeha izay tonga mpanankarena tamin’izany dia hijanona eny lavitra eny noho ny fahatahorana ny fanaintainana manjo azy ka hitomany sy hisaona '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary hiteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! Indrisy! Ilay tanàna lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nitafy lamba rongony fotsy madinika sy lamba volomparasy sy jaky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary niravaka volamena sy vatosoa ary perila!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa tamin’ny ora iray monja no nahafoana ny harena be toy izany!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpitondra sambo rehetra sy izay rehetra mandeha eny ambonin’ny ranomasina sy ny tantsambo ary izay rehetra manao raharaha any an-dranomasina dia nijanona teny lavitra eny '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary rehefa nahita ny setroky ny fandoroana azy dia niantsoantso hoe: Aiza intsony re no misy tahaka izany tanàna lehibe izany? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary nanipy vovoka hiraraka tamin’ny lohany izy dia niantsoantso sady nitomany sy nisaona ka niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! Indrisy! Ilay tanàna lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nampanankarena izay rehetra manan-tsambo eny amin’ny ranomasina noho ny zava-tsarobidy tao aminy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tamin’ny ora iray monja no nahafoana izany!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary niantso tamin’ny feo mahery izy hoe: Rava! Rava i Babilona lehibe! Tonga fonenan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' sy fieren’ny fanahy maloto rehetra ary akanin’ny vorona rehetra izay maloto sy ankahalaina izy. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mifalia noho izay zavatra nanjo azy ianao, ry lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ianareo olona masina, sy ianareo Apostoly, ary ianareo mpaminany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra efa nitsara azy ka nanome rariny anareo.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary nisy anjely mahery iray nibata vato tahaka ny vato lehibe fikosoham-bary, dia nanipy izany tany an-dranomasina ka niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatsipy mafy toy izany no ho fandrava an’i Babilona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay tanàna lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho hita intsony izy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary ny feon’ny mpitendry lokanga sy ny mpitsoka mozika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny mpitsoka sodina ary ny mpitsoka trompetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho re eo aminao intsony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpahay taozavatra rehetra, na inona na inona sokajiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho hita eo aminao intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny feon’ny vato fikosoham-bary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho re eo aminao intsony;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ary ny fahazavan’ny jiro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mba hahazava eo aminao intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny feon’ny mpampakatra sy ny ampakarina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho re eo aminao intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny mpivaro-mandeha teo aminao no lehiben’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ody ratsinao no noentinao namitaka ny firenena rehetra;
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: tao anatin’ny tanàna no nahitana ny ran’ny mpaminany sy ny olona masina ary izay rehetra novonoina teny ambonin’ny tany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa tamin’ny divain’ny fahatezerana noho ny fijangajangany no nahalavoan’ny firenena rehetra, ary ny mpanjakan’ny tany dia nijangajanga taminy, ary ny mpivaro-mandeha amin’ny tany dia tonga mpanankarena noho ny fanaranam-pony tamin’ny fiainam-ben-dRavehivavy.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nandre feo iray hafa koa avy tany an-danitra aho niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mialà aminy ianareo, ry oloko, mba tsy hiombonanareo ota aminy ary mba tsy hisy hahazo anareo ny loza manjo azy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa ny fahotany dia nitehika hatrany amin’ny lanitra, ary Andriamanitra dia nahatsiaro ny ratsy nataony.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mamalia azy araka izay nataony ka omeo indroa heny toy ny nataony izy! Ny kapoaka izay nofenoiny dia fenoy indroa heny ho azy. '
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Toraka izay niderany tena sy nanaranany fo tamin’ny harembe, dia omeo fanaintainana sy alahelo toraka izany koa izy satria hoy izy anakampo: Mipetraka ho mpanjakavavy aho fa tsy mpitondratena, ary tsy mba hahita alahelo mihitsy aho; '
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: koa noho izany dia ho tonga indray andro monja izao loza hanjo azy izao, dia fahafatesana sy fisaonana ary mosary, ary ho levon’ny afo izy. Fa mahery ny Tompo Andriamanitra izay nitsara azy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary ny mpanjakan’ny tany izay nijangajanga taminy sy niara-nanaram-po taminy tamin’ny fiainam-be, dia hiteha-tratra sy hitomany azy rehefa mahita ny setroky ny fandoroana azy. '
