document_id: REV.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: I Jaona Apostoly, izay manoratra ny Boky Apokalipsy dia milaza azy ho fanambaràn’i Jesosy Kristy, izay nambarany tamin’i Jaona tamin’ny alalan’ny fahitana sy sariohatra maro. Ny Boky dia isan’ireo soratra atao hoe apokaliptika izay soratra faminaniana manana ny fombany manokana. Isan’ireny ny bokin’i Daniela, Ezekiela 38-39, Joela, Zakaria, Matio 24-25, Marka 13, Lioka 21, 1Korintiana 15.23-28, 1Tesaloniana 4.15-17, 2Tesaloniana 2.1-12, sy soratra hafa koa. Ireny soratra ireny matetika dia voasoratra ho fampaherezana ny Fiangonana tao anatin’ny fanenjehana mafy. Koa ny boky Apokalipsy dia nosoratan’i Jaona Apostoly tamin’ny fanenjehana nataon’ny amperora romana, noho ny Fiangonana tsy manaiky afa-tsy Jesosy Kristy ho Tompo tokana.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny dikan’ny hoe apokalipsy dia fanambaràna zavatra miafina ka alana rakotra. Izay ambaran’i Jesosy Tompo ao amin’ny Boky dia ny zavatra ankehitriny, dia ny ankehitriny amin’ny mpanoratra izany, ary ny zavatra ho avy. Ny ankehitriny izay ambara dia ny toetry ny Fiangonana fito tany Azia Minora, ary ny ho avy dia ny zavatra izay hitranga mialoha ny hiavian’ny Tompo.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ny Boky dia feno sary sy sariohatra, izay saro-draisina be ihany amin’ny maro, kanefa ny mpamaky tamin’ny fotoanan’i Jaona, izay tena nilona tamin’ny Testamenta Taloha, dia mora nahafantatra tsara ihany ny hevitra ambara. Ny Boky dia feno filazana avy amin’ny Testamenta Taloha, indrindra fa ny Eksodosy, Daniela, Ezekiela, Zakaria. Maro samihafa ny fahitana ambaran’i Jaona ka mety ho sarotra ihany ny manazava ny antsipirihany amin’izy ireny, kanefa mazava ny fotokevitra lehibe ambaran’izy rehetra dia izao: Ny fifanoheran’ny herin’ny ratsy izay manan-kery vetivety amin’izao fotoana izao sy ny fanjakan’Andriamanitra izay tarihin’i Jesosy Kristy sy ny olony, izay tsy maintsy handresy tanteraka amin’ny farany.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny mpamaky ankehitriny dia tsy tokony ho variana loatra hamantatra ny datin’andro izay tsy ho fantatsika, fa handray ny tena hafatry ny mpanoratra, dia ny fampaherezana ny Mino mba hihazona ny finoana amin’ny andro sarotra, ka ireo fahitana ao amin’ny Boky dia mikendry haneho ny vokatry ny asan’i Kristy voahombo sy tafatsangana, amin’ny ankehitriny sy amin’ny ho avy.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fampidirana, fiarahabana, fitantaran’i Jaona ny nahitany an’i Jesosy amin’ny voninahiny: 1.1-20'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fanehoana ny zavatra ankehitriny: Jesosy mamangy ny Fiangonana fito any Azia Minora: 2–3'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fanehoana ny zavatra ho avy, mialoha ny fiavian’i Jesosy: 4.1–22.5'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Famaranana ny Boky: 22.6-21'
