    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Araka ny andininy voalohany, ny mpanoratra dia i Joda. Ny tena tokony hilazana azy dia Jodasy, kanefa mahazatra ny milaza azy hoe Joda mba tsy hampifangaroana azy amin’ilay mpamadika. Ny anarana hoe Joda na Jodasy dia be mpanana tokoa, ary ny maro dia mihevitra fa i Jodasy, isan’ireo rahalahin’i Jesosy, voalaza ao amin’ny Marka 6.3, io mpanoratra io. Milaza ny tenany ho mpanompon’i Jesosy izy fa tsy «rahalahiny», mba tsy hiheveran’ny mpamaky azy ho manana fahefana toa an’i Jesosy. Ankoatra izany, ity epistily ity dia manana endrika apokaliptika, mikasika ny ho famaliana ny ratsy fanahy, izay tsy maintsy ho tonga haingana sady efa tonga rahateo, ary manambara koa ny amin’ny anjely. Ny votoatin’ity epistily ity dia mitovy be ihany amin’ny 2Petera, indrindra ny toko faharoa. Ireo epistily roa ireo dia manohitra ny olona sasany izay tafiditra ao amin’ny Fiangonana nefa mitondra fampianarana sandoka ary mampivily hiala amin’ny finoana; olona mirehareha sady manao fitondrantena ratsy izy ireo. Koa ny Epistily dia mananatra ny mpamaky mba hihazona ny fampianaran’ny Apostoly izay efa nanambara mialoha ny hitrangan’izany fihemorana izany, fa mba handroso kosa amin’ny finoana sy ny fivavahana ao amin’ny Fanahy Masina, ary hamindra fo amin’ny malemy finoana.
