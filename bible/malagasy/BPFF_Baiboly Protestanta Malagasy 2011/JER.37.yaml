document_id: JER.37
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nandefa iraka mba hila hevitra amin’i Jeremia i Zedekia mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Zedekia mpanjaka, zanak’i Josia, no nanjaka nandimby an’i Jekonia, zanak’i Joiakima, fa nampanjakain’i Nebokadnezara, mpanjakan’i Babilona, tao amin’ny tanin’ny Joda izy; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: nefa na izy, na ny mpanompony, na ny vahoaka dia samy tsy nihaino ny tenin’NY TOMPO, izay nampilazainy an’i Jeremia mpaminany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary i Zedekia mpanjaka dia naniraka an’i Jehokala, zanak’i Selemia, sy i Zefania, zanak’i Mahaseia, mpisorona, ho any amin’i Jeremia mpaminany hiteny hoe: Mba mivavaha re ho anay amin’NY TOMPO Andriamanitsika!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’izany dia mbola afaka nivezivezy teo amin’ny olona ihany i Jeremia; fa tsy mbola nataony tao an-tranomaizina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary efa niainga avy tany Ejipta ny miaramilan’i Farao ka raha nahare izany ny Kaldeana izay nanao fahirano an’i Jerosalema, dia niala tao Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia tonga tamin’i Jeremia mpaminany ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Izao no lazaonareo amin’ny mpanjakan’ny Joda, izay naniraka anareo hankaty Amiko mba hanontany Ahy: Indro, ny miaramilan’i Farao, izay efa niainga hamonjy anareo, dia hiverina ho any Ejipta taniny; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa ho avy indray ny Kaldeana dia hamely ity tanàna ity sady haka azy ary handoro azy amin’ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no lazain’NY TOMPO: Aza mamita-tena foana ianareo ka miteny hoe: Hiala amintsika tokoa ny Kaldeana; fa tsy hiala izy tsy akory. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa na dia mamely ny miaramilan’ny Kaldeana rehetra izay miady aminareo aza ianareo ka izay voalefona no ho sisa velona dia samy hitsangana avy ao anaty tranolainy ireo ka handoro ity tanàna ity amin’ny afo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voaendrikendrika ho mpamadika i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha niala tany Jerosalema ny miaramilan’ny Kaldeana noho ny amin’ny miaramilan’i Farao '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia nivoaka avy tao Jerosalema i Jeremia hankany amin’ny tanin’ny Benjamina mba handray izay anjara lovany eo amin’ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony tonga teo am-bavahadin’i Benjamina izy dia indro, ny lehiben’ny mpiambina, atao hoe Jiria, zanak’i Selemia, zanak’i Hanania, no teo; dia nisambotra an’i Jeremia mpaminany izy ka niteny hoe: Miray tetika amin’ny Kaldeana ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy i Jeremia: Lainga izany. Tsy miray tetika amin’ny Kaldeana aho. Nefa tsy nino azy ireo ka nosamborin’i Jiria ihany i Jeremia ary noentiny ho ao amin’ny mpanapaka. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tezitra tamin’i Jeremia ny mpanapaka ka nikapoka azy, dia nandatsaka azy tao an-tranomaizina tao amin’ny tranon’i Jonatana mpitantsoratra; fa izany no nataony tranomaizina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary naiditra tao an-tranomaizina, tao amin’ny efitra iray, i Jeremia, ary efa nitoetra tao andro maro izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niresaka mangingina tamin’i Jeremia i Zedekia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nandefa iraka haka azy i Zedekia mpanjaka; dia nanontany azy mangingina tao an-tranony ny mpanjaka hoe: Moa misy teny avy tamin’NY TOMPO tokoa va? Dia hoy i Jeremia: Eny, misy; ary hoy koa izy: Hatolotra eo an-tanan’ny mpanjakan’i Babilona ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy koa i Jeremia tamin’i Zedekia mpanjaka: Inona no ratsy nataoko taminao, na tamin’ny mpanomponao, na tamin’ity firenena ity, no dia nataonareo an-tranomaizina aho? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aiza moa ireo mpaminaninareo izay naminany taminareo hoe: Tsy ho avy hiady aminareo na hamely ity tany ity ny mpanjakan’i Babilona? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa trara antitra ianao, ry tompokolahy mpanjaka, henoy kely ange! Miankohoka eto anatrehanao aho, raiso ny fiangaviako ka aza averina ho ao amin’ny tranon’i Jonatana mpitantsoratra aho, fandrao dia maty ao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia nasain’i Zedekia mpanjaka nataony teo amin’ny kianjan’ny trano fiambenana i Jeremia ka nasainy nomena mofo iray isanandro avy any amin’ny fitoeran’ny mpanao mofo izy, ambara-pahalanin’ny mofo rehetra tao an-tanàna. Toy izany no nitoeran’i Jeremia teo amin’ny kianjan’ny trano fiambenana.
