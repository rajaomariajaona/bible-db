- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny hoe Nomery dia midika hoe Isa, ary izany dia noho ireo fanisana roa lehibe natao tao amin’ny Zanak’Israely. Ny anarany ao amin’ny Baiboly hebreo dia hoe Tany an-tany efitra, ary izany indray dia tandrify ny boky manontolo, izay mitantara ny 40 taona tany an-tany efitra.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Boky dia mitantara ny dian’ny Zanak’Israely ho any Kanana, niainga avy tao Sinay, mandra-pahatongany any Moaba, eo ampitan’i Jordana. Izany fotoana izany anefa dia nahitan’ny Israely fisedrana maro noho ny ditrany sy ny fisalasalany ny amin’ny fitondran’Andriamanitra. Matetika dia nikomy tamin’ireo mpitondra izy, ary tamin’Andriamanitra koa aza. Noho ny tsy finoany dia nirenireny 40 taona tany an-tany efitra izy. Nisy fanisana talohan’ny 40 taona, ary nisy iray hafa taorianan’izany ka ireo taranaka voaisa tamin’ny fanisana faharoa no ho tafiditra any Kanana. Na dia tao aza ny ditran’ny Israely, Andriamanitra dia nanatanteraka ny fikasany tamin’ireo taranaka vaovao ireo.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ao Sinay: Fanomanana ny dia sy fanisana: 1.1–10.10'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'An-dalana ho any Moaba: 10.11–21.9'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fandraisana ny tany any andafin’i Jordana: 21.10–36.13'
