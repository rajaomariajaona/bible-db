document_id: SNG.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ralehilahy)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Endre, tsara tarehy ianao, Rahavako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endre, tsara tarehy ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masonao dia toy ny an’ny voromailala eo amin’ny fisalobonanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny volonao dia tahaka ny andian’osy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay miriotra midina ny tendrombohitr’i Gileada.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Akory ny hatsaran’ny fitiavanao, ry havako ampakariko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akory ny hatsaran’ny fitiavanao! Eny, tsara noho ny divay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hanitry ny menakao dia mihoatra noho ny balisama rehetra!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mitete tantely toy ny avy amin’ny tohotra ny molotrao, ry ampakariko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tantely sy ronono no ao ambanin’ny lelanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fofon’ny fitafianao dia tahaka ny fofon’i Libanona.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Saha voafefy tsara ianao ry havako ampakariko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: loharano voahidy, fantsakan-drano voaisy tombo-kase.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ianao no saha anirian’ny ampongabendanitra tsara voa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady misy voninkazo sy narda,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: eny, narda sy tamotamo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: veromanitra sy havozomanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hazo misy ny ditin-kazo mani-pofona rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miora sy hazo manitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny balisama rehetra.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ravehivavy)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Loharano ao an-tsaha ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: loharano miboiboika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary renirano kely avy any Libanona.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mifohaza, ry rivotra avy any avaratra; avia, ry avy any atsimo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitsofa eny an-tsahako hielezan’ny fofon’ny balisama.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny malalako hankaty an-tanimboliny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hihinana ny voankazony tsara.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny nifinao dia tahaka ny andian’ondrivavy efa voahety
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay miakatra avy eo amin’ny fampandroana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy kambana avy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy tsy mana-namana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tahaka ny kofehy jaky ny molotrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary milantolanto ny fitenenanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny hasin’ampongabendanitra ny takolakao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny fisalobonanao;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ny vozonao dia tahaka ny tilikambon’i Davida,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: natao ho trano fihantonana fitaovam-piadiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampinga arivo no voahantona teo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny ampinga rehetra an’ny lehilahy mahery fo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny nononao roa dia toy ny zana-gazela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zana-gazela kambana, dia gazela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay miraoka ahitra eny amin’ny lisy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mandra-pangatsiatsiaka ny andro, koa amin’ny milenti-masoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handeha ho any amin’ny tendrombohitry ny miora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny havoanan’ny ditin-kazo mani-pofona aho.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsara avokoa izato bikanao izato, Rahavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy kilema ianao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Avia hiaraka amiko avy any Libanona, ry ampakariko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hiaraka amiko avy any Libanona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitazàna avy eny an-tampon’i Amana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny an-tampon’i Senira sy i Hermona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lavaky ny liona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tendrombohitry ny leoparda.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Babonao ny foko, ry havako ampakariko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: babonao ny foko tamin’ny fijerin’ny masonao an’ila fotsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tamin’ny rojo iray amin’ny vozonao.
