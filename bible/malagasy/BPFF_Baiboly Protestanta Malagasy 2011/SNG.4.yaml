document_id: SNG.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: (Ralehilahy)
  - type: text
    content: Endre, tsara tarehy ianao, Rahavako!
  - type: text
    content: Endre, tsara tarehy ianao!
  - type: text
    content: Ny masonao dia toy ny an’ny voromailala eo amin’ny fisalobonanao;
  - type: text
    content: ny volonao dia tahaka ny andian’osy
  - type: text
    content: izay miriotra midina ny tendrombohitr’i Gileada.
  '10':
  - type: text
    content: Akory ny hatsaran’ny fitiavanao, ry havako ampakariko!
  - type: text
    content: Akory ny hatsaran’ny fitiavanao! Eny, tsara noho ny divay!
  - type: text
    content: Ary ny hanitry ny menakao dia mihoatra noho ny balisama rehetra!
  '11':
  - type: text
    content: Mitete tantely toy ny avy amin’ny tohotra ny molotrao, ry ampakariko;
  - type: text
    content: tantely sy ronono no ao ambanin’ny lelanao,
  - type: text
    content: ary ny fofon’ny fitafianao dia tahaka ny fofon’i Libanona.
  '12':
  - type: text
    content: Saha voafefy tsara ianao ry havako ampakariko,
  - type: text
    content: loharano voahidy, fantsakan-drano voaisy tombo-kase.
  '13':
  - type: text
    content: Ianao no saha anirian’ny ampongabendanitra tsara voa,
  - type: text
    content: sady misy voninkazo sy narda,
  '14':
  - type: text
    content: eny, narda sy tamotamo,
  - type: text
    content: veromanitra sy havozomanitra
  - type: text
    content: ary ny hazo misy ny ditin-kazo mani-pofona rehetra,
  - type: text
    content: miora sy hazo manitra
  - type: text
    content: mbamin’ny balisama rehetra.
  - type: heading
    content: (Ravehivavy)
  '15':
  - type: text
    content: Loharano ao an-tsaha ianao,
  - type: text
    content: loharano miboiboika,
  - type: text
    content: ary renirano kely avy any Libanona.
  '16':
  - type: text
    content: Mifohaza, ry rivotra avy any avaratra; avia, ry avy any atsimo,
  - type: text
    content: mitsofa eny an-tsahako hielezan’ny fofon’ny balisama.
  - type: text
    content: Aoka ny malalako hankaty an-tanimboliny
  - type: text
    content: ka hihinana ny voankazony tsara.
  '2':
  - type: text
    content: Ny nifinao dia tahaka ny andian’ondrivavy efa voahety
  - type: text
    content: izay miakatra avy eo amin’ny fampandroana azy;
  - type: text
    content: samy kambana avy ireo
  - type: text
    content: ka tsy misy tsy mana-namana.
  '3':
  - type: text
    content: Tahaka ny kofehy jaky ny molotrao,
  - type: text
    content: ary milantolanto ny fitenenanao;
  - type: text
    content: tahaka ny hasin’ampongabendanitra ny takolakao
  - type: text
    content: eo amin’ny fisalobonanao;
  '4':
  - type: text
    content: ny vozonao dia tahaka ny tilikambon’i Davida,
  - type: text
    content: natao ho trano fihantonana fitaovam-piadiana;
  - type: text
    content: ampinga arivo no voahantona teo,
  - type: text
    content: dia ny ampinga rehetra an’ny lehilahy mahery fo.
  '5':
  - type: text
    content: Ny nononao roa dia toy ny zana-gazela
  - type: text
    content: zana-gazela kambana, dia gazela
  - type: text
    content: izay miraoka ahitra eny amin’ny lisy.
  '6':
  - type: text
    content: Mandra-pangatsiatsiaka ny andro, koa amin’ny milenti-masoandro
  - type: text
    content: dia handeha ho any amin’ny tendrombohitry ny miora
  - type: text
    content: sy ny havoanan’ny ditin-kazo mani-pofona aho.
  '7':
  - type: text
    content: Tsara avokoa izato bikanao izato, Rahavako;
  - type: text
    content: tsy misy kilema ianao.
  '8':
  - type: text
    content: Avia hiaraka amiko avy any Libanona, ry ampakariko,
  - type: text
    content: eny, hiaraka amiko avy any Libanona;
  - type: text
    content: mitazàna avy eny an-tampon’i Amana,
  - type: text
    content: eny an-tampon’i Senira sy i Hermona,
  - type: text
    content: lavaky ny liona,
  - type: text
    content: sy ny tendrombohitry ny leoparda.
  '9':
  - type: text
    content: Babonao ny foko, ry havako ampakariko,
  - type: text
    content: babonao ny foko tamin’ny fijerin’ny masonao an’ila fotsiny
  - type: text
    content: sy tamin’ny rojo iray amin’ny vozonao.
