document_id: LUK.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarihanteny
  - type: text
    content: 'Satria maro no efa nanoratra nandahatra tantara ny amin’ny zavatra izay efa tanteraka tamintsika tokoa '
  '10':
  - type: text
    content: 'Ary ny vahoaka rehetra dia nitoetra teo ivelany nivavaka tamin’ny ora fandoroana ny ditin-kazo manitra. '
  '11':
  - type: text
    content: 'Dia nisy anjelin’ny Tompo niseho taminy teo ankavanan’ny alitara fandoroana ny ditin-kazo manitra. '
  '12':
  - type: text
    content: 'Nony nahita azy i Zakaria dia taitra loatra ka raiki-tahotra. '
  '13':
  - type: text
    content: 'Fa hoy ilay anjely taminy:'
  - type: text
    content: Aza matahotra, ry Zakaria
  - type: text
    content: fa efa nohenoina ny fangatahanao,
  - type: text
    content: koa i Elizabeta vadinao dia hiteraka zazalahy aminao
  - type: text
    content: ary Jaona no hataonao anarany.
  '14':
  - type: text
    content: Ho faly sy ho ravoravo ianao;
  - type: text
    content: ary maro no hifaly amin’ny hahaterahany.
  '15':
  - type: text
    content: Fa ho lehibe eo anatrehan’ny Tompo izy
  - type: text
    content: ary tsy hisotro divay na toaka
  - type: text
    content: sady hofenoina ny Fanahy Masina hatrany an-kibon’ny reniny aza.
  '16':
  - type: text
    content: Ary maro amin’ny Zanak’Israely no hampodiny amin’NY TOMPO Andriamaniny.
  '17':
  - type: text
    content: Handeha eo alohany amin’ny fanahy sy ny herin’i Elia izy
  - type: text
    content: mba hampody ny fon’ny ray ho amin’ny zanaka,
  - type: text
    content: ny tsy manoa ho amin’ny fahendren’ny marina, ary hamboatra firenena voaomana ho an’ny Tompo (Mal 3.23, 24).
  '18':
  - type: text
    content: 'Dia hoy i Zakaria tamin’ilay anjely: Ahoana no hahafantarako izany? Fa izaho efa antitra ary efa antitra koa ny vadiko. '
  '19':
  - type: text
    content: 'Namaly azy ilay anjely hoe: Izaho no Gabriela izay mitsangana eo anatrehan’Andriamanitra; ary nirahina hiteny aminao aho ka hanambara aminao izany vaovao mahafaly izany. '
  '2':
  - type: text
    content: 'araka izay efa natolotra antsika avy tamin’ireo vavolombelona nahita maso hatramin’ny voalohany sady efa tonga mpanompon’ny Teny, '
  '20':
  - type: text
    content: Koa indro, ho moana ianao ka tsy hahay miteny ambara-pahatongan’ny andro hisehoan’izany zavatra izany, ho valin’ny tsy ninoanao ny teniko, izay ho tanteraka amin’ny fotoanany.
  '21':
  - type: text
    content: 'Ary ny olona dia niandry an’i Zakaria ka gaga noho izy naharitra ela tao amin’ny tempoly. '
  '22':
  - type: text
    content: 'Kanjo rehefa niala tao izy dia tsy nahay niteny tamin’izy ireo; koa fantatry ny olona fa nahita fahitana tao amin’ny tempoly izy; nampiasa baiko moana taminy izy, ary mbola moana ihany. '
  '23':
  - type: text
    content: Rehefa tapitra ny andro nanaovany fanompoam-pivavahana dia lasa nody tany an-tranony izy.
  '24':
  - type: text
    content: 'Taorianan’izany andro izany dia nitoe-jaza i Elizabeta vadiny, dia niery dimy volana izy ka nilaza hoe: '
  '25':
  - type: text
    content: Izao no nataon’ny Tompo tamiko tamin’ny andro izay niheverany manokana ny hahafa-tondro-maso ahy amin’ny olona.
  - type: heading
    content: Ny filazana ny amin’ny hahaterahan’i Jesosy
  '26':
  - type: text
    content: 'Tamin’ny fahenim-bolana dia nirahin’Andriamanitra ny anjely Gabriela ho any an-tanàna iray any Galilia antsoina hoe Nazareta, '
  '27':
  - type: text
    content: 'ho any amin’ny virijiny iray, izay voafofo ho vadin’ny lehilahy atao hoe Josefa, avy tamin’ny taranak’i Davida; ny anaran’ilay virijiny dia Maria. '
  '28':
  - type: text
    content: 'Nony niditra tao aminy ilay anjely dia niteny hoe: Arahaba'
  - type: note
    content: 'Arahaba: ny teny grika ampiasaina eto dia midika hoe: Mifalia.'
  - type: text
    content: ', ry ilay nohasoavina, ny Tompo momba anao. '
  '29':
  - type: text
    content: 'Taitra loatra izy noho ny teniny ka nieritreritra izay tokony ho hevitr’izany fiarahabana izany. '
  '3':
  - type: text
    content: dia sitrako koa, rehefa nofotorako tsara ny zavatra rehetra hatramin’ny niandohany, ny hanoratra izany aminao araka ny filaharany, ry Teofilo tsara indrindra
  - type: note
    content: 'tsara indrindra: teny fanomezam-boninahitra ny manampahefana izany.'
  - type: text
    content: ', '
  '30':
  - type: text
    content: 'Hoy ilay anjely taminy:'
  - type: text
    content: Aza matahotra, ry Maria, fa efa nahita fahasoavana tamin’Andriamanitra ianao.
  '31':
  - type: text
    content: Indro, hitoe-jaza ianao ka hiteraka zazalahy
  - type: text
    content: ary ny anarany dia hataonao hoe JESOSY.
  '32':
  - type: text
    content: Izy ho lehibe ka hantsoina hoe Zanaky ny Avo Indrindra;
  - type: text
    content: NY TOMPO Andriamanitra hanome Azy ny sezafiandrianan’i Davida rainy;
  '33':
  - type: text
    content: hanjaka amin’ny taranak’i Jakoba mandrakizay Izy;
  - type: text
    content: ary ny fanjakany tsy hanam-pahataperana.
  '34':
  - type: text
    content: 'Dia hoy i Maria tamin’ilay anjely: Hanao ahoana re no hahatanteraka izany, fa tsy nahalala lahy aho?'
  '35':
  - type: text
    content: 'Ilay anjely namaly azy hoe:'
  - type: text
    content: Ho tonga aminao ny Fanahy Masina, ary hisy herin’ny Avo Indrindra hanaloka anao;
  - type: text
    content: koa ny Masina izay haterakao dia hantsoina hoe Zanak’Andriamanitra.
  '36':
  - type: text
    content: 'Ary indro i Elizabeta havanao dia efa mitoe-jaza koa, na dia efa antitra aza; efa mandray ny fahenim-bolana izy, izay natao hoe momba, izao. '
  '37':
  - type: text
    content: 'Fa tsy hisy tsy ho tanteraka ny teny rehetra lazain’Andriamanitra. '
  '38':
  - type: text
    content: 'Dia hoy i Maria: Inty ny mpanompovavin’ny Tompo; aoka anie ho tonga amiko araka ny teninao. Dia nandao azy ilay anjely.'
  - type: heading
    content: Ny namangian’i Maria an’i Elizabeta
  '39':
  - type: text
    content: 'Ary niainga i Maria tamin’izany andro izany ka nandeha haingana ho any amin’ny faritra be havoana, ho ao an-tanàna iray any Joda. '
  '4':
  - type: text
    content: mba hahafantaranao tsara fa mafy orina ny teny izay nampianarina anao.
  - type: heading
    content: Ny filazana ny amin’ny hahaterahan’i Jaona Mpanao batisa
  '40':
  - type: text
    content: 'Dia niditra tao an-tranon’i Zakaria izy ka niarahaba an’i Elizabeta. '
  '41':
  - type: text
    content: 'Rehefa ren’i Elizabeta ny fiarahaban’i Maria dia nibitaka ny zaza tao an-kibony; ary nofenoina ny Fanahy Masina i Elizabeta '
  '42':
  - type: text
    content: 'ka niantso tamin’ny feo mahery hoe:'
  - type: text
    content: Notahìna amin’ny samy vehivavy ianao
  - type: text
    content: ary notahìna ny hateraky ny kibonao!
  '43':
  - type: text
    content: 'Avy aiza no ahatongavan’izao amiko no mba vangìn’ny renin’ny Tompoko aho? '
  '44':
  - type: text
    content: 'Fa indro, raha vao ren’ny sofiko ny feon’ny fiarahabanao dia nibitaka noho ny hafaliana ny zaza ato an-kiboko. '
  '45':
  - type: text
    content: Sambatra ianao izay nino; fa hefaina izay zavatra nampilazain’ny Tompo taminao.
  - type: heading
    content: Ny hira fiderana nataon’i Maria
  '46':
  - type: text
    content: 'Dia hoy i Maria:'
  - type: text
    content: Ny foko mankalaza ny Tompo
  '47':
  - type: text
    content: ary ny fanahiko dia ravoravo tamin’Andriamanitra, Mpamonjy ahy;
  '48':
  - type: text
    content: fa efa nijery ny fahambanian’ny toetry ny mpanompovaviny Izy.
  - type: text
    content: Fa indro, hatramin’ny ankehitriny
  - type: text
    content: dia hataon’ny taranaka rehetra ho sambatra aho.
  '49':
  - type: text
    content: Fa ny Mahery efa nanatanteraka zavatra lehibe tamiko;
  - type: text
    content: masina ny anarany.
  '5':
  - type: text
    content: 'Tamin’ny andron’i Heroda, mpanjakan’i '
  - type: text
    content: Jodia
  - type: text
    content: ', dia nisy mpisorona iray atao hoe Zakaria, isan’ny antokon’i Abia; ny vadiny dia avy tamin’ny taranak’i Arona, Elizabeta no anarany. '
  '50':
  - type: text
    content: Ny famindrampony dia amin’izay matahotra Azy
  - type: text
    content: hatramin’ny taranaka fara aman-dimby.
  '51':
  - type: text
    content: Nanatanteraka asa lehibe tamin’ny sandriny Izy;
  - type: text
    content: nampihahaka ny mpiavonavona tamin’ny fiheveran’ny fony Izy.
  '52':
  - type: text
    content: Nampiala ny lehibe tamin’ny sezafiandrianany Izy
  - type: text
    content: ary nanandratra ny ambany kosa.
  '53':
  - type: text
    content: Ny noana dia novokisany soa;
  - type: text
    content: ny manankarena kosa dia nampialainy maina.
  '54':
  - type: text
    content: Niahy ny Israely mpanompony Izy
  - type: text
    content: sady nahatsiaro ny famindrampony,
  '55':
  - type: text
    content: Araka ny voalazany tamin’ny razantsika,
  - type: text
    content: tamin’i Abrahama sy ny taranany mandrakizay.
  '56':
  - type: text
    content: Ary nitoetra teo amin’i Elizabeta tokony ho telo volana i Maria vao nody tany an-tranony.
  - type: heading
    content: Ny nahaterahan’i Jaona Mpanao batisa
  '57':
  - type: text
    content: 'Nony tonga ny andro hiterahan’i Elizabeta dia niteraka zazalahy izy. '
  '58':
  - type: text
    content: Ary nandre ny mpiaramonina taminy sy ny havany fa efa nohalehibeazin’ny Tompo ny famindrampony taminy; dia niara-nifaly taminy ireo.
  '59':
  - type: text
    content: 'Tamin’ny andro fahavalo dia tonga hamora ny zaza izy ireo, koa efa saika hantsoiny araka ny anaran’ny rainy hoe Zakaria, izy. '
  '6':
  - type: text
    content: 'Samy marina teo anatrehan’Andriamanitra izy mivady sady nandeha tsy nanan-tsiny tamin’ny fanarahana ny didy sy ny fitsipika rehetra nomen’ny Tompo. '
  '60':
  - type: text
    content: 'Fa hoy ny reniny: Tsy izany, fa hatao hoe Jaona izy. '
  '61':
  - type: text
    content: 'Fa hoy izy ireo taminy: Tsy misy na dia iray akory aza amin’ny havanao izay manana izany anarana izany. '
  '62':
  - type: text
    content: 'Ary nanao baiko moana tamin’ny rainy izy ireo ka nanontany ny amin’izay tiany hatao anarany. '
  '63':
  - type: text
    content: 'Dia nangataka solaitra iray izy ka nanoratra hoe: Jaona no anarany. Dia gaga avokoa izy rehetra. '
  '64':
  - type: text
    content: 'Ary nisokatra niaraka tamin’izay ny vavany ka afaka niteny ny lelany; dia niteny izy ka nidera an’Andriamanitra. '
  '65':
  - type: text
    content: 'Dia raiki-tahotra izay rehetra niara-monina taminy; ary niely teny amin’ny tany be havoana any '
  - type: text
    content: Jodia
  - type: text
    content: ' rehetra ny lazan’izany rehetra izany. '
  '66':
  - type: text
    content: 'Izay rehetra nandre koa dia nandatsaka izany tao am-pony ka niteny hoe: Ho zaza toy inona re io? Fa ny tanan’ny Tompo no nomba azy.'
  - type: heading
    content: Ny hira fiderana nataon’i Zakaria
  '67':
  - type: text
    content: 'Dia feno ny Fanahy Masina i Zakaria rainy ka naminany hoe:'
  '68':
  - type: text
    content: Isaorana anie ny Tompo Andriamanitry ny Israely;
  - type: text
    content: fa nitsinjo ny olony Izy ka nanao fanavotana ho azy,
  '69':
  - type: text
    content: ary nanangana tandro-pamonjena ho antsika
  - type: text
    content: ao amin’ny taranak’i Davida mpanompony Izy,
  '7':
  - type: text
    content: Tsy nanan-janaka izy satria momba i Elizabeta; ary samy efa antitra izy mivady.
  '70':
  - type: text
    content: araka izay nampilazainy ny mpaminaniny masina hatramin’ny fahagola,
  '71':
  - type: text
    content: dia famonjena antsika amin’ny fahavalontsika
  - type: text
    content: sy amin’ny tanan’izay rehetra mankahala antsika.
  '72':
  - type: text
    content: Manefa famindrampo amin’ny razantsika Izy
  - type: text
    content: sady mahatsiaro ny fanekeny masina,
  '73':
  - type: text
    content: dia ny fianianana izay nianianany tamin’i Abrahama razantsika
  '74':
  - type: text
    content: mba hahazoantsika hanompo Azy tsy amin-tahotra,
  - type: text
    content: satria afaka amin’ny fahavalontsika isika,
  '75':
  - type: text
    content: amin’ny fahamasinana sy ny fahamarinana
  - type: text
    content: eo anatrehany, amin’ny andro rehetra hiainantsika.
  '76':
  - type: text
    content: Ary ianao, ry zaza, dia hatao hoe Mpaminanin’ny Avo Indrindra;
  - type: text
    content: satria hialoha eo anatrehan’ny Tompo ianao, hamboatra ny lalany.
  '77':
  - type: text
    content: Hanome ny olony ny fahalalam-pamonjena
  - type: text
    content: amin’ny famelàna ny helony,
  '78':
  - type: text
    content: noho ny halehiben’ny famindrampon’Andriamanitsika.
  - type: text
    content: Izany no hiposahan’ny mazava avy any amin’ny avo ho antsika
  '79':
  - type: text
    content: mba hanazava izay mipetraka ao amin’ny maizina sy ao amin’ny aloky ny fahafatesana
  - type: text
    content: sady hanitsy ny diantsika ho amin’ny lalam-piadanana.
  - type: heading
    content: Ny fahatanoran’i Jaona Mpanao batisa
  '8':
  - type: text
    content: 'Nony nanao raharaham-pisoronana teo anatrehan’Andriamanitra i Zakaria, araka ny fifandimbiasan’ny antokony, '
  '80':
  - type: text
    content: Ary nihalehibe ny zazakely ka nitombo hery am-panahy; nitoetra tany an-tany efitra izy ambara-pahatongan’ny andro nisehoany tamin’ny Israely.
  '9':
  - type: text
    content: 'araka ny fanao amin’ny fisoronana, dia anjarany araka ny antsapaka, ny hiditra ao amin’ny tempolin’ny Tompo ka handoro ditin-kazo manitra. '
