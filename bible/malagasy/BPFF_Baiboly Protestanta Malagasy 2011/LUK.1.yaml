document_id: LUK.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarihanteny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Satria maro no efa nanoratra nandahatra tantara ny amin’ny zavatra izay efa tanteraka tamintsika tokoa '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'araka izay efa natolotra antsika avy tamin’ireo vavolombelona nahita maso hatramin’ny voalohany sady efa tonga mpanompon’ny Teny, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia sitrako koa, rehefa nofotorako tsara ny zavatra rehetra hatramin’ny niandohany, ny hanoratra izany aminao araka ny filaharany, ry Teofilo tsara indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tsara indrindra: teny fanomezam-boninahitra ny manampahefana izany.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: mba hahafantaranao tsara fa mafy orina ny teny izay nampianarina anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny filazana ny amin’ny hahaterahan’i Jaona Mpanao batisa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’ny andron’i Heroda, mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ', dia nisy mpisorona iray atao hoe Zakaria, isan’ny antokon’i Abia; ny vadiny dia avy tamin’ny taranak’i Arona, Elizabeta no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Samy marina teo anatrehan’Andriamanitra izy mivady sady nandeha tsy nanan-tsiny tamin’ny fanarahana ny didy sy ny fitsipika rehetra nomen’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy nanan-janaka izy satria momba i Elizabeta; ary samy efa antitra izy mivady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nony nanao raharaham-pisoronana teo anatrehan’Andriamanitra i Zakaria, araka ny fifandimbiasan’ny antokony, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'araka ny fanao amin’ny fisoronana, dia anjarany araka ny antsapaka, ny hiditra ao amin’ny tempolin’ny Tompo ka handoro ditin-kazo manitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny vahoaka rehetra dia nitoetra teo ivelany nivavaka tamin’ny ora fandoroana ny ditin-kazo manitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nisy anjelin’ny Tompo niseho taminy teo ankavanan’ny alitara fandoroana ny ditin-kazo manitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony nahita azy i Zakaria dia taitra loatra ka raiki-tahotra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy ilay anjely taminy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra, ry Zakaria
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa nohenoina ny fangatahanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa i Elizabeta vadinao dia hiteraka zazalahy aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Jaona no hataonao anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ho faly sy ho ravoravo ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maro no hifaly amin’ny hahaterahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa ho lehibe eo anatrehan’ny Tompo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisotro divay na toaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hofenoina ny Fanahy Masina hatrany an-kibon’ny reniny aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary maro amin’ny Zanak’Israely no hampodiny amin’NY TOMPO Andriamaniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Handeha eo alohany amin’ny fanahy sy ny herin’i Elia izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampody ny fon’ny ray ho amin’ny zanaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tsy manoa ho amin’ny fahendren’ny marina, ary hamboatra firenena voaomana ho an’ny Tompo (Mal 3.23, 24).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy i Zakaria tamin’ilay anjely: Ahoana no hahafantarako izany? Fa izaho efa antitra ary efa antitra koa ny vadiko. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Namaly azy ilay anjely hoe: Izaho no Gabriela izay mitsangana eo anatrehan’Andriamanitra; ary nirahina hiteny aminao aho ka hanambara aminao izany vaovao mahafaly izany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa indro, ho moana ianao ka tsy hahay miteny ambara-pahatongan’ny andro hisehoan’izany zavatra izany, ho valin’ny tsy ninoanao ny teniko, izay ho tanteraka amin’ny fotoanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny olona dia niandry an’i Zakaria ka gaga noho izy naharitra ela tao amin’ny tempoly. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kanjo rehefa niala tao izy dia tsy nahay niteny tamin’izy ireo; koa fantatry ny olona fa nahita fahitana tao amin’ny tempoly izy; nampiasa baiko moana taminy izy, ary mbola moana ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Rehefa tapitra ny andro nanaovany fanompoam-pivavahana dia lasa nody tany an-tranony izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Taorianan’izany andro izany dia nitoe-jaza i Elizabeta vadiny, dia niery dimy volana izy ka nilaza hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izao no nataon’ny Tompo tamiko tamin’ny andro izay niheverany manokana ny hahafa-tondro-maso ahy amin’ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny filazana ny amin’ny hahaterahan’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tamin’ny fahenim-bolana dia nirahin’Andriamanitra ny anjely Gabriela ho any an-tanàna iray any Galilia antsoina hoe Nazareta, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ho any amin’ny virijiny iray, izay voafofo ho vadin’ny lehilahy atao hoe Josefa, avy tamin’ny taranak’i Davida; ny anaran’ilay virijiny dia Maria. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nony niditra tao aminy ilay anjely dia niteny hoe: Arahaba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Arahaba: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny teny grika ampiasaina eto dia midika hoe: Mifalia.'
    marker-yv: yv-n
  - type: text
    text: ', ry ilay nohasoavina, ny Tompo momba anao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Taitra loatra izy noho ny teniny ka nieritreritra izay tokony ho hevitr’izany fiarahabana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hoy ilay anjely taminy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra, ry Maria, fa efa nahita fahasoavana tamin’Andriamanitra ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Indro, hitoe-jaza ianao ka hiteraka zazalahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny anarany dia hataonao hoe JESOSY.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izy ho lehibe ka hantsoina hoe Zanaky ny Avo Indrindra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO Andriamanitra hanome Azy ny sezafiandrianan’i Davida rainy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: hanjaka amin’ny taranak’i Jakoba mandrakizay Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanjakany tsy hanam-pahataperana.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy i Maria tamin’ilay anjely: Hanao ahoana re no hahatanteraka izany, fa tsy nahalala lahy aho?'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ilay anjely namaly azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tonga aminao ny Fanahy Masina, ary hisy herin’ny Avo Indrindra hanaloka anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny Masina izay haterakao dia hantsoina hoe Zanak’Andriamanitra.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary indro i Elizabeta havanao dia efa mitoe-jaza koa, na dia efa antitra aza; efa mandray ny fahenim-bolana izy, izay natao hoe momba, izao. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa tsy hisy tsy ho tanteraka ny teny rehetra lazain’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hoy i Maria: Inty ny mpanompovavin’ny Tompo; aoka anie ho tonga amiko araka ny teninao. Dia nandao azy ilay anjely.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namangian’i Maria an’i Elizabeta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary niainga i Maria tamin’izany andro izany ka nandeha haingana ho any amin’ny faritra be havoana, ho ao an-tanàna iray any Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia niditra tao an-tranon’i Zakaria izy ka niarahaba an’i Elizabeta. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Rehefa ren’i Elizabeta ny fiarahaban’i Maria dia nibitaka ny zaza tao an-kibony; ary nofenoina ny Fanahy Masina i Elizabeta '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'ka niantso tamin’ny feo mahery hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Notahìna amin’ny samy vehivavy ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary notahìna ny hateraky ny kibonao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Avy aiza no ahatongavan’izao amiko no mba vangìn’ny renin’ny Tompoko aho? '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Fa indro, raha vao ren’ny sofiko ny feon’ny fiarahabanao dia nibitaka noho ny hafaliana ny zaza ato an-kiboko. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Sambatra ianao izay nino; fa hefaina izay zavatra nampilazain’ny Tompo taminao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hira fiderana nataon’i Maria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia hoy i Maria:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny foko mankalaza ny Tompo
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ary ny fanahiko dia ravoravo tamin’Andriamanitra, Mpamonjy ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: fa efa nijery ny fahambanian’ny toetry ny mpanompovaviny Izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa indro, hatramin’ny ankehitriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hataon’ny taranaka rehetra ho sambatra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Fa ny Mahery efa nanatanteraka zavatra lehibe tamiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: masina ny anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Ny famindrampony dia amin’izay matahotra Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny taranaka fara aman-dimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Nanatanteraka asa lehibe tamin’ny sandriny Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampihahaka ny mpiavonavona tamin’ny fiheveran’ny fony Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Nampiala ny lehibe tamin’ny sezafiandrianany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanandratra ny ambany kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Ny noana dia novokisany soa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny manankarena kosa dia nampialainy maina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Niahy ny Israely mpanompony Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nahatsiaro ny famindrampony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Araka ny voalazany tamin’ny razantsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’i Abrahama sy ny taranany mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Ary nitoetra teo amin’i Elizabeta tokony ho telo volana i Maria vao nody tany an-tranony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan’i Jaona Mpanao batisa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Nony tonga ny andro hiterahan’i Elizabeta dia niteraka zazalahy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ary nandre ny mpiaramonina taminy sy ny havany fa efa nohalehibeazin’ny Tompo ny famindrampony taminy; dia niara-nifaly taminy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Tamin’ny andro fahavalo dia tonga hamora ny zaza izy ireo, koa efa saika hantsoiny araka ny anaran’ny rainy hoe Zakaria, izy. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Fa hoy ny reniny: Tsy izany, fa hatao hoe Jaona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Fa hoy izy ireo taminy: Tsy misy na dia iray akory aza amin’ny havanao izay manana izany anarana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ary nanao baiko moana tamin’ny rainy izy ireo ka nanontany ny amin’izay tiany hatao anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Dia nangataka solaitra iray izy ka nanoratra hoe: Jaona no anarany. Dia gaga avokoa izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ary nisokatra niaraka tamin’izay ny vavany ka afaka niteny ny lelany; dia niteny izy ka nidera an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Dia raiki-tahotra izay rehetra niara-monina taminy; ary niely teny amin’ny tany be havoana any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' rehetra ny lazan’izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Izay rehetra nandre koa dia nandatsaka izany tao am-pony ka niteny hoe: Ho zaza toy inona re io? Fa ny tanan’ny Tompo no nomba azy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hira fiderana nataon’i Zakaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Dia feno ny Fanahy Masina i Zakaria rainy ka naminany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: Isaorana anie ny Tompo Andriamanitry ny Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nitsinjo ny olony Izy ka nanao fanavotana ho azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: ary nanangana tandro-pamonjena ho antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny taranak’i Davida mpanompony Izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: araka izay nampilazainy ny mpaminaniny masina hatramin’ny fahagola,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: dia famonjena antsika amin’ny fahavalontsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny tanan’izay rehetra mankahala antsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: Manefa famindrampo amin’ny razantsika Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mahatsiaro ny fanekeny masina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: dia ny fianianana izay nianianany tamin’i Abrahama razantsika
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: mba hahazoantsika hanompo Azy tsy amin-tahotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria afaka amin’ny fahavalontsika isika,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: amin’ny fahamasinana sy ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehany, amin’ny andro rehetra hiainantsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '76'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: Ary ianao, ry zaza, dia hatao hoe Mpaminanin’ny Avo Indrindra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria hialoha eo anatrehan’ny Tompo ianao, hamboatra ny lalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '77'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: Hanome ny olony ny fahalalam-pamonjena
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny famelàna ny helony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '78'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: noho ny halehiben’ny famindrampon’Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no hiposahan’ny mazava avy any amin’ny avo ho antsika
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '79'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: mba hanazava izay mipetraka ao amin’ny maizina sy ao amin’ny aloky ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hanitsy ny diantsika ho amin’ny lalam-piadanana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahatanoran’i Jaona Mpanao batisa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '80'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: Ary nihalehibe ny zazakely ka nitombo hery am-panahy; nitoetra tany an-tany efitra izy ambara-pahatongan’ny andro nisehoany tamin’ny Israely.
