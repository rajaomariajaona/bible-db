document_id: JOB.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba (tohiny): Avelan’Andriamanitra hanao ny ataony ny ratsy fanahy'
  - type: text
    content: Nahoana no tsy misy fotoanandro voatendrin’ny Tsitoha,
  - type: text
    content: ary nahoana no tsy hitan’ny mahalala Azy izany androny izany?
  '10':
  - type: text
    content: Mandeha mitanjaka izy ireny fa tsy manan-kitafy
  - type: text
    content: ary noana eo am-pitondrana ny amboaram-bary;
  '11':
  - type: text
    content: manamboatra diloilo any amin’ny sahan’ny hafa izy;
  - type: text
    content: manosihosy ny famiazam-boaloboka izy
  - type: text
    content: nefa mangetaheta ihany.
  '12':
  - type: text
    content: Mitrona ny miala aina ao an-tanàna
  - type: text
    content: ary mitaraina ny fanahin’ny voalefona;
  - type: text
    content: nefa tsy ahoan’Andriamanitra akory ny ratsy mitranga!
  '13':
  - type: text
    content: Ireny no mpikomy amin’ny mazava;
  - type: text
    content: tsy mba mihevitra ny lalany izy
  - type: text
    content: na mitoetra eo amin’ny alehany.
  '14':
  - type: text
    content: Raha vao mangiran-dratsy dia mifoha ny mpamono olona;
  - type: text
    content: mamono ny ory sy ny malahelo izy;
  - type: text
    content: nony alina izy dia tahaka ny mpangalatra.
  '15':
  - type: text
    content: Ny mason’ny mpijangajanga dia miandry ny maizimaizina
  - type: text
    content: 'ka hoy izy: Tsy misy hahita ahy,'
  - type: text
    content: dia manisy sarona ny tavany izy.
  '16':
  - type: text
    content: Misy mamaky trano nony maizina;
  - type: text
    content: nefa nony antoandro dia miery izy;
  - type: text
    content: tsy mahalala ny mazava izy.
  '17':
  - type: text
    content: Amin’izy rehetra dia aloky ny fahafatesana ny maraina
  - type: text
    content: satria hitany ao ny fampahatahoran’ny aloky ny fahafatesana.
  '18':
  - type: text
    content: Mitsinkafona paohin’ny rano izy;
  - type: text
    content: voaozona ny fonenany eo amin’ny tany;
  - type: text
    content: tsy mivily ho amin’ny lalana mankeny amin’ny tanim-boaloboka izy.
  '19':
  - type: text
    content: Toy ny andevonan’ny andro maina sy ny andro mafana ny rano avy amin’ny orampanala
  - type: text
    content: 'no andevonan’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' ny mpanota.'
  '2':
  - type: text
    content: Misy mamindra ny fanamarihana ny sisintanin’olona
  - type: text
    content: sy mangalatra omby aman’ondry sady miandry azy.
  '20':
  - type: text
    content: Manadino azy ny kibo nitondra azy;
  - type: text
    content: manjary hanim-py ho an’ny olitra izy
  - type: text
    content: ka tsy tsarovana intsony!
  - type: text
    content: Tapaka tahaka ny hazo ny ratsy fanahy,
  '21':
  - type: text
    content: dia ilay mikarakara ny momba izay tsy niteraka
  - type: text
    content: nefa tsy mba manisy soa ny mpitondratena.
  '22':
  - type: text
    content: Kanefa halavain’Andriamanitra amin’ny heriny ny andron’ny olo-mahery;
  - type: text
    content: mitsangana indray ireo na dia tsy nanampo izay ho velona intsony aza.
  '23':
  - type: text
    content: Ataony mandry fehizay sy tsara tohana izy
  - type: text
    content: sady tsinjoviny mandrakariva ny lalany.
  '24':
  - type: text
    content: Nasandratra izy, kanjo vetivety dia tsy eo intsony;
  - type: text
    content: midaboka toy ny amboara jinjaina rehetra izy
  - type: text
    content: ary tangosana tahaka ny salohim-bary.
  '25':
  - type: text
    content: Raha tsy izany dia iza no hamaky lainga ahy
  - type: text
    content: ka hampiseho ny teniko ho tsinontsinona?
  '3':
  - type: text
    content: Mandroaka ny borikin’ny kamboty izy ireny
  - type: text
    content: ary maka ny ombin’ny mpitondratena ho antoka.
  '4':
  - type: text
    content: Manosika ny mahantra hiala amin’ny lalana izy
  - type: text
    content: ka miery azy avokoa ny ory amin’ny tany.
  '5':
  - type: text
    content: Indro, tahaka ny fivoakan’ny borikidia any an-tany efitra
  - type: text
    content: no fiaingan’ny mahantra amin’ny masoandro miposaka ho amin’ny asany mba hiremby;
  - type: text
    content: ny tany ngazana no ahazoany hanina ho an’ny zanany.
  '6':
  - type: text
    content: Any an-tsaha izy ireny no maka vilona
  - type: text
    content: sy mitsimpontsimpona ny voaloboky ny ratsy fanahy.
  '7':
  - type: text
    content: Mandry mitanjaka amin’ny alina izy satria tsy manan-damba
  - type: text
    content: sady tsy manana firakotra ho amin’ny hatsiaka;
  '8':
  - type: text
    content: kotsan’ny ranonoram-baratra any an-tendrombohitra izy
  - type: text
    content: ka mitampisaka amin’ny vatolampy satria tsy manam-pialofana.
  '9':
  - type: text
    content: Sarihina eo am-pinonoana ny kamboty
  - type: text
    content: ary akana antoka ny ory.
