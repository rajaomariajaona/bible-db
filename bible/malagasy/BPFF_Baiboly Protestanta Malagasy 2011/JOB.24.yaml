document_id: JOB.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny teny navalin’i Joba (tohiny): Avelan’Andriamanitra hanao ny ataony ny ratsy fanahy'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nahoana no tsy misy fotoanandro voatendrin’ny Tsitoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nahoana no tsy hitan’ny mahalala Azy izany androny izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Misy mamindra ny fanamarihana ny sisintanin’olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mangalatra omby aman’ondry sady miandry azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandroaka ny borikin’ny kamboty izy ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maka ny ombin’ny mpitondratena ho antoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Manosika ny mahantra hiala amin’ny lalana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miery azy avokoa ny ory amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, tahaka ny fivoakan’ny borikidia any an-tany efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no fiaingan’ny mahantra amin’ny masoandro miposaka ho amin’ny asany mba hiremby;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tany ngazana no ahazoany hanina ho an’ny zanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Any an-tsaha izy ireny no maka vilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mitsimpontsimpona ny voaloboky ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mandry mitanjaka amin’ny alina izy satria tsy manan-damba
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy manana firakotra ho amin’ny hatsiaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: kotsan’ny ranonoram-baratra any an-tendrombohitra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitampisaka amin’ny vatolampy satria tsy manam-pialofana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sarihina eo am-pinonoana ny kamboty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary akana antoka ny ory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mandeha mitanjaka izy ireny fa tsy manan-kitafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noana eo am-pitondrana ny amboaram-bary;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: manamboatra diloilo any amin’ny sahan’ny hafa izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manosihosy ny famiazam-boaloboka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mangetaheta ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mitrona ny miala aina ao an-tanàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitaraina ny fanahin’ny voalefona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy ahoan’Andriamanitra akory ny ratsy mitranga!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ireny no mpikomy amin’ny mazava;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba mihevitra ny lalany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mitoetra eo amin’ny alehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha vao mangiran-dratsy dia mifoha ny mpamono olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamono ny ory sy ny malahelo izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nony alina izy dia tahaka ny mpangalatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny mason’ny mpijangajanga dia miandry ny maizimaizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hoy izy: Tsy misy hahita ahy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manisy sarona ny tavany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Misy mamaky trano nony maizina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa nony antoandro dia miery izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mahalala ny mazava izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Amin’izy rehetra dia aloky ny fahafatesana ny maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria hitany ao ny fampahatahoran’ny aloky ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mitsinkafona paohin’ny rano izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voaozona ny fonenany eo amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mivily ho amin’ny lalana mankeny amin’ny tanim-boaloboka izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy ny andevonan’ny andro maina sy ny andro mafana ny rano avy amin’ny orampanala
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no andevonan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' ny mpanota.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Manadino azy ny kibo nitondra azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manjary hanim-py ho an’ny olitra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy tsarovana intsony!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tapaka tahaka ny hazo ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: dia ilay mikarakara ny momba izay tsy niteraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy mba manisy soa ny mpitondratena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Kanefa halavain’Andriamanitra amin’ny heriny ny andron’ny olo-mahery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsangana indray ireo na dia tsy nanampo izay ho velona intsony aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ataony mandry fehizay sy tsara tohana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsinjoviny mandrakariva ny lalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nasandratra izy, kanjo vetivety dia tsy eo intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: midaboka toy ny amboara jinjaina rehetra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tangosana tahaka ny salohim-bary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Raha tsy izany dia iza no hamaky lainga ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampiseho ny teniko ho tsinontsinona?
