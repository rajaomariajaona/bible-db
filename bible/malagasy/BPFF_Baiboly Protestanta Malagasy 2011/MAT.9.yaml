document_id: MAT.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy nanasitrana ilay malemy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 2.1-12; Lio 5.17-25
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Niondrana an-tsambokely Izy dia niampita ka tonga tao an-tanànany.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary raha nipetraka nisakafo tao an-trano Izy dia indreo, nisy mpanota sy mpamory hetra maro tonga ka niara-nipetraka tamin’i Jesosy mbamin’ny mpianany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Raha nahita izany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' dia niteny tamin’ny mpianatra hoe: Nahoana kosa ny Mpampianatra anareo no miara-komana amin’ny mpamory hetra sy ny mpanota?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nony nahare izany Jesosy dia niteny hoe: Tsy ny salama no mila mpitsabo fa ny marary. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa mandehana ka mianara izay hevitry ny teny hoe: «Famindrampo no sitrako fa tsy fanatitra alatsa-dra» (Hos 6.6); fa tsy tonga hiantso ny marina Aho fa ny mpanota.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy sy ny fifadian-kanina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 2.18-22; Lio 5.33-39
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nankany amin’i Jesosy ny mpianatr’i Jaona ka niteny hoe: Nahoana izahay sy ny Fariseo no mifady hanina matetika, fa ny mpianatrao kosa dia tsy mba mifady? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy Jesosy taminy: Moa mahay misaona va ny havan’ny mpampakatra raha mbola ao aminy ny mpampakatra? Fa ho avy ny andro izay hanesorana ny mpampakatra hiala aminy, dia amin’izay vao hifady hanina izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary tsy misy olona manampina akanjo tonta amin’ny tapa-damba mbola tsy voasasa; fa ny vaovao izay natampina dia handrovitra ny akanjo ka hiitatra ny triatra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary tsy misy manisy divay vaovao ao anaty siny hoditra tonta; raha izany dia ho triatra ny siny hoditra ka ho raraka ny divay sady ho simba ny siny hoditra; fa ny siny hoditra vaovao no asian’ny olona divay vaovao, dia miara-voatahiry izy roa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay vehivavy nikasika ny akanjon’i Jesosy sy ilay zazavavy novelomina indray
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 5.21-43; Lio 8.40-56
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Raha mbola nilaza izany tamin’izy ireo Izy dia indro, avy ny mpanapaka iray dia niankohoka teo anatrehany sady niteny hoe: Maty vao teo ny zanako vavy; fa andeha re, mametraha ny tananao aminy dia ho velona izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dia nitsangana nanaraka azy Jesosy mbamin’ny mpianany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary indro, nisy lehilahy iray malemy, nandry tamin’ny fandriana noentin’ny olona teo Aminy; ary Jesosy, nony nahita ny finoan’ireo, dia niteny tamin’ilay malemy hoe: Matokia, anaka; voavela ny helokao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary indro, nisy vehivavy iray izay efa narary nandeha ra nandritra ny roa amby folo taona, nankao aorianany ka nikasika ny morontongotr’akanjony. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa hoy izy anakampo hoe: Na dia ny akanjony ihany aza no ho voakasiko dia ho sitrana aho. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary Jesosy nihodina ka nahita azy dia niteny hoe: Matokia, ry zanako vavy, ny finoanao no efa nahasitrana anao. Dia sitrana ilay vehivavy tamin’izay ora izay.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary Jesosy, nony niditra tao an-tranon’ilay mpanapaka ka nahita ny mpitsoka sodina sy ny vahoaka nitabataba, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'dia niteny hoe: Mialà ato ianareo; fa tsy maty Razazavavy fa matory. Dia nihomehy Azy fatratra ny olona. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nony efa niala tao ny olona dia niditra Jesosy ka nandray ny tanan-dRazazavavy, dia nifoha izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary ny lazan’izany dia niely tamin’izany tany rehetra izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampahiratan’i Jesosy ireo jamba roa lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ampit. Mat 20.29-34
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nony niala teo Jesosy dia nisy jamba roa lahy nanaraka Azy sady niantsoantso hoe: Mamindrà fo aminay, ry Zanak’i Davida ô! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary rehefa niditra tao an-trano Izy dia nanatona Azy ireo jamba; ary hoy Jesosy taminy: Mino va ianareo fa mahay manatanteraka izany Aho? Hoy izy ireo Taminy: Eny, Tompoko. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia nikasika ny masony Izy ka niteny hoe: Tongava aminareo araka ny finoanareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary indreo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' sasany dia niteny anakampo hoe: Miteny ratsy ity Lehilahy ity. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia nahiratra ny masony; ary Jesosy namepetra azy ireo mafy hoe: Tandremo mba tsy ho fantatr’olona izao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Kanjo nony niala teo izy roa lahy dia nampiely ny lazany tamin’izany tany rehetra izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampitenenan’i Jesosy ny lehilahy moana iray izay demoniaka
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 11.14-15; ampit. Mat 12.22-24
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary rehefa lasa ireo dia indro, nisy lehilahy moana iray izay demoniaka noentin’ny olona teo amin’i Jesosy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Rehefa navoaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' dia niteny ilay moana; ary gaga ny vahoaka ka niteny hoe: Tsy mbola nisy zava-niseho toy izao tamin’ny Israely. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Fa hoy kosa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' hoe: Ny lohan’ny demonia no androahany ny demonia.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy sy ny vahoaka
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 6.6; ampit. Lio 8.1
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary Jesosy nandeha nitety ny tanàna rehetra sy ny vohitra, nampianatra tany amin’ny sinagoga sy nitory ny Filazantsaran’ny fanjakana ary nanasitrana ny aretina rehetra mbamin’ny rofy rehetra.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 6.34; ampit. Lio 10.2
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary nony nahita ny vahoaka Jesosy dia nahonena Azy ny fijeriny ireo satria trotraka izy ireo fa nafoy toy ny ondry tsy misy mpiandry. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Dia hoy Izy tamin’ny mpianany: '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Be ny vokatra fa ny mpiasa no vitsy; koa amin’izany mangataha amin’ny Tompon’ny vokatra mba hampandehanany mpiasa hanangona ny vokatra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa Jesosy nahafantatra ny eritreriny dia niteny hoe: Nahoana ianareo no mieritreri-dratsy ao am-ponareo? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa inona moa no moramora kokoa, ny miteny hoe: Voavela ny helokao sa ny miteny hoe: Mitsangàna ka mandehana! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa mba ho fantatrareo fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ' manana fahefana etỳ ambonin’ny tany hamela heloka; dia hoy Izy tamin’ilay malemy: Mitsangàna, batao ny fandriananao, ka modia any an-tranonao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nitsangana izy ka lasa nody tany an-tranony. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Raiki-tahotra ny vahoaka nony nahita izany ka nankalaza an’Andriamanitra, izay nanome ny olona fahefana toy izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny sakafo niarahana tamin’ireo mpanota
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 2.13-17; Lio 5.27-32
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nony niala teo Jesosy dia nahita lehilahy iray antsoina hoe Matio nipetraka teo am-pamorian-ketra ka hoy Izy taminy: Andeha hanaraka Ahy. Dia nitsangana i Matio ka nanaraka Azy.'
