document_id: GEN.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Abrama sy ireo mpanjaka ary i Melkizedeka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny andron’i Amrafela, mpanjakan’i Sinara, i Arioka, mpanjakan’i Elasara, i Kedorlaomera, mpanjakan’i Elama, ary i Tidala, mpanjakan’ny Goima, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny lohasahan’i Sidima dia feno lavaka godorao; koa rehefa nandositra ny mpanjakan’i Sodoma sy ny mpanjakan’i Gomora dia latsaka tao, ary ny sisa dia nandositra tany an-tendrombohitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nobaboin’izy ireo ny fananana sy ny hanina rehetra tao Sodoma sy Gomora, dia lasa izy ireo nandeha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nobaboin’ireo niaraka tamin’ny fananany koa i Lota zana-drahalahin’i Abrama, dia lasa izy ireo nandeha. I Lota moa dia nonina tao Sodoma. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nisy iray anefa afa-nandositra ka tonga nanambara izany tamin’i Abrama hebreo, izay nonina teo amin’ireo hazo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terebintan’i
    - type: text
      text: ' Mamre amorita, rahalahin’i Eskola sy i Anera, satria ireo dia olona vita fanekena tamin’i Abrama. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary raha nahare i Abrama fa lasan-ko babo ny havany dia nitondra mpanompo valo amby folo sy telonjato izay teraka tao an-tranony sady efa nahay niady izy ka nanenjika azy hatrany Dana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nifampizara ho antokotokony izy sy ireo mpanompony nony alina ka namely azy ireo ary nanenjika azy hatrany Hoba, izay any avaratr’i Damaskosy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Voaveriny ny fananana rehetra, ary i Lota havany sy ny fananany dia nampodiny koa niaraka tamin’ny vehivavy sy ny vahoaka.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia niainga ny mpanjakan’i Sodoma hitsena an’i Abrama teo an-dohasaha Save, na ny Lohasahan’ny mpanjaka, rehefa niverina avy nandresy an’i Kedorlaomera sy ireo mpanjaka niaraka taminy izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary tamy i Melkizedeka, mpanjakan’i Salema, nitondra mofo sy divay; izy io dia mpisoron’Andriamanitra Avo Indrindra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nitsodrano an’i Abrama izy ka niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotahin’Andriamanitra Avo Indrindra anie i Abrama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Andriamanitra izay nahary ny lanitra sy ny tany!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia nandeha izy ireo ka nanafika an’i Bera, mpanjakan’i Sodoma, i Birsa, mpanjakan’i Gomora, i Sinaba, mpanjakan’i Adma, i Semebera, mpanjakan’i Zeboima, ary ny mpanjakan’i Bela, dia i Zoara izany. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Isaorana anie Andriamanitra Avo Indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nanolotra ny fahavalonao teo an-tananao!
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia nomen’i Abrama azy ny ampahafolon’ny zavatra rehetra. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hoy ny mpanjakan’i Sodoma tamin’i Abrama: Omeo ahy ny olona fa ny fananana ento ho anao. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa hoy i Abrama tamin’ny mpanjakan’i Sodoma: Efa nanangana ny tanako tamin’NY TOMPO, Andriamanitra Avo Indrindra, izay nahary ny lanitra sy ny tany, aho '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'fa tsy handray na taretra na fehin-kapa aza amin’izay rehetra mety ho anao, fandrao dia hataonao hoe: Izaho no nampanankarena an’i Abrama! '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Eny, tsy handray aho afa-tsy izay nohanin’ireo zatovo sy ny anjaran’ny olona izay niaraka tamiko, dia i Anera sy i Eskola ary i Mamre; koa aoka horaisin’ireo ny anjarany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ireo rehetra ireo dia nifamotoana ka nivory tao an-dohasahan’i Sidima dia ny Ranomasina Maty izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nanompo an’i Kedorlaomera roa amby folo taona ireo, fa tamin’ny taona fahatelo amby folo kosa izy ireo dia nikomy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tamin’ny taona fahefatra amby folo dia tonga i Kedorlaomera sy ireo mpanjaka niaraka taminy ka namely ny Refaita tany Astarota-Karnaima, ny Zozima tany Hama, ny Emima tany Save-Kiriataima, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary ny Horita tany an-tendrombohitra Seìra hatrany El-Parana, izay eny anilan’ny tany efitra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia niverina indray izy ireo ka nankany Eny-Mispata, dia Kadesy izany, ary namely ny tany rehetra izay an’ny Amalekita sady namely ny Amorita, izay nonina tany Hazazona-Tamara. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia niainga ny mpanjakan’i Sodoma, ny mpanjakan’i Gomora, ny mpanjakan’i Adma, ny mpanjakan’i Zeboima ary ny mpanjakan’i Bela, dia i Zoara izany, ka nilahatra hiady amin’ireo izay tao an-dohasahan’i Sidima, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'dia tamin’i Kedorlaomera, mpanjakan’i Elama, sy i Tidala, mpanjakan’i Goima, ary i Amrafela, mpanjakan’i Sinara, sy i Arioka, mpanjakan’i Elasara; mpanjaka efatra izany no niady tamin’ny mpanjaka dimy. '
