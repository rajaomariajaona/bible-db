document_id: 1KI.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nananganana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 3.1-14
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona fahavalopolo sy efajato taorianan’ny nialan’ny Zanak’Israely tamin’ny tany Ejipta, tamin’ny volana Ziva, na ny volana faharoa izany, tamin’ny taona fahefatra nanjakan’i Solomona tamin’ny Israely, dia nanorina ny tranon’NY TOMPO izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny trano naorin’i Solomona mpanjaka ho an’NY TOMPO dia enimpolo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny lavany, roapolo hakiho ny sakany ary telopolo hakiho ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny lalantsara fidirana teo anoloan’ny efitrano lehibe dia roapolo hakiho ny lavany mifanerana amin’ny sakan’ny Trano, ary folo hakiho ny habeny teo anoloan’ny Trano ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nataony makarakara tsy mivoha ny varavarankelin’ny Trano. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nasiany efitrano fanampiny izay miankina amin’ny rindrin’ny Trano sady manodidina azy, na amin’ny efitrano lehibe, na amin’ny fitoerana masina indrindra, ary nasiany paosin-trano manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny paosin-trano ambany indrindra dia dimy hakiho ny sakany, ny eo antenantenany dia enina hakiho ny sakany, ary ny fahatelony dia fito hakiho ny sakany; fa ny rindrina ivelan’ny Trano kosa dia nahenany manodidina isaky ny mifanongoa, mba tsy hisy hitsatoka amin’ny rindrin’ny Trano. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’ny nanaovana ny Trano dia vato efa voapaika hatrany an-tsaha fipeham-bato no nanaovany azy ka tsy nisy feon’ny tantanana na fandraka na fiasana vy re tao amin’ny Trano tamin’ny nanaovany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny varavarana mankao amin’ny efitrano antenantenany dia teo amin’ny ilany havanana amin’ny Trano ary tohatra miolikolika no niakarany ho ao amin’ny efitrano antenantenany; avy tao amin’ny efitrano antenantenany indray no niakarany ho ao amin’ny fahatelo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Natsangany ny Trano ka vitany. Ny nataony tafon’ny Trano dia rairainy nopetahana hazo fisaka sedera. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nanangana paosin-trano manodidina ny Trano izy; dimy hakiho avy ny haavony ary hazo sedera no nikambanany tamin’ny Trano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tonga tamin’i Solomona ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny amin’ity trano ataonao ity, raha mandeha araka ny lalànako sy manaraka ny fitsipiko ary mitandrina ny didiko rehetra ianao ka manaraka azy dia hotanterahiko aminao ny teniko izay nolazaiko tamin’i Davida rainao; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ary hitoetra eo anivon’ny Zanak’Israely Aho ka tsy hahafoy ny Israely oloko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Natsangan’i Solomona ny Trano ka vitany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nopetahany hazo sedera ny rindrina anatiny amin’ny Trano; hatreo amin’ny vodirindrina ka hatrany amin’ny loharindrina dia nopetahany hazo avokoa; hazo kipreso kosa no nataony gorodon’ny Trano. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny roapolo hakiho hatreo amin’ny rindrina farany dia nasiany efitra hazo sedera, hatreo amin’ny vodirindrina ka hatrany amin’ny loharindrina ary nataony efitra anatiny izany, dia ny fitoerana masina indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Efapolo hakiho ny lavan’ny Trano na ny tempoly, teo anoloan’io. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nosoratany sary voantango sy voninkazo mivelatra ny sedera ao anatin’ny Trano; sedera avokoa ny hazo rehetra fa tsy nisy vato niseho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nanangana ny fitoerana masina indrindra tao anatin’ny Trano izy mba hametrahany ny vata misy ny faneken’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Teo anoloan’ny fitoerana masina indrindra, izay roapolo hakiho ny lavany, roapolo hakiho ny sakany, ary roapolo hakiho koa ny haavony, sady voapetaka takelaka volamena tsy miharo, dia nisy alitara izay nopetahany hazo sedera. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nopetahan’i Solomona takelaka volamena voafantina koa ny atin’ny Trano no nasiany rojo volamena misakana eo anoloan’ny fitoerana masina indrindra izay nopetahany takelaka volamena. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nopetahany takelaka volamena avokoa ny anatin’ny Trano manontolo; ary ny alitara manoloana ny fitoerana masina indrindra koa dia nopetahany takelaka volamena manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tao anatin’ny fitoerana masina indrindra dia nasiany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' roa vita amin’ny hazo oliva maniry ho azy. Samy folo hakiho avy ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Samy dimy hakiho avy ny elatry ny kerobima tsirairay, folo hakiho hatreo amin’ny tendron’elany iray ka hatramin’ny tendron’elany iray hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny kerobima iray koa dia folo hakiho. Ny kerobima roa dia mitovy habe sy mitovy endrika. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Folo hakiho ny haavon’ny kerobima iray, ary tahaka izany ihany koa ny kerobima iray hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny kerobima dia nataony tao afovoan’ny Trano anatiny. Namelatra ny elany ireo, koa ny elatry ny kerobima voalohany sy faharoa dia samy nipaka amin’ny rindrina tandrify azy avy, ary ny elatr’izy ireo dia nifanendry teo afovoan’ny Trano. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nopetahany takelaka volamena koa ny kerobima.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nosokirany sarin’ny kerobima sy hazo palma ary voninkazo mamelana ny rindrina manodidina ao amin’ny Trano na tao anatiny na tany ivelany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nopetahany takelaka volamena ny gorodon’ny Trano na tao anatiny na tany ivelany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nasiany lelam-baravarana kopa-droa vita amin’ny hazo oliva maniry ho azy ny varavarana mankao amin’ny efitra masina indrindra, koa ny tolanany sy ny momba azy dia ampahadimin’ny sakan’ny Trano. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny lelam-baravarana kopa-droa dia vita amin’ny oliva maniry ho azy. Nosokirany sarin’ny kerobima sy hazo palma ary voninkazo mamelana izany dia nopetahany volamena manify ny kerobima sy ny hazo palma. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Toy izany koa ny varavarana mankao amin’ny tempoly; nasiany tolanam-baravarana vita amin’ny hazo oliva maniry ho azy, mahafeno ny ampahefatry ny sakan’ny Trano. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny lelam-baravarana kopa-droa, vita amin’ny hazo kipreso dia kamban-droa samy nisy savily avy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Nosokirany sarin’ny kerobima sy hazo palma ary voninkazo mivelatra ireo dia nopetahany volamena manify ny sorany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Nanao ny kianja tao anatiny tamin’ny vato voapaika telo andalana sy hazo sedera iray andalana izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tamin’ny volana Ziva tamin’ny taona fahefatra no nanaovany ny fanorenana ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary tamin’ny volana Bola, izay volana fahavalo, tamin’ny taona fahiraika amby folo, no nahavitany ny Trano araka ny fombany rehetra sy ny antsipiriany rehetra. Fito taona no nanaovany azy.
