document_id: RUT.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nitsimpona salohim-bary teny an-tanimbarin’i Boaza i Rota
  - type: text
    content: Ary nisy havan’ny vadin’i Naomy avy amin’ny fokon’i Elimeleka. Lehilahy mpanjatobe izy io, Boaza no anarany.
  '10':
  - type: text
    content: 'Dia niondrika i Rota ka niankohoka tamin’ny tany ary niteny taminy hoe: Ahoana no mba ahitako fitia eto imasonao sy itsinjovanao ahy nefa vahiny ihany aho? '
  '11':
  - type: text
    content: 'Dia namaly i Boaza hoe: Efa reko tsara izay rehetra nataonao tamin’ny rafozambavinao hatrizay nahafatesan’ny vadinao sy ny nahafoizanao ny rainao sy ny reninao mbamin’ny tany nahaterahanao ary ny nankanesanao atỳ amin’ny firenena tsy mbola fantatrao. '
  '12':
  - type: text
    content: 'Hamaly ny nataonao anie NY TOMPO ka homen’NY TOMPO, Andriamanitry ny Israely, valim-pitia lehibe anie ianao, satria avy hialoka eo ambanin’ny elany ianao! '
  '13':
  - type: text
    content: 'Dia hoy izy: Aoka hahita fitia eo imasonao aho, tompokolahy! Fa nampifaly ahy ianao, ary niteny mora tamin’ny mpanompovavinao, na dia tsy tahaka ny iray amin’ny mpanompovavinao akory aza aho.'
  '14':
  - type: text
    content: 'Ary rehefa tonga ny fotoam-pisakafoana dia hoy i Boaza taminy: Mankanesa atỳ ka mihinàna mofo, ary atsobohy amin’ny vinaingitra ny sombi-mofonao. Dia nipetraka teo anilan’ny mpijinja izy. Ary nakan-dRalehilahy lango izy dia nihinana ka voky, ary nisy sisa tsy laniny aza. '
  '15':
  - type: text
    content: 'Rehefa nitsangana hitsimpona izy dia nodidian’i Boaza ny mpanompolahy hoe: Aoka izy hitsimpona na dia eny anelanelan’ny amboara aza ka aza maninona azy ianareo. '
  '16':
  - type: text
    content: Ary asio latsadatsaka avy amin’ny amboara ka avelao ireny hotsimponiny fa aza rarana izy.
  - type: heading
    content: Mankasitraka ny nataon’i Rota i Naomy sady mampahery azy
  '17':
  - type: text
    content: 'Ary nitsimpona tany an-tsaha mandra-paharivan’ny andro i Rota, dia nively izay efa voatsimpony ka nisy varimbazaha tokony ho iray '
  - type: text
    content: efaha
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Dia noentiny izay azony ka nankany an-tanàna izy ary hitan’ny rafozambaviny izay efa voatsimpony. Navoakany koa ilay sisa tsy laniny tamin’ny nisakafoany ka nomeny ny rafozany. '
  '19':
  - type: text
    content: 'Dia hoy ny rafozambaviny taminy: Taiza no nitsimponanao androany ary taiza no niasanao? Hotahìna anie izay nitsinjo anao! Dia nambarany tamin’ny rafozambaviny ny olona izay niasany ka hoy izy: Boaza no anaran’ny lehilahy izay tompon’ny tanimbary nitsimponako androany. '
  '2':
  - type: text
    content: 'Ary hoy i Rota, vehivavy moabita, tamin’i Naomy: Aoka aho hankany an-tsaha mba hitsimpona salohim-bary eo aorianan’izay olona hahitako fitia eo imasony. Dia hoy izy taminy: Andeha ary, anaka!'
  '20':
  - type: text
    content: 'Dia hoy i Naomy tamin’ny vinantovaviny: Hotahìn’NY TOMPO izay tsy nitsahatra nanao soa amin’ny velona sy ny maty anie izy. Ary hoy koa i Naomy taminy: Havantsika akaiky ihany Ralehilahy, koa isan’izay mahavotra antsika izy. '
  '21':
  - type: text
    content: 'Ary hoy i Rota, vehivavy moabita: Izao koa no nataony tamiko: Mitoera tsara eo anilan’ny mpanompoko ianao mandra-pahatapitra ny fijinjana. '
  '22':
  - type: text
    content: 'Ary hoy i Naomy tamin’i Rota vinantovaviny: Tsara izany anaka, raha miara-miasa amin’ny zatovovavy ianao, fandrao hisy haninona anao raha any amin’ny saha hafa.'
  '23':
  - type: text
    content: Ary tsy nety nisaraka tamin’ny mpanompovovavin’i Boaza izy fa nitsimpona mandra-pahatapitra ny fijinjana ny varimbazaha; tao amin’ny rafozambaviny izy no nitoetra.
  '3':
  - type: text
    content: 'Dia lasa nandeha izy ka nitsimpona tany an-tsaha teo aorianan’ny mpijinja. Ary sendra tonga tany amin’ny tanimbarin’i Boaza izay avy amin’ny fokon’i Elimeleka, izy. '
  '4':
  - type: text
    content: 'Ary indro, tonga avy tany Betlehema i Boaza ka niteny tamin’ny mpijinja hoe: Homba anareo anie NY TOMPO! Dia hoy kosa ireo taminy: Hitahy anao anie NY TOMPO! '
  '5':
  - type: text
    content: 'Dia hoy i Boaza tamin’ny mpanompony izay nitandrina ny mpijinja: Zanak’iza moa io zazavavy io? '
  '6':
  - type: text
    content: 'Dia namaly ilay zatovo nitandrina ny mpijinja hoe: Zazavavy moabita izay niverina niaraka tamin’i Naomy avy tany amin’ny tany Moaba io; '
  '7':
  - type: text
    content: 'fa hoy izy: Miangavy anao aho, aoka aho hitsimpona sy hanangona eo aorianan’ny mpijinja eny anelanelan’ny amboara. Dia tonga izy ka nijanona teto hatramin’ny maraina ka mandraka ankehitriny; kely foana no nitoerany tany an-trano.'
  '8':
  - type: text
    content: 'Dia hoy i Boaza tamin’i Rota: Tsy mandre va ianao, anaka? Aza mandeha mitsimpona any an-tanimbary hafa na miala eto ianao fa miaraha amin’ny mpanompovaviko. '
  '9':
  - type: text
    content: 'Aoka ho amin’ny tanimbary izay ijinjany ny masonao ka mandehana ao aorianany ianao: Tsy efa nodidiako va ny zatovo tsy haninona anao? Ary raha mangetaheta ianao, mankanesa eroa amin’ny siny ka misotroa amin’izay nantsakain’ny zatovo. '
