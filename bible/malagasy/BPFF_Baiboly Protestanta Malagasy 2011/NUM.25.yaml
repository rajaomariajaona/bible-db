document_id: NUM.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manolo-tena ho amin’ny fanompoan-tsampy ny Zanak’Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nitoetra tao Sitima ny Israely ka nanomboka nijangajanga tamin’ny zanakavavin’ny Moabita. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ireo dia nanasa ny olona hihinana tamin’ny zavatra novonoiny ho fanatitra ho an’ireo andriamaniny; koa nihinana ny olona sady niankohoka tamin’ireo andriamaniny ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia niray tamin’i Baala-Peora ny Israely ka nirehitra taminy ny fahatezeran’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Mosesy: Alao ny loholona rehetra ary ahantòny tandrifin’ny masoandro eo anatrehan’NY TOMPO ireo nijangajanga ireo mba hitsahatra ny firehetan’ny fahatezeran’NY TOMPO amin’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy i Mosesy tamin’ireo mpitsara ny Israely: Samia ianareo mamono ny olom-peheziny izay niray tamin’i Baala-Peora!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary indro, avy ny iray tamin’ny Zanak’Israely nitondra vehivavy midianita teo amin’ny rahalahiny, teo imason’i Mosesy sy teo imason’ny fiangonan’ny Zanak’Israely manontolo, izay nitomany teo amin’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha nahita izany i Finehasa, zanak’i Eleazara, zanak’i Arona mpisorona, dia nitsangana niala teo amin’ny fiangonana izy ka nitondra lefona teny an-tanany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nandeha nanaraka ilay lehilahy israelita tao an-day izy ary nataony indray nandefona izy roa, dia ny lehilahy israelita sy ilay vehivavy, ka voagorobaka hatrany amin’ny kibon-dRavehivavy. Dia nitsahatra ny areti-mandringana teo amin’ny Zanak’Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efatra arivo sy roa alina ireo maty tamin’ny areti-mandringana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Mosesy: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I Finehasa, zanak’i Eleazara, zanak’i Arona mpisorona, no nampiala ny fahatezerako tamin’ny Zanak’Israely satria nirehitra noho ny fitiavany Ahy izy; koa tsy nataoko lany ringana ny Zanak’Israely tamin’ny firehetan’ny fahatezerako. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Noho izany dia lazao hoe: Indro, omeko azy ny faneken’ny fihavanako. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izy sy ny taranany mandimby azy no hanana izany ho faneken’ny fisoronana mandrakizay satria nirehitra noho ny fitiavany an’Andriamaniny izy ka nanao fanavotana ho an’ny Zanak’Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny anaran’ilay lehilahy israelita novonoina, izay niaraka nolefonina tamin-dRavehivavy midianita, dia Zimry, zanak’i Salo, loham-pianakaviana tamin’ny Simeonita. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny anaran’ilay vehivavy midianita izay novonoina dia Kosby, zanak’i Zora, loham-pianakaviana tamin’ny Midianita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ataovy fahavalo ny Midianita ka tafiho; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: fa nandrafy anareo tamin’ny fitaka nataony izy, tamin’ny namitahany anareo tamin’ilay raharahan’i Peora sy i Kosby anabavin’ireo, zanakavavin’ny andriandahy midianita iray, izay novonoina tamin’ny andron’ilay areti-mandringana noho ny amin’i Peora.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanisana fanindroany ireo fokon’Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Rehefa afaka ny areti-mandringana dia
