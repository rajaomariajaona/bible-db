document_id: NUM.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manolo-tena ho amin’ny fanompoan-tsampy ny Zanak’Israely
  - type: text
    content: 'Ary nitoetra tao Sitima ny Israely ka nanomboka nijangajanga tamin’ny zanakavavin’ny Moabita. '
  '10':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy: '
  '11':
  - type: text
    content: 'I Finehasa, zanak’i Eleazara, zanak’i Arona mpisorona, no nampiala ny fahatezerako tamin’ny Zanak’Israely satria nirehitra noho ny fitiavany Ahy izy; koa tsy nataoko lany ringana ny Zanak’Israely tamin’ny firehetan’ny fahatezerako. '
  '12':
  - type: text
    content: 'Noho izany dia lazao hoe: Indro, omeko azy ny faneken’ny fihavanako. '
  '13':
  - type: text
    content: Izy sy ny taranany mandimby azy no hanana izany ho faneken’ny fisoronana mandrakizay satria nirehitra noho ny fitiavany an’Andriamaniny izy ka nanao fanavotana ho an’ny Zanak’Israely.
  '14':
  - type: text
    content: 'Ny anaran’ilay lehilahy israelita novonoina, izay niaraka nolefonina tamin-dRavehivavy midianita, dia Zimry, zanak’i Salo, loham-pianakaviana tamin’ny Simeonita. '
  '15':
  - type: text
    content: Ary ny anaran’ilay vehivavy midianita izay novonoina dia Kosby, zanak’i Zora, loham-pianakaviana tamin’ny Midianita.
  '16':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '17':
  - type: text
    content: 'Ataovy fahavalo ny Midianita ka tafiho; '
  '18':
  - type: text
    content: fa nandrafy anareo tamin’ny fitaka nataony izy, tamin’ny namitahany anareo tamin’ilay raharahan’i Peora sy i Kosby anabavin’ireo, zanakavavin’ny andriandahy midianita iray, izay novonoina tamin’ny andron’ilay areti-mandringana noho ny amin’i Peora.
  - type: heading
    content: Ny fanisana fanindroany ireo fokon’Israely
  '19':
  - type: text
    content: Rehefa afaka ny areti-mandringana dia
  '2':
  - type: text
    content: 'Fa ireo dia nanasa ny olona hihinana tamin’ny zavatra novonoiny ho fanatitra ho an’ireo andriamaniny; koa nihinana ny olona sady niankohoka tamin’ireo andriamaniny ireo. '
  '3':
  - type: text
    content: Dia niray tamin’i Baala-Peora ny Israely ka nirehitra taminy ny fahatezeran’NY TOMPO.
  '4':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Alao ny loholona rehetra ary ahantòny tandrifin’ny masoandro eo anatrehan’NY TOMPO ireo nijangajanga ireo mba hitsahatra ny firehetan’ny fahatezeran’NY TOMPO amin’ny Israely. '
  '5':
  - type: text
    content: 'Dia hoy i Mosesy tamin’ireo mpitsara ny Israely: Samia ianareo mamono ny olom-peheziny izay niray tamin’i Baala-Peora!'
  '6':
  - type: text
    content: 'Ary indro, avy ny iray tamin’ny Zanak’Israely nitondra vehivavy midianita teo amin’ny rahalahiny, teo imason’i Mosesy sy teo imason’ny fiangonan’ny Zanak’Israely manontolo, izay nitomany teo amin’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ary raha nahita izany i Finehasa, zanak’i Eleazara, zanak’i Arona mpisorona, dia nitsangana niala teo amin’ny fiangonana izy ka nitondra lefona teny an-tanany. '
  '8':
  - type: text
    content: 'Dia nandeha nanaraka ilay lehilahy israelita tao an-day izy ary nataony indray nandefona izy roa, dia ny lehilahy israelita sy ilay vehivavy, ka voagorobaka hatrany amin’ny kibon-dRavehivavy. Dia nitsahatra ny areti-mandringana teo amin’ny Zanak’Israely. '
  '9':
  - type: text
    content: Efatra arivo sy roa alina ireo maty tamin’ny areti-mandringana.
