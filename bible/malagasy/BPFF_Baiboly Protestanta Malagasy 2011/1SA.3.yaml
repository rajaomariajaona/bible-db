document_id: 1SA.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niantsoan’Andriamanitra an’i Samoela ho mpaminaniny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nanao fanompoam-pivavahana ho an’NY TOMPO teo anatrehan’i Ely i Samoela zaza.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamin’izany andro izany dia nahalana ny tenin’NY TOMPO ary tsy nisy fahitana niseho loatra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Indray andro anefa, raha nandry tao amin’ny fandrianany i Ely ary efa nihapahina ny masony tamin’izany ka tsy nahita izy '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sady tsy mbola maty ny jiron’Andriamanitra, ary i Samoela koa dia nandry tao amin’ny tempolin’NY TOMPO izay nisy ny vata misy ny faneken’Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia niantso an’i Samoela NY TOMPO, ary hoy izy hoe: Inty aho. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nihazakazaka nankeo amin’i Ely izy ka niteny hoe: Inty aho, fa niantso ahy ianao. Nefa hoy i Ely: Tsy niantso aho, miverena matory. Dia lasa natory izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mbola niantso azy indray NY TOMPO hoe: Ry Samoela! Dia nifoha indray i Samoela ka nankao amin’i Ely ary niteny hoe: Inty aho, fa niantso ahy ianao. Nefa hoy izy: Tsy niantso aho, anaka; andeha miverina matory. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mbola tsy nahafantatra NY TOMPO mantsy i Samoela sady tsy mbola nanehoana ny tenin’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niantso an’i Samoela fanintelony NY TOMPO. Dia nifoha izy ka nankao amin’i Ely ary niteny hoe: Inty aho, fa niantso ahy ianao. Tamin’izay dia fantatr’i Ely fa NY TOMPO no niantso ny zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa hoy i Ely tamin’i Samoela: Andeha matory ihany; ary raha toa miantso anao Izy dia valio hoe: Mitenena, TOMPO ô, fa mihaino ny mpanomponao. Dia lasa natory teo amin’ny fandrianany i Samoela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary avy NY TOMPO dia nijoro teo ka niantso toy ny teo ihany hoe: Ry Samoela, ry Samoela ô! Dia namaly i Samoela hoe: Mitenena, fa mihaino ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Samoela: Indro Izaho hanao zavatra eo amin’ny Israely, koa izay rehetra mandre izany dia hangintsina ny sofiny roa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Amin’izany andro izany dia hotanterahiko amin’i Ely izay zavatra rehetra voalazako ny amin’ny taranany; hatomboko izany ka hotanterahiko. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa efa nambarako taminy fa hotsaraiko mandrakizay ny taranany noho ny heloka izay fantany, satria nahatonga ozona ho an’ny tenany ny zanany nefa tsy nosakanany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa izany no nianianako ny amin’ny taranak’i Ely, fa tsy hisy fanatitra hahafaka ny heloky ny taranak’i Ely mihitsy, na fanatitra alatsa-dra izany na fanatitra avy amin’ny zavamaniry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia natory i Samoela mandra-paharain’ny andro; nony maraina dia namoha ny varavaran’ny tranon’NY TOMPO izy. Ary natahotra hilaza ny fahitana tamin’i Ely i Samoela. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa niantso an’i Samoela i Ely ka niteny hoe: Ry Samoela, zanako! Dia hoy izy: Inty aho. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy izy: Inona no zavatra nolazain’NY TOMPO taminao? Miangavy anao aho, aza afeninao ahy; hataon’Andriamanitra aminao anie izany; eny, mihoatra noho izany aza, raha misy afeninao ahy ny zavatra rehetra nolazainy taminao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nambaran’i Samoela taminy avokoa ny zavatra rehetra fa tsy nisy nafeniny. Dia hoy i Ely: Izy no TOMPO, aoka Izy hanao izay sitraky ny fony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nitombo i Samoela sady nomba azy NY TOMPO ka tsy nisy navelany ho raraka an-tany ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny Israely rehetra koa, hatrany Dana ka hatrany Bery-Sheba, dia nahalala fa tonga mpaminanin’NY TOMPO tokoa i Samoela. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia mbola niseho tao Silo ihany NY TOMPO, satria niseho tamin’i Samoela tao Silo tamin’ny alalan’ny teniny NY TOMPO.
