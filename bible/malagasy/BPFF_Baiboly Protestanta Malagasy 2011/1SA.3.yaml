document_id: 1SA.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niantsoan’Andriamanitra an’i Samoela ho mpaminaniny
  - type: text
    content: Nanao fanompoam-pivavahana ho an’NY TOMPO teo anatrehan’i Ely i Samoela zaza.
  - type: text
    content: 'Tamin’izany andro izany dia nahalana ny tenin’NY TOMPO ary tsy nisy fahitana niseho loatra. '
  '10':
  - type: text
    content: 'Ary avy NY TOMPO dia nijoro teo ka niantso toy ny teo ihany hoe: Ry Samoela, ry Samoela ô! Dia namaly i Samoela hoe: Mitenena, fa mihaino ny mpanomponao. '
  '11':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Samoela: Indro Izaho hanao zavatra eo amin’ny Israely, koa izay rehetra mandre izany dia hangintsina ny sofiny roa. '
  '12':
  - type: text
    content: 'Amin’izany andro izany dia hotanterahiko amin’i Ely izay zavatra rehetra voalazako ny amin’ny taranany; hatomboko izany ka hotanterahiko. '
  '13':
  - type: text
    content: 'Fa efa nambarako taminy fa hotsaraiko mandrakizay ny taranany noho ny heloka izay fantany, satria nahatonga ozona ho an’ny tenany ny zanany nefa tsy nosakanany. '
  '14':
  - type: text
    content: Koa izany no nianianako ny amin’ny taranak’i Ely, fa tsy hisy fanatitra hahafaka ny heloky ny taranak’i Ely mihitsy, na fanatitra alatsa-dra izany na fanatitra avy amin’ny zavamaniry.
  '15':
  - type: text
    content: 'Dia natory i Samoela mandra-paharain’ny andro; nony maraina dia namoha ny varavaran’ny tranon’NY TOMPO izy. Ary natahotra hilaza ny fahitana tamin’i Ely i Samoela. '
  '16':
  - type: text
    content: 'Fa niantso an’i Samoela i Ely ka niteny hoe: Ry Samoela, zanako! Dia hoy izy: Inty aho. '
  '17':
  - type: text
    content: 'Ary hoy izy: Inona no zavatra nolazain’NY TOMPO taminao? Miangavy anao aho, aza afeninao ahy; hataon’Andriamanitra aminao anie izany; eny, mihoatra noho izany aza, raha misy afeninao ahy ny zavatra rehetra nolazainy taminao. '
  '18':
  - type: text
    content: 'Dia nambaran’i Samoela taminy avokoa ny zavatra rehetra fa tsy nisy nafeniny. Dia hoy i Ely: Izy no TOMPO, aoka Izy hanao izay sitraky ny fony.'
  '19':
  - type: text
    content: 'Ary nitombo i Samoela sady nomba azy NY TOMPO ka tsy nisy navelany ho raraka an-tany ny teniny. '
  '2':
  - type: text
    content: 'Indray andro anefa, raha nandry tao amin’ny fandrianany i Ely ary efa nihapahina ny masony tamin’izany ka tsy nahita izy '
  '20':
  - type: text
    content: 'Ny Israely rehetra koa, hatrany Dana ka hatrany Bery-Sheba, dia nahalala fa tonga mpaminanin’NY TOMPO tokoa i Samoela. '
  '21':
  - type: text
    content: Dia mbola niseho tao Silo ihany NY TOMPO, satria niseho tamin’i Samoela tao Silo tamin’ny alalan’ny teniny NY TOMPO.
  '3':
  - type: text
    content: 'sady tsy mbola maty ny jiron’Andriamanitra, ary i Samoela koa dia nandry tao amin’ny tempolin’NY TOMPO izay nisy ny vata misy ny faneken’Andriamanitra, '
  '4':
  - type: text
    content: 'dia niantso an’i Samoela NY TOMPO, ary hoy izy hoe: Inty aho. '
  '5':
  - type: text
    content: 'Dia nihazakazaka nankeo amin’i Ely izy ka niteny hoe: Inty aho, fa niantso ahy ianao. Nefa hoy i Ely: Tsy niantso aho, miverena matory. Dia lasa natory izy. '
  '6':
  - type: text
    content: 'Mbola niantso azy indray NY TOMPO hoe: Ry Samoela! Dia nifoha indray i Samoela ka nankao amin’i Ely ary niteny hoe: Inty aho, fa niantso ahy ianao. Nefa hoy izy: Tsy niantso aho, anaka; andeha miverina matory. '
  '7':
  - type: text
    content: Mbola tsy nahafantatra NY TOMPO mantsy i Samoela sady tsy mbola nanehoana ny tenin’NY TOMPO.
  '8':
  - type: text
    content: 'Ary niantso an’i Samoela fanintelony NY TOMPO. Dia nifoha izy ka nankao amin’i Ely ary niteny hoe: Inty aho, fa niantso ahy ianao. Tamin’izay dia fantatr’i Ely fa NY TOMPO no niantso ny zaza. '
  '9':
  - type: text
    content: 'Koa hoy i Ely tamin’i Samoela: Andeha matory ihany; ary raha toa miantso anao Izy dia valio hoe: Mitenena, TOMPO ô, fa mihaino ny mpanomponao. Dia lasa natory teo amin’ny fandrianany i Samoela.'
