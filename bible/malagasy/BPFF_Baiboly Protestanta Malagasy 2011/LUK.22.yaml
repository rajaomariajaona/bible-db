document_id: LUK.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teti-dratsy hamonoana an’i Jesosy
  - type: heading
    content: Mat 26.1-5, 14-16; Mar 14.1-2, 10-11
  - type: text
    content: 'Efa akaiky ny andro firavoravoana fihinanana ny mofo tsy misy masirasira, dia ilay atao hoe Paska. '
  '10':
  - type: text
    content: 'Dia hoy Izy tamin’izy ireo: Indro, raha miditra ao an-tanàna ianareo dia hisy lehilahy mitondra siny feno rano hifanena aminareo; manaraha azy ao amin’ny trano izay hidirany. '
  '11':
  - type: text
    content: 'Dia lazao amin’ny tompon-trano hoe: Izao no lazain’ny Mpampianatra aminao: Aiza ny efitrano hiarahako mihinana ny Paska amin’ny mpianatro? '
  '12':
  - type: text
    content: 'Ary hanoro anareo efitrano malalaka ambony rihana, izay efa misy izay ilaina rehetra izy; any no ataovy ny fanomanana. '
  '13':
  - type: text
    content: Dia nandeha izy ireo ka nahita araka izay efa nolazainy taminy, ary nanomana ny Paska izy ireo.
  - type: heading
    content: Ny Fanasan’ny Tompo
  - type: heading
    content: Mat 26.20, 26-29; Mar 14.17, 22-25; ampit. 1Kor 11.23-26
  '14':
  - type: text
    content: 'Nony tonga ny fotoana dia nipetraka hihinana Izy mbamin’ny Apostoly. '
  '15':
  - type: text
    content: 'Ary hoy Izy taminy: Naniry koa Aho raha naniry hiara-mihinana ity '
  - type: text
    content: Paska
  - type: text
    content: ' ity aminareo, dieny mbola tsy mijaly Aho. '
  '16':
  - type: text
    content: 'Fa lazaiko aminareo fa tsy mba hihinana izany intsony Aho ambara-pahatanterak’izany ao amin’ny fanjakan’Andriamanitra. '
  '17':
  - type: text
    content: 'Ary nandray kapoaka Izy, dia nisaotra ka hoy Izy: Raiso ity ka zarao aminareo; '
  '18':
  - type: text
    content: fa lazaiko aminareo fa hatramin’izao dia tsy hisotro ny vokatry ny voaloboka intsony Aho mandra-pahatongan’ny fanjakan’Andriamanitra.
  '19':
  - type: text
    content: 'Dia nandray mofo Izy, koa rehefa nisaotra, dia novakiny ka natolony azy sady nataony hoe: Ity no tenako izay omena ho anareo; izao no ataovy ho fahatsiarovana Ahy. '
  '2':
  - type: text
    content: Ary ireo lehiben’ny mpisorona sy ny mpanoradalàna dia nitady izay hamonoany an’i Jesosy; nefa natahotra ny olona izy ireo.
  '20':
  - type: text
    content: 'Ary araka izany koa ny kapoaka, rehefa vita ny sakafo, dia hoy Izy: Ity kapoaka ity no fanekena vaovao amin’ny rako izay aidina ho anareo.'
  - type: heading
    content: Ny nanambaràn’i Jesosy fa hisy hamadika Azy
  - type: heading
    content: Mat 26.21-25; Mar 14.18-21
  '21':
  - type: text
    content: 'Fa indro ny tanan’izay mamadika Ahy dia eto Amiko eto ambonin’ny latabatra. '
  '22':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' dia mandeha tokoa, araka izay efa voatendry; nefa lozan’izay olona nahatonga Azy ho voatolotra! '
  '23':
  - type: text
    content: Ary nifanontany ny amin’izay iray eo aminy mety hahavita izany izy ireo.
  - type: heading
    content: Iza no lehibe indrindra?
  - type: heading
    content: Mat 20.24-28; 19.28; Mar 10.41-45
  '24':
  - type: text
    content: 'Nisy fifandirana koa teo amin’ny mpianatra ny amin’izay iray amin’izy ireo hatao ho lehibe indrindra. '
  '25':
  - type: text
    content: 'Dia hoy Jesosy taminy: Ny mpanjakan’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' dia mampanompo azy ary izay manapaka azy no atao hoe mpanao soa. '
  '26':
  - type: text
    content: 'Fa tsy mba toy izany ianareo; fa izay lehibe indrindra aminareo dia aoka ho toy ny zandriny indrindra; ary izay manapaka dia aoka ho toy ny mpanompo. '
  '27':
  - type: text
    content: 'Fa iza moa no lehibe, izay mipetraka misakafo va sa izay manompo? Tsy izay mipetraka misakafo va? Fa Izaho dia eo aminareo toy izay manompo. '
  '28':
  - type: text
    content: 'Ary ianareo no naharitra nanaraka Ahy tamin’ny fakam-panahy nihatra Tamiko; '
  '29':
  - type: text
    content: 'koa Izaho dia manendry anareo, tahaka ny nanendren’ny Raiko ho Ahy ny fanjakana, '
  '3':
  - type: text
    content: 'Fa i Satana dia niditra tao anatin’i Jodasy, ilay atao hoe iskariota, iray tamin’ny roa amby folo lahy, '
  '30':
  - type: text
    content: mba hihinana sy hisotro eo amin’ny latabatro amin’ny fanjakako ianareo sady hipetraka ambony sezafiandrianana hitsara ny fokon’ny Israely roa amby folo.
  - type: heading
    content: Ny nanambaràn’i Jesosy fa handa Azy i Petera
  - type: heading
    content: Mat 26.31-35; Mar 14.27-31; Jao 13.37-38
  '31':
  - type: text
    content: 'Hoy ny Tompo: Ry Simona, ry Simona, indro i Satana efa nitaky anareo hokororohiny toy ny vary. '
  '32':
  - type: text
    content: 'Nefa Izaho nangataka ho anao mba tsy ho levona ny finoanao; ary rehefa mibebaka ianao dia ampaherezo ireo rahalahinao. '
  '33':
  - type: text
    content: 'Ary hoy izy taminy: Tompoko, vonona hanaraka Anao aho, na dia ho any an-tranomaizina aza, na dia ho any amin’ny fahafatesana aza. '
  '34':
  - type: text
    content: 'Nefa hoy Jesosy: Lazaiko aminao, ry Petera: Raha tsy mbola misy akoho maneno anio dia handa intelo ho tsy mahafantatra Ahy ianao.'
  - type: heading
    content: Ny kitapom-bola, ny kitapom-batsy ary ny sabatra
  '35':
  - type: text
    content: 'Hoy koa Izy tamin’izy ireo: Raha nirahiko tsy nitondra kitapom-bola na kitapom-batsy na kapa ianareo, moa nisy zavatra nahory anareo va? Dia hoy ireo: Tsy nisy. '
  '36':
  - type: text
    content: 'Fa hoy Izy taminy: Amin’izao kosa, izay manana kitapom-bola dia aoka izy hitondra; ary toy izany koa ny kitapom-batsy; ary izay tsy manan-tsabatra kosa dia aoka izy hivarotra ny lambany ka hividy. '
  '37':
  - type: text
    content: 'Fa lazaiko aminareo: Tsy maintsy ho tanteraka Amiko izao voasoratra izao hoe: «Ary natao ho isan’ny mpanota Izy» (Isa 53.12); fa efa ho tanteraka ny Amiko. '
  '38':
  - type: text
    content: 'Ary hoy ireo: Tompoko, indreto sabatra roa. Dia hoy Jesosy taminy: Ampy izay.'
  - type: heading
    content: Ny vavaka nataon’i Jesosy tao amin’ny tendrombohitra Oliva
  - type: heading
    content: Mat 26.36-46; Mar 14.32-42
  '39':
  - type: text
    content: 'Dia niala teo Jesosy, koa araka ny fanaony dia nankany an-tendrombohitra Oliva Izy, ary nanaraka Azy koa ny mpianatra. '
  '4':
  - type: text
    content: 'ka nankao amin’ireo lehiben’ny mpisorona sy ny lehiben’ny mpiambina izy ary niresaka taminy ny amin’izay hanolorany an’i Jesosy amin’ireo. '
  '40':
  - type: text
    content: 'Ary raha vao tonga tao amin’izany toerana izany Izy dia niteny taminy hoe: Mivavaha mba tsy hidiranareo amin’ny fakam-panahy. '
  '41':
  - type: text
    content: 'Ary nihataka tokony ho indray mitora-bato tamin’izy ireo Izy, dia nandohalika ka nivavaka hoe: '
  '42':
  - type: text
    content: 'Raiko ô, raha sitrakao dia esory Amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko anie no hatao fa ny Anao. '
  '43':
  - type: text
    content: 'Ary nisy anjely avy tany an-danitra niseho Taminy ka nampahery Azy. '
  '44':
  - type: text
    content: 'Ary fadiranovana Izy ka nivavaka mafimafy kokoa; koa ny hatsembohany dia tahaka ny vaingan-dra nitete tamin’ny tany. '
  '45':
  - type: text
    content: 'Nony nitsangana avy nivavaka Izy dia nankeo amin’ny mpianatra ka nahita azy ireo resin-tory noho ny alahelo. '
  '46':
  - type: text
    content: 'Dia hoy Izy taminy: Nahoana no dia matory ianareo? Mitsangàna ka mivavaha mba tsy hidiranareo amin’ny fakam-panahy.'
  - type: heading
    content: Ny nisamborana an’i Jesosy
  - type: heading
    content: Mat 26.47-56; Mar 14.43-49; Jao 18.3-11
  '47':
  - type: text
    content: 'Raha mbola niteny Jesosy, indreo, tamy ny vahoaka, ary ilay atao hoe Jodasy, isan’ny roa amby folo lahy, dia nandeha teo alohany ka nanatona an’i Jesosy mba hanoroka Azy. '
  '48':
  - type: text
    content: 'Fa hoy Jesosy taminy: Ry Jodasy, fanorohana va no anoloranao ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: '?'
  '49':
  - type: text
    content: 'Ary izay teo Aminy, raha nahita izay efa hanjo, dia niteny hoe: Tompoko, hamely amin’ny sabatra va izahay? '
  '5':
  - type: text
    content: 'Dia faly ireo ka nanaiky hanome vola azy. '
  '50':
  - type: text
    content: 'Ny iray teo aminy dia namely ny mpanompon’ny Mpisoronabe ka nahafaka ny sofiny havanana. '
  '51':
  - type: text
    content: 'Fa Jesosy namaly hoe: Aoka ihany na dia izao aza. Dia nikasika ny sofiny Izy ka nanasitrana azy.'
  '52':
  - type: text
    content: 'Ary hoy Jesosy tamin’ireo lehiben’ny mpisorona sy ireo lehiben’ny mpiambina ny tempoly ary ireo loholona izay tonga hisambotra Azy: Tonga mitondra sabatra sy langilangy toy ny hisambotra jiolahy va ianareo? '
  '53':
  - type: text
    content: Raha teo aminareo isanandro teo amin’ny tempoly Aho dia tsy nanatsotra tanana Tamiko ianareo; fa izao no fotoananareo sy ny herin’ny maizina.
  - type: heading
    content: Ny nandavan’i Petera an’i Jesosy
  - type: heading
    content: Mat 26.57–27.1; Mar 14.53–15.1; Jao 18.13-27
  '54':
  - type: text
    content: 'Dia nisambotra an’i Jesosy izy ireo ka nitondra Azy ho ao an-tranon’ny Mpisoronabe. Ary i Petera dia nanaraka teny lavidavitra teny. '
  '55':
  - type: text
    content: 'Raha nandrehitra afo teo an-kianja ireo ka nipetraka dia mba nipetraka teo aminy koa i Petera. '
  '56':
  - type: text
    content: 'Ary ny mpanompovavy iray, nony nahita azy nipetraka teo anilan’ny hazavana, dia nandinika azy ka niteny hoe: Ity koa niaraka Taminy. '
  '57':
  - type: text
    content: 'Fa nandà izy ka niteny hoe: Ravehivavy, tsy fantatro Izy. '
  '58':
  - type: text
    content: 'Vetivety foana taorianan’izay dia nisy olona hafa koa nahita azy ka niteny hoe: Ianao koa mba naman’ireny. Fa hoy i Petera: Ralehilahy, tsy izy aho. '
  '59':
  - type: text
    content: 'Rehefa tokony ho ora iray no lasa dia nisy olona iray koa nanizingizina hoe: Izy io dia niaraka Taminy marina tokoa fa Galiliana izy. '
  '6':
  - type: text
    content: Ary nanaiky izy ka nitady izay fotoana azony hanolorana Azy amin’ireo, tsy ho fantatry ny olona.
  - type: heading
    content: Asain’i Jesosy omanina ny Paska
  - type: heading
    content: Mat 26.17-19; Mar 14.12-16
  '60':
  - type: text
    content: 'Fa hoy i Petera: Ralehilahy, tsy fantatro izay lazainao. Ary niaraka tamin’izay, raha mbola niteny izy, dia nisy akoho naneno. '
  '61':
  - type: text
    content: 'Ary nitodika ny Tompo dia nibanjina an’i Petera. Ary nahatsiaro ilay tenin’ny Tompo taminy i Petera hoe: Raha tsy mbola misy akoho maneno anio dia handa Ahy intelo ianao. '
  '62':
  - type: text
    content: Dia lasa nankany ivelany i Petera ka nitomany mafy tokoa.
  '63':
  - type: text
    content: 'Ary ireo lehilahy izay nitana an’i Jesosy dia nanao Azy ho fihomehezana sady nikapoka Azy. '
  '64':
  - type: text
    content: 'Rehefa notampenan’izy ireo ny masony dia nanontaniany hoe: Maminania; iza moa no nikapoka Anao? '
  '65':
  - type: text
    content: Teny ratsy maro hafa koa no nataony hanaratsiany Azy.
  - type: heading
    content: Ny nitsaran’ny Sinedriona an’i Jesosy
  '66':
  - type: text
    content: 'Raha vao nazava ny andro dia nivory ny filankevitry ny loholona dia ireo lehiben’ny mpisorona sy ny mpanoradalàna ka nitondra an’i Jesosy ho eo amin’ny Sinedrionany '
  '67':
  - type: text
    content: 'ary niteny hoe: Raha Ianao no '
  - type: text
    content: Kristy
  - type: text
    content: ' dia lazao aminay. Dia hoy Izy taminy: Na dia hilaza aminareo aza Aho dia tsy hino ianareo. '
  '68':
  - type: text
    content: 'Ary na dia hanontany aza Aho dia tsy hamaly akory ianareo. '
  '69':
  - type: text
    content: 'Fa hatramin’izao ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' dia hipetraka eo ankavanan’ny herin’Andriamanitra. '
  '7':
  - type: text
    content: 'Tonga ny andro fihinanana ny mofo tsy misy masirasira, dia ilay tsy maintsy hamonoana ny '
  - type: text
    content: Paska
  - type: text
    content: '. '
  '70':
  - type: text
    content: 'Hoy izy rehetra: Zanak’Andriamanitra ary va Ianao? Dia hoy Izy taminy: Voalazanareo fa Izaho no Izy. '
  '71':
  - type: text
    content: 'Ary hoy ireo: Ka inona indray no ilàntsika vavolombelona? Fa ny tenantsika no efa nandre tamin’ny vavany.'
  '8':
  - type: text
    content: 'Ary Jesosy naniraka an’i Petera sy i Jaona ka niteny hoe: Mandehana, manomana ny Paska hohanintsika. '
  '9':
  - type: text
    content: 'Ary hoy ireo taminy: Aiza no tianao hanomananay azy? '
