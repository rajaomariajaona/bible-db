document_id: LUK.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teti-dratsy hamonoana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.1-5, 14-16; Mar 14.1-2, 10-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Efa akaiky ny andro firavoravoana fihinanana ny mofo tsy misy masirasira, dia ilay atao hoe Paska. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary ireo lehiben’ny mpisorona sy ny mpanoradalàna dia nitady izay hamonoany an’i Jesosy; nefa natahotra ny olona izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa i Satana dia niditra tao anatin’i Jodasy, ilay atao hoe iskariota, iray tamin’ny roa amby folo lahy, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka nankao amin’ireo lehiben’ny mpisorona sy ny lehiben’ny mpiambina izy ary niresaka taminy ny amin’izay hanolorany an’i Jesosy amin’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia faly ireo ka nanaiky hanome vola azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary nanaiky izy ka nitady izay fotoana azony hanolorana Azy amin’ireo, tsy ho fantatry ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Asain’i Jesosy omanina ny Paska
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.17-19; Mar 14.12-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tonga ny andro fihinanana ny mofo tsy misy masirasira, dia ilay tsy maintsy hamonoana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Jesosy naniraka an’i Petera sy i Jaona ka niteny hoe: Mandehana, manomana ny Paska hohanintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy ireo taminy: Aiza no tianao hanomananay azy? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy Izy tamin’izy ireo: Indro, raha miditra ao an-tanàna ianareo dia hisy lehilahy mitondra siny feno rano hifanena aminareo; manaraha azy ao amin’ny trano izay hidirany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia lazao amin’ny tompon-trano hoe: Izao no lazain’ny Mpampianatra aminao: Aiza ny efitrano hiarahako mihinana ny Paska amin’ny mpianatro? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hanoro anareo efitrano malalaka ambony rihana, izay efa misy izay ilaina rehetra izy; any no ataovy ny fanomanana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nandeha izy ireo ka nahita araka izay efa nolazainy taminy, ary nanomana ny Paska izy ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Fanasan’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.20, 26-29; Mar 14.17, 22-25; ampit. 1Kor 11.23-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nony tonga ny fotoana dia nipetraka hihinana Izy mbamin’ny Apostoly. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Izy taminy: Naniry koa Aho raha naniry hiara-mihinana ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' ity aminareo, dieny mbola tsy mijaly Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa lazaiko aminareo fa tsy mba hihinana izany intsony Aho ambara-pahatanterak’izany ao amin’ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nandray kapoaka Izy, dia nisaotra ka hoy Izy: Raiso ity ka zarao aminareo; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: fa lazaiko aminareo fa hatramin’izao dia tsy hisotro ny vokatry ny voaloboka intsony Aho mandra-pahatongan’ny fanjakan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nandray mofo Izy, koa rehefa nisaotra, dia novakiny ka natolony azy sady nataony hoe: Ity no tenako izay omena ho anareo; izao no ataovy ho fahatsiarovana Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary araka izany koa ny kapoaka, rehefa vita ny sakafo, dia hoy Izy: Ity kapoaka ity no fanekena vaovao amin’ny rako izay aidina ho anareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanambaràn’i Jesosy fa hisy hamadika Azy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.21-25; Mar 14.18-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa indro ny tanan’izay mamadika Ahy dia eto Amiko eto ambonin’ny latabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' dia mandeha tokoa, araka izay efa voatendry; nefa lozan’izay olona nahatonga Azy ho voatolotra! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary nifanontany ny amin’izay iray eo aminy mety hahavita izany izy ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Iza no lehibe indrindra?
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 20.24-28; 19.28; Mar 10.41-45
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nisy fifandirana koa teo amin’ny mpianatra ny amin’izay iray amin’izy ireo hatao ho lehibe indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy Jesosy taminy: Ny mpanjakan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' dia mampanompo azy ary izay manapaka azy no atao hoe mpanao soa. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa tsy mba toy izany ianareo; fa izay lehibe indrindra aminareo dia aoka ho toy ny zandriny indrindra; ary izay manapaka dia aoka ho toy ny mpanompo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa iza moa no lehibe, izay mipetraka misakafo va sa izay manompo? Tsy izay mipetraka misakafo va? Fa Izaho dia eo aminareo toy izay manompo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ianareo no naharitra nanaraka Ahy tamin’ny fakam-panahy nihatra Tamiko; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'koa Izaho dia manendry anareo, tahaka ny nanendren’ny Raiko ho Ahy ny fanjakana, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: mba hihinana sy hisotro eo amin’ny latabatro amin’ny fanjakako ianareo sady hipetraka ambony sezafiandrianana hitsara ny fokon’ny Israely roa amby folo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanambaràn’i Jesosy fa handa Azy i Petera
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.31-35; Mar 14.27-31; Jao 13.37-38
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hoy ny Tompo: Ry Simona, ry Simona, indro i Satana efa nitaky anareo hokororohiny toy ny vary. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nefa Izaho nangataka ho anao mba tsy ho levona ny finoanao; ary rehefa mibebaka ianao dia ampaherezo ireo rahalahinao. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary hoy izy taminy: Tompoko, vonona hanaraka Anao aho, na dia ho any an-tranomaizina aza, na dia ho any amin’ny fahafatesana aza. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nefa hoy Jesosy: Lazaiko aminao, ry Petera: Raha tsy mbola misy akoho maneno anio dia handa intelo ho tsy mahafantatra Ahy ianao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny kitapom-bola, ny kitapom-batsy ary ny sabatra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hoy koa Izy tamin’izy ireo: Raha nirahiko tsy nitondra kitapom-bola na kitapom-batsy na kapa ianareo, moa nisy zavatra nahory anareo va? Dia hoy ireo: Tsy nisy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa hoy Izy taminy: Amin’izao kosa, izay manana kitapom-bola dia aoka izy hitondra; ary toy izany koa ny kitapom-batsy; ary izay tsy manan-tsabatra kosa dia aoka izy hivarotra ny lambany ka hividy. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa lazaiko aminareo: Tsy maintsy ho tanteraka Amiko izao voasoratra izao hoe: «Ary natao ho isan’ny mpanota Izy» (Isa 53.12); fa efa ho tanteraka ny Amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary hoy ireo: Tompoko, indreto sabatra roa. Dia hoy Jesosy taminy: Ampy izay.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Jesosy tao amin’ny tendrombohitra Oliva
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.36-46; Mar 14.32-42
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia niala teo Jesosy, koa araka ny fanaony dia nankany an-tendrombohitra Oliva Izy, ary nanaraka Azy koa ny mpianatra. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary raha vao tonga tao amin’izany toerana izany Izy dia niteny taminy hoe: Mivavaha mba tsy hidiranareo amin’ny fakam-panahy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nihataka tokony ho indray mitora-bato tamin’izy ireo Izy, dia nandohalika ka nivavaka hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Raiko ô, raha sitrakao dia esory Amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko anie no hatao fa ny Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary nisy anjely avy tany an-danitra niseho Taminy ka nampahery Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary fadiranovana Izy ka nivavaka mafimafy kokoa; koa ny hatsembohany dia tahaka ny vaingan-dra nitete tamin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Nony nitsangana avy nivavaka Izy dia nankeo amin’ny mpianatra ka nahita azy ireo resin-tory noho ny alahelo. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia hoy Izy taminy: Nahoana no dia matory ianareo? Mitsangàna ka mivavaha mba tsy hidiranareo amin’ny fakam-panahy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nisamborana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.47-56; Mar 14.43-49; Jao 18.3-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Raha mbola niteny Jesosy, indreo, tamy ny vahoaka, ary ilay atao hoe Jodasy, isan’ny roa amby folo lahy, dia nandeha teo alohany ka nanatona an’i Jesosy mba hanoroka Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Fa hoy Jesosy taminy: Ry Jodasy, fanorohana va no anoloranao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary izay teo Aminy, raha nahita izay efa hanjo, dia niteny hoe: Tompoko, hamely amin’ny sabatra va izahay? '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ny iray teo aminy dia namely ny mpanompon’ny Mpisoronabe ka nahafaka ny sofiny havanana. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Fa Jesosy namaly hoe: Aoka ihany na dia izao aza. Dia nikasika ny sofiny Izy ka nanasitrana azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary hoy Jesosy tamin’ireo lehiben’ny mpisorona sy ireo lehiben’ny mpiambina ny tempoly ary ireo loholona izay tonga hisambotra Azy: Tonga mitondra sabatra sy langilangy toy ny hisambotra jiolahy va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Raha teo aminareo isanandro teo amin’ny tempoly Aho dia tsy nanatsotra tanana Tamiko ianareo; fa izao no fotoananareo sy ny herin’ny maizina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandavan’i Petera an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.57–27.1; Mar 14.53–15.1; Jao 18.13-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Dia nisambotra an’i Jesosy izy ireo ka nitondra Azy ho ao an-tranon’ny Mpisoronabe. Ary i Petera dia nanaraka teny lavidavitra teny. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Raha nandrehitra afo teo an-kianja ireo ka nipetraka dia mba nipetraka teo aminy koa i Petera. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ary ny mpanompovavy iray, nony nahita azy nipetraka teo anilan’ny hazavana, dia nandinika azy ka niteny hoe: Ity koa niaraka Taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Fa nandà izy ka niteny hoe: Ravehivavy, tsy fantatro Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Vetivety foana taorianan’izay dia nisy olona hafa koa nahita azy ka niteny hoe: Ianao koa mba naman’ireny. Fa hoy i Petera: Ralehilahy, tsy izy aho. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Rehefa tokony ho ora iray no lasa dia nisy olona iray koa nanizingizina hoe: Izy io dia niaraka Taminy marina tokoa fa Galiliana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Fa hoy i Petera: Ralehilahy, tsy fantatro izay lazainao. Ary niaraka tamin’izay, raha mbola niteny izy, dia nisy akoho naneno. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary nitodika ny Tompo dia nibanjina an’i Petera. Ary nahatsiaro ilay tenin’ny Tompo taminy i Petera hoe: Raha tsy mbola misy akoho maneno anio dia handa Ahy intelo ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Dia lasa nankany ivelany i Petera ka nitomany mafy tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ary ireo lehilahy izay nitana an’i Jesosy dia nanao Azy ho fihomehezana sady nikapoka Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Rehefa notampenan’izy ireo ny masony dia nanontaniany hoe: Maminania; iza moa no nikapoka Anao? '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Teny ratsy maro hafa koa no nataony hanaratsiany Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitsaran’ny Sinedriona an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Raha vao nazava ny andro dia nivory ny filankevitry ny loholona dia ireo lehiben’ny mpisorona sy ny mpanoradalàna ka nitondra an’i Jesosy ho eo amin’ny Sinedrionany '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'ary niteny hoe: Raha Ianao no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' dia lazao aminay. Dia hoy Izy taminy: Na dia hilaza aminareo aza Aho dia tsy hino ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Ary na dia hanontany aza Aho dia tsy hamaly akory ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Fa hatramin’izao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' dia hipetraka eo ankavanan’ny herin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Hoy izy rehetra: Zanak’Andriamanitra ary va Ianao? Dia hoy Izy taminy: Voalazanareo fa Izaho no Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Ary hoy ireo: Ka inona indray no ilàntsika vavolombelona? Fa ny tenantsika no efa nandre tamin’ny vavany.'
