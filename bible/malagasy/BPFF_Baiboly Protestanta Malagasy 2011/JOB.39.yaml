document_id: JOB.39,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Fantatrao va ny fotoana fiterahan’ny osidia any amin’ny harambato?
  - type: text
    content: Voahevitrao va ny fiterahan’ny dieravavy?
  '10':
  - type: text
    content: Mahafatotra ny ombimanga amin’ny mahazaka ho ao am-bavaasanao va ianao?
  - type: text
    content: Na, mety manaraka anao handravona bainga any an-dohasaha va izy?
  '11':
  - type: text
    content: Azonao itokiana va izy satria lehibe ny heriny?
  - type: text
    content: Ary havelanao hataony va ny asanao?
  '12':
  - type: text
    content: Azonao itokiana hitondra ny varinao mody va izy
  - type: text
    content: ary hanangona izany ho eo am-pamoloananao?
  '13':
  - type: text
    content: Mikopakopaka noho ny hafaliana ny elatry ny aotirisy,
  - type: text
    content: nefa mahalemy fanahy azy va ny elany sy ny volony?
  '14':
  - type: text
    content: Ilaozany anaty tany ny atodiny
  - type: text
    content: ka avelany hafanain’ny vovoka
  '15':
  - type: text
    content: Tsy ahiny ny ho voaporitry ny tongotra ireo
  - type: text
    content: na ho voahitsaky ny bibidia.
  '16':
  - type: text
    content: Mafy ny fitondrany ny zanany fa ataony hoatra ny tsy azy ireny;
  - type: text
    content: tsy ahoany akory na dia mila ho very foana aza izay nisasarany.
  '17':
  - type: text
    content: Fa nesorin’Andriamanitra taminy ny fahendrena
  - type: text
    content: ary tsy nomeny anjara fahalalana izy.
  '18':
  - type: text
    content: Raha mikopakopaka elatra toa hanidina izy
  - type: text
    content: dia ihomehezany ny soavaly sy ny mpitaingina azy.
  '19':
  - type: text
    content: Moa manome hery ny soavaly va ianao
  - type: text
    content: na manarona vombo mihofahofa ny vozony?
  '2':
  - type: text
    content: Mahisa ny volana itondrany vohoka va ianao?
  - type: text
    content: Ary fantatrao va ny fotoana fiterahany?
  '20':
  - type: text
    content: Mahay mampitsipika azy tahaka ny valala va ianao?
  - type: text
    content: Mahatsiravina ny hamafin’ny fiefonefony!
  '21':
  - type: text
    content: Mihehy ao amin’ny lohasaha izy ka mifalifaly noho ny heriny;
  - type: text
    content: mandroso hanetra ny ady izy.
  '22':
  - type: text
    content: Ihomehezany ny tahotra ary tsy mivadi-po izy
  - type: text
    content: sady tsy mianotra manoloana ny sabatra.
  '23':
  - type: text
    content: Mikitrakitrana eny amboniny ny tranon-jana-tsipìka
  - type: text
    content: sy ny lefona mitselatselatra ary ny lefom-pohy.
  '24':
  - type: text
    content: Miriotra mafy amin’ny fahavinirana sy ny fahatezerana izy
  - type: text
    content: ka tsy mety mijanona intsony rehefa maneno ny anjomara.
  '25':
  - type: text
    content: Na oviana na oviana no anenoan’ny anjomara dia mihiaka izy hoe Hia!
  - type: text
    content: Manimbolo ny ady izy raha mbola lavitra,
  - type: text
    content: dia ny antsoantson’ny manamboninahitra sy ny akoralava mihantsy ady.
  '26':
  - type: text
    content: Ny fahendrenao va no mampisidina ny hitsikitsika
  - type: text
    content: sy mampamelatra ny elany hianatsimo?
  '27':
  - type: text
    content: Noho ny didinao va no iakaran’ny voromahery
  - type: text
    content: sy anaovany ny akaniny eny an-dringiringy?
  '28':
  - type: text
    content: Eny amin’ny harambato no itoerany sy anaovany ny akaniny,
  - type: text
    content: dia any an-tendron’ny harambato izay mandany mafy.
  '29':
  - type: text
    content: Avy any no itiliany ny remby;
  - type: text
    content: mahatsinjo lavitra ny masony.
  '3':
  - type: text
    content: Miondrika izy ka teraka
  - type: text
    content: sady afaka ny farariany.
  '30':
  - type: text
    content: Mitsentsitra ra ny zanany
  - type: text
    content: ary izay itoeran’ny faty dia any izy.
  '4':
  - type: text
    content: Donga ny zanany, mihalehibe eny an-tampon-tanety eny;
  - type: text
    content: lasa mandeha izy ka tsy miverina eo aminy intsony.
  '5':
  - type: text
    content: Iza moa no namela ny borikidia hikarenjy?
  - type: text
    content: Ary iza no efa namaha ny fatoran’ny borikidia
  '6':
  - type: text
    content: izay nomeko ny tany ngazana ho fitoerany
  - type: text
    content: ary ny tanin-tsira ho fonenany?
  '7':
  - type: text
    content: Ihomehezany ny tabataba ao an-tanàna;
  - type: text
    content: tsy ahoany akory ny antsoantson’ny mpandroaka boriky.
  '8':
  - type: text
    content: Mikarenjy any an-tendrombohitra rehetra any izy mitady ny kijanany
  - type: text
    content: ary mitady ny zava-maitso rehetra izy.
  '9':
  - type: text
    content: Mba mety manompo anao va ny ombimanga,
  - type: text
    content: na handry ao am-pahitrao amin’ny alina?
