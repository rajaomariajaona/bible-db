document_id: JOB.39,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantatrao va ny fotoana fiterahan’ny osidia any amin’ny harambato?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voahevitrao va ny fiterahan’ny dieravavy?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahafatotra ny ombimanga amin’ny mahazaka ho ao am-bavaasanao va ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na, mety manaraka anao handravona bainga any an-dohasaha va izy?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azonao itokiana va izy satria lehibe ny heriny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary havelanao hataony va ny asanao?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azonao itokiana hitondra ny varinao mody va izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanangona izany ho eo am-pamoloananao?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mikopakopaka noho ny hafaliana ny elatry ny aotirisy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa mahalemy fanahy azy va ny elany sy ny volony?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilaozany anaty tany ny atodiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka avelany hafanain’ny vovoka
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ahiny ny ho voaporitry ny tongotra ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho voahitsaky ny bibidia.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mafy ny fitondrany ny zanany fa ataony hoatra ny tsy azy ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ahoany akory na dia mila ho very foana aza izay nisasarany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nesorin’Andriamanitra taminy ny fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nomeny anjara fahalalana izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mikopakopaka elatra toa hanidina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ihomehezany ny soavaly sy ny mpitaingina azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa manome hery ny soavaly va ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na manarona vombo mihofahofa ny vozony?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahisa ny volana itondrany vohoka va ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fantatrao va ny fotoana fiterahany?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahay mampitsipika azy tahaka ny valala va ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatsiravina ny hamafin’ny fiefonefony!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihehy ao amin’ny lohasaha izy ka mifalifaly noho ny heriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandroso hanetra ny ady izy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ihomehezany ny tahotra ary tsy mivadi-po izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mianotra manoloana ny sabatra.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mikitrakitrana eny amboniny ny tranon-jana-tsipìka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny lefona mitselatselatra ary ny lefom-pohy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miriotra mafy amin’ny fahavinirana sy ny fahatezerana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mety mijanona intsony rehefa maneno ny anjomara.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na oviana na oviana no anenoan’ny anjomara dia mihiaka izy hoe Hia!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manimbolo ny ady izy raha mbola lavitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny antsoantson’ny manamboninahitra sy ny akoralava mihantsy ady.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahendrenao va no mampisidina ny hitsikitsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mampamelatra ny elany hianatsimo?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny didinao va no iakaran’ny voromahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy anaovany ny akaniny eny an-dringiringy?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny amin’ny harambato no itoerany sy anaovany ny akaniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any an-tendron’ny harambato izay mandany mafy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy any no itiliany ny remby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahatsinjo lavitra ny masony.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miondrika izy ka teraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady afaka ny farariany.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsentsitra ra ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay itoeran’ny faty dia any izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donga ny zanany, mihalehibe eny an-tampon-tanety eny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lasa mandeha izy ka tsy miverina eo aminy intsony.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no namela ny borikidia hikarenjy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no efa namaha ny fatoran’ny borikidia
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nomeko ny tany ngazana ho fitoerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tanin-tsira ho fonenany?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ihomehezany ny tabataba ao an-tanàna;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ahoany akory ny antsoantson’ny mpandroaka boriky.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mikarenjy any an-tendrombohitra rehetra any izy mitady ny kijanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitady ny zava-maitso rehetra izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba mety manompo anao va ny ombimanga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na handry ao am-pahitrao amin’ny alina?
