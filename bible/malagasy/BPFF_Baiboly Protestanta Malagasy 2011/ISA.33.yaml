document_id: ISA.33,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Lozanao izay mandrava!
  - type: text
    content: Lozanao, ry ilay mandroba,
  - type: text
    content: nefa tsy norobaina ianao;
  - type: text
    content: ry ilay mamitaka, nefa tsy nofitahina ianao!
  - type: text
    content: Rehefa mitsahatra tsy mandrava intsony ianao dia mba horavana kosa;
  - type: text
    content: ary rehefa mitsahatra tsy mamitaka intsony ianao dia mba hofitahina kosa.
  '10':
  - type: text
    content: Ankehitriny dia hitsangana Aho,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: ankehitriny dia hijoro Aho;
  - type: text
    content: ankehitriny dia hisandratra Aho.
  '11':
  - type: text
    content: Torontoronina bozaka ianareo
  - type: text
    content: ka miteraka mololo;
  - type: text
    content: ny fofonainareo
  - type: text
    content: dia tahaka ny afo handevona anareo.
  '12':
  - type: text
    content: Ny firenena dia ho tahaka ny fandoroan-tsokay;
  - type: text
    content: eny, ho tahaka ny tsilo notombohina
  - type: text
    content: izay mirehitra amin’ny afo izy.
  '13':
  - type: text
    content: Mihainoa ny amin’izay efa nataoko, ianareo izay lavitra!
  - type: text
    content: Ary aoka hahafantatra ny heriko ianareo izay akaiky!
  '14':
  - type: text
    content: 'Raiki-tahotra ny mpanota ao '
  - type: text
    content: Ziona
  - type: text
    content: ;
  - type: text
    content: 'horohoro no nahazo ny ratsy fanahy:'
  - type: text
    content: Iza amintsika no hahatoetra
  - type: text
    content: ao amin’ny afo mandevona?
  - type: text
    content: Iza amintsika moa no hahatoetra
  - type: text
    content: ao amin’ny lelafo tsy mety maty?
  '15':
  - type: text
    content: Izay mandeha amin’ny fahamarinana
  - type: text
    content: sady miteny zava-mahitsy,
  - type: text
    content: izay tsy mety mandray harena amin’ny fanaovana an-keriny
  - type: text
    content: fa manifikifika ny tanany mba tsy handray kolikoly,
  - type: text
    content: izay manentsin-tadìny mba tsy handrenesany ny amin’ny fandatsahan-dra
  - type: text
    content: sady manakimpy ny masony mba tsy hahita ny ratsy;
  '16':
  - type: text
    content: izy no honina any amin’ny avo;
  - type: text
    content: any amin’ny harambato ny fiarovany tena;
  - type: text
    content: izay hohaniny dia homena azy
  - type: text
    content: ary azo antoka ny rano hosotroiny.
  - type: heading
    content: Jerosalema afaka
  '17':
  - type: text
    content: Ny masonao dia hahita ny mpanjaka amin’ny hatsaran-tarehiny
  - type: text
    content: sady hahatsinjo tany malalaka dia malalaka.
  '18':
  - type: text
    content: 'Hotsaroanao ilay nampahatahotra anao:'
  - type: text
    content: Aiza ny mpitantsoratra? Aiza ny mpamory hetra?
  - type: text
    content: Aiza ny mpanisa ny tilikambo fiambenana?
  '19':
  - type: text
    content: Tsy ho hitanao intsony ny firenena misetrasetra,
  - type: text
    content: dia ireo olona miboredidredi-piteny ka tsy fantatra,
  - type: text
    content: na ny lela miakanakana ka tsy azo.
  '2':
  - type: text
    content: TOMPO ô, mamindrà fo aminay!
  - type: text
    content: Ianao no antenainay.
  - type: text
    content: Aoka ho herinay isa-maraina Ianao
  - type: text
    content: ary ho famonjena anay amin’ny andro fahoriana!
  '20':
  - type: text
    content: 'Tsinjovy i '
  - type: text
    content: Ziona
  - type: text
    content: ', dia ilay tanàna fihaonantsika tamin’ny andro firavoravoana!'
  - type: text
    content: Ny masonao dia hahita an’i Jerosalema, fonenana mandry fehizay,
  - type: text
    content: tranolay izay tsy hafindra intsony,
  - type: text
    content: tsy hongotana intsony mandrakizay ny tsatokan-dainy,
  - type: text
    content: ary tsy hisy hotapahina ny kofehiny.
  '21':
  - type: text
    content: Fa any tokoa dia mahery ho antsika NY TOMPO.
  - type: text
    content: Tany misy ony
  - type: text
    content: sy lakandrano lehibe no any;
  - type: text
    content: tsy halehan’ny sambo voizina izany,
  - type: text
    content: na hovakivakin’ny sambo lehibe.
  '22':
  - type: text
    content: Fa NY TOMPO no Mpitsara antsika;
  - type: text
    content: NY TOMPO no Mpanome lalàna ho antsika;
  - type: text
    content: NY TOMPO no Mpanjakantsika;
  - type: text
    content: Izy no hamonjy antsika.
  '23':
  - type: text
    content: Mivaha ny mahazakan-tsambonao;
  - type: text
    content: tsy mahahazona mafy ny fiorenan’andry izy,
  - type: text
    content: na mahavelatra ny lay.
  - type: text
    content: Fa amin’izay kosa dia hozaraina ny zavatra betsaka voababo;
  - type: text
    content: na dia ny mandringa aza dia mba hahazo babo ihany;
  '24':
  - type: text
    content: 'tsy hisy amin’ny mponina ao hilaza hoe: Marary aho!'
  - type: text
    content: Ny olona izay mitoetra ao
  - type: text
    content: dia voavela heloka.
  '3':
  - type: text
    content: Ny feon’ny fitabatabana
  - type: text
    content: no mampandositra ny vahoaka;
  - type: text
    content: raha misandratra Ianao
  - type: text
    content: dia miparitaka ireo firenena.
  '4':
  - type: text
    content: Hangonina
  - type: text
    content: tahaka ny fanangona valala ny babonareo,
  - type: text
    content: tahaka ny firohotana eo amin’ny sompanga no hirohotana eo aminy.
  '5':
  - type: text
    content: Manerinerina NY TOMPO
  - type: text
    content: satria mitoetra any amin’ny avo Izy;
  - type: text
    content: nofenoiny
  - type: text
    content: 'rariny sy fahamarinana i '
  - type: text
    content: Ziona
  - type: text
    content: .
  '6':
  - type: text
    content: Tsy hanam-piovana ny andronao;
  - type: text
    content: harena mahavonjy
  - type: text
    content: ny fahendrena sy ny fahalalana;
  - type: text
    content: ny fahatahorana NY TOMPO
  - type: text
    content: no harenany amin’izany.
  - type: heading
    content: Ny hidiran’NY TOMPO an-tsehatra
  '7':
  - type: text
    content: Indreo misy lehilahy mahery mitaraina eny ivelany;
  - type: text
    content: ny iraka nitady fihavanana dia mitomany mafy.
  '8':
  - type: text
    content: Foana ny lalambe;
  - type: text
    content: tsy misy mpandeha intsony ny sakeli-dalana;
  - type: text
    content: nofoanany ny fanekena;
  - type: text
    content: nohamavoiny ny tanàna;
  - type: text
    content: tsy nanaja olona izy.
  '9':
  - type: text
    content: Misaona ny tany ka milofika;
  - type: text
    content: menatra i Libanona ka malazo;
  - type: text
    content: tonga tahaka ny tany ngazana i Saròna,
  - type: text
    content: ary manintsan-dravina i Basana sy i Karmela.
