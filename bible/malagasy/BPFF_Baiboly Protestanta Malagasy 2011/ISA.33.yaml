document_id: ISA.33,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lozanao izay mandrava!
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lozanao, ry ilay mandroba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy norobaina ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry ilay mamitaka, nefa tsy nofitahina ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa mitsahatra tsy mandrava intsony ianao dia mba horavana kosa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa mitsahatra tsy mamitaka intsony ianao dia mba hofitahina kosa.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ankehitriny dia hitsangana Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ankehitriny dia hijoro Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ankehitriny dia hisandratra Aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Torontoronina bozaka ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miteraka mololo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fofonainareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tahaka ny afo handevona anareo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny firenena dia ho tahaka ny fandoroan-tsokay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho tahaka ny tsilo notombohina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mirehitra amin’ny afo izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mihainoa ny amin’izay efa nataoko, ianareo izay lavitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hahafantatra ny heriko ianareo izay akaiky!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Raiki-tahotra ny mpanota ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'horohoro no nahazo ny ratsy fanahy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza amintsika no hahatoetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny afo mandevona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza amintsika moa no hahatoetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny lelafo tsy mety maty?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izay mandeha amin’ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miteny zava-mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy mety mandray harena amin’ny fanaovana an-keriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manifikifika ny tanany mba tsy handray kolikoly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manentsin-tadìny mba tsy handrenesany ny amin’ny fandatsahan-dra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manakimpy ny masony mba tsy hahita ny ratsy;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: izy no honina any amin’ny avo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny harambato ny fiarovany tena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hohaniny dia homena azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary azo antoka ny rano hosotroiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerosalema afaka
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny masonao dia hahita ny mpanjaka amin’ny hatsaran-tarehiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hahatsinjo tany malalaka dia malalaka.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hotsaroanao ilay nampahatahotra anao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza ny mpitantsoratra? Aiza ny mpamory hetra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza ny mpanisa ny tilikambo fiambenana?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy ho hitanao intsony ny firenena misetrasetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo olona miboredidredi-piteny ka tsy fantatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny lela miakanakana ka tsy azo.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: TOMPO ô, mamindrà fo aminay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no antenainay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho herinay isa-maraina Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho famonjena anay amin’ny andro fahoriana!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tsinjovy i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ', dia ilay tanàna fihaonantsika tamin’ny andro firavoravoana!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masonao dia hahita an’i Jerosalema, fonenana mandry fehizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tranolay izay tsy hafindra intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hongotana intsony mandrakizay ny tsatokan-dainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy hotapahina ny kofehiny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa any tokoa dia mahery ho antsika NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tany misy ony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy lakandrano lehibe no any;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy halehan’ny sambo voizina izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hovakivakin’ny sambo lehibe.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa NY TOMPO no Mpitsara antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no Mpanome lalàna ho antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no Mpanjakantsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no hamonjy antsika.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mivaha ny mahazakan-tsambonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mahahazona mafy ny fiorenan’andry izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mahavelatra ny lay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’izay kosa dia hozaraina ny zavatra betsaka voababo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia ny mandringa aza dia mba hahazo babo ihany;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'tsy hisy amin’ny mponina ao hilaza hoe: Marary aho!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona izay mitoetra ao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia voavela heloka.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny feon’ny fitabatabana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mampandositra ny vahoaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha misandratra Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miparitaka ireo firenena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hangonina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny fanangona valala ny babonareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny firohotana eo amin’ny sompanga no hirohotana eo aminy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Manerinerina NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mitoetra any amin’ny avo Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nofenoiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'rariny sy fahamarinana i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsy hanam-piovana ny andronao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: harena mahavonjy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahendrena sy ny fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahatahorana NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no harenany amin’izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hidiran’NY TOMPO an-tsehatra
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Indreo misy lehilahy mahery mitaraina eny ivelany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny iraka nitady fihavanana dia mitomany mafy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Foana ny lalambe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy mpandeha intsony ny sakeli-dalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nofoanany ny fanekena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nohamavoiny ny tanàna;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nanaja olona izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Misaona ny tany ka milofika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: menatra i Libanona ka malazo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga tahaka ny tany ngazana i Saròna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manintsan-dravina i Basana sy i Karmela.
