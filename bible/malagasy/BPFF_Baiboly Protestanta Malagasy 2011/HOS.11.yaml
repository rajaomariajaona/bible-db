document_id: HOS.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra, ray diso fanantenana noho ny nataon-janany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fony mbola zaza Israely dia tiako izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nantsoiko hiala tany Ejipta ny zanako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nony nisy niantso azy dia vao mainka izy nandositra ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ho an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' no namonoany zavatra hatao fanatitra'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho an’ny sarin-javatra voasokitra no nandoroany ditin-kazo manitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izaho no nampianatra an’i Efraima handeha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, noraisiko tamin’ny tanany aza izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa odiany tsy fantatra fa Izaho no nikarakara azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tamin’ny tady fitarihana olona no nitarihako azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tamin’ny mahazakan’ny fitiavana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy izay manainga ny zioga eo ambonin’ny valanoranony Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanolo-kanina azy tsimoramora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy hiverina ho any amin’ny tany Ejipta izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa i Asiria no ho mpanjakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy nety nibebaka izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hisy sabatra hihodinkodina ao an-tanànany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handrava ny manodidina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handevona azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fikasana nananany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitiavan’Andriamanitra no handresy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Minia mikomy Amiko ny oloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na dia antsoina ho amin’ny Avo aza izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy misy mety mitsangana akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hataoko ahoana re no fahafoy anao, ry Efraima?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ho fanolotra anao, ry Israely?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataoko ahoana re no fitondra anao ho tahaka an’i Adma?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataoko tahaka an’i Zeboima va ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Onena ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mafy loatra ny alaheloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy hampirehitra ny hatezerako Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na handringana an’i Efraima intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy olona Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny Iray Masina ao aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho avy amin’ny fahatezerana mirehitra Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hanaraka NY TOMPO ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hierona toy ny liona Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, Izy no hierona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanatona amin-kovitra avy any andrefana ny zanaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hanatona amin-kovitra avy any Ejipta toy ny voronkely izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avy any amin’ny tany Asiria toy ny voromailala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hampitoeriko ao an-tranony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
