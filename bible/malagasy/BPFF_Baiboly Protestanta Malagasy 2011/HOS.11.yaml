document_id: HOS.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra, ray diso fanantenana noho ny nataon-janany
  - type: text
    content: Fony mbola zaza Israely dia tiako izy
  - type: text
    content: ary nantsoiko hiala tany Ejipta ny zanako.
  '10':
  - type: text
    content: Hanaraka NY TOMPO ireny;
  - type: text
    content: hierona toy ny liona Izy;
  - type: text
    content: eny, Izy no hierona,
  - type: text
    content: dia hanatona amin-kovitra avy any andrefana ny zanaka.
  '11':
  - type: text
    content: Hanatona amin-kovitra avy any Ejipta toy ny voronkely izy
  - type: text
    content: ary avy any amin’ny tany Asiria toy ny voromailala;
  - type: text
    content: dia hampitoeriko ao an-tranony izy,
  - type: text
    content: hoy NY TOMPO.
  '2':
  - type: text
    content: Nony nisy niantso azy dia vao mainka izy nandositra ireny;
  - type: text
    content: 'ho an’ireo '
  - type: text
    content: Baala
  - type: text
    content: ' no namonoany zavatra hatao fanatitra'
  - type: text
    content: ary ho an’ny sarin-javatra voasokitra no nandoroany ditin-kazo manitra.
  '3':
  - type: text
    content: Izaho no nampianatra an’i Efraima handeha;
  - type: text
    content: eny, noraisiko tamin’ny tanany aza izy,
  - type: text
    content: nefa odiany tsy fantatra fa Izaho no nikarakara azy.
  '4':
  - type: text
    content: Tamin’ny tady fitarihana olona no nitarihako azy,
  - type: text
    content: dia tamin’ny mahazakan’ny fitiavana.
  - type: text
    content: Toy izay manainga ny zioga eo ambonin’ny valanoranony Aho
  - type: text
    content: ka nanolo-kanina azy tsimoramora.
  '5':
  - type: text
    content: Tsy hiverina ho any amin’ny tany Ejipta izy,
  - type: text
    content: fa i Asiria no ho mpanjakany,
  - type: text
    content: satria tsy nety nibebaka izy.
  '6':
  - type: text
    content: Hisy sabatra hihodinkodina ao an-tanànany
  - type: text
    content: ka handrava ny manodidina
  - type: text
    content: ary handevona azy
  - type: text
    content: noho ny fikasana nananany.
  - type: heading
    content: Ny fitiavan’Andriamanitra no handresy
  '7':
  - type: text
    content: Minia mikomy Amiko ny oloko;
  - type: text
    content: ary na dia antsoina ho amin’ny Avo aza izy
  - type: text
    content: dia tsy misy mety mitsangana akory.
  '8':
  - type: text
    content: Hataoko ahoana re no fahafoy anao, ry Efraima?
  - type: text
    content: Na ho fanolotra anao, ry Israely?
  - type: text
    content: Hataoko ahoana re no fitondra anao ho tahaka an’i Adma?
  - type: text
    content: Hataoko tahaka an’i Zeboima va ianao?
  - type: text
    content: Onena ny foko,
  - type: text
    content: mafy loatra ny alaheloko.
  '9':
  - type: text
    content: Tsy hampirehitra ny hatezerako Aho
  - type: text
    content: na handringana an’i Efraima intsony
  - type: text
    content: satria tsy olona Aho
  - type: text
    content: fa Andriamanitra,
  - type: text
    content: dia ny Iray Masina ao aminao,
  - type: text
    content: ka tsy ho avy amin’ny fahatezerana mirehitra Aho.
