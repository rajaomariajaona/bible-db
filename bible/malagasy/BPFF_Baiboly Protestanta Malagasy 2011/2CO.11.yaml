document_id: 2CO.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paoly apostoly, ilay apostoly tena izy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Enga anie ka mba handefitra amiko amin’ny hadalana kely ianareo, eny mandefera amiko ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa fahasaro-piaro araka an’Andriamanitra no mahasaro-piaro ahy aminareo; fa nataoko fofombadin’ny lehilahy iray ianareo, mba hatolotro tahaka ny virijiny madio ho an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa matahotra aho, fandrao ho simba hiala amin’ny fahatsoram-po sy ny fahadiovana amin’i Kristy ny sainareo, tahaka ny namitahan’ny menarana an’i Eva tamin’ny hafetseny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa raha misy olona tonga ka mitory Jesosy hafa izay tsy notorinay, na mandray fanahy hafa na Filazantsara hafa noho izay noraisinareo, dia mandefitra amin’izany ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ataoko fa tsy misy mahalatsa-danja ahy noho ireo Apostoly malaza ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa na dia olona tsy nampianarina handaha-teny aza aho dia tsy mba tahaka izany aho amin’ny fahalalana; fa tamin’ny zavatra rehetra dia efa nasehonay marimarina tamin’ny olona rehetra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Diso va aho raha nanetry tena mba hisandratanareo ka nitory maimaimpoana ny Filazantsaran’Andriamanitra taminareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Namabo ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' sasany aho ka nandray karama hanompoako anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa raha teo aminareo aho ka azon’ny tsy fahampiana dia tsy mba nahavaky tratra olona aho; fa ny rahalahy izay tonga avy tany Makedonia no nanome ahy izay nilaiko; ary tamin’ny zavatra rehetra dia nitandrina tsara izay tsy hahavaky tratra anareo aho sady mbola hitandrina izany ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha ato anatiko koa ny fahamarinan’i Kristy dia tsy hisy hahafoana izany reharehako izany any amin’ny tany Akaia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nahoana? Satria tsy tiako va ianareo? Andriamanitra no mahalala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izay ataoko no mbola hataoko ihany mba tsy hahafahan’ireo mitady antony hitovizany aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa apostoly sandoka izy ireny, mpiasa mamitaka, ka mampiova ny endriny ho tahaka ny apostolin’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tsy mahagaga izany, fa i Satana aza dia mampiova ny endriny ho tahaka ny anjelin’ny mazava. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa tsy dia zava-dehibe ho an’ny mpanompony ny mampiova ny endriny ho tahaka ny mpanompon’ny fahamarinana. Nefa ny fiafaran’izy ireo dia ho araka ny asany ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo fijaliana niaretan’ny Apostoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Averiko indray: Aza misy milaza ahy ho adala; nefa, na dia misy milaza izany aza, raiso toy ny adala aho mba hireharehako kely koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izao lazaiko izao dia tsy lazaiko araka ny Tompo fa toa amin’ny fahadalana amin’izao fireharehana feno fahatokiana izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa satria maro no mirehareha araka ny nofo dia mba hirehareha koa aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa sitrakareo ny mandefitra amin’ny adala satria hendry angaha ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hay! Mandefitra ihany ianareo raha misy manandevo anareo, raha misy mandany ny fanananareo, raha misy misambotra anareo, raha misy manao fihetsika mihantsy anareo, raha misy mamely ny tavanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Manala baraka tena aho ka toa manaiky fa nalemy izahay!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa amin’izay mahasahy ny olona dia mba sahy koa aho; eny, miteny toy ny adala aho amin’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hebreo va izy? Izaho koa. Israelita va izy? Izaho koa. Taranak’i Abrahama va izy? Izaho koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mpanompon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' va izy? Miteny toy ny olona very saina aho, izaho koa dia mpanompon’i Kristy mihoatra noho izy ireo: Amin’ny fisasarana, manan-tombo; amin’ny tranomaizina, matetika kokoa; amin’ny kapoka be, efa izay tsy izy; misedra ny fahafatesana matetika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Indimy aho no nokapohin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ', inefapolo latsaka iray avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Intelo nokapohina tamin’ny hazo aho, indray maka notoraham-bato, intelo no vaky sambo, indray andro sy indray alina no nitoetra tao amin’ny lalina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'nandeha matetika aho, saika nahita loza tamin’ny ony, saika nahita loza tamin’ny jiolahy, saika nahita loza tamin’ny tompon-tany namako, saika nahita loza tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ', saika nahita loza tao amin’ny tanàna, saika nahita loza tany an-tany efitra, saika nahita loza tany amin’ny ranomasina, saika nahita loza tamin’ny rahalahy sandoka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'tamin’ny fisasarana sy ny fikelezana aina, tamin’ny tsy fahitan-tory matetika, tamin’ny hanoanana sy ny hetaheta, tamin’ny fifadian-kanina matetika, tamin’ny hatsiaka sy ny fitanjahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Afa-tsy ireo zavatra ivelany dia mbola misy koa izay mahazo ahy isanandro, dia ny fiahiana ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Iza no malemy ka tsy malemy aho? Iza no mahazo fanafintohinana ka tsy mirehitra anaty aho?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Raha tsy maintsy mirehareha aho dia izay momba ny fahalemeko no hataoko rehareha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Andriamanitra, Rain’i Jesosy Tompo, izay isaorana mandrakizay, mahalala fa tsy mandainga aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tany Damaskosy ny governora notendren’i Areta mpanjaka dia nampiambina ny tanàna Damaskosy mba hisambotra ahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: fa avy teo amin’ny varavarankely eo amin’ny manda no nampidinana ahy tamin’ny sobika ka afa-nandositra ny tanany aho.
