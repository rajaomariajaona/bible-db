document_id: 2CO.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Paoly apostoly, ilay apostoly tena izy
  - type: text
    content: 'Enga anie ka mba handefitra amiko amin’ny hadalana kely ianareo, eny mandefera amiko ianareo! '
  '10':
  - type: text
    content: 'Raha ato anatiko koa ny fahamarinan’i Kristy dia tsy hisy hahafoana izany reharehako izany any amin’ny tany Akaia. '
  '11':
  - type: text
    content: Nahoana? Satria tsy tiako va ianareo? Andriamanitra no mahalala.
  '12':
  - type: text
    content: 'Fa izay ataoko no mbola hataoko ihany mba tsy hahafahan’ireo mitady antony hitovizany aminay. '
  '13':
  - type: text
    content: 'Fa apostoly sandoka izy ireny, mpiasa mamitaka, ka mampiova ny endriny ho tahaka ny apostolin’i Kristy. '
  '14':
  - type: text
    content: 'Ary tsy mahagaga izany, fa i Satana aza dia mampiova ny endriny ho tahaka ny anjelin’ny mazava. '
  '15':
  - type: text
    content: Koa tsy dia zava-dehibe ho an’ny mpanompony ny mampiova ny endriny ho tahaka ny mpanompon’ny fahamarinana. Nefa ny fiafaran’izy ireo dia ho araka ny asany ihany.
  - type: heading
    content: Ireo fijaliana niaretan’ny Apostoly
  '16':
  - type: text
    content: 'Averiko indray: Aza misy milaza ahy ho adala; nefa, na dia misy milaza izany aza, raiso toy ny adala aho mba hireharehako kely koa. '
  '17':
  - type: text
    content: 'Izao lazaiko izao dia tsy lazaiko araka ny Tompo fa toa amin’ny fahadalana amin’izao fireharehana feno fahatokiana izao. '
  '18':
  - type: text
    content: 'Koa satria maro no mirehareha araka ny nofo dia mba hirehareha koa aho. '
  '19':
  - type: text
    content: 'Fa sitrakareo ny mandefitra amin’ny adala satria hendry angaha ianareo! '
  '2':
  - type: text
    content: 'Fa fahasaro-piaro araka an’Andriamanitra no mahasaro-piaro ahy aminareo; fa nataoko fofombadin’ny lehilahy iray ianareo, mba hatolotro tahaka ny virijiny madio ho an’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Fa hay! Mandefitra ihany ianareo raha misy manandevo anareo, raha misy mandany ny fanananareo, raha misy misambotra anareo, raha misy manao fihetsika mihantsy anareo, raha misy mamely ny tavanareo. '
  '21':
  - type: text
    content: Manala baraka tena aho ka toa manaiky fa nalemy izahay!
  - type: text
    content: 'Fa amin’izay mahasahy ny olona dia mba sahy koa aho; eny, miteny toy ny adala aho amin’izany. '
  '22':
  - type: text
    content: 'Hebreo va izy? Izaho koa. Israelita va izy? Izaho koa. Taranak’i Abrahama va izy? Izaho koa. '
  '23':
  - type: text
    content: 'Mpanompon’i '
  - type: text
    content: Kristy
  - type: text
    content: ' va izy? Miteny toy ny olona very saina aho, izaho koa dia mpanompon’i Kristy mihoatra noho izy ireo: Amin’ny fisasarana, manan-tombo; amin’ny tranomaizina, matetika kokoa; amin’ny kapoka be, efa izay tsy izy; misedra ny fahafatesana matetika. '
  '24':
  - type: text
    content: 'Indimy aho no nokapohin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ', inefapolo latsaka iray avy. '
  '25':
  - type: text
    content: 'Intelo nokapohina tamin’ny hazo aho, indray maka notoraham-bato, intelo no vaky sambo, indray andro sy indray alina no nitoetra tao amin’ny lalina, '
  '26':
  - type: text
    content: 'nandeha matetika aho, saika nahita loza tamin’ny ony, saika nahita loza tamin’ny jiolahy, saika nahita loza tamin’ny tompon-tany namako, saika nahita loza tamin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ', saika nahita loza tao amin’ny tanàna, saika nahita loza tany an-tany efitra, saika nahita loza tany amin’ny ranomasina, saika nahita loza tamin’ny rahalahy sandoka, '
  '27':
  - type: text
    content: 'tamin’ny fisasarana sy ny fikelezana aina, tamin’ny tsy fahitan-tory matetika, tamin’ny hanoanana sy ny hetaheta, tamin’ny fifadian-kanina matetika, tamin’ny hatsiaka sy ny fitanjahana. '
  '28':
  - type: text
    content: Afa-tsy ireo zavatra ivelany dia mbola misy koa izay mahazo ahy isanandro, dia ny fiahiana ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' rehetra. '
  '29':
  - type: text
    content: Iza no malemy ka tsy malemy aho? Iza no mahazo fanafintohinana ka tsy mirehitra anaty aho?
  '3':
  - type: text
    content: 'Fa matahotra aho, fandrao ho simba hiala amin’ny fahatsoram-po sy ny fahadiovana amin’i Kristy ny sainareo, tahaka ny namitahan’ny menarana an’i Eva tamin’ny hafetseny. '
  '30':
  - type: text
    content: 'Raha tsy maintsy mirehareha aho dia izay momba ny fahalemeko no hataoko rehareha. '
  '31':
  - type: text
    content: 'Andriamanitra, Rain’i Jesosy Tompo, izay isaorana mandrakizay, mahalala fa tsy mandainga aho. '
  '32':
  - type: text
    content: 'Tany Damaskosy ny governora notendren’i Areta mpanjaka dia nampiambina ny tanàna Damaskosy mba hisambotra ahy; '
  '33':
  - type: text
    content: fa avy teo amin’ny varavarankely eo amin’ny manda no nampidinana ahy tamin’ny sobika ka afa-nandositra ny tanany aho.
  '4':
  - type: text
    content: Fa raha misy olona tonga ka mitory Jesosy hafa izay tsy notorinay, na mandray fanahy hafa na Filazantsara hafa noho izay noraisinareo, dia mandefitra amin’izany ianareo.
  '5':
  - type: text
    content: 'Fa ataoko fa tsy misy mahalatsa-danja ahy noho ireo Apostoly malaza ireo. '
  '6':
  - type: text
    content: Fa na dia olona tsy nampianarina handaha-teny aza aho dia tsy mba tahaka izany aho amin’ny fahalalana; fa tamin’ny zavatra rehetra dia efa nasehonay marimarina tamin’ny olona rehetra izany.
  '7':
  - type: text
    content: 'Diso va aho raha nanetry tena mba hisandratanareo ka nitory maimaimpoana ny Filazantsaran’Andriamanitra taminareo? '
  '8':
  - type: text
    content: Namabo ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' sasany aho ka nandray karama hanompoako anareo. '
  '9':
  - type: text
    content: 'Fa raha teo aminareo aho ka azon’ny tsy fahampiana dia tsy mba nahavaky tratra olona aho; fa ny rahalahy izay tonga avy tany Makedonia no nanome ahy izay nilaiko; ary tamin’ny zavatra rehetra dia nitandrina tsara izay tsy hahavaky tratra anareo aho sady mbola hitandrina izany ihany. '
