document_id: ISA.19,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny loza hanjo an’i Ejipta
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny amin’ny loza hanjo an’i Ejipta:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro NY TOMPO mitaingina rahona miriotra mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tonga any Ejipta.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangorohoro eo anatrehany ny andriamanitra tsy izy any Ejipta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ketraka ny fon’i Ejipta.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ho torotoro ny andrin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary halahelo ny mpikarama rehetra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tena adala mihitsy ny mpanapaka any Zoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hevi-poana no avoakan’ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hendry indrindra amin’ny mpanolotsainan’i Farao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ahoana no ilazanareo amin’i Farao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zanak’olon-kendry aho sady taranak’ireo mpanjaka tamin’ny fahagola?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Aiza ary ireo olon-kendrinao ireo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hanambara aminao izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ho fantany izay nokasain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatao amin’i Ejipta!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Adala ny mpanapaka any Zoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voafitaka ny mpanapaka any Nofa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampivembena an’i Ejipta ireo fehizoron’ny fireneny;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: NY TOMPO efa nandrotsaka fanahy mampandraingiraingy tao Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampivembena azy tamin’ny asany rehetra nataony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny olona mamo mivembena sady mandoa.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tsy misy manao na inona na inona intsony ny Ejiptiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny loha na ny rambo, na ny palma na ny zozoro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ho avin’i Ejipta
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Amin’izany andro izany dia ho tahaka ny vehivavy i Ejipta ka ho toran-kovitra sy ho raiki-tahotra noho ny fanaingan’Andriamanitra, Tompon’izao rehetra izao, ny tanany, izay aingainy hamelezany azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary ho tahotr’i Ejipta ny tanin’i Joda, koa na oviana na oviana no misy miresaka izany aminy dia ho raiki-tahotra izy noho ny fikasan’Andriamanitra, Tompon’izao rehetra izao, hamelezana azy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Amin’izany andro izany dia hisy tanàna dimy amin’ny tany Ejipta samy hiteny ny fitenin’i Kanana sy hianiana fa ho an’Andriamanitra, Tompon’izao rehetra izao; ny iray amin’ireny dia hatao hoe Ira-Haresa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ira-Haresa: Tanàna haringana.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Amin’izany andro izany dia hisy alitara ho an’NY TOMPO eo amin’ny tany Ejipta ary tsangambato ho Azy eo amin’ny sisintaniny. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hampirisihiko hiady izy samy Ejiptiana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy hiady amin’ny rahalahiny sy amin’ny namany avy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanàna dia hiady amin’ny tanàna ary ny fanjakana dia hiady amin’ny fanjakana.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ho famantarana sy vavolombelona ho an’Andriamanitra, Tompon’izao rehetra izao ao amin’ny tany Ejipta ireo; raha mitaraina amin’NY TOMPO noho ny mpampahory izy dia haniraka mpamonjy sy mpiaro ho ao aminy Izy ka hamonjy azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Hanao izay hahafantaran’ny Ejiptiana Azy NY TOMPO, ary hahalala NY TOMPO kosa ny Ejiptiana amin’izany andro izany; dia hanompo Azy amin’ny fanatitra alatsa-dra sy amin’ny fanatitra avy amin’ny zavamaniry izy ka hivoady amin’NY TOMPO sady hanefa ny voadiny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Eny, raha mamely ny Ejiptiana NY TOMPO dia sady hamely Izy no hanasitrana; dia hiverina ho any amin’NY TOMPO ireo ka hekeny ny fangatahany ary hositraniny izy.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Amin’izany andro izany dia hisy lalambe avy any Ejipta mankany Asiria, koa ny Asiriana dia hankany Ejipta, ary ny Ejiptiana kosa dia hankany Asiria, ary hiara-manompo ny Ejiptiana sy ny Asiriana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Amin’izany andro izany dia ho fahatelo aorianan’i Ejipta sy Asiria ny Israely, ho fitahiana eo amin’ny tany; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'satria hotahin’Andriamanitra, Tompon’izao rehetra izao, ireo ka hataony hoe: Hotahina anie Ejipta oloko, sy Asiria asan’ny tanako, ary Israely lovako!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ho very hevitra ny Ejiptiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hofoanako ny fikasany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hila saina amin’ny andriamanitra tsy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny mpiantso ny fanahin’ny maty ary amin’ny mpanandro izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hatolotro hogiazana amin’izay fitondrana mafy i Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mpanjaka masiaka no hanjaka aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ho tankina ny rano amin’ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho ritra ny ony ka ho maina;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ho maimbo ny sampantsampan’ny ony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hihena ny lakandranon’i Ejipta ka ho maina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: halazo ny volotara sy ny zozoro;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ho ngazana ny moron’i Neily sy ny vavaranon’i Neily,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho maina izay nafafy teny amoron’i Neily
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho eny intsony fa hopaohin’ny rivotra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia hitoloko ny mpaka hazandrano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisaona ny mpamintana rehetra ao Neily;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho reraka ny mpamelatra harato amin’ny rano.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ho menatra izay mandraotra tahon-drongony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny mpandraotra sy ny mpanenona lamba fotsy.
