document_id: ISA.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo an’i Ejipta
  - type: text
    content: 'Ny amin’ny loza hanjo an’i Ejipta:'
  - type: text
    content: Indro NY TOMPO mitaingina rahona miriotra mafy
  - type: text
    content: ka tonga any Ejipta.
  - type: text
    content: Mangorohoro eo anatrehany ny andriamanitra tsy izy any Ejipta,
  - type: text
    content: ary ketraka ny fon’i Ejipta.
  '10':
  - type: text
    content: Ho torotoro ny andrin’ny tany
  - type: text
    content: ary halahelo ny mpikarama rehetra.
  '11':
  - type: text
    content: Tena adala mihitsy ny mpanapaka any Zoana;
  - type: text
    content: hevi-poana no avoakan’ireo
  - type: text
    content: izay hendry indrindra amin’ny mpanolotsainan’i Farao.
  - type: text
    content: 'Ahoana no ilazanareo amin’i Farao hoe:'
  - type: text
    content: Zanak’olon-kendry aho sady taranak’ireo mpanjaka tamin’ny fahagola?
  '12':
  - type: text
    content: Aiza ary ireo olon-kendrinao ireo?
  - type: text
    content: Aoka hanambara aminao izy
  - type: text
    content: ary aoka ho fantany izay nokasain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: text
    content: hatao amin’i Ejipta!
  '13':
  - type: text
    content: Adala ny mpanapaka any Zoana,
  - type: text
    content: voafitaka ny mpanapaka any Nofa,
  - type: text
    content: ary nampivembena an’i Ejipta ireo fehizoron’ny fireneny;
  '14':
  - type: text
    content: NY TOMPO efa nandrotsaka fanahy mampandraingiraingy tao Ejipta
  - type: text
    content: ka nampivembena azy tamin’ny asany rehetra nataony,
  - type: text
    content: tahaka ny olona mamo mivembena sady mandoa.
  '15':
  - type: text
    content: Tsy misy manao na inona na inona intsony ny Ejiptiana,
  - type: text
    content: na ny loha na ny rambo, na ny palma na ny zozoro.
  - type: heading
    content: Ny ho avin’i Ejipta
  '16':
  - type: text
    content: 'Amin’izany andro izany dia ho tahaka ny vehivavy i Ejipta ka ho toran-kovitra sy ho raiki-tahotra noho ny fanaingan’Andriamanitra, Tompon’izao rehetra izao, ny tanany, izay aingainy hamelezany azy. '
  '17':
  - type: text
    content: Ary ho tahotr’i Ejipta ny tanin’i Joda, koa na oviana na oviana no misy miresaka izany aminy dia ho raiki-tahotra izy noho ny fikasan’Andriamanitra, Tompon’izao rehetra izao, hamelezana azy.
  '18':
  - type: text
    content: Amin’izany andro izany dia hisy tanàna dimy amin’ny tany Ejipta samy hiteny ny fitenin’i Kanana sy hianiana fa ho an’Andriamanitra, Tompon’izao rehetra izao; ny iray amin’ireny dia hatao hoe Ira-Haresa
  - type: note
    content: 'Ira-Haresa: Tanàna haringana.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Amin’izany andro izany dia hisy alitara ho an’NY TOMPO eo amin’ny tany Ejipta ary tsangambato ho Azy eo amin’ny sisintaniny. '
  '2':
  - type: text
    content: 'Hampirisihiko hiady izy samy Ejiptiana:'
  - type: text
    content: Samy hiady amin’ny rahalahiny sy amin’ny namany avy izy;
  - type: text
    content: ny tanàna dia hiady amin’ny tanàna ary ny fanjakana dia hiady amin’ny fanjakana.
  '20':
  - type: text
    content: 'Ho famantarana sy vavolombelona ho an’Andriamanitra, Tompon’izao rehetra izao ao amin’ny tany Ejipta ireo; raha mitaraina amin’NY TOMPO noho ny mpampahory izy dia haniraka mpamonjy sy mpiaro ho ao aminy Izy ka hamonjy azy. '
  '21':
  - type: text
    content: 'Hanao izay hahafantaran’ny Ejiptiana Azy NY TOMPO, ary hahalala NY TOMPO kosa ny Ejiptiana amin’izany andro izany; dia hanompo Azy amin’ny fanatitra alatsa-dra sy amin’ny fanatitra avy amin’ny zavamaniry izy ka hivoady amin’NY TOMPO sady hanefa ny voadiny. '
  '22':
  - type: text
    content: Eny, raha mamely ny Ejiptiana NY TOMPO dia sady hamely Izy no hanasitrana; dia hiverina ho any amin’NY TOMPO ireo ka hekeny ny fangatahany ary hositraniny izy.
  '23':
  - type: text
    content: 'Amin’izany andro izany dia hisy lalambe avy any Ejipta mankany Asiria, koa ny Asiriana dia hankany Ejipta, ary ny Ejiptiana kosa dia hankany Asiria, ary hiara-manompo ny Ejiptiana sy ny Asiriana. '
  '24':
  - type: text
    content: 'Amin’izany andro izany dia ho fahatelo aorianan’i Ejipta sy Asiria ny Israely, ho fitahiana eo amin’ny tany; '
  '25':
  - type: text
    content: 'satria hotahin’Andriamanitra, Tompon’izao rehetra izao, ireo ka hataony hoe: Hotahina anie Ejipta oloko, sy Asiria asan’ny tanako, ary Israely lovako!'
  '3':
  - type: text
    content: Ho very hevitra ny Ejiptiana;
  - type: text
    content: eny, hofoanako ny fikasany;
  - type: text
    content: hila saina amin’ny andriamanitra tsy izy
  - type: text
    content: sy amin’ny mpiantso ny fanahin’ny maty ary amin’ny mpanandro izy.
  '4':
  - type: text
    content: Hatolotro hogiazana amin’izay fitondrana mafy i Ejipta
  - type: text
    content: ary mpanjaka masiaka no hanjaka aminy,
  - type: text
    content: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao.
  '5':
  - type: text
    content: Ho tankina ny rano amin’ny ranomasina,
  - type: text
    content: ho ritra ny ony ka ho maina;
  '6':
  - type: text
    content: ho maimbo ny sampantsampan’ny ony;
  - type: text
    content: hihena ny lakandranon’i Ejipta ka ho maina;
  - type: text
    content: halazo ny volotara sy ny zozoro;
  '7':
  - type: text
    content: ho ngazana ny moron’i Neily sy ny vavaranon’i Neily,
  - type: text
    content: ho maina izay nafafy teny amoron’i Neily
  - type: text
    content: ka tsy ho eny intsony fa hopaohin’ny rivotra.
  '8':
  - type: text
    content: Dia hitoloko ny mpaka hazandrano
  - type: text
    content: ary hisaona ny mpamintana rehetra ao Neily;
  - type: text
    content: ho reraka ny mpamelatra harato amin’ny rano.
  '9':
  - type: text
    content: Ho menatra izay mandraotra tahon-drongony,
  - type: text
    content: dia ny mpandraotra sy ny mpanenona lamba fotsy.
