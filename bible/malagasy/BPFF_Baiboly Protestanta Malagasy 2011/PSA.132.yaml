document_id: PSA.132
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ziona, fonenan’NY TOMPO sy tanànan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Hira fanao amin’ny fiakarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, tsarovy i Davida
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny zavatra rehetra nanjo azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: tamin’ilay nianianany tamin’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy nanaovany voady tamin’ny Maherin’i Jakoba hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy mba hiditra ao an-daiko aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hiakatra amin’ny farafara fandriako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: tsy mba havelako hatory ny masoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ho rendrehana ny hodimasoko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: mandra-pahitako fitoerana ho an’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fonenana ho an’ny Maherin’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Indro, nandre azy tany Efrata isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahita azy tany an-tsahan’i Jara isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka hiditra any amin’ny fonenany isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiankohoka eo amin’ny fitoeran-tongony.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 6.41-42
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitsangàna, TOMPO ô, ho amin’ny fitsaharanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia Ianao sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vata misy ny Fanekena
  - type: text
    text: ' misy ny herinao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka ny mpisoronao hitafy fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny olonao masina hihoby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Noho ny amin’i Davida mpanomponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aza mampiala maina ny tavan’ny voahosotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Efa nianiana marina tamin’i Davida NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka tsy hitsoahany izany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ateraky ny kibonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hapetrako eo ambonin’ny sezafiandriananao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha tandreman’ny zanakao ny fanekeko sy ny teny vavolombeloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hampianariko azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny zanany kosa no handimby tsy tapaka anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo ambonin’ny sezafiandriananao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa NY TOMPO efa nifidy an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary naniry azy ho fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ity, hoy Izy, no fitsaharako mandrakizay doria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto no honenako fa efa niriko ity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hotahiko tokoa ny fihinana ao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hovokisako hanina ny mahantra ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny mpisorona ao dia hampitafiako famonjena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihoby tokoa ny olo-masina ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ao no hampitsimohako '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandroka
  - type: text
    text: ' ho an’i Davida'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanamboarako jiro ho an’ny voahosotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hampitafiako henatra ny fahavalony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa eo aminy kosa no hamirapiratra ny satroboninahiny.
