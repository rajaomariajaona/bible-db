document_id: PSA.132,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ziona, fonenan’NY TOMPO sy tanànan’i Davida
  - type: text
    content: Hira fanao amin’ny fiakarana.
  - type: text
    content: TOMPO ô, tsarovy i Davida
  - type: text
    content: noho ny zavatra rehetra nanjo azy,
  '10':
  - type: text
    content: Noho ny amin’i Davida mpanomponao
  - type: text
    content: dia aza mampiala maina ny tavan’ny voahosotrao.
  '11':
  - type: text
    content: Efa nianiana marina tamin’i Davida NY TOMPO
  - type: text
    content: 'ka tsy hitsoahany izany:'
  - type: text
    content: Ny ateraky ny kibonao
  - type: text
    content: no hapetrako eo ambonin’ny sezafiandriananao.
  '12':
  - type: text
    content: Raha tandreman’ny zanakao ny fanekeko sy ny teny vavolombeloko
  - type: text
    content: izay hampianariko azy,
  - type: text
    content: dia ny zanany kosa no handimby tsy tapaka anao
  - type: text
    content: eo ambonin’ny sezafiandriananao.
  '13':
  - type: text
    content: 'Fa NY TOMPO efa nifidy an’i '
  - type: text
    content: Ziona
  - type: text
    content: ary naniry azy ho fonenany.
  '14':
  - type: text
    content: Ity, hoy Izy, no fitsaharako mandrakizay doria;
  - type: text
    content: eto no honenako fa efa niriko ity.
  '15':
  - type: text
    content: Hotahiko tokoa ny fihinana ao;
  - type: text
    content: hovokisako hanina ny mahantra ao.
  '16':
  - type: text
    content: Ny mpisorona ao dia hampitafiako famonjena
  - type: text
    content: ary hihoby tokoa ny olo-masina ao.
  '17':
  - type: text
    content: 'Ao no hampitsimohako '
  - type: text
    content: tandroka
  - type: text
    content: ' ho an’i Davida'
  - type: text
    content: sy hanamboarako jiro ho an’ny voahosotro.
  '18':
  - type: text
    content: Hampitafiako henatra ny fahavalony;
  - type: text
    content: fa eo aminy kosa no hamirapiratra ny satroboninahiny.
  '2':
  - type: text
    content: tamin’ilay nianianany tamin’NY TOMPO
  - type: text
    content: 'sy nanaovany voady tamin’ny Maherin’i Jakoba hoe:'
  '3':
  - type: text
    content: Tsy mba hiditra ao an-daiko aho
  - type: text
    content: na hiakatra amin’ny farafara fandriako,
  '4':
  - type: text
    content: tsy mba havelako hatory ny masoko,
  - type: text
    content: na ho rendrehana ny hodimasoko,
  '5':
  - type: text
    content: mandra-pahitako fitoerana ho an’NY TOMPO,
  - type: text
    content: dia fonenana ho an’ny Maherin’i Jakoba.
  '6':
  - type: text
    content: Indro, nandre azy tany Efrata isika;
  - type: text
    content: nahita azy tany an-tsahan’i Jara isika.
  '7':
  - type: text
    content: Aoka hiditra any amin’ny fonenany isika
  - type: text
    content: ka hiankohoka eo amin’ny fitoeran-tongony.
  - type: heading
    content: 2Tan 6.41-42
  '8':
  - type: text
    content: Mitsangàna, TOMPO ô, ho amin’ny fitsaharanao,
  - type: text
    content: 'dia Ianao sy ny '
  - type: text
    content: vata misy ny Fanekena
  - type: text
    content: ' misy ny herinao.'
  '9':
  - type: text
    content: Aoka ny mpisoronao hitafy fahamarinana
  - type: text
    content: ary aoka ny olonao masina hihoby.
