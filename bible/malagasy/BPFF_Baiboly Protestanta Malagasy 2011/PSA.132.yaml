document_id: PSA.132,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ziona, fonenan’NY TOMPO sy tanànan’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Hira fanao amin’ny fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, tsarovy i Davida
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny zavatra rehetra nanjo azy,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny amin’i Davida mpanomponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aza mampiala maina ny tavan’ny voahosotrao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nianiana marina tamin’i Davida NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka tsy hitsoahany izany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ateraky ny kibonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hapetrako eo ambonin’ny sezafiandriananao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tandreman’ny zanakao ny fanekeko sy ny teny vavolombeloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hampianariko azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny zanany kosa no handimby tsy tapaka anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo ambonin’ny sezafiandriananao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa NY TOMPO efa nifidy an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary naniry azy ho fonenany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ity, hoy Izy, no fitsaharako mandrakizay doria;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eto no honenako fa efa niriko ity.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotahiko tokoa ny fihinana ao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hovokisako hanina ny mahantra ao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpisorona ao dia hampitafiako famonjena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hihoby tokoa ny olo-masina ao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ao no hampitsimohako '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroka
    - type: text
      text: ' ho an’i Davida'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanamboarako jiro ho an’ny voahosotro.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampitafiako henatra ny fahavalony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa eo aminy kosa no hamirapiratra ny satroboninahiny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ilay nianianany tamin’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy nanaovany voady tamin’ny Maherin’i Jakoba hoe:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba hiditra ao an-daiko aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hiakatra amin’ny farafara fandriako,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba havelako hatory ny masoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho rendrehana ny hodimasoko,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pahitako fitoerana ho an’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fonenana ho an’ny Maherin’i Jakoba.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, nandre azy tany Efrata isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nahita azy tany an-tsahan’i Jara isika.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiditra any amin’ny fonenany isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiankohoka eo amin’ny fitoeran-tongony.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 6.41-42
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, TOMPO ô, ho amin’ny fitsaharanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia Ianao sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vata misy ny Fanekena
    - type: text
      text: ' misy ny herinao.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny mpisoronao hitafy fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny olonao masina hihoby.
