document_id: DEU.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo tanàna fialofana
  - type: text
    content: 'Rehefa aringan’NY TOMPO Andriamanitrao ny firenena samihafa izay tompon’ny tany omen’NY TOMPO Andriamanitrao anao, ary mandresy azy ianao ka monina ao an-tanànany sy ao an-tranony, '
  '10':
  - type: text
    content: mba tsy hisy ran’ny tsy manan-tsiny halatsaka eo amin’ny taninao izay omen’NY TOMPO Andriamanitrao anao ho lovanao ka tsy ho meloka amin’ny ra ianao.
  '11':
  - type: text
    content: 'Fa raha misy olona mankahala ny namany ka manao vela-pandrika aminy, ary mitsangana hamely mahafaty azy, nefa mandositra ho ao amin’ny iray amin’ireo tanàna ireo, '
  '12':
  - type: text
    content: 'dia haniraka haka azy ao ny loholona amin’ny tanànany ka hanolotra azy eo an-tanan’ny mpamaly ra, mba hovonoina ho faty izy. '
  '13':
  - type: text
    content: Tsy hiantra azy ny masonao; fa hesorinao tsy ho eo amin’ny Israely ny heloka amin’ny ran’ny tsy manan-tsiny mba hahita soa ianao.
  - type: heading
    content: Ny faritry ny tany
  '14':
  - type: text
    content: Aza manakisaka ny faritry ny tanin’ny namanao, izay efa vitan’ny razana teo amin’ny zarataninao, izay azonao eo amin’ny tany izay omen’NY TOMPO Andriamanitrao holovanao ianao.
  - type: heading
    content: Ny vavolombelona
  '15':
  - type: text
    content: Raha vavolombelona iray monja dia aoka tsy hitsangana hiampanga olona amin’izay heloka na ota nataony na inona na inona; fa amin’ny tenin’ny vavolombelona roa na telo no hanorenana mafy ny teny.
  '16':
  - type: text
    content: 'Raha misy vavolombelona mampidi-doza mitsangana hiampanga olona ho nanao izay ratsy '
  '17':
  - type: text
    content: 'dia hitsangana eo anatrehan’NY TOMPO izy roa lahy izay miady, dia eo anatrehan’ny mpisorona sy ny mpitsara amin’io andro io; '
  '18':
  - type: text
    content: 'ary raha hadinin’ny mpitsara mafy izy ireo ka hitany fa vavolombelona mandainga ilay miampanga ny namany '
  '19':
  - type: text
    content: 'dia araka izay nokasainy hatao amin’ny namany no hataonareo aminy; fa hofongoranao tsy ho eo aminao ny fanao ratsy. '
  '2':
  - type: text
    content: 'dia manokàna tanàna telo eo afovoan’ny taninao, izay omen’NY TOMPO Andriamanitrao anao holovana. '
  '20':
  - type: text
    content: 'Ary ny olona sisa dia handre izany ka hatahotra ary tsy hanao tahaka ireny ratsy ireny eo aminao intsony. '
  '21':
  - type: text
    content: Fa tsy hiantra azy ny masonao; ary aina no hataonao solon’ny aina, maso solon’ny maso, nify solon’ny nify, tanana solon’ny tanana, tongotra solon’ny tongotra.
  '3':
  - type: text
    content: 'Manamboara lalana ka zarao ho telo toko ny taninao izay omen’NY TOMPO Andriamanitrao holovanao, fa ao no handosiran’izay rehetra mahafaty olona. '
  '4':
  - type: text
    content: 'Ny nahafaty olona izay hovelomina, raha mandositra ao, dia izay nahafaty tsy nahy ny namany ka tsy nankahala azy teo aloha; '
  '5':
  - type: text
    content: 'raha misy olona miaraka amin’ny namany ho any an’ala hanapaka hazo ka manainga ny famaky hikapa hazo ny tanany, ary mitsoaka amin’ny zarany ny lelam-pamaky ka mahavoa ny namany ary mahafaty azy, dia aoka handositra ao amin’ny iray amin’ireo tanàna ireo izy ka hovelomina; '
  '6':
  - type: text
    content: 'fandrao hanenjika ilay nahafaty olona ny mpamaly ra, raha mbola mirehitra ny fony ka hahatratra azy, noho ny halavitry ny alehany, dia hahafaty azy izy; nefa tsy tokony ho faty izy satria tsy nankahala ny namany talohan’ny nahafatesany azy. '
  '7':
  - type: text
    content: 'Koa izany no andidiako anao hoe: Manokàna tanàna telo. '
  '8':
  - type: text
    content: 'Ary raha hitarin’NY TOMPO Andriamanitrao ny faritry ny taninao, araka izay nianianany tamin’ny razanao ka homeny anao ny tany rehetra izay nampanantenainy homena ny razanao, '
  '9':
  - type: text
    content: 'raha mitandrina hanaraka izao lalàna rehetra andidiako anao anio izao ianao sady ho tia NY TOMPO Andriamanitrao, no handeha mandrakariva amin’ny lalany, dia hampianao tanàna telo koa ireny telo ireny; '
