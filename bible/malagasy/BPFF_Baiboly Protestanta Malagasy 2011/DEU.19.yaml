document_id: DEU.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo tanàna fialofana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa aringan’NY TOMPO Andriamanitrao ny firenena samihafa izay tompon’ny tany omen’NY TOMPO Andriamanitrao anao, ary mandresy azy ianao ka monina ao an-tanànany sy ao an-tranony, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia manokàna tanàna telo eo afovoan’ny taninao, izay omen’NY TOMPO Andriamanitrao anao holovana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Manamboara lalana ka zarao ho telo toko ny taninao izay omen’NY TOMPO Andriamanitrao holovanao, fa ao no handosiran’izay rehetra mahafaty olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny nahafaty olona izay hovelomina, raha mandositra ao, dia izay nahafaty tsy nahy ny namany ka tsy nankahala azy teo aloha; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'raha misy olona miaraka amin’ny namany ho any an’ala hanapaka hazo ka manainga ny famaky hikapa hazo ny tanany, ary mitsoaka amin’ny zarany ny lelam-pamaky ka mahavoa ny namany ary mahafaty azy, dia aoka handositra ao amin’ny iray amin’ireo tanàna ireo izy ka hovelomina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fandrao hanenjika ilay nahafaty olona ny mpamaly ra, raha mbola mirehitra ny fony ka hahatratra azy, noho ny halavitry ny alehany, dia hahafaty azy izy; nefa tsy tokony ho faty izy satria tsy nankahala ny namany talohan’ny nahafatesany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa izany no andidiako anao hoe: Manokàna tanàna telo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha hitarin’NY TOMPO Andriamanitrao ny faritry ny taninao, araka izay nianianany tamin’ny razanao ka homeny anao ny tany rehetra izay nampanantenainy homena ny razanao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'raha mitandrina hanaraka izao lalàna rehetra andidiako anao anio izao ianao sady ho tia NY TOMPO Andriamanitrao, no handeha mandrakariva amin’ny lalany, dia hampianao tanàna telo koa ireny telo ireny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: mba tsy hisy ran’ny tsy manan-tsiny halatsaka eo amin’ny taninao izay omen’NY TOMPO Andriamanitrao anao ho lovanao ka tsy ho meloka amin’ny ra ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa raha misy olona mankahala ny namany ka manao vela-pandrika aminy, ary mitsangana hamely mahafaty azy, nefa mandositra ho ao amin’ny iray amin’ireo tanàna ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia haniraka haka azy ao ny loholona amin’ny tanànany ka hanolotra azy eo an-tanan’ny mpamaly ra, mba hovonoina ho faty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy hiantra azy ny masonao; fa hesorinao tsy ho eo amin’ny Israely ny heloka amin’ny ran’ny tsy manan-tsiny mba hahita soa ianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faritry ny tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aza manakisaka ny faritry ny tanin’ny namanao, izay efa vitan’ny razana teo amin’ny zarataninao, izay azonao eo amin’ny tany izay omen’NY TOMPO Andriamanitrao holovanao ianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavolombelona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha vavolombelona iray monja dia aoka tsy hitsangana hiampanga olona amin’izay heloka na ota nataony na inona na inona; fa amin’ny tenin’ny vavolombelona roa na telo no hanorenana mafy ny teny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha misy vavolombelona mampidi-doza mitsangana hiampanga olona ho nanao izay ratsy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia hitsangana eo anatrehan’NY TOMPO izy roa lahy izay miady, dia eo anatrehan’ny mpisorona sy ny mpitsara amin’io andro io; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary raha hadinin’ny mpitsara mafy izy ireo ka hitany fa vavolombelona mandainga ilay miampanga ny namany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia araka izay nokasainy hatao amin’ny namany no hataonareo aminy; fa hofongoranao tsy ho eo aminao ny fanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny olona sisa dia handre izany ka hatahotra ary tsy hanao tahaka ireny ratsy ireny eo aminao intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa tsy hiantra azy ny masonao; ary aina no hataonao solon’ny aina, maso solon’ny maso, nify solon’ny nify, tanana solon’ny tanana, tongotra solon’ny tongotra.
