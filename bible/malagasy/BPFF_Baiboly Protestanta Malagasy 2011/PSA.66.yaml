document_id: PSA.66,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra Mpanafaka
  - type: text
    content: Ho an’ny mpiventy hira. Tononkira. Salamo.
  - type: text
    content: Mihobia ho an’Andriamanitra,
  - type: text
    content: ry tany rehetra!
  '10':
  - type: text
    content: Fa efa nizaha toetra anay Ianao, Andriamanitra ô,
  - type: text
    content: efa nanadio anay Ianao, tahaka ny fanadio volafotsy amin’ny memy.
  '11':
  - type: text
    content: Nampiditra anay tao amin’ny fandrika harato Ianao,
  - type: text
    content: nanisy enta-mavesatra teo an-damosinay Ianao,
  '12':
  - type: text
    content: nampandeha olona hanitsaka ny lohanay Ianao,
  - type: text
    content: nandeha namakivaky ny afo sy ny rano izahay,
  - type: text
    content: nefa nitondra anay nivoaka ho amin’ny fitahiana mahatretrika Ianao.
  '13':
  - type: text
    content: Hiditra ao amin’ny tranonao mitondra fanatitra dorana manontolo aho,
  - type: text
    content: hefaiko Aminao ny voadiko
  '14':
  - type: text
    content: izay notononin’ny molotro
  - type: text
    content: sy naloaky ny vavako, fony aho azom-pahoriana.
  '15':
  - type: text
    content: Hatolotro ho fanatitra dorana manontolo ho Anao ny matavy
  - type: text
    content: mbamin’ny setroky ny ondrilahy.
  - type: text
    content: 'Hanatitra omby sy osilahy aho. '
  - type: text
    content: Fiatoana.
  '16':
  - type: text
    content: Avia, mihainoa, ianareo rehetra izay matahotra an’Andriamanitra,
  - type: text
    content: fa hotantaraiko izay nataony tamiko.
  '17':
  - type: text
    content: Izy no nantsoin’ny vavako
  - type: text
    content: ary ny fanandratana Azy no teo ambanin’ny lelako.
  '18':
  - type: text
    content: Raha toa ka nankasitraka ota tao am-poko aho
  - type: text
    content: dia tsy mba ho nihaino ny Tompo;
  '19':
  - type: text
    content: kanefa nihaino tokoa Andriamanitra
  - type: text
    content: nanongilan-tsofina tamin’ny feon’ny vavaka nataoko Izy.
  '2':
  - type: text
    content: Mankalazà ny voninahitry ny anarany;
  - type: text
    content: omeo voninahitra Izy ho fiderana Azy!
  '20':
  - type: text
    content: Isaorana anie Andriamanitra
  - type: text
    content: izay tsy nandà ny vavaka nataoko
  - type: text
    content: na nanaisotra ny famindrampony tamiko.
  '3':
  - type: text
    content: 'Lazao amin’Andriamanitra hoe: Endre, mahatahotra ny asanao!'
  - type: text
    content: Ny fahalehibiazan’ny herinao no ikoizan’ny fahavalonao Anao.
  '4':
  - type: text
    content: Ny tany rehetra dia hiankohoka eo anatrehanao ka hankalaza Anao;
  - type: text
    content: 'eny, hankalaza ny anaranao izy. '
  - type: text
    content: Fiatoana.
  '5':
  - type: text
    content: Avia ka jereo ny asan’Andriamanitra!
  - type: text
    content: Mahatahotra ny zavatra ataony amin’ny zanak’olombelona.
  '6':
  - type: text
    content: Nampody ny ranomasina ho tany maina Izy;
  - type: text
    content: nandeha an-tongotra nita ny ony ny olona;
  - type: text
    content: tao no nifaliantsika tamin’Andriamanitra.
  '7':
  - type: text
    content: Manjaka mandrakizay amin’ny heriny Izy
  - type: text
    content: 'ary ny masony dia mandinika ny firenen-tsamihafa:'
  - type: text
    content: 'Aoka tsy hanandra-tena ny maditra! '
  - type: text
    content: Fiatoana.
  '8':
  - type: text
    content: Misaora an’Andriamanitsika, ry firenena,
  - type: text
    content: ary asandrato ny feo fiderana Azy.
  '9':
  - type: text
    content: Izy no mampitoetra antsika amin’ny fiainana
  - type: text
    content: ka tsy mamela ny tongotsika hangozohozo.
