document_id: PSA.66
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiderana an’Andriamanitra Mpanafaka
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Tononkira. Salamo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mihobia ho an’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry tany rehetra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mankalazà ny voninahitry ny anarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: omeo voninahitra Izy ho fiderana Azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lazao amin’Andriamanitra hoe: Endre, mahatahotra ny asanao!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahalehibiazan’ny herinao no ikoizan’ny fahavalonao Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny tany rehetra dia hiankohoka eo anatrehanao ka hankalaza Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, hankalaza ny anaranao izy. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Avia ka jereo ny asan’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahatahotra ny zavatra ataony amin’ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nampody ny ranomasina ho tany maina Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandeha an-tongotra nita ny ony ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tao no nifaliantsika tamin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Manjaka mandrakizay amin’ny heriny Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny masony dia mandinika ny firenen-tsamihafa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Aoka tsy hanandra-tena ny maditra! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Misaora an’Andriamanitsika, ry firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary asandrato ny feo fiderana Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izy no mampitoetra antsika amin’ny fiainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mamela ny tongotsika hangozohozo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa efa nizaha toetra anay Ianao, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nanadio anay Ianao, tahaka ny fanadio volafotsy amin’ny memy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nampiditra anay tao amin’ny fandrika harato Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanisy enta-mavesatra teo an-damosinay Ianao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: nampandeha olona hanitsaka ny lohanay Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandeha namakivaky ny afo sy ny rano izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa nitondra anay nivoaka ho amin’ny fitahiana mahatretrika Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hiditra ao amin’ny tranonao mitondra fanatitra dorana manontolo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hefaiko Aminao ny voadiko
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: izay notononin’ny molotro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy naloaky ny vavako, fony aho azom-pahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hatolotro ho fanatitra dorana manontolo ho Anao ny matavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny setroky ny ondrilahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hanatitra omby sy osilahy aho. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Avia, mihainoa, ianareo rehetra izay matahotra an’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hotantaraiko izay nataony tamiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izy no nantsoin’ny vavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanandratana Azy no teo ambanin’ny lelako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha toa ka nankasitraka ota tao am-poko aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mba ho nihaino ny Tompo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: kanefa nihaino tokoa Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanongilan-tsofina tamin’ny feon’ny vavaka nataoko Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Isaorana anie Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy nandà ny vavaka nataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nanaisotra ny famindrampony tamiko.
