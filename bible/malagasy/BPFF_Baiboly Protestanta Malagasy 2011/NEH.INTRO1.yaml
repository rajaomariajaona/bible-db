verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ny Boky dia tohin’ny Ezra ihany. I Nehemia dia tsy mpisorona toa an’i Ezra fa governora ambany fahefan’ny mpanjakan’i Persia. Nahazo lalana ho any Jerosalema izy hanangana indray ny manda sy ny fiainan’ny olona any. Rehefa tonga tany izy dia nisy mpiray tanindrazana maro nomba azy nanangana ny mandan’i Jerosalema na dia tao koa aza ny olona sasany izay niezaka hisakana ny asa, koa sady nitana fiasana no nitam-piadiana ny mpiasa.
  - type: text
    content: Niara-niasa tamin’i Ezra mpisorona koa i Nehemia, niaraka tamin’ny levita maromaro, namaky ny Bokin’ny Lalàna tamin’ny vahoaka manontolo. Niainga avy tamin’izany famakiana ny Bokin’ny Lalàna izany dia nanavao ny fanekeny tamin’NY TOMPO ny olona. Notokanana ny manda rehefa vita, ary nisy fanavaozana tamin’ny fiainam-pivavahana.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Ny dian’i Nehemia avy any Sosana: 1.1–2.10'
  - type: text
    content: 'Ny fananganana indray ny mandan’i Jerosalema: 2.11–7.72'
  - type: text
    content: 'Ny namakiana ny Bokin’ny Lalàna sy ny nanavaozan’ny olona ny fanekena: 8.1–10.40'
  - type: text
    content: 'Fandaminana ny fonenana sy fiarahamonina tao Jerosalema: 11.1–12.26'
  - type: text
    content: 'Ny nitokanana ny manda: 12.27-43'
  - type: text
    content: 'Fanavaozana samihafa: 12.44–13.31'
