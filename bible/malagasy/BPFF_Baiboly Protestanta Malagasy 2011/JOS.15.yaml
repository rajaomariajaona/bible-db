document_id: JOS.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny anjaran’ny fokon’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no anjaran’ny foko taranak’i Joda tamin’ny antsapaka araka ny fianakaviany: Hatrany amin’ny sisintanin’i Edoma, dia ny tany efitra Zina atsimo, izay faran’ny faritany atsimo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'niolaka hatrany Baala andrefana hatrany amin’ny tendrombohitra Seìra, nandroso hatrany amin’ny ilany avaratry ny tendrombohitra Jearima na Kesalona, nidina hatrany Bety-Semesy, nandroso hatrany Timna, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'nihatra tamin’ny lafiny avaratr’i Ekrona, nizotra hatrany Sikerona, nandroso hatrany amin’ny tendrombohitra Baala, nihatra tamin’i Jabniela, ary nihatra hatrany amin’ny ranomasina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary ny sisintany andrefana dia ny moron’ny Ranomasina Lehibe. Izany no sisintany manodidina ny anjaran’ny taranak’i Joda araka ny fianakaviany.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mpits 1.10-15
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary i Kaleba, zanak’i Jefone, dia nomeny anjara teo amin’ny taranak’i Joda, araka ny didin’NY TOMPO tamin’i Josoa, dia ny Kiriata-Arba na tanànan’i Arba, rain’i Anàka; Hebrona izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia noroahin’i Kaleba niala tao izy telo lahy, taranaky ny Anakita, dia i Sesay sy i Ahimana ary i Talmay. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Niakatra avy tao izy hankany amin’ny mponina any Debira ary Kiriata-Sefera no anaran’i Debira taloha. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hoy i Kaleba: Izay mamely an’i Kiriata-Sefera ka mahazo azy dia homeko azy i Aksa zanako vavy ho vadiny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary i Otniela, zanak’i Kenaza, rahalahin’i Kaleba, no nahazo azy ka nomeny azy i Aksa zanany vavy ho vadiny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Rehefa voampakatra Ravehivavy dia nanesika ny lahy hangataka saha tamin’ny rainy; dia niala tamin’ny borikiny haingana Ravehivavy ka hoy i Kaleba taminy: Inona no ilainao? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hoy izy: Omeo fanomezana manokana aho; fa tany tsy misy rano no nomenao ahy ka mba omeo loharano koa aho. Dia nomeny azy ny loharano ambony sy ny loharano ambany.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary ny faritaniny atsimo dia hatrany amin’ny faran’ny Ranomasintsira, hatrany amin’ny helodrano atsimo, '
