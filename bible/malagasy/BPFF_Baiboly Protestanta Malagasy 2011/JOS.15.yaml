document_id: JOS.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anjaran’ny fokon’i Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no anjaran’ny foko taranak’i Joda tamin’ny antsapaka araka ny fianakaviany: Hatrany amin’ny sisintanin’i Edoma, dia ny tany efitra Zina atsimo, izay faran’ny faritany atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny faritaniny atsimo dia hatrany amin’ny faran’ny Ranomasintsira, hatrany amin’ny helodrano atsimo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'nandroso hatrany atsimon’ny fiakarana Akrabima, nandroso hatrany Zina, niakatra any atsimon’i Kadesy-Barnea, nandroso hatrany Hezrona, niakatra any Adara, niolaka hatrany Karka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'nandroso hatrany Azmona, nahazo ny lohasahan-driakan’i Ejipta, ary nihatra tamin’ny ranomasina. Izany no ho sisintaninareo atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny sisintany atsinanana dia ny Ranomasintsira hatrany amin’ny faran’i Jordana. Ny sisintaniny tamin’ny lafiny avaratra dia hatramin’ny helodrano eo amin’ny faran’i Jordana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'niakatra hatrany Bety-Hogla, nandroso any avaratr’i Bety-Araba, niakatra hatramin’ny vaton’i Bohana, zanak’i Robena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'niakatra ho any Debira hatramin’ny lohasaha Akora, nianavaratra manandrify an’i Gilgala tandrifin’ny fiakarana Adomima izay eo atsimon’ny lohasahan-driaka, nandroso hatrany amin’ny ranon’i Eny-Semesy, nihatra tany Eny-Rogela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'niakatra teo amin’ny lohasahan’ny taranak’i Hinoma, mankeo anilany atsimon’ny Jebosita na Jerosalema, niakatra hatramin’ny tampon’ny tendrombohitra izay manandrify ny lohasahan’i Hinoma eo andrefany, amin’ny farany avaratry ny lohasahan’ny Refaìta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'nizotra hatrany an-tampon’ny tendrombohitra, nihatra tamin’ny loharanon’i Neftoa, nahazo ny tanàna tao an-tendrombohitra Efrona, nizotra hatrany Baala na Kiriata-Jearima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'niolaka hatrany Baala andrefana hatrany amin’ny tendrombohitra Seìra, nandroso hatrany amin’ny ilany avaratry ny tendrombohitra Jearima na Kesalona, nidina hatrany Bety-Semesy, nandroso hatrany Timna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'nihatra tamin’ny lafiny avaratr’i Ekrona, nizotra hatrany Sikerona, nandroso hatrany amin’ny tendrombohitra Baala, nihatra tamin’i Jabniela, ary nihatra hatrany amin’ny ranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny sisintany andrefana dia ny moron’ny Ranomasina Lehibe. Izany no sisintany manodidina ny anjaran’ny taranak’i Joda araka ny fianakaviany.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mpits 1.10-15
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary i Kaleba, zanak’i Jefone, dia nomeny anjara teo amin’ny taranak’i Joda, araka ny didin’NY TOMPO tamin’i Josoa, dia ny Kiriata-Arba na tanànan’i Arba, rain’i Anàka; Hebrona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia noroahin’i Kaleba niala tao izy telo lahy, taranaky ny Anakita, dia i Sesay sy i Ahimana ary i Talmay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Niakatra avy tao izy hankany amin’ny mponina any Debira ary Kiriata-Sefera no anaran’i Debira taloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy i Kaleba: Izay mamely an’i Kiriata-Sefera ka mahazo azy dia homeko azy i Aksa zanako vavy ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary i Otniela, zanak’i Kenaza, rahalahin’i Kaleba, no nahazo azy ka nomeny azy i Aksa zanany vavy ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa voampakatra Ravehivavy dia nanesika ny lahy hangataka saha tamin’ny rainy; dia niala tamin’ny borikiny haingana Ravehivavy ka hoy i Kaleba taminy: Inona no ilainao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy izy: Omeo fanomezana manokana aho; fa tany tsy misy rano no nomenao ahy ka mba omeo loharano koa aho. Dia nomeny azy ny loharano ambony sy ny loharano ambany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izao no lovan’ny foko taranak’i Joda araka ny fianakaviany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny tanàna any amin’ny faran’ny sisintanin’ny foko taranak’i Joda, manakaiky ny sisintanin’i Edoma amin’ny Negeva, dia i Kabzela, i Edera, i Jagora, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'i Kina, i Dimona, i Adada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'i Kadesy, i Hazora, Itnana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'i Zifa, i Telema, i Bealota, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'i Hazora-Hadata, i Keriota-Hezrona na i Hazora, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'i Amama, i Sema, i Molada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'i Hazara-Gada, i Hesmona, i Bety-Paleta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'i Hazara-Soala, i Bery-Sheba, i Biziotia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'i Baala, Iima, i Azema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'i Eltolada, i Kesila, i Horma, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'i Ziklaga, i Madmana, i Sansana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: i Lebaota, i Silima, i Aina, i Rimona; sivy amby roapolo ny tanàna rehetra mbamin’ny vohitra miankina aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary teo amin’ny tany Sefela dia i Estaola, i Zora, i Asna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'i Zanoa, i Eny-Ganima, i Tapoa, i Enama, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'i Jarmota, i Adolama, i Soko, i Azeka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'i Saraima, i Aditaima, i Gedera, i Gederotaima: Tanàna efatra amby folo mbamin’ny vohitra miankina aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ary i Zenana, i Hadasa, i Migdala-Gada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'i Dilana, i Mizpa, i Joktela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'i Lakisy, i Bozkata, i Eglona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'i Kabona, i Lamasa, i Kitlisa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'i Gederota, i Bety-Dagona, i Nama, i Makeda: Tanàna enina amby folo mbamin’ny vohitra miankina aminy,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'i Libna, i Etera, i Asana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'i Jifta, i Asna, i Neziba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'i Keila, i Akziba, i Maresa: Tanàna sivy sy ny vohitra miankina aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'i Ekrona sy ny tanàna ao aminy mbamin’ny vohitra miankina aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'hatrany Ekrona no miankandrefana, dia izay rehetra akaiky an’i Asdoda, mbamin’ireo vohitra miankina aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: i Asdoda sy ny tanàna ao aminy mbamin’ny vohitra miankina aminy, i Gaza sy ny tanàna ao aminy mbamin’ny vohitra miankina aminy, hatrany amin’ny lohasahan-driakan’i Ejipta sy ny moron’ny Ranomasina Lehibe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary tany amin’ny havoana dia i Samira, i Jatira, i Soko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'i Dana, i Kiriata-Sana na i Debira, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'i Anaba, i Estemo, i Anima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'i Gosena, i Holona, i Gilo: Tanàna iraika amby folo mbamin’ny vohitra miankina aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'i Araba, i Doma, i Esana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'i Janoma, i Bety-Tapoa, i Afeka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'i Homta, i Kiriata-Arba na i Hebrona, ary i Ziora: Tanàna sivy mbamin’ny vohitra miankina aminy,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'i Maona, i Karmela, i Zifa, i Jota, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'i Jezirela, i Jokdeama, i Zanoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'i Kaina, i Gibea, i Timna: Tanàna folo mbamin’ny vohitra miankina aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'i Halola, i Bety-Zora, i Gedora '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'i Marata, i Bety-Anota, i Eltekona: Tanàna enina sy ny vohitra miankina aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'i Kiriata-Baala na i Kiriata-Jearima, i Raba: Tanàna roa mbamin’ny vohitra miankina aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Tany an-tany efitra dia i Bety-Araba, i Midina, i Sekaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'i Nibsana sy ilay Tanànan-tsira ary i Eny-Gedỳ: Tanàna enina mbamin’ny vohitra miankina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Ary ny amin’ny Jebosita, mponina any Jerosalema, dia tsy naharoaka azy ny taranak’i Joda; fa miara-monina amin’ny taranak’i Joda any Jerosalema mandraka androany izy ireny.
