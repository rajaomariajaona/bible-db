document_id: ISA.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo an’i Tiro
  - type: text
    content: Ny loza hanjo an’i Tiro.
  - type: text
    content: Midradradradrà ianareo, ry sambon’i Tarsisy ô!
  - type: text
    content: Fa rava izy!
  - type: text
    content: Tsy misy trano intsony! Tsy misy fidirana intsony!
  - type: text
    content: Avy tany amin’ny tany Kitima no nanambaràna izany taminy.
  '10':
  - type: text
    content: Aoka hiely manerana ny taninao tahaka an’i Neily ianao,
  - type: text
    content: ry Tarsisy zanakavavy, fa tsy misy intsony ny zioga!
  '11':
  - type: text
    content: Natsotrany teo ambonin’ny ranomasina ny tanan’NY TOMPO;
  - type: text
    content: nampihorohoroiny ny fanjakana;
  - type: text
    content: NY TOMPO efa nandidy ny amin’i Kanana mba handravana ireo mandany mafy orina.
  '12':
  - type: text
    content: 'Hoy Izy: Tsy hiravoravo intsony ianao,'
  - type: text
    content: ry Sidona zanakavavy, virijiny afa-baraka!
  - type: text
    content: Miaingà ianao ka mità ho any Kitima!
  - type: text
    content: Kanefa na dia any aza dia tsy hahita fitsaharana akory ianao.
  '13':
  - type: text
    content: Indro ny tanin’ny Kaldeana,
  - type: text
    content: izay tsy firenena akory fahiny;
  - type: text
    content: fa ny Asiriana no nanorina azy ho an’ny mponina any an-tany efitra;
  - type: text
    content: manangana tilikambo fiambenana izy
  - type: text
    content: ary mandrava ny lapan’ny mpanjaka ao
  - type: text
    content: ka mampody azy ho korontam-bato.
  '14':
  - type: text
    content: Midradradradrà ianareo, ry sambon’i Tarsisy ô!
  - type: text
    content: Fa rava ny mandanareo!
  '15':
  - type: text
    content: 'Amin’izany andro izany dia hohadinoina mandritra ny fitopolo taona i Tiro, toy ny andron’ny mpanjaka iray. Rehefa afaka fitopolo taona dia hiharan’ilay tononkalo momba ny vehivavy janga i Tiro hoe:'
  '16':
  - type: text
    content: Makà lokanga
  - type: text
    content: ka miveziveze manerana ny tanàna ianao,
  - type: text
    content: ry Ikala janga hadino!
  - type: text
    content: Mitendre tsara ka mahereza mihira
  - type: text
    content: mba hahatsiarovana anao!
  '17':
  - type: text
    content: 'Rehefa afaka fitopolo taona dia hamangy an’i Tiro NY TOMPO ka hiverina amin’ny filan-karama maloto izy sady hijangajanga amin’ny fanjakana rehetra etỳ ambonin’ny tany. '
  '18':
  - type: text
    content: Ary ny tombom-barony sy ny karama maloto azony dia hohamasinina ho an’NY TOMPO; tsy hotahirizina na horaketina izany fa ny tombom-barony dia ho an’izay mitoetra eo anatrehan’NY TOMPO, ho hani-mahavoky sy ho fitafiana mirenty.
  '2':
  - type: text
    content: Mangìna ianareo mponina amin’ny nosy
  - type: text
    content: izay efa nofenoin’ny mpivaro-mandeha avy any Sidona harena tamin’ny fitetezany ranomasina!
  '3':
  - type: text
    content: Teny amin’ny ranobe ny varin’i Sihora,
  - type: text
    content: dia ny vokatr’i Neily ka nampiditra harena ho azy izy;
  - type: text
    content: ary tonga tsenan’ny firenena izy.
  '4':
  - type: text
    content: Aoka ho menatra ianao, ry Sidona!
  - type: text
    content: Fa hoy ny ranomasina,
  - type: text
    content: 'dia ny fiarovana mafy ao an-dranomasina hoe:'
  - type: text
    content: Tsy nihetsi-jaza aho,
  - type: text
    content: tsy niteraka aho,
  - type: text
    content: tsy nitaiza zatovo aho
  - type: text
    content: na namelona virijiny.
  '5':
  - type: text
    content: Rehefa re tany Ejipta izany
  - type: text
    content: dia toran-kovitra izy noho ny nanjo an’i Tiro.
  '6':
  - type: text
    content: Mità ho any Tarsisy ianareo;
  - type: text
    content: Midradradradrà, ry mponina any amoron-tsiraka.
  '7':
  - type: text
    content: Ity va ilay tanànanareo niravoravo?
  - type: text
    content: Hatry ny fahagola no efa niorenany
  - type: text
    content: sady noentin’ny tongony hivahiny lavitra izy.
  '8':
  - type: text
    content: Iza no nikasa izany
  - type: text
    content: mba hamelezana an’i Tiro, ilay mpanome satroboninahitra,
  - type: text
    content: nefa ny mpivaro-mandeha tao aminy dia mpanapaka,
  - type: text
    content: ary olona fanta-daza ny mpivarotra ao aminy.
  '9':
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao, no nikasa izany,
  - type: text
    content: mba hampietreny ny fiavonavonany noho ny hatsaran-tarehy rehetra,
  - type: text
    content: sy hanalany ny voninahitr’izay rehetra ankalazaina amin’ny tany.
