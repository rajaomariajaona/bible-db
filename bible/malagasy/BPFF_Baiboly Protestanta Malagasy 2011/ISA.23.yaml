document_id: ISA.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loza hanjo an’i Tiro
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny loza hanjo an’i Tiro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midradradradrà ianareo, ry sambon’i Tarsisy ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa rava izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy trano intsony! Tsy misy fidirana intsony!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy tany amin’ny tany Kitima no nanambaràna izany taminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mangìna ianareo mponina amin’ny nosy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa nofenoin’ny mpivaro-mandeha avy any Sidona harena tamin’ny fitetezany ranomasina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Teny amin’ny ranobe ny varin’i Sihora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny vokatr’i Neily ka nampiditra harena ho azy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tonga tsenan’ny firenena izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka ho menatra ianao, ry Sidona!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hoy ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ny fiarovana mafy ao an-dranomasina hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nihetsi-jaza aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy niteraka aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nitaiza zatovo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na namelona virijiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa re tany Ejipta izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toran-kovitra izy noho ny nanjo an’i Tiro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mità ho any Tarsisy ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midradradradrà, ry mponina any amoron-tsiraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ity va ilay tanànanareo niravoravo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatry ny fahagola no efa niorenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady noentin’ny tongony hivahiny lavitra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Iza no nikasa izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamelezana an’i Tiro, ilay mpanome satroboninahitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ny mpivaro-mandeha tao aminy dia mpanapaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary olona fanta-daza ny mpivarotra ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Andriamanitra, Tompon’izao rehetra izao, no nikasa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampietreny ny fiavonavonany noho ny hatsaran-tarehy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanalany ny voninahitr’izay rehetra ankalazaina amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aoka hiely manerana ny taninao tahaka an’i Neily ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Tarsisy zanakavavy, fa tsy misy intsony ny zioga!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Natsotrany teo ambonin’ny ranomasina ny tanan’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampihorohoroiny ny fanjakana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO efa nandidy ny amin’i Kanana mba handravana ireo mandany mafy orina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy Izy: Tsy hiravoravo intsony ianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Sidona zanakavavy, virijiny afa-baraka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miaingà ianao ka mità ho any Kitima!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa na dia any aza dia tsy hahita fitsaharana akory ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro ny tanin’ny Kaldeana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy firenena akory fahiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny Asiriana no nanorina azy ho an’ny mponina any an-tany efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manangana tilikambo fiambenana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandrava ny lapan’ny mpanjaka ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampody azy ho korontam-bato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Midradradradrà ianareo, ry sambon’i Tarsisy ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa rava ny mandanareo!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Amin’izany andro izany dia hohadinoina mandritra ny fitopolo taona i Tiro, toy ny andron’ny mpanjaka iray. Rehefa afaka fitopolo taona dia hiharan’ilay tononkalo momba ny vehivavy janga i Tiro hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Makà lokanga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miveziveze manerana ny tanàna ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Ikala janga hadino!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitendre tsara ka mahereza mihira
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatsiarovana anao!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa afaka fitopolo taona dia hamangy an’i Tiro NY TOMPO ka hiverina amin’ny filan-karama maloto izy sady hijangajanga amin’ny fanjakana rehetra etỳ ambonin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny tombom-barony sy ny karama maloto azony dia hohamasinina ho an’NY TOMPO; tsy hotahirizina na horaketina izany fa ny tombom-barony dia ho an’izay mitoetra eo anatrehan’NY TOMPO, ho hani-mahavoky sy ho fitafiana mirenty.
