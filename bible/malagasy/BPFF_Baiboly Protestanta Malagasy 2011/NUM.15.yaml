document_id: NUM.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo fanatitra koba sy diloilo ary divay
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Mitenena amin’ny Zanak’Israely hoe: '
  '10':
  - type: text
    content: 'ary divay antsasaky ny hina no hatolotrao ho fanatitra aidina, ho fanatitra levonina amin’ny afo, ho hanitra ankasitrahana ho an’NY TOMPO. '
  '11':
  - type: text
    content: 'Izany no ampombaina ny omby tsirairay, na ny ondrilahy tsirairay, na ny zanak’ondry tsirairay, na ny zanak’osy tsirairay. '
  '12':
  - type: text
    content: 'Tahaka izany no hataonareo amin’izy rehetra, araka ny isan’ny zavatra atolotrareo. '
  '13':
  - type: text
    content: 'Ny tompon-tany rehetra dia samy hanao ireo zavatra ireo araka izany, raha manolotra fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO izy. '
  '14':
  - type: text
    content: 'Ary raha misy mpifindra monina eo aminareo, na olona miara-mitoetra aminareo, hatramin’ny taranakareo fara aman-dimby, ka manolotra fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO izy, dia araka izay ataonareo no hataony. '
  '15':
  - type: text
    content: 'Ary ny amin’ny fiangonana dia lalàna iray ihany no ho aminareo sy izay mpifindra monina eo aminareo koa, dia lalàna maharitra hatramin’ny taranakareo fara aman-dimby izany; tsy hisy hafa eo anatrehan’NY TOMPO na ianareo na ny mpifindra monina. '
  '16':
  - type: text
    content: Lalàna iray ihany sy fanao iray ihany no ho aminareo sy izay vahiny eo aminareo.
  - type: heading
    content: Fanolorana ireo mofo voalohany
  '17':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: '
  '18':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Rehefa tonga any amin’ny tany izay itondrako anareo ianareo '
  '19':
  - type: text
    content: 'ka hihinana mofo avy amin’ny vokatry ny tany dia atokàny izay ho an’NY TOMPO. '
  '2':
  - type: text
    content: 'Rehefa tonga any amin’ny tany honenanareo izay omeko anareo ianareo '
  '20':
  - type: text
    content: 'Hanokana mofo iray izay hatao amin’ny voalohan’ny kobanareo voafetafeta ianareo; tahaka izay atokana avy eo amin’ny famoloana no hanokananareo izany. '
  '21':
  - type: text
    content: Ny voalohan’ny kobanareo voafetafeta dia hanomezanareo ho an’NY TOMPO hatramin’ny taranakareo fara aman-dimby.
  - type: heading
    content: Ireo fanatitra noho ny ota tsy nahy
  '22':
  - type: text
    content: 'Raha manota tsy nahy ianareo ka tsy nahatanteraka ireo didy rehetra ireo, izay nolazain’NY TOMPO tamin’i Mosesy, '
  '23':
  - type: text
    content: 'dia izay rehetra nandidian’NY TOMPO anareo tamin’ny alalan’i Mosesy, hatramin’ny andro izay nanaovan’NY TOMPO izany didy izany ka hatramin’ny taranakareo fara aman-dimby, '
  '24':
  - type: text
    content: 'ary natao tsy nahy izany ota izany ka tsy fantatry ny fiangonana, dia hanatitra vantotra ombilahy iray ny fiangonana manontolo ho fanatitra dorana manontolo, ho hanitra ankasitrahana ho an’NY TOMPO, mbamin’ny fanatitra avy amin’ny zavamaniry sy ny fanatitra aidina ampombaina azy, araka ny fanao, ary osilahy iray ho fanatitra noho ny ota. '
  '25':
  - type: text
    content: 'Ary ny mpisorona dia hanao fanavotana ho an’ny fiangonan’ny Zanak’Israely manontolo ka havela ny helony satria natao tsy nahy izany; hanolotra ny fanatiny izy, dia fanatitra levonina amin’ny afo ho an’NY TOMPO sy ny fanatiny, eo anatrehan’NY TOMPO, noho ny ota tsy nahy nataony. '
  '26':
  - type: text
    content: Dia havela ny heloky ny fiangonan’ny Zanak’Israely manontolo, mbamin’izay mpifindra monina eo aminy; fa nahazo ny olona rehetra izany noho ny ota tsy nahy.
  '27':
  - type: text
    content: 'Ary raha olona iray kosa no manota tsy nahy dia hanatitra osivavy iray izay iray taona izy ho fanatitra noho ny ota. '
  '28':
  - type: text
    content: 'Ary ny mpisorona dia hanao fanavotana ho an’ny olona izay nanota tsy nahy eo anatrehan’NY TOMPO ka havela ny helony. '
  '29':
  - type: text
    content: 'Lalàna iray ihany no hatao amin’izay manota tsy nahy, na amin’ny tompon-tany eo amin’ny Zanak’Israely izany, na amin’ny mpifindra monina eo aminareo. '
  '3':
  - type: text
    content: 'ka manolotra fanatitra levonina amin’ny afo ho an’NY TOMPO, na omby na ondry aman’osy hatao fanatitra dorana manontolo na fanatitra hafa alatsa-dra hanalana voady, na an-tsitrapo na amin’ny fotoam-piangonanareo, hanaovana hanitra ankasitrahana ho an’NY TOMPO '
  '30':
  - type: text
    content: 'Fa ny olona izay manota amin’ny fanahy iniana kosa, na tompon-tany na mpifindra monina, dia manamavo NY TOMPO izy ka hofongorana tsy ho amin’ny fireneny. '
  '31':
  - type: text
    content: Fa ny tenin’NY TOMPO no nohamavoiny ary ny lalànany no nodikainy, dia hofongorana tokoa izany olona izany; ary ny helony dia ho aminy ihany.
  - type: heading
    content: Ilay lehilahy iray nandika ny Sabata
  '32':
  - type: text
    content: 'Raha tany an-tany efitra ny Zanak’Israely dia nisy lehilahy iray tratra nanangona kitay hazo tamin’ny andro Sabata. '
  '33':
  - type: text
    content: 'Ary ireo nahita azy nanangona kitay dia nitondra azy teo amin’i Mosesy sy i Arona ary ny fiangonana manontolo. '
  '34':
  - type: text
    content: 'Dia nambenana Ralehilahy satria tsy mbola fantatra mazava izay hatao aminy. '
  '35':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Hovonoina ho faty izany lehilahy izany; hitora-bato azy eny ivelan’ny toby ny fiangonana manontolo. '
  '36':
  - type: text
    content: Dia namoaka azy ho eny ivelan’ny toby ny fiangonana manontolo ka nitora-bato azy, dia maty izy, araka izay nandidian’NY TOMPO an’i Mosesy ihany.
  - type: heading
    content: Ny morontongotr’akanjo
  '37':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '38':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely ka asaivo asiany morontongony ny sisin’ny fitafiany, hatramin’ny taranany fara aman-dimby; aoka hasiany kofehy manga eo amin’io morontongotr’akanjony io. '
  '39':
  - type: text
    content: 'Ho toy izany ny morontongotr’akanjonareo, koa rehefa jerenareo izany dia hotsarovanareo sy hankatoavinareo ny didin’NY TOMPO rehetra; ary tsy handeha araka ny fonareo ianareo, na araka ny masonareo, izay andehananareo hijangajangana. '
  '4':
  - type: text
    content: 'izay manolotra ny fanatiny ho an’NY TOMPO dia hanolotra fanatitra avy amin’ny zavamaniry koa, dia koba tsara toto ampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: ', voaharo diloilo ampahefatry ny '
  - type: text
    content: hina
  - type: text
    content: '; '
  '40':
  - type: text
    content: 'Hotsarovanareo sy hankatoavinareo ny didiko rehetra ka ho masina ho an’Andriamanitrareo ianareo. '
  '41':
  - type: text
    content: Izaho no TOMPO Andriamanitrareo izay nitondra anareo nivoaka avy tany amin’ny tany Ejipta mba ho Andriamanitrareo. Izaho no TOMPO Andriamanitrareo.
  '5':
  - type: text
    content: 'ary divay ampahefatry ny hina hatao fanatitra aidina no hampombainareo ny fanatitra dorana manontolo, na ny fanatitra hafa alatsa-dra, miaraka amin’ny zanak’ondry tsirairay. '
  '6':
  - type: text
    content: 'Ho fanampin’ny ondrilahy iray dia koba tsara toto roa ampahafolon’ny efaha, voaharo diloilo ampahatelon’ny hina, no haterinao ho fanatitra avy amin’ny zavamaniry; '
  '7':
  - type: text
    content: 'ary divay ampahatelon’ny hina no haterinao ho fanatitra aidina, ho hanitra ankasitrahana ho an’NY TOMPO. '
  '8':
  - type: text
    content: 'Ary raha manolotra omby ho fanatitra dorana manontolo na ho fanatitra hafa alatsa-dra, hanalana voady, na ho fanati-pihavanana ho an’NY TOMPO ianao, '
  '9':
  - type: text
    content: 'dia fanatitra avy amin’ny zavamaniry koa no hatolotrao ho fanampin’ny omby iray, dia koba tsara toto telo ampahafolon’ny efaha, voaharo diloilo antsasaky ny hina; '
