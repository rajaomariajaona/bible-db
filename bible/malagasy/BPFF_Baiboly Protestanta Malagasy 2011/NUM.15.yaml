document_id: NUM.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo fanatitra koba sy diloilo ary divay
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Mosesy: Mitenena amin’ny Zanak’Israely hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ary divay antsasaky ny hina no hatolotrao ho fanatitra aidina, ho fanatitra levonina amin’ny afo, ho hanitra ankasitrahana ho an’NY TOMPO. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izany no ampombaina ny omby tsirairay, na ny ondrilahy tsirairay, na ny zanak’ondry tsirairay, na ny zanak’osy tsirairay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tahaka izany no hataonareo amin’izy rehetra, araka ny isan’ny zavatra atolotrareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny tompon-tany rehetra dia samy hanao ireo zavatra ireo araka izany, raha manolotra fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary raha misy mpifindra monina eo aminareo, na olona miara-mitoetra aminareo, hatramin’ny taranakareo fara aman-dimby, ka manolotra fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO izy, dia araka izay ataonareo no hataony. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ny amin’ny fiangonana dia lalàna iray ihany no ho aminareo sy izay mpifindra monina eo aminareo koa, dia lalàna maharitra hatramin’ny taranakareo fara aman-dimby izany; tsy hisy hafa eo anatrehan’NY TOMPO na ianareo na ny mpifindra monina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lalàna iray ihany sy fanao iray ihany no ho aminareo sy izay vahiny eo aminareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanolorana ireo mofo voalohany
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Mosesy: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mitenena amin’ny Zanak’Israely hoe: Rehefa tonga any amin’ny tany izay itondrako anareo ianareo '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ka hihinana mofo avy amin’ny vokatry ny tany dia atokàny izay ho an’NY TOMPO. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Rehefa tonga any amin’ny tany honenanareo izay omeko anareo ianareo '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hanokana mofo iray izay hatao amin’ny voalohan’ny kobanareo voafetafeta ianareo; tahaka izay atokana avy eo amin’ny famoloana no hanokananareo izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny voalohan’ny kobanareo voafetafeta dia hanomezanareo ho an’NY TOMPO hatramin’ny taranakareo fara aman-dimby.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo fanatitra noho ny ota tsy nahy
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha manota tsy nahy ianareo ka tsy nahatanteraka ireo didy rehetra ireo, izay nolazain’NY TOMPO tamin’i Mosesy, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'dia izay rehetra nandidian’NY TOMPO anareo tamin’ny alalan’i Mosesy, hatramin’ny andro izay nanaovan’NY TOMPO izany didy izany ka hatramin’ny taranakareo fara aman-dimby, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ary natao tsy nahy izany ota izany ka tsy fantatry ny fiangonana, dia hanatitra vantotra ombilahy iray ny fiangonana manontolo ho fanatitra dorana manontolo, ho hanitra ankasitrahana ho an’NY TOMPO, mbamin’ny fanatitra avy amin’ny zavamaniry sy ny fanatitra aidina ampombaina azy, araka ny fanao, ary osilahy iray ho fanatitra noho ny ota. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary ny mpisorona dia hanao fanavotana ho an’ny fiangonan’ny Zanak’Israely manontolo ka havela ny helony satria natao tsy nahy izany; hanolotra ny fanatiny izy, dia fanatitra levonina amin’ny afo ho an’NY TOMPO sy ny fanatiny, eo anatrehan’NY TOMPO, noho ny ota tsy nahy nataony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia havela ny heloky ny fiangonan’ny Zanak’Israely manontolo, mbamin’izay mpifindra monina eo aminy; fa nahazo ny olona rehetra izany noho ny ota tsy nahy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary raha olona iray kosa no manota tsy nahy dia hanatitra osivavy iray izay iray taona izy ho fanatitra noho ny ota. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary ny mpisorona dia hanao fanavotana ho an’ny olona izay nanota tsy nahy eo anatrehan’NY TOMPO ka havela ny helony. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Lalàna iray ihany no hatao amin’izay manota tsy nahy, na amin’ny tompon-tany eo amin’ny Zanak’Israely izany, na amin’ny mpifindra monina eo aminareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka manolotra fanatitra levonina amin’ny afo ho an’NY TOMPO, na omby na ondry aman’osy hatao fanatitra dorana manontolo na fanatitra hafa alatsa-dra hanalana voady, na an-tsitrapo na amin’ny fotoam-piangonanareo, hanaovana hanitra ankasitrahana ho an’NY TOMPO '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa ny olona izay manota amin’ny fanahy iniana kosa, na tompon-tany na mpifindra monina, dia manamavo NY TOMPO izy ka hofongorana tsy ho amin’ny fireneny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa ny tenin’NY TOMPO no nohamavoiny ary ny lalànany no nodikainy, dia hofongorana tokoa izany olona izany; ary ny helony dia ho aminy ihany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay lehilahy iray nandika ny Sabata
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Raha tany an-tany efitra ny Zanak’Israely dia nisy lehilahy iray tratra nanangona kitay hazo tamin’ny andro Sabata. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary ireo nahita azy nanangona kitay dia nitondra azy teo amin’i Mosesy sy i Arona ary ny fiangonana manontolo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia nambenana Ralehilahy satria tsy mbola fantatra mazava izay hatao aminy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Mosesy: Hovonoina ho faty izany lehilahy izany; hitora-bato azy eny ivelan’ny toby ny fiangonana manontolo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Dia namoaka azy ho eny ivelan’ny toby ny fiangonana manontolo ka nitora-bato azy, dia maty izy, araka izay nandidian’NY TOMPO an’i Mosesy ihany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny morontongotr’akanjo
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Mitenena amin’ny Zanak’Israely ka asaivo asiany morontongony ny sisin’ny fitafiany, hatramin’ny taranany fara aman-dimby; aoka hasiany kofehy manga eo amin’io morontongotr’akanjony io. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ho toy izany ny morontongotr’akanjonareo, koa rehefa jerenareo izany dia hotsarovanareo sy hankatoavinareo ny didin’NY TOMPO rehetra; ary tsy handeha araka ny fonareo ianareo, na araka ny masonareo, izay andehananareo hijangajangana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'izay manolotra ny fanatiny ho an’NY TOMPO dia hanolotra fanatitra avy amin’ny zavamaniry koa, dia koba tsara toto ampahafolon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efaha
    - type: text
      text: ', voaharo diloilo ampahefatry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hina
    - type: text
      text: '; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Hotsarovanareo sy hankatoavinareo ny didiko rehetra ka ho masina ho an’Andriamanitrareo ianareo. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Izaho no TOMPO Andriamanitrareo izay nitondra anareo nivoaka avy tany amin’ny tany Ejipta mba ho Andriamanitrareo. Izaho no TOMPO Andriamanitrareo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ary divay ampahefatry ny hina hatao fanatitra aidina no hampombainareo ny fanatitra dorana manontolo, na ny fanatitra hafa alatsa-dra, miaraka amin’ny zanak’ondry tsirairay. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ho fanampin’ny ondrilahy iray dia koba tsara toto roa ampahafolon’ny efaha, voaharo diloilo ampahatelon’ny hina, no haterinao ho fanatitra avy amin’ny zavamaniry; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ary divay ampahatelon’ny hina no haterinao ho fanatitra aidina, ho hanitra ankasitrahana ho an’NY TOMPO. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary raha manolotra omby ho fanatitra dorana manontolo na ho fanatitra hafa alatsa-dra, hanalana voady, na ho fanati-pihavanana ho an’NY TOMPO ianao, '
  '9':
  - type: usfm
