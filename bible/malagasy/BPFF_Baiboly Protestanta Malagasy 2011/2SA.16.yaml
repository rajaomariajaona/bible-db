document_id: 2SA.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida sy i Ziba
  - type: text
    content: 'Raha vao nihilana kely avy teo an-tampon’ny tendrombohitra i Davida dia indro, nitsena azy i Ziba mpanompon’i Mefiboseta, mitondra boriky roa voaisy lasely sady nampitondraina mofo roanjato sy voaloboka maina zato sampaho sy voankazo masaka fahavaratra zato ary divay iray siny hoditra. '
  '10':
  - type: text
    content: 'Nefa hoy ny mpanjaka: Moa mifaninona akory izaho sy ianareo, ry zanak’i Zeroia? Raha manozona izy, NY TOMPO no niteny taminy hoe: Ozòny i Davida! Iza indray ary no hiteny hoe: Nahoana ianao no manao izany? '
  '11':
  - type: text
    content: 'Hoy koa i Davida tamin’i Abisay sy tamin’ny mpanompony rehetra: Indro, ny zanako naterako aza mitady ny aiko, ka mainka io Benjaminita io! Avelao ihany izy hanozona, fa NY TOMPO no nampanao azy izany. '
  '12':
  - type: text
    content: Angamba NY TOMPO hamindra fo amiko ny amin’ny heloko ary hamaly soa ahy noho izao ozona nanjo ahy androany izao.
  '13':
  - type: text
    content: 'Nony nandeha teny an-dalana i Davida sy ny olony dia nandeha tamin’ny ilan’ny havoana tandrifiny kosa i Simey ka nanozona teny am-pandehanana sady nitora-bato nanandrify azy ary namafy vovoka. '
  '14':
  - type: text
    content: Dia tonga ny mpanjaka sy ny vahoaka rehetra izay nanaraka azy sady efa reraka ka naka aina teo izy ireo.
  - type: heading
    content: Ny nanatonan’i Hosay an’i Absaloma
  '15':
  - type: text
    content: 'Tonga tany Jerosalema i Absaloma sy ny vahoaka rehetra tamin’ny Israely, ary i Ahitofela koa dia teo aminy. '
  '16':
  - type: text
    content: 'Ary tonga tao amin’i Absaloma i Hosay arkita, sakaizan’i Davida ka niteny taminy hoe: Ho ela velona anie ny mpanjaka! Ho ela velona anie ny mpanjaka! '
  '17':
  - type: text
    content: 'Nefa hoy i Absaloma tamin’i Hosay: Izao va no fitiavanao ny sakaizanao? Nahoana ianao no tsy mba nandeha niaraka tamin’ny sakaizanao? '
  '18':
  - type: text
    content: 'Hoy i Hosay tamin’i Absaloma: Tsia, fa izay nofidin’NY TOMPO sy ireto vahoaka ireto mbamin’ny lehilahin’ny Israely, izy no hombako sady ao aminy no hitoerako. '
  '19':
  - type: text
    content: Koa, iza indray no hotompoiko? Tsy eo anatrehan’ny zanany va? Tahaka ny nanompoako teo anatrehan’ny rainao no hanompoako eto anatrehanao koa.
  - type: heading
    content: I Absaloma sy ireo vady tsindranon’i Davida
  '2':
  - type: text
    content: 'Hoy ny mpanjaka tamin’i Ziba: Ahoana no hevitrao amin’ireto? Dia hoy i Ziba: Ny boriky dia ho an’ny ankohonan’ny mpanjaka mba hitaingenany, ny mofo sy ny voankazo masaka fahavaratra dia hohanin’ny zatovo, ary ny divay kosa dia hosotroin’izay reraka any an-tany efitra. '
  '20':
  - type: text
    content: 'Hoy i Absaloma tamin’i Ahitofela: Heveronareo tsara izay hataontsika. '
  '21':
  - type: text
    content: 'Dia hoy i Ahitofela tamin’i Absaloma: Midira ao amin’ny vady tsindranon’ny rainao, izay nampiandrasiny trano; dia ho ren’ny Israely rehetra fa efa nanamaimbo tena eo anatrehan-drainao ianao ka hahery ny tanan’izay rehetra momba anao. '
  '22':
  - type: text
    content: Dia nanorina tranolay ho an’i Absaloma teo an-
  - type: text
    content: tampon-trano
  - type: text
    content: ' ny olona; ary niditra tao amin’ny vady tsindranon’ny rainy teo imason’ny Israely rehetra i Absaloma. '
  '23':
  - type: text
    content: Tamin’izany fotoana izany, ny tolo-tsaina rehetra avy tamin’i Ahitofela dia noraisina ho toy ny avy amin’Andriamanitra mihitsy, ary na i Davida na i Absaloma dia samy nandray azy ho toy izany koa.
  '3':
  - type: text
    content: 'Dia hoy ny mpanjaka: Aiza ny zanakalahin’ny tomponao? Hoy i Ziba tamin’ny mpanjaka: Indro, mitoetra any Jerosalema izy; fa hoy izy: Anio no hampodian’ny taranak’Israely ny fanjakan’Ikaky ho ahy. '
  '4':
  - type: text
    content: 'Dia hoy ny mpanjaka tamin’i Ziba: Indro, anao izay rehetra an’i Mefiboseta. Ary hoy i Ziba: Miankohoka aho! Aoka mba hahazo fitia eto imasonao aho, ry mpanjaka tompoko.'
  - type: heading
    content: Manozona an’i Davida i Simey
  '5':
  - type: text
    content: 'Nony nanakaiky an’i Bahorima i Davida mpanjaka dia indro, nisy lehilahy, taranak’i Saoly, Simey no anarany, zanak’i Gera izy. Nivoaka avy tao izy ka nanozona teny am-pandehanana. '
  '6':
  - type: text
    content: 'Ary nitora-bato an’i Davida mpanjaka sy ny mpanompony rehetra izy; ny vahoaka rehetra sy ny lehilahy mahery rehetra moa dia teo amin’ny ankavanan’ny mpanjaka sy teo amin’ny ankaviany. '
  '7':
  - type: text
    content: 'Hoy ny fanozon’i Simey: Mandehana, mandehana, ry lehilahy mpandatsa-dra sy tena ratsy fanahy! '
  '8':
  - type: text
    content: 'Nataon’NY TOMPO manody anao izao ny ran’ny taranak’i Saoly, ilay nodimbiasanao fanjakana; NY TOMPO kosa nanome ny fanjakana ho eo an-tanan’i Absaloma zanakao; ary indro, efa idiran-doza ianao izao, satria mpandatsa-dra. '
  '9':
  - type: text
    content: 'Ary hoy i Abisay, zanak’i Zeroia, tamin’ny mpanjaka: Nahoana no avela hanozona ny mpanjaka tompoko io alika maty io? Trara antitra ianao, aoka aho handeha ka hanapaka ny lohany! '
