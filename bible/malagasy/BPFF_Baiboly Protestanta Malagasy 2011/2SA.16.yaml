document_id: 2SA.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida sy i Ziba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha vao nihilana kely avy teo an-tampon’ny tendrombohitra i Davida dia indro, nitsena azy i Ziba mpanompon’i Mefiboseta, mitondra boriky roa voaisy lasely sady nampitondraina mofo roanjato sy voaloboka maina zato sampaho sy voankazo masaka fahavaratra zato ary divay iray siny hoditra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy ny mpanjaka tamin’i Ziba: Ahoana no hevitrao amin’ireto? Dia hoy i Ziba: Ny boriky dia ho an’ny ankohonan’ny mpanjaka mba hitaingenany, ny mofo sy ny voankazo masaka fahavaratra dia hohanin’ny zatovo, ary ny divay kosa dia hosotroin’izay reraka any an-tany efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy ny mpanjaka: Aiza ny zanakalahin’ny tomponao? Hoy i Ziba tamin’ny mpanjaka: Indro, mitoetra any Jerosalema izy; fa hoy izy: Anio no hampodian’ny taranak’Israely ny fanjakan’Ikaky ho ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny mpanjaka tamin’i Ziba: Indro, anao izay rehetra an’i Mefiboseta. Ary hoy i Ziba: Miankohoka aho! Aoka mba hahazo fitia eto imasonao aho, ry mpanjaka tompoko.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manozona an’i Davida i Simey
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony nanakaiky an’i Bahorima i Davida mpanjaka dia indro, nisy lehilahy, taranak’i Saoly, Simey no anarany, zanak’i Gera izy. Nivoaka avy tao izy ka nanozona teny am-pandehanana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nitora-bato an’i Davida mpanjaka sy ny mpanompony rehetra izy; ny vahoaka rehetra sy ny lehilahy mahery rehetra moa dia teo amin’ny ankavanan’ny mpanjaka sy teo amin’ny ankaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy ny fanozon’i Simey: Mandehana, mandehana, ry lehilahy mpandatsa-dra sy tena ratsy fanahy! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nataon’NY TOMPO manody anao izao ny ran’ny taranak’i Saoly, ilay nodimbiasanao fanjakana; NY TOMPO kosa nanome ny fanjakana ho eo an-tanan’i Absaloma zanakao; ary indro, efa idiran-doza ianao izao, satria mpandatsa-dra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy i Abisay, zanak’i Zeroia, tamin’ny mpanjaka: Nahoana no avela hanozona ny mpanjaka tompoko io alika maty io? Trara antitra ianao, aoka aho handeha ka hanapaka ny lohany! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nefa hoy ny mpanjaka: Moa mifaninona akory izaho sy ianareo, ry zanak’i Zeroia? Raha manozona izy, NY TOMPO no niteny taminy hoe: Ozòny i Davida! Iza indray ary no hiteny hoe: Nahoana ianao no manao izany? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy koa i Davida tamin’i Abisay sy tamin’ny mpanompony rehetra: Indro, ny zanako naterako aza mitady ny aiko, ka mainka io Benjaminita io! Avelao ihany izy hanozona, fa NY TOMPO no nampanao azy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Angamba NY TOMPO hamindra fo amiko ny amin’ny heloko ary hamaly soa ahy noho izao ozona nanjo ahy androany izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony nandeha teny an-dalana i Davida sy ny olony dia nandeha tamin’ny ilan’ny havoana tandrifiny kosa i Simey ka nanozona teny am-pandehanana sady nitora-bato nanandrify azy ary namafy vovoka. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia tonga ny mpanjaka sy ny vahoaka rehetra izay nanaraka azy sady efa reraka ka naka aina teo izy ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanatonan’i Hosay an’i Absaloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tonga tany Jerosalema i Absaloma sy ny vahoaka rehetra tamin’ny Israely, ary i Ahitofela koa dia teo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tonga tao amin’i Absaloma i Hosay arkita, sakaizan’i Davida ka niteny taminy hoe: Ho ela velona anie ny mpanjaka! Ho ela velona anie ny mpanjaka! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nefa hoy i Absaloma tamin’i Hosay: Izao va no fitiavanao ny sakaizanao? Nahoana ianao no tsy mba nandeha niaraka tamin’ny sakaizanao? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy i Hosay tamin’i Absaloma: Tsia, fa izay nofidin’NY TOMPO sy ireto vahoaka ireto mbamin’ny lehilahin’ny Israely, izy no hombako sady ao aminy no hitoerako. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa, iza indray no hotompoiko? Tsy eo anatrehan’ny zanany va? Tahaka ny nanompoako teo anatrehan’ny rainao no hanompoako eto anatrehanao koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Absaloma sy ireo vady tsindranon’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy i Absaloma tamin’i Ahitofela: Heveronareo tsara izay hataontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy i Ahitofela tamin’i Absaloma: Midira ao amin’ny vady tsindranon’ny rainao, izay nampiandrasiny trano; dia ho ren’ny Israely rehetra fa efa nanamaimbo tena eo anatrehan-drainao ianao ka hahery ny tanan’izay rehetra momba anao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nanorina tranolay ho an’i Absaloma teo an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-trano
  - type: text
    text: ' ny olona; ary niditra tao amin’ny vady tsindranon’ny rainy teo imason’ny Israely rehetra i Absaloma. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tamin’izany fotoana izany, ny tolo-tsaina rehetra avy tamin’i Ahitofela dia noraisina ho toy ny avy amin’Andriamanitra mihitsy, ary na i Davida na i Absaloma dia samy nandray azy ho toy izany koa.
