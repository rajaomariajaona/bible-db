document_id: 1CH.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanosorana an’i Davida ho mpanjaka
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Sam 5.1-13
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nivory teo amin’i Davida tao Hebrona ny Israely rehetra ka niteny hoe: Indreto izahay fa taolanao sy nofonao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izao no lohan’ny lehilahy maherin’i Davida izay nifikitra mafy taminy tamin’ny fanjakany, mbamin’ny Israely rehetra, hampanjaka azy araka ny tenin’NY TOMPO ny amin’ny Israely. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izao no isan’ny lehilahy maherin’i Davida:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Jasobeama, zanak’i Hakmony, lehiben’ny mpanafika malaza; izy no namely telonjato lahy tamin’ny lefona ka naharingana azy tamin’ny ady indray mandeha monja.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny manarakaraka azy dia i Eleazara, zanak’i Doday ahohita, iray amin’izy telo lahy mahery. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izy dia teo amin’i Davida tao Pasa-Damima, raha vory hiady teo ny Filistina. Nisy tanimboly rakotra varimbazaha teo; ary nandositra ny Filistina ny olona. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nijoro teo afovoan’io tany io kosa i Eleazara ka nahazo azy ary namono ny Filistina. Dia nanao famonjena lehibe NY TOMPO.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nisy telo lahy malaza tamin’ny telopolo lahy nidina nankeo amin’ny vatolampy ho any amin’i Davida tao amin’ny zohin’i Adolama raha nitoby tao amin’ny lohasahan’ny Refaìta ny miaramilan’ny Filistina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tao amin’ny manda fiarovana i Davida tamin’izay fa ny miaramilan’ny Filistina kosa dia tao Betlehema. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nilaza izao faniriany izao i Davida hoe: Iza re no hampisotro rano ahy avy amin’ny fantsakana ao Betlehema, ilay eo akaikin’ny vavahady? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary namakivaky teo amin’ny miaramilan’ny Filistina izy telo lahy ireo ka nanovo rano tao amin’ny fantsakana tao Betlehema, ilay teo akaikin’ny vavahady, dia noentiny ho any amin’i Davida. Kanjo tsy nety nisotro izy fa naidiny ho an’NY TOMPO izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa hoy izy: Sanatria amiko eo anatrehan’Andriamanitra raha hanao izany; hisotro ny ran’ireto olona nanao vy very ny ainy ireto va aho? Fa nanao vy very ny ainy izy ireo tamin’ny nakany ity. Dia tsy nety nisotro izy. Izany zavatra izany no nataon’ireo telo lahy mahery ireo.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hatry ny fahiny ihany koa, fony mbola nanjaka aza i Saoly, dia ianao ihany no mpitarika ny Israely nandeha niady sy niverina avy any; ary hoy NY TOMPO Andriamanitrao taminao: Ianao no ho mpiandry ny Israely oloko, ianao no ho mpitondra azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'I Abisay, rahalahin’i Joaba, no lehibe tamin’izy telo lahy; izy koa no namely telonjato lahy tamin’ny lefona ka nahafaty azy, dia izy no nalaza tamin’izy telo lahy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Eny, tamin’izy telo lahy dia izy no nanana voninahitra mihoatra noho ny azy roa lahy, fa izy no lehibeny; tsy nahomby azy telo lahy anefa izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary i Benaia, zanak’i Jehoiada, zanaky ny lehilahy mahay tany Kabzela, izay nahavita asa be, izy no nahafaty ny roa lahy mahery tany Moaba. Izy koa no nidina namono ny liona tao anatin’ny lavaka fantsakana tamin’ilay andro nisy orampanala iny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izy koa no namono ilay Ejiptiana makadiry, izay dimy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny halavany, nisy lefona tahaka ny voditenon’ny mpanenona teny an-tanan’ilay Ejiptiana; nefa nanatona azy tamin’ny tehiny ihany i Benaia dia nosarihany ny lefona teny an-tanan’ilay Ejiptiana ka iny lefony iny ihany no namonoany azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Izany zavatra izany no nataon’i Benaia, zanak’i Jehoiada, ary tamin’izy telo lahy mahery dia izy no nalaza. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Indro, be voninahitra tamin’ny telopolo lahy izy, nefa tsy nahomby azy telo lahy; ary nanendry azy ho isan’ny mpiambina manokana i Davida.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary ny lehilahy mahery dia:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Asahela, rahalahin’i Joaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Elanana, zanak’i Doday, avy any Betlehema;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: i Samota harorita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Heleza pelonita,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ira, zanak’Ikesy tekoita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Abiezera anatotita,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: i Sibekay hosatita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Ely ahohita,
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eny, tonga tao amin’ny mpanjaka tao Hebrona ny loholon’ny Israely rehetra; ary nanao fanekena taminy tao Hebrona teo anatrehan’NY TOMPO i Davida; dia nanosotra an’i Davida ho mpanjakan’ny Israely izy araka ny tenin’NY TOMPO izay nampilazainy an’i Samoela.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naka ny tanànan’i Jerosalema i Davida
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Sam 5.6-10
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: i Maharay netofatita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Heleda, zanak’i Bana netofatita;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Itahy, zanak’i Ribay avy any Gibean’ny taranak’i Benjamina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Benaia piratonita,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: i Horay avy any amin’ny lohasahan-driakan’i Gaasy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Abiela arbatita,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: i Azmaveta baharomita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Eliaba salbonita,
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ny zanak’i Hasema gizonita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Jonatana, zanak’i Sage hararita;
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: i Ahiama, zanak’i Sakara hararita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Elifala, zanak’i Ora;
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: i Hefera mekeratita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Ahia pelonita,
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: i Hezro karmelita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Naray, zanak’i Ezbay;
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: i Joela, rahalahin’i Natana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Mibara, zanak’i Hagry;
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: i Zeleka amonita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Naharay berotita, mpitondra ny fiadian’i Joaba, zanak’i Zeroia;
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nankany Jerosalema na Jebosa i Davida sy ny Israely rehetra; ary tao ny Jebosita tompon-tany. '
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ira jitrita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Gareba jitrita,
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: i Oria hetita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Zabada, zanak’i Ahelay;
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: i Adina, zanak’i Siza robenita, mpifehy ny Robenita, sy ny namany telopolo lahy koa;
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: i Hanana, zanak’i Maka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Josafata mitnita,
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: i Ozia astartita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Sama sy i Jeiela, zanak’i Hotama aroerita;
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: i Jediaela, zanak’i Simry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Joha tizita rahalahiny,
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: i Eliela avy any Mahava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Jeribay sy i Josavia, zanak’i Elnama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Jitma moabita,
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: i Eliela sy i Obeda ary i Jasiela mezobaita.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hoy ny mponina tao Jebosa tamin’i Davida: Tsy ho tafiditra ato ianao. Kanjo azon’i Davida ihany ny manda fiarovana, dia i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' izay Tanànan’i Davida. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy i Davida: Na iza na iza no hamely voalohany ny Jebosita, dia izy no ho lohany sy ho mpitari-tafika. Ary i Joaba, zanak’i Zeroia, no niakatra voalohany, dia izy no tonga lohany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nitoetra tao anatin’ny manda fiarovana i Davida ka izany no nanaovana ny anarany hoe Tanànan’i Davida. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nanorina ny manodidina ny tanàna hatrany Milo izy; dia nanorina ny sisa tamin’ny tanàna indray i Joaba. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Koa nisandratra hatrany i Davida, satria Andriamanitra, Tompon’izao rehetra izao, no nomba azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny lehilahy maherin’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Sam 23.8-39; ampit. 1Tan 27.2-15
    marker-yv: yv-h
