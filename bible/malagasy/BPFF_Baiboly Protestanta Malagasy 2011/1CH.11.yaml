document_id: 1CH.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanosorana an’i Davida ho mpanjaka
  - type: heading
    content: 2Sam 5.1-13
  - type: text
    content: 'Nivory teo amin’i Davida tao Hebrona ny Israely rehetra ka niteny hoe: Indreto izahay fa taolanao sy nofonao. '
  '10':
  - type: text
    content: 'Izao no lohan’ny lehilahy maherin’i Davida izay nifikitra mafy taminy tamin’ny fanjakany, mbamin’ny Israely rehetra, hampanjaka azy araka ny tenin’NY TOMPO ny amin’ny Israely. '
  '11':
  - type: text
    content: 'Izao no isan’ny lehilahy maherin’i Davida:'
  - type: text
    content: I Jasobeama, zanak’i Hakmony, lehiben’ny mpanafika malaza; izy no namely telonjato lahy tamin’ny lefona ka naharingana azy tamin’ny ady indray mandeha monja.
  '12':
  - type: text
    content: 'Ny manarakaraka azy dia i Eleazara, zanak’i Doday ahohita, iray amin’izy telo lahy mahery. '
  '13':
  - type: text
    content: 'Izy dia teo amin’i Davida tao Pasa-Damima, raha vory hiady teo ny Filistina. Nisy tanimboly rakotra varimbazaha teo; ary nandositra ny Filistina ny olona. '
  '14':
  - type: text
    content: Nijoro teo afovoan’io tany io kosa i Eleazara ka nahazo azy ary namono ny Filistina. Dia nanao famonjena lehibe NY TOMPO.
  '15':
  - type: text
    content: 'Nisy telo lahy malaza tamin’ny telopolo lahy nidina nankeo amin’ny vatolampy ho any amin’i Davida tao amin’ny zohin’i Adolama raha nitoby tao amin’ny lohasahan’ny Refaìta ny miaramilan’ny Filistina. '
  '16':
  - type: text
    content: 'Tao amin’ny manda fiarovana i Davida tamin’izay fa ny miaramilan’ny Filistina kosa dia tao Betlehema. '
  '17':
  - type: text
    content: 'Nilaza izao faniriany izao i Davida hoe: Iza re no hampisotro rano ahy avy amin’ny fantsakana ao Betlehema, ilay eo akaikin’ny vavahady? '
  '18':
  - type: text
    content: 'Ary namakivaky teo amin’ny miaramilan’ny Filistina izy telo lahy ireo ka nanovo rano tao amin’ny fantsakana tao Betlehema, ilay teo akaikin’ny vavahady, dia noentiny ho any amin’i Davida. Kanjo tsy nety nisotro izy fa naidiny ho an’NY TOMPO izany. '
  '19':
  - type: text
    content: 'Fa hoy izy: Sanatria amiko eo anatrehan’Andriamanitra raha hanao izany; hisotro ny ran’ireto olona nanao vy very ny ainy ireto va aho? Fa nanao vy very ny ainy izy ireo tamin’ny nakany ity. Dia tsy nety nisotro izy. Izany zavatra izany no nataon’ireo telo lahy mahery ireo.'
  '2':
  - type: text
    content: 'Hatry ny fahiny ihany koa, fony mbola nanjaka aza i Saoly, dia ianao ihany no mpitarika ny Israely nandeha niady sy niverina avy any; ary hoy NY TOMPO Andriamanitrao taminao: Ianao no ho mpiandry ny Israely oloko, ianao no ho mpitondra azy. '
  '20':
  - type: text
    content: 'I Abisay, rahalahin’i Joaba, no lehibe tamin’izy telo lahy; izy koa no namely telonjato lahy tamin’ny lefona ka nahafaty azy, dia izy no nalaza tamin’izy telo lahy. '
  '21':
  - type: text
    content: 'Eny, tamin’izy telo lahy dia izy no nanana voninahitra mihoatra noho ny azy roa lahy, fa izy no lehibeny; tsy nahomby azy telo lahy anefa izy. '
  '22':
  - type: text
    content: 'Ary i Benaia, zanak’i Jehoiada, zanaky ny lehilahy mahay tany Kabzela, izay nahavita asa be, izy no nahafaty ny roa lahy mahery tany Moaba. Izy koa no nidina namono ny liona tao anatin’ny lavaka fantsakana tamin’ilay andro nisy orampanala iny. '
  '23':
  - type: text
    content: 'Izy koa no namono ilay Ejiptiana makadiry, izay dimy '
  - type: text
    content: hakiho
  - type: text
    content: ' ny halavany, nisy lefona tahaka ny voditenon’ny mpanenona teny an-tanan’ilay Ejiptiana; nefa nanatona azy tamin’ny tehiny ihany i Benaia dia nosarihany ny lefona teny an-tanan’ilay Ejiptiana ka iny lefony iny ihany no namonoany azy. '
  '24':
  - type: text
    content: 'Izany zavatra izany no nataon’i Benaia, zanak’i Jehoiada, ary tamin’izy telo lahy mahery dia izy no nalaza. '
  '25':
  - type: text
    content: Indro, be voninahitra tamin’ny telopolo lahy izy, nefa tsy nahomby azy telo lahy; ary nanendry azy ho isan’ny mpiambina manokana i Davida.
  '26':
  - type: text
    content: 'Ary ny lehilahy mahery dia:'
  - type: text
    content: I Asahela, rahalahin’i Joaba;
  - type: text
    content: i Elanana, zanak’i Doday, avy any Betlehema;
  '27':
  - type: text
    content: i Samota harorita,
  - type: text
    content: i Heleza pelonita,
  '28':
  - type: text
    content: Ira, zanak’Ikesy tekoita;
  - type: text
    content: i Abiezera anatotita,
  '29':
  - type: text
    content: i Sibekay hosatita,
  - type: text
    content: i Ely ahohita,
  '3':
  - type: text
    content: Eny, tonga tao amin’ny mpanjaka tao Hebrona ny loholon’ny Israely rehetra; ary nanao fanekena taminy tao Hebrona teo anatrehan’NY TOMPO i Davida; dia nanosotra an’i Davida ho mpanjakan’ny Israely izy araka ny tenin’NY TOMPO izay nampilazainy an’i Samoela.
  - type: heading
    content: Naka ny tanànan’i Jerosalema i Davida
  - type: heading
    content: 2Sam 5.6-10
  '30':
  - type: text
    content: i Maharay netofatita,
  - type: text
    content: i Heleda, zanak’i Bana netofatita;
  '31':
  - type: text
    content: Itahy, zanak’i Ribay avy any Gibean’ny taranak’i Benjamina;
  - type: text
    content: i Benaia piratonita,
  '32':
  - type: text
    content: i Horay avy any amin’ny lohasahan-driakan’i Gaasy;
  - type: text
    content: i Abiela arbatita,
  '33':
  - type: text
    content: i Azmaveta baharomita,
  - type: text
    content: i Eliaba salbonita,
  '34':
  - type: text
    content: ny zanak’i Hasema gizonita,
  - type: text
    content: i Jonatana, zanak’i Sage hararita;
  '35':
  - type: text
    content: i Ahiama, zanak’i Sakara hararita;
  - type: text
    content: i Elifala, zanak’i Ora;
  '36':
  - type: text
    content: i Hefera mekeratita,
  - type: text
    content: i Ahia pelonita,
  '37':
  - type: text
    content: i Hezro karmelita,
  - type: text
    content: i Naray, zanak’i Ezbay;
  '38':
  - type: text
    content: i Joela, rahalahin’i Natana;
  - type: text
    content: i Mibara, zanak’i Hagry;
  '39':
  - type: text
    content: i Zeleka amonita,
  - type: text
    content: i Naharay berotita, mpitondra ny fiadian’i Joaba, zanak’i Zeroia;
  '4':
  - type: text
    content: 'Nankany Jerosalema na Jebosa i Davida sy ny Israely rehetra; ary tao ny Jebosita tompon-tany. '
  '40':
  - type: text
    content: Ira jitrita,
  - type: text
    content: i Gareba jitrita,
  '41':
  - type: text
    content: i Oria hetita,
  - type: text
    content: i Zabada, zanak’i Ahelay;
  '42':
  - type: text
    content: i Adina, zanak’i Siza robenita, mpifehy ny Robenita, sy ny namany telopolo lahy koa;
  '43':
  - type: text
    content: i Hanana, zanak’i Maka;
  - type: text
    content: i Josafata mitnita,
  '44':
  - type: text
    content: i Ozia astartita,
  - type: text
    content: i Sama sy i Jeiela, zanak’i Hotama aroerita;
  '45':
  - type: text
    content: i Jediaela, zanak’i Simry;
  - type: text
    content: i Joha tizita rahalahiny,
  '46':
  - type: text
    content: i Eliela avy any Mahava,
  - type: text
    content: i Jeribay sy i Josavia, zanak’i Elnama,
  - type: text
    content: i Jitma moabita,
  '47':
  - type: text
    content: i Eliela sy i Obeda ary i Jasiela mezobaita.
  '5':
  - type: text
    content: 'Hoy ny mponina tao Jebosa tamin’i Davida: Tsy ho tafiditra ato ianao. Kanjo azon’i Davida ihany ny manda fiarovana, dia i '
  - type: text
    content: Ziona
  - type: text
    content: ' izay Tanànan’i Davida. '
  '6':
  - type: text
    content: 'Dia hoy i Davida: Na iza na iza no hamely voalohany ny Jebosita, dia izy no ho lohany sy ho mpitari-tafika. Ary i Joaba, zanak’i Zeroia, no niakatra voalohany, dia izy no tonga lohany. '
  '7':
  - type: text
    content: 'Dia nitoetra tao anatin’ny manda fiarovana i Davida ka izany no nanaovana ny anarany hoe Tanànan’i Davida. '
  '8':
  - type: text
    content: 'Ary nanorina ny manodidina ny tanàna hatrany Milo izy; dia nanorina ny sisa tamin’ny tanàna indray i Joaba. '
  '9':
  - type: text
    content: Koa nisandratra hatrany i Davida, satria Andriamanitra, Tompon’izao rehetra izao, no nomba azy.
  - type: heading
    content: Ny amin’ny lehilahy maherin’i Davida
  - type: heading
    content: 2Sam 23.8-39; ampit. 1Tan 27.2-15
