document_id: MAT.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanasitrana boka iray Jesosy
  - type: heading
    content: Mar 1.40-45; Lio 5.12-14
  - type: text
    content: 'Rehefa nidina avy any an-tendrombohitra Izy dia nisy vahoaka betsaka nanaraka Azy. '
  '10':
  - type: text
    content: 'Ary nony nahare izany Jesosy dia gaga ka niteny tamin’izay nanaraka Azy hoe: Lazaiko aminareo marina tokoa fa mbola tsy nahita finoana lehibe toy izany teo amin’ny Israely Aho. '
  '11':
  - type: text
    content: 'Ary lazaiko aminareo fa maro ny avy any atsinanana sy any andrefana no ho tonga ka hipetraka hiara-misakafo amin’i Abrahama sy Isaka ary i Jakoba any amin’ny fanjakan’ny lanitra; '
  '12':
  - type: text
    content: 'fa ny zanaky ny fanjakana kosa dia hariana any amin’ny maizina any ivelany; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  '13':
  - type: text
    content: 'Ary Jesosy niteny tamin’ilay kapiteny hoe: Mandehana; tongava aminao araka ny ninoanao. Tamin’izay ora izay no nahasitrana ilay mpanompony.'
  - type: heading
    content: Ny nanasitranana ny marary maro
  - type: heading
    content: Mar 1.29-34; Lio 4.38-41
  '14':
  - type: text
    content: 'Ary Jesosy, nony niditra tao an-tranon’i Petera, dia nahita ny rafozambavin’i Petera nandry tao, voan’ny tazo. '
  '15':
  - type: text
    content: Nokasihiny ny tanan’ilay marary ka niala taminy ny tazo; dia nitsangana Ravehivavy ka nanompo Azy.
  '16':
  - type: text
    content: 'Ary nony hariva ny andro dia noentin’ny olona tany Aminy ny demoniaka maro; ary ny teniny ihany no nandroahany ny fanahy ratsy, koa izay rehetra narary dia nositraniny avokoa '
  '17':
  - type: text
    content: mba hahatanteraka izay nampilazaina an’Isaia mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' hoe: «Izy naka ny rofintsika sy nitondra ny aretintsika» (Isa 53.4).'
  - type: heading
    content: Ny amin’ireo ta hanaraka an’i Jesosy
  - type: heading
    content: Lio 9.57-60
  '18':
  - type: text
    content: Ary Jesosy, nony nahita ny vahoaka betsaka nanodidina Azy, dia nanome baiko ny handehanana ho eny ampitan’ny ony.
  '19':
  - type: text
    content: 'Nanatona ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' iray ka niteny Taminy hoe: Mpampianatra ô, hanaraka Anao aho, na aiza na aiza no halehanao. '
  '2':
  - type: text
    content: 'Ary indro, nisy boka iray nanatona, niankohoka teo anatrehany sady niteny hoe: Tompoko ô, raha mety Ianao dia afaka manadio ahy. '
  '20':
  - type: text
    content: 'Nefa hoy Jesosy taminy: Ny amboahaolo dia manan-davaka, ny voromanidina dia manana akany, fa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' tsy mba manana izay hipetrahan’ny lohany.'
  '21':
  - type: text
    content: 'Ary nisy hafa koa tamin’ny mpianatra niteny Taminy hoe: Tompoko, aoka aho aloha handeha handevina ny raiko. '
  '22':
  - type: text
    content: 'Saingy hoy Jesosy taminy: Manaraha Ahy; ary aoka ny maty handevina ny maty ao aminy.'
  - type: heading
    content: Ny nampitsaharan’i Jesosy ny tafio-drivotra
  - type: heading
    content: Mar 4.35-41; Lio 8.23-25
  '23':
  - type: text
    content: 'Nony niondrana an-tsambokely Izy dia nanaraka Azy ny mpianany. '
  '24':
  - type: text
    content: 'Ary indro, nisy tafio-drivotra mafy tonga tamin’ny ranomasina, hany ka safotry ny alondrano ny sambokely; nefa Izy natory. '
  '25':
  - type: text
    content: 'Ary nanatona ireo mpianany ka namoha Azy sady niteny hoe: Tompo ô, vonjeo fa maty izahay! '
  '26':
  - type: text
    content: 'Ary hoy Izy taminy: Nahoana no matahotra ianareo, ry kely finoana? Dia nitsangana Izy ka noteneniny mafy ny rivotra sy ny ranomasina, dia tonga tony tsara ny andro. '
  '27':
  - type: text
    content: 'Talanjona ny olona ka niteny hoe: Lehilahy manao ahoana re Io, fa na dia ny rivotra sy ny ranomasina aza manaiky Azy!'
  - type: heading
    content: Ny nanasitranan’i Jesosy ireo demoniaka roa
  - type: heading
    content: Mar 5.1-20; Lio 8.26-39
  '28':
  - type: text
    content: 'Ary nony tonga teny ampita tany amin’ny tanin’ny Gadareniana izy ireo dia nifanena Taminy ny demoniaka roa lahy, avy tany amin’ny fasana, sady tena masiaka ka tsy nisy olona sahy nandalo tamin’izany lalana izany. '
  '29':
  - type: text
    content: 'Indro, niantsoantso izy ireo hoe: Moa mifaninona akory izahay sy Ianao, ry Zanak’Andriamanitra ô? Tonga etỳ va Ianao hampijaly anay alohan’ny fotoana? '
  '3':
  - type: text
    content: 'Ary Jesosy nanatsotra ny tanany dia nikasika azy sady niteny taminy hoe: Mety Aho; madiova ianao. Dia nadio tamin’ny habokany niaraka tamin’izay izy. '
  '30':
  - type: text
    content: 'Ary nisy kisoa maro, andiany iray, nihinana teny lavidavitra azy ireo teny. '
  '31':
  - type: text
    content: 'Dia nifona tamin’i Jesosy ireo '
  - type: text
    content: demonia
  - type: text
    content: ' ka niteny hoe: Raha avoakanao ary izahay dia alefaso hankany anatin’ireo kisoa iray andiany ireo. '
  '32':
  - type: text
    content: 'Dia hoy Izy taminy: Mandehana! Dia lasa ireo ka niditra tao anatin’ny kisoa; ary indreny, nitratrevatreva teny amin’ny hantsana ho any amin’ny ranomasina ny kisoa rehetra ka maty tany anatin’ny rano. '
  '33':
  - type: text
    content: 'Ary nandositra ny mpiandry kisoa, dia nankany an-tanàna ka nilaza ny zavatra rehetra ny amin’ireo demoniaka. '
  '34':
  - type: text
    content: Ary indreo ny olona rehetra avy tao an-tanàna, tonga mba hitsena an’i Jesosy; kanefa nony nahita Azy izy ireo dia nifona tamin’i Jesosy mba hialany amin’ny faritaniny.
  '4':
  - type: text
    content: 'Ary hoy Jesosy taminy: Tandremo mba tsy hilaza na amin’iza na amin’iza ianao; fa mandehana, misehoa amin’ny mpisorona ka mitondrà ny fanatitra izay nandidian’i Mosesy ho vavolombelona amin’ireo.'
  - type: heading
    content: Jesosy sy ilay kapiteny tao Kapernaomy
  - type: heading
    content: Lio 7.1-10; ampit. Jao 4.46-54
  '5':
  - type: text
    content: 'Nony tonga tao Kapernaomy Jesosy dia nisy kapiteny iray nankao Aminy ka nitaraina Taminy '
  '6':
  - type: text
    content: 'hoe: Tompoko ô, ny mpanompolahiko dia mandry ao an-trano, malemy izy ka mijaly loatra. '
  '7':
  - type: text
    content: 'Dia hoy Jesosy taminy: Ho avy Aho hanasitrana azy. '
  '8':
  - type: text
    content: 'Hoy anefa ilay kapiteny: Tompoko, tsy mendrika hidiranao ao ambanin’ny tafon-tranoko aho; fa mitenena ihany dia ho sitrana ny mpanompolahiko. '
  '9':
  - type: text
    content: 'Fa izaho koa dia mba lehilahy manana lehibe ihany ary manana miaramila izay feheziko; ary raha hoy aho amin’ny iray: Mandehana! Dia mandeha izy; ary amin’ny iray koa: Avia! Dia avy izy; ary amin’ny mpanompoko: Ataovy izao! Dia manatanteraka izy. '
