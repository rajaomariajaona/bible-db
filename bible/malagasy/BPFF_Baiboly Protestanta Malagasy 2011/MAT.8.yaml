document_id: MAT.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanasitrana boka iray Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 1.40-45; Lio 5.12-14
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nidina avy any an-tendrombohitra Izy dia nisy vahoaka betsaka nanaraka Azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nahare izany Jesosy dia gaga ka niteny tamin’izay nanaraka Azy hoe: Lazaiko aminareo marina tokoa fa mbola tsy nahita finoana lehibe toy izany teo amin’ny Israely Aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lazaiko aminareo fa maro ny avy any atsinanana sy any andrefana no ho tonga ka hipetraka hiara-misakafo amin’i Abrahama sy Isaka ary i Jakoba any amin’ny fanjakan’ny lanitra; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny zanaky ny fanjakana kosa dia hariana any amin’ny maizina any ivelany; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy niteny tamin’ilay kapiteny hoe: Mandehana; tongava aminao araka ny ninoanao. Tamin’izay ora izay no nahasitrana ilay mpanompony.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanasitranana ny marary maro
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 1.29-34; Lio 4.38-41
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy, nony niditra tao an-tranon’i Petera, dia nahita ny rafozambavin’i Petera nandry tao, voan’ny tazo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nokasihiny ny tanan’ilay marary ka niala taminy ny tazo; dia nitsangana Ravehivavy ka nanompo Azy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony hariva ny andro dia noentin’ny olona tany Aminy ny demoniaka maro; ary ny teniny ihany no nandroahany ny fanahy ratsy, koa izay rehetra narary dia nositraniny avokoa '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hahatanteraka izay nampilazaina an’Isaia mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: profeta.
      marker-yv: yv-n
    - type: text
      text: ' hoe: «Izy naka ny rofintsika sy nitondra ny aretintsika» (Isa 53.4).'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ireo ta hanaraka an’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 9.57-60
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jesosy, nony nahita ny vahoaka betsaka nanodidina Azy, dia nanome baiko ny handehanana ho eny ampitan’ny ony.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanatona ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' iray ka niteny Taminy hoe: Mpampianatra ô, hanaraka Anao aho, na aiza na aiza no halehanao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro, nisy boka iray nanatona, niankohoka teo anatrehany sady niteny hoe: Tompoko ô, raha mety Ianao dia afaka manadio ahy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy Jesosy taminy: Ny amboahaolo dia manan-davaka, ny voromanidina dia manana akany, fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ' tsy mba manana izay hipetrahan’ny lohany.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy hafa koa tamin’ny mpianatra niteny Taminy hoe: Tompoko, aoka aho aloha handeha handevina ny raiko. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saingy hoy Jesosy taminy: Manaraha Ahy; ary aoka ny maty handevina ny maty ao aminy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampitsaharan’i Jesosy ny tafio-drivotra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 4.35-41; Lio 8.23-25
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony niondrana an-tsambokely Izy dia nanaraka Azy ny mpianany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro, nisy tafio-drivotra mafy tonga tamin’ny ranomasina, hany ka safotry ny alondrano ny sambokely; nefa Izy natory. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanatona ireo mpianany ka namoha Azy sady niteny hoe: Tompo ô, vonjeo fa maty izahay! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Nahoana no matahotra ianareo, ry kely finoana? Dia nitsangana Izy ka noteneniny mafy ny rivotra sy ny ranomasina, dia tonga tony tsara ny andro. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Talanjona ny olona ka niteny hoe: Lehilahy manao ahoana re Io, fa na dia ny rivotra sy ny ranomasina aza manaiky Azy!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanasitranan’i Jesosy ireo demoniaka roa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 5.1-20; Lio 8.26-39
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga teny ampita tany amin’ny tanin’ny Gadareniana izy ireo dia nifanena Taminy ny demoniaka roa lahy, avy tany amin’ny fasana, sady tena masiaka ka tsy nisy olona sahy nandalo tamin’izany lalana izany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, niantsoantso izy ireo hoe: Moa mifaninona akory izahay sy Ianao, ry Zanak’Andriamanitra ô? Tonga etỳ va Ianao hampijaly anay alohan’ny fotoana? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nanatsotra ny tanany dia nikasika azy sady niteny taminy hoe: Mety Aho; madiova ianao. Dia nadio tamin’ny habokany niaraka tamin’izay izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy kisoa maro, andiany iray, nihinana teny lavidavitra azy ireo teny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifona tamin’i Jesosy ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' ka niteny hoe: Raha avoakanao ary izahay dia alefaso hankany anatin’ireo kisoa iray andiany ireo. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy taminy: Mandehana! Dia lasa ireo ka niditra tao anatin’ny kisoa; ary indreny, nitratrevatreva teny amin’ny hantsana ho any amin’ny ranomasina ny kisoa rehetra ka maty tany anatin’ny rano. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandositra ny mpiandry kisoa, dia nankany an-tanàna ka nilaza ny zavatra rehetra ny amin’ireo demoniaka. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary indreo ny olona rehetra avy tao an-tanàna, tonga mba hitsena an’i Jesosy; kanefa nony nahita Azy izy ireo dia nifona tamin’i Jesosy mba hialany amin’ny faritaniny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy taminy: Tandremo mba tsy hilaza na amin’iza na amin’iza ianao; fa mandehana, misehoa amin’ny mpisorona ka mitondrà ny fanatitra izay nandidian’i Mosesy ho vavolombelona amin’ireo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy sy ilay kapiteny tao Kapernaomy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 7.1-10; ampit. Jao 4.46-54
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga tao Kapernaomy Jesosy dia nisy kapiteny iray nankao Aminy ka nitaraina Taminy '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hoe: Tompoko ô, ny mpanompolahiko dia mandry ao an-trano, malemy izy ka mijaly loatra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy taminy: Ho avy Aho hanasitrana azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy anefa ilay kapiteny: Tompoko, tsy mendrika hidiranao ao ambanin’ny tafon-tranoko aho; fa mitenena ihany dia ho sitrana ny mpanompolahiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izaho koa dia mba lehilahy manana lehibe ihany ary manana miaramila izay feheziko; ary raha hoy aho amin’ny iray: Mandehana! Dia mandeha izy; ary amin’ny iray koa: Avia! Dia avy izy; ary amin’ny mpanompoko: Ataovy izao! Dia manatanteraka izy. '
