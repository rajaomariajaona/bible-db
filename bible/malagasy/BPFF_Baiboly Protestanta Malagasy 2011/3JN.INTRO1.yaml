    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Epistily
  - type: usfm
    marker: ip
    children:
    - type: text
      text: I Jaona Apostoly izay manoratra ity epistily ity koa dia milaza ny tenany ho «loholona», toy ny ao amin’ny epistily faharoa. Tsy Fiangonana anefa no anoratany fa Kristiana iray atao hoe Gaio. Tsy misy fantatsika ny momba azy io, ankoatra ny hoe Mpino mahatoky, mandeha amin’ny fahamarinana izy. Ny Apostoly dia mankasitraka izany fahatokiany sy ny fanompoana nataony ho an’ny Fiangonana izany.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ao amin’ny Andininy faha-9 dia manambara i Jaona fa efa nanoratra tamin’ny Fiangonana ka mety ho ny Epistily faharoa no ambarany amin’izany. Mitaraina anefa izy ny amin’i Diotrefo, izay manaratsy azy sady te ho lohany ao amin’ny Fiangonana, ary tsy mandray vahiny araka ny fifankatiavana kristiana. Voalaza ato koa ny amin’i Demetrio, izay Kristiana mahatoky, tsara laza amin’ny olona rehetra.
