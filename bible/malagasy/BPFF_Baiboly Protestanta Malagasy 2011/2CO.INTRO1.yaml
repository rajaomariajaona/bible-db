type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Avy any Makedonia any Gresy no nanoratan’i Paoly ity epistily faharoa ho an’ny Korintiana ity, taorianan’ny niverenan’i Timoty tamin’ilay dia voalaza ao amin’ny 1Kor 4.17 sy 16.10. Iray na roa taona taorianan’ny epistily voalohany no heverina fa nanoratany ity epistily faharoa ity. I Titosy no nitondra izany.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: Na dia nisy vokany ihany aza ny epistily voalohany dia mbola nandalovan’ny apostoly sandoka indray tao Korinto ka nampikorontana ny Fiangonana izany. Toa tsy afa-po i Paoly raha tsy namangy vetivety tany indray sady mbola nanoratra ho azy ireo. Nivahiny tany Korinto koa i Titosy ary nitondra vaovao tsara avy tany izay mba nampionona an’i Paoly. Nisaotra ny Korintiana noho izany izy ary nanararaotra nanazava tamin’ny fomba hentitra ny fahefan’ny maha apostoly azy.
  - type: text
    content: Ny mampiavaka ity epistily ity dia ny dinidinika maro momba an’i Paoly manokana izay tsy hita na any amin’ny bokin’ny Asan’ny Apostoly na any amin’ny epistily hafa. Mpanompon’ny fanekena vaovao sy ny fampihavanana ny olona amin’Andriamanitra ao amin’i Jesosy Kristy izy. Marobe tokoa ny zava-tsarotra nihatra taminy noho izany. Notandindomim-pahafatesana mandrakariva izy, kanefa nohamarinin’ny Tompo hatrany fa ny fiainan’i Jesosy Kristy sy ny fahasoavany no antoky ny fahavelomany.
  - type: text
    content: 'Manaitra koa ireo fihetseham-pon’i Paoly eo amin’ny fifandraisany amin’ity Fiangonana malalany ity: Alahelo, tebiteby, fahatezerana, fireharehana, hafaliana.'
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Fiarahabana, filazan’i Paoly ny nanjo azy, ny zavatra nampalahelo tao amin’ny Fiangonana: 1.1–2.13'
  - type: text
    content: 'Ny tombontsoa manokana ho an’izay manompo an’i Jesosy Kristy: 2.14–6.10'
  - type: text
    content: 'Hafatr’i Paoly manokana ho an’ny Korintiana: 6.11–7.16'
  - type: text
    content: 'Fanomezana ho an’ny Kristiana any Jodia: 8.1–9.15'
  - type: text
    content: 'Ny fiarovan’i Paoly ny fanompoan’ny Apostoly: 10.1–13.10'
  - type: text
    content: 'Hafatra sy fanaovam-beloma: 13.11-14'
