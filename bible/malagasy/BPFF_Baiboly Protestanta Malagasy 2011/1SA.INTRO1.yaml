type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny Boky 1, 2Samoela dia iray ihany tany am-piandohana fa tatỳ aoriana vao nozaraina ho roa noho ny halavany, ary ao amin’ny ilay Baiboly dikanteny grika Septanta, ny Boky Samoela sy Mpanjaka dia mitondra ny anarana hoe Mpanjaka 1, 2, 3 sy 4.
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ankoatra izay voalaza momba ireo Mpaminany voalohany, ny Boky dia mitantara ny fiandohan’ny fanjakana tao Israely. Nangataka mba hanana mpanjaka sahala amin’ny firenena hafa rehetra ny Israely. Saiky tsy nanaiky izany i Samoela kanefa nasain’NY TOMPO nanaiky ihany izy ka i Saoly no voatendry ho mpanjaka voalohany teo amin’ny Israely. Vetivety anefa i Saoly dia nampiseho tsy fankatoavana tamin’NY TOMPO ka nesorina taminy ny fanjakana ary nafindran’NY TOMPO tamin’i Davida.
  - type: text
    content: Ny Boky dia mampiseho fa na dia neken’NY TOMPO ihany aza ny fisian’ny mpanjaka teo amin’ny Israely dia Izy ihany no tena Mpanjaka, koa izay mpitondra ny olony dia tsy maintsy manaiky tanteraka ny fahefany.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Ny tantaran’i Samoela: Ny fahazazany sy ny fotoana naha Mpitsara azy: 1–7'
  - type: text
    content: 'Ny fahanteran’i Samoela sy ny nandraisan’i Saoly ny fanjakana: 8–12'
  - type: text
    content: 'Ny adin’i Saoly tamin’ny Filistina ary ny Amalekita: 13–15'
  - type: text
    content: 'Ny nisandratan’i Davida, ny nietren’i Saoly sy ny nahafatesany: 16–31'
