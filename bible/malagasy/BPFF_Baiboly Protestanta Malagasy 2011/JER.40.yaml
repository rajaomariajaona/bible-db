document_id: JER.40
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nipetraka tany amin’i Gedalia i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO, taorianan’ny nandefasan’i Nebozaradana, lehiben’ny mpiambina azy niala tany Rama. Tamin’ny nampanalany azy dia mbola nigadra niaraka tamin’ny babo rehetra avy tany Jerosalema sy Joda, izay halefa any Babilona i Jeremia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary naka an’i Jeremia ny lehiben’ny mpiambina ka niteny taminy hoe: NY TOMPO Andriamanitrao no nanambara izao loza izay nanjo ity tanàna ity izao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'NY TOMPO no nahatonga izany ka nanatanteraka araka izay nolazainy, noho ny nanotanareo tamin’NY TOMPO sy ny tsy nihainoanareo ny feony; izany no nahatonga izao zavatra izao taminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary indro, ankehitriny vahàko izao ny gadra amin’ny tananao. Koa raha sitraky ny fonao ny hiaraka amiko hankany Babilona dia andao fa hotandremako tsara ianao; nefa raha tsy sitraky ny fonao ny hiaraka amiko ho any Babilona dia mijanòna ihany; indro, ny tany rehetra dia eo anoloanao, koa izay tany tianao sy sitrakao no andehano. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha tsy mbola nety nandeha izy dia hoy i Nebozaradana: Miverena indray any amin’i Gedalia, zanak’i Ahikama, zanak’i Safana, izay voatendrin’ny mpanjakan’i Babilona ho mpanapaka ny tanànan’ny Joda ka tomoera any aminy miaraka amin’ny olona, na mandehana any amin’izay tianao haleha na aiza na aiza. Dia nomen’ny lehiben’ny mpiambina vatsy sy fanomezana izy ka nalefany handeha. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary i Jeremia dia nankany amin’i Gedalia, zanak’i Ahikama, tany Mizpa ka niara-monina taminy tao amin’ny vahoaka izay sisa velona teo amin’ny tany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nivondrona nanodidina an’i Gedalia ny avy any amin’ny tanin’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. 2Mpa 25.22-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa ren’ny mpifehy ny miaramila rehetra izay tany an-tsaha sy ny olom-peheziny fa ny mpanjakan’i Babilona dia efa nanendry an’i Gedalia, zanak’i Ahikama, ho mpanapaka ny tany sy ho mpitandrina ny lehilahy mbamin’ny zaza amam-behivavy ary ny mahantra sasany teo amin’ny tany izay tsy mbola lasan-ko babo tany Babilona, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia tonga tany amin’i Gedalia tany Mizpa izy, dia Ismaela, zanak’i Netania; i Johanana sy i Jonatana, zanak’i Karea; i Seraia, zanak’i Tanometa; ny zanak’i Efay netofatita ary i Jazania, zanak’ilay Makatita, dia izy ireny sy ny olom-peheziny avy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary i Gedalia, zanak’i Ahikama, zanak’i Safana, dia nianiana taminy sy tamin’ny olom-peheziny hoe: Aza matahotra hanompo ny Kaldeana; monena amin’ny tany ka manompoa ny mpanjakan’i Babilona, dia hahita soa ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ny amiko dia indro, honina any Mizpa aho hanompo ny Kaldeana izay ho avy etỳ amintsika; fa manangòna ianareo divay sy voankazo masaka fahavaratra ary diloilo ka ataovy ao amin’ny fitahirizanareo, dia monena amin’izay tanàna nidiranareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' rehetra koa izay tany Moaba sy tany amin’ny taranak’i Amona sy tany Edoma ary izay tany amin’ny tany rehetra dia nahare fa ny mpanjakan’i Babilona efa namela ny Joda hisy sisa sady nanendry an’i Gedalia, zanak’i Ahikama, zanak’i Safana, ho mpanapaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia niverina ny Jiosy rehetra avy tany amin’ny tany rehetra izay efa nandroahana azy ka tonga tany amin’ny tanin’ny Joda ho any amin’i Gedalia tao Mizpa; dia nanangona divay sy voankazo masaka fahavaratra be dia be izy ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namonoana an’i Gedalia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tany an-tsaha dia tonga tany amin’i Gedalia tany Mizpa '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka niteny taminy hoe: Moa fantatrao tokoa va fa i Balisa, mpanjakan’ny taranak’i Amona, dia naniraka an’Ismaela, zanak’i Netania, hamono anao? Tsy nino azy anefa i Gedalia, zanak’i Ahikama. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary i Johanana, zanak’i Karea, dia nilaza mangingina tamin’i Gedalia tao Mizpa hoe: Miangavy anao aho, aoka aho handeha hamono an’Ismaela, zanak’i Netania, fa tsy hisy olona hahalala izany tsy akory; fa nahoana no havela hamono anao izy ka hampiely ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' rehetra izay tafangona eto aminao ary hahalany ringana ny sisa amin’ny Joda? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy anefa i Gedalia, zanak’i Ahikama, tamin’i Johanana, zanak’i Karea: Aza manao izany ianao, fa miampanga lainga foana an’Ismaela ianao.'
