document_id: JER.40,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nipetraka tany amin’i Gedalia i Jeremia
  - type: text
    content: Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO, taorianan’ny nandefasan’i Nebozaradana, lehiben’ny mpiambina azy niala tany Rama. Tamin’ny nampanalany azy dia mbola nigadra niaraka tamin’ny babo rehetra avy tany Jerosalema sy Joda, izay halefa any Babilona i Jeremia.
  '10':
  - type: text
    content: Ary ny amiko dia indro, honina any Mizpa aho hanompo ny Kaldeana izay ho avy etỳ amintsika; fa manangòna ianareo divay sy voankazo masaka fahavaratra ary diloilo ka ataovy ao amin’ny fitahirizanareo, dia monena amin’izay tanàna nidiranareo.
  '11':
  - type: text
    content: 'Ary ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' rehetra koa izay tany Moaba sy tany amin’ny taranak’i Amona sy tany Edoma ary izay tany amin’ny tany rehetra dia nahare fa ny mpanjakan’i Babilona efa namela ny Joda hisy sisa sady nanendry an’i Gedalia, zanak’i Ahikama, zanak’i Safana, ho mpanapaka azy. '
  '12':
  - type: text
    content: Dia niverina ny Jiosy rehetra avy tany amin’ny tany rehetra izay efa nandroahana azy ka tonga tany amin’ny tanin’ny Joda ho any amin’i Gedalia tao Mizpa; dia nanangona divay sy voankazo masaka fahavaratra be dia be izy ireo.
  - type: heading
    content: Ny namonoana an’i Gedalia
  '13':
  - type: text
    content: 'Ary i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tany an-tsaha dia tonga tany amin’i Gedalia tany Mizpa '
  '14':
  - type: text
    content: 'ka niteny taminy hoe: Moa fantatrao tokoa va fa i Balisa, mpanjakan’ny taranak’i Amona, dia naniraka an’Ismaela, zanak’i Netania, hamono anao? Tsy nino azy anefa i Gedalia, zanak’i Ahikama. '
  '15':
  - type: text
    content: 'Ary i Johanana, zanak’i Karea, dia nilaza mangingina tamin’i Gedalia tao Mizpa hoe: Miangavy anao aho, aoka aho handeha hamono an’Ismaela, zanak’i Netania, fa tsy hisy olona hahalala izany tsy akory; fa nahoana no havela hamono anao izy ka hampiely ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' rehetra izay tafangona eto aminao ary hahalany ringana ny sisa amin’ny Joda? '
  '16':
  - type: text
    content: 'Hoy anefa i Gedalia, zanak’i Ahikama, tamin’i Johanana, zanak’i Karea: Aza manao izany ianao, fa miampanga lainga foana an’Ismaela ianao.'
  '2':
  - type: text
    content: 'Ary naka an’i Jeremia ny lehiben’ny mpiambina ka niteny taminy hoe: NY TOMPO Andriamanitrao no nanambara izao loza izay nanjo ity tanàna ity izao. '
  '3':
  - type: text
    content: 'NY TOMPO no nahatonga izany ka nanatanteraka araka izay nolazainy, noho ny nanotanareo tamin’NY TOMPO sy ny tsy nihainoanareo ny feony; izany no nahatonga izao zavatra izao taminareo. '
  '4':
  - type: text
    content: 'Ary indro, ankehitriny vahàko izao ny gadra amin’ny tananao. Koa raha sitraky ny fonao ny hiaraka amiko hankany Babilona dia andao fa hotandremako tsara ianao; nefa raha tsy sitraky ny fonao ny hiaraka amiko ho any Babilona dia mijanòna ihany; indro, ny tany rehetra dia eo anoloanao, koa izay tany tianao sy sitrakao no andehano. '
  '5':
  - type: text
    content: 'Ary raha tsy mbola nety nandeha izy dia hoy i Nebozaradana: Miverena indray any amin’i Gedalia, zanak’i Ahikama, zanak’i Safana, izay voatendrin’ny mpanjakan’i Babilona ho mpanapaka ny tanànan’ny Joda ka tomoera any aminy miaraka amin’ny olona, na mandehana any amin’izay tianao haleha na aiza na aiza. Dia nomen’ny lehiben’ny mpiambina vatsy sy fanomezana izy ka nalefany handeha. '
  '6':
  - type: text
    content: Ary i Jeremia dia nankany amin’i Gedalia, zanak’i Ahikama, tany Mizpa ka niara-monina taminy tao amin’ny vahoaka izay sisa velona teo amin’ny tany.
  - type: heading
    content: Nivondrona nanodidina an’i Gedalia ny avy any amin’ny tanin’ny Joda
  - type: heading
    content: Ampit. 2Mpa 25.22-26
  '7':
  - type: text
    content: 'Ary rehefa ren’ny mpifehy ny miaramila rehetra izay tany an-tsaha sy ny olom-peheziny fa ny mpanjakan’i Babilona dia efa nanendry an’i Gedalia, zanak’i Ahikama, ho mpanapaka ny tany sy ho mpitandrina ny lehilahy mbamin’ny zaza amam-behivavy ary ny mahantra sasany teo amin’ny tany izay tsy mbola lasan-ko babo tany Babilona, '
  '8':
  - type: text
    content: 'dia tonga tany amin’i Gedalia tany Mizpa izy, dia Ismaela, zanak’i Netania; i Johanana sy i Jonatana, zanak’i Karea; i Seraia, zanak’i Tanometa; ny zanak’i Efay netofatita ary i Jazania, zanak’ilay Makatita, dia izy ireny sy ny olom-peheziny avy. '
  '9':
  - type: text
    content: 'Ary i Gedalia, zanak’i Ahikama, zanak’i Safana, dia nianiana taminy sy tamin’ny olom-peheziny hoe: Aza matahotra hanompo ny Kaldeana; monena amin’ny tany ka manompoa ny mpanjakan’i Babilona, dia hahita soa ianareo. '
