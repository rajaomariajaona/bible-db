document_id: 1JN.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Izay efa renay, efa hitanay ary efa notsapain’ny tananay
  - type: text
    content: 'Izay efa hatramin’ny voalohany, dia izay efa renay, izay efa hitan’ny masonay, izay efa nojerenay sady efa notsapain’ny tananay, dia ny amin’ny Tenin’ny Fiainana, '
  '10':
  - type: text
    content: 'Raha hoy isika: Tsy nanota isika, dia mampandainga Azy isika, ary ny teniny dia tsy ato anatintsika.'
  '2':
  - type: text
    content: 'fa efa naseho ny fiainana, ary efa nahita azy izahay, dia tonga vavolombelona ka manambara aminareo ny fiainana mandrakizay izay tao amin’ny Ray ka efa naseho taminay, '
  '3':
  - type: text
    content: 'izay efa hitanay sy renay no ambaranay aminareo mba hahazoanareo fiombonana aminay koa. Ary ny fiombonanay dia amin’ny Ray sy amin’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Zanany. '
  '4':
  - type: text
    content: Ary izao zavatra izao no soratanay mba ho tanteraka ny fifaliantsika.
  - type: heading
    content: Mandeha amin’ny mazava
  '5':
  - type: text
    content: 'Ary izao no teny renay Taminy ka ambaranay aminareo: Andriamanitra dia mazava ary tsy misy maizina akory ao Aminy.'
  '6':
  - type: text
    content: 'Raha hoy isika: Manana fiombonana Aminy isika kanefa mandeha amin’ny maizina, dia mandainga isika ka tsy manao ny marina. '
  '7':
  - type: text
    content: Fa raha mandeha eo amin’ny mazava isika, tahaka Azy eo amin’ny mazava, dia manana fiombonana isika, ary ny ran’i Jesosy Zanany no manadio antsika ho afaka amin’ny ota rehetra.
  '8':
  - type: text
    content: 'Raha hoy isika: Tsy manana ota isika, dia mamita-tena isika, ary ny marina tsy ato anatintsika. '
  '9':
  - type: text
    content: 'Raha miaiky ny fahotantsika isika, Izy izay mahatoky sy marina, dia mamela ny fahotantsika sy manadio antsika ho afaka amin’ny tsy fahamarinana rehetra. '
