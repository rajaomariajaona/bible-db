document_id: 1JN.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay efa renay, efa hitanay ary efa notsapain’ny tananay
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izay efa hatramin’ny voalohany, dia izay efa renay, izay efa hitan’ny masonay, izay efa nojerenay sady efa notsapain’ny tananay, dia ny amin’ny Tenin’ny Fiainana, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Raha hoy isika: Tsy nanota isika, dia mampandainga Azy isika, ary ny teniny dia tsy ato anatintsika.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'fa efa naseho ny fiainana, ary efa nahita azy izahay, dia tonga vavolombelona ka manambara aminareo ny fiainana mandrakizay izay tao amin’ny Ray ka efa naseho taminay, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'izay efa hitanay sy renay no ambaranay aminareo mba hahazoanareo fiombonana aminay koa. Ary ny fiombonanay dia amin’ny Ray sy amin’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Zanany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary izao zavatra izao no soratanay mba ho tanteraka ny fifaliantsika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandeha amin’ny mazava
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary izao no teny renay Taminy ka ambaranay aminareo: Andriamanitra dia mazava ary tsy misy maizina akory ao Aminy.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Raha hoy isika: Manana fiombonana Aminy isika kanefa mandeha amin’ny maizina, dia mandainga isika ka tsy manao ny marina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa raha mandeha eo amin’ny mazava isika, tahaka Azy eo amin’ny mazava, dia manana fiombonana isika, ary ny ran’i Jesosy Zanany no manadio antsika ho afaka amin’ny ota rehetra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Raha hoy isika: Tsy manana ota isika, dia mamita-tena isika, ary ny marina tsy ato anatintsika. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Raha miaiky ny fahotantsika isika, Izy izay mahatoky sy marina, dia mamela ny fahotantsika sy manadio antsika ho afaka amin’ny tsy fahamarinana rehetra. '
