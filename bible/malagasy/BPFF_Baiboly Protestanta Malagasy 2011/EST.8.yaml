document_id: EST.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany dia nomen’i Ahasoerosy mpanjaka ho an’i Estera, vadin’ny mpanjaka, ny tranon’i Hamana, fahavalon’ny Jiosy. Ary nankeo anatrehan’ny mpanjaka i Mordekay satria efa voalazan’i Estera ny fihavanany taminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy taratasy nosoratana tamin’ny anaran’i Ahasoerosy mpanjaka ka notombohina tamin’ny peratra fitombo-kasen’ny mpanjaka; ary ny taratasy dia nampitondraina ny iraka haingam-pandeha mitaingin-tsoavaly sy soavaly haingam-pandeha ary ampondra avy ao amin’ny tranon-tsoavalin’ny mpanjaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Jiosy izay tany amin’ny tanàna tsirairay dia navelan’ny mpanjaka hivory hiaro ny ainy ary handringana sy hamono ka handripaka ny herim-bahoaka rehetra sy ny fari-piadidiany rehetra izay te hiady aminy mbamin’ny vady aman-janak’ireny ary handroba ny fananany '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin’ny andro iray ihany any amin’ny fari-piadidiana rehetra manerana ny fanjakan’i Ahasoerosy mpanjaka, dia amin’ny andro fahatelo amby folo amin’ny volana faharoa amby folo na ny volana Adara. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny dika mitovy amin’ny teny natao didy ho amin’ny fari-piadidiana tsirairay manerana ny fanjakana dia novakina tamin’ny olona rehetra mba hampiomana ny Jiosy ho amin’izany andro izany, izay hamaliany ny fahavalony. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia lasa ny iraka haingam-pandeha izay nitaingina soavaly haingam-pandeha sy ampondra, nohafainganina sy nododonan’ny tenin’ny mpanjaka izy ireo. Ary novakina tany Sosana, tanàna mimanda, koa ny didy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny nialan’i Mordekay teo anatrehan’ny mpanjaka dia nanao akanjo fiandrianana manga sy fotsy izy sady nisatroka satroboninahitra volamena lehibe ary niakanjo akanjo lava rongony fotsy madinika sy volomparasy; dia faly sy ravo ny tanàna Sosana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo amin’ny Jiosy dia fahazavana, haravoravoana, fifaliana ary voninahitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary teo amin’ny fari-piadidiana tsirairay manerana ny fanjakana sy teny amin’ny tanàna tsirairay izay nahatongavan’ny didin’ny mpanjaka sy ny teniny dia nahazo hafaliana sy haravoravoana ny Jiosy sady nanao fanasana sy andro fifaliana. Ary maro ny olona tompon-tany no nitonon-tena ho Jiosy satria nahazo azy ny fahatahorana ny Jiosy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nesorin’ny mpanjaka ny peratra fitombo-kaseny izay nalainy tamin’i Hamana ka nomeny an’i Mordekay. Ary notendren’i Estera i Mordekay hanapaka ny tranon’i Hamana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny didim-panjakana mampisandratra ny Jiosy
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny teo anatrehan’ny mpanjaka indray i Estera sady niankohoka tamin’ny tongony ka nitomany sy nifona taminy mba hahafoana ny ratsy nataon’i Hamana agagita sy ny hevitra nataony hamelezana ny Jiosy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanondro an’i Estera tamin’ny tehina volamena ny mpanjaka. Dia nitsangana i Estera ka nijoro teo anatrehan’ny mpanjaka '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary niteny hoe: Raha sitraky ny mpanjaka, ary mahita fitia eto imasony aho, sady ataon’ny mpanjaka ho mety izany, ka mahita sitraka eto imasony aho, dia aoka hisy soratra hanova ireny taratasy voahevitr’i Hamana, zanak’i Hamedota agagita, ireny, izay nosoratany mba handringanana ny Jiosy any amin’ny fari-piadidiana rehetra manerana ny fanjakan’ny mpanjaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hataoko ahoana no fijery ny loza hanjo ny fireneko? Ary hataoko ahoana no fijery ny fandringanana ny fianakaviako?
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Ahasoerosy mpanjaka tamin’i Estera, vadin’ny mpanjaka, sy tamin’i Mordekay jiosy: Indro ny tranon’i Hamana dia efa nomeko an’i Estera; izy dia efa nahantona tamin’ny hazo satria nanatsotra ny tanany hamely ny Jiosy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary manorata amin’ny anaran’ny mpanjaka araka izay sitrakareo kosa ianareo hamonjena ny Jiosy koa tombohy amin’ny peratra fitombo-kasen’ny mpanjaka izany. Fa tsy misy mahavadika ny soratra izay voasoratra tamin’ny anaran’ny mpanjaka sy voatomboka tamin’ny peratra fitombo-kasen’ny mpanjaka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nantsoina tamin’izay ny mpitantsoratry ny mpanjaka, tamin’ny andro fahatelo amby roapolo tamin’ny volana fahatelo na ny volana Sivàna; ary nosoratana araka izay didy rehetra nomen’i Mordekay izany ho any amin’ny Jiosy sy ny solontenan’ny mpanjaka sy ny governora ary ny mpitondra amin’ny fari-piadidiana hatrany India ka hatrany Kosy; dia fari-piadidiana fito amby roapolo amby zato, ny fari-piadidiana tsirairay araka ny fomba fanoratany avy, ny firenena tsirairay araka ny fiteniny avy ary ny Jiosy araka ny fomba fanoratany sy araka ny fiteniny. '
