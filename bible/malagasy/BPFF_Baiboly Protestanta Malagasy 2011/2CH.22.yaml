document_id: 2CH.22,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakan’i Ahazia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 8.25-29
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampanjaka an’i Ahazia, faralahin’i Jehorama, handimby azy ny mponina tany Jerosalema; fa ny zokiny rehetra izay nanaraka ny Arabo hatrany an-toby dia efa matin’ny andian-tafika avokoa. Koa i Ahazia, zanak’i Jehorama, mpanjakan’ny Joda, no nanjaka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitan’i Atalia, renin’i Ahazia, fa maty ny zanany, dia nitsangana izy ka nandringana ny taranaky ny mpanjaka rehetra tamin’ny taranak’i Joda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Joseba, zanakavavin’ny mpanjaka, dia naka an’i Joasy, zanak’i Ahazia, ka nanala azy avy teo amin’ireo zanaky ny mpanjaka izay novonoina, dia nampiditra azy sy ny mpitaiza azy ho ao amin’ny efitrano fandriana. Nafenin’i Joseba, zanakavavin’i Jehorama mpanjaka, vadin’i Joiada mpisorona, izy, fa anabavin’i Ahazia mantsy Ravehivavy, mba tsy ho hitan’i Atalia, dia tsy voavonony izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niery nandritra ny enin-taona tao aminy tao amin’ny tranon’Andriamanitra izy, fa i Atalia no nanjaka tamin’ny tany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Roa amby roapolo taona i Ahazia, raha nanomboka nanjaka, ary herintaona no nanjakany tany Jerosalema. Ary ny anaran’ny reniny dia Atalia, zanakavavin’i Omry. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandeha tamin’ny lalan’ireo taranak’i Ahaba koa izy; fa ny reniny no nanome saina azy hanao ratsy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao izay ratsy teo imason’NY TOMPO toy ny taranak’i Ahaba izy; satria ireny no nanome saina azy taorianan’ny nahafatesan’ny rainy ka nampidi-doza taminy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny saina nomen’ireo azy no narahiny ka niara-nandeha tamin’i Jorama, zanak’i Ahaba, mpanjakan’ny Israely, izy, hiady tamin’i Hazaela, mpanjakan’i Arama, tao Ramota-Gileada; ary nahavoa an’i Jorama ny Arameana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niverina tao Jezirela izy nitondra ny feriny hotsaboina tamin’ny nahavoazana azy tao Rama, fony izy niady tamin’i Hazaela, mpanjakan’i Arama. Ary nidina hamangy an’i Jorama, zanak’i Ahaba, tao Jezirela i Ahazia, zanak’i Jehorama, mpanjakan’ny Joda satria narary izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tamin’Andriamanitra ny loza nanjo an’i Ahazia tamin’ny nankanesany nankany amin’i Jorama. Nony tonga izy dia niara-niainga tamin’i Jorama mba hitsena an’i Jeho, zanak’i Nimsy, izay nohosoran’NY TOMPO handringana ny taranak’i Ahaba. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny namalian’i Jeho ny taranak’i Ahaba dia hitany ireo mpanapaka ny Joda sy ny zana-drahalahin’i Ahazia, izay nanompo an’i Ahazia, ka novonoiny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitady an’i Ahazia koa izy; kanefa nisy nahita izy, raha mbola niery tany Samaria ka noentina ho any amin’i Jeho; novonoin’ny olona izy ka naleviny; fa hoy ireo: Zanak’i Josafata, ilay nitady NY TOMPO tamin’ny fony manontolo, ity. Tsy nahatana ny fanjakana ny terak’i Ahazia.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandrombaka ny fanjakana i Atalia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 11.1-3
    marker-yv: yv-h
