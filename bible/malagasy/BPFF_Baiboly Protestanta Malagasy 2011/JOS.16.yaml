document_id: JOS.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zaratanin’ny taranak’i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny faritry ny tany azon’ny taranak’i Josefa tamin’ny antsapaka dia hatrany Jordana tandrifin’i Jeriko, dia tao amin’ny ranon’i Jeriko atsinanana, hatrany amin’ny tany efitra izay fiakarana avy any Jeriko, mamakivaky ny tany be havoana any Betela, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'hatreo Betela ka hatrany Lozy, nandroso hatrany amin’ny sisintanin’ny Arkita any Atarota, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'nidina niankandrefana nahazo ny sisintanin’ny Jafleta ka hatramin’ny sisintanin’i Bety-Horona ambany sy i Gezera, nihatra tamin’ny ranomasina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia nandray ny lovany i Manase sy i Efraima, taranak’i Josefa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny sisintanin’ny taranak’i Efraima araka ny fokony kosa dia izao: Ny sisintany atsinanana amin’ny lovany dia hatrany Atarota-Adara ka hatrany Bety-Horona ambony. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny sisintaniny dia nandroso niankandrefana hatrany avaratr’i Mikmeta, niolaka niantsinanana hatrany Tanata-Silo, nihoatra eo atsinanany hatrany Janoha, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'nidina hatrany Janoha, hatrany Atarota sy Narata, nipaka hatrany Jeriko ary nihatra tany Jordana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Avy ao Tapoa, ny sisintany dia miantoraka mankany andrefana hatrany amin’ny lohasahan-driakan’i Kana ka mihatra amin’ny ranomasina. Izany no lovan’ny foko taranak’i Efraima araka ny fianakaviany avy, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mbamin’ny tanàna natokana ho an’ny taranak’i Efraima teo amin’ny lovan’ny taranak’i Manase koa, dia ny tanàna rehetra mbamin’ny vohitra miankina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary tsy nandroaka ny Kananita izay nonina tany Gezera izy; fa monina eo amin’i Efraima ny Kananita mandraka androany ka ampanaovina fanompoana.
