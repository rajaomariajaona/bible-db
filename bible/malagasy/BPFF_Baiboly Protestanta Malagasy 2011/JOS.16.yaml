document_id: JOS.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zaratanin’ny taranak’i Josefa
  - type: text
    content: 'Ny faritry ny tany azon’ny taranak’i Josefa tamin’ny antsapaka dia hatrany Jordana tandrifin’i Jeriko, dia tao amin’ny ranon’i Jeriko atsinanana, hatrany amin’ny tany efitra izay fiakarana avy any Jeriko, mamakivaky ny tany be havoana any Betela, '
  '10':
  - type: text
    content: Ary tsy nandroaka ny Kananita izay nonina tany Gezera izy; fa monina eo amin’i Efraima ny Kananita mandraka androany ka ampanaovina fanompoana.
  '2':
  - type: text
    content: 'hatreo Betela ka hatrany Lozy, nandroso hatrany amin’ny sisintanin’ny Arkita any Atarota, '
  '3':
  - type: text
    content: 'nidina niankandrefana nahazo ny sisintanin’ny Jafleta ka hatramin’ny sisintanin’i Bety-Horona ambany sy i Gezera, nihatra tamin’ny ranomasina. '
  '4':
  - type: text
    content: Dia nandray ny lovany i Manase sy i Efraima, taranak’i Josefa.
  '5':
  - type: text
    content: 'Ny sisintanin’ny taranak’i Efraima araka ny fokony kosa dia izao: Ny sisintany atsinanana amin’ny lovany dia hatrany Atarota-Adara ka hatrany Bety-Horona ambony. '
  '6':
  - type: text
    content: 'Ary ny sisintaniny dia nandroso niankandrefana hatrany avaratr’i Mikmeta, niolaka niantsinanana hatrany Tanata-Silo, nihoatra eo atsinanany hatrany Janoha, '
  '7':
  - type: text
    content: 'nidina hatrany Janoha, hatrany Atarota sy Narata, nipaka hatrany Jeriko ary nihatra tany Jordana. '
  '8':
  - type: text
    content: 'Avy ao Tapoa, ny sisintany dia miantoraka mankany andrefana hatrany amin’ny lohasahan-driakan’i Kana ka mihatra amin’ny ranomasina. Izany no lovan’ny foko taranak’i Efraima araka ny fianakaviany avy, '
  '9':
  - type: text
    content: 'mbamin’ny tanàna natokana ho an’ny taranak’i Efraima teo amin’ny lovan’ny taranak’i Manase koa, dia ny tanàna rehetra mbamin’ny vohitra miankina aminy. '
