document_id: JOB.26,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny navalin’i Joba: Izao va no mba famonjena omenao ahy?'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia namaly i Joba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Asiany faritra boribory eny ambonin’ny rano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’izay ihaonan’ny mazava sy ny maizina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny andry iorenan’ny lanitra dia mihozongozona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ankona noho ny teny mafy ataony.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny heriny no entiny mampanonja ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahendreny no anorotoroany an’i Rahaba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.13.
      marker-yv: yv-n
    - type: text
      text: ;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ny fofonainy no mampadio ny lanitra ho mamirapiratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanany no nitomboka ny menarana mandositra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Indro ireny rehetra ireny dia ny ivelambelany amin’ny asany ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ako mamelovelo izay andrenesantsika Azy ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha ny fikotrokotroky ny heriny, iza moa no mahatakatra izany?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Endre! Izato fanohananao ny tsy manan-kery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izato fampatanjahanao ny sandry malemy!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mahay manolotsaina ny tsy hendry ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampahafantatra fahendrena betsaka!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Iza anefa no andaharanao teny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary avy amin’iza ny fanahiny izay mivoaka avy aminao?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny matoatoa dia mitaintaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any ambanin’ny rano sy izay monina any.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' dia mihanjahanja eo anatrehany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy rakotra tamin’ny fandringanana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mamelatra ny lanitra avaratra eny ambonin’ny habakabaka Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manantona ny tany eo amin’ny tsy misy na inona na inona.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fonosiny ao anatin’ireo rahony matevina ny rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny fanambanin’ny rahona dia tsy mety triatra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Manakona ny sezafiandrianany tsy ho hitantsika Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny amelarany ny rahony hanarona azy.
