document_id: JOB.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba: Izao va no mba famonjena omenao ahy?'
  - type: text
    content: 'Dia namaly i Joba hoe:'
  '10':
  - type: text
    content: Asiany faritra boribory eny ambonin’ny rano,
  - type: text
    content: eo amin’izay ihaonan’ny mazava sy ny maizina.
  '11':
  - type: text
    content: Ny andry iorenan’ny lanitra dia mihozongozona
  - type: text
    content: sady ankona noho ny teny mafy ataony.
  '12':
  - type: text
    content: Ny heriny no entiny mampanonja ny ranomasina
  - type: text
    content: ary ny fahendreny no anorotoroany an’i Rahaba
  - type: note
    content: Zahao 9.13.
  - type: text
    content: ;
  '13':
  - type: text
    content: ny fofonainy no mampadio ny lanitra ho mamirapiratra;
  - type: text
    content: ny tanany no nitomboka ny menarana mandositra.
  '14':
  - type: text
    content: Indro ireny rehetra ireny dia ny ivelambelany amin’ny asany ihany,
  - type: text
    content: ako mamelovelo izay andrenesantsika Azy ihany;
  - type: text
    content: fa raha ny fikotrokotroky ny heriny, iza moa no mahatakatra izany?
  '2':
  - type: text
    content: Endre! Izato fanohananao ny tsy manan-kery
  - type: text
    content: sy izato fampatanjahanao ny sandry malemy!
  '3':
  - type: text
    content: Mahay manolotsaina ny tsy hendry ianao
  - type: text
    content: ary mampahafantatra fahendrena betsaka!
  '4':
  - type: text
    content: Iza anefa no andaharanao teny?
  - type: text
    content: Ary avy amin’iza ny fanahiny izay mivoaka avy aminao?
  '5':
  - type: text
    content: Ny matoatoa dia mitaintaina
  - type: text
    content: any ambanin’ny rano sy izay monina any.
  '6':
  - type: text
    content: 'Ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' dia mihanjahanja eo anatrehany'
  - type: text
    content: ary tsy misy rakotra tamin’ny fandringanana.
  '7':
  - type: text
    content: Mamelatra ny lanitra avaratra eny ambonin’ny habakabaka Izy
  - type: text
    content: ary manantona ny tany eo amin’ny tsy misy na inona na inona.
  '8':
  - type: text
    content: Fonosiny ao anatin’ireo rahony matevina ny rano
  - type: text
    content: nefa ny fanambanin’ny rahona dia tsy mety triatra.
  '9':
  - type: text
    content: Manakona ny sezafiandrianany tsy ho hitantsika Izy
  - type: text
    content: amin’ny amelarany ny rahony hanarona azy.
