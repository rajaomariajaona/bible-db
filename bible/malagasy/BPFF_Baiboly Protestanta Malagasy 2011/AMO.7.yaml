document_id: AMO.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fahitana voalohany: Ny andiam-balala'
  - type: text
    content: 'Izao no nasehon’NY TOMPO Andriamanitra tamiko: Indro, namorona andiam-balala Izy rehefa nanomboka nitsimoka iny ny kolokolon’ahitra, kolokolon’izay nojinjaina ho an’ny mpanjaka. '
  '10':
  - type: text
    content: 'Dia nandefa iraka tany amin’i Jeroboama, mpanjakan’ny Israely i Amazia, mpisorona tao Betela, hilaza hoe: Manao tetika fikomiana aminao eo anivon’ny taranak’Israely i Amosa, ary tsy zakan’ny tany ny teniny rehetra. '
  '11':
  - type: text
    content: 'Satria hoy i Amosa:'
  - type: text
    content: Ho fatin-tsabatra i Jeroboama
  - type: text
    content: ary hobaboana hiala amin’ny taniny tokoa ny Israely.
  '12':
  - type: text
    content: 'Ary hoy i Amazia tamin’i Amosa: Ry mpahita! Andeha mandositra mankany amin’ny tanin’ny Joda ianao; any ianao no hihinan-kanina ary any ianao no haminany. '
  '13':
  - type: text
    content: Aza maminany eto Betela intsony fa fitoerana masin’ny mpanjaka sy tranom-panjakana ity.
  '14':
  - type: text
    content: 'Dia namaly an’i Amazia i Amosa hoe: Tsy mba mpaminany aho na zanaky ny mpaminany; mpiandry ondry sy mpikarakara aviavy aho. '
  '15':
  - type: text
    content: 'Nefa nalain’NY TOMPO tany am-piandrasana ondry aho ka nitenenany hoe: Mandehana ka maminania amin’ny Israely oloko. '
  '16':
  - type: text
    content: 'Koa henoy ankehitriny ny tenin’NY TOMPO: Ianao no milaza hoe: Aza maminany hamelezana ny Israely ary aza miteny mamely ny taranak’Isaka! '
  '17':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO:'
  - type: text
    content: Hijangajanga ao an-tanàna ny vadinao,
  - type: text
    content: ho lavon-tsabatra ny zanakao lahy sy ny zanakao vavy,
  - type: text
    content: hozaraina amin’ny kofehy fandrefesana ny taninao;
  - type: text
    content: ho faty any amin’ny tany maloto ny tenanao
  - type: text
    content: ary hobaboina hiala amin’ny taniny tokoa ny Israely.
  '2':
  - type: text
    content: 'Nony laniny avokoa ny zavamaniry amin’ny tany dia hoy aho: TOMPO Andriamanitra ô, mifona aminao aho, mamelà heloka! Hataon’i Jakoba ahoana no fahajoro? Kely ange izy e! '
  '3':
  - type: text
    content: Nanenenan’NY TOMPO izany. Tsy hisy izany, hoy NY TOMPO.
  - type: heading
    content: 'Ny fahitana faharoa: Ny afo'
  '4':
  - type: text
    content: 'Izao no nasehon’NY TOMPO Andriamanitra tamiko: Indro, NY TOMPO Andriamanitra niantso fitsarana amin’ny afo ka nandevona ny '
  - type: text
    content: lalina lehibe
  - type: text
    content: ' ary nandany ny zaralova izany. '
  '5':
  - type: text
    content: 'Dia hoy aho: TOMPO Andriamanitra ô, mifona aminao aho, mitsahara re! Hataon’i Jakoba ahoana no fahajoro? Kely ange izy e! '
  '6':
  - type: text
    content: Nanenenan’NY TOMPO izany. Tsy hisy koa izany, hoy NY TOMPO Andriamanitra.
  - type: heading
    content: 'Ny fahitana fahatelo: Ny fandrefesana marindrano'
  '7':
  - type: text
    content: 'Izao no nasehony ahy: Indro, ny Tompo nitsangana teo ambonin’ny manda, sady nisy fandrefesana marindrano teny an-tanany. '
  '8':
  - type: text
    content: 'Dia hoy NY TOMPO tamiko: Inona no hitanao, ry Amosa? Ary hoy aho: Fandrefesana marindrano. Dia hoy ny Tompo: Indro, hanisy fandrefesana marindrano eo amin’ny Israely oloko Aho fa tsy handefitra aminy intsony.'
  '9':
  - type: text
    content: Ho foana ireo toerana fanaovana sorona an’Isaka,
  - type: text
    content: ho rava ireo fitoerana masin’ny Israely
  - type: text
    content: ary hitsangana Aho ka hamely ny taranak’i Jeroboama amin’ny sabatra.
  - type: heading
    content: Voaroaka hiala tao Betela i Amosa
