document_id: AMO.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fahitana voalohany: Ny andiam-balala'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no nasehon’NY TOMPO Andriamanitra tamiko: Indro, namorona andiam-balala Izy rehefa nanomboka nitsimoka iny ny kolokolon’ahitra, kolokolon’izay nojinjaina ho an’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nony laniny avokoa ny zavamaniry amin’ny tany dia hoy aho: TOMPO Andriamanitra ô, mifona aminao aho, mamelà heloka! Hataon’i Jakoba ahoana no fahajoro? Kely ange izy e! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nanenenan’NY TOMPO izany. Tsy hisy izany, hoy NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fahitana faharoa: Ny afo'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no nasehon’NY TOMPO Andriamanitra tamiko: Indro, NY TOMPO Andriamanitra niantso fitsarana amin’ny afo ka nandevona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalina lehibe
  - type: text
    text: ' ary nandany ny zaralova izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy aho: TOMPO Andriamanitra ô, mifona aminao aho, mitsahara re! Hataon’i Jakoba ahoana no fahajoro? Kely ange izy e! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nanenenan’NY TOMPO izany. Tsy hisy koa izany, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fahitana fahatelo: Ny fandrefesana marindrano'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no nasehony ahy: Indro, ny Tompo nitsangana teo ambonin’ny manda, sady nisy fandrefesana marindrano teny an-tanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy NY TOMPO tamiko: Inona no hitanao, ry Amosa? Ary hoy aho: Fandrefesana marindrano. Dia hoy ny Tompo: Indro, hanisy fandrefesana marindrano eo amin’ny Israely oloko Aho fa tsy handefitra aminy intsony.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho foana ireo toerana fanaovana sorona an’Isaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho rava ireo fitoerana masin’ny Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitsangana Aho ka hamely ny taranak’i Jeroboama amin’ny sabatra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voaroaka hiala tao Betela i Amosa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nandefa iraka tany amin’i Jeroboama, mpanjakan’ny Israely i Amazia, mpisorona tao Betela, hilaza hoe: Manao tetika fikomiana aminao eo anivon’ny taranak’Israely i Amosa, ary tsy zakan’ny tany ny teniny rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Satria hoy i Amosa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho fatin-tsabatra i Jeroboama
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hobaboana hiala amin’ny taniny tokoa ny Israely.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Amazia tamin’i Amosa: Ry mpahita! Andeha mandositra mankany amin’ny tanin’ny Joda ianao; any ianao no hihinan-kanina ary any ianao no haminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza maminany eto Betela intsony fa fitoerana masin’ny mpanjaka sy tranom-panjakana ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia namaly an’i Amazia i Amosa hoe: Tsy mba mpaminany aho na zanaky ny mpaminany; mpiandry ondry sy mpikarakara aviavy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nefa nalain’NY TOMPO tany am-piandrasana ondry aho ka nitenenany hoe: Mandehana ka maminania amin’ny Israely oloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa henoy ankehitriny ny tenin’NY TOMPO: Ianao no milaza hoe: Aza maminany hamelezana ny Israely ary aza miteny mamely ny taranak’Isaka! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hijangajanga ao an-tanàna ny vadinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho lavon-tsabatra ny zanakao lahy sy ny zanakao vavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hozaraina amin’ny kofehy fandrefesana ny taninao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho faty any amin’ny tany maloto ny tenanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hobaboina hiala amin’ny taniny tokoa ny Israely.
