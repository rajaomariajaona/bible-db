document_id: PSA.72,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka mba hitahian’Andriamanitra ny mpanjaka
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Nataon’i Solomona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, omeo ny mpanjaka ny fitsaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary omeo ny zanaky ny mpanjaka ny fahamarinanao!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanjakan’i Tarsisy sy ny nosy dia handoa hetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanjakan’i Sheba sy Seba dia hanatitra fanomezana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanjaka rehetra dia hiankohoka eo anatrehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny firenena rehetra dia hanompo azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hamonjy ny mahantra mitaraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny ory tsy manan-kamonjy izy;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiantra ny madinika sy ny mahantra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamonjy ny ain’ny mahantra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanavotra azy amin’ny fampahoriana sy ny fanaovana an-keriny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho sarobidy eo imasony ny rany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho velona izy ary aoka homena volamena avy any Sheba izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hisy fifonana ho azy mandrakariva ary aoka hotsofindrano isanandro izy!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahavoka-bary betsaka ny tany na dia any an-tampon’ny tendrombohitra aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hirondrona tahaka ny any Libanona ny fahavokarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hidokadoka tahaka ny ahitra amin’ny tany ny ao an-tanàna.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho mandrakizay ny anarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mbola maharitra koa ny masoandro dia haharitra ny anarany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no ho fitahiana ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny firenena rehetra dia hanao azy hoe sambatra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie NY TOMPO Andriamanitra, Andriamanitry ny Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy irery ihany no manao fahagagana!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana mandrakizay anie ny anarany malaza!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny tany rehetra ho henika ny voninahiny! Amena! Eny, Amena!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy hitsara ny olonao amin’ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny malahelonao amin’ny fahitsiana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tapitra ny vavaka nataon’i Davida zanak’i Jese.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra dia hahavokatra fiadanana ho an’ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny havoana koa, amin’ny fahamarinana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy hitsara ny ory eo amin’ny vahoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hamonjy ny zanaky ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanorotoro ny mpampahory.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatahotra anao ny olona raha mbola maharitra koa ny masoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny volana hatramin’ny taranaka fara aman-dimby.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidina tahaka ny ranonorana amin’ny saha voajinja izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny ranonorana mivatravatra amin’ny tany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny marina dia hitrebona amin’ny androny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho be ny fiadanana mandra-paha tsy hisy volana intsony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanapaka hatrany amin’ny ranomasina iray ka hatrany amin’ny ranomasina iray izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatrany amin’ny ony Eofrata ka hatrany amin’ny faran’ny tany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mponina any an-tany efitra dia handohalika eo anatrehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahavalony dia hilelaka ny vovoka.
