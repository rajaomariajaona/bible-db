document_id: PSA.72,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka mba hitahian’Andriamanitra ny mpanjaka
  - type: text
    content: Nataon’i Solomona.
  - type: text
    content: Andriamanitra ô, omeo ny mpanjaka ny fitsaranao
  - type: text
    content: ary omeo ny zanaky ny mpanjaka ny fahamarinanao!
  '10':
  - type: text
    content: Ny mpanjakan’i Tarsisy sy ny nosy dia handoa hetra;
  - type: text
    content: ny mpanjakan’i Sheba sy Seba dia hanatitra fanomezana.
  '11':
  - type: text
    content: Ny mpanjaka rehetra dia hiankohoka eo anatrehany
  - type: text
    content: ary ny firenena rehetra dia hanompo azy.
  '12':
  - type: text
    content: Fa hamonjy ny mahantra mitaraina
  - type: text
    content: sy ny ory tsy manan-kamonjy izy;
  '13':
  - type: text
    content: hiantra ny madinika sy ny mahantra izy
  - type: text
    content: ary hamonjy ny ain’ny mahantra.
  '14':
  - type: text
    content: Hanavotra azy amin’ny fampahoriana sy ny fanaovana an-keriny izy
  - type: text
    content: ary ho sarobidy eo imasony ny rany.
  '15':
  - type: text
    content: Aoka ho velona izy ary aoka homena volamena avy any Sheba izy!
  - type: text
    content: Aoka hisy fifonana ho azy mandrakariva ary aoka hotsofindrano isanandro izy!
  '16':
  - type: text
    content: Hahavoka-bary betsaka ny tany na dia any an-tampon’ny tendrombohitra aza,
  - type: text
    content: hirondrona tahaka ny any Libanona ny fahavokarany,
  - type: text
    content: ary hidokadoka tahaka ny ahitra amin’ny tany ny ao an-tanàna.
  '17':
  - type: text
    content: Ho mandrakizay ny anarany;
  - type: text
    content: raha mbola maharitra koa ny masoandro dia haharitra ny anarany.
  - type: text
    content: Izy no ho fitahiana ny olona;
  - type: text
    content: ny firenena rehetra dia hanao azy hoe sambatra.
  '18':
  - type: text
    content: Isaorana anie NY TOMPO Andriamanitra, Andriamanitry ny Israely;
  - type: text
    content: Izy irery ihany no manao fahagagana!
  '19':
  - type: text
    content: Isaorana mandrakizay anie ny anarany malaza!
  - type: text
    content: Ary aoka ny tany rehetra ho henika ny voninahiny! Amena! Eny, Amena!
  '2':
  - type: text
    content: Aoka izy hitsara ny olonao amin’ny fahamarinana
  - type: text
    content: ary ny malahelonao amin’ny fahitsiana.
  '20':
  - type: text
    content: Tapitra ny vavaka nataon’i Davida zanak’i Jese.
  '3':
  - type: text
    content: Ny tendrombohitra dia hahavokatra fiadanana ho an’ny olona;
  - type: text
    content: eny, ny havoana koa, amin’ny fahamarinana.
  '4':
  - type: text
    content: Aoka izy hitsara ny ory eo amin’ny vahoaka
  - type: text
    content: sy hamonjy ny zanaky ny mahantra
  - type: text
    content: ary hanorotoro ny mpampahory.
  '5':
  - type: text
    content: Hatahotra anao ny olona raha mbola maharitra koa ny masoandro
  - type: text
    content: sy ny volana hatramin’ny taranaka fara aman-dimby.
  '6':
  - type: text
    content: Hidina tahaka ny ranonorana amin’ny saha voajinja izy,
  - type: text
    content: tahaka ny ranonorana mivatravatra amin’ny tany.
  '7':
  - type: text
    content: Ny marina dia hitrebona amin’ny androny
  - type: text
    content: ary ho be ny fiadanana mandra-paha tsy hisy volana intsony.
  '8':
  - type: text
    content: Hanapaka hatrany amin’ny ranomasina iray ka hatrany amin’ny ranomasina iray izy
  - type: text
    content: ary hatrany amin’ny ony Eofrata ka hatrany amin’ny faran’ny tany.
  '9':
  - type: text
    content: Ny mponina any an-tany efitra dia handohalika eo anatrehany
  - type: text
    content: ary ny fahavalony dia hilelaka ny vovoka.
