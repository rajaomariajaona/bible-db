document_id: PSA.72
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka mba hitahian’Andriamanitra ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Nataon’i Solomona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andriamanitra ô, omeo ny mpanjaka ny fitsaranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary omeo ny zanaky ny mpanjaka ny fahamarinanao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka izy hitsara ny olonao amin’ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny malahelonao amin’ny fahitsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny tendrombohitra dia hahavokatra fiadanana ho an’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny havoana koa, amin’ny fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka izy hitsara ny ory eo amin’ny vahoaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamonjy ny zanaky ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanorotoro ny mpampahory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hatahotra anao ny olona raha mbola maharitra koa ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny volana hatramin’ny taranaka fara aman-dimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hidina tahaka ny ranonorana amin’ny saha voajinja izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny ranonorana mivatravatra amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny marina dia hitrebona amin’ny androny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho be ny fiadanana mandra-paha tsy hisy volana intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hanapaka hatrany amin’ny ranomasina iray ka hatrany amin’ny ranomasina iray izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatrany amin’ny ony Eofrata ka hatrany amin’ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny mponina any an-tany efitra dia handohalika eo anatrehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahavalony dia hilelaka ny vovoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny mpanjakan’i Tarsisy sy ny nosy dia handoa hetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpanjakan’i Sheba sy Seba dia hanatitra fanomezana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny mpanjaka rehetra dia hiankohoka eo anatrehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny firenena rehetra dia hanompo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa hamonjy ny mahantra mitaraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny ory tsy manan-kamonjy izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: hiantra ny madinika sy ny mahantra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamonjy ny ain’ny mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hanavotra azy amin’ny fampahoriana sy ny fanaovana an-keriny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho sarobidy eo imasony ny rany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aoka ho velona izy ary aoka homena volamena avy any Sheba izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hisy fifonana ho azy mandrakariva ary aoka hotsofindrano isanandro izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hahavoka-bary betsaka ny tany na dia any an-tampon’ny tendrombohitra aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hirondrona tahaka ny any Libanona ny fahavokarany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hidokadoka tahaka ny ahitra amin’ny tany ny ao an-tanàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho mandrakizay ny anarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mbola maharitra koa ny masoandro dia haharitra ny anarany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no ho fitahiana ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny firenena rehetra dia hanao azy hoe sambatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Isaorana anie NY TOMPO Andriamanitra, Andriamanitry ny Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy irery ihany no manao fahagagana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Isaorana mandrakizay anie ny anarany malaza!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ny tany rehetra ho henika ny voninahiny! Amena! Eny, Amena!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tapitra ny vavaka nataon’i Davida zanak’i Jese.
