document_id: NUM.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anjara raharahan’ny levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izao no taranak’i Arona sy i Mosesy tamin’ny andro nitenenan’NY TOMPO tamin’i Mosesy teo amin’ny tendrombohitra Sinay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Toy izao ny anaran’ireo zanakalahin’i Arona: I Nadaba lahimatoa, i Abiho, i Eleazara ary Itamara. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ireo no anaran’ny zanakalahin’i Arona, dia ny mpisorona voahosotra, izay natokana hanao fisoronana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Maty teo anatrehan’NY TOMPO i Nadaba sy i Abiho tamin’izy ireo nanatitra afo tsy izy teo anatrehan’NY TOMPO tany amin’ny tany efitr’i Sinay, sady samy tsy nanan-janaka izy mirahalahy. Koa i Eleazara sy Itamara no nanao fisoronana teo anatrehan’i Arona rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ampanatony ny fokon’i Levy ka atsangano eo anatrehan’i Arona mpisorona mba hanampy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hitandrina ny anjara raharahan’i Arona sy ny anjara raharahan’ny fiangonana manontolo eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' izy ireo ka hanao ny fanompoana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hitandrina ny fanaka rehetra momba ny tranolay fihaonana sy ny anjara raharahan’ny Zanak’Israely izy ireo ka hanao ny fanompoana ao amin’ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Homenao an’i Arona sy ireo zanany lahy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', fa efa nomena azy mihitsy avy amin’ny Zanak’Israely ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I Arona sy ireo zanany lahy no hotendrenao hitandrina ny fisoronany, fa raha olon-kafa no manakaiky dia hovonoina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Indro Aho efa naka ny levita avy tamin’ny Zanak’Israely ho solon’ny lahimatoa rehetra izay voalohan-teraka eo amin’ny Zanak’Israely, koa Ahy ny levita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Satria Ahy ny lahimatoa rehetra; tamin’ilay andro namelezako ny voalohan-teraka rehetra tany amin’ny tany Ejipta no nanamasinako ny voalohan-teraka rehetra eo amin’ny Israely ho Ahy, na olona, na biby fiompy: Ahy ireo. Izaho no TOMPO.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanisana voalohany natao tamin’ny levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy tany amin’ny tany efitr’i Sinay hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Isao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' araka ny fianakaviany; ny lahy rehetra eo aminy hatramin’ny iray volana no ho miakatra no hisainao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nanisa azy ireo i Mosesy araka ny tenin’NY TOMPO, dia araka izay efa nandidiana azy.
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 6.1-14
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izao no zanakalahin’i Levy, araka ny anarany: I Gersona sy i Kehata ary i Merary. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ireto kosa ny anaran’ireo zanakalahin’i Gersona, araka ny fianakaviany: I Libny sy i Simey. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny zanakalahin’i Kehata, araka ny fianakaviany, dia i Amrama, i Jizara, i Hebrona ary i Oziela. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny zanakalahin’i Merary indray, araka ny fianakaviany, dia i Maly sy i Mosy. Ireo no fokon’ny levita, araka ny fianakaviany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Avy tamin’i Gersona, ny fianakavian’ny Libnita sy ny Simeita: Ireo no fianakavian’ny Gersonita. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izay voaisa, araka ny isan’ny lahy rehetra hatramin’ny iray volana no ho miakatra, dia dimanjato sy fito arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny fianakavian’ny Gersonita dia hitoby eo ivohon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ', avy eo andrefany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny lohan’ny fianakavian’ny Gersonita dia i Eliasafa, zanak’i Laela. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny anjara raharahan’ireo zanak’i Gersona eo amin’ny tranolay fihaonana dia ny tabernakely, ny lay, ny rakotra eo aminy, ny varavarana lamba amin’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ny fefy lamba amin’ny kianja sy ny vavahady lamba amin’ny vavahadin’ny kianja izay manodidina ny tabernakely sy ny alitara, ary ny kofehy rehetra momba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Avy tamin’i Kehata, ny fianakavian’ny Amramita, ny fianakavian’ny Jizarita, ny fianakavian’ny Hebronita ary ny fianakavian’ny Ozielita; ireo no fianakavian’ny Kehatita. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny isan’ny lahy rehetra hatramin’ny iray volana no ho miakatra, izay mpitandrina ny anjara raharaha momba ny fitoerana masina, dia eninjato sy valo arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny fianakavian’ny zanak’i Kehata dia hitoby eo amin’ny lafiny atsimo amin’ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny lohan’ny fianakavian’ny Kehatita dia i Elizafana, zanak’i Oziela. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny anjara raharahany dia ny vata misy ny Vavolombelona, ny latabatra, ny fitoeran-jiro, ny alitara roa sy ireo fanaky ny fitoerana masina, izay ampiasaina amin’ny fanompoam-pivavahana, ary koa ny varavarana lamba mbamin’izay zavatra rehetra momba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny lehiben’ireo lohan’ny levita dia i Eleazara, zanak’i Arona mpisorona, izay lehiben’ireo mpitandrina ny anjara raharaha ny amin’ny fitoerana masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Avy tamin’i Merary, ny fianakavian’ny Malita sy ny fianakavian’ny Mosita. Ireo no fianakavian’i Merary. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Izay voaisa, araka ny isan’ny lahy rehetra hatramin’ny iray volana no ho miakatra, dia roanjato sy enina arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny lohan’ny fianakavian’i Merary dia i Zoriela, zanak’i Abihaila. Ireo no hitoby eo amin’ny lafiny avaratra amin’ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny anjara raharahan’ny zanak’i Merary dia ny hazo fisaka amin’ny tabernakely, ny barany, ny andriny, ny faladiany ary ny fanaka rehetra momba azy mbamin’ny zavatra rehetra momba azy, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ireo andrin’ny kianja manodidina sy ny faladiany, ny tsatòkan-day ary ny kofehy momba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ny hitoby eo anoloan’ny tabernakely, eo atsinanany, izany hoe eo anoloan’ny tranolay fihaonana, tandrifin’ny fiposahan’ny masoandro, dia i Mosesy sy i Arona ary ireo zanany, izay mpitandrina ny anjara raharaha momba ny fitoerana masina, dia ny anjara raharahan’ny Zanak’Israely; fa raha olon-kafa no manakaiky dia hovonoina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ny tontalin’izay voaisa avy tamin’ny levita, dia izay nisain’i Mosesy sy i Arona araka ny didin’NY TOMPO, avy tamin’ny fianakaviany, ny lahy rehetra hatramin’ny iray volana no ho miakatra, dia roa arivo sy roa alina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanavotana ireo voalohan-teraka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Mosesy: Isao ny lahimatoa rehetra eo amin’ny Zanak’Israely hatramin’ny iray volana no ho miakatra ka alao isa araka ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Alao ho Ahy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' ho solon’ny lahimatoa rehetra eo amin’ny Zanak’Israely. Izaho no TOMPO. Ny biby fiompin’ny levita dia ho solon’ny voalohan-teraka rehetra amin’ny biby fiompin’ny Zanak’Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia nisain’i Mosesy ny lahimatoa rehetra teo amin’ny Zanak’Israely, araka izay nandidian’NY TOMPO azy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ny lahimatoa rehetra izay nisaina, araka ny anarany tsirairay, hatramin’ny iray volana no ho miakatra, dia telo amby fitopolo sy roanjato sy roa arivo sy roa alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Alao ny levita ho solon’ny lahimatoa rehetra eo amin’ny Zanak’Israely, ary ny biby fiompin’ny levita ho solon’ny biby fiompiny. Ahy ny levita. Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ny amin’ny fanavotana ireo telo amby fitopolo sy roanjato amin’ny lahimatoan’ny Zanak’Israely, izay mihoatra noho ny isan’ny levita, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'dia hakanao sekela dimy isan’olona; araka ny sekela masina no hakanao azy, gera roapolo ny sekela iray. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Homenao an’i Arona sy ireo zanany ny vola ho fanavotana an’ireo mihoatra isa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary i Mosesy dia nandray ny vola avotr’ireo izay nihoatra tamin’ny isan’ireo voaavotry ny levita; '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'tamin’ny lahimatoan’ny Zanak’Israely no nandraisany ny vola, dia sekela dimy amby enimpolo sy telonjato sy arivo, araka ny sekela masina. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Dia nomen’i Mosesy an’i Arona sy ireo zanany izany vola avotra izany, araka ny tenin’NY TOMPO, araka izay nandidian’NY TOMPO an’i Mosesy.
