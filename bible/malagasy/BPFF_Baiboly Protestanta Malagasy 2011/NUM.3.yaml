document_id: NUM.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny anjara raharahan’ny levita
  - type: text
    content: Izao no taranak’i Arona sy i Mosesy tamin’ny andro nitenenan’NY TOMPO tamin’i Mosesy teo amin’ny tendrombohitra Sinay.
  '10':
  - type: text
    content: I Arona sy ireo zanany lahy no hotendrenao hitandrina ny fisoronany, fa raha olon-kafa no manakaiky dia hovonoina izy.
  '11':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '12':
  - type: text
    content: Indro Aho efa naka ny levita avy tamin’ny Zanak’Israely ho solon’ny lahimatoa rehetra izay voalohan-teraka eo amin’ny Zanak’Israely, koa Ahy ny levita.
  '13':
  - type: text
    content: 'Satria Ahy ny lahimatoa rehetra; tamin’ilay andro namelezako ny voalohan-teraka rehetra tany amin’ny tany Ejipta no nanamasinako ny voalohan-teraka rehetra eo amin’ny Israely ho Ahy, na olona, na biby fiompy: Ahy ireo. Izaho no TOMPO.'
  - type: heading
    content: Fanisana voalohany natao tamin’ny levita
  '14':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy tany amin’ny tany efitr’i Sinay hoe: '
  '15':
  - type: text
    content: 'Isao ny '
  - type: text
    content: levita
  - type: text
    content: ' araka ny fianakaviany; ny lahy rehetra eo aminy hatramin’ny iray volana no ho miakatra no hisainao. '
  '16':
  - type: text
    content: Ary nanisa azy ireo i Mosesy araka ny tenin’NY TOMPO, dia araka izay efa nandidiana azy.
  - type: heading
    content: 1Tan 6.1-14
  '17':
  - type: text
    content: 'Izao no zanakalahin’i Levy, araka ny anarany: I Gersona sy i Kehata ary i Merary. '
  '18':
  - type: text
    content: 'Ireto kosa ny anaran’ireo zanakalahin’i Gersona, araka ny fianakaviany: I Libny sy i Simey. '
  '19':
  - type: text
    content: 'Ny zanakalahin’i Kehata, araka ny fianakaviany, dia i Amrama, i Jizara, i Hebrona ary i Oziela. '
  '2':
  - type: text
    content: 'Toy izao ny anaran’ireo zanakalahin’i Arona: I Nadaba lahimatoa, i Abiho, i Eleazara ary Itamara. '
  '20':
  - type: text
    content: Ny zanakalahin’i Merary indray, araka ny fianakaviany, dia i Maly sy i Mosy. Ireo no fokon’ny levita, araka ny fianakaviany.
  '21':
  - type: text
    content: 'Avy tamin’i Gersona, ny fianakavian’ny Libnita sy ny Simeita: Ireo no fianakavian’ny Gersonita. '
  '22':
  - type: text
    content: 'Izay voaisa, araka ny isan’ny lahy rehetra hatramin’ny iray volana no ho miakatra, dia dimanjato sy fito arivo. '
  '23':
  - type: text
    content: 'Ny fianakavian’ny Gersonita dia hitoby eo ivohon’ny '
  - type: text
    content: tabernakely
  - type: text
    content: ', avy eo andrefany. '
  '24':
  - type: text
    content: 'Ny lohan’ny fianakavian’ny Gersonita dia i Eliasafa, zanak’i Laela. '
  '25':
  - type: text
    content: 'Ny anjara raharahan’ireo zanak’i Gersona eo amin’ny tranolay fihaonana dia ny tabernakely, ny lay, ny rakotra eo aminy, ny varavarana lamba amin’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ', '
  '26':
  - type: text
    content: ny fefy lamba amin’ny kianja sy ny vavahady lamba amin’ny vavahadin’ny kianja izay manodidina ny tabernakely sy ny alitara, ary ny kofehy rehetra momba azy.
  '27':
  - type: text
    content: 'Avy tamin’i Kehata, ny fianakavian’ny Amramita, ny fianakavian’ny Jizarita, ny fianakavian’ny Hebronita ary ny fianakavian’ny Ozielita; ireo no fianakavian’ny Kehatita. '
  '28':
  - type: text
    content: 'Ny isan’ny lahy rehetra hatramin’ny iray volana no ho miakatra, izay mpitandrina ny anjara raharaha momba ny fitoerana masina, dia eninjato sy valo arivo. '
  '29':
  - type: text
    content: 'Ny fianakavian’ny zanak’i Kehata dia hitoby eo amin’ny lafiny atsimo amin’ny tabernakely. '
  '3':
  - type: text
    content: 'Ireo no anaran’ny zanakalahin’i Arona, dia ny mpisorona voahosotra, izay natokana hanao fisoronana. '
  '30':
  - type: text
    content: 'Ny lohan’ny fianakavian’ny Kehatita dia i Elizafana, zanak’i Oziela. '
  '31':
  - type: text
    content: 'Ny anjara raharahany dia ny vata misy ny Vavolombelona, ny latabatra, ny fitoeran-jiro, ny alitara roa sy ireo fanaky ny fitoerana masina, izay ampiasaina amin’ny fanompoam-pivavahana, ary koa ny varavarana lamba mbamin’izay zavatra rehetra momba azy. '
  '32':
  - type: text
    content: Ny lehiben’ireo lohan’ny levita dia i Eleazara, zanak’i Arona mpisorona, izay lehiben’ireo mpitandrina ny anjara raharaha ny amin’ny fitoerana masina.
  '33':
  - type: text
    content: 'Avy tamin’i Merary, ny fianakavian’ny Malita sy ny fianakavian’ny Mosita. Ireo no fianakavian’i Merary. '
  '34':
  - type: text
    content: 'Izay voaisa, araka ny isan’ny lahy rehetra hatramin’ny iray volana no ho miakatra, dia roanjato sy enina arivo. '
  '35':
  - type: text
    content: 'Ny lohan’ny fianakavian’i Merary dia i Zoriela, zanak’i Abihaila. Ireo no hitoby eo amin’ny lafiny avaratra amin’ny tabernakely. '
  '36':
  - type: text
    content: 'Ny anjara raharahan’ny zanak’i Merary dia ny hazo fisaka amin’ny tabernakely, ny barany, ny andriny, ny faladiany ary ny fanaka rehetra momba azy mbamin’ny zavatra rehetra momba azy, '
  '37':
  - type: text
    content: ireo andrin’ny kianja manodidina sy ny faladiany, ny tsatòkan-day ary ny kofehy momba azy.
  '38':
  - type: text
    content: Ny hitoby eo anoloan’ny tabernakely, eo atsinanany, izany hoe eo anoloan’ny tranolay fihaonana, tandrifin’ny fiposahan’ny masoandro, dia i Mosesy sy i Arona ary ireo zanany, izay mpitandrina ny anjara raharaha momba ny fitoerana masina, dia ny anjara raharahan’ny Zanak’Israely; fa raha olon-kafa no manakaiky dia hovonoina izy.
  '39':
  - type: text
    content: Ny tontalin’izay voaisa avy tamin’ny levita, dia izay nisain’i Mosesy sy i Arona araka ny didin’NY TOMPO, avy tamin’ny fianakaviany, ny lahy rehetra hatramin’ny iray volana no ho miakatra, dia roa arivo sy roa alina.
  - type: heading
    content: Ny fanavotana ireo voalohan-teraka
  '4':
  - type: text
    content: Maty teo anatrehan’NY TOMPO i Nadaba sy i Abiho tamin’izy ireo nanatitra afo tsy izy teo anatrehan’NY TOMPO tany amin’ny tany efitr’i Sinay, sady samy tsy nanan-janaka izy mirahalahy. Koa i Eleazara sy Itamara no nanao fisoronana teo anatrehan’i Arona rainy.
  '40':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy: Isao ny lahimatoa rehetra eo amin’ny Zanak’Israely hatramin’ny iray volana no ho miakatra ka alao isa araka ny anarany. '
  '41':
  - type: text
    content: 'Alao ho Ahy ny '
  - type: text
    content: levita
  - type: text
    content: ' ho solon’ny lahimatoa rehetra eo amin’ny Zanak’Israely. Izaho no TOMPO. Ny biby fiompin’ny levita dia ho solon’ny voalohan-teraka rehetra amin’ny biby fiompin’ny Zanak’Israely. '
  '42':
  - type: text
    content: 'Dia nisain’i Mosesy ny lahimatoa rehetra teo amin’ny Zanak’Israely, araka izay nandidian’NY TOMPO azy. '
  '43':
  - type: text
    content: Ny lahimatoa rehetra izay nisaina, araka ny anarany tsirairay, hatramin’ny iray volana no ho miakatra, dia telo amby fitopolo sy roanjato sy roa arivo sy roa alina.
  '44':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '45':
  - type: text
    content: 'Alao ny levita ho solon’ny lahimatoa rehetra eo amin’ny Zanak’Israely, ary ny biby fiompin’ny levita ho solon’ny biby fiompiny. Ahy ny levita. Izaho no TOMPO. '
  '46':
  - type: text
    content: 'Ny amin’ny fanavotana ireo telo amby fitopolo sy roanjato amin’ny lahimatoan’ny Zanak’Israely, izay mihoatra noho ny isan’ny levita, '
  '47':
  - type: text
    content: 'dia hakanao sekela dimy isan’olona; araka ny sekela masina no hakanao azy, gera roapolo ny sekela iray. '
  '48':
  - type: text
    content: 'Homenao an’i Arona sy ireo zanany ny vola ho fanavotana an’ireo mihoatra isa ireo. '
  '49':
  - type: text
    content: 'Ary i Mosesy dia nandray ny vola avotr’ireo izay nihoatra tamin’ny isan’ireo voaavotry ny levita; '
  '5':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '50':
  - type: text
    content: 'tamin’ny lahimatoan’ny Zanak’Israely no nandraisany ny vola, dia sekela dimy amby enimpolo sy telonjato sy arivo, araka ny sekela masina. '
  '51':
  - type: text
    content: Dia nomen’i Mosesy an’i Arona sy ireo zanany izany vola avotra izany, araka ny tenin’NY TOMPO, araka izay nandidian’NY TOMPO an’i Mosesy.
  '6':
  - type: text
    content: 'Ampanatony ny fokon’i Levy ka atsangano eo anatrehan’i Arona mpisorona mba hanampy azy. '
  '7':
  - type: text
    content: 'Hitandrina ny anjara raharahan’i Arona sy ny anjara raharahan’ny fiangonana manontolo eo anoloan’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izy ireo ka hanao ny fanompoana ao amin’ny '
  - type: text
    content: tabernakely
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Hitandrina ny fanaka rehetra momba ny tranolay fihaonana sy ny anjara raharahan’ny Zanak’Israely izy ireo ka hanao ny fanompoana ao amin’ny tabernakely. '
  '9':
  - type: text
    content: 'Homenao an’i Arona sy ireo zanany lahy ny '
  - type: text
    content: levita
  - type: text
    content: ', fa efa nomena azy mihitsy avy amin’ny Zanak’Israely ireo. '
