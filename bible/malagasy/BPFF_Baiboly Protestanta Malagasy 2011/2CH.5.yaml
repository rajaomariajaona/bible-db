document_id: 2CH.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no nahavitana ny asa rehetra nataon’i Solomona ho amin’ny tranon’NY TOMPO; ary nampidirin’i Solomona tao amin’ny tempoly ny zavatra rehetra izay efa nohamasinin’i Davida rainy, dia ny volafotsy sy ny volamena; ary ny fanaka rehetra dia nataony ho ao amin’ny efitrano fitahirizana ao amin’ny tranon’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Apetraka ao amin’ny tempoly ny vata misy ny Fanekena
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Mpa 8.1-13
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nisy na inona na inona tao anatin’ny vata misy ny Fanekena afa-tsy ny vato fisaka roa ihany izay nataon’i Mosesy tao anatiny fony tany Horeba, tamin’NY TOMPO nanao fanekena tamin’ny Zanak’Israely, tamin’ny nivoahany avy tany Ejipta. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka avy tao amin’ny fitoerana masina ny mpisorona, satria ny mpisorona rehetra izay teo dia samy efa nanamasina ny tenany fa tsy mba nifandimby isan-toko tamin’izay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny levita mpihira rehetra, dia i Asafa, i Hemana ary i Jedotona mbamin’ny zanany sy ny rahalahiny, izay nitafy lamba rongony fotsy madinika sady nitondra kipantsona sy valiha ary lokanga, dia nitsangana teo atsinanan’ny alitara, ary teo aminy koa dia nisy mpisorona roapolo amby zato nitsoka trompetra; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary toy ny feo iray no fandrenesana ny mpitsoka trompetra sy ny mpihira raha nidera sy nisaotra NY TOMPO izy ireo; nony nanandratra ny feony izy sady nampaneno ny trompetra sy ny kipantsona ary ny zavamaneno isan-karazany ka nidera NY TOMPO fa tsara Izy, fa mandrakizay ny famindrampony, dia feno rahona ny Trano, dia ny tranon’NY TOMPO; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: koa tsy nahajanona hanao fanompoam-pivavahana ny mpisorona noho ny rahona; fa feno ny voninahitry NY TOMPO ny tranon’Andriamanitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia novorin’i Solomona ny loholon’ny Israely sy ny lohan’ny foko rehetra, dia ny lohan’ny fianakavian’ny Zanak’Israely, ho any Jerosalema hampakatra ny vata misy ny faneken’NY TOMPO avy any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ', Tanànan’i Davida. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivory ho any amin’ny mpanjaka ny lehilahy rehetra amin’ny Israely tamin’ny andro firavoravoana tamin’ny volana fahafito. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga koa ny loholon’ny Israely rehetra ka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' no nitondra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vata misy ny Fanekena
    - type: text
      text: ', '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nampiakariny ny vata misy ny Fanekena sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ' ary ny fanaka masina rehetra izay tao amin’ny tranolay. Nampiakarin’ny levita mpisorona ireo zavatra ireo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Solomona mpanjaka sy ny fiangonana, dia ny Israely rehetra, izay nivory teo aminy teo anoloan’ny vata misy ny Fanekena, dia samy namono zavatra hatao fanatitra, dia ondry aman’osy sy omby izay tsy tambo isaina sady tsy hita isa noho ny hamaroany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vata misy ny faneken’NY TOMPO dia nampidirin’ny mpisorona ho ao amin’ny fitoerany tao amin’ny efitra anatiny, dia ny fitoerana masina indrindra, teo ambanin’ny elatry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: '; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nivelatra teo ambonin’ny toeran’ny vata misy ny Fanekena ny elatry ny kerobima ka nanaloka ny vata misy ny Fanekena sy ny baony. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lava ny bao ka hita ny lohany, raha eo amin’ny vata misy ny Fanekena eo anoloan’ny efitra anatiny, nefa tsy hita avy eny ivelany; ary mbola ao mandraka androany ireo. '
