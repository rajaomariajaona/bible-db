document_id: 2PE.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Toa mitaredretra ny fiavian’ny Tompo
  - type: text
    content: 'Ry malala, ity no epistily faharoa soratako ho anareo ankehitriny, koa izy roa dia samy entiko hampifoha fahatsiarovana ao aminareo, amin’ny fisainana mazava, '
  '10':
  - type: text
    content: Fa ho avy tahaka ny mpangalatra ny andron’ny Tompo, ary amin’izany ny lanitra dia ho lasa amin’ny firimorimoana mafy, ary ho levon’ny afo ny tenan’ny zavatra rehetra ka ho may avokoa ny tany sy ny asa izay eo aminy.
  '11':
  - type: text
    content: 'Koa raha ho levona toy izany izao zavatra rehetra izao dia tokony hanao ahoana moa ny fitondrantena masina sy ny toe-panahinareo araka an’Andriamanitra '
  '12':
  - type: text
    content: 'ka manantena sady manafaingana ny fiavian’ny Andron’Andriamanitra izay handevona ny lanitra amin’ny afo ary handoro sy hampiempo ny tenan’ny zavatra rehetra! '
  '13':
  - type: text
    content: Kanefa isika, araka ny teny fikasany, dia manantena lanitra vaovao sy tany vaovao izay itoeran’ny fahamarinana.
  - type: heading
    content: Ny fahari-pon’ny Tompo no famonjena anareo
  '14':
  - type: text
    content: 'Koa amin’izany, ry malala, satria manantena izany zavatra izany ianareo, dia mazotoa mba ho hita tsy manan-tsiny amam-pondro eo anatrehan’ny Tompo amin’ny fihavanana. '
  '15':
  - type: text
    content: 'Ary ny fahari-pon’ny Tompontsika dia ekeo ho famonjena, tahaka ny voasoratr’i Paoly rahalahy malalantsika taminareo koa, araka ny fahendrena nomena azy. '
  '16':
  - type: text
    content: Izany koa no ataony ao amin’ny epistiliny rehetra, izay ilazany izany zavatra izany; amin’ireny dia misy zavatra saro-pantarina, izay avilin’ny olona kely fahalalana sady tsy miorina tsara, tahaka ny anaovany ny teny sasany amin’ny Soratra Masina koa, ka mahatonga fahaverezana ho an’ny tenany.
  '17':
  - type: text
    content: 'Koa satria fantatrareo rahateo izany, ry malala, dia tandremo fandrao ho voataonan’ny fahadisoan’ny ratsy fanahy ianareo ka ho lavo hiala amin’izay iorenanareo; '
  '18':
  - type: text
    content: 'fa mitomboa amin’ny fahasoavana sy ny fahalalana an’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', Tompo sy Mpamonjy antsika. Ho Azy anie ny voninahitra ankehitriny sy mandrakizay! '
  - type: text
    content: Amena
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'mba hahatsiarovanareo ny teny voalazan’ny mpaminany masina taloha sy ny didin’ny Tompo sady Mpamonjy izay noentin’ny Apostoly nirahina ho atỳ aminareo. '
  '3':
  - type: text
    content: 'Fa fantatrareo voalohany indrindra fa amin’ny andro farany dia hisy mpaniratsira avy haniratsira, mandeha araka ny filany '
  '4':
  - type: text
    content: 'ka milaza hoe: Aiza ny teny fikasana ny amin’ny fiaviany? Fa hatrizay nodian’ny razana mandry dia maharitra tsy miova ny zavatra rehetra; eny, hatramin’ny nanaovana izao tontolo izao aza.'
  '5':
  - type: text
    content: 'Fa minia ho jamba ireo ka tsy mahalala fa nisy hatramin’ny ela ny lanitra, ary nisy tany koa, izay niseho avy tamin’ny rano, sady tamin’alalan’ny rano no nampivondrona azy, tamin’ny tenin’Andriamanitra, '
  '6':
  - type: text
    content: 'ary rano nanafotra koa no nandravana izao rehetra izao; '
  '7':
  - type: text
    content: fa izao lanitra sy tany ankehitriny izao dia voatahirin’izany teny izany ho amin’ny afo amin’ny andro fitsarana sy fandringanana ny ratsy fanahy.
  '8':
  - type: text
    content: 'Nefa, ry malala, izao zavatra iray loha izao no aoka tsy hohadinoinareo: Ny indray andro amin’ny Tompo dia toy ny arivo taona, ary ny arivo taona dia toy ny indray andro. '
  '9':
  - type: text
    content: Ny Tompo tsy mahela ny teny fikasany, araka izay lazain’ny sasany ho fahelany; fa mahari-po aminareo Izy ka tsy tiany hisy ho very, fa mba ho tonga amin’ny fibebahana izy rehetra.
