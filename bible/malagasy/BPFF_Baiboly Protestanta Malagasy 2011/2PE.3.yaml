document_id: 2PE.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Toa mitaredretra ny fiavian’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ry malala, ity no epistily faharoa soratako ho anareo ankehitriny, koa izy roa dia samy entiko hampifoha fahatsiarovana ao aminareo, amin’ny fisainana mazava, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hahatsiarovanareo ny teny voalazan’ny mpaminany masina taloha sy ny didin’ny Tompo sady Mpamonjy izay noentin’ny Apostoly nirahina ho atỳ aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa fantatrareo voalohany indrindra fa amin’ny andro farany dia hisy mpaniratsira avy haniratsira, mandeha araka ny filany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka milaza hoe: Aiza ny teny fikasana ny amin’ny fiaviany? Fa hatrizay nodian’ny razana mandry dia maharitra tsy miova ny zavatra rehetra; eny, hatramin’ny nanaovana izao tontolo izao aza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa minia ho jamba ireo ka tsy mahalala fa nisy hatramin’ny ela ny lanitra, ary nisy tany koa, izay niseho avy tamin’ny rano, sady tamin’alalan’ny rano no nampivondrona azy, tamin’ny tenin’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary rano nanafotra koa no nandravana izao rehetra izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fa izao lanitra sy tany ankehitriny izao dia voatahirin’izany teny izany ho amin’ny afo amin’ny andro fitsarana sy fandringanana ny ratsy fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa, ry malala, izao zavatra iray loha izao no aoka tsy hohadinoinareo: Ny indray andro amin’ny Tompo dia toy ny arivo taona, ary ny arivo taona dia toy ny indray andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny Tompo tsy mahela ny teny fikasany, araka izay lazain’ny sasany ho fahelany; fa mahari-po aminareo Izy ka tsy tiany hisy ho very, fa mba ho tonga amin’ny fibebahana izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ho avy tahaka ny mpangalatra ny andron’ny Tompo, ary amin’izany ny lanitra dia ho lasa amin’ny firimorimoana mafy, ary ho levon’ny afo ny tenan’ny zavatra rehetra ka ho may avokoa ny tany sy ny asa izay eo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa raha ho levona toy izany izao zavatra rehetra izao dia tokony hanao ahoana moa ny fitondrantena masina sy ny toe-panahinareo araka an’Andriamanitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka manantena sady manafaingana ny fiavian’ny Andron’Andriamanitra izay handevona ny lanitra amin’ny afo ary handoro sy hampiempo ny tenan’ny zavatra rehetra! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Kanefa isika, araka ny teny fikasany, dia manantena lanitra vaovao sy tany vaovao izay itoeran’ny fahamarinana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahari-pon’ny Tompo no famonjena anareo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa amin’izany, ry malala, satria manantena izany zavatra izany ianareo, dia mazotoa mba ho hita tsy manan-tsiny amam-pondro eo anatrehan’ny Tompo amin’ny fihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny fahari-pon’ny Tompontsika dia ekeo ho famonjena, tahaka ny voasoratr’i Paoly rahalahy malalantsika taminareo koa, araka ny fahendrena nomena azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izany koa no ataony ao amin’ny epistiliny rehetra, izay ilazany izany zavatra izany; amin’ireny dia misy zavatra saro-pantarina, izay avilin’ny olona kely fahalalana sady tsy miorina tsara, tahaka ny anaovany ny teny sasany amin’ny Soratra Masina koa, ka mahatonga fahaverezana ho an’ny tenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa satria fantatrareo rahateo izany, ry malala, dia tandremo fandrao ho voataonan’ny fahadisoan’ny ratsy fanahy ianareo ka ho lavo hiala amin’izay iorenanareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'fa mitomboa amin’ny fahasoavana sy ny fahalalana an’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', Tompo sy Mpamonjy antsika. Ho Azy anie ny voninahitra ankehitriny sy mandrakizay! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: '!'
