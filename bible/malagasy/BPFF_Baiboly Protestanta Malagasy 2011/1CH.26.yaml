document_id: 1CH.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpiandry varavarana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny antokon’ny mpiandry varavarana:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamin’ny Koraìta dia i Meselemia, zanak’i Kore, avy tamin’ny zanak’i Asafa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny zanakalahin’i Meselemia dia i Zakaria, lahimatoa; i Jediaela, lahiaivo; i Zebadia, fahatelo; i Jatniela, fahefatra; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'i Elama, fahadimy; i Johanana, fahenina ary i Elihoenay, faralahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny zanakalahin’i Obeda-Edoma dia i Semaia, lahimatoa; i Jozabada, lahiaivo; i Joa, fahatelo; i Sakara, fahefatra; i Netanela, fahadimy; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'i Amiela, fahenina; Isakara, fahafito ary i Peoletahy, faralahy; fa Andriamanitra efa nitahy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary i Semaia zanany dia niteraka zazalahy maromaro izay samy tonga mpanapaka tamin’ny fianakavian’ny rainy satria samy mpiady mahery. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny zanakalahin’i Semaia dia i Otny, i Refaela, i Obeda ary i Elzabada mbamin’ireo rahalahiny, mpiady mahery, dia i Eliho sy i Semakia. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ireo rehetra ireo no avy tamin’ny zanak’i Obeda-Edoma, dia izy sy ny zanany sy ny rahalahiny, izay samy lehilahy mahery sady matanjaka amin’ny fanompoany; roa amby enimpolo no an’i Obeda-Edoma.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanan-janakalahy sy rahalahy valo amby folo i Meselemia; samy lehilahy mahay avokoa izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary i Hosa tamin’ny taranak’i Merary dia nanan-janakalahy, dia i Simry no lohany; fa izy no nataon’ny rainy ho lohany na dia tsy lahimatoa aza izy; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'i Hilkia, lahiaivo; i Tebalia, fahatelo ary i Zakaria, fahefatra; ny zanakalahin’i Hosa sy ny rahalahiny rehetra dia telo amby folo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ireo lehiben’ny tonian’ny mpiandry varavarana ireo dia nomena anjara raharaha tahaka ireo rahalahiny hanao fanompoam-pivavahana ao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary izy ireo, na ny kely na ny lehibe, dia nanao antsapaka avokoa araka ny fianakaviany ny ho amin’ny isam-bavahady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny azon’i Selemia tamin’ny antsapaka dia ny ilany atsinanana. Ary natao koa ny antsapaka ho an’i Zakaria zanany izay mpanolotsaina hendry, koa ny azony dia ny ilany avaratra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'An’i Obeda-Edoma ny atsimo, ary an’ny zanany ny trano fitahirizan-drakitra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'An’i Sopima sy i Hosa ny andrefana mbamin’ny vavahady Saleketa, amin’ny lalana miakatra; ary feno avokoa ny toerana fiambenana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny atsinanana dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' enina, ny avaratra dia nisy efatra isanandro, ny atsimo dia nisy efatra isanandro, ary ny trano fitahirizan-drakitra dia nisy efa-dahy nizara ho roa avy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tany amin’ireo trano madinika tao andrefana dia nisy efatra nanatrika ny lalana, ary roa no tao amin’ireo trano madinika. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ireo no antokon’ny mpiandry ny varavarana tamin’ny taranak’i Kora sy ny taranak’i Merary.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny raharaha manokana nankinina tamin’ny levita sasany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' dia i Ahia no tonian’ny efitrano fitahirizana sy ny rakitra masina ao amin’ny tranon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny taranak’i Ladana, ilay Ladana gersonita, ireo lohan’ny fianakavian’i Ladana gersonita, dia ny Jehielita. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny taranaky ny Jehielita, dia i Zetama sy i Joela rahalahiny, no tonian’ny efitrano fitahirizana ao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’ny Amramita sy ny Jizarita sy ny Hebronita ary ny Ozielita '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia i Seboela, avy tamin’ny taranak’i Gersoma, zanak’i Mosesy, no tonian’ny efitrano fitahirizana. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny rahalahiny avy tamin’i Eliezera dia i Rehabia, zanak’i Eliezera; i Jesaia, zanak’i Rehabia; i Jorama, zanak’i Jesaia; i Zikry, zanak’i Jorama ary i Selomota, zanak’i Zikry. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Io Selomota io sy ny rahalahiny no tonian’ny rakitra masina, dia izay nohamasinin’i Davida mpanjaka sy ny lohan’ny fianakaviana ary ny mpifehy arivo sy ny mpifehy zato mbamin’ny ny lehiben’ny miaramila. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’ny zavatra azony babo tamin’ny ady dia nisy nohamasininy hoenti-manamboatra ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary izay rehetra nohamasinin’i Samoela mpahita sy i Saoly, zanak’i Kisy ary i Abnera, zanak’i Nera sy i Joaba, zanak’i Zeroia, eny, izay rehetra nohamasininy, dia i Selomota sy ny rahalahiny no nitahiry izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tamin’ny Jizarita dia i Kenania sy ny zanany no voatendry ho amin’ny raharaha ivelany amin’ny Israely ka ho mpifehy sy mpitsara. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tamin’ny Hebronita dia i Hasabia sy ny rahalahiny, lehilahy mahay fitonjato sy arivo, no mpifehy tamin’ny Israely tany andafy andrefan’i Jordana, mpifehy ny amin’ny raharaha rehetra ho an’NY TOMPO sy ny fanompoana ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny Hebronita dia i Jeria no lohany. Tamin’ny taona fahefapolo nanjakan’i Davida no nanaovana fikarohana teo amin’ny Hebronita, araka ny fianakaviany avy, ka nahitana mpiady mahery tao, dia tao Jazera any Gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny rahalahin’i Jeria dia fitonjato sy roa arivo, samy mpiady mahery, loham-pianakaviany avy. Ary nanendry azy ireo i Davida ho mpifehy ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase, ny amin’ny raharaha rehetra mikasika an’Andriamanitra sy ny mpanjaka.
