document_id: 1CH.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpiandry varavarana
  - type: text
    content: 'Ny antokon’ny mpiandry varavarana:'
  - type: text
    content: 'Tamin’ny Koraìta dia i Meselemia, zanak’i Kore, avy tamin’ny zanak’i Asafa. '
  '10':
  - type: text
    content: 'Ary i Hosa tamin’ny taranak’i Merary dia nanan-janakalahy, dia i Simry no lohany; fa izy no nataon’ny rainy ho lohany na dia tsy lahimatoa aza izy; '
  '11':
  - type: text
    content: 'i Hilkia, lahiaivo; i Tebalia, fahatelo ary i Zakaria, fahefatra; ny zanakalahin’i Hosa sy ny rahalahiny rehetra dia telo amby folo. '
  '12':
  - type: text
    content: 'Ireo lehiben’ny tonian’ny mpiandry varavarana ireo dia nomena anjara raharaha tahaka ireo rahalahiny hanao fanompoam-pivavahana ao amin’ny tranon’NY TOMPO. '
  '13':
  - type: text
    content: Ary izy ireo, na ny kely na ny lehibe, dia nanao antsapaka avokoa araka ny fianakaviany ny ho amin’ny isam-bavahady.
  '14':
  - type: text
    content: 'Ny azon’i Selemia tamin’ny antsapaka dia ny ilany atsinanana. Ary natao koa ny antsapaka ho an’i Zakaria zanany izay mpanolotsaina hendry, koa ny azony dia ny ilany avaratra. '
  '15':
  - type: text
    content: 'An’i Obeda-Edoma ny atsimo, ary an’ny zanany ny trano fitahirizan-drakitra. '
  '16':
  - type: text
    content: 'An’i Sopima sy i Hosa ny andrefana mbamin’ny vavahady Saleketa, amin’ny lalana miakatra; ary feno avokoa ny toerana fiambenana. '
  '17':
  - type: text
    content: 'Ny atsinanana dia nisy '
  - type: text
    content: levita
  - type: text
    content: ' enina, ny avaratra dia nisy efatra isanandro, ny atsimo dia nisy efatra isanandro, ary ny trano fitahirizan-drakitra dia nisy efa-dahy nizara ho roa avy. '
  '18':
  - type: text
    content: 'Tany amin’ireo trano madinika tao andrefana dia nisy efatra nanatrika ny lalana, ary roa no tao amin’ireo trano madinika. '
  '19':
  - type: text
    content: Ireo no antokon’ny mpiandry ny varavarana tamin’ny taranak’i Kora sy ny taranak’i Merary.
  - type: heading
    content: Ny raharaha manokana nankinina tamin’ny levita sasany
  '2':
  - type: text
    content: 'Ny zanakalahin’i Meselemia dia i Zakaria, lahimatoa; i Jediaela, lahiaivo; i Zebadia, fahatelo; i Jatniela, fahefatra; '
  '20':
  - type: text
    content: 'Tamin’ny '
  - type: text
    content: levita
  - type: text
    content: ' dia i Ahia no tonian’ny efitrano fitahirizana sy ny rakitra masina ao amin’ny tranon’Andriamanitra. '
  '21':
  - type: text
    content: 'Ny taranak’i Ladana, ilay Ladana gersonita, ireo lohan’ny fianakavian’i Ladana gersonita, dia ny Jehielita. '
  '22':
  - type: text
    content: 'Ny taranaky ny Jehielita, dia i Zetama sy i Joela rahalahiny, no tonian’ny efitrano fitahirizana ao amin’ny tranon’NY TOMPO. '
  '23':
  - type: text
    content: 'Tamin’ny Amramita sy ny Jizarita sy ny Hebronita ary ny Ozielita '
  '24':
  - type: text
    content: 'dia i Seboela, avy tamin’ny taranak’i Gersoma, zanak’i Mosesy, no tonian’ny efitrano fitahirizana. '
  '25':
  - type: text
    content: 'Ny rahalahiny avy tamin’i Eliezera dia i Rehabia, zanak’i Eliezera; i Jesaia, zanak’i Rehabia; i Jorama, zanak’i Jesaia; i Zikry, zanak’i Jorama ary i Selomota, zanak’i Zikry. '
  '26':
  - type: text
    content: 'Io Selomota io sy ny rahalahiny no tonian’ny rakitra masina, dia izay nohamasinin’i Davida mpanjaka sy ny lohan’ny fianakaviana ary ny mpifehy arivo sy ny mpifehy zato mbamin’ny ny lehiben’ny miaramila. '
  '27':
  - type: text
    content: 'Tamin’ny zavatra azony babo tamin’ny ady dia nisy nohamasininy hoenti-manamboatra ny tranon’NY TOMPO. '
  '28':
  - type: text
    content: Ary izay rehetra nohamasinin’i Samoela mpahita sy i Saoly, zanak’i Kisy ary i Abnera, zanak’i Nera sy i Joaba, zanak’i Zeroia, eny, izay rehetra nohamasininy, dia i Selomota sy ny rahalahiny no nitahiry izany.
  '29':
  - type: text
    content: 'Tamin’ny Jizarita dia i Kenania sy ny zanany no voatendry ho amin’ny raharaha ivelany amin’ny Israely ka ho mpifehy sy mpitsara. '
  '3':
  - type: text
    content: 'i Elama, fahadimy; i Johanana, fahenina ary i Elihoenay, faralahy. '
  '30':
  - type: text
    content: 'Tamin’ny Hebronita dia i Hasabia sy ny rahalahiny, lehilahy mahay fitonjato sy arivo, no mpifehy tamin’ny Israely tany andafy andrefan’i Jordana, mpifehy ny amin’ny raharaha rehetra ho an’NY TOMPO sy ny fanompoana ny mpanjaka. '
  '31':
  - type: text
    content: 'Ny Hebronita dia i Jeria no lohany. Tamin’ny taona fahefapolo nanjakan’i Davida no nanaovana fikarohana teo amin’ny Hebronita, araka ny fianakaviany avy, ka nahitana mpiady mahery tao, dia tao Jazera any Gileada. '
  '32':
  - type: text
    content: Ny rahalahin’i Jeria dia fitonjato sy roa arivo, samy mpiady mahery, loham-pianakaviany avy. Ary nanendry azy ireo i Davida ho mpifehy ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase, ny amin’ny raharaha rehetra mikasika an’Andriamanitra sy ny mpanjaka.
  '4':
  - type: text
    content: 'Ny zanakalahin’i Obeda-Edoma dia i Semaia, lahimatoa; i Jozabada, lahiaivo; i Joa, fahatelo; i Sakara, fahefatra; i Netanela, fahadimy; '
  '5':
  - type: text
    content: 'i Amiela, fahenina; Isakara, fahafito ary i Peoletahy, faralahy; fa Andriamanitra efa nitahy azy. '
  '6':
  - type: text
    content: 'Ary i Semaia zanany dia niteraka zazalahy maromaro izay samy tonga mpanapaka tamin’ny fianakavian’ny rainy satria samy mpiady mahery. '
  '7':
  - type: text
    content: 'Ny zanakalahin’i Semaia dia i Otny, i Refaela, i Obeda ary i Elzabada mbamin’ireo rahalahiny, mpiady mahery, dia i Eliho sy i Semakia. '
  '8':
  - type: text
    content: Ireo rehetra ireo no avy tamin’ny zanak’i Obeda-Edoma, dia izy sy ny zanany sy ny rahalahiny, izay samy lehilahy mahery sady matanjaka amin’ny fanompoany; roa amby enimpolo no an’i Obeda-Edoma.
  '9':
  - type: text
    content: 'Nanan-janakalahy sy rahalahy valo amby folo i Meselemia; samy lehilahy mahay avokoa izy ireo. '
