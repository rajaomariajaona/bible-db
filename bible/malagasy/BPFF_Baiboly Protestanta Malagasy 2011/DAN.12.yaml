document_id: DAN.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fotoanan’ny fijaliana sy ny fitsanganana indray
  - type: text
    content: Amin’izany andro izany dia hitsangana
  - type: text
    content: i Mikaela, andrian-dehibe,
  - type: text
    content: izay mitsangana hiaro ny zanaky ny firenenao;
  - type: text
    content: ary hisy andro fahoriana
  - type: text
    content: izay tsy nisy tahaka azy hatrizay nisian’ny firenena
  - type: text
    content: ka hatramin’izany andro izany;
  - type: text
    content: ary amin’izay dia ho afaka ny firenenao,
  - type: text
    content: dia izay rehetra hita voasoratra ao amin’ny boky.
  '10':
  - type: text
    content: 'Maro no hodiovina sy hofotsina ary hozahan-toetra; fa ny ratsy fanahy kosa dia mbola hanao ratsy ihany, ary tsy hisy amin’ny ratsy fanahy hahafantatra, fa ny hendry no hahafantatra. '
  '11':
  - type: text
    content: 'Ary hatramin’ny andro hampitsaharana ny fanatitra isanandro sy hampidirana ny fahavetavetana mahatonga fandravana dia hisy andro sivifolo sy roanjato sy arivo. '
  '12':
  - type: text
    content: 'Sambatra izay miandry sy mahatratra ny andro dimy amby telopolo sy telonjato sy arivo. '
  '13':
  - type: text
    content: Koa mandehana ianao mandra-piavin’ny farany; fa hitsahatra ianao ka hitsangana hahazo ny anjara ho anao amin’ny andro farany.
  '2':
  - type: text
    content: Ary maro
  - type: text
    content: amin’izay matory ao amin’ny vovoky ny tany
  - type: text
    content: 'no hifoha: Ny sasany dia ho amin’ny fiainana mandrakizay,'
  - type: text
    content: fa ny sasany kosa dia ho amin’ny henatra sy ny latsa mandrakizay.
  '3':
  - type: text
    content: Izay hendry dia hamirapiratra toy ny famirapiratry ny lanitra;
  - type: text
    content: ary izay mamerina ny maro ho amin’ny fahamarinana
  - type: text
    content: dia ho tahaka ny kintana mandrakizay doria.
  '4':
  - type: text
    content: Ianao kosa, ry Daniela, dia tano ho tsiambaratelo ny teny ka asio tombo-kase ny taratasy mandra-piavin’ny andro farany. Maro no hazoto mikaroka ka hitombo fahalalana.
  - type: heading
    content: Mijanona ho zavamiafina ny andro farany
  '5':
  - type: text
    content: 'Dia nijery izaho Daniela ka indro, nisy olona roa hafa koa nijoro, ny iray dia teto amoron’ny ony, ary ny iray kosa dia teroa andafiny. '
  '6':
  - type: text
    content: 'Hoy ny iray tamin’ilay lehilahy mitafy lamba rongony, izay teo ambonin’ny rano amin’ny ony: Rahoviana vao ho tonga ny faran’ireo fahagagana ireo? '
  '7':
  - type: text
    content: Ary ilay lehilahy mitafy lamba rongony, izay teo ambonin’ny rano amin’ny ony, dia nanandratra ny tanany havanana sy ny tanany havia ho amin’ny lanitra ka reko nianiana tamin’Izay velona mandrakizay izy, fa ho fetrandro iray sy fetrandro roa ary antsasaky ny fetrandro no sisa; ary rehefa vita ny fanamontsamontsanana ny herin’ny olona masina dia ho tanteraka ireo rehetra ireo.
  '8':
  - type: text
    content: 'Nandre izany aho nefa tsy nahazo ny heviny. Dia hoy aho: Tompoko ô, hanao ahoana no hiafaran’ireo zavatra ireo?'
  '9':
  - type: text
    content: 'Dia hoy izy: Mandehana, ry Daniela, fa voatana ho tsiambaratelo ny teny sady voaisy tombo-kase mandra-piavin’ny andro farany. '
