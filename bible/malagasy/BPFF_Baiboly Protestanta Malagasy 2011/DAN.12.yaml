document_id: DAN.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fotoanan’ny fijaliana sy ny fitsanganana indray
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Amin’izany andro izany dia hitsangana
- type: usfm
  marker: q1
  children:
  - type: text
    text: i Mikaela, andrian-dehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitsangana hiaro ny zanaky ny firenenao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisy andro fahoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy nisy tahaka azy hatrizay nisian’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatramin’izany andro izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’izay dia ho afaka ny firenenao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay rehetra hita voasoratra ao amin’ny boky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay matory ao amin’ny vovoky ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no hifoha: Ny sasany dia ho amin’ny fiainana mandrakizay,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny sasany kosa dia ho amin’ny henatra sy ny latsa mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izay hendry dia hamirapiratra toy ny famirapiratry ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mamerina ny maro ho amin’ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tahaka ny kintana mandrakizay doria.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ianao kosa, ry Daniela, dia tano ho tsiambaratelo ny teny ka asio tombo-kase ny taratasy mandra-piavin’ny andro farany. Maro no hazoto mikaroka ka hitombo fahalalana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mijanona ho zavamiafina ny andro farany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nijery izaho Daniela ka indro, nisy olona roa hafa koa nijoro, ny iray dia teto amoron’ny ony, ary ny iray kosa dia teroa andafiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy ny iray tamin’ilay lehilahy mitafy lamba rongony, izay teo ambonin’ny rano amin’ny ony: Rahoviana vao ho tonga ny faran’ireo fahagagana ireo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ilay lehilahy mitafy lamba rongony, izay teo ambonin’ny rano amin’ny ony, dia nanandratra ny tanany havanana sy ny tanany havia ho amin’ny lanitra ka reko nianiana tamin’Izay velona mandrakizay izy, fa ho fetrandro iray sy fetrandro roa ary antsasaky ny fetrandro no sisa; ary rehefa vita ny fanamontsamontsanana ny herin’ny olona masina dia ho tanteraka ireo rehetra ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nandre izany aho nefa tsy nahazo ny heviny. Dia hoy aho: Tompoko ô, hanao ahoana no hiafaran’ireo zavatra ireo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy izy: Mandehana, ry Daniela, fa voatana ho tsiambaratelo ny teny sady voaisy tombo-kase mandra-piavin’ny andro farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Maro no hodiovina sy hofotsina ary hozahan-toetra; fa ny ratsy fanahy kosa dia mbola hanao ratsy ihany, ary tsy hisy amin’ny ratsy fanahy hahafantatra, fa ny hendry no hahafantatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hatramin’ny andro hampitsaharana ny fanatitra isanandro sy hampidirana ny fahavetavetana mahatonga fandravana dia hisy andro sivifolo sy roanjato sy arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Sambatra izay miandry sy mahatratra ny andro dimy amby telopolo sy telonjato sy arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa mandehana ianao mandra-piavin’ny farany; fa hitsahatra ianao ka hitsangana hahazo ny anjara ho anao amin’ny andro farany.
