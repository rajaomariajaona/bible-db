document_id: 1CH.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitanisana hafa koa ny taranak’i Benjamina
  - type: heading
    content: Gen 46.21; Nom 26.38-40
  - type: text
    content: 'I Benjamina no niteraka an’i Bela, lahimatoa, i Asbela, lahiaivo, i Ahara, fahatelo, '
  '10':
  - type: text
    content: i Jeoza, i Sakia ary i Mirma. Ireo no zanany lahy, samy loham-pianakaviany avy.
  '11':
  - type: text
    content: 'I Hosima no niterahany an’i Abitoba sy i Elpala. '
  '12':
  - type: text
    content: Ny zanakalahin’i Elpala dia i Ebera sy i Misama ary i Semera, izay nanorina an’i Ono sy i Loda sy ny vohitra miankina aminy.
  '13':
  - type: text
    content: I Beria sy i Sema, izay loham-pianakavian’ny mponina tao Aialona dia nandroaka ny mponina tao Gata.
  '14':
  - type: text
    content: 'I Ahio, i Sasaka, i Jeremota, '
  '15':
  - type: text
    content: 'i Zebadia, i Arada, i Adera, '
  '16':
  - type: text
    content: 'i Mikaela, i Jispa ary i Joha, no zanakalahin’i Beria. '
  '17':
  - type: text
    content: 'I Zebadia, i Mesolama, i Hizky, i Ebera, '
  '18':
  - type: text
    content: 'i Jismeray, i Jizlia ary i Jobaba, no zanakalahin’i Elpala. '
  '19':
  - type: text
    content: 'I Jakima, i Zikry, i Zabdy, '
  '2':
  - type: text
    content: 'i Noha, fahefatra, ary i Rafa, faralahy. '
  '20':
  - type: text
    content: 'i Elienay, i Ziletahy, i Eliela, '
  '21':
  - type: text
    content: 'i Adaia, i Beraia ary i Simrata, no zanakalahin’i Simey. '
  '22':
  - type: text
    content: 'I Jispana, i Ebera, i Eliela, '
  '23':
  - type: text
    content: 'i Abdona, i Zikry, i Hanana, '
  '24':
  - type: text
    content: 'i Hanania, i Elama, i Antotia, '
  '25':
  - type: text
    content: 'i Jifdia ary i Penoela, ireo no zanakalahin’i Sasaka. '
  '26':
  - type: text
    content: 'I Samseray, i Seharia, i Atalia, '
  '27':
  - type: text
    content: 'i Jaresia, i Elia ary i Zikry, no zanakalahin’i Jerohama. '
  '28':
  - type: text
    content: Ireo no loham-pianakaviany, samy loholona araka ny firazanany. Ireo no nonina tany Jerosalema.
  - type: heading
    content: Ny firazanan’i Saoly
  - type: heading
    content: 9.35-43; 1Sam 14.49-51
  '29':
  - type: text
    content: 'Tao Gibeona no nonenan’ny rain’i Gibeona, ary ny anaran’ny vadiny dia Maka. '
  '3':
  - type: text
    content: 'Ny zanakalahin’i Bela dia i Adara, i Gera, i Abihoda, '
  '30':
  - type: text
    content: 'I Abdona no lahimatoany, nanaraka azy i Zora, i Kisy, i Baala, i Nadaba, '
  '31':
  - type: text
    content: 'i Gedora, i Ahio, i Zekera. '
  '32':
  - type: text
    content: 'I Miklota no niteraka an’i Simea. Ireo koa dia niara-monina tamin’ny rahalahiny tany Jerosalema, dia ireo nifanandrify fonenana taminy. '
  '33':
  - type: text
    content: 'I Nera no niteraka an’i Kisy; i Kisy no niteraka an’i Saoly; i Saoly no niteraka an’i Jonatana, i Malky-Soa, i Abinadaba ary i Esbala. '
  '34':
  - type: text
    content: 'Ny zanakalahin’i Jonatana dia i Meribaala; i Meribaala no niteraka an’i Mika. '
  '35':
  - type: text
    content: 'Ny zanakalahin’i Mika dia i Pitona, i Meleka, i Tarea ary i Ahaza. '
  '36':
  - type: text
    content: 'I Ahaza no niteraka an’i Jehoada; i Jehoada no niteraka an’i Alemeta sy i Azmaveta ary i Zimry; i Zimry no niteraka an’i Moza; '
  '37':
  - type: text
    content: 'i Moza no niteraka an’i Binea; i Rafa no zanakalahin’i Binea, i Elasa no zanakalahin’i Rafa, i Azela no zanakalahin’i Elasa. '
  '38':
  - type: text
    content: 'Nanana zanaka enina mirahalahy i Azela ka izao no anarany: I Azrikama, i Bokero, Ismaela, i Searia, i Obadia ary i Hanana. Ireo rehetra ireo no zanakalahin’i Azela. '
  '39':
  - type: text
    content: 'Ny zanakalahin’i Eseka rahalahiny dia i Olama, lahimatoa, sy i Jeosy, lahiaivo, ary i Elifeleta, faralahy. '
  '4':
  - type: text
    content: 'i Abisoa, i Namàna, i Ahoa, '
  '40':
  - type: text
    content: Ny zanakalahin’i Olama dia lehilahy mahery sady mpandefa zana-tsipìka; nanana zanakalahy sy zafy maro izy, dimampolo amby zato no isany.
  - type: text
    content: Ireo rehetra ireo no taranak’i Benjamina.
  '5':
  - type: text
    content: i Gera, i Sefofana ary i Horama.
  '6':
  - type: text
    content: 'Ireto no zanakalahin’i Ehoda, izay loham-pianakavian’ny mponina any Geba, izay noentina ho babo tany Manahata: '
  '7':
  - type: text
    content: I Namàna sy i Ahia ary i Gera; izy no nitondra azy ho babo. Niteraka an’i Oza sy i Ahihoda izy.
  '8':
  - type: text
    content: 'Niteraka tany amin’ny tany Moaba i Saharaima taorianan’ny nisaorany an’i Hosima sy i Bara vadiny. '
  '9':
  - type: text
    content: 'I Hodesy vadiny no niterahany an’i Jobaba, i Ziba, i Mesa, i Malkama, '
