document_id: 1CH.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitanisana hafa koa ny taranak’i Benjamina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Gen 46.21; Nom 26.38-40
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Benjamina no niteraka an’i Bela, lahimatoa, i Asbela, lahiaivo, i Ahara, fahatelo, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'i Noha, fahefatra, ary i Rafa, faralahy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny zanakalahin’i Bela dia i Adara, i Gera, i Abihoda, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'i Abisoa, i Namàna, i Ahoa, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: i Gera, i Sefofana ary i Horama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ireto no zanakalahin’i Ehoda, izay loham-pianakavian’ny mponina any Geba, izay noentina ho babo tany Manahata: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I Namàna sy i Ahia ary i Gera; izy no nitondra azy ho babo. Niteraka an’i Oza sy i Ahihoda izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Niteraka tany amin’ny tany Moaba i Saharaima taorianan’ny nisaorany an’i Hosima sy i Bara vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I Hodesy vadiny no niterahany an’i Jobaba, i Ziba, i Mesa, i Malkama, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: i Jeoza, i Sakia ary i Mirma. Ireo no zanany lahy, samy loham-pianakaviany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I Hosima no niterahany an’i Abitoba sy i Elpala. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny zanakalahin’i Elpala dia i Ebera sy i Misama ary i Semera, izay nanorina an’i Ono sy i Loda sy ny vohitra miankina aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I Beria sy i Sema, izay loham-pianakavian’ny mponina tao Aialona dia nandroaka ny mponina tao Gata.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I Ahio, i Sasaka, i Jeremota, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'i Zebadia, i Arada, i Adera, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'i Mikaela, i Jispa ary i Joha, no zanakalahin’i Beria. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I Zebadia, i Mesolama, i Hizky, i Ebera, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'i Jismeray, i Jizlia ary i Jobaba, no zanakalahin’i Elpala. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I Jakima, i Zikry, i Zabdy, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'i Elienay, i Ziletahy, i Eliela, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'i Adaia, i Beraia ary i Simrata, no zanakalahin’i Simey. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I Jispana, i Ebera, i Eliela, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'i Abdona, i Zikry, i Hanana, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'i Hanania, i Elama, i Antotia, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'i Jifdia ary i Penoela, ireo no zanakalahin’i Sasaka. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I Samseray, i Seharia, i Atalia, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'i Jaresia, i Elia ary i Zikry, no zanakalahin’i Jerohama. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ireo no loham-pianakaviany, samy loholona araka ny firazanany. Ireo no nonina tany Jerosalema.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny firazanan’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 9.35-43; 1Sam 14.49-51
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tao Gibeona no nonenan’ny rain’i Gibeona, ary ny anaran’ny vadiny dia Maka. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'I Abdona no lahimatoany, nanaraka azy i Zora, i Kisy, i Baala, i Nadaba, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'i Gedora, i Ahio, i Zekera. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I Miklota no niteraka an’i Simea. Ireo koa dia niara-monina tamin’ny rahalahiny tany Jerosalema, dia ireo nifanandrify fonenana taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'I Nera no niteraka an’i Kisy; i Kisy no niteraka an’i Saoly; i Saoly no niteraka an’i Jonatana, i Malky-Soa, i Abinadaba ary i Esbala. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny zanakalahin’i Jonatana dia i Meribaala; i Meribaala no niteraka an’i Mika. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny zanakalahin’i Mika dia i Pitona, i Meleka, i Tarea ary i Ahaza. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'I Ahaza no niteraka an’i Jehoada; i Jehoada no niteraka an’i Alemeta sy i Azmaveta ary i Zimry; i Zimry no niteraka an’i Moza; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Moza no niteraka an’i Binea; i Rafa no zanakalahin’i Binea, i Elasa no zanakalahin’i Rafa, i Azela no zanakalahin’i Elasa. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Nanana zanaka enina mirahalahy i Azela ka izao no anarany: I Azrikama, i Bokero, Ismaela, i Searia, i Obadia ary i Hanana. Ireo rehetra ireo no zanakalahin’i Azela. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ny zanakalahin’i Eseka rahalahiny dia i Olama, lahimatoa, sy i Jeosy, lahiaivo, ary i Elifeleta, faralahy. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ny zanakalahin’i Olama dia lehilahy mahery sady mpandefa zana-tsipìka; nanana zanakalahy sy zafy maro izy, dimampolo amby zato no isany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ireo rehetra ireo no taranak’i Benjamina.
