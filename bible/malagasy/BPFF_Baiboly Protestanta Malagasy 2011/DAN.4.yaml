document_id: DAN.4,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izaho Nebokadnezara dia niadana tao an-tranoko ary finaritra tao an-dapako. '
  '10':
  - type: text
    content: 'Tamin’ny fahitana tao an-dohako raha teo am-pandriana aho no nahitako fa indro, nisy mpiambina masina iray nidina avy tany an-danitra. '
  '11':
  - type: text
    content: 'Niantso mafy izy hoe:'
  - type: text
    content: Kapao io hazo io dia rantsano;
  - type: text
    content: ahintsano ny raviny ary aelezo ny voany;
  - type: text
    content: aoka ny biby handositra avy eo ambaniny,
  - type: text
    content: ary ny vorona hiala avy eny amin’ny rantsany.
  '12':
  - type: text
    content: Nefa avelao amin’ny tany ao aminy ihany ny fotony
  - type: text
    content: ka asio fehy vy sy varahina
  - type: text
    content: ao amin’ny ahitra any an-tsaha.
  - type: text
    content: Aoka ho kotsan’ny andon’ny lanitra izy,
  - type: text
    content: ary aoka ny ahitra amin’ny tany no ho anjarany, toy ny an’ny biby.
  '13':
  - type: text
    content: Hovana tsy ho fon’olombelona ny fony;
  - type: text
    content: fom-biby no ho ao aminy;
  - type: text
    content: fetrandro fito no holanina aminy.
  '14':
  - type: text
    content: Didin’ny mpiambina izany zavatra izany;
  - type: text
    content: eny, avy amin’ny tendrin’ireo masina izany zavatra izany
  - type: text
    content: 'mba hahafantaran’ny velona fa ny Avo Indrindra no mitondra ny fanjakan’ny olona ka manome izany ho an’izay tiany, ary olona ambany toetra no mety hampifeheziny azy. '
  '15':
  - type: text
    content: Izany no nofy izay hitako, izaho Nebokadnezara. Ary ianao kosa, ry Beltesazara, lazao ny heviny, fa ny olon-kendry rehetra amin’ny fanjakako tsy nisy nahay nampahafantatra ahy ny hevitr’izany; fa ianao no mahay azy, satria misy fanahin’ireo andriamanitra masina ao anatinao.
  - type: heading
    content: Manazava ny hevitry ny nofin’ny mpanjaka i Daniela
  '16':
  - type: text
    content: 'Nandritra ny fotoana fohy dia nitolagaga i Daniela, izay antsoina hoe Beltesazara, ary naharaiki-tahotra azy ny eritreriny. Ary niteny indray ny mpanjaka hoe: Ry Beltesazara ô! Aoka tsy haharaiki-tahotra anao ny nofy na ny heviny. Hoy ny navalin’i Beltesazara: Tompokolahy ô, ny nofy anie ho an’izay mankahala anao, ary ny heviny ho an’izay fahavalonao. '
  '17':
  - type: text
    content: 'Io hazo hitanao io dia ilay nihalehibe sy nihanahery, koa ny haavony dia nipaka tamin’ny lanitra ary ny fijery azy hatramin’ny tany rehetra; '
  '18':
  - type: text
    content: 'ny raviny dia tsara tarehy sady betsaka ny voany, ary teo aminy dia nisy hanina ho an’ny rehetra; teny ambaniny no nitoeran’ny bibidia ary teny amin’ny rantsany no nitoeran’ny voromanidina. '
  '19':
  - type: text
    content: 'Ianao indrindra izany, ry mpanjaka ô! Ianao dia nihalehibe sy niha nahery; fa ny fahalehibiazanao dia efa nitombo ka mipaka amin’ny lanitra, ary ny fanapahanao dia hatramin’ny faran’ny tany. '
  '2':
  - type: text
    content: 'Nanonofy zavatra nahatahotra aho ka nieritreritra teo am-pandrianako, satria ny fahitan’ny lohako dia naharaiki-tahotra ahy. '
  '20':
  - type: text
    content: 'Hitan’ny mpanjaka ny mpiambina masina iray nidina avy tany an-danitra nilaza hoe: Kapao io hazo io ary simbao; nefa avelao amin’ny tany ao amin’ny ahitra maitso any an-tsaha ihany ny fotony, fa asio fehy vy sy varahina, ary aoka ho kotsan’ny andon’ny lanitra izy, ary aoka ny anjarany ho ao amin’ny bibidia, ambara-pahalanin’ny fetrandro fito aminy. '
  '21':
  - type: text
    content: 'Izao no heviny, ry mpanjaka, ary izao no tendrin’ny Avo Indrindra, izay mihatra amin’ny mpanjaka tompoko: '
  '22':
  - type: text
    content: 'Horoahina hiala amin’ny olona ianao ary ho any amin’ny bibidia no fonenanao; hampihinanina ahitra toy ny omby ianao sady ho kotsan’ny andon’ny lanitra, ary fetrandro fito no holanina aminao, ambara-pahafantatrao fa ny Avo Indrindra no mitondra ny fanjakan’ny olona ka manome izany ho an’izay tiany. '
  '23':
  - type: text
    content: 'Ny hevitry ny namelàna ny fotony dia satria mbola ho voatahiry ho anao ihany ny fanjakanao rehefa fantatrao fa ny lanitra no manapaka. '
  '24':
  - type: text
    content: Koa aoka hankasitrahanao ny anatro, ry mpanjaka, koa ny fahamarinana no ento mampitsahatra ny fahotanao, ary ny fiantrana ny mahantra no ento mampitsahatra ny helokao, fandrao mba hampaharetina ihany ny fiadananao.
  - type: heading
    content: Tanteraka ilay nofy
  '25':
  - type: text
    content: 'Ireo rehetra ireo dia nanjo an’i Nebokadnezara mpanjaka. '
  '26':
  - type: text
    content: 'Nony afaka roa amby folo volana dia nitsangantsangana teo an-tampon’ny tranony tao Babilona izy. '
  '27':
  - type: text
    content: 'Ary niteny ny mpanjaka hoe: Tsy ity va no Babilona lehibe, izay nataoko ho lapan’ny fanjakana tamin’ny haben’ny heriko mba ho voninahitry ny fahalehibiazako? '
  '28':
  - type: text
    content: 'Raha mbola teo am-bavan’ny mpanjaka ihany ny teny dia nisy feo tonga avy tany an-danitra hoe: Ry Nebokadnezara mpanjaka! Ianao indrindra no ilazana hoe: Niala taminao ny fanjakana. '
  '29':
  - type: text
    content: 'Horoahina hiala amin’ny olona ianao ka ho any amin’ny bibidia no fonenanao; hampihinanina ahitra toy ny omby ianao ary fetrandro fito no holanina aminao ambara-pahafantatrao fa ny Avo Indrindra no mitondra ny fanjakan’ny olona ka manome izany ho an’izay tiany. '
  '3':
  - type: text
    content: 'Dia nandidy aho mba hoentina eo anatrehako ny olon-kendrin’i Babilona rehetra hilaza amiko ny hevitry ny nofy. '
  '30':
  - type: text
    content: Tamin’izay indrindra no nahatanterahan’izany tamin’i Nebokadnezara, fa noroahina niala tamin’ny olona izy ka nihinana ahitra toy ny omby, ary ny tenany dia kotsan’ny andon’ny lanitra ambara-panirin’ny volony ho toy ny an’ny voromahery, ary ny hohony ho toy ny an’ny vorona.
  - type: heading
    content: Ny nahasitranan’i Nebokadnezara
  '31':
  - type: text
    content: Rehefa tapitra ny fe-potoana, izaho Nebokadnezara dia nampiandrandra ny masoko tamin’ny lanitra ka nody tamiko indray ny saiko ary nisaotra ny Avo Indrindra aho ary nidera sy nankalaza Ilay velona mandrakizay.
  - type: text
    content: Ny fanapahany dia fanapahana mandrakizay,
  - type: text
    content: ary ny fanjakany dia hahatratra ny taranaka fara aman-dimby,
  '32':
  - type: text
    content: ary ny mponina rehetra etỳ an-tany dia hatao tsinontsinona.
  - type: text
    content: Manao izay sitrapony
  - type: text
    content: amin’ireo tafika any an-danitra sy amin’ny mponina etỳ an-tany Izy.
  - type: text
    content: Ary tsy misy mahasakana Azy
  - type: text
    content: 'na miteny Aminy hoe: Inona ity ataonao?'
  '33':
  - type: text
    content: 'Tamin’izay dia nody tamiko ny saiko ary nody tamiko koa ny lazako sy ny fahalehibiazako ho voninahitry ny fanjakako. Ny mpanolotsaina sy ny olo-manankaja eto amiko dia nitady ahy, koa nampitoerina teo amin’ny fanjakako aho, ary vao mainka niampy ny fahalehibiazako. '
  '34':
  - type: text
    content: Koa amin’izany, izaho Nebokadnezara dia midera sy manandratra ary mankalaza ny Mpanjakan’ny lanitra; marina avokoa ny asany rehetra ary araka ny rariny ny lalany, ary izay mandeha amin’ny fiavonavonana dia hainy aetry.
  '4':
  - type: text
    content: 'Dia niditra ny ombiasy, ny mpisikidy, ny Kaldeana ary ny mpanandro; ary nambarako teo anatrehany ny nofy, kanjo tsy nahalaza ny heviny tamiko ireny. '
  '5':
  - type: text
    content: 'Nony farany anefa dia niditra teo anatrehako kosa i Daniela, izay antsoina hoe Beltesazara, araka ny anaran’ny andriamanitro; sady misy fanahin’ireo andriamanitra masina ao anatiny; ary ny nofy dia nambarako teo anatrehany hoe: '
  '6':
  - type: text
    content: 'Ry Beltesazara, lehiben’ny ombiasy, fantatro fa misy fanahin’ireo andriamanitra masina ao anatinao, ary tsy misy zavamiafina manahirana anao, koa ambarao ahy ny fahitana izay hitako tamin’ny nofy mbamin’ny heviny. '
  '7':
  - type: text
    content: 'Fa izao no fahitana tao an-dohako raha teo am-pandriana aho:'
  - type: text
    content: Nijery aho ka indro, nisy hazo teo afovoan’ny tany, ary avo dia avo ilay izy.
  '8':
  - type: text
    content: Nihalehibe sy niha nahery io hazo io;
  - type: text
    content: nipaka tamin’ny lanitra ny haavony
  - type: text
    content: ary ny fijery azy dia hatrany amin’ny faran’ny tany rehetra.
  '9':
  - type: text
    content: Tsara tarehy ny raviny
  - type: text
    content: ary betsaka ny voany
  - type: text
    content: sady teo aminy dia nisy hanina ho an’ny rehetra;
  - type: text
    content: teny ambaniny no nialokalofan’ny bibidia;
  - type: text
    content: teny amin’ny sampany no nitoeran’ny voromanidina
  - type: text
    content: ary nahazo hanina avy aminy ny nofo rehetra.
