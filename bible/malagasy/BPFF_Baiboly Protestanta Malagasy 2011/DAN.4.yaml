document_id: DAN.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho Nebokadnezara dia niadana tao an-tranoko ary finaritra tao an-dapako. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tamin’ny fahitana tao an-dohako raha teo am-pandriana aho no nahitako fa indro, nisy mpiambina masina iray nidina avy tany an-danitra. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Niantso mafy izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kapao io hazo io dia rantsano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ahintsano ny raviny ary aelezo ny voany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ny biby handositra avy eo ambaniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vorona hiala avy eny amin’ny rantsany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa avelao amin’ny tany ao aminy ihany ny fotony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka asio fehy vy sy varahina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny ahitra any an-tsaha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho kotsan’ny andon’ny lanitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny ahitra amin’ny tany no ho anjarany, toy ny an’ny biby.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hovana tsy ho fon’olombelona ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fom-biby no ho ao aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fetrandro fito no holanina aminy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Didin’ny mpiambina izany zavatra izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, avy amin’ny tendrin’ireo masina izany zavatra izany
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'mba hahafantaran’ny velona fa ny Avo Indrindra no mitondra ny fanjakan’ny olona ka manome izany ho an’izay tiany, ary olona ambany toetra no mety hampifeheziny azy. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izany no nofy izay hitako, izaho Nebokadnezara. Ary ianao kosa, ry Beltesazara, lazao ny heviny, fa ny olon-kendry rehetra amin’ny fanjakako tsy nisy nahay nampahafantatra ahy ny hevitr’izany; fa ianao no mahay azy, satria misy fanahin’ireo andriamanitra masina ao anatinao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manazava ny hevitry ny nofin’ny mpanjaka i Daniela
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandritra ny fotoana fohy dia nitolagaga i Daniela, izay antsoina hoe Beltesazara, ary naharaiki-tahotra azy ny eritreriny. Ary niteny indray ny mpanjaka hoe: Ry Beltesazara ô! Aoka tsy haharaiki-tahotra anao ny nofy na ny heviny. Hoy ny navalin’i Beltesazara: Tompokolahy ô, ny nofy anie ho an’izay mankahala anao, ary ny heviny ho an’izay fahavalonao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Io hazo hitanao io dia ilay nihalehibe sy nihanahery, koa ny haavony dia nipaka tamin’ny lanitra ary ny fijery azy hatramin’ny tany rehetra; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny raviny dia tsara tarehy sady betsaka ny voany, ary teo aminy dia nisy hanina ho an’ny rehetra; teny ambaniny no nitoeran’ny bibidia ary teny amin’ny rantsany no nitoeran’ny voromanidina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianao indrindra izany, ry mpanjaka ô! Ianao dia nihalehibe sy niha nahery; fa ny fahalehibiazanao dia efa nitombo ka mipaka amin’ny lanitra, ary ny fanapahanao dia hatramin’ny faran’ny tany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanonofy zavatra nahatahotra aho ka nieritreritra teo am-pandrianako, satria ny fahitan’ny lohako dia naharaiki-tahotra ahy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitan’ny mpanjaka ny mpiambina masina iray nidina avy tany an-danitra nilaza hoe: Kapao io hazo io ary simbao; nefa avelao amin’ny tany ao amin’ny ahitra maitso any an-tsaha ihany ny fotony, fa asio fehy vy sy varahina, ary aoka ho kotsan’ny andon’ny lanitra izy, ary aoka ny anjarany ho ao amin’ny bibidia, ambara-pahalanin’ny fetrandro fito aminy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no heviny, ry mpanjaka, ary izao no tendrin’ny Avo Indrindra, izay mihatra amin’ny mpanjaka tompoko: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horoahina hiala amin’ny olona ianao ary ho any amin’ny bibidia no fonenanao; hampihinanina ahitra toy ny omby ianao sady ho kotsan’ny andon’ny lanitra, ary fetrandro fito no holanina aminao, ambara-pahafantatrao fa ny Avo Indrindra no mitondra ny fanjakan’ny olona ka manome izany ho an’izay tiany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny hevitry ny namelàna ny fotony dia satria mbola ho voatahiry ho anao ihany ny fanjakanao rehefa fantatrao fa ny lanitra no manapaka. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa aoka hankasitrahanao ny anatro, ry mpanjaka, koa ny fahamarinana no ento mampitsahatra ny fahotanao, ary ny fiantrana ny mahantra no ento mampitsahatra ny helokao, fandrao mba hampaharetina ihany ny fiadananao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tanteraka ilay nofy
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo rehetra ireo dia nanjo an’i Nebokadnezara mpanjaka. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka roa amby folo volana dia nitsangantsangana teo an-tampon’ny tranony tao Babilona izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteny ny mpanjaka hoe: Tsy ity va no Babilona lehibe, izay nataoko ho lapan’ny fanjakana tamin’ny haben’ny heriko mba ho voninahitry ny fahalehibiazako? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola teo am-bavan’ny mpanjaka ihany ny teny dia nisy feo tonga avy tany an-danitra hoe: Ry Nebokadnezara mpanjaka! Ianao indrindra no ilazana hoe: Niala taminao ny fanjakana. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horoahina hiala amin’ny olona ianao ka ho any amin’ny bibidia no fonenanao; hampihinanina ahitra toy ny omby ianao ary fetrandro fito no holanina aminao ambara-pahafantatrao fa ny Avo Indrindra no mitondra ny fanjakan’ny olona ka manome izany ho an’izay tiany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandidy aho mba hoentina eo anatrehako ny olon-kendrin’i Babilona rehetra hilaza amiko ny hevitry ny nofy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay indrindra no nahatanterahan’izany tamin’i Nebokadnezara, fa noroahina niala tamin’ny olona izy ka nihinana ahitra toy ny omby, ary ny tenany dia kotsan’ny andon’ny lanitra ambara-panirin’ny volony ho toy ny an’ny voromahery, ary ny hohony ho toy ny an’ny vorona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahasitranan’i Nebokadnezara
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa tapitra ny fe-potoana, izaho Nebokadnezara dia nampiandrandra ny masoko tamin’ny lanitra ka nody tamiko indray ny saiko ary nisaotra ny Avo Indrindra aho ary nidera sy nankalaza Ilay velona mandrakizay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanapahany dia fanapahana mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanjakany dia hahatratra ny taranaka fara aman-dimby,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mponina rehetra etỳ an-tany dia hatao tsinontsinona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao izay sitrapony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ireo tafika any an-danitra sy amin’ny mponina etỳ an-tany Izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy mahasakana Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'na miteny Aminy hoe: Inona ity ataonao?'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia nody tamiko ny saiko ary nody tamiko koa ny lazako sy ny fahalehibiazako ho voninahitry ny fanjakako. Ny mpanolotsaina sy ny olo-manankaja eto amiko dia nitady ahy, koa nampitoerina teo amin’ny fanjakako aho, ary vao mainka niampy ny fahalehibiazako. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa amin’izany, izaho Nebokadnezara dia midera sy manandratra ary mankalaza ny Mpanjakan’ny lanitra; marina avokoa ny asany rehetra ary araka ny rariny ny lalany, ary izay mandeha amin’ny fiavonavonana dia hainy aetry.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niditra ny ombiasy, ny mpisikidy, ny Kaldeana ary ny mpanandro; ary nambarako teo anatrehany ny nofy, kanjo tsy nahalaza ny heviny tamiko ireny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony farany anefa dia niditra teo anatrehako kosa i Daniela, izay antsoina hoe Beltesazara, araka ny anaran’ny andriamanitro; sady misy fanahin’ireo andriamanitra masina ao anatiny; ary ny nofy dia nambarako teo anatrehany hoe: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry Beltesazara, lehiben’ny ombiasy, fantatro fa misy fanahin’ireo andriamanitra masina ao anatinao, ary tsy misy zavamiafina manahirana anao, koa ambarao ahy ny fahitana izay hitako tamin’ny nofy mbamin’ny heviny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no fahitana tao an-dohako raha teo am-pandriana aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nijery aho ka indro, nisy hazo teo afovoan’ny tany, ary avo dia avo ilay izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nihalehibe sy niha nahery io hazo io;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nipaka tamin’ny lanitra ny haavony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fijery azy dia hatrany amin’ny faran’ny tany rehetra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsara tarehy ny raviny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary betsaka ny voany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady teo aminy dia nisy hanina ho an’ny rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny ambaniny no nialokalofan’ny bibidia;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny amin’ny sampany no nitoeran’ny voromanidina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nahazo hanina avy aminy ny nofo rehetra.
