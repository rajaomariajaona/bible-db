document_id: NUM.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fotoana hankalazana ny Paska
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy tany amin’ny tany efitr’i Sinay tamin’ny volana voalohany tamin’ny taona faharoa, taorianan’ny nialany avy tany amin’ny tany Ejipta hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mitenena amin’ny Zanak’Israely hoe: Raha misy olona eo aminareo, na eo amin’ny taranakareo hatramin’ny fara aman-dimby, maloto tamim-paty, na nandeha lavitra, dia mbola hitandrina ny Paska ho an’NY TOMPO ihany koa izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Amin’ny harivan’ny andro fahefatra amby folo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eks 12.6.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny volana faharoa no hitandremany azy; ampombaina ny mofo tsy misy masirasira sy ny anana mangidy no fihinany azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Aza avela hasiany sisa ho tra-maraina, ary aza avela hisy hotapahiny ny taolany; araka ny lalàna rehetra ny amin’ny Paska ihany koa no hitandremany azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa ny olona izay madio sady tsy lasan-davitra, nefa tsy mety mitandrina ny Paska, dia hofongorana tsy ho amin’ny fireneny, satria tsy nanolotra ny fanomezana ho an’NY TOMPO tamin’ny fotoanany izy; ho meloka izany olona izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary raha misy mpifindra monina eo aminareo ka mba te hitandrina ny Paska ho an’NY TOMPO dia araka ny didy sy ny fanao amin’ny Paska ihany no hanaovany azy; lalàna iray ihany no ho aminareo, na mpifindra monina, na tompon-tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandrakotra ny tabernakely ny rahona
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tamin’ny andro izay nananganana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakely
    - type: text
      text: ' dia nanarona ny tabernakely na ny tranolain’ny Vavolombelona ny rahona; ary nony hariva dia niseho teo ambonin’ny tabernakely tahaka ny afo izany mandra-paharain’ny andro. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izany mandrakariva no niseho: Ny rahona dia nanarona azy, nefa niseho tahaka ny afo nony alina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Rehefa niakatra niala tamin’ny tranolay ny rahona dia niainga ny Zanak’Israely ka teo amin’izay nijanonan’ny rahona no nitobiany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Araka ny didin’NY TOMPO no niaingan’ny Zanak’Israely, ary araka ny didin’NY TOMPO koa no nitobiany; tamin’ny fotoana rehetra izay nijanonan’ny rahona teo ambonin’ny tabernakely no nitobiany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary na dia nijanona andro maro teo ambonin’ny tabernakely aza ny rahona dia nitandrina izay nasain’NY TOMPO notandremana ny Zanak’Israely ka tsy niainga. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Aoka hotandreman’ny Zanak’Israely ny Paska amin’ny fotoanany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Indraindray dia andro vitsy ihany no nijanonan’ny rahona teo ambonin’ny tabernakely ka araka ny didin’NY TOMPO ihany no nitobiany, ary araka ny didin’NY TOMPO koa no niaingany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Indraindray dia nijanona hatramin’ny hariva ka hatramin’ny maraina ihany ny rahona, ary raha niakatra izany nony maraina dia niainga ny Zanak’Israely. Koa na andro na alina no niakaran’ny rahona dia niainga izy ireo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Na roa andro, na iray volana, na ela noho izany aza, no nijanonan’ny rahona teo ambonin’ny tabernakely, dia mbola nitoby ihany ny Zanak’Israely fa tsy niainga; raha vao niakatra kosa ny rahona dia niainga izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Araka ny didin’NY TOMPO no nitobiany, ary araka ny didin’NY TOMPO no niaingany; nitandrina ny fanompoana NY TOMPO izy ireo, araka ny tenin’NY TOMPO izay nampitondrainy an’i Mosesy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Amin’ny harivan’ny andro fahefatra amby folo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eks 12.6.
      marker-yv: yv-n
    - type: text
      text: ' amin’ity volana ity no hitandremanareo azy amin’ny fotoanany; araka ny didy sy ny fanao rehetra amin’izany no hitandremanareo azy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa niteny tamin’ny Zanak’Israely i Mosesy mba hitandrina ny Paska. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nitandrina ny Paska tany amin’ny tany efitr’i Sinay izy tamin’ny harivan’ny andro fahefatra amby folo tamin’ny volana voalohany; araka izay rehetra nandidian’NY TOMPO an’i Mosesy no nataon’ny Zanak’Israely. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nisy olona sasany izay naloto tamim-paty ka tsy nahazo nitandrina ny Paska tamin’izany andro izany. Nankeo anatrehan’i Mosesy sy i Arona izy ireo tamin’io andro io '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ka niteny taminy hoe: Maloto tamim-paty izahay; koa nahoana no sakanana tsy hiaraka amin’ny Zanak’Israely hanolotra ny fanatitra ho an’NY TOMPO amin’ny fotoanany? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia hoy i Mosesy taminy: Mijoroa eo aloha fa hanontaniako izay handidian’NY TOMPO ny aminareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
