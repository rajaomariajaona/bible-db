document_id: GEN.33,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mihaona i Jakoba sy i Esao
  - type: text
    content: 'Ary nanopy ny masony i Jakoba ka nahatazana fa indro tamy i Esao, mitondra efajato lahy. Dia notsinjarainy ny zaza ho amin’i Lea sy Rahely ary ho amin’ny mpanompovavy roa. '
  '10':
  - type: text
    content: 'Hoy i Jakoba: Trara antitra ianao, aza miteny an’izany! Raha mba mahita fitia eto imasonao aho dia raiso avy amiko ny zavatra nampanateriko; fa efa nahita ny tavanao tahaka ny mahita ny tavan’Andriamanitra aho sady efa nahita sitraka taminao. '
  '11':
  - type: text
    content: Trara antitra ianao, raiso re ny saotra avy amiko izay nampanaterina ho anao; fa efa nanisy soa ahy Andriamanitra ka manana ny zavatra rehetra aho. Dia nanery azy i Jakoba ka nandray ihany i Esao.
  '12':
  - type: text
    content: 'Ary hoy i Esao: Aoka hiainga isika ka handeha eo anilanao aho. '
  '13':
  - type: text
    content: 'Hoy anefa i Jakoba taminy: Fantatrao, tompokolahy, fa mbola osa ny zaza sady mbola mampinono ny ondry aman’osy sy ny omby ato amiko; koa raha hoterena handeha mandritra ny indray andro ihany izy ireo dia ho faty avokoa ny ondry aman’osy rehetra. '
  '14':
  - type: text
    content: 'Trara antitra ianao, aoka Itompokolahy hialoha ny mpanompony; ary izaho kosa dia handeha miadana, araka izay dian’ny omby aman’ondry izay ho eo alohako sy ny dian’ny zaza, mandra-pahatongako any amin’ny tompokolahy any Seìra. '
  '15':
  - type: text
    content: 'Dia hoy i Esao: Miangavy anao aho, aoka ary mba hisy havelako hiaraka aminao ny olona izay miaraka amiko. Hoy anefa i Jakoba: Inona no anton’izany? Aoka hahita fitia eto imason’Itompokolahy aho. '
  '16':
  - type: text
    content: Dia niverina androtr’izay ihany tamin’ny lalany ho any Seìra i Esao.
  - type: heading
    content: Nitoby teo akaikin’i Sekema i Jakoba
  '17':
  - type: text
    content: Ary nifindra nankany Sokota i Jakoba ka nanorina trano ho an’ny tenany ary trano rantsan-kazo maromaro ho an’ny omby aman’ondriny. Izany no niantsoana ny anaran’io toerana io hoe Sokota
  - type: note
    content: 'Sokota: Trano rantsan-kazo.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Tonga soa amantsara tao an-tanànan’i Sekema, izay eo amin’ny tany Kanana, i Jakoba, rehefa avy tany Padana-Arama. Dia nitoby tandrifin’ny tanàna izy. '
  '19':
  - type: text
    content: 'Dia novidiny '
  - type: text
    content: kesita
  - type: text
    content: ' zato tamin’ny zanak’i Hamora, rain’i Sekema, ny tany izay nanorenany ny tranolainy. '
  '2':
  - type: text
    content: 'Nataony lohalalana ny mpanompovavy roa sy ny zanany, ary i Lea sy ny zanany no nanarakaraka, ary Rahely sy i Josefa no vodilalana. '
  '20':
  - type: text
    content: Ary nanorina alitara teo izy ka nataony hoe El-Elohe-Israely
  - type: note
    content: 'El-Elohe-Israely: Andriamanitra, Andriamanitr’Israely, na: i El no Andriamanitr’Israely.'
  - type: text
    content: ' ny anarany.'
  '3':
  - type: text
    content: 'Ary nandeha teo alohan’izy rehetra i Jakoba ka niankohoka impito tamin’ny tany mandra-pahatongany teo akaikin’ny rahalahiny. '
  '4':
  - type: text
    content: 'Dia nihazakazaka nitsena azy i Esao ary nisakambina ny vozony, dia namihina sy nanoroka azy, ary samy nitomany izy mirahalahy. '
  '5':
  - type: text
    content: 'Rehefa nanopy ny masony i Esao ka nahita ny zaza amam-behivavy dia niteny hoe: Iza moa ireto miaraka aminao ireto? Ary hoy kosa i Jakoba: Ny zaza izay nomen’Andriamanitra ny mpanomponao noho ny fahasoavany. '
  '6':
  - type: text
    content: 'Dia nanatona ny mpanompovavy sy ny zanany ka niankohoka. '
  '7':
  - type: text
    content: Nanatona koa i Lea sy ny zanany ka niankohoka; ary farany, nanatona i Josefa sy Rahely ka niankohoka.
  '8':
  - type: text
    content: 'Ary hoy i Esao: Inona moa no hevitr’ireny antokony rehetra nifanena tamiko ireny? Dia hoy izy: Mba hahitako fitia eto imason’ny tompokolahy. '
  '9':
  - type: text
    content: 'Dia hoy i Esao: Manam-be ihany aho, ry rahalahiko! Aoka ihany ho anao ny anao. '
