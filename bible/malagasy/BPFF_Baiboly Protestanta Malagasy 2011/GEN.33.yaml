document_id: GEN.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mihaona i Jakoba sy i Esao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nanopy ny masony i Jakoba ka nahatazana fa indro tamy i Esao, mitondra efajato lahy. Dia notsinjarainy ny zaza ho amin’i Lea sy Rahely ary ho amin’ny mpanompovavy roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nataony lohalalana ny mpanompovavy roa sy ny zanany, ary i Lea sy ny zanany no nanarakaraka, ary Rahely sy i Josefa no vodilalana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nandeha teo alohan’izy rehetra i Jakoba ka niankohoka impito tamin’ny tany mandra-pahatongany teo akaikin’ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nihazakazaka nitsena azy i Esao ary nisakambina ny vozony, dia namihina sy nanoroka azy, ary samy nitomany izy mirahalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa nanopy ny masony i Esao ka nahita ny zaza amam-behivavy dia niteny hoe: Iza moa ireto miaraka aminao ireto? Ary hoy kosa i Jakoba: Ny zaza izay nomen’Andriamanitra ny mpanomponao noho ny fahasoavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nanatona ny mpanompovavy sy ny zanany ka niankohoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nanatona koa i Lea sy ny zanany ka niankohoka; ary farany, nanatona i Josefa sy Rahely ka niankohoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy i Esao: Inona moa no hevitr’ireny antokony rehetra nifanena tamiko ireny? Dia hoy izy: Mba hahitako fitia eto imason’ny tompokolahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Esao: Manam-be ihany aho, ry rahalahiko! Aoka ihany ho anao ny anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy i Jakoba: Trara antitra ianao, aza miteny an’izany! Raha mba mahita fitia eto imasonao aho dia raiso avy amiko ny zavatra nampanateriko; fa efa nahita ny tavanao tahaka ny mahita ny tavan’Andriamanitra aho sady efa nahita sitraka taminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Trara antitra ianao, raiso re ny saotra avy amiko izay nampanaterina ho anao; fa efa nanisy soa ahy Andriamanitra ka manana ny zavatra rehetra aho. Dia nanery azy i Jakoba ka nandray ihany i Esao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Esao: Aoka hiainga isika ka handeha eo anilanao aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy anefa i Jakoba taminy: Fantatrao, tompokolahy, fa mbola osa ny zaza sady mbola mampinono ny ondry aman’osy sy ny omby ato amiko; koa raha hoterena handeha mandritra ny indray andro ihany izy ireo dia ho faty avokoa ny ondry aman’osy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Trara antitra ianao, aoka Itompokolahy hialoha ny mpanompony; ary izaho kosa dia handeha miadana, araka izay dian’ny omby aman’ondry izay ho eo alohako sy ny dian’ny zaza, mandra-pahatongako any amin’ny tompokolahy any Seìra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy i Esao: Miangavy anao aho, aoka ary mba hisy havelako hiaraka aminao ny olona izay miaraka amiko. Hoy anefa i Jakoba: Inona no anton’izany? Aoka hahita fitia eto imason’Itompokolahy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia niverina androtr’izay ihany tamin’ny lalany ho any Seìra i Esao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nitoby teo akaikin’i Sekema i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary nifindra nankany Sokota i Jakoba ka nanorina trano ho an’ny tenany ary trano rantsan-kazo maromaro ho an’ny omby aman’ondriny. Izany no niantsoana ny anaran’io toerana io hoe Sokota
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sokota: Trano rantsan-kazo.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tonga soa amantsara tao an-tanànan’i Sekema, izay eo amin’ny tany Kanana, i Jakoba, rehefa avy tany Padana-Arama. Dia nitoby tandrifin’ny tanàna izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia novidiny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kesita
  - type: text
    text: ' zato tamin’ny zanak’i Hamora, rain’i Sekema, ny tany izay nanorenany ny tranolainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nanorina alitara teo izy ka nataony hoe El-Elohe-Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'El-Elohe-Israely: Andriamanitra, Andriamanitr’Israely, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: i El no Andriamanitr’Israely.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
