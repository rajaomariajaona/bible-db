document_id: EST.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voatery hanome voninahitra an’i Mordekay i Hamana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’iny alina iny dia tsy nahita tory ny mpanjaka ka nampaka ny boky fitadidiana ny tantara; ary novakina teo anatrehan’ny mpanjaka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa indro, voasoratra tao fa i Mordekay no niampanga an’i Bigtana sy i Taresy; izy roa lahy ireo dia isan’ny ionòkan’ny mpanjaka sady mpiambina teo am-baravarana izay nitady hamono an’i Ahasoerosy mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy ny mpanjaka: Inona moa no fisandratam-boninahitra mba efa nomena an’i Mordekay noho izany? Fa hoy ny mpanompon’ny mpanjaka izay nanompo azy: Tsy mbola nisy nomena azy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy ny mpanjaka: Iza izao ao an-kianja ao izao? I Hamana no tonga tao an-kianja ivelan’ny tranon’ny mpanjaka tamin’io fotoana io indrindra mba hiteny amin’ny mpanjaka ny amin’ny hanantonana an’i Mordekay amin’ilay hazo efa natsangany hanantonana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ny mpanompon’ny mpanjaka taminy: Indro i Hamana no mijoro ao an-kianja. Ary hoy ny mpanjaka: Asaivo miditra izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niditra i Hamana ka hoy ny mpanjaka taminy: Inona no mendrika hatao amin’izay lehilahy tian’ny mpanjaka homem-boninahitra? Ary hoy i Hamana anakampo hoe: Koa iza indray moa no ho tian’ny mpanjaka homem-boninahitra raha tsy izaho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa hoy i Hamana tamin’ny mpanjaka: Ny amin’izay lehilahy tian’ny mpanjaka homem-boninahitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia aoka halaina izay akanjo fiandrianana efa niakanjoan’ny mpanjaka sy soavaly izay efa nitaingenan’ny mpanjaka sady voaisy satroboninahitra ny lohany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia aoka izany fitafiana sy soavaly izany no hatolotra eo an-tanan’izay ambony indrindra amin’ny mpitondra voatendrin’ny mpanjaka, ary aoka izay lehilahy tian’ny mpanjaka homem-boninahitra no hampiakanjoina izany ka hampitaingenina amin’ny soavaly. Dia hoentina eo amin’ny kianjan’ny tanàna izy ary aoka hisy hiantso eo alohany hoe: Izao no atao amin’ny lehilahy izay tian’ny mpanjaka homem-boninahitra! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny mpanjaka tamin’i Hamana: Haingàna ary, alaivo ny akanjo sy ny soavaly araka ny voalazanao ka ataovy araka izany amin’i Mordekay jiosy izay mipetraka eo am-bavahadin’ny mpanjaka; aza asiana latsaka izay rehetra nolazainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nalain’i Hamana ny akanjo sy ny soavaly ka nampiakanjo an’i Mordekay izy ary nampitaingina azy tamin’ny soavaly; dia nitondra azy ho eny amin’ny kianjan’ny tanàna izy ka niantso teo alohany hoe: Izao no atao amin’ny lehilahy izay tian’ny mpanjaka homem-boninahitra!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary niverina nankeo amin’ny vavahadin’ny mpanjaka i Mordekay; fa i Hamana kosa dia nody haingana ho any an-tranony sady nalahelo no nisaron-doha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nolazain’i Hamana tamin’i Zaresy vadiny sy ny sakaizany rehetra izay zavatra nanjo azy. Ary hoy ny olon-kendry rehetra sy i Zaresy vadiny taminy: Raha avy amin’ny taranaky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' i Mordekay izay efa nanomboka nandavo anao teo anatrehany dia tsy haharesy azy mihitsy ianao fa tsy maintsy ho lavo eo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha mbola niresaka taminy ihany ireo dia tonga ny ionòkan’ny mpanjaka ka naka haingana an’i Hamana ho any amin’ny fanasana izay efa namboarin’i Estera.
