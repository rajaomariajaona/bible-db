document_id: ZEP.1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ny tenin’NY TOMPO izay tonga tamin’i Zefania, zanak’i Kosy, zanak’i Gedalia, zanak’i Amaria, zanak’i Hezekia, tamin’ny andron’i Josia, zanak’i Amona mpanjakan’ny Joda:'
  - type: heading
    content: Ny hamalian’Andriamanitra ny firenena rehetra
  '10':
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: dia hisy feo re mitaraina avy any amin’ny Vavahadin-kazandrano
  - type: text
    content: sy fidradradradrana avy ao amin’ny Tanàna ambany
  - type: text
    content: ary fidarabohana miezinezina any amin’ny havoana.
  '11':
  - type: text
    content: Midradradradrà, ianareo mponina ao Maktesy!
  - type: text
    content: Fa ringana avokoa ny mpivaro-mandeha rehetra;
  - type: text
    content: eny, lany ringana izay rehetra nivesatra volafotsy.
  '12':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: dia hotsiloviko amin’ny jiro i Jerosalema,
  - type: text
    content: koa hovaliako ny olona
  - type: text
    content: izay efa lefy toy ny divay misy faikany,
  - type: text
    content: 'dia izay miteny anakampo hoe:'
  - type: text
    content: Sady tsy hanao soa NY TOMPO no tsy hanao ratsy.
  '13':
  - type: text
    content: Ho tonga babo ny fananan’ireny
  - type: text
    content: ary ho lao ny tranony;
  - type: text
    content: hanao trano izy
  - type: text
    content: nefa tsy hitoetra ao;
  - type: text
    content: hamboly voaloboka izy
  - type: text
    content: nefa tsy hisotro ny divay avy aminy.
  - type: heading
    content: Ny Andron’NY TOMPO
  '14':
  - type: text
    content: Efa antomotra ny Andro lehiben’NY TOMPO;
  - type: text
    content: eny, efa antomotra sady miha haingana indrindra.
  - type: text
    content: Injany ny feon’ny Andron’NY TOMPO,
  - type: text
    content: mitomany mafy any ny lehilahy mahery.
  '15':
  - type: text
    content: Andron’ny fahatezerana izany andro izany,
  - type: text
    content: andron’ny fahoriana sy tebiteby,
  - type: text
    content: andron’ny fandringanana sy fandravana,
  - type: text
    content: andro maizina sy manjombona,
  - type: text
    content: andro mandrahona sy maizim-pito.
  '16':
  - type: text
    content: Andron’ny feon’ny anjomara sy ny horakoraka,
  - type: text
    content: hamelezana ny tanàna mimanda
  - type: text
    content: sy ny tilikambon’ny mpiambina eny amin’ny zoron’ny manda.
  '17':
  - type: text
    content: 'Hampahory ny olona Aho:'
  - type: text
    content: Handeha toy ny jamba izy
  - type: text
    content: satria efa nanota tamin’NY TOMPO;
  - type: text
    content: haely toy ny vovoka ny rany,
  - type: text
    content: ary ho toy ny fako ny fatiny.
  '18':
  - type: text
    content: Na ny volafotsiny na ny volamenany dia samy tsy hahavonjy azy
  - type: text
    content: amin’ny andro fahatezeran’NY TOMPO;
  - type: text
    content: fa ny afon’ny fahasaro-piarony
  - type: text
    content: no handevonany ny tany rehetra;
  - type: text
    content: fa fahafonganana tena mahatsiravina
  - type: text
    content: no hataony amin’ny mponina amin’ny tany.
  '2':
  - type: text
    content: Haringako tsy ho eny ambonin’ny tany tokoa ny zavatra rehetra,
  - type: text
    content: hoy NY TOMPO;
  '3':
  - type: text
    content: eny, haringako ny olona sy ny biby;
  - type: text
    content: haringako ny vorona eny amin’ny habakabaka sy ny hazandrano any an-dranomasina
  - type: text
    content: ary ny zavatra mahatafintohina mbamin’ny ratsy fanahy;
  - type: text
    content: haringako tsy ho eo amin’ny tany ny olona,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Ny hamalian’Andriamanitra ny Joda sy i Jerosalema
  '4':
  - type: text
    content: Manainga ny tanako Aho mba hamely ny Joda
  - type: text
    content: sy ny mponina rehetra any Jerosalema;
  - type: text
    content: 'dia haringako tsy ho eo amin’ity toerana ity ny sisa amin’ny '
  - type: text
    content: Baala
  - type: text
    content: sy ny anaran’ny mpisorona amin’ny andriamanitra tsy izy mbamin’ny tena mpisorona
  '5':
  - type: text
    content: ary izay mivavaka any an-
  - type: text
    content: tampon-trano
  - type: text
    content: ' amin’izay eny amin’ny lanitra'
  - type: text
    content: sy izay miankohoka sy mianiana fa an’NY TOMPO
  - type: text
    content: nefa koa mianiana amin’i Milkoma
  - type: note
    content: 'Milkoma: anaran’ny andriamanitry ny Amonita.'
  - type: text
    content: ','
  '6':
  - type: text
    content: mbamin’izay nihemotra niala tamin’NY TOMPO
  - type: text
    content: sy izay tsy nitady NY TOMPO na nila hevitra taminy.
  '7':
  - type: text
    content: Mangina eo anatrehan’NY TOMPO Andriamanitra!
  - type: text
    content: Fa efa antomotra ny Andron’NY TOMPO;
  - type: text
    content: ary NY TOMPO efa niomana hamono zavatra hatao fanatitra
  - type: text
    content: ka efa nanamasina ny olona nasainy.
  '8':
  - type: text
    content: Ary raha tonga amin’ny andro hamonoan’NY TOMPO zavatra hatao fanatitra
  - type: text
    content: dia hovaliako ny lehibe sy ny zanaky ny mpanjaka,
  - type: text
    content: mbamin’izay rehetra mitafy ny fitafin’ny firenena hafa.
  '9':
  - type: text
    content: Amin’izany andro izany dia hovaliako izay rehetra miezaka mihoatra ny tokonana,
  - type: text
    content: dia ireo mameno herisetra sy fitaka ny tranon’ny Tompony.
