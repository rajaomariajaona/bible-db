document_id: ZEP.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny tenin’NY TOMPO izay tonga tamin’i Zefania, zanak’i Kosy, zanak’i Gedalia, zanak’i Amaria, zanak’i Hezekia, tamin’ny andron’i Josia, zanak’i Amona mpanjakan’ny Joda:'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hamalian’Andriamanitra ny firenena rehetra
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Amin’izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hisy feo re mitaraina avy any amin’ny Vavahadin-kazandrano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fidradradradrana avy ao amin’ny Tanàna ambany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fidarabohana miezinezina any amin’ny havoana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Midradradradrà, ianareo mponina ao Maktesy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ringana avokoa ny mpivaro-mandeha rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, lany ringana izay rehetra nivesatra volafotsy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hotsiloviko amin’ny jiro i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa hovaliako ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa lefy toy ny divay misy faikany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia izay miteny anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy hanao soa NY TOMPO no tsy hanao ratsy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ho tonga babo ny fananan’ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho lao ny tranony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanao trano izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hitoetra ao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamboly voaloboka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hisotro ny divay avy aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Andron’NY TOMPO
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Efa antomotra ny Andro lehiben’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, efa antomotra sady miha haingana indrindra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Injany ny feon’ny Andron’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitomany mafy any ny lehilahy mahery.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Andron’ny fahatezerana izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andron’ny fahoriana sy tebiteby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andron’ny fandringanana sy fandravana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andro maizina sy manjombona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andro mandrahona sy maizim-pito.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Andron’ny feon’ny anjomara sy ny horakoraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamelezana ny tanàna mimanda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tilikambon’ny mpiambina eny amin’ny zoron’ny manda.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Hampahory ny olona Aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handeha toy ny jamba izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa nanota tamin’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haely toy ny vovoka ny rany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho toy ny fako ny fatiny.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Na ny volafotsiny na ny volamenany dia samy tsy hahavonjy azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro fahatezeran’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny afon’ny fahasaro-piarony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no handevonany ny tany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fahafonganana tena mahatsiravina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hataony amin’ny mponina amin’ny tany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Haringako tsy ho eny ambonin’ny tany tokoa ny zavatra rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: eny, haringako ny olona sy ny biby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haringako ny vorona eny amin’ny habakabaka sy ny hazandrano any an-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zavatra mahatafintohina mbamin’ny ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haringako tsy ho eo amin’ny tany ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hamalian’Andriamanitra ny Joda sy i Jerosalema
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Manainga ny tanako Aho mba hamely ny Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny mponina rehetra any Jerosalema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia haringako tsy ho eo amin’ity toerana ity ny sisa amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny anaran’ny mpisorona amin’ny andriamanitra tsy izy mbamin’ny tena mpisorona
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ary izay mivavaka any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tampon-trano
    - type: text
      text: ' amin’izay eny amin’ny lanitra'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay miankohoka sy mianiana fa an’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa koa mianiana amin’i Milkoma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Milkoma: '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: anaran’ny andriamanitry ny Amonita.
      marker-yv: yv-n
    - type: text
      text: ','
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: mbamin’izay nihemotra niala tamin’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay tsy nitady NY TOMPO na nila hevitra taminy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mangina eo anatrehan’NY TOMPO Andriamanitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa antomotra ny Andron’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary NY TOMPO efa niomana hamono zavatra hatao fanatitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka efa nanamasina ny olona nasainy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary raha tonga amin’ny andro hamonoan’NY TOMPO zavatra hatao fanatitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hovaliako ny lehibe sy ny zanaky ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’izay rehetra mitafy ny fitafin’ny firenena hafa.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Amin’izany andro izany dia hovaliako izay rehetra miezaka mihoatra ny tokonana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo mameno herisetra sy fitaka ny tranon’ny Tompony.
