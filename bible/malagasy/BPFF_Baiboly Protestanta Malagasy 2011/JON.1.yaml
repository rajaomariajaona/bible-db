document_id: JON.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mikasa ny handositra NY TOMPO i Jona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamin’i Jona, zanak’i Amitahy, ny tenin’NY TOMPO hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia raiki-tahotra indrindra ny olona ka niteny taminy hoe: Adray izato ataonao izato! Satria fantany fa nandositra hanalavitra NY TOMPO izy, fa efa nambarany taminy izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo taminy: Hataonay ahoana ary ianao mba hahatony ny ranomasina aminay? Fa mbola nihananonja ihany ny ranomasina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamin’ireo: Batao aho ka atsipazo any anatin’ny ranomasina hahatony ny ranomasina aminareo; fa fantatro fa noho ny amiko no mahatonga izao onja mahery izao aminareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa dia mbola nivoy mafy ny olona mba hamerina ny sambo ho amin’ny tany maina, tsy todiny anefa izany fa mbola nihananonja mafy taminy ihany ny ranomasina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitaraina tamin’NY TOMPO izy ireo hoe: Mifona aminao izahay, TOMPO ô! Aoka tsy ho faty izahay noho ny amin’ny ain’ity lehilahy ity, ary aza atao ho mpandatsaka ny ran’ny tsy manan-tsiny izahay; fa Ianao, TOMPO ô, efa nanatanteraka izay sitraky ny fonao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nobatain’izy ireo i Jona ka natsipiny tany anatin’ny ranomasina; dia nitsahatra ny fisafoaky ny ranomasina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary natahotra indrindra NY TOMPO ireo olona ireo ka namono zavatra hatao fanatitra ho an’NY TOMPO sady nanao voady.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitsangàna ka mankanesa any Ninive, ilay tanàna lehibe, ary ambarao mafy ny amin’ny hamelezana azy, fa tafakatra eto anatrehako ny faharatsiany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa nitsangana handositra ho any Tarsisy i Jona mba handositra ny tavan’NY TOMPO. Nidina tany Jopa izy ka nahita sambo hankany Tarsisy, dia naloany ny sarany ka niondrana taminy izy mba hiara-mandeha tamin’ny olona ho any Tarsisy, hanalavitra NY TOMPO.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa NY TOMPO nahatonga rivotra mahery teny ambonin’ny ranomasina, dia nanonja mafy ny ranomasina ka efa nila ho vaky ny sambo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raiki-tahotra ny tantsambo ka samy nitaraina tamin’ny andriamaniny avy, sady nanary tany an-dranomasina ny entana tao an-tsambo mba hanamaivanana azy. I Jona kosa anefa tamin’izay dia nidina nandry tao ambany indrindra tao amin’ilay sambo ka renoky ny torimaso. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankao aminy ny kapitenin-tsambo ka niteny taminy hoe: Endre ity ianao renoky ny torimaso foana eto! Mitsangàna ka antsoy ny Andriamanitrao! Angamba mba hihevitra antsika Izy ka tsy ho faty isika.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifampiresaka izy ireo hoe: Andeha isika hanao antsapaka mba hizahantsika izay mahatonga izao loza izao amintsika. Dia nanao antsapaka ry zareo ka i Jona no voatondro. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo taminy: Miangavy anao izahay, lazao aminay: Noho ny amin’iza moa no mahatonga izao loza izao amintsika? Inona no raharaha fanaonao? Ary avy taiza ianao? Aiza no taninao? Ary avy amin’ny firenen’iza ianao? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navaliny azy ireo: Hebreo aho; ary NY TOMPO, Andriamanitry ny lanitra, no ivavahako; dia izay nanao ny ranomasina sy ny tany maina. '
