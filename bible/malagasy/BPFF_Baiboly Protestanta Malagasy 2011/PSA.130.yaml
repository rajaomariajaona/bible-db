document_id: PSA.130,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tao amin’ny lalina no niantsoako Anao
  - type: text
    content: Hira fanao amin’ny fiakarana.
  - type: text
    content: Tao amin’ny lalina no niantsoako Anao, TOMPO ô,
  '2':
  - type: text
    content: Tompo ô, henoy ny feoko;
  - type: text
    content: aoka ny sofinao hihaino tsara ny feon’ny fifonako.
  '3':
  - type: text
    content: Raha mitahiry heloka Ianao, TOMPO ô,
  - type: text
    content: iza no hahajanona, Tompo ô?
  '4':
  - type: text
    content: Fa ao Aminao no misy ny famelan-keloka
  - type: text
    content: mba hatahorana Anao.
  '5':
  - type: text
    content: Niandry NY TOMPO aho; eny, niandry Azy ny fanahiko
  - type: text
    content: ary ny teniny no nanantenako.
  '6':
  - type: text
    content: Ny fanahiko dia miandry ny Tompo
  - type: text
    content: mihoatra noho ny fiandrin’ny mpiambina ny maraina,
  - type: text
    content: dia ny fiandrin’ny mpiambina ny maraina.
  '7':
  - type: text
    content: Manantenà NY TOMPO, ry Israely,
  - type: text
    content: fa ao amin’NY TOMPO no misy ny famindrampo
  - type: text
    content: sy ny fanavotana be.
  '8':
  - type: text
    content: Izy no hanavotra ny Israely
  - type: text
    content: ho afaka amin’ny helony rehetra.
