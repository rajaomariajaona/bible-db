    text: Tao amin’ny lalina no niantsoako Anao
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Hira fanao amin’ny fiakarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tao amin’ny lalina no niantsoako Anao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tompo ô, henoy ny feoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ny sofinao hihaino tsara ny feon’ny fifonako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha mitahiry heloka Ianao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: iza no hahajanona, Tompo ô?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ao Aminao no misy ny famelan-keloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hatahorana Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Niandry NY TOMPO aho; eny, niandry Azy ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny teniny no nanantenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fanahiko dia miandry ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihoatra noho ny fiandrin’ny mpiambina ny maraina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fiandrin’ny mpiambina ny maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Manantenà NY TOMPO, ry Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ao amin’NY TOMPO no misy ny famindrampo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fanavotana be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izy no hanavotra ny Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho afaka amin’ny helony rehetra.
