document_id: EXO.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Mosesy: Jereo, efa nataoko andriamanitra ho an’i Farao ianao; ary i Arona rahalahinao kosa dia ho mpaminaninao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ianao no hilaza izay rehetra handidiako anao, ary i Arona rahalahinao kosa no hiteny amin’i Farao, mba hamelany ny Zanak’Israely hiala avy ao amin’ny taniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Izaho hanamafy ny fon’i Farao ka hanamaro ny famantarana sy ny fahagagana izay hataoko eto amin’ny tany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy hihaino anareo i Farao ka hamely an’i Ejipta ny tanako, ary fitsarana lehibe no hitondrako ny antokon’ny Zanak’Israely oloko hiala amin’ny tany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia ho fantatry ny Ejiptiana fa Izaho no TOMPO, rehefa manatsotra ny tanako amin’i Ejipta Aho ka hitondra ny Zanak’Israely hivoaka avy eo anivony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nataon’i Mosesy sy i Arona izany. Araka izay nandidian’NY TOMPO azy no nataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Valopolo taona i Mosesy ary telo amby valopolo taona i Arona, fony niteny tamin’i Farao izy mirahalahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lavin’i Farao ny tenin’i Mosesy sy i Arona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Mosesy sy i Arona: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha miteny aminareo i Farao hoe: Manaova famantarana, dia lazao amin’i Arona hoe: Raiso ny tehinao ka atsipazo eo anatrehan’i Farao dia ho tonga menarana iny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nankao amin’i Farao i Mosesy sy i Arona ka nanatanteraka izay nandidian’NY TOMPO. Natsipin’i Arona teo anatrehan’i Farao sy teo anatrehan’ny mpanompony ny tehiny ka tonga menarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nefa nampiantsoan’i Farao ny olon-kendry sy ny mpanao ody; ary ireo ombiasin’i Ejipta ireo dia mba nanao toy izany koa tamin’ny sikidiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia samy nanipy ny tehiny avy izy ireo ka tonga menarana ireny. Nefa natelin’ny tehin’i Arona ny tehin’ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nihamafy ny fon’i Farao ka tsy nihaino azy mirahalahy izy, araka izay efa nolazain’NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza voalohany: Ny rano tonga ra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Mosesy: Mafy fo i Farao ka mandà tsy hamela ny olona handeha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mankanesa ao aminy ianao rahampitso maraina; indro, handeha ho any amoron-drano izy; mijanòna eo amoron’i Neily ianao mandra-piaviny; ary ny tehina, ilay niova ho menarana, dia hoentinao eny an-tananao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia lazao aminy hoe: NY TOMPO, Andriamanitry ny Hebreo, no naniraka ahy hankaty aminao hilaza hoe: Avelao ny oloko handeha mba hanompoany Ahy any an-tany efitra. Nefa indro, tsy nihaino ianao mandraka ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO: Izao no hahafantaranao fa Izaho no TOMPO: Indro, ny tehiko etỳ an-tanako no hikapohako ny rano ao Neily ka ho tonga ra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia ho faty ny hazandrano ao Neily ka ho maimbo i Neily, ary tsy ho afaka hisotro ny rano avy ao Neily intsony ny Ejiptiana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nanafatra an’i Mosesy koa NY TOMPO hoe: Lazao amin’i Arona hoe: Raiso ny tehinao ka atsory eo ambonin’ny ranon’i Ejipta ny tananao, dia eny ambonin’ny sampan-dranony, eny ambonin’ny lakandranony, eny ambonin’ny heniheniny ary eny ambonin’ny kamoriny rehetra, mba ho tonga ra ireny. Ary hisy ra manerana ny tany Ejipta manontolo, na amin’ny fitoeran-drano hazo na amin’ny fitoeran-drano vato.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nataon’i Mosesy sy i Arona, araka izay nandidian’NY TOMPO, izany ka nanainga ny tehina izy dia nikapoka ny rano tao Neily teo imason’i Farao sy teo imason’ny mpanompony, ary tonga ra ny rano rehetra tao Neily '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ka maty ny hazandrano izay tao amin’i Neily. Tonga maimbo i Neily ka tsy azon’ny Ejiptiana nosotroina ny rano avy ao. Ary ny ra dia nanerana ny tany Ejipta manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nefa mba nanao toy izany tamin’ny sikidiny koa ny ombiasy tany Ejipta dia nihamafy ny fon’i Farao ka tsy nihaino azy mirahalahy izy, araka izay efa nolazain’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Niverina nankao an-tranony i Farao sady tsy mba nahoany akory ny zava-nitranga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nihady rano hosotroiny teny amoron’i Neily teny ny Ejiptiana rehetra fa tsy azony nisotroana ny rano tao Neily.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fito andro no lasa taorianan’ny namelezan’NY TOMPO an’i Neily.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza faharoa: Ny sahona'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Mosesy: Mankanesa ao amin’i Farao ka lazao aminy hoe: Izao no lazain’NY TOMPO: Avelao ny oloko handeha mba hanompo Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa raha mandà tsy hamela azy handeha ianao, indro Aho hamely ny taninao rehetra amin’ny sahona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'dia ho feno sahona i Neily, ary hiakatra ireny ka hiditra ao an-tranonao, ao an’efitrano fandrianao, eny ambonin’ny farafaranao, any amin’ny tranon’ny mpanomponao, any amin’ny vahoakanao ary eny amin’ny fatanao sy eny amin’ny vilia fanaova-mofonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hiakaran’ny sahona eo aminao sy ny vahoakanao ary ny mpanomponao rehetra.
