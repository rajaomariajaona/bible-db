document_id: EXO.7,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Jereo, efa nataoko andriamanitra ho an’i Farao ianao; ary i Arona rahalahinao kosa dia ho mpaminaninao. '
  '10':
  - type: text
    content: 'Dia nankao amin’i Farao i Mosesy sy i Arona ka nanatanteraka izay nandidian’NY TOMPO. Natsipin’i Arona teo anatrehan’i Farao sy teo anatrehan’ny mpanompony ny tehiny ka tonga menarana. '
  '11':
  - type: text
    content: 'Nefa nampiantsoan’i Farao ny olon-kendry sy ny mpanao ody; ary ireo ombiasin’i Ejipta ireo dia mba nanao toy izany koa tamin’ny sikidiny. '
  '12':
  - type: text
    content: 'Dia samy nanipy ny tehiny avy izy ireo ka tonga menarana ireny. Nefa natelin’ny tehin’i Arona ny tehin’ireo. '
  '13':
  - type: text
    content: Dia nihamafy ny fon’i Farao ka tsy nihaino azy mirahalahy izy, araka izay efa nolazain’NY TOMPO.
  - type: heading
    content: 'Ny loza voalohany: Ny rano tonga ra'
  '14':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Mafy fo i Farao ka mandà tsy hamela ny olona handeha. '
  '15':
  - type: text
    content: 'Mankanesa ao aminy ianao rahampitso maraina; indro, handeha ho any amoron-drano izy; mijanòna eo amoron’i Neily ianao mandra-piaviny; ary ny tehina, ilay niova ho menarana, dia hoentinao eny an-tananao, '
  '16':
  - type: text
    content: 'dia lazao aminy hoe: NY TOMPO, Andriamanitry ny Hebreo, no naniraka ahy hankaty aminao hilaza hoe: Avelao ny oloko handeha mba hanompoany Ahy any an-tany efitra. Nefa indro, tsy nihaino ianao mandraka ankehitriny. '
  '17':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO: Izao no hahafantaranao fa Izaho no TOMPO: Indro, ny tehiko etỳ an-tanako no hikapohako ny rano ao Neily ka ho tonga ra izany. '
  '18':
  - type: text
    content: Dia ho faty ny hazandrano ao Neily ka ho maimbo i Neily, ary tsy ho afaka hisotro ny rano avy ao Neily intsony ny Ejiptiana.
  '19':
  - type: text
    content: 'Nanafatra an’i Mosesy koa NY TOMPO hoe: Lazao amin’i Arona hoe: Raiso ny tehinao ka atsory eo ambonin’ny ranon’i Ejipta ny tananao, dia eny ambonin’ny sampan-dranony, eny ambonin’ny lakandranony, eny ambonin’ny heniheniny ary eny ambonin’ny kamoriny rehetra, mba ho tonga ra ireny. Ary hisy ra manerana ny tany Ejipta manontolo, na amin’ny fitoeran-drano hazo na amin’ny fitoeran-drano vato.'
  '2':
  - type: text
    content: 'Ianao no hilaza izay rehetra handidiako anao, ary i Arona rahalahinao kosa no hiteny amin’i Farao, mba hamelany ny Zanak’Israely hiala avy ao amin’ny taniny. '
  '20':
  - type: text
    content: 'Nataon’i Mosesy sy i Arona, araka izay nandidian’NY TOMPO, izany ka nanainga ny tehina izy dia nikapoka ny rano tao Neily teo imason’i Farao sy teo imason’ny mpanompony, ary tonga ra ny rano rehetra tao Neily '
  '21':
  - type: text
    content: ka maty ny hazandrano izay tao amin’i Neily. Tonga maimbo i Neily ka tsy azon’ny Ejiptiana nosotroina ny rano avy ao. Ary ny ra dia nanerana ny tany Ejipta manontolo.
  '22':
  - type: text
    content: 'Nefa mba nanao toy izany tamin’ny sikidiny koa ny ombiasy tany Ejipta dia nihamafy ny fon’i Farao ka tsy nihaino azy mirahalahy izy, araka izay efa nolazain’NY TOMPO. '
  '23':
  - type: text
    content: 'Niverina nankao an-tranony i Farao sady tsy mba nahoany akory ny zava-nitranga. '
  '24':
  - type: text
    content: Dia nihady rano hosotroiny teny amoron’i Neily teny ny Ejiptiana rehetra fa tsy azony nisotroana ny rano tao Neily.
  '25':
  - type: text
    content: Fito andro no lasa taorianan’ny namelezan’NY TOMPO an’i Neily.
  - type: heading
    content: 'Ny loza faharoa: Ny sahona'
  '26':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Mankanesa ao amin’i Farao ka lazao aminy hoe: Izao no lazain’NY TOMPO: Avelao ny oloko handeha mba hanompo Ahy. '
  '27':
  - type: text
    content: 'Fa raha mandà tsy hamela azy handeha ianao, indro Aho hamely ny taninao rehetra amin’ny sahona; '
  '28':
  - type: text
    content: 'dia ho feno sahona i Neily, ary hiakatra ireny ka hiditra ao an-tranonao, ao an’efitrano fandrianao, eny ambonin’ny farafaranao, any amin’ny tranon’ny mpanomponao, any amin’ny vahoakanao ary eny amin’ny fatanao sy eny amin’ny vilia fanaova-mofonao. '
  '29':
  - type: text
    content: Hiakaran’ny sahona eo aminao sy ny vahoakanao ary ny mpanomponao rehetra.
  '3':
  - type: text
    content: 'Ary Izaho hanamafy ny fon’i Farao ka hanamaro ny famantarana sy ny fahagagana izay hataoko eto amin’ny tany Ejipta. '
  '4':
  - type: text
    content: 'Tsy hihaino anareo i Farao ka hamely an’i Ejipta ny tanako, ary fitsarana lehibe no hitondrako ny antokon’ny Zanak’Israely oloko hiala amin’ny tany Ejipta. '
  '5':
  - type: text
    content: Dia ho fantatry ny Ejiptiana fa Izaho no TOMPO, rehefa manatsotra ny tanako amin’i Ejipta Aho ka hitondra ny Zanak’Israely hivoaka avy eo anivony.
  '6':
  - type: text
    content: Dia nataon’i Mosesy sy i Arona izany. Araka izay nandidian’NY TOMPO azy no nataony.
  '7':
  - type: text
    content: Valopolo taona i Mosesy ary telo amby valopolo taona i Arona, fony niteny tamin’i Farao izy mirahalahy.
  - type: heading
    content: Lavin’i Farao ny tenin’i Mosesy sy i Arona
  '8':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy sy i Arona: '
  '9':
  - type: text
    content: 'Raha miteny aminareo i Farao hoe: Manaova famantarana, dia lazao amin’i Arona hoe: Raiso ny tehinao ka atsipazo eo anatrehan’i Farao dia ho tonga menarana iny. '
