document_id: 1CH.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandresen’i Davida ny fahavalony
  - type: heading
    content: 2Sam 8.1-14
  - type: text
    content: Taorianan’izany dia nandresy ny Filistina i Davida ka nampietry azy, ary i Gata sy ny vohitra miankina aminy dia nesoriny tamin’ny tanan’ny Filistina.
  '10':
  - type: text
    content: 'dia naniraka an’i Hadorama zanany hankany amin’i Davida mpanjaka izy hiarahaba sy hisaotra azy noho ny niadiany tamin’i Hadadezera sy ny nandreseny azy, sady nampitondrainy fanaka volamena sy volafotsy ary varahina izay samy maro karazana izy; fa i Hadadezera dia fahavalon’i Toy. '
  '11':
  - type: text
    content: Nohamasinin’i Davida mpanjaka ho an’NY TOMPO koa izany mbamin’ny volafotsy sy ny volamena noentiny avy tamin’ny firenena rehetra, dia tany Edoma sy Moaba, tany amin’ny taranak’i Amona sy ny Filistina ary ny Amalekita.
  '12':
  - type: text
    content: 'Naharesy ny Edomita izay nisy valo arivo sy iray alina teo amin’ny Lohasahantsira i Abisay, zanak’i Zeroia. '
  '13':
  - type: text
    content: Ary nametraka miaramila tany Edoma izy; dia tonga mpanompon’i Davida ny Edomita rehetra. Fa NY TOMPO nampandresy an’i Davida tany amin’izay rehetra nalehany.
  - type: heading
    content: Ireo mpanao raharaham-panjakan’i Davida
  - type: heading
    content: 2Sam 8.15-18
  '14':
  - type: text
    content: 'Nanjaka tamin’ny Israely rehetra i Davida ka nitsara sy nitondra ny vahoakany rehetra tamin’ny fahamarinana. '
  '15':
  - type: text
    content: 'I Joaba, zanak’i Zeroia, no lehiben’ny miaramila; i Josafata, zanak’i Ahiloda, no mpitadidy ny raharaham-panjakana; '
  '16':
  - type: text
    content: 'i Zadoka, zanak’i Ahitoba, sy i Abimeleka, zanak’i Abiatara, no mpisorona; ary i Saosa no mpitantsoratra; '
  '17':
  - type: text
    content: ary i Benaia, zanak’i Jehoiada, no mpifehy ny Keretita sy ny Peletita; ary ny zanak’i Davida no lehibe tamin’izay akaiky ny mpanjaka.
  '2':
  - type: text
    content: Nandresy ny Moabita koa izy ka tonga mpanompon’i Davida nandoa hetra ireo.
  '3':
  - type: text
    content: 'Dia resin’i Davida koa i Hadadezera, mpanjakan’i Zoba akaikin’i Hamata, tamin’izy nandeha nampiorina ny fanjakany tany amoron’ny ony Eofrata. '
  '4':
  - type: text
    content: I Davida dia nahazo babo kalesy arivo fitondra miady taminy sy mpitaingin-tsoavaly fito arivo ary miaramila mandeha an-tongotra roa alina; notraingotraingoin’i Davida avokoa ny soavalin-kalesy fitondra miady rehetra, fa ny tokony ho amin’ny kalesy zato fitondra miady ihany no navelany.
  '5':
  - type: text
    content: 'Nony tonga hanampy an’i Hadadezera, mpanjakan’i Zoba, ny Arameana avy any Damaskosy, dia nahafatesan’i Davida olona roa arivo sy roa alina ny Arameana. '
  '6':
  - type: text
    content: 'Nisy mpifehy namponenin’i Davida tany Arama any Damaskosy; dia tonga mpanompon’i Davida ny Arameana ka nandoa hetra. Fa NY TOMPO nampahazo fandresena an’i Davida tany amin’izay rehetra nalehany. '
  '7':
  - type: text
    content: 'Ary nalain’i Davida ny ampinga volamena teny amin’ny mpanompon’i Hadadezera ka noentiny nankany Jerosalema. '
  '8':
  - type: text
    content: Tao Tibata sy Kona, tanànan’i Hadadezera, no nahazoan’i Davida babo varahina be dia be, ary izany no nanaovan’i Solomona ilay koveta varahina lehibe sy ny andry ary ny fanaka varahina.
  '9':
  - type: text
    content: 'Nony ren’i Toy, mpanjakan’i Hamata, fa naharesy ny miaramila rehetra an’i Hadadezera, mpanjakan’i Zoba, i Davida, '
