document_id: 1CH.18,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandresen’i Davida ny fahavalony
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Sam 8.1-14
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Taorianan’izany dia nandresy ny Filistina i Davida ka nampietry azy, ary i Gata sy ny vohitra miankina aminy dia nesoriny tamin’ny tanan’ny Filistina.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'dia naniraka an’i Hadorama zanany hankany amin’i Davida mpanjaka izy hiarahaba sy hisaotra azy noho ny niadiany tamin’i Hadadezera sy ny nandreseny azy, sady nampitondrainy fanaka volamena sy volafotsy ary varahina izay samy maro karazana izy; fa i Hadadezera dia fahavalon’i Toy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nohamasinin’i Davida mpanjaka ho an’NY TOMPO koa izany mbamin’ny volafotsy sy ny volamena noentiny avy tamin’ny firenena rehetra, dia tany Edoma sy Moaba, tany amin’ny taranak’i Amona sy ny Filistina ary ny Amalekita.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Naharesy ny Edomita izay nisy valo arivo sy iray alina teo amin’ny Lohasahantsira i Abisay, zanak’i Zeroia. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary nametraka miaramila tany Edoma izy; dia tonga mpanompon’i Davida ny Edomita rehetra. Fa NY TOMPO nampandresy an’i Davida tany amin’izay rehetra nalehany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo mpanao raharaham-panjakan’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Sam 8.15-18
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nanjaka tamin’ny Israely rehetra i Davida ka nitsara sy nitondra ny vahoakany rehetra tamin’ny fahamarinana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I Joaba, zanak’i Zeroia, no lehiben’ny miaramila; i Josafata, zanak’i Ahiloda, no mpitadidy ny raharaham-panjakana; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'i Zadoka, zanak’i Ahitoba, sy i Abimeleka, zanak’i Abiatara, no mpisorona; ary i Saosa no mpitantsoratra; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ary i Benaia, zanak’i Jehoiada, no mpifehy ny Keretita sy ny Peletita; ary ny zanak’i Davida no lehibe tamin’izay akaiky ny mpanjaka.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nandresy ny Moabita koa izy ka tonga mpanompon’i Davida nandoa hetra ireo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia resin’i Davida koa i Hadadezera, mpanjakan’i Zoba akaikin’i Hamata, tamin’izy nandeha nampiorina ny fanjakany tany amoron’ny ony Eofrata. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I Davida dia nahazo babo kalesy arivo fitondra miady taminy sy mpitaingin-tsoavaly fito arivo ary miaramila mandeha an-tongotra roa alina; notraingotraingoin’i Davida avokoa ny soavalin-kalesy fitondra miady rehetra, fa ny tokony ho amin’ny kalesy zato fitondra miady ihany no navelany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nony tonga hanampy an’i Hadadezera, mpanjakan’i Zoba, ny Arameana avy any Damaskosy, dia nahafatesan’i Davida olona roa arivo sy roa alina ny Arameana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nisy mpifehy namponenin’i Davida tany Arama any Damaskosy; dia tonga mpanompon’i Davida ny Arameana ka nandoa hetra. Fa NY TOMPO nampahazo fandresena an’i Davida tany amin’izay rehetra nalehany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nalain’i Davida ny ampinga volamena teny amin’ny mpanompon’i Hadadezera ka noentiny nankany Jerosalema. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tao Tibata sy Kona, tanànan’i Hadadezera, no nahazoan’i Davida babo varahina be dia be, ary izany no nanaovan’i Solomona ilay koveta varahina lehibe sy ny andry ary ny fanaka varahina.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nony ren’i Toy, mpanjakan’i Hamata, fa naharesy ny miaramila rehetra an’i Hadadezera, mpanjakan’i Zoba, i Davida, '
