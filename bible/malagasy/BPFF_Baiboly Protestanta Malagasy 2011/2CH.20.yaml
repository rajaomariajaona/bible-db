document_id: 2CH.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voatafika ny fanjakan’ny Joda; ny vavaka nataon’i Josafata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony afaka izany dia avy hiady amin’i Josafata ny taranak’i Moaba sy ny taranak’i Amona mbamin’ny Meonita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy tonga ka nanambara tamin’i Josafata hoe: Indreo, misy olona betsaka avy any andafin’ny ranomasina, dia avy any Arama, ho avy hiady aminao; indreo, ao Hazezona-Tamara, na Eny-Gedỳ izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia natahotra i Josafata ka nanatrika tsara hitady NY TOMPO sady niantso andro fifadian-kanina ho an’ny tanin’ny Joda rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niangona hangataka famonjena amin’NY TOMPO ny Joda; eny, ny avy tamin’ny tanànan’i Joda rehetra no tonga hitady NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nijoro teo amin’ny fiangonan’i Joda sy i Jerosalema, tao amin’ny tranon’NY TOMPO, teo anoloan’ny kianja vaovao, i Josafata '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka niteny hoe: RY TOMPO, Andriamanitry ny razanay ô, tsy Ianao va no Andriamanitra any an-danitra? Eny, Ianao no manapaka amin’ny fanjakan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' rehetra, ary eo an-tananao ny hery sy ny fahefana ka tsy misy mahasakana Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ry Andriamanitray ô, tsy Ianao va no nandroaka ny mponina tamin’ity tany ity hiala teo anoloan’ny Israely olonao ka nanome azy mandrakizay ho an’ny taranak’i Abrahama sakaizanao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nonina teto izy ka nanao fitoerana masina ho an’ny anaranao teto sady nilaza hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha manjo anay ny loza, na sabatra, na famaliana, na areti-mandringana, na mosary, ary hitsangana manatrika ity trano ity sy eto anatrehanao izahay, fa ny anaranao no amin’ity trano ity, koa raha hitaraina aminao amin’ny fahorianay izahay dia hihaino Ianao ka hamonjy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa indreo, ny taranak’i Amona sy i Moaba ary ny avy any an-tendrombohitra Seìra, dia ilay tsy navelanao hotafihin’ny Israely, fony izy nivoaka avy tany Ejipta ka nivily fa tsy nandringana azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'nefa indreo, mamaly ratsy anay izy ka avy handroaka anay amin’ny lova nomenao anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ry Andriamanitray ô, tsy hitsara azy va Ianao? Fa izahay dia tsy manan-kery hanohitra ireo olona betsaka ireo, izay avy hamely anay, koa tsy hitanay izay hataonay; fa Ianao no andrandrain’ny masonay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nomen’NY TOMPO fandresena ny Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny Joda rehetra mbamin’ny vady aman-janany koa dia samy nijoro teo anatrehan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary i Jahaziela, zanak’i Zakaria, zanak’i Benaia, zanak’i Jeiela, zanak’i Matania, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' amin’ny taranak’i Asafa, dia voatsindrin’ny Fanahin’NY TOMPO teo anivon’ny fiangonana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka niteny hoe: Mihainoa ianareo, ry Joda rehetra sy ry mponina eto Jerosalema, ary ianao, ry Josafata mpanjaka: Izao no lazain’NY TOMPO aminareo: Aza matahotra na mivadi-po ny amin’ireo olona betsaka ireo, fa tsy anareo ny ady fa an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rahampitso dia midìna hiady aminy ianareo; fa indreo, hiakatra amin’ny fiakarana Ziza izy; ary ianareo dia hahita azy eo amin’ny faran’ny lohasahan-driaka tandrifin’ny tany efitr’i Jeroela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy ianareo anefa no hiady any; mijoroa tsara fa ho hitanareo ny hamonjen’NY TOMPO anareo, ry Joda sy Jerosalema. Aza matahotra na mivadi-po, fa rahampitso dia mivoaha hiady aminy; fa NY TOMPO no momba anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niankohoka tamin’ny tany i Josafata; ary ny Joda sy ny mponina rehetra tany Jerosalema koa dia niankohoka teo anatrehan’NY TOMPO ka nivavaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nitsangana hidera NY TOMPO, Andriamanitry ny Israely, tamin’ny feo mahery indrindra, ny levita, taranaky ny Kehatita sy taranaky ny Koraìta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nifoha vao maraina izy ireo dia niainga nankany an-tany efitr’i Tekoa; teo am-piaingàna dia nitsangana i Josafata ka niteny hoe: Mihainoa ahy, ry Joda, sy ianareo, ry mponina eto Jerosalema: Minoa NY TOMPO Andriamanitrareo dia ho tafatoetra ianareo; minoa ny mpaminaniny dia hambinina ianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa niara-nihevitra tamin’ny olona izy dia nanendry mpihira ho an’NY TOMPO hidera Azy amin’ny fihaingoana masina raha mandeha eo anatrehan’ny olona efa voaomana hiady izy ireo ka izao no holazainy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mandrakizay ny famindrampony.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Raha vao nanomboka nihoby sy nidera ireo dia nanaovan’NY TOMPO vela-pandrika ny taranak’i Amona sy i Moaba sy ny avy any an-tendrombohitra Seìra izay avy hamely ny Joda ka resy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia nitsangana ny taranak’i Amona sy i Moaba ka namely ny avy any an-tendrombohitra Seìra ary namono sy nandringana azy; nony voaringany ny mponina tany Seìra dia nifandringana ihany koa izy samy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nony tonga teo amin’ilay fitazanana any an-tany efitra ny Joda dia nijery ireo olona betsaka ireo izy, koa indreo, nisy faty niampatrampatra tamin’ny tany satria tsy nisy afa-nandositra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary avy hamabo azy i Josafata sy ny vahoakany, dia nahita harena betsaka sy fitafiana ary fanaka sarobidy teo izy ka namabo mihoatra noho izay zakany hoentina; hateloana no nanangonany ny babo fa be dia be tokoa ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tamin’ny andro fahefatra dia nivory tao amin’ny lohasaha Beraka izy fa tany no nisaorany NY TOMPO; koa izay no nanaovany izany toerana izany hoe lohasaha Beraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Beraka: Fisaorana.'
    marker-yv: yv-n
  - type: text
    text: ' mandraka androany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia niverina ny lehilahy rehetra amin’ny Joda sy Jerosalema ary nitarika azy tamin’ny fifaliana hankany Jerosalema indray i Josafata, fa NY TOMPO nampifaly azy ny amin’ny fahavalony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Niditra tao Jerosalema nitondra valiha sy lokanga ary trompetra izy ka nankao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nahazo ny fanjakana rehetra manodidina ny fahatahorana an’Andriamanitra, nony reny fa NY TOMPO no niady tamin’ny fahavalon’ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary nandry fehizay ny fanjakan’i Josafata; fa nomen’Andriamaniny fiadanana tamin’ny manodidina rehetra izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifaranan’ny fanjakan’i Josafata
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 22.41-51
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nanjaka tamin’ny Joda i Josafata; dimy amby telopolo taona izy raha nanomboka nanjaka, ary dimy amby roapolo taona no nanjakany tany Jerosalema. Ary ny anaran’ny reniny dia Azoba, zanakavavin’i Sily. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nandeha tamin’ny lalana nalehan’i Asa rainy izy ka tsy niala tamin’izany fa nanao izay mahitsy teo imason’NY TOMPO; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: kanefa tsy mba noravana ireo toerana fanaovana sorona; fa ny olona dia tsy mbola nampitodika ny fony hitady ny Andriamanitry ny razany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary ny tantaran’i Josafata sisa, hatramin’ny voalohany ka hatramin’ny farany dia indro, voasoratra ao amin’ny tenin’i Jeho, zanak’i Hanany, izay nakambana ao amin’ny bokin’ny mpanjakan’ny Israely, izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nefa nony afaka izany dia nikambana tamin’i Ahazia, mpanjakan’ny Israely, izay nanao izay ratsy, i Josafata, mpanjakan’ny Joda; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary nikambana taminy hanao sambo hankany Tarsisy izy ka tao Eziona-Gebera no nanaovany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary naminany ny amin’i Josafata i Eliezera, zanak’i Dodavaho, avy any Maresa hoe: Noho ny nikambananao tamin’i Ahazia dia horavan’NY TOMPO ny asanao. Dia nisy fahavakiana ny sambo ka tsy afaka nankany Tarsisy.'
