document_id: 2CH.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Voatafika ny fanjakan’ny Joda; ny vavaka nataon’i Josafata
  - type: text
    content: 'Nony afaka izany dia avy hiady amin’i Josafata ny taranak’i Moaba sy ny taranak’i Amona mbamin’ny Meonita. '
  '10':
  - type: text
    content: 'Koa indreo, ny taranak’i Amona sy i Moaba ary ny avy any an-tendrombohitra Seìra, dia ilay tsy navelanao hotafihin’ny Israely, fony izy nivoaka avy tany Ejipta ka nivily fa tsy nandringana azy; '
  '11':
  - type: text
    content: 'nefa indreo, mamaly ratsy anay izy ka avy handroaka anay amin’ny lova nomenao anay. '
  '12':
  - type: text
    content: Ry Andriamanitray ô, tsy hitsara azy va Ianao? Fa izahay dia tsy manan-kery hanohitra ireo olona betsaka ireo, izay avy hamely anay, koa tsy hitanay izay hataonay; fa Ianao no andrandrain’ny masonay.
  - type: heading
    content: Nomen’NY TOMPO fandresena ny Joda
  '13':
  - type: text
    content: 'Ny Joda rehetra mbamin’ny vady aman-janany koa dia samy nijoro teo anatrehan’NY TOMPO. '
  '14':
  - type: text
    content: 'Ary i Jahaziela, zanak’i Zakaria, zanak’i Benaia, zanak’i Jeiela, zanak’i Matania, '
  - type: text
    content: levita
  - type: text
    content: ' amin’ny taranak’i Asafa, dia voatsindrin’ny Fanahin’NY TOMPO teo anivon’ny fiangonana '
  '15':
  - type: text
    content: 'ka niteny hoe: Mihainoa ianareo, ry Joda rehetra sy ry mponina eto Jerosalema, ary ianao, ry Josafata mpanjaka: Izao no lazain’NY TOMPO aminareo: Aza matahotra na mivadi-po ny amin’ireo olona betsaka ireo, fa tsy anareo ny ady fa an’Andriamanitra. '
  '16':
  - type: text
    content: 'Rahampitso dia midìna hiady aminy ianareo; fa indreo, hiakatra amin’ny fiakarana Ziza izy; ary ianareo dia hahita azy eo amin’ny faran’ny lohasahan-driaka tandrifin’ny tany efitr’i Jeroela. '
  '17':
  - type: text
    content: Tsy ianareo anefa no hiady any; mijoroa tsara fa ho hitanareo ny hamonjen’NY TOMPO anareo, ry Joda sy Jerosalema. Aza matahotra na mivadi-po, fa rahampitso dia mivoaha hiady aminy; fa NY TOMPO no momba anareo.
  '18':
  - type: text
    content: 'Dia niankohoka tamin’ny tany i Josafata; ary ny Joda sy ny mponina rehetra tany Jerosalema koa dia niankohoka teo anatrehan’NY TOMPO ka nivavaka. '
  '19':
  - type: text
    content: Dia nitsangana hidera NY TOMPO, Andriamanitry ny Israely, tamin’ny feo mahery indrindra, ny levita, taranaky ny Kehatita sy taranaky ny Koraìta.
  '2':
  - type: text
    content: 'Ary nisy tonga ka nanambara tamin’i Josafata hoe: Indreo, misy olona betsaka avy any andafin’ny ranomasina, dia avy any Arama, ho avy hiady aminao; indreo, ao Hazezona-Tamara, na Eny-Gedỳ izy.'
  '20':
  - type: text
    content: 'Ary nifoha vao maraina izy ireo dia niainga nankany an-tany efitr’i Tekoa; teo am-piaingàna dia nitsangana i Josafata ka niteny hoe: Mihainoa ahy, ry Joda, sy ianareo, ry mponina eto Jerosalema: Minoa NY TOMPO Andriamanitrareo dia ho tafatoetra ianareo; minoa ny mpaminaniny dia hambinina ianareo.'
  '21':
  - type: text
    content: 'Rehefa niara-nihevitra tamin’ny olona izy dia nanendry mpihira ho an’NY TOMPO hidera Azy amin’ny fihaingoana masina raha mandeha eo anatrehan’ny olona efa voaomana hiady izy ireo ka izao no holazainy:'
  - type: text
    content: Miderà NY TOMPO,
  - type: text
    content: fa mandrakizay ny famindrampony.
  '22':
  - type: text
    content: 'Raha vao nanomboka nihoby sy nidera ireo dia nanaovan’NY TOMPO vela-pandrika ny taranak’i Amona sy i Moaba sy ny avy any an-tendrombohitra Seìra izay avy hamely ny Joda ka resy ireo. '
  '23':
  - type: text
    content: Dia nitsangana ny taranak’i Amona sy i Moaba ka namely ny avy any an-tendrombohitra Seìra ary namono sy nandringana azy; nony voaringany ny mponina tany Seìra dia nifandringana ihany koa izy samy izy.
  '24':
  - type: text
    content: 'Nony tonga teo amin’ilay fitazanana any an-tany efitra ny Joda dia nijery ireo olona betsaka ireo izy, koa indreo, nisy faty niampatrampatra tamin’ny tany satria tsy nisy afa-nandositra. '
  '25':
  - type: text
    content: 'Ary avy hamabo azy i Josafata sy ny vahoakany, dia nahita harena betsaka sy fitafiana ary fanaka sarobidy teo izy ka namabo mihoatra noho izay zakany hoentina; hateloana no nanangonany ny babo fa be dia be tokoa ireny. '
  '26':
  - type: text
    content: Tamin’ny andro fahefatra dia nivory tao amin’ny lohasaha Beraka izy fa tany no nisaorany NY TOMPO; koa izay no nanaovany izany toerana izany hoe lohasaha Beraka
  - type: note
    content: 'Beraka: Fisaorana.'
  - type: text
    content: ' mandraka androany.'
  '27':
  - type: text
    content: 'Dia niverina ny lehilahy rehetra amin’ny Joda sy Jerosalema ary nitarika azy tamin’ny fifaliana hankany Jerosalema indray i Josafata, fa NY TOMPO nampifaly azy ny amin’ny fahavalony. '
  '28':
  - type: text
    content: 'Niditra tao Jerosalema nitondra valiha sy lokanga ary trompetra izy ka nankao amin’ny tranon’NY TOMPO. '
  '29':
  - type: text
    content: 'Dia nahazo ny fanjakana rehetra manodidina ny fahatahorana an’Andriamanitra, nony reny fa NY TOMPO no niady tamin’ny fahavalon’ny Israely. '
  '3':
  - type: text
    content: 'Dia natahotra i Josafata ka nanatrika tsara hitady NY TOMPO sady niantso andro fifadian-kanina ho an’ny tanin’ny Joda rehetra. '
  '30':
  - type: text
    content: Ary nandry fehizay ny fanjakan’i Josafata; fa nomen’Andriamaniny fiadanana tamin’ny manodidina rehetra izy.
  - type: heading
    content: Ny nifaranan’ny fanjakan’i Josafata
  - type: heading
    content: 1Mpa 22.41-51
  '31':
  - type: text
    content: 'Nanjaka tamin’ny Joda i Josafata; dimy amby telopolo taona izy raha nanomboka nanjaka, ary dimy amby roapolo taona no nanjakany tany Jerosalema. Ary ny anaran’ny reniny dia Azoba, zanakavavin’i Sily. '
  '32':
  - type: text
    content: 'Nandeha tamin’ny lalana nalehan’i Asa rainy izy ka tsy niala tamin’izany fa nanao izay mahitsy teo imason’NY TOMPO; '
  '33':
  - type: text
    content: kanefa tsy mba noravana ireo toerana fanaovana sorona; fa ny olona dia tsy mbola nampitodika ny fony hitady ny Andriamanitry ny razany.
  '34':
  - type: text
    content: Ary ny tantaran’i Josafata sisa, hatramin’ny voalohany ka hatramin’ny farany dia indro, voasoratra ao amin’ny tenin’i Jeho, zanak’i Hanany, izay nakambana ao amin’ny bokin’ny mpanjakan’ny Israely, izany.
  '35':
  - type: text
    content: 'Nefa nony afaka izany dia nikambana tamin’i Ahazia, mpanjakan’ny Israely, izay nanao izay ratsy, i Josafata, mpanjakan’ny Joda; '
  '36':
  - type: text
    content: 'ary nikambana taminy hanao sambo hankany Tarsisy izy ka tao Eziona-Gebera no nanaovany azy. '
  '37':
  - type: text
    content: 'Ary naminany ny amin’i Josafata i Eliezera, zanak’i Dodavaho, avy any Maresa hoe: Noho ny nikambananao tamin’i Ahazia dia horavan’NY TOMPO ny asanao. Dia nisy fahavakiana ny sambo ka tsy afaka nankany Tarsisy.'
  '4':
  - type: text
    content: 'Dia niangona hangataka famonjena amin’NY TOMPO ny Joda; eny, ny avy tamin’ny tanànan’i Joda rehetra no tonga hitady NY TOMPO. '
  '5':
  - type: text
    content: 'Ary nijoro teo amin’ny fiangonan’i Joda sy i Jerosalema, tao amin’ny tranon’NY TOMPO, teo anoloan’ny kianja vaovao, i Josafata '
  '6':
  - type: text
    content: 'ka niteny hoe: RY TOMPO, Andriamanitry ny razanay ô, tsy Ianao va no Andriamanitra any an-danitra? Eny, Ianao no manapaka amin’ny fanjakan’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra, ary eo an-tananao ny hery sy ny fahefana ka tsy misy mahasakana Anao. '
  '7':
  - type: text
    content: 'Ry Andriamanitray ô, tsy Ianao va no nandroaka ny mponina tamin’ity tany ity hiala teo anoloan’ny Israely olonao ka nanome azy mandrakizay ho an’ny taranak’i Abrahama sakaizanao? '
  '8':
  - type: text
    content: 'Ary nonina teto izy ka nanao fitoerana masina ho an’ny anaranao teto sady nilaza hoe: '
  '9':
  - type: text
    content: 'Raha manjo anay ny loza, na sabatra, na famaliana, na areti-mandringana, na mosary, ary hitsangana manatrika ity trano ity sy eto anatrehanao izahay, fa ny anaranao no amin’ity trano ity, koa raha hitaraina aminao amin’ny fahorianay izahay dia hihaino Ianao ka hamonjy. '
