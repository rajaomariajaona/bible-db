document_id: EXO.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra maneho ny heriny handresy lahatra an’i Mosesy
  - type: text
    content: 'Dia namaly i Mosesy hoe: Indro, tsy hino ahy na hihaino ny feoko izy ireo fa hilaza hoe: Tsy niseho taminao NY TOMPO!'
  '10':
  - type: text
    content: 'Ary hoy i Mosesy tamin’NY TOMPO: Tompo ô, mifona aminao aho, fa olona tsy mahay mandaha-teny, na hatramin’ny taloha, na hatramin’izao itenenanao amin’ny mpanomponao izao aza; votsa vava sy miadam-piteny anie aho e! '
  '11':
  - type: text
    content: 'Dia hoy NY TOMPO taminy: Iza moa no nanome vava ho an’ny olona? Ary iza no mampahamoana, na mampaharenina, na mampahiratra, na mampahajamba? Tsy Izaho TOMPO va? '
  '12':
  - type: text
    content: Koa ankehitriny, mandehana, fa Izaho no homba ny vavanao ka hanoro anao izay holazainao.
  '13':
  - type: text
    content: 'Nefa hoy izy: Tompo ô, mifona aminao aho, iraho izay hafa tianao hirahina. '
  '14':
  - type: text
    content: 'Dia nirehitra tamin’i Mosesy ny fahatezeran’NY TOMPO ka hoy Izy: Tsy ao ihany va i Arona '
  - type: text
    content: levita
  - type: text
    content: ' rahalahinao? Fantatro fa mahay mandaha-teny izy. Ary indro koa, avy hitsena anao izy. Koa rehefa mahita anao izy dia ho faly ny fony. '
  '15':
  - type: text
    content: 'Dia hiteny aminy ianao ka hametraka ny teny ao am-bavany; ary Izaho homba ny vavanao sy ny vavany ka hanoro anareo izay hataonareo. '
  '16':
  - type: text
    content: 'Ary izy no ho solovavanao hiteny amin’ny olona, ary ianao kosa dia ho solon’Andriamanitra ho azy. '
  '17':
  - type: text
    content: Dia hoentinao eny an-tananao io tehina io, izay hanaovanao ireo famantarana ireo.
  - type: heading
    content: Miverina eo amin’ny olony i Mosesy
  '18':
  - type: text
    content: 'Dia lasa nandeha i Mosesy ka niverina nankany amin’i Jetro rafozany ary niteny taminy hoe: Miangavy anao aho, aoka aho handeha hiverina any amin’ny rahalahiko izay any Ejipta ka hijery na mbola velona ihany izy na tsia. Ary hoy i Jetro tamin’i Mosesy: Mandehana amin’ny fiadanana!'
  '19':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy tany Midiana: Mandehana miverina any Ejipta fa efa maty ny olona rehetra izay nifofo ny ainao. '
  '2':
  - type: text
    content: 'Hoy NY TOMPO taminy: Inona moa iny an-tananao iny? Dia hoy izy: Tehina. '
  '20':
  - type: text
    content: Dia nalain’i Mosesy ny vadiny sy ireo zanany lahy ka nampitaingeniny boriky dia niverina ho any amin’ny tany Ejipta izy. Ary noentin’i Mosesy teny an-tanany ilay tehin’Andriamanitra.
  '21':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Amin’izao fiverenanao mankany Ejipta izao, indreo ireo famantarana rehetra izay nataoko eo an-tananao, dia ataovy eo anatrehan’i Farao, fa Izaho hanamafy ny fony ka tsy handefa ny olona izy. '
  '22':
  - type: text
    content: 'Dia lazao amin’i Farao hoe: Izao no lazain’NY TOMPO: Israely no zanako lahy, lahimatoako. '
  '23':
  - type: text
    content: 'Koa efa nolazaiko taminao hoe: Avelao ny zanako handeha mba hanompo Ahy; kanjo nandà tsy namela azy handeha ianao; koa indro Aho hamono ny zanakao lahy, ny lahimatoanao.'
  '24':
  - type: text
    content: 'Nony tany an-dalana, tao amin’ny fandriam-bahiny i Mosesy, dia nitsena azy NY TOMPO ka nitady hamono azy. '
  '25':
  - type: text
    content: 'Dia naka fiharatra vato i Zipora ka namora ny zanany, ary izay nesoriny dia nakasony ny tongony ka hoy izy: Vady azoko tamin’ny fandatsahan-dra ianao! '
  '26':
  - type: text
    content: 'Dia niala taminy Izy rehefa hoy Ravehivavy hoe: Vady azo tamin’ny fandatsahan-dra ianao, noho ny famorana.'
  '27':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Arona: Mandehana mitsena an’i Mosesy any an-tany efitra. Dia lasa nandeha izy ka nifanena taminy tao amin’ny tendrombohitr’Andriamanitra, dia nanoroka azy. '
  '28':
  - type: text
    content: Ary nambaran’i Mosesy tamin’i Arona izay teny rehetra nanirahan’NY TOMPO azy sy izay famantarana rehetra nandidiany azy.
  '29':
  - type: text
    content: 'Dia lasa nandeha i Mosesy sy i Arona ka nanangona ny loholon’ny Zanak’Israely rehetra. '
  '3':
  - type: text
    content: 'Ary hoy Izy: Atsipazo amin’ny tany iny. Dia natsipiny tamin’ny tany izany ka tonga menarana ary nandositra azy i Mosesy. '
  '30':
  - type: text
    content: 'Dia nolazain’i Arona ny teny rehetra izay nolazain’NY TOMPO tamin’i Mosesy sady nataony teo imason’ny olona ny famantarana. '
  '31':
  - type: text
    content: Dia nino ny olona. Rehefa reny fa NY TOMPO efa namangy ny Zanak’Israely ka efa nitsinjo ny fahoriany dia niankohoka tamin’ny tany izy ka nivavaka.
  '4':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Atsory ny tananao ka raiso amin’ny rambony iny. Dia natsotrany ny tanany ka noraisiny izany ary tonga tehina teo an-tanany indray. '
  '5':
  - type: text
    content: Izany dia mba hinoan’ireo fa efa niseho taminao NY TOMPO, Andriamanitry ny razany, dia Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba.
  '6':
  - type: text
    content: 'Hoy koa NY TOMPO taminy: Atsofohy ao an-tratranao ny tananao. Dia natsofony tao an-tratrany ny tanany, koa nony notsoahiny dia indro, boka ny tanany ka fotsy tahaka ny orampanala. '
  '7':
  - type: text
    content: 'Ary hoy indray Izy: Atsofohy ao amin’ny tratranao indray ny tananao. Dia natsofony tao an-tratrany indray ny tanany, koa nony notsoahiny tamin’ny tratrany dia indro, niverina tahaka ny teo aloha indray. '
  '8':
  - type: text
    content: Raha tsy hino anao izy ireo ka tsy hihaino ny feon’ny famantarana voalohany dia hino ny feon’ny famantarana manaraka.
  '9':
  - type: text
    content: Raha toa ka tsy hino izany famantarana roa izany aza izy, na tsy hihaino ny feonao, dia haka rano avy ao Neily ianao ka hararakao amin’ny tany maina izany; fa izay rano alainao avy ao Neily dia ho tonga ra eo amin’ny tany maina.
  - type: heading
    content: Andriamanitra maniraka an’i Arona hanampy an’i Mosesy
