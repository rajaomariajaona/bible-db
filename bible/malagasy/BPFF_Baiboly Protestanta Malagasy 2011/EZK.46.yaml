document_id: EZK.46,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitsipika manokana ho an’ny mpanjaka
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Ny vavahadin’ny kianja anatiny izay manatrika ny atsinanana dia harindrina mandritra ny henemana fanaovan-draharaha; fa amin’ny Sabata sy amin’ny voaloham-bolana kosa no hivoha izany. '
  '10':
  - type: text
    content: Ny mpanjaka dia hiara-miditra amin’ireo, ary rehefa mivoaka ireo dia hiara-mivoaka aminy izy.
  - type: heading
    content: Fitsipika momba ny fanatitra samihafa
  '11':
  - type: text
    content: 'Amin’ny andro firavoravoana sy ny fotoan-dehibe dia iray '
  - type: text
    content: efaha
  - type: text
    content: ' no ho fanatitra avy amin’ny zavamaniry isam-bantotra ombilahy, ary iray efaha isaky ny ondrilahy, ary ny amin’ny zanak’ondry, dia araka izay tiany, ary ny diloilo dia eran’ny '
  - type: text
    content: hina
  - type: text
    content: ' isan’efaha. '
  '12':
  - type: text
    content: Ary raha ny mpanjaka no manolotra fanatitra dorana manontolo an-tsitrapo, na fanati-pihavanana ho fanatitra an-tsitrapo ho an’NY TOMPO, dia hovohana ny vavahady manatrika ny atsinanana mba hidirany, dia hanolotra ny fanatiny dorana manontolo sy ny fanati-pihavanany izy, tahaka izay ataony amin’ny Sabata; ary rehefa tafavoaka izy dia harindrina ny vavahady.
  '13':
  - type: text
    content: 'Zanak’ondry iray izay iray taona, tsy misy kilema, no hatolotrao isanandro ho fanatitra dorana manontolo ho an’NY TOMPO; isa-maraina no hanateranao azy. '
  '14':
  - type: text
    content: 'Ary hanolotra fanatitra avy amin’ny zavamaniry ho fanampiny isa-maraina ianao, ampahenin’ny efaha, sy diloilo ampahatelon’ny hina handemana ny koba tsara toto; fanatitra avy amin’ny zavamaniry ho an’NY TOMPO izany: lalàna tsy miova mandrakizay izany. '
  '15':
  - type: text
    content: Toy izany no hanoloranao ny zanak’ondry sy ny fanatitra avy amin’ny zavamaniry ary ny diloilo isa-maraina ho fanatitra mandrakariva, dorana manontolo.
  - type: heading
    content: Ny zaralovan’ireo zanaky ny mpanjaka
  '16':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Raha manome zavatra ho an’ny zanany iray ny mpanjaka dia ho lovan’ny zanany izany; eny, ho zaralovany izany. '
  '17':
  - type: text
    content: 'Fa raha manome zavatra avy amin’ny lovany ho an’ny mpanompony iray kosa izy dia ho azy mandra-pahatongan’ny taona fanafahana ihany izany; dia hiverina ho amin’ny mpanjaka indray izany ka ho lova ho an’ny zanany ihany. '
  '18':
  - type: text
    content: Tsy haka amin’ny lovan’ny vahoaka hampiala azy amin’ny zarataniny izy; fa avy amin’ny fananany ihany no hanomezany lova ho an’ny zanany, mba tsy hielezan’ny oloko hiala amin’ny zarataniny.
  - type: heading
    content: Ireo lakozia momba ny tempoly
  '19':
  - type: text
    content: 'Dia noentiny hiditra tamin’ny fidirana eo anilan’ny vavahady ho ao amin’ireo efitrano masin’ny mpisorona, izay manatrika ny avaratra aho; ary indro, nisy toerana malalaka terỳ amin’ny farany andrefana. '
  '2':
  - type: text
    content: 'Dia hiditra avy any ivelany amin’ny lalana mankany amin’ny lalantsaran’ny vavahady ny mpanjaka ka hijanona eo anilan’ny tolanam-bavahady. Ny mpisorona dia hanolotra ny fanatiny dorana manontolo sy ny fanati-pihavanany; hiankohoka eo amin’ny tokonam-bavahady izy dia hivoaka; tsy harindrina ny vavahady raha tsy efa hariva ny andro. '
  '20':
  - type: text
    content: 'Dia hoy izy tamiko: Io no toerana fahandroan’ny mpisorona ny fanati-panonerana sy ny fanatitra noho ny ota sy hanendasany ny fanatitra avy amin’ny zavamaniry mba tsy hitondrany azy mivoaka ho any amin’ny kianja ivelany hanamasina ny olona. '
  '21':
  - type: text
    content: 'Dia noentiny nivoaka ho any amin’ny kianja ivelany aho ka nampiteteziny ny zorony efatra amin’ny kianja; ary indro, ao amin’ny isan-joron’ny kianja dia nisy kianja hafa koa. '
  '22':
  - type: text
    content: 'Teny amin’ny zorony efatra amin’ny kianja dia nisy kianja nofefena, efapolo hakiho avy ny lavany ary telopolo avy ny sakany; mitovy refy ireo kianja an-jorony efatra ireo. '
  '23':
  - type: text
    content: 'Nisy rafi-bato teo anatiny manodidina azy, dia manodidina ireo efatra ireo, izay nisy fatana teo ambanin’izany rafi-bato manodidina izany. '
  '24':
  - type: text
    content: 'Dia hoy Izy tamiko: Ireto no tranon’ny mpahandro. Ao ireo manao fanompoana ao amin’ny Trano no mahandro ny fanatitra alatsa-dra aterin’ny olona.'
  '3':
  - type: text
    content: Ary ny vahoaka koa dia hiankohoka eo anatrehan’NY TOMPO eo am-bavahady amin’ny Sabata sy amin’ny voaloham-bolana.
  '4':
  - type: text
    content: 'Ny fanatitra dorana manontolo izay haterin’ny mpanjaka ho an’NY TOMPO amin’ny andro Sabata dia zanak’ondry enina tsy misy kilema sy ondrilahy iray tsy misy kilema koa. '
  '5':
  - type: text
    content: 'Ny fanatitra avy amin’ny zavamaniry ho fanampin’ilay ondrilahy iray dia iray '
  - type: text
    content: efaha
  - type: text
    content: ', ary ny fanatitra avy amin’ny zavamaniry ho fanampin’ireo zanak’ondry dia araka izay tratry ny ananany, ary ny diloilo dia iray '
  - type: text
    content: hina
  - type: text
    content: ' isan’efaha. '
  '6':
  - type: text
    content: 'Amin’ny voaloham-bolana dia hanolotra vantotra ombilahy iray tsy misy kilema sy zanak’ondry enina ary ondrilahy iray izy; samy tsy hisy kilema ireo. '
  '7':
  - type: text
    content: Ary hanolotra fanatitra avy amin’ny zavamaniry izy, dia iray efaha isam-bantotra ombilahy sy iray efaha isaky ny ondrilahy koa; ary ny amin’ny zanak’ondry dia araka izay tiany, ary ny diloilo dia iray hina isan’efaha.
  '8':
  - type: text
    content: 'Rehefa miditra ny mpanjaka dia amin’ny lalana mankamin’ny lalantsaran’ny vavahady no hidirany, ary amin’ny lalana nalehany ihany koa no hivoahany. '
  '9':
  - type: text
    content: 'Fa raha ny vahoaka kosa no miditra ho eo anatrehan’NY TOMPO amin’ny andro firavoravoana dia izay miditra amin’ny vavahady avaratra hiankohoka dia hivoaka amin’ny vavahady atsimo; ary izay miditra amin’ny vavahady atsimo dia hivoaka amin’ny vavahady avaratra: Tsy hiverina amin’ilay vavahady nidirany izy, fa amin’izay tandrifiny ihany no hivoahany. '
