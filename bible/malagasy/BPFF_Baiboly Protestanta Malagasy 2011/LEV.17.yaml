document_id: LEV.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsipika momba ny ra
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: text
    content: 'Ary na iza na iza amin’ny taranak’Israely na amin’ny vahiny izay monina eo aminareo, no mihinan-dra, na ra inona na ra inona dia ny Tavako no hifanandrina amin’ilay olona mihinan-dra ka hesorina tsy ho amin’ny fireneny izy. '
  '11':
  - type: text
    content: 'Fa ny ain’ny nofo dia ao amin’ny ra; ary nomeko anareo izany hatao ambonin’ny alitara mba hanaovana fanavotana ho anareo satria ny ra, amin’ny aina, no manao fanavotana. '
  '12':
  - type: text
    content: 'Koa izany no nilazako tamin’ny Zanak’Israely hoe: Aza misy mihinan-dra ianareo na ny vahiny izay monina eo aminareo. '
  '13':
  - type: text
    content: 'Na iza na iza amin’ny Zanak’Israely na amin’ny vahiny eo aminy no mihaza ka mahazo biby na vorona izay fihinana, dia hararany amin’ny tany ny rany ka hototofany. '
  '14':
  - type: text
    content: 'Fa ny amin’ny ain’ny zavamananaina rehetra dia ny rany no ainy, koa izany no nilazako tamin’ny Zanak’Israely hoe: Aza mihinana hena mbola misy ra fa ny rany no ain’ny zava-mananaina rehetra, koa izay rehetra mihinana azy dia haringana.'
  '15':
  - type: text
    content: 'Ny olona rehetra, na tompon-tany na vahiny, izay mihinana izay maty ho azy na izay noviraviraim-biby, dia hanasa ny fitafiany sy handro amin’ny rano ary haloto mandra-paharivan’ny andro izy vao hadio. '
  '16':
  - type: text
    content: Fa raha tsy manasa ny fitafiany sy mandro izy dia ho meloka.
  '2':
  - type: text
    content: 'Mitenena amin’i Arona sy ireo zanany ary ny Zanak’Israely rehetra hoe: Izao no didy nomen’NY TOMPO: '
  '3':
  - type: text
    content: 'Na iza na iza amin’ny taranak’Israely no mamono omby na zanak’ondry na osy, na eo an-toby na any ivelan’ny toby, '
  '4':
  - type: text
    content: 'ka tsy mitondra azy ho eo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ', hanaterana azy ho fanatitra ho an’NY TOMPO eo anoloan’ny tabernakelin’NY TOMPO, dia ho meloka noho ny ra nalatsany io olona io ka hesorina tsy ho amin’ny fireneny izy. '
  '5':
  - type: text
    content: 'Araka izany dia hoentin’ny Zanak’Israely ho an’NY TOMPO eo anoloan’ny varavaran’ny tranolay fihaonana ho amin’ny mpisorona ny zavatra vonoiny ho fanatitra izay famonony tany an-tsaha; dia hateriny ho fanati-pihavanana ho an’NY TOMPO izany. '
  '6':
  - type: text
    content: 'Ary ny mpisorona dia hamafy ny ra amin’ny alitaran’NY TOMPO eo anoloan’ny varavaran’ny tranolay fihaonana, dia handoro ny jaborany ka ho fofona manitra ankasitrahana ho an’NY TOMPO izany. '
  '7':
  - type: text
    content: Tsy hanolotra intsony ny fanatiny ho an’ny Seìrima
  - type: note
    content: Heb. osilahy; anaran’andriamanitra tsy izy.
  - type: text
    content: ' izay nijangajangany izy. Ho lalàna maharitra amin’ny taranany fara aman-dimby izany. '
  '8':
  - type: text
    content: 'Ary lazao aminy hoe: Na iza na iza amin’ny taranak’Israely na amin’ny vahiny izay monina eo aminareo no manolotra fanatitra dorana manontolo na fanatitra hafa alatsa-dra '
  '9':
  - type: text
    content: ka tsy mitondra azy ho eo anoloan’ny varavaran’ny tranolay fihaonana hanatitra azy ho an’NY TOMPO dia hesorina tsy ho amin’ny fireneny.
