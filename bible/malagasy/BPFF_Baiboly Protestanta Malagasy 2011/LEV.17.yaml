document_id: LEV.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsipika momba ny ra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin’i Arona sy ireo zanany ary ny Zanak’Israely rehetra hoe: Izao no didy nomen’NY TOMPO: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Na iza na iza amin’ny taranak’Israely no mamono omby na zanak’ondry na osy, na eo an-toby na any ivelan’ny toby, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka tsy mitondra azy ho eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ', hanaterana azy ho fanatitra ho an’NY TOMPO eo anoloan’ny tabernakelin’NY TOMPO, dia ho meloka noho ny ra nalatsany io olona io ka hesorina tsy ho amin’ny fireneny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Araka izany dia hoentin’ny Zanak’Israely ho an’NY TOMPO eo anoloan’ny varavaran’ny tranolay fihaonana ho amin’ny mpisorona ny zavatra vonoiny ho fanatitra izay famonony tany an-tsaha; dia hateriny ho fanati-pihavanana ho an’NY TOMPO izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny mpisorona dia hamafy ny ra amin’ny alitaran’NY TOMPO eo anoloan’ny varavaran’ny tranolay fihaonana, dia handoro ny jaborany ka ho fofona manitra ankasitrahana ho an’NY TOMPO izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy hanolotra intsony ny fanatiny ho an’ny Seìrima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'osilahy; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: anaran’andriamanitra tsy izy.
    marker-yv: yv-n
  - type: text
    text: ' izay nijangajangany izy. Ho lalàna maharitra amin’ny taranany fara aman-dimby izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary lazao aminy hoe: Na iza na iza amin’ny taranak’Israely na amin’ny vahiny izay monina eo aminareo no manolotra fanatitra dorana manontolo na fanatitra hafa alatsa-dra '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ka tsy mitondra azy ho eo anoloan’ny varavaran’ny tranolay fihaonana hanatitra azy ho an’NY TOMPO dia hesorina tsy ho amin’ny fireneny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary na iza na iza amin’ny taranak’Israely na amin’ny vahiny izay monina eo aminareo, no mihinan-dra, na ra inona na ra inona dia ny Tavako no hifanandrina amin’ilay olona mihinan-dra ka hesorina tsy ho amin’ny fireneny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny ain’ny nofo dia ao amin’ny ra; ary nomeko anareo izany hatao ambonin’ny alitara mba hanaovana fanavotana ho anareo satria ny ra, amin’ny aina, no manao fanavotana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa izany no nilazako tamin’ny Zanak’Israely hoe: Aza misy mihinan-dra ianareo na ny vahiny izay monina eo aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Na iza na iza amin’ny Zanak’Israely na amin’ny vahiny eo aminy no mihaza ka mahazo biby na vorona izay fihinana, dia hararany amin’ny tany ny rany ka hototofany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny amin’ny ain’ny zavamananaina rehetra dia ny rany no ainy, koa izany no nilazako tamin’ny Zanak’Israely hoe: Aza mihinana hena mbola misy ra fa ny rany no ain’ny zava-mananaina rehetra, koa izay rehetra mihinana azy dia haringana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny olona rehetra, na tompon-tany na vahiny, izay mihinana izay maty ho azy na izay noviraviraim-biby, dia hanasa ny fitafiany sy handro amin’ny rano ary haloto mandra-paharivan’ny andro izy vao hadio. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa raha tsy manasa ny fitafiany sy mandro izy dia ho meloka.
