document_id: DEU.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famelan-keloka omen’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’io andro io no nilazan’NY TOMPO tamiko hoe: Aoka ianao hipaika vato fisaka roa tahaka ireo teo aloha dia miakara ho etỳ Amiko, etỳ an-tendrombohitra, ary manaova vata hazo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa hosoratako amin’io vato fisaka vaovao io indray ireo teny teo amin’ny vato fisaka nomontsamontsanina ka hataonao ao anatin’ny vata ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nanamboatra vata tamin’ny hazo akasia aho ary nipaika vato fisaka roa tahaka ny teo dia niakatra tao an-tendrombohitra aho; avy eo dia nitondra ny vato fisaka roa teny an-tanako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nasiany soratra tahaka ny teo ihany ny vato fisaka, dia ny Teny Folo izay nolazain’NY TOMPO taminareo tao an-tendrombohitra, tao afovoan’ny afo, tamin’ny andro nivoriana; dia nomen’NY TOMPO ahy ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nihodina aho ka nidina niala teo amin’ny tendrombohitra, ary napetrako tao anatin’ny vata izay nataoko ny vato fisaka ka mbola ao ihany ireny araka izay nandidian’NY TOMPO ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nandeha niala tamin’ny fantsakan’i Bene-Jakana ny Zanak’Israely ka nankany Mosera; tao no nahafatesan’i Arona sy nandevenana azy; ary i Eleazara zanany no tonga mpisorona nandimby azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nony niala tao izy ireo dia nankany Godgoda; ary nony niala tao Godgoda izy dia nankany Jotbata, tany be ony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’io andro io no nanokanan’NY TOMPO ny fokon’i Levy hitondra ny vata misy ny faneken’NY TOMPO sy hijoro eo anatrehan’NY TOMPO, hanao fanompoam-pivavahana Aminy sy hitsodrano amin’ny anarany, mandraka androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izany no tsy ananan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' anjara na lova eo amin’ny rahalahiny; NY TOMPO no lovany, araka izay nolazain’NY TOMPO Andriamanitrao taminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nitoetra efapolo andro sy efapolo alina tao an-tendrombohitra tahaka ilay teo ihany aho, dia nihaino ahy NY TOMPO ka tamin’io andro io dia tsy nety nandringana anareo Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy NY TOMPO tamiko: Miaingà, mandehana eo alohan’ny olona, mba hidirany sy handovany ny tany izay nianianako tamin’ny razany homena azy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lalànan’ny fitiavana sy ny fankatoavana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ankehitriny, ry Israely ô, inona moa no andrasan’NY TOMPO Andriamanitrao aminao, afa-tsy ny hatahotra NY TOMPO Andriamanitrao sy ny handeha amin’ny lalany rehetra ary ny ho tia Azy sy hanompo NY TOMPO Andriamanitrao amin’ny fonao manontolo sy ny fanahinao manontolo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'hitandrina ny didin’NY TOMPO sy ny lalànany izay omeko anao anio, mba hahita soa ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Indro, an’NY TOMPO Andriamanitrao ny lanitra sy ny lanitry ny lanitra ary ny tany mbamin’izay rehetra eo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Kanefa ny razanao no niraiketan’ny fitiavan’NY TOMPO ka nifidy anareo zanany mandimby azy Izy mihoatra noho ny firenena rehetra, tahaka ny amin’izao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa forao ny fonareo fa aza mafy hatoka intsony ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa NY TOMPO Andriamanitrareo no Andriamanitry ny andriamanitra sy Tompon’ny tompo, Andriamanitra lehibe sy mahery ary mahatahotra, izay tsy mizaha tavan’olona na mandray kolikoly; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'manome rariny ny kamboty sy ny mpitondratena Izy sady tia ny vahiny ka manome azy hanina sy fitafiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa tiavo ny vahiny, fa efa mba vahiny tany amin’ny tany Ejipta ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'NY TOMPO Andriamanitrao no hatahoranao; Izy no hotompoinao, Izy no hifikiranao, ary ny anarany no hianiananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izy no fideranao ary Izy no Andriamanitrao izay efa nanatanteraka ireo zavatra lehibe sy mahatahotra ireo taminao, dia ireo izay efa hitan’ny masonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Olona fitopolo ny razanao izay nidina tany Ejipta; nefa ankehitriny dia efa nataon’NY TOMPO Andriamanitrao maro tahaka ny kintana eny amin’ny lanitra ianao.
