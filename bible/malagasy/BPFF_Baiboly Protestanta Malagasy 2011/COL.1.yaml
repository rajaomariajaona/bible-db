document_id: COL.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Paoly, apostolin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy noho ny sitrapon’Andriamanitra, sy i Timoty rahalahy, '
  '10':
  - type: text
    content: 'mba handehananareo mendrika ny Tompo, manao ny sitrapony amin’ny zavatra rehetra, mahavokatra amin’ny asa tsara rehetra sady mitombo amin’ny fahalalana tsara an’Andriamanitra; '
  '11':
  - type: text
    content: mba hampahatanjahina amin’ny hery rehetra araka ny herin’ny voninahiny ianareo ka hanana ny faharetana rehetra sy ny fahari-po.
  - type: heading
    content: Ny Zanaka, endrik’Andriamanitra tsy hita maso
  - type: text
    content: 'Amin’ny fifaliana '
  '12':
  - type: text
    content: 'no isaory ny Ray izay nampahamendrika anareo hanana anjara amin’ny lovan’ny olona masina eo amin’ny mazava '
  '13':
  - type: text
    content: 'sady nahafaka antsika tamin’ny fahefan’ny maizina ka namindra antsika ho amin’ny fanjakan’ny Zanany malalany '
  '14':
  - type: text
    content: izay ananantsika fanavotana, dia ny famelana ny helotsika.
  '15':
  - type: text
    content: Izy no endrik’Andriamanitra tsy hita maso,
  - type: text
    content: Ilay Lahimatoa talohan’izao zavatra ary rehetra izao;
  '16':
  - type: text
    content: fa tao Aminy no nahariana ny zavatra rehetra
  - type: text
    content: any an-danitra sy etỳ ambonin’ny tany,
  - type: text
    content: dia ny hita sy ny tsy hita,
  - type: text
    content: na fiandrianana, na fanjakana,
  - type: text
    content: na fanapahana, na fahefana;
  - type: text
    content: Izy no nahariana ny zavatra rehetra sady ho Azy izany;
  '17':
  - type: text
    content: Izy no talohan’ny zavatra rehetra
  - type: text
    content: sady ao Aminy no aharetan’ny zavatra rehetra.
  '18':
  - type: text
    content: Izy no Lohan’ny tena, dia ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ;
  - type: text
    content: Izy no voalohany,
  - type: text
    content: dia ny Lahimatoa amin’ny maty,
  - type: text
    content: mba ho Lohany amin’ny zavatra rehetra Izy.
  '19':
  - type: text
    content: Fa sitraky ny Ray ho ao Aminy no hitoeran’ny fahafenoana rehetra
  '2':
  - type: text
    content: 'no mamangy ny olona masina any Kolosia, dia ny rahalahy mahatoky ao amin’i Kristy: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika.'
  - type: heading
    content: Efa tonga eo aminareo ny Filazantsara
  '20':
  - type: text
    content: sady Izy no hampihavanany Aminy ny zavatra rehetra
  - type: text
    content: ka ny rany teo amin’ny hazofijaliana
  - type: text
    content: no nanaovany fampihavanana;
  - type: text
    content: eny, Izy hoy aho, no fampihavanana,
  - type: text
    content: na ny etỳ ambonin’ny tany, na ny any an-danitra.
  '21':
  - type: text
    content: 'Ary ianareo izay vahiny fahiny sady fahavalo tamin’ny fomba fisainanareo sy ny asa ratsy nataonareo '
  '22':
  - type: text
    content: 'dia efa nampihavaniny tao amin’ny tenan’ny nofony ankehitriny, tamin’ny fahafatesana, mba hatolony ho masina sady tsy hanan-tsiny amam-pondro eo anatrehany, '
  '23':
  - type: text
    content: raha maharitra amin’ny finoana ianareo ka mafy orina sady tafatoetra ary tsy mety hafindra hiala amin’ny fanantenana avy amin’ny Filazantsara izay efa renareo sady torina eny ambanin’ny lanitra rehetra eny; ary izany no nanaovana ahy Paoly ho mpanompo.
  - type: heading
    content: Ny ady atrehin’ny Apostoly
  '24':
  - type: text
    content: 'Ankehitriny dia mifaly amin’ny fiaretako ho anareo aho ary manatanteraka ao amin’ny nofoko izay tsy vita tamin’ny fahorian’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ho an’ny tenany, dia ny fiangonana'
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Izy no nahatonga ahy ho mpanompo, araka ny andraikitra nomen’Andriamanitra ahy teo aminareo, mba hahatanteraka ny fitoriana ny tenin’Andriamanitra, '
  '26':
  - type: text
    content: 'dia ny zavamiafina, ilay voafina hatramin’ny fahagola sy ny taranaka maro, fa voaseho amin’ny olony masina kosa ankehitriny. '
  '27':
  - type: text
    content: 'Tamin’ireo olona masina ireo no tian’Andriamanitra nampahafantarina ny harenan’ny voninahitr’ity zavamiafina ity any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ', dia Kristy ao anatinareo, izay fanantenana ny voninahitra. '
  '28':
  - type: text
    content: 'Izy no torinay amin’ny fampitandremanay sy ny fampianaranay ny olona rehetra amin’ny fahendrena rehetra, mba samy hatolotray ho tanteraka ao amin’i Kristy izy rehetra. '
  '29':
  - type: text
    content: Ary ny hahatanteraka izany no ikelezako aina koa sy iezahako fatratra araka ny fiasan’ny herin’Ilay miasa amin-kery ato anatiko.
  '3':
  - type: text
    content: 'Misaotra an’Andriamanitra Rain’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika izahay ary mivavaka mandrakariva ho anareo; '
  '4':
  - type: text
    content: 'fa renay ny finoanareo an’i Kristy Jesosy sy ny fitiavanareo ny olona masina rehetra, '
  '5':
  - type: text
    content: 'noho ny fanantenana izay tahirizina any an-danitra ho anareo, fanantenana efa renareo fahiny tamin’ny tenin’ny fahamarinana dia ny Filazantsara. '
  '6':
  - type: text
    content: 'Io Filazantsara io dia efa tonga eo aminareo ka mamokatra sy mitombo tahaka ny eo amin’izao tontolo izao; toy izany koa ny eo aminareo, hatramin’ny andro nandraisanareo sy nahalalanareo tsara ny fahamarinan’ny fahasoavan’Andriamanitra, '
  '7':
  - type: text
    content: 'araka ny efa renareo tamin’i Epafra, mpanompo namanay sady malala, izay mpanompon’i Kristy mahatoky eo aminareo; '
  '8':
  - type: text
    content: izy koa no nanambara taminay ny fitiavanareo ao amin’ny Fanahy.
  - type: heading
    content: Vavaka fangatahana ho an’ny Kolosiana
  '9':
  - type: text
    content: 'Noho izany, izahay koa dia tsy mitsahatra mivavaka sy mangataka ho anareo hatramin’ny andro nandrenesanay, mba hofenoina ny fahalalana ny sitrapony ianareo amin’ny fahendrena sy ny fahazavan-tsaina rehetra avy amin’ny Fanahy, '
