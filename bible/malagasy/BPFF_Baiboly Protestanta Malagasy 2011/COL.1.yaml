    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I Paoly, apostolin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy noho ny sitrapon’Andriamanitra, sy i Timoty rahalahy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'mba handehananareo mendrika ny Tompo, manao ny sitrapony amin’ny zavatra rehetra, mahavokatra amin’ny asa tsara rehetra sady mitombo amin’ny fahalalana tsara an’Andriamanitra; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: mba hampahatanjahina amin’ny hery rehetra araka ny herin’ny voninahiny ianareo ka hanana ny faharetana rehetra sy ny fahari-po.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Zanaka, endrik’Andriamanitra tsy hita maso
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny fifaliana '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'no isaory ny Ray izay nampahamendrika anareo hanana anjara amin’ny lovan’ny olona masina eo amin’ny mazava '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'sady nahafaka antsika tamin’ny fahefan’ny maizina ka namindra antsika ho amin’ny fanjakan’ny Zanany malalany '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: izay ananantsika fanavotana, dia ny famelana ny helotsika.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izy no endrik’Andriamanitra tsy hita maso,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay Lahimatoa talohan’izao zavatra ary rehetra izao;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: fa tao Aminy no nahariana ny zavatra rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any an-danitra sy etỳ ambonin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny hita sy ny tsy hita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na fiandrianana, na fanjakana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na fanapahana, na fahefana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no nahariana ny zavatra rehetra sady ho Azy izany;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Izy no talohan’ny zavatra rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ao Aminy no aharetan’ny zavatra rehetra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
