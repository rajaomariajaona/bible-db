document_id: COL.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Paoly, apostolin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy noho ny sitrapon’Andriamanitra, sy i Timoty rahalahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'no mamangy ny olona masina any Kolosia, dia ny rahalahy mahatoky ao amin’i Kristy: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Efa tonga eo aminareo ny Filazantsara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Misaotra an’Andriamanitra Rain’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika izahay ary mivavaka mandrakariva ho anareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa renay ny finoanareo an’i Kristy Jesosy sy ny fitiavanareo ny olona masina rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'noho ny fanantenana izay tahirizina any an-danitra ho anareo, fanantenana efa renareo fahiny tamin’ny tenin’ny fahamarinana dia ny Filazantsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Io Filazantsara io dia efa tonga eo aminareo ka mamokatra sy mitombo tahaka ny eo amin’izao tontolo izao; toy izany koa ny eo aminareo, hatramin’ny andro nandraisanareo sy nahalalanareo tsara ny fahamarinan’ny fahasoavan’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'araka ny efa renareo tamin’i Epafra, mpanompo namanay sady malala, izay mpanompon’i Kristy mahatoky eo aminareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: izy koa no nanambara taminay ny fitiavanareo ao amin’ny Fanahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka fangatahana ho an’ny Kolosiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Noho izany, izahay koa dia tsy mitsahatra mivavaka sy mangataka ho anareo hatramin’ny andro nandrenesanay, mba hofenoina ny fahalalana ny sitrapony ianareo amin’ny fahendrena sy ny fahazavan-tsaina rehetra avy amin’ny Fanahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mba handehananareo mendrika ny Tompo, manao ny sitrapony amin’ny zavatra rehetra, mahavokatra amin’ny asa tsara rehetra sady mitombo amin’ny fahalalana tsara an’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: mba hampahatanjahina amin’ny hery rehetra araka ny herin’ny voninahiny ianareo ka hanana ny faharetana rehetra sy ny fahari-po.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Zanaka, endrik’Andriamanitra tsy hita maso
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Amin’ny fifaliana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'no isaory ny Ray izay nampahamendrika anareo hanana anjara amin’ny lovan’ny olona masina eo amin’ny mazava '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'sady nahafaka antsika tamin’ny fahefan’ny maizina ka namindra antsika ho amin’ny fanjakan’ny Zanany malalany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: izay ananantsika fanavotana, dia ny famelana ny helotsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izy no endrik’Andriamanitra tsy hita maso,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay Lahimatoa talohan’izao zavatra ary rehetra izao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: fa tao Aminy no nahariana ny zavatra rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: any an-danitra sy etỳ ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny hita sy ny tsy hita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na fiandrianana, na fanjakana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na fanapahana, na fahefana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no nahariana ny zavatra rehetra sady ho Azy izany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izy no talohan’ny zavatra rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ao Aminy no aharetan’ny zavatra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izy no Lohan’ny tena, dia ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no voalohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny Lahimatoa amin’ny maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho Lohany amin’ny zavatra rehetra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa sitraky ny Ray ho ao Aminy no hitoeran’ny fahafenoana rehetra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: sady Izy no hampihavanany Aminy ny zavatra rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny rany teo amin’ny hazofijaliana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanaovany fampihavanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, Izy hoy aho, no fampihavanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny etỳ ambonin’ny tany, na ny any an-danitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ianareo izay vahiny fahiny sady fahavalo tamin’ny fomba fisainanareo sy ny asa ratsy nataonareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'dia efa nampihavaniny tao amin’ny tenan’ny nofony ankehitriny, tamin’ny fahafatesana, mba hatolony ho masina sady tsy hanan-tsiny amam-pondro eo anatrehany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: raha maharitra amin’ny finoana ianareo ka mafy orina sady tafatoetra ary tsy mety hafindra hiala amin’ny fanantenana avy amin’ny Filazantsara izay efa renareo sady torina eny ambanin’ny lanitra rehetra eny; ary izany no nanaovana ahy Paoly ho mpanompo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ady atrehin’ny Apostoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ankehitriny dia mifaly amin’ny fiaretako ho anareo aho ary manatanteraka ao amin’ny nofoko izay tsy vita tamin’ny fahorian’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ho an’ny tenany, dia ny fiangonana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izy no nahatonga ahy ho mpanompo, araka ny andraikitra nomen’Andriamanitra ahy teo aminareo, mba hahatanteraka ny fitoriana ny tenin’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'dia ny zavamiafina, ilay voafina hatramin’ny fahagola sy ny taranaka maro, fa voaseho amin’ny olony masina kosa ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’ireo olona masina ireo no tian’Andriamanitra nampahafantarina ny harenan’ny voninahitr’ity zavamiafina ity any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ', dia Kristy ao anatinareo, izay fanantenana ny voninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izy no torinay amin’ny fampitandremanay sy ny fampianaranay ny olona rehetra amin’ny fahendrena rehetra, mba samy hatolotray ho tanteraka ao amin’i Kristy izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary ny hahatanteraka izany no ikelezako aina koa sy iezahako fatratra araka ny fiasan’ny herin’Ilay miasa amin-kery ato anatiko.
