document_id: PSA.101,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manaiky hanaja ny marina ny mpanjaka
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Famindrampo sy fitsarana no hankalazaiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao, TOMPO ô, no hoderaiko.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hitandrina ny lalana marina aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rahoviana no ho tonga atỳ amiko Ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handeha amin’ny fahitsian’ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao anatin’ny tranoko aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy hampitoetra zava-dratsy eo anoloan’ny masoko aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: halako ny fanaon’ny mpivadika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho azon’izany aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Halaviriko ny fo maditra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hankasitraka izay ratsy aho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izay manendrikendrika ny namany mangingina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hofongorako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay miandranandrana sy miavonavona am-po
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy zakako.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hijery izay olona mahatoky amin’ny tany ny masoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitoerany ato amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mandeha amin’ny lalana marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanompo ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy mba hitoetra ao anatin’ny tranoko izay manao fitaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba hijanona eo anoloan’ny masoko izay milaza lainga.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Haringako isa-maraina ny ratsy fanahy rehetra amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamongorako ny mpanao ratsy rehetra tsy ho ao an-tanànan’NY TOMPO.
