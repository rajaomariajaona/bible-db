document_id: PSA.101,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manaiky hanaja ny marina ny mpanjaka
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: Famindrampo sy fitsarana no hankalazaiko;
  - type: text
    content: Ianao, TOMPO ô, no hoderaiko.
  '2':
  - type: text
    content: Hitandrina ny lalana marina aho.
  - type: text
    content: Rahoviana no ho tonga atỳ amiko Ianao?
  - type: text
    content: Handeha amin’ny fahitsian’ny foko
  - type: text
    content: ao anatin’ny tranoko aho.
  '3':
  - type: text
    content: Tsy hampitoetra zava-dratsy eo anoloan’ny masoko aho;
  - type: text
    content: halako ny fanaon’ny mpivadika,
  - type: text
    content: tsy ho azon’izany aho.
  '4':
  - type: text
    content: Halaviriko ny fo maditra;
  - type: text
    content: tsy hankasitraka izay ratsy aho.
  '5':
  - type: text
    content: Izay manendrikendrika ny namany mangingina
  - type: text
    content: dia hofongorako;
  - type: text
    content: izay miandranandrana sy miavonavona am-po
  - type: text
    content: dia tsy zakako.
  '6':
  - type: text
    content: Hijery izay olona mahatoky amin’ny tany ny masoko
  - type: text
    content: mba hitoerany ato amiko;
  - type: text
    content: izay mandeha amin’ny lalana marina
  - type: text
    content: no hanompo ahy.
  '7':
  - type: text
    content: Tsy mba hitoetra ao anatin’ny tranoko izay manao fitaka.
  - type: text
    content: Tsy mba hijanona eo anoloan’ny masoko izay milaza lainga.
  '8':
  - type: text
    content: Haringako isa-maraina ny ratsy fanahy rehetra amin’ny tany
  - type: text
    content: mba hamongorako ny mpanao ratsy rehetra tsy ho ao an-tanànan’NY TOMPO.
