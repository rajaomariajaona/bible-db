document_id: ACT.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary i Saoly dia nankasitraka ny namonoana an’i Stefana.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: MANERANA AN’I JODIA SY I SAMARIA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanenjehana voalohany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamin’izany andro izany dia nisy fanenjehana mafy tamin’ny fiangonana tany Jerosalema ka niely teny amin’ny tany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' sy Samaria izy rehetra, afa-tsy ny Apostoly ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Olona mpivavaka tsara no nandevina an’i Stefana sady nisaona azy fatratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I Saoly kosa tamin’izany dia nampahory mafy ny fiangonana ka nidirany isan-trano sady nosarihany, na ny lehilahy na ny vehivavy, ka nataony tao an-tranomaizina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ireo izay niely dia nandeha nitory ny teny dia ny Filazantsara.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manambara ny vaovao mahafaly any Samaria i Filipo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nidina tany an-tanànan’i Samaria i Filipo ka nitory an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' tamin’ny olona tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niray hevitra nihaino tsara izay nolazain’i Filipo ny vahoaka rehefa nandre azy sy nahita ny famantarana nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa maro tamin’ireo manana fanahy maloto no niantsoantso tamin’ny feo mahery rehefa niala izany; ary maro koa ny malemy sy ny mandringa no sitrana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nisy fifaliana lehibe tao amin’izany tanàna izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nisy lehilahy iray antsoina hoe Simona izay efa tao an-tanàna, mpitahiry ody izy io ka nahatalanjona ny olona tany Samaria sady nilaza ny tenany ho lehibe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny olona rehetra, na ny kely na ny lehibe, dia nihaino azy ka niteny hoe: Ity lehilahy ity no herin’Andriamanitra izay antsoina hoe Hery lehibe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nihaino azy tsara izy ireo, satria efa ela no talanjona tamin’ny ataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa rehefa nino an’i Filipo izay nitory ny teny soa mahafaly ny amin’ny fanjakan’Andriamanitra sy ny anaran’i Jesosy Kristy ireo dia natao batisa avokoa na lahy na vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mba nino koa i Simona ka rehefa natao batisa izy dia nanaraka an’i Filipo. Ary talanjona izy raha nahita ny famantarana sy ny asa lehibe izay natao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nony ren’ny Apostoly tany Jerosalema fa efa nandray ny tenin’Andriamanitra i Samaria dia naniraka an’i Petera sy i Jaona izy ireo hankany aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony tafidina tany izy roa lahy dia nivavaka ho an’ny olona mba handraisany ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Satria tsy mbola nisy nilatsahany izy ireo na dia iray akory aza, fa natao batisa tamin’ny anaran’i Jesosy Tompo ihany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: dia nametra-tanana taminy izy roa lahy ary nandray ny Fanahy Masina ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony hitan’i Simona fa ny fametrahan’ny Apostoly tanana no nanomezana ny Fanahy Masina dia nitondra vola homena azy izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'sady niteny hoe: Omeo izany fahefana izany koa aho, mba handray ny Fanahy Masina izay olona hametrahako tanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy i Petera taminy: Aoka ho very miaraka amin’ny tenanao ny volanao, satria noheverinao fa azo vidim-bola ny fanomezan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy manana anjara na raharaha amin’izany zavatra izany ianao satria tsy mahitsy fo eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa mibebaha amin’izao haratsianao izao ka mangataha amin’ny Tompo, andrao mba havelany izay noheverin’ny fonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hitako fa mbola mitoetra amin’ny fangidian’afero sy ny famatoran’ny heloka ihany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy i Simona: Mangataha amin’ny Tompo ho ahy, mba tsy hisy ho tonga amiko izay nolazainareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa nanambara sy nitory ny tenin’ny Tompo i Petera sy i Jaona dia niverina nankany Jerosalema ka nitory ny Filazantsara teny amin’ny vohitra maro izay an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritana
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Filipo sy ilay tandapa etiopiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nisy anjelin’ny Tompo nilaza tamin’i Filipo hoe: Mitsangàna ka mandehana mianatsimo ho any amin’ny lalana midina avy any Jerosalema mankany Gaza, any an-tany efitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nitsangana izy ka lasa nandeha, ary indro, nisy lehilahy etiopiana, tandapan’i Kandasy, mpanjakavavin’ny Etiopiana, izay mpitahiry ny harenany rehetra, tonga tany Jerosalema mba hivavaka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'rehefa nody izy dia nipetraka tao anatin’ny kalesiny ary namaky teny tao amin’i Isaia mpaminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hoy ny Fanahy tamin’i Filipo: Mandehana manatona io kalesy io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nihazakazaka nankeo aminy i Filipo ary nandre azy mamaky teny tao amin’ny mpaminany Isaia ka hoy izy taminy: Moa fantatrao va izay vakìnao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hoy izy: Hataoko ahoana no fahay raha tsy misy mitari-dalana ahy? Dia nangataka an’i Filipo izy mba hiakatra sy hipetraka eo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary izao no tenin’ny Soratra Masina novakiny:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Noentina hovonoina tahaka ny ondry Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy niloa-bava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny zanak’ondry moana eo anoloan’ny mpanety azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: noho ny fietreny dia nalaina Taminy ny zony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary iza no hahalaza ny amin’ny fianakaviany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny ainy dia nesorina tamin’ny tany» (Isa 53.7-8).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hoy ilay tandapa tamin’i Filipo: Miangavy anao aho, iza moa no lazain’ny mpaminany amin’izany? Ny tenany va sa olon-kafa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary niloa-bava i Filipo ka nanomboka tamin’izany Soratra Masina izany dia nitory an’i Jesosy taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nony nandeha teny an-dalana izy ireo dia tonga teo amin’izay nisy rano ka hoy ilay tandapa: Indro misy rano, koa inona moa no misakana ahy tsy hatao batisa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Hoy i Filipo: Raha mino amin’ny fonao manontolo ianao dia azo atao ihany. Ary namaly izy hoe: Mino aho fa Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no Zanak’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia nasainy najanona ny kalesy; ary nidina ho eo amin’ny rano izy roa lahy, izany hoe i Filipo sy ilay tandapa; dia nataony batisa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Rehefa niakatra avy teo amin’ny rano izy roa lahy dia noentin’ny Fanahin’ny Tompo i Filipo ka tsy hitan’ilay tandapa intsony; dia nanohy ny diany izy sady faly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tany Azota kosa avy eo no nahitana an’i Filipo ary nitory ny Filazantsara tany amin’ny tanàna rehetra izay nalehany izy ambara-pahatongany tany Kaisaria.
