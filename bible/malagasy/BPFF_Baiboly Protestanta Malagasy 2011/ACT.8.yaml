document_id: ACT.8,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ary i Saoly dia nankasitraka ny namonoana an’i Stefana.
  - type: heading
    content: MANERANA AN’I JODIA SY I SAMARIA
  - type: heading
    content: Ny fanenjehana voalohany
  - type: text
    content: 'Tamin’izany andro izany dia nisy fanenjehana mafy tamin’ny fiangonana tany Jerosalema ka niely teny amin’ny tany '
  - type: text
    content: Jodia
  - type: text
    content: ' sy Samaria izy rehetra, afa-tsy ny Apostoly ihany. '
  '10':
  - type: text
    content: 'Ny olona rehetra, na ny kely na ny lehibe, dia nihaino azy ka niteny hoe: Ity lehilahy ity no herin’Andriamanitra izay antsoina hoe Hery lehibe. '
  '11':
  - type: text
    content: 'Nihaino azy tsara izy ireo, satria efa ela no talanjona tamin’ny ataony. '
  '12':
  - type: text
    content: 'Nefa rehefa nino an’i Filipo izay nitory ny teny soa mahafaly ny amin’ny fanjakan’Andriamanitra sy ny anaran’i Jesosy Kristy ireo dia natao batisa avokoa na lahy na vavy. '
  '13':
  - type: text
    content: Mba nino koa i Simona ka rehefa natao batisa izy dia nanaraka an’i Filipo. Ary talanjona izy raha nahita ny famantarana sy ny asa lehibe izay natao.
  '14':
  - type: text
    content: 'Nony ren’ny Apostoly tany Jerosalema fa efa nandray ny tenin’Andriamanitra i Samaria dia naniraka an’i Petera sy i Jaona izy ireo hankany aminy. '
  '15':
  - type: text
    content: 'Nony tafidina tany izy roa lahy dia nivavaka ho an’ny olona mba handraisany ny Fanahy Masina. '
  '16':
  - type: text
    content: 'Satria tsy mbola nisy nilatsahany izy ireo na dia iray akory aza, fa natao batisa tamin’ny anaran’i Jesosy Tompo ihany, '
  '17':
  - type: text
    content: dia nametra-tanana taminy izy roa lahy ary nandray ny Fanahy Masina ireo.
  '18':
  - type: text
    content: 'Nony hitan’i Simona fa ny fametrahan’ny Apostoly tanana no nanomezana ny Fanahy Masina dia nitondra vola homena azy izy '
  '19':
  - type: text
    content: 'sady niteny hoe: Omeo izany fahefana izany koa aho, mba handray ny Fanahy Masina izay olona hametrahako tanana. '
  '2':
  - type: text
    content: 'Olona mpivavaka tsara no nandevina an’i Stefana sady nisaona azy fatratra. '
  '20':
  - type: text
    content: 'Fa hoy i Petera taminy: Aoka ho very miaraka amin’ny tenanao ny volanao, satria noheverinao fa azo vidim-bola ny fanomezan’Andriamanitra. '
  '21':
  - type: text
    content: 'Tsy manana anjara na raharaha amin’izany zavatra izany ianao satria tsy mahitsy fo eo anatrehan’Andriamanitra. '
  '22':
  - type: text
    content: 'Koa mibebaha amin’izao haratsianao izao ka mangataha amin’ny Tompo, andrao mba havelany izay noheverin’ny fonao. '
  '23':
  - type: text
    content: 'Fa hitako fa mbola mitoetra amin’ny fangidian’afero sy ny famatoran’ny heloka ihany ianao. '
  '24':
  - type: text
    content: 'Dia hoy i Simona: Mangataha amin’ny Tompo ho ahy, mba tsy hisy ho tonga amiko izay nolazainareo.'
  '25':
  - type: text
    content: 'Rehefa nanambara sy nitory ny tenin’ny Tompo i Petera sy i Jaona dia niverina nankany Jerosalema ka nitory ny Filazantsara teny amin’ny vohitra maro izay an’ny '
  - type: text
    content: Samaritana
  - type: text
    content: .
  - type: heading
    content: I Filipo sy ilay tandapa etiopiana
  '26':
  - type: text
    content: 'Ary nisy anjelin’ny Tompo nilaza tamin’i Filipo hoe: Mitsangàna ka mandehana mianatsimo ho any amin’ny lalana midina avy any Jerosalema mankany Gaza, any an-tany efitra. '
  '27':
  - type: text
    content: 'Dia nitsangana izy ka lasa nandeha, ary indro, nisy lehilahy etiopiana, tandapan’i Kandasy, mpanjakavavin’ny Etiopiana, izay mpitahiry ny harenany rehetra, tonga tany Jerosalema mba hivavaka; '
  '28':
  - type: text
    content: 'rehefa nody izy dia nipetraka tao anatin’ny kalesiny ary namaky teny tao amin’i Isaia mpaminany. '
  '29':
  - type: text
    content: 'Hoy ny Fanahy tamin’i Filipo: Mandehana manatona io kalesy io. '
  '3':
  - type: text
    content: I Saoly kosa tamin’izany dia nampahory mafy ny fiangonana ka nidirany isan-trano sady nosarihany, na ny lehilahy na ny vehivavy, ka nataony tao an-tranomaizina.
  '30':
  - type: text
    content: 'Dia nihazakazaka nankeo aminy i Filipo ary nandre azy mamaky teny tao amin’ny mpaminany Isaia ka hoy izy taminy: Moa fantatrao va izay vakìnao? '
  '31':
  - type: text
    content: 'Hoy izy: Hataoko ahoana no fahay raha tsy misy mitari-dalana ahy? Dia nangataka an’i Filipo izy mba hiakatra sy hipetraka eo aminy. '
  '32':
  - type: text
    content: 'Ary izao no tenin’ny Soratra Masina novakiny:'
  - type: text
    content: «Noentina hovonoina tahaka ny ondry Izy
  - type: text
    content: ary tsy niloa-bava,
  - type: text
    content: tahaka ny zanak’ondry moana eo anoloan’ny mpanety azy;
  '33':
  - type: text
    content: noho ny fietreny dia nalaina Taminy ny zony;
  - type: text
    content: ary iza no hahalaza ny amin’ny fianakaviany?
  - type: text
    content: Fa ny ainy dia nesorina tamin’ny tany» (Isa 53.7-8).
  '34':
  - type: text
    content: 'Hoy ilay tandapa tamin’i Filipo: Miangavy anao aho, iza moa no lazain’ny mpaminany amin’izany? Ny tenany va sa olon-kafa? '
  '35':
  - type: text
    content: 'Ary niloa-bava i Filipo ka nanomboka tamin’izany Soratra Masina izany dia nitory an’i Jesosy taminy. '
  '36':
  - type: text
    content: 'Nony nandeha teny an-dalana izy ireo dia tonga teo amin’izay nisy rano ka hoy ilay tandapa: Indro misy rano, koa inona moa no misakana ahy tsy hatao batisa? '
  '37':
  - type: text
    content: 'Hoy i Filipo: Raha mino amin’ny fonao manontolo ianao dia azo atao ihany. Ary namaly izy hoe: Mino aho fa Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' no Zanak’Andriamanitra. '
  '38':
  - type: text
    content: 'Dia nasainy najanona ny kalesy; ary nidina ho eo amin’ny rano izy roa lahy, izany hoe i Filipo sy ilay tandapa; dia nataony batisa izy. '
  '39':
  - type: text
    content: 'Rehefa niakatra avy teo amin’ny rano izy roa lahy dia noentin’ny Fanahin’ny Tompo i Filipo ka tsy hitan’ilay tandapa intsony; dia nanohy ny diany izy sady faly. '
  '4':
  - type: text
    content: Ireo izay niely dia nandeha nitory ny teny dia ny Filazantsara.
  - type: heading
    content: Manambara ny vaovao mahafaly any Samaria i Filipo
  '40':
  - type: text
    content: Tany Azota kosa avy eo no nahitana an’i Filipo ary nitory ny Filazantsara tany amin’ny tanàna rehetra izay nalehany izy ambara-pahatongany tany Kaisaria.
  '5':
  - type: text
    content: 'Nidina tany an-tanànan’i Samaria i Filipo ka nitory an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' tamin’ny olona tao. '
  '6':
  - type: text
    content: 'Dia niray hevitra nihaino tsara izay nolazain’i Filipo ny vahoaka rehefa nandre azy sy nahita ny famantarana nataony. '
  '7':
  - type: text
    content: 'Fa maro tamin’ireo manana fanahy maloto no niantsoantso tamin’ny feo mahery rehefa niala izany; ary maro koa ny malemy sy ny mandringa no sitrana. '
  '8':
  - type: text
    content: Dia nisy fifaliana lehibe tao amin’izany tanàna izany.
  '9':
  - type: text
    content: 'Nisy lehilahy iray antsoina hoe Simona izay efa tao an-tanàna, mpitahiry ody izy io ka nahatalanjona ny olona tany Samaria sady nilaza ny tenany ho lehibe. '
