document_id: JER.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavak’i Jeremia nandritra ny hain-tany
  - type: text
    content: Ny tenin’NY TOMPO izay tonga tamin’i Jeremia noho ny hain-tany.
  '10':
  - type: text
    content: 'Izao no lazain’NY TOMPO amin’ity firenena ity: Tiany ny mirenireny ka tsy mahajanona ny tongony; tsy sitraky NY TOMPO izy. Ankehitriny dia tsaroany ny helony ary valìny ny fahotany. '
  '11':
  - type: text
    content: 'Dia hoy NY TOMPO tamiko: Aza mivavaka ho an’ity firenena ity hahasoa azy. '
  '12':
  - type: text
    content: 'Fa na dia mifady hanina aza izy dia tsy hihaino ny fitarainany Aho; ary na dia manolotra fanatitra dorana manontolo sy fanatitra avy amin’ny zavamaniry aza izy dia tsy hankasitraka azy Aho, fa haripako amin’ny sabatra sy ny mosary ary ny areti-mandringana izy. '
  '13':
  - type: text
    content: 'Dia hoy aho hoe: Indrisy, RY TOMPO Andriamanitra ô! Indreo ny mpaminany miteny aminy hoe: Tsy hiharan’ny sabatra ianareo ary tsy ho mosarena; fa homeko fiadanana maharitra eto amin’ity toerana ity ianareo. '
  '14':
  - type: text
    content: 'Dia hoy NY TOMPO tamiko: Ireo mpaminany ireo dia maminany lainga amin’ny anarako; tsy naniraka azy Aho, na nandidy azy, na niteny taminy; fa fahitana mandainga sy faminaniana tsy marina ary tsinontsinona sy fitaky ny fony no aminaniany aminareo. '
  '15':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO ny amin’ireo mpaminany izay maminany amin’ny anarako ireo, nefa tsy nirahiko akory, ary milaza fa tsy hisy sabatra sy mosary eto amin’ity tany ity: Ny sabatra sy ny mosary indrindra no handringanana ireo mpaminany ireo. '
  '16':
  - type: text
    content: Ary ny firenena izay aminanian’ireo koa dia hiely eny an-dalamben’i Jerosalema noho ny mosary sy ny sabatra ny fatiny ka tsy hisy mpandevina ireny, na ny tenany na ny vadiny na ny zanany lahy na ny zanany vavy; haidiko ao aminy ny faharatsiany.
  - type: heading
    content: Mifona ho an’ny fahadisoan’ny fireneny i Jeremia
  '17':
  - type: text
    content: 'Koa lazao aminy izao teny izao:'
  - type: text
    content: Hijononoka andro aman’alina ny ranomasoko ka tsy hitsahatra;
  - type: text
    content: fa ny oloko, zanakavavy virijiny,
  - type: text
    content: dia naratra mafy tokoa
  - type: text
    content: tamin’ny kapoka tena maharary.
  '18':
  - type: text
    content: Raha mankany an-tsaha aho
  - type: text
    content: dia indreny ny matin-tsabatra!
  - type: text
    content: Ary raha miditra ao an-tanàna kosa aho
  - type: text
    content: dia indreo ny anan’ny mosary!
  - type: text
    content: Eny, ny mpaminany sy ny mpisorona dia mandeha mirenireny manerana ny tany
  - type: text
    content: ka tsy mahalala na inona na inona.
  '19':
  - type: text
    content: Efa narianao tokoa va i Joda?
  - type: text
    content: 'Efa naharikoriko ny fanahinao va i '
  - type: text
    content: Ziona
  - type: text
    content: '?'
  - type: text
    content: Nahoana no dia mikapoka anay Ianao
  - type: text
    content: ka tsy mety sitrana izahay?
  - type: text
    content: Nanantena fiadanana izahay,
  - type: text
    content: kanjo tsy nahita soa;
  - type: text
    content: ary niandry andro fanasitranana,
  - type: text
    content: nefa indro fampitahorana.
  '2':
  - type: text
    content: Misaona ny Joda
  - type: text
    content: ary mivalaketraka ny tanànany;
  - type: text
    content: mitafy lamba fisaonana izy ka mipetraka amin’ny tany;
  - type: text
    content: ary miakatra ny fitarainan’i Jerosalema.
  '20':
  - type: text
    content: TOMPO ô, tsaroanay ny faharatsianay
  - type: text
    content: sy ny heloky ny razanay
  - type: text
    content: fa efa nanota Taminao izahay.
  '21':
  - type: text
    content: Noho ny amin’ny anaranao dia aza arianao izahay;
  - type: text
    content: aza atao ho tsinontsinona ny sezafiandrianan’ny voninahitrao;
  - type: text
    content: tsarovy ka aza tsoahanao ny fanekenao taminay.
  '22':
  - type: text
    content: Mba misy mahalatsaka ranonorana va
  - type: text
    content: 'ireny sampin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ireny?'
  - type: text
    content: Na koa mahay mandatsaka ranonorana mivatravatra va ny lanitra?
  - type: text
    content: Fa tsy Ianao ihany va no Izy, RY TOMPO Andriamanitray ô?
  - type: text
    content: Koa manantena Anao izahay,
  - type: text
    content: satria Ianao no nanao ireo zavatra rehetra ireo.
  '3':
  - type: text
    content: Maniraka ny madinika hantsaka rano ny lehibeny;
  - type: text
    content: dia tonga any amin’ny lavaka famorian-drano ireny, nefa tsy mahita rano
  - type: text
    content: ka miverina mitondra siny tsy misy rano;
  - type: text
    content: menatra sy mangaihay izy
  - type: text
    content: ka misaron-doha.
  '4':
  - type: text
    content: Noho ny fangentan’ny tany,
  - type: text
    content: noho ny tsy nilatsahan’ny ranonorana taminy
  - type: text
    content: dia menatra ny mpiasa
  - type: text
    content: ka misaron-doha.
  '5':
  - type: text
    content: Ary na dia ny dieravavy any an-tsaha aza, rehefa miteraka,
  - type: text
    content: dia mandao ny zanany
  - type: text
    content: noho ny tsy fisian’ny ahi-maitso.
  '6':
  - type: text
    content: Ary mijanona eny an-tendrombohitra mangadihady ny borikidia,
  - type: text
    content: mihanahana maniry ny rivotra toy ny amboadia izy;
  - type: text
    content: jambena ny masony
  - type: text
    content: noho ny tsy fisian’ny ahitra.
  '7':
  - type: text
    content: TOMPO ô, na dia miampanga anay aza ny helokay
  - type: text
    content: dia miasà ihany Ianao noho ny anaranao;
  - type: text
    content: fa be ny fikomianay;
  - type: text
    content: taminao no nanotanay.
  '8':
  - type: text
    content: Ry fanantenan’ny Israely ô,
  - type: text
    content: mpamonjy azy amin’ny andro fahoriana!
  - type: text
    content: Nahoana Ianao no dia toy ny vahiny amin’ny tany
  - type: text
    content: ary toy ny mpandeha izay manorin-day handry indray alina monja?
  '9':
  - type: text
    content: Nahoana Ianao no dia toy ny olona ankona
  - type: text
    content: ary toy ny lehilahy mahery tsy mahavonjy?
  - type: text
    content: Nefa mbola ato aminay ihany Ianao, RY TOMPO ô,
  - type: text
    content: ary ny anaranao dia efa nantsoina taminay;
  - type: text
    content: aza dia mandao anay.
  - type: heading
    content: Mandà ny hihaino ny vavak’i Jeremia Andriamanitra
