document_id: JER.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavak’i Jeremia nandritra ny hain-tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin’NY TOMPO izay tonga tamin’i Jeremia noho ny hain-tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Misaona ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mivalaketraka ny tanànany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitafy lamba fisaonana izy ka mipetraka amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miakatra ny fitarainan’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Maniraka ny madinika hantsaka rano ny lehibeny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tonga any amin’ny lavaka famorian-drano ireny, nefa tsy mahita rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miverina mitondra siny tsy misy rano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: menatra sy mangaihay izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka misaron-doha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Noho ny fangentan’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tsy nilatsahan’ny ranonorana taminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia menatra ny mpiasa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka misaron-doha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary na dia ny dieravavy any an-tsaha aza, rehefa miteraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mandao ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tsy fisian’ny ahi-maitso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary mijanona eny an-tendrombohitra mangadihady ny borikidia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihanahana maniry ny rivotra toy ny amboadia izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: jambena ny masony
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tsy fisian’ny ahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: TOMPO ô, na dia miampanga anay aza ny helokay
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miasà ihany Ianao noho ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa be ny fikomianay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: taminao no nanotanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ry fanantenan’ny Israely ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mpamonjy azy amin’ny andro fahoriana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana Ianao no dia toy ny vahiny amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny mpandeha izay manorin-day handry indray alina monja?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nahoana Ianao no dia toy ny olona ankona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny lehilahy mahery tsy mahavonjy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa mbola ato aminay ihany Ianao, RY TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny anaranao dia efa nantsoina taminay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza dia mandao anay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandà ny hihaino ny vavak’i Jeremia Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no lazain’NY TOMPO amin’ity firenena ity: Tiany ny mirenireny ka tsy mahajanona ny tongony; tsy sitraky NY TOMPO izy. Ankehitriny dia tsaroany ny helony ary valìny ny fahotany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy NY TOMPO tamiko: Aza mivavaka ho an’ity firenena ity hahasoa azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa na dia mifady hanina aza izy dia tsy hihaino ny fitarainany Aho; ary na dia manolotra fanatitra dorana manontolo sy fanatitra avy amin’ny zavamaniry aza izy dia tsy hankasitraka azy Aho, fa haripako amin’ny sabatra sy ny mosary ary ny areti-mandringana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy aho hoe: Indrisy, RY TOMPO Andriamanitra ô! Indreo ny mpaminany miteny aminy hoe: Tsy hiharan’ny sabatra ianareo ary tsy ho mosarena; fa homeko fiadanana maharitra eto amin’ity toerana ity ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy NY TOMPO tamiko: Ireo mpaminany ireo dia maminany lainga amin’ny anarako; tsy naniraka azy Aho, na nandidy azy, na niteny taminy; fa fahitana mandainga sy faminaniana tsy marina ary tsinontsinona sy fitaky ny fony no aminaniany aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO ny amin’ireo mpaminany izay maminany amin’ny anarako ireo, nefa tsy nirahiko akory, ary milaza fa tsy hisy sabatra sy mosary eto amin’ity tany ity: Ny sabatra sy ny mosary indrindra no handringanana ireo mpaminany ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny firenena izay aminanian’ireo koa dia hiely eny an-dalamben’i Jerosalema noho ny mosary sy ny sabatra ny fatiny ka tsy hisy mpandevina ireny, na ny tenany na ny vadiny na ny zanany lahy na ny zanany vavy; haidiko ao aminy ny faharatsiany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mifona ho an’ny fahadisoan’ny fireneny i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa lazao aminy izao teny izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hijononoka andro aman’alina ny ranomasoko ka tsy hitsahatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny oloko, zanakavavy virijiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia naratra mafy tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny kapoka tena maharary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha mankany an-tsaha aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia indreny ny matin-tsabatra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha miditra ao an-tanàna kosa aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia indreo ny anan’ny mosary!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny mpaminany sy ny mpisorona dia mandeha mirenireny manerana ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahalala na inona na inona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Efa narianao tokoa va i Joda?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Efa naharikoriko ny fanahinao va i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no dia mikapoka anay Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mety sitrana izahay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanantena fiadanana izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo tsy nahita soa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary niandry andro fanasitranana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa indro fampitahorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: TOMPO ô, tsaroanay ny faharatsianay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny heloky ny razanay
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa nanota Taminao izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Noho ny amin’ny anaranao dia aza arianao izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza atao ho tsinontsinona ny sezafiandrianan’ny voninahitrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsarovy ka aza tsoahanao ny fanekenao taminay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mba misy mahalatsaka ranonorana va
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ireny sampin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' ireny?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na koa mahay mandatsaka ranonorana mivatravatra va ny lanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy Ianao ihany va no Izy, RY TOMPO Andriamanitray ô?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa manantena Anao izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Ianao no nanao ireo zavatra rehetra ireo.
