document_id: GEN.38
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Joda sy i Tamara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany i Joda dia nidina niala teo amin’ny rahalahiny ka lasa nanatona ny lehilahy adolamita iray, izay nantsoina hoe Hirà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Teo no nahitan’i Joda ny zanakavavin’i Soa lehilahy kananita iray; dia naka azy io izy ka nanambady azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nanana anaka Ravehivavy ka niteraka zazalahy, ary ny anarany dia nataony hoe Era. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanana anaka indray izy ka niteraka zazalahy, ary ny anarany dia nataony hoe Onana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nanana anaka indray koa izy ka niteraka zazalahy, ary ny anarany dia nataony hoe Sela; ary nitoetra tany Keziba i Joda tamin’ny niterahan’ny vadiny an’i Sela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary naka vady ho an’i Era lahimatoany i Joda; Tamara no anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ratsy fanahy teo imason’NY TOMPO anefa i Era, lahimatoan’i Joda, ka novonoin’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Joda tamin’i Onana: Aoka ianao hanambady ny vadin’ny rahalahinao ka tanteraho ny adidinao amin’ny maha rahalahin’ny maty anao mba hamelomanao maso azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fantatr’i Onana fa tsy ho azy tsinona ny taranaka; koa rehefa nandry tamin’ny vadin’ny rahalahiny izy dia nandraraka tamin’ny tany mba tsy hisy taranaka ho an’ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy nankasitrahan’NY TOMPO izay nataony ka novonoiny koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy i Joda tamin’i Tamara vinantovaviny: Tomoera ho mpitondratena ao an-tranon’ny rainao mandra-pahalehiben’i Sela zanako lahy, fa hoy izy anakampo: Fandrao ho faty tahaka ny rahalahiny koa i Sela. Dia nandeha i Tamara ka nitoetra tao an-tranon’ny rainy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony ela, maty ny vadin’i Joda, dia ilay zanakavavin’i Soa. Rehefa nionona ny alahelon’i Joda dia niakatra tany amin’ny mpanety ondriny tany Timna izy sy i Hirà adolamita sakaizany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nisy nanambara tamin’i Tamara hoe: Indro, miakatra ho any Timna hanety ny ondriny ny rafozanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nanaisotra ny akanjony fanaon’ny mpitondratena izy ary nisarona fisalobonana ka nisalobona, dia nipetraka teo am-bavahadin’i Enaima izay eo amin’ny lalana mankany Timna. Satria hitan’i Tamara fa efa lehibe i Sela nefa izy tsy mbola nomen’i Joda ho vadin’i Sela ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hitan’i Joda i Tamara ka nataony fa vehivavy janga satria nanarona ny tavany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nivily nanatona azy teo amoron-dalana i Joda ka niteny hoe: Aoka mba handry aminao aho. Tsy fantany hoe vinantony izy. Dia hoy Ravehivavy: Inona ary no homenao ahy raha mandry amiko ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy izy: Hampanateriko zanak’osy avy amin’ny ondry aman’osy ianao. Fa hoy kosa Ravehivavy: Hanome antoka va ianao mandra-panatitrao azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy izy: Inona ary no antoka homeko anao? Dia hoy Ravehivavy: Ny fitombo-kasenao sy ny kofehinao ary iny tehinao eny an-tananao iny. Nomeny azy ireny dia nandry taminy izy ary nanana anaka taminy Ravehivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary niainga Ravehivavy ka lasa nandeha dia nanala ny fisalobonana izay nitafiany ka niakanjo ny akanjo fanaon’ny mpitondratena indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nampitondrain’i Joda an’ilay Adolamita sakaizany ny zanak’osy, hakany ilay antoka. Kanjo tsy nahita azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nanontany ny olona teo amin’ny fonenan-dRavehivavy izy hoe: Aiza moa ilay vehivavy janga izay teo amoron-dalana teo Enaima? Fa hoy ny olona: Tsy nisy vehivavy janga teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niverina tany amin’i Joda ilay Adolamita ka niteny hoe: Tsy hitako izy; ary nolazain’ny olona tompon-tany aza fa tsy nisy vehivavy janga teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy i Joda: Aoka ho lasany any fandrao ho afa-baraka isika. Indro, efa nampanateriko ity zanak’osy ity, nefa tsy hitanao izany ilay vehivavy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Rehefa afaka tokony ho telo volana dia nisy nanambara tamin’i Joda hoe: Nijangajanga i Tamara vinantovavinao ary indro, manana anaka avy tamin’ny fijangajangana izy! Dia hoy i Joda: Avoahy izy hodorana! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa naseho izy dia nandefa iraka tany amin’ny rafozany hiteny hoe: Ny lehilahy izay tompon’ireto no nananako anaka. Ary hoy koa izy: Miangavy anao aho, fantaro izay tompon’ity fitombo-kase sy ny kofehiny ary ity tehina ity! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia fantatr’i Joda ireo ka hoy izy hoe: Marina noho izaho izy satria tsy nomeko ho vadiny i Sela zanako. Dia tsy nandry taminy intsony izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’ny andro niterahany dia indro, nisy zaza kambana tao an-kibony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Rehefa teraka izy dia niseho ny tanan’ny iray; naka kofehy jaky ny mpampivelona ka nafehiny tamin’ny tanany sady hoy izy: Ity no niseho voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rehefa nahemony anefa ny tanany dia indro teraka ny rahalahiny. Dia hoy ny mpampivelona: Nahoana no nibosesika toy izao ianao? Dia nataony hoe: Fareza'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Fareza: Fibosesehana.'
    marker-yv: yv-n
  - type: text
    text: ' ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Rehefa afaka izany dia teraka koa ny rahalahiny izay nisy ilay kofehy jaky tamin’ny tanany; dia nataony hoe Zera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Zera: Fiposahana.'
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
