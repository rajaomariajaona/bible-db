document_id: GEN.38,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Joda sy i Tamara
  - type: text
    content: 'Tamin’izany andro izany i Joda dia nidina niala teo amin’ny rahalahiny ka lasa nanatona ny lehilahy adolamita iray, izay nantsoina hoe Hirà. '
  '10':
  - type: text
    content: 'Tsy nankasitrahan’NY TOMPO izay nataony ka novonoiny koa izy. '
  '11':
  - type: text
    content: 'Ary hoy i Joda tamin’i Tamara vinantovaviny: Tomoera ho mpitondratena ao an-tranon’ny rainao mandra-pahalehiben’i Sela zanako lahy, fa hoy izy anakampo: Fandrao ho faty tahaka ny rahalahiny koa i Sela. Dia nandeha i Tamara ka nitoetra tao an-tranon’ny rainy.'
  '12':
  - type: text
    content: 'Nony ela, maty ny vadin’i Joda, dia ilay zanakavavin’i Soa. Rehefa nionona ny alahelon’i Joda dia niakatra tany amin’ny mpanety ondriny tany Timna izy sy i Hirà adolamita sakaizany. '
  '13':
  - type: text
    content: 'Dia nisy nanambara tamin’i Tamara hoe: Indro, miakatra ho any Timna hanety ny ondriny ny rafozanao. '
  '14':
  - type: text
    content: Dia nanaisotra ny akanjony fanaon’ny mpitondratena izy ary nisarona fisalobonana ka nisalobona, dia nipetraka teo am-bavahadin’i Enaima izay eo amin’ny lalana mankany Timna. Satria hitan’i Tamara fa efa lehibe i Sela nefa izy tsy mbola nomen’i Joda ho vadin’i Sela ihany.
  '15':
  - type: text
    content: 'Hitan’i Joda i Tamara ka nataony fa vehivavy janga satria nanarona ny tavany izy. '
  '16':
  - type: text
    content: 'Dia nivily nanatona azy teo amoron-dalana i Joda ka niteny hoe: Aoka mba handry aminao aho. Tsy fantany hoe vinantony izy. Dia hoy Ravehivavy: Inona ary no homenao ahy raha mandry amiko ianao? '
  '17':
  - type: text
    content: 'Dia hoy izy: Hampanateriko zanak’osy avy amin’ny ondry aman’osy ianao. Fa hoy kosa Ravehivavy: Hanome antoka va ianao mandra-panatitrao azy? '
  '18':
  - type: text
    content: 'Ary hoy izy: Inona ary no antoka homeko anao? Dia hoy Ravehivavy: Ny fitombo-kasenao sy ny kofehinao ary iny tehinao eny an-tananao iny. Nomeny azy ireny dia nandry taminy izy ary nanana anaka taminy Ravehivavy. '
  '19':
  - type: text
    content: Ary niainga Ravehivavy ka lasa nandeha dia nanala ny fisalobonana izay nitafiany ka niakanjo ny akanjo fanaon’ny mpitondratena indray.
  '2':
  - type: text
    content: 'Teo no nahitan’i Joda ny zanakavavin’i Soa lehilahy kananita iray; dia naka azy io izy ka nanambady azy. '
  '20':
  - type: text
    content: 'Dia nampitondrain’i Joda an’ilay Adolamita sakaizany ny zanak’osy, hakany ilay antoka. Kanjo tsy nahita azy izy. '
  '21':
  - type: text
    content: 'Dia nanontany ny olona teo amin’ny fonenan-dRavehivavy izy hoe: Aiza moa ilay vehivavy janga izay teo amoron-dalana teo Enaima? Fa hoy ny olona: Tsy nisy vehivavy janga teo. '
  '22':
  - type: text
    content: 'Dia niverina tany amin’i Joda ilay Adolamita ka niteny hoe: Tsy hitako izy; ary nolazain’ny olona tompon-tany aza fa tsy nisy vehivavy janga teo. '
  '23':
  - type: text
    content: 'Dia hoy i Joda: Aoka ho lasany any fandrao ho afa-baraka isika. Indro, efa nampanateriko ity zanak’osy ity, nefa tsy hitanao izany ilay vehivavy.'
  '24':
  - type: text
    content: 'Rehefa afaka tokony ho telo volana dia nisy nanambara tamin’i Joda hoe: Nijangajanga i Tamara vinantovavinao ary indro, manana anaka avy tamin’ny fijangajangana izy! Dia hoy i Joda: Avoahy izy hodorana! '
  '25':
  - type: text
    content: 'Rehefa naseho izy dia nandefa iraka tany amin’ny rafozany hiteny hoe: Ny lehilahy izay tompon’ireto no nananako anaka. Ary hoy koa izy: Miangavy anao aho, fantaro izay tompon’ity fitombo-kase sy ny kofehiny ary ity tehina ity! '
  '26':
  - type: text
    content: 'Dia fantatr’i Joda ireo ka hoy izy hoe: Marina noho izaho izy satria tsy nomeko ho vadiny i Sela zanako. Dia tsy nandry taminy intsony izy.'
  '27':
  - type: text
    content: 'Tamin’ny andro niterahany dia indro, nisy zaza kambana tao an-kibony. '
  '28':
  - type: text
    content: 'Rehefa teraka izy dia niseho ny tanan’ny iray; naka kofehy jaky ny mpampivelona ka nafehiny tamin’ny tanany sady hoy izy: Ity no niseho voalohany. '
  '29':
  - type: text
    content: 'Rehefa nahemony anefa ny tanany dia indro teraka ny rahalahiny. Dia hoy ny mpampivelona: Nahoana no nibosesika toy izao ianao? Dia nataony hoe: Fareza'
  - type: note
    content: 'Fareza: Fibosesehana.'
  - type: text
    content: ' ny anarany. '
  '3':
  - type: text
    content: 'Dia nanana anaka Ravehivavy ka niteraka zazalahy, ary ny anarany dia nataony hoe Era. '
  '30':
  - type: text
    content: Rehefa afaka izany dia teraka koa ny rahalahiny izay nisy ilay kofehy jaky tamin’ny tanany; dia nataony hoe Zera
  - type: note
    content: 'Zera: Fiposahana.'
  - type: text
    content: ' ny anarany.'
  '4':
  - type: text
    content: 'Nanana anaka indray izy ka niteraka zazalahy, ary ny anarany dia nataony hoe Onana. '
  '5':
  - type: text
    content: Dia nanana anaka indray koa izy ka niteraka zazalahy, ary ny anarany dia nataony hoe Sela; ary nitoetra tany Keziba i Joda tamin’ny niterahan’ny vadiny an’i Sela.
  '6':
  - type: text
    content: 'Ary naka vady ho an’i Era lahimatoany i Joda; Tamara no anarany. '
  '7':
  - type: text
    content: 'Ratsy fanahy teo imason’NY TOMPO anefa i Era, lahimatoan’i Joda, ka novonoin’NY TOMPO. '
  '8':
  - type: text
    content: 'Dia hoy i Joda tamin’i Onana: Aoka ianao hanambady ny vadin’ny rahalahinao ka tanteraho ny adidinao amin’ny maha rahalahin’ny maty anao mba hamelomanao maso azy. '
  '9':
  - type: text
    content: 'Fantatr’i Onana fa tsy ho azy tsinona ny taranaka; koa rehefa nandry tamin’ny vadin’ny rahalahiny izy dia nandraraka tamin’ny tany mba tsy hisy taranaka ho an’ny rahalahiny. '
