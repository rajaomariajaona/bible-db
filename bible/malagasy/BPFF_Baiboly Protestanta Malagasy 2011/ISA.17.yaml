document_id: ISA.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo an’i Damaskosy
  - type: text
    content: Ny loza hanjo an’i Damaskosy.
  - type: text
    content: Indro, rava tsy ho tanàna intsony i Damaskosy;
  - type: text
    content: eny, tonga korontam-bato izy sisa.
  '10':
  - type: text
    content: Satria nanadino an’Andriamanitry ny famonjena anao ianao,
  - type: text
    content: dia tsy nahatsiaro ny Vatolampy fiarovana mafy ho anao.
  - type: text
    content: Noho izany dia nanao voly mahafinaritra ianao
  - type: text
    content: ary zana-kazo avy amin’ny firenena hafa no nambolenao teo;
  '11':
  - type: text
    content: tamin’ny andro nambolenao azy dia hitanao nitombo izy,
  - type: text
    content: ary nony maraina dia nitsimoka ilay nambolenao.
  - type: text
    content: Nefa ho levona ny vokatra amin’ny andron’ny fahoriana
  - type: text
    content: ary tsy ho azo sitranina ny fanaintainana.
  - type: heading
    content: Indray alina monja no handringanana ny mpanafika
  '12':
  - type: text
    content: Loza! Ny fihahohahon’ny firenena maro
  - type: text
    content: izay mihahohaho tahaka ny feon’ny ranomasina;
  - type: text
    content: ny firohondrohon’ny olona marobe
  - type: text
    content: tahaka ny firohondrohon’ny rano manonja!
  '13':
  - type: text
    content: Eny, mirohondrohona tahaka ny firohondrohon’ny ranobe ny firenena
  - type: text
    content: kanefa hotezerana mafy izy ka handositra lavitra
  - type: text
    content: ary ho lasa tahaka ny akofa eny an-tendrombohitra,
  - type: text
    content: raha paohin’ny rivotra,
  - type: text
    content: sy tahaka ny fakom-bary mitambolimbolina entin’ny tadio.
  '14':
  - type: text
    content: Raha hariva ny andro dia injao, fampihorohoroana;
  - type: text
    content: kanefa raha tsy mbola maraina akory aza dia tsy ao intsony ireny!
  - type: text
    content: Izany no anjaran’izay mamabo antsika
  - type: text
    content: sy tambin’izay mandroba antsika.
  '2':
  - type: text
    content: Lao ny tanànan’i Aroera
  - type: text
    content: ka ho an’ny andian’ny ondry aman’osy;
  - type: text
    content: handry ao ireo ka tsy hisy hanaitaitra azy.
  '3':
  - type: text
    content: Tsy hisy tanàna mimanda intsony any Efraima,
  - type: text
    content: na fanjakana ao Damaskosy na izay sisa amin’i Arama.
  - type: text
    content: Hitovy voninahitra amin’ny Zanak’Israely izy,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: heading
    content: Izay ho sisa amin’ny fanjakan’Israely
  '4':
  - type: text
    content: Amin’izany andro izany dia hihena ny voninahitr’i Jakoba
  - type: text
    content: ary ho lasa ny hataviny.
  '5':
  - type: text
    content: Ho tahaka ny fanangon’ny olona ny vary an-tahony amin’ny fararano izany
  - type: text
    content: ka jinjain’ny sandriny ny salohim-bary;
  - type: text
    content: eny, ho tahaka ny fanangon’ny olona salohim-bary
  - type: text
    content: eny amin’ny lohasahan’ny Refaìta.
  '6':
  - type: text
    content: Kanefa hisy sisa hotsimponina ihany izy,
  - type: text
    content: tahaka ny amin’ny fikapohana ny hazo oliva,
  - type: text
    content: hisy voany roa na telo eny an-tendrony ambony indrindra,
  - type: text
    content: efatra na dimy eny amin’ny rantsan’ny hazo mahavokatra,
  - type: text
    content: hoy NY TOMPO, Andriamanitry ny Israely.
  - type: heading
    content: Ny fiafaran’ny fanompoan-tsampy
  '7':
  - type: text
    content: 'Amin’izany andro izany dia hitodika amin’ny Mpanao azy ny olona, ary hijery ny Iray Masin’ny Israely ny masony. '
  '8':
  - type: text
    content: 'Fa tsy hitodika any amin’ny alitara, asan’ny tanany intsony izy. Tsy hahoany ny nataon’ny rantsantanany, na ny tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: ' na ny tsangambato ho an’ny masoandro.'
  '9':
  - type: text
    content: Amin’izany andro izany ny tanànany mafy
  - type: text
    content: dia ho tahaka ny tany lao any an’ala na any an-tampon-tendrombohitra,
  - type: text
    content: izay nilaozan’ny olona teo anoloan’ny Zanak’Israely,
  - type: text
    content: ka ho foana tanteraka ny tany.
