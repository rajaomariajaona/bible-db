document_id: ISA.17,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny loza hanjo an’i Damaskosy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny loza hanjo an’i Damaskosy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, rava tsy ho tanàna intsony i Damaskosy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tonga korontam-bato izy sisa.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria nanadino an’Andriamanitry ny famonjena anao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy nahatsiaro ny Vatolampy fiarovana mafy ho anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia nanao voly mahafinaritra ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary zana-kazo avy amin’ny firenena hafa no nambolenao teo;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny andro nambolenao azy dia hitanao nitombo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nony maraina dia nitsimoka ilay nambolenao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ho levona ny vokatra amin’ny andron’ny fahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho azo sitranina ny fanaintainana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Indray alina monja no handringanana ny mpanafika
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loza! Ny fihahohahon’ny firenena maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mihahohaho tahaka ny feon’ny ranomasina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny firohondrohon’ny olona marobe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny firohondrohon’ny rano manonja!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mirohondrohona tahaka ny firohondrohon’ny ranobe ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa hotezerana mafy izy ka handositra lavitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho lasa tahaka ny akofa eny an-tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha paohin’ny rivotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny fakom-bary mitambolimbolina entin’ny tadio.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha hariva ny andro dia injao, fampihorohoroana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa raha tsy mbola maraina akory aza dia tsy ao intsony ireny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no anjaran’izay mamabo antsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tambin’izay mandroba antsika.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lao ny tanànan’i Aroera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho an’ny andian’ny ondry aman’osy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handry ao ireo ka tsy hisy hanaitaitra azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisy tanàna mimanda intsony any Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na fanjakana ao Damaskosy na izay sisa amin’i Arama.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitovy voninahitra amin’ny Zanak’Israely izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay ho sisa amin’ny fanjakan’Israely
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia hihena ny voninahitr’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho lasa ny hataviny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tahaka ny fanangon’ny olona ny vary an-tahony amin’ny fararano izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka jinjain’ny sandriny ny salohim-bary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho tahaka ny fanangon’ny olona salohim-bary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny lohasahan’ny Refaìta.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa hisy sisa hotsimponina ihany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny amin’ny fikapohana ny hazo oliva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisy voany roa na telo eny an-tendrony ambony indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efatra na dimy eny amin’ny rantsan’ny hazo mahavokatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO, Andriamanitry ny Israely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiafaran’ny fanompoan-tsampy
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany dia hitodika amin’ny Mpanao azy ny olona, ary hijery ny Iray Masin’ny Israely ny masony. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy hitodika any amin’ny alitara, asan’ny tanany intsony izy. Tsy hahoany ny nataon’ny rantsantanany, na ny tsangankazon-tsampy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aseraha
    - type: text
      text: ' na ny tsangambato ho an’ny masoandro.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany ny tanànany mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tahaka ny tany lao any an’ala na any an-tampon-tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nilaozan’ny olona teo anoloan’ny Zanak’Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho foana tanteraka ny tany.
