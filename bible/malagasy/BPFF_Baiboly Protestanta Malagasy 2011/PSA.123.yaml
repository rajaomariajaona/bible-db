    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Aminao no anandratako ny masoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Ilay mitoetra any an-danitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Indro, toy ny fijerin’ny mpanompolahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanan’ny tompolahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny fijerin’ny mpanompovavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanan’ny tompovaviny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no fijerintsika NY TOMPO Andriamanitsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pamindrany fo amintsika.
  '3':
  - type: usfm
