    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mamindrà fo aminay, TOMPO ô, mamindrà fo aminay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tototry ny fanamavoana loatra izahay;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: eny, tototra loatra izahay,
  - type: usfm
    marker: q1
