document_id: PSA.123,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanantenan’ireo natao tsinontsinona
  - type: text
    content: Hira fanao amin’ny fiakarana.
  - type: text
    content: Aminao no anandratako ny masoko,
  - type: text
    content: ry Ilay mitoetra any an-danitra.
  '2':
  - type: text
    content: Indro, toy ny fijerin’ny mpanompolahy
  - type: text
    content: ny tanan’ny tompolahiny,
  - type: text
    content: ary toy ny fijerin’ny mpanompovavy
  - type: text
    content: ny tanan’ny tompovaviny,
  - type: text
    content: no fijerintsika NY TOMPO Andriamanitsika,
  - type: text
    content: mandra-pamindrany fo amintsika.
  '3':
  - type: text
    content: Mamindrà fo aminay, TOMPO ô, mamindrà fo aminay,
  - type: text
    content: fa tototry ny fanamavoana loatra izahay;
  '4':
  - type: text
    content: eny, tototra loatra izahay,
  - type: text
    content: dia ny famingavingan’ny miadana
  - type: text
    content: sy ny fanamavoan’ny mpiavonavona.
