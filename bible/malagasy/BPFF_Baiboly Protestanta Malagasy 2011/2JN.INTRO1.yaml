    children:
    - type: text
      text: Ny votoatin’ny Epistily
  - type: usfm
    marker: ip
    children:
    - type: text
      text: I Jaona Apostoly izay manoratra ity epistily faharoa ity koa dia milaza ny tenany ho «loholona». Izay anoratany dia lazainy hoe «Itompokovavy voafidy sy ny zanany», ary izany dia manambara ny Fiangonana sy ireo Kristiana ao. Ny Apostoly dia mampirisika ny Kristiana anoratany mba hiaina amin’ny marina sy ny fitiavana. Toy ny ao amin’ny Epistily voalohany dia mampitandrina ny Kristiana koa izy ny amin’ireo olona izay mampiely fampianarana tsy izy, izay mifototra koa amin’ny fandavana an’i Kristy ho tonga nofo. Amin’ny famaranana ny Epistily dia milaza ny fanantenany hamangy ny Fiangonana izy sady mampita famangiana avy amin’ny Fiangonana rahavavy iray.
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Epistily
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fitarihanteny: And 1-3'
