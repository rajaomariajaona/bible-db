document_id: JAS.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Jakoba, mpanompon’Andriamanitra sy Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo no mamangy ny foko roa amby folo monina any am-pielezana.'
  - type: heading
    content: Fizahan-toetra, faharetana, fanatanterahana
  '10':
  - type: text
    content: 'ary ny mpanankarena kosa dia amin’ny fietreny, satria ho levona tahaka ny vonin’ny ahitra izy. '
  '11':
  - type: text
    content: Fa miposaka ny masoandro mbamin’ny hainandro mahamay; mampalazo ny ahitra izany ka mihintsana ny voniny ary levona ny hatsaran-tarehiny. Toy izany koa no ho falazon’ny mpanankarena amin’ny raharaha ataony.
  - type: heading
    content: Ny fizahan-toetra
  '12':
  - type: text
    content: Sambatra izay olona maharitra fakam-panahy! Fa rehefa voazaha toetra izy dia handray ny satroboninahitry ny fiainana izay nolazain’ny Tompo homena izay tia Azy.
  '13':
  - type: text
    content: 'Raha misy alaim-panahy, aoka izy tsy hiteny hoe: Andriamanitra no maka fanahy ahy. Fa tsy azon’ny ratsy alaim-panahy Andriamanitra, sady tsy mba maka fanahy olona. '
  '14':
  - type: text
    content: 'Fa samy alaim-panahy ny olona raha tarihin’ny filany sy mety fitahiny. '
  '15':
  - type: text
    content: Ary ny filana, rehefa torontoronina, dia miteraka ota; ary ny ota, rehefa tanteraka, dia miteraka fahafatesana.
  '16':
  - type: text
    content: 'Aza mety hofitahina ianareo, ry rahalahy malalako: '
  '17':
  - type: text
    content: 'Ny fanomezan-tsoa rehetra sy ny fanomezana tanteraka rehetra dia avy any ambony, midina avy amin’ny Rain’ny fahazavana izay tsy misy fiovaovana na aloky ny fivadihana. '
  '18':
  - type: text
    content: Fa tamin’ny sitrapony no niterahany antsika tamin’ny tenin’ny fahamarinana mba ho isika no santatry ny zavatra noforoniny.
  - type: heading
    content: Tsy ampy ny mihaino
  '19':
  - type: text
    content: 'Fantaro izao, ry rahalahy malalako: Aoka ny olona rehetra halady hihaino, ho malai-miteny, ho malain-ko tezitra; '
  '2':
  - type: text
    content: 'Ry rahalahiko, ataovy ho fifaliana avokoa na dia rehefa iharan’ny fizahan-toetra samihafa aza ianareo, '
  '20':
  - type: text
    content: 'fa ny fahatezeran’ny olona dia tsy ahefana ny fahamarinana araka an’Andriamanitra. '
  '21':
  - type: text
    content: Koa ario ny fahalotoana rehetra sy ny faharatsiana tafahoatra, ary ekeo amin’ny fahalemem-panahy ny teny nambolena ao aminareo, izay mahavonjy ny fanahinareo.
  '22':
  - type: text
    content: 'Fa aoka ho mpankato ny teny ianareo fa aza mihaino fotsiny ihany ka mamitaka ny tenanareo. '
  '23':
  - type: text
    content: 'Fa raha misy mpihaino ny teny nefa tsy mankatò azy dia toy ny olona mizaha ny tarehiny eo amin’ny fitaratra; '
  '24':
  - type: text
    content: 'fa mijery ny tenany izy dia lasa ary miaraka amin’izay dia hadinony ny tarehiny. '
  '25':
  - type: text
    content: Fa izay mandinika ny lalàna tanteraka, ny lalànan’ny fahafahana, ka maharitra amin’izany, raha tsy mpihaino manadino fa mankatò izany amin’ny asany, dia ho sambatra amin’ny fampiharana azy io olona io.
  '26':
  - type: text
    content: 'Raha misy mihevi-tena ho mpivavaka, nefa tsy mahafehy ny lelany fa mamitaka ny fony, dia zava-poana ny fivavahan’izany olona izany. '
  '27':
  - type: text
    content: 'Izao no fivavahana madio sady tsy misy loto eo anatrehan’Andriamanitra Ray: Ny mamangy ny kamboty sy ny mpitondratena amin’ny fahoriany ary ny miaro ny tena tsy hisy pentimpentina avy amin’izao tontolo izao.'
  '3':
  - type: text
    content: 'satria fantatrareo fa ny fizahan-toetra ny finoanareo dia mahatonga faharetana. '
  '4':
  - type: text
    content: Ary aoka ny faharetana hisy asa tanteraka, mba ho tanteraka sy ho tonga ohatra ianareo ka tsy hisy tsy ampy na amin’inona na amin’inona.
  - type: heading
    content: Mivavaka mba hananana fahendrena
  '5':
  - type: text
    content: 'Raha misy aminareo tsy ampy fahendrena dia aoka izy hangataka amin’Andriamanitra izay manome malalaka ho an’ny olona rehetra sady tsy mba mandatsa, fa homena azy izany. '
  '6':
  - type: text
    content: 'Nefa aoka hangataka amin’ny finoana izy ka tsy hisalasala akory; fa izay misalasala dia toy ny alondranomasina entin’ny rivotra ka atopatopany. '
  '7':
  - type: text
    content: 'Koa aoka tsy hanampo handray zavatra amin’ny Tompo ny olona toy izany: '
  '8':
  - type: text
    content: Olona miroa saina izy, miovaova amin’ny alehany rehetra.
  - type: heading
    content: Ny mpanankarena sy ny mahantra
  '9':
  - type: text
    content: 'Aoka ny rahalahy izay mahantra hanao ny fanandratana azy ho reharehany; '
