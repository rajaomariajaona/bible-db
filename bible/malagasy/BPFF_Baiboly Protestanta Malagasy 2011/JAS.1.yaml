document_id: JAS.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Jakoba, mpanompon’Andriamanitra sy Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo no mamangy ny foko roa amby folo monina any am-pielezana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fizahan-toetra, faharetana, fanatanterahana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry rahalahiko, ataovy ho fifaliana avokoa na dia rehefa iharan’ny fizahan-toetra samihafa aza ianareo, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'satria fantatrareo fa ny fizahan-toetra ny finoanareo dia mahatonga faharetana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary aoka ny faharetana hisy asa tanteraka, mba ho tanteraka sy ho tonga ohatra ianareo ka tsy hisy tsy ampy na amin’inona na amin’inona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mivavaka mba hananana fahendrena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha misy aminareo tsy ampy fahendrena dia aoka izy hangataka amin’Andriamanitra izay manome malalaka ho an’ny olona rehetra sady tsy mba mandatsa, fa homena azy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nefa aoka hangataka amin’ny finoana izy ka tsy hisalasala akory; fa izay misalasala dia toy ny alondranomasina entin’ny rivotra ka atopatopany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa aoka tsy hanampo handray zavatra amin’ny Tompo ny olona toy izany: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Olona miroa saina izy, miovaova amin’ny alehany rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpanankarena sy ny mahantra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aoka ny rahalahy izay mahantra hanao ny fanandratana azy ho reharehany; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary ny mpanankarena kosa dia amin’ny fietreny, satria ho levona tahaka ny vonin’ny ahitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa miposaka ny masoandro mbamin’ny hainandro mahamay; mampalazo ny ahitra izany ka mihintsana ny voniny ary levona ny hatsaran-tarehiny. Toy izany koa no ho falazon’ny mpanankarena amin’ny raharaha ataony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fizahan-toetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sambatra izay olona maharitra fakam-panahy! Fa rehefa voazaha toetra izy dia handray ny satroboninahitry ny fiainana izay nolazain’ny Tompo homena izay tia Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha misy alaim-panahy, aoka izy tsy hiteny hoe: Andriamanitra no maka fanahy ahy. Fa tsy azon’ny ratsy alaim-panahy Andriamanitra, sady tsy mba maka fanahy olona. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa samy alaim-panahy ny olona raha tarihin’ny filany sy mety fitahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny filana, rehefa torontoronina, dia miteraka ota; ary ny ota, rehefa tanteraka, dia miteraka fahafatesana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza mety hofitahina ianareo, ry rahalahy malalako: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny fanomezan-tsoa rehetra sy ny fanomezana tanteraka rehetra dia avy any ambony, midina avy amin’ny Rain’ny fahazavana izay tsy misy fiovaovana na aloky ny fivadihana. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa tamin’ny sitrapony no niterahany antsika tamin’ny tenin’ny fahamarinana mba ho isika no santatry ny zavatra noforoniny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy ampy ny mihaino
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fantaro izao, ry rahalahy malalako: Aoka ny olona rehetra halady hihaino, ho malai-miteny, ho malain-ko tezitra; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa ny fahatezeran’ny olona dia tsy ahefana ny fahamarinana araka an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Koa ario ny fahalotoana rehetra sy ny faharatsiana tafahoatra, ary ekeo amin’ny fahalemem-panahy ny teny nambolena ao aminareo, izay mahavonjy ny fanahinareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa aoka ho mpankato ny teny ianareo fa aza mihaino fotsiny ihany ka mamitaka ny tenanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa raha misy mpihaino ny teny nefa tsy mankatò azy dia toy ny olona mizaha ny tarehiny eo amin’ny fitaratra; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fa mijery ny tenany izy dia lasa ary miaraka amin’izay dia hadinony ny tarehiny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa izay mandinika ny lalàna tanteraka, ny lalànan’ny fahafahana, ka maharitra amin’izany, raha tsy mpihaino manadino fa mankatò izany amin’ny asany, dia ho sambatra amin’ny fampiharana azy io olona io.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha misy mihevi-tena ho mpivavaka, nefa tsy mahafehy ny lelany fa mamitaka ny fony, dia zava-poana ny fivavahan’izany olona izany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izao no fivavahana madio sady tsy misy loto eo anatrehan’Andriamanitra Ray: Ny mamangy ny kamboty sy ny mpitondratena amin’ny fahoriany ary ny miaro ny tena tsy hisy pentimpentina avy amin’izao tontolo izao.'
