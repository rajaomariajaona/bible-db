document_id: PSA.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voninahitry ny anaran’Andriamanitra
  - type: text
    content: Ho an’ny mpiventy hira. Al-hagitit. Salamo nataon’i Davida.
  - type: text
    content: RY TOMPO Andriamanitray ô,
  - type: text
    content: endre ny voninahitry ny anaranao amin’ny tany rehetra!
  - type: text
    content: Nataonao eny amin’ny lanitra ny famirapiratan’ny voninahitrao.
  '2':
  - type: text
    content: Avy amin’ny vavan’ny ankizy madinika sy ny zaza minono
  - type: text
    content: no nanorenanao manda mafy eo anatrehan’ny mpandrafy Anao
  - type: text
    content: mba hampanginanao ny fahavalo sy izay ta hamaly ratsy.
  '3':
  - type: text
    content: Raha jereko ny lanitra izay asan’ny rantsantananao
  - type: text
    content: sy ny volana aman-kintana izay nampitoerinao
  '4':
  - type: text
    content: inona moa ny olona no ahatsiarovanao azy?
  - type: text
    content: Ary inona ny zanak’olombelona no amangianao azy?
  '5':
  - type: text
    content: Fa nataonao ambany kely noho Andriamanitra izy
  - type: text
    content: ary nosatrohanao voninahitra sy famirapiratana.
  '6':
  - type: text
    content: Nampanjakainao amin’ny asan’ny tananao izy,
  - type: text
    content: nataonao eo ambanin’ny tongony ny zavatra rehetra,
  '7':
  - type: text
    content: dia ny ondry aman’osy sy ny omby rehetra
  - type: text
    content: ary ny bibidia koa,
  '8':
  - type: text
    content: ny voromanidina sy ny hazandrano any an-dranomasina
  - type: text
    content: izay mandeha amin’ny lalan-dranomasina.
  '9':
  - type: text
    content: RY TOMPO Andriamanitray ô,
  - type: text
    content: endre ny voninahitry ny anaranao amin’ny tany rehetra!
