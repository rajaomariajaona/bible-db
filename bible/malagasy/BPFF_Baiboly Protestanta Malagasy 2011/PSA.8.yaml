document_id: PSA.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny voninahitry ny anaran’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Al-hagitit. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: RY TOMPO Andriamanitray ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: endre ny voninahitry ny anaranao amin’ny tany rehetra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nataonao eny amin’ny lanitra ny famirapiratan’ny voninahitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avy amin’ny vavan’ny ankizy madinika sy ny zaza minono
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanorenanao manda mafy eo anatrehan’ny mpandrafy Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampanginanao ny fahavalo sy izay ta hamaly ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha jereko ny lanitra izay asan’ny rantsantananao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny volana aman-kintana izay nampitoerinao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: inona moa ny olona no ahatsiarovanao azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary inona ny zanak’olombelona no amangianao azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa nataonao ambany kely noho Andriamanitra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nosatrohanao voninahitra sy famirapiratana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nampanjakainao amin’ny asan’ny tananao izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nataonao eo ambanin’ny tongony ny zavatra rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia ny ondry aman’osy sy ny omby rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny bibidia koa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ny voromanidina sy ny hazandrano any an-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mandeha amin’ny lalan-dranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: RY TOMPO Andriamanitray ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: endre ny voninahitry ny anaranao amin’ny tany rehetra!
