document_id: ROM.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy nanary ny olony Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy aho: Sao dia narian’Andriamanitra ary ny olony? Sanatria izany! Satria izaho koa mba Israelita taranak’i Abrahama ihany, avy amin’ny fokon’i Benjamina. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tsy nanary ny olony izay efa fantany mialoha Andriamanitra; sa tsy fantatrareo izay lazain’ny Soratra Masina ao amin’ny tantaran’i Elia, dia ilay fitarainany tamin’Andriamanitra noentiny namely ny Israely hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«TOMPO ô, efa namono ny mpaminaninao sy nandrava ny alitaranao izy; ary izaho irery ihany no sisa ka mitady ny aiko koa izy» (1Mpa 19.14)? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nefa ahoana no navalin’Andriamanitra azy? «Izaho efa namela fito arivo lahy ho Ahy, dia izay tsy mba nandohalika tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: '» (1Mpa 19.18). '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia toy izany koa amin’izao andro ankehitriny izao, misy sisa tavela ihany araka ny fifidianana amin’ny fahasoavana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary raha avy amin’ny fahasoavana izany dia tsy mba avy amin’ny asa intsony; fa raha izay dia tsy fahasoavana intsony ny fahasoavana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ahoana ary? Izay notadiavin’ny Israely dia tsy azony, fa ny voafidy ihany no nahazo izany ary ny sisa kosa dia tonga mafy fo; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Andriamanitra efa nanome azy fanahy mahasondrian-tory
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy maso tsy hahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary sofina tsy hahare, mandraka androany» (Isa 29.10; Deo 29.3).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Davida:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aoka ny latabany ho fandrika sy ho harato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ho fahatafintohinana sy ho famaliana azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aoka ny masony ho maizina ka tsy hahita!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho vokoka mandrakariva ny lamosiny!» (Sal 69.22-23)
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samy ao amin’ny lamin’Andriamanitra na ny Jiosy na ny tsy Jiosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy aho: Sao dia tafintohina ary ny Israely ka ho lavo? Sanatria izany! Fa ny fahatafintohinany no nahatonga famonjena ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' mba hampialona azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha ny fahatafintohinany no tonga harenan’izao tontolo izao, ary ny fahareseny no tonga harenan’ny Jentilisa, tsy mainka va ny fahafenoany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ianareo Jentilisa no itenenako. Koa satria apostolin’ny Jentilisa aho dia mankalaza ny fanompoako, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'mba hisy hahazoako hampialona ireo iray ra amiko, mba hamonjeko ny sasany aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha ny fampihatahana azy no fampihavanana izao tontolo izao, tsy ho fampodiana ny fiainana avy amin’ny fahafatesana va ny fandraisana azy? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary koa, raha masina ny santatry ny mofo dia masina koa ny vongany manontolo; ary raha masina ny fotony dia masina koa ny sampany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha notapahina ny sampany sasany, ary ianao izay tahaka ny hazo oliva maniry ho azy kosa no natsofoka haniry teo aminy ka mba niombona tamin’ny fototra sy ny menaky ny hazo oliva, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia aza mirehareha amin’ny sampany; fa na dia mirehareha aza ianao, tsy ianao no mitondra ny fotony fa ny fotony no mitondra anao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hiteny ianao hoe: Notapahina ny sampany sasany hanatsofohana ahy haniry. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Marina izany; ny tsy finoany no nanapahana azy fa ny finoanao kosa no itoeranao. Aza miavonavona fa matahora. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa raha ny tena sampany aza tsy navelan’Andriamanitra dia tsy havelany koa ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa hevero fa mora fanahy Andriamanitra nefa hentitra: Amin’izay lavo dia hentitra Izy; fa aminao kosa dia mora fanahy Andriamanitra, raha maharitra ao amin’ny fahamoram-panahiny ianao; fa raha tsy izany dia hotapahina koa ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nefa ireny kosa, raha tsy mifikitra amin’ny tsy finoana, dia hatsofoka haniry ihany, satria azon’Andriamanitra atsofoka indray izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa raha notapahina tamin’ny hazo oliva naniry ho azy ianao ka natsofoka haniry amin’ny hazo oliva tsara, nefa tsy tena sampany, manoatra noho izany no hanatsofohana indray izay tena sampany amin’ny hazo oliva nanapahana azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famonjena ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa tsy tiako tsy ho fantatrareo izao zavamiafina izao, ry rahalahy, fandrao mihevitra ny tenanareo ho hendry ianareo: Misy fahamafisam-po manjo ny Israely sasany mandra-pahatafiditry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Amin’izany dia hovonjena avokoa ny Israely rehetra, araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«Hiainga avy any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' ny Mpanafaka'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampiala ny haratsiam-panahy amin’i Jakoba Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: izany no fanekeko aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa manaisotra ny fahotany Aho» (Isa 59.20-21; 27.9).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Araka ny Filazantsara dia fahavalo izy noho ny aminareo; fa araka ny fifidianana kosa dia malala izy noho ny amin’ny razana. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Satria ny fanomezana ny fahasoavana sy ny fiantsoan’Andriamanitra dia tsy azo ovana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa tahaka anareo fahiny, izay tsy nankatò an’Andriamanitra, nefa ankehitriny dia ny tsy fanekeny no nahazoanareo famindrampo, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'dia toy izany koa ankehitriny, tsy nankatò ireny, mba hahazoany famindrampo ankehitriny noho ny famindrampo azonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa nanidy azy rehetra tao amin’ny tsy fankatoavana Andriamanitra mba hamindrany fo amin’izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Endre ny halalin’ny harena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fahendren’Andriamanitra ary ny fahalalany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hita lany ny fitsarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy azo fantarina ny lalany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa «iza no nahalala ny sain’NY TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no mpanolotsaina Azy?» (Isa 40.13)
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Iza no nanome Azy aloha
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamaliana azy indray?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Fa avy Aminy sy amin’ny alalany ary ho Azy ny zavatra rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izy anie no homem-boninahitra mandrakizay! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: '!'
