document_id: ROM.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy nanary ny olony Andriamanitra
  - type: text
    content: 'Dia hoy aho: Sao dia narian’Andriamanitra ary ny olony? Sanatria izany! Satria izaho koa mba Israelita taranak’i Abrahama ihany, avy amin’ny fokon’i Benjamina. '
  '10':
  - type: text
    content: Aoka ny masony ho maizina ka tsy hahita!
  - type: text
    content: Ary aoka ho vokoka mandrakariva ny lamosiny!» (Sal 69.22-23)
  - type: heading
    content: Samy ao amin’ny lamin’Andriamanitra na ny Jiosy na ny tsy Jiosy
  '11':
  - type: text
    content: 'Dia hoy aho: Sao dia tafintohina ary ny Israely ka ho lavo? Sanatria izany! Fa ny fahatafintohinany no nahatonga famonjena ho an’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' mba hampialona azy. '
  '12':
  - type: text
    content: Raha ny fahatafintohinany no tonga harenan’izao tontolo izao, ary ny fahareseny no tonga harenan’ny Jentilisa, tsy mainka va ny fahafenoany!
  '13':
  - type: text
    content: 'Fa ianareo Jentilisa no itenenako. Koa satria apostolin’ny Jentilisa aho dia mankalaza ny fanompoako, '
  '14':
  - type: text
    content: 'mba hisy hahazoako hampialona ireo iray ra amiko, mba hamonjeko ny sasany aminy. '
  '15':
  - type: text
    content: 'Fa raha ny fampihatahana azy no fampihavanana izao tontolo izao, tsy ho fampodiana ny fiainana avy amin’ny fahafatesana va ny fandraisana azy? '
  '16':
  - type: text
    content: Ary koa, raha masina ny santatry ny mofo dia masina koa ny vongany manontolo; ary raha masina ny fotony dia masina koa ny sampany.
  '17':
  - type: text
    content: 'Fa raha notapahina ny sampany sasany, ary ianao izay tahaka ny hazo oliva maniry ho azy kosa no natsofoka haniry teo aminy ka mba niombona tamin’ny fototra sy ny menaky ny hazo oliva, '
  '18':
  - type: text
    content: 'dia aza mirehareha amin’ny sampany; fa na dia mirehareha aza ianao, tsy ianao no mitondra ny fotony fa ny fotony no mitondra anao. '
  '19':
  - type: text
    content: 'Ary hiteny ianao hoe: Notapahina ny sampany sasany hanatsofohana ahy haniry. '
  '2':
  - type: text
    content: 'Tsy nanary ny olony izay efa fantany mialoha Andriamanitra; sa tsy fantatrareo izay lazain’ny Soratra Masina ao amin’ny tantaran’i Elia, dia ilay fitarainany tamin’Andriamanitra noentiny namely ny Israely hoe: '
  '20':
  - type: text
    content: 'Marina izany; ny tsy finoany no nanapahana azy fa ny finoanao kosa no itoeranao. Aza miavonavona fa matahora. '
  '21':
  - type: text
    content: 'Fa raha ny tena sampany aza tsy navelan’Andriamanitra dia tsy havelany koa ianao. '
  '22':
  - type: text
    content: 'Koa hevero fa mora fanahy Andriamanitra nefa hentitra: Amin’izay lavo dia hentitra Izy; fa aminao kosa dia mora fanahy Andriamanitra, raha maharitra ao amin’ny fahamoram-panahiny ianao; fa raha tsy izany dia hotapahina koa ianao. '
  '23':
  - type: text
    content: 'Nefa ireny kosa, raha tsy mifikitra amin’ny tsy finoana, dia hatsofoka haniry ihany, satria azon’Andriamanitra atsofoka indray izy. '
  '24':
  - type: text
    content: Fa raha notapahina tamin’ny hazo oliva naniry ho azy ianao ka natsofoka haniry amin’ny hazo oliva tsara, nefa tsy tena sampany, manoatra noho izany no hanatsofohana indray izay tena sampany amin’ny hazo oliva nanapahana azy.
  - type: heading
    content: Ny famonjena ny Israely
  '25':
  - type: text
    content: 'Fa tsy tiako tsy ho fantatrareo izao zavamiafina izao, ry rahalahy, fandrao mihevitra ny tenanareo ho hendry ianareo: Misy fahamafisam-po manjo ny Israely sasany mandra-pahatafiditry ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra. '
  '26':
  - type: text
    content: 'Amin’izany dia hovonjena avokoa ny Israely rehetra, araka ny voasoratra hoe:'
  - type: text
    content: '«Hiainga avy any '
  - type: text
    content: Ziona
  - type: text
    content: ' ny Mpanafaka'
  - type: text
    content: ary hampiala ny haratsiam-panahy amin’i Jakoba Izy;
  '27':
  - type: text
    content: izany no fanekeko aminy
  - type: text
    content: rehefa manaisotra ny fahotany Aho» (Isa 59.20-21; 27.9).
  '28':
  - type: text
    content: 'Araka ny Filazantsara dia fahavalo izy noho ny aminareo; fa araka ny fifidianana kosa dia malala izy noho ny amin’ny razana. '
  '29':
  - type: text
    content: 'Satria ny fanomezana ny fahasoavana sy ny fiantsoan’Andriamanitra dia tsy azo ovana. '
  '3':
  - type: text
    content: '«TOMPO ô, efa namono ny mpaminaninao sy nandrava ny alitaranao izy; ary izaho irery ihany no sisa ka mitady ny aiko koa izy» (1Mpa 19.14)? '
  '30':
  - type: text
    content: 'Fa tahaka anareo fahiny, izay tsy nankatò an’Andriamanitra, nefa ankehitriny dia ny tsy fanekeny no nahazoanareo famindrampo, '
  '31':
  - type: text
    content: 'dia toy izany koa ankehitriny, tsy nankatò ireny, mba hahazoany famindrampo ankehitriny noho ny famindrampo azonareo. '
  '32':
  - type: text
    content: Fa nanidy azy rehetra tao amin’ny tsy fankatoavana Andriamanitra mba hamindrany fo amin’izy rehetra.
  '33':
  - type: text
    content: Endre ny halalin’ny harena
  - type: text
    content: sy ny fahendren’Andriamanitra ary ny fahalalany!
  - type: text
    content: Tsy hita lany ny fitsarany
  - type: text
    content: ary tsy azo fantarina ny lalany!
  '34':
  - type: text
    content: Fa «iza no nahalala ny sain’NY TOMPO?
  - type: text
    content: Iza no mpanolotsaina Azy?» (Isa 40.13)
  '35':
  - type: text
    content: Iza no nanome Azy aloha
  - type: text
    content: mba hamaliana azy indray?
  '36':
  - type: text
    content: Fa avy Aminy sy amin’ny alalany ary ho Azy ny zavatra rehetra.
  - type: text
    content: 'Izy anie no homem-boninahitra mandrakizay! '
  - type: text
    content: Amena
  - type: text
    content: '!'
  '4':
  - type: text
    content: 'Nefa ahoana no navalin’Andriamanitra azy? «Izaho efa namela fito arivo lahy ho Ahy, dia izay tsy mba nandohalika tamin’ny '
  - type: text
    content: Baala
  - type: text
    content: '» (1Mpa 19.18). '
  '5':
  - type: text
    content: 'Dia toy izany koa amin’izao andro ankehitriny izao, misy sisa tavela ihany araka ny fifidianana amin’ny fahasoavana. '
  '6':
  - type: text
    content: Ary raha avy amin’ny fahasoavana izany dia tsy mba avy amin’ny asa intsony; fa raha izay dia tsy fahasoavana intsony ny fahasoavana.
  '7':
  - type: text
    content: 'Ahoana ary? Izay notadiavin’ny Israely dia tsy azony, fa ny voafidy ihany no nahazo izany ary ny sisa kosa dia tonga mafy fo; '
  '8':
  - type: text
    content: 'araka ny voasoratra hoe:'
  - type: text
    content: «Andriamanitra efa nanome azy fanahy mahasondrian-tory
  - type: text
    content: sy maso tsy hahita
  - type: text
    content: ary sofina tsy hahare, mandraka androany» (Isa 29.10; Deo 29.3).
  '9':
  - type: text
    content: 'Ary hoy Davida:'
  - type: text
    content: «Aoka ny latabany ho fandrika sy ho harato,
  - type: text
    content: sady ho fahatafintohinana sy ho famaliana azy!
