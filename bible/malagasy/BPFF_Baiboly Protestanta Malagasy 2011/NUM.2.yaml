document_id: NUM.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny toeran’ny foko tsirairay ao amin’ny toby
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamin’i Mosesy sy i Arona: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanevan’ny tobin’i Robena no ho eo amin’ny lafiny atsimo, araka ny antokony. Ny lohan’ny taranak’i Robena dia i Elizora, zanak’i Sedeora. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia dimanjato sy enina arivo sy efatra alina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fokon’i Simeona no hitoby eo anilany. Ny lohan’ny taranak’i Simeona dia i Selomiela, zanak’i Zorisaday. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia telonjato sy sivy arivo sy dimy alina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manaraka izany ny fokon’i Gada. Ny lohan’ny taranak’i Gada dia i Eliasafa, zanak’i Reoela. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia dimampolo sy eninjato sy dimy arivo sy efatra alina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tontalin’izay voaisa teo amin’ny tobin’i Robena dia dimampolo sy efajato sy arivo sy dimy alina sy iray hetsy, araka ny antokony. Ireo no mandeha faharoany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia handroso ny tranolay fihaonana sy ny tobin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' izay eo afovoan’ny toby rehetra, ka araka ny itobiany ihany no handrosoany, samy eo amin’ny filaharany avy, araka ny fanevany avy.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanevan’ny tobin’i Efraima, araka ny antokony, dia ho eo amin’ny lafiny andrefana. Ny lohan’ny taranak’i Efraima dia i Elisama, zanak’i Amihoda. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia dimanjato sy efatra alina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy eo amin’ny fanevany sy eo amin’ny faneva kelin’ny fianakaviany avy no hitobian’ny Zanak’Israely; manodidina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ', sady manandrify azy, no hitobiany.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fokon’i Manase no ho eo anilany. Ny lohan’ny taranak’i Manase dia i Gamaliela, zanak’i Pedazora. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia roanjato sy roa arivo sy telo alina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manaraka izany ny fokon’i Benjamina. Ny lohan’ny taranak’i Benjamina dia i Abidana, zanak’i Gideony. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia efajato sy dimy arivo sy telo alina. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tontalin’izay voaisa teo amin’ny tobin’i Efraima dia zato sy valo arivo sy iray hetsy, araka ny antokony. Ireo no mandeha fahatelony.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanevan’ny tobin’i Dana, araka ny antokony, dia ho eo amin’ny lafiny avaratra. Ny lohan’ny taranak’i Dana dia i Ahiezera, zanak’i Amisaday. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia fitonjato sy roa arivo sy enina alina. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fokon’i Asera no hitoby eo anilany. Ny lohan’ny taranak’i Asera dia i Pagiela, zanak’i Okrana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia dimanjato sy arivo sy efatra alina. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manaraka izany ny fokon’i Naftaly. Ny lohan’ny taranak’i Naftaly dia i Ahira, zanak’i Enana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny hitoby eo amin’ny lafiny atsinanana, tandrifin’ny fiposahan’ny masoandro, dia izay momba ny fanevan’ny tobin’i Joda, araka ny antokony. Ny lohan’ny taranak’i Joda dia i Nasona, zanak’i Aminadaba. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia efajato sy telo arivo sy dimy alina. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tontalin’izay voaisa teo amin’ny tobin’i Dana dia eninjato sy fito arivo sy dimy alina sy iray hetsy. Ireo kosa no vodilalana, araka ny fanevany.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no voaisa tamin’ny Zanak’Israely, araka ny fianakaviany. Ny tontalin’izay voaisa tamin’ny toby rehetra, araka ny antokony, dia dimampolo sy dimanjato sy telo arivo sy enina hetsy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny levita kosa dia tsy mba nisaina niaraka tamin’ny Zanak’Israely, araka izay nandidian’NY TOMPO an’i Mosesy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanatanteraka izay rehetra nandidian’NY TOMPO an’i Mosesy ny Zanak’Israely ka nitoby araka ny fanevany avy; samy nandroso araka ny fokony avy sy ny fianakaviany avy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia eninjato sy efatra arivo sy fito alina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fokon’Isakara kosa no hitoby eo anilany. Ny lohan’ny taranak’Isakara dia i Netanela, zanak’i Zoara. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia efajato sy efatra arivo sy dimy alina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia ny fokon’i Zebolona. Ny lohan’ny taranak’i Zebolona dia i Eliaba, zanak’i Helona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramilany izay voaisa dia efajato sy fito arivo sy dimy alina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tontalin’izay voaisa teo amin’ny tobin’i Joda dia efajato sy enina arivo sy valo alina sy iray hetsy, araka ny antokony. Ireo no ho lohalalana.
