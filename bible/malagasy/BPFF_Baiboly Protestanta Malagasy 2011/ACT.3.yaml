document_id: ACT.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanasitranana lehilahy malemy tongotra iray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niakatra ho eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' i Petera sy i Jaona tamin’ny fotoam-pivavahana tamin’ny ora fahasivy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nisy nitondra lehilahy nalemy tongotra hatrany an-kibon-dreniny, izay napetrany isanandro teo anoloan’ny vavahadin’ny tempoly, ilay antsoina hoe Itsaraendrika, mba hangataka fiantrana amin’izay niditra tao amin’ny tempoly; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'nony nahita an’i Petera sy i Jaona izay handeha hiditra ao amin’ny tempoly izy dia nangataka mba homena fiantrana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nibanjina azy i Petera sy i Jaona ka niteny hoe: Mijere anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nijery tsara azy roa lahy izy satria nanantena hahazo zavatra taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nefa hoy i Petera: Tsy manana volafotsy na volamena aho, fa izay ananako no omeko anao: Amin’ny anaran’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' avy any Nazareta, mitsangàna ka mandehana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia noraisiny tamin’ny tanany havanana Ralehilahy ka natsangany; ary natanjaka niaraka tamin’izay ny tongony sy ny kitrokeliny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niantsambotra izy ka nijoro dia nandeha ka niara-niditra taminy nankao amin’ny tempoly; sady nandehandeha nitsambikimbikina izy no nidera an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nahita azy nandehandeha sy nidera an’Andriamanitra ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary fantany tsara fa io no ilay nipetraka teo amin’ny vavahady Itsaraendrika, eo amin’ny tempoly, mba hiantrana; dia gaga sady talanjona izy ireo noho ity zava-nitranga tamin-dRalehilahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny toriteny nataon’i Petera tao amin’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha mbola tsy niala teo amin’i Petera sy i Jaona izy dia niara-nirohotra ho eo amin’izy telo lahy teo amin’ny fialofana izay antsoina hoe Fialofan’i Solomona ny olona rehetra, sady talanjona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa nahita izany i Petera dia niteny tamin’ny vahoaka hoe: Ry lehilahy Israelita, nahoana ianareo no talanjona amin’izao zavatra izao? Ary nahoana ianareo no mandinika anay sahala amin’ny hoe herinay na fahamasinanay no nahatonga azy ho afa-mandeha? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Andriamanitr’i Abrahama, Andriamanitr’Isaka ary Andriamanitr’i Jakoba, Andriamanitry ny razantsika, no nanome voninahitra an’i Jesosy Mpanompony, izay natolotrareo sy nolavinareo teo anatrehan’i Pilato, rehefa nokasainy halefa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ianareo kosa dia nandà Ilay Masina sy Marina ka mpamono olona no nangatahinareo halefa ho anareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa ny Tompon’ny aina kosa novonoinareo; nefa Izy dia natsangan’Andriamanitra tamin’ny maty, ary vavolombelon’izany izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny finoana ny anarany no nampahatanjaka io lehilahy hitanareo sy fantatrareo io, noho ny anarany; eny, ny finoana izay azo amin’ny alalany no nahazoany izao fahasitranana feno izao teto imasonareo rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ankehitriny ary, ry rahalahy, fantatro fa tamin’ny tsy fahalalana no nanaovanareo izany, ary toy izany koa ny mpanapaka anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa izany no nahatanterahan’Andriamanitra ny zavatra nampilazainy mialoha tamin’ny vavan’ny mpaminany rehetra, fa hiaritra fahoriana ny Kristiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa mibebaha ianareo ary miverena mba hamafana ny fahotanareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ka ho tonga ny fotoana famelombelomana anareo amin’ny fanatrehan’ny Tompo sy hanirahany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' voatendry ho anareo, dia Jesosy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ilay tsy maintsy noraisin’ny lanitra mandra-piavin’ny fotoana hamerenana ny zavatra rehetra, izay nampilazain’Andriamanitra ny mpaminaniny masina hatramin’ny taloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy i Mosesy: «Mpaminany no hatsangan’NY TOMPO Andriamanitra ho anareo avy amin’ny rahalahinareo, tahaka ahy; izy no hohenoinareo amin’izay rehetra holazainy aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa izay rehetra tsy mihaino izany mpaminany izany dia haringana tsy ho eo amin’ny olona» (Deo 18.15, 19). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny mpaminany rehetra koa hatramin’i Samoela sy ireo taorianany, na iza na iza niteny, dia nanambara izao andro izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ianareo no zanaky ny mpaminany sy ny fanekena nataon’Andriamanitra tamin’ny razanareo, raha hoy Izy tamin’i Abrahama hoe: «Amin’ny taranakao no hitahiana ny firenena rehetra ambonin’ny tany» (Gen 22.18). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ho anareo aloha no nananganan’Andriamanitra ny Mpanompony ka nanirahany Azy mba hitahiana anareo amin’ny fialanareo tsirairay avy amin’ny faharatsianareo.
