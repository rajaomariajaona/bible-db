document_id: ACT.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiovam-pon’i Saoly
  - type: heading
    content: Asa 22.3-21; 26.9-20
  - type: text
    content: 'Mbola nifofofofo fandrahonana sy famonoana tamin’ny mpianatry ny Tompo ihany i Saoly dia nankao amin’ny '
  - type: text
    content: Mpisoronabe
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Ary nisy mpianatra iray antsoina hoe Ananiasy tany Damaskosy; ary hoy ny Tompo taminy tamin’ny fahitana: Ry Ananiasy! Dia hoy izy: Inty aho, Tompoko! '
  '11':
  - type: text
    content: 'Hoy ny Tompo taminy: Mitsangàna ka mandehana any amin’ny lalana atao hoe Imahitsy ka jereo ao an-tranon’i Jodasy ny lehilahy antsoina hoe Saoly avy any Tarsosy; fa indro, efa mivavaka izy; '
  '12':
  - type: text
    content: 'efa nahita lehilahy antsoina hoe Ananiasy tamin’ny fahitana izy, izay niditra ka nametra-tanana taminy mba hahita indray ny masony. '
  '13':
  - type: text
    content: 'Dia namaly i Ananiasy hoe: Tompoko, efa reko tamin’ny maro ny haben’ny ratsy nataon’izany lehilahy izany tamin’ny olonao masina tany Jerosalema. '
  '14':
  - type: text
    content: 'Manana fahefana avy tamin’ny lehiben’ny mpisorona atỳ koa izy mba hamatotra izay rehetra miantso ny anaranao. '
  '15':
  - type: text
    content: 'Nefa hoy ny Tompo taminy: Mandehana, fa fanaka voafidy ho fitondrana ny anarako eo anatrehan’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' sy ny mpanjaka ary ny Zanak’Israely izy; '
  '16':
  - type: text
    content: 'fa hasehoko azy ny habetsahan’izay tsy maintsy hiaretany ho voninahitry ny anarako. '
  '17':
  - type: text
    content: 'Dia lasa i Ananiasy ka niditra tao an-trano ary nametra-tanana taminy sady niteny hoe: Ry Saoly rahalahy, ny Tompo, dia Jesosy izay niseho taminao teo amin’ny lalana nalehanao, no naniraka ahy mba hahitan’ny masonao ary mba ho feno ny Fanahy Masina ianao. '
  '18':
  - type: text
    content: 'Niaraka tamin’izay dia nisy zavatra toy ny kiran’ny hazandrano niala avy tamin’ny masony dia nahita indray izy ka nitsangana ary natao batisa; '
  '19':
  - type: text
    content: dia nisakafo izy ka natanjaka.
  - type: heading
    content: Nanomboka nitory an’i Kristy i Saoly
  - type: text
    content: 'Nitoetra andro vitsivitsy teo amin’ny mpianatra tany Damaskosy i Saoly. '
  '2':
  - type: text
    content: 'ka nangataka taratasy taminy ho any amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' any Damaskosy, mba hahazoany mitondra mifatotra ho any Jerosalema izay rehetra hitany manaraka izany fampianarana izany, na lahy na vavy.'
  '20':
  - type: text
    content: 'Ary niaraka tamin’izay dia nitory teo amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' izy ka nilaza fa Jesosy no Zanak’Andriamanitra. '
  '21':
  - type: text
    content: 'Dia talanjona izay rehetra nandre ka niteny hoe: Tsy io va ilay nandringana izay niantso izany anarana izany tany Jerosalema? Ary moa tsy ny hitondra azy ireo mifatotra ho any amin’ireo lehiben’ny mpisorona va no nahatongavany atỳ? '
  '22':
  - type: text
    content: 'Nefa vao mainka nitombo hery i Saoly ka nandresy lahatra ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' izay nonina tany Damaskosy izy ary naneho marina fa Jesosy no '
  - type: text
    content: Kristy
  - type: text
    content: .
  '23':
  - type: text
    content: 'Nony afaka andro maromaro dia niray saina hamono azy ny Jiosy; '
  '24':
  - type: text
    content: 'nefa fantatr’i Saoly ny teti-dratsiny. Niambina ny vavahady andro aman’alina izy ireo mba hamonoany azy. '
  '25':
  - type: text
    content: Nefa naka azy kosa ny mpianany nony alina ka nampidina azy tamin’ny sobika avy eo amin’ny manda.
  - type: heading
    content: Any Jerosalema i Saoly
  '26':
  - type: text
    content: 'Rehefa tonga tany Jerosalema i Saoly dia nitady hiaraka tamin’ny mpianatra; nefa natahotra azy izy rehetra ka tsy nino azy ho mpianatra. '
  '27':
  - type: text
    content: 'Fa naka azy i Barnabasy ka nitondra azy ho any amin’ny Apostoly, ary nanambara tamin’izy ireo ny nahitany ny Tompo teny an-dalana sy ny nitenenany taminy ary ny nahasahiany nitory ny anaran’i Jesosy tany Damaskosy. '
  '28':
  - type: text
    content: 'Dia niara-niditra sy nivoaka tamin’ireo tany Jerosalema izy sady nitory tamim-pahasahiana tamin’ny anaran’ny Tompo '
  '29':
  - type: text
    content: 'ary niresaka sy niady hevitra tamin’ireo Helenista izy, nefa ireo kosa dia nitady izay hahafaty azy. '
  '3':
  - type: text
    content: 'Raha nandeha izy ka tonga teo akaikin’i Damaskosy dia nisy mazava avy tany an-danitra nanelatselatra tampoka nanodidina azy; '
  '30':
  - type: text
    content: Nony fantatry ny rahalahy izany dia noentiny nidina nankany Kaisaria izy ka nampandehaniny ho any Tarsosy.
  '31':
  - type: text
    content: 'Dia nandry fahalemana ny fiangonana manerana an’i '
  - type: text
    content: Jodia
  - type: text
    content: ' sy i Galilia ary i Samaria ka sady nandroso tsara sy nandeha tamin’ny fahatahorana ny Tompo no nihamaro noho ny fampaherezan’ny Fanahy Masina.'
  - type: heading
    content: ARY HATRANY AMIN’NY FARAN’NY TANY
  - type: heading
    content: 'Any Lida i Petera: Ny fanasitranana an’i Enea'
  '32':
  - type: text
    content: 'Rehefa nandeha nitety ny faritra rehetra i Petera dia nidina ho any amin’ny olona masina nonina tany Lida koa. '
  '33':
  - type: text
    content: 'Nahita lehilahy iray teo izy, Enea no anarany, izay efa nandry nandritra ny valo taona teo am-parafara satria malemy. '
  '34':
  - type: text
    content: 'Hoy i Petera taminy: Ry Enea, manasitrana anao Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: '; mitsangàna ka amboary ny fandriananao. Dia nitsangana niaraka tamin’izay izy. '
  '35':
  - type: text
    content: Rehefa nahita izany izay rehetra nonina tany Lida sy Saròna dia niverina ho amin’ny Tompo.
  - type: heading
    content: 'Any Jopa i Petera: Novelomina i Tabita'
  '36':
  - type: text
    content: Tany Jopa dia nisy vehivavy mpianatra iray antsoina hoe Tabita, izany hoe, raha adika, Dorkasy
  - type: note
    content: 'Dorkasy: Gazela, anaram-biby haingam-pandeha.'
  - type: text
    content: '; be ny asa soa sy ny fiantrana izay nataon’izany vehivavy izany. '
  '37':
  - type: text
    content: 'Narary izy tamin’izany andro izany ka maty; ary rehefa nampandroina ny faty dia napetraka tao amin’ny efitrano iray ambony rihana. '
  '38':
  - type: text
    content: 'Satria akaiky an’i Jopa i Lida dia ren’ny mpianatra fa efa tonga tao i Petera, ary naniraka roa lahy izy hangataka aminy hoe: Aza misalasala hankaty aminay. '
  '39':
  - type: text
    content: 'Dia nitsangana i Petera ka nandeha niaraka tamin’ireo. Nony tonga izy dia noentiny tany an’efitra ambony; ary ny mpitondratena rehetra nitsangana teo anilany ka nitomany sady nampiseho ny akanjo sy lamba izay nozairin’i Dorkasy fony fahavelony. '
  '4':
  - type: text
    content: 'dia lavo tamin’ny tany izy ka nandre feo niteny taminy hoe: Saoly, Saoly, nahoana no manenjika Ahy ianao? '
  '40':
  - type: text
    content: 'Navoakan’i Petera avokoa izy rehetra, dia nandohalika izy ka nivavaka; ary nitodika nanatrika ny faty izy ka niteny hoe: Ry Tabita, mitsangàna! Dia nahirany ny masony; ary rehefa nahita an’i Petera izy dia niarina. '
  '41':
  - type: text
    content: 'Nanolo-tanana azy i Petera ka nanangana azy; ary rehefa niantso ny olona masina sy ny mpitondratena izy dia nanolotra azy velona. '
  '42':
  - type: text
    content: 'Fantatra manerana an’i Jopa izany ka maro no nino ny Tompo. '
  '43':
  - type: text
    content: Nitoetra andro maromaro tany Jopa tao amin’i Simona mpandon-koditra i Petera.
  '5':
  - type: text
    content: 'Ary hoy izy: Iza moa ianao, Tompoko? Dia hoy Izy: Izaho no Jesosy izay enjehinao. '
  '6':
  - type: text
    content: 'Fa mitsangàna ka mankanesa any an-tanàna, dia holazaina aminao izay tsy maintsy hataonao. '
  '7':
  - type: text
    content: 'Ary ny olona izay niara-dia taminy dia nijanona tsy nahateny; nandre ny feo izy ireo nefa tsy nahita na iza na iza. '
  '8':
  - type: text
    content: 'Dia nitsangana tamin’ny tany i Saoly, ary rehefa nahirany ny masony dia tsy nahita na inona na inona izy; koa nitantana azy izy ireo ka nitondra azy ho any Damaskosy. '
  '9':
  - type: text
    content: Nandritra ny telo andro dia tsy nahita izy sady tsy nihinana na nisotro.
