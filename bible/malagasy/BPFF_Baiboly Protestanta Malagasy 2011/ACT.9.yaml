document_id: ACT.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiovam-pon’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Asa 22.3-21; 26.9-20
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mbola nifofofofo fandrahonana sy famonoana tamin’ny mpianatry ny Tompo ihany i Saoly dia nankao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisoronabe
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nangataka taratasy taminy ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' any Damaskosy, mba hahazoany mitondra mifatotra ho any Jerosalema izay rehetra hitany manaraka izany fampianarana izany, na lahy na vavy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha nandeha izy ka tonga teo akaikin’i Damaskosy dia nisy mazava avy tany an-danitra nanelatselatra tampoka nanodidina azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia lavo tamin’ny tany izy ka nandre feo niteny taminy hoe: Saoly, Saoly, nahoana no manenjika Ahy ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy izy: Iza moa ianao, Tompoko? Dia hoy Izy: Izaho no Jesosy izay enjehinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa mitsangàna ka mankanesa any an-tanàna, dia holazaina aminao izay tsy maintsy hataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny olona izay niara-dia taminy dia nijanona tsy nahateny; nandre ny feo izy ireo nefa tsy nahita na iza na iza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nitsangana tamin’ny tany i Saoly, ary rehefa nahirany ny masony dia tsy nahita na inona na inona izy; koa nitantana azy izy ireo ka nitondra azy ho any Damaskosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nandritra ny telo andro dia tsy nahita izy sady tsy nihinana na nisotro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nisy mpianatra iray antsoina hoe Ananiasy tany Damaskosy; ary hoy ny Tompo taminy tamin’ny fahitana: Ry Ananiasy! Dia hoy izy: Inty aho, Tompoko! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy ny Tompo taminy: Mitsangàna ka mandehana any amin’ny lalana atao hoe Imahitsy ka jereo ao an-tranon’i Jodasy ny lehilahy antsoina hoe Saoly avy any Tarsosy; fa indro, efa mivavaka izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'efa nahita lehilahy antsoina hoe Ananiasy tamin’ny fahitana izy, izay niditra ka nametra-tanana taminy mba hahita indray ny masony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia namaly i Ananiasy hoe: Tompoko, efa reko tamin’ny maro ny haben’ny ratsy nataon’izany lehilahy izany tamin’ny olonao masina tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Manana fahefana avy tamin’ny lehiben’ny mpisorona atỳ koa izy mba hamatotra izay rehetra miantso ny anaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nefa hoy ny Tompo taminy: Mandehana, fa fanaka voafidy ho fitondrana ny anarako eo anatrehan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' sy ny mpanjaka ary ny Zanak’Israely izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'fa hasehoko azy ny habetsahan’izay tsy maintsy hiaretany ho voninahitry ny anarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia lasa i Ananiasy ka niditra tao an-trano ary nametra-tanana taminy sady niteny hoe: Ry Saoly rahalahy, ny Tompo, dia Jesosy izay niseho taminao teo amin’ny lalana nalehanao, no naniraka ahy mba hahitan’ny masonao ary mba ho feno ny Fanahy Masina ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Niaraka tamin’izay dia nisy zavatra toy ny kiran’ny hazandrano niala avy tamin’ny masony dia nahita indray izy ka nitsangana ary natao batisa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: dia nisakafo izy ka natanjaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanomboka nitory an’i Kristy i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nitoetra andro vitsivitsy teo amin’ny mpianatra tany Damaskosy i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary niaraka tamin’izay dia nitory teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' izy ka nilaza fa Jesosy no Zanak’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia talanjona izay rehetra nandre ka niteny hoe: Tsy io va ilay nandringana izay niantso izany anarana izany tany Jerosalema? Ary moa tsy ny hitondra azy ireo mifatotra ho any amin’ireo lehiben’ny mpisorona va no nahatongavany atỳ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nefa vao mainka nitombo hery i Saoly ka nandresy lahatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' izay nonina tany Damaskosy izy ary naneho marina fa Jesosy no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony afaka andro maromaro dia niray saina hamono azy ny Jiosy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'nefa fantatr’i Saoly ny teti-dratsiny. Niambina ny vavahady andro aman’alina izy ireo mba hamonoany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nefa naka azy kosa ny mpianany nony alina ka nampidina azy tamin’ny sobika avy eo amin’ny manda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Any Jerosalema i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa tonga tany Jerosalema i Saoly dia nitady hiaraka tamin’ny mpianatra; nefa natahotra azy izy rehetra ka tsy nino azy ho mpianatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa naka azy i Barnabasy ka nitondra azy ho any amin’ny Apostoly, ary nanambara tamin’izy ireo ny nahitany ny Tompo teny an-dalana sy ny nitenenany taminy ary ny nahasahiany nitory ny anaran’i Jesosy tany Damaskosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia niara-niditra sy nivoaka tamin’ireo tany Jerosalema izy sady nitory tamim-pahasahiana tamin’ny anaran’ny Tompo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ary niresaka sy niady hevitra tamin’ireo Helenista izy, nefa ireo kosa dia nitady izay hahafaty azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nony fantatry ny rahalahy izany dia noentiny nidina nankany Kaisaria izy ka nampandehaniny ho any Tarsosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia nandry fahalemana ny fiangonana manerana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' sy i Galilia ary i Samaria ka sady nandroso tsara sy nandeha tamin’ny fahatahorana ny Tompo no nihamaro noho ny fampaherezan’ny Fanahy Masina.'
- type: usfm
  marker: ms1
  children:
  - type: text
    text: ARY HATRANY AMIN’NY FARAN’NY TANY
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Any Lida i Petera: Ny fanasitranana an’i Enea'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Rehefa nandeha nitety ny faritra rehetra i Petera dia nidina ho any amin’ny olona masina nonina tany Lida koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nahita lehilahy iray teo izy, Enea no anarany, izay efa nandry nandritra ny valo taona teo am-parafara satria malemy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hoy i Petera taminy: Ry Enea, manasitrana anao Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '; mitsangàna ka amboary ny fandriananao. Dia nitsangana niaraka tamin’izay izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Rehefa nahita izany izay rehetra nonina tany Lida sy Saròna dia niverina ho amin’ny Tompo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Any Jopa i Petera: Novelomina i Tabita'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Tany Jopa dia nisy vehivavy mpianatra iray antsoina hoe Tabita, izany hoe, raha adika, Dorkasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dorkasy: Gazela, anaram-biby haingam-pandeha.'
    marker-yv: yv-n
  - type: text
    text: '; be ny asa soa sy ny fiantrana izay nataon’izany vehivavy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Narary izy tamin’izany andro izany ka maty; ary rehefa nampandroina ny faty dia napetraka tao amin’ny efitrano iray ambony rihana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Satria akaiky an’i Jopa i Lida dia ren’ny mpianatra fa efa tonga tao i Petera, ary naniraka roa lahy izy hangataka aminy hoe: Aza misalasala hankaty aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia nitsangana i Petera ka nandeha niaraka tamin’ireo. Nony tonga izy dia noentiny tany an’efitra ambony; ary ny mpitondratena rehetra nitsangana teo anilany ka nitomany sady nampiseho ny akanjo sy lamba izay nozairin’i Dorkasy fony fahavelony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Navoakan’i Petera avokoa izy rehetra, dia nandohalika izy ka nivavaka; ary nitodika nanatrika ny faty izy ka niteny hoe: Ry Tabita, mitsangàna! Dia nahirany ny masony; ary rehefa nahita an’i Petera izy dia niarina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Nanolo-tanana azy i Petera ka nanangana azy; ary rehefa niantso ny olona masina sy ny mpitondratena izy dia nanolotra azy velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fantatra manerana an’i Jopa izany ka maro no nino ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Nitoetra andro maromaro tany Jopa tao amin’i Simona mpandon-koditra i Petera.
