document_id: MAL.3,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Indro, haniraka ny irako Aho
  - type: text
    content: ary izy no hanamboatra lalana eo alohako;
  - type: text
    content: ary ny Tompo izay tadiavinareo
  - type: text
    content: dia ho avy tampoka ho eo an-tempoliny;
  - type: text
    content: ary ny Anjelin’ny fanekena
  - type: text
    content: izay irinareo dia indro, tamy Izy,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '10':
  - type: text
    content: Entonareo ny fahafolonkarena rehetra ho ao amin’ny trano fitahirizako
  - type: text
    content: mba hasian-kanina ao an-tranoko;
  - type: text
    content: izahao toetra amin’izany Aho,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: raha tsy hovohako
  - type: text
    content: ho anareo ny varavaran’ny lanitra
  - type: text
    content: ka hampidinako fitahiana manana amby ampy ho anareo.
  '11':
  - type: text
    content: Hasiako teny mafy noho ny aminareo ny valala
  - type: text
    content: ka tsy hanimba ny vokatry ny tany intsony ireny
  - type: text
    content: fa hahavanom-boa ny voalobokareo any an-tsaha,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '12':
  - type: text
    content: Ary hataon’ny firenena rehetra hoe sambatra ianareo,
  - type: text
    content: fa ho tany mahafinaritra ianareo,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: heading
    content: Ny andro hanehoan’Andriamanitra ny fahamarinany
  '13':
  - type: text
    content: Ny teninareo dia mahery mamely Ahy,
  - type: text
    content: hoy NY TOMPO.
  - type: text
    content: 'Nefa hoy ianareo:'
  - type: text
    content: Inona no resakay noentinay namely Anao?
  '14':
  - type: text
    content: 'Tamin’ny nitenenanareo hoe:'
  - type: text
    content: Zava-poana ny manompo an’Andriamanitra;
  - type: text
    content: inona moa no soa azo tamin’ny fitandremantsika izay nasainy notandremana
  - type: text
    content: sy tamin’ny nandehanantsika nitafy lamba fisaonana
  - type: text
    content: teo anatrehan’Andriamanitra, Tompon’izao rehetra izao?
  '15':
  - type: text
    content: Ankehitriny isika dia midera ny mpirehareha hoe sambatra;
  - type: text
    content: eny, ambinina izay nanao izay ratsy,
  - type: text
    content: sady naka fanahy an’Andriamanitra izy nefa afa-nandositra ihany.
  '16':
  - type: text
    content: Tamin’izany, izay natahotra NY TOMPO dia samy niresaka tamin’ny namany avy;
  - type: text
    content: ary NY TOMPO nihaino ka nandre izany;
  - type: text
    content: ary nisy boky nosoratana teo anatrehany
  - type: text
    content: ho fahatsiarovana izay matahotra NY TOMPO
  - type: text
    content: sy mihevitra ny anarany.
  '17':
  - type: text
    content: Ho rakitra soa ho Ahy ireny
  - type: text
    content: amin’ny andro izay hotendreko,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao;
  - type: text
    content: ho antra azy Aho,
  - type: text
    content: toy ny olona antra ny zanany lahy izay manompo azy.
  '18':
  - type: text
    content: Dia ho hitanareo indray
  - type: text
    content: ny tsy fitovian’ny marina sy ny meloka,
  - type: text
    content: dia ny manompo an’Andriamanitra
  - type: text
    content: sy ny tsy manompo Azy.
  '19':
  - type: text
    content: Fa indro, avy ny andro,
  - type: text
    content: mandoro toy ny fatana fandoroana izy;
  - type: text
    content: ary ny mpirehareha rehetra
  - type: text
    content: sy ny mpanao ratsy rehetra
  - type: text
    content: dia ho vodivary
  - type: text
    content: ka handoro azy ny andro izay ho avy,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: ka tsy hasiany miangana, na ny fotony na ny sampany.
  '2':
  - type: text
    content: Nefa iza no hahatanty ny andro hiaviany?
  - type: text
    content: Ary iza no hahajanona rehefa miseho Izy?
  - type: text
    content: Fa Izy dia tahaka ny afon’ny mpandrendrika
  - type: text
    content: sy ny savonin’ny mpanasa lamba.
  '20':
  - type: text
    content: Ary hiposaka aminareo izay matahotra ny anarako
  - type: text
    content: ny masoandron’ny fahamarinana,
  - type: text
    content: mitondra fanasitranana eny amin’ny tanany;
  - type: text
    content: ary hivoaka ianareo ka hifaly havanja
  - type: text
    content: toy ny zanak’omby mifahy.
  '21':
  - type: text
    content: Hohitsahinareo ny ratsy fanahy,
  - type: text
    content: fa ho lavenona ao ambanin’ny faladianareo izy
  - type: text
    content: amin’ny andro izay hotendreko,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: heading
    content: Ny fiverenan’i Elia
  '22':
  - type: text
    content: Tsarovinareo ny lalànan’i Mosesy mpanompoko,
  - type: text
    content: izay nandidiako azy tao Horeba
  - type: text
    content: ny amin’ny Israely rehetra,
  - type: text
    content: dia ny didy sy ny fitsipika.
  '23':
  - type: text
    content: Indro, haniraka
  - type: text
    content: an’i Elia mpaminany ho aminareo Aho,
  - type: text
    content: dieny tsy mbola tonga ny Andron’NY TOMPO,
  - type: text
    content: ilay lehibe sady mahatahotra.
  '24':
  - type: text
    content: Ary Izy no hampody ny fon’ny ray ho amin’ny zanaka,
  - type: text
    content: ary ny fon’ny zanaka ho amin’ny rainy,
  - type: text
    content: fandrao ho avy Aho hamely ny tany amin’ny fandringanana.
  '3':
  - type: text
    content: 'Hipetraka handrendrika sy hanadio volafotsy Izy; eny, hanadio ny taranak’i Levy Izy ary handrendrika azy toy ny fandrendrika volamena sy volafotsy, dia ho an’NY TOMPO ireny, ho mpanolotra fanatitra amim-pahamarinana. '
  '4':
  - type: text
    content: Dia ho mamin’NY TOMPO, toy ny tamin’ny andro fahiny sy toy ny tamin’ny taona taloha, ny fanatitry ny Joda sy Jerosalema.
  '5':
  - type: text
    content: Ary hanatona anareo ho fitsarana Aho
  - type: text
    content: ka ho vavolombelona
  - type: text
    content: hanameloka haingana ny mpitana ody, ny mpijangajanga,
  - type: text
    content: ny mpanao fianianana mandainga
  - type: text
    content: ary ny mpampahory ny mpikarama mbamin’ny mpitondratena sy ny kamboty,
  - type: text
    content: izay mampahory ny vahiny
  - type: text
    content: fa tsy matahotra Ahy,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '6':
  - type: text
    content: Fa Izaho TOMPO
  - type: text
    content: dia tsy miova,
  - type: text
    content: ary ianareo, ry taranak’i Jakoba,
  - type: text
    content: dia tsy fongana.
  - type: heading
    content: Miverina amin’NY TOMPO
  '7':
  - type: text
    content: Hatramin’ny andron’ny razanareo
  - type: text
    content: dia efa niala tamin’ny didiko ianareo
  - type: text
    content: ka tsy nitandrina azy.
  - type: text
    content: Miverena Amiko
  - type: text
    content: dia mba hiverina aminareo kosa Aho,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: text
    content: 'Nefa hoy ianareo:'
  - type: text
    content: Ahoana ary no ho fiverenanay?
  '8':
  - type: text
    content: Afaka handroba an’Andriamanitra va ny olona?
  - type: text
    content: Satria mandroba Ahy ianareo.
  - type: text
    content: 'Nefa hoy ianareo:'
  - type: text
    content: Amin’inona moa no androbanay Anao?
  - type: text
    content: Amin’ny fahafolonkarena sy ny anjara fanomezana.
  '9':
  - type: text
    content: Tratry ny ozona ianareo
  - type: text
    content: nefa Izaho no robainareo,
  - type: text
    content: dia ianareo firenena iray manontolo izao.
