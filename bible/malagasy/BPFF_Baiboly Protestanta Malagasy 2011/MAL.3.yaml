document_id: MAL.3
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro, haniraka ny irako Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izy no hanamboatra lalana eo alohako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Tompo izay tadiavinareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho avy tampoka ho eo an-tempoliny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Anjelin’ny fanekena
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay irinareo dia indro, tamy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nefa iza no hahatanty ny andro hiaviany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no hahajanona rehefa miseho Izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izy dia tahaka ny afon’ny mpandrendrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny savonin’ny mpanasa lamba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hipetraka handrendrika sy hanadio volafotsy Izy; eny, hanadio ny taranak’i Levy Izy ary handrendrika azy toy ny fandrendrika volamena sy volafotsy, dia ho an’NY TOMPO ireny, ho mpanolotra fanatitra amim-pahamarinana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia ho mamin’NY TOMPO, toy ny tamin’ny andro fahiny sy toy ny tamin’ny taona taloha, ny fanatitry ny Joda sy Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary hanatona anareo ho fitsarana Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho vavolombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanameloka haingana ny mpitana ody, ny mpijangajanga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpanao fianianana mandainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpampahory ny mpikarama mbamin’ny mpitondratena sy ny kamboty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mampahory ny vahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy matahotra Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa Izaho TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy miova,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ianareo, ry taranak’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy fongana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miverina amin’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hatramin’ny andron’ny razanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa niala tamin’ny didiko ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nitandrina azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miverena Amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mba hiverina aminareo kosa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa hoy ianareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahoana ary no ho fiverenanay?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Afaka handroba an’Andriamanitra va ny olona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria mandroba Ahy ianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa hoy ianareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’inona moa no androbanay Anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny fahafolonkarena sy ny anjara fanomezana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tratry ny ozona ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa Izaho no robainareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo firenena iray manontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Entonareo ny fahafolonkarena rehetra ho ao amin’ny trano fitahirizako
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hasian-kanina ao an-tranoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izahao toetra amin’izany Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy hovohako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho anareo ny varavaran’ny lanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampidinako fitahiana manana amby ampy ho anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hasiako teny mafy noho ny aminareo ny valala
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hanimba ny vokatry ny tany intsony ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hahavanom-boa ny voalobokareo any an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary hataon’ny firenena rehetra hoe sambatra ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho tany mahafinaritra ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andro hanehoan’Andriamanitra ny fahamarinany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny teninareo dia mahery mamely Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa hoy ianareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no resakay noentinay namely Anao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tamin’ny nitenenanareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zava-poana ny manompo an’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: inona moa no soa azo tamin’ny fitandremantsika izay nasainy notandremana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tamin’ny nandehanantsika nitafy lamba fisaonana
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo anatrehan’Andriamanitra, Tompon’izao rehetra izao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ankehitriny isika dia midera ny mpirehareha hoe sambatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ambinina izay nanao izay ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady naka fanahy an’Andriamanitra izy nefa afa-nandositra ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tamin’izany, izay natahotra NY TOMPO dia samy niresaka tamin’ny namany avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary NY TOMPO nihaino ka nandre izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nisy boky nosoratana teo anatrehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fahatsiarovana izay matahotra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mihevitra ny anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho rakitra soa ho Ahy ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro izay hotendreko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho antra azy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny olona antra ny zanany lahy izay manompo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia ho hitanareo indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tsy fitovian’ny marina sy ny meloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny manompo an’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tsy manompo Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa indro, avy ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandoro toy ny fatana fandoroana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpirehareha rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mpanao ratsy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho vodivary
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handoro azy ny andro izay ho avy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hasiany miangana, na ny fotony na ny sampany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary hiposaka aminareo izay matahotra ny anarako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny masoandron’ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitondra fanasitranana eny amin’ny tanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hivoaka ianareo ka hifaly havanja
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny zanak’omby mifahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hohitsahinareo ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho lavenona ao ambanin’ny faladianareo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro izay hotendreko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiverenan’i Elia
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsarovinareo ny lalànan’i Mosesy mpanompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nandidiako azy tao Horeba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny amin’ny Israely rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny didy sy ny fitsipika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Indro, haniraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: an’i Elia mpaminany ho aminareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dieny tsy mbola tonga ny Andron’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay lehibe sady mahatahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary Izy no hampody ny fon’ny ray ho amin’ny zanaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fon’ny zanaka ho amin’ny rainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao ho avy Aho hamely ny tany amin’ny fandringanana.
