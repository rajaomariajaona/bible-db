document_id: PSA.59,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Afaho amin’ny fahavaloko aho
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-tashet. Miktama nataon’i Davida, fony i Saoly nandefa iraka hiambina ny trano ka hamono azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaho amin’ny fahavaloko aho, Andriamanitro ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: asondroty eo amin’ny avo aho mba tsy ho azon’izay mikomy amiko!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra izay mamindra fo amiko no hialoha ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hataon’Andriamanitra faly mijery ny amin’ny fahavaloko aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza vonoinao izy, fandrao hanadino izany ny fireneko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampirenireneo amin’ny herinao izy ka aripaho, ry Tompo, ampinganay, ô.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahotan’ny vavany dia ny tenin’ny molony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho voasambotry ny fireharehany ihany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, noho ny ozona sy ny lainga teneniny!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aringano an-katezerana izy, aringano mba tsy hisy intsony izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho fantany fa Andriamanitra no manapaka eo amin’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hatramin’ny faran’ny tany. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverina ireny nony hariva ka mierona tahaka ny alika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mandehandeha manerana ny tanàna.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miriorio mitady hanina izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy voky izy dia any ihany mandritra ny alina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho kosa dia hihira ny herinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hihoby ny famindramponao nony maraina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria fiarovana avo ho ahy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fandosirako amin’ny andro fahoriana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Heriko ô, Ianao no hankalazaiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Andriamanitra no fiarovana avo ho ahy, dia Andriamanitra izay mamindra fo amiko.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaho amin’ny mpanao ratsy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vonjeo ho afaka amin’ny mpandatsa-dra!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa indro, manao vela-pandrika hahazo ny aiko izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misy olo-mahery mioko hamely ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy fahadisoako ary tsy fahotako, TOMPO ô!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy heloko, nefa miomana hamely ahy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa mifohaza hitsena ahy ka jereo!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Ianao, RY TOMPO, Andriamanitra Tompon’izao rehetra izao, Andriamanitry ny Israely ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifohaza hitsara ny firenena rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aza mamindra fo amin’izay mpivadika sady ratsy fanahy! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverina ireny nony ny hariva ka mierona tahaka ny alika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mandehandeha manerana ny tanàna.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, mirezadrezatra amin’ny vavany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sabatra no eo amin’ny molony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa iza, hono, no handre?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo Ianao, TOMPO ô, hihomehy azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao haneso ny firenena rehetra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny herin’ireny dia hiandry Anao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Andriamanitra no fiarovana avo ho ahy.
