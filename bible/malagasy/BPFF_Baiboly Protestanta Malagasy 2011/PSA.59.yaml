document_id: PSA.59
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Afaho amin’ny fahavaloko aho
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Al-tashet. Miktama nataon’i Davida, fony i Saoly nandefa iraka hiambina ny trano ka hamono azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Afaho amin’ny fahavaloko aho, Andriamanitro ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: asondroty eo amin’ny avo aho mba tsy ho azon’izay mikomy amiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Afaho amin’ny mpanao ratsy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vonjeo ho afaka amin’ny mpandatsa-dra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa indro, manao vela-pandrika hahazo ny aiko izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy olo-mahery mioko hamely ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy fahadisoako ary tsy fahotako, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy misy heloko, nefa miomana hamely ahy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa mifohaza hitsena ahy ka jereo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary Ianao, RY TOMPO, Andriamanitra Tompon’izao rehetra izao, Andriamanitry ny Israely ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifohaza hitsara ny firenena rehetra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Aza mamindra fo amin’izay mpivadika sady ratsy fanahy! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miverina ireny nony ny hariva ka mierona tahaka ny alika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mandehandeha manerana ny tanàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro, mirezadrezatra amin’ny vavany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sabatra no eo amin’ny molony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza, hono, no handre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Kanjo Ianao, TOMPO ô, hihomehy azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao haneso ny firenena rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho ny herin’ireny dia hiandry Anao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Andriamanitra no fiarovana avo ho ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Andriamanitra izay mamindra fo amiko no hialoha ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hataon’Andriamanitra faly mijery ny amin’ny fahavaloko aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aza vonoinao izy, fandrao hanadino izany ny fireneko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampirenireneo amin’ny herinao izy ka aripaho, ry Tompo, ampinganay, ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fahotan’ny vavany dia ny tenin’ny molony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho voasambotry ny fireharehany ihany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, noho ny ozona sy ny lainga teneniny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aringano an-katezerana izy, aringano mba tsy hisy intsony izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho fantany fa Andriamanitra no manapaka eo amin’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hatramin’ny faran’ny tany. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Miverina ireny nony hariva ka mierona tahaka ny alika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mandehandeha manerana ny tanàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Miriorio mitady hanina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy voky izy dia any ihany mandritra ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa izaho kosa dia hihira ny herinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihoby ny famindramponao nony maraina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria fiarovana avo ho ahy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fandosirako amin’ny andro fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ry Heriko ô, Ianao no hankalazaiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Andriamanitra no fiarovana avo ho ahy, dia Andriamanitra izay mamindra fo amiko.
