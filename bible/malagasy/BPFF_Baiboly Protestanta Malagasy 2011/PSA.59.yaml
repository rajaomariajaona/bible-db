document_id: PSA.59,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Afaho amin’ny fahavaloko aho
  - type: text
    content: Ho an’ny mpiventy hira. Al-tashet. Miktama nataon’i Davida, fony i Saoly nandefa iraka hiambina ny trano ka hamono azy.
  - type: text
    content: Afaho amin’ny fahavaloko aho, Andriamanitro ô;
  - type: text
    content: asondroty eo amin’ny avo aho mba tsy ho azon’izay mikomy amiko!
  '10':
  - type: text
    content: Andriamanitra izay mamindra fo amiko no hialoha ahy;
  - type: text
    content: hataon’Andriamanitra faly mijery ny amin’ny fahavaloko aho.
  '11':
  - type: text
    content: Aza vonoinao izy, fandrao hanadino izany ny fireneko;
  - type: text
    content: ampirenireneo amin’ny herinao izy ka aripaho, ry Tompo, ampinganay, ô.
  '12':
  - type: text
    content: Ny fahotan’ny vavany dia ny tenin’ny molony;
  - type: text
    content: aoka ho voasambotry ny fireharehany ihany izy;
  - type: text
    content: eny, noho ny ozona sy ny lainga teneniny!
  '13':
  - type: text
    content: Aringano an-katezerana izy, aringano mba tsy hisy intsony izy!
  - type: text
    content: Aoka ho fantany fa Andriamanitra no manapaka eo amin’i Jakoba
  - type: text
    content: 'ka hatramin’ny faran’ny tany. '
  - type: text
    content: Fiatoana.
  '14':
  - type: text
    content: Miverina ireny nony hariva ka mierona tahaka ny alika
  - type: text
    content: sady mandehandeha manerana ny tanàna.
  '15':
  - type: text
    content: Miriorio mitady hanina izy;
  - type: text
    content: raha tsy voky izy dia any ihany mandritra ny alina.
  '16':
  - type: text
    content: Fa izaho kosa dia hihira ny herinao
  - type: text
    content: ary hihoby ny famindramponao nony maraina,
  - type: text
    content: satria fiarovana avo ho ahy Ianao
  - type: text
    content: ary fandosirako amin’ny andro fahoriana.
  '17':
  - type: text
    content: Ry Heriko ô, Ianao no hankalazaiko;
  - type: text
    content: fa Andriamanitra no fiarovana avo ho ahy, dia Andriamanitra izay mamindra fo amiko.
  '2':
  - type: text
    content: Afaho amin’ny mpanao ratsy aho
  - type: text
    content: ary vonjeo ho afaka amin’ny mpandatsa-dra!
  '3':
  - type: text
    content: Fa indro, manao vela-pandrika hahazo ny aiko izy;
  - type: text
    content: misy olo-mahery mioko hamely ahy,
  - type: text
    content: nefa tsy fahadisoako ary tsy fahotako, TOMPO ô!
  '4':
  - type: text
    content: Tsy misy heloko, nefa miomana hamely ahy izy;
  - type: text
    content: koa mifohaza hitsena ahy ka jereo!
  '5':
  - type: text
    content: Ary Ianao, RY TOMPO, Andriamanitra Tompon’izao rehetra izao, Andriamanitry ny Israely ô,
  - type: text
    content: mifohaza hitsara ny firenena rehetra!
  - type: text
    content: 'Aza mamindra fo amin’izay mpivadika sady ratsy fanahy! '
  - type: text
    content: Fiatoana.
  '6':
  - type: text
    content: Miverina ireny nony ny hariva ka mierona tahaka ny alika
  - type: text
    content: sady mandehandeha manerana ny tanàna.
  '7':
  - type: text
    content: Indro, mirezadrezatra amin’ny vavany izy;
  - type: text
    content: sabatra no eo amin’ny molony;
  - type: text
    content: fa iza, hono, no handre?
  '8':
  - type: text
    content: Kanjo Ianao, TOMPO ô, hihomehy azy;
  - type: text
    content: Ianao haneso ny firenena rehetra.
  '9':
  - type: text
    content: Noho ny herin’ireny dia hiandry Anao aho;
  - type: text
    content: fa Andriamanitra no fiarovana avo ho ahy.
