document_id: ACT.19,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tany Efesosy i Paoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Raha mbola tany Korinto i Apolosy dia nitety ny faritany ambony kosa i Paoly ka tonga tany Efesosy; nahita mpianatra sasany teo izy '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Naharitra roa taona ngarangidina izany ka nandre ny tenin’ny Tompo izay rehetra nonina tany Azia, na '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' na Grika.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo zanakalahin’i Skeva
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny tanan’i Paoly no nanaovan’Andriamanitra zava-dehibe maro mampitolagaga, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: koa na dia ny mosara sy ny aron’akanjo izay nikasika ny tenany aza no noentina hatao amin’ny marary dia sitrana ny aretiny ary niala ny fanahy ratsy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nisy Jiosy sasany, mpivezivezy mamoaka fanahy ratsy, izay ninia nanonona ny anaran’i Jesosy Tompo koa teo ambonin’ny manana fanahy ratsy ka niteny hoe: Mampianiana anareo amin’i Jesosy izay torin’i Paoly aho. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nisy fito mirahalahy, zanak’i Skeva, lehiben’ny mpisorona jiosy iray nanao izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ny fanahy ratsy dia namaly azy hoe: Fantatro Jesosy, ary fantatro koa i Paoly; fa mba iza kosa moa ianareo? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ilay lehilahy nanana ny fanahy ratsy dia niantoraka tamin’ireo ary nahery izy ka naharesy azy roa lahy, dia nandositra niala tamin’izany trano izany ireo sady nitanjaka no voaratra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia fantatry ny Jiosy sy ny Grika rehetra izay nonina tany Efesosy izany; dia raiki-tahotra ny olona rehetra ka nankalaza ny anaran’i Jesosy Tompo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Maro tamin’ireo izay nino no tonga ka niaiky sy nilaza ny fanao ratsiny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Maro koa ny mpitahiry ody no nanangona ny bokiny ka nandoro azy teo imason’ny olona rehetra; ary nony nosandaina ny vidiny dia tokony ho volafotsy dimy alina izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka niteny tamin’izy ireo hoe: Efa noraisinareo va ny Fanahy Masina fony vao nino ianareo? Fa hoy ireo taminy: Tsy mbola renay akory ny amin’izany Fanahy Masina izany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Araka izany dia nitombo sy nandroso ny teny noho ny herin’ny Tompo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny korontana tany Efesosy sy ny fialan’i Paoly
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Rehefa vita izany rehetra izany dia nikasa tao am-pony handeha hitety an’i Makedonia sy i Akaia aloha i Paoly vao hankany Jerosalema ka hoy izy: Rehefa tonga any aho dia tsy maintsy mahita an’i Roma koa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary ny roa lahy tamin’izay nanompo azy, dia i Timoty sy i Erasto, no nirahiny nankany Makedonia; fa izy kosa dia mbola nijanona fotoana fohy tany Azia.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tamin’izany andro izany dia nisy tabataba be ihany ny amin’ny fampianarana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nisy lehilahy iray antsoina hoe Demetrio, mpanefy volafotsy, izay nanao sarin’ny tempolin’i Diana tamin’ny volafotsy ka nampahazo harena be ny mpanefy; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'nangoniny niaraka tamin’ny mpanao taozavatra hafa ireny ka nilazany hoe: Tompokolahy, fantatrareo fa amin’izao taozavatra izao no ahazoantsika harena. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary hitanareo sy renareo fa tsy eto Efesosy ihany, fa saika manerana an’i Azia rehetra dia mitaona olona betsaka izany Paoly izany ka mampivily ny sain’izy ireo hoe: Tsy Andriamanitra izay zavatra nataon-tanana. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Koa tsy izao raharahantsika izao ihany no ahina ho ratsy laza, fa ny tempolin’i Diana, andriamani-bavy lehibe, dia hatao tsinontsinona koa aza, koa ho afa-boninahitra ilay ivavahan’i Azia rehetra sy izao tontolo izao.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Rehefa nandre izany izy ireo dia tezitra mafy ka niantso hoe: Lehibe i Dianan’ny Efesiana! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Nanerana ny tanàna ny tabataba ka rehefa nisarika an’i Gaio sy i Aristarko, lehilahy makedoniana izay niara-dia tamin’i Paoly, izy, dia niray saina niriotra ho ao an-trano filalaovana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy i Paoly: Ho amin’inona ary no nanaovana batisa anareo? Dia hoy ireo: Ho amin’ny batisan’i Jaona. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia vonona hiseho teo amin’ny vahoaka i Paoly, fa tsy navelan’ny mpianatra. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary ny mpitondra sasany tany Azia, izay sakaizany aza, dia nampitondra teny nananatra azy mba tsy ho sahy hiditra ao amin’ny trano filalaovana. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Fa ny sasany dia niantso zavatra iray, ary ny sasany kosa dia zavatra hafa; koa nifanaritaka ny olona vory, ary ny ankamaroany dia tsy nahalala akory izay anton’ny nivoriany teo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary teo amin’ny vahoaka dia nisy nampahafantatra ny zava-nitranga tamin’i Aleksandra izay nasesiky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' handroso. Dia nibaiko tanana i Aleksandra fa ta handaha-teny hanazava tamin’ny olona. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Nony fantatry ny olona anefa fa Jiosy izy dia niredona niantsoantso tokony ho nandritra ny adiny roa izy rehetra hoe: Lehibe i Dianan’ny Efesiana!'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary ny mpitahiry ny didy dia nampangina ny olona ka niteny hoe: Ry lehilahy efesiana, iza no olona tsy mahalala fa ny tanànan’ny Efesiana no mpitahiry an’i Diana lehibe sy ny sarin-javatra izay latsaka avy tamin’i Jopitera? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary satria tsy azo toherina izany dia tokony hangina ianareo ka tsy hanao na inona na inona ankamehana. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fa noentinareo etỳ ireo lehilahy ireo izay tsy nandroba '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ', na niteny ratsy ny andriamanitsika. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Koa raha manan-teny hifamaliana amin’olona i Demetrio sy ny mpanefy izay momba azy, aoka hifandahatra izy, fa misy ihany ny andro hitsarana, ary ao ihany koa ireo governora. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Fa raha mitady zavatra hafa kosa ianareo dia hotsaraina amin’izay fivoriana voatendrin’ny lalàna. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa hoy i Paoly: I Jaona dia nanao ny batisan’ny fibebahana ka nilaza tamin’ny olona hino Izay ho avy manaraka azy, dia Jesosy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Sao lahy hampangaina noho izao tabataba tsy misy antony izay niseho androany izao isika sady tsy hitantsika izay hanazavana izao fisavorovoroana izao. Rehefa nilaza izany izy dia nampirava ny olona vory teo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Rehefa nahare izany ireo dia natao batisa ho amin’ny anaran’i Jesosy Tompo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Rehefa nametrahan’i Paoly tanana izy dia tonga taminy ny Fanahy Masina ary niteny tamin’ny fiteny tsy fantatra izy sady naminany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary tokony ho roa amby folo lahy no isan’izy rehetra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nankany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' i Paoly ka niteny tamin’ny fahasahiana, niady hevitra nandritra ny telo volana tao izy ka nampanaiky ny amin’ny fanjakan’Andriamanitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nefa raha nikiribiby ny sasany ka tsy nanaiky fa niteny ratsy izany fampianarana izany teo imason’ny olona maro dia niala teo amin’ireo izy ka nitondra ny mpianatra nitokana ary niady hevitra isanandro tao amin’ny trano fampianaran’i Tirano. '
