document_id: MRK.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niakaran’i Jesosy tany Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 21.1-9; Lio 19.28-40; Jao 12.12-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa nanakaiky an’i Jerosalema ho any Betifaga sy Betania, teo akaikin’ny tendrombohitra Oliva izy ireo, dia naniraka roa lahy tamin’ny mpianany Jesosy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka niteny tamin’izy ireo hoe: Mankanesa amin’iroa vohitra tandrifinareo iroa; ary raha vao miditra ao ianareo, avy hatrany dia hahita zana-boriky iray mifatotra izay mbola tsy nitaingenan’olona; vahao izy ka ento etỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha misy olona miteny aminareo hoe: Nahoana ianareo no manao izao? Dia lazao hoe: Misy ilàn’ny Tompo azy. Dia havelany hoentina etỳ miaraka amin’izay izy io.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nandeha izy ireo ka nahita zana-boriky nifatotra teo alatrano anilan’ny varavarana teo an-dalana, dia novahany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny olona sasany teo dia niteny tamin’izy ireo hoe: Nahoana no vahanareo ny zana-boriky? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nilaza taminy araka izay nolazain’i Jesosy taminy izy ireo ka navelan’ny olona handeha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia noentiny teo amin’i Jesosy ilay zana-boriky ka nataon’ireo teo amboniny ny lambany; dia nitaingina azy Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary maro no namelatra ny lambany teny an-dalana; ny an’ny sasany kosa dia rantsan-kazo izay notapahiny tany an-tsaha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izay nandeha teo alohany sy izay nanaraka teo aorianany dia samy niantso hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hosana
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isaorana anie izay avy amin’ny anaran’NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hotahina anie ity fanjakana izay avy ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny an’i Davida raintsika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hosana any amin’ny avo indrindra!» (Sal 118.26)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary Jesosy niditra tao Jerosalema ka nankao amin’ny tempoly; ary rehefa nijery ny zavatra rehetra manodidina Izy, sady efa hariva ny andro tamin’izay, dia niala Izy mbamin’ny roa amby folo lahy ka nankany Betania.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay aviavy tsy namoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 21.18-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony ampitson’iny, rehefa niala tany Betania Jesosy, dia nahatsiaro noana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nahatsinjo hazo aviavy mandravina iray terỳ lavidavitra Izy dia nankeo, sao mba hahita voany eo aminy; kanjo nony tonga teo Izy dia tsy nahita na inona na inona afa-tsy ravina ihany, fa mbola tsy fotoana famoazan’ny aviavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoy Jesosy taminy: Aza misy mihinana voa avy aminao intsony mandrakizay! Ary nahare izany ny mpianany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandroahan’i Jesosy ireo mpivarotra tao amin’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 21.12-17; Lio 19.45-46; ampit. Jao 2.13-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tonga tany Jerosalema izy ireo dia niditra tao amin’ny tempoly Jesosy ka nandroaka izay nivarotra sy izay nividy tao amin’ny tempoly sady nanjera ny latabatry ny mpanakalo vola sy ny sezan’ny mpivarotra voromailala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tsy navelany hisy olona hitondra fanaka handeha hamakivaky ny kianjan’ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nampianatra Izy ka niteny tamin’ireo hoe: Tsy izao va no voasoratra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny tranoko dia hatao hoe trano fivavahana ho an’ny firenena rehetra»? (Isa 56.7)
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ianareo kosa dia nanao azy ho «zohy fieren’ny jiolahy» (Jer 7.11).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa nahare izany ireo lehiben’ny mpisorona mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' dia nitady izay hamonoany Azy; saingy natahotra Azy izy ireo, satria ny vahoaka rehetra dia talanjona noho ny fampianarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary isan-kariva dia niala nankany ivelan’ny tanàna Jesosy sy ny mpianany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Momba ilay aviavy: Ny finoana sy ny vavaka'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 21.20-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nony maraina ny andro, raha nandalo izy ireo, dia hitany fa efa nalazo hatramin’ny fotony ilay hazo aviavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nahatsiahy i Petera ka niteny Taminy hoe: Raby ô, indro fa efa malazo ilay hazo aviavy nozoninao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy Jesosy tamin’ny mpianatra: Manàna finoana an’Andriamanitra ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Na iza na iza no hilaza amin’ity tendrombohitra ity hoe: Mifindrà ka mianjerà any anaty ranomasina, ary tsy miahanahana ao am-pony fa mino fa ho tonga ny zavatra lazainy, dia ho azony izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa lazaiko aminareo: Na inona na inona tononinareo amin’ny fivavahana sy angatahinareo dia minoa fa efa nandray ianareo ary ho azonareo izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha mitsangana mivavaka ianareo ka misy olona anananareo alahelo dia mamelà ny helony mba havelan’ny Rainareo izay any an-danitra kosa ny helokareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa raha tsy mamela heloka ianareo dia tsy hamela ny helokareo kosa ny Rainareo izay any an-danitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanontaniana ny amin’ny fahefan’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 21.23-27; Lio 20.1-8
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia tonga tany Jerosalema indray izy ireo; ary raha nitsangantsangana tao amin’ny tempoly Jesosy dia nanatona Azy ireo lehiben’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' ary ny loholona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ka niteny Taminy hoe: Fahefana manao ahoana no anaovanao izao zavatra izao? Ary iza no nanome Anao izany fahefana izany ka anaovanao izao zavatra izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa hoy Jesosy tamin’izy ireo: Hanontany anareo zavatra tokana kosa Aho ka valio dia holazaiko aminareo izay fahefana anaovako izao zavatra izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny batisan’i Jaona, avy tany an-danitra va sa avy tamin’ny olona? Valionareo Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary izy ireo nikaon-doha ka niteny hoe: Raha lazaintsika mantsy hoe: Avy tany an-danitra, dia hataony hoe: Nahoana ary no tsy nino azy ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa holazaintsika va hoe: Avy tamin’ny olona va? Natahotra ny olona izy ireo, satria neken’ny olona rehetra fa mpaminany tokoa i Jaona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia namaly an’i Jesosy izy ireo hoe: Tsy fantatray. Hoy Jesosy taminy: Izaho koa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao.'
