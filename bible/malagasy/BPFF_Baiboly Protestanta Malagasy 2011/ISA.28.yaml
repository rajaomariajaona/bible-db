document_id: ISA.28,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tafiotra nandrava an’i Samaria
  - type: text
    content: Lozan’ny satroboninahitra, izay reharehan’ny mpimamo ao Efraima,
  - type: text
    content: sy ny voninkazo mihamalazo amin’ny firavany tsara tarehy,
  - type: text
    content: izay eo an-dohan’ny lohasaha lonaky
  - type: text
    content: ny olona mamon-divay.
  '10':
  - type: text
    content: Fa didy anampy didy, didy anampy didy;
  - type: text
    content: fitsipika anampy fitsipika, fitsipika anampy fitsipika;
  - type: text
    content: ampiana teny kely etsy, ampiana teny kely eroa.
  '11':
  - type: text
    content: Hay, amin’ny molotra miambakavaka
  - type: text
    content: sy amin’ny teny vahiny
  - type: text
    content: no hitenenany amin’ity firenena ity.
  '12':
  - type: text
    content: 'Izy ilay nilaza taminy hoe: Izao no fitsaharana!'
  - type: text
    content: Ampitsaharo ny reraka!
  - type: text
    content: Izao no fotoana hialan-tsasatra!
  - type: text
    content: Nefa tsy nety nihaino ireo.
  '13':
  - type: text
    content: 'Ary ho azy ireo, ny tenin’NY TOMPO dia hoe:'
  - type: text
    content: Didy anampy didy aminy tokoa; eny, didy anampy didy,
  - type: text
    content: fitsipika anampy fitsipika, fitsipika anampy fitsipika;
  - type: text
    content: ampiana teny kely etsy, ampiana teny kely eroa,
  - type: text
    content: dia ho solafaka izy rehefa mandeha ka ho torotoro
  - type: text
    content: sy ho voafandrika ary ho voasambotra.
  - type: heading
    content: Ny vato fehizoro
  '14':
  - type: text
    content: Koa mihainoa ny tenin’NY TOMPO ianareo, ry mpaniratsira,
  - type: text
    content: ianareo izay mitondra ity firenena eto Jerosalema ity!
  '15':
  - type: text
    content: 'Satria miteny ianareo hoe: Efa nanao fanekena tamin’ny fahafatesana izahay'
  - type: text
    content: 'ary efa nanao fifanarahana tamin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ;
  - type: text
    content: koa na dia ho avy aza ny loza manafotra
  - type: text
    content: dia tsy hihatra aminay izany,
  - type: text
    content: satria ny lainga no nataonay ho fialofana
  - type: text
    content: ary ny fitaka no ho fierena.
  '16':
  - type: text
    content: 'Noho izany dia izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: 'Indro Izaho no nametraka vato ao '
  - type: text
    content: Ziona
  - type: text
    content: ','
  - type: text
    content: vato voazaha toetra, vato tsara izay fehizoro voaorina ho fanorenana mafy
  - type: text
    content: ka tsy mba ho taitra izay mitoky aminy.
  '17':
  - type: text
    content: Ny fitsarana marina no hataoko ho fitsipika,
  - type: text
    content: ary ny fahamarinana no ho fandrefesana marindrano;
  - type: text
    content: hopaohin’ny havandra ny lainga fialofana,
  - type: text
    content: ary hindaosin’ny rano ny fierena.
  '18':
  - type: text
    content: Hofoanana ny fifanekenareo amin’ny fahafatesana
  - type: text
    content: ary tsy haharitra ny fifanarahanareo amin’ny fitoeran’ny maty;
  - type: text
    content: rehefa ho avy ny loza manafotra
  - type: text
    content: dia hohitsakitsahany ianareo.
  '19':
  - type: text
    content: Ary na oviana na oviana no hiaviany dia hahatratra anareo izany;
  - type: text
    content: fa isa-maraina no hiaviany, amin’ny andro sy amin’ny alina koa;
  - type: text
    content: ary ny vokatry ny fandrenesana izany dia horohoro lehibe.
  '2':
  - type: text
    content: Indro ny Tompo manana izay mahery sy matanjaka,
  - type: text
    content: tahaka ny rivo-kavandra sy ny tafio-drivotra mandoza;
  - type: text
    content: tahaka ny fandriaky ny ranobe manafotra,
  - type: text
    content: no hanjerany azy mafy ho amin’ny tany.
  '20':
  - type: text
    content: Fa fohy loatra ny farafara ka tsy azon’ny olona iamparana;
  - type: text
    content: ary kely ny firakotra ka tsy maharakotra, raha misy te hirakotra azy.
  - type: heading
    content: Fampitandremana ireo mpamazivazy
  '21':
  - type: text
    content: Fa NY TOMPO hitsangana tahaka ny teo amin’ny tendrombohitra Perazima,
  - type: text
    content: ho tezitra tahaka ny teo amin’ny lohasahan’i Gibeona Izy
  - type: text
    content: mba hanaovany ny asany,
  - type: text
    content: dia ny asany mahagaga,
  - type: text
    content: mba hahavitany ny ataony,
  - type: text
    content: dia ny ataony izay mahatalanjona.
  '22':
  - type: text
    content: Koa aza maniratsira intsony ianareo,
  - type: text
    content: fandrao vao mainka ho mafy ny famatorana anareo.
  - type: text
    content: Fa fahafonganana no voatendry hamelezana ny tany rehetra;
  - type: text
    content: izany no reko tamin’NY TOMPO, Andriamanitra Tompon’izao rehetra izao.
  - type: heading
    content: Ohatra roa nalaina tamin’ny fambolena
  '23':
  - type: text
    content: Atongilano ny sofinareo ka henoy ny feoko!
  - type: text
    content: Tandremo ka mihainoa ny teniko!
  '24':
  - type: text
    content: Moa ny mpiasa tany va miasa mba hamafy mandrakariva?
  - type: text
    content: Miasa sy mandravona ny taniny mandrakariva va izy?
  '25':
  - type: text
    content: Fa rehefa voaravony tsara ny tany,
  - type: text
    content: moa tsy afafiny amin’izay va ny voan’ny nigela ary tsy apariakany va ny komina,
  - type: text
    content: tsy alahany mitandahatra tsara va ny varimbazaha
  - type: text
    content: sy ny varimbazaha hafa amin’ny tany voafaritra ho azy
  - type: text
    content: ary ny ampemby kosa eny an-tsisiny?
  '26':
  - type: text
    content: Andriamaniny no manoro azy izay tokony hataony;
  - type: text
    content: eny, Izy no mampianatra azy.
  '27':
  - type: text
    content: Fa tsy ny ragiragy vy no anosihosena ny nigela,
  - type: text
    content: ary tsy ny kodiaran’ny sarety no akodiadia amin’ny komina;
  - type: text
    content: fa ny nigela dia hosihosena amin’ny tsorakazo,
  - type: text
    content: ary ny komina amin’ny tehina.
  '28':
  - type: text
    content: Torotoroina ny vary hatao mofo
  - type: text
    content: fa tsy hosena tsy an-kijanona akory izany;
  - type: text
    content: raha ampandehanana ny kodiaran’ny sarety sy hosen’ny soavaly izy
  - type: text
    content: dia tsy ho torotoro.
  '29':
  - type: text
    content: Izany koa dia avy amin’Andriamanitra, Tompon’izao rehetra izao;
  - type: text
    content: fa mahagaga amin’ny fikasany Izy,
  - type: text
    content: ary mahatalanjona amin’ny fahendreny!
  '3':
  - type: text
    content: Dia hohitsahin’ny tongotra
  - type: text
    content: ny satroboninahitra izay reharehan’ny mpimamo ao Efraima;
  '4':
  - type: text
    content: ary ny voninkazo mihamalazo amin’ny firavany tsara tarehy
  - type: text
    content: izay eo an-dohan’ny lohasaha lonaka,
  - type: text
    content: dia ho tahaka ny voan’aviavy masaka alohan’ny fotoana, alohan’ny fahavaratra,
  - type: text
    content: koa izay mahita azy dia mandray,
  - type: text
    content: ary raha vao raisiny dia arapany.
  '5':
  - type: text
    content: Amin’izany andro izany dia Andriamanitra, Tompon’izao rehetra izao
  - type: text
    content: no ho satroboninahitra tsara tarehy
  - type: text
    content: sy ho fehiloha firavaka ho an’ny olony sisa.
  '6':
  - type: text
    content: Ho fanahy fitsarana ho an’izay mipetraka eo amin’ny fitsarana Izy,
  - type: text
    content: sady ho hery ho an’izay mampihemotra ny ady izay tonga eo am-bavahady.
  - type: heading
    content: Ireo mpimamo maneso ny mpaminany
  '7':
  - type: text
    content: Nefa izy ireo dia fanimpanina azon’ny divay,
  - type: text
    content: ary mivembena azon’ny toaka;
  - type: text
    content: fanimpanina azon’ny toaka ny mpisorona sy ny mpaminany;
  - type: text
    content: resin’ny divay ireo,
  - type: text
    content: mivembena azon’ny toaka;
  - type: text
    content: fanimpanina amin’ny fahitana izy
  - type: text
    content: ary miroaroa saina ny amin’ny didim-pitsarana avoakany.
  '8':
  - type: text
    content: Feno loa sy loto ny latabatra rehetra
  - type: text
    content: ka tsy misy madio hitoerana intsony.
  '9':
  - type: text
    content: Iza no hampianariny fahalalana?
  - type: text
    content: Ary iza no hanazavany lesona?
  - type: text
    content: Zaza vao nosaraha-nono va?
  - type: text
    content: Zaza vao nitsaha-ninono va?
