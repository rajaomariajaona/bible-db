document_id: ISA.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tafiotra nandrava an’i Samaria
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan’ny satroboninahitra, izay reharehan’ny mpimamo ao Efraima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny voninkazo mihamalazo amin’ny firavany tsara tarehy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay eo an-dohan’ny lohasaha lonaky
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona mamon-divay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Indro ny Tompo manana izay mahery sy matanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny rivo-kavandra sy ny tafio-drivotra mandoza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fandriaky ny ranobe manafotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hanjerany azy mafy ho amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia hohitsahin’ny tongotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny satroboninahitra izay reharehan’ny mpimamo ao Efraima;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ary ny voninkazo mihamalazo amin’ny firavany tsara tarehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay eo an-dohan’ny lohasaha lonaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tahaka ny voan’aviavy masaka alohan’ny fotoana, alohan’ny fahavaratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa izay mahita azy dia mandray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha vao raisiny dia arapany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Amin’izany andro izany dia Andriamanitra, Tompon’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ho satroboninahitra tsara tarehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho fehiloha firavaka ho an’ny olony sisa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ho fanahy fitsarana ho an’izay mipetraka eo amin’ny fitsarana Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ho hery ho an’izay mampihemotra ny ady izay tonga eo am-bavahady.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpimamo maneso ny mpaminany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nefa izy ireo dia fanimpanina azon’ny divay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mivembena azon’ny toaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanimpanina azon’ny toaka ny mpisorona sy ny mpaminany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: resin’ny divay ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mivembena azon’ny toaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanimpanina amin’ny fahitana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miroaroa saina ny amin’ny didim-pitsarana avoakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Feno loa sy loto ny latabatra rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy madio hitoerana intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Iza no hampianariny fahalalana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no hanazavany lesona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zaza vao nosaraha-nono va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zaza vao nitsaha-ninono va?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa didy anampy didy, didy anampy didy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fitsipika anampy fitsipika, fitsipika anampy fitsipika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampiana teny kely etsy, ampiana teny kely eroa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hay, amin’ny molotra miambakavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny teny vahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hitenenany amin’ity firenena ity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izy ilay nilaza taminy hoe: Izao no fitsaharana!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampitsaharo ny reraka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izao no fotoana hialan-tsasatra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy nety nihaino ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ho azy ireo, ny tenin’NY TOMPO dia hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Didy anampy didy aminy tokoa; eny, didy anampy didy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fitsipika anampy fitsipika, fitsipika anampy fitsipika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampiana teny kely etsy, ampiana teny kely eroa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho solafaka izy rehefa mandeha ka ho torotoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho voafandrika ary ho voasambotra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vato fehizoro
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa mihainoa ny tenin’NY TOMPO ianareo, ry mpaniratsira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo izay mitondra ity firenena eto Jerosalema ity!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Satria miteny ianareo hoe: Efa nanao fanekena tamin’ny fahafatesana izahay'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary efa nanao fifanarahana tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa na dia ho avy aza ny loza manafotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hihatra aminay izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny lainga no nataonay ho fialofana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fitaka no ho fierena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Noho izany dia izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indro Izaho no nametraka vato ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: vato voazaha toetra, vato tsara izay fehizoro voaorina ho fanorenana mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba ho taitra izay mitoky aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fitsarana marina no hataoko ho fitsipika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahamarinana no ho fandrefesana marindrano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hopaohin’ny havandra ny lainga fialofana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hindaosin’ny rano ny fierena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hofoanana ny fifanekenareo amin’ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy haharitra ny fifanarahanareo amin’ny fitoeran’ny maty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa ho avy ny loza manafotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hohitsakitsahany ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary na oviana na oviana no hiaviany dia hahatratra anareo izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa isa-maraina no hiaviany, amin’ny andro sy amin’ny alina koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vokatry ny fandrenesana izany dia horohoro lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa fohy loatra ny farafara ka tsy azon’ny olona iamparana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary kely ny firakotra ka tsy maharakotra, raha misy te hirakotra azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ireo mpamazivazy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa NY TOMPO hitsangana tahaka ny teo amin’ny tendrombohitra Perazima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tezitra tahaka ny teo amin’ny lohasahan’i Gibeona Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanaovany ny asany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny asany mahagaga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahavitany ny ataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny ataony izay mahatalanjona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Koa aza maniratsira intsony ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao vao mainka ho mafy ny famatorana anareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fahafonganana no voatendry hamelezana ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany no reko tamin’NY TOMPO, Andriamanitra Tompon’izao rehetra izao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ohatra roa nalaina tamin’ny fambolena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Atongilano ny sofinareo ka henoy ny feoko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tandremo ka mihainoa ny teniko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moa ny mpiasa tany va miasa mba hamafy mandrakariva?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miasa sy mandravona ny taniny mandrakariva va izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa rehefa voaravony tsara ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moa tsy afafiny amin’izay va ny voan’ny nigela ary tsy apariakany va ny komina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy alahany mitandahatra tsara va ny varimbazaha
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny varimbazaha hafa amin’ny tany voafaritra ho azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ampemby kosa eny an-tsisiny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Andriamaniny no manoro azy izay tokony hataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, Izy no mampianatra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa tsy ny ragiragy vy no anosihosena ny nigela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ny kodiaran’ny sarety no akodiadia amin’ny komina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny nigela dia hosihosena amin’ny tsorakazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny komina amin’ny tehina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Torotoroina ny vary hatao mofo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hosena tsy an-kijanona akory izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha ampandehanana ny kodiaran’ny sarety sy hosen’ny soavaly izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho torotoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izany koa dia avy amin’Andriamanitra, Tompon’izao rehetra izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahagaga amin’ny fikasany Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahatalanjona amin’ny fahendreny!
