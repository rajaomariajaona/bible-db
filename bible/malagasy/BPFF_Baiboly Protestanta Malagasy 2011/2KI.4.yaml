document_id: 2KI.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Namonjy ny mpitondratena iray i Elisa
  - type: text
    content: 'Ary nisy vehivavy iray, vadin’ny '
  - type: text
    content: zanaky ny mpaminany
  - type: text
    content: ', nitaraina tamin’i Elisa hoe: Maty ny vadiko izay mpanomponao; ary ianao dia mahafantatra fa natahotra NY TOMPO ny mpanomponao; nefa tonga ny tompon-trosa haka ny zanako mirahalahy ho andevony. '
  '10':
  - type: text
    content: Miangavy anao aho, andeha isika hanao efitrano kely ambony rihana; hasiantsika fandriana sy latabatra ary seza sy fitoeran-jiro ho azy ao, koa rehefa tonga eto amintsika izy dia ao no hipetraka.
  '11':
  - type: text
    content: 'Indray andro, tonga tao i Elisa ka nipetraka tao amin’ilay efitrano ambony ary nandry tao. '
  '12':
  - type: text
    content: 'Ary hoy izy tamin’i Gehazy zatovony: Antsoy ilay Sonemita. Rehefa nantsoiny Ravehivavy dia nitsangana teo anatrehany. '
  '13':
  - type: text
    content: 'Hoy i Elisa tamin’i Gehazy: Mba lazao amin-dRavehivavy hoe: Indro, efa niahy anay tamin’izao fikarakarana rehetra izao ianao, koa inona kosa no mba hatao ho anao? Tianao holazaina amin’ny mpanjaka va ianao, na amin’ny lehiben’ny miaramila? Dia namaly Ravehivavy hoe: Mitoetra atỳ amin’ny fireneko aho. '
  '14':
  - type: text
    content: 'Ary hoy i Elisa: Fa inona ary no hatao ho anao? Dia namaly i Gehazy hoe: Tsy hitanao va fa tsy manan-janaka izy, sady efa antitra ny lahy? '
  '15':
  - type: text
    content: 'Ary hoy i Elisa: Antsoy ary izy. Ary nony nantsoiny izy dia nitsangana teo am-baravarana. '
  '16':
  - type: text
    content: 'Dia hoy izy: Amin’ny fotoana toy izao, amin’ny herintaona, dia hitrotro zazalahy ianao. Nefa hoy Ravehivavy: Tsia, tompokolahy, lehilahin’Andriamanitra! Aza mandainga amin’ny mpanompovavinao!'
  '17':
  - type: text
    content: Kanefa nanana anaka tokoa Ravehivavy, koa nony niherina ny taona dia tera-dahy izy, dia tamin’ilay fotoana nolazain’i Elisa taminy.
  - type: heading
    content: Maty ny zanak’ilay vehivavy sonemita
  '18':
  - type: text
    content: 'Dia niha lehibe ny zaza. Indray andro dia nankany amin’ny rainy tany amin’ny mpijinja vary izy, '
  '19':
  - type: text
    content: 'ary hoy izy tamin’ny rainy: Kay! Ny lohako! Ny lohako! Hoy rainy tamin’ny zatovo iray: Ento ho any amin’ny reniny izy. '
  '2':
  - type: text
    content: 'Dia hoy i Elisa taminy: Inona ary no hataoko ho anao? Lazao amiko: Inona avy no anananao ao an-trano? Fa hoy Ravehivavy: Ny mpanompovavinao dia tsy manana na inona na inona ao an-trano afa-tsy diloilo iray tavoara monja. '
  '20':
  - type: text
    content: 'Dia notrotroin’ilay zatovo izy ka noentiny ho any amin’ny reniny; nampofoiny mandra-pitataovovonan’ny andro izy dia maty izy avy eo. '
  '21':
  - type: text
    content: 'Dia niakatra Ravehivavy ka nampandry azy teo amin’ny fandrianan’ilay lehilahin’Andriamanitra ary narindriny ny trano ka niala teo izy. '
  '22':
  - type: text
    content: 'Ary niantso ny vadiny izy ka niteny hoe: Miangavy anao aho, asaivo misy zatovo iray mankaty amiko mitondra borikivavy iray, fa handeha haingana ho any amin’ny lehilahin’Andriamanitra aho dia hiverina indray. '
  '23':
  - type: text
    content: 'Fa hoy ny vadiny: Inona no ankanesanao any aminy anio, nefa tsy mba andro tsinam-bolana na Sabata tsinona izao? Hoy Ravehivavy: Aza manahy! '
  '24':
  - type: text
    content: 'Ary nanisy lasely ny borikivavy Ravehivavy ka hoy izy tamin’ny zatovony: Tariho izy ka mizora; aza ajanonjanonao akory aho raha tsy ampijanoniko ianao!'
  '25':
  - type: text
    content: 'Dia lasa Ravehivavy nankany amin’ny lehilahin’Andriamanitra tany an-tendrombohitra Karmela. Ary raha vao tazan’ilay lehilahin’Andriamanitra avy izy dia hoy izy tamin’i Gehazy zatovony: Ilay vehivavy sonemita irỳ! '
  '26':
  - type: text
    content: 'Miangavy anao aho, mihazakazaha hitsena azy ka ataovy aminy hoe: Tsara ihany va ianao? Tsara ihany va ny vadinao? Tsara ihany va ny zaza? Ary hoy Ravehivavy: Tsara ihany. '
  '27':
  - type: text
    content: 'Ary rehefa tonga tany amin’ny lehilahin’Andriamanitra tany an-tendrombohitra izy dia nandray ny tongony; nefa nanatona hanosika azy hiala teo i Gehazy. Hoy anefa ny lehilahin’Andriamanitra: Avelao ihany izy fa ory ny fanahiny ao anatiny; NY TOMPO nanafina izany tamiko fa tsy nanambara tamiko. '
  '28':
  - type: text
    content: 'Dia hoy Ravehivavy: Moa naniry zaza taminao va aho, tompoko? Tsy efa nilaza va aho hoe: Aza mamitaka ahy?'
  '29':
  - type: text
    content: 'Ary hoy i Elisa tamin’i Gehazy: Misikìna, ary ento eny an-tananao ny tehiko ka mandehana. Raha mifanena amin’olona ianao, aza miarahaba azy; ary raha misy miarahaba anao, aza mamaly azy akory; ary apetraho eo amin’ny tavan’ny zaza ny tehiko. '
  '3':
  - type: text
    content: 'Hoy izy: Andeha mindrana vilany amin’ny namanao rehetra manodidina, dia vilany tsy misy zavatra, nefa aza atao vitsy! '
  '30':
  - type: text
    content: 'Hoy anefa ny renin’ny zaza: Raha velona koa NY TOMPO, ary raha velona koa ny ainao, dia tsy hiala aminao mihitsy aho! Dia nitsangana ilay lehilahin’Andriamanitra ka nanaraka azy. '
  '31':
  - type: text
    content: 'Nialoha azy i Gehazy ka nametraka ny tehina teo amin’ny tavan’ny zaza, nefa tsy nisy feo na fihetsehana. Dia niverina nitsena azy indray izy ka nilaza taminy hoe: Tsy mahatsiaro akory ny zaza.'
  - type: heading
    content: Novelomin’i Elisa indray ilay zaza
  '32':
  - type: text
    content: 'Rehefa tonga tao an-trano i Elisa dia indro, efa maty ny zaza sady nampandriana teo am-pandrianany. '
  '33':
  - type: text
    content: 'Ary niditra izy ka nirindrim-baravarana tao izy roa lahy ary nivavaka tamin’NY TOMPO i Elisa. '
  '34':
  - type: text
    content: 'Dia niakatra izy ka nandry niampatra teo ambonin’ilay zaza, ary ny vavany dia nataony tamin’ny vavany, ny masony tamin’ny masony, ary ny tanany dia tamin’ny tanany; dia niondrika teo amboniny izy ka niha nafana ny tenan’ilay zaza. '
  '35':
  - type: text
    content: 'Avy eo niasa dia tao an-trano izy dia niverina niampatra taminy indray; dia nievina impito ny zaza ary nihiratra ny masony. '
  '36':
  - type: text
    content: 'Dia niantso an’i Gehazy i Elisa ka nilaza hoe: Antsoy ilay Sonemita. Dia nantsoiny izy. Rehefa tafiditra tao aminy izy dia hoy i Elisa: Raiso ny zanakao. '
  '37':
  - type: text
    content: Dia niditra Ravehivavy ka niantoraka tamin’ny tongony sady niankohoka tamin’ny tany, ary nandray ny zanany izy ka lasa nandeha.
  - type: heading
    content: Ny nanatsaran’i Elisa ilay sakafo saika nahafaty
  '38':
  - type: text
    content: 'Ary niverina nankany Gilgala i Elisa; ary nisy mosary tamin’ny tany; ary raha nipetraka teo anatrehany ny '
  - type: text
    content: zanaky ny mpaminany
  - type: text
    content: ' dia hoy izy tamin’ny zatovony: Ataovy eo an-tokoana ny vilany lehibe ary mahandroa hanina ho an’ny zanaky ny mpaminany. '
  '39':
  - type: text
    content: 'Dia nankany an-tsaha ny iray hitsongo anana ka nahita voantango dia ary nanangona voany iray trotroana avy amin’io; nony tonga izy dia nosolatsolarany ka narotsany tao amin’ny vilany nisy ny nahandro, nefa tsy nisy nahafantatra izany. '
  '4':
  - type: text
    content: 'Rehefa tafiditra ianao dia aoka hirindrim-baravarana ao miaraka amin’izy mirahalahy zanakao, ary mampidìna diloilo amin’ireo vilany rehetra ireo ka atokàny izay feno. '
  '40':
  - type: text
    content: 'Dia noloarany hohanin’ny olona io; nefa raha vao nihinana izy dia nitaraina hoe: Ry lehilahin’Andriamanitra ô! Misy fahafatesana ao am-bilany! Dia tsy azony nohanina izany. '
  '41':
  - type: text
    content: 'Fa hoy i Elisa: Itondray koba. Dia narotsany tao am-bilany ny koba ka hoy izy: Andoary amin’izay ny olona hohaniny. Dia tsy nisy zavatra nampaninona intsony ny tao am-bilany.'
  - type: heading
    content: Ny nampitomboana ny mofo
  '42':
  - type: text
    content: 'Nisy lehilahy avy tany Baala-Salisa nitondra mofo avy amin’ny voaloham-bokatra ho an’ny lehilahin’Andriamanitra, dia mofo varimbazaha roapolo sy salohim-bary maitso tao an-kitapo. Hoy anefa i Elisa: Omeo ny olona ireny hohaniny. '
  '43':
  - type: text
    content: 'Hoy ny mpanompony: Hataoko ahoana no fametraka ity eo anoloan’ny zato lahy? Ary hoy indray i Elisa: Omeo ihany ny olona hohaniny; fa izao no lazain’NY TOMPO: Hihinana izy, ary mbola hisy sisa tsy lany. '
  '44':
  - type: text
    content: Dia narosony teo anoloany ka nihinana izy ireo, ary mbola nisy tokoa sisa tsy lany, araka ny tenin’NY TOMPO.
  '5':
  - type: text
    content: 'Dia niala teo aminy Ravehivavy ka nirindrim-baravarana miaraka amin’izy mirahalahy zanany, ary nitondra ny vilany nankao aminy izy mirahalahy, fa ny reniny kosa dia nampidina ny diloilo. '
  '6':
  - type: text
    content: 'Nony feno ny vilany dia hoy izy tamin’ny zanany: Itondray vilany iray koa aho. Fa hoy kosa ireo taminy: Tsy misy vilany intsony. Dia tapitra ny diloilo. '
  '7':
  - type: text
    content: 'Dia avy Ravehivavy ka nilaza tamin’ny lehilahin’Andriamanitra. Ary hoy kosa izy: Mandehana, amidio ny diloilo mba anefanao izay trosan’olona aminao ary izay sisa dia hivelomanao sy ny zanakao.'
  - type: heading
    content: I Elisa sy ilay vehivavy sonemita
  '8':
  - type: text
    content: 'Indray andro i Elisa dia nankany Sonema. Nisy vehivavy mpanankarena iray tao izay nanery azy hisakafo. Isaky ny mandalo izy dia nivily nankao aminy hisakafo. '
  '9':
  - type: text
    content: 'Ary hoy Ravehivavy tamin’ny vadiny: Indro, fantatro fa olona masina sady lehilahin’Andriamanitra ilay lehilahy mpandalo eto amintsika mandrakariva iny. '
