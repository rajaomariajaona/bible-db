document_id: ISA.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fikorontanana sy fisaonana etỳ ambonin’ny tany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro NY TOMPO manafoana ny tany ka mahalao azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampihohoka azy Izy ka mampiely ny mponina ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ho sahala ihany ny hanjo ny mpisorona sy ny vahoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tompolahy sy ny mpanompolahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tompovavy sy ny mpanompovaviny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpivarotra sy ny mpividy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpampisambotra sy ny mpisambotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpampitrosa sy ny mpitrosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho foana tanteraka ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tena horobaina manontolo izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO no efa miteny izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Misaona sy malazo ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: milofika sy malazo izao tontolo izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: milofika ny olona ambony amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Novetavetain’ny mponina ao aminy ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nandika ny lalàna izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nanodinkodina ny didy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nivadika tamin’ny Fanekena mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary noho izany dia ozona no mandevona ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hilanja ny valin-kelony ny mponina ao aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voadoro ny mponina amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka olona vitsy foana no sisa ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Misaona ny ranom-boaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: milofika ny foto-boaloboka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misento avokoa ireo izay nifaly am-po;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitsahatra ny firavoravoana amin’ny ampongatapaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tapitra ny fitabataban’ireo niravoravo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsahatra ny fifaliana amin-dokanga;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy misy mihira eo am-pisotroan-divay intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mangidy amin’izay misotro azy ny toaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rava ilay tanàna be fikorontanana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mirindrina ny trano rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy azon’olona idirana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Misy fitarainana eny an-tsaha
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy misy ny divay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nihamaizina ny fifaliana rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voaroaka ny firavoravoan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fahafoanana no hany sisa ao an-tanàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rava sady montsamontsana ny vavahady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ao anivon’ny tany, ao amin’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hisy toy ny amin’ny fikapohana hazo oliva
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fitsimpontsimponam-boaloboka rehefa tapitra ny andro fiotazana azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fifaliana lasa aloha loatra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ireo dia hanandratra ny feony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hihoby;
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fahalehibiazan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiantso mafy eny amin’ny ranomasina izy ireo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mankalaza NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny fiposahan’ny mazava izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny anaran’NY TOMPO, Andriamanitry ny Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny nosy any an-dranomasina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hatrany am-paran’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no nandrenesanay hira hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voninahitra ho an’ny marina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa hoy kosa aho: Levona aho!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Levona aho! Lozako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpamitaka dia mamitaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny mpamitaka dia mamitaka tokoa!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tahotra sy lavaka ary fandrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mahazo anao, ry mponina amin’ny tany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay mandositra noho ny fandrenesana ny tahotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho latsaka any an-davaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay miakatra avy ao anatin’ny lavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho voarain’ny fandrika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa misy varavarana mivoha any amin’ny avo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihovotrovotra ny fanorenan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mivava ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitresaka ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihovotrovotra aoka izany ny tany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mivembena dia mivembena tahaka ny olona mamo ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihevaheva toy ny trano fialofana mihantona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitambesatra aminy ny fahadisoany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka potraka izy ary tsy ho tafarina intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fifaranan’ny fanjakan’olombelona sy fiandohan’ny fanjakan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Amin’izany andro izany dia any ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hamalian’NY TOMPO ny tafiky ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary etỳ an-tany kosa ny mpanjakan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia hangonina
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny mpifatotra ao an-davaka izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hohidina any an-tranomaizina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary rehefa afaka andro maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hampamoahina izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia hivoaramena ny volana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hivaloarika ny masoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Andriamanitra, Tompon’izao rehetra izao, no Mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ao an-tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ', any Jerosalema,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy voninahitra eo anatrehan’ny loholony.
