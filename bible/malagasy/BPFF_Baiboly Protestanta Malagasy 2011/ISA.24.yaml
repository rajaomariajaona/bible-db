document_id: ISA.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fikorontanana sy fisaonana etỳ ambonin’ny tany
  - type: text
    content: Indro NY TOMPO manafoana ny tany ka mahalao azy,
  - type: text
    content: mampihohoka azy Izy ka mampiely ny mponina ao aminy.
  '10':
  - type: text
    content: Rava ilay tanàna be fikorontanana.
  - type: text
    content: Mirindrina ny trano rehetra
  - type: text
    content: ka tsy azon’olona idirana;
  '11':
  - type: text
    content: Misy fitarainana eny an-tsaha
  - type: text
    content: satria tsy misy ny divay,
  - type: text
    content: nihamaizina ny fifaliana rehetra,
  - type: text
    content: voaroaka ny firavoravoan’ny tany.
  '12':
  - type: text
    content: Fahafoanana no hany sisa ao an-tanàna
  - type: text
    content: ary rava sady montsamontsana ny vavahady.
  '13':
  - type: text
    content: Fa ao anivon’ny tany, ao amin’ny olona,
  - type: text
    content: dia hisy toy ny amin’ny fikapohana hazo oliva
  - type: text
    content: sy fitsimpontsimponam-boaloboka rehefa tapitra ny andro fiotazana azy.
  - type: heading
    content: Fifaliana lasa aloha loatra
  '14':
  - type: text
    content: Ireo dia hanandratra ny feony
  - type: text
    content: ka hihoby;
  - type: text
    content: noho ny fahalehibiazan’NY TOMPO
  - type: text
    content: dia hiantso mafy eny amin’ny ranomasina izy ireo!
  '15':
  - type: text
    content: Mankalaza NY TOMPO
  - type: text
    content: any amin’ny fiposahan’ny mazava izy,
  - type: text
    content: dia ny anaran’NY TOMPO, Andriamanitry ny Israely,
  - type: text
    content: any amin’ny nosy any an-dranomasina!
  '16':
  - type: text
    content: Hatrany am-paran’ny tany
  - type: text
    content: 'no nandrenesanay hira hoe:'
  - type: text
    content: Voninahitra ho an’ny marina!
  - type: text
    content: 'Fa hoy kosa aho: Levona aho!'
  - type: text
    content: Levona aho! Lozako!
  - type: text
    content: Ny mpamitaka dia mamitaka;
  - type: text
    content: Eny, ny mpamitaka dia mamitaka tokoa!
  '17':
  - type: text
    content: Tahotra sy lavaka ary fandrika
  - type: text
    content: no mahazo anao, ry mponina amin’ny tany!
  '18':
  - type: text
    content: Izay mandositra noho ny fandrenesana ny tahotra
  - type: text
    content: dia ho latsaka any an-davaka;
  - type: text
    content: izay miakatra avy ao anatin’ny lavaka
  - type: text
    content: dia ho voarain’ny fandrika;
  - type: text
    content: fa misy varavarana mivoha any amin’ny avo,
  - type: text
    content: ary mihovotrovotra ny fanorenan’ny tany.
  '19':
  - type: text
    content: Mivava ny tany,
  - type: text
    content: mitresaka ny tany,
  - type: text
    content: mihovotrovotra aoka izany ny tany,
  '2':
  - type: text
    content: Ho sahala ihany ny hanjo ny mpisorona sy ny vahoaka,
  - type: text
    content: ny tompolahy sy ny mpanompolahiny,
  - type: text
    content: ny tompovavy sy ny mpanompovaviny,
  - type: text
    content: ny mpivarotra sy ny mpividy,
  - type: text
    content: ny mpampisambotra sy ny mpisambotra,
  - type: text
    content: ny mpampitrosa sy ny mpitrosa.
  '20':
  - type: text
    content: mivembena dia mivembena tahaka ny olona mamo ny tany,
  - type: text
    content: mihevaheva toy ny trano fialofana mihantona,
  - type: text
    content: mitambesatra aminy ny fahadisoany
  - type: text
    content: ka potraka izy ary tsy ho tafarina intsony.
  - type: heading
    content: Fifaranan’ny fanjakan’olombelona sy fiandohan’ny fanjakan’Andriamanitra
  '21':
  - type: text
    content: Amin’izany andro izany dia any ambony
  - type: text
    content: no hamalian’NY TOMPO ny tafiky ny lanitra,
  - type: text
    content: ary etỳ an-tany kosa ny mpanjakan’ny tany.
  '22':
  - type: text
    content: Dia hangonina
  - type: text
    content: tahaka ny mpifatotra ao an-davaka izy ireo
  - type: text
    content: ka hohidina any an-tranomaizina.
  - type: text
    content: Ary rehefa afaka andro maro
  - type: text
    content: dia hampamoahina izy.
  '23':
  - type: text
    content: Dia hivoaramena ny volana
  - type: text
    content: ary hivaloarika ny masoandro,
  - type: text
    content: satria Andriamanitra, Tompon’izao rehetra izao, no Mpanjaka
  - type: text
    content: 'ao an-tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ', any Jerosalema,'
  - type: text
    content: ary misy voninahitra eo anatrehan’ny loholony.
  '3':
  - type: text
    content: Ho foana tanteraka ny tany,
  - type: text
    content: tena horobaina manontolo izy,
  - type: text
    content: fa NY TOMPO no efa miteny izany.
  '4':
  - type: text
    content: Misaona sy malazo ny tany,
  - type: text
    content: milofika sy malazo izao tontolo izao,
  - type: text
    content: milofika ny olona ambony amin’ny tany.
  '5':
  - type: text
    content: Novetavetain’ny mponina ao aminy ny tany
  - type: text
    content: satria nandika ny lalàna izy
  - type: text
    content: sady nanodinkodina ny didy
  - type: text
    content: ary nivadika tamin’ny Fanekena mandrakizay.
  '6':
  - type: text
    content: Ary noho izany dia ozona no mandevona ny tany
  - type: text
    content: ary hilanja ny valin-kelony ny mponina ao aminy;
  - type: text
    content: voadoro ny mponina amin’ny tany
  - type: text
    content: ka olona vitsy foana no sisa ao.
  '7':
  - type: text
    content: Misaona ny ranom-boaloboka,
  - type: text
    content: milofika ny foto-boaloboka;
  - type: text
    content: misento avokoa ireo izay nifaly am-po;
  '8':
  - type: text
    content: Mitsahatra ny firavoravoana amin’ny ampongatapaka,
  - type: text
    content: tapitra ny fitabataban’ireo niravoravo;
  - type: text
    content: mitsahatra ny fifaliana amin-dokanga;
  '9':
  - type: text
    content: Tsy misy mihira eo am-pisotroan-divay intsony,
  - type: text
    content: mangidy amin’izay misotro azy ny toaka.
