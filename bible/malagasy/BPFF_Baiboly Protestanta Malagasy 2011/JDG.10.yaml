document_id: JDG.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Mpitsara hafa koa: I Tola sy i Jaira'
  - type: text
    content: 'Taorianan’i Abimeleka dia nitsangana hamonjy ny Israely i Tola, zanak’i Poa, zanak’i Dodo, lehilahy avy tamin’Isakara; izy dia nonina tao Samira, any amin’ny tany be havoana any Efraima. '
  '10':
  - type: text
    content: 'Dia nitaraina tamin’NY TOMPO ny Zanak’Israely hoe: Efa nanota Taminao izahay, satria nahafoy an’Andriamanitray ka nanompo ireo Baala. '
  '11':
  - type: text
    content: 'Hoy NY TOMPO tamin’ny Zanak’Israely: Moa tsy nampahory anareo va ny Ejiptiana, ny Amorita, ny Amonita, ny Filistina, '
  '12':
  - type: text
    content: 'ny Sidoniana, ny Amalekita ary ny Maonita ka nitaraina Tamiko ianareo dia novonjeko tamin’ny tanany? '
  '13':
  - type: text
    content: 'Nefa nahafoy Ahy ianareo ka nanompo andriamanitra hafa. Koa izany no tsy hamonjeko anareo intsony. '
  '14':
  - type: text
    content: 'Mandehana mitaraina amin’ireo andriamanitra izay nofidinareo! Aoka ireo no hamonjy anareo amin’ny andron’ny fahorianareo! '
  '15':
  - type: text
    content: 'Ary hoy ny Zanak’Israely tamin’NY TOMPO: Efa nanota izahay; ataovy aminay izay rehetra sitrakao. Kanefa mba afaho ihany izahay anio! '
  '16':
  - type: text
    content: Dia nanary ireo andriamanitra hafa tao aminy izy ka nanompo NY TOMPO; tsy nahazaka nijery ny fijalian’ny Israely intsony NY TOMPO.
  '17':
  - type: text
    content: 'Nivory ny Amonita ka nitoby tany Gileada. Nivory kosa ny Zanak’Israely ka nitoby tany Mizpa. '
  '18':
  - type: text
    content: 'Dia nifampiera ny olona, dia ireo andrianan’i Gileada hoe: Iza no lehilahy handeha voalohany hiady amin’ny Amonita? Ho lohany amin’ny mponina rehetra any Gileada izy!'
  '2':
  - type: text
    content: Nitsara ny Israely nandritra ny telo amby roapolo taona izy dia maty ka nalevina tao Samira.
  '3':
  - type: text
    content: 'Nitsangana nandimby azy i Jaira gileadita ka nitsara ny Israely nandritra ny roa amby roapolo taona. '
  '4':
  - type: text
    content: 'Nanana zanakalahy telopolo izay nitaingina borikilahy tanora telopolo izy sady nanana tanàna telopolo any amin’ny tany Gileada; antsoina hoe Havota-Jaìra ireny mandraka androany. '
  '5':
  - type: text
    content: Dia maty i Jaira ka nalevina tany Kamona.
  - type: heading
    content: Manafika ny Israely ny Amonita
  '6':
  - type: text
    content: 'Ary ny Zanak’Israely dia nanao izay ratsy ihany teo imason’NY TOMPO ka nanompo ireo '
  - type: text
    content: Baala
  - type: text
    content: ' sy ireo '
  - type: text
    content: Astarta
  - type: text
    content: ', ireo andriamanitr’i Siria, ireo andriamanitr’i Sidona, ireo andriamanitr’i Moaba, ireo andriamanitry ny Amonita ary ireo andriamanitry ny Filistina. Nahafoy NY TOMPO izy ka tsy nanompo Azy intsony. '
  '7':
  - type: text
    content: 'Dia nirehitra tamin’ny Israely ny fahatezeran’NY TOMPO ka nivarotra azy ho eo an-tanan’ny Filistina sy ho eo an-tanan’ny Amonita Izy. '
  '8':
  - type: text
    content: 'Namoritra sy nanao tsindry hazo lena ny Zanak’Israely ireo tamin’izany taona izany; valo amby folo taona no nampahoriany ny Zanak’Israely rehetra izay tany andafin’i Jordana, tany amin’ny tanin’ny Amorita any Gileada. '
  '9':
  - type: text
    content: 'Nita ny Jordana ny Amonita mba hiady amin’i Joda sy i Benjamina koa ary ny taranak’i Efraima ka tra-pahoriana mafy ny Israely. '
