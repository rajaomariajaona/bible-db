document_id: JDG.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Mpitsara hafa koa: I Tola sy i Jaira'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorianan’i Abimeleka dia nitsangana hamonjy ny Israely i Tola, zanak’i Poa, zanak’i Dodo, lehilahy avy tamin’Isakara; izy dia nonina tao Samira, any amin’ny tany be havoana any Efraima. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nitsara ny Israely nandritra ny telo amby roapolo taona izy dia maty ka nalevina tao Samira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nitsangana nandimby azy i Jaira gileadita ka nitsara ny Israely nandritra ny roa amby roapolo taona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanana zanakalahy telopolo izay nitaingina borikilahy tanora telopolo izy sady nanana tanàna telopolo any amin’ny tany Gileada; antsoina hoe Havota-Jaìra ireny mandraka androany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia maty i Jaira ka nalevina tany Kamona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manafika ny Israely ny Amonita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny Zanak’Israely dia nanao izay ratsy ihany teo imason’NY TOMPO ka nanompo ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' sy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Astarta
  - type: text
    text: ', ireo andriamanitr’i Siria, ireo andriamanitr’i Sidona, ireo andriamanitr’i Moaba, ireo andriamanitry ny Amonita ary ireo andriamanitry ny Filistina. Nahafoy NY TOMPO izy ka tsy nanompo Azy intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nirehitra tamin’ny Israely ny fahatezeran’NY TOMPO ka nivarotra azy ho eo an-tanan’ny Filistina sy ho eo an-tanan’ny Amonita Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Namoritra sy nanao tsindry hazo lena ny Zanak’Israely ireo tamin’izany taona izany; valo amby folo taona no nampahoriany ny Zanak’Israely rehetra izay tany andafin’i Jordana, tany amin’ny tanin’ny Amorita any Gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nita ny Jordana ny Amonita mba hiady amin’i Joda sy i Benjamina koa ary ny taranak’i Efraima ka tra-pahoriana mafy ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nitaraina tamin’NY TOMPO ny Zanak’Israely hoe: Efa nanota Taminao izahay, satria nahafoy an’Andriamanitray ka nanompo ireo Baala. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy NY TOMPO tamin’ny Zanak’Israely: Moa tsy nampahory anareo va ny Ejiptiana, ny Amorita, ny Amonita, ny Filistina, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny Sidoniana, ny Amalekita ary ny Maonita ka nitaraina Tamiko ianareo dia novonjeko tamin’ny tanany? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nefa nahafoy Ahy ianareo ka nanompo andriamanitra hafa. Koa izany no tsy hamonjeko anareo intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mandehana mitaraina amin’ireo andriamanitra izay nofidinareo! Aoka ireo no hamonjy anareo amin’ny andron’ny fahorianareo! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy ny Zanak’Israely tamin’NY TOMPO: Efa nanota izahay; ataovy aminay izay rehetra sitrakao. Kanefa mba afaho ihany izahay anio! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia nanary ireo andriamanitra hafa tao aminy izy ka nanompo NY TOMPO; tsy nahazaka nijery ny fijalian’ny Israely intsony NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nivory ny Amonita ka nitoby tany Gileada. Nivory kosa ny Zanak’Israely ka nitoby tany Mizpa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nifampiera ny olona, dia ireo andrianan’i Gileada hoe: Iza no lehilahy handeha voalohany hiady amin’ny Amonita? Ho lohany amin’ny mponina rehetra any Gileada izy!'
