document_id: NUM.26,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'hoy NY TOMPO tamin’i Mosesy sy i Eleazara, zanak’i Arona mpisorona: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kanefa nisokatra ny tany ka nitelina azy ireo mbamin’i Kora, tamin’ny nahafatesan’izany antokony izany ary levon’ny afo koa ny dimampolo sy roanjato lahy ka tonga fananarana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo zanak’i Kora kosa anefa dia tsy mba maty.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Simeona, araka ny fianakaviany, dia izao: Avy tamin’i Nemoela, ny fianakavian’ny Nemoelita; avy tamin’i Jamina, ny fianakavian’ny Jaminita; avy tamin’i Jakina, ny fokon’ny Jakinita; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin’i Zera, ny fianakavian’ny Zerita; avy tamin’i Saoly, ny fianakavian’ny Saolita. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fianakavian’ny Simeonita, roanjato sy roa arivo sy roa alina.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Gada, araka ny fianakaviany, dia izao: Avy tamin’i Zefona, ny fianakavian’ny Zefonita; avy tamin’i Hagy, ny fianakavian’ny Hagita; avy tamin’i Sony, ny fianakavian’ny Sonita; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin’i Ozny, ny fianakavian’ny Oznita; avy tamin’i Ery, ny fianakavian’ny Erita; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin’i Aroda, ny fokon’ny Arodita; avy tamin’i Arely, ny fianakavian’ny Arelita. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fianakavian’ny zanak’i Gada, araka izay voaisa taminy, dimanjato sy efatra alina.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanak’i Joda dia i Era sy i Onana; kanefa i Era sy i Onana dia maty tany amin’ny tany Kanana. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Alao isa ny fiangonan’ny Zanak’Israely manontolo, hatramin’ny roapolo taona no ho miakatra, araka ny fianakaviany avy, dia izay rehetra avy amin’ny Israely azo alefa hanafika ao amin’ny Israely. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak’i Joda, araka ny fianakaviany, dia izao: Avy tamin’i Sela, ny fianakavian’ny Selita; avy tamin’i Fareza, ny fianakavian’ny Farezita; avy tamin’i Zera, ny fianakavian’ny Zerita. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak’i Fareza dia izao: Avy tamin’i Hezrona, ny fokon’ny Hezronita; avy tamin’i Hamola, ny fianakavian’ny Hamolita. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fianakavian’i Joda, araka izay voaisa taminy, dimanjato sy enina arivo sy fito alina.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’Isakara, araka ny fianakaviany, dia izao: Avy tamin’i Tola, ny fianakavian’ny Tolita; avy tamin’i Pova, ny fianakavian’ny Povita; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin’i Jasoba, ny fianakavian’ny Jasobita; avy tamin’i Simrona, ny fianakavian’ny Simronita. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fianakavian’Isakara, araka izay voaisa taminy, telonjato sy efatra arivo sy enina alina.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Zebolona, araka ny fianakaviany, dia izao: Avy tamin’i Sereda, ny fianakavian’ny Seredita; avy tamin’i Elona, ny fianakavian’ny Elonita; avy tamin’i Jahalela, ny fianakavian’ny Jahalelita. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fianakavian’ny Zebolonita, araka izay voaisa taminy, dimanjato sy enina alina.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanak’i Josefa, araka ny fianakaviany, dia i Manase sy i Efraima. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Manase dia izao: Avy tamin’i Makira, ny fianakavian’ny Makirita; ary i Makira no niteraka an’i Gileada; avy tamin’i Gileada, ny fianakavian’ny Gileadita. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Ary i Mosesy sy i Eleazara mpisorona dia niteny taminy tany Arbota-Moaba, teo amoron’i Jordana, tandrifin’i Jeriko hoe: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no taranak’i Gileada: Avy tamin’i Jezera, ny fianakavian’ny Jezerita; avy tamin’i Heleka, ny fianakavian’ny Helekita; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary avy tamin’i Asriela, ny fianakavian’ny Asrielita; ary avy tamin’i Sekema, ny fianakavian’ny Sekemita; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary avy tamin’i Semida, ny fianakavian’ny Semidita; ary avy tamin’i Hefera, ny fianakavian’ny Heferita. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Zelofada, zanak’i Hefera, dia tsy mba nanan-janakalahy fa zanakavavy ihany, ary ny anaran’ny zanany vavy dia i Mahala, i Noa, i Hogla, i Milka ary i Tirza. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fianakavian’i Manase; ary izay voaisa taminy dia fitonjato sy roa arivo sy dimy alina.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no taranak’i Efraima, araka ny fianakaviany: Avy tamin’i Sotela, ny fianakavian’ny Sotelita; avy tamin’i Bekera, ny fianakavian’ny Bekerita; avy tamin’i Tahana, ny fianakavian’ny Tahanita. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no taranak’i Sotela: Avy tamin’i Erana, ny fianakavian’ny Eranita. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fianakavian’ny taranak’i Efraima, araka izay voaisa taminy, dimanjato sy roa arivo sy telo alina. Ireo no taranak’i Josefa araka ny fokony.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Benjamina, araka ny fianakaviany, dia izao: Avy tamin’i Bela, ny fokon’ny Belita; avy tamin’i Asibela, ny fianakavian’ny Asibelita; avy tamin’i Ahirama, ny fianakavian’ny Ahiramita; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin’i Sefofama, ny fianakavian’ny Sefofamita; avy tamin’i Hofama, ny fianakavian’ny Hofamita. '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: Ny roapolo taona no ho miakatra no alao isa; araka izay nandidian’NY TOMPO an’i Mosesy sy ny Zanak’Israely izay nivoaka avy tany amin’ny tany Ejipta.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak’i Bela dia i Arda sy i Namana; dia ny fianakavian’ny Ardita, ary avy tamin’i Namàna, ny fianakavian’ny Namanita. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no taranak’i Benjamina araka ny fianakaviany; izay voaisa taminy dia eninjato sy dimy arivo sy efatra alina.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no taranak’i Dana, araka ny fianakaviany: Avy tamin’i Sohama, ny fianakavian’ny Sohamita. Ireo no fianakavian’i Dana, araka ny fokony. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fianakavian’ny Sohamita rehetra, araka izay voaisa taminy, dia efajato sy efatra arivo sy enina alina.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Asera, araka ny fianakaviany dia izao: Avy tamin’i Jimna, ny fianakavian’ny Jimnita; avy tamin’i Jisvy, ny fianakavian’ny Jisvita; avy tamin’i Beria, ny fianakavian’ny Berita. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tamin’ny zanak’i Beria dia izao: Avy tamin’i Hebera, ny fianakavian’ny Heberita; avy tamin’i Malkiela, ny fianakavian’ny Malkielita. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anaran’ny zanakavavin’i Asera dia Sera. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fianakavian’ny taranak’i Asera, araka izay voaisa taminy, efajato sy telo arivo sy dimy alina.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Naftaly, araka ny fianakaviany, dia izao: Avy tamin’i Jaziela, ny fianakavian’ny Jazielita; avy tamin’i Gonỳ, ny fianakavian’ny Gonita; '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin’i Jezera, ny fianakavian’ny Jezerita; avy tamin’i Silema, ny fianakavian’ny Silemita. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Robena, lahimatoan’Israely. Ny zanak’i Robena dia i Hanoka sy ny fianakavian’ny Hanokita; avy tamin’i Palo, ny fianakavian’ny Paloita; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fianakavian’i Naftaly araka ny fianakaviany; ary izay voaisa taminy dia efajato sy dimy arivo sy efatra alina.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no voaisa tamin’ny Zanak’Israely, telopolo sy fitonjato sy arivo sy enina hetsy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Torolalana ny amin’ny fomba hizaràna ny tany nampanantenaina
    marker-yv: yv-h
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo izany no hizaràna ny tany ho lovany, araka ny isany. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny maro isa dia homenao zaratany lehibe kokoa ary ny vitsy an’isa dia homenao kely kokoa; samy araka izay voaisa taminy no hanomezana ny zaratany. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatao antsapaka anefa no hizaràna ny tany; araka ny anaran’ny fokon’ny razany no hahazoany zaratany. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia antsapaka no hizaràna ny tany ho lovany, na ny ho an’ny maro na ny ho an’ny vitsy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanisana fanindroany ny levita
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no voaisa tamin’ny taranak’i Levy, araka ny fianakaviany: Avy tamin’i Gersona, ny fianakavian’ny Gersonita; avy tamin’i Kehata, ny fianakavian’ny Kehatita; avy tamin’i Merary, ny fianakavian’ny Merarita. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no fianakavian’i Levy: Ny fianakavian’ny Libnita, ny fianakavian’ny Hebronita, ny fianakavian’ny Mahalita, ny fianakavian’ny Mosita, ny fianakavian’ny Koraìta. Ary i Kehata dia niteraka an’i Amrama. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anaran’ny vadin’i Amrama dia Jokebeda, zanakavavin’i Levy, izay naterany tany Ejipta; dia niteraka an’i Arona sy i Mosesy ary i Miriama anabaviny tamin’i Amrama izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin’i Hezrona, ny fianakavian’ny Hezronita; avy tamin’i Karmy, ny fianakavian’ny Karmita. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny naterak’i Arona dia i Nadaba, i Abiho, i Eleazara ary Itamara. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa maty i Nadaba sy i Abiho tamin’izy ireo nanolotra afo tsy izy teo anatrehan’NY TOMPO.
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izay voaisa taminy dia telo arivo sy roa alina, dia ny lahy rehetra hatramin’ny iray volana no ho miakatra; fa tsy niaraka nisaina tamin’ny Zanak’Israely izy ireo satria tsy mba nomena zaratany teo amin’ny Zanak’Israely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teny famaranana momba ny fanisana
    marker-yv: yv-h
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no voaisan’i Mosesy sy i Eleazara mpisorona, izay nanisa ny Zanak’Israely tany Arbota-Moaba, teo amoron’i Jordana, tandrifin’i Jeriko. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ireo dia tsy nahitana olona avy tamin’izay efa voaisan’i Mosesy sy i Arona mpisorona tamin’izy nanisa ny Zanak’Israely tany an-tany efitr’i Sinay. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa NY TOMPO efa nilaza tamin’izy ireo hoe: Ho faty any an-tany efitra tokoa ireo. Koa tsy nisy olona sisa tamin’ireny afa-tsy i Kaleba, zanak’i Jefone, sy i Josoa, zanak’i Nona, ihany.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no fianakavian’ny Robenita; izay voaisa taminy dia telopolo sy fitonjato sy telo arivo sy efatra alina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanak’i Palo dia i Eliaba. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanak’i Eliaba dia i Nemoela sy i Datana ary i Abirama. Ireo dia ilay Datana sy i Abirama, olom-boafidin’ny fiangonana, izay nila ady tamin’i Mosesy sy i Arona, teo amin’ny antokon’i Kora, raha nila ady tamin’NY TOMPO izy, '
