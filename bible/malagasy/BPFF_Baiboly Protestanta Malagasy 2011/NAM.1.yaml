    children:
    - type: text
      text: '1'
  - type: text
    text: Faminaniana ny amin’ny loza hanjo an’i Ninive, dia ny bokin’ny fahitan’i Nahoma elkosita.
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO, Andriamanitra mahatahotra no sady tsara
  marker-yv: yv-h
- type: usfm
  marker: qa
  children:
  - type: text
    text: alef א
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Andriamanitra saro-piaro sy mamaly heloka NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO dia mpamaly heloka sady feno fahatezerana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO dia mpamaly ny rafilahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitahiry fahatezerana hamelezany ny fahavalony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mahari-po NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady be hery
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mety manamarina ny meloka.
- type: usfm
  marker: qa
  children:
  - type: text
    text: bet ב
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao anatin’ny tadio sy ny tafio-drivotra no lalan’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny rahona dia vovoka avy amin’ny dian-tongony.
- type: usfm
  marker: qa
  children:
  - type: text
    text: gimel ג
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miteny mafy ny ranomasina Izy ka mahatankina azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mandritra ny ony rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: malazo i Basana sy i Karmela
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary malazo koa ny vonin’i Libanona.
- type: usfm
  marker: qa
  children:
  - type: text
    text: he ה
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mihovotrovotra eo anatrehany ny tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mihotsaka ny havoana;
- type: usfm
  marker: qa
  children:
  - type: text
    text: vav ו
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihorohoro eo anatrehany koa ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny tany onenana sy ny mponina rehetra ao aminy.
- type: usfm
  marker: qa
  children:
  - type: text
    text: zaìn ז
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Iza no mahajoro eo anoloan’ny fahavinirany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no mahatanty ny firehitry ny fahatezerany?
- type: usfm
  marker: qa
  children:
  - type: text
    text: het ח
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aidina toy ny afo ny fahatezerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mirodana eo anoloany ny vatolampy.
- type: usfm
  marker: qa
  children:
  - type: text
    text: tet ט
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsara NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fialofana amin’ny andro fahoriana;
- type: usfm
  marker: qa
  children:
  - type: text
    text: iod י
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahalala izay mialoka aminy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa amin’ny riaka manafotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anatanterahany fandringanana amin’io toerana io,
- type: usfm
  marker: qa
  children:
  - type: text
    text: kaf כ
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahavalony dia henjehiny ho any amin’ny maizina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’i Joda sy ho an’i Ninive
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Inona no heverinareo hoenti-manohitra NY TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandringanana no hataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hiverina fanindroany ny fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa na dia toy ny tsilo mifamatopatotra aza ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mamon’ny zava-pisotrony
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho levona tanteraka toy ny mololo maina izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avy tao aminao no nivoahan’ny iray
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay misain-dratsy hoenti-manohitra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mamoron-kevi-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia tsy latsaka isa fa mbola maro aza ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hofongorana ihany izy ka tsy hisy intsony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nampahory anao Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hampahory anao intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ankehitriny, hopotehiko ny ziogany ho afaka aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotapahiko ny famatorana anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary NY TOMPO efa nandidy ny aminao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy intsony taranaka hamelo-maso ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: halaiko tsy ho ao amin’ny tranon’ny andriamanitrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sarin-javatra voasokitra sy ny sarin-javatra voarendrika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanao fasana ho anao Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria hita fa latsa-danja ianao.
