document_id: NAM.1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Faminaniana ny amin’ny loza hanjo an’i Ninive, dia ny bokin’ny fahitan’i Nahoma elkosita.
  - type: heading
    content: NY TOMPO, Andriamanitra mahatahotra no sady tsara
  - type: heading
    content: alef א
  '10':
  - type: text
    content: Fa na dia toy ny tsilo mifamatopatotra aza ireny
  - type: text
    content: sady mamon’ny zava-pisotrony
  - type: text
    content: dia ho levona tanteraka toy ny mololo maina izy.
  '11':
  - type: text
    content: Avy tao aminao no nivoahan’ny iray
  - type: text
    content: izay misain-dratsy hoenti-manohitra NY TOMPO
  - type: text
    content: sady mamoron-kevi-dratsy.
  '12':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Na dia tsy latsaka isa fa mbola maro aza ireny
  - type: text
    content: dia hofongorana ihany izy ka tsy hisy intsony.
  - type: text
    content: Efa nampahory anao Aho
  - type: text
    content: ka tsy hampahory anao intsony.
  '13':
  - type: text
    content: Fa ankehitriny, hopotehiko ny ziogany ho afaka aminao
  - type: text
    content: ary hotapahiko ny famatorana anao.
  '14':
  - type: text
    content: 'Ary NY TOMPO efa nandidy ny aminao hoe:'
  - type: text
    content: Tsy hisy intsony taranaka hamelo-maso ny anaranao;
  - type: text
    content: halaiko tsy ho ao amin’ny tranon’ny andriamanitrao
  - type: text
    content: ny sarin-javatra voasokitra sy ny sarin-javatra voarendrika;
  - type: text
    content: hanao fasana ho anao Aho
  - type: text
    content: satria hita fa latsa-danja ianao.
  '2':
  - type: text
    content: Andriamanitra saro-piaro sy mamaly heloka NY TOMPO;
  - type: text
    content: NY TOMPO dia mpamaly heloka sady feno fahatezerana;
  - type: text
    content: NY TOMPO dia mpamaly ny rafilahiny
  - type: text
    content: ary mitahiry fahatezerana hamelezany ny fahavalony.
  '3':
  - type: text
    content: Mahari-po NY TOMPO
  - type: text
    content: sady be hery
  - type: text
    content: ary tsy mety manamarina ny meloka.
  - type: heading
    content: bet ב
  - type: text
    content: Ao anatin’ny tadio sy ny tafio-drivotra no lalan’NY TOMPO;
  - type: text
    content: ny rahona dia vovoka avy amin’ny dian-tongony.
  - type: heading
    content: gimel ג
  '4':
  - type: text
    content: Miteny mafy ny ranomasina Izy ka mahatankina azy
  - type: text
    content: sady mandritra ny ony rehetra;
  - type: text
    content: malazo i Basana sy i Karmela
  - type: text
    content: ary malazo koa ny vonin’i Libanona.
  - type: heading
    content: he ה
  '5':
  - type: text
    content: Mihovotrovotra eo anatrehany ny tendrombohitra
  - type: text
    content: sady mihotsaka ny havoana;
  - type: heading
    content: vav ו
  - type: text
    content: mihorohoro eo anatrehany koa ny tany,
  - type: text
    content: dia ny tany onenana sy ny mponina rehetra ao aminy.
  - type: heading
    content: zaìn ז
  '6':
  - type: text
    content: Iza no mahajoro eo anoloan’ny fahavinirany?
  - type: text
    content: Ary iza no mahatanty ny firehitry ny fahatezerany?
  - type: heading
    content: het ח
  - type: text
    content: Aidina toy ny afo ny fahatezerany
  - type: text
    content: ary mirodana eo anoloany ny vatolampy.
  - type: heading
    content: tet ט
  '7':
  - type: text
    content: Tsara NY TOMPO,
  - type: text
    content: fialofana amin’ny andro fahoriana;
  - type: heading
    content: iod י
  - type: text
    content: mahalala izay mialoka aminy Izy.
  '8':
  - type: text
    content: Fa amin’ny riaka manafotra
  - type: text
    content: no anatanterahany fandringanana amin’io toerana io,
  - type: heading
    content: kaf כ
  - type: text
    content: ary ny fahavalony dia henjehiny ho any amin’ny maizina.
  - type: heading
    content: Hafatra ho an’i Joda sy ho an’i Ninive
  '9':
  - type: text
    content: Inona no heverinareo hoenti-manohitra NY TOMPO?
  - type: text
    content: Fandringanana no hataony,
  - type: text
    content: tsy hiverina fanindroany ny fahoriana.
