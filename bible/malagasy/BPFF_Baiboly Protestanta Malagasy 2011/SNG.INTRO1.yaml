document_id: SNG.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ny anaran’ny Boky ao amin’ny Baiboly hebreo dia: Ny tononkira tsara indrindra, fa ny hoe Tononkiran’i Solomona dia avy amin’ny filazana ao amin’ny 1.1. Ankoatra an’io 1.1 io dia voatonona indimy ato amin’ny Boky ny anaran’i Solomona. Ireo andininy ireo anefa dia milaza momba an’i Solomona fa tsy fitantaran’i Solomona ny tenany akory.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Tao amin’ny Fiangonana jiosy, ny Boky Tononkira dia isan’ireo Horonam-boky Dimy ary novakina tamin’ny Paska.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Manaitra tokoa ny ahitana ity boky ity ato anatin’ny Baiboly satria raha vakina dia tena tononkira ataon’ny mpifankatia. Raha ny tantaran’ny Fiangonana no jerena dia be tokoa ny fisalasalana talohan’ny nanekena azy ho Soratra Masina, na tao amin’ny Fiangonana jiosy izany na tao amin’ny Fiangonana kristiana. Maro ihany ny fomba nanazavana ny maha Soratra Masina azy, fa ny tanan’ny ny maro dia izao: Noraisin’ny Fiangonana ho sarin’ny fitiavan’Andriamanitra ny Israely. Ary izany dia mifanandrify amin’ireo teny maro izay mampitaha ny fitiavan’Andriamanitra ny Israely amin’ny fanambadiana, ohatra ny Bokin’i Hosea, ny Isaia 62.4, na ny Efesiana 5.25-27.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Koa ny Boky dia milaza lehilahy iray izay mpampakatra, ary vehivavy iray izay ampakarina. Heverin’ny mpandinika fa ny anaran’i Solomona dia noentina ilazan-dRavehivavy, na ny olona mpijery, an-dRalehilahy, ary Ravehivavy dia atao hoe mpanjakavavy, araka izay fanao amin’ireny fety fampakaram-bady ireny. Toy izany koa ny anaran-dRavehivavy, natao hoe Solemita, izay mitovitovy amin’ny hoe Sonemita, ilay vadin’i Solomona (1Mpa 1.3).
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny firafitry ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Tsy ahitana rafitra hentitra ny Boky fa hita ho fanangonana tononkalo samihafa izay tsy misy fizorana ara-potoana. Fa izay marihina dia ny fifandimbiasan’ny olona miteny: Ankoatra an’izy roa dia misy olon-kafa miteny koa.'
