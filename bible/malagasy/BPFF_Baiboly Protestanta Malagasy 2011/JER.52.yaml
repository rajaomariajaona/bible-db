document_id: JER.52
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nosamborin’i Nebokadnezara i Zedekia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 25.1-7; 2Tan 36.11-13; ampit. Jer 39.1-7
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Iraika amby roapolo taona i Zedekia, raha nanomboka nanjaka, ary iraika amby folo taona no nanjakany tany Jerosalema; ary ny anaran’ny reniny dia Hamotala, zanakavavin’i Jeremia avy any Libna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nanao izay ratsy teo imason’NY TOMPO izy, araka izay rehetra fanaon’i Joiakima. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny fahatezeran’NY TOMPO no nahatongavan’izany tamin’i Jerosalema sy ny Joda ka nandroahany azy tsy ho eo anatrehany. Ary nikomy tamin’ny mpanjakan’i Babilona i Zedekia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’ny andro fahafolo tamin’ny volana fahafolo, tamin’ny taona fahasivy nanjakan’i Zedekia dia tonga i Nebokadnezara, mpanjakan’i Babilona, sy ny miaramilany rehetra, hamely an’i Jerosalema; nitoby tandrifiny izy sady nanao tovon-tany manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny tanàna dia nataony fahirano hatramin’ny fahiraika amby folo taona nanjakan’i Zedekia mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tamin’ny andro fahasivy tamin’ny volana fahefatra dia mafy ny mosary tao an-tanàna, fa tsy nisy hanina ho an’ny olona tompon-tany intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nisy voabanga ny tanàna, dia nandositra alina ny miaramila rehetra ka niala tao an-tanàna tamin’ny lalana mankany amin’ny vavahady teo anelanelan’ny manda roa, izay eo anilan’ny sahan’ny mpanjaka, fa ny Kaldeana mantsy dia nanodidina ny tanàna. Nandeha tamin’ny lalana mankeny amin’ny tany ngazana izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nanenjika ny mpanjaka ny miaramilan’ny Kaldeana ka nahatratra an’i Zedekia teny amin’ny tany ngazana any Jeriko; dia nipariaka nandao azy ny miaramilany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voasambotra ny mpanjaka ka noentiny niakatra ho any amin’ny mpanjakan’i Babilona tany Ribla any amin’ny tany Hamata, dia notsaraina tao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny mpanjakan’i Babilona dia namono ny zanakalahin’i Zedekia teo imason’ny rainy; ary ny mpanapaka ny Joda rehetra koa dia novonoiny tao Ribla. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary nopotsiriny ny mason’i Zedekia, dia nafatotry ny mpanjakan’i Babilona tamin’ny gadra varahina izy ka noentiny nankany Babilona ary nataony tao an-tranomaizina mandra-pahafatiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanapotika an’i Jerosalema i Nebozaradana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 25.8-21; ampit. Jer 39.8-10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’ny andro fahafolo tamin’ny volana fahadimy, tamin’ny taona fahasivy amby folo nanjakan’i Nebokadnezara, mpanjakan’i Babilona, dia tonga tany Jerosalema i Nebozaradana, lehiben’ny mpiambina, mpanompon’ny mpanjakan’i Babilona, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ka nandoro ny tranon’NY TOMPO sy ny tranon’ny mpanjaka mbamin’ny trano rehetra tany Jerosalema: Ny trano lehibe rehetra dia nodorany tamin’ny afo avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny manda rehetra manodidina an’i Jerosalema dia noravan’ny miaramilan’ny Kaldeana rehetra izay nanaraka ny lehiben’ny mpiambina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny sasany tamin’ny olona mahantra mbamin’ny olona sisa tao an-tanàna sy izay nandositra nanatona ny mpanjakan’i Babilona mbamin’ny vahoaka marobe sisa dia noentin’i Nebozaradana, lehiben’ny mpiambina, ho babo avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nefa ny olona mahantra dia namelan’i Nebozaradana, lehiben’ny mpiambina, ihany mba ho mpamboatra tanim-boaloboka sy ho mpiasa tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ireo andry varahina teo amin’ny tranon’NY TOMPO sy ny fitoerana koveta be sy ny koveta be varahina, izay teo amin’ny tranon’NY TOMPO, dia novakivakin’ny Kaldeana ka noentiny ho any Babilona ny varahina rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Noentiny koa ny vilany fandraofan-davenona, ny sotron’afo, ny antsy, ny lovia famafazana, ny lovia kely mbamin’ny fanaka varahina rehetra izay noentina nanaovana fanompoam-pivavahana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Noentin’ny lehiben’ny mpiambina koa ny lovia, ny fitoeran-davenon-jiro, ny lovia famafazana, ny fandraofan-davenona, ny fitoeran-jiro, ny lovia kely, ny kapoaka; na ny volamena na ny volafotsy dia samy noentin’ny lehiben’ny mpanapaka avokoa; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'lasany koa ny andry roa sy ny koveta lehibe iray ary ny omby varahina roa amby folo, izay teo ambanin’ny fitoeran’ny koveta lehibe, izay nataon’i Solomona mpanjaka ho an’ny tranon’NY TOMPO; ny varahina tamin’izany fanaka rehetra izany dia tsy hita lanja. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa ny andry, dia valo amby folo hakiho no haavony, ary roa amby folo hakiho ny manodidina azy; ary ny hateviny dia voantondro efatra, fa poakaty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nisy lohany varahina teo aminy; dimy hakiho no haavon’ny lohany iray ka nisy harato sy ampongabendanitra manodidina ny lohany, samy varahina avokoa izany. Ny andry faharoa koa sy ny ampongabendanitra dia mbola tahaka izany ihany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nisy ampongabendanitra enina amby sivifolo kosa teo ivelany; ary ny ampongabendanitra rehetra manodidina ny harato dia zato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny lehiben’ny mpiambina dia nisambotra an’i Seraia mpisoronabe sy i Zefania mpisorona manarakaraka azy ary ny mpiambina varavarana telo lahy; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: tao an-tanàna no nisamborany ny tandapa iray, mpifehy ny miaramila, ary fito lahy tamin’ireo mpitoetra eo anatrehan’ny mpanjaka, izay hita tao an-tanàna; nosamboriny koa ny mpitantsoratry ny lehiben’ny miaramila, izay mpandamina ny ho miaramila, sy ny olona tompon-tany enimpolo lahy izay hita teo an-tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nosamborin’i Nebozaradana, lehiben’ny mpiambina, ireo ka noentiny ho any amin’ny mpanjakan’i Babilona tao Ribla. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia novonoin’ny mpanjakan’i Babilona tao Ribla any amin’ny tany Hamata ireo. Toy izany no nitondrana ny Joda ho babo niala tamin’ny taniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izao no olona izay noentin’i Nebokadnezara ho babo: Tamin’ny taona fahafito dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' telo amby roapolo sy telo arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'tamin’ny taona fahavalo amby folo nanjakan’i Nebokadnezara dia roa amby telopolo sy valonjato no olona noentiny ho babo avy tany Jerosalema; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: tamin’ny taona fahatelo amby roapolo nanjakan’i Nebokadnezara dia Jiosy dimy amby efapolo sy fitonjato no noentin’i Nebozaradana, lehiben’ny mpiambina, ho babo. Ny tontalin’izy rehetra dia eninjato sy efatra arivo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nafahan’ny mpanjakan’i Babilona i Joiakina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 25.27-30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tamin’ny andro fahadimy amby roapolo tamin’ny volana faharoa amby folo, tamin’ny taona fahafito amby telopolo taorianan’ny namaboana an’i Joiakina, mpanjakan’ny Joda, tamin’ny taona vao nanjakan’i Evila-Merodaka, mpanjakan’i Babilona, dia nasandrany hiala tao an-tranomaizina i Joiakina, mpanjakan’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nitenenany soa izy ka ny sezafiandrianany dia nataony ambony noho ny sezafiandrianan’ireo mpanjaka namany tao Babilona. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa novan’i Joiakina ny fitafiany fony izy mbola tao an-tranomaizina; ary nihinan-kanina teo anatrehan’ny mpanjaka mandrakariva izy tamin’ny andro niainany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary ny fivelomany dia nomena tsy tapaka avy amin’ny mpanjakan’i Babilona, araka ny tokony ho anjarany isanandro isanandro tamin’ny andro rehetra niainany, mandra-pahafatiny.
