document_id: JER.52,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nosamborin’i Nebokadnezara i Zedekia
  - type: heading
    content: 2Mpa 25.1-7; 2Tan 36.11-13; ampit. Jer 39.1-7
  - type: text
    content: Iraika amby roapolo taona i Zedekia, raha nanomboka nanjaka, ary iraika amby folo taona no nanjakany tany Jerosalema; ary ny anaran’ny reniny dia Hamotala, zanakavavin’i Jeremia avy any Libna.
  '10':
  - type: text
    content: 'Ary ny mpanjakan’i Babilona dia namono ny zanakalahin’i Zedekia teo imason’ny rainy; ary ny mpanapaka ny Joda rehetra koa dia novonoiny tao Ribla. '
  '11':
  - type: text
    content: Ary nopotsiriny ny mason’i Zedekia, dia nafatotry ny mpanjakan’i Babilona tamin’ny gadra varahina izy ka noentiny nankany Babilona ary nataony tao an-tranomaizina mandra-pahafatiny.
  - type: heading
    content: Nanapotika an’i Jerosalema i Nebozaradana
  - type: heading
    content: 2Mpa 25.8-21; ampit. Jer 39.8-10
  '12':
  - type: text
    content: 'Tamin’ny andro fahafolo tamin’ny volana fahadimy, tamin’ny taona fahasivy amby folo nanjakan’i Nebokadnezara, mpanjakan’i Babilona, dia tonga tany Jerosalema i Nebozaradana, lehiben’ny mpiambina, mpanompon’ny mpanjakan’i Babilona, '
  '13':
  - type: text
    content: 'ka nandoro ny tranon’NY TOMPO sy ny tranon’ny mpanjaka mbamin’ny trano rehetra tany Jerosalema: Ny trano lehibe rehetra dia nodorany tamin’ny afo avokoa. '
  '14':
  - type: text
    content: Ary ny manda rehetra manodidina an’i Jerosalema dia noravan’ny miaramilan’ny Kaldeana rehetra izay nanaraka ny lehiben’ny mpiambina.
  '15':
  - type: text
    content: 'Ary ny sasany tamin’ny olona mahantra mbamin’ny olona sisa tao an-tanàna sy izay nandositra nanatona ny mpanjakan’i Babilona mbamin’ny vahoaka marobe sisa dia noentin’i Nebozaradana, lehiben’ny mpiambina, ho babo avokoa. '
  '16':
  - type: text
    content: Nefa ny olona mahantra dia namelan’i Nebozaradana, lehiben’ny mpiambina, ihany mba ho mpamboatra tanim-boaloboka sy ho mpiasa tany.
  '17':
  - type: text
    content: 'Ary ireo andry varahina teo amin’ny tranon’NY TOMPO sy ny fitoerana koveta be sy ny koveta be varahina, izay teo amin’ny tranon’NY TOMPO, dia novakivakin’ny Kaldeana ka noentiny ho any Babilona ny varahina rehetra. '
  '18':
  - type: text
    content: 'Noentiny koa ny vilany fandraofan-davenona, ny sotron’afo, ny antsy, ny lovia famafazana, ny lovia kely mbamin’ny fanaka varahina rehetra izay noentina nanaovana fanompoam-pivavahana. '
  '19':
  - type: text
    content: 'Noentin’ny lehiben’ny mpiambina koa ny lovia, ny fitoeran-davenon-jiro, ny lovia famafazana, ny fandraofan-davenona, ny fitoeran-jiro, ny lovia kely, ny kapoaka; na ny volamena na ny volafotsy dia samy noentin’ny lehiben’ny mpanapaka avokoa; '
  '2':
  - type: text
    content: 'Ary nanao izay ratsy teo imason’NY TOMPO izy, araka izay rehetra fanaon’i Joiakima. '
  '20':
  - type: text
    content: 'lasany koa ny andry roa sy ny koveta lehibe iray ary ny omby varahina roa amby folo, izay teo ambanin’ny fitoeran’ny koveta lehibe, izay nataon’i Solomona mpanjaka ho an’ny tranon’NY TOMPO; ny varahina tamin’izany fanaka rehetra izany dia tsy hita lanja. '
  '21':
  - type: text
    content: 'Fa ny andry, dia valo amby folo hakiho no haavony, ary roa amby folo hakiho ny manodidina azy; ary ny hateviny dia voantondro efatra, fa poakaty izy. '
  '22':
  - type: text
    content: 'Nisy lohany varahina teo aminy; dimy hakiho no haavon’ny lohany iray ka nisy harato sy ampongabendanitra manodidina ny lohany, samy varahina avokoa izany. Ny andry faharoa koa sy ny ampongabendanitra dia mbola tahaka izany ihany koa. '
  '23':
  - type: text
    content: Nisy ampongabendanitra enina amby sivifolo kosa teo ivelany; ary ny ampongabendanitra rehetra manodidina ny harato dia zato.
  '24':
  - type: text
    content: 'Ary ny lehiben’ny mpiambina dia nisambotra an’i Seraia mpisoronabe sy i Zefania mpisorona manarakaraka azy ary ny mpiambina varavarana telo lahy; '
  '25':
  - type: text
    content: tao an-tanàna no nisamborany ny tandapa iray, mpifehy ny miaramila, ary fito lahy tamin’ireo mpitoetra eo anatrehan’ny mpanjaka, izay hita tao an-tanàna; nosamboriny koa ny mpitantsoratry ny lehiben’ny miaramila, izay mpandamina ny ho miaramila, sy ny olona tompon-tany enimpolo lahy izay hita teo an-tanàna.
  '26':
  - type: text
    content: 'Nosamborin’i Nebozaradana, lehiben’ny mpiambina, ireo ka noentiny ho any amin’ny mpanjakan’i Babilona tao Ribla. '
  '27':
  - type: text
    content: Dia novonoin’ny mpanjakan’i Babilona tao Ribla any amin’ny tany Hamata ireo. Toy izany no nitondrana ny Joda ho babo niala tamin’ny taniny.
  '28':
  - type: text
    content: 'Izao no olona izay noentin’i Nebokadnezara ho babo: Tamin’ny taona fahafito dia '
  - type: text
    content: Jiosy
  - type: text
    content: ' telo amby roapolo sy telo arivo; '
  '29':
  - type: text
    content: 'tamin’ny taona fahavalo amby folo nanjakan’i Nebokadnezara dia roa amby telopolo sy valonjato no olona noentiny ho babo avy tany Jerosalema; '
  '3':
  - type: text
    content: Fa ny fahatezeran’NY TOMPO no nahatongavan’izany tamin’i Jerosalema sy ny Joda ka nandroahany azy tsy ho eo anatrehany. Ary nikomy tamin’ny mpanjakan’i Babilona i Zedekia.
  '30':
  - type: text
    content: tamin’ny taona fahatelo amby roapolo nanjakan’i Nebokadnezara dia Jiosy dimy amby efapolo sy fitonjato no noentin’i Nebozaradana, lehiben’ny mpiambina, ho babo. Ny tontalin’izy rehetra dia eninjato sy efatra arivo.
  - type: heading
    content: Nafahan’ny mpanjakan’i Babilona i Joiakina
  - type: heading
    content: 2Mpa 25.27-30
  '31':
  - type: text
    content: 'Tamin’ny andro fahadimy amby roapolo tamin’ny volana faharoa amby folo, tamin’ny taona fahafito amby telopolo taorianan’ny namaboana an’i Joiakina, mpanjakan’ny Joda, tamin’ny taona vao nanjakan’i Evila-Merodaka, mpanjakan’i Babilona, dia nasandrany hiala tao an-tranomaizina i Joiakina, mpanjakan’ny Joda. '
  '32':
  - type: text
    content: 'Dia nitenenany soa izy ka ny sezafiandrianany dia nataony ambony noho ny sezafiandrianan’ireo mpanjaka namany tao Babilona. '
  '33':
  - type: text
    content: 'Koa novan’i Joiakina ny fitafiany fony izy mbola tao an-tranomaizina; ary nihinan-kanina teo anatrehan’ny mpanjaka mandrakariva izy tamin’ny andro niainany rehetra. '
  '34':
  - type: text
    content: Ary ny fivelomany dia nomena tsy tapaka avy amin’ny mpanjakan’i Babilona, araka ny tokony ho anjarany isanandro isanandro tamin’ny andro rehetra niainany, mandra-pahafatiny.
  '4':
  - type: text
    content: 'Tamin’ny andro fahafolo tamin’ny volana fahafolo, tamin’ny taona fahasivy nanjakan’i Zedekia dia tonga i Nebokadnezara, mpanjakan’i Babilona, sy ny miaramilany rehetra, hamely an’i Jerosalema; nitoby tandrifiny izy sady nanao tovon-tany manodidina azy. '
  '5':
  - type: text
    content: Ary ny tanàna dia nataony fahirano hatramin’ny fahiraika amby folo taona nanjakan’i Zedekia mpanjaka.
  '6':
  - type: text
    content: 'Tamin’ny andro fahasivy tamin’ny volana fahefatra dia mafy ny mosary tao an-tanàna, fa tsy nisy hanina ho an’ny olona tompon-tany intsony. '
  '7':
  - type: text
    content: 'Ary nisy voabanga ny tanàna, dia nandositra alina ny miaramila rehetra ka niala tao an-tanàna tamin’ny lalana mankany amin’ny vavahady teo anelanelan’ny manda roa, izay eo anilan’ny sahan’ny mpanjaka, fa ny Kaldeana mantsy dia nanodidina ny tanàna. Nandeha tamin’ny lalana mankeny amin’ny tany ngazana izy ireo. '
  '8':
  - type: text
    content: 'Ary nanenjika ny mpanjaka ny miaramilan’ny Kaldeana ka nahatratra an’i Zedekia teny amin’ny tany ngazana any Jeriko; dia nipariaka nandao azy ny miaramilany rehetra. '
  '9':
  - type: text
    content: 'Voasambotra ny mpanjaka ka noentiny niakatra ho any amin’ny mpanjakan’i Babilona tany Ribla any amin’ny tany Hamata, dia notsaraina tao izy. '
