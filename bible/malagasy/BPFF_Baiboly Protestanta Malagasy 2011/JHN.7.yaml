document_id: JHN.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy mino an’i Jesosy ny rahalahiny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorianan’izay dia nitety tany Galilia Jesosy; fa tsy te hitety an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' Izy satria nitady hahafaty Azy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa lasa niakatra ho amin’ny andro firavoravoana ny rahalahiny dia niakatra koa Izy, nefa tsy mba nisehoseho fa toa niafinafina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' dia nitady Azy tamin’ny andro firavoravoana ka niteny hoe: Aiza Izy? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitakoritsika Azy be ihany ny vahoaka. Hoy ny sasany: Tsara fanahy Izy; fa hoy kosa ny sasany: Tsia; fa mamitaka ny vahoaka Izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa tsy nisy sahy niresaka Azy miharihary noho ny fahatahorany ny Jiosy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nisasaka ny andro firavoravoana dia niakatra tao amin’ny tempoly Jesosy ka nampianatra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaga ny Jiosy ka niteny hoe: Ahoana no nahaizan’Ilehity ny Soratra, nefa tsy mba nianatra Izy? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navalin’i Jesosy azy hoe: Tsy Ahy ny fampianarako fa an’Izay naniraka Ahy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona ta hanao ny sitrapony dia hahalala ny amin’ny fampianarana izy, na avy amin’Andriamanitra izany na miteny amin’ny fahefan’ny tenako Aho. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay miteny amin’ny fahefan’ny tenany dia mitady ny voninahitry ny tenany; fa izay mitady ny voninahitr’izay naniraka azy no marina, ary tsy misy tsy fahamarinana ao aminy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy i Mosesy va no nanome anareo ny lalàna? Nefa tsy misy eo aminareo mankatò ny lalàna. Nahoana ianareo no mitady hamono Ahy? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa akaiky moa ny andro firavoravoan’ny Jiosy, dia ny fetin’ny Trano rantsan-kazo, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny vahoaka hoe: Manana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' Ianao; iza no mitady hamono Anao? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalin’i Jesosy hoe: Asa iray loha ihany no nataoko, dia gaga avokoa ianareo rehetra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no nanomezan’i Mosesy anareo ny famorana: Tsy noho izy avy tamin’i Mosesy, fa noho izy avy tamin’ny razana, koa na amin’ny Sabata aza dia mamora olona ihany ianareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha amin’ny Sabata aza no amorana olona mba tsy hahafoana ny lalànan’i Mosesy dia ho tezitra Amiko va ianareo satria nisy olona iray nositraniko ny tenany manontolo tamin’ny Sabata. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mitsara araka ny miseho fa mba mitsarà marina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy va no ilay Kristy?
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mponina sasany tany Jerosalema dia niteny hoe: Tsy Ilehity va ilay tadiaviny hovonoina? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro Izy izao miteny miharihary, nefa tsy misy miteny Azy akory. Efa fantatry ny mpitondra tokoa va fa io no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatsika izao anefa ny niavian’Ilehio, fa raha avy Kristy dia tsy misy mahalala izay hiaviany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nampianatra tao amin’ny tempoly Jesosy dia niantso hoe: Izaho dia fantatrareo, sady fantatrareo koa izay niaviako; ary tsy avy amin’ny fahefan’ny tenako Aho, fa marina ny naniraka Ahy, izay tsy fantatrareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho mahalala Azy; fa Izy no niaviako, koa Izy no naniraka Ahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa hoy ny rahalahiny Taminy: Mialà eto Ianao ka mandehana ho any Jodia mba ho hitan’ny mpianatrao koa ny asa izay ataonao; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitady hisambotra Azy ny olona; kanefa tsy nisy nahakasi-tanana Azy, satria tsy mbola tonga ny fotoanandrony.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maro ny vahoaka no nino Azy ka niteny hoe: Raha tonga Kristy, moa hanao famantarana maro mihoatra noho ny nataon’ity Lehilahy ity va Izy?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voairaka hisambotra an’i Jesosy ny mpiambina
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandre ny vahoaka nitakoritsika izany zavatra izany ny Aminy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' ka naniraka mpiambina hisambotra Azy, ireo lehiben’ny mpisorona sy ny Fariseo.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy: Kely foana no mbola itoerako aminareo dia hankany amin’izay naniraka Ahy Aho. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitady Ahy ianareo fa tsy hahita; ary izay itoerako dia tsy azonareo aleha. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifampiresaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' hoe: Aiza moa no halehan’Ilehity no tsy ho hitantsika? Hankany amin’izay miely any amin’ny Grika va Izy ka hampianatra ny Grika? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahoana moa izao teny nolazainy izao hoe: Hitady Ahy ianareo nefa tsy hahita; ary izay itoerako dia tsy ho azonareo aleha?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Onin’ny rano velona
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro farany, izay andro lehibe tamin’ny andro firavoravoana, dia nitsangana Jesosy ka niantso hoe: Raha misy olona mangetaheta, aoka izy hanatona Ahy ka hisotro. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mino Ahy dia hisy onin’ny rano velona hiboiboika avy ao aminy, araka ny voalazan’ny Soratra Masina. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny Fanahy, izay efa horaisin’ny mino Azy, no nolazainy tamin’izany; fa ny Fanahy tsy mbola nomena satria Jesosy tsy mbola niditra tamin’ny voninahiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nisara-tsaina ny amin’i Jesosy ny vahoaka
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tsy misy olona manao zavatra amin’ny takona, nefa ny tenany dia mitady ho hita miharihary; raha manao izao zavatra izao Ianao dia misehoa amin’izao tontolo izao. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sasany tamin’ny vahoaka, raha nandre izany teny izany, dia nilaza hoe: Ity tokoa no ilay Mpaminany. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa ny sasany: Ity no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. Ary hoy kosa ny sasany: Avy any Galilia va no iavian’i Kristy? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy voalazan’ny Soratra Masina va fa Kristy dia avy amin’ny taranak’i Davida sady avy ao Betlehema, vohitra nonenan’i Davida (Mik 5.1)? '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisara-tsaina ny amin’i Jesosy ny vahoaka. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nitady hisambotra Azy ny sasany; kanefa tsy nisy nahakasi-tanana Azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tsy finoan’ny mpitondra
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niverina nankeo amin’ireo lehiben’ny mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' ireo mpiambina ka nanontaniany hoe: Nahoana ianareo no tsy nitondra Azy? '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ireo mpiambina hoe: Tsy mbola nisy olona niteny tahaka izany. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny Fariseo tamin’izy ireo hoe: Voafitaka koa va ianareo? '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa misy mpanapaka na Fariseo mba nino Azy? '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa voaozona ireto vahoaka ireto, izay tsy mahalala ny lalàna. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa na dia ny rahalahiny aza tsy nino Azy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Nikodemosy izay iray tamin’ireo mpanapaka, ilay efa niresaka tamin’i Jesosy teo aloha, dia niteny tamin’ireo hoe: '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa manameloka olona va ny lalànantsika, raha tsy mbola mihaino azy aloha ka mahafantatra izay nataony? '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy izy ireo taminy: Ianao koa angaha mba avy any Galilia? Diniho, dia ho hitanao fa tsy mba misy mpaminany avy any Galilia.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ilay vehivavy nijangajanga
    marker-yv: yv-h
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia samy lasa nody ho any an-tranony avy izy rehetra.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy taminy: Tsy mbola tonga ny fotoanandroko; fa ny fotoananareo dia vonona lalandava. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy afaka mankahala anareo izao tontolo izao; fa Izaho no halany satria Izaho milaza fa ratsy ny asany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miakara any amin’ny andro firavoravoana ianareo; fa Izaho tsy mbola hiakatra ho amin’ity andro firavoravoana ity satria tsy mbola tonga ny fotoanandroko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa avy nilaza ireo teny ireo taminy Izy dia mbola nitoetra tany Galilia ihany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy tany amin’ny fetin’ny Trano rantsan-kazo
    marker-yv: yv-h
