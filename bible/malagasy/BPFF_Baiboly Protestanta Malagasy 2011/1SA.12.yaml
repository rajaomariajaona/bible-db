document_id: 1SA.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teny fanaovam-beloma nataon’i Samoela
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Samoela tamin’ny Israely rehetra: Indro, efa nihaino ny teninareo aho tamin’izay rehetra nolazainareo tamiko ka efa nanendry mpanjaka hanjaka aminareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitaraina tamin’NY TOMPO izy hoe: Efa nanota izahay satria efa nahafoy NY TOMPO ka nanompo ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' sy ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Astarta
    - type: text
      text: ', nefa ankehitriny, vonjeo amin’ny tanan’ny fahavalonay izahay dia hanompo Anao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO naniraka an’i Jerobaala sy i Bedana sy i Jefta ary i Samoela ka namonjy anareo tamin’ny tanan’ny fahavalonareo manodidina Izy dia nandry fehizay ianareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo nony hitanareo fa avy hiady taminareo i Nahasy, mpanjakan’ny Amonita, dia hoy ianareo tamiko: Tsia, fa aoka hisy mpanjaka hanjaka aminay; kanefa NY TOMPO Andriamanitrareo no mpanjakanareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, indro ny mpanjaka izay nofidinareo sy nangatahinareo; indro NY TOMPO no nanome mpanjaka hanjaka aminareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enga anie ka hatahotra NY TOMPO sy hanompo Azy ary hihaino ny feony ianareo ka tsy handa ny didiny fa samy hanaraka NY TOMPO Andriamanitrareo sy ny mpanjaka izay manjaka aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tsy mihaino ny tenin’NY TOMPO kosa ianareo fa mandà ny didiny dia hamely anareo ny tanan’NY TOMPO, tahaka ny namelezany ny razanareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mitsangàna ankehitriny ka jereo izao zavatra lehibe hataon’NY TOMPO eto imasonareo izao: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa tsy taom-pijinjana varimbazaha va izao? Hiantso NY TOMPO aho, ary hahatonga kotrokorana sy orana Izy, dia ho hitanareo sy ho fantatrareo fa lehibe ny ratsy nataonareo teo imason’NY TOMPO, satria nangataka mpanjaka ianareo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso NY TOMPO i Samoela, ary NY TOMPO nahatonga kotrokorana sy orana tamin’io andro io ihany; ary natahotra indrindra NY TOMPO sy i Samoela ny vahoaka rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny vahoaka rehetra tamin’i Samoela: Mifonà amin’NY TOMPO Andriamanitrao ho an’ny mpanomponao mba tsy ho faty izahay! Fa efa nanao izao ratsy izao izahay ho fanampin’ny fahotanay rehetra, noho ny nangatahanay mpanjaka. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, indro, ny mpanjaka no handeha eo anatrehanareo; fa efa antitra sy fotsy volo aho; ary indreo, eo aminareo ny zanako; efa nandeha teo anatrehanareo aho hatry ny fony vao zaza ka mandraka androany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Samoela tamin’ny vahoaka: Aza matahotra; efa nanao izany ratsy rehetra izany tokoa ianareo; kanefa aza mivily hiala amin’NY TOMPO fa manompoa Azy amin’ny fonareo manontolo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, aza mivily, fandrao hanaraka ireo zava-poana izay tsy mahasoa na mahavonjy ianareo, fa zava-poana ireo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa NY TOMPO tsy hahafoy ny olony noho ny anarany lehibe, satria sitraky NY TOMPO ny nanaovany anareo ho olony. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny amiko, sanatria raha hanota amin’NY TOMPO aho ka hitsahatra tsy hangataka ho anareo; fa hanoro anareo izay lalana tsara sy mahitsy aho. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa matahora NY TOMPO ianareo ka manompoa Azy marina amin’ny fonareo manontolo; ary eritrereto izao zavatra lehibe nataony ho anareo izao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha mbola manao ratsy ihany ianareo dia haringana ianareo sy ny mpanjakanareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa inty aho; tondroy maso eto anatrehan’NY TOMPO sy ny olom-boahosony: Ombin’iza moa no nalaiko? Borikin’iza no nalaiko? An’iza no nanaovako an-keriny? Iza no nampahoriko? Teo an-tanan’iza no nandraisako kolikoly hahatampina ny masoko? Fa honerako aminareo izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ireo: Tsy nanao an-keriny taminay ianao, na nampahory anay, na naka zavatra teny an-tanan’olona na dia iray akory aza. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Samoela taminy: Vavolombelona aminareo NY TOMPO anio, ary vavolombelona koa ny olom-boahosony, fa tsy nisy zavatra hitanareo teo an-tanako na inona na inona. Dia hoy ireo: Eny, vavolombelona Izy.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Samoela tamin’ny olona: NY TOMPO no nanendry an’i Mosesy sy Arona ary nitondra ny razanareo niakatra avy tany amin’ny tany Ejipta. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, avia ianareo, fa hifandahatra aminareo eto anatrehan’NY TOMPO aho ny amin’ny asa marina rehetra izay nataon’NY TOMPO taminareo sy ny razanareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga tany Ejipta i Jakoba ka nitaraina tamin’NY TOMPO ny razanareo dia naniraka an’i Mosesy sy i Arona NY TOMPO, koa ireo no nitondra ny razanareo nivoaka avy tany Ejipta ary namponina azy teto amin’ity tany ity. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa rehefa nanadino an’Andriamanitra, Tompon’izao rehetra izao, izy dia namidiny ho eo an-tanan’i Sisera, komandin’ny miaramilan’i Hazora sy ho eo an-tanan’ny Filistina ary ho eo an-tanan’ny mpanjakan’i Moaba ka niadian’ireo. '
