document_id: PHM.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I Paoly, mpifatotra noho ny amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy, sy i Timoty rahalahy, no mamangy an’i Filemona, ilay malalanay sy mpiara-miasa aminay, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Eny, miangavy anao aho ny amin’ny zanako izay naterako teto amin’ny fifatorako, dia i Onesimosy, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ilay tsy nahasoa anao fahiny, nefa mahasoa antsika ankehitriny; dia ianao sy izaho; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: averiko atỳ aminao indray izy izay sombin’ny aiko.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Saika nohazoniko tatỳ amiko izy mba hanompo ahy hisolo anao eto amin’ny fifatorako noho ny Filazantsara, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: nefa raha tsy mahalala izay hevitrao aho aloha dia tsy ta hanao na inona na inona mba tsy ho toy ny an-tery ny soa ataonao fa an-tsitrapo.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Izany angamba no nialany vetivety teo aminao mba hanananao azy mandrakizay, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'tsy ho toy ny andevo intsony anefa fa mihoatra noho ny andevo: Rahalahy malala indrindra ho ahy izy, mainka fa ho anao, na ao amin’ny nofo na ao amin’ny Tompo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa raha ataonao fa namanao aho dia raiso toa ahy izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Raha nanao izay tsy marina taminao izy na nitrosa taminao dia ataovy ho anjarako izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Izaho Paoly no manoratra izany amin’ny tanako, izaho no handoa izany, mba tsy hilazako aminao fa ianao mihitsy indray no manan-trosa amiko. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: mamangy an’i Apia anabavinay koa sy i Arkipo, miaramila namantsika, ary ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' ao an-tranonao: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Eny, ry rahalahy, mba ataovy ho fifaliako avy aminao ao amin’ny Tompo izany; ampandrio ny saiko noho ny amin’i Kristy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatra sy fanaovam-beloma
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Noho ny fahatokiako fa hanaiky ianao no anoratako aminao, koa fantatro fa hanao mihoatra noho izay lazaiko aza ianao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary izao koa: Mba anomany efitrano hitoerako aho; fa manantena aho fa hahazo fahafahana noho ny vavaka ataonareo.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Manao veloma anao i Epafra, mpifatotra namako ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: i Marka, i Aristarko, i Demasy ary i Lioka, mpiara-miasa amiko.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ho amin’ny fanahinareo anie ny fahasoavan’i Jesosy Kristy Tompo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitiavana sy finoan’i Filemona
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Misaotra an’Andriamanitro mandrakariva aho raha mahatsiaro anao amin’ny vavaka ataoko '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'satria reko ny fitiavanao sy ny finoana izay anananao ny amin’i Jesosy Tompo sy ho an’ny olona masina rehetra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mba hiasa mafy ho an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' anie ny fiombonana avy amin’ny finoanao, amin’ny fahalalana ny zavatra tsara rehetra izay ao anatintsika! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa nanana fifaliana sy fiononana amin’ny fitiavanao aho, ry rahalahy, satria efa novelombelominao ny fon’ny olona masina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tokony handraisan’i Filemona an’i Onesimosy
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa na dia manana fahasahiana be ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' handidy anao amin’izay mendrika aza aho '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'dia aleoko, izaho Paoly izay efa antitra sady mpifatotra noho ny amin’i Kristy Jesosy no miangavy anao ankehitriny noho ny fitiavana. '
