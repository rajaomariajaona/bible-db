document_id: PHM.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Paoly, mpifatotra noho ny amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy, sy i Timoty rahalahy, no mamangy an’i Filemona, ilay malalanay sy mpiara-miasa aminay, '
  '10':
  - type: text
    content: 'Eny, miangavy anao aho ny amin’ny zanako izay naterako teto amin’ny fifatorako, dia i Onesimosy, '
  '11':
  - type: text
    content: 'ilay tsy nahasoa anao fahiny, nefa mahasoa antsika ankehitriny; dia ianao sy izaho; '
  '12':
  - type: text
    content: averiko atỳ aminao indray izy izay sombin’ny aiko.
  '13':
  - type: text
    content: 'Saika nohazoniko tatỳ amiko izy mba hanompo ahy hisolo anao eto amin’ny fifatorako noho ny Filazantsara, '
  '14':
  - type: text
    content: nefa raha tsy mahalala izay hevitrao aho aloha dia tsy ta hanao na inona na inona mba tsy ho toy ny an-tery ny soa ataonao fa an-tsitrapo.
  '15':
  - type: text
    content: 'Izany angamba no nialany vetivety teo aminao mba hanananao azy mandrakizay, '
  '16':
  - type: text
    content: 'tsy ho toy ny andevo intsony anefa fa mihoatra noho ny andevo: Rahalahy malala indrindra ho ahy izy, mainka fa ho anao, na ao amin’ny nofo na ao amin’ny Tompo. '
  '17':
  - type: text
    content: 'Koa raha ataonao fa namanao aho dia raiso toa ahy izy. '
  '18':
  - type: text
    content: 'Raha nanao izay tsy marina taminao izy na nitrosa taminao dia ataovy ho anjarako izany. '
  '19':
  - type: text
    content: 'Izaho Paoly no manoratra izany amin’ny tanako, izaho no handoa izany, mba tsy hilazako aminao fa ianao mihitsy indray no manan-trosa amiko. '
  '2':
  - type: text
    content: mamangy an’i Apia anabavinay koa sy i Arkipo, miaramila namantsika, ary ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' ao an-tranonao: '
  '20':
  - type: text
    content: Eny, ry rahalahy, mba ataovy ho fifaliako avy aminao ao amin’ny Tompo izany; ampandrio ny saiko noho ny amin’i Kristy.
  - type: heading
    content: Hafatra sy fanaovam-beloma
  '21':
  - type: text
    content: 'Noho ny fahatokiako fa hanaiky ianao no anoratako aminao, koa fantatro fa hanao mihoatra noho izay lazaiko aza ianao. '
  '22':
  - type: text
    content: 'Ary izao koa: Mba anomany efitrano hitoerako aho; fa manantena aho fa hahazo fahafahana noho ny vavaka ataonareo.'
  '23':
  - type: text
    content: 'Manao veloma anao i Epafra, mpifatotra namako ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy, '
  '24':
  - type: text
    content: i Marka, i Aristarko, i Demasy ary i Lioka, mpiara-miasa amiko.
  '25':
  - type: text
    content: Ho amin’ny fanahinareo anie ny fahasoavan’i Jesosy Kristy Tompo.
  '3':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
  - type: heading
    content: Ny fitiavana sy finoan’i Filemona
  '4':
  - type: text
    content: 'Misaotra an’Andriamanitro mandrakariva aho raha mahatsiaro anao amin’ny vavaka ataoko '
  '5':
  - type: text
    content: 'satria reko ny fitiavanao sy ny finoana izay anananao ny amin’i Jesosy Tompo sy ho an’ny olona masina rehetra. '
  '6':
  - type: text
    content: 'Mba hiasa mafy ho an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' anie ny fiombonana avy amin’ny finoanao, amin’ny fahalalana ny zavatra tsara rehetra izay ao anatintsika! '
  '7':
  - type: text
    content: Fa nanana fifaliana sy fiononana amin’ny fitiavanao aho, ry rahalahy, satria efa novelombelominao ny fon’ny olona masina.
  - type: heading
    content: Ny tokony handraisan’i Filemona an’i Onesimosy
  '8':
  - type: text
    content: 'Koa na dia manana fahasahiana be ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' handidy anao amin’izay mendrika aza aho '
  '9':
  - type: text
    content: 'dia aleoko, izaho Paoly izay efa antitra sady mpifatotra noho ny amin’i Kristy Jesosy no miangavy anao ankehitriny noho ny fitiavana. '
