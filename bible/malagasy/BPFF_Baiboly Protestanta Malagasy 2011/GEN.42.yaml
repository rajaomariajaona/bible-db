document_id: GEN.42,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandefa ireo zanany ho any Ejipta i Jakoba
  - type: text
    content: 'Fantatr’i Jakoba koa fa nisy vary tany Ejipta ka hoy izy tamin’ireo zanany lahy: Nahoana no mifampijery foana eo ianareo? '
  '10':
  - type: text
    content: 'Fa hoy ireo taminy: Tsia, tompokolahy, fa tonga mba hividy hanina ny mpanomponao. '
  '11':
  - type: text
    content: 'Zanaky ny lehilahy iray ihany izahay rehetra; olo-marina izahay fa tsy mba mpitsikilo tsy akory ny mpanomponao! '
  '12':
  - type: text
    content: 'Hoy i Josefa tamin’izy ireo: Tsia! Fa hizaha ny fangadihadin’ny tany no nahatongavanareo! '
  '13':
  - type: text
    content: 'Hoy izy ireo: Roa amby folo mirahalahy ny mpanomponao, zanaky ny lehilahy iray ihany any amin’ny tany Kanana; ary indro, ny faralahy dia any amin’ny rainay ankehitriny, fa ny iray dia tsy ao intsony. '
  '14':
  - type: text
    content: 'Dia hoy i Josefa taminy: Io ilay voalazako taminareo hoe: Mpitsikilo ianareo! '
  '15':
  - type: text
    content: 'Izao ary no porofo hamantarana anareo: Raha velona koa i Farao, tsy hiala atỳ ianareo raha tsy tonga atỳ izany zandrinareo faralahy izany. '
  '16':
  - type: text
    content: 'Iraho ny iray aminareo, ary aoka izy haka ny zandrinareo, fa hafatotra ianareo mba hahazoana mamantatra ny teninareo raha marina na tsia; fa raha tsy izany, raha velona koa i Farao, dia mpitsikilo tokoa ianareo! '
  '17':
  - type: text
    content: Dia nataony tao an-tranomaizina hateloana izy rehetra.
  '18':
  - type: text
    content: 'Nony tamin’ny andro fahatelo dia hoy i Josefa tamin’izy ireo: Izao no ataovy, dia ho velona ianareo, satria izaho dia matahotra an’Andriamanitra: '
  '19':
  - type: text
    content: 'Raha olo-marina ary ianareo dia aoka ny iray aminareo mirahalahy ireo no hafatotra ao amin’ny tranomaizina nitoeranareo; ary mandehana ianareo mitondra vary any amin’ny tranonareo noho ny mosary; '
  '2':
  - type: text
    content: 'Hoy koa izy: Reko fa misy vary any Ejipta; andeha midina any ianareo ka mividiana ho antsika mba ho velona isika fa tsy ho faty. '
  '20':
  - type: text
    content: 'ento mankaty amiko ny zandrinareo faralahy; dia ho hita fa marina ny teninareo ka tsy hovonoina ianareo. Dia nataon’izy ireo izany. '
  '21':
  - type: text
    content: 'Ary niresaka izy ireo hoe: Meloka tokoa isika noho ny amin’ny rahalahintsika, satria nahita ny fahoriany isika raha nitaraina tamintsika izy nefa tsy mba nihaino isika. Koa izany no nahatongavan’izao fahoriana izao amintsika. '
  '22':
  - type: text
    content: 'Hoy i Robena taminy: Moa tsy efa niteny taminareo va aho hoe: Aza manota amin’ny zaza? Nefa tsy mba nihaino ianareo. Koa indro, adinina amintsika izao ny rany! '
  '23':
  - type: text
    content: 'Tsy fantatr’izy ireo fa nahafantatra ny teniny i Josefa satria nisy mpandika teny niresahany taminy. '
  '24':
  - type: text
    content: Dia nihodina niala teo i Josefa ka nitomany. Avy eo, niverina nankeo indray izy ka niresaka tamin’izy ireo, dia naka an’i Simeona teo aminy izy ka namatotra azy teo imasony.
  - type: heading
    content: Niverina nankany Kanana ireo zanak’i Jakoba
  '25':
  - type: text
    content: 'Nanome teny i Josefa mba hofenoina vary ny lasakany ary haverina ho ao anatin’ny lasakany avy ny volan’ny isan-dahy; nasainy nomena vatsy koa izy ireo hoentiny eny an-dalana. Nataony tamin’izy ireo izany. '
  '26':
  - type: text
    content: 'Dia nataingin’izy ireo tamin’ny borikiny avy ny vary ka lasa izy ireo nandeha. '
  '27':
  - type: text
    content: 'Rehefa nosokafan’ny iray ny lasakany hampihinanany ny borikiny teo amin’izay handriany dia indro, hitany ny volany teo am-bavan’ny lasakany ihany. '
  '28':
  - type: text
    content: 'Dia hoy izy tamin’ireo rahalahiny: Naverina ny volako ka indro, ao anatin’ny lasakako! Dia ketraka ny fony ary nifampijery tamin-tahotra izy ireo ka niresaka hoe: Inona izao ataon’Andriamanitra amintsika izao?'
  '29':
  - type: text
    content: 'Nony tonga tany amin’i Jakoba rainy tany amin’ny tany Kanana izy ireo dia nambaran’izy ireo taminy izay rehetra nanjo azy ka hoy izy ireo: '
  '3':
  - type: text
    content: 'Dia lasa nidina izy folo lahy rahalahin’i Josefa mba hividy vary any Ejipta. '
  '30':
  - type: text
    content: 'Mafy ny teny nataon-dRalehilahy tompon’ny tany taminay, fa nataony ho mpitsikilo izahay. '
  '31':
  - type: text
    content: 'Nefa hoy izahay taminy: Olo-marina izahay fa tsy mba mpitsikilo akory! '
  '32':
  - type: text
    content: 'Roa amby folo mirahalahy izahay no zanaky ny rainay; tsy ao intsony ny iray, ary ny faralahy dia any amin’ny rainay any amin’ny tany Kanana ankehitriny. '
  '33':
  - type: text
    content: 'Dia hoy Ralehilahy tompon-tany taminay: Izao ary no porofo hahafantarako fa olo-marina ianareo: Ny iray aminareo mirahalahy ireo dia avelao atỳ amiko, fa mitondrà vary noho ny mosary any amin’ny tranonareo dia mandehana. '
  '34':
  - type: text
    content: Ary ento mankaty amiko ny zandrinareo faralahy dia ho fantatro fa tsy mba mpitsikilo ianareo fa olo-marina; dia homeko anareo ny rahalahinareo ka hahazo hivarotra eto amin’ny tany ianareo.
  '35':
  - type: text
    content: 'Ary rehefa nandraraka izay tao anatin’ny lasakany izy ireo dia indro, ny volany dia tao am-ponosana samy tao anatin’ny lasakany avy. Nony nahita ny volany tao am-ponosana izy ireo sy ny rainy dia samy raiki-tahotra. '
  '36':
  - type: text
    content: 'Dia hoy i Jakoba rainy tamin’izy ireo: Tsy hanan-janaka intsony aho izany aminareo! I Josefa dia tsy eto intsony, i Simeona koa dia tsy eto intsony ary i Benjamina indray dia halainareo! Izaho ihany no ianjadian’izany rehetra izany! '
  '37':
  - type: text
    content: 'Dia niteny tamin’ny rainy i Robena hoe: Vonoy ny zanako roa lahy raha tsy mitondra azy miverina atỳ aminao aho! Atolory eto an-tanako izy fa izaho no hitondra azy mody ho atỳ aminao indray. '
  '38':
  - type: text
    content: 'Dia hoy i Jakoba: Tsy hidina miaraka aminareo ny zanako; efa maty ny rahalahiny, ary izy irery ihany no sisa; ary raha misy loza manjo azy any amin’ny lalana izay halehanareo dia hampidininareo any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' amin’alahelo ny volofotsiko.'
  '4':
  - type: text
    content: 'Fa tsy mba nalefan’i Jakoba niaraka tamin’ny rahalahiny i Benjamina rahalahin’i Josefa, fandrao, hoy izy, hisy loza hanjo azy. '
  '5':
  - type: text
    content: Dia tonga ny zanak’Israely mba hividy vary, niaraka tamin’ny olona izay nankany Ejipta, fa tratry ny mosary koa ny tany Kanana.
  - type: heading
    content: Nasiaka tamin’ireo rahalahiny i Josefa
  '6':
  - type: text
    content: 'I Josefa no mpanapaka tamin’ny tany, sady izy no mpivaro-bary tamin’ny tompon-tany rehetra. Ary tonga ny rahalahin’i Josefa ka niankohoka tamin’ny tany teo anatrehany. '
  '7':
  - type: text
    content: 'Rehefa hitan’i Josefa ireo rahalahiny dia fantany ihany, nefa nody olon-kafa taminy izy ka niteny mafy tamin’izy ireo hoe: Avy aiza ianareo? Dia hoy ny rahalahiny: Avy any amin’ny tany Kanana izahay mba hividy hanina. '
  '8':
  - type: text
    content: 'Fantatr’i Josefa ny rahalahiny fa izy ireo kosa dia tsy mba nahafantatra azy. '
  '9':
  - type: text
    content: 'Tsaroan’i Josefa ireo nofiny momba azy ireo ka hoy izy taminy hoe: Mpitsikilo ianareo; hizaha ny fangadihadin’ny tany no nahatongavanareo! '
