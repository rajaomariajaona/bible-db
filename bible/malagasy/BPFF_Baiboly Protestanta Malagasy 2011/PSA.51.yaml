document_id: PSA.51
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka mba hahazoana famelan-keloka
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida, fony i Natana mpaminany nankao aminy, rehefa naka an’i Batseba izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mamindrà fo amiko, Andriamanitra ô, araka ny fahasoavanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny haben’ny fiantranao, vonoy ny fahadisoako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sasao madio aho mba ho afa-keloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary diovy aho mba ho afa-pahotana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa tsaroako ny fahadisoako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo anatrehako mandrakariva ny fahotako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Taminao dia taminao ihany no nanotako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay ratsy eo imasonao no nataoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho marina Ianao raha miteny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hanan-tsiny Ianao raha mitsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, tamin’ny heloka no niterahana ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tamin’ny fahotana no notorontoronina ahy ny reniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Indro, fahamarinana ao am-po no sitrakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fahendrena ao amin’ny miafina no ampahafantarinao ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Diovy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hisopa
  - type: text
    text: ' aho ho afa-pahotana dia hadio;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sasao aho dia ho fotsy noho ny orampanala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ampandreneso fifaliana sy faharavoana aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hifalian’ny taolana izay voavakivakinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Afeno ny tavanao ny fahotako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vonoy ny heloko rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Amoròny fo madio aho, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampioreno fanahy vaovao ato anatiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aza manary ahy hiala eo anatrehanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza manaisotra ny Fanahinao Masina amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ampodio amiko ny fifaliana amin’ny famonjenao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tohàny fanahy mazoto aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia hampianatra ny olon-diso ny lalanao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny mpanota dia hiverina aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vonjeo ho afaka amin’ny valin-dra aho, Andriamanitra ô, Andriamanitry ny famonjena ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihoby ny fahamarinanao ny lelako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tompo ô, sokafy ny molotro
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanambara ny fiderana Anao ny vavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa tsy fanatitra no sitrakao; raha izany dia nomeko ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanatitra dorana manontolo dia tsy mahafaly Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fanatitra ho an’Andriamanitra dia fanahy torotoro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fo torotoro sy mangorakoraka, Andriamanitra ô, tsy mba ataonao tsinontsinona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Manaova soa amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' araka ny fahasoavanao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy ny mandan’i Jerosalema!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia ho sitrakao ny fanatitra amim-pahamarinana sy ny fanatitra dorana manontolo ary ny fanatitra levonina amin’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanatitra vantotra ombilahy eo amin’ny alitaranao ny olona.
