document_id: PSA.51,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka mba hahazoana famelan-keloka
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida, fony i Natana mpaminany nankao aminy, rehefa naka an’i Batseba izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamindrà fo amiko, Andriamanitra ô, araka ny fahasoavanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny haben’ny fiantranao, vonoy ny fahadisoako!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amoròny fo madio aho, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampioreno fanahy vaovao ato anatiko.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manary ahy hiala eo anatrehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza manaisotra ny Fanahinao Masina amiko.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampodio amiko ny fifaliana amin’ny famonjenao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tohàny fanahy mazoto aho!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hampianatra ny olon-diso ny lalanao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ny mpanota dia hiverina aminao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo ho afaka amin’ny valin-dra aho, Andriamanitra ô, Andriamanitry ny famonjena ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hihoby ny fahamarinanao ny lelako.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, sokafy ny molotro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanambara ny fiderana Anao ny vavako.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy fanatitra no sitrakao; raha izany dia nomeko ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanatitra dorana manontolo dia tsy mahafaly Anao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanatitra ho an’Andriamanitra dia fanahy torotoro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fo torotoro sy mangorakoraka, Andriamanitra ô, tsy mba ataonao tsinontsinona.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Manaova soa amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' araka ny fahasoavanao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataovy ny mandan’i Jerosalema!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho sitrakao ny fanatitra amim-pahamarinana sy ny fanatitra dorana manontolo ary ny fanatitra levonina amin’ny afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanatitra vantotra ombilahy eo amin’ny alitaranao ny olona.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sasao madio aho mba ho afa-keloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary diovy aho mba ho afa-pahotana!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsaroako ny fahadisoako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eo anatrehako mandrakariva ny fahotako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taminao dia taminao ihany no nanotako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay ratsy eo imasonao no nataoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho marina Ianao raha miteny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hanan-tsiny Ianao raha mitsara.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, tamin’ny heloka no niterahana ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’ny fahotana no notorontoronina ahy ny reniko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, fahamarinana ao am-po no sitrakao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fahendrena ao amin’ny miafina no ampahafantarinao ahy!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Diovy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hisopa
    - type: text
      text: ' aho ho afa-pahotana dia hadio;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sasao aho dia ho fotsy noho ny orampanala.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampandreneso fifaliana sy faharavoana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hifalian’ny taolana izay voavakivakinao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afeno ny tavanao ny fahotako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vonoy ny heloko rehetra.
