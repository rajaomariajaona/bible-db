document_id: PSA.51,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka mba hahazoana famelan-keloka
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida, fony i Natana mpaminany nankao aminy, rehefa naka an’i Batseba izy.
  - type: text
    content: Mamindrà fo amiko, Andriamanitra ô, araka ny fahasoavanao;
  - type: text
    content: araka ny haben’ny fiantranao, vonoy ny fahadisoako!
  '10':
  - type: text
    content: Amoròny fo madio aho, Andriamanitra ô,
  - type: text
    content: ary ampioreno fanahy vaovao ato anatiko.
  '11':
  - type: text
    content: Aza manary ahy hiala eo anatrehanao
  - type: text
    content: ary aza manaisotra ny Fanahinao Masina amiko.
  '12':
  - type: text
    content: Ampodio amiko ny fifaliana amin’ny famonjenao
  - type: text
    content: ary tohàny fanahy mazoto aho!
  '13':
  - type: text
    content: Dia hampianatra ny olon-diso ny lalanao aho,
  - type: text
    content: koa ny mpanota dia hiverina aminao.
  '14':
  - type: text
    content: Vonjeo ho afaka amin’ny valin-dra aho, Andriamanitra ô, Andriamanitry ny famonjena ahy,
  - type: text
    content: dia hihoby ny fahamarinanao ny lelako.
  '15':
  - type: text
    content: Tompo ô, sokafy ny molotro
  - type: text
    content: dia hanambara ny fiderana Anao ny vavako.
  '16':
  - type: text
    content: Fa tsy fanatitra no sitrakao; raha izany dia nomeko ihany;
  - type: text
    content: ny fanatitra dorana manontolo dia tsy mahafaly Anao.
  '17':
  - type: text
    content: Ny fanatitra ho an’Andriamanitra dia fanahy torotoro;
  - type: text
    content: ny fo torotoro sy mangorakoraka, Andriamanitra ô, tsy mba ataonao tsinontsinona.
  '18':
  - type: text
    content: 'Manaova soa amin’i '
  - type: text
    content: Ziona
  - type: text
    content: ' araka ny fahasoavanao;'
  - type: text
    content: ataovy ny mandan’i Jerosalema!
  '19':
  - type: text
    content: Dia ho sitrakao ny fanatitra amim-pahamarinana sy ny fanatitra dorana manontolo ary ny fanatitra levonina amin’ny afo
  - type: text
    content: ary hanatitra vantotra ombilahy eo amin’ny alitaranao ny olona.
  '2':
  - type: text
    content: Sasao madio aho mba ho afa-keloka
  - type: text
    content: ary diovy aho mba ho afa-pahotana!
  '3':
  - type: text
    content: Fa tsaroako ny fahadisoako
  - type: text
    content: ary eo anatrehako mandrakariva ny fahotako.
  '4':
  - type: text
    content: Taminao dia taminao ihany no nanotako
  - type: text
    content: ary izay ratsy eo imasonao no nataoko,
  - type: text
    content: mba ho marina Ianao raha miteny
  - type: text
    content: ary tsy hanan-tsiny Ianao raha mitsara.
  '5':
  - type: text
    content: Indro, tamin’ny heloka no niterahana ahy
  - type: text
    content: ary tamin’ny fahotana no notorontoronina ahy ny reniko.
  '6':
  - type: text
    content: Indro, fahamarinana ao am-po no sitrakao
  - type: text
    content: ary fahendrena ao amin’ny miafina no ampahafantarinao ahy!
  '7':
  - type: text
    content: 'Diovy amin’ny '
  - type: text
    content: hisopa
  - type: text
    content: ' aho ho afa-pahotana dia hadio;'
  - type: text
    content: sasao aho dia ho fotsy noho ny orampanala.
  '8':
  - type: text
    content: Ampandreneso fifaliana sy faharavoana aho
  - type: text
    content: mba hifalian’ny taolana izay voavakivakinao.
  '9':
  - type: text
    content: Afeno ny tavanao ny fahotako
  - type: text
    content: ary vonoy ny heloko rehetra.
