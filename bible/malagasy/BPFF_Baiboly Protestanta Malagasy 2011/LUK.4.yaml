document_id: LUK.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nakan’ny devoly fanahy an’i Jesosy
  - type: heading
    content: Mat 4.1-11; Mar 1.12-13
  - type: text
    content: 'Ary feno ny Fanahy Masina Jesosy dia niverina avy tany Jordana, ary noentin’ny Fanahy tany an-tany efitra nandritra ny efapolo andro Izy '
  '10':
  - type: text
    content: 'fa voasoratra hoe:'
  - type: text
    content: «Izy handidy ny anjeliny ny aminao mba hiaro Anao;
  '11':
  - type: text
    content: ary eny an-tanany no hitondran’ireo Anao, fandrao ho tafintohina amin’ny vato ny tongotrao» (Sal 91.11, 12).
  '12':
  - type: text
    content: 'Fa Jesosy namaly azy hoe: Voalaza hoe: «Aza maka fanahy NY TOMPO Andriamanitrao» (Deo 6.16).'
  '13':
  - type: text
    content: Rehefa nahatapitra izay fakam-panahy rehetra ny devoly dia nandao Azy izy aloha.
  - type: heading
    content: Ny nanombohan’i Jesosy ny asany tany Galilia
  - type: heading
    content: Mat 4.12-17; Mar 1.14-15; ampit. Jao 4.1-3, 43-46
  '14':
  - type: text
    content: 'Ary niverina tamin’ny herin’ny Fanahy nankany Galilia Jesosy; dia niely tamin’ny faritra rehetra manodidina ny lazany. '
  '15':
  - type: text
    content: Nampianatra teny amin’ny sinagogan’ny olona koa Izy ka nankalazain’izy rehetra.
  - type: heading
    content: Ny nandavana an’i Jesosy tany Nazareta
  - type: heading
    content: Mat 13.53-58; Mar 6.1-6
  '16':
  - type: text
    content: 'Dia tonga tao Nazareta, izay nahabe Azy, Izy; ary araka ny fanaony dia niditra tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' Izy tamin’ny andro '
  - type: text
    content: Sabata
  - type: text
    content: ' ka nitsangana hamaky teny. '
  '17':
  - type: text
    content: Dia natolotra Azy ny bokin’Isaia mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: '; ary nony namelatra ny boky Izy dia nahita ny teny voasoratra hoe:'
  '18':
  - type: text
    content: «Ny Fanahin’NY TOMPO no ato Amiko,
  - type: text
    content: satria nanosotra Ahy hitory teny soa mahafaly amin’ny mahantra Izy;
  - type: text
    content: naniraka Ahy hitory fanafahana amin’ny gadra Izy
  - type: text
    content: sy fampahiratana amin’ny jamba,
  - type: text
    content: hamerina izay nampahorina ho amin’ny fahafahana,
  '19':
  - type: text
    content: hitory taona ankasitrahan’NY TOMPO» (Isa 61.1, 2).
  '2':
  - type: text
    content: 'ka nalain’ny '
  - type: text
    content: devoly
  - type: text
    content: ' fanahy. Tsy nihinana na inona na inona akory Izy nandritra izany andro izany, koa rehefa tapitra izany dia noana Izy. '
  '20':
  - type: text
    content: 'Rehefa nahorony ny boky ka naveriny tamin’ny mpanao raharaha dia nipetraka Izy. Ary nandinika Azy ny mason’izay rehetra tao amin’ny sinagoga. '
  '21':
  - type: text
    content: 'Dia hoy Jesosy taminy: Androany no efa tanteraka eto anatrehanareo izany soratra izany.'
  '22':
  - type: text
    content: 'Ary izy rehetra dia niaiky Azy sady talanjona noho ny tenim-pahasoavana naloaky ny vavany, koa hoy izy: Tsy Zanak’i Josefa va Ity? '
  '23':
  - type: text
    content: 'Hoy kosa Jesosy taminy: Hataonareo Amiko tokoa izao ohabolana izao hoe: Ry mpitsabo, sitrano ny tenanao! Izay renay fa nataonao tao Kapernaomy dia mba ataovy eto amin’ny taninao koa. '
  '24':
  - type: text
    content: 'Ary hoy koa Izy: Lazaiko aminareo marina tokoa: Tsy misy mpaminany izay ankasitrahana ao amin’ny taniny. '
  '25':
  - type: text
    content: 'Fa lazaiko aminareo marina tokoa: Maro no mpitondratena teo amin’ny Israely tamin’ny andron’i Elia, raha tsy nilatsaka ny orana'
  - type: note
    content: Ampit. 1Mpa 17.1.
  - type: text
    content: ' nandritra ny telo taona sy enim-bolana, ka nisy mosary mafy tamin’ny tany manontolo; '
  '26':
  - type: text
    content: 'nefa tsy mba nirahina na dia ho any amin’ny iray tamin’ireo aza i Elia, afa-tsy tany Zarefata, any amin’ny tanin’i Sidona ho any amin’ny vehivavy mpitondratena iray. '
  '27':
  - type: text
    content: 'Ary maro no boka teo amin’ny Israely tamin’ny andron’i Elisa mpaminany, nefa tsy mba nisy nodiovina na dia iray akory aza, afa-tsy i Namàna Siriana ihany. '
  '28':
  - type: text
    content: 'Ary feno hatezerana izay rehetra teo amin’ny sinagoga, raha nandre izany, '
  '29':
  - type: text
    content: 'dia nitsangana izy ireo ka nandroaka Azy ho any ivelan’ny tanàna ary nitondra Azy ho any an-tampon’ny havoana niorenan’ny tanàna mba hazerany amin’ny hantsana. '
  '3':
  - type: text
    content: 'Ary hoy ny devoly Taminy: Raha Zanak’Andriamanitra Ianao, teneno io vato io mba ho tonga mofo. '
  '30':
  - type: text
    content: Nefa namakivaky teo afovoan’izy ireo Izy ka lasa nandeha.
  - type: heading
    content: Ny nanasitranan’i Jesosy ilay demoniaka
  - type: heading
    content: Mar 1.21-28
  '31':
  - type: text
    content: 'Nidina tany Kapernaomy, tanàna any Galilia, Jesosy ka nampianatra ny olona tamin’ny '
  - type: text
    content: Sabata
  - type: text
    content: '. '
  '32':
  - type: text
    content: Dia talanjona tamin’ny fampianarany ny olona satria nisy fahefana ny teniny.
  '33':
  - type: text
    content: 'Nisy olona nanana fanahin’ny '
  - type: text
    content: demonia
  - type: text
    content: ' maloto tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ', izay niantso tamin’ny feo mahery hoe: '
  '34':
  - type: text
    content: 'Indrisy! Moa mifaninona akory izahay sy Ianao, ry Jesosy avy any Nazareta? Avy handringana anay va Ianao? Fantatro fa Ilay Masin’Andriamanitra Ianao. '
  '35':
  - type: text
    content: 'Fa niteny mafy azy Jesosy hoe: Mangìna ianao ka mialà aminy. Ary nony nampianjera azy teo afovoan’ny olona ny demonia dia niala taminy nefa tsy nandratra azy. '
  '36':
  - type: text
    content: 'Dia talanjona avokoa izy rehetra ka niresaka hoe: Ahoana izao teny izao! Fa amim-pahefana sy hery no andidiany ny fanahy maloto dia miala ireny. '
  '37':
  - type: text
    content: Ary niely teny amin’ny faritra manodidina rehetra ny lazany.
  - type: heading
    content: Ny nanasitranana marary maro
  - type: heading
    content: Mat 8.14-17; Mar 1.29-34
  '38':
  - type: text
    content: 'Nony nitsangana niala tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' Jesosy dia niditra tao an-tranon’i Simona. Ary tratry ny tazo mafy ny rafozambavin’i Simona; koa nangataka Taminy izy ireo mba hanasitrana azy. '
  '39':
  - type: text
    content: Dia niondrika teo aminy Izy ka noteneniny mafy ny tazo dia niala tamin-dRavehivavy izany; ary nitsangana niaraka tamin’izay izy ka nanompo azy ireo.
  '4':
  - type: text
    content: 'Fa Jesosy namaly azy hoe: Voasoratra hoe: «Tsy mofo ihany no iveloman’ny olona» (Deo 8.3).'
  '40':
  - type: text
    content: 'Rehefa nilentika ny masoandro, ny olona rehetra izay nanana marary tamin’ny aretina samihafa, dia nitondra azy teo Aminy; dia nametra-tanana tamin’izy rehetra tsirairay Izy ka nanasitrana azy. '
  '41':
  - type: text
    content: 'Ary nisy '
  - type: text
    content: demonia
  - type: text
    content: ' niala tamin’ny maro ka niantso hoe: Ianao no Zanak’Andriamanitra. Nefa norarany ireo ka tsy navelany hiteny, satria nahalala Azy ho '
  - type: text
    content: Kristy
  - type: text
    content: .
  - type: heading
    content: Ny nanambaràn’i Jesosy ny vaovao mahafaly tany Galilia
  - type: heading
    content: Mat 4.23; Mar 1.35-39
  '42':
  - type: text
    content: 'Nony maraina ny andro dia niala teo Jesosy ka nankany an-tany efitra; ary ny vahoaka nitady Azy, dia nankeo Aminy ka te hihazona Azy mba tsy hialany tao aminy. '
  '43':
  - type: text
    content: 'Nefa hoy Izy taminy: Tsy maintsy mitory ny teny soa mahafaly ny amin’ny fanjakan’Andriamanitra any amin’ny tanàna hafa koa Aho, satria izany no nanirahana Ahy.'
  '44':
  - type: text
    content: 'Ary nitoriteny tany amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' manerana an’i Galilia Izy.'
  '5':
  - type: text
    content: 'Ary nitondra Azy niakatra ny devoly dia naneho Azy indray mipy maso ny fanjakana rehetra amin’izao tontolo izao. '
  '6':
  - type: text
    content: 'Hoy ny devoly Taminy: Homeko Anao izao fahefana rehetra izao mbamin’ny voninahiny, fa efa natolotra ahy izany ka izay tiako no omeko azy; '
  '7':
  - type: text
    content: 'koa raha hiankohoka eto anatrehako Ianao dia ho Anao avokoa izany rehetra izany. '
  '8':
  - type: text
    content: 'Fa Jesosy namaly azy hoe: Voasoratra hoe: «NY TOMPO Andriamanitrao no hiankohofanao ary Izy irery ihany no hotompoinao» (Deo 6.13; 10.20).'
  '9':
  - type: text
    content: 'Ary nitondra Azy nankany Jerosalema izy dia nampitoetra Azy teo an-tampon’ny tempoly ka niteny Taminy hoe: Raha Zanak’Andriamanitra Ianao, mivarìna avy eto mankany ambany any; '
