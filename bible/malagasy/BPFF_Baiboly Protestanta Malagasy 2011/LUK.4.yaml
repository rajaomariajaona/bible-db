document_id: LUK.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nakan’ny devoly fanahy an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 4.1-11; Mar 1.12-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary feno ny Fanahy Masina Jesosy dia niverina avy tany Jordana, ary noentin’ny Fanahy tany an-tany efitra nandritra ny efapolo andro Izy '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nalain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' fanahy. Tsy nihinana na inona na inona akory Izy nandritra izany andro izany, koa rehefa tapitra izany dia noana Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy ny devoly Taminy: Raha Zanak’Andriamanitra Ianao, teneno io vato io mba ho tonga mofo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Jesosy namaly azy hoe: Voasoratra hoe: «Tsy mofo ihany no iveloman’ny olona» (Deo 8.3).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nitondra Azy niakatra ny devoly dia naneho Azy indray mipy maso ny fanjakana rehetra amin’izao tontolo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy ny devoly Taminy: Homeko Anao izao fahefana rehetra izao mbamin’ny voninahiny, fa efa natolotra ahy izany ka izay tiako no omeko azy; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'koa raha hiankohoka eto anatrehako Ianao dia ho Anao avokoa izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa Jesosy namaly azy hoe: Voasoratra hoe: «NY TOMPO Andriamanitrao no hiankohofanao ary Izy irery ihany no hotompoinao» (Deo 6.13; 10.20).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nitondra Azy nankany Jerosalema izy dia nampitoetra Azy teo an-tampon’ny tempoly ka niteny Taminy hoe: Raha Zanak’Andriamanitra Ianao, mivarìna avy eto mankany ambany any; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Izy handidy ny anjeliny ny aminao mba hiaro Anao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ary eny an-tanany no hitondran’ireo Anao, fandrao ho tafintohina amin’ny vato ny tongotrao» (Sal 91.11, 12).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa Jesosy namaly azy hoe: Voalaza hoe: «Aza maka fanahy NY TOMPO Andriamanitrao» (Deo 6.16).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rehefa nahatapitra izay fakam-panahy rehetra ny devoly dia nandao Azy izy aloha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanombohan’i Jesosy ny asany tany Galilia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 4.12-17; Mar 1.14-15; ampit. Jao 4.1-3, 43-46
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary niverina tamin’ny herin’ny Fanahy nankany Galilia Jesosy; dia niely tamin’ny faritra rehetra manodidina ny lazany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nampianatra teny amin’ny sinagogan’ny olona koa Izy ka nankalazain’izy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandavana an’i Jesosy tany Nazareta
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 13.53-58; Mar 6.1-6
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia tonga tao Nazareta, izay nahabe Azy, Izy; ary araka ny fanaony dia niditra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' Izy tamin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' ka nitsangana hamaky teny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia natolotra Azy ny bokin’Isaia mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: profeta.
    marker-yv: yv-n
  - type: text
    text: '; ary nony namelatra ny boky Izy dia nahita ny teny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: «Ny Fanahin’NY TOMPO no ato Amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nanosotra Ahy hitory teny soa mahafaly amin’ny mahantra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: naniraka Ahy hitory fanafahana amin’ny gadra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fampahiratana amin’ny jamba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamerina izay nampahorina ho amin’ny fahafahana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: hitory taona ankasitrahan’NY TOMPO» (Isa 61.1, 2).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rehefa nahorony ny boky ka naveriny tamin’ny mpanao raharaha dia nipetraka Izy. Ary nandinika Azy ny mason’izay rehetra tao amin’ny sinagoga. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy Jesosy taminy: Androany no efa tanteraka eto anatrehanareo izany soratra izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary izy rehetra dia niaiky Azy sady talanjona noho ny tenim-pahasoavana naloaky ny vavany, koa hoy izy: Tsy Zanak’i Josefa va Ity? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hoy kosa Jesosy taminy: Hataonareo Amiko tokoa izao ohabolana izao hoe: Ry mpitsabo, sitrano ny tenanao! Izay renay fa nataonao tao Kapernaomy dia mba ataovy eto amin’ny taninao koa. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy koa Izy: Lazaiko aminareo marina tokoa: Tsy misy mpaminany izay ankasitrahana ao amin’ny taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa lazaiko aminareo marina tokoa: Maro no mpitondratena teo amin’ny Israely tamin’ny andron’i Elia, raha tsy nilatsaka ny orana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampit. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Mpa 17.1.
    marker-yv: yv-n
  - type: text
    text: ' nandritra ny telo taona sy enim-bolana, ka nisy mosary mafy tamin’ny tany manontolo; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'nefa tsy mba nirahina na dia ho any amin’ny iray tamin’ireo aza i Elia, afa-tsy tany Zarefata, any amin’ny tanin’i Sidona ho any amin’ny vehivavy mpitondratena iray. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary maro no boka teo amin’ny Israely tamin’ny andron’i Elisa mpaminany, nefa tsy mba nisy nodiovina na dia iray akory aza, afa-tsy i Namàna Siriana ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary feno hatezerana izay rehetra teo amin’ny sinagoga, raha nandre izany, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia nitsangana izy ireo ka nandroaka Azy ho any ivelan’ny tanàna ary nitondra Azy ho any an-tampon’ny havoana niorenan’ny tanàna mba hazerany amin’ny hantsana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nefa namakivaky teo afovoan’izy ireo Izy ka lasa nandeha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanasitranan’i Jesosy ilay demoniaka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 1.21-28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nidina tany Kapernaomy, tanàna any Galilia, Jesosy ka nampianatra ny olona tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dia talanjona tamin’ny fampianarany ny olona satria nisy fahefana ny teniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nisy olona nanana fanahin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' maloto tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ', izay niantso tamin’ny feo mahery hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Indrisy! Moa mifaninona akory izahay sy Ianao, ry Jesosy avy any Nazareta? Avy handringana anay va Ianao? Fantatro fa Ilay Masin’Andriamanitra Ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa niteny mafy azy Jesosy hoe: Mangìna ianao ka mialà aminy. Ary nony nampianjera azy teo afovoan’ny olona ny demonia dia niala taminy nefa tsy nandratra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia talanjona avokoa izy rehetra ka niresaka hoe: Ahoana izao teny izao! Fa amim-pahefana sy hery no andidiany ny fanahy maloto dia miala ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary niely teny amin’ny faritra manodidina rehetra ny lazany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanasitranana marary maro
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 8.14-17; Mar 1.29-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Nony nitsangana niala tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' Jesosy dia niditra tao an-tranon’i Simona. Ary tratry ny tazo mafy ny rafozambavin’i Simona; koa nangataka Taminy izy ireo mba hanasitrana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Dia niondrika teo aminy Izy ka noteneniny mafy ny tazo dia niala tamin-dRavehivavy izany; ary nitsangana niaraka tamin’izay izy ka nanompo azy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Rehefa nilentika ny masoandro, ny olona rehetra izay nanana marary tamin’ny aretina samihafa, dia nitondra azy teo Aminy; dia nametra-tanana tamin’izy rehetra tsirairay Izy ka nanasitrana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' niala tamin’ny maro ka niantso hoe: Ianao no Zanak’Andriamanitra. Nefa norarany ireo ka tsy navelany hiteny, satria nahalala Azy ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanambaràn’i Jesosy ny vaovao mahafaly tany Galilia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 4.23; Mar 1.35-39
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Nony maraina ny andro dia niala teo Jesosy ka nankany an-tany efitra; ary ny vahoaka nitady Azy, dia nankeo Aminy ka te hihazona Azy mba tsy hialany tao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nefa hoy Izy taminy: Tsy maintsy mitory ny teny soa mahafaly ny amin’ny fanjakan’Andriamanitra any amin’ny tanàna hafa koa Aho, satria izany no nanirahana Ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary nitoriteny tany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' manerana an’i Galilia Izy.'
