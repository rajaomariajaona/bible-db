document_id: GEN.45,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nampahafantatra ny tenany i Josefa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary i Josefa dia tsy nahatsindry ny fangorakoraky ny fony intsony teo anatrehan’izay rehetra nanatrika teo. Koa niantso izy hoe: Avoahy ny olona rehetra hiala eto amiko. Tsy nisy olona na dia iray aza nijanona teo amin’i Josefa rehefa nampahafantatra ny tenany tamin’ny rahalahiny izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia honina eo amin’ny tany Gosena ianao ka ho eo akaikiko ianao; ho eo akaikiko koa ny zanakao, ny zafinao, ny ondry aman’osinao ary ny ombinao mbamin’izay rehetra anananao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hamelona anao eo aho mba tsy hahantra ianao sy ny ankohonanao ary izay rehetra anananao fa mbola haharitra dimy taona ny mosary. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary indro, hitan’ny masonareo sy ny mason’i Benjamina rahalahiko izao fa izaho mihitsy no miteny aminareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hambaranareo amin’Ikaky ny voninahitro rehetra atỳ Ejipta sy izay rehetra hitanareo. Koa mandehana haingana ianareo ka ento midina atỳ Ikaky. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia namihina ny vozon’i Benjamina rahalahiny izy ka nitomany, ary i Benjamina koa dia nitomany teo amin’ny vozony. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia nanoroka ny rahalahiny rehetra koa izy ka nitomany teo am-pamihinany azy ireo. Rehefa vita izany dia niresaka taminy ireo rahalahiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nasaina hankany Ejipta i Jakoba
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Re hatrao an-tranon’i Farao fa tonga, hono, ny rahalahin’i Josefa. Nahafaly an’i Farao sy ny mpanompony izany '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ka hoy i Farao tamin’i Josefa: Lazao amin’ny rahalahinao hoe: Ataovy izao: Ataingeno ny entana hoentin’ny bibinareo ka mankanesa any amin’ny tany Kanana; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'alao ny rainareo sy ny ankohonanareo ka mankanesa atỳ amiko dia homeko anareo ny tsara eto amin’ny tany Ejipta ka hihinana ny matavy eto amin’ny tany ianareo! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ankehitriny, efa nomena teny ianao ka ataovy izao: Makà sarety amin’ny tany Ejipta hitondranareo ny vady aman-janakareo ary ento ny rainareo ka mankanesa atỳ. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nitomany mafy izy ka ren’ny Ejiptiana sady ren’ny tao an-tranon’i Farao koa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Aza malahelo ny amin’ny fanakareo fa ho anareo izay tsara eto amin’ny tany Ejipta manontolo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nataon’ny zanak’Israely izany ka nomen’i Josefa sarety, araka ny tenin’i Farao, izy ireo; nomeny vatsy koa hoentiny eny an-dalana. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary samy nomeny akanjo indray miova avy izy rehetra, fa i Benjamina kosa dia nomeny sekela volafotsy telonjato sy akanjo indimy miova. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izao kosa no nampitondrainy ho an’ny rainy: Borikilahy folo nitondra zava-tsoa avy tany Ejipta, borikivavy folo nitondra vary sy mofo ary vatsy ho an’ny rainy hoentiny eny an-dalana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nalefany ny rahalahiny ka lasa nandeha izy ireo. Ary hoy i Josefa taminy: Aza mifanditra eny an-dalana ianareo!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia niakatra avy tany Ejipta izy ireo ka tonga tany amin’i Jakoba rainy tany amin’ny tany Kanana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nilaza taminy izy ireo ka niteny hoe: Mbola velona ihany i Josefa ary izy no mpanapaka amin’ny tany Ejipta manontolo. Nangatsiaka ihany anefa ny fon’i Jakoba fa tsy nino azy ireo izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia nolazain’izy ireo ny teny rehetra izay nolazain’i Josefa taminy. Rehefa hitany ny sarety izay nalefan’i Josefa mba hitondrana azy dia izay vao velona indray ny ain’i Jakoba rainy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary hoy Israely: Ampy izay! Mbola velona ihany i Josefa zanako! Handeha aho ka hahita azy dieny tsy mbola maty.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary hoy i Josefa tamin’ny rahalahiny: Izaho no Josefa! Mbola velona ihany va Ikaky? Ary tsy nahavaly azy ny rahalahiny fa toran-kovitra teo anatrehany teo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy i Josefa tamin’ny rahalahiny: Avia, manatòna ahy ianareo! Dia nanatona ry zareo. Ary hoy i Josefa: Izaho no Josefa rahalahinareo, ilay namidinareo ho atỳ Ejipta. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ankehitriny anefa, aza malahelo na tezitra amin’ny tenanareo noho ny nivarotanareo ahy ho atỳ, fa hamonjy aina no nandefasan’Andriamanitra ahy hialoha anareo atỳ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Roa taona izao no nisian’ny mosary teto amin’ny tany; mbola hisy dimy taona koa tsy hisy hiasan-tany na hijinjana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Andriamanitra no nandefa ahy hialoha anareo mba tsy hahalany taranaka anareo amin’ny tany fa hamelona anareo amin’ny famonjena lehibe. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Amin’izany dia tsy ianareo no nandefa ahy ho atỳ fa Andriamanitra; Izy no nametraka ahy ho rain’i Farao sy ho tompon’ny ao an-tranony rehetra ary ho mpanapaka ny tany Ejipta manontolo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mandehana miakatra haingana ianareo ho any amin’Ikaky ka lazao aminy hoe: Izao no tenin’i Josefa zanakao: Efa nataon’Andriamanitra ho tompon’i Ejipta manontolo aho ka midìna hankaty amiko fa aza misalasala. '
