document_id: EZK.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ireo mpaminany sandoka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', maminania ny hamelezana ny mpaminanin’ny Israely izay maminany, koa lazao amin’izay maminany araka ny fony hoe: Mihainoa ny tenin’NY TOMPO ianareo! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Lozan’ny mpaminany adala izay manaraka ny fanahiny sy ny zavatra tsy hitany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tahaka ny amboahaolo any an-tanàna aolo ny mpaminaninao, ry Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy mba niakatra ho eo amin’ny banga ianareo sady tsy mba nanao manda hiarovana ny taranak’Israely mba hifaharany amin’ny ady amin’ny Andron’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mahita zava-poana sy faminaniana tsy marina ireo izay milaza hoe: Hoy NY TOMPO, nefa tsy nirahin’NY TOMPO izy tsinona, nefa manantena fa ho to ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moa tsy fahitana tsy izy no hitanareo ary faminaniana lainga no lazainareo, raha milaza ianareo hoe: Hoy NY TOMPO! Kanefa tsy nilaza izany Aho tsinona? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Satria ny teninareo dia anoano foana, ary ny fahitanareo dia lainga fotsiny dia indro, hamely anareo Aho, hoy NY TOMPO Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny tanako no hamely ny mpaminany izay mahita anoano foana sy maminany lainga; tsy ho isan’ny mpanolotsainan’ny oloko na ho voasoratra amin’ny bokin’ny taranak’Israely izy sady tsy hiditra ao amin’ny tanin’ny Israely; dia ho fantatrareo fa Izaho no TOMPO Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Noho ny nampiviliany ny oloko tamin’ny nanaovany hoe: Fiadanana! Kanjo tsy nisy fiadanana tsinona; ary rehefa manao ampiantany ny oloko dia indreo, izy no mandalotra azy amin’ny rihitra tsy madity. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa lazao amin’izay mandalotra azy amin’ny rihitra tsy madity fa hirodana izany! Hisy ranonorana mifafy. Eny, milatsaha ianareo, ry havandra vaventy! Ary mifofofofoa ianareo, ry tafio-drivotra! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Indro, raha mirodana ny ampiantany, tsy holazaina aminareo va hoe: Aiza ny lalotra izay nandaloranareo azy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Hampifofofofo ny tafio-drivotra amin’ny fahatezerako Aho; hisy ranonorana mifafy amin’ny fahatezerako ary havandra vaventy amin’ny fahavinirako ka hahafongana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia harodako ny ampiantany izay nolalorinareo tamin’ny rihitra tsy madity ka ho fongotra hatramin’ny tany izy, ary hiseho ny fanambaniny; eny, hirodana izy ka haringana ao anatiny ianareo; dia ho fantatrareo fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hotanterahiko amin’ny ampiantany sy izay mandalotra azy amin’ny rihitra tsy madity ny fahatezerako, ary holazaiko aminareo hoe: Tsy misy intsony ny manda sy izay mpandalotra azy, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: dia ny mpaminanin’ny Israely izay maminany ny amin’i Jerosalema, sy izay mahita fahitana fiadanana ho azy, kanjo tsy misy fiadanana tsinona, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ireo mpaminanivavy sandoka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa ianao, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', handrino mafy ny zanakavavin’ny firenenao izay manao faminaniana araka ny fony ary maminania ny hamelezana azy! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Lozan’ny vehivavy rehetra izay manjaitra fono ho amin’ny foto-tanan’ny olona rehetra, ary manao voaly antonona ny loha samihafa rehetra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fonon-tanana sy voaly: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: fomba fanao majika taloha izay tsy fantatsika loatra ny momba azy.
    marker-yv: yv-n
  - type: text
    text: ' mba hihazanareo ny ain’ny olona! Ny ain’ny oloko dia hazainareo, nefa ny ainareo kosa velominareo! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Manamavo Ahy ao amin’ny oloko ianareo noho ny varimbazaha eran’ny tanana ila sy ny sombi-mofo, mba hahafaty ny ain’olona izay tsy tokony ho faty ary hahavelona ny ain’olona izay tsy tokony hovelomina, amin’ny andainganareo amin’ny oloko izay mihaino ny lainganareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Indro, hosimbako ny fonon-tanana nataonareo, izay entinareo hihaza ny ain’olona any toy ny fihaza voronkely. Eny, hotriariko hiala amin’ny sandrinareo izany ka halefako hanidina ny ain’ny olona izay nohazainareo toy ny fihaza voronkely. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hotriariko koa ny voalinareo ka hovonjeko ho afaka amin’ny tananareo ny oloko, dia tsy ho azon’ny tananareo ho haza intsony izy; dia ho fantatrareo fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Satria lainga no entinareo manaketraka ny fon’ny marina izay tsy nampalaheloviko, sady entinareo manatanjaka ny tanan’ny ratsy fanahy mba tsy hialany amin’ny lalan-dratsiny mba hamelomana azy, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: dia tsy hahita anoano foana na hanao faminaniana tsy marina intsony ianareo, fa hovonjeko ho afaka amin’ny tananareo ny oloko. Dia ho fantatrareo fa Izaho no TOMPO.
