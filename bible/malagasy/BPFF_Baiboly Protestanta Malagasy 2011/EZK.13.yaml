document_id: EZK.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ireo mpaminany sandoka
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Noho ny nampiviliany ny oloko tamin’ny nanaovany hoe: Fiadanana! Kanjo tsy nisy fiadanana tsinona; ary rehefa manao ampiantany ny oloko dia indreo, izy no mandalotra azy amin’ny rihitra tsy madity. '
  '11':
  - type: text
    content: 'Koa lazao amin’izay mandalotra azy amin’ny rihitra tsy madity fa hirodana izany! Hisy ranonorana mifafy. Eny, milatsaha ianareo, ry havandra vaventy! Ary mifofofofoa ianareo, ry tafio-drivotra! '
  '12':
  - type: text
    content: 'Indro, raha mirodana ny ampiantany, tsy holazaina aminareo va hoe: Aiza ny lalotra izay nandaloranareo azy?'
  '13':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Hampifofofofo ny tafio-drivotra amin’ny fahatezerako Aho; hisy ranonorana mifafy amin’ny fahatezerako ary havandra vaventy amin’ny fahavinirako ka hahafongana azy. '
  '14':
  - type: text
    content: 'Dia harodako ny ampiantany izay nolalorinareo tamin’ny rihitra tsy madity ka ho fongotra hatramin’ny tany izy, ary hiseho ny fanambaniny; eny, hirodana izy ka haringana ao anatiny ianareo; dia ho fantatrareo fa Izaho no TOMPO. '
  '15':
  - type: text
    content: 'Hotanterahiko amin’ny ampiantany sy izay mandalotra azy amin’ny rihitra tsy madity ny fahatezerako, ary holazaiko aminareo hoe: Tsy misy intsony ny manda sy izay mpandalotra azy, '
  '16':
  - type: text
    content: dia ny mpaminanin’ny Israely izay maminany ny amin’i Jerosalema, sy izay mahita fahitana fiadanana ho azy, kanjo tsy misy fiadanana tsinona, hoy NY TOMPO Andriamanitra.
  - type: heading
    content: Ny amin’ireo mpaminanivavy sandoka
  '17':
  - type: text
    content: 'Koa ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', handrino mafy ny zanakavavin’ny firenenao izay manao faminaniana araka ny fony ary maminania ny hamelezana azy! '
  '18':
  - type: text
    content: 'Lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Lozan’ny vehivavy rehetra izay manjaitra fono ho amin’ny foto-tanan’ny olona rehetra, ary manao voaly antonona ny loha samihafa rehetra'
  - type: note
    content: 'fonon-tanana sy voaly: fomba fanao majika taloha izay tsy fantatsika loatra ny momba azy.'
  - type: text
    content: ' mba hihazanareo ny ain’ny olona! Ny ain’ny oloko dia hazainareo, nefa ny ainareo kosa velominareo! '
  '19':
  - type: text
    content: Manamavo Ahy ao amin’ny oloko ianareo noho ny varimbazaha eran’ny tanana ila sy ny sombi-mofo, mba hahafaty ny ain’olona izay tsy tokony ho faty ary hahavelona ny ain’olona izay tsy tokony hovelomina, amin’ny andainganareo amin’ny oloko izay mihaino ny lainganareo.
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', maminania ny hamelezana ny mpaminanin’ny Israely izay maminany, koa lazao amin’izay maminany araka ny fony hoe: Mihainoa ny tenin’NY TOMPO ianareo! '
  '20':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Indro, hosimbako ny fonon-tanana nataonareo, izay entinareo hihaza ny ain’olona any toy ny fihaza voronkely. Eny, hotriariko hiala amin’ny sandrinareo izany ka halefako hanidina ny ain’ny olona izay nohazainareo toy ny fihaza voronkely. '
  '21':
  - type: text
    content: 'Hotriariko koa ny voalinareo ka hovonjeko ho afaka amin’ny tananareo ny oloko, dia tsy ho azon’ny tananareo ho haza intsony izy; dia ho fantatrareo fa Izaho no TOMPO. '
  '22':
  - type: text
    content: 'Satria lainga no entinareo manaketraka ny fon’ny marina izay tsy nampalaheloviko, sady entinareo manatanjaka ny tanan’ny ratsy fanahy mba tsy hialany amin’ny lalan-dratsiny mba hamelomana azy, '
  '23':
  - type: text
    content: dia tsy hahita anoano foana na hanao faminaniana tsy marina intsony ianareo, fa hovonjeko ho afaka amin’ny tananareo ny oloko. Dia ho fantatrareo fa Izaho no TOMPO.
  '3':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Lozan’ny mpaminany adala izay manaraka ny fanahiny sy ny zavatra tsy hitany. '
  '4':
  - type: text
    content: 'Tahaka ny amboahaolo any an-tanàna aolo ny mpaminaninao, ry Israely. '
  '5':
  - type: text
    content: 'Tsy mba niakatra ho eo amin’ny banga ianareo sady tsy mba nanao manda hiarovana ny taranak’Israely mba hifaharany amin’ny ady amin’ny Andron’NY TOMPO. '
  '6':
  - type: text
    content: 'Mahita zava-poana sy faminaniana tsy marina ireo izay milaza hoe: Hoy NY TOMPO, nefa tsy nirahin’NY TOMPO izy tsinona, nefa manantena fa ho to ny teniny. '
  '7':
  - type: text
    content: 'Moa tsy fahitana tsy izy no hitanareo ary faminaniana lainga no lazainareo, raha milaza ianareo hoe: Hoy NY TOMPO! Kanefa tsy nilaza izany Aho tsinona? '
  '8':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Satria ny teninareo dia anoano foana, ary ny fahitanareo dia lainga fotsiny dia indro, hamely anareo Aho, hoy NY TOMPO Andriamanitra. '
  '9':
  - type: text
    content: 'Ary ny tanako no hamely ny mpaminany izay mahita anoano foana sy maminany lainga; tsy ho isan’ny mpanolotsainan’ny oloko na ho voasoratra amin’ny bokin’ny taranak’Israely izy sady tsy hiditra ao amin’ny tanin’ny Israely; dia ho fantatrareo fa Izaho no TOMPO Andriamanitra. '
