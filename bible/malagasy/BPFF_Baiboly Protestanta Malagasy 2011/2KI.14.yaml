document_id: 2KI.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Amazia, mpanjakan’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 25.1-4, 11-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona faharoa nanjakan’i Joasy, zanak’i Joahaza, mpanjakan’ny Israely, no nanombohan’i Amazia, zanak’i Joasy, nanjaka tamin’ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dimy amby roapolo taona izy raha nanomboka nanjaka, ary sivy amby roapolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Jehoadana, avy any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanao izay mahitsy teo imason’NY TOMPO izy, nefa tsy dia tahaka an’i Davida rainy, fa tahaka izay rehetra nataon’i Joasy rainy ihany no nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Kanefa ny toerana fanaovana sorona dia tsy mba noravana; mbola namono zavatra ho fanatitra sady nandoro ditin-kazo manitra teny amin’ireo toerana fanaovana sorona ihany ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony tafapetraka tsara teo an-tanany ny fanjakany dia novonoiny ireo mpanompony izay namono ny mpanjaka rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny zanak’ireo namono kosa dia tsy mba novonoiny fa nataony araka izay voasoratra ao amin’ny bokin’ny lalànan’i Mosesy, izay nandidian’NY TOMPO hoe: Ny ray dia tsy hovonoina noho ny ataon’ny zanany, ary ny zanaka tsy hovonoina noho ny ataon’ny rainy; fa samy hovonoina noho ny fahotany avy ny olona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nahafaty Edomita iray alina tao amin’ny Lohasahantsira izy sady nahazo an’i Sela tamin’ny ady ka niantso ny anarany hoe Joktela, izay mbola anarany mandraka androany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noresen’i Joasy, mpanjakan’ny Israely, i Amazia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 25.17-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’izany i Amazia dia nandefa iraka tany amin’i Joasy, zanak’i Joahaza, zanak’i Jeho, mpanjakan’ny Israely, hilaza aminy hoe: Avia, aoka isika hifanandrina! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa nandefa iraka tany amin’i Amazia, mpanjakan’ny Joda i Joasy, mpanjakan’ny Israely, hilaza hoe: Ny tsilo izay tany Libanona dia nandefa iraka tany amin’ny hazo sedera izay tany Libanona hilaza hoe: Omeo ny zanako lahy ny zanakao vavy ho vadiny! Nefa dia nisy bibidia tany Libanona nandalo teo ka nanosihosy ny tsilo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Efa namely an’i Edoma tokoa ianao ka nirehareha ny fonao. Aoka hahafa-po anao izany voninahitra izany ka mitoera ao an-tranonao ihany. Fa nahoana no hihaika ny loza hahalavo ny tenanao mbamin’ny Joda koa ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy nanaiky anefa i Amazia. Koa niakatra i Joasy, mpanjakan’ny Israely; ary izy sy i Amazia, mpanjakan’ny Joda dia nihaona tany Bety-Semesy izay any Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia resy teo anoloan’ny Israely ny Joda ka samy nandositra ho any amin’ny tranolainy avy ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary i Amazia, mpanjakan’ny Joda, zanak’i Joasy, zanak’i Ahazia dia nosamborin’i Joasy, mpanjakan’ny Israely, tany Bety-Semesy. Dia nankany Jerosalema i Joasy ary nandravany efajato '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny mandany, hatreo amin’ny vavahadin’i Efraima ka hatrany amin’ny vavahady eo amin’ny zorony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nalainy avokoa ny volamena sy ny volafotsy rehetra mbamin’ny fanaka rehetra izay hita tao amin’ny tranon’NY TOMPO sy tao amin’ny efitrano fitahirizana tao amin’ny tranon’ny mpanjaka mbamin’ny olona natao takalon’aina, dia niverina ho any Samaria izy.
- type: usfm
  marker: r
  children:
  - type: text
    text: 13.12-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny tantaran’i Joasy sisa mbamin’ny heriny sy ny niadiany tamin’i Amazia, mpanjakan’ny Joda, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nodimandry any amin’ny razany i Joasy dia nalevina tany Samaria tao amin’ny mpanjakan’ny Israely. Ary i Jeroboama zanany no nanjaka nandimby azy.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 25.25-28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny andro niainan’i Amazia, zanak’i Joasy, mpanjakan’ny Joda, taorianan’ny nahafatesan’i Joasy, zanak’i Joahaza, mpanjakan’ny Israely, dia dimy amby folo taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny tantaran’i Amazia sisa, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nanao tetika fikomiana taminy tany Jerosalema ny olona ka nandositra nankany Lakisy izy; nefa nanaraka azy tany ny olona ka namono azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nasampy tamin’ny soavaly ny fatiny dia nalevina tany Jerosalema tao amin’ny razany tao amin’ny Tanànan’i Davida izy.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 26.1-2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny vahoaka rehetra tamin’ny Joda dia naka an’i Azaria, izay vao enina amby folo taona monja, ka nampanjaka azy handimby an’i Amazia rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izy no nanamboatra an’i Elota ka nampody azy ho an’ny Joda, rehefa nodimandry any amin’ny razany ny mpanjaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jeroboama faharoa, mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’ny taona fahadimy amby folo nanjakan’i Amazia, zanak’i Joasy, mpanjakan’ny Joda, no nanomboka nanjaka tany Samaria i Jeroboama, zanak’i Joasy, mpanjakan’ny Israely. Nanjaka iraika amby efapolo taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nanao izay ratsy teo imason’NY TOMPO izy fa tsy niala tamin’ny fahotana rehetra izay nataon’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izy no nampody ny sisintanin’ny Israely ka azony hatrany akaikin’i Hamata ka hatrany amin’ny ranomasin’ny tany ngazana, araka ny tenin’NY TOMPO, Andriamanitry ny Israely, izay nampilazainy ny mpanompony, dia i Jona, zanak’i Amitahy, mpaminany tany Gata-Hefera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Eny, hitan’NY TOMPO fa nangidy loatra ny fahorian’ny Israely. Tsy nisy niangana na voagadra na olona afaka, sady tsy nisy namonjy ny Israely akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: NY TOMPO anefa tsy nilaza fa hamono ny anaran’ny Israely tsy ho eo ambanin’ny lanitra. Fa ny tanan’i Jeroboama, zanak’i Joasy, no noentiny namonjy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny tantaran’i Jeroboama sisa mbamin’izay nataony sy ny hery izay niadiany ary ny nampodiany an’i Damaskosy sy Hamata ho an’ny Israely, nefa an’i Joda ireo fahiny, tsy voasoratra ao amin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary nodimandry any amin’ny razany i Jeroboama, dia tao amin’ireo mpanjakan’ny Israely. I Zakaria zanany no nanjaka nandimby azy.
