document_id: PSA.44,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanary anay Ianao
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’ny Koraìta. Maskila.
  - type: text
    content: Ny sofinay no nandrenesanay, Andriamanitra ô,
  - type: text
    content: ny razanay no nitantara taminay
  - type: text
    content: ny asa nataonao tamin’ny androny,
  - type: text
    content: tamin’ny andro fahiny.
  '10':
  - type: text
    content: Ataonao mihemotra manoloana ny fahavalonay izahay,
  - type: text
    content: koa ny mankahala anay dia manaram-po mamabo.
  '11':
  - type: text
    content: Atolotrao tahaka ny ondry hohanina izahay
  - type: text
    content: ary aelinao any amin’ny firenen-tsamihafa.
  '12':
  - type: text
    content: Mivarotra ny vahoakanao tsy amim-bola tsy amin-karena Ianao
  - type: text
    content: ka tsy mahazo tombony amin’ny vidiny akory.
  '13':
  - type: text
    content: Ataonao fandatsan’ny mpiaramonina aminay izahay,
  - type: text
    content: dia fanakora sy faneson’izay manodidina anay.
  '14':
  - type: text
    content: Ataonao ho oha-pitenenan’ny firenen-tsamihafa izahay,
  - type: text
    content: fihifikifihan-doha amin’ny olona maro.
  '15':
  - type: text
    content: Tsaroako mandrakariva ny fahafaham-barakako
  - type: text
    content: ary manafotra ahy ny henatro
  '16':
  - type: text
    content: noho ny feon’ny mpanaratsy sy ny mpanamavo,
  - type: text
    content: noho ny fahavalo sy ny mpamaly ratsy.
  '17':
  - type: text
    content: Izany rehetra izany no manjo anay, nefa tsy manadino Anao izahay
  - type: text
    content: sady tsy mivadika amin’ny fanekenao;
  '18':
  - type: text
    content: tsy mihemotra ny fonay
  - type: text
    content: ary tsy miala amin’ny lalanao ny dianay,
  '19':
  - type: text
    content: nefa Ianao dia nanorotoro anay teo amin’ny fitoeran’ny amboadia,
  - type: text
    content: sady nanarona anay tamin’ny aloky ny fahafatesana.
  '2':
  - type: text
    content: Ny tananao no nandroahanao ny firenen-tsamihafa fa ny razanay kosa dia nampitoerinao;
  - type: text
    content: efa nampahorinao ny firenena maro fa izy kosa dia nataonao mahafeno ny tany.
  '20':
  - type: text
    content: Raha toa ka nanadino ny anaran’Andriamanitray izahay,
  - type: text
    content: na nanandra-tanana tamin’ny andriamanitra hafa,
  '21':
  - type: text
    content: moa tsy ho nahita izany va Andriamanitra
  - type: text
    content: satria Izy mahalala ny miafina ao am-po?
  '22':
  - type: text
    content: Fa noho ny Aminao no amonoana anay isanandro,
  - type: text
    content: toy ny ondry hovonoina no fijery anay.
  '23':
  - type: text
    content: Mifohaza Tompo ô! Nahoana Ianao no matory?
  - type: text
    content: Miarena! Aza manary anay mandrakizay!
  '24':
  - type: text
    content: Nahoana no manafina ny tavanao Ianao
  - type: text
    content: ka manadino ny fahantranay sy ny fahorianay?
  '25':
  - type: text
    content: Fa mihohoka amin’ny vovoka izahay,
  - type: text
    content: miraikitra amin’ny tany ny kibonay.
  '26':
  - type: text
    content: Mitsangàna hamonjy anay!
  - type: text
    content: Avoty izahay araka ny famindramponao.
  '3':
  - type: text
    content: Fa tsy ny sabany no nahazoany ny tany
  - type: text
    content: ary tsy ny sandriny no namonjy azy
  - type: text
    content: fa ny tananao ankavanana sy ny sandrinao ary ny fahazavan’ny tavanao
  - type: text
    content: satria sitrakao izy.
  '4':
  - type: text
    content: Ianao dia Ianao no Mpanjakako, Andriamanitra ô;
  - type: text
    content: Didio ny famonjena ho an’i Jakoba!
  '5':
  - type: text
    content: Ianao no anosehanay ny fahavalonay;
  - type: text
    content: ny anaranao no anitsakitsahanay izay mitsangana hamely anay.
  '6':
  - type: text
    content: Fa tsy ny tsipìkako no itokiako
  - type: text
    content: ary ny sabatro dia tsy hahavonjy ahy;
  '7':
  - type: text
    content: fa Ianao no namonjy anay tamin’ny fahavalonay
  - type: text
    content: ary izay nankahala anay dia nataonao menatra.
  '8':
  - type: text
    content: Andriamanitra no ankalazainay mandrakariva
  - type: text
    content: 'ary ny anaranao no hoderainay mandrakizay. '
  - type: text
    content: Fiatoana
  '9':
  - type: text
    content: Kanefa nanary anay Ianao
  - type: text
    content: ka nampitondra henatra anay,
  - type: text
    content: ary tsy mivoaka miaraka amin’ny antokon’ny miaramilanay intsony Ianao.
