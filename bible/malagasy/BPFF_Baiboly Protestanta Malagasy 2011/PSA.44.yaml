document_id: PSA.44
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanary anay Ianao
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Nataon’ny Koraìta. Maskila.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny sofinay no nandrenesanay, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny razanay no nitantara taminay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny asa nataonao tamin’ny androny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny andro fahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny tananao no nandroahanao ny firenen-tsamihafa fa ny razanay kosa dia nampitoerinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nampahorinao ny firenena maro fa izy kosa dia nataonao mahafeno ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa tsy ny sabany no nahazoany ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ny sandriny no namonjy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tananao ankavanana sy ny sandrinao ary ny fahazavan’ny tavanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria sitrakao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ianao dia Ianao no Mpanjakako, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Didio ny famonjena ho an’i Jakoba!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ianao no anosehanay ny fahavalonay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny anaranao no anitsakitsahanay izay mitsangana hamely anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tsy ny tsipìkako no itokiako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sabatro dia tsy hahavonjy ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fa Ianao no namonjy anay tamin’ny fahavalonay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay nankahala anay dia nataonao menatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Andriamanitra no ankalazainay mandrakariva
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny anaranao no hoderainay mandrakizay. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Kanefa nanary anay Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampitondra henatra anay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mivoaka miaraka amin’ny antokon’ny miaramilanay intsony Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ataonao mihemotra manoloana ny fahavalonay izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny mankahala anay dia manaram-po mamabo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Atolotrao tahaka ny ondry hohanina izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aelinao any amin’ny firenen-tsamihafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mivarotra ny vahoakanao tsy amim-bola tsy amin-karena Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahazo tombony amin’ny vidiny akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ataonao fandatsan’ny mpiaramonina aminay izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fanakora sy faneson’izay manodidina anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ataonao ho oha-pitenenan’ny firenen-tsamihafa izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fihifikifihan-doha amin’ny olona maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsaroako mandrakariva ny fahafaham-barakako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manafotra ahy ny henatro
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: noho ny feon’ny mpanaratsy sy ny mpanamavo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fahavalo sy ny mpamaly ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izany rehetra izany no manjo anay, nefa tsy manadino Anao izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy mivadika amin’ny fanekenao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: tsy mihemotra ny fonay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy miala amin’ny lalanao ny dianay,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: nefa Ianao dia nanorotoro anay teo amin’ny fitoeran’ny amboadia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nanarona anay tamin’ny aloky ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Raha toa ka nanadino ny anaran’Andriamanitray izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nanandra-tanana tamin’ny andriamanitra hafa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: moa tsy ho nahita izany va Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Izy mahalala ny miafina ao am-po?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa noho ny Aminao no amonoana anay isanandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny ondry hovonoina no fijery anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mifohaza Tompo ô! Nahoana Ianao no matory?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miarena! Aza manary anay mandrakizay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nahoana no manafina ny tavanao Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manadino ny fahantranay sy ny fahorianay?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa mihohoka amin’ny vovoka izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miraikitra amin’ny tany ny kibonay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mitsangàna hamonjy anay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avoty izahay araka ny famindramponao.
