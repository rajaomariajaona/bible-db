document_id: DEU.27,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: FITAHIANA SY OZONA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsangambato naorina teo amin’ny tendrombohitra Ebala
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nandidy ny vahoaka i Mosesy sy ny loholon’ny Israely hoe: Tandremo ny lalàna rehetra izay omeko anao anio.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa henoy ny feon’NY TOMPO Andriamanitrao, ary araho ny didiny sy ny lalànany, izay omeko anao anio.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nandidy ny vahoaka tamin’izany andro izany i Mosesy hoe: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ireto no hijanona eo an-tendrombohitra Gerizima hitsodrano ny vahoaka, rehefa tafita an’i Jordana ianareo: Ny Simeona, ny Levy, ny Joda, ny Isakara, ny Josefa ary ny Benjamina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ireto kosa no hijanona eo an-tendrombohitra Ebala hanozona: Ny Robena, ny Gada, ny Asera, ny Zebolona, ny Dana ary ny Naftaly.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo ozona roa amby folo
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hiteny amin’ny Israely amin’ny feo mahery ireo levita hoe:'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ho voaozona ny olona izay manao sarin-javatra voasokitra na sarin-javatra voarendrika, izay fahavetavetana eo imason’NY TOMPO, asan’ny tanan’ny mpahay taozavatra, ka mametraka azy ao amin’ny takona. Dia hamaly ny vahoaka rehetra hoe: Amena.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ho voaozona izay manao tsinontsinona ny rainy na ny reniny. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ho voaozona izay manakisaka ny faritry ny tanin’ny namany. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ho voaozona izay mampivily lalana ny jamba. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ho voaozona izay manao fitsarana miangatra amin’ny vahiny sy ny kamboty ary ny mpitondratena. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Amin’ny andro izay hitànareo an’i Jordana ho any amin’ny tany izay omen’NY TOMPO Andriamanitrao anao dia manangàna vato lehibe ho anao ka lalory sokay; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ho voaozona izay mandry amin’ny vadin’ny rainy satria mandry amin’izay nandrian’ny rainy izy. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ho voaozona izay mandry amin’ny biby. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ho voaozona izay mandry amin’ny anabaviny, dia ny zanakavavin’ny rainy, na ny zanakavavin’ny reniny. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ho voaozona izay mandry amin’ny rafozambaviny. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ho voaozona izay mamely ny namany any amin’ny takona. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ho voaozona izay mandray kolikoly hahafaty olona tsy manan-tsiny. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ho voaozona izay tsy mankatò ny tenin’ity lalàna ity. Ary ny vahoaka rehetra dia hiteny hoe: Amena.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'dia soraty eo aminy ny teny rehetra amin’ity lalàna ity, rehefa tafita ianao ka hiditra ao amin’ny tany izay omen’NY TOMPO Andriamanitrao anao, dia tany tondra-dronono sy tantely, araka izay nolazain’NY TOMPO, Andriamanitry ny razanao, taminao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Rehefa tafita an’i Jordana ianareo dia atsangano ao an-tendrombohitra Ebala ireo vato izay nandidiako anareo androany ireo ka lalory sokay. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary manorena alitara ao ho an’NY TOMPO Andriamanitrao; vato no hataonao alitara, nefa aza pehina amin’ny vy izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Vato tsy voapaika no hataonao alitaran’NY TOMPO Andriamanitrao ka manolora fanatitra dorana manontolo eo amboniny ho an’NY TOMPO Andriamanitrao '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ary manolora koa fanati-pihavanana ka mihinàna sy mifalia eo anatrehan’NY TOMPO Andriamanitrao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary soraty amin’ireo vato ireo ny teny rehetra amin’ity lalàna ity ka ataovy velona tsara ny soratra.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia niteny tamin’ny Israely rehetra i Mosesy sy ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' mpisorona hoe: Mangìna ka mihainoa, ry Israely ô. Androany no efa tonga firenen’NY TOMPO Andriamanitrao ianao. '
