document_id: ISA.49
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Mpanompon’NY TOMPO, fahazavan’ny firenena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mihainoa Ahy, ry nosy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atongilano ny sofinareo, ry firenena lavitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO efa niantso Ahy hatrany am-bohoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatry ny fony Aho mbola tao an-kibon’Ineny no efa notsarovany ny anarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nataony tahaka ny sabatra maranitra ny vavako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tao amin’ny aloky ny tanany no nanafenany Ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nataony zana-tsipìka voaranitra tsara Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’ny tranon-jana-tsipìkany no nanafenany Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy Izy tamiko: Mpanompoko Ianao, ry Israely ô,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay entiko mampiseho ny voninahitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa hoy kosa Aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foana ny nisasarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: zava-poana sy tsinontsinona no nandaniako ny heriko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa ao amin’NY TOMPO ny rariny tokony ho Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny valin’ny asako dia ao amin’Andriamanitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ankehitriny dia hoy NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay namorona Ahy hatrany am-bohoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho Mpanompony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampodiana ny Jakoba ho ao Aminy indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamoriana ny Israely ho ao Aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahazo voninahitra eo imason’NY TOMPO Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Andriamanitro no heriko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Eny, hoy Izy: Mbola zavatra kely foana raha tonga Mpanompoko'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanandratra ny firenen’i Jakoba Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampody ny Israely sisa voaaro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa hataoko ho fanazavana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' koa Ianao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitondra ny famonjeko
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrany amin’ny faran’ny tany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hanafahana ny Babo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izao no lazain’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanavotra ny Israely, dia ny Iray Masiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’Ilay hamavoin’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy halan’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka tonga mpanompon’ny mpanapaka:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hahita ka hitsangana ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpanapaka koa dia hiankohoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny amin’NY TOMPO izay mahatoky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny Iray Masin’ny Israely izay nifidy Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny taona fankasitrahana no nihainoako Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tamin’ny andro famonjena no namonjeko Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiaro Anao Aho ka hanao Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fanekena ho an’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanangana ny tany indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hizara ny fananana izay efa rava;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'hiteny amin’ny mpifatotra hoe: Mivoaha tao!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary amin’izay ao amin’ny maizina hoe: Misehoa!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihinana eny an-dalana izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na dia any an-tendrombohitra mangadihady aza dia hisy ahitra ho azy ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy ho noana
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hangetaheta izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hamely azy ny hainandro migaingaina na ny masoandro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mamindra fo aminy no hitarika azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary any amin’ny loharano miboiboika no hitondrany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hataoko tonga lalana ny tendrombohitro rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hasandratra ny lalambeko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Indreo, tonga avy lavitra ireto;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary indreo, avy any avaratra sy andrefana ireto,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avy any amin’ny tany Sinima ireto.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mihobia, ry lanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miravoravoa, ry tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Velomy ny hoby, ry tendrombohitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa NY TOMPO efa nampionona ny olony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamindra fo amin’ny olony mahantra Izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jerosalema ho voaorina indray sy honenana indray
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ': NY TOMPO efa nahafoy ahy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nanadino ahy ny Tompoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mety manadino ny zanany minono va ny vehivavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hamindra fo amin’ny zanaka naloaky ny kibony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mety manadino ihany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izaho kosa tsy mba manadino anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, efa vitako tombo-kavatsa eo am-pelatanako ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo anatrehako mandrakariva ny mandanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tamy haingana ny zanakao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay nanimba sy nandrava anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miala aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Atopazy manodidina ny masonao ka mijere;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo rehetra ireo dia mivory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mankeo aminao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha velona koa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihaingoanao tahaka ny firavaka tokoa ireo rehetra ireo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiravahanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fanaon’ny ampakarina izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Eny, ny taninao rava sy ny fonenanao lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taninao simba
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho omby amin’izany, noho ny habetsahan’ny mponina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho lasa lavitra ireo nihinana anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny zanakao izay tsy nanananao teo aloha
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia mbola hilaza eo an-tsofinao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy omby ahy loatra ity tany ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: mikisaha kely mba hitoerako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hiteny anakampo ianao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no niteraka ireto ho ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho anefa tsy mba nanan-janaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady momba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babo sady noroahina aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa iza no nanabe ireto?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, nilaozana ho irery aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa taiza kosa moa ireto?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indro, hanandratra ny tanako any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' Aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanangana ny fanevako any amin’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hitrotro ny zanakao eo an-tratrany ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zanakao vavy dia hoentiny eny an-tsorony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mpanjaka no ho rainao mpitaiza anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary zanakavavin’andriana no ho reninao mpampinono anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiankohoka amin’ny tany eo anatrehanao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hilelaka ny vovoka amin’ny tongotrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fantatrao fa Izaho no TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hitsanga-menatra izay manantena Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Azo alaina amin’ny mahery va ny babony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ho afaka va ny babon’ny marina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nefa izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia ny babon’ny mahery aza dia halaina ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho afaka ny babon’ny mpampihorohoro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izaho no hiady amin’izay miady aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izaho no hamonjy ny zanakao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hampihinaniko ny nofon’ny tenany ihany izay mampahory anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho mamon’ny ran’ny tenany ihany ireny, toy ny amin’ny ranom-boaloboka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fantatry ny nofo rehetra fa Izaho TOMPO no Mpamonjy anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Ilay Maherin’i Jakoba no Mpanavotra anao.
