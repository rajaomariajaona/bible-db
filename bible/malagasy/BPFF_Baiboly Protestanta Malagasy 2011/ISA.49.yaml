document_id: ISA.49,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Mpanompon’NY TOMPO, fahazavan’ny firenena
  - type: text
    content: Mihainoa Ahy, ry nosy!
  - type: text
    content: Atongilano ny sofinareo, ry firenena lavitra!
  - type: text
    content: NY TOMPO efa niantso Ahy hatrany am-bohoka,
  - type: text
    content: hatry ny fony Aho mbola tao an-kibon’Ineny no efa notsarovany ny anarako.
  '10':
  - type: text
    content: Tsy ho noana
  - type: text
    content: na hangetaheta izy;
  - type: text
    content: tsy hamely azy ny hainandro migaingaina na ny masoandro;
  - type: text
    content: fa izay mamindra fo aminy no hitarika azy
  - type: text
    content: ary any amin’ny loharano miboiboika no hitondrany azy.
  '11':
  - type: text
    content: Hataoko tonga lalana ny tendrombohitro rehetra
  - type: text
    content: ary hasandratra ny lalambeko.
  '12':
  - type: text
    content: Indreo, tonga avy lavitra ireto;
  - type: text
    content: ary indreo, avy any avaratra sy andrefana ireto,
  - type: text
    content: ary avy any amin’ny tany Sinima ireto.
  '13':
  - type: text
    content: Mihobia, ry lanitra!
  - type: text
    content: Miravoravoa, ry tany!
  - type: text
    content: Velomy ny hoby, ry tendrombohitra!
  - type: text
    content: Fa NY TOMPO efa nampionona ny olony,
  - type: text
    content: mamindra fo amin’ny olony mahantra Izy.
  - type: heading
    content: Jerosalema ho voaorina indray sy honenana indray
  '14':
  - type: text
    content: 'Fa hoy i '
  - type: text
    content: Ziona
  - type: text
    content: ': NY TOMPO efa nahafoy ahy,'
  - type: text
    content: efa nanadino ahy ny Tompoko.
  '15':
  - type: text
    content: Mety manadino ny zanany minono va ny vehivavy
  - type: text
    content: ka tsy hamindra fo amin’ny zanaka naloaky ny kibony?
  - type: text
    content: Eny, mety manadino ihany izy,
  - type: text
    content: fa Izaho kosa tsy mba manadino anao.
  '16':
  - type: text
    content: Indro, efa vitako tombo-kavatsa eo am-pelatanako ianao;
  - type: text
    content: ary eo anatrehako mandrakariva ny mandanao.
  '17':
  - type: text
    content: Tamy haingana ny zanakao;
  - type: text
    content: ary izay nanimba sy nandrava anao
  - type: text
    content: dia miala aminao.
  '18':
  - type: text
    content: Atopazy manodidina ny masonao ka mijere;
  - type: text
    content: ireo rehetra ireo dia mivory
  - type: text
    content: ka mankeo aminao.
  - type: text
    content: Raha velona koa Aho,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: dia hihaingoanao tahaka ny firavaka tokoa ireo rehetra ireo.
  - type: text
    content: Hiravahanao
  - type: text
    content: tahaka ny fanaon’ny ampakarina izany.
  '19':
  - type: text
    content: Eny, ny taninao rava sy ny fonenanao lao
  - type: text
    content: ary ny taninao simba
  - type: text
    content: dia tsy ho omby amin’izany, noho ny habetsahan’ny mponina
  - type: text
    content: ary ho lasa lavitra ireo nihinana anao.
  '2':
  - type: text
    content: Nataony tahaka ny sabatra maranitra ny vavako;
  - type: text
    content: tao amin’ny aloky ny tanany no nanafenany Ahy.
  - type: text
    content: Nataony zana-tsipìka voaranitra tsara Aho;
  - type: text
    content: teo amin’ny tranon-jana-tsipìkany no nanafenany Ahy.
  '20':
  - type: text
    content: Ny zanakao izay tsy nanananao teo aloha
  - type: text
    content: 'dia mbola hilaza eo an-tsofinao hoe:'
  - type: text
    content: Tsy omby ahy loatra ity tany ity
  - type: text
    content: mikisaha kely mba hitoerako.
  '21':
  - type: text
    content: 'Dia hiteny anakampo ianao hoe:'
  - type: text
    content: Iza no niteraka ireto ho ahy?
  - type: text
    content: Izaho anefa tsy mba nanan-janaka
  - type: text
    content: sady momba.
  - type: text
    content: Babo sady noroahina aho,
  - type: text
    content: koa iza no nanabe ireto?
  - type: text
    content: Indro, nilaozana ho irery aho,
  - type: text
    content: fa taiza kosa moa ireto?
  '22':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: 'Indro, hanandratra ny tanako any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' Aho'
  - type: text
    content: ary hanangana ny fanevako any amin’ny firenena;
  - type: text
    content: dia hitrotro ny zanakao eo an-tratrany ireo,
  - type: text
    content: ary ny zanakao vavy dia hoentiny eny an-tsorony.
  '23':
  - type: text
    content: Mpanjaka no ho rainao mpitaiza anao
  - type: text
    content: ary zanakavavin’andriana no ho reninao mpampinono anao;
  - type: text
    content: hiankohoka amin’ny tany eo anatrehanao izy
  - type: text
    content: ka hilelaka ny vovoka amin’ny tongotrao;
  - type: text
    content: dia ho fantatrao fa Izaho no TOMPO
  - type: text
    content: ka tsy hitsanga-menatra izay manantena Ahy.
  '24':
  - type: text
    content: Azo alaina amin’ny mahery va ny babony?
  - type: text
    content: Na ho afaka va ny babon’ny marina?
  '25':
  - type: text
    content: 'Nefa izao no lazain’NY TOMPO:'
  - type: text
    content: Na dia ny babon’ny mahery aza dia halaina ihany,
  - type: text
    content: ary ho afaka ny babon’ny mpampihorohoro;
  - type: text
    content: fa Izaho no hiady amin’izay miady aminao,
  - type: text
    content: ary Izaho no hamonjy ny zanakao.
  '26':
  - type: text
    content: Hampihinaniko ny nofon’ny tenany ihany izay mampahory anao
  - type: text
    content: ary ho mamon’ny ran’ny tenany ihany ireny, toy ny amin’ny ranom-boaloboka;
  - type: text
    content: dia ho fantatry ny nofo rehetra fa Izaho TOMPO no Mpamonjy anao,
  - type: text
    content: ary Ilay Maherin’i Jakoba no Mpanavotra anao.
  '3':
  - type: text
    content: 'Hoy Izy tamiko: Mpanompoko Ianao, ry Israely ô,'
  - type: text
    content: izay entiko mampiseho ny voninahitro.
  '4':
  - type: text
    content: 'Fa hoy kosa Aho:'
  - type: text
    content: Foana ny nisasarako,
  - type: text
    content: zava-poana sy tsinontsinona no nandaniako ny heriko;
  - type: text
    content: kanefa ao amin’NY TOMPO ny rariny tokony ho Ahy,
  - type: text
    content: ary ny valin’ny asako dia ao amin’Andriamanitro.
  '5':
  - type: text
    content: Ary ankehitriny dia hoy NY TOMPO
  - type: text
    content: izay namorona Ahy hatrany am-bohoka
  - type: text
    content: ho Mpanompony,
  - type: text
    content: hampodiana ny Jakoba ho ao Aminy indray
  - type: text
    content: sy hamoriana ny Israely ho ao Aminy;
  - type: text
    content: fa mahazo voninahitra eo imason’NY TOMPO Aho,
  - type: text
    content: ary Andriamanitro no heriko.
  '6':
  - type: text
    content: 'Eny, hoy Izy: Mbola zavatra kely foana raha tonga Mpanompoko'
  - type: text
    content: hanandratra ny firenen’i Jakoba Ianao
  - type: text
    content: ary hampody ny Israely sisa voaaro;
  - type: text
    content: 'fa hataoko ho fanazavana ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' koa Ianao'
  - type: text
    content: mba hitondra ny famonjeko
  - type: text
    content: hatrany amin’ny faran’ny tany.
  - type: heading
    content: Ny hanafahana ny Babo
  '7':
  - type: text
    content: Izao no lazain’NY TOMPO,
  - type: text
    content: Mpanavotra ny Israely, dia ny Iray Masiny,
  - type: text
    content: amin’Ilay hamavoin’ny olona
  - type: text
    content: sy halan’ny firenena
  - type: text
    content: 'ka tonga mpanompon’ny mpanapaka:'
  - type: text
    content: Hahita ka hitsangana ny mpanjaka,
  - type: text
    content: ary ny mpanapaka koa dia hiankohoka
  - type: text
    content: noho ny amin’NY TOMPO izay mahatoky,
  - type: text
    content: dia ny Iray Masin’ny Israely izay nifidy Anao.
  '8':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Tamin’ny taona fankasitrahana no nihainoako Anao
  - type: text
    content: ary tamin’ny andro famonjena no namonjeko Anao;
  - type: text
    content: dia hiaro Anao Aho ka hanao Anao
  - type: text
    content: ho fanekena ho an’ny olona
  - type: text
    content: mba hanangana ny tany indray
  - type: text
    content: sy hizara ny fananana izay efa rava;
  '9':
  - type: text
    content: 'hiteny amin’ny mpifatotra hoe: Mivoaha tao!'
  - type: text
    content: 'ary amin’izay ao amin’ny maizina hoe: Misehoa!'
  - type: text
    content: Hihinana eny an-dalana izy ireo
  - type: text
    content: ary na dia any an-tendrombohitra mangadihady aza dia hisy ahitra ho azy ihany.
