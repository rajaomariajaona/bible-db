document_id: PSA.128,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahasambaran’ny fianakaviana
  - type: text
    content: Hira fanao amin’ny fiakarana.
  - type: text
    content: Sambatra izay rehetra matahotra NY TOMPO,
  - type: text
    content: dia izay mandeha amin’ny lalany.
  '2':
  - type: text
    content: Fa hohaninao tokoa ny vokatry ny asan’ny tananao;
  - type: text
    content: sambatra sady ambinina ianao.
  '3':
  - type: text
    content: Ny vadinao dia tahaka ny voaloboka mahavokatra
  - type: text
    content: ao anatin’ny tranonao;
  - type: text
    content: ny zanakao dia tahaka ny zanak’oliva
  - type: text
    content: manodidina ny latabatrao.
  '4':
  - type: text
    content: Indro, toy izany no hitahiana
  - type: text
    content: izay lehilahy matahotra NY TOMPO.
  '5':
  - type: text
    content: 'Hitahy anao avy any '
  - type: text
    content: Ziona
  - type: text
    content: ' anie NY TOMPO;'
  - type: text
    content: ary ho faly hahita ny fahasoavan’i Jerosalema anie ianao
  - type: text
    content: amin’ny andro rehetra iainanao.
  '6':
  - type: text
    content: Eny, hahita ny zafinao anie ianao.
  - type: text
    content: Fiadanana anie ho amin’ny Israely.
