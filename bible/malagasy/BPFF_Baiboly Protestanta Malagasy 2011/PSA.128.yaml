document_id: PSA.128,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahasambaran’ny fianakaviana
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Hira fanao amin’ny fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Sambatra izay rehetra matahotra NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay mandeha amin’ny lalany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa hohaninao tokoa ny vokatry ny asan’ny tananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sambatra sady ambinina ianao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny vadinao dia tahaka ny voaloboka mahavokatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao anatin’ny tranonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanakao dia tahaka ny zanak’oliva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manodidina ny latabatrao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Indro, toy izany no hitahiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay lehilahy matahotra NY TOMPO.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hitahy anao avy any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' anie NY TOMPO;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho faly hahita ny fahasoavan’i Jerosalema anie ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro rehetra iainanao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Eny, hahita ny zafinao anie ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fiadanana anie ho amin’ny Israely.
