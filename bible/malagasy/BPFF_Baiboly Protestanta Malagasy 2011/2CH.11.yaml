document_id: 2CH.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Rehoboama, mpanjakan’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Mpa 12.21-24
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga tany Jerosalema i Rehoboama dia novoriny ny taranak’i Joda sy i Benjamina, dia miaramila valo alina sy iray hetsy voafantina, hiady amin’ny Israely mba hampody ny fanjakana ho an’i Rehoboama. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Zora, i Aialona ary i Hebrona, izay tanàna mimanda ao amin’i Joda sy i Benjamina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanamafy ny tanàna mimanda izy sady nametraka mpanapaka tao, nasiany tahirin-kanina sy diloilo ary divay koa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tamin’ny isam-bohitra dia nasiany ampinga lehibe sy lefona avokoa, sady nohamafisiny tsara ny vohitra; ary i Joda sy i Benjamina no nomba azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niandany tamin’i Rehoboama ny mpisorona sy ny levita tany amin’ny Israely
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' izay tany amin’ny Israely rehetra dia nanatona an’i Rehoboama avy tany amin’ny faritaniny avy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandao ny tanànany sy ny tany manodidina azy ny levita ka nankany Joda sy Jerosalema, fa efa nanaisotra azy tsy ho mpisorona ho an’NY TOMPO i Jeroboama sy ny zanany, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa nanendry mpisorona ho amin’ny toerana fanaovana sorona sy ho an’ny Seìrima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'anaran’andriamanitra tsy izy. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lev 17.7.
      marker-yv: yv-n
    - type: text
      text: ' ary ho an’ny ombilahy kely izay nataony. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na iza na iza tamin’ny fokon’Israely rehetra no nanolotra ny fony hitady NY TOMPO, Andriamanitry ny Israely, dia nanaraka ireo nankany Jerosalema mba hamono zavatra hatao fanatitra ho an’NY TOMPO, Andriamanitry ny razany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nampatanjaka ny fanjakan’ny Joda izy ireo sady nanome hery an’i Rehoboama, zanak’i Solomona, nandritra ny telo taona satria nandeha tamin’ny lalan’i Davida sy i Solomona telo taona izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fianakavian’i Rehoboama
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Rehoboama dia naka an’i Mahalota, zanakavavin’i Jerimota, zanak’i Davida, sy i Abihaila, zanakavavin’i Eliaba, zanak’i Jese, ho vadiny; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'niterahany an’i Jeosy sy i Semaria ary i Zahama izy io. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo tonga tamin’i Semaia, lehilahin’Andriamanitra, ny tenin’NY TOMPO hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanarakaraka azy dia nalainy koa Imaka, zanakavavin’i Absaloma, izay niterahany an’i Abia, i Atahy, i Ziza ary i Selomita. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tia an’Imaka, zanakavavin’i Absaloma, mihoatra noho ny vadiny sy ny vady tsindranony rehetra i Rehoboama, fa izy dia naka vady valo amby folo sy vady tsindrano enimpolo ka niteraka lahy valo amby roapolo sy vavy enimpolo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Abia, zanakalahin’Imaka, no nataon’i Rehoboama lohany ho mpifehy ny rahalahiny; fa izy no efa nokasainy hampanjakaina. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nahazo hevitra izy ka nampiely ny zanany manerana ny tanin’i Joda sy i Benjamina rehetra, dia tany amin’ny tanàna mimanda rehetra, ary nomeny hanina betsaka sady nitadiavany vady maro.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena amin’i Rehoboama, zanak’i Solomona, mpanjakan’ny Joda, sy amin’ny Israely rehetra any amin’i Joda sy i Benjamina hoe: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO: Aza mandeha hiady amin’ny rahalahinareo fa samia mody any an-tranony avy ianareo; satria avy Amiko izao zavatra izao. Ary nihaino ny tenin’NY TOMPO ny olona ka samy lasa nody fa tsy nandeha hamely an’i Jeroboama.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitoetra tany Jerosalema i Rehoboama ka nanamboatra tanàna mimanda tany Joda. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy ireo namboariny: I Betlehema, i Etama, i Tekoa, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Bety-Zora, i Soko, i Adolama, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Gata, i Maresa, i Zifa, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Adoraima, i Lakisy, i Azeka, '
