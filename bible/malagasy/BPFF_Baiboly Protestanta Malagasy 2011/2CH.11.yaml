document_id: 2CH.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Rehoboama, mpanjakan’ny Joda
  - type: heading
    content: 1Mpa 12.21-24
  - type: text
    content: 'Nony tonga tany Jerosalema i Rehoboama dia novoriny ny taranak’i Joda sy i Benjamina, dia miaramila valo alina sy iray hetsy voafantina, hiady amin’ny Israely mba hampody ny fanjakana ho an’i Rehoboama. '
  '10':
  - type: text
    content: 'i Zora, i Aialona ary i Hebrona, izay tanàna mimanda ao amin’i Joda sy i Benjamina. '
  '11':
  - type: text
    content: 'Nanamafy ny tanàna mimanda izy sady nametraka mpanapaka tao, nasiany tahirin-kanina sy diloilo ary divay koa. '
  '12':
  - type: text
    content: Ary tamin’ny isam-bohitra dia nasiany ampinga lehibe sy lefona avokoa, sady nohamafisiny tsara ny vohitra; ary i Joda sy i Benjamina no nomba azy.
  - type: heading
    content: Niandany tamin’i Rehoboama ny mpisorona sy ny levita tany amin’ny Israely
  '13':
  - type: text
    content: 'Ary ny mpisorona sy ny '
  - type: text
    content: levita
  - type: text
    content: ' izay tany amin’ny Israely rehetra dia nanatona an’i Rehoboama avy tany amin’ny faritaniny avy. '
  '14':
  - type: text
    content: 'Nandao ny tanànany sy ny tany manodidina azy ny levita ka nankany Joda sy Jerosalema, fa efa nanaisotra azy tsy ho mpisorona ho an’NY TOMPO i Jeroboama sy ny zanany, '
  '15':
  - type: text
    content: fa nanendry mpisorona ho amin’ny toerana fanaovana sorona sy ho an’ny Seìrima
  - type: note
    content: anaran’andriamanitra tsy izy. Zahao Lev 17.7.
  - type: text
    content: ' ary ho an’ny ombilahy kely izay nataony. '
  '16':
  - type: text
    content: 'Ary na iza na iza tamin’ny fokon’Israely rehetra no nanolotra ny fony hitady NY TOMPO, Andriamanitry ny Israely, dia nanaraka ireo nankany Jerosalema mba hamono zavatra hatao fanatitra ho an’NY TOMPO, Andriamanitry ny razany. '
  '17':
  - type: text
    content: Dia nampatanjaka ny fanjakan’ny Joda izy ireo sady nanome hery an’i Rehoboama, zanak’i Solomona, nandritra ny telo taona satria nandeha tamin’ny lalan’i Davida sy i Solomona telo taona izy.
  - type: heading
    content: Ny fianakavian’i Rehoboama
  '18':
  - type: text
    content: 'Ary i Rehoboama dia naka an’i Mahalota, zanakavavin’i Jerimota, zanak’i Davida, sy i Abihaila, zanakavavin’i Eliaba, zanak’i Jese, ho vadiny; '
  '19':
  - type: text
    content: 'niterahany an’i Jeosy sy i Semaria ary i Zahama izy io. '
  '2':
  - type: text
    content: 'Kanjo tonga tamin’i Semaia, lehilahin’Andriamanitra, ny tenin’NY TOMPO hoe: '
  '20':
  - type: text
    content: 'Nanarakaraka azy dia nalainy koa Imaka, zanakavavin’i Absaloma, izay niterahany an’i Abia, i Atahy, i Ziza ary i Selomita. '
  '21':
  - type: text
    content: 'Ary tia an’Imaka, zanakavavin’i Absaloma, mihoatra noho ny vadiny sy ny vady tsindranony rehetra i Rehoboama, fa izy dia naka vady valo amby folo sy vady tsindrano enimpolo ka niteraka lahy valo amby roapolo sy vavy enimpolo. '
  '22':
  - type: text
    content: 'Ary i Abia, zanakalahin’Imaka, no nataon’i Rehoboama lohany ho mpifehy ny rahalahiny; fa izy no efa nokasainy hampanjakaina. '
  '23':
  - type: text
    content: Nahazo hevitra izy ka nampiely ny zanany manerana ny tanin’i Joda sy i Benjamina rehetra, dia tany amin’ny tanàna mimanda rehetra, ary nomeny hanina betsaka sady nitadiavany vady maro.
  '3':
  - type: text
    content: 'Mitenena amin’i Rehoboama, zanak’i Solomona, mpanjakan’ny Joda, sy amin’ny Israely rehetra any amin’i Joda sy i Benjamina hoe: '
  '4':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Aza mandeha hiady amin’ny rahalahinareo fa samia mody any an-tranony avy ianareo; satria avy Amiko izao zavatra izao. Ary nihaino ny tenin’NY TOMPO ny olona ka samy lasa nody fa tsy nandeha hamely an’i Jeroboama.'
  '5':
  - type: text
    content: 'Nitoetra tany Jerosalema i Rehoboama ka nanamboatra tanàna mimanda tany Joda. '
  '6':
  - type: text
    content: 'Ireto avy ireo namboariny: I Betlehema, i Etama, i Tekoa, '
  '7':
  - type: text
    content: 'i Bety-Zora, i Soko, i Adolama, '
  '8':
  - type: text
    content: 'i Gata, i Maresa, i Zifa, '
  '9':
  - type: text
    content: 'i Adoraima, i Lakisy, i Azeka, '
