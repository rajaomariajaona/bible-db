document_id: LEV.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitsipika momba ny mpisorona
  - type: heading
    content: Ny fiainan’ny mpisorona manokana
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: Mitenena amin’ireo mpisorona, zanak’i Arona hoe: Aoka ny mpisorona tsy handoto ny tenany amin’izay maty amin’ny mpiray firenena aminy, '
  '10':
  - type: text
    content: 'Ary ny '
  - type: text
    content: Mpisoronabe
  - type: text
    content: ' izay nalaina tamin’ny rahalahiny ka nandrarahana ny diloilo fanosorana ny lohany sady natokana mba hitafy ny fitafiana, dia aoka tsy hirakaraka volo na handriatra ny fitafiany. '
  '11':
  - type: text
    content: 'Ary aoka tsy hiditra am-paty akory izy ka handoto ny tenany na dia amin’ny ray aman-dreniny aza. '
  '12':
  - type: text
    content: 'Aoka tsy hiala avy tao amin’ny fitoerana masina izy na handoto ny toerana masin’Andriamaniny satria ny diloilo nanosoran’Andriamaniny azy no eo an-dohany: Izaho no TOMPO. '
  '13':
  - type: text
    content: 'Aoka ho vehivavy mbola virijiny no hampakariny. '
  '14':
  - type: text
    content: 'Fa ny maty vady na ny efa nisaorana na ny voaloto tamin’ny fijangajangana dia tsy azony ampakarina; fa virijiny avy amin’ny fireneny ihany no hampakariny. '
  '15':
  - type: text
    content: Aoka tsy hanao izay hampaloto ny taranany eo amin’ny fireneny izy fa Izaho TOMPO no nanamasina azy.
  - type: heading
    content: Ny amin’ny manan-kilema
  '16':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '17':
  - type: text
    content: 'Mitenena amin’i Arona hoe: Izay rehetra misy kilema amin’ny zanakao, hatramin’ny taranany fara aman-dimby, dia aoka tsy hanatona hanatitra ny hanin’Andriamaniny; '
  '18':
  - type: text
    content: 'fa izay rehetra misy kilema dia tsy mahazo manakaiky hanatanteraka izany na ny jamba na ny mandringa na ny loaka orona na ny sampona amin’ny rantsam-batana '
  '19':
  - type: text
    content: 'na ny tapa-tongotra na ny tapa-tanana '
  '2':
  - type: text
    content: 'afa-tsy amin’ny havany akaiky, dia ny reniny, ny rainy, ny zanany lahy, ny zanany vavy ary ny rahalahiny; '
  '20':
  - type: text
    content: 'na ny vokoka na ny saozanina na ny misy pentimpentina eo amin’ny masony na ny feno hatina na ny feno tsingaoka na ny manana aretin-dahy. '
  '21':
  - type: text
    content: 'Ny olona rehetra amin’ny zanak’i Arona mpisorona izay misy kilema dia tsy mahazo manatona hanolotra ny fanatitra levonina amin’ny afo ho an’NY TOMPO; misy kilema izy ka tsy mahazo manatona mba hanatitra ny hanin’Andriamaniny. '
  '22':
  - type: text
    content: 'Ny hanin’Andriamaniny kosa, izay avy amin’ny zavatra masina indrindra sy ny zavatra masina, dia azony hanina ihany; '
  '23':
  - type: text
    content: 'kanefa tsy mahazo mankeo amin’ny efitra lamba na manakaiky ny alitara izy, satria misy kilema, mba tsy handoto ny fitoerako masina fa Izaho TOMPO no manamasina ireo. '
  '24':
  - type: text
    content: Dia nilaza izany tamin’i Arona sy ireo zanany ary ny Zanak’Israely rehetra i Mosesy.
  '3':
  - type: text
    content: 'ary amin’ny fatin’ny anabaviny mbola virijiny izay havany akaiky satria mbola tsy manambady, no ahazoany mandoto ny tenany. '
  '4':
  - type: text
    content: 'Tsy hiditra am-paty handoto ny tenany izy satria lehibe eo amin’ny fireneny. '
  '5':
  - type: text
    content: 'Tsy hanasola ny tampon-dohany izy na hanaratra ny volombavany na hitetika ny tenany. '
  '6':
  - type: text
    content: 'Ho masina ho an’Andriamaniny izy ireo ka tsy hanamavo ny anaran’Andriamaniny; fa mpanolotra ny fanatitra levonina amin’ny afo ho an’NY TOMPO izy, dia ny hanin’Andriamaniny, ka ho masina izy. '
  '7':
  - type: text
    content: 'Aoka izy tsy hanambady izay vehivavy mpijangajanga na izay voaloto, ary aoka tsy hanambady vehivavy izay efa nisaoran’ny lahy; fa masina ho an’Andriamaniny ny mpisorona. '
  '8':
  - type: text
    content: 'Dia hamasino izy fa ny hanin’Andriamanitrao no ateriny; ho masina aminao izy fa Izaho TOMPO dia masina ka manamasina anareo. '
  '9':
  - type: text
    content: Raha ny zanakavavin’ny mpisorona no mandoto ny tenany amin’ny fijangajangana dia efa manamavo ny rainy izy ka hodorana amin’ny afo.
  - type: heading
    content: Fitsipika momba ny Mpisoronabe
