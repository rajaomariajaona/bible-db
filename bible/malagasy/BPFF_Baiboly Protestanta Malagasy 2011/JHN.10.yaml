document_id: JHN.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpiandry ondry sy ny ondriny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa fa izay tsy miditra amin’ny vavahady ho amin’ny valan’ondry fa mananika ny fefy dia mpangalatra sy jiolahy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa izay miditra amin’ny vavahady no mpiandry ny ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izy no vohàn’ny mpiandry vavahady; ary ny ondry dia mihaino ny feony; koa izay ondriny tokoa dia antsoiny amin’ny anarany avy ary entiny mivoaka avy tao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa mamoaka ny ondriny rehetra izy dia mialoha azy ireo; ary manaraka azy ny ondriny satria mahalala ny feony ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny vahiny dia tsy mba harahiny, fa handosirany, satria tsy fantany ny feon’ny vahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izany fanoharana izany no nataon’i Jesosy taminy, nefa tsy azon’ireo nihaino, izay tiany nolazainy taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Mpiandry tsara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy indray Jesosy taminy: Lazaiko aminareo marina dia marina tokoa: Izaho no vavahadin’ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mpangalatra sy jiolahy izay rehetra tonga talohako; fa tsy nihaino azy ny ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izaho no vavahady; raha Izaho no idiran’ny olona dia hovonjena izy ka hiditra sy hivoaka sady hahazo hanina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny mpangalatra dia tsy avy raha tsy hangalatra sy hamono ary handringana; Izaho kosa avy mba hananany fiainana sady hananany be dia be.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izaho no Mpiandry tsara; ny Mpiandry tsara dia manolotra ny ainy hamonjy ny ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny mpikarama, satria tsy mpiandry na tompon’ny ondry izy, koa raha mahita ny amboadia avy, dia mandao ny ondry ka mandositra, ary ny amboadia kosa dia misambotra ny ondry ka mampihahaka azy ireo; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mandositra izy satria mpikarama ka tsy miraharaha ny ondry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izaho no Mpiandry tsara; ary fantatro ny Ahy sady fantany Aho, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia tahaka ny ahafantaran’ny Ray Ahy sy ny ahafantarako ny Ray; ary Izaho manolotra ny aiko hamonjy ny ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Manana ondry hafa izay tsy amin’ity vala ity Aho; ireny koa dia tsy maintsy hoentiko ka hihaino ny feoko; ary ho tonga andiany iray izy rehetra sady iray ihany ny Mpiandry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izany no itiavan’ny Raiko Ahy satria manolotra ny aiko Aho mba handraisako azy indray. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy misy manaisotra ny aiko Amiko, fa ny tenako ihany no manolotra azy. Manana fahefana hanolotra azy Aho ary manana fahefana haka azy indray. Izany didy izany dia azoko tamin’ny Raiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nisy fisarahana indray teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' noho izany teny izany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Maro tamin’ireo no niteny hoe: Manana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' Izy ka efa very saina; nahoana no mihaino Azy ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy kosa anefa ny sasany: Tsy mba tenin’ny demoniaka izany; moa ny demonia va mahay mampahiratra ny mason’ny jamba?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandavan’ny Jiosy an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tonga ny andro firavoravoana tany Jerosalema, dia ilay atao hoe Fitokanana, ary efa ririnina ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Jesosy nitsangantsangana tao amin’ny tempoly teo amin’ny fialofan’i Solomona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nitangoronan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' Izy ka nanontaniany hoe: Ambara-pahoviana no hampisalasalanao anay? Raha Ianao no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' dia lazao marimarina aminay. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Jesosy namaly azy hoe: Efa nilaza taminareo ihany Aho nefa tsy mino ianareo; ny asa izay ataoko amin’ny anaran’ny Raiko no manambara Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Kanefa tsy mino ianareo satria tsy mba isan’ny ondriko. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny ondriko dia mihaino ny feoko, mahalala azy Aho, ary manaraka Ahy izy, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary Izaho manome azy fiainana mandrakizay ka tsy ho very mandrakizay izy, ary tsy hisy handrombaka azy amin’ny tanako. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny Raiko izay nanome Ahy dia lehibe noho izy rehetra; ary tsy misy mahay mandrombaka amin’ny tanan’ny Ray. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Izaho sy ny Ray dia iray ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia naka vato indray ny Jiosy hitoraka Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa hoy Jesosy hoe: Maro ny asa tsara nasehoko taminareo avy tamin’ny Ray; koa ny asa manao ahoana amin’ireny moa no itorahanareo vato Ahy? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Namaly Azy ny Jiosy hoe: Tsy asa tsara no itorahanay vato Anao, fa fitenenan-dratsy, satria olona ihany Ianao nefa manao ny tenanao ho Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy Jesosy hoe: Tsy voasoratra ao amin’ny lalànanareo va hoe: «Hoy aho: Ianareo andriamanitra» (Sal 82.6)? '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Raha ireny izay nanaovana izany tenin’Andriamanitra izany no natao hoe andriamanitra, ary ny Soratra Masina dia tsy azo foanana, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'moa izay nohasinin’ny Ray ka nirahiny ho amin’izao tontolo izao va no ataonareo hoe: Miteny ratsy ianao, satria hoy Aho: Zanak’Andriamanitra Aho? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Raha tsy manao ny asan’ny Raiko Aho dia aza mino Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa raha manao ny asany ihany kosa Aho, na tsy mino Ahy aza ianareo, dia minoa ny asa mba ho fantatrareo sy hekenareo fa ny Ray no ato Amiko, ary Izaho ao amin’ny Ray. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Dia nitady hisambotra Azy indray ny Jiosy; fa niala teo Izy ka tsy voatanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia lasa nankany andafin’i Jordana indray Jesosy, ho any amin’ilay toerana nanaovan’i Jaona batisa voalohany ka nitoetra tany Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Maro no nankeo Aminy ka nilaza hoe: Tsy mba nanao famantarana i Jaona, nefa izay rehetra nolazainy ny amin’ity lehilahy ity dia marina avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ary maro no nino Azy teo.
