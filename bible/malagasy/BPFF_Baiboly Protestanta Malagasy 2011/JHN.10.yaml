document_id: JHN.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpiandry ondry sy ny ondriny
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa fa izay tsy miditra amin’ny vavahady ho amin’ny valan’ondry fa mananika ny fefy dia mpangalatra sy jiolahy. '
  '10':
  - type: text
    content: Ny mpangalatra dia tsy avy raha tsy hangalatra sy hamono ary handringana; Izaho kosa avy mba hananany fiainana sady hananany be dia be.
  '11':
  - type: text
    content: 'Izaho no Mpiandry tsara; ny Mpiandry tsara dia manolotra ny ainy hamonjy ny ondry. '
  '12':
  - type: text
    content: 'Ary ny mpikarama, satria tsy mpiandry na tompon’ny ondry izy, koa raha mahita ny amboadia avy, dia mandao ny ondry ka mandositra, ary ny amboadia kosa dia misambotra ny ondry ka mampihahaka azy ireo; '
  '13':
  - type: text
    content: mandositra izy satria mpikarama ka tsy miraharaha ny ondry.
  '14':
  - type: text
    content: 'Izaho no Mpiandry tsara; ary fantatro ny Ahy sady fantany Aho, '
  '15':
  - type: text
    content: 'dia tahaka ny ahafantaran’ny Ray Ahy sy ny ahafantarako ny Ray; ary Izaho manolotra ny aiko hamonjy ny ondry. '
  '16':
  - type: text
    content: Manana ondry hafa izay tsy amin’ity vala ity Aho; ireny koa dia tsy maintsy hoentiko ka hihaino ny feoko; ary ho tonga andiany iray izy rehetra sady iray ihany ny Mpiandry.
  '17':
  - type: text
    content: 'Izany no itiavan’ny Raiko Ahy satria manolotra ny aiko Aho mba handraisako azy indray. '
  '18':
  - type: text
    content: Tsy misy manaisotra ny aiko Amiko, fa ny tenako ihany no manolotra azy. Manana fahefana hanolotra azy Aho ary manana fahefana haka azy indray. Izany didy izany dia azoko tamin’ny Raiko.
  '19':
  - type: text
    content: 'Ary nisy fisarahana indray teo amin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' noho izany teny izany. '
  '2':
  - type: text
    content: 'Fa izay miditra amin’ny vavahady no mpiandry ny ondry. '
  '20':
  - type: text
    content: 'Maro tamin’ireo no niteny hoe: Manana '
  - type: text
    content: demonia
  - type: text
    content: ' Izy ka efa very saina; nahoana no mihaino Azy ianareo? '
  '21':
  - type: text
    content: 'Hoy kosa anefa ny sasany: Tsy mba tenin’ny demoniaka izany; moa ny demonia va mahay mampahiratra ny mason’ny jamba?'
  - type: heading
    content: Ny nandavan’ny Jiosy an’i Jesosy
  '22':
  - type: text
    content: 'Tonga ny andro firavoravoana tany Jerosalema, dia ilay atao hoe Fitokanana, ary efa ririnina ny andro. '
  '23':
  - type: text
    content: 'Ary Jesosy nitsangantsangana tao amin’ny tempoly teo amin’ny fialofan’i Solomona. '
  '24':
  - type: text
    content: 'Dia nitangoronan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' Izy ka nanontaniany hoe: Ambara-pahoviana no hampisalasalanao anay? Raha Ianao no '
  - type: text
    content: Kristy
  - type: text
    content: ' dia lazao marimarina aminay. '
  '25':
  - type: text
    content: 'Ary Jesosy namaly azy hoe: Efa nilaza taminareo ihany Aho nefa tsy mino ianareo; ny asa izay ataoko amin’ny anaran’ny Raiko no manambara Ahy. '
  '26':
  - type: text
    content: 'Kanefa tsy mino ianareo satria tsy mba isan’ny ondriko. '
  '27':
  - type: text
    content: 'Ny ondriko dia mihaino ny feoko, mahalala azy Aho, ary manaraka Ahy izy, '
  '28':
  - type: text
    content: 'ary Izaho manome azy fiainana mandrakizay ka tsy ho very mandrakizay izy, ary tsy hisy handrombaka azy amin’ny tanako. '
  '29':
  - type: text
    content: 'Ny Raiko izay nanome Ahy dia lehibe noho izy rehetra; ary tsy misy mahay mandrombaka amin’ny tanan’ny Ray. '
  '3':
  - type: text
    content: 'Ary izy no vohàn’ny mpiandry vavahady; ary ny ondry dia mihaino ny feony; koa izay ondriny tokoa dia antsoiny amin’ny anarany avy ary entiny mivoaka avy tao. '
  '30':
  - type: text
    content: Izaho sy ny Ray dia iray ihany.
  '31':
  - type: text
    content: 'Dia naka vato indray ny Jiosy hitoraka Azy. '
  '32':
  - type: text
    content: 'Fa hoy Jesosy hoe: Maro ny asa tsara nasehoko taminareo avy tamin’ny Ray; koa ny asa manao ahoana amin’ireny moa no itorahanareo vato Ahy? '
  '33':
  - type: text
    content: 'Namaly Azy ny Jiosy hoe: Tsy asa tsara no itorahanay vato Anao, fa fitenenan-dratsy, satria olona ihany Ianao nefa manao ny tenanao ho Andriamanitra. '
  '34':
  - type: text
    content: 'Dia hoy Jesosy hoe: Tsy voasoratra ao amin’ny lalànanareo va hoe: «Hoy aho: Ianareo andriamanitra» (Sal 82.6)? '
  '35':
  - type: text
    content: 'Raha ireny izay nanaovana izany tenin’Andriamanitra izany no natao hoe andriamanitra, ary ny Soratra Masina dia tsy azo foanana, '
  '36':
  - type: text
    content: 'moa izay nohasinin’ny Ray ka nirahiny ho amin’izao tontolo izao va no ataonareo hoe: Miteny ratsy ianao, satria hoy Aho: Zanak’Andriamanitra Aho? '
  '37':
  - type: text
    content: 'Raha tsy manao ny asan’ny Raiko Aho dia aza mino Ahy. '
  '38':
  - type: text
    content: 'Fa raha manao ny asany ihany kosa Aho, na tsy mino Ahy aza ianareo, dia minoa ny asa mba ho fantatrareo sy hekenareo fa ny Ray no ato Amiko, ary Izaho ao amin’ny Ray. '
  '39':
  - type: text
    content: Dia nitady hisambotra Azy indray ny Jiosy; fa niala teo Izy ka tsy voatanany.
  '4':
  - type: text
    content: 'Rehefa mamoaka ny ondriny rehetra izy dia mialoha azy ireo; ary manaraka azy ny ondriny satria mahalala ny feony ireo. '
  '40':
  - type: text
    content: 'Dia lasa nankany andafin’i Jordana indray Jesosy, ho any amin’ilay toerana nanaovan’i Jaona batisa voalohany ka nitoetra tany Izy. '
  '41':
  - type: text
    content: 'Maro no nankeo Aminy ka nilaza hoe: Tsy mba nanao famantarana i Jaona, nefa izay rehetra nolazainy ny amin’ity lehilahy ity dia marina avokoa. '
  '42':
  - type: text
    content: Ary maro no nino Azy teo.
  '5':
  - type: text
    content: Ny vahiny dia tsy mba harahiny, fa handosirany, satria tsy fantany ny feon’ny vahiny.
  '6':
  - type: text
    content: Izany fanoharana izany no nataon’i Jesosy taminy, nefa tsy azon’ireo nihaino, izay tiany nolazainy taminy.
  - type: heading
    content: Ny Mpiandry tsara
  '7':
  - type: text
    content: 'Dia hoy indray Jesosy taminy: Lazaiko aminareo marina dia marina tokoa: Izaho no vavahadin’ondry. '
  '8':
  - type: text
    content: 'Mpangalatra sy jiolahy izay rehetra tonga talohako; fa tsy nihaino azy ny ondry. '
  '9':
  - type: text
    content: 'Izaho no vavahady; raha Izaho no idiran’ny olona dia hovonjena izy ka hiditra sy hivoaka sady hahazo hanina. '
