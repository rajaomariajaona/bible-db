document_id: AMO.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahatokiana diso toerana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lozan’ireo miadana ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ireo matokitoky foana ao amin’ny tendrombohitr’i Samaria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo malaza eo amin’ny firenena malaza indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hatonin’ny taranak’Israely!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mankanesa any Kalne ianareo ka mijere,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandrosoa ho any Hamata lehibe avy eo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia midìna ho any Gatan’ny Filistina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsara noho ireo fanjakana ireo va ianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lehibe noho ny tanin’ireo va ny taninareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ianareo dia mihevitra ny andro fahoriana ho mbola lavitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mampanakaiky ny fanjakan’ny fampahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mandrimandry eo amin’ny farafara ivoara
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mitsilailay eo amin’ny fandrianany izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary homana ny zanak’ondry avy amin’ny andian’ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny zanak’omby avy ao am-pahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mihirahira foana manaraka ny feon-dokanga izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamorona zavamaneno toy ny nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Misotro divay amin’ny kapoaka tsara tarehy izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mihosotra diloilo tsara indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy mba onena ny faharavan’i Josefa!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa amin’izao dia ho voalohany amin’izay hobaboina ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitsahatra ny koranan’izay mitsilailay foana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny handravana an’i Samaria
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: NY TOMPO Andriamanitra dia nianiana tamin’ny tenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fahavetavetana eo anatrehako ny fireharehan’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary halako ny lapany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa hatolotro ny tanàna mbamin’izay rehetra ao anatiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha folo lahy no sisa ao amin’ny trano iray dia samy ho faty izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny havan’ireo maty izay mibata ny faty handoro azy ka mitondra ny taolana hiala tao an-trano dia hiteny amin’izay ao an-trano hoe: Mbola misy olona ihany va ato aminao? Ary raha hoy izy: Tapitra! Dia hovaliany hoe: Mangìna re! Tsy tokony hotononina ny anaran’NY TOMPO!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa indro, NY TOMPO mandidy
- type: usfm
  marker: q1
  children:
  - type: text
    text: handravana ny trano lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hotresatresahina ny trano madinika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mihazakazaka eny amin’ny vatolampy va ny soavaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy olona mampihosy omby va eny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no efa navadikareo ho poizina ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vokatry ny fahamarinana ho zava-mahafaty?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fandresena roa nefa tsy nisy vokany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ianareo izay mifaly ny amin’i Lo-Dabara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lo-Dabara: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: anaran-tanàna iray izay midika hoe Zava-poana.
    marker-yv: yv-n
  - type: text
    text: ' ka miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy ny herinay va no nahazoanay an’i Karnaima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Karnaima: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: anaran-tanàna iray hafa koa izay midika hoe Tandroka roa, na Hery.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, hanangana firenena hamely anareo Aho, ry taranak’Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampahory anareo hatrany akaikin’i Hamata izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatramin’ny lohasahan-driaka any amin’ny tany ngazana.
