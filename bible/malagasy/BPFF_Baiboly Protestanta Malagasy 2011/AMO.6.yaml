document_id: AMO.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatokiana diso toerana
  - type: text
    content: 'Lozan’ireo miadana ao '
  - type: text
    content: Ziona
  - type: text
    content: sy ireo matokitoky foana ao amin’ny tendrombohitr’i Samaria,
  - type: text
    content: dia ireo malaza eo amin’ny firenena malaza indrindra,
  - type: text
    content: sady hatonin’ny taranak’Israely!
  '10':
  - type: text
    content: 'Ary ny havan’ireo maty izay mibata ny faty handoro azy ka mitondra ny taolana hiala tao an-trano dia hiteny amin’izay ao an-trano hoe: Mbola misy olona ihany va ato aminao? Ary raha hoy izy: Tapitra! Dia hovaliany hoe: Mangìna re! Tsy tokony hotononina ny anaran’NY TOMPO!'
  '11':
  - type: text
    content: Fa indro, NY TOMPO mandidy
  - type: text
    content: handravana ny trano lehibe
  - type: text
    content: ka hotresatresahina ny trano madinika.
  '12':
  - type: text
    content: Mihazakazaka eny amin’ny vatolampy va ny soavaly,
  - type: text
    content: misy olona mampihosy omby va eny
  - type: text
    content: no efa navadikareo ho poizina ny rariny
  - type: text
    content: ary ny vokatry ny fahamarinana ho zava-mahafaty?
  - type: heading
    content: Fandresena roa nefa tsy nisy vokany
  '13':
  - type: text
    content: Ianareo izay mifaly ny amin’i Lo-Dabara
  - type: note
    content: 'Lo-Dabara: anaran-tanàna iray izay midika hoe Zava-poana.'
  - type: text
    content: ' ka miteny hoe:'
  - type: text
    content: Moa tsy ny herinay va no nahazoanay an’i Karnaima
  - type: note
    content: 'Karnaima: anaran-tanàna iray hafa koa izay midika hoe Tandroka roa, na Hery.'
  - type: text
    content: '?'
  '14':
  - type: text
    content: Indro, hanangana firenena hamely anareo Aho, ry taranak’Israely,
  - type: text
    content: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao;
  - type: text
    content: hampahory anareo hatrany akaikin’i Hamata izy
  - type: text
    content: ka hatramin’ny lohasahan-driaka any amin’ny tany ngazana.
  '2':
  - type: text
    content: Mankanesa any Kalne ianareo ka mijere,
  - type: text
    content: mandrosoa ho any Hamata lehibe avy eo;
  - type: text
    content: dia midìna ho any Gatan’ny Filistina;
  - type: text
    content: tsara noho ireo fanjakana ireo va ianareo?
  - type: text
    content: Lehibe noho ny tanin’ireo va ny taninareo?
  '3':
  - type: text
    content: Ianareo dia mihevitra ny andro fahoriana ho mbola lavitra,
  - type: text
    content: nefa mampanakaiky ny fanjakan’ny fampahoriana.
  '4':
  - type: text
    content: Mandrimandry eo amin’ny farafara ivoara
  - type: text
    content: sy mitsilailay eo amin’ny fandrianany izy ireo
  - type: text
    content: ary homana ny zanak’ondry avy amin’ny andian’ondry
  - type: text
    content: sy ny zanak’omby avy ao am-pahitra.
  '5':
  - type: text
    content: Mihirahira foana manaraka ny feon-dokanga izy ireo
  - type: text
    content: ary mamorona zavamaneno toy ny nataon’i Davida.
  '6':
  - type: text
    content: Misotro divay amin’ny kapoaka tsara tarehy izy ireo
  - type: text
    content: sady mihosotra diloilo tsara indrindra,
  - type: text
    content: nefa tsy mba onena ny faharavan’i Josefa!
  '7':
  - type: text
    content: Koa amin’izao dia ho voalohany amin’izay hobaboina ireo
  - type: text
    content: ary hitsahatra ny koranan’izay mitsilailay foana.
  - type: heading
    content: Ny handravana an’i Samaria
  '8':
  - type: text
    content: NY TOMPO Andriamanitra dia nianiana tamin’ny tenany;
  - type: text
    content: 'hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
  - type: text
    content: Fahavetavetana eo anatrehako ny fireharehan’i Jakoba
  - type: text
    content: ary halako ny lapany;
  - type: text
    content: koa hatolotro ny tanàna mbamin’izay rehetra ao anatiny.
  '9':
  - type: text
    content: 'Ary raha folo lahy no sisa ao amin’ny trano iray dia samy ho faty izy ireo. '
