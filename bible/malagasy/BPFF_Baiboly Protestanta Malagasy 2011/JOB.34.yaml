document_id: JOB.34
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy misy mitombina izay lazain’i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary mbola niteny ihany i Eliho hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandrenesa ny teniko, ianareo olon-kendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihainoa ahy, ianareo manam-pahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny sofina no mamantatra teny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vava no manandrana hanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa aoka izay rariny no hodinihintsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hiara-mamantatra izay tsara isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa i Joba dia efa niteny hoe: Marina aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy nesorin’Andriamanitra tamiko ny rariny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: marina ny ahy nefa ampandaingainy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahafaty ny zana-tsipìka mitsatoka amiko, na dia tsy manam-pahadisoana aza aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aiza no misy lehilahy tahaka an’i Joba
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay misotro famingavingana toy ny rano
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary tonga naman’ny mpanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady miara-mandeha amin’ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy izy: Tsy mahasoa ny olona'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mihavana amin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa amin’izany, mihainoa ahy, ianareo manam-panahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lavitra an’Andriamanitra ny hanao ratsy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary lavitra ny Tsitoha ny hanao meloka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny nataon’ny olona ihany no ampanodiaviny azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamaly ny tsirairay araka ny lalany avy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny tokoa, Andriamanitra tsy manao ratsy mihitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Tsitoha tsy mba mamadika ny rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Iza moa no nanendry Azy ho Mpiandraikitra ny tany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no nanorina izao tontolo izao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha toa ka ny tenany ihany no heveriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hangoniny ho any Aminy ny fanahiny sy ny fofonainy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia hiala avokoa ny ain’ny nofo rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiverina amin’ny vovoka ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha manam-pahalalana ianao dia henoy izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka atongilano amin’ny teniko ny sofinao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moa mahay mitondra va izay tsy tia rariny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Ilay marina sady mahery va no hohelohinao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mety va ny miteny amin’ny mpanjaka hoe: Olom-poana ianao?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’ny zanak’andriana hoe: Ry ilay ratsy?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy mizaha ny tavan’ny lehibe Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy manaja ny ambony mihoatra noho ny ambany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria samy asan’ny tanany avokoa izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Maty amin’ny indray mipy maso monja amin’ny mamatonalina ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihetsiketsika ny vahoaka dia ringana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mahery dia lasa tsy nesorin-tanan’olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa ny mason’Andriamanitra dia mijery ny alehan’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahita ny diany rehetra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy misy haizina na aloky ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ahazoan’ny mpanao ratsy miery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa Andriamanitra tsy miandry ela vao mandinika ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tonga hotsaraina eo anatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Manorotoro ny olona mahery Izy na dia tsy manadina azy aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manangana olon-kafa hisolo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa fantany ny asan’ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manongana azy amin’ny alina Izy dia torotoro ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tehafiny tanana tahaka ny fanao amin’ny ratsy fanahy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo imason’ny vahoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izany dia noho ny nialan’ireo tamin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nitandremany ny lalany akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Noho izany dia tonga eo anatrehany ny fitarainan’ny madinika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka reny ny fitarainan’ny ory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha mangina Izy, iza no hahay hanameloka Azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha manafin-tava Izy, iza no hahajery Azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa Izy dia mijery ny firenena na ny olona tsirairay
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: mba tsy hanjakan’ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho voafandrika ny vahoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa moa va mba efa nisy niteny tamin’Andriamanitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nivesatra ny fijaliako aho ka tsy hanao ratsy intsony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: izay tsy hitako dia mba ampianaro ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha nanao ratsy aho dia tsy hanao intsony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Moa araka ny hevitrao va no hamalian’Andriamanitra ny ataon’ny olona no mandà ny toroheviny ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no mifidy fa tsy izaho!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izay fantatrao no ambarao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ny olona manam-panahy no hilaza amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny olon-kendry izay mihaino ahy dia hiteny amiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Miteny tsy amim-pahalalana i Joba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny teniny dia tsy amim-pahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Enga anie ka hozahan-toetra mandrakariva i Joba
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny famaliny araka ny fanaon’ny ratsy fanahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa ampiany fihaikana koa ny fahotany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miteha-tanana eto amintsika izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manao teny maro hoenti-miady amin’Andriamanitra.
