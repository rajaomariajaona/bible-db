document_id: JOB.34,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy misy mitombina izay lazain’i Joba
  - type: text
    content: 'Ary mbola niteny ihany i Eliho hoe:'
  '10':
  - type: text
    content: Koa amin’izany, mihainoa ahy, ianareo manam-panahy!
  - type: text
    content: Lavitra an’Andriamanitra ny hanao ratsy!
  - type: text
    content: Ary lavitra ny Tsitoha ny hanao meloka!
  '11':
  - type: text
    content: Fa ny nataon’ny olona ihany no ampanodiaviny azy
  - type: text
    content: ka mamaly ny tsirairay araka ny lalany avy Izy.
  '12':
  - type: text
    content: Eny tokoa, Andriamanitra tsy manao ratsy mihitsy
  - type: text
    content: ary ny Tsitoha tsy mba mamadika ny rariny.
  '13':
  - type: text
    content: Iza moa no nanendry Azy ho Mpiandraikitra ny tany?
  - type: text
    content: Ary iza no nanorina izao tontolo izao?
  '14':
  - type: text
    content: Raha toa ka ny tenany ihany no heveriny
  - type: text
    content: ka hangoniny ho any Aminy ny fanahiny sy ny fofonainy,
  '15':
  - type: text
    content: dia hiala avokoa ny ain’ny nofo rehetra
  - type: text
    content: ary hiverina amin’ny vovoka ny olona.
  '16':
  - type: text
    content: Raha manam-pahalalana ianao dia henoy izao
  - type: text
    content: ka atongilano amin’ny teniko ny sofinao!
  '17':
  - type: text
    content: Moa mahay mitondra va izay tsy tia rariny?
  - type: text
    content: Ary Ilay marina sady mahery va no hohelohinao?
  '18':
  - type: text
    content: 'Mety va ny miteny amin’ny mpanjaka hoe: Olom-poana ianao?'
  - type: text
    content: 'Ary amin’ny zanak’andriana hoe: Ry ilay ratsy?'
  '19':
  - type: text
    content: Tsy mizaha ny tavan’ny lehibe Izy
  - type: text
    content: ary tsy manaja ny ambony mihoatra noho ny ambany
  - type: text
    content: satria samy asan’ny tanany avokoa izy rehetra.
  '2':
  - type: text
    content: Mandrenesa ny teniko, ianareo olon-kendry,
  - type: text
    content: ary mihainoa ahy, ianareo manam-pahalalana.
  '20':
  - type: text
    content: Maty amin’ny indray mipy maso monja amin’ny mamatonalina ireny;
  - type: text
    content: mihetsiketsika ny vahoaka dia ringana izy
  - type: text
    content: ary ny mahery dia lasa tsy nesorin-tanan’olona.
  '21':
  - type: text
    content: Fa ny mason’Andriamanitra dia mijery ny alehan’ny olona
  - type: text
    content: ary mahita ny diany rehetra Izy.
  '22':
  - type: text
    content: Tsy misy haizina na aloky ny fahafatesana
  - type: text
    content: izay ahazoan’ny mpanao ratsy miery.
  '23':
  - type: text
    content: Fa Andriamanitra tsy miandry ela vao mandinika ny olona
  - type: text
    content: izay tonga hotsaraina eo anatrehany.
  '24':
  - type: text
    content: Manorotoro ny olona mahery Izy na dia tsy manadina azy aza
  - type: text
    content: ka manangana olon-kafa hisolo azy.
  '25':
  - type: text
    content: Fa fantany ny asan’ireo
  - type: text
    content: ka manongana azy amin’ny alina Izy dia torotoro ireo.
  '26':
  - type: text
    content: Tehafiny tanana tahaka ny fanao amin’ny ratsy fanahy ireo
  - type: text
    content: eo imason’ny vahoaka.
  '27':
  - type: text
    content: Izany dia noho ny nialan’ireo tamin’Andriamanitra
  - type: text
    content: ka tsy nitandremany ny lalany akory.
  '28':
  - type: text
    content: Noho izany dia tonga eo anatrehany ny fitarainan’ny madinika
  - type: text
    content: ka reny ny fitarainan’ny ory.
  '29':
  - type: text
    content: Raha mangina Izy, iza no hahay hanameloka Azy?
  - type: text
    content: Raha manafin-tava Izy, iza no hahajery Azy?
  - type: text
    content: Nefa Izy dia mijery ny firenena na ny olona tsirairay
  '3':
  - type: text
    content: Fa ny sofina no mamantatra teny
  - type: text
    content: ary ny vava no manandrana hanina.
  '30':
  - type: text
    content: mba tsy hanjakan’ny ratsy fanahy
  - type: text
    content: ary tsy ho voafandrika ny vahoaka.
  '31':
  - type: text
    content: 'Fa moa va mba efa nisy niteny tamin’Andriamanitra hoe:'
  - type: text
    content: Efa nivesatra ny fijaliako aho ka tsy hanao ratsy intsony;
  '32':
  - type: text
    content: izay tsy hitako dia mba ampianaro ahy;
  - type: text
    content: raha nanao ratsy aho dia tsy hanao intsony?
  '33':
  - type: text
    content: Moa araka ny hevitrao va no hamalian’Andriamanitra ny ataon’ny olona no mandà ny toroheviny ianao?
  - type: text
    content: Ianao no mifidy fa tsy izaho!
  - type: text
    content: Koa izay fantatrao no ambarao!
  '34':
  - type: text
    content: Ny olona manam-panahy no hilaza amiko
  - type: text
    content: 'ary ny olon-kendry izay mihaino ahy dia hiteny amiko hoe:'
  '35':
  - type: text
    content: Miteny tsy amim-pahalalana i Joba
  - type: text
    content: ary ny teniny dia tsy amim-pahendrena.
  '36':
  - type: text
    content: Enga anie ka hozahan-toetra mandrakariva i Joba
  - type: text
    content: noho ny famaliny araka ny fanaon’ny ratsy fanahy!
  '37':
  - type: text
    content: Fa ampiany fihaikana koa ny fahotany;
  - type: text
    content: miteha-tanana eto amintsika izy
  - type: text
    content: ka manao teny maro hoenti-miady amin’Andriamanitra.
  '4':
  - type: text
    content: Koa aoka izay rariny no hodinihintsika
  - type: text
    content: ary aoka hiara-mamantatra izay tsara isika.
  '5':
  - type: text
    content: 'Fa i Joba dia efa niteny hoe: Marina aho,'
  - type: text
    content: saingy nesorin’Andriamanitra tamiko ny rariny;
  '6':
  - type: text
    content: marina ny ahy nefa ampandaingainy aho;
  - type: text
    content: mahafaty ny zana-tsipìka mitsatoka amiko, na dia tsy manam-pahadisoana aza aho.
  '7':
  - type: text
    content: Aiza no misy lehilahy tahaka an’i Joba
  - type: text
    content: izay misotro famingavingana toy ny rano
  '8':
  - type: text
    content: ary tonga naman’ny mpanao ratsy
  - type: text
    content: sady miara-mandeha amin’ny ratsy fanahy?
  '9':
  - type: text
    content: 'Fa hoy izy: Tsy mahasoa ny olona'
  - type: text
    content: ny mihavana amin’Andriamanitra.
