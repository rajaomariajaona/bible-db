document_id: JER.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Toky mamitaka tao amin’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mijoroa eo am-bavahadin’ny tranon’NY TOMPO, ary torio eo izao teny izao ka lazao hoe: Mihainoa ny tenin’NY TOMPO ianareo, ry Joda rehetra izay miditra amin’ireto vavahady ireto mba hiankohoka eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Ataovy tsara ny lalanareo sy ny ataonareo dia hamponeniko amin’ity tany ity ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza matoky ny teny lainga hoe: Tempolin’NY TOMPO, tempolin’NY TOMPO, tempolin’NY TOMPO ity! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha ahitsinareo tsara ny lalanareo sy ny ataonareo, raha mitsara marina ny adin’olona amin’ny namany ianareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary tsy mampahory ny vahiny sy ny kamboty ary ny mpitondratena, na mandatsaka ran’ny tsy manan-tsiny amin’ity tany ity sady tsy manaraka andriamanitra hafa hahatonga loza aminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia hamponeniko amin’ity tany ity ihany ianareo, eto amin’ny tany nomeko ny razanareo, hatramin’ny ela ka ho mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'E! Ianareo matoky ny teny lainga, nefa tsy mahasoa akory izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hay! Hangalatra sy hamono olona ary hijangajanga va ianareo ary hianian-tsy to sy handoro ditin-kazo manitra ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' sady hanaraka andriamanitra hafa izay tsy fantatrareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nefa mbola avy miseho eto anatrehako amin’ity trano izay efa niantsoana ny anarako ity ihany ianareo ka miteny hoe: Efa voavonjy izahay ka izany no nanaovanay ireo fahavetavetana rehetra ireo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moa ataonareo ho zohy fieren’ny jiolahy va ity trano izay efa niantsoana ny anarako ity? Indro, ny tenako aza dia mahita izany, hoy NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa mandehana ianareo any amin’ny fitoerako izay tao Silo, dia ilay nasiako ny anarako tany am-boalohany, ka jereo izay nataoko taminy noho ny haratsian’ny Israely oloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa ankehitriny, hoy NY TOMPO, satria nanao izany zavatra rehetra izany ianareo, ary niteny taminareo Aho, eny, nifoha maraina koa Aho ka niteny taminareo nefa tsy nohenoinareo, ary niantso anareo Aho nefa tsy novalinareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'koa dia ho toy ny nataoko tamin’i Silo no hataoko amin’ny trano izay efa niantsoana ny anarako sady itokianareo, sy hataoko amin’ny toerana izay nomeko anareo sy ny razanareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ary hesoriko hiala eto anatrehako ianareo toy ny nanesorako ny rahalahinareo rehetra, dia ny taranak’i Efraima rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandà tsy hihaino NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa aza mivavaka ho an’ity firenena ity ianao, ary aza manandratra fitarainana sy fivavahana ho azy na mifona Amiko, fa tsy hihaino anao Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy hitanao va ny ataon’ireo any an-tanànan’ny Joda sy any an-dalamben’i Jerosalema? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Manangona kitay ny ankizy, mandrehitra afo ny rainy, ary mametafeta ny koba hatao mofo ho an’ny mpanjakavavin’ny lanitra ny vehivavy. Manolotra fanatitra aidina ho an’ny andriamanitra hafa izy ireo mba hampahasosotra Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moa Izaho va no ampahasosorin’ireo, hoy NY TOMPO, fa tsy ny tenany ihany ka hampahamenatra ny tavany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Indro, ny fahatezerako sy ny fahavinirako dia haidina amin’ity tany ity, dia amin’ny olona sy ny biby fiompy, amin’ny hazo any an-tsaha ary ny vokatry ny tany; dia hirehitra izany ka tsy ho faty.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Firenena tsy mihaino ny feon’Andriamaniny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Aoka ny fanatitra dorana manontolo ho naman’ny fanatitrareo hafa alatsa-dra, koa mihinàna hena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa tsy niteny na nandidy momba ny fanatitra dorana manontolo sy ny fanatitra hafa tamin’ny razanareo Aho tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa izao kosa no nandidiako azy: Henoy ny feoko, dia ho Andriamanitrareo Aho, ary ho oloko ianareo ka handeha amin’ny lalana rehetra nandidiako anareo, mba hahitanareo soa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Kanjo tsy nihaino izy na nanongilana ny sofiny fa nandeha tamin’ny fisainany sy ny ditran’ny fo ratsiny ihany izy dia niamboho, fa tsy mba nanatrika Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hatramin’ny andro nivoahan’ny razanareo avy tany amin’ny tany Ejipta ka ambaraka androany dia nirahiko ho any aminareo ihany ny mpaminany mpanompoko rehetra, eny, nifoha vao maraina isanandro Aho ka naniraka azy mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nefa tsy nihaino Ahy izy ireo sady tsy nanongilana ny sofiny, fa nanamafy ny hatony ka nanao izay ratsy mihoatra noho ny razany aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary na dia holazainao aminy aza ireo teny rehetra ireo dia tsy hihaino anao izy; ary na dia antsoinao aza izy dia tsy hamaly anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa lazao aminy hoe: Ity no firenena tsy mihaino ny feon’NY TOMPO Andriamaniny sady tsy mino anatra; very ny fahamarinana fa tsy eo am-bavany intsony.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Lohasahan’ny famonoana olona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hetezo ny volonao, ry Jerosalema, ka ario,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manaova hira fisaonana any an-tendrombohitra mangadihady
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria lavin’NY TOMPO sy afoiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny taranaka mahatezitra Azy.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa manao izay ratsy eo imasoko ny taranak’i Joda, hoy NY TOMPO, mametraka ny fahavetavetany ao amin’ny trano izay efa niantsoana ny anarako izy mba handoto azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary izy dia nanorina ireo toerana fanaovana sorona any Tofeta izay ao amin’ny Lohasahan’ny taranak’i Hinoma, handoroany ny zanany lahy sy ny zanany vavy amin’ny afo; nefa zavatra tsy mba nandidiako na tao an-tsaiko akory aza izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa indro, avy ny andro, hoy NY TOMPO, izay tsy hiantsoana azy intsony hoe Tofeta na Lohasahan’ny taranak’i Hinoma, fa Lohasahan’ny famonoana olona kosa; ary any Tofeta aza no handevenana noho ny hateren’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny fatin’ity firenena ity dia ho fihinan’ny voromanidina sy ny bibidia ka tsy hisy hanaitaitra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia hatsahatro any an-tanànan’ny Joda sy eny an-dalamben’i Jerosalema ny feo mifaly sy ny feo miravoravo, dia ny feon’ny mpampakatra sy ny feon’ny ampakarina; fa ho lao ny tany.
