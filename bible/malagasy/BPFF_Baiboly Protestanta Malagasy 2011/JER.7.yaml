document_id: JER.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Toky mamitaka tao amin’ny tempoly
  - type: text
    content: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO: '
  '10':
  - type: text
    content: 'Nefa mbola avy miseho eto anatrehako amin’ity trano izay efa niantsoana ny anarako ity ihany ianareo ka miteny hoe: Efa voavonjy izahay ka izany no nanaovanay ireo fahavetavetana rehetra ireo! '
  '11':
  - type: text
    content: 'Moa ataonareo ho zohy fieren’ny jiolahy va ity trano izay efa niantsoana ny anarako ity? Indro, ny tenako aza dia mahita izany, hoy NY TOMPO. '
  '12':
  - type: text
    content: 'Fa mandehana ianareo any amin’ny fitoerako izay tao Silo, dia ilay nasiako ny anarako tany am-boalohany, ka jereo izay nataoko taminy noho ny haratsian’ny Israely oloko. '
  '13':
  - type: text
    content: 'Koa ankehitriny, hoy NY TOMPO, satria nanao izany zavatra rehetra izany ianareo, ary niteny taminareo Aho, eny, nifoha maraina koa Aho ka niteny taminareo nefa tsy nohenoinareo, ary niantso anareo Aho nefa tsy novalinareo, '
  '14':
  - type: text
    content: 'koa dia ho toy ny nataoko tamin’i Silo no hataoko amin’ny trano izay efa niantsoana ny anarako sady itokianareo, sy hataoko amin’ny toerana izay nomeko anareo sy ny razanareo; '
  '15':
  - type: text
    content: ary hesoriko hiala eto anatrehako ianareo toy ny nanesorako ny rahalahinareo rehetra, dia ny taranak’i Efraima rehetra.
  - type: heading
    content: Mandà tsy hihaino NY TOMPO
  '16':
  - type: text
    content: 'Koa aza mivavaka ho an’ity firenena ity ianao, ary aza manandratra fitarainana sy fivavahana ho azy na mifona Amiko, fa tsy hihaino anao Aho. '
  '17':
  - type: text
    content: 'Tsy hitanao va ny ataon’ireo any an-tanànan’ny Joda sy any an-dalamben’i Jerosalema? '
  '18':
  - type: text
    content: 'Manangona kitay ny ankizy, mandrehitra afo ny rainy, ary mametafeta ny koba hatao mofo ho an’ny mpanjakavavin’ny lanitra ny vehivavy. Manolotra fanatitra aidina ho an’ny andriamanitra hafa izy ireo mba hampahasosotra Ahy. '
  '19':
  - type: text
    content: 'Moa Izaho va no ampahasosorin’ireo, hoy NY TOMPO, fa tsy ny tenany ihany ka hampahamenatra ny tavany? '
  '2':
  - type: text
    content: 'Mijoroa eo am-bavahadin’ny tranon’NY TOMPO, ary torio eo izao teny izao ka lazao hoe: Mihainoa ny tenin’NY TOMPO ianareo, ry Joda rehetra izay miditra amin’ireto vavahady ireto mba hiankohoka eo anatrehan’NY TOMPO. '
  '20':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Indro, ny fahatezerako sy ny fahavinirako dia haidina amin’ity tany ity, dia amin’ny olona sy ny biby fiompy, amin’ny hazo any an-tsaha ary ny vokatry ny tany; dia hirehitra izany ka tsy ho faty.'
  - type: heading
    content: Firenena tsy mihaino ny feon’Andriamaniny
  '21':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Aoka ny fanatitra dorana manontolo ho naman’ny fanatitrareo hafa alatsa-dra, koa mihinàna hena. '
  '22':
  - type: text
    content: 'Fa tsy niteny na nandidy momba ny fanatitra dorana manontolo sy ny fanatitra hafa tamin’ny razanareo Aho tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Ejipta. '
  '23':
  - type: text
    content: 'Fa izao kosa no nandidiako azy: Henoy ny feoko, dia ho Andriamanitrareo Aho, ary ho oloko ianareo ka handeha amin’ny lalana rehetra nandidiako anareo, mba hahitanareo soa. '
  '24':
  - type: text
    content: 'Kanjo tsy nihaino izy na nanongilana ny sofiny fa nandeha tamin’ny fisainany sy ny ditran’ny fo ratsiny ihany izy dia niamboho, fa tsy mba nanatrika Ahy. '
  '25':
  - type: text
    content: 'Hatramin’ny andro nivoahan’ny razanareo avy tany amin’ny tany Ejipta ka ambaraka androany dia nirahiko ho any aminareo ihany ny mpaminany mpanompoko rehetra, eny, nifoha vao maraina isanandro Aho ka naniraka azy mandrakariva. '
  '26':
  - type: text
    content: 'Nefa tsy nihaino Ahy izy ireo sady tsy nanongilana ny sofiny, fa nanamafy ny hatony ka nanao izay ratsy mihoatra noho ny razany aza. '
  '27':
  - type: text
    content: 'Ary na dia holazainao aminy aza ireo teny rehetra ireo dia tsy hihaino anao izy; ary na dia antsoinao aza izy dia tsy hamaly anao. '
  '28':
  - type: text
    content: 'Koa lazao aminy hoe: Ity no firenena tsy mihaino ny feon’NY TOMPO Andriamaniny sady tsy mino anatra; very ny fahamarinana fa tsy eo am-bavany intsony.'
  - type: heading
    content: Ny Lohasahan’ny famonoana olona
  '29':
  - type: text
    content: Hetezo ny volonao, ry Jerosalema, ka ario,
  - type: text
    content: ary manaova hira fisaonana any an-tendrombohitra mangadihady
  - type: text
    content: satria lavin’NY TOMPO sy afoiny
  - type: text
    content: ny taranaka mahatezitra Azy.
  '3':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Ataovy tsara ny lalanareo sy ny ataonareo dia hamponeniko amin’ity tany ity ianareo. '
  '30':
  - type: text
    content: 'Fa manao izay ratsy eo imasoko ny taranak’i Joda, hoy NY TOMPO, mametraka ny fahavetavetany ao amin’ny trano izay efa niantsoana ny anarako izy mba handoto azy. '
  '31':
  - type: text
    content: 'Ary izy dia nanorina ireo toerana fanaovana sorona any Tofeta izay ao amin’ny Lohasahan’ny taranak’i Hinoma, handoroany ny zanany lahy sy ny zanany vavy amin’ny afo; nefa zavatra tsy mba nandidiako na tao an-tsaiko akory aza izany. '
  '32':
  - type: text
    content: 'Koa indro, avy ny andro, hoy NY TOMPO, izay tsy hiantsoana azy intsony hoe Tofeta na Lohasahan’ny taranak’i Hinoma, fa Lohasahan’ny famonoana olona kosa; ary any Tofeta aza no handevenana noho ny hateren’ny tany. '
  '33':
  - type: text
    content: 'Ary ny fatin’ity firenena ity dia ho fihinan’ny voromanidina sy ny bibidia ka tsy hisy hanaitaitra azy. '
  '34':
  - type: text
    content: Dia hatsahatro any an-tanànan’ny Joda sy eny an-dalamben’i Jerosalema ny feo mifaly sy ny feo miravoravo, dia ny feon’ny mpampakatra sy ny feon’ny ampakarina; fa ho lao ny tany.
  '4':
  - type: text
    content: 'Aza matoky ny teny lainga hoe: Tempolin’NY TOMPO, tempolin’NY TOMPO, tempolin’NY TOMPO ity! '
  '5':
  - type: text
    content: 'Fa raha ahitsinareo tsara ny lalanareo sy ny ataonareo, raha mitsara marina ny adin’olona amin’ny namany ianareo, '
  '6':
  - type: text
    content: 'ary tsy mampahory ny vahiny sy ny kamboty ary ny mpitondratena, na mandatsaka ran’ny tsy manan-tsiny amin’ity tany ity sady tsy manaraka andriamanitra hafa hahatonga loza aminareo, '
  '7':
  - type: text
    content: 'dia hamponeniko amin’ity tany ity ihany ianareo, eto amin’ny tany nomeko ny razanareo, hatramin’ny ela ka ho mandrakizay. '
  '8':
  - type: text
    content: 'E! Ianareo matoky ny teny lainga, nefa tsy mahasoa akory izany. '
  '9':
  - type: text
    content: 'Hay! Hangalatra sy hamono olona ary hijangajanga va ianareo ary hianian-tsy to sy handoro ditin-kazo manitra ho an’ny '
  - type: text
    content: Baala
  - type: text
    content: ' sady hanaraka andriamanitra hafa izay tsy fantatrareo? '
