document_id: JER.31,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Famerenana ny Israely ao amin’ny taniny
  - type: text
    content: 'Amin’izany andro izany, hoy NY TOMPO, dia ho Andriamanitry ny isam-pianakavian’ny Israely Aho ary ho oloko izy. '
  '10':
  - type: text
    content: 'Mihainoa ny tenin’NY TOMPO, ianareo '
  - type: text
    content: Jentilisa
  - type: text
    content: ','
  - type: text
    content: ary torio any amin’ny tany amoron-tsiraka any lavitra any izany
  - type: text
    content: 'ka lazao hoe: Izay nampiely ny Israely no hanangona azy indray'
  - type: text
    content: sady hitandrina azy toy ny fitandrin’ny mpiandry ondry ny ondriny.
  '11':
  - type: text
    content: Fa NY TOMPO efa nanavotra an’i Jakoba
  - type: text
    content: ary efa nanafaka azy tamin’ny tanan’ny mahery noho izy.
  '12':
  - type: text
    content: 'Dia ho avy ireny ka hihoby ao amin’ny havoanan’i '
  - type: text
    content: Ziona
  - type: text
    content: ','
  - type: text
    content: dia hitanjozotra ho any amin’ny zava-tsoan’NY TOMPO,
  - type: text
    content: dia ny vary, ny ranom-boaloboka, ny diloilo,
  - type: text
    content: ny zanak’ondry ary ny zanak’omby;
  - type: text
    content: ary ny fiainany dia ho toy ny tanimboly vonton-drano
  - type: text
    content: ka tsy halazo intsony.
  '13':
  - type: text
    content: Ary amin’izany dia ho faly amin’ny fandihizana ny virijiny
  - type: text
    content: mbamin’ny zatovo sy ny antitra koa;
  - type: text
    content: hampodiko ho fifaliana ny fitomaniany;
  - type: text
    content: hampiononiko izy
  - type: text
    content: ary hampifaliako ho afaka alahelo.
  '14':
  - type: text
    content: Dia hovokisako zava-matavy ny mpisorona
  - type: text
    content: ary ho voky ny zava-tsoako ny oloko,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Misy fanantenana ny amin’ny ho avinao
  '15':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Nisy feo re tao Rama,
  - type: text
    content: dia fidradradradrana sy fitomaniana fatratra;
  - type: text
    content: nitomany ny zanany Rahely
  - type: text
    content: ary tsy azo nampiononina izy noho ny amin’ny zanany
  - type: text
    content: satria lany ritra ireny.
  '16':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Atsaharo ny fitomanianao
  - type: text
    content: sy ny fandatsahanao ranomaso;
  - type: text
    content: fa hisy valiny tokoa ny asanao,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: ary hody avy any amin’ny tanin’ny fahavalo ireny.
  '17':
  - type: text
    content: Ary misy fanantenana ny amin’ny ho avinao,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: fa ny zanakao dia hiverina ho ao amin’ny taniny indray.
  '18':
  - type: text
    content: 'Efa reko tokoa i Efraima nitomany ny tenany hoe:'
  - type: text
    content: Nofaizinao aho, eny, nofaizina
  - type: text
    content: toy ny ombilahy kely tsy voafolaka;
  - type: text
    content: avereno aho dia ho tafaverina,
  - type: text
    content: fa Ianao no TOMPO Andriamanitro.
  '19':
  - type: text
    content: Nony efa niverina tokoa aho dia vao nahalala fanenenana;
  - type: text
    content: ary rehefa nampahafantarina
  - type: text
    content: ny toe-tenako aho dia niteha-tratra;
  - type: text
    content: menatra sady mangaihay aho
  - type: text
    content: fa latsain’ny tsinin’ny fahatanorako.
  '2':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Nahita fitia any an-tany efitra ny olona
  - type: text
    content: izay sisa tsy matin’ny sabatra;
  - type: text
    content: mandroso ho amin’ny fitsaharana Israely.
  '20':
  - type: text
    content: Zanako mahafinaritra va i Efraima,
  - type: text
    content: zanaka malalako va izy,
  - type: text
    content: no dia fatra-pahatsiaro azy Aho isaky ny miresaka ny aminy?
  - type: text
    content: Noho izany dia onena azy ny foko;
  - type: text
    content: hamindra fo aminy tokoa Aho,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Miverena, ry Israely
  '21':
  - type: text
    content: Manangàna famantaran-dalana ho anao ianao, manorena tsangambato;
  - type: text
    content: saino tsara ny lalana efa voavoatra,
  - type: text
    content: dia ilay lalana efa nalehanao;
  - type: text
    content: miverena indray, ry Israely virijiny,
  - type: text
    content: miverena indray ho amin’ireto tanànanao ireto.
  '22':
  - type: text
    content: Mandra-pahoviana no hirioriovanao,
  - type: text
    content: ry zanakavavy mpikomy?
  - type: text
    content: 'Fa NY TOMPO efa namorona zava-baovao amin’ny tany:'
  - type: text
    content: Ny vehivavy indray no hitady lehilahy.
  - type: heading
    content: Fampodiana an’ny Joda
  '23':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Mbola holazaina indray ao amin’ny tanin’ny Joda sy ao amin’ny tanànany izao teny izao, rehefa hampodiko avy amin’ny fahababoany izy: Hotahìn’NY TOMPO anie ianao, ry fonenan’ny fahamarinana, sy ry tendrombohitry ny fahamasinana! '
  '24':
  - type: text
    content: 'Ary i Joda sy ny tanànany rehetra dia hiara-monina ao aminy ho mpiasa tany sy ho mpilasy mitondra ny andian’ny ondry aman’osiny. '
  '25':
  - type: text
    content: 'Fa ny fanahy ana dia hampisotroiko, ary ny fanahy mihaosa rehetra dia hovokisako. '
  '26':
  - type: text
    content: Ary tamin’izay dia nahatsiaro aho ka nahita
  - type: text
    content: ary mamy ny torimasoko.
  - type: heading
    content: Miambina ny fanorenana sy ny fambolena ny firenena indray Andriamanitra
  '27':
  - type: text
    content: 'Indro, avy ny andro, hoy NY TOMPO, ka hafafiko eo amin’ny taranak’Israely sy ny taranak’i Joda ny taranak’olombelona sy ny taranaky ny biby fiompy. '
  '28':
  - type: text
    content: 'Ary toy ny niambenako azy mba hongotana sy hazera, harodana sy horavana ary hampahorina, dia ho toy izany no hiambenako azy haorina sy hambolena kosa, hoy NY TOMPO. '
  '29':
  - type: text
    content: 'Amin’izany andro izany izy dia tsy hiteny intsony hoe:'
  - type: text
    content: Ny ray no nihinana voaloboka marikivy
  - type: text
    content: ka ny nifin’ny zanany no madilo.
  '3':
  - type: text
    content: 'Avy any lavitra no nisehoan’NY TOMPO tamiko ka nitenenany hoe:'
  - type: text
    content: Fitiavana mandrakizay no nitiavako anao,
  - type: text
    content: koa izany no nampaharetako famindrampo ho anao.
  '30':
  - type: text
    content: Fa samy ho fatin’ny helony avy ny olona rehetra; na iza na iza no homana voaloboka marikivy dia izy ihany no hadilo nify.
  - type: heading
    content: Ny fanekena vaovao
  '31':
  - type: text
    content: 'Indro, avy ny andro, hoy NY TOMPO, izay hanaovako fanekena vaovao amin’ny taranak’Israely sy amin’ny taranak’i Joda, '
  '32':
  - type: text
    content: 'nefa tsy tahaka ny fanekena nataoko tamin’ny razany tamin’ny andro nitantanako azy nivoaka avy tany amin’ny tany Ejipta; fa izy ireny dia nivadika ny fanekeko, nefa Izaho no tompony hoy NY TOMPO. '
  '33':
  - type: text
    content: 'Fa izao no fanekena hataoko amin’ny taranak’Israely, rehefa afaka izany andro izany, hoy NY TOMPO: Hataoko ao an-tsainy ny lalànako sady hosoratako ao am-pony; Ary Izaho ho Andriamaniny ary ho oloko izy. '
  '34':
  - type: text
    content: 'Ary samy tsy hampianatra ny namany sy ny rahalahiny avy intsony izy hoe: Mahalalà NY TOMPO; fa samy hahalala Ahy avokoa izy rehetra, hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra, hoy NY TOMPO. Fa havelako ny helony ary tsy hotsarovako intsony ny fahotany.'
  - type: heading
    content: Ny firindran’ny voahary sy ny famindrampon’Andriamanitra
  '35':
  - type: text
    content: Izao no lazain’NY TOMPO
  - type: text
    content: izay manome ny masoandro ho fahazavana amin’ny antoandro,
  - type: text
    content: izay mampilahatra ny volana sy ny kintana ho fahazavana amin’ny alina,
  - type: text
    content: izay mampanonja ny ranomasina ka mampirohondrohona ny onjany,
  - type: text
    content: 'ny anarany dia Andriamanitra, Tompon’izao rehetra izao:'
  '36':
  - type: text
    content: Raha mitsahatra eo anoloako izany fandaminana izany,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: dia hitsahatra tsy ho firenena
  - type: text
    content: eo anatrehako mandrakizay kosa ny taranak’Israely.
  '37':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Raha misy maharefy ny lanitra ambony,
  - type: text
    content: na mahafantatra ny fanorenan’ny tany ambany,
  - type: text
    content: dia Izaho kosa hanary ny taranak’Israely rehetra
  - type: text
    content: noho izay rehetra nataony,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Jerosalema vaovao
  '38':
  - type: text
    content: 'Indro, avy ny andro, hoy NY TOMPO, izay hanorenana ity tanàna ity indray ho an’NY TOMPO hatramin’ny trano fiambenana any Hananela ka hatramin’ny vavahady eo an-jorony. '
  '39':
  - type: text
    content: 'Ary ny kofehy fandrefesana dia mbola hohenjaniko mahitsy hatreo an-tampon’ny havoanan’i Gareba, dia hasangodina ho any Goa; '
  '4':
  - type: text
    content: Mbola hanorina anao indray Aho ka hiorina ianao,
  - type: text
    content: ry Israely virijiny!
  - type: text
    content: Mbola hiravaka mitondra ny ampongatapakao ianao
  - type: text
    content: ka hivoaka amin’ny dihin’ny mifaly.
  '40':
  - type: text
    content: Ary ny lohasaha fanariana faty sy lavenona rehetra ary ny saha rehetra hatramin’ny Lohasahan-driakan’i Kidrona ka hatreo amin’ny zoron’ny vavahadin-tsoavaly eo atsinanana dia ho masina ho an’NY TOMPO; tsy hongotana na horavana intsony izy mandrakizay.
  '5':
  - type: text
    content: Mbola hanao tanim-boaloboka
  - type: text
    content: ao amin’ny tendrombohitr’i Samaria ianao;
  - type: text
    content: ny mpamboly dia hamboly sady hihinana ny vokatra.
  '6':
  - type: text
    content: Fa mbola hisy andro
  - type: text
    content: 'hiantsoan’ny mpitazana any amin’ny tany be havoana any Efraima hoe:'
  - type: text
    content: 'Mitsangàna ianareo ka andeha isika hiakatra any '
  - type: text
    content: Ziona
  - type: text
    content: ','
  - type: text
    content: ho any amin’NY TOMPO Andriamanitsika.
  '7':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO:'
  - type: text
    content: Mihobia amin’ny fifaliana noho ny amin’i Jakoba,
  - type: text
    content: ary mifalia noho ny amin’ny lohan’ny firenena,
  - type: text
    content: 'torionareo, deraonareo, ka lazao hoe:'
  - type: text
    content: TOMPO ô, vonjeo ny olonao,
  - type: text
    content: dia ny sisa amin’ny Israely.
  '8':
  - type: text
    content: Indro, hitondra azy avy any amin’ny tany avaratra Aho
  - type: text
    content: ary hanangona azy avy any amin’ny faran’ny tany,
  - type: text
    content: dia samy ho eny aminy avokoa na ny jamba, na ny mandringa,
  - type: text
    content: na izay bevohoka, na izay mihetsi-jaza;
  - type: text
    content: vahoaka marobe no hiverina atỳ.
  '9':
  - type: text
    content: Amin’ny fitomaniana no hiaviany,
  - type: text
    content: amin’ny fifonany no hitondrako azy;
  - type: text
    content: ary hoentiko ho eny amoron’ny renirano izy,
  - type: text
    content: amin’ny lalana mahitsy izay tsy hahatafintohina azy;
  - type: text
    content: fa Rain’Israely Aho
  - type: text
    content: ary i Efraima no lahimatoako.
  - type: heading
    content: Hampodina ho fifaliana ny fitomaniana
