document_id: JER.31,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famerenana ny Israely ao amin’ny taniny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany, hoy NY TOMPO, dia ho Andriamanitry ny isam-pianakavian’ny Israely Aho ary ho oloko izy. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mihainoa ny tenin’NY TOMPO, ianareo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary torio any amin’ny tany amoron-tsiraka any lavitra any izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka lazao hoe: Izay nampiely ny Israely no hanangona azy indray'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hitandrina azy toy ny fitandrin’ny mpiandry ondry ny ondriny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa NY TOMPO efa nanavotra an’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa nanafaka azy tamin’ny tanan’ny mahery noho izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia ho avy ireny ka hihoby ao amin’ny havoanan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitanjozotra ho any amin’ny zava-tsoan’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny vary, ny ranom-boaloboka, ny diloilo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanak’ondry ary ny zanak’omby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fiainany dia ho toy ny tanimboly vonton-drano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy halazo intsony.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’izany dia ho faly amin’ny fandihizana ny virijiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny zatovo sy ny antitra koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampodiko ho fifaliana ny fitomaniany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampiononiko izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampifaliako ho afaka alahelo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hovokisako zava-matavy ny mpisorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho voky ny zava-tsoako ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misy fanantenana ny amin’ny ho avinao
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisy feo re tao Rama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fidradradradrana sy fitomaniana fatratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitomany ny zanany Rahely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy azo nampiononina izy noho ny amin’ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria lany ritra ireny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atsaharo ny fitomanianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fandatsahanao ranomaso;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hisy valiny tokoa ny asanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hody avy any amin’ny tanin’ny fahavalo ireny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary misy fanantenana ny amin’ny ho avinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny zanakao dia hiverina ho ao amin’ny taniny indray.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Efa reko tokoa i Efraima nitomany ny tenany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nofaizinao aho, eny, nofaizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny ombilahy kely tsy voafolaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avereno aho dia ho tafaverina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao no TOMPO Andriamanitro.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nony efa niverina tokoa aho dia vao nahalala fanenenana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa nampahafantarina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny toe-tenako aho dia niteha-tratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: menatra sady mangaihay aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa latsain’ny tsinin’ny fahatanorako.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahita fitia any an-tany efitra ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay sisa tsy matin’ny sabatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandroso ho amin’ny fitsaharana Israely.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zanako mahafinaritra va i Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zanaka malalako va izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no dia fatra-pahatsiaro azy Aho isaky ny miresaka ny aminy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia onena azy ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamindra fo aminy tokoa Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miverena, ry Israely
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manangàna famantaran-dalana ho anao ianao, manorena tsangambato;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saino tsara ny lalana efa voavoatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay lalana efa nalehanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miverena indray, ry Israely virijiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miverena indray ho amin’ireto tanànanao ireto.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no hirioriovanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry zanakavavy mpikomy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa NY TOMPO efa namorona zava-baovao amin’ny tany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vehivavy indray no hitady lehilahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampodiana an’ny Joda
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Mbola holazaina indray ao amin’ny tanin’ny Joda sy ao amin’ny tanànany izao teny izao, rehefa hampodiko avy amin’ny fahababoany izy: Hotahìn’NY TOMPO anie ianao, ry fonenan’ny fahamarinana, sy ry tendrombohitry ny fahamasinana! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Joda sy ny tanànany rehetra dia hiara-monina ao aminy ho mpiasa tany sy ho mpilasy mitondra ny andian’ny ondry aman’osiny. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fanahy ana dia hampisotroiko, ary ny fanahy mihaosa rehetra dia hovokisako. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tamin’izay dia nahatsiaro aho ka nahita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamy ny torimasoko.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miambina ny fanorenana sy ny fambolena ny firenena indray Andriamanitra
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, avy ny andro, hoy NY TOMPO, ka hafafiko eo amin’ny taranak’Israely sy ny taranak’i Joda ny taranak’olombelona sy ny taranaky ny biby fiompy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary toy ny niambenako azy mba hongotana sy hazera, harodana sy horavana ary hampahorina, dia ho toy izany no hiambenako azy haorina sy hambolena kosa, hoy NY TOMPO. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany izy dia tsy hiteny intsony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ray no nihinana voaloboka marikivy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny nifin’ny zanany no madilo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Avy any lavitra no nisehoan’NY TOMPO tamiko ka nitenenany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fitiavana mandrakizay no nitiavako anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa izany no nampaharetako famindrampo ho anao.
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa samy ho fatin’ny helony avy ny olona rehetra; na iza na iza no homana voaloboka marikivy dia izy ihany no hadilo nify.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanekena vaovao
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, avy ny andro, hoy NY TOMPO, izay hanaovako fanekena vaovao amin’ny taranak’Israely sy amin’ny taranak’i Joda, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa tsy tahaka ny fanekena nataoko tamin’ny razany tamin’ny andro nitantanako azy nivoaka avy tany amin’ny tany Ejipta; fa izy ireny dia nivadika ny fanekeko, nefa Izaho no tompony hoy NY TOMPO. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no fanekena hataoko amin’ny taranak’Israely, rehefa afaka izany andro izany, hoy NY TOMPO: Hataoko ao an-tsainy ny lalànako sady hosoratako ao am-pony; Ary Izaho ho Andriamaniny ary ho oloko izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary samy tsy hampianatra ny namany sy ny rahalahiny avy intsony izy hoe: Mahalalà NY TOMPO; fa samy hahalala Ahy avokoa izy rehetra, hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra, hoy NY TOMPO. Fa havelako ny helony ary tsy hotsarovako intsony ny fahotany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny firindran’ny voahary sy ny famindrampon’Andriamanitra
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no lazain’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manome ny masoandro ho fahazavana amin’ny antoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mampilahatra ny volana sy ny kintana ho fahazavana amin’ny alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mampanonja ny ranomasina ka mampirohondrohona ny onjany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny anarany dia Andriamanitra, Tompon’izao rehetra izao:'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mitsahatra eo anoloako izany fandaminana izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitsahatra tsy ho firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehako mandrakizay kosa ny taranak’Israely.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha misy maharefy ny lanitra ambony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mahafantatra ny fanorenan’ny tany ambany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Izaho kosa hanary ny taranak’Israely rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho izay rehetra nataony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerosalema vaovao
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, avy ny andro, hoy NY TOMPO, izay hanorenana ity tanàna ity indray ho an’NY TOMPO hatramin’ny trano fiambenana any Hananela ka hatramin’ny vavahady eo an-jorony. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny kofehy fandrefesana dia mbola hohenjaniko mahitsy hatreo an-tampon’ny havoanan’i Gareba, dia hasangodina ho any Goa; '
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola hanorina anao indray Aho ka hiorina ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Israely virijiny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola hiravaka mitondra ny ampongatapakao ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hivoaka amin’ny dihin’ny mifaly.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny lohasaha fanariana faty sy lavenona rehetra ary ny saha rehetra hatramin’ny Lohasahan-driakan’i Kidrona ka hatreo amin’ny zoron’ny vavahadin-tsoavaly eo atsinanana dia ho masina ho an’NY TOMPO; tsy hongotana na horavana intsony izy mandrakizay.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola hanao tanim-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny tendrombohitr’i Samaria ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpamboly dia hamboly sady hihinana ny vokatra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mbola hisy andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hiantsoan’ny mpitazana any amin’ny tany be havoana any Efraima hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mitsangàna ianareo ka andeha isika hiakatra any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any amin’NY TOMPO Andriamanitsika.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihobia amin’ny fifaliana noho ny amin’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mifalia noho ny amin’ny lohan’ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'torionareo, deraonareo, ka lazao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, vonjeo ny olonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny sisa amin’ny Israely.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hitondra azy avy any amin’ny tany avaratra Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanangona azy avy any amin’ny faran’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy ho eny aminy avokoa na ny jamba, na ny mandringa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na izay bevohoka, na izay mihetsi-jaza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vahoaka marobe no hiverina atỳ.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fitomaniana no hiaviany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fifonany no hitondrako azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hoentiko ho eny amoron’ny renirano izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny lalana mahitsy izay tsy hahatafintohina azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Rain’Israely Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Efraima no lahimatoako.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hampodina ho fifaliana ny fitomaniana
    marker-yv: yv-h
