document_id: ISA.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: FIZARANA VOALOHANY
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny fahitan’Isaia zanak’i Amoza, izay hitany ny amin’ny Joda sy i Jerosalema tamin’ny andron’i Ozia, i Jotama, i Ahaza ary i Hezekia, izay samy mpanjakan’ny Joda.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nikomy nanohitra NY TOMPO ny Israely
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Henoy ny tenin’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mpitondra an’i Sodoma!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano amin’ny lalànan’Andriamanitsika ny sofinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry vahoakan’i Gomora!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hataoko inona ny zavatra betsaka vonoinareo ho fanatitra? Hoy NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tofoka amin’ny ondrilahy atao fanatitra dorana manontolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny jaboran’ny zanak’omby mifahy Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy sitrako ny ran’ny vantotra ombilahy sy ny an’ny zanak’ondry ary ny an’ny osilahy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Rehefa tonga miseho eo anatrehako ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iza moa no nitady anareo hanitsakitsaka ny kianjako?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aza mitondra fanati-poana intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahavetavetana amiko ny fofony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny amin’ny voaloham-bolana sy ny Sabata ary ny fiantsoam-pivoriana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy zakako ny fivoriana masina haroharoam-paharatsiana!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Halako ny voaloham-bolanareo sy ny andro firavoravoanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mavesatra amiko izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sasatra mitondra azy Aho.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Raha mamelatra ny tanana ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitampi-maso tsy hijery anareo Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, na dia manao vavaka be dia be aza ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hihaino Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno ran’olona ny tananareo.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Misasà ianareo, diovy ny tenanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: esory tsy ho eo anoloan’ny masoko ny ratsy fanaonareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atsaharo ny fanaovan-dratsy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mianara hanao ny tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: katsaho ny rariny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anaro ny mpampahory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: omeo rariny ny kamboty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arovy ny mpitondratena.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Avia ary hifandahatra isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mena toy ny jaky aza ny fahotanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tonga fotsy tahaka ny orampanala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mangatrakatraka tahaka ny sily aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tonga tahaka ny volon’ondry fotsy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Raha manaiky sy mankatò ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hihinana ny voka-tsoa amin’ny tany;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mihainoa ry lanitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano ny sofinao ry tany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa NY TOMPO no miteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitaiza sy nahalehibe zaza Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo nikomy Tamiko ireo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: fa raha mbola mandà sy mikomy ihany ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho lanin’ny sabatra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavan’NY TOMPO no niteny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hodiovin’Andriamanitra i Jerosalema
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Indrisy! Tonga janga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ity tanàna nahatoky!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno ny rariny izy taloha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nitoeran’ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ankehitriny kosa dia mpamono olona no ao aminy!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tonga tain-drendrika ny volafotsinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voatsatso tamin’ny rano ny divainao.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ireo lehibenao dia mpikomy sady naman’ny mpangalatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy tia kolikoly sy fatra-pitady tambitamby avokoa izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba omeny rariny ny kamboty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy avelany hoentina eo aminy ny adin’ny mpitondratena.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Noho izany dia hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ilay Maherin’ny Israely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: E! Hamely ny mpanohitra Ahy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamaly faty ny fahavaloko.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Hamerina ny tanako ho aminao indray Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hodioviko amin’ny sirahazo ianao hahafahan’ny tain-drendrikao anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hesoriko ny firaka rehetra aminao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia hampodiko ho toy ny teo aloha ny mpitsaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho toy ny tamin’ny voalohany ny mpanolotsainanao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa afaka izany, ianao dia hantsoina hoe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tanànan’ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tanàna mahatoky.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Havotana amin’ny fitsarana i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay miverina ao dia havotana amin’ny fahamarinana.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Samy haringana avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpikomy sy ny mpanota;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho lany ritra izay mahafoy NY TOMPO.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa hahazo henatra ianareo noho ny amin’ny hazo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terebinta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nifalianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hangaihay ianareo noho ny amin’ny saha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nofidinareo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny omby dia mahalala ny tompony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny boriky dia mahalala ny fihinanam-bilon’ny tompony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny Israely no tsy mahalala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny oloko no tsy mahazo an-tsaina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy misy izay tsy potika ao Joda
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Fa ho tahaka ny hazo terebinta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: malazo ravina ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho tahaka ny saha tsy misy rano.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ny mahery dia ho tahaka ny vohavoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny asany dia ho tahaka ny kilalaon’afo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiaraka hirehitra izy roa tonta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy hamono ny afo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Indrisy! Firenena mpanota,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: olona mavesa-keloka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: taranaka mpanao ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zanaka mpanao meloka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahafoy NY TOMPO izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanamavo ny Iray Masin’ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nikomy izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nahoana no mbola te hokapohina ihany ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho izao fikomianareo lalandava izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henika aretina ny loha manontolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary marary ny fo manontolo.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hatrany am-paladia ka hatrany an-tampon-doha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy misy izay tsy marary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ratra sy dian-kapoka ary fery vao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy voatsabo na voafehy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na voalemin’ny diloilo.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Lao ny taninareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voadoro tamin’ny afo ny tanànanareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lanin’ny hafa firenena eo imasonareo ny tanimbolinareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lao izy, toy ny efa noravan’ny hafa firenena.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nilaozana i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' zanakavavy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny trano rantsan-kazo ao anaty tanim-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny trano fialofan’ny mpiandry voly ao anaty tanim-boatango,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny tanàna natao fahirano.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha tsy Andriamanitra, Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no namela olona vitsivitsy tamintsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia efa tonga tahaka an’i Sodoma isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nitovy tamin’i Gomora.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanompoam-pivavahana maharikoriko an’Andriamanitra
    marker-yv: yv-h
