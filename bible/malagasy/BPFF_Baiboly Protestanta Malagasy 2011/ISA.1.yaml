document_id: ISA.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: FIZARANA VOALOHANY
  - type: text
    content: Ny fahitan’Isaia zanak’i Amoza, izay hitany ny amin’ny Joda sy i Jerosalema tamin’ny andron’i Ozia, i Jotama, i Ahaza ary i Hezekia, izay samy mpanjakan’ny Joda.
  - type: heading
    content: Nikomy nanohitra NY TOMPO ny Israely
  '10':
  - type: text
    content: Henoy ny tenin’NY TOMPO,
  - type: text
    content: ry mpitondra an’i Sodoma!
  - type: text
    content: Atongilano amin’ny lalànan’Andriamanitsika ny sofinareo,
  - type: text
    content: ry vahoakan’i Gomora!
  '11':
  - type: text
    content: Hataoko inona ny zavatra betsaka vonoinareo ho fanatitra? Hoy NY TOMPO.
  - type: text
    content: Efa tofoka amin’ny ondrilahy atao fanatitra dorana manontolo
  - type: text
    content: sy ny jaboran’ny zanak’omby mifahy Aho;
  - type: text
    content: tsy sitrako ny ran’ny vantotra ombilahy sy ny an’ny zanak’ondry ary ny an’ny osilahy.
  '12':
  - type: text
    content: Rehefa tonga miseho eo anatrehako ianareo,
  - type: text
    content: iza moa no nitady anareo hanitsakitsaka ny kianjako?
  '13':
  - type: text
    content: Aza mitondra fanati-poana intsony,
  - type: text
    content: fahavetavetana amiko ny fofony;
  - type: text
    content: 'ny amin’ny voaloham-bolana sy ny Sabata ary ny fiantsoam-pivoriana:'
  - type: text
    content: Tsy zakako ny fivoriana masina haroharoam-paharatsiana!
  '14':
  - type: text
    content: Halako ny voaloham-bolanareo sy ny andro firavoravoanareo,
  - type: text
    content: mavesatra amiko izany;
  - type: text
    content: sasatra mitondra azy Aho.
  '15':
  - type: text
    content: Raha mamelatra ny tanana ianareo
  - type: text
    content: dia hitampi-maso tsy hijery anareo Aho;
  - type: text
    content: eny, na dia manao vavaka be dia be aza ianareo
  - type: text
    content: dia tsy hihaino Aho;
  - type: text
    content: Feno ran’olona ny tananareo.
  '16':
  - type: text
    content: Misasà ianareo, diovy ny tenanareo,
  - type: text
    content: esory tsy ho eo anoloan’ny masoko ny ratsy fanaonareo;
  - type: text
    content: atsaharo ny fanaovan-dratsy;
  '17':
  - type: text
    content: Mianara hanao ny tsara,
  - type: text
    content: katsaho ny rariny,
  - type: text
    content: anaro ny mpampahory,
  - type: text
    content: omeo rariny ny kamboty,
  - type: text
    content: arovy ny mpitondratena.
  '18':
  - type: text
    content: Avia ary hifandahatra isika,
  - type: text
    content: hoy NY TOMPO.
  - type: text
    content: Na dia mena toy ny jaky aza ny fahotanareo
  - type: text
    content: dia ho tonga fotsy tahaka ny orampanala,
  - type: text
    content: Na dia mangatrakatraka tahaka ny sily aza
  - type: text
    content: dia ho tonga tahaka ny volon’ondry fotsy.
  '19':
  - type: text
    content: Raha manaiky sy mankatò ianareo
  - type: text
    content: dia hihinana ny voka-tsoa amin’ny tany;
  '2':
  - type: text
    content: Mihainoa ry lanitra!
  - type: text
    content: Atongilano ny sofinao ry tany!
  - type: text
    content: 'Fa NY TOMPO no miteny hoe:'
  - type: text
    content: Nitaiza sy nahalehibe zaza Aho,
  - type: text
    content: kanjo nikomy Tamiko ireo.
  '20':
  - type: text
    content: fa raha mbola mandà sy mikomy ihany ianareo
  - type: text
    content: dia ho lanin’ny sabatra.
  - type: text
    content: Ny vavan’NY TOMPO no niteny.
  - type: heading
    content: Hodiovin’Andriamanitra i Jerosalema
  '21':
  - type: text
    content: Indrisy! Tonga janga
  - type: text
    content: ity tanàna nahatoky!
  - type: text
    content: Feno ny rariny izy taloha
  - type: text
    content: sady nitoeran’ny fahamarinana,
  - type: text
    content: fa ankehitriny kosa dia mpamono olona no ao aminy!
  '22':
  - type: text
    content: Tonga tain-drendrika ny volafotsinao;
  - type: text
    content: voatsatso tamin’ny rano ny divainao.
  '23':
  - type: text
    content: Ireo lehibenao dia mpikomy sady naman’ny mpangalatra;
  - type: text
    content: samy tia kolikoly sy fatra-pitady tambitamby avokoa izy rehetra;
  - type: text
    content: tsy mba omeny rariny ny kamboty
  - type: text
    content: ary tsy avelany hoentina eo aminy ny adin’ny mpitondratena.
  '24':
  - type: text
    content: Noho izany dia hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: text
    content: 'Ilay Maherin’ny Israely:'
  - type: text
    content: E! Hamely ny mpanohitra Ahy Aho
  - type: text
    content: ary hamaly faty ny fahavaloko.
  '25':
  - type: text
    content: Hamerina ny tanako ho aminao indray Aho
  - type: text
    content: ka hodioviko amin’ny sirahazo ianao hahafahan’ny tain-drendrikao anao;
  - type: text
    content: hesoriko ny firaka rehetra aminao.
  '26':
  - type: text
    content: Dia hampodiko ho toy ny teo aloha ny mpitsaranao
  - type: text
    content: ary ho toy ny tamin’ny voalohany ny mpanolotsainanao.
  - type: text
    content: Rehefa afaka izany, ianao dia hantsoina hoe
  - type: text
    content: Tanànan’ny fahamarinana,
  - type: text
    content: Tanàna mahatoky.
  '27':
  - type: text
    content: 'Havotana amin’ny fitsarana i '
  - type: text
    content: Ziona
  - type: text
    content: ary izay miverina ao dia havotana amin’ny fahamarinana.
  '28':
  - type: text
    content: Samy haringana avokoa
  - type: text
    content: ny mpikomy sy ny mpanota;
  - type: text
    content: eny, ho lany ritra izay mahafoy NY TOMPO.
  '29':
  - type: text
    content: 'Fa hahazo henatra ianareo noho ny amin’ny hazo '
  - type: text
    content: terebinta
  - type: text
    content: izay nifalianareo
  - type: text
    content: ary hangaihay ianareo noho ny amin’ny saha
  - type: text
    content: izay nofidinareo.
  '3':
  - type: text
    content: Ny omby dia mahalala ny tompony,
  - type: text
    content: ary ny boriky dia mahalala ny fihinanam-bilon’ny tompony;
  - type: text
    content: fa ny Israely no tsy mahalala,
  - type: text
    content: ny oloko no tsy mahazo an-tsaina.
  - type: heading
    content: Tsy misy izay tsy potika ao Joda
  '30':
  - type: text
    content: Fa ho tahaka ny hazo terebinta
  - type: text
    content: malazo ravina ianareo
  - type: text
    content: sady ho tahaka ny saha tsy misy rano.
  '31':
  - type: text
    content: Ny mahery dia ho tahaka ny vohavoha,
  - type: text
    content: ny asany dia ho tahaka ny kilalaon’afo;
  - type: text
    content: hiaraka hirehitra izy roa tonta
  - type: text
    content: ary tsy hisy hamono ny afo.
  '4':
  - type: text
    content: Indrisy! Firenena mpanota,
  - type: text
    content: olona mavesa-keloka,
  - type: text
    content: taranaka mpanao ratsy,
  - type: text
    content: zanaka mpanao meloka!
  - type: text
    content: Nahafoy NY TOMPO izy,
  - type: text
    content: nanamavo ny Iray Masin’ny Israely,
  - type: text
    content: efa nikomy izy.
  '5':
  - type: text
    content: Nahoana no mbola te hokapohina ihany ianareo
  - type: text
    content: noho izao fikomianareo lalandava izao?
  - type: text
    content: Henika aretina ny loha manontolo
  - type: text
    content: ary marary ny fo manontolo.
  '6':
  - type: text
    content: Hatrany am-paladia ka hatrany an-tampon-doha
  - type: text
    content: dia tsy misy izay tsy marary,
  - type: text
    content: ratra sy dian-kapoka ary fery vao
  - type: text
    content: tsy voatsabo na voafehy
  - type: text
    content: na voalemin’ny diloilo.
  '7':
  - type: text
    content: Lao ny taninareo;
  - type: text
    content: voadoro tamin’ny afo ny tanànanareo;
  - type: text
    content: lanin’ny hafa firenena eo imasonareo ny tanimbolinareo.
  - type: text
    content: Lao izy, toy ny efa noravan’ny hafa firenena.
  '8':
  - type: text
    content: 'Nilaozana i '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy,'
  - type: text
    content: tahaka ny trano rantsan-kazo ao anaty tanim-boaloboka
  - type: text
    content: sy tahaka ny trano fialofan’ny mpiandry voly ao anaty tanim-boatango,
  - type: text
    content: tahaka ny tanàna natao fahirano.
  '9':
  - type: text
    content: Raha tsy Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: no namela olona vitsivitsy tamintsika,
  - type: text
    content: dia efa tonga tahaka an’i Sodoma isika
  - type: text
    content: ary nitovy tamin’i Gomora.
  - type: heading
    content: Fanompoam-pivavahana maharikoriko an’Andriamanitra
