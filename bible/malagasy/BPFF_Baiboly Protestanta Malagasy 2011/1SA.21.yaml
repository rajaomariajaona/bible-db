document_id: 1SA.21,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Dia niainga i Davida; fa i Jonatana kosa dia niverina tany an-tanàna.
  - type: heading
    content: Any Noba, ao amin’i Ahimeleka mpisorona i Davida
  '10':
  - type: text
    content: 'Fa hoy ny mpisorona: Ny sabatr’i Goliata filistina, ilay novonoinao tao amin’ny lohasaha Elaha no indro, mifono akanjo ao ambadiky ny '
  - type: text
    content: efoda
  - type: text
    content: ' ao; koa raha hoentinao dia ento; fa tsy misy afa-tsy iny eto. Dia hoy i Davida: Tsy misy tahaka iny, fa omeo ahy.'
  - type: heading
    content: Any amin’ny Filistina any Gata i Davida
  '11':
  - type: text
    content: 'Tamin’izany andro izany dia niainga i Davida ka nandositra mba tsy ho azon’i Saoly. Dia tonga tany amin’i Akisy, mpanjakan’i Gata izy. '
  '12':
  - type: text
    content: 'Ary hoy ny mpanompon’i Akisy taminy: Tsy ity moa no Davida, mpanjakan’ny tany? Tsy izy va no nandihizana sy nifampihirana hoe:'
  - type: text
    content: I Saoly dia nahafaty arivoarivo
  - type: text
    content: fa i Davida dia nahafaty alinalina?
  '13':
  - type: text
    content: 'Nalatsak’i Davida tao am-pony izany teny izany ka natahotra mafy an’i Akisy mpanjakan’i Gata izy. '
  '14':
  - type: text
    content: 'Dia nody adala teo imasony izy ka nanao fihetsiky ny olona very saina, sady nanoratsoratra teo amin’ny lelam-bavahady izy no navelany hanorika tamin’ny somony ny iviny. '
  '15':
  - type: text
    content: 'Dia hoy i Akisy tamin’ny mpanompony: Indro, hitanareo fa very saina io lehilahy io, koa nahoana no noentinareo tetỳ amiko? '
  '16':
  - type: text
    content: Moa mitady olona very saina va aho no nitondranareo ity olona very saina ity hanondrana eto anatrehako? Moa hiditra ato an-tranoko va Ilehio?
  '2':
  - type: text
    content: 'Ary tonga tany Noba, tany amin’i Ahimeleka mpisorona i Davida; dia toran-kovitra i Ahimeleka rehefa nihaona tamin’i Davida ka niteny taminy hoe: Nahoana no mandeha irery ianao fa tsy misy miaraka aminao? '
  '3':
  - type: text
    content: 'Dia hoy i Davida tamin’i Ahimeleka mpisorona: Ny mpanjaka dia efa nanome raharaha ahy ka hoy izy tamiko: Aoka tsy ho fantatr’olona ny raharaha nanirahako sy nampanaoviko anao, koa nasaiko nankarỳ ny zatovoko. '
  '4':
  - type: text
    content: 'Koa inona no misy ato aminao? Omeo mofo dimy aho ho vatsiko, na izay azonao atao. '
  '5':
  - type: text
    content: 'Hoy ny mpisorona tamin’i Davida: Tsy misy mofo fihinana eto an-tanako fa mofo masina ihany no ato; raha mba nifady vehivavy ahay mantsy ny zatovo! '
  '6':
  - type: text
    content: 'Ary hoy i Davida tamin’ny mpisorona: Eny, toy ny fanao rehefa hiady dia tsy niara-nitoetra tamim-behivavy izahay; ary tamin’izaho niainga dia masina ny fiadian’ny zatovo; ary na tsy masina aza ny anton-dianay dia hohamasinina izy anio noho ny fiadiana. '
  '7':
  - type: text
    content: 'Dia nanome azy mofo masina ny mpisorona satria tsy nisy mofo teo afa-tsy ny mofo atao fanatitra izay nalainy teo anatrehan’NY TOMPO mba hosoloina mofo mafana amin’ny andro anesorana azy. '
  '8':
  - type: text
    content: 'Nefa nisy iray tamin’ny mpanompon’i Saoly teo tamin’izany andro izany voahazona teo anatrehan’NY TOMPO; i Doega edomita no anarany; lehiben’ny mpiandry ondrin’i Saoly izy io. '
  '9':
  - type: text
    content: 'Dia hoy i Davida tamin’i Ahimeleka: Tsy misy lefona na sabatra va eto aminao? Fa tsy nitondra ny sabatro na ny fiadiako etỳ amiko aho satria nahamaika ny raharahan’ny mpanjaka. '
