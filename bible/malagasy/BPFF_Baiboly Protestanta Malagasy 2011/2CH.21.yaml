document_id: 2CH.21,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nodimandry any amin’ny razany i Josafata ka nalevina tao amin’ny razany tao an-Tanànan’i Davida izy; ary i Jehorama zanany no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakan’i Jehorama
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa ny Edomita dia mbola nikomy ka tsy nanoa ny Joda mandraka androany. Tamin’izany andro izany koa dia nikomy tsy nety nanoa an’i Jehorama i Libna, satria efa nahafoy NY TOMPO, Andriamanitry ny razany, izy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao toerana fanaovana sorona teny amin’ny tendrombohitr’i Joda koa i Jehorama sady nampijangajanga ny mponina tany Jerosalema no nitaona ny Joda mangingina hanao izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy soratra avy tamin’i Elia mpaminany tonga tao aminy nilaza hoe: Izao no lazain’NY TOMPO, Andriamanitr’i Davida rainao: Noho ny tsy nandehananao tamin’ny lalan’i Josafata rainao, na ny lalan’i Asa, mpanjakan’ny Joda, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nandeha tamin’ny lalan’ireo mpanjakan’ny Israely kosa ianao ka nampijangajanga ny Joda sy ny mponina any Jerosalema toy ny fijangajangan’ny taranak’i Ahaba, sady novonoinao koa ny rahalahinao nateraky ny rainao, izay tsara noho ianao, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia indro, hasian’NY TOMPO areti-mandringana ny vahoakanao sy ny zanakao ary ireo vadinao mbamin’ny biby fiompinao rehetra; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ho azon’ny aretina mafy koa ianao, dia aretina amin’ny tsinainao, mandra-pivoakan’ny tsinainao isanandro isanandro noho ny aretina.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO nampirisika ny Filistina sy ny Arabo izay ao akaikin’ny Kosita hamely an’i Jehorama. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niakatra tany Joda ireo ka nisesika tao, dia nobaboiny ny fananana rehetra izay an’ny ankohonan’ny mpanjaka mbamin’ny zanany sy ny vadiny koa ka tsy nisy zanany intsony, afa-tsy i Joahaza faralahiny ihany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka izany rehetra izany, dia nasian’NY TOMPO aretina tsy azo sitranina tamin’ny tsinainy izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afaka elaela, izany hoe roa taona, dia nivoaka tsikelikely ny tsinainy noho ny aretiny; koa maty tamin’ny fangirifiriana mafy izy. Ary ny vahoakany dia tsy mba nandoro zavatra ho fisaonana azy toy ny nataony tamin’ny razany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanana rahalahy, zanak’i Josafata, koa izy, dia i Azaria, i Jehiela, i Zakaria, i Azaria, i Mikaela ary i Sefatia; ireo rehetra ireo no zanak’i Josafata, mpanjakan’ny Israely. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Roa amby telopolo taona izy, raha nanomboka nanjaka, ary valo taona no nanjakany tany Jerosalema; koa tsy nisy nalahelo azy. Ary nalevina tao an-Tanànan’i Davida ihany izy, nefa tsy mba tao amin’ny fasan’ny mpanjaka.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomen’ny rainy harena betsaka izy ireo, dia volafotsy sy volamena ary zava-tsoa mbamin’ny tanàna mimanda sasany tany Joda; fa ny fanjakana kosa dia nomeny an’i Jehorama, satria izy no lahimatoa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa raha vao nanjaka tamin’ny fanjakan’ny rainy i Jehorama dia nitombo hery ka namono tamin’ny sabatra ny rahalahiny rehetra mbamin’ny mpanapaka sasany tamin’ny Israely.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 8.17-24
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Roa amby telopolo taona i Jehorama raha nanomboka nanjaka ary valo taona no nanjakany tany Jerosalema. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandeha tamin’ny lalan’ireo mpanjakan’ny Israely izy, dia tahaka ny nataon’ny taranak’i Ahaba, fa zanakavavin’i Ahaba no vadiny; eny, nanao izay ratsy teo imason’NY TOMPO izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa NY TOMPO tsy nety nandringana ny taranak’i Davida noho ny fanekena nataony tamin’i Davida sy ny nilazany fa homeny jiro mandrakizay izy mbamin’ny taranany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andron’i Jehorama no nikomian’ny Edomita tsy hanoa ny Joda fa nanangana mpanjaka ho azy izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga i Jehorama sy ireo mpanapaka sy ny kalesy fitondrany miady rehetra; ary nanaovany latsaka alina ny Edomita izay nanodidina azy sy ny komandin’ny kalesy fitondra miady. '
