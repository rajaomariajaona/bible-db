document_id: PSA.40
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aoka ho fantatry ny olona izay nataonao tamiko
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Niandry fatratra NY TOMPO aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia niondrika nitsinjo ahy Izy ka nandre ny fitarainako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nampiakatra ahy avy tao amin’ny lavaka fandringanana Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tamin’ny fotaka mandrevo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampitoetra ny tongotro teo ambony vatolampy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampijoro ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nanisy hira vaovao teo am-bavako Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fiderana an’Andriamanitsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maro no hahita sy hatahotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatoky NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sambatra ny olona izay manana NY TOMPO ho tokiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mivily ho naman’ny mpiavonavona
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny mpiampanga lainga!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nohamaroinao ny fahagagana sy ny hevitra izay nataonao ho anay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO Andriamanitro ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy azo ampitahaina aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tiako hambara sy holazaina ireny dia indro, maro loatra ka tsy tambo isaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fanatitra alatsa-dra sy ny fanatitra avy amin’ny zavamaniry dia tsy mba sitrakao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanokatra ny sofiko Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanatitra dorana manontolo sy ny fanatitra noho ny ota dia tsy mba nilainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy aho: Inty aho tonga;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny horonam-boky no nanoratana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny hanao ny sitraponao, Andriamanitra ô, no sitrako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lalànanao no ato anatiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nanambara teny mahafaly ny amin’ny fahamarinana teo amin’ny fiangonan-dehibe aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: indro, tsy mba nakomboko ny molotro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, Ianao no mahalala!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy mba nafeniko tato am-poko ny fahitsianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahamarinanao sy ny famonjenao no nambarako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nanafina ny famindramponao sy ny fahamarinanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fiangonan-dehibe aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ianao, TOMPO ô, aza manakana ny antranao tsy ho amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ny famindramponao sy ny fahamarinanao no hiaro ahy mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nanodidina ahy ny loza tsy tambo isaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahazo ahy ny heloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahazaka mijery azy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maro noho ny volon-dohako ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka reraka ny foko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aoka ho sitrakao, TOMPO ô, ny hanafaka ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, faingàna hamonjy ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aoka ho indray hitsanga-menatra sy hangaihay
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitady hanaisotra ny aiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hiamboho sy hitsanga-menatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay maniry ahy hidiran-doza!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aoka ho ankona noho ny fahamenarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ireo izay milaza amiko hoe: Hia! Akory izay!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka ho faly sy ho ravoravo Aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra mitady Anao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izay rehetra tia ny famonjenao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hiteny mandrakariva hoe: Lehibe NY TOMPO!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Na dia ory sy mahantra aza aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny Tompo no mihevitra ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpamonjy sy Mpanafaka ahy Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza ela, Andriamanitro ô!
