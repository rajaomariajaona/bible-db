document_id: PSA.40,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Aoka ho fantatry ny olona izay nataonao tamiko
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: Niandry fatratra NY TOMPO aho
  - type: text
    content: dia niondrika nitsinjo ahy Izy ka nandre ny fitarainako.
  '10':
  - type: text
    content: Tsy mba nafeniko tato am-poko ny fahitsianao,
  - type: text
    content: ny fahamarinanao sy ny famonjenao no nambarako;
  - type: text
    content: tsy nanafina ny famindramponao sy ny fahamarinanao
  - type: text
    content: tamin’ny fiangonan-dehibe aho.
  '11':
  - type: text
    content: Ianao, TOMPO ô, aza manakana ny antranao tsy ho amiko;
  - type: text
    content: aoka ny famindramponao sy ny fahamarinanao no hiaro ahy mandrakariva.
  '12':
  - type: text
    content: Nanodidina ahy ny loza tsy tambo isaina;
  - type: text
    content: nahazo ahy ny heloko
  - type: text
    content: ka tsy mahazaka mijery azy aho;
  - type: text
    content: maro noho ny volon-dohako ireny
  - type: text
    content: ka reraka ny foko.
  '13':
  - type: text
    content: Aoka ho sitrakao, TOMPO ô, ny hanafaka ahy!
  - type: text
    content: TOMPO ô, faingàna hamonjy ahy!
  '14':
  - type: text
    content: Aoka ho indray hitsanga-menatra sy hangaihay
  - type: text
    content: izay mitady hanaisotra ny aiko;
  - type: text
    content: aoka hiamboho sy hitsanga-menatra
  - type: text
    content: izay maniry ahy hidiran-doza!
  '15':
  - type: text
    content: Aoka ho ankona noho ny fahamenarany
  - type: text
    content: 'ireo izay milaza amiko hoe: Hia! Akory izay!'
  '16':
  - type: text
    content: Aoka ho faly sy ho ravoravo Aminao
  - type: text
    content: izay rehetra mitady Anao!
  - type: text
    content: Aoka izay rehetra tia ny famonjenao
  - type: text
    content: 'hiteny mandrakariva hoe: Lehibe NY TOMPO!'
  '17':
  - type: text
    content: Na dia ory sy mahantra aza aho
  - type: text
    content: dia ny Tompo no mihevitra ahy.
  - type: text
    content: Mpamonjy sy Mpanafaka ahy Ianao;
  - type: text
    content: aza ela, Andriamanitro ô!
  '2':
  - type: text
    content: Nampiakatra ahy avy tao amin’ny lavaka fandringanana Izy;
  - type: text
    content: eny, tamin’ny fotaka mandrevo;
  - type: text
    content: nampitoetra ny tongotro teo ambony vatolampy Izy
  - type: text
    content: ka nampijoro ahy.
  '3':
  - type: text
    content: Nanisy hira vaovao teo am-bavako Izy,
  - type: text
    content: dia fiderana an’Andriamanitsika;
  - type: text
    content: maro no hahita sy hatahotra
  - type: text
    content: ary hatoky NY TOMPO.
  '4':
  - type: text
    content: Sambatra ny olona izay manana NY TOMPO ho tokiny
  - type: text
    content: ka tsy mivily ho naman’ny mpiavonavona
  - type: text
    content: na ny mpiampanga lainga!
  '5':
  - type: text
    content: Nohamaroinao ny fahagagana sy ny hevitra izay nataonao ho anay,
  - type: text
    content: TOMPO Andriamanitro ô,
  - type: text
    content: tsy misy azo ampitahaina aminao;
  - type: text
    content: raha tiako hambara sy holazaina ireny dia indro, maro loatra ka tsy tambo isaina.
  '6':
  - type: text
    content: Ny fanatitra alatsa-dra sy ny fanatitra avy amin’ny zavamaniry dia tsy mba sitrakao.
  - type: text
    content: Nanokatra ny sofiko Ianao;
  - type: text
    content: ny fanatitra dorana manontolo sy ny fanatitra noho ny ota dia tsy mba nilainao.
  '7':
  - type: text
    content: 'Dia hoy aho: Inty aho tonga;'
  - type: text
    content: ao amin’ny horonam-boky no nanoratana ahy.
  '8':
  - type: text
    content: Ny hanao ny sitraponao, Andriamanitra ô, no sitrako
  - type: text
    content: ary ny lalànanao no ato anatiko.
  '9':
  - type: text
    content: Nanambara teny mahafaly ny amin’ny fahamarinana teo amin’ny fiangonan-dehibe aho;
  - type: text
    content: indro, tsy mba nakomboko ny molotro;
  - type: text
    content: TOMPO ô, Ianao no mahalala!
