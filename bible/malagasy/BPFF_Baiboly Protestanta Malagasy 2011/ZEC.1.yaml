document_id: ZEC.1
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: FIZARANA VOALOHANY
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miverena amiko ianareo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny volana fahavalo tamin’ny taona faharoa nanjakan’i Dariosy no tonga tamin’i Zakaria mpaminany, zanak’i Berekia, zanak’Ido, ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tezitra indrindra tamin’ny razanareo NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa lazao aminy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miverena amiko ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao, dia mba hiverina aminareo kosa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza mba toy ny razanareo izay nantsoin’ny mpaminany fahiny hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Mialà amin’ny lalan-dratsinareo sy amin’ny ratsy fanaonareo ianareo! Nefa tsy nankatò na nihaino Ahy izy, hoy NY TOMPO.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny razanareo, aiza moa ireny izao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpaminany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moa velona mandrakizay va ireny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny teniko sy ny didiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nandidiako ny mpaminany mpanompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nahatratra ny razanareo va izany?
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Dia niverina izy ireny ka niteny hoe: Araka izay nosainin’Andriamanitra, Tompon’izao rehetra izao, hatao amintsika araka ny alehantsika sy ny ataontsika, dia araka izany no nataony tamintsika.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitana voalohany: Ny mpitaingin-tsoavaly'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’ny andro fahefatra amby roapolo tamin’ny volana fahiraika amby folo na ny volana Sebata izany, tamin’ny taona faharoa nanjakan’i Dariosy, dia tonga tamin’i Zakaria mpaminany, zanak’i Berekia, zanak’Ido, ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nahita tamin’ny alina aho fa indro, nisy lehilahy nitaingina soavaly mena ka nijanona teny amin’ny rotra teny amin’ny lohasaha lalina, ary teo aorianany dia nisy soavaly mena sy mavo ary fotsy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy aho: Tompoko ô, midika inona moa ireo? Ary ilay anjely niresaka tamiko dia niteny tamiko hoe: Izaho haneho anao ny amin’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Ralehilahy izay nijanona teny amin’ny rotra: Ireo dia nirahin’NY TOMPO hivezivezy eny amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ireo mpitaingin-tsoavaly dia niteny tamin’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ' izay nijoro teny amin’ny rotra hoe: Efa nivezivezy teny amin’ny tany izahay, ary indro, ny tany rehetra dia miadana sy mandry fehizay. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ilay Anjelin’NY TOMPO: E, ry Andriamanitra, Tompon’izao rehetra izao ô! Mandra-pahoviana no tsy hamindranao fo amin’i Jerosalema sy amin’ny tanànan’i Joda, izay efa notezeranao fitopolo taona izao? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia novalian’NY TOMPO teny tsara sy mampionona ilay anjely niresaka tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ilay anjely niresaka tamiko dia niteny tamiko hoe: Ataovy antso avo hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saro-piaro dia saro-piaro
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny amin’i Jerosalema sy i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' Aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary tezitra indrindra Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ireo firenena miadana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Izaho dia tezitra kely ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ireo kosa dia nampitombo ny fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa tafaverina eto Jerosalema amin’ny indrafo Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tranoko dia haorina eto, hoy Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kofehy fandrefesana dia hohenjanina eto Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Miantsoa indray hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihoa-pampana ny fanambinana ny tanànako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary NY TOMPO hampionona an’i Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mbola hifidy an’i Jerosalema indray.
