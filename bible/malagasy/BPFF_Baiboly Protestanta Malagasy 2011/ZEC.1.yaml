document_id: ZEC.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: FIZARANA VOALOHANY
  - type: heading
    content: Miverena amiko ianareo
  - type: text
    content: 'Tamin’ny volana fahavalo tamin’ny taona faharoa nanjakan’i Dariosy no tonga tamin’i Zakaria mpaminany, zanak’i Berekia, zanak’Ido, ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Ary hoy Ralehilahy izay nijanona teny amin’ny rotra: Ireo dia nirahin’NY TOMPO hivezivezy eny amin’ny tany. '
  '11':
  - type: text
    content: 'Ary ireo mpitaingin-tsoavaly dia niteny tamin’ilay '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: ' izay nijoro teny amin’ny rotra hoe: Efa nivezivezy teny amin’ny tany izahay, ary indro, ny tany rehetra dia miadana sy mandry fehizay. '
  '12':
  - type: text
    content: 'Ary hoy ilay Anjelin’NY TOMPO: E, ry Andriamanitra, Tompon’izao rehetra izao ô! Mandra-pahoviana no tsy hamindranao fo amin’i Jerosalema sy amin’ny tanànan’i Joda, izay efa notezeranao fitopolo taona izao? '
  '13':
  - type: text
    content: 'Dia novalian’NY TOMPO teny tsara sy mampionona ilay anjely niresaka tamiko. '
  '14':
  - type: text
    content: 'Ary ilay anjely niresaka tamiko dia niteny tamiko hoe: Ataovy antso avo hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Saro-piaro dia saro-piaro
  - type: text
    content: 'ny amin’i Jerosalema sy i '
  - type: text
    content: Ziona
  - type: text
    content: ' Aho.'
  '15':
  - type: text
    content: Ary tezitra indrindra Aho
  - type: text
    content: amin’ireo firenena miadana;
  - type: text
    content: satria Izaho dia tezitra kely ihany,
  - type: text
    content: fa ireo kosa dia nampitombo ny fahoriana.
  '16':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO:'
  - type: text
    content: Efa tafaverina eto Jerosalema amin’ny indrafo Aho;
  - type: text
    content: ny tranoko dia haorina eto, hoy Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: ary ny kofehy fandrefesana dia hohenjanina eto Jerosalema.
  '17':
  - type: text
    content: 'Miantsoa indray hoe:'
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Hihoa-pampana ny fanambinana ny tanànako;
  - type: text
    content: ary NY TOMPO hampionona an’i Ziona,
  - type: text
    content: ary mbola hifidy an’i Jerosalema indray.
  '2':
  - type: text
    content: Tezitra indrindra tamin’ny razanareo NY TOMPO.
  '3':
  - type: text
    content: 'Koa lazao aminy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Miverena amiko ianareo,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao, dia mba hiverina aminareo kosa Aho,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '4':
  - type: text
    content: 'Aza mba toy ny razanareo izay nantsoin’ny mpaminany fahiny hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Mialà amin’ny lalan-dratsinareo sy amin’ny ratsy fanaonareo ianareo! Nefa tsy nankatò na nihaino Ahy izy, hoy NY TOMPO.'
  '5':
  - type: text
    content: Ny razanareo, aiza moa ireny izao?
  - type: text
    content: Ary ny mpaminany,
  - type: text
    content: moa velona mandrakizay va ireny?
  '6':
  - type: text
    content: Fa ny teniko sy ny didiko
  - type: text
    content: izay nandidiako ny mpaminany mpanompoko,
  - type: text
    content: tsy nahatratra ny razanareo va izany?
  - type: text
    content: 'Dia niverina izy ireny ka niteny hoe: Araka izay nosainin’Andriamanitra, Tompon’izao rehetra izao, hatao amintsika araka ny alehantsika sy ny ataontsika, dia araka izany no nataony tamintsika.'
  - type: heading
    content: 'Fahitana voalohany: Ny mpitaingin-tsoavaly'
  '7':
  - type: text
    content: 'Tamin’ny andro fahefatra amby roapolo tamin’ny volana fahiraika amby folo na ny volana Sebata izany, tamin’ny taona faharoa nanjakan’i Dariosy, dia tonga tamin’i Zakaria mpaminany, zanak’i Berekia, zanak’Ido, ny tenin’NY TOMPO hoe:'
  '8':
  - type: text
    content: 'Nahita tamin’ny alina aho fa indro, nisy lehilahy nitaingina soavaly mena ka nijanona teny amin’ny rotra teny amin’ny lohasaha lalina, ary teo aorianany dia nisy soavaly mena sy mavo ary fotsy. '
  '9':
  - type: text
    content: 'Dia hoy aho: Tompoko ô, midika inona moa ireo? Ary ilay anjely niresaka tamiko dia niteny tamiko hoe: Izaho haneho anao ny amin’ireo. '
