document_id: 1TI.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny andevo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay andevo rehetra eo ambanin’ny zioga dia aoka hanao ny tompony ho mendrika hohajaina tsara mba tsy hitenenana ratsy ny anaran’Andriamanitra sy ny fampianarana. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa ny fitiavam-bola no fototry ny ratsy rehetra, koa ny sasany izay fatra-pitady izany dia efa voavily niala tamin’ny finoana ka nanindrona ny tenany tamin’ny alahelo be.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatrafatry ny Apostoly Paoly ho an’i Timoty
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ianao kosa, ry lehilahin’Andriamanitra, dia mandosira ireny zavatra ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miezaha mitady fahamarinana, toe-panahy araka an’Andriamanitra, finoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fitiavana, faharetana, fahalemem-panahy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miadia ny ady tsaran’ny finoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hazòny ny fiainana mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho amin’izany koa no niantsoana anao sy nanaovanao ilay fanekena tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo imason’ny vavolombelona maro.
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izaho dia mananatra anao eo anatrehan’Andriamanitra izay mamelona ny zavatra rehetra ary eo anatrehan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy izay nanao ilay fanekena tsara teo anatrehan’i Pontio Pilato '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'mba hotahirizinao tsy hanan-tsiny amam-pondro hatramin’ny fisehoan’i Jesosy Kristy Tompontsika ireo didy ireo; '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: fa Izy no haneho izany amin’ny fotoanandrony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay hany tompom-pahefana sy loharanon’ny fahasambarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanjakan’ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy Tompon’ny tompo;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy ihany no manana ny tsy fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitoetra eo amin’ny mazava tsy azo hatonina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy hitan’olona sady tsy hainy jerena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho Azy anie ny voninahitra sy ny fanjakana mandrakizay. Amena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny mpanankarena
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anaro ny mpanankarena amin’izao fiainana ankehitriny izao mba tsy hiavonavona na hatoky ny harena miovaova fa hatoky an’Andriamanitra izay manome antsika malalaka ny zavatra rehetra mba hifaliantsika. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hanao soa izy ireo mba hanankarena amin’ny asa tsara, ary hazoto manome sy miantra, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hihary fanorenana tsara ho an’ny tenany ho amin’ny andro ho avy izy mba hihazonany ny tena fiainana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teny farany
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manana tompo mpino dia aoka tsy hanao tsinontsinona azy satria rahalahy izy; fa vao mainka tokony hotompoiny aza izy satria ilay mandray ny soa ataony dia mpino sady malala. Izany zavatra izany no ampianaro sy ananaro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampianarana izay tsy mifanaraka amin’ny fahatahorana an’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo zavatra ireo no ampianaro sy ananaro. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry Timoty, tehirizo ilay natolotra anao ka mialà amin’ny fibedibedena foana sy ny fanoherana avy amin’izay atao hoe fahalalana, kanjo tsy izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Neken’ny sasany izany ka nania tamin’ny finoana izy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho aminareo anie ny fahasoavana!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona manao fampianarana hafa noho izany ka tsy manaiky ny teny tsy misy kilema, ilay an’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika, sy ny fampianarana izay mahatonga ny toe-panahy araka an’Andriamanitra, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia mieboebo foana izy ka tsy mahalala na inona na inona fa adala amin’ny fiadian-kevitra sy ny fampiadian-teny izay mahatonga fialonana, fifandirana, fanaratsiana, fiahiahian-dratsy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fifandirana lalandava, fanaon’ny olona ratsy saina sady efa nialan’ny fahamarinana, manao ny toe-panahy araka an’Andriamanitra ho fahazoana tombontsoa.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa misy tombontsoa lehibe tokoa ny toe-panahy araka an’Andriamanitra raha mahay mianina amin’izay ananana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy nitondra na inona na inona ho amin’izao tontolo izao isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hita fa tsy hahatondra na inona na inona rehefa miala.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha manan-kanina sy fitafiana isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka hianina amin’izany.
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa izay ta hanankarena dia latsaka amin’ny fakam-panahy sy ny fandrika ary ny filana maro tsy misy antony sady mandratra, izay mandentika ny olona ao amin’ny faharinganana sy ny fahaverezana. '
