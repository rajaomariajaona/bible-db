document_id: ISA.30,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fomba fiasa melohin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lozan’ny zaza maditra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao tetikasa izy nefa tsy avy Amiko izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manao fanekena izy nefa tsy avy amin’ny Fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ota anampy ota izany!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'fa miteny amin’ny mpahita izy hoe: Aza mahita!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary amin’ny mpaminany hoe: Aza maminany zavatra marina aminay,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manaova teny malefaka aminay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maminania fitaka!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mialà amin’ny lalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mivilia amin’ny sakeli-dalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atsaharo tsy ho eo anoloanay intsony ny Iray Masin’ny Israely!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa izao no lazain’ny Iray Masin’ny Israely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria mandà izany teny izany ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady matoky ny herisetra sy ny fiolakolahana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miankina amin’izany,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'dia ho toy izao ity heloka ity eo aminareo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka izay mivava efa mila hianjera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mivohitra amin’ny manda avo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tampoka dia tampoka no haharavany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hopotipotehina tahaka ny fahapotipotiky ny vilanin’ny mpanefy tanimanga izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: homontsamontsanina tsy misy indrafo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy vakiny ho tavela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mbola ho azo angalana afo ao am-patana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho azo atao fangalan-drano ao an-davaka famorian-drano.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famonjena avy amin’ny fahatokiana
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa izao no lazain’ny Tompo, dia NY TOMPO, ny Iray Masin’ny Israely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fiverenana sy ny fitsaharana no hamonjena anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fahanginana sy ny fahatokiana no hisian’ny herinareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy nety ianareo!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa hoy kosa ianareo: Tsia! Handositra an-tsoavaly izahay!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia handositra tokoa ianareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy koa ianareo: Hitaingina ny haingam-pandeha izahay!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho haingam-pandeha koa ny mpanenjika anareo.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Handositra toy ny olona tokana ny arivo raha rahonan’ny olona iray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, handositra ianareo raha rahonan’ny dimy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pahatongan’ny sisa aminareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka ny tsato-kazo avo any an-tampon’ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny faneva any amin’ny havoana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miandry ny fotoana hamindrany fo NY TOMPO
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Koa mbola hiandry ny hamindrany fo aminareo NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mbola hisandratra Izy mba hiantra anareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitry ny fahamarinana NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sambatra izay rehetra miandry Azy!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa ianao ry firenena mitoetra ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' any Jerosalema,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hitomany intsony!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hamindra fo aminao tokoa Izy noho ny feon’ny fitarainanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, raha vao reny izany dia hamaly anao Izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mandeha midina ho any Ejipta izy nefa tsy nanontany ny hevitro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiery any amin’ny fiarovana mafin’ny farao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hitady fialofana ao amin’ny alokalok’i Ejipta.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Homen’ny Tompo mofo ianao raha ory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rano raha malahelo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hiery intsony ny Mpampianatra anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahita ny Mpampianatra anao ny masonao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa na mivily ho amin’ny ankavanana ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mivily ho amin’ny ankavia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny sofinao dia handre teny ao ivohonao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ity no lalana ka andehano.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary holotoinao ny takelaka volafotsy voapetaka amin’ny sarivongana sampinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny takelaka volamena voapetaka amin’ny sampinao voarendrika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: harianao tahaka ny maloto izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mialà amiko! Izany no holazainao aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hanome ranonorana ho an’ny voa nafafy Izy
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Hanome ranonorana ho an’ny masomboly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nafafinao tamin’ny tany Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hanina vokatry ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia sady ho tsara no mahavoky;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’izany andro izany dia hihinana eny amin’ny tany malalaka ny ombinao.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny omby sy ny boriky tanora izay miasa ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hihinana vilona voaisy sira
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay voatsikerakera amin’ny angady rovi-dela sy ny fikororohana.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary amin’ny andro lehibe famonoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fianjeran’ny tilikambo fiambenana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hisy lakandrano sy rian-drano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hikoriana any an-tendrombohitra avo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny havoana manerinerina rehetra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny hazavan’ny volana dia ho tahaka ny fahazavan’ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hazavan’ny masoandro dia ho avo fito heny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tahaka ny fahazavan’ny hafitoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro hamehezan’NY TOMPO ny fahatorotoroan’ny olony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanasitranany ny fery tamin’ny namelezana azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voakapoka koa i Asiria
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Indro, avy any lavitra any ny anaran’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mirehitra ny fahatezerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mavesatra no mandrahona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: feno hatezerana ny molony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny afo mandevona ny lelany;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ny fofonainy tahaka ny riaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia manafotra hatreny am-bozona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanivana ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny sivana fandevonana Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho lamboridy mampivily
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny valanoranon’ny olona izany.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny hira hataonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tahaka ny amin’ny alina fankalazana ny andro firavoravoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hafalian’ny fonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tahaka ny olona mandeha miaraka amin’ny feon-tsodina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any amin’ny tendrombohitry NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny Vatolampin’ny Israely.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Kanjo ho tonga henatra ho anareo ny fiarovana mafin’ny farao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho fanalam-baraka anareo ny fialokalofanareo ao amin’ny alokalok’i Ejipta.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Hanandratra ny feon’ny fiandrianany NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampiseho ny fiantefan’ny sandriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fahatezerana mirehitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny lelafo mandevona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny oram-baratra sy ny orana mivatravatra ary ny havandra vaventy.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa noho ny feon’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho raiki-tahotra ny Asiriana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hokapohiny amin’ny tsorakazo ireo.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Isaky ny miantefa ny tsorakazo voatendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay amelezan’NY TOMPO azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia harahina ampongatapaka sy lokanga izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny tanana misandratra no hiadiany aminy.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Fa efa voavoatra hatramin’ny taloha i Tofeta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, efa nataony vonona ho an’ny mpanjaka izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: natao lalina sady malalaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fatany dia misy afo sy kitay betsaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fofonain’NY TOMPO izay tahaka ny renirano solifara no mampirehitra azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa tonga any Zoana ireo lehibeny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tonga any Hanesa ny irany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izy rehetra dia samy hahazo henatra noho ny amin’ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mahasoa azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy manampy na mahasoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahatonga henatra sy latsa ho azy kosa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo izay hividy ny fanampian’i Ejipta
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny loza hanjo ny behemota
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Job 40.15.
      marker-yv: yv-n
    - type: text
      text: ' any amin’ny Negeva.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any amin’ny tany feno fahoriana sy tebiteby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay iavian’ny liom-bavy sy ny lion-dahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny menarana sy ny dragona manidina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nitondrany ny harenany teny an-damosin’ny boriky tanora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fananany teo amin’ny trafon’ny rameva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any amin’ny firenena tsy mahasoa azy akory!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
