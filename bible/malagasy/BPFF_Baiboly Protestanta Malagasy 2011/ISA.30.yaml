document_id: ISA.30,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fomba fiasa melohin’Andriamanitra
  - type: text
    content: Lozan’ny zaza maditra!
  - type: text
    content: Hoy NY TOMPO.
  - type: text
    content: Manao tetikasa izy nefa tsy avy Amiko izany,
  - type: text
    content: ary manao fanekena izy nefa tsy avy amin’ny Fanahiko,
  - type: text
    content: ka ota anampy ota izany!
  '10':
  - type: text
    content: 'fa miteny amin’ny mpahita izy hoe: Aza mahita!'
  - type: text
    content: 'Ary amin’ny mpaminany hoe: Aza maminany zavatra marina aminay,'
  - type: text
    content: manaova teny malefaka aminay,
  - type: text
    content: maminania fitaka!
  '11':
  - type: text
    content: Mialà amin’ny lalana,
  - type: text
    content: mivilia amin’ny sakeli-dalana,
  - type: text
    content: atsaharo tsy ho eo anoloanay intsony ny Iray Masin’ny Israely!
  '12':
  - type: text
    content: 'Koa izao no lazain’ny Iray Masin’ny Israely:'
  - type: text
    content: Satria mandà izany teny izany ianareo
  - type: text
    content: sady matoky ny herisetra sy ny fiolakolahana
  - type: text
    content: ka miankina amin’izany,
  '13':
  - type: text
    content: 'dia ho toy izao ity heloka ity eo aminareo:'
  - type: text
    content: Tahaka izay mivava efa mila hianjera
  - type: text
    content: ka mivohitra amin’ny manda avo,
  - type: text
    content: ary ho tampoka dia tampoka no haharavany.
  '14':
  - type: text
    content: Hopotipotehina tahaka ny fahapotipotiky ny vilanin’ny mpanefy tanimanga izy;
  - type: text
    content: homontsamontsanina tsy misy indrafo;
  - type: text
    content: ary tsy hisy vakiny ho tavela
  - type: text
    content: ka mbola ho azo angalana afo ao am-patana,
  - type: text
    content: na ho azo atao fangalan-drano ao an-davaka famorian-drano.
  - type: heading
    content: Ny famonjena avy amin’ny fahatokiana
  '15':
  - type: text
    content: 'Fa izao no lazain’ny Tompo, dia NY TOMPO, ny Iray Masin’ny Israely:'
  - type: text
    content: Amin’ny fiverenana sy ny fitsaharana no hamonjena anareo,
  - type: text
    content: amin’ny fahanginana sy ny fahatokiana no hisian’ny herinareo.
  - type: text
    content: Nefa tsy nety ianareo!
  '16':
  - type: text
    content: 'Fa hoy kosa ianareo: Tsia! Handositra an-tsoavaly izahay!'
  - type: text
    content: Noho izany dia handositra tokoa ianareo.
  - type: text
    content: 'Hoy koa ianareo: Hitaingina ny haingam-pandeha izahay!'
  - type: text
    content: Dia ho haingam-pandeha koa ny mpanenjika anareo.
  '17':
  - type: text
    content: Handositra toy ny olona tokana ny arivo raha rahonan’ny olona iray;
  - type: text
    content: eny, handositra ianareo raha rahonan’ny dimy,
  - type: text
    content: mandra-pahatongan’ny sisa aminareo
  - type: text
    content: ho tahaka ny tsato-kazo avo any an-tampon’ny tendrombohitra
  - type: text
    content: sy tahaka ny faneva any amin’ny havoana.
  - type: heading
    content: Miandry ny fotoana hamindrany fo NY TOMPO
  '18':
  - type: text
    content: Koa mbola hiandry ny hamindrany fo aminareo NY TOMPO,
  - type: text
    content: ary mbola hisandratra Izy mba hiantra anareo.
  - type: text
    content: Fa Andriamanitry ny fahamarinana NY TOMPO;
  - type: text
    content: sambatra izay rehetra miandry Azy!
  '19':
  - type: text
    content: 'Fa ianao ry firenena mitoetra ao '
  - type: text
    content: Ziona
  - type: text
    content: ' any Jerosalema,'
  - type: text
    content: dia tsy hitomany intsony!
  - type: text
    content: Fa hamindra fo aminao tokoa Izy noho ny feon’ny fitarainanao;
  - type: text
    content: eny, raha vao reny izany dia hamaly anao Izy.
  '2':
  - type: text
    content: Mandeha midina ho any Ejipta izy nefa tsy nanontany ny hevitro,
  - type: text
    content: hiery any amin’ny fiarovana mafin’ny farao
  - type: text
    content: sy hitady fialofana ao amin’ny alokalok’i Ejipta.
  '20':
  - type: text
    content: Homen’ny Tompo mofo ianao raha ory,
  - type: text
    content: ary rano raha malahelo;
  - type: text
    content: tsy hiery intsony ny Mpampianatra anao;
  - type: text
    content: hahita ny Mpampianatra anao ny masonao.
  '21':
  - type: text
    content: Fa na mivily ho amin’ny ankavanana ianao,
  - type: text
    content: na mivily ho amin’ny ankavia,
  - type: text
    content: 'ny sofinao dia handre teny ao ivohonao hoe:'
  - type: text
    content: Ity no lalana ka andehano.
  '22':
  - type: text
    content: Ary holotoinao ny takelaka volafotsy voapetaka amin’ny sarivongana sampinao
  - type: text
    content: sy ny takelaka volamena voapetaka amin’ny sampinao voarendrika;
  - type: text
    content: harianao tahaka ny maloto izany.
  - type: text
    content: Mialà amiko! Izany no holazainao aminy.
  - type: heading
    content: Hanome ranonorana ho an’ny voa nafafy Izy
  '23':
  - type: text
    content: Hanome ranonorana ho an’ny masomboly
  - type: text
    content: izay nafafinao tamin’ny tany Izy,
  - type: text
    content: ary ny hanina vokatry ny tany
  - type: text
    content: dia sady ho tsara no mahavoky;
  - type: text
    content: ary amin’izany andro izany dia hihinana eny amin’ny tany malalaka ny ombinao.
  '24':
  - type: text
    content: Ny omby sy ny boriky tanora izay miasa ny tany
  - type: text
    content: dia hihinana vilona voaisy sira
  - type: text
    content: izay voatsikerakera amin’ny angady rovi-dela sy ny fikororohana.
  '25':
  - type: text
    content: Ary amin’ny andro lehibe famonoana,
  - type: text
    content: amin’ny fianjeran’ny tilikambo fiambenana,
  - type: text
    content: dia hisy lakandrano sy rian-drano
  - type: text
    content: hikoriana any an-tendrombohitra avo
  - type: text
    content: sy ny havoana manerinerina rehetra.
  '26':
  - type: text
    content: Ny hazavan’ny volana dia ho tahaka ny fahazavan’ny masoandro,
  - type: text
    content: ary ny hazavan’ny masoandro dia ho avo fito heny
  - type: text
    content: ka ho tahaka ny fahazavan’ny hafitoana,
  - type: text
    content: amin’ny andro hamehezan’NY TOMPO ny fahatorotoroan’ny olony,
  - type: text
    content: sy hanasitranany ny fery tamin’ny namelezana azy.
  - type: heading
    content: Voakapoka koa i Asiria
  '27':
  - type: text
    content: Indro, avy any lavitra any ny anaran’NY TOMPO,
  - type: text
    content: mirehitra ny fahatezerany
  - type: text
    content: sady mavesatra no mandrahona;
  - type: text
    content: feno hatezerana ny molony,
  - type: text
    content: ary tahaka ny afo mandevona ny lelany;
  '28':
  - type: text
    content: ny fofonainy tahaka ny riaka
  - type: text
    content: dia manafotra hatreny am-bozona;
  - type: text
    content: hanivana ny firenena
  - type: text
    content: amin’ny sivana fandevonana Izy;
  - type: text
    content: ho lamboridy mampivily
  - type: text
    content: eo amin’ny valanoranon’ny olona izany.
  '29':
  - type: text
    content: Ny hira hataonao
  - type: text
    content: dia ho tahaka ny amin’ny alina fankalazana ny andro firavoravoana;
  - type: text
    content: ny hafalian’ny fonao
  - type: text
    content: dia ho tahaka ny olona mandeha miaraka amin’ny feon-tsodina
  - type: text
    content: ho any amin’ny tendrombohitry NY TOMPO,
  - type: text
    content: any amin’ny Vatolampin’ny Israely.
  '3':
  - type: text
    content: Kanjo ho tonga henatra ho anareo ny fiarovana mafin’ny farao,
  - type: text
    content: ary ho fanalam-baraka anareo ny fialokalofanareo ao amin’ny alokalok’i Ejipta.
  '30':
  - type: text
    content: Hanandratra ny feon’ny fiandrianany NY TOMPO
  - type: text
    content: ary hampiseho ny fiantefan’ny sandriny
  - type: text
    content: amin’ny fahatezerana mirehitra
  - type: text
    content: sy ny lelafo mandevona,
  - type: text
    content: amin’ny oram-baratra sy ny orana mivatravatra ary ny havandra vaventy.
  '31':
  - type: text
    content: Fa noho ny feon’NY TOMPO
  - type: text
    content: dia ho raiki-tahotra ny Asiriana.
  - type: text
    content: Hokapohiny amin’ny tsorakazo ireo.
  '32':
  - type: text
    content: Isaky ny miantefa ny tsorakazo voatendry,
  - type: text
    content: izay amelezan’NY TOMPO azy,
  - type: text
    content: dia harahina ampongatapaka sy lokanga izany;
  - type: text
    content: ary amin’ny tanana misandratra no hiadiany aminy.
  '33':
  - type: text
    content: Fa efa voavoatra hatramin’ny taloha i Tofeta;
  - type: text
    content: eny, efa nataony vonona ho an’ny mpanjaka izy,
  - type: text
    content: natao lalina sady malalaka;
  - type: text
    content: ny fatany dia misy afo sy kitay betsaka;
  - type: text
    content: ary ny fofonain’NY TOMPO izay tahaka ny renirano solifara no mampirehitra azy.
  '4':
  - type: text
    content: Fa tonga any Zoana ireo lehibeny,
  - type: text
    content: ary tonga any Hanesa ny irany.
  '5':
  - type: text
    content: Izy rehetra dia samy hahazo henatra noho ny amin’ny firenena
  - type: text
    content: tsy mahasoa azy,
  - type: text
    content: izay tsy manampy na mahasoa,
  - type: text
    content: fa mahatonga henatra sy latsa ho azy kosa.
  - type: heading
    content: Ireo izay hividy ny fanampian’i Ejipta
  '6':
  - type: text
    content: Ny loza hanjo ny behemota
  - type: note
    content: Jereo Job 40.15.
  - type: text
    content: ' any amin’ny Negeva.'
  - type: text
    content: Any amin’ny tany feno fahoriana sy tebiteby,
  - type: text
    content: izay iavian’ny liom-bavy sy ny lion-dahy
  - type: text
    content: ary ny menarana sy ny dragona manidina,
  - type: text
    content: no nitondrany ny harenany teny an-damosin’ny boriky tanora,
  - type: text
    content: ary ny fananany teo amin’ny trafon’ny rameva,
  - type: text
    content: ho any amin’ny firenena tsy mahasoa azy akory!
  '7':
  - type: text
    content: Zava-poana sy tsinontsinona mantsy ny famonjen’ny Ejiptiana;
  - type: text
    content: 'koa izany no niantsoako azy hoe: Rahaba'
  - type: note
    content: 'Rahaba: ilazana an’i Egypta.'
  - type: text
    content: ' tsy mahefa na inona na inona!'
  - type: heading
    content: Vahoaka tsy mety mihaino
  '8':
  - type: text
    content: Avia ankehitriny, soraty izany,
  - type: text
    content: soraty amin’ny fafana eo anatrehany
  - type: text
    content: ary soraty amin’ny boky,
  - type: text
    content: mba haharitra amin’ny andro ho avy,
  - type: text
    content: ho vavolombelona mandrakizay doria.
  '9':
  - type: text
    content: Fa firenena maditra izy,
  - type: text
    content: zanaka mpamadika,
  - type: text
    content: zanaka tsy mety mihaino ny lalànan’NY TOMPO,
