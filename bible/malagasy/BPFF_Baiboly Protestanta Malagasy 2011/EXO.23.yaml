document_id: EXO.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiahiana ny madinika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza manangan-tsaho foana. Aza mifandray tanana amin’ny ratsy fanahy ho vavolombelona mampidi-doza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aza manaraka ny maro hanao ratsy; ary aza mety hanao vavolombelona amin’ny adin’olona ka hivily hanaraka ny maro hamadika ny rariny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza miangatra amin’ny mahantra amin’ny adiny eo amin’ny fitsarana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha hitanao diso lalana ny ombin’ny fahavalonao, na ny borikiny, dia averenonao any aminy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha hitanao lavo voatsindrin’ny entana ny borikin’izay mankahala anao dia aza malaina hamonjy azy fa ampionao izy hamaha izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza mamily izay rariny ananan’ny mahantra eo aminao, amin’ny adiny eo amin’ny fitsarana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Manalavira izay teny lainga, ary aza mamono ny tsy manan-tsiny sy izay marina ianao; fa tsy hanamarina ny meloka Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza mandray kolikoly, fa ny kolikoly dia mahajamba ny mason’ny mahiratra sy mamadika ny tenin’ny marina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza mampahory vahiny, fa ianareo dia mahalala ny toe-pon’ny vahiny, satria efa mba vahiny tany amin’ny tany Ejipta ihany ianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taon-tSabata sy ny Sabata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Enin-taona no hamafazanao amin’ny taninao sy hanangonanao ny vokatra; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fa amin’ny taona fahafito kosa dia hatsahatrao tsy hovolena izany mba hisy hohanin’ny mahantra ao amin’ny firenenao; ary izay sisan’ireo kosa dia mba hohanin’ny biby any an-tsaha. Toy izany koa no hataonao amin’ny tanim-boalobokao sy amin’ny tanin’olivanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Henemana no hanaovanao ny raharahanao, fa amin’ny andro fahafito dia hitsahatra ianao mba hialan’ny ombinao sy ny borikinao sasatra, ary mba hakan’ny zanaky ny mpanompovavinao sy ny vahiny aina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo andro firavoravoana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tandremo izay rehetra nolazaiko taminareo ka aza manonona izay anaran’andriamanitra hafa akory ianareo; aza avela ho re avy amin’ny vavanao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Intelo isan-taona no hanaovanao andro firavoravoana ho Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tandremo ny andro firavoravoana fihinanana ny mofo tsy misy masirasira; hafitoana no hihinananao ny mofo tsy misy masirasira, araka izay nampanaoviko anao amin’ny fotoanandro amin’ny volana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Abiba
  - type: text
    text: ', fa tamin’izany no nivoahanao avy tany Ejipta; ary aoka tsy hisy hiseho amin’ny tanam-polo eo anatrehako, tsy mitondra fanatitra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tandremo koa ny andro firavoravoana amin’ny fijinjana ny voaloham-bokatry ny asanao izay nafafinao tany an-tsaha, sy ny andro firavoravoana amin’ny fanangonana amin’ny faran’ny taona, raha manangona ny vokatry ny asanao avy any an-tsaha ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Intelo isan-taona no hisehoan’ny lehilahy rehetra aminareo eo anatrehan’NY TOMPO Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aza manolotra ny ran’ny zavatra vonoina hatao fanatitra ho Ahy ianao raha mbola misy masirasira ao aminao; aza avela ho tra-maraina ny jaboran’ny zavatra vonoina amin’ny andro firavoravoana ho Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny santatry ny voaloham-bokatry ny taninao dia hoentinao ao amin’ny tranon’NY TOMPO Andriamanitrao. Aza mahandro zanak’osy amin’ny rononon-dreniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Fomba fanaon’ny Kananita izany.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny fikasana sy fampitandremana alohan’ny hiaingana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Indro Aho maniraka Anjely eo alohanao hiaro anao eny an-dalana sady hitondra anao any amin’ny toerana izay namboariko. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mitandrema eo anatrehany ka mihainoa ny feony ary aza manao izay mahatezitra Azy; fa tsy hamela ny fahotanareo Izy satria ny anarako no ao Aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha mihaino ny feony tokoa ianao ka manao izay rehetra lazaiko dia ho fahavalon’ny fahavalonao sy ho rafin’ny rafinao Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa handeha eo alohanao ny Anjeliko ka hitondra anao any amin’ny Amorita, ny Hetita, ny Perizita, ny Kananita, ny Hivita ary ny Jebosita, dia hofongorako ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aza miankohoka eo anatrehan’ny andriamanitr’ireny ianao, na manompo azy, na manao toy ny fanaony; fa aringano tokoa izy ary poteho tanteraka ireo tsangambaton-tsampiny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa manompoa NY TOMPO Andriamanitrareo dia hitahy ny haninao sy ny ranonao Izy, ary hesoriko aminao ny aretina. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsy hisy ho afa-jaza na ho momba ao amin’ny taninao. Hataoko feno ny isan’ny andronao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hampandehaniko eo anoloanao ny fahatahorana Ahy ka hampifanaritahiko ny firenena rehetra izay alehanao ary hampandosiriko eo anoloanao ny fahavalonao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hampandehaniko eo anoloanao ny fanenitra handroaka ny Hivita sy ny Kananita ary ny Hetita eo alohanao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tsy handroaka azy eo alohanao amin’ny taona iray Aho, fandrao ho lao ny tany ka hihamaro ny bibidia hamely anao. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsikelikely no handroahako azy eo alohanao mandra-pahatonganao ho maro ka handova ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hataoko hatrany amin’ny Ranomasina Mena ka hatrany amin’ny Ranomasin’ny Filistina ny sisin’ny taninao, ary hatrany amin’ny tany efitra ka hatrany amin’ny ony Eofrata; fa hanolotra ny mponina amin’ny tany ho eo an-tananareo Aho ary handroaka azy eo alohanao ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aza manao fanekena aminy na amin’ny andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tsy honina eo amin’ny taninao ireny, fandrao hampanota anao Amiko izy raha manompo ny andriamaniny ianao ka ho fandrika ho anao izany.
