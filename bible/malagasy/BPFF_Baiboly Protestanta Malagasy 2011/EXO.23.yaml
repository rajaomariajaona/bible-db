document_id: EXO.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiahiana ny madinika
  - type: text
    content: Aza manangan-tsaho foana. Aza mifandray tanana amin’ny ratsy fanahy ho vavolombelona mampidi-doza.
  '10':
  - type: text
    content: 'Enin-taona no hamafazanao amin’ny taninao sy hanangonanao ny vokatra; '
  '11':
  - type: text
    content: fa amin’ny taona fahafito kosa dia hatsahatrao tsy hovolena izany mba hisy hohanin’ny mahantra ao amin’ny firenenao; ary izay sisan’ireo kosa dia mba hohanin’ny biby any an-tsaha. Toy izany koa no hataonao amin’ny tanim-boalobokao sy amin’ny tanin’olivanao.
  '12':
  - type: text
    content: Henemana no hanaovanao ny raharahanao, fa amin’ny andro fahafito dia hitsahatra ianao mba hialan’ny ombinao sy ny borikinao sasatra, ary mba hakan’ny zanaky ny mpanompovavinao sy ny vahiny aina.
  - type: heading
    content: Ireo andro firavoravoana
  '13':
  - type: text
    content: Tandremo izay rehetra nolazaiko taminareo ka aza manonona izay anaran’andriamanitra hafa akory ianareo; aza avela ho re avy amin’ny vavanao izany.
  '14':
  - type: text
    content: 'Intelo isan-taona no hanaovanao andro firavoravoana ho Ahy. '
  '15':
  - type: text
    content: 'Tandremo ny andro firavoravoana fihinanana ny mofo tsy misy masirasira; hafitoana no hihinananao ny mofo tsy misy masirasira, araka izay nampanaoviko anao amin’ny fotoanandro amin’ny volana '
  - type: text
    content: Abiba
  - type: text
    content: ', fa tamin’izany no nivoahanao avy tany Ejipta; ary aoka tsy hisy hiseho amin’ny tanam-polo eo anatrehako, tsy mitondra fanatitra. '
  '16':
  - type: text
    content: 'Tandremo koa ny andro firavoravoana amin’ny fijinjana ny voaloham-bokatry ny asanao izay nafafinao tany an-tsaha, sy ny andro firavoravoana amin’ny fanangonana amin’ny faran’ny taona, raha manangona ny vokatry ny asanao avy any an-tsaha ianao. '
  '17':
  - type: text
    content: Intelo isan-taona no hisehoan’ny lehilahy rehetra aminareo eo anatrehan’NY TOMPO Andriamanitra.
  '18':
  - type: text
    content: Aza manolotra ny ran’ny zavatra vonoina hatao fanatitra ho Ahy ianao raha mbola misy masirasira ao aminao; aza avela ho tra-maraina ny jaboran’ny zavatra vonoina amin’ny andro firavoravoana ho Ahy.
  '19':
  - type: text
    content: Ny santatry ny voaloham-bokatry ny taninao dia hoentinao ao amin’ny tranon’NY TOMPO Andriamanitrao. Aza mahandro zanak’osy amin’ny rononon-dreniny
  - type: note
    content: Fomba fanaon’ny Kananita izany.
  - type: text
    content: .
  - type: heading
    content: Teny fikasana sy fampitandremana alohan’ny hiaingana
  '2':
  - type: text
    content: 'Aza manaraka ny maro hanao ratsy; ary aza mety hanao vavolombelona amin’ny adin’olona ka hivily hanaraka ny maro hamadika ny rariny. '
  '20':
  - type: text
    content: 'Indro Aho maniraka Anjely eo alohanao hiaro anao eny an-dalana sady hitondra anao any amin’ny toerana izay namboariko. '
  '21':
  - type: text
    content: 'Mitandrema eo anatrehany ka mihainoa ny feony ary aza manao izay mahatezitra Azy; fa tsy hamela ny fahotanareo Izy satria ny anarako no ao Aminy. '
  '22':
  - type: text
    content: 'Fa raha mihaino ny feony tokoa ianao ka manao izay rehetra lazaiko dia ho fahavalon’ny fahavalonao sy ho rafin’ny rafinao Aho. '
  '23':
  - type: text
    content: Fa handeha eo alohanao ny Anjeliko ka hitondra anao any amin’ny Amorita, ny Hetita, ny Perizita, ny Kananita, ny Hivita ary ny Jebosita, dia hofongorako ireny.
  '24':
  - type: text
    content: 'Aza miankohoka eo anatrehan’ny andriamanitr’ireny ianao, na manompo azy, na manao toy ny fanaony; fa aringano tokoa izy ary poteho tanteraka ireo tsangambaton-tsampiny. '
  '25':
  - type: text
    content: 'Fa manompoa NY TOMPO Andriamanitrareo dia hitahy ny haninao sy ny ranonao Izy, ary hesoriko aminao ny aretina. '
  '26':
  - type: text
    content: Tsy hisy ho afa-jaza na ho momba ao amin’ny taninao. Hataoko feno ny isan’ny andronao.
  '27':
  - type: text
    content: 'Hampandehaniko eo anoloanao ny fahatahorana Ahy ka hampifanaritahiko ny firenena rehetra izay alehanao ary hampandosiriko eo anoloanao ny fahavalonao rehetra. '
  '28':
  - type: text
    content: 'Hampandehaniko eo anoloanao ny fanenitra handroaka ny Hivita sy ny Kananita ary ny Hetita eo alohanao. '
  '29':
  - type: text
    content: 'Tsy handroaka azy eo alohanao amin’ny taona iray Aho, fandrao ho lao ny tany ka hihamaro ny bibidia hamely anao. '
  '3':
  - type: text
    content: Aza miangatra amin’ny mahantra amin’ny adiny eo amin’ny fitsarana.
  '30':
  - type: text
    content: Tsikelikely no handroahako azy eo alohanao mandra-pahatonganao ho maro ka handova ny tany.
  '31':
  - type: text
    content: 'Hataoko hatrany amin’ny Ranomasina Mena ka hatrany amin’ny Ranomasin’ny Filistina ny sisin’ny taninao, ary hatrany amin’ny tany efitra ka hatrany amin’ny ony Eofrata; fa hanolotra ny mponina amin’ny tany ho eo an-tananareo Aho ary handroaka azy eo alohanao ianao. '
  '32':
  - type: text
    content: 'Aza manao fanekena aminy na amin’ny andriamaniny. '
  '33':
  - type: text
    content: Tsy honina eo amin’ny taninao ireny, fandrao hampanota anao Amiko izy raha manompo ny andriamaniny ianao ka ho fandrika ho anao izany.
  '4':
  - type: text
    content: 'Raha hitanao diso lalana ny ombin’ny fahavalonao, na ny borikiny, dia averenonao any aminy izany. '
  '5':
  - type: text
    content: Raha hitanao lavo voatsindrin’ny entana ny borikin’izay mankahala anao dia aza malaina hamonjy azy fa ampionao izy hamaha izany.
  '6':
  - type: text
    content: Aza mamily izay rariny ananan’ny mahantra eo aminao, amin’ny adiny eo amin’ny fitsarana.
  '7':
  - type: text
    content: Manalavira izay teny lainga, ary aza mamono ny tsy manan-tsiny sy izay marina ianao; fa tsy hanamarina ny meloka Aho.
  '8':
  - type: text
    content: Aza mandray kolikoly, fa ny kolikoly dia mahajamba ny mason’ny mahiratra sy mamadika ny tenin’ny marina.
  '9':
  - type: text
    content: Aza mampahory vahiny, fa ianareo dia mahalala ny toe-pon’ny vahiny, satria efa mba vahiny tany amin’ny tany Ejipta ihany ianareo.
  - type: heading
    content: Ny taon-tSabata sy ny Sabata
