document_id: JOB.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny navalin’i Joba: Ny zava-manjo ny taranak’olombelona'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny olona tera-behivavy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vitsy andro izy sady vontom-pahoriana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa ny olona kosa dia maty ka miampatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, miala aina ny olona, dia aiza izy?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Misintona ny rano ka miala amin’ny ranomasina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihena ny ony ka ritra,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ary toy izany koa ny olona; mandry izy ka tsy hiarina intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, raha mbola misy koa ny lanitra dia tsy hahatsiaro izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hofohazina amin’ny torimasony.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Enga anie ka hanafina ahy any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' Ianao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanafina ahy mandra-pahafaka ny fahatezeranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanendry fetrandro ho ahy ka hahatsiaro ahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Raha maty ny olona, moa mety ho velona indray va izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha izany dia hiandry aho mandritra ny fotoam-panompoako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pahatongan’ny fanafahana ahy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia hiantso Ianao ary hamaly Anao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mba halahelo ny asan’ny tananao Ianao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ankehitriny, manisa ny diako Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa amin’izay fotoana izay, tsy handinika ny fahotako Ianao,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: fa ho voaisy tombo-kase ny kitapo misy ny fahadisoako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho voalalotrao tsy ho hita ny heloko.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Kanefa na dia ny tendrombohitra aza raha mianjera dia ho potika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vatolampy dia hifindra hiala amin’ny toerany;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: lanin’ny rano ny vato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary indaosin’ny riaka ny vovo-tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany no fanimbanao ny fanantenan’ny zanak’olombelona.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Toy ny voninkazo izy: Mitsimoka dia mihamalazo.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihelina tahaka ny aloka izy ka tsy maharitra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mandresy azy ho mandrakizay Ianao dia lasa izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manova ny tarehiny Ianao, avy eo dia mandroaka azy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Omem-boninahitra va ny zanany? Tsy fantany akory izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaetry va ireo? Tsy hitany akory izany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny mihatra amin’ny nofony ihany no mampanaintaina azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mihatra amin’ny tenany ihany no mampitaraina azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Kanefa amin’izay toy izany foana no ampihiratanao ny masonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izay izaho avy no entinao hifandahatra Aminao amin’ny fitsarana!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Iza no olona madio ateraky ny tsy madio?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy na dia iray akory aza.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Raha voafetra ny androny ary voatendrinao ny isan’ny volana iainany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary asianao fefy tsy azony ihoarana
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: dia mitodiha tsy hanatrika azy Ianao mba hitsaharany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hifaliany amin’ny androny toy ny mpikarama.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa azo antenaina ny hazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria na dia kapaina aza izy dia mbola hitsimoka indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy maintsy hisy ny solofony;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: na dia efa tonga antitra ao anaty tany aza ny fotony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary maty ao amin’ny vovoka ny vatany,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: raha mahare ny fofon-drano izy, dia hitsimoka indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handrahaka tahaka ny hazo tanora nambolena.
