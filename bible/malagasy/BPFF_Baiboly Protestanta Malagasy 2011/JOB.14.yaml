document_id: JOB.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba: Ny zava-manjo ny taranak’olombelona'
  - type: text
    content: Ny olona tera-behivavy!
  - type: text
    content: Vitsy andro izy sady vontom-pahoriana.
  '10':
  - type: text
    content: Fa ny olona kosa dia maty ka miampatra;
  - type: text
    content: eny, miala aina ny olona, dia aiza izy?
  '11':
  - type: text
    content: Misintona ny rano ka miala amin’ny ranomasina;
  - type: text
    content: mihena ny ony ka ritra,
  '12':
  - type: text
    content: ary toy izany koa ny olona; mandry izy ka tsy hiarina intsony;
  - type: text
    content: eny, raha mbola misy koa ny lanitra dia tsy hahatsiaro izy
  - type: text
    content: na hofohazina amin’ny torimasony.
  '13':
  - type: text
    content: 'Enga anie ka hanafina ahy any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' Ianao'
  - type: text
    content: ka hanafina ahy mandra-pahafaka ny fahatezeranao
  - type: text
    content: ary hanendry fetrandro ho ahy ka hahatsiaro ahy.
  '14':
  - type: text
    content: Raha maty ny olona, moa mety ho velona indray va izy?
  - type: text
    content: Raha izany dia hiandry aho mandritra ny fotoam-panompoako,
  - type: text
    content: mandra-pahatongan’ny fanafahana ahy.
  '15':
  - type: text
    content: Dia hiantso Ianao ary hamaly Anao aho
  - type: text
    content: ary mba halahelo ny asan’ny tananao Ianao.
  '16':
  - type: text
    content: Ankehitriny, manisa ny diako Ianao;
  - type: text
    content: nefa amin’izay fotoana izay, tsy handinika ny fahotako Ianao,
  '17':
  - type: text
    content: fa ho voaisy tombo-kase ny kitapo misy ny fahadisoako,
  - type: text
    content: ary ho voalalotrao tsy ho hita ny heloko.
  '18':
  - type: text
    content: Kanefa na dia ny tendrombohitra aza raha mianjera dia ho potika
  - type: text
    content: ary ny vatolampy dia hifindra hiala amin’ny toerany;
  '19':
  - type: text
    content: lanin’ny rano ny vato
  - type: text
    content: ary indaosin’ny riaka ny vovo-tany;
  - type: text
    content: toy izany no fanimbanao ny fanantenan’ny zanak’olombelona.
  '2':
  - type: text
    content: 'Toy ny voninkazo izy: Mitsimoka dia mihamalazo.'
  - type: text
    content: Mihelina tahaka ny aloka izy ka tsy maharitra.
  '20':
  - type: text
    content: Mandresy azy ho mandrakizay Ianao dia lasa izy;
  - type: text
    content: manova ny tarehiny Ianao, avy eo dia mandroaka azy.
  '21':
  - type: text
    content: Omem-boninahitra va ny zanany? Tsy fantany akory izany.
  - type: text
    content: Voaetry va ireo? Tsy hitany akory izany.
  '22':
  - type: text
    content: Ny mihatra amin’ny nofony ihany no mampanaintaina azy
  - type: text
    content: ary ny mihatra amin’ny tenany ihany no mampitaraina azy.
  '3':
  - type: text
    content: Kanefa amin’izay toy izany foana no ampihiratanao ny masonao
  - type: text
    content: ka izay izaho avy no entinao hifandahatra Aminao amin’ny fitsarana!
  '4':
  - type: text
    content: Iza no olona madio ateraky ny tsy madio?
  - type: text
    content: Tsy misy na dia iray akory aza.
  '5':
  - type: text
    content: Raha voafetra ny androny ary voatendrinao ny isan’ny volana iainany
  - type: text
    content: ary asianao fefy tsy azony ihoarana
  '6':
  - type: text
    content: dia mitodiha tsy hanatrika azy Ianao mba hitsaharany
  - type: text
    content: ka hifaliany amin’ny androny toy ny mpikarama.
  '7':
  - type: text
    content: Fa azo antenaina ny hazo
  - type: text
    content: satria na dia kapaina aza izy dia mbola hitsimoka indray
  - type: text
    content: ka tsy maintsy hisy ny solofony;
  '8':
  - type: text
    content: na dia efa tonga antitra ao anaty tany aza ny fotony
  - type: text
    content: ary maty ao amin’ny vovoka ny vatany,
  '9':
  - type: text
    content: raha mahare ny fofon-drano izy, dia hitsimoka indray
  - type: text
    content: ka handrahaka tahaka ny hazo tanora nambolena.
