document_id: ISA.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra Mpamonjy
  - type: text
    content: 'Ary hiteny ianao amin’izany andro izany hoe:'
  - type: text
    content: Hidera Anao aho TOMPO ô;
  - type: text
    content: fa na dia tezitra tamiko aza Ianao
  - type: text
    content: dia afaka ihany ny fahatezeranao
  - type: text
    content: ka mampionona ahy Ianao.
  '2':
  - type: text
    content: Indro, Andriamanitra no famonjena ahy;
  - type: text
    content: hatoky aho fa tsy mba hatahotra.
  - type: text
    content: Satria NY TOMPO, NY TOMPO no tanjako sy heriko,
  - type: text
    content: fa efa famonjena ahy Izy.
  '3':
  - type: text
    content: Koa amin’ny fifaliana no hantsakanareo rano
  - type: text
    content: amin’ny loharanom-pamonjena.
  '4':
  - type: text
    content: 'Amin’izany andro izany dia hiteny ianareo hoe:'
  - type: text
    content: Miderà NY TOMPO, miantsoa ny anarany,
  - type: text
    content: ampahafantaro any amin’ny firenena ny asany.
  - type: text
    content: Ampahatsiarovy fa efa misandratra ny anarany!
  '5':
  - type: text
    content: Mankalazà NY TOMPO,
  - type: text
    content: fa asa lehibe no nataony.
  - type: text
    content: Aoka ho fantatra any amin’ny tany rehetra izany!
  '6':
  - type: text
    content: 'Miantsoa mafy sy mihobia, ry mponina any '
  - type: text
    content: Ziona
  - type: text
    content: '!'
  - type: text
    content: Fa lehibe eo afovoanao ny Iray Masin’ny Israely!
