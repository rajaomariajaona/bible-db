document_id: ISA.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiderana an’Andriamanitra Mpamonjy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hiteny ianao amin’izany andro izany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidera Anao aho TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na dia tezitra tamiko aza Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia afaka ihany ny fahatezeranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampionona ahy Ianao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Indro, Andriamanitra no famonjena ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatoky aho fa tsy mba hatahotra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria NY TOMPO, NY TOMPO no tanjako sy heriko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa famonjena ahy Izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Koa amin’ny fifaliana no hantsakanareo rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny loharanom-pamonjena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Amin’izany andro izany dia hiteny ianareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà NY TOMPO, miantsoa ny anarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampahafantaro any amin’ny firenena ny asany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampahatsiarovy fa efa misandratra ny anarany!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mankalazà NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa asa lehibe no nataony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho fantatra any amin’ny tany rehetra izany!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Miantsoa mafy sy mihobia, ry mponina any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa lehibe eo afovoanao ny Iray Masin’ny Israely!
