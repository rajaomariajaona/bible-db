document_id: ISA.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny olona izay mandeha amin’ny maizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mahita mazava lehibe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitoetra amin’ny tanin’ny aloky ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no amirapiratan’ny mazava.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Manandratra ny rafilahin’i Rezina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hihoatra azy NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampirisika ny fahavalony,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: dia ny Arameana avy any atsinanana sy ny Filistina avy any andrefana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misanasana vava handrapaka ny Israely ireo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa na eo aza izany rehetra izany dia tsy mbola afaka ihany ny fahatezerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mbola miainga ihany ny tanany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsy miverina amin’Izay mamely azy ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy mba tadiaviny Andriamanitra, Tompon’izao rehetra izao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Noho izany dia hofongoran’NY TOMPO amin’ny Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao anatin’ny indray andro monja
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny loha sy ny rambo, ny sampana palma sy ny zozoro.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny loholona sy ny olo-manankaja no loha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpaminany izay mampianatra lainga no rambo.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa ny mpitarika ity firenena ity no tonga mpampivily azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay tarihiny dia voatelina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Noho izany dia tsy mahafaly NY TOMPO ny zatovony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy iantrany ny kamboty sy ny mpitondratena ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria samy tsy mino sy mpanao ratsy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary milaza hadalana ny vava rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa na eo aza izany rehetra izany dia tsy mbola afaka ihany ny fahatezerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mbola miainga ihany ny tanany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa mandoro tahaka ny afo ny haratsiam-panahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandevona ny tsilo sy ny anjavidy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampirehitra ny ala mikirindro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitambolimbolina ny setroka misavoana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Noho ny fahatezeran’Andriamanitra, Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia kilan’ny afo ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny kitay atohoka amin’ny afo ny olona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy olona miantra ny rahalahiny.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mandripaka eny ankavanana izy nefa noana ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandany eny ankavia izy nefa tsy voky ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy mihinana ny nofon-tsandriny avy izy rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hamaroinao ity firenena ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampitomboinao ny hafaliany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifaly eo anatrehanao tahaka ny hafaliana amin’ny fararano izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tahaka ny fibitahan’ny olona raha mizara babo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Eny, mihinana an’i Efraima i Manase
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihinana an’i Manase kosa i Efraima;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miara-mamely an’i Joda izy roa tonta.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa na izany rehetra izany aza tsy mbola afaka ihany ny fahatezerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mbola miainga ihany ny tanany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa ny bao fitondrany entana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tsorakazo nikapohana ny lamosiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsorakazon’ny mpampiasa azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tapahinao tahaka ny tamin’ny andro namelezana ny Midianita.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa ny kiraron’izay mivatravatra fandeha amin’ny ady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fitafiana mihosin-dra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy hodorana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho kitay hatohoka amin’ny afo izany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa Zaza no teraka ho antsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zazalahy no omena antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahefana dia eo an-tsorony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny anarany atao hoe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanolotsaina mahagaga, Andriamanitra mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rain’ny mandrakizay, Andrianan’ny fiadanana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny handrosoan’ny fiandrianana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fiadanana dia tsy hanam-pahataperana eo amin’ny sezafiandrianan’i Davida
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fanjakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampiorenana sy hampitoerana azy amin’ny fitsarana marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’izao ka ho mandrakizay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no hotanterahin’ny fahasaro-piaron’Andriamanitra, Tompon’izao rehetra izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahatezeran’NY TOMPO amin’ny olony
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mandefa teny ho an’i Jakoba ny Tompo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mihatra amin’ny Israely izany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ho fantatr’izy iray firenena izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia i Efraima sy ny mponina any Samaria
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay miteny amin’ny fiavonavonany sy ny fireharehan’ny fony hoe:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Biriky no efa nirodana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa vato voapaika kosa no harafitsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aviavy no voakapa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sedera kosa no hasolontsika azy.
