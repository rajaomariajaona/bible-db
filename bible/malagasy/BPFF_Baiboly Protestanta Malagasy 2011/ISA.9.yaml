document_id: ISA.9,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ny olona izay mandeha amin’ny maizina
  - type: text
    content: dia mahita mazava lehibe;
  - type: text
    content: izay mitoetra amin’ny tanin’ny aloky ny fahafatesana
  - type: text
    content: no amirapiratan’ny mazava.
  '10':
  - type: text
    content: Manandratra ny rafilahin’i Rezina
  - type: text
    content: hihoatra azy NY TOMPO
  - type: text
    content: ary mampirisika ny fahavalony,
  '11':
  - type: text
    content: dia ny Arameana avy any atsinanana sy ny Filistina avy any andrefana;
  - type: text
    content: misanasana vava handrapaka ny Israely ireo.
  - type: text
    content: Kanefa na eo aza izany rehetra izany dia tsy mbola afaka ihany ny fahatezerany
  - type: text
    content: fa mbola miainga ihany ny tanany.
  '12':
  - type: text
    content: Tsy miverina amin’Izay mamely azy ny olona;
  - type: text
    content: eny, tsy mba tadiaviny Andriamanitra, Tompon’izao rehetra izao.
  '13':
  - type: text
    content: Noho izany dia hofongoran’NY TOMPO amin’ny Israely
  - type: text
    content: ao anatin’ny indray andro monja
  - type: text
    content: ny loha sy ny rambo, ny sampana palma sy ny zozoro.
  '14':
  - type: text
    content: Ny loholona sy ny olo-manankaja no loha,
  - type: text
    content: ny mpaminany izay mampianatra lainga no rambo.
  '15':
  - type: text
    content: Fa ny mpitarika ity firenena ity no tonga mpampivily azy,
  - type: text
    content: ary izay tarihiny dia voatelina.
  '16':
  - type: text
    content: Noho izany dia tsy mahafaly NY TOMPO ny zatovony,
  - type: text
    content: ary tsy iantrany ny kamboty sy ny mpitondratena ao aminy
  - type: text
    content: satria samy tsy mino sy mpanao ratsy izy,
  - type: text
    content: ary milaza hadalana ny vava rehetra.
  - type: text
    content: Kanefa na eo aza izany rehetra izany dia tsy mbola afaka ihany ny fahatezerany
  - type: text
    content: fa mbola miainga ihany ny tanany.
  '17':
  - type: text
    content: Fa mandoro tahaka ny afo ny haratsiam-panahy,
  - type: text
    content: mandevona ny tsilo sy ny anjavidy
  - type: text
    content: ary mampirehitra ny ala mikirindro
  - type: text
    content: ka mitambolimbolina ny setroka misavoana.
  '18':
  - type: text
    content: Noho ny fahatezeran’Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: dia kilan’ny afo ny tany,
  - type: text
    content: ary tahaka ny kitay atohoka amin’ny afo ny olona.
  - type: text
    content: Tsy misy olona miantra ny rahalahiny.
  '19':
  - type: text
    content: Mandripaka eny ankavanana izy nefa noana ihany;
  - type: text
    content: mandany eny ankavia izy nefa tsy voky ihany;
  - type: text
    content: samy mihinana ny nofon-tsandriny avy izy rehetra.
  '2':
  - type: text
    content: Hamaroinao ity firenena ity
  - type: text
    content: ary ampitomboinao ny hafaliany.
  - type: text
    content: Mifaly eo anatrehanao tahaka ny hafaliana amin’ny fararano izy;
  - type: text
    content: eny, tahaka ny fibitahan’ny olona raha mizara babo.
  '20':
  - type: text
    content: Eny, mihinana an’i Efraima i Manase
  - type: text
    content: ary mihinana an’i Manase kosa i Efraima;
  - type: text
    content: miara-mamely an’i Joda izy roa tonta.
  - type: text
    content: Kanefa na izany rehetra izany aza tsy mbola afaka ihany ny fahatezerany
  - type: text
    content: fa mbola miainga ihany ny tanany.
  '3':
  - type: text
    content: Fa ny bao fitondrany entana
  - type: text
    content: sy ny tsorakazo nikapohana ny lamosiny,
  - type: text
    content: izay tsorakazon’ny mpampiasa azy,
  - type: text
    content: dia tapahinao tahaka ny tamin’ny andro namelezana ny Midianita.
  '4':
  - type: text
    content: Fa ny kiraron’izay mivatravatra fandeha amin’ny ady
  - type: text
    content: sy ny fitafiana mihosin-dra
  - type: text
    content: dia samy hodorana,
  - type: text
    content: eny, ho kitay hatohoka amin’ny afo izany.
  '5':
  - type: text
    content: Fa Zaza no teraka ho antsika,
  - type: text
    content: Zazalahy no omena antsika;
  - type: text
    content: ary ny fahefana dia eo an-tsorony;
  - type: text
    content: ny anarany atao hoe
  - type: text
    content: Mpanolotsaina mahagaga, Andriamanitra mahery,
  - type: text
    content: Rain’ny mandrakizay, Andrianan’ny fiadanana.
  '6':
  - type: text
    content: Ny handrosoan’ny fiandrianana
  - type: text
    content: sy ny fiadanana dia tsy hanam-pahataperana eo amin’ny sezafiandrianan’i Davida
  - type: text
    content: sy ny fanjakany
  - type: text
    content: mba hampiorenana sy hampitoerana azy amin’ny fitsarana marina
  - type: text
    content: hatramin’izao ka ho mandrakizay.
  - type: text
    content: Izany no hotanterahin’ny fahasaro-piaron’Andriamanitra, Tompon’izao rehetra izao.
  - type: heading
    content: Ny fahatezeran’NY TOMPO amin’ny olony
  '7':
  - type: text
    content: Mandefa teny ho an’i Jakoba ny Tompo
  - type: text
    content: ka mihatra amin’ny Israely izany.
  '8':
  - type: text
    content: Ho fantatr’izy iray firenena izany,
  - type: text
    content: dia i Efraima sy ny mponina any Samaria
  - type: text
    content: 'izay miteny amin’ny fiavonavonany sy ny fireharehan’ny fony hoe:'
  '9':
  - type: text
    content: Biriky no efa nirodana
  - type: text
    content: fa vato voapaika kosa no harafitsika;
  - type: text
    content: aviavy no voakapa
  - type: text
    content: fa sedera kosa no hasolontsika azy.
