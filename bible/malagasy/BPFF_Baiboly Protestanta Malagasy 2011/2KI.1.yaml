document_id: 2KI.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Elia ny fahadisoan’i Ahazia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa maty i Ahaba dia nikomy tamin’ny Israely ny Moabita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nianjera avy teo amin’ny makarakara teo amin’ny efitrano ambony tao Samaria i Ahazia ka narary. Dia nandefa iraka izy ka niteny taminy hoe: Mandehana, anontanio amin’i Baala-Zeboba, andriamanitr’i Ekrona, na ho sitrana amin’ity aretiko ity ihany aho na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary niteny tamin’i Elia tisbita Ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ' hoe: Miaingà, miakara hihaona amin’ny iraky ny mpanjakan’i Samaria ka lazao aminy hoe: Moa tsy misy Andriamanitra va eo amin’ny Israely no mandeha hanontany amin’i Baala-Zeboba, andriamanitr’i Ekrona, ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Noho izany dia izao no lazain’NY TOMPO: Tsy hidina hiala amin’ny farafara izay niakaranao ianao fa ho faty tokoa. Dia lasa i Elia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony niverina tany amin’ny mpanjaka ny iraka dia hoy izy taminy: Nahoana re ianareo no niverina? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy ireo taminy: Nisy lehilahy niakatra nitsena anay ka niteny taminay hoe: Mandehana miverina any amin’ny mpanjaka izay naniraka anareo ka lazao aminy hoe: Izao no lazain’NY TOMPO: Moa tsy misy Andriamanitra va eo amin’ny Israely no mandefa iraka hanontany amin’i Baala-Zeboba, andriamanitr’i Ekrona, ianareo? Noho izany dia tsy hidina hiala amin’ny farafara izay niakaranao ianao fa ho faty tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy i Ahazia taminy: Lehilahy toy inona izany lehilahy niakatra nitsena anareo izany, izay nilaza izany teny izany taminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy ireo taminy: Lehilahy mitafy volom-biby sady manao fehikibo hoditra. Dia hoy i Ahazia: I Elia tisbita izany!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mikasa hisambotra an’i Elia i Ahazia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny mpanjaka naniraka olona iray, mpifehy dimampolo, mbamin’ny dimampolo lahy feheziny, mba hankany amin’i Elia. Dia niakatra tany aminy izy ireo ka indro, nipetraka teo an-tampon’ny tendrombohitra i Elia; ary niteny taminy Ralehilahy hoe: Ry lehilahin’Andriamanitra ô, asain’ny mpanjaka midina ianao! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nefa i Elia namaly ny mpifehy dimampolo hoe: Raha lehilahin’Andriamanitra tokoa aho dia aoka hisy afo milatsaka avy any an-danitra handevona anao sy ny dimampolo lahy fehezinao! Dia nisy afo nilatsaka avy tany an-danitra ka nandevona azy mbamin’ny dimampolo lahy feheziny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary naniraka mpifehy dimampolo hafa, mbamin’ny dimampolo lahy feheziny ny mpanjaka, mba hankany aminy indray. Hoy izy tamin’i Elia: Ry lehilahin’Andriamanitra ô, izao no tenin’ny mpanjaka: Midìna haingana ianao! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa namaly azy i Elia hoe: Raha lehilahin’Andriamanitra tokoa aho dia aoka hisy afo milatsaka avy any an-danitra ka handevona anao mbamin’ny dimampolo lahy fehezinao! Dia nisy afon’Andriamanitra nilatsaka avy tany an-danitra ka nandevona azy mbamin’ny dimampolo lahy feheziny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mbola naniraka mpifehy dimampolo hafa indray koa, mbamin’ny dimampolo lahy feheziny ny mpanjaka. Dia niakatra ilay mpifehy dimampolo ka tonga, ary nandohalika teo anatrehan’i Elia sady nifona taminy hoe: Miangavy anao re aho, ry lehilahin’Andriamanitra ô, aoka ho sarobidy eo imasonao ny aiko sy ny ain’ireto mpanomponao dimampolo ireto! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Indro, efa nisy afo nilatsaka avy tany an-danitra ka nandevona ireo roa lahy mpifehy dimampolo ireo mbamin’ny dimampolo feheziny avy; fa ankehitriny, aoka kosa ho sarobidy eo imasonao ny aiko! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ' tamin’i Elia: Midìna ihany ianao hiaraka aminy fa aza matahotra azy. Dia niainga i Elia ka nidina niaraka taminy ho any amin’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy izy tamin’ny mpanjaka: Izao no lazain’NY TOMPO: Satria ianao naniraka olona mba hanontany amin’i Baala-Zeboba, andriamanitr’i Ekrona, ka ohatra ny tsy misy Andriamanitra eo amin’ny Israely, dia tsy hidina hiala amin’ny farafara izay niakaranao ianao fa ho faty tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia maty izy araka ny tenin’NY TOMPO izay nolazain’i Elia. Ary satria tsy nanan-janaka izy, dia i Jehorama no nanjaka nandimby azy tamin’ny taona faharoa nanjakan’i Jehorama, zanak’i Josafata, mpanjakan’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny asan’i Ahazia sisa izay nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany?
