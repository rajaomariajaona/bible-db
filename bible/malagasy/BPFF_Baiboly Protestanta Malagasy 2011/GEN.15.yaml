document_id: GEN.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanekena nataon’Andriamanitra tamin’i Abrama
  - type: text
    content: 'Rehefa afaka izany dia tonga tamin’i Abrama tamin’ny fahitana ny tenin’NY TOMPO hoe: Aza matahotra, ry Abrama! Izaho no ampinganao, ary ho lehibe indrindra ny valim-pitianao. '
  '10':
  - type: text
    content: 'Dia noentiny teo Aminy izany rehetra izany; nosasahiny ireny ka nampifanandrifiny avy ny tapany, fa ny vorona kosa dia tsy mba nosasahiny. '
  '11':
  - type: text
    content: 'Ary nisy vorona mpiremby nidina teo amin’ny fatin’ireo, fa noroahin’i Abrama ireo. '
  '12':
  - type: text
    content: Rehefa hilentika ny masoandro dia sondrian-tory i Abrama; ary indro, nisy haizimbe mahatahotra tonga taminy.
  '13':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Abrama: Aoka ho fantatrao marina fa ho vahiny any amin’ny tany izay tsy azy ny taranakao, ary hanompo ny olona any ka hampahoriny efajato taona izy. '
  '14':
  - type: text
    content: 'Fa izany firenena izany kosa, izay hotompoiny, dia hotsaraiko; ary rehefa afaka izany dia hiala avy any mitondra fananana be dia be ny taranakao. '
  '15':
  - type: text
    content: 'Nefa ianao kosa ho any amin’ny razanao amin’ny fiadanana; ho tratra antitra indrindra ianao vao hodimandry. '
  '16':
  - type: text
    content: Fa amin’ny andron’ny zafiafy dia hiverina atỳ izy ireo; satria mbola tsy feno ny heloky ny Amorita hatramin’izao.
  '17':
  - type: text
    content: 'Ary rehefa maty ny masoandro ka maizina be ny andro dia indro, nisy fatana fandoroana mivoa-tsetroka niaraka tamin’ny fanilo mirehitra, nandeha namakivaky teo anelanelan’ireo zavatra voasasaka ireo. '
  '18':
  - type: text
    content: 'Tamin’izany andro izany no nanaovan’NY TOMPO fanekena tamin’i Abrama hoe: Ny taranakao no nomeko ity tany ity, hatrany amin’ny onin’i Ejipta ka hatrany amin’ny ony lehibe, dia ny ony Eofrata, '
  '19':
  - type: text
    content: 'dia ny Kenita, ny Kenizita, ny Kadmonita, '
  '2':
  - type: text
    content: 'Ary hoy i Abrama: Andriamanitra TOMPO ô, inona no homenao ahy? Izaho ity efa mandroso fahanterana nefa tsy manan-janaka, koa ny ho mpandova ny fananako dia ilay Eliezera avy any Damaskosy. '
  '20':
  - type: text
    content: 'ny Hetita, ny Perizita, ny Refaìta, '
  '21':
  - type: text
    content: ny Amorita, ny Kananita, ny Girgasita ary ny Jebosita.
  '3':
  - type: text
    content: 'Hoy koa i Abrama: Indro aho tsy nomenao fara handimby ahy ka indro, ny iray amin’ny ato an-tranoko no handova ahy. '
  '4':
  - type: text
    content: 'Ary indro, tonga taminy ny tenin’NY TOMPO hoe: Tsy handova anao izy, fa izay haterakao ihany no handova anao. '
  '5':
  - type: text
    content: 'Dia nitondra azy nankeo ivelan’ny tranolay Izy ka niteny hoe: Jereo ange ny lanitra ka isao ireo kintana raha mahaisa azy ianao. Dia hoy Izy taminy: Ho tahaka ireo ny taranakao. '
  '6':
  - type: text
    content: Ary nino NY TOMPO izy, koa nisainy ho fahamarinany izany.
  '7':
  - type: text
    content: 'Ary hoy Izy taminy: Izaho no TOMPO izay nitondra anao niala avy tany Oran’ny Kaldeana mba hanomezako anao ity tany ity ho lovanao. '
  '8':
  - type: text
    content: 'Dia hoy i Abrama: Andriamanitra TOMPO ô, ahoana no hahafantarako fa handova ity tany ity aho? '
  '9':
  - type: text
    content: 'Fa hoy Izy taminy: Itondray ombivavy kely izay telo taona Aho, osivavy izay telo taona, ondrilahy izay telo taona ary domohina sy zana-boromailala. '
