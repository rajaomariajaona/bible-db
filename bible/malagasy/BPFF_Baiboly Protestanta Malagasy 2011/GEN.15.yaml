document_id: GEN.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanekena nataon’Andriamanitra tamin’i Abrama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany dia tonga tamin’i Abrama tamin’ny fahitana ny tenin’NY TOMPO hoe: Aza matahotra, ry Abrama! Izaho no ampinganao, ary ho lehibe indrindra ny valim-pitianao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy i Abrama: Andriamanitra TOMPO ô, inona no homenao ahy? Izaho ity efa mandroso fahanterana nefa tsy manan-janaka, koa ny ho mpandova ny fananako dia ilay Eliezera avy any Damaskosy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy koa i Abrama: Indro aho tsy nomenao fara handimby ahy ka indro, ny iray amin’ny ato an-tranoko no handova ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary indro, tonga taminy ny tenin’NY TOMPO hoe: Tsy handova anao izy, fa izay haterakao ihany no handova anao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nitondra azy nankeo ivelan’ny tranolay Izy ka niteny hoe: Jereo ange ny lanitra ka isao ireo kintana raha mahaisa azy ianao. Dia hoy Izy taminy: Ho tahaka ireo ny taranakao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary nino NY TOMPO izy, koa nisainy ho fahamarinany izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Izy taminy: Izaho no TOMPO izay nitondra anao niala avy tany Oran’ny Kaldeana mba hanomezako anao ity tany ity ho lovanao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Abrama: Andriamanitra TOMPO ô, ahoana no hahafantarako fa handova ity tany ity aho? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy Izy taminy: Itondray ombivavy kely izay telo taona Aho, osivavy izay telo taona, ondrilahy izay telo taona ary domohina sy zana-boromailala. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia noentiny teo Aminy izany rehetra izany; nosasahiny ireny ka nampifanandrifiny avy ny tapany, fa ny vorona kosa dia tsy mba nosasahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nisy vorona mpiremby nidina teo amin’ny fatin’ireo, fa noroahin’i Abrama ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rehefa hilentika ny masoandro dia sondrian-tory i Abrama; ary indro, nisy haizimbe mahatahotra tonga taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Abrama: Aoka ho fantatrao marina fa ho vahiny any amin’ny tany izay tsy azy ny taranakao, ary hanompo ny olona any ka hampahoriny efajato taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa izany firenena izany kosa, izay hotompoiny, dia hotsaraiko; ary rehefa afaka izany dia hiala avy any mitondra fananana be dia be ny taranakao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nefa ianao kosa ho any amin’ny razanao amin’ny fiadanana; ho tratra antitra indrindra ianao vao hodimandry. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa amin’ny andron’ny zafiafy dia hiverina atỳ izy ireo; satria mbola tsy feno ny heloky ny Amorita hatramin’izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa maty ny masoandro ka maizina be ny andro dia indro, nisy fatana fandoroana mivoa-tsetroka niaraka tamin’ny fanilo mirehitra, nandeha namakivaky teo anelanelan’ireo zavatra voasasaka ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tamin’izany andro izany no nanaovan’NY TOMPO fanekena tamin’i Abrama hoe: Ny taranakao no nomeko ity tany ity, hatrany amin’ny onin’i Ejipta ka hatrany amin’ny ony lehibe, dia ny ony Eofrata, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia ny Kenita, ny Kenizita, ny Kadmonita, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny Hetita, ny Perizita, ny Refaìta, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ny Amorita, ny Kananita, ny Girgasita ary ny Jebosita.
