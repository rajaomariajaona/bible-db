document_id: ECC.2,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Hoy aho anakampo:'
  - type: text
    content: Aoka ianao mba hozahako toetra amin’ny fifaliana
  - type: text
    content: ka hahita ny atao hoe fahafinaretana;
  - type: text
    content: kanjo indro, zava-poana koa izany.
  '10':
  - type: text
    content: Ary na inona na inona nirin’ny masoko dia tsy nisy narovako taminy;
  - type: text
    content: tsy nisakana ny foko tamin’izay mety ho fifaliana aho
  - type: text
    content: fa nahazo hafaliana avy tamin’ny fisasarako rehetra ny foko;
  - type: text
    content: ary izany no anjarako avy tamin’ny fisasarako rehetra.
  '11':
  - type: text
    content: Kanefa nitodika aho nandinika ny asa rehetra nataon’ny tanako
  - type: text
    content: sy ny fisasarana izay nisasarako
  - type: text
    content: ka indreo, zava-poana sy sambo-drivotra avokoa izany rehetra izany
  - type: text
    content: fa tsy nisy nahasoa tetỳ ambanin’ny masoandro.
  '12':
  - type: text
    content: Ary nitodika aho hijery ny fahendrena sy ny fahaverezan-tsaina ary ny fahadalana;
  - type: text
    content: fa inona no hataon’ny olona izay handimby ny mpanjaka?
  - type: text
    content: Izay efa natao hatramin’ny ela ihany.
  '13':
  - type: text
    content: Ary hitako fa ny fahendrena dia tsara noho ny fahadalana,
  - type: text
    content: toy ny fahatsaran’ny mazava noho ny maizina.
  '14':
  - type: text
    content: Ny mason’ny hendry dia eo an-dohany,
  - type: text
    content: fa ny adala kosa dia mandeha ao amin’ny maizina;
  - type: text
    content: nefa izaho dia mahita fa mitovy ihany ny manjo azy roa tonta.
  '15':
  - type: text
    content: 'Dia hoy aho anakampo:'
  - type: text
    content: Mitovy amin’ny manjo ny adala ihany ny manjo ahy;
  - type: text
    content: koa nahoana ary aho no nanana tombom-pahendrena?
  - type: text
    content: 'Dia hoy aho anakampo: Izany koa dia zava-poana.'
  '16':
  - type: text
    content: Fa samy tsy mamela fahatsiarovana mandrakizay
  - type: text
    content: na ny hendry na ny adala;
  - type: text
    content: 'fa raha vao mandroso ny fotoana dia samy hadino izy rehetra. Ary, indrisy! Samy ho faty na ny adala na ny hendry! '
  '17':
  - type: text
    content: Dia tonga halako ny miaina satria heveriko fa ratsy ny asa atao etỳ ambanin’ny masoandro ary zava-poana sy sambo-drivotra avokoa ny zava-drehetra.
  '18':
  - type: text
    content: 'Eny, halako ny fisasarako rehetra izay nisasarako tetỳ ambanin’ny masoandro, izay havelako ho an’izay olona handimby ahy. '
  '19':
  - type: text
    content: 'Ary iza no mahalala na ho hendry izy na ho adala? Nefa izy no ho tompon’izay rehetra nisasarako sy nataoko tamin’ny fahendreko tetỳ ambanin’ny masoandro. Izany koa dia zava-poana. '
  '2':
  - type: text
    content: 'Hoy aho momba ny fihomehezana: Hadalana izany!'
  - type: text
    content: 'Ary momba ny fifaliana: Mahefa inona izany?'
  '20':
  - type: text
    content: Tonga namoy fo aho ny amin’ny fisasarana rehetra izay nisasarako tetỳ ambanin’ny masoandro.
  '21':
  - type: text
    content: 'Fa misy olona izay misasatra amin’ny fahendrena sy ny fahalalana ary ny fahakingana, nefa ny olona izay tsy nisasatra tamin’izany akory no tsy maintsy hamelany azy ho lovany. Izany koa dia zava-poana sy fatiantoka lehibe. '
  '22':
  - type: text
    content: 'Fa inona no azon’ny olona amin’ny fisasarany rehetra sy amin’ny ezaky ny fony izay nisahiranany tetỳ ambanin’ny masoandro? '
  '23':
  - type: text
    content: Satria ny androny rehetra dia fanaintainana avokoa ary ny fisasarany dia fahasorisorenana; eny, na dia amin’ny alina aza dia tsy manam-pitsaharana ny fony. Izany koa dia zava-poana.
  '24':
  - type: text
    content: Tsy misy mahasoa ny olona mihoatra noho ny mihinana sy misotro ary ny manao izay hampahafinaritra ny tenany amin’izay nisasarany. Izany koa dia hitako fa avy amin’ny tanan’Andriamanitra.
  '25':
  - type: text
    content: Fa iza no mihinam-be ary iza no manaram-po mihoatra noho izaho?
  '26':
  - type: text
    content: Ny olona izay ankasitrahan’Andriamanitra dia omeny fahendrena sy fahalalana ary fifaliana; fa ny mpanota kosa dia ampiasainy hanangona sy hamory mba hisy homeny ho an’izay ankasitrahan’Andriamanitra. Izany koa dia zava-poana sy sambo-drivotra avokoa.
  '3':
  - type: text
    content: 'Nisaina tato am-poko hamalifaly ny tenako tamin’ny divay aho, nefa ninia mbola hitondra izany amin’ny fahendrena ihany aho; nisaina hitana ny hadalana koa aho, mandra-pahitako izay tsara ho an’ny zanak’olombelona ka tokony hataony etỳ ambanin’ny lanitra amin’ny andro vitsy iainany. '
  '4':
  - type: text
    content: 'Nanao asa lehibe aho:'
  - type: text
    content: Nanangana trano maro,
  - type: text
    content: nanao tanim-boaloboka;
  '5':
  - type: text
    content: nanao zaridaina sy saha mahafinaritra aho,
  - type: text
    content: dia namboly hazo fihinam-boa samihafa karazana tao;
  '6':
  - type: text
    content: nanao kamory aho
  - type: text
    content: hanondrahana ny zana-kazo ao amin’ny tany famboleko hazo;
  '7':
  - type: text
    content: nahazo mpanompolahy sy mpanompovavy maro aho,
  - type: text
    content: mbamin’ireo zanany teraka tato an-trano;
  - type: text
    content: nanana omby sy ondry aman’osy betsaka koa aho,
  - type: text
    content: mihoatra noho izay rehetra talohako teto Jerosalema.
  '8':
  - type: text
    content: Nihary volafotsy sy volamena koa aho,
  - type: text
    content: rakitra sarobidy izay fananan’ny mpanjaka sy izay avy amin’ny fari-piadidiana samihafa;
  - type: text
    content: nahazo mpihira lahy sy vavy maro aho
  - type: text
    content: mbamin’izay mahafinaritra ny zanak’olombelona,
  - type: text
    content: dia vady sy vady tsindrano betsaka.
  '9':
  - type: text
    content: Efa nisandratra mihoatra noho izay rehetra talohako teto Jerosalema aho,
  - type: text
    content: nefa ny fahendreko dia mbola tato amiko ihany.
