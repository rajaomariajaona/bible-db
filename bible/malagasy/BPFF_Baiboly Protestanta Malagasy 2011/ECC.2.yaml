document_id: ECC.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hoy aho anakampo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ianao mba hozahako toetra amin’ny fifaliana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahita ny atao hoe fahafinaretana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo indro, zava-poana koa izany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary na inona na inona nirin’ny masoko dia tsy nisy narovako taminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nisakana ny foko tamin’izay mety ho fifaliana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nahazo hafaliana avy tamin’ny fisasarako rehetra ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izany no anjarako avy tamin’ny fisasarako rehetra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Kanefa nitodika aho nandinika ny asa rehetra nataon’ny tanako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fisasarana izay nisasarako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka indreo, zava-poana sy sambo-drivotra avokoa izany rehetra izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy nisy nahasoa tetỳ ambanin’ny masoandro.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary nitodika aho hijery ny fahendrena sy ny fahaverezan-tsaina ary ny fahadalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa inona no hataon’ny olona izay handimby ny mpanjaka?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay efa natao hatramin’ny ela ihany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary hitako fa ny fahendrena dia tsara noho ny fahadalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fahatsaran’ny mazava noho ny maizina.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny mason’ny hendry dia eo an-dohany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny adala kosa dia mandeha ao amin’ny maizina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa izaho dia mahita fa mitovy ihany ny manjo azy roa tonta.
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy aho anakampo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitovy amin’ny manjo ny adala ihany ny manjo ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa nahoana ary aho no nanana tombom-pahendrena?
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia hoy aho anakampo: Izany koa dia zava-poana.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa samy tsy mamela fahatsiarovana mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny hendry na ny adala;
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'fa raha vao mandroso ny fotoana dia samy hadino izy rehetra. Ary, indrisy! Samy ho faty na ny adala na ny hendry! '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia tonga halako ny miaina satria heveriko fa ratsy ny asa atao etỳ ambanin’ny masoandro ary zava-poana sy sambo-drivotra avokoa ny zava-drehetra.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Eny, halako ny fisasarako rehetra izay nisasarako tetỳ ambanin’ny masoandro, izay havelako ho an’izay olona handimby ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary iza no mahalala na ho hendry izy na ho adala? Nefa izy no ho tompon’izay rehetra nisasarako sy nataoko tamin’ny fahendreko tetỳ ambanin’ny masoandro. Izany koa dia zava-poana. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hoy aho momba ny fihomehezana: Hadalana izany!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary momba ny fifaliana: Mahefa inona izany?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tonga namoy fo aho ny amin’ny fisasarana rehetra izay nisasarako tetỳ ambanin’ny masoandro.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa misy olona izay misasatra amin’ny fahendrena sy ny fahalalana ary ny fahakingana, nefa ny olona izay tsy nisasatra tamin’izany akory no tsy maintsy hamelany azy ho lovany. Izany koa dia zava-poana sy fatiantoka lehibe. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa inona no azon’ny olona amin’ny fisasarany rehetra sy amin’ny ezaky ny fony izay nisahiranany tetỳ ambanin’ny masoandro? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Satria ny androny rehetra dia fanaintainana avokoa ary ny fisasarany dia fahasorisorenana; eny, na dia amin’ny alina aza dia tsy manam-pitsaharana ny fony. Izany koa dia zava-poana.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tsy misy mahasoa ny olona mihoatra noho ny mihinana sy misotro ary ny manao izay hampahafinaritra ny tenany amin’izay nisasarany. Izany koa dia hitako fa avy amin’ny tanan’Andriamanitra.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa iza no mihinam-be ary iza no manaram-po mihoatra noho izaho?
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny olona izay ankasitrahan’Andriamanitra dia omeny fahendrena sy fahalalana ary fifaliana; fa ny mpanota kosa dia ampiasainy hanangona sy hamory mba hisy homeny ho an’izay ankasitrahan’Andriamanitra. Izany koa dia zava-poana sy sambo-drivotra avokoa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nisaina tato am-poko hamalifaly ny tenako tamin’ny divay aho, nefa ninia mbola hitondra izany amin’ny fahendrena ihany aho; nisaina hitana ny hadalana koa aho, mandra-pahitako izay tsara ho an’ny zanak’olombelona ka tokony hataony etỳ ambanin’ny lanitra amin’ny andro vitsy iainany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nanao asa lehibe aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanangana trano maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanao tanim-boaloboka;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: nanao zaridaina sy saha mahafinaritra aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia namboly hazo fihinam-boa samihafa karazana tao;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: nanao kamory aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanondrahana ny zana-kazo ao amin’ny tany famboleko hazo;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: nahazo mpanompolahy sy mpanompovavy maro aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ireo zanany teraka tato an-trano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanana omby sy ondry aman’osy betsaka koa aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoatra noho izay rehetra talohako teto Jerosalema.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nihary volafotsy sy volamena koa aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rakitra sarobidy izay fananan’ny mpanjaka sy izay avy amin’ny fari-piadidiana samihafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nahazo mpihira lahy sy vavy maro aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’izay mahafinaritra ny zanak’olombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia vady sy vady tsindrano betsaka.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Efa nisandratra mihoatra noho izay rehetra talohako teto Jerosalema aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny fahendreko dia mbola tato amiko ihany.
