document_id: 2CH.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan’i Manase
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 21.1-18
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Roa amby folo taona i Manase raha nanomboka nanjaka ary dimy amby dimampolo taona no nanjakany tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanao izay ratsy teo imason’NY TOMPO izy, tahaka ny fahavetavetan’ny firenena izay noroahin’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Namboariny indray ny toerana fanaovana sorona, izay efa noravan’i Hezekia rainy ka nanangana alitara ho an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' izy sady nanao tsangankazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: ' sy niankohoka teo anatrehan’izay rehetra eny amin’ny lanitra ka nanompo azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sady nanorina alitara tao amin’ny tranon’NY TOMPO, dia tao amin’ilay nolazain’NY TOMPO hoe: Any Jerosalema no hitoeran’ny anarako mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa nanorina alitara maromaro teo anatin’ny kianja roa amin’ny tranon’NY TOMPO izy ho an’izay rehetra eny amin’ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nampamakivakìny ny afo tao an-dohasahan’ny taranak’i Hinoma ny zanany no sady nanandro no nanao sikidy no nitana ody ary naka ireo izay milaza azy ho mpiantso ny fanahin’ny maty sy ny mpanandro; nahery nanao izay ratsy teo imason’NY TOMPO tokoa izy ka nampahatezitra Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izay sarin-javatra voasokitra momba ny sampy nataony dia napetrany tao amin’ny tranon’Andriamanitra, izay nolazain’Andriamanitra tamin’i Davida sy i Solomona zanany hoe: Ato amin’ity trano ity sy eto Jerosalema, izay nofidiko tamin’ny fokon’Israely rehetra, no hasiako ny anarako mandrakizay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary tsy hampandeha ny tongotry ny Israely hiala amin’ny tany izay efa notendreko ho an’ny razanareo intsony Aho, raha mba mitandrina koa izy ka hanatanteraka izay rehetra nandidiako azy, dia araka ny lalàna rehetra sy ny didy ary ny fitsipika izay nampilazaina an’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Kanjo nampivily ny Joda sy ny mponina tany Jerosalema i Manase mba hanao izay ratsy mihoatra noho ny firenena izay naringan’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary NY TOMPO niteny tamin’i Manase sy ny vahoakany, nefa tsy nety nihaino izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia noentin’NY TOMPO hamely azy ny komandin’ny miaramilan’ny mpanjakan’i Asiria, ary nosamborin’ireo i Manase ka nasiany farango vy sady nasiany gadra varahina ary noentiny ho any Babilona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony azom-pahoriana mafy izy vao nifona tamin’NY TOMPO Andriamaniny sady nanetry tena indrindra teo anatrehan’Andriamanitry ny razany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ka nivavaka taminy; ary NY TOMPO nanaiky ka nihaino ny fifonany, dia nampody azy ho any Jerosalema ho any amin’ny fanjakany. Dia fantatr’i Manase fa NY TOMPO no Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rehefa afaka izany dia nanao manda teo ivelan’ny Tanànan’i Davida izy, teo andrefana hatrany Gihona, eo amin’ny lohasahan-driaka, ka hatramin’ny fidirana amin’ny vavahadin-kazandrano; nataony manodidina an’i Ofela io sady nataony avo dia avo; ary nanendry izay ho mpitarika ny miaramila ho any amin’ny tanàna mimanda rehetra any Joda izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nesoriny ireo andriamanitra hafa sy ny sampy tao amin’ny tranon’NY TOMPO mbamin’ny alitara rehetra izay efa naoriny tany amin’ny tendrombohitry ny tranon’NY TOMPO sy tany Jerosalema ka nariany teny ivelan’ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nanorina ny alitaran’NY TOMPO indray izy ka namono zavatra hatao fanati-pihavanana sy fanati-pisaorana teo amboniny, sady nanome didy ny Joda hanompo NY TOMPO, Andriamanitry ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ny olona dia mbola namono zavatra hatao fanatitra teny amin’ny toerana fanaovana sorona ihany, kanefa kosa ho an’NY TOMPO Andriamaniny izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny tantaran’i Manase sisa mbamin’ny vavaka nataony tamin’Andriamaniny sy ny tenin’ireo mpahita izay niteny taminy tamin’ny anaran’NY TOMPO, Andriamanitry ny Israely, indro, ao amin’ny tantaran’ny mpanjakan’ny Israely izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny vavaka nataony sy ny naneken’Andriamanitra izany ary ny fahotany sy ny fahadisoany rehetra mbamin’ny toerana izay nanorenany toerana fanaovana sorona sy nananganany tsangankazon-tsampy ho an’ny Aseraha sy sarin-javatra voasokitra, fony izy tsy mbola nanetry tena, indro, efa voasoratra ao amin’ny tenin’i Hozay izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nodimandry any amin’ny razany i Manase, dia nalevina tao an-tranony izy; ary i Amona zanany no nanjaka nandimby azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan’i Amona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 21.19-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Roa amby roapolo taona i Amona raha nanomboka nanjaka ary roa taona no nanjakany tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nanao izay ratsy teo imason’NY TOMPO tahaka ny nataon’i Manase rainy ihany izy; satria ny sarin-javatra voasokitra rehetra nataon’i Manase rainy dia namonoan’i Amona zavatra hatao fanatitra ka notompoiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'tsy nanetry tena teo anatrehan’NY TOMPO tahaka ny nataon’i Manase rainy izy fa mainka nanota bebe kokoa aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nikomy taminy ny mpanompony ka namono azy tao an-tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa ny vahoaka kosa dia namono izay rehetra efa nikomy tamin’i Amona mpanjaka, dia nampanjaka an’i Josia zanany hisolo azy.
