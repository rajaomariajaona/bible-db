document_id: 2CH.33,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Manase
  - type: heading
    content: 2Mpa 21.1-18
  - type: text
    content: 'Roa amby folo taona i Manase raha nanomboka nanjaka ary dimy amby dimampolo taona no nanjakany tany Jerosalema. '
  '10':
  - type: text
    content: Ary NY TOMPO niteny tamin’i Manase sy ny vahoakany, nefa tsy nety nihaino izy.
  '11':
  - type: text
    content: 'Dia noentin’NY TOMPO hamely azy ny komandin’ny miaramilan’ny mpanjakan’i Asiria, ary nosamborin’ireo i Manase ka nasiany farango vy sady nasiany gadra varahina ary noentiny ho any Babilona. '
  '12':
  - type: text
    content: 'Nony azom-pahoriana mafy izy vao nifona tamin’NY TOMPO Andriamaniny sady nanetry tena indrindra teo anatrehan’Andriamanitry ny razany '
  '13':
  - type: text
    content: ka nivavaka taminy; ary NY TOMPO nanaiky ka nihaino ny fifonany, dia nampody azy ho any Jerosalema ho any amin’ny fanjakany. Dia fantatr’i Manase fa NY TOMPO no Andriamanitra.
  '14':
  - type: text
    content: Rehefa afaka izany dia nanao manda teo ivelan’ny Tanànan’i Davida izy, teo andrefana hatrany Gihona, eo amin’ny lohasahan-driaka, ka hatramin’ny fidirana amin’ny vavahadin-kazandrano; nataony manodidina an’i Ofela io sady nataony avo dia avo; ary nanendry izay ho mpitarika ny miaramila ho any amin’ny tanàna mimanda rehetra any Joda izy.
  '15':
  - type: text
    content: 'Dia nesoriny ireo andriamanitra hafa sy ny sampy tao amin’ny tranon’NY TOMPO mbamin’ny alitara rehetra izay efa naoriny tany amin’ny tendrombohitry ny tranon’NY TOMPO sy tany Jerosalema ka nariany teny ivelan’ny tanàna. '
  '16':
  - type: text
    content: 'Dia nanorina ny alitaran’NY TOMPO indray izy ka namono zavatra hatao fanati-pihavanana sy fanati-pisaorana teo amboniny, sady nanome didy ny Joda hanompo NY TOMPO, Andriamanitry ny Israely. '
  '17':
  - type: text
    content: Fa ny olona dia mbola namono zavatra hatao fanatitra teny amin’ny toerana fanaovana sorona ihany, kanefa kosa ho an’NY TOMPO Andriamaniny izany.
  '18':
  - type: text
    content: 'Ny tantaran’i Manase sisa mbamin’ny vavaka nataony tamin’Andriamaniny sy ny tenin’ireo mpahita izay niteny taminy tamin’ny anaran’NY TOMPO, Andriamanitry ny Israely, indro, ao amin’ny tantaran’ny mpanjakan’ny Israely izany. '
  '19':
  - type: text
    content: 'Ary ny vavaka nataony sy ny naneken’Andriamanitra izany ary ny fahotany sy ny fahadisoany rehetra mbamin’ny toerana izay nanorenany toerana fanaovana sorona sy nananganany tsangankazon-tsampy ho an’ny Aseraha sy sarin-javatra voasokitra, fony izy tsy mbola nanetry tena, indro, efa voasoratra ao amin’ny tenin’i Hozay izany. '
  '2':
  - type: text
    content: 'Nanao izay ratsy teo imason’NY TOMPO izy, tahaka ny fahavetavetan’ny firenena izay noroahin’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely. '
  '20':
  - type: text
    content: Ary nodimandry any amin’ny razany i Manase, dia nalevina tao an-tranony izy; ary i Amona zanany no nanjaka nandimby azy.
  - type: heading
    content: Ny nanjakan’i Amona
  - type: heading
    content: 2Mpa 21.19-26
  '21':
  - type: text
    content: 'Roa amby roapolo taona i Amona raha nanomboka nanjaka ary roa taona no nanjakany tany Jerosalema. '
  '22':
  - type: text
    content: 'Ary nanao izay ratsy teo imason’NY TOMPO tahaka ny nataon’i Manase rainy ihany izy; satria ny sarin-javatra voasokitra rehetra nataon’i Manase rainy dia namonoan’i Amona zavatra hatao fanatitra ka notompoiny; '
  '23':
  - type: text
    content: 'tsy nanetry tena teo anatrehan’NY TOMPO tahaka ny nataon’i Manase rainy izy fa mainka nanota bebe kokoa aza. '
  '24':
  - type: text
    content: 'Dia nikomy taminy ny mpanompony ka namono azy tao an-tranony. '
  '25':
  - type: text
    content: Fa ny vahoaka kosa dia namono izay rehetra efa nikomy tamin’i Amona mpanjaka, dia nampanjaka an’i Josia zanany hisolo azy.
  '3':
  - type: text
    content: 'Namboariny indray ny toerana fanaovana sorona, izay efa noravan’i Hezekia rainy ka nanangana alitara ho an’ireo '
  - type: text
    content: Baala
  - type: text
    content: ' izy sady nanao tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: ' sy niankohoka teo anatrehan’izay rehetra eny amin’ny lanitra ka nanompo azy '
  '4':
  - type: text
    content: 'sady nanorina alitara tao amin’ny tranon’NY TOMPO, dia tao amin’ilay nolazain’NY TOMPO hoe: Any Jerosalema no hitoeran’ny anarako mandrakizay. '
  '5':
  - type: text
    content: 'Fa nanorina alitara maromaro teo anatin’ny kianja roa amin’ny tranon’NY TOMPO izy ho an’izay rehetra eny amin’ny lanitra. '
  '6':
  - type: text
    content: 'Ary nampamakivakìny ny afo tao an-dohasahan’ny taranak’i Hinoma ny zanany no sady nanandro no nanao sikidy no nitana ody ary naka ireo izay milaza azy ho mpiantso ny fanahin’ny maty sy ny mpanandro; nahery nanao izay ratsy teo imason’NY TOMPO tokoa izy ka nampahatezitra Azy. '
  '7':
  - type: text
    content: 'Ary izay sarin-javatra voasokitra momba ny sampy nataony dia napetrany tao amin’ny tranon’Andriamanitra, izay nolazain’Andriamanitra tamin’i Davida sy i Solomona zanany hoe: Ato amin’ity trano ity sy eto Jerosalema, izay nofidiko tamin’ny fokon’Israely rehetra, no hasiako ny anarako mandrakizay; '
  '8':
  - type: text
    content: 'ary tsy hampandeha ny tongotry ny Israely hiala amin’ny tany izay efa notendreko ho an’ny razanareo intsony Aho, raha mba mitandrina koa izy ka hanatanteraka izay rehetra nandidiako azy, dia araka ny lalàna rehetra sy ny didy ary ny fitsipika izay nampilazaina an’i Mosesy. '
  '9':
  - type: text
    content: 'Kanjo nampivily ny Joda sy ny mponina tany Jerosalema i Manase mba hanao izay ratsy mihoatra noho ny firenena izay naringan’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely. '
