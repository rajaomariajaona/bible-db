document_id: 1KI.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny niafaran’ny fanjakan’i Jeroboama
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Indray andro dia narary i Abia, zanak’i Jeroboama. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Noho izany dia indro, hahatonga loza amin’ny taranak’i Jeroboama Aho ka handringana izay lehilahy rehetra amin’ny tamingan’i Jeroboama, na ny voagadra, na ny olona afaka amin’ny Israely ary hanaisotra ny sisa amin’ny taranak’i Jeroboama Aho, toy ny fanaisotry ny olona ny diky ambara-pahafoanany tanteraka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa izay tamingan’i Jeroboama maty ao an-tanàna dia hohanin’ny alika, ary izay maty any an-tsaha dia hohanin’ny voromanidina; fa NY TOMPO no efa niteny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa mitsangàna ianao ka modia any an-tranonao. Raha vao mijadona ao an-tanàna ny tongotrao dia indro, ho faty ny zaza. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ny Israely rehetra dia hisaona sy handevina azy; fa amin’ny tamingan’i Jeroboama dia izy irery ihany no ho tonga ao am-pasana, satria izy ihany no nahitana hatsaram-panahy teo anatrehan’NY TOMPO, Andriamanitry ny Israely. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hanangana mpanjaka ho an’ny Israely NY TOMPO ka handringana ny taranak’i Jeroboama izy io. Izao anio izao izany! Ahoana hoe? Izao ankehitriny izao ihany! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa NY TOMPO hamely ny Israely toy ny volotara hozongozonina any anaty rano sady hanongotra ny Israely amin’ity tany soa nomeny ny razany ity, ary hanely azy ho any andafin’ny ony Eofrata, satria nanao ireo tsangankazon-tsampy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserahany
    - type: text
      text: ' izy ka nahatezitra NY TOMPO. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary Izy hanolotra ny Israely noho ny fahotana izay nataon’i Jeroboama sady nampanotany ny Israely koa.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia niainga ny vadin’i Jeroboama ka lasa nandeha ary tonga tany Tirza; koa rehefa tonga teo amin’ny tokonam-baravarana izy dia maty ny zazalahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nandevina azy ny Israely rehetra sady nisaona azy, araka ny tenin’NY TOMPO izay nampilazainy an’i Ahia mpaminany mpanompony.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny tantaran’i Jeroboama sisa, dia ny niadiany sy ny nanjakany, indro, voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hoy i Jeroboama tamin’ny vadiny: Miangavy anao aho, mitsangàna ka miovà endrika mba tsy ho fantatr’olona hoe vadin’i Jeroboama ianao. Dia mankanesa any Silo, fa indro, ao i Ahia mpaminany, ilay nilaza tamiko fa ho mpanjakan’ity firenena ity aho. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Roa amby roapolo taona ny fotoana nanjakan’i Jeroboama. Nodimandry any amin’ny razany izy. I Nadaba zanany no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tohin’ny fanjakan’i Rehoboama tamin’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 12.13-14
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary nanjaka tamin’i Joda i Rehoboama, zanak’i Solomona. Iraika amby efapolo taona i Rehoboama raha nanomboka nanjaka, ary fito amby folo taona no nanjakany tany Jerosalema, tanàna nofidin’NY TOMPO tamin’ny fokon’ny Israely rehetra mba hametrahany ny anarany. Ny anaran’ny reniny dia Nama amonita.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nanao izay ratsy teo imason’NY TOMPO ny Joda ka nampahasaro-piaro Azy. Ny fahotana izay nataony dia mihoatra noho izay rehetra nataon’ny razany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa izy ireo koa dia nanao toerana fanaovana sorona sy tsangambaton-tsampy ary tsangankazon-tsampy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aseraha
    - type: text
      text: ' teny an-tampon’ny vohitra avo rehetra sy teny ambanin’ny hazo maitso rehetra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Nisy koa aza ireo olona nanolo-tena hijangajanga ho fanompoan-tsampy teo amin’ny tany ka nanaraka ny fahavetavetana rehetra fanaon’ny firenena izay noroahin’NY TOMPO teo anoloan’ny Zanak’Israely.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 12.1-2
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tamin’ny taona fahadimy nanjakan’i Rehoboama mpanjaka dia niakatra hamely an’i Jerosalema i Sisaka, mpanjakan’i Ejipta. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nalainy ny harena tao amin’ny tranon’NY TOMPO sy ny harena tao amin’ny tranon’ny mpanjaka; lasany avokoa izany rehetra izany. Nobaboiny koa ny ampinga volamena rehetra nataon’i Solomona. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary nanao ampinga varahina ho solon’ireny i Rehoboama mpanjaka ka nanolotra azy ho eo an-tanan’ny lehiben’ny mpiambina izay niambina ny varavaran’ny tranon’ny mpanjaka. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Koa na oviana na oviana no nidiran’ny mpanjaka tao amin’ny tranon’NY TOMPO dia noentin’ny mpiambina ireny ary naveriny tao amin’ny efitranon’ny mpiambina indray avy eo.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 12.15-16
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny tantaran’i Rehoboama sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa mitondrà mofo folo sy mofo madinika ary tantely iray tavoara ka mankanesa any aminy; fa hanambara aminao izay ho momba ny zaza izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Niady mandrakariva i Rehoboama sy i Jeroboama.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Nodimandry any amin’ny razany i Rehoboama ka nalevina tao amin’ny razany tao amin’ny Tanànan’i Davida. Ny anaran’ny reniny dia Nama amonita. I Abia zanany no nanjaka nandimby azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nanatanteraka izany ny vadin’i Jeroboama ka niainga nankany Silo, dia nankao an-tranon’i Ahia. Efa tsy nahita intsony i Ahia fa efa pahina noho ny fahanterana ny masony. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nefa NY TOMPO efa nilaza tamin’i Ahia hoe: Indro, avy ny vadin’i Jeroboama hanontany anao ny amin’ny zanany, fa marary izy. Ary izao ka izao no holazainao aminy. Nefa rehefa miditra manketo aminao izy dia mody hiseho ho vehivavy hafa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony ren’i Ahia ny figodongodon’ny tongony raha vao niditra teo am-baravarana izy dia hoy izy: Mandrosoa, ry vadin’i Jeroboama! Nahoana ianao no mody olon-kafa? Fa izaho dia nirahina hitondra teny mafy aminao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa mandehana, lazao amin’i Jeroboama hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Satria nanandratra anao avy tamin’ny olona Aho ka nanendry anao ho mpitarika ny Israely oloko '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'dia nendahiko ho afaka tamin’ny taranak’i Davida ny fanjakana ka nomeko anao; nefa ianao kosa dia tsy mba tahaka an’i Davida mpanompoko, izay nitandrina ny teniko sy nanaraka Ahy tamin’ny fony manontolo mba tsy hanao na inona na inona afa-tsy izay marina eo imasoko ihany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa nanao izay ratsy mihoatra noho izay rehetra talohanao ianao ka lasa nanao andriamanitra hafa sy sarin-javatra voarendrika ka nahatezitra Ahy, ary Izaho narianao teo ivohonao: '
