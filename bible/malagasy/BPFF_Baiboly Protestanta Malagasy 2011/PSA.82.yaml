document_id: PSA.82,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra no miantoka ny fitsarana marina ho an’ny rehetra
  - type: text
    content: Salamo nataon’i Asafa.
  - type: text
    content: Andriamanitra dia eo amin’ny fiangonan’Andriamanitra;
  - type: text
    content: eo amin’ireo andriamanitra no itsarany.
  '2':
  - type: text
    content: Hatramin’ny oviana no mbola hanaovanareo fitsarana tsy marina
  - type: text
    content: 'ka hiangaranareo amin’ny ratsy fanahy? '
  - type: text
    content: Fiatoana.
  '3':
  - type: text
    content: Alaharo ny tenin’ny madinika sy ny kamboty;
  - type: text
    content: omeo rariny ny ory sy ny mahantra,
  '4':
  - type: text
    content: vonjeo ny madinika sy ny mahantra,
  - type: text
    content: sariho amin’ny tanan’ny ratsy fanahy izy.
  '5':
  - type: text
    content: Tsy manam-pahalalana na mahazo an-tsaina ireny;
  - type: text
    content: ao amin’ny maizina no andehanany;
  - type: text
    content: mihorohoro ny fanambanin’ny tany rehetra.
  '6':
  - type: text
    content: 'Hoy aho: Ianareo andriamanitra'
  - type: text
    content: ary zanaky ny Avo Indrindra ianareo rehetra.
  '7':
  - type: text
    content: Kanjo ho faty tahaka ny olombelona ihany ianareo
  - type: text
    content: ary samy ho lavo tahaka ny mpitondra rehetra.
  '8':
  - type: text
    content: Mitsangàna, Andriamanitra ô, tsarao ny tany!
  - type: text
    content: Fa fanananao ny firenena rehetra.
