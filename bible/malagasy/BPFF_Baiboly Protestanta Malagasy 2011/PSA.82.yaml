document_id: PSA.82
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra no miantoka ny fitsarana marina ho an’ny rehetra
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andriamanitra dia eo amin’ny fiangonan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ireo andriamanitra no itsarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hatramin’ny oviana no mbola hanaovanareo fitsarana tsy marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hiangaranareo amin’ny ratsy fanahy? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Alaharo ny tenin’ny madinika sy ny kamboty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: omeo rariny ny ory sy ny mahantra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: vonjeo ny madinika sy ny mahantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sariho amin’ny tanan’ny ratsy fanahy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy manam-pahalalana na mahazo an-tsaina ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny maizina no andehanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihorohoro ny fanambanin’ny tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy aho: Ianareo andriamanitra'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary zanaky ny Avo Indrindra ianareo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanjo ho faty tahaka ny olombelona ihany ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary samy ho lavo tahaka ny mpitondra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitsangàna, Andriamanitra ô, tsarao ny tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fanananao ny firenena rehetra.
