document_id: 2KI.17,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Hosea, mpanjakan’ny Israely; ny nahazoan’ny Asiriana an’i Samaria
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny taona faharoa amby folo nanjakan’i Ahaza, mpanjakan’ny Joda, no nanomboka nanjaka tamin’ny Israely tao Samaria i Hosea, zanak’i Elaha; nanjaka sivy taona izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nanangana tsangambaton-tsampy sy tsangankazon-tsampy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aseraha
    - type: text
      text: ' teny amin’ny vohitra avo rehetra sy teny ambanin’ny hazo maitso rehetra izy, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ary nandoro ditin-kazo manitra teny amin’ny toerana fanaovana sorona rehetra, tahaka ny nataon’ny Jentilisa izay noroahin’NY TOMPO tsy ho eo anoloany, sady nanao zavatra ratsy ka nahatezitra NY TOMPO, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ary nanompo ny sampy izay nandraran’NY TOMPO azy hoe: Aza manao izany zavatra izany ianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nefa ny mpaminany rehetra sy ny mpahita rehetra dia nasain’NY TOMPO nananatra ny Israely sy ny Joda hoe: Mialà amin’ny lalan-dratsinareo, ary tandremo ny lalànako sy ny didiko, araka ny lalàna rehetra izay nandidiako ny razanareo sy izay nanirahako ny mpaminany mpanompoko ho eo aminareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Kanefa tsy nihaino izy fa nanamafy ny hatony, tahaka ny razany izay tsy nino NY TOMPO Andriamaniny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nolaviny ny didiny sy ny fanekeny izay nataony tamin’ny razany mbamin’ny teny vavolombelony izay nananarany azy. Nandeha nanaraka ny zava-poana izy ka tonga zava-poana koa ary nanaraka ny Jentilisa manodidina azy, izay efa nandraran’NY TOMPO mba tsy halainy tahaka. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nahafoy ny didin’NY TOMPO Andriamaniny rehetra izy ka nanao sarin-javatra voarendrika, dia ombilahy kely roa, ary nanao tsangankazon-tsampy ho an’ny Aseraha koa izy sady niankohoka teo anatrehan’izay rehetra eny amin’ny lanitra ary nanompo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nampandeha ny zanany lahy sy ny zanany vavy hamakivaky ny afo izy sady nanao ody sy sikidy ary nivaro-tena hanao izay ratsy teo imason’NY TOMPO ka nahatezitra Azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia tezitra indrindra tamin’ny Israely NY TOMPO ka noesoriny tsy ho eo imasony izy ary tsy nisy tavela afa-tsy ny fokon’i Joda ihany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Na ny Joda koa aza dia tsy mba nitandrina ny didin’NY TOMPO Andriamaniny fa nandeha araka izay rehetra nataon’ny Israely koa. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nanao izay ratsy teo imason’NY TOMPO izy, nefa tsy dia tahaka ny nataon’ireo mpanjakan’ny Israely teo alohany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia narian’NY TOMPO ny taranak’Israely rehetra ka nampahoriny sy natolony ho eo an-tanan’ny mpamabo azy mandra-panaisony azy tsy ho eo imasony. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa nendahany niala tamin’ny taranak’i Davida ny Israely; ary ny olona no nampanjaka an’i Jeroboama, zanak’i Nebata, nefa i Jeroboama dia nampiala ny Israely tsy hanaraka NY TOMPO ka nampanao fahotana be azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Koa nandeha tamin’ny fahotana rehetra nataon’i Jeroboama ny Zanak’Israely fa tsy niala tamin’izany, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: hany ka noesorin’NY TOMPO tsy ho eo anatrehany ny Israely, araka izay nampilazainy ny mpaminany mpanompony rehetra. Dia lasan-ko babo niala tamin’ny taniny ho any Asiria ny Israely ary mbola any mandraka androany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Samaritana
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ny mpanjakan’i Asiria dia nitondra olona avy tany Babilona, Kota, Ava, Hamata ary Sefarvaima ka namponina azy teny amin’ny tanànan’i Samaria hisolo ny Zanak’Israely. Dia nandray an’i Samaria ho fananany ireny ka nitoetra teny amin’ny tanànany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Rehefa nanomboka nonina tao izy ireny dia tsy natahotra NY TOMPO, ary NY TOMPO kosa nampandeha liona hamely azy ka nahafaty maro taminy ireny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia hoy ny olona tamin’ny mpanjakan’i Asiria: Ny firenena izay nafindranao sy namponeninao eny amin’ny tanànan’i Samaria dia tsy mahalala izay tokony hatao amin’ny Andriamanitry ny tany any, koa dia nampandeha liona hamely azy Izy; ary indro, nahafaty olona maro ireny noho ny tsy fahalalany ny fomba fanajana ny Andriamanitry ny tany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary nandidy azy ny mpanjakan’i Asiria hoe: Iraho ho any ny iray amin’ireo mpisorona izay noentinareo ho babo avy tany; aoka izy handeha ka hitoetra any, ary aoka izy hampianatra azy ireo izay tokony hatao amin’ny Andriamanitry ny tany any. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Dia tonga ny mpisorona iray avy tamin’izay noentiny ho babo avy tany Samaria ka nonina tao Betela dia nampianatra azy izay fahatahorana NY TOMPO.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Kanefa ny isam-pirenena dia mbola samy nanao ny andriamaniny avy ka nametraka azy tany amin’ny trano teny amin’ny toerana fanaovana sorona izay nataon’ny mponina tao Samaria, eny, ny isam-pirenena dia samy nanao andriamanitra tao amin’ny tanàna nitoerany avy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Niakatra hanafika azy i Salmanesera, mpanjakan’i Asiria, ka tonga mpanompony nandoa hetra ho azy i Hosea. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Koa ny olona avy any Babilona dia nanao an’i Sokota-Benota; ny olona avy any Kota dia nanao an’i Nergala; ny olona avy any Hamata nanao an’i Asima; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ny Avita nanao an’i Nibaza sy i Tartaka; ny Sefarvita dia nandoro ny zanany tamin’ny afo ho an’i Adrameleka sy i Anameleka, andriamanitr’i Sefarvaima. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Koa satria natahotra NY TOMPO koa ny olona dia nanendry olona avy tao anaty vahoaka ho mpisorona tamin’ireo toerana fanaovana sorona izy, ary ireny no nisolo ny vahoaka nanolotra fanatitra tany amin’ny trano teny amin’ny toerana fanaovana sorona. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: NY TOMPO dia natahorany ihany, kanefa mbola nanompo ny andriamaniny avy koa izy araka ny fanaon’ny firenena izay nanalana azy avy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Mandraka androany dia mbola manao ny fanaony teo ihany izy: Tsy dia matahotra NY TOMPO, ary tsy dia manao ny fomban-drazany, na araka ny lalàna sy ny didy izay nandidian’NY TOMPO ny taranak’i Jakoba izay nantsoiny hoe Israely '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'sady nanaovany fanekena sy nomeny didy hoe: Aza matahotra izay andriamanitra hafa, na miankohoka eo anatrehany, na manompo azy, na mamono zavatra ho fanatitra ho azy; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'fa NY TOMPO, izay nitondra anareo nivoaka avy tany amin’ny tany Ejipta tamin’ny hery lehibe sy ny sandry natsotra, dia aoka Izy ihany no hatahoranareo, ary ho eo anatrehany no hiankohofanareo, ary ho Azy no hamonoanareo zavatra ho fanatitra; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'fa ny didy sy ny fitsipika sy ny lalàna ary ny teny izay nosoratany ho anareo no aoka hotandremanareo hatao mandrakariva; aza matahotra izay andriamanitra hafa; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'ary ny fanekena izay nataoko taminareo dia aza hadinoinareo; ary aza matahotra izay andriamanitra hafa ianareo; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'fa NY TOMPO Andriamanitrareo no aoka hatahoranareo; dia Izy no hamonjy anareo amin’ny tanan’ny fahavalonareo rehetra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny mpanjakan’i Asiria dia nahita fa nanao tetika fikomiana i Hosea, satria nandefa iraka tany amin’i So, mpanjakan’i Ejipta, izy, sady tsy nampiakatra ny hetra ho an’ny mpanjakan’i Asiria tahaka ny fanaony isan-taona intsony. Koa nanidy azy sy namatotra azy tao an-tranomaizina ny mpanjakan’i Asiria. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Nefa tsy nety nihaino izy fa nanao tahaka ny fanaony taloha ihany.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Koa natahotra NY TOMPO ihany ireo firenena ireo, kanefa nanompo ny sarin-javatra voasokitra izy hatramin’ny zanany sy ny zafiny koa aza; tahaka ny fanaon’ny razany ihany no nataon’ireny mandraka androany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Avy eo dia niakatra izy ka nanenika ny tany; niakatra tany Samaria izy ka nanao fahirano azy nandritra ny telo taona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tamin’ny taona fahasivy nanjakan’i Hosea no nahazoan’ny mpanjakan’i Asiria an’i Samaria, dia nalefany ho babo tany Asiria ny Israely ka namponeniny tao Hala sy teo amoron’i Habora na ny onin’i Gozana, ary teny amin’ny tanànan’ny Mediana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahatonga ny faharavan’ny fanjakana Israely
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny nahatongavan’izany dia noho ny nanotan’ny Zanak’Israely tamin’NY TOMPO Andriamaniny izay nitondra azy nivoaka avy tany amin’ny tany Ejipta ka nanafaka azy tamin’ny tanan’ny farao, mpanjakan’i Ejipta, satria natahotra izay andriamanitra hafa izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nandeha araka ny fanaon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' izay noroahin’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely izy, sy araka izay nataon’ireo mpanjakan’ny Israely. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa ny Zanak’Israely dia nanao zavatra miafina izay tsy tokony hatao, izay nanoherany NY TOMPO Andriamaniny. Nanorina toerana fanaovana sorona teny amin’ny tanànany rehetra izy, hatreny amin’ny tilikambo fitilian’ny mpiambina ka hatreny amin’ny tanàna mimanda. '
