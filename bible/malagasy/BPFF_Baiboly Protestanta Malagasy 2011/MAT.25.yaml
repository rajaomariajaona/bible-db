document_id: MAT.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny virijiny folo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary amin’izany ny fanjakan’ny lanitra dia ho tahaka ny virijiny folo izay nitondra ny fanalany ka niainga mba hitsena ny mpampakatra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny dimy tamin’ireo dia adala fa ny dimy kosa dia hendry. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa nandray ny fanalany ny adala nefa tsy nitondra solika fiandry; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary ny hendry kosa dia nitondra solika tao anatin’ny fitondrana azy sy ny fanalany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha naharitra ela ny mpampakatra dia samy rendremana izy rehetra ka natory. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nefa nony misasakalina dia nisy antso hoe: Iny ny mpampakatra! Mitsangàna mba hitsena azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nitsangana ireo virijiny rehetra ireo ka samy nanamboatra ny fanalany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy ny adala tamin’ny hendry: Mba omeo kely amin’ny solikareo izahay; fa efa ho faty ny fanalanay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa namaly azy ireo ny hendry hoe: Tsia, tsy ampy ho anay sy ho anareo ny anay, fa mandehana mankany amin’ny mpivarotra ka mividiana ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nefa raha mbola lasa nividy izy ireo dia tonga ny mpampakatra, ary izay efa vonona dia niara-niditra taminy tao amin’ny fampakaram-bady dia narindrina ny varavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Taorianan’izany vao tonga kosa ireo virijiny sisa ka niteny hoe: Tompoko, tompoko, vohay izahay! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hoy izy hoe: Lazaiko aminareo marina tokoa: Tsy fantatro ianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa amin’izany miambena ianareo, fa tsy fantatrareo na ny andro na ny ora.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny talenta
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 19.12-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny fanjakan’ny lanitra dia tahaka ny olona iray izay handeha ho any an-tany lavitra ka niantso ny mpanompony dia nanolotra azy ireo ny fananany: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa ny iray dia nomeny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' dimy, ny iray dia talenta roa ary ny iray dia talenta iray, samy araka izay fahaiza-manaony avy; dia lasa nandeha izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Avy hatrany dia lasa ilay nandray ny talenta dimy ka nampiasa izany; ary nahazo tombony talenta dimy hafa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Toy izany koa, ilay nandray ny talenta roa dia nahazo tombony roa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ilay nandray ny talenta iray kosa dia lasa nihady tany ka nanafina ny volan’ny tompony tao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nony ela dia tonga ny tompon’ireo mpanompo ireo ary nampamoaka azy ireo ny amin’ny volany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nony nanatona ilay nandray ny talenta dimy dia nitondra talenta dimy hafa koa ka niteny hoe: Tompoko, talenta dimy no natolotrao ahy; indro, nahazo tombony talenta dimy hafa aho. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy ny tompony taminy: Tsara izany, ry mpanompo tsara sady mahatoky; nahatoky tamin’ny kely ianao ka hotendreko ho mpanapaka ny be; midira amin’ny fifalian’ny tomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nanatona koa ilay nandray ny talenta roa dia niteny hoe: Tompoko, talenta roa no natolotrao ahy; indro, nahazo tombony talenta roa hafa aho. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hoy ny tompony taminy: Tsara izany, ry mpanompo tsara sady mahatoky; nahatoky tamin’ny kely ianao ka hotendreko ho mpanapaka ny be; midira amin’ny fifalian’ny tomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa nony nanatona kosa ilay nandray ny talenta iray dia nilaza hoe: Tompoko, fantatro fa olona mila voa tsy ary ianao ka mijinja eny amin’izay tsy namafazanao sady manangona eny amin’izay tsy nanelezanao; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'dia natahotra aho ka lasa nanafina ny talentanao tao anaty tany; indro, lasanao ny anao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny tompony dia namaly azy hoe: Ry mpanompo ratsy sady malaina, efa fantatrao fa mijinja eny amin’izay tsy namafazako aho ary manangona eny amin’izay tsy nanelezako; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'koa tokony ho nametraka ny volako tany amin’ny mpampisambo-bola ianao, koa rehefa tonga aho dia ho nandray ny ahy miaraka amin’ny zana-bola. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa alao eny aminy ny talenta dia omeo ilay manana ny talenta folo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa izay rehetra manana dia homena ka hanam-be; ary izay tsy manana kosa, na dia izay ananany aza dia halaina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary ario ho any amin’ny maizina any ivelany ny mpanompo tsy mahasoa; any no hisy ny fitomaniana sy ny fikitroha-nify.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsarana farany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary raha tonga amin’ny voninahiny ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ', miaraka amin’ny anjely rehetra, dia hipetraka eo ambonin’ny sezafiandrianan’ny voninahiny Izy; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ary hovoriana eo anatrehany ny firenena rehetra dia hanavaka azy ireo Izy, tahaka ny mpiandry ondry manavaka ny ondry amin’ny osy; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'koa hametraka ny ondry eo amin’ny ankavanany Izy fa ny osy kosa dia eo amin’ny ankaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Amin’izay ny Mpanjaka dia hilaza amin’izay eo amin’ny ankavanany hoe: Avia ianareo izay notahin’ny Raiko, mandovà ny fanjakana izay voaomana ho anareo hatrizay nanorenana izao tontolo izao; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'fa noana Aho dia nomenareo hanina; nangetaheta Aho dia nampisotroinareo; nivahiny Aho dia nampiantranoinareo; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'tsy nanan-kitafy Aho dia nampiakanjoinareo; narary Aho dia notsaboinareo; tao an-tranomaizina Aho dia novangianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary hamaly Azy ny marina ka hiteny hoe: Tompoko, oviana no hitanay noana Ianao ka nomenay hanina, na nangetaheta ka nampisotroinay? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary oviana no hitanay nivahiny Ianao ka nampiantranoinay, na tsy nanan-kitafy ka nampiakanjoinay? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Oviana koa no hitanay narary Ianao, na tao an-tranomaizina ka novangianay? '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia hamaly ny Mpanjaka ka hiteny aminy hoe: Lazaiko aminareo marina tokoa: Araka izay efa nataonareo tamin’ny iray amin’ireto rahalahiko kely indrindra ireto no nataonareo Tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hilaza indray amin’izay eo amin’ny ankaviany kosa Izy hoe: Mialà amiko, ianareo izay voaozona ho any amin’ny afo maharitra mandrakizay izay voavoatra ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' sy ny anjeliny; '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'fa noana Aho nefa tsy mba nomenareo hanina; nangetaheta Aho nefa tsy mba nampisotroinareo; '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'nivahiny Aho nefa tsy mba nampiantranoinareo; tsy nitafy Aho nefa tsy mba nampiakanjoinareo; narary sy tao an-tranomaizina Aho nefa tsy mba novangianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary hamaly kosa ireo hoe: Tompoko, oviana no hitanay noana Ianao, na nangetaheta, na nivahiny, na tsy nitafy, na narary, na tao an-tranomaizina, ka tsy mba nanompo Anao izahay? '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa Izy hamaly azy ireo hoe: Lazaiko aminareo marina tokoa: Araka izay tsy nataonareo tamin’ny iray amin’ireto kely indrindra ireto no tsy mba nataonareo Tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ary ireo dia hiala ho any amin’ny fampijaliana mandrakizay; fa ny marina dia ho any amin’ny fiainana mandrakizay.
