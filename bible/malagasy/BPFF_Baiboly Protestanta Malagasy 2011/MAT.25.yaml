document_id: MAT.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ny virijiny folo
  - type: text
    content: 'Ary amin’izany ny fanjakan’ny lanitra dia ho tahaka ny virijiny folo izay nitondra ny fanalany ka niainga mba hitsena ny mpampakatra. '
  '10':
  - type: text
    content: 'Nefa raha mbola lasa nividy izy ireo dia tonga ny mpampakatra, ary izay efa vonona dia niara-niditra taminy tao amin’ny fampakaram-bady dia narindrina ny varavarana. '
  '11':
  - type: text
    content: 'Taorianan’izany vao tonga kosa ireo virijiny sisa ka niteny hoe: Tompoko, tompoko, vohay izahay! '
  '12':
  - type: text
    content: 'Fa hoy izy hoe: Lazaiko aminareo marina tokoa: Tsy fantatro ianareo.'
  '13':
  - type: text
    content: Koa amin’izany miambena ianareo, fa tsy fantatrareo na ny andro na ny ora.
  - type: heading
    content: Fanoharana ny amin’ny talenta
  - type: heading
    content: Lio 19.12-27
  '14':
  - type: text
    content: 'Fa ny fanjakan’ny lanitra dia tahaka ny olona iray izay handeha ho any an-tany lavitra ka niantso ny mpanompony dia nanolotra azy ireo ny fananany: '
  '15':
  - type: text
    content: 'Koa ny iray dia nomeny '
  - type: text
    content: talenta
  - type: text
    content: ' dimy, ny iray dia talenta roa ary ny iray dia talenta iray, samy araka izay fahaiza-manaony avy; dia lasa nandeha izy. '
  '16':
  - type: text
    content: 'Avy hatrany dia lasa ilay nandray ny talenta dimy ka nampiasa izany; ary nahazo tombony talenta dimy hafa izy. '
  '17':
  - type: text
    content: 'Toy izany koa, ilay nandray ny talenta roa dia nahazo tombony roa. '
  '18':
  - type: text
    content: 'Fa ilay nandray ny talenta iray kosa dia lasa nihady tany ka nanafina ny volan’ny tompony tao. '
  '19':
  - type: text
    content: 'Nony ela dia tonga ny tompon’ireo mpanompo ireo ary nampamoaka azy ireo ny amin’ny volany. '
  '2':
  - type: text
    content: 'Ny dimy tamin’ireo dia adala fa ny dimy kosa dia hendry. '
  '20':
  - type: text
    content: 'Nony nanatona ilay nandray ny talenta dimy dia nitondra talenta dimy hafa koa ka niteny hoe: Tompoko, talenta dimy no natolotrao ahy; indro, nahazo tombony talenta dimy hafa aho. '
  '21':
  - type: text
    content: 'Hoy ny tompony taminy: Tsara izany, ry mpanompo tsara sady mahatoky; nahatoky tamin’ny kely ianao ka hotendreko ho mpanapaka ny be; midira amin’ny fifalian’ny tomponao. '
  '22':
  - type: text
    content: 'Nanatona koa ilay nandray ny talenta roa dia niteny hoe: Tompoko, talenta roa no natolotrao ahy; indro, nahazo tombony talenta roa hafa aho. '
  '23':
  - type: text
    content: 'Hoy ny tompony taminy: Tsara izany, ry mpanompo tsara sady mahatoky; nahatoky tamin’ny kely ianao ka hotendreko ho mpanapaka ny be; midira amin’ny fifalian’ny tomponao. '
  '24':
  - type: text
    content: 'Fa nony nanatona kosa ilay nandray ny talenta iray dia nilaza hoe: Tompoko, fantatro fa olona mila voa tsy ary ianao ka mijinja eny amin’izay tsy namafazanao sady manangona eny amin’izay tsy nanelezanao; '
  '25':
  - type: text
    content: 'dia natahotra aho ka lasa nanafina ny talentanao tao anaty tany; indro, lasanao ny anao. '
  '26':
  - type: text
    content: 'Ary ny tompony dia namaly azy hoe: Ry mpanompo ratsy sady malaina, efa fantatrao fa mijinja eny amin’izay tsy namafazako aho ary manangona eny amin’izay tsy nanelezako; '
  '27':
  - type: text
    content: 'koa tokony ho nametraka ny volako tany amin’ny mpampisambo-bola ianao, koa rehefa tonga aho dia ho nandray ny ahy miaraka amin’ny zana-bola. '
  '28':
  - type: text
    content: 'Koa alao eny aminy ny talenta dia omeo ilay manana ny talenta folo. '
  '29':
  - type: text
    content: 'Fa izay rehetra manana dia homena ka hanam-be; ary izay tsy manana kosa, na dia izay ananany aza dia halaina aminy. '
  '3':
  - type: text
    content: 'Fa nandray ny fanalany ny adala nefa tsy nitondra solika fiandry; '
  '30':
  - type: text
    content: Ary ario ho any amin’ny maizina any ivelany ny mpanompo tsy mahasoa; any no hisy ny fitomaniana sy ny fikitroha-nify.
  - type: heading
    content: Ny fitsarana farany
  '31':
  - type: text
    content: 'Ary raha tonga amin’ny voninahiny ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ', miaraka amin’ny anjely rehetra, dia hipetraka eo ambonin’ny sezafiandrianan’ny voninahiny Izy; '
  '32':
  - type: text
    content: 'ary hovoriana eo anatrehany ny firenena rehetra dia hanavaka azy ireo Izy, tahaka ny mpiandry ondry manavaka ny ondry amin’ny osy; '
  '33':
  - type: text
    content: 'koa hametraka ny ondry eo amin’ny ankavanany Izy fa ny osy kosa dia eo amin’ny ankaviany. '
  '34':
  - type: text
    content: 'Amin’izay ny Mpanjaka dia hilaza amin’izay eo amin’ny ankavanany hoe: Avia ianareo izay notahin’ny Raiko, mandovà ny fanjakana izay voaomana ho anareo hatrizay nanorenana izao tontolo izao; '
  '35':
  - type: text
    content: 'fa noana Aho dia nomenareo hanina; nangetaheta Aho dia nampisotroinareo; nivahiny Aho dia nampiantranoinareo; '
  '36':
  - type: text
    content: 'tsy nanan-kitafy Aho dia nampiakanjoinareo; narary Aho dia notsaboinareo; tao an-tranomaizina Aho dia novangianareo. '
  '37':
  - type: text
    content: 'Ary hamaly Azy ny marina ka hiteny hoe: Tompoko, oviana no hitanay noana Ianao ka nomenay hanina, na nangetaheta ka nampisotroinay? '
  '38':
  - type: text
    content: 'Ary oviana no hitanay nivahiny Ianao ka nampiantranoinay, na tsy nanan-kitafy ka nampiakanjoinay? '
  '39':
  - type: text
    content: 'Oviana koa no hitanay narary Ianao, na tao an-tranomaizina ka novangianay? '
  '4':
  - type: text
    content: 'ary ny hendry kosa dia nitondra solika tao anatin’ny fitondrana azy sy ny fanalany. '
  '40':
  - type: text
    content: 'Dia hamaly ny Mpanjaka ka hiteny aminy hoe: Lazaiko aminareo marina tokoa: Araka izay efa nataonareo tamin’ny iray amin’ireto rahalahiko kely indrindra ireto no nataonareo Tamiko. '
  '41':
  - type: text
    content: 'Hilaza indray amin’izay eo amin’ny ankaviany kosa Izy hoe: Mialà amiko, ianareo izay voaozona ho any amin’ny afo maharitra mandrakizay izay voavoatra ho an’ny '
  - type: text
    content: devoly
  - type: text
    content: ' sy ny anjeliny; '
  '42':
  - type: text
    content: 'fa noana Aho nefa tsy mba nomenareo hanina; nangetaheta Aho nefa tsy mba nampisotroinareo; '
  '43':
  - type: text
    content: 'nivahiny Aho nefa tsy mba nampiantranoinareo; tsy nitafy Aho nefa tsy mba nampiakanjoinareo; narary sy tao an-tranomaizina Aho nefa tsy mba novangianareo. '
  '44':
  - type: text
    content: 'Ary hamaly kosa ireo hoe: Tompoko, oviana no hitanay noana Ianao, na nangetaheta, na nivahiny, na tsy nitafy, na narary, na tao an-tranomaizina, ka tsy mba nanompo Anao izahay? '
  '45':
  - type: text
    content: 'Fa Izy hamaly azy ireo hoe: Lazaiko aminareo marina tokoa: Araka izay tsy nataonareo tamin’ny iray amin’ireto kely indrindra ireto no tsy mba nataonareo Tamiko. '
  '46':
  - type: text
    content: Ary ireo dia hiala ho any amin’ny fampijaliana mandrakizay; fa ny marina dia ho any amin’ny fiainana mandrakizay.
  '5':
  - type: text
    content: 'Ary raha naharitra ela ny mpampakatra dia samy rendremana izy rehetra ka natory. '
  '6':
  - type: text
    content: 'Nefa nony misasakalina dia nisy antso hoe: Iny ny mpampakatra! Mitsangàna mba hitsena azy. '
  '7':
  - type: text
    content: 'Dia nitsangana ireo virijiny rehetra ireo ka samy nanamboatra ny fanalany. '
  '8':
  - type: text
    content: 'Dia hoy ny adala tamin’ny hendry: Mba omeo kely amin’ny solikareo izahay; fa efa ho faty ny fanalanay. '
  '9':
  - type: text
    content: 'Fa namaly azy ireo ny hendry hoe: Tsia, tsy ampy ho anay sy ho anareo ny anay, fa mandehana mankany amin’ny mpivarotra ka mividiana ho anareo. '
