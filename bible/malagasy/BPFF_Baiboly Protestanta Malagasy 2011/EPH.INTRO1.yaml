document_id: EPH.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Nosoratan’i Paoly fony izy tany an-tranomaizina tany Roma, tahaka ny epistily ho an’ny Filipiana, Kolosiana ary Filemona ity epistily ity. Tsy mahagaga raha be itovizany amin’ny Kolosiana ny zavatra sasany voambara ato.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Nipetraka naharitra tao Efesosy i Paoly araka ny voalazan’ny Asa 18, 19, 20, kanefa toa tsy fantany mivantana akory ireto olona anoratany ireto.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny sora-tanana sasany nandikana ity epistily ity koa anefa dia tsy ahitana ny anarana hoe Efesosy. Koa izany no hiheverana fa ity epistily ity angamba ilay epistily natao hovakin’ny olona mifandimby, izay voalaza ao amin’ny Kol 4.16 ho an’ny Laodikiana.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Epistily
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ny fikasan’Andriamanitra hanangona indray ny zavatra rehetra ho iray ao amin’i Kristy, na ny any an-danitra na ny etỳ an-tany, no votoatin’ny Epistily. Ny fahasoavan’Andriamanitra no antony. Zava-dehibe manerana ny Epistily manontolo io firaisana io: Ny Fiangonana dia sady vahoakan’Andriamanitra no tenan’i Kristy izay Lohany. Ny fampihavanana ny Jiosy sy ny Jentilisa dia tanteraka noho ny hazofijaliana ka manjary ankohonan’Andriamanitra sy fonenan’Andriamanitra amin’ny Fanahy ary olom-baovao ao amin’i Kristy ny olona izay mino. Ny fifandraisan’ny lehilahy sy ny vehivavy ao amin’ny fanambadiana dia oharina amin’ny fifandraisan’i Kristy sy ny Fiangonana. Ny fifanajan’ny ray aman-dreny sy ny zanaka, ny tompo sy ny mpanompo, dia samy fehezin’ny maha olom-baovao ao amin’i Kristy avokoa.'
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Epistily
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fizarana voalohany: Ny fikasan’Andriamanitra momba ny firaisana ao amin’i Kristy: toko 1–3'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny firaisan’ny zavaboahary ao amin’i Kristy: 1.3-23'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fiainana ao amin’i Kristy: 2.1-10'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fampihavanana ny Jiosy sy ny Jentilisa: 2.11-22'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny andraikitr’i Paoly amin’ny fitoriana ny Filazantsara: 3.1-13'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Vavaka mba hahafantarana ny fitiavan’Andriamanitra: 3.14-21'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fizarana faharoa: Ny fiainana sy fiombonan’ny olom-baovao asehony eo amin’ny fifandraisany: toko 4–6'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny firaisana ho vatana iray ao amin’i Kristy: 4.1-16'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fiainana kristiana andavanandro: 4.17–5.21'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fifandraisan’ny lehilahy sy vehivavy eo amin’ny fanambadiana, ny ray aman-dreny sy ny zanaka ary ny tompo sy ny mpanompo: 5.22–6.9'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fiadian’Andriamanitra: 6.10-20'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Fanaovam-beloma: 6.21-24'
