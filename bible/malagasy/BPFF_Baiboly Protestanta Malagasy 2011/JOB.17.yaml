document_id: JOB.17,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny navalin’i Joba (tohiny): Tsy manana fanantenana intsony aho'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa ho ritra ny aiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa mitsilopilopy ny androko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa miandry ahy ny fasana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo rehetra ireo, avia! Miverena e!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahita olon-kendry eo aminareo aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihelina ny androko, voaongotra ny fikasako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay hevitra nofikirin’ny foko indrindra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny alina dia ataon’ireny ho antoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mazava dia ho efa akaiky, nefa tamy ihany ny maizina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha mbola misy antenaiko dia ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' fonenako ihany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny maizina no hamelarako ny fandrianako.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny fasana no nantsoiko hoe: Ianao ho raiko!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny kankana: Ianao no reniko sy anabaviko!'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aiza ary ny fanantenako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no mahita azy?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midina any amin’ny vavahadin’ny fitoeran’ny maty izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha miara-mahita fitsaharana ao amin’ny vovoka izahay.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mpaneso avokoa no manodidina ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mamela ahy hahita torimaso ny filany ady amiko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miangavy anao aho, aoka ny tenanao ihany no hiantoka ahy aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa iza moa no hanaiky hiantoka ahy?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fon’ireto dia voahidinao tsy hidiran’ny fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa izany no tsy hanandratanao azy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny lehilahy manasa ny sakaizany hizara fananana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa pahina ny mason’ny zanany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa nanao ahy ho ambentinteny amin’ny firenena Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tavako ho fandrora.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa pahina ny masoko noho ny alahelo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa toy ny aloka ny rantsambatako rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankona noho izany ny olona mahitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tsy manan-tsiny dia mihendratra mahita ny mpihatsaravelatsihy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny marina dia mifikitra tsara amin’ny alehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay madio tanana no hitombo hery.
