document_id: JOB.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny teny navalin’i Joba (tohiny): Tsy manana fanantenana intsony aho'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Efa ho ritra ny aiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa mitsilopilopy ny androko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa miandry ahy ny fasana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eny, mpaneso avokoa no manodidina ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mamela ahy hahita torimaso ny filany ady amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Miangavy anao aho, aoka ny tenanao ihany no hiantoka ahy aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza moa no hanaiky hiantoka ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ny fon’ireto dia voahidinao tsy hidiran’ny fahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa izany no tsy hanandratanao azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy ny lehilahy manasa ny sakaizany hizara fananana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa pahina ny mason’ny zanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary efa nanao ahy ho ambentinteny amin’ny firenena Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tavako ho fandrora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Efa pahina ny masoko noho ny alahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa toy ny aloka ny rantsambatako rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ankona noho izany ny olona mahitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tsy manan-tsiny dia mihendratra mahita ny mpihatsaravelatsihy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny marina dia mifikitra tsara amin’ny alehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay madio tanana no hitombo hery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ianareo rehetra ireo, avia! Miverena e!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mahita olon-kendry eo aminareo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mihelina ny androko, voaongotra ny fikasako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay hevitra nofikirin’ny foko indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny alina dia ataon’ireny ho antoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mazava dia ho efa akaiky, nefa tamy ihany ny maizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha mbola misy antenaiko dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' fonenako ihany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny maizina no hamelarako ny fandrianako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny fasana no nantsoiko hoe: Ianao ho raiko!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary ny kankana: Ianao no reniko sy anabaviko!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa aiza ary ny fanantenako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no mahita azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Midina any amin’ny vavahadin’ny fitoeran’ny maty izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha miara-mahita fitsaharana ao amin’ny vovoka izahay.
