document_id: JOB.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba (tohiny): Tsy manana fanantenana intsony aho'
  - type: text
    content: Efa ho ritra ny aiko,
  - type: text
    content: efa mitsilopilopy ny androko,
  - type: text
    content: efa miandry ahy ny fasana.
  '10':
  - type: text
    content: Ianareo rehetra ireo, avia! Miverena e!
  - type: text
    content: Tsy mahita olon-kendry eo aminareo aho.
  '11':
  - type: text
    content: Mihelina ny androko, voaongotra ny fikasako,
  - type: text
    content: dia izay hevitra nofikirin’ny foko indrindra.
  '12':
  - type: text
    content: Ny alina dia ataon’ireny ho antoandro
  - type: text
    content: ary ny mazava dia ho efa akaiky, nefa tamy ihany ny maizina.
  '13':
  - type: text
    content: 'Raha mbola misy antenaiko dia ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' fonenako ihany;'
  - type: text
    content: ao amin’ny maizina no hamelarako ny fandrianako.
  '14':
  - type: text
    content: 'Ny fasana no nantsoiko hoe: Ianao ho raiko!'
  - type: text
    content: 'Ary ny kankana: Ianao no reniko sy anabaviko!'
  '15':
  - type: text
    content: Fa aiza ary ny fanantenako?
  - type: text
    content: Ary iza no mahita azy?
  '16':
  - type: text
    content: Midina any amin’ny vavahadin’ny fitoeran’ny maty izany
  - type: text
    content: raha miara-mahita fitsaharana ao amin’ny vovoka izahay.
  '2':
  - type: text
    content: Eny, mpaneso avokoa no manodidina ahy
  - type: text
    content: ary tsy mamela ahy hahita torimaso ny filany ady amiko.
  '3':
  - type: text
    content: Miangavy anao aho, aoka ny tenanao ihany no hiantoka ahy aminao;
  - type: text
    content: fa iza moa no hanaiky hiantoka ahy?
  '4':
  - type: text
    content: Fa ny fon’ireto dia voahidinao tsy hidiran’ny fahalalana;
  - type: text
    content: koa izany no tsy hanandratanao azy.
  '5':
  - type: text
    content: Toy ny lehilahy manasa ny sakaizany hizara fananana izy
  - type: text
    content: nefa pahina ny mason’ny zanany.
  '6':
  - type: text
    content: Ary efa nanao ahy ho ambentinteny amin’ny firenena Izy
  - type: text
    content: ary ny tavako ho fandrora.
  '7':
  - type: text
    content: Efa pahina ny masoko noho ny alahelo;
  - type: text
    content: efa toy ny aloka ny rantsambatako rehetra.
  '8':
  - type: text
    content: Ankona noho izany ny olona mahitsy
  - type: text
    content: ary ny tsy manan-tsiny dia mihendratra mahita ny mpihatsaravelatsihy.
  '9':
  - type: text
    content: Fa ny marina dia mifikitra tsara amin’ny alehany
  - type: text
    content: ary izay madio tanana no hitombo hery.
