document_id: NUM.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny Nazirita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Mosesy: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Raha misy lehilahy na vehivavy mivoady hitokana ho Nazirita mba hitokana ho an’NY TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia hifady divay sy toaka izy; tsy hisotro divay efa maharikivy, na toaka efa maharikivy izy, ary tsy hisotro ranom-boaloboka izy, na hihinana voaloboka akory, na lena, na maina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Amin’ny andro fitokanany rehetra dia tsy hihinana izay rehetra natao tamin’ny voaloboka izy, manomboka amin’ny voany ka hatramin’ny hodiny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Amin’ny andro rehetra izay nivoadiany hitokana dia tsy hokasihin-kareza ny lohany; mandra-pahatapitry ny andro izay nitokanany ho an’NY TOMPO dia ho masina izy ka havelany haniry ny volon-dohany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amin’ny andro rehetra izay itokanany ho an’NY TOMPO koa dia tsy hiditra am-paty izy; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'aoka tsy handoto tena izy na dia amin’ny rainy, na ny reniny, na ny rahalahiny, na ny anabaviny aza, raha maty ireo, satria eo amin’ny lohany ny fitokanana ho an’Andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Amin’ny andro fitokanany rehetra dia ho masina ho an’NY TOMPO izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha misy olona maty tampoka eo anilany ka mandoto ny lohany izay voatokana, dia hanaratra ny lohany amin’ny andro fanadiovana azy izy; amin’ny andro fahafito no hanaratany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Amin’ny andro fahavalo dia hitondra domohina roa na voromailala roa ho eo amin’ny mpisorona, eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny mpisorona dia hanolotra ny iray ho fanatitra fanadiovana ary ny iray kosa dia ho fanatitra dorana manontolo, dia hanao fanavotana ho azy, satria nanota noho ny amin’ny faty izy; ary hanamasina ny lohany izy amin’izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia hanokana ho an’NY TOMPO ny andro fitokanany izy ka hitondra ondrilahy iray izay iray taona, ho fanati-panonerana; fa ho very ireo andro teo aloha, satria voaloto ny fitokanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary izao no lalàna ny amin’ny Nazirita: Rehefa tapitra ny andro fitokanany dia hoentina ho eo anoloan’ny varavaran’ny tranolay fihaonana izy; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary hanolotra ny fanatiny ho an’NY TOMPO izy, dia ondrilahy iray izay feno iray taona sady tsy misy kilema, ho fanatitra dorana manontolo, ondrivavy iray izay iray taona sady tsy misy kilema, hatao fanatitra noho ny ota, ondrilahy iray tsy misy kilema, ho fanati-pihavanana, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary mofo tsy misy masirasira iray harona, mofo atao amin’ny koba tsara toto voaharo diloilo, mofo manify tsy misy masirasira sady voahosotra diloilo, mbamin’ny fanatitra avy amin’ny zavamaniry sy ny fanatitra aidina ampombaina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia haterin’ny mpisorona eo anatrehan’NY TOMPO ireo; hateriny koa ny fanatiny noho ny ota sy ny fanatiny dorana manontolo; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia hateriny ny ondrilahy ho fanati-pihavanana ho an’NY TOMPO; hoentiny koa ny mofo tsy misy masirasira iray harona; ary haterin’ny mpisorona koa ny fanatitra avy amin’ny zavamaniry izay noentiny sy ny fanatiny aidina. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny Nazirita dia hanaratra ny lohany izay voatokana eo anoloan’ny varavaran’ny tranolay fihaonana, ary horaisiny ny volon-dohany izay voatokana ka hataony eo amin’ny afo izay eo ambanin’ny fanati-pihavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Halain’ny mpisorona ny sorok’ondrilahy izay efa masaka sy ny mofo iray tsy misy masirasira avy ao an-karona ary mofo manify iray tsy misy masirasira ka hatolony eo an-tanan’ny Nazirita, rehefa voaharatra ny lohany izay voatokana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia hataon’ny mpisorona fanatitra asandratra eo anatrehan’NY TOMPO ireo; masina ho an’ny mpisorona izany, ho fanampin’ny tratrany nasandratra sy ny feny nalaina avy amin’ny fanatitra; aorianan’izany kosa dia mahazo misotro divay ny Nazirita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izany no lalàna ny amin’ny Nazirita izay mivoady hitondra fanatitra ho an’NY TOMPO noho ny fitokanany, afa-tsy izay zavatra hafa tratry ny ananany; araka ny voady izay nivoadiany no hataony, araka ny lalàna ny amin’ny fitokanany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tsodrano fanaon’ny mpisorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mitenena amin’i Arona sy ireo zanany hoe: Izao no teny hoentinareo mitsodrano ny Zanak’Israely:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hitahy anao anie NY TOMPO ka hiaro anao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: hampamirapiratra ny tavany aminao anie NY TOMPO ka hamindra fo aminao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: hanandratra ny tavany aminao anie NY TOMPO ka hanome anao fiadanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia hametraka ny anarako amin’ny Zanak’Israely izy ireo ary Izaho hitahy azy.
