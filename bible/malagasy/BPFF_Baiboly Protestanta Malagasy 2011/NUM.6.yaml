document_id: NUM.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny Nazirita
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy: '
  '10':
  - type: text
    content: 'Amin’ny andro fahavalo dia hitondra domohina roa na voromailala roa ho eo amin’ny mpisorona, eo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izy. '
  '11':
  - type: text
    content: 'Ary ny mpisorona dia hanolotra ny iray ho fanatitra fanadiovana ary ny iray kosa dia ho fanatitra dorana manontolo, dia hanao fanavotana ho azy, satria nanota noho ny amin’ny faty izy; ary hanamasina ny lohany izy amin’izany andro izany. '
  '12':
  - type: text
    content: Dia hanokana ho an’NY TOMPO ny andro fitokanany izy ka hitondra ondrilahy iray izay iray taona, ho fanati-panonerana; fa ho very ireo andro teo aloha, satria voaloto ny fitokanany.
  '13':
  - type: text
    content: 'Ary izao no lalàna ny amin’ny Nazirita: Rehefa tapitra ny andro fitokanany dia hoentina ho eo anoloan’ny varavaran’ny tranolay fihaonana izy; '
  '14':
  - type: text
    content: 'ary hanolotra ny fanatiny ho an’NY TOMPO izy, dia ondrilahy iray izay feno iray taona sady tsy misy kilema, ho fanatitra dorana manontolo, ondrivavy iray izay iray taona sady tsy misy kilema, hatao fanatitra noho ny ota, ondrilahy iray tsy misy kilema, ho fanati-pihavanana, '
  '15':
  - type: text
    content: 'ary mofo tsy misy masirasira iray harona, mofo atao amin’ny koba tsara toto voaharo diloilo, mofo manify tsy misy masirasira sady voahosotra diloilo, mbamin’ny fanatitra avy amin’ny zavamaniry sy ny fanatitra aidina ampombaina azy. '
  '16':
  - type: text
    content: 'Dia haterin’ny mpisorona eo anatrehan’NY TOMPO ireo; hateriny koa ny fanatiny noho ny ota sy ny fanatiny dorana manontolo; '
  '17':
  - type: text
    content: 'dia hateriny ny ondrilahy ho fanati-pihavanana ho an’NY TOMPO; hoentiny koa ny mofo tsy misy masirasira iray harona; ary haterin’ny mpisorona koa ny fanatitra avy amin’ny zavamaniry izay noentiny sy ny fanatiny aidina. '
  '18':
  - type: text
    content: 'Ary ny Nazirita dia hanaratra ny lohany izay voatokana eo anoloan’ny varavaran’ny tranolay fihaonana, ary horaisiny ny volon-dohany izay voatokana ka hataony eo amin’ny afo izay eo ambanin’ny fanati-pihavanana. '
  '19':
  - type: text
    content: 'Halain’ny mpisorona ny sorok’ondrilahy izay efa masaka sy ny mofo iray tsy misy masirasira avy ao an-karona ary mofo manify iray tsy misy masirasira ka hatolony eo an-tanan’ny Nazirita, rehefa voaharatra ny lohany izay voatokana. '
  '2':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Raha misy lehilahy na vehivavy mivoady hitokana ho Nazirita mba hitokana ho an’NY TOMPO '
  '20':
  - type: text
    content: Dia hataon’ny mpisorona fanatitra asandratra eo anatrehan’NY TOMPO ireo; masina ho an’ny mpisorona izany, ho fanampin’ny tratrany nasandratra sy ny feny nalaina avy amin’ny fanatitra; aorianan’izany kosa dia mahazo misotro divay ny Nazirita.
  '21':
  - type: text
    content: Izany no lalàna ny amin’ny Nazirita izay mivoady hitondra fanatitra ho an’NY TOMPO noho ny fitokanany, afa-tsy izay zavatra hafa tratry ny ananany; araka ny voady izay nivoadiany no hataony, araka ny lalàna ny amin’ny fitokanany.
  - type: heading
    content: Ny tsodrano fanaon’ny mpisorona
  '22':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '23':
  - type: text
    content: 'Mitenena amin’i Arona sy ireo zanany hoe: Izao no teny hoentinareo mitsodrano ny Zanak’Israely:'
  '24':
  - type: text
    content: Hitahy anao anie NY TOMPO ka hiaro anao;
  '25':
  - type: text
    content: hampamirapiratra ny tavany aminao anie NY TOMPO ka hamindra fo aminao;
  '26':
  - type: text
    content: hanandratra ny tavany aminao anie NY TOMPO ka hanome anao fiadanana.
  '27':
  - type: text
    content: Dia hametraka ny anarako amin’ny Zanak’Israely izy ireo ary Izaho hitahy azy.
  '3':
  - type: text
    content: 'dia hifady divay sy toaka izy; tsy hisotro divay efa maharikivy, na toaka efa maharikivy izy, ary tsy hisotro ranom-boaloboka izy, na hihinana voaloboka akory, na lena, na maina. '
  '4':
  - type: text
    content: 'Amin’ny andro fitokanany rehetra dia tsy hihinana izay rehetra natao tamin’ny voaloboka izy, manomboka amin’ny voany ka hatramin’ny hodiny. '
  '5':
  - type: text
    content: 'Amin’ny andro rehetra izay nivoadiany hitokana dia tsy hokasihin-kareza ny lohany; mandra-pahatapitry ny andro izay nitokanany ho an’NY TOMPO dia ho masina izy ka havelany haniry ny volon-dohany. '
  '6':
  - type: text
    content: 'Amin’ny andro rehetra izay itokanany ho an’NY TOMPO koa dia tsy hiditra am-paty izy; '
  '7':
  - type: text
    content: 'aoka tsy handoto tena izy na dia amin’ny rainy, na ny reniny, na ny rahalahiny, na ny anabaviny aza, raha maty ireo, satria eo amin’ny lohany ny fitokanana ho an’Andriamaniny. '
  '8':
  - type: text
    content: Amin’ny andro fitokanany rehetra dia ho masina ho an’NY TOMPO izy.
  '9':
  - type: text
    content: 'Ary raha misy olona maty tampoka eo anilany ka mandoto ny lohany izay voatokana, dia hanaratra ny lohany amin’ny andro fanadiovana azy izy; amin’ny andro fahafito no hanaratany azy. '
