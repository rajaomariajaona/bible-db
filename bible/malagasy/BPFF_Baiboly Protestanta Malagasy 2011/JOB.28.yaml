document_id: JOB.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zava-miafin’ny fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa misy tany fihadiana volafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy toerana fandiovana volamena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny vy dia alaina avy amin’ny vovoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny varahina dia arendrika avy amin’ny vato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny mpihady vola dia mampisava ny maizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mikaroka hatrany amin’ny faran’ny lalina any
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vato any anatin’ny haizim-pito sy ny aloky ny fahafatesana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: mihady lavaka lavitry ny fonenan’ny olona izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mievingevina ny tongony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihantona sy mitsingevaheva any ambany lavitra ny olona any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny tany no iavian’ny hanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa any anatiny ambany any izy dia avadika toy ny amin’ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Toeran’ny safira ny vatony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy vovo-bolamena ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy fantatry ny vorona mpihaza ny lalana mankany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hitan’ny mason’ny voromahery;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: tsy nodiavin’ny mpiremby
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba nalehan’ny liona masiaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manatsotra ny tanany amin’ny vatokaranana ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamadika ny tendrombohitra hatramin’ny fotony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ny vatolampy dia tatahany hatao lalan-drano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay zava-tsoa rehetra dia hitan’ny masony avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tampenany ny lalan-drano mba tsy hisy mitete
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay zavamiafina dia avoakany ho amin’ny mazava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa aiza kosa no hahitana ny fahendrena?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aiza ny fitoeran’ny fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy misy zanak’olombelona mahalala ny vidiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hita eo amin’ny tanin’ny velona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoy ny lalina: Tsy ato anatiko izy.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary hoy ny ranomasina: Tsy ato amiko izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsy azo atakalo volamena tsara izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny volafotsy dia tsy azo lanjaina ho vidiny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ny volamena avy any Ofira dia tsy ampy ho tombany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny berila sarobidy na ny safira aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny volamena sy ny fitaratra dia tsy azo ampitahaina aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy azo atakalo firavaka volamena tsy miharo izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy tokony hotsaroana akory ny voahangy sy ny vato kristaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahazoana fahendrena dia mihoatra noho ny voahangy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny topaza avy any Kosy dia tsy azo ampitahaina aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mahatakalo azy ny tena volamena tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia avy aiza ary ny fahendrena?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aiza ny fitoeran’ny fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Miafina amin’ny mason’ny velona rehetra izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary takona amin’ny voromanidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy ny Fandringanana sy Rafahafatesana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny sofinay ihany no nandrenesanay ny filazana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Andriamanitra ihany no mahalala ny lalana ho any aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izy no mahafantatra ny itoerany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: fa Izy no mitsinjo hatrany amin’ny faran’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahatazana manerana izao ambanin’ny lanitra rehetra izao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ka manendry ny lanjan’ny rivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamatra ny rano amin’ny famarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tamin’ny nanaovany lalàna ho an’ny ranonorana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy lalana halehan’ny tselatry ny kotrokorana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: dia nahita azy Izy ka nanambara azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, nametraka ny fanorenany Izy sady namantatra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy Izy tamin’ny olombelona: Indro, ny fahatahorana ny Tompo no fahendrena'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fialana amin’ny ratsy no fahalalana.
