document_id: JOB.28,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zava-miafin’ny fahendrena
  - type: text
    content: Fa misy tany fihadiana volafotsy
  - type: text
    content: ary misy toerana fandiovana volamena.
  '10':
  - type: text
    content: ny vatolampy dia tatahany hatao lalan-drano
  - type: text
    content: ary izay zava-tsoa rehetra dia hitan’ny masony avokoa.
  '11':
  - type: text
    content: Tampenany ny lalan-drano mba tsy hisy mitete
  - type: text
    content: ary izay zavamiafina dia avoakany ho amin’ny mazava.
  '12':
  - type: text
    content: Fa aiza kosa no hahitana ny fahendrena?
  - type: text
    content: Ary aiza ny fitoeran’ny fahalalana?
  '13':
  - type: text
    content: Tsy misy zanak’olombelona mahalala ny vidiny
  - type: text
    content: ary tsy hita eo amin’ny tanin’ny velona izy.
  '14':
  - type: text
    content: 'Hoy ny lalina: Tsy ato anatiko izy.'
  - type: text
    content: 'Ary hoy ny ranomasina: Tsy ato amiko izy.'
  '15':
  - type: text
    content: Tsy azo atakalo volamena tsara izy
  - type: text
    content: ary ny volafotsy dia tsy azo lanjaina ho vidiny;
  '16':
  - type: text
    content: ny volamena avy any Ofira dia tsy ampy ho tombany,
  - type: text
    content: na ny berila sarobidy na ny safira aza.
  '17':
  - type: text
    content: Ny volamena sy ny fitaratra dia tsy azo ampitahaina aminy
  - type: text
    content: ary tsy azo atakalo firavaka volamena tsy miharo izy.
  '18':
  - type: text
    content: Tsy tokony hotsaroana akory ny voahangy sy ny vato kristaly,
  - type: text
    content: fa ny fahazoana fahendrena dia mihoatra noho ny voahangy.
  '19':
  - type: text
    content: Ny topaza avy any Kosy dia tsy azo ampitahaina aminy
  - type: text
    content: ary tsy mahatakalo azy ny tena volamena tsara.
  '2':
  - type: text
    content: Ny vy dia alaina avy amin’ny vovoka
  - type: text
    content: ary ny varahina dia arendrika avy amin’ny vato.
  '20':
  - type: text
    content: Dia avy aiza ary ny fahendrena?
  - type: text
    content: Ary aiza ny fitoeran’ny fahalalana?
  '21':
  - type: text
    content: Miafina amin’ny mason’ny velona rehetra izany
  - type: text
    content: ary takona amin’ny voromanidina.
  '22':
  - type: text
    content: 'Hoy ny Fandringanana sy Rafahafatesana:'
  - type: text
    content: Ny sofinay ihany no nandrenesanay ny filazana azy.
  '23':
  - type: text
    content: Andriamanitra ihany no mahalala ny lalana ho any aminy
  - type: text
    content: ary Izy no mahafantatra ny itoerany;
  '24':
  - type: text
    content: fa Izy no mitsinjo hatrany amin’ny faran’ny tany
  - type: text
    content: ary mahatazana manerana izao ambanin’ny lanitra rehetra izao
  '25':
  - type: text
    content: ka manendry ny lanjan’ny rivotra
  - type: text
    content: ary mamatra ny rano amin’ny famarana.
  '26':
  - type: text
    content: Tamin’ny nanaovany lalàna ho an’ny ranonorana
  - type: text
    content: sy lalana halehan’ny tselatry ny kotrokorana
  '27':
  - type: text
    content: dia nahita azy Izy ka nanambara azy;
  - type: text
    content: eny, nametraka ny fanorenany Izy sady namantatra azy.
  '28':
  - type: text
    content: 'Dia hoy Izy tamin’ny olombelona: Indro, ny fahatahorana ny Tompo no fahendrena'
  - type: text
    content: ary ny fialana amin’ny ratsy no fahalalana.
  '3':
  - type: text
    content: Ny mpihady vola dia mampisava ny maizina
  - type: text
    content: ka mikaroka hatrany amin’ny faran’ny lalina any
  - type: text
    content: ny vato any anatin’ny haizim-pito sy ny aloky ny fahafatesana;
  '4':
  - type: text
    content: mihady lavaka lavitry ny fonenan’ny olona izy;
  - type: text
    content: mievingevina ny tongony,
  - type: text
    content: mihantona sy mitsingevaheva any ambany lavitra ny olona any.
  '5':
  - type: text
    content: Ny tany no iavian’ny hanina,
  - type: text
    content: nefa any anatiny ambany any izy dia avadika toy ny amin’ny afo.
  '6':
  - type: text
    content: Toeran’ny safira ny vatony
  - type: text
    content: ary misy vovo-bolamena ao aminy.
  '7':
  - type: text
    content: Tsy fantatry ny vorona mpihaza ny lalana mankany
  - type: text
    content: ary tsy hitan’ny mason’ny voromahery;
  '8':
  - type: text
    content: tsy nodiavin’ny mpiremby
  - type: text
    content: ary tsy mba nalehan’ny liona masiaka.
  '9':
  - type: text
    content: Manatsotra ny tanany amin’ny vatokaranana ireo
  - type: text
    content: ary mamadika ny tendrombohitra hatramin’ny fotony;
