document_id: DEU.29,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay nataon’Andriamanitra tamin’ny Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia niantso ny Israely rehetra i Mosesy ka niteny taminy hoe: Efa nahita izay rehetra nataon’NY TOMPO teo imasonareo tany amin’ny tany Ejipta ianareo, dia tamin’i Farao sy ny mpanompony rehetra ary ny taniny rehetra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ny zanakareo madinika sy ny vadinareo ary ny vahiny eo amin’ny tobinareo mbamin’ny mpikapa hazonao sy ny mpantsaka ranonao, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'mba hidiranao amin’ny faneken’NY TOMPO Andriamanitrao sy ny fianianana, izay ataon’NY TOMPO Andriamanitrao aminao anio, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'hanandratany anao ho fireneny, ary mba ho Andriamanitrao Izy, araka izay nolazainy taminao sy araka izay nianianany tamin’ny razanao, dia i Abrahama sy Isaka ary i Jakoba. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary tsy aminareo ihany no anaovako izao fanekena sy fianianana izao, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: fa amin’izay eto amintsika anio eto anatrehan’NY TOMPO Andriamanitsika sy amin’izay tsy eto amintsika izao anio izao koa.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa fantatrareo izay nitoerantsika tany amin’ny tany Ejipta sy izay nandehanantsika namakivaky ny tanin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: '; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary efa hitanareo ny fahavetavetany, ny sampiny hazo sy vato ary volafotsy sy volamena, izay teo aminy; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'fandrao hisy lehilahy, na vehivavy, na mpianakavy, na foko eo aminareo, izay manana fo mivily anio ka miala amin’NY TOMPO Andriamanitsika ary handeha hanompo ny andriamanitr’ireny firenena ireny; fandrao hisy faka mangidy miteraka poizina mahafaty eo aminareo; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'koa rehefa ren’izany olona izany ny tenin’ity fanozonana ity dia hiarahaba tena ao am-pony izy ka hiteny hoe: Hanam-piadanana aho; eny, hanaraka ny ditran’ny foko ka hanampy fanalana hetaheta amin’ny fahamamoana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary tsy hety hamela ny helony NY TOMPO, fa hanetroka amin’izany lehilahy izany ny fahatezeran’NY TOMPO sy ny fahasaro-piarony, ary hitoetra aminy ny fanozonana rehetra izay voasoratra amin’ity boky ity, koa hovonoin’NY TOMPO tsy ho eo ambanin’ny lanitra ny anarany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izany dia fizahan-toetra lehibe, izay efa hitan’ny masonao, dia ireny famantarana sy fahagagana lehibe ireny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia hosarahin’NY TOMPO amin’ny firenen’Israely rehetra izy mba ho amin’ny loza, araka ny fanozonana rehetra amin’ny fanekena izay voasoratra amin’ity bokin’ny lalàna ity.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hanatanteraka fampitahorana NY TOMPO
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hiteny ny taranaka any aoriana, dia ny zanakareo izay hitsangana handimby anareo, sy ny vahiny avy amin’ny tany lavitra, rehefa mahita ny kapoka natao tamin’ity tany ity sy ny aretina izay nahatran’NY TOMPO taminy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ho solifara sy sira ary fahamaizana ny tany rehetra eo; tsy hofafazana izy, na hanirian-javatra, sady tsy hisy ahitra akory hitrebona aminy, dia tahaka ny nandravana an’i Sodoma sy i Gomora ary i Adma sy i Zeboima, izay noravan’NY TOMPO noho ny fahavinirany sy ny fahatezerany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary hiteny ny firenena rehetra hoe: Nahoana NY TOMPO no dia nanao toy izany tamin’ity tany ity? Inona no hevitry ny firehetan’izao fahatezerana lehibe izao? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia hiteny ny vahoaka hoe: Satria nahafoy ny faneken’NY TOMPO, Andriamanitry ny razany, izay nataony taminy fony Izy nitondra azy nivoaka avy tany amin’ny tany Ejipta izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa nandeha izy ka nanompo andriamanitra hafa sady niankohoka teo anatrehany, dia ilay andriamanitra izay tsy fantany sady tsy nomena azy; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'dia nirehitra tamin’ity tany ity ny fahatezeran’NY TOMPO ka nataony tonga taminy avokoa ny fanozonana rehetra izay voasoratra tato amin’ity boky ity; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: tamin’ny fahavinirana sy fahatezerana ary fahatezerana mirehitra no nandroahan’NY TOMPO azy tsy ho eo amin’ny taniny sady nampandehanany azy ho any amin’ny tany hafa, tahaka ny amin’izao anio izao.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: An’NY TOMPO Andriamanitsika ny zavamiafina; fa antsika sy ny zanatsika mandrakizay kosa ny zavatra ambara, mba hankatoavantsika ny teny rehetra amin’ity lalàna ity.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nefa tsy nomen’NY TOMPO fo hahalala sy maso hahita ary sofina handre ianareo mandraka androany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nitondra anareo tany an-tany efitra efapolo taona aho; tsy rovitra teny aminareo ny fitafianareo, ary tsy simba teo amin’ny tongotrao ny kapanao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy mofo no nohaninareo ary tsy divay na toaka mahery no nosotroinareo, mba ho fantatrareo fa Izaho no TOMPO Andriamanitrareo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony tonga tamin’ity tany ity ianareo dia niainga i Sihona, mpanjakan’i Hesbona, sy i Oga, mpanjakan’i Basana, hiady amintsika, dia resintsika izy roa lahy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nalaintsika ny taniny ka nomentsika ho zaratanin’ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa tandremo ny tenin’izao fanekena izao ka araho, mba hambinina ianareo amin’izay rehetra ataonareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manao ho zava-dehibe ny fanekena amin’Andriamanitra
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Miseho eto anatrehan’NY TOMPO Andriamanitrareo ianareo rehetra anio, dia ny lehibenareo sy ny firenenareo, ny lehiben’ny fokonareo sy ny mpifehy anareo ary ny lehilahy rehetra amin’ny Israely, '
