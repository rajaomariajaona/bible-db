document_id: PSA.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Na dia toa rava aza ny zavatra rehetra
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY TOMPO no ialofako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ahoana no itenenanareo amin’ny fanahiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandosira ho any an-tendrombohitra toy ny voronkely?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa indro, manenjana ny tsipìkany ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa mametraka ny zana-tsipìkany eo amin’ny kofehy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitifitra ny mahitsy fo ao amin’ny maizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa raha rava ny fototra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia inona indray no azon’ny marina atao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: NY TOMPO dia ao amin’ny tempoliny masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sezafiandrianan’NY TOMPO dia any an-danitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mijery ny masony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mizaha toetra ny zanak’olombelona ny hodimasony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: NY TOMPO mizaha toetra ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny ratsy fanahy sy izay tia herisetra dia samy halan’ny fanahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Handatsaka afo sy solifara amin’ny ratsy fanahy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fandatsaka ranonorana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rivo-mahamay no ho anjara kapoakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa marina NY TOMPO ka fahamarinana no tiany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olo-mahitsy no hahita ny tavany.
