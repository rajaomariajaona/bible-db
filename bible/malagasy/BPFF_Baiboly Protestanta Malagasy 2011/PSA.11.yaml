document_id: PSA.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Na dia toa rava aza ny zavatra rehetra
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: NY TOMPO no ialofako.
  - type: text
    content: 'Ahoana no itenenanareo amin’ny fanahiko hoe:'
  - type: text
    content: Mandosira ho any an-tendrombohitra toy ny voronkely?
  '2':
  - type: text
    content: Fa indro, manenjana ny tsipìkany ny ratsy fanahy;
  - type: text
    content: efa mametraka ny zana-tsipìkany eo amin’ny kofehy izy
  - type: text
    content: mba hitifitra ny mahitsy fo ao amin’ny maizina.
  '3':
  - type: text
    content: Fa raha rava ny fototra
  - type: text
    content: dia inona indray no azon’ny marina atao?
  '4':
  - type: text
    content: NY TOMPO dia ao amin’ny tempoliny masina,
  - type: text
    content: ny sezafiandrianan’NY TOMPO dia any an-danitra;
  - type: text
    content: mijery ny masony;
  - type: text
    content: eny, mizaha toetra ny zanak’olombelona ny hodimasony.
  '5':
  - type: text
    content: NY TOMPO mizaha toetra ny marina
  - type: text
    content: fa ny ratsy fanahy sy izay tia herisetra dia samy halan’ny fanahiny.
  '6':
  - type: text
    content: Handatsaka afo sy solifara amin’ny ratsy fanahy Izy,
  - type: text
    content: tahaka ny fandatsaka ranonorana;
  - type: text
    content: rivo-mahamay no ho anjara kapoakany.
  '7':
  - type: text
    content: Fa marina NY TOMPO ka fahamarinana no tiany;
  - type: text
    content: ny olo-mahitsy no hahita ny tavany.
