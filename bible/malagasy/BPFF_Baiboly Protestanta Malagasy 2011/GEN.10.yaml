document_id: GEN.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mponina teto ambonin’ny tany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 1.5-23
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ireto no taranaky ny zanakalahin’i Noa, dia i Sema sy i Hama ary i Jafeta: Samy niteraka zazalahy avy izy ireo taorianan’ny safodrano.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny zanakalahin’i Jafeta dia i Gomera, i Magoga, i Maday, i Javana, i Tobala, i Maseka ary i Tirasa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny zanakalahin’i Gomera dia i Askenaza, i Rifata ary i Togarma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny zanakalahin’i Javana dia i Elisaha, i Tarsisy, ny Kitima ary ny Dodanita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Avy tamin’ireo ny firenena no niparitaka tany amin’ireo nosy, tany amin’ny taniny avy, samy araka ny fiteniny avy, araka ny mpianakaviny avy, tamin’ny fireneny avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny zanakalahin’i Hama dia i Kosy, i Mizraima, i Pota ary i Kanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny zanakalahin’i Kosy dia i Seba, i Havila, i Sabta, i Ragama ary i Sabteka. Ny zanakalahin’i Ragama dia i Seba sy i Dedana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I Kosy dia niteraka an’i Nimroda; izy no tonga olo-mahery voalohany tetỳ ambonin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mpihaza mahery teo anatrehan’NY TOMPO izy, koa izany no nanaovan’ny olona hoe: Tahaka an’i Nimroda, mpihaza mahery eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny niandohan’ny fanjakany dia i Babela, i Ereka, i Akada ary i Kalne tany amin’ny tany Sinara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary niala avy tamin’izany tany izany izy ka nankany Asiria, dia nanorina an’i Ninive mbamin’i Rehobota-Ira, i Kala '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary i Resena teo anelanelan’i Ninive sy i Kala, dia ilay tanàna lehibe izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I Mizraima dia niteraka ny Lodita, ny Anamita, ny Lehabita, ny Naftohita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ny Patrosita, ny Kaslohita izay niavian’ny Filistina ary ny Kaftorita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I Kanana dia niteraka an’i Sidona lahimatoany sy i Heta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny Jebosita, ny Amorita, ny Girgasita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny Hivita, ny Arkita, ny Sinita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ny Arvadita ary ny Zemarita sy ny Hamatita; tatỳ aoriana dia niely ireo fokon’ny Kananita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny sisintanin’ny Kananita dia hatrany Sidona ka hatrany Gaza ao akaikin’i Gerara ka hatrany Lesa ao akaikin’i Sodoma sy Gomora ary Adma sy Zeboima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ireo no zanak’i Hama araka ny fokony, araka ny fiteniny, amin’ny taniny, amin’ny fireneny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia niteraka koa i Sema, razamben’ireo taranak’i Ebera rehetra, rahalahin’i Jafeta, izay zokiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny zanakalahin’i Sema dia i Elama, i Asira, i Arpaksada, i Loda ary i Arama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny zanakalahin’i Arama dia i Oza, i Hola, i Getera ary i Masy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I Arpaksada dia niteraka an’i Sela, ary i Sela dia niteraka an’i Ebera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I Ebera dia niteraka roa lahy: Ny anaran’ny iray dia natao hoe Pelega'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pelega: Fizarana.'
    marker-yv: yv-n
  - type: text
    text: ' satria tamin’ny androny no nizarana ny tany, ary Joktana no anaran’ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I Joktana dia niteraka an’i Almodada, i Selefa, i Hazarmaveta, i Jera, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'i Hadorama, i Ozala, i Dikla, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'i Obala, i Abimaela, i Sheba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'i Ofira, i Havila ary i Jobaba. Ireo rehetra ireo no zanakalahin’i Joktana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny fonenan’ireo dia hatrany Mesa ao akaikin’i Sefara, tendrombohitra any atsinanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ireo no zanak’i Sema araka ny fokony, araka ny fiteniny, amin’ny taniny, araka ny fireneny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ireo no fokon’ireo zanak’i Noa araka ny taranany, amin’ny fireneny. Avy tamin’ireo no niparitahan’ny firenena tetỳ ambonin’ny tany taorianan’ny safodrano.
