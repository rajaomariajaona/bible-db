document_id: EXO.35,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Sabata, andro fitsaharana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary namory ny fiangonana i Mosesy, dia ny Israely manontolo, ka niteny taminy hoe: Izao no teny nandidian’NY TOMPO hotanterahina: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary aoka ny manan-talenta rehetra eo aminareo ho avy ka hanao izay rehetra nandidian’NY TOMPO, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'dia ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakely
    - type: text
      text: ', ny tranolainy, ny rakotra momba azy, ny farangony, ny hazofisaka momba azy sy ny barany ary ny andriny sy ny faladiany, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ny vata sy ny baony ary ny rakotra fanaovam-panavotana sy ny efitra lamba fanakonana, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ny latabatra sy ny baony mbamin’ny fanaka rehetra momba azy ary ny mofo atao fanatitra, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ny fitoeran-jiro ho fanazavana mbamin’ny fanaka momba azy sy ny jirony ary ny diloilo hatao fanazavana, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ny alitara fandoroana ditin-kazo manitra ary ny baony, ny diloilo fanosorana sy ny ditin-kazo mani-pofona, ny varavarana lamba ho eo amin’ny varavaran’ny tabernakely, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ny alitara fandoroana ny fanatitra dorana manontolo sy ny harato varahina ho eo aminy ary ny baony sy ny fanaka rehetra momba azy, ary ny koveta sy ny faladiany, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ny fefy lamba ho amin’ny kianja, ny andriny sy ny faladiany ary ny vavahady lamba ho eo amin’ny vavahadin’ny kianja, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ny tsatòkan-dain’ny tabernakely sy ny tsatòkan-dain’ny kianja sy ny kofehiny, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ny fitafiana fitondra amin’ny fanompoana, hoentiny manao fanompoam-pivavahana ao amin’ny fitoerana masina, ny fitafiana masina ho an’i Arona mpisorona ary ny fitafian’ireo zanany hoentiny manao raharaham-pisoronana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Henemana no hanaovanao raharaha, fa ny andro fahafito dia ho masina aminareo, ho tena andro fitsaharana ho an’NY TOMPO; izay rehetra manao raharaha amin’io andro io dia hovonoina ho faty. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia niala teo anatrehan’i Mosesy ny fiangonana, dia ny Israely manontolo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nanatona ny olona rehetra izay nohetsehin’ny fony sy izay rehetra nentanin’ny fanahiny avy ka samy nitondra ny anjara fanomezany ho an’NY TOMPO hanaovana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ' sy ny fanompoana rehetra momba azy ary ny fitafiana masina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ny olona rehetra na lahy na vavy dia nitondra izay rehetra nanentanan’ny fony azy, dia fisisika, kavina, peratra, mason-drojo volamena, firavaka volamena isan-karazany; toy izany koa ny olona rehetra izay nanolotra volamena ka nataony fanatitra asandratra ho an’NY TOMPO. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny olona rehetra izay nanana lamba manga, volomparasy, jaky, lamba rongony fotsy madinika, volon’osy, hoditr’ondrilahy voaloko mena ary hoditra trozona, dia nitondra ireo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Izay rehetra nanatitra volafotsy sy varahina ho anjara fanomezana dia nitondra izany ho an’NY TOMPO; ary izay rehetra nanana hazo akasia hanaovana zavatra ho amin’ny fanompoana dia nitondra izany koa.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ny vehivavy rehetra nanan-talenta namoly tamin’ny tanany dia nitondra izay nofolesiny, dia ny kofehy manga, volomparasy, jaky ary ny lamba rongony fotsy madinika. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary ny vehivavy rehetra nanan-talenta ka nazoto am-po dia namoly volon’osy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ny loholona dia nitondra ny vato berila sy ny vato halatsaka an-tranontranony ho amin’ny efoda sy ho amin’ny saron-tratra, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ary ny zava-manitra sy ny diloilo hatao fanazavana sy ho amin’ny diloilo fanosorana ary ho amin’ny ditin-kazo mani-pofona.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny lehilahy sy ny vehivavy rehetra izay nampirisihin’ny fony dia hitondra izay hanaovana ny zavatra rehetra nandidian’NY TOMPO hotanterahin’i Mosesy; ireny Zanak’Israely rehetra ireny dia nitondra fanatitra an-tsitrapo ho an’NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manomboka ny asa i Bezalila sy i Oholiaba
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aza mampirehitra afo amin’ny andro Sabata any amin’izay rehetra itoeranareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitondra ny fandraisany anjara ny Zanak’Israely
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary hoy i Mosesy tamin’ny Zanak’Israely: Indro, efa notononin’NY TOMPO anarana i Bezalila, zanak’i Ory, zanak’i Hora, avy amin’ny fokon’i Joda, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ka efa nofenoiny fanahin’Andriamanitra, mba hananany talenta sy fahiratan-tsaina ary fahalalana ny amin’ny taozavatra samihafa, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'toy ny famolavolana asa kanto, ny fiasana volamena sy volafotsy ary varahina, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'ny fanamboarana vato alatsaka an-tranontranony sy ny fandrafetana hazo, hanaovana izay asa kanto samihafa rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ny fahaizana mampianatra koa dia efa nataon’Andriamanitra tao am-pony, dia izy sy i Oholiaba, zanak’i Ahisamaka avy amin’ny fokon’i Dana. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary efa nofenoiny talenta izy roa lahy hanaovany ny taozavatra samihafa, dia ny an’ny mpanao sokitra sy ny mpanao asa kanto ary ny asan’ny mpanenona mahay tenona samihafa soratra, dia amin’ny kofehy manga, volomparasy, jaky ary amin’ny lamba rongony fotsy madinika ary ny an’ny mpanenona, mba hanaovana ny asa samihafa sy hamoronana asa kanto.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary niteny tamin’ny fiangonana, dia ny Israely manontolo, i Mosesy hoe: Izao no teny izay nandidian’NY TOMPO hotanterahina: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Makà anjara fanomezana ho an’NY TOMPO avy amin’izay anananareo: Izay rehetra entanin’ny fony dia aoka hitondra anjara fanomezana ho an’NY TOMPO, dia volamena, volafotsy, varahina, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'lamba manga, volomparasy, jaky, lamba rongony fotsy madinika ary volon’osy, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'hoditr’ondrilahy voaloko mena, hoditra trozona, hazo akasia, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'diloilo hatao fanazavana, zava-manitra ho amin’ny diloilo fanosorana sy ho ditin-kazo mani-pofona, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ary vato berila sy vato halatsaka an-tranontranony ho amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efoda
    - type: text
      text: ' sy ho amin’ny saron-tratra.'
