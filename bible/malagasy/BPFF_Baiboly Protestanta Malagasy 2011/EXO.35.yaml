document_id: EXO.35,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Sabata, andro fitsaharana
  - type: text
    content: 'Ary namory ny fiangonana i Mosesy, dia ny Israely manontolo, ka niteny taminy hoe: Izao no teny nandidian’NY TOMPO hotanterahina: '
  '10':
  - type: text
    content: 'Ary aoka ny manan-talenta rehetra eo aminareo ho avy ka hanao izay rehetra nandidian’NY TOMPO, '
  '11':
  - type: text
    content: 'dia ny '
  - type: text
    content: tabernakely
  - type: text
    content: ', ny tranolainy, ny rakotra momba azy, ny farangony, ny hazofisaka momba azy sy ny barany ary ny andriny sy ny faladiany, '
  '12':
  - type: text
    content: 'ny vata sy ny baony ary ny rakotra fanaovam-panavotana sy ny efitra lamba fanakonana, '
  '13':
  - type: text
    content: 'ny latabatra sy ny baony mbamin’ny fanaka rehetra momba azy ary ny mofo atao fanatitra, '
  '14':
  - type: text
    content: 'ny fitoeran-jiro ho fanazavana mbamin’ny fanaka momba azy sy ny jirony ary ny diloilo hatao fanazavana, '
  '15':
  - type: text
    content: 'ny alitara fandoroana ditin-kazo manitra ary ny baony, ny diloilo fanosorana sy ny ditin-kazo mani-pofona, ny varavarana lamba ho eo amin’ny varavaran’ny tabernakely, '
  '16':
  - type: text
    content: 'ny alitara fandoroana ny fanatitra dorana manontolo sy ny harato varahina ho eo aminy ary ny baony sy ny fanaka rehetra momba azy, ary ny koveta sy ny faladiany, '
  '17':
  - type: text
    content: 'ny fefy lamba ho amin’ny kianja, ny andriny sy ny faladiany ary ny vavahady lamba ho eo amin’ny vavahadin’ny kianja, '
  '18':
  - type: text
    content: 'ny tsatòkan-dain’ny tabernakely sy ny tsatòkan-dain’ny kianja sy ny kofehiny, '
  '19':
  - type: text
    content: ny fitafiana fitondra amin’ny fanompoana, hoentiny manao fanompoam-pivavahana ao amin’ny fitoerana masina, ny fitafiana masina ho an’i Arona mpisorona ary ny fitafian’ireo zanany hoentiny manao raharaham-pisoronana.
  '2':
  - type: text
    content: 'Henemana no hanaovanao raharaha, fa ny andro fahafito dia ho masina aminareo, ho tena andro fitsaharana ho an’NY TOMPO; izay rehetra manao raharaha amin’io andro io dia hovonoina ho faty. '
  '20':
  - type: text
    content: 'Dia niala teo anatrehan’i Mosesy ny fiangonana, dia ny Israely manontolo. '
  '21':
  - type: text
    content: 'Dia nanatona ny olona rehetra izay nohetsehin’ny fony sy izay rehetra nentanin’ny fanahiny avy ka samy nitondra ny anjara fanomezany ho an’NY TOMPO hanaovana ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' sy ny fanompoana rehetra momba azy ary ny fitafiana masina. '
  '22':
  - type: text
    content: 'Ary ny olona rehetra na lahy na vavy dia nitondra izay rehetra nanentanan’ny fony azy, dia fisisika, kavina, peratra, mason-drojo volamena, firavaka volamena isan-karazany; toy izany koa ny olona rehetra izay nanolotra volamena ka nataony fanatitra asandratra ho an’NY TOMPO. '
  '23':
  - type: text
    content: 'Ary ny olona rehetra izay nanana lamba manga, volomparasy, jaky, lamba rongony fotsy madinika, volon’osy, hoditr’ondrilahy voaloko mena ary hoditra trozona, dia nitondra ireo. '
  '24':
  - type: text
    content: Izay rehetra nanatitra volafotsy sy varahina ho anjara fanomezana dia nitondra izany ho an’NY TOMPO; ary izay rehetra nanana hazo akasia hanaovana zavatra ho amin’ny fanompoana dia nitondra izany koa.
  '25':
  - type: text
    content: 'Ny vehivavy rehetra nanan-talenta namoly tamin’ny tanany dia nitondra izay nofolesiny, dia ny kofehy manga, volomparasy, jaky ary ny lamba rongony fotsy madinika. '
  '26':
  - type: text
    content: Ary ny vehivavy rehetra nanan-talenta ka nazoto am-po dia namoly volon’osy.
  '27':
  - type: text
    content: 'Ny loholona dia nitondra ny vato berila sy ny vato halatsaka an-tranontranony ho amin’ny efoda sy ho amin’ny saron-tratra, '
  '28':
  - type: text
    content: ary ny zava-manitra sy ny diloilo hatao fanazavana sy ho amin’ny diloilo fanosorana ary ho amin’ny ditin-kazo mani-pofona.
  '29':
  - type: text
    content: Ny lehilahy sy ny vehivavy rehetra izay nampirisihin’ny fony dia hitondra izay hanaovana ny zavatra rehetra nandidian’NY TOMPO hotanterahin’i Mosesy; ireny Zanak’Israely rehetra ireny dia nitondra fanatitra an-tsitrapo ho an’NY TOMPO.
  - type: heading
    content: Manomboka ny asa i Bezalila sy i Oholiaba
  '3':
  - type: text
    content: Aza mampirehitra afo amin’ny andro Sabata any amin’izay rehetra itoeranareo.
  - type: heading
    content: Mitondra ny fandraisany anjara ny Zanak’Israely
  '30':
  - type: text
    content: 'Ary hoy i Mosesy tamin’ny Zanak’Israely: Indro, efa notononin’NY TOMPO anarana i Bezalila, zanak’i Ory, zanak’i Hora, avy amin’ny fokon’i Joda, '
  '31':
  - type: text
    content: 'ka efa nofenoiny fanahin’Andriamanitra, mba hananany talenta sy fahiratan-tsaina ary fahalalana ny amin’ny taozavatra samihafa, '
  '32':
  - type: text
    content: 'toy ny famolavolana asa kanto, ny fiasana volamena sy volafotsy ary varahina, '
  '33':
  - type: text
    content: 'ny fanamboarana vato alatsaka an-tranontranony sy ny fandrafetana hazo, hanaovana izay asa kanto samihafa rehetra. '
  '34':
  - type: text
    content: 'Ny fahaizana mampianatra koa dia efa nataon’Andriamanitra tao am-pony, dia izy sy i Oholiaba, zanak’i Ahisamaka avy amin’ny fokon’i Dana. '
  '35':
  - type: text
    content: Ary efa nofenoiny talenta izy roa lahy hanaovany ny taozavatra samihafa, dia ny an’ny mpanao sokitra sy ny mpanao asa kanto ary ny asan’ny mpanenona mahay tenona samihafa soratra, dia amin’ny kofehy manga, volomparasy, jaky ary amin’ny lamba rongony fotsy madinika ary ny an’ny mpanenona, mba hanaovana ny asa samihafa sy hamoronana asa kanto.
  '4':
  - type: text
    content: 'Ary niteny tamin’ny fiangonana, dia ny Israely manontolo, i Mosesy hoe: Izao no teny izay nandidian’NY TOMPO hotanterahina: '
  '5':
  - type: text
    content: 'Makà anjara fanomezana ho an’NY TOMPO avy amin’izay anananareo: Izay rehetra entanin’ny fony dia aoka hitondra anjara fanomezana ho an’NY TOMPO, dia volamena, volafotsy, varahina, '
  '6':
  - type: text
    content: 'lamba manga, volomparasy, jaky, lamba rongony fotsy madinika ary volon’osy, '
  '7':
  - type: text
    content: 'hoditr’ondrilahy voaloko mena, hoditra trozona, hazo akasia, '
  '8':
  - type: text
    content: 'diloilo hatao fanazavana, zava-manitra ho amin’ny diloilo fanosorana sy ho ditin-kazo mani-pofona, '
  '9':
  - type: text
    content: 'ary vato berila sy vato halatsaka an-tranontranony ho amin’ny '
  - type: text
    content: efoda
  - type: text
    content: ' sy ho amin’ny saron-tratra.'
