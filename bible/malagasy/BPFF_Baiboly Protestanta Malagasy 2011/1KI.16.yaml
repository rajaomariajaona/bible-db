document_id: 1KI.16,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Tonga tamin’i Jeho, zanak’i Hanany, ny tenin’NY TOMPO ny amin’i Basa hoe: '
  '10':
  - type: text
    content: Niditra tao i Zimry ka namely an’i Elaha ho faty tamin’ny taona fahafito amby roapolo nanjakan’i Asa, mpanjakan’ny Joda, ary izy no nanjaka nisolo azy.
  '11':
  - type: text
    content: 'Nony vao nanjaka i Zimry ka nipetraka tamin’ny sezafiandrianany dia namono ny mpianakavin’i Basa rehetra izy ka tsy navelany hisy miangana na dia lehilahy iray akory aza, na tamin’ny havany, na tamin’ny sakaizany. '
  '12':
  - type: text
    content: 'Toy izany no nandringanan’i Zimry ny mpianakavin’i Basa rehetra, araka ny tenin’NY TOMPO izay nampilazainy an’i Jeho mpaminany ny amin’i Basa, '
  '13':
  - type: text
    content: noho ny fahotany rehetra sy ny fahotan’i Elaha zanany koa, izay nataony, sady nampanotany ny Israely ka nahatezitra NY TOMPO, Andriamanitry ny Israely, noho ny amin’ireo sampiny.
  '14':
  - type: text
    content: Ny tantaran’i Elaha sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany?
  - type: heading
    content: I Zimry, mpanjakan’ny Israely
  '15':
  - type: text
    content: Tamin’ny taona fahafito amby roapolo nanjakan’i Asa, mpanjakan’ny Joda, no nanjakan’i Zimry andro fito tao Tirza.
  - type: text
    content: 'Tamin’izay dia nanao fahirano an’i Gibetona, izay an’ny Filistina, ny olona, '
  '16':
  - type: text
    content: 'koa ireo olona izay nitoby teo dia nandre hoe: Nikomy i Zimry sady namono ny mpanjaka koa! Ary ny Israely rehetra tany an-tobiny dia nampanjaka an’i Omry, lehiben’ny miaramila, ho mpanjakan’ny Israely androtr’izay ihany. '
  '17':
  - type: text
    content: 'Dia niakatra avy tao Gibetona i Omry sy ny Israely rehetra niaraka taminy ka nanao fahirano an’i Tirza. '
  '18':
  - type: text
    content: 'Nony hitan’i Zimry fa azo ny tanàna dia lasa niditra tao amin’ny tilikambo-manda tao amin’ny lapa izy ary nodorany tamin’ny afo ny lapa ka may tao izy dia maty. '
  '19':
  - type: text
    content: Izany dia noho ny fahotana izay nataony tamin’ny nanaovany izay ratsy teo imason’NY TOMPO, tamin’ny nandehanany tamin’ny lalan’i Jeroboama sy tamin’ny fahotana izay nataony sady nampanotany ny Israely.
  '2':
  - type: text
    content: 'Satria nasandratro avy tamin’ny vovoka ianao ka notendreko ho mpitondra ny Israely oloko, nefa ianao kosa nandeha tamin’ny lalan’i Jeroboama ihany ary nampanota ny Israely oloko ka nahatezitra Ahy tamin’ny fahotany, '
  '20':
  - type: text
    content: Ny tantaran’i Zimry sisa mbamin’ny fikomiany, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany?
  '21':
  - type: text
    content: 'Tamin’izany dia nizara roa ny lehilahin’ny Israely: Ny antsasany dia nomba an’i Tibny, zanak’i Ginata, mba hampanjaka azy; ary ny antsasany kosa dia nomba an’i Omry. '
  '22':
  - type: text
    content: Ny olona izay nomba an’i Omry anefa no naharesy ireo olona izay nomba an’i Tibny, zanak’i Ginata ka maty i Tibny ary i Omry no nanjaka.
  - type: heading
    content: I Omry, mpanjakan’ny Israely
  '23':
  - type: text
    content: 'Tamin’ny taona fahiraika amby telopolo nanjakan’i Asa, mpanjakan’ny Joda, no tonga mpanjaka i Omry. Nanjaka roa amby folo taona tamin’ny Israely izy. Tao Tirza no nanjakany nandritra ny enin-taona. '
  '24':
  - type: text
    content: 'Novidiny volafotsy '
  - type: text
    content: talenta
  - type: text
    content: ' roa tamin’i Samera anefa ny havoanan’i Samaria ka nanorina tanàna teo an-tampon’ny havoana izy, ary nataony hoe Samaria ny anaran’ny tanàna, araka ny anaran’i Samera, tompon’ny havoana.'
  '25':
  - type: text
    content: 'Nanao izay ratsy eo imason’NY TOMPO anefa i Omry, eny, nanao izay ratsy mihoatra noho izay rehetra talohany izy; '
  '26':
  - type: text
    content: fa nandeha tamin’ny lalana rehetra nalehan’i Jeroboama, zanak’i Nebata, sy tamin’ny fahotana izay nampanotany ny Israely izy ka nahatezitra NY TOMPO, Andriamanitry ny Israely, noho ny amin’ireo sampiny.
  '27':
  - type: text
    content: 'Ny tantaran’i Omry sisa mbamin’izay nataony sy ny heriny izay nasehony, moa tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  '28':
  - type: text
    content: Nodimandry any amin’ny razany i Omry, dia nalevina tao Samaria. I Ahaba zanany no nanjaka nandimby azy.
  - type: heading
    content: I Ahaba, mpanjakan’ny Israely
  '29':
  - type: text
    content: 'Tonga mpanjakan’ny Israely i Ahaba zanak’i Omry, tamin’ny taona fahavalo amby telopolo nanjakan’i Asa, mpanjakan’ny Joda, ary nanjaka tamin’ny Israely tao Samaria nandritra ny roa amby roapolo taona izy. '
  '3':
  - type: text
    content: 'dia indro, hofongorako i Basa sy ny taranany, ary ny taranakao dia hataoko tahaka ny taranak’i Jeroboama, zanak’i Nebata. '
  '30':
  - type: text
    content: 'Nanao izay ratsy eo imason’NY TOMPO mihoatra noho izay rehetra talohany i Ahaba, zanak’i Omry. '
  '31':
  - type: text
    content: 'Fa noheveriny ho tsy dia naninona ny miroso amin’ny fahotan’i Jeroboama, zanak’i Nebata, ka nampakatra an’i Jezebela, zanakavavin’i Etibaala, mpanjakan’ny Sidoniana, ho vadiny izy, ary nandeha nanompo ny '
  - type: text
    content: Baala
  - type: text
    content: ' ka niankohoka teo anatrehany. '
  '32':
  - type: text
    content: 'Nanangana alitara ho an’ny Baala tao amin’ny trano naoriny manokana ho an’izany tao Samaria izy. '
  '33':
  - type: text
    content: 'Nanao ny tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: ' koa i Ahaba ka nahatezitra NY TOMPO, Andriamanitry ny Israely, mihoatra noho ny mpanjakan’ny Israely rehetra izay talohany.'
  '34':
  - type: text
    content: Tamin’ny andron’i Ahaba no nanorenan’i Hiela betelita an’i Jeriko. Ny ain’i Abirama lahimatoany no saran’ny nanorenany ny fanambaniny, ary ny ain’i Segoba faralahiny no saran’ny nananganany ny vavahadiny, araka ny tenin’NY TOMPO izay nampilazainy an’i Josoa, zanak’i Nona.
  '4':
  - type: text
    content: Koa izay tamingan’i Basa maty ao an-tanàna dia hohanin’ny alika; ary izay tamingany maty any an-tsaha dia hohanin’ny voromanidina.
  '5':
  - type: text
    content: 'Ny tantaran’i Basa sisa mbamin’izay nataony ary ny heriny, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  '6':
  - type: text
    content: 'Nodimandry any amin’ny razany i Basa dia nalevina tao Tirza. I Elaha zanany no nanjaka nandimby azy. '
  '7':
  - type: text
    content: I Jeho mpaminany, zanak’i Hanany, no nampitondraina ny tenin’NY TOMPO ny amin’i Basa sy ny taranany, satria nanao izay ratsy teo imason’NY TOMPO izy ka nahatezitra Azy tamin’ny asan’ny tanany, ary tonga tahaka ny mpianakavin’i Jeroboama, satria namono ireo koa izy.
  - type: heading
    content: I Elaha, mpanjakan’ny Israely
  '8':
  - type: text
    content: Tamin’ny taona fahenina amby roapolo nanjakan’i Asa, mpanjakan’ny Joda, no tonga mpanjakan’ny Israely tao Tirza i Elaha, zanak’i Basa, ary nanjaka roa taona izy.
  '9':
  - type: text
    content: 'Nikomy taminy i Zimry mpanompony, lehiben’ny antsasaky ny kalesy fitondrany miady, raha izy nisotro ho mamo tao Tirza, tao an-tranon’i Arza, lehiben’ny lapa tao Tirza. '
