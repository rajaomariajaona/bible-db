document_id: 1KI.16
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamin’i Jeho, zanak’i Hanany, ny tenin’NY TOMPO ny amin’i Basa hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Satria nasandratro avy tamin’ny vovoka ianao ka notendreko ho mpitondra ny Israely oloko, nefa ianao kosa nandeha tamin’ny lalan’i Jeroboama ihany ary nampanota ny Israely oloko ka nahatezitra Ahy tamin’ny fahotany, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia indro, hofongorako i Basa sy ny taranany, ary ny taranakao dia hataoko tahaka ny taranak’i Jeroboama, zanak’i Nebata. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa izay tamingan’i Basa maty ao an-tanàna dia hohanin’ny alika; ary izay tamingany maty any an-tsaha dia hohanin’ny voromanidina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny tantaran’i Basa sisa mbamin’izay nataony ary ny heriny, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nodimandry any amin’ny razany i Basa dia nalevina tao Tirza. I Elaha zanany no nanjaka nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I Jeho mpaminany, zanak’i Hanany, no nampitondraina ny tenin’NY TOMPO ny amin’i Basa sy ny taranany, satria nanao izay ratsy teo imason’NY TOMPO izy ka nahatezitra Azy tamin’ny asan’ny tanany, ary tonga tahaka ny mpianakavin’i Jeroboama, satria namono ireo koa izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Elaha, mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tamin’ny taona fahenina amby roapolo nanjakan’i Asa, mpanjakan’ny Joda, no tonga mpanjakan’ny Israely tao Tirza i Elaha, zanak’i Basa, ary nanjaka roa taona izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nikomy taminy i Zimry mpanompony, lehiben’ny antsasaky ny kalesy fitondrany miady, raha izy nisotro ho mamo tao Tirza, tao an-tranon’i Arza, lehiben’ny lapa tao Tirza. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Niditra tao i Zimry ka namely an’i Elaha ho faty tamin’ny taona fahafito amby roapolo nanjakan’i Asa, mpanjakan’ny Joda, ary izy no nanjaka nisolo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nony vao nanjaka i Zimry ka nipetraka tamin’ny sezafiandrianany dia namono ny mpianakavin’i Basa rehetra izy ka tsy navelany hisy miangana na dia lehilahy iray akory aza, na tamin’ny havany, na tamin’ny sakaizany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Toy izany no nandringanan’i Zimry ny mpianakavin’i Basa rehetra, araka ny tenin’NY TOMPO izay nampilazainy an’i Jeho mpaminany ny amin’i Basa, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: noho ny fahotany rehetra sy ny fahotan’i Elaha zanany koa, izay nataony, sady nampanotany ny Israely ka nahatezitra NY TOMPO, Andriamanitry ny Israely, noho ny amin’ireo sampiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny tantaran’i Elaha sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany?
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Zimry, mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tamin’ny taona fahafito amby roapolo nanjakan’i Asa, mpanjakan’ny Joda, no nanjakan’i Zimry andro fito tao Tirza.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamin’izay dia nanao fahirano an’i Gibetona, izay an’ny Filistina, ny olona, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'koa ireo olona izay nitoby teo dia nandre hoe: Nikomy i Zimry sady namono ny mpanjaka koa! Ary ny Israely rehetra tany an-tobiny dia nampanjaka an’i Omry, lehiben’ny miaramila, ho mpanjakan’ny Israely androtr’izay ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niakatra avy tao Gibetona i Omry sy ny Israely rehetra niaraka taminy ka nanao fahirano an’i Tirza. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony hitan’i Zimry fa azo ny tanàna dia lasa niditra tao amin’ny tilikambo-manda tao amin’ny lapa izy ary nodorany tamin’ny afo ny lapa ka may tao izy dia maty. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izany dia noho ny fahotana izay nataony tamin’ny nanaovany izay ratsy teo imason’NY TOMPO, tamin’ny nandehanany tamin’ny lalan’i Jeroboama sy tamin’ny fahotana izay nataony sady nampanotany ny Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny tantaran’i Zimry sisa mbamin’ny fikomiany, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tamin’izany dia nizara roa ny lehilahin’ny Israely: Ny antsasany dia nomba an’i Tibny, zanak’i Ginata, mba hampanjaka azy; ary ny antsasany kosa dia nomba an’i Omry. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny olona izay nomba an’i Omry anefa no naharesy ireo olona izay nomba an’i Tibny, zanak’i Ginata ka maty i Tibny ary i Omry no nanjaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Omry, mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’ny taona fahiraika amby telopolo nanjakan’i Asa, mpanjakan’ny Joda, no tonga mpanjaka i Omry. Nanjaka roa amby folo taona tamin’ny Israely izy. Tao Tirza no nanjakany nandritra ny enin-taona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Novidiny volafotsy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' roa tamin’i Samera anefa ny havoanan’i Samaria ka nanorina tanàna teo an-tampon’ny havoana izy, ary nataony hoe Samaria ny anaran’ny tanàna, araka ny anaran’i Samera, tompon’ny havoana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nanao izay ratsy eo imason’NY TOMPO anefa i Omry, eny, nanao izay ratsy mihoatra noho izay rehetra talohany izy; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: fa nandeha tamin’ny lalana rehetra nalehan’i Jeroboama, zanak’i Nebata, sy tamin’ny fahotana izay nampanotany ny Israely izy ka nahatezitra NY TOMPO, Andriamanitry ny Israely, noho ny amin’ireo sampiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny tantaran’i Omry sisa mbamin’izay nataony sy ny heriny izay nasehony, moa tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nodimandry any amin’ny razany i Omry, dia nalevina tao Samaria. I Ahaba zanany no nanjaka nandimby azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Ahaba, mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tonga mpanjakan’ny Israely i Ahaba zanak’i Omry, tamin’ny taona fahavalo amby telopolo nanjakan’i Asa, mpanjakan’ny Joda, ary nanjaka tamin’ny Israely tao Samaria nandritra ny roa amby roapolo taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nanao izay ratsy eo imason’NY TOMPO mihoatra noho izay rehetra talohany i Ahaba, zanak’i Omry. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa noheveriny ho tsy dia naninona ny miroso amin’ny fahotan’i Jeroboama, zanak’i Nebata, ka nampakatra an’i Jezebela, zanakavavin’i Etibaala, mpanjakan’ny Sidoniana, ho vadiny izy, ary nandeha nanompo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' ka niankohoka teo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nanangana alitara ho an’ny Baala tao amin’ny trano naoriny manokana ho an’izany tao Samaria izy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nanao ny tsangankazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: ' koa i Ahaba ka nahatezitra NY TOMPO, Andriamanitry ny Israely, mihoatra noho ny mpanjakan’ny Israely rehetra izay talohany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tamin’ny andron’i Ahaba no nanorenan’i Hiela betelita an’i Jeriko. Ny ain’i Abirama lahimatoany no saran’ny nanorenany ny fanambaniny, ary ny ain’i Segoba faralahiny no saran’ny nananganany ny vavahadiny, araka ny tenin’NY TOMPO izay nampilazainy an’i Josoa, zanak’i Nona.
