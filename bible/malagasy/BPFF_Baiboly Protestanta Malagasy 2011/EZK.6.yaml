document_id: EZK.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny mpanompo sampy
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: Dia ho fantany fa Izaho no TOMPO, ary tsy teny foana tsy akory ny nilazako fa hahatonga izany loza izany aminy Aho.
  '11':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Mikapoha amin’ny tananao ianao ary mitotoa amin’ny tongotrao ka mitenena hoe: Indrisy, amin’ny fahavetavetana ratsy rehetra ataon’ny taranak’Israely izay ho lavon’ny sabatra sy ny mosary ary ny areti-mandringana! '
  '12':
  - type: text
    content: 'Ny any lavitra dia ho fatin’ny areti-mandringana, ny atỳ akaiky ho lavon’ny sabatra ary izay sisa sy izay voaro dia ho faty mosary. Hotanterahiko aminy ny fahatezerako. '
  '13':
  - type: text
    content: 'Dia ho fantatrareo fa Izaho no TOMPO, rehefa miampatrampatra eny amin’ny sampiny manodidina ny alitarany ny voavono ao aminy, eny amin’ny vohitra avo rehetra, eny an-tampon’ny tendrombohitra rehetra, eny ambanin’ny hazo maitso rehetra, eny ambanin’ny '
  - type: text
    content: terebinta
  - type: text
    content: ' misandrahaka rehetra, dia eny amin’izay nanolorany hanitra ankasitrahana tamin’ny sampiny rehetra. '
  '14':
  - type: text
    content: Hatsotrako aminy ny tanako ka hataoko lao sy foana mihoatra noho ny tany efitr’i Dibla ny tany. Dia ho fantany fa Izaho no TOMPO.
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', tandrifio ny tendrombohitry ny Israely, dia maminania ny hamelezana azy '
  '3':
  - type: text
    content: 'ka lazao hoe: Ry tendrombohitry ny Israely ô! Mihainoa ny tenin’NY TOMPO Andriamanitra! Izao no lazain’NY TOMPO Andriamanitra amin’ny tendrombohitra sy ny havoana, ary ny lohasahan-driaka sy ny lohasaha: Indro, Izaho hahatonga sabatra hamely anareo ary horavako ny toerana fanaovanareo sorona. '
  '4':
  - type: text
    content: 'Horavana ny alitaranareo, hopotehina ny tsangankazo ho an’ny masoandro ary hataoko mitsitra eo anoloan’ny sampinareo ny fatinareo. '
  '5':
  - type: text
    content: 'Ny fatin’ny Zanak’Israely dia hataoko eo anoloan’ny sampiny ary ny taolanareo dia haeliko manodidina ny alitaranareo eny. '
  '6':
  - type: text
    content: 'Any amin’ny fonenanareo rehetra dia ho lao ny tanàna, ary ho rava ny toerana fanaovana sorona mba ho rava sy lao koa ny alitaranareo; hotapatapahina sy hofoanana ny sampinareo, hokapaina ny tsangankazonareo ho an’ny masoandro ka ho foana ny asanareo. '
  '7':
  - type: text
    content: 'Ary hisy faty hiampatrampatra eo aminareo ka ho fantatrareo fa Izaho no TOMPO. '
  '8':
  - type: text
    content: 'Nefa hamelako hisy sisa ihany ianareo, fa hisy ho afaka amin’ny sabatra any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehefa voaely ho any amin’ny tany samihafa ianareo. '
  '9':
  - type: text
    content: 'Ary izay afa-nandositra aminareo dia hahatsiaro Ahy any amin’ny Jentilisa izay hitondrana azy ho babo, rehefa voatorotoroko ny fony mijangajanga izay niala tamiko, sy ny masony izay mijangajanga manaraka ny sampiny. Haharikoriko azy ny tenany noho ny ratsy nataony, dia ny fahavetavetany rehetra. '
