document_id: EZK.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin’ny mpanompo sampy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', tandrifio ny tendrombohitry ny Israely, dia maminania ny hamelezana azy '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka lazao hoe: Ry tendrombohitry ny Israely ô! Mihainoa ny tenin’NY TOMPO Andriamanitra! Izao no lazain’NY TOMPO Andriamanitra amin’ny tendrombohitra sy ny havoana, ary ny lohasahan-driaka sy ny lohasaha: Indro, Izaho hahatonga sabatra hamely anareo ary horavako ny toerana fanaovanareo sorona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Horavana ny alitaranareo, hopotehina ny tsangankazo ho an’ny masoandro ary hataoko mitsitra eo anoloan’ny sampinareo ny fatinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny fatin’ny Zanak’Israely dia hataoko eo anoloan’ny sampiny ary ny taolanareo dia haeliko manodidina ny alitaranareo eny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Any amin’ny fonenanareo rehetra dia ho lao ny tanàna, ary ho rava ny toerana fanaovana sorona mba ho rava sy lao koa ny alitaranareo; hotapatapahina sy hofoanana ny sampinareo, hokapaina ny tsangankazonareo ho an’ny masoandro ka ho foana ny asanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hisy faty hiampatrampatra eo aminareo ka ho fantatrareo fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa hamelako hisy sisa ihany ianareo, fa hisy ho afaka amin’ny sabatra any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' rehefa voaely ho any amin’ny tany samihafa ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izay afa-nandositra aminareo dia hahatsiaro Ahy any amin’ny Jentilisa izay hitondrana azy ho babo, rehefa voatorotoroko ny fony mijangajanga izay niala tamiko, sy ny masony izay mijangajanga manaraka ny sampiny. Haharikoriko azy ny tenany noho ny ratsy nataony, dia ny fahavetavetany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia ho fantany fa Izaho no TOMPO, ary tsy teny foana tsy akory ny nilazako fa hahatonga izany loza izany aminy Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Mikapoha amin’ny tananao ianao ary mitotoa amin’ny tongotrao ka mitenena hoe: Indrisy, amin’ny fahavetavetana ratsy rehetra ataon’ny taranak’Israely izay ho lavon’ny sabatra sy ny mosary ary ny areti-mandringana! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny any lavitra dia ho fatin’ny areti-mandringana, ny atỳ akaiky ho lavon’ny sabatra ary izay sisa sy izay voaro dia ho faty mosary. Hotanterahiko aminy ny fahatezerako. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia ho fantatrareo fa Izaho no TOMPO, rehefa miampatrampatra eny amin’ny sampiny manodidina ny alitarany ny voavono ao aminy, eny amin’ny vohitra avo rehetra, eny an-tampon’ny tendrombohitra rehetra, eny ambanin’ny hazo maitso rehetra, eny ambanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terebinta
  - type: text
    text: ' misandrahaka rehetra, dia eny amin’izay nanolorany hanitra ankasitrahana tamin’ny sampiny rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hatsotrako aminy ny tanako ka hataoko lao sy foana mihoatra noho ny tany efitr’i Dibla ny tany. Dia ho fantany fa Izaho no TOMPO.
