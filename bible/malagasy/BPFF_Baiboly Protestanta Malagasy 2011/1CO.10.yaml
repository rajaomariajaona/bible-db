document_id: 1CO.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny Israely tany an-tany efitra: Ohatra ho antsika'
  - type: text
    content: 'Fa tsy tiako tsy ho fantatrareo, ry rahalahy, fa tao ambanin’ny rahona ny razantsika rehetra, namakivaky ny ranomasina izy rehetra, '
  '10':
  - type: text
    content: 'Aoka tsy himonomonona ianareo tahaka ny sasany tamin-dry zareo, izay matin’ny mpandringana. '
  '11':
  - type: text
    content: 'Ary izany dia nanjo azy ireny mba ho anatra sady voasoratra koa ho fananarana antsika izay iharan’izao andro farany izao. '
  '12':
  - type: text
    content: Koa izay milaza azy fa mijoro tsara dia aoka izy hitandrina fandrao ho lavo.
  '13':
  - type: text
    content: Tsy misy fakam-panahy nahazo anareo afa-tsy izay zakan’ny olombelona; nefa mahatoky Andriamanitra ka tsy hamela anareo halaim-panahy mihoatra noho izay zakanareo; fa momba ny fakam-panahy dia hasiany lalana koa hahafahanareo mahazaka izany.
  - type: heading
    content: Tsy misy fiombonana amin’ny demonia
  '14':
  - type: text
    content: 'Koa amin’izany, ry malala, dia mandosira ny fanompoan-tsampy. '
  '15':
  - type: text
    content: 'Milaza toy ny amin’ny olona manan-tsaina aho; hevero izay lazaiko aminareo. '
  '16':
  - type: text
    content: 'Ny kapoaky ny fisaorana izay isaorantsika, tsy fiombonana amin’ny ran’i '
  - type: text
    content: Kristy
  - type: text
    content: ' va izany? Ny mofo izay vakintsika, tsy fiombonana amin’ny tenan’i Kristy va izany? '
  '17':
  - type: text
    content: 'Satria iray ihany ny mofo dia tena iray ihany isika na dia maro aza; fa isika rehetra dia samy mandray amin’izany mofo iray izany avokoa. '
  '18':
  - type: text
    content: Indreo ny Israely araka ny nofo; moa tsy mpiombona amin’ny alitara va izay mihinana ny fanatitra?
  '19':
  - type: text
    content: 'Inona ary no holazaiko? Mety ho zavatra misy heviny va ny hena aterina amin’ny sampy, ary mety ho zavatra tena izy va ny sampy? '
  '2':
  - type: text
    content: 'natao batisa ho amin’i Mosesy tao amin’ny rahona sy ny ranomasina izy rehetra, '
  '20':
  - type: text
    content: 'Tsia, fa izay zavatra atolotry ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ho fanatitra dia atolony ho an’ny demonia fa tsy ho an’Andriamanitra (Deo 32.17); koa tsy tiako ho mpiombona amin’ny demonia ianareo. '
  '21':
  - type: text
    content: 'Tsy afaka sady hisotro amin’ny kapoaky ny Tompo ianareo no hisotro amin’ny kapoaky ny demonia; tsy afaka sady hihinana amin’ny latabatry ny Tompo ianareo no sady hihinana amin’ny latabatry ny demonia. '
  '22':
  - type: text
    content: Mampahasaro-piaro ny Tompo va isika? Mahery noho Izy va isika?
  - type: heading
    content: Ataovy ho voninahitr’Andriamanitra ny zavatra rehetra
  '23':
  - type: text
    content: 'Azo atao ny zavatra rehetra, nefa tsy ny zavatra rehetra no mahasoa; azo atao ny zavatra rehetra, nefa tsy ny zavatra rehetra no mampandroso. '
  '24':
  - type: text
    content: Aoka tsy hisy olona hitady ny hahasoa ny tenany fa ny hahasoa ny namany.
  '25':
  - type: text
    content: 'Izay hena rehetra amidy eny an-tsena dia hano fa aza manontany akory noho ny fieritreretana; '
  '26':
  - type: text
    content: 'fa «an’NY TOMPO ny tany sy izay rehetra eo aminy» (Sal 24.1). '
  '27':
  - type: text
    content: 'Ary raha misy amin’ny tsy mino manasa anareo ka ta handeha ianareo dia hano izay arosony eo anoloanareo fa aza manontany akory noho ny fieritreretana. '
  '28':
  - type: text
    content: 'Fa raha misy milaza aminareo hoe: Hena naterina tamin’ny sampy io dia aza homana noho ny amin’ilay nilaza taminareo sy noho ny fieritreretana. '
  '29':
  - type: text
    content: 'Fieritreretana, hoy aho, tsy ny an’ny tenanao fa ny an’ny olon-kafa; fa nahoana ny fahafahako no hotsarain’ny fieritreretan’ny olon-kafa? '
  '3':
  - type: text
    content: 'nihinana ny sakafo ara-panahy iray ihany izy rehetra, '
  '30':
  - type: text
    content: Fa raha amin’ny fisaorana no ihinanako izany, nahoana aho no tenenina ratsy amin’izay anaovako fisaorana?
  '31':
  - type: text
    content: 'Koa amin’izany, na mihinana na misotro ianareo, na inona na inona ataonareo, dia ataovy ho voninahitr’Andriamanitra izany rehetra izany. '
  '32':
  - type: text
    content: 'Aza manao izay hahatafintohina ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' na ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' na ny fiangonan’Andriamanitra, '
  '33':
  - type: text
    content: dia tahaka ahy koa, manao izay hahafinaritra ny olona rehetra amin’ny zavatra rehetra ka tsy mitady ny mahasoa ahy ihany fa ny mahasoa ny maro mba hahatonga azy hovonjena.
  '4':
  - type: text
    content: 'nisotro ny fisotro ara-panahy iray ihany izy rehetra; fa nisotro tamin’ny vatolampy ara-panahy izay nanaraka azy izy rehetra, ary '
  - type: text
    content: Kristy
  - type: text
    content: ' izany vatolampy izany. '
  '5':
  - type: text
    content: Nefa ny ankabeazany dia tsy sitrak’Andriamanitra fa naringana tany an-tany efitra.
  '6':
  - type: text
    content: 'Izany zavatra izany dia tonga anatra ho antsika mba tsy hitsiriritra zava-dratsy isika toy ny nitsiriritan’izy ireny. '
  '7':
  - type: text
    content: 'Aoka tsy ho mpanompo sampy ianareo, tahaka ny sasany tamin-dry zareo, araka ny voasoratra hoe: «Nipetraka hihinana sy hisotro ny olona dia nitsangana hilalao» (Eks 32.6). '
  '8':
  - type: text
    content: 'Aoka tsy hijangajanga isika tahaka ny sasany tamin-dry zareo ka telo arivo sy roa alina no ringana indray andro. '
  '9':
  - type: text
    content: 'Aoka tsy haka fanahy ny Tompo isika, tahaka ny nakan’ny sasany tamin-dry zareo fanahy Azy ka nahatonga azy ireny ho matin’ny menarana. '
