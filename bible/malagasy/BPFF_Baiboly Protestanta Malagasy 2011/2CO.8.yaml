document_id: 2CO.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampirisihana ny amin’ny fanangonana fanomezana
  - type: text
    content: 'Ampahafantarinay anareo, ry rahalahy, ny fahasoavan’Andriamanitra izay nomena tao amin’ny fiangonana any Makedonia; '
  '10':
  - type: text
    content: 'Ary ambarako izay hevitro ny amin’izany, fa mahatsara anareo izany, satria ianareo no nanomboka nanao fanangonana, ary ianareo rahateo no nanapa-kevitra ny hanao izany talohan’ny hafa, hatramin’ny taon-dasa. '
  '11':
  - type: text
    content: 'Tanteraho hatramin’ny farany ary izany, koa tahaka ny fahazotoanareo tamin’ny famolavolana ny asa dia aoka koa ho tahaka izany ny fanatanterahana azy, araka izay anananareo. '
  '12':
  - type: text
    content: 'Fa raha misy ny fahazotoana dia araka izay ananana no ankasitrahana ny mpanome fa tsy araka izay tsy ananana. '
  '13':
  - type: text
    content: 'Kanefa tsy ny fanamaivanana ny fahorian’ny sasany no hanavesatra anareo fa ny mba hisian’ny fitoviana; '
  '14':
  - type: text
    content: 'koa amin’izao ankehitriny izao, ny haben’ny harenanareo no hahafaka ny fahantran’ireo ary ny haben’ny haren’ireo kosa no hahafaka ny fahantranareo mba hampisy fitoviana, '
  '15':
  - type: text
    content: 'araka ny voasoratra hoe: «Ny nanangona be dia tsy nanana amby ary ny nanangona kely dia tsy nanana ny tsy ampy» (Eks 16.18).'
  '16':
  - type: text
    content: 'Fa isaorana anie Andriamanitra izay nanome izany fahazotoana izany koa ho ao am-pon’i Titosy ho anareo. '
  '17':
  - type: text
    content: 'Fa nanaiky ny fangatahanay izy sady efa nazoto rahateo izy, koa an-tsitrapo no nandehanany nankany aminareo. '
  '18':
  - type: text
    content: Ary ilay rahalahy izay re laza any amin’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' rehetra noho ny amin’ny Filazantsara, io no nirahinay hiaraka aminy; '
  '19':
  - type: text
    content: 'ary tsy izany ihany fa efa notendren’ny fiangonana koa izy ho namanay hiara-mandeha aminay hitondra izao fanomezana izao ka ataonay ho naman’ny asa fanompoanay izany, ho voninahitry ny Tompo sy ho vavolombelon’ny fahazotoanay. '
  '2':
  - type: text
    content: 'fa tamin’ny fahoriana be izay nizahan-toetra azy no nitomboan’ny hafaliany, ary ny hamafin’ny fahantrany no nampitombo ny harenan’ny fahalalahan-tanany. '
  '20':
  - type: text
    content: 'Ary mitandrina izahay mba tsy hisy hanome tsiny anay amin’izao harena be voangona sy tantananay izao; '
  '21':
  - type: text
    content: 'koa mikatsaka ny hanao ny tsara izahay, tsy eo imason’ny Tompo ihany fa eny imason’ny olona koa. '
  '22':
  - type: text
    content: 'Ary nirahinay niaraka tamin’ireo ilay rahalahinay izay hitanay matetika fa mazoto amin’ny zavatra maro; ary ankehitriny dia vao mainka mazoto kokoa aza izy noho ny haben’ny fahatokiany anareo. '
  '23':
  - type: text
    content: 'Raha ny amin’i Titosy dia namako izy sady mpiara-miasa amiko eo aminareo; ary ireo rahalahinay dia iraky ny fiangonana izy ireo sady voninahitr’i Kristy. '
  '24':
  - type: text
    content: Koa amin’izany dia asehoy aminy eo imason’ny fiangonana ny famantarana mahamarina ny fitiavanareo sy ny reharehanay ny aminareo.
  '3':
  - type: text
    content: 'Koa vavolombelona aho fa araka ny zakany, eny, mihoatra noho ny zakany aza, sady araka ny sitrapony ihany, no nanomezany, '
  '4':
  - type: text
    content: 'sady nangataka mafy taminay koa izy mba havelanay hikambana amin’izany fanompoana ho an’ny olona masina izany; '
  '5':
  - type: text
    content: 'ary tsy araka ny nantenainay, fa ny tenany no natolony ho an’ny Tompo aloha, dia izay vao ho anay koa noho ny sitrapon’Andriamanitra. '
  '6':
  - type: text
    content: Koa dia nangataka an’i Titosy izahay mba hamita izany asa fanasoavana izany eo aminareo koa, araka ny efa nanombohany azy teo aloha.
  '7':
  - type: text
    content: 'Nefa noho ny fanananareo ny feno amin’ny lafiny rehetra, na amin’ny finoana, na amin’ny teny, na amin’ny fahalalana, na amin’ny fahazotoana rehetra, na amin’ny fitiavanareo anay, dia aoka hanana ny fitiavana feno koa ianareo amin’izao asa fanasoavana izao. '
  '8':
  - type: text
    content: 'Tsy milaza izany ho didy aho fa noho ny zotom-pon’ny sasany dia te hizaha toetra ny fahamarinan’ny fitiavanareo. '
  '9':
  - type: text
    content: 'Fa fantatrareo ny fahasoavan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika, fa na dia nanankarena aza Izy, dia tonga mahantra noho ny aminareo, mba hampanan-karena anareo ny fahantrany. '
