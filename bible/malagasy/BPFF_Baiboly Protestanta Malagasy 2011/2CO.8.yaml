document_id: 2CO.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampirisihana ny amin’ny fanangonana fanomezana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ampahafantarinay anareo, ry rahalahy, ny fahasoavan’Andriamanitra izay nomena tao amin’ny fiangonana any Makedonia; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa tamin’ny fahoriana be izay nizahan-toetra azy no nitomboan’ny hafaliany, ary ny hamafin’ny fahantrany no nampitombo ny harenan’ny fahalalahan-tanany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa vavolombelona aho fa araka ny zakany, eny, mihoatra noho ny zakany aza, sady araka ny sitrapony ihany, no nanomezany, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sady nangataka mafy taminay koa izy mba havelanay hikambana amin’izany fanompoana ho an’ny olona masina izany; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary tsy araka ny nantenainay, fa ny tenany no natolony ho an’ny Tompo aloha, dia izay vao ho anay koa noho ny sitrapon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa dia nangataka an’i Titosy izahay mba hamita izany asa fanasoavana izany eo aminareo koa, araka ny efa nanombohany azy teo aloha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nefa noho ny fanananareo ny feno amin’ny lafiny rehetra, na amin’ny finoana, na amin’ny teny, na amin’ny fahalalana, na amin’ny fahazotoana rehetra, na amin’ny fitiavanareo anay, dia aoka hanana ny fitiavana feno koa ianareo amin’izao asa fanasoavana izao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy milaza izany ho didy aho fa noho ny zotom-pon’ny sasany dia te hizaha toetra ny fahamarinan’ny fitiavanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa fantatrareo ny fahasoavan’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika, fa na dia nanankarena aza Izy, dia tonga mahantra noho ny aminareo, mba hampanan-karena anareo ny fahantrany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ambarako izay hevitro ny amin’izany, fa mahatsara anareo izany, satria ianareo no nanomboka nanao fanangonana, ary ianareo rahateo no nanapa-kevitra ny hanao izany talohan’ny hafa, hatramin’ny taon-dasa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tanteraho hatramin’ny farany ary izany, koa tahaka ny fahazotoanareo tamin’ny famolavolana ny asa dia aoka koa ho tahaka izany ny fanatanterahana azy, araka izay anananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha misy ny fahazotoana dia araka izay ananana no ankasitrahana ny mpanome fa tsy araka izay tsy ananana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Kanefa tsy ny fanamaivanana ny fahorian’ny sasany no hanavesatra anareo fa ny mba hisian’ny fitoviana; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'koa amin’izao ankehitriny izao, ny haben’ny harenanareo no hahafaka ny fahantran’ireo ary ny haben’ny haren’ireo kosa no hahafaka ny fahantranareo mba hampisy fitoviana, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'araka ny voasoratra hoe: «Ny nanangona be dia tsy nanana amby ary ny nanangona kely dia tsy nanana ny tsy ampy» (Eks 16.18).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa isaorana anie Andriamanitra izay nanome izany fahazotoana izany koa ho ao am-pon’i Titosy ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa nanaiky ny fangatahanay izy sady efa nazoto rahateo izy, koa an-tsitrapo no nandehanany nankany aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ilay rahalahy izay re laza any amin’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' rehetra noho ny amin’ny Filazantsara, io no nirahinay hiaraka aminy; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary tsy izany ihany fa efa notendren’ny fiangonana koa izy ho namanay hiara-mandeha aminay hitondra izao fanomezana izao ka ataonay ho naman’ny asa fanompoanay izany, ho voninahitry ny Tompo sy ho vavolombelon’ny fahazotoanay. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary mitandrina izahay mba tsy hisy hanome tsiny anay amin’izao harena be voangona sy tantananay izao; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'koa mikatsaka ny hanao ny tsara izahay, tsy eo imason’ny Tompo ihany fa eny imason’ny olona koa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nirahinay niaraka tamin’ireo ilay rahalahinay izay hitanay matetika fa mazoto amin’ny zavatra maro; ary ankehitriny dia vao mainka mazoto kokoa aza izy noho ny haben’ny fahatokiany anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha ny amin’i Titosy dia namako izy sady mpiara-miasa amiko eo aminareo; ary ireo rahalahinay dia iraky ny fiangonana izy ireo sady voninahitr’i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa amin’izany dia asehoy aminy eo imason’ny fiangonana ny famantarana mahamarina ny fitiavanareo sy ny reharehanay ny aminareo.
