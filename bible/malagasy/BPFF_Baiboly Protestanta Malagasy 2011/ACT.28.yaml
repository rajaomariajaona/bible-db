document_id: ACT.28,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tany Malta i Paoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa tonga soa amantsara izahay vao nahalala fa i Malta no anaran’ilay nosy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary voninahitra be no nomen’ny olona anay ka rehefa handeha izahay dia novatsiany tsara.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny dia avy tany Malta nankany Roma
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa afaka telo volana dia niondrana tamin’ny sambo iray izay efa nandany ny ririnina teo amin’izany nosy izany izahay; sambon’i Aleksandria io ary nisy sarin’i Dioskiora. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitody tany Sirakosa izahay ary nijanona tao nandritra ny telo andro. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony niala teo izahay dia nanaraka ny morontsiraka ary tonga tany Regioma; ny ampitso anefa dia nifofofofo avy any atsimo ny rivotra ka ny afaka ampitso dia tonga tao Potioly izahay; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao no nahitanay rahalahy izay niangavy anay hijanona herinandro teo aminy. Izany no nahatongavanay tany Roma; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony nahare ny dianay ireo rahalahy tany dia tonga nitsena anay hatrany amin’ny Tsenan’i Apio sy ny Tranom-bahiny Telo. Raha nahita azy ireo i Paoly dia nisaotra an’Andriamanitra sady nahazo hery.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Paoly tany Roma
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa tonga tany Roma izahay dia navela hitoetra mitokana teo amin’ny miaramila iray izay niambina azy i Paoly.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka hateloana dia nampiantsoin’i Paoly ireo lohandohany tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: '; rehefa tafangona ireo dia hoy izy taminy: Ry rahalahy, izaho dia gadra avy tany Jerosalema, natolotra teo an-tanan’ny Romana na dia tsy nisy fahadisoana nataoko aza na tamin’ny firenentsika na tamin’ny fanaon-drazana; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'rehefa nanadina ahy mafy ireo dia saika nandefa ahy ihany satria tsy nisy nataoko izay tokony hahafaty ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa satria notoherin’ny Jiosy izany dia voatery aho nilaza fa handahatra amin’i Kaisara, kanefa tsy toy ny manana teny hiampangako ny fireneko aho tsy akory. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naneho fitiavana manokana taminay ny tompon-tany; namelona afo izy ka nandray tsara anay rehetra satria nilatsaka ny ranonorana tamin’izay sady nangatsiaka ny andro. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany zavatra izany no nampiantsoako anareo, hahitako anareo sy hiresahako aminareo; fa noho ny fanantenan’Israely no ifatorako amin’ity gadra ity.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy ireo taminy: Tsy mbola nahazo taratasy avy tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' milaza anao izahay ary tsy mbola nisy rahalahy nankaty nanambara na nilaza ratsy anao; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa mba tianay ho re avy aminao izay hevitrao satria fantatray fa toherin’ny olona hatraiza hatraiza io antoko io.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nifanao fotoana tamin’i Paoly izy ireo dia maro no tonga tao aminy tao amin’ny toerana nivahinianany; ary izy dia nilaza sy nanambara taminy ny fanjakan’Andriamanitra sady nitaona azy ireo tamin’ny teny ho amin’ny lalànan’i Mosesy sy ny Mpaminany mba hino an’i Jesosy; vao maraina ka mandra-paharivan’ny andro no nanaovany izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy nino izay nolazainy, fa ny sasany kosa dia tsy mba nino. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tsy niray saina ireo ka niala dia izao teny indraimbava izao no nolazain’i Paoly: Marina izay nampilazain’ny Fanahy Masina an’Isaia mpaminany tamin’ny razanareo '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Mandehana any amin’ity firenena ity ianao ka lazao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahare mandrakariva ihany ianareo nefa tsy hahalala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hijery mandrakariva ihany ianareo nefa tsy hahita;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa adala ny fon’ireo olona ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa lalodalovana ny sofiny ary efa nakimpiny ny masony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hahita ny masony sy handre ny sofiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahalala ny fony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hibebaka izy ka hahasitrana azy Aho» (Isa 6.9-10).
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa aoka ho fantatrareo fa izao famonjen’Andriamanitra izao dia nampitondraina ho any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ', ary izy ireo dia hihaino izany. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Rehefa niteny izany izy dia lasa ireo Jiosy sady niady hevitra fatratra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namory kitay hazo iray trotroana i Paoly ka nanohoka izany teo amin’ny afo; ary nisy menarana nivoaka avy tamin’ny afo ka niraikitra tamin’ny tanany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nipetraka roa taona ngarangidina tao amin’ny trano nohofany i Paoly ka nandray tsara izay rehetra tonga teo aminy; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nitory ny fanjakan’Andriamanitra izy ka nampianatra ny amin’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompo tamin’ny fahasahiana be ary tsy nisy fisakanana.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hitan’ny tompon-tany ny biby niraikitra tamin’ny tanany dia nifampiresaka izy ireo hoe: Mpamono olona tokoa io lehilahy io, koa na dia voavonjy tamin’ny ranomasina aza izy dia tsy avelan’ny todin’aina ho velona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nakifik’i Paoly ho eo amin’ny afo ilay biby ka tsy naninona izy na dia kely akory aza. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanampo azy hivonto, na hiankarapoka ho faty tampoka ny olona; nefa rehefa niandry ela izy ireo ka nahita fa tsy nisy na inona na inona nanjo an’i Paoly dia niova hevitra izy ka nilaza fa andriamanitra io.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo akaiky teo dia nisy sahan’i Poplio, tomponandraikitra voalohany teo amin’ny nosy, izay nandray anay sady nampiantrano anay tsara nandritra ny telo andro. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nararin’ny tazo sady nivalan-dra ny rain’i Poplio; niditra tao aminy i Paoly dia nivavaka sady nametra-tanana taminy ka nahasitrana azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vita izay dia tonga koa ny sasany izay narary teo amin’ny nosy dia sitrana koa ireo. '
