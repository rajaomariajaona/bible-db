document_id: EXO.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy koa NY TOMPO tamin’i Mosesy: Lazao amin’i Arona hoe: Atsory ny tananao izay mitana ny tehinao eny ambonin’ny sampan-drano ary eny ambonin’ny lakandrano sy ny heniheny ka ampiakaro ny sahona ho eny amin’ny tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary natsotran’i Arona teo ambonin’ny ranon’i Ejipta ny tanany; dia niakatra ny sahona ka nanenika ny tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary mba nanao toy izany koa tamin’ny sikidiny ny ombiasy ka nampiakatra ny sahona ho eny amin’ny tany Ejipta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nampiantso an’i Mosesy sy i Arona i Farao ka niteny hoe: Mifonà ho ahy amin’NY TOMPO mba hampialany ny sahona amiko sy amin’ny vahoakako; fa havelako handeha ny olona mba hamonoany zavatra hatao fanatitra ho an’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hoy i Mosesy tamin’i Farao: Omena anao ny voninahitra hanendry izay fotoana hifonako ho anao sy ny mpanomponao ary ny vahoakanao, hanesorana ny sahona aminao sy amin’ny tranonao, koa dia ho ao Neily ihany sisa no hahitana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy i Farao: Rahampitso. Ary hoy kosa i Mosesy: Aoka ary ho araka ny teninao, mba hahafantaranao fa tsy misy tahaka NY TOMPO Andriamanitray. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny sahona dia hiala aminao sy amin’ny tranonao sy ny mpanomponao ary ny vahoakanao ka ho ao Neily ihany sisa no hahitana azy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niala teo amin’i Farao i Mosesy sy i Arona. Ary nitaraina mafy tamin’NY TOMPO i Mosesy ny amin’ny sahona izay efa namelezany an’i Farao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nataon’NY TOMPO araka ny tenin’i Mosesy izany ka maty ny sahona teny amin’ny trano sy teny amin’ny tokotany ary tany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nangonina hivangongo teny rehetra teny ireny ka tonga maimbo ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nony hitan’i Farao anefa fa nisy hiainana dia nanamafy ny fony indray izy ka tsy nihaino azy mirahalahy, dia araka izay efa nolazain’NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza fahatelo: Ny moka'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy indray NY TOMPO tamin’i Mosesy: Lazao amin’i Arona hoe: Atsory ny tehinao dia kapohy ny vovo-tany fa ho tonga moka manerana ny tany Ejipta manontolo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia notanterahiny izany ka natsotran’i Arona ny tanany izay mitana ny tehiny, ary nokapohiny ny vovo-tany; dia nisy moka teny amin’ny olona sy teny amin’ny biby fiompy, satria tonga moka avokoa ny vovo-tany rehetra manerana ny tany Ejipta manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary mba nanao toy izany tamin’ny sikidiny koa ny ombiasy mba hahatonga moka, kanjo tsy hainy. Teny amin’ny olona sy teny amin’ny biby fiompy ny moka. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy ny ombiasy tamin’i Farao: Rantsantanan’Andriamanitra ity! Nefa nihamafy ny fon’i Farao ka tsy nihaino azy mirahalahy izy, araka izay efa nolazain’NY TOMPO.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza fahefatra: Ny fihitra betsaka'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Mosesy: Mifohaza vao maraina ka mijoroa eo anatrehan’i Farao fa indro, handeha ho any amoron-drano izy ka lazao aminy hoe: Izao no lazain’NY TOMPO: Avelao ny oloko handeha hanompo Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha tsy mamela ny oloko handeha ianao, indro andefasako fihitra betsaka hamely anao, ny mpanomponao, ny vahoakanao ary ny tranonao, dia ho feno fihitra ny tranon’ny Ejiptiana sy ny tany izay itoerany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa amin’izany andro izany dia havahako ny tany Gosena izay itoeran’ny oloko ka tsy mba hisy fihitra any, mba hahafantaranao fa Izaho no TOMPO eo afovoan’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia hasiako fiavahana amin’ny oloko sy ny olonao. Rahampitso no hisian’ity famantarana ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nataon’NY TOMPO tokoa izany ka nisy fihitra be dia be tao amin’ny tranon’i Farao sy tao amin’ny tranon’ny mpanompony ary teny amin’ny tany Ejipta manontolo; koa simba ny tany noho ny fihitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nampiantso an’i Mosesy sy i Arona i Farao ka niteny hoe: Mandehana ianareo ka mamonoa zavatra hatao fanatitra ho an’Andriamanitrareo eto amin’ity tany ity ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy i Mosesy: Tsy azo atao izany; fa izay zava-maharikoriko amin’ny Ejiptiana no hovonoinay hatao fanatitra ho an’NY TOMPO Andriamanitray; koa indro, raha izay zava-maharikoriko amin’ny Ejiptiana no vonoinay eo imasony hatao fanatitra, moa tsy hotorahany vato va izahay? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Handeha lalan-kateloana any an-tany efitra izahay dia hamono zavatra hatao fanatitra ho an’NY TOMPO Andriamanitray, araka izay holazainy aminay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy i Farao: Havelako handeha ihany ianareo mba hamono zavatra hatao fanatitra ho an’NY TOMPO Andriamanitrareo any an-tany efitra; kanefa izao: Aza mandeha lavitra loatra ianareo, ary mifonà ho ahy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy i Mosesy: Indro, hiala eto aminao aho ka hangataka amin’NY TOMPO mba hialan’ny fihitra amin’i Farao sy ny mpanompony ary ny vahoakany rahampitso; fa aoka kosa anefa tsy hamitaka intsony i Farao ka tsy hamela ny olona handeha hamono zavatra hatao fanatitra ho an’NY TOMPO indray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary niala teo amin’i Farao i Mosesy ka nifona tamin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary NY TOMPO nanatanteraka izany araka ny tenin’i Mosesy, dia nampiala ny fihitra rehetra tamin’i Farao sy ny mpanompony ary ny vahoakany ka tsy nisy niangana na dia iray akory aza ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Kanjo nanamafy ny fony indray i Farao ka tsy namela ny olona handeha.
