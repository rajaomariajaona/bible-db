document_id: EZK.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy maintsy manary ny sampy ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nisy loholon’ny Israely tonga tao amiko ka nipetraka teo anoloako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', ireto olona ireto dia efa nampiorina ny sampiny ao am-pony, ary ny fahatafintohinana mahameloka azy dia apetrany eo anoloany. Moa hanaiky hanontanian’ireto va Aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa mitenena aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Ny amin’ny olona rehetra amin’ny taranak’Israely izay mampiorina ny sampiny ao am-pony ary mametraka ny fahatafintohinana mahameloka azy eo anoloany ary manatona ny mpaminany, Izaho TOMPO no hamaly azy araka ny habetsaky ny sampiny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mba hisamborako ny taranak’Israely amin’ny fony satria efa nihemotra niala Tamiko izy rehetra noho ny sampiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa lazao amin’ny taranak’Israely hoe: Izao no lazain’NY TOMPO Andriamanitra: Mibebaha, dia mialà amin’ny sampinareo sy ny fahavetavetanareo rehetra; eny, mialà aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa na iza na iza amin’ny taranak’Israely, na amin’ny vahiny izay mivahiny eo amin’ny Israely, no misaraka Amiko ka mampiorina ny sampiny ao am-pony ary mametraka ny fahatafintohinana mahameloka azy eo anoloany sady manatona ny mpaminany hanontany Amiko, dia ny tenako, Izaho TOMPO ihany no hamaly azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hanandrina izany olona izany ny tavako ka hataoko mahita loza izy mba ho famantarana sy ho oha-teny, ary hofongorako tsy ho eo amin’ny oloko izy dia ho fantatrareo fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha misy voataona ny mpaminany ka milaza zavatra dia Izaho TOMPO no nitaona izany mpaminany izany; hatsotrako aminy ny tanako ka hofongorako tsy ho eo amin’ny Israely oloko izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hitondra ny heloky ny tenany izy; ny heloky ny mpaminany dia hitovy amin’ny helok’izay manontany aminy koa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: mba tsy hialan’ny taranak’Israely Amiko intsony ary tsy handotoany ny tenany intsony amin’ny fahadisoany rehetra; fa ho oloko izy ary Izaho ho Andriamaniny, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy ho hay sakanana ny fitsaran’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tonga tamiko indray ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', raha misy tany manota Amiko ka manao izay mahadiso, ary atsotrako aminy ny tanako ka tapahiko ny mofo tohan’ainy sady andefasako mosary, ary aringako avokoa ny olona sy ny biby, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary na dia ao aza ireto telo lahy ireto, dia i Noa sy i Daniela ary i Joba, dia ny tenany ihany no ho voavonjiny noho ny fahamarinany, hoy NY TOMPO Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha mampandeha biby masiaka eo amin’ny tany Aho ka mandringana ny zana-bahoaka ireny, ary lao ny tany ka tsy azon’olona aleha noho ny biby, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'na dia ao aza ireo telo lahy ireo, raha velona koa Aho, hoy NY TOMPO Andriamanitra dia tsy hahavonjy ny zanany lahy na ny zanany vavy izy; ny tenany ihany no ho voavonjy, fa ny tany kosa ho lao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha mahatonga sabatra mamely izany tany izany Aho ka miteny hoe: Aoka hotetezin-tsabatra ny tany ka hofongorako izy, na ny olona na ny biby, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'na dia ao aza ireo telo lahy ireo, raha velona koa Aho, hoy NY TOMPO Andriamanitra, dia tsy hahavonjy ny zanany lahy na ny zanany vavy ireo, fa ny tenany ihany no ho voavonjy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha mandefa areti-mandringana mamely izany tany izany Aho sady aidiko aminy ny fahatezerako amin’ny fandatsahan-dra mba haharingana ny olona sy ny biby ao aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: na dia ao aza i Noa sy i Daniela ary i Joba, raha velona koa Aho, hoy NY TOMPO Andriamanitra, dia tsy hahavonjy ny zanany lahy na ny zanany vavy ireo, fa ny tenany ihany no ho voavonjiny noho ny fahamarinany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO Andriamanitra: Koa mainka raha alefako hamely an’i Jerosalema ireto fitsarako efatra mandoza ireto, dia ny sabatra sy ny mosary ary ny biby masiaka sy ny areti-mandringana, mba hahafongotra azy, na olona na biby! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kanefa indro, hisy sisa afaka ihany izy hoentina mivoaka, dia ny zanakalahy sy ny zanakavavy. Indro, hivoaka ho any aminareo ireo ka ho hitanareo ny alehany sy ny ataony, dia hionona ianareo noho ny amin’ny loza rehetra izay nataoko mihatra amin’i Jerosalema, dia izay rehetra nataoko mihatra aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Eny, hampionona anareo ireo, rehefa hitanareo ny alehany sy ny ataony dia ho fantatrareo fa tsy nataotaoko foana izay rehetra nataoko taminy, hoy NY TOMPO Andriamanitra.
