document_id: ECC.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Samy manana ny fotoanany ny zavatra rehetra
  - type: text
    content: 'Misy fotoana ho an’ny zavatra tsirairay ary misy fotoana ho an’ny raharaha rehetra etỳ ambanin’ny lanitra:'
  '10':
  - type: text
    content: 'Efa hitako ny asa izay nomen’Andriamanitra ny zanak’olombelona hisahiranany. '
  '11':
  - type: text
    content: 'Ny zavatra rehetra dia samy nataony ho mendrika amin’ny fotoanany avy; ary ny mandrakizay dia efa nataony tao am-pony, kanefa tsy hitan’ny olona ny asan’Andriamanitra na hatramin’ny voalohany na hatramin’ny farany. '
  '12':
  - type: text
    content: 'Fantatro fa:'
  - type: text
    content: Tsy misy tsara amin’ny olombelona
  - type: text
    content: afa-tsy ny mifaly sy ny manao ny tsara raha mbola velona koa izy.
  '13':
  - type: text
    content: Fantatro koa fa raha mihinana sy misotro ary finaritra amin’ny fisasarany rehetra ny olombelona dia fanomezan’Andriamanitra izany.
  '14':
  - type: text
    content: 'Fantatro fa izay rehetra ataon’Andriamanitra dia haharitra mandrakizay:'
  - type: text
    content: Tsy azo ampiana ary tsy azo analana izany.
  - type: text
    content: Ataon’Andriamanitra izany mba hahatonga ny olona hatahotra Azy.
  '15':
  - type: text
    content: Izay atao izao dia efa natao fahiny ary izay mbola ho avy dia efa nisy fahiny ihany koa;
  - type: text
    content: na dia ny efa lasa aza dia mbola tadiavin’Andriamanitra indray.
  - type: heading
    content: Hiafara amin’ny fahafatesana ny rehetra
  '16':
  - type: text
    content: 'Izao koa no hitako tetỳ ambanin’ny masoandro:'
  - type: text
    content: Eo amin’ny toeran’ny fitsarana dia ao ny haratsiam-panahy;
  - type: text
    content: ary eo amin’ny toeran’ny fahamarinana dia ao ihany koa ny ratsy fanahy.
  '17':
  - type: text
    content: 'Hoy aho anakampo:'
  - type: text
    content: Samy hotsarain’Andriamanitra na ny marina na ny ratsy fanahy;
  - type: text
    content: fa samy manana ny androny avy ny raharaha rehetra sy ny asa rehetra etỳ.
  '18':
  - type: text
    content: 'Hoy aho anakampo, ny amin’ny zanak’olombelona: Ny mba hizahan’Andriamanitra toetra azy izany ka ho hitany fa raha ny tenany ihany dia biby izy. '
  '19':
  - type: text
    content: 'Fa izay manjo ny zanak’olombelona no manjo ny biby; mitovy ihany ny mihatra amin’izy roa tonta; fa toy ny ahafatesan’ny iray no ahafatesan’ny iray koa; eny, iray ihany ny fofonaina ananan’izy rehetra; ary tsy misy ihoaran’ny olona amin’ny biby; fa samy zava-poana daholo izy ireo. '
  '2':
  - type: text
    content: Ao ny andro iterahana ary ao ny andro ahafatesana;
  - type: text
    content: ao ny andro ambolena ary ao ny andro anongotana ny nambolena;
  '20':
  - type: text
    content: 'Izy rehetra dia samy toerana iray ihany no alehany:'
  - type: text
    content: Avy tamin’ny vovoka izy rehetra
  - type: text
    content: ary samy hiverina ho amin’ny vovoka ihany indray.
  '21':
  - type: text
    content: 'Iza no mahalala raha miakatra ho any ambony ny fanahin’ny olombelona, ary raha midina any ambany, amin’ny tany, ny fanahin’ny biby? '
  '22':
  - type: text
    content: Efa hitako fa tsy misy tsara noho ny ifalian’ny olona amin’ny asany satria izany no anjarany;
  - type: text
    content: fa iza no hitondra azy hiverina mba hahita izay ho avy any aorianany?
  '3':
  - type: text
    content: ao ny andro amonoana ary ao ny andro anasitranana;
  - type: text
    content: ao ny andro andravana ary ao ny andro ananganana;
  '4':
  - type: text
    content: ao ny andro itomaniana ary ao ny andro ihomehezana;
  - type: text
    content: ao ny andro isaonana ary ao ny andro andihizana;
  '5':
  - type: text
    content: ao ny andro anariam-bato ary ao ny andro anangonam-bato;
  - type: text
    content: ao ny andro amihinana ary ao ny andro ifadiana tsy hamihinana;
  '6':
  - type: text
    content: ao ny andro itadiavana ary ao ny andro ahaverezana;
  - type: text
    content: ao ny andro itahirizana ary ao ny andro anariana;
  '7':
  - type: text
    content: ao ny andro androvitana ary ao ny andro anjairana;
  - type: text
    content: ao ny andro anginana ary ao ny andro itenenana;
  '8':
  - type: text
    content: ao ny andro itiavana ary ao ny andro ankahalana;
  - type: text
    content: ao ny andro iadiana ary ao ny andro ihavanana.
  '9':
  - type: text
    content: 'Inona no soa azon’ny mpiasa amin’izay isasarany? '
