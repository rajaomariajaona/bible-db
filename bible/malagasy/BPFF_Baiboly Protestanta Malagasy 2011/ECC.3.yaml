document_id: ECC.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samy manana ny fotoanany ny zavatra rehetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Misy fotoana ho an’ny zavatra tsirairay ary misy fotoana ho an’ny raharaha rehetra etỳ ambanin’ny lanitra:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ao ny andro iterahana ary ao ny andro ahafatesana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao ny andro ambolena ary ao ny andro anongotana ny nambolena;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ao ny andro amonoana ary ao ny andro anasitranana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao ny andro andravana ary ao ny andro ananganana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ao ny andro itomaniana ary ao ny andro ihomehezana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao ny andro isaonana ary ao ny andro andihizana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ao ny andro anariam-bato ary ao ny andro anangonam-bato;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao ny andro amihinana ary ao ny andro ifadiana tsy hamihinana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ao ny andro itadiavana ary ao ny andro ahaverezana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao ny andro itahirizana ary ao ny andro anariana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ao ny andro androvitana ary ao ny andro anjairana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao ny andro anginana ary ao ny andro itenenana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ao ny andro itiavana ary ao ny andro ankahalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao ny andro iadiana ary ao ny andro ihavanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Inona no soa azon’ny mpiasa amin’izay isasarany? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Efa hitako ny asa izay nomen’Andriamanitra ny zanak’olombelona hisahiranany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny zavatra rehetra dia samy nataony ho mendrika amin’ny fotoanany avy; ary ny mandrakizay dia efa nataony tao am-pony, kanefa tsy hitan’ny olona ny asan’Andriamanitra na hatramin’ny voalohany na hatramin’ny farany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fantatro fa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy tsara amin’ny olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy ny mifaly sy ny manao ny tsara raha mbola velona koa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fantatro koa fa raha mihinana sy misotro ary finaritra amin’ny fisasarany rehetra ny olombelona dia fanomezan’Andriamanitra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fantatro fa izay rehetra ataon’Andriamanitra dia haharitra mandrakizay:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy azo ampiana ary tsy azo analana izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataon’Andriamanitra izany mba hahatonga ny olona hatahotra Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay atao izao dia efa natao fahiny ary izay mbola ho avy dia efa nisy fahiny ihany koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia ny efa lasa aza dia mbola tadiavin’Andriamanitra indray.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hiafara amin’ny fahafatesana ny rehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao koa no hitako tetỳ ambanin’ny masoandro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo amin’ny toeran’ny fitsarana dia ao ny haratsiam-panahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo amin’ny toeran’ny fahamarinana dia ao ihany koa ny ratsy fanahy.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy aho anakampo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy hotsarain’Andriamanitra na ny marina na ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa samy manana ny androny avy ny raharaha rehetra sy ny asa rehetra etỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy aho anakampo, ny amin’ny zanak’olombelona: Ny mba hizahan’Andriamanitra toetra azy izany ka ho hitany fa raha ny tenany ihany dia biby izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa izay manjo ny zanak’olombelona no manjo ny biby; mitovy ihany ny mihatra amin’izy roa tonta; fa toy ny ahafatesan’ny iray no ahafatesan’ny iray koa; eny, iray ihany ny fofonaina ananan’izy rehetra; ary tsy misy ihoaran’ny olona amin’ny biby; fa samy zava-poana daholo izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izy rehetra dia samy toerana iray ihany no alehany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy tamin’ny vovoka izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary samy hiverina ho amin’ny vovoka ihany indray.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Iza no mahalala raha miakatra ho any ambony ny fanahin’ny olombelona, ary raha midina any ambany, amin’ny tany, ny fanahin’ny biby? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Efa hitako fa tsy misy tsara noho ny ifalian’ny olona amin’ny asany satria izany no anjarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza no hitondra azy hiverina mba hahita izay ho avy any aorianany?
