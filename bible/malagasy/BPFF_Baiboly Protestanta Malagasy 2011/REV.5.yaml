document_id: REV.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny boky misy tombo-kase fito
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako fa indro, nisy boky voasoratra tao anatiny sy teo ivohony, voahidy mafy tamin’ny tombo-kase fito, teo an-tanana ankavanan’Ilay nipetraka teo ambonin’ny sezafiandrianana. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nataonao fanjakana sy mpisorona ho an’Andriamanitsika ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanjaka ambonin’ny tany izy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahita aho, sady nandre feon’anjely maro manodidina ny sezafiandrianana sy ny zavamananaina ary ny loholona ary ny isany dia alinalina sy arivoarivo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny tamin’ny feo mahery izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Zanak’ondry izay novonoina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mendrika handray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hery, ny harena, ny fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny faherezana, ny haja, ny voninahitra ary ny saotra.
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ny zavaboahary rehetra, na izay any an-danitra, na izay etỳ ambonin’ny tany sy any ambanin’ny tany, na izay eny ambonin’ny ranomasina mbamin’izay rehetra ao anatiny, dia reko samy niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’Ilay mipetraka eo ambonin’ny sezafiandrianana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho an’ny Zanak’ondry anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny saotra, ny haja, ny voninahitra ary ny fanjakana mandrakizay mandrakizay!
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ny zavamananaina efatra dia niteny hoe: '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: '! Ary ny loholona dia niankohoka ka nivavaka.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako fa indro, nisy anjely mahery niantso tamin’ny feo mafy hoe: Iza no mendrika hanokatra ny boky sy hamaha ny tombo-kaseny? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nisy anefa tany an-danitra, na tetỳ an-tany, na tany ambanin’ny tany, nahasokatra ny boky na nahajery azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitomany mafy aho satria tsy nisy hita mendrika hanokatra ny boky na hijery azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy anefa ny iray tamin’ny loholona tamiko hoe: Aza mitomany; indro, ny Liona avy amin’ny firenen’i Joda, dia ny Solofon’i Davida, no efa nandresy ka hanokatra ny boky sy hamaha ny tombo-kaseny fito.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako fa indro, teo afovoan’ny sezafiandrianana sy ny zavamananaina efatra ary teo afovoan’ny loholona dia nisy Zanak’ondry nitsangana tahaka ny efa voavono. Nanana tandroka fito sy maso fito Izy, dia ny Fanahy fiton’Andriamanitra nirahina hankany amin’ny tany rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tonga Izy ka nandray ny boky teo an-tanana ankavanan’Ilay nipetraka teo ambonin’ny sezafiandrianana.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa nandray ny boky Izy dia niankohoka teo anatrehan’ny Zanak’ondry ny zavamananaina efatra sy ny loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Presbytera.
      marker-yv: yv-n
    - type: text
      text: ' efatra amby roapolo, ary samy nanana lokanga sy lovia volamena feno ditin-kazo manitra izy, dia ny vavaka ataon’ny olona masina izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nihira tononkira vaovao izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no mendrika handray ny boky sy hamaha ny tombo-kaseny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria voavono Ianao, ary ny ranao no nanavotanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: olona avy tamin’ny fokom-pirenena rehetra, ny samihafa fiteny, ny olona ary ny firenena rehetra, ho an’Andriamanitra;
