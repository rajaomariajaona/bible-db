document_id: REV.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny boky misy tombo-kase fito
  - type: text
    content: 'Ary hitako fa indro, nisy boky voasoratra tao anatiny sy teo ivohony, voahidy mafy tamin’ny tombo-kase fito, teo an-tanana ankavanan’Ilay nipetraka teo ambonin’ny sezafiandrianana. '
  '10':
  - type: text
    content: nataonao fanjakana sy mpisorona ho an’Andriamanitsika ireo
  - type: text
    content: ary hanjaka ambonin’ny tany izy.
  '11':
  - type: text
    content: 'Ary nahita aho, sady nandre feon’anjely maro manodidina ny sezafiandrianana sy ny zavamananaina ary ny loholona ary ny isany dia alinalina sy arivoarivo. '
  '12':
  - type: text
    content: 'Niteny tamin’ny feo mahery izy hoe:'
  - type: text
    content: Ny Zanak’ondry izay novonoina
  - type: text
    content: dia mendrika handray
  - type: text
    content: ny hery, ny harena, ny fahendrena,
  - type: text
    content: ny faherezana, ny haja, ny voninahitra ary ny saotra.
  '13':
  - type: text
    content: 'Ary ny zavaboahary rehetra, na izay any an-danitra, na izay etỳ ambonin’ny tany sy any ambanin’ny tany, na izay eny ambonin’ny ranomasina mbamin’izay rehetra ao anatiny, dia reko samy niteny hoe:'
  - type: text
    content: Ho an’Ilay mipetraka eo ambonin’ny sezafiandrianana
  - type: text
    content: sy ho an’ny Zanak’ondry anie
  - type: text
    content: ny saotra, ny haja, ny voninahitra ary ny fanjakana mandrakizay mandrakizay!
  '14':
  - type: text
    content: 'Ary ny zavamananaina efatra dia niteny hoe: '
  - type: text
    content: Amena
  - type: text
    content: '! Ary ny loholona dia niankohoka ka nivavaka.'
  '2':
  - type: text
    content: 'Ary hitako fa indro, nisy anjely mahery niantso tamin’ny feo mafy hoe: Iza no mendrika hanokatra ny boky sy hamaha ny tombo-kaseny? '
  '3':
  - type: text
    content: 'Tsy nisy anefa tany an-danitra, na tetỳ an-tany, na tany ambanin’ny tany, nahasokatra ny boky na nahajery azy. '
  '4':
  - type: text
    content: 'Dia nitomany mafy aho satria tsy nisy hita mendrika hanokatra ny boky na hijery azy. '
  '5':
  - type: text
    content: 'Hoy anefa ny iray tamin’ny loholona tamiko hoe: Aza mitomany; indro, ny Liona avy amin’ny firenen’i Joda, dia ny Solofon’i Davida, no efa nandresy ka hanokatra ny boky sy hamaha ny tombo-kaseny fito.'
  '6':
  - type: text
    content: 'Ary hitako fa indro, teo afovoan’ny sezafiandrianana sy ny zavamananaina efatra ary teo afovoan’ny loholona dia nisy Zanak’ondry nitsangana tahaka ny efa voavono. Nanana tandroka fito sy maso fito Izy, dia ny Fanahy fiton’Andriamanitra nirahina hankany amin’ny tany rehetra. '
  '7':
  - type: text
    content: Tonga Izy ka nandray ny boky teo an-tanana ankavanan’Ilay nipetraka teo ambonin’ny sezafiandrianana.
  '8':
  - type: text
    content: Rehefa nandray ny boky Izy dia niankohoka teo anatrehan’ny Zanak’ondry ny zavamananaina efatra sy ny loholona
  - type: note
    content: 'Na: Presbytera.'
  - type: text
    content: ' efatra amby roapolo, ary samy nanana lokanga sy lovia volamena feno ditin-kazo manitra izy, dia ny vavaka ataon’ny olona masina izany. '
  '9':
  - type: text
    content: 'Nihira tononkira vaovao izy hoe:'
  - type: text
    content: Ianao no mendrika handray ny boky sy hamaha ny tombo-kaseny;
  - type: text
    content: satria voavono Ianao, ary ny ranao no nanavotanao
  - type: text
    content: olona avy tamin’ny fokom-pirenena rehetra, ny samihafa fiteny, ny olona ary ny firenena rehetra, ho an’Andriamanitra;
