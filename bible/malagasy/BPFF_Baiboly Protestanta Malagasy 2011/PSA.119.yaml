verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zavamiafina sy zava-mahagaga ny lalànan’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: qa
    children:
    - type: text
      text: alef א
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra ny mahitsy lalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay mandeha araka ny lalànan’NY TOMPO.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny foko manontolo no nitadiavako Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza avela hivily hiala amin’ny didinao aho.
  '100':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hendry noho ny zokiolona aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny didinao no tandremako.
  '101':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arovako ny tongotro tsy ho amin’izay lalan-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitandremako ny teninao.
  '102':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba miala amin’ny fitsipikao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao no mampianatra ahy.
  '103':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endre ny hamamin’ny teninao raha andramako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoatra noho ny tantely ato am-bavako aza!
  '104':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny didinao no nahazoako fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no ankahalako ny lalam-pitaka rehetra.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: non נ
    marker-yv: yv-h
  '105':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fanilon’ny tongotro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fanazavana ny lalako ny teninao.
  '106':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nianiana aho ka efaiko izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hitandrina ny fitsipikao marina aho.
  '107':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampahoriana loatra aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, velomy araka ny teninao aho.
  '108':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, aoka anie mba hankasitrahanao ny fanatitra an-tsitrapo aloaky ny vavako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampianaro ahy ny fitsipikao.
  '109':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrakariva, an-tenda ihany ny aiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy manadino ny lalànanao aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ato am-poko no iraketako ny teninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hanotako Aminao.
  '110':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao vela-pandrika haningotra ahy ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy mania miala amin’ny didinao aho.
  '111':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa noraisiko ho lovako mandrakizay ny teny vavolombelonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria fifalian’ny foko izany.
  '112':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apetrako ny foko hankatò ny didinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandrakizay, hatramin’ny farany.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: samek ס
    marker-yv: yv-h
  '113':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halako ny mpiroa saina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lalànanao no tiako.
  '114':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fiereko sy ampingako Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny teninao no andrasako.
  '115':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mialà amiko ianareo mpanao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitandremako ny didin’Andriamanitro.
  '116':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tohàny araka ny teninao aho mba ho velona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka tsy ho menatra amin’ny fanantenako aho.
  '117':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tohàny aho mba ho voavonjy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho faly mandrakariva hijery ny didinao.
  '118':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataonao tsinontsinona izay rehetra mania amin’ny didinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, lainga ny fitaka ataony.
  '119':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nataonao fanary tain-drendrika ny ratsy fanahy rehetra amin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no itiavako ny teny vavolombelonao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie Ianao, RY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampianaro ahy ny didinao.
  '120':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mipararetra ny nofoko noho ny fahatahorana Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary matahotra ny fitsaranao aho.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: aìn ע
    marker-yv: yv-h
  '121':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaraka ny fitsipika sy ny fahamarinana aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza manolotra ahy ho amin’ny mpampahory ahy.
  '122':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iantohy ny mpanomponao mba ho soa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza avela hampahory ahy ny mpirehareha.
  '123':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pahina ny masoko miandry ny famonjenao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tenin’ny fahamarinanao.
  '124':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy amin’ny mpanomponao araka ny famindramponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampianaro ahy ny didinao.
  '125':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanomponao aho ka ampahirato ny saiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho fantatro ny teny vavolombelonao.
  '126':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa andro tokony hampisehoan’NY TOMPO ny asany izao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mandika ny lalànanao ny olona.
  '127':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no itiavako ny didinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoatra noho ny volamena; eny, noho ny volamena tsy miharo aza.
  '128':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no iheverako ny didy rehetra ho marina avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: halako ny lalam-pitaka rehetra.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: pe פ
    marker-yv: yv-h
  '129':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahagaga ny teny vavolombelonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izany no itandremako azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny molotro no nentiko nilaza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fitsipika rehetra naloaky ny vavanao.
  '130':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitondra fahazavana ny famoahana ny hevitry ny teninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manome fahalalana ho an’ny olona tso-po.
  '131':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitanatana vava aho ka misento,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny didinao no iriko.
  '132':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Todiho aho ka mamindrà fo amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny tokony ho anjaran’izay tia ny anaranao.
  '133':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampioreno amin’ny teninao ny diako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza avela hanapaka ahy izay mety ho faharatsiana.
  '134':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo amin’ny fampahoriana ataon’ny olona aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitandrina ny didinao.
  '135':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampamirapirato amin’ny mpanomponao ny tavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampianaro ahy ny didinao.
  '136':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rano mandriaka no mijononoka amin’ny masoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny tsy fitandreman’ny olona ny lalànanao.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: tsade צ
    marker-yv: yv-h
  '137':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina Ianao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahitsy ny fitsaranao.
  '138':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa voadidinao amin’ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fahatokiana feno ny teny vavolombelonao.
  '139':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandevona ahy ny zotom-poko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nanadino ny teninao ny mpandrafy ahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lalan’ny teny vavolombelonao no ifaliako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny ifaliako amin’ny harena rehetra.
  '140':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voazaha toetra tamin’ny memy ny teninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tian’ny mpanomponao.
  '141':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kely aho ka natao tsinontsinona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hadinoiko ny didinao.
  '142':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinanao dia fahamarinana mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary marina ny lalànanao.
  '143':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahoriana sy fahaterena no nahazo ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny didinao no firavoravoako.
  '144':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinan’ny teny vavolombelonao dia mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: omeo fahiratan-tsaina aho mba ho velona.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: kof ק
    marker-yv: yv-h
  '145':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny foko manontolo no nentiko nitaraina hoe: Valio aho, TOMPO ô;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny didinao no hotandremako;
  '146':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nitaraina taminao aho hoe: Vonjeo aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitandrina ny didinao.
  '147':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mbola tsy nazava ratsy aza ny andro dia nitaraina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny teninao no andrasako.
  '148':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nialoha ny fotoam-piambenana amin’ny alina ny masoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hisaintsainako ny teninao.
  '149':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy araka ny famindramponao ny feoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, velomy aho araka ny fitsipikao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny didinao no saintsainiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lalanao no dinihiko.
  '150':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa manakaiky ireo izay fatra-panaraka ny ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay manalavitra ny lalànanao.
  '151':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akaiky Ianao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary marina ny didinao rehetra.
  '152':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa fantatro ela tamin’ny teny vavolombelonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nampitoerinao ho mandrakizay ireny.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: res ר
    marker-yv: yv-h
  '153':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ny fahoriako ka vonjeo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mba hadinoiko ny lalànanao.
  '154':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soloy vava aho ka vonjeo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: velomy araka ny teninao aho.
  '155':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lavitra ny ratsy fanahy ny famonjena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy tadiaviny ny didinao.
  '156':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehibe ny antranao, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: velomy aho araka ny fitsipikao.
  '157':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maro ny mpanenjika sy mpandrafy ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba niala tamin’ny teny vavolombelonao aho.
  '158':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijery ny mpivadika aho ka maharikoriko ahy ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo tsy nitandrina ny teninao.
  '159':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ny fitiavako ny didinao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, velomy aho araka ny famindramponao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny didinao no iravoravoako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hadinoiko ny teninao.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: gimel ג
    marker-yv: yv-h
  '160':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahamarinana no tontalin-kevitry ny teninao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandrakizay ny fitsipikao marina rehetra.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: sin ש
    marker-yv: yv-h
  '161':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanenjika ahy tsy amin’antony ny mpanapaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny teninao no atahoran’ny foko.
  '162':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faly aho noho ny teninao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny mahazo babo be.
  '163':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halako ny lainga ka ataoko ho fahavetavetana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lalànanao no tiako.
  '164':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Impito isanandro no iderako Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fitsipikao marina.
  '165':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be fiadanana izay tia ny lalànanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy mahatafintohina azy.
  '166':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miandry ny famonjenao aho, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mankatò ny didinao.
  '167':
  - type: usfm
    marker: q1
