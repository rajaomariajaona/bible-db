segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zavamiafina sy zava-mahagaga ny lalànan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: qa
  children:
  - type: text
    text: alef א
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sambatra ny mahitsy lalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay mandeha araka ny lalànan’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sambatra izay mitandrina ny teny vavolombelony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitady Azy amin’ny fo manontolo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: eny, izay tsy manao ny ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mandeha araka ny lalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Namoaka ny didinao Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hotandremana tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Enga anie ka ho tafatoetra ny lalako
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitandremako ny didinao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia tsy ho menatra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mandinika ny didinao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hidera Anao amin’ny fo mahitsy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny ianarako ny fitsipikao marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny didinao no hotandremako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza dia mahafoy ahy Ianao!
- type: usfm
  marker: qa
  children:
  - type: text
    text: bet ב
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Inona no hiarovan’ny zatovo ny lalan-kalehany ho madio?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fitandremana araka ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tamin’ny foko manontolo no nitadiavako Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza avela hivily hiala amin’ny didinao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ato am-poko no iraketako ny teninao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hanotako Aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Isaorana anie Ianao, RY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampianaro ahy ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny molotro no nentiko nilaza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitsipika rehetra naloaky ny vavanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny lalan’ny teny vavolombelonao no ifaliako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny ifaliako amin’ny harena rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny didinao no saintsainiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lalanao no dinihiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny didinao no iravoravoako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hadinoiko ny teninao.
- type: usfm
  marker: qa
  children:
  - type: text
    text: gimel ג
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Asio soa aho mpanomponao mba ho velona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitandrina ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ampahirato ny masoko mba hahitako
- type: usfm
  marker: q1
  children:
  - type: text
    text: zava-mahagaga ao amin’ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vahiny etỳ an-tany aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza afeninao ahy ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Torotoro ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny faniriany ny fitsipikao amin’ny fotoana rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Voateninao mafy ny mpirehareha, dia ny olom-boaozona
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mania miala amin’ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Esory amiko ny fahafaham-baraka sy ny fanamavoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mitandrina ny teny vavolombelonao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Na dia ireo mpanapaka aza dia mipetraka ka mioko hamely ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izaho mpanomponao dia misaintsaina ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny teny vavolombelonao koa no firavoravoako
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mpanolotsaina ahy izany.
- type: usfm
  marker: qa
  children:
  - type: text
    text: dalet ד
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Miraikitra amin’ny vovoka ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: velomy aho araka ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nolazaiko Anao ny lalako dia namaly ahy Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampianaro ahy ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ampahalalao ahy ny lalan’ny didinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hisaintsaina ireo fahagagana nataonao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mipotrapotra-dranomaso aho noho ny alaheloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampaherezo aho araka ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Esory amiko ny lalan’ny lainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny lalànanao no anasoavy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny lalan’ny fahamarinanao no fidiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: apetrako eo anatrehako ny fitsipikao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mifikitra amin’ny teny vavolombelonao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, aza avela ho azon-kenatra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny lalan’ny didinao no ihazakazahako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ampahalalahinao ny foko.
- type: usfm
  marker: qa
  children:
  - type: text
    text: he ה
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: TOMPO ô, toroy ny lalan’ny didinao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hotandremako hatramin’ny farany izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Omeo fahiratan-tsaina aho mba hitandrina ny lalànanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hitandrina azy amin’ny foko manontolo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ampandehano amin’ny lalan’ny didinao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izany no sitrako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ataovy mirona ho amin’ny teny vavolombelonao ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy ho amin’ny fitiavan-karena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Avilio ny masoko tsy hijery zava-poana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: velomy amin’ny lalanao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tovy ny teninao amin’ny mpanomponao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’izay matahotra Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Esory ny fahafaham-baraka izay atahorako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsara ny fitsipikao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Indro, manina ny didinao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: velomy amin’ny fahamarinanao aho.
- type: usfm
  marker: qa
  children:
  - type: text
    text: vav ו
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Aoka ho tonga amiko ny famindramponao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny famonjenao, araka ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Dia hamaly izay miteny ratsy ahy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria matoky ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary aza dia esorina amin’ny vavako ny teny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa miandry ny fitsaranao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Dia hitandrina ny lalànanao mandrakariva aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mandrakizay doria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ary handeha amin’ny malalaka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny didinao no tadiaviko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Hilaza ny teny vavolombelonao eo anatrehan’ireo mpanjaka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho menatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ary hiravoravo amin’ny didinao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tiako ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Hasandratro ny tanako ho amin’ny didinao satria tiako ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hosaintsainiko ny didinao.
- type: usfm
  marker: qa
  children:
  - type: text
    text: zaìn ז
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Tsarovy ny teny natao tamiko mpanomponao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay teny nampanantenainao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Izany no mampionona ahy amin’ny fahoriako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny teninao no mamelona ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
