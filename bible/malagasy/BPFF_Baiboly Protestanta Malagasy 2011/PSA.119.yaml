type_code: plt
verses:
  '1':
  - type: heading
    content: Zavamiafina sy zava-mahagaga ny lalànan’Andriamanitra
  - type: heading
    content: alef א
  - type: text
    content: Sambatra ny mahitsy lalana,
  - type: text
    content: dia izay mandeha araka ny lalànan’NY TOMPO.
  '10':
  - type: text
    content: Tamin’ny foko manontolo no nitadiavako Anao;
  - type: text
    content: aza avela hivily hiala amin’ny didinao aho.
  '100':
  - type: text
    content: Hendry noho ny zokiolona aho
  - type: text
    content: satria ny didinao no tandremako.
  '101':
  - type: text
    content: Arovako ny tongotro tsy ho amin’izay lalan-dratsy
  - type: text
    content: mba hitandremako ny teninao.
  '102':
  - type: text
    content: Tsy mba miala amin’ny fitsipikao aho
  - type: text
    content: fa Ianao no mampianatra ahy.
  '103':
  - type: text
    content: Endre ny hamamin’ny teninao raha andramako,
  - type: text
    content: mihoatra noho ny tantely ato am-bavako aza!
  '104':
  - type: text
    content: Ny didinao no nahazoako fahalalana;
  - type: text
    content: izany no ankahalako ny lalam-pitaka rehetra.
  - type: heading
    content: non נ
  '105':
  - type: text
    content: Fanilon’ny tongotro
  - type: text
    content: sy fanazavana ny lalako ny teninao.
  '106':
  - type: text
    content: Efa nianiana aho ka efaiko izany,
  - type: text
    content: fa hitandrina ny fitsipikao marina aho.
  '107':
  - type: text
    content: Ampahoriana loatra aho;
  - type: text
    content: TOMPO ô, velomy araka ny teninao aho.
  '108':
  - type: text
    content: TOMPO ô, aoka anie mba hankasitrahanao ny fanatitra an-tsitrapo aloaky ny vavako
  - type: text
    content: ary ampianaro ahy ny fitsipikao.
  '109':
  - type: text
    content: Mandrakariva, an-tenda ihany ny aiko,
  - type: text
    content: kanefa tsy manadino ny lalànanao aho.
  '11':
  - type: text
    content: Ato am-poko no iraketako ny teninao
  - type: text
    content: mba tsy hanotako Aminao.
  '110':
  - type: text
    content: Manao vela-pandrika haningotra ahy ny ratsy fanahy,
  - type: text
    content: kanefa tsy mania miala amin’ny didinao aho.
  '111':
  - type: text
    content: Efa noraisiko ho lovako mandrakizay ny teny vavolombelonao
  - type: text
    content: satria fifalian’ny foko izany.
  '112':
  - type: text
    content: Apetrako ny foko hankatò ny didinao,
  - type: text
    content: mandrakizay, hatramin’ny farany.
  - type: heading
    content: samek ס
  '113':
  - type: text
    content: Halako ny mpiroa saina
  - type: text
    content: fa ny lalànanao no tiako.
  '114':
  - type: text
    content: Fiereko sy ampingako Ianao;
  - type: text
    content: ny teninao no andrasako.
  '115':
  - type: text
    content: Mialà amiko ianareo mpanao ratsy
  - type: text
    content: mba hitandremako ny didin’Andriamanitro.
  '116':
  - type: text
    content: Tohàny araka ny teninao aho mba ho velona
  - type: text
    content: ary aoka tsy ho menatra amin’ny fanantenako aho.
  '117':
  - type: text
    content: Tohàny aho mba ho voavonjy
  - type: text
    content: ka ho faly mandrakariva hijery ny didinao.
  '118':
  - type: text
    content: Ataonao tsinontsinona izay rehetra mania amin’ny didinao
  - type: text
    content: eny, lainga ny fitaka ataony.
  '119':
  - type: text
    content: Efa nataonao fanary tain-drendrika ny ratsy fanahy rehetra amin’ny tany;
  - type: text
    content: izany no itiavako ny teny vavolombelonao.
  '12':
  - type: text
    content: Isaorana anie Ianao, RY TOMPO;
  - type: text
    content: ampianaro ahy ny didinao.
  '120':
  - type: text
    content: Mipararetra ny nofoko noho ny fahatahorana Anao
  - type: text
    content: ary matahotra ny fitsaranao aho.
  - type: heading
    content: aìn ע
  '121':
  - type: text
    content: Manaraka ny fitsipika sy ny fahamarinana aho;
  - type: text
    content: aza manolotra ahy ho amin’ny mpampahory ahy.
  '122':
  - type: text
    content: Iantohy ny mpanomponao mba ho soa;
  - type: text
    content: aza avela hampahory ahy ny mpirehareha.
  '123':
  - type: text
    content: Pahina ny masoko miandry ny famonjenao
  - type: text
    content: sy ny tenin’ny fahamarinanao.
  '124':
  - type: text
    content: Ataovy amin’ny mpanomponao araka ny famindramponao
  - type: text
    content: ary ampianaro ahy ny didinao.
  '125':
  - type: text
    content: Mpanomponao aho ka ampahirato ny saiko
  - type: text
    content: mba ho fantatro ny teny vavolombelonao.
  '126':
  - type: text
    content: Efa andro tokony hampisehoan’NY TOMPO ny asany izao;
  - type: text
    content: fa mandika ny lalànanao ny olona.
  '127':
  - type: text
    content: Izany no itiavako ny didinao
  - type: text
    content: mihoatra noho ny volamena; eny, noho ny volamena tsy miharo aza.
  '128':
  - type: text
    content: Izany no iheverako ny didy rehetra ho marina avokoa;
  - type: text
    content: halako ny lalam-pitaka rehetra.
  - type: heading
    content: pe פ
  '129':
  - type: text
    content: Mahagaga ny teny vavolombelonao
  - type: text
    content: ka izany no itandremako azy.
  '13':
  - type: text
    content: Ny molotro no nentiko nilaza
  - type: text
    content: ny fitsipika rehetra naloaky ny vavanao.
  '130':
  - type: text
    content: Mitondra fahazavana ny famoahana ny hevitry ny teninao
  - type: text
    content: ka manome fahalalana ho an’ny olona tso-po.
  '131':
  - type: text
    content: Mitanatana vava aho ka misento,
  - type: text
    content: fa ny didinao no iriko.
  '132':
  - type: text
    content: Todiho aho ka mamindrà fo amiko,
  - type: text
    content: araka ny tokony ho anjaran’izay tia ny anaranao.
  '133':
  - type: text
    content: Ampioreno amin’ny teninao ny diako
  - type: text
    content: ary aza avela hanapaka ahy izay mety ho faharatsiana.
  '134':
  - type: text
    content: Vonjeo amin’ny fampahoriana ataon’ny olona aho
  - type: text
    content: dia hitandrina ny didinao.
  '135':
  - type: text
    content: Ampamirapirato amin’ny mpanomponao ny tavanao
  - type: text
    content: ary ampianaro ahy ny didinao.
  '136':
  - type: text
    content: Rano mandriaka no mijononoka amin’ny masoko
  - type: text
    content: noho ny tsy fitandreman’ny olona ny lalànanao.
  - type: heading
    content: tsade צ
  '137':
  - type: text
    content: Marina Ianao, TOMPO ô,
  - type: text
    content: ary mahitsy ny fitsaranao.
  '138':
  - type: text
    content: Efa voadidinao amin’ny fahamarinana
  - type: text
    content: sy ny fahatokiana feno ny teny vavolombelonao.
  '139':
  - type: text
    content: Mandevona ahy ny zotom-poko
  - type: text
    content: satria nanadino ny teninao ny mpandrafy ahy.
  '14':
  - type: text
    content: Ny lalan’ny teny vavolombelonao no ifaliako,
  - type: text
    content: tahaka ny ifaliako amin’ny harena rehetra.
  '140':
  - type: text
    content: Voazaha toetra tamin’ny memy ny teninao
  - type: text
    content: ka tian’ny mpanomponao.
  '141':
  - type: text
    content: Kely aho ka natao tsinontsinona,
  - type: text
    content: nefa tsy hadinoiko ny didinao.
  '142':
  - type: text
    content: Ny fahamarinanao dia fahamarinana mandrakizay
  - type: text
    content: ary marina ny lalànanao.
  '143':
  - type: text
    content: Fahoriana sy fahaterena no nahazo ahy,
  - type: text
    content: fa ny didinao no firavoravoako.
  '144':
  - type: text
    content: Ny fahamarinan’ny teny vavolombelonao dia mandrakizay;
  - type: text
    content: omeo fahiratan-tsaina aho mba ho velona.
  - type: heading
    content: kof ק
  '145':
  - type: text
    content: 'Ny foko manontolo no nentiko nitaraina hoe: Valio aho, TOMPO ô;'
  - type: text
    content: ny didinao no hotandremako;
  '146':
  - type: text
    content: 'Nitaraina taminao aho hoe: Vonjeo aho,'
  - type: text
    content: dia hitandrina ny didinao.
  '147':
  - type: text
    content: Raha mbola tsy nazava ratsy aza ny andro dia nitaraina aho;
  - type: text
    content: ny teninao no andrasako.
  '148':
  - type: text
    content: Nialoha ny fotoam-piambenana amin’ny alina ny masoko
  - type: text
    content: mba hisaintsainako ny teninao.
  '149':
  - type: text
    content: Henoy araka ny famindramponao ny feoko;
  - type: text
    content: TOMPO ô, velomy aho araka ny fitsipikao.
  '15':
  - type: text
    content: Ny didinao no saintsainiko
  - type: text
    content: ary ny lalanao no dinihiko.
  '150':
  - type: text
    content: Efa manakaiky ireo izay fatra-panaraka ny ratsy,
  - type: text
    content: dia izay manalavitra ny lalànanao.
  '151':
  - type: text
    content: Akaiky Ianao, TOMPO ô,
  - type: text
    content: ary marina ny didinao rehetra.
  '152':
  - type: text
    content: Efa fantatro ela tamin’ny teny vavolombelonao
  - type: text
    content: fa nampitoerinao ho mandrakizay ireny.
  - type: heading
    content: res ר
  '153':
  - type: text
    content: Jereo ny fahoriako ka vonjeo aho,
  - type: text
    content: fa tsy mba hadinoiko ny lalànanao.
  '154':
  - type: text
    content: Soloy vava aho ka vonjeo;
  - type: text
    content: velomy araka ny teninao aho.
  '155':
  - type: text
    content: Lavitra ny ratsy fanahy ny famonjena,
  - type: text
    content: satria tsy tadiaviny ny didinao.
  '156':
  - type: text
    content: Lehibe ny antranao, TOMPO ô;
  - type: text
    content: velomy aho araka ny fitsipikao.
  '157':
  - type: text
    content: Maro ny mpanenjika sy mpandrafy ahy;
  - type: text
    content: tsy mba niala tamin’ny teny vavolombelonao aho.
  '158':
  - type: text
    content: Mijery ny mpivadika aho ka maharikoriko ahy ireny,
  - type: text
    content: dia ireo tsy nitandrina ny teninao.
  '159':
  - type: text
    content: Jereo ny fitiavako ny didinao!
  - type: text
    content: TOMPO ô, velomy aho araka ny famindramponao.
  '16':
  - type: text
    content: Ny didinao no iravoravoako;
  - type: text
    content: tsy hadinoiko ny teninao.
  - type: heading
    content: gimel ג
  '160':
  - type: text
    content: Fahamarinana no tontalin-kevitry ny teninao;
  - type: text
    content: ary mandrakizay ny fitsipikao marina rehetra.
  - type: heading
    content: sin ש
  '161':
  - type: text
    content: Nanenjika ahy tsy amin’antony ny mpanapaka,
  - type: text
    content: nefa ny teninao no atahoran’ny foko.
  '162':
  - type: text
    content: Faly aho noho ny teninao,
  - type: text
    content: tahaka ny mahazo babo be.
  '163':
  - type: text
    content: Halako ny lainga ka ataoko ho fahavetavetana;
  - type: text
    content: ny lalànanao no tiako.
  '164':
  - type: text
    content: Impito isanandro no iderako Anao
  - type: text
    content: noho ny fitsipikao marina.
  '165':
  - type: text
    content: Be fiadanana izay tia ny lalànanao
  - type: text
    content: ary tsy misy mahatafintohina azy.
  '166':
  - type: text
    content: Miandry ny famonjenao aho, TOMPO ô,
  - type: text
    content: ka mankatò ny didinao.
  '167':
  - type: text
    content: Mitandrina ny teny vavolombelonao ny fanahiko
  - type: text
    content: ka tiako indrindra izany.
  '168':
  - type: text
    content: Mitandrina ny didinao sy ny teny vavolombelonao aho,
  - type: text
    content: fa ny lalan-kalehako rehetra dia eo anatrehanao.
  - type: heading
    content: tao ת
  '169':
  - type: text
    content: Aoka anie ho tonga eo anatrehanao ny fitarainako, TOMPO ô;
  - type: text
    content: omeo fahiratan-tsaina aho araka ny teninao.
  '17':
  - type: text
    content: Asio soa aho mpanomponao mba ho velona
  - type: text
    content: ka hitandrina ny teninao.
  '170':
  - type: text
    content: Aoka anie ho tonga eo anatrehanao ny fifonako;
  - type: text
    content: afaho aho araka ny teninao.
  '171':
  - type: text
    content: Aoka hiboiboika fiderana ny molotro,
  - type: text
    content: fa ampianarinao ahy ny didinao.
  '172':
  - type: text
    content: Hankalaza ny teninao ny lelako,
  - type: text
    content: fa marina ny didinao rehetra.
  '173':
  - type: text
    content: Aoka anie hamonjy ahy ny tananao,
  - type: text
    content: fa efa nifidy ny didinao aho.
  '174':
  - type: text
    content: Efa manina ny famonjenao aho, TOMPO ô,
  - type: text
    content: ary ny lalànanao no firavoravoako.
  '175':
  - type: text
    content: Aoka anie ho velona ny fanahiko ka hidera Anao
  - type: text
    content: ary aoka anie hamonjy ahy ny fitsaranao.
  '176':
  - type: text
    content: Efa nania aho; tadiavo toy ny fitady ondry very ny mpanomponao,
  - type: text
    content: fa tsy mba hadinoiko ny didinao.
  '18':
  - type: text
    content: Ampahirato ny masoko mba hahitako
  - type: text
    content: zava-mahagaga ao amin’ny lalànanao.
  '19':
  - type: text
    content: Vahiny etỳ an-tany aho;
  - type: text
    content: aza afeninao ahy ny didinao.
  '2':
  - type: text
    content: Sambatra izay mitandrina ny teny vavolombelony
  - type: text
    content: ka mitady Azy amin’ny fo manontolo;
  '20':
  - type: text
    content: Torotoro ny fanahiko
  - type: text
    content: noho ny faniriany ny fitsipikao amin’ny fotoana rehetra.
  '21':
  - type: text
    content: Voateninao mafy ny mpirehareha, dia ny olom-boaozona
  - type: text
    content: izay mania miala amin’ny didinao.
  '22':
  - type: text
    content: Esory amiko ny fahafaham-baraka sy ny fanamavoana;
  - type: text
    content: fa mitandrina ny teny vavolombelonao aho.
  '23':
  - type: text
    content: Na dia ireo mpanapaka aza dia mipetraka ka mioko hamely ahy;
  - type: text
    content: izaho mpanomponao dia misaintsaina ny didinao.
  '24':
  - type: text
    content: Ny teny vavolombelonao koa no firavoravoako
  - type: text
    content: eny, mpanolotsaina ahy izany.
  - type: heading
    content: dalet ד
  '25':
  - type: text
    content: Miraikitra amin’ny vovoka ny fanahiko;
  - type: text
    content: velomy aho araka ny teninao.
  '26':
  - type: text
    content: Nolazaiko Anao ny lalako dia namaly ahy Ianao;
  - type: text
    content: ampianaro ahy ny didinao.
  '27':
  - type: text
    content: Ampahalalao ahy ny lalan’ny didinao
  - type: text
    content: dia hisaintsaina ireo fahagagana nataonao aho.
  '28':
  - type: text
    content: Mipotrapotra-dranomaso aho noho ny alaheloko;
  - type: text
    content: ampaherezo aho araka ny teninao.
  '29':
  - type: text
    content: Esory amiko ny lalan’ny lainga
  - type: text
    content: ka ny lalànanao no anasoavy ahy.
  '3':
  - type: text
    content: eny, izay tsy manao ny ratsy
  - type: text
    content: fa mandeha araka ny lalany.
  '30':
  - type: text
    content: Ny lalan’ny fahamarinanao no fidiko;
  - type: text
    content: apetrako eo anatrehako ny fitsipikao.
  '31':
  - type: text
    content: Mifikitra amin’ny teny vavolombelonao aho;
  - type: text
    content: TOMPO ô, aza avela ho azon-kenatra aho.
  '32':
  - type: text
    content: Ny lalan’ny didinao no ihazakazahako,
  - type: text
    content: fa ampahalalahinao ny foko.
  - type: heading
    content: he ה
  '33':
  - type: text
    content: TOMPO ô, toroy ny lalan’ny didinao aho
  - type: text
    content: dia hotandremako hatramin’ny farany izany.
  '34':
  - type: text
    content: Omeo fahiratan-tsaina aho mba hitandrina ny lalànanao;
  - type: text
    content: eny, hitandrina azy amin’ny foko manontolo aho.
  '35':
  - type: text
    content: Ampandehano amin’ny lalan’ny didinao aho
  - type: text
    content: fa izany no sitrako.
  '36':
  - type: text
    content: Ataovy mirona ho amin’ny teny vavolombelonao ny foko,
  - type: text
    content: fa tsy ho amin’ny fitiavan-karena.
  '37':
  - type: text
    content: Avilio ny masoko tsy hijery zava-poana;
  - type: text
    content: velomy amin’ny lalanao aho.
  '38':
  - type: text
    content: Tovy ny teninao amin’ny mpanomponao,
  - type: text
    content: dia amin’izay matahotra Anao.
  '39':
  - type: text
    content: Esory ny fahafaham-baraka izay atahorako,
  - type: text
    content: fa tsara ny fitsipikao.
  '4':
  - type: text
    content: Namoaka ny didinao Ianao
  - type: text
    content: mba hotandremana tsara.
  '40':
  - type: text
    content: Indro, manina ny didinao aho;
  - type: text
    content: velomy amin’ny fahamarinanao aho.
  - type: heading
    content: vav ו
  '41':
  - type: text
    content: Aoka ho tonga amiko ny famindramponao, TOMPO ô,
  - type: text
    content: dia ny famonjenao, araka ny teninao.
  '42':
  - type: text
    content: Dia hamaly izay miteny ratsy ahy aho
  - type: text
    content: satria matoky ny teninao.
  '43':
  - type: text
    content: Ary aza dia esorina amin’ny vavako ny teny marina
  - type: text
    content: fa miandry ny fitsaranao aho.
  '44':
  - type: text
    content: Dia hitandrina ny lalànanao mandrakariva aho,
  - type: text
    content: dia mandrakizay doria.
  '45':
  - type: text
    content: Ary handeha amin’ny malalaka aho
  - type: text
    content: fa ny didinao no tadiaviko.
  '46':
  - type: text
    content: Hilaza ny teny vavolombelonao eo anatrehan’ireo mpanjaka aho
  - type: text
    content: ka tsy ho menatra.
  '47':
  - type: text
    content: Ary hiravoravo amin’ny didinao aho
  - type: text
    content: satria tiako ireny.
  '48':
  - type: text
    content: Hasandratro ny tanako ho amin’ny didinao satria tiako ireny;
  - type: text
    content: hosaintsainiko ny didinao.
  - type: heading
    content: zaìn ז
  '49':
  - type: text
    content: Tsarovy ny teny natao tamiko mpanomponao,
  - type: text
    content: dia ilay teny nampanantenainao ahy.
  '5':
  - type: text
    content: Enga anie ka ho tafatoetra ny lalako
  - type: text
    content: hitandremako ny didinao!
  '50':
  - type: text
    content: Izany no mampionona ahy amin’ny fahoriako;
  - type: text
    content: ny teninao no mamelona ahy.
  '51':
  - type: text
    content: Maniratsira ahy fatratra ny mpirehareha;
  - type: text
    content: tsy mba mivily miala amin’ny lalànanao aho.
  '52':
  - type: text
    content: Mahatsiaro ny fitsipikao izay hatramin’ny taloha aho, TOMPO ô,
  - type: text
    content: dia mionona.
  '53':
  - type: text
    content: Fahatezerana mirehitra no nahazo ahy noho ny amin’ny ratsy fanahy
  - type: text
    content: izay mahafoy ny lalànanao.
  '54':
  - type: text
    content: Ny didinao no ataoko an-kira
  - type: text
    content: ao amin’ny trano fivahinianako.
  '55':
  - type: text
    content: Mahatsiaro ny anaranao aho nony alina, TOMPO ô,
  - type: text
    content: ka mitandrina ny lalànanao.
  '56':
  - type: text
    content: Izao no anjarako,
  - type: text
    content: dia ny mitandrina ny didinao.
  - type: heading
    content: het ח
  '57':
  - type: text
    content: Anjarako NY TOMPO;
  - type: text
    content: minia mitandrina ny teninao aho.
  '58':
  - type: text
    content: Mifona Aminao amin’ny foko manontolo aho;
  - type: text
    content: mamindrà fo amiko araka ny teninao.
  '59':
  - type: text
    content: Mihevitra ny lalako aho
  - type: text
    content: ka mamerina ny tongotro ho amin’ny teny vavolombelonao.
  '6':
  - type: text
    content: Dia tsy ho menatra aho
  - type: text
    content: rehefa mandinika ny didinao rehetra.
  '60':
  - type: text
    content: Mandeha haingana aho ka tsy mitaredretra
  - type: text
    content: amin’ny fitandremana ny didinao.
  '61':
  - type: text
    content: Nihodidina tamiko ny famatoran’ny ratsy fanahy;
  - type: text
    content: tsy mba nanadino ny lalànanao aho.
  '62':
  - type: text
    content: Mamatonalina no hifohazako hidera Anao
  - type: text
    content: noho ny fitsaranao marina.
  '63':
  - type: text
    content: Naman’izay rehetra matahotra Anao aho
  - type: text
    content: sady naman’izay mitandrina ny didinao.
  '64':
  - type: text
    content: TOMPO ô, henika ny famindramponao ny tany;
  - type: text
    content: ampianaro ahy ny didinao.
  - type: heading
    content: tet ט
  '65':
  - type: text
    content: TOMPO ô, efa nasianao soa ny mpanomponao,
  - type: text
    content: araka ny teninao.
  '66':
  - type: text
    content: Ampianaro fahaiza-mamantatra tsara sy fahalalana aho
  - type: text
    content: fa matoky ny didinao aho.
  '67':
  - type: text
    content: Fony tsy mbola azom-pahoriana aho dia naniasia;
  - type: text
    content: fa ankehitriny dia mitandrina ny teninao aho.
  '68':
  - type: text
    content: Sady tsara Ianao no mpanao ny tsara;
  - type: text
    content: ampianaro ahy ny didinao.
  '69':
  - type: text
    content: Namoron-dainga hamelezana ahy ny mpirehareha;
  - type: text
    content: amin’ny foko manontolo no itandremako ny didinao.
  '7':
  - type: text
    content: Hidera Anao amin’ny fo mahitsy aho
  - type: text
    content: amin’ny ianarako ny fitsipikao marina.
  '70':
  - type: text
    content: Mandry tahaka ny menaka ny fony;
  - type: text
    content: fa izaho kosa dia ny lalànanao no iravoravoako.
  '71':
  - type: text
    content: Soa ihany aho nampahorina
  - type: text
    content: mba hianarako ny didinao.
  '72':
  - type: text
    content: Ny lalànan’ny vavanao no mahatsara ahy
  - type: text
    content: mihoatra noho ny volamena sy ny volafotsy an’arivony.
  - type: heading
    content: iod י
  '73':
  - type: text
    content: Ny tananao no nanao ahy sy nanamboatra ahy;
  - type: text
    content: omeo saina mahiratra aho mba hianarako ny didinao.
  '74':
  - type: text
    content: Hahita ahy izay matahotra Anao ka ho faly,
  - type: text
    content: fa ny teninao no andrasako.
  '75':
  - type: text
    content: Fantatro, TOMPO ô, fa marina ny fitsaranao
  - type: text
    content: ary ny fahamarinanao no nampahorianao ahy.
  '76':
  - type: text
    content: Ny famindramponao anie no hampiononana ahy
  - type: text
    content: araka ny teninao tamin’ny mpanomponao.
  '77':
  - type: text
    content: Aoka ho tonga amiko ny fiantranao mba ho velona aho,
  - type: text
    content: fa ny lalànanao no firavoravoako.
  '78':
  - type: text
    content: Aoka ho menatra ny mpirehareha fa nampahory ahy tsy amin’antony izy;
  - type: text
    content: fa izaho dia misaintsaina ny didinao.
  '79':
  - type: text
    content: Aoka hiverina amiko izay matahotra Anao
  - type: text
    content: sy izay mahalala ny teny vavolombelonao.
  '8':
  - type: text
    content: Ny didinao no hotandremako;
  - type: text
    content: aza dia mahafoy ahy Ianao!
  - type: heading
    content: bet ב
  '80':
  - type: text
    content: Aoka ho marina tsara ny foko amin’ny fitanana ny didinao
  - type: text
    content: mba tsy hahamenatra ahy.
  - type: heading
    content: kaf כ
  '81':
  - type: text
    content: Reraka ny aiko satria manina ny famonjenao aho;
  - type: text
    content: ny teninao no andrasako.
  '82':
  - type: text
    content: Pahina ny masoko miandry ny teninao
  - type: text
    content: 'ka hoy aho hoe: Rahoviana no hampionona ahy Ianao?'
  '83':
  - type: text
    content: Fa tahaka ny siny hoditra ao amin’ny setroka aho,
  - type: text
    content: nefa tsy mba hadinoiko ny didinao.
  '84':
  - type: text
    content: Hafiriana ny andron’ny mpanomponao?
  - type: text
    content: Rahoviana Ianao no hanao fitsarana amin’izay manenjika ahy?
  '85':
  - type: text
    content: Efa nihady lavaka hianjerako ny mpirehareha,
  - type: text
    content: dia izay tsy manaraka ny lalànanao.
  '86':
  - type: text
    content: Marina ny didinao rehetra;
  - type: text
    content: manenjika ahy tsy amin’antony ireny; vonjeo aho.
  '87':
  - type: text
    content: Saika nofongorany tamin’ny tany aho
  - type: text
    content: kanefa tsy mba mahafoy ny didinao aho.
  '88':
  - type: text
    content: Velomy aho araka ny famindramponao,
  - type: text
    content: dia hitandrina ny teny vavolombelona naloaky ny vavanao aho.
  - type: heading
    content: lamed ל
  '89':
  - type: text
    content: Ho mandrakizay, TOMPO ô,
  - type: text
    content: no nanorenanao any an-danitra ny teninao.
  '9':
  - type: text
    content: Inona no hiarovan’ny zatovo ny lalan-kalehany ho madio?
  - type: text
    content: Ny fitandremana araka ny teninao.
  '90':
  - type: text
    content: Hihatra amin’ny taranaka fara aman-dimby ny fahamarinanao;
  - type: text
    content: efa nampitoetra ny tany Ianao ka indro, mitoetra izy.
  '91':
  - type: text
    content: Mitoetra ny zavatra rehetra ankehitriny, araka ny didinao,
  - type: text
    content: satria manompo Anao ny zavatra rehetra.
  '92':
  - type: text
    content: Raha tsy ny lalanao no niravoravoako
  - type: text
    content: dia maty tamin’ny fahoriako aho.
  '93':
  - type: text
    content: Tsy hohadinoiko mandrakizay ny didinao,
  - type: text
    content: fa ireny no amelomanao ahy.
  '94':
  - type: text
    content: Anao aho, vonjeo aho,
  - type: text
    content: fa ny didinao no tadiaviko.
  '95':
  - type: text
    content: Miandry ahy ny ratsy fanahy mba hahafaty ahy;
  - type: text
    content: mandinika ny teny vavolombelonao aho.
  '96':
  - type: text
    content: Efa hitako fa manam-petra avokoa ny tanteraka rehetra
  - type: text
    content: ary tsy hita noanoa ny didinao.
  - type: heading
    content: mem מ
  '97':
  - type: text
    content: Endre ny fitiavako ny lalànanao!
  - type: text
    content: Fisaintsainako mandrakariva izany.
  '98':
  - type: text
    content: Mampahahendry ahy mihoatra noho ny fahavaloko ny didinao
  - type: text
    content: satria ato amiko mandrakizay ireny.
  '99':
  - type: text
    content: Hendry noho ny mpampianatra ahy rehetra aho,
  - type: text
    content: satria ny teny vavolombelonao no fisaintsainako.
