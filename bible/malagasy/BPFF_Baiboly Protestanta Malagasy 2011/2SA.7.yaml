document_id: 2SA.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hafatra nampitaina tamin’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 17.1-15
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa nipetraka tao an-tranony ny mpanjaka sady efa nampiadanin’NY TOMPO tamin’ny fahavalony rehetra manodidina azy '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia hoy ny mpanjaka tamin’i Natana mpaminany: Endrey, izaho ity dia mitoetra amin’ny trano sedera, nefa ny vata misy ny faneken’Andriamanitra kosa mitoetra ao anaty tranolay! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy i Natana tamin’ny mpanjaka: Andeha, ataovy izay rehetra ao am-ponao, fa NY TOMPO no momba anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny alin’iny ihany dia tonga tamin’i Natana ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Andeha lazao amin’i Davida mpanompoko hoe: Izao no lazain’NY TOMPO: Ianao va no hanorina trano hitoerako? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy mbola nitoetra an-trano Aho hatramin’ny nitondrako ny Zanak’Israely niakatra avy tany Ejipta ka mandraka androany fa nifindrafindra tranolay sy nifindrafindra fonenana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tamin’izay rehetra nifindrafindrako niaraka tamin’ny Zanak’Israely, moa nisy nitenenako akory va ny mpitsaran’ny Israely izay notendreko ho mpiandry ny Israely oloko ka nilazako hoe: Nahoana no tsy manorina trano sedera ho Ahy ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa lazao amin’i Davida mpanompoko hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Izaho no naka anao avy tany an-tsaha dia avy tamin’ny fiandrasana ondry, mba ho mpanapaka ny Israely oloko. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nomba anao tamin’izay nalehanao rehetra Aho ka naringako tsy ho eo anoloanao ny fahavalonao rehetra ary homeko anarana malaza tahaka ny anaran’izay lehibe ambonin’ny tany ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hifidy tany ho an’ny Israely oloko Aho sady hamponina azy ka handry fehizay ao amin’ny fonenany izy ary tsy hanana ahiahy intsony; ny ratsy fanahy dia tsy hampahory azy intsony tahaka ny taloha, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'tamin’ny nanendreko mpitsara ho mpifehy ny Israely oloko; ary hampiadana anao ho afaka amin’ny fahavalonao rehetra Aho. Nolazain’NY TOMPO taminao koa fa hanao trano ho anao Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa rehefa tapitra ny andronao ka hodimandry any amin’ny razanao ianao dia hatsangako handimby anao ny zanakao izay haterakao ary hampitoeriko ny fanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Io no hanao trano ho an’ny anarako, ary Izaho kosa hampitoetra ny sezafiandrianan’ny fanjakany ho mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izaho ho rainy, ary izy dia ho zanako. Raha manao izay meloka izy dia hanariko amin’ny tsorakazon’ny olona sy ny kapoky ny zanak’olombelona; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'nefa ny famindrampoko dia tsy mba hiala aminy, tahaka ny nanesorako izany tamin’i Saoly izay nesoriko teo alohanao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny taranakao sy ny fanjakanao dia hitoetra eo anatrehanao mandrakizay; ny sezafiandriananao dia hitoetra mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Araka izany teny rehetra izany sy araka izao fahitana rehetra izao no nolazain’i Natana tamin’i Davida.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 17.16-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niditra i Davida mpanjaka ka nipetraka teo anatrehan’NY TOMPO ary niteny hoe: Zinona moa aho, TOMPO Andriamanitra ô? Ary zinona ny fianakaviako, no novimbininao ambaraka ankehitriny aho? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mbola ataonao ho zavatra kely ihany aza izany, TOMPO Andriamanitra ô; fa indro, efa voalazanao koa ny amin’ny taranaky ny mpanomponao hatramin’ny mbola any aoriana lavitra aza. Ary izany no fanaon’ny olona, RY TOMPO Andriamanitra ô. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa inona intsony no holazain’i Davida aminao? Fa Ianao, RY TOMPO Andriamanitra ô, no mahalala ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Noho ny teninao sy araka ny sitraponao no nanaovanao ireo zavatra lehibe rehetra ireo, hampahalalanao ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa amin’izany dia lehibe Ianao, RY TOMPO Andriamanitra! Tsy misy tahaka Anao; tsy misy Andriamanitra afa-tsy Ianao raha araka izay rehetra ren’ny sofinay. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary aiza moa no misy firenena etỳ an-tany tahaka ny Israely olonao, izay nalehan’Andriamanitra mba havotana ho olony sy hanaovany anarana ho Azy, ary hanaovany zavatra lehibe ho azy sy zava-mahatahotra ho an’ny taninao teo anatrehan’ny olonao, izay navotanao ho Anao avy tamin’ny firenen’i Ejipta sy ny andriamaniny? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nampitoerinao ho olonao mandrakizay ny Israely olonao; ary Ianao, TOMPO ô, no efa tonga Andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ankehitriny, TOMPO Andriamanitra ô, ilay teny nolazainao ny amin’ny mpanomponao sy ny taranany dia ampitoero ho mandrakizay ary ataovy araka izay nolazainao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Aoka hohalehibiazina mandrakizay ny anaranao ka hatao hoe Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely! Aoka hampitoerina eo anatrehanao ny taranak’i Davida mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa Ianao, ry Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely, efa nilaza tamin’ny mpanomponao hoe: Izaho hanome taranaka anao; koa izany no nampahasahy ny fon’ny mpanomponao hanao izao vavaka izao aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Noho izany, RY TOMPO Andriamanitra ô, satria Ianao no Andriamanitra, ary marina ny teninao, ary Ianao efa nilaza izany zava-tsoa izany ny amin’ny mpanomponao, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: dia aoka ho sitrakao ny hitahy ny taranaky ny mpanomponao mba haharitra mandrakizay eo anatrehanao; fa efa niteny izany Ianao, RY TOMPO Andriamanitra ô; eny, aoka ny fitahianao no hitahianao ny taranaky ny mpanomponao mandrakizay.
