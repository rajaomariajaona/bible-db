document_id: 2SA.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hafatra nampitaina tamin’i Davida
  - type: heading
    content: 1Tan 17.1-15
  - type: text
    content: 'Rehefa nipetraka tao an-tranony ny mpanjaka sady efa nampiadanin’NY TOMPO tamin’ny fahavalony rehetra manodidina azy '
  '10':
  - type: text
    content: 'Hifidy tany ho an’ny Israely oloko Aho sady hamponina azy ka handry fehizay ao amin’ny fonenany izy ary tsy hanana ahiahy intsony; ny ratsy fanahy dia tsy hampahory azy intsony tahaka ny taloha, '
  '11':
  - type: text
    content: 'tamin’ny nanendreko mpitsara ho mpifehy ny Israely oloko; ary hampiadana anao ho afaka amin’ny fahavalonao rehetra Aho. Nolazain’NY TOMPO taminao koa fa hanao trano ho anao Izy. '
  '12':
  - type: text
    content: 'Koa rehefa tapitra ny andronao ka hodimandry any amin’ny razanao ianao dia hatsangako handimby anao ny zanakao izay haterakao ary hampitoeriko ny fanjakany. '
  '13':
  - type: text
    content: 'Io no hanao trano ho an’ny anarako, ary Izaho kosa hampitoetra ny sezafiandrianan’ny fanjakany ho mandrakizay. '
  '14':
  - type: text
    content: 'Izaho ho rainy, ary izy dia ho zanako. Raha manao izay meloka izy dia hanariko amin’ny tsorakazon’ny olona sy ny kapoky ny zanak’olombelona; '
  '15':
  - type: text
    content: 'nefa ny famindrampoko dia tsy mba hiala aminy, tahaka ny nanesorako izany tamin’i Saoly izay nesoriko teo alohanao. '
  '16':
  - type: text
    content: Ary ny taranakao sy ny fanjakanao dia hitoetra eo anatrehanao mandrakizay; ny sezafiandriananao dia hitoetra mandrakizay.
  '17':
  - type: text
    content: Araka izany teny rehetra izany sy araka izao fahitana rehetra izao no nolazain’i Natana tamin’i Davida.
  - type: heading
    content: Ny vavaka nataon’i Davida
  - type: heading
    content: 1Tan 17.16-27
  '18':
  - type: text
    content: 'Dia niditra i Davida mpanjaka ka nipetraka teo anatrehan’NY TOMPO ary niteny hoe: Zinona moa aho, TOMPO Andriamanitra ô? Ary zinona ny fianakaviako, no novimbininao ambaraka ankehitriny aho? '
  '19':
  - type: text
    content: 'Mbola ataonao ho zavatra kely ihany aza izany, TOMPO Andriamanitra ô; fa indro, efa voalazanao koa ny amin’ny taranaky ny mpanomponao hatramin’ny mbola any aoriana lavitra aza. Ary izany no fanaon’ny olona, RY TOMPO Andriamanitra ô. '
  '2':
  - type: text
    content: 'dia hoy ny mpanjaka tamin’i Natana mpaminany: Endrey, izaho ity dia mitoetra amin’ny trano sedera, nefa ny vata misy ny faneken’Andriamanitra kosa mitoetra ao anaty tranolay! '
  '20':
  - type: text
    content: 'Koa inona intsony no holazain’i Davida aminao? Fa Ianao, RY TOMPO Andriamanitra ô, no mahalala ny mpanomponao. '
  '21':
  - type: text
    content: 'Noho ny teninao sy araka ny sitraponao no nanaovanao ireo zavatra lehibe rehetra ireo, hampahalalanao ny mpanomponao. '
  '22':
  - type: text
    content: 'Koa amin’izany dia lehibe Ianao, RY TOMPO Andriamanitra! Tsy misy tahaka Anao; tsy misy Andriamanitra afa-tsy Ianao raha araka izay rehetra ren’ny sofinay. '
  '23':
  - type: text
    content: 'Ary aiza moa no misy firenena etỳ an-tany tahaka ny Israely olonao, izay nalehan’Andriamanitra mba havotana ho olony sy hanaovany anarana ho Azy, ary hanaovany zavatra lehibe ho azy sy zava-mahatahotra ho an’ny taninao teo anatrehan’ny olonao, izay navotanao ho Anao avy tamin’ny firenen’i Ejipta sy ny andriamaniny? '
  '24':
  - type: text
    content: 'Dia nampitoerinao ho olonao mandrakizay ny Israely olonao; ary Ianao, TOMPO ô, no efa tonga Andriamaniny. '
  '25':
  - type: text
    content: 'Ankehitriny, TOMPO Andriamanitra ô, ilay teny nolazainao ny amin’ny mpanomponao sy ny taranany dia ampitoero ho mandrakizay ary ataovy araka izay nolazainao. '
  '26':
  - type: text
    content: 'Aoka hohalehibiazina mandrakizay ny anaranao ka hatao hoe Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely! Aoka hampitoerina eo anatrehanao ny taranak’i Davida mpanomponao. '
  '27':
  - type: text
    content: 'Fa Ianao, ry Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely, efa nilaza tamin’ny mpanomponao hoe: Izaho hanome taranaka anao; koa izany no nampahasahy ny fon’ny mpanomponao hanao izao vavaka izao aminao. '
  '28':
  - type: text
    content: 'Noho izany, RY TOMPO Andriamanitra ô, satria Ianao no Andriamanitra, ary marina ny teninao, ary Ianao efa nilaza izany zava-tsoa izany ny amin’ny mpanomponao, '
  '29':
  - type: text
    content: dia aoka ho sitrakao ny hitahy ny taranaky ny mpanomponao mba haharitra mandrakizay eo anatrehanao; fa efa niteny izany Ianao, RY TOMPO Andriamanitra ô; eny, aoka ny fitahianao no hitahianao ny taranaky ny mpanomponao mandrakizay.
  '3':
  - type: text
    content: 'Dia hoy i Natana tamin’ny mpanjaka: Andeha, ataovy izay rehetra ao am-ponao, fa NY TOMPO no momba anao.'
  '4':
  - type: text
    content: 'Ny alin’iny ihany dia tonga tamin’i Natana ny tenin’NY TOMPO hoe: '
  '5':
  - type: text
    content: 'Andeha lazao amin’i Davida mpanompoko hoe: Izao no lazain’NY TOMPO: Ianao va no hanorina trano hitoerako? '
  '6':
  - type: text
    content: 'Tsy mbola nitoetra an-trano Aho hatramin’ny nitondrako ny Zanak’Israely niakatra avy tany Ejipta ka mandraka androany fa nifindrafindra tranolay sy nifindrafindra fonenana. '
  '7':
  - type: text
    content: 'Ary tamin’izay rehetra nifindrafindrako niaraka tamin’ny Zanak’Israely, moa nisy nitenenako akory va ny mpitsaran’ny Israely izay notendreko ho mpiandry ny Israely oloko ka nilazako hoe: Nahoana no tsy manorina trano sedera ho Ahy ianareo? '
  '8':
  - type: text
    content: 'Koa lazao amin’i Davida mpanompoko hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Izaho no naka anao avy tany an-tsaha dia avy tamin’ny fiandrasana ondry, mba ho mpanapaka ny Israely oloko. '
  '9':
  - type: text
    content: 'Ary nomba anao tamin’izay nalehanao rehetra Aho ka naringako tsy ho eo anoloanao ny fahavalonao rehetra ary homeko anarana malaza tahaka ny anaran’izay lehibe ambonin’ny tany ianao. '
