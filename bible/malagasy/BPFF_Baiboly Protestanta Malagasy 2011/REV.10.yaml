document_id: REV.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay anjely sy ny boky kely nivelatra
  - type: text
    content: 'Ary hitako fa indro, nisy anjely mahery iray koa nidina avy tany an-danitra sady nitafy rahona; nisy avana teo ambonin’ny lohany, ary ny tavany dia tahaka ny masoandro ary ny tongony dia tahaka ny andry afo. '
  '10':
  - type: text
    content: 'Dia noraisiko ilay boky kely teny an-tanan’ny anjely ka nohaniko avokoa; ary raha mbola teo am-bavako izy dia mamy tahaka ny tantely, kanjo nony voateliko dia nangidy ny kiboko. '
  '11':
  - type: text
    content: 'Ary nisy nilaza tamiko hoe: Tsy maintsy maminany indray ianao ny amin’ny olona maro, ny firenena maro, ny fiteny maro ary ny mpanjaka maro.'
  '2':
  - type: text
    content: 'Nitana boky kely nivelatra teny an-tanany izy. Nabahany ny tongony, koa ny havanana dia nataony teo ambonin’ny ranomasina ary ny havia dia tamin’ny tany; '
  '3':
  - type: text
    content: 'ary niantso tamin’ny feo mahery izy, tahaka ny fieron’ny liona. Nony niantso izy dia nandefa ny feony ny kotrokorana fito. '
  '4':
  - type: text
    content: 'Ary rehefa nandefa ny feony ny kotrokorana fito dia handeha hanoratra aho, kanjo nahare feo avy tany an-danitra aho hoe: Asio tombo-kase izay notononin’ny kotrokorana fito fa aza soratana.'
  '5':
  - type: text
    content: 'Ary ny anjely, ilay hitako nitsangana teo ambonin’ny ranomasina sy teo ambonin’ny tany, dia nanangana ny tanany havanana ho amin’ny lanitra '
  '6':
  - type: text
    content: 'ka nianiana tamin’Izay velona mandrakizay mandrakizay, dia Ilay nahary ny lanitra sy ny ao aminy, ny tany sy ny ao aminy ary ny ranomasina sy ny ao aminy, fa tsy hisy fotoana andrasana intsony, '
  '7':
  - type: text
    content: fa amin’ny andro hitsofan’ny anjely fahafito, rehefa hitsoka izy, dia ho tanteraka ny zavamiafina izay an’Andriamanitra, araka ny teny soa mahafaly nambarany tamin’ny mpaminany mpanompony.
  '8':
  - type: text
    content: 'Ary ilay feo izay reko avy tany an-danitra dia niteny tamiko indray hoe: Mandehana, raiso ilay boky mivelatra eny an-tanan’ny anjely mitsangana eo ambonin’ny ranomasina sy eo ambonin’ny tany. '
  '9':
  - type: text
    content: 'Dia nanatona an’ilay anjely aho ka niteny taminy hoe: Omeo ahy iny boky kely iny. Hoy izy tamiko: Raiso ka hano avokoa io; dia hampangidy ny kibonao izy nefa eo am-bavanao dia ho mamy tahaka ny tantely.'
