document_id: GEN.47,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia nankao amin’i Farao i Josefa ka nilaza taminy hoe: Ny raiko sy ny rahalahiko miaraka amin’ny ondry aman’osiny ary ny ombiny mbamin’izay rehetra ananan’izy ireo dia tonga avy tany amin’ny tany Kanana; koa indreo, eo amin’ny tany Gosena izy. '
  '10':
  - type: text
    content: 'Rehefa avy nisaotra an’i Farao i Jakoba dia niala teo anatrehany. '
  '11':
  - type: text
    content: 'Dia namponenin’i Josefa ny rainy sy ny rahalahiny ka nomeny zaratany tao amin’ny tany Ejipta, dia tao amin’ny tany tsara indrindra, tao amin’ny tany Ramesesa, araka izay nandidian’i Farao azy. '
  '12':
  - type: text
    content: Ary i Josefa no niantoka izay rehetra nilain’ny rainy sy ny rahalahiny mbamin’ny ankohonan’ny rainy rehetra, araka ny isan’ny zanany avy.
  - type: heading
    content: Ny fomba fitantanan’i Josefa nandritra ny mosary
  '13':
  - type: text
    content: 'Tamin’izany fotoana izany dia tsy nisy sakafo teo amin’ny tany rehetra; mafy indrindra ny mosary ka reraka ny tany Ejipta sy ny tany Kanana. '
  '14':
  - type: text
    content: 'Nangonin’i Josefa ny vola rehetra izay hita tany amin’ny tany Ejipta sy tany amin’ny tany Kanana, dia izay vidin’ny vary lafo tamin’ny olona. Nampidirin’i Josefa tao an-tranon’i Farao ireny vola ireny. '
  '15':
  - type: text
    content: 'Rehefa tapitra avokoa ny vola tany amin’ny tany Ejipta sy tany amin’ny tany Kanana dia nankeo amin’i Josefa ny Ejiptiana rehetra ka niteny hoe: Omeo hanina re izahay! Nahoana no dia ho faty eto anatrehanao izahay? Efa lany avokoa ny vola! '
  '16':
  - type: text
    content: 'Fa hoy kosa i Josefa: Omeo ary ny omby aman’ondrinareo ho takalon’ny hanina raha lany ny vola. '
  '17':
  - type: text
    content: Dia noentin’izy ireo tany amin’i Josefa ny omby aman’ondriny ka natakalon’i Josefa hanina ny soavaly mbamin’ny ondry aman’osy ary ny omby sy ny borikin’izy ireo. Nomeny hanina izy ireo tamin’izany taona izany ho takalon’ny bibiny rehetra.
  '18':
  - type: text
    content: 'Rehefa tapitra io taona io dia nankeo aminy indray ny olona tamin’ny taona faharoa ka niteny taminy hoe: Tsy azonay afenina amin’Itompokolahy fa lany ny vola ary efa lasan’Itompokolahy avokoa ny biby fiompy; tsy misy na inona na inona intsony eto imason’ny tompokolahy afa-tsy ny vatan-tenanay sy ny taninay. '
  '19':
  - type: text
    content: 'Nahoana no dia ho faty eto anatrehanao izahay, dia izahay sy ny taninay? Atakalozy hanina ny tenanay sy ny taninay dia ho mpanompon’i Farao izahay sy ny taninay. Omeo voa hafafy izahay mba ho velona fa tsy ho faty, ary mba tsy ho lao ny tany. '
  '2':
  - type: text
    content: 'Ary nalainy ny dimy tamin’ireo rahalahiny ka noentiny teo anatrehan’i Farao. '
  '20':
  - type: text
    content: 'Dia novidin’i Josefa ho an’i Farao ny tany Ejipta manontolo; fa samy nanakalo ny sahany avy ny Ejiptiana, satria mafy tamin’izy ireo ny mosary. Koa lasan’i Farao ny tany. '
  '21':
  - type: text
    content: 'Nafindrany ho any amin’ny tanàna rehetra hatrany amin’ny sisintanin’i Ejipta manontolo ny olona. '
  '22':
  - type: text
    content: 'Ny tanin’ny mpisorona ihany no tsy mba natakalony; fa nanana anjara avy tamin’i Farao ny mpisorona ka nihinana ny anjara izay nomen’i Farao azy. Izany no tsy nanakalozany ny tanin’izy ireo. '
  '23':
  - type: text
    content: 'Dia hoy i Josefa tamin’ny olona: Indro, efa voavidiko ho an’i Farao androany ianareo sy ny taninareo; koa indreny ny voa hafafinareo ka fafazonareo ny tany. '
  '24':
  - type: text
    content: 'Ary rehefa misy vokatra dia haterinareo ho an’i Farao ny ampahadiminy; ho anareo kosa ny ampahany efatra sisa ho voa hafafy any an-tsaha sy hohaninareo mbamin’izay ao an-tranonareo ary ho sakafon’ny zanakareo. '
  '25':
  - type: text
    content: 'Ary hoy izy ireo: Efa namonjy ny ainay ianao. Aoka mba hahita fitia eto imason’Itompokolahy izahay dia ho mpanompon’i Farao! '
  '26':
  - type: text
    content: Nataon’i Josefa ho lalàna tany amin’ny tany Ejipta mandraka androany izany. Ho an’i Farao ny ampahadimin’ny vokatra; ny tanin’ny mpisorona ihany no tsy mba lasan’i Farao.
  - type: heading
    content: Namela hafatra farany Israely
  '27':
  - type: text
    content: 'Ary nonina tao amin’ny tany Ejipta, tao amin’ny tany Gosena Israely. Nahazo zaratany tao izy, dia nihamaro anaka sy nihabetsaka indrindra. '
  '28':
  - type: text
    content: 'Fito amby folo taona ny andro niainany tao amin’ny tany Ejipta; noho izany ny andro rehetra niainan’i Jakoba dia fito amby efapolo amby zato taona. '
  '29':
  - type: text
    content: 'Rehefa antomotra ny andro hahafatesan’Israely dia nampaka an’i Josefa zanany izy ka niteny taminy hoe: Raha mba nahita fitia teo imasonao aho dia miangavy anao: Ataovy ato ambanin’ny feko ny tananao ka ataovy amiko izay soa sy izay marina! Miangavy anao aho: Aza alevina atỳ Ejipta aho! '
  '3':
  - type: text
    content: 'Hoy i Farao tamin’ireo rahalahin’i Josefa: Inona moa no raharaha fanaonareo? Dia hoy izy ireo tamin’i Farao: Mpiandry ondry izahay mpanomponao hatramin’ny razanay. '
  '30':
  - type: text
    content: 'Fa rehefa modimandry any amin’ny razako aho dia hoentinao hiala atỳ Ejipta ka halevinao ao amin’ny fasany. Dia hoy i Josefa: Hataoko izany araka ny teninao. '
  '31':
  - type: text
    content: 'Ary hoy i Jakoba: Mianiàna ary amiko. Dia nianiana taminy i Josefa. Dia niankohoka teo an-dohan’ny farafara Israely.'
  '4':
  - type: text
    content: 'Hoy koa izy ireo tamin’i Farao: Mba hivahiny eto amin’ity tany ity no niavianay fa tsy misy ahitra ho an’ny ondry aman’osin’ny mpanomponao intsony any amin’ny tany Kanana satria mafy ny mosary any. Koa ankehitriny, trara antitra ianao, aoka mba honina ao amin’ny tany Gosena ny mpanomponao! '
  '5':
  - type: text
    content: 'Hoy i Farao tamin’i Josefa: Ny rainao sy ny rahalahinao dia efa tonga atỳ aminao. '
  '6':
  - type: text
    content: Eo anoloanao ny tany Ejipta; koa amin’izay tany tsara indrindra no amponeno ny rainao sy ny rahalahinao. Aoka honina ao amin’ny tany Gosena izy ary raha fantatrao fa misy lehilahy mahay eo aminy dia tendreo izy ho lehiben’ny mpiandry ny omby aman’ondriko.
  '7':
  - type: text
    content: 'Noentin’i Josefa ho eo anatrehan’i Farao i Jakoba rainy; dia nisaotra an’i Farao i Jakoba. '
  '8':
  - type: text
    content: 'Hoy i Farao tamin’i Jakoba: Firy taona moa no andro niainanao? '
  '9':
  - type: text
    content: 'Dia hoy i Jakoba tamin’i Farao: Telopolo amby zato taona no andro nivahinianako. Sady vitsy no ratsy ny andro niainako ka tsy mba nahatratra ny andro niainan’ny razako tamin’ny andro nivahiniany. '
