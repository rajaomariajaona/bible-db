document_id: PRO.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tanjon’ny Boky
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ohabolan’i Solomona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zanak’i Davida, mpanjakan’ny Israely,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Anaka, raha taomin’ny mpanota ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aza manaiky.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Raha hoy izy ireo hoe: Andeha hiaraka aminay,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andeha isika hanao vela-pandrika handatsa-dra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andeha hofandrihantsika tsy amin’antony ny tsy manan-tsiny,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'andeha isika hitelina azy velona tahaka ny fitelin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanao azy teli-moka toy ny latsaka an-davaka,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: dia ho antsika ny fananana sarobidy isan-karazany rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hofenointsika babo ny tranontsika.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Avia hiara-miloka aminay ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho iray ihany ny kitapom-bolantsika rehetra!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Anaka, aza miara-dalana aminy ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arovy tsy hankany amin’ny alehany ny tongotrao;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: eny, ny tongony mihazakazaka ho amin’ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mailaka erỳ izy handatsa-dra.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Foana ny amelarana ny fandrika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha hitan’ny manana elatra rehetra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ireny mantsy dia manao vela-pandrika handatsa-dra ny tenany ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamitsaka izy, nefa ny tenany ihany no ho faty.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Toy izany no hiafaran’izay rehetra fatra-pitady harena tsy marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hipaoka ny ain’izay fatra-pitady azy izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antso sy fampitandremana ataon’ny Fahendrena
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: hahalalana fahendrena sy fananarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahatakarana izay lazain’ny fahalalana,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Miantso mafy eny an-dalambe ny Fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manandratra ny feony eny amin’ny kianja malalaka izy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: miantsoantso eny an-tampon’ny toerana feno tabataba izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'eny am-bavahadin’ny tanàna no anambaràny ny teniny hoe:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ry kely saina, mandra-pahoviana no hitiavanareo ny hadalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hifalian’ny mpaniratsira amin’ny faniratsirana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hankahalan’ny adala ny fahalalana?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Miverena ianareo hihaino ny fananarako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, haidiko aminareo ny fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampahafantariko anareo ny teniko.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Satria efa niantso aho, nefa nandà ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nanatsotra ny tanako aho, nefa tsy nisy niraharaha.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nohamavoinareo ny torohevitra rehetra natolotro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy nety nanaiky ny anatro ianareo;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Izaho kosa dia hihomehy, rehefa manjo anareo ny loza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handatsa aho, rehefa tonga izay mahatahotra anareo,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: rehefa tonga tahaka ny rivo-doza ny zava-mahatahotra anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny loza ho avy toy ny tadio
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manjo anareo ny fahoriana sy ny tebiteby.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Amin’izay dia hiantso ahy izy, nefa tsy hamaly aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitady ahy fatratra izy, nefa tsy ho hitany aho.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Satria nankahala ny fahalalana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nifidy ny fahatahorana NY TOMPO;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: handraisana fananarana mampahahendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fahamarinana sy rariny ary fahitsiana;
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: satria tsy nila ny saina natolotro izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa notsiratsirainy avokoa ny anatro rehetra,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: dia hihinana ny vokatry ny alehany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho voky ny torohevitra avy amin’ny tenany.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Fa hahafaty ny kely saina ny fihemorany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tokitoky foanan’ny adala no handringana azy.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Fa izay mihaino ahy kosa dia hitoetra tsy manana ahiahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, handry fehizay izy ka tsy hatahotra ny loza.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: hanomezana hakingana ho an’ny tso-po,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fahalalana sy fahaiza-mandinika ho an’ny zatovo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aoka hihaino ny hendry ka hitombo fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny mahira-tsaina hahazo fahaiza-mitondra,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: hahazoany ny hevitry ny ohabolana sy ny teny saro-takarina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny tenin’ny hendry sy ny teny saro-pantarina ataony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny fahatahorana NY TOMPO no fiandohan’ny fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny adala dia manamavo ny fahendrena sy ny anatra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana tsy hiara-dalana amin’ny mpanao ratsy
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Anaka, mihainoa ny fananaran’ny rainao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mahafoy ny fampianaran’ny reninao;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: fa fehiloha tsara tarehy amin’ny lohanao izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary firavaka iambozonanao.
