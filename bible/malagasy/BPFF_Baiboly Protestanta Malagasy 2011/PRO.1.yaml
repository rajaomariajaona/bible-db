document_id: PRO.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tanjon’ny Boky
  - type: text
    content: Ohabolan’i Solomona,
  - type: text
    content: zanak’i Davida, mpanjakan’ny Israely,
  '10':
  - type: text
    content: Anaka, raha taomin’ny mpanota ianao
  - type: text
    content: dia aza manaiky.
  '11':
  - type: text
    content: 'Raha hoy izy ireo hoe: Andeha hiaraka aminay,'
  - type: text
    content: andeha isika hanao vela-pandrika handatsa-dra,
  - type: text
    content: andeha hofandrihantsika tsy amin’antony ny tsy manan-tsiny,
  '12':
  - type: text
    content: 'andeha isika hitelina azy velona tahaka ny fitelin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ary hanao azy teli-moka toy ny latsaka an-davaka,
  '13':
  - type: text
    content: dia ho antsika ny fananana sarobidy isan-karazany rehetra
  - type: text
    content: ka hofenointsika babo ny tranontsika.
  '14':
  - type: text
    content: Avia hiara-miloka aminay ianao
  - type: text
    content: ka ho iray ihany ny kitapom-bolantsika rehetra!
  '15':
  - type: text
    content: Anaka, aza miara-dalana aminy ianao,
  - type: text
    content: arovy tsy hankany amin’ny alehany ny tongotrao;
  '16':
  - type: text
    content: eny, ny tongony mihazakazaka ho amin’ny ratsy
  - type: text
    content: ary mailaka erỳ izy handatsa-dra.
  '17':
  - type: text
    content: Foana ny amelarana ny fandrika
  - type: text
    content: raha hitan’ny manana elatra rehetra.
  '18':
  - type: text
    content: Ireny mantsy dia manao vela-pandrika handatsa-dra ny tenany ihany,
  - type: text
    content: mamitsaka izy, nefa ny tenany ihany no ho faty.
  '19':
  - type: text
    content: Toy izany no hiafaran’izay rehetra fatra-pitady harena tsy marina;
  - type: text
    content: fa hipaoka ny ain’izay fatra-pitady azy izany.
  - type: heading
    content: Antso sy fampitandremana ataon’ny Fahendrena
  '2':
  - type: text
    content: hahalalana fahendrena sy fananarana,
  - type: text
    content: hahatakarana izay lazain’ny fahalalana,
  '20':
  - type: text
    content: Miantso mafy eny an-dalambe ny Fahendrena,
  - type: text
    content: manandratra ny feony eny amin’ny kianja malalaka izy;
  '21':
  - type: text
    content: miantsoantso eny an-tampon’ny toerana feno tabataba izy;
  - type: text
    content: 'eny am-bavahadin’ny tanàna no anambaràny ny teniny hoe:'
  '22':
  - type: text
    content: Ry kely saina, mandra-pahoviana no hitiavanareo ny hadalana
  - type: text
    content: sy hifalian’ny mpaniratsira amin’ny faniratsirana
  - type: text
    content: ary hankahalan’ny adala ny fahalalana?
  '23':
  - type: text
    content: Miverena ianareo hihaino ny fananarako!
  - type: text
    content: Indro, haidiko aminareo ny fanahiko
  - type: text
    content: ary hampahafantariko anareo ny teniko.
  '24':
  - type: text
    content: Satria efa niantso aho, nefa nandà ianareo;
  - type: text
    content: efa nanatsotra ny tanako aho, nefa tsy nisy niraharaha.
  '25':
  - type: text
    content: Nohamavoinareo ny torohevitra rehetra natolotro
  - type: text
    content: sady tsy nety nanaiky ny anatro ianareo;
  '26':
  - type: text
    content: Izaho kosa dia hihomehy, rehefa manjo anareo ny loza;
  - type: text
    content: handatsa aho, rehefa tonga izay mahatahotra anareo,
  '27':
  - type: text
    content: rehefa tonga tahaka ny rivo-doza ny zava-mahatahotra anareo,
  - type: text
    content: ary ny loza ho avy toy ny tadio
  - type: text
    content: ka manjo anareo ny fahoriana sy ny tebiteby.
  '28':
  - type: text
    content: Amin’izay dia hiantso ahy izy, nefa tsy hamaly aho;
  - type: text
    content: hitady ahy fatratra izy, nefa tsy ho hitany aho.
  '29':
  - type: text
    content: Satria nankahala ny fahalalana izy
  - type: text
    content: ary tsy nifidy ny fahatahorana NY TOMPO;
  '3':
  - type: text
    content: handraisana fananarana mampahahendry,
  - type: text
    content: dia fahamarinana sy rariny ary fahitsiana;
  '30':
  - type: text
    content: satria tsy nila ny saina natolotro izy
  - type: text
    content: fa notsiratsirainy avokoa ny anatro rehetra,
  '31':
  - type: text
    content: dia hihinana ny vokatry ny alehany izy
  - type: text
    content: ka ho voky ny torohevitra avy amin’ny tenany.
  '32':
  - type: text
    content: Fa hahafaty ny kely saina ny fihemorany,
  - type: text
    content: ary ny tokitoky foanan’ny adala no handringana azy.
  '33':
  - type: text
    content: Fa izay mihaino ahy kosa dia hitoetra tsy manana ahiahy;
  - type: text
    content: eny, handry fehizay izy ka tsy hatahotra ny loza.
  '4':
  - type: text
    content: hanomezana hakingana ho an’ny tso-po,
  - type: text
    content: ary fahalalana sy fahaiza-mandinika ho an’ny zatovo.
  '5':
  - type: text
    content: Aoka hihaino ny hendry ka hitombo fahalalana;
  - type: text
    content: ary aoka ny mahira-tsaina hahazo fahaiza-mitondra,
  '6':
  - type: text
    content: hahazoany ny hevitry ny ohabolana sy ny teny saro-takarina
  - type: text
    content: mbamin’ny tenin’ny hendry sy ny teny saro-pantarina ataony.
  '7':
  - type: text
    content: Ny fahatahorana NY TOMPO no fiandohan’ny fahalalana;
  - type: text
    content: fa ny adala dia manamavo ny fahendrena sy ny anatra.
  - type: heading
    content: Fampitandremana tsy hiara-dalana amin’ny mpanao ratsy
  '8':
  - type: text
    content: Anaka, mihainoa ny fananaran’ny rainao,
  - type: text
    content: ary aza mahafoy ny fampianaran’ny reninao;
  '9':
  - type: text
    content: fa fehiloha tsara tarehy amin’ny lohanao izany
  - type: text
    content: ary firavaka iambozonanao.
