document_id: EST.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Miangavy an’i Estera mba hanelanelana i Mordekay
  - type: text
    content: 'Nony fantatr’i Mordekay izay rehetra nitranga dia nandriatra ny fitafiany izy ka nitafy akanjo fisaonana sady nihosin-davenona; dia nankeo afovoan’ny tanàna izy ka nitaraina sy nidradradradra mafy. '
  '10':
  - type: text
    content: 'Fa naniraka an’i Hatàka indray i Estera hilaza amin’i Mordekay hoe: '
  '11':
  - type: text
    content: 'Ny mpanompon’ny mpanjaka rehetra sy ny olona rehetra manerana ireo fari-piadidian’ny mpanjaka dia samy mahalala fa na iza na iza mankeo amin’ny mpanjaka eo an-kianja anatiny na lehilahy na vehivavy nefa tsy nantsoina dia tokana ihany ny lalàna ho an’ny rehetra mba hahafaty azy afa-tsy izay hotondroin’ny mpanjaka amin’ny tehina volamena mba hahavelona azy. Izaho anefa dia tsy nantsoina hiditra ao amin’ny mpanjaka efa telopolo andro izay. '
  '12':
  - type: text
    content: Dia nolazaina tamin’i Mordekay ny tenin’i Estera.
  '13':
  - type: text
    content: 'Ary nampitondra valiny ho any amin’i Estera i Mordekay hoe: Aza mihevitra anakampo fa ianao no ho voavonjy amin’ny Jiosy rehetra saingy ao an-tranon’ny mpanjaka. '
  '14':
  - type: text
    content: 'Fa raha tsy hiteny na inona na inona ianao amin’izao fotoana izao dia hisy fanafahana sy famonjena hiseho avy amin’ny toerana hafa ho an’ny Jiosy fa ianao sy ny fianakavian-drainao dia haringana. Ary iza no mahalala fa angamba ho amin’izao andro izao mihitsy no nanandratana anao ho amin’ny fanjakana? '
  '15':
  - type: text
    content: 'Dia nampitondra valiny ho any amin’i Mordekay indray i Estera hoe: '
  '16':
  - type: text
    content: 'Mandehana ary ka vorio ny Jiosy rehetra izay hita eto Sosana. Mifadia hanina noho ny amiko ka aza mihinana na misotro mandritra ny hateloana na andro na alina. Izaho sy ny mpanompovaviko koa dia hifady toy izany ary amin’izany no hidirako ao amin’ny mpanjaka na dia tsy araka ny lalàna aza. Koa raha toa ka maty aho dia maty! '
  '17':
  - type: text
    content: Dia lasa i Mordekay ka nanatanteraka izay rehetra nandidian’i Estera azy.
  '2':
  - type: text
    content: Ary tonga teo anoloan’ny vavahadin’ny mpanjaka izy, nefa tsy nisy nahazo niditra tao amin’ny vavahadin’ny mpanjaka raha nitafy akanjo fisaonana.
  '3':
  - type: text
    content: 'Tany amin’ny fari-piadidiana rehetra izay nalehan’ny tenin’ny mpanjaka sy ny didiny dia nalahelo mafy ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' ka nifady hanina sy nitomany ary nidradradradra sady maro no nandry tamin’ny lamba fisaonana sy ny lavenona.'
  '4':
  - type: text
    content: 'Ary niditra ny mpanompovavy sy ny '
  - type: text
    content: ionòka
  - type: text
    content: ' nanompo an’i Estera ka nilaza izany taminy. Dia nangorakoraka ny vadin’ny mpanjaka ka nampanatitra lamba hitafian’i Mordekay izy mba hanesorany ny akanjo fisaonana taminy nefa tsy nety nandray izy. '
  '5':
  - type: text
    content: 'Ary niantso an’i Hatàka, ionòkan’ny mpanjaka, izay notendreny hanompo azy i Estera ka nampitondra teny azy ho any amin’i Mordekay mba hahafantarany hoe inona ny zava-nitranga ary inona no anton’izany. '
  '6':
  - type: text
    content: 'Dia lasa i Hatàka nankany amin’i Mordekay ho eo amin’ny kianjan’ny tanàna, ilay eo anoloan’ny vavahadin’ny mpanjaka. '
  '7':
  - type: text
    content: 'Dia nambaran’i Mordekay taminy izay rehetra nanjo azy sy ny tena isan’ny vola izay nokasain’i Hamana harotsaka ao amin’ny trano fitahirizan-drakitry ny mpanjaka noho ny Jiosy ho ringana. '
  '8':
  - type: text
    content: 'Nomeny azy koa ny dika mitovy amin’ny didy izay novakina tany Sosana handringanana azy mba haseho amin’i Estera ka hampahafantatra azy izany sy hiteny azy mba hiditra ao amin’ny mpanjaka ka hifona aminy sy hangataka eo anatrehany ho an’ny fireneny. '
  '9':
  - type: text
    content: 'Dia lasa niverina i Hatàka ka nanambara ny tenin’i Mordekay tamin’i Estera. '
