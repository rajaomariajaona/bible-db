document_id: 1CO.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vaovao mahafaly izay noraisin’i Paoly sy nampitainy
  - type: text
    content: 'Ampahafantariko anareo, ry rahalahy, ny Filazantsara izay notoriko taminareo sy noraisinareo sady iorenanareo, '
  '10':
  - type: text
    content: 'Fa ny fahasoavan’Andriamanitra no naha toy izao ahy; ary tsy foana ny fahasoavany nasehony tamiko; fa efa niasa fatratra mihoatra noho izy rehetra aho, nefa tsy izaho fa ny fahasoavan’Andriamanitra no nomba ahy. '
  '11':
  - type: text
    content: Koa na izaho na ry zareo dia araka izany no fitorinay ary araka izany koa no ninoanareo.
  - type: heading
    content: Ny amin’ny fitsanganan’ny maty
  '12':
  - type: text
    content: 'Ary raha '
  - type: text
    content: Kristy
  - type: text
    content: ' no torina fa natsangana tamin’ny maty, ahoana no ilazan’ny sasany eo aminareo fa tsy misy fitsanganan’ny maty? '
  '13':
  - type: text
    content: 'Fa raha tsy misy fitsanganan’ny maty, na dia Kristy aza dia tsy natsangana; '
  '14':
  - type: text
    content: 'ary raha tsy natsangana Kristy dia foana ny toriteninay ary foana koa ny finoanareo. '
  '15':
  - type: text
    content: 'Dia hita ho vavolombelona mandainga ny amin’Andriamanitra izahay, satria efa nilaza fa Andriamanitra no nanangana an’i Kristy; nefa raha tsy atsangana ny maty dia tsy mba natsangany Izy. '
  '16':
  - type: text
    content: 'Fa raha tsy hatsangana ny maty, na dia Kristy koa aza dia tsy natsangana; '
  '17':
  - type: text
    content: 'ary raha tsy natsangana Kristy dia zava-poana ny finoanareo; ary mbola ao amin’ny fahotanareo ihany ianareo; '
  '18':
  - type: text
    content: 'dia very koa izay efa nodimandry ao amin’i Kristy. '
  '19':
  - type: text
    content: Raha amin’izao fiainana izao ihany no anantenantsika an’i Kristy dia mahantra indrindra noho ny olona rehetra isika.
  '2':
  - type: text
    content: izay amonjena anareo koa, raha tananareo tsara araka izay teny notoriko taminareo, raha tsy nino foana ianareo.
  '20':
  - type: text
    content: 'Nefa tsy izany, fa efa natsangana tamin’ny maty tokoa Kristy ho santatr’izay efa nodimandry. '
  '21':
  - type: text
    content: 'Ary satria olona iray no nisehoan’ny fahafatesana dia olona iray kosa no nisehoan’ny fitsanganan’ny maty. '
  '22':
  - type: text
    content: 'Fa tahaka ny ahafatesan’ny olona rehetra ao amin’i Adama no ahaveloman’ny olona rehetra kosa ao amin’i Kristy. '
  '23':
  - type: text
    content: 'Nefa samy amin’ny filaharany avy: Kristy no santatra; rehefa afaka izany dia izay an’i Kristy amin’ny fiaviany. '
  '24':
  - type: text
    content: 'Ary rehefa afaka izany dia avy ny farany ka amin’izay dia hatolony ho an’Andriamanitra Ray ny fanjakana, rehefa nofoanany ny fanapahana rehetra sy ny fahefana rehetra ary ny hery rehetra. '
  '25':
  - type: text
    content: 'Fa tsy maintsy manjaka Izy, mandra-panaony ny fahavalony rehetra ho eo ambanin’ny tongony (Sal 110.1). '
  '26':
  - type: text
    content: 'Ny fahafatesana no fahavalo farany horesena. '
  '27':
  - type: text
    content: 'Fa «efa nampanekeny ho eo ambanin’ny tongony ny zavatra rehetra» (Sal 8.6). Fa na dia lazainy aza hoe: «Ny zavatra rehetra no nampanekena», dia mazava fa tsy mba isan’izany ny Ray izay nampanaiky Azy ny zavatra rehetra. '
  '28':
  - type: text
    content: Ary rehefa nampanekena Azy ny zavatra rehetra dia ny tenan’ny Zanaka koa aza no hanaiky ny Ray izay nampanaiky Azy ny zavatra rehetra mba tsy hisy fototra sy antony afa-tsy Andriamanitra irery ihany.
  '29':
  - type: text
    content: Raha tsy izany, hanao ahoana izay natao batisa hisolo ny maty
  - type: note
    content: 'batisa hisolo ny maty: fomba diso izay tafiditra tao amin’ny fiangonana tamin’izany fotoana izany.'
  - type: text
    content: '? Raha tsy hatsangana mihitsy ny maty, nahoana ireny no atao batisa misolo azy?'
  '3':
  - type: text
    content: 'Fa natolotro anareo ho isan’ny zavatra voalohany indrindra ilay noraisiko, dia izao: Maty noho ny fahotantsika '
  - type: text
    content: Kristy
  - type: text
    content: ' araka ny Soratra Masina, '
  '30':
  - type: text
    content: 'Ary nahoana izahay no manao vy very ny ainay mandrakariva? '
  '31':
  - type: text
    content: 'Maty isanandro aho; lazaiko marina aminareo izany, ry rahalahy, satria ianareo no reharehako ao amin’i Kristy Jesosy Tompontsika. '
  '32':
  - type: text
    content: Raha araka ny fijerin’olombelona no niadiako tamin’ny bibidia tany Efesosy, inona no soa azoko amin’izany? Raha tsy hatsangana ny maty dia «aoka isika hihinana sy hisotro fa rahampitso dia ho faty» (Isa 22.13).
  '33':
  - type: text
    content: Aza mety hofitahina ianareo;
  - type: text
    content: ny fikambanana amin’ny ratsy dia manimba ny fitondrantena tsara.
  '34':
  - type: text
    content: Aoka ho tonga saina tsara ary aza manota; fa tsy manana ny fahalalana an’Andriamanitra ny sasany; ny hampahamenatra anareo no ilazako izany.
  - type: heading
    content: Ny tenan’ny tafatsangana amin’ny maty
  '35':
  - type: text
    content: 'Fa hisy hiteny hoe: Ahoana ary no fomba hitsanganan’ny maty? Ary tena manao ahoana no hisehoany? '
  '36':
  - type: text
    content: 'Ry adala! Izay afafinao dia tsy azo velomina raha tsy maty aloha; '
  '37':
  - type: text
    content: 'ary izay afafinao, tsy dia ny tenany izay ho avy no afafinao, fa ny voa fotsiny ihany, na voam-barimbazaha na voa hafa; '
  '38':
  - type: text
    content: fa Andriamanitra manome azy tena araka ny sitraky ny fony, ary ny voa rehetra dia samy omeny tena mampiavaka azy avy.
  '39':
  - type: text
    content: 'Tsy mitovy ny nofo rehetra; fa hafa ny an’ny olona, hafa ny nofon’ny biby, hafa ny nofon’ny vorona, hafa ny an’ny hazandrano. '
  '4':
  - type: text
    content: 'dia nalevina, ary natsangana tamin’ny andro fahatelo araka ny Soratra Masina; '
  '40':
  - type: text
    content: 'Misy tenan’ny any an-danitra, misy tenan’ny etỳ an-tany; fa hafa ny voninahitry ny any an-danitra, hafa ny an’ny etỳ an-tany. '
  '41':
  - type: text
    content: Hafa ny voninahitry ny masoandro, hafa ny voninahitry ny volana, hafa ny voninahitry ny kintana; fa ny kintana iray dia hafa voninahitra noho ny kintana iray.
  '42':
  - type: text
    content: 'Dia toy izany koa ny fitsanganan’ny maty: Afafy amin’ny fahalovana izy, atsangana amin’ny tsy fahalovana; '
  '43':
  - type: text
    content: 'afafy amin’ny fahafaham-boninahitra Izy, atsangana amin’ny voninahitra; afafy amin’ny fahalemena izy, atsangana amin’ny hery; '
  '44':
  - type: text
    content: afafy ny tena araka ny fomban’ny mananaina, fa atsangana ny tena araka ny fombam-panahy.
  - type: text
    content: 'Raha misy tena araka ny fomban’ny mananaina dia misy araka ny fombam-panahy koa. '
  '45':
  - type: text
    content: 'Ary araka izany koa ny voasoratra hoe: «I Adama, olona voalohany no natao mananaina» (Gen 2.7); i Adama farany no natao fanahy mahavelona. '
  '46':
  - type: text
    content: 'Tsy izay amin’ny fanahy anefa no voalohany fa izay amin’ny mananaina, dia izay vao amin’ny fanahy. '
  '47':
  - type: text
    content: 'Ny olona voalohany avy amin’ny tany dia avy amin’ny tany; ny olona faharoa dia avy any an-danitra. '
  '48':
  - type: text
    content: 'Toy ilay avy amin’ny tany dia tahaka azy koa ilay avy amin’ny tany; ary toy izay avy any an-danitra dia tahaka azy koa izay rehetra avy any an-danitra. '
  '49':
  - type: text
    content: Ary toy ny nitondrantsika ny endriky ny amin’ny tany no hitondrantsika ny endrik’ilay avy any an-danitra koa.
  '5':
  - type: text
    content: 'ary niseho tamin’i Kefasy Izy, dia tamin’ny roa amby folo lahy koa. '
  '50':
  - type: text
    content: 'Fa izao no lazaiko, ry rahalahy: Tsy afaka mandova ny fanjakan’Andriamanitra ny nofo aman-dra, ary tsy mandova ny tsy fahalovana ny fahalovana. '
  '51':
  - type: text
    content: 'Indro, zavamiafina no ambarako aminareo: Tsy hodimandry avokoa isika rehetra, '
  '52':
  - type: text
    content: 'fa vetivety, amin’ny indray mipy maso, rehefa maneno ny trompetra farany, dia hovana isika rehetra; fa hotsofina ny trompetra, ary hatsangana tsy ho lo intsony ny maty dia hovana isika. '
  '53':
  - type: text
    content: 'Fa ity mety lo ity dia tsy maintsy hitafy ny tsy fahalovana, ary ity mety maty ity dia tsy maintsy hitafy ny tsy fahafatesana. '
  '54':
  - type: text
    content: 'Fa rehefa mitafy ny tsy fahalovana ity mety lo ity ary mitafy ny tsy fahafatesana ity mety maty ity dia ho tanteraka ny teny voasoratra hoe:'
  - type: text
    content: «Ny fahafatesana dia voatelina ka resy» (Isa 25.8).
  '55':
  - type: text
    content: «Ry fahafatesana ô, aiza ny fandresenao?
  - type: text
    content: Ry fahafatesana ô, aiza ny fanindronanao?» (Hos 13.14)
  '56':
  - type: text
    content: 'Fa ny ota no fanindronan’ny fahafatesana; ary ny lalàna no herin’ny ota. '
  '57':
  - type: text
    content: 'Fa isaorana anie Andriamanitra izay manome antsika ny fandresena amin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika.'
  '58':
  - type: text
    content: Koa amin’izany, ry rahalahy malalako, dia miorena tsara, aza miova, ary mahefà be mandrakariva amin’ny asan’ny Tompo, satria fantatrareo fa tsy foana tsy akory ny fikelezanareo aina ao amin’ny Tompo.
  '6':
  - type: text
    content: 'Rehefa afaka izany dia niseho tamin’ny rahalahy maherin’ny dimanjato Izy, ny ankamaroan’ireny dia mbola velona mandraka ankehitriny fa ny sasany no efa nodimandry. '
  '7':
  - type: text
    content: 'Rehefa afaka izany dia niseho tamin’i Jakoba Izy, avy eo dia tamin’ny apostoly rehetra. '
  '8':
  - type: text
    content: Ary ny farany tamin’izy rehetra dia izaho izay toy ny tsy tonga volana akory, dia mba nisehoany koa.
  '9':
  - type: text
    content: 'Fa izaho dia kely indrindra amin’ny apostoly ka tsy mendrika hantsoina hoe apostoly satria efa nanenjika ny fiangonan’Andriamanitra aho. '
