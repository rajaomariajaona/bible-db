document_id: GEN.32
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary nifoha vao maraina i Labana dia nanoroka ny zanany lahy sy ny zanany vavy ka nitsodrano azy, dia lasa nandeha nody any amin’ny fonenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I Jakoba kosa raha nizotra tamin’ny lalan-kalehany dia indreo, nisy anjelin’Andriamanitra nitsena azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy i Jakoba raha nahita azy ireo: Tobin’Andriamanitra ity! Ary ny anaran’izany toerana izany dia nataony hoe Mahanaima'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mahanaima: Ny toby roa.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miomana hihaona amin’i Esao i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nandefa iraka hialoha azy ho any amin’i Esao rahalahiny, any Seìra, tanin’i Edoma i Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nanome teny azy ireo anefa izy hoe: Izao no holazainareo amin’i Esao tompoko: Izao no tenin’i Jakoba mpanomponao: Nivahiny tany amin’i Labana aho ka nitoetra tany mandraka ankehitriny; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: manana omby, boriky, ondry aman’osy ary mpanompolahy aho; mandefa iraka hanambara aminao aho, tompokolahy, mba hahitako fitia eo imasonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa niverina tany amin’i Jakoba ireo iraka dia niteny hoe: Tafahaona tamin’i Esao rahalahinao izahay, ary izy koa dia avy hitsena anao mitondra olona efajato lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia natahotra indrindra i Jakoba ary nangitakitaka. Nozarainy roa toko ny olona izay nomba azy mbamin’ny ondry aman’osy sy ny omby ary ny rameva. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy izy: Raha tafahaona amin’ny antokony iray i Esao ka mamely azy dia handositra kosa ny antokony iray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy i Jakoba: E! Andriamanitr’i Abrahama raiko sady Andriamanitr’Isaka raiko, dia NY TOMPO izay nilaza tamiko hoe: Modia any amin’ny taninao sy any amin’ny havanao dia hanao soa aminao Aho! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy mendrika ho nahazo na kely akory aza tamin’ny famindrampo rehetra sy ny fahamarinana rehetra izay nataonao tamiko mpanomponao aho; tsy nitondra na inona na inona afa-tsy ny tehiko ihany aho fony nita ity Jordana ity, nefa ankehitriny, efa tonga toby roa aho. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'O! Vonjeo amin’ny tanan’ny rahalahiko aho, dia amin’ny tanan’i Esao! Fa matahotra azy aho, fandrao avy hamely ahy sy ny vady aman-janako izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa Ianao no efa niteny hoe: Hanisy soa anao tokoa Aho ka hataoko maro ny taranakao tahaka ny fasika any an-dranomasina izay tsy azo isaina noho ny hamaroany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nitoetra teo izy tamin’iny alina iny. Naka tamin’izay teo an-tanany izy mba hampanaterina ho an’i Esao rahalahiny, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia osivavy roanjato sy osilahy roapolo, ondrivavy roanjato sy ondrilahy roapolo, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'rameva telopolo mampinono, vantotra ombivavy efapolo sy vantotra ombilahy folo, borikivavy roapolo ary zana-boriky folo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia natolony teo an-tanan’ny mpanompony ireny, notsinjarainy isan-toko; sady hoy izy tamin’ny mpanompony: Mandehana eo alohako ary asio elanelany isaky ny toko. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nanome teny ny voalohany izy hoe: Raha mifanena aminao i Esao rahalahiko ka manontany anao hoe: An’iza ianao ary hankaiza moa? Ary an’iza ireo alohanao ireo? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia lazao hoe: An’i Jakoba mpanomponao ireo, dia zavatra nampanaterina ho an’ny tompokolahy Esao; ary indro koa izy ao aoriananay ao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nanome teny ny faharoa sy ny fahatelo koa izy sy izay rehetra nandeha nanaraka ny isan-toko hoe: Araka izany teny izany no lazao amin’i Esao rehefa hitanareo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary lazao koa hoe: Indro i Jakoba mpanomponao ao aoriananay ao. Fa hoy ny eritreriny: Hampionona ny fahatezerany aho amin’ireo zavatra nampialohaviko ireo ka aorianan’izany vao hahita ny tavany aho; koa angamba hahazo fitia aminy aho! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia lasa nialoha azy ireny zavatra nampanateriny ireny, fa izy dia mbola nitoetra teo amin’ny toby ihany tamin’io alina io.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitolona amin’Andriamanitra i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nitsangana tamin’iny alina iny ihany izy ka nitondra ny vadiny roa sy ny mpanompovaviny roa ary ny zanany lahy iraika amby folo, dia nita tamin’ny fitàna tao Jaboka. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Naka azy ireo izy, dia nampita azy tamin’ny renirano ary nampitainy koa ny fananany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary i Jakoba irery no sisa nitoetra teo. Dia nisy lehilahy iray nitolona taminy mandra-pahatongan’ny andro ho mazava ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa hitan’ilay lehilahy fa tsy naharesy an’i Jakoba Izy dia nokapohiny ny foto-pen’i Jakoba ka nivika, tamin’izy nitolona Taminy iny. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy Izy: Avelao Aho handeha fa efa mazava ratsy ny andro. Fa hoy kosa i Jakoba: Tsy avelako handeha Ianao raha tsy tahinao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy Izy taminy: Iza moa no anaranao? Dia hoy izy: Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hoy indray Izy: Tsy hatao hoe Jakoba intsony ny anaranao fa Israely'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Israely: Mpitolona amin’Andriamanitra.'
    marker-yv: yv-n
  - type: text
    text: ' satria nitolona tamin’Andriamanitra sy tamin’ny olona ianao ka nahery. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nanontany i Jakoba hoe: Miangavy Anao aho, mba lazao izay anaranao! Ary hoy Izy: Nahoana no anontanianao ny anarako? Dia nitahy azy teo Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary ny anaran’izany toerana izany dia nataon’i Jakoba hoe Peniela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Peniela: Tavan’Andriamanitra.'
    marker-yv: yv-n
  - type: text
    text: ' fa hoy izy: Nahita an’Andriamanitra nifanatrika tamiko aho, nefa voavonjy ny aiko. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia niposaka taminy ny masoandro raha niala teo Peniela izy, ary nandringa izy noho ny feny. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izany no tsy ihinanan’ny Zanak’Israely ny hozatry ny tonon-taolam-pe mandraka androany satria nikapoka ny foto-pen’i Jakoba teo amin’ny hozatry ny tonon-taolany Izy.
