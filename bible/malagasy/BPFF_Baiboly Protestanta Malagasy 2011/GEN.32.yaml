document_id: GEN.32,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ary nifoha vao maraina i Labana dia nanoroka ny zanany lahy sy ny zanany vavy ka nitsodrano azy, dia lasa nandeha nody any amin’ny fonenany.
  '10':
  - type: text
    content: 'Ary hoy i Jakoba: E! Andriamanitr’i Abrahama raiko sady Andriamanitr’Isaka raiko, dia NY TOMPO izay nilaza tamiko hoe: Modia any amin’ny taninao sy any amin’ny havanao dia hanao soa aminao Aho! '
  '11':
  - type: text
    content: 'Tsy mendrika ho nahazo na kely akory aza tamin’ny famindrampo rehetra sy ny fahamarinana rehetra izay nataonao tamiko mpanomponao aho; tsy nitondra na inona na inona afa-tsy ny tehiko ihany aho fony nita ity Jordana ity, nefa ankehitriny, efa tonga toby roa aho. '
  '12':
  - type: text
    content: 'O! Vonjeo amin’ny tanan’ny rahalahiko aho, dia amin’ny tanan’i Esao! Fa matahotra azy aho, fandrao avy hamely ahy sy ny vady aman-janako izy. '
  '13':
  - type: text
    content: 'Fa Ianao no efa niteny hoe: Hanisy soa anao tokoa Aho ka hataoko maro ny taranakao tahaka ny fasika any an-dranomasina izay tsy azo isaina noho ny hamaroany.'
  '14':
  - type: text
    content: 'Dia nitoetra teo izy tamin’iny alina iny. Naka tamin’izay teo an-tanany izy mba hampanaterina ho an’i Esao rahalahiny, '
  '15':
  - type: text
    content: 'dia osivavy roanjato sy osilahy roapolo, ondrivavy roanjato sy ondrilahy roapolo, '
  '16':
  - type: text
    content: 'rameva telopolo mampinono, vantotra ombivavy efapolo sy vantotra ombilahy folo, borikivavy roapolo ary zana-boriky folo. '
  '17':
  - type: text
    content: 'Dia natolony teo an-tanan’ny mpanompony ireny, notsinjarainy isan-toko; sady hoy izy tamin’ny mpanompony: Mandehana eo alohako ary asio elanelany isaky ny toko. '
  '18':
  - type: text
    content: 'Dia nanome teny ny voalohany izy hoe: Raha mifanena aminao i Esao rahalahiko ka manontany anao hoe: An’iza ianao ary hankaiza moa? Ary an’iza ireo alohanao ireo? '
  '19':
  - type: text
    content: 'Dia lazao hoe: An’i Jakoba mpanomponao ireo, dia zavatra nampanaterina ho an’ny tompokolahy Esao; ary indro koa izy ao aoriananay ao. '
  '2':
  - type: text
    content: 'I Jakoba kosa raha nizotra tamin’ny lalan-kalehany dia indreo, nisy anjelin’Andriamanitra nitsena azy. '
  '20':
  - type: text
    content: 'Ary nanome teny ny faharoa sy ny fahatelo koa izy sy izay rehetra nandeha nanaraka ny isan-toko hoe: Araka izany teny izany no lazao amin’i Esao rehefa hitanareo izy. '
  '21':
  - type: text
    content: 'Ary lazao koa hoe: Indro i Jakoba mpanomponao ao aoriananay ao. Fa hoy ny eritreriny: Hampionona ny fahatezerany aho amin’ireo zavatra nampialohaviko ireo ka aorianan’izany vao hahita ny tavany aho; koa angamba hahazo fitia aminy aho! '
  '22':
  - type: text
    content: Dia lasa nialoha azy ireny zavatra nampanateriny ireny, fa izy dia mbola nitoetra teo amin’ny toby ihany tamin’io alina io.
  - type: heading
    content: Mitolona amin’Andriamanitra i Jakoba
  '23':
  - type: text
    content: 'Dia nitsangana tamin’iny alina iny ihany izy ka nitondra ny vadiny roa sy ny mpanompovaviny roa ary ny zanany lahy iraika amby folo, dia nita tamin’ny fitàna tao Jaboka. '
  '24':
  - type: text
    content: 'Naka azy ireo izy, dia nampita azy tamin’ny renirano ary nampitainy koa ny fananany. '
  '25':
  - type: text
    content: 'Ary i Jakoba irery no sisa nitoetra teo. Dia nisy lehilahy iray nitolona taminy mandra-pahatongan’ny andro ho mazava ratsy. '
  '26':
  - type: text
    content: 'Rehefa hitan’ilay lehilahy fa tsy naharesy an’i Jakoba Izy dia nokapohiny ny foto-pen’i Jakoba ka nivika, tamin’izy nitolona Taminy iny. '
  '27':
  - type: text
    content: 'Dia hoy Izy: Avelao Aho handeha fa efa mazava ratsy ny andro. Fa hoy kosa i Jakoba: Tsy avelako handeha Ianao raha tsy tahinao aho. '
  '28':
  - type: text
    content: 'Ary hoy Izy taminy: Iza moa no anaranao? Dia hoy izy: Jakoba. '
  '29':
  - type: text
    content: 'Hoy indray Izy: Tsy hatao hoe Jakoba intsony ny anaranao fa Israely'
  - type: note
    content: 'Israely: Mpitolona amin’Andriamanitra.'
  - type: text
    content: ' satria nitolona tamin’Andriamanitra sy tamin’ny olona ianao ka nahery. '
  '3':
  - type: text
    content: 'Ary hoy i Jakoba raha nahita azy ireo: Tobin’Andriamanitra ity! Ary ny anaran’izany toerana izany dia nataony hoe Mahanaima'
  - type: note
    content: 'Mahanaima: Ny toby roa.'
  - type: text
    content: .
  - type: heading
    content: Miomana hihaona amin’i Esao i Jakoba
  '30':
  - type: text
    content: 'Dia nanontany i Jakoba hoe: Miangavy Anao aho, mba lazao izay anaranao! Ary hoy Izy: Nahoana no anontanianao ny anarako? Dia nitahy azy teo Izy. '
  '31':
  - type: text
    content: Ary ny anaran’izany toerana izany dia nataon’i Jakoba hoe Peniela
  - type: note
    content: 'Peniela: Tavan’Andriamanitra.'
  - type: text
    content: ' fa hoy izy: Nahita an’Andriamanitra nifanatrika tamiko aho, nefa voavonjy ny aiko. '
  '32':
  - type: text
    content: 'Dia niposaka taminy ny masoandro raha niala teo Peniela izy, ary nandringa izy noho ny feny. '
  '33':
  - type: text
    content: Izany no tsy ihinanan’ny Zanak’Israely ny hozatry ny tonon-taolam-pe mandraka androany satria nikapoka ny foto-pen’i Jakoba teo amin’ny hozatry ny tonon-taolany Izy.
  '4':
  - type: text
    content: 'Ary nandefa iraka hialoha azy ho any amin’i Esao rahalahiny, any Seìra, tanin’i Edoma i Jakoba. '
  '5':
  - type: text
    content: 'Nanome teny azy ireo anefa izy hoe: Izao no holazainareo amin’i Esao tompoko: Izao no tenin’i Jakoba mpanomponao: Nivahiny tany amin’i Labana aho ka nitoetra tany mandraka ankehitriny; '
  '6':
  - type: text
    content: manana omby, boriky, ondry aman’osy ary mpanompolahy aho; mandefa iraka hanambara aminao aho, tompokolahy, mba hahitako fitia eo imasonao.
  '7':
  - type: text
    content: 'Rehefa niverina tany amin’i Jakoba ireo iraka dia niteny hoe: Tafahaona tamin’i Esao rahalahinao izahay, ary izy koa dia avy hitsena anao mitondra olona efajato lahy. '
  '8':
  - type: text
    content: 'Dia natahotra indrindra i Jakoba ary nangitakitaka. Nozarainy roa toko ny olona izay nomba azy mbamin’ny ondry aman’osy sy ny omby ary ny rameva. '
  '9':
  - type: text
    content: 'Fa hoy izy: Raha tafahaona amin’ny antokony iray i Esao ka mamely azy dia handositra kosa ny antokony iray.'
