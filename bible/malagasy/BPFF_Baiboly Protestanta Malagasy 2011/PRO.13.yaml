document_id: PRO.13,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ny zanaka hendry dia mihaino ny fananaran’ny rainy,
  - type: text
    content: fa ny mpaniratsira tsy mety mihaino na dia anarina mafy aza.
  '10':
  - type: text
    content: Fifandirana ihany no vokatry ny fiavonavonana,
  - type: text
    content: fa ao amin’izay mino anatra no misy ny fahendrena.
  '11':
  - type: text
    content: Ny harena azoazo foana dia mihena lalandava,
  - type: text
    content: fa izay mahavatra mitsimpona no mampitombo azy.
  '12':
  - type: text
    content: Ny fanantenana tsy azo vetivety dia mankarary fo,
  - type: text
    content: fa hazon’aina ny faniriana tanteraka.
  '13':
  - type: text
    content: Izay manamavo ny teny dia ho voasingony,
  - type: text
    content: fa izay matahotra ny didy no hahazo valim-pitia.
  '14':
  - type: text
    content: Ny fampianaran’ny hendry dia loharanon’aina
  - type: text
    content: ka mampivily hiala amin’ny fandriky ny fahafatesana.
  '15':
  - type: text
    content: Ny fananan-tsaina mahay mandanjalanja dia ahazoam-pitia,
  - type: text
    content: fa ny lalan’ny mpivadika dia tsy mitondra mankaiza.
  '16':
  - type: text
    content: Ny mahira-tsaina rehetra dia miasa amin’ny fahalalana,
  - type: text
    content: fa ny adala kosa mampiharihary ny hadalany.
  '17':
  - type: text
    content: Idiran-doza ny iraka ratsy fanahy,
  - type: text
    content: fa ny iraka mahatoky dia mitondra fanasitranana.
  '18':
  - type: text
    content: Fahantrana sy henatra no ho an’izay mandà fananarana,
  - type: text
    content: fa izay mandray anatra no homem-boninahitra.
  '19':
  - type: text
    content: Mamin’ny fo ny faniriana tanteraka,
  - type: text
    content: fa fahavetavetana ho an’ny adala ny hiala amin’ny ratsy.
  '2':
  - type: text
    content: Ny vokatry ny tenin’ny olona no ihinanany zava-tsoa,
  - type: text
    content: fa ny hampidi-doza no mahafaly ny mpivadika.
  '20':
  - type: text
    content: Izay miara-dia amin’ny hendry dia ho hendry,
  - type: text
    content: fa izay misakaiza amin’ny adala dia hihadala.
  '21':
  - type: text
    content: Ny mpanota dia enjehin’ny loza,
  - type: text
    content: fa ny marina hovalìna soa.
  '22':
  - type: text
    content: Mamela lova soa ho an’ny zafiny ny tsara fanahy,
  - type: text
    content: fa ny harenan’ny mpanota kosa dia voatahiry ho an’ny marina.
  '23':
  - type: text
    content: Ny tanin’ny mahantra izay voaasa dia ahazoana hanina be,
  - type: text
    content: fa maro ireo ringana noho ny fanaovany izay tsy rariny.
  '24':
  - type: text
    content: Izay mitsitsy ny tsorakazony dia tsy tia ny zanany,
  - type: text
    content: fa izay tia zanaka dia tsy misalasala manitsy azy.
  '25':
  - type: text
    content: Mihinana ny marina ka voky tsara,
  - type: text
    content: fa noana ny kibon’ny ratsy fanahy.
  '3':
  - type: text
    content: Izay mitandrina ny fiteniny no miaro ny ainy,
  - type: text
    content: fa izay tsy mahay mangina dia ho ringana.
  '4':
  - type: text
    content: Maniry zavatra ny kamo, nefa tsy mba mahazo na inona na inona,
  - type: text
    content: fa ny mazoto kosa dia hanana ny feno.
  '5':
  - type: text
    content: Ny lainga dia halan’ny marina,
  - type: text
    content: fa manao izay maharikoriko sy mahamenatra ny ratsy fanahy.
  '6':
  - type: text
    content: Miaro izay mandeha tsy misy tsiny ny fahamarinana,
  - type: text
    content: fa ny faharatsiam-panahy no mamotraka ny mpanota.
  '7':
  - type: text
    content: Misy mihambo ho manankarena nefa tsy manana na inona na inona;
  - type: text
    content: misy kosa mody mahantra nefa manana harena be.
  '8':
  - type: text
    content: Ny harenan’ny olona dia avotry ny ainy,
  - type: text
    content: fa tsy mba mampiraika ny mahantra akory ny levilevy.
  '9':
  - type: text
    content: Ny fahazavan’ny marina dia feno fifaliana,
  - type: text
    content: fa ny jiron’ny ratsy fanahy ho faty.
