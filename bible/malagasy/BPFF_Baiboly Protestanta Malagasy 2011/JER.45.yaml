document_id: JER.45,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hafatry NY TOMPO ho an’i Baroka
  - type: text
    content: 'Ny teny izay nataon’i Jeremia mpaminany tamin’i Baroka, zanak’i Neria, fony izy nanoratra ireto teny ireto tamin’ny taratasy avy tamin’ny vavan’i Jeremia tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’i Joda:'
  '2':
  - type: text
    content: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely, ny aminao, ry Baroka: '
  '3':
  - type: text
    content: 'Hoy ianao: Nidiran-doza aho ity fa nampian’NY TOMPO alahelo ny fanaintainako! Efa sasatra ny misento aho ka tsy mahita fitsaharana. '
  '4':
  - type: text
    content: 'Lazao aminy hoe: Izao no lazain’NY TOMPO: Indro, horavako izay efa naoriko, ary hongotako izay efa namboleko, dia izao tany rehetra izao. '
  '5':
  - type: text
    content: Mitady zavatra lehibe ho anao va ianao? Aza mitady izany! Fa indro, hahatonga loza ho amin’ny nofo rehetra Aho, hoy NY TOMPO; fa raha ny ainao dia homeko anao ho babonao ihany any amin’izay rehetra halehanao.
