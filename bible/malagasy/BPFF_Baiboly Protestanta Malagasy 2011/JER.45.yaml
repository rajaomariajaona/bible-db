document_id: JER.45
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hafatry NY TOMPO ho an’i Baroka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny teny izay nataon’i Jeremia mpaminany tamin’i Baroka, zanak’i Neria, fony izy nanoratra ireto teny ireto tamin’ny taratasy avy tamin’ny vavan’i Jeremia tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’i Joda:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely, ny aminao, ry Baroka: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy ianao: Nidiran-doza aho ity fa nampian’NY TOMPO alahelo ny fanaintainako! Efa sasatra ny misento aho ka tsy mahita fitsaharana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lazao aminy hoe: Izao no lazain’NY TOMPO: Indro, horavako izay efa naoriko, ary hongotako izay efa namboleko, dia izao tany rehetra izao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mitady zavatra lehibe ho anao va ianao? Aza mitady izany! Fa indro, hahatonga loza ho amin’ny nofo rehetra Aho, hoy NY TOMPO; fa raha ny ainao dia homeko anao ho babonao ihany any amin’izay rehetra halehanao.
