    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: ny taranak’i Sefatia, ny taranak’i Hatila, ny taranak’i Pokereta-Hazebaima, ny taranak’i Amona.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ireto no lehilahy tamin’izany fari-piadidiana izany, izay niakatra avy tamin’ny fahababoana, dia ireo nobaboin’i Nebokadnezara, mpanjakan’i Babilona, nefa niverina tany Jerosalema sy Joda izy, samy ho any an-tanànany avy, '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: Ny Netinima rehetra sy ny taranaky ny mpanompon’i Solomona dia roa amby sivifolo sy telonjato.
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'Ary izao ireo niakatra avy tany Tela-Mela, Tela-Harsa, Keroba, Adona ary Imera, fa tsy nahalaza ny fianakaviany sy ny firazanany, na avy tamin’ny Israely izy na tsia: '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Ny taranak’i Delaia, ny taranak’i Tobia, ny taranak’i Nekoda: Roa amby efapolo sy eninjato.'
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'Ny avy tamin’ny mpisorona dia izao: Ny taranak’i Hobaia, ny taranak’i Hakoza, ny taranak’i Barizilay; nampaka-bady avy tamin’ny zanakavavin’i Barizilay gileadita io ka notononina araka ny anarany. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'Ireo dia nitady ny soratra filazana ny razany, saingy tsy hita izany; dia natao ho tsy madio izy ka nesorina tamin’ny fisoronana. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'Ary nilaza ny governora fa tsy mahazo mihinana ny zava-masina indrindra izy mandra-pitsangan’izay mpisorona iray mitondra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Orima sy Tomima
    - type: text
      text: .
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'Ny tontalin’ny olona rehetra dia enimpolo sy telonjato sy roa arivo sy efatra alina, '
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: 'afa-tsy ny mpanompolahiny sy ny mpanompovaviny fito amby telopolo sy telonjato sy fito arivo; ary nanana mpihira lahy sy mpihira vavy dimy amby efapolo sy roanjato izy; '
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: ny ramevany dia dimy amby telopolo sy efajato; ny borikiny dia roapolo sy fitonjato sy enina arivo.
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: 'Ny sasany tamin’ny lohan’ny fianakaviana dia nahafoy hanaovana ny asa. Ny governora dia nanome '
    - type: usfm
      marker: w
      children:
      - type: text
        text: drakma
    - type: text
      text: ' volamena arivo sy lovia famafazana dimampolo sy fanamian’ny mpisorona telopolo sy dimanjato ho kojakoja ho amin’ny hanaovana ny asa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'dia ny olona izay niaraka tamin’i Zerobabela, i Josoa, i Nehemia, i Azaria, i Ramia, i Nahamanỳ, i Mordekay, i Bilsana, i Mispereta, i Bigvay, i Nehoma ary i Bana:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny isan’ny lehilahy tamin’ny Israely dia izao:'
  '70':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: 'Ny sasany tamin’ny lohan’ny fianakaviana indray dia nanome drakma volamena roa alina sy volafotsy roanjato sy roa arivo '
    - type: usfm
      marker: w
      children:
      - type: text
