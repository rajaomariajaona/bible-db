    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Ny taranaky ny mpanompon’i Solomona dia ireto: Ny taranak’i Sotahy, ny taranak’i Sofereta, ny zanak’i Perida, '
  '58':
  - type: usfm
    marker: p
