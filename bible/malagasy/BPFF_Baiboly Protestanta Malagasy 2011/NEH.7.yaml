      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa hoy aho tamin’ireo: Aza avela hovohana ny vavahadin’i Jerosalema mandra-pahafanan’ny andro; ary raha mbola mijanona eo ny mpiambina dia aoka harindriny ny varavarana ka hidionareo; ary manendre mpiambina avy amin’izay monina ato Jerosalema ihany samy ho eo amin’ny fiambenany avy, dia samy ho eo amin’ny tandrifin’ny tranony avy. '
