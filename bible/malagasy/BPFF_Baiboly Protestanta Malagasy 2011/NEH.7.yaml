  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nomen’Andriamanitro hevitra aho hamory ny olo-manankaja sy ny mpanapaka mbamin’ny vahoaka mba halaina isa araka ny firazanany avy ireo. Ary hitako ny taratasy filazana ny firazanan’izay niakatra voalohany ka izao no hitako voasoratra tao:'
  - type: usfm
    marker: s1
    children:
    - type: text
