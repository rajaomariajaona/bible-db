document_id: NEH.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo fepetra niarovana ny tanàna
  - type: text
    content: 'Nony vita ny manda ka voalatsako ny lelam-bavahady, sady voatendry ny mpiandry varavarana sy ny mpihira ary ny '
  - type: text
    content: levita
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'ny taranak’i Ara: Roa amby dimampolo sy eninjato;'
  '11':
  - type: text
    content: 'ny taranak’i Pahata-Moaba, avy tamin’ny zanak’i Josoa sy i Joaba: Valo amby folo sy valonjato sy roa arivo;'
  '12':
  - type: text
    content: 'ny taranak’i Elama: Efatra amby dimampolo sy roanjato sy arivo;'
  '13':
  - type: text
    content: 'ny taranak’i Zato: Dimy amby efapolo sy valonjato;'
  '14':
  - type: text
    content: 'ny taranak’i Zakay: Enimpolo sy fitonjato;'
  '15':
  - type: text
    content: 'ny taranak’i Binoy: Valo amby efapolo sy eninjato;'
  '16':
  - type: text
    content: 'ny taranak’i Bebay: Valo amby roapolo sy eninjato;'
  '17':
  - type: text
    content: 'ny taranak’i Azgada: Roa amby roapolo sy telonjato sy roa arivo;'
  '18':
  - type: text
    content: 'ny zanak’i Adonikama: Fito amby enimpolo sy eninjato;'
  '19':
  - type: text
    content: 'ny taranak’i Bigvay: Fito amby enimpolo sy roa arivo;'
  '2':
  - type: text
    content: 'dia notendreko i Hanany rahalahiko sy i Hanania, lehiben’ny tao an-dapa mba hitandrina an’i Jerosalema, fa lehilahy mahatoky izy sady matahotra an’Andriamanitra mihoatra noho ny maro. '
  '20':
  - type: text
    content: 'ny taranak’i Adina: Dimy amby dimampolo sy eninjato;'
  '21':
  - type: text
    content: 'ny taranak’i Atera, avy tamin’i Hezekia: Valo amby sivifolo;'
  '22':
  - type: text
    content: 'ny taranak’i Hasoma: Valo amby roapolo sy telonjato;'
  '23':
  - type: text
    content: 'ny taranak’i Bezay: Efatra amby roapolo sy telonjato;'
  '24':
  - type: text
    content: 'ny taranak’i Harifa: Roa amby folo amby zato;'
  '25':
  - type: text
    content: 'ny taranak’i Gibeona: Dimy amby sivifolo.'
  '26':
  - type: text
    content: 'Ny mponina tany Betlehema sy Netofa: Valo amby valopolo amby zato;'
  '27':
  - type: text
    content: 'ny mponina tany Anatota: Valo amby roapolo amby zato;'
  '28':
  - type: text
    content: 'ny mponina tany Bety-Azmaveta: Roa amby efapolo;'
  '29':
  - type: text
    content: 'ny mponina tany Kiriata-Jearima sy Kefira ary Berota: Telo amby efapolo sy fitonjato;'
  '3':
  - type: text
    content: 'Koa hoy aho tamin’ireo: Aza avela hovohana ny vavahadin’i Jerosalema mandra-pahafanan’ny andro; ary raha mbola mijanona eo ny mpiambina dia aoka harindriny ny varavarana ka hidionareo; ary manendre mpiambina avy amin’izay monina ato Jerosalema ihany samy ho eo amin’ny fiambenany avy, dia samy ho eo amin’ny tandrifin’ny tranony avy. '
  '30':
  - type: text
    content: 'ny mponina tany Rama sy Geva: Iraika amby roapolo sy eninjato;'
  '31':
  - type: text
    content: 'ny mponina tany Mikmasy: Roa amby roapolo amby zato;'
  '32':
  - type: text
    content: 'ny mponina tany Betela sy Ay: Telo amby roapolo amby zato;'
  '33':
  - type: text
    content: 'ny mponina tany amin’ilay Nebo iray: Roa amby dimampolo;'
  '34':
  - type: text
    content: 'ny zanak’ilay Elama iray: Efatra amby dimampolo sy roanjato sy arivo;'
  '35':
  - type: text
    content: 'ny zanak’i Harima: Roapolo sy telonjato;'
  '36':
  - type: text
    content: 'ny zanak’i Jeriko: Dimy amby efapolo sy telonjato;'
  '37':
  - type: text
    content: 'ny zanak’i Loda sy i Hadida ary i Ono: Iraika amby roapolo sy fitonjato;'
  '38':
  - type: text
    content: 'ny zanak’i Sena: Telopolo sy sivinjato sy telo arivo.'
  '39':
  - type: text
    content: 'Ary ny mpisorona dia izao: Ny taranak’i Jedaia, avy tamin’ny fianakavian’i Josoa: Telo amby fitopolo sy sivinjato;'
  '4':
  - type: text
    content: Malalaka sy lehibe moa ny tanàna, nefa vitsy olona sady tsy mbola vita ny trano.
  '40':
  - type: text
    content: 'ny taranak’Imera: Roa amby dimampolo sy arivo;'
  '41':
  - type: text
    content: 'ny taranak’i Pasora: Fito amby efapolo sy roanjato sy arivo;'
  '42':
  - type: text
    content: 'ny taranak’i Harima: Fito amby folo sy arivo.'
  '43':
  - type: text
    content: 'Ny '
  - type: text
    content: levita
  - type: text
    content: ' dia ireto: Ny zanak’i Josoa sy i Kadmiela avy tamin’ny zanak’i Hodva dia efatra amby fitopolo.'
  '44':
  - type: text
    content: 'Ny mpihira dia izao: Ny taranak’i Asafa, valo amby efapolo amby zato.'
  '45':
  - type: text
    content: 'Ny mpiandry varavarana dia izao: Ny taranak’i Saloma, ny taranak’i Atera, ny taranak’i Talmona, ny taranak’i Akoba, ny taranak’i Hatita, ny taranak’i Sobay: Valo amby telopolo amby zato.'
  '46':
  - type: text
    content: 'Ny '
  - type: text
    content: Netinima
  - type: text
    content: ' dia izao: Ny taranak’i Ziha, ny taranak’i Hasofa, ny taranak’i Tabaota, '
  '47':
  - type: text
    content: 'ny taranak’i Kerosa, ny taranak’i Sia, ny taranak’i Padona, '
  '48':
  - type: text
    content: 'ny taranak’i Lebana, ny taranak’i Hagaba, ny taranak’i Salmay, '
  '49':
  - type: text
    content: 'ny taranak’i Hanana, ny taranak’i Gidela, ny taranak’i Gahara, '
  '5':
  - type: text
    content: 'Dia nomen’Andriamanitro hevitra aho hamory ny olo-manankaja sy ny mpanapaka mbamin’ny vahoaka mba halaina isa araka ny firazanany avy ireo. Ary hitako ny taratasy filazana ny firazanan’izay niakatra voalohany ka izao no hitako voasoratra tao:'
  - type: heading
    content: Anaran’ireo Jiosy nody tany Jerosalema sy Joda
  - type: heading
    content: Ezr 2.1-70
  '50':
  - type: text
    content: 'ny taranak’i Reaia, ny taranak’i Rezina, ny taranak’i Nekoda, '
  '51':
  - type: text
    content: 'ny taranak’i Gazama, ny taranak’i Oza, ny taranak’i Pasea, '
  '52':
  - type: text
    content: 'ny taranak’i Besay, ny taranaky ny Meonita, ny taranaky ny Nefisita, '
  '53':
  - type: text
    content: 'ny taranak’i Bakiboka, ny taranak’i Hakafa, ny taranak’i Harora, '
  '54':
  - type: text
    content: 'ny taranak’i Bazilita, ny taranak’i Mehida, ny taranak’i Harsa, '
  '55':
  - type: text
    content: 'ny taranak’i Barikosa, ny taranak’i Sisera, ny taranak’i Tema, '
  '56':
  - type: text
    content: ny taranak’i Nezia, ny taranak’i Hatifa.
  '57':
  - type: text
    content: 'Ny taranaky ny mpanompon’i Solomona dia ireto: Ny taranak’i Sotahy, ny taranak’i Sofereta, ny zanak’i Perida, '
  '58':
  - type: text
    content: 'ny taranak’i Jala, ny taranak’i Darikona, ny taranak’i Gidela, '
  '59':
  - type: text
    content: ny taranak’i Sefatia, ny taranak’i Hatila, ny taranak’i Pokereta-Hazebaima, ny taranak’i Amona.
  '6':
  - type: text
    content: 'Ireto no lehilahy tamin’izany fari-piadidiana izany, izay niakatra avy tamin’ny fahababoana, dia ireo nobaboin’i Nebokadnezara, mpanjakan’i Babilona, nefa niverina tany Jerosalema sy Joda izy, samy ho any an-tanànany avy, '
  '60':
  - type: text
    content: Ny Netinima rehetra sy ny taranaky ny mpanompon’i Solomona dia roa amby sivifolo sy telonjato.
  '61':
  - type: text
    content: 'Ary izao ireo niakatra avy tany Tela-Mela, Tela-Harsa, Keroba, Adona ary Imera, fa tsy nahalaza ny fianakaviany sy ny firazanany, na avy tamin’ny Israely izy na tsia: '
  '62':
  - type: text
    content: 'Ny taranak’i Delaia, ny taranak’i Tobia, ny taranak’i Nekoda: Roa amby efapolo sy eninjato.'
  '63':
  - type: text
    content: 'Ny avy tamin’ny mpisorona dia izao: Ny taranak’i Hobaia, ny taranak’i Hakoza, ny taranak’i Barizilay; nampaka-bady avy tamin’ny zanakavavin’i Barizilay gileadita io ka notononina araka ny anarany. '
  '64':
  - type: text
    content: 'Ireo dia nitady ny soratra filazana ny razany, saingy tsy hita izany; dia natao ho tsy madio izy ka nesorina tamin’ny fisoronana. '
  '65':
  - type: text
    content: 'Ary nilaza ny governora fa tsy mahazo mihinana ny zava-masina indrindra izy mandra-pitsangan’izay mpisorona iray mitondra ny '
  - type: text
    content: Orima sy Tomima
  - type: text
    content: .
  '66':
  - type: text
    content: 'Ny tontalin’ny olona rehetra dia enimpolo sy telonjato sy roa arivo sy efatra alina, '
  '67':
  - type: text
    content: 'afa-tsy ny mpanompolahiny sy ny mpanompovaviny fito amby telopolo sy telonjato sy fito arivo; ary nanana mpihira lahy sy mpihira vavy dimy amby efapolo sy roanjato izy; '
  '68':
  - type: text
    content: ny ramevany dia dimy amby telopolo sy efajato; ny borikiny dia roapolo sy fitonjato sy enina arivo.
  '69':
  - type: text
    content: 'Ny sasany tamin’ny lohan’ny fianakaviana dia nahafoy hanaovana ny asa. Ny governora dia nanome '
  - type: text
    content: drakma
  - type: text
    content: ' volamena arivo sy lovia famafazana dimampolo sy fanamian’ny mpisorona telopolo sy dimanjato ho kojakoja ho amin’ny hanaovana ny asa. '
  '7':
  - type: text
    content: 'dia ny olona izay niaraka tamin’i Zerobabela, i Josoa, i Nehemia, i Azaria, i Ramia, i Nahamanỳ, i Mordekay, i Bilsana, i Mispereta, i Bigvay, i Nehoma ary i Bana:'
  - type: text
    content: 'Ny isan’ny lehilahy tamin’ny Israely dia izao:'
  '70':
  - type: text
    content: 'Ny sasany tamin’ny lohan’ny fianakaviana indray dia nanome drakma volamena roa alina sy volafotsy roanjato sy roa arivo '
  - type: text
    content: mane
  - type: text
    content: ' ho kojakoja ho amin’ny hanaovana ny asa. '
  '71':
  - type: text
    content: Drakma volamena roa alina sy volafotsy roa arivo mane ary fanamian’ny mpisorona fito amby enimpolo no nomen’ny olona sisa.
  '72':
  - type: text
    content: Samy tafapetraka teny an-tanànany avy ny mpisorona sy ny levita, ny mpiandry varavarana, ny mpihira sy ny sasany amin’ny vahoaka ary ny Netinima, mbamin’ny Israely rehetra. Ary rehefa tonga ny volana fahafito dia samy tany an-tanànany avy ny Zanak’Israely.
  '8':
  - type: text
    content: 'Ny taranak’i Parosy: Roa amby fitopolo amby zato sy roa arivo;'
  '9':
  - type: text
    content: 'ny taranak’i Sefatia: Roa amby fitopolo sy telonjato;'
