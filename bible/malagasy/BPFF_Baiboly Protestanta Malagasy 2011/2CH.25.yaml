document_id: 2CH.25,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakan’i Amazia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 14.1-7
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dimy amby roapolo taona i Amazia raha nanomboka nanjaka ary sivy amby roapolo taona no nanjakany tany Jerosalema. Ary ny anaran’ny reniny dia Joadana, avy any Jerosalema. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia navahan’i Amazia ireo miaramila tonga tao aminy avy tamin’ny Efraima mba hody indray any amin’ny taniny; ary nirehitra mafy ny fahatezeran’ireo tamin’ny Joda, dia lasa nody izy ireo sady tezitra mafy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitombo hery i Amazia, dia nitarika ny vahoakany ka nankany amin’ny Lohasahantsira ary nahafaty iray alina tamin’ny taranak’i Seìra izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nahazo sambo-belona iray alina koa ny taranak’i Joda, dia noentiny teo an-tampon’ny harambato ary navariny teo ka montsamontsana izy rehetra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ireo miaramila izay nampodìn’i Amazia tsy hiara-manafika aminy dia nihahakahaka teny an-tanànan’i Joda hatrany Samaria ka hatrany Bety-Horona ka nahafaty olona telo arivo tany sady nahazo babo betsaka.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony niverina avy nanafika ny Edomita i Amazia dia nitondra ny andriamanitry ny taranak’i Seìra ka nanangana azy ho andriamaniny; ary niankohoka teo anatrehany izy sady nandoro ditin-kazo manitra ho azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nirehitra tamin’i Amazia ny fahatezeran’NY TOMPO ka naniraka mpaminany iray ho any aminy Izy hanontany azy hoe: Nahoana ianao no mitady ny andriamanitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ', izay tsy naharo akory ny olony tamin’ny tananao aza? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa niteny taminy izy dia novalìny hoe: Moa voatendrinay ho mpanolotsaina ny mpanjaka va ianao? Aoka itsỳ ange, fandrao asian’ny olona ianao. Dia nitsahatra ilay mpaminany ka niteny hoe: Fantatro fa Andriamanitra mikasa hahafaty anao satria nanao izany ianao ka tsy nihaino ny anatro.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Resin’i Joasy mpanjakan’ny Israely i Amazia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 14.8-14
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naka hevitra i Amazia, mpanjakan’ny Joda, koa nandefa iraka tany amin’i Joasy, zanak’i Joahaza, zanak’i Jeho, mpanjakan’ny Israely, hilaza hoe: Avia, aoka isika hifanandrina. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nandefa iraka tany amin’i Amazia, mpanjakan’ny Joda, i Joasy, mpanjakan’ny Israely, hilaza hoe: Ny tsilo izay tany Libanona dia nandefa iraka tamin’ny hazo sedera izay tany Libanona nilaza hoe: Omeo ny zanako lahy ny zanakao vavy ho vadiny. Nefa dia nisy bibidia tany Libanona nandalo teo ka nanosihosy ny tsilo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazainao fa namely an’i Edoma ianao ka nirehareha ny fonao; mitoera ihany ao an-tranonao, fa nahoana no hihantsy ny loza hahalavo ny tenanao mbamin’i Joda koa ianao? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay mahitsy teo imason’NY TOMPO izy, nefa tsy dia tamin’ny fony manontolo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nanaiky anefa i Amazia, satria avy tamin’Andriamanitra izany, mba hanolorany azy ho eo an-tanan’ny fahavalony noho ny nitadiavany ny andriamanitry ny Edomita. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra i Joasy, mpanjakan’ny Israely; ary nihaona tao Bety-Semesy izay an’i Joda izy sy i Amazia, mpanjakan’ny Joda. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia resy teo anoloan’ny Israely ny Joda ka samy nandositra ho any amin’ny tranolainy avy izy ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Amazia, mpanjakan’ny Joda, zanak’i Joasy, zanak’i Joahaza, dia nosamborin’i Joasy, mpanjakan’ny Israely, tany Bety-Semesy ka noentiny nankany Jerosalema; nandravan’i Joasy efajato '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny mandan’i Jerosalema hatreo amin’ny vavahadin’i Efraima ka hatrany amin’ny vavahady eo an-jorony. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nalainy avokoa ny volamena sy ny volafotsy rehetra ary ny fanaka rehetra izay hita tao amin’ny tranon’Andriamanitra tao amin’i Obeda-Edoma sy tao amin’ny efitrano fitahirizana ao amin’ny ny tranon’ny mpanjaka mbamin’ny olona natao antoka koa, izay izy vao niverina ho any Samaria.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nifaranan’ny fanjakan’i Amazia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 14.17-20
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny andro niainan’i Amazia zanak’i Joasy, mpanjakan’ny Joda, taorianan’ny nahafatesan’i Joasy, zanak’i Joahaza, mpanjakan’ny Israely, dia dimy amby folo taona. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tantaran’i Amazia sisa, hatramin’ny voalohany ka hatramin’ny farany, indro, tsy voasoratra ao amin’ny bokin’ny mpanjakan’ny Joda sy ny Israely va izany? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatramin’ny andro nihemoran’i Amazia tsy nanaraka NY TOMPO dia nikomy taminy ny olona tany Jerosalema ka nandositra nankany Lakisy izy; nefa nandefa iraka hanaraka azy tany ny olona ka namono azy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nasampiny tamin’ny soavaly ny fatiny dia naleviny tao amin’ny razany tao an-tanànan’i Joda.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tafapetraka tsara tamin’ny fanjakany izy dia novonoiny ireo mpanompony izay namono ny mpanjaka rainy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa ny zanak’ireo namono dia tsy mba novonoiny fa nataony araka izay voasoratra ao amin’ny bokin’ny lalàna, ao amin’ny bokin’i Mosesy, izay nandidian’NY TOMPO hoe: Ny ray dia tsy hovonoina amin’ny ataon’ny zanany, ary ny zanaka dia tsy hovonoina amin’ny ataon’ny rainy, fa samy ho faty amin’ny fahotany avy ny olona.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novorin’i Amazia ny Joda ka nalahany araka ny fianakaviany avy, dia araka ny mpifehy arivo sy ny mpifehy zato avy amin’i Joda sy i Benjamina rehetra: Dia nisainy ny hatramin’ny roapolo taona no ho miakatra ka olona telo hetsy voafantina no hitany, izay azo nalefa hanafika sady nahatan-defona sy ampinga lehibe. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy lehilahy mahery iray hetsy tamin’ny Israely nokaramainy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ' volafotsy zato.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa nisy lehilahin’Andriamanitra tonga tao aminy ka nilaza hoe: Ry mpanjaka, aza avela hanaraka anao ny miaramilan’ny Israely; fa tsy omban’NY TOMPO ny Israely, dia ny taranak’i Efraima rehetra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mandehana ihany ianao ka miadia ary mahereza amin’ny ady; fa hataon’Andriamanitra lavo eo anoloan’ny fahavalo ianao; fa Andriamanitra no mahay mamonjy sy mampahalavo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Amazia tamin’ilay lehilahin’Andriamanitra: Koa hataontsika ahoana ny amin’ny talenta zato nomeko ny miaramilan’ny Israely? Ary hoy ilay lehilahin’Andriamanitra taminy: Mahay manome anao mihoatra lavitra noho izany NY TOMPO. '
