document_id: MAL.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Didy ho an’ny mpisorona
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ankehitriny ry mpisorona, ho anareo izao didy izao:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tsy mpiombona ray va isika rehetra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy Andriamanitra iray ihany va no nahary antsika?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana no samy mivadika amin’ny rahalahintsika avy isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mamadika ny faneken’ny razantsika?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny Joda dia efa namitaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary misy fahavetavetana atao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny Israely sy eto Jerosalema.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa efa nandoto ny fitoera-masin’NY TOMPO izay tiany ny Joda: Nanambady ny zanakavavin’ny andriamanitra hafa izy. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Enga anie ka hofongoran’NY TOMPO hiala amin’ny tranolain’i Jakoba ny lehilahy izay manao izany, na iza na iza, sy izay manolotra fanatitra ho an’Andriamanitra, Tompon’izao rehetra izao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Faharoan’izany, izao koa no ataonareo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saronanareo ranomaso sy fitomaniana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fisentoana ny alitaran’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mba jereny intsony ny fanatitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hankasitraka na inona na inona avy amin’ny tananareo Izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nefa hoy ianareo: Nahoana?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria NY TOMPO no vavolombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny aminao sy ny vadin’ny fahatanoranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nofitahinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia namanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady vady efa vita fanekena taminao aza izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nahoana no nisy iray nanao izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa mba manam-panahy ihany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taranaka araka an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anefa no notadiavin’ilay iray.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tandremo ny fiainanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka tsy hisy hamitaka ny vadin’ny fahatanorany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa halako ny fisaoram-bady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO, Andriamanitr’Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: halako ny fanosihosena ny fitafiany amin’ny fampahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tandremo ny fanahinareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mamitaka ianareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpanambara fitsarana
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Efa manasatra NY TOMPO amin’ny teninareo ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nefa hoy ianareo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’inona moa no anasaranay Azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Amin’ny ilazanareo hoe: Izay rehetra manao ratsy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsara eo imason’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ankasitrahany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'na amin’ny hoe: Aiza ny Andriamanitry ny fitsarana?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Raha tsy mihaino Ahy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy mandatsaka am-po
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy manome voninahitra ny anarako ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia halefako hamely anareo ny ozona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hozoniko ny tsodrano ataonareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, efa voaozoko sahady izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy nandatsaka am-po ianareo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Indro, hasiako teny mafy ny voa afafinareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hofafazako tain-droroha ny tavanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tain-droroha avy amin’ny andro firavoravoanareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hailika miaraka aminy ianareo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia ho fantatrareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nampitondra izany didy izany ho aminareo Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba haharetan’ilay fanekeko tamin’i Levy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny fanekeko taminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fiainana sy fiadanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nomeko azy ho fahatahorana izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka natahotra Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nangovitra teo anatrehan’ny anarako izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny lalànan’ny fahamarinana no teo am-bavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba nisy tsy fahamarinana teo amin’ny molony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny fiadanana sy ny fahitsiana no niarahany nandeha tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary maro no niverina niala tamin’ny heloka.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa ny molotry ny mpisorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tokony hitahiry fahalalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lalàna dia hotadiavina eo am-bavany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria izy dia irak’Andriamanitra, Tompon’izao rehetra izao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa efa nivily lalana kosa ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nanafintohina olona maro ny amin’ny lalàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary namadika ilay fanekena tamin’i Levy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Izaho kosa dia efa nanolotra anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fanimbazimba sy ho fanao tsinontsinona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehan’ny vahoaka rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny tsy nitandremanareo ny lalako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny nizahanareo tavan’olona eo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fampiharanareo ny lalàna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fivadihana amin’ny fanekena
    marker-yv: yv-h
