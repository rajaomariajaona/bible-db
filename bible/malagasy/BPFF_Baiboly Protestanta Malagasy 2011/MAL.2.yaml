document_id: MAL.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Didy ho an’ny mpisorona
  - type: text
    content: 'Ankehitriny ry mpisorona, ho anareo izao didy izao:'
  '10':
  - type: text
    content: Tsy mpiombona ray va isika rehetra?
  - type: text
    content: Tsy Andriamanitra iray ihany va no nahary antsika?
  - type: text
    content: Koa nahoana no samy mivadika amin’ny rahalahintsika avy isika
  - type: text
    content: ka mamadika ny faneken’ny razantsika?
  '11':
  - type: text
    content: Ny Joda dia efa namitaka,
  - type: text
    content: ary misy fahavetavetana atao
  - type: text
    content: ao amin’ny Israely sy eto Jerosalema.
  - type: text
    content: 'Fa efa nandoto ny fitoera-masin’NY TOMPO izay tiany ny Joda: Nanambady ny zanakavavin’ny andriamanitra hafa izy. '
  '12':
  - type: text
    content: Enga anie ka hofongoran’NY TOMPO hiala amin’ny tranolain’i Jakoba ny lehilahy izay manao izany, na iza na iza, sy izay manolotra fanatitra ho an’Andriamanitra, Tompon’izao rehetra izao.
  '13':
  - type: text
    content: 'Faharoan’izany, izao koa no ataonareo:'
  - type: text
    content: Saronanareo ranomaso sy fitomaniana
  - type: text
    content: ary fisentoana ny alitaran’NY TOMPO
  - type: text
    content: ka tsy mba jereny intsony ny fanatitra
  - type: text
    content: ary tsy hankasitraka na inona na inona avy amin’ny tananareo Izy.
  '14':
  - type: text
    content: 'Nefa hoy ianareo: Nahoana?'
  - type: text
    content: Satria NY TOMPO no vavolombelona
  - type: text
    content: ny aminao sy ny vadin’ny fahatanoranao
  - type: text
    content: izay nofitahinao
  - type: text
    content: na dia namanao
  - type: text
    content: sady vady efa vita fanekena taminao aza izy.
  '15':
  - type: text
    content: Nahoana no nisy iray nanao izany
  - type: text
    content: nefa mba manam-panahy ihany?
  - type: text
    content: Taranaka araka an’Andriamanitra
  - type: text
    content: anefa no notadiavin’ilay iray.
  - type: text
    content: Koa tandremo ny fiainanareo
  - type: text
    content: ary aoka tsy hisy hamitaka ny vadin’ny fahatanorany.
  '16':
  - type: text
    content: Fa halako ny fisaoram-bady,
  - type: text
    content: hoy NY TOMPO, Andriamanitr’Israely,
  - type: text
    content: halako ny fanosihosena ny fitafiany amin’ny fampahoriana,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: text
    content: Koa tandremo ny fanahinareo
  - type: text
    content: ary aza mamitaka ianareo.
  - type: heading
    content: Ny mpanambara fitsarana
  '17':
  - type: text
    content: Efa manasatra NY TOMPO amin’ny teninareo ianareo,
  - type: text
    content: 'nefa hoy ianareo:'
  - type: text
    content: Amin’inona moa no anasaranay Azy?
  - type: text
    content: 'Amin’ny ilazanareo hoe: Izay rehetra manao ratsy'
  - type: text
    content: dia tsara eo imason’NY TOMPO
  - type: text
    content: ka ankasitrahany,
  - type: text
    content: 'na amin’ny hoe: Aiza ny Andriamanitry ny fitsarana?'
  '2':
  - type: text
    content: Raha tsy mihaino Ahy ianareo,
  - type: text
    content: raha tsy mandatsaka am-po
  - type: text
    content: ka tsy manome voninahitra ny anarako ianareo,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: dia halefako hamely anareo ny ozona
  - type: text
    content: ka hozoniko ny tsodrano ataonareo;
  - type: text
    content: eny, efa voaozoko sahady izany
  - type: text
    content: satria tsy nandatsaka am-po ianareo.
  '3':
  - type: text
    content: Indro, hasiako teny mafy ny voa afafinareo
  - type: text
    content: ary hofafazako tain-droroha ny tavanareo,
  - type: text
    content: dia ny tain-droroha avy amin’ny andro firavoravoanareo;
  - type: text
    content: ary hailika miaraka aminy ianareo.
  '4':
  - type: text
    content: Dia ho fantatrareo
  - type: text
    content: fa nampitondra izany didy izany ho aminareo Aho
  - type: text
    content: mba haharetan’ilay fanekeko tamin’i Levy,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '5':
  - type: text
    content: Ny fanekeko taminy
  - type: text
    content: dia fiainana sy fiadanana,
  - type: text
    content: ary nomeko azy ho fahatahorana izany
  - type: text
    content: ka natahotra Ahy
  - type: text
    content: sy nangovitra teo anatrehan’ny anarako izy.
  '6':
  - type: text
    content: Ny lalànan’ny fahamarinana no teo am-bavany
  - type: text
    content: ary tsy mba nisy tsy fahamarinana teo amin’ny molony;
  - type: text
    content: tamin’ny fiadanana sy ny fahitsiana no niarahany nandeha tamiko,
  - type: text
    content: ary maro no niverina niala tamin’ny heloka.
  '7':
  - type: text
    content: Fa ny molotry ny mpisorona
  - type: text
    content: dia tokony hitahiry fahalalana,
  - type: text
    content: ary ny lalàna dia hotadiavina eo am-bavany,
  - type: text
    content: satria izy dia irak’Andriamanitra, Tompon’izao rehetra izao.
  '8':
  - type: text
    content: Fa efa nivily lalana kosa ianareo
  - type: text
    content: sady nanafintohina olona maro ny amin’ny lalàna
  - type: text
    content: ary namadika ilay fanekena tamin’i Levy,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '9':
  - type: text
    content: Izaho kosa dia efa nanolotra anareo
  - type: text
    content: ho fanimbazimba sy ho fanao tsinontsinona
  - type: text
    content: eo anatrehan’ny vahoaka rehetra,
  - type: text
    content: noho ny tsy nitandremanareo ny lalako
  - type: text
    content: sy ny nizahanareo tavan’olona eo
  - type: text
    content: amin’ny fampiharanareo ny lalàna.
  - type: heading
    content: Fivadihana amin’ny fanekena
