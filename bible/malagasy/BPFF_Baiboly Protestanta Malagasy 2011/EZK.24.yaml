document_id: EZK.24,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerosalema dia tahaka ny vilany fahandroana harafesenina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny andro fahafolo tamin’ny volana fahafolo, tamin’ny taona fahasivy dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Atohofy betsaka ny kitay hazo, ampireheto ny afo, masaho tsara ny hena ka asio zavatra hahamanitra azy ary aoka ho may ny taolana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia foàny ny vilany ka ataovy eo ambonin’ny vainafo hampahafana sy hahamay ny varahina ao aminy ka ho levona ny fahalotoany ao anatiny, ary ho afaka ny harafesina aminy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Lany foana ny hasasarana, nefa tsy nety afaka ny harafesimbeny; aoka ho eo amin’ny afo ny harafesina aminy! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny fahavetavetanao dia ao amin’ny fahalotoanao; satria nanadio anao Aho nefa tsy nadio ianao, koa tsy hadio ho afaka amin’ny fahalotoana intsony ianao raha tsy hanamparako ny fahatezerako. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izaho TOMPO no niteny; ho tonga izany ary hataoko; tsy hiahotrahotra Aho, na hiantra, na hanenina. Araka ny lalanao sy ny asanao no hitsarana anao, hoy NY TOMPO Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misaona i Ezekiela
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', indro, hesoriko amin’ny loza indray mamely monja ilay tian’ny masonao. Nefa aza misaona na mitomany na mandatsa-dranomaso akory ianao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Misentoa mangingina ihany ianao fa aza mitomany na misaona ny maty; afehezo aminao ny fehilohanao, ary asio kapa ny tongotrao, ary aza manarona ny saokanao na mihinana ny sakafo aterin’ny olona.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nony maraina dia niteny tamin’ny olona aho, ary nony hariva dia maty ny vadiko. Nony maraina indray dia nanatanteraka izay nandidiana ahy aho. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy ny olona tamiko: Moa tsy holazainao aminay va izay hevitra tokony ho azonay amin’izao ataonao izao? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', soratinao ny anaran’ny andro, dia izao andro anio izao; ny mpanjakan’i Babilona dia manomboka mamely an’i Jerosalema amin’izao andro anio izao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia hoy aho taminy: Tonga tamiko ny tenin’NY TOMPO hoe: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Lazao amin’ny taranak’Israely hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, holotoiko ny fitoerako masina, izay reharehan’ny herinareo, dia ilay tian’ny masonareo sy mahamanina ny fanahinareo; ary ho lavon’ny sabatra ny zanakalahinareo sy ny zanakavavinareo izay nilaozanareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hanao tahaka ny nataoko ianareo: Tsy hanarona ny saokanareo ianareo, na hihinana ny sakafo aterin’ny olona; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ho eo an-dohanareo ny fehilohanareo ary ho eo an-tongotrareo ny kapanareo; tsy hisaona na hitomany ianareo; fa ho levona noho ny helokareo ianareo ka hifampitoloko. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary i Ezekiela dia ho famantarana mahagaga ho anareo. Araka izay rehetra nataony no hataonareo. Ary rehefa tonga izany dia ho fantatrareo fa Izaho no TOMPO Andriamanitra.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary ianao, ry zanak’olona, amin’ny andro hanesorako aminy ny heriny, ny fifaliany, ny voninahiny, ilay tian’ny masony sy ilay tian’ny fanahiny, ny zanany lahy sy ny zanany vavy, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'amin’izany andro izany dia hisy olona afa-nandositra ho tonga any aminao mba hampandre izany aminao. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Amin’izany andro izany dia hisokatra miaraka amin’ny vavan’ilay mpandositra ny vavanao. Dia hiteny ianao ka tsy ho moana intsony, ary ho famantarana mahagaga aminy ianao; dia ho fantany fa Izaho no TOMPO.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Milazà fanoharana amin’ny taranaka maditra ka lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asio vilany eo an-tokoana, eny, ataovy eo an-tokoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka asio rano ao anatiny.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Arotsahy ao ny vaingambaingany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny vaingambaingany tsara rehetra, na ny feny na ny sorony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fenoy taolana voafantina izany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Alao ny ondry voafantina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tohofy kitay betsaka ao ambaniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka angony eo ambaniny ny taolana, dia ampangotrahy tsara izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka andrahoy ao ny taolany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa izao no lazain’NY TOMPO Andriamanitra: Lozan’ny tanàna mpandatsa-dra sy ny vilany izay misy harafesina tsy mety afaka ao anatiny! Loary tsirairay ny vaingambaingany fa aza anaovana antsapaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa ny rany dia ao aminy; teo ambonin’ny vatolampy mangadihady no nametrahany azy; tsy naidiny tamin’ny tany hosaronan’ny vovoka izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mba hampiakatra ny fahatezerana hamaliana azy no nametrahako ny rany teo ambonin’ny vatolampy mangadihady mba tsy ho voasarona.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Lozan’ny tanàna mpandatsa-dra! Izaho koa hamory kitay betsaka. '
