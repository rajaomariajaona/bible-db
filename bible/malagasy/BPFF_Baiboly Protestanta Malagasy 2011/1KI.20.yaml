document_id: 1KI.20,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manao fahirano an’i Samaria i Beny-Hadada
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namory ny miaramilany rehetra i Beny-Hadada, mpanjakan’i Arama, ary nisy mpanjaka roa amby telopolo mbamin’ny soavaly sy kalesy fitondra miady niaraka taminy. Dia niakatra izy ka nanao fahirano an’i Samaria ary nanafika azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka tany aminy i Beny-Hadada ka niteny hoe: Hataon’ireo andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha ho ampy akory ny vovok’i Samaria hameno ny tanana an’ilan’ireto olona manaraka ahy ireto! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namaly ny mpanjakan’ny Israely hoe: Izao no holazainareo aminy: Aoka izay vao misikina hiady mba tsy hirehareha toy izay efa mamaha fehikibo avy niady!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa ren’i Beny-Hadada izany teny izany, raha mbola nisotro tao amin’ny trano rantsan-kazo izy sy ireo mpanjaka, dia hoy izy tamin’ny mpanompony: Milahara ianareo! Dia nilahatra hanafika ny tanàna ireo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandresen’i Ahaba voalohany
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro, nisy mpaminany iray nanatona an’i Ahaba, mpanjakan’ny Israely, ka niteny hoe: Izao no lazain’NY TOMPO: Hitanao va ireo vahoaka marobe rehetra ireo? Indro, hatolotro eo an-tananao ireo anio, dia ho fantatrao fa Izaho no TOMPO. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Ahaba: Amin’ny alalan’iza? Dia hoy izy: Izao no lazain’NY TOMPO: Amin’ny alalan’ny zatovon’ireo komandin’ny fari-piadidiana. Dia hoy izy: Iza ary no hanokatra ny ady? Ianao, hoy izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandamina ny zatovon’ireo komandin’ny fari-piadidiana izy, koa roa amby telopolo sy roanjato no isany; manaraka izany, nandamina ny olona rehetra izy, dia ny Zanak’Israely rehetra, koa fito arivo no isany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga izy ireo tamin’ny mitataovovonana. Fa nisotro i Beny-Hadada ka mamo tao amin’ny trano rantsan-kazo izy sy ireo mpanjaka roa amby telopolo izay nanampy azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zatovon’ireo komandin’ny fari-piadidiana izany no nivoaka voalohany. Ary nandefa iraka i Beny-Hadada ka nisy nanao tatitra hoe: Misy olona miainga avy any Samaria. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy: Na ho avy hihavana izy, na ho avy hiady, dia ataovy sambo-belona! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka avy tao an-tanàna ary ny zatovon’ireo komandin’ny fari-piadidiana sy ny miaramila izay nanaraka azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandefa iraka ho any amin’i Ahaba, mpanjakan’ny Israely, tany an-tanàna, izy '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy nahafaty olona iray avy izy rehetra ka vaky nandositra ny Arameana ary nenjehin’ny Israely. I Beny-Hadada mpanjakan’i Arama kosa dia nandositra an-tsoavaly, izy mbamin’ny mpitaingin-tsoavaly sasany koa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nivoaka ny mpanjakan’ny Israely ary namely ny soavaly sy ny kalesy fitondra miady ka nahafatesany be dia be ny Arameana.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nankany amin’ny mpanjakan’ny Israely ilay mpaminany ka niteny taminy hoe: Mahereza tsara, ary fantaro sy jereo izay ataonao; fa raha miherina ny taona dia hiakatra indray ny mpanjakan’i Arama hiady aminao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandresen’i Ahaba faharoa sy ny fahotana nataony
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanompon’ny mpanjakan’i Arama taminy: Andriamanitry ny havoana ny andriamanitr’izy ireo, koa izany no nahareseny antsika. Fa aoka ange isika hiady aminy eny amin’ny tany lemaka, raha tsy ho resintsika izy e! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao zavatra izao no ataovy: Esory ny mpanjaka samy hiala amin’ny toerany avy ka asio governora hisolo azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ianao kosa, makà miaramila toraky ny miaramilanao izay maty teo, ary soavaly ho solon’ny soavaly sy kalesy fitondra miady ho solon’ny kalesy fitondra miady; dia hiady aminy eny amin’ny tany lemaka isika ka hahery noho izy. Dia nanaiky ny tenin’ireo izy ka nataony araka izany.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony niherina ny taona dia nandamina ny Arameana i Beny-Hadada ka niakatra nankany Afeka hiady amin’ny Israely. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny Zanak’Israely rehetra koa dia nalamina sy novatsiana ka lasa hiady aminy. Ary ny Zanak’Israely nitoby tandrifiny dia toy ny andian’osy roa toko kely, fa ny Arameana kosa dia nanenika ny tany.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanatona ilay lehilahin’Andriamanitra ka nilaza tamin’ny mpanjakan’ny Israely hoe: Izao no lazain’NY TOMPO: Satria nilaza ny Arameana hoe: Andriamanitry ny havoana ihany NY TOMPO fa tsy mba andriamanitry ny tany lemaka, dia hatolotro eo an-tananao ireo vahoaka marobe rehetra ireo ka ho fantatrao fa Izaho no TOMPO. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitoby nifanandrify nandritra hafitoana izy roa tonta. Ary tamin’ny andro fahafito dia raikitra ny ady ka indray andro monja ny Zanak’Israely dia nahafaty miaramila an-tongotra iray hetsy tamin’ny Arameana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hilaza aminy hoe: Izao no lazain’i Beny-Hadada: Ny volafotsinao sy ny volamenanao dia ahy; ary ny vady aman-janakao, na dia ny tsara tarehy indrindra aza, dia ahy koa. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny sisa kosa dia nandositra nankany Afeka tao an-tanàna; nefa nianjeran’ny manda ny olona fito arivo sy roa alina sisa.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Beny-Hadada kosa dia nandositra nankany an-tanàna ka nifindrafindra efitrano. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny mpanompony taminy: Indro, renay fa mpanjaka mamindra fo ireo mpanjakan’ny taranak’Israely; koa miangavy anao aho, avelao hisikina lamba fisaonana izahay ary hanisy mahazaka ny lohanay dia hankany amin’ny mpanjakan’ny Israely; angamba hovelominy ny ainao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisikina lamba fisaonana izy ary nasiany mahazaka ny lohany dia nankany amin’ny mpanjakan’ny Israely izy ka niteny hoe: Izao no tenin’i Beny-Hadada mpanomponao: Avelao mba ho velona ny aiko! Ary hoy i Ahaba: Moa mbola velona ihany va izy? Rahalahiko izy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nataon’ireo olona ireo fa fambara tsara izany ka tsy niahotrahotra izy ireo nandray azy tamin’ny teniny ka niteny hoe: Rahalahinao hoe i Beny-Hadada! Dia hoy i Ahaba: Mandehana, alao izy. Dia nankany aminy i Beny-Hadada ka nasainy niakatra ho eo amin’ny kalesy fitondrany miady. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Beny-Hadada taminy: Ny tanàna izay nalain’ny raiko tamin’ny rainao dia hampodiko; ary manaova varotra ho anao any Damaskosy, tahaka ny nataon’ny raiko tany Samaria. Dia hoy i Ahaba: Havelako handeha ianao noho izany fanekena izany. Dia nanao fanekena taminy izy ka namela azy handeha.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nisy mpaminany iray nanambara ny fahotan’i Ahaba
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy lehilahy iray, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanaky ny mpaminany
    - type: text
      text: ', niteny tamin’ny namany araka ny tenin’NY TOMPO hoe: Miangavy anao aho, kapohy aho! Tsy nety nikapoka azy anefa ilay namany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy taminy: Satria tsy nihaino ny feon’NY TOMPO ianao, indro, raha vao miala amiko eto ianao dia hisy liona hamono anao. Ary raha vao niala teo aminy tokoa ilay namany dia nisy liona nifanena taminy ka namono azy.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahita lehilahy hafa indray ilay mpaminany ka niteny hoe: Miangavy anao aho, kapohy aho! Ary nikapoka azy ilay lehilahy ka naharatra azy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia lasa ilay mpaminany ka niandry ny mpanjaka teny an-dalana, ary nasiany fehiloha tamin’ny masony mba tsy hahafantarana azy.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony nandalo ny mpanjaka dia nitaraina taminy ilay mpaminany hoe: Izaho mpanomponao dia nankany anatin’ny ady; ary indro, nisy lehilahy iray nivily ka nitondra lehilahy iray tany amiko sady niteny hoe: Hazòny ity lehilahy ity; fa raha toa ka lasa izy dia ny ainao no hisolo ny ainy, na handoa volafotsy iray '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ' ianao! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjakan’ny Israely hoe: Eny, marina ny teninao, ry mpanjaka tompoko ô! Anao aho sy izay rehetra ananako. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo nony nikeninkenina tetsy sy teroa ny mpanomponao dia lasa izy. Hoy ny mpanjakan’ny Israely taminy: Ho tahaka izany ihany no hitsarana anao; ny tenanao ihany no nilaza izany. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nesoriny haingana ilay fehiloha tamin’ny masony ka fantatry ny mpanjakan’ny Israely fa isan’ny mpaminany izy. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy taminy: Izao no lazain’NY TOMPO: Satria nalefanao niala teo an-tananao ny lehilahy izay tena nataoko ho zavatra voaozona, dia ny ainao no hisolo ny ainy, ary ny olonao no hisolo ny olony. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandeha ho any an-tranony sady maloka tarehy no sosotra ny mpanjakan’ny Israely, dia tonga tany Samaria.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niverina indray ny iraka ka nilaza hoe: Izao no tenin’i Beny-Hadada: Nandefa iraka tatỳ aminao aho hilaza hoe: Ny volafotsinao sy ny volamenanao ary ny vady aman-janakao dia omeo ahy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa raha maniraka ny mpanompoko ho atỳ aminao aho rahampitso toy izao dia hosavainy ny tranonao sy ny tranon’ny mpanomponao, ary horaisin’ny tanany sy hoentiny avokoa izay rehetra mahafinaritra ny masonao na inona na inona.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampaka ny loholona rehetra amin’ny tany ny mpanjakan’ny Israely ka niteny hoe: Miangavy anareo aho, fantaro ka jereo fa mila sotasota mihitsy Ilehiny; fa nandefa iraka tatỳ amiko izy haka ny vady aman-janako mbamin’ny volafotsiko sy ny volamenako ka tsy nolaviko! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny loholona sy ny vahoaka rehetra taminy: Aza mihaino na manaiky azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Ahaba tamin’ny irak’i Beny-Hadada: Lazao amin’ny mpanjaka tompoko hoe: Izay rehetra nanirahanao tany amiko mpanomponao tamin’ny voalohany dia hataoko; fa izao zavatra izao kosa dia tsy azoko ekena. Dia lasa ireo iraka ka nitondra teny niverina tany amin’i Beny-Hadada indray.'
