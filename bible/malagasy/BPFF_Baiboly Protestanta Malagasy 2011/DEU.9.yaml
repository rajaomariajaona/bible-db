document_id: DEU.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy mendrika ny hasian-tsoa akory Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mihainoa, ry Israely: Ianao izao dia efa handeha hita an’i Jordana ka hiditra eo amin’ny tany sady handresy firenen-tsamihafa izay lehibe sy mahery noho ianao, ary hahazo tanàna lehibe izay misy manda manakatra ny lanitra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'dia nomen’NY TOMPO ahy ny vato fisaka roa, voasoratry ny rantsan-tanan’Andriamanitra; ary teo amin’ireo vato ireo no nisy ireo teny rehetra nolazain’NY TOMPO taminareo tao an-tendrombohitra avy tao afovoan’ny afo nandritra ny andro nivoriana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nony tapitra ny efapolo andro sy efapolo alina dia nomen’NY TOMPO ahy ny vato fisaka roa, dia ilay nisy ny fanekena.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy NY TOMPO tamiko: Miaingà ka midìna haingana hiala etỳ ianao; fa efa nanao izay ratsy ny olonao izay noentinao nivoaka avy tany Ejipta; efa nalaky nivily niala tamin’ny lalana izay nasaiko nalehany izy ka nanao sarin-javatra voarendrika ho azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy koa NY TOMPO tamiko: Efa hitako ity firenena ity fa indro, olona mafy hatoka izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Avelao Aho handringana azy ka hovonoiko tsy ho eny ambanin’ny lanitra ny anarany, dia hataoko firenena mahery sy lehibe noho izy ianao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nihodina aho ka nidina niala tamin’ny tendrombohitra, raha mbola nirehitra afo izy; ary mbola teny an-tanako roa ny vato fisaka roa nisy ny fanekena. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nijery tokoa aho ka indro, efa nanota tamin’NY TOMPO Andriamanitrareo ianareo ka nanamboatra ombilahy kely voarendrika ho anareo; nalaky nivily niala tamin’ny lalana izay efa nasain’NY TOMPO halehanareo ianareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia noraisiko ny vato fisaka roa ka nazerako avy teny an-tanako roa ho vakivaky teo imasonareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manao fanelanelanana i Mosesy
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Niankohoka teo anatrehan’NY TOMPO nandritra ny efapolo andro sy efapolo alina tahaka ilay teo ihany aho ka tsy nihinan-kanina na nisotro rano, noho ny fahotana vitanareo rehetra sy izay ratsy nataonareo teo imason’NY TOMPO ka nampahatezitra Azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa natahotra ny fahavinirana sy ny fahatezerana aho, dia ny fahatezeran’NY TOMPO taminareo saika handringanany anareo. Dia nihaino ahy indray NY TOMPO tamin’izay andro izay. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia firenena lehibe feno olona lava, dia ny Anakita izay fantatrao, sady efa renao ny lazany hoe: Iza no mahajanona eo anoloan’ny Anakita? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa tezitra mafy tamin’i Arona NY TOMPO ka saika handevona azy; dia nifona ho an’i Arona koa aho tamin’io andro io. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Noraisiko ny fahotanareo, dia ilay ombilahy kely izay nataonareo ka nodorako tamin’ny afo, dia notorotoroiko sy nomontsamontsaniko ho madinika tahaka ny vovoka; ary nariako teo amin’ny renirano izay midina avy amin’ny tendrombohitra ny vovony.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tao Tabera sy Masa ary Kibrota-Hatava no nanaovanareo izay nahatezitra NY TOMPO. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Rehefa nalefan’NY TOMPO niala tao Kadesy-Barnea ianareo sady nataony hoe: Miakara, lovao ny tany izay nomeko anareo, dia nandà ny tenin’NY TOMPO Andriamanitrareo ianareo ka tsy nino Azy na nihaino ny feony. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Eny, nikomy tamin’NY TOMPO ihany ianareo hatramin’ny andro nahafantarako anareo ka hatramin’izao.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary niankohoka teo anatrehan’NY TOMPO aho nandritra ny efapolo andro sy efapolo alina satria efa nolazain’NY TOMPO fa handringana anareo Izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nifona tamin’NY TOMPO aho hoe: Andriamanitra TOMPO ô, aza mandringana ny firenenao sy ny lovanao, izay navotanao tamin’ny fahalehibiazanao ka noentinao nivoaka avy tany Ejipta tamin’ny tananao mahery. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tsarovy ny mpanomponao, dia i Abrahama sy Isaka ary i Jakoba; fa aza mijery ny ditran’ity firenena ity, na ny haratsiam-panahiny na ny fahotany, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'fandrao izay monina amin’ny tany nitondranao anay niala avy tany hilaza hoe: Satria tsy hain’NY TOMPO ny hitondra azy ho any amin’ny tany izay nolazainy taminy, ary satria nankahala azy Izy dia izany no nitondrany azy niala tany mba hahafaty azy atỳ an-tany efitra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Kanefa ireo dia firenenao sy lovanao, izay noentinao niala tany tamin’ny herinao lehibe sy ny sandrinao natsotra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Koa aoka ho fantatrao anio fa NY TOMPO Andriamanitrao no handeha hita eo alohanao tahaka ny afo mandevona, dia Izy no handringana sy hampietry azy ireo eo anoloanao; koa handroaka sy handringana azy ireo haingana ianao, araka izay nolazain’NY TOMPO taminao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary rehefa voaroakan’NY TOMPO Andriamanitrao eo anoloanao izy ireo dia aza miteny anakampo hoe: Ny fahamarinako no nitondran’NY TOMPO ahy niditra handova ity tany ity; fa ny haratsiam-panahin’ireo firenena ireo no androahan’NY TOMPO azy ireo eo anoloanao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tsy ny fahamarinanao, na ny hitsim-ponao, no andehananao handova ny taniny; fa ny haratsiam-panahin’ireo firenena ireo no androahan’NY TOMPO Andriamanitrao azy ireo eo anoloanao hahatò ny teny izay nianianan’NY TOMPO tamin’i Abrahama sy Isaka ary i Jakoba razanao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Koa aoka ho fantatrao fa tsy ny fahamarinanao no anomezan’NY TOMPO Andriamanitrao izany tany soa izany ho lovanao; satria ianao dia firenena mafy hatoka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ilay ombilahy kely volamena: Fahotan’ny vahoaka'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tsarovy ka aza hadinoinao ny nampahatezeranao NY TOMPO Andriamanitrao tany an-tany efitra; eny, hatramin’ny andro nialanao tany amin’ny tany Ejipta ka hatramin’ny nahatongavanareo teto amin’ity tany ity dia mbola nikomy tamin’NY TOMPO ihany ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tany Horeba koa aza dia nampahatezitra NY TOMPO ianareo ka tezitra taminareo Izy ary saika nandringana anareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Raha niakatra tao an-tendrombohitra handray ny vato fisaka aho, dia ny vato fisaka izay nisy ny fanekena nataon’NY TOMPO taminareo, ka nitoetra efapolo andro sy efapolo alina tao an-tendrombohitra sady tsy nihinan-kanina na nisotro rano akory, '
