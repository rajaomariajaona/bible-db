document_id: ISA.59,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny heloka mampisaraka amin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny tanan’NY TOMPO tsy fohy fa mahavonjy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sofiny tsy lalodalovana fa mahare.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsapatsapa manara-drindrina tahaka ny jamba isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mitsapatsapa tahaka ny tsy mana-maso;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tafintohina amin’ny mitataovovonana tahaka ny amin’ny maizimaizina isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ao anatin’ny hery sy tanjaka nefa tahaka ny maty.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mierona tahaka ny bera isika rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitoloko tahaka ny voromailala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miandry ny rariny isika nefa tsy misy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miandry ny famonjena nefa lavitra antsika izany!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa betsaka eo anatrehanao ny fikomianay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miampanga anay ny fahotanay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsaroanay ny fahadisoanay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary fantatray ny helokay:'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fikomiana sy fandavana NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fialana amin’ny fanarahana an’Andriamanitray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny mampahory sy fikomiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: famoronana sy famoahana teny lainga avy ao am-po.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihemotra ny rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mijanona eny lavitra eny ny hitsiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tafintohina eny an-kalalahana ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahazo miditra ny hitsim-po.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy eo ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mifady ny ratsy dia manolo-tena hobaboin’ny sasany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misy Mpanavotra tonga ho an’i Ziona
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitan’NY TOMPO ny tsy fisian’ny rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nankasitrahany izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hitany fa tsy nisy olona na iray aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary talanjona Izy, satria tsy nisy mpanelanelana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ny sandriny ihany no nanao famonjena ho Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahamarinany no nanohana Azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niakanjo fahamarinana tahaka ny fiarovan-tratra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fiarovan-doha famonjena no teo amin’ny lohany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niakanjo ny akanjo famaliana Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nandray ny fahasaro-piaro ho akanjo ivelany Izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny asa natao no hamaliany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fahatezerana mirehitra ho an’ny fahavalony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary famaliana ho an’ny rafiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny nosy dia hovaliany tokoa araka ny nataony avy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatrany andrefana dia hatahotra ny anaran’NY TOMPO ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny voninahiny dia hatramin’ny fiposahan’ny masoandro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fiaviny dia ho toy ny rano maria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampandehanin’ny Fanahin’NY TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny helokareo no mampisaraka anareo amin’Andriamanitrareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahotanareo no mampiafina ny tavany aminareo ka tsy mihaino Izy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hisy Mpanavotra ho tonga any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho amin’ny taranak’i Jakoba izay miverina avy amin’ny fikomiany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha Izaho dia izao no fanekeko aminy, hoy NY TOMPO: Ny Fanahiko izay ao aminao sy ny teniko izay nataoko teo am-bavanao dia tsy hiala amin’ny vavanao, na amin’ny vavan’ny taranakao, na amin’ny vavan’ny taranaky ny taranakao, hatramin’izao ka ho mandrakizay, hoy NY TOMPO.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tananareo dia voaloto amin’ny ra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny rantsantananareo amin’ny heloka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miteny lainga ny molotrareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mibedibedy faharatsiam-panahy ny lelanareo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy mitory olona araka ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mandahatra eo amin’ny fitsarana araka izay tena izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: matoky ny misavorovoro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy miteny zava-poana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: torontoronina fampahoriana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miteraka loza.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mikotrika atodin’ny menarana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manenona tranon-kala.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho faty izay homana ny atodin’ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha vakina iny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia menarana no miporitsaka avy ao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tranon-kalany dia tsy azo atao fitafiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahatafy azy ny asany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny asany dia asa mampahory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary herisetra no eny an-tanany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tongony dia miriotra ho amin’ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy milomay handatsaka ny ran’ny tsy manan-tsiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fisainany dia fisainana fampahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandravana sy fandringanana no eo amin’ny alehany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy fantany ny lalan’ny fiadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy rariny ao amin’ny alehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nataony miolakolaka ny lalany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa na iza na iza mandia izany dia tsy mahita fiadanana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manaiky ny fahadisoany ny vahoakan’Andriamanitra
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia lavitra antsika ny rariny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahatratra antsika ny fahamarinana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miandry ny mazava isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa indro ny maizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miandry ny fahazavana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa mbola ao amin’ny haizim-pito ihany no andehanantsika.
