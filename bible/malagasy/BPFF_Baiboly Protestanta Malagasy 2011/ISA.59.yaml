document_id: ISA.59,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny heloka mampisaraka amin’Andriamanitra
  - type: text
    content: Indro, ny tanan’NY TOMPO tsy fohy fa mahavonjy,
  - type: text
    content: ary ny sofiny tsy lalodalovana fa mahare.
  '10':
  - type: text
    content: Mitsapatsapa manara-drindrina tahaka ny jamba isika;
  - type: text
    content: eny, mitsapatsapa tahaka ny tsy mana-maso;
  - type: text
    content: tafintohina amin’ny mitataovovonana tahaka ny amin’ny maizimaizina isika,
  - type: text
    content: ary ao anatin’ny hery sy tanjaka nefa tahaka ny maty.
  '11':
  - type: text
    content: Mierona tahaka ny bera isika rehetra
  - type: text
    content: ary mitoloko tahaka ny voromailala;
  - type: text
    content: miandry ny rariny isika nefa tsy misy,
  - type: text
    content: ary miandry ny famonjena nefa lavitra antsika izany!
  '12':
  - type: text
    content: Fa betsaka eo anatrehanao ny fikomianay
  - type: text
    content: ary miampanga anay ny fahotanay;
  - type: text
    content: eny, tsaroanay ny fahadisoanay
  - type: text
    content: 'ary fantatray ny helokay:'
  '13':
  - type: text
    content: Fikomiana sy fandavana NY TOMPO,
  - type: text
    content: fialana amin’ny fanarahana an’Andriamanitray,
  - type: text
    content: teny mampahory sy fikomiana,
  - type: text
    content: famoronana sy famoahana teny lainga avy ao am-po.
  '14':
  - type: text
    content: Mihemotra ny rariny
  - type: text
    content: ary mijanona eny lavitra eny ny hitsiny;
  - type: text
    content: fa tafintohina eny an-kalalahana ny fahamarinana
  - type: text
    content: ary tsy mahazo miditra ny hitsim-po.
  '15':
  - type: text
    content: Eny, tsy eo ny fahamarinana
  - type: text
    content: ary izay mifady ny ratsy dia manolo-tena hobaboin’ny sasany.
  - type: heading
    content: Misy Mpanavotra tonga ho an’i Ziona
  - type: text
    content: Hitan’NY TOMPO ny tsy fisian’ny rariny
  - type: text
    content: ka tsy nankasitrahany izany.
  '16':
  - type: text
    content: Eny, hitany fa tsy nisy olona na iray aza,
  - type: text
    content: ary talanjona Izy, satria tsy nisy mpanelanelana,
  - type: text
    content: koa ny sandriny ihany no nanao famonjena ho Azy,
  - type: text
    content: ary ny fahamarinany no nanohana Azy.
  '17':
  - type: text
    content: Niakanjo fahamarinana tahaka ny fiarovan-tratra Izy,
  - type: text
    content: ary fiarovan-doha famonjena no teo amin’ny lohany;
  - type: text
    content: niakanjo ny akanjo famaliana Izy;
  - type: text
    content: eny, nandray ny fahasaro-piaro ho akanjo ivelany Izy.
  '18':
  - type: text
    content: Araka ny asa natao no hamaliany,
  - type: text
    content: dia fahatezerana mirehitra ho an’ny fahavalony
  - type: text
    content: ary famaliana ho an’ny rafiny;
  - type: text
    content: ny nosy dia hovaliany tokoa araka ny nataony avy.
  '19':
  - type: text
    content: Hatrany andrefana dia hatahotra ny anaran’NY TOMPO ny olona
  - type: text
    content: ary ny voninahiny dia hatramin’ny fiposahan’ny masoandro;
  - type: text
    content: ny fiaviny dia ho toy ny rano maria,
  - type: text
    content: ampandehanin’ny Fanahin’NY TOMPO.
  '2':
  - type: text
    content: Fa ny helokareo no mampisaraka anareo amin’Andriamanitrareo,
  - type: text
    content: ary ny fahotanareo no mampiafina ny tavany aminareo ka tsy mihaino Izy.
  '20':
  - type: text
    content: 'Dia hisy Mpanavotra ho tonga any '
  - type: text
    content: Ziona
  - type: text
    content: ','
  - type: text
    content: ho amin’ny taranak’i Jakoba izay miverina avy amin’ny fikomiany,
  - type: text
    content: hoy NY TOMPO.
  '21':
  - type: text
    content: 'Raha Izaho dia izao no fanekeko aminy, hoy NY TOMPO: Ny Fanahiko izay ao aminao sy ny teniko izay nataoko teo am-bavanao dia tsy hiala amin’ny vavanao, na amin’ny vavan’ny taranakao, na amin’ny vavan’ny taranaky ny taranakao, hatramin’izao ka ho mandrakizay, hoy NY TOMPO.'
  '3':
  - type: text
    content: Fa ny tananareo dia voaloto amin’ny ra,
  - type: text
    content: ary ny rantsantananareo amin’ny heloka;
  - type: text
    content: miteny lainga ny molotrareo,
  - type: text
    content: ary mibedibedy faharatsiam-panahy ny lelanareo.
  '4':
  - type: text
    content: Tsy misy mitory olona araka ny fahamarinana,
  - type: text
    content: na mandahatra eo amin’ny fitsarana araka izay tena izy;
  - type: text
    content: matoky ny misavorovoro
  - type: text
    content: sy miteny zava-poana izy;
  - type: text
    content: torontoronina fampahoriana izy
  - type: text
    content: ka miteraka loza.
  '5':
  - type: text
    content: Mikotrika atodin’ny menarana izy
  - type: text
    content: ary manenona tranon-kala.
  - type: text
    content: Ho faty izay homana ny atodin’ireny,
  - type: text
    content: fa raha vakina iny
  - type: text
    content: dia menarana no miporitsaka avy ao.
  '6':
  - type: text
    content: Ny tranon-kalany dia tsy azo atao fitafiana,
  - type: text
    content: ary tsy mahatafy azy ny asany;
  - type: text
    content: ny asany dia asa mampahory,
  - type: text
    content: ary herisetra no eny an-tanany.
  '7':
  - type: text
    content: Ny tongony dia miriotra ho amin’ny ratsy
  - type: text
    content: sy milomay handatsaka ny ran’ny tsy manan-tsiny;
  - type: text
    content: ny fisainany dia fisainana fampahoriana,
  - type: text
    content: fandravana sy fandringanana no eo amin’ny alehany.
  '8':
  - type: text
    content: Tsy fantany ny lalan’ny fiadanana
  - type: text
    content: ary tsy misy rariny ao amin’ny alehany;
  - type: text
    content: nataony miolakolaka ny lalany,
  - type: text
    content: koa na iza na iza mandia izany dia tsy mahita fiadanana.
  - type: heading
    content: Manaiky ny fahadisoany ny vahoakan’Andriamanitra
  '9':
  - type: text
    content: Noho izany dia lavitra antsika ny rariny,
  - type: text
    content: ary tsy mahatratra antsika ny fahamarinana;
  - type: text
    content: miandry ny mazava isika
  - type: text
    content: nefa indro ny maizina,
  - type: text
    content: ary miandry ny fahazavana
  - type: text
    content: nefa mbola ao amin’ny haizim-pito ihany no andehanantsika.
