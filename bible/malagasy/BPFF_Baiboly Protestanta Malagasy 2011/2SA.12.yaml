document_id: 2SA.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manambara ny fahadisoan’i Davida i Natana mpaminany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO naniraka an’i Natana hankao amin’i Davida. Dia tonga tao aminy izy ka niteny taminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nisy olona roa lahy tao an-tanàna iray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny iray mpanankarena ary ny iray mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ilay mpanankarena dia nanana ondry aman’osy sy omby betsaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: fa ilay mahantra kosa dia tsy nanana na inona na inona afa-tsy zanak’ondrivavy kely iray monja izay novidiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nokolokoloiny tsara io ka nitombo teo aminy sy ny zanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sombiny tamin’ny sakafon-dRalehilahy no nohaniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tamin’ny kapoakany no nisotroany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady notrotroiny teo an-tratrany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nataony toy ny zanany vavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary nisy vahiny tonga tao amin’ilay mpanankarena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ny ondry aman’osiny sy ny ombiny dia notsitsiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nakany hatao sakafo ho an’ilay vahiny tonga tao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny zanak’ondrivavy izay an’ilay mahantra kosa no nalainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nataony sakafo ho an’ilay olona tonga tao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nirehitra mafy tamin’izany olona izany ny fahatezeran’i Davida ka hoy izy tamin’i Natana: Raha velona koa NY TOMPO, tsy maintsy hovonoina ho faty izay olona nanao izany! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary tsy maintsy honerany avo efatra heny ilay zanak’ondrivavy noho ny nanaovany izany zavatra izany sy noho ny tsy namindrany fo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy i Natana tamin’i Davida: Ianao izany! Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Izaho nanosotra anao ho mpanjakan’ny Israely ka namonjy anao ho afaka tamin’ny tanan’i Saoly; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary nomeko anao ny tranon’ny tomponao sy ny vadin’ny tomponao ho andefimandrinao, ary nomeko anao koa ny firenena Israely sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: '; raha mbola tsy ampy anao izany dia ho nomeko bebe kokoa ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa nahoana ianao no nanamavo ny tenin’NY TOMPO ka nanao izay ratsy eo imasony? I Oria hetita dia nasianao ny sabatra, ary ny vadiny dia nalainao ho vadinao. Eny, novonoinao tamin’ny sabatry ny taranak’i Amona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Noho izany dia tsy hiala amin’ny taranakao mihitsy kosa ny sabatra, satria nanamavo Ahy ianao ka naka ny vadin’i Oria hetita ho vadinao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao koa no lazain’NY TOMPO: Indro, Izaho efa hahatonga loza aminao avy ao amin’ny ankohonanao ihany; hesoriko eo imasonao ny vadinao ka homeko ny namanao ary handry amin’ny vadinao amin’izao antoandrobenanahary izao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nanao izany tao amin’ny mangingina ianao, fa Izaho kosa haneho izany zavatra izany eo anatrehan’ny Israely rehetra, amin’izao antoandrobenanahary izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Davida tamin’i Natana: Nanota tamin’NY TOMPO aho. Hoy kosa i Natana tamin’i Davida: NY TOMPO efa nanaisotra ny helokao ka tsy ho faty ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa noho ny nampitenenanao ratsy ny fahavalon’NY TOMPO tamin’izany zavatra izany dia ho faty tokoa ny zaza izay haterakao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nody tany an-tranony i Natana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’ny zanak’i Batseba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary NY TOMPO namely ny zaza izay nateraky ny vadin’i Oria tamin’i Davida ka narary be ny zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nifona tamin’Andriamanitra ho an’ny zaza i Davida ka nifady hanina. Nony nody izy dia nandry tamin’ny tany mandritra ny alina. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nitsangana nankao aminy hampiarina azy amin’ny tany ny loholona tao an-tranony; nefa tsy nety izy sady tsy nety niara-nihinan-kanina taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony nandray hafitoana dia maty ny zaza. Ary natahotra hilaza ny nahafatesan’ny zaza taminy ny mpanompon’i Davida. Hoy izy ireo: Indro, fony mbola velona aza ny zaza, raha niteny taminy isika dia tsy nohenoiny ny feontsika, koa hataontsika ahoana no filaza aminy ny fahafatesan’ny zaza? Mety hanimba tena izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nony hitan’i Davida anefa fa nitakoritsika ny mpanompony dia fantany fa maty ny zaza ka hoy izy tamin’ny mpanompony: Maty va ny zaza? Ary hoy ireo: Maty. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia niarina tsy nandry tamin’ny tany intsony i Davida ary nandro sy nihosotra diloilo ary nanova ny fitafiany dia nankao amin’ny tranon’NY TOMPO ka niankohoka; ary nody tany an-tranony izy ka niantso mba hisy handroso sakafo eo anoloany; dia nihinana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy ny mpanompony taminy: Inona izao zavatra ataonao izao? Fony mbola velona ny zaza dia nifady hanina sy nitomany ianao, fa rehefa maty ny zaza dia niarina sy nihinan-kanina kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy izy: Fony mbola velona ny zaza dia nifady hanina sy nitomany tokoa aho, fa hoy aho: Iza moa no mahalala na mba hamindra fo amiko NY TOMPO ka hahavelona ny zaza, na tsia? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Kanjo maty izy izao, koa nahoana aho no mbola hifady hanina ihany? Mahay mampiverina azy va aho? Izaho no hankany aminy, fa izy dia tsy hiverina etỳ amiko intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan’i Solomona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nampionona an’i Batseba vadiny i Davida; niditra tao aminy izy ka nandry taminy; ary niteraka zazalahy izy ka ny anarany dia nataony hoe Solomona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Solomona: Fiadanana.'
    marker-yv: yv-n
  - type: text
    text: '. Ary tia azy NY TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ka naniraka an’i Natana mpaminany hanao ny anaran’ny zaza hoe Jedidia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jedidia: Tian’NY TOMPO.'
    marker-yv: yv-n
  - type: text
    text: ', noho ny amin’NY TOMPO.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namaboan’i Davida an’i Raba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 20.1-3
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Namely an’i Raban’ny taranak’i Amona i Joaba ka nahazo ny tanànan’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nandefa iraka tany amin’i Davida i Joaba hilaza hoe: Namely an’i Raba aho ka nahazo ny tanàna misy rano. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa ankehitriny, vorio ny olona sisa ka mitobia hamely ny tanàna ary aoka ho azonao izy, fandrao izaho no hahazo ny tanàna; dia hotononina araka ny anarako izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary namory ny vahoaka rehetra i Davida dia nankany Raba ka namely azy ary nahazo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nesoriny ny satroboninahitra teny an-dohan’ilay mpanjaka, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' volamena iray no lanjany, sady nisy vatosoa. Nisatrohan’i Davida izany. Ary navoakany avy tao an-tanàna ny babo be dia be azony. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Koa ny olona izay navoakany dia nasainy niasa teo amin’ny tsofa sy ny ragiragy lehibe mbamin’ny famaky vy ary tao amin’ny fandoroam-biriky; toy izany no nataony tamin’ny tanànan’ny taranak’i Amona rehetra. Dia niverina nankany Jerosalema i Davida sy ny vahoaka rehetra.
