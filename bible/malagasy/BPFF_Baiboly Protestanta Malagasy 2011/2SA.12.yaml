document_id: 2SA.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manambara ny fahadisoan’i Davida i Natana mpaminany
  - type: text
    content: 'Ary NY TOMPO naniraka an’i Natana hankao amin’i Davida. Dia tonga tao aminy izy ka niteny taminy hoe:'
  - type: text
    content: Nisy olona roa lahy tao an-tanàna iray,
  - type: text
    content: ny iray mpanankarena ary ny iray mahantra.
  '10':
  - type: text
    content: 'Noho izany dia tsy hiala amin’ny taranakao mihitsy kosa ny sabatra, satria nanamavo Ahy ianao ka naka ny vadin’i Oria hetita ho vadinao. '
  '11':
  - type: text
    content: 'Izao koa no lazain’NY TOMPO: Indro, Izaho efa hahatonga loza aminao avy ao amin’ny ankohonanao ihany; hesoriko eo imasonao ny vadinao ka homeko ny namanao ary handry amin’ny vadinao amin’izao antoandrobenanahary izao izy. '
  '12':
  - type: text
    content: Nanao izany tao amin’ny mangingina ianao, fa Izaho kosa haneho izany zavatra izany eo anatrehan’ny Israely rehetra, amin’izao antoandrobenanahary izao.
  '13':
  - type: text
    content: 'Dia hoy i Davida tamin’i Natana: Nanota tamin’NY TOMPO aho. Hoy kosa i Natana tamin’i Davida: NY TOMPO efa nanaisotra ny helokao ka tsy ho faty ianao. '
  '14':
  - type: text
    content: 'Nefa noho ny nampitenenanao ratsy ny fahavalon’NY TOMPO tamin’izany zavatra izany dia ho faty tokoa ny zaza izay haterakao. '
  '15':
  - type: text
    content: Dia nody tany an-tranony i Natana.
  - type: heading
    content: Ny nahafatesan’ny zanak’i Batseba
  - type: text
    content: 'Ary NY TOMPO namely ny zaza izay nateraky ny vadin’i Oria tamin’i Davida ka narary be ny zaza. '
  '16':
  - type: text
    content: 'Dia nifona tamin’Andriamanitra ho an’ny zaza i Davida ka nifady hanina. Nony nody izy dia nandry tamin’ny tany mandritra ny alina. '
  '17':
  - type: text
    content: 'Ary nitsangana nankao aminy hampiarina azy amin’ny tany ny loholona tao an-tranony; nefa tsy nety izy sady tsy nety niara-nihinan-kanina taminy. '
  '18':
  - type: text
    content: 'Nony nandray hafitoana dia maty ny zaza. Ary natahotra hilaza ny nahafatesan’ny zaza taminy ny mpanompon’i Davida. Hoy izy ireo: Indro, fony mbola velona aza ny zaza, raha niteny taminy isika dia tsy nohenoiny ny feontsika, koa hataontsika ahoana no filaza aminy ny fahafatesan’ny zaza? Mety hanimba tena izy. '
  '19':
  - type: text
    content: 'Nony hitan’i Davida anefa fa nitakoritsika ny mpanompony dia fantany fa maty ny zaza ka hoy izy tamin’ny mpanompony: Maty va ny zaza? Ary hoy ireo: Maty. '
  '2':
  - type: text
    content: Ilay mpanankarena dia nanana ondry aman’osy sy omby betsaka;
  '20':
  - type: text
    content: 'Dia niarina tsy nandry tamin’ny tany intsony i Davida ary nandro sy nihosotra diloilo ary nanova ny fitafiany dia nankao amin’ny tranon’NY TOMPO ka niankohoka; ary nody tany an-tranony izy ka niantso mba hisy handroso sakafo eo anoloany; dia nihinana izy. '
  '21':
  - type: text
    content: 'Ary hoy ny mpanompony taminy: Inona izao zavatra ataonao izao? Fony mbola velona ny zaza dia nifady hanina sy nitomany ianao, fa rehefa maty ny zaza dia niarina sy nihinan-kanina kosa. '
  '22':
  - type: text
    content: 'Hoy izy: Fony mbola velona ny zaza dia nifady hanina sy nitomany tokoa aho, fa hoy aho: Iza moa no mahalala na mba hamindra fo amiko NY TOMPO ka hahavelona ny zaza, na tsia? '
  '23':
  - type: text
    content: Kanjo maty izy izao, koa nahoana aho no mbola hifady hanina ihany? Mahay mampiverina azy va aho? Izaho no hankany aminy, fa izy dia tsy hiverina etỳ amiko intsony.
  - type: heading
    content: Ny nahaterahan’i Solomona
  '24':
  - type: text
    content: Nampionona an’i Batseba vadiny i Davida; niditra tao aminy izy ka nandry taminy; ary niteraka zazalahy izy ka ny anarany dia nataony hoe Solomona
  - type: note
    content: 'Solomona: Fiadanana.'
  - type: text
    content: '. Ary tia azy NY TOMPO '
  '25':
  - type: text
    content: ka naniraka an’i Natana mpaminany hanao ny anaran’ny zaza hoe Jedidia
  - type: note
    content: 'Jedidia: Tian’NY TOMPO.'
  - type: text
    content: ', noho ny amin’NY TOMPO.'
  - type: heading
    content: Ny namaboan’i Davida an’i Raba
  - type: heading
    content: 1Tan 20.1-3
  '26':
  - type: text
    content: 'Namely an’i Raban’ny taranak’i Amona i Joaba ka nahazo ny tanànan’ny mpanjaka. '
  '27':
  - type: text
    content: 'Dia nandefa iraka tany amin’i Davida i Joaba hilaza hoe: Namely an’i Raba aho ka nahazo ny tanàna misy rano. '
  '28':
  - type: text
    content: 'Koa ankehitriny, vorio ny olona sisa ka mitobia hamely ny tanàna ary aoka ho azonao izy, fandrao izaho no hahazo ny tanàna; dia hotononina araka ny anarako izy. '
  '29':
  - type: text
    content: 'Ary namory ny vahoaka rehetra i Davida dia nankany Raba ka namely azy ary nahazo azy. '
  '3':
  - type: text
    content: fa ilay mahantra kosa dia tsy nanana na inona na inona afa-tsy zanak’ondrivavy kely iray monja izay novidiny;
  - type: text
    content: nokolokoloiny tsara io ka nitombo teo aminy sy ny zanany;
  - type: text
    content: sombiny tamin’ny sakafon-dRalehilahy no nohaniny,
  - type: text
    content: ary tamin’ny kapoakany no nisotroany,
  - type: text
    content: sady notrotroiny teo an-tratrany izy
  - type: text
    content: ka nataony toy ny zanany vavy.
  '30':
  - type: text
    content: 'Dia nesoriny ny satroboninahitra teny an-dohan’ilay mpanjaka, '
  - type: text
    content: talenta
  - type: text
    content: ' volamena iray no lanjany, sady nisy vatosoa. Nisatrohan’i Davida izany. Ary navoakany avy tao an-tanàna ny babo be dia be azony. '
  '31':
  - type: text
    content: Koa ny olona izay navoakany dia nasainy niasa teo amin’ny tsofa sy ny ragiragy lehibe mbamin’ny famaky vy ary tao amin’ny fandoroam-biriky; toy izany no nataony tamin’ny tanànan’ny taranak’i Amona rehetra. Dia niverina nankany Jerosalema i Davida sy ny vahoaka rehetra.
  '4':
  - type: text
    content: Ary nisy vahiny tonga tao amin’ilay mpanankarena,
  - type: text
    content: nefa ny ondry aman’osiny sy ny ombiny dia notsitsiny
  - type: text
    content: ka tsy nakany hatao sakafo ho an’ilay vahiny tonga tao aminy,
  - type: text
    content: fa ny zanak’ondrivavy izay an’ilay mahantra kosa no nalainy
  - type: text
    content: ka nataony sakafo ho an’ilay olona tonga tao aminy.
  '5':
  - type: text
    content: 'Dia nirehitra mafy tamin’izany olona izany ny fahatezeran’i Davida ka hoy izy tamin’i Natana: Raha velona koa NY TOMPO, tsy maintsy hovonoina ho faty izay olona nanao izany! '
  '6':
  - type: text
    content: Ary tsy maintsy honerany avo efatra heny ilay zanak’ondrivavy noho ny nanaovany izany zavatra izany sy noho ny tsy namindrany fo.
  '7':
  - type: text
    content: 'Dia hoy i Natana tamin’i Davida: Ianao izany! Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Izaho nanosotra anao ho mpanjakan’ny Israely ka namonjy anao ho afaka tamin’ny tanan’i Saoly; '
  '8':
  - type: text
    content: 'ary nomeko anao ny tranon’ny tomponao sy ny vadin’ny tomponao ho andefimandrinao, ary nomeko anao koa ny firenena Israely sy '
  - type: text
    content: Joda
  - type: text
    content: '; raha mbola tsy ampy anao izany dia ho nomeko bebe kokoa ianao. '
  '9':
  - type: text
    content: 'Koa nahoana ianao no nanamavo ny tenin’NY TOMPO ka nanao izay ratsy eo imasony? I Oria hetita dia nasianao ny sabatra, ary ny vadiny dia nalainao ho vadinao. Eny, novonoinao tamin’ny sabatry ny taranak’i Amona izy. '
