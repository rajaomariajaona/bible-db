document_id: ISA.55,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ianareo rehetra izay mangetaheta, avia!
  - type: text
    content: E! Ianareo rehetra izay mangetaheta!
  - type: text
    content: Mankanesa amin’ny rano;
  - type: text
    content: ary ianareo izay tsy manam-bola,
  - type: text
    content: avia, mividiana ka homana;
  - type: text
    content: eny, avia, mividiana divay sy ronono,
  - type: text
    content: nefa tsy amim-bola na amin-karena!
  '10':
  - type: text
    content: Fa toy ny ranonorana sy ny orampanala milatsaka avy any an-danitra
  - type: text
    content: ka tsy miverina any
  - type: text
    content: raha tsy efa nahavonto ny tany
  - type: text
    content: ka nampaniry sy nampahavokatra azy
  - type: text
    content: mba hahatonga voa ho an’ny mpamafy
  - type: text
    content: sy hanina ho an’ny mpihinana,
  '11':
  - type: text
    content: 'dia ho tahaka izany ny teniko izay aloaky ny vavako:'
  - type: text
    content: Tsy hiverina amiko foana izy
  - type: text
    content: raha tsy efa mahatanteraka izay sitrako,
  - type: text
    content: ary ambinina amin’izay
  - type: text
    content: ampandehanako azy.
  '12':
  - type: text
    content: Fa amin’ny fifaliana no hivoahanareo,
  - type: text
    content: ary amin’ny fiadanana no hitondrana anareo;
  - type: text
    content: hahavelona hoby eo alohanareo
  - type: text
    content: ny tendrombohitra sy ny havoana,
  - type: text
    content: ary ny hazo rehetra any an-tsaha dia hitehaka.
  '13':
  - type: text
    content: Haniry ho solon’ny tsilo ny hazo kipreso,
  - type: text
    content: ary ho solon’ny sampivato ny mirta;
  - type: text
    content: ary ho anarana ho an’NY TOMPO izany,
  - type: text
    content: dia ho famantarana mandrakizay izay tsy hesorina.
  '2':
  - type: text
    content: Nahoana ianareo no mandany vola
  - type: text
    content: amin’izay tsy hanina?
  - type: text
    content: Nahoana ianareo no misasatra
  - type: text
    content: amin’izay tsy mahavoky?
  - type: text
    content: Henoy tsara Aho,
  - type: text
    content: hano izay tsara,
  - type: text
    content: dia aoka hiravoravo amin’ny matavy ianareo.
  '3':
  - type: text
    content: Atongilano ny sofinareo ka mankanesa atỳ amiko;
  - type: text
    content: mihainoa dia ho velona ianareo;
  - type: text
    content: ary hanao fanekena mandrakizay aminareo Aho,
  - type: text
    content: dia ny famindrampo mahatoky nampanantenaina an’i Davida.
  '4':
  - type: text
    content: Indro, nataoko vavolombelona ho an’ny firenena Izy,
  - type: text
    content: ho mpanapaka sy komandy amin’ny firenena.
  '5':
  - type: text
    content: Indro firenena izay tsy fantatrao no hantsoinao
  - type: text
    content: ary firenena izay tsy nahalala Anao no hihazakazaka ho eo aminao
  - type: text
    content: noho ny amin’NY TOMPO Andriamanitrao,
  - type: text
    content: ny Iray Masin’ny Israely
  - type: text
    content: izay manome voninahitra anao.
  '6':
  - type: text
    content: Mitadiava NY TOMPO
  - type: text
    content: dieny mbola mety ho hita Izy,
  - type: text
    content: miantsoa Azy
  - type: text
    content: dieny mbola akaiky Izy.
  '7':
  - type: text
    content: Aoka hahafoy ny lalany ny ratsy fanahy,
  - type: text
    content: ary hahafoy ny heviny ny tsy marina;
  - type: text
    content: ary aoka hiverina ho amin’NY TOMPO ireny,
  - type: text
    content: fa hamindra fo aminy Izy;
  - type: text
    content: eny, ho amin’Andriamanitsika,
  - type: text
    content: fa hamela heloka dia hamela heloka tokoa Izy.
  '8':
  - type: text
    content: Fa ny fihevitro dia tsy fihevitrareo
  - type: text
    content: ary ny lalanareo kosa dia tsy mba lalako,
  - type: text
    content: hoy NY TOMPO.
  '9':
  - type: text
    content: Fa tahaka ny haavon’ny lanitra amin’ny tany
  - type: text
    content: no haavon’ny lalako amin’ny lalanareo
  - type: text
    content: sy ny fihevitro amin’ny fihevitrareo.
