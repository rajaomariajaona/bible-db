document_id: ISA.55
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ianareo rehetra izay mangetaheta, avia!
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: E! Ianareo rehetra izay mangetaheta!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mankanesa amin’ny rano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ianareo izay tsy manam-bola,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avia, mividiana ka homana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, avia, mividiana divay sy ronono,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy amim-bola na amin-karena!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nahoana ianareo no mandany vola
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay tsy hanina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana ianareo no misasatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay tsy mahavoky?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henoy tsara Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hano izay tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka hiravoravo amin’ny matavy ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Atongilano ny sofinareo ka mankanesa atỳ amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihainoa dia ho velona ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanao fanekena mandrakizay aminareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny famindrampo mahatoky nampanantenaina an’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, nataoko vavolombelona ho an’ny firenena Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho mpanapaka sy komandy amin’ny firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro firenena izay tsy fantatrao no hantsoinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary firenena izay tsy nahalala Anao no hihazakazaka ho eo aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny amin’NY TOMPO Andriamanitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Iray Masin’ny Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manome voninahitra anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mitadiava NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dieny mbola mety ho hita Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miantsoa Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dieny mbola akaiky Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka hahafoy ny lalany ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahafoy ny heviny ny tsy marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hiverina ho amin’NY TOMPO ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hamindra fo aminy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ho amin’Andriamanitsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hamela heloka dia hamela heloka tokoa Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny fihevitro dia tsy fihevitrareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lalanareo kosa dia tsy mba lalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa tahaka ny haavon’ny lanitra amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no haavon’ny lalako amin’ny lalanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fihevitro amin’ny fihevitrareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa toy ny ranonorana sy ny orampanala milatsaka avy any an-danitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy miverina any
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy efa nahavonto ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampaniry sy nampahavokatra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatonga voa ho an’ny mpamafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanina ho an’ny mpihinana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia ho tahaka izany ny teniko izay aloaky ny vavako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiverina amiko foana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy efa mahatanteraka izay sitrako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ambinina amin’izay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampandehanako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa amin’ny fifaliana no hivoahanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny fiadanana no hitondrana anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahavelona hoby eo alohanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tendrombohitra sy ny havoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hazo rehetra any an-tsaha dia hitehaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Haniry ho solon’ny tsilo ny hazo kipreso,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho solon’ny sampivato ny mirta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho anarana ho an’NY TOMPO izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho famantarana mandrakizay izay tsy hesorina.
