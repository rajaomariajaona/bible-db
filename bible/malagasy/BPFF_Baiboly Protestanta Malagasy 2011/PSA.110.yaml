document_id: PSA.110,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mpanjaka sy mpisorona
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: 'Izao no lazain’NY TOMPO amin’ny Tompoko:'
  - type: text
    content: Mipetraha eto ankavanako
  - type: text
    content: ambara-panaoko ny fahavalonao ho fitoeran-tongotrao.
  '2':
  - type: text
    content: 'Havoakan’NY TOMPO avy ao '
  - type: text
    content: Ziona
  - type: text
    content: ' ny tehin’ny herinao;'
  - type: text
    content: aoka hanapaka eo anivon’ny fahavalonao Ianao.
  '3':
  - type: text
    content: Ny olonao dia manolo-tena an-tsitrapo
  - type: text
    content: amin’ny andro isehoan’ny herinao;
  - type: text
    content: amin’ny fihaingoana masina,
  - type: text
    content: tahaka ny ando ateraky ny maraina,
  - type: text
    content: no manatona Anao ny zatovonao.
  '4':
  - type: text
    content: 'Efa nianiana NY TOMPO ka tsy hanenina:'
  - type: text
    content: Ianao no Mpisorona mandrakizay
  - type: text
    content: araka ny fomban’i Melkizedeka.
  '5':
  - type: text
    content: Ny Tompo eo ankavananao
  - type: text
    content: dia handripaka mpanjaka maro amin’ny andron’ny fahatezerany.
  '6':
  - type: text
    content: 'Hitsara any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' Izy ka hampiampatrampatra faty any;'
  - type: text
    content: handripaka mpitondra manerana ny tany Izy.
  '7':
  - type: text
    content: Hisotro amin’ny ony any an-dalana Izy
  - type: text
    content: ka izany no hitrakan’ny lohany.
