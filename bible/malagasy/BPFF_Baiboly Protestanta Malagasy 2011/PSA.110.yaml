document_id: PSA.110
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mpanjaka sy mpisorona
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain’NY TOMPO amin’ny Tompoko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraha eto ankavanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambara-panaoko ny fahavalonao ho fitoeran-tongotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Havoakan’NY TOMPO avy ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' ny tehin’ny herinao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hanapaka eo anivon’ny fahavalonao Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny olonao dia manolo-tena an-tsitrapo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro isehoan’ny herinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fihaingoana masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny ando ateraky ny maraina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no manatona Anao ny zatovonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Efa nianiana NY TOMPO ka tsy hanenina:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no Mpisorona mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny fomban’i Melkizedeka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny Tompo eo ankavananao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handripaka mpanjaka maro amin’ny andron’ny fahatezerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hitsara any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' Izy ka hampiampatrampatra faty any;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: handripaka mpitondra manerana ny tany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hisotro amin’ny ony any an-dalana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka izany no hitrakan’ny lohany.
