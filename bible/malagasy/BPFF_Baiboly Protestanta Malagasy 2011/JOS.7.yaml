document_id: JOS.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahadisoan’i Akana sy ny famaizana azy
  - type: text
    content: Fa nandika ny didy ny amin’ny zavatra voaozona ny Zanak’Israely satria i Akana, zanak’i Karmy, zanak’i Zabdy, zanak’i Zera, avy tamin’ny fokon’i Joda, dia naka tamin’ny zavatra efa voaozona; dia nirehitra tamin’ny Zanak’Israely ny fahatezeran’NY TOMPO.
  '10':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Josoa: Mitsangàna! Nahoana no miankohoka toy izao ianao? '
  '11':
  - type: text
    content: 'Efa nanota ny Israely ka nivadika ny fanekeko izay nandidiako azy satria efa naka tamin’ny zavatra voaozona izy sady koa nangalatra sy namitaka ka nataony ao amin’ny entany ireny. '
  '12':
  - type: text
    content: 'Koa tsy mahajanona eo anoloan’ny fahavalony ny Zanak’Israely; mandositra eo anoloan’ny fahavalony izy satria tonga voaozona. Tsy homba anareo intsony Aho raha tsy holevonina tsy ho eo aminareo ny zavatra voaozona. '
  '13':
  - type: text
    content: 'Mitsangàna, manamasìna ny vahoaka, ka lazao hoe: Manamasìna ny tenanareo mandra-pahamaraina; fa izao no lazain’NY TOMPO, Andriamanitry ny Israely: Misy zavatra voaozona eo aminao, ry Israely ô; koa tsy mahajanona eo anoloan’ny fahavalonao ianao mandra-panaisotrareo ny zavatra voaozona tsy ho eo aminareo intsony. '
  '14':
  - type: text
    content: 'Dia hampanatonina araka ny fokonareo avy ianareo raha maraina; koa ny foko izay tanan’NY TOMPO dia hanatona isam-pianakaviana; ary ny fianakaviana izay tanan’NY TOMPO dia hanatona indray isan-trano; ary ny trano izay tanan’NY TOMPO dia hanatona indray isam-batan’olona. '
  '15':
  - type: text
    content: Koa izay azo mitana ny zavatra voaozona dia hodorana amin’ny afo izy mbamin’izay rehetra mety ho azy satria nivadika ny faneken’NY TOMPO ka nanao fahadalana be teo amin’ny Israely.
  '16':
  - type: text
    content: 'Dia nifoha vao maraina i Josoa ka nampanatona ny Israely araka ny fokony avy; ary ny fokon’i Joda no voatana. '
  '17':
  - type: text
    content: 'Dia nitondra ny fokon’i Joda izy ka ny fianakavian’i Zera no voatana, dia nampanatona ny fianakavian’i Zera isam-batan’olona indray izy ka i Zabdy no voatana. '
  '18':
  - type: text
    content: Dia nampanatona ny ankohonany araka ny olona tsirairay izy ka i Akana, zanak’i Karmy, zanak’i Zabdy, zanak’i Zera, avy tamin’ny fokon’i Joda, no voatana.
  '19':
  - type: text
    content: 'Dia hoy i Josoa tamin’i Akana: Anaka, miangavy anao aho, omeo voninahitra NY TOMPO Andriamanitry ny Israely ka mitsora aminy; ary lazao amiko ankehitriny izay nataonao; aza afeninao ahy izany. '
  '2':
  - type: text
    content: 'Ary nandefa iraka hiala tany Jeriko hankany Ay izay eo anilan’i Bety-Avena, atsinanan’i Betela i Josoa, ka niteny taminy hoe: Miakara ka safoy ny tany. Dia niakatra ny olona ka nisafo tany an’i Ay. '
  '20':
  - type: text
    content: 'Ary namaly an’i Josoa i Akana hoe: Eny, nanota tamin’NY TOMPO, Andriamanitry ny Israely tokoa aho, ary toy izao no nataoko: '
  '21':
  - type: text
    content: 'Nahita akanjobe ivelany matevina tsara avy any Sineara sy sekela volafotsy roanjato ary vongam-bolamena lavalava, milanja sekela dimampolo, tamin’ny babo aho, dia nitsiriritra ireny ka naka izany; ary indreo, voafina ao ambanin’ny tany ao amin’ny tranolaiko ireny ary ny volafotsy dia ao ambaniny. '
  '22':
  - type: text
    content: 'Dia nandefa iraka i Josoa, ka nihazakazaka nankany amin’ny tranolay ireo, ary indro, voafina tao anatin’ny tranolainy ireo zavatra ireo, ary ny volafotsy dia tao ambaniny. '
  '23':
  - type: text
    content: Dia nalainy avy tao amin’ny tranolay ireny ka noentiny teo amin’i Josoa sy ny Zanak’Israely rehetra ary napetrany teo anatrehan’NY TOMPO.
  '24':
  - type: text
    content: 'Dia nalain’i Josoa sy ny Israely rehetra i Akana, zanak’i Zera, ary ny volafotsy, ny akanjobe ivelany matevina, ny vongam-bolamena, ny zanany lahy, ny zanany vavy, ny ombiny, ny borikiny, ny ondry aman’osiny ary ny tranolainy mbamin’izay rehetra mety ho azy; dia noentiny ho ao an-dohasaha Akora ireny. '
  '25':
  - type: text
    content: 'Ary hoy i Josoa: Andray! Inona ity loza nampidirinao taminay? Mba hahatonga loza aminao kosa NY TOMPO anio. Dia nitora-bato azy ny Israely rehetra ary nandoro ireny tamin’ny afo sady nanangom-bato teo amboniny. '
  '26':
  - type: text
    content: 'Dia nanangana antontam-bato lehibe hanarona azy mandraka androany izy. Ary NY TOMPO dia nionona tamin’ny fahatezerany mirehitra. Izany no nanaovana ny anaran’izany tany izany mandraka androany hoe: Lohasaha Akora'
  - type: note
    content: 'Akora: Fampidiran-doza.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Ary niverina tany amin’i Josoa izy ireo ka niteny taminy hoe: Aoka tsy hiakatra avokoa ny vahoaka rehetra; fa olona tokony ho roa arivo na telo arivo no aoka hiakatra hamely an’i Ay; aza manasatra ny vahoaka rehetra hankany fa vitsy ihany izy. '
  '4':
  - type: text
    content: 'Dia niakatra nankany ny olona sasany, tokony ho telo arivo lahy; kanjo nandositra teo anoloan’ny mponina tao Ay ireo. '
  '5':
  - type: text
    content: Dia nahafaty tokony ho enina amby telopolo lahy ny mponina tao Ay sady nanenjika azy teo anoloan’ny vavahady ka hatrany Sebarima izy ary namely azy teny am-pidinana. Dia ketraka ny fon’ny vahoaka ka tonga tahaka ny rano.
  '6':
  - type: text
    content: 'Dia notriarin’i Josoa ny fitafiany ka niankohoka tamin’ny tany teo anoloan’ny vata misy ny faneken’NY TOMPO mandra-paharivan’ny andro izy sy ny loholon’ny Israely sady nasiany vovoka ny lohany. '
  '7':
  - type: text
    content: 'Ary hoy i Josoa: Indrisy, Andriamanitra Tompo ô! Nahoana no nampita ity firenena ity an’i Jordana foana Ianao mba hanoloranao anay eo an-tanan’ny Amorita ka handringanana anay? Tahaka izay izahay mba nanapa-kevitra nitoetra tany andafin’i Jordana ihany! '
  '8':
  - type: text
    content: 'Indrisy, Tompo ô! Inona intsony no holazaiko, fa efa nandositra teo anoloan’ny fahavalony ny Israely? '
  '9':
  - type: text
    content: Ary ho ren’ny Kananita sy ny mponina rehetra amin’ny tany izany, dia hanodidina anay izy ka hamono ny anaranay tsy ho eo amin’ny tany intsony; dia hataonao ahoana kosa ny anaranao lehibe?
