document_id: 2CH.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Jotama
  - type: heading
    content: 2Mpa 15.32-38
  - type: text
    content: 'Dimy amby roapolo taona i Jotama raha nanomboka nanjaka ary enina amby folo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Jerosa, zanakavavin’i Zadoka. '
  '2':
  - type: text
    content: Nanao izay mahitsy teo imason’NY TOMPO izy, tahaka izay nataon’i Ozia rainy; nefa kosa tsy mba niditra tao amin’ny tempolin’NY TOMPO izy. Ary mbola nanao izay ratsy ihany ny vahoaka rehetra.
  '3':
  - type: text
    content: 'Izy no nanamboatra ny vavahady ambony amin’ny tranon’NY TOMPO sady nanorina asa rafitra betsaka tamin’ny mandan’i Ofela koa. '
  '4':
  - type: text
    content: 'Nanorina tanàna teny amin’ny tany be havoana any Joda sy trano fiarovana ary tilikambo tany an’ala koa izy. '
  '5':
  - type: text
    content: 'Niady tamin’ny mpanjakan’ny taranak’i Amona koa izy ka naharesy azy. Ary tamin’izany taona izany ny taranak’i Amona dia nanome azy '
  - type: text
    content: talenta
  - type: text
    content: ' volafotsy zato ary karazam-barimbazaha samihafa, iray alina '
  - type: text
    content: kora
  - type: text
    content: ' avy; izany no naloan’ny taranak’i Amona ho azy tamin’ny taona faharoa sy fahatelo koa. '
  '6':
  - type: text
    content: Dia nitombo hery i Jotama, satria nizotra tsara teo anatrehan’NY TOMPO Andriamaniny izy.
  '7':
  - type: text
    content: 'Ary ny tantaran’i Jotama sisa mbamin’ny adiny rehetra sy ny nataony rehetra, indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Israely sy ny Joda izany. '
  '8':
  - type: text
    content: 'Dimy amby roapolo taona izy raha nanomboka nanjaka ary enina amby folo taona no nanjakany tany Jerosalema. '
  '9':
  - type: text
    content: Ary nodimandry any amin’ny razany i Jotama, dia nalevina tany an-Tanànan’i Davida izy; ary i Ahaza zanany no nanjaka nandimby azy.
