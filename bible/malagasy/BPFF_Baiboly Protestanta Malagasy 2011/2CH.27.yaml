document_id: 2CH.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan’i Jotama
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 15.32-38
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dimy amby roapolo taona i Jotama raha nanomboka nanjaka ary enina amby folo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Jerosa, zanakavavin’i Zadoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nanao izay mahitsy teo imason’NY TOMPO izy, tahaka izay nataon’i Ozia rainy; nefa kosa tsy mba niditra tao amin’ny tempolin’NY TOMPO izy. Ary mbola nanao izay ratsy ihany ny vahoaka rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izy no nanamboatra ny vavahady ambony amin’ny tranon’NY TOMPO sady nanorina asa rafitra betsaka tamin’ny mandan’i Ofela koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanorina tanàna teny amin’ny tany be havoana any Joda sy trano fiarovana ary tilikambo tany an’ala koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Niady tamin’ny mpanjakan’ny taranak’i Amona koa izy ka naharesy azy. Ary tamin’izany taona izany ny taranak’i Amona dia nanome azy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' volafotsy zato ary karazam-barimbazaha samihafa, iray alina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kora
  - type: text
    text: ' avy; izany no naloan’ny taranak’i Amona ho azy tamin’ny taona faharoa sy fahatelo koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nitombo hery i Jotama, satria nizotra tsara teo anatrehan’NY TOMPO Andriamaniny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny tantaran’i Jotama sisa mbamin’ny adiny rehetra sy ny nataony rehetra, indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Israely sy ny Joda izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dimy amby roapolo taona izy raha nanomboka nanjaka ary enina amby folo taona no nanjakany tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nodimandry any amin’ny razany i Jotama, dia nalevina tany an-Tanànan’i Davida izy; ary i Ahaza zanany no nanjaka nandimby azy.
