document_id: PSA.142,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fialofana farany ho an’izay enjehina NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Tononkalo nataon’i Davida tamin’izy tao anaty lavabato. Vavaka.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny feoko no itarainako amin’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny feoko no ifonako amin’NY TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Loarako eo anatrehany ny fitarainako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambarako eo anatrehany ny fahoriako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Raha reraka ato anatiko ny fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fantatrao ny alehako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny lalana izorako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanafenany fandrika hamandrihany ahy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jereo eo amin’ny ankavanana ka zahao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy misy olona mahafantatra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: foana avokoa ny toerana fialofako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy miahy ny fanahiko.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mitaraina aminao aho, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hoy aho: Ianao no aroko'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy anjarako eo amin’ny tanin’ny velona.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Henoy ny fitarainako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa reraka loatra aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afaho amin’ny mpanenjika ahy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy leoko ireny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Avoahy hiala amin’ny tranomaizina ny fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiderako ny anaranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanodidina ahy ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria manisy soa ahy Ianao.
