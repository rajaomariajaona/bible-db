document_id: PSA.142,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fialofana farany ho an’izay enjehina NY TOMPO
  - type: text
    content: Tononkalo nataon’i Davida tamin’izy tao anaty lavabato. Vavaka.
  - type: text
    content: Ny feoko no itarainako amin’NY TOMPO;
  - type: text
    content: ny feoko no ifonako amin’NY TOMPO.
  '2':
  - type: text
    content: Loarako eo anatrehany ny fitarainako;
  - type: text
    content: ambarako eo anatrehany ny fahoriako.
  '3':
  - type: text
    content: Raha reraka ato anatiko ny fanahiko
  - type: text
    content: dia fantatrao ny alehako;
  - type: text
    content: eo amin’ny lalana izorako
  - type: text
    content: no nanafenany fandrika hamandrihany ahy.
  '4':
  - type: text
    content: Jereo eo amin’ny ankavanana ka zahao
  - type: text
    content: fa tsy misy olona mahafantatra ahy;
  - type: text
    content: foana avokoa ny toerana fialofako;
  - type: text
    content: tsy misy miahy ny fanahiko.
  '5':
  - type: text
    content: Mitaraina aminao aho, TOMPO ô;
  - type: text
    content: 'hoy aho: Ianao no aroko'
  - type: text
    content: sy anjarako eo amin’ny tanin’ny velona.
  '6':
  - type: text
    content: Henoy ny fitarainako
  - type: text
    content: fa reraka loatra aho;
  - type: text
    content: afaho amin’ny mpanenjika ahy aho
  - type: text
    content: fa tsy leoko ireny.
  '7':
  - type: text
    content: Avoahy hiala amin’ny tranomaizina ny fanahiko
  - type: text
    content: mba hiderako ny anaranao;
  - type: text
    content: hanodidina ahy ny marina
  - type: text
    content: satria manisy soa ahy Ianao.
