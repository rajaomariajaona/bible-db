document_id: JDG.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ireto avy ireo firenena navelan’NY TOMPO hijanona, mba hizahany toetra ny Israely, dia izay rehetra tsy mba nahita ny ady rehetra tany Kanana; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary tonga taminy ny Fanahin’NY TOMPO dia tonga mpitsara teo amin’ny Israely izy ka nivoaka hiady. Ary i Kosana-Risataima, mpanjakan’i Arama, dia natolotry NY TOMPO teo an-tanany ka nanampatra ny heriny tamin’i Kosana-Risataima izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia nandry efapolo taona ny tany. Ary maty i Otniela, zanak’i Kenaza.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Ehoda
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa mbola nanao izay ratsy teo imason’NY TOMPO ihany ny Zanak’Israely; ary NY TOMPO nampahery an’i Eglona, mpanjakan’i Moaba, hiady amin’ny Israely noho izy ireo nanao izay ratsy teo imason’NY TOMPO. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia nangoniny ho eo aminy ny taranak’i Amona sy i Amaleka ary nandeha izy ka namely ny Israely dia nahazo ny Tanàna be palma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia nanompo an’i Eglona, mpanjakan’i Moaba, nandritra ny valo amby folo taona ny Zanak’Israely.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nitaraina tamin’NY TOMPO ny Zanak’Israely ka nanangana mpamonjy ho azy NY TOMPO, dia i Ehoda, zanak’i Gera, avy amin’ny taranak’i Benjamina, lehilahy kavia. Ary ny Zanak’Israely dia nampitondra azy fanomezana ho an’i Eglona, mpanjakan’i Moaba. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nanao sabatra roa lela i Ehoda, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' iray ny halavany, izay nataony tao amin’ny fehikibony ambanin’ny akanjo, teo amin’ny andilany havanana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia nitondra ilay fanomezana ho an’i Eglona, mpanjakan’i Moaba, izy; ary i Eglona dia lehilahy natavy be. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Rehefa vitany ny fanolorana ny fanomezana dia nasainy nandeha ireo olona nitondra izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa izy kosa, rehefa tonga teo amin’ireo sampy vato tany Gilgala, dia niverina ka niteny hoe: Misy teny holazaiko mangingina aminao, ry mpanjaka ô. Dia hoy ny mpanjaka: Mangìna ianareo! Dia lasa nivoaka ireo rehetra nijoro teo akaikiny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'izany dia mba ho fampahafantarana fotsiny ny Zanak’Israely amin’ny alalan’ny fahaiza-miady, indrindra fa ireo izay tsy mbola nahita izany teo aloha; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nanatona an’i Eglona i Ehoda, raha nipetraka irery tao amin’ny efitrano ambony mangatsiatsiaka voatokana ho azy irery izy. Dia hoy i Ehoda: Misy teny avy amin’Andriamanitra holazaiko aminao. Dia nitsangana niala tamin’ny sezafiandrianana i Eglona. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nanainga ny tanany havia i Ehoda ary nandray ny sabatra teny amin’ny andilany havanana dia natsatony tamin’ny kibon’i Eglona '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ka difotra mbamin’ny zarany ary voasaron’ny tavin’i Eglona ny lelan-tsabatra ary tsy notsoahiny tamin’ny kibony; ary niboroaka tany amin’ny fitombenany izany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nivoaka avy teo amin’ny lavarangana i Ehoda ka nandrindrina ireo varavaran’ilay efitrano ambony sady nohidiny. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Rehefa tafavoaka izy dia tonga ireo mpanompon’i Eglona; ary hitan’ireo fa indro, voahidy ireo varavaran’ny efitrano ambony ka hoy ireo: Angamba mbola mivoaka ao amin’ny trano mangatsiatsiaka izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia niandry izy ireo ka farany very hevitra; koa satria tsy namoha ihany ireo varavaran’ilay trano ambony i Eglona, dia nalain’ireo ny fanalahidy ka novohany, ary indro, efa maty niampatra tamin’ny tany ny tompony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary raha mbola nitaredretra izy ireo dia lasa nandositra i Ehoda ka efa nihoatra an’ireo sampy vato, dia nandositra ho any Seìrata. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Raha vao tonga tany izy dia nitsoka anjomara tany amin’ny tany be havoana any Efraima, dia nidina nanaraka azy avy tany amin’ny tany be havoana ny Zanak’Israely ka izy no nitarika azy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Hoy izy taminy: Manaraha ahy fa efa natolotry NY TOMPO eo an-tananareo ny Moabita fahavalonareo. Dia nidina nanaraka azy ny olona ka azony ny fitàna any Jordana mankany Moaba ary tsy nisy navelany hita na dia iray akory aza. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia namono ny Moabita tamin’izany andro izany izy, tokony ho lehilahy iray alina izay samy olona vaventy sady mahery avokoa; tsy nisy afaka nandositra na dia iray akory aza. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ireo firenena ireo dia ny andriandahy Filistina dimy, ny Kananita rehetra, ny Sidoniana ary ny Hivita izay nonina tany amin’ny tendrombohitra any Libanona, hatrany akaikin’i Baala-Hermona ka hatrany amin’ny lalana mankany Hamata.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Naetrin’ny Israely ny Moabita tamin’izany andro izany. Dia nandry ny tany nandritra ny valopolo taona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Samgara
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary nanarakaraka azy i Samgara, zanak’i Anata, izay namely Filistina eninjato lahy tamin’ny fanindronan’omby; izy koa dia nanafaka ny Israely.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ireo dia noentina hizaha toetra ny Israely mba hahalalana na hihaino ny didin’NY TOMPO izay nasainy nandidian’i Mosesy ny razany, izy na tsia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny Zanak’Israely dia nonina teo amin’ny Kananita, ny Hetita, ny Amorita, ny Perizita, ny Hivita ary ny Jebosita. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary naka ny zanakavavin’ireny ho vadiny izy sady nanome ny zanany vavy ho vadin’ny zanakalahin’ireny ka nanompo ireo andriamaniny.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: NY TANTARAN’NY MPITSARA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Otniela
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nanao izay ratsy teo imason’NY TOMPO ny Zanak’Israely ka nanadino NY TOMPO Andriamaniny ary nanompo ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aseraha
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nirehitra tamin’ny Israely ny fahatezeran’NY TOMPO ka nivarotra azy ho eo an-tanan’i Kosana-Risataima, mpanjakan’i Mezopotamia, Izy; dia nanompo an’i Kosana-Risataima nandritra ny valo taona ny Zanak’Israely. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nitaraina tamin’NY TOMPO ny Zanak’Israely, ary NY TOMPO nanangana mpamonjy ho an’ny Zanak’Israely, izay nanafaka azy, dia i Otniela, zanakalahin’i Kenaza, zandrin’i Kaleba. '
