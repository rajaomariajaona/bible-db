document_id: PSA.63,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsara noho ny aina ny famindramponao
  - type: text
    content: Salamo nataon’i Davida, fony izy tany an-tany efitr’i Joda.
  - type: text
    content: Andriamanitra ô, Andriamanitro Ianao;
  - type: text
    content: mitady Anao fatratra aho,
  - type: text
    content: mangetaheta Anao ny fanahiko, maniry Anao ny nofoko,
  - type: text
    content: eto amin’ny tany maina sy mangentana tsy misy rano.
  '10':
  - type: text
    content: hatolotra ho amin’ny herin’ny sabatra izy;
  - type: text
    content: ho anjaran’ny amboahaolo izy.
  '11':
  - type: text
    content: Fa ny mpanjaka dia hifaly amin’Andriamanitra;
  - type: text
    content: ho ravoravo izay rehetra mianiana aminy,
  - type: text
    content: fa hakombona ny vavan’izay rehetra mandainga.
  '2':
  - type: text
    content: Izany no ijereko Anao ao amin’ny fitoerana masina,
  - type: text
    content: mba hahitako ny herinao sy ny voninahitrao.
  '3':
  - type: text
    content: Fa tsara noho ny aina ny famindramponao;
  - type: text
    content: ny molotro dia hidera Anao.
  '4':
  - type: text
    content: Izany no hisaorako Anao raha mbola velona koa aho;
  - type: text
    content: amin’ny anaranao no hanandratako ny tanako.
  '5':
  - type: text
    content: Toy ny voky tsoka sy tavy no hahavokisan’ny fanahiko
  - type: text
    content: ary amin’ny molotra ravoravo no hideran’ny vavako Anao.
  '6':
  - type: text
    content: Rehefa mahatsiaro Anao eo am-pandrianako aho
  - type: text
    content: dia mieritreritra Anao amin’ny fotoam-piambenana alina.
  '7':
  - type: text
    content: Fa famonjena ahy Ianao
  - type: text
    content: ary ao amin’ny aloky ny elatrao no hihobiako.
  '8':
  - type: text
    content: Mifikitra Aminao ny fanahiko;
  - type: text
    content: manohana ahy ny tananao ankavanana.
  '9':
  - type: text
    content: Fa ireny dia mitady ny aiko ka mampidi-doza amin’ny tenany;
  - type: text
    content: hiditra any ambanin’ny tany izy;
