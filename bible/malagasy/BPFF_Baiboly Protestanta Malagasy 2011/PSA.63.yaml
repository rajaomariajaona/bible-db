document_id: PSA.63
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsara noho ny aina ny famindramponao
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo nataon’i Davida, fony izy tany an-tany efitr’i Joda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andriamanitra ô, Andriamanitro Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitady Anao fatratra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mangetaheta Anao ny fanahiko, maniry Anao ny nofoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto amin’ny tany maina sy mangentana tsy misy rano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izany no ijereko Anao ao amin’ny fitoerana masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahitako ny herinao sy ny voninahitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa tsara noho ny aina ny famindramponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny molotro dia hidera Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izany no hisaorako Anao raha mbola velona koa aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny anaranao no hanandratako ny tanako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy ny voky tsoka sy tavy no hahavokisan’ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny molotra ravoravo no hideran’ny vavako Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Rehefa mahatsiaro Anao eo am-pandrianako aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mieritreritra Anao amin’ny fotoam-piambenana alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa famonjena ahy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ao amin’ny aloky ny elatrao no hihobiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mifikitra Aminao ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manohana ahy ny tananao ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ireny dia mitady ny aiko ka mampidi-doza amin’ny tenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiditra any ambanin’ny tany izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: hatolotra ho amin’ny herin’ny sabatra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho anjaran’ny amboahaolo izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny mpanjaka dia hifaly amin’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho ravoravo izay rehetra mianiana aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hakombona ny vavan’izay rehetra mandainga.
