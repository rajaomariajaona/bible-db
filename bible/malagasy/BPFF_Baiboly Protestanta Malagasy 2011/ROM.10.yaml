document_id: ROM.10
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ry rahalahy, ny fanirian’ny foko sy ny angatahiko amin’Andriamanitra ho azy ireny dia ny mba hahavoavonjy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Satria vavolombelon’ireny aho, fa manana hafanam-po ny amin’Andriamanitra izy saingy tsy araka ny fahalalana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eny, tsy nahalala ny fahamarinana avy amin’Andriamanitra izy ka nitady hampiorina fahamarinana ho an’ny tenany, dia tsy nanaiky ny fahamarinana avy amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny faran’ny lalàna anefa dia Kristy, ho fahamarinana ho an’izay rehetra mino.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny sy finoana ary famonjena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa i Mosesy dia nanoratra nilaza fa ny olona izay manao ny fahamarinana avy amin’ny lalàna no ho velona amin’izany (Lev 18.5). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny fahamarinana izay avy amin’ny finoana kosa dia milaza hoe: Aza milaza ao am-ponao hoe: Iza no hiakatra any an-danitra? Izany hoe ny hampidina an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' avy any izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'na: Iza no hidina any amin’ny lalina? Izany hoe ny hampiakatra an’i Kristy avy any amin’ny maty izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ahoana no lazainy? «Eo akaikinao ny teny, dia eo am-bavanao sy ao am-ponao» (Deo 30.12-14), dia ny teny ny amin’ny finoana, izay torinay izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Satria raha manaiky an’i Jesosy ho Tompo amin’ny vavanao ianao ary mino amin’ny fonao fa Andriamanitra efa nanangana Azy tamin’ny maty, dia hovonjena ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa amin’ny fo no inoana hahazoana fahamarinana ary amin’ny vava no anekena hahazoana famonjena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy ny Soratra Masina: «Tsy hitsanga-menatra izay rehetra mino Azy» (Isa 28.16). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa tsy misy hafa na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ', fa iray ihany ny Tompon’izy rehetra, sady manankarena homena izay rehetra miantso Azy Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Satria «Izay rehetra miantso ny anaran’ny Tompo no hovonjena» (Joe 3.5).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hataony ahoana moa no fiantso izay tsy ninoany? Hataony ahoana no fino izay Olona tsy reny? Hataony ahoana no fandre raha tsy misy mpitory? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hataony ahoana no fitory raha tsy nirahina? Araka ny voasoratra hoe: «Akory ny hatsaran’ny tongotr’iry mitondra teny soa mahafaly!» (Isa 52.7).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nefa tsy izy rehetra no nanaiky ny Filazantsara. Fa hoy Isaia: «TOMPO ô, iza no nino izay henony taminay?» (Isa 53.1). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa ny finoana dia avy amin’izay henoina, ary izay henoina kosa dia avy amin’ny tenin’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy aho: Sao tsy nahare izy? Tsia,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Efa nivoaka ho any amin’ny tany manontolo ny feony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny teniny dia hatramin’ny faran’izao rehetra izao» (Sal 19.4).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy aho: Sao tsy nahalala ary ny Israely? I Mosesy no voalohany niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hampialona anareo an’izay tsy firenena Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay firenena adala no hampahasosorako anareo» (Deo 32.21).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa sahy mihitsy Isaia ka nilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hitan’izay tsy nitady Ahy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary niseho tamin’izay tsy nanontany Ahy.»
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa ny amin’ny Israely dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mandritra ny andro no efa nanatsorako ny tanako tamin’izay firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy mankatò no mandà» (Isa 65.1-2).
