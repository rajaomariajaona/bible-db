document_id: ROM.10,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ry rahalahy, ny fanirian’ny foko sy ny angatahiko amin’Andriamanitra ho azy ireny dia ny mba hahavoavonjy azy. '
  '10':
  - type: text
    content: 'Fa amin’ny fo no inoana hahazoana fahamarinana ary amin’ny vava no anekena hahazoana famonjena. '
  '11':
  - type: text
    content: 'Fa hoy ny Soratra Masina: «Tsy hitsanga-menatra izay rehetra mino Azy» (Isa 28.16). '
  '12':
  - type: text
    content: 'Fa tsy misy hafa na '
  - type: text
    content: Jiosy
  - type: text
    content: ' na '
  - type: text
    content: Jentilisa
  - type: text
    content: ', fa iray ihany ny Tompon’izy rehetra, sady manankarena homena izay rehetra miantso Azy Izy. '
  '13':
  - type: text
    content: Satria «Izay rehetra miantso ny anaran’ny Tompo no hovonjena» (Joe 3.5).
  '14':
  - type: text
    content: 'Hataony ahoana moa no fiantso izay tsy ninoany? Hataony ahoana no fino izay Olona tsy reny? Hataony ahoana no fandre raha tsy misy mpitory? '
  '15':
  - type: text
    content: 'Ary hataony ahoana no fitory raha tsy nirahina? Araka ny voasoratra hoe: «Akory ny hatsaran’ny tongotr’iry mitondra teny soa mahafaly!» (Isa 52.7).'
  '16':
  - type: text
    content: 'Nefa tsy izy rehetra no nanaiky ny Filazantsara. Fa hoy Isaia: «TOMPO ô, iza no nino izay henony taminay?» (Isa 53.1). '
  '17':
  - type: text
    content: 'Koa ny finoana dia avy amin’izay henoina, ary izay henoina kosa dia avy amin’ny tenin’i Kristy. '
  '18':
  - type: text
    content: 'Fa hoy aho: Sao tsy nahare izy? Tsia,'
  - type: text
    content: «Efa nivoaka ho any amin’ny tany manontolo ny feony
  - type: text
    content: ary ny teniny dia hatramin’ny faran’izao rehetra izao» (Sal 19.4).
  '19':
  - type: text
    content: 'Fa hoy aho: Sao tsy nahalala ary ny Israely? I Mosesy no voalohany niteny hoe:'
  - type: text
    content: «Hampialona anareo an’izay tsy firenena Aho,
  - type: text
    content: amin’izay firenena adala no hampahasosorako anareo» (Deo 32.21).
  '2':
  - type: text
    content: 'Satria vavolombelon’ireny aho, fa manana hafanam-po ny amin’Andriamanitra izy saingy tsy araka ny fahalalana. '
  '20':
  - type: text
    content: 'Fa sahy mihitsy Isaia ka nilaza hoe:'
  - type: text
    content: «Hitan’izay tsy nitady Ahy Aho
  - type: text
    content: ary niseho tamin’izay tsy nanontany Ahy.»
  '21':
  - type: text
    content: 'Fa ny amin’ny Israely dia hoy izy:'
  - type: text
    content: «Mandritra ny andro no efa nanatsorako ny tanako tamin’izay firenena
  - type: text
    content: sady tsy mankatò no mandà» (Isa 65.1-2).
  '3':
  - type: text
    content: 'Eny, tsy nahalala ny fahamarinana avy amin’Andriamanitra izy ka nitady hampiorina fahamarinana ho an’ny tenany, dia tsy nanaiky ny fahamarinana avy amin’Andriamanitra. '
  '4':
  - type: text
    content: Ny faran’ny lalàna anefa dia Kristy, ho fahamarinana ho an’izay rehetra mino.
  - type: heading
    content: Teny sy finoana ary famonjena
  '5':
  - type: text
    content: 'Fa i Mosesy dia nanoratra nilaza fa ny olona izay manao ny fahamarinana avy amin’ny lalàna no ho velona amin’izany (Lev 18.5). '
  '6':
  - type: text
    content: 'Ny fahamarinana izay avy amin’ny finoana kosa dia milaza hoe: Aza milaza ao am-ponao hoe: Iza no hiakatra any an-danitra? Izany hoe ny hampidina an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' avy any izany, '
  '7':
  - type: text
    content: 'na: Iza no hidina any amin’ny lalina? Izany hoe ny hampiakatra an’i Kristy avy any amin’ny maty izany. '
  '8':
  - type: text
    content: 'Fa ahoana no lazainy? «Eo akaikinao ny teny, dia eo am-bavanao sy ao am-ponao» (Deo 30.12-14), dia ny teny ny amin’ny finoana, izay torinay izany. '
  '9':
  - type: text
    content: 'Satria raha manaiky an’i Jesosy ho Tompo amin’ny vavanao ianao ary mino amin’ny fonao fa Andriamanitra efa nanangana Azy tamin’ny maty, dia hovonjena ianao. '
