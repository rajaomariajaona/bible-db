document_id: LEV.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tetiandron’ireo fety eo amin’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Ny amin’ireo andro firavoravoana voatendrin’NY TOMPO izay hantsoinareo hoe fivoriana masina, dia izao no izy:'
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny Sabata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Henemana no hanaovana raharaha; fa ny andro fahafito dia tena andro fitsaharana, fivoriana masina; aza miasa mihitsy ianareo, fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' ho an’NY TOMPO eny amin’izay fonenanareo rehetra izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izao no fotoam-pivavahana voatendrin’NY TOMPO, dia fivoriana masina hantsoinareo amin’ny fotoanany avy.
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny Paska sy ny fetin’ny mofo tsy misy masirasira
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny andro fahefatra amby folo amin’ny volana voalohany, rehefa hariva milenti-masoandro, dia Paska an’ny NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny andro fahadimy amby folo amin’izany volana izany dia andro firavoravoana ho an’NY TOMPO, fihinanana ny mofo tsy misy masirasira; hafitoana no hihinananareo mofo tsy misy masirasira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Amin’ny andro voalohany dia hisy fivoriana masina ho anareo; aza manao raharaha fanompoana ianareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: fa manolora fanatitra levonina amin’ny afo ho an’NY TOMPO mandritra ny hafitoana; ary amin’ny andro fahafito dia hisy fivoriana masina koa; aza manao raharaha fanompoana ianareo.
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny fetin’ny voaloham-bokatra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Rehefa tonga any amin’ny tany izay omeko anareo ianareo ka hijinja ny vokatra any dia mitondrà amboara iray amin’ny voaloham-bokatrareo ho any amin’ny mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hanandratra ny amboara eo anatrehan’NY TOMPO izy mba hankasitrahana anareo; ny ampitson’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' no hanandratan’ny mpisorona azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa amin’izay andro hanandratanareo ny amboara dia manolora zanak’ondrilahy tsy misy kilema izay herintaona ho fanatitra dorana manontolo ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny fanatitra avy amin’ny zavamaniry miaraka aminy dia koba tsara toto roa ampahafolon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efaha
  - type: text
    text: ', voaharo diloilo hatao fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO; ary ny fanatitra aidina miaraka aminy dia divay ampahefatry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hina
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aza mihinana mofo na lango na salohim-bary maitso, mandra-pahatongan’ny andro izay hitondranareo fanatitra ho an’Andriamanitrareo; ho lalàna maharitra amin’ny taranakareo fara aman-dimby izany any amin’izay fonenanareo rehetra.
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny fetin’ireo Herinandro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Manisà herinandro fito ho anareo, manomboka ny ampitson’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' ka hatramin’izay andro itondranareo ny amboara ho fanatitra asandratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny ampitson’ny Sabata fahafito no hahataperan’ireo andro dimampolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Io andro fahadimampolo io no antsoin’ny Fiangonana kristiana hoe Pentekosta.
    marker-yv: yv-n
  - type: text
    text: ' hisainareo, dia manolora fanatitra vaovao avy amin’ny zavamaniry ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mitondrà mofo roa avy any amin’ny fonenanareo hatao fanatitra asandratra; hatao amin’ny koba tsara toto roa ampahafolon’ny efaha izany ka hasiana masirasira raha hendasina; voaloham-bokatra ho an’NY TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia manolora zanak’ondrilahy fito tsy misy kilema, iray taona avy, miaraka amin’ny mofo sy vantotra ombilahy iray ary ondrilahy roa. Hatao fanatitra dorana manontolo ho an’NY TOMPO ireo miaraka amin’ny fanatitra avy amin’ny zavamaniry sy ny fanatitra aidina, dia fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Manolora koa osilahy iray ho fanatitra fanadiovana sy zanak’ondrilahy roa, herintaona avy, ho fanati-pihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny mpisorona dia hanolotra ireo mbamin’ny mofon’ny voaloham-bokatra ho fanatitra asandratra eo anatrehan’NY TOMPO, miaraka amin’ny zanak’ondrilahy roa; ireo dia ho masina ho an’NY TOMPO, ho anjaran’ny mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ambarao ho fivoriana io andro io ka manaova fivoriana masina ary aza manao raharaha fanompoana. Ho lalàna maharitra amin’ny taranakareo fara aman-dimby izany any amin’izay fonenanareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha mijinja ny vokatry ny tanimbarinareo ianareo dia aza jinjaina avokoa ny eny an-tsisiny ary aza tsimponina izay latsaka avy amin’ny vokatrao fa avelao ho an’ny mahantra sy ny vahiny izany. Izaho no TOMPO Andriamanitrareo.
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny andro voalohany amin’ny volana fahafito
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Ny andro voalohany amin’ny volana fahafito dia ho andro fitsaharana ho anareo; amin’io no hitsofana trompetra ho fampahatsiarovana ny fivoriana masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aza manao raharaha fanompoana ianareo, fa manolora fanatitra levonina amin’ny afo ho an’NY TOMPO.
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny Andro Fanavotana Lehibe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny andro fahafolo amin’izany volana fahafito izany no Andro Fanavotana Lehibe. Hisy fivoriana masina ho anareo; hifady hanina ianareo ka hanatitra fanatitra levonina amin’ny afo ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aza manao raharaha amin’izany andro izany; fa andro fanavotana io, hanaovana fanavotana ho anareo eo anatrehan’NY TOMPO Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa ny olona rehetra izay tsy mety mifady hanina amin’io andro io dia hesorina tsy ho amin’ny fireneny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa ny olona rehetra izay miasa amin’io andro io dia hesoriko tsy ho amin’ny fireneny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Aza manao raharaha akory. Ho lalàna maharitra hatrany amin’ny taranakareo fara aman-dimby izany any amin’izay rehetra honenanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' izany, tena andro fitsaharana ho anareo ary hifady hanina ianareo; amin’ny andro fahasivy amin’ny volana, rehefa hariva, manomboka ny hariva ka hatramin’ny ampitso hariva no hitandremanareo ny Sabata, andro fitsaharanareo.'
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny fetin’ny trano rantsan-kazo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Amin’ny andro fahadimy amby folo amin’ny volana fahafolo no hiantombohan’ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo ho an’NY TOMPO mandritra ny hafitoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Amin’ny andro voalohany dia hisy fivoriana masina ka aza manao raharaha fanompoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Hafitoana no hanoloranareo fanatitra levonina amin’ny afo ho an’NY TOMPO; ary amin’ny andro fahavalo dia hisy fivoriana masina ho anareo koa ka hanolotra fanatitra levonina amin’ny afo ho an’NY TOMPO ianareo; andro fivoriana masina izany, koa aza manao raharaha fanompoana ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ireo no fotoam-pivavahana voatendrin’NY TOMPO ka hantsoinareo hoe: Fivoriana masina, hanolorana fanatitra levonina amin’ny afo ho an’NY TOMPO, dia fanatitra dorana manontolo sy fanatitra avy amin’ny zavamaniry ary fanatitra hafa alatsa-dra sy fanatitra aidina, samy amin’ny fotoanany avy izy rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: afa-tsy izay fanao amin’ny Sabatan’NY TOMPO sy ny zavatra ataonareo fanomezana sy ny fanatitra rehetra hanefanareo voady ary ny fanatitra an-tsitraponareo rehetra izay omenareo ho an’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Amin’ny andro fahadimy amby folo amin’ny volana fahafito, rehefa manangona ny zavamaniry ianareo dia tandremo ny andro firavoravoana ho an’NY TOMPO mandritra ny hafitoana; ny andro voalohany dia andro fitsaharana, ary ny andro fahavalo koa dia andro fitsaharana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Amin’ny andro voalohany dia makà voan’ny hazo tsara tarehy, dia sampana palma sy rantsan’ny hazo mikirindro ary hazomalahelo amoron’ny renirano, ho anareo; ary mifalia mandritra ny hafitoana eo anatrehan’NY TOMPO Andriamanitrareo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tandremo izany ho andro firavoravoana ho an’NY TOMPO, hafitoana isan-taona. Ho lalàna maharitra hatramin’ny taranakareo fara aman-dimby io; amin’ny volana fahafito no hitandremanareo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ao amin’ny trano rantsan-kazo no hitoeranareo mandritra ny hafitoana; ny tompon-tany rehetra amin’ny Zanak’Israely dia samy hitoetra ao amin’ny trano rantsan-kazo avokoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: mba ho fantatry ny taranakareo fa nampilasy ny Zanak’Israely tao amin’ny trano rantsan-kazo Aho, raha nitondra azy nivoaka avy tany amin’ny tany Ejipta. Izaho no TOMPO Andriamanitrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Nolazain’i Mosesy tamin’ny Zanak’Israely ireo fotoam-pivavahana voatendrin’NY TOMPO ireo.
