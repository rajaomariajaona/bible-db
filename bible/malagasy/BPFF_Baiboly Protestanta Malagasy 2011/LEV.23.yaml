document_id: LEV.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tetiandron’ireo fety eo amin’ny Israely
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Rehefa tonga any amin’ny tany izay omeko anareo ianareo ka hijinja ny vokatra any dia mitondrà amboara iray amin’ny voaloham-bokatrareo ho any amin’ny mpisorona. '
  '11':
  - type: text
    content: 'Hanandratra ny amboara eo anatrehan’NY TOMPO izy mba hankasitrahana anareo; ny ampitson’ny '
  - type: text
    content: Sabata
  - type: text
    content: ' no hanandratan’ny mpisorona azy. '
  '12':
  - type: text
    content: 'Koa amin’izay andro hanandratanareo ny amboara dia manolora zanak’ondrilahy tsy misy kilema izay herintaona ho fanatitra dorana manontolo ho an’NY TOMPO. '
  '13':
  - type: text
    content: 'Ary ny fanatitra avy amin’ny zavamaniry miaraka aminy dia koba tsara toto roa ampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: ', voaharo diloilo hatao fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO; ary ny fanatitra aidina miaraka aminy dia divay ampahefatry ny '
  - type: text
    content: hina
  - type: text
    content: '. '
  '14':
  - type: text
    content: Aza mihinana mofo na lango na salohim-bary maitso, mandra-pahatongan’ny andro izay hitondranareo fanatitra ho an’Andriamanitrareo; ho lalàna maharitra amin’ny taranakareo fara aman-dimby izany any amin’izay fonenanareo rehetra.
  - type: heading
    content: Ny fetin’ireo Herinandro
  '15':
  - type: text
    content: 'Manisà herinandro fito ho anareo, manomboka ny ampitson’ny '
  - type: text
    content: Sabata
  - type: text
    content: ' ka hatramin’izay andro itondranareo ny amboara ho fanatitra asandratra. '
  '16':
  - type: text
    content: Ny ampitson’ny Sabata fahafito no hahataperan’ireo andro dimampolo
  - type: note
    content: Io andro fahadimampolo io no antsoin’ny Fiangonana kristiana hoe Pentekosta.
  - type: text
    content: ' hisainareo, dia manolora fanatitra vaovao avy amin’ny zavamaniry ho an’NY TOMPO. '
  '17':
  - type: text
    content: 'Mitondrà mofo roa avy any amin’ny fonenanareo hatao fanatitra asandratra; hatao amin’ny koba tsara toto roa ampahafolon’ny efaha izany ka hasiana masirasira raha hendasina; voaloham-bokatra ho an’NY TOMPO izany. '
  '18':
  - type: text
    content: 'Dia manolora zanak’ondrilahy fito tsy misy kilema, iray taona avy, miaraka amin’ny mofo sy vantotra ombilahy iray ary ondrilahy roa. Hatao fanatitra dorana manontolo ho an’NY TOMPO ireo miaraka amin’ny fanatitra avy amin’ny zavamaniry sy ny fanatitra aidina, dia fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO. '
  '19':
  - type: text
    content: 'Manolora koa osilahy iray ho fanatitra fanadiovana sy zanak’ondrilahy roa, herintaona avy, ho fanati-pihavanana. '
  '2':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Ny amin’ireo andro firavoravoana voatendrin’NY TOMPO izay hantsoinareo hoe fivoriana masina, dia izao no izy:'
  - type: heading
    content: Ny Sabata
  '20':
  - type: text
    content: 'Ary ny mpisorona dia hanolotra ireo mbamin’ny mofon’ny voaloham-bokatra ho fanatitra asandratra eo anatrehan’NY TOMPO, miaraka amin’ny zanak’ondrilahy roa; ireo dia ho masina ho an’NY TOMPO, ho anjaran’ny mpisorona. '
  '21':
  - type: text
    content: 'Ambarao ho fivoriana io andro io ka manaova fivoriana masina ary aza manao raharaha fanompoana. Ho lalàna maharitra amin’ny taranakareo fara aman-dimby izany any amin’izay fonenanareo rehetra. '
  '22':
  - type: text
    content: Raha mijinja ny vokatry ny tanimbarinareo ianareo dia aza jinjaina avokoa ny eny an-tsisiny ary aza tsimponina izay latsaka avy amin’ny vokatrao fa avelao ho an’ny mahantra sy ny vahiny izany. Izaho no TOMPO Andriamanitrareo.
  - type: heading
    content: Ny andro voalohany amin’ny volana fahafito
  '23':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '24':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Ny andro voalohany amin’ny volana fahafito dia ho andro fitsaharana ho anareo; amin’io no hitsofana trompetra ho fampahatsiarovana ny fivoriana masina. '
  '25':
  - type: text
    content: Aza manao raharaha fanompoana ianareo, fa manolora fanatitra levonina amin’ny afo ho an’NY TOMPO.
  - type: heading
    content: Ny Andro Fanavotana Lehibe
  '26':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '27':
  - type: text
    content: 'Ny andro fahafolo amin’izany volana fahafito izany no Andro Fanavotana Lehibe. Hisy fivoriana masina ho anareo; hifady hanina ianareo ka hanatitra fanatitra levonina amin’ny afo ho an’NY TOMPO. '
  '28':
  - type: text
    content: 'Aza manao raharaha amin’izany andro izany; fa andro fanavotana io, hanaovana fanavotana ho anareo eo anatrehan’NY TOMPO Andriamanitrareo. '
  '29':
  - type: text
    content: 'Fa ny olona rehetra izay tsy mety mifady hanina amin’io andro io dia hesorina tsy ho amin’ny fireneny. '
  '3':
  - type: text
    content: 'Henemana no hanaovana raharaha; fa ny andro fahafito dia tena andro fitsaharana, fivoriana masina; aza miasa mihitsy ianareo, fa '
  - type: text
    content: Sabata
  - type: text
    content: ' ho an’NY TOMPO eny amin’izay fonenanareo rehetra izany.'
  '30':
  - type: text
    content: 'Koa ny olona rehetra izay miasa amin’io andro io dia hesoriko tsy ho amin’ny fireneny. '
  '31':
  - type: text
    content: 'Aza manao raharaha akory. Ho lalàna maharitra hatrany amin’ny taranakareo fara aman-dimby izany any amin’izay rehetra honenanareo. '
  '32':
  - type: text
    content: 'Ho '
  - type: text
    content: Sabata
  - type: text
    content: ' izany, tena andro fitsaharana ho anareo ary hifady hanina ianareo; amin’ny andro fahasivy amin’ny volana, rehefa hariva, manomboka ny hariva ka hatramin’ny ampitso hariva no hitandremanareo ny Sabata, andro fitsaharanareo.'
  - type: heading
    content: Ny fetin’ny trano rantsan-kazo
  '33':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '34':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Amin’ny andro fahadimy amby folo amin’ny volana fahafolo no hiantombohan’ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo ho an’NY TOMPO mandritra ny hafitoana. '
  '35':
  - type: text
    content: 'Amin’ny andro voalohany dia hisy fivoriana masina ka aza manao raharaha fanompoana. '
  '36':
  - type: text
    content: Hafitoana no hanoloranareo fanatitra levonina amin’ny afo ho an’NY TOMPO; ary amin’ny andro fahavalo dia hisy fivoriana masina ho anareo koa ka hanolotra fanatitra levonina amin’ny afo ho an’NY TOMPO ianareo; andro fivoriana masina izany, koa aza manao raharaha fanompoana ianareo.
  '37':
  - type: text
    content: 'Ireo no fotoam-pivavahana voatendrin’NY TOMPO ka hantsoinareo hoe: Fivoriana masina, hanolorana fanatitra levonina amin’ny afo ho an’NY TOMPO, dia fanatitra dorana manontolo sy fanatitra avy amin’ny zavamaniry ary fanatitra hafa alatsa-dra sy fanatitra aidina, samy amin’ny fotoanany avy izy rehetra, '
  '38':
  - type: text
    content: afa-tsy izay fanao amin’ny Sabatan’NY TOMPO sy ny zavatra ataonareo fanomezana sy ny fanatitra rehetra hanefanareo voady ary ny fanatitra an-tsitraponareo rehetra izay omenareo ho an’NY TOMPO.
  '39':
  - type: text
    content: 'Amin’ny andro fahadimy amby folo amin’ny volana fahafito, rehefa manangona ny zavamaniry ianareo dia tandremo ny andro firavoravoana ho an’NY TOMPO mandritra ny hafitoana; ny andro voalohany dia andro fitsaharana, ary ny andro fahavalo koa dia andro fitsaharana. '
  '4':
  - type: text
    content: Izao no fotoam-pivavahana voatendrin’NY TOMPO, dia fivoriana masina hantsoinareo amin’ny fotoanany avy.
  - type: heading
    content: Ny Paska sy ny fetin’ny mofo tsy misy masirasira
  '40':
  - type: text
    content: 'Amin’ny andro voalohany dia makà voan’ny hazo tsara tarehy, dia sampana palma sy rantsan’ny hazo mikirindro ary hazomalahelo amoron’ny renirano, ho anareo; ary mifalia mandritra ny hafitoana eo anatrehan’NY TOMPO Andriamanitrareo ianareo. '
  '41':
  - type: text
    content: 'Tandremo izany ho andro firavoravoana ho an’NY TOMPO, hafitoana isan-taona. Ho lalàna maharitra hatramin’ny taranakareo fara aman-dimby io; amin’ny volana fahafito no hitandremanareo azy. '
  '42':
  - type: text
    content: 'Ao amin’ny trano rantsan-kazo no hitoeranareo mandritra ny hafitoana; ny tompon-tany rehetra amin’ny Zanak’Israely dia samy hitoetra ao amin’ny trano rantsan-kazo avokoa, '
  '43':
  - type: text
    content: mba ho fantatry ny taranakareo fa nampilasy ny Zanak’Israely tao amin’ny trano rantsan-kazo Aho, raha nitondra azy nivoaka avy tany amin’ny tany Ejipta. Izaho no TOMPO Andriamanitrareo.
  '44':
  - type: text
    content: Nolazain’i Mosesy tamin’ny Zanak’Israely ireo fotoam-pivavahana voatendrin’NY TOMPO ireo.
  '5':
  - type: text
    content: 'Ny andro fahefatra amby folo amin’ny volana voalohany, rehefa hariva milenti-masoandro, dia Paska an’ny NY TOMPO. '
  '6':
  - type: text
    content: 'Ary ny andro fahadimy amby folo amin’izany volana izany dia andro firavoravoana ho an’NY TOMPO, fihinanana ny mofo tsy misy masirasira; hafitoana no hihinananareo mofo tsy misy masirasira. '
  '7':
  - type: text
    content: 'Amin’ny andro voalohany dia hisy fivoriana masina ho anareo; aza manao raharaha fanompoana ianareo '
  '8':
  - type: text
    content: fa manolora fanatitra levonina amin’ny afo ho an’NY TOMPO mandritra ny hafitoana; ary amin’ny andro fahafito dia hisy fivoriana masina koa; aza manao raharaha fanompoana ianareo.
  - type: heading
    content: Ny fetin’ny voaloham-bokatra
  '9':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
