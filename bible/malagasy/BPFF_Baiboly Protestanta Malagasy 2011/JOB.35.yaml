document_id: JOB.35,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy misy mitombina izay lazain’i Joba
  - type: text
    content: 'Ary mbola niteny ihany i Eliho hoe:'
  '10':
  - type: text
    content: 'nefa tsy misy miteny hoe: Aiza Andriamanitra, Mpanao ahy, izay mahatonga hira fiderana amin’ny alina,'
  '11':
  - type: text
    content: izay manome fahalalana antsika mihoatra noho ny an’ny biby ambonin’ny tany,
  - type: text
    content: dia izay manome fahendrena antsika mihoatra noho ny an’ny voromanidina?
  '12':
  - type: text
    content: Eny, mitaraina mafy ireo nefa tsy mamaly Izy
  - type: text
    content: noho ny fireharehan’ny ratsy fanahy.
  '13':
  - type: text
    content: Ny fitarainana tsy amin’antony dia tsy mba henoin’Andriamanitra
  - type: text
    content: ary ny Tsitoha dia tsy mandinika izany.
  '14':
  - type: text
    content: Na dia lazainao aza fa tsy mahita Azy ianao,
  - type: text
    content: efa tonga eo anatrehany ny ady, koa tsy maintsy miandry Azy ianao!
  '15':
  - type: text
    content: Koa raha saingy tsy mihatra ny fahatezerany,
  - type: text
    content: moa tsy fantany tsara koa va ny fihaikana?
  '16':
  - type: text
    content: Miloa-bava foana anefa i Joba
  - type: text
    content: ary manao teny maro tsy amim-pahalalana.
  '2':
  - type: text
    content: 'Ataonao va fa marina ny nitenenanao hoe:'
  - type: text
    content: Marina noho Andriamanitra aho?
  '3':
  - type: text
    content: 'Fa hoy ianao: Mampaninona anao moa izany?'
  - type: text
    content: Inona no soa azoko amin’ny tsy hanotako?
  '4':
  - type: text
    content: Izaho no hiteny hamaly ny teninao
  - type: text
    content: mbamin’ny an’ny namanao.
  '5':
  - type: text
    content: Diniho ny lanitra ka jereo!
  - type: text
    content: 'Tsinjovy ny haavon’ny rahona: Tsy takatrao izany!'
  '6':
  - type: text
    content: Raha manota ianao, moa mahefa inona Aminy izany?
  - type: text
    content: Ary raha mihamaro ny fahotanao, mampaninona Azy moa izany?
  '7':
  - type: text
    content: Raha marina ianao, hahazoany inona moa izany?
  - type: text
    content: Ary inona no horaisiny avy amin’ny tananao?
  '8':
  - type: text
    content: Amin’ny olona tahaka anao ihany no mihatra ny ratsy ataonao
  - type: text
    content: ary amin’ny olombelona ihany no mihatra ny fahamarinanao.
  '9':
  - type: text
    content: Noho ny haben’ny fampahoriana dia mitaraina ny olona;
  - type: text
    content: eny, minananana izy noho ny hetraketraka ataon’ny maro;
