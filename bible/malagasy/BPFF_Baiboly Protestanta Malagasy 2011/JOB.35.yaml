document_id: JOB.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy misy mitombina izay lazain’i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary mbola niteny ihany i Eliho hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ataonao va fa marina ny nitenenanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marina noho Andriamanitra aho?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy ianao: Mampaninona anao moa izany?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no soa azoko amin’ny tsy hanotako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izaho no hiteny hamaly ny teninao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny an’ny namanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Diniho ny lanitra ka jereo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tsinjovy ny haavon’ny rahona: Tsy takatrao izany!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha manota ianao, moa mahefa inona Aminy izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha mihamaro ny fahotanao, mampaninona Azy moa izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha marina ianao, hahazoany inona moa izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary inona no horaisiny avy amin’ny tananao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Amin’ny olona tahaka anao ihany no mihatra ny ratsy ataonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny olombelona ihany no mihatra ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho ny haben’ny fampahoriana dia mitaraina ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, minananana izy noho ny hetraketraka ataon’ny maro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'nefa tsy misy miteny hoe: Aiza Andriamanitra, Mpanao ahy, izay mahatonga hira fiderana amin’ny alina,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: izay manome fahalalana antsika mihoatra noho ny an’ny biby ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay manome fahendrena antsika mihoatra noho ny an’ny voromanidina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, mitaraina mafy ireo nefa tsy mamaly Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fireharehan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fitarainana tsy amin’antony dia tsy mba henoin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Tsitoha dia tsy mandinika izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Na dia lazainao aza fa tsy mahita Azy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa tonga eo anatrehany ny ady, koa tsy maintsy miandry Azy ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa raha saingy tsy mihatra ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moa tsy fantany tsara koa va ny fihaikana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Miloa-bava foana anefa i Joba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manao teny maro tsy amim-pahalalana.
