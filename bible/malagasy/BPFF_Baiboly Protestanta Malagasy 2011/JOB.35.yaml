document_id: JOB.35,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy misy mitombina izay lazain’i Joba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary mbola niteny ihany i Eliho hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'nefa tsy misy miteny hoe: Aiza Andriamanitra, Mpanao ahy, izay mahatonga hira fiderana amin’ny alina,'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: izay manome fahalalana antsika mihoatra noho ny an’ny biby ambonin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay manome fahendrena antsika mihoatra noho ny an’ny voromanidina?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Eny, mitaraina mafy ireo nefa tsy mamaly Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fireharehan’ny ratsy fanahy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fitarainana tsy amin’antony dia tsy mba henoin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny Tsitoha dia tsy mandinika izany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Na dia lazainao aza fa tsy mahita Azy ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa tonga eo anatrehany ny ady, koa tsy maintsy miandry Azy ianao!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Koa raha saingy tsy mihatra ny fahatezerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa tsy fantany tsara koa va ny fihaikana?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Miloa-bava foana anefa i Joba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manao teny maro tsy amim-pahalalana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ataonao va fa marina ny nitenenanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina noho Andriamanitra aho?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa hoy ianao: Mampaninona anao moa izany?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no soa azoko amin’ny tsy hanotako?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izaho no hiteny hamaly ny teninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny an’ny namanao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Diniho ny lanitra ka jereo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tsinjovy ny haavon’ny rahona: Tsy takatrao izany!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Raha manota ianao, moa mahefa inona Aminy izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha mihamaro ny fahotanao, mampaninona Azy moa izany?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha marina ianao, hahazoany inona moa izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary inona no horaisiny avy amin’ny tananao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Amin’ny olona tahaka anao ihany no mihatra ny ratsy ataonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny olombelona ihany no mihatra ny fahamarinanao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Noho ny haben’ny fampahoriana dia mitaraina ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, minananana izy noho ny hetraketraka ataon’ny maro;
