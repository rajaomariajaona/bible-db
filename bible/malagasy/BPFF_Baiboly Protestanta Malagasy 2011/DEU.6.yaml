document_id: DEU.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tiava NY TOMPO, Andriamanitrao
  - type: text
    content: 'Ary izao ny lalàna, dia ny didy sy ny fitsipika, izay nandidian’NY TOMPO Andriamanitrareo hampianarina anareo mba harahinareo any amin’ny tany izay alehanareo holovana, '
  '10':
  - type: text
    content: 'Rehefa entin’NY TOMPO Andriamanitrao ho any amin’ny tany izay nianianany tamin’i Abrahama sy Isaka ary i Jakoba razanao homena anao ianao, dia tany misy tanàna lehibe sady tsara izay tsy nataonao, '
  '11':
  - type: text
    content: 'trano feno zava-tsoa rehetra izay tsy ianao no nahafeno azy; lavaka famorian-drano nohadiana eo amin’ny vato izay tsy nolavahanao; tany voavoly voaloboka sy hazo oliva izay tsy nambolenao; ary rehefa mihinana ianao ka voky '
  '12':
  - type: text
    content: 'dia mitandrema fandrao hadinonao NY TOMPO izay nitondra anao nivoaka avy tany amin’ny tany Ejipta, tany amin’ny trano nanandevozana. '
  '13':
  - type: text
    content: 'Matahora NY TOMPO Andriamanitrao ianao ka manompoa Azy ary aoka ny anarany no hianiananao. '
  '14':
  - type: text
    content: 'Aza manaraka izay andriamanitra hafa amin’ireny andriamanitry ny firenena manodidina anareo ireny '
  '15':
  - type: text
    content: 'fa Andriamanitra saro-piaro aminao NY TOMPO Andriamanitrao, fandrao hirehitra aminao ny fahatezeran’NY TOMPO Andriamanitrao ka hofongorany tsy ho eo ambonin’ny tany ianao. '
  '16':
  - type: text
    content: 'Aza maka fanahy NY TOMPO Andriamanitrareo ianareo, tahaka ilay nakanareo fanahy Azy tao Masa. '
  '17':
  - type: text
    content: 'Tandremo tsara ny didin’NY TOMPO Andriamanitrareo sy ny teny vavolombelony ary ny lalànany, izay efa nomeny anao. '
  '18':
  - type: text
    content: 'Ataovy izay mahitsy sady tsara eo imason’NY TOMPO mba hahita soa ianao ka hiditra handova ny tany soa izay nianianan’NY TOMPO tamin’ny razanao homena azy, '
  '19':
  - type: text
    content: sady mba horoahiny tsy ho eo anoloanao ny fahavalonao rehetra, araka izay nolazain’NY TOMPO.
  '2':
  - type: text
    content: 'mba hatahoranao NY TOMPO Andriamanitrao, hitandremanao ny lalànany rehetra sy ny didiny izay omeko anao, dia ianao sy ny zanakao ary ny zafinao, amin’ny andro rehetra hiainanao, mba ho maro andro ianao. '
  '20':
  - type: text
    content: 'Raha manontany anao ny zanakao amin’ny andro ho avy hoe: Manao ahoana moa ny teny vavolombelona sy ny didy ary ny fitsipika, izay nandidian’NY TOMPO Andriamanitsika hotandremanareo? '
  '21':
  - type: text
    content: 'Dia holazainao aminy hoe: Andevon’i Farao tany Ejipta isika ary tanana mahery no nitondran’NY TOMPO antsika niala avy tany Ejipta. '
  '22':
  - type: text
    content: 'Ary NY TOMPO nanao famantarana sy fahagagana lehibe sady mandoza tamin’ny Ejiptiana sy i Farao ary ny ankohonany rehetra teo imasontsika. '
  '23':
  - type: text
    content: 'Dia nitondra antsika niala avy tany Izy mba hahafahany mampiditra antsika sy manome antsika ny tany izay nianianany tamin’ny razantsika homena azy. '
  '24':
  - type: text
    content: 'Ary NY TOMPO nandidy antsika mba hanaraka ireo didy rehetra ireo sy hatahotra NY TOMPO Andriamanitsika mba hahita soa mandrakariva isika ary ho velona tahaka ny amin’izao anio izao. '
  '25':
  - type: text
    content: Ho fahamarinantsika ny mitandrina hanaraka izany didy rehetra izany eo anatrehan’NY TOMPO Andriamanitsika, araka izay nandidiany antsika.
  '3':
  - type: text
    content: Koa mihainoa, ry Israely, ary mitandrema amin’ny fanarahana izany, mba hahita soa ianao ka hitombo indrindra, araka izay nolazain’NY TOMPO, Andriamanitry ny razanao taminao, rahatrizay any amin’ny tany tondra-dronono sy tantely.
  '4':
  - type: text
    content: 'Mihainoa ry Israely: NY TOMPO Andriamanitsika dia TOMPO iray ihany. '
  '5':
  - type: text
    content: 'Koa tiava NY TOMPO Andriamanitrao amin’ny fonao manontolo sy ny fanahinao manontolo ary ny herinao manontolo. '
  '6':
  - type: text
    content: 'Aoka ho ao am-ponao izao didy omeko anao anio izao, '
  '7':
  - type: text
    content: 'ary ampianaro tsara ny zanakao izany ka resaho aminy mandrakariva na mipetraka ao an-tranonao ianao, na mandeha eny an-dalana, na mandry, na mifoha; '
  '8':
  - type: text
    content: 'ary fehezo ho famantarana eo amin’ny tananao ireny, ary aoka ho fehy fampahatsiarovana eo ambonin’ny handrinao, '
  '9':
  - type: text
    content: ary soraty eo amin’ny tolam-baravaran’ny tranonao sy eo amin’ny vavahadinao.
  - type: heading
    content: Tsy mahazo manadino an’Andriamanitra ny Israely
