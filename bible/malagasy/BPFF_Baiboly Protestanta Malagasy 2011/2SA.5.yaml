document_id: 2SA.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tonga mpanjakan’ny Israely i Davida
  - type: heading
    content: 1Tan 11.1-9
  - type: text
    content: 'Tonga tao amin’i Davida tao Hebrona ny firenen’Israely rehetra ka niteny hoe: Indreto izahay, fa taolanao sy nofonao. '
  '10':
  - type: text
    content: Dia nandroso nisandratra i Davida, satria NY TOMPO, Andriamanitra Tompon’izao rehetra izao, no nomba azy.
  - type: heading
    content: 1Tan 14.1-2
  '11':
  - type: text
    content: 'Nandefa iraka tany amin’i Davida Hirama, mpanjakan’i Tiro, ka nampanatitra hazo sedera ary nandefa mpandrafitra sy tambato; dia nanorina trano ho an’i Davida ireo. '
  '12':
  - type: text
    content: Dia fantatr’i Davida fa NY TOMPO no nampitoetra azy ho mpanjakan’ny Israely ka nanandratra ny fanjakany noho ny amin’ny Israely olony.
  - type: heading
    content: Ireo zanakalahy naterak’i Davida tany Jerosalema
  - type: heading
    content: 1Tan 3.5-9; 14.3-7
  '13':
  - type: text
    content: 'Mbola naka vady tsindrano sy vady hafa tany Jerosalema koa i Davida rehefa tonga avy tany Hebrona; ary nisy zanakalahy sy zanakavavy koa naterak’i Davida. '
  '14':
  - type: text
    content: 'Izao no anaran’ny naterany tany Jerosalema: Samoa, Sobaba, Natana, Solomona, '
  '15':
  - type: text
    content: 'Jibara, Elisoa, Nafega, Jafia, '
  '16':
  - type: text
    content: Elisama, Eliada ary Elifeleta.
  - type: heading
    content: Ny nandresen’i Davida ny Filistina
  - type: heading
    content: 1Tan 14.8-16
  '17':
  - type: text
    content: 'Nony ren’ny Filistina fa efa nohosoran’ny olona ho mpanjakan’ny Israely i Davida dia niakatra hitady azy ny Filistina rehetra. Rehefa ren’i Davida anefa izany dia nidina tao amin’ny manda fiarovana izy. '
  '18':
  - type: text
    content: 'Dia tonga ny Filistina ka nihahakahaka teny amin’ny Lohasahan’ny Refaìta. '
  '19':
  - type: text
    content: 'Nanontany NY TOMPO i Davida hoe: Hiakatra hamely ny Filistina va aho? Hatolotrao eo an-tanako va izy? Dia hoy NY TOMPO tamin’i Davida: Miakara, fa hatolotro eo an-tananao tokoa ny Filistina. '
  '2':
  - type: text
    content: 'Fa hatry ny fahiny koa aza, raha mbola nanjaka taminay i Saoly dia ianao no efa mpitarika ny Israely nandeha niady sy niverina avy any; ary NY TOMPO efa nilaza taminao hoe: Ianao no ho mpiandry ny Israely oloko, ianao no ho mpanapaka azy. '
  '20':
  - type: text
    content: Ary tonga tao Baala-Perazima
  - type: note
    content: 'Baala-Perazima: Tany nahavakiana.'
  - type: text
    content: ' i Davida ka namely ireo tao; dia hoy izy: NY TOMPO efa namaky ny fahavaloko teo anoloako hipariaka toy ny rano vaky, koa izany no nanaovany ny anaran’izany tany izany hoe Baala-Perazima. '
  '21':
  - type: text
    content: Nilaozan’izy ireo tao ny sampiny ka lasan’i Davida sy ny olony.
  '22':
  - type: text
    content: 'Niakatra indray ny Filistina ka nihahakahaka teny amin’ny lohasahan’ny Refaìta. '
  '23':
  - type: text
    content: 'Ary nanontany NY TOMPO i Davida ka novaliny hoe: Aza mandeha; fa hodidino avy eo aoriana izy ka ho tonga eo aminy tandrifin’ny hazo balisama ianao. '
  '24':
  - type: text
    content: 'Ary raha mahare fingadongadon’ny olona eny amin’ny tendron’ny hazo balisama ianao dia haingàna; fa amin’izay no efa miainga mialoha anao NY TOMPO hamely ny miaramilan’ny Filistina. '
  '25':
  - type: text
    content: Dia nanatanteraka araka ny nandidian’NY TOMPO azy i Davida ka namely ny Filistina hatrany Geba ka hatrany akaikin’i Gezera.
  '3':
  - type: text
    content: Eny, tonga tao amin’ny mpanjaka tao Hebrona ny loholon’ny Israely rehetra ary nanao fanekena taminy tao Hebrona teo anatrehan’NY TOMPO i Davida mpanjaka. Dia nanosotra an’i Davida ho mpanjakan’ny Israely izy ireo.
  '4':
  - type: text
    content: 'Telopolo taona i Davida fony izy nanomboka nanjaka, ary efapolo taona no nanjakany. '
  '5':
  - type: text
    content: 'Tao Hebrona no nanjakany tamin’ny Joda nandritra ny fito taona sy enim-bolana; ary tany Jerosalema no nanjakany tamin’ny Israely sy ny '
  - type: text
    content: Joda
  - type: text
    content: ' rehetra nandritra ny telo amby telopolo taona.'
  - type: heading
    content: Ny namaboan’i Davida an’i Jerosalema
  '6':
  - type: text
    content: 'Nankany Jerosalema hiady amin’ny Jebosita tompon-tany ny mpanjaka sy ny olony, ary hoy ireo tompon-tany tamin’i Davida: Tsy ho tafiditra ato ianao; fa na dia ny jamba sy ny mandringa aza dia hahasakana anao; ny heviny tamin’izany dia toy ny hoe: Tsy ho tafiditra ato i Davida. '
  '7':
  - type: text
    content: 'Kanjo azon’i Davida ihany ny manda fiarovana, dia i '
  - type: text
    content: Ziona
  - type: text
    content: ', Tanànan’i Davida izany. '
  '8':
  - type: text
    content: 'Ary hoy i Davida tamin’io andro io: Izay mamely ny Jebosita dia aoka hananika ny lalan-drano ka hamely ny mandringa sy ny jamba izay halan’ny fon’i Davida. Izany no nahatonga ny fitenenana hoe: Izay jamba sy mandringa tsy hiditra ao amin’ny Trano. '
  '9':
  - type: text
    content: 'Dia nitoetra tao anatin’ny manda fiarovana i Davida ka ny anarany nataony hoe Tanànan’i Davida. Ary narafitr’i Davida ny manodidina, hatrany Milo, mbamin’ny ao anatiny. '
