document_id: 2SA.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga mpanjakan’ny Israely i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 11.1-9
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tao amin’i Davida tao Hebrona ny firenen’Israely rehetra ka niteny hoe: Indreto izahay, fa taolanao sy nofonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hatry ny fahiny koa aza, raha mbola nanjaka taminay i Saoly dia ianao no efa mpitarika ny Israely nandeha niady sy niverina avy any; ary NY TOMPO efa nilaza taminao hoe: Ianao no ho mpiandry ny Israely oloko, ianao no ho mpanapaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, tonga tao amin’ny mpanjaka tao Hebrona ny loholon’ny Israely rehetra ary nanao fanekena taminy tao Hebrona teo anatrehan’NY TOMPO i Davida mpanjaka. Dia nanosotra an’i Davida ho mpanjakan’ny Israely izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Telopolo taona i Davida fony izy nanomboka nanjaka, ary efapolo taona no nanjakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tao Hebrona no nanjakany tamin’ny Joda nandritra ny fito taona sy enim-bolana; ary tany Jerosalema no nanjakany tamin’ny Israely sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' rehetra nandritra ny telo amby telopolo taona.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namaboan’i Davida an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nankany Jerosalema hiady amin’ny Jebosita tompon-tany ny mpanjaka sy ny olony, ary hoy ireo tompon-tany tamin’i Davida: Tsy ho tafiditra ato ianao; fa na dia ny jamba sy ny mandringa aza dia hahasakana anao; ny heviny tamin’izany dia toy ny hoe: Tsy ho tafiditra ato i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Kanjo azon’i Davida ihany ny manda fiarovana, dia i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ', Tanànan’i Davida izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy i Davida tamin’io andro io: Izay mamely ny Jebosita dia aoka hananika ny lalan-drano ka hamely ny mandringa sy ny jamba izay halan’ny fon’i Davida. Izany no nahatonga ny fitenenana hoe: Izay jamba sy mandringa tsy hiditra ao amin’ny Trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nitoetra tao anatin’ny manda fiarovana i Davida ka ny anarany nataony hoe Tanànan’i Davida. Ary narafitr’i Davida ny manodidina, hatrany Milo, mbamin’ny ao anatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nandroso nisandratra i Davida, satria NY TOMPO, Andriamanitra Tompon’izao rehetra izao, no nomba azy.
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 14.1-2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nandefa iraka tany amin’i Davida Hirama, mpanjakan’i Tiro, ka nampanatitra hazo sedera ary nandefa mpandrafitra sy tambato; dia nanorina trano ho an’i Davida ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia fantatr’i Davida fa NY TOMPO no nampitoetra azy ho mpanjakan’ny Israely ka nanandratra ny fanjakany noho ny amin’ny Israely olony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo zanakalahy naterak’i Davida tany Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 3.5-9; 14.3-7
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mbola naka vady tsindrano sy vady hafa tany Jerosalema koa i Davida rehefa tonga avy tany Hebrona; ary nisy zanakalahy sy zanakavavy koa naterak’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no anaran’ny naterany tany Jerosalema: Samoa, Sobaba, Natana, Solomona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jibara, Elisoa, Nafega, Jafia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elisama, Eliada ary Elifeleta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandresen’i Davida ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 14.8-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nony ren’ny Filistina fa efa nohosoran’ny olona ho mpanjakan’ny Israely i Davida dia niakatra hitady azy ny Filistina rehetra. Rehefa ren’i Davida anefa izany dia nidina tao amin’ny manda fiarovana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia tonga ny Filistina ka nihahakahaka teny amin’ny Lohasahan’ny Refaìta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nanontany NY TOMPO i Davida hoe: Hiakatra hamely ny Filistina va aho? Hatolotrao eo an-tanako va izy? Dia hoy NY TOMPO tamin’i Davida: Miakara, fa hatolotro eo an-tananao tokoa ny Filistina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary tonga tao Baala-Perazima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Baala-Perazima: Tany nahavakiana.'
    marker-yv: yv-n
  - type: text
    text: ' i Davida ka namely ireo tao; dia hoy izy: NY TOMPO efa namaky ny fahavaloko teo anoloako hipariaka toy ny rano vaky, koa izany no nanaovany ny anaran’izany tany izany hoe Baala-Perazima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nilaozan’izy ireo tao ny sampiny ka lasan’i Davida sy ny olony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Niakatra indray ny Filistina ka nihahakahaka teny amin’ny lohasahan’ny Refaìta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nanontany NY TOMPO i Davida ka novaliny hoe: Aza mandeha; fa hodidino avy eo aoriana izy ka ho tonga eo aminy tandrifin’ny hazo balisama ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary raha mahare fingadongadon’ny olona eny amin’ny tendron’ny hazo balisama ianao dia haingàna; fa amin’izay no efa miainga mialoha anao NY TOMPO hamely ny miaramilan’ny Filistina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia nanatanteraka araka ny nandidian’NY TOMPO azy i Davida ka namely ny Filistina hatrany Geba ka hatrany akaikin’i Gezera.
