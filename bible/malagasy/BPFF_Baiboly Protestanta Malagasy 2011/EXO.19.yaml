document_id: EXO.19
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: MANAO FANEKENA AMIN’NY ZANAK’ISRAELY ANDRIAMANITRA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manolotra fanekena amin’ny Israely Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny volana fahatelo taorianan’ny nialan’ny Zanak’Israely tany amin’ny tany Ejipta, tamin’izany fotoana izany indrindra, no nahatongavany tany amin’ny tany efitr’i Sinay. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rehefa nifindra niala tao Refidima izy ka tonga tany amin’ny tany efitr’i Sinay dia nitoby teo amin’ny tany efitra; nitoby teo, tandrifin’ny tendrombohitra ny Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary niakatra ho ao amin’Andriamanitra i Mosesy, dia niantso azy avy tao an-tendrombohitra NY TOMPO ka niteny hoe: Izao no holazainao amin’ny taranak’i Jakoba sy hambaranao amin’ny Zanak’Israely: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ianareo dia efa nahita izay nataoko tamin’ny Ejiptiana sy izay nitondrako anareo tamin’ny elatry ny voromahery ary ny nitondrako anareo ho atỳ Amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ankehitriny, raha hihaino ny feoko tokoa ianareo ka hitandrina ny fanekeko, dia ho fananako sarobidy indrindra mihoatra noho ny firenena rehetra ianareo; fa Ahy ny tany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia ho fanjaka-mpisorona sy ho firenena masina ho Ahy ianareo. Ireo teny ireo no holazainao amin’ny Zanak’Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nandeha i Mosesy ka nampiantso ny loholon’ny vahoaka, ary nalahany teo anatrehany ireo teny rehetra ireo, izay nandidian’NY TOMPO azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia indray miredona namaly ny olona rehetra ka niteny hoe: Izay teny rehetra nolazain’NY TOMPO dia hotanterahinay. Ary noentin’i Mosesy tany amin’NY TOMPO kosa ny tenin’ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy indray NY TOMPO tamin’i Mosesy: Indro, hankeo aminao ao anatin’ny rahona maizina Aho, mba ho ren’ny olona Aho raha miteny aminao ka hino anao mandrakariva izy.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nambaran’i Mosesy tamin’NY TOMPO ny tenin’ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mihaona amin’i Mosesy ao an-tendrombohitra Sinay Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Mosesy: Mandehana ho eny amin’ny olona ka manamasìna azy anio sy ampitso, ary ampanasao ny fitafiany izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aoka samy hiomana ho amin’ny andro fahatelo izy, fa amin’ny andro fahatelo no hidinan’NY TOMPO ho eo imason’ny olona rehetra eo an-tampon’ny tendrombohitra Sinay. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hanisy fefy manodidina ho an’ny olona ianao ka hiteny hoe: Mitandrema ianareo mba tsy hiakatra ao an-tendrombohitra na hikasika ny sisiny akory aza. Fa na iza na iza mikasika ny tendrombohitra dia hovonoina ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy hisy tanana hikasika azy fa hotoraham-bato tokoa, na hotifirina tsipìka tokoa, na biby na olona, ary tsy mba hovelomina. Rehefa manao feo lavareny ny anjomara, vao hiakatra ho ao an-tendrombohitra ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nidina avy tao an-tendrombohitra i Mosesy ka nankeny amin’ny olona; ary nanamasina azy izy ka samy nanasa ny fitafiany ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy koa izy tamin’ny olona: Miomàna ianareo ho amin’ny andro fahatelo; aza manakaiky vehivavy akory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’ny marainan’ny andro fahatelo dia nisy kotrokorana sy tselatra ary rahona matevina teo amin’ny tendrombohitra; nisy koa feon’anjomara mafy dia mafy ka toran-kovitra ny olona rehetra izay teo amin’ny toby. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nitondra ny olona niainga avy teo an-toby i Mosesy mba hihaona amin’Andriamanitra; nijanona teo am-pototry ny tendrombohitra izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny tendrombohitra Sinay manontolo dia nivoa-tsetroka satria NY TOMPO nidina teo amboniny tao anaty afo; niakatra tahaka ny setroky ny lafaoro lehibe ny setroka, ary nihorohoro mafy ny tendrombohitra Sinay manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nihamafy hatrany ny feon’ny anjomara sady nitatatata. Dia niteny i Mosesy ary Andriamanitra namaly azy tao anatin’ny kotroka. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nidina nankeo an-tendrombohitra Sinay, teo an-tampon’ny tendrombohitra NY TOMPO; ary niantso an’i Mosesy hankeo an-tampon’ny tendrombohitra NY TOMPO, dia niakatra i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Mosesy: Midìna dia ampitandremo ny olona, fandrao hisisika hankao amin’NY TOMPO izy mba hijery ka ho betsaka ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary aoka koa ny mpisorona izay manakaiky NY TOMPO hanamasina ny tenany, fandrao hamely azy tampoka NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy i Mosesy tamin’NY TOMPO: Tsy afaka miakatra ho eto amin’ny tendrombohitra Sinay ny olona, fa Ianao nandidy anay hoe: Fefeo ny tendrombohitra ka hamasino. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy NY TOMPO taminy: Mandehana midina; avy eo dia miakara ianao ka ento miaraka aminao i Arona; fa ny mpisorona sy ny olona kosa dia aza avela hisisika hiakatra ho ao amin’NY TOMPO, fandrao handringana azy ireo Izy! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nidina nankeny amin’ny olona i Mosesy ka niteny taminy.
