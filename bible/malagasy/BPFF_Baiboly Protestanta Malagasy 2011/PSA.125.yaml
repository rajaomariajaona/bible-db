document_id: PSA.125,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Izay matoky NY TOMPO
  - type: text
    content: Hira fanao amin’ny fiakarana.
  - type: text
    content: Izay matoky NY TOMPO
  - type: text
    content: 'dia tahaka ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: izay tsy mihetsika fa mitoetra mandrakizay.
  '2':
  - type: text
    content: Tahaka ny tendrombohitra manodidina an’i Jerosalema
  - type: text
    content: no anodidinan’NY TOMPO ny olony
  - type: text
    content: hatramin’izao ka ho mandrakizay.
  '3':
  - type: text
    content: Fa tsy hitoetra eo amin’ny anjaran’ny marina ny tehim-panjakan’ny ratsy fanahy,
  - type: text
    content: fandrao hanainga ny tanany hanendry zava-dratsy ny marina.
  '4':
  - type: text
    content: TOMPO ô, manaova soa amin’ny tsara
  - type: text
    content: sy ny mahitsy fo.
  '5':
  - type: text
    content: Fa izay mivily ho amin’ny sakeli-dalana mivilivily
  - type: text
    content: dia horoahin’NY TOMPO
  - type: text
    content: miaraka amin’ny mpanao ratsy!
  - type: text
    content: Fiadanana anie ho amin’ny Israely.
