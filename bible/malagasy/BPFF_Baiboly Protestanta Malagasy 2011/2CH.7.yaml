document_id: 2CH.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo fanatitra ho an’NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vitan’i Solomona izany vavaka izany dia nisy afo nilatsaka avy tany an-danitra ka nandevona ny fanatitra dorana manontolo sy ny fanatitra hafa alatsa-dra; dia feno ny voninahitry NY TOMPO ny Trano. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny andro fahatelo amby roapolo tamin’ny volana fahafito dia nampodiny ho any an-dainy avy ny olona, ary faly sy ravoravo izy noho ny soa nataon’NY TOMPO tamin’i Davida sy i Solomona ary ny Israely olony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miseho fanindroany amin’i Solomona NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Mpa 9.1-9
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izany no nahavitan’i Solomona ny tranon’NY TOMPO sy ny lapan’andriana, ary samy nataon’i Solomona lavorary avokoa izay rehetra efa nokasainy hatao tao amin’ny tranon’NY TOMPO sy tao an-dapany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony alina dia niseho tamin’i Solomona NY TOMPO ka niteny taminy hoe: Efa reko ny vavaka nataonao, ary efa nofidiko ho Ahy ity toerana ity ho trano fanolorana fanatitra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa indro, raha mampihantona ny andro Aho ka tsy misy ranonorana latsaka, na asaiko mandany ny tany ny valala, na andefasako areti-mandringana ny oloko, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha ny oloko izay nantsoina amin’ny anarako no ho avy hanetry tena ka hivavaka sy hitady ny tavako ary hiala amin’ny ratsy fanaony, dia hihaino any an-danitra Aho ka hamela ny helony ary hahasitrana ny taniny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao dia hihiratra ny masoko, ary ny sofiko dia hihaino ny vavaka izay atao amin’ity toerana ity; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa efa nofidiko sy nohamasiniko ity trano ity mba hitoeran’ny anarako mandrakizay, ary ny masoko sy ny foko dia ho ao mandrakariva. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny aminao, raha mandeha eo anatrehako tahaka ny nandehanan’i Davida rainao ianao ka hanatanteraka izay andidiako anao sy hitandrina ny didiko sy ny fitsipiko, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hampitoeriko ny sezafiandrianan’ny fanjakanao, araka ny fanekeko tamin’i Davida rainao hoe: Tsy ho diso zanakalahy ho mpitondra amin’ny Israely ianao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mivily kosa ianareo ka mahafoy ny didiko sy ny lalànako, izay nataoko teo anoloanareo, ka mandeha manompo andriamanitra hafa sy miankohoka eo anatrehany, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nahazo niditra tao amin’ny tranon’NY TOMPO ny mpisorona satria feno ny voninahitry NY TOMPO ny tranon’NY TOMPO. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hongotako amin’ny tany izay nomeko anareo ianareo; ary hofongorako tsy ho eo imasoko ity trano nohamasiniko ho an’ny anarako ity sady hataoko ho fiteny sy ho faneso any amin’ny firenena rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na dia avo aza ity trano ity dia ho fitalanjonan’izay rehetra mandalo azy ka hatao hoe: Naninona re no dia nataon’NY TOMPO toy izao ity tany sy ity trano ity? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hisy hamaly hoe: Satria nahafoy NY TOMPO, Andriamanitry ny razany, izay nitondra azy nivoaka avy tany amin’ny tany Ejipta ny olona ka nifikitra tamin’ny andriamanitra hafa sady niankohoka teo anatrehany sy nanompo azy, koa izany no nampidirany izao loza rehetra izao taminy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony hitan’ny Zanak’Israely rehetra ny nilatsahan’ny afo sy ny voninahitry NY TOMPO teo ambonin’ny Trano dia niankohoka tamin’ny lampivato izy ka nivavaka sy nidera NY TOMPO fa tsara Izy, fa mandrakizay ny famindrampony.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Mpa 8.62-66
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjaka sy ny vahoaka rehetra dia namono zavatra hatao fanatitra teo anatrehan’NY TOMPO. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namono zavatra hatao fanatitra koa i Solomona mpanjaka, dia omby roa arivo sy roa alina, ondry aman’osy roa alina sy iray hetsy. Toy izany no nitokanan’ny mpanjaka sy ny vahoaka rehetra ny tranon’Andriamanitra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy nitsangana hanao ny anjara raharahany avy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' sy ny levita izay nanana ny zavamanenon’NY TOMPO, izay nataon’i Davida mpanjaka hiderana NY TOMPO, fa mandrakizay ny famindrampony, raha nasain’i Davida nidera an’Andriamanitra izy; ary nitsoka ny trompetra teo anoloany ny mpisorona, ary ny Israely rehetra dia nitsangana teo.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanamasina ny afovoan’ny kianja izay teo anoloan’ny tranon’NY TOMPO i Solomona; fa tao no nanolorany ny fanatitra dorana manontolo sy ny saboran’ny fanati-pihavanana; fa ny alitara varahina izay nataon’i Solomona dia tsy omby ny fanatitra dorana manontolo sy ny fanatitra avy amin’ny zavamaniry ary ny sabora.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany i Solomona sy ny Israely rehetra teo aminy, izay fiangonana lehibe hatrany akaiky an’i Hamata ka hatrany amin’ny lohasahan-driakan’i Ejipta, dia nitandrina ny andro firavoravoana hafitoana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro fahavalo dia nanao fivoriana lehibe famaranana izy; fa hafitoana no nitandremany ny fitokanana ny alitara, ary hafitoana koa ny andro firavoravoana. '
