document_id: ISA.60,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voninahitry NY TOMPO amin’i Jerosalema
  - type: text
    content: Mitsangàna, mihazavà, fa tonga ny fahazavanao,
  - type: text
    content: ary ny voninahitry NY TOMPO no efa miposaka aminao.
  '10':
  - type: text
    content: Ny hafa firenena no hanangana ny mandanao,
  - type: text
    content: ary ny mpanjakany no hanompo anao;
  - type: text
    content: fa tamin’ny fahatezerako no namelezako anao,
  - type: text
    content: nefa amin’ny fitiavako kosa no amindrako fo aminao.
  '11':
  - type: text
    content: Hidanadana mandrakariva ny vavahadinao,
  - type: text
    content: tsy hirindrina izy na andro na alina,
  - type: text
    content: mba hampidirana ho ao aminao
  - type: text
    content: ny harenan’ny firenena
  - type: text
    content: sy ny mpanjakany izay voababo.
  '12':
  - type: text
    content: Fa ho levona izay firenena sy fanjakana tsy hanompo anao;
  - type: text
    content: eny, hofongorana ireny firenena ireny.
  '13':
  - type: text
    content: Ho tonga aminao ny voninahitr’i Libanona,
  - type: text
    content: ny hazo kipreso sy ny hazo kesika ary ny kirihitra koa
  - type: text
    content: dia handravahana ny fitoerako masina,
  - type: text
    content: ary hasiako voninahitra ny fitoeran-tongotro.
  '14':
  - type: text
    content: Ny zanak’izay nampahory anao dia handeha hiondrika eo anatrehanao
  - type: text
    content: ary hiankohoka amin’ny faladianao izay rehetra nanamavo anao.
  - type: text
    content: Ary hiantso anao izy hoe Tanànan’NY TOMPO,
  - type: text
    content: Zionan’ny Iray Masin’ny Israely.
  '15':
  - type: text
    content: Ho solon’ny nahafoizana anao sy ny nankahalana anao
  - type: text
    content: ary ny tsy nandehanan’olona namakivaky anao,
  - type: text
    content: dia hasandratro ho rehareha mandrakizay ianao;
  - type: text
    content: eny, ho fifaliana hatramin’ny taranaka fara aman-dimby.
  '16':
  - type: text
    content: 'Hinono amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ianao'
  - type: text
    content: sady hinono amin’ny mpanjaka;
  - type: text
    content: dia ho fantatrao fa Izaho TOMPO no Mpamonjy anao,
  - type: text
    content: ary Ilay Maherin’i Jakoba no Mpanavotra anao.
  '17':
  - type: text
    content: Hahatonga volamena Aho ho solon’ny varahina,
  - type: text
    content: ary hahatonga volafotsy ho solon’ny vy;
  - type: text
    content: varahina ho solon’ny hazo,
  - type: text
    content: ary vy ho solon’ny vato;
  - type: text
    content: ny fiadanana no hataoko mpanapaka anao,
  - type: text
    content: ary ny fahamarinana no ho mpampiasa anao.
  '18':
  - type: text
    content: Tsy ho re eo amin’ny taninao intsony ny fampahoriana,
  - type: text
    content: na ny fandravana sy ny fandringanana ao amin’ny faritry ny taninao;
  - type: text
    content: ny mandanao dia hataonao hoe Famonjena,
  - type: text
    content: ary ny vavahadinao dia hataonao hoe Fiderana.
  '19':
  - type: text
    content: Tsy ny masoandro intsony no ho fanazavana anao amin’ny andro,
  - type: text
    content: ary tsy ny fangarangaran’ny volana no hanazava anao;
  - type: text
    content: fa NY TOMPO no ho fanazavana anao mandrakizay,
  - type: text
    content: ary Andriamanitrao no ho voninahitrao.
  '2':
  - type: text
    content: Fa indro, manarona ny tany ny haizina,
  - type: text
    content: ary manarona ny firenena ny haizim-pito;
  - type: text
    content: fa aminao kosa no iposahan’NY TOMPO,
  - type: text
    content: ary aminao no isehoan’ny voninahiny.
  '20':
  - type: text
    content: Tsy hilentika intsony ny masoandronao,
  - type: text
    content: ary tsy hisoka ny volanao;
  - type: text
    content: fa NY TOMPO no ho fanazavana anao mandrakizay.
  - type: text
    content: Ho tapitra ny andron’ny falahelovanao.
  '21':
  - type: text
    content: Ho marina avokoa ny olonao rehetra,
  - type: text
    content: hanana ny tany ho mandrakizay izy;
  - type: text
    content: eny, ho voly maitso eo amin’ny sahako,
  - type: text
    content: asan’ny tanako
  - type: text
    content: ho fampisehoana ny voninahitro.
  '22':
  - type: text
    content: Ny kely dia ho tonga arivo,
  - type: text
    content: ary ny malemy dia ho tonga firenena matanjaka;
  - type: text
    content: Izaho TOMPO no hanafaingana izany amin’ny fotoanany.
  '3':
  - type: text
    content: Manatona ny fahazavanao ny firenena maro
  - type: text
    content: ary mankeo amin’ny famirapiratan’ny fiposahanao ny mpanjaka.
  - type: heading
    content: Manintona ny mponina rehetra amin’izao tontolo izao i Jerosalema
  '4':
  - type: text
    content: 'Atopazy manodidina ny masonao ka jereo:'
  - type: text
    content: Izy rehetra dia mivory
  - type: text
    content: ka mankaty aminao;
  - type: text
    content: ny zanakao lahy dia tonga avy lavitra,
  - type: text
    content: ny zanakao vavy dia sakelehina.
  '5':
  - type: text
    content: Hahita izany ianao ka ho miramirana,
  - type: text
    content: dia hiemponempona sady hohalehibiazina ny fonao,
  - type: text
    content: fa hoentina ho anao ny harenan’ny ranomasina
  - type: text
    content: ary hafindra ho anao ny fananan’ny firenena.
  '6':
  - type: text
    content: Ho feno rameva betsaka ao aminao,
  - type: text
    content: dia rameva tanora avy any Midiana sy Efaha;
  - type: text
    content: samy avy any Seba izy rehetra;
  - type: text
    content: volamena sy ditin-kazo manitra no hoentiny,
  - type: text
    content: ary ny fiderana NY TOMPO no teny mahafaly hambarany.
  '7':
  - type: text
    content: Ny ondry aman’osy rehetra avy any Kedara dia hangonina ao aminao,
  - type: text
    content: ary ny ondrilahin’i Nebaiota no hampiasainao;
  - type: text
    content: hatao fanatitra eo ambonin’ny alitarako ireo dia hankasitrahana,
  - type: text
    content: ary hataoko mamirapiratra ny tranon’ny voninahitro.
  '8':
  - type: text
    content: Iza moa ireto manidina tahaka ny rahona
  - type: text
    content: sy tahaka ny voromailala ho amin’ny varavarankeliny?
  '9':
  - type: text
    content: Fa Izaho no andrasan’ny nosy,
  - type: text
    content: ary ny sambon’i Tarsisy no hialoha lalana
  - type: text
    content: hitondra ny zanakao avy lavitra
  - type: text
    content: mbamin’ny volafotsiny sy ny volamenany,
  - type: text
    content: ho an’ny anaran’NY TOMPO Andriamanitrao
  - type: text
    content: sy ho an’ny Iray Masin’ny Israely, satria manome voninahitra anao Izy.
