document_id: ISA.60,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny voninahitry NY TOMPO amin’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mitsangàna, mihazavà, fa tonga ny fahazavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny voninahitry NY TOMPO no efa miposaka aminao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny hafa firenena no hanangana ny mandanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanjakany no hanompo anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tamin’ny fahatezerako no namelezako anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa amin’ny fitiavako kosa no amindrako fo aminao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hidanadana mandrakariva ny vavahadinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hirindrina izy na andro na alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampidirana ho ao aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny harenan’ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny mpanjakany izay voababo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa ho levona izay firenena sy fanjakana tsy hanompo anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hofongorana ireny firenena ireny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ho tonga aminao ny voninahitr’i Libanona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hazo kipreso sy ny hazo kesika ary ny kirihitra koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handravahana ny fitoerako masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hasiako voninahitra ny fitoeran-tongotro.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny zanak’izay nampahory anao dia handeha hiondrika eo anatrehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiankohoka amin’ny faladianao izay rehetra nanamavo anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hiantso anao izy hoe Tanànan’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zionan’ny Iray Masin’ny Israely.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ho solon’ny nahafoizana anao sy ny nankahalana anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tsy nandehanan’olona namakivaky anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hasandratro ho rehareha mandrakizay ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho fifaliana hatramin’ny taranaka fara aman-dimby.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hinono amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' ianao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hinono amin’ny mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho fantatrao fa Izaho TOMPO no Mpamonjy anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Ilay Maherin’i Jakoba no Mpanavotra anao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hahatonga volamena Aho ho solon’ny varahina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahatonga volafotsy ho solon’ny vy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: varahina ho solon’ny hazo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vy ho solon’ny vato;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fiadanana no hataoko mpanapaka anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahamarinana no ho mpampiasa anao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tsy ho re eo amin’ny taninao intsony ny fampahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny fandravana sy ny fandringanana ao amin’ny faritry ny taninao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mandanao dia hataonao hoe Famonjena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vavahadinao dia hataonao hoe Fiderana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy ny masoandro intsony no ho fanazavana anao amin’ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ny fangarangaran’ny volana no hanazava anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa NY TOMPO no ho fanazavana anao mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Andriamanitrao no ho voninahitrao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa indro, manarona ny tany ny haizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manarona ny firenena ny haizim-pito;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aminao kosa no iposahan’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aminao no isehoan’ny voninahiny.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tsy hilentika intsony ny masoandronao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisoka ny volanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa NY TOMPO no ho fanazavana anao mandrakizay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tapitra ny andron’ny falahelovanao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ho marina avokoa ny olonao rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanana ny tany ho mandrakizay izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho voly maitso eo amin’ny sahako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: asan’ny tanako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fampisehoana ny voninahitro.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny kely dia ho tonga arivo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny malemy dia ho tonga firenena matanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO no hanafaingana izany amin’ny fotoanany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Manatona ny fahazavanao ny firenena maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mankeo amin’ny famirapiratan’ny fiposahanao ny mpanjaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manintona ny mponina rehetra amin’izao tontolo izao i Jerosalema
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Atopazy manodidina ny masonao ka jereo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy rehetra dia mivory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mankaty aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanakao lahy dia tonga avy lavitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanakao vavy dia sakelehina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hahita izany ianao ka ho miramirana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiemponempona sady hohalehibiazina ny fonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hoentina ho anao ny harenan’ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hafindra ho anao ny fananan’ny firenena.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ho feno rameva betsaka ao aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia rameva tanora avy any Midiana sy Efaha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy avy any Seba izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: volamena sy ditin-kazo manitra no hoentiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fiderana NY TOMPO no teny mahafaly hambarany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny ondry aman’osy rehetra avy any Kedara dia hangonina ao aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ondrilahin’i Nebaiota no hampiasainao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatao fanatitra eo ambonin’ny alitarako ireo dia hankasitrahana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hataoko mamirapiratra ny tranon’ny voninahitro.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Iza moa ireto manidina tahaka ny rahona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny voromailala ho amin’ny varavarankeliny?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa Izaho no andrasan’ny nosy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sambon’i Tarsisy no hialoha lalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitondra ny zanakao avy lavitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny volafotsiny sy ny volamenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny anaran’NY TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho an’ny Iray Masin’ny Israely, satria manome voninahitra anao Izy.
