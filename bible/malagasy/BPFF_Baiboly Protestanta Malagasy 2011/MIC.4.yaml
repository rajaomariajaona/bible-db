document_id: MIC.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jerosalema, renivohitry ny fiadanana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no ho tonga amin’ny andro ho avy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tendrombohitra misy ny tranon’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia haorina eo an-tampon’ny tendrombohitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hasandratra ho avo noho ny havoana rehetra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitanjozotra hankany ny firenena maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Eny, maro ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' no hiainga ka hiteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha isika hiakatra any amin’ny tendrombohitry NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho any amin’ny tranon’Andriamanitr’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampianarany antsika ny amin’ny lalany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handehanantsika amin’ny sakeli-dalany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa avy any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' no hivoahan’ny lalàna,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avy any Jerosalema ny tenin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho mpitsara amin’ny firenena maro Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampiaiky ny firenena matanjaka na dia ireo any lavitra aza.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hanefy ny sabany ho lelan’angadinomby ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny lefony ho fanetezam-boaloboka:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy firenena hanainga sabatra hifamely
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hianatra ady intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Samy hipetraka eny ambanin’ny voalobony sy ny aviaviny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy hampihorohoro azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vavan’Andriamanitra, Tompon’izao rehetra izao, no niteny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny firenena rehetra dia samy mandeha
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny anaran’ny andriamaniny avy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa isika kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handeha amin’ny anaran’NY TOMPO Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandrakizay doria.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hanjaka ao Jerosalema NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’izany andro izany, hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hanangonako ny mandringa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamoriako izay noroahina
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’izay nampahoriko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny mandringa no havelako ho sisa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay noroahina lavitra no ho firenena matanjaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'NY TOMPO hanjaka aminy ao amin’ny tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: manomboka amin’izany ka ho mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ianao, ry Tilikambon’ny andian’ondry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tendrombohitr’i Ziona zanakavavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aminao no ho tonga izany; eny, ho tonga indray ny fahefana voalohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fanjakan’i Jerosalema zanakavavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa nahoana no mitaraina mafy ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy misy mpanjaka va ao aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa lany ringana avokoa ny mpanolotsainanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no dia azon’ny fanaintainana ianao, toy ny vehivavy eo am-piterahana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ry Ziona zanakavavy, mararia ka manezaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny vehivavy eo am-piterahana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ankehitriny dia hivoaka avy any an-tanàna ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hipetraka any an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tonga hatrany Babilona aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: any no hamonjena anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, any no hanavotan’NY TOMPO anao ho afaka amin’ny tanan’ny fahavalonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ankehitriny dia tafangona hamely anao ny firenena maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay milaza hoe: Voaloto i Ziona,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hifaly mijery azy ny masontsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Kanjo tsy fantatr’ireny ny hevitry NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary tsy azony ny fisainany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanangona azy toy ny amboara ho ao am-pamoloana Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mitsangàna ka manosihoseha, ry Ziona zanakavavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hataoko vy ny tandrokao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hataoko varahina ny kitronao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanorotoro firenena maro ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy azonao kasihina fa atokàny ho an’NY TOMPO ny harena azony tamin’ny tsy rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho an’ny Tompon’ny tany rehetra ny fananany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa mivoria ho andiany ianao, ry zanakavavin’ny andian-tafika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy fahirano izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: asio amin’ny tsorakazo ny takolaky ny mpitsaran’ny Israely.
