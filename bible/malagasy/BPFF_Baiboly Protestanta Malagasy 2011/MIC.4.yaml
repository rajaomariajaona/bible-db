document_id: MIC.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Jerosalema, renivohitry ny fiadanana
  - type: text
    content: 'Ary izao no ho tonga amin’ny andro ho avy:'
  - type: text
    content: Ny tendrombohitra misy ny tranon’NY TOMPO
  - type: text
    content: dia haorina eo an-tampon’ny tendrombohitra;
  - type: text
    content: hasandratra ho avo noho ny havoana rehetra izy
  - type: text
    content: ary hitanjozotra hankany ny firenena maro.
  '10':
  - type: text
    content: Ry Ziona zanakavavy, mararia ka manezaha,
  - type: text
    content: toy ny vehivavy eo am-piterahana!
  - type: text
    content: Fa ankehitriny dia hivoaka avy any an-tanàna ianao
  - type: text
    content: ka hipetraka any an-tsaha,
  - type: text
    content: dia ho tonga hatrany Babilona aza;
  - type: text
    content: any no hamonjena anao,
  - type: text
    content: eny, any no hanavotan’NY TOMPO anao ho afaka amin’ny tanan’ny fahavalonao.
  '11':
  - type: text
    content: Ankehitriny dia tafangona hamely anao ny firenena maro
  - type: text
    content: 'izay milaza hoe: Voaloto i Ziona,'
  - type: text
    content: ary aoka hifaly mijery azy ny masontsika.
  '12':
  - type: text
    content: Kanjo tsy fantatr’ireny ny hevitry NY TOMPO
  - type: text
    content: 'ary tsy azony ny fisainany:'
  - type: text
    content: Efa nanangona azy toy ny amboara ho ao am-pamoloana Izy.
  '13':
  - type: text
    content: Mitsangàna ka manosihoseha, ry Ziona zanakavavy,
  - type: text
    content: fa hataoko vy ny tandrokao
  - type: text
    content: ary hataoko varahina ny kitronao
  - type: text
    content: ka hanorotoro firenena maro ianao;
  - type: text
    content: tsy azonao kasihina fa atokàny ho an’NY TOMPO ny harena azony tamin’ny tsy rariny,
  - type: text
    content: ary ho an’ny Tompon’ny tany rehetra ny fananany.
  '14':
  - type: text
    content: Koa mivoria ho andiany ianao, ry zanakavavin’ny andian-tafika!
  - type: text
    content: Ataovy fahirano izahay;
  - type: text
    content: asio amin’ny tsorakazo ny takolaky ny mpitsaran’ny Israely.
  '2':
  - type: text
    content: 'Eny, maro ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' no hiainga ka hiteny hoe:'
  - type: text
    content: Andeha isika hiakatra any amin’ny tendrombohitry NY TOMPO,
  - type: text
    content: ho any amin’ny tranon’Andriamanitr’i Jakoba
  - type: text
    content: mba hampianarany antsika ny amin’ny lalany
  - type: text
    content: ka handehanantsika amin’ny sakeli-dalany.
  - type: text
    content: 'Fa avy any '
  - type: text
    content: Ziona
  - type: text
    content: ' no hivoahan’ny lalàna,'
  - type: text
    content: ary avy any Jerosalema ny tenin’NY TOMPO.
  '3':
  - type: text
    content: Ho mpitsara amin’ny firenena maro Izy
  - type: text
    content: ka hampiaiky ny firenena matanjaka na dia ireo any lavitra aza.
  - type: text
    content: Dia hanefy ny sabany ho lelan’angadinomby ireny,
  - type: text
    content: 'ary ny lefony ho fanetezam-boaloboka:'
  - type: text
    content: Tsy hisy firenena hanainga sabatra hifamely
  - type: text
    content: na hianatra ady intsony.
  '4':
  - type: text
    content: Samy hipetraka eny ambanin’ny voalobony sy ny aviaviny izy,
  - type: text
    content: ary tsy hisy hampihorohoro azy,
  - type: text
    content: fa ny vavan’Andriamanitra, Tompon’izao rehetra izao, no niteny.
  '5':
  - type: text
    content: Ny firenena rehetra dia samy mandeha
  - type: text
    content: amin’ny anaran’ny andriamaniny avy,
  - type: text
    content: fa isika kosa
  - type: text
    content: dia handeha amin’ny anaran’NY TOMPO Andriamanitsika
  - type: text
    content: mandrakizay doria.
  - type: heading
    content: Hanjaka ao Jerosalema NY TOMPO
  '6':
  - type: text
    content: Amin’izany andro izany, hoy NY TOMPO,
  - type: text
    content: no hanangonako ny mandringa
  - type: text
    content: sy hamoriako izay noroahina
  - type: text
    content: mbamin’izay nampahoriko.
  '7':
  - type: text
    content: Ny mandringa no havelako ho sisa,
  - type: text
    content: ary izay noroahina lavitra no ho firenena matanjaka.
  - type: text
    content: 'NY TOMPO hanjaka aminy ao amin’ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: manomboka amin’izany ka ho mandrakizay.
  '8':
  - type: text
    content: Ary ianao, ry Tilikambon’ny andian’ondry,
  - type: text
    content: tendrombohitr’i Ziona zanakavavy,
  - type: text
    content: aminao no ho tonga izany; eny, ho tonga indray ny fahefana voalohany,
  - type: text
    content: dia ny fanjakan’i Jerosalema zanakavavy.
  '9':
  - type: text
    content: Koa nahoana no mitaraina mafy ianao?
  - type: text
    content: Moa tsy misy mpanjaka va ao aminao,
  - type: text
    content: sa lany ringana avokoa ny mpanolotsainanao,
  - type: text
    content: no dia azon’ny fanaintainana ianao, toy ny vehivavy eo am-piterahana?
