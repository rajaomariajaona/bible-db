document_id: JOB.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba: Mitaraina ny amin’ny ataon’ireo namany izy'
  - type: text
    content: 'Dia namaly i Joba hoe:'
  '10':
  - type: text
    content: Dia hahita fiononana amin’izany aho
  - type: text
    content: ka hibitaka noho ny hafaliana na dia amin’ny fangirifiriana tsy mifaditra ovana aza
  - type: text
    content: satria tsy nandà ny tenin’ny Iray Masina aho.
  '11':
  - type: text
    content: Inona moa ny heriko no hanantena aho?
  - type: text
    content: Ary hanao ahoana moa ny hiafarako no hanindry fo aho?
  '12':
  - type: text
    content: Herim-bato va ny heriko?
  - type: text
    content: Varahina va ny nofoko?
  '13':
  - type: text
    content: Tsy efa foana va ny hery hoentiko mamonjy tena
  - type: text
    content: ary tsy efa nakifika hiala amiko va ny faharetana?
  '14':
  - type: text
    content: Izay efa mivarahontsana dia tokony hiantran’ny sakaizany,
  - type: text
    content: fandrao hahafoy ny fahatahorana ny Tsitoha izy.
  '15':
  - type: text
    content: Namadika ahy tahaka ny ranotrambo ny rahalahiko,
  - type: text
    content: tahaka ny masondrano any an-dohasahan-driaka izay malaky ritra,
  '16':
  - type: text
    content: izay mivalomainty azon’ny ranomandry
  - type: text
    content: sady iafenan’ny orampanala,
  '17':
  - type: text
    content: fa raha taninin’ny hainandro izy dia levona;
  - type: text
    content: raha maina ny andro dia ritra eo amin’ny fitoerany izy.
  '18':
  - type: text
    content: Mivily lalana ny andian’ireo mpivarotra mandehandeha;
  - type: text
    content: miroso ho any an-tany foana izy ka very any.
  '19':
  - type: text
    content: Mitazana azy ny andian’i Tema,
  - type: text
    content: manantena azy ny tarik’i Sheba;
  '2':
  - type: text
    content: Enga anie ka holanjaina tokoa ny fahasosorako
  - type: text
    content: ka hampifandanjaina amin’ny mizana izy sy ny fahoriako!
  '20':
  - type: text
    content: diso fanantenana ireo;
  - type: text
    content: tonga teo izy kanjo nangaihay.
  '21':
  - type: text
    content: Fa ankehitriny, ianareo koa dia tsinontsinona;
  - type: text
    content: mahita ny loza manjo ianareo ka raiki-tahotra!
  '22':
  - type: text
    content: 'Moa va efa niteny aho hoe: Omeo aho'
  - type: text
    content: ka mahafoiza zavatra ho ahy avy amin’ny fanananareo?
  '23':
  - type: text
    content: Ary vonjeo amin’ny tanan’ny fahavalo aho
  - type: text
    content: ka afaho amin’ny tanan’ny mpampihorohoro?
  '24':
  - type: text
    content: Mampianara ahy dia hangina aho
  - type: text
    content: ary ampahafantaro ahy izay nahadiso ahy.
  '25':
  - type: text
    content: Endre, ny herin’ny teny marina!
  - type: text
    content: Fa mba mahavoa inona kosa moa ny anatra ataonareo?
  '26':
  - type: text
    content: Teny ihany va no heverinareo hokianina,
  - type: text
    content: dia tenin’ny olona mamoy fo izay entin’ny rivotra?
  '27':
  - type: text
    content: Eny, fa na dia ny kamboty aza dia anaovanareo filokana
  - type: text
    content: ary ny sakaizanareo dia amidinareo!
  '28':
  - type: text
    content: Fa ankehitriny, miangavy anareo, mba atreho kely aho!
  - type: text
    content: Dia ho hitanareo fa tsy mandainga aho tsy akory.
  '29':
  - type: text
    content: Miangavy anareo, diniho indray aho ary aoka tsy hisy fitsarana tsy marina;
  - type: text
    content: eny, diniho indray aho, fa mbola ao ihany ny fahamarinako!
  '3':
  - type: text
    content: Fa ankehitriny dia mavesatra noho ny fasika any an-dranomasina ny fahoriako
  - type: text
    content: ka nirediredy aho.
  '30':
  - type: text
    content: Moa misy heloka va eo amin’ny lelako?
  - type: text
    content: Tsy mahay mamantatra izay ratsy va ny vavako?
  '4':
  - type: text
    content: Fa ny zana-tsipìkan’ny Tsitoha no mitsatoka amiko
  - type: text
    content: ka mifoka ny poizina avy aminy ny fanahiko
  - type: text
    content: ary ny fampitahoran’Andriamanitra dia milahatra hamely ahy.
  '5':
  - type: text
    content: Maneno va ny borikidia raha eo amin’ny vilona?
  - type: text
    content: Na mimamà va ny omby raha eo amin’ny vilona fihinany?
  '6':
  - type: text
    content: Azo hanina va ny matsatso raha tsy asian-tsira?
  - type: text
    content: Mba misy tsirony va ny tapotsin’atody?
  '7':
  - type: text
    content: Ny zavatra izay nolaviko tsy hotendrena,
  - type: text
    content: dia ireny no tsy maintsy haniko na dia maharikoriko ahy aza!
  '8':
  - type: text
    content: Enga anie ka ho azoko izay angatahiko
  - type: text
    content: ary homen’Andriamanitra ahy anie izay iriko!
  '9':
  - type: text
    content: Ho sitrak’Andriamanitra anie ny hanorotoro ahy;
  - type: text
    content: eny, halefany anie ny tanany ka hanapitra ny aiko!
