document_id: JOB.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny navalin’i Joba: Mitaraina ny amin’ny ataon’ireo namany izy'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia namaly i Joba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia hahita fiononana amin’izany aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hibitaka noho ny hafaliana na dia amin’ny fangirifiriana tsy mifaditra ovana aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy nandà ny tenin’ny Iray Masina aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Inona moa ny heriko no hanantena aho?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanao ahoana moa ny hiafarako no hanindry fo aho?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Herim-bato va ny heriko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Varahina va ny nofoko?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tsy efa foana va ny hery hoentiko mamonjy tena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy efa nakifika hiala amiko va ny faharetana?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izay efa mivarahontsana dia tokony hiantran’ny sakaizany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hahafoy ny fahatahorana ny Tsitoha izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Namadika ahy tahaka ny ranotrambo ny rahalahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny masondrano any an-dohasahan-driaka izay malaky ritra,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: izay mivalomainty azon’ny ranomandry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady iafenan’ny orampanala,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: fa raha taninin’ny hainandro izy dia levona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha maina ny andro dia ritra eo amin’ny fitoerany izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mivily lalana ny andian’ireo mpivarotra mandehandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miroso ho any an-tany foana izy ka very any.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mitazana azy ny andian’i Tema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manantena azy ny tarik’i Sheba;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Enga anie ka holanjaina tokoa ny fahasosorako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampifandanjaina amin’ny mizana izy sy ny fahoriako!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: diso fanantenana ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga teo izy kanjo nangaihay.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa ankehitriny, ianareo koa dia tsinontsinona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahita ny loza manjo ianareo ka raiki-tahotra!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Moa va efa niteny aho hoe: Omeo aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahafoiza zavatra ho ahy avy amin’ny fanananareo?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary vonjeo amin’ny tanan’ny fahavalo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afaho amin’ny tanan’ny mpampihorohoro?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mampianara ahy dia hangina aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampahafantaro ahy izay nahadiso ahy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Endre, ny herin’ny teny marina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mba mahavoa inona kosa moa ny anatra ataonareo?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Teny ihany va no heverinareo hokianina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tenin’ny olona mamoy fo izay entin’ny rivotra?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Eny, fa na dia ny kamboty aza dia anaovanareo filokana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sakaizanareo dia amidinareo!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fa ankehitriny, miangavy anareo, mba atreho kely aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho hitanareo fa tsy mandainga aho tsy akory.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Miangavy anareo, diniho indray aho ary aoka tsy hisy fitsarana tsy marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, diniho indray aho, fa mbola ao ihany ny fahamarinako!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa ankehitriny dia mavesatra noho ny fasika any an-dranomasina ny fahoriako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nirediredy aho.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Moa misy heloka va eo amin’ny lelako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahay mamantatra izay ratsy va ny vavako?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa ny zana-tsipìkan’ny Tsitoha no mitsatoka amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mifoka ny poizina avy aminy ny fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fampitahoran’Andriamanitra dia milahatra hamely ahy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Maneno va ny borikidia raha eo amin’ny vilona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mimamà va ny omby raha eo amin’ny vilona fihinany?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Azo hanina va ny matsatso raha tsy asian-tsira?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba misy tsirony va ny tapotsin’atody?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny zavatra izay nolaviko tsy hotendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireny no tsy maintsy haniko na dia maharikoriko ahy aza!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Enga anie ka ho azoko izay angatahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary homen’Andriamanitra ahy anie izay iriko!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ho sitrak’Andriamanitra anie ny hanorotoro ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, halefany anie ny tanany ka hanapitra ny aiko!
