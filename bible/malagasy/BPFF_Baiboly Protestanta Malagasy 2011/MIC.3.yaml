document_id: MIC.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ho an’ireo mpitondra tsy mendrika
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihainoa re ianareo, ry loholon’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ianareo mpanapaka ny taranak’Israely.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy anjara raharahanareo va ny hahalala ny rariny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia ianareo izay mankahala ny tsara ka tia ny ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manendaka ny hoditry ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny nofony amin’ny taolany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: eny, ianareo izay homana ny nofon’ny oloko koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manendaka ny hodiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manapotipotika ny taolany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mitetika azy toy ny hatao am-bilany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny hena ao anatin’ny fahandroan-kena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Rehefa mitaraina amin’NY TOMPO ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hihaino azy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanafina ny tavany aminy Izy amin’izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho valin’ny ratsy nataony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny mamely ireo mpaminany izay mampivily lalana ny Israely
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izao no lazain’NY TOMPO ny amin’ny mpaminany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay mampaniasia ny oloko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa misy zavatra hotsakoiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitory fiadanana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay tsy manisy hanina eo am-bavany kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia iantsoany ady masina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa izany no hahatongavan’ny alina aminareo ka tsy hisy fahitana intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa ny maizina aminareo ka tsy hisy fanandroana intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hilentika tsy hanazava ireny mpaminany ireny ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho maizina aminy ny andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ho menatra ny mpahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hangaihay ny mpanao fanandroana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hitampim-bava avokoa izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy misy valinteny avy amin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa izaho kosa dia feno hery
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny Fanahin’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny rariny sy fahasahiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanambara amin’i Jakoba ny helony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hilaza amin’Israely ny fahotany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanambaràn’i Mika ny haharavan’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mba mihainoa izao, ianareo loholon’ny taranak’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mpitondra eo amin’ny taranak’Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo izay manao ny rariny ho fahavetavetana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mamadika ny hitsiny rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ianareo izay manangana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' amin’ny fandatsahan-dra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy i Jerosalema amin’ny faharatsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mitsara hahazoany kolikoly ny mpifehiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampianatra hahazoany karama ny mpisorony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manao fanandroana hahazoany vola ny mpaminany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nefa NY TOMPO mbola iankinany ihany ka hoy izy ireo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ato amintsika va NY TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy loza hanjo antsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa hasaina toy ny tanimboly i Ziona noho ny nataonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary i Jerosalema dia ho tonga korontam-bato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tendrombohitra misy ny trano dia ho tonga toy ny havoana rakotra ala.
