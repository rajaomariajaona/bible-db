document_id: MIC.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ho an’ireo mpitondra tsy mendrika
  - type: text
    content: 'Hoy aho:'
  - type: text
    content: Mihainoa re ianareo, ry loholon’i Jakoba
  - type: text
    content: sy ianareo mpanapaka ny taranak’Israely.
  - type: text
    content: Tsy anjara raharahanareo va ny hahalala ny rariny?
  '10':
  - type: text
    content: 'ianareo izay manangana an’i '
  - type: text
    content: Ziona
  - type: text
    content: ' amin’ny fandatsahan-dra,'
  - type: text
    content: sy i Jerosalema amin’ny faharatsiana.
  '11':
  - type: text
    content: Mitsara hahazoany kolikoly ny mpifehiny,
  - type: text
    content: mampianatra hahazoany karama ny mpisorony
  - type: text
    content: ary manao fanandroana hahazoany vola ny mpaminany;
  - type: text
    content: 'nefa NY TOMPO mbola iankinany ihany ka hoy izy ireo hoe:'
  - type: text
    content: Tsy ato amintsika va NY TOMPO?
  - type: text
    content: Tsy hisy loza hanjo antsika.
  '12':
  - type: text
    content: Koa hasaina toy ny tanimboly i Ziona noho ny nataonareo,
  - type: text
    content: ary i Jerosalema dia ho tonga korontam-bato,
  - type: text
    content: ary ny tendrombohitra misy ny trano dia ho tonga toy ny havoana rakotra ala.
  '2':
  - type: text
    content: Dia ianareo izay mankahala ny tsara ka tia ny ratsy,
  - type: text
    content: izay manendaka ny hoditry ny olona
  - type: text
    content: sy ny nofony amin’ny taolany;
  '3':
  - type: text
    content: eny, ianareo izay homana ny nofon’ny oloko koa
  - type: text
    content: sady manendaka ny hodiny
  - type: text
    content: ary manapotipotika ny taolany;
  - type: text
    content: eny, mitetika azy toy ny hatao am-bilany izy,
  - type: text
    content: dia toy ny hena ao anatin’ny fahandroan-kena.
  '4':
  - type: text
    content: Rehefa mitaraina amin’NY TOMPO ireo
  - type: text
    content: dia tsy hihaino azy Izy;
  - type: text
    content: hanafina ny tavany aminy Izy amin’izany andro izany,
  - type: text
    content: ho valin’ny ratsy nataony.
  - type: heading
    content: Teny mamely ireo mpaminany izay mampivily lalana ny Israely
  '5':
  - type: text
    content: Izao no lazain’NY TOMPO ny amin’ny mpaminany
  - type: text
    content: 'izay mampaniasia ny oloko:'
  - type: text
    content: Rehefa misy zavatra hotsakoiny
  - type: text
    content: dia mitory fiadanana izy,
  - type: text
    content: fa izay tsy manisy hanina eo am-bavany kosa
  - type: text
    content: dia iantsoany ady masina!
  '6':
  - type: text
    content: Koa izany no hahatongavan’ny alina aminareo ka tsy hisy fahitana intsony,
  - type: text
    content: ary koa ny maizina aminareo ka tsy hisy fanandroana intsony;
  - type: text
    content: fa hilentika tsy hanazava ireny mpaminany ireny ny masoandro
  - type: text
    content: ary ho maizina aminy ny andro.
  '7':
  - type: text
    content: Ho menatra ny mpahita
  - type: text
    content: ary hangaihay ny mpanao fanandroana;
  - type: text
    content: eny, hitampim-bava avokoa izy rehetra
  - type: text
    content: satria tsy misy valinteny avy amin’Andriamanitra.
  '8':
  - type: text
    content: Fa izaho kosa dia feno hery
  - type: text
    content: avy amin’ny Fanahin’NY TOMPO,
  - type: text
    content: mbamin’ny rariny sy fahasahiana
  - type: text
    content: mba hanambara amin’i Jakoba ny helony
  - type: text
    content: sy hilaza amin’Israely ny fahotany.
  - type: heading
    content: Ny fanambaràn’i Mika ny haharavan’i Jerosalema
  '9':
  - type: text
    content: Mba mihainoa izao, ianareo loholon’ny taranak’i Jakoba
  - type: text
    content: sy mpitondra eo amin’ny taranak’Israely,
  - type: text
    content: dia ianareo izay manao ny rariny ho fahavetavetana
  - type: text
    content: sy mamadika ny hitsiny rehetra,
