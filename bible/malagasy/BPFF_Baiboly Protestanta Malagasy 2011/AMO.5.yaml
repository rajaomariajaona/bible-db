document_id: AMO.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fisaonana an’Israely
  - type: text
    content: Henoinareo izao teny izao, dia hira fisaonana izay entiko milaza anareo, ry taranak’Israely!
  '10':
  - type: text
    content: Halan’izy ireo izay mananatra eo am-bavahady
  - type: text
    content: ary ataony ho zava-maharikoriko izay miteny ny marina.
  '11':
  - type: text
    content: Koa satria nanitsakitsaka ny mahantra ianareo
  - type: text
    content: ary nampandoa vary azy,
  - type: text
    content: dia nanangana trano vato voapaika ihany koa ianareo
  - type: text
    content: nefa tsy hitoetra ao aminy;
  - type: text
    content: namboly tanim-boaloboka mahafinaritra ianareo
  - type: text
    content: nefa tsy hisotro ny divay avy aminy.
  '12':
  - type: text
    content: 'Fa fantatro fa be ny helokareo ary miavosa ny fahotanareo:'
  - type: text
    content: Mampahory ny marina sy mandray kolikoly ianareo
  - type: text
    content: ary manilika ny mahantra tsy ho eo amin’ny fitsarana.
  '13':
  - type: text
    content: Koa izay manan-tsaina dia hangina amin’izao andro izao,
  - type: text
    content: fa andro fahoriana izao.
  '14':
  - type: text
    content: Ny tsara no tadiavo fa aza ny ratsy
  - type: text
    content: mba ho velona ianareo;
  - type: text
    content: dia homba anareo NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: text
    content: araka izay lazainareo.
  '15':
  - type: text
    content: Ankahalao ny ratsy, tiavo ny tsara,
  - type: text
    content: aoreno eo amin’ny fitsarana ny rariny;
  - type: text
    content: angamba NY TOMPO, Andriamanitra Tompon’izao rehetra izao, hamindra fo
  - type: text
    content: amin’izay sisa amin’i Josefa.
  '16':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
  - type: text
    content: Eny an-kianja rehetra eny dia hisy fisaonana;
  - type: text
    content: 'ary eny an-dalambe rehetra eny dia hisy hilaza hoe: Indrisy! Indrisy!'
  - type: text
    content: Hiantso ny mpamboly hitomany izy
  - type: text
    content: ary izay mahay hira fisaonana dia hantsoiny hanao izany.
  '17':
  - type: text
    content: Any amin’ny tanim-boaloboka rehetra dia hisy fisaonana
  - type: text
    content: fa handeha hamakivaky eo afovoanareo Aho,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Ny Andron’NY TOMPO
  '18':
  - type: text
    content: Lozan’izay maniry ny Andron’NY TOMPO!
  - type: text
    content: Hataonareo inona moa ny Andron’NY TOMPO?
  - type: text
    content: Ho haizina izany fa tsy ho fahazavana.
  '19':
  - type: text
    content: Tahaka ny olona mandositra ny liona
  - type: text
    content: ka sendra ny bera;
  - type: text
    content: rehefa tafiditra ao an-trano izy ka mitehin-tanana amin’ny rindrina
  - type: text
    content: dia kaikerin’ny menarana.
  '2':
  - type: text
    content: Lavo tsy hitsangana intsony
  - type: text
    content: Israely virijiny;
  - type: text
    content: nazera tamin’ny taniny izy
  - type: text
    content: ka tsy misy manangana azy.
  '20':
  - type: text
    content: Moa tsy haizina va ny Andron’NY TOMPO fa tsy fahazavana?
  - type: text
    content: Moa tsy haizim-pito tsy misy mangirana akory va izany?
  - type: heading
    content: Fanompoam-pivavahana tsy zakan’NY TOMPO
  '21':
  - type: text
    content: Halako, eny, laviko ny andro firavoravoanareo
  - type: text
    content: ary tsy tiako ho re intsony ny fofon’ny fivoriana masina ataonareo.
  '22':
  - type: text
    content: Na dia anoloranareo fanatitra dorana manontolo sy fanatitra avy amin’ny zavamaniry aza Aho
  - type: text
    content: dia tsy sitrako izany;
  - type: text
    content: ny zanak’omby mifahy aterinareo ho fanati-pihavanana
  - type: text
    content: dia tsy hojereko akory.
  '23':
  - type: text
    content: Halaviro Amiko ny finaonaonan’ny hiranareo!
  - type: text
    content: Tsy hihaino ny fanenon’ny lokanganareo Aho,
  '24':
  - type: text
    content: fa aoka kosa ny fitsarana hikoriana toy ny rano
  - type: text
    content: ary ny fahamarinana toy ny renirano tsy mety ritra.
  '25':
  - type: text
    content: Moa efa nanolotra fanatitra avy amin’ny zavamaniry sy fanatitra alatsa-dra ho Ahy va ianareo
  - type: text
    content: fony tany an-tany efitra efapolo taona, ry taranak’Israely?
  '26':
  - type: text
    content: Ento any i Sikota mpanjakanareo
  - type: text
    content: sy i Kiona
  - type: note
    content: 'Sikota sy Kiona: anarana sampy asiriana.'
  - type: text
    content: ' sampinareo'
  - type: text
    content: dia ny kintan’ny andriamanitrareo
  - type: text
    content: izay nataonareo ho anareo!
  '27':
  - type: text
    content: Hoentiko ho babo any ankoatra an’i Damaskosy ianareo,
  - type: text
    content: hoy NY TOMPO. Andriamanitra, Tompon’izao rehetra izao, no anarany.
  '3':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Izay tanàna nandefa arivo lahy
  - type: text
    content: dia indreo, zato monja no sisa;
  - type: text
    content: ary izay namoaka zato lahy
  - type: text
    content: dia indreo, folo monja no sisa
  - type: text
    content: ho an’ny taranak’Israely.
  - type: heading
    content: Mitadiava NY TOMPO dia ho velona ianareo
  '4':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO amin’ny taranak’Israely:'
  - type: text
    content: Tadiavo Aho dia ho velona ianareo!
  '5':
  - type: text
    content: Aza mitady any Betela
  - type: text
    content: na mankany Gilgala,
  - type: text
    content: ary aza mandroso ho any Bery-Sheba.
  - type: text
    content: Fa ho babo tokoa i Gilgala
  - type: text
    content: ary i Betela dia ho foana tanteraka.
  '6':
  - type: text
    content: Tadiavo NY TOMPO dia ho velona ianareo!
  - type: text
    content: Fandrao hilatsaka toy ny afo mandevona
  - type: text
    content: amin’ny taranak’i Josefa Izy
  - type: text
    content: ary tsy hisy izay hahafaty ny afo ao Betela;
  '7':
  - type: text
    content: dia ianareo izay mamadika ny rariny ho zava-mahafaty
  - type: text
    content: ary mampirefarefa ny fahamarinana amin’ny tany!
  '8':
  - type: text
    content: Ilay nanao an’Ikotokelimiadilaona sy ny Telonohorefy
  - type: text
    content: ary mampody ny aloky ny fahafatesana ho maraina
  - type: text
    content: sy manamaizina ny andro ho alina,
  - type: text
    content: dia Ilay miantso ny rano any an-dranomasina
  - type: text
    content: ka mandraraka azy amin’ny tany,
  - type: text
    content: NY TOMPO no anarany,
  '9':
  - type: text
    content: dia Ilay mampitselatra fandravana hamely ny mahery
  - type: text
    content: ka mihatra amin’ny tanàna mimanda ny fandravana.
