document_id: AMO.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hira fisaonana an’Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Henoinareo izao teny izao, dia hira fisaonana izay entiko milaza anareo, ry taranak’Israely!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halan’izy ireo izay mananatra eo am-bavahady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataony ho zava-maharikoriko izay miteny ny marina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa satria nanitsakitsaka ny mahantra ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampandoa vary azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nanangana trano vato voapaika ihany koa ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hitoetra ao aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: namboly tanim-boaloboka mahafinaritra ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hisotro ny divay avy aminy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa fantatro fa be ny helokareo ary miavosa ny fahotanareo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampahory ny marina sy mandray kolikoly ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manilika ny mahantra tsy ho eo amin’ny fitsarana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izay manan-tsaina dia hangina amin’izao andro izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa andro fahoriana izao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tsara no tadiavo fa aza ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho velona ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia homba anareo NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka izay lazainareo.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankahalao ny ratsy, tiavo ny tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoreno eo amin’ny fitsarana ny rariny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: angamba NY TOMPO, Andriamanitra Tompon’izao rehetra izao, hamindra fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay sisa amin’i Josefa.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa izao no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-kianja rehetra eny dia hisy fisaonana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary eny an-dalambe rehetra eny dia hisy hilaza hoe: Indrisy! Indrisy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiantso ny mpamboly hitomany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mahay hira fisaonana dia hantsoiny hanao izany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any amin’ny tanim-boaloboka rehetra dia hisy fisaonana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa handeha hamakivaky eo afovoanareo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Andron’NY TOMPO
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozan’izay maniry ny Andron’NY TOMPO!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataonareo inona moa ny Andron’NY TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho haizina izany fa tsy ho fahazavana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny olona mandositra ny liona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka sendra ny bera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa tafiditra ao an-trano izy ka mitehin-tanana amin’ny rindrina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia kaikerin’ny menarana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lavo tsy hitsangana intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israely virijiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nazera tamin’ny taniny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy manangana azy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy haizina va ny Andron’NY TOMPO fa tsy fahazavana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy haizim-pito tsy misy mangirana akory va izany?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanompoam-pivavahana tsy zakan’NY TOMPO
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halako, eny, laviko ny andro firavoravoanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy tiako ho re intsony ny fofon’ny fivoriana masina ataonareo.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia anoloranareo fanatitra dorana manontolo sy fanatitra avy amin’ny zavamaniry aza Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy sitrako izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanak’omby mifahy aterinareo ho fanati-pihavanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hojereko akory.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halaviro Amiko ny finaonaonan’ny hiranareo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hihaino ny fanenon’ny lokanganareo Aho,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aoka kosa ny fitsarana hikoriana toy ny rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahamarinana toy ny renirano tsy mety ritra.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa efa nanolotra fanatitra avy amin’ny zavamaniry sy fanatitra alatsa-dra ho Ahy va ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony tany an-tany efitra efapolo taona, ry taranak’Israely?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ento any i Sikota mpanjakanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy i Kiona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sikota sy Kiona: '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: anarana sampy asiriana.
      marker-yv: yv-n
    - type: text
      text: ' sampinareo'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny kintan’ny andriamanitrareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nataonareo ho anareo!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoentiko ho babo any ankoatra an’i Damaskosy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO. Andriamanitra, Tompon’izao rehetra izao, no anarany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO Andriamanitra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tanàna nandefa arivo lahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia indreo, zato monja no sisa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay namoaka zato lahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia indreo, folo monja no sisa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny taranak’Israely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitadiava NY TOMPO dia ho velona ianareo
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO amin’ny taranak’Israely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tadiavo Aho dia ho velona ianareo!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mitady any Betela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mankany Gilgala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mandroso ho any Bery-Sheba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho babo tokoa i Gilgala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Betela dia ho foana tanteraka.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tadiavo NY TOMPO dia ho velona ianareo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao hilatsaka toy ny afo mandevona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny taranak’i Josefa Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy izay hahafaty ny afo ao Betela;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ianareo izay mamadika ny rariny ho zava-mahafaty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampirefarefa ny fahamarinana amin’ny tany!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay nanao an’Ikotokelimiadilaona sy ny Telonohorefy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampody ny aloky ny fahafatesana ho maraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manamaizina ny andro ho alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Ilay miantso ny rano any an-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandraraka azy amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no anarany,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Ilay mampitselatra fandravana hamely ny mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mihatra amin’ny tanàna mimanda ny fandravana.
