document_id: PSA.96,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fifaliana noho ny fiavian’NY TOMPO
  - type: heading
    content: 1Tan 16.23-33
  - type: text
    content: Mihirà fihiram-baovao ho an’NY TOMPO!
  - type: text
    content: Mihirà ho an’NY TOMPO, ry tany rehetra!
  '10':
  - type: text
    content: Lazao any amin’ny Jentilisa fa NY TOMPO no Mpanjaka
  - type: text
    content: ary izao rehetra izao dia mitoetra tsara ka tsy hihetsika.
  - type: text
    content: Hitsara ny firenena amin’ny fahamarinana Izy.
  '11':
  - type: text
    content: Aoka hifaly ny lanitra ary hiravoravo ny tany!
  - type: text
    content: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy!
  '12':
  - type: text
    content: Aoka hiravoravo ny saha sy izay rehetra eo aminy;
  - type: text
    content: dia hihoby amin’izay ny hazo rehetra any an’ala
  '13':
  - type: text
    content: eo anatrehan’NY TOMPO fa avy Izy;
  - type: text
    content: eny, avy hitsara ny tany Izy.
  - type: text
    content: Hitsara izao tontolo izao araka ny rariny Izy
  - type: text
    content: ary ny firenena amin’ny fahamarinany.
  '2':
  - type: text
    content: Mihirà ho an’NY TOMPO, misaora ny anarany,
  - type: text
    content: ambarao isanandro isanandro ny vaovao mahafalin’ny famonjeny!
  '3':
  - type: text
    content: 'Ambarao any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ny voninahiny'
  - type: text
    content: ary any amin’ny firenena rehetra ny fahagagana ataony!
  '4':
  - type: text
    content: Fa lehibe NY TOMPO ka mendrika hoderaina indrindra
  - type: text
    content: sady mahatahotra, mihoatra noho ny andriamanitra rehetra.
  '5':
  - type: text
    content: Ny andriamanitry ny firenena dia tsinontsinona,
  - type: text
    content: fa NY TOMPO no nanao ny lanitra.
  '6':
  - type: text
    content: Famirapiratana sy voninahitra no eo anatrehany,
  - type: text
    content: hery sy fahatsaran-tarehy no ao amin’ny fitoerany masina.
  '7':
  - type: text
    content: Ry firenena, omeo NY TOMPO;
  - type: text
    content: eny, omeo voninahitra sy hery NY TOMPO!
  '8':
  - type: text
    content: Omeo NY TOMPO ny voninahitry ny anarany!
  - type: text
    content: Manolora fanatitra ka mankanesa eo an-kianjany!
  '9':
  - type: text
    content: Miankohofa eo anatrehan’NY TOMPO amin’ny fihaingoana masina;
  - type: text
    content: mangovita eo anatrehany, ry tany rehetra!
