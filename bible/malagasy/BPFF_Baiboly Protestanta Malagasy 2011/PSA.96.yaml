document_id: PSA.96
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hira fifaliana noho ny fiavian’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 16.23-33
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mihirà fihiram-baovao ho an’NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihirà ho an’NY TOMPO, ry tany rehetra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihirà ho an’NY TOMPO, misaora ny anarany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambarao isanandro isanandro ny vaovao mahafalin’ny famonjeny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ambarao any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' ny voninahiny'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary any amin’ny firenena rehetra ny fahagagana ataony!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa lehibe NY TOMPO ka mendrika hoderaina indrindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mahatahotra, mihoatra noho ny andriamanitra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny andriamanitry ny firenena dia tsinontsinona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO no nanao ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Famirapiratana sy voninahitra no eo anatrehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hery sy fahatsaran-tarehy no ao amin’ny fitoerany masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ry firenena, omeo NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, omeo voninahitra sy hery NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Omeo NY TOMPO ny voninahitry ny anarany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manolora fanatitra ka mankanesa eo an-kianjany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Miankohofa eo anatrehan’NY TOMPO amin’ny fihaingoana masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mangovita eo anatrehany, ry tany rehetra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lazao any amin’ny Jentilisa fa NY TOMPO no Mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izao rehetra izao dia mitoetra tsara ka tsy hihetsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsara ny firenena amin’ny fahamarinana Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka hifaly ny lanitra ary hiravoravo ny tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka hiravoravo ny saha sy izay rehetra eo aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihoby amin’izay ny hazo rehetra any an’ala
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: eo anatrehan’NY TOMPO fa avy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, avy hitsara ny tany Izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsara izao tontolo izao araka ny rariny Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny firenena amin’ny fahamarinany.
