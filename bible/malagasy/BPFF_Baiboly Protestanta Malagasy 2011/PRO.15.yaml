document_id: PRO.15,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ny valinteny mora dia mampihemotra ny fahatezerana mafy,
  - type: text
    content: fa ny teny maharary dia mampiakatra ny fahasosorana.
  '10':
  - type: text
    content: Famaizana mafy no hihatra amin’izay miala amin’ny lalana,
  - type: text
    content: eny, izay mankahala anatra dia ho faty.
  '11':
  - type: text
    content: 'Ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' sy ny fandringanana aza dia miharihary eo anatrehan’NY TOMPO,'
  - type: text
    content: koa mainka ny fon’ny zanak’olombelona!
  '12':
  - type: text
    content: Tsy tian’ny mpaniratsira izay mananatra azy
  - type: text
    content: ary tsy mety manatona ny hendry izy.
  '13':
  - type: text
    content: Mahamiramirana ny tarehy ny fo ravoravo,
  - type: text
    content: fa ny alahelon’ny fo dia mahareraka ny fanahy.
  '14':
  - type: text
    content: Ny fon’ny manan-tsaina dia mitady fahendrena,
  - type: text
    content: fa ny adala dia mankamamy ny fahadalana.
  '15':
  - type: text
    content: Ratsy avokoa ny andron’ny ory,
  - type: text
    content: fa ny faharavoravoana am-po dia sakafom-panasana mandrakariva.
  '16':
  - type: text
    content: Aleo kely misy fahatahorana NY TOMPO
  - type: text
    content: toy izay harena be nefa misy tebiteby.
  '17':
  - type: text
    content: Aleo sakafo anana arahim-pitiavana
  - type: text
    content: toy izay omby mifahy arahim-pankahalana.
  '18':
  - type: text
    content: Izay malaky tezitra dia manetsika ady,
  - type: text
    content: fa izay mahatsindry fo no mampitsahatra fifandirana.
  '19':
  - type: text
    content: Ny lalan’ny malaina dia toy ny fefy tsilo,
  - type: text
    content: fa ny lalan’ny marina dia lalambe voalamina tsara.
  '2':
  - type: text
    content: Mahatonga ny fahalalana ho mahafinaritra ny lelan’ny hendry,
  - type: text
    content: fa miboiboika hadalana ny tenin’ny adala.
  '20':
  - type: text
    content: Ny zanaka hendry dia mahafaly ny rainy,
  - type: text
    content: fa ny lehilahy adala manao tsinontsinona ny reniny.
  '21':
  - type: text
    content: Ny fahadalana dia fifalian’ny tsy ampy saina,
  - type: text
    content: fa ny manan-tsaina kosa mizotra mahitsy.
  '22':
  - type: text
    content: Ho foana ny tetikasa raha tsy misy fiheveran-draharaha,
  - type: text
    content: fa raha maro ny mpanolotsaina dia tanteraka izany.
  '23':
  - type: text
    content: Faly ny olona raha mahay mamaly resaka tsara izy,
  - type: text
    content: ary endre ny hatsaran’ny teny atao amin’ny fotoana mahamety azy!
  '24':
  - type: text
    content: Lalan’aina ho any ambony no alehan’ny hendry
  - type: text
    content: hanalavirany ny fitoeran’ny maty any ambany,
  '25':
  - type: text
    content: Arodan’NY TOMPO ny tranon’ny mpiavonavona,
  - type: text
    content: fa ataony mafy orina ny fanamarihana ny zaratanin’ny mpitondratena.
  '26':
  - type: text
    content: Fahavetavetana eo imason’NY TOMPO ny eritreritra hanao ratsy,
  - type: text
    content: fa ny teny mamy dia madio.
  '27':
  - type: text
    content: Izay fatra-pila harena tsy marina dia mampidi-doza amin’ny ankohonany,
  - type: text
    content: fa izay mankahala kolikoly no ho velona.
  '28':
  - type: text
    content: Ny fon’ny marina misaintsaina vao mamaly,
  - type: text
    content: fa ny vavan’ny ratsy fanahy kosa miboiboika loza.
  '29':
  - type: text
    content: Lavitra ny ratsy fanahy NY TOMPO,
  - type: text
    content: fa ny vavaka ataon’ny marina no henoiny.
  '3':
  - type: text
    content: Amin’ny toerana rehetra ny mason’NY TOMPO,
  - type: text
    content: manara-maso ny ratsy fanahy sy ny tsara fanahy.
  '30':
  - type: text
    content: Ny fijery mamiratra dia mahafaly ny fo
  - type: text
    content: ary mamelombelona ny taolana ny filazana soa.
  '31':
  - type: text
    content: Ny sofina izay mihaino anatra mahavelona
  - type: text
    content: dia miara-mitoetra amin’ny hendry.
  '32':
  - type: text
    content: Izay mandà anatra dia manao tsinontsinona ny tenany,
  - type: text
    content: fa izay mihaino fananarana no mahazo fahalalana.
  - type: heading
    content: NY TOMPO sy ny fiainana andavanandro
  '33':
  - type: text
    content: Ny fahatahorana NY TOMPO dia fitaizana mampahahendry
  - type: text
    content: ary ny fanetren-tena dia mialoha ny voninahitra.
  '4':
  - type: text
    content: Ny teny mampitony dia hazon’aina,
  - type: text
    content: fa ny vava ratsy mandratra ny fanahy.
  '5':
  - type: text
    content: Ny adala maniratsira ny anatry ny rainy,
  - type: text
    content: fa izay mitandrina ny fananarana no hita fa hendry.
  '6':
  - type: text
    content: Misy harena be ao an-tranon’ny marina,
  - type: text
    content: fa ny fitomboan’ny harenan’ny ratsy fanahy dia misy loza.
  '7':
  - type: text
    content: Ny molotry ny hendry dia mampiely fahendrena,
  - type: text
    content: fa tsy mba toy izany ny fon’ny adala.
  '8':
  - type: text
    content: Ny fanatitry ny ratsy fanahy dia fahavetavetana eo imason’NY TOMPO,
  - type: text
    content: fa ny vavaka ataon’ny marina no sitrany.
  '9':
  - type: text
    content: Fahavetavetana eo imason’NY TOMPO ny lalan’ny ratsy fanahy,
  - type: text
    content: fa izay mikatsaka ny fahamarinana no tiany.
