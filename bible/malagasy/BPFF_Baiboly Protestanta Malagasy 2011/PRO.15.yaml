document_id: PRO.15
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny valinteny mora dia mampihemotra ny fahatezerana mafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny teny maharary dia mampiakatra ny fahasosorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mahatonga ny fahalalana ho mahafinaritra ny lelan’ny hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa miboiboika hadalana ny tenin’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Amin’ny toerana rehetra ny mason’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manara-maso ny ratsy fanahy sy ny tsara fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny teny mampitony dia hazon’aina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vava ratsy mandratra ny fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny adala maniratsira ny anatry ny rainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mitandrina ny fananarana no hita fa hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Misy harena be ao an-tranon’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fitomboan’ny harenan’ny ratsy fanahy dia misy loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny molotry ny hendry dia mampiely fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mba toy izany ny fon’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny fanatitry ny ratsy fanahy dia fahavetavetana eo imason’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vavaka ataon’ny marina no sitrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fahavetavetana eo imason’NY TOMPO ny lalan’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mikatsaka ny fahamarinana no tiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Famaizana mafy no hihatra amin’izay miala amin’ny lalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, izay mankahala anatra dia ho faty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' sy ny fandringanana aza dia miharihary eo anatrehan’NY TOMPO,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa mainka ny fon’ny zanak’olombelona!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy tian’ny mpaniratsira izay mananatra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mety manatona ny hendry izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mahamiramirana ny tarehy ny fo ravoravo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny alahelon’ny fo dia mahareraka ny fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fon’ny manan-tsaina dia mitady fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny adala dia mankamamy ny fahadalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ratsy avokoa ny andron’ny ory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny faharavoravoana am-po dia sakafom-panasana mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aleo kely misy fahatahorana NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay harena be nefa misy tebiteby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aleo sakafo anana arahim-pitiavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay omby mifahy arahim-pankahalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay malaky tezitra dia manetsika ady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mahatsindry fo no mampitsahatra fifandirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny lalan’ny malaina dia toy ny fefy tsilo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lalan’ny marina dia lalambe voalamina tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny zanaka hendry dia mahafaly ny rainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lehilahy adala manao tsinontsinona ny reniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny fahadalana dia fifalian’ny tsy ampy saina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny manan-tsaina kosa mizotra mahitsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ho foana ny tetikasa raha tsy misy fiheveran-draharaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha maro ny mpanolotsaina dia tanteraka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Faly ny olona raha mahay mamaly resaka tsara izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary endre ny hatsaran’ny teny atao amin’ny fotoana mahamety azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Lalan’aina ho any ambony no alehan’ny hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanalavirany ny fitoeran’ny maty any ambany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Arodan’NY TOMPO ny tranon’ny mpiavonavona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ataony mafy orina ny fanamarihana ny zaratanin’ny mpitondratena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fahavetavetana eo imason’NY TOMPO ny eritreritra hanao ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny teny mamy dia madio.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay fatra-pila harena tsy marina dia mampidi-doza amin’ny ankohonany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mankahala kolikoly no ho velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny fon’ny marina misaintsaina vao mamaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vavan’ny ratsy fanahy kosa miboiboika loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lavitra ny ratsy fanahy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vavaka ataon’ny marina no henoiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny fijery mamiratra dia mahafaly ny fo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamelombelona ny taolana ny filazana soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny sofina izay mihaino anatra mahavelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miara-mitoetra amin’ny hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izay mandà anatra dia manao tsinontsinona ny tenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mihaino fananarana no mahazo fahalalana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO sy ny fiainana andavanandro
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny fahatahorana NY TOMPO dia fitaizana mampahahendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanetren-tena dia mialoha ny voninahitra.
