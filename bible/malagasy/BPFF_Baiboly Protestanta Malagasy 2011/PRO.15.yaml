document_id: PRO.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny valinteny mora dia mampihemotra ny fahatezerana mafy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny teny maharary dia mampiakatra ny fahasosorana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Famaizana mafy no hihatra amin’izay miala amin’ny lalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, izay mankahala anatra dia ho faty.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' sy ny fandringanana aza dia miharihary eo anatrehan’NY TOMPO,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa mainka ny fon’ny zanak’olombelona!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy tian’ny mpaniratsira izay mananatra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mety manatona ny hendry izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahamiramirana ny tarehy ny fo ravoravo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny alahelon’ny fo dia mahareraka ny fanahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fon’ny manan-tsaina dia mitady fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny adala dia mankamamy ny fahadalana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ratsy avokoa ny andron’ny ory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny faharavoravoana am-po dia sakafom-panasana mandrakariva.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo kely misy fahatahorana NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay harena be nefa misy tebiteby.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo sakafo anana arahim-pitiavana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay omby mifahy arahim-pankahalana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay malaky tezitra dia manetsika ady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mahatsindry fo no mampitsahatra fifandirana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lalan’ny malaina dia toy ny fefy tsilo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lalan’ny marina dia lalambe voalamina tsara.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatonga ny fahalalana ho mahafinaritra ny lelan’ny hendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa miboiboika hadalana ny tenin’ny adala.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanaka hendry dia mahafaly ny rainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lehilahy adala manao tsinontsinona ny reniny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahadalana dia fifalian’ny tsy ampy saina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny manan-tsaina kosa mizotra mahitsy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho foana ny tetikasa raha tsy misy fiheveran-draharaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha maro ny mpanolotsaina dia tanteraka izany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faly ny olona raha mahay mamaly resaka tsara izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary endre ny hatsaran’ny teny atao amin’ny fotoana mahamety azy!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lalan’aina ho any ambony no alehan’ny hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanalavirany ny fitoeran’ny maty any ambany,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arodan’NY TOMPO ny tranon’ny mpiavonavona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ataony mafy orina ny fanamarihana ny zaratanin’ny mpitondratena.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahavetavetana eo imason’NY TOMPO ny eritreritra hanao ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny teny mamy dia madio.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay fatra-pila harena tsy marina dia mampidi-doza amin’ny ankohonany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mankahala kolikoly no ho velona.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fon’ny marina misaintsaina vao mamaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vavan’ny ratsy fanahy kosa miboiboika loza.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lavitra ny ratsy fanahy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vavaka ataon’ny marina no henoiny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny toerana rehetra ny mason’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manara-maso ny ratsy fanahy sy ny tsara fanahy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fijery mamiratra dia mahafaly ny fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamelombelona ny taolana ny filazana soa.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sofina izay mihaino anatra mahavelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miara-mitoetra amin’ny hendry.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mandà anatra dia manao tsinontsinona ny tenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mihaino fananarana no mahazo fahalalana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: NY TOMPO sy ny fiainana andavanandro
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatahorana NY TOMPO dia fitaizana mampahahendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanetren-tena dia mialoha ny voninahitra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny teny mampitony dia hazon’aina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vava ratsy mandratra ny fanahy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny adala maniratsira ny anatry ny rainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mitandrina ny fananarana no hita fa hendry.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy harena be ao an-tranon’ny marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fitomboan’ny harenan’ny ratsy fanahy dia misy loza.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny molotry ny hendry dia mampiely fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mba toy izany ny fon’ny adala.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanatitry ny ratsy fanahy dia fahavetavetana eo imason’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vavaka ataon’ny marina no sitrany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahavetavetana eo imason’NY TOMPO ny lalan’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mikatsaka ny fahamarinana no tiany.
