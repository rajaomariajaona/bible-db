document_id: JOL.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Firohotry ny andiam-bibikely sy ny fahamainan’ny tany
  - type: text
    content: Ny tenin’NY TOMPO, izay tonga tamin’i Joela, zanak’i Petoela.
  '10':
  - type: text
    content: Rava ny saha,
  - type: text
    content: misaona ny tany fambolena;
  - type: text
    content: fa simba ny vary,
  - type: text
    content: ritra ny ranom-boaloboka,
  - type: text
    content: maina ny diloilo.
  '11':
  - type: text
    content: Aoka ho menatra ianareo mpiasa tany;
  - type: text
    content: midradradradrà, ianareo mpikarakara ny tanim-boaloboka,
  - type: text
    content: noho ireo varimbazaha isan-karazany;
  - type: text
    content: fa majifa ny vokatry ny saha,
  '12':
  - type: text
    content: maina ny voaloboka,
  - type: text
    content: malazo ny aviavy
  - type: text
    content: ary malazo koa ny ampongabendanitra sy ny palma ary ny paoma,
  - type: text
    content: dia ny hazo rehetra any an-tsaha;
  - type: text
    content: eny, malazo ny fifalian’ny zanak’olombelona.
  - type: heading
    content: Antso ho amin’ny fifadian-kanina mba ho fifonana amin’ny TOMPO
  '13':
  - type: text
    content: Misikìna sy mitomania, ianareo mpisorona;
  - type: text
    content: midradradradrà, ianareo mpanao fanompoam-pivavahana eo amin’ny alitara;
  - type: text
    content: andeha mandry amin’ny lamba fisaonana mandritra ny alina,
  - type: text
    content: ianareo mpanao fanompoam-pivavahana ho an’Andriamanitro,
  - type: text
    content: fa tsy ho hita intsony ao amin’ny tranon’Andriamanitra
  - type: text
    content: ny fanatitra avy amin’ny zavamaniry sy ny fanatitra aidina.
  '14':
  - type: text
    content: Manamasìna andro fifadian-kanina, miantsoa fivoriana masina,
  - type: text
    content: angony ny zokiolona sy ny mponina rehetra amin’ny tany
  - type: text
    content: ho ao amin’ny tranon’NY TOMPO Andriamanitrareo,
  - type: text
    content: ary aoka hitaraina amin’NY TOMPO.
  - type: heading
    content: Ny Andron’NY TOMPO, andro fandringanana
  '15':
  - type: text
    content: Indrisy ny andro!
  - type: text
    content: Fa efa antomotra ny Andron’NY TOMPO
  - type: text
    content: ka tahaka ny fandringanana avy amin’ny Tsitoha no fiaviny.
  '16':
  - type: text
    content: Moa tsy efa nesorina teo imasontsika va ny hanina,
  - type: text
    content: eny, ny fifaliana sy ny faharavoravoana
  - type: text
    content: tsy ho ao amin’ny tranon’Andriamanitsika?
  '17':
  - type: text
    content: Matimaso ao ambanin’ny baingan-tany ny vary nafafy,
  - type: text
    content: foana ny sompitra,
  - type: text
    content: mirodana ny trano fitahirizam-bary
  - type: text
    content: fa nalazo ny vary.
  '18':
  - type: text
    content: Indrisy ny fitoreon’ny biby!
  - type: text
    content: Very hevitra ny andian’omby
  - type: text
    content: satria tsy misy ahitra ho azy;
  - type: text
    content: eny, na dia ny andian’ny ondry aman’osy aza dia mijaly noho izany.
  - type: heading
    content: Vavaky ny mpaminany
  '19':
  - type: text
    content: TOMPO ô, Ianao no itarainako!
  - type: text
    content: Fa efa levon’ny afo ny kijana any an-tany efitra
  - type: text
    content: ary nisy lelafo nandoro ny hazo rehetra any an-tsaha.
  '2':
  - type: text
    content: Henoy izao, ry zokiolona!
  - type: text
    content: Ary atongilano ny sofinareo, ry mponina rehetra amin’ny tany!
  - type: text
    content: Moa mba efa nisy tamin’ny andronareo
  - type: text
    content: na tamin’ny andron’ny razanareo va izao?
  '20':
  - type: text
    content: Na dia ny biby any an-tsaha aza dia mihanahana miandrandra Anao
  - type: text
    content: satria ritra ny lohasahan-driaka
  - type: text
    content: ary efa levon’ny afo ny kijana any an-tany efitra.
  '3':
  - type: text
    content: Lazao amin’ny zanakareo izao
  - type: text
    content: ary aoka hilaza amin’ny zanany kosa ny zanakareo
  - type: text
    content: ary ny zanak’ireo kosa indray dia hilaza amin’ny taranaka mandimby azy.
  '4':
  - type: text
    content: Izay sisan’ny kijeja
  - type: text
    content: dia nohanin’ny koraika;
  - type: text
    content: ary izay sisan’ny koraika
  - type: text
    content: dia nohanin’ny valalavao;
  - type: text
    content: ary izay sisan’ny valalavao
  - type: text
    content: dia nohanin’ny sompanga.
  '5':
  - type: text
    content: Mifohaza, ianareo mpimamo, ka mitomania!
  - type: text
    content: Eny, midradradradrà, ianareo mpisotro divay rehetra,
  - type: text
    content: noho ny ranom-boaloboka
  - type: text
    content: satria nesorina tsy ho ao amin’ny vavanareo izany!
  '6':
  - type: text
    content: Fa misy firenena mahery sady tsy hita isa
  - type: text
    content: miakatra hamely ny taniko;
  - type: text
    content: ny nifiny dia nifin’ny lion-dahy,
  - type: text
    content: ary ny vazany dia vazan’ny liom-bavy.
  '7':
  - type: text
    content: Nataony simba tokoa ny voaloboko
  - type: text
    content: ary notapatapahiny ny aviaviko;
  - type: text
    content: nokikisany sy nendahany tanteraka ireny ka nariany,
  - type: text
    content: eny, tonga fotsy ny rantsany.
  '8':
  - type: text
    content: Midradradradrà toy ny virijiny misikina lamba fisaonana
  - type: text
    content: noho ny amin’ny vadin’ny fahatanorany.
  '9':
  - type: text
    content: Tsy hita ao amin’ny tranon’NY TOMPO intsony ny fanatitra hohanina sy ny fanatitra aidina;
  - type: text
    content: mitomany ny mpisorona, mpanao fanompoam-pivavahana ho an’NY TOMPO.
