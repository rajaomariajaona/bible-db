document_id: JOL.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Firohotry ny andiam-bibikely sy ny fahamainan’ny tany
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny tenin’NY TOMPO, izay tonga tamin’i Joela, zanak’i Petoela.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Rava ny saha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misaona ny tany fambolena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa simba ny vary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ritra ny ranom-boaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maina ny diloilo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Aoka ho menatra ianareo mpiasa tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: midradradradrà, ianareo mpikarakara ny tanim-boaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ireo varimbazaha isan-karazany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa majifa ny vokatry ny saha,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: maina ny voaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: malazo ny aviavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary malazo koa ny ampongabendanitra sy ny palma ary ny paoma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny hazo rehetra any an-tsaha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, malazo ny fifalian’ny zanak’olombelona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antso ho amin’ny fifadian-kanina mba ho fifonana amin’ny TOMPO
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Misikìna sy mitomania, ianareo mpisorona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: midradradradrà, ianareo mpanao fanompoam-pivavahana eo amin’ny alitara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andeha mandry amin’ny lamba fisaonana mandritra ny alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo mpanao fanompoam-pivavahana ho an’Andriamanitro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ho hita intsony ao amin’ny tranon’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanatitra avy amin’ny zavamaniry sy ny fanatitra aidina.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Manamasìna andro fifadian-kanina, miantsoa fivoriana masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: angony ny zokiolona sy ny mponina rehetra amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho ao amin’ny tranon’NY TOMPO Andriamanitrareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hitaraina amin’NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Andron’NY TOMPO, andro fandringanana
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Indrisy ny andro!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa antomotra ny Andron’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tahaka ny fandringanana avy amin’ny Tsitoha no fiaviny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Moa tsy efa nesorina teo imasontsika va ny hanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny fifaliana sy ny faharavoravoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho ao amin’ny tranon’Andriamanitsika?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Matimaso ao ambanin’ny baingan-tany ny vary nafafy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: foana ny sompitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mirodana ny trano fitahirizam-bary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nalazo ny vary.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Indrisy ny fitoreon’ny biby!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Very hevitra ny andian’omby
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy misy ahitra ho azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, na dia ny andian’ny ondry aman’osy aza dia mijaly noho izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaky ny mpaminany
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: TOMPO ô, Ianao no itarainako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa levon’ny afo ny kijana any an-tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nisy lelafo nandoro ny hazo rehetra any an-tsaha.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Henoy izao, ry zokiolona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary atongilano ny sofinareo, ry mponina rehetra amin’ny tany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa mba efa nisy tamin’ny andronareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na tamin’ny andron’ny razanareo va izao?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Na dia ny biby any an-tsaha aza dia mihanahana miandrandra Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ritra ny lohasahan-driaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa levon’ny afo ny kijana any an-tany efitra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Lazao amin’ny zanakareo izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hilaza amin’ny zanany kosa ny zanakareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zanak’ireo kosa indray dia hilaza amin’ny taranaka mandimby azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izay sisan’ny kijeja
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nohanin’ny koraika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay sisan’ny koraika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nohanin’ny valalavao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay sisan’ny valalavao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nohanin’ny sompanga.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mifohaza, ianareo mpimamo, ka mitomania!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, midradradradrà, ianareo mpisotro divay rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny ranom-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nesorina tsy ho ao amin’ny vavanareo izany!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa misy firenena mahery sady tsy hita isa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miakatra hamely ny taniko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny nifiny dia nifin’ny lion-dahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vazany dia vazan’ny liom-bavy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nataony simba tokoa ny voaloboko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary notapatapahiny ny aviaviko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nokikisany sy nendahany tanteraka ireny ka nariany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tonga fotsy ny rantsany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Midradradradrà toy ny virijiny misikina lamba fisaonana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny amin’ny vadin’ny fahatanorany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsy hita ao amin’ny tranon’NY TOMPO intsony ny fanatitra hohanina sy ny fanatitra aidina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitomany ny mpisorona, mpanao fanompoam-pivavahana ho an’NY TOMPO.
