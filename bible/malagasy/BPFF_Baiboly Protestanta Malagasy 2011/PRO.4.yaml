document_id: PRO.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fikatsahana sy ny fitahirizana ny fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Henoinareo, anaka, ny anatry ny ray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tandremo izany mba hahazoanareo ny fahalalana tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa anatra tsara no omeko anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza mahafoy ny fampianarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa zanak’Ikaky aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady malala no tokana teo imason’Ineny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nampianatra ahy izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny fonao hihazona ny teniko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tandremo ny didiko dia ho velona ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mikatsaha fahendrena, mikatsaha fahiratan-tsaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza hadinoina na ialana ny teny efa nataoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza mahafoy azy fa hiaro anao izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tiavo izy dia hitandrina anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny fiandohan’ny fahendrena dia izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mikatsaha fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, lanio ny fanananao rehetra hividianana fahalalana tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Asandrato izy dia hanandratra anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hanome voninahitra anao izy raha fihininao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: hasiany fehiloha mahafinaritra ny lohanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, satroboninahitra tsara tarehy no homeny anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanalavirana ny lalan’ny ratsy fanahy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mihainoa anaka ka raiso ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihamaro ny taona hiainanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lalam-pahendrena no atoroko anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mitarika anao amin’ny lalana mahitsy aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha mandeha ianao dia tsy ho voasembantsembana ny dianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mihazakazaka ianao dia tsy ho tafintohina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tano mafy ny fananarana ka aza avela hiala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hazòny izy fa ainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aza mankany amin’ny alehan’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mizotra amin’ny lalan’ny mpanao ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Manalavira azy, aza mandalo eo akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mivilia hiala aminy ka mizora amin’ny lalanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa tsy matory ireny raha tsy efa nahavita izay ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mahita tory izy raha tsy efa nahalavo olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa mihinana mofo avy amin’ny fanaovan-dratsy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misotro divay azo tamin’ny herisetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa ny lalan’ny marina dia toy ny hazavana mamiratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay miha mazava hatrany, mandra-piposaky ny andro antoandro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny lalan’ny ratsy fanahy dia toy ny haizim-pito;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy fantany akory izay mahatafintohina azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahadiovam-po sy fijoroana tsara
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Anaka, tandremo ny teniko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: atongilano ny sofinao hihaino izay ambarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aza avela hiala eo imasonao izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raketo ao anatin’ny fonao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: fa aina ho an’izay mahazo azy izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fanasitranana ho an’ny tenany manontolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tandremo ny fonao mihoatra noho izay rehetra tokony hotandremana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa avy ao aminy ny loharanon’ny aina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Esory aminao ny fiteny mandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampanalaviro anao ny molotra mamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aoka ny masonao hijery mahitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hodimasonao hibanjina eo anoloanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ataovy marina ny lalana alehan’ny tongotrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho voalamina ny alehanao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Aza mivily, na ho amin’ny ankavanana, na ho amin’ny ankavia;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hihataka amin’ny ratsy ny tongotrao.
