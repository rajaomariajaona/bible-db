document_id: PRO.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fikatsahana sy ny fitahirizana ny fahendrena
  - type: text
    content: Henoinareo, anaka, ny anatry ny ray,
  - type: text
    content: ary tandremo izany mba hahazoanareo ny fahalalana tsara.
  '10':
  - type: text
    content: Mihainoa anaka ka raiso ny teniko,
  - type: text
    content: dia hihamaro ny taona hiainanao.
  '11':
  - type: text
    content: Lalam-pahendrena no atoroko anao;
  - type: text
    content: eny, mitarika anao amin’ny lalana mahitsy aho.
  '12':
  - type: text
    content: Raha mandeha ianao dia tsy ho voasembantsembana ny dianao;
  - type: text
    content: raha mihazakazaka ianao dia tsy ho tafintohina.
  '13':
  - type: text
    content: Tano mafy ny fananarana ka aza avela hiala;
  - type: text
    content: hazòny izy fa ainao.
  '14':
  - type: text
    content: Aza mankany amin’ny alehan’ny ratsy fanahy,
  - type: text
    content: ary aza mizotra amin’ny lalan’ny mpanao ratsy.
  '15':
  - type: text
    content: Manalavira azy, aza mandalo eo akory;
  - type: text
    content: mivilia hiala aminy ka mizora amin’ny lalanao.
  '16':
  - type: text
    content: Fa tsy matory ireny raha tsy efa nahavita izay ratsy,
  - type: text
    content: ary tsy mahita tory izy raha tsy efa nahalavo olona.
  '17':
  - type: text
    content: Fa mihinana mofo avy amin’ny fanaovan-dratsy izy,
  - type: text
    content: ary misotro divay azo tamin’ny herisetra.
  '18':
  - type: text
    content: Fa ny lalan’ny marina dia toy ny hazavana mamiratra,
  - type: text
    content: izay miha mazava hatrany, mandra-piposaky ny andro antoandro.
  '19':
  - type: text
    content: Ny lalan’ny ratsy fanahy dia toy ny haizim-pito;
  - type: text
    content: tsy fantany akory izay mahatafintohina azy.
  - type: heading
    content: Fahadiovam-po sy fijoroana tsara
  '2':
  - type: text
    content: Fa anatra tsara no omeko anareo;
  - type: text
    content: aza mahafoy ny fampianarako.
  '20':
  - type: text
    content: Anaka, tandremo ny teniko;
  - type: text
    content: atongilano ny sofinao hihaino izay ambarako.
  '21':
  - type: text
    content: Aza avela hiala eo imasonao izany
  - type: text
    content: fa raketo ao anatin’ny fonao;
  '22':
  - type: text
    content: fa aina ho an’izay mahazo azy izany
  - type: text
    content: ary fanasitranana ho an’ny tenany manontolo.
  '23':
  - type: text
    content: Tandremo ny fonao mihoatra noho izay rehetra tokony hotandremana,
  - type: text
    content: fa avy ao aminy ny loharanon’ny aina.
  '24':
  - type: text
    content: Esory aminao ny fiteny mandainga,
  - type: text
    content: ary ampanalaviro anao ny molotra mamitaka.
  '25':
  - type: text
    content: Aoka ny masonao hijery mahitsy,
  - type: text
    content: ary ny hodimasonao hibanjina eo anoloanao.
  '26':
  - type: text
    content: Ataovy marina ny lalana alehan’ny tongotrao,
  - type: text
    content: ary aoka ho voalamina ny alehanao rehetra.
  '27':
  - type: text
    content: Aza mivily, na ho amin’ny ankavanana, na ho amin’ny ankavia;
  - type: text
    content: aoka hihataka amin’ny ratsy ny tongotrao.
  '3':
  - type: text
    content: Fa zanak’Ikaky aho,
  - type: text
    content: sady malala no tokana teo imason’Ineny.
  '4':
  - type: text
    content: 'Nampianatra ahy izy hoe:'
  - type: text
    content: Aoka ny fonao hihazona ny teniko!
  - type: text
    content: Tandremo ny didiko dia ho velona ianao.
  '5':
  - type: text
    content: Mikatsaha fahendrena, mikatsaha fahiratan-tsaina;
  - type: text
    content: aza hadinoina na ialana ny teny efa nataoko.
  '6':
  - type: text
    content: Aza mahafoy azy fa hiaro anao izy;
  - type: text
    content: tiavo izy dia hitandrina anao.
  '7':
  - type: text
    content: 'Ny fiandohan’ny fahendrena dia izao:'
  - type: text
    content: Mikatsaha fahendrena;
  - type: text
    content: eny, lanio ny fanananao rehetra hividianana fahalalana tsara.
  '8':
  - type: text
    content: Asandrato izy dia hanandratra anao;
  - type: text
    content: eny, hanome voninahitra anao izy raha fihininao;
  '9':
  - type: text
    content: hasiany fehiloha mahafinaritra ny lohanao;
  - type: text
    content: eny, satroboninahitra tsara tarehy no homeny anao.
  - type: heading
    content: Fanalavirana ny lalan’ny ratsy fanahy
