document_id: PSA.68,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hira fiderana hitsenana an’Andriamanitra Mpandresy
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida. Tononkira.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Aoka hitsangana Andriamanitra ka hiely ny fahavalony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka izay mankahala Azy handositra ny tavany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny olonao dia monina ao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamponina ny ory araka ny fahasoavanao Ianao, Andriamanitra ô.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny Tompo manome teny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny vehivavy mpilaza soa dia antokony lehibe:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ireo mpanjaka be miaramila dia vaky mandositra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vehivavy izay mitoetra ao an-trano no mizara ny babo.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Raha mandry any amin’ny vala ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ela-boromailala dia miravaka volafotsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny volony dia miravaka volamena.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tamin’ny nanelezan’ny Tsitoha ny mpanjaka maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia latsaka tao Zalmona ny orampanala.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tendrombohitr’Andriamanitra ny tendrombohitr’i Basana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tendrombohitra maro tampona ny tendrombohitr’i Basana.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ry tendrombohitra maro tampona, nahoana ianareo no mialona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tendrombohitra izay tian’Andriamanitra itoerana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hitoetra ao mandrakizay NY TOMPO.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny kalesin’Andriamanitra dia an’arivo sy an’alinalina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Tompo no eo amin’ireo; i Sinay dia eo amin’ny fitoerana masina.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Niakatra ho any amin’ny avo Ianao ka nitondra babo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nandray fanomezana teo amin’ny olombelona Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, teo amin’ny maditra aza mba hitoeran’NY TOMPO Andriamanitra any
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ao aminy; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mba hitoeranao any, ry TOMPO Andriamanitra; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Efa nandray olona ho fanomezana Ianao, eny, na dia ny maditra aza, mba hitoerany ao amin’NY TOMPO Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Isaorana isanandro isanandro anie ny Tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha misy mahavesatra antsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia Andriamanitra no famonjena antsika. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tahaka ny fanely setroka no fanelinao azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny fiempon’ny savoka eo anoloan’ny afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no aoka hahalevonan’ny ratsy fanahy eo anatrehan’Andriamanitra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Andriamanitra no Andriamanitry ny famonjena ho antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an’NY TOMPO Andriamanitra ny fanafahana amin’ny fahafatesana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa Andriamanitra manapotika ny lohan’ny fahavalony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tampon-doha lava volo an’izay mandroso amin’ny fahadisoany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hoy ny Tompo: Hampody ny any Basana Aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampody ny avy amin’ny ranomasina lalina Aho,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: mba hampihosenanao ra ny tongotrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahavalo ho anjaran’ny lelan’ny amboanao.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Hita ny filaharan’ny olonao, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fiavianao, Andriamanitro, Mpanjakako, ao amin’ny fitoerana masina.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Mialoha ny mpihira, manaraka ny mpitendry valiha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo afovoan’ny zatovovavy mively ampongatapaka.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Misaora an’Andriamanitra eo amin’ny fiangonana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, misaora NY TOMPO, ianareo avy amin’ny loharanon’ny Israely.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Indrỳ i Benjamina izay zandriny indrindra ary mitari-dalana azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny antokon’ny mpanapaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joda
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanapaka ny Zebolona sy ny mpanapaka ny Naftaly.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Andriamanitrao no nandidy mba hahery ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô! Asehoy ny herinao amin’izay nataonao ho anay,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: avy ao amin’ny tempolinao eo an-tampon’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay itondran’ny mpanjaka maro fanatitra ho Anao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa mifaly ny marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ravoravo eo anatrehan’Andriamanitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoby sy mifaly izy!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Teneno mafy ny biby eny anaty zozoro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fivorian’ny ombilahy mbamin’ireo andian-janak’omby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay miankohoka manolotra anjam-bolafotsy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aelezo ny olona tia ady.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ho avy ny tremalahin’i Ejipta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Kosy dia halaky hananty tanana amin’Andriamanitra.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ianareo fanjakana ambonin’ny tany, mihirà ho an’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mankalazà ny Tompo. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ilay mitaingina ny lanitry ny lanitra izay hatry ny fahagola,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro, mamoaka ny feony Izy, dia feo mahery.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ekeo ho an’Andriamanitra ny hery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambonin’ny Israely ny voninahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny heriny dia eny amin’ny rahona.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Mahatahotra Ianao, Andriamanitra ô, ao amin’ny fitoeranao masina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitry ny Israely no manome hery sy tanjaka ho an’ny firenena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie Andriamanitra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mihirà ho an’Andriamanitra, mankalazà ny anarany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manamboara lalana ho an’Izay mitaingina ny kalesiny mamakivaky ny tany efitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no anarany. Miravoravoa eo anatrehany!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Rain’ny kamboty sy mpanome rariny ny mpitondratena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ao amin’ny fonenany masina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Andriamanitra mampitoetra an-trano izay manirery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamoaka ny mpifatotra ho amin’ny fanambinana Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny maditra irery no hitoetra amin’ny tany karankaina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Andriamanitra ô, fony Ianao nandeha teo alohan’ny olonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka namakivaky ny tany efitra '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: dia nihorohoro ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nitaitaika ny lanitra tamin’ny fanatrehan’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia irỳ Sinay irỳ izany, tamin’ny fanatrehan’Andriamanitra, Andriamanitry ny Israely.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ranonoram-pitahiana no nalatsakao tamin’ny lovanao, Andriamanitra ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha kotsa izy dia novelombelominao.
