document_id: PSA.68,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fiderana hitsenana an’Andriamanitra Mpandresy
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida. Tononkira.
  - type: text
    content: Aoka hitsangana Andriamanitra ka hiely ny fahavalony
  - type: text
    content: ary aoka izay mankahala Azy handositra ny tavany.
  '10':
  - type: text
    content: Ny olonao dia monina ao;
  - type: text
    content: mamponina ny ory araka ny fahasoavanao Ianao, Andriamanitra ô.
  '11':
  - type: text
    content: Ny Tompo manome teny
  - type: text
    content: 'ary ny vehivavy mpilaza soa dia antokony lehibe:'
  '12':
  - type: text
    content: Ireo mpanjaka be miaramila dia vaky mandositra
  - type: text
    content: ary ny vehivavy izay mitoetra ao an-trano no mizara ny babo.
  '13':
  - type: text
    content: Raha mandry any amin’ny vala ianareo,
  - type: text
    content: ny ela-boromailala dia miravaka volafotsy
  - type: text
    content: ary ny volony dia miravaka volamena.
  '14':
  - type: text
    content: Tamin’ny nanelezan’ny Tsitoha ny mpanjaka maro
  - type: text
    content: dia latsaka tao Zalmona ny orampanala.
  '15':
  - type: text
    content: Tendrombohitr’Andriamanitra ny tendrombohitr’i Basana.
  - type: text
    content: Tendrombohitra maro tampona ny tendrombohitr’i Basana.
  '16':
  - type: text
    content: Ry tendrombohitra maro tampona, nahoana ianareo no mialona
  - type: text
    content: ny tendrombohitra izay tian’Andriamanitra itoerana?
  - type: text
    content: Eny, hitoetra ao mandrakizay NY TOMPO.
  '17':
  - type: text
    content: Ny kalesin’Andriamanitra dia an’arivo sy an’alinalina;
  - type: text
    content: Ny Tompo no eo amin’ireo; i Sinay dia eo amin’ny fitoerana masina.
  '18':
  - type: text
    content: Niakatra ho any amin’ny avo Ianao ka nitondra babo;
  - type: text
    content: nandray fanomezana teo amin’ny olombelona Ianao;
  - type: text
    content: eny, teo amin’ny maditra aza mba hitoeran’NY TOMPO Andriamanitra any
  - type: note
    content: 'Na: ao aminy; na: mba hitoeranao any, ry TOMPO Andriamanitra; na: Efa nandray olona ho fanomezana Ianao, eny, na dia ny maditra aza, mba hitoerany ao amin’NY TOMPO Andriamanitra.'
  - type: text
    content: .
  '19':
  - type: text
    content: Isaorana isanandro isanandro anie ny Tompo;
  - type: text
    content: raha misy mahavesatra antsika
  - type: text
    content: 'dia Andriamanitra no famonjena antsika. '
  - type: text
    content: Fiatoana.
  '2':
  - type: text
    content: Tahaka ny fanely setroka no fanelinao azy;
  - type: text
    content: tahaka ny fiempon’ny savoka eo anoloan’ny afo
  - type: text
    content: no aoka hahalevonan’ny ratsy fanahy eo anatrehan’Andriamanitra.
  '20':
  - type: text
    content: Andriamanitra no Andriamanitry ny famonjena ho antsika;
  - type: text
    content: an’NY TOMPO Andriamanitra ny fanafahana amin’ny fahafatesana.
  '21':
  - type: text
    content: Fa Andriamanitra manapotika ny lohan’ny fahavalony,
  - type: text
    content: dia ny tampon-doha lava volo an’izay mandroso amin’ny fahadisoany.
  '22':
  - type: text
    content: 'Hoy ny Tompo: Hampody ny any Basana Aho;'
  - type: text
    content: hampody ny avy amin’ny ranomasina lalina Aho,
  '23':
  - type: text
    content: mba hampihosenanao ra ny tongotrao
  - type: text
    content: ary ny fahavalo ho anjaran’ny lelan’ny amboanao.
  '24':
  - type: text
    content: Hita ny filaharan’ny olonao, Andriamanitra ô,
  - type: text
    content: dia ny fiavianao, Andriamanitro, Mpanjakako, ao amin’ny fitoerana masina.
  '25':
  - type: text
    content: Mialoha ny mpihira, manaraka ny mpitendry valiha,
  - type: text
    content: eo afovoan’ny zatovovavy mively ampongatapaka.
  '26':
  - type: text
    content: Misaora an’Andriamanitra eo amin’ny fiangonana;
  - type: text
    content: eny, misaora NY TOMPO, ianareo avy amin’ny loharanon’ny Israely.
  '27':
  - type: text
    content: Indrỳ i Benjamina izay zandriny indrindra ary mitari-dalana azy,
  - type: text
    content: 'ny antokon’ny mpanapaka ny '
  - type: text
    content: Joda
  - type: text
    content: ','
  - type: text
    content: ny mpanapaka ny Zebolona sy ny mpanapaka ny Naftaly.
  '28':
  - type: text
    content: Andriamanitrao no nandidy mba hahery ianao.
  - type: text
    content: Andriamanitra ô! Asehoy ny herinao amin’izay nataonao ho anay,
  '29':
  - type: text
    content: avy ao amin’ny tempolinao eo an-tampon’i Jerosalema
  - type: text
    content: izay itondran’ny mpanjaka maro fanatitra ho Anao.
  '3':
  - type: text
    content: Fa mifaly ny marina;
  - type: text
    content: eny, ravoravo eo anatrehan’Andriamanitra izy,
  - type: text
    content: mihoby sy mifaly izy!
  '30':
  - type: text
    content: Teneno mafy ny biby eny anaty zozoro
  - type: text
    content: sy ny fivorian’ny ombilahy mbamin’ireo andian-janak’omby,
  - type: text
    content: dia izay miankohoka manolotra anjam-bolafotsy.
  - type: text
    content: Aelezo ny olona tia ady.
  '31':
  - type: text
    content: Ho avy ny tremalahin’i Ejipta;
  - type: text
    content: I Kosy dia halaky hananty tanana amin’Andriamanitra.
  '32':
  - type: text
    content: Ianareo fanjakana ambonin’ny tany, mihirà ho an’Andriamanitra,
  - type: text
    content: 'mankalazà ny Tompo. '
  - type: text
    content: Fiatoana.
  '33':
  - type: text
    content: Ilay mitaingina ny lanitry ny lanitra izay hatry ny fahagola,
  - type: text
    content: indro, mamoaka ny feony Izy, dia feo mahery.
  '34':
  - type: text
    content: Ekeo ho an’Andriamanitra ny hery;
  - type: text
    content: ambonin’ny Israely ny voninahiny
  - type: text
    content: ary ny heriny dia eny amin’ny rahona.
  '35':
  - type: text
    content: Mahatahotra Ianao, Andriamanitra ô, ao amin’ny fitoeranao masina;
  - type: text
    content: Andriamanitry ny Israely no manome hery sy tanjaka ho an’ny firenena.
  - type: text
    content: Isaorana anie Andriamanitra.
  '4':
  - type: text
    content: Mihirà ho an’Andriamanitra, mankalazà ny anarany!
  - type: text
    content: Manamboara lalana ho an’Izay mitaingina ny kalesiny mamakivaky ny tany efitra!
  - type: text
    content: NY TOMPO no anarany. Miravoravoa eo anatrehany!
  '5':
  - type: text
    content: Rain’ny kamboty sy mpanome rariny ny mpitondratena
  - type: text
    content: Andriamanitra ao amin’ny fonenany masina.
  '6':
  - type: text
    content: Andriamanitra mampitoetra an-trano izay manirery,
  - type: text
    content: mamoaka ny mpifatotra ho amin’ny fanambinana Izy;
  - type: text
    content: fa ny maditra irery no hitoetra amin’ny tany karankaina.
  '7':
  - type: text
    content: Andriamanitra ô, fony Ianao nandeha teo alohan’ny olonao
  - type: text
    content: 'ka namakivaky ny tany efitra '
  - type: text
    content: Fiatoana
  '8':
  - type: text
    content: dia nihorohoro ny tany
  - type: text
    content: ary nitaitaika ny lanitra tamin’ny fanatrehan’Andriamanitra,
  - type: text
    content: dia irỳ Sinay irỳ izany, tamin’ny fanatrehan’Andriamanitra, Andriamanitry ny Israely.
  '9':
  - type: text
    content: Ranonoram-pitahiana no nalatsakao tamin’ny lovanao, Andriamanitra ô!
  - type: text
    content: Ary raha kotsa izy dia novelombelominao.
