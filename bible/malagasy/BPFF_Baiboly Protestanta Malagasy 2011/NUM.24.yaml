document_id: NUM.24,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Rehefa hitan’i Balama fa sitraky NY TOMPO ny hitahy ny Israely dia tsy nandeha hanao sikidy tahaka ny teo aloha intsony izy fa nitodika nanatrika ny tany efitra fotsiny. '
  '10':
  - type: text
    content: 'Dia nirehitra tamin’i Balama ny fahatezeran’i Balaka ka niteha-tanana izy sady niteny tamin’i Balama hoe: Hanozona ny fahavaloko no niantsoako anao, kanefa dia efa nitsodrano azy intelo ianao izao! '
  '11':
  - type: text
    content: 'Koa ankehitriny, mandosira ho any amin’ny fonenanao ianao! Efa nilaza aho hoe: Hanome voninahitra anao tokoa aho; kanefa indro NY TOMPO efa nisakana anao tsy hahazo voninahitra.'
  - type: heading
    content: Ambaran’i Balama ny ho avy mamirapiratra ho an’ny Israely
  '12':
  - type: text
    content: 'Dia hoy i Balama tamin’i Balaka: Moa tsy efa nilaza tamin’ireo irakao izay nirahinao tany amiko va aho hoe: '
  '13':
  - type: text
    content: 'Na dia homen’i Balaka volafotsy sy volamena eran’ny tranony aza aho dia tsy mahazo manoatra ny didin’NY TOMPO, na hanao soa na hanao ratsy avy amin’ny saiko, fa izay holazain’NY TOMPO ihany no holazaiko? '
  '14':
  - type: text
    content: Ankehitriny, indro, handeha ho any amin’ny fireneko aho, dia aoka aho hampahafantatra anao ny amin’izay hataon’ity firenena ity amin’ny vahoakanao amin’ny andro ho avy.
  '15':
  - type: text
    content: 'Dia nilaza ny oha-teniny izy hoe:'
  - type: text
    content: Hoy i Balama, zanak’i Beora,
  - type: text
    content: dia ny lehilahy izay nampahiratina ny masony;
  '16':
  - type: text
    content: izay mandre ny tenin’Andriamanitra
  - type: text
    content: sady mahalala ny fahalalan’ny Avo Indrindra,
  - type: text
    content: izay mahita fahitana avy amin’ny Tsitoha,
  - type: text
    content: 'torana, kanefa nampahiratina ny masony:'
  '17':
  - type: text
    content: Hitako Izy nefa tsy ankehitriny.
  - type: text
    content: Tazako Izy nefa tsy akaiky.
  - type: text
    content: Misy kintana miseho avy amin’i Jakoba
  - type: text
    content: ary tehim-panjakana miposaka avy amin’Israely
  - type: text
    content: ka manapotika ny fihirifan’i Moaba
  - type: text
    content: sy ny karandohan’ireo mpitabataba rehetra.
  '18':
  - type: text
    content: I Edoma sy i Seìra fahavalony
  - type: text
    content: dia samy lasany
  - type: text
    content: ary dia mandroso amin-kery Israely.
  '19':
  - type: text
    content: Avy amin’i Jakoba no isehoan’Izay hanapaka
  - type: text
    content: ka handringana izay sisa tao an-tanàna.
  - type: heading
    content: Ambaran’i Balama ny hahalavo ireo fahavalon’ny Israely
  '2':
  - type: text
    content: 'Dia natopin’i Balama ny masony ka nahita ny Israely mitoby araka ny fokony avy izy. Ary ny Fanahin’Andriamanitra tonga tamin’i Balama. '
  '20':
  - type: text
    content: 'Nahita ny Amalekita koa izy dia nilaza ny oha-teniny hoe:'
  - type: text
    content: 'Voalohany tamin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' i Amaleka,'
  - type: text
    content: kanefa ho lany ringana ny hiafarany!
  '21':
  - type: text
    content: 'Ary nahita ny Kenita izy dia nilaza ny oha-teniny hoe:'
  - type: text
    content: Mafy orina ny fonenanao
  - type: text
    content: ary natao eo amin’ny vatolampy ny akaninao.
  '22':
  - type: text
    content: Kanefa ho lanin’ny afo i Kaina
  - type: text
    content: alohan’ny hamaboan’i Asira anao.
  '23':
  - type: text
    content: 'Dia nilaza ny oha-teniny koa izy hoe:'
  - type: text
    content: Indrisy! Iza no ho velona, raha manao izany Andriamanitra?
  '24':
  - type: text
    content: Ary hisy sambo avy any amin’ny tany Kitima
  - type: text
    content: ka hampietry an’i Asira ary hampietry an’i Ebera,
  - type: text
    content: ary izy koa dia ho lany ringana mandrakizay!
  '25':
  - type: text
    content: Dia niainga i Balama ka lasa nody tany amin’ny fonenany; i Balaka koa dia mba nandeha tany amin’izay nalehany.
  '3':
  - type: text
    content: 'Dia nilaza ny oha-teniny izy hoe:'
  - type: text
    content: Hoy i Balama, zanak’i Beora,
  - type: text
    content: dia ny lehilahy izay nampahiratina ny masony,
  '4':
  - type: text
    content: hoy ilay mandre ny tenin’Andriamanitra
  - type: text
    content: sady mahita fahitana avy amin’ny Tsitoha,
  - type: text
    content: 'torana, kanefa nampahiratina ny masony:'
  '5':
  - type: text
    content: Endre ny hatsaran’ny tranolainao, ry Jakoba ô!
  - type: text
    content: Sy ny lasinao, ry Israely ô!
  '6':
  - type: text
    content: Tahaka ny lohasaha misandrahaka,
  - type: text
    content: tahaka ny saha ao amoron’ny ony,
  - type: text
    content: tahaka ny hazo manitra nambolen’NY TOMPO,
  - type: text
    content: tahaka ny hazo sedera ao amoron-drano.
  '7':
  - type: text
    content: Mikoriana avy amin’ny sininy ny rano
  - type: text
    content: ary ny voa afafiny dia tondrahin’ny rano betsaka.
  - type: text
    content: Hisandratra noho i Agaga ny mpanjakany
  - type: text
    content: ary handroso voninahitra ny fanjakany.
  '8':
  - type: text
    content: Noentin’Andriamanitra nivoaka avy tany Ejipta izy
  - type: text
    content: ary manan-kery toy ny ombimanga.
  - type: text
    content: Handany ny Jentilisa fahavalony izy
  - type: text
    content: ka hotapatapahiny ny taolany,
  - type: text
    content: ary haripany amin’ny zana-tsipìkany izy.
  '9':
  - type: text
    content: Mamitsaka izy, mandry toy ny liona,
  - type: text
    content: ary toy ny liom-bavy, koa iza no hampitsangana azy?
  - type: text
    content: Hotahina anie izay manisy soa anao
  - type: text
    content: ary ho voaozona anie izay manozona anao!
