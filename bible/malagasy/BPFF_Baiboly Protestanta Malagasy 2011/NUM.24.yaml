document_id: NUM.24,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa hitan’i Balama fa sitraky NY TOMPO ny hitahy ny Israely dia tsy nandeha hanao sikidy tahaka ny teo aloha intsony izy fa nitodika nanatrika ny tany efitra fotsiny. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nirehitra tamin’i Balama ny fahatezeran’i Balaka ka niteha-tanana izy sady niteny tamin’i Balama hoe: Hanozona ny fahavaloko no niantsoako anao, kanefa dia efa nitsodrano azy intelo ianao izao! '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa ankehitriny, mandosira ho any amin’ny fonenanao ianao! Efa nilaza aho hoe: Hanome voninahitra anao tokoa aho; kanefa indro NY TOMPO efa nisakana anao tsy hahazo voninahitra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Balama ny ho avy mamirapiratra ho an’ny Israely
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy i Balama tamin’i Balaka: Moa tsy efa nilaza tamin’ireo irakao izay nirahinao tany amiko va aho hoe: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Na dia homen’i Balaka volafotsy sy volamena eran’ny tranony aza aho dia tsy mahazo manoatra ny didin’NY TOMPO, na hanao soa na hanao ratsy avy amin’ny saiko, fa izay holazain’NY TOMPO ihany no holazaiko? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ankehitriny, indro, handeha ho any amin’ny fireneko aho, dia aoka aho hampahafantatra anao ny amin’izay hataon’ity firenena ity amin’ny vahoakanao amin’ny andro ho avy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nilaza ny oha-teniny izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy i Balama, zanak’i Beora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny lehilahy izay nampahiratina ny masony;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: izay mandre ny tenin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahalala ny fahalalan’ny Avo Indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mahita fahitana avy amin’ny Tsitoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'torana, kanefa nampahiratina ny masony:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hitako Izy nefa tsy ankehitriny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tazako Izy nefa tsy akaiky.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy kintana miseho avy amin’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tehim-panjakana miposaka avy amin’Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manapotika ny fihirifan’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny karandohan’ireo mpitabataba rehetra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: I Edoma sy i Seìra fahavalony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy lasany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dia mandroso amin-kery Israely.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Avy amin’i Jakoba no isehoan’Izay hanapaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handringana izay sisa tao an-tanàna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Balama ny hahalavo ireo fahavalon’ny Israely
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia natopin’i Balama ny masony ka nahita ny Israely mitoby araka ny fokony avy izy. Ary ny Fanahin’Andriamanitra tonga tamin’i Balama. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nahita ny Amalekita koa izy dia nilaza ny oha-teniny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voalohany tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' i Amaleka,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa ho lany ringana ny hiafarany!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary nahita ny Kenita izy dia nilaza ny oha-teniny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mafy orina ny fonenanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary natao eo amin’ny vatolampy ny akaninao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Kanefa ho lanin’ny afo i Kaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alohan’ny hamaboan’i Asira anao.
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nilaza ny oha-teniny koa izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! Iza no ho velona, raha manao izany Andriamanitra?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary hisy sambo avy any amin’ny tany Kitima
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampietry an’i Asira ary hampietry an’i Ebera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izy koa dia ho lany ringana mandrakizay!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Dia niainga i Balama ka lasa nody tany amin’ny fonenany; i Balaka koa dia mba nandeha tany amin’izay nalehany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nilaza ny oha-teniny izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy i Balama, zanak’i Beora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny lehilahy izay nampahiratina ny masony,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: hoy ilay mandre ny tenin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahita fahitana avy amin’ny Tsitoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'torana, kanefa nampahiratina ny masony:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Endre ny hatsaran’ny tranolainao, ry Jakoba ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny lasinao, ry Israely ô!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tahaka ny lohasaha misandrahaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny saha ao amoron’ny ony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny hazo manitra nambolen’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny hazo sedera ao amoron-drano.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mikoriana avy amin’ny sininy ny rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny voa afafiny dia tondrahin’ny rano betsaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisandratra noho i Agaga ny mpanjakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handroso voninahitra ny fanjakany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Noentin’Andriamanitra nivoaka avy tany Ejipta izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manan-kery toy ny ombimanga.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handany ny Jentilisa fahavalony izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hotapatapahiny ny taolany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary haripany amin’ny zana-tsipìkany izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mamitsaka izy, mandry toy ny liona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny liom-bavy, koa iza no hampitsangana azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotahina anie izay manisy soa anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho voaozona anie izay manozona anao!
