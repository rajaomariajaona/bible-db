document_id: PSA.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny hoe Salamo dia avy amin’ny teny grika hoe Psalmos, izay milaza hira ampiarahina amin’ny zavamaneno. Ireo Salamo 150 dia hira izay nampiasaina teo amin’ny Fiangonana Israely tamin’ny fotoana samihafa. Izy ireny dia noforonina tamin’ny fotoana samihafa koa ary natambatra tsikelikely tao anatin’ny taonjato maro, nanomboka hatrany amin’ny faha mpanjaka tany ho any ka hatrany aorianan’ny fahababoana.
  - type: text
    content: Ireo sokajy misy ny ankamaroan’ny Salamo
  - type: text
    content: Ireo Salamo 150 dia azo sokajina anatin’ny sokajy lehibe maromaro, araka ny fotokevitra ao anatiny sy ny nampiasana azy teo amin’ny fanompoam-pivavahana. Misy ihany ny Salamo maro izay tsy hay ampidirina amin’ny sokajy manokana, ary matetika, ao amin’ny Salamo iray dia ahitana mariky ny sokajy maromaro. Ohatra ny Salamo fitarainana dia ahitana filazana toky, fisaorana sy fiderana. Ny Salamo fisaorana dia ahitana fitarainana koa.
  - type: text
    content: 'Ireo sokajy misy ny ankamaroan’ny Salamo:'
  - type: text
    content: '1- Ny hira fankalazana, izay mankalaza ny voninahitra sy ny fahatsaran’Andriamanitra: 8; 19; 33; 100; 103–105; 111; 113; 114; 117; 135; 136; 145–149'
  - type: text
    content: '2- Ireo hira momba ny fanjakan’NY TOMPO, izay ahitana ny fanambaràna hoe NY TOMPO no Mpanjaka: 47; 93; 96–99'
  - type: text
    content: '3- Ireo Salamon’ny mpanjaka, izay mikasika ny mpanjaka ary lazaina koa hoe Salamo mesianika: 2; 18; 20; 21; 45; 72; 89; 101; 110; 144'
  - type: text
    content: '4- Ireo Salamo fidirana ho ao amin’ny tempoly: 15; 24'
  - type: text
    content: '5- Ny Hira fanao amin’ny fiakarana, nohiraina rehefa niakatra ho any Jerosalema tamin’ireo andro firavoravoana: 120–134'
  - type: text
    content: '6- Ny Hiran’i Ziona, izay mankalaza ny nifidianan’NY TOMPO an’i Ziona ho toeran’ny tempoly: 46; 48; 76; 87; 132'
  - type: text
    content: '7- Ireo Salamo mitondra hafatra fananarana ny Fiangonana, entin’ny mpisorona na mpaminany iray: 14; 50; 53; 75; 81; 95'
  - type: text
    content: '8- Ireo Salamo mampianatra fahendrena: 1; 37; 49; 73; 78; 112; 119; 127; 133'
  - type: text
    content: '9- Ireo Salamo fitarainan’ny Fiangonana, raha misy loza manjo ny firenena: 12; 44; 58; 60; 74; 79; 80; 83; 85; 90; 94; 106; 108; 123; 126; 137'
  - type: text
    content: '10- Ireo Salamo fitarainan’olon-tokana noho ny antony maro samihafa: Aretina, fahatsiarovam-pahotana, fanenjehana, fanendrikendrehana, fahababoana. Ireo no maro an’isa ato amin’ny Boky: 5–7; 13; 17; 22; 25; 26; 28; 31; 35; 38; 39; 41–43; 51; 54; 57; 59; 61; 63; 64; 69–71; 86; 88; 102; 109; 120; 130; 140–143'
  - type: text
    content: '11- Ireo Salamo fisaorana, noho ny fanafahana tamin’ny loza, na ny famelan-keloka: 9–10; 30; 32; 34; 40.1-12; 92; 107; 116; 118'
  - type: text
    content: '12- Ireo Salamo manambara toky sy fiadanam-po: 3; 4; 11; 16; 23; 62; 131; 139'
  - type: text
    content: Ireo lohateny amin’ny salamo
  - type: text
    content: 'Misy salamo miisa 116 izay mitondra lohateny. Ireny lohateny ireny dia tsy nosoratan’ilay mpamorona ny salamo fa karazana fanazavana nataon’ny Fiangonana tatỳ aoriana. Misy amin’izy ireny azo nadika ho amin’ny teny malagasy (oh. Ho an’ny mpiventy hira, Sal 6), fa ny sasany kosa, izay tsy fantatsika mazava ny dikany, dia navela ho amin’ny teny fototra ihany (oh. Almot-laben, Sal 9; Miktama, Sal 16). Ireny lohateny ireny dia misy milaza ny fomba fihira, na ny zavamaneno hampiarahina aminy (oh. hampiarahina amin’ny valiha, Sal 6). Misy izay milaza ny zava-nitranga nahatonga ny famoronana ilay salamo (oh. Sal 34; 51), na koa ny fotoana nampiasana azy (oh. Sal 92: Hohiraina amin’ny Sabata).'
  - type: text
    content: 'Misy koa lohateny izay manambara fitambarana salamo maromaro izay efa nisy tany aloha ka mbola hita ho miray toerana ao anatin’ny Bokin’ny Salamo, toy ny hoe:'
  - type: text
    content: 'Salamo nataon’i Davida: 51–65; 67–70'
  - type: text
    content: 'Nataon’ny Koraìta: 42–49; 84–88'
  - type: text
    content: 'Nataon’i Asafa: 73–83'
  - type: text
    content: 'Hira fanao amin’ny fiakarana: 120–134'
  - type: text
    content: Misy teny iray, hoe Sela, izay tsy tena fantatsika ny dikany, fa nadika hoe Fiatoana.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Ny Bokin’ny Salamo dia mizara ho Boky dimy. Toy izao izany:'
  - type: text
    content: 'Ny Boky voalohany: 1–41'
  - type: text
    content: 'Ny Boky faharoa: 42–72'
  - type: text
    content: 'Ny Boky fahatelo: 73–89'
  - type: text
    content: Ny Boky fahefatra 90–106
  - type: text
    content: 'Ny Boky fahadimy: 107–150'
  - type: text
    content: Ny andininy farany amin’ny Sal 41, 72, 89 ary 106 dia fiderana, izay mamarana ireo boky 4 voalohany. Ny Salamo 1 dia toy ny fanokafana ny Boky manontolo, ary ny faha-150 no famaranana azy.
