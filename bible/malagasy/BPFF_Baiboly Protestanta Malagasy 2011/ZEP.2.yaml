document_id: ZEP.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antso ho an’ny mpanetry tena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miangòna; eny, mivoria ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry firenena tsy manan-kenatra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dieny tsy mbola mihatra ny didy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mihelina toy ny akofa ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dieny tsy mbola tonga aminareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hamafin’ny hatezeran’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, dieny tsy mbola tonga aminareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny andro firehetan’ny fahatezeran’NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mitadiava NY TOMPO ianareo mpanetry tena rehetra amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa nanaraka ny fitsipiny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tadiavo ny fahamarinana, tadiavo ny fanetren-tena!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Angamba ho voafina ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andron’ny fahatezeran’NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famaizana ny mponina any andrefana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa hafoy i Gaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho lao i Askelona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: horoahina mitataovovonana i Asdoda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hofongorana i Ekrona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lozan’ny mponina any amoron-tsiraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny firenen’ny Keretita!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mihatra aminareo ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Kanana, tanin’ny Filistina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: haringako tsy hisy mponina eo aminao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny moron-tsiraka dia ho tonga tany fiandrasana ondry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho toeram-piandrasan’ny mpiandry ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho valan’ondry aman’osy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ho tanin’ny sisa amin’ny taranak’i Joda izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka any no hiandrasany ondry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny tranon’i Askelona no handriany amin’ny hariva,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO Andriamaniny no hamangy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampody azy avy amin’ny fahababoany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famaizana ny mponina any atsinanana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Efa reko ny latsa ataon’i Moaba
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fanaratsiana ataon’ny taranak’i Amona
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nandatsany ny oloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nireharehany teny amin’ny sisintaniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa raha velona koa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitry ny Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tahaka an’i Sodoma tokoa i Moaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taranak’i Amona dia ho tahaka an’i Gomora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho toerana feno ahi-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy lava-tsira
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tany lao mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sisa amin’ny oloko no hamabo azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sisa amin’ny fireneko no hahalasa azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izany no ho valin’ny avonavony satria nandatsa ny olon’NY TOMPO, Andriamanitra Tompon’izao rehetra izao, sy nirehareha taminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hahatahotra azy NY TOMPO satria hanafoana ireo andriamanitra rehetra ambonin’ny tany Izy; hiankohoka eo anatrehan’NY TOMPO ny nosin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' rehetra, samy any amin’ny fitoerany avy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famaizana ny mponina any atsimo sy any avaratra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ianareo Kosita koa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho voatrobaky ny sabatro ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hanainga ny tanany hamely ny avaratra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handringana an’i Asiria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahalao an’i Ninive
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho karankaina tahaka ny tany efitra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hisy andiam-biby handry ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny karazam-biby rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitoetra ao an-tampon’ny andriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny sama na ny sokina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: feo mitoloko no ho re avy ao am-baravarankely.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandravana no ho eo an-tokonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hendahiny ny rafitra sedera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izany no tanàna niravoravo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nandry fehizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay niteny anakampo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no izy ary tsy misy hafa!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Endre! Tonga lao izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fandrian’ny biby!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay rehetra mandalo azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hisiotsioka mafy sy hanondro tanana azy.
