document_id: ZEP.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Antso ho an’ny mpanetry tena
  - type: text
    content: Miangòna; eny, mivoria ianareo
  - type: text
    content: ry firenena tsy manan-kenatra,
  '10':
  - type: text
    content: 'Izany no ho valin’ny avonavony satria nandatsa ny olon’NY TOMPO, Andriamanitra Tompon’izao rehetra izao, sy nirehareha taminy izy. '
  '11':
  - type: text
    content: 'Hahatahotra azy NY TOMPO satria hanafoana ireo andriamanitra rehetra ambonin’ny tany Izy; hiankohoka eo anatrehan’NY TOMPO ny nosin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra, samy any amin’ny fitoerany avy.'
  - type: heading
    content: Famaizana ny mponina any atsimo sy any avaratra
  '12':
  - type: text
    content: Ianareo Kosita koa,
  - type: text
    content: ho voatrobaky ny sabatro ianareo.
  '13':
  - type: text
    content: Hanainga ny tanany hamely ny avaratra Izy
  - type: text
    content: ka handringana an’i Asiria;
  - type: text
    content: hahalao an’i Ninive
  - type: text
    content: ho karankaina tahaka ny tany efitra Izy.
  '14':
  - type: text
    content: Hisy andiam-biby handry ao aminy,
  - type: text
    content: dia ny karazam-biby rehetra;
  - type: text
    content: hitoetra ao an-tampon’ny andriny
  - type: text
    content: na ny sama na ny sokina;
  - type: text
    content: feo mitoloko no ho re avy ao am-baravarankely.
  - type: text
    content: Fandravana no ho eo an-tokonana,
  - type: text
    content: fa hendahiny ny rafitra sedera.
  '15':
  - type: text
    content: Izany no tanàna niravoravo
  - type: text
    content: sady nandry fehizay,
  - type: text
    content: 'izay niteny anakampo hoe:'
  - type: text
    content: Izaho no izy ary tsy misy hafa!
  - type: text
    content: Endre! Tonga lao izy;
  - type: text
    content: eny, fandrian’ny biby!
  - type: text
    content: Izay rehetra mandalo azy
  - type: text
    content: dia hisiotsioka mafy sy hanondro tanana azy.
  '2':
  - type: text
    content: dieny tsy mbola mihatra ny didy,
  - type: text
    content: fa mihelina toy ny akofa ny andro,
  - type: text
    content: dieny tsy mbola tonga aminareo
  - type: text
    content: ny hamafin’ny hatezeran’NY TOMPO;
  - type: text
    content: eny, dieny tsy mbola tonga aminareo
  - type: text
    content: ny andro firehetan’ny fahatezeran’NY TOMPO!
  '3':
  - type: text
    content: Mitadiava NY TOMPO ianareo mpanetry tena rehetra amin’ny tany,
  - type: text
    content: izay efa nanaraka ny fitsipiny!
  - type: text
    content: Tadiavo ny fahamarinana, tadiavo ny fanetren-tena!
  - type: text
    content: Angamba ho voafina ianareo
  - type: text
    content: amin’ny andron’ny fahatezeran’NY TOMPO.
  - type: heading
    content: Famaizana ny mponina any andrefana
  '4':
  - type: text
    content: Fa hafoy i Gaza,
  - type: text
    content: ho lao i Askelona;
  - type: text
    content: horoahina mitataovovonana i Asdoda
  - type: text
    content: ary hofongorana i Ekrona.
  '5':
  - type: text
    content: Lozan’ny mponina any amoron-tsiraka,
  - type: text
    content: dia ny firenen’ny Keretita!
  - type: text
    content: 'Mihatra aminareo ny tenin’NY TOMPO hoe:'
  - type: text
    content: Ry Kanana, tanin’ny Filistina,
  - type: text
    content: haringako tsy hisy mponina eo aminao!
  '6':
  - type: text
    content: Ny moron-tsiraka dia ho tonga tany fiandrasana ondry,
  - type: text
    content: ho toeram-piandrasan’ny mpiandry ondry
  - type: text
    content: sy ho valan’ondry aman’osy.
  '7':
  - type: text
    content: Ho tanin’ny sisa amin’ny taranak’i Joda izany
  - type: text
    content: ka any no hiandrasany ondry.
  - type: text
    content: Ao amin’ny tranon’i Askelona no handriany amin’ny hariva,
  - type: text
    content: fa NY TOMPO Andriamaniny no hamangy azy
  - type: text
    content: ka hampody azy avy amin’ny fahababoany.
  - type: heading
    content: Famaizana ny mponina any atsinanana
  '8':
  - type: text
    content: Efa reko ny latsa ataon’i Moaba
  - type: text
    content: sy ny fanaratsiana ataon’ny taranak’i Amona
  - type: text
    content: izay nandatsany ny oloko
  - type: text
    content: sy nireharehany teny amin’ny sisintaniny.
  '9':
  - type: text
    content: Koa raha velona koa Aho,
  - type: text
    content: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: text
    content: Andriamanitry ny Israely,
  - type: text
    content: dia ho tahaka an’i Sodoma tokoa i Moaba,
  - type: text
    content: ary ny taranak’i Amona dia ho tahaka an’i Gomora,
  - type: text
    content: ho toerana feno ahi-dratsy
  - type: text
    content: sy lava-tsira
  - type: text
    content: ary tany lao mandrakizay;
  - type: text
    content: ny sisa amin’ny oloko no hamabo azy
  - type: text
    content: ary ny sisa amin’ny fireneko no hahalasa azy.
