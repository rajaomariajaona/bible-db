document_id: JHN.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanasan’i Jesosy ny tongotry ny mpianany
  - type: text
    content: 'Talohan’ny andro firavoravoana tamin’ny '
  - type: text
    content: Paska
  - type: text
    content: ', satria fantatr’i Jesosy fa tonga ny fotoana hialany amin’izao tontolo izao ho any amin’ny Ray, ary tia ny Azy izay ao amin’izao tontolo izao Izy, dia tia azy hatramin’ny farany.'
  '10':
  - type: text
    content: 'Fa hoy Jesosy taminy: Izay efa nandro dia tsy mila hosasana, afa-tsy ny tongotra ihany, fa efa madio avokoa; ary ianareo dia madio, nefa tsy ianareo rehetra. '
  '11':
  - type: text
    content: 'Fa fantany ilay efa hamadika Azy; koa izany no nilazany hoe: Tsy madio avokoa ianareo rehetra.'
  '12':
  - type: text
    content: 'Rehefa voasasany ny tongony dia nandray ny akanjony ivelany Izy ka nipetraka indray sady niteny taminy hoe: Fantatrareo va izay nataoko taminareo? '
  '13':
  - type: text
    content: 'Ianareo dia miantso Ahy hoe Mpampianatra sy Tompo; ary marina ny filazanareo fa izany tokoa Aho. '
  '14':
  - type: text
    content: 'Koa raha Izaho, Tompo sy Mpampianatra aza, no nanasa ny tongotrareo, ianareo koa dia mba tokony hifanasa tongotra. '
  '15':
  - type: text
    content: 'Fianarana no nomeko anareo mba hanaovanareo araka izay nataoko taminareo. '
  '16':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Ny andevo dia tsy lehibe noho ny tompony, na ny iraka noho izay maniraka azy. '
  '17':
  - type: text
    content: Raha fantatrareo izany dia sambatra ianareo raha manao izany.
  '18':
  - type: text
    content: 'Tsy milaza anareo rehetra Aho; fa fantatro izay nofidiko; fa mba hahatanteraka ny Soratra Masina hoe: «Izay homana ny mofoko no nanainga ny voditongony hamely Ahy» (Sal 41.9). '
  '19':
  - type: text
    content: 'Hatramin’izao dia milaza aminareo Aho, raha tsy mbola tonga izany mba hinoanareo rehefa tonga, fa Izaho no Izy. '
  '2':
  - type: text
    content: 'Raha mbola teo amin’ny fisakafoanana hariva izy ireo, ary i Jodasy iskariota, zanak’i Simona, dia efa nomen’ny '
  - type: text
    content: devoly
  - type: text
    content: ' saina rahateo mba hamadika Azy, '
  '20':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Izay mandray izay hirahiko dia mandray Ahy; ary izay mandray Ahy dia mandray izay naniraka Ahy.'
  - type: heading
    content: Ny nilazan’i Jesosy fa hamadika Azy i Jodasy
  - type: heading
    content: Mat 26.21-25; Mar 14.18-21; Lio 22.21-23
  '21':
  - type: text
    content: 'Rehefa nilaza izany Jesosy dia nangorohoro ny fanahiny ka nanambara Izy hoe: Lazaiko aminareo marina dia marina tokoa fa ny iray aminareo no hamadika Ahy. '
  '22':
  - type: text
    content: 'Dia nifampijerijery ny mpianatra ka nieritreritra izay iray nolazainy. '
  '23':
  - type: text
    content: 'Ary nisy mpianatra iray nipetraka nihinana teo anilan’i Jesosy, dia ilay tian’i Jesosy. '
  '24':
  - type: text
    content: 'Niantso azy i Simona Petera ka nanontany azy hoe: Iza no lazainy amin’izany. '
  '25':
  - type: text
    content: 'Raha mbola nipetraka tahaka izany izy dia niraika ho amin’ny tratran’i Jesosy ka niteny Taminy hoe: Tompoko, iza moa izany? '
  '26':
  - type: text
    content: 'Dia namaly Jesosy hoe: Ilay homeko ny sombi-mofo izay hatsoboko no izy. Ary rehefa natsobony ny sombi-mofo dia noraisiny ka nomeny an’i Jodasy, zanak’i Simona iskariota. '
  '27':
  - type: text
    content: 'Taorianan’izany no nidiran’i Satana tao aminy, koa hoy Jesosy taminy: Izay ataonao dia ataovy haingana. '
  '28':
  - type: text
    content: 'Fa tsy nisy tamin’izay nipetraka nihinana no nahalala ny anton’ny nilazany izany taminy. '
  '29':
  - type: text
    content: 'Fa nataon’ny sasany hoe satria i Jodasy no nitondra ny kitapo, no nilazan’i Jesosy taminy hoe: Vidio ny zavatra ilaintsika amin’ny andro firavoravoana na mandehana manome zavatra ho an’ny mahantra. '
  '3':
  - type: text
    content: 'sady fantatr’i Jesosy koa fa ny Ray efa nanolotra ny zavatra rehetra ho eo an-tanany, ary Andriamanitra no niaviany, sady Andriamanitra koa no iverenany, '
  '30':
  - type: text
    content: Ary rehefa nandray ny sombi-mofo izy dia niala teo niaraka tamin’izay. Ary efa alina ny andro tamin’izay.
  - type: heading
    content: Ny didy vaovao
  '31':
  - type: text
    content: 'Nony efa tafavoaka izy dia hoy Jesosy: Ankehitriny dia efa ankalazaina ny Zanak’Olona; ary Andriamanitra no ankalazaina ao Aminy. '
  '32':
  - type: text
    content: 'Ary Andriamanitra hankalaza Azy amin’ny tenany; eny, hankalaza Azy miaraka amin’izay Izy. '
  '33':
  - type: text
    content: 'Anaka, vetivety foana no sisa hitoerako eto aminareo. Hitady Ahy ianareo, nefa araka ny voalazako tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' hoe: Izay alehako dia tsy ho azonareo aleha, dia toy izany koa no lazaiko aminareo ankehitriny.'
  '34':
  - type: text
    content: 'Didy vaovao no omeko anareo dia ny mba hifankatiavanareo; eny, aoka ho tahaka ny nitiavako anareo no mba hifankatiavanareo koa. '
  '35':
  - type: text
    content: Izany no hahafantaran’ny olona rehetra fa mpianatro ianareo raha mifankatia.
  - type: heading
    content: Ny nilazan’i Jesosy fa handa azy i Petera
  - type: heading
    content: Mat 26.33-35; Mar 14.29-31; Lio 22.31-34
  '36':
  - type: text
    content: 'Hoy i Simona Petera taminy: Tompoko, ho aiza moa Ianao? Dia novalìn’i Jesosy hoe: Izay alehako dia tsy azonao anarahana Ahy ankehitriny, fa hanaraka Ahy ihany ianao rahatrizay. '
  '37':
  - type: text
    content: 'Hoy i Petera taminy: Tompoko, nahoana no tsy mahazo manaraka Anao aho ankehitriny? Na ny aiko aza anefa dia hafoiko noho ny Aminao. '
  '38':
  - type: text
    content: 'Fa hoy Jesosy: Ny ainao va hafoinao noho ny Amiko? Lazaiko aminao marina dia marina tokoa: Tsy mbola hisy akoho haneno dia handa Ahy intelo ianao.'
  '4':
  - type: text
    content: 'dia nitsangana niala teo am-pisakafoanana Izy ka nametraka ny akanjony ivelany ary naka lamba famaohana ka nisikinany; '
  '5':
  - type: text
    content: 'avy eo dia nampidina rano tamin’ny koveta Izy ka nanomboka nanasa ny tongotry ny mpianatra sy namaoka azy tamin’ny lamba famaohana izay nisikinany. '
  '6':
  - type: text
    content: 'Dia nankeo amin’i Simona Petera Izy; fa hoy i Petera Taminy: Tompoko, Ianao va no hanasa ny tongotro? '
  '7':
  - type: text
    content: 'Dia hoy Jesosy: Izay ataoko dia tsy fantatrao ankehitriny fa ho fantatrao aorianan’izao. '
  '8':
  - type: text
    content: 'Fa hoy i Petera taminy: Sanatria raha hanasa ny tongotro Ianao. Dia hoy Jesosy hoe: Raha tsy hosasako ianao dia tsy manana anjara Amiko. '
  '9':
  - type: text
    content: 'Dia hoy i Simona Petera Taminy: Tompoko, tsy ny tongotro ihany ary fa ny tanako sy ny lohako koa. '
