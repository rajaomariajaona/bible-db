document_id: JHN.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanasan’i Jesosy ny tongotry ny mpianany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Talohan’ny andro firavoravoana tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ', satria fantatr’i Jesosy fa tonga ny fotoana hialany amin’izao tontolo izao ho any amin’ny Ray, ary tia ny Azy izay ao amin’izao tontolo izao Izy, dia tia azy hatramin’ny farany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha mbola teo amin’ny fisakafoanana hariva izy ireo, ary i Jodasy iskariota, zanak’i Simona, dia efa nomen’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' saina rahateo mba hamadika Azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sady fantatr’i Jesosy koa fa ny Ray efa nanolotra ny zavatra rehetra ho eo an-tanany, ary Andriamanitra no niaviany, sady Andriamanitra koa no iverenany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia nitsangana niala teo am-pisakafoanana Izy ka nametraka ny akanjony ivelany ary naka lamba famaohana ka nisikinany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'avy eo dia nampidina rano tamin’ny koveta Izy ka nanomboka nanasa ny tongotry ny mpianatra sy namaoka azy tamin’ny lamba famaohana izay nisikinany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nankeo amin’i Simona Petera Izy; fa hoy i Petera Taminy: Tompoko, Ianao va no hanasa ny tongotro? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy Jesosy: Izay ataoko dia tsy fantatrao ankehitriny fa ho fantatrao aorianan’izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy i Petera taminy: Sanatria raha hanasa ny tongotro Ianao. Dia hoy Jesosy hoe: Raha tsy hosasako ianao dia tsy manana anjara Amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Simona Petera Taminy: Tompoko, tsy ny tongotro ihany ary fa ny tanako sy ny lohako koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy Jesosy taminy: Izay efa nandro dia tsy mila hosasana, afa-tsy ny tongotra ihany, fa efa madio avokoa; ary ianareo dia madio, nefa tsy ianareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa fantany ilay efa hamadika Azy; koa izany no nilazany hoe: Tsy madio avokoa ianareo rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa voasasany ny tongony dia nandray ny akanjony ivelany Izy ka nipetraka indray sady niteny taminy hoe: Fantatrareo va izay nataoko taminareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ianareo dia miantso Ahy hoe Mpampianatra sy Tompo; ary marina ny filazanareo fa izany tokoa Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa raha Izaho, Tompo sy Mpampianatra aza, no nanasa ny tongotrareo, ianareo koa dia mba tokony hifanasa tongotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fianarana no nomeko anareo mba hanaovanareo araka izay nataoko taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Ny andevo dia tsy lehibe noho ny tompony, na ny iraka noho izay maniraka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Raha fantatrareo izany dia sambatra ianareo raha manao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy milaza anareo rehetra Aho; fa fantatro izay nofidiko; fa mba hahatanteraka ny Soratra Masina hoe: «Izay homana ny mofoko no nanainga ny voditongony hamely Ahy» (Sal 41.9). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hatramin’izao dia milaza aminareo Aho, raha tsy mbola tonga izany mba hinoanareo rehefa tonga, fa Izaho no Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Izay mandray izay hirahiko dia mandray Ahy; ary izay mandray Ahy dia mandray izay naniraka Ahy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nilazan’i Jesosy fa hamadika Azy i Jodasy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.21-25; Mar 14.18-21; Lio 22.21-23
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa nilaza izany Jesosy dia nangorohoro ny fanahiny ka nanambara Izy hoe: Lazaiko aminareo marina dia marina tokoa fa ny iray aminareo no hamadika Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nifampijerijery ny mpianatra ka nieritreritra izay iray nolazainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nisy mpianatra iray nipetraka nihinana teo anilan’i Jesosy, dia ilay tian’i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Niantso azy i Simona Petera ka nanontany azy hoe: Iza no lazainy amin’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha mbola nipetraka tahaka izany izy dia niraika ho amin’ny tratran’i Jesosy ka niteny Taminy hoe: Tompoko, iza moa izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia namaly Jesosy hoe: Ilay homeko ny sombi-mofo izay hatsoboko no izy. Ary rehefa natsobony ny sombi-mofo dia noraisiny ka nomeny an’i Jodasy, zanak’i Simona iskariota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Taorianan’izany no nidiran’i Satana tao aminy, koa hoy Jesosy taminy: Izay ataonao dia ataovy haingana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa tsy nisy tamin’izay nipetraka nihinana no nahalala ny anton’ny nilazany izany taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa nataon’ny sasany hoe satria i Jodasy no nitondra ny kitapo, no nilazan’i Jesosy taminy hoe: Vidio ny zavatra ilaintsika amin’ny andro firavoravoana na mandehana manome zavatra ho an’ny mahantra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary rehefa nandray ny sombi-mofo izy dia niala teo niaraka tamin’izay. Ary efa alina ny andro tamin’izay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny didy vaovao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nony efa tafavoaka izy dia hoy Jesosy: Ankehitriny dia efa ankalazaina ny Zanak’Olona; ary Andriamanitra no ankalazaina ao Aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Andriamanitra hankalaza Azy amin’ny tenany; eny, hankalaza Azy miaraka amin’izay Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Anaka, vetivety foana no sisa hitoerako eto aminareo. Hitady Ahy ianareo, nefa araka ny voalazako tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' hoe: Izay alehako dia tsy ho azonareo aleha, dia toy izany koa no lazaiko aminareo ankehitriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Didy vaovao no omeko anareo dia ny mba hifankatiavanareo; eny, aoka ho tahaka ny nitiavako anareo no mba hifankatiavanareo koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Izany no hahafantaran’ny olona rehetra fa mpianatro ianareo raha mifankatia.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nilazan’i Jesosy fa handa azy i Petera
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.33-35; Mar 14.29-31; Lio 22.31-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Hoy i Simona Petera taminy: Tompoko, ho aiza moa Ianao? Dia novalìn’i Jesosy hoe: Izay alehako dia tsy azonao anarahana Ahy ankehitriny, fa hanaraka Ahy ihany ianao rahatrizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Hoy i Petera taminy: Tompoko, nahoana no tsy mahazo manaraka Anao aho ankehitriny? Na ny aiko aza anefa dia hafoiko noho ny Aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa hoy Jesosy: Ny ainao va hafoinao noho ny Amiko? Lazaiko aminao marina dia marina tokoa: Tsy mbola hisy akoho haneno dia handa Ahy intelo ianao.'
