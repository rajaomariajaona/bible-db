document_id: REV.17,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay vehivavy janga lehibe sy ilay bibidia mivolon-jaky
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga ny anjely iray tamin’izy fito izay nitana ny lovia fito dia niteny tamiko hoe: Avia atỳ, dia hasehoko anao ny fitsarana ilay vehivavy janga lehibe izay mipetraka eny ambonin’ny ranobe. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mpanjaka fito koa ireo: Efa lavo ny dimy fa ny iray dia mbola eo ihany, ary ny iray koa dia mbola tsy tonga; ary rehefa tonga izy dia tsy maintsy mitoetra kelikely. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny bibidia izay teo ihany ary tsy eo izao, dia izy no naman’ny fito maha valo azy ka lasa ho any amin’ny fandringanana.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tandroka folo izay hitanao dia mpanjaka folo izay tsy mbola nahazo fanjakana fa mandray fahefana ho toa mpanjaka izy ireo, ora iray monja, miaraka amin’ny bibidia. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo dia miray saina ka manome ny heriny sy ny fahefany ho an’ilay bibidia. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo dia hiady amin’ny Zanak’ondry, ary ny Zanak’ondry dia haharesy azy, satria Tompon’ny tompo Izy ary Mpanjakan’ny mpanjaka, ary handresy azy koa izay momba Azy, dia olona voaantso sy voafidy ary mahatoky.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamiko: Ny rano hitanao izay ipetrahan’ilay vehivavy janga, dia olona, vahoaka betsaka, ary firenena maro ary samihafa fiteny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tandroka folo sy ny bibidia izay hitanao, dia ireo no hankahala ilay vehivavy janga ka hanao azy ho tsinontsinona sy hampitanjaka azy, hihinana ny nofony ary handevona ny tenany amin’ny afo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Andriamanitra nanome fo azy ireo hanatanteraka ny heviny sy hifanara-tsaina ary hanome ny fanjakany ho an’ilay bibidia, mandra-pahatanteraka ny tenin’Andriamanitra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Ravehivavy, ilay hitanao, dia ny tanàna lehibe, izay manjaka amin’ny mpanjakan’ny tany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taminy no nijangajangan’ny mpanjakan’ny tany sady nahamamo ny mponina tamin’ny tany tamin’ny divain’ny fijangajangany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noentiny tamin’ny Fanahy ho any an-tany efitra aho ary nahita vehivavy nitaingina bibidia mivolon-jaky, feno anarana miteny ratsy sady nanana loha fito sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroka
    - type: text
      text: ' folo.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Ravehivavy dia nitafy lamba volomparasy sy jaky ary niravaka volamena sy vatosoa ary perila sady nitana kapoaka volamena teny an-tanany, feno zava-betaveta, dia ny zava-maloto momba ny fijangajangany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy anarana voasoratra teo amin’ny handriny hoe: Zavamiafina, Babilona lehibe, renin’ny mpijangajanga sy ny zava-betaveta amin’ny tany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hitako fa indro, Ravehivavy dia mamon’ny ran’ny olona masina sy ny ran’ny vavolombelon’i Jesosy. Koa raha nahita azy aho dia gaga indrindra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ilay anjely tamiko: Nahoana no gaga ianao? Izaho hilaza aminao ny zavamiafina ny amin-dRavehivavy sy ny bibidia mitondra azy izay manana loha fito sy tandroka folo.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny bibidia, ilay hitanao, dia teo ihany ary tsy eo izao. Hiakatra avy amin’ny lavaka tsy hita noanoa izy ka lasa ho any amin’ny fandringanana. Ary ny monina ambonin’ny tany, dia izay tsy voasoratra ao amin’ny bokin’ny fiainana hatramin’ny nanorenana izao tontolo izao, dia ho gaga raha mijery ilay bibidia izay teo ihany ary tsy eo izao, nefa mbola ho avy indray. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro ny saina izay misy fahendrena:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny loha fito dia tendrombohitra fito izay ipetrahan-dRavehivavy. '
