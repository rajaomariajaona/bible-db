document_id: EZR.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny anaran’ireo Jiosy nody tany amin’ny taniny
  - type: heading
    content: Neh 7.6-72
  - type: text
    content: 'Ireto ireo avy any amin’ny fari-piadidiana niakatra avy tamin’ny fahababoana; nobaboin’i Nebokadnezara, mpanjakan’i Babilona ka noentiny ho any Babilona, ary niverina ho any Jerosalema sy Joda, samy ho any an-tanànany avy: '
  '10':
  - type: text
    content: 'ny taranak’i Bany: Roa amby efapolo sy eninjato;'
  '11':
  - type: text
    content: 'ny taranak’i Bebay: Telo amby roapolo sy eninjato;'
  '12':
  - type: text
    content: 'ny taranak’i Azgada: Roa amby roapolo sy roanjato sy arivo;'
  '13':
  - type: text
    content: 'ny taranak’i Adonikama: Enina amby enimpolo sy eninjato;'
  '14':
  - type: text
    content: 'ny taranak’i Bigvay: Enina amby dimampolo sy roa arivo;'
  '15':
  - type: text
    content: 'ny taranak’i Adina: Efatra amby dimampolo sy efajato;'
  '16':
  - type: text
    content: 'ny taranak’i Atera avy tamin’i Hezekia: Valo amby sivifolo;'
  '17':
  - type: text
    content: 'ny taranak’i Bezay: Telo amby roapolo sy telonjato;'
  '18':
  - type: text
    content: 'ny taranak’i Jora: Roa amby folo amby zato;'
  '19':
  - type: text
    content: 'ny taranak’i Hasoma: Telo amby roapolo sy roanjato;'
  '2':
  - type: text
    content: Izy ireo dia niaraka tamin’i Zerobabela, i Josoa, i Nehemia, i Seraia, i Relaia, i Mordekay, i Bilsana, i Mispara, i Bigvay, i Rehoma ary i Bana.
  - type: text
    content: 'Ny isan’ny lehilahy tamin’ny Israely dia izao:'
  '20':
  - type: text
    content: 'ny taranak’i Gibara: Dimy amby sivifolo;'
  '21':
  - type: text
    content: 'ny taranak’i Betlehema: Telo amby roapolo amby zato;'
  '22':
  - type: text
    content: 'ny mponina tany Netofa: Enina amby dimampolo;'
  '23':
  - type: text
    content: 'ny mponina tany Anatota: Valo amby roapolo amby zato;'
  '24':
  - type: text
    content: 'ny taranak’i Azmaveta: Roa amby efapolo;'
  '25':
  - type: text
    content: 'ny taranak’i Kiriata-Arima sy i Kefira ary i Berota: Telo amby efapolo sy fitonjato;'
  '26':
  - type: text
    content: 'ny taranak’i Rama sy i Gaba: Iraika amby roapolo sy eninjato;'
  '27':
  - type: text
    content: 'ny mponina tany Mikmasy: Roa amby roapolo amby zato;'
  '28':
  - type: text
    content: 'ny mponina tany Betela sy Ay: Telo amby roapolo sy roanjato;'
  '29':
  - type: text
    content: 'ny taranak’i Nebo: Roa amby dimampolo;'
  '3':
  - type: text
    content: 'Ny taranak’i Parosy: Roa amby fitopolo amby zato sy roa arivo;'
  '30':
  - type: text
    content: 'ny taranak’i Magbisy: Enina amby dimampolo amby zato;'
  '31':
  - type: text
    content: 'ny taranak’ilay Elama iray: Efatra amby dimampolo sy roanjato sy arivo;'
  '32':
  - type: text
    content: 'ny taranak’i Harima: Roapolo sy telonjato;'
  '33':
  - type: text
    content: 'ny taranak’i Loda sy i Hadida ary i Ono: Dimy amby roapolo sy fitonjato;'
  '34':
  - type: text
    content: 'ny taranak’i Jeriko: Dimy amby efapolo sy telonjato;'
  '35':
  - type: text
    content: 'ny taranak’i Sena: Telopolo sy eninjato sy telo arivo.'
  '36':
  - type: text
    content: 'Ny mpisorona dia izao: Ny taranak’i Jedaia avy tamin’ny ankohonan’i Josoa dia telo amby fitopolo sy sivinjato;'
  '37':
  - type: text
    content: 'ny taranak’Imera: Roa amby dimampolo sy arivo;'
  '38':
  - type: text
    content: 'ny taranak’i Pasora: Fito amby efapolo sy roanjato sy arivo;'
  '39':
  - type: text
    content: 'ny taranak’i Harima: Fito amby folo sy arivo.'
  '4':
  - type: text
    content: 'ny taranak’i Sefatia: Roa amby fitopolo sy telonjato;'
  '40':
  - type: text
    content: 'Izao ny '
  - type: text
    content: levita
  - type: text
    content: ': Ny taranak’i Josoa sy i Kadmiela, avy tamin’ny taranak’i Hodavia, efatra amby fitopolo.'
  '41':
  - type: text
    content: 'Ny mpihira dia izao: Ny taranak’i Asafa, nisy valo amby roapolo amby zato.'
  '42':
  - type: text
    content: 'Ny taranaky ny mpiandry varavarana dia izao: Ny taranak’i Saloma, ny taranak’i Atera, ny taranak’i Talmona, ny taranak’i Akoba, ny taranak’i Hatita, ny taranak’i Sobay, izay sivy amby telopolo amby zato izy rehetra.'
  '43':
  - type: text
    content: 'Ny '
  - type: text
    content: Netinima
  - type: text
    content: ' dia izao: Ny taranak’i Ziha, ny taranak’i Hasofa, ny taranak’i Tabaota, '
  '44':
  - type: text
    content: 'ny taranak’i Kerosa, ny taranak’i Siaha, ny taranak’i Padona, '
  '45':
  - type: text
    content: 'ny taranak’i Lebana, ny taranak’i Hagabaha, ny taranak’i Akoba, '
  '46':
  - type: text
    content: 'ny taranak’i Hagaba, ny taranak’i Salmay, ny taranak’i Hanana, '
  '47':
  - type: text
    content: 'ny taranak’i Gidela, ny taranak’i Gahara, ny taranak’i Reaia, '
  '48':
  - type: text
    content: 'ny taranak’i Rezina, ny taranak’i Nekoda, ny taranak’i Gazama, '
  '49':
  - type: text
    content: 'ny taranak’i Oza, ny taranak’i Pasea, ny taranak’i Besay, '
  '5':
  - type: text
    content: 'ny taranak’i Ara: Dimy amby fitopolo sy fitonjato;'
  '50':
  - type: text
    content: 'ny taranak’i Asna, ny taranaky ny Meonita, ny taranaky ny Nefisita, '
  '51':
  - type: text
    content: 'ny taranak’i Bakiboka, ny taranak’i Hakofa, ny taranak’i Harora, '
  '52':
  - type: text
    content: 'ny taranak’i Bazilota, ny taranak’i Mehida, ny taranak’i Harsa, '
  '53':
  - type: text
    content: 'ny taranak’i Barkosa, ny taranak’i Sisera, ny taranak’i Tema, '
  '54':
  - type: text
    content: ny taranak’i Nezia, ny taranak’i Hatifa.
  '55':
  - type: text
    content: 'Ny taranaky ny mpanompon’i Solomona dia ireto: Ny taranak’i Sotahy, ny taranak’i Sofereta, ny taranak’i Peroda, '
  '56':
  - type: text
    content: 'ny taranak’i Jala, ny taranak’i Darkona, ny taranak’i Gidela, '
  '57':
  - type: text
    content: ny taranak’i Sefatia, ny taranak’i Hatila, ny taranak’i Pokereta-Hazebaima, ny taranak’i Amỳ.
  '58':
  - type: text
    content: Ny Netinima rehetra sy ny taranaky ny mpanompon’i Solomona dia roa amby sivifolo sy telonjato.
  '59':
  - type: text
    content: 'Ireto kosa no niakatra avy tany Tela-Mela, Tela-Harsa, Keroba-Adana ary Imera; fa tsy nahalaza ny fianakaviany sy ny firazanany izy, na avy tamin’ny Israely na tsia. '
  '6':
  - type: text
    content: 'ny taranak’i Pahata-Moaba, avy tamin’ny zanak’i Josoa sy i Joaba: Roa amby folo sy valonjato sy roa arivo;'
  '60':
  - type: text
    content: 'Ny taranak’i Delaia, ny taranak’i Tobia, ny taranak’i Nekoda: Nisy roa amby dimampolo sy eninjato. '
  '61':
  - type: text
    content: 'Ny avy tamin’ny taranaky ny mpisorona dia izao: Ny taranak’i Habaia, ny taranak’i Hakoza, ny taranak’i Barizilay; nampaka-bady avy tamin’ny zanakavavin’i Barizilay gileadita izy io ka notononina araka ny anarany. '
  '62':
  - type: text
    content: 'Nitady ny soratra filazana ny razany ireo nefa tsy hita izany; dia natao ho tsy madio izy ka nesorina tamin’ny fisoronana. '
  '63':
  - type: text
    content: 'Ary nilaza taminy ny governora fa tsy mahazo mihinana ny zavatra masina indrindra izy mandra-pitsangan’izay mpisorona iray hitondra ny '
  - type: text
    content: Orima sy Tomima
  - type: text
    content: .
  '64':
  - type: text
    content: 'Ny tontalin’ny olona rehetra dia enimpolo sy telonjato sy roa arivo sy efatra alina, '
  '65':
  - type: text
    content: 'afa-tsy ny mpanompolahiny sy ny mpanompovaviny fito amby telopolo sy telonjato sy fito arivo; nisy mpihira lahy sy vavy roanjato teo aminy; '
  '66':
  - type: text
    content: 'ny soavaliny dia enina amby telopolo sy fitonjato; ny ampondrany dia dimy amby efapolo sy roanjato; '
  '67':
  - type: text
    content: ny ramevany dia dimy amby telopolo sy efajato; ary ny borikiny dia roapolo sy fitonjato sy enina arivo.
  '68':
  - type: text
    content: 'Ny sasany tamin’ny lohan’ny fianakaviana, rehefa tonga tao amin’ny tranon’NY TOMPO tany Jerosalema, dia nanolotra fanatitra an-tsitrapo hananganana ny tranon’Andriamanitra eo amin’ilay efa niorenany. '
  '69':
  - type: text
    content: 'Nanome araka izay nananany avy izy ireo mba hanampy ireo kojakoja ho amin’ny asa, dia '
  - type: text
    content: drakma
  - type: text
    content: ' volamena arivo sy enina alina ary volafotsy dimy arivo '
  - type: text
    content: mane
  - type: text
    content: ' ary fanamiana mpisorona zato. '
  '7':
  - type: text
    content: 'ny taranak’i Eliama: Efatra amby dimampolo sy roanjato sy arivo;'
  '70':
  - type: text
    content: Samy tafapetraka teny an-tanànany avy ny mpisorona sy ny levita sy ny sasany tamin’ny vahoaka, ny mpihira, ny mpiandry varavarana ary ny Netinima mbamin’ny Israely rehetra koa izay samy tao an-tanànany avy.
  '8':
  - type: text
    content: 'ny taranak’i Zato: Dimy amby efapolo sy sivinjato;'
  '9':
  - type: text
    content: 'ny taranak’i Zakay: Enimpolo sy fitonjato;'
