document_id: NUM.36,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lalàna ny amin’ny fanambadian’ny zazavavy mandova zaratany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona ireo loham-pianakaviana tamin’ny fokon’ireo taranak’i Gileada, zanak’i Makira, zanak’i Manase, avy tamin’ny fianakavian’ireo taranak’i Josefa, ka niteny teo anatrehan’i Mosesy sy teo anatrehan’ireo lehibe, izay loham-pianakaviana tamin’ny Zanak’Israely hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka izay nandidian’NY TOMPO an’i Mosesy no nataon’ny zanakavavin’i Zelofada, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa i Mahala, i Tirza, i Hogla, i Milka ary i Noa, zanakavavin’i Zelofada, dia samy nanambady ny zanaky ny rahalahin-drainy avy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay avy tamin’ny fokon’ny taranak’i Manase, zanak’i Josefa, no novadin’ireo, dia nitoetra teo amin’ny fokon’ny mpianakavin’ny rainy ihany ny zarataniny.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no didy sy fitsipika izay nandidian’NY TOMPO ka nampitondrainy an’i Mosesy ho amin’ny Zanak’Israely tany Arbota-Moaba, teo amoron’i Jordana, tandrifin’i Jeriko.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianao, tompokolahy, dia efa nodidian’NY TOMPO hizara ny tany ho an’ny Zanak’Israely amin’ny antsapaka. Ary ianao, tompokolahy, dia efa nodidian’NY TOMPO hanome ny zaratanin’i Zelofada rahalahinay ho an’ny zanany vavy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha manambady ny zanakalahin’ny foko sasany amin’ny Zanak’Israely ireo dia hesorina amin’izay an’ny razanay ny zarataniny ka hanampy ny zaratanin’ny firenena izay hatoniny, dia hesorina amin’ny zarataninay izay azonay tamin’ny antsapaka izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha tonga ny Jobilin’ny Zanak’Israely, ny zarataniny dia hanampy ny an’ny foko izay hatoniny, ary izay azy dia hesorina amin’ny zaratanin’ny razanay.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandidy ny Zanak’Israely araka ny tenin’NY TOMPO i Mosesy hoe: Marina ny tenin’ireo foko taranak’i Josefa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no teny izay andidian’NY TOMPO ny amin’ny zanakavavin’i Zelofada: Mahazo manambady izay tiany izy, nefa avy ao amin’ny fokon’ny razany ihany no hovadiny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hafindra foko ny zaratanin’ny firenen’ny Zanak’Israely fa samy hifikitra ao amin’ny zaratanin’ny razany avy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zazavavy rehetra izay mandova zaratany eo amin’ny foko iray amin’ny Zanak’Israely dia hanambady lehilahy avy ao amin’ny fokon’ny razany ihany mba hananan’ny Zanak’Israely rehetra ny zaratanin’ny razany avy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka tsy hisy hifindra foko ny zaratany samihafa, fa samy hifikitra eo amin’ny azy avy ny Zanak’Israely.
