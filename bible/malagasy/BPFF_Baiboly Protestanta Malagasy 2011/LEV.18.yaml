document_id: LEV.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanajana ny fanambadiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Izaho no TOMPO Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aza manao ny fanaon’ny tany Ejipta izay nonenanareo; aza manao ny fanaon’ny tany Kanana izay ampidirako anareo ary aza manaraka ny fombany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny fitsipiko no hotanterahinareo ary ny didiko no hotandremanareo, harahinareo izany. Izaho no TOMPO Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tandremo ny didiko sy ny fitsipiko; fa raha mahatandrina izany ny olona dia ho velona amin’izany izy. Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aoka tsy hisy handry amin’izay havany akaiky ianareo: Izaho no TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aza mandry amin’izay nandrian’ny rainao fa reninao izy koa aza mandry aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza mandry amin’ny renikelinao fa nandrian’ny rainao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza mandry amin’ny anabavinao, izay zanaky ny rainao na zanaky ny reninao, na teraka tao an-trano na teraka tany ivelany; aza mandry aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza mandry amin’ny zanakavavin’ny zanakao lahy na ny zanakavavin’ny zanakao vavy; fa avy aminao no niavian’izy roa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aza mandry amin’ny zanakavavin’ny renikelinao izay teraky ny rainao; fa anabavinao izy; aza mandry aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aza mandry amin’ny anabavin-drainao fa havan-drainao akaiky izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza mandry amin’ny rahavavin-dreninao fa havan-dreninao akaiky izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aza mandry amin’izay nandrian’ny rahalahin-drainao; aza mila ny vadiny fa vadin’ny rahalahin-drainao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aza mandry amin’ny vinantovavinao fa vadin’ny zanakao lahy izy, koa aza mandry aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aza mandry amin’ny vadin’ny rahalahinao fa nandrian’ny rahalahinao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza mandry amin’ny vehivavy sy ny zanany vavy; aza maka ny zanakavavin’ny zanany lahy na ny zanakavavin’ny zanany vavy, handry aminy; havany akaiky ireo ka fahavetavetana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aza mampakatra vehivavy ho rafin’ny rahavaviny izay mbola velona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aza mila vehivavy mararin’ny fadimbolany handry aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aza mandry amin’ny vadin’ny namanao, handoto ny tenanao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza misy arosonao ho sorona ho an’i Moloka ny zanakao; ary aza manamavo ny anaran’Andriamanitrao: Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aza mandry amin’ny lehilahy tahaka ny fandry amin’ny vehivavy; fa fahavetavetana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Aza mandry amin’ny biby handoto ny tenanao aminy; aoka tsy hisy vehivavy hanaiky handrian’ny biby; fa zavatra fady indrindra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aza mandoto ny tenanareo amin’izany zavatra izany akory fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' izay efa horoahiko eo anoloanareo no nandoto ny tenany tamin’ireo rehetra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Maloto ny tany noho izany ka hamaly azy Aho noho ny helony, ary haloan’ny tany ny mponina ao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa mitandrema ny didiko sy ny fitsipiko ianareo koa aza misy ataonareo izany fahavetavetana izany, na ny tompon-tany na ny vahiny izay monina eo aminareo; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fa izany fahavetavetana rehetra izany no nataon’ny tompon-tany izay talohanareo ka naloto ny tany, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'mba tsy handotoanareo ny tany ka tsy handoavany anareo, tahaka ny nandoavany ny firenena izay talohanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa izay rehetra manatanteraka izany fahavetavetana izany na dia iray aza dia hesorina tsy ho amin’ny fireneny. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Koa dia tandremo izay asaiko tandremana mba tsy hisy hataonareo akory izany fanao vetaveta izany, izay nataon’ny olona talohanareo. Aza mandoto ny tenanareo amin’ireo. Izaho no TOMPO Andriamanitrareo.
