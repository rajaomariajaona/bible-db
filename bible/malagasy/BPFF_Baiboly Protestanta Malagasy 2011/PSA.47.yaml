document_id: PSA.47,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hobio ny Mpanjaka lehibe
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’ny Koraìta.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mitehafa tanana, ry firenena rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihobia ho an’Andriamanitra amin’ny feo miravoravo!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa NY TOMPO, ny Avo Indrindra, dia tokony hatahorana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanjaka lehibe ambonin’ny tany rehetra Izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mampanaiky firenena maro eo anoloantsika Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary firenen-tsamihafa ho ambanin’ny tongotsika;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: mifidy ny lovantsika ho antsika Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ny voninahitr’i Jakoba izay tiany. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Niakatra tao anatin’ny fihobiana Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO niakatra tamin’ny fitsofana ny anjomara.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mihirà ho an’Andriamanitra; eny, mihirà.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà ho an’ny Mpanjakantsika; eny, mihirà.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa Mpanjaka amin’ny tany rehetra Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manaova hira fankalazana Azy ianareo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Andriamanitra manjaka amin’ny firenen-tsamihafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra mipetraka eo ambonin’ny sezafiandrianany masina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mivory ny mpitondra ny firenen-tsamihafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miaraka amin’ny olon’Andriamanitr’i Abrahama;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa an’Andriamanitra ny ampingan’ny tany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avo indrindra Izy.
