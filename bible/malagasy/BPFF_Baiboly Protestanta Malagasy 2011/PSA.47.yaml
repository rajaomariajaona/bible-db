document_id: PSA.47,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hobio ny Mpanjaka lehibe
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’ny Koraìta.
  - type: text
    content: Mitehafa tanana, ry firenena rehetra!
  - type: text
    content: Mihobia ho an’Andriamanitra amin’ny feo miravoravo!
  '2':
  - type: text
    content: Fa NY TOMPO, ny Avo Indrindra, dia tokony hatahorana;
  - type: text
    content: Mpanjaka lehibe ambonin’ny tany rehetra Izy.
  '3':
  - type: text
    content: Mampanaiky firenena maro eo anoloantsika Izy
  - type: text
    content: ary firenen-tsamihafa ho ambanin’ny tongotsika;
  '4':
  - type: text
    content: mifidy ny lovantsika ho antsika Izy,
  - type: text
    content: 'dia ny voninahitr’i Jakoba izay tiany. '
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Niakatra tao anatin’ny fihobiana Andriamanitra,
  - type: text
    content: NY TOMPO niakatra tamin’ny fitsofana ny anjomara.
  '6':
  - type: text
    content: Mihirà ho an’Andriamanitra; eny, mihirà.
  - type: text
    content: Mihirà ho an’ny Mpanjakantsika; eny, mihirà.
  '7':
  - type: text
    content: Fa Mpanjaka amin’ny tany rehetra Andriamanitra;
  - type: text
    content: manaova hira fankalazana Azy ianareo.
  '8':
  - type: text
    content: Andriamanitra manjaka amin’ny firenen-tsamihafa;
  - type: text
    content: Andriamanitra mipetraka eo ambonin’ny sezafiandrianany masina.
  '9':
  - type: text
    content: Mivory ny mpitondra ny firenen-tsamihafa
  - type: text
    content: miaraka amin’ny olon’Andriamanitr’i Abrahama;
  - type: text
    content: fa an’Andriamanitra ny ampingan’ny tany.
  - type: text
    content: Avo indrindra Izy.
