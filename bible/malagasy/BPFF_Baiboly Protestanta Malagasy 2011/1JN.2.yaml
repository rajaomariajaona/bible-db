document_id: 1JN.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anaka, izany zavatra izany no soratako aminareo mba tsy hanotanareo. Ary raha misy manota dia manana Solovava
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: Parakleto. Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jao 14.16.
      marker-yv: yv-n
    - type: text
      text: ' ao amin’ny Ray isika, dia Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', Ilay Marina. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay tia ny rahalahiny no mitoetra ao amin’ny mazava ka tsy misy fahatafintohinana ao aminy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izay mankahala ny rahalahiny dia ao amin’ny maizina ary mandeha ao amin’ny maizina ka tsy mahalala izay alehany satria ny maizina no nahajamba ny masony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanatrehana an’izao tontolo izao sy ny antikristy
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manoratra aminareo zanaka aho satria voavela ny helokareo noho ny anarany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manoratra aminareo ray aho satria efa mahalala Ilay hatramin’ny voalohany ianareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manoratra aminareo zatovo aho satria efa naharesy ilay ratsy ianareo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanoratra taminareo ankizy madinika aho satria efa mahalala ny Ray ianareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanoratra taminareo ray aho satria efa nahalala Ilay hatramin’ny voalohany ianareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanoratra taminareo zatovo aho satria mahery ianareo, ary mitoetra ao anatinareo ny tenin’Andriamanitra sady efa naharesy ilay ratsy ianareo.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza tia izao tontolo izao, na izay zavatra eo amin’izao tontolo izao. Raha misy olona tia izao tontolo izao dia tsy ao anatiny ny fitiavana ny Ray; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny zavatra rehetra eo amin’izao tontolo izao, dia ny filan’ny nofo sy ny filan’ny maso ary ny rehaka momba izao fiainana izao, dia tsy avy amin’ny Ray fa avy amin’izao tontolo izao ihany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary mandalo izao tontolo izao sy ny filany; fa izay manao ny sitrapon’Andriamanitra no maharitra mandrakizay.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rankizy, izao no ora farany. Araka ny efa renareo fa ho avy ny antikristy sady maro ny antikristy no efa tonga sahady, dia izany no ahafantarantsika fa izao no ora farany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy teto amintsika ihany no nialan’ireo, nefa tsy mba namantsika izy; fa raha toa ka namantsika izy dia ho nitoetra teto amintsika ihany; kanefa niala izy mba haseho fa tsy namantsika izy rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy no avotra noho ny fahotantsika, ary tsy noho ny antsika ihany, fa noho ny an’izao tontolo izao koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Didy ela sy didy vaovao
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianareo kosa dia manana hosotra avy amin’Ilay Masina ka mahalala ny zavatra rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy noho ny tsy ahafantaranareo ny marina no nanoratako taminareo, fa noho ny ahafantaranareo izany sy noho ny tsy fisian’ny lainga avy amin’ny marina.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iza no mpandainga, afa-tsy ilay mandà an’i Jesosy tsy ho Kristy? Izy no antikristy, dia izay mandà ny Ray sy ny Zanaka. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay rehetra mandà ny Zanaka no tsy manana ny Ray koa; izay manaiky ny Zanaka no manana ny Ray koa.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny aminareo, dia izay efa renareo hatramin’ny voalohany, no aoka hitoetra ao anatinareo. Raha mitoetra ao anatinareo izay efa renareo hatramin’ny voalohany dia hitoetra ao amin’ny Zanaka sy ny Ray koa ianareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izao no teny fikasana izay nataony tamintsika, dia ny fiainana mandrakizay.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany zavatra izany no voasoratro taminareo ny amin’ny olona mamitaka anareo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny aminareo dia ilay hosotra noraisinareo Taminy no mitoetra ao aminareo ka tsy mila hampianarin’olona ianareo; fa satria ny hosotra avy Aminy no mampianatra anareo ny zavatra rehetra, sady marina fa tsy lainga izany, dia tomoera ao Aminy ianareo, araka ny nampianarany anareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zanak’Andriamanitra
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny, anaka, tomoera ao Aminy, mba hananantsika toky rehefa miseho Izy ka tsy hiala Aminy amin-kenatra amin’ny fiaviany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha fantatrareo fa marina Izy dia fantaro fa izay rehetra manao ny fahamarinana no zanany naterany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no ahafantarantsika fa mahalala Azy isika dia ny fitandremantsika ny didiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay milaza hoe: Fantatro Izy, nefa tsy mitandrina ny didiny, dia mpandainga, ary ny marina dia tsy ao anatiny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na iza na iza mitandrina ny teniny dia tanteraka ao aminy marina tokoa ny fitiavana an’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny fitiavan’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: '. Izany no ahafantarantsika fa ao Aminy isika. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no ahafantarantsika fa ao Aminy isika: Izay milaza fa mitoetra ao Aminy dia tsy maintsy mandeha toy izay nandehanany koa.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry malala, tsy didy vaovao no soratako aminareo fa didy ela izay efa nanananareo hatramin’ny voalohany. Ny didy ela dia ilay teny efa renareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary koa, didy vaovao no soratako aminareo, dia zavatra marina eo Aminy sy eo aminareo satria miala ny maizina ary ny mazava marina no mamirapiratra ankehitriny.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay milaza fa ao amin’ny mazava izy, kanefa mankahala ny rahalahiny, dia mbola ao amin’ny maizina ihany. '
