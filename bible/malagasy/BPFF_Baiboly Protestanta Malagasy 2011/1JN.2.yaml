document_id: 1JN.2,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Anaka, izany zavatra izany no soratako aminareo mba tsy hanotanareo. Ary raha misy manota dia manana Solovava
  - type: note
    content: 'Na: Parakleto. Zahao Jao 14.16.'
  - type: text
    content: ' ao amin’ny Ray isika, dia Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', Ilay Marina. '
  '10':
  - type: text
    content: 'Izay tia ny rahalahiny no mitoetra ao amin’ny mazava ka tsy misy fahatafintohinana ao aminy. '
  '11':
  - type: text
    content: Fa izay mankahala ny rahalahiny dia ao amin’ny maizina ary mandeha ao amin’ny maizina ka tsy mahalala izay alehany satria ny maizina no nahajamba ny masony.
  - type: heading
    content: Ny fanatrehana an’izao tontolo izao sy ny antikristy
  '12':
  - type: text
    content: Manoratra aminareo zanaka aho satria voavela ny helokareo noho ny anarany.
  '13':
  - type: text
    content: Manoratra aminareo ray aho satria efa mahalala Ilay hatramin’ny voalohany ianareo.
  - type: text
    content: Manoratra aminareo zatovo aho satria efa naharesy ilay ratsy ianareo.
  '14':
  - type: text
    content: Nanoratra taminareo ankizy madinika aho satria efa mahalala ny Ray ianareo.
  - type: text
    content: Nanoratra taminareo ray aho satria efa nahalala Ilay hatramin’ny voalohany ianareo.
  - type: text
    content: Nanoratra taminareo zatovo aho satria mahery ianareo, ary mitoetra ao anatinareo ny tenin’Andriamanitra sady efa naharesy ilay ratsy ianareo.
  '15':
  - type: text
    content: 'Aza tia izao tontolo izao, na izay zavatra eo amin’izao tontolo izao. Raha misy olona tia izao tontolo izao dia tsy ao anatiny ny fitiavana ny Ray; '
  '16':
  - type: text
    content: 'fa ny zavatra rehetra eo amin’izao tontolo izao, dia ny filan’ny nofo sy ny filan’ny maso ary ny rehaka momba izao fiainana izao, dia tsy avy amin’ny Ray fa avy amin’izao tontolo izao ihany. '
  '17':
  - type: text
    content: Ary mandalo izao tontolo izao sy ny filany; fa izay manao ny sitrapon’Andriamanitra no maharitra mandrakizay.
  '18':
  - type: text
    content: 'Rankizy, izao no ora farany. Araka ny efa renareo fa ho avy ny antikristy sady maro ny antikristy no efa tonga sahady, dia izany no ahafantarantsika fa izao no ora farany. '
  '19':
  - type: text
    content: 'Avy teto amintsika ihany no nialan’ireo, nefa tsy mba namantsika izy; fa raha toa ka namantsika izy dia ho nitoetra teto amintsika ihany; kanefa niala izy mba haseho fa tsy namantsika izy rehetra. '
  '2':
  - type: text
    content: Izy no avotra noho ny fahotantsika, ary tsy noho ny antsika ihany, fa noho ny an’izao tontolo izao koa.
  - type: heading
    content: Didy ela sy didy vaovao
  '20':
  - type: text
    content: 'Fa ianareo kosa dia manana hosotra avy amin’Ilay Masina ka mahalala ny zavatra rehetra. '
  '21':
  - type: text
    content: Tsy noho ny tsy ahafantaranareo ny marina no nanoratako taminareo, fa noho ny ahafantaranareo izany sy noho ny tsy fisian’ny lainga avy amin’ny marina.
  '22':
  - type: text
    content: 'Iza no mpandainga, afa-tsy ilay mandà an’i Jesosy tsy ho Kristy? Izy no antikristy, dia izay mandà ny Ray sy ny Zanaka. '
  '23':
  - type: text
    content: Izay rehetra mandà ny Zanaka no tsy manana ny Ray koa; izay manaiky ny Zanaka no manana ny Ray koa.
  '24':
  - type: text
    content: 'Ary ny aminareo, dia izay efa renareo hatramin’ny voalohany, no aoka hitoetra ao anatinareo. Raha mitoetra ao anatinareo izay efa renareo hatramin’ny voalohany dia hitoetra ao amin’ny Zanaka sy ny Ray koa ianareo. '
  '25':
  - type: text
    content: Ary izao no teny fikasana izay nataony tamintsika, dia ny fiainana mandrakizay.
  '26':
  - type: text
    content: 'Izany zavatra izany no voasoratro taminareo ny amin’ny olona mamitaka anareo. '
  '27':
  - type: text
    content: Ary ny aminareo dia ilay hosotra noraisinareo Taminy no mitoetra ao aminareo ka tsy mila hampianarin’olona ianareo; fa satria ny hosotra avy Aminy no mampianatra anareo ny zavatra rehetra, sady marina fa tsy lainga izany, dia tomoera ao Aminy ianareo, araka ny nampianarany anareo.
  - type: heading
    content: Ny zanak’Andriamanitra
  '28':
  - type: text
    content: 'Ary ankehitriny, anaka, tomoera ao Aminy, mba hananantsika toky rehefa miseho Izy ka tsy hiala Aminy amin-kenatra amin’ny fiaviany. '
  '29':
  - type: text
    content: Raha fantatrareo fa marina Izy dia fantaro fa izay rehetra manao ny fahamarinana no zanany naterany.
  '3':
  - type: text
    content: 'Ary izao no ahafantarantsika fa mahalala Azy isika dia ny fitandremantsika ny didiny. '
  '4':
  - type: text
    content: 'Izay milaza hoe: Fantatro Izy, nefa tsy mitandrina ny didiny, dia mpandainga, ary ny marina dia tsy ao anatiny. '
  '5':
  - type: text
    content: Fa na iza na iza mitandrina ny teniny dia tanteraka ao aminy marina tokoa ny fitiavana an’Andriamanitra
  - type: note
    content: 'Na: ny fitiavan’Andriamanitra.'
  - type: text
    content: '. Izany no ahafantarantsika fa ao Aminy isika. '
  '6':
  - type: text
    content: 'Izao no ahafantarantsika fa ao Aminy isika: Izay milaza fa mitoetra ao Aminy dia tsy maintsy mandeha toy izay nandehanany koa.'
  '7':
  - type: text
    content: 'Ry malala, tsy didy vaovao no soratako aminareo fa didy ela izay efa nanananareo hatramin’ny voalohany. Ny didy ela dia ilay teny efa renareo. '
  '8':
  - type: text
    content: Ary koa, didy vaovao no soratako aminareo, dia zavatra marina eo Aminy sy eo aminareo satria miala ny maizina ary ny mazava marina no mamirapiratra ankehitriny.
  '9':
  - type: text
    content: 'Izay milaza fa ao amin’ny mazava izy, kanefa mankahala ny rahalahiny, dia mbola ao amin’ny maizina ihany. '
