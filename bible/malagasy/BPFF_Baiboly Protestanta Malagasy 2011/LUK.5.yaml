document_id: LUK.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo mpianatra efatra voalohany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ampit. Mat 4.18-22; Mar 1.16-20; Jao 1.35-51; 21.1-11
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa satria nifanizina Taminy ny vahoaka mba hihaino ny tenin’Andriamanitra dia nijanona teo amoron’ny farihin’i Genesareta Jesosy; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary toy izany koa i Jakoba sy i Jaona, zanak’i Zebedio, izay niombon-draharaha tamin’i Simona. Dia hoy Jesosy tamin’i Simona: Aza matahotra; hatramin’izao ankehitriny izao dia olombelona kosa no ho azonao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa nampiantsona ny sambokeliny teo an-tanety izy ireo dia nahafoy ny zavatra rehetra ka nanaraka an’i Jesosy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanasitranan’i Jesosy ny boka iray
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 8.1-4; Mar 1.40-45
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tao an-tanàna iray Jesosy, indro, nisy lehilahy heniky ny habokana. Nony nahita Azy io dia niankohoka ka nitaraina taminy hoe: Tompoko, raha mety Ianao, dia afaka manadio ahy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanatsotra ny tanany Jesosy dia nikasika azy ka niteny hoe: Mety Aho; madiova ianao. Ary niala taminy niaraka tamin’izay ny habokany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandrara azy Jesosy tsy hilaza amin’olona na dia iray akory aza; fa mandehana, hoy Izy, misehoa amin’ny mpisorona, ka manaova fanatitra noho ny fanadiovana anao, araka ny nandidian’i Mosesy, ho vavolombelona amin’ireo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa vao mainka niely bebe kokoa ny lazany, dia niangona ny vahoaka betsaka hihaino Azy sy mba ho sitranina tamin’ny aretiny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niala nankany an-tany efitra Izy ka nivavaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay malemy tao Kapernaomy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 9.1-8; Mar 2.1-12
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro, raha nampianatra Jesosy, dia nipetraka teo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' sasany sy ny mpampianatra ny Lalàna, izay tonga avy tamin’ny tanàna rehetra any Galilia sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' ary Jerosalema; ary ny herin’ny Tompo dia tao Aminy mba hanasitranany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, nisy nitondra lehilahy iray izay malemy, tamin’ny fandriana, ka nitady izay hampidirany sy hametrahany azy teo anatrehany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa satria tsy hitan’izy ireo izay hampidirany azy noho ny habetsahan’ny vahoaka dia niakatra teo an-tafontrano ireo ka nanesorany ny tafo tanimanga, dia nampidininy Ralehilahy mbamin’ny fandrianany ho eo afovoan’ny olona, dia teo anatrehan’i Jesosy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nahita sambokely roa nijanona teo an-tsisin’ny farihy Izy; fa ny mpanarato dia efa niala taminy ka nanasa ny haratony. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha hitan’i Jesosy ny finoan’ireo dia hoy Izy: Ralehilahy, voavela ny helokao. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny mpanoradalàna sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' niady hevitra hoe: Iza moa Ity miteny ratsy Ity? Iza no mahavela heloka, afa-tsy Andriamanitra ihany? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jesosy nahafantatra ny eritreriny ka niteny taminy hoe: Nahoana ianareo no mieritreritra izany ao am-ponareo? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona moa no moramora kokoa, ny milaza hoe: Voavela ny helokao sa ny milaza hoe: Mitsangàna ka mandehana? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mba ho fantatrareo fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ' manana fahefana etỳ ambonin’ny tany hamela heloka, dia hoy Izy tamin’ilay malemy: Izaho milaza aminao hoe: Mitsangàna, batao ny fandriananao ary modia any an-tranonao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niaraka tamin’izay dia nitsangana teo anatrehan’ny olona izy ka nibata ny fandrianany, dia lasa nody sady nankalaza an’Andriamanitra.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary talanjona avokoa ny olona rehetra, dia nankalaza an’Andriamanitra sady raiki-tahotra indrindra ka niteny hoe: Efa nahita zava-mahagaga isika androany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanasana tao an-tranon’i Levy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 9.9-13; Mar 2.13-17
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorianan’izany dia nandeha Jesosy ka nahita mpamory hetra iray antsoina hoe Levy, nipetraka teo am-pamorian-ketra; dia hoy Izy taminy: Manaraha Ahy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nahafoy ny zavatra rehetra izy ka nitsangana dia nanaraka Azy.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao fanasana lehibe ho an’i Jesosy tao an-tranony i Levy; ary nisy mpamory hetra maro sy olon-kafa koa, izay nipetraka niara-nisakafo taminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niditra teo amin’ny sambokely iray izay an’i Simona Izy, ary nangataka taminy mba hihataka kely amin’ny tany. Dia nipetraka teo an-tsambokely Izy ka nampianatra ny vahoaka.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' sy ny mpanoradalàna izay teo aminy dia nimonomonona tamin’ny mpianatr’i Jesosy hoe: Nahoana ianareo no miara-mihinana sy misotro amin’ny mpamory hetra sy ny mpanota? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jesosy namaly hoe: Tsy ny salama no mila mpitsabo fa ny marary; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tsy tonga hiantso ny marina Aho fa ny mpanota mba hibebaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy sy ny fifadian-kanina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 9.14-17; Mar 2.18-22
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy ireo Taminy: Ny mpianatr’i Jaona dia mifady hanina matetika sy mivavaka, ary ny an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' koa mba tahaka izany ihany, fa ny Anao kosa dia mihinana sy misotro ihany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Jesosy taminy: Azonareo atao va ny mampifady hanina ny havan’ny mpampakatra, raha mbola ao aminy ny mpampakatra? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ho avy ny andro izay hanesorana ny mpampakatra hiala aminy, dia amin’izay andro izay vao hifady hanina izy.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nilaza fanoharana taminy koa Izy hoe: Tsy misy olona mandrovitra akanjo vaovao hanalany tapa-damba hanampenana akanjo tonta; fa raha izany dia maharovitra ny vaovao izany, ary ilay tapa-damba nalaina tamin’ny vaovao dia tsy hifanaraka amin’ny tonta. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy misy olona manisy divay vaovao ao anaty siny hoditra tonta; fa raha izany, ny divay vaovao, dia handoaka ny siny hoditra ka ho raraka ny divay sady ho simba foana ny siny hoditra; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny divay vaovao dia tsy maintsy hatao ao anaty siny hoditra vaovao. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy misy olona, rehefa nisotro ny divay ela, no maniry ny vaovao; fa hoy izy: Ny ela no tsara.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nitsahatra niteny Jesosy dia hoy Izy tamin’i Simona: Mandrosoa ho any amin’ny lalina dia alatsaho ny haratonareo hahazoana hazandrano. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly i Simona hoe: Tompoko, nandritra ny alina no efa nikelezanay aina, nefa tsy nahazo na inona na inona; kanefa noho ny teninao dia halatsako ihany ny harato. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nataony izany dia nahazo hazandrano be dia be izy ireo ka efa nisy triatra ny haratony. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niantso ny namany izay teo amin’ny sambokely hafa izy ireo mba ho avy hanampy azy. Dia avy ireny, ary nofenoiny ny sambokely roa, ka efa saika nilentika. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hitan’i Simona Petera izany dia niankohoka teo an-tongotr’i Jesosy izy ka niteny hoe: Tompoko, mialà amiko, fa olona mpanota aho. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa talanjona izy sy izay rehetra teo aminy noho ny haben’ny hazandrano izay azony. '
