document_id: JAS.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lela
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry rahalahiko, aza dia samy ho mpampianatra avokoa ianareo rehetra satria fantatrareo fa ho mafimafy kokoa no hitsarana antsika mpampianatra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy amin’ny vava iray ihany no ivoahan’ny fisaorana sy ny fanozonana. Ry rahalahiko, tsy mety raha misy izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa ny loharano va mamoaka rano mamy sy mangidy eo amin’ny vavany iray ihany? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ry rahalahiko, ny aviavy va mety mamoa voan’oliva na ny voaloboka mamoa voan’aviavy? Toy izany koa ny loharano masirasira dia tsy mba ivoahan’ny rano mamy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahendrena etỳ an-tany sy fahendrena avy any ambony
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iza eo aminareo no hendry sy manam-pahalalana? Aoka hasehony amin’ny fitondrantena tsara ny asany, amin’ny fahalemem-panahy sy fahendrena. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha misy fialonana mirehitra sy fiheveran-tena ho zavatra ao am-ponareo dia aza mirehareha na mandainga manohitra ny marina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany fahendrena izany dia tsy ilay avy any ambony fa araka ny etỳ an-tany ihany, araka ny nofo, araka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay misy fialonana sy fiheveran-tena ho zavatra dia misy fikorontanana mbamin’izay asa ratsy rehetra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fahendrena izay avy any ambony dia, voalohany indrindra, madio, manaraka izany, tia fihavanana, mandefitra, mora alahatra, be famindrampo sy asa soa, tsy miangatra na mihatsaravelatsihy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny vokatry ny fahamarinana ao amin’ny fihavanana dia afafin’izay mikatsaka ny fihavanana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mety diso amin’ny zavatra maro mantsy isika rehetra. Raha misy olona tsy mba mety diso amin’ny teniny dia izy no lehilahy tanteraka ka mahafehy ny tenany manontolo koa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha asiantsika lamboridy amin’ny vavan’ny soavaly mba hanarahany antsika dia mitondra ny tenany manontolo isika. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indreo koa ny sambo, na dia lehibe aza ireny ka entin’ny rivotra mahery, dia ahodin’ny familiana kely foana izy ho any amin’izay tian’ny mpitondra azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izany koa ny lela, taova kely izy kanefa mirehareha fatratra. Indro afo kely monja dia mahadoro ala lehibe! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afo koa ny lela, faharatsiana tsy hita lany: Eo amin’ny momba ny tenantsika dia ny lela no mampipentimpentina ny tena manontolo ka mandoro izao zavatra ary rehetra izao, sady arehitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: afobe
    - type: text
      text: ' izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Folaka avokoa ny karazana bibidia rehetra sy ny vorona ary ny biby mandady sy mikisaka mbamin’ny any an-dranomasina. Eny, voafolaky ny olombelona ireny, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa tsy misy olona mahafolaka ny lela; zava-dratsy tsy hay tohaina izy sady feno poizina mahafaty. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy no isaorantsika ny Tompo, dia ny Ray; ary izy ihany koa no anozonantsika ny olona izay natao araka ny endrik’Andriamanitra. '
