document_id: EXO.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny rano tao Masa sy Meriba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nifindra ny fiangonan’ny Zanak’Israely manontolo ka niala tao amin’ny tany efitra Sina, ho any amin’izay toerana natoron’NY TOMPO hitobiany, ary nitoby tao Refidima nefa tsy nisy rano hosotroiny ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nila ady tamin’i Mosesy izy ireo ka niteny hoe: Omeo rano izahay hosotroinay. Fa hoy i Mosesy taminy: Nahoana no mila ady amiko ianareo? Nahoana no maka fanahy NY TOMPO ianareo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Teo no nangetaheta ny olona ka nimonomonona tamin’i Mosesy ary niteny hoe: Nahoana no noentinao niakatra niala tany Ejipta ho fatin’ny hetaheta izahay sy ny zanakay ary ny bibinay?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nitaraina tamin’NY TOMPO i Mosesy hoe: Inona no hataoko amin’ireto olona ireto? Mila hitora-bato ahy izy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Mosesy: Mandrosoa eo alohan’ny olona, ary mitondrà loholon’ny Israely hiaraka aminao; ary ny tehinao, ilay nikapohanao an’i Neily, dia ento eny an-tananao ka mandehana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary indro, hijoro eo anatrehanao eo ambonin’ny harambato any Horeba Aho dia hikapoka ny harambato ianao ka hisy rano hivoaka avy aminy hosotroin’ny olona. Dia nanatanteraka izany teo imason’ireo loholon’ny Israely i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny anaran’izany tany izany dia nataony hoe: Masa sy Meriba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masa sy Meriba: Fakam-panahy sy Ady.'
    marker-yv: yv-n
  - type: text
    text: ', noho ny ady nataon’ny Zanak’Israely sy noho ny nakany fanahy NY TOMPO hoe: Eto aminay va NY TOMPO, sa tsia?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manafika ny Zanak’Israely ny Amalekita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tonga kosa ny Amalekita ka niady tamin’ny Israelita tao Refidima. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Mosesy tamin’i Josoa: Mifidiana lehilahy ho antsika, dia mandehana ka miadia amin’ny Amalekita; fa hijoro eo an-tampon’ny havoana aho rahampitso ka hitana ny tehin’Andriamanitra etỳ an-tanako. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nanatanteraka izay nolazain’i Mosesy taminy i Josoa ka niady tamin’ny Amalekita. Fa i Mosesy sy i Arona ary i Hora kosa dia niakatra ho ao an-tampon’ny havoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rehefa nasandratr’i Mosesy ny tanany dia nahery ny Israelita; fa rehefa nampidininy ny tanany dia nahery kosa ny Amalekita. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa vizana ny tanan’i Mosesy ka naka vato izy roa lahy, nataony teo ambanin’i Mosesy hipetrahany. I Arona sy i Hora dia nanohana ny tanany, koa ny iray dia teo an-daniny ary ny iray dia teo an-kilany; dia naharitra tsy ketraka intsony ny tanany mandra-pahafatin’ny masoandro. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nandresy ny Amalekita sy ny olony tamin’ny lelan-tsabatra i Josoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Mosesy: Soraty ao amin’ny boky izany ho fahatsiarovana ka ambarao amin’i Josoa; fa hofoanako tsy ho eny ambanin’ny lanitra tokoa ny fahatsiarovana ny Amalekita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanorina alitara i Mosesy ka ny anarany nataony hoe: NY TOMPO Nisỳ'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nisỳ: Fanevako.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy mantsy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'NY TOMPO nianiana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nisy tanana niainga hamely ny sezafiandrianan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hitsahatra hatramin’izay taranany fara aman-dimby ny adin’NY TOMPO amin’ny Amalekita.
