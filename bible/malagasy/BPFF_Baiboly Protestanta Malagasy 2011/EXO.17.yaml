document_id: EXO.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny rano tao Masa sy Meriba
  - type: text
    content: 'Ary nifindra ny fiangonan’ny Zanak’Israely manontolo ka niala tao amin’ny tany efitra Sina, ho any amin’izay toerana natoron’NY TOMPO hitobiany, ary nitoby tao Refidima nefa tsy nisy rano hosotroiny ny olona. '
  '10':
  - type: text
    content: Ary nanatanteraka izay nolazain’i Mosesy taminy i Josoa ka niady tamin’ny Amalekita. Fa i Mosesy sy i Arona ary i Hora kosa dia niakatra ho ao an-tampon’ny havoana.
  '11':
  - type: text
    content: 'Rehefa nasandratr’i Mosesy ny tanany dia nahery ny Israelita; fa rehefa nampidininy ny tanany dia nahery kosa ny Amalekita. '
  '12':
  - type: text
    content: 'Nefa vizana ny tanan’i Mosesy ka naka vato izy roa lahy, nataony teo ambanin’i Mosesy hipetrahany. I Arona sy i Hora dia nanohana ny tanany, koa ny iray dia teo an-daniny ary ny iray dia teo an-kilany; dia naharitra tsy ketraka intsony ny tanany mandra-pahafatin’ny masoandro. '
  '13':
  - type: text
    content: Dia nandresy ny Amalekita sy ny olony tamin’ny lelan-tsabatra i Josoa.
  '14':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Soraty ao amin’ny boky izany ho fahatsiarovana ka ambarao amin’i Josoa; fa hofoanako tsy ho eny ambanin’ny lanitra tokoa ny fahatsiarovana ny Amalekita.'
  '15':
  - type: text
    content: 'Dia nanorina alitara i Mosesy ka ny anarany nataony hoe: NY TOMPO Nisỳ'
  - type: note
    content: 'Nisỳ: Fanevako.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Hoy mantsy izy:'
  - type: text
    content: 'NY TOMPO nianiana hoe:'
  - type: text
    content: Satria nisy tanana niainga hamely ny sezafiandrianan’NY TOMPO
  - type: text
    content: dia tsy hitsahatra hatramin’izay taranany fara aman-dimby ny adin’NY TOMPO amin’ny Amalekita.
  '2':
  - type: text
    content: 'Dia nila ady tamin’i Mosesy izy ireo ka niteny hoe: Omeo rano izahay hosotroinay. Fa hoy i Mosesy taminy: Nahoana no mila ady amiko ianareo? Nahoana no maka fanahy NY TOMPO ianareo?'
  '3':
  - type: text
    content: 'Teo no nangetaheta ny olona ka nimonomonona tamin’i Mosesy ary niteny hoe: Nahoana no noentinao niakatra niala tany Ejipta ho fatin’ny hetaheta izahay sy ny zanakay ary ny bibinay?'
  '4':
  - type: text
    content: 'Ary nitaraina tamin’NY TOMPO i Mosesy hoe: Inona no hataoko amin’ireto olona ireto? Mila hitora-bato ahy izy!'
  '5':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Mandrosoa eo alohan’ny olona, ary mitondrà loholon’ny Israely hiaraka aminao; ary ny tehinao, ilay nikapohanao an’i Neily, dia ento eny an-tananao ka mandehana. '
  '6':
  - type: text
    content: Ary indro, hijoro eo anatrehanao eo ambonin’ny harambato any Horeba Aho dia hikapoka ny harambato ianao ka hisy rano hivoaka avy aminy hosotroin’ny olona. Dia nanatanteraka izany teo imason’ireo loholon’ny Israely i Mosesy.
  '7':
  - type: text
    content: 'Ary ny anaran’izany tany izany dia nataony hoe: Masa sy Meriba'
  - type: note
    content: 'Masa sy Meriba: Fakam-panahy sy Ady.'
  - type: text
    content: ', noho ny ady nataon’ny Zanak’Israely sy noho ny nakany fanahy NY TOMPO hoe: Eto aminay va NY TOMPO, sa tsia?'
  - type: heading
    content: Manafika ny Zanak’Israely ny Amalekita
  '8':
  - type: text
    content: 'Tonga kosa ny Amalekita ka niady tamin’ny Israelita tao Refidima. '
  '9':
  - type: text
    content: 'Dia hoy i Mosesy tamin’i Josoa: Mifidiana lehilahy ho antsika, dia mandehana ka miadia amin’ny Amalekita; fa hijoro eo an-tampon’ny havoana aho rahampitso ka hitana ny tehin’Andriamanitra etỳ an-tanako. '
