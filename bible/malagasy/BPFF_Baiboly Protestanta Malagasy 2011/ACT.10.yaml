document_id: ACT.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahitan’i Kornelio
  - type: text
    content: 'Nisy lehilahy iray tany Kaisaria, i Kornelio no anarany ary kapiteny tamin’ny antokon’ny miaramila antsoina hoe Italiana izy; '
  '10':
  - type: text
    content: 'Noana izy ka te hisakafo; fa raha mbola nokarakaraina ny sakafo ho azy dia azon-tsindrimandry izy '
  '11':
  - type: text
    content: 'ka nahita ny lanitra misokatra sady nisy zavatra midina toa lamba lehibe nampidinina tamin’ny zorony efatra ho amin’ny tany; '
  '12':
  - type: text
    content: 'tao anatin’izany dia nisy ny biby rehetra izay manan-tongotra efatra sy ny zava-mandady sy mikisaka etỳ an-tany ary ny voromanidina. '
  '13':
  - type: text
    content: 'Ary nisy feo niteny taminy hoe: Mitsangàna, ry Petera; vonoy, ka hano. Fa hoy i Petera: Sanatria, Tompoko! '
  '14':
  - type: text
    content: 'Tsy mbola nihinana zavatra fady na tsy madio aho. '
  '15':
  - type: text
    content: 'Fa hoy indray ilay feo taminy fanindroany: Izay efa nodiovin’Andriamanitra dia aza ataonao ho fady. '
  '16':
  - type: text
    content: Ary intelo no nitrangan’izany; dia nakarina nankany an-danitra ilay zavatra nony avy eo.
  '17':
  - type: text
    content: 'Raha mbola nieritreritra tao am-pony ny amin’izay anton’ny fahitana efa hitany i Petera dia indreo ireo olona nirahin’i Kornelio nanontany ny tranon’i Simona ka nijanona teo am-bavahady, '
  '18':
  - type: text
    content: 'dia niantso izy ireo ary nanontany raha ao no mipetraka i Simona izay antsoina koa hoe Petera. '
  '19':
  - type: text
    content: 'Raha mbola nieritreritra ilay fahitana i Petera dia hoy ny Fanahy taminy: Indreo, misy telo lahy mitady anao; '
  '2':
  - type: text
    content: 'mpivavaka tsara sady natahotra an’Andriamanitra izy sy ny ankohonany rehetra ka nanao fiantrana be tamin’ny olona sady nivavaka mandrakariva tamin’Andriamanitra. '
  '20':
  - type: text
    content: 'koa mitsangàna ianao dia midìna ary mandehana miaraka aminy ka aza misalasala, fa Izaho no naniraka azy. '
  '21':
  - type: text
    content: 'Dia nidina tany amin’ireo olona ireo i Petera ka niteny hoe: Inty aho izay tadiavinareo; inona no anton’ny ahatongavanareo atỳ? '
  '22':
  - type: text
    content: 'Dia hoy ireo: I Kornelio kapiteny, lehilahy marina sady matahotra an’Andriamanitra ka tsara laza amin’ny firenen’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' rehetra, dia efa notoroan’anjely masina hevitra hampaka anao ho any an-tranony sy hihaino teny avy aminao. '
  '23':
  - type: text
    content: Ary i Petera dia nampiantrano azy ireo handry tao.
  - type: text
    content: 'Nony ampitso dia niainga i Petera ka nandeha niaraka tamin’izy ireo, ary niaraka taminy koa ny rahalahy sasany avy tany Jopa. '
  '24':
  - type: text
    content: 'Dia tonga tany Kaisaria izy ny ampitson’iny. Efa niandry azy i Kornelio sady efa nampiantso ny havany sy ny namany akaiky. '
  '25':
  - type: text
    content: 'Raha vao niditra i Petera dia nitsena azy i Kornelio ka niankohoka teo amin’ny tongony sady nitsaoka azy. '
  '26':
  - type: text
    content: 'Nefa nampitsangana azy i Petera ka niteny hoe: Mitsangàna fa izaho dia olona ihany. '
  '27':
  - type: text
    content: 'Nony niresaka taminy izy dia niditra tao an-trano ka nahita ny olona maro tafangona tao. '
  '28':
  - type: text
    content: 'Dia hoy izy taminy: Ianareo dia mahalala fa fady amin’ny Jiosy ny hifandray na hiantrano amin’ny olona hafa firenena; nefa izaho dia efa nampahafantarin’Andriamanitra fa tsy misy olona azoko atao hoe fady na tsy madio. '
  '29':
  - type: text
    content: 'Noho izany dia tsy nandà ny hankaty aho rehefa nampiantsoana; koa manontany aho: Inona moa no nampiantsoanareo ahy? '
  '3':
  - type: text
    content: 'Ary nahita miharihary tamin’ny fahitana izy, rehefa tokony ho tamin’ny ora fahasivy antoandro, fa indro, nisy anjelin’Andriamanitra niditra tao an-tranony ka niteny taminy hoe: Ry Kornelio! '
  '30':
  - type: text
    content: 'Hoy i Kornelio: Telo andro lasa izay, tamin’ny ora toy izao, raha nivavaka teto an-tranoko aho tamin’ny ora fahasivy, dia indro, nisy lehilahy niakanjo mamirapiratra nitsangana teto anatrehako '
  '31':
  - type: text
    content: 'ka niteny hoe: Ry Kornelio, efa re ny vavaka ataonao ary efa tsarovana eo anatrehan’Andriamanitra ny fiantranao. '
  '32':
  - type: text
    content: 'Koa maniraha hankany Jopa ka ampanalao i Simona izay antsoina koa hoe Petera; miantrano ao an-tranon’i Simona mpandon-koditra eo amoron-dranomasina izy. '
  '33':
  - type: text
    content: Niaraka tamin’izay dia nandefa olona tany aminao aho; ary tsara ny nahatongavanao. Koa ankehitriny, izahay rehetra dia efa eto anatrehan’Andriamanitra mba hihaino izay rehetra nampilazain’ny Tompo anao.
  - type: heading
    content: Ny toritenin’i Petera
  '34':
  - type: text
    content: 'Dia niloa-bava i Petera ka niteny hoe: Hitako marina tokoa izao fa tsy mizaha tavan’olona Andriamanitra; '
  '35':
  - type: text
    content: 'fa amin’ny firenena rehetra, izay olona matahotra Azy ka manao ny marina no ankasitrahany. '
  '36':
  - type: text
    content: 'Ianareo mahalala ny teny izay nampitondrainy ho amin’ny Zanak’Israely, mitory teny soa milaza fiadanana amin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' izay Tompon’izao rehetra izao, '
  '37':
  - type: text
    content: 'dia ilay teny natomboka hatrany Galilia ka notorina tany '
  - type: text
    content: Jodia
  - type: text
    content: ' rehetra taorianan’ny batisa izay notorin’i Jaona, '
  '38':
  - type: text
    content: 'dia ny amin’i Jesosy avy any Nazareta izay nohosoran’Andriamanitra tamin’ny Fanahy Masina sy ny hery ary nandehandeha nanao soa sy nahasitrana izay rehetra azon’ny herin’ny '
  - type: text
    content: devoly
  - type: text
    content: ', satria nomba Azy Andriamanitra. '
  '39':
  - type: text
    content: 'Vavolombelon’ny zavatra rehetra izay nataony tany amin’ny tanin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' sy tany Jerosalema izahay; Izy dia novonoiny rehefa nahantony teo amin’ny hazo; '
  '4':
  - type: text
    content: 'Nony nibanjina azy izy dia raiki-tahotra ka niteny hoe: Ahoana, Tompoko? Dia niteny taminy indray ilay anjely hoe: Ny vavaka ataonao sy ny fiantranao dia efa tafakatra ho fampahatsiarovana eo anatrehan’Andriamanitra. '
  '40':
  - type: text
    content: 'nefa natsangan’Andriamanitra kosa tamin’ny andro fahatelo ka nasehony marina, '
  '41':
  - type: text
    content: 'tsy tamin’ny olona rehetra, fa tamin’ny vavolombelona izay efa notendren’Andriamanitra rahateo, dia taminay izay niara-nihinana sy nisotro taminy, rehefa nitsangana tamin’ny maty Izy. '
  '42':
  - type: text
    content: 'Ary nandidy anay Izy hitory amin’ny olona ka hanambara fa Izy no voatendrin’Andriamanitra ho Mpitsara ny velona sy ny maty. '
  '43':
  - type: text
    content: Izy no ambaran’ny mpaminany rehetra fa amin’ny anarany no hahazoan’izay rehetra mino Azy famelan-keloka.
  - type: heading
    content: Mandray ny Fanahy Masina ny Jentilisa
  '44':
  - type: text
    content: 'Raha mbola nilaza izany teny izany i Petera dia nilatsaka tamin’izay rehetra nandre ny teny ny Fanahy Masina. '
  '45':
  - type: text
    content: 'Talanjona ny mino isan’ny voafora izay niaraka tamin’i Petera, satria nirotsaka tamin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' koa ny fanomezana, dia ny Fanahy Masina. '
  '46':
  - type: text
    content: 'Ary nandre azy niteny tamin’ny fiteny tsy fantatra sy nankalaza an’Andriamanitra izy ireo. Dia hoy i Petera: '
  '47':
  - type: text
    content: 'Moa misy olona mahazo mandrara ny rano tsy hanaovana batisa azy ireto, izay efa nandray ny Fanahy Masina tahaka antsika koa va? '
  '48':
  - type: text
    content: 'Dia nasainy natao batisa amin’ny anaran’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' izy ireo. Ary nangatahin’ireo mba hijanona ao aminy andro vitsivitsy i Petera.'
  '5':
  - type: text
    content: 'Koa ankehitriny, maniraha olona hankany Jopa ka ampanalao ny lehilahy iray atao hoe Simona izay antsoina koa hoe Petera; '
  '6':
  - type: text
    content: 'mitoetra ao amin’i Simona mpandon-koditra izy ary eo amoron-dranomasina ny tranony. '
  '7':
  - type: text
    content: 'Rehefa lasa ilay anjely izay niteny tamin’i Kornelio dia niantso roa lahy tamin’ny mpanompony sy miaramila mpivavaka iray isan’izay nanaraka azy isanandro izy. '
  '8':
  - type: text
    content: Rehefa nambarany taminy izany rehetra izany dia naniraka azy ireo hankany Jopa izy.
  - type: heading
    content: Ny fahitan’i Petera
  - type: heading
    content: Asa 11.5-17
  '9':
  - type: text
    content: 'Nony ampitso, raha mbola nandeha teny an-dalana izy ireo ka efa teo akaiky ny tanàna, dia niakatra teo ambonin’ny '
  - type: text
    content: tampon-trano
  - type: text
    content: ' i Petera mba hivavaka, rehefa tokony ho tamin’ny ora fahenina. '
