document_id: ACT.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahitan’i Kornelio
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy lehilahy iray tany Kaisaria, i Kornelio no anarany ary kapiteny tamin’ny antokon’ny miaramila antsoina hoe Italiana izy; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mpivavaka tsara sady natahotra an’Andriamanitra izy sy ny ankohonany rehetra ka nanao fiantrana be tamin’ny olona sady nivavaka mandrakariva tamin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nahita miharihary tamin’ny fahitana izy, rehefa tokony ho tamin’ny ora fahasivy antoandro, fa indro, nisy anjelin’Andriamanitra niditra tao an-tranony ka niteny taminy hoe: Ry Kornelio! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony nibanjina azy izy dia raiki-tahotra ka niteny hoe: Ahoana, Tompoko? Dia niteny taminy indray ilay anjely hoe: Ny vavaka ataonao sy ny fiantranao dia efa tafakatra ho fampahatsiarovana eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa ankehitriny, maniraha olona hankany Jopa ka ampanalao ny lehilahy iray atao hoe Simona izay antsoina koa hoe Petera; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'mitoetra ao amin’i Simona mpandon-koditra izy ary eo amoron-dranomasina ny tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa lasa ilay anjely izay niteny tamin’i Kornelio dia niantso roa lahy tamin’ny mpanompony sy miaramila mpivavaka iray isan’izay nanaraka azy isanandro izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rehefa nambarany taminy izany rehetra izany dia naniraka azy ireo hankany Jopa izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahitan’i Petera
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Asa 11.5-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony ampitso, raha mbola nandeha teny an-dalana izy ireo ka efa teo akaiky ny tanàna, dia niakatra teo ambonin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-trano
  - type: text
    text: ' i Petera mba hivavaka, rehefa tokony ho tamin’ny ora fahenina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Noana izy ka te hisakafo; fa raha mbola nokarakaraina ny sakafo ho azy dia azon-tsindrimandry izy '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka nahita ny lanitra misokatra sady nisy zavatra midina toa lamba lehibe nampidinina tamin’ny zorony efatra ho amin’ny tany; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'tao anatin’izany dia nisy ny biby rehetra izay manan-tongotra efatra sy ny zava-mandady sy mikisaka etỳ an-tany ary ny voromanidina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nisy feo niteny taminy hoe: Mitsangàna, ry Petera; vonoy, ka hano. Fa hoy i Petera: Sanatria, Tompoko! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy mbola nihinana zavatra fady na tsy madio aho. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy indray ilay feo taminy fanindroany: Izay efa nodiovin’Andriamanitra dia aza ataonao ho fady. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary intelo no nitrangan’izany; dia nakarina nankany an-danitra ilay zavatra nony avy eo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha mbola nieritreritra tao am-pony ny amin’izay anton’ny fahitana efa hitany i Petera dia indreo ireo olona nirahin’i Kornelio nanontany ny tranon’i Simona ka nijanona teo am-bavahady, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia niantso izy ireo ary nanontany raha ao no mipetraka i Simona izay antsoina koa hoe Petera. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha mbola nieritreritra ilay fahitana i Petera dia hoy ny Fanahy taminy: Indreo, misy telo lahy mitady anao; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'koa mitsangàna ianao dia midìna ary mandehana miaraka aminy ka aza misalasala, fa Izaho no naniraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nidina tany amin’ireo olona ireo i Petera ka niteny hoe: Inty aho izay tadiavinareo; inona no anton’ny ahatongavanareo atỳ? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy ireo: I Kornelio kapiteny, lehilahy marina sady matahotra an’Andriamanitra ka tsara laza amin’ny firenen’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' rehetra, dia efa notoroan’anjely masina hevitra hampaka anao ho any an-tranony sy hihaino teny avy aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary i Petera dia nampiantrano azy ireo handry tao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nony ampitso dia niainga i Petera ka nandeha niaraka tamin’izy ireo, ary niaraka taminy koa ny rahalahy sasany avy tany Jopa. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia tonga tany Kaisaria izy ny ampitson’iny. Efa niandry azy i Kornelio sady efa nampiantso ny havany sy ny namany akaiky. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha vao niditra i Petera dia nitsena azy i Kornelio ka niankohoka teo amin’ny tongony sady nitsaoka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nefa nampitsangana azy i Petera ka niteny hoe: Mitsangàna fa izaho dia olona ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nony niresaka taminy izy dia niditra tao an-trano ka nahita ny olona maro tafangona tao. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy izy taminy: Ianareo dia mahalala fa fady amin’ny Jiosy ny hifandray na hiantrano amin’ny olona hafa firenena; nefa izaho dia efa nampahafantarin’Andriamanitra fa tsy misy olona azoko atao hoe fady na tsy madio. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Noho izany dia tsy nandà ny hankaty aho rehefa nampiantsoana; koa manontany aho: Inona moa no nampiantsoanareo ahy? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hoy i Kornelio: Telo andro lasa izay, tamin’ny ora toy izao, raha nivavaka teto an-tranoko aho tamin’ny ora fahasivy, dia indro, nisy lehilahy niakanjo mamirapiratra nitsangana teto anatrehako '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ka niteny hoe: Ry Kornelio, efa re ny vavaka ataonao ary efa tsarovana eo anatrehan’Andriamanitra ny fiantranao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa maniraha hankany Jopa ka ampanalao i Simona izay antsoina koa hoe Petera; miantrano ao an-tranon’i Simona mpandon-koditra eo amoron-dranomasina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Niaraka tamin’izay dia nandefa olona tany aminao aho; ary tsara ny nahatongavanao. Koa ankehitriny, izahay rehetra dia efa eto anatrehan’Andriamanitra mba hihaino izay rehetra nampilazain’ny Tompo anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny toritenin’i Petera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia niloa-bava i Petera ka niteny hoe: Hitako marina tokoa izao fa tsy mizaha tavan’olona Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'fa amin’ny firenena rehetra, izay olona matahotra Azy ka manao ny marina no ankasitrahany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ianareo mahalala ny teny izay nampitondrainy ho amin’ny Zanak’Israely, mitory teny soa milaza fiadanana amin’ny alalan’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' izay Tompon’izao rehetra izao, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'dia ilay teny natomboka hatrany Galilia ka notorina tany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' rehetra taorianan’ny batisa izay notorin’i Jaona, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'dia ny amin’i Jesosy avy any Nazareta izay nohosoran’Andriamanitra tamin’ny Fanahy Masina sy ny hery ary nandehandeha nanao soa sy nahasitrana izay rehetra azon’ny herin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ', satria nomba Azy Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Vavolombelon’ny zavatra rehetra izay nataony tany amin’ny tanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' sy tany Jerosalema izahay; Izy dia novonoiny rehefa nahantony teo amin’ny hazo; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'nefa natsangan’Andriamanitra kosa tamin’ny andro fahatelo ka nasehony marina, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'tsy tamin’ny olona rehetra, fa tamin’ny vavolombelona izay efa notendren’Andriamanitra rahateo, dia taminay izay niara-nihinana sy nisotro taminy, rehefa nitsangana tamin’ny maty Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary nandidy anay Izy hitory amin’ny olona ka hanambara fa Izy no voatendrin’Andriamanitra ho Mpitsara ny velona sy ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Izy no ambaran’ny mpaminany rehetra fa amin’ny anarany no hahazoan’izay rehetra mino Azy famelan-keloka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandray ny Fanahy Masina ny Jentilisa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Raha mbola nilaza izany teny izany i Petera dia nilatsaka tamin’izay rehetra nandre ny teny ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Talanjona ny mino isan’ny voafora izay niaraka tamin’i Petera, satria nirotsaka tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' koa ny fanomezana, dia ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary nandre azy niteny tamin’ny fiteny tsy fantatra sy nankalaza an’Andriamanitra izy ireo. Dia hoy i Petera: '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Moa misy olona mahazo mandrara ny rano tsy hanaovana batisa azy ireto, izay efa nandray ny Fanahy Masina tahaka antsika koa va? '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia nasainy natao batisa amin’ny anaran’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' izy ireo. Ary nangatahin’ireo mba hijanona ao aminy andro vitsivitsy i Petera.'
