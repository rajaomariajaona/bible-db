document_id: EZK.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny voromahery sy ny tahom-boaloboka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', manaova ankamantatra, ary milazà oha-teny amin’ny taranak’Israely '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nisy voromahery lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanana elatra lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady lava ny volon’elany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nisoratsoratra avokoa ny volony rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tonga tao Libanona izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka naka izay avo indrindra tamin’ny rantsan’ny sedera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny tendron’ny tarony dia nolaingosany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka noentiny ho any amin’ny tanin’ny mpivarotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tany amin’ny tanànan’ny mpivaro-mandeha no nametrahany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nanalany koa ny voan-javatra tamin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka namboleny tao amin’ny tany lonaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noentiny ho eo amoron’ny rano betsaka iny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nataony araka ny fanao amin’ny hazomalahelo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia naniry iny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tonga voaloboka iva misandrahaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitodihan’ny rantsany ho eo amin’ilay voromahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fotony ho ao ambaniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa tonga voaloboka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandrantsana sy nanaroka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nisy voromahery lehibe hafa koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanana elatra lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady be volo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary indro, manina azy izany voaloboka izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampanatona ny vahany hankany aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nampanaroka ny rantsany avy tamin’ny tany voafaritra nambolena azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hankany aminy koa mba holemany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Voavoly tao amin’ny saha tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amoron’ny rano betsaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba handrantsana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho voaloboka tsara indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lazaonao hoe: Izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho vanona va izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hongotana va ny vahany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotazana ny voany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba halazo izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Halazo ny raviny rehetra raha vao mitsimoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ilàna sandry mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: na vahoaka betsaka akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanongotra azy amin’ny fotony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa indro, na dia voavoly aza izy, moa ho vanona va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy halazo tokoa va izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha asian’ny rivotra avy any atsinanana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, halazo eo amin’ny tany voafaritra naniriany izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanazavana ilay fanoharana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lazao amin’ny taranaka maditra hoe: Tsy fantatrareo va ny hevitr’ireto zavatra ireto? Lazao aminy hoe: Indro, tonga tany Jerosalema ny mpanjakan’i Babilona ka naka ny mpanjaka sy ny mpanapaka tao dia nitondra azy ho any aminy any Babilona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary naka ny iray tamin’ny taranaky ny mpanjaka izy dia nanao fanekena taminy ka nampianiana azy, ary ny lehilahy mahery tamin’ny tany dia noentiny nandeha, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'mba hietry ny fanjakana ka tsy hiarina, ary hitandrina ny fanekeny mba haharitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nikomy taminy anefa izy ireo ka nandefa iraka hankany Ejipta mba hanome soavaly sy olona maro azy. Moa hambinina va izy? Ho afa-mandositra va izay manao toy izany? Nivadika ny fanekena izy ka ho afa-mandositra va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha velona koa Aho, hoy NY TOMPO Andriamanitra dia any amin’ny tanin’ilay mpanjaka nampanjaka azy sady nampianiana azy, nefa nohamavoiny ny fianianana, ary nivadihany ny fanekeny, eny, any amin’io, any Babilona, no hahafatesany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa asandratra ireo manda fanafihana sy atototra ny tovon-tany handringanana olona maro dia tsy hanampy azy amin’ny ady akory i Farao na dia manana miaramila maro sy vahoaka betsaka aza izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa nanamavo ny fianianana izy tamin’ny nivadihany ny fanekena, fa e! Efa nanaiky izy, kanefa dia izany rehetra izany no nataony ka tsy ho afa-mandositra izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Raha velona koa Aho, ny fampianianako izay nohamavoiny ary ny fanekeko izay nivadihany dia hatsingeriko ho eo an-dohany tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny fandrika haratoko dia hovelariko aminy ka ho azon’ny haratoko izy, ary ho entiko any Babilona ka hotsaraiko any noho ny nivadihany tamiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny miaramilany rehetra izay afa-mandositra dia ho lavon’ny sabatra, ary izay sisa tavela dia haely ho eny amin’ny rivotra rehetra, dia ho fantatrareo fa Izaho TOMPO no niteny izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Izaho haka amin’ny rantsana avo indrindra amin’ny sedera avo ka hamboleko izany; holaingosako ny tendron’ny laingony milenodenoka ka hamboleko ao amin’ny tendrombohitra avo sy milangalanga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ao amin’ny tendrombohitra avon’ny Israely no hamboleko azy; handrantsana sy hamoa izy ka ho tonga sedera tsara indrindra, ary ny vorona samihafa rehetra dia hitoetra ao aminy; ao amin’ny alokaloky ny rantsany no hitoerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia ho fantatry ny hazo rehetra any an-tsaha fa Izaho TOMPO no nanetry ny hazo avo ka nanandratra ny hazo iva, ary nandazo ny hazo maitso ka nampaniry ny hazo maina; Izaho TOMPO no niteny sady nanao izany.
