document_id: EZK.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voromahery sy ny tahom-boaloboka
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: Koa indro, na dia voavoly aza izy, moa ho vanona va?
  - type: text
    content: Tsy halazo tokoa va izy
  - type: text
    content: raha asian’ny rivotra avy any atsinanana?
  - type: text
    content: Eny, halazo eo amin’ny tany voafaritra naniriany izy.
  - type: heading
    content: Fanazavana ilay fanoharana
  '11':
  - type: text
    content: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
  '12':
  - type: text
    content: 'Lazao amin’ny taranaka maditra hoe: Tsy fantatrareo va ny hevitr’ireto zavatra ireto? Lazao aminy hoe: Indro, tonga tany Jerosalema ny mpanjakan’i Babilona ka naka ny mpanjaka sy ny mpanapaka tao dia nitondra azy ho any aminy any Babilona. '
  '13':
  - type: text
    content: 'Ary naka ny iray tamin’ny taranaky ny mpanjaka izy dia nanao fanekena taminy ka nampianiana azy, ary ny lehilahy mahery tamin’ny tany dia noentiny nandeha, '
  '14':
  - type: text
    content: 'mba hietry ny fanjakana ka tsy hiarina, ary hitandrina ny fanekeny mba haharitra. '
  '15':
  - type: text
    content: 'Nikomy taminy anefa izy ireo ka nandefa iraka hankany Ejipta mba hanome soavaly sy olona maro azy. Moa hambinina va izy? Ho afa-mandositra va izay manao toy izany? Nivadika ny fanekena izy ka ho afa-mandositra va? '
  '16':
  - type: text
    content: 'Raha velona koa Aho, hoy NY TOMPO Andriamanitra dia any amin’ny tanin’ilay mpanjaka nampanjaka azy sady nampianiana azy, nefa nohamavoiny ny fianianana, ary nivadihany ny fanekeny, eny, any amin’io, any Babilona, no hahafatesany. '
  '17':
  - type: text
    content: 'Ary rehefa asandratra ireo manda fanafihana sy atototra ny tovon-tany handringanana olona maro dia tsy hanampy azy amin’ny ady akory i Farao na dia manana miaramila maro sy vahoaka betsaka aza izy. '
  '18':
  - type: text
    content: 'Fa nanamavo ny fianianana izy tamin’ny nivadihany ny fanekena, fa e! Efa nanaiky izy, kanefa dia izany rehetra izany no nataony ka tsy ho afa-mandositra izy! '
  '19':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Raha velona koa Aho, ny fampianianako izay nohamavoiny ary ny fanekeko izay nivadihany dia hatsingeriko ho eo an-dohany tokoa. '
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', manaova ankamantatra, ary milazà oha-teny amin’ny taranak’Israely '
  '20':
  - type: text
    content: 'Ary ny fandrika haratoko dia hovelariko aminy ka ho azon’ny haratoko izy, ary ho entiko any Babilona ka hotsaraiko any noho ny nivadihany tamiko. '
  '21':
  - type: text
    content: Ary ny miaramilany rehetra izay afa-mandositra dia ho lavon’ny sabatra, ary izay sisa tavela dia haely ho eny amin’ny rivotra rehetra, dia ho fantatrareo fa Izaho TOMPO no niteny izany.
  '22':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Izaho haka amin’ny rantsana avo indrindra amin’ny sedera avo ka hamboleko izany; holaingosako ny tendron’ny laingony milenodenoka ka hamboleko ao amin’ny tendrombohitra avo sy milangalanga. '
  '23':
  - type: text
    content: 'Ao amin’ny tendrombohitra avon’ny Israely no hamboleko azy; handrantsana sy hamoa izy ka ho tonga sedera tsara indrindra, ary ny vorona samihafa rehetra dia hitoetra ao aminy; ao amin’ny alokaloky ny rantsany no hitoerany. '
  '24':
  - type: text
    content: Dia ho fantatry ny hazo rehetra any an-tsaha fa Izaho TOMPO no nanetry ny hazo avo ka nanandratra ny hazo iva, ary nandazo ny hazo maitso ka nampaniry ny hazo maina; Izaho TOMPO no niteny sady nanao izany.
  '3':
  - type: text
    content: 'ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Nisy voromahery lehibe
  - type: text
    content: nanana elatra lehibe,
  - type: text
    content: sady lava ny volon’elany,
  - type: text
    content: ary nisoratsoratra avokoa ny volony rehetra.
  - type: text
    content: Tonga tao Libanona izy
  - type: text
    content: ka naka izay avo indrindra tamin’ny rantsan’ny sedera.
  '4':
  - type: text
    content: Ny tendron’ny tarony dia nolaingosany
  - type: text
    content: ka noentiny ho any amin’ny tanin’ny mpivarotra,
  - type: text
    content: eny, tany amin’ny tanànan’ny mpivaro-mandeha no nametrahany azy.
  '5':
  - type: text
    content: Nanalany koa ny voan-javatra tamin’ny tany
  - type: text
    content: ka namboleny tao amin’ny tany lonaka.
  - type: text
    content: Noentiny ho eo amoron’ny rano betsaka iny
  - type: text
    content: ka nataony araka ny fanao amin’ny hazomalahelo.
  '6':
  - type: text
    content: Dia naniry iny
  - type: text
    content: ka tonga voaloboka iva misandrahaka
  - type: text
    content: mba hitodihan’ny rantsany ho eo amin’ilay voromahery
  - type: text
    content: ary ny fotony ho ao ambaniny;
  - type: text
    content: koa tonga voaloboka izy
  - type: text
    content: ka nandrantsana sy nanaroka.
  '7':
  - type: text
    content: Ary nisy voromahery lehibe hafa koa
  - type: text
    content: nanana elatra lehibe
  - type: text
    content: sady be volo,
  - type: text
    content: ary indro, manina azy izany voaloboka izany
  - type: text
    content: ka nampanatona ny vahany hankany aminy
  - type: text
    content: sady nampanaroka ny rantsany avy tamin’ny tany voafaritra nambolena azy
  - type: text
    content: mba hankany aminy koa mba holemany.
  '8':
  - type: text
    content: Voavoly tao amin’ny saha tsara
  - type: text
    content: teo amoron’ny rano betsaka izy
  - type: text
    content: mba handrantsana
  - type: text
    content: sy hamoa
  - type: text
    content: ka ho voaloboka tsara indrindra.
  '9':
  - type: text
    content: 'Lazaonao hoe: Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Ho vanona va izy?
  - type: text
    content: Tsy hongotana va ny vahany
  - type: text
    content: ary hotazana ny voany
  - type: text
    content: mba halazo izy?
  - type: text
    content: Halazo ny raviny rehetra raha vao mitsimoka
  - type: text
    content: ka tsy ilàna sandry mahery
  - type: text
    content: na vahoaka betsaka akory
  - type: text
    content: hanongotra azy amin’ny fotony.
