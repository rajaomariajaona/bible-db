document_id: 1CO.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandefitra amin’ny zo tokony ho azony i Paoly
  - type: text
    content: 'Tsy olona afaka va aho? Tsy apostoly va aho? Tsy efa nahita an’i Jesosy Tompontsika va aho? Tsy asako ao amin’ny Tompo va ianareo? '
  '10':
  - type: text
    content: 'Sa noho izahay mihitsy no nanaovana izany teny izany? Eny, fa noho izahay indrindra no nanoratana izany, satria izay miasa tany dia tokony hiasa amin’ny fanantenana ary izay mively vary dia tokony hively amin’ny fanantenana hahazo. '
  '11':
  - type: text
    content: Raha namafy izay zava-panahy ho anareo izahay, moa tsy zava-dehibe koa va raha mba mijinja izay anananareo araka ny nofo kosa izahay?
  '12':
  - type: text
    content: 'Raha ny hafa aza no manana izany zo izany aminareo, tsy mainka va fa izahay? Kanefa tsy nanampatra izany zo izany izahay fa mihafy amin’ny zavatra rehetra fandrao hampisy sakana ny Filazantsaran’i '
  - type: text
    content: Kristy
  - type: text
    content: .
  '13':
  - type: text
    content: 'Tsy fantatrareo va fa izay manompo amin’ny zavatra masina dia mihinana ny zavatry ny tempoly, ary izay manompo eo amin’ny alitara dia mahazo anjara amin’ny zavatra izay natao sorona teo amin’ny alitara? '
  '14':
  - type: text
    content: Toy izany koa no nandidian’ny Tompo fa izay mitory ny Filazantsara dia hahazo fivelomana avy amin’ny Filazantsara.
  '15':
  - type: text
    content: 'Nefa tsy nahavatra nitaky izany aho na dia kely akory aza; ary tsy manoratra izany mba hanaovana izany amiko aho; fa aleoko maty toy izay hisy hahafoana ny reharehako. '
  '16':
  - type: text
    content: 'Fa raha mitory ny Filazantsara aho dia tsy misy reharehako amin’izany, satria tsy maintsy manatanteraka izany aho; fa lozako raha tsy mitory ny Filazantsara aho! '
  '17':
  - type: text
    content: 'Fa raha ny sitrapoko no anaovako izany dia mahazo valim-pitia aho; fa raha tsy ny sitrapoko kosa dia natolotra ahy ho andraikitro izany. '
  '18':
  - type: text
    content: 'Inona ary no valim-pitia azoko? Dia izao: Raha mitory ny Filazantsara aho dia tsy asiako fandoavam-bola ny Filazantsara mba tsy hanamparako ny fahefako amin’ny Filazantsara.'
  - type: heading
    content: Nanaiky ho mpanompon’ny olona rehetra i Paoly
  '19':
  - type: text
    content: 'Fa na dia olona afaka eo anatrehan’ny olona rehetra aza aho dia mbola nataoko ho mpanompon’ny olona rehetra ihany ny tenako mba hahazoako ny maro araka izay azo atao. '
  '2':
  - type: text
    content: Raha tsy apostoly ho an’ny sasany aza aho dia apostoly ho anareo tokoa; fa ianareo no tombo-kase maha apostoly ahy ao amin’ny Tompo.
  '20':
  - type: text
    content: 'Teo amin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' dia tonga toy ny Jiosy aho mba hahazoako ny Jiosy; teo amin’izay ambanin’ny lalàna dia tonga toy izay ambanin’ny lalàna aho na dia tsy ambanin’ny lalàna aza aho, mba hahazoako izay ambanin’ny lalàna; '
  '21':
  - type: text
    content: 'teo amin’izay tsy manana lalàna dia toy izay tsy manana lalàna aho mba hahazoako izay tsy manana lalàna, kanefa tsy mba olona tsy manana lalàna amin’Andriamanitra aho fa ambanin’ny lalànan’i '
  - type: text
    content: Kristy
  - type: text
    content: '; '
  '22':
  - type: text
    content: 'teo amin’ny malemy finoana dia tonga malemy finoana aho, mba hahazoako ny malemy finoana; efa tonga zavatra rehetra aho amin’ny olona rehetra, mba hamonjeko ny sasany amin’ny fomba rehetra. '
  '23':
  - type: text
    content: Ary izany rehetra izany dia ataoko noho ny Filazantsara mba ho tonga mpiombona aminy aho.
  - type: heading
    content: Ny fifehezan-tena ataon’ny mpihazakazaka
  '24':
  - type: text
    content: 'Tsy fantatrareo va fa izay mihazakazaka eo amin’ny tany fihazakazahana dia samy mihazakazaka avokoa, nefa dia ny iray ihany no mahazo ny loka? Mihazakazaha koa toy izany mba hahazoanareo. '
  '25':
  - type: text
    content: 'Ary ny mpihazakazaka rehetra dia mahonon-tena amin’ny zavatra rehetra. Kanefa ireny dia mitady satroboninahitra mety ho lo ihany, fa isika kosa dia mitady ny tsy mety ho lo. '
  '26':
  - type: text
    content: 'Raha izaho ary dia mihazakazaka aho, nefa tsy toy ny manao kitoatoa; ary mamely totohondry aho, nefa tsy toy ny mamely rivotra; '
  '27':
  - type: text
    content: fa asiako mafy ny tenako ho mangana ka andevoziko, fandrao na dia efa nitory tamin’ny sasany aza aho dia holavina kosa.
  '3':
  - type: text
    content: 'Izany no avaliko izay manadina ahy. '
  '4':
  - type: text
    content: 'Moa tsy mba mahazo mihinana sy misotro va izahay? '
  '5':
  - type: text
    content: 'Moa tsy mba mahazo mitondra vady izay isan’ny mino va izahay, tahaka ny apostoly sasany koa sy ny rahalahin’ny Tompo ary i Kefasy? '
  '6':
  - type: text
    content: 'Sa izaho sy i Barnabasy ihany va no tsy manana zo tsy hiasa? '
  '7':
  - type: text
    content: Iza no mandeha manafika ka mivelona amin’ny harenan’ny tenany? Iza no mamboly voaloboka ka tsy mihinana ny vokatra? Ary iza no miandry ondry aman’osy ka tsy mivelona amin’ny rononony?
  '8':
  - type: text
    content: 'Moa araka ny fihevitry ny olona va no itenenako izany, sa mba milaza izany koa ny lalàna? '
  '9':
  - type: text
    content: 'Fa voasoratra ao amin’ny lalànan’i Mosesy hoe: «Aza manakombona ny vavan’ny omby manosihosy vary» (Deo 25.4). Ny omby va no ahian’Andriamanitra? '
