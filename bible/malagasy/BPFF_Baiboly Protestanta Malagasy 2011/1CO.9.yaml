document_id: 1CO.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandefitra amin’ny zo tokony ho azony i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsy olona afaka va aho? Tsy apostoly va aho? Tsy efa nahita an’i Jesosy Tompontsika va aho? Tsy asako ao amin’ny Tompo va ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha tsy apostoly ho an’ny sasany aza aho dia apostoly ho anareo tokoa; fa ianareo no tombo-kase maha apostoly ahy ao amin’ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izany no avaliko izay manadina ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moa tsy mba mahazo mihinana sy misotro va izahay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moa tsy mba mahazo mitondra vady izay isan’ny mino va izahay, tahaka ny apostoly sasany koa sy ny rahalahin’ny Tompo ary i Kefasy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sa izaho sy i Barnabasy ihany va no tsy manana zo tsy hiasa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Iza no mandeha manafika ka mivelona amin’ny harenan’ny tenany? Iza no mamboly voaloboka ka tsy mihinana ny vokatra? Ary iza no miandry ondry aman’osy ka tsy mivelona amin’ny rononony?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moa araka ny fihevitry ny olona va no itenenako izany, sa mba milaza izany koa ny lalàna? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa voasoratra ao amin’ny lalànan’i Mosesy hoe: «Aza manakombona ny vavan’ny omby manosihosy vary» (Deo 25.4). Ny omby va no ahian’Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Sa noho izahay mihitsy no nanaovana izany teny izany? Eny, fa noho izahay indrindra no nanoratana izany, satria izay miasa tany dia tokony hiasa amin’ny fanantenana ary izay mively vary dia tokony hively amin’ny fanantenana hahazo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raha namafy izay zava-panahy ho anareo izahay, moa tsy zava-dehibe koa va raha mba mijinja izay anananareo araka ny nofo kosa izahay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha ny hafa aza no manana izany zo izany aminareo, tsy mainka va fa izahay? Kanefa tsy nanampatra izany zo izany izahay fa mihafy amin’ny zavatra rehetra fandrao hampisy sakana ny Filazantsaran’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy fantatrareo va fa izay manompo amin’ny zavatra masina dia mihinana ny zavatry ny tempoly, ary izay manompo eo amin’ny alitara dia mahazo anjara amin’ny zavatra izay natao sorona teo amin’ny alitara? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy izany koa no nandidian’ny Tompo fa izay mitory ny Filazantsara dia hahazo fivelomana avy amin’ny Filazantsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nefa tsy nahavatra nitaky izany aho na dia kely akory aza; ary tsy manoratra izany mba hanaovana izany amiko aho; fa aleoko maty toy izay hisy hahafoana ny reharehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa raha mitory ny Filazantsara aho dia tsy misy reharehako amin’izany, satria tsy maintsy manatanteraka izany aho; fa lozako raha tsy mitory ny Filazantsara aho! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha ny sitrapoko no anaovako izany dia mahazo valim-pitia aho; fa raha tsy ny sitrapoko kosa dia natolotra ahy ho andraikitro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Inona ary no valim-pitia azoko? Dia izao: Raha mitory ny Filazantsara aho dia tsy asiako fandoavam-bola ny Filazantsara mba tsy hanamparako ny fahefako amin’ny Filazantsara.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanaiky ho mpanompon’ny olona rehetra i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa na dia olona afaka eo anatrehan’ny olona rehetra aza aho dia mbola nataoko ho mpanompon’ny olona rehetra ihany ny tenako mba hahazoako ny maro araka izay azo atao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' dia tonga toy ny Jiosy aho mba hahazoako ny Jiosy; teo amin’izay ambanin’ny lalàna dia tonga toy izay ambanin’ny lalàna aho na dia tsy ambanin’ny lalàna aza aho, mba hahazoako izay ambanin’ny lalàna; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'teo amin’izay tsy manana lalàna dia toy izay tsy manana lalàna aho mba hahazoako izay tsy manana lalàna, kanefa tsy mba olona tsy manana lalàna amin’Andriamanitra aho fa ambanin’ny lalànan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'teo amin’ny malemy finoana dia tonga malemy finoana aho, mba hahazoako ny malemy finoana; efa tonga zavatra rehetra aho amin’ny olona rehetra, mba hamonjeko ny sasany amin’ny fomba rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary izany rehetra izany dia ataoko noho ny Filazantsara mba ho tonga mpiombona aminy aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifehezan-tena ataon’ny mpihazakazaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsy fantatrareo va fa izay mihazakazaka eo amin’ny tany fihazakazahana dia samy mihazakazaka avokoa, nefa dia ny iray ihany no mahazo ny loka? Mihazakazaha koa toy izany mba hahazoanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny mpihazakazaka rehetra dia mahonon-tena amin’ny zavatra rehetra. Kanefa ireny dia mitady satroboninahitra mety ho lo ihany, fa isika kosa dia mitady ny tsy mety ho lo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha izaho ary dia mihazakazaka aho, nefa tsy toy ny manao kitoatoa; ary mamely totohondry aho, nefa tsy toy ny mamely rivotra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: fa asiako mafy ny tenako ho mangana ka andevoziko, fandrao na dia efa nitory tamin’ny sasany aza aho dia holavina kosa.
