document_id: 1SA.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia tonga teo ny mponina tao Kiriata-Jearima ka nitondra ny vata misy ny faneken’NY TOMPO niakatra; nitondra azy ho ao an-tranon’i Abinadaba, teo amin’ny havoana izy ireo, ary nanamasina an’i Eleazara zanany mba hitandrina ny vata misy ny faneken’NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fivoriana tao Mizpa sy ny nandresen’ny Israely ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hatramin’izany andro izany dia nitoetra ela, roapolo taona, tany Kiriata-Jearima ny vata misy ny faneken’NY TOMPO; ary ny taranak’Israely rehetra dia nitaraina tamin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy i Samoela tamin’ny taranak’Israely rehetra: Raha miverina amin’NY TOMPO amin’ny fonareo manontolo tokoa ary ianareo dia ario hiala aminareo ny andriamanitra tsy izy sy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Astarta
  - type: text
    text: ' ka ampiomany ho an’NY TOMPO ny fonareo, ary aoka Izy ihany no hotompoinareo, dia hamonjy anareo amin’ny tanan’ny Filistina Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanary ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' sy ireo Astarta ny Zanak’Israely ka nanompo NY TOMPO irery ihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy i Samoela: Vorio any Mizpa ny Israely rehetra, dia hivavaka amin’NY TOMPO ho anareo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nivory tany Mizpa izy, ary nanovo rano ka nandraraka izany teo anatrehan’NY TOMPO sady nifady hanina nandritra io andro io ka niteny hoe: Efa nanota tamin’NY TOMPO isika. Ary nitsara ny Zanak’Israely tany Mizpa i Samoela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa ren’ny Filistina fa vory tany Mizpa ny Zanak’Israely dia niakatra hamely azy ireo andrianan’ny Filistina. Nony nandre izany ny Zanak’Israely dia raiki-tahotra noho ny Filistina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy ny Zanak’Israely tamin’i Samoela: Aza mitsahatra mitaraina amin’NY TOMPO Andriamanitsika ho anay ianao, mba hamonjeny anay amin’ny tanan’ny Filistina. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia naka zanak’ondry iray mbola minono i Samoela ka nanolotra azy ho fanatitra dorana manontolo ho an’NY TOMPO; ary nitaraina tamin’NY TOMPO ho an’ny Israely i Samoela ka nihaino azy NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha mbola nanolotra ny fanatitra dorana manontolo i Samoela dia nanatona hiady amin’ny Israely ny Filistina; fa NY TOMPO nampikotrokorana mafy tamin’ny Filistina tamin’izany andro izany ka nampifanaritaka azy, dia resy teo anoloan’ny Israely izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary niala tany Mizpa ny lehilahin’ny Israely ka nanenjika ny Filistina ary namely azy mandra-pahatongany teo ambanin’i Bety-Kara. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary naka vato i Samoela ka nanorina azy teo anelanelan’i Mizpa sy Sena; ny anarany dia nataony hoe Ebenezera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ebenezera: Vato famonjena.'
    marker-yv: yv-n
  - type: text
    text: '; fa hoy izy: Efa novonjen’NY TOMPO isika hatramin’izao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia resy ny Filistina ka tsy tafiditra tao anatin’ny tanin’ny Israely intsony; ary ny tanan’NY TOMPO dia namely ny Filistina nandritra ny andro rehetra niainan’i Samoela. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny tanàna izay efa nalain’ny Filistina tamin’ny Israely dia azon’ny Israely indray, hatrany Ekrona ka hatrany Gata; ary ny tanin’izy ireo dia nalain’ny Israely tamin’ny tanan’ny Filistina koa. Ary nihavana ny Israely sy ny Amorita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nitsara ny Israely i Samoela tamin’ny andro rehetra niainany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nandeha isan-taona isan-taona nitety an’i Betela sy i Gilgala ary i Mizpa izy ka nitsara ny Israely teo amin’ireo tanàna rehetra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Niverina ho any Rama indray izy avy eo, fa tao ny tranony; ary nitsara ny Israely sy nanorina alitara ho an’NY TOMPO tao izy.
