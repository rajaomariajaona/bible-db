document_id: JOB.29,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny farany navalin’i Joba: E! Ny hasambarana tamin’ny andro taloha!'
  - type: text
    content: 'Dia mbola nandroso nanao oha-teny ihany i Joba hoe:'
  '10':
  - type: text
    content: tsy sahy niteny ny mpanapaka
  - type: text
    content: ary ny lelany dia niraikitra tamin’ny lanilaniny.
  '11':
  - type: text
    content: Izay sofina nandre dia niteny ahy hoe sambatra
  - type: text
    content: ary izay maso nahita dia vavolombelona ho ahy
  '12':
  - type: text
    content: satria namonjy ny ory izay nitaraina aho
  - type: text
    content: sy ny kamboty izay tsy nanan-kamonjy.
  '13':
  - type: text
    content: Ny fisaoran’izay efa ho faty dia tonga tamiko
  - type: text
    content: ary ny fon’ny mpitondratena dia nampifaliko.
  '14':
  - type: text
    content: Nitafy fahamarinana aho ka mba nitafy ahy kosa izy.
  - type: text
    content: Eny, tahaka ny akanjobe sy fehiloha ny rariny izay nananako.
  '15':
  - type: text
    content: Tamin’izay aho dia maso ho an’ny jamba
  - type: text
    content: ary tongotra ho an’ny mandringa;
  '16':
  - type: text
    content: ray ho an’ny malahelo aho
  - type: text
    content: ary ny adin’ny olona tsy fantatro aza dia nohadihadiako.
  '17':
  - type: text
    content: Namotika ny nifin’ny ratsy fanahy aho
  - type: text
    content: ka nandrombaka ny babo teo am-bavany.
  '18':
  - type: text
    content: 'Dia hoy aho: Eo amin’ny akaniko ihany no hialako aina'
  - type: text
    content: ary hanamaro ny androko toy ny fasika aho.
  '19':
  - type: text
    content: Hamahatra eo amin’ny rano aho
  - type: text
    content: ary ny ando dia hitoetra amin’ny sampako mandritra ny alina.
  '2':
  - type: text
    content: E! Raha izao moa aho no tahaka ny tamin’ireny volana lasa ireny!
  - type: text
    content: Dia tahaka ny tamin’ny andro niarovan’Andriamanitra ahy!
  '20':
  - type: text
    content: Ho vaovao amiko lalandava ny voninahitro
  - type: text
    content: ary ny tsipìkako dia hihahenjana eny an-tanako.
  '21':
  - type: text
    content: Nihaino ahy ny olona dia niandry
  - type: text
    content: ka nangina tamin’ny fanolorako saina izy.
  '22':
  - type: text
    content: Rehefa niteny aho dia tsy mba namaly intsony izy
  - type: text
    content: ary nitetevan’ny teniko izy.
  '23':
  - type: text
    content: Niandry ahy toy ny fiandry ny ranonorana izy
  - type: text
    content: ary nitanatana vava toy ny fiandry ny faraorana.
  '24':
  - type: text
    content: Raha nitsiky taminy aho dia tsy sahy nino izy
  - type: text
    content: ary tsy nisy navelany ho very ny hazavana tamin’ny tarehiko.
  '25':
  - type: text
    content: Nifidy ny lalana halehany aho ka nipetraka ho mpitarika azy;
  - type: text
    content: eny, nitoetra toy ny mpanjaka teo amin’ny miaramila
  - type: text
    content: sy toy ny mpampionona ny misaona aho.
  '3':
  - type: text
    content: Fony mbola nazava teo ambonin’ny lohako ny jirony
  - type: text
    content: ary ny fahazavany no nandehanako tao amin’ny maizina!
  '4':
  - type: text
    content: Eny, tahaka ny toetrako fony mbola fararanoko,
  - type: text
    content: raha niseho teo ambonin’ny tranolaiko ny fisakaizan’Andriamanitra;
  '5':
  - type: text
    content: fony mbola nomba ahy ny Tsitoha
  - type: text
    content: ary nanodidina ahy ny zanako;
  '6':
  - type: text
    content: fony mbola nanasa ny tongotro tamin’ny rononomandry aho
  - type: text
    content: ary namoaka reniranon’ny diloilo ho ahy ny vatolampy!
  '7':
  - type: text
    content: Raha niainga niakatra ho eo amin’ny vavahadin’ny tanàna aho
  - type: text
    content: ka nametraka ny akalako teo an-kianja
  '8':
  - type: text
    content: dia nahita ahy ny zatovo ka niafinafina
  - type: text
    content: ary nitsangana ny fotsy volo dia naharitra nijoro;
  '9':
  - type: text
    content: nangina tsy niteny ny lehibe
  - type: text
    content: ka nitampim-bava;
