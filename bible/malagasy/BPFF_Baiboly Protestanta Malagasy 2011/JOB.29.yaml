document_id: JOB.29,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny farany navalin’i Joba: E! Ny hasambarana tamin’ny andro taloha!'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia mbola nandroso nanao oha-teny ihany i Joba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: tsy sahy niteny ny mpanapaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lelany dia niraikitra tamin’ny lanilaniny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izay sofina nandre dia niteny ahy hoe sambatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay maso nahita dia vavolombelona ho ahy
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: satria namonjy ny ory izay nitaraina aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny kamboty izay tsy nanan-kamonjy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fisaoran’izay efa ho faty dia tonga tamiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fon’ny mpitondratena dia nampifaliko.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nitafy fahamarinana aho ka mba nitafy ahy kosa izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tahaka ny akanjobe sy fehiloha ny rariny izay nananako.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tamin’izay aho dia maso ho an’ny jamba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tongotra ho an’ny mandringa;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ray ho an’ny malahelo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny adin’ny olona tsy fantatro aza dia nohadihadiako.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Namotika ny nifin’ny ratsy fanahy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nandrombaka ny babo teo am-bavany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia hoy aho: Eo amin’ny akaniko ihany no hialako aina'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanamaro ny androko toy ny fasika aho.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hamahatra eo amin’ny rano aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ando dia hitoetra amin’ny sampako mandritra ny alina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: E! Raha izao moa aho no tahaka ny tamin’ireny volana lasa ireny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny tamin’ny andro niarovan’Andriamanitra ahy!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ho vaovao amiko lalandava ny voninahitro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tsipìkako dia hihahenjana eny an-tanako.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nihaino ahy ny olona dia niandry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nangina tamin’ny fanolorako saina izy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Rehefa niteny aho dia tsy mba namaly intsony izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nitetevan’ny teniko izy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Niandry ahy toy ny fiandry ny ranonorana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nitanatana vava toy ny fiandry ny faraorana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Raha nitsiky taminy aho dia tsy sahy nino izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nisy navelany ho very ny hazavana tamin’ny tarehiko.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nifidy ny lalana halehany aho ka nipetraka ho mpitarika azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nitoetra toy ny mpanjaka teo amin’ny miaramila
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy toy ny mpampionona ny misaona aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fony mbola nazava teo ambonin’ny lohako ny jirony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahazavany no nandehanako tao amin’ny maizina!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Eny, tahaka ny toetrako fony mbola fararanoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha niseho teo ambonin’ny tranolaiko ny fisakaizan’Andriamanitra;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: fony mbola nomba ahy ny Tsitoha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanodidina ahy ny zanako;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: fony mbola nanasa ny tongotro tamin’ny rononomandry aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary namoaka reniranon’ny diloilo ho ahy ny vatolampy!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha niainga niakatra ho eo amin’ny vavahadin’ny tanàna aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nametraka ny akalako teo an-kianja
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: dia nahita ahy ny zatovo ka niafinafina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nitsangana ny fotsy volo dia naharitra nijoro;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: nangina tsy niteny ny lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nitampim-bava;
