document_id: ZEC.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahirano sy fanafahana an’i Jerosalema
  - type: text
    content: Teny faminaniana.
  - type: text
    content: Tenin’NY TOMPO ny amin’ny Israely.
  - type: text
    content: Hoy NY TOMPO, izay mamelatra ny lanitra sy manao ny fanorenan’ny tany
  - type: text
    content: 'ary nanamboatra ny fanahin’ny olona ao anatiny:'
  '10':
  - type: text
    content: 'Ary haidiko amin’ny taranak’i Davida sy amin’ny mponina any Jerosalema ny fanahin’ny fahasoavana sy ny fifonana ka hijery Ahy izay nolefoniny izy. Ary hisaona Azy toy ny fisaonana zanakalahy tokana izy sady halahelo Azy toy ny fahalahelovan’ny olona ny lahimatoany. '
  '11':
  - type: text
    content: 'Amin’izany andro izany dia hisy fisaonana lehibe any Jerosalema, toy ny fisaonana ho an’i Hadada-Rimona, tao amin’ny lohasahan’i Megido. '
  '12':
  - type: text
    content: 'Ary hisaona ny tany ka hitsitokantokana isam-pianakaviana: Hitokana ny fianakavian’i Davida ary hitokana ny vadin’ireo; hitokana ny fianakavian’i Natana ary hitokana ny vadin’ireo; '
  '13':
  - type: text
    content: 'hitokana ny fianakavian’ny taranak’i Levy ary hitokana ny vadin’ireo; hitokana ny fianakavian’i Simey ary hitokana ny vadin’ireo; '
  '14':
  - type: text
    content: hitokana ny fianakaviana sisa rehetra isam-pianakaviana ary hitokana ny vadin’ireo.
  '2':
  - type: text
    content: 'Indro, Izaho hanao an’i Jerosalema ho kapoaka mampiraikiraiky ho an’ny firenena rehetra manodidina; ary ho toy izany koa ny amin’i Joda, amin’ny hanaovana fahirano an’i Jerosalema. '
  '3':
  - type: text
    content: 'Ary amin’izany andro izany i Jerosalema dia hataoko vato mitambesatra amin’ny firenena rehetra ka haratra mafy izay rehetra mitady hanainga azy; ary ho tafangona hamely azy ny firenena rehetra amin’ny tany. '
  '4':
  - type: text
    content: 'Amin’izany andro izany, hoy NY TOMPO, dia hamely ny soavaly amin’ny fahaverezan-kevitra Aho, ary ny mpitaingina azy amin’ny fahaverezan-tsaina; hampihiratra ny masoko amin’ny taranak’i Joda Aho ary hamely amin’ny fahajambana ny soavaly rehetra izay an’ny firenena. '
  '5':
  - type: text
    content: 'Ary ireo lohany amin’i Joda dia hiteny anakampo hoe: Ny mponina any Jerosalema dia heriko ao amin’Andriamanitra, Tompon’izao rehetra izao, izay Andriamaniny. '
  '6':
  - type: text
    content: Amin’izany andro izany, ireo lohany amin’i Joda dia hataoko tahaka ny fatana mirehitra ao anaty kitay hazo sy tahaka ny fanilo mirehitra ao anatin’ny amboara ka handevona ny firenena rehetra manodidina amin’ny ankavanana sy ny ankavia izy; ary i Jerosalema dia mbola hiorina amin’ny toerany ihany, dia any Jerosalema.
  '7':
  - type: text
    content: 'Ary hovonjen’NY TOMPO aloha ny tranolain’i Joda, mba tsy hisandratra ambonin’i Joda intsony ny voninahitry ny taranak’i Davida sy ny voninahitry ny mponina any Jerosalema. '
  '8':
  - type: text
    content: 'Amin’izany andro izany dia harovan’NY TOMPO ny mponina any Jerosalema; ary izay mila ho reraka ao aminy aza amin’izany andro izany dia ho tahaka an’i Davida; ary ny taranak’i Davida dia ho tahaka an’Andriamanitra, dia tahaka ilay '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: ' eo anoloany.'
  - type: heading
    content: Fisaonana amin’ny tany manontolo
  '9':
  - type: text
    content: 'Amin’izany andro izany dia hanao izay handringanana ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra izay avy hamely an’i Jerosalema Aho. '
