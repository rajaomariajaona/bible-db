document_id: 2KI.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa i Elisa: Henoy ny tenin’NY TOMPO! Izao no lazain’NY TOMPO: Rahampitso toy izao dia ho sekela iray ny vidin’ny koba tsara toto eran’ny sea, ary ho sekela iray koa ny vidin’ny varimbazaha indroan’ny sea eo am-bavahadin’i Samaria. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa ireo niantso ny mpiambina ny vavahadin’ny tanàna ary nilaza taminy hoe: Tonga tany an-tobin’ny Arameana izahay ary indro, tsy misy olona ao na feon’olona akory aza, fa soavaly mifatotra sy boriky mifatotra, ary ny tranolay nilaozana fotsiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso ny mpiambina ny vavahady izy, ary ireo kosa dia nilaza izany tao an-tranon’ny mpanjaka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nifoha ny mpanjaka raha mbola alina ka niteny tamin’ny mpanompony hoe: Aoka hambarako aminareo ange izao ataon’ny Arameana amintsika izao e! Fantany fa mosarena isika ka niala tamin’ny toby izy mba hanao vela-pandrika any an-tsaha ka niteny hoe: Raha mivoaka avy any an-tanàna ireo dia hataontsika sambo-belona dia hidirantsika ny tanàna! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy anefa ny mpanompony iray: Mifona aminao aho, aoka hakana soavaly dimy amin’izay sisa ato an-tanàna. Indro, toy ny manjo ny hamaroan’ny Israely rehetra izay mitoetra ato ny hanjo azy ireo; eny, tahaka ny hamaroan’ny Israely rehetra izay efa lany ritra ny hahalany ritra azy ireo. Aoka alefantsika ireo dia ho hitantsika. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalainy ny kalesy fitondra miady roa sy ny soavaly miaraka aminy; ary nandefa iraka hanenjika ny miaramilan’ny Arameana ny mpanjaka ka niteny hoe: Mandehana ka jereo! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandeha nanaraka azy hatrany Jordana ireo; ary, indreny, ny lalambe rehetra dia feno fitafiana sy fitaovana izay narian’ny Arameana tamin’ny nandosirany tamin’ny fahatairany. Dia niverina ny iraka ka nilaza tamin’ny mpanjaka.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka ny tanàna ny olona ka namabo ny tobin’ny Arameana. Koa ny koba tsara toto eran’ny sea dia sekela iray monja no vidiny, ary ny varimbazaha indroan’ny sea dia sekela iray ihany koa ny vidiny, araka ny tenin’NY TOMPO. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay mpanampy ny mpanjaka izay nitehenan’ny mpanjaka tamin’ny tanany dia notendreny hiambina ny vavahady; voahitsakitsaka teo am-bavahady anefa izy ka maty araka izay nolazain’ny lehilahin’Andriamanitra, dia ilay nolazainy raha nidina tany aminy ny mpanjaka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tanteraka ny teny nolazain’ny lehilahin’Andriamanitra tamin’ny mpanjaka hoe: Raha maraina toy izao eo am-bavahadin’i Samaria dia sekela iray monja no ho vidin’ny varimbazaha indroan’ny sea ary ho sekela iray ihany koa ny vidin’ny koba tsara toto eran’ny sea. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany mpanampy ny mpanjaka izany no niteny tamin’ilay lehilahin’Andriamanitra hoe: Indro, na dia hanao varavarankely eny amin’ny lanitra aza va NY TOMPO dia hisy izany zavatra izany va? Fa hoy i Elisa tamin’izay: Indro, ho hitan’ny masonao tokoa izany nefa tsy mba hihinananao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny tamin’ny lehilahin’Andriamanitra anefa ilay mpanampy ny mpanjaka izay nitehenany mandrakariva, hoe: Indro, na dia hanao varavarankely eny amin’ny lanitra aza va NY TOMPO dia hisy izany zavatra izany? Dia hoy i Elisa: Indro, ho hitan’ny masonao tokoa izany nefa tsy mba hihinananao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Foana ny lasin’ny Arameana
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no nanjo azy, fa ny olona dia nanitsakitsaka azy teo am-bavahady ka maty izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy boka efa-dahy teo anoloan’ny vavahady nifampiresaka hoe: Ahoana no ipetrahantsika foana eto miandry izay hahafatesantsika? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha hoy isika hoe: Andeha hiditra ao an-tanàna, mosary no ao an-tanàna ka ho faty ao isika; ary raha hipetraka eto isika dia ho faty ihany koa. Koa andeha isika hankany amin’ny tobin’ny Arameana; koa raha mamela antsika ho velona moa izy dia ho velona isika; fa raha mamono antsika kosa izy dia ho faty ihany isika. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga izy rehefa takariva hankany amin’ny tobin’ny Arameana; nony tonga teny an-tsisin’ny toby izy dia indro, tsy nisy olona akory tao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa NY TOMPO efa nahatonga ny miaramilan’ny Arameana handre fikodiadian’ny kalesy fitondra miady sy fandehan-tsoavaly, dia ny firodondrodon’ny miaramila maro; ary nifampiresaka izy ireo hoe: Injao, ny mpanjakan’ny Israely dia nanakarama ny mpanjakan’ny Hetita sy ny mpanjakan’ny Ejiptiana hiady amintsika. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa niainga izy ireo ka riatra nandositra tamin’iny takariva iny ihany ary nilaozany fotsiny ny tobiny, dia ny tranolainy sy ny soavaliny ary ny borikiny ka lasa nandositra hamonjy ny ainy izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa tonga teny an-tsisin’ny toby ireo boka ireo dia niditra tao amin’ny tranolay iray izy ka nihinana sy nisotro dia naka volafotsy sy volamena ary fitafiana, avy eo dia nandeha ka nanafina izany. Ary nandeha indray izy ka niditra tao amin’ny tranolay hafa koa sady naka avy tao, dia nandeha ka nanafina izany koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voavonjy i Samaria
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifampiresaka izy ireo hoe: Tsy mety izao ataontsika izao. Ity andro ity dia andro filazana vaovao mahafaly, kanefa isika mangina; raha miandry mandra-paharain’ny andro isika dia tsy ho afa-mandositra ny sazy; fa andeha isika hampandre ny ao an-tranon’ny mpanjaka. '
