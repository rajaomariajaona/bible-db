document_id: 1CH.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hafatra nampitaina tamin’i Davida
  - type: heading
    content: 2Sam 7.1-17
  - type: text
    content: 'Rehefa tafapetraka tao an-tranony i Davida dia niteny tamin’i Natana mpaminany hoe: Akory izato izaho, mitoetra amin’ny trano sedera, nefa ny vata misy ny faneken’NY TOMPO kosa dia mitoetra ao anaty tranolay! '
  '10':
  - type: text
    content: 'sy tahaka ny hatramin’ny andro nanendreko mpitsara ho mpifehy ny Israely oloko. Ary haetriko avokoa ny fahavalonao rehetra. Ary ambarako aminao koa fa NY TOMPO hanao trano ho anao. '
  '11':
  - type: text
    content: 'Ary rehefa tapitra ny andronao ka lasa any amin’ny razanao ianao dia hatsangako handimby anao ny iray amin’ny taranakao, izay isan’ny terakao, ary hampitoeriko mafy ny fanjakany. '
  '12':
  - type: text
    content: 'Izy no hanao trano ho Ahy, ary Izaho kosa hampitoetra ny sezafiandrianany ho mandrakizay. '
  '13':
  - type: text
    content: 'Izaho ho rainy, ary ho zanako izy; tsy hanaisotra ny famindrampoko aminy Aho, tahaka ny nanesorako izany tamin’ilay talohanao. '
  '14':
  - type: text
    content: 'Hampitoeriko ao an-tranoko sy ao amin’ny fanjakako mandrakizay izy; ary ho tafaorina mandrakizay ny sezafiandrianany. '
  '15':
  - type: text
    content: Araka izany teny rehetra izany sy araka io fahitana io no nolazain’i Natana tamin’i Davida.
  - type: heading
    content: Ny vavaka nataon’i Davida
  - type: heading
    content: 2Sam 7.18-29
  '16':
  - type: text
    content: 'Ary niditra i Davida mpanjaka ka nipetraka teo anatrehan’NY TOMPO, dia niteny hoe: Zinona moa aho, RY TOMPO Andriamanitra ô? Ary zinona moa ny fianakaviako no noentinao eto amin’izao toerana izao aho? '
  '17':
  - type: text
    content: 'Mbola nataonao ho zavatra kely ihany aza izany, Andriamanitra ô; fa indro, efa voalazanao koa ny amin’ny taranaky ny mpanomponao hatramin’izay mbola any aoriana lavitra aza ary mijery ahy toy ny olona ambony Ianao, RY TOMPO Andriamanitra ô! '
  '18':
  - type: text
    content: 'Inona intsony no holazain’i Davida aminao ny amin’ny voninahitra omena ny mpanomponao? Fa Ianao no mahafantatra ny mpanomponao. '
  '19':
  - type: text
    content: 'TOMPO ô, noho ny amin’ny mpanomponao sy araka ny sitraponao no nanaovanao io zavatra lehibe io mba hampiharihariana ireo zavatra lehibe rehetra ireo. '
  '2':
  - type: text
    content: 'Ary hoy i Natana tamin’i Davida: Ataovy izay rehetra ao am-ponao, fa Andriamanitra no momba anao.'
  '20':
  - type: text
    content: 'TOMPO ô, tsy misy tahaka Anao ary tsy misy Andriamanitra afa-tsy Ianao, araka izay rehetra ren’ny sofinay. '
  '21':
  - type: text
    content: 'Ary aiza moa no misy firenena etỳ an-tany tahaka ny Israely olonao? Andriamanitra mihitsy no nandeha nanavotra azy ho olony, hanaovanao anarana lehibe sy mahatahotra ho Anao, dia tamin’ny nandroahanao firenena tsy ho eo anoloan’ny olonao izay navotanao avy tany Ejipta. '
  '22':
  - type: text
    content: 'Fa nofidinao ho olonao mandrakizay ny Israely olonao, ary Ianao, TOMPO ô, no efa tonga Andriamaniny. '
  '23':
  - type: text
    content: 'Ankehitriny, TOMPO ô, ilay teny nolazainao ny amin’ny mpanomponao sy ny taranany dia ampitoero ho mandrakizay ary ataovy araka izay nolazainao. '
  '24':
  - type: text
    content: 'Eny, aoka hampitoerina izany, ary aoka hohalehibiazina mandrakizay ny anaranao ka hatao hoe: NY TOMPO, Andriamanitra Tompon’izao rehetra izao, Andriamanitry ny Israely, no Andriamanitra ho an’ny Israely; dia hampitoerina eo anatrehanao ny taranak’i Davida mpanomponao. '
  '25':
  - type: text
    content: 'Fa Ianao, Andriamanitro ô, efa nanambara tamin’ny mpanomponao fa hanao trano ho azy. Koa izany no nampahasahy ny mpanomponao hivavaka eto anatrehanao. '
  '26':
  - type: text
    content: 'Noho izany, TOMPO ô, satria Ianao no Andriamanitra, ary Ianao efa nilaza izany zava-tsoa izany ny amin’ny mpanomponao, '
  '27':
  - type: text
    content: dia ho sitrakao ny hitahy ny taranaky ny mpanomponao haharitra mandrakizay eo anatrehanao; fa izay tahinao, TOMPO ô, dia voatahy mandrakizay.
  '3':
  - type: text
    content: 'Nefa tamin’ny alin’iny ihany dia tonga tamin’i Natana ny tenin’Andriamanitra hoe: '
  '4':
  - type: text
    content: 'Andeha, lazao amin’i Davida mpanompoko hoe: Izao no lazain’NY TOMPO: Tsy ianao no hanao trano hitoerako; '
  '5':
  - type: text
    content: 'fa tsy mbola nitoetra an-trano Aho hatramin’ny nitondrako ny Israely niakatra ka mandraka androany fa nifindrafindra tranolay sy nifindrafindra fonenana. '
  '6':
  - type: text
    content: 'Ary tamin’izay rehetra nifindrafindrako niaraka tamin’ny Israely, moa nisy nitenenako akory va ny mpitsaran’ny Israely izay notendreko ho mpiandry ny oloko ka nilazako hoe: Nahoana no tsy nanao trano sedera ho Ahy ianareo? '
  '7':
  - type: text
    content: 'Koa lazao amin’i Davida mpanompoko hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Izaho no naka anao tany an-tsaha, avy tamin’izay niandrasanao ondry, mba ho mpanapaka ny Israely oloko. '
  '8':
  - type: text
    content: 'Nomba anao tamin’izay rehetra nalehanao Aho ka naringako tsy ho eo anoloanao ny fahavalonao rehetra ary homeko anarana tahaka ny anaran’izay lehibe ambonin’ny tany ianao. '
  '9':
  - type: text
    content: 'Hifidy tany ho an’ny Israely oloko Aho sady hamponina azy; dia handry fehizay amin’ny fonenany izy ka tsy hanana ahiahy intsony, ary tsy hampahory azy intsony ny ratsy fanahy, toy ny tany aloha '
