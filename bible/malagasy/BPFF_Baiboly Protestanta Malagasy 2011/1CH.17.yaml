document_id: 1CH.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hafatra nampitaina tamin’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Sam 7.1-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa tafapetraka tao an-tranony i Davida dia niteny tamin’i Natana mpaminany hoe: Akory izato izaho, mitoetra amin’ny trano sedera, nefa ny vata misy ny faneken’NY TOMPO kosa dia mitoetra ao anaty tranolay! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy i Natana tamin’i Davida: Ataovy izay rehetra ao am-ponao, fa Andriamanitra no momba anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nefa tamin’ny alin’iny ihany dia tonga tamin’i Natana ny tenin’Andriamanitra hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Andeha, lazao amin’i Davida mpanompoko hoe: Izao no lazain’NY TOMPO: Tsy ianao no hanao trano hitoerako; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa tsy mbola nitoetra an-trano Aho hatramin’ny nitondrako ny Israely niakatra ka mandraka androany fa nifindrafindra tranolay sy nifindrafindra fonenana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary tamin’izay rehetra nifindrafindrako niaraka tamin’ny Israely, moa nisy nitenenako akory va ny mpitsaran’ny Israely izay notendreko ho mpiandry ny oloko ka nilazako hoe: Nahoana no tsy nanao trano sedera ho Ahy ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa lazao amin’i Davida mpanompoko hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Izaho no naka anao tany an-tsaha, avy tamin’izay niandrasanao ondry, mba ho mpanapaka ny Israely oloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nomba anao tamin’izay rehetra nalehanao Aho ka naringako tsy ho eo anoloanao ny fahavalonao rehetra ary homeko anarana tahaka ny anaran’izay lehibe ambonin’ny tany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hifidy tany ho an’ny Israely oloko Aho sady hamponina azy; dia handry fehizay amin’ny fonenany izy ka tsy hanana ahiahy intsony, ary tsy hampahory azy intsony ny ratsy fanahy, toy ny tany aloha '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sy tahaka ny hatramin’ny andro nanendreko mpitsara ho mpifehy ny Israely oloko. Ary haetriko avokoa ny fahavalonao rehetra. Ary ambarako aminao koa fa NY TOMPO hanao trano ho anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary rehefa tapitra ny andronao ka lasa any amin’ny razanao ianao dia hatsangako handimby anao ny iray amin’ny taranakao, izay isan’ny terakao, ary hampitoeriko mafy ny fanjakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izy no hanao trano ho Ahy, ary Izaho kosa hampitoetra ny sezafiandrianany ho mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izaho ho rainy, ary ho zanako izy; tsy hanaisotra ny famindrampoko aminy Aho, tahaka ny nanesorako izany tamin’ilay talohanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hampitoeriko ao an-tranoko sy ao amin’ny fanjakako mandrakizay izy; ary ho tafaorina mandrakizay ny sezafiandrianany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Araka izany teny rehetra izany sy araka io fahitana io no nolazain’i Natana tamin’i Davida.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Sam 7.18-29
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary niditra i Davida mpanjaka ka nipetraka teo anatrehan’NY TOMPO, dia niteny hoe: Zinona moa aho, RY TOMPO Andriamanitra ô? Ary zinona moa ny fianakaviako no noentinao eto amin’izao toerana izao aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mbola nataonao ho zavatra kely ihany aza izany, Andriamanitra ô; fa indro, efa voalazanao koa ny amin’ny taranaky ny mpanomponao hatramin’izay mbola any aoriana lavitra aza ary mijery ahy toy ny olona ambony Ianao, RY TOMPO Andriamanitra ô! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Inona intsony no holazain’i Davida aminao ny amin’ny voninahitra omena ny mpanomponao? Fa Ianao no mahafantatra ny mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'TOMPO ô, noho ny amin’ny mpanomponao sy araka ny sitraponao no nanaovanao io zavatra lehibe io mba hampiharihariana ireo zavatra lehibe rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'TOMPO ô, tsy misy tahaka Anao ary tsy misy Andriamanitra afa-tsy Ianao, araka izay rehetra ren’ny sofinay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary aiza moa no misy firenena etỳ an-tany tahaka ny Israely olonao? Andriamanitra mihitsy no nandeha nanavotra azy ho olony, hanaovanao anarana lehibe sy mahatahotra ho Anao, dia tamin’ny nandroahanao firenena tsy ho eo anoloan’ny olonao izay navotanao avy tany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa nofidinao ho olonao mandrakizay ny Israely olonao, ary Ianao, TOMPO ô, no efa tonga Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ankehitriny, TOMPO ô, ilay teny nolazainao ny amin’ny mpanomponao sy ny taranany dia ampitoero ho mandrakizay ary ataovy araka izay nolazainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Eny, aoka hampitoerina izany, ary aoka hohalehibiazina mandrakizay ny anaranao ka hatao hoe: NY TOMPO, Andriamanitra Tompon’izao rehetra izao, Andriamanitry ny Israely, no Andriamanitra ho an’ny Israely; dia hampitoerina eo anatrehanao ny taranak’i Davida mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa Ianao, Andriamanitro ô, efa nanambara tamin’ny mpanomponao fa hanao trano ho azy. Koa izany no nampahasahy ny mpanomponao hivavaka eto anatrehanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Noho izany, TOMPO ô, satria Ianao no Andriamanitra, ary Ianao efa nilaza izany zava-tsoa izany ny amin’ny mpanomponao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: dia ho sitrakao ny hitahy ny taranaky ny mpanomponao haharitra mandrakizay eo anatrehanao; fa izay tahinao, TOMPO ô, dia voatahy mandrakizay.
