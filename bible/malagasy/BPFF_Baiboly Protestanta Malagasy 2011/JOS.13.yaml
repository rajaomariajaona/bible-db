document_id: JOS.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: FIZARANA NY TANY
  - type: heading
    content: Ireo tany tsy mbola azo
  - type: text
    content: 'Efa zokiolona sady nandroso fahanterana i Josoa ka hoy NY TOMPO taminy: Efa zokiolona ianao ka mandroso fahanterana nefa be dia be ny tany sisa tsy mbola azo. '
  '10':
  - type: text
    content: 'ny tanàna rehetra izay an’i Sihona, mpanjakan’ny Amorita, izay nanjaka tany Hesbona, hatrany amin’ny sisintanin’ny taranak’i Amona, '
  '11':
  - type: text
    content: 'i Gileada, ny tanin’ny Gesorita, ny Makatita, ny tendrombohitra Hermona rehetra ary i Basana rehetra hatrany Saleka, '
  '12':
  - type: text
    content: 'dia ny fanjakana rehetra an’i Oga tany Basana, izay nanjaka tany Astarota sy Edrehy, izy ihany no sisa tamin’ny Refaìta fa resin’i Mosesy ireny ka noroahiny. '
  '13':
  - type: text
    content: Kanefa tsy mba noroahin’ny Zanak’Israely ny Gesorita sy ny Makatita fa mitoetra eo amin’ny Zanak’Israely mandraka androany izy ireo.
  '14':
  - type: text
    content: Ny fokon’i Levy ihany no tsy nomeny lova; fa ny fanatitra levonina amin’ny afo ho an’NY TOMPO, Andriamanitry ny Israely, no lovany araka izay nolazainy taminy.
  '15':
  - type: text
    content: 'Ary nomen’i Mosesy lova koa ny fokon’i Robena araka ny fianakaviany. '
  '16':
  - type: text
    content: 'Ny faritaniny dia hatrany Aroera izay eo amoron’ny lohasahan-driaka Arnona sy ny tanàna izay eo afovoan’ny lohasaha ary ny tany lemaka rehetra any Medeba, '
  '17':
  - type: text
    content: 'dia i Hesbona sy ny tanànany rehetra izay eo amin’ny tany lemaka, i Dibona, i Bamota-Baala, i Bety-Baala-Meona, '
  '18':
  - type: text
    content: 'i Jahaza, i Kedemota, i Mefata, '
  '19':
  - type: text
    content: 'i Kiriataima, i Sibma, i Zareta-Sahara ao amin’ny tendrombohitra mandondona eo ambonin’ny lohasaha, '
  '2':
  - type: text
    content: 'Izao no tany sisa tsy mbola azo: Ny tany rehetra an’ny Filistina sy ny Gesorita rehetra, '
  '20':
  - type: text
    content: 'i Bety-Peora, ny ao an-tsisin’i Pisga, i Bety-Jesimota, '
  '21':
  - type: text
    content: 'ary ny tanàna rehetra any amin’ny tany lemaka sy ny fanjakana rehetra an’i Sihona, mpanjakan’ny Amorita, izay nanjaka tany Hesbona satria resin’i Mosesy izy sy ireo andrianan’ny Midianita, dia i Evy, i Rekema, i Zora, i Hora ary i Reba, izay andriana nanoa an’i Sihona ka nitoetra teo amin’ny tany. '
  '22':
  - type: text
    content: 'Ary i Balama, mpisikidy, zanak’i Beora, dia anisan’ireo izay novonoin’ny Zanak’Israely tamin’ny sabatra. '
  '23':
  - type: text
    content: Ny sisintanin’ny taranak’i Robena dia ny amoron’i Jordana. Izay no lovan’ny taranak’i Robena araka ny fokony, dia ny tanàna mbamin’ny vohitra miankina aminy.
  '24':
  - type: text
    content: 'Nomen’i Mosesy koa ny fokon’i Gada, dia ny taranak’i Gada araka ny fianakaviany. '
  '25':
  - type: text
    content: 'Ary ny faritaniny dia i Jazera sy ny tanàna rehetra any Gileada, ny antsasaky ny tanin’ny taranak’i Amona, hatrany Aroera, izay tandrifin’i Raba, '
  '26':
  - type: text
    content: 'hatrany Hesbona ka hatrany Ramata-Mizpa sy i Betonima ary hatrany Mahanaima ka hatrany amin’ny faritanin’i Debira; '
  '27':
  - type: text
    content: 'ary tao amin’ny lohasaha, i Bety-Harama, i Bety-Nimra, i Sokota, i Zafona sy ny sisa tamin’ny fanjakan’i Sihona, mpanjakan’i Hesbona, ary ny moron’i Jordana hatramin’ny moron’ny ranomasina Kinereta, any andafy atsinanan’i Jordana. '
  '28':
  - type: text
    content: Izany no lovan’ny taranak’i Gada araka ny fokony, dia ny tanàna mbamin’ny vohitra miankina aminy.
  '29':
  - type: text
    content: 'Nomen’i Mosesy koa ny antsasaky ny fokon’i Manase. Toy izao no an’ny antsasaky ny fokon’i Manase araka ny fianakaviany avy: '
  '3':
  - type: text
    content: 'hatrany Sihora izay atsinanan’i Ejipta, ka hatrany amin’ny sisintanin’i Ekrona eo avaratra izay isaina ho an’ny Kananita, an’ireo mpanjaka dimy amin’ny Filistina, sy ny Gazita, ny Asdodita, ny Askelonita, ny Gatita, ny Ekronita ary ny Avita '
  '30':
  - type: text
    content: 'Ny faritaniny hatrany Mahanaima, dia i Basana manontolo, ny fanjakana rehetra an’i Oga, mpanjakan’i Basana, ary ny tanàna madinik’i Jaìra an’ny mpitoetra an-tranolay izay any Basana, dia tanàna enimpolo. '
  '31':
  - type: text
    content: Ary ny antsasak’i Gileada sy i Astarota ary i Edrehy, tanàna ao amin’ny fanjakan’i Oga any Basana, dia an’ny taranak’i Makira, zanak’i Manase, dia ho an’ny antsasaky ny taranak’i Makira araka ny fokony.
  '32':
  - type: text
    content: 'Ireo no voazaran’i Mosesy ho lova tany amin’ny lemak’i Moaba tao andafy atsinanan’i Jordana tandrifin’i Jeriko. '
  '33':
  - type: text
    content: Tsy mba nomen’i Mosesy lova anefa ny fokon’i Levy; fa NY TOMPO, Andriamanitry ny Israely, no lovany, araka izay efa nolazainy taminy.
  '4':
  - type: text
    content: 'any atsimo, dia ny tanin’ny Kananita rehetra sy i Meara izay an’ny Sidoniana, hatrany Afeka ka hatrany amin’ny sisintanin’ny Amorita, '
  '5':
  - type: text
    content: 'ary ny tanin’ny Gebalita sy i Libanona rehetra any atsinanana, hatrany Baala-Gada eo am-pototry ny tendrombohitra Hermona ka hatrany akaikin’i Hamata, '
  '6':
  - type: text
    content: 'ary ny mponina rehetra any amin’ny havoana hatrany Libanona ka hatrany Misrefota-Maima, dia ny Sidoniana rehetra. Izaho no handroaka kanefa zarao amin’ny antsapaka ho lovan’ny Zanak’Israely izy ireny araka izay nandidiako anao. '
  '7':
  - type: text
    content: Ary ankehitriny, zarao izao tany izao ho lovan’ny foko sivy sy ny antsasaky ny fokon’i Manase.
  - type: heading
    content: Fizarana ny tany andafy atsinanan’ny Jordana
  '8':
  - type: text
    content: 'Niaraka tamin’ireo koa no nahazoan’ny Robenita sy ny Gadita ny lovany, dia ilay nomen’i Mosesy azy any andafy atsinanan’i Jordana, araka izay nomen’i Mosesy, mpanompon’NY TOMPO, azy, '
  '9':
  - type: text
    content: 'dia hatrany Aroera izay eo amoron’ny lohasahan-driaka Arnona, ny tanàna izay eo afovoan’ny lohasaha sy ny tany lemaka rehetra any Medeba ka hatrany Dibona, '
