document_id: JER.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vehivavy janga tsy hay anarina
  - type: text
    content: Raha misy lehilahy misao-bady,
  - type: text
    content: ary efa miala Ravehivavy ka lasa vadin’olon-kafa,
  - type: text
    content: moa mahazo miverina aminy indray va Ralehilahy?
  - type: text
    content: Tsy haloto tokoa va izany tany izany?
  - type: text
    content: Fa ianao dia efa nijangajanga tamin-tsakaiza maro,
  - type: text
    content: moa hahazo miverina Amiko indray va ianao?
  - type: text
    content: Hoy NY TOMPO.
  '10':
  - type: text
    content: Nefa tamin’izany rehetra izany dia tsy nety niverina Tamiko tamin’ny fony manontolo i Joda mpivadika rahavaviny, fa tamin’ny fihatsarambelatsihy ihany, hoy NY TOMPO.
  '11':
  - type: text
    content: 'Ary hoy NY TOMPO tamiko: Israely mpikomy dia hita fa marimarina kokoa noho i Joda mpivadika. '
  '12':
  - type: text
    content: 'Mandehana ka torio manatrika ny avaratra izao teny izao hoe:'
  - type: text
    content: Miverena ianao, ry Israely mpikomy,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: tsy hampanjombona ny tavako aminareo Aho,
  - type: text
    content: fa mamindra fo Aho,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: ka tsy hitahiry fahatezerana mandrakizay.
  '13':
  - type: text
    content: Kanefa kosa, ekeo ny helokao,
  - type: text
    content: fa tamin’NY TOMPO Andriamanitrao
  - type: text
    content: no nikomianao.
  - type: text
    content: Nivezivezy nankany amin’ny hafa ianao
  - type: text
    content: teny ambanin’ny hazo maitso rehetra,
  - type: text
    content: fa tsy mba nihaino ny feoko ianareo,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Fihaonambe any Jerosalema
  '14':
  - type: text
    content: 'Miverena, ry zaza mpikomy, hoy NY TOMPO, fa Izaho ihany no Tomponareo. Hakako iray isan-tanàna ianareo ary roa isam-pokony ka hoentiko ho any '
  - type: text
    content: Ziona
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Dia homeko mpitondra araka ny sitrapoko, izay hitondra anareo amin’ny fahalalana sy ny fahendrena, ianareo. '
  '16':
  - type: text
    content: 'Koa rehefa mitombo sy mihamaro amin’ny tany ianareo dia amin’izany andro izany, hoy NY TOMPO, no tsy hitenenany intsony ny vata misy ny faneken’NY TOMPO; ary tsy hosaintsaininy akory izany sady tsy hahatsiaro na ho manina izany izy, na hanamboatra vata hafa. '
  '17':
  - type: text
    content: 'Amin’izany andro izany no hanononana an’i Jerosalema hoe sezafiandrianan’NY TOMPO; hivory any ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra noho ny anaran’NY TOMPO any Jerosalema, ary tsy handeha araka ny ditran’ny fo ratsiny intsony izy.'
  '18':
  - type: text
    content: Amin’izany andro izany, ny taranak’i Joda sy ny taranak’Israely, dia hiara-mandeha ka hiara-tonga avy any amin’ny tany avaratra izy, ho any amin’ny tany nomeko ny razanareo ho lovany.
  - type: heading
    content: Ny fiverenan’ny vahoaka mpikomy
  '19':
  - type: text
    content: 'Ary Izaho efa niteny hoe:'
  - type: text
    content: E! Fa hataoko isan’ny zanako ianao
  - type: text
    content: ka homeko tany mahafinaritra,
  - type: text
    content: dia lova izay tena endriky ny firenena rehetra.
  - type: text
    content: 'Eny, hoy Aho:'
  - type: text
    content: Hiantso Ahy hoe Raiko ianao
  - type: text
    content: ka tsy hiala amin’ny fanarahana Ahy.
  '2':
  - type: text
    content: 'Andrandrao amin’ny tendrombohitra mangadihady ny masonao ka jereo:'
  - type: text
    content: Taiza no tsy nandrian’olona taminao?
  - type: text
    content: Teny an-dalambe no niandrasanao azy
  - type: text
    content: toy ny Arabo any an-tany efitra;
  - type: text
    content: ary ny fijangajanganao sy ny faharatsianao no nandotoanao ny tany.
  '20':
  - type: text
    content: Kanefa toy ny vehivavy misintaka miala amin’ny sakaizany,
  - type: text
    content: dia toy izany tokoa no nisintahanareo niala Tamiko, ry taranak’Israely,
  - type: text
    content: hoy NY TOMPO.
  '21':
  - type: text
    content: Injany misy feo re any an-tendrombohitra mangadihady,
  - type: text
    content: dia fitomaniana sy fitarainan’ny Zanak’Israely;
  - type: text
    content: fa nivilivily tamin’ny nalehany izy
  - type: text
    content: ary nanadino NY TOMPO Andriamaniny.
  '22':
  - type: text
    content: Miverena ianareo, ry zaza mpikomy,
  - type: text
    content: fa hositraniko ny fikomianareo.
  - type: text
    content: Indreto, manatona Anao izahay,
  - type: text
    content: fa Ianao, RY TOMPO, no Andriamanitray.
  '23':
  - type: text
    content: Azo antoka fa fitaka ny avy amin’ny tendrombohitra sy ny horakoraky ny havoana;
  - type: text
    content: fa ao amin’NY TOMPO Andriamanitray ihany
  - type: text
    content: no famonjena azo antoka ho an’ny Israely.
  '24':
  - type: text
    content: Fa lanin’ny henatra hatramin’ny fahazazanay ny zavatra efa nisasaran’ny razanay,
  - type: text
    content: dia ny ondry aman’osiny sy ny ombiny,
  - type: text
    content: ny zanany lahy sy ny zanany vavy.
  '25':
  - type: text
    content: Aoka handry ao amin’ny henatray izahay,
  - type: text
    content: ary aoka hanarona anay ny fahafaham-boninahitray,
  - type: text
    content: satria tamin’NY TOMPO Andriamanitray no efa nanotanay,
  - type: text
    content: dia izahay sy ny razanay,
  - type: text
    content: hatramin’ny fahazazanay ka mandraka androany,
  - type: text
    content: sady tsy nihaino ny feon’NY TOMPO Andriamanitray izahay.
  '3':
  - type: text
    content: Voasakana noho izany ny orana mivatravatra
  - type: text
    content: sady tsy tonga ny orana amin’ny lohataona;
  - type: text
    content: fa ny handrinao dia handrin’ny vehivavy janga
  - type: text
    content: ka tsy manaiky ho menatra ianao.
  '4':
  - type: text
    content: Moa tsy hitaraina Amiko va ianao
  - type: text
    content: 'amin’izao sisa izao hoe: Ry Raiko ô!'
  - type: text
    content: Ianao no nahazatra ahy, hatry ny fony aho mbola tanora?
  '5':
  - type: text
    content: Ho tezitra mandrakizay va Izy?
  - type: text
    content: Hitahiry fahatezerana hatramin’ny farany va Izy?
  - type: text
    content: Indro, efa niteny toy izany ianao,
  - type: text
    content: nefa nanao izany ratsy izany ihany
  - type: text
    content: ka nahatanteraka izany.
  - type: heading
    content: Israely mpikomy sy Joda mpivadika
  '6':
  - type: text
    content: 'Hoy NY TOMPO tamiko tamin’ny andro nanjakan’i Josia mpanjaka: Moa efa hitanao va izay nataon’Israely mpikomy? Niakatra ho eny amin’ny tendrombohitra avo rehetra sy ho eny ambanin’ny hazo maitso rehetra izy ka nijangajanga teny. '
  '7':
  - type: text
    content: 'Nataoko fa hiverina Amiko izy rehefa avy nanao izany rehetra izany, kanjo tsy niverina izy. Ary i Joda mpivadika rahavaviny dia nahita izany. '
  '8':
  - type: text
    content: 'Ary hitako fa na dia efa nisaorako aza Israely mpikomy ka nomeko taratasy fisaorana noho ny fijangajangany dia tsy nety natahotra i Joda mpivadika rahavaviny fa nandeha nijangajanga koa. '
  '9':
  - type: text
    content: 'Nandoto ny tany avy tamin’ny horakoraky ny fijangajangany izy ary nijangajanga tamin’ny vato aman-kazo. '
