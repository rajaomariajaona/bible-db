document_id: JER.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vehivavy janga tsy hay anarina
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha misy lehilahy misao-bady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa miala Ravehivavy ka lasa vadin’olon-kafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa mahazo miverina aminy indray va Ralehilahy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy haloto tokoa va izany tany izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ianao dia efa nijangajanga tamin-tsakaiza maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa hahazo miverina Amiko indray va ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy NY TOMPO.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa tamin’izany rehetra izany dia tsy nety niverina Tamiko tamin’ny fony manontolo i Joda mpivadika rahavaviny, fa tamin’ny fihatsarambelatsihy ihany, hoy NY TOMPO.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy NY TOMPO tamiko: Israely mpikomy dia hita fa marimarina kokoa noho i Joda mpivadika. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandehana ka torio manatrika ny avaratra izao teny izao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena ianao, ry Israely mpikomy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hampanjombona ny tavako aminareo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mamindra fo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hitahiry fahatezerana mandrakizay.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa kosa, ekeo ny helokao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tamin’NY TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nikomianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nivezivezy nankany amin’ny hafa ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny ambanin’ny hazo maitso rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mba nihaino ny feoko ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fihaonambe any Jerosalema
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miverena, ry zaza mpikomy, hoy NY TOMPO, fa Izaho ihany no Tomponareo. Hakako iray isan-tanàna ianareo ary roa isam-pokony ka hoentiko ho any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia homeko mpitondra araka ny sitrapoko, izay hitondra anareo amin’ny fahalalana sy ny fahendrena, ianareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa rehefa mitombo sy mihamaro amin’ny tany ianareo dia amin’izany andro izany, hoy NY TOMPO, no tsy hitenenany intsony ny vata misy ny faneken’NY TOMPO; ary tsy hosaintsaininy akory izany sady tsy hahatsiaro na ho manina izany izy, na hanamboatra vata hafa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany no hanononana an’i Jerosalema hoe sezafiandrianan’NY TOMPO; hivory any ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' rehetra noho ny anaran’NY TOMPO any Jerosalema, ary tsy handeha araka ny ditran’ny fo ratsiny intsony izy.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’izany andro izany, ny taranak’i Joda sy ny taranak’Israely, dia hiara-mandeha ka hiara-tonga avy any amin’ny tany avaratra izy, ho any amin’ny tany nomeko ny razanareo ho lovany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiverenan’ny vahoaka mpikomy
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary Izaho efa niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: E! Fa hataoko isan’ny zanako ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka homeko tany mahafinaritra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lova izay tena endriky ny firenena rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, hoy Aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiantso Ahy hoe Raiko ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hiala amin’ny fanarahana Ahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Andrandrao amin’ny tendrombohitra mangadihady ny masonao ka jereo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taiza no tsy nandrian’olona taminao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teny an-dalambe no niandrasanao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny Arabo any an-tany efitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fijangajanganao sy ny faharatsianao no nandotoanao ny tany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa toy ny vehivavy misintaka miala amin’ny sakaizany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany tokoa no nisintahanareo niala Tamiko, ry taranak’Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Injany misy feo re any an-tendrombohitra mangadihady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fitomaniana sy fitarainan’ny Zanak’Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nivilivily tamin’ny nalehany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanadino NY TOMPO Andriamaniny.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena ianareo, ry zaza mpikomy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hositraniko ny fikomianareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreto, manatona Anao izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao, RY TOMPO, no Andriamanitray.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azo antoka fa fitaka ny avy amin’ny tendrombohitra sy ny horakoraky ny havoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ao amin’NY TOMPO Andriamanitray ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no famonjena azo antoka ho an’ny Israely.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa lanin’ny henatra hatramin’ny fahazazanay ny zavatra efa nisasaran’ny razanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny ondry aman’osiny sy ny ombiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanany lahy sy ny zanany vavy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka handry ao amin’ny henatray izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hanarona anay ny fahafaham-boninahitray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tamin’NY TOMPO Andriamanitray no efa nanotanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izahay sy ny razanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny fahazazanay ka mandraka androany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy nihaino ny feon’NY TOMPO Andriamanitray izahay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voasakana noho izany ny orana mivatravatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy tonga ny orana amin’ny lohataona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny handrinao dia handrin’ny vehivavy janga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy manaiky ho menatra ianao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy hitaraina Amiko va ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'amin’izao sisa izao hoe: Ry Raiko ô!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no nahazatra ahy, hatry ny fony aho mbola tanora?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tezitra mandrakizay va Izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitahiry fahatezerana hatramin’ny farany va Izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, efa niteny toy izany ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa nanao izany ratsy izany ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahatanteraka izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israely mpikomy sy Joda mpivadika
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamiko tamin’ny andro nanjakan’i Josia mpanjaka: Moa efa hitanao va izay nataon’Israely mpikomy? Niakatra ho eny amin’ny tendrombohitra avo rehetra sy ho eny ambanin’ny hazo maitso rehetra izy ka nijangajanga teny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nataoko fa hiverina Amiko izy rehefa avy nanao izany rehetra izany, kanjo tsy niverina izy. Ary i Joda mpivadika rahavaviny dia nahita izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako fa na dia efa nisaorako aza Israely mpikomy ka nomeko taratasy fisaorana noho ny fijangajangany dia tsy nety natahotra i Joda mpivadika rahavaviny fa nandeha nijangajanga koa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandoto ny tany avy tamin’ny horakoraky ny fijangajangany izy ary nijangajanga tamin’ny vato aman-kazo. '
