document_id: JOB.38,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: MIDITRA AN-TSEHATRA NY TOMPO
  - type: text
    content: 'Avy tao anatin’ny tafio-drivotra NY TOMPO no namaly an’i Joba hoe:'
  '10':
  - type: text
    content: ary nandidy ny ho fetrany
  - type: text
    content: sady nanisy hidy sy varavarana
  '11':
  - type: text
    content: 'ka niteny hoe: Hatreto no azonao androsoana ka tsy hihoatra azy'
  - type: text
    content: ary eto no hampijanonana ny fisafoaky ny onjanao?
  '12':
  - type: text
    content: Hatrizay niainanao, moa mba efa nandidy ny maraina va ianao?
  - type: text
    content: Efa notoroanao ny fitoerany va ny fiposaky ny andro
  '13':
  - type: text
    content: mba handraisany ny sisin’ny tany
  - type: text
    content: ka hakopakopany hiala ny ratsy fanahy?
  '14':
  - type: text
    content: Dia miova tahaka ny tanimanga fanaovana fitombo-kase ny endriny
  - type: text
    content: ka miseho tahaka ny lamba misoratra.
  '15':
  - type: text
    content: Hosakanana ny fahazavan’ny ratsy fanahy
  - type: text
    content: ka ho tapaka ny sandry naingaina.
  '16':
  - type: text
    content: Moa efa niditra hatrany amin’ny loharanon’ny ranomasina va ianao
  - type: text
    content: ary efa nandehandeha tany amin’ny fanambanin’ny lalina?
  '17':
  - type: text
    content: Moa efa naharihary taminao va ny vavahadin’ny fahafatesana?
  - type: text
    content: Ary efa hitanao va ny vavahadin’ny aloky ny fahafatesana?
  '18':
  - type: text
    content: Moa efa voadinikao ny fivelatry ny tany?
  - type: text
    content: Ambarao ary raha fantatrao izany rehetra izany.
  '19':
  - type: text
    content: Aiza ary no lalana ho any amin’ny fonenan’ny mazava?
  - type: text
    content: Ary aiza ny fitoeran’ny maizina
  '2':
  - type: text
    content: Iza moa izato manao izay hahamaizina ny fisainana
  - type: text
    content: amin’ny teny tsy misy fahalalana?
  '20':
  - type: text
    content: mba hitsenanao azy any amin’ny faran’ny alehany
  - type: text
    content: satria fantatrao ny lalana ho any an-tranony?
  '21':
  - type: text
    content: Eny, fantatrao mantsy izany satria efa teraka ianao tamin’izay
  - type: text
    content: ary maro ny isan’ny andronao!
  '22':
  - type: text
    content: Moa efa niditra tany amin’ny trano fitahirizana ny orampanala va ianao?
  - type: text
    content: Ary efa hitanao va ny trano fitahirizana ny havandra
  '23':
  - type: text
    content: izay voatahiriko ho amin’ny andro fahoriana,
  - type: text
    content: dia ny andro misy ady sy tafika?
  '24':
  - type: text
    content: Aiza moa no lalana izarazaran’ny mazava
  - type: text
    content: sy ielezan’ny rivotra avy any atsinanana ho etỳ ambonin’ny tany?
  '25':
  - type: text
    content: Iza moa no nihady lalan-drano ho an’ny ranonorana mirotsaka be
  - type: text
    content: sy lalan-kaleha ho an’ny tselatra sy kotrokorana
  '26':
  - type: text
    content: mba hilatsahan’ny ranonorana ambonin’ny tany izay tsy itoeran’olona,
  - type: text
    content: dia any amin’ny tany efitra tsy misy mponina
  '27':
  - type: text
    content: ka hahavonto ny tany ngazana sy ny tany foana
  - type: text
    content: ary hampitsimoka ny ahitra sy hampaniry azy?
  '28':
  - type: text
    content: Manana ray va ny ranonorana?
  - type: text
    content: Ary iza kosa no miteraka ny ranonando?
  '29':
  - type: text
    content: Kibon’iza moa no niavian’ny ranomandry?
  - type: text
    content: Ary ny vongam-panala avy amin’ny lanitra, iza no niteraka azy?
  '3':
  - type: text
    content: Misikìna ary tahaka ny lehilahy
  - type: text
    content: fa hanadina anao Aho ka valio.
  - type: heading
    content: Andriamanitra no Tompon’ny zavatra tsy miaina rehetra
  '30':
  - type: text
    content: Tonga mafy toy ny vato ny rano
  - type: text
    content: ary mitambatra ny fanambonin’ny lalina.
  '31':
  - type: text
    content: Mahavona ny kofehin’ny Ikotokelimiadilaona va ianao
  - type: text
    content: na mahavaha ny fatoran’ny Telonohorefy?
  '32':
  - type: text
    content: Mahavoaka ireo vondron-kintana amin’ny fotoanany va ianao?
  - type: text
    content: Ary mahatondra an’i Bera mbamin’ny zanany va ianao?
  '33':
  - type: text
    content: Fantatrao va ny lalàna eny amin’ny lanitra?
  - type: text
    content: Ary mahafehy ny fanapahan’ireny etỳ an-tany va ianao?
  '34':
  - type: text
    content: Mahasandratra ny feonao ho amin’ny rahona matevina va ianao
  - type: text
    content: mba hanafotra anao ny rano mandriaka?
  '35':
  - type: text
    content: Mahay mandefa ny tselatra va ianao
  - type: text
    content: 'ka ho avy ireo hilaza aminao hoe: Indreto izahay?'
  '36':
  - type: text
    content: Iza moa no nanao ny rahona matevina ho fitoeram-pahendrena
  - type: text
    content: ary irerỳ miseho erỳ an-danitra ho fampisehoana ny fahalalana?
  '37':
  - type: text
    content: Iza moa no manam-pahendrena mahisa ny rahom-potsy manify?
  - type: text
    content: Ary iza no mampitongilana ny fitoeran-dranon’ny lanitra
  '38':
  - type: text
    content: ka mitambatra ho dilatra ny vovoka
  - type: text
    content: ary mivongana ho bainga?
  - type: heading
    content: Andriamanitra no Tompon’ny manana aina rehetra
  '39':
  - type: text
    content: Mahay mihaza remby ho an’ny liom-bavy va ianao
  - type: text
    content: ary mahafaka ny hanoanan’ny liona tanora
  '4':
  - type: text
    content: Taiza ianao fony Aho nanorina ny tany?
  - type: text
    content: Ambarao raha hainao.
  '40':
  - type: text
    content: raha mamitsaka ao amin’ny fitoerany izy
  - type: text
    content: ary manotrika ao amin’ny kirihitrala?
  '41':
  - type: text
    content: Iza moa no manome hanina ny goaika
  - type: text
    content: raha mitaraina amin’Andriamanitra ny zanany
  - type: text
    content: ka mirenireny tsy mahita hanina?
  '5':
  - type: text
    content: Iza ary no nandidy izay ho refiny raha fantatrao?
  - type: text
    content: Ary iza no nanenjana ny kofehy fandrefesana teo aminy?
  '6':
  - type: text
    content: Teo ambonin’ny inona no nanorenana ny andriny
  - type: text
    content: ary iza no nandatsaka ny vato fehizorony,
  '7':
  - type: text
    content: raha niara-nihira ny kintan’ny maraina
  - type: text
    content: ary nihoby avokoa ireo zanak’Andriamanitra?
  '8':
  - type: text
    content: Iza no nanao varavarana misakana ny ranomasina
  - type: text
    content: raha nibosesika nivoaka avy tany am-bohoka izy,
  '9':
  - type: text
    content: raha nanao ny rahona ho fitafiany Aho
  - type: text
    content: ary ny haizim-pito ho fonony,
