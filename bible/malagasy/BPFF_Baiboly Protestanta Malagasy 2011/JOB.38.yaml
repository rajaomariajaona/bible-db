document_id: JOB.38
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: MIDITRA AN-TSEHATRA NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy tao anatin’ny tafio-drivotra NY TOMPO no namaly an’i Joba hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Iza moa izato manao izay hahamaizina ny fisainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny teny tsy misy fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Misikìna ary tahaka ny lehilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hanadina anao Aho ka valio.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra no Tompon’ny zavatra tsy miaina rehetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Taiza ianao fony Aho nanorina ny tany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambarao raha hainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza ary no nandidy izay ho refiny raha fantatrao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no nanenjana ny kofehy fandrefesana teo aminy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Teo ambonin’ny inona no nanorenana ny andriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary iza no nandatsaka ny vato fehizorony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: raha niara-nihira ny kintan’ny maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nihoby avokoa ireo zanak’Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Iza no nanao varavarana misakana ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha nibosesika nivoaka avy tany am-bohoka izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: raha nanao ny rahona ho fitafiany Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny haizim-pito ho fonony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ary nandidy ny ho fetrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nanisy hidy sy varavarana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka niteny hoe: Hatreto no azonao androsoana ka tsy hihoatra azy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eto no hampijanonana ny fisafoaky ny onjanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hatrizay niainanao, moa mba efa nandidy ny maraina va ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa notoroanao ny fitoerany va ny fiposaky ny andro
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mba handraisany ny sisin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hakopakopany hiala ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia miova tahaka ny tanimanga fanaovana fitombo-kase ny endriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miseho tahaka ny lamba misoratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hosakanana ny fahazavan’ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho tapaka ny sandry naingaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Moa efa niditra hatrany amin’ny loharanon’ny ranomasina va ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa nandehandeha tany amin’ny fanambanin’ny lalina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moa efa naharihary taminao va ny vavahadin’ny fahafatesana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa hitanao va ny vavahadin’ny aloky ny fahafatesana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moa efa voadinikao ny fivelatry ny tany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambarao ary raha fantatrao izany rehetra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aiza ary no lalana ho any amin’ny fonenan’ny mazava?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aiza ny fitoeran’ny maizina
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mba hitsenanao azy any amin’ny faran’ny alehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria fantatrao ny lalana ho any an-tranony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eny, fantatrao mantsy izany satria efa teraka ianao tamin’izay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maro ny isan’ny andronao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moa efa niditra tany amin’ny trano fitahirizana ny orampanala va ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa hitanao va ny trano fitahirizana ny havandra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: izay voatahiriko ho amin’ny andro fahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny andro misy ady sy tafika?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aiza moa no lalana izarazaran’ny mazava
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ielezan’ny rivotra avy any atsinanana ho etỳ ambonin’ny tany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Iza moa no nihady lalan-drano ho an’ny ranonorana mirotsaka be
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy lalan-kaleha ho an’ny tselatra sy kotrokorana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: mba hilatsahan’ny ranonorana ambonin’ny tany izay tsy itoeran’olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia any amin’ny tany efitra tsy misy mponina
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ka hahavonto ny tany ngazana sy ny tany foana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampitsimoka ny ahitra sy hampaniry azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Manana ray va ny ranonorana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza kosa no miteraka ny ranonando?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Kibon’iza moa no niavian’ny ranomandry?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vongam-panala avy amin’ny lanitra, iza no niteraka azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tonga mafy toy ny vato ny rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitambatra ny fanambonin’ny lalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mahavona ny kofehin’ny Ikotokelimiadilaona va ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mahavaha ny fatoran’ny Telonohorefy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mahavoaka ireo vondron-kintana amin’ny fotoanany va ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahatondra an’i Bera mbamin’ny zanany va ianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fantatrao va ny lalàna eny amin’ny lanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahafehy ny fanapahan’ireny etỳ an-tany va ianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mahasandratra ny feonao ho amin’ny rahona matevina va ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanafotra anao ny rano mandriaka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Mahay mandefa ny tselatra va ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka ho avy ireo hilaza aminao hoe: Indreto izahay?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Iza moa no nanao ny rahona matevina ho fitoeram-pahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary irerỳ miseho erỳ an-danitra ho fampisehoana ny fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Iza moa no manam-pahendrena mahisa ny rahom-potsy manify?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no mampitongilana ny fitoeran-dranon’ny lanitra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ka mitambatra ho dilatra ny vovoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mivongana ho bainga?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra no Tompon’ny manana aina rehetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Mahay mihaza remby ho an’ny liom-bavy va ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahafaka ny hanoanan’ny liona tanora
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: raha mamitsaka ao amin’ny fitoerany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manotrika ao amin’ny kirihitrala?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Iza moa no manome hanina ny goaika
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mitaraina amin’Andriamanitra ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mirenireny tsy mahita hanina?
