document_id: PSA.100,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Olony isika
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Salamo ho fiderana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihobia ho an’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry tany rehetra!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manompoa NY TOMPO amin’ny fifaliana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mankanesa eo anatrehany amin’ny fihobiana!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka ho fantatrareo fa NY TOMPO no Andriamanitra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no nanao antsika ary Azy isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia olony sy ondry andrasany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midira eo amin’ny vavahadiny amin’ny fisaorana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eo an-kianjany amin’ny fiderana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy, misaora ny anarany!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsara NY TOMPO; mandrakizay ny famindrampony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihatra amin’ny taranaka fara aman-dimby ny fahamarinany.
