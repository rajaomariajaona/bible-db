document_id: PSA.100,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Olony isika
  - type: text
    content: Salamo ho fiderana.
  - type: text
    content: Mihobia ho an’NY TOMPO,
  - type: text
    content: ry tany rehetra!
  '2':
  - type: text
    content: Manompoa NY TOMPO amin’ny fifaliana;
  - type: text
    content: mankanesa eo anatrehany amin’ny fihobiana!
  '3':
  - type: text
    content: 'Aoka ho fantatrareo fa NY TOMPO no Andriamanitra:'
  - type: text
    content: Izy no nanao antsika ary Azy isika,
  - type: text
    content: dia olony sy ondry andrasany.
  '4':
  - type: text
    content: Midira eo amin’ny vavahadiny amin’ny fisaorana
  - type: text
    content: ary eo an-kianjany amin’ny fiderana!
  - type: text
    content: Miderà Azy, misaora ny anarany!
  '5':
  - type: text
    content: Fa tsara NY TOMPO; mandrakizay ny famindrampony
  - type: text
    content: ary mihatra amin’ny taranaka fara aman-dimby ny fahamarinany.
