document_id: 1SA.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vavak’i Hana
  - type: text
    content: 'Ary nivavaka i Hana ka hoy izy:'
  - type: text
    content: Ny foko dia ravoravo amin’NY TOMPO,
  - type: text
    content: 'ny '
  - type: text
    content: tandroko
  - type: text
    content: ' dia voasandratra amin’NY TOMPO,'
  - type: text
    content: ny vavako dia misokatra hamaly ny fahavaloko
  - type: text
    content: satria mifaly amin’ny famonjenao aho.
  '10':
  - type: text
    content: Ho torotoro izay miady amin’NY TOMPO;
  - type: text
    content: any an-danitra Izy no hampikotroka hamely azy.
  - type: text
    content: NY TOMPO hitsara ny vazan-tany rehetra;
  - type: text
    content: hanome hery ny mpanjakany Izy
  - type: text
    content: sady hanandratra ny tandroky ny voahosony.
  '11':
  - type: text
    content: Ary nankany an-tranony tany Rama i Elkana, fa ny zaza kosa dia nanao fanompoam-pivavahana ho an’NY TOMPO teo anatrehan’i Ely mpisorona.
  - type: heading
    content: Ny fanararaotana nataon’ireo zanak’i Ely
  '12':
  - type: text
    content: 'Ny zanakalahin’i Ely dia tena ratsy fanahy sady tsy nahalala NY TOMPO. '
  '13':
  - type: text
    content: 'Izao no fanaon’ny mpisorona tamin’ny olona: Rehefa nisy olona namono zavatra hatao fanatitra dia avy ny zatovon’ny mpisorona nitondra fitrebika telo rantsana teny an-tanany, raha mbola ahandroina ny hena, '
  '14':
  - type: text
    content: 'dia natsindrony tao anatin’ny fanendasana ny fitrebika, na tao anatin’ny fahandroan-kena, na ny vilany, na ny vilanibe, koa izay rehetra azon’ny fitrebika tao dia nalain’ny mpisorona ho azy. Izany no fanaony tamin’ny Israely rehetra izay tonga tao Silo. '
  '15':
  - type: text
    content: 'Ary raha tsy mbola nodorana ho fofona ny jabora dia avy ny zatovon’ny mpisorona ka niteny tamin’izay lehilahy namono zavatra hatao fanatitra hoe: Omeo hena hatsatsika ho an’ny mpisorona; fa tsy handray hena masaka avy aminao izy fa manta ihany. '
  '16':
  - type: text
    content: 'Raha hoy ilay olona aminy hoe: Aoka hodorana aloha ny jabora fa avy eo vao halainao izay tianao, dia novaliny hoe: Tsia; fa omeo izao ankehitriny izao ihany; fa raha tsy izany dia halaiko an-keriny. '
  '17':
  - type: text
    content: Koa lehibe indrindra ny helok’ireo zatovo ireo teo anatrehan’NY TOMPO satria namingavinga ny fanatitra ho an’NY TOMPO izy ireo.
  - type: heading
    content: Manompo NY TOMPO ao Silo i Samoela
  '18':
  - type: text
    content: 'I Samoela dia nanao fanompoam-pivavahana teo anatrehan’NY TOMPO. Mbola zaza izy tamin’izany ary nisalotra '
  - type: text
    content: efoda
  - type: text
    content: ' vita tamin’ny lamba rongony.'
  '19':
  - type: text
    content: 'Nanaovan’ny reniny akanjo kely izy; noentiny ho azy isan-taona isan-taona izany rehefa niara-niakatra tamin’ny vadiny hanolotra ny fanatitra fanao isan-taona izy. '
  '2':
  - type: text
    content: Tsy misy masina tahaka NY TOMPO
  - type: text
    content: satria tsy misy afa-tsy Ianao;
  - type: text
    content: tsy misy vatolampy tahaka ny Andriamanitsika.
  '20':
  - type: text
    content: 'Ary nitsodrano an’i Elkana mivady i Ely hoe: Homen’NY TOMPO zaza amin’ity vehivavy ity anie ianao ho solon’ilay voatolotra ho an’NY TOMPO. Dia lasa nody izy mivady. '
  '21':
  - type: text
    content: Dia namangy an’i Hana NY TOMPO ka nanana anaka indray izy ary niteraka lahy telo sy vavy roa.
  - type: text
    content: Ary nitombo teo anatrehan’NY TOMPO i Samoela zaza.
  '22':
  - type: text
    content: 'Efa antitra tokoa i Ely, ary reny izay rehetra nataon’ny zanany lahy tamin’ny Israely rehetra sy ny nandriany tamin’ireo vehivavy izay nanompo teo amin’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Dia hoy izy taminy: Nahoana ianareo no manao izany zavatra izany? Reko amin’ny olona rehetra ny ratsy ataonareo. '
  '24':
  - type: text
    content: 'Tsia, anaka, tsy tsara ny teny reko; fa mampanota ny olon’NY TOMPO ianareo. '
  '25':
  - type: text
    content: Raha misy olona manota amin’olona dia Andriamanitra no hitsara azy; fa raha misy kosa manota amin’NY TOMPO, iza no hifona ho azy? Nefa tsy nihaino ny tenin’ny rainy izy ireo satria efa sitraky NY TOMPO ny hahafaty azy ireo.
  '26':
  - type: text
    content: Ary i Samoela zaza dia nitombo ka sady tian’NY TOMPO izy no tian’ny olona koa.
  - type: heading
    content: Ny famaizana nambara tamin’i Ely sy ny fianakaviany
  '27':
  - type: text
    content: 'Nisy lehilahin’Andriamanitra nankany amin’i Ely ka niteny taminy hoe: Izao no lazain’NY TOMPO: Tsy efa niseho tamin’ny ankohonan-drainao tokoa va Aho raha mbola tany Ejipta tao an-tranon’i Farao izy? '
  '28':
  - type: text
    content: 'Eny, nofidiko tamin’ireo fokon’ny Israely rehetra izy ho mpisoroko mba hanolotra fanatitra eo ambonin’ny alitarako sy handoro ditin-kazo manitra ary hisalotra '
  - type: text
    content: efoda
  - type: text
    content: ' eo anatrehako, dia nomeko ho an’ny taranaky ny rainao ny fanatitra rehetra aterin’ny Zanak’Israely amin’ny afo. '
  '29':
  - type: text
    content: 'Koa nahoana no hitsakitsahinareo ny fanatitra alatsa-dra sy ny fanatitra avy amin’ny zavamaniry izay aterina ho Ahy, dia ilay nasaiko atao ao amin’ny fonenako? Ny zanakao no omenao voninahitra mihoatra noho Izaho, mba hanatavy ny tenanareo amin’izay tsara indrindra amin’ny fanatitra rehetra atolotry ny Israely oloko! '
  '3':
  - type: text
    content: Aza mahery miteny an’avona
  - type: text
    content: ary aoka tsy haloaky ny vavanareo ny fireharehana,
  - type: text
    content: fa NY TOMPO no Andriamanitry ny fahalalana
  - type: text
    content: ary Izy no mandanja ny asa.
  '30':
  - type: text
    content: 'Koa izany no ilazan’NY TOMPO, Andriamanitry ny Israely hoe: Voalazako tokoa fa ny taranakao sy ny taranaky ny rainao no handeha eo anatrehako mandrakizay; fa ankehitriny kosa, hoy NY TOMPO, sanatria Ahy izany; fa izay manome voninahitra Ahy no homeko voninahitra, ary izay manamavo Ahy no ho afa-baraka. '
  '31':
  - type: text
    content: 'Indro, avy ny andro izay hanapahako ny sandrinao sy ny sandrin’ny taranaky ny rainao, koa tsy hisy lehilahy ho tratra antitra amin’ny taranakao. '
  '32':
  - type: text
    content: 'Ary hahita fahavalo ao amin’ny fonenako ianao, na inona na inona soa natao tamin’ny Israely, koa tsy hisy lehilahy ho tratra antitra amin’ny taranakao mandrakizay. '
  '33':
  - type: text
    content: 'Nefa hisy lehilahy iray amin’ny taranakao izay tsy hesoriko eo anilan’ny alitarako mba hahapahina ny masonao sy handany ny ainao, ary ny taranakao rehetra dia ho faty raha vao herotrerony. '
  '34':
  - type: text
    content: 'Ary izao no ho famantarana ho anao, izay hanjo ny zanakao roa lahy, dia i Hofinia sy i Finehasa: Andro iray no hahafatesan’izy mirahalahy. '
  '35':
  - type: text
    content: 'Izaho hanangana mpisorona mahatoky ho Ahy izay hanatanteraka ny ato am-poko sy ato an-tsaiko; ary hampaharitra ny taranany Aho ka handeha eo anatrehan’ny voahosotro mandrakizay izy. '
  '36':
  - type: text
    content: 'Ary ho avy izay sisa rehetra amin’ny taranakao ka hiankohoka eo anatrehany hangataka vola kely sy mofo iray sady hiteny hoe: Miangavy anao aho, mba tendreo ho isan’ny mpisorona aho mba hahazoako sombi-mofo hohanina.'
  '4':
  - type: text
    content: Tapaka ny tsipìkan’ny olo-mahery
  - type: text
    content: ary izay mila ho reraka dia misikina hery.
  '5':
  - type: text
    content: Mikarama mofo ny voky
  - type: text
    content: ary mianina kosa ny noana;
  - type: text
    content: ny momba dia miteraka fito
  - type: text
    content: ary mihamalemy kosa ny maro anaka.
  '6':
  - type: text
    content: NY TOMPO no mahafaty sy mahavelona;
  - type: text
    content: 'Izy no mampidina ho any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' sy mampiakatra avy any.'
  '7':
  - type: text
    content: NY TOMPO no mampahantra sy mampanankarena;
  - type: text
    content: Izy no mampietry sy mampisandratra.
  '8':
  - type: text
    content: Izy no manangana ny fadiranovana avy amin’ny vovoka
  - type: text
    content: sy manandratra ny mahantra avy eo amin’ny zezika
  - type: text
    content: mba hampiara-mitoetra azy amin’ny olo-manankaja
  - type: text
    content: sy hampandova azy sezam-boninahitra.
  - type: text
    content: Fa an’NY TOMPO ny andrin’ny tany
  - type: text
    content: ary eo amboniny no ametrahany izao tontolo izao.
  '9':
  - type: text
    content: Ny tongotry ny olo-masiny dia tandremany,
  - type: text
    content: fa ny ratsy fanahy kosa dia hampangininy any amin’ny haizina,
  - type: text
    content: satria tsy amin’ny hery no handresen’ny olona.
