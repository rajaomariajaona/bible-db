document_id: 1SA.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavak’i Hana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nivavaka i Hana ka hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny foko dia ravoravo amin’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandroko
  - type: text
    text: ' dia voasandratra amin’NY TOMPO,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vavako dia misokatra hamaly ny fahavaloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria mifaly amin’ny famonjenao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy misy masina tahaka NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy misy afa-tsy Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy vatolampy tahaka ny Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza mahery miteny an’avona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy haloaky ny vavanareo ny fireharehana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO no Andriamanitry ny fahalalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izy no mandanja ny asa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tapaka ny tsipìkan’ny olo-mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mila ho reraka dia misikina hery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mikarama mofo ny voky
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mianina kosa ny noana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny momba dia miteraka fito
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihamalemy kosa ny maro anaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: NY TOMPO no mahafaty sy mahavelona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izy no mampidina ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' sy mampiakatra avy any.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: NY TOMPO no mampahantra sy mampanankarena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no mampietry sy mampisandratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izy no manangana ny fadiranovana avy amin’ny vovoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manandratra ny mahantra avy eo amin’ny zezika
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampiara-mitoetra azy amin’ny olo-manankaja
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hampandova azy sezam-boninahitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa an’NY TOMPO ny andrin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo amboniny no ametrahany izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny tongotry ny olo-masiny dia tandremany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny ratsy fanahy kosa dia hampangininy any amin’ny haizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy amin’ny hery no handresen’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ho torotoro izay miady amin’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: any an-danitra Izy no hampikotroka hamely azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO hitsara ny vazan-tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanome hery ny mpanjakany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hanandratra ny tandroky ny voahosony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary nankany an-tranony tany Rama i Elkana, fa ny zaza kosa dia nanao fanompoam-pivavahana ho an’NY TOMPO teo anatrehan’i Ely mpisorona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanararaotana nataon’ireo zanak’i Ely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny zanakalahin’i Ely dia tena ratsy fanahy sady tsy nahalala NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no fanaon’ny mpisorona tamin’ny olona: Rehefa nisy olona namono zavatra hatao fanatitra dia avy ny zatovon’ny mpisorona nitondra fitrebika telo rantsana teny an-tanany, raha mbola ahandroina ny hena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia natsindrony tao anatin’ny fanendasana ny fitrebika, na tao anatin’ny fahandroan-kena, na ny vilany, na ny vilanibe, koa izay rehetra azon’ny fitrebika tao dia nalain’ny mpisorona ho azy. Izany no fanaony tamin’ny Israely rehetra izay tonga tao Silo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary raha tsy mbola nodorana ho fofona ny jabora dia avy ny zatovon’ny mpisorona ka niteny tamin’izay lehilahy namono zavatra hatao fanatitra hoe: Omeo hena hatsatsika ho an’ny mpisorona; fa tsy handray hena masaka avy aminao izy fa manta ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha hoy ilay olona aminy hoe: Aoka hodorana aloha ny jabora fa avy eo vao halainao izay tianao, dia novaliny hoe: Tsia; fa omeo izao ankehitriny izao ihany; fa raha tsy izany dia halaiko an-keriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa lehibe indrindra ny helok’ireo zatovo ireo teo anatrehan’NY TOMPO satria namingavinga ny fanatitra ho an’NY TOMPO izy ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manompo NY TOMPO ao Silo i Samoela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I Samoela dia nanao fanompoam-pivavahana teo anatrehan’NY TOMPO. Mbola zaza izy tamin’izany ary nisalotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efoda
  - type: text
    text: ' vita tamin’ny lamba rongony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nanaovan’ny reniny akanjo kely izy; noentiny ho azy isan-taona isan-taona izany rehefa niara-niakatra tamin’ny vadiny hanolotra ny fanatitra fanao isan-taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nitsodrano an’i Elkana mivady i Ely hoe: Homen’NY TOMPO zaza amin’ity vehivavy ity anie ianao ho solon’ilay voatolotra ho an’NY TOMPO. Dia lasa nody izy mivady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia namangy an’i Hana NY TOMPO ka nanana anaka indray izy ary niteraka lahy telo sy vavy roa.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary nitombo teo anatrehan’NY TOMPO i Samoela zaza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Efa antitra tokoa i Ely, ary reny izay rehetra nataon’ny zanany lahy tamin’ny Israely rehetra sy ny nandriany tamin’ireo vehivavy izay nanompo teo amin’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy izy taminy: Nahoana ianareo no manao izany zavatra izany? Reko amin’ny olona rehetra ny ratsy ataonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsia, anaka, tsy tsara ny teny reko; fa mampanota ny olon’NY TOMPO ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Raha misy olona manota amin’olona dia Andriamanitra no hitsara azy; fa raha misy kosa manota amin’NY TOMPO, iza no hifona ho azy? Nefa tsy nihaino ny tenin’ny rainy izy ireo satria efa sitraky NY TOMPO ny hahafaty azy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary i Samoela zaza dia nitombo ka sady tian’NY TOMPO izy no tian’ny olona koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famaizana nambara tamin’i Ely sy ny fianakaviany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nisy lehilahin’Andriamanitra nankany amin’i Ely ka niteny taminy hoe: Izao no lazain’NY TOMPO: Tsy efa niseho tamin’ny ankohonan-drainao tokoa va Aho raha mbola tany Ejipta tao an-tranon’i Farao izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Eny, nofidiko tamin’ireo fokon’ny Israely rehetra izy ho mpisoroko mba hanolotra fanatitra eo ambonin’ny alitarako sy handoro ditin-kazo manitra ary hisalotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efoda
  - type: text
    text: ' eo anatrehako, dia nomeko ho an’ny taranaky ny rainao ny fanatitra rehetra aterin’ny Zanak’Israely amin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa nahoana no hitsakitsahinareo ny fanatitra alatsa-dra sy ny fanatitra avy amin’ny zavamaniry izay aterina ho Ahy, dia ilay nasaiko atao ao amin’ny fonenako? Ny zanakao no omenao voninahitra mihoatra noho Izaho, mba hanatavy ny tenanareo amin’izay tsara indrindra amin’ny fanatitra rehetra atolotry ny Israely oloko! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa izany no ilazan’NY TOMPO, Andriamanitry ny Israely hoe: Voalazako tokoa fa ny taranakao sy ny taranaky ny rainao no handeha eo anatrehako mandrakizay; fa ankehitriny kosa, hoy NY TOMPO, sanatria Ahy izany; fa izay manome voninahitra Ahy no homeko voninahitra, ary izay manamavo Ahy no ho afa-baraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Indro, avy ny andro izay hanapahako ny sandrinao sy ny sandrin’ny taranaky ny rainao, koa tsy hisy lehilahy ho tratra antitra amin’ny taranakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hahita fahavalo ao amin’ny fonenako ianao, na inona na inona soa natao tamin’ny Israely, koa tsy hisy lehilahy ho tratra antitra amin’ny taranakao mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nefa hisy lehilahy iray amin’ny taranakao izay tsy hesoriko eo anilan’ny alitarako mba hahapahina ny masonao sy handany ny ainao, ary ny taranakao rehetra dia ho faty raha vao herotrerony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary izao no ho famantarana ho anao, izay hanjo ny zanakao roa lahy, dia i Hofinia sy i Finehasa: Andro iray no hahafatesan’izy mirahalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Izaho hanangana mpisorona mahatoky ho Ahy izay hanatanteraka ny ato am-poko sy ato an-tsaiko; ary hampaharitra ny taranany Aho ka handeha eo anatrehan’ny voahosotro mandrakizay izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ho avy izay sisa rehetra amin’ny taranakao ka hiankohoka eo anatrehany hangataka vola kely sy mofo iray sady hiteny hoe: Miangavy anao aho, mba tendreo ho isan’ny mpisorona aho mba hahazoako sombi-mofo hohanina.'
