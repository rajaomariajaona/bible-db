document_id: LEV.26,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Aza manao andriamanitra tsy izy. Aza manangana sarin-javatra voasokitra na manao tsangambaton-tsampy na manorina vato soratana hiankohofana eo amin’ny taninareo, fa Izaho no TOMPO Andriamanitrareo.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hihinana ny tranainy ianareo sady hamoaka ny tranainy hasiana ny vao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakeliko
    - type: text
      text: ' dia hataoko eo aminareo ary tsy ho halan’ny fanahiko ianareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Handeha eo anivonareo Aho ka ho Andriamanitrareo ary ianareo dia ho oloko. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izaho no TOMPO Andriamanitrareo izay nitondra anareo nivoaka avy tany amin’ny tany Ejipta mba tsy ho andevony ianareo; ary nanapaka ny zioga izay teo aminareo Aho ka nampandeha anareo mitraka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ozona
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa raha tsy mihaino Ahy kosa ianareo ka tsy mankatò ireo didy rehetra ireo '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary hamavoinareo ny didiko na halan’ny fanahinareo ny fitsipiko ka tsy ankatoavinareo ny didiko rehetra fa ivadihanareo ny fanekeko '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'dia izao no hataoko aminareo: Hasiako fampitahorana aminareo, dia aretina mahasaozanina sy tazo mahamay izay manimba ny maso sy mandany ny aina; ary hafafinareo foana ny voan-javatrareo fa ny fahavalonareo no hihinana azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia hifanandrina aminareo ny tavako ka ho resy eo anoloan’ny fahavalonareo ianareo. Izay mankahala anareo no hifehy anareo ary handositra ianareo na dia tsy misy manenjika aza.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary raha mbola tsy mihaino Ahy ihany ianareo amin’izany rehetra izany dia mbola hampijaly anareo impito Aho noho ny fahotanareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Horavako ny reharehan’ny herinareo ka hataoko toy ny vy ny lanitrareo ary toy ny varahina ny taninareo; ary ny herinareo dia ho lany foana; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tandremo ny Sabatako ary hajao ny fitoerako masina. Izaho no TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitahiana
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: fa tsy hanome vokatra ny taninareo ary tsy hamoa ny hazo amin’ny tany.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary raha mbola manohitra Ahy ihany ianareo ka tsy mety mihaino Ahy dia hasiako kapoka impito koa ianareo araka ny fahotanareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hampandehaniko eo aminareo ny bibidia ka handany ny zanakareo sy handringana ny biby fiompinareo ireny ary hahavitsy isa anareo; ny lalambenareo dia ho tonga tany efitra.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary raha tsy mandray ny anatro amin’izany ianareo fa mbola manohitra Ahy ihany '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Izaho dia Izaho kosa no hamely anareo ka hampijaly anareo impito indray noho ny fahotanareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hampiditra sabatra aminareo Aho ho valin’ny nivadihanareo ny fanekena; ary rehefa tafangona ao anatin’ny tanànanareo ianareo dia handefa areti-mandringana aminareo Aho ary hatolotra eo an-tanan’ny fahavalo ianareo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Raha atsahatro ny mofo ho anareo, izay tohan’ainareo, dia fanendasa-mofo iray ihany no hanendasan’ny vehivavy folo ny mofonareo ary an-tsinjarany no hizaràny azy dia hihinana ianareo nefa tsy ho voky.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary raha mbola tsy mihaino Ahy amin’izany ihany ianareo fa mbola manohitra Ahy hatrany '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'dia hamely anareo amin’ny fahatezerana kosa Aho; ary Izaho dia Izaho no hampijaly anareo impito indray noho ny fahotanareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia hihinana ny nofon’ny zanakareo lahy sy ny zanakareo vavy ianareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Raha manaraka ny lalànako sy mitandrina ny didiko ianareo ka mankatò izany '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia horavako ny toerana fanaovanareo sorona ary hokapaiko ny tsangankazon-tsampinareo ho an’ny masoandro ary ny fatinareo dia hariako eo ambonin’ny fatin’ny sampinareo ary ho halan’ny fanahiko ianareo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Horavako ny tanànanareo ka ho lao ireo toeranareo masina ary tsy hamboloiko ny hanitra mani-pofona aterinareo. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Hataoko lao ny tany ka ho talanjona amin’izany ny fahavalonareo izay monina eo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary ianareo dia haeliko any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ; hanatsoaka sabatra hoenti-manenjika anareo Aho ka ho lao ny taninareo ary ho rava ny tanànanareo.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary amin’izany ny tany dia hifaly amin’ny Sabatany mandritra ny andro rehetra izay hahafoana azy raha any amin’ny tanin’ny fahavalonareo ianareo; dia hitsahatra ny tany ka hifaly amin’ny Sabatany; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'amin’ny andro hahafoana azy rehetra no hitsaharany ho solon’izay tsy nitsaharany tamin’ny Sabatanareo fony mbola nonina teo ianareo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary ny amin’ireo sisa aminareo dia hampidirako hakiviana ao am-pony, any amin’ny tanin’ny fahavalony, ka na ny feon’ny ravin-kazo voapaoka aza dia hampandositra azy; ary handositra tahaka ny mandositra sabatra izy ka ho lavo na dia tsy misy manenjika aza. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary ho lavo mifanindry toy ny mandositra sabatra izy ireo na dia tsy misy manenjika aza; koa tsy hahajanona eo anoloan’ny fahavalonareo ianareo. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Dia ho lany ringana any amin’ny Jentilisa ianareo; ho lanin’ny tanin’ny fahavalonareo ianareo. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Ary ireo sisa eo aminareo dia ho levona any amin’ny tanin’ny fahavalonareo noho ny helony sy ny heloky ny razany koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hotsarovan’Andriamanitra ny fanekeny
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'dia hanome anareo ranonorana amin’ny fotoanany Aho ka hahavokatra ny tany ary hamoa ny hazo any an-tsaha. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Dia hiaiky ny helony sy ny heloky ny razany izy ireo, dia ny fahadisoana izay vitany tamiko tamin’ny nanoherany Ahy, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'ary Izaho koa hamely azy ka hitondra azy ho any amin’ny tanin’ny fahavalony. Dia hietry amin’izany ny fony tsy voafora ka hanonitra ny helony izy ireo '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'dia hotsarovako ny fanekeko tamin’i Jakoba sy ny fanekeko tamin’Isaka ary ny fanekeko tamin’i Abrahama; ary hotsarovako koa ny tany. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Ary hilaozan’izy ireo ny tany ka hifaly amin’ny Sabatany satria mitoetra foana tsy misy olona; fa ny olona kosa dia hanonitra ny amin’ny helony satria nandà ny fitsipiko sady nankahala ny didiko. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ary na dia izany rehetra izany aza, raha any amin’ny tanin’ny fahavalony izy dia tsy holaviko ary tsy ho halako fandrao lany ringana izy rehetra ka ho rava ny fanekeko taminy; fa Izaho no TOMPO Andriamaniny. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Fa ny hitahiako azy no hahatsiarovako ny fanekena tamin’ny razany izay nentiko nivoaka avy tany amin’ny tany Ejipta teo imason’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' mba ho Andriamaniny Aho. Izaho no TOMPO.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Ireo no didy sy fitsipika ary lalàna izay nataon’NY TOMPO ho aminy sy amin’ny Zanak’Israely teo an-tendrombohitra Sinay ka nampilazainy an’i Mosesy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ho tratry ny taom-piotazam-boaloboka ny taom-pivelezanareo ary ho tratry ny taom-pamafazana ny taom-piotazam-boaloboka; dia hihinana ianareo ka ho voky ary handry fehizay eo amin’ny taninareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Homeko fiadanana eo amin’ny tany ianareo ka handry fehizay, ary tsy hisy hanaitaitra; fa hofongorako ny biby masiaka amin’ny tany ary tsy hotetezin-tsabatra ny taninareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hanenjika ny fahavalonareo ianareo ka ho lavon-tsabatra eo anoloanareo izy ireo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ny dimy aminareo dia hanenjika ny zato ary ny zato aminareo dia hanenjika ny iray alina. Ny fahavalonareo dia ho lavon-tsabatra eo anoloanareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hijery anareo Aho ka hahamaro ny taranakareo sy hampitombo anareo sady hanorina ny fanekeko aminareo. '
