document_id: LEV.26,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Aza manao andriamanitra tsy izy. Aza manangana sarin-javatra voasokitra na manao tsangambaton-tsampy na manorina vato soratana hiankohofana eo amin’ny taninareo, fa Izaho no TOMPO Andriamanitrareo.
  '10':
  - type: text
    content: 'Hihinana ny tranainy ianareo sady hamoaka ny tranainy hasiana ny vao. '
  '11':
  - type: text
    content: 'Ary ny '
  - type: text
    content: tabernakeliko
  - type: text
    content: ' dia hataoko eo aminareo ary tsy ho halan’ny fanahiko ianareo. '
  '12':
  - type: text
    content: 'Handeha eo anivonareo Aho ka ho Andriamanitrareo ary ianareo dia ho oloko. '
  '13':
  - type: text
    content: Izaho no TOMPO Andriamanitrareo izay nitondra anareo nivoaka avy tany amin’ny tany Ejipta mba tsy ho andevony ianareo; ary nanapaka ny zioga izay teo aminareo Aho ka nampandeha anareo mitraka.
  - type: heading
    content: Ozona
  '14':
  - type: text
    content: 'Fa raha tsy mihaino Ahy kosa ianareo ka tsy mankatò ireo didy rehetra ireo '
  '15':
  - type: text
    content: 'ary hamavoinareo ny didiko na halan’ny fanahinareo ny fitsipiko ka tsy ankatoavinareo ny didiko rehetra fa ivadihanareo ny fanekeko '
  '16':
  - type: text
    content: 'dia izao no hataoko aminareo: Hasiako fampitahorana aminareo, dia aretina mahasaozanina sy tazo mahamay izay manimba ny maso sy mandany ny aina; ary hafafinareo foana ny voan-javatrareo fa ny fahavalonareo no hihinana azy. '
  '17':
  - type: text
    content: Dia hifanandrina aminareo ny tavako ka ho resy eo anoloan’ny fahavalonareo ianareo. Izay mankahala anareo no hifehy anareo ary handositra ianareo na dia tsy misy manenjika aza.
  '18':
  - type: text
    content: 'Ary raha mbola tsy mihaino Ahy ihany ianareo amin’izany rehetra izany dia mbola hampijaly anareo impito Aho noho ny fahotanareo. '
  '19':
  - type: text
    content: 'Horavako ny reharehan’ny herinareo ka hataoko toy ny vy ny lanitrareo ary toy ny varahina ny taninareo; ary ny herinareo dia ho lany foana; '
  '2':
  - type: text
    content: Tandremo ny Sabatako ary hajao ny fitoerako masina. Izaho no TOMPO.
  - type: heading
    content: Fitahiana
  '20':
  - type: text
    content: fa tsy hanome vokatra ny taninareo ary tsy hamoa ny hazo amin’ny tany.
  '21':
  - type: text
    content: 'Ary raha mbola manohitra Ahy ihany ianareo ka tsy mety mihaino Ahy dia hasiako kapoka impito koa ianareo araka ny fahotanareo. '
  '22':
  - type: text
    content: Hampandehaniko eo aminareo ny bibidia ka handany ny zanakareo sy handringana ny biby fiompinareo ireny ary hahavitsy isa anareo; ny lalambenareo dia ho tonga tany efitra.
  '23':
  - type: text
    content: 'Ary raha tsy mandray ny anatro amin’izany ianareo fa mbola manohitra Ahy ihany '
  '24':
  - type: text
    content: 'Izaho dia Izaho kosa no hamely anareo ka hampijaly anareo impito indray noho ny fahotanareo. '
  '25':
  - type: text
    content: 'Dia hampiditra sabatra aminareo Aho ho valin’ny nivadihanareo ny fanekena; ary rehefa tafangona ao anatin’ny tanànanareo ianareo dia handefa areti-mandringana aminareo Aho ary hatolotra eo an-tanan’ny fahavalo ianareo. '
  '26':
  - type: text
    content: Raha atsahatro ny mofo ho anareo, izay tohan’ainareo, dia fanendasa-mofo iray ihany no hanendasan’ny vehivavy folo ny mofonareo ary an-tsinjarany no hizaràny azy dia hihinana ianareo nefa tsy ho voky.
  '27':
  - type: text
    content: 'Ary raha mbola tsy mihaino Ahy amin’izany ihany ianareo fa mbola manohitra Ahy hatrany '
  '28':
  - type: text
    content: 'dia hamely anareo amin’ny fahatezerana kosa Aho; ary Izaho dia Izaho no hampijaly anareo impito indray noho ny fahotanareo. '
  '29':
  - type: text
    content: 'Dia hihinana ny nofon’ny zanakareo lahy sy ny zanakareo vavy ianareo. '
  '3':
  - type: text
    content: 'Raha manaraka ny lalànako sy mitandrina ny didiko ianareo ka mankatò izany '
  '30':
  - type: text
    content: 'Dia horavako ny toerana fanaovanareo sorona ary hokapaiko ny tsangankazon-tsampinareo ho an’ny masoandro ary ny fatinareo dia hariako eo ambonin’ny fatin’ny sampinareo ary ho halan’ny fanahiko ianareo. '
  '31':
  - type: text
    content: 'Horavako ny tanànanareo ka ho lao ireo toeranareo masina ary tsy hamboloiko ny hanitra mani-pofona aterinareo. '
  '32':
  - type: text
    content: 'Hataoko lao ny tany ka ho talanjona amin’izany ny fahavalonareo izay monina eo. '
  '33':
  - type: text
    content: 'Ary ianareo dia haeliko any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ; hanatsoaka sabatra hoenti-manenjika anareo Aho ka ho lao ny taninareo ary ho rava ny tanànanareo.
  '34':
  - type: text
    content: 'Ary amin’izany ny tany dia hifaly amin’ny Sabatany mandritra ny andro rehetra izay hahafoana azy raha any amin’ny tanin’ny fahavalonareo ianareo; dia hitsahatra ny tany ka hifaly amin’ny Sabatany; '
  '35':
  - type: text
    content: 'amin’ny andro hahafoana azy rehetra no hitsaharany ho solon’izay tsy nitsaharany tamin’ny Sabatanareo fony mbola nonina teo ianareo. '
  '36':
  - type: text
    content: 'Ary ny amin’ireo sisa aminareo dia hampidirako hakiviana ao am-pony, any amin’ny tanin’ny fahavalony, ka na ny feon’ny ravin-kazo voapaoka aza dia hampandositra azy; ary handositra tahaka ny mandositra sabatra izy ka ho lavo na dia tsy misy manenjika aza. '
  '37':
  - type: text
    content: 'Ary ho lavo mifanindry toy ny mandositra sabatra izy ireo na dia tsy misy manenjika aza; koa tsy hahajanona eo anoloan’ny fahavalonareo ianareo. '
  '38':
  - type: text
    content: 'Dia ho lany ringana any amin’ny Jentilisa ianareo; ho lanin’ny tanin’ny fahavalonareo ianareo. '
  '39':
  - type: text
    content: Ary ireo sisa eo aminareo dia ho levona any amin’ny tanin’ny fahavalonareo noho ny helony sy ny heloky ny razany koa.
  - type: heading
    content: Hotsarovan’Andriamanitra ny fanekeny
  '4':
  - type: text
    content: 'dia hanome anareo ranonorana amin’ny fotoanany Aho ka hahavokatra ny tany ary hamoa ny hazo any an-tsaha. '
  '40':
  - type: text
    content: 'Dia hiaiky ny helony sy ny heloky ny razany izy ireo, dia ny fahadisoana izay vitany tamiko tamin’ny nanoherany Ahy, '
  '41':
  - type: text
    content: 'ary Izaho koa hamely azy ka hitondra azy ho any amin’ny tanin’ny fahavalony. Dia hietry amin’izany ny fony tsy voafora ka hanonitra ny helony izy ireo '
  '42':
  - type: text
    content: 'dia hotsarovako ny fanekeko tamin’i Jakoba sy ny fanekeko tamin’Isaka ary ny fanekeko tamin’i Abrahama; ary hotsarovako koa ny tany. '
  '43':
  - type: text
    content: 'Ary hilaozan’izy ireo ny tany ka hifaly amin’ny Sabatany satria mitoetra foana tsy misy olona; fa ny olona kosa dia hanonitra ny amin’ny helony satria nandà ny fitsipiko sady nankahala ny didiko. '
  '44':
  - type: text
    content: 'Ary na dia izany rehetra izany aza, raha any amin’ny tanin’ny fahavalony izy dia tsy holaviko ary tsy ho halako fandrao lany ringana izy rehetra ka ho rava ny fanekeko taminy; fa Izaho no TOMPO Andriamaniny. '
  '45':
  - type: text
    content: 'Fa ny hitahiako azy no hahatsiarovako ny fanekena tamin’ny razany izay nentiko nivoaka avy tany amin’ny tany Ejipta teo imason’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' mba ho Andriamaniny Aho. Izaho no TOMPO.'
  '46':
  - type: text
    content: Ireo no didy sy fitsipika ary lalàna izay nataon’NY TOMPO ho aminy sy amin’ny Zanak’Israely teo an-tendrombohitra Sinay ka nampilazainy an’i Mosesy.
  '5':
  - type: text
    content: 'Ho tratry ny taom-piotazam-boaloboka ny taom-pivelezanareo ary ho tratry ny taom-pamafazana ny taom-piotazam-boaloboka; dia hihinana ianareo ka ho voky ary handry fehizay eo amin’ny taninareo. '
  '6':
  - type: text
    content: 'Homeko fiadanana eo amin’ny tany ianareo ka handry fehizay, ary tsy hisy hanaitaitra; fa hofongorako ny biby masiaka amin’ny tany ary tsy hotetezin-tsabatra ny taninareo. '
  '7':
  - type: text
    content: 'Dia hanenjika ny fahavalonareo ianareo ka ho lavon-tsabatra eo anoloanareo izy ireo. '
  '8':
  - type: text
    content: 'Ny dimy aminareo dia hanenjika ny zato ary ny zato aminareo dia hanenjika ny iray alina. Ny fahavalonareo dia ho lavon-tsabatra eo anoloanareo. '
  '9':
  - type: text
    content: 'Ary hijery anareo Aho ka hahamaro ny taranakareo sy hampitombo anareo sady hanorina ny fanekeko aminareo. '
