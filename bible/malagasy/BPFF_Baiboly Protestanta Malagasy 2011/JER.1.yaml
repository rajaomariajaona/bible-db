document_id: JER.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tenin’i Jeremia, zanak’i Hilkia, isan’ny mpisorona tao Anatota, tao amin’ny tanin’ny Benjamina.
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ary indro Aho manendry anao izao andro anio izao hanam-pahefana amin’ny firenena sy fanjakana maro mba hanongotra sy hanjera, handrava sy handrodana, ary hanorina sy hamboly.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny rantsan-kazo mahatsiaro sy ny vilany mangotraka
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamiko indray ny tenin’NY TOMPO hoe: Ry Jeremia, inona izao hitanao izao? Dia novaliko hoe: Rantsan-kazo mahatsiaro'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rantsan-kazo mahatsiaro: '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny amanda no ataon’ny Hebreo hoe hazo mahatsiaro, satria mamony alohan’ny hazo sasany.
      marker-yv: yv-n
    - type: text
      text: ' no hitako. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy NY TOMPO tamiko: Marina ny ahitanao azy; fa mahatsiaro Aho mba hahatanteraka ny teniko. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko fanindroany ny tenin’NY TOMPO hoe: Inona izao hitanao izao? Dia novaliko hoe: Vilany mangotraka no hitako ary mitongilana avy any avaratra ny vavany.'
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia hoy NY TOMPO tamiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiroatra avy any avaratra ny loza hanjo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mponina rehetra amin’ny tany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa indro, hantsoiko ny firenena rehetra amin’ny fanjakana any avaratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tonga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka samy hametraka ny sezafiandrianany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anoloan’ny vavahadin’i Jerosalema avokoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamelezany ny mandany rehetra manodidina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tanàna rehetra any Joda.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hifandahatra aminy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny haratsiany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny nahafoizany Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny nandoroany ditin-kazo manitra ho an’ny andriamanitra hafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny niankohofany teo anatrehan’ny asan’ny tanany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ianao kosa dia misikìna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miomàna ka lazao aminy izao rehetra andidiako anao izao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra azy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hataoko raiki-tahotra eo anatrehany ianao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ianao dia hataoko ho toy ny tanàna mimanda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy andry vy ary manda varahina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy ho leon’ny tany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny mpanjakan’ny Joda, na ny lehibeny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny mpisorony, na ny vahoaka.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hiady aminao ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hahaleo anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria momba anao hamonjy anao Aho, hoy NY TOMPO.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany tenin’NY TOMPO izany dia nampitondraina an’i Jeremia tamin’ny andron’i Josia, zanak’i Amona, mpanjakan’ny Joda, tamin’ny taona fahatelo amby folo nanjakany, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sy tamin’ny andron’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, ka hatramin’ny faran’ny taona fahiraika amby folo nanjakan’i Zedekia, zanak’i Josia, mpanjakan’ny Joda, dia hatramin’ny namaboana an’i Jerosalema tamin’ny volana fahadimy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny niantsoan’Andriamanitra an’i Jeremia ho mpaminaniny
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatry ny fony ianao tsy mbola noforoniko tany an-kibo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no efa fantatro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatry ny fony ianao tsy mbola teraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no efa nohamasiniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy notendreko ho mpaminany ho an’ny firenena maro.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy aho: Indrisy, RY TOMPO Andriamanitra ô! Indro, tsy mahay mandaha-teny aho, fa mbola zaza.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy NY TOMPO tamiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aza miteny hoe: Mbola zaza aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa handeha amin’izay rehetra hanirahako anao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay rehetra handidiako anao no hambaranao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra azy ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa momba anao Aho ka hamonjy anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia nanatsotra ny tanany NY TOMPO ka nanendry ny vavako ary hoy NY TOMPO tamiko: Indro, efa nataoko ao am-bavanao ny teniko, '
