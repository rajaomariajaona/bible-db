document_id: JER.1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ny tenin’i Jeremia, zanak’i Hilkia, isan’ny mpisorona tao Anatota, tao amin’ny tanin’ny Benjamina.
  '10':
  - type: text
    content: ary indro Aho manendry anao izao andro anio izao hanam-pahefana amin’ny firenena sy fanjakana maro mba hanongotra sy hanjera, handrava sy handrodana, ary hanorina sy hamboly.
  - type: heading
    content: Ny rantsan-kazo mahatsiaro sy ny vilany mangotraka
  '11':
  - type: text
    content: 'Tonga tamiko indray ny tenin’NY TOMPO hoe: Ry Jeremia, inona izao hitanao izao? Dia novaliko hoe: Rantsan-kazo mahatsiaro'
  - type: note
    content: 'Rantsan-kazo mahatsiaro: ny amanda no ataon’ny Hebreo hoe hazo mahatsiaro, satria mamony alohan’ny hazo sasany.'
  - type: text
    content: ' no hitako. '
  '12':
  - type: text
    content: 'Dia hoy NY TOMPO tamiko: Marina ny ahitanao azy; fa mahatsiaro Aho mba hahatanteraka ny teniko. '
  '13':
  - type: text
    content: 'Ary tonga tamiko fanindroany ny tenin’NY TOMPO hoe: Inona izao hitanao izao? Dia novaliko hoe: Vilany mangotraka no hitako ary mitongilana avy any avaratra ny vavany.'
  '14':
  - type: text
    content: 'Dia hoy NY TOMPO tamiko:'
  - type: text
    content: Hiroatra avy any avaratra ny loza hanjo
  - type: text
    content: ny mponina rehetra amin’ny tany.
  '15':
  - type: text
    content: Fa indro, hantsoiko ny firenena rehetra amin’ny fanjakana any avaratra,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: dia ho tonga
  - type: text
    content: ka samy hametraka ny sezafiandrianany
  - type: text
    content: eo anoloan’ny vavahadin’i Jerosalema avokoa,
  - type: text
    content: hamelezany ny mandany rehetra manodidina
  - type: text
    content: sy ny tanàna rehetra any Joda.
  '16':
  - type: text
    content: Ary hifandahatra aminy Aho
  - type: text
    content: noho ny haratsiany rehetra,
  - type: text
    content: dia ny nahafoizany Ahy
  - type: text
    content: sy ny nandoroany ditin-kazo manitra ho an’ny andriamanitra hafa
  - type: text
    content: ary ny niankohofany teo anatrehan’ny asan’ny tanany.
  '17':
  - type: text
    content: Fa ianao kosa dia misikìna
  - type: text
    content: ary miomàna ka lazao aminy izao rehetra andidiako anao izao.
  - type: text
    content: Aza matahotra azy ireo,
  - type: text
    content: fandrao hataoko raiki-tahotra eo anatrehany ianao.
  '18':
  - type: text
    content: Indro, ianao dia hataoko ho toy ny tanàna mimanda
  - type: text
    content: sy andry vy ary manda varahina
  - type: text
    content: mba tsy ho leon’ny tany rehetra,
  - type: text
    content: na ny mpanjakan’ny Joda, na ny lehibeny,
  - type: text
    content: na ny mpisorony, na ny vahoaka.
  '19':
  - type: text
    content: Fa hiady aminao ireny
  - type: text
    content: nefa tsy hahaleo anao
  - type: text
    content: satria momba anao hamonjy anao Aho, hoy NY TOMPO.
  '2':
  - type: text
    content: 'Izany tenin’NY TOMPO izany dia nampitondraina an’i Jeremia tamin’ny andron’i Josia, zanak’i Amona, mpanjakan’ny Joda, tamin’ny taona fahatelo amby folo nanjakany, '
  '3':
  - type: text
    content: sy tamin’ny andron’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, ka hatramin’ny faran’ny taona fahiraika amby folo nanjakan’i Zedekia, zanak’i Josia, mpanjakan’ny Joda, dia hatramin’ny namaboana an’i Jerosalema tamin’ny volana fahadimy.
  - type: heading
    content: Ny niantsoan’Andriamanitra an’i Jeremia ho mpaminaniny
  '4':
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '5':
  - type: text
    content: Hatry ny fony ianao tsy mbola noforoniko tany an-kibo
  - type: text
    content: no efa fantatro;
  - type: text
    content: ary hatry ny fony ianao tsy mbola teraka
  - type: text
    content: no efa nohamasiniko
  - type: text
    content: sy notendreko ho mpaminany ho an’ny firenena maro.
  '6':
  - type: text
    content: 'Dia hoy aho: Indrisy, RY TOMPO Andriamanitra ô! Indro, tsy mahay mandaha-teny aho, fa mbola zaza.'
  '7':
  - type: text
    content: 'Fa hoy NY TOMPO tamiko:'
  - type: text
    content: 'Aza miteny hoe: Mbola zaza aho;'
  - type: text
    content: fa handeha amin’izay rehetra hanirahako anao ianao,
  - type: text
    content: ary izay rehetra handidiako anao no hambaranao.
  '8':
  - type: text
    content: Aza matahotra azy ianao;
  - type: text
    content: fa momba anao Aho ka hamonjy anao,
  - type: text
    content: hoy NY TOMPO.
  '9':
  - type: text
    content: 'Dia nanatsotra ny tanany NY TOMPO ka nanendry ny vavako ary hoy NY TOMPO tamiko: Indro, efa nataoko ao am-bavanao ny teniko, '
