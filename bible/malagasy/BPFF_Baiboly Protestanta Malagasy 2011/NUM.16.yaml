document_id: NUM.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nikomian’i Kora sy i Datana ary i Abirama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nitsangana nanohitra an’i Mosesy i Kora, zanak’i Jizara, zanak’i Kehata, zanak’i Levy sy i Datana, ary i Abirama, zanak’i Eliaba, sy i Ona, zanak’i Peleta, izay samy taranak’i Robena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'niaraka tamin’ny dimampolo sy roanjato lahy tamin’ny Zanak’Israely, izay samy lohan’ny fiangonana avokoa, dia olona izay voaantso teo amin’ny fiangonana sady nanan-daza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nitambatra hikomy tamin’i Mosesy sy i Arona izy ireo ka niteny taminy hoe: Ampy izay! Masina ny fiangonana manontolo, sady NY TOMPO no eo aminy. Koa nahoana ianareo no dia manandra-tena ho ambonin’ny fiangonan’NY TOMPO?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha nandre izany i Mosesy dia niankohoka tamin’ny tany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka niteny tamin’i Kora sy ireo namany rehetra hoe: Rahampitso dia hasehon’NY TOMPO izay Azy sy izay masina ka havelany hanakaiky Azy; koa izay fidiny no havelany hanakaiky Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no ataovy, ry Kora sy ianareo antokony rehetra: Mitondrà fitondrana afo, rahampitso, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia asio afo ao anatiny ka asio ditin-kazo manitra eo aminy, eo anatrehan’NY TOMPO; koa ny lehilahy izay fidin’NY TOMPO, dia izy no ho masina. Fa ampy izay, ry taranak’i Levy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy koa i Mosesy tamin’i Kora: Henoy, ry taranak’i Levy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moa ataonareo ho zavatra kely va ny nanavahan’Andriamanitr’Israely anareo tamin’ny fiangonan’ny Israely ka namelany anareo hanakaiky Azy mba hanaovanareo ny fanompoana momba ny tabernakelin’NY TOMPO sy hijoroanareo eo anatrehan’ny fiangonana hanompo azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Navelany hanakaiky Azy ianao sy ireo rahalahinao taranak’i Levy rehetra miaraka aminao, dia mbola mitady ho mpisorona mihitsy koa va ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izany no niraisanao hevitra tamin’ny namanao rehetra mba hikomy amin’NY TOMPO! Fa i Arona moa no inona no imonomononanareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary i Mosesy dia nampiantso an’i Datana sy i Abirama, zanak’i Eliaba. Hoy anefa izy roa lahy: Tsy hiakatra izahay! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moa zavatra kely va ny nitondranao anay niakatra niala tany amin’ny tany tondra-dronono sy tantely ka hahafaty anay atỳ an-tany efitra atỳ no dia milaza anao ho lehibenay koa ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ianao dia tsy nitondra anay akory ho any amin’izay tany tondra-dronono sy tantely na nanome anay saha sy tanim-boaloboka ho fanananay, koa hopotsirinao ary va ny mason’ireto lehilahy ireto? Tsy hiakatra izahay! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia tezitra indrindra i Mosesy ka niteny tamin’NY TOMPO hoe: Aza mijery ny fanatiny akory Ianao. Tsy naka taminy aho na dia boriky iray akory aza ary tsy nanisy ratsy na dia tamin’ny iray aminy akory aza aho.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famaizana nahazo an’i Kora sy i Datana ary i Abirama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy i Mosesy tamin’i Kora: Aoka ianao sy ny antokonao rehetra ho tonga eo anatrehan’NY TOMPO rahampitso, dia ianao sy ireo namanao ary i Arona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary samia maka ny fitondrany afo avy ianareo rehetra ka asio ditin-kazo manitra ao anatiny ary samia mitondra ny fitondrany afo avy ianareo rehetra ho eo anatrehan’NY TOMPO, fitondrana afo dimampolo sy roanjato; ianao sy i Arona dia samy hitondra ny fitondrany afo avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary samy nitondra ny fitondrany afo avy izy rehetra ka nanisy afo tao anatiny, dia nanisy ditin-kazo manitra teo amboniny; ary nijanona teo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' izy mbamin’i Mosesy sy i Arona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary nanangona ny antokony rehetra ho eo anoloan’ny varavaran’ny tranolay fihaonana i Kora mba hanohitra azy roa lahy. Tamin’izay dia niseho tamin’ny fiangonana manontolo ny voninahitry NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mihataha amin’ity fiangonana ity ianareo handringanako azy amin’ny indray mipy maso monja. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niankohoka tamin’ny tany izy roa lahy ka niteny hoe: Andriamanitra ô, Andriamanitry ny fanahin’ny nofo rehetra, olona iray no nanota dia ho tezitra amin’ny ny fiangonana manontolo va Ianao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Mosesy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mitenena amin’ny fiangonana hoe: Mihataha tsy hanodidina ny tranolain’i Kora sy i Datana ary i Abirama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nitsangana i Mosesy ka nankeo amin’i Datana sy i Abirama; ary nanaraka azy ireo ny loholon’ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia niteny tamin’ny fiangonana izy hoe: Mialà amin’ny tranolain’ireo olon-dratsy ireo ary aza mikasika izay rehetra azy akory, fandrao haringana noho ny fahotany rehetra koa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia nihataka ny olona mba tsy ho eo akaikin’ny tranolain’i Kora sy i Datana ary i Abirama. Ary nivoaka i Datana sy i Abirama ka nijanona teo anoloan’ny varavaran’ny tranolainy, niaraka tamin’ny vadiny sy ireo zanany lahy ary ireo zanany madinika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy i Mosesy: Izao no hahafantaranareo fa NY TOMPO no naniraka ahy hanao ireny asa rehetra ireny, fa tsy avy tamin’ny saiko izany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha maty toy ny fahafatesan’ny olona rehetra ireo olona ireo na mahazo famaliana sahala amin’ny olona rehetra dia tsy NY TOMPO no naniraka ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa raha hanao zavatra vaovao kosa NY TOMPO ka hisokatra ny tany ary hitelina azy ireo mbamin’izay azy rehetra ary ho latsaka velona any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' izy dia ho fantatrareo fa efa nanamavo NY TOMPO ireo lehilahy ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Rehefa tapitra voalazany izay teny rehetra izay dia nivava ny tany izay teo ambanin’iretsy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'eny, nisokatra ny tany ka nitelina azy ireo sy ny ankohonany mbamin’ny olona rehetra izay an’i Kora ary ny fananany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nidina velona ho any amin’ny fitoeran’ny maty izy ireo mbamin’izay azy rehetra; nikatona taminy ny tany ka fongotra tsy ho eo amin’ny fiangonana intsony izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny Israely rehetra izay nanodidina azy dia nandositra noho ny fidradradradrany; fa hoy izy ireo: Andrao hitelina antsika koa ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary nisy afo nivoaka avy tamin’NY TOMPO ka nandevona ireo lehilahy dimampolo sy roanjato izay nanatitra ditin-kazo manitra.
