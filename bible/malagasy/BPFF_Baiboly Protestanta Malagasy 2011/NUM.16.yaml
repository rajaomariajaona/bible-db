document_id: NUM.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nikomian’i Kora sy i Datana ary i Abirama
  - type: text
    content: 'Ary nitsangana nanohitra an’i Mosesy i Kora, zanak’i Jizara, zanak’i Kehata, zanak’i Levy sy i Datana, ary i Abirama, zanak’i Eliaba, sy i Ona, zanak’i Peleta, izay samy taranak’i Robena, '
  '10':
  - type: text
    content: 'Navelany hanakaiky Azy ianao sy ireo rahalahinao taranak’i Levy rehetra miaraka aminao, dia mbola mitady ho mpisorona mihitsy koa va ianareo? '
  '11':
  - type: text
    content: Izany no niraisanao hevitra tamin’ny namanao rehetra mba hikomy amin’NY TOMPO! Fa i Arona moa no inona no imonomononanareo?
  '12':
  - type: text
    content: 'Ary i Mosesy dia nampiantso an’i Datana sy i Abirama, zanak’i Eliaba. Hoy anefa izy roa lahy: Tsy hiakatra izahay! '
  '13':
  - type: text
    content: 'Moa zavatra kely va ny nitondranao anay niakatra niala tany amin’ny tany tondra-dronono sy tantely ka hahafaty anay atỳ an-tany efitra atỳ no dia milaza anao ho lehibenay koa ianao? '
  '14':
  - type: text
    content: 'Ary ianao dia tsy nitondra anay akory ho any amin’izay tany tondra-dronono sy tantely na nanome anay saha sy tanim-boaloboka ho fanananay, koa hopotsirinao ary va ny mason’ireto lehilahy ireto? Tsy hiakatra izahay! '
  '15':
  - type: text
    content: 'Dia tezitra indrindra i Mosesy ka niteny tamin’NY TOMPO hoe: Aza mijery ny fanatiny akory Ianao. Tsy naka taminy aho na dia boriky iray akory aza ary tsy nanisy ratsy na dia tamin’ny iray aminy akory aza aho.'
  - type: heading
    content: Ny famaizana nahazo an’i Kora sy i Datana ary i Abirama
  '16':
  - type: text
    content: 'Dia hoy i Mosesy tamin’i Kora: Aoka ianao sy ny antokonao rehetra ho tonga eo anatrehan’NY TOMPO rahampitso, dia ianao sy ireo namanao ary i Arona. '
  '17':
  - type: text
    content: 'Ary samia maka ny fitondrany afo avy ianareo rehetra ka asio ditin-kazo manitra ao anatiny ary samia mitondra ny fitondrany afo avy ianareo rehetra ho eo anatrehan’NY TOMPO, fitondrana afo dimampolo sy roanjato; ianao sy i Arona dia samy hitondra ny fitondrany afo avy. '
  '18':
  - type: text
    content: 'Ary samy nitondra ny fitondrany afo avy izy rehetra ka nanisy afo tao anatiny, dia nanisy ditin-kazo manitra teo amboniny; ary nijanona teo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izy mbamin’i Mosesy sy i Arona. '
  '19':
  - type: text
    content: Ary nanangona ny antokony rehetra ho eo anoloan’ny varavaran’ny tranolay fihaonana i Kora mba hanohitra azy roa lahy. Tamin’izay dia niseho tamin’ny fiangonana manontolo ny voninahitry NY TOMPO.
  '2':
  - type: text
    content: 'niaraka tamin’ny dimampolo sy roanjato lahy tamin’ny Zanak’Israely, izay samy lohan’ny fiangonana avokoa, dia olona izay voaantso teo amin’ny fiangonana sady nanan-daza. '
  '20':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  '21':
  - type: text
    content: 'Mihataha amin’ity fiangonana ity ianareo handringanako azy amin’ny indray mipy maso monja. '
  '22':
  - type: text
    content: 'Dia niankohoka tamin’ny tany izy roa lahy ka niteny hoe: Andriamanitra ô, Andriamanitry ny fanahin’ny nofo rehetra, olona iray no nanota dia ho tezitra amin’ny ny fiangonana manontolo va Ianao?'
  '23':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: '
  '24':
  - type: text
    content: 'Mitenena amin’ny fiangonana hoe: Mihataha tsy hanodidina ny tranolain’i Kora sy i Datana ary i Abirama. '
  '25':
  - type: text
    content: 'Dia nitsangana i Mosesy ka nankeo amin’i Datana sy i Abirama; ary nanaraka azy ireo ny loholon’ny Israely. '
  '26':
  - type: text
    content: 'Dia niteny tamin’ny fiangonana izy hoe: Mialà amin’ny tranolain’ireo olon-dratsy ireo ary aza mikasika izay rehetra azy akory, fandrao haringana noho ny fahotany rehetra koa ianareo. '
  '27':
  - type: text
    content: Dia nihataka ny olona mba tsy ho eo akaikin’ny tranolain’i Kora sy i Datana ary i Abirama. Ary nivoaka i Datana sy i Abirama ka nijanona teo anoloan’ny varavaran’ny tranolainy, niaraka tamin’ny vadiny sy ireo zanany lahy ary ireo zanany madinika.
  '28':
  - type: text
    content: 'Dia hoy i Mosesy: Izao no hahafantaranareo fa NY TOMPO no naniraka ahy hanao ireny asa rehetra ireny, fa tsy avy tamin’ny saiko izany: '
  '29':
  - type: text
    content: 'Raha maty toy ny fahafatesan’ny olona rehetra ireo olona ireo na mahazo famaliana sahala amin’ny olona rehetra dia tsy NY TOMPO no naniraka ahy. '
  '3':
  - type: text
    content: 'Nitambatra hikomy tamin’i Mosesy sy i Arona izy ireo ka niteny taminy hoe: Ampy izay! Masina ny fiangonana manontolo, sady NY TOMPO no eo aminy. Koa nahoana ianareo no dia manandra-tena ho ambonin’ny fiangonan’NY TOMPO?'
  '30':
  - type: text
    content: 'Fa raha hanao zavatra vaovao kosa NY TOMPO ka hisokatra ny tany ary hitelina azy ireo mbamin’izay azy rehetra ary ho latsaka velona any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' izy dia ho fantatrareo fa efa nanamavo NY TOMPO ireo lehilahy ireo.'
  '31':
  - type: text
    content: 'Rehefa tapitra voalazany izay teny rehetra izay dia nivava ny tany izay teo ambanin’iretsy; '
  '32':
  - type: text
    content: 'eny, nisokatra ny tany ka nitelina azy ireo sy ny ankohonany mbamin’ny olona rehetra izay an’i Kora ary ny fananany rehetra. '
  '33':
  - type: text
    content: 'Dia nidina velona ho any amin’ny fitoeran’ny maty izy ireo mbamin’izay azy rehetra; nikatona taminy ny tany ka fongotra tsy ho eo amin’ny fiangonana intsony izy ireo. '
  '34':
  - type: text
    content: 'Ary ny Israely rehetra izay nanodidina azy dia nandositra noho ny fidradradradrany; fa hoy izy ireo: Andrao hitelina antsika koa ny tany. '
  '35':
  - type: text
    content: Ary nisy afo nivoaka avy tamin’NY TOMPO ka nandevona ireo lehilahy dimampolo sy roanjato izay nanatitra ditin-kazo manitra.
  '4':
  - type: text
    content: 'Raha nandre izany i Mosesy dia niankohoka tamin’ny tany '
  '5':
  - type: text
    content: 'ka niteny tamin’i Kora sy ireo namany rehetra hoe: Rahampitso dia hasehon’NY TOMPO izay Azy sy izay masina ka havelany hanakaiky Azy; koa izay fidiny no havelany hanakaiky Azy. '
  '6':
  - type: text
    content: 'Izao no ataovy, ry Kora sy ianareo antokony rehetra: Mitondrà fitondrana afo, rahampitso, '
  '7':
  - type: text
    content: dia asio afo ao anatiny ka asio ditin-kazo manitra eo aminy, eo anatrehan’NY TOMPO; koa ny lehilahy izay fidin’NY TOMPO, dia izy no ho masina. Fa ampy izay, ry taranak’i Levy!
  '8':
  - type: text
    content: 'Dia hoy koa i Mosesy tamin’i Kora: Henoy, ry taranak’i Levy: '
  '9':
  - type: text
    content: 'Moa ataonareo ho zavatra kely va ny nanavahan’Andriamanitr’Israely anareo tamin’ny fiangonan’ny Israely ka namelany anareo hanakaiky Azy mba hanaovanareo ny fanompoana momba ny tabernakelin’NY TOMPO sy hijoroanareo eo anatrehan’ny fiangonana hanompo azy? '
