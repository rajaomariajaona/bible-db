document_id: PSA.140,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ataon’ny olona mandositra
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, afaho amin’ny olon-dratsy aho
  - type: text
    content: ary arovy amin’ny mpampihorohoro
  '10':
  - type: text
    content: Aoka hisy vainafo halatsaka aminy;
  - type: text
    content: aoka hariana any anaty afo izy
  - type: text
    content: na any an-davaka lalina ka tsy hiarina intsony.
  '11':
  - type: text
    content: Tsy hampitoerina amin’ny tany ny olona mahay vava;
  - type: text
    content: henjehin-doza ny mpampihorohoro ka ho lavo.
  '12':
  - type: text
    content: Fantatro fa NY TOMPO no handahatra ny tenin’ny ory
  - type: text
    content: sady hanome rariny ho an’ny mahantra.
  '13':
  - type: text
    content: Eny tokoa, hisaotra ny anaranao ny marina;
  - type: text
    content: hitoetra eo anatrehanao ny mahitsy.
  '2':
  - type: text
    content: izay mikotrika hevi-dratsy ao am-pony
  - type: text
    content: ka manangana ady isanandro.
  '3':
  - type: text
    content: Mandranitra ny lelany tahaka ny bibilava izy,
  - type: text
    content: 'ny poizin’ny menarana no ao ambanin’ny molony. '
  - type: text
    content: Fiatoana.
  '4':
  - type: text
    content: TOMPO ô, vonjeo amin’ny tanan’ny ratsy fanahy aho
  - type: text
    content: ary arovy amin’ny mpampihorohoro
  - type: text
    content: izay mihevitra handronjina ahy ho potraka.
  '5':
  - type: text
    content: Ny mpiavonavona dia manafina fandrika sy kofehy hamandrihany ahy;
  - type: text
    content: manao vela-pandrika harato eo amoron-dalana izy;
  - type: text
    content: 'nametraka tadivavarana hahazoany ahy izy. '
  - type: text
    content: Fiatoana.
  '6':
  - type: text
    content: 'Hoy aho tamin’NY TOMPO: Andriamanitro Ianao;'
  - type: text
    content: henoy ny feon’ny fifonako, TOMPO ô!
  '7':
  - type: text
    content: TOMPO Andriamanitra ô, ry Herin’ny famonjena ahy,
  - type: text
    content: manarona ny lohako Ianao amin’ny andro fiadiana.
  '8':
  - type: text
    content: TOMPO ô, aza omena ny ratsy fanahy izay iriny
  - type: text
    content: 'ary aza avela ho tanteraka ny hevi-dratsiny, fandrao hisandratra izy. '
  - type: text
    content: Fiatoana.
  '9':
  - type: text
    content: Ny lohan’izay manemitra ahy
  - type: text
    content: dia aoka hosaronan’ny ratsy tononin’ny molony.
