document_id: PSA.140
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka ataon’ny olona mandositra
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, afaho amin’ny olon-dratsy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary arovy amin’ny mpampihorohoro
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: izay mikotrika hevi-dratsy ao am-pony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manangana ady isanandro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandranitra ny lelany tahaka ny bibilava izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny poizin’ny menarana no ao ambanin’ny molony. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: TOMPO ô, vonjeo amin’ny tanan’ny ratsy fanahy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary arovy amin’ny mpampihorohoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mihevitra handronjina ahy ho potraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny mpiavonavona dia manafina fandrika sy kofehy hamandrihany ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manao vela-pandrika harato eo amoron-dalana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nametraka tadivavarana hahazoany ahy izy. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy aho tamin’NY TOMPO: Andriamanitro Ianao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: henoy ny feon’ny fifonako, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: TOMPO Andriamanitra ô, ry Herin’ny famonjena ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manarona ny lohako Ianao amin’ny andro fiadiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: TOMPO ô, aza omena ny ratsy fanahy izay iriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary aza avela ho tanteraka ny hevi-dratsiny, fandrao hisandratra izy. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny lohan’izay manemitra ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka hosaronan’ny ratsy tononin’ny molony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aoka hisy vainafo halatsaka aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hariana any anaty afo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na any an-davaka lalina ka tsy hiarina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy hampitoerina amin’ny tany ny olona mahay vava;
- type: usfm
  marker: q1
  children:
  - type: text
    text: henjehin-doza ny mpampihorohoro ka ho lavo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fantatro fa NY TOMPO no handahatra ny tenin’ny ory
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hanome rariny ho an’ny mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny tokoa, hisaotra ny anaranao ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitoetra eo anatrehanao ny mahitsy.
