document_id: 2CH.36,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Joahaza
  - type: heading
    content: 2Mpa 23.30-34
  - type: text
    content: 'Ary nalain’ny vahoaka i Joahaza, zanak’i Josia, ka nataony mpanjaka tany Jerosalema handimby ny rainy. '
  '10':
  - type: text
    content: Nony niherina ny taona dia nandefa iraka haka azy mbamin’ny fanaka tsara tao amin’ny tranon’NY TOMPO ho any Babilona i Nebokadnezara mpanjaka ka nampanjaka an’i Zedekia rahalahin-drainy tamin’ny Joda sy Jerosalema.
  - type: heading
    content: Ny nanjakan’i Zedekia
  - type: heading
    content: 2Mpa 24.18-20
  '11':
  - type: text
    content: 'Iraika amby roapolo taona i Zedekia raha nanomboka nanjaka ary iraika amby folo taona no nanjakany tany Jerosalema. '
  '12':
  - type: text
    content: Ary nanao izay ratsy teo imason’NY TOMPO Andriamaniny izy, fa tsy nanetry tena teo anatrehan’i Jeremia mpaminany izay nilaza ny tenin’Andriamanitra.
  - type: heading
    content: Ny fahababoana tany Babilona
  - type: heading
    content: Ampit. 2Mpa 25.1-21
  '13':
  - type: text
    content: 'Nikomy tamin’i Nebokadnezara mpanjaka izay efa nampianiana azy tamin’Andriamanitra koa izy; ary nanamafy ny hatony sy nanamafy ny fony fa tsy niverina ho amin’Andriamanitry ny Israely. '
  '14':
  - type: text
    content: 'Ary ny lehibe rehetra tamin’ny mpisorona sy ny vahoaka koa dia nanao izay mahadiso indrindra araka ny fahavetavetana rehetra fanaon’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ka nandoto ny tranon’NY TOMPO tany Jerosalema izay nohamasininy.'
  '15':
  - type: text
    content: 'Kanefa NY TOMPO, Andriamanitry ny razany, nampitondra teny ny iraka izay nirahiny ho any aminy; eny, nifoha vao maraina Izy ka naniraka, fa namindra fo tamin’ny olony sy ny fonenany. '
  '16':
  - type: text
    content: Kanjo nihomehy ireny irak’Andriamanitra ireny ny olona sady nanazimba ny teniny sy namazivazy ny mpaminaniny mandra-pihatra ny fahatezeran’NY TOMPO taminy ka tsy nisy fanafany intsony.
  '17':
  - type: text
    content: 'Koa noentiny namely azy ny mpanjakan’ny Kaldeana, izay namono ny zatovony tamin’ny sabatra tao amin’ny trano fitoerana masina, ary tsy nisy namindrany fo, na zatovo na virijiny, na ny antitra sy ny fotsy volo; fa izy rehetra dia natolony ho eo an-tanany avokoa. '
  '18':
  - type: text
    content: 'Ary ny fanaka rehetra tao amin’ny tranon’Andriamanitra, na ny vaventy na ny madinika, mbamin’ny harena tao amin’ny tranon’NY TOMPO ary ny harena tao amin’ny mpanjaka sy ny mpanapaka; ireny rehetra ireny dia noentiny ho any Babilona avokoa. '
  '19':
  - type: text
    content: 'Nodorany koa ny tranon’Andriamanitra, ary noravany ny mandan’i Jerosalema; nodorany tamin’ny afo koa ny lapan’andriana rehetra tao, ary nosimbany ny fanaka tsara rehetra tao. '
  '2':
  - type: text
    content: Telo amby roapolo taona i Joahaza raha nanomboka nanjaka ary telo volana no nanjakany tany Jerosalema.
  '20':
  - type: text
    content: 'Ary ny olona sisa tsy matin-tsabatra dia noentiny ho babo tany Babilona ka tonga mpanompo azy sy ny zanany ireny mandra-panjakan’ny mpanjakan’i Persia, '
  '21':
  - type: text
    content: hahatanterahana ny tenin’NY TOMPO nampilazaina an’i Jeremia, mandra-panonitry ny tany ny Sabatany; fa tamin’ny andro rehetra izay nahafoanany dia natsahatra ny tany mba hanonitra ny Sabatany mandra-pahatapitra ny fitopolo taona.
  - type: heading
    content: Navelan’i Kirosy haorina indray ny tempoly
  - type: heading
    content: Ezr 1.1-3
  '22':
  - type: text
    content: 'Tamin’ny taona voalohany nanjakan’i Kirosy, mpanjakan’i Persia, dia notairin’NY TOMPO ny fanahin’i Kirosy, mpanjakan’i Persia, mba hanatanteraka ny tenin’NY TOMPO izay nampilazainy an’i Jeremia ka nandefa teny manerana ny fanjakany rehetra izy, sady nataony an-tsoratra koa izany hoe: '
  '23':
  - type: text
    content: 'Izao no lazain’i Kirosy, mpanjakan’i Persia: Ny fanjakana rehetra eto ambonin’ny tany dia efa nomen’NY TOMPO, Andriamanitry ny lanitra, ahy; ary Izy efa nandidy ahy hanorina trano ho Azy any Jerosalema, izay any Joda. Koa iza avy aminareo rehetra moa no olony? NY TOMPO Andriamaniny anie homba azy, koa aoka hiakatra izy.'
  '3':
  - type: text
    content: 'Nesorin’ny mpanjakan’i Ejipta tany Jerosalema izy sady nampandoaviny sazy '
  - type: text
    content: talenta
  - type: text
    content: ' volafotsy zato sy talenta volamena iray ny fanjakana. '
  '4':
  - type: text
    content: Dia nampanjaka an’i Eliakima, rahalahin’i Joahaza, tamin’ny Joda sy Jerosalema ny mpanjakan’i Ejipta, ary ny anarany dia novany hoe Joiakima; ary i Joahaza rahalahiny kosa dia nalainy ka noentiny ho any Ejipta.
  - type: heading
    content: Ny nanjakan’i Joiakima
  - type: heading
    content: 2Mpa 23.36-37
  '5':
  - type: text
    content: 'Dimy amby roapolo taona i Joiakima raha nanomboka nanjaka ary iraika amby folo taona no nanjakany tany Jerosalema. Nanao izay ratsy teo imason’NY TOMPO Andriamaniny izy. '
  '6':
  - type: text
    content: 'Ary i Nebokadnezara, mpanjakan’i Babilona, dia niakatra namely azy ka namatotra azy tamin’ny gadra varahina mba hitondra azy ho any Babilona. '
  '7':
  - type: text
    content: 'Ny fanaka sasany tao amin’ny tranon’NY TOMPO koa dia noentin’i Nebokadnezara ho any Babilona ka nataony tao amin’ny tempoliny tany Babilona. '
  '8':
  - type: text
    content: Ny tantaran’i Joiakima sisa sy ny fahavetavetana nataony mbamin’izay momba azy rehetra, indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’Israely sy i Joda; ary i Joiakina zanany no nanjaka nandimby azy.
  - type: heading
    content: Ny nanjakan’i Joiakina
  - type: heading
    content: 2Mpa 24.8-17
  '9':
  - type: text
    content: Valo amby folo taona i Joiakina raha nanomboka nanjaka ary telo volana sy hafoloana no nanjakany tany Jerosalema; ary nanao izay ratsy teo imason’NY TOMPO izy.
