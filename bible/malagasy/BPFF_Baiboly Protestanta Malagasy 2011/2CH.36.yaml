document_id: 2CH.36,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakan’i Joahaza
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 23.30-34
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nalain’ny vahoaka i Joahaza, zanak’i Josia, ka nataony mpanjaka tany Jerosalema handimby ny rainy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony niherina ny taona dia nandefa iraka haka azy mbamin’ny fanaka tsara tao amin’ny tranon’NY TOMPO ho any Babilona i Nebokadnezara mpanjaka ka nampanjaka an’i Zedekia rahalahin-drainy tamin’ny Joda sy Jerosalema.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakan’i Zedekia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 24.18-20
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iraika amby roapolo taona i Zedekia raha nanomboka nanjaka ary iraika amby folo taona no nanjakany tany Jerosalema. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanao izay ratsy teo imason’NY TOMPO Andriamaniny izy, fa tsy nanetry tena teo anatrehan’i Jeremia mpaminany izay nilaza ny tenin’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahababoana tany Babilona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ampit. 2Mpa 25.1-21
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nikomy tamin’i Nebokadnezara mpanjaka izay efa nampianiana azy tamin’Andriamanitra koa izy; ary nanamafy ny hatony sy nanamafy ny fony fa tsy niverina ho amin’Andriamanitry ny Israely. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lehibe rehetra tamin’ny mpisorona sy ny vahoaka koa dia nanao izay mahadiso indrindra araka ny fahavetavetana rehetra fanaon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' ka nandoto ny tranon’NY TOMPO tany Jerosalema izay nohamasininy.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa NY TOMPO, Andriamanitry ny razany, nampitondra teny ny iraka izay nirahiny ho any aminy; eny, nifoha vao maraina Izy ka naniraka, fa namindra fo tamin’ny olony sy ny fonenany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanjo nihomehy ireny irak’Andriamanitra ireny ny olona sady nanazimba ny teniny sy namazivazy ny mpaminaniny mandra-pihatra ny fahatezeran’NY TOMPO taminy ka tsy nisy fanafany intsony.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa noentiny namely azy ny mpanjakan’ny Kaldeana, izay namono ny zatovony tamin’ny sabatra tao amin’ny trano fitoerana masina, ary tsy nisy namindrany fo, na zatovo na virijiny, na ny antitra sy ny fotsy volo; fa izy rehetra dia natolony ho eo an-tanany avokoa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fanaka rehetra tao amin’ny tranon’Andriamanitra, na ny vaventy na ny madinika, mbamin’ny harena tao amin’ny tranon’NY TOMPO ary ny harena tao amin’ny mpanjaka sy ny mpanapaka; ireny rehetra ireny dia noentiny ho any Babilona avokoa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nodorany koa ny tranon’Andriamanitra, ary noravany ny mandan’i Jerosalema; nodorany tamin’ny afo koa ny lapan’andriana rehetra tao, ary nosimbany ny fanaka tsara rehetra tao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telo amby roapolo taona i Joahaza raha nanomboka nanjaka ary telo volana no nanjakany tany Jerosalema.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona sisa tsy matin-tsabatra dia noentiny ho babo tany Babilona ka tonga mpanompo azy sy ny zanany ireny mandra-panjakan’ny mpanjakan’i Persia, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: hahatanterahana ny tenin’NY TOMPO nampilazaina an’i Jeremia, mandra-panonitry ny tany ny Sabatany; fa tamin’ny andro rehetra izay nahafoanany dia natsahatra ny tany mba hanonitra ny Sabatany mandra-pahatapitra ny fitopolo taona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Navelan’i Kirosy haorina indray ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ezr 1.1-3
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona voalohany nanjakan’i Kirosy, mpanjakan’i Persia, dia notairin’NY TOMPO ny fanahin’i Kirosy, mpanjakan’i Persia, mba hanatanteraka ny tenin’NY TOMPO izay nampilazainy an’i Jeremia ka nandefa teny manerana ny fanjakany rehetra izy, sady nataony an-tsoratra koa izany hoe: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’i Kirosy, mpanjakan’i Persia: Ny fanjakana rehetra eto ambonin’ny tany dia efa nomen’NY TOMPO, Andriamanitry ny lanitra, ahy; ary Izy efa nandidy ahy hanorina trano ho Azy any Jerosalema, izay any Joda. Koa iza avy aminareo rehetra moa no olony? NY TOMPO Andriamaniny anie homba azy, koa aoka hiakatra izy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nesorin’ny mpanjakan’i Ejipta tany Jerosalema izy sady nampandoaviny sazy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ' volafotsy zato sy talenta volamena iray ny fanjakana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nampanjaka an’i Eliakima, rahalahin’i Joahaza, tamin’ny Joda sy Jerosalema ny mpanjakan’i Ejipta, ary ny anarany dia novany hoe Joiakima; ary i Joahaza rahalahiny kosa dia nalainy ka noentiny ho any Ejipta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakan’i Joiakima
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 23.36-37
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dimy amby roapolo taona i Joiakima raha nanomboka nanjaka ary iraika amby folo taona no nanjakany tany Jerosalema. Nanao izay ratsy teo imason’NY TOMPO Andriamaniny izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Nebokadnezara, mpanjakan’i Babilona, dia niakatra namely azy ka namatotra azy tamin’ny gadra varahina mba hitondra azy ho any Babilona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanaka sasany tao amin’ny tranon’NY TOMPO koa dia noentin’i Nebokadnezara ho any Babilona ka nataony tao amin’ny tempoliny tany Babilona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tantaran’i Joiakima sisa sy ny fahavetavetana nataony mbamin’izay momba azy rehetra, indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’Israely sy i Joda; ary i Joiakina zanany no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakan’i Joiakina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 24.8-17
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Valo amby folo taona i Joiakina raha nanomboka nanjaka ary telo volana sy hafoloana no nanjakany tany Jerosalema; ary nanao izay ratsy teo imason’NY TOMPO izy.
