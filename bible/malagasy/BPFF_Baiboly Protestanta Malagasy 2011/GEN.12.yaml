document_id: GEN.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Miantso an’i Abrama handao ny tanindrazany Andriamanitra
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Abrama: Mandehana miala amin’ny taninao sy ny havanao ary ny tranon’ny rainao hankany amin’ny tany izay hasehoko anao. '
  '10':
  - type: text
    content: 'Ary nisy mosary teo amin’ny tany; dia nidina nankany Ejipta i Abrama mba hivahiny any fa mafy ny mosary teo amin’ny tany. '
  '11':
  - type: text
    content: 'Rehefa akaiky ho tonga tany Ejipta izy dia hoy izy tamin’i Saray vadiny: Indro, fantatro fa vehivavy tsara tarehy ianao, '
  '12':
  - type: text
    content: 'koa raha hitan’ny Ejiptiana dia hataony hoe vadiny io! Dia hovonoiny aho fa ianao kosa dia hovelominy. '
  '13':
  - type: text
    content: 'Miangavy anao aho, lazao fa anabaviko ianao mba hanisiany soa ahy noho ny aminao ka ho velona aho noho ny aminao. '
  '14':
  - type: text
    content: 'Rehefa tonga tany Ejipta i Abrama dia hitan’ny Ejiptiana fa tsara tarehy tokoa Ravehivavy. '
  '15':
  - type: text
    content: 'Nahita azy koa ireo tandapan’i Farao ka nidera azy tamin’i Farao; dia noentina tao an-tranon’i Farao izy. '
  '16':
  - type: text
    content: 'Ary nasian’i Farao soa i Abrama noho ny amin’i Saray; nahazo ondry, omby, borikilahy, mpanompolahy, mpanompovavy, borikivavy ary rameva izy. '
  '17':
  - type: text
    content: 'Nasian’NY TOMPO areti-mandoza anefa i Farao sy ny ankohonany noho ny amin’i Saray, vadin’i Abrama. '
  '18':
  - type: text
    content: 'Dia nampaka an’i Abrama i Farao ka niteny hoe: Inona izao nataonao tamiko izao? Nahoana no tsy nambaranao tamiko fa vadinao izy? '
  '19':
  - type: text
    content: 'Nahoana ianao no nilaza hoe: Anabaviko izy? Nefa noho izay no nakako azy ho vady. Koa ankehitriny, indro ny vadinao, ento any izy dia mandehana! '
  '2':
  - type: text
    content: 'Hahatonga anao ho firenena lehibe Aho sady hitahy anao sy hahalehibe ny anaranao; ho fitahiana tokoa ianao. '
  '20':
  - type: text
    content: Dia nanome baiko ireo mpanompony i Farao handefa an’i Abrama sy ny vadiny mbamin’ny fananany rehetra.
  '3':
  - type: text
    content: 'Hitahy izay manisy soa anao Aho, fa hanozona izay manozona anao. Aminao no hitahiana ny firenena rehetra ambonin’ny tany. '
  '4':
  - type: text
    content: 'Dia nandeha i Abrama, araka izay nolazain’NY TOMPO taminy, ary mba niaraka taminy koa i Lota. Efa dimy amby fitopolo taona i Abrama raha niala tao Harana. '
  '5':
  - type: text
    content: 'Ary i Abrama dia nitondra an’i Saray vadiny sy i Lota zana-drahalahiny mbamin’ny fananan’izy rehetra izay noharìny sy ny olona izay azony tao Harana. Niainga izy ireo hankany amin’ny tany Kanana, dia tonga tany amin’ny tany Kanana. '
  '6':
  - type: text
    content: 'Ary i Abrama dia nitety ny tany hatrany Sekema, hatreo amin’ny hazo '
  - type: text
    content: terebintan’i
  - type: text
    content: ' More. Ny Kananita no tao amin’ny tany Kanana tamin’izany fotoana izany. '
  '7':
  - type: text
    content: 'Ary NY TOMPO niseho tamin’i Abrama ka niteny hoe: Ny taranakao no homeko ity tany ity. Dia teo izy no nanorina alitara ho an’NY TOMPO izay niseho taminy. '
  '8':
  - type: text
    content: 'Ary nifindra niala teo hankany amin’ny tendrombohitra atsinanan’i Betela izy ka nanorina ny tranolainy teo anelanelan’i Betela teo andrefany ary i Ay teo atsinanany. Nanorina alitara ho an’NY TOMPO teo koa izy ka niantso ny anaran’NY TOMPO. '
  '9':
  - type: text
    content: Dia niainga indray i Abrama ka nandroso niandalana ho any Negeva.
  - type: heading
    content: I Abrama tany Ejipta
