document_id: GEN.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miantso an’i Abrama handao ny tanindrazany Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Abrama: Mandehana miala amin’ny taninao sy ny havanao ary ny tranon’ny rainao hankany amin’ny tany izay hasehoko anao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nisy mosary teo amin’ny tany; dia nidina nankany Ejipta i Abrama mba hivahiny any fa mafy ny mosary teo amin’ny tany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Rehefa akaiky ho tonga tany Ejipta izy dia hoy izy tamin’i Saray vadiny: Indro, fantatro fa vehivavy tsara tarehy ianao, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'koa raha hitan’ny Ejiptiana dia hataony hoe vadiny io! Dia hovonoiny aho fa ianao kosa dia hovelominy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Miangavy anao aho, lazao fa anabaviko ianao mba hanisiany soa ahy noho ny aminao ka ho velona aho noho ny aminao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Rehefa tonga tany Ejipta i Abrama dia hitan’ny Ejiptiana fa tsara tarehy tokoa Ravehivavy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nahita azy koa ireo tandapan’i Farao ka nidera azy tamin’i Farao; dia noentina tao an-tranon’i Farao izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nasian’i Farao soa i Abrama noho ny amin’i Saray; nahazo ondry, omby, borikilahy, mpanompolahy, mpanompovavy, borikivavy ary rameva izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nasian’NY TOMPO areti-mandoza anefa i Farao sy ny ankohonany noho ny amin’i Saray, vadin’i Abrama. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nampaka an’i Abrama i Farao ka niteny hoe: Inona izao nataonao tamiko izao? Nahoana no tsy nambaranao tamiko fa vadinao izy? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nahoana ianao no nilaza hoe: Anabaviko izy? Nefa noho izay no nakako azy ho vady. Koa ankehitriny, indro ny vadinao, ento any izy dia mandehana! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hahatonga anao ho firenena lehibe Aho sady hitahy anao sy hahalehibe ny anaranao; ho fitahiana tokoa ianao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia nanome baiko ireo mpanompony i Farao handefa an’i Abrama sy ny vadiny mbamin’ny fananany rehetra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hitahy izay manisy soa anao Aho, fa hanozona izay manozona anao. Aminao no hitahiana ny firenena rehetra ambonin’ny tany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nandeha i Abrama, araka izay nolazain’NY TOMPO taminy, ary mba niaraka taminy koa i Lota. Efa dimy amby fitopolo taona i Abrama raha niala tao Harana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary i Abrama dia nitondra an’i Saray vadiny sy i Lota zana-drahalahiny mbamin’ny fananan’izy rehetra izay noharìny sy ny olona izay azony tao Harana. Niainga izy ireo hankany amin’ny tany Kanana, dia tonga tany amin’ny tany Kanana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary i Abrama dia nitety ny tany hatrany Sekema, hatreo amin’ny hazo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terebintan’i
    - type: text
      text: ' More. Ny Kananita no tao amin’ny tany Kanana tamin’izany fotoana izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary NY TOMPO niseho tamin’i Abrama ka niteny hoe: Ny taranakao no homeko ity tany ity. Dia teo izy no nanorina alitara ho an’NY TOMPO izay niseho taminy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nifindra niala teo hankany amin’ny tendrombohitra atsinanan’i Betela izy ka nanorina ny tranolainy teo anelanelan’i Betela teo andrefany ary i Ay teo atsinanany. Nanorina alitara ho an’NY TOMPO teo koa izy ka niantso ny anaran’NY TOMPO. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia niainga indray i Abrama ka nandroso niandalana ho any Negeva.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Abrama tany Ejipta
    marker-yv: yv-h
