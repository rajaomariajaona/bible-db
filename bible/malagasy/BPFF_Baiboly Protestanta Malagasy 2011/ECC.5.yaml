document_id: ECC.5,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Aza haingam-bava,
  - type: text
    content: ary aoka tsy halaky hanonona teny eo anatrehan’Andriamanitra ny fonao;
  - type: text
    content: fa Andriamanitra dia any an-danitra ary ianao dia etỳ an-tany,
  - type: text
    content: koa aoka ho vitsy ny teninao.
  '10':
  - type: text
    content: Raha mitombo ny fananana dia mitombo koa ny mpihinana azy;
  - type: text
    content: ary inona no soa azon’ny tompony afa-tsy ny mijery maso azy fotsiny ihany?
  '11':
  - type: text
    content: Mamy ny torimason’ny mpiasa
  - type: text
    content: na homan-kely izy na homam-be;
  - type: text
    content: fa ny haben’ny fananan’ny mpanankarena kosa no tsy ahitany tory.
  '12':
  - type: text
    content: Misy ratsy mandrera-po hitako etỳ ambanin’ny masoandro,
  - type: text
    content: dia ny harena tehirizin’ny tompony nefa mampidi-doza amin’ny tenany;
  '13':
  - type: text
    content: sady levona izany harena izany noho ny fampiasany azy tamin’ny asa ratsy,
  - type: text
    content: dia miteraka zazalahy izy nefa tsy misy na inona na inona eny an-tanany.
  '14':
  - type: text
    content: Toy ny nivoahany mitanjaka avy tany an-kibon’ny reniny,
  - type: text
    content: dia toy izay niaviany ihany no hiverenany;
  - type: text
    content: tsy hisy na inona na inona hoentin’ny tanany ho valin’ny fisasarany.
  '15':
  - type: text
    content: Ratsy mandrera-po koa izany
  - type: text
    content: fa tsy misy hafa amin’izay niaviany no handehanany;
  - type: text
    content: ary inona no soa azony noho ny nisasarany ho an’ny rivotra?
  '16':
  - type: text
    content: Sady laniny ao amin’ny maizina ny androny rehetra
  - type: text
    content: ary feno fahasosorana sy mararirary anaty izy sady manao fo lentika.
  '17':
  - type: text
    content: 'Indro, efa hitako izay soa sy izay tsara, dia ny mihinana sy misotro ary mifaly amin’ny fisasarana rehetra izay isasaran’ny olona etỳ ambanin’ny masoandro mandritra ny andro vitsy omen’Andriamanitra azy hiainany; fa izany no anjarany. '
  '18':
  - type: text
    content: 'Ary izao koa, ho an’ny olona rehetra izay omen’Andriamanitra vola aman-karena sady omeny fahefana hihinanany azy sy hahazoany ny anjarany ary hifaliany amin’ny fisasarany, dia fanomezan’Andriamanitra izany. '
  '19':
  - type: text
    content: Fa tsy hahatsiaro loatra ny andro niainany izy satria ny fahafinaretana no amenoan’Andriamanitra ny fony.
  '2':
  - type: text
    content: Fa ny haben’ny fisasarana no mahatonga ny nofinofy,
  - type: text
    content: ary ny haben’ny teny no isehoan’ny rediredin’ny adala.
  '3':
  - type: text
    content: Raha mivoady amin’Andriamanitra ianao, aza manao ampitso lava,
  - type: text
    content: fa tsy ankasitrahany ny adala; koa efao ny voadinao.
  '4':
  - type: text
    content: Aleo tsy mivoady
  - type: text
    content: toy izay mivoady nefa tsy mahefa.
  '5':
  - type: text
    content: Aza avela hahatonga heloka amin’ny tenanao ny vavanao,
  - type: text
    content: 'ary aza miteny eo imason’ny anjelin’Andriamanitra hoe: Niteny tsy nahy aho.'
  - type: text
    content: Nahoana no ho tezitra amin’ny teninao Andriamanitra ka hanimba ny asan’ny tananao?
  '6':
  - type: text
    content: Fa amin’ny haben’ny nofinofy dia misy zava-poana,
  - type: text
    content: ary toy izany koa ny haben’ny teny.
  - type: text
    content: Koa matahora an’Andriamanitra.
  - type: heading
    content: Ny fanamparam-pahefana
  '7':
  - type: text
    content: 'Raha hitanao any amin’ny fari-piadidiana iray ny fampahoriana ny mahantra mbamin’ny famadihana ny fitsarana sy ny rariny dia aza gaga amin’izany; fa misy ambony kokoa mibanjina ny ambony ary mbola misy ambony noho ireo indray aza. '
  '8':
  - type: text
    content: Fa ny tombontsoa avy amin’ny tany dia ho an’ny rehetra ary na ny mpanjaka aza dia miankina amin’ny tany famboly.
  - type: heading
    content: Ny maha zava-poana ny harena
  '9':
  - type: text
    content: Izay tia vola dia tsy ho voky vola;
  - type: text
    content: ary izay fatra-pitia harena be dia tsy ho vokin’ny fitomboan-karena.
  - type: text
    content: Zava-poana koa izany.
