document_id: ECC.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Aza haingam-bava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka tsy halaky hanonona teny eo anatrehan’Andriamanitra ny fonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Andriamanitra dia any an-danitra ary ianao dia etỳ an-tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa aoka ho vitsy ny teninao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Raha mitombo ny fananana dia mitombo koa ny mpihinana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary inona no soa azon’ny tompony afa-tsy ny mijery maso azy fotsiny ihany?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mamy ny torimason’ny mpiasa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na homan-kely izy na homam-be;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny haben’ny fananan’ny mpanankarena kosa no tsy ahitany tory.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Misy ratsy mandrera-po hitako etỳ ambanin’ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny harena tehirizin’ny tompony nefa mampidi-doza amin’ny tenany;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: sady levona izany harena izany noho ny fampiasany azy tamin’ny asa ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miteraka zazalahy izy nefa tsy misy na inona na inona eny an-tanany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Toy ny nivoahany mitanjaka avy tany an-kibon’ny reniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izay niaviany ihany no hiverenany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hisy na inona na inona hoentin’ny tanany ho valin’ny fisasarany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ratsy mandrera-po koa izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy misy hafa amin’izay niaviany no handehanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary inona no soa azony noho ny nisasarany ho an’ny rivotra?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Sady laniny ao amin’ny maizina ny androny rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary feno fahasosorana sy mararirary anaty izy sady manao fo lentika.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Indro, efa hitako izay soa sy izay tsara, dia ny mihinana sy misotro ary mifaly amin’ny fisasarana rehetra izay isasaran’ny olona etỳ ambanin’ny masoandro mandritra ny andro vitsy omen’Andriamanitra azy hiainany; fa izany no anjarany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary izao koa, ho an’ny olona rehetra izay omen’Andriamanitra vola aman-karena sady omeny fahefana hihinanany azy sy hahazoany ny anjarany ary hifaliany amin’ny fisasarany, dia fanomezan’Andriamanitra izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa tsy hahatsiaro loatra ny andro niainany izy satria ny fahafinaretana no amenoan’Andriamanitra ny fony.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa ny haben’ny fisasarana no mahatonga ny nofinofy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny haben’ny teny no isehoan’ny rediredin’ny adala.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Raha mivoady amin’Andriamanitra ianao, aza manao ampitso lava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ankasitrahany ny adala; koa efao ny voadinao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Aleo tsy mivoady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay mivoady nefa tsy mahefa.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aza avela hahatonga heloka amin’ny tenanao ny vavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary aza miteny eo imason’ny anjelin’Andriamanitra hoe: Niteny tsy nahy aho.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no ho tezitra amin’ny teninao Andriamanitra ka hanimba ny asan’ny tananao?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa amin’ny haben’ny nofinofy dia misy zava-poana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy izany koa ny haben’ny teny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa matahora an’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanamparam-pahefana
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Raha hitanao any amin’ny fari-piadidiana iray ny fampahoriana ny mahantra mbamin’ny famadihana ny fitsarana sy ny rariny dia aza gaga amin’izany; fa misy ambony kokoa mibanjina ny ambony ary mbola misy ambony noho ireo indray aza. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa ny tombontsoa avy amin’ny tany dia ho an’ny rehetra ary na ny mpanjaka aza dia miankina amin’ny tany famboly.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny maha zava-poana ny harena
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Izay tia vola dia tsy ho voky vola;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay fatra-pitia harena be dia tsy ho vokin’ny fitomboan-karena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-poana koa izany.
