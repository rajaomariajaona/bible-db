document_id: REV.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanokafana ny tombo-kase enina voalohany
  - type: text
    content: 'Ary nijery aho, rehefa novahan’ny Zanak’ondry ny iray tamin’ny tombo-kase fito, ary reko ny iray tamin’ny zavamananaina efatra niteny tahaka ny fikotrokotroky ny kotrokorana hoe: Avia! '
  '10':
  - type: text
    content: 'Ary niantso tamin’ny feo mahery izy ireo hoe: Tompo masina sy marina ô, mandra-pahoviana no tsy hitsaranao sy tsy hamalianao ny ranay amin’izay monina eny ambonin’ny tany? '
  '11':
  - type: text
    content: Dia samy nomena akanjo fotsy lava izy rehetra ary nasaina niala sasatra kely aloha izy mandra-pahatapitra ny mpanompo namany sy ny rahalahiny izay hovonoina tahaka azy koa.
  '12':
  - type: text
    content: 'Ary hitako, fa rehefa novahany ny tombo-kase fahenina dia nisy horohoron-tany mafy; tonga mainty tahaka ny lamba volon’osy fisaonana ny masoandro, ary tonga tahaka ny ra avokoa ny volana. '
  '13':
  - type: text
    content: 'Ary ny kintana teny amin’ny lanitra dia niraraka tamin’ny tany toy ny aviavy manintsana ny voany manta raha hozongozonin’ny rivotra mahery izy. '
  '14':
  - type: text
    content: Dia nisinda tahaka ny boky nahorona ny lanitra, ary ny tendrombohitra sy ny nosy rehetra dia nafindra niala tamin’ny toerany.
  '15':
  - type: text
    content: 'Ary ny mpanjakan’ny tany, ny lehibe, ny mpifehy arivo, ny mpanankarena sy ny lehilahy mahery mbamin’ny andevo rehetra sy ny tsy andevo rehetra dia niery tany amin’ny lava-bato sy tany amin’ny vatolampy eny an-tendrombohitra. '
  '16':
  - type: text
    content: 'Ary hoy izy tamin’ny tendrombohitra sy ny vatolampy: Mianjerà aminay ka afeno izahay amin’ny tavan’Ilay mipetraka eo ambonin’ny sezafiandrianana sy amin’ny fahatezeran’ny Zanak’ondry; '
  '17':
  - type: text
    content: fa tonga ny andro lehiben’ny fahatezeran’ireo, koa iza no hahajanona?
  '2':
  - type: text
    content: Ary hitako fa indro, nisy soavaly fotsy. Izay nitaingina azy dia nitondra tsipìka; ary nomena satroboninahitra izy; dia niainga izy ka nandresy ary mba handresy.
  '3':
  - type: text
    content: 'Rehefa novahany ny tombo-kase faharoa dia reko ny zavamananaina faharoa niteny hoe: Avia! '
  '4':
  - type: text
    content: Dia nisy soavaly hafa mena kosa niseho. Izay nitaingina azy dia nasaina nanaisotra ny fihavanana amin’ny tany mba hifamonoan’ny olona; ary nomena sabatra lehibe izy.
  '5':
  - type: text
    content: 'Rehefa novahany ny tombo-kase fahatelo dia reko ny zavamananaina fahatelo niteny hoe: Avia! Ary hitako fa indro, nisy soavaly mainty. Izay nitaingina azy dia nitondra mizana teny an-tanany. '
  '6':
  - type: text
    content: 'Ary nandre toy ny feo teo afovoan’ny zavamananaina efatra aho niteny hoe: '
  - type: text
    content: Denaria
  - type: text
    content: ' iray ny varimbazaha eran’ny fatambary kely'
  - type: note
    content: 'Fatambary kely: gr. koiniksa, ny iray koiniksa dia tokony ho iray kilao eo ho eo.'
  - type: text
    content: ' ary denaria iray koa ny varimbazaha hafa intelon’ny fatambary; fa ny diloilo na ny divay dia aza simbànao!'
  '7':
  - type: text
    content: 'Rehefa novahany ny tombo-kase fahefatra dia reko ny feon’ny zavamananaina fahefatra niteny hoe: Avia! '
  '8':
  - type: text
    content: 'Ary hitako fa indro, nisy soavaly hatsatra, ary ny anaran’izay nitaingina azy atao hoe Fahafatesana, ary ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' no niaraka taminy. Nomena fahefana tamin’ny ampahefatry ny tany ireo hamono amin’ny sabatra, ny mosary, ny areti-mandringana ary ny bibidia etỳ an-tany.'
  '9':
  - type: text
    content: 'Rehefa novahany ny tombo-kase fahadimy dia hitako teo ambanin’ny alitara ny fanahin’izay voavono noho ny tenin’Andriamanitra sy ny teny vavolombelona izay nohazoniny. '
