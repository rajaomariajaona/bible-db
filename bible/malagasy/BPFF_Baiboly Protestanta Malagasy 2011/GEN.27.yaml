document_id: GEN.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitaka nataon’i Jakoba hahazoany ny tsodranon’ny rainy
  - type: text
    content: 'Rehefa antitra Isaka sady pahina ny masony ka tsy nahita intsony dia niantso an’i Esao lahimatoany izy ka niteny taminy hoe: Anaka! Ary hoy izy taminy: Inty aho! '
  '10':
  - type: text
    content: 'Hoentinao any amin’ny rainao hohaniny io mba hitsofany rano anao, dieny tsy mbola maty izy. '
  '11':
  - type: text
    content: 'Hoy anefa i Jakoba tamin’i Rebeka reniny: Indro, i Esao rahalahiko dia lehilahy voloina, nefa izaho kosa dia lehilahy malambo hoditra. '
  '12':
  - type: text
    content: 'Mety hitsapa ahy Ikaky, dia ho toy ny mpisandoka eo imasony aho ka hahatonga ozona amiko izany fa tsy tsodrano! '
  '13':
  - type: text
    content: 'Hoy reniny taminy: Aoka ho amiko, anaka, ny ozona tokony ho anao, fa araho ihany ny teniko ka mandehana, ento atỳ amiko ny zanak’osy. '
  '14':
  - type: text
    content: 'Dia nandeha izy ka naka izany ary noentiny teo amin’ny reniny; ny reniny kosa nanamboatra sakafo matsiro araka ilay tian’ny rainy. '
  '15':
  - type: text
    content: 'Ary nalain’i Rebeka ny fitafian’i Esao lahimatoany, dia ny tsara indrindra izay notahiriziny tao an-trano, ka natafiny an’i Jakoba zanany faralahy. '
  '16':
  - type: text
    content: 'Nofonosiny ny hoditry ny zanak’osy ny tanany sy ny malambolambo amin’ny vozony. '
  '17':
  - type: text
    content: Dia natolony teo an-tanan’i Jakoba zanany ny sakafo matsiro sy ny mofo izay namboariny.
  '18':
  - type: text
    content: 'Ary nankeo amin’ny rainy i Jakoba ka niteny hoe: Ry Ikaky ô! Dia hoy izy: Inty aho! Iza moa ianao, anaka? '
  '19':
  - type: text
    content: 'Hoy i Jakoba tamin’ny rainy: Izaho no Esao zanakao lahimatoa; efa nanatanteraka izay nasainao nataoko aho. Miangavy anao aho, miarena re, dia mipetraha ka hano ny hazako mba hitsofanao rano ahy. '
  '2':
  - type: text
    content: 'Dia hoy izy: Indro, efa antitra aho ka tsy fantatro izay andro hahafatesako. '
  '20':
  - type: text
    content: 'Fa hoy Isaka tamin’ny zanany: Nanao ahoana, anaka, no dia nalaky nahazo toy izany ianao? Dia hoy izy: Satria NY TOMPO Andriamanitrao no nampahazo ahy. '
  '21':
  - type: text
    content: 'Hoy ihany Isaka tamin’i Jakoba: Mba manatòna kely hoe hitsapako anao, anaka, hahafantarako na i Esao zanako tokoa ianao, na tsia. '
  '22':
  - type: text
    content: 'Dia nanatona an’Isaka rainy i Jakoba; ary nitsapa azy izy ka niteny hoe: Ny feo dia feon’i Jakoba fa ny tanana dia tanan’i Esao. '
  '23':
  - type: text
    content: 'Nefa tsy nahafantatra azy izy satria voloina tahaka ny tanan’i Esao rahalahiny ny tanany; dia notsofiny rano izy. '
  '24':
  - type: text
    content: 'Ary hoy izy: Ianao tokoa moa no Esao zanako? Dia hoy izy: Izaho no izy. '
  '25':
  - type: text
    content: 'Ary hoy kosa Isaka: Arosoy eto anoloako ary izato hazan’ny zanako hihinanako, mba hitsofako rano anao. Dia narosony teo anoloany izany ka nihinana izy; ary nitondrany divay izy dia nisotro. '
  '26':
  - type: text
    content: 'Hoy indray Isaka rainy taminy: Mba manatòna kely hoe manoroka ahy, anaka! '
  '27':
  - type: text
    content: 'Dia nanatona izy ka nanoroka azy. Ary nandre ny fofon’ny fitafiany Isaka dia nitsodrano azy hoe:'
  - type: text
    content: E! Ny fofon’ny zanako
  - type: text
    content: dia tahaka ny fofon’ny saha izay notahin’NY TOMPO.
  '28':
  - type: text
    content: Hanomezan’Andriamanitra anao anie ny andon’ny lanitra
  - type: text
    content: sy ny tsiron’ny tany
  - type: text
    content: ary vary sy ranom-boaloboka betsaka!
  '29':
  - type: text
    content: Hanompo anao anie ny firenena maro
  - type: text
    content: ary hiankohoka eo anatrehanao ny firenena samihafa!
  - type: text
    content: Ho tompo amin’ny rahalahinao anie ianao
  - type: text
    content: ary aoka hiankohoka eo anatrehanao ny zanaky ny reninao!
  - type: text
    content: Ho voaozona anie izay rehetra manozona anao
  - type: text
    content: ary hohasoavina anie izay manisy soa anao!
  '3':
  - type: text
    content: 'Koa ankehitriny, miangavy anao aho, raiso ny fiadianao, dia ny tranon-jana-tsipìkanao sy ny tsipìkanao, ary mankanesa any an-tsaha ka mitondrà haza ho ahy. '
  '30':
  - type: text
    content: 'Rehefa vita ny fitsofan-drano nataon’Isaka an’i Jakoba ka vao nidify teo anatrehan’Isaka rainy izy dia niditra kosa i Esao rahalahiny avy nihaza. '
  '31':
  - type: text
    content: 'Izy koa dia efa nanamboatra sakafo matsiro ka nitondra izany teo amin’ny rainy. Dia hoy izy tamin’ny rainy: Aoka hiarina ny raiko ka hihinana amin’ny hazan’ny zanany mba hitsofanao rano ahy! '
  '32':
  - type: text
    content: 'Fa hoy Isaka rainy taminy: Fa iza indray moa ianao? Hoy izy: Izaho no i Esao zanakao lahimatoa! '
  '33':
  - type: text
    content: 'Toran-kovitra be Isaka ka niteny hoe: Iza ary ilay naka haza ka nitondra izany teto amiko teo? Nihinana tamin’izany rehetra izany aho fony tsy mbola tonga ianao ka efa notsofiko rano izy; eny, hotahina tokoa izy! '
  '34':
  - type: text
    content: 'Raha vao ren’i Esao ny tenin’ny rainy dia niantsoantso mafy dia mafy izy sady niteny taminy hoe: Mba tsofy rano re aho, eny, izaho koa, ry Ikaky ô! '
  '35':
  - type: text
    content: 'Hoy rainy: Tonga teo ny rahalahinao nisandoka ka nahalasa ny tsodranonao. '
  '36':
  - type: text
    content: 'Dia hoy i Esao: Moa tsy Jakoba va no anarany'
  - type: note
    content: Zahao 25.26.
  - type: text
    content: '? Efa namingana ahy indroa izy izao: Ny fizokiako dia nalainy; ary indro, ankehitriny, lasany koa ny tsodranoko! Hoy ihany izy: Tsy mba nahatahiry tsodrano ho ahy va ianao? '
  '37':
  - type: text
    content: 'Namaly Isaka ka niteny tamin’i Esao hoe: Indro, efa nataoko ho tomponao izy, fa ny rahalahiny rehetra dia nataoko ho mpanompony; vary sy ranom-boaloboka no namelomako azy; koa inona indray no azoko atao aminao, anaka? '
  '38':
  - type: text
    content: 'Hoy i Esao tamin’ny rainy: Tsy manana afa-tsy tsodrano tokana va ianao, ry Ikaky? Mba tsofy rano re aho, izaho koa, ry Ikaky ô! Sady nidradradradra nitomany i Esao. '
  '39':
  - type: text
    content: 'Nefa namaly azy Isaka rainy hoe:'
  - type: text
    content: Indro, ho lavitry ny tsiron’ny tany ny fonenanao,
  - type: text
    content: ary ho lavitry ny andon’ny lanitra avy any ambony.
  '4':
  - type: text
    content: 'Anamboary sakafo matsiro araka ilay tiako iny aho, dia ento atỳ amiko hohaniko mba hitsofako rano anao, dieny tsy mbola maty aho. '
  '40':
  - type: text
    content: Ny sabatrao no hivelomanao,
  - type: text
    content: ary ny rahalahinao no hotompoinao;
  - type: text
    content: kanefa, raha tonga amin’izay andro hahafahanao,
  - type: text
    content: dia hotapahinao ny ziogany hiala amin’ny vozonao.
  - type: heading
    content: I Jakoba tany amin’i Labana anadahin-dreniny
  '41':
  - type: text
    content: 'Ary nankahala an’i Jakoba i Esao noho ny tsodrano izay nomen’ny rainy azy. Dia hoy i Esao anakampo: Efa antomotra ny andro hisaonana an’Ikaky ka hovonoiko i Jakoba rahalahiko. '
  '42':
  - type: text
    content: 'Nisy nanambara tamin’i Rebeka izany tenin’i Esao zanany lahimatoa izany, koa nandefa iraka haka an’i Jakoba zanany faralahy izy hiteny aminy hoe: Indro, mikasa hamaly faty anao i Esao rahalahinao ka hamono anao. '
  '43':
  - type: text
    content: 'Koa ankehitriny, anaka, araho ny teniko: Mandehana mandositra ho any Harana, any amin’i Labana anadahiko. '
  '44':
  - type: text
    content: 'Mitoera andro vitsivitsy any aminy mandra-pahafaka ny fahatezeran’ny rahalahinao; '
  '45':
  - type: text
    content: eny, rehefa afaka ny fahatezeran’ny rahalahinao aminao ka hadinony izay nataonao taminy, dia handefa iraka hampaka anao any aho. Fa hataoko ahoana no ho famoy anareo mirahalahy indray andro?
  '46':
  - type: text
    content: 'Ary hoy i Rebeka tamin’Isaka: Tsy te ho velona aho noho ireny zanakavavin’ny Hetita ireny. Koa raha maka vady amin’ny zanakavavin’ny Hetita, tahaka ireto zazavavy tompon-tany ireto i Jakoba, dia inona indray no anton’ny hahavelomako?'
  '5':
  - type: text
    content: Ren’i Rebeka ny tenin’i Isaka tamin’i Esao zanany lahy. Dia lasa nankany an-tsaha i Esao nitady haza hoentiny mody.
  '6':
  - type: text
    content: 'Ary niteny tamin’i Jakoba zanany i Rebeka hoe: Indro, reko ny rainao niteny tamin’i Esao rahalahinao hoe: '
  '7':
  - type: text
    content: 'Itondray haza aho ka anamboary sakafo matsiro hohaniko; dia hitsodrano anao eo anatrehan’NY TOMPO aho, dieny tsy mbola maty. '
  '8':
  - type: text
    content: 'Koa ankehitriny, anaka, araho ny teniko amin’izay asaiko ataonao: '
  '9':
  - type: text
    content: 'Mankanesa any amin’ny ondry aman’osy ka akao zanak’osy roa tsara aho hanamboarako sakafo matsiro ho an’ny rainao, araka ilay tiany. '
