document_id: GEN.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitaka nataon’i Jakoba hahazoany ny tsodranon’ny rainy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa antitra Isaka sady pahina ny masony ka tsy nahita intsony dia niantso an’i Esao lahimatoany izy ka niteny taminy hoe: Anaka! Ary hoy izy taminy: Inty aho! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy izy: Indro, efa antitra aho ka tsy fantatro izay andro hahafatesako. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa ankehitriny, miangavy anao aho, raiso ny fiadianao, dia ny tranon-jana-tsipìkanao sy ny tsipìkanao, ary mankanesa any an-tsaha ka mitondrà haza ho ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Anamboary sakafo matsiro araka ilay tiako iny aho, dia ento atỳ amiko hohaniko mba hitsofako rano anao, dieny tsy mbola maty aho. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ren’i Rebeka ny tenin’i Isaka tamin’i Esao zanany lahy. Dia lasa nankany an-tsaha i Esao nitady haza hoentiny mody.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary niteny tamin’i Jakoba zanany i Rebeka hoe: Indro, reko ny rainao niteny tamin’i Esao rahalahinao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Itondray haza aho ka anamboary sakafo matsiro hohaniko; dia hitsodrano anao eo anatrehan’NY TOMPO aho, dieny tsy mbola maty. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa ankehitriny, anaka, araho ny teniko amin’izay asaiko ataonao: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mankanesa any amin’ny ondry aman’osy ka akao zanak’osy roa tsara aho hanamboarako sakafo matsiro ho an’ny rainao, araka ilay tiany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoentinao any amin’ny rainao hohaniny io mba hitsofany rano anao, dieny tsy mbola maty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy anefa i Jakoba tamin’i Rebeka reniny: Indro, i Esao rahalahiko dia lehilahy voloina, nefa izaho kosa dia lehilahy malambo hoditra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mety hitsapa ahy Ikaky, dia ho toy ny mpisandoka eo imasony aho ka hahatonga ozona amiko izany fa tsy tsodrano! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy reniny taminy: Aoka ho amiko, anaka, ny ozona tokony ho anao, fa araho ihany ny teniko ka mandehana, ento atỳ amiko ny zanak’osy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nandeha izy ka naka izany ary noentiny teo amin’ny reniny; ny reniny kosa nanamboatra sakafo matsiro araka ilay tian’ny rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nalain’i Rebeka ny fitafian’i Esao lahimatoany, dia ny tsara indrindra izay notahiriziny tao an-trano, ka natafiny an’i Jakoba zanany faralahy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nofonosiny ny hoditry ny zanak’osy ny tanany sy ny malambolambo amin’ny vozony. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia natolony teo an-tanan’i Jakoba zanany ny sakafo matsiro sy ny mofo izay namboariny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nankeo amin’ny rainy i Jakoba ka niteny hoe: Ry Ikaky ô! Dia hoy izy: Inty aho! Iza moa ianao, anaka? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hoy i Jakoba tamin’ny rainy: Izaho no Esao zanakao lahimatoa; efa nanatanteraka izay nasainao nataoko aho. Miangavy anao aho, miarena re, dia mipetraha ka hano ny hazako mba hitsofanao rano ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy Isaka tamin’ny zanany: Nanao ahoana, anaka, no dia nalaky nahazo toy izany ianao? Dia hoy izy: Satria NY TOMPO Andriamanitrao no nampahazo ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy ihany Isaka tamin’i Jakoba: Mba manatòna kely hoe hitsapako anao, anaka, hahafantarako na i Esao zanako tokoa ianao, na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nanatona an’Isaka rainy i Jakoba; ary nitsapa azy izy ka niteny hoe: Ny feo dia feon’i Jakoba fa ny tanana dia tanan’i Esao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nefa tsy nahafantatra azy izy satria voloina tahaka ny tanan’i Esao rahalahiny ny tanany; dia notsofiny rano izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy izy: Ianao tokoa moa no Esao zanako? Dia hoy izy: Izaho no izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy kosa Isaka: Arosoy eto anoloako ary izato hazan’ny zanako hihinanako, mba hitsofako rano anao. Dia narosony teo anoloany izany ka nihinana izy; ary nitondrany divay izy dia nisotro. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hoy indray Isaka rainy taminy: Mba manatòna kely hoe manoroka ahy, anaka! '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nanatona izy ka nanoroka azy. Ary nandre ny fofon’ny fitafiany Isaka dia nitsodrano azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: E! Ny fofon’ny zanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka ny fofon’ny saha izay notahin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hanomezan’Andriamanitra anao anie ny andon’ny lanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tsiron’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vary sy ranom-boaloboka betsaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hanompo anao anie ny firenena maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiankohoka eo anatrehanao ny firenena samihafa!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tompo amin’ny rahalahinao anie ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hiankohoka eo anatrehanao ny zanaky ny reninao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho voaozona anie izay rehetra manozona anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hohasoavina anie izay manisy soa anao!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Rehefa vita ny fitsofan-drano nataon’Isaka an’i Jakoba ka vao nidify teo anatrehan’Isaka rainy izy dia niditra kosa i Esao rahalahiny avy nihaza. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Izy koa dia efa nanamboatra sakafo matsiro ka nitondra izany teo amin’ny rainy. Dia hoy izy tamin’ny rainy: Aoka hiarina ny raiko ka hihinana amin’ny hazan’ny zanany mba hitsofanao rano ahy! '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa hoy Isaka rainy taminy: Fa iza indray moa ianao? Hoy izy: Izaho no i Esao zanakao lahimatoa! '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Toran-kovitra be Isaka ka niteny hoe: Iza ary ilay naka haza ka nitondra izany teto amiko teo? Nihinana tamin’izany rehetra izany aho fony tsy mbola tonga ianao ka efa notsofiko rano izy; eny, hotahina tokoa izy! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Raha vao ren’i Esao ny tenin’ny rainy dia niantsoantso mafy dia mafy izy sady niteny taminy hoe: Mba tsofy rano re aho, eny, izaho koa, ry Ikaky ô! '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hoy rainy: Tonga teo ny rahalahinao nisandoka ka nahalasa ny tsodranonao. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia hoy i Esao: Moa tsy Jakoba va no anarany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.36 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 25.26.
    marker-yv: yv-n
  - type: text
    text: '? Efa namingana ahy indroa izy izao: Ny fizokiako dia nalainy; ary indro, ankehitriny, lasany koa ny tsodranoko! Hoy ihany izy: Tsy mba nahatahiry tsodrano ho ahy va ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Namaly Isaka ka niteny tamin’i Esao hoe: Indro, efa nataoko ho tomponao izy, fa ny rahalahiny rehetra dia nataoko ho mpanompony; vary sy ranom-boaloboka no namelomako azy; koa inona indray no azoko atao aminao, anaka? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Hoy i Esao tamin’ny rainy: Tsy manana afa-tsy tsodrano tokana va ianao, ry Ikaky? Mba tsofy rano re aho, izaho koa, ry Ikaky ô! Sady nidradradradra nitomany i Esao. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nefa namaly azy Isaka rainy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, ho lavitry ny tsiron’ny tany ny fonenanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho lavitry ny andon’ny lanitra avy any ambony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ny sabatrao no hivelomanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny rahalahinao no hotompoinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa, raha tonga amin’izay andro hahafahanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hotapahinao ny ziogany hiala amin’ny vozonao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jakoba tany amin’i Labana anadahin-dreniny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nankahala an’i Jakoba i Esao noho ny tsodrano izay nomen’ny rainy azy. Dia hoy i Esao anakampo: Efa antomotra ny andro hisaonana an’Ikaky ka hovonoiko i Jakoba rahalahiko. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Nisy nanambara tamin’i Rebeka izany tenin’i Esao zanany lahimatoa izany, koa nandefa iraka haka an’i Jakoba zanany faralahy izy hiteny aminy hoe: Indro, mikasa hamaly faty anao i Esao rahalahinao ka hamono anao. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Koa ankehitriny, anaka, araho ny teniko: Mandehana mandositra ho any Harana, any amin’i Labana anadahiko. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Mitoera andro vitsivitsy any aminy mandra-pahafaka ny fahatezeran’ny rahalahinao; '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: eny, rehefa afaka ny fahatezeran’ny rahalahinao aminao ka hadinony izay nataonao taminy, dia handefa iraka hampaka anao any aho. Fa hataoko ahoana no ho famoy anareo mirahalahy indray andro?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary hoy i Rebeka tamin’Isaka: Tsy te ho velona aho noho ireny zanakavavin’ny Hetita ireny. Koa raha maka vady amin’ny zanakavavin’ny Hetita, tahaka ireto zazavavy tompon-tany ireto i Jakoba, dia inona indray no anton’ny hahavelomako?'
