document_id: ISA.10,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Lozan’izay mamoaka lalàna mampidi-doza
  - type: text
    content: sady mampanoratra didy fampahoriana
  '10':
  - type: text
    content: Tahaka ny nahatraran’ny tanako ny fanjakan’ny andriamanitra tsy izy
  - type: text
    content: na dia nihoatra noho ny an’i Jerosalema sy ny an’i Samaria aza ny sarin-javatra voasokitra ao aminy,
  '11':
  - type: text
    content: moa tsy tahaka ny nataoko tamin’i Samaria sy ny andriamanitra tsy izy ivavahany va
  - type: text
    content: no hataoko amin’i Jerosalema sy ny sampiny koa?
  '12':
  - type: text
    content: 'Kanefa rehefa vitan’ny Tompo ny asany rehetra ao amin’ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ' sy i Jerosalema dia hovaliako kosa ny vokatry ny fiavonavonan’ny fon’ny mpanjakan’i Asiria sy ny fireharehan’ny masony miandranandrana. '
  '13':
  - type: text
    content: 'Satria hoy izy:'
  - type: text
    content: Tamin’ny herin’ny tanako no nanaovako izany,
  - type: text
    content: tamin’ny fahendreko, satria mahira-tsaina aho;
  - type: text
    content: nanaisotra ny faritanin’ny firenena aho
  - type: text
    content: sady namabo ny harenany,
  - type: text
    content: ary tahaka ny famotraky ny ombilahy no nanonganako ny mpanapaka.
  '14':
  - type: text
    content: Tahaka ny fakàna ny ao amin’ny akanim-borona no nakan’ny tanako ny harenan’ny firenena;
  - type: text
    content: ary tahaka ny famory atody nilaozan’ny reniny
  - type: text
    content: 'no namoriako ny any amin’ny tany rehetra:'
  - type: text
    content: Tsy nisy nikopaka elatra,
  - type: text
    content: na nisoka-bava na nikiakiaka.
  '15':
  - type: text
    content: Ny famaky va hirehareha amin’izay mampiasa azy?
  - type: text
    content: Ny tsofa va hiavonavona amin’izay manatsofa aminy?
  - type: text
    content: Toa ny tsorakazo indray no mampihetsika izay manainga azy,
  - type: text
    content: ary ny tehina indray no manandratra izay tsy hazo!
  '16':
  - type: text
    content: Koa izany no handefasan’NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: text
    content: fahiazana amin’ny tremalahiny.
  - type: text
    content: Ary ao ambanin’ny voninahiny dia hisy mirehitra
  - type: text
    content: toy ny firehitry ny afo.
  '17':
  - type: text
    content: Ho tonga afo ny fahazavan’ny Israely
  - type: text
    content: ary ho tonga lelafo ny Iray Masiny
  - type: text
    content: ka handoro sy handevona ny tsilony sy ny anjavidiny
  - type: text
    content: amin’ny indray andro monja;
  '18':
  - type: text
    content: ary holevoniny tanteraka
  - type: text
    content: ny voninahitry ny alany sy ny sahany mahavokatra.
  - type: text
    content: Ho tahaka ny fitofezaky ny marary mafy izany.
  '19':
  - type: text
    content: Ho vitsy ny hazo sisa any an’alany
  - type: text
    content: ka na zazakely aza dia hahasoratra ny isany.
  - type: heading
    content: Hisy sisa hiverina
  '2':
  - type: text
    content: mba hampialany ny mahantra amin’ny fitsarana
  - type: text
    content: sy hanalany ny rariny amin’izay ory eo amin’ny oloko,
  - type: text
    content: handrobany ny mpitondratena
  - type: text
    content: sy hamaboany ny kamboty!
  '20':
  - type: text
    content: 'Amin’izany andro izany, ny Israely sisa izay tsy ringana amin’ny taranak’i Jakoba, dia tsy hiankina amin’izay namely azy intsony; fa NY TOMPO, Iray Masin’ny Israely, ihany no hiankinany marina tokoa. '
  '21':
  - type: text
    content: 'Ary izay sisa amin’i Jakoba dia hiverina ho amin’Andriamanitra mahery. '
  '22':
  - type: text
    content: 'Fa na dia tahaka ny fasika any amin’ny ranomasina aza ny isan’ny Israely olonao dia izay sisa aminy ihany no hiverina. Efa tapa-kevitra ny handringana ny Tompo ka hampihatra ny famaliana marina. '
  '23':
  - type: text
    content: Eny, tapaka fa haringan’NY TOMPO, Andriamanitra Tompon’izao rehetra izao, ny tany manontolo.
  - type: heading
    content: Hamaly an’i Asiria NY TOMPO
  '24':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao: Ry oloko izay monina any '
  - type: text
    content: Ziona
  - type: text
    content: ', aza matahotra ny Asiriana! Mamely anao amin’ny tsorakazo izy ary manainga ny tehiny aminao tahaka ny fanaon’i Ejipta. '
  '25':
  - type: text
    content: 'Nefa kely sisa dia hitsahatra ny fahavinirana, ary handringana azy kosa ny fahatezerana. '
  '26':
  - type: text
    content: 'Eny, hamely azy amin’ny karavasy Andriamanitra, Tompon’izao rehetra izao, tahaka ny namelezana ny Midianita teo amin’ny vatolampy Oreba; ary haingainy eny ambonin’ny ranomasina ny tsorakazony, tahaka ny nataony tamin’ny Ejipta. '
  '27':
  - type: text
    content: Ary amin’izany andro izany
  - type: text
    content: dia ho afaka eo an-tsorokao ny entany,
  - type: text
    content: ho afaka amin’ny vozonao ny bao fitondrana entany,
  - type: text
    content: ho simba ny bao fitondrana entany noho ny fihatavezanao.
  - type: heading
    content: Ady vetivety manodidina an’i Jerosalema
  '28':
  - type: text
    content: Injao, tonga any Aiata izy, mamakivaky an’i Migrona
  - type: text
    content: ary mametraka ny entany ao Mikmasy.
  '29':
  - type: text
    content: Mandalo ao an-kadilanana izy.
  - type: text
    content: Ao Geba isika no handry! Hoy izy.
  - type: text
    content: Mangovitra i Rama,
  - type: text
    content: mandositra i Gibean’i Saoly.
  '3':
  - type: text
    content: Inona no hataonareo amin’ny andro famaliana,
  - type: text
    content: rehefa ho tonga avy any lavitra ny fandringanana?
  - type: text
    content: Ho any amin’iza no handosiranareo hamonjy anareo?
  - type: text
    content: Ary aiza no hametrahanareo ny voninahitrareo?
  '30':
  - type: text
    content: Mikiakiaha mafy, ry Bata-Galima!
  - type: text
    content: Mampandria sofina, ry Laisy!
  - type: text
    content: Indrisy, ry Anatota mahantra!
  '31':
  - type: text
    content: Lasa mandositra i Madmena,
  - type: text
    content: mitady fierena ny mponina any Gebima.
  '32':
  - type: text
    content: Mbola mijanona any Noba izy anio
  - type: text
    content: ary manofahofa ny tanany
  - type: text
    content: 'manambana ny tendrombohitr’i '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy,'
  - type: text
    content: dia ny havoanan’i Jerosalema.
  - type: heading
    content: Nokapaina ilay ala mahery
  '33':
  - type: text
    content: Indro, manapaka ny rantsany madinika amin-kery lehibe
  - type: text
    content: 'NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
  - type: text
    content: Izay mijoalajoala no voakapa
  - type: text
    content: ary izay tena avo no aetry;
  '34':
  - type: text
    content: Kapainy amin’ny vy ny ala mikirindro
  - type: text
    content: ary i Libanona dia alamaky ny Iray Mahery.
  '4':
  - type: text
    content: Tsy misy azo atao afa-tsy mihohoka miaraka amin’ny mpifatotra
  - type: text
    content: sy mianjera miaraka amin’ny voavono.
  - type: text
    content: Kanefa na izany rehetra izany aza dia tsy mbola afaka ihany ny fahatezerany
  - type: text
    content: fa mbola miainga ihany ny tanany.
  - type: heading
    content: Loza ho an’i Asiria sy ny mpanjakany
  '5':
  - type: text
    content: Lozan’i Asiria,
  - type: text
    content: tsorakazon’ny fahatezerako!
  - type: text
    content: Eny, tehina eny an-tanany
  - type: text
    content: ny fahavinirako!
  '6':
  - type: text
    content: Hamely firenena ratsy fanahy no anirahako azy,
  - type: text
    content: ary hamely ny olona izay iharan’ny fahatezerako no andidiako azy,
  - type: text
    content: mba hamabo sy handroba
  - type: text
    content: ka hanitsakitsaka azy tahaka ny fotaka eny an-dalambe.
  '7':
  - type: text
    content: Kanjo tsy izany no kasainy,
  - type: text
    content: ary tsy izay no heverin’ny fony;
  - type: text
    content: fa ny handringana no ao am-pony,
  - type: text
    content: hamongotra firenena maro.
  '8':
  - type: text
    content: 'Fa hoy izy:'
  - type: text
    content: Tsy mpanjaka avokoa va ireny governora ambany fahefako ireny?
  '9':
  - type: text
    content: Tsy tahaka an’i Karkemisy va i Kalno?
  - type: text
    content: Tsy tahaka an’i Arpada va i Hamata?
  - type: text
    content: Ary tsy tahaka an’i Damaskosy va i Samaria?
