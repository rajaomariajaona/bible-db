document_id: ISA.10
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan’izay mamoaka lalàna mampidi-doza
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mampanoratra didy fampahoriana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: mba hampialany ny mahantra amin’ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanalany ny rariny amin’izay ory eo amin’ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: handrobany ny mpitondratena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamaboany ny kamboty!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Inona no hataonareo amin’ny andro famaliana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa ho tonga avy any lavitra ny fandringanana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho any amin’iza no handosiranareo hamonjy anareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aiza no hametrahanareo ny voninahitrareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy misy azo atao afa-tsy mihohoka miaraka amin’ny mpifatotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mianjera miaraka amin’ny voavono.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa na izany rehetra izany aza dia tsy mbola afaka ihany ny fahatezerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mbola miainga ihany ny tanany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loza ho an’i Asiria sy ny mpanjakany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lozan’i Asiria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsorakazon’ny fahatezerako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tehina eny an-tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahavinirako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hamely firenena ratsy fanahy no anirahako azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamely ny olona izay iharan’ny fahatezerako no andidiako azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamabo sy handroba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanitsakitsaka azy tahaka ny fotaka eny an-dalambe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanjo tsy izany no kasainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy izay no heverin’ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny handringana no ao am-pony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamongotra firenena maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mpanjaka avokoa va ireny governora ambany fahefako ireny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy tahaka an’i Karkemisy va i Kalno?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy tahaka an’i Arpada va i Hamata?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy tahaka an’i Damaskosy va i Samaria?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tahaka ny nahatraran’ny tanako ny fanjakan’ny andriamanitra tsy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia nihoatra noho ny an’i Jerosalema sy ny an’i Samaria aza ny sarin-javatra voasokitra ao aminy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: moa tsy tahaka ny nataoko tamin’i Samaria sy ny andriamanitra tsy izy ivavahany va
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hataoko amin’i Jerosalema sy ny sampiny koa?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Kanefa rehefa vitan’ny Tompo ny asany rehetra ao amin’ny tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' sy i Jerosalema dia hovaliako kosa ny vokatry ny fiavonavonan’ny fon’ny mpanjakan’i Asiria sy ny fireharehan’ny masony miandranandrana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Satria hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny herin’ny tanako no nanaovako izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fahendreko, satria mahira-tsaina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanaisotra ny faritanin’ny firenena aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady namabo ny harenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny famotraky ny ombilahy no nanonganako ny mpanapaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tahaka ny fakàna ny ao amin’ny akanim-borona no nakan’ny tanako ny harenan’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny famory atody nilaozan’ny reniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no namoriako ny any amin’ny tany rehetra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nisy nikopaka elatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nisoka-bava na nikiakiaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny famaky va hirehareha amin’izay mampiasa azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tsofa va hiavonavona amin’izay manatsofa aminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toa ny tsorakazo indray no mampihetsika izay manainga azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tehina indray no manandratra izay tsy hazo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa izany no handefasan’NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fahiazana amin’ny tremalahiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao ambanin’ny voninahiny dia hisy mirehitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny firehitry ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho tonga afo ny fahazavan’ny Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho tonga lelafo ny Iray Masiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handoro sy handevona ny tsilony sy ny anjavidiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny indray andro monja;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ary holevoniny tanteraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny voninahitry ny alany sy ny sahany mahavokatra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tahaka ny fitofezaky ny marary mafy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ho vitsy ny hazo sisa any an’alany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka na zazakely aza dia hahasoratra ny isany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hisy sisa hiverina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Amin’izany andro izany, ny Israely sisa izay tsy ringana amin’ny taranak’i Jakoba, dia tsy hiankina amin’izay namely azy intsony; fa NY TOMPO, Iray Masin’ny Israely, ihany no hiankinany marina tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary izay sisa amin’i Jakoba dia hiverina ho amin’Andriamanitra mahery. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa na dia tahaka ny fasika any amin’ny ranomasina aza ny isan’ny Israely olonao dia izay sisa aminy ihany no hiverina. Efa tapa-kevitra ny handringana ny Tompo ka hampihatra ny famaliana marina. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Eny, tapaka fa haringan’NY TOMPO, Andriamanitra Tompon’izao rehetra izao, ny tany manontolo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hamaly an’i Asiria NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao: Ry oloko izay monina any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ', aza matahotra ny Asiriana! Mamely anao amin’ny tsorakazo izy ary manainga ny tehiny aminao tahaka ny fanaon’i Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nefa kely sisa dia hitsahatra ny fahavinirana, ary handringana azy kosa ny fahatezerana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Eny, hamely azy amin’ny karavasy Andriamanitra, Tompon’izao rehetra izao, tahaka ny namelezana ny Midianita teo amin’ny vatolampy Oreba; ary haingainy eny ambonin’ny ranomasina ny tsorakazony, tahaka ny nataony tamin’ny Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho afaka eo an-tsorokao ny entany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho afaka amin’ny vozonao ny bao fitondrana entany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho simba ny bao fitondrana entany noho ny fihatavezanao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ady vetivety manodidina an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Injao, tonga any Aiata izy, mamakivaky an’i Migrona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mametraka ny entany ao Mikmasy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mandalo ao an-kadilanana izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao Geba isika no handry! Hoy izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangovitra i Rama,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandositra i Gibean’i Saoly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mikiakiaha mafy, ry Bata-Galima!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampandria sofina, ry Laisy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy, ry Anatota mahantra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Lasa mandositra i Madmena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitady fierena ny mponina any Gebima.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mbola mijanona any Noba izy anio
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manofahofa ny tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'manambana ny tendrombohitr’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' zanakavavy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny havoanan’i Jerosalema.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nokapaina ilay ala mahery
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Indro, manapaka ny rantsany madinika amin-kery lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mijoalajoala no voakapa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay tena avo no aetry;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Kapainy amin’ny vy ny ala mikirindro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary i Libanona dia alamaky ny Iray Mahery.
