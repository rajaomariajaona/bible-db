document_id: EZK.35,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravana an’i Edoma
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Noho ny nilazanao hoe: Ireto firenena roa ireto sy ireto tany roa ireto dia ho ahy avokoa ka horaisinay ny fanananay, kanefa teo ihany NY TOMPO, '
  '11':
  - type: text
    content: 'dia izao no lazain’NY TOMPO: Raha velona koa Aho dia hanao araka ny fahatezerana sy ny fialonana izay nasehonao tamin’ny fandrafiana azy; ary hampahafantariko azy ny tenako rehefa mitsara azy Aho. '
  '12':
  - type: text
    content: 'Dia ho fantatrao fa Izaho TOMPO no efa nandre ny fanaratsiana izay nolazainao ny amin’ireny tendrombohitry ny Israely hoe: Tonga tany foana ireny ka nomena anay ho fivelomanay. '
  '13':
  - type: text
    content: Nanao teny miavonavona namely Ahy ianareo ary nanamaro ny teninareo namely Ahy, ary reko avokoa izany.
  '14':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Rehefa mifaly ny tany manontolo dia hataoko tany foana kosa ianao. '
  '15':
  - type: text
    content: 'Toy ny nifalianao ny amin’ny lovan’ny taranak’Israely, satria tonga tany foana ireny, dia toy izany kosa no hataoko aminao: Hataoko tonga tany foana ianao, ry tendrombohitra Seìra sy Edoma rehetra; dia ho fantatra fa Izaho no TOMPO.'
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', manandrifia ny tendrombohitra Seìra ka maminania ny hamelezana azy, '
  '3':
  - type: text
    content: 'dia lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Indro, avy hamely anao Aho, ry tendrombohitra Seìra!
  - type: text
    content: Hatsotrako aminao ny tanako
  - type: text
    content: ka hataoko foana sy lao ianao.
  '4':
  - type: text
    content: Ny tanànanao dia hataoko korontam-bato,
  - type: text
    content: ary ianao dia ho lao;
  - type: text
    content: dia ho fantatrao fa Izaho no TOMPO.
  '5':
  - type: text
    content: 'Noho ny fandrafianao hatry ny ela, sy ny nanoloranao ny Zanak’Israely ho fatin’ny sabatra tamin’ny andro nahitany loza, rehefa tonga tamin’ny fanaperany ny heloka, '
  '6':
  - type: text
    content: 'dia izao no lazain’NY TOMPO: Raha velona koa Aho, dia hataoko manjary ra ianao, ary ra no hanenjika anao; satria tsy nankahalainao ny ra, dia ra kosa no hanenjika anao. '
  '7':
  - type: text
    content: 'Hataoko foana sy lao ny tendrombohitra Seìra ary hofongorako izay rehetra mamakivaky ao. '
  '8':
  - type: text
    content: Hofenoiko ny olony voavono ny tendrombohiny; eny, any amin’ny havoananao sy ny lohasahanao ary any amoron’ny lohasahan-driakanao rehetra no hiampatramparan’izay voatrabaky ny sabatra.
  '9':
  - type: text
    content: Hataoko rava mandrakizay ianao,
  - type: text
    content: ary tsy honenana intsony ny tanànanao,
  - type: text
    content: dia ho fantatrareo fa Izaho no TOMPO.
