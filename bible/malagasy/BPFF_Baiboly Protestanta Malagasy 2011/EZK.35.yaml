document_id: EZK.35,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny handravana an’i Edoma
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny nilazanao hoe: Ireto firenena roa ireto sy ireto tany roa ireto dia ho ahy avokoa ka horaisinay ny fanananay, kanefa teo ihany NY TOMPO, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izao no lazain’NY TOMPO: Raha velona koa Aho dia hanao araka ny fahatezerana sy ny fialonana izay nasehonao tamin’ny fandrafiana azy; ary hampahafantariko azy ny tenako rehefa mitsara azy Aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ho fantatrao fa Izaho TOMPO no efa nandre ny fanaratsiana izay nolazainao ny amin’ireny tendrombohitry ny Israely hoe: Tonga tany foana ireny ka nomena anay ho fivelomanay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanao teny miavonavona namely Ahy ianareo ary nanamaro ny teninareo namely Ahy, ary reko avokoa izany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra: Rehefa mifaly ny tany manontolo dia hataoko tany foana kosa ianao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy ny nifalianao ny amin’ny lovan’ny taranak’Israely, satria tonga tany foana ireny, dia toy izany kosa no hataoko aminao: Hataoko tonga tany foana ianao, ry tendrombohitra Seìra sy Edoma rehetra; dia ho fantatra fa Izaho no TOMPO.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', manandrifia ny tendrombohitra Seìra ka maminania ny hamelezana azy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, avy hamely anao Aho, ry tendrombohitra Seìra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatsotrako aminao ny tanako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hataoko foana sy lao ianao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tanànanao dia hataoko korontam-bato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ianao dia ho lao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho fantatrao fa Izaho no TOMPO.
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Noho ny fandrafianao hatry ny ela, sy ny nanoloranao ny Zanak’Israely ho fatin’ny sabatra tamin’ny andro nahitany loza, rehefa tonga tamin’ny fanaperany ny heloka, '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia izao no lazain’NY TOMPO: Raha velona koa Aho, dia hataoko manjary ra ianao, ary ra no hanenjika anao; satria tsy nankahalainao ny ra, dia ra kosa no hanenjika anao. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hataoko foana sy lao ny tendrombohitra Seìra ary hofongorako izay rehetra mamakivaky ao. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hofenoiko ny olony voavono ny tendrombohiny; eny, any amin’ny havoananao sy ny lohasahanao ary any amoron’ny lohasahan-driakanao rehetra no hiampatramparan’izay voatrabaky ny sabatra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko rava mandrakizay ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy honenana intsony ny tanànanao,
  - type: usfm
    marker: m
    children:
    - type: text
      text: dia ho fantatrareo fa Izaho no TOMPO.
