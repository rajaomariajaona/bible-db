document_id: JOB.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Teny voalohany nataon’i Bildada: Na ho ela na ho haingana dia tsy maintsy hisy valiny ny fahadisoana'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nandray fitenenana i Bildada sohita hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandra-pahoviana no hiteny toy izany ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitsoka toy ny tafio-drivotra ny teny aloaky ny vavanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Andriamanitra va hamadika ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny Tsitoha va hamadika ny rariny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha nanota Taminy ny zanakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nampanodiaviny azy ny fahadisoany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha ianao kosa no mandroso mitady an’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mifona amin’ny Tsitoha,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ary raha madio sy mahitsy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hifoha hamonjy anao tokoa Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampiadana indray ny fonenan’ny fahamarinanao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: koa na dia kely aza no niandohanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho lehibe indrindra no hiafaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa miangavy anao aho, anontanio ange ny Ntaolo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka fantaro ny traikefa hitan’ny razany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: fa vao omaly isika ka tsy mba mahalala
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aloka ihany ny androntsika etỳ ambonin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy ireny va no hampianatra anao ka hilaza aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamoaka teny avy ao am-pony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Haniry va ny zozoro raha tsy eny amin’ny honahona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitrebona va ny harefo raha tsy misy rano?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mbola maitso izy sady tsy voajinja,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa malazo alohan’ny zava-maitso rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Toy izany no lalan’izay rehetra manadino an’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho levona ny fanantenan’ny mpihatsaravelatsihy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ho potika ny fanantenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tranon-kala no itokiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Miankina amin’ny tranony izy, kanjo mikoa iny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifikitra mafy aminy izy, kanjo tsy mahajoro iny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mitsimoka tsara tandrifin’ny masoandro izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny rantsany dia misandrahaka eo amin’ny tanimboliny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: mifelipelika mifaniditra eo amin’ny korontam-bato ny fotony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahazo any anelanelany any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nony fongorany hiala amin’ny fitoerany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia handa azy izany ka hilaza hoe: Tsy mbola nahita anao akory aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Indro, izany ihany no fifalian’ny lalan-kalehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisy hafa indray mitrebona avy amin’ny vovoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Indro Andriamanitra tsy hanary ny olona tsy manan-tsiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hitantana ny mpanao ratsy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: mbola hofenoiny hehy ny vavanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hoby ny molotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hitafy henatra izay mankahala anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy intsony ny tranolain’ny ratsy fanahy.
