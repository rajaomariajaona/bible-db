document_id: JOB.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Teny voalohany nataon’i Bildada: Na ho ela na ho haingana dia tsy maintsy hisy valiny ny fahadisoana'
  - type: text
    content: 'Dia nandray fitenenana i Bildada sohita hoe:'
  '10':
  - type: text
    content: Tsy ireny va no hampianatra anao ka hilaza aminao
  - type: text
    content: ary hamoaka teny avy ao am-pony?
  '11':
  - type: text
    content: Haniry va ny zozoro raha tsy eny amin’ny honahona?
  - type: text
    content: Hitrebona va ny harefo raha tsy misy rano?
  '12':
  - type: text
    content: Mbola maitso izy sady tsy voajinja,
  - type: text
    content: kanefa malazo alohan’ny zava-maitso rehetra.
  '13':
  - type: text
    content: Toy izany no lalan’izay rehetra manadino an’Andriamanitra
  - type: text
    content: ary ho levona ny fanantenan’ny mpihatsaravelatsihy;
  '14':
  - type: text
    content: ho potika ny fanantenany
  - type: text
    content: satria tranon-kala no itokiany.
  '15':
  - type: text
    content: Miankina amin’ny tranony izy, kanjo mikoa iny;
  - type: text
    content: mifikitra mafy aminy izy, kanjo tsy mahajoro iny.
  '16':
  - type: text
    content: Mitsimoka tsara tandrifin’ny masoandro izy
  - type: text
    content: ary ny rantsany dia misandrahaka eo amin’ny tanimboliny;
  '17':
  - type: text
    content: mifelipelika mifaniditra eo amin’ny korontam-bato ny fotony
  - type: text
    content: ary mahazo any anelanelany any.
  '18':
  - type: text
    content: Nony fongorany hiala amin’ny fitoerany izy
  - type: text
    content: 'dia handa azy izany ka hilaza hoe: Tsy mbola nahita anao akory aho.'
  '19':
  - type: text
    content: Indro, izany ihany no fifalian’ny lalan-kalehany
  - type: text
    content: ary hisy hafa indray mitrebona avy amin’ny vovoka.
  '2':
  - type: text
    content: Mandra-pahoviana no hiteny toy izany ianao
  - type: text
    content: ka hitsoka toy ny tafio-drivotra ny teny aloaky ny vavanao?
  '20':
  - type: text
    content: Indro Andriamanitra tsy hanary ny olona tsy manan-tsiny
  - type: text
    content: ary tsy hitantana ny mpanao ratsy;
  '21':
  - type: text
    content: mbola hofenoiny hehy ny vavanao
  - type: text
    content: ary hoby ny molotrao.
  '22':
  - type: text
    content: Hitafy henatra izay mankahala anao
  - type: text
    content: ary tsy hisy intsony ny tranolain’ny ratsy fanahy.
  '3':
  - type: text
    content: Andriamanitra va hamadika ny fitsarana,
  - type: text
    content: na ny Tsitoha va hamadika ny rariny?
  '4':
  - type: text
    content: Raha nanota Taminy ny zanakao
  - type: text
    content: dia nampanodiaviny azy ny fahadisoany.
  '5':
  - type: text
    content: Fa raha ianao kosa no mandroso mitady an’Andriamanitra
  - type: text
    content: ka mifona amin’ny Tsitoha,
  '6':
  - type: text
    content: ary raha madio sy mahitsy ianao,
  - type: text
    content: dia hifoha hamonjy anao tokoa Izy
  - type: text
    content: ary hampiadana indray ny fonenan’ny fahamarinanao,
  '7':
  - type: text
    content: koa na dia kely aza no niandohanao
  - type: text
    content: dia ho lehibe indrindra no hiafaranao.
  '8':
  - type: text
    content: Fa miangavy anao aho, anontanio ange ny Ntaolo,
  - type: text
    content: ka fantaro ny traikefa hitan’ny razany,
  '9':
  - type: text
    content: fa vao omaly isika ka tsy mba mahalala
  - type: text
    content: ary aloka ihany ny androntsika etỳ ambonin’ny tany.
