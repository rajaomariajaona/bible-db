document_id: JER.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ohatra nataon’ny Rekabita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO tamin’ny andron’i Joiakima, zanak’i Josia, mpanjakan’ny Joda: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mankanesa any amin’ny taranak’i Rekaba ary mitenena aminy, dia ampidiro ao amin’ny tranon’NY TOMPO, ao amin’ny efitrano iray, izy, ka omeo divay hosotroiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nalaiko i Jazania, zanak’i Jeremia, zanak’i Habazinia, sy ny rahalahiny ary ny zanany rehetra mbamin’ny taranak’i Rekaba rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka nampidiriko ho ao amin’ny tranon’NY TOMPO izy, dia tao amin’ny efitranon’ny taranak’i Hanana, zanak’i Jigdalia, lehilahin’Andriamanitra, izay ao anilan’ny efitranon’ny mpanapaka, ao ambonin’ny efitranon’i Mahaseia, zanak’i Saloma, mpiambina ny varavarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary norosoako kapoaka sy siny feno divay teo anoloan’ny taranak’i Rekaba ka nolazaiko taminy hoe: Misotroa divay ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy kosa ireo: Tsy hisotro divay izahay; fa i Jonadaba, zanak’i Rekaba, razanay, efa nanafatra anay hoe: Aza mba misotro divay mandrakizay ianareo na ny taranakareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary aza manao trano ianareo, na mamafy voan-javatra, na manao tanim-boaloboka, na mety hanana izany akory; fa tranolay no itoeronareo amin’ny andronareo rehetra, mba ho ela velona ianareo amin’ny tany izay ivahinianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nankatoavinay izany tenin’i Jonadaba, zanak’i Rekaba, razanay, izany, tamin’izay rehetra nanafarany anay, mba tsy hisotro divay amin’ny andronay rehetra, na izahay, na ny vadinay, na ny zanakay lahy, na ny zanakay vavy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary tsy hanao trano hitoeranay, na hanana tanimboly, na saha, na voan-javatra famafy izahay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa efa nitoetra an-day izahay araka izay rehetra nanafaran’i Jonadaba razanay anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa rehefa nananika ny tany i Nebokadnezara, mpanjakan’i Babilona, dia hoy izahay: Andeha isika hankany Jerosalema handositra ny miaramilan’ny Kaldeana sy ny miaramilan’ny Siriana, dia izany no itoeranay eto Jerosalema.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia tonga tamin’i Jeremia ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Andeha, lazao amin’ny Joda sy amin’ny mponina any Jerosalema hoe: Tsy hino anatra hitandrina ny teniko va ianareo? Hoy NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'To ny tenin’i Jonadaba, zanak’i Rekaba, izay nanafarany ny zanany tsy hisotro divay, satria tsy misotro tokoa izy mandraka androany fa mahatana ny hafatry ny razany. Ary Izaho efa niteny taminareo, eny, nifoha vao maraina Aho ka niteny, nefa tsy nihaino ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nirahiko taminareo koa ny mpaminany mpanompoko rehetra, eny, nifoha vao maraina Aho ka naniraka azy hiteny hoe: Samia miala amin’ny lalanareo ratsy ianareo ankehitriny, ary ataovy tsara ny ataonareo, ary aza manaraka andriamanitra hafa hanompo azy, dia honina amin’ny tany izay nomeko anareo sy ny razanareo ianareo; nefa tsy nanongilana ny sofinareo na nihaino Ahy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Eny, nankatoavin’ny zanak’i Jonadaba, zanak’i Rekaba, ny hafatry ny razany, izay nanafarany azy; fa ity firenena ity kosa dia tsy mba nihaino Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hataoko mihatra amin’ny Joda sy ny mponina rehetra any Jerosalema ny loza rehetra izay nolazaiko hatao aminy satria efa niteny taminy Aho fa tsy nihaino izy, ary niantso azy Aho fa tsy namaly izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny taranak’i Rekaba dia nilazan’i Jeremia hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Noho ny nahatananareo ny hafatr’i Jonadaba razanareo sy ny nitandremanareo ny hafany rehetra ary ny nanaovanareo araka izay rehetra nanafarany anareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: I Jonadaba, zanak’i Rekaba, dia tsy ho diso zanakalahy hitsangana eo anatrehako mandrakizay.'
