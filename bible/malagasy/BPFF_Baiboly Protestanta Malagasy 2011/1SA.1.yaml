document_id: 1SA.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Hana tao amin’ny tempolin’i Silo
  - type: text
    content: 'Nisy lehilahy iray tany Ramataima-Zofima, any amin’ny tany be havoana any Efraima; Elkana no anarany, zanak’i Jerohama, zanak’i Eliho, zanak’i Toho, zanak’i Zofa efratita. '
  '10':
  - type: text
    content: 'Nalahelo mafy i Hana ka nivavaka tamin’NY TOMPO sady nitomany mafy. '
  '11':
  - type: text
    content: 'Dia nivoady izy hoe: Ry Andriamanitra, Tompon’izao rehetra izao ô! Raha mba hitsinjo ny fahorian’ny mpanompovavinao tokoa Ianao ka hahatsiaro ahy ary tsy hanadino ny mpanompovavinao fa hanome ahy zazalahy, dia homeko ho an’NY TOMPO kosa izy amin’ny andro rehetra hiainany ka tsy hokasihin-kareza ny lohany. '
  '12':
  - type: text
    content: 'Raha mbola naharitra nivavaka teo anatrehan’NY TOMPO izy dia nodinihin’i Ely ny vavany. '
  '13':
  - type: text
    content: 'Koa satria niteny anakampo i Hana ka ny molony ihany no nihetsiketsika fa tsy re akory ny feony dia noheverin’i Ely fa mamo izy. '
  '14':
  - type: text
    content: 'Ary hoy i Ely taminy: Mandra-pahoviana no ho mamo ianao? Esory aminao ny divainao. '
  '15':
  - type: text
    content: 'Dia namaly i Hana hoe: Tsia, tompoko; vehivavy malahelo fanahy aho fa tsy nisotro divay na toaka tsy akory; mamoaka ny ato am-poko eto anatrehan’NY TOMPO aho. '
  '16':
  - type: text
    content: 'Aza mba heverina ho vehivavy tena ratsy fanahy ny mpanompovavinao; fa ny haben’ny fahoriako sy ny alaheloko no nitenenako mandraka ankehitriny. '
  '17':
  - type: text
    content: 'Dia hoy i Ely: Mandehana amin’ny fiadanana; homen’ny Andriamanitry ny Israely anao anie izay nangatahinao Taminy. '
  '18':
  - type: text
    content: 'Hoy Ravehivavy: Aoka hahita fitia eo imasonao ny mpanompovavinao. Dia lasa nandeha izy ka nihinana ary tsy nalahelo tarehy intsony. '
  '19':
  - type: text
    content: Ary nifoha vao maraina izy ireo ka nivavaka teo anatrehan’NY TOMPO, dia lasa nody ka tonga tao an-tranony tany Rama.
  - type: heading
    content: Ny nahaterahan’i Samoela sy ny fahazazany
  - type: text
    content: 'Ary nahalala an’i Hana vadiny i Elkana ary NY TOMPO nahatsiaro azy. '
  '2':
  - type: text
    content: 'Nampirafy izy, Hana no anaran’ny vadiny iray, ary Penina kosa no anaran’ny iray. I Penina dia nanan-janaka, fa i Hana kosa dia tsy mba nanana. '
  '20':
  - type: text
    content: Dia nanana anaka i Hana tamin’ny faran’ny taona ka nitera-dahy, ary ny anarany nataony hoe Samoela
  - type: note
    content: 'Samoela: Nohenoin’Andriamanitra.'
  - type: text
    content: ', satria hoy izy: Tamin’NY TOMPO no nangatahako azy.'
  '21':
  - type: text
    content: 'Ary i Elkana vadiny sy ny ankohonany rehetra dia niakatra mba hamono zavatra hatolony ho fanatitra fanao isan-taona ho an’NY TOMPO sy ho fanefany ny voadiny. '
  '22':
  - type: text
    content: 'Tsy mba niakatra kosa i Hana, satria hoy izy tamin’ny vadiny: Aoka aloha mandra-pampisara-nono ny zaza, fa amin’izay aho vao hitondra azy hiseho eo anatrehan’NY TOMPO ka hitoetra ao mandrakizay izy. '
  '23':
  - type: text
    content: 'Ary hoy i Elkana vadiny taminy: Ataovy ary izay tianao; mijanòna ihany mandra-pampisarahanao nono azy; hotanterahin’NY TOMPO anie ny teniny. Dia nijanona Ravehivavy ka nampinono ny zanany mandra-pampisarany nono azy.'
  '24':
  - type: text
    content: 'Nony efa nisara-nono ny zaza dia noentiny niakatra niaraka taminy ary nitondra vantotra ombilahy telo sy koba eran’ny '
  - type: text
    content: efaha
  - type: text
    content: ' ary divay iray siny hoditra koa izy, koa noentiny ho ao amin’ny tranon’NY TOMPO tao Silo ireo; mbola kely ny zaza tamin’izay. '
  '25':
  - type: text
    content: 'Dia novonoiny ny vantotra ombilahy iray ary noentiny ho ao amin’i Ely ny zaza. '
  '26':
  - type: text
    content: 'Ary hoy i Hana: Tompoko ô! Raha velona koa ny ainao, tompoko, izaho ilay vehivavy nitsangana teto anilanao ka nivavaka tamin’NY TOMPO. '
  '27':
  - type: text
    content: 'Ny hahazoako ity zazalahy ity no nivavahako; dia nomen’NY TOMPO ahy izay nangatahiko Taminy. '
  '28':
  - type: text
    content: Izaho kosa dia manolotra azy ho an’NY TOMPO. Eny, amin’ny andro rehetra hiainany dia voatolotra ho an’NY TOMPO izy. Dia niankohoka nivavaka tamin’NY TOMPO izy.
  '3':
  - type: text
    content: Niakatra isan-taona niala tao amin’ny tanànany Ralehilahy mba hivavaka sy hamono zavatra hatao fanatitra ho an’Andriamanitra, Tompon’izao rehetra izao, tao Silo. Ary tao izy mirahalahy, zanak’i Ely, dia i Hofinia sy i Finehasa, mpisoron’NY TOMPO.
  '4':
  - type: text
    content: 'Tamin’ny andro namonoan’i Elkana zavatra hatao fanatitra dia samy nomeny anjara iray avy i Penina vadiny sy ny zanany lahy ary ny zanany vavy rehetra. '
  '5':
  - type: text
    content: 'Nomeny anjaran-droa kosa i Hana satria izy no tiany na dia nataon’NY TOMPO momba aza. '
  '6':
  - type: text
    content: 'Tsy nitsahatra nanorisory an’i Hana ny rafiny mba hampalahelo azy mafy, noho ny nanaovan’ny TOMPO azy momba. '
  '7':
  - type: text
    content: 'Toy izany no fanaon’i Elkana isan-taona, rehefa niakatra ho any amin’ny tranon’NY TOMPO i Hana, ary toy izany koa no nanorisorenan’ny rafiny an’i Hana; koa nitomany izy sady tsy nety nihinan-kanina. '
  '8':
  - type: text
    content: 'Fa hoy i Elkana vadiny taminy: Ry Hana, nahoana ianao no mitomany? Nahoana ianao no tsy mety mihinan-kanina? Ary nahoana ianao no malahelo fo? Tsy tsara lavitra aminao mihoatra noho ny zanaka folo mirahalahy va aho?'
  '9':
  - type: text
    content: 'Dia nitsangana i Hana rehefa avy nihinana sy nisotro tao Silo izy ireo. Ary nipetraka tamin’ny sezany teo anilan’ny tolanam-baravaran’ny tempolin’NY TOMPO i Ely mpisorona. '
