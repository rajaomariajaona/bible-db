document_id: 1SA.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Hana tao amin’ny tempolin’i Silo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy lehilahy iray tany Ramataima-Zofima, any amin’ny tany be havoana any Efraima; Elkana no anarany, zanak’i Jerohama, zanak’i Eliho, zanak’i Toho, zanak’i Zofa efratita. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nampirafy izy, Hana no anaran’ny vadiny iray, ary Penina kosa no anaran’ny iray. I Penina dia nanan-janaka, fa i Hana kosa dia tsy mba nanana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Niakatra isan-taona niala tao amin’ny tanànany Ralehilahy mba hivavaka sy hamono zavatra hatao fanatitra ho an’Andriamanitra, Tompon’izao rehetra izao, tao Silo. Ary tao izy mirahalahy, zanak’i Ely, dia i Hofinia sy i Finehasa, mpisoron’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’ny andro namonoan’i Elkana zavatra hatao fanatitra dia samy nomeny anjara iray avy i Penina vadiny sy ny zanany lahy ary ny zanany vavy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nomeny anjaran-droa kosa i Hana satria izy no tiany na dia nataon’NY TOMPO momba aza. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy nitsahatra nanorisory an’i Hana ny rafiny mba hampalahelo azy mafy, noho ny nanaovan’ny TOMPO azy momba. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Toy izany no fanaon’i Elkana isan-taona, rehefa niakatra ho any amin’ny tranon’NY TOMPO i Hana, ary toy izany koa no nanorisorenan’ny rafiny an’i Hana; koa nitomany izy sady tsy nety nihinan-kanina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy i Elkana vadiny taminy: Ry Hana, nahoana ianao no mitomany? Nahoana ianao no tsy mety mihinan-kanina? Ary nahoana ianao no malahelo fo? Tsy tsara lavitra aminao mihoatra noho ny zanaka folo mirahalahy va aho?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nitsangana i Hana rehefa avy nihinana sy nisotro tao Silo izy ireo. Ary nipetraka tamin’ny sezany teo anilan’ny tolanam-baravaran’ny tempolin’NY TOMPO i Ely mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nalahelo mafy i Hana ka nivavaka tamin’NY TOMPO sady nitomany mafy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nivoady izy hoe: Ry Andriamanitra, Tompon’izao rehetra izao ô! Raha mba hitsinjo ny fahorian’ny mpanompovavinao tokoa Ianao ka hahatsiaro ahy ary tsy hanadino ny mpanompovavinao fa hanome ahy zazalahy, dia homeko ho an’NY TOMPO kosa izy amin’ny andro rehetra hiainany ka tsy hokasihin-kareza ny lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha mbola naharitra nivavaka teo anatrehan’NY TOMPO izy dia nodinihin’i Ely ny vavany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa satria niteny anakampo i Hana ka ny molony ihany no nihetsiketsika fa tsy re akory ny feony dia noheverin’i Ely fa mamo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy i Ely taminy: Mandra-pahoviana no ho mamo ianao? Esory aminao ny divainao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia namaly i Hana hoe: Tsia, tompoko; vehivavy malahelo fanahy aho fa tsy nisotro divay na toaka tsy akory; mamoaka ny ato am-poko eto anatrehan’NY TOMPO aho. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza mba heverina ho vehivavy tena ratsy fanahy ny mpanompovavinao; fa ny haben’ny fahoriako sy ny alaheloko no nitenenako mandraka ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Ely: Mandehana amin’ny fiadanana; homen’ny Andriamanitry ny Israely anao anie izay nangatahinao Taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy Ravehivavy: Aoka hahita fitia eo imasonao ny mpanompovavinao. Dia lasa nandeha izy ka nihinana ary tsy nalahelo tarehy intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary nifoha vao maraina izy ireo ka nivavaka teo anatrehan’NY TOMPO, dia lasa nody ka tonga tao an-tranony tany Rama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan’i Samoela sy ny fahazazany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nahalala an’i Hana vadiny i Elkana ary NY TOMPO nahatsiaro azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nanana anaka i Hana tamin’ny faran’ny taona ka nitera-dahy, ary ny anarany nataony hoe Samoela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Samoela: Nohenoin’Andriamanitra.'
    marker-yv: yv-n
  - type: text
    text: ', satria hoy izy: Tamin’NY TOMPO no nangatahako azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary i Elkana vadiny sy ny ankohonany rehetra dia niakatra mba hamono zavatra hatolony ho fanatitra fanao isan-taona ho an’NY TOMPO sy ho fanefany ny voadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tsy mba niakatra kosa i Hana, satria hoy izy tamin’ny vadiny: Aoka aloha mandra-pampisara-nono ny zaza, fa amin’izay aho vao hitondra azy hiseho eo anatrehan’NY TOMPO ka hitoetra ao mandrakizay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy i Elkana vadiny taminy: Ataovy ary izay tianao; mijanòna ihany mandra-pampisarahanao nono azy; hotanterahin’NY TOMPO anie ny teniny. Dia nijanona Ravehivavy ka nampinono ny zanany mandra-pampisarany nono azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nony efa nisara-nono ny zaza dia noentiny niakatra niaraka taminy ary nitondra vantotra ombilahy telo sy koba eran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efaha
  - type: text
    text: ' ary divay iray siny hoditra koa izy, koa noentiny ho ao amin’ny tranon’NY TOMPO tao Silo ireo; mbola kely ny zaza tamin’izay. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia novonoiny ny vantotra ombilahy iray ary noentiny ho ao amin’i Ely ny zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy i Hana: Tompoko ô! Raha velona koa ny ainao, tompoko, izaho ilay vehivavy nitsangana teto anilanao ka nivavaka tamin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny hahazoako ity zazalahy ity no nivavahako; dia nomen’NY TOMPO ahy izay nangatahiko Taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izaho kosa dia manolotra azy ho an’NY TOMPO. Eny, amin’ny andro rehetra hiainany dia voatolotra ho an’NY TOMPO izy. Dia niankohoka nivavaka tamin’NY TOMPO izy.
