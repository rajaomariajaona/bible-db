document_id: DEU.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nitaiza ny Israely tany an-tany efitra NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny lalàna rehetra izay omeko anao anio dia tandremo ka araho, mba ho velona sy hihamaro ianareo ary hiditra sady handova ny tany izay nianianan’NY TOMPO tamin’ny razanareo homena azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tsarovy ny lalana rehetra izay nitondran’NY TOMPO Andriamanitrao anao tany an-tany efitra izay efapolo taona izay, fa Izy no hampanetry tena anao sy hizaha toetra anao ary hahafantatra izay ao am-ponao, na hitandrina ny didiny ianao, na tsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nampanetry tena anao Izy ka namela anao ho noana, ary nanome anao ny mana hohaninao, izay tsy fantatrao na ny razanao, mba hampahafantarany anao fa tsy mofo ihany no iveloman’ny olona fa izay rehetra aloaky ny vavan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy rovitra ny fitafianao teny aminao ary tsy nivonto ny tongotrao izay efapolo taona izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa aoka ho fantatrao amin’ny fonao, fa tahaka ny fananaran’ny olona ny zanany no fananaran’NY TOMPO Andriamanitrao anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tandremo ny didin’NY TOMPO Andriamanitrao mba handehananao amin’ny lalany sy hatahoranao Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo fakam-panahy any amin’ny tany nampanantenaina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa NY TOMPO Andriamanitrao efa hampiditra anao any amin’ny tany soa, dia tany misy renirano sy loharano ary rano lalina, eny an-dohasaha sy any an-tendrombohitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'tany misy karazam-barimbazaha, voaloboka sy aviavy sy ampongabendanitra, tany misy hazo oliva sy tantely; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: tany izay hihinananao hanina amin’ny fanaranam-po, sady tsy hisy zava-mahory anao ao; tany misy vy ny vato ao aminy, ary ao amin’ny tendrombohiny no hihadianao varahina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa hihinana ianao ka ho voky dia hisaotra NY TOMPO Andriamanitrao noho ny tany soa izay nomeny anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa mitandrema, fandrao hadinoinao NY TOMPO Andriamanitrao ka tsy tandremanao ny didiny sy ny fitsipiny ary ny lalànany, izay omeko anao anio; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'fandrao rehefa hihinana ianao ka ho voky, fandrao rehefa hanorina trano tsara ianao sady hitoetra ao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'fandrao rehefa hihamaro ny ombinao sy ny ondry aman’osinao sady hitombo koa ny volafotsinao sy ny volamenanao, no hitombo ny fanananao rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia hiavonavona ny fonao ka hohadinoinao NY TOMPO Andriamanitrao izay nitondra anao nivoaka avy tany amin’ny tany Ejipta, tamin’ny trano nanandevozana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'izay nitondra anao tany an-tany efitra lehibe sy mahatahotra, izay misy menarana mandoro sy maingoka, dia ny tany mangetana tsy misy rano; Izy koa no nampivoaka rano ho anao avy tamin’ny vatolampy vatoafo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izy no nanome anao mana hohanina tany an-tany efitra, dia zavatra tsy fantatry ny razanao, mba hampanetry tena anao sy hizahana toetra anao nefa hanisy soa anao amin’ny ho avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aoka ianao tsy hiteny anakampo hoe: Ny tanjako sy ny herin’ny tanako no nahavoriako izao harena izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'fa tsarovy NY TOMPO Andriamanitrao, satria Izy no manome anao hery hahavory harena mba haoriny ny fanekeny izay nianianany tamin’ny razanao, tahaka izao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa raha toa ka manadino NY TOMPO Andriamanitrao ianao ka manaraka izay andriamanitra hafa sady manompo azy no miankohoka eo anatrehany dia milaza aminareo marimarina aho fa haringana tokoa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tahaka ny andringanana ny firenen-tsamihafa, izay aringan’NY TOMPO eo anoloanareo, no handringanana anareo satria tsy nihaino ny feon’NY TOMPO Andriamanitrareo ianareo.
