document_id: DEU.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nitaiza ny Israely tany an-tany efitra NY TOMPO
  - type: text
    content: 'Ny lalàna rehetra izay omeko anao anio dia tandremo ka araho, mba ho velona sy hihamaro ianareo ary hiditra sady handova ny tany izay nianianan’NY TOMPO tamin’ny razanareo homena azy. '
  '10':
  - type: text
    content: 'Rehefa hihinana ianao ka ho voky dia hisaotra NY TOMPO Andriamanitrao noho ny tany soa izay nomeny anao. '
  '11':
  - type: text
    content: 'Koa mitandrema, fandrao hadinoinao NY TOMPO Andriamanitrao ka tsy tandremanao ny didiny sy ny fitsipiny ary ny lalànany, izay omeko anao anio; '
  '12':
  - type: text
    content: 'fandrao rehefa hihinana ianao ka ho voky, fandrao rehefa hanorina trano tsara ianao sady hitoetra ao, '
  '13':
  - type: text
    content: 'fandrao rehefa hihamaro ny ombinao sy ny ondry aman’osinao sady hitombo koa ny volafotsinao sy ny volamenanao, no hitombo ny fanananao rehetra, '
  '14':
  - type: text
    content: 'dia hiavonavona ny fonao ka hohadinoinao NY TOMPO Andriamanitrao izay nitondra anao nivoaka avy tany amin’ny tany Ejipta, tamin’ny trano nanandevozana, '
  '15':
  - type: text
    content: 'izay nitondra anao tany an-tany efitra lehibe sy mahatahotra, izay misy menarana mandoro sy maingoka, dia ny tany mangetana tsy misy rano; Izy koa no nampivoaka rano ho anao avy tamin’ny vatolampy vatoafo; '
  '16':
  - type: text
    content: 'Izy no nanome anao mana hohanina tany an-tany efitra, dia zavatra tsy fantatry ny razanao, mba hampanetry tena anao sy hizahana toetra anao nefa hanisy soa anao amin’ny ho avy. '
  '17':
  - type: text
    content: 'Aoka ianao tsy hiteny anakampo hoe: Ny tanjako sy ny herin’ny tanako no nahavoriako izao harena izao; '
  '18':
  - type: text
    content: 'fa tsarovy NY TOMPO Andriamanitrao, satria Izy no manome anao hery hahavory harena mba haoriny ny fanekeny izay nianianany tamin’ny razanao, tahaka izao anio izao. '
  '19':
  - type: text
    content: 'Fa raha toa ka manadino NY TOMPO Andriamanitrao ianao ka manaraka izay andriamanitra hafa sady manompo azy no miankohoka eo anatrehany dia milaza aminareo marimarina aho fa haringana tokoa ianareo. '
  '2':
  - type: text
    content: 'Tsarovy ny lalana rehetra izay nitondran’NY TOMPO Andriamanitrao anao tany an-tany efitra izay efapolo taona izay, fa Izy no hampanetry tena anao sy hizaha toetra anao ary hahafantatra izay ao am-ponao, na hitandrina ny didiny ianao, na tsia. '
  '20':
  - type: text
    content: Tahaka ny andringanana ny firenen-tsamihafa, izay aringan’NY TOMPO eo anoloanareo, no handringanana anareo satria tsy nihaino ny feon’NY TOMPO Andriamanitrareo ianareo.
  '3':
  - type: text
    content: 'Dia nampanetry tena anao Izy ka namela anao ho noana, ary nanome anao ny mana hohaninao, izay tsy fantatrao na ny razanao, mba hampahafantarany anao fa tsy mofo ihany no iveloman’ny olona fa izay rehetra aloaky ny vavan’NY TOMPO. '
  '4':
  - type: text
    content: 'Tsy rovitra ny fitafianao teny aminao ary tsy nivonto ny tongotrao izay efapolo taona izay. '
  '5':
  - type: text
    content: 'Koa aoka ho fantatrao amin’ny fonao, fa tahaka ny fananaran’ny olona ny zanany no fananaran’NY TOMPO Andriamanitrao anao. '
  '6':
  - type: text
    content: Tandremo ny didin’NY TOMPO Andriamanitrao mba handehananao amin’ny lalany sy hatahoranao Azy.
  - type: heading
    content: Ireo fakam-panahy any amin’ny tany nampanantenaina
  '7':
  - type: text
    content: 'Fa NY TOMPO Andriamanitrao efa hampiditra anao any amin’ny tany soa, dia tany misy renirano sy loharano ary rano lalina, eny an-dohasaha sy any an-tendrombohitra; '
  '8':
  - type: text
    content: 'tany misy karazam-barimbazaha, voaloboka sy aviavy sy ampongabendanitra, tany misy hazo oliva sy tantely; '
  '9':
  - type: text
    content: tany izay hihinananao hanina amin’ny fanaranam-po, sady tsy hisy zava-mahory anao ao; tany misy vy ny vato ao aminy, ary ao amin’ny tendrombohiny no hihadianao varahina.
