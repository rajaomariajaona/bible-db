document_id: 1SA.10,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nandray tavoara feno diloilo i Samoela ka nanidina izany teo an-dohan’i Saoly sady nanoroka azy ary niteny hoe: Tsy nanosotra anao mba ho mpanapaka ny lovany va NY TOMPO? '
  '10':
  - type: text
    content: 'Rehefa tonga tany Gibea izy dia indro, nisy mpaminany maro iray dia, nifanena taminy; ary tonga tamin’i Saoly ny Fanahin’Andriamanitra ka naminany teo anivon’ireo izy. '
  '11':
  - type: text
    content: 'Nony hitan’izay rehetra nahafantatra azy talohan’io fa indro, maminany miaraka amin’ny mpaminany izy dia nifampilaza ny olona hoe: Inona izao tonga amin’ny zanak’i Kisy izao? I Saoly koa va mba isan’ny mpaminany? '
  '12':
  - type: text
    content: 'Ary hoy koa ny iray tamin’izy ireo: Fa iza moa no rain’ireny? Izany no nisehoan’ny fitenenana hoe: I Saoly koa va mba isan’ny mpaminany?'
  '13':
  - type: text
    content: 'Rehefa nitsahatra naminany i Saoly dia nankeo amin’ny toerana fanaovana sorona. '
  '14':
  - type: text
    content: 'Hoy ny rahalahin-drain’i Saoly taminy sy tamin’ny mpanompony: Taiza no nalehanareo? Ary hoy ny navaliny: Nitady ny boriky izahay. Nony tsy hitanay dia nankany amin’i Samoela izahay. '
  '15':
  - type: text
    content: 'Hoy ny rahalahin-drain’i Saoly: Miangavy anao aho, lazao amiko izay nolazain’i Samoela taminao. '
  '16':
  - type: text
    content: 'Dia hoy i Saoly tamin’ny rahalahin-drainy: Nambarany taminay tokoa fa efa hita ny boriky. Fa ilay nolazain’i Samoela ny amin’ny fanjakana dia tsy mba nambarany taminy.'
  - type: heading
    content: Voatendry ho mpanjaka tamin’ny alalan’ny antsapaka i Saoly
  '17':
  - type: text
    content: 'Ary namory ny vahoaka ho any amin’NY TOMPO any Mizpa i Samoela '
  '18':
  - type: text
    content: 'ka niteny tamin’ny Zanak’Israely hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Izaho no nitondra ny Israely niakatra avy tany Ejipta ka namonjy anareo tamin’ny tanan’ny Ejiptiana sy tamin’ny tanan’ny fanjakana rehetra izay nampahory anareo. '
  '19':
  - type: text
    content: 'Nefa ianareo kosa androany dia nandà an’Andriamanitrareo izay mamonjy anareo amin’ny zavatra manjo anareo sy ny fahorianareo rehetra, satria hoy ianareo Taminy: Tsia, fa manendre mpanjaka ho anay. Koa ankehitriny, mijoroa eo anatrehan’NY TOMPO araka ny fokonareo sy ny fianakavianareo avy.'
  '2':
  - type: text
    content: 'Rehefa misaraka amiko ianao anio dia hahita olona roa lahy eo anilan’ny fasan’i Rahely, ao amin’ny faritry ny tanin’ny Benjamina, ao Zelza, ary hilaza aminao izy ireo hoe: Efa hita ny boriky izay notadiavinao; ary indro, tsy ny boriky intsony no heverin’ny rainao fa ianareo kosa indray no mampanahy azy ka hoy izy: Ahoana re no hataoko ny amin’ny zanako? '
  '20':
  - type: text
    content: 'Dia nampanatona ny foko rehetra teo amin’ny Israely i Samoela ka ny fokon’i Benjamina no voatendry. '
  '21':
  - type: text
    content: 'Ary nampanatona ny fokon’i Benjamina araka ny antokony avy izy ka ny antokon’i Matrita no voatendry. Dia voatendry i Saoly, zanak’i Kisy; kanefa rehefa nitady azy ny olona dia tsy nahita azy. '
  '22':
  - type: text
    content: 'Dia nanontany tamin’NY TOMPO indray ny olona, na mba efa tonga ao Ralehilahy, na tsia. Hoy NY TOMPO: Indro, miery ao amin’ny entana izy. '
  '23':
  - type: text
    content: 'Dia nihazakazaka ny olona ka naka azy tao; ary rehefa nitsangana teo afovoan’ny olona izy dia hita fa nanan-tombo noho ny olona rehetra hatramin’ny sorony noho miakatra ny halavany. '
  '24':
  - type: text
    content: 'Ary hoy i Samoela tamin’ny vahoaka rehetra: Hitanareo va izay nofidin’NY TOMPO? Tsy misy tahaka azy eo amin’ny vahoaka rehetra! Dia nihoby ny vahoaka rehetra ka niteny hoe: Ho ela velona anie ny mpanjaka!'
  '25':
  - type: text
    content: Ary nilaza tamin’ny olona izay satan’ny fanjakana i Samoela, dia nosoratany tamin’ny taratasy izany ka napetrany teo anatrehan’NY TOMPO. Ary samy nalefan’i Samoela hody any an-tranony avy ny vahoaka rehetra.
  '26':
  - type: text
    content: 'Dia mba nandeha nody tany Gibea koa i Saoly, ary nomba azy ny olona maro izay nokasihin’Andriamanitra ny fony. '
  '27':
  - type: text
    content: 'Fa nisy kosa olona tena ratsy fanahy niteny hoe: Hataon’io lehilahy io ahoana no famonjy antsika? Dia nanazimbazimba an’i Saoly ireo ka tsy nitondra fanomezana ho azy. Nangina anefa i Saoly.'
  '3':
  - type: text
    content: 'Handroso hiala avy eo ianao ka ho tonga eo amin’ny hazo terebinta any Tabara, dia hifanena amin’ny olona telo lahy miakatra ho any amin’Andriamanitra any Betela, ny iray dia mitondra zanak’osy telo, ny iray dia mitondra mofo telo ary ny iray dia mitondra divay eran’ny siny hoditra; '
  '4':
  - type: text
    content: 'ary hiarahaba anao ireo sady hanome anao mofo roa, dia horaisinao avy amin’ny tanany izany. '
  '5':
  - type: text
    content: 'Aorianan’izay dia ho tonga any Gibean’Andriamanitra izay misy tobin’ny miaramilan’ny Filistina ianao; rehefa tonga ao an-tanàna ianao dia hifanena amin’ny mpaminany maro iray dia, midina avy ao amin’ny toerana fanaovana sorona, mitondra lokanga sy ampongatapaka ary sodina sy valiha eo alohany, dia haminany ireo. '
  '6':
  - type: text
    content: 'Ary ho tonga aminao ny Fanahin’NY TOMPO ka hiaraka haminany aminy ianao dia ho voaova ho olom-baovao. '
  '7':
  - type: text
    content: 'Rehefa tonga aminao ireo famantarana ireo dia ataovy izay azon’ny tananao atao, fa Andriamanitra no momba anao. '
  '8':
  - type: text
    content: Hidina eo alohako ho any Gilgala ianao, ary indro, hidina ho any aminao aho mba hanolotra fanatitra dorana manontolo sy fanati-pihavanana. Koa hafitoana no hiandrasanao mandra-pahatongako eo aminao, dia holazaiko anao izay hataonao.
  '9':
  - type: text
    content: 'Raha vao nihodina niala teo amin’i Samoela i Saoly dia nomen’Andriamanitra fo vaovao; ary tanteraka avokoa, tamin’io andro io ihany, ireo famantarana rehetra ireo. '
