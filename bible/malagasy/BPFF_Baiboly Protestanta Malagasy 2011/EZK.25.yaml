document_id: EZK.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny Amonita
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Hatolotro ho fananan’ny zanaky ny Atsinanana, tahaka ny taranak’i Amona koa izy, mba tsy hotsarovana any amin’ny firenena intsony ny taranak’i Amona. '
  '11':
  - type: text
    content: Ary hotanterahiko ny fitsarana an’i Moaba; dia ho fantany fa Izaho no TOMPO.
  - type: heading
    content: Faminaniana ny amin’ny Edomita
  '12':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Noho ireo valifaty nataon’i Edoma tamin’ny taranak’i Joda ka nahameloka azy be tamin’izany valifaty izany, '
  '13':
  - type: text
    content: 'dia izao no lazain’NY TOMPO Andriamanitra: Hatsotrako amin’i Edoma ny tanako ka haringako ny olona sy ny biby ao aminy; hataoko lao hatrany Temana izy sy ho lavon’ny sabatra hatrany Dedana. '
  '14':
  - type: text
    content: Ny tanan’ny Israely oloko no hoentiko mamaly an’i Edoma ka hamely azy araka ny fahatezerako sy ny fahavinirako ireo; dia ho fantany ny famaliako, hoy NY TOMPO Andriamanitra.
  - type: heading
    content: Faminaniana ny amin’ny Filistina
  '15':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Noho ny valifaty nataon’ny Filistina, eny, noho izy namalifaty sy ny fanaovana tsinontsinona tamin’ny fony rehetra ka nandringana noho ny fandrafiany hatry ny fony ela, '
  '16':
  - type: text
    content: 'dia izao no lazain’NY TOMPO Andriamanitra: Indro, hatsotrako amin’ny Filistina ny tanako ka haringako ny Keretita'
  - type: note
    content: 'Keretita na: Kretana. Anarana ilazana koa ny Filistina.'
  - type: text
    content: ' ary holevoniko izay sisa any amoron-dranomasina; '
  '17':
  - type: text
    content: Famaizana mirehitra no hoentiko manatanteraka famaliana lehibe aminy. Dia ho fantany fa Izaho no TOMPO rehefa hataoko mihatra aminy ny famaliako.
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', manandrifia ny Amonita ary maminania ny hamelezana azy '
  '3':
  - type: text
    content: 'ka lazao aminy hoe: Mihainoa ny tenin’NY TOMPO Andriamanitra! Izao no lazain’NY TOMPO Andriamanitra: Noho ny nitenenanao hoe: Hia! Akory izay! Rehefa nolotoina ny fitoerako masina ka nopotehina ny tanin’ny Israely, sady lasan-ko babo ny taranak’i Joda, '
  '4':
  - type: text
    content: 'dia indro, hatolotro ho fananan’ny zanaky ny Atsinanana kosa ianao ka haoriny ao aminao ny tobiny, ary hataony ao aminao ny fonenany; ireny no hihinana ny vokatrao sy hisotro ny ronononao. '
  '5':
  - type: text
    content: 'Raba dia hataoko tany fitoeran’ny rameva, ary ny taranak’i Amona ho tany fandrian’ny ondry aman’osy; dia ho fantatrareo fa Izaho no TOMPO. '
  '6':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO Andriamanitra: Noho ny nitehafanao tanana sy ny nitotoanao tamin’ny tongotrao ary ny nifalian’ny fonao tamin’ny fanaovana tsinontsinona ny tanin’ny Israely '
  '7':
  - type: text
    content: 'dia indro, hatsotrako aminao ny tanako ka hatolotro ho babon’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ianao; hofongorako tsy ho vanon-ko firenena intsony ianao ka hataoko lany ritra tsy ho amin’ny tany; eny, haringako ianao; dia ho fantatrao fa Izaho no TOMPO.'
  - type: heading
    content: Faminaniana ny amin’ny Moabita
  '8':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: 'Noho ny nanaovan’i Moaba sy i Seìra hoe: Indro, ny taranak’i Joda izao dia efa tonga tahaka ny firenena rehetra '
  '9':
  - type: text
    content: 'dia indro, hotatahako kosa ny sisin’ny Moaba, hatrany amin’ny tanànany rehetra, ny tanànany izay ravaky ny tany, hatrany amin’ny sisintaniny, dia i Bety-Jesimota sy i Baala-Meona ary i Kiriataima. '
