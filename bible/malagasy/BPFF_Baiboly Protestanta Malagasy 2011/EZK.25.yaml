document_id: EZK.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin’ny Amonita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', manandrifia ny Amonita ary maminania ny hamelezana azy '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka lazao aminy hoe: Mihainoa ny tenin’NY TOMPO Andriamanitra! Izao no lazain’NY TOMPO Andriamanitra: Noho ny nitenenanao hoe: Hia! Akory izay! Rehefa nolotoina ny fitoerako masina ka nopotehina ny tanin’ny Israely, sady lasan-ko babo ny taranak’i Joda, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia indro, hatolotro ho fananan’ny zanaky ny Atsinanana kosa ianao ka haoriny ao aminao ny tobiny, ary hataony ao aminao ny fonenany; ireny no hihinana ny vokatrao sy hisotro ny ronononao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raba dia hataoko tany fitoeran’ny rameva, ary ny taranak’i Amona ho tany fandrian’ny ondry aman’osy; dia ho fantatrareo fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO Andriamanitra: Noho ny nitehafanao tanana sy ny nitotoanao tamin’ny tongotrao ary ny nifalian’ny fonao tamin’ny fanaovana tsinontsinona ny tanin’ny Israely '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia indro, hatsotrako aminao ny tanako ka hatolotro ho babon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' ianao; hofongorako tsy ho vanon-ko firenena intsony ianao ka hataoko lany ritra tsy ho amin’ny tany; eny, haringako ianao; dia ho fantatrao fa Izaho no TOMPO.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin’ny Moabita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Noho ny nanaovan’i Moaba sy i Seìra hoe: Indro, ny taranak’i Joda izao dia efa tonga tahaka ny firenena rehetra '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia indro, hotatahako kosa ny sisin’ny Moaba, hatrany amin’ny tanànany rehetra, ny tanànany izay ravaky ny tany, hatrany amin’ny sisintaniny, dia i Bety-Jesimota sy i Baala-Meona ary i Kiriataima. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hatolotro ho fananan’ny zanaky ny Atsinanana, tahaka ny taranak’i Amona koa izy, mba tsy hotsarovana any amin’ny firenena intsony ny taranak’i Amona. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary hotanterahiko ny fitsarana an’i Moaba; dia ho fantany fa Izaho no TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin’ny Edomita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Noho ireo valifaty nataon’i Edoma tamin’ny taranak’i Joda ka nahameloka azy be tamin’izany valifaty izany, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia izao no lazain’NY TOMPO Andriamanitra: Hatsotrako amin’i Edoma ny tanako ka haringako ny olona sy ny biby ao aminy; hataoko lao hatrany Temana izy sy ho lavon’ny sabatra hatrany Dedana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny tanan’ny Israely oloko no hoentiko mamaly an’i Edoma ka hamely azy araka ny fahatezerako sy ny fahavinirako ireo; dia ho fantany ny famaliako, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin’ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Noho ny valifaty nataon’ny Filistina, eny, noho izy namalifaty sy ny fanaovana tsinontsinona tamin’ny fony rehetra ka nandringana noho ny fandrafiany hatry ny fony ela, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia izao no lazain’NY TOMPO Andriamanitra: Indro, hatsotrako amin’ny Filistina ny tanako ka haringako ny Keretita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Keretita '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Kretana. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anarana ilazana koa ny Filistina.
    marker-yv: yv-n
  - type: text
    text: ' ary holevoniko izay sisa any amoron-dranomasina; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Famaizana mirehitra no hoentiko manatanteraka famaliana lehibe aminy. Dia ho fantany fa Izaho no TOMPO rehefa hataoko mihatra aminy ny famaliako.
