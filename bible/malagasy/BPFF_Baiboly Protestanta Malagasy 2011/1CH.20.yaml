document_id: 1CH.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namaboan’i Joaba an’i Raba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Sam 11.1; 12.26-31
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa niherina ny taona ka tonga amin’ny andro fandehanan’ny mpanjaka hiady dia nitondra ny miaramila rehetra i Joaba ka nandrava ny tanin’ny taranak’i Amona. Dia tonga izy ka nanao fahirano an’i Raba. I Davida kosa dia nijanona tany Jerosalema ihany. Nahazo an’i Raba i Joaba ka nandrava azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nesorin’i Davida ny satroboninahitra teo an-dohan’ny mpanjakany ka hitany fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' volamena iray no lanjany sady nisy vatosoa; dia nisatrohan’i Davida izany. Navoakany ny babo azo tao an-tanàna ka be dia be. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Navoakany koa ny olona izay tao ka nasainy niasa tamin’ny tsofa sy tamin’ny ragiragy lehibe ary ny famaky; toy izany no nataon’i Davida tamin’ny tanànan’ny taranak’i Amona rehetra. Avy eo dia niverina nankany Jerosalema i Davida sy ny vahoaka rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ady tamin’ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Sam 21.18-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tatỳ aoriana dia nisy ady tamin’ny Filistina tao Gezera; tamin’izany no namonoan’i Sibekay hosatita an’i Sipay, izay isan’ny taranaky ny Refaìta, dia naetriny ny Filistina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nisy ady indray tamin’ny Filistina, ary i Elanana, zanak’i Jaira, dia namono an’i Lamy, rahalahin’i Goliata gatita, izay nanana zaran-defona tahaka ny voditenon’ny mpanenona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nisy ady indray tao Gata; ary tao dia nisy lehilahy goavana izay enin-drantsana, efatra amby roapolo no isan’ny rantsantanany sy ny rantsantongony; ary izy koa dia isan’ny taranaky ny Refaìta. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nony nihantsy ny Israely izy dia nahafaty azy i Jonatana, zanak’i Simea, rahalahin’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ireo no taranaky ny Refaìta tao Gata; matin’ny tanan’i Davida sy ny tanan’ny mpanompony ireo.
