document_id: 1CH.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namaboan’i Joaba an’i Raba
  - type: heading
    content: 2Sam 11.1; 12.26-31
  - type: text
    content: 'Rehefa niherina ny taona ka tonga amin’ny andro fandehanan’ny mpanjaka hiady dia nitondra ny miaramila rehetra i Joaba ka nandrava ny tanin’ny taranak’i Amona. Dia tonga izy ka nanao fahirano an’i Raba. I Davida kosa dia nijanona tany Jerosalema ihany. Nahazo an’i Raba i Joaba ka nandrava azy. '
  '2':
  - type: text
    content: 'Dia nesorin’i Davida ny satroboninahitra teo an-dohan’ny mpanjakany ka hitany fa '
  - type: text
    content: talenta
  - type: text
    content: ' volamena iray no lanjany sady nisy vatosoa; dia nisatrohan’i Davida izany. Navoakany ny babo azo tao an-tanàna ka be dia be. '
  '3':
  - type: text
    content: Navoakany koa ny olona izay tao ka nasainy niasa tamin’ny tsofa sy tamin’ny ragiragy lehibe ary ny famaky; toy izany no nataon’i Davida tamin’ny tanànan’ny taranak’i Amona rehetra. Avy eo dia niverina nankany Jerosalema i Davida sy ny vahoaka rehetra.
  - type: heading
    content: Ny ady tamin’ny Filistina
  - type: heading
    content: 2Sam 21.18-22
  '4':
  - type: text
    content: Tatỳ aoriana dia nisy ady tamin’ny Filistina tao Gezera; tamin’izany no namonoan’i Sibekay hosatita an’i Sipay, izay isan’ny taranaky ny Refaìta, dia naetriny ny Filistina.
  '5':
  - type: text
    content: Nisy ady indray tamin’ny Filistina, ary i Elanana, zanak’i Jaira, dia namono an’i Lamy, rahalahin’i Goliata gatita, izay nanana zaran-defona tahaka ny voditenon’ny mpanenona.
  '6':
  - type: text
    content: 'Nisy ady indray tao Gata; ary tao dia nisy lehilahy goavana izay enin-drantsana, efatra amby roapolo no isan’ny rantsantanany sy ny rantsantongony; ary izy koa dia isan’ny taranaky ny Refaìta. '
  '7':
  - type: text
    content: 'Ary nony nihantsy ny Israely izy dia nahafaty azy i Jonatana, zanak’i Simea, rahalahin’i Davida. '
  '8':
  - type: text
    content: Ireo no taranaky ny Refaìta tao Gata; matin’ny tanan’i Davida sy ny tanan’ny mpanompony ireo.
