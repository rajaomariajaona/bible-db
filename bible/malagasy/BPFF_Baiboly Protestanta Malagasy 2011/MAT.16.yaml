document_id: MAT.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy misy famantarana avy any an-danitra
  - type: heading
    content: Mar 8.11-13; Lio 11.16, 29
  - type: text
    content: 'Nankeo Aminy indray ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' sy ny Sadoseo dia naka fanahy Azy ka nangataka Azy haneho famantarana aminy avy any an-danitra. '
  '10':
  - type: text
    content: 'Na ny mofo fito ho an’ny olona efatra arivo, firy sobika moa no nangoninareo? '
  '11':
  - type: text
    content: 'Ahoana no tsy ahafantaranareo fa tsy ny amin’ny mofo no nolazaiko taminareo? Fa hoe tandremo mba tsy ho azon’ny masirasiran’ny Fariseo sy ny Sadoseo. '
  '12':
  - type: text
    content: Teo vao fantany fa tsy nasainy hitandrina ny amin’ny masirasira fanaovana mofo izy ireo fa ny amin’ny fampianaran’ny Fariseo sy ny Sadoseo.
  - type: heading
    content: Ny naneken’i Petera an’i Jesosy ho Kristy
  - type: heading
    content: Mar 8.27-30; Lio 9.18-21; ampit. Jao 6.66-71
  '13':
  - type: text
    content: 'Rehefa tonga tany amin’ny faritanin’i Kaisarian’i Filipo Jesosy dia nanontany ny mpianany Izy hoe: Lazain’ny olona ho iza moa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: '? '
  '14':
  - type: text
    content: 'Ary hoy ireo: Ny sasany dia milaza hoe: Jaona Mpanao batisa; ary ny sasany dia milaza hoe: Elia; ary hoy ny sasany: Jeremia, na iray amin’ireo mpaminany. '
  '15':
  - type: text
    content: 'Ary hoy Jesosy taminy: Fa ianareo kosa mba milaza Ahy ho iza? '
  '16':
  - type: text
    content: 'Namaly i Simona Petera hoe: Ianao no '
  - type: text
    content: Kristy
  - type: text
    content: ', Zanak’Andriamanitra velona. '
  '17':
  - type: text
    content: 'Dia hoy indray Jesosy taminy: Sambatra ianao, ry Simona, zanak’i Jona; fa tsy nofo aman-dra no naneho anao izany fa ny Raiko izay any an-danitra. '
  '18':
  - type: text
    content: Ary Izaho koa milaza aminao fa ianao no Petera
  - type: note
    content: 'Petera: Vato.'
  - type: text
    content: ', ary eo ambonin’ity vatolampy ity no haoriko ny fiangonako'
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: '; ary ny vavahadin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' dia tsy haharesy azy. '
  '19':
  - type: text
    content: Homeko anao ny fanalahidin’ny fanjakan’ny lanitra; koa na inona na inona fehezinao etỳ ambonin’ny tany dia hofehezina any an-danitra ary na inona na inona vahànao etỳ ambonin’ny tany dia hovahana any an-danitra.
  '2':
  - type: text
    content: 'Ary Izy namaly azy ireo hoe: Rehefa hariva ny andro dia hoy ianareo: Ho tsara ny andro fa mena ny lanitra. '
  '20':
  - type: text
    content: Tamin’izany dia nandrara ny mpianatra Izy mba tsy hilaza amin’olona akory fa Izy no Kristy.
  - type: heading
    content: Ambaran’i Jesosy ny hahafatesany sy ny hitsanganany amin’ny maty
  - type: heading
    content: Mar 8.31-33; Lio 9.22
  '21':
  - type: text
    content: 'Hatramin’izay andro izay no nanombohan’i Jesosy naneho tamin’ny mpianany fa tsy maintsy hankany Jerosalema Izy ka hampijaly Azy mafy ny loholona sy ny lehiben’ny mpisorona ary ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ', dia hovonoina Izy ary hatsangana amin’ny andro fahatelo. '
  '22':
  - type: text
    content: 'Ary nitondra Azy nihataka kely i Petera ka niteny Azy mafy hoe: Sanatria Aminao izany, Tompoko! Tsy ho Aminao mihitsy izany. '
  '23':
  - type: text
    content: 'Fa Izy nihodina ka niteny tamin’i Petera hoe: Mankanesa ato ivohoko, ry Satana; fandrika ho Ahy ianao, satria tsy misaina izay an’Andriamanitra ianao, fa izay an’ny olona.'
  - type: heading
    content: Ny fomba fanarahana an’i Jesosy
  - type: heading
    content: Mar 8.34–9.1; Lio 9.23-27
  '24':
  - type: text
    content: 'Dia hoy Jesosy tamin’ny mpianany: Raha misy olona ta hanaraka Ahy dia aoka izy handa ny tenany sy hitondra ny hazofijaliany ka hanaraka Ahy. '
  '25':
  - type: text
    content: 'Fa na iza na iza no ta hamonjy ny ainy dia hahavery azy; ary na iza na iza no hahavery ny ainy noho ny Amiko dia hahazo izany. '
  '26':
  - type: text
    content: 'Fa inona moa no soa ho azon’ny olona, raha mahazo izao tontolo izao izy, kanefa very ny ainy? Ary inona moa no homen’ny olona ho takalon’ny ainy? '
  '27':
  - type: text
    content: 'Fa ho avy ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' amin’ny voninahitry ny Rainy, miaraka amin’ny anjeliny, dia hamaly ny olona rehetra araka ny asany. '
  '28':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny Zanak’Olona avy amin’ny fanjakany.'
  '3':
  - type: text
    content: 'Ary amin’ny maraina dia hoy ianareo: Ho ratsy ny andro fa mena sy manjombona ny lanitra. Hainareo ny mamantatra ny endriky ny lanitra, fa ny famantarana ny fotoana dia tsy hainareo. '
  '4':
  - type: text
    content: Izay taranaka ratsy fanahy sy mijangajanga dia fatra-pitady famantarana; nefa tsy misy famantarana homena azy, afa-tsy ny famantarana ny amin’i Jona ihany. Dia nandao azy Jesosy ka lasa.
  - type: heading
    content: Ny masirasiran’ny Fariseo sy ny Sadoseo
  - type: heading
    content: Mar 8.14-21
  '5':
  - type: text
    content: 'Rehefa tonga teny ampita ny mpianatra dia nanadino nitondra mofo. '
  '6':
  - type: text
    content: 'Dia hoy Jesosy taminy: Mandiniha ianareo ka mitandrema mba tsy ho azon’ny masirasiran’ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' sy ny '
  - type: text
    content: Sadoseo
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Dia nifampiresaka izy ireo hoe: Ny tsy nitondrantsika mofo angamba izany. '
  '8':
  - type: text
    content: 'Ary Jesosy nahalala ny resany ka niteny tamin’ireo hoe: Nahoana no mifampiresaka ny amin’ny tsy fanananareo mofo ianareo, ry kely finoana? '
  '9':
  - type: text
    content: 'Tsy mbola azonareo ary tsy tsaroanareo va ny mofo dimy ho an’ny olona dimy arivo, firy harona moa no nangoninareo? '
