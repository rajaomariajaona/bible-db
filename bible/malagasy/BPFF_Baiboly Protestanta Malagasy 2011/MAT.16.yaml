document_id: MAT.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy misy famantarana avy any an-danitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 8.11-13; Lio 11.16, 29
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nankeo Aminy indray ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' sy ny Sadoseo dia naka fanahy Azy ka nangataka Azy haneho famantarana aminy avy any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Izy namaly azy ireo hoe: Rehefa hariva ny andro dia hoy ianareo: Ho tsara ny andro fa mena ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary amin’ny maraina dia hoy ianareo: Ho ratsy ny andro fa mena sy manjombona ny lanitra. Hainareo ny mamantatra ny endriky ny lanitra, fa ny famantarana ny fotoana dia tsy hainareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay taranaka ratsy fanahy sy mijangajanga dia fatra-pitady famantarana; nefa tsy misy famantarana homena azy, afa-tsy ny famantarana ny amin’i Jona ihany. Dia nandao azy Jesosy ka lasa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny masirasiran’ny Fariseo sy ny Sadoseo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 8.14-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa tonga teny ampita ny mpianatra dia nanadino nitondra mofo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy Jesosy taminy: Mandiniha ianareo ka mitandrema mba tsy ho azon’ny masirasiran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadoseo
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nifampiresaka izy ireo hoe: Ny tsy nitondrantsika mofo angamba izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Jesosy nahalala ny resany ka niteny tamin’ireo hoe: Nahoana no mifampiresaka ny amin’ny tsy fanananareo mofo ianareo, ry kely finoana? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsy mbola azonareo ary tsy tsaroanareo va ny mofo dimy ho an’ny olona dimy arivo, firy harona moa no nangoninareo? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Na ny mofo fito ho an’ny olona efatra arivo, firy sobika moa no nangoninareo? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ahoana no tsy ahafantaranareo fa tsy ny amin’ny mofo no nolazaiko taminareo? Fa hoe tandremo mba tsy ho azon’ny masirasiran’ny Fariseo sy ny Sadoseo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Teo vao fantany fa tsy nasainy hitandrina ny amin’ny masirasira fanaovana mofo izy ireo fa ny amin’ny fampianaran’ny Fariseo sy ny Sadoseo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny naneken’i Petera an’i Jesosy ho Kristy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 8.27-30; Lio 9.18-21; ampit. Jao 6.66-71
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa tonga tany amin’ny faritanin’i Kaisarian’i Filipo Jesosy dia nanontany ny mpianany Izy hoe: Lazain’ny olona ho iza moa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy ireo: Ny sasany dia milaza hoe: Jaona Mpanao batisa; ary ny sasany dia milaza hoe: Elia; ary hoy ny sasany: Jeremia, na iray amin’ireo mpaminany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Jesosy taminy: Fa ianareo kosa mba milaza Ahy ho iza? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Namaly i Simona Petera hoe: Ianao no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', Zanak’Andriamanitra velona. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy indray Jesosy taminy: Sambatra ianao, ry Simona, zanak’i Jona; fa tsy nofo aman-dra no naneho anao izany fa ny Raiko izay any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary Izaho koa milaza aminao fa ianao no Petera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Petera: Vato.'
    marker-yv: yv-n
  - type: text
    text: ', ary eo ambonin’ity vatolampy ity no haoriko ny fiangonako'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: '; ary ny vavahadin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' dia tsy haharesy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Homeko anao ny fanalahidin’ny fanjakan’ny lanitra; koa na inona na inona fehezinao etỳ ambonin’ny tany dia hofehezina any an-danitra ary na inona na inona vahànao etỳ ambonin’ny tany dia hovahana any an-danitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tamin’izany dia nandrara ny mpianatra Izy mba tsy hilaza amin’olona akory fa Izy no Kristy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Jesosy ny hahafatesany sy ny hitsanganany amin’ny maty
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 8.31-33; Lio 9.22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hatramin’izay andro izay no nanombohan’i Jesosy naneho tamin’ny mpianany fa tsy maintsy hankany Jerosalema Izy ka hampijaly Azy mafy ny loholona sy ny lehiben’ny mpisorona ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ', dia hovonoina Izy ary hatsangana amin’ny andro fahatelo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nitondra Azy nihataka kely i Petera ka niteny Azy mafy hoe: Sanatria Aminao izany, Tompoko! Tsy ho Aminao mihitsy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa Izy nihodina ka niteny tamin’i Petera hoe: Mankanesa ato ivohoko, ry Satana; fandrika ho Ahy ianao, satria tsy misaina izay an’Andriamanitra ianao, fa izay an’ny olona.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fomba fanarahana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 8.34–9.1; Lio 9.23-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy Jesosy tamin’ny mpianany: Raha misy olona ta hanaraka Ahy dia aoka izy handa ny tenany sy hitondra ny hazofijaliany ka hanaraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa na iza na iza no ta hamonjy ny ainy dia hahavery azy; ary na iza na iza no hahavery ny ainy noho ny Amiko dia hahazo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa inona moa no soa ho azon’ny olona, raha mahazo izao tontolo izao izy, kanefa very ny ainy? Ary inona moa no homen’ny olona ho takalon’ny ainy? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa ho avy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' amin’ny voninahitry ny Rainy, miaraka amin’ny anjeliny, dia hamaly ny olona rehetra araka ny asany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny Zanak’Olona avy amin’ny fanjakany.'
