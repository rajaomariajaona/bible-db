document_id: 1SA.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny lavabaton’i Eny-Gedỳ: Namindra fo tamin’i Saoly i Davida'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niakatra niala teo i Davida ka nitoetra tao amin’ireo harambato tany Eny-Gedỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Rehefa niverina avy nanenjika ny Filistina i Saoly dia nisy nanambara taminy hoe: Indro i Davida dia any an-tany efitr’i Eny-Gedỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary naka telo arivo lahy voafantina tamin’ny Israely rehetra i Saoly ka lasa nitady an’i Davida sy ny olony tany amin’ny vatolampin’ny osidia. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia tonga teo amin’ny valan’ondry iray amoron-dalana izay nisy zohy i Saoly ka niditra tao mba hivoaka; i Davida sy ny olony anefa dia efa nipetraka tao anatin’ny zohy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ny olon’i Davida taminy: Izao no andro nolazain’NY TOMPO taminao hoe: Indro, hatolotro eo an-tananao ny fahavalonao, hataonao araka izay sitrakao. Dia nitsangana i Davida ka nitsaitsaika nanapaka ny sisin’ny akanjoben’i Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Taorianan’izany anefa dia nanenjika an’i Davida ny eritreriny noho ny nanapahany ny sisin’ny akanjoben’i Saoly '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka hoy izy tamin’ny olony: Sanatria amiko eo anatrehan’NY TOMPO raha hanao izany zavatra izany amin’ny tompoko izay voahosotry NY TOMPO aho ka hanatsotra ny tanako aminy, fa voahosotry NY TOMPO izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nandresy lahatra ny mpanompony tamin’izany teny izany i Davida ka tsy namela azy ireo hitsangana hamely an’i Saoly. Ary nitsangana i Saoly ka niala tao an-johy dia nandeha tamin’izay nalehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Taorianan’izay dia mba nitsangana koa i Davida ka niala tao an-johy ary niantso taorianan’i Saoly hoe: Ry mpanjaka tompoko ô! Nony nitodika nijery azy i Saoly dia niondrika tamin’ny tany i Davida ka niankohoka. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy i Davida tamin’i Saoly: Nahoana ianao no mihaino tenin’olona hoe: Indro, mitady hanisy ratsy anao i Davida? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indro, hitan’ny masonao androany ny nanoloran’NY TOMPO anao ho eo an-tanako, tao an-johy; ary nisy nilaza hevitra hamonoana anao, saingy niantra anao aho ka hoy aho: Tsy hanatsotra ny tanako amin’ny tompoko aho, fa voahosotry NY TOMPO izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary izao koa, ry Ikaky ô! Mba jereo tsara ange ny sisin’ny akanjobenao ivelany fa etỳ an-tanako; koa raha nanapaka ny sisin’ny akanjobenao ivelany aho nefa tsy namono anao dia fantaro ka jereo fa tsy misy faharatsiana na fahadisoana amin’ny tanako, ary tsy nanota taminao aho, nefa ianao kosa dia mihaza ny aiko mba hahazo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'NY TOMPO no hitsara ahy sy ianao, ary NY TOMPO no hamaly anao noho ny amiko, fa ny tanako dia tsy mba haninona anao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Araka ny lazain’ny ohabolan’ny Ntaolo hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Avy amin’ny ratsy fanahy no ivoahan’ny faharatsiam-panahy.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Nefa tsy haninona anao ny tanako. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hitady an’iza moa no nivoahan’ny mpanjakan’ny Israely? Iza no enjehinao? Amboa maty sa parasy iray? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka NY TOMPO no ho mpitsara ka hitsara ahy sy ianao ary hijery sy hisolo vava ahy ka hitsara sy hanafaka ahy amin’ny tananao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nony vita io teny nataon’i Davida tamin’i Saoly io, dia hoy i Saoly: Feonao va izany, ry Davida zanako ô? Ary nanandra-peo nitomany i Saoly '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'sady hoy izy tamin’i Davida: Marina noho izaho ianao satria ianao dia nanisy soa ahy, fa izaho kosa dia namaly ratsy anao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nasehonao androany ny nanaovanao soa tamiko, fa na dia natolotry NY TOMPO teo an-tananao aza aho dia tsy namono ahy ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha misy olona mahazo ny fahavalony, moa havelany handeha fotsiny amin’izao va izy? Hamaly soa anao anie NY TOMPO noho ny nataonao tamiko androany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Indro ankehitriny, fantatro fa ho mpanjaka tokoa ianao ary ny fanjakan’ny Israely dia ho tafatoetra eo an-tananao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa ankehitriny, mianiàna amiko amin’NY TOMPO ianao fa tsy handringana ny taranako mandimby ahy, ary tsy hovonoinao amin’ny fianakavian’ny raiko ny anarako. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary nianiana tamin’i Saoly i Davida; dia lasa nody i Saoly, fa i Davida sy ny olony kosa dia niakatra nankany amin’ny manda fiarovana.
