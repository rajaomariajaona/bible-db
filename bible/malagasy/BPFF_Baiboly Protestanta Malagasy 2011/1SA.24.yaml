document_id: 1SA.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny lavabaton’i Eny-Gedỳ: Namindra fo tamin’i Saoly i Davida'
  - type: text
    content: 'Dia niakatra niala teo i Davida ka nitoetra tao amin’ireo harambato tany Eny-Gedỳ. '
  '10':
  - type: text
    content: 'Ary hoy i Davida tamin’i Saoly: Nahoana ianao no mihaino tenin’olona hoe: Indro, mitady hanisy ratsy anao i Davida? '
  '11':
  - type: text
    content: 'Indro, hitan’ny masonao androany ny nanoloran’NY TOMPO anao ho eo an-tanako, tao an-johy; ary nisy nilaza hevitra hamonoana anao, saingy niantra anao aho ka hoy aho: Tsy hanatsotra ny tanako amin’ny tompoko aho, fa voahosotry NY TOMPO izy. '
  '12':
  - type: text
    content: 'Ary izao koa, ry Ikaky ô! Mba jereo tsara ange ny sisin’ny akanjobenao ivelany fa etỳ an-tanako; koa raha nanapaka ny sisin’ny akanjobenao ivelany aho nefa tsy namono anao dia fantaro ka jereo fa tsy misy faharatsiana na fahadisoana amin’ny tanako, ary tsy nanota taminao aho, nefa ianao kosa dia mihaza ny aiko mba hahazo azy. '
  '13':
  - type: text
    content: 'NY TOMPO no hitsara ahy sy ianao, ary NY TOMPO no hamaly anao noho ny amiko, fa ny tanako dia tsy mba haninona anao. '
  '14':
  - type: text
    content: 'Araka ny lazain’ny ohabolan’ny Ntaolo hoe:'
  - type: text
    content: Avy amin’ny ratsy fanahy no ivoahan’ny faharatsiam-panahy.
  - type: text
    content: 'Nefa tsy haninona anao ny tanako. '
  '15':
  - type: text
    content: 'Hitady an’iza moa no nivoahan’ny mpanjakan’ny Israely? Iza no enjehinao? Amboa maty sa parasy iray? '
  '16':
  - type: text
    content: Aoka NY TOMPO no ho mpitsara ka hitsara ahy sy ianao ary hijery sy hisolo vava ahy ka hitsara sy hanafaka ahy amin’ny tananao.
  '17':
  - type: text
    content: 'Nony vita io teny nataon’i Davida tamin’i Saoly io, dia hoy i Saoly: Feonao va izany, ry Davida zanako ô? Ary nanandra-peo nitomany i Saoly '
  '18':
  - type: text
    content: 'sady hoy izy tamin’i Davida: Marina noho izaho ianao satria ianao dia nanisy soa ahy, fa izaho kosa dia namaly ratsy anao. '
  '19':
  - type: text
    content: 'Ary nasehonao androany ny nanaovanao soa tamiko, fa na dia natolotry NY TOMPO teo an-tananao aza aho dia tsy namono ahy ianao. '
  '2':
  - type: text
    content: 'Rehefa niverina avy nanenjika ny Filistina i Saoly dia nisy nanambara taminy hoe: Indro i Davida dia any an-tany efitr’i Eny-Gedỳ. '
  '20':
  - type: text
    content: 'Fa raha misy olona mahazo ny fahavalony, moa havelany handeha fotsiny amin’izao va izy? Hamaly soa anao anie NY TOMPO noho ny nataonao tamiko androany. '
  '21':
  - type: text
    content: 'Indro ankehitriny, fantatro fa ho mpanjaka tokoa ianao ary ny fanjakan’ny Israely dia ho tafatoetra eo an-tananao. '
  '22':
  - type: text
    content: 'Koa ankehitriny, mianiàna amiko amin’NY TOMPO ianao fa tsy handringana ny taranako mandimby ahy, ary tsy hovonoinao amin’ny fianakavian’ny raiko ny anarako. '
  '23':
  - type: text
    content: Ary nianiana tamin’i Saoly i Davida; dia lasa nody i Saoly, fa i Davida sy ny olony kosa dia niakatra nankany amin’ny manda fiarovana.
  '3':
  - type: text
    content: 'Ary naka telo arivo lahy voafantina tamin’ny Israely rehetra i Saoly ka lasa nitady an’i Davida sy ny olony tany amin’ny vatolampin’ny osidia. '
  '4':
  - type: text
    content: 'Dia tonga teo amin’ny valan’ondry iray amoron-dalana izay nisy zohy i Saoly ka niditra tao mba hivoaka; i Davida sy ny olony anefa dia efa nipetraka tao anatin’ny zohy. '
  '5':
  - type: text
    content: 'Hoy ny olon’i Davida taminy: Izao no andro nolazain’NY TOMPO taminao hoe: Indro, hatolotro eo an-tananao ny fahavalonao, hataonao araka izay sitrakao. Dia nitsangana i Davida ka nitsaitsaika nanapaka ny sisin’ny akanjoben’i Saoly. '
  '6':
  - type: text
    content: 'Taorianan’izany anefa dia nanenjika an’i Davida ny eritreriny noho ny nanapahany ny sisin’ny akanjoben’i Saoly '
  '7':
  - type: text
    content: 'ka hoy izy tamin’ny olony: Sanatria amiko eo anatrehan’NY TOMPO raha hanao izany zavatra izany amin’ny tompoko izay voahosotry NY TOMPO aho ka hanatsotra ny tanako aminy, fa voahosotry NY TOMPO izy. '
  '8':
  - type: text
    content: Dia nandresy lahatra ny mpanompony tamin’izany teny izany i Davida ka tsy namela azy ireo hitsangana hamely an’i Saoly. Ary nitsangana i Saoly ka niala tao an-johy dia nandeha tamin’izay nalehany.
  '9':
  - type: text
    content: 'Taorianan’izay dia mba nitsangana koa i Davida ka niala tao an-johy ary niantso taorianan’i Saoly hoe: Ry mpanjaka tompoko ô! Nony nitodika nijery azy i Saoly dia niondrika tamin’ny tany i Davida ka niankohoka. '
