document_id: LAM.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahoriana sy fanantenana
  - type: heading
    content: alef א
  - type: text
    content: Izaho ilay lehilahy nahita fahoriana
  - type: text
    content: tamin’ny tsorakazon’ny fahatezerany.
  '10':
  - type: text
    content: Tonga bera manao vela-pandrika ho ahy Izy,
  - type: text
    content: ary toy ny liona ao amin’ny fierena.
  '11':
  - type: text
    content: Namily ny lalako Izy
  - type: text
    content: ary noviravirainy aho ka navelany ho lao.
  '12':
  - type: text
    content: Nanenjana ny tsipìkany Izy ka nametraka ahy
  - type: text
    content: ho toy ny marika hokendrena amin’ny zana-tsipìka.
  - type: heading
    content: he ה
  '13':
  - type: text
    content: Nampitsatoka ny zana-tsipìkany
  - type: text
    content: tamin’ny voako Izy.
  '14':
  - type: text
    content: Tonga fihomehezan’ny oloko rehetra aho
  - type: text
    content: sady ataony an-kira mandritra ny andro.
  '15':
  - type: text
    content: Novokisany anana mangidy aho
  - type: text
    content: ary nobobohany zava-mahafaty.
  - type: heading
    content: vav ו
  '16':
  - type: text
    content: Notorotoroiny tamin’ny vato kely ny nifiko
  - type: text
    content: sady natsinkasinkasiny tamin’ny lavenona aho.
  '17':
  - type: text
    content: Noroahinao tsy hahita fiadanana ny fanahiko
  - type: text
    content: ka hadinoko ny fahasambarana.
  '18':
  - type: text
    content: 'Dia hoy aho: Very ny lazako'
  - type: text
    content: sy ny fanantenako NY TOMPO.
  - type: heading
    content: zaìn ז
  '19':
  - type: text
    content: Tsarovy ny fahantrako sy ny fanjenjenako,
  - type: text
    content: dia ny zava-mangidy sy ny poizina.
  '2':
  - type: text
    content: Izaho dia notarihiny sy nampandehaniny
  - type: text
    content: ho amin’ny maizina, fa tsy ho amin’ny mazava.
  '20':
  - type: text
    content: Tsaroako tokoa izany
  - type: text
    content: ka mitanondrika aho.
  '21':
  - type: text
    content: Izany no eritreretiko ato am-poko
  - type: text
    content: ka mahatonga ahy hanantena.
  - type: heading
    content: het ח
  '22':
  - type: text
    content: Ny famindrampon’NY TOMPO no tsy nahalany ritra antsika
  - type: text
    content: satria tsy mitsahatra ny fiantrany.
  '23':
  - type: text
    content: Vaovao isa-maraina izany;
  - type: text
    content: lehibe ny fahamarinanao.
  '24':
  - type: text
    content: NY TOMPO no anjarako, hoy ny fanahiko,
  - type: text
    content: ka mahatonga ahy hanantena Azy izany.
  - type: heading
    content: tet ט
  '25':
  - type: text
    content: Tsara NY TOMPO amin’izay miandry Azy,
  - type: text
    content: dia amin’ny olona izay mitady Azy.
  '26':
  - type: text
    content: Tsara ny manantena ny famonjen’NY TOMPO
  - type: text
    content: amim-pahanginana.
  '27':
  - type: text
    content: Tsara amin’ny olona ny mitondra zioga
  - type: text
    content: amin’ny fahatanorany.
  - type: heading
    content: iod י
  '28':
  - type: text
    content: Aoka hipetraka irery izy ka hangina
  - type: text
    content: rehefa ampitondraina izany.
  '29':
  - type: text
    content: Aoka hanohoka ny vavany eo amin’ny vovoka izy
  - type: text
    content: fa angamba mbola hisy fanantenana.
  '3':
  - type: text
    content: Izaho ihany no asian’ny tanany
  - type: text
    content: isanandro.
  - type: heading
    content: bet ב
  '30':
  - type: text
    content: Aoka hanolotra ny takolany amin’izay mamely azy izy
  - type: text
    content: ka ho feno latsa.
  - type: heading
    content: kaf כ
  '31':
  - type: text
    content: Fa tsy hanary mandrakizay
  - type: text
    content: ny Tompo;
  '32':
  - type: text
    content: eny, na dia mampahory aza Izy dia mbola hiantra ihany,
  - type: text
    content: araka ny haben’ny famindrampony,
  '33':
  - type: text
    content: satria tsy sitrany ny mampahory
  - type: text
    content: na mampalahelo ny zanak’olombelona.
  - type: heading
    content: lamed ל
  '34':
  - type: text
    content: Ny fanitsakitsahana ny mpifatotra rehetra ambonin’ny tany
  - type: text
    content: ho eo ambanin’ny tongotra,
  '35':
  - type: text
    content: ny familiana ny rariny amin’ny olona
  - type: text
    content: eo anatrehan’ny Avo Indrindra,
  '36':
  - type: text
    content: ny famadihana ny adin’ny olona,
  - type: text
    content: moa tsy samy jeren’ny Tompo va?
  - type: heading
    content: mem מ
  '37':
  - type: text
    content: Iza moa no miteny ka mahatanteraka izany,
  - type: text
    content: raha tsy didy avy amin’ny Tompo?
  '38':
  - type: text
    content: Tsy avy amin’ny vavan’ny Avo Indrindra va
  - type: text
    content: no ivoahan’ny soa sy ny ratsy?
  '39':
  - type: text
    content: Koa nahoana no mitaraina ny olona velona,
  - type: text
    content: fa aoka ny olona samy hisento noho ny amin’ny fahotany.
  - type: heading
    content: non נ
  '4':
  - type: text
    content: Nataony mikainkona ny nofoko sy ny hoditro,
  - type: text
    content: notapatapahiny ny taolako.
  '40':
  - type: text
    content: Aoka isika handinika ny lalantsika sy hamantatra azy
  - type: text
    content: ka hiverina indray amin’NY TOMPO.
  '41':
  - type: text
    content: Aoka hasandratsika ny fontsika sy ny tanantsika
  - type: text
    content: ho any amin’Andriamanitra any an-danitra.
  '42':
  - type: text
    content: Izahay dia efa nanota sy naditra,
  - type: text
    content: ary Ianao tsy namela heloka!
  - type: heading
    content: samek ס
  '43':
  - type: text
    content: Nisarona fahatezerana Ianao ka nanenjika anay;
  - type: text
    content: novonoinao izahay fa tsy niantranao.
  '44':
  - type: text
    content: Nisarona rahona Ianao
  - type: text
    content: ka voasakana ny vavaka.
  '45':
  - type: text
    content: Nataonao tahaka ny fakofako
  - type: text
    content: sy ny zavatra nariana teo afovoan’ny olona izahay.
  - type: heading
    content: pe פ
  '46':
  - type: text
    content: Ny fahavalonay rehetra
  - type: text
    content: dia mitanatana vava aminay.
  '47':
  - type: text
    content: Nanjary tahotra sy lavaka ho anay izany,
  - type: text
    content: sady faharavana sy fahatorotoroana.
  '48':
  - type: text
    content: Rano mandriaka no mijononoka amin’ny masoko
  - type: text
    content: noho ny fahatorotoroan’ny oloko zanakavavy.
  - type: heading
    content: aìn ע
  '49':
  - type: text
    content: Ny masoko dia mandrotsa-dranomaso ka tsy misy fijanonany;
  - type: text
    content: eny, tsy misy fiatoana,
  '5':
  - type: text
    content: Manorina manda hamelezany ahy Izy
  - type: text
    content: ary manemitra ahy amin’ny zava-mangidy sy ny fahoriana.
  '50':
  - type: text
    content: ambara-pitazan’NY TOMPO
  - type: text
    content: ka hitsinjovany avy any an-danitra.
  '51':
  - type: text
    content: Ny masoko dia mampahory ny fanahiko
  - type: text
    content: noho ny amin’ny zanakavavin’ny tanànako rehetra.
  - type: heading
    content: tsade צ
  '52':
  - type: text
    content: Manenjika ahy mafy, toy ny fanenjika voronkely
  - type: text
    content: ny fahavaloko tsy amin’antony.
  '53':
  - type: text
    content: Nanjera ahy tao an-davaka famorian-drano izy ka nitady hahafaty ahy
  - type: text
    content: sady nitora-bato ahy.
  '54':
  - type: text
    content: Mandifotra ny lohako ny rano
  - type: text
    content: 'ka hoy aho: Maty aho ity!'
  - type: heading
    content: kof ק
  '55':
  - type: text
    content: TOMPO ô, niantso ny anaranao
  - type: text
    content: avy tany an-davaka lalina indrindra aho.
  '56':
  - type: text
    content: Ny feoko dia efa renao
  - type: text
    content: ka aza tampenana ny sofinao, raha mitaraina
  - type: text
    content: mitady izay mba hiainana kely aho.
  '57':
  - type: text
    content: Nanakaiky Ianao tamin’ny andro niantsoako Anao
  - type: text
    content: 'ka hoy Ianao: Aza matahotra.'
  - type: heading
    content: res ר
  '58':
  - type: text
    content: Tompo ô, Ianao nandahatra ny adiko
  - type: text
    content: izay nikasika ny aiko; eny, Ianao no nanavotra ny aiko.
  '59':
  - type: text
    content: TOMPO ô, hitanao ny fitsarana miangatra natao tamiko
  - type: text
    content: ka mba tsarao ny adiko.
  '6':
  - type: text
    content: Ampitoeriny ao amin’ny maizina
  - type: text
    content: toy izay efa maty hatrizay aho.
  - type: heading
    content: gimel ג
  '60':
  - type: text
    content: Hitanao ny valifaty rehetra ataon’ireo,
  - type: text
    content: dia ny saina rehetra entiny mamely ahy.
  - type: heading
    content: sin ש
  '61':
  - type: text
    content: TOMPO ô, renao ny latsa ataony,
  - type: text
    content: dia ny saina rehetra entiny mamely ahy,
  '62':
  - type: text
    content: ny molotr’izay mitsangana hanohitra ahy
  - type: text
    content: sy ny fimonomononany mandritra ny andro hamelezany ahy.
  '63':
  - type: text
    content: Jereo ny fipetrany sy ny fitsangany,
  - type: text
    content: fa ataony an-kira aho.
  - type: heading
    content: tao ת
  '64':
  - type: text
    content: Hovalianao izy, TOMPO ô,
  - type: text
    content: araka ny asan’ny tanany.
  '65':
  - type: text
    content: Eny, hohamaizininao ny fony,
  - type: text
    content: hihatra aminy ny ozonao.
  '66':
  - type: text
    content: Henjehinao amin’ny fahatezerana izy ka haringanao
  - type: text
    content: tsy ho etỳ ambanin’ny lanitry NY TOMPO.
  '7':
  - type: text
    content: Nofefeny manodidina aho ka tsy afa-niala,
  - type: text
    content: nataony mavesatra ny gadrako.
  '8':
  - type: text
    content: Ary na dia mitaraina sy miantso vonjy aza aho
  - type: text
    content: dia sakanany ny vavaka ataoko.
  '9':
  - type: text
    content: Vato voapaika no narafiny natampiny ny lalako,
  - type: text
    content: ary naolikoliny ny alehako.
  - type: heading
    content: dalet ד
