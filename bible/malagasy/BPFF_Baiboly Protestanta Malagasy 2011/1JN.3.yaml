          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nomen.
      marker-yv: yv-n
    - type: text
      text: ny Ray ho antsika, dia ny niantsoana antsika hoe zanak’Andriamanitra sady izany tokoa isika! Noho izany dia tsy mahalala antsika izao tontolo izao satria tsy nahalala Azy izy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no mampiseho miharihary izay zanak’Andriamanitra sy izay zanaky ny devoly. Tsy mba avy amin’Andriamanitra izay rehetra tsy manao ny fahamarinana sy izay tsy tia ny rahalahiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fifankatiavan’ny mpirahalahy
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no teny nampitondraina izay efa renareo hatramin’ny voalohany: Tsy maintsy mifankatia isika; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tsy ho tahaka an’i Kaina, izay avy tamin’ilay ratsy ka namono ny rahalahiny. Ary nahoana no namono azy izy? Satria ratsy ny asany, fa marina ny an’ny rahalahiny.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza gaga, ry rahalahy, raha halan’izao tontolo izao ianareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatsika fa efa tafafindra niala tamin’ny fahafatesana ho amin’ny fiainana isika satria tia ny rahalahy. Izay tsy tia dia mitoetra ao amin’ny fahafatesana ihany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay rehetra mankahala ny rahalahiny dia mpamono olona; ary fantatrareo fa tsy mba misy mpamono olona manana fiainana mandrakizay mitoetra ao anatiny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no ahafantarantsika ny fitiavana: Izy no nanolotra ny ainy noho ny amintsika; ary isika kosa dia mba tokony hanolotra ny aintsika noho ny amin’ny rahalahy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay rehetra manam-pananana amin’izao fiainana izao, ary mahita ny fahantran’ny rahalahiny ka mihirim-belona aminy, ahoana no itoeran’ny fitiavana an’Andriamanitra ao anatiny? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anaka, aoka tsy ho tia amin’ny teny na amin’ny lela isika, fa amin’ny asa sy amin’ny marina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny toky ananana eo anatrehan’Andriamanitra
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no hahafantarantsika fa avy amin’ny marina isika sy hampahatokiantsika ny fontsika eo anatrehany, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry malala, ankehitriny aza dia zanak’Andriamanitra isika, nefa tsy mbola naseho izay ho toetsika rahatrizay. Fantatsika fa rehefa miseho Izy dia ho tahaka Azy isika ka ho hitantsika Izy amin’izay tena maha Izy Azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na amin’inona na amin’inona no anamelohan’ny fontsika antsika, satria Andriamanitra dia lehibe noho ny fontsika ka mahalala ny zavatra rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry malala, raha tsy manameloka antsika ny fontsika dia manana toky eo anatrehan’Andriamanitra isika. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na inona na inona no angatahintsika dia raisintsika avy Aminy satria mitandrina ny didiny sy manao izay ankasitrahana eo imasony isika.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no didiny dia ny hinoantsika ny anaran’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Zanany sy ny hifankatiavantsika araka ny didy nomeny antsika. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izay mitandrina ny didiny no mitoetra ao Aminy, ary Izy kosa ao aminy. Izany no ahafantarantsika fa mitoetra ao amintsika Izy, amin’ny alalan’ny Fanahy izay nomena antsika.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izay rehetra manana izany fanantenana miorina Aminy izany dia manadio ny tenany mba hadio tahaka Azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay rehetra manota no mandika ny lalàna; fa ny ota no fandikana ny lalàna. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary fantatrareo fa Izy no naseho mba hanaisotra ny ota; ary tsy mba misy ota ao Aminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay rehetra mitoetra ao Aminy dia tsy manota; izay rehetra manota dia tsy nahita na nahalala Azy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anaka, aza avela hisy hamitaka anareo. Izay manao ny marina no marina; eny, marina tahaka Azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay manota dia avy amin’ny devoly satria ny devoly dia manota hatramin’ny voalohany. Izao no nisehoan’ny Zanak’Andriamanitra, dia ny handrava ny asan’ny devoly. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay rehetra naterak’Andriamanitra no tsy manota satria ny voany dia mitoetra ao anatiny, ary tsy mahay manota izy satria naterak’Andriamanitra. '
