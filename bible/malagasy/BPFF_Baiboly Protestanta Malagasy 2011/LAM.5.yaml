document_id: LAM.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avereno aminao izahay
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, tsarovy izay nanjo anay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hevero sy diniho ny latsa mahazo anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny lovanay dia afindra ho an’ny vahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tranonay dia ho an’ny olona tsy fantatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa kamboty izahay ka tsy manan-dray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny reninay dia toy ny mpitondratena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Na ny loharanonay aza dia andoavanay vola vao azonay isotroana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kitainay koa dia vidinay vao azo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noraisin’ireo nanenjika anay tamin’ny hatokay izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: reraka izahay nefa tsy manam-pitsaharana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nanolo-tanana tamin’ny Ejiptiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny Asiriana izahay mba ho voky mofo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nanota ny razanay; tsy etỳ intsony izy ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izahay no mivesatra ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Andevo no mifehy anay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy manafaka anay amin’ny tanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho ny sabatra mamely any an-tany efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manao vy very ny ainay izahay vao mahazo hanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mahamay toy ny fatana ny hoditray
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fivaivain’ny mosary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nosavihina ny vehivavy tao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny virijiny tao amin’ny tanànan’ny Joda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahantona tamin’ny tanany ny lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba nohajaina ny antitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny zatovo dia nitondra ny fikosoham-bary
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ankizy madinika dia nivembena nitondra ny kitay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny loholona dia tsy misy eo am-bavahady
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zatovo dia tsy mitendry zavamaneno intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny hafalian’ny fonay dia nitsahatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny dihinay dia niova ho fitomaniana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Efa afaka ny satroboninahitra tamin’ny lohanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: idiran-doza izahay fa efa nanota!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Noho izany dia reraka ny fonay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, noho izany dia maizina ny masonay,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: noho ny amin’ny tendrombohitra Ziona izay efa lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ikarenjen’ny amboahaolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: TOMPO ô, Ianao no mipetraka mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny sezafiandriananao no maharitra hatramin’ny taranaka fara aman-dimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ahoana no dia anadinoanao anay mandrakariva
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ahafoizanao anay andro lava?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: TOMPO ô, ampivereno aminao izahay mba hiverenanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: havaozy ho toy ny fahiny ny andronay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moa dia nanary anay tokoa va Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tezitra mafy aminay?
