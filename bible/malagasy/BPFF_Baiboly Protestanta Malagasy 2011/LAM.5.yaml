document_id: LAM.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Avereno aminao izahay
  - type: text
    content: TOMPO ô, tsarovy izay nanjo anay;
  - type: text
    content: hevero sy diniho ny latsa mahazo anay.
  '10':
  - type: text
    content: Mahamay toy ny fatana ny hoditray
  - type: text
    content: noho ny fivaivain’ny mosary.
  '11':
  - type: text
    content: 'Nosavihina ny vehivavy tao '
  - type: text
    content: Ziona
  - type: text
    content: sy ny virijiny tao amin’ny tanànan’ny Joda.
  '12':
  - type: text
    content: Nahantona tamin’ny tanany ny lehibe
  - type: text
    content: ary tsy mba nohajaina ny antitra.
  '13':
  - type: text
    content: Ny zatovo dia nitondra ny fikosoham-bary
  - type: text
    content: ary ny ankizy madinika dia nivembena nitondra ny kitay.
  '14':
  - type: text
    content: Ny loholona dia tsy misy eo am-bavahady
  - type: text
    content: ary ny zatovo dia tsy mitendry zavamaneno intsony.
  '15':
  - type: text
    content: Ny hafalian’ny fonay dia nitsahatra
  - type: text
    content: ary ny dihinay dia niova ho fitomaniana.
  '16':
  - type: text
    content: Efa afaka ny satroboninahitra tamin’ny lohanay;
  - type: text
    content: idiran-doza izahay fa efa nanota!
  '17':
  - type: text
    content: Noho izany dia reraka ny fonay;
  - type: text
    content: eny, noho izany dia maizina ny masonay,
  '18':
  - type: text
    content: noho ny amin’ny tendrombohitra Ziona izay efa lao
  - type: text
    content: sady ikarenjen’ny amboahaolo.
  '19':
  - type: text
    content: TOMPO ô, Ianao no mipetraka mandrakizay;
  - type: text
    content: eny, ny sezafiandriananao no maharitra hatramin’ny taranaka fara aman-dimby.
  '2':
  - type: text
    content: Ny lovanay dia afindra ho an’ny vahiny,
  - type: text
    content: ary ny tranonay dia ho an’ny olona tsy fantatra.
  '20':
  - type: text
    content: Ahoana no dia anadinoanao anay mandrakariva
  - type: text
    content: sy ahafoizanao anay andro lava?
  '21':
  - type: text
    content: TOMPO ô, ampivereno aminao izahay mba hiverenanay;
  - type: text
    content: havaozy ho toy ny fahiny ny andronay.
  '22':
  - type: text
    content: Moa dia nanary anay tokoa va Ianao
  - type: text
    content: sady tezitra mafy aminay?
  '3':
  - type: text
    content: Efa kamboty izahay ka tsy manan-dray,
  - type: text
    content: ny reninay dia toy ny mpitondratena.
  '4':
  - type: text
    content: Na ny loharanonay aza dia andoavanay vola vao azonay isotroana,
  - type: text
    content: ary ny kitainay koa dia vidinay vao azo.
  '5':
  - type: text
    content: Noraisin’ireo nanenjika anay tamin’ny hatokay izahay;
  - type: text
    content: reraka izahay nefa tsy manam-pitsaharana.
  '6':
  - type: text
    content: Nanolo-tanana tamin’ny Ejiptiana
  - type: text
    content: sy ny Asiriana izahay mba ho voky mofo.
  '7':
  - type: text
    content: Nanota ny razanay; tsy etỳ intsony izy ireo;
  - type: text
    content: ary izahay no mivesatra ny helony.
  '8':
  - type: text
    content: Andevo no mifehy anay;
  - type: text
    content: tsy misy manafaka anay amin’ny tanany.
  '9':
  - type: text
    content: Noho ny sabatra mamely any an-tany efitra
  - type: text
    content: dia manao vy very ny ainay izahay vao mahazo hanina.
