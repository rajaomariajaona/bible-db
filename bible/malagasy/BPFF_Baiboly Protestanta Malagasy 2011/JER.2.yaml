document_id: JER.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nahafoy ny loharanon’ny fiainana ka nihady lavaka mitriatriatra tsy mahatan-drano
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mità ho any amin’ny moron-dranomasin’i Kitima ka zahao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandefasa iraka ho any Kedara ka diniho tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ho hitanareo raha mba efa nisy toy izao, na tsia:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa nisy firenena efa nanova ny andriamaniny va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ireny dia tsy andriamanitra akory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny oloko kosa dia efa nanakalo ny voninahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ireny tsy mahasoa ireny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Talanjòna amin’izany, ry lanitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary matahora ka mangorohoroa fatratra, ianareo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy NY TOMPO;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa zava-dratsy roa loha no nataon’ny oloko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nahafoy Ahy, loharano velona, izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nihady lavaka famorian-drano ho an’ny tenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa lavaka mitriatriatra tsy mahatan-drano.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vahoaka izay mahafoy NY TOMPO
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa mpanompo va Israely? Moa mpanompo teraka tao an-trano va izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana izy no voababo?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamely azy no mampierona ny liona tanora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amoahany feo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahatonga ny taniny ho lao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nodorana ny tanànany ka tonga tsy nisy mponina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mponina tao Nofa sy Tapanesa aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nampangadihady ny tampon-dohanao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy ny nahafoizanao NY TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny andro nitondrany anao teny an-dalana va
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahatonga izany taminao?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa inona no antony ankanesanao amin’ny lalana mankany Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisotro ny ranon’i Sihora?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary inona no antony ankanesanao amin’ny lalana mankany Asiria
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisotro ny rano amin’ny ony Eofrata?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny haratsianao no anafaizana anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fikomianao no ananarana anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa fantaro sy hevero fa ratsy sady mangidy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny nahafoizanao NY TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tsy nisian’ny tahotrao Ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vahoaka mpikomy sady mpanompo sampy
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandehana ka miantsoa eo anatrehan’i Jerosalema hoe: Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsaroako ny niraiketan’ny fonao Tamiko, fony ianao mbola tanora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fitiavanao, fony ianao vao nampakarina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay nanarahanao Ahy tany an-tany efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny amin’ny tany tsy mbola namafazan-javatra;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hatramin’ny ela no efa nanapahanao ny zioga taminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy namahanao ny fatoranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hoy ianao: Tsy hanompo intsony aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa teny amin’ny tendrombohitra avo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy teny ambanin’ny hazo maitso rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nandrianao sy nijangajanganao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Izaho namboly anao toy ny karazam-boaloboka tsara indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia rantsana tsara avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa nahoana no nanjary sampany ratsy ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tonga voaloboka hafa?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia misasa amin’ny sirahazo aza ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka maka lavenona betsaka hanadiovana anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny helokao dia mbola voasoratra eo anatrehako ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO Andriamanitra.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ahoana no ilazanao hoe: Tsy nanao izay nahaloto ahy aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tsy nanaraka ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' aho?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hevero ny nalehanao tany amin’ilay lohasaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ekeo izay nataonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry rameva vavy haingam-pandeha mivezivezy amin’ny alehany,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ry borikidia vavy, tamana any an-tany efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manimbolo ny rivotra noho ny faniriany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa iza no mahasakana ny fahamaimaizany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra mitady azy dia tsy ho sasa-poana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa amin’ny volana fahamaimaizany no hahitany azy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitandrema! Fa ho afaka amin’ny tongotrao ny kapanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho maina ny tendanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nefa hoy ianao: Tsy manantena inona aho!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia! Fa ny vahiny no tiako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanaraka azy aho.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny fangaihaizan’ny mpangalatra raha azo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany no fangaihaizan’ny taranak’Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, izy, ny mpanjakany, ny lehibeny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpisorony ary ny mpaminaniny,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia izay miteny amin’ny tapa-kazo hoe: Ianao no raiko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary amin’ny vato hoe: Ianao no niteraka ahy.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa niamboho Ahy izy ka tsy nanatrika ny tavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nefa amin’ny andro fahoriany dia hiteny indray izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna ka vonjeo izahay!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aiza ireny andriamanitrao izay nataonao ho anao ireny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hitsangana ireny raha mahavonjy anao amin’ny andro fahorianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa araka ny isan’ny tanànanao, ry Joda, no isan’ny andriamanitrao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Malahelo Andriamanitra noho ny olony mivadika Aminy
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no mifandahatra Amiko ianareo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa samy efa nikomy Tamiko ianareo rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Masina ho an’NY TOMPO ny Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady santa-bokatra ho Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra nihinana azy dia nohelohina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary loza no nanjo ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foana ny namelezako ny zanakareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy zaka nanarina izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sabatrareo no nandringana ny mpaminaninareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny liona mamiravira.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ry taranaka ankehitriny, dinihonareo ny tenin’NY TOMPO!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa efa nanjary tany efitra ho an’ny Israely va Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na tany maizim-pito?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nahoana ny oloko no miteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaka mikarenjy izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hankany Aminao intsony?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanadino ny firavany va ny virijiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hanadino ny fehikibony misy haingony va ny ampakarina?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hita isa anefa ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanadinoan’ny oloko Ahy.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanto izany fandehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitady fitia izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka na dia ny vehivavy ratsy fanahy aza dia ampianarinao ny fombanao.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary koa eo an-tsisin-dambanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ahitana ny ran’ny mahantra tsy manan-tsiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy tratranao namaky ny tranonao akory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa novonoinao ka voan’ny rany ianao.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nefa hoy ianao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manan-tsiny aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho afaka amiko ny fahatezerany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hifandahatra aminao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'noho ny ilazanao hoe: Tsy nanota aho.'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana ianao no maimaika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanova ny alehanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho menatra noho ny amin’i Ejipta koa ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny nahamenaranao noho ny amin’i Asiria.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiala amin’izany koa ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiloloha tanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nolavin’NY TOMPO ny zavatra maro nitokisanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hahomby miaraka amin’ireo ianao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihainoa ny tenin’NY TOMPO, ry taranak’i Jakoba, sy ianareo, ry fokony rehetra amin’ny taranak’Israely! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona moa no tsy marina hitan’ny razanareo Tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no dia nanalavitra Ahy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nanaraka zava-poana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanjary zava-poana koa izy?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tsy mba nilaza izy hoe: Aiza NY TOMPO'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nitondra antsika niakatra avy tany amin’ny tany Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nitarika antsika tany an-tany efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay tany foana sady be lavaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tany karankaina sady aloky ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tany izay tsy mba nalehan’olona akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nonenan’olona?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitondra anareo niditra tany amin’ny tany mahavokatra Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hihinananareo ny vokatra sy ny zavatra tsara eo aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo nony tafiditra ianareo dia nolotoinareo ny taniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nataonareo fahavetavetana ny lovako.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tsy mba niteny ny mpisorona hoe: Aiza NY TOMPO?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy nahalala Ahy ny mpitahiry ny lalàna;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanota Tamiko koa ny mpitondra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary naminany tamin’ny anaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' ny mpaminany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanaraka ireny tsy nahavita na inona na inona ireny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa mbola hifandahatra aminareo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiady amin’ny zafinareo koa.
