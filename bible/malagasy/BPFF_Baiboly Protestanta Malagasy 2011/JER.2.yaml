document_id: JER.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nahafoy ny loharanon’ny fiainana ka nihady lavaka mitriatriatra tsy mahatan-drano
  - type: text
    content: 'Ary tonga tamiko ny tenin’NY TOMPO hoe: '
  '10':
  - type: text
    content: Fa mità ho any amin’ny moron-dranomasin’i Kitima ka zahao!
  - type: text
    content: Ary mandefasa iraka ho any Kedara ka diniho tsara,
  - type: text
    content: 'dia ho hitanareo raha mba efa nisy toy izao, na tsia:'
  '11':
  - type: text
    content: Moa nisy firenena efa nanova ny andriamaniny va?
  - type: text
    content: Nefa ireny dia tsy andriamanitra akory.
  - type: text
    content: Fa ny oloko kosa dia efa nanakalo ny voninahiny
  - type: text
    content: tamin’ireny tsy mahasoa ireny.
  '12':
  - type: text
    content: Talanjòna amin’izany, ry lanitra!
  - type: text
    content: Ary matahora ka mangorohoroa fatratra, ianareo!
  - type: text
    content: Hoy NY TOMPO;
  '13':
  - type: text
    content: 'Fa zava-dratsy roa loha no nataon’ny oloko:'
  - type: text
    content: Efa nahafoy Ahy, loharano velona, izy
  - type: text
    content: ka nihady lavaka famorian-drano ho an’ny tenany,
  - type: text
    content: nefa lavaka mitriatriatra tsy mahatan-drano.
  - type: heading
    content: Vahoaka izay mahafoy NY TOMPO
  '14':
  - type: text
    content: Moa mpanompo va Israely? Moa mpanompo teraka tao an-trano va izy?
  - type: text
    content: Koa nahoana izy no voababo?
  '15':
  - type: text
    content: Hamely azy no mampierona ny liona tanora
  - type: text
    content: sy amoahany feo
  - type: text
    content: ka mahatonga ny taniny ho lao;
  - type: text
    content: nodorana ny tanànany ka tonga tsy nisy mponina.
  '16':
  - type: text
    content: Ny mponina tao Nofa sy Tapanesa aza
  - type: text
    content: dia nampangadihady ny tampon-dohanao.
  '17':
  - type: text
    content: Moa tsy ny nahafoizanao NY TOMPO Andriamanitrao
  - type: text
    content: tamin’ny andro nitondrany anao teny an-dalana va
  - type: text
    content: no nahatonga izany taminao?
  '18':
  - type: text
    content: Koa inona no antony ankanesanao amin’ny lalana mankany Ejipta
  - type: text
    content: hisotro ny ranon’i Sihora?
  - type: text
    content: Ary inona no antony ankanesanao amin’ny lalana mankany Asiria
  - type: text
    content: hisotro ny rano amin’ny ony Eofrata?
  '19':
  - type: text
    content: Ny haratsianao no anafaizana anao,
  - type: text
    content: ary ny fikomianao no ananarana anao;
  - type: text
    content: koa fantaro sy hevero fa ratsy sady mangidy
  - type: text
    content: ny nahafoizanao NY TOMPO Andriamanitrao
  - type: text
    content: sy ny tsy nisian’ny tahotrao Ahy,
  - type: text
    content: Hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao.
  - type: heading
    content: Vahoaka mpikomy sady mpanompo sampy
  '2':
  - type: text
    content: 'Mandehana ka miantsoa eo anatrehan’i Jerosalema hoe: Izao no lazain’NY TOMPO:'
  - type: text
    content: Tsaroako ny niraiketan’ny fonao Tamiko, fony ianao mbola tanora,
  - type: text
    content: sy ny fitiavanao, fony ianao vao nampakarina,
  - type: text
    content: dia ilay nanarahanao Ahy tany an-tany efitra,
  - type: text
    content: teny amin’ny tany tsy mbola namafazan-javatra;
  '20':
  - type: text
    content: Fa hatramin’ny ela no efa nanapahanao ny zioga taminao
  - type: text
    content: sy namahanao ny fatoranao
  - type: text
    content: 'ka hoy ianao: Tsy hanompo intsony aho;'
  - type: text
    content: nefa teny amin’ny tendrombohitra avo
  - type: text
    content: sy teny ambanin’ny hazo maitso rehetra
  - type: text
    content: no nandrianao sy nijangajanganao.
  '21':
  - type: text
    content: Nefa Izaho namboly anao toy ny karazam-boaloboka tsara indrindra,
  - type: text
    content: dia rantsana tsara avokoa;
  - type: text
    content: koa nahoana no nanjary sampany ratsy ianao,
  - type: text
    content: ary tonga voaloboka hafa?
  '22':
  - type: text
    content: Fa na dia misasa amin’ny sirahazo aza ianao
  - type: text
    content: ka maka lavenona betsaka hanadiovana anao,
  - type: text
    content: ny helokao dia mbola voasoratra eo anatrehako ihany,
  - type: text
    content: hoy NY TOMPO Andriamanitra.
  '23':
  - type: text
    content: 'Ahoana no ilazanao hoe: Tsy nanao izay nahaloto ahy aho,'
  - type: text
    content: 'tsy nanaraka ireo '
  - type: text
    content: Baala
  - type: text
    content: ' aho?'
  - type: text
    content: Hevero ny nalehanao tany amin’ilay lohasaha,
  - type: text
    content: ekeo izay nataonao,
  - type: text
    content: ry rameva vavy haingam-pandeha mivezivezy amin’ny alehany,
  '24':
  - type: text
    content: sy ry borikidia vavy, tamana any an-tany efitra,
  - type: text
    content: izay manimbolo ny rivotra noho ny faniriany;
  - type: text
    content: koa iza no mahasakana ny fahamaimaizany?
  - type: text
    content: Izay rehetra mitady azy dia tsy ho sasa-poana;
  - type: text
    content: fa amin’ny volana fahamaimaizany no hahitany azy.
  '25':
  - type: text
    content: Mitandrema! Fa ho afaka amin’ny tongotrao ny kapanao,
  - type: text
    content: ary ho maina ny tendanao;
  - type: text
    content: 'nefa hoy ianao: Tsy manantena inona aho!'
  - type: text
    content: Tsia! Fa ny vahiny no tiako
  - type: text
    content: ka hanaraka azy aho.
  '26':
  - type: text
    content: Toy ny fangaihaizan’ny mpangalatra raha azo
  - type: text
    content: dia toy izany no fangaihaizan’ny taranak’Israely,
  - type: text
    content: eny, izy, ny mpanjakany, ny lehibeny,
  - type: text
    content: ny mpisorony ary ny mpaminaniny,
  '27':
  - type: text
    content: 'dia izay miteny amin’ny tapa-kazo hoe: Ianao no raiko,'
  - type: text
    content: 'ary amin’ny vato hoe: Ianao no niteraka ahy.'
  - type: text
    content: Fa niamboho Ahy izy ka tsy nanatrika ny tavako;
  - type: text
    content: 'nefa amin’ny andro fahoriany dia hiteny indray izy hoe:'
  - type: text
    content: Mitsangàna ka vonjeo izahay!
  '28':
  - type: text
    content: Fa aiza ireny andriamanitrao izay nataonao ho anao ireny?
  - type: text
    content: Aoka hitsangana ireny raha mahavonjy anao amin’ny andro fahorianao;
  - type: text
    content: fa araka ny isan’ny tanànanao, ry Joda, no isan’ny andriamanitrao.
  - type: heading
    content: Malahelo Andriamanitra noho ny olony mivadika Aminy
  '29':
  - type: text
    content: Nahoana no mifandahatra Amiko ianareo?
  - type: text
    content: Fa samy efa nikomy Tamiko ianareo rehetra,
  - type: text
    content: hoy NY TOMPO.
  '3':
  - type: text
    content: Masina ho an’NY TOMPO ny Israely
  - type: text
    content: sady santa-bokatra ho Azy;
  - type: text
    content: izay rehetra nihinana azy dia nohelohina
  - type: text
    content: ary loza no nanjo ireny,
  - type: text
    content: hoy NY TOMPO.
  '30':
  - type: text
    content: Foana ny namelezako ny zanakareo,
  - type: text
    content: fa tsy zaka nanarina izy;
  - type: text
    content: ny sabatrareo no nandringana ny mpaminaninareo,
  - type: text
    content: toy ny liona mamiravira.
  '31':
  - type: text
    content: Ry taranaka ankehitriny, dinihonareo ny tenin’NY TOMPO!
  - type: text
    content: Moa efa nanjary tany efitra ho an’ny Israely va Aho,
  - type: text
    content: na tany maizim-pito?
  - type: text
    content: 'Nahoana ny oloko no miteny hoe:'
  - type: text
    content: Afaka mikarenjy izahay
  - type: text
    content: ka tsy hankany Aminao intsony?
  '32':
  - type: text
    content: Hanadino ny firavany va ny virijiny,
  - type: text
    content: na hanadino ny fehikibony misy haingony va ny ampakarina?
  - type: text
    content: Tsy hita isa anefa ny andro
  - type: text
    content: nanadinoan’ny oloko Ahy.
  '33':
  - type: text
    content: Kanto izany fandehanao
  - type: text
    content: hitady fitia izany
  - type: text
    content: ka na dia ny vehivavy ratsy fanahy aza dia ampianarinao ny fombanao.
  '34':
  - type: text
    content: Ary koa eo an-tsisin-dambanao
  - type: text
    content: no ahitana ny ran’ny mahantra tsy manan-tsiny,
  - type: text
    content: izay tsy tratranao namaky ny tranonao akory,
  - type: text
    content: nefa novonoinao ka voan’ny rany ianao.
  '35':
  - type: text
    content: 'Nefa hoy ianao:'
  - type: text
    content: Tsy manan-tsiny aho
  - type: text
    content: ka ho afaka amiko ny fahatezerany.
  - type: text
    content: Indro, hifandahatra aminao Aho
  - type: text
    content: 'noho ny ilazanao hoe: Tsy nanota aho.'
  '36':
  - type: text
    content: Nahoana ianao no maimaika
  - type: text
    content: hanova ny alehanao?
  - type: text
    content: Fa ho menatra noho ny amin’i Ejipta koa ianao,
  - type: text
    content: toy ny nahamenaranao noho ny amin’i Asiria.
  '37':
  - type: text
    content: Hiala amin’izany koa ianao
  - type: text
    content: ka hiloloha tanana;
  - type: text
    content: fa nolavin’NY TOMPO ny zavatra maro nitokisanao
  - type: text
    content: ka tsy hahomby miaraka amin’ireo ianao.
  '4':
  - type: text
    content: 'Mihainoa ny tenin’NY TOMPO, ry taranak’i Jakoba, sy ianareo, ry fokony rehetra amin’ny taranak’Israely! '
  '5':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Inona moa no tsy marina hitan’ny razanareo Tamiko,
  - type: text
    content: no dia nanalavitra Ahy izy
  - type: text
    content: sady nanaraka zava-poana
  - type: text
    content: ka nanjary zava-poana koa izy?
  '6':
  - type: text
    content: 'Tsy mba nilaza izy hoe: Aiza NY TOMPO'
  - type: text
    content: izay nitondra antsika niakatra avy tany amin’ny tany Ejipta
  - type: text
    content: sady nitarika antsika tany an-tany efitra,
  - type: text
    content: dia ilay tany foana sady be lavaka,
  - type: text
    content: tany karankaina sady aloky ny fahafatesana,
  - type: text
    content: tany izay tsy mba nalehan’olona akory
  - type: text
    content: na nonenan’olona?
  '7':
  - type: text
    content: Nitondra anareo niditra tany amin’ny tany mahavokatra Aho
  - type: text
    content: mba hihinananareo ny vokatra sy ny zavatra tsara eo aminy;
  - type: text
    content: kanjo nony tafiditra ianareo dia nolotoinareo ny taniko
  - type: text
    content: sady nataonareo fahavetavetana ny lovako.
  '8':
  - type: text
    content: 'Tsy mba niteny ny mpisorona hoe: Aiza NY TOMPO?'
  - type: text
    content: Ary tsy nahalala Ahy ny mpitahiry ny lalàna;
  - type: text
    content: nanota Tamiko koa ny mpitondra,
  - type: text
    content: 'ary naminany tamin’ny anaran’ny '
  - type: text
    content: Baala
  - type: text
    content: ' ny mpaminany'
  - type: text
    content: ka nanaraka ireny tsy nahavita na inona na inona ireny.
  '9':
  - type: text
    content: Koa mbola hifandahatra aminareo Aho,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: ary hiady amin’ny zafinareo koa.
