document_id: JOB.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fizahan-toetra faharoa nanjo an’i Joba
  - type: text
    content: 'Indray andro koa dia avy ireo '
  - type: text
    content: zanak’Andriamanitra
  - type: text
    content: ' hiseho teo anatrehan’NY TOMPO dia mba tonga teo koa i '
  - type: text
    content: Satana
  - type: text
    content: ' tafaharo taminy, mba hiseho teo anatrehan’NY TOMPO. '
  '10':
  - type: text
    content: 'Fa hoy izy taminy: Tahaka ny tenin’ny vehivavy adala ny teninao! Moa ny soa ihany va no horaisintsika avy amin’Andriamanitra fa tsy ny ratsy koa? Tamin’izany rehetra izany dia tsy nanota tamin’ny molony i Joba.'
  - type: heading
    content: Tonga hampionona an’i Joba ireo namany telo lahy
  '11':
  - type: text
    content: 'Rehefa ren’ny sakaizan’i Joba telo lahy ny fahoriana rehetra izay nanjo azy dia samy niainga avy tany amin’ny fonenany avy izy, dia i Elifaza temanita, i Bildada sohita ary i Zofara namatita. Nifamotoana izy ireo mba handeha hitsapa alahelo sy hampionona azy. '
  '12':
  - type: text
    content: 'Ary nanopy ny masony teny lavidavitra teny izy telo lahy ka tsy nahafantatra azy, dia nanandratra ny feony ka nitomany; ary samy nandriatra ny akanjobeny avy koa izy rehetra dia nanipy vovoka ho amin’ny lanitra hiraraka amin’ny lohany. '
  '13':
  - type: text
    content: Ary niara-nipetraka teo aminy tamin’ny tany fito andro sy fito alina izy, nefa tsy nisy niteny taminy na dia indraimbava akory aza satria hitany fa mafy loatra ny fahoriany.
  '2':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Satana: Avy taiza ianao? Ary namaly NY TOMPO i Satana hoe: Avy nivezivezy teny ambonin’ny tany aho, nandehandeha teny. '
  '3':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Satana: Efa nandinika an’i Joba mpanompoko va ianao? Fa tsy misy tahaka azy eny ambonin’ny tany, fa olona marina sy mahitsy izy sady matahotra an’Andriamanitra ka mifady ny ratsy. Ary mbola mitana mafy ny fahamarinany ihany izy na dia nanesika Ahy hamongotra azy tsy amin’antony aza ianao. '
  '4':
  - type: text
    content: 'Ary i Satana dia namaly NY TOMPO hoe: Hoditra fefin’ny hoditra! Eny, izay rehetra ananan’ny olona dia homeny ho fefin’ny ainy. '
  '5':
  - type: text
    content: 'Fa atsory ange ny tananao ka tendreo ny taolany sy ny nofony raha tsy handa Anao eo imasonao aza izy e! '
  '6':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Satana: Indro, eo an-tananao izy; ny ainy tokana ihany no aza asiana! '
  '7':
  - type: text
    content: 'Dia niala teo anatrehan’NY TOMPO i Satana ka namely vay ratsy an’i Joba hatreo am-paladiany ka hatrany an-tampon-dohany. '
  '8':
  - type: text
    content: 'Dia naka tavim-bilany hihaorany izy sady nipetraka teo amin’ny lavenona. '
  '9':
  - type: text
    content: 'Ary hoy ny vadiny taminy: Mbola mitana ny fahamarinanao ihany va ianao? Mahafoiza an’Andriamanitra ianao, dia aoka ho faty! '
