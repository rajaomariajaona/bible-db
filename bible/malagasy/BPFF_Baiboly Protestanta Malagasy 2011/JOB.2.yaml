document_id: JOB.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fizahan-toetra faharoa nanjo an’i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indray andro koa dia avy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’Andriamanitra
  - type: text
    text: ' hiseho teo anatrehan’NY TOMPO dia mba tonga teo koa i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satana
  - type: text
    text: ' tafaharo taminy, mba hiseho teo anatrehan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Satana: Avy taiza ianao? Ary namaly NY TOMPO i Satana hoe: Avy nivezivezy teny ambonin’ny tany aho, nandehandeha teny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Satana: Efa nandinika an’i Joba mpanompoko va ianao? Fa tsy misy tahaka azy eny ambonin’ny tany, fa olona marina sy mahitsy izy sady matahotra an’Andriamanitra ka mifady ny ratsy. Ary mbola mitana mafy ny fahamarinany ihany izy na dia nanesika Ahy hamongotra azy tsy amin’antony aza ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary i Satana dia namaly NY TOMPO hoe: Hoditra fefin’ny hoditra! Eny, izay rehetra ananan’ny olona dia homeny ho fefin’ny ainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa atsory ange ny tananao ka tendreo ny taolany sy ny nofony raha tsy handa Anao eo imasonao aza izy e! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Satana: Indro, eo an-tananao izy; ny ainy tokana ihany no aza asiana! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niala teo anatrehan’NY TOMPO i Satana ka namely vay ratsy an’i Joba hatreo am-paladiany ka hatrany an-tampon-dohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia naka tavim-bilany hihaorany izy sady nipetraka teo amin’ny lavenona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy ny vadiny taminy: Mbola mitana ny fahamarinanao ihany va ianao? Mahafoiza an’Andriamanitra ianao, dia aoka ho faty! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy izy taminy: Tahaka ny tenin’ny vehivavy adala ny teninao! Moa ny soa ihany va no horaisintsika avy amin’Andriamanitra fa tsy ny ratsy koa? Tamin’izany rehetra izany dia tsy nanota tamin’ny molony i Joba.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga hampionona an’i Joba ireo namany telo lahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rehefa ren’ny sakaizan’i Joba telo lahy ny fahoriana rehetra izay nanjo azy dia samy niainga avy tany amin’ny fonenany avy izy, dia i Elifaza temanita, i Bildada sohita ary i Zofara namatita. Nifamotoana izy ireo mba handeha hitsapa alahelo sy hampionona azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nanopy ny masony teny lavidavitra teny izy telo lahy ka tsy nahafantatra azy, dia nanandratra ny feony ka nitomany; ary samy nandriatra ny akanjobeny avy koa izy rehetra dia nanipy vovoka ho amin’ny lanitra hiraraka amin’ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary niara-nipetraka teo aminy tamin’ny tany fito andro sy fito alina izy, nefa tsy nisy niteny taminy na dia indraimbava akory aza satria hitany fa mafy loatra ny fahoriany.
