document_id: JER.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny valintenin’NY TOMPO amin’i Zedekia mpanjaka
  - type: text
    content: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO, fony i Zedekia mpanjaka naniraka an’i Pasora, zanak’i Malkia, sy i Zefania, zanak’i Mahaseia mpisorona, hankany aminy hilaza hoe: '
  '10':
  - type: text
    content: Fa manandrina ity tanàna ity Aho hahatonga loza aminy, fa tsy soa, hoy NY TOMPO; hatolotro eo an-tanan’ny mpanjakan’i Babilona izy ka hodorany amin’ny afo.
  - type: heading
    content: Hafatra ho an’ny fianakavian’ny mpanjakan’ny Joda
  '11':
  - type: text
    content: Henoy ny tenin’NY TOMPO
  - type: text
    content: ny amin’ny taranaky ny mpanjakan’ny Joda sy ny mpianakaviny.
  '12':
  - type: text
    content: 'Ry taranak’i Davida, izao no lazain’NY TOMPO:'
  - type: text
    content: Manaova fitsarana marina isa-maraina
  - type: text
    content: ka afaho amin’ny tanan’ny mpampahory ny olona norobaina,
  - type: text
    content: fandrao hivoaka toy ny afo ny fahatezerako ary hirehitra
  - type: text
    content: ka tsy hisy hahavono noho ny ratsy ataonareo.
  '13':
  - type: text
    content: Indro, hohatoniko ianao,
  - type: text
    content: ry mponina an-dohasaha,
  - type: text
    content: dia eo amin’ny vatolampy amin’ny tany lemaka,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: 'dia ianareo izay milaza hoe: Iza moa no sahy hidina hamely anay?'
  - type: text
    content: Ary iza no sahy hiditra atỳ amin’ny fonenanay?
  '14':
  - type: text
    content: Fa hamaly anareo
  - type: text
    content: araka ny vokatry ny asanareo Aho,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: ary handrehitra afo ao amin’ny alany
  - type: text
    content: ka handevona ny manodidina azy rehetra izany.
  '2':
  - type: text
    content: Miangavy anao aho, manontania amin’NY TOMPO ho anay; fa miady aminay i Nebokadnezara, mpanjakan’i Babilona; angamba NY TOMPO hiteny aminay araka ny asany mahagaga rehetra, mba hialan’ireo aminay.
  '3':
  - type: text
    content: 'Dia hoy i Jeremia taminy: Lazaonareo amin’i Zedekia hoe: '
  '4':
  - type: text
    content: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Indro, haveriko ny fiadiana eny an-tananareo izay entinareo miady eny ivelan’ny manda amin’ny mpanjakan’i Babilona sy amin’ny Kaldeana izay manao fahirano anareo, ka hangoniko eto afovoan’ity tanàna ity ireo. '
  '5':
  - type: text
    content: 'Ary Izaho no hiady aminareo amin’ny tanana mitsotra sy amin’ny sandry mahery ary amin’ny fahavinirana sy ny fisafoahana ary ny fahatezerana mirehitra. '
  '6':
  - type: text
    content: 'Hamely ny mponina amin’ity tanàna ity Aho, na olona, na biby: Ho fatin’ny areti-mandringana izy. '
  '7':
  - type: text
    content: Ary rehefa afaka izany, hoy NY TOMPO, i Zedekia, mpanjakan’ny Joda, sy ny mpanompony mbamin’ny vahoaka ary izay sisa tsy matin’ny areti-mandringana sy ny sabatra ary ny mosary amin’ity tanàna ity, dia hatolotro eo an-tanan’i Nebokadnezara, mpanjakan’i Babilona sy eo an-tanan’ny fahavalony ary eo an-tanan’izay mitady ny ainy; dia hamely azy amin’ny lelan-tsabatra ireo fa tsy hitsitsy, na hiantra azy, na hamindra fo aminy.
  '8':
  - type: text
    content: 'Ary ity firenena ity dia hilazanao hoe: Izao no lazain’NY TOMPO: Indro, ataoko eo anoloanareo ny lalan’ny fiainana sy ny lalan’ny fahafatesana: '
  '9':
  - type: text
    content: 'Izay mbola mitoetra eto amin’ity tanàna ity ihany dia ho fatin-tsabatra sy mosary ary areti-mandringana; fa izay mivoaka hanatona ny Kaldeana izay manao fahirano anareo kosa dia ho velona ka ny ainy no ho babony. '
