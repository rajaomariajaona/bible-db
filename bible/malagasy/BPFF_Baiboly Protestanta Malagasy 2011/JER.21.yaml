document_id: JER.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny valintenin’NY TOMPO amin’i Zedekia mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO, fony i Zedekia mpanjaka naniraka an’i Pasora, zanak’i Malkia, sy i Zefania, zanak’i Mahaseia mpisorona, hankany aminy hilaza hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Miangavy anao aho, manontania amin’NY TOMPO ho anay; fa miady aminay i Nebokadnezara, mpanjakan’i Babilona; angamba NY TOMPO hiteny aminay araka ny asany mahagaga rehetra, mba hialan’ireo aminay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy i Jeremia taminy: Lazaonareo amin’i Zedekia hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Indro, haveriko ny fiadiana eny an-tananareo izay entinareo miady eny ivelan’ny manda amin’ny mpanjakan’i Babilona sy amin’ny Kaldeana izay manao fahirano anareo, ka hangoniko eto afovoan’ity tanàna ity ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Izaho no hiady aminareo amin’ny tanana mitsotra sy amin’ny sandry mahery ary amin’ny fahavinirana sy ny fisafoahana ary ny fahatezerana mirehitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hamely ny mponina amin’ity tanàna ity Aho, na olona, na biby: Ho fatin’ny areti-mandringana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary rehefa afaka izany, hoy NY TOMPO, i Zedekia, mpanjakan’ny Joda, sy ny mpanompony mbamin’ny vahoaka ary izay sisa tsy matin’ny areti-mandringana sy ny sabatra ary ny mosary amin’ity tanàna ity, dia hatolotro eo an-tanan’i Nebokadnezara, mpanjakan’i Babilona sy eo an-tanan’ny fahavalony ary eo an-tanan’izay mitady ny ainy; dia hamely azy amin’ny lelan-tsabatra ireo fa tsy hitsitsy, na hiantra azy, na hamindra fo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ity firenena ity dia hilazanao hoe: Izao no lazain’NY TOMPO: Indro, ataoko eo anoloanareo ny lalan’ny fiainana sy ny lalan’ny fahafatesana: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay mbola mitoetra eto amin’ity tanàna ity ihany dia ho fatin-tsabatra sy mosary ary areti-mandringana; fa izay mivoaka hanatona ny Kaldeana izay manao fahirano anareo kosa dia ho velona ka ny ainy no ho babony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa manandrina ity tanàna ity Aho hahatonga loza aminy, fa tsy soa, hoy NY TOMPO; hatolotro eo an-tanan’ny mpanjakan’i Babilona izy ka hodorany amin’ny afo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’ny fianakavian’ny mpanjakan’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Henoy ny tenin’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny amin’ny taranaky ny mpanjakan’ny Joda sy ny mpianakaviny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ry taranak’i Davida, izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova fitsarana marina isa-maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka afaho amin’ny tanan’ny mpampahory ny olona norobaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao hivoaka toy ny afo ny fahatezerako ary hirehitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy hahavono noho ny ratsy ataonareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro, hohatoniko ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry mponina an-dohasaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia eo amin’ny vatolampy amin’ny tany lemaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ianareo izay milaza hoe: Iza moa no sahy hidina hamely anay?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no sahy hiditra atỳ amin’ny fonenanay?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa hamaly anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny vokatry ny asanareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handrehitra afo ao amin’ny alany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handevona ny manodidina azy rehetra izany.
