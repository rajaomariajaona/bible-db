document_id: REV.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sezafiandrianan’Andriamanitra sy ny fanompoam-pivavahana any an-danitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany dia hitako fa indro, nisy varavarana nivoha tany an-danitra, ary ilay feo izay efa reko tamin’ny voalohany dia tahaka ny an’ny trompetra niteny tamiko hoe: Miakara atỳ, dia hasehoko anao izay zavatra tsy maintsy ho avy amin’izao manaraka izao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary niaraka tamin’izay dia voatsindrin’ny Fanahy aho. Indro, nisy sezafiandrianana iray tany an-danitra ary nisy Iray nipetraka teo ambonin’ny sezafiandrianana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny tarehin’Ilay nipetraka dia tahaka ny vato jaspy sy karneola, ary nisy avana mitarehin’emeraoda nanodidina ny sezafiandrianana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary manodidina ilay sezafiandrianana iray dia nisy sezafiandrianana efatra amby roapolo; ary teo ambonin’ireo sezafiandrianana ireo dia nisy loholona efatra amby roapolo nipetraka, nitafy fitafiana fotsy sady nisatroka satroboninahitra volamena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nisy tselatra sy feo ary kotrokorana nivoaka avy teo amin’ny sezafiandrianana, ary nisy jiro fito nirehitra teo anoloan’ny sezafiandrianana; ny Fanahy fiton’Andriamanitra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Teo anoloan’ny sezafiandrianana dia nisy toa ranomasina fitaratra tahaka ny vato kristaly.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Teo afovoan’ny sezafiandrianana sy manodidina azy dia nisy zavamananaina efatra feno maso avokoa teo anoloany sy teo ivohony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny zavamananaina voalohany dia tahaka ny liona, ny zavamananaina faharoa dia tahaka ny zanak’omby, ny zavamananaina fahatelo dia manana tava tahaka ny tavan’olona ary ny zavamananaina fahefatra dia tahaka ny voromahery manidina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny zavamananaina efatra dia samy nanana elatra enina avy, sady feno maso ny tenany rehetra manodidina ka hatrany anatiny. Ary tsy mitsahatra andro aman’alina izy miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masina, masina, masina ny Tompo Andriamanitra Tsitoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay taloha sy ankehitriny ary ho avy!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary isaky ny manome voninahitra sy haja ary fisaorana ho an’Ilay mipetraka eo ambonin’ny sezafiandrianana, dia Izay velona mandrakizay mandrakizay, ny zavamananaina, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia miankohoka eo anoloan’Izay mipetraka eo ambonin’ny sezafiandrianana ny loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Presbytera.
    marker-yv: yv-n
  - type: text
    text: ' efatra amby roapolo ka mivavaka amin’Izay velona mandrakizay mandrakizay, ary manipy ny satroboninahiny eo anoloan’ny sezafiandrianana sady miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ianao, Tomponay sy Andriamanitray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mendrika handray ny voninahitra sy ny haja ary ny hery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Ianao no nahary ny zavatra rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noho ny sitraponao no naha nisy sy naha ary azy.
