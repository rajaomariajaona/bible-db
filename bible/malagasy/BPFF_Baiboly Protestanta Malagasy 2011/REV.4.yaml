document_id: REV.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny sezafiandrianan’Andriamanitra sy ny fanompoam-pivavahana any an-danitra
  - type: text
    content: 'Rehefa afaka izany dia hitako fa indro, nisy varavarana nivoha tany an-danitra, ary ilay feo izay efa reko tamin’ny voalohany dia tahaka ny an’ny trompetra niteny tamiko hoe: Miakara atỳ, dia hasehoko anao izay zavatra tsy maintsy ho avy amin’izao manaraka izao.'
  '10':
  - type: text
    content: dia miankohoka eo anoloan’Izay mipetraka eo ambonin’ny sezafiandrianana ny loholona
  - type: note
    content: 'Na: Presbytera.'
  - type: text
    content: ' efatra amby roapolo ka mivavaka amin’Izay velona mandrakizay mandrakizay, ary manipy ny satroboninahiny eo anoloan’ny sezafiandrianana sady miteny hoe:'
  '11':
  - type: text
    content: Ianao, Tomponay sy Andriamanitray,
  - type: text
    content: no mendrika handray ny voninahitra sy ny haja ary ny hery;
  - type: text
    content: fa Ianao no nahary ny zavatra rehetra
  - type: text
    content: ary noho ny sitraponao no naha nisy sy naha ary azy.
  '2':
  - type: text
    content: 'Ary niaraka tamin’izay dia voatsindrin’ny Fanahy aho. Indro, nisy sezafiandrianana iray tany an-danitra ary nisy Iray nipetraka teo ambonin’ny sezafiandrianana. '
  '3':
  - type: text
    content: Ary ny tarehin’Ilay nipetraka dia tahaka ny vato jaspy sy karneola, ary nisy avana mitarehin’emeraoda nanodidina ny sezafiandrianana.
  '4':
  - type: text
    content: Ary manodidina ilay sezafiandrianana iray dia nisy sezafiandrianana efatra amby roapolo; ary teo ambonin’ireo sezafiandrianana ireo dia nisy loholona efatra amby roapolo nipetraka, nitafy fitafiana fotsy sady nisatroka satroboninahitra volamena.
  '5':
  - type: text
    content: 'Ary nisy tselatra sy feo ary kotrokorana nivoaka avy teo amin’ny sezafiandrianana, ary nisy jiro fito nirehitra teo anoloan’ny sezafiandrianana; ny Fanahy fiton’Andriamanitra ireo. '
  '6':
  - type: text
    content: Teo anoloan’ny sezafiandrianana dia nisy toa ranomasina fitaratra tahaka ny vato kristaly.
  - type: text
    content: 'Teo afovoan’ny sezafiandrianana sy manodidina azy dia nisy zavamananaina efatra feno maso avokoa teo anoloany sy teo ivohony. '
  '7':
  - type: text
    content: 'Ny zavamananaina voalohany dia tahaka ny liona, ny zavamananaina faharoa dia tahaka ny zanak’omby, ny zavamananaina fahatelo dia manana tava tahaka ny tavan’olona ary ny zavamananaina fahefatra dia tahaka ny voromahery manidina. '
  '8':
  - type: text
    content: 'Ny zavamananaina efatra dia samy nanana elatra enina avy, sady feno maso ny tenany rehetra manodidina ka hatrany anatiny. Ary tsy mitsahatra andro aman’alina izy miteny hoe:'
  - type: text
    content: Masina, masina, masina ny Tompo Andriamanitra Tsitoha,
  - type: text
    content: Ilay taloha sy ankehitriny ary ho avy!
  '9':
  - type: text
    content: 'Ary isaky ny manome voninahitra sy haja ary fisaorana ho an’Ilay mipetraka eo ambonin’ny sezafiandrianana, dia Izay velona mandrakizay mandrakizay, ny zavamananaina, '
