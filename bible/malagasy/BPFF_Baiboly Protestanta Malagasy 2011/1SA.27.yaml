document_id: 1SA.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mialokaloka any amin’ny Filistina i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy i Davida anakampo: Mbola ho azon’ny tanan’i Saoly ihany aho indray andro any; tsy misy mahasoa ahy afa-tsy ny mandositra haingana any amin’ny tanin’ny Filistina, dia ho kivy i Saoly ka tsy hitady ahy manerana ny tanin’ny Israely intsony ary ho afaka amin’ny tanany aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niainga i Davida ka nandeha niaraka tamin’ny eninjato lahy nanaraka azy nankany amin’i Akisy, zanak’i Maoka, mpanjakan’i Gata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nitoetra tao amin’i Akisy tao Gata i Davida, dia izy sy ny olony, samy miaraka amin’ny ankohonany avy ka i Davida dia niaraka tamin’ny vadiny roa, dia i Ahinoama jezirelita sy i Abigaila vadin’i Nabala karmelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nisy nanambara tamin’i Saoly fa efa nandositra nankany Gata i Davida, koa tsy nitady azy intsony izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy i Davida tamin’i Akisy: Raha mahita fitia eo imasonao aho dia aoka mba homena toerana ao amin’ny tanàna iray any ambanivohitra mba honenako, fa nahoana ny mpanomponao no hitoetra miaraka aminao eto amin’ny renivohitry ny fanjakana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nomen’i Akisy azy androtr’izay i Ziklaga. An’ny mpanjakan’i Joda ambaraka androany i Ziklaga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny andro nitoeran’i Davida tany ambanivohitry ny Filistina dia herintaona sy efa-bolana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niakatra i Davida sy ny olony ka nanafika ny Gesorita sy ny Gizrita ary ny Amalekita satria ireo no nonina tamin’ny tany hatrizay ela izay, hatrany akaikin’i Sora, hatrany amin’ny tany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Namely ny tany i Davida ka tsy nisy novelominy na lehilahy na vehivavy, sady namabo ondry aman’osy sy omby, boriky sy rameva ary fitafiana izy, dia niverina nankany amin’i Akisy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy i Akisy: Moa tsy nanafika va ianareo androany? Dia hoy i Davida: Nanafika ny tany atsimo izay any Joda sy izay an’ny Jeramelita ary izay an’ny Kenita izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy nisy novelomin’i Davida mba hoentiny any Gata, na lehilahy na vehivavy, fa hoy izy: Andrao hisy hilaza momba anay hoe: Toy izao no nataon’i Davida ary toy izany no fanaony tamin’ny andro rehetra nitoerany tany ambanivohitry ny Filistina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nino an’i Davida i Akisy ka niteny hoe: Efa nampangidy hoditra ny tenany any amin’ny Israely olony izy ka ho mpanompoko mandrakizay.'
