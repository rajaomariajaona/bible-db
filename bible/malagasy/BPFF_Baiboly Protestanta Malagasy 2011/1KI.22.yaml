document_id: 1KI.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mikasa haka an’i Ramota-Gileada indray i Ahaba
  - type: heading
    content: 2Tan 18.1-3
  - type: text
    content: 'Nandry fehizay ny tany nandritra ny telo taona ka tsy nisy ady tamin’i Arama sy Israely. '
  '10':
  - type: text
    content: 'Ary ny mpanjakan’ny Israely sy i Josafata, mpanjakan’ny Joda, dia samy nipetraka teo amin’ny sezafiandrianany avy, teo amin’ny famoloana eo anoloan’ny vavahadin’i Samaria, sady samy niakanjo ny fanamiany avy; ary ny mpaminany rehetra dia naminany teo anatrehany. '
  '11':
  - type: text
    content: 'Ary i Zedekia, zanak’i Kenana, dia nanao tandroka vy maromaro ka niteny hoe: Izao no lazain’NY TOMPO: Amin’ireto no hanotoanao ny Arameana mandra-paharingany. '
  '12':
  - type: text
    content: 'Ary ny mpaminany rehetra dia naminany toy izany koa hoe: Mandehana any Ramota-Gileada, dia hambinina ianao! NY TOMPO hanolotra azy eo an-tananao ry mpanjaka!'
  - type: heading
    content: Manambara faharesena ny mpaminany Mikaia
  - type: heading
    content: 2Tan 18.12-27
  '13':
  - type: text
    content: 'Ary ilay iraka izay nandeha naka an’i Mikaia dia niteny taminy hoe: Indro, iray feo avokoa izao ireo mpaminany ka milaza soa ho an’ny mpanjaka. Koa miangavy anao aho, aoka re ny teninao mba hifanaraka amin’ny azy ireo ka mba mitenena soa koa ianao! '
  '14':
  - type: text
    content: 'Dia hoy i Mikaia: Raha velona koa NY TOMPO, dia izay lazain’NY TOMPO amiko ihany no hambarako!'
  '15':
  - type: text
    content: 'Dia nankany amin’ny mpanjaka izy. Hoy ny mpanjaka taminy: Ry Mikaia, handeha hanafika an’i Ramota-Gileada va isika, sa hijanona ihany? Ary izy namaly azy hoe: Mandehana, fa hambinina ianao, fa hatolotry NY TOMPO eo an-tananao izy, ry mpanjaka! '
  '16':
  - type: text
    content: 'Hoy koa ny mpanjaka taminy: Impiry no hampianianako anao mba tsy hilaza na inona na inona amiko amin’ny anaran’NY TOMPO afa-tsy izay marina ihany? '
  '17':
  - type: text
    content: 'Dia hoy i Mikaia: Hitako fa indreny ny Israely rehetra dia niely teny an-tendrombohitra toy ny ondry tsy misy mpiandry. Ary hoy NY TOMPO: Tsy manan-tompo ireo, koa aoka izy samy hody soa amantsara any an-tranony avy. '
  '18':
  - type: text
    content: 'Dia hoy ny mpanjakan’ny Israely tamin’i Josafata: Tsy efa voalazako taminao va fa tsy mba mety maminany soa ho ahy izy, fa loza ihany?'
  '19':
  - type: text
    content: 'Ary hoy i Mikaia: Henoy ary ny tenin’NY TOMPO: Nahita NY TOMPO nipetraka teo amin’ny sezafiandrianany aho, ary ny tafiky ny lanitra manontolo nijoro teo anilany, dia teo amin’ny ankavanany sy teo amin’ny ankaviany. '
  '2':
  - type: text
    content: 'Fa tamin’ny taona fahatelo dia nidina i Josafata, mpanjakan’ny Joda, ho any amin’ny mpanjakan’ny Israely. '
  '20':
  - type: text
    content: 'Ary hoy NY TOMPO: Iza no hamitaka an’i Ahaba mba handehanany ho any Ramota-Gileada ka ho lavo any? Ary ny iray dia niteny toy izao, ary ny iray kosa dia niteny toy izatsy. '
  '21':
  - type: text
    content: 'Dia nandroso ny fanahy iray ka nijoro teo anatrehan’NY TOMPO sady niteny hoe: Izaho no hamitaka azy. Hoy NY TOMPO taminy: Amin’inona anefa? '
  '22':
  - type: text
    content: 'Hoy izy: Handeha aho ka ho tonga fanahy mandainga ao am-bavan’ny mpaminaniny rehetra. Dia hoy indray NY TOMPO: Ho voafitakao izy ka hahomby ianao! Mandehana ka ataovy araka izany! '
  '23':
  - type: text
    content: Koa indro, ankehitriny, NY TOMPO efa nanisy fanahy mandainga ao am-bavan’ireto mpaminaninao rehetra ireto ka NY TOMPO no efa nilaza ny loza hanjo anao!
  '24':
  - type: text
    content: 'Fa nanatona i Zedekia, zanak’i Kenana, ka namely ny takolak’i Mikaia sady niteny hoe: Taiza no nialan’ny Fanahin’NY TOMPO tamiko ka nitenenany taminao? '
  '25':
  - type: text
    content: 'Hoy ny navalin’i Mikaia hoe: Indro, ho hitanao izany amin’ny andro hitetezanao efitrano mba hierenao. '
  '26':
  - type: text
    content: 'Dia hoy ny mpanjakan’ny Israely: Sambory i Mikaia ka ento miverina ho any amin’i Amona, lehiben’ny tanàna, sy ho any amin’i Joasy, zanaky ny mpanjaka, '
  '27':
  - type: text
    content: 'dia lazao hoe: Izao no lazain’ny mpanjaka: Ataovy ao an-tranomaizina Ilehio ka fahano mofom-pahoriana sy ranom-pijaliana izy mandra-piveriko soa amantsara! '
  '28':
  - type: text
    content: 'Fa hoy i Mikaia: Raha toa ka tafaverina soa amantsara ianao dia tsy nampitenenin’NY TOMPO aho. Ary hoy koa izy: Samia mihaino izany ianareo, ry firenena rehetra!'
  - type: heading
    content: Maty an’ady i Ahaba mpanjaka
  - type: heading
    content: 2Tan 18.28-34
  '29':
  - type: text
    content: 'Dia niakatra nankany Ramota-Gileada ny mpanjakan’ny Israely sy i Josafata, mpanjakan’ny Joda. '
  '3':
  - type: text
    content: 'Dia hoy ny mpanjakan’ny Israely tamin’ny mpanompony: Moa fantatrareo va fa antsika i Ramota-Gileada, nefa mitoetra foana isika ka tsy maka azy amin’ny tanan’ny mpanjakan’i Arama? '
  '30':
  - type: text
    content: 'Ary hoy ny mpanjakan’ny Israely tamin’i Josafata: Mody hanao olon-kafa aho ka hitsarapaka any anatin’ny ady, fa ianao kosa dia miakanjoa ny fanamianao ihany. Dia nody olon-kafa ny mpanjakan’ny Israely ka nitsarapaka tany anatin’ny ady. '
  '31':
  - type: text
    content: 'Fa ny mpanjakan’i Arama efa nandidy ny roa amby telopolo lahy, lehiben’ny kalesy fitondra miady hoe: Aza miady na amin’ny kely na amin’ny lehibe, fa amin’ny mpanjakan’ny Israely ihany. '
  '32':
  - type: text
    content: 'Nony nahita an’i Josafata ireo lehiben’ny kalesy fitondra miady dia hoy izy: Iny mihitsy no mpanjakan’ny Israely. Dia nitodika nanatrika azy mba hiady aminy ireo, ka niantsoantso i Josafata. '
  '33':
  - type: text
    content: 'Rehefa hitan’ireo lehiben’ny kalesy fitondra miady fa tsy izy no mpanjakan’ny Israely, dia niverina niala taminy ireo. '
  '34':
  - type: text
    content: 'Ary nisy lehilahy iray nandefa anjoanjo zana-tsipìka ka nahavoa ny mpanjakan’ny Israely teo amin’ny fitohizan’ny fiarovan-tratrany ka hoy izy tamin’ny mpitondra ny kalesiny: Ahodino ny kalesy ka ento miala teto amin’ny ady aho fa voa. '
  '35':
  - type: text
    content: 'Nihamafy ny ady tamin’izay andro izay ka notohanana ny mpanjaka mba hijoro teo amin’ny kalesiny, nanatrika ny Arameana, nefa nony efa hilentika ny masoandro dia maty izy. Ary ny ra avy tamin’ny ratrany dia nikoriana tao anatin’ny kalesy. '
  '36':
  - type: text
    content: 'Nony efa hilentika ny masoandro dia niely nanerana ny toby izao antsoantso izao hoe: Samia mody any an-tanànany avy sy any amin’ny taniny avy! '
  '37':
  - type: text
    content: Fa maty ny mpanjaka ka noentina tany Samaria ary nalevina tao.
  '38':
  - type: text
    content: Nony nosasana teo amin’ny farihin’i Samaria ny kalesiny dia avy ny alika nilelaka ny rany, raha nandro tao ny vehivavy janga; izany dia araka ny tenin’NY TOMPO tokoa.
  '39':
  - type: text
    content: 'Ny tantaran’i Ahaba sisa mbamin’izay rehetra nataony sy ny trano voaravaka ivoara izay natsangany ary ny tanàna rehetra izay naoriny, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  '4':
  - type: text
    content: 'Hoy koa izy tamin’i Josafata: Hiaraka amiko hiady any Ramota-Gileada va ianao? Dia hoy i Josafata tamin’ny mpanjakan’ny Israely: Eny, fa tahaka ny tenako ihany ny aminao, ka toy ny momba ny oloko ny amin’ny olonao, ary toy ny amin’ny soavaliko ny amin’ny soavalinao.'
  - type: heading
    content: Manambara fandresena ireo mpaminany sandoka
  - type: heading
    content: 2Tan 18.4-11
  '40':
  - type: text
    content: Nodimandry any amin’ny razany i Ahaba. I Ahazia zanany no nanjaka nandimby azy.
  - type: heading
    content: I Josafata, mpanjakan’i Joda
  - type: heading
    content: 2Tan 20.31–21.1
  '41':
  - type: text
    content: 'Tonga mpanjakan’ny Joda i Josafata, zanak’i Asa, tamin’ny taona fahefatra nanjakan’i Ahaba, mpanjakan’ny Israely. '
  '42':
  - type: text
    content: 'Dimy amby telopolo taona i Josafata raha nanomboka nanjaka ary dimy amby roapolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Azoba, zanakavavin’i Sily. '
  '43':
  - type: text
    content: 'Nandeha tamin’ny lalana rehetra izay nalehan’i Asa rainy izy ka tsy niala tamin’izany fa nanao izay mahitsy teo imason’NY TOMPO; '
  '44':
  - type: text
    content: 'kanefa tsy mba noravana ireo toerana fanaovana sorona ka mbola namono zavatra hatao fanatitra ny olona sady mbola nandoro ditin-kazo manitra teny amin’ny toerana fanaovana ihany. '
  '45':
  - type: text
    content: Ary tsara fihavanana i Josafata sy ny mpanjakan’ny Israely.
  '46':
  - type: text
    content: 'Ny tantaran’i Josafata sisa sy ny heriny mbamin’ny ady nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '47':
  - type: text
    content: 'Ny sisa tamin’ny olona izay nanolo-tena hijangajanga ho amin’ny fanompoan-tsampy, dia izay mbola tany amin’ny andron’i Asa rainy, dia nofongorany tsy ho eo amin’ny tany. '
  '48':
  - type: text
    content: 'Tsy nisy mpanjaka tany Edoma fahizany fa mpifehy voatendry no nitondra ny fanjakana. '
  '49':
  - type: text
    content: 'Ary nanao sambon’i Tarsisy folo hankany Ofira i Josafata mba haka volamena; nefa tsy lasa tany izy satria nahavakiana tao Eziona-Gebera ireo sambo ireo. '
  '5':
  - type: text
    content: 'Hoy anefa i Josafata tamin’ny mpanjakan’ny Israely: Miangavy anao aho, mba anontanio aloha ny tenin’NY TOMPO. '
  '50':
  - type: text
    content: 'Dia hoy i Ahazia, zanak’i Ahaba, tamin’i Josafata: Aoka mba hiaraka amin’ny mpanomponao any an-tsambo ny mpanompoko! Tsy nety anefa i Josafata. '
  '51':
  - type: text
    content: Nodimandry tany amin’ny razany i Josafata, dia nalevina niaraka amin’ny razany tao amin’ny Tanànan’i Davida rainy. I Jehorama zanany no nanjaka nandimby azy.
  - type: heading
    content: I Ahazia, mpanjakan’ny Israely
  '52':
  - type: text
    content: 'Tamin’ny taona fahafito amby folo nanjakan’i Josafata, mpanjakan’ny Joda, no nanomboka nanjaka tamin’ny Israely tao Samaria i Ahazia, zanak’i Ahaba. Nanjaka roa taona tamin’ny Israely izy. '
  '53':
  - type: text
    content: 'Nanao izay ratsy teo imason’NY TOMPO izy satria nandeha tamin’ny lalan’ny rainy sy ny reniny ary tamin’ny lalan’i Jeroboama, zanak’i Nebata, izay nampanota ny Israely. '
  '54':
  - type: text
    content: 'Nanompo ny '
  - type: text
    content: Baala
  - type: text
    content: ' izy ary niankohoka teo anatrehany ka nahatezitra NY TOMPO, Andriamanitry ny Israely, tahaka izay rehetra nataon’ny rainy.'
  '6':
  - type: text
    content: 'Dia nanangona ny mpaminany tokony ho efajato lahy ny mpanjakan’ny Israely ka niteny tamin’izy ireo hoe: Moa handeha hanafika an’i Ramota-Gileada va aho sa tsy handeha? Dia hoy ireo: Mandehana, fa hatolotry ny Tompo eo an-tananao izy, ry mpanjaka! '
  '7':
  - type: text
    content: 'Hoy kosa anefa i Josafata: Moa tsy misy mpaminanin’NY TOMPO koa va eto mba hanontaniantsika? '
  '8':
  - type: text
    content: 'Dia hoy ny mpanjakan’ny Israely tamin’i Josafata: Mbola misy lehilahy iray ihany, i Mikaia, zanak’i Jimla, izay ahazoantsika manontany amin’NY TOMPO; kanefa halako izy, satria tsy mba maminany soa ho ahy izy fa loza ihany. Dia hoy i Josafata: Aza manao izany, ry mpanjaka! '
  '9':
  - type: text
    content: 'Ary niantso ny tandapa iray ny mpanjakan’ny Israely ka nilaza taminy hoe: Antsoy haingana i Mikaia, zanak’i Jimla.'
