document_id: DAN.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fa tamin’ny taona voalohany nanjakan’i Dariosy mediana aho no nitsangana hampahery sy hanatanjaka azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hanomana tafika ny zanany ka hanangona miaramila marobe; dia ho avy tokoa ireo ka hanerana sy hanafotra; rehefa afaka izany dia hiverina izy ary hanihiny hatrany amin’ny fiarovany mafy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hisafoaka ny mpanjakan’ny atsimo ka hivoaka hiady aminy, dia amin’ny mpanjakan’ny avaratra izay hanangona olona marobe; nefa ireo olona marobe ireo dia hatolotra ho eo an-tanany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary raha miainga ireo olona marobe ireo dia hiavonavona ny fony; haharipaka alinalina izy nefa tsy ho mpandresy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa hiverina ny mpanjakan’ny avaratra ka hanangona olona marobe mihoatra noho ny teo; ary rehefa afaka taona vitsivitsy dia ho avy tokoa izy ka hitondra miaramila maro sy fitaovana betsaka. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Amin’izany andro izany dia maro no hitsangana hamely ny mpanjakan’ny atsimo; ary ireo mahery setra indrindra amin’ny firenenao dia hijoro hahatò ny fahitana; nefa ho lavo izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia ho avy ny mpanjakan’ny avaratra hanandratra tovon-tany hahazo ny tanàna mimanda; ary ny miaramila betsaka avy any atsimo sy ny mpiady fantenany dia tsy afaka hanohitra satria tsy hanan-kery hanoherana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa izay avy hamely azy dia hanao araka izay sitrapony ka tsy hisy hahajanona eo anatrehany; ary hijanona ao amin’ny tany mahafinaritra izy ary hisy fandringanana eny an-tanany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hivonona tsara handeha amin’ny herin’ny fanjakany rehetra izy ka hanao izay hahatsara ny fihavanana; homeny azy ho vady ny zanany vavy ka hahatonga loza ho azy izany; nefa tsy ho tanteraka izany sady tsy hahasoa azy akory. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hitodika mankany amin’ny nosy izy ka hahazo olona marobe; fa hisy mpitondra hampitsahatra ny latsa ataony, nefa izy kosa dia tsy afaka handatsa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hiverina hankany amin’ny fiarovana mafy any amin’ny taniny izy nefa ho tafintohina sy ho lavo ka tsy ho hita intsony. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary ankehitriny dia haharihariko aminao ny marina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ady nifanaovan’ny mpanjaka any avaratra sy any atsimo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, mbola hisy mpanjaka telo koa hitsangana any Persia; ary ny fahefatra dia hanankarena be mihoatra noho izy rehetra; koa rehefa mahery noho ny harenany izy dia hotairiny avokoa ny olona rehetra hamely ny fanjakan’i Gresy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary hitsangana handimby azy indray ny iray izay hampandeha mpampahory ho any amin’izay faritra tsara indrindra amin’ny fanjakany; ary rehefa afaka andro vitsy dia ho faty io, nefa tsy amin’ny fahatezerana na amin’ny ady.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Hisy olona famingavinga indray hitsangana handimby io, izay tsy homena ny voninahitra amin’ny fitondram-panjakana; fa hiditra mangingina izy ka hahazo ny fanjakana amin’ny hafetsena, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ary ireo miaramila betsaka dia hirohotra eo aminy ka ho resiny miaraka amin’ny mpanapaka izay vita fanekena aminy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Rehefa vita fanekena aminy io dia hampiasa fitaka; hiakatra izy ka hahery na dia vitsy aza ny olona entiny. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Hiditra tsy ampoizina amin’ny fari-piadidiana mahavokatra indrindra izy ka hanao izay tsy nataon’ny rainy na ny razany; hozarainy amin’ny azy ny remby sy ny babo ary ny harena; ary hamoron-tsaina hamelezana ny manda fiarovana mandritra ny fotoana voafetra izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hampiasa ny heriny sy ny hafanam-pony mba hamelezana ny mpanjakan’ny atsimo amin’ny miaramila maro izy; ny mpanjakan’ny atsimo kosa dia hanafika ka hitondra miaramila maro sady tena mahery; nefa tsy hahajanona izy satria hisy hamoron-tsaina hamely azy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Eny, izay homana ny hanina avy aminy ihany no hahalavo azy, ary ny miaramilany dia hanenika sy hanafotra ny tany ka maro ny faty hiampatrampatra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny fon’ireo mpanjaka roa ireo dia samy ta hanao ratsy; eo an-databatra iray no hiresahany lainga. Nefa tsy hahomby izany fa hisy farany amin’ny fotoana voafetra ihany.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Hiverina ho any amin’ny taniny mitondra harena be izy; ny fony anefa dia hanohitra ny fanekena masina; hataony izany dia hiverina ho any amin’ny taniny izy.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Amin’ny fotoana voatendry dia ho lasa mianatsimo indray izy; nefa ny farany dia tsy ho toy ny voalohany; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hisy mpanjaka mahery hitsangana ka hanapaka amin’ny fahefana lehibe sady hanao araka izay sitrapony. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'fa ho avy hamely azy ny sambon’i Kitima; dia ho kivy izy ka hiverina ary hisafoaka amin’ny fanekena masina; eny, hiverina izy ka hifanaraka indray amin’ireo efa mahafoy ny fanekena masina. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Hisy miaramila hitsangana noho ny teniny ka handoto ny fitoerana masina, dia ny fiarovana mafy, ary hampitsahatra ny fanatitra isanandro sady hampiditra ny fahavetavetana mahatonga fandravana. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Izay mivadika ny fanekena dia ho azony amin’ny fandokadokafana. Fa ny olona izay mahalala an’Andriamaniny kosa dia hahery ary hiasa. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary izay hendry ao amin’ny olona dia hampianatra ny maro; nefa ho lavon’ny sabatra sy ny lelafo sy ny famaboana ary ny fandrobana elaela ihany izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Rehefa lavo izy ireo dia hahazo famonjena kely; ary maro no hikambana aminy amin’ny fihatsarambelatsihy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Hisy ho lavo koa ny manantsaina, mba hizahan-toetra sy hanadiovana ary hamotsiana azy ambara-pahatongan’ny andro farany, nefa ho amin’ny fotoana voafetra ihany izany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Hanao araka izay sitrapony ny mpanjaka ka hisandratra sy hanandra-tena ho ambonin’ny andriamanitra rehetra, ary hiteny zavatra mahagaga manohitra ny Andriamanitry ny andriamanitra; hahomby amin’izany ihany izy mandra-pahatanteraka ny fahatezerana, satria izay efa voatendry ihany no tsy maintsy hitranga. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Tsy hahoany akory ny andriamanitry ny razany, na ilay tian’ny vehivavy manokana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.37 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tokony ho ny andriamanitra Tamoza, zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eze 8.14.
      marker-yv: yv-n
    - type: text
      text: '; eny, tsy hahoany akory izay andriamanitra fa hanandra-tena noho izy rehetra izy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Fa ny andriamanitry ny fiarovana mafy no hankalazainy hisolo izany; volamena, volafotsy, vatosoa sy zavatra mahafinaritra no hoentiny mankalaza ny andriamanitra izay tsy fantatry ny razany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Miaraka amin’ny andriamanitra hafa izy no hamely ny manda fiarovana mafy indrindra, ary izay manaiky azy dia homeny voninahitra sady hataony mpanapaka ny maro ka hozarainy aminy ny tany ho valisoa.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Rehefa mitsangana izy dia horavana ny fanjakany ka hozaraina ho amin’ny rivotra efatry ny lanitra; nefa tsy ho an’ny taranany ny fanjakany, na araka ny fahefany izay nitondrany, fa hongotana io ka ho an’ny hafa, fa tsy ho an’ireo.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Amin’ny fotoanan’ny farany dia hifanohitra aminy ny mpanjakan’ny atsimo; ny mpanjakan’ny avaratra koa dia ho avy hamely azy toy ny tafio-drivotra ka hitondra kalesy fitondra miady sy mpitaingin-tsoavaly ary sambo maro; hiditra ao amin’ny tany izy ka hanerana sy hanafotra azy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Hiditra ao amin’ny tany mahafinaritra koa izy ary maro no ho lavo; fa ireto avy kosa no ho afa-mandositra ny tanany: i Edoma sy i Moaba ary ireo lohan’ny taranak’i Amona. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Hanainga ny tanany amin’ny tany sasany koa izy; ary ny tany Ejipta dia tsy ho afa-mandositra. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Fa ho lasany ny rakitra volamena sy volafotsy, ary ny zava-tsoan’i Ejipta rehetra ary ny Libiana sy ny Etiopiana dia hanara-dia azy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Fa hisy siosion-dresaka avy any atsinanana sy avy any avaratra haharaiki-tahotra azy ka hivoaka handrava sy handringana olona maro amin’ny fahatezerana lehibe izy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Ary haoriny eo anelanelan’ny ranomasina sy ny tendrombohitra masina mahafinaritra ny tranolainy izay lapany, nefa ho tonga ao amin’izay hiafarany ihany izy ka tsy hisy hamonjy azy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hahery ny mpanjakan’ny atsimo. Nefa ny iray amin’ny olo-manankaja eo aminy dia hahery noho izy aza ka hanapaka; ary ho fahefana lehibe ny fahefany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Rehefa afaka taona vitsivitsy dia hanjary mpiara-miombona antoka izy roa lahy ireo, ary ho avy ny zanakavavin’ny mpanjakan’ny atsimo hankany amin’ny mpanjakan’ny avaratra hanatsara ny fihavanana. Nefa tsy hahatana ny herin-tsandry izy, ary tsy hahajanona ilay mpanjaka sy ny sandriny, fa hatolotra miaraka amin’ireo nitondra azy Razazavavy sy ny rainy niteraka azy ary ilay nampahery azy tamin’izany andro izany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa hisy solofony iray avy amin’ny fotony hitsangana handimby azy; hanatona ny miaramila izy ary hidirany ny fiarovana mafin’ny mpanjakan’ny avaratra; hasiany ireo ka handresy izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ny andriamaniny koa mbamin’ny sarin-javatra voarendrika sy ny fanaka tsara ananany, na ny volafotsy na ny volamena, dia hoentiny any Ejipta avokoa. Hijanona elaela tsy hamely ny mpanjakan’ny avaratra izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary ho tonga any amin’ny fanjakan’ny mpanjakan’ny atsimo izy, nefa hody any amin’ny taniny ihany.
