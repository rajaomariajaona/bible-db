document_id: PRO.19,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Tsara ny mahantra mandeha tsy misy tsiny
  - type: text
    content: noho izay mandainga amin’ny molony sady adala.
  '10':
  - type: text
    content: Tsy mendrika ho an’ny adala ny ho velona amin’ny fahafinaretana,
  - type: text
    content: koa mainka fa ny mpanompo no hifehy ny zanak’andriana.
  '11':
  - type: text
    content: Ny fahendren’ny olona dia manindry ny fahatezerany
  - type: text
    content: ary voninahitra ho azy ny tsy mamaly fahadisoana.
  '12':
  - type: text
    content: Ny fahatezeran’ny mpanjaka dia toy ny fieron’ny liona tanora,
  - type: text
    content: fa toy ny ando amin’ny ahitra kosa ny fankasitrahany.
  '13':
  - type: text
    content: Mahabe fahoriana ny rainy ny zanaka adala
  - type: text
    content: ary ny ady ataon’ny vehivavy dia toy ny rano mitete tsy mitsahatra.
  '14':
  - type: text
    content: Trano sy harena no lova avy amin’ny ray,
  - type: text
    content: fa ny vady hendry kosa dia avy amin’NY TOMPO.
  '15':
  - type: text
    content: Ny hakamoana dia mahasondrian-tory
  - type: text
    content: ary ho mosarena ny olona malaina.
  '16':
  - type: text
    content: Izay mitandrina ny didy dia mitandrina ny ainy,
  - type: text
    content: fa izay tsy mihevitra ny alehany dia ho faty.
  '17':
  - type: text
    content: Izay miantra ny malahelo dia mampisambotra amin’NY TOMPO,
  - type: text
    content: Izy no hanome izay valisoa tokony ho azy.
  '18':
  - type: text
    content: Anaro ny zanakao fa mbola misy azo antenaina ihany,
  - type: text
    content: nefa aza dia entim-po loatra, fandrao mahafaty azy.
  '19':
  - type: text
    content: Izay entim-pahatezerana dia tsy maintsy mandoa ny simba amin’izany;
  - type: text
    content: fa raha afahanao izy dia mbola hanampy fahasahiranana ho azy indray ianao.
  '2':
  - type: text
    content: Tsy tsara ny tsy mamantatra ny tena,
  - type: text
    content: fa izay mirotoroto manao zavatra dia ho diso lalana.
  '20':
  - type: text
    content: Henoy ny saina atolotra anao, ary raiso ny fananarana
  - type: text
    content: mba ho hendry ianao amin’ny manaraka.
  '21':
  - type: text
    content: Maro ny hevitra ao am-pon’ny olona,
  - type: text
    content: fa ny fikasan’NY TOMPO no mitoetra.
  '22':
  - type: text
    content: Izay irina amin’ny olona dia ny hatsaram-panahiny
  - type: text
    content: ary aleo ho mahantra toy izay ho mpandainga.
  '23':
  - type: text
    content: Ny fahatahorana NY TOMPO no ahazoana fiainana;
  - type: text
    content: izay manana izany dia tsy mba handry fotsy sady tsy hiharan-doza.
  '24':
  - type: text
    content: Ny malaina dia mangarona ny eo an-dovia amin’ny tanany,
  - type: text
    content: nefa ny hampakatra azy ho ao am-bavany tsy ataony.
  '25':
  - type: text
    content: Kapohy ny mpaniratsira dia ho hendry ny kely saina
  - type: text
    content: ary anaro ny manan-tsaina dia hahalala fahendrena izy.
  '26':
  - type: text
    content: Izay mandroba an-keriny ny rainy sy mandroaka ny reniny
  - type: text
    content: dia zanaka mahamenatra sy mahafa-baraka.
  '27':
  - type: text
    content: Anaka, mitsahara ange tsy hihaino fampianarana,
  - type: text
    content: dia hirenireny lavitra ny fahalalana ianao.
  '28':
  - type: text
    content: Maniratsira ny fitsarana ny vavolombelona ratsy,
  - type: text
    content: ary ny vavan’ny ratsy fanahy dia mitelina ny ratsy.
  '29':
  - type: text
    content: Vonona ho an’ny mpaniratsira ny fanamelohana,
  - type: text
    content: ary ny kapoka dia ho an’ny lamosin’ny adala.
  '3':
  - type: text
    content: Ny hadalan’ny olona no manimba ny alehany
  - type: text
    content: ka amin’NY TOMPO no sosotra ny fony.
  '4':
  - type: text
    content: Mahamaro sakaiza ny harena,
  - type: text
    content: fa ny mahantra dia afoin’ny sakaizany.
  '5':
  - type: text
    content: Ny vavolombelona mandainga dia tsy ho afa-tsiny
  - type: text
    content: ary tsy ho afa-maina izay mamoaka lainga.
  '6':
  - type: text
    content: Maro no mandambolambo mpanapaka
  - type: text
    content: ary ny olona rehetra dia samy misakaiza amin’izay mpanome zavatra.
  '7':
  - type: text
    content: Ny mahantra dia halan’ny rahalahiny rehetra,
  - type: text
    content: koa mainka va ny sakaizany tsy hanalavitra azy?
  - type: text
    content: Rehefa manjohy azy amin’ny teny izy dia tsy eo intsony ireo.
  '8':
  - type: text
    content: Izay mihary fahendrena dia tia ny tenany
  - type: text
    content: ary izay mitandrina fahalalana no hahita soa.
  '9':
  - type: text
    content: Tsy ho afa-tsiny ny vavolombelona mandainga
  - type: text
    content: ary ho levona ny miteny lainga.
