document_id: PRO.19
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsara ny mahantra mandeha tsy misy tsiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho izay mandainga amin’ny molony sady adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy tsara ny tsy mamantatra ny tena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mirotoroto manao zavatra dia ho diso lalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny hadalan’ny olona no manimba ny alehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka amin’NY TOMPO no sosotra ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mahamaro sakaiza ny harena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mahantra dia afoin’ny sakaizany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny vavolombelona mandainga dia tsy ho afa-tsiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho afa-maina izay mamoaka lainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Maro no mandambolambo mpanapaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny olona rehetra dia samy misakaiza amin’izay mpanome zavatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny mahantra dia halan’ny rahalahiny rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa mainka va ny sakaizany tsy hanalavitra azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa manjohy azy amin’ny teny izy dia tsy eo intsony ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mihary fahendrena dia tia ny tenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mitandrina fahalalana no hahita soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy ho afa-tsiny ny vavolombelona mandainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho levona ny miteny lainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy mendrika ho an’ny adala ny ho velona amin’ny fahafinaretana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa mainka fa ny mpanompo no hifehy ny zanak’andriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fahendren’ny olona dia manindry ny fahatezerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voninahitra ho azy ny tsy mamaly fahadisoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fahatezeran’ny mpanjaka dia toy ny fieron’ny liona tanora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa toy ny ando amin’ny ahitra kosa ny fankasitrahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mahabe fahoriana ny rainy ny zanaka adala
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ady ataon’ny vehivavy dia toy ny rano mitete tsy mitsahatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Trano sy harena no lova avy amin’ny ray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vady hendry kosa dia avy amin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny hakamoana dia mahasondrian-tory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho mosarena ny olona malaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izay mitandrina ny didy dia mitandrina ny ainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay tsy mihevitra ny alehany dia ho faty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay miantra ny malahelo dia mampisambotra amin’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no hanome izay valisoa tokony ho azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Anaro ny zanakao fa mbola misy azo antenaina ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa aza dia entim-po loatra, fandrao mahafaty azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay entim-pahatezerana dia tsy maintsy mandoa ny simba amin’izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha afahanao izy dia mbola hanampy fahasahiranana ho azy indray ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Henoy ny saina atolotra anao, ary raiso ny fananarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho hendry ianao amin’ny manaraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Maro ny hevitra ao am-pon’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fikasan’NY TOMPO no mitoetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izay irina amin’ny olona dia ny hatsaram-panahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aleo ho mahantra toy izay ho mpandainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny fahatahorana NY TOMPO no ahazoana fiainana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manana izany dia tsy mba handry fotsy sady tsy hiharan-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny malaina dia mangarona ny eo an-dovia amin’ny tanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ny hampakatra azy ho ao am-bavany tsy ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Kapohy ny mpaniratsira dia ho hendry ny kely saina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary anaro ny manan-tsaina dia hahalala fahendrena izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay mandroba an-keriny ny rainy sy mandroaka ny reniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zanaka mahamenatra sy mahafa-baraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Anaka, mitsahara ange tsy hihaino fampianarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hirenireny lavitra ny fahalalana ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Maniratsira ny fitsarana ny vavolombelona ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vavan’ny ratsy fanahy dia mitelina ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Vonona ho an’ny mpaniratsira ny fanamelohana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kapoka dia ho an’ny lamosin’ny adala.
