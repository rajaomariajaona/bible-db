document_id: 1TH.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin’izany, rehefa tsy aritray intsony, dia nataonay fa mety ny hijanona irery tany Atena '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nirahinay i Timoty, rahalahinay sady mpanompon’Andriamanitra amin’ny Filazantsaran’i Kristy, mba hampahery sy hampirisika anareo amin’ny finoanareo, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mba tsy hisy ho taitra amin’izao fahoriana izao; fa ny tenanareo dia mahalala fa ho amin’izao no nanendrena antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa fony teo aminareo aza izahay dia nilaza taminareo rahateo fa tsy maintsy hampahorina isika; dia izany tokoa no nitranga sady fantatrareo fa ho izay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noho izany koa, rehefa tsy naharitra intsony aho, dia nandefa iraka mba hahafantarako ny finoanareo, fandrao naka fanahy anareo ny mpaka fanahy ka ho foana izay nikelezanay aina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao anefa dia tonga atỳ aminay i Timoty, rehefa avy tany aminareo ka milaza vaovao mahafaly aminay ny amin’ny finoanareo sy ny fitiavanareo ary ny fahatsiarovanareo tsara anay mandrakariva, fa maniry hahita anay indrindra ianareo, tahaka anay ta hahita anareo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Noho izany, ry rahalahy, dia nampionona anay teo amin’ny fahaterenay sy ny fahorianay rehetra ny finoanareo; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa velona izahay ankehitriny raha mitoetra tsara ao amin’ny Tompo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa inona no saotra azonay havaly an’Andriamanitra noho ny fifalianay rehetra noho ny aminareo eo anatrehan’Andriamanitray? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mangataka fatratra andro aman’alina hahita ny tavanareo sy hahatanteraka izay tsy ampy amin’ny finoanareo izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Handamina ny lalanay ho atỳ aminareo anie Andriamanitra Raintsika sy Jesosy Tompontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hampitombo sy hampandroso anareo amin’ny fifankatiavana sy ny fitiavana ny olona rehetra anie ny Tompo, dia tahaka ny itiavanay anareo koa '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mba hampiorina ny fonareo tsy hanan-tsiny amin’ny fahamasinana eo anatrehan’Andriamanitra Raintsika amin’ny fiavian’i Jesosy Tompontsika mbamin’ny olo-masiny rehetra.
