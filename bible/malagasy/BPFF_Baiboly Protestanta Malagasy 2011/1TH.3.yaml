document_id: 1TH.3,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary tamin’izany, rehefa tsy aritray intsony, dia nataonay fa mety ny hijanona irery tany Atena '
  '10':
  - type: text
    content: Mangataka fatratra andro aman’alina hahita ny tavanareo sy hahatanteraka izay tsy ampy amin’ny finoanareo izahay.
  '11':
  - type: text
    content: 'Handamina ny lalanay ho atỳ aminareo anie Andriamanitra Raintsika sy Jesosy Tompontsika. '
  '12':
  - type: text
    content: 'Ary hampitombo sy hampandroso anareo amin’ny fifankatiavana sy ny fitiavana ny olona rehetra anie ny Tompo, dia tahaka ny itiavanay anareo koa '
  '13':
  - type: text
    content: mba hampiorina ny fonareo tsy hanan-tsiny amin’ny fahamasinana eo anatrehan’Andriamanitra Raintsika amin’ny fiavian’i Jesosy Tompontsika mbamin’ny olo-masiny rehetra.
  '2':
  - type: text
    content: 'ka nirahinay i Timoty, rahalahinay sady mpanompon’Andriamanitra amin’ny Filazantsaran’i Kristy, mba hampahery sy hampirisika anareo amin’ny finoanareo, '
  '3':
  - type: text
    content: 'mba tsy hisy ho taitra amin’izao fahoriana izao; fa ny tenanareo dia mahalala fa ho amin’izao no nanendrena antsika. '
  '4':
  - type: text
    content: 'Fa fony teo aminareo aza izahay dia nilaza taminareo rahateo fa tsy maintsy hampahorina isika; dia izany tokoa no nitranga sady fantatrareo fa ho izay. '
  '5':
  - type: text
    content: Noho izany koa, rehefa tsy naharitra intsony aho, dia nandefa iraka mba hahafantarako ny finoanareo, fandrao naka fanahy anareo ny mpaka fanahy ka ho foana izay nikelezanay aina.
  '6':
  - type: text
    content: 'Izao anefa dia tonga atỳ aminay i Timoty, rehefa avy tany aminareo ka milaza vaovao mahafaly aminay ny amin’ny finoanareo sy ny fitiavanareo ary ny fahatsiarovanareo tsara anay mandrakariva, fa maniry hahita anay indrindra ianareo, tahaka anay ta hahita anareo koa. '
  '7':
  - type: text
    content: 'Noho izany, ry rahalahy, dia nampionona anay teo amin’ny fahaterenay sy ny fahorianay rehetra ny finoanareo; '
  '8':
  - type: text
    content: 'fa velona izahay ankehitriny raha mitoetra tsara ao amin’ny Tompo ianareo. '
  '9':
  - type: text
    content: 'Fa inona no saotra azonay havaly an’Andriamanitra noho ny fifalianay rehetra noho ny aminareo eo anatrehan’Andriamanitray? '
