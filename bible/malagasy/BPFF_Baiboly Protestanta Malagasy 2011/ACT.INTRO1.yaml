document_id: ACT.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Fizarana faharoa amin’ny asa soratr’i Lioka izay nanoratra ny Filazantsara fahatelo ity. Tantaran’ny Fiangonana voalohany no voarakitra ato, nanomboka tao Jerosalema, taorianan’ny niakaran’i Jesosy tany an-danitra sy ny nirotsahan’ny Fanahy Masina ka hatramin’ny nahatongavan’i Paoly tany Roma, hotsaraina sy hogadraina.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Tsy nitantara fotsiny i Lioka fa nandray anjara mihitsy koa tamin’ny zavatra nitranga voambara ato satria niara-dia tamin’i Paoly izy.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny vanim-potoana voatantara ao amin’ny bokin’ny Asan’ny Apostoly dia manodidina ny taona 30 ny fanombohany ary mifarana eo amin’ny taona 61–63 eo izay fotoana nigadran’i Paoly sy nitsarana azy, izany hoe 30 taona mahery eo.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Asehon’i Lioka ato amin’ny bokiny ny fiitaran’ny fivavahana kristiana, niainga tao Jerosalema ary nankany amin’ny Jentilisa na ireo hafa firenena noho ny Jiosy, tonga hatrany Roma izay noheverina ho faran’ny tany tamin’izany fotoana izany.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Teraka tao Jerosalema tamin’ny nirotsahan’ny Fanahy Masina ny Fiangonana kristiana voalohany, fa tany Antiokia kosa no niantsoana voalohany ny mpianatra hoe Kristiana.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Olon-tsotra feno ny Fanahy Masina ireo izay nitory tamin’ny fahasahiana ny Filazantsaran’i Jesosy Kristy, Zanak’Andriamanitra, Ilay maty nohomboan’ny Jiosy tamin’ny hazofijaliana nefa natsangan’Andriamanitra ho velona mandrakizay ary mampahery ny mpanompony mandrakariva.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Miasa Andriamanitra. Ta hamonjy Izy. Izay mandray ny teny torina ka mino izany ary atao batisa no vonjena na Jiosy izy na Jentilisa.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Nisy hatrany ny fanoherana avy tamin’ny Jiosy ary niharitra fanenjehana sy fisamborana sady naiditra an-tranomaizina aza ry Petera sy Paoly, kanefa tsy nahasakana ny fampielezana ny tenin’Andriamanitra izany.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny nirotsahan’ny Fanahy Masina sy ny fifidianana ny solon’i Jodasy: 1'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fitoriana ny Filazantsara tao Jerosalema: 2–8.3'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fitoriana ny Filazantsara tany Jodia sy Samaria: 8.4–9.31'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'I Petera manomboka mifandray amin’ny Jentilisa: 9.32–12.25'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'I Paoly mitondra ny Filazantsara manerana ny fanjakana romana: 13–28'
