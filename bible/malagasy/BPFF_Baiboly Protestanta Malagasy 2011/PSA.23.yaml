document_id: PSA.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: NY TOMPO no mpiandry ahy
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: 'NY TOMPO no Mpiandry ahy: Tsy misy zava-mahory ahy.'
  '2':
  - type: text
    content: Mampandry ahy amin’ny ahi-maitso Izy,
  - type: text
    content: mitondra ahy ho eo amoron’ny rano fialan-tsasatra Izy.
  '3':
  - type: text
    content: Mamelombelona ny fanahiko Izy;
  - type: text
    content: mitarika ahy amin’ny lalan’ny fahamarinana
  - type: text
    content: noho ny anarany Izy.
  '4':
  - type: text
    content: Eny, na dia mandeha mamakivaky ny lohasaha aloky ny fahafatesana aza aho
  - type: text
    content: dia tsy hatahotra ny loza satria Ianao no miaraka amiko;
  - type: text
    content: ny tsorakazonao
  - type: note
    content: 'tsorakazo: hazo eny an-tanan’ny mpiandry ondry hikapohany ny amboadia.'
  - type: text
    content: ' sy ny tehinao'
  - type: note
    content: 'tehina: tehina misy mifaraingo, isarihan’ny mpiandry ny ondry mania.'
  - type: text
    content: ', ireo no mahafa-tahotra ahy.'
  '5':
  - type: text
    content: Mamelatra latabatra eo anoloako
  - type: text
    content: eo imason’ny fahavaloko Ianao;
  - type: text
    content: manosotra diloilo ny lohako Ianao;
  - type: text
    content: ny kapoakako dia feno dia feno.
  '6':
  - type: text
    content: Eny tokoa, fahasoavana sy famindrampo no hanaraka ahy amin’ny andro rehetra hiainako,
  - type: text
    content: dia hitoetra ao amin’ny tranon’NY TOMPO aho
  - type: text
    content: amin’ny androko rehetra.
