document_id: PSA.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO no mpiandry ahy
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'NY TOMPO no Mpiandry ahy: Tsy misy zava-mahory ahy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mampandry ahy amin’ny ahi-maitso Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitondra ahy ho eo amoron’ny rano fialan-tsasatra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mamelombelona ny fanahiko Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitarika ahy amin’ny lalan’ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny anarany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eny, na dia mandeha mamakivaky ny lohasaha aloky ny fahafatesana aza aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hatahotra ny loza satria Ianao no miaraka amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tsorakazonao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tsorakazo: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: hazo eny an-tanan’ny mpiandry ondry hikapohany ny amboadia.
    marker-yv: yv-n
  - type: text
    text: ' sy ny tehinao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tehina: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tehina misy mifaraingo, isarihan’ny mpiandry ny ondry mania.
    marker-yv: yv-n
  - type: text
    text: ', ireo no mahafa-tahotra ahy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mamelatra latabatra eo anoloako
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo imason’ny fahavaloko Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manosotra diloilo ny lohako Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny kapoakako dia feno dia feno.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eny tokoa, fahasoavana sy famindrampo no hanaraka ahy amin’ny andro rehetra hiainako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hitoetra ao amin’ny tranon’NY TOMPO aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny androko rehetra.
