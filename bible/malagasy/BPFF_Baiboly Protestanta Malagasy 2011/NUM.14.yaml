document_id: NUM.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandà tsy hiditra any Kanana ny vahoaka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanandratra ny feony ny fiangonana manontolo ka nitaraina; nitomany ny olona nandritra iny alina iny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fiangonana manontolo dia nilaza hitora-bato azy roalahy, kanjo ny voninahitry NY TOMPO niseho teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ', teo anatrehan’ny Zanak’Israely rehetra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy NY TOMPO tamin’i Mosesy: Mandra-pahoviana no hamingavingan’ity firenena ity Ahy? Ary mandra-pahoviana no tsy hinoany Ahy noho ny famantarana rehetra izay nataoko teo aminy? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hamely azy amin’ny areti-mandringana Aho ka hanary azy tsy hanan-dova, fa hanao anao ho firenena lehibe sy mahery noho izy kosa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Mosesy tamin’NY TOMPO: Ny Ejiptiana anefa dia efa nandre fa ny herinao no nitondranao ity firenena ity niakatra avy teo aminy '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary holazainy amin’ny mponina eo amin’ity tany ity izany. Ary efa reny fa Ianao, TOMPO, no eto amin’ity firenena ity; Ianao TOMPO, no hita maso mifanatrika; ny rahonao no mijanona eo amboniny; Ianao no mitarika azy eo aloha amin’ny andry rahona nony andro ary amin’ny andry afo nony alina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mahafaty ity firenena ity toy ny olona iray Ianao dia hiteny ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' izay nandre ny lazanao hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria tsy zakan’NY TOMPO ny mitondra iny firenena iny ho any amin’ny tany izay nianianany taminy homena azy dia naringany tany an-tany efitra! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, aoka hiseho ny halehiben’ny herin’NY TOMPO, araka ilay teninao hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahari-po NY TOMPO sady be famindrampo, mamela heloka sy fahadisoana, kanefa tsy mety manamarina ny meloka, fa mamaly ny heloky ny ray amin’ny zanaka hatramin’ny zafiafy sy ny zafindohalika. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifona aminao aho, mamelà ny helok’ity firenena ity araka ny halehiben’ny famindramponao sy araka ny namelanao ny helok’ity firenena ity hatrany Ejipta ka mandraka ankehitriny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nimonomonona tamin’i Mosesy sy i Arona ny Zanak’Israely rehetra ka hoy ny fiangonana manontolo taminy: Tahaka izay isika mba maty tany amin’ny tany Ejipta ihany; na mba maty tatỳ amin’ity tany efitra ity! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy NY TOMPO: Efa navelako araka ny teninao izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa raha velona koa Aho ka mameno ny tany rehetra ny voninahitry NY TOMPO, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ireo lehilahy rehetra ireo izay nahita ny voninahitro sy ireo famantarako izay nataoko tany Ejipta sy tany an-tany efitra kanefa naka fanahy Ahy efa impolo kely izao ka tsy nihaino ny feoko, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia tsy hisy hahita ny tany izay nianianako tamin’ny razany homena azy; eny, izay rehetra namingavinga Ahy dia samy tsy hahita izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny amin’i Kaleba mpanompoko kosa, satria fanahy hafa no tao aminy ka tanteraka tamin’ny fanarahana Ahy izy, dia hoentiko ho any amin’ny tany izay efa nalehany izy ary ny taranany no handova izany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny Amalekita sy ny Kananita no mponina ao amin’ny lohasaha. Koa rahampitso dia miverena ianareo ka mankanesa any an-tany efitra amin’ny lalana mankany amin’ny Ranomasina Mena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voaheloka ny taranaka voalohany
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandra-pahoviana no mbola handeferako amin’izao fiangonana ratsy mimonomonona Amiko izao? Efa reko ny fimonomononan’ny Zanak’Israely Amiko. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazao aminy hoe: Raha velona koa Aho, hoy NY TOMPO, dia araka izay nolazainareo teo an-tsofiko no hataoko aminareo: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Etỳ amin’ity tany efitra ity no hiampatramparan’ny fatinareo. Ary ianareo rehetra izay voaisa araka ny nanisana anareo, dia izay hatramin’ny roapolo taona no ho miakatra, izay efa nimonomonona tamiko, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana NY TOMPO no nitondra antsika ho atỳ amin’ity tany ity mba ho lavon-tsabatra ka ho tonga babo ny vadintsika sy ny zanatsika madinika. Tsy aleontsika va miverina ho any Ejipta? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia tsy hisy ho tonga any amin’ny tany izay nananganako tanana hamponenana anareo, afa-tsy i Kaleba, zanak’i Jefone sy i Josoa, zanak’i Nona. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny zanakareo madinika kosa, izay nolazainareo fa ho babo, dia izy ireo no hoentiko miditra ary izy ireo no hahalala ny tany izay nolavinareo. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny aminareo dia hiampatrampatra atỳ amin’ity tany efitra ity ny fatinareo; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny zanakareo dia hirenireny toy ny mpiandry ondry atỳ an-tany efitra nandritra ny efapolo taona ka hiharan’ny valin’ny fijangajanganareo, mandra-pahafatinareo rehetra atỳ an-tany efitra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny isan’ny andro efapolo izay nisafoanareo ny tany, nefa ny andro iray hosoloana taona iray, dia araka izany no hitondranareo ny helokareo efapolo taona ka ho fantatrareo ny fandavako anareo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho TOMPO efa nilaza fa hataoko tokoa izany amin’izao fiangonana manontolo ratsy izao, izay miangona hikomy Amiko; etỳ amin’ity tany efitra ity no hahalany ritra azy ary etỳ no hahafatesany.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo lehilahy izay nirahin’i Mosesy hisafo ny tany, dia izay niverina ka nahatonga ny fiangonana manontolo himonomonona tamin’i Mosesy, satria nilaza ratsy ny tany izy, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ireny nilaza ratsy ny tany ireny dia matin’areti-mandringana teo anatrehan’NY TOMPO. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Josoa, zanak’i Nona, sy i Kaleba, zanak’i Jefone, kosa, izay isan’ireo lehilahy nandeha nisafo ny tany, dia velona ihany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy mankatò indray ny olona
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nolazain’i Mosesy tamin’ny Zanak’Israely rehetra izany teny izany ka nalahelo terỳ ny olona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifampitaona izy ireo hoe: Andeha hifidy mpitarika isika ka hiverina ho any Ejipta!'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nifoha vao maraina izy dia niakatra tany an-tampon’ny tendrombohitra ka niteny hoe: Indreto izahay hiakatra ho any amin’ny tany izay nolazain’NY TOMPO, fa efa nanota izahay! '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Mosesy: Nahoana no mandika ny didin’NY TOMPO ianareo? Tsy hahomby izany. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza miakatra satria tsy momba anareo NY TOMPO '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba tsy ho resy eo anoloan’ny fahavalonareo ianareo. Fa ny Amalekita sy ny Kananita dia eo anoloanareo ka ho lavon-tsabatra ianareo. Satria niala tamin’ny fanarahana NY TOMPO ianareo dia tsy homba anareo Izy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo sahisahy foana izy ireo ka niakatra teo an-tampon’ny tendrombohitra ihany; nefa i Mosesy sy ny vata misy ny faneken’NY TOMPO tsy niala teo an-toby. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nidina ny Amalekita sy ny Kananita, izay nonina teo amin’izany tendrombohitra izany, ka namely azy ary nanorotoro azy hatrany Horma.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niankohoka teo anatrehan’ny fivorian’ny fiangonan’ny Zanak’Israely manontolo i Mosesy sy i Arona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Josoa, zanak’i Nona, sy i Kaleba, zanak’i Jefone, izay isan’ireo nisafo ny tany, dia nandriatra ny fitafiany '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady niteny tamin’ny fiangonan’ny Zanak’Israely manontolo hoe: Ny tany izay nalehanay, nosafoina, dia tany tena tsara indrindra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ankasitrahan’NY TOMPO isika dia hitondra antsika ho amin’izany tany izany Izy ka homeny antsika io, dia tany tondra-dronono sy tantely. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa aza mikomy amin’NY TOMPO ianareo, ary aza matahotra ny tompon-tany koa fa hataontsika indraimbava ireo. Ny aloka niaro azy dia efa niala taminy, fa NY TOMPO no momba antsika. Koa aza matahotra azy ianareo!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mifona ho an’ny vahoaka i Mosesy
    marker-yv: yv-h
