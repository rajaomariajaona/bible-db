document_id: EXO.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny loza fahadimy: Ny areti-mandringana tamin’ny biby fiompy'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray NY TOMPO tamin’i Mosesy: Mankanesa ao amin’i Farao ianao ka lazao aminy hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Hebreo: Avelao ny oloko handeha mba hanompo Ahy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naka molaly avy tao amin’ny lafaoro lehibe tokoa izy roalahy ka nitsangana teo anatrehan’i Farao; dia nafafin’i Mosesy niakatra nanandrify ny lanitra izany ka tonga vay nipoipoitra tamin’ny olona sy tamin’ny biby fiompy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nahajanona teo anatrehan’i Mosesy ny ombiasy noho ny vay, satria ny vay dia nahavoa ny ombiasy mbamin’ny Ejiptiana rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa NY TOMPO nanamafy ny fon’i Farao ka tsy nihaino azy mirahalahy izy, araka izay efa nolazain’NY TOMPO tamin’i Mosesy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny loza fahafito: Ny havandra'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Mosesy: Mifohaza vao maraina ianao dia mitsangàna eo anatrehan’i Farao ka lazao aminy hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Hebreo: Avelao ny oloko handeha mba hanompo Ahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa amin’ity indray mandeha ity dia halefako ny areti-mandringana rehetra avy atỳ Amiko hamely ny tenanao sy ny mpanomponao ary ny vahoakanao mba hahafantaranao fa tsy misy tahaka Ahy amin’ny tany rehetra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ankehitriny, raha izay Aho no nanatsotra ny tanako hamely anao sy ny vahoakanao amin’ny areti-mandringana, dia efa fongotra tamin’ny tany ianao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa izao indrindra no nampaharetako anao, dia ny mba hampahitako anao ny heriko, sy hanambaràna ny anarako any amin’ny tany rehetra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola mirehareha amin’ny oloko ihany va ianao ka tsy hamela azy handeha? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, rahampitso toy izao Aho dia hampilatsaka havandra be dia be izay tsy mbola nisy toy izany teto Ejipta hatramin’ny andro niorenany ka mandraka ankehitriny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, maniraha olona mba hanangona haingana ny bibinao sy izay rehetra anananao any an-tsaha; fa ny olona rehetra sy ny biby fiompy izay tafajanona any an-tsaha tsy tafangona ao an-trano dia hilatsahan’ny havandra ka ho faty avokoa. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mandà ianao ka tsy mamela azy handeha fa mbola mihazona azy ihany '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay natahotra ny tenin’NY TOMPO teo amin’ny mpanompon’i Farao dia nampandositra haingana ny mpanompony sy ny bibiny ho any an-trano; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa izay tsy nandatsaka am-po ny tenin’NY TOMPO kosa dia namela ny mpanompony sy ny bibiny tany an-tsaha ihany.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Mosesy: Atsory manandrify ny lanitra ny tananao, ary aoka hisy havandra hilatsaka amin’ny tany Ejipta manontolo, dia amin’ny olona sy amin’ny biby fiompy ary amin’ny anana rehetra any an-tsaha manerana ny tany Ejipta.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natsotran’i Mosesy nanandrify ny lanitra ny tehiny ka nalefan’NY TOMPO ny kotrokorana sy havandra ary nisy afo nifanaretsadretsaka teny ambonin’ny tany. Ary NY TOMPO dia nandatsaka havandra tamin’ny tany Ejipta. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy havandra, ary nisy afo nifanaretsaka teny anelanelan’ny havandra; mafy tokoa izany ary tsy mbola nisy toy izany tany amin’ny tany Ejipta manontolo hatrizay naha firenena azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny havandra dia namely izay rehetra tany an-tsaha, na olona na biby fiompy, nanerana ny tany Ejipta manontolo; ny anana rehetra tany an-tsaha dia nasian’ny havandra koa, ary ny hazo rehetra tany an-tsaha dia notapatapahiny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tao amin’ny tany Gosena izay nitoeran’ny Zanak’Israely ihany no tsy mba nisy havandra.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampiantso an’i Mosesy sy i Arona indray i Farao ka niteny taminy hoe: Efa nanota aho tamin’izao indray mandeha izao, koa NY TOMPO no marina, fa izaho sy ny vahoakako no meloka. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifonà ho ahy amin’NY TOMPO fa ampy izay ny kotrokorana sy ny havandra, fa havelako handeha ianareo ka tsy hitoetra eto intsony.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy i Mosesy taminy: Raha vao mivoaka ny tanàna aho ka mamelatra ny tanako amin’NY TOMPO dia hitsahatra ny kotrokorana ary ny havandra dia tsy hisy intsony, mba hahafantaranao fa an’NY TOMPO ny tany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia indro ny tanan’NY TOMPO ho amin’ny biby fiompinao izay any an-tsaha, dia amin’ny soavaly, amin’ny boriky, amin’ny rameva, amin’ny omby ary amin’ny ondry aman’osy ka hisy areti-mandringana faran’izay mafy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa fantatro fa tsy mbola hatahotra NY TOMPO Andriamanitra ihany ianao sy ny mpanomponao.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efa ripaka ny tahon-drongony sy ny varimbazaha; fa efa niteraka ny varimbazaha ary efa namony ny tahon-drongony. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny varimbazaha sy ny ampemby no tsy mba ripaka satria mbola fohy ireny.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niala teo amin’i Farao i Mosesy ka nankeo ivelan’ny tanàna dia namelatra ny tanany tamin’NY TOMPO izy ka nitsahatra ny kotrokorana sy ny havandra, ary tsy nisy ranonorana nilatsaka tamin’ny tany intsony.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitan’i Farao fa nitsahatra ny ranonorana sy ny havandra ary ny kotrokorana dia mbola nanota indray izy ka samy nanamafy ny fony izy sy ny mpanompony. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nihamafy ny fon’ny Farao ka tsy nandefa ny Zanak’Israely izy, araka izay efa nampilazain’NY TOMPO an’i Mosesy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO hanavaka ny biby fiompin’ny Israelita amin’ny bibin’ny Ejiptiana ka tsy hisy maty na dia iray akory aza izay rehetra an’ny Zanak’Israely. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanendry fotoana NY TOMPO ka niteny hoe: Rahampitso no hanaovan’NY TOMPO izany zavatra izany eto amin’ny tany.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ampitso dia nataon’NY TOMPO izany zavatra izany ka maty avokoa ny bibin’ny Ejiptiana rehetra; fa ny bibin’ny Zanak’Israely kosa dia tsy mba nisy nahafatesana na dia iray aza. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandefa iraka hijery izany i Farao ka indro, tsy mba nisy nahafatesana ny bibin’ny Zanak’Israely na dia iray aza. Nefa nihamafy ny fon’i Farao ka tsy namela ny olona handeha izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny loza fahenina: Ny vay'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray NY TOMPO tamin’i Mosesy sy i Arona: Makà molaly avy amin’ny lafaoro lehibe, eran’ny tananao roa, ary aoka hafafin’i Mosesy miakatra manandrify ny lanitra eo imason’i Farao izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hitora-jofo manerana ny tany Ejipta manontolo io ka ho tonga vay mipoipoitra amin’ny olona sy amin’ny biby fiompy manerana ny tany Ejipta manontolo.
