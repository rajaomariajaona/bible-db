document_id: EZK.30,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Andron’NY TOMPO sy i Ejipta
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO nanao hoe:'
  '10':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Ny tanan’i Nebokadnezara mpanjakan’i Babilona no hoentiko mandevona ny harenan’i Ejipta. '
  '11':
  - type: text
    content: 'Izy sy ny vahoakany manaraka azy, dia ireo masiaka indrindra amin’ny firenena, no hoentina handrava ny tany; hanatsoaka ny sabany hamely an’i Ejipta ireny ka ho feno faty ny tany. '
  '12':
  - type: text
    content: Hahatankina an’i Neily sy hivarotra ny tany ho eo an-tanan’ny ratsy fanahy Aho, ary ny tanan’ny hafa firenena no hoentiko mandrava ny tany mbamin’izay rehetra ao aminy. Izaho TOMPO no niteny izany.
  '13':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Horavako koa ny sampy, ary hatsahatro ny andriamanitra tsy izy ao Nofa; ary tsy hisy mpanjaka intsony amin’ny tany Ejipta. '
  '14':
  - type: text
    content: 'Handrava an’i Patrosa Aho ary hampirehitra afo any Zoana, ary hotanterahiko ny fitsarana an’i No. '
  '15':
  - type: text
    content: 'Hampidina ny fahatezerako amin’i Sina, fiarovana mafy any Ejipta, Aho, ary hofongorako ny vahoaka be any No. '
  '16':
  - type: text
    content: 'Hampirehitra afo any Ejipta Aho; hiolanolana fatratra i Sina noho ny faharariany; ho voabanga ny mandan’i No ary i Nofa dia hasian’ny fahavalo amin’ny andro antoandro. '
  '17':
  - type: text
    content: 'Ny zatovon’i Avena sy Py-Beseta dia ho lavon-tsabatra sady ho lasan-ko babo ny ao. '
  '18':
  - type: text
    content: 'Any Tapanesa dia ho maizina ny andro rehefa tapahiko any ny ziogan’i Ejipta ka hitsahatra ny fiavonavonan’ny heriny; hisy rahona hanarona azy sady ho lasan-ko babo ny zanany vavy. '
  '19':
  - type: text
    content: Toy izany no hanatanterahako ny fitsarana an’i Ejipta; dia ho fantatra fa Izaho no TOMPO.
  - type: heading
    content: Ny mpanjakan’i Babilona, fiasan’Andriamanitra
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', maminania ka lazao hoe:'
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Midradradradrà ianareo! Indrisy ny andro!
  '20':
  - type: text
    content: 'Tamin’ny andro fahafito tamin’ny volana voalohany, tamin’ny taona fahiraika amby folo dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '21':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', ny sandrin’i Farao mpanjakan’i Ejipta dia efa notorotoroiko, ary e! Tsy notsaboina mba ho sitrana izy na nofehezina lamba mba hanatanjaka azy ka hahatan-tsabatra. '
  '22':
  - type: text
    content: 'Koa izany no nanaovan’NY TOMPO Andriamanitra hoe: Indro, hamely an’i Farao mpanjakan’i Ejipta Aho ka hotorotoroiko ny sandriny, na ny mbola matanjaka, na ny efa torotoro; ary hampilatsaka ny sabatra eny an-tanany Aho. '
  '23':
  - type: text
    content: 'Dia haeliko ho any amin’ny firenena samihafa ny Ejiptiana ka hahahako any amin’ny tany samihafa. '
  '24':
  - type: text
    content: 'Fa hampahatanjahiko kosa ny sandrin’ny mpanjakan’i Babilona ka hataoko eny an-tanany ny sabatro; hotorotoroiko ny sandrin’i Farao, dia hitrona eo anatrehany toy ny fitronan’ny voatrabaka izy. '
  '25':
  - type: text
    content: 'Eny, hampahatanjahiko ny sandrin’ny mpanjakan’i Babilona, dia hiraviravy ny sandrin’i Farao ka ho fantatra fa Izaho no TOMPO, rehefa ataoko eny an-tanan’ny mpanjakan’i Babilona ny sabatro ka haingainy hamelezana ny tany Ejipta. '
  '26':
  - type: text
    content: Dia haeliko ho any amin’ny firenena samihafa ny Ejiptiana ka hahahako any amin’ny tany samihafa; dia ho fantatra fa Izaho no TOMPO.
  '3':
  - type: text
    content: Fa antomotra ny andro,
  - type: text
    content: 'Eny, antomotra ny Andron’NY TOMPO:'
  - type: text
    content: 'Andro mandrahona sy fotoanan’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izany.'
  '4':
  - type: text
    content: Hisy sabatra tonga any Ejipta
  - type: text
    content: ary fangorohoroana fatratra any Kosy,
  - type: text
    content: rehefa miampatrampatra any Ejipta ny voatrabaka,
  - type: text
    content: ary ho lasa ny harenany
  - type: text
    content: sady ho rava ny fanorenany.
  '5':
  - type: text
    content: I Kosy, i Pota, i Lidia, ny olona samihafa firenena rehetra, ny Kobiana
  - type: text
    content: ary ny zanaky ny tany vita fanekena
  - type: text
    content: dia hiaraka ho lavon-tsabatra aminy.
  '6':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Ho lavo koa izay manohana an’i Ejipta
  - type: text
    content: ary hietry ny fiavonavonan’ny heriny;
  - type: text
    content: hatrany Migdola ka hatrany Siena
  - type: text
    content: no ho lavon-tsabatra izy,
  - type: text
    content: hoy NY TOMPO Andriamanitra.
  '7':
  - type: text
    content: 'Ho rava ao amin’ny tany rava izy, ary ny tanànany dia ho lao ao amin’ny tanàna lao, '
  '8':
  - type: text
    content: 'dia ho fantatra fa Izaho no TOMPO rehefa mampirehitra afo any Ejipta Aho ka torotoro izay rehetra manampy azy. '
  '9':
  - type: text
    content: Amin’izany andro izany dia hisy iraka mivoaka avy Amiko handeha an-tsambo hampahatahotra ny Kosita izay mitoetra tsy manana ahiahy, dia hangorohoro tahaka ny tamin’ny andro namelezana an’i Ejipta izy. Fa indro, avy izany!
