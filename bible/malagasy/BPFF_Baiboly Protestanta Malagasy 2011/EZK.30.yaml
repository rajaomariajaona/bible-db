document_id: EZK.30,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Andron’NY TOMPO sy i Ejipta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra: Ny tanan’i Nebokadnezara mpanjakan’i Babilona no hoentiko mandevona ny harenan’i Ejipta. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izy sy ny vahoakany manaraka azy, dia ireo masiaka indrindra amin’ny firenena, no hoentina handrava ny tany; hanatsoaka ny sabany hamely an’i Ejipta ireny ka ho feno faty ny tany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hahatankina an’i Neily sy hivarotra ny tany ho eo an-tanan’ny ratsy fanahy Aho, ary ny tanan’ny hafa firenena no hoentiko mandrava ny tany mbamin’izay rehetra ao aminy. Izaho TOMPO no niteny izany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra: Horavako koa ny sampy, ary hatsahatro ny andriamanitra tsy izy ao Nofa; ary tsy hisy mpanjaka intsony amin’ny tany Ejipta. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Handrava an’i Patrosa Aho ary hampirehitra afo any Zoana, ary hotanterahiko ny fitsarana an’i No. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hampidina ny fahatezerako amin’i Sina, fiarovana mafy any Ejipta, Aho, ary hofongorako ny vahoaka be any No. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hampirehitra afo any Ejipta Aho; hiolanolana fatratra i Sina noho ny faharariany; ho voabanga ny mandan’i No ary i Nofa dia hasian’ny fahavalo amin’ny andro antoandro. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny zatovon’i Avena sy Py-Beseta dia ho lavon-tsabatra sady ho lasan-ko babo ny ao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Any Tapanesa dia ho maizina ny andro rehefa tapahiko any ny ziogan’i Ejipta ka hitsahatra ny fiavonavonan’ny heriny; hisy rahona hanarona azy sady ho lasan-ko babo ny zanany vavy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Toy izany no hanatanterahako ny fitsarana an’i Ejipta; dia ho fantatra fa Izaho no TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpanjakan’i Babilona, fiasan’Andriamanitra
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', maminania ka lazao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midradradradrà ianareo! Indrisy ny andro!
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tamin’ny andro fahafito tamin’ny volana voalohany, tamin’ny taona fahiraika amby folo dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', ny sandrin’i Farao mpanjakan’i Ejipta dia efa notorotoroiko, ary e! Tsy notsaboina mba ho sitrana izy na nofehezina lamba mba hanatanjaka azy ka hahatan-tsabatra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Koa izany no nanaovan’NY TOMPO Andriamanitra hoe: Indro, hamely an’i Farao mpanjakan’i Ejipta Aho ka hotorotoroiko ny sandriny, na ny mbola matanjaka, na ny efa torotoro; ary hampilatsaka ny sabatra eny an-tanany Aho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia haeliko ho any amin’ny firenena samihafa ny Ejiptiana ka hahahako any amin’ny tany samihafa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa hampahatanjahiko kosa ny sandrin’ny mpanjakan’i Babilona ka hataoko eny an-tanany ny sabatro; hotorotoroiko ny sandrin’i Farao, dia hitrona eo anatrehany toy ny fitronan’ny voatrabaka izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Eny, hampahatanjahiko ny sandrin’ny mpanjakan’i Babilona, dia hiraviravy ny sandrin’i Farao ka ho fantatra fa Izaho no TOMPO, rehefa ataoko eny an-tanan’ny mpanjakan’i Babilona ny sabatro ka haingainy hamelezana ny tany Ejipta. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia haeliko ho any amin’ny firenena samihafa ny Ejiptiana ka hahahako any amin’ny tany samihafa; dia ho fantatra fa Izaho no TOMPO.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa antomotra ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, antomotra ny Andron’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Andro mandrahona sy fotoanan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' izany.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hisy sabatra tonga any Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fangorohoroana fatratra any Kosy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa miampatrampatra any Ejipta ny voatrabaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho lasa ny harenany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho rava ny fanorenany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I Kosy, i Pota, i Lidia, ny olona samihafa firenena rehetra, ny Kobiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zanaky ny tany vita fanekena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiaraka ho lavon-tsabatra aminy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lavo koa izay manohana an’i Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hietry ny fiavonavonan’ny heriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany Migdola ka hatrany Siena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho lavon-tsabatra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO Andriamanitra.
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ho rava ao amin’ny tany rava izy, ary ny tanànany dia ho lao ao amin’ny tanàna lao, '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'dia ho fantatra fa Izaho no TOMPO rehefa mampirehitra afo any Ejipta Aho ka torotoro izay rehetra manampy azy. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Amin’izany andro izany dia hisy iraka mivoaka avy Amiko handeha an-tsambo hampahatahotra ny Kosita izay mitoetra tsy manana ahiahy, dia hangorohoro tahaka ny tamin’ny andro namelezana an’i Ejipta izy. Fa indro, avy izany!
