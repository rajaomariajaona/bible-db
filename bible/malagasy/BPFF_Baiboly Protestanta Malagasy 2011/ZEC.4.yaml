document_id: ZEC.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitana fahadimy: Ny fitoeran-jiro sy ny hazo oliva'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary niverina ilay anjely niresaka tamiko ka namoha ahy toy ny olona fohazina amin-tory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy izy tamiko: Inona no hitanao? Ary hoy aho: Hitako fa indro, misy fitoeran-jiro izay volamena izy manontolo, ary ny fitoeran-diloilo eo aminy dia eo amboniny, ary jiro fito no eo an-tampony. Misy fantsona fito avy amin’ny jiro tsirairay izay eo an-tampony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary misy hazo oliva roa eo anilany, ny iray dia eo ankavanan’ny fitoeran-diloilo, ary ny iray dia eo ankaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niteny tamin’ilay anjely niresaka tamiko aho hoe: Inona moa ireo, tompoko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ilay anjely niresaka tamiko dia nanontany ahy hoe: Tsy fantatrao va ireo? Fa hoy aho: Tsia, tompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no tenin’NY TOMPO amin’i Zerobabela:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy amin-kery
- type: usfm
  marker: q1
  children:
  - type: text
    text: na amim-pahatanjahana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa amin’ny Fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Iza moa ianao, ry tendrombohitra lehibe?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tonga tany lemaka eo anoloan’i Zerobabela ianao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no hitondra ny vato hatao tendrony
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sady hisy antsoantso hoe: Fahasoavana, fahasoavana anie ho aminy!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia tonga tamiko indray ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny tanan’i Zerobabela no nanao ny fanorenan’ity trano ity, ary ny tanany koa no hamita azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fantatrao fa Andriamanitra, Tompon’izao rehetra izao, no naniraka ahy ho aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa iza no nanamavo ny andro anaovana asa madinika?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho faly ny olona mahita ny pilao
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny an-tanan’i Zerobabela.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Ireo fito ireo dia ny mason’NY TOMPO izay mijery manerana ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nanontany Azy aho hoe: Inona moa ireo hazo oliva roa eo ankavanan’ny fitoeran-jiro sy eo ankaviany ireo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nanontany Azy fanindroany aho hoe: Inona moa ireo sampahon’oliva roa eo amin’ny fantsona volamena izay mampijononoka volamena avy ao aminy ireo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy izy: Tsy fantatrao va ireo? Ary hoy aho: Tsia, tompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy izy: Ireo ny roalahy izay voahosotra amin’ny diloilo; ireo no mijoro eo anoloan’ny Tompon’ny tany rehetra.'
