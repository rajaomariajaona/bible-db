document_id: ZEC.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahadimy: Ny fitoeran-jiro sy ny hazo oliva'
  - type: text
    content: 'Ary niverina ilay anjely niresaka tamiko ka namoha ahy toy ny olona fohazina amin-tory. '
  '10':
  - type: text
    content: Fa iza no nanamavo ny andro anaovana asa madinika?
  - type: text
    content: Ho faly ny olona mahita ny pilao
  - type: text
    content: eny an-tanan’i Zerobabela.
  - type: text
    content: 'Ireo fito ireo dia ny mason’NY TOMPO izay mijery manerana ny tany rehetra. '
  '11':
  - type: text
    content: 'Dia nanontany Azy aho hoe: Inona moa ireo hazo oliva roa eo ankavanan’ny fitoeran-jiro sy eo ankaviany ireo? '
  '12':
  - type: text
    content: 'Ary nanontany Azy fanindroany aho hoe: Inona moa ireo sampahon’oliva roa eo amin’ny fantsona volamena izay mampijononoka volamena avy ao aminy ireo? '
  '13':
  - type: text
    content: 'Dia hoy izy: Tsy fantatrao va ireo? Ary hoy aho: Tsia, tompoko. '
  '14':
  - type: text
    content: 'Dia hoy izy: Ireo ny roalahy izay voahosotra amin’ny diloilo; ireo no mijoro eo anoloan’ny Tompon’ny tany rehetra.'
  '2':
  - type: text
    content: 'Dia hoy izy tamiko: Inona no hitanao? Ary hoy aho: Hitako fa indro, misy fitoeran-jiro izay volamena izy manontolo, ary ny fitoeran-diloilo eo aminy dia eo amboniny, ary jiro fito no eo an-tampony. Misy fantsona fito avy amin’ny jiro tsirairay izay eo an-tampony. '
  '3':
  - type: text
    content: 'Ary misy hazo oliva roa eo anilany, ny iray dia eo ankavanan’ny fitoeran-diloilo, ary ny iray dia eo ankaviany. '
  '4':
  - type: text
    content: 'Dia niteny tamin’ilay anjely niresaka tamiko aho hoe: Inona moa ireo, tompoko? '
  '5':
  - type: text
    content: 'Ary ilay anjely niresaka tamiko dia nanontany ahy hoe: Tsy fantatrao va ireo? Fa hoy aho: Tsia, tompoko. '
  '6':
  - type: text
    content: 'Dia hoy izy:'
  - type: text
    content: 'Izao no tenin’NY TOMPO amin’i Zerobabela:'
  - type: text
    content: Tsy amin-kery
  - type: text
    content: na amim-pahatanjahana
  - type: text
    content: fa amin’ny Fanahiko,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '7':
  - type: text
    content: Iza moa ianao, ry tendrombohitra lehibe?
  - type: text
    content: Ho tonga tany lemaka eo anoloan’i Zerobabela ianao.
  - type: text
    content: Izy no hitondra ny vato hatao tendrony
  - type: text
    content: 'sady hisy antsoantso hoe: Fahasoavana, fahasoavana anie ho aminy!'
  '8':
  - type: text
    content: 'Dia tonga tamiko indray ny tenin’NY TOMPO hoe:'
  '9':
  - type: text
    content: Ny tanan’i Zerobabela no nanao ny fanorenan’ity trano ity, ary ny tanany koa no hamita azy;
  - type: text
    content: dia ho fantatrao fa Andriamanitra, Tompon’izao rehetra izao, no naniraka ahy ho aminao.
