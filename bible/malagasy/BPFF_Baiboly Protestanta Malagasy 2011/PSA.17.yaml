document_id: PSA.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ataovy ho tsy manan-tsiny aho
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Vavaka nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, mihainoa ny rariny, henoy ny fitarainako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atongilano ny sofinao hihaino ny vavaka ataoko avy amin’ny molotra tsy misy fitaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka hivoaka avy eo anatrehanao ny fitsarana ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hijery marina ny masonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nizaha toetra ny foko Ianao sady namantatra ahy nony alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nizaha toetra ahy Ianao nefa tsy nahita na inona na inona:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy naloaky ny vavako izay zavatra nosainiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny amin’ny asan’ny olona dia araka ny tenin’ny molotrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nitandremako tsy ho amin’ny lalan’ny mpanao an-keriny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: mafy orina eo amin’ny lalanao ny diako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy solafaka ny tongotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miantso Anao aho satria mamaly ahy Ianao, Andriamanitra ô.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atongilano amiko ny sofinao ka henoy ny teniko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ataovy mahagaga ny famindramponao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao izay mamonjy amin’ny tananao ankavanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona mialoka Aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hahazoan’ny fahavalo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Arovy tahaka ny anakandriamaso aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afeno ao ambanin’ny aloky ny elatrao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: mba tsy ho azon’ny ratsy fanahy izay mampahory ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ny fahavaloko masiaka izay manodidina ahy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mihidy ao anatin’ny taviny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: teny miavonavona no aloaky ny vavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Manara-dia anay sady manodidina anay izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mikendry ny hamotraka anay amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fijery azy dia tahaka ny liona noana ta hamiravira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny liona tanora mamitsaka ao am-pierena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mitsangàna, TOMPO ô, sakano izy, aripaho izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo amin’ny sabatrao aho mba tsy ho azon’ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: vonjeo amin’ny tananao aho, TOMPO ô, mba tsy ho azon’ny olon’izao tontolo izao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny anjarany dia amin’izao fiainana izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady fenoinao ny harenanao ny kibony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka vokin’izany ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mamela ny fananany be ho an’ny zanany madinika izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa izaho kosa dia aoka hahita ny tavanao amin’ny fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ny endrikao no hahafapo ahy raha mifoha.
