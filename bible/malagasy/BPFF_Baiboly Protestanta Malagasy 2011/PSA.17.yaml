document_id: PSA.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ataovy ho tsy manan-tsiny aho
  - type: text
    content: Vavaka nataon’i Davida.
  - type: text
    content: TOMPO ô, mihainoa ny rariny, henoy ny fitarainako!
  - type: text
    content: Atongilano ny sofinao hihaino ny vavaka ataoko avy amin’ny molotra tsy misy fitaka!
  '10':
  - type: text
    content: Mihidy ao anatin’ny taviny izy,
  - type: text
    content: teny miavonavona no aloaky ny vavany.
  '11':
  - type: text
    content: Manara-dia anay sady manodidina anay izy
  - type: text
    content: ary mikendry ny hamotraka anay amin’ny tany.
  '12':
  - type: text
    content: Ny fijery azy dia tahaka ny liona noana ta hamiravira,
  - type: text
    content: tahaka ny liona tanora mamitsaka ao am-pierena.
  '13':
  - type: text
    content: Mitsangàna, TOMPO ô, sakano izy, aripaho izy!
  - type: text
    content: Vonjeo amin’ny sabatrao aho mba tsy ho azon’ny ratsy fanahy;
  '14':
  - type: text
    content: vonjeo amin’ny tananao aho, TOMPO ô, mba tsy ho azon’ny olon’izao tontolo izao!
  - type: text
    content: Ny anjarany dia amin’izao fiainana izao,
  - type: text
    content: sady fenoinao ny harenanao ny kibony
  - type: text
    content: ka vokin’izany ny zanany
  - type: text
    content: sady mamela ny fananany be ho an’ny zanany madinika izy.
  '15':
  - type: text
    content: Fa izaho kosa dia aoka hahita ny tavanao amin’ny fahamarinana;
  - type: text
    content: aoka ny endrikao no hahafapo ahy raha mifoha.
  '2':
  - type: text
    content: Aoka hivoaka avy eo anatrehanao ny fitsarana ahy
  - type: text
    content: ka hijery marina ny masonao.
  '3':
  - type: text
    content: Nizaha toetra ny foko Ianao sady namantatra ahy nony alina;
  - type: text
    content: 'nizaha toetra ahy Ianao nefa tsy nahita na inona na inona:'
  - type: text
    content: Tsy naloaky ny vavako izay zavatra nosainiko.
  '4':
  - type: text
    content: Ny amin’ny asan’ny olona dia araka ny tenin’ny molotrao
  - type: text
    content: no nitandremako tsy ho amin’ny lalan’ny mpanao an-keriny;
  '5':
  - type: text
    content: mafy orina eo amin’ny lalanao ny diako,
  - type: text
    content: tsy solafaka ny tongotro.
  '6':
  - type: text
    content: Miantso Anao aho satria mamaly ahy Ianao, Andriamanitra ô.
  - type: text
    content: Atongilano amiko ny sofinao ka henoy ny teniko!
  '7':
  - type: text
    content: Ataovy mahagaga ny famindramponao,
  - type: text
    content: Ianao izay mamonjy amin’ny tananao ankavanana
  - type: text
    content: ny olona mialoka Aminao
  - type: text
    content: mba tsy hahazoan’ny fahavalo azy.
  '8':
  - type: text
    content: Arovy tahaka ny anakandriamaso aho,
  - type: text
    content: afeno ao ambanin’ny aloky ny elatrao
  '9':
  - type: text
    content: mba tsy ho azon’ny ratsy fanahy izay mampahory ahy,
  - type: text
    content: 'dia ny fahavaloko masiaka izay manodidina ahy:'
