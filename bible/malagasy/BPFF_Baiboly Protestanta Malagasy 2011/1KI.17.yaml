document_id: 1KI.17,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elia teo amoron’ny renirano Kerita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Elia tisbita, isan’izay nivahiny tany Gileada, dia nilaza tamin’i Ahaba hoe: Raha velona koa NY TOMPO, Andriamanitry ny Israely, izay tompoiko, dia tsy hisy ando na ranonorana akory amin’izao taona izao, raha tsy araka ny teniko ihany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga izy ka nankany Zarefata. Nony teo am-bavahadin’ny tanàna izy dia indro nisy vehivavy mpitondratena nanangona kitay hazo teo. Niantso azy i Elia ka niteny hoe: Miangavy anao aho, mba itondray rano kely amin’ny siny aho mba hosotroiko. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony lasa haka izany Ravehivavy dia niantso azy indray i Elia hoe: Miangavy anao aho, mba itondray mofo kely eny an-tananao koa aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy anefa Ravehivavy: Raha velona koa NY TOMPO Andriamanitrao, tsy manana mofo na dia iray akory aza aho, fa koba kely eran’ny tanana an’ila ao amin’ny siny kely sy diloilo kely foana ao amin’ny tavoara; ary, e! Maka tapa-kitay roa aho izao ary hiditra hanamboatra ireo hohaninay mianaka dia ho faty izahay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Elia taminy: Aza matahotra, fa andeha miditra ka manaova araka izany lazainao izany. Nefa anaovy mofo kely ihany aho aloha dia ento etỳ amiko, fa avy eo vao manaova ho anao sy ny zanakao indray. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO, Andriamanitry ny Israely: Tsy ho lany ny koba ao amin’ny siny kely ary tsy ho ritra ny diloilo ao amin’ny tavoara, mandra-pahatongan’ny andro handatsahan’NY TOMPO ranonorana amin’ny tany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha Ravehivavy ka nanatanteraka ny tenin’i Elia, ary izy sy Ravehivavy mbamin’ny ankohonany dia nanan-kohanina elaela ihany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy lany ny koba tao amin’ny siny kely ary tsy ritra ny diloilo tao amin’ny tavoara, araka ny tenin’NY TOMPO izay nampilazainy an’i Elia.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Namelona indray ny zanak’ilay mpitondratena i Elia
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tatỳ aoriana dia narary ny zanak’ilay vehivavy tompon-trano, ary mafy indrindra ny aretiny ka efa tsy nisy fofonaina intsony ilay zaza. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Ravehivavy tamin’i Elia: Moa mifaninona akory izaho sy ianao, ry lehilahin’Andriamanitra ô? Tonga atỳ amiko hampahatsiaro ny fahotako va ianao ka hahafaty ny zanako? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Elia taminy: Omeo ahy ny zanakao. Dia naka ny zaza teo an-tratran-dreniny izy ka nitondra azy niakatra ho any amin’ny efitrano ambony izay nitoerany, ary nampandry azy teo am-pandrianany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga taminy ny tenin’NY TOMPO hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitaraina tamin’NY TOMPO izy hoe: Ry TOMPO Andriamanitro ô, moa hahatonga loza tamin’ny mpitondratena izay ivahiniako koa va Ianao ka hahafaty ny zanany? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niampatra intelo tamin’ny zaza izy sady nitaraina tamin’NY TOMPO hoe: TOMPO Andriamanitro ô, mifona aminao aho, aoka hody aminy indray ny ain’ity zaza ity! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO nihaino ny feon’i Elia ka nody taminy indray ny ain’ilay zaza ary velona izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandray ny zaza i Elia ka nitondra azy nidina avy tao amin’ny efitrano ambony ho ao anaty trano ary natolony ny reniny sady hoy izy: Jereo, velona ny zanakao! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Ravehivavy tamin’i Elia: Ankehitriny dia fantatro fa lehilahin’Andriamanitra tokoa ianao, ary marina ny tenin’NY TOMPO aloaky ny vavanao.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mialà teto ianao, dia mankanesa any atsinanana, ary miere any anilan’ny renirano Kerita, izay any atsinanan’i Jordana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ny renirano no hisotroanao, ary ny goaika dia efa nodidiako hamelona anao any. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa izy ka nanatanteraka ny tenin’NY TOMPO; nandeha izy ka nitoetra teo anilan’ny renirano Kerita any atsinanan’i Jordana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Goaika tokoa no nitondra mofo sy hena ho azy isa-maraina ary mofo sy hena isan-kariva, ary tamin’ny renirano no nisotroany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony ela anefa dia ritra ny renirano noho ny tsy fisian’ny ranonorana tamin’ny tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elia tao an-tranon’ilay mpitondratena tao Zarefata
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga taminy ny tenin’NY TOMPO hoe: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miaingà ka mankanesa any Zarefata, izay momba an’i Sidona, dia mitoera any. Fa indro, misy vehivavy mpitondratena izay notendreko hamelona anao any. '
