document_id: GEN.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voaroaka avy tao amin’ny saha Edena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny menarana dia fetsy noho ny bibidia rehetra izay nataon’NY TOMPO Andriamanitra. Hoy izy tamin-dRavehivavy: Hay va niteny Andriamanitra hoe: Aza ihinananareo ny hazo rehetra eo amin’ny saha! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy Ravehivavy tamin’ilay menarana: Ny voan’ny hazo eo amin’ny saha dia azonay ihinanana ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ny amin’ny voan’ny hazo eo afovoan’ny saha kosa dia hoy Andriamanitra hoe: Aza ihinananareo na tendrenareo izany, fandrao ho faty ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy ny menarana tamin-dRavehivavy: Tsy ho faty tsy akory ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa fantatr’Andriamanitra hoe amin’izay andro ihinananareo azy dia hahiratra ny masonareo ka ho tahaka an’Andriamanitra ianareo, hahalala ny tsara sy ny ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hitan-dRavehivavy fa tsara ho fihinana ny hazo sady mahafinaritra ny maso, no hazo mahatsiriritra toa hampahahendry, dia nanotazany ny voany ka nihinanany; dia nomeny koa ny vadiny izay teo anilany ka nihinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nahiratra ny mason’izy mivady ka fantany fa mitanjaka izy ireo. Ary nanjaitra ravin’aviavimbazaha izy mba hanaovany sikina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nandre NY TOMPO Andriamanitra nitsangantsangana tao amin’ny saha izy ireo rehefa harivariva ny andro dia niafina ny tavan’NY TOMPO Andriamanitra tao anaty hazo tao amin’ny saha Ralehilahy sy ny vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary NY TOMPO Andriamanitra niantso an-dRalehilahy ka niteny taminy hoe: Aiza moa ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy Ralehilahy: Nandre ny feonao tao amin’ny saha aho dia natahotra satria mitanjaka; dia niery aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy Ny TOMPO Andriamanitra: Iza moa no nanambara taminao fa mitanjaka ianao? Fa angaha nihinananao ny hazo izay nandrarako anao tsy hohanina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy Ralehilahy: Ny vehivavy izay nomenao ho namako, izy no nanome ahy ny voankazo dia nihinana aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy NY TOMPO Andriamanitra tamin-dRavehivavy: Inona izao nataonao izao? Hoy Ravehivavy: Ny menarana no namitaka ahy dia nihinana aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy NY TOMPO Andriamanitra tamin’ny menarana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nahavita izany ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianao no voaozona amin’ny biby fiompy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny bibidia rehetra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny kibonao no handehananao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vovo-tany no hohaninao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro rehetra hiainanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hampifandrafesiko ianao sy ny vehivavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'toy izany koa ny taranakao sy ny taranany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanorotoro ny lohanao ny taranany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ianao kosa dia hanorotoro ny voditongony.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy koa Izy tamin-dRavehivavy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataoko be dia be tokoa ny fahorianao, indrindra fa rehefa manana anaka ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka amin’ny fahoriana no hiterahanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny vadinao no hianteheran’ny fanirianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izy no hanapaka aminao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy koa Izy tamin’i Adama: Satria nihaino ny feon’ny vadinao ianao ka nihinananao ny hazo izay nandrarako anao hoe: Aza mihinana avy amin’izany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia voaozona ny tany noho izay nataonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fahoriana no hihinananao ny vokatry ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro rehetra hiainanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Haniry tsilo sy songosongo ho anao ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny anana eny an-tsaha no hohaninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amin’ny hatsembohan’ny tavanao no hahazoanao hanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-piverinao any amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa avy amin’ny tany no nanalana anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa vovoka ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiverina ho amin’ny vovoka indray.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nataon-dRalehilahy hoe Eva
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Eva: Aina.'
    marker-yv: yv-n
  - type: text
    text: ' ny anaran’ny vadiny, satria izy no renin’ny olombelona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary NY TOMPO Andriamanitra nanamboatra akanjo hoditra ho an’i Adama sy ny vadiny ka nampiakanjo azy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy NY TOMPO Andriamanitra: Indro, tonga tahaka ny iray Amintsika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'amintsika, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.5.
    marker-yv: yv-n
  - type: text
    text: ' ny olona ka mahalala ny tsara sy ny ratsy. Ankehitriny, fandrao hanatsotra ny tanany izy ka hanalany hihinanany koa ny hazon’aina dia ho velona mandrakizay izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia noroahin’NY TOMPO Andriamanitra tao amin’ny saha Edena izy ireo mba hiasa ny tany izay nanalana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Eny, noroahiny ny olona; ary nampitoeriny tany atsinanan’ny saha Edena ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' sy ny lelafon’ny sabatra mihodinkodina hiambina ny lalana mankany amin’ny hazon’aina.'
