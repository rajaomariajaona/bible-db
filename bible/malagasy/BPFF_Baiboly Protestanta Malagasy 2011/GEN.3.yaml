document_id: GEN.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Voaroaka avy tao amin’ny saha Edena
  - type: text
    content: 'Ny menarana dia fetsy noho ny bibidia rehetra izay nataon’NY TOMPO Andriamanitra. Hoy izy tamin-dRavehivavy: Hay va niteny Andriamanitra hoe: Aza ihinananareo ny hazo rehetra eo amin’ny saha! '
  '10':
  - type: text
    content: 'Dia hoy Ralehilahy: Nandre ny feonao tao amin’ny saha aho dia natahotra satria mitanjaka; dia niery aho. '
  '11':
  - type: text
    content: 'Hoy Ny TOMPO Andriamanitra: Iza moa no nanambara taminao fa mitanjaka ianao? Fa angaha nihinananao ny hazo izay nandrarako anao tsy hohanina? '
  '12':
  - type: text
    content: 'Hoy Ralehilahy: Ny vehivavy izay nomenao ho namako, izy no nanome ahy ny voankazo dia nihinana aho. '
  '13':
  - type: text
    content: 'Dia hoy NY TOMPO Andriamanitra tamin-dRavehivavy: Inona izao nataonao izao? Hoy Ravehivavy: Ny menarana no namitaka ahy dia nihinana aho. '
  '14':
  - type: text
    content: 'Dia hoy NY TOMPO Andriamanitra tamin’ny menarana:'
  - type: text
    content: Satria nahavita izany ianao
  - type: text
    content: dia ianao no voaozona amin’ny biby fiompy rehetra
  - type: text
    content: 'sy ny bibidia rehetra:'
  - type: text
    content: Ny kibonao no handehananao,
  - type: text
    content: ary vovo-tany no hohaninao
  - type: text
    content: amin’ny andro rehetra hiainanao.
  '15':
  - type: text
    content: Hampifandrafesiko ianao sy ny vehivavy;
  - type: text
    content: 'toy izany koa ny taranakao sy ny taranany:'
  - type: text
    content: Hanorotoro ny lohanao ny taranany,
  - type: text
    content: ary ianao kosa dia hanorotoro ny voditongony.
  '16':
  - type: text
    content: 'Hoy koa Izy tamin-dRavehivavy:'
  - type: text
    content: Hataoko be dia be tokoa ny fahorianao, indrindra fa rehefa manana anaka ianao,
  - type: text
    content: ka amin’ny fahoriana no hiterahanao.
  - type: text
    content: Ny vadinao no hianteheran’ny fanirianao,
  - type: text
    content: ary izy no hanapaka aminao.
  '17':
  - type: text
    content: 'Hoy koa Izy tamin’i Adama: Satria nihaino ny feon’ny vadinao ianao ka nihinananao ny hazo izay nandrarako anao hoe: Aza mihinana avy amin’izany,'
  - type: text
    content: dia voaozona ny tany noho izay nataonao;
  - type: text
    content: fahoriana no hihinananao ny vokatry ny tany
  - type: text
    content: amin’ny andro rehetra hiainanao.
  '18':
  - type: text
    content: Haniry tsilo sy songosongo ho anao ny tany
  - type: text
    content: ary ny anana eny an-tsaha no hohaninao.
  '19':
  - type: text
    content: Amin’ny hatsembohan’ny tavanao no hahazoanao hanina,
  - type: text
    content: mandra-piverinao any amin’ny tany;
  - type: text
    content: fa avy amin’ny tany no nanalana anao;
  - type: text
    content: fa vovoka ianao
  - type: text
    content: ary hiverina ho amin’ny vovoka indray.
  '2':
  - type: text
    content: 'Hoy Ravehivavy tamin’ilay menarana: Ny voan’ny hazo eo amin’ny saha dia azonay ihinanana ihany. '
  '20':
  - type: text
    content: Ary nataon-dRalehilahy hoe Eva
  - type: note
    content: 'Eva: Aina.'
  - type: text
    content: ' ny anaran’ny vadiny, satria izy no renin’ny olombelona rehetra. '
  '21':
  - type: text
    content: Ary NY TOMPO Andriamanitra nanamboatra akanjo hoditra ho an’i Adama sy ny vadiny ka nampiakanjo azy ireo.
  '22':
  - type: text
    content: 'Ary hoy NY TOMPO Andriamanitra: Indro, tonga tahaka ny iray Amintsika'
  - type: note
    content: 'Na: amintsika, zahao 3.5.'
  - type: text
    content: ' ny olona ka mahalala ny tsara sy ny ratsy. Ankehitriny, fandrao hanatsotra ny tanany izy ka hanalany hihinanany koa ny hazon’aina dia ho velona mandrakizay izy! '
  '23':
  - type: text
    content: 'Dia noroahin’NY TOMPO Andriamanitra tao amin’ny saha Edena izy ireo mba hiasa ny tany izay nanalana azy. '
  '24':
  - type: text
    content: 'Eny, noroahiny ny olona; ary nampitoeriny tany atsinanan’ny saha Edena ny '
  - type: text
    content: kerobima
  - type: text
    content: ' sy ny lelafon’ny sabatra mihodinkodina hiambina ny lalana mankany amin’ny hazon’aina.'
  '3':
  - type: text
    content: 'Fa ny amin’ny voan’ny hazo eo afovoan’ny saha kosa dia hoy Andriamanitra hoe: Aza ihinananareo na tendrenareo izany, fandrao ho faty ianareo. '
  '4':
  - type: text
    content: 'Hoy ny menarana tamin-dRavehivavy: Tsy ho faty tsy akory ianareo! '
  '5':
  - type: text
    content: 'Fa fantatr’Andriamanitra hoe amin’izay andro ihinananareo azy dia hahiratra ny masonareo ka ho tahaka an’Andriamanitra ianareo, hahalala ny tsara sy ny ratsy. '
  '6':
  - type: text
    content: 'Ary hitan-dRavehivavy fa tsara ho fihinana ny hazo sady mahafinaritra ny maso, no hazo mahatsiriritra toa hampahahendry, dia nanotazany ny voany ka nihinanany; dia nomeny koa ny vadiny izay teo anilany ka nihinana. '
  '7':
  - type: text
    content: Dia nahiratra ny mason’izy mivady ka fantany fa mitanjaka izy ireo. Ary nanjaitra ravin’aviavimbazaha izy mba hanaovany sikina.
  '8':
  - type: text
    content: 'Ary nandre NY TOMPO Andriamanitra nitsangantsangana tao amin’ny saha izy ireo rehefa harivariva ny andro dia niafina ny tavan’NY TOMPO Andriamanitra tao anaty hazo tao amin’ny saha Ralehilahy sy ny vadiny. '
  '9':
  - type: text
    content: 'Ary NY TOMPO Andriamanitra niantso an-dRalehilahy ka niteny taminy hoe: Aiza moa ianao? '
