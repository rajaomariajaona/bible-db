verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Isan’ny Mpaminany madinika roa amby folo i Zefania. Taranak’i Hezekia mpanjaka izy, ary zanak’i Kosy, izay mety midika koa fa Etiopiana izy. Nahafantatra tsara ny faritra maro tao Jerosalema sy ny mponina tao izy ary sahy miteny mivantana ny mpitondra tao.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ny fotoana niasany dia tamin’ny fotoana nanjakan’i Josia mpanjaka fony izy io mbola kely, izany hoe: Fotoana ela talohan’ilay fanitsiam-pivavahana nataony, izay voalaza ao amin’ny 2Mpa 22–23 sy ny 2Tan 34–35.'
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny fanambaràna ny Andron’NY TOMPO, izay ho andro fitsarana sady famonjena, no votoatin’ny Bokin’i Zefania. Hiseho amin’ny fomba samihafa izany fidiran’Andriamanitra an-tsehatra izany. Hitsara ny mponina ao Joda sy Jerosalema Izy ka ireo tomponandraikitra ao amin’ny firenena izany no meloka voalohany eo anatrehan’Andriamanitra. Handrava ireo firenena mifanolotra amin’i Joda koa Izy ary hanangana indray an’i Jerosalema rehefa avy namongotra ny ratsy tao anatiny ka mponina mahantra sy manetry tena no sisa ao, ary avy amin’ireo no hisehoan’ny taranaka vaovao.
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Boky
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fampitandremana an’i Joda sy i Jerosalema: 1.2-6'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny Andron’NY TOMPO: 1.7–2.3'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Didim-pitsarana amelezana ny firenena vahiny: 2.4-15'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fampitandremana an’i Jerosalema: 3.1-8'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Teny fampanantenana famonjena: 3.9-20'
