verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Isan’ny Mpaminany madinika roa amby folo i Zefania. Taranak’i Hezekia mpanjaka izy, ary zanak’i Kosy, izay mety midika koa fa Etiopiana izy. Nahafantatra tsara ny faritra maro tao Jerosalema sy ny mponina tao izy ary sahy miteny mivantana ny mpitondra tao.
  - type: text
    content: 'Ny fotoana niasany dia tamin’ny fotoana nanjakan’i Josia mpanjaka fony izy io mbola kely, izany hoe: Fotoana ela talohan’ilay fanitsiam-pivavahana nataony, izay voalaza ao amin’ny 2Mpa 22–23 sy ny 2Tan 34–35.'
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ny fanambaràna ny Andron’NY TOMPO, izay ho andro fitsarana sady famonjena, no votoatin’ny Bokin’i Zefania. Hiseho amin’ny fomba samihafa izany fidiran’Andriamanitra an-tsehatra izany. Hitsara ny mponina ao Joda sy Jerosalema Izy ka ireo tomponandraikitra ao amin’ny firenena izany no meloka voalohany eo anatrehan’Andriamanitra. Handrava ireo firenena mifanolotra amin’i Joda koa Izy ary hanangana indray an’i Jerosalema rehefa avy namongotra ny ratsy tao anatiny ka mponina mahantra sy manetry tena no sisa ao, ary avy amin’ireo no hisehoan’ny taranaka vaovao.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Fampitandremana an’i Joda sy i Jerosalema: 1.2-6'
  - type: text
    content: 'Ny Andron’NY TOMPO: 1.7–2.3'
  - type: text
    content: 'Didim-pitsarana amelezana ny firenena vahiny: 2.4-15'
  - type: text
    content: 'Fampitandremana an’i Jerosalema: 3.1-8'
  - type: text
    content: 'Teny fampanantenana famonjena: 3.9-20'
