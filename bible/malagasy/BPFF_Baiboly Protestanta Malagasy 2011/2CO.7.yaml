document_id: 2CO.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Koa raha manana ireo teny fikasana ireo isika, ry malala, dia aoka isika hanadio ny tenantsika ho afaka amin’ny fahalotoana rehetra, na amin’ny nofo na amin’ny fanahy, ka hahatanteraka ny fahamasinana amin’ny fahatahorana an’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Asio toerana ho anay ny fonareo! Tsy nanao izay tsy marina tamin’olona izahay, tsy nanimba fiainan’olona izahay, tsy nanambaka olona izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy miteny izany ho fanamelohana aho; fa efa nilaza rahateo koa fa ao am-ponay ianareo, mba hiara-maty sy hiara-belona isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Be ny fahatokiako anareo, lehibe ny reharehako ny aminareo; feno fiononana aho sady feno hafaliana indrindra ao anatin’ny fahoriana rehetra manjo anay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Any Makedonia i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa na dia efa tonga tany Makedonia aza izahay dia tsy nisy niainan’ny nofonay, fa nampahorina tamin’ny zavatra rehetra izahay: Teo ivelany, ady; tao anatiny, tahotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa Andriamanitra izay mampionona ny mpandefitra no efa nampionona anay tamin’ny nahatongavan’i Titosy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ary tsy tamin’ny nahatongavany ihany fa tamin’ny fampiononana izay nampiononanareo azy koa, raha nambarany taminay ny fanirianareo sy ny fitomanianareo ary ny hafanam-ponareo amiko hanaiky ahy; koa vao mainka nitombo ny hafaliako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa na dia nampalahelo anareo tamin’ny epistily aza aho dia tsy manenina intsony, na dia efa nanenina ihany aza teo; fa fantatro fa efa nampalahelo anareo izany epistily izany, kanefa vetivety ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mifaly kosa aho ankehitriny, nefa tsy noho ny nampalahelovana anareo fa noho ny nampalahelovana anareo ka nibebahanareo; fa nampalahelovina araka an’Andriamanitra ianareo ka tsy hisy na inona na inona avy aminay hitondra fahavoazana ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ny alahelo araka an’Andriamanitra dia mahatonga fibebahana ho famonjena tsy anenenana; fa mahatonga fahafatesana kosa ny alahelon’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, indro izany nampalahelovana anareo araka an’Andriamanitra izany indrindra dia nahatonga fahazotoana fatratra tao aminareo! Eny, fialan-tsiny manao ahoana! Fahatezerana manao ahoana! Fahatahorana manao ahoana! Faniriana manao ahoana! Hafanam-po manao ahoana! Famaliana ny ratsy natao manao ahoana! Tamin’izany rehetra izany dia nampiseho ny fahadiovanareo ny amin’izany raharaha izany ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa na dia nanoratra taminareo aza aho dia tsy noho izay nahavita ny tsy marina, na noho izay niaritra ny tsy marina, fa mba hanehoana aminareo eo anatrehan’Andriamanitra ny hafanam-ponareo aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary noho izany dia nionona izahay.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary tamin’ny fampiononana anay dia vao mainka nifaly izahay noho ny fifalian’i Titosy, fa efa namelombelona ny fanahiny ianareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha nisy nataoko rehareha taminy ny aminareo dia tsy mahamenatra ahy izany; fa tahaka ny nilazanay marina ny zavatra rehetra taminareo dia tonga marina koa ny reharehanay tamin’i Titosy ny aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary vao mainka miraiki-po aminareo aza izy raha mahatsiaro ny fankatoavanareo rehetra, dia ny haben’ny fahatahorana sy fanajana nandraisanareo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Faly aho fa afaka matoky anareo amin’ny zavatra rehetra.
