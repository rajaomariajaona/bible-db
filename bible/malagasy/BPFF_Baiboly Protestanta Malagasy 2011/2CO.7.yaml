document_id: 2CO.7,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Koa raha manana ireo teny fikasana ireo isika, ry malala, dia aoka isika hanadio ny tenantsika ho afaka amin’ny fahalotoana rehetra, na amin’ny nofo na amin’ny fanahy, ka hahatanteraka ny fahamasinana amin’ny fahatahorana an’Andriamanitra.
  '10':
  - type: text
    content: 'Fa ny alahelo araka an’Andriamanitra dia mahatonga fibebahana ho famonjena tsy anenenana; fa mahatonga fahafatesana kosa ny alahelon’izao tontolo izao. '
  '11':
  - type: text
    content: 'Eny, indro izany nampalahelovana anareo araka an’Andriamanitra izany indrindra dia nahatonga fahazotoana fatratra tao aminareo! Eny, fialan-tsiny manao ahoana! Fahatezerana manao ahoana! Fahatahorana manao ahoana! Faniriana manao ahoana! Hafanam-po manao ahoana! Famaliana ny ratsy natao manao ahoana! Tamin’izany rehetra izany dia nampiseho ny fahadiovanareo ny amin’izany raharaha izany ianareo. '
  '12':
  - type: text
    content: 'Koa na dia nanoratra taminareo aza aho dia tsy noho izay nahavita ny tsy marina, na noho izay niaritra ny tsy marina, fa mba hanehoana aminareo eo anatrehan’Andriamanitra ny hafanam-ponareo aminay. '
  '13':
  - type: text
    content: Ary noho izany dia nionona izahay.
  - type: text
    content: 'Ary tamin’ny fampiononana anay dia vao mainka nifaly izahay noho ny fifalian’i Titosy, fa efa namelombelona ny fanahiny ianareo rehetra. '
  '14':
  - type: text
    content: 'Ary raha nisy nataoko rehareha taminy ny aminareo dia tsy mahamenatra ahy izany; fa tahaka ny nilazanay marina ny zavatra rehetra taminareo dia tonga marina koa ny reharehanay tamin’i Titosy ny aminareo. '
  '15':
  - type: text
    content: 'Ary vao mainka miraiki-po aminareo aza izy raha mahatsiaro ny fankatoavanareo rehetra, dia ny haben’ny fahatahorana sy fanajana nandraisanareo azy. '
  '16':
  - type: text
    content: Faly aho fa afaka matoky anareo amin’ny zavatra rehetra.
  '2':
  - type: text
    content: 'Asio toerana ho anay ny fonareo! Tsy nanao izay tsy marina tamin’olona izahay, tsy nanimba fiainan’olona izahay, tsy nanambaka olona izahay. '
  '3':
  - type: text
    content: 'Tsy miteny izany ho fanamelohana aho; fa efa nilaza rahateo koa fa ao am-ponay ianareo, mba hiara-maty sy hiara-belona isika. '
  '4':
  - type: text
    content: Be ny fahatokiako anareo, lehibe ny reharehako ny aminareo; feno fiononana aho sady feno hafaliana indrindra ao anatin’ny fahoriana rehetra manjo anay.
  - type: heading
    content: Any Makedonia i Paoly
  '5':
  - type: text
    content: 'Fa na dia efa tonga tany Makedonia aza izahay dia tsy nisy niainan’ny nofonay, fa nampahorina tamin’ny zavatra rehetra izahay: Teo ivelany, ady; tao anatiny, tahotra. '
  '6':
  - type: text
    content: 'Fa Andriamanitra izay mampionona ny mpandefitra no efa nampionona anay tamin’ny nahatongavan’i Titosy, '
  '7':
  - type: text
    content: ary tsy tamin’ny nahatongavany ihany fa tamin’ny fampiononana izay nampiononanareo azy koa, raha nambarany taminay ny fanirianareo sy ny fitomanianareo ary ny hafanam-ponareo amiko hanaiky ahy; koa vao mainka nitombo ny hafaliako.
  '8':
  - type: text
    content: 'Fa na dia nampalahelo anareo tamin’ny epistily aza aho dia tsy manenina intsony, na dia efa nanenina ihany aza teo; fa fantatro fa efa nampalahelo anareo izany epistily izany, kanefa vetivety ihany. '
  '9':
  - type: text
    content: 'Mifaly kosa aho ankehitriny, nefa tsy noho ny nampalahelovana anareo fa noho ny nampalahelovana anareo ka nibebahanareo; fa nampalahelovina araka an’Andriamanitra ianareo ka tsy hisy na inona na inona avy aminay hitondra fahavoazana ho anareo. '
