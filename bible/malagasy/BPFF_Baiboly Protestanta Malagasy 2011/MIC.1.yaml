document_id: MIC.1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ny tenin’NY TOMPO izay tonga tamin’i Mika morastita tamin’ny andro nanjakan’i Jotama sy i Ahaza ary i Hezekia, mpanjakan’i Joda, dia ilay hitany ny amin’i Samaria sy i Jerosalema.
  - type: heading
    content: Miampanga ny olony NY TOMPO
  '10':
  - type: text
    content: Aza ambaranareo any Gata izany
  - type: text
    content: ary aza mitomany akory!
  - type: text
    content: Mihosinkosina vovoka ao Bety-Le-afra aho.
  '11':
  - type: text
    content: Mandehana mitanjaka mitondra henatra, ry mponina ao Safira.
  - type: text
    content: Tsy mivoaka ny trano ny mponina ao Zanàna;
  - type: text
    content: misaona ny ao Bety-Haezela ka tsy hanohana anareo intsony.
  '12':
  - type: text
    content: Mitaintaina ny amin’ny soa ho azy ny mponina ao Marota
  - type: text
    content: satria loza no nidina avy tamin’NY TOMPO ho ao am-bavahadin’i Jerosalema.
  '13':
  - type: text
    content: Fehezo amin’ny soavaly haingam-pandeha ny kalesy fitondra miady, ry mponina ao Lakisy!
  - type: text
    content: 'Niandohan’ny fahotan’i '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy iny,'
  - type: text
    content: fa tao aminao no nahitana ny fahadisoan’ny Israely.
  '14':
  - type: text
    content: Koa izany no hanomezanao taratasy fisaorana ho an’i Moreseta-Gata;
  - type: text
    content: ranotrambo ho an’ny mpanjakan’ny Israely ireo tranon’i Akziba.
  '15':
  - type: text
    content: Mbola hitondrako olon-kafa izay handova anao ianao,
  - type: text
    content: ry mponina ao Maresa;
  - type: text
    content: ho tonga hatrany Adolama ny voninahitr’Israely.
  '16':
  - type: text
    content: Miheteza sy mikakasa
  - type: text
    content: noho ireo zanakao maminao.
  - type: text
    content: Halehibiazo ny solanao ho toy ny an’ny vaotoro
  - type: text
    content: fa lasan-ko babo lavitra anao izy.
  '2':
  - type: text
    content: Samia mihaino ianareo, ry firenena rehetra.
  - type: text
    content: Atongilano ny sofinareo, ry tany sy izay zavatra rehetra eo aminy.
  - type: text
    content: Aoka NY TOMPO Andriamanitra
  - type: text
    content: no ho vavolombelona hanameloka anareo,
  - type: text
    content: dia NY TOMPO, avy ao amin’ny tempoliny masina.
  '3':
  - type: text
    content: Fa indro, NY TOMPO miala avy ao amin’ny fitoerany
  - type: text
    content: ary midina ka mandia ny havoana amin’ny tany.
  '4':
  - type: text
    content: Miempo ao ambaniny ny tendrombohitra,
  - type: text
    content: ary mivava ny lohasaha,
  - type: text
    content: tahaka ny savoka taninin’ny afo
  - type: text
    content: sy tahaka ny rano mivarina any amin’ny hantsana.
  '5':
  - type: text
    content: Izany rehetra izany dia noho ny fahadisoan’i Jakoba
  - type: text
    content: sy ny fahotan’ny taranak’Israely.
  - type: text
    content: Iza no nahadiso an’i Jakoba?
  - type: text
    content: Tsy i Samaria va?
  - type: text
    content: Ary iza no toerana fanaovana soron’i Joda?
  - type: text
    content: Tsy i Jerosalema va?
  '6':
  - type: text
    content: Koa i Samaria dia hataoko korontam-bato any an-tsaha
  - type: text
    content: sy tany fambolem-boaloboka;
  - type: text
    content: havariko ho any an-dohasaha ny vatony
  - type: text
    content: ka haharihariko ny fanorenany.
  '7':
  - type: text
    content: Hotorotoroina ny sampiny voasokitra rehetra,
  - type: text
    content: ary hodorana amin’ny afo ny karama malotony rehetra
  - type: text
    content: sady hofoanako ny sampiny rehetra
  - type: text
    content: satria karama maloton’ny vehivavy janga no nanangonany ireny,
  - type: text
    content: ary hody ho karama maloton’ny vehivavy janga indray ilay izy.
  - type: heading
    content: Tomany ny amin’ny tanàna ao Joda
  '8':
  - type: text
    content: Koa izany no hitomaniako sy hidradradradrako
  - type: text
    content: ka hahatonga ahy handeha tsy mikiraro sady mitanjaka;
  - type: text
    content: hikaonkaona toy ny amboadia aho
  - type: text
    content: ary hikiakiaka toy ny aotirisy.
  '9':
  - type: text
    content: Fa tsy azo sitranina ny ferin’i Samaria;
  - type: text
    content: mihatra amin’i Joda izany
  - type: text
    content: ary mahatratra ny vavahadin’ny oloko aza, dia any Jerosalema.
