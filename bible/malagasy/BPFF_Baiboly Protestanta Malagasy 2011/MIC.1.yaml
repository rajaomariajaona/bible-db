document_id: MIC.1
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin’NY TOMPO izay tonga tamin’i Mika morastita tamin’ny andro nanjakan’i Jotama sy i Ahaza ary i Hezekia, mpanjakan’i Joda, dia ilay hitany ny amin’i Samaria sy i Jerosalema.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miampanga ny olony NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Samia mihaino ianareo, ry firenena rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atongilano ny sofinareo, ry tany sy izay zavatra rehetra eo aminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka NY TOMPO Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ho vavolombelona hanameloka anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia NY TOMPO, avy ao amin’ny tempoliny masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa indro, NY TOMPO miala avy ao amin’ny fitoerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary midina ka mandia ny havoana amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miempo ao ambaniny ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mivava ny lohasaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny savoka taninin’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tahaka ny rano mivarina any amin’ny hantsana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izany rehetra izany dia noho ny fahadisoan’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fahotan’ny taranak’Israely.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nahadiso an’i Jakoba?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy i Samaria va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no toerana fanaovana soron’i Joda?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy i Jerosalema va?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa i Samaria dia hataoko korontam-bato any an-tsaha
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tany fambolem-boaloboka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: havariko ho any an-dohasaha ny vatony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka haharihariko ny fanorenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hotorotoroina ny sampiny voasokitra rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hodorana amin’ny afo ny karama malotony rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hofoanako ny sampiny rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria karama maloton’ny vehivavy janga no nanangonany ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hody ho karama maloton’ny vehivavy janga indray ilay izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tomany ny amin’ny tanàna ao Joda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa izany no hitomaniako sy hidradradradrako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahatonga ahy handeha tsy mikiraro sady mitanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hikaonkaona toy ny amboadia aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hikiakiaka toy ny aotirisy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa tsy azo sitranina ny ferin’i Samaria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihatra amin’i Joda izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahatratra ny vavahadin’ny oloko aza, dia any Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza ambaranareo any Gata izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mitomany akory!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihosinkosina vovoka ao Bety-Le-afra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mandehana mitanjaka mitondra henatra, ry mponina ao Safira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mivoaka ny trano ny mponina ao Zanàna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misaona ny ao Bety-Haezela ka tsy hanohana anareo intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mitaintaina ny amin’ny soa ho azy ny mponina ao Marota
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria loza no nidina avy tamin’NY TOMPO ho ao am-bavahadin’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fehezo amin’ny soavaly haingam-pandeha ny kalesy fitondra miady, ry mponina ao Lakisy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Niandohan’ny fahotan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' zanakavavy iny,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tao aminao no nahitana ny fahadisoan’ny Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa izany no hanomezanao taratasy fisaorana ho an’i Moreseta-Gata;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ranotrambo ho an’ny mpanjakan’ny Israely ireo tranon’i Akziba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mbola hitondrako olon-kafa izay handova anao ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry mponina ao Maresa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tonga hatrany Adolama ny voninahitr’Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Miheteza sy mikakasa
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ireo zanakao maminao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Halehibiazo ny solanao ho toy ny an’ny vaotoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa lasan-ko babo lavitra anao izy.
