document_id: LUK.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahaterahan’i Jesosy
  - type: text
    content: 'Tamin’izany andro izany dia nisy didy navoakan’i Aogosto Kaisara hampanoratra ny anaran’ny vahoaka rehetra amin’ny fanjakany. '
  '10':
  - type: text
    content: 'Ary hoy ny anjely taminy: Aza matahotra; fa indro, milaza teny soa mahafaly aminareo aho, dia fifaliana lehibe izay ho an’ny olona rehetra; '
  '11':
  - type: text
    content: 'fa Mpamonjy no teraka ho anareo anio ao an-tanànan’i Davida, dia '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo. '
  '12':
  - type: text
    content: 'Izao no ho famantarana ho anareo: Ianareo dia hahita Zazakely voahodidina lamban-jaza sady mandry ao am-pihinanam-bilona. '
  '13':
  - type: text
    content: 'Ary nisy anjely maro be avy any an-danitra niseho tampoka niaraka tamin’ilay anjely teo ka nidera an’Andriamanitra hoe:'
  '14':
  - type: text
    content: Voninahitra any amin’ny avo indrindra ho an’Andriamanitra!
  - type: text
    content: Ary fiadanana ho etỳ ambonin’ny tany amin’ny olona ankasitrahiny.
  - type: heading
    content: Ireo mpiandry ondry tany Betlehema
  '15':
  - type: text
    content: 'Tamin’izany, rehefa niala teo aminy ireo anjely ireo ka nankany an-danitra, dia niresaka ireo mpiandry ondry hoe: Andeha isika hankany Betlehema ka hizaha izany zavatra vao tonga izany, izay nampahafantarin’ny Tompo antsika. '
  '16':
  - type: text
    content: 'Dia nandeha haingana izy ireo ka nahita an’i Maria sy i Josefa ary ny Zazakely nandry teo am-pihinanam-bilona. '
  '17':
  - type: text
    content: 'Nony efa nahita izy ireo dia nampiely izay teny nolazaina taminy ny amin’izany Zaza izany. '
  '18':
  - type: text
    content: 'Izay rehetra nandre dia gaga tamin’izay zavatra nolazain’ny mpiandry ondry taminy. '
  '19':
  - type: text
    content: 'Fa i Maria kosa dia nitadidy izany teny rehetra izany ka nieritreritra azy tao am-pony. '
  '2':
  - type: text
    content: 'Izany no fanoratana voalohany natao fony i Kirenio nitondra tany Siria. '
  '20':
  - type: text
    content: Ary ny mpiandry ondry dia niverina nankalaza sy nidera an’Andriamanitra noho ny zavatra rehetra izay reny sy hitany, araka izay nolazaina taminy.
  - type: heading
    content: Naseho tao amin’ny tempoly Jesosy
  '21':
  - type: text
    content: Rehefa tapitra ny havaloana ka hoforana ny Zaza dia nataony hoe JESOSY ny anarany, araka ilay nolazain’ny anjely, fony tsy mbola torontoronina tao an-kibo Izy.
  '22':
  - type: text
    content: 'Rehefa tapitra ny andro fidiovany, araka ny lalànan’i Mosesy, dia nitondra Azy niakatra tany Jerosalema izy ireo mba hatolotra ho an’ny Tompo '
  '23':
  - type: text
    content: 'araka ny voasoratra ao amin’ny lalànan’ny Tompo hoe: «Ny lahy voalohan-teraka rehetra dia hatao hoe Masina ho an’NY TOMPO» (Eks 13.2) '
  '24':
  - type: text
    content: 'ary mba hanatitra fanatitra araka izay voalaza ao amin’ny lalànan’ny Tompo hoe: «Domohina roa, na zana-boromailala roa.» (Lev 12.8)'
  - type: heading
    content: I Simeona sy Jesosy zaza
  '25':
  - type: text
    content: 'Ary indro, nisy lehilahy iray antsoina hoe Simeona, tao Jerosalema; marina sady mpivavaka tsara io lehilahy io ka niandry ny fampiononana ny Israely; ary ny Fanahy Masina dia tao aminy. '
  '26':
  - type: text
    content: 'Efa nambaran’ny Fanahy Masina taminy fa tsy hahita fahafatesana izy mandra-pahitany ny Kristin’ny Tompo. '
  '27':
  - type: text
    content: 'Ary noentin’ny Fanahy Masina niditra tao amin’ny tempoly izy; koa rehefa nampidirin’ny ray aman-dreniny Jesosy zaza mba hanatanterahany Aminy izay fomba fanao araka ny lalàna, '
  '28':
  - type: text
    content: 'dia nitrotro Azy izy ka nidera an’Andriamanitra hoe:'
  '29':
  - type: text
    content: Tompo ô, ankehitriny ny mpanomponao
  - type: text
    content: dia alefanao amin’ny fiadanana, araka ny teninao.
  '3':
  - type: text
    content: 'Dia samy nankany amin’ny tanànany avy ny rehetra mba hosoratana. '
  '30':
  - type: text
    content: Fa ny masoko dia efa nahita ny famonjenao
  '31':
  - type: text
    content: izay nomaninao teo anatrehan’ny firenena rehetra,
  '32':
  - type: text
    content: dia fahazavana ho fanambaràna amin’ireo firenena
  - type: text
    content: sady voninahitry ny Israely olonao.
  - type: heading
    content: Ny faminanian’i Simeona
  '33':
  - type: text
    content: 'Gaga ny ray aman-dreniny noho ny teny nilazana Azy. '
  '34':
  - type: text
    content: 'Ary nitsodrano azy ireo i Simeona ka niteny tamin’i Maria, renin’ny Zaza, hoe: Indro ity Zaza ity no voatendry ho fandavoana sy ho fananganana ny maro ao amin’ny Israely ary ho famantarana holavina, '
  '35':
  - type: text
    content: koa ny fanahinao aza dia hotsatohana sabatra mba haseho ny hevitry ny fo maro.
  - type: heading
    content: I Ana mpaminanivavy
  '36':
  - type: text
    content: 'Nisy mpaminanivavy iray koa, dia i Ana, zanakavavin’i Fanoela, avy tamin’ny fokon’i Asera; efa antitra tokoa izy ary efa niara-niaina tamin’ny vadiny nandritra ny fito taona taorianan’ny naha virijiny azy, '
  '37':
  - type: text
    content: 'efa mpitondratena tokony ho efatra amby valopolo taona izy ary tsy niala teo amin’ny tempoly fa nanompo andro aman’alina tamin’ny fifadian-kanina sy ny fivavahana. '
  '38':
  - type: text
    content: Nony niditra izy tamin’izany ora izany dia nisaotra an’Andriamanitra ka nilaza Azy tamin’izay rehetra niandry ny fanavotana an’i Jerosalema.
  - type: heading
    content: Ny niverenan’i Jesosy tany Nazareta sy ny fahatanorany
  '39':
  - type: text
    content: Rehefa vitany ny zavatra rehetra araka ny lalànan’ny Tompo dia niverina tany Galilia izy ireo, dia tao Nazareta tanànany.
  '4':
  - type: text
    content: 'Ary i Josefa koa dia niakatra avy tany Galilia, avy tao an-tanàna Nazareta, hankany '
  - type: text
    content: Jodia
  - type: text
    content: ', ho ao an-tanànan’i Davida, izay atao hoe: Betlehema, satria avy tamin’ny taranak’i Davida sy ny ankohonany izy, '
  '40':
  - type: text
    content: Ary ny Zaza dia nihalehibe ka nitombo hery sady feno fahendrena; ary ny fahasoavan’Andriamanitra no teo Aminy.
  - type: heading
    content: Jesosy tao amin’ny tempoly, fony izy roa amby folo taona
  '41':
  - type: text
    content: 'Nankany Jerosalema isan-taona ny ray aman-dreniny, rehefa tonga ny andro firavoravoana amin’ny '
  - type: text
    content: Paska
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'Koa rehefa roa amby folo taona Jesosy dia niakatra izy ireo, araka ny fanao amin’ny andro firavoravoana. '
  '43':
  - type: text
    content: 'Rehefa tapitra izany andro izany ka nody izy ireo, Jesosy zaza, dia mbola nijanona tany Jerosalema ihany, nefa tsy fantatry ny ray aman-dreniny izany; '
  '44':
  - type: text
    content: 'koa satria noheveriny fa niaraka tamin’ireo izay niara-dia taminy Izy dia nandeha lalana indray andro izy vao nitady Azy tamin’ny havany sy ny olom-pantany. '
  '45':
  - type: text
    content: 'Nony tsy nahita Azy izy ireo dia niverina ho any Jerosalema nitady Azy. '
  '46':
  - type: text
    content: 'Rehefa afaka hateloana dia hitany tao amin’ny tempoly Izy, nipetraka teo afovoan’ny mpampianatra ka nihaino sady nanontany azy. '
  '47':
  - type: text
    content: 'Dia talanjona izay rehetra nandre Azy noho ny fahalalany sy ny famaliany. '
  '48':
  - type: text
    content: 'Ary raha nahita Azy izy ireo dia gaga ka hoy ny reniny taminy: Anaka, nahoana no nanao izao taminay Ianao? E izato alahelonay sy ny rainao nitady Anao! '
  '49':
  - type: text
    content: 'Fa hoy Izy taminy: Nahoana no nitady Ahy ianareo? Tsy fantatrareo va fa tsy maintsy ho eto amin’ny tranon'
  - type: note
    content: 'Na: eto amin’ny raharahan’.'
  - type: text
    content: '’ny Raiko Aho? '
  '5':
  - type: text
    content: mba hosoratana izy sy i Maria fofombadiny, izay efa bevohoka.
  '50':
  - type: text
    content: 'Nefa tsy azon’izy ireo ny teny izay nolazainy taminy. '
  '51':
  - type: text
    content: Dia niara-nidina taminy nankany Nazareta Izy ka nanoa azy. Ary ny reniny dia nitahiry izany teny rehetra izany tao am-pony.
  '52':
  - type: text
    content: Ary Jesosy nitombo fahendrena sy tena ary fahasoavana teo amin’Andriamanitra sy ny olona.
  '6':
  - type: text
    content: 'Tamin’ny fotoana naha tany azy ireo no tonga ny andro hiterahan’i Maria. '
  '7':
  - type: text
    content: Dia niteraka ny Lahimatoany izy, ary nohodidininy lamban-jaza ka nampandriany teo amin’ny fihinanam-bilona; fa tsy nisy nitoerany tao amin’ny tranom-bahiny.
  - type: heading
    content: Ny nisehoan’ny anjely iray tamin’ny mpiandry ondry
  - type: heading
    content: Ampit. Mat 2.1-15
  '8':
  - type: text
    content: 'Nisy mpiandry ondry tamin’izany faritra izany nitoetra tany an-tsaha niandry ny ondriny tamin’ny alina. '
  '9':
  - type: text
    content: 'Ary nisy anjelin’ny Tompo nitsangana teo anilan’izy ireo; namirapiratra manodidina azy ny voninahitry ny Tompo ka raiki-tahotra indrindra izy. '
