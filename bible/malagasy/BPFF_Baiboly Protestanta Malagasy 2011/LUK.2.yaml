document_id: LUK.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany dia nisy didy navoakan’i Aogosto Kaisara hampanoratra ny anaran’ny vahoaka rehetra amin’ny fanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izany no fanoratana voalohany natao fony i Kirenio nitondra tany Siria. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia samy nankany amin’ny tanànany avy ny rehetra mba hosoratana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary i Josefa koa dia niakatra avy tany Galilia, avy tao an-tanàna Nazareta, hankany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ', ho ao an-tanànan’i Davida, izay atao hoe: Betlehema, satria avy tamin’ny taranak’i Davida sy ny ankohonany izy, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: mba hosoratana izy sy i Maria fofombadiny, izay efa bevohoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tamin’ny fotoana naha tany azy ireo no tonga ny andro hiterahan’i Maria. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia niteraka ny Lahimatoany izy, ary nohodidininy lamban-jaza ka nampandriany teo amin’ny fihinanam-bilona; fa tsy nisy nitoerany tao amin’ny tranom-bahiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nisehoan’ny anjely iray tamin’ny mpiandry ondry
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Mat 2.1-15
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nisy mpiandry ondry tamin’izany faritra izany nitoetra tany an-tsaha niandry ny ondriny tamin’ny alina. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy anjelin’ny Tompo nitsangana teo anilan’izy ireo; namirapiratra manodidina azy ny voninahitry ny Tompo ka raiki-tahotra indrindra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy ny anjely taminy: Aza matahotra; fa indro, milaza teny soa mahafaly aminareo aho, dia fifaliana lehibe izay ho an’ny olona rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'fa Mpamonjy no teraka ho anareo anio ao an-tanànan’i Davida, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no ho famantarana ho anareo: Ianareo dia hahita Zazakely voahodidina lamban-jaza sady mandry ao am-pihinanam-bilona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nisy anjely maro be avy any an-danitra niseho tampoka niaraka tamin’ilay anjely teo ka nidera an’Andriamanitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Voninahitra any amin’ny avo indrindra ho an’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fiadanana ho etỳ ambonin’ny tany amin’ny olona ankasitrahiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpiandry ondry tany Betlehema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tamin’izany, rehefa niala teo aminy ireo anjely ireo ka nankany an-danitra, dia niresaka ireo mpiandry ondry hoe: Andeha isika hankany Betlehema ka hizaha izany zavatra vao tonga izany, izay nampahafantarin’ny Tompo antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nandeha haingana izy ireo ka nahita an’i Maria sy i Josefa ary ny Zazakely nandry teo am-pihinanam-bilona. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nony efa nahita izy ireo dia nampiely izay teny nolazaina taminy ny amin’izany Zaza izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izay rehetra nandre dia gaga tamin’izay zavatra nolazain’ny mpiandry ondry taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa i Maria kosa dia nitadidy izany teny rehetra izany ka nieritreritra azy tao am-pony. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny mpiandry ondry dia niverina nankalaza sy nidera an’Andriamanitra noho ny zavatra rehetra izay reny sy hitany, araka izay nolazaina taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naseho tao amin’ny tempoly Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rehefa tapitra ny havaloana ka hoforana ny Zaza dia nataony hoe JESOSY ny anarany, araka ilay nolazain’ny anjely, fony tsy mbola torontoronina tao an-kibo Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa tapitra ny andro fidiovany, araka ny lalànan’i Mosesy, dia nitondra Azy niakatra tany Jerosalema izy ireo mba hatolotra ho an’ny Tompo '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'araka ny voasoratra ao amin’ny lalànan’ny Tompo hoe: «Ny lahy voalohan-teraka rehetra dia hatao hoe Masina ho an’NY TOMPO» (Eks 13.2) '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary mba hanatitra fanatitra araka izay voalaza ao amin’ny lalànan’ny Tompo hoe: «Domohina roa, na zana-boromailala roa.» (Lev 12.8)'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Simeona sy Jesosy zaza
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary indro, nisy lehilahy iray antsoina hoe Simeona, tao Jerosalema; marina sady mpivavaka tsara io lehilahy io ka niandry ny fampiononana ny Israely; ary ny Fanahy Masina dia tao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Efa nambaran’ny Fanahy Masina taminy fa tsy hahita fahafatesana izy mandra-pahitany ny Kristin’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary noentin’ny Fanahy Masina niditra tao amin’ny tempoly izy; koa rehefa nampidirin’ny ray aman-dreniny Jesosy zaza mba hanatanterahany Aminy izay fomba fanao araka ny lalàna, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'dia nitrotro Azy izy ka nidera an’Andriamanitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tompo ô, ankehitriny ny mpanomponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia alefanao amin’ny fiadanana, araka ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa ny masoko dia efa nahita ny famonjenao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: izay nomaninao teo anatrehan’ny firenena rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: dia fahazavana ho fanambaràna amin’ireo firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady voninahitry ny Israely olonao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faminanian’i Simeona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Gaga ny ray aman-dreniny noho ny teny nilazana Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nitsodrano azy ireo i Simeona ka niteny tamin’i Maria, renin’ny Zaza, hoe: Indro ity Zaza ity no voatendry ho fandavoana sy ho fananganana ny maro ao amin’ny Israely ary ho famantarana holavina, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: koa ny fanahinao aza dia hotsatohana sabatra mba haseho ny hevitry ny fo maro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Ana mpaminanivavy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nisy mpaminanivavy iray koa, dia i Ana, zanakavavin’i Fanoela, avy tamin’ny fokon’i Asera; efa antitra tokoa izy ary efa niara-niaina tamin’ny vadiny nandritra ny fito taona taorianan’ny naha virijiny azy, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'efa mpitondratena tokony ho efatra amby valopolo taona izy ary tsy niala teo amin’ny tempoly fa nanompo andro aman’alina tamin’ny fifadian-kanina sy ny fivavahana. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Nony niditra izy tamin’izany ora izany dia nisaotra an’Andriamanitra ka nilaza Azy tamin’izay rehetra niandry ny fanavotana an’i Jerosalema.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niverenan’i Jesosy tany Nazareta sy ny fahatanorany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Rehefa vitany ny zavatra rehetra araka ny lalànan’ny Tompo dia niverina tany Galilia izy ireo, dia tao Nazareta tanànany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ary ny Zaza dia nihalehibe ka nitombo hery sady feno fahendrena; ary ny fahasoavan’Andriamanitra no teo Aminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy tao amin’ny tempoly, fony izy roa amby folo taona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Nankany Jerosalema isan-taona ny ray aman-dreniny, rehefa tonga ny andro firavoravoana amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Koa rehefa roa amby folo taona Jesosy dia niakatra izy ireo, araka ny fanao amin’ny andro firavoravoana. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Rehefa tapitra izany andro izany ka nody izy ireo, Jesosy zaza, dia mbola nijanona tany Jerosalema ihany, nefa tsy fantatry ny ray aman-dreniny izany; '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'koa satria noheveriny fa niaraka tamin’ireo izay niara-dia taminy Izy dia nandeha lalana indray andro izy vao nitady Azy tamin’ny havany sy ny olom-pantany. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Nony tsy nahita Azy izy ireo dia niverina ho any Jerosalema nitady Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Rehefa afaka hateloana dia hitany tao amin’ny tempoly Izy, nipetraka teo afovoan’ny mpampianatra ka nihaino sady nanontany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Dia talanjona izay rehetra nandre Azy noho ny fahalalany sy ny famaliany. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary raha nahita Azy izy ireo dia gaga ka hoy ny reniny taminy: Anaka, nahoana no nanao izao taminay Ianao? E izato alahelonay sy ny rainao nitady Anao! '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Fa hoy Izy taminy: Nahoana no nitady Ahy ianareo? Tsy fantatrareo va fa tsy maintsy ho eto amin’ny tranon'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.49 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eto amin’ny raharahan’.
    marker-yv: yv-n
  - type: text
    text: '’ny Raiko Aho? '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Nefa tsy azon’izy ireo ny teny izay nolazainy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Dia niara-nidina taminy nankany Nazareta Izy ka nanoa azy. Ary ny reniny dia nitahiry izany teny rehetra izany tao am-pony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ary Jesosy nitombo fahendrena sy tena ary fahasoavana teo amin’Andriamanitra sy ny olona.
