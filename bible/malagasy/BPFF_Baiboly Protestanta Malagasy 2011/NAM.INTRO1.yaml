document_id: NAM.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Mpampahery na Mpampionona no dikan’ny anaran’ity mpaminany ity. Elkosita izy, avy any Elkosy, tanàna akaikin’i Lakisy.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny fotoana niasany dia teo anelanelan’ny taona 663 tal JK, izay nanafihan’ny Asiriana an’i Teba na No-Amona any Ejipta, sy ny taona 612 izay nandravan’ny Babiloniana an’i Ninive, renivohitr’i Asiria.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Mpaminany dia manambara mialoha ny haharava an’i Ninive, renivohitr’i Asiria izay firenen-dehibe namoritra ny Israely. Tsy filazana ny zavatra ho avy fotsiny anefa izany fa fanambaràna ny fitsaran’Andriamanitra izay Tompon’ny firenena sady mitondra ny tantaran’izao tontolo izao.
- type: usfm
  marker: ip
  children:
  - type: text
    text: I Ninive dia tanàna feno fireharehana, famonoana olona, fanaranam-po amin’ny filalaovan-dratsy sy fanompoan-tsampy. Izany toetran’ity tanàna ity izany dia toetra asehon’ny fitondrana izay tsy miorina amin’izay fototra eken’Andriamanitra ka tsy maintsy ho rava.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fitarihanteny izay manambara ny herin’Andriamanitra manapaka amin’ny voahary rehetra ary mitsara an’izao tontolo izao: 1.2-8'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fanambaràna mialoha ny hisehoan’izany herin’Andriamanitra izany, amin’ny handravana an’i Ninive sy ny hanafahany ny mponina any Joda: 1.9–2.3'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Filazana amin’ny antsipirihany ny fandravana an’i Ninive: 2.4–3.19'
