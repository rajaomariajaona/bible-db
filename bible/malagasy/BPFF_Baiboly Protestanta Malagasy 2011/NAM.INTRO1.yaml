document_id: NAM.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Mpampahery na Mpampionona no dikan’ny anaran’ity mpaminany ity. Elkosita izy, avy any Elkosy, tanàna akaikin’i Lakisy.
  - type: text
    content: Ny fotoana niasany dia teo anelanelan’ny taona 663 tal JK, izay nanafihan’ny Asiriana an’i Teba na No-Amona any Ejipta, sy ny taona 612 izay nandravan’ny Babiloniana an’i Ninive, renivohitr’i Asiria.
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ny Mpaminany dia manambara mialoha ny haharava an’i Ninive, renivohitr’i Asiria izay firenen-dehibe namoritra ny Israely. Tsy filazana ny zavatra ho avy fotsiny anefa izany fa fanambaràna ny fitsaran’Andriamanitra izay Tompon’ny firenena sady mitondra ny tantaran’izao tontolo izao.
  - type: text
    content: I Ninive dia tanàna feno fireharehana, famonoana olona, fanaranam-po amin’ny filalaovan-dratsy sy fanompoan-tsampy. Izany toetran’ity tanàna ity izany dia toetra asehon’ny fitondrana izay tsy miorina amin’izay fototra eken’Andriamanitra ka tsy maintsy ho rava.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Fitarihanteny izay manambara ny herin’Andriamanitra manapaka amin’ny voahary rehetra ary mitsara an’izao tontolo izao: 1.2-8'
  - type: text
    content: 'Fanambaràna mialoha ny hisehoan’izany herin’Andriamanitra izany, amin’ny handravana an’i Ninive sy ny hanafahany ny mponina any Joda: 1.9–2.3'
  - type: text
    content: 'Filazana amin’ny antsipirihany ny fandravana an’i Ninive: 2.4–3.19'
