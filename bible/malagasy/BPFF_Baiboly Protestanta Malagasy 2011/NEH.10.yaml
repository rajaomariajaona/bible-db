    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ny olona sisa mbamin’ny mpisorona sy ny levita, ny mpiandry varavarana, ny mpihira, ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Netinima
    - type: text
      text: ' ary izay rehetra efa niavaka tamin’ny olona teo an-toerana mba hanaraka ny lalànan’Andriamanitra mbamin’ny vadin’ireo sy ny zanany lahy ary ny zanany vavy, izay rehetra afaka mihaino, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'i Seraia, i Azaria, i Jeremia, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'dia samy nikambana tsara tamin’ny olo-manankaja rahalahiny ka niozona sy nianiana hanaraka ny lalànan’Andriamanitra izay nampilazaina an’i Mosesy, mpanompon’Andriamanitra. Nianiana koa izy fa hitandrina sy hankatò ny didy rehetra izay nataon’NY TOMPO Andriamanitsika mbamin’ny fitsipika sy ny lalànany; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'tsy hanome ny zanakay vavy ho vadin’ny tompon-tany, na haka ny zanany vavy ho vadin’ny zanakay lahy; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'tsy hividy zavatra amin’ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sabata
    - type: text
      text: ', na amin’izay andro masina hafa, raha misy entana na vary entin’ny tompon-tany hamidy amin’ny andro Sabata, ary tsy hamboly zavatra amin’ny taona fahafito sady hamoy izay trosa rehetra. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary nanao lalàna ho anay koa izahay handoa ny ampahatelon’ny sekela isan-taona hanaovana ny fanompoana momba ny tranon’Andriamanitsika: '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'dia ho amin’ny mofo atao fanatitra mandrakariva avy amin’ny zavamaniry sy ny fanatitra mandrakariva, dorana manontolo, ary ho amin’ny Sabata sy ny voaloham-bolana sy ny fotoam-pivavahana, ary ho amin’ny zava-masina sy ny fanatitra fanadiovana hanaovana fanavotana ho an’ny Israely; eny, hanaovana ny raharaha rehetra momba ny tranon’Andriamanitsika. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary nanao antsapaka izahay ny amin’ny hanateran’ny mpisorona sy ny levita mbamin’ny vahoaka ny kitay hazo, hitondranay azy ho ao amin’ny tranon’Andriamanitsika araka ny fianakavianay avy amin’ny fotoanandro isan-taona, handoroana eo ambonin’ny alitaran’NY TOMPO Andriamanitsika araka izay voasoratra ao amin’ny lalàna, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'ary mba hitondranay ny voaloham-bokatry ny taninay sy ny voaloham-bokatry ny hazo mamoa rehetra ho ao amin’ny tranon’NY TOMPO isan-taona isan-taona; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'ary ny lahimatoanay sy ny voalohan-teraky ny biby fiompinay, araka izay voasoratra ao amin’ny lalàna, ary ny voalohan-teraky ny ombinay sy ny ondry aman’osinay, dia nekenay hoentina ho ao amin’ny tranon’Andriamanitsika, ho an’ny mpisorona izay manao fanompoam-pivavahana ao amin’ny tranon’Andriamanitsika; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'ary mba hitondranay ho an’ny mpisorona koa ny voalohan’ny kobanay voafetafeta sy ny fanomezanay, ny voaloham-bokatry ny hazo rehetra, ny ranom-boaloboka ary ny diloilo ho amin’ny efitrano ao amin’ny tranon’Andriamanitsika, ary ny ampahafolon’ny vokatry ny taninay dia ho an’ny levita; fa ny levita no mpandray ny fahafolonkarena eny an-tanàna rehetra akaikin’ny fambolenay. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary hisy mpisorona iray, taranak’i Arona, hiaraka amin’ny levita, raha mandray ny fahafolonkarena izy; ary ny ampahafolon’ny fahafolonkarena dia hoentin’ny levita miakatra ho ao amin’ny tranon’Andriamanitsika, ho ao amin’ny efitrano ao an-trano fitahirizana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'i Pasora, i Amaria, i Malkia, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Fa ho ao amin’ireo efitrano ireo no hitondran’ny Zanak’Israely sy ny levita ny fanomezana, dia vary sy ranom-boaloboka ary diloilo, dia ho ao amin’ilay itoeran’ny fanaky ny fitoerana masina sy ny mpisorona izay manao fanompoam-pivavahana sy ny mpiandry varavarana ary ny mpihira.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hahafoy ny tranon’Andriamanitsika izahay.
  '5':
  - type: usfm
    marker: p
    children:
