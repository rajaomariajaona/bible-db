document_id: NEH.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manaiky hankatò ny lalàna ny vahoaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Noho ireo rehetra ireo dia manao fanekena mafy izahay ka soratanay izany ary asian’ny mpanapaka anay sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levitanay
  - type: text
    text: ' ary ny mpisoronay tombo-kase eo aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny nanisy tombo-kase dia i Nehemia governora zanak’i Hakalia, i Zedekia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'i Seraia, i Azaria, i Jeremia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'i Pasora, i Amaria, i Malkia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'i Hatosy, i Sebanaia, i Maloka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'i Harima, i Meremota, i Obadia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'i Daniela, i Ginetona, i Baroka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'i Mesolama, i Abia, i Miamina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: i Mazia, i Bilgay ary i Semaia; samy mpisorona ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny levita dia i Josoa, zanak’i Azania, i Binoy isan’ny zanak’i Henadada ary i Kadmiela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary ny rahalahin’ireo dia i Sebania, i Hodia, i Kelita, i Pelaia, i Hanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'i Mika, i Rehoba, i Hasabia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'i Zakora, i Serebia, i Sebania, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: i Hodia, i Bany ary i Benino.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny loholona kosa dia i Parosy, i Pahata-Moaba, i Elama, i Zato, i Bany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'i Bony, i Azgada, i Bebay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'i Adonia, i Bigvay, i Adina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'i Atera, i Hezekia, i Azora, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'i Hodia, i Hasoma, i Bezay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'i Harifa, i Anatota, i Nebay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'i Magpiasy, i Mesolama, i Hezira, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'i Mesezabela, i Zadoka, i Jadoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'i Pelatia, i Hanana, i Anaia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'i Hosea, i Hanania, i Hasoba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'i Halohesy, i Pila, i Sobeka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'i Rehoma, i Hasabna, i Mahaseia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'i Ahia, i Hanana, i Anana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: i Maloka, i Harima ary i Bana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny olona sisa mbamin’ny mpisorona sy ny levita, ny mpiandry varavarana, ny mpihira, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Netinima
  - type: text
    text: ' ary izay rehetra efa niavaka tamin’ny olona teo an-toerana mba hanaraka ny lalànan’Andriamanitra mbamin’ny vadin’ireo sy ny zanany lahy ary ny zanany vavy, izay rehetra afaka mihaino, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'dia samy nikambana tsara tamin’ny olo-manankaja rahalahiny ka niozona sy nianiana hanaraka ny lalànan’Andriamanitra izay nampilazaina an’i Mosesy, mpanompon’Andriamanitra. Nianiana koa izy fa hitandrina sy hankatò ny didy rehetra izay nataon’NY TOMPO Andriamanitsika mbamin’ny fitsipika sy ny lalànany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'tsy hanome ny zanakay vavy ho vadin’ny tompon-tany, na haka ny zanany vavy ho vadin’ny zanakay lahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'tsy hividy zavatra amin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ', na amin’izay andro masina hafa, raha misy entana na vary entin’ny tompon-tany hamidy amin’ny andro Sabata, ary tsy hamboly zavatra amin’ny taona fahafito sady hamoy izay trosa rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nanao lalàna ho anay koa izahay handoa ny ampahatelon’ny sekela isan-taona hanaovana ny fanompoana momba ny tranon’Andriamanitsika: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'dia ho amin’ny mofo atao fanatitra mandrakariva avy amin’ny zavamaniry sy ny fanatitra mandrakariva, dorana manontolo, ary ho amin’ny Sabata sy ny voaloham-bolana sy ny fotoam-pivavahana, ary ho amin’ny zava-masina sy ny fanatitra fanadiovana hanaovana fanavotana ho an’ny Israely; eny, hanaovana ny raharaha rehetra momba ny tranon’Andriamanitsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nanao antsapaka izahay ny amin’ny hanateran’ny mpisorona sy ny levita mbamin’ny vahoaka ny kitay hazo, hitondranay azy ho ao amin’ny tranon’Andriamanitsika araka ny fianakavianay avy amin’ny fotoanandro isan-taona, handoroana eo ambonin’ny alitaran’NY TOMPO Andriamanitsika araka izay voasoratra ao amin’ny lalàna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary mba hitondranay ny voaloham-bokatry ny taninay sy ny voaloham-bokatry ny hazo mamoa rehetra ho ao amin’ny tranon’NY TOMPO isan-taona isan-taona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ary ny lahimatoanay sy ny voalohan-teraky ny biby fiompinay, araka izay voasoratra ao amin’ny lalàna, ary ny voalohan-teraky ny ombinay sy ny ondry aman’osinay, dia nekenay hoentina ho ao amin’ny tranon’Andriamanitsika, ho an’ny mpisorona izay manao fanompoam-pivavahana ao amin’ny tranon’Andriamanitsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary mba hitondranay ho an’ny mpisorona koa ny voalohan’ny kobanay voafetafeta sy ny fanomezanay, ny voaloham-bokatry ny hazo rehetra, ny ranom-boaloboka ary ny diloilo ho amin’ny efitrano ao amin’ny tranon’Andriamanitsika, ary ny ampahafolon’ny vokatry ny taninay dia ho an’ny levita; fa ny levita no mpandray ny fahafolonkarena eny an-tanàna rehetra akaikin’ny fambolenay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary hisy mpisorona iray, taranak’i Arona, hiaraka amin’ny levita, raha mandray ny fahafolonkarena izy; ary ny ampahafolon’ny fahafolonkarena dia hoentin’ny levita miakatra ho ao amin’ny tranon’Andriamanitsika, ho ao amin’ny efitrano ao an-trano fitahirizana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Fa ho ao amin’ireo efitrano ireo no hitondran’ny Zanak’Israely sy ny levita ny fanomezana, dia vary sy ranom-boaloboka ary diloilo, dia ho ao amin’ilay itoeran’ny fanaky ny fitoerana masina sy ny mpisorona izay manao fanompoam-pivavahana sy ny mpiandry varavarana ary ny mpihira.
- type: usfm
  marker: p
  children:
  - type: text
    text: Tsy hahafoy ny tranon’Andriamanitsika izahay.
