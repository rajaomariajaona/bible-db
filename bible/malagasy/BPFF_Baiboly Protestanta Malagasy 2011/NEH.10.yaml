document_id: NEH.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manaiky hankatò ny lalàna ny vahoaka
  - type: text
    content: 'Noho ireo rehetra ireo dia manao fanekena mafy izahay ka soratanay izany ary asian’ny mpanapaka anay sy ny '
  - type: text
    content: levitanay
  - type: text
    content: ' ary ny mpisoronay tombo-kase eo aminy.'
  '10':
  - type: text
    content: 'Ary ny levita dia i Josoa, zanak’i Azania, i Binoy isan’ny zanak’i Henadada ary i Kadmiela, '
  '11':
  - type: text
    content: 'ary ny rahalahin’ireo dia i Sebania, i Hodia, i Kelita, i Pelaia, i Hanana, '
  '12':
  - type: text
    content: 'i Mika, i Rehoba, i Hasabia, '
  '13':
  - type: text
    content: 'i Zakora, i Serebia, i Sebania, '
  '14':
  - type: text
    content: i Hodia, i Bany ary i Benino.
  '15':
  - type: text
    content: 'Ny loholona kosa dia i Parosy, i Pahata-Moaba, i Elama, i Zato, i Bany, '
  '16':
  - type: text
    content: 'i Bony, i Azgada, i Bebay, '
  '17':
  - type: text
    content: 'i Adonia, i Bigvay, i Adina, '
  '18':
  - type: text
    content: 'i Atera, i Hezekia, i Azora, '
  '19':
  - type: text
    content: 'i Hodia, i Hasoma, i Bezay, '
  '2':
  - type: text
    content: 'Ny nanisy tombo-kase dia i Nehemia governora zanak’i Hakalia, i Zedekia, '
  '20':
  - type: text
    content: 'i Harifa, i Anatota, i Nebay, '
  '21':
  - type: text
    content: 'i Magpiasy, i Mesolama, i Hezira, '
  '22':
  - type: text
    content: 'i Mesezabela, i Zadoka, i Jadoa, '
  '23':
  - type: text
    content: 'i Pelatia, i Hanana, i Anaia, '
  '24':
  - type: text
    content: 'i Hosea, i Hanania, i Hasoba, '
  '25':
  - type: text
    content: 'i Halohesy, i Pila, i Sobeka, '
  '26':
  - type: text
    content: 'i Rehoma, i Hasabna, i Mahaseia, '
  '27':
  - type: text
    content: 'i Ahia, i Hanana, i Anana, '
  '28':
  - type: text
    content: i Maloka, i Harima ary i Bana.
  '29':
  - type: text
    content: 'Ny olona sisa mbamin’ny mpisorona sy ny levita, ny mpiandry varavarana, ny mpihira, ny '
  - type: text
    content: Netinima
  - type: text
    content: ' ary izay rehetra efa niavaka tamin’ny olona teo an-toerana mba hanaraka ny lalànan’Andriamanitra mbamin’ny vadin’ireo sy ny zanany lahy ary ny zanany vavy, izay rehetra afaka mihaino, '
  '3':
  - type: text
    content: 'i Seraia, i Azaria, i Jeremia, '
  '30':
  - type: text
    content: 'dia samy nikambana tsara tamin’ny olo-manankaja rahalahiny ka niozona sy nianiana hanaraka ny lalànan’Andriamanitra izay nampilazaina an’i Mosesy, mpanompon’Andriamanitra. Nianiana koa izy fa hitandrina sy hankatò ny didy rehetra izay nataon’NY TOMPO Andriamanitsika mbamin’ny fitsipika sy ny lalànany; '
  '31':
  - type: text
    content: 'tsy hanome ny zanakay vavy ho vadin’ny tompon-tany, na haka ny zanany vavy ho vadin’ny zanakay lahy; '
  '32':
  - type: text
    content: 'tsy hividy zavatra amin’ny andro '
  - type: text
    content: Sabata
  - type: text
    content: ', na amin’izay andro masina hafa, raha misy entana na vary entin’ny tompon-tany hamidy amin’ny andro Sabata, ary tsy hamboly zavatra amin’ny taona fahafito sady hamoy izay trosa rehetra. '
  '33':
  - type: text
    content: 'Ary nanao lalàna ho anay koa izahay handoa ny ampahatelon’ny sekela isan-taona hanaovana ny fanompoana momba ny tranon’Andriamanitsika: '
  '34':
  - type: text
    content: 'dia ho amin’ny mofo atao fanatitra mandrakariva avy amin’ny zavamaniry sy ny fanatitra mandrakariva, dorana manontolo, ary ho amin’ny Sabata sy ny voaloham-bolana sy ny fotoam-pivavahana, ary ho amin’ny zava-masina sy ny fanatitra fanadiovana hanaovana fanavotana ho an’ny Israely; eny, hanaovana ny raharaha rehetra momba ny tranon’Andriamanitsika. '
  '35':
  - type: text
    content: 'Ary nanao antsapaka izahay ny amin’ny hanateran’ny mpisorona sy ny levita mbamin’ny vahoaka ny kitay hazo, hitondranay azy ho ao amin’ny tranon’Andriamanitsika araka ny fianakavianay avy amin’ny fotoanandro isan-taona, handoroana eo ambonin’ny alitaran’NY TOMPO Andriamanitsika araka izay voasoratra ao amin’ny lalàna, '
  '36':
  - type: text
    content: 'ary mba hitondranay ny voaloham-bokatry ny taninay sy ny voaloham-bokatry ny hazo mamoa rehetra ho ao amin’ny tranon’NY TOMPO isan-taona isan-taona; '
  '37':
  - type: text
    content: 'ary ny lahimatoanay sy ny voalohan-teraky ny biby fiompinay, araka izay voasoratra ao amin’ny lalàna, ary ny voalohan-teraky ny ombinay sy ny ondry aman’osinay, dia nekenay hoentina ho ao amin’ny tranon’Andriamanitsika, ho an’ny mpisorona izay manao fanompoam-pivavahana ao amin’ny tranon’Andriamanitsika; '
  '38':
  - type: text
    content: 'ary mba hitondranay ho an’ny mpisorona koa ny voalohan’ny kobanay voafetafeta sy ny fanomezanay, ny voaloham-bokatry ny hazo rehetra, ny ranom-boaloboka ary ny diloilo ho amin’ny efitrano ao amin’ny tranon’Andriamanitsika, ary ny ampahafolon’ny vokatry ny taninay dia ho an’ny levita; fa ny levita no mpandray ny fahafolonkarena eny an-tanàna rehetra akaikin’ny fambolenay. '
  '39':
  - type: text
    content: 'Ary hisy mpisorona iray, taranak’i Arona, hiaraka amin’ny levita, raha mandray ny fahafolonkarena izy; ary ny ampahafolon’ny fahafolonkarena dia hoentin’ny levita miakatra ho ao amin’ny tranon’Andriamanitsika, ho ao amin’ny efitrano ao an-trano fitahirizana. '
  '4':
  - type: text
    content: 'i Pasora, i Amaria, i Malkia, '
  '40':
  - type: text
    content: Fa ho ao amin’ireo efitrano ireo no hitondran’ny Zanak’Israely sy ny levita ny fanomezana, dia vary sy ranom-boaloboka ary diloilo, dia ho ao amin’ilay itoeran’ny fanaky ny fitoerana masina sy ny mpisorona izay manao fanompoam-pivavahana sy ny mpiandry varavarana ary ny mpihira.
  - type: text
    content: Tsy hahafoy ny tranon’Andriamanitsika izahay.
  '5':
  - type: text
    content: 'i Hatosy, i Sebanaia, i Maloka, '
  '6':
  - type: text
    content: 'i Harima, i Meremota, i Obadia, '
  '7':
  - type: text
    content: 'i Daniela, i Ginetona, i Baroka, '
  '8':
  - type: text
    content: 'i Mesolama, i Abia, i Miamina, '
  '9':
  - type: text
    content: i Mazia, i Bilgay ary i Semaia; samy mpisorona ireo.
