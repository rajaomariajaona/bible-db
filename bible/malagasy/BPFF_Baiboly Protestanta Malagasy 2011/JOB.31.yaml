document_id: JOB.31,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Teny farany navalin’i Joba: Raha nanota aho dia aoka handevona ahy Andriamanitra'
  - type: text
    content: Efa nampanekeko ny masoko,
  - type: text
    content: koa hataoko ahoana indray no fijery zazavavy?
  '10':
  - type: text
    content: dia aoka kosa ny vadiko hanodina fikosoham-bary ho an’ny sasany
  - type: text
    content: ary aoka ho olon-kafa no handry aminy!
  '11':
  - type: text
    content: Fa fahavetavetana izany;
  - type: text
    content: eny, heloka tokony hotsarain’ny mpitsara;
  '12':
  - type: text
    content: fa afo mandevona hatrany amin’ny tanin’ny fandringanana izany
  - type: text
    content: ka hanongotra ny vokatro rehetra.
  '13':
  - type: text
    content: Raha toa ka nandà ny rariny izay an’ny mpanompolahiko na ny mpanompovaviko aho,
  - type: text
    content: raha nifamaly tamiko izy,
  '14':
  - type: text
    content: dia inona no hataoko, raha hitsangana Andriamanitra?
  - type: text
    content: Ary ahoana no havaliko Azy raha handinika ny raharaha Izy?
  '15':
  - type: text
    content: Fa moa tsy Izay nanao ahy tany an-kibo ihany va no nanao azy ireny koa?
  - type: text
    content: Ary tsy Iray ihany va no namorona anay tany am-bohoka?
  '16':
  - type: text
    content: Raha toa ka nandà izay nirin’ny mahantra aho
  - type: text
    content: ka namela ny mason’ny mpitondratena hijery foana
  '17':
  - type: text
    content: na nihinana ny sombin-kaniko irery
  - type: text
    content: ka tsy mba nanome izay anjaran’ny kamboty,
  '18':
  - type: text
    content: nefa tsy izany, fa hatry ny fony mbola tanora aho no nitaiza azy ireny toy ny ray,
  - type: text
    content: ary vao nivoaka ny kibon’ny reniko aho no efa nitari-dalana ny mpitondratena;
  '19':
  - type: text
    content: fa raha toa ka nahita olona efa ho faty noho ny tsy fananana akanjo aho
  - type: text
    content: na mahantra tsy manana firakotra,
  '2':
  - type: text
    content: Fa raha izany dia inona no anjara avy amin’Andriamanitra any ambony,
  - type: text
    content: sy lova avy amin’ny Tsitoha any amin’ny avo?
  '20':
  - type: text
    content: moa tsy ho nisaotra ahy va izy satria nafana ny lamosiny
  - type: text
    content: ary nanafana azy ny volon’ondriko?
  '21':
  - type: text
    content: Raha toa ka nanatsotra ny tanako hampahory ny kamboty aho
  - type: text
    content: satria hitako fa nisy niandany tamiko teo amin’ny fitsarana
  '22':
  - type: text
    content: dia aoka ny foto-tsandriko hitsoaka hiala amin’ny soroko;
  - type: text
    content: eny, aoka ny sandriko ho latsaka hiala amin’ny taolam-panaviko.
  '23':
  - type: text
    content: Fa mampahatahotra ahy ny loza avy amin’Andriamanitra
  - type: text
    content: ka tsy mahavita na inona na inona aho noho ny fahalehibiazany.
  '24':
  - type: text
    content: Raha toa ka nanao ny volamena ho fanantenako aho
  - type: text
    content: 'na nanonona ny volamena tsara hoe: Ry tokiko ô;'
  '25':
  - type: text
    content: raha toa ka nifaly noho ny haben’ny fananako
  - type: text
    content: sy noho ny nahazoan’ny tanako harena betsaka aho,
  '26':
  - type: text
    content: raha toa ka nijery ny masoandro raha izy namirapiratra iny aho,
  - type: text
    content: na ny volana raha izy nandeha tamin’ny fangarangarany iny,
  '27':
  - type: text
    content: ka voafitaka mangingina ny foko
  - type: text
    content: ary nanoroka ny tanako ny vavako,
  '28':
  - type: text
    content: dia heloka hanamelohan’ny mpitsara koa izany
  - type: text
    content: fa ho nihatsaravelatsihy tamin’Andriamanitra any ambony aho.
  '29':
  - type: text
    content: Raha toa ka nifaly noho ny loza nanjo izay nankahala ahy aho
  - type: text
    content: na nibitabitaka raha nozoim-pahoriana izy,
  '3':
  - type: text
    content: Moa tsy loza va no manjo ny ratsy fanahy?
  - type: text
    content: Ary tsy loza va no mahazo ny mpanao ratsy?
  '30':
  - type: text
    content: tsia, fa tsy navelako hanota akory ny vavako
  - type: text
    content: ka hangataka ozona hanjo azy;
  '31':
  - type: text
    content: 'moa va tsy niteny ny tao an-daiko hoe:'
  - type: text
    content: Iza moa no olona tsy novokisany hena?
  '32':
  - type: text
    content: Ny vahiny aza dia tsy nandry teny alatrano
  - type: text
    content: fa novohako ny varavarako ho an’ny mpandeha.
  '33':
  - type: text
    content: Raha toa ka nanarona ny fahadisoako tahaka an’i Adama aho
  - type: text
    content: ka nanafina ny heloko tato am-paosiko
  '34':
  - type: text
    content: satria nampihorohoro ny foko ny vahoaka marobe
  - type: text
    content: ary natahotra aho, fandrao hamavoin’ny mpiaramonina
  - type: text
    content: ka namitsaka, fa tsy sahy nivoaka ny varavarana.
  '35':
  - type: text
    content: Enga anie ka hisy hihaino ahy!
  - type: text
    content: Indro ny soniako!
  - type: text
    content: Enga anie ka hamaly ahy ny Tsitoha!
  - type: text
    content: Indro ny taratasy voasoratr’ilay manana ady amiko!
  '36':
  - type: text
    content: Hataoko eny an-tsoroko tokoa izany
  - type: text
    content: ary havonako amiko ho satroboninahitra.
  '37':
  - type: text
    content: Ny isan’ny diako dia hambarako Aminy
  - type: text
    content: ary tahaka ny fanatonan’ny zanak’andriana no hanatonako Azy.
  '38':
  - type: text
    content: Raha toa ka mitaraina hiampanga ahy ny taniko
  - type: text
    content: ka miara-mitomany ny vavaasako,
  '39':
  - type: text
    content: raha toa ka nihinana ny vokatra aho nefa tsy nandoa ny vidiny,
  - type: text
    content: na nanao izay hahafaty ny ain’ny tompony,
  '4':
  - type: text
    content: Moa tsy Andriamanitra va no mijery ny lalako
  - type: text
    content: ka manisa ny diako rehetra?
  '40':
  - type: text
    content: dia aoka ny tsilo no haniry hisolo ny varimbazaha
  - type: text
    content: ary ny ahi-dratsy hisolo ny orza!
  - type: text
    content: Tapitra ny tenin’i Joba.
  '5':
  - type: text
    content: Moa va nandeha tamin’ny fitaka aho
  - type: text
    content: na niezaka tamin’ny hafetsena?
  '6':
  - type: text
    content: Enga anie ka holanjain’Andriamanitra amin’ny mizana tsy mandainga aho
  - type: text
    content: dia ho fantany ny tsy fananako tsiny!
  '7':
  - type: text
    content: Raha toa ka nivily niala tamin’ny lalana ny diako
  - type: text
    content: na nanaraka ny masoko ny foko
  - type: text
    content: na nisy tsiny niraikitra tamin’ny tanako
  '8':
  - type: text
    content: dia aoka hamafy aho fa olon-kafa no hihinana
  - type: text
    content: ary aoka hofongotra izay namboleko!
  '9':
  - type: text
    content: Raha toa ka adala tamin’ny vadin’olona ny foko
  - type: text
    content: ka namitsaka teo am-baravaran’ny namako aho
