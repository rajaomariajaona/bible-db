document_id: JOB.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Teny farany navalin’i Joba: Raha nanota aho dia aoka handevona ahy Andriamanitra'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Efa nampanekeko ny masoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa hataoko ahoana indray no fijery zazavavy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa raha izany dia inona no anjara avy amin’Andriamanitra any ambony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy lova avy amin’ny Tsitoha any amin’ny avo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Moa tsy loza va no manjo ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy loza va no mahazo ny mpanao ratsy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moa tsy Andriamanitra va no mijery ny lalako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manisa ny diako rehetra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moa va nandeha tamin’ny fitaka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na niezaka tamin’ny hafetsena?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Enga anie ka holanjain’Andriamanitra amin’ny mizana tsy mandainga aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fantany ny tsy fananako tsiny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha toa ka nivily niala tamin’ny lalana ny diako
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nanaraka ny masoko ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nisy tsiny niraikitra tamin’ny tanako
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia aoka hamafy aho fa olon-kafa no hihinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hofongotra izay namboleko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha toa ka adala tamin’ny vadin’olona ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka namitsaka teo am-baravaran’ny namako aho
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia aoka kosa ny vadiko hanodina fikosoham-bary ho an’ny sasany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho olon-kafa no handry aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa fahavetavetana izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, heloka tokony hotsarain’ny mpitsara;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: fa afo mandevona hatrany amin’ny tanin’ny fandringanana izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanongotra ny vokatro rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha toa ka nandà ny rariny izay an’ny mpanompolahiko na ny mpanompovaviko aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha nifamaly tamiko izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia inona no hataoko, raha hitsangana Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ahoana no havaliko Azy raha handinika ny raharaha Izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa moa tsy Izay nanao ahy tany an-kibo ihany va no nanao azy ireny koa?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy Iray ihany va no namorona anay tany am-bohoka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha toa ka nandà izay nirin’ny mahantra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka namela ny mason’ny mpitondratena hijery foana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: na nihinana ny sombin-kaniko irery
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba nanome izay anjaran’ny kamboty,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: nefa tsy izany, fa hatry ny fony mbola tanora aho no nitaiza azy ireny toy ny ray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vao nivoaka ny kibon’ny reniko aho no efa nitari-dalana ny mpitondratena;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: fa raha toa ka nahita olona efa ho faty noho ny tsy fananana akanjo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mahantra tsy manana firakotra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: moa tsy ho nisaotra ahy va izy satria nafana ny lamosiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanafana azy ny volon’ondriko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Raha toa ka nanatsotra ny tanako hampahory ny kamboty aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria hitako fa nisy niandany tamiko teo amin’ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: dia aoka ny foto-tsandriko hitsoaka hiala amin’ny soroko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, aoka ny sandriko ho latsaka hiala amin’ny taolam-panaviko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa mampahatahotra ahy ny loza avy amin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahavita na inona na inona aho noho ny fahalehibiazany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha toa ka nanao ny volamena ho fanantenako aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'na nanonona ny volamena tsara hoe: Ry tokiko ô;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: raha toa ka nifaly noho ny haben’ny fananako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy noho ny nahazoan’ny tanako harena betsaka aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: raha toa ka nijery ny masoandro raha izy namirapiratra iny aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny volana raha izy nandeha tamin’ny fangarangarany iny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ka voafitaka mangingina ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanoroka ny tanako ny vavako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: dia heloka hanamelohan’ny mpitsara koa izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho nihatsaravelatsihy tamin’Andriamanitra any ambony aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha toa ka nifaly noho ny loza nanjo izay nankahala ahy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nibitabitaka raha nozoim-pahoriana izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: tsia, fa tsy navelako hanota akory ny vavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hangataka ozona hanjo azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'moa va tsy niteny ny tao an-daiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza moa no olona tsy novokisany hena?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny vahiny aza dia tsy nandry teny alatrano
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa novohako ny varavarako ho an’ny mpandeha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Raha toa ka nanarona ny fahadisoako tahaka an’i Adama aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanafina ny heloko tato am-paosiko
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: satria nampihorohoro ny foko ny vahoaka marobe
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary natahotra aho, fandrao hamavoin’ny mpiaramonina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka namitsaka, fa tsy sahy nivoaka ny varavarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Enga anie ka hisy hihaino ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro ny soniako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enga anie ka hamaly ahy ny Tsitoha!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro ny taratasy voasoratr’ilay manana ady amiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Hataoko eny an-tsoroko tokoa izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary havonako amiko ho satroboninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ny isan’ny diako dia hambarako Aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny fanatonan’ny zanak’andriana no hanatonako Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Raha toa ka mitaraina hiampanga ahy ny taniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miara-mitomany ny vavaasako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: raha toa ka nihinana ny vokatra aho nefa tsy nandoa ny vidiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nanao izay hahafaty ny ain’ny tompony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: dia aoka ny tsilo no haniry hisolo ny varimbazaha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ahi-dratsy hisolo ny orza!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tapitra ny tenin’i Joba.
