document_id: 2KI.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Voahosotra ho mpanjakan’ny Israely i Jeho
  - type: text
    content: 'Ary niantso ny iray tamin’ireo zanaky ny mpaminany i Elisa mpaminany ka niteny taminy hoe: Misikìna, dia ento eny an-tananao ity tavoara feno diloilo ity ka mankanesa any Ramota-Gileada. '
  '10':
  - type: text
    content: hohanin’ny alika ao amin’ny tany Jezirela i Jezebela ka tsy hisy handevina azy. Dia namoha ny varavarana ilay zatovo ka lasa nandositra.
  '11':
  - type: text
    content: 'Ary nandeha nankao amin’ireo mpanompon’ny tompony i Jeho ka nanontanian’ireo hoe: Raharaha tsara ihany va no nalehan’iny ilay adala iny tao aminao? Hoy izy tamin’ireo: Ianareo ihany dia efa mahalala an-dRalehilahy sy ny heviny. '
  '12':
  - type: text
    content: 'Fa hoy ireo: Lainga izany! Miangavy anao izahay, ambarao aminay! Dia hoy izy: Izao sy izao no nolazainy tamiko: Izao no lazain’NY TOMPO: Manosotra anao ho mpanjakan’ny Israely Aho! '
  '13':
  - type: text
    content: 'Dia samy nandray haingana ny lambany avy izy ireo ka namelatra azy hitoeran’i Jeho eo amin’ny ambaratonga ambony amin’ny tohatra, ary nitsoka anjomara izy ka niantso hoe: I Jeho no mpanjaka!'
  - type: heading
    content: Novonoin’i Jeho i Jehorama, mpanjakan’ny Israely
  '14':
  - type: text
    content: 'Ary i Jeho, zanak’i Josafata, zanak’i Nimsy dia nanao tetika hikomy tamin’i Jehorama. Tamin’izany anefa i Jehorama mbamin’ny Israely rehetra dia niaro an’i Ramota-Gileada tamin’ny fanafihan’i Hazaela, mpanjakan’i Arama; '
  '15':
  - type: text
    content: 'saingy i Jehorama mpanjaka kosa dia efa niverina tany Jezirela mba hotsaboina tamin’ny feriny, tamin’ny nahavoazan’ny Arameana azy, fony izy niady tamin’i Hazaela, mpanjakan’i Arama. Dia hoy i Jeho: Raha te ho velona koa ianareo, aza avela hisy hiala eto an-tanàna ka hoe handeha hilaza any Jezirela! '
  '16':
  - type: text
    content: Dia niakatra teo amin’ny kalesy fitondra miady i Jeho ka nankany Jezirela, fa tany no nitoeran’i Jehorama, ary i Ahazia, mpanjakan’ny Joda dia efa nidina hamangy an’i Jehorama.
  '17':
  - type: text
    content: 'Ary nitsangana teo an-tampon’ny tilikambo fitiliana tao Jezirela ny mpitily ka nahatazana fa indrerỳ misy olona betsaka tamy niaraka tamin’i Jeho, ary hoy izy: Mahita olona betsaka aho. Hoy i Jehorama: Makà mpitaingin-tsoavaly ka mandefasa iraka hitsena azy, ary asaivo miteny hoe: Fihavanana va? '
  '18':
  - type: text
    content: 'Dia nandeha ny mpitaingin-tsoavaly iray hitsena azy ka hiteny taminy hoe: Izao no tenin’ny mpanjaka: Fihavanana va? Hoy i Jeho: Ahoanao inona izay fihavanana? Fa mankanesa ato aorianako ianao. Ary ny mpitily nilaza hoe: Ny iraka dia tonga teny aminy, nefa tsy niverina. '
  '19':
  - type: text
    content: 'Dia naniraka mpitaingin-tsoavaly fanindroany i Jehorama, ary nony tonga teny koa io dia niteny hoe: Izao no tenin’ny mpanjaka: Fihavanana va? Ary hoy i Jeho hoe: Ahoanao izay fihavanana? Fa mankanesa ato aorianako ianao. '
  '2':
  - type: text
    content: 'Rehefa tonga any ianao dia izahao i Jeho, zanak’i Josafata, zanak’i Nimsy; midira, dia asaivo mitsangana hiala eo amin’ny namany izy ary ento any amin’ny efitrano anatiny; '
  '20':
  - type: text
    content: 'Ary ny mpitily nilaza indray hoe: Tonga teny aminy koa iny fa tsy niverina; ary ny firiotrany dia ohatra ny firiotran’i Jeho, zanak’i Nimsy; fa miriotra ohatra ny olona adala izy.'
  '21':
  - type: text
    content: 'Hoy i Jehorama: Ampiomany ny kalesy fitondra miady! Dia nampiomaniny ny kalesiny. Dia niainga i Jehorama, mpanjakan’ny Israely, sy i Ahazia, mpanjakan’ny Joda, samy nitsangana teo amin’ny kalesiny avy ka nandeha hitsena an’i Jeho, ary nifanena taminy teo amin’ny tanin’i Nabota jezirelita izy. '
  '22':
  - type: text
    content: 'Nony nahita an’i Jeho i Jehorama dia niteny hoe: Fihavanana va, ry Jeho? Fa hoy izy taminy hoe: Aiza no hisy fihavanana raha mbola ao ihany ny fijangajangan’i Jezebela reninao sy ny sikidy betsaka ataony? '
  '23':
  - type: text
    content: 'Dia nampihodina ny kalesiny i Jehorama ka nandositra sady niteny tamin’i Ahazia hoe: Tena fitaka izao, ry Ahazia! '
  '24':
  - type: text
    content: 'Ary nohenjanin’i Jeho mafy ny tsipìka teny an-tanany dia nitifitra an’i Jehorama izy ka nahavoa azy teo anelanelan’ny sorony, ary ny zana-tsipìka dia niboroaka tamin’ny fony ka nianjera tao anatin’ny kalesiny izy. '
  '25':
  - type: text
    content: 'Dia hoy i Jeho tamin’i Bidikara lefiny: Batao izy ka atsipazo ao amin’ny sahan’i Nabota jezirelita; fa tsarovy fa fony izaho sy ianao samy nitaingina kalesy nanaraka an’i Ahaba rainy dia nolazain’NY TOMPO fa hihatra aminy izao loza voalaza izao hoe: '
  '26':
  - type: text
    content: Efa hitako tokoa omaly ny ran’i Nabota sy ny ran’ny zanany, hoy NY TOMPO, ary Izaho no hamaly anao eto amin’ity saha ity, hoy NY TOMPO! Koa batao izy ary atsipazo amin’io saha io araka ny tenin’NY TOMPO.
  - type: heading
    content: Nampamono an’i Ahazia, mpanjakan’ny Joda, i Jeho
  - type: heading
    content: 2Tan 22.7-9
  '27':
  - type: text
    content: 'Nony hitan’i Ahazia mpanjakan’ny Joda izany dia nandositra tamin’ny lalana mankany Bety-Gana izy. Nanenjika azy i Jeho ka niteny hoe: Indrỳ, asio koa iny. Dia nisy naharatra azy tao anatin’ny kalesiny teo amin’ny fiakarana ho any Gora, izay eo anilan’Ibleama. Ary nandositra nankany Megido i Ahazia ka maty tao. '
  '28':
  - type: text
    content: 'Ary ny mpanompony dia nitondra azy tamin’ny kalesiny ho any Jerosalema ka nandevina azy tao am-pasany ao amin’ny razany tao amin’ny Tanànan’i Davida. '
  '29':
  - type: text
    content: Tamin’ny taona fahiraika amby folo nanjakan’i Jehorama zanak’i Ahaba no nanomboka nanjaka tamin’ny tany Joda i Ahazia.
  - type: heading
    content: Nampamono an’i Jezebela, vadin’ny mpanjaka, i Jeho
  '3':
  - type: text
    content: 'ary raiso ny tavoara feno diloilo ka aidino amin’ny lohany dia lazao hoe: Izao no lazain’NY TOMPO: Manosotra anao ho mpanjakan’ny Israely Aho! Dia vohay ny varavarana ka mandosira fa aza mitaredretra. '
  '30':
  - type: text
    content: 'Dia tonga tany Jezirela i Jeho. Nony nandre izany i Jezebela dia nohosorany loko mainty ny masony sady nohaingoiny ny volon-dohany dia nitsidika teo am-baravarankely izy. '
  '31':
  - type: text
    content: 'Nony niditra teo am-bavahady i Jeho dia hoy i Jezebela: Fihavanana va, ry Zimry, mpamono tompo? '
  '32':
  - type: text
    content: 'Niandrandra nijery ny varavarankely i Jeho sady niteny hoe: Iza aminareo ireo no momba ahy? Iza? Ary nisy tandapa roa na telo teo nitsirika nijery azy. '
  '33':
  - type: text
    content: 'Dia hoy izy: Azerao io vehivavy io! Dia nazerany izy ka nisy nipitipitika tamin’ny rindrin-trano sy ny soavaly ny rany; ary nohitsakitsahin’i Jeho izy. '
  '34':
  - type: text
    content: 'Dia niditra tao an-trano i Jeho ka nihinana sy nisotro ary nilaza hoe: Mandehana, jereo ilay vehivavy voaozona iny ka aleveno, fa zanaka mpanjaka izy. '
  '35':
  - type: text
    content: 'Dia lasa ireo mba handevina azy, nefa tsy nisy tratrany teo afa-tsy ny karandohany sy ny tongony ary ny felatanany ihany. '
  '36':
  - type: text
    content: 'Dia niverina ireo ka nanambara taminy. Ary hoy i Jeho: Araka ny tenin’NY TOMPO izany, dia ilay nampilazainy an’i Elia tisbita mpanompony hoe: Ao amin’ny tany Jezirela no hihinanan’ny alika ny nofon’i Jezebela, '
  '37':
  - type: text
    content: ary ny fatiny dia ho toy ny zezika any an-tsaha, any amin’ny tany Jezirela, ka tsy hisy hahazo milaza hoe i Jezebela ity.
  '4':
  - type: text
    content: 'Nandeha ilay zatovo, dia ilay zatovo mpaminany, nankany Ramota-Gileada. '
  '5':
  - type: text
    content: 'Nony tonga tany izy dia indreo, nipetraka teo ny komandin’ny miaramila. Hoy izy: Ry komandy ô, mitondra teny ho anao aho. Ary hoy i Jeho: Amin’iza aminay ireto moa? Hoy izy: Aminao, ry mpitarika ô. '
  '6':
  - type: text
    content: 'Dia nitsangana i Jeho ka niditra tao an-trano, dia naidin’ilay zatovo tamin’ny lohany ny diloilo, ary hoy izy taminy: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Nanosotra anao ho mpanjakan’ny Israely oloko Aho. '
  '7':
  - type: text
    content: 'Hamely ny tamingan’i Ahaba tomponao ianao, mba hampanodiaviko an’i Jezebela ny ran’ny mpaminany mpanompoko sy ny ran’ny mpanompon’NY TOMPO rehetra. '
  '8':
  - type: text
    content: 'Eny, ho fongotra ny taranak’i Ahaba rehetra; haringako avokoa ny lehilahy rehetra amin’ny tamingany, na ny voagadra na ny olona afaka eo amin’ny Israely; '
  '9':
  - type: text
    content: 'ary ny taranak’i Ahaba dia hataoko tahaka ny taranak’i Jeroboama, zanak’i Nebata, sy tahaka ny taranak’i Basa, zanak’i Ahia; '
