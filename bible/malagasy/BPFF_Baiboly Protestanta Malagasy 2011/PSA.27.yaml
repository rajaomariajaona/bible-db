document_id: PSA.27,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsara antoka ny ao amin’ny tranon’NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: NY TOMPO no fahazavako sy famonjena ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iza no hatahorako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no fiarovana mafy ho an’ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iza no hangovitako?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Efa nahafoy ahy ny ray aman-dreniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa mandray ahy kosa NY TOMPO.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ampianaro ny lalanao aho, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tariho amin’ny lalana tokony halehako aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahavaloko.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Aza manolotra ahy ho amin’ny sitrapon’ny mpampahory ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mitsangana hiampanga ahy ny vavolombelona mandainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mifofo loza.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Raha izay re aho no tsy nanantena hahita ny fahasoavan’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny tanin’ny velona!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Manantenà NY TOMPO ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matokia, ary aoka hahery ny fonao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, manantenà NY TOMPO ianao!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Raha manatona ahy mba hihinana ny nofoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay fahavaloko sy rafiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izy tenany ihany no tafintohina ka lavo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Na dia misy tafika mitoby hiady amiko aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hatahotra ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia misy ady mihatra amiko aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hatoky ihany aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Zavatra iray loha no nangatahiko tamin’NY TOMPO, izany no hotadiaviko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hitoetra ao amin’ny tranon’NY TOMPO amin’ny andro rehetra hiainako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hijery ny hatsaran’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy handinika ny tempoliny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa hanafina ahy ao an-trano fialofany Izy amin’ny andro fahoriana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampiery ahy ao amin’ny fierena ao an-dainy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanandratra ahy ho eny ambony vatolampy Izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Koa ankehitriny dia hisandratra ho ambonin’ny fahavaloko manodidina ahy ny lohako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanolotra fanatitra hihobiana ao an-dainy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hihira sy hankalaza NY TOMPO aho.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mihainoa, TOMPO ô, fa mitaraina mafy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamindrà fo amiko ka valio aho!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Raha hoy Ianao: Tadiavonareo ny tavako!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hoy ny navalin’ny foko: Eny, ny tavanao no tadiaviko, TOMPO ô!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aza manafina ny tavanao amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza mandroaka ny mpanomponao an-katezerana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no famonjena ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza manary na mahafoy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Andriamanitry ny famonjena ahy!
