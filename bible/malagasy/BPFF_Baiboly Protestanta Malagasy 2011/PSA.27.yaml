document_id: PSA.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsara antoka ny ao amin’ny tranon’NY TOMPO
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: NY TOMPO no fahazavako sy famonjena ahy;
  - type: text
    content: iza no hatahorako?
  - type: text
    content: NY TOMPO no fiarovana mafy ho an’ny aiko;
  - type: text
    content: iza no hangovitako?
  '10':
  - type: text
    content: Efa nahafoy ahy ny ray aman-dreniko
  - type: text
    content: nefa mandray ahy kosa NY TOMPO.
  '11':
  - type: text
    content: Ampianaro ny lalanao aho, TOMPO ô;
  - type: text
    content: tariho amin’ny lalana tokony halehako aho
  - type: text
    content: noho ny fahavaloko.
  '12':
  - type: text
    content: Aza manolotra ahy ho amin’ny sitrapon’ny mpampahory ahy
  - type: text
    content: fa mitsangana hiampanga ahy ny vavolombelona mandainga
  - type: text
    content: izay mifofo loza.
  '13':
  - type: text
    content: Raha izay re aho no tsy nanantena hahita ny fahasoavan’NY TOMPO
  - type: text
    content: amin’ny tanin’ny velona!
  '14':
  - type: text
    content: Manantenà NY TOMPO ianao!
  - type: text
    content: Matokia, ary aoka hahery ny fonao!
  - type: text
    content: Eny, manantenà NY TOMPO ianao!
  '2':
  - type: text
    content: Raha manatona ahy mba hihinana ny nofoko
  - type: text
    content: ny ratsy fanahy
  - type: text
    content: izay fahavaloko sy rafiko
  - type: text
    content: dia izy tenany ihany no tafintohina ka lavo.
  '3':
  - type: text
    content: Na dia misy tafika mitoby hiady amiko aza
  - type: text
    content: dia tsy hatahotra ny foko;
  - type: text
    content: na dia misy ady mihatra amiko aza
  - type: text
    content: dia hatoky ihany aho.
  '4':
  - type: text
    content: 'Zavatra iray loha no nangatahiko tamin’NY TOMPO, izany no hotadiaviko:'
  - type: text
    content: Ny hitoetra ao amin’ny tranon’NY TOMPO amin’ny andro rehetra hiainako
  - type: text
    content: mba hijery ny hatsaran’NY TOMPO
  - type: text
    content: sy handinika ny tempoliny.
  '5':
  - type: text
    content: Fa hanafina ahy ao an-trano fialofany Izy amin’ny andro fahoriana;
  - type: text
    content: hampiery ahy ao amin’ny fierena ao an-dainy Izy;
  - type: text
    content: hanandratra ahy ho eny ambony vatolampy Izy.
  '6':
  - type: text
    content: Koa ankehitriny dia hisandratra ho ambonin’ny fahavaloko manodidina ahy ny lohako
  - type: text
    content: ka hanolotra fanatitra hihobiana ao an-dainy aho;
  - type: text
    content: hihira sy hankalaza NY TOMPO aho.
  '7':
  - type: text
    content: Mihainoa, TOMPO ô, fa mitaraina mafy aho;
  - type: text
    content: mamindrà fo amiko ka valio aho!
  '8':
  - type: text
    content: 'Raha hoy Ianao: Tadiavonareo ny tavako!'
  - type: text
    content: 'Dia hoy ny navalin’ny foko: Eny, ny tavanao no tadiaviko, TOMPO ô!'
  '9':
  - type: text
    content: Aza manafina ny tavanao amiko,
  - type: text
    content: aza mandroaka ny mpanomponao an-katezerana!
  - type: text
    content: Ianao no famonjena ahy,
  - type: text
    content: aza manary na mahafoy ahy,
  - type: text
    content: ry Andriamanitry ny famonjena ahy!
