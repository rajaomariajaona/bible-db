document_id: GAL.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Paoly Apostoly, tsy avy tamin’olona, na tamin’ny alalan’olona, fa tamin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' sy Andriamanitra Ray izay nanangana Azy tamin’ny maty, '
  '10':
  - type: text
    content: Ary ankehitriny, olona va no ilàko sitraka sa Andriamanitra? Moa mila sitraka amin’olona va aho? Raha mbola mila sitraka amin’olona aho dia tsy mpanompon’i Kristy.
  - type: heading
    content: Ny fomba nandraisan’i Paoly sy nampitany ny Filazantsara
  '11':
  - type: text
    content: 'Fa ampahafantariko anareo, ry rahalahy, fa ny amin’ny Filazantsara izay notoriko, dia tsy araka ny fanaon’ny olona, '
  '12':
  - type: text
    content: 'satria sady tsy nandray azy tamin’olona aho no tsy mba nampianarina, fa tamin’ny fanambaràn’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' ihany.'
  '13':
  - type: text
    content: 'Efa renareo ny toetrako fahiny nanoloana ny fivavahan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: '; nanenjika mafy ny fiangonan’Andriamanitra aho ka nandrava azy; '
  '14':
  - type: text
    content: nandroso tamin’ny fivavahan’ny Jiosy koa, mihoatra noho ny maro indray mihira amiko eo amin’ny fireneko, sady tena fatra-pitana ny fampianarana voatolotry ny razako.
  '15':
  - type: text
    content: 'Fa rehefa sitrak’Andriamanitra, izay nanokana ahy hatrany an-kibon’Ineny sy niantso ahy tamin’ny fahasoavany, '
  '16':
  - type: text
    content: 'ny nampiseho ny Zanany tato anatiko, mba hitoriako Azy any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ', niaraka tamin’izay dia tsy naka saina tamin’ny nofo aman-dra aho '
  '17':
  - type: text
    content: ary tsy niakatra tany Jerosalema ho any amin’izay apostoly talohako aho, fa lasa nankany Arabia dia niverina ho any Damaskosy indray.
  '18':
  - type: text
    content: 'Nony afaka telo taona dia niakatra tany Jerosalema mba hifankahalala amin’i Kefasy aho ka nitoetra tao aminy nandritra ny dimy amby folo andro. '
  '19':
  - type: text
    content: 'Nefa ny apostoly sasany dia tsy nisy hitako afa-tsy i Jakoba, rahalahin’ny Tompo. '
  '2':
  - type: text
    content: mbamin’ny rahalahy rehetra izay ato amiko, no mamangy ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' any Galatia. '
  '20':
  - type: text
    content: Ary indro, eo anatrehan’Andriamanitra izay zavatra soratako aminareo fa tsy mandainga aho.
  '21':
  - type: text
    content: 'Rehefa afaka izany dia tonga tany amin’ny tany Siria sy Kilikia aho; '
  '22':
  - type: text
    content: ary tsy mbola fantatry ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' any '
  - type: text
    content: Jodia
  - type: text
    content: ', izay ao amin’i Kristy, ny tarehiko. '
  '23':
  - type: text
    content: 'Fa nandre ihany izy ireo hoe: Ilay mpanenjika antsika fahiny, indro izy ankehitriny, mitory ny finoana izay noravany fahiny. '
  '24':
  - type: text
    content: Dia nankalaza an’Andriamanitra noho ny amiko izy ireo.
  '3':
  - type: text
    content: 'Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy Jesosy Kristy Tompontsika '
  '4':
  - type: text
    content: 'izay nanolotra ny tenany noho ny fahotantsika mba hanafahany antsika amin’izao vanim-potoana ratsy ankehitriny izao, araka ny sitrapon’Andriamanitra Raintsika. '
  '5':
  - type: text
    content: 'Ho Azy anie ny voninahitra mandrakizay mandrakizay. '
  - type: text
    content: Amena
  - type: text
    content: '!'
  - type: heading
    content: Misy mampiala ny Galatiana amin’ilay Filazantsara tokana tsy manan-tsahala
  '6':
  - type: text
    content: 'Gaga aho raha mifindra haingana toy izao ianareo hiala amin’izay efa niantso anareo tamin’ny fahasoavan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ho amin’ny filazantsara hafa '
  '7':
  - type: text
    content: 'izay tsy Filazantsara akory, saingy misy ny manakorontana anareo ka ta hanova ny Filazantsaran’i Kristy. '
  '8':
  - type: text
    content: 'Fa na izahay, na anjely avy any an-danitra aza, no mitory filazantsara hafa aminareo afa-tsy izay efa notorinay taminareo dia aoka ho voaozona izy. '
  '9':
  - type: text
    content: 'Araka ny efa voalazanay no lazaiko indray ankehitriny: Raha misy olona mitory filazantsara hafa aminareo, afa-tsy izay efa noraisinareo, dia aoka ho voaozona izy.'
