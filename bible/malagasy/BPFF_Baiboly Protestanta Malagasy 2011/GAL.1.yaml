document_id: GAL.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Paoly Apostoly, tsy avy tamin’olona, na tamin’ny alalan’olona, fa tamin’ny alalan’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' sy Andriamanitra Ray izay nanangana Azy tamin’ny maty, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: mbamin’ny rahalahy rehetra izay ato amiko, no mamangy ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' any Galatia. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy Jesosy Kristy Tompontsika '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'izay nanolotra ny tenany noho ny fahotantsika mba hanafahany antsika amin’izao vanim-potoana ratsy ankehitriny izao, araka ny sitrapon’Andriamanitra Raintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ho Azy anie ny voninahitra mandrakizay mandrakizay. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misy mampiala ny Galatiana amin’ilay Filazantsara tokana tsy manan-tsahala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Gaga aho raha mifindra haingana toy izao ianareo hiala amin’izay efa niantso anareo tamin’ny fahasoavan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ho amin’ny filazantsara hafa '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'izay tsy Filazantsara akory, saingy misy ny manakorontana anareo ka ta hanova ny Filazantsaran’i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa na izahay, na anjely avy any an-danitra aza, no mitory filazantsara hafa aminareo afa-tsy izay efa notorinay taminareo dia aoka ho voaozona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Araka ny efa voalazanay no lazaiko indray ankehitriny: Raha misy olona mitory filazantsara hafa aminareo, afa-tsy izay efa noraisinareo, dia aoka ho voaozona izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ankehitriny, olona va no ilàko sitraka sa Andriamanitra? Moa mila sitraka amin’olona va aho? Raha mbola mila sitraka amin’olona aho dia tsy mpanompon’i Kristy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fomba nandraisan’i Paoly sy nampitany ny Filazantsara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ampahafantariko anareo, ry rahalahy, fa ny amin’ny Filazantsara izay notoriko, dia tsy araka ny fanaon’ny olona, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'satria sady tsy nandray azy tamin’olona aho no tsy mba nampianarina, fa tamin’ny fanambaràn’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Efa renareo ny toetrako fahiny nanoloana ny fivavahan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: '; nanenjika mafy ny fiangonan’Andriamanitra aho ka nandrava azy; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: nandroso tamin’ny fivavahan’ny Jiosy koa, mihoatra noho ny maro indray mihira amiko eo amin’ny fireneko, sady tena fatra-pitana ny fampianarana voatolotry ny razako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa rehefa sitrak’Andriamanitra, izay nanokana ahy hatrany an-kibon’Ineny sy niantso ahy tamin’ny fahasoavany, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny nampiseho ny Zanany tato anatiko, mba hitoriako Azy any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ', niaraka tamin’izay dia tsy naka saina tamin’ny nofo aman-dra aho '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary tsy niakatra tany Jerosalema ho any amin’izay apostoly talohako aho, fa lasa nankany Arabia dia niverina ho any Damaskosy indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony afaka telo taona dia niakatra tany Jerosalema mba hifankahalala amin’i Kefasy aho ka nitoetra tao aminy nandritra ny dimy amby folo andro. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nefa ny apostoly sasany dia tsy nisy hitako afa-tsy i Jakoba, rahalahin’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary indro, eo anatrehan’Andriamanitra izay zavatra soratako aminareo fa tsy mandainga aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa afaka izany dia tonga tany amin’ny tany Siria sy Kilikia aho; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ary tsy mbola fantatry ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ', izay ao amin’i Kristy, ny tarehiko. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa nandre ihany izy ireo hoe: Ilay mpanenjika antsika fahiny, indro izy ankehitriny, mitory ny finoana izay noravany fahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nankalaza an’Andriamanitra noho ny amiko izy ireo.
