document_id: ISA.52,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hiverenan’NY TOMPO any Jerosalema
  - type: text
    content: Mifohaza, mifohaza ianao!
  - type: text
    content: 'Tafio ny herinao, ry '
  - type: text
    content: Ziona
  - type: text
    content: ' ô!'
  - type: text
    content: Tafio ny fitafianao tsara tarehy,
  - type: text
    content: ry Jerosalema tanàna masina ô!
  - type: text
    content: Fa tsy hiditra ao aminao intsony
  - type: text
    content: ny tsy voafora sy ny maloto.
  '10':
  - type: text
    content: NY TOMPO efa nampiseho ny sandriny masina
  - type: text
    content: teo imason’ny firenena rehetra;
  - type: text
    content: ary ny faran’ny tany rehetra dia hahita
  - type: text
    content: ny famonjen’Andriamanitsika.
  '11':
  - type: text
    content: Mialà, mialà ianareo, mivoaha tao!
  - type: text
    content: Aza mikasika izay maloto!
  - type: text
    content: Mivoaha tao aminy!
  - type: text
    content: Midiova ianareo
  - type: text
    content: izay mitondra ny fanaky NY TOMPO.
  '12':
  - type: text
    content: Fa tsy tampoka no hivoahanareo,
  - type: text
    content: ary tsy amin’ny fandosirana no handehananareo;
  - type: text
    content: fa NY TOMPO no hitarika anareo eo aloha,
  - type: text
    content: ary Andriamanitry ny Israely no ho vodilalanareo.
  - type: heading
    content: Ny fanaovana tsinontsinona ny Mpanompon’NY TOMPO sy ny fanamarinana azy
  '13':
  - type: text
    content: Indro, hambinina ny Mpanompoko;
  - type: text
    content: hisandratra sy ho ambony Izy ka ho avo indrindra.
  '14':
  - type: text
    content: Fa toy ny nigagan’ny maro Anao,
  - type: text
    content: simba ny tarehiny ka ohatra ny tsy tarehin’olombelona akory,
  - type: text
    content: ary ny endriny dia ohatra ny tsy endriky ny zanak’olombelona.
  '15':
  - type: text
    content: Toy izany no hampitalanjonany ny firenena maro.
  - type: text
    content: Hitampim-bava Aminy ny mpanjaka,
  - type: text
    content: satria izay tsy mbola nolazaina tamin’ireny no ho hitany
  - type: text
    content: ary izay tsy mbola reny akory no hosaintsaininy.
  '2':
  - type: text
    content: Ahintsano hiala amin’ny tenanao ny vovoka,
  - type: text
    content: ka miarena
  - type: text
    content: ary mipetraha, ry Jerosalema ô!
  - type: text
    content: Vahao ny fatorana amin’ny tendanao,
  - type: text
    content: ry Ziona, zanakavavy babo!
  '3':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO:'
  - type: text
    content: Tsy vola tsy harena no nivarotana anareo,
  - type: text
    content: koa tsy vola tsy harena koa ny hanavotana anareo.
  '4':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Tany Ejipta no nidinan’ny oloko tamin’ny voalohany mba hivahiny tany.
  - type: text
    content: Nampahory azy tsy amin’antony koa ny Asiriana.
  '5':
  - type: text
    content: Ary ankehitriny, inona no hataoko
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: fa nobaboina tsy amin’antony ny oloko?
  - type: text
    content: Manakora ny mpanapaka eo aminy,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: ary mandrakariva, mandritra ny andro dia hamavoina ny anarako.
  '6':
  - type: text
    content: Koa ny oloko dia hahalala ny anarako;
  - type: text
    content: Eny, amin’izany andro izany dia ho fantany
  - type: text
    content: 'fa Izaho no miteny hoe: Inty Aho!'
  '7':
  - type: text
    content: Akory ny hatsaran’ny fandehan’irỳ mitondra teny soa mahafaly
  - type: text
    content: erỳ an-tendrombohitra
  - type: text
    content: sady mitory fiadanana,
  - type: text
    content: dia izay mitondra teny soa mahafaly
  - type: text
    content: sady mitory famonjena;
  - type: text
    content: 'eny, izay miteny amin’i Ziona hoe: Mpanjaka Andriamanitrao!'
  '8':
  - type: text
    content: Injany ny feon’ny mpitilinao!
  - type: text
    content: Manandratra ny feony izy ka miara-mihoby;
  - type: text
    content: fa ho faly izy mahita samy imaso
  - type: text
    content: ny hiverenan’NY TOMPO ho any Ziona.
  '9':
  - type: text
    content: Velomy ny hobinareo rehetra,
  - type: text
    content: ry toerana rava any Jerosalema!
  - type: text
    content: Fa NY TOMPO efa nampionona ny olony
  - type: text
    content: sady efa nanavotra an’i Jerosalema.
