document_id: ISA.52
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hiverenan’NY TOMPO any Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mifohaza, mifohaza ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tafio ny herinao, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' ô!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tafio ny fitafianao tsara tarehy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Jerosalema tanàna masina ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hiditra ao aminao intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tsy voafora sy ny maloto.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ahintsano hiala amin’ny tenanao ny vovoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miarena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mipetraha, ry Jerosalema ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vahao ny fatorana amin’ny tendanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Ziona, zanakavavy babo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy vola tsy harena no nivarotana anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa tsy vola tsy harena koa ny hanavotana anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tany Ejipta no nidinan’ny oloko tamin’ny voalohany mba hivahiny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampahory azy tsy amin’antony koa ny Asiriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ankehitriny, inona no hataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nobaboina tsy amin’antony ny oloko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manakora ny mpanapaka eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandrakariva, mandritra ny andro dia hamavoina ny anarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa ny oloko dia hahalala ny anarako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, amin’izany andro izany dia ho fantany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa Izaho no miteny hoe: Inty Aho!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Akory ny hatsaran’ny fandehan’irỳ mitondra teny soa mahafaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: erỳ an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mitory fiadanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay mitondra teny soa mahafaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mitory famonjena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, izay miteny amin’i Ziona hoe: Mpanjaka Andriamanitrao!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Injany ny feon’ny mpitilinao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manandratra ny feony izy ka miara-mihoby;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho faly izy mahita samy imaso
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hiverenan’NY TOMPO ho any Ziona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Velomy ny hobinareo rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry toerana rava any Jerosalema!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa NY TOMPO efa nampionona ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady efa nanavotra an’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: NY TOMPO efa nampiseho ny sandriny masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo imason’ny firenena rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny faran’ny tany rehetra dia hahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny famonjen’Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mialà, mialà ianareo, mivoaha tao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mikasika izay maloto!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivoaha tao aminy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midiova ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitondra ny fanaky NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa tsy tampoka no hivoahanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy amin’ny fandosirana no handehananareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO no hitarika anareo eo aloha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Andriamanitry ny Israely no ho vodilalanareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanaovana tsinontsinona ny Mpanompon’NY TOMPO sy ny fanamarinana azy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro, hambinina ny Mpanompoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hisandratra sy ho ambony Izy ka ho avo indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa toy ny nigagan’ny maro Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: simba ny tarehiny ka ohatra ny tsy tarehin’olombelona akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny endriny dia ohatra ny tsy endriky ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Toy izany no hampitalanjonany ny firenena maro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitampim-bava Aminy ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria izay tsy mbola nolazaina tamin’ireny no ho hitany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay tsy mbola reny akory no hosaintsaininy.
