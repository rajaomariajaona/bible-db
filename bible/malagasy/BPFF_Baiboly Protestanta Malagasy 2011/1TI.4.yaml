document_id: 1TI.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fampianaran’ny demonia
  - type: text
    content: 'Fa milaza marina ny Fanahy fa amin’ny andro farany dia hihemotra amin’ny finoana ny sasany ka hanaiky fanahy mamitaka sy fampianaran’ny demonia, '
  '10':
  - type: text
    content: Fa izany no ikelezanay aina sy iezahanay satria izahay dia manantena an’Andriamanitra velona izay Mpamonjy ny olona rehetra, indrindra fa izay mino.
  '11':
  - type: text
    content: Izany zavatra izany no andidio sy ampianaro.
  - type: heading
    content: Fianarana ho an’ny mino
  '12':
  - type: text
    content: Aoka tsy hisy olona hanao tsinontsinona anao noho ny hatanoranao; fa aoka ho tonga fianarana ho an’ny mino ianao amin’ny fiteny, amin’ny fitondrantena, amin’ny fitiavana, amin’ny finoana, amin’ny fahadiovana.
  '13':
  - type: text
    content: 'Mandra-pahatongako dia tandremo ny famakian-teny sy ny fananarana ary ny fampianarana. '
  '14':
  - type: text
    content: Aza atao tsirambina ny fanomezam-pahasoavana izay ao anatinao, izay nomena anao tamin’ny faminaniana sy ny fametrahan-tanan’ny loholona
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Mazotoa mihevitra ireo zavatra ireo dia mikeleza aina fatratra amin’izany mba hiseho amin’ny olona rehetra ny fandrosoanao. '
  '16':
  - type: text
    content: Tandremo ny tenanao sy ny fampianaranao ka mahareta amin’izany; fa raha manatanteraka ireo ianao dia hamonjy ny tenanao sy izay mihaino anao.
  '2':
  - type: text
    content: 'amin’ny fihatsarambelatsihin’ny mpilaza lainga izay voapetaky ny vy mahamay ny fieritreretany. '
  '3':
  - type: text
    content: 'Mandrara tsy hanambady izy ireny ary mampifady hanina, izay nataon’Andriamanitra ho an’izay mino sady mahalala ny marina mba horaisiny amin’ny fisaorana. '
  '4':
  - type: text
    content: 'Fa ny zavatra rehetra nataon’Andriamanitra dia tsara avokoa ka tsy misy tokony holavina raha raisina amin’ny fisaorana '
  '5':
  - type: text
    content: satria hamasinin’ny tenin’Andriamanitra sy ny vavaka izany.
  - type: heading
    content: Andriamanitra izay Mpamonjy ny olona rehetra
  '6':
  - type: text
    content: 'Raha manoro hevitra ny rahalahy ny amin’izany zavatra izany ianao dia ho mpanompo tsara an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy, tezaina amin’ny tenin’ny finoana sy ny fampianarana tsara izay efa narahinao. '
  '7':
  - type: text
    content: Fa ny anganongano ratsy fanaon’ny vaviantitra dia aza raisina, fa mampiasà ny tenanao ho amin’ny toe-panahy araka an’Andriamanitra.
  '8':
  - type: text
    content: 'Eny, mahasoa kely ihany ny fampiasana ny tena; fa ny toe-panahy araka an’Andriamanitra no mahasoa indrindra amin’ny zavatra rehetra ka manana ny teny fikasana ny amin’ny fiainana ankehitriny sy ny ho avy koa. '
  '9':
  - type: text
    content: 'Mahatoky izao teny izao ka tokony hekena amin’ny fankasitrahana rehetra. '
