document_id: 1TI.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fampianaran’ny demonia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa milaza marina ny Fanahy fa amin’ny andro farany dia hihemotra amin’ny finoana ny sasany ka hanaiky fanahy mamitaka sy fampianaran’ny demonia, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'amin’ny fihatsarambelatsihin’ny mpilaza lainga izay voapetaky ny vy mahamay ny fieritreretany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mandrara tsy hanambady izy ireny ary mampifady hanina, izay nataon’Andriamanitra ho an’izay mino sady mahalala ny marina mba horaisiny amin’ny fisaorana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa ny zavatra rehetra nataon’Andriamanitra dia tsara avokoa ka tsy misy tokony holavina raha raisina amin’ny fisaorana '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: satria hamasinin’ny tenin’Andriamanitra sy ny vavaka izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra izay Mpamonjy ny olona rehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha manoro hevitra ny rahalahy ny amin’izany zavatra izany ianao dia ho mpanompo tsara an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy, tezaina amin’ny tenin’ny finoana sy ny fampianarana tsara izay efa narahinao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ny anganongano ratsy fanaon’ny vaviantitra dia aza raisina, fa mampiasà ny tenanao ho amin’ny toe-panahy araka an’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eny, mahasoa kely ihany ny fampiasana ny tena; fa ny toe-panahy araka an’Andriamanitra no mahasoa indrindra amin’ny zavatra rehetra ka manana ny teny fikasana ny amin’ny fiainana ankehitriny sy ny ho avy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mahatoky izao teny izao ka tokony hekena amin’ny fankasitrahana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa izany no ikelezanay aina sy iezahanay satria izahay dia manantena an’Andriamanitra velona izay Mpamonjy ny olona rehetra, indrindra fa izay mino.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izany zavatra izany no andidio sy ampianaro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fianarana ho an’ny mino
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka tsy hisy olona hanao tsinontsinona anao noho ny hatanoranao; fa aoka ho tonga fianarana ho an’ny mino ianao amin’ny fiteny, amin’ny fitondrantena, amin’ny fitiavana, amin’ny finoana, amin’ny fahadiovana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mandra-pahatongako dia tandremo ny famakian-teny sy ny fananarana ary ny fampianarana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aza atao tsirambina ny fanomezam-pahasoavana izay ao anatinao, izay nomena anao tamin’ny faminaniana sy ny fametrahan-tanan’ny loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mazotoa mihevitra ireo zavatra ireo dia mikeleza aina fatratra amin’izany mba hiseho amin’ny olona rehetra ny fandrosoanao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tandremo ny tenanao sy ny fampianaranao ka mahareta amin’izany; fa raha manatanteraka ireo ianao dia hamonjy ny tenanao sy izay mihaino anao.
