document_id: ROM.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra sy ny vahoaka voafidiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Milaza ny marina ao amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' aho fa tsy mandainga, sady vavolombelona miaraka amiko ao amin’ny Fanahy Masina koa ny fieritreretako: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mafy ny alaheloko ka tsy mety mitsahatra ny fahorian’ny foko. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa efa saika niriko ho voaozona ho afaka amin’i Kristy aza ny tenako noho ny rahalahiko, havako araka ny nofo, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'izay Israelita sady manana ny fananganana anaka, ny voninahitra, ireo fanekena, ny fanomezana ny lalàna, ny fombam-pivavahana ary ireo teny fikasana; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'azy koa ny razana izay niavian’i Kristy araka ny nofo, Kristy izay ambonin’izy rehetra, Andriamanitra isaorana mandrakizay! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Kanefa tsy milaza aho fa foana ny tenin’Andriamanitra. Satria tsy izay rehetra avy amin’ny Israely no Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy izay taranak’i Abrahama dia zanany avokoa fa «Avy amin’Isaka no hiantsoana ny taranaka ho anao» (Gen 21.12). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izany hoe: Tsy ny zanaky ny nofo no zanak’Andriamanitra, fa ny zanaky ny teny fikasana no isaina ho taranaka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa izao no voalazan’ny teny fikasana: «Raha mitsingerina ny fotoana toy izao dia ho avy Aho ary hanan-janakalahy i Saraha» (Gen 18.10).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary tsy izany ihany fa i Rebeka koa dia nanana anaka tamin’ny lehilahy iray, dia tamin’Isaka razantsika; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'fa fony tsy mbola teraka akory ireo zaza ireo, ary tsy mbola nanao tsara na ratsy, dia nolazaina tamin-dRavehivavy hoe: «Hanompo ny zandriny ny zokiny» (Gen 25.23), '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'mba hitoeran’ny fikasan’Andriamanitra, araka ny fifidianany, tsy avy amin’ny asa, fa avy amin’Izay miantso, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'sy araka ny voasoratra hoe: «I Jakoba no tiako fa i Esao kosa dia halako» (Mal 1.2-3).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Inona ary no holazaintsika? Misy tsy fahamarinana va ao amin’Andriamanitra? Sanatria izany! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy Izy tamin’i Mosesy: «Hiantra izay hiantrako Aho ary hamindra fo amin’izay hamindrako fo» (Eks 33.19). '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa tsy avy amin’izay maniry na avy amin’izay mihazakazaka izany, fa avy amin’Andriamanitra izay miantra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy ny Soratra Masina ny amin’i Farao: «Izany no nanandratako anao mba hoentiko mampiseho ny heriko ary mba hanambarana ny anarako any amin’ny tany rehetra» (Eks 9.16). '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa izay tiany hamindrana fo no amindrany fo ary izay tiany hohamafisina fo no hamafisiny fo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahatezeran’Andriamanitra sy ny fangorahany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hilaza amiko ianao hoe: Koa nahoana ary Izy no manome tsiny ihany? Fa iza moa no afaka hanohitra ny sitrapony? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ry olona! Fa iza moa ianao no mamaly an’Andriamanitra? Izay zavatra novolavolaina va hilaza amin’Izay namolavola azy hoe: Nahoana Ianao no nanao ahy toy izao? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Moa ny mpanefy vilany va tsy manam-pahefana amin’ny tanimanga ka ny vongany iray ihany no anaovany zavatra samihafa, ny iray dia hohajaina, ary ny iray kosa dia hatao tsinontsinona? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary raha Andriamanitra izay ta haneho ny fahatezerany sy hampahafantatra ny heriny aza no be fahari-po ka nandefitra tamin’izay fanaky ny fahatezerana voavoatra hosimbana, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'mba hampahafantarany koa ny harenan’ny voninahiny amin’ny fanaky ny famindrampo izay namboariny rahateo ho amin’ny voninahitra, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia isika izay nantsoiny koa, tsy ny avy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' ihany fa ny avy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' koa, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'araka izay lazainy ao amin’i Hosea hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hiantso ny tsy oloko hoe oloko Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ilay tsy malala hoe malala» (Hos 2.25);
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '«Ary any amin’ny tany izay nilazana taminy hoe: Tsy oloko ianareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: any no hiantsoana azy hoe zanak’Andriamanitra velona» (Hos 2.1).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary miantso mafy Isaia ny amin’ny Israely hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Na dia toy ny fasika any amin’ny ranomasina aza ny isan’ny Zanak’Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay sisa ihany no hovonjena;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fa hefain’NY TOMPO tanteraka sy haingana etỳ ambonin’ny tany ny teniny» (Isa 10.22-23); '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ary araka izay nambaran’Isaia mialoha hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Raha tsy Andriamanitra, Tompon’izao rehetra izao, no namela taranaka ho antsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa tonga tahaka an’i Sodoma
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tahaka an’i Gomora isika» (Isa 1.9).
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Israely sy ny fahamarinana: Misy fifandisoan-kevitra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Inona ary no holazaintsika? Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' izay tsy nitady fahamarinana no nahazo fahamarinana, nefa fahamarinana izay avy amin’ny finoana, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'fa ny Israely izay nitady ny lalànan’ny fahamarinana kosa dia tsy nahatratra izany lalàna izany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nahoana ary? Satria tsy tamin’ny finoana no nitadiavany izany fahamarinana izany fa toy ny tamin’ny asa ka tafintohina tamin’ny vato mahatafintohina izy; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro Aho mametraka vato mahatafintohina
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy vatolampy mahasolafaka ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mino Azy dia tsy hitsanga-menatra» (Isa 8.14; 28.16).
