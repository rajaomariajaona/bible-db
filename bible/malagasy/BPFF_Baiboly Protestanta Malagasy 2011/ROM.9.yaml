document_id: ROM.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra sy ny vahoaka voafidiny
  - type: text
    content: 'Milaza ny marina ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' aho fa tsy mandainga, sady vavolombelona miaraka amiko ao amin’ny Fanahy Masina koa ny fieritreretako: '
  '10':
  - type: text
    content: 'Ary tsy izany ihany fa i Rebeka koa dia nanana anaka tamin’ny lehilahy iray, dia tamin’Isaka razantsika; '
  '11':
  - type: text
    content: 'fa fony tsy mbola teraka akory ireo zaza ireo, ary tsy mbola nanao tsara na ratsy, dia nolazaina tamin-dRavehivavy hoe: «Hanompo ny zandriny ny zokiny» (Gen 25.23), '
  '12':
  - type: text
    content: 'mba hitoeran’ny fikasan’Andriamanitra, araka ny fifidianany, tsy avy amin’ny asa, fa avy amin’Izay miantso, '
  '13':
  - type: text
    content: 'sy araka ny voasoratra hoe: «I Jakoba no tiako fa i Esao kosa dia halako» (Mal 1.2-3).'
  '14':
  - type: text
    content: 'Inona ary no holazaintsika? Misy tsy fahamarinana va ao amin’Andriamanitra? Sanatria izany! '
  '15':
  - type: text
    content: 'Fa hoy Izy tamin’i Mosesy: «Hiantra izay hiantrako Aho ary hamindra fo amin’izay hamindrako fo» (Eks 33.19). '
  '16':
  - type: text
    content: 'Koa tsy avy amin’izay maniry na avy amin’izay mihazakazaka izany, fa avy amin’Andriamanitra izay miantra. '
  '17':
  - type: text
    content: 'Fa hoy ny Soratra Masina ny amin’i Farao: «Izany no nanandratako anao mba hoentiko mampiseho ny heriko ary mba hanambarana ny anarako any amin’ny tany rehetra» (Eks 9.16). '
  '18':
  - type: text
    content: Koa izay tiany hamindrana fo no amindrany fo ary izay tiany hohamafisina fo no hamafisiny fo.
  - type: heading
    content: Ny fahatezeran’Andriamanitra sy ny fangorahany
  '19':
  - type: text
    content: 'Dia hilaza amiko ianao hoe: Koa nahoana ary Izy no manome tsiny ihany? Fa iza moa no afaka hanohitra ny sitrapony? '
  '2':
  - type: text
    content: 'Mafy ny alaheloko ka tsy mety mitsahatra ny fahorian’ny foko. '
  '20':
  - type: text
    content: 'Ry olona! Fa iza moa ianao no mamaly an’Andriamanitra? Izay zavatra novolavolaina va hilaza amin’Izay namolavola azy hoe: Nahoana Ianao no nanao ahy toy izao? '
  '21':
  - type: text
    content: 'Moa ny mpanefy vilany va tsy manam-pahefana amin’ny tanimanga ka ny vongany iray ihany no anaovany zavatra samihafa, ny iray dia hohajaina, ary ny iray kosa dia hatao tsinontsinona? '
  '22':
  - type: text
    content: 'Ary raha Andriamanitra izay ta haneho ny fahatezerany sy hampahafantatra ny heriny aza no be fahari-po ka nandefitra tamin’izay fanaky ny fahatezerana voavoatra hosimbana, '
  '23':
  - type: text
    content: 'mba hampahafantarany koa ny harenan’ny voninahiny amin’ny fanaky ny famindrampo izay namboariny rahateo ho amin’ny voninahitra, '
  '24':
  - type: text
    content: 'dia isika izay nantsoiny koa, tsy ny avy amin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' ihany fa ny avy amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' koa, '
  '25':
  - type: text
    content: 'araka izay lazainy ao amin’i Hosea hoe:'
  - type: text
    content: «Hiantso ny tsy oloko hoe oloko Aho;
  - type: text
    content: ary ilay tsy malala hoe malala» (Hos 2.25);
  '26':
  - type: text
    content: '«Ary any amin’ny tany izay nilazana taminy hoe: Tsy oloko ianareo,'
  - type: text
    content: any no hiantsoana azy hoe zanak’Andriamanitra velona» (Hos 2.1).
  '27':
  - type: text
    content: 'Ary miantso mafy Isaia ny amin’ny Israely hoe:'
  - type: text
    content: «Na dia toy ny fasika any amin’ny ranomasina aza ny isan’ny Zanak’Israely
  - type: text
    content: dia izay sisa ihany no hovonjena;
  '28':
  - type: text
    content: 'fa hefain’NY TOMPO tanteraka sy haingana etỳ ambonin’ny tany ny teniny» (Isa 10.22-23); '
  '29':
  - type: text
    content: 'ary araka izay nambaran’Isaia mialoha hoe:'
  - type: text
    content: «Raha tsy Andriamanitra, Tompon’izao rehetra izao, no namela taranaka ho antsika,
  - type: text
    content: dia efa tonga tahaka an’i Sodoma
  - type: text
    content: sy tahaka an’i Gomora isika» (Isa 1.9).
  - type: heading
    content: 'Israely sy ny fahamarinana: Misy fifandisoan-kevitra'
  '3':
  - type: text
    content: 'Fa efa saika niriko ho voaozona ho afaka amin’i Kristy aza ny tenako noho ny rahalahiko, havako araka ny nofo, '
  '30':
  - type: text
    content: 'Inona ary no holazaintsika? Ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izay tsy nitady fahamarinana no nahazo fahamarinana, nefa fahamarinana izay avy amin’ny finoana, '
  '31':
  - type: text
    content: 'fa ny Israely izay nitady ny lalànan’ny fahamarinana kosa dia tsy nahatratra izany lalàna izany. '
  '32':
  - type: text
    content: 'Nahoana ary? Satria tsy tamin’ny finoana no nitadiavany izany fahamarinana izany fa toy ny tamin’ny asa ka tafintohina tamin’ny vato mahatafintohina izy; '
  '33':
  - type: text
    content: 'araka ny voasoratra hoe:'
  - type: text
    content: «Indro Aho mametraka vato mahatafintohina
  - type: text
    content: 'sy vatolampy mahasolafaka ao '
  - type: text
    content: Ziona
  - type: text
    content: ;
  - type: text
    content: izay mino Azy dia tsy hitsanga-menatra» (Isa 8.14; 28.16).
  '4':
  - type: text
    content: 'izay Israelita sady manana ny fananganana anaka, ny voninahitra, ireo fanekena, ny fanomezana ny lalàna, ny fombam-pivavahana ary ireo teny fikasana; '
  '5':
  - type: text
    content: 'azy koa ny razana izay niavian’i Kristy araka ny nofo, Kristy izay ambonin’izy rehetra, Andriamanitra isaorana mandrakizay! '
  - type: text
    content: Amena
  - type: text
    content: '!'
  '6':
  - type: text
    content: 'Kanefa tsy milaza aho fa foana ny tenin’Andriamanitra. Satria tsy izay rehetra avy amin’ny Israely no Israely. '
  '7':
  - type: text
    content: 'Tsy izay taranak’i Abrahama dia zanany avokoa fa «Avy amin’Isaka no hiantsoana ny taranaka ho anao» (Gen 21.12). '
  '8':
  - type: text
    content: 'Izany hoe: Tsy ny zanaky ny nofo no zanak’Andriamanitra, fa ny zanaky ny teny fikasana no isaina ho taranaka. '
  '9':
  - type: text
    content: 'Fa izao no voalazan’ny teny fikasana: «Raha mitsingerina ny fotoana toy izao dia ho avy Aho ary hanan-janakalahy i Saraha» (Gen 18.10).'
