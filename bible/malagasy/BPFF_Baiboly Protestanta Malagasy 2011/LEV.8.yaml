document_id: LEV.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanokanana an’i Arona sy ireo zanany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nalain’i Mosesy ny diloilo fanosorana ka nohosorany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakely
    - type: text
      text: ' sy izay rehetra tao ary nohamasininy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Namafazany impito teo ambonin’ny alitara ny diloilo, nohosorany avokoa ny alitara mbamin’ny fanaka rehetra momba azy ary ny koveta sy ny faladiany mba hahamasina azy ireny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nandrarahany teo amin’ny lohan’i Arona avy eo ny diloilo fanosorana ka nanosotra azy izy mba hanamasinana azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia nampanatonin’i Mosesy koa ireo zanak’i Arona ka nampiakanjoiny akanjo lava, nasiany fehikibo, dia nampisatrohany, araka izay nandidian’NY TOMPO an’i Mosesy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Noentiny nanatona koa ny vantotra ombilahy izay hatao fanatitra fanadiovana. Koa nametraka ny tanany teo amin’ny lohan’ny vantotra ombilahy izay hatao fanatitra fanadiovana i Arona sy ireo zanany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia novonoiny iny ary nalain’i Mosesy ny ra ka nohosorany tamin’ny fanondrony ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroka
    - type: text
      text: ' manodidina ny alitara mba hanadiovany azy tamin’ny ota. Ny ra sisa kosa dia naidiny teo an-tongotry ny alitara izay nohamasininy tamin’ny fanaovana fanavotana ho azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nalainy ny jaboran-tsinainy rehetra sy ny ila atiny lehibe ary ny voany mbamin’ny jabora mandrakotra azy ka nodoran’i Mosesy ho fofona teo ambonin’ny alitara ireo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ilay vantotra ombilahy, ny hodiny ary ny henany sy ny tain-drorohany kosa dia nodorany tamin’ny afo teny ivelan’ny toby, araka izay efa nandidian’NY TOMPO an’i Mosesy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia noentiny nanatona ny ondrilahy izay hatao fanatitra dorana manontolo; ary nametraka ny tanany teo amin’ny lohan’ny ondrilahy i Arona sy ireo zanany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia novonoina iny ka nofafazan’i Mosesy ra ny manodidina ny alitara. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ento i Arona sy ireo zanany, ary ny fitafiana sy ny diloilo fanosorana miaraka amin’ny vantotra ombilahy iray hatao fanatitra fanadiovana sy ny ondrilahy roa ary ny harona misy mofo tsy misy masirasira, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Norasainy tsara ny ondrilahy dia nodoran’i Mosesy ho fofona ny lohany sy ireo voarasa ireo ary ny jaborany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nosasany tamin’ny rano ny taovany sy ny tongony; ary nodoran’i Mosesy ho fofona teo ambonin’ny alitara ny tenan’ilay ondrilahy manontolo. Fanatitra dorana manontolo izany mba ho hanitra ankasitrahana; fanatitra levonina amin’ny afo ho an’NY TOMPO, araka izay nandidian’NY TOMPO an’i Mosesy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia noentiny nanatona koa ny ondrilahy faharoa, dia ny ondrilahy fanokanana; ary nametraka ny tanany tamin’ny lohan’ny ondrilahy i Arona sy ireo zanany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Novonoiny iny, ary nakan’i Mosesy ny ra ka nahosony teo amin’ny ravin-tsofin’i Arona havanana sy tamin’ny ankiben-tanany havanana ary tamin’ny ankiben-tongony havanana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nampanatoniny koa ireo zanak’i Arona ka nohosoran’i Mosesy ra ny ravin-tsofiny havanana sy ny ankiben-tanany havanana ary ny ankiben-tongony havanana; dia nofafazan’i Mosesy ny ra sisa ny manodidina ny alitara. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nalainy ny jaborany sy ny hofany, ny taovany rehetra, ny ila atiny lehibe, ny voany roa mbamin’ny jabora mandrakotra azy ary ny feny havanana.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nakany mofo iray tsy misy masirasira sy mofo iray voaisy diloilo ary mofo manify iray ilay harona nisy ireo mofo tsy misy masirasira izay teo anatrehan’NY TOMPO ka napetrany teo ambonin’ny jaborany sy ny feny havanana. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia napetrany teo amin’ny tanan’i Arona sy ireo zanany ireo rehetra ireo ka nataony fanatitra asandratra eo anatrehan’NY TOMPO. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Nalain’i Mosesy tamin’ny tanany indray ireo ka nodorany ho fofona teo ambonin’ny alitara niaraka tamin’ny fanatitra dorana manontolo; fanati-panokanana ireo ho hanitra ankasitrahana, dia fanatitra levonina amin’ny afo ho an’NY TOMPO.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Nalain’i Mosesy koa ny tratran’ilay ondry ka nataony fanatitra asandratra eo anatrehan’NY TOMPO. Anjaran’i Mosesy avy amin’ny ondrilahy fanokanana io, araka izay nandidian’NY TOMPO azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'dia vorio ho eo anoloan’ny varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ' ny fiangonana manontolo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nakan’i Mosesy ny diloilo fanosorana sy ny ra izay teo ambonin’ny alitara ka nafafiny tamin’i Arona sy ny fitafiany, ary tamin’ireo zanany sy ny fitafian’izy ireo koa; dia nanamasina an’i Arona sy ny fitafiany ary ireo zanany sy ny fitafian’ireo zanany koa izy.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary hoy i Mosesy tamin’i Arona sy ireo zanany: Ahandroy eo anoloan’ny varavaran’ny tranolay fihaonana ny hena; eo no hihinananareo azy mbamin’ny mofo izay ao amin’ny haron’ny fanati-panokanana, araka izay nandidiako hoe: I Arona sy ireo zanany no hihinana azy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Izay sisa amin’ny hena sy ny mofo dia hodoranareo amin’ny afo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Tsy hiala eo anoloan’ny varavaran’ny tranolay fihaonana hafitoana ianareo, mandra-pahatapitra ny andro fanokanana anareo; fa hafitoana no hanokanany anareo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Tahaka ny efa natao androany no nandidian’NY TOMPO hatao mba hanaovana fanavotana ho anareo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Hitoetra eo anoloan’ny varavaran’ny tranolay fihaonana hafitoana andro aman’alina ianareo ka hitandrina izay asain’NY TOMPO hotandremana dia tsy ho faty ianareo: Izany no nandidiana ahy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Dia notanterahin’i Arona sy ireo zanany izay rehetra nandidian’NY TOMPO tamin’ny alalan’i Mosesy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nanatanteraka izay nandidian’NY TOMPO azy i Mosesy ka vory teo anoloan’ny varavaran’ny tranolay fihaonana ny fiangonana.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hoy i Mosesy tamin’ny fiangonana: Izao no raharaha nandidian’NY TOMPO. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nampanatonin’i Mosesy i Arona sy ireo zanany ka nampandroiny tamin’ny rano. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Avy eo dia nampiakanjoiny ny akanjo lava i Arona ka nasiany fehikibo sy nampanaoviny ny akanjo ivelany; dia nataony taminy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efoda
    - type: text
      text: ' ary nasiany ny fehikibo momba ny efoda izy ka namehezany ny efoda taminy izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary ny saron-tratra dia nataony taminy ka nataony tao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Orima sy ny Tomima
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nataony teo an-dohany ny fehiloha sy ny takela-bolamena, ilay diadema masina, dia nataony teo anoloana amin’ny fehiloha, araka izay nandidian’NY TOMPO an’i Mosesy.
