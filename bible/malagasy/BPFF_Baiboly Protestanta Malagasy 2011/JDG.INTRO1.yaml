document_id: JDG.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Atao hoe Mpitsara ny anaran’ireo mpitondra teo anelanelan’i Josoa sy ireo mpanjaka. Izy ireny anefa dia tsy nisy izay tena nanao ny raharahan’ny mpitsara, ankoatra an’i Debora sy i Samoela ihany. Ny tena izy dia mpitari-tafika izay namonjy ny Israely tamin’ny fahavalony izy ireny.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Toy izao ny filazana miverimberina ao anatin’ny Boky:'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Nanao izay ratsy teo imason’NY TOMPO ny Israely ka nanadino Azy, dia natolony teo am-pelatanan’ny fahavalony; nitaraina tamin’Andriamanitra izy dia nandefasany Mpitsara izay namonjy azy; rehefa maty anefa izany Mpitsara izany dia niverina tamin’ny ditrany ny olona, dia natolotr’Andriamanitra teo am-pelatanan’ny fahavalo, dia nitaraina, dia nandefasan’Andriamanitra Mpitsara hafa indray.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ny Boky dia mifarana amin’ny filazana hoe: «Tsy nisy mpanjaka teo amin’ny Israely tamin’izany andro izany; fa samy nanao izay noheveriny ho marina avy izy rehetra.»'
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Boky
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fitarihanteny. Filazana momba ny nahazoana ny tany Kanana. Ilay Anjelin’NY TOMPO tao Gilgala: 1.1–2.5'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny tantaran’ireo Mpitsara: 2.6–16.31'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny fokon’i Dana nifindra toerana sy nanorina toeram-pivavahana ho azy manokana: 17–18'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny heloka bevava nataon’ny mponina tao Gibea sy ny namalian’ny Benjaminita azy: 19–21'
