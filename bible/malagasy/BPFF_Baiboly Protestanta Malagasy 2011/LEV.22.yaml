document_id: LEV.22
type_code: plt
segments:
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny fihinanana ny henan’ny fanatitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mitenena amin’i Arona sy ireo zanany mba hitandremany ny amin’ny tsy hikasihany ireo zava-masina izay hamasinin’ny Zanak’Israely ho Ahy mba tsy hanamavoany ny anarako masina. Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lazao aminy hoe: Izay rehetra maloto amin’ny zanakareo, hatramin’ny taranany fara aman-dimby, nefa manakaiky ireo zava-masina izay hamasinin’ny Zanak’Israely ho an’NY TOMPO dia hesorina tsy ho eo anatrehako. Izaho no TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Na iza na iza amin’ny taranak’i Arona no boka na marary mitsika eo amin’ny taovam-pananahana dia tsy hihinana ireo zava-masina izy mandra-pahadiony. Ary izay rehetra mikasika izay maloto amim-paty, na izay lehilahy nialan’ny tsirinainy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'na izay mikasika biby mandady na mikisaka izay maloto na lehilahy izay maloto, na inona na inona no fahalotoany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ny olona izay mikasika izany dia haloto mandra-paharivan’ny andro ka tsy hihinana amin’ny zava-masina raha tsy mandro amin’ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa milentika ny masoandro vao hadio izy ka izay vao mahazo mihinana amin’ny zava-masina satria anjara haniny izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay maty ho azy na izay noviraviraim-biby dia tsy hohaniny mba tsy hahaloto azy. Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aoka hitandrina izay asaiko tandremana izy fandrao ho meloka noho izany izy ka ho fatin’ny nanamavoany azy. Izaho TOMPO no manamasina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aza avela hisy olon-kafa hihinana zava-masina. Na izay mivahiny ao amin’ny mpisorona na izay mpikarama dia samy tsy mahazo mihinana zava-masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa raha misy olona novidin’ny mpisorona dia mahazo mihinana amin’izany ihany izy; ary izay teraka tao an-tranony koa dia mahazo mihinana amin’ny sakafon’ny mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha misy zanakavavin’ny mpisorona manambady olon-kafa dia tsy hihinana amin’ny fanatitra izay nalaina avy amin’ny zava-masina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha misy zanakavavin’ny mpisorona ka maty vady na efa nisara-bady, nefa tsy manan-janaka ary mody any an-tranon’ny rainy toy ny fony izy mbola kely, dia mahazo mihinana ny sakafon’ny rainy ihany izy; nefa aoka tsy hisy olon-kafa hihinana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha misy olona mihinana tsy nahy amin’ny zava-masina dia honerany ny zava-masina ka homeny ny mpisorona sady hampiany ny ampahadiminy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aoka tsy hisy hanamavo ny zava-masin’ny Zanak’Israely izay ateriny ho an’NY TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: na hahatonga ota sy heloka noho ny nihinanany ny zava-masiny; fa Izaho TOMPO no manamasina izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitsipika momba ny fifidianana izay zavatra hatao fanatitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mitenena amin’i Arona sy ny zanany ary ny Zanak’Israely rehetra hoe: Na iza na iza amin’ny taranak’Israely na amin’ny vahiny izay monina eo amin’ny Israely no manolotra ny fanatiny ho fanatitra hanalany voady na ho fanatitra an-tsitrapo, izay hatolony ho an’NY TOMPO ho fanatitra dorana manontolo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia lahy tsy misy kilema no hatolony, na omby izany na zanak’ondry na osy, mba hankasitrahana anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izay rehetra misy kilema dia tsy hatolotrareo; fa tsy hankasitrahana anareo izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha misy manolotra fanati-pihavanana ho an’NY TOMPO, na ho fanatitra hanalany voady na ho fanatitra an-tsitrapo na omby izany na ondry na osy, dia izay tsara tsy misy kilema na kely akory aza no hatolony mba hankasitrahana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny jamba na ny misy tapaka na ny kilemaina na ny ferena na ny be hatina na ny be hazaka dia tsy mba hatolotrareo ho an’NY TOMPO, na hataonareo fanatitra levonina amin’ny afo eo ambonin’ny alitara ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Na omby na ondry na osy misy sampona dia azonao aterina ho fanatitra an-tsitrapo ihany; fa raha hanefana voady kosa dia tsy hankasitrahana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay voaporitra na voatoro na voaongotra na voadidy ho afaka ny vihindahiny, dia tsy azonareo atolotra ho an’NY TOMPO; ary aza manao izany eo amin’ny taninareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Raha misy olona hafa firenena aza mitondra izany zavatra izany dia tsy azonareo atolotra ho hanin’Andriamanitrareo izany satria efa simba ka misy kilema; tsy mba hankasitrahana anareo izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha misy omby na ondry na osy vao teraka dia hitoetra amin’ny reniny hafitoana izy; fa rehefa hatramin’ny andro fahavalo no ho miakatra dia hankasitrahana izy raha atao fanatitra levonina amin’ny afo ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa ny ombivavy na ny ondrivavy na ny osivavy dia tsy hovonoinareo indray andro izy sy ny zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha mamono zavatra hatao fanati-pisaorana ho an’NY TOMPO ianareo dia amin’izay hankasitrahana anareo no hamonoanareo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Amin’izany andro izany ihany no hihinanana azy fa aza amelana ho tra-maraina. Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tandremo ny didiko ka araho. Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aza manamavo ny anarako masina fa hohamasinina eo amin’ny Zanak’Israely Aho. Izaho TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: izay nitondra anareo nivoaka avy tany amin’ny tany Ejipta mba ho Andriamanitrareo, no manamasina anareo. Izaho no TOMPO.
