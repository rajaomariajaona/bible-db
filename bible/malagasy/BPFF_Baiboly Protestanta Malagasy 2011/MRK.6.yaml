document_id: MRK.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tsy finoan’ny olona tao Nazareta
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 13.53-58; Lio 4.16-30
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niala teo Izy ka tonga tany amin’ny tanànany ary niaraka Taminy koa ny mpianany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa Izy taminy: Izay trano idiranareo dia mitoera ao mandra-pialanareo any. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izay tanàna tsy mampandroso anareo na tsy mihaino anareo, rehefa miala tao ianareo, dia ahintsano ny vovoka ao am-paladianareo ho vavolombelona aminy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa nandeha izy ireo ka nitory fa tokony hibebaka ny olona. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' maro no noroahiny; ary nohosorany diloilo ny marary maro ka nositraniny.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Jaona Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 14.1-2; Lio 9.7-9
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahare izany i Heroda mpanjaka, satria efa nalaza ny anaran’i Jesosy, dia hoy izy hoe: I Jaona Mpanao batisa efa nitsangana tamin’ny maty izany, koa izay no ananany hery hanao izao asa lehibe izao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny sasany: I Elia izany; ary hoy ny sasany: Mpaminany sahala amin’ny mpaminany hafa rehetra izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nahare i Heroda dia hoy izy: I Jaona izay, ilay notapahiko loha iny; efa nitsangana tamin’ny maty izy.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 14.3-12; Lio 3.19-20
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Heroda tenany no nandefa iraka hisambotra an’i Jaona ka namatotra azy tao an-tranomaizina noho ny amin’i Herodiasy, vadin’i Filipo rahalahiny, satria nalainy ho vady izy io. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jaona dia efa nilaza tamin’i Heroda hoe: Tsy azonao atao ny maka ny vadin’ny rahalahinao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Herodiasy dia nanana fo lentika taminy ka naniry hahafaty azy, nefa tsy azony notanterahina izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga ny Sabata dia nampianatra tao amin’ny sinagoga Izy. Ary maro izay nihaino Azy no talanjona indrindra ka niteny hoe: Taiza no nahazoan’Ilehity izany zavatra izany, ary manao ahoana ny fahendrena nomena Azy sy izao asa lehibe ataon’ny tanany izao? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Heroda dia natahotra an’i Jaona satria fantany fa lehilahy marina sy masina izy ka narovany. Rehefa nihaino an’i Jaona izy dia very hevitra be ihany; kanefa nihaino azy tamin’ny hafaliana koa izy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga anefa ny andro izay nanaovan’i Heroda fanasana ho an’ny lehibe sy ny mpifehy arivo ary ny loholona tany Galilia noho ny fitsingerenan’ny taona nahaterahany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niditra tao ny zanakavavin’i Herodiasy dia nandihy ka nahafaly an’i Heroda mbamin’izay niara-nipetraka nisakafo taminy teo. Dia hoy ny mpanjaka tamin-dRazazavavy: Angataho amiko izay tianao na inona na inona fa homeko anao izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nianiana taminy izy ka niteny taminy hoe: Na inona na inona no hangatahinao amiko dia homeko anao na dia hatramin’ny antsasaky ny fanjakako aza. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa Razazavavy ka nilaza tamin’ny reniny hoe: Inona re no hangatahiko? Ary hoy ny reniny: Ny lohan’i Jaona Mpanao batisa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niditra haingana niaraka tamin’izay izy ho eo amin’ny mpanjaka ka nangataka hoe: Tiako raha omenao ahy haingana eo ambony lovia ny lohan’i Jaona Mpanao batisa. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalahelo indrindra ny mpanjaka, kanefa noho ny fianianany sy ny olona izay nanatrika nisakafo teo dia tsy sahy nandà azy izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niaraka tamin’izay ny mpanjaka dia naniraka mpiambina ka nasainy noentiny teo aminy ny lohan’i Jaona. Dia nandeha io ka notapahiny tao an-tranomaizina ny lohan’i Jaona. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noentiny teo ambony lovia ny lohan’i Jaona ka nomeny an-dRazazavavy; ary Razazavavy kosa dia nanome izany ny reniny. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa nandre izany ny mpianatr’i Jaona dia tonga ka naka ny fatiny ary nandevina azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampihinanan’i Jesosy ny dimy arivo lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 14.13-21; Lio 9.10-17; Jao 6.1-15; ampit. Mar 8.1-10
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy ilay mpandrafitra, zanak’i Maria, ary rahalahin’i Jakoba sy i Josesy ary i Jodasy sy i Simona va Izy io? Ary tsy etỳ amintsika va ireo anabaviny? Dia tafintohina Taminy izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary vory teo akaikin’i Jesosy ny Apostoly ka nilaza ny tatitry ny zavatra rehetra izay nataony sy nampianariny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy taminy: Avia ianareo hitokana any an-tany efitra ka mialà sasatra kely. Maro mantsy ny olona nifamezivezy ka tsy nisy hisakafoanany akory aza.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha an-tsambokely izy ireo mba hitokana any an-tany efitra. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony nahita azy ireo nandeha ny olona, ary betsaka no efa nahafantatra azy ireo, dia nihazakazaka nandeha an-tongotra avy tany amin’ny tanàna tsirairay ka tonga talohany tany.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony niala ny sambokely Jesosy dia nahita vahoaka betsaka ka onena azy ireo satria tahaka ny ondry tsy manana mpiandry ireo; ary nampianatra zavatra maro azy ireo Izy.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hariva ny andro dia nanatona Azy ny mpianany ka nilaza hoe: Atỳ an-tany efitra isika izao, ary hariva ity ny andro; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ampodio ny olona hankany amin’ny tanàna kely manodidina mba hividy hanina. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny navaliny azy: Omeo hanina ireo olona ireo. Hoy kosa izy ireo taminy: Handeha hividy mofo izay azon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: denaria
    - type: text
      text: ' roanjato va izahay hohaniny? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Izy tamin’izy ireo: Misy mofo firy any aminareo? Andeha hoe jereo. Ary rehefa fantatra ny isany dia hoy izy ireo: Dimy sy hazandrano roa. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasain’i Jesosy nampipetraka ny olona rehetra ny mpianatra ka natao mitsitokotoko teny ambonin’ny ahi-maitso ireo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jesosy taminy: Tsy misy mpaminany atao tsinontsinona raha tsy eo amin’ny taniny sy ny havany ary ny fianakaviany ihany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia nipetraka ho antokony zato sy dimampolo avy ny olona. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa voarain’i Jesosy ireo mofo dimy sy ireo hazandrano roa dia niandrandra ny lanitra Izy ka nisaotra, dia novakiny ireo mofo ka natolony ny mpianatra mba harosony amin’ny olona; ary ny hazandrano roa dia nozarainy tamin’ny olona rehetra. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy nihinana avokoa ny olona rehetra ka voky. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nangonina izay sombintsombin’ny mofo sy ny hazandrano ka nahafeno harona roa amby folo. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ireo izay nisakafo dia nisy dimy arivo lahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nitsangantsangana teny ambonin’ny ranomasina Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 14.22-33; Jao 6.16-21
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo no eo ihany Jesosy dia nanery ny mpianany hiondrana an-tsambokely mba hita hialoha Azy ho any Betsaida mandra-pandravany ny vahoaka. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa nanao veloma ny olona Izy dia lasa nankany an-tendrombohitra hivavaka.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hariva ny andro dia efa teo ampovoan’ny ranomasina ny sambokely, ary Izy irery ihany no teny an-tanety. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahita azy ireo sahirana nivoy fatratra Izy, satria nanohitra azy ireo ny rivotra; ary tokony ho tamin’ny fotoam-piambenana fahefatra amin’ny alina dia nankeny aminy, nitsangantsangana teny ambonin’ny ranomasina Jesosy ka nikasa handalo azy. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hitany nitsangantsangana teo ambonin’ny ranomasina Izy dia noheveriny ho matoatoa ka niantsoantso mafy izy ireo, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy afaka nanao fahagagana akory Izy teo, afa-tsy ny nametraka ny tanany tamin’ny olona marary vitsy foana sy nahasitrana azy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria izy rehetra dia samy nahita Azy avokoa ka raiki-tahotra. Ary niteny tamin’izy ireo niaraka amin’izay Izy hoe: Matokia! Izaho ihany ity, aza matahotra! '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra nankeo aminy tao an-tsambokely Izy dia nitsahatra ny rivotra. Talanjona izy ireo, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria tsy takatry ny sainy ny fahagagana ny amin’ny mofo fa mbola mafy ny fony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanasitranana tany Genesareta
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 14.34-36; ampit. Jao 6.22-25
    marker-yv: yv-h
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tafita izy ireo dia tonga tao amin’ny faritanin’i Genesareta ka niantsona teo. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha niala teo an-tsambokely izy ireo dia nahafantatra an’i Jesosy avy hatrany ny olona teo; '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nihazakazaka namakivaky ny faritany manontolo ny olona ary nitondra ny marary tamin’ny fandrianany ho any amin’izay reny fa nitoerany. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na taiza na taiza no nidiran’i Jesosy, na tao amin’ny vohitra, na tao an-tanàna, na tany an-tsaha, dia napetraky ny olona teo an-kianja ny marary, ary ny olona dia nangataka hikasika na dia ny morontongotr’akanjony ihany aza. Ary sitrana izay rehetra nikasika Azy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary gaga Izy noho ny tsy finoan’izy ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanirahan’i Jesosy ny roa amby folo lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 9.35; 10.1, 5-14; Lio 9.1-6
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitety ireo tanàna kely manodidina Izy ka nampianatra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niantso ny roa amby folo lahy hankeo Aminy Izy ka naniraka azy tsiroaroa sy nanome azy fahefana amin’ny fanahy maloto. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandrara azy Izy mba tsy hitondra zavatra ho any amin’ny halehany, na mofo, na kitapo, na vola ao anatin’ny fehikibony, afa-tsy tehina ihany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa asio kapa ny tongotrareo ary aza mitondra akanjo roa, hoy Izy. '
