document_id: EPH.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ray aman-dreny sy ny zanaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Anaka, ankatoavy ao amin’ny Tompo ny ray aman-dreninareo fa rariny izany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Manajà ny ray sy ny reninao» fa izany no didy voalohany misy teny fikasana, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: «mba hahita soa ianao sady ho maro andro ambonin’ny tany» (Deo 5.16).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ianareo ray, aza mampahatezitra ny zanakareo, fa tezao amin’ny fanabeazana sy ny fananaran’ny Tompo izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpanompo sy ny tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ianareo mpanompo, ankatoavy amin’ny fahatahorana sy ny fangovitana, amin’ny fahatsoran’ny fonareo, ny tomponareo araka ny nofo, tahaka ny fanekena an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ihany, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'tsy amin’ny fanompoana eo imaso, tahaka ny mpila sitraka amin’olona, fa tahaka ny mpanompon’i Kristy manao izay sitrapon’Andriamanitra amin’ny fo, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'manompo an-tsitrapo toy ny amin’ny Tompo, fa tsy amin’olona, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: satria fantatrareo fa izay soa ataon’ny olona tsirairay no horaisiny amin’ny Tompo, na andevo izy na olona afaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ianareo tompo, manaova toy izany koa amin’ny mpanomponareo. Atsaharo ny fandrahonana, satria fantatrareo fa any an-danitra ny Tompony sady Tomponareo koa; ary tsy mizaha tavan’olona Izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiadian’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Farany, mahereza ao amin’ny Tompo sy amin’ny tanjaky ny heriny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tafio avokoa ny fiadian’Andriamanitra mba hahazoanareo hifahatra amin’ny fanangolen’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa tsy mitolona amin’ny nofo aman-dra isika fa amin’ny fanapahana sy amin’ny fahefana ary amin’ny mpanjakan’izao fahamaizinana izao, dia amin’ny fanahy ratsy eny amin’ny rivotra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Noho izany, raiso avokoa ny fiadian’Andriamanitra mba hahazoanareo hanohitra amin’ny andro mahory; ary rehefa vitanareo avokoa izany dia hahafahatra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mifahara ary ka misikìna fahamarinana. Mitafia ny rariny ho fiarovan-tratra, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'kiraroy ny fahavononam-panahy avy amin’ny Filazantsaran’ny fihavanana ny tongotrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Amin’ny toe-javatra rehetra dia tano ny finoana ho ampinga fa izany no hahazoanareo mamono ny zana-tsipìka mirehitra rehetra alefan’ilay ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Raiso ny famonjena ho fiarovan-doha ary ny tenin’Andriamanitra ho sabatry ny Fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mivavaha mandrakariva ao amin’ny Fanahy amin’ny fivavahana rehetra sy ny fangatahana, koa miambena amin’izany amin’ny faharetana sy ny fangatahana ho an’ny olona masina rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary ho ahy koa, mba homena ahy ny hiloa-bava ka hiteny amin’ny fahasahiana, hampahafantatra ny zavamiafina momba ny Filazantsara. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Iraka migadra noho izany aho, mba hiteny izany amin’ny fahasahiana, araka izay tokony hoteneniko.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanaovam-beloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mba hahafantaranareo izay momba ahy sy izay ataoko, dia i Tikiko, rahalahy malala sady mpanompo mahatoky ao amin’ny Tompo, no hampahalala anareo ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izy mihitsy no nirahiko hilaza izany zavatra izany aminareo mba ho fantatrareo ny momba anay, ary mba hampahereziny ny fonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fiadanana anie ho an’ny rahalahy ary fitiavana mbamin’ny finoana avy amin’Andriamanitra Ray sy Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny fahasoavana anie ho amin’izay rehetra tia an’i Jesosy Kristy Tompontsika amin’ny fitiavana tsy mety levona. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: .
