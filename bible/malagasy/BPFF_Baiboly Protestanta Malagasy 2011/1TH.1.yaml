verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Paoly sy i Silasy ary i Timoty no mamangy ny fiangonan’ny Tesaloniana, izay ao amin’Andriamanitra Ray sy Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompo: Ho aminareo anie ny fahasoavana sy ny fiadanana!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiainana sy ny finoan’ny Tesaloniana
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary mba hiandry ny Zanany avy any an-danitra, izay natsangany tamin’ny maty, dia Jesosy izay mpanafaka antsika amin’ny fahatezerana ho avy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misaotra an’Andriamanitra mandrakariva izahay ny aminareo rehetra ka manonona anareo amin’ny fivavahanay '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady tsy mitsahatra mahatsiaro ny asanareo amin’ny finoana sy ny fikelezanareo aina amin’ny fitiavana ary ny faharetanareo amin’ny fanantenana an’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika eo imason’Andriamanitra Raintsika. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatray, ry rahalahy malalan’Andriamanitra, ny fifidianana anareo, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa tsy tonga teo aminareo tamin’ny teny ihany ny Filazantsara torinay fa tamin’ny hery koa sy ny Fanahy Masina ary ny fahatokiana be. Efa fantatrareo rahateo ny fitondrantenanay teo aminareo mikasika anareo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nanahaka anay sy ny Tompo ianareo satria nandray ny teny tamin’ny fahoriana be mbamin’ny hafaliana avy amin’ny Fanahy Masina '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka tonga fianarana ho an’ny mino rehetra any Makedonia sy Akaia ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa avy tao aminareo no nanakoako ny tenin’ny Tompo, tsy tany Makedonia sy Akaia ihany fa teny tontolo eny no nielezan’ny lazan’ny finoanareo an’Andriamanitra ka tsy misy holazainay intsony. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ireny ihany no milaza ny aminay, dia izay nahazoanay miditra ho atỳ aminareo sy ny nialanareo tamin’ny sampy ka niverenanareo tamin’Andriamanitra mba hanompo an’Andriamanitra velona sy marina, '
