document_id: 1TH.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Paoly sy i Silasy ary i Timoty no mamangy ny fiangonan’ny Tesaloniana, izay ao amin’Andriamanitra Ray sy Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo: Ho aminareo anie ny fahasoavana sy ny fiadanana!'
  - type: heading
    content: Ny fiainana sy ny finoan’ny Tesaloniana
  '10':
  - type: text
    content: ary mba hiandry ny Zanany avy any an-danitra, izay natsangany tamin’ny maty, dia Jesosy izay mpanafaka antsika amin’ny fahatezerana ho avy.
  '2':
  - type: text
    content: 'Misaotra an’Andriamanitra mandrakariva izahay ny aminareo rehetra ka manonona anareo amin’ny fivavahanay '
  '3':
  - type: text
    content: 'sady tsy mitsahatra mahatsiaro ny asanareo amin’ny finoana sy ny fikelezanareo aina amin’ny fitiavana ary ny faharetanareo amin’ny fanantenana an’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika eo imason’Andriamanitra Raintsika. '
  '4':
  - type: text
    content: 'Fantatray, ry rahalahy malalan’Andriamanitra, ny fifidianana anareo, '
  '5':
  - type: text
    content: fa tsy tonga teo aminareo tamin’ny teny ihany ny Filazantsara torinay fa tamin’ny hery koa sy ny Fanahy Masina ary ny fahatokiana be. Efa fantatrareo rahateo ny fitondrantenanay teo aminareo mikasika anareo.
  '6':
  - type: text
    content: 'Efa nanahaka anay sy ny Tompo ianareo satria nandray ny teny tamin’ny fahoriana be mbamin’ny hafaliana avy amin’ny Fanahy Masina '
  '7':
  - type: text
    content: 'ka tonga fianarana ho an’ny mino rehetra any Makedonia sy Akaia ianareo. '
  '8':
  - type: text
    content: 'Fa avy tao aminareo no nanakoako ny tenin’ny Tompo, tsy tany Makedonia sy Akaia ihany fa teny tontolo eny no nielezan’ny lazan’ny finoanareo an’Andriamanitra ka tsy misy holazainay intsony. '
  '9':
  - type: text
    content: 'Fa ireny ihany no milaza ny aminay, dia izay nahazoanay miditra ho atỳ aminareo sy ny nialanareo tamin’ny sampy ka niverenanareo tamin’Andriamanitra mba hanompo an’Andriamanitra velona sy marina, '
