document_id: NAM.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aripaky ny mpandatsa-dra ilay tanàna lian-dra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan’ny tanàna mpandatsa-dra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feno lainga sy loza amin’atambo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ialan-dremby ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Injany ny fifiopioky ny karavasy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fikorodondrodon’ny kodiarana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fikatrokatroky ny soavaly!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fitraitraiky ny kalesy fitondra miady!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: E! Ny firiotry ny mpitaingin-tsoavaly!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Akory ny fitselatry ny sabatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny famirapiratry ny lefona!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy ny habetsahan’ny voatrabaka sy ny hamaroan’ny voavono!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hita isa ny faty!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, voafingampingan’ny faty ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voasaron-kenatra i Ninive
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izany dia noho ny habetsahan’ny fijangajangan’Ikala janga tsara tarehy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mpilalao sikidy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mivarotra firenena amin’ny fijangajangany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fokom-pirenena amin’ny ody ratsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, hamely anao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary haingaiko ho amin’ny tavanao ny morontongotr’akanjonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hasehoko amin’ny firenena ny fitanjahanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny fanjakana ny fahamenaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia hotsipazako loto ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hataoko tsinontsinona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hataoko fitalanjonana ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary izay rehetra mijery anao dia handositra anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hiteny hoe: Rava i Ninive!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hitomany azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza no hitadiavako izay hampionona anao?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hihatra amin’i Ninive izay nanjo an’i Teba
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ianao va tsara noho i No-Amona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay nitoetra teo anelanelan’ny ony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nohodidinin’ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny ranomasina ny manda manodidina azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny Kosita no heriny tsy hita lany
- type: usfm
  marker: q1
  children:
  - type: text
    text: torak’izany koa ny Ejiptiana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Lidiana sy ny Libiana no mpanampy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nefa na izy aza dia lasa, eny, lasan-ko babo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zanany madinika dia notorotoroina
- type: usfm
  marker: q1
  children:
  - type: text
    text: teny an-joron-dalambe rehetra teny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanaovany antsapaka ny olo-malazany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nogadraina ny lehibeny rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ho mamo koa ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiafina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitady fiarovana mafy koa ianao hierenao ny fahavalonao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy afaka manohitra i Ninive
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ho tahaka ny aviavy misy voa mialin-taona
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny manda mafinao rehetra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha hohozongozonina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihintsana ao am-bavan’izay hihinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro, vehivavy sisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no olonao ao aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: midanadana hidiran’ny fahavalonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vavahadin’ny taninao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: levon’ny afo ny hidinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Manangòna rano ho anao ho amin’ny fahirano!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamafiso ny mandanao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mirotsaha ao amin’ny fotaka ka hosihoseo ho feta izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raiso ny lasitra fanaovam-biriky!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Any no handevonan’ny afo anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handripahan’ny sabatra anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hohaniny toy ny fihinan’ny valalavao ianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Firenena iray manontolo no levona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihamaroa toy ny valalavao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihabetsaha toy ny valala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nataonao betsaka noho ny kintana eny amin’ny lanitra ny mpivaro-mandehanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mipariaka ny valalavao ka lasa manidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny andriananao dia toy ny valala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpifehinao dia toy ny valalavao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitoby eny amin’ny fefy raha mangatsiaka ny andro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha miposaka ny masoandro dia lasa manidina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy fantatra izay alehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Rendremana ny mpiandry ondrinao, ry mpanjakan’i Asiria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miampatrampatra ny lehilahy maherinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aely eny an-tendrombohitra ny olonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy mamory azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy misy fanafana ny manjo anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy azo sitranina ny ferinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra ilazana ny nanjo anao dia hitehaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza no tsy efa tratry ny zava-doza nataonao miverimberina?
