document_id: NAM.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Aripaky ny mpandatsa-dra ilay tanàna lian-dra
  - type: text
    content: Lozan’ny tanàna mpandatsa-dra!
  - type: text
    content: Feno lainga sy loza amin’atambo;
  - type: text
    content: tsy ialan-dremby ao aminy.
  '10':
  - type: text
    content: Nefa na izy aza dia lasa, eny, lasan-ko babo;
  - type: text
    content: ny zanany madinika dia notorotoroina
  - type: text
    content: teny an-joron-dalambe rehetra teny;
  - type: text
    content: nanaovany antsapaka ny olo-malazany,
  - type: text
    content: ary nogadraina ny lehibeny rehetra.
  '11':
  - type: text
    content: Ho mamo koa ianao
  - type: text
    content: ka hiafina;
  - type: text
    content: hitady fiarovana mafy koa ianao hierenao ny fahavalonao.
  - type: heading
    content: Tsy afaka manohitra i Ninive
  '12':
  - type: text
    content: Ho tahaka ny aviavy misy voa mialin-taona
  - type: text
    content: 'ny manda mafinao rehetra:'
  - type: text
    content: Raha hohozongozonina izy
  - type: text
    content: dia hihintsana ao am-bavan’izay hihinana.
  '13':
  - type: text
    content: Indro, vehivavy sisa
  - type: text
    content: no olonao ao aminao;
  - type: text
    content: midanadana hidiran’ny fahavalonao
  - type: text
    content: ny vavahadin’ny taninao;
  - type: text
    content: levon’ny afo ny hidinao.
  '14':
  - type: text
    content: Manangòna rano ho anao ho amin’ny fahirano!
  - type: text
    content: Hamafiso ny mandanao!
  - type: text
    content: Mirotsaha ao amin’ny fotaka ka hosihoseo ho feta izany!
  - type: text
    content: Raiso ny lasitra fanaovam-biriky!
  '15':
  - type: text
    content: Any no handevonan’ny afo anao
  - type: text
    content: sy handripahan’ny sabatra anao;
  - type: text
    content: hohaniny toy ny fihinan’ny valalavao ianao.
  - type: heading
    content: Firenena iray manontolo no levona
  - type: text
    content: Mihamaroa toy ny valalavao,
  - type: text
    content: mihabetsaha toy ny valala.
  '16':
  - type: text
    content: Nataonao betsaka noho ny kintana eny amin’ny lanitra ny mpivaro-mandehanao;
  - type: text
    content: mipariaka ny valalavao ka lasa manidina.
  '17':
  - type: text
    content: Ny andriananao dia toy ny valala,
  - type: text
    content: ary ny mpifehinao dia toy ny valalavao
  - type: text
    content: izay mitoby eny amin’ny fefy raha mangatsiaka ny andro;
  - type: text
    content: fa raha miposaka ny masoandro dia lasa manidina izy
  - type: text
    content: ka tsy fantatra izay alehany.
  '18':
  - type: text
    content: Rendremana ny mpiandry ondrinao, ry mpanjakan’i Asiria;
  - type: text
    content: miampatrampatra ny lehilahy maherinao;
  - type: text
    content: aely eny an-tendrombohitra ny olonao
  - type: text
    content: ka tsy misy mamory azy.
  '19':
  - type: text
    content: Tsy misy fanafana ny manjo anao,
  - type: text
    content: tsy azo sitranina ny ferinao;
  - type: text
    content: izay rehetra ilazana ny nanjo anao dia hitehaka;
  - type: text
    content: fa iza no tsy efa tratry ny zava-doza nataonao miverimberina?
  '2':
  - type: text
    content: Injany ny fifiopioky ny karavasy!
  - type: text
    content: Ny fikorodondrodon’ny kodiarana!
  - type: text
    content: Ny fikatrokatroky ny soavaly!
  - type: text
    content: Ary ny fitraitraiky ny kalesy fitondra miady!
  '3':
  - type: text
    content: E! Ny firiotry ny mpitaingin-tsoavaly!
  - type: text
    content: Akory ny fitselatry ny sabatra
  - type: text
    content: sy ny famirapiratry ny lefona!
  - type: text
    content: Indrisy ny habetsahan’ny voatrabaka sy ny hamaroan’ny voavono!
  - type: text
    content: Tsy hita isa ny faty!
  - type: text
    content: Eny, voafingampingan’ny faty ny olona.
  - type: heading
    content: Voasaron-kenatra i Ninive
  '4':
  - type: text
    content: Izany dia noho ny habetsahan’ny fijangajangan’Ikala janga tsara tarehy,
  - type: text
    content: sady mpilalao sikidy,
  - type: text
    content: izay mivarotra firenena amin’ny fijangajangany
  - type: text
    content: sy fokom-pirenena amin’ny ody ratsiny.
  '5':
  - type: text
    content: Indro, hamely anao Aho,
  - type: text
    content: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao;
  - type: text
    content: ary haingaiko ho amin’ny tavanao ny morontongotr’akanjonao
  - type: text
    content: ka hasehoko amin’ny firenena ny fitanjahanao
  - type: text
    content: ary amin’ny fanjakana ny fahamenaranao.
  '6':
  - type: text
    content: Dia hotsipazako loto ianao
  - type: text
    content: ka hataoko tsinontsinona,
  - type: text
    content: eny, hataoko fitalanjonana ianao.
  '7':
  - type: text
    content: Ary izay rehetra mijery anao dia handositra anao
  - type: text
    content: 'ka hiteny hoe: Rava i Ninive!'
  - type: text
    content: Iza no hitomany azy?
  - type: text
    content: Aiza no hitadiavako izay hampionona anao?
  - type: heading
    content: Hihatra amin’i Ninive izay nanjo an’i Teba
  '8':
  - type: text
    content: Ianao va tsara noho i No-Amona,
  - type: text
    content: ilay nitoetra teo anelanelan’ny ony
  - type: text
    content: ka nohodidinin’ny rano,
  - type: text
    content: toy ny ranomasina ny manda manodidina azy?
  '9':
  - type: text
    content: Ny Kosita no heriny tsy hita lany
  - type: text
    content: torak’izany koa ny Ejiptiana;
  - type: text
    content: ny Lidiana sy ny Libiana no mpanampy azy.
