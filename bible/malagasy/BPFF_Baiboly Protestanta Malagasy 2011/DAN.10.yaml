document_id: DAN.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahitan’i Daniela ny amin’ny zavatra hitranga any am-parany
  - type: text
    content: Tamin’ny taona fahatelo nanjakan’i Kirosy, mpanjakan’i Persia, dia nisy teny nambara tamin’i Daniela, izay antsoina hoe Beltesazara. Marina ny teny, ady mafy no nolazainy. Ary nahazo ny teny izy sady nahafantatra ny hevitry ny fahitana.
  '10':
  - type: text
    content: 'Ary indro, nisy tanana nanohina sy nampiarina ahy handohalika sy hitehin-tanana, nefa mbola nangozohozo ihany aho. '
  '11':
  - type: text
    content: 'Ary hoy izy tamiko: Ry Daniela malala ô! Fantaro ny teny izay lazaiko aminao ka mijoroa eo amin’ny toerana izay misy anao; fa nirahina ho atỳ aminao aho ankehitriny. Nony nilaza izany teny izany tamiko izy dia nitsangana tamim-pangovitana teo aho.'
  '12':
  - type: text
    content: 'Dia hoy izy tamiko: Aza matahotra, ry Daniela; fa hatramin’ilay andro voalohany nampiasanao ny fonao hahalala sy hanetry tena teo anatrehan’Andriamanitrao dia efa re ny teninao, ary noho ny teninao no nahatongavako. '
  '13':
  - type: text
    content: 'Ilay andrianan’ny fanjakan’i Persia anefa dia nanohitra ahy nandritra ny iraika amby roapolo andro; fa indro kosa i Mikaela, iray amin’ireo andriana lehibe, no tonga hanampy ahy; koa izaho ihany no sisa nijanona teo amin’ny mpanjakan’i Persia. '
  '14':
  - type: text
    content: Avy hampahafantatra anao izay hanjo ny firenenao any am-parany aho, satria mbola hihatra ny fahitana amin’izany andro izany.
  '15':
  - type: text
    content: 'Nony nilaza izany teny izany tamiko izy dia niankohoka tamin’ny tany aho sady tsy nahateny. '
  '16':
  - type: text
    content: 'Ary indro, nisy iray miendri-janak’olombelona nanendry ny molotro, dia niloa-bava aho ka niteny tamin’ilay nitsangana teo anatrehako hoe: Tompoko, azon’ny fanaintainana aho noho ny fahitana ka tsy manan-kery intsony. '
  '17':
  - type: text
    content: 'Fa ahoana no ahazoan’ity izaho mpanomponao ity hiteny aminao tompoko? Ary tamin’izay dia tsy nisy hery nitoetra tato amiko intsony, ary tsy nisy aina tavela tato amiko. '
  '18':
  - type: text
    content: 'Ary ilay nanana endrika olona dia mbola nanendry ahy indray sady nampahery ahy '
  '19':
  - type: text
    content: 'ka niteny hoe: Aza matahotra, ry ilay malala indrindra; fiadanana anie ho anao. Mahereza; eny, mahereza. Ary rehefa niteny tamiko izy dia nihanahery aho ka niteny hoe: Aoka hiteny ianao tompoko, satria efa nampahery ahy.'
  '2':
  - type: text
    content: 'Tamin’izany andro izany izaho, Daniela, dia nisaona roatokom-bolana mipaka. '
  '20':
  - type: text
    content: 'Dia hoy izy: Moa fantatrao va ny niaviako atỳ aminao? Ankehitriny dia hiverina hiady amin’ny andrianan’i Persia aho, ary rehefa miainga aho dia indro ho avy ny andrianan’i Gresy. '
  '21':
  - type: text
    content: Fa hambarako aminao izay voasoratra ao amin’ny soratra marina. Tsy misy miara-misikina amiko hanohitra ireo afa-tsy i Mikaela andriananareo.
  '3':
  - type: text
    content: Tsy nihinana hanim-py aho sady tsy nanendry hena na divay ny vavako, ary tsy nihosotra zavatra manitra akory aho ambara-pahatapitry ny roatokom-bolana.
  '4':
  - type: text
    content: 'Ary tamin’ny andro fahefatra amby roapolo tamin’ny volana voalohany, raha teo amoron’ny ony lehibe aho, dia ny ony Hidekela, '
  '5':
  - type: text
    content: 'dia nanopy ny masoko aho ka nijery ary indro, nisy lehilahy iray niakanjo vita tamin’ny lamba rongony ka tena volamena avy any Ofaza ny fehikibony. '
  '6':
  - type: text
    content: 'Tahaka ny krizolita ny tenany, tahaka ny tselatra ny tarehiny, tahaka ny fanilo mirehitra ny masony, mivolom-barahina manganohano ny sandriny sy ny tongony, ary ny feony dia toy ny feon’olona marobe. '
  '7':
  - type: text
    content: 'Izaho Daniela ihany no nahita ny fahitana fa ireo olona izay teo amiko kosa dia tsy mba nahita izany, nefa toran-kovitra indrindra izy ka nandositra niery. '
  '8':
  - type: text
    content: 'Ary tavela ho irery teo aho dia nahita izany fahitana lehibe izany ka tsy nisy hery tafajanona tato amiko sady niova sy nihahatsatra ny tarehiko, ary tsy nisy hery intsony tamiko. '
  '9':
  - type: text
    content: 'Nandre ny teniny ihany anefa aho; ary nony nandre izany aho dia renoky ny torimaso niankohoka tamin’ny tany. '
