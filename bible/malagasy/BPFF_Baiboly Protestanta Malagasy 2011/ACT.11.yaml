document_id: ACT.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manamarina ny tenany any Jerosalema i Petera
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary ny Apostoly sy ny rahalahy izay tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' dia nahare fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' koa dia efa nandray ny tenin’Andriamanitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Intelo no nisehoan’izany, dia nosarihana niakatra tany an-danitra indray ireo rehetra ireo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tamin’izay dia indreo, nisy telo lahy nijanona teo anoloan’ny trano nipetrahanay, iraka avy tany Kaisaria hankeo amiko. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nasain’ny Fanahy hiaraka tamin’ireo aho ka tsy hizaha tavan’olona na dia kely akory aza. Niaraka tamiko koa ireto rahalahy enina ireto ka niditra tao an-tranon-dRalehilahy izahay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nambarany taminay ny nahitany ny anjely nitsangana tao an-tranony ka niteny hoe: Maniraha ho any Jopa ka ampanalao i Simona izay antsoina koa hoe Petera; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'izy no hilaza teny aminao, izay hamonjena anao sy ny ankohonanao rehetra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Raha vao niteny aho dia nilatsaka taminy ny Fanahy Masina tahaka ny tamintsika fahiny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nahatsiaro ny tenin’ny Tompo izay nolazainy aho hoe: I Jaona dia nanao batisa tamin’ny rano, fa ianareo kosa dia hatao batisa amin’ny Fanahy Masina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Koa raha mba nomen’Andriamanitra azy ny fanomezana, tahaka antsika fony isika vao nino an’i Jesosy Kristy Tompo, dia iza moa aho no hahasakana an’Andriamanitra?
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Rehefa nandre izany ireo dia nitony sady nankalaza an’Andriamanitra hoe: Efa nomen’Andriamanitra ny Jentilisa koa ny fibebahana hahazoany fiainana.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Fiangonana tany Antiokia
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary izay niely noho ny fanenjehana an’i Stefana dia nandeha hatrany Foinika sy Sipra ary Antiokia, nefa tsy nitoriteny tamin’olona izy, afa-tsy tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' ihany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Koa nony tafakatra tany Jerosalema i Petera dia nila ady taminy ny mino izay isan’ny voafora ka '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny sasany tamin’ireny dia lehilahy avy any Sipra sy Kirena izay tonga tany Antiokia, niresaka tamin’ny Grika koa ary nitory an’i Jesosy Tompo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary ny tanan’ny Tompo nomba azy ireo ka maro no isan’izay nino sy niverina ho amin’ny Tompo.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Rehefa tonga tany an-tsofin’ny fiangonana tany Jerosalema ny amin’ireo dia naniraka an’i Barnabasy izy handeha hatrany Antiokia. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nony tonga tany izy dia nahita ny fahasoavan’Andriamanitra ka faly ary nananatra azy rehetra haharitra ao amin’ny Tompo amin’ny fo minia fatratra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Lehilahy tsara fanahy sady feno ny Fanahy Masina sy finoana mantsy izy; ary marobe ny olona nanampy ho an’ny Tompo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia lasa nankany Tarsosy i Barnabasy mba hitady an’i Saoly. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Rehefa nahita azy izy dia nitondra azy hankany Antiokia. Ary niara-niasa tao amin’ny fiangonana nandritra ny herintaona ngarangidina izy roa lahy ka nampianatra olona maro; ary tany Antiokia no voalohany niantsoana ny anaran’ny mpianatra hoe Kristiana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hetsika fifanampiana
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tamin’izany andro izany dia nisy mpaminany sasany avy tany Jerosalema nankany Antiokia. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nitsangana ny iray tamin’ireny, izay antsoina hoe Agabo; voatsindrin’ny Fanahy izy ka nilaza fa hisy mosary be manerana ny tany rehetra. Tonga tokoa io tamin’ny andron’i Klaodio. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary ny mpianatra dia nanapa-kevitra hampitondra zavatra araka ny ananany avy hamonjena ny rahalahy izay nonina tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'nilaza hoe: Efa niantrano tany amin’ny olona tsy voafora ianao sady niara-nisakafo taminy.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nataony izany, ary ny tanan’i Barnabasy sy i Saoly no nampitondrainy izany ho any amin’ny loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nanomboka nitantara tamin’izy ireo hatramin’ny fiandohany i Petera hoe:'
  - type: usfm
    marker: r
    children:
    - type: text
      text: Asa 10.9-48
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nivavaka tany an-tanànan’i Jopa aho, ary azon-tsindrimandry, dia nahita fahitana, koa indro, nisy zavatra nidina avy tany an-danitra, toa lamba lehibe nampidinina tamin’ny zorony efatra nankeo amiko; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary raha nijery sy nandinika izany aho dia hitako ny biby etỳ an-tany izay manan-tongotra efatra sy ny bibidia sy ny zava-mandady sy mikisaka ary ny voromanidina koa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nandre feo koa aho niteny tamiko hoe: Mitsangàna, ry Petera, vonoy ireo ka hano. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa hoy aho: Sanatria, Tompoko! Tsy mbola niditra tamin’ny vavako izay zavatra fady na tsy madio. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nisy feo indray avy tany an-danitra nanao hoe: Izay efa nodiovin’Andriamanitra dia aza ataonao ho fady.'
