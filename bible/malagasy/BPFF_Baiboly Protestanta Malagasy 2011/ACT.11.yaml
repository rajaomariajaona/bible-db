document_id: ACT.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manamarina ny tenany any Jerosalema i Petera
  - type: text
    content: 'Ary ny Apostoly sy ny rahalahy izay tany '
  - type: text
    content: Jodia
  - type: text
    content: ' dia nahare fa ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' koa dia efa nandray ny tenin’Andriamanitra. '
  '10':
  - type: text
    content: 'Intelo no nisehoan’izany, dia nosarihana niakatra tany an-danitra indray ireo rehetra ireo. '
  '11':
  - type: text
    content: 'Tamin’izay dia indreo, nisy telo lahy nijanona teo anoloan’ny trano nipetrahanay, iraka avy tany Kaisaria hankeo amiko. '
  '12':
  - type: text
    content: 'Nasain’ny Fanahy hiaraka tamin’ireo aho ka tsy hizaha tavan’olona na dia kely akory aza. Niaraka tamiko koa ireto rahalahy enina ireto ka niditra tao an-tranon-dRalehilahy izahay. '
  '13':
  - type: text
    content: 'Ary nambarany taminay ny nahitany ny anjely nitsangana tao an-tranony ka niteny hoe: Maniraha ho any Jopa ka ampanalao i Simona izay antsoina koa hoe Petera; '
  '14':
  - type: text
    content: 'izy no hilaza teny aminao, izay hamonjena anao sy ny ankohonanao rehetra. '
  '15':
  - type: text
    content: 'Raha vao niteny aho dia nilatsaka taminy ny Fanahy Masina tahaka ny tamintsika fahiny. '
  '16':
  - type: text
    content: 'Dia nahatsiaro ny tenin’ny Tompo izay nolazainy aho hoe: I Jaona dia nanao batisa tamin’ny rano, fa ianareo kosa dia hatao batisa amin’ny Fanahy Masina. '
  '17':
  - type: text
    content: Koa raha mba nomen’Andriamanitra azy ny fanomezana, tahaka antsika fony isika vao nino an’i Jesosy Kristy Tompo, dia iza moa aho no hahasakana an’Andriamanitra?
  '18':
  - type: text
    content: 'Rehefa nandre izany ireo dia nitony sady nankalaza an’Andriamanitra hoe: Efa nomen’Andriamanitra ny Jentilisa koa ny fibebahana hahazoany fiainana.'
  - type: heading
    content: Ny Fiangonana tany Antiokia
  '19':
  - type: text
    content: 'Ary izay niely noho ny fanenjehana an’i Stefana dia nandeha hatrany Foinika sy Sipra ary Antiokia, nefa tsy nitoriteny tamin’olona izy, afa-tsy tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' ihany. '
  '2':
  - type: text
    content: 'Koa nony tafakatra tany Jerosalema i Petera dia nila ady taminy ny mino izay isan’ny voafora ka '
  '20':
  - type: text
    content: 'Ny sasany tamin’ireny dia lehilahy avy any Sipra sy Kirena izay tonga tany Antiokia, niresaka tamin’ny Grika koa ary nitory an’i Jesosy Tompo. '
  '21':
  - type: text
    content: Ary ny tanan’ny Tompo nomba azy ireo ka maro no isan’izay nino sy niverina ho amin’ny Tompo.
  '22':
  - type: text
    content: 'Rehefa tonga tany an-tsofin’ny fiangonana tany Jerosalema ny amin’ireo dia naniraka an’i Barnabasy izy handeha hatrany Antiokia. '
  '23':
  - type: text
    content: 'Nony tonga tany izy dia nahita ny fahasoavan’Andriamanitra ka faly ary nananatra azy rehetra haharitra ao amin’ny Tompo amin’ny fo minia fatratra. '
  '24':
  - type: text
    content: Lehilahy tsara fanahy sady feno ny Fanahy Masina sy finoana mantsy izy; ary marobe ny olona nanampy ho an’ny Tompo.
  '25':
  - type: text
    content: 'Dia lasa nankany Tarsosy i Barnabasy mba hitady an’i Saoly. '
  '26':
  - type: text
    content: Rehefa nahita azy izy dia nitondra azy hankany Antiokia. Ary niara-niasa tao amin’ny fiangonana nandritra ny herintaona ngarangidina izy roa lahy ka nampianatra olona maro; ary tany Antiokia no voalohany niantsoana ny anaran’ny mpianatra hoe Kristiana.
  - type: heading
    content: Hetsika fifanampiana
  '27':
  - type: text
    content: 'Tamin’izany andro izany dia nisy mpaminany sasany avy tany Jerosalema nankany Antiokia. '
  '28':
  - type: text
    content: 'Nitsangana ny iray tamin’ireny, izay antsoina hoe Agabo; voatsindrin’ny Fanahy izy ka nilaza fa hisy mosary be manerana ny tany rehetra. Tonga tokoa io tamin’ny andron’i Klaodio. '
  '29':
  - type: text
    content: 'Ary ny mpianatra dia nanapa-kevitra hampitondra zavatra araka ny ananany avy hamonjena ny rahalahy izay nonina tany '
  - type: text
    content: Jodia
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'nilaza hoe: Efa niantrano tany amin’ny olona tsy voafora ianao sady niara-nisakafo taminy.'
  '30':
  - type: text
    content: Dia nataony izany, ary ny tanan’i Barnabasy sy i Saoly no nampitondrainy izany ho any amin’ny loholona
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Dia nanomboka nitantara tamin’izy ireo hatramin’ny fiandohany i Petera hoe:'
  - type: heading
    content: Asa 10.9-48
  '5':
  - type: text
    content: 'Nivavaka tany an-tanànan’i Jopa aho, ary azon-tsindrimandry, dia nahita fahitana, koa indro, nisy zavatra nidina avy tany an-danitra, toa lamba lehibe nampidinina tamin’ny zorony efatra nankeo amiko; '
  '6':
  - type: text
    content: 'ary raha nijery sy nandinika izany aho dia hitako ny biby etỳ an-tany izay manan-tongotra efatra sy ny bibidia sy ny zava-mandady sy mikisaka ary ny voromanidina koa. '
  '7':
  - type: text
    content: 'Nandre feo koa aho niteny tamiko hoe: Mitsangàna, ry Petera, vonoy ireo ka hano. '
  '8':
  - type: text
    content: 'Fa hoy aho: Sanatria, Tompoko! Tsy mbola niditra tamin’ny vavako izay zavatra fady na tsy madio. '
  '9':
  - type: text
    content: 'Ary nisy feo indray avy tany an-danitra nanao hoe: Izay efa nodiovin’Andriamanitra dia aza ataonao ho fady.'
