document_id: EZR.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sakana nataon’ireo fahavalon’ny Jiosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ren’ny fahavalon’ny Joda sy ny Benjamina fa ireo nody avy tamin’ny fahababoana dia efa manangana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ho an’NY TOMPO Andriamanitry ny Israely '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mbamin’ny firenena sisa izay noentin’i Asnapara lehibe sady malaza, ho babo, ary namponeniny tany an-tanàna Samaria sy tany amin’ny tany sasany etỳ andafin’ny ony Eofrata.... '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no voadika amin’ny taratasy nampitondrainy ho any amin’i Artaksersesy mpanjaka: Ny lehilahy mpanomponao etỳ andafin’ny ony Eofrata.... '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho fantatry ny mpanjaka fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' izay niakatra avy tany aminao hankaty aminay dia efa tonga any Jerosalema ka manamboatra ilay tanàna sady mpikomy no ratsy, mahavita ny mandany izy izao ary efa manamboatra ny fanorenana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aoka ho fantatry ny mpanjaka fa raha haorina io tanàna io ka hatsangana indray ny mandany dia tsy hety handoa hetra, na haba, na sara, izy ka hahatonga fatiantoka ho an’ny fanjakana izany any aoriana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa satria mahazo ny fivelomanay avy amin’ny lapan’ny mpanjaka izahay dia tsy mety raha odianay tsy hita ny fatiantoky ny fanjakana ka nandefa iraka hampahafantatra izao amin’ny mpanjaka izahay, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary mba hojerenao ny boky mirakitra ny tantaran’ny razanao; dia ho hitanao ao amin’ny boky tantara, koa ho fantatrao fa tanàna mpikomy io tanàna io ka nahafatiantoka ny mpanjaka sy ny tany maro sady efa nisy fikomiana niseho tao hatrizay ela izay; koa izany no nandravana io tanàna io. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary mampahafantatra ny mpanjaka izahay fa raha hamboarina io tanàna io ka vita ny mandany dia tsy hanana fananana amin’ny etỳ andafin’ny ony Eofrata intsony ianao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny valintenin’i Artaksersesy mpanjaka
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampitondrain’ny mpanjaka ho any amin’i Rehoma mpanolotsaina sy i Simsay mpitantsoratra mbamin’ny namany sisa izay nonina tany Samaria sy tany amin’ny tanàna sasany any andafin’ny ony Eofrata ny valiny hoe: Fiadanana.... '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taratasy izay nampitondrainareo ho atỳ aminay dia efa voavaky tsara teo anatrehako. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandidy aho ka nasaiko nojerena; dia hita fa nanandra-tena nikomy tamin’ny mpanjaka maro hatrizay ela izay tokoa io tanàna io ka nisy fikomiana sy fiokoana niseho tao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nanatona an’i Zerobabela sy ny lohan’ny fianakaviana izy ka niteny taminy hoe: Aoka mba hiara-miasa aminareo izahay fa mitady an’Andriamanitrareo tahaka anareo ihany koa izahay, ary ho Azy no namonoanay zavatra hatao fanatitra hatramin’ny andron’i Esara-Hadona mpanjakan’i Asiria izay nampiakatra anay ho atỳ. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efa nisy mpanjaka mahery izay nanjaka tany Jerosalema nitondra ny tany rehetra any andafin’ny ony Eofrata ka nandoavana hetra sy haba ary sara io. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mamoaha didy hampitsahatra ireo olona ireo hoe tsy hamboarina io tanàna io raha tsy mahazo teny avy atỳ amiko. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tandremo tsara fandrao misy tsy ataonareo izany; fa nahoana no havela handroso ny ratsy ka hahatonga fatiantoka ho an’ny fanjakana?
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa voavaky teo anatrehan’i Rehoma mpanolotsaina sy i Simsay mpitantsoratra mbamin’ny namany ny taratasin’i Artaksersesy mpanjaka dia niakatra haingana ho any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' tany Jerosalema izy ka nampitsahatra azy an-keriny.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia natsahatra tsy natao ny tranon’Andriamanitra tany Jerosalema ary mbola nitsahatra ihany izany hatramin’ny taona faharoa nanjakan’i Dariosy, mpanjakan’i Persia.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly azy ireo i Zerobabela sy i Josoa mbamin’ny namany lohan’ny fianakaviana tamin’ny Israely hoe: Tsy misy raharaha hikambananareo aminay amin’ny hanaovana trano ho an’Andriamanitray; fa izahay ihany no hanao trano ho an’NY TOMPO Andriamanitry ny Israely, araka izay didy navoakan’i Kirosy mpanjaka, izay mpanjakan’i Persia, taminay. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao izay hampiraviravy tanana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' sy nandevilevy azy mba tsy hanao ny trano ny tompon-tany '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sady nanarama olona hanome hevitra hanohitra azy mba hahafoana ny heviny, hatramin’ny andro nanjakan’i Kirosy tany Persia ka hatramin’ny nanjakan’i Dariosy mpanjakan’i Persia.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Notorìna tany amin’i Artaksersesy mpanjaka ny Jiosy
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vao niakatra nanjaka i Ahasoerosy dia nanoratra ho any aminy ireo, hanendrikendrika ny mponina tany Joda sy Jerosalema. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny andron’i Artaksersesy no nanoratan’i Bislama sy i Mitredata ary i Tabela mbamin’ny namany sisa ho any amin’i Artaksersesy, mpanjakan’i Persia; ary ny soratra tamin’ny taratasy dia nataony tarehin-tsoratra arameana sady nataony teny arameana koa.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Rehoma mpanolotsaina sy i Simsay mpitantsoratra no nanoratra ny taratasy toy izao ho any amin’i Artaksersesy mpanjaka mba ho fanendrikendrehana an’i Jerosalema: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Rehoma mpanolotsaina sy i Simsay mpitantsoratra ary ny namany sisa, dia ny Dinaita, ny Afarsatkita, ny Tarpelita, ny Afarsaita, ny Arkevita, ny Babiloniana, ny Sosanita, ny Dehavita sy ny Elamita, '
