document_id: MAT.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fampitandreman’i Jesosy ny amin’ny mpanoradalàna sy ny Fariseo
  - type: heading
    content: Mar 12.37-40; Lio 11.39-52; 20.45-47
  - type: text
    content: 'Ary tamin’izany Jesosy dia niteny tamin’ny vahoaka sy tamin’ny mpianany hoe: '
  '10':
  - type: text
    content: 'Ary aza mba mety antsoina hoe mpitarika ianareo; fa iray ihany no Mpitarika anareo dia '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Fa izay lehibe aminareo no ho mpanompo anareo. '
  '12':
  - type: text
    content: Fa izay manandra-tena no haetry, ary izay manetry tena no hasandratra.
  '13':
  - type: text
    content: 'Fa lozanareo, mpanoradalàna sy Fariseo, mpihatsaravelatsihy, fa arindrinareo eo anoloan’ny olona ny fanjakan’ny lanitra; fa tsy miditra ianareo ary izay te hiditra tsy avelanareo hiditra. '
  '14':
  - type: text
    content: Lozanareo, mpanoradalàna sy Fariseo, mpihatsaravelatsihy! Fa laninareo ny tranon’ny mpitondratena, dia manao vavaka lavareny mba ho fiolahana ianareo; koa izany no hahazoanareo fanamelohana mafimafy kokoa.
  '15':
  - type: text
    content: 'Lozanareo, mpanoradalàna sy Fariseo, mpihatsaravelatsihy! Fa mandeha mitety ny ranomasina sy ny tany maina ianareo mba hahazoanareo '
  - type: text
    content: prozelita
  - type: text
    content: ' iray monja; ary rehefa azonareo izy dia ataonareo zanaky ny '
  - type: text
    content: afobe
  - type: text
    content: ' indroa mihoatra noho ianareo.'
  '16':
  - type: text
    content: 'Lozanareo, jamba nefa mpitarika izay milaza hoe: Raha misy mianiana amin’ny tempoly dia tsy mampaninona izany; fa raha misy mianiana amin’ny volamenan’ny tempoly dia mamato-tena izy. '
  '17':
  - type: text
    content: 'Ry adala sy jamba! Inona no lehibe, ny volamena va, sa ny tempoly izay nahamasina ny volamena? '
  '18':
  - type: text
    content: 'Ary koa: Raha misy mianiana amin’ny alitara dia tsy mampaninona izany; fa raha misy mianiana amin’ny fanatitra eo amboniny dia mamato-tena izy. '
  '19':
  - type: text
    content: 'Ry jamba! Inona no lehibe, ny fanatitra, sa ny alitara izay mahamasina ny fanatitra? '
  '2':
  - type: text
    content: 'Eo amin’ny fitoeran’i Mosesy no ipetrahan’ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' sy ny '
  - type: text
    content: Fariseo
  - type: text
    content: '; '
  '20':
  - type: text
    content: 'Koa amin’izany, izay mianiana amin’ny alitara, dia mianiana aminy sy amin’ny zavatra rehetra izay eo amboniny. '
  '21':
  - type: text
    content: 'Ary izay mianiana amin’ny tempoly dia mianiana aminy sy amin’izay mitoetra ao aminy. '
  '22':
  - type: text
    content: Izay mianiana amin’ny lanitra dia mianiana amin’ny sezafiandrianan’Andriamanitra sy amin’izay mipetraka eo amboniny.
  '23':
  - type: text
    content: 'Lozanareo, mpanoradalàna sy Fariseo, mpihatsaravelatsihy! Fa mandoa ny ampahafolon’ny solila sy ny aneta ary ny komina ianareo, nefa navelanareo izay lehibe indrindra amin’ny lalàna, dia ny rariny sy ny famindrampo ary ny finoana; ireto no tokony ho nataonareo, nefa tsy tokony ho navelanao iretsy. '
  '24':
  - type: text
    content: Ry jamba nefa mpitarika! Tantavaninareo ny moka nefa atelinareo ny rameva.
  '25':
  - type: text
    content: 'Lozanareo, mpanoradalàna sy Fariseo, mpihatsaravelatsihy! Fa diovinareo ny ivelan’ny kapoaka sy ny lovia nefa ny ao anatiny dia feno fandrobana sy tsy fahononana. '
  '26':
  - type: text
    content: Ry Fariseo jamba! Diovy aloha ny atin’ny kapoaka sy ny lovia mba ho madio koa ny ivelany.
  '27':
  - type: text
    content: 'Lozanareo, mpanoradalàna sy Fariseo, mpihatsaravelatsihy! Fa ianareo dia tahaka ny fasana voalalotra fotsy, izay miseho ho tsara tarehy eo ivelany, nefa ny ao anatiny dia feno taolam-paty mbamin’ny fahalotoana rehetra. '
  '28':
  - type: text
    content: 'Dia tahaka izany koa ianareo: Raha amin’ny eo ivelany dia miseho amin’ny olona ho marina, nefa ny ao anatinareo dia feno fihatsarambelatsihy sy tsy fankatoavan-dalàna.'
  '29':
  - type: text
    content: 'Lozanareo, mpanoradalàna sy Fariseo, mpihatsaravelatsihy! Fa manorina ny fasan’ny mpaminany ianareo sady manisy haingony ny rarivatom-pasan’ny olona marina, '
  '3':
  - type: text
    content: 'koa amin’izany, izay rehetra lazainy dia ataovy ka tandremo; fa aza mba manao araka ny asany, satria miteny ihany izy nefa tsy manatanteraka. '
  '30':
  - type: text
    content: 'koa hoy ianareo: Raha niara-belona tamin’ny razanay izahay dia tsy mba ho niombona taminy handatsa-dra ny mpaminany. '
  '31':
  - type: text
    content: 'Dia miampanga tena ianareo fa zanak’izay namono ny mpaminany. '
  '32':
  - type: text
    content: 'Ary ianareo izao dia efa nahafeno ny kapoaka famaran’ny razanareo. '
  '33':
  - type: text
    content: Ry bibilava, ry taranaky ny menarana! Hataonareo ahoana no fandositra ny fanamelohana ho any amin’ny afobe?
  '34':
  - type: text
    content: 'Ary noho izany dia indro Aho maniraka mpaminany sy olon-kendry ary mpanoradalàna ho atỳ aminareo; koa ny sasany dia hovonoinareo sy hohomboinareo amin’ny hazofijaliana, ny sasany dia hokapohinareo ao amin’ny sinagoganareo sy henjehinareo any amin’ny tanàna sy vohitra '
  '35':
  - type: text
    content: 'mba hanody anareo ny ran’ny tsy manan-tsiny rehetra, izay nalatsaka tetỳ ambonin’ny tany, hatramin’ny ran’i Abela marina ka hatramin’ny ran’i Zakaria, zanak’i Barakia, izay novonoinareo teo anelanelan’ny tempoly sy ny alitara. '
  '36':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Hanody ity taranaka ity izany rehetra izany.'
  - type: heading
    content: Ny fitarainan’i Jesosy ny amin’i Jerosalema
  - type: heading
    content: Lio 13.34-35
  '37':
  - type: text
    content: 'Ry Jerosalema, ry Jerosalema, izay mamono ny mpaminany sy mitora-bato izay irahina ho ao aminy, impiry Aho no ta hanangona ny zanakao, tahaka ny fanòmban’ny akoho ny zanany ao ambanin’ny elany fa tsy nety ianareo! '
  '38':
  - type: text
    content: 'Indro, ho lao ny tranonareo. '
  '39':
  - type: text
    content: 'Fa lazaiko aminareo: Hatramin’izao dia tsy hahita Ahy intsony ianareo mandra-pilazanareo hoe: Isaorana anie izay avy amin’ny anaran’NY TOMPO.'
  '4':
  - type: text
    content: 'Eny, mamehy entana izay sady mavesatra no sarotra entina izy ka mametraka izany eo amin’ny soroky ny olona, nefa ny tenany dia tsy mety manetsika izany na dia amin’ny rantsantanany iray aza. '
  '5':
  - type: text
    content: Ary ny asany rehetra dia ataony mba ho hitan’ny olona; fa ataony lehibe ny filakiterany
  - type: note
    content: Boaty kely misy andinin-tSoratra Masina.
  - type: text
    content: ' ary ataony vaventy ny morontongotr’akanjony. '
  '6':
  - type: text
    content: 'Ary tia ny fitoerana eny anoloana any amin’ny fanasana, sy ny fipetrahana eny anoloana eo amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' izy '
  '7':
  - type: text
    content: 'ary koa ny hoarahabain’ny olona eny an-tsena sy ny hataon’ny olona hoe: Raby ô!'
  '8':
  - type: text
    content: 'Fa ianareo kosa dia aza mba mety hatao hoe: Raby ô; fa iray ihany no Mpampianatra anareo ary ianareo rehetra dia mpirahalahy avokoa. '
  '9':
  - type: text
    content: 'Aza milaza olona etỳ an-tany ho rainareo koa; fa iray ihany no Ray dia izay any an-danitra. '
