document_id: PSA.103,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Misaora NY TOMPO
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Misaora NY TOMPO, ry fanahiko
  - type: text
    content: ary izay rehetra ato anatiko, misaora ny anarany masina.
  '10':
  - type: text
    content: Tsy mba manao amintsika araka ny fahotantsika Izy,
  - type: text
    content: na mamaly antsika araka ny helotsika.
  '11':
  - type: text
    content: Fa tahaka ny haavon’ny lanitra ambonin’ny tany
  - type: text
    content: no haben’ny famindrampony amin’izay matahotra Azy.
  '12':
  - type: text
    content: Tahaka ny halavitry ny atsinanana amin’ny andrefana
  - type: text
    content: no halavitry ny anesorany ny fahotantsika amintsika.
  '13':
  - type: text
    content: Tahaka ny fiantran’ny ray ny zanany
  - type: text
    content: no fiantran’NY TOMPO izay matahotra Azy.
  '14':
  - type: text
    content: Fa Izy dia mahalala ny namolavolana antsika
  - type: text
    content: ka mahatsiaro fa vovoka isika.
  '15':
  - type: text
    content: Tahaka ny ahitra ny andron’ny zanak’olombelona;
  - type: text
    content: tahaka ny vonin-javatra any an-tsaha ny famoniny,
  '16':
  - type: text
    content: satria tsofin’ny rivotra izy ka lasa
  - type: text
    content: ary tsy mahalala azy intsony ny toerany.
  '17':
  - type: text
    content: Fa ny famindrampon’NY TOMPO dia hatramin’ny taloha indrindra ka ho mandrakizay amin’izay matahotra Azy
  - type: text
    content: ary mihatra amin’ny taranaka ny fahamarinany,
  '18':
  - type: text
    content: dia amin’izay mitandrina ny fanekeny
  - type: text
    content: sy mahatsiaro hankatò ny didiny.
  '19':
  - type: text
    content: Efa nampitoetra ny sezafiandrianany any an-danitra NY TOMPO;
  - type: text
    content: ary manapaka izao rehetra izao ny fanjakany.
  '2':
  - type: text
    content: Misaora NY TOMPO, ry fanahiko
  - type: text
    content: ary aza misy hadinoinao ny fitahiany rehetra,
  '20':
  - type: text
    content: Misaora NY TOMPO, ianareo anjeliny,
  - type: text
    content: dia ianareo izay mahery indrindra sady mankatò ny didiny
  - type: text
    content: ary mihaino ny feon’ny teniny.
  '21':
  - type: text
    content: Misaora NY TOMPO, ianareo miaramilany rehetra,
  - type: text
    content: dia ianareo mpanompony izay manao ny sitrapony.
  '22':
  - type: text
    content: Misaora NY TOMPO, ianareo asany rehetra
  - type: text
    content: manerana ny fanjakany.
  - type: text
    content: Misaora NY TOMPO, ry fanahiko.
  '3':
  - type: text
    content: izay mamela ny helokao rehetra,
  - type: text
    content: izay manasitrana ny aretinao rehetra,
  '4':
  - type: text
    content: izay manavotra ny ainao tsy hidina any an-davaka,
  - type: text
    content: izay manarona famindrampo sy fiantrana anao,
  '5':
  - type: text
    content: izay mamoky zava-tsoa anao;
  - type: text
    content: mihavao toy ny an’ny voromahery ny fahatanoranao.
  '6':
  - type: text
    content: NY TOMPO manao fahamarinana
  - type: text
    content: sy fitsarana amin’izay rehetra ampahorina.
  '7':
  - type: text
    content: Efa nampahafantatra an’i Mosesy ny lalan-kalehany Izy;
  - type: text
    content: nampahafantariny ny asa lehibe nataony ny Zanak’Israely.
  '8':
  - type: text
    content: Mamindra fo sy miantra NY TOMPO,
  - type: text
    content: mahari-po sady be famindrampo.
  '9':
  - type: text
    content: Tsy mifandahatra mandrakariva Izy,
  - type: text
    content: na mitahiry fahatezerana mandrakizay.
