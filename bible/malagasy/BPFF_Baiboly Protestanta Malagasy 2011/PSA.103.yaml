document_id: PSA.103
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misaora NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Misaora NY TOMPO, ry fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay rehetra ato anatiko, misaora ny anarany masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Misaora NY TOMPO, ry fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza misy hadinoinao ny fitahiany rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: izay mamela ny helokao rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manasitrana ny aretinao rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: izay manavotra ny ainao tsy hidina any an-davaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manarona famindrampo sy fiantrana anao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: izay mamoky zava-tsoa anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihavao toy ny an’ny voromahery ny fahatanoranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: NY TOMPO manao fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fitsarana amin’izay rehetra ampahorina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Efa nampahafantatra an’i Mosesy ny lalan-kalehany Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampahafantariny ny asa lehibe nataony ny Zanak’Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mamindra fo sy miantra NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahari-po sady be famindrampo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy mifandahatra mandrakariva Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mitahiry fahatezerana mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy mba manao amintsika araka ny fahotantsika Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mamaly antsika araka ny helotsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa tahaka ny haavon’ny lanitra ambonin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no haben’ny famindrampony amin’izay matahotra Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tahaka ny halavitry ny atsinanana amin’ny andrefana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no halavitry ny anesorany ny fahotantsika amintsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tahaka ny fiantran’ny ray ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no fiantran’NY TOMPO izay matahotra Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa Izy dia mahalala ny namolavolana antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mahatsiaro fa vovoka isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tahaka ny ahitra ny andron’ny zanak’olombelona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny vonin-javatra any an-tsaha ny famoniny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: satria tsofin’ny rivotra izy ka lasa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mahalala azy intsony ny toerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ny famindrampon’NY TOMPO dia hatramin’ny taloha indrindra ka ho mandrakizay amin’izay matahotra Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihatra amin’ny taranaka ny fahamarinany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia amin’izay mitandrina ny fanekeny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mahatsiaro hankatò ny didiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Efa nampitoetra ny sezafiandrianany any an-danitra NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manapaka izao rehetra izao ny fanjakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Misaora NY TOMPO, ianareo anjeliny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo izay mahery indrindra sady mankatò ny didiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihaino ny feon’ny teniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Misaora NY TOMPO, ianareo miaramilany rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo mpanompony izay manao ny sitrapony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Misaora NY TOMPO, ianareo asany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: manerana ny fanjakany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misaora NY TOMPO, ry fanahiko.
