document_id: 2TI.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fihemorana any am-parany
  - type: text
    content: 'Fa aoka ho fantatrao izao: Any am-parany any dia hisy andro sarotra. '
  '10':
  - type: text
    content: 'Fa ianao kosa dia efa nanaraka tsara ny fampianarako, ny fitondrantenako, ny fisainako, ny finoako, ny fahari-poko, ny fitiavako, ny faharetako, '
  '11':
  - type: text
    content: 'ny nanenjehana ahy, ny fahoriana izay nanjo ahy tany Antiokia, tany Ikonioma, tany Listra. Inona no fanenjehana izay tsy niaretako! Nefa ny Tompo nahafaka ahy tamin’izany rehetra izany. '
  '12':
  - type: text
    content: 'Eny, izay rehetra te ho velona amin’ny toe-panahy araka an’Andriamanitra izay ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy dia henjehina. '
  '13':
  - type: text
    content: Fa ny ratsy fanahy sy ny mpamitaka kosa dia handroso hiharatsy kokoa; sady mamitaka izy no fitahina.
  '14':
  - type: text
    content: 'Fa ianao kosa dia mahareta amin’izay zavatra nianaranao sy nampinoana anao satria fantatrao izay nampianatra anao izany; '
  '15':
  - type: text
    content: 'fa hatry ny fony vao zaza ianao dia efa nahalala ny Soratra Masina izay mampahahendry anao ho amin’ny famonjena amin’ny finoana izay ao amin’i Kristy Jesosy. '
  '16':
  - type: text
    content: 'Izay soratra rehetra nomen’ny tsindrimandrin’Andriamanitra dia mahasoa koa ho fampianarana, ho fandresen-dahatra, ho fanitsiana izay diso, ho fitaizana amin’ny fahamarinana, '
  '17':
  - type: text
    content: mba ho tanteraka ny olon’Andriamanitra, ho ampy fitaovana tsara ho amin’ny asa tsara rehetra.
  '2':
  - type: text
    content: 'Ny olona dia ho tia tena, ho tia vola, ho mpandoka tena, ho mpiavonavona, ho mpiteny ratsy, tsy manoa ray sy reny, tsy mahay mankasitraka, tsy manaja izay masina, '
  '3':
  - type: text
    content: 'tsy manam-pitiavana, mpanontolo fo, mpanendrikendrika, tsy mahafehy tena, lozabe, tsy tia ny tsara, '
  '4':
  - type: text
    content: 'mpamadika, kirina, mpieboebo, tia ny fahafinaretana mihoatra noho ny fitiavany an’Andriamanitra; '
  '5':
  - type: text
    content: manana ny endriky ny toe-panahy araka an’Andriamanitra izy nefa mandà ny heriny; ireny koa dia halaviro.
  '6':
  - type: text
    content: 'Fa isan’ireny izay misokosoko miditra any an-tranon’ny sasany ka mahalasa ho babo ny vehivavy adaladala, vesaran’ny fahotana, entin’ny filana maro, '
  '7':
  - type: text
    content: 'mianatra mandrakariva nefa tsy mahatratra ny fahalalana ny marina. '
  '8':
  - type: text
    content: 'Ary tahaka ny nanoheran’i Jana sy i Jambra an’i Mosesy no anoheran’ireo koa ny fahamarinana; izy ireny dia olona maloto saina sady tsy manam-pinoana marina. '
  '9':
  - type: text
    content: Kanefa tsy handroso intsony izy; fa ny hadalany dia haseho amin’ny olona rehetra, tahaka ny an’ireo roa lahy ireo koa.
  - type: heading
    content: Ianao kosa, mahareta amin’izay zavatra nianaranao
