document_id: SNG.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: (Olon-kafa)
  - type: text
    content: Miverena, miverena, ry Solemita;
  - type: text
    content: miverena, miverena, mba hijerenay anao.
  - type: text
    content: Inona no hitanareo amin’ny Solemita?
  - type: text
    content: Dihy tahaka ny ataon’ny mpandihy roa tonta.
  - type: heading
    content: (Ralehilahy)
  '10':
  - type: text
    content: ny vavanao dia toy ny divay tsara.
  - type: heading
    content: (Ravehivavy)
  - type: text
    content: Eny, divay mikorotsaka mora ao an-tendan’ny malalako
  - type: text
    content: sady miditra misononoka amin’ny molotry ny matory.
  - type: heading
    content: Ny fahasambaran’ny tiana
  '11':
  - type: text
    content: An’ny malalako aho,
  - type: text
    content: sady manina ahy izy.
  '12':
  - type: text
    content: Avia, ry malalako, aoka handeha ho any an-tsaha isika;
  - type: text
    content: andeha handry any ambanivohitra isika.
  '13':
  - type: text
    content: Dia aoka hifoha vao maraina ho any an-tanim-boaloboka isika;
  - type: text
    content: aoka hozahantsika raha mitsimoka ny voaloboka, raha mivelatra ny voniny,
  - type: text
    content: ary raha mamony ny ampongabendanitra.
  - type: text
    content: Any no hanehoako ny fitiavako anao.
  '14':
  - type: text
    content: Mamerovero tsara ny dodaima
  - type: note
    content: Zahao Gen 30.14.
  - type: text
    content: ','
  - type: text
    content: sady eo am-bavahadintsika dia misy voankazo tsara samihafa,
  - type: text
    content: na ny vao na ny ela;
  - type: text
    content: efa notahiriziko ho anao ireo, ry malalako.
  '2':
  - type: text
    content: Endre! Maha te hijery ny famindran’ny tongotrao manao kapa, ry zazavavy, zanaky ny manamboninahitra!
  - type: text
    content: Ny manodidina ny andilanao dia tahaka ny firavaka
  - type: text
    content: izay nataon’ny tanan’ny mpahay taozavatra.
  '3':
  - type: text
    content: Ny foitranao dia tahaka ny kapoaka boribory;
  - type: text
    content: tsy ho diso divay noharoharoan-javamanitra anie izy!
  - type: text
    content: Ny kibonao dia tahaka ny varimbazaha an-tobiny
  - type: text
    content: sady voaravaka lisy manodidina.
  '4':
  - type: text
    content: Ny nononao roa dia tahaka ny zana-gazela kambana;
  '5':
  - type: text
    content: ny vozonao dia tahaka ny tilikambo ivoara;
  - type: text
    content: ny masonao dia tahaka ny kamory any Hesbona,
  - type: text
    content: eo am-bavahadin’i Bata-Rabima;
  - type: text
    content: ny oronao dia tahaka ny tilikambo any Libanona
  - type: text
    content: izay manandrify an’i Damaskosy.
  '6':
  - type: text
    content: Ny lohanao dia tahaka an’i Karmela,
  - type: text
    content: ary ny volon-dohanao milantolanto dia somary volomparasy.
  - type: text
    content: Voatanan’ny volonao olioly ny mpanjaka!
  '7':
  - type: text
    content: Endre! Tsara tarehy sady mahafinaritra noho izao
  - type: text
    content: zava-mahafinaritra rehetra izao ianao ry malala!
  '8':
  - type: text
    content: Izato tsangananao dia tahaka ny palma,
  - type: text
    content: ary ny nononao dia tahaka ny sampahony.
  '9':
  - type: text
    content: 'Hoy aho: Hananika ny palma aho'
  - type: text
    content: ka handray ny rantsany;
  - type: text
    content: ary aoka ny nononao ho toy ny sampahom-boaloboka amiko,
  - type: text
    content: ary ny fofonainao ho tahaka ny an’ny paoma;
