document_id: SNG.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Olon-kafa)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena, miverena, ry Solemita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miverena, miverena, mba hijerenay anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no hitanareo amin’ny Solemita?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dihy tahaka ny ataon’ny mpandihy roa tonta.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ralehilahy)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vavanao dia toy ny divay tsara.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ravehivavy)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, divay mikorotsaka mora ao an-tendan’ny malalako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miditra misononoka amin’ny molotry ny matory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahasambaran’ny tiana
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An’ny malalako aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manina ahy izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avia, ry malalako, aoka handeha ho any an-tsaha isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andeha handry any ambanivohitra isika.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia aoka hifoha vao maraina ho any an-tanim-boaloboka isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hozahantsika raha mitsimoka ny voaloboka, raha mivelatra ny voniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raha mamony ny ampongabendanitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any no hanehoako ny fitiavako anao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamerovero tsara ny dodaima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 30.14.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady eo am-bavahadintsika dia misy voankazo tsara samihafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny vao na ny ela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa notahiriziko ho anao ireo, ry malalako.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endre! Maha te hijery ny famindran’ny tongotrao manao kapa, ry zazavavy, zanaky ny manamboninahitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny manodidina ny andilanao dia tahaka ny firavaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nataon’ny tanan’ny mpahay taozavatra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny foitranao dia tahaka ny kapoaka boribory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho diso divay noharoharoan-javamanitra anie izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kibonao dia tahaka ny varimbazaha an-tobiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voaravaka lisy manodidina.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny nononao roa dia tahaka ny zana-gazela kambana;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vozonao dia tahaka ny tilikambo ivoara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny masonao dia tahaka ny kamory any Hesbona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo am-bavahadin’i Bata-Rabima;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny oronao dia tahaka ny tilikambo any Libanona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manandrify an’i Damaskosy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lohanao dia tahaka an’i Karmela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny volon-dohanao milantolanto dia somary volomparasy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voatanan’ny volonao olioly ny mpanjaka!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endre! Tsara tarehy sady mahafinaritra noho izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zava-mahafinaritra rehetra izao ianao ry malala!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izato tsangananao dia tahaka ny palma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny nononao dia tahaka ny sampahony.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy aho: Hananika ny palma aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handray ny rantsany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny nononao ho toy ny sampahom-boaloboka amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fofonainao ho tahaka ny an’ny paoma;
