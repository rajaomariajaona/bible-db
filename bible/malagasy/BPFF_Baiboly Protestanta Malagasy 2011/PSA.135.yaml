- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà ny anaran’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miderà Azy, ianareo mpanompon’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ianareo izay maharitra ao amin’ny tranon’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao anatin’ny kianjan’ny tranon’Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Miderà NY TOMPO fa tsara Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mankalazà ny anarany fa mahafinaritra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa nofidin’NY TOMPO ho Azy i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho rakitra soa ho Azy Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa fantatro fa lehibe NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ambonin’ny andriamanitra rehetra ny Tompontsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manao izay sitrapony rehetra NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na any amin’ny lanitra, na etỳ ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na any amin’ny ranomasina sy ny rano lalina rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mampiakatra zavona avy amin’ny faran’ny tany Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manao tselatra arahin-dranonorana Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamoaka ny rivotra avy ao amin’ny trano fitahirizany azy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izy no namely ny voalohan-terak’i Ejipta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na olona na biby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nandefa famantarana sy fahagagana
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo aminao Izy, ry Ejipta ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tamin’i Farao sy ny mpanompony rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia Ilay namely ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' maro'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nahafaty mpanjaka mahery,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: dia i Sihona mpanjakan’ny Amorita
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy i Oga mpanjakan’i Basana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanjakan’i Kanana rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ary ny tanin’ireo dia nomeny ho lova;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ho lovan’ny Israely olony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: TOMPO ô, mandrakizay ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, hihatra amin’ny taranaka fara aman-dimby ny fahatsiarovana Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa hanome rariny ny olony Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanenina ny amin’ny mpanompony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny sampin’ny Jentilisa dia volafotsy sy volamena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay asa nataon’ny tanan’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Manam-bava izy nefa tsy miteny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mana-maso izy nefa tsy mahita;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: manan-tsofina izy nefa tsy mandre
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy fofonaina ao am-bavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ho tahaka azy izay manao azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay rehetra matoky azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Misaora NY TOMPO, ry taranak’Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misaora NY TOMPO, ry taranak’i Arona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: misaora NY TOMPO, ry taranak’i Levy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo izay matahotra NY TOMPO, misaora NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Isaorana avy any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' anie NY TOMPO'
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay monina any Jerosalema.
- type: usfm
  marker: q1
