document_id: PSA.135,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fantatro fa lehibe NY TOMPO
  - type: text
    content: ' '
  - type: text
    content: Haleloia
  - type: text
    content: .
  - type: text
    content: Miderà ny anaran’NY TOMPO;
  - type: text
    content: miderà Azy, ianareo mpanompon’NY TOMPO,
  '10':
  - type: text
    content: 'dia Ilay namely ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' maro'
  - type: text
    content: ka nahafaty mpanjaka mahery,
  '11':
  - type: text
    content: dia i Sihona mpanjakan’ny Amorita
  - type: text
    content: sy i Oga mpanjakan’i Basana
  - type: text
    content: ary ny fanjakan’i Kanana rehetra;
  '12':
  - type: text
    content: ary ny tanin’ireo dia nomeny ho lova;
  - type: text
    content: eny, ho lovan’ny Israely olony.
  '13':
  - type: text
    content: TOMPO ô, mandrakizay ny anaranao;
  - type: text
    content: TOMPO ô, hihatra amin’ny taranaka fara aman-dimby ny fahatsiarovana Anao.
  '14':
  - type: text
    content: Fa hanome rariny ny olony Izy
  - type: text
    content: ary hanenina ny amin’ny mpanompony.
  '15':
  - type: text
    content: Ny sampin’ny Jentilisa dia volafotsy sy volamena,
  - type: text
    content: izay asa nataon’ny tanan’olombelona.
  '16':
  - type: text
    content: Manam-bava izy nefa tsy miteny;
  - type: text
    content: mana-maso izy nefa tsy mahita;
  '17':
  - type: text
    content: manan-tsofina izy nefa tsy mandre
  - type: text
    content: ary tsy misy fofonaina ao am-bavany.
  '18':
  - type: text
    content: Ho tahaka azy izay manao azy
  - type: text
    content: sy izay rehetra matoky azy.
  '19':
  - type: text
    content: Misaora NY TOMPO, ry taranak’Israely;
  - type: text
    content: misaora NY TOMPO, ry taranak’i Arona;
  '2':
  - type: text
    content: ianareo izay maharitra ao amin’ny tranon’NY TOMPO,
  - type: text
    content: ao anatin’ny kianjan’ny tranon’Andriamanitsika.
  '20':
  - type: text
    content: misaora NY TOMPO, ry taranak’i Levy;
  - type: text
    content: ianareo izay matahotra NY TOMPO, misaora NY TOMPO.
  '21':
  - type: text
    content: 'Isaorana avy any '
  - type: text
    content: Ziona
  - type: text
    content: ' anie NY TOMPO'
  - type: text
    content: izay monina any Jerosalema.
  - type: text
    content: Haleloia
  - type: text
    content: .
  '3':
  - type: text
    content: Miderà NY TOMPO fa tsara Izy;
  - type: text
    content: mankalazà ny anarany fa mahafinaritra izany.
  '4':
  - type: text
    content: Fa nofidin’NY TOMPO ho Azy i Jakoba
  - type: text
    content: ary ho rakitra soa ho Azy Israely.
  '5':
  - type: text
    content: Fa fantatro fa lehibe NY TOMPO
  - type: text
    content: ary ambonin’ny andriamanitra rehetra ny Tompontsika.
  '6':
  - type: text
    content: Manao izay sitrapony rehetra NY TOMPO,
  - type: text
    content: na any amin’ny lanitra, na etỳ ambonin’ny tany,
  - type: text
    content: na any amin’ny ranomasina sy ny rano lalina rehetra.
  '7':
  - type: text
    content: Mampiakatra zavona avy amin’ny faran’ny tany Izy;
  - type: text
    content: manao tselatra arahin-dranonorana Izy;
  - type: text
    content: mamoaka ny rivotra avy ao amin’ny trano fitahirizany azy Izy.
  '8':
  - type: text
    content: Izy no namely ny voalohan-terak’i Ejipta,
  - type: text
    content: na olona na biby.
  '9':
  - type: text
    content: Nandefa famantarana sy fahagagana
  - type: text
    content: teo aminao Izy, ry Ejipta ô;
  - type: text
    content: eny, tamin’i Farao sy ny mpanompony rehetra,
