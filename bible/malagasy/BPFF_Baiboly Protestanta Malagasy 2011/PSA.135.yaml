    - type: text
      text: Miderà ny anaran’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miderà Azy, ianareo mpanompon’NY TOMPO,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia Ilay namely ny '
    - type: usfm
      marker: w
