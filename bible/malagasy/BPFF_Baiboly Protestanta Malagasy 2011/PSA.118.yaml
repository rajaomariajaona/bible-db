document_id: PSA.118
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Velona aho mba hitory ny asan’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miderà NY TOMPO fa tsara Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mandrakizay ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aoka ny Israely hilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrakizay ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka ny taranak’i Arona hilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrakizay ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aoka izay matahotra NY TOMPO hilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrakizay ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tao amin’ny fahoriana no niantsoako NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia namaly ahy NY TOMPO ka nampahalalaka ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: NY TOMPO no miandany amiko ka tsy hatahotra aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no azon’ny olona atao amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: NY TOMPO no miandany amiko sady mamonjy ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho faly aho hahita ny amin’izay mankahala ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsara ny mialoka amin’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny mialoka amin’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsara ny matoky NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny matoky ny mpanapaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nanodidina ahy ny firenena rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny anaran’NY TOMPO no nandringanako azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: nanodidina ahy ireny; eny, nitangorona tamiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny anaran’NY TOMPO anefa no nandringanako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nanodidina ahy tahaka ny renitantely izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voavono tahaka ny afon-tsilo izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny anaran’NY TOMPO no nandringanako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nanosika ahy mafy hahalavo ahy ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa NY TOMPO no namonjy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: NY TOMPO no heriko ary Izy no deraiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izy no famonjena ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ao an-dain’ny marina ny feo mihoby noho ny famonjena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanana ankavanan’NY TOMPO dia mampiseho hery;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ny tanana ankavanan’NY TOMPO dia misandratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanana ankavanan’NY TOMPO dia mampiseho hery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy ho faty aho fa ho velona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitory ny asan’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nofaizin’NY TOMPO mafy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy natolony ho amin’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vohay ny vavahadin’ny fahamarinana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiditra eo aho ka hidera NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ity no vavahadin’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny marina no hiditra eo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hidera Anao aho fa efa namaly ahy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka Ianao no famonjena ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny vato izay nolavin’ny mpanao trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tonga vato fehizoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Avy tamin’NY TOMPO izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka zava-mahagaga eo imasontsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ity no andro nataon’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hifaly sy ho ravoravo amin’izany isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mifona Aminao aho, TOMPO ô, vonjeo e!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifona Aminao aho, TOMPO ô, ambino e!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hotahina anie izay avy amin’ny anaran’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy ao amin’ny tranon’NY TOMPO no itsofanay rano anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Andriamanitra NY TOMPO ka nampahazava antsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rohizo kofehy ny fanati-piravoravoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia hatreo amin’ny tandroky ny alitara aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Andriamanitro Ianao ka hidera Anao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, Andriamanitro, ka hanandratra Anao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Miderà NY TOMPO fa tsara Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mandrakizay ny famindrampony.
