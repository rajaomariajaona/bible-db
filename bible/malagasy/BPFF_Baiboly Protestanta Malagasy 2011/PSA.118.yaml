document_id: PSA.118,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Velona aho mba hitory ny asan’NY TOMPO
  - type: text
    content: Miderà NY TOMPO fa tsara Izy;
  - type: text
    content: fa mandrakizay ny famindrampony.
  '10':
  - type: text
    content: Nanodidina ahy ny firenena rehetra,
  - type: text
    content: fa ny anaran’NY TOMPO no nandringanako azy;
  '11':
  - type: text
    content: nanodidina ahy ireny; eny, nitangorona tamiko;
  - type: text
    content: ny anaran’NY TOMPO anefa no nandringanako azy.
  '12':
  - type: text
    content: Nanodidina ahy tahaka ny renitantely izy;
  - type: text
    content: voavono tahaka ny afon-tsilo izy;
  - type: text
    content: fa ny anaran’NY TOMPO no nandringanako azy.
  '13':
  - type: text
    content: Nanosika ahy mafy hahalavo ahy ianao
  - type: text
    content: nefa NY TOMPO no namonjy ahy.
  '14':
  - type: text
    content: NY TOMPO no heriko ary Izy no deraiko,
  - type: text
    content: fa Izy no famonjena ahy.
  '15':
  - type: text
    content: Ao an-dain’ny marina ny feo mihoby noho ny famonjena;
  - type: text
    content: ny tanana ankavanan’NY TOMPO dia mampiseho hery;
  '16':
  - type: text
    content: ny tanana ankavanan’NY TOMPO dia misandratra;
  - type: text
    content: ny tanana ankavanan’NY TOMPO dia mampiseho hery.
  '17':
  - type: text
    content: Tsy ho faty aho fa ho velona
  - type: text
    content: ka hitory ny asan’NY TOMPO.
  '18':
  - type: text
    content: Nofaizin’NY TOMPO mafy aho
  - type: text
    content: nefa tsy natolony ho amin’ny fahafatesana.
  '19':
  - type: text
    content: Vohay ny vavahadin’ny fahamarinana aho;
  - type: text
    content: hiditra eo aho ka hidera NY TOMPO.
  '2':
  - type: text
    content: 'Aoka ny Israely hilaza hoe:'
  - type: text
    content: Mandrakizay ny famindrampony.
  '20':
  - type: text
    content: Ity no vavahadin’NY TOMPO;
  - type: text
    content: ny marina no hiditra eo.
  '21':
  - type: text
    content: Hidera Anao aho fa efa namaly ahy Ianao
  - type: text
    content: ka Ianao no famonjena ahy.
  '22':
  - type: text
    content: Ny vato izay nolavin’ny mpanao trano
  - type: text
    content: no tonga vato fehizoro.
  '23':
  - type: text
    content: Avy tamin’NY TOMPO izany
  - type: text
    content: ka zava-mahagaga eo imasontsika.
  '24':
  - type: text
    content: Ity no andro nataon’NY TOMPO;
  - type: text
    content: hifaly sy ho ravoravo amin’izany isika.
  '25':
  - type: text
    content: Mifona Aminao aho, TOMPO ô, vonjeo e!
  - type: text
    content: Mifona Aminao aho, TOMPO ô, ambino e!
  '26':
  - type: text
    content: Hotahina anie izay avy amin’ny anaran’NY TOMPO;
  - type: text
    content: avy ao amin’ny tranon’NY TOMPO no itsofanay rano anareo.
  '27':
  - type: text
    content: Andriamanitra NY TOMPO ka nampahazava antsika.
  - type: text
    content: Rohizo kofehy ny fanati-piravoravoana
  - type: text
    content: na dia hatreo amin’ny tandroky ny alitara aza.
  '28':
  - type: text
    content: Andriamanitro Ianao ka hidera Anao aho;
  - type: text
    content: eny, Andriamanitro, ka hanandratra Anao aho.
  '29':
  - type: text
    content: Miderà NY TOMPO fa tsara Izy;
  - type: text
    content: eny, mandrakizay ny famindrampony.
  '3':
  - type: text
    content: 'Aoka ny taranak’i Arona hilaza hoe:'
  - type: text
    content: Mandrakizay ny famindrampony.
  '4':
  - type: text
    content: 'Aoka izay matahotra NY TOMPO hilaza hoe:'
  - type: text
    content: Mandrakizay ny famindrampony.
  '5':
  - type: text
    content: Tao amin’ny fahoriana no niantsoako NY TOMPO,
  - type: text
    content: dia namaly ahy NY TOMPO ka nampahalalaka ahy.
  '6':
  - type: text
    content: NY TOMPO no miandany amiko ka tsy hatahotra aho.
  - type: text
    content: Inona no azon’ny olona atao amiko?
  '7':
  - type: text
    content: NY TOMPO no miandany amiko sady mamonjy ahy
  - type: text
    content: ary ho faly aho hahita ny amin’izay mankahala ahy.
  '8':
  - type: text
    content: Tsara ny mialoka amin’NY TOMPO
  - type: text
    content: noho ny mialoka amin’ny olona.
  '9':
  - type: text
    content: Tsara ny matoky NY TOMPO
  - type: text
    content: noho ny matoky ny mpanapaka.
