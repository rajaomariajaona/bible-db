document_id: ZEC.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahefatra: I Josoa mpisoronabe'
  - type: text
    content: 'Ary nasehony ahy fa indro, i Josoa mpisoronabe dia nitsangana teo anatrehan’ilay '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: ', ary i '
  - type: text
    content: Satana
  - type: text
    content: ' nitsangana teo ankavanany hiampanga azy. '
  '10':
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: dia samy hiantso ny namanareo avy
  - type: text
    content: ho eo ambanin’ny voaloboka sy ho eo ambanin’ny aviavy ianareo.
  '2':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Satana: Hananatra anao anie NY TOMPO, ry Satana! Eny, NY TOMPO izay nifidy an’i Jerosalema anie hananatra anao! Tsy forohana nosarihana tamin’ny afo va ity? '
  '3':
  - type: text
    content: 'Ary i Josoa dia nijoro teo anoloan’ilay Anjely tamin’ny fitafiana maloto. '
  '4':
  - type: text
    content: 'Dia niteny tamin’ireo izay nitsangana teo anoloany NY TOMPO hoe: Esory aminy ny fitafiana maloto! Ary hoy koa Izy taminy: Indro, efa nesoriko ny helokao, ary hampiakanjoiko akanjo fihaingoana ianao. '
  '5':
  - type: text
    content: 'Ary hoy aho: Aoka hasiana fehiloha madio eo an-dohany! Dia nasiany fehiloha madio teo an-dohany sady nampitafiany izy. Ary ilay Anjelin’NY TOMPO nijoro teo. '
  '6':
  - type: text
    content: 'Ary ilay Anjelin’NY TOMPO dia nanao izao fanambaràna izao tamin’i Josoa hoe: '
  '7':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Raha mizotra amin’ny lalako ianao
  - type: text
    content: ary mitandrina ny didiko
  - type: text
    content: dia ianao no hanam-pahefana amin’ny tranoko
  - type: text
    content: sy hitandrina ny kianjako
  - type: text
    content: sady homeko lalana malalaka
  - type: text
    content: ho eo amin’ireo mijoro ireo ianao.
  - type: heading
    content: Mampiantso an’i Rantsana mpanompony NY TOMPO
  '8':
  - type: text
    content: Koa mihainoa, ry Josoa mpisoronabe,
  - type: text
    content: dia ianao sy ny namanao izay mipetraka eo anoloanao,
  - type: text
    content: 'fa olona atao famantarana ireo:'
  - type: text
    content: Indro, entiko i Rantsana
  - type: note
    content: 'Na: Solofo.'
  - type: text
    content: ' Mpanompoko.'
  '9':
  - type: text
    content: 'Fa indro, ny vato izay napetrako teo anoloan’i Josoa:'
  - type: text
    content: Misy masony fito io vato tokana io.
  - type: text
    content: Indro, Izaho no hanoratra izay tokony hosoratina eo,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: ary hesoriko amin’ny indray andro monja
  - type: text
    content: ny helok’ity tany ity.
