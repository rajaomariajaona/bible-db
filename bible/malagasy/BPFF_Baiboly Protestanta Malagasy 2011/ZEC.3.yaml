document_id: ZEC.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitana fahefatra: I Josoa mpisoronabe'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nasehony ahy fa indro, i Josoa mpisoronabe dia nitsangana teo anatrehan’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ', ary i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satana
  - type: text
    text: ' nitsangana teo ankavanany hiampanga azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Satana: Hananatra anao anie NY TOMPO, ry Satana! Eny, NY TOMPO izay nifidy an’i Jerosalema anie hananatra anao! Tsy forohana nosarihana tamin’ny afo va ity? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary i Josoa dia nijoro teo anoloan’ilay Anjely tamin’ny fitafiana maloto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niteny tamin’ireo izay nitsangana teo anoloany NY TOMPO hoe: Esory aminy ny fitafiana maloto! Ary hoy koa Izy taminy: Indro, efa nesoriko ny helokao, ary hampiakanjoiko akanjo fihaingoana ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy aho: Aoka hasiana fehiloha madio eo an-dohany! Dia nasiany fehiloha madio teo an-dohany sady nampitafiany izy. Ary ilay Anjelin’NY TOMPO nijoro teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ilay Anjelin’NY TOMPO dia nanao izao fanambaràna izao tamin’i Josoa hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mizotra amin’ny lalako ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitandrina ny didiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianao no hanam-pahefana amin’ny tranoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hitandrina ny kianjako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady homeko lalana malalaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho eo amin’ireo mijoro ireo ianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampiantso an’i Rantsana mpanompony NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa mihainoa, ry Josoa mpisoronabe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianao sy ny namanao izay mipetraka eo anoloanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa olona atao famantarana ireo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, entiko i Rantsana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Solofo.
    marker-yv: yv-n
  - type: text
    text: ' Mpanompoko.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa indro, ny vato izay napetrako teo anoloan’i Josoa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy masony fito io vato tokana io.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, Izaho no hanoratra izay tokony hosoratina eo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hesoriko amin’ny indray andro monja
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny helok’ity tany ity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Amin’izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy hiantso ny namanareo avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho eo ambanin’ny voaloboka sy ho eo ambanin’ny aviavy ianareo.
