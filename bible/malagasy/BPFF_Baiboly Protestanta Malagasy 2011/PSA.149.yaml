document_id: PSA.149,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mankasitraka ny olony NY TOMPO
  - type: text
    content: ' '
  - type: text
    content: Haleloia
  - type: text
    content: .
  - type: text
    content: Mihirà fihiram-baovao ho an’NY TOMPO;
  - type: text
    content: manaova hira fiderana Azy eo amin’ny fiangonan’ny olona masina.
  '2':
  - type: text
    content: Aoka hifaly amin’ny Mpanao azy ny Israely;
  - type: text
    content: 'aoka hiravoravo amin’ny Mpanjakany ny zanak’i '
  - type: text
    content: Ziona
  - type: text
    content: .
  '3':
  - type: text
    content: Aoka hidera ny anarany amin’ny dihy izy
  - type: text
    content: ary hankalaza Azy amin’ny ampongatapaka sy ny lokanga.
  '4':
  - type: text
    content: Fa sitraky NY TOMPO ny olony,
  - type: text
    content: ravahany famonjena ny mpandefitra.
  '5':
  - type: text
    content: Aoka hiravoravo amin’ny voninahitra ny olona masina;
  - type: text
    content: aoka hihoby tsara eo am-pandrianany izy.
  '6':
  - type: text
    content: Aoka hisy fanandratana an’Andriamanitra eo am-bavany
  - type: text
    content: ary sabatra roa lela eny an-tanany,
  '7':
  - type: text
    content: 'hamaliany ny '
  - type: text
    content: Jentilisa
  - type: text
    content: sy hamaizany ny firenena maro,
  '8':
  - type: text
    content: hamatorany ireo mpanjakany amin’ny gadra,
  - type: text
    content: sy ny olo-malazany amin’ny gadra vy,
  '9':
  - type: text
    content: 'mba hanaovany ny fitsarana voasoratra:'
  - type: text
    content: voninahitry ny olony masina rehetra izany.
  - type: text
    content: Haleloia.
