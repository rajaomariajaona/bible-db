document_id: 2TI.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miaramila tsaran’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa ianao, anaka, dia aoka hihahery amin’ny fahasoavana izay ao amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izay zavatra efa renao tamiko teo anatrehan’ny vavolombelona maro dia atolory ny olona mahatoky izay hahay hampianatra ny sasany kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Miaraha miaritra ny mafy amiko ianao, tahaka ny miaramila tsaran’i Kristy Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny miaramila manafika dia tsy mba misy maningo-tena amin’ny raharahan’izao fiainana izao, raha ta hahafaly izay efa nifidy azy ho miaramila izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha misy mandray anjara amin’ny fifaninanana dia tsy satrohana satroboninahitra izy raha tsy manezaka araka ny fitsipi-dalao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny mpiasa tany izay misasatra no tokony ho voalohany handray ny vokatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Diniho izay lazaiko fa homen’ny Tompo fahazavan-tsaina ny amin’ny zavatra rehetra ianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsarovy Jesosy Kristy izay natsangana tamin’ny maty
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsarovy Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' izay natsangana tamin’ny maty, dia Ilay avy tamin’ny taranak’i Davida, araka ny Filazantsara toriko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'izay iaretako fahoriana hatramin’ny fifatorana aza, toy ny mpanao ratsy; nefa ny tenin’Andriamanitra dia tsy mba voafatotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izany no iaretako ny zavatra rehetra noho ny amin’ny olom-boafidy mba hahazoan’ireny koa famonjena, dia ilay ao amin’i Kristy Jesosy, mbamin’ny voninahitra mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mahatoky izao teny izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha miara-maty Aminy isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiara-belona Aminy koa;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: raha miaritra isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiara-manjaka Aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mandà Azy isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handa antsika kosa Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: fa na dia tsy mahatoky Azy aza isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola mahatoky ihany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy afaka handa ny tenany Izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mpiasa tsy mahazo henatra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany zavatra izany no ampahatsiarovy ny olona; koa anaro mafy eo anatrehan’ny Tompo izy mba tsy hampiady teny satria tsy mahasoa akory izany fa mamadika ny mpihaino. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mazotoa manolotra ny tenanao amin’Andriamanitra ho olona voazaha toetra, dia mpiasa tsy mahazo henatra izay mizara tsara ny tenin’ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa halaviro ny fibedibedena foana satria mbola handroso amin’ny haratsiam-panahy ihany izay mpanao izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary ny teniny dia hikiky tahaka ny homamiadana; isan’ireny i Himeneo sy i Fileto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nania tamin’ny marina ireny ka milaza fa efa lasa sahady ny fitsanganan’ny maty, dia mandrava ny finoan’ny sasany izy amin’izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanorenana mafy nataon’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa ny fanorenana mafy nataon’Andriamanitra dia miorina tsara sady manana izao tombo-kase izao: Ny Tompo mahalala ny azy, ary koa: Aoka ny olona rehetra izay manonona ny anaran’ny Tompo hiala amin’ny ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ao amin’ny trano lehibe iray, tsy dia fanaka volamena sy volafotsy ihany no ao, fa fanaka hazo sy tany koa, ny sasany dia homem-boninahitra ary ny sasany dia halam-baraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Koa raha misy olona manadio ny tenany ho afaka amin’ireny dia ho fanaka homem-boninahitra izy, efa nohamasinina ka mahasoa ho an’ny Tompo, voavoatra ho amin’ny asa tsara rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpanompon’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mandosira ny filan’ny fahatanorana ary miezaha mitady fahamarinana, finoana, fitiavana, fihavanana amin’izay miantso ny Tompo amin’ny fo madio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa mandava ny fanontaniana adaladala tsy misy antony satria fantatrao fa mahatonga ady izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary tsy mety raha miady ny mpanompon’ny Tompo, fa aoka ho malemy fanahy amin’ny olona rehetra, mahay mampianatra, mahalefitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'mananatra ny mpanohitra amin’ny fahamoram-panahy; fa angamba Andriamanitra hanome fibebahana azy mba hahalalany tsara ny marina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: dia hody ny sainy ho afaka amin’ny fandriky ny devoly izay nanao azy sambo-belona hanao ny sitrapony.
