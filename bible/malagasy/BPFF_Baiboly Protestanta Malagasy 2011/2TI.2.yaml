document_id: 2TI.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Miaramila tsaran’i Kristy
  - type: text
    content: 'Koa ianao, anaka, dia aoka hihahery amin’ny fahasoavana izay ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy. '
  '10':
  - type: text
    content: 'Izany no iaretako ny zavatra rehetra noho ny amin’ny olom-boafidy mba hahazoan’ireny koa famonjena, dia ilay ao amin’i Kristy Jesosy, mbamin’ny voninahitra mandrakizay. '
  '11':
  - type: text
    content: 'Mahatoky izao teny izao:'
  - type: text
    content: Fa raha miara-maty Aminy isika
  - type: text
    content: dia hiara-belona Aminy koa;
  '12':
  - type: text
    content: raha miaritra isika
  - type: text
    content: dia hiara-manjaka Aminy;
  - type: text
    content: raha mandà Azy isika
  - type: text
    content: dia handa antsika kosa Izy;
  '13':
  - type: text
    content: fa na dia tsy mahatoky Azy aza isika
  - type: text
    content: dia mbola mahatoky ihany Izy
  - type: text
    content: satria tsy afaka handa ny tenany Izy.
  - type: heading
    content: Mpiasa tsy mahazo henatra
  '14':
  - type: text
    content: 'Izany zavatra izany no ampahatsiarovy ny olona; koa anaro mafy eo anatrehan’ny Tompo izy mba tsy hampiady teny satria tsy mahasoa akory izany fa mamadika ny mpihaino. '
  '15':
  - type: text
    content: 'Mazotoa manolotra ny tenanao amin’Andriamanitra ho olona voazaha toetra, dia mpiasa tsy mahazo henatra izay mizara tsara ny tenin’ny fahamarinana. '
  '16':
  - type: text
    content: 'Fa halaviro ny fibedibedena foana satria mbola handroso amin’ny haratsiam-panahy ihany izay mpanao izany, '
  '17':
  - type: text
    content: 'ary ny teniny dia hikiky tahaka ny homamiadana; isan’ireny i Himeneo sy i Fileto. '
  '18':
  - type: text
    content: Nania tamin’ny marina ireny ka milaza fa efa lasa sahady ny fitsanganan’ny maty, dia mandrava ny finoan’ny sasany izy amin’izany.
  - type: heading
    content: Ny fanorenana mafy nataon’Andriamanitra
  '19':
  - type: text
    content: 'Kanefa ny fanorenana mafy nataon’Andriamanitra dia miorina tsara sady manana izao tombo-kase izao: Ny Tompo mahalala ny azy, ary koa: Aoka ny olona rehetra izay manonona ny anaran’ny Tompo hiala amin’ny ratsy. '
  '2':
  - type: text
    content: 'Izay zavatra efa renao tamiko teo anatrehan’ny vavolombelona maro dia atolory ny olona mahatoky izay hahay hampianatra ny sasany kosa. '
  '20':
  - type: text
    content: 'Fa ao amin’ny trano lehibe iray, tsy dia fanaka volamena sy volafotsy ihany no ao, fa fanaka hazo sy tany koa, ny sasany dia homem-boninahitra ary ny sasany dia halam-baraka. '
  '21':
  - type: text
    content: Koa raha misy olona manadio ny tenany ho afaka amin’ireny dia ho fanaka homem-boninahitra izy, efa nohamasinina ka mahasoa ho an’ny Tompo, voavoatra ho amin’ny asa tsara rehetra.
  - type: heading
    content: Ny mpanompon’ny Tompo
  '22':
  - type: text
    content: 'Mandosira ny filan’ny fahatanorana ary miezaha mitady fahamarinana, finoana, fitiavana, fihavanana amin’izay miantso ny Tompo amin’ny fo madio. '
  '23':
  - type: text
    content: 'Fa mandava ny fanontaniana adaladala tsy misy antony satria fantatrao fa mahatonga ady izany. '
  '24':
  - type: text
    content: 'Ary tsy mety raha miady ny mpanompon’ny Tompo, fa aoka ho malemy fanahy amin’ny olona rehetra, mahay mampianatra, mahalefitra, '
  '25':
  - type: text
    content: 'mananatra ny mpanohitra amin’ny fahamoram-panahy; fa angamba Andriamanitra hanome fibebahana azy mba hahalalany tsara ny marina, '
  '26':
  - type: text
    content: dia hody ny sainy ho afaka amin’ny fandriky ny devoly izay nanao azy sambo-belona hanao ny sitrapony.
  '3':
  - type: text
    content: 'Miaraha miaritra ny mafy amiko ianao, tahaka ny miaramila tsaran’i Kristy Jesosy. '
  '4':
  - type: text
    content: 'Ny miaramila manafika dia tsy mba misy maningo-tena amin’ny raharahan’izao fiainana izao, raha ta hahafaly izay efa nifidy azy ho miaramila izy. '
  '5':
  - type: text
    content: 'Raha misy mandray anjara amin’ny fifaninanana dia tsy satrohana satroboninahitra izy raha tsy manezaka araka ny fitsipi-dalao. '
  '6':
  - type: text
    content: 'Ny mpiasa tany izay misasatra no tokony ho voalohany handray ny vokatra. '
  '7':
  - type: text
    content: Diniho izay lazaiko fa homen’ny Tompo fahazavan-tsaina ny amin’ny zavatra rehetra ianao.
  - type: heading
    content: Tsarovy Jesosy Kristy izay natsangana tamin’ny maty
  '8':
  - type: text
    content: 'Tsarovy Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' izay natsangana tamin’ny maty, dia Ilay avy tamin’ny taranak’i Davida, araka ny Filazantsara toriko, '
  '9':
  - type: text
    content: 'izay iaretako fahoriana hatramin’ny fifatorana aza, toy ny mpanao ratsy; nefa ny tenin’Andriamanitra dia tsy mba voafatotra. '
