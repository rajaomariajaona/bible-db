document_id: EZK.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Natsipy ao anaty afo ny tahom-boaloboka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', inona no ihoaran’ny tahom-boaloboka noho ny hazo rehetra, dia ny sakeli-boaloboka izay isan’ny hazo any an’ala? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moa mba azo hakana hazo hatao zavatra akory va izy, na mba hakana hanaovana tsatòka fanantonan-javatra? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indro, hatsipy any anaty afo izy ka hataina; ho levon’ny afo ny tendrony roa ary ho may ny tenatenany. Koa moa azo anaovan-javatra akory va izy? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, fony izy tsy mbola nahafahana aza dia tsy azo nanaovan-javatra, koa mainka fa rehefa levon’ny afo ka may izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Toy ny tahom-boaloboka amin’ny hazo any an’ala, izay natolotro hataina, dia toy izany no hanolorako ny mponina any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hanandrina azy ny tavako. Tafavoaka tamin’ny afo izy nefa ho levon’ny afo hafa indray; dia ho fantatrareo fa Izaho no TOMPO rehefa manandrina azy ny tavako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary hataoko lao ny tany noho ny nivadihany tamiko, hoy NY TOMPO Andriamanitra.
