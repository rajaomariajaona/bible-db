document_id: EZK.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Natsipy ao anaty afo ny tahom-boaloboka
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', inona no ihoaran’ny tahom-boaloboka noho ny hazo rehetra, dia ny sakeli-boaloboka izay isan’ny hazo any an’ala? '
  '3':
  - type: text
    content: 'Moa mba azo hakana hazo hatao zavatra akory va izy, na mba hakana hanaovana tsatòka fanantonan-javatra? '
  '4':
  - type: text
    content: 'Indro, hatsipy any anaty afo izy ka hataina; ho levon’ny afo ny tendrony roa ary ho may ny tenatenany. Koa moa azo anaovan-javatra akory va izy? '
  '5':
  - type: text
    content: Indro, fony izy tsy mbola nahafahana aza dia tsy azo nanaovan-javatra, koa mainka fa rehefa levon’ny afo ka may izy?
  '6':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Toy ny tahom-boaloboka amin’ny hazo any an’ala, izay natolotro hataina, dia toy izany no hanolorako ny mponina any Jerosalema. '
  '7':
  - type: text
    content: 'Hanandrina azy ny tavako. Tafavoaka tamin’ny afo izy nefa ho levon’ny afo hafa indray; dia ho fantatrareo fa Izaho no TOMPO rehefa manandrina azy ny tavako. '
  '8':
  - type: text
    content: Ary hataoko lao ny tany noho ny nivadihany tamiko, hoy NY TOMPO Andriamanitra.
