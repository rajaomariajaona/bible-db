document_id: 2CH.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy i Solomona:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nilaza NY TOMPO fa hitoetra ao amin’ny haizim-pito Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nefa efa nanorina trano hitoeranao tokoa aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toerana hitoeranao mandrakizay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny fanokanana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 8.14-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nitodika ny mpanjaka ka nitsodrano ny fiangonana, dia ny Israely rehetra, ary nitsangana avokoa ny fiangonana, dia ny Israely rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy izy: Isaorana anie NY TOMPO, Andriamanitry ny Israely, fa ny vavany no efa niteny tamin’i Davida raiko, ary ny tanany no nahatanteraka izany taminy, dia ilay hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hatramin’ny andro nitondrako ny oloko nivoaka avy tany Ejipta dia tsy mbola nisy tanàna nofidiko hanorenana trano mba hitoeran’ny anarako tamin’ny fokon’Israely rehetra; tsy nisy koa olona nofidiko ho mpanapaka ny Israely oloko; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa nifidy an’i Jerosalema Aho hitoeran’ny anarako ary nifidy an’i Davida Aho hanapaka ny Israely oloko. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary efa tao am-pon’i Davida raiko ny hanorina trano ho an’ny anaran’NY TOMPO, Andriamanitry ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa hoy NY TOMPO tamin’i Davida raiko: Satria tao am-ponao ny fikasana hanorina trano ho an’ny anarako dia tsara izany fikasanao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Kanefa tsy ianao no hanorina ny Trano, fa ny zanakao izay haterakao, izy no hanorina ny trano ho an’ny anarako. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary NY TOMPO efa nahatanteraka ny teny izay nolazainy, koa nitsangana handimby an’i Davida raiko aho ary mipetraka amin’ny sezafiandrianan’ny Israely araka ny nolazain’NY TOMPO, sady nanorina ny trano ho an’ny anaran’NY TOMPO, Andriamanitry ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary napetrako tao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vata misy ny Fanekena
  - type: text
    text: ' izay itoeran’ny faneken’NY TOMPO, ilay nataony tamin’ny Zanak’Israely.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Solomona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 8.22-53
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nitsangana teo anoloan’ny alitaran’NY TOMPO teo anatrehan’ny fiangonana, dia ny Israely rehetra, i Solomona ka namelatra ny tanany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Efa nanao lampivarahina izy, ary napetrany teo afovoan’ny kianja io; dimy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny lavany, dimy hakiho ny sakany, telo hakiho ny haavony; dia nitsangana teo amin’io izy ka nandohalika teo anatrehan’ny fiangonana, dia ny Israely rehetra, ary namelatra ny tanany manandrify ny lanitra '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka niteny hoe: RY TOMPO, Andriamanitry ny Israely ô, tsy misy Andriamanitra tahaka Anao, na any an-danitra na etỳ an-tany, izay mitandrina ny fanekenao sy ny famindramponao ho an’ny mpanomponao izay mandeha eo anatrehanao amin’ny fony manontolo, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'sady efa nahatanteraka tamin’i Davida raiko mpanomponao izay nolazainao taminy; fa nolazain’ny vavanao izany, dia notanterahin’ny tananao tahaka ny amin’izao anio izao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa tanteraho amin’i Davida raiko mpanomponao, RY TOMPO, Andriamanitry ny Israely ô, ilay nolazainao taminy hoe: Tsy ho diso zanakalahy eo anatrehako izay hipetraka amin’ny sezafiandrianan’ny Israely ianao, raha mitandrina ny alehany ny zanakao ka mankatò ny lalànako tahaka ny nandehananao teo anatrehako. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa ankehitriny, RY TOMPO, Andriamanitry ny Israely ô, mifona aminao aho, aoka ho to anie ny teninao izay nolazainao tamin’i Davida mpanomponao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Andriamanitra va honina miaraka amin’ny olona etỳ an-tany tokoa? E! Ny lanitra ary ny lanitry ny lanitra aza tsy omby Anao, koa mainka fa ity trano naoriko ity! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa atreho ny vavaka izay ataoko sy ny fifonan’ny mpanomponao, RY TOMPO Andriamanitro ô, mba hohenoinao ny fitarainana sy ny vavaka izay ataon’ny mpanomponao eto anatrehanao, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'mba hihiratan’ny masonao andro aman’alina amin’ity trano ity, dia amin’ny toerana nolazainao hoe: Ao no hasiako ny anarako mba hihainoanao ny vavaka izay ataon’ny mpanomponao manatrika ity toerana ity. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary henoy ny fifonan’ny mpanomponao sy ny Israely olonao raha mivavaka manatrika ity toerana ity izy; dia mihainoa any an-danitra fonenanao Ianao; eny, mihainoa ka mamelà heloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Raha misy olona manota amin’ny namany ary ampianianiny ka tonga hianiana eo anoloan’ny alitaranao amin’ity trano ity izy, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: dia mihainoa any an-danitra Ianao ka miasà, ary tsarao ireo mpanomponao, mba hovalina ny ratsy fanahy ka hampitsingerenina ho amin’ny lohany ny nataony, fa hohamarinina kosa ny marina ka homena azy araka ny fahamarinany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha resy eo anoloan’ny fahavalo ny Israely olonao noho ny nanotany Taminao ary miverina sy manaiky ny anaranao indray izy ka mivavaka sy mifona eto anatrehanao amin’ity trano ity, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: dia mihainoa any an-danitra Ianao ka mamelà ny fahotan’ny Israely olonao ary ampodio amin’ny tany nomenao azy sy ny razany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha mihantona ny andro ka tsy misy ranonorana noho ny nanotan’ny olona Taminao, ary mivavaka manatrika ity toerana ity izy ka manaiky ny anaranao sady miala amin’ny fahotany satria ampahorinao, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: dia mihainoa any an-danitra Ianao ka mamelà ny fahotan’ny mpanomponao, dia ny Israely olonao, satria atoronao azy ny lalana tsara izay tokony halehany, ary mandatsaha ranonorana amin’ny taninao, izay nomenao ho lovan’ny olonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Raha misy mosary amin’ny tany, na areti-mandringana, na main’ny hafanana ny vary, na maty fotsy, na misy valala sy sompanga, na misy fahavalo manao fahirano azy ao amin’ny taniny, dia ao amin’ny tanànany, na inona fahoriana, na inona aretina, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'izay vavaka rehetra sy fifonana rehetra ataon’olona na ny Israely olonao rehetra, izay samy mahalala ny fahoriany sy ny alahelony avy ka mamelatra ny tanany manatrika ity trano ity izy, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'dia mihainoa any an-danitra fonenanao Ianao ka mamelà heloka, ary omeo araka ny alehany rehetra ny olona tsirairay, satria fantatrao ny fony, fa Ianao dia Ianao irery ihany no mahalala ny fon’ny zanak’olombelona '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ka mba hatahotra Anao sy handeha amin’ny lalanao izy ireo amin’izay andro rehetra hiainany etỳ amin’ny tany nomenao ny razanay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Henoy koa ny vahiny izay tsy isan’ny Israely olonao, fa tonga avy any amin’ny tany lavitra noho ny amin’ny anaranao lehibe sy ny tananao mahery ary ny sandrinao mitsotra, koa raha avy izy ireo ka mivavaka manatrika ity trano ity '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: dia mihainoa any an-danitra fonenanao Ianao ka miasà araka izay rehetra iantsoan’ny vahiny Anao, mba ho fantatry ny firenena rehetra ambonin’ny tany ny anaranao, hatahorany Anao tahaka ny ataon’ny Israely olonao ihany, ary mba ho fantany fa ny anaranao no efa nantsoina amin’ity trano naoriko ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Raha miainga hiady amin’ny fahavalony ny olonao, na ho aiza na ho aiza no hanirahanao azy ka mivavaka Aminao manandrify ity tanàna izay nofidinao ity sy ny trano izay naoriko ho an’ny anaranao, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: dia henoy any an-danitra ny vavaka ataony sy ny fifonany ka omeo rariny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Raha manota aminao izy, fa tsy misy olombelona tsy manota, ka tezitra aminy Ianao ary manolotra azy eo anoloan’ny fahavalony ary entin’ny mpamabo ho babo any amin’ny tany lavitra na akaiky izy, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'nefa mahatsiaro rehefa any amin’ny tany nitondrana azy ho babo ka mibebaka sy mifona Aminao any amin’ny tany izay nitondrana azy ho babo ary miteny hoe: Efa nanota izahay sady efa nanao meloka sy efa nanao izay ratsy '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ka miverina Aminao amin’ny fony manontolo sy ny fanahiny manontolo izy ao amin’ny tany nitondrana azy ho babo, ary mivavaka manandrify ny taniny izay nomenao ny razany sy ny tanàna izay nofidinao ary ny trano izay naoriko ho an’ny anaranao, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'dia henoy any an-danitra fonenanao ny vavaka ataony sy ny fifonany ka omeo rariny izy; ary mamelà ny olonao izay efa nanota Taminao. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ankehitriny, Andriamanitro ô, mifona Aminao aho, aoka hihiratra ny masonao, ary aoka ny sofinao hihaino ny vavaka atao amin’ity toerana ity.
- type: usfm
  marker: r
  children:
  - type: text
    text: Sal 132.8-10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Koa ankehitriny, mitsangàna ho amin’ny fitsaharanao, RY TOMPO Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia Ianao sy ny vata misy ny faneken’ny herinao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny mpisoronao hitafy famonjena, RY TOMPO Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny olonao masina hifaly amin’ny soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: RY TOMPO Andriamanitra ô, aza lavinao ny Voahosotrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsarovy ny famindrampo nampanantenaina an’i Davida mpanomponao.
