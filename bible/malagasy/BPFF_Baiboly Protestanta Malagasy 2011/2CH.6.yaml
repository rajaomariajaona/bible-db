document_id: 2CH.6,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia hoy i Solomona:'
  - type: text
    content: Efa nilaza NY TOMPO fa hitoetra ao amin’ny haizim-pito Izy.
  '10':
  - type: text
    content: 'Ary NY TOMPO efa nahatanteraka ny teny izay nolazainy, koa nitsangana handimby an’i Davida raiko aho ary mipetraka amin’ny sezafiandrianan’ny Israely araka ny nolazain’NY TOMPO, sady nanorina ny trano ho an’ny anaran’NY TOMPO, Andriamanitry ny Israely. '
  '11':
  - type: text
    content: 'Ary napetrako tao ny '
  - type: text
    content: vata misy ny Fanekena
  - type: text
    content: ' izay itoeran’ny faneken’NY TOMPO, ilay nataony tamin’ny Zanak’Israely.'
  - type: heading
    content: Ny vavaka nataon’i Solomona
  - type: heading
    content: 1Mpa 8.22-53
  '12':
  - type: text
    content: 'Ary nitsangana teo anoloan’ny alitaran’NY TOMPO teo anatrehan’ny fiangonana, dia ny Israely rehetra, i Solomona ka namelatra ny tanany. '
  '13':
  - type: text
    content: 'Efa nanao lampivarahina izy, ary napetrany teo afovoan’ny kianja io; dimy '
  - type: text
    content: hakiho
  - type: text
    content: ' ny lavany, dimy hakiho ny sakany, telo hakiho ny haavony; dia nitsangana teo amin’io izy ka nandohalika teo anatrehan’ny fiangonana, dia ny Israely rehetra, ary namelatra ny tanany manandrify ny lanitra '
  '14':
  - type: text
    content: 'ka niteny hoe: RY TOMPO, Andriamanitry ny Israely ô, tsy misy Andriamanitra tahaka Anao, na any an-danitra na etỳ an-tany, izay mitandrina ny fanekenao sy ny famindramponao ho an’ny mpanomponao izay mandeha eo anatrehanao amin’ny fony manontolo, '
  '15':
  - type: text
    content: 'sady efa nahatanteraka tamin’i Davida raiko mpanomponao izay nolazainao taminy; fa nolazain’ny vavanao izany, dia notanterahin’ny tananao tahaka ny amin’izao anio izao. '
  '16':
  - type: text
    content: 'Koa tanteraho amin’i Davida raiko mpanomponao, RY TOMPO, Andriamanitry ny Israely ô, ilay nolazainao taminy hoe: Tsy ho diso zanakalahy eo anatrehako izay hipetraka amin’ny sezafiandrianan’ny Israely ianao, raha mitandrina ny alehany ny zanakao ka mankatò ny lalànako tahaka ny nandehananao teo anatrehako. '
  '17':
  - type: text
    content: Koa ankehitriny, RY TOMPO, Andriamanitry ny Israely ô, mifona aminao aho, aoka ho to anie ny teninao izay nolazainao tamin’i Davida mpanomponao.
  '18':
  - type: text
    content: 'Andriamanitra va honina miaraka amin’ny olona etỳ an-tany tokoa? E! Ny lanitra ary ny lanitry ny lanitra aza tsy omby Anao, koa mainka fa ity trano naoriko ity! '
  '19':
  - type: text
    content: 'Koa atreho ny vavaka izay ataoko sy ny fifonan’ny mpanomponao, RY TOMPO Andriamanitro ô, mba hohenoinao ny fitarainana sy ny vavaka izay ataon’ny mpanomponao eto anatrehanao, '
  '2':
  - type: text
    content: Nefa efa nanorina trano hitoeranao tokoa aho,
  - type: text
    content: dia toerana hitoeranao mandrakizay.
  - type: heading
    content: Teny fanokanana ny tempoly
  - type: heading
    content: 1Mpa 8.14-21
  '20':
  - type: text
    content: 'mba hihiratan’ny masonao andro aman’alina amin’ity trano ity, dia amin’ny toerana nolazainao hoe: Ao no hasiako ny anarako mba hihainoanao ny vavaka izay ataon’ny mpanomponao manatrika ity toerana ity. '
  '21':
  - type: text
    content: Ary henoy ny fifonan’ny mpanomponao sy ny Israely olonao raha mivavaka manatrika ity toerana ity izy; dia mihainoa any an-danitra fonenanao Ianao; eny, mihainoa ka mamelà heloka.
  '22':
  - type: text
    content: 'Raha misy olona manota amin’ny namany ary ampianianiny ka tonga hianiana eo anoloan’ny alitaranao amin’ity trano ity izy, '
  '23':
  - type: text
    content: dia mihainoa any an-danitra Ianao ka miasà, ary tsarao ireo mpanomponao, mba hovalina ny ratsy fanahy ka hampitsingerenina ho amin’ny lohany ny nataony, fa hohamarinina kosa ny marina ka homena azy araka ny fahamarinany.
  '24':
  - type: text
    content: 'Raha resy eo anoloan’ny fahavalo ny Israely olonao noho ny nanotany Taminao ary miverina sy manaiky ny anaranao indray izy ka mivavaka sy mifona eto anatrehanao amin’ity trano ity, '
  '25':
  - type: text
    content: dia mihainoa any an-danitra Ianao ka mamelà ny fahotan’ny Israely olonao ary ampodio amin’ny tany nomenao azy sy ny razany izy.
  '26':
  - type: text
    content: 'Raha mihantona ny andro ka tsy misy ranonorana noho ny nanotan’ny olona Taminao, ary mivavaka manatrika ity toerana ity izy ka manaiky ny anaranao sady miala amin’ny fahotany satria ampahorinao, '
  '27':
  - type: text
    content: dia mihainoa any an-danitra Ianao ka mamelà ny fahotan’ny mpanomponao, dia ny Israely olonao, satria atoronao azy ny lalana tsara izay tokony halehany, ary mandatsaha ranonorana amin’ny taninao, izay nomenao ho lovan’ny olonao.
  '28':
  - type: text
    content: 'Raha misy mosary amin’ny tany, na areti-mandringana, na main’ny hafanana ny vary, na maty fotsy, na misy valala sy sompanga, na misy fahavalo manao fahirano azy ao amin’ny taniny, dia ao amin’ny tanànany, na inona fahoriana, na inona aretina, '
  '29':
  - type: text
    content: 'izay vavaka rehetra sy fifonana rehetra ataon’olona na ny Israely olonao rehetra, izay samy mahalala ny fahoriany sy ny alahelony avy ka mamelatra ny tanany manatrika ity trano ity izy, '
  '3':
  - type: text
    content: 'Dia nitodika ny mpanjaka ka nitsodrano ny fiangonana, dia ny Israely rehetra, ary nitsangana avokoa ny fiangonana, dia ny Israely rehetra. '
  '30':
  - type: text
    content: 'dia mihainoa any an-danitra fonenanao Ianao ka mamelà heloka, ary omeo araka ny alehany rehetra ny olona tsirairay, satria fantatrao ny fony, fa Ianao dia Ianao irery ihany no mahalala ny fon’ny zanak’olombelona '
  '31':
  - type: text
    content: ka mba hatahotra Anao sy handeha amin’ny lalanao izy ireo amin’izay andro rehetra hiainany etỳ amin’ny tany nomenao ny razanay.
  '32':
  - type: text
    content: 'Henoy koa ny vahiny izay tsy isan’ny Israely olonao, fa tonga avy any amin’ny tany lavitra noho ny amin’ny anaranao lehibe sy ny tananao mahery ary ny sandrinao mitsotra, koa raha avy izy ireo ka mivavaka manatrika ity trano ity '
  '33':
  - type: text
    content: dia mihainoa any an-danitra fonenanao Ianao ka miasà araka izay rehetra iantsoan’ny vahiny Anao, mba ho fantatry ny firenena rehetra ambonin’ny tany ny anaranao, hatahorany Anao tahaka ny ataon’ny Israely olonao ihany, ary mba ho fantany fa ny anaranao no efa nantsoina amin’ity trano naoriko ity.
  '34':
  - type: text
    content: 'Raha miainga hiady amin’ny fahavalony ny olonao, na ho aiza na ho aiza no hanirahanao azy ka mivavaka Aminao manandrify ity tanàna izay nofidinao ity sy ny trano izay naoriko ho an’ny anaranao, '
  '35':
  - type: text
    content: dia henoy any an-danitra ny vavaka ataony sy ny fifonany ka omeo rariny izy.
  '36':
  - type: text
    content: 'Raha manota aminao izy, fa tsy misy olombelona tsy manota, ka tezitra aminy Ianao ary manolotra azy eo anoloan’ny fahavalony ary entin’ny mpamabo ho babo any amin’ny tany lavitra na akaiky izy, '
  '37':
  - type: text
    content: 'nefa mahatsiaro rehefa any amin’ny tany nitondrana azy ho babo ka mibebaka sy mifona Aminao any amin’ny tany izay nitondrana azy ho babo ary miteny hoe: Efa nanota izahay sady efa nanao meloka sy efa nanao izay ratsy '
  '38':
  - type: text
    content: 'ka miverina Aminao amin’ny fony manontolo sy ny fanahiny manontolo izy ao amin’ny tany nitondrana azy ho babo, ary mivavaka manandrify ny taniny izay nomenao ny razany sy ny tanàna izay nofidinao ary ny trano izay naoriko ho an’ny anaranao, '
  '39':
  - type: text
    content: 'dia henoy any an-danitra fonenanao ny vavaka ataony sy ny fifonany ka omeo rariny izy; ary mamelà ny olonao izay efa nanota Taminao. '
  '4':
  - type: text
    content: 'Hoy izy: Isaorana anie NY TOMPO, Andriamanitry ny Israely, fa ny vavany no efa niteny tamin’i Davida raiko, ary ny tanany no nahatanteraka izany taminy, dia ilay hoe: '
  '40':
  - type: text
    content: Ankehitriny, Andriamanitro ô, mifona Aminao aho, aoka hihiratra ny masonao, ary aoka ny sofinao hihaino ny vavaka atao amin’ity toerana ity.
  - type: heading
    content: Sal 132.8-10
  '41':
  - type: text
    content: Koa ankehitriny, mitsangàna ho amin’ny fitsaharanao, RY TOMPO Andriamanitra ô,
  - type: text
    content: dia Ianao sy ny vata misy ny faneken’ny herinao!
  - type: text
    content: Aoka ny mpisoronao hitafy famonjena, RY TOMPO Andriamanitra ô,
  - type: text
    content: ary aoka ny olonao masina hifaly amin’ny soa.
  '42':
  - type: text
    content: RY TOMPO Andriamanitra ô, aza lavinao ny Voahosotrao;
  - type: text
    content: tsarovy ny famindrampo nampanantenaina an’i Davida mpanomponao.
  '5':
  - type: text
    content: 'Hatramin’ny andro nitondrako ny oloko nivoaka avy tany Ejipta dia tsy mbola nisy tanàna nofidiko hanorenana trano mba hitoeran’ny anarako tamin’ny fokon’Israely rehetra; tsy nisy koa olona nofidiko ho mpanapaka ny Israely oloko; '
  '6':
  - type: text
    content: 'fa nifidy an’i Jerosalema Aho hitoeran’ny anarako ary nifidy an’i Davida Aho hanapaka ny Israely oloko. '
  '7':
  - type: text
    content: 'Ary efa tao am-pon’i Davida raiko ny hanorina trano ho an’ny anaran’NY TOMPO, Andriamanitry ny Israely. '
  '8':
  - type: text
    content: 'Nefa hoy NY TOMPO tamin’i Davida raiko: Satria tao am-ponao ny fikasana hanorina trano ho an’ny anarako dia tsara izany fikasanao izany. '
  '9':
  - type: text
    content: 'Kanefa tsy ianao no hanorina ny Trano, fa ny zanakao izay haterakao, izy no hanorina ny trano ho an’ny anarako. '
