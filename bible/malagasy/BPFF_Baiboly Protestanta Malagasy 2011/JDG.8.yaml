document_id: JDG.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy faly ny Efraimita
  - type: text
    content: 'Ary hoy ny lehilahin’i Efraima tamin’i Gideona: Ahoana izao zavatra nataonao taminay izao no tsy mba nantsoinao izahay raha nandeha hiady tamin’ny Midianita ianao? Dia nanome tsiny azy mafy ireo. '
  '10':
  - type: text
    content: 'Ary i Zebaha sy i Zalmona dia tonga tao Karkora, niaraka tamin’ny miaramila tokony ho lehilahy dimy arivo sy iray alina, dia izay rehetra sisa tavela tamin’ny miaramila rehetra izay an’ny zanaky ny Atsinanana; ny maty kosa dia roa alina sy iray hetsy, samy lehilahy mpitan-tsabatra avokoa. '
  '11':
  - type: text
    content: 'Ary i Gideona dia niakatra tamin’ny lalan’ny mpitoetra an-tranolay, any atsinanan’i Noba sy i Jogbeha ka namely ny toby raha ilay mbola tsy nanampo iny ny olona. '
  '12':
  - type: text
    content: Dia nandositra i Zebaha sy i Zalmona ary nanenjika azy i Gideona ka nisambotra ny mpanjaka midianita roa lahy, dia i Zebaha sy i Zalmona, ary nopotehiny ny tafika manontolo.
  '13':
  - type: text
    content: 'Dia niverina avy tamin’ny ady, avy teo amin’ny fiakaran’i Heresa i Gideona, zanak’i Joasy. '
  '14':
  - type: text
    content: 'Nisambotra zatovo iray tamin’ny mponina tao Sokota izy ka nanadihady azy; dia nosoratan’ilay zatovo ny anaran’ireo olo-manankajan’i Sokota sy ny loholona tao izay nisy fito amby fitopolo lahy. '
  '15':
  - type: text
    content: 'Avy eo dia nankany amin’ny mponina tao Sokota i Gideona ka niteny hoe: Indreo i Zebaha sy i Zalmona izay efa nandatsanareo ahy hoe: Moa efa eo am-pelatananao ankehitriny va ny tanan’i Zebaha sy i Zalmona no homenay mofo ny olonao efa reraka? '
  '16':
  - type: text
    content: 'Dia naka ny loholona tao an-tanàna izy ary tsilo avy tany an-tany efitra sy songosongo ka ireny no noentiny nandrotidrotehana ny mponina tao Sokota. '
  '17':
  - type: text
    content: Nandrava ny manda avo tao Penoela koa izy ka namono ny lehilahy tao an-tanàna.
  '18':
  - type: text
    content: 'Dia hoy izy tamin’i Zebaha sy i Zalmona: Lehilahy toy inona ange ireo izay novonoinareo tany Tabara? Hoy izy roa lahy: Tahaka anao izao izy. Izy rehetra dia samy miendrika zanaka mpanjaka avokoa. '
  '19':
  - type: text
    content: 'Hoy i Gideona: Rahalahiko, zanaky ny reniko, ireo. Raha velona koa NY TOMPO, tsy mba hovonoiko ianareo raha novelominareo ireo! '
  '2':
  - type: text
    content: 'Hoy i Gideona taminy: Zinona izao nataoko izao raha oharina amin’izay nataonareo? Tsy tsara noho ny fiotazam-boalobok’i Abiezera va ny fitsimponam-boalobok’i Efraima? '
  '20':
  - type: text
    content: 'Dia hoy izy tamin’i Jetera lahimatoany: Mitsangàna, vonoy izy roa lahy! Fa tsy nanatsoaka ny sabany ilay zatovo fa natahotra: Mbola tanora fanahy loatra izy. '
  '21':
  - type: text
    content: 'Hoy i Zebaha sy i Zalmona: Aoka ianao no hitsangana hamely anay! Fa araka ny toetry ny olona ihany ny heriny. Dia nitsangana i Gideona ka namono an’i Zebaha sy i Zalmona ary naka ny ravaka sarim-bolan-tsinana izay teo amin’ny vozon’ny ramevany.'
  - type: heading
    content: Ny niafaran’ny fiainan’i Gideona
  '22':
  - type: text
    content: 'Hoy ny lehilahin’ny Israely tamin’i Gideona: Aoka ianao sy ny zanakao ary ny zafinao no hanapaka aminay fa namonjy anay tamin’ny tanan’ny Midianita ianao. '
  '23':
  - type: text
    content: 'Fa hoy i Gideona taminy: Tsy hanapaka aminareo aho, ary tsy hanapaka aminareo koa ny zanako; NY TOMPO ihany no hanapaka aminareo.'
  '24':
  - type: text
    content: 'Ary mbola niteny taminy koa i Gideona hoe: Hangataka zavatra iray aminareo aho: Aoka samy hanome ahy kavina avy amin’ny babony avy ianareo. Nanana kavina volamena mantsy ireny satria Ismaelita. '
  '25':
  - type: text
    content: 'Dia hoy izy ireo: Eny, homenay tokoa izany. Dia namelatra lamba ny olona ka samy nanipy kavina izay avy tamin’ny babony teo. '
  '26':
  - type: text
    content: 'Ny lanjan’ny kavina volamena nangatahiny dia volamena fitonjato sy arivo sekela, afa-tsy ny ravaka sarim-bolan-tsinana, ny kavina voavola ary ny lamba volomparasy izay teny amin’ireo mpanjakan’ny Midianita, ary koa ny ravaka izay teny amin’ny vozon’ny ramevany. '
  '27':
  - type: text
    content: Dia nanaovan’i Gideona efoda
  - type: note
    content: 'Efoda: Tsy ilay efoda amin’ny fanamian’ny mpisoronabe izany fa karazana fanaka iray izay nampiasaina tao amin’ny fanompoam-pivavahana.'
  - type: text
    content: ' ireo ka nataony tao an-tanànany, tao Ofra; ary ny Israely rehetra dia nankany ka nijangajanga nanaraka izany efoda izany; tonga fandrika tamin’i Gideona sy ny ankohonany izany.'
  '28':
  - type: text
    content: Voaetry teo anoloan’ny Zanak’Israely ny Midianita ka tsy nahatraka ny lohany intsony. Nandry nandritra ny efapolo taona ny tany tamin’ny andron’i Gideona.
  '29':
  - type: text
    content: 'Lasa nandeha i Jerobaala, zanak’i Joasy, ka nitoetra tao an-tranony. '
  '3':
  - type: text
    content: Teo an-tananareo no nanoloran’Andriamanitra ny manamboninahitry ny Midianita, dia i Oreba sy i Zeba. Inona no azoko atao raha oharina amin’ny nataonareo? Rehefa nilaza izany teny izany i Gideona dia nitony ny fahatezeran’ireo taminy.
  - type: heading
    content: Nankany andafin’i Jordana i Gideona
  '30':
  - type: text
    content: 'Nanan-janaka fitopolo lahy izay naterany i Gideona, satria maro ny vadiny. '
  '31':
  - type: text
    content: 'Ny vady tsindranony izay tany Sekema dia niteraka zazalahy iray taminy koa, ary ny anarany dia nataony hoe Abimeleka. '
  '32':
  - type: text
    content: Dia maty i Gideona, zanak’i Joasy, rehefa tratra antitra tsara, ka nalevina tao amin’ny fasan’i Joasy rainy tao Ofran’ny Abiezerita.
  '33':
  - type: text
    content: 'Rehefa maty i Gideona dia nijangajanga nanaraka ireo '
  - type: text
    content: Baala
  - type: text
    content: ' indray ny Zanak’Israely ka nanao an’i Baala-Berita ho andriamaniny. '
  '34':
  - type: text
    content: 'Ary ny Zanak’Israely dia tsy nahatsiaro NY TOMPO Andriamaniny izay nanafaka azy tamin’ny tanan’ny fahavalony rehetra nanodidina azy '
  '35':
  - type: text
    content: sady tsy mba nanao soa tamin’ny taranak’i Jerobaala na Gideona, araka ny soa rehetra nataon’i Gideona tamin’ny Israely.
  '4':
  - type: text
    content: 'Ary nankany Jordana i Gideona dia nita izy sy ny telonjato lahy niaraka taminy, koa na dia efa reraka aza izy dia mbola nanenjika ihany. '
  '5':
  - type: text
    content: 'Dia hoy izy tamin’ny mponina tao Sokota: Miangavy anareo aho, mba omeo mofo ny olona manaraka ahy fa reraka. Izaho izao dia manenjika an’i Zebaha sy i Zalmona, mpanjakan’ny Midianita. '
  '6':
  - type: text
    content: 'Nefa hoy ireo manamboninahitr’i Sokota: Moa efa eo am-pelatananao va i Zebaha sy i Zalmona ankehitriny no homenay mofo ny miaramilanao? '
  '7':
  - type: text
    content: 'Dia hoy i Gideona: Rehefa voatolotry NY TOMPO eo an-tanako i Zebaha sy i Zalmona dia horotidrotehiko amin’ny tsilo avy any an-tany efitra sy ny songosongo ny tenanareo. '
  '8':
  - type: text
    content: 'Ary niakatra avy teo izy ka nankany Penoela dia nanao teny tahaka izany koa tamin’ny olona tao. Ary ny mponina tao Penoela koa dia namaly azy tahaka ny navalin’ny mponina tao Sokota ihany. '
  '9':
  - type: text
    content: 'Dia niteny tamin’ny mponina tao Penoela koa izy hoe: Raha tafaverina soa amantsara aho dia horavako ity manda avo ity.'
