document_id: 2KI.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nasain’i Jeho naripaka ny fianakavian’i Ahaba
  - type: text
    content: 'Ary nanana zanaka fitopolo lahy tany Samaria i Ahaba. Ary nanoratra taratasy maromaro i Jeho ka nampitondrainy ho any Samaria ho an’ny lehibe any Jezirela sy ny mpitaiza ny zanak’i Ahaba, nilaza hoe: '
  '10':
  - type: text
    content: Aoka ho fantatrareo ary fa tsy hisy raraka an-tany ny tenin’NY TOMPO izay nolazainy ny amin’ny taranak’i Ahaba; fa NY TOMPO efa nanatanteraka izay nampilazainy an’i Elia mpanompony.
  '11':
  - type: text
    content: Koa novonoin’i Jeho izay sisa rehetra tamin’ny taranak’i Ahaba tao Jezirela sy ny olo-manankaja rehetra tao aminy mbamin’izay nifandray taminy ary koa ny mpisorony, koa tsy nisy niangana na dia iray akory aza.
  - type: heading
    content: Nampamono ny fianakavian’i Ahazia i Jeho
  '12':
  - type: text
    content: 'Dia niainga izy ka nankany Samaria. Teny an-dalana, tany Bety-Ekedan’ny Mpiandry ondry izy '
  '13':
  - type: text
    content: 'no nifanena tamin’ny rahalahin’i Ahazia, mpanjakan’ny Joda ka niteny hoe: Iza ange ianareo? Dia hoy ireo hoe: Rahalahin’i Ahazia izahay ary midina atỳ mba hamangy ny zanakalahin’ny mpanjaka sy ny zanakalahin’ny andriambavy. '
  '14':
  - type: text
    content: 'Hoy i Jeho: Sambory velona ireo! Dia nosamboriny ka novonoina teo akaikin’ny lavaka famorian-drano tao Bety-Ekeda izy roa amby efapolo lahy ireo; tsy nasiany niangana na dia iray akory aza.'
  - type: heading
    content: Mihaona amin’i Jonadaba i Jeho
  '15':
  - type: text
    content: 'Rehefa niala teo i Jeho dia nahita an’i Jonadaba, zanakalahin’i Rekaba, avy manatona azy. Niarahaba azy izy ary niteny taminy hoe: Mahitsy tahaka ny foko amin’ny fonao va ny fonao? Namaly i Jonadaba hoe: Eny. Raha izany ary no izy, hoy i Jeho, dia aoka isika hifandray tanana. Dia natolony ny tanany ka nampiakarin’i Jeho ho eo aminy tao anatin’ny kalesy fitondra miady izy. '
  '16':
  - type: text
    content: 'Ary hoy i Jeho: Andeha hiaraka amiko ka ho hitanao ny zotom-poko ho an’NY TOMPO. Dia noentiny niaraka taminy tamin’ny kalesy izy.'
  '17':
  - type: text
    content: Rehefa tonga tany Samaria i Jeho dia namono izay sisa rehetra tamin’ny tamingan’i Ahaba tany Samaria mandra-paharingany, araka ny tenin’NY TOMPO nolazainy tamin’i Elia.
  - type: heading
    content: Noravan’i Jeho ny fanompoana ny Baala
  '18':
  - type: text
    content: 'Namory ny vahoaka rehetra indray i Jeho ka niteny taminy hoe: I Ahaba nanompo ny '
  - type: text
    content: Baala
  - type: text
    content: ' kelikely ihany, fa i Jeho dia hanompo azy fatratra. '
  '19':
  - type: text
    content: 'Koa ankehitriny, vorio ho atỳ amiko ny mpaminanin’ny Baala rehetra, ny mpanompony rehetra sy ny mpisorony rehetra; aza avela hisy tsy ho tonga na dia iray akory aza; fa hamono zavatra betsaka ho fanatitra ho an’ny Baala aho; koa na iza na iza tsy ho tonga dia tsy hovelomina izy. Kanjo hevi-petsy nataon’i Jeho izany mba handringanany ny mpanompon’ny Baala. '
  '2':
  - type: text
    content: 'Rehefa tonga any aminareo ity taratasy ity, satria eo aminareo ireo zanakalahin’ny tomponareo ary ao aminareo koa ny kalesy fitondra miady, ny soavaly, ny tanàna mimanda ary ny fiadiana, '
  '20':
  - type: text
    content: 'Ary hoy i Jeho: Manokàna fivoriana masina ho an’ny Baala. Dia niantso fivoriana ireo. '
  '21':
  - type: text
    content: 'Dia nandefa iraka tany amin’ny Israely rehetra i Jeho ka tonga ny mpanompon’ny Baala rehetra; tsy nisy lehilahy tsy tonga teo na dia iray akory aza. Dia niditra tao amin’ny tempolin’ny Baala ireo ka feno hipoka ny trano. '
  '22':
  - type: text
    content: 'Dia hoy i Jeho tamin’ny mpitahiry ny fitafiana: Amoahy fitafiana ny mpanompon’ny Baala rehetra. Dia navoakany ny fitafiana hanaovany. '
  '23':
  - type: text
    content: 'Ary nankao amin’ny tempolin’ny Baala i Jeho sy i Jonadaba, zanak’i Rekaba, ka niteny tamin’ireo mpanompon’ny Baala hoe: Savao ary jereo tsara, fandrao misy mpanompon’NY TOMPO eo aminareo, fa tsy ny mpanompon’ny Baala ihany. '
  '24':
  - type: text
    content: Dia niditra izy rehetra hanolotra fanatitra samihafa alatsa-dra sy fanatitra dorana manontolo.
  - type: text
    content: 'I Jeho kosa dia efa nametraka valopolo lahy tao alatrano ka nitenenany hoe: Raha misy afa-mandositra ny olona izay nentiko ho eo an-tananareo, izay mamela azy handeha dia ny ainy no hisolo ny ainy. '
  '25':
  - type: text
    content: 'Rehefa vita ny fanolorany ny fanatitra dorana manontolo dia hoy i Jeho tamin’ny mpiambina sy ny mpanampy: Midira ka vonoy, ary aza avela hisy ho tafavoaka! Dia namely azy tamin’ny lelan-tsabatra ireo; ary ny mpiambina sy ny mpanampy dia nanary ny faty ary niditra tao amin’ny tanàna nisy ny tempolin’ny Baala. '
  '26':
  - type: text
    content: 'Dia navoakany ny tsangambato izay tao amin’ny tempolin’ny Baala ka natsipiny tao anaty afo. '
  '27':
  - type: text
    content: Nopotehiny koa ny tsangambaton’ny Baala sy ny tempoliny ka nataony trano fivoahana mandraka androany izany.
  - type: heading
    content: Tonga mpanjakan’ny Israely i Jeho
  '28':
  - type: text
    content: 'Toy izany no nandravan’i Jeho ny '
  - type: text
    content: Baala
  - type: text
    content: ' tsy ho amin’ny Israely. '
  '29':
  - type: text
    content: Na izany aza i Jeho dia tsy niala tamin’ny fahotan’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely, dia tamin’ireo ombilahy kely volamena izay tao Betela sy Dana.
  '3':
  - type: text
    content: 'dia zahao izay tsara sy mendrika indrindra amin’ny zanakalahin’ny tomponareo ary apetraho amin’ny sezafiandrianan’ny rainy izy ka miadia ary ho an’ny mpianakavin’ny tomponareo! '
  '30':
  - type: text
    content: 'Koa hoy NY TOMPO tamin’i Jeho: Satria efa nanao soa ianao tamin’ny nanaovanao izay mahitsy teo imasoko sady efa nataonao tamin’ny taranak’i Ahaba araka izay rehetra tao am-poko, dia hitoetra amin’ny sezafiandrianan’ny Israely ny taranakao hatramin’ny zafindohalika. '
  '31':
  - type: text
    content: Nefa i Jeho dia tsy nitandrina mba handeha amin’ny lalan’NY TOMPO, Andriamanitry ny Israely, tamin’ny fony manontolo; tsy niala tamin’ny fahotan’i Jeroboama izay nampanotany ny Israely izy.
  '32':
  - type: text
    content: 'Tamin’izany andro izany NY TOMPO no nanomboka nampihena velarana ny Israely; fa i Hazaela dia namely azy tany amin’ny sisintanin’ny Israely rehetra, '
  '33':
  - type: text
    content: 'hatrany Jordana no ho miantsinanana, dia ny tany Gileada rehetra, ny Gadita sy ny Robenita ary ny Manasita, hatrany Aroera, izay eo amoron’ny lohasahan-driaka Arnona, dia i Gileada sy i Basana. '
  '34':
  - type: text
    content: 'Ny tantaran’i Jeho sisa mbamin’izay rehetra nataony ary ny heriny rehetra, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  '35':
  - type: text
    content: 'Ary nodimandry any amin’ny razany i Jeho dia nalevina tao Samaria. I Joahaza zanany no nanjaka nandimby azy. '
  '36':
  - type: text
    content: Ny andro nanjakan’i Jeho tamin’ny Israely tao Samaria dia valo amby roapolo taona.
  '4':
  - type: text
    content: 'Dia raiki-tahotra indrindra ireo ka nifampilaza hoe: Indro, ny mpanjaka roa aza tsy nahajoro teo anatrehany, koa hataontsika ahoana no fahajoro? '
  '5':
  - type: text
    content: 'Ary ny lehiben’ny tandapa sy ny lehiben’ny tanàna ary ny loholona sy ireo mpitaiza dia nandefa iraka tany amin’i Jeho hilaza hoe: Mpanomponao izahay; koa izay rehetra ampanaovinao anay dia hataonay. Tsy hanangana mpanjaka izahay, fa izay sitraky ny fonao ihany no ataovy.'
  '6':
  - type: text
    content: 'Dia nanoratra taratasy taminy indray i Jeho nilaza hoe: Raha miandany amiko ary ianareo ka hankatò ny teniko dia tapaho ny lohan’ireo zanakalahin’ny tomponareo ary mankanesa atỳ amiko atỳ Jezirela rahampitso toy izao. Tamin’io izy fitopolo lahy zanaky ny mpanjaka dia tao amin’ireo lehiben’ny tanàna izay nahabe azy. '
  '7':
  - type: text
    content: 'Nony tonga tany amin’ireo ny taratasy dia naka ny zanakalahin’ny mpanjaka izy ireo ka namono azy fitopolo lahy ary nataony tao an-tsobika ny lohany dia nateriny tany amin’i Jeho tany Jezirela. '
  '8':
  - type: text
    content: 'Ary tonga ny iraka ka nanambara taminy hoe: Indro, efa noentina ny lohan’ireo zanakalahin’ny mpanjaka. Dia hoy i Jeho: Angony ho toko roa eo anoloan’ny vavahady izany mandra-paharain’ny andro. '
  '9':
  - type: text
    content: 'Nony maraina dia nivoaka ny trano i Jeho ary nitsangana teo anatrehan’ny vahoaka rehetra ka niteny hoe: Marina ianareo! Fa indro, izaho no nanao tetika fikomiana tamin’ny tompoko ka nahafaty azy; fa iza kosa no nahafaty ireto rehetra ireto? '
