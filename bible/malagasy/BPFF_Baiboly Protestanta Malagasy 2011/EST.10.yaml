document_id: EST.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fisandratan’i Mordekay tamin’ny farany
  - type: text
    content: 'Nampandoa hetra ny tany sy ny nosin-dranomasina i Ahasoerosy mpanjaka. '
  '2':
  - type: text
    content: 'Ary izay rehetra nataony araka ny fahefany sy ny heriny mbamin’ny filazana ny fahalehibiazan’i Mordekay, araka izay nanandratan’ny mpanjaka azy, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’i Media sy i Persia va izany? '
  '3':
  - type: text
    content: 'Fa i Mordekay jiosy no nanarakaraka an’i Ahasoerosy mpanjaka tamin’ny fahefana, sady nalaza tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' ka nankasitrahan’ny rahalahiny maro, satria nitady izay hahasoa ny fireneny izy sady nilaza fiadanana tamin’ny olona rehetra iray firazanana taminy.'
