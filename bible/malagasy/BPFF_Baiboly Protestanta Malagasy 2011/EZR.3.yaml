document_id: EZR.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mamerina indray ny fanompoam-pivavahana i Josoa sy i Zerobabela
  - type: text
    content: Nony tonga ny volana fahafito dia tafapetraka teny amin’ny tanànany avy ny Zanak’Israely.
  - type: text
    content: 'Dia nivory tany Jerosalema toy ny olona iray izy ireo. '
  '10':
  - type: text
    content: 'Rehefa napetraky ny mpanao trano ny fanorenan’ny tempolin’NY TOMPO dia nasaina nidera NY TOMPO ny mpisorona izay efa nanao ny fanamiany sy nitondra trompetra; ny levita zanak’i Asafa kosa dia nitondra kipantsona, araka ny nandidian’i Davida, mpanjakan’ny Israely. '
  '11':
  - type: text
    content: 'Dia nanao hira nifamalivaly nidera sy nisaotra NY TOMPO izy satria tsara Izy, ary mandrakizay ny famindrampony amin’ny Israely. Nihoby mafy ny olona rehetra raha nidera NY TOMPO satria vita ny fanorenan’ny tranon’NY TOMPO. '
  '12':
  - type: text
    content: 'Maro ny mpisorona sy ny levita ary ny lohan’ny fianakaviana, dia ny antitra izay efa nahita ny trano voalohany, no nitomany mafy dia mafy, nony naorina teo imasony indray izany trano izany; nefa maro koa no nanandratra ny feony nihoby sy nifaly. '
  '13':
  - type: text
    content: Tsy fantatry ny olona intsony raha fifaliana na fitomaniana no nisy tamin’izany horakoraka be izany satria nihoby mafy ny olona ka re lavitra ny horakoraka.
  '2':
  - type: text
    content: 'Ary nitsangana i Josoa zanak’i Jozadaka sy ny mpisorona rahalahiny ary i Zerobabela zanak’i Sealtiela sy ny rahalahiny ka nanorina ny alitaran’Andriamanitry ny Israely mba hanolorana fanatitra dorana manontolo eo amboniny, araka izay voasoratra ao amin’ny lalànan’i Mosesy, lehilahin’Andriamanitra. '
  '3':
  - type: text
    content: 'Naoriny teo amin’ilay efa niorenany taloha ihany ny alitara satria natahotra ny tompon-tany izy, avy eo dia nanolotra fanatitra dorana manontolo teo amboniny ho an’NY TOMPO izy, dia ny fanatitra dorana manontolo marain-tsy hariva. '
  '4':
  - type: text
    content: 'Nitandrina ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo koa izy, araka ny voasoratra, sady nanolotra fanatitra dorana manontolo isanandro araka ny isany avy, tahaka ny fanao; araka izay voatendry hatao isanandro avy. '
  '5':
  - type: text
    content: 'Rehefa afaka izany dia nanolotra ny fanatitra mandrakariva, dorana manontolo, sy ilay fanao amin’ny voaloham-bolana sy amin’ny fotoam-pivavahana nohamasinina rehetra izay voatendrin’NY TOMPO izy. Natolony koa ny avy amin’izay rehetra nanolotra fanatitra an-tsitrapo ho an’NY TOMPO. '
  '6':
  - type: text
    content: 'Tamin’ny andro voalohany tamin’ny volana fahafito no niantomboka nanolotra fanatitra dorana manontolo ho an’NY TOMPO izy ireo. Nefa tsy mbola napetraka tamin’izay ny fanorenan’ny tempolin’NY TOMPO. '
  '7':
  - type: text
    content: 'Nomena vola ny tambato sy ny mpandrafitra; nomena zavatra hohanina sy hosotroina ary diloilo ny Tiriana sy ny Sidoniana mba hitaterany an-dranomasina hazo sedera, avy any Libanona ka hatrany Jopa, araka ny lalana efa azony tamin’i Kirosy, mpanjakan’i Persia. '
  '8':
  - type: text
    content: 'Tamin’ny volana faharoa tamin’ny taona faharoa taorianan’ny nahatongavany tany amin’ny tranon’Andriamanitra tany Jerosalema dia nanomboka niasa i Zerobabela, zanak’i Sealtiela, sy i Josoa, zanak’i Jozadaka, mbamin’ny rahalahiny sisa, dia ny mpisorona sy ny '
  - type: text
    content: levita
  - type: text
    content: ' ary izay rehetra tonga tany Jerosalema avy tany amin’ny fahababoana ka nanendry ny levita izay hatramin’ny roapolo taona noho miakatra izy ho tonian’ny asa amin’ny tranon’NY TOMPO. '
  '9':
  - type: text
    content: 'Dia niara-nitsangana i Josoa sy ny zanany ary ny rahalahiny, mbamin’i Kadmiela sy ny zanany, zanak’i Joda, ho tonian’ny mpiasa tamin’ny tranon’Andriamanitra, ary ny zanak’i Henadada koa mbamin’ny zanany sy ny levita rahalahiny. '
