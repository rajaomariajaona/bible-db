document_id: EZR.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamerina indray ny fanompoam-pivavahana i Josoa sy i Zerobabela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nony tonga ny volana fahafito dia tafapetraka teny amin’ny tanànany avy ny Zanak’Israely.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nivory tany Jerosalema toy ny olona iray izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nitsangana i Josoa zanak’i Jozadaka sy ny mpisorona rahalahiny ary i Zerobabela zanak’i Sealtiela sy ny rahalahiny ka nanorina ny alitaran’Andriamanitry ny Israely mba hanolorana fanatitra dorana manontolo eo amboniny, araka izay voasoratra ao amin’ny lalànan’i Mosesy, lehilahin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Naoriny teo amin’ilay efa niorenany taloha ihany ny alitara satria natahotra ny tompon-tany izy, avy eo dia nanolotra fanatitra dorana manontolo teo amboniny ho an’NY TOMPO izy, dia ny fanatitra dorana manontolo marain-tsy hariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nitandrina ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo koa izy, araka ny voasoratra, sady nanolotra fanatitra dorana manontolo isanandro araka ny isany avy, tahaka ny fanao; araka izay voatendry hatao isanandro avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa afaka izany dia nanolotra ny fanatitra mandrakariva, dorana manontolo, sy ilay fanao amin’ny voaloham-bolana sy amin’ny fotoam-pivavahana nohamasinina rehetra izay voatendrin’NY TOMPO izy. Natolony koa ny avy amin’izay rehetra nanolotra fanatitra an-tsitrapo ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tamin’ny andro voalohany tamin’ny volana fahafito no niantomboka nanolotra fanatitra dorana manontolo ho an’NY TOMPO izy ireo. Nefa tsy mbola napetraka tamin’izay ny fanorenan’ny tempolin’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nomena vola ny tambato sy ny mpandrafitra; nomena zavatra hohanina sy hosotroina ary diloilo ny Tiriana sy ny Sidoniana mba hitaterany an-dranomasina hazo sedera, avy any Libanona ka hatrany Jopa, araka ny lalana efa azony tamin’i Kirosy, mpanjakan’i Persia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’ny volana faharoa tamin’ny taona faharoa taorianan’ny nahatongavany tany amin’ny tranon’Andriamanitra tany Jerosalema dia nanomboka niasa i Zerobabela, zanak’i Sealtiela, sy i Josoa, zanak’i Jozadaka, mbamin’ny rahalahiny sisa, dia ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' ary izay rehetra tonga tany Jerosalema avy tany amin’ny fahababoana ka nanendry ny levita izay hatramin’ny roapolo taona noho miakatra izy ho tonian’ny asa amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niara-nitsangana i Josoa sy ny zanany ary ny rahalahiny, mbamin’i Kadmiela sy ny zanany, zanak’i Joda, ho tonian’ny mpiasa tamin’ny tranon’Andriamanitra, ary ny zanak’i Henadada koa mbamin’ny zanany sy ny levita rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa napetraky ny mpanao trano ny fanorenan’ny tempolin’NY TOMPO dia nasaina nidera NY TOMPO ny mpisorona izay efa nanao ny fanamiany sy nitondra trompetra; ny levita zanak’i Asafa kosa dia nitondra kipantsona, araka ny nandidian’i Davida, mpanjakan’ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nanao hira nifamalivaly nidera sy nisaotra NY TOMPO izy satria tsara Izy, ary mandrakizay ny famindrampony amin’ny Israely. Nihoby mafy ny olona rehetra raha nidera NY TOMPO satria vita ny fanorenan’ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Maro ny mpisorona sy ny levita ary ny lohan’ny fianakaviana, dia ny antitra izay efa nahita ny trano voalohany, no nitomany mafy dia mafy, nony naorina teo imasony indray izany trano izany; nefa maro koa no nanandratra ny feony nihoby sy nifaly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy fantatry ny olona intsony raha fifaliana na fitomaniana no nisy tamin’izany horakoraka be izany satria nihoby mafy ny olona ka re lavitra ny horakoraka.
