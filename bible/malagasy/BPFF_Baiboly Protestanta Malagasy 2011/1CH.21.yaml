document_id: 1CH.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampanisa ny vahoaka Israely i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Sam 24.1-9
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nitsangana hampidi-doza tamin’ny Israely i Satana ka nanome saina an’i Davida hanisa ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy i Davida tamin’i Joaba sy tamin’ireo lehiben’ny vahoaka: Mandehana, isao ny Israely hatrany Bery-Sheba ka hatrany Dana; dia ento atỳ amiko ny isany mba ho fantatro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy i Joaba: NY TOMPO anie hampitombo ny olony ho injato toy izao, na firy na firy izy; fa moa tsy mpanompon’ny tompoko va izy rehetra, ry mpanjaka tompoko? Koa inona indray no itadiavan’ny tompoko izany zavatra izany? Nahoana izany zavatra izany no hitondra heloka ho an’ny Israely? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy azon’i Joaba nolavina anefa ny tenin’ny mpanjaka; koa niainga izy ka nitety ny Israely rehetra ary tonga tany Jerosalema indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia natolotr’i Joaba an’i Davida ny isan’ny olona voalamina ka nisy iray hetsy sy iray tapitrisa ny lehilahy mahatan-tsabatra teo amin’ny Israely; fito alina sy efatra hetsy kosa ny lehilahy mahatan-tsabatra teo amin’ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa tsy mba nalaminy ny Levy sy ny Benjamina, satria fahavetavetana tamin’i Joaba ny tenin’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary tsy sitrak’Andriamanitra izany zavatra izany ka namely ny Israely Izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namalian’Andriamanitra ny fahadisoan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Sam 24.10-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy i Davida tamin’Andriamanitra: Efa nanota be aho tamin’izao nataoko izao! Koa ankehitriny, mifona aminao aho, esory ny heloky ny mpanomponao, fa efa nanao hadalana lehibe tokoa aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Gada mpahitan’i Davida: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mandehana ka lazao amin’i Davida hoe: Izao no lazain’NY TOMPO: Zavatra telo loha no apetrako eto anoloanao, koa fidio izay iray hataoko aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nankany amin’i Davida i Gada ka niteny taminy hoe: Izao no lazain’NY TOMPO: Anao ny safidy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mosary telo taona va, sa fandringanana eo alohan’ny fahavalonao telo volana, raha tratry ny sabatry ny fahavalonao ianao, sa ny sabatry NY TOMPO, dia areti-mandringana no hamely ny tany hateloana ka ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ' no handringana manerana ny tanin’ny Israely rehetra? Koa hevero tsara izay valiny hoentiko miverina any amin’izay naniraka ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy i Davida tamin’i Gada: Tery loatra aho! Nefa aleoko ho azon’ny tanan’NY TOMPO, fa lehibe ny famindrampony, toy izay ho azon’izay tanan’olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nasian’NY TOMPO areti-mandringana ny Israely ka nahafatesana fito alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Andriamanitra naniraka Anjely hankany Jerosalema handrava azy; nefa raha ilay mbola nandrava iny Izy dia nijery NY TOMPO ka nanenina ny amin’ny loza ka niteny tamin’ilay Anjely nandrava hoe: Aoka izay! Atsaharo amin’izay ny tananao. Ary nitsangana teo anilan’ny famoloan’i Ornana jebosita ilay Anjelin’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nanopy ny masony i Davida ka nahita ilay Anjelin’NY TOMPO nijoro teo anelanelan’ny tany sy ny lanitra sady nitana sabatra voatsoaka teny an-tanany, izay natondrony manandrify an’i Jerosalema. Dia niankohoka i Davida sy ny loholon’ny Israely, izay efa samy nitafy lamba fisaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy i Davida tamin’Andriamanitra: Tsy izaho va no nandidy hanisa ny vahoaka? Izaho no nanota sy nanao izay ratsy tokoa; fa ireo ondry ireo kosa, inona moa no mba nataony? Eny, RY TOMPO Andriamanitro ô, mifona aminao re aho, aoka ny tananao hamely ahy sy ny fianakavian’ny raiko, fa aza ny olonao no asianao amin’ny areti-mandringana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanorina alitara ho an’NY TOMPO i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Sam 24.18-25
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nasain’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ' hilaza amin’i Davida i Gada mba hiakatra hanorina alitara ho an’NY TOMPO ao amin’ny famoloan’i Ornana jebosita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia niakatra i Davida araka ny tenin’i Gada, izay nolazainy tamin’ny anaran’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary niherika i Ornana ka nahita ilay Anjely; ny zanany efa-dahy izay teo aminy tamin’io dia lasa niery. I Ornana tamin’izay dia nanosihosy vary tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nony tonga teo amin’i Ornana i Davida dia nijery i Ornana ka nahita an’i Davida, ary niala avy teo amin’ny famoloana izy ka niankohoka tamin’ny tany teo anatrehan’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy i Davida tamin’i Ornana: Mba omeo ahy amin’izay tokony ho vidiny ity famoloana ity mba hanorenako alitara ho an’NY TOMPO; omeo ahy izany mba hitsaharan’ny areti-mandringana tsy hamely ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy i Ornana tamin’i Davida: Ento ary ho anao ary aoka ny mpanjaka tompoko hanao izay sitrany; indro, omeko koa ny omby ho fanatitra dorana manontolo, ny fivelezam-bary ho kitay ary ny varimbazaha ho fanatitra avy amin’ny zavamaniry; foiko avokoa izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nefa hoy i Davida mpanjaka tamin’i Ornana: Tsia, fa hovidiko tokoa araka izay tokony ho vidiny; fa tsy haka izay anao ho an’NY TOMPO aho ary tsy hanolotra fanatitra dorana manontolo amin’izay azoko maimaimpoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nomen’i Davida volamena milanja sekela eninjato i Ornana ho vidin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary nanorina alitara ho an’NY TOMPO teo i Davida ka nanolotra fanatitra dorana manontolo sy fanati-pihavanana; dia niantso NY TOMPO izy ka novaliny tamin’ny afo avy tany an-danitra, izay latsaka teo amin’ny alitara fandoroana ny fanatitra dorana manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’ilay Anjely, dia nampidiriny tamin’ny tranony ny sabany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tamin’izany andro izany, nony hitan’i Davida fa novalin’NY TOMPO teo amin’ny famoloan’i Ornana jebosita izy dia namono zavatra hatao fanatitra teo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa ny tabernakelin’NY TOMPO izay nataon’i Mosesy tany an-tany efitra sy ny alitara fandoroana ny fanatitra dorana manontolo kosa dia teo amin’ny toerana fanaovana sorona tao Gibeona tamin’izany fotoana izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: nefa tsy nahazo nankeo anoloan’izany hanontany amin’Andriamanitra i Davida; fa raiki-tahotra izy noho ny sabatr’ilay Anjelin’NY TOMPO.
