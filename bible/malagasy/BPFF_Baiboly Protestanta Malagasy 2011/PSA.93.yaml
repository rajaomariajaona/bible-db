document_id: PSA.93,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: NY TOMPO no Mpanjaka!
  - type: text
    content: NY TOMPO no Mpanjaka! Mitafy voninahitra Izy;
  - type: text
    content: NY TOMPO mitafy, eny, misikina hery Izy;
  - type: text
    content: koa izao rehetra izao dia nampitoerina ka tsy hihetsika.
  '2':
  - type: text
    content: Ny sezafiandriananao dia nampitoerina hatramin’ny fahagola;
  - type: text
    content: hatrizay hatrizay Ianao.
  '3':
  - type: text
    content: Manandra-peo ny ony, TOMPO ô!
  - type: text
    content: Eny, manandra-peo ny ony;
  - type: text
    content: mampirohondrohona ny feony ny ony.
  '4':
  - type: text
    content: Mihoatra noho ny rano sady be no mahery;
  - type: text
    content: eny, mihoatra noho ny onjan-dranomasina lehibe
  - type: text
    content: ny voninahitry NY TOMPO any amin’ny avo.
  '5':
  - type: text
    content: Ny teny vavolombelonao dia marina tanteraka;
  - type: text
    content: fahamasinana no mendrika ny tranonao mandritra ny andro maro, TOMPO ô!
