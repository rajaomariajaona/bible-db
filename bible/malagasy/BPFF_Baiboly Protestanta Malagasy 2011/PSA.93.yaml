- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO no Mpanjaka!
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY TOMPO no Mpanjaka! Mitafy voninahitra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO mitafy, eny, misikina hery Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa izao rehetra izao dia nampitoerina ka tsy hihetsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny sezafiandriananao dia nampitoerina hatramin’ny fahagola;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrizay hatrizay Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Manandra-peo ny ony, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, manandra-peo ny ony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampirohondrohona ny feony ny ony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mihoatra noho ny rano sady be no mahery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mihoatra noho ny onjan-dranomasina lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny voninahitry NY TOMPO any amin’ny avo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny teny vavolombelonao dia marina tanteraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fahamasinana no mendrika ny tranonao mandritra ny andro maro, TOMPO ô!
