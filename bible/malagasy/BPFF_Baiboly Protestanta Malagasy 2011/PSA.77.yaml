document_id: PSA.77,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Amin’ny andro fahoriako no itadiavako NY TOMPO
  - type: text
    content: Ho an’ny mpiventy hira. Al-Jedotona. Salamo nataon’i Asafa.
  - type: text
    content: Ny feoko dia mankany amin’Andriamanitra ka mitaraina aho;
  - type: text
    content: eny, ny feoko dia mankany amin’Andriamanitra ka manongilan-tsofina amiko Izy.
  '10':
  - type: text
    content: 'Hoy aho: Izao no mahararirary ny foko,'
  - type: text
    content: dia ny niovan’ny tanana ankavanan’ny Avo Indrindra.
  '11':
  - type: text
    content: Hampahatsiaro ny asan’NY TOMPO aho
  - type: text
    content: fa mahatsiaro ny fahagagana nataonao fahiny.
  '12':
  - type: text
    content: Eny, hisaina ny asanao rehetra aho
  - type: text
    content: ary hihevitra ny nataonao.
  '13':
  - type: text
    content: Andriamanitra ô, amin’ny fahamasinana ny lalanao.
  - type: text
    content: Iza no andriamanitra lehibe tahaka an’Andriamanitra?
  '14':
  - type: text
    content: Ianao no Andriamanitra izay manao fahagagana;
  - type: text
    content: nampahafantatra ny herinao teny amin’ny firenena Ianao.
  '15':
  - type: text
    content: Navotan’ny sandrinao ny olonao,
  - type: text
    content: 'dia ny taranak’i Jakoba sy i Josefa. '
  - type: text
    content: Fiatoana.
  '16':
  - type: text
    content: Nahita Anao ny ranobe, Andriamanitra ô,
  - type: text
    content: nahita Anao ny ranobe ka toran-kovitra;
  - type: text
    content: eny, nanonjanonja ny lalina.
  '17':
  - type: text
    content: Nandatsaka ranonorana ny rahona;
  - type: text
    content: nikotrokotroka ny lanitra;
  - type: text
    content: nifanaretsaka koa ny zana-tsipìkanao.
  '18':
  - type: text
    content: Ny fikotrokotroky ny kotrokorana dia miaraka amin’ny tadio;
  - type: text
    content: nahazava izao rehetra izao ny tselatra;
  - type: text
    content: nihovotrovotra sy nihorohoro ny tany.
  '19':
  - type: text
    content: Tany amin’ny ranomasina ny lalanao
  - type: text
    content: ary ny nalehanao dia tany amin’ny rano mandriaka
  - type: text
    content: ka tsy fantatra ny dian-tongotrao.
  '2':
  - type: text
    content: Amin’ny andro fahoriako no itadiavako ny Tompo;
  - type: text
    content: misandratra mandritra ny alina ny tanako fa tsy vizana;
  - type: text
    content: ny fanahiko dia tsy mety ampiononina.
  '20':
  - type: text
    content: Tamin’ny tanan’i Mosesy sy i Arona
  - type: text
    content: no nitarihanao ny olonao toy ny andian’ondry.
  '3':
  - type: text
    content: Mahatsiaro an’Andriamanitra aho ka misento;
  - type: text
    content: 'te hieritreritra aho, reraka ny fanahiko. '
  - type: text
    content: Fiatoana.
  '4':
  - type: text
    content: Tsy avelanao hahita torimaso aho;
  - type: text
    content: mitebiteby aho ka tsy mahateny.
  '5':
  - type: text
    content: Mihevitra ny andro fahiny aho,
  - type: text
    content: dia ny taon-dasa ela.
  '6':
  - type: text
    content: Mahatsiaro ny hirako tamin’ny alina aho;
  - type: text
    content: mamadibadika ao am-poko aho
  - type: text
    content: 'ary ny fanahiko dia manontany hoe:'
  '7':
  - type: text
    content: Hanary mandrakizay va ny Tompo?
  - type: text
    content: Tsy hankasitraka intsony va Izy?
  '8':
  - type: text
    content: Efa nitsahatra mandrakizay va ny famindrampony?
  - type: text
    content: Efa tapitra tsy ho an’ny taranaka rehetra va ny teniny?
  '9':
  - type: text
    content: Efa nanadino hamindra fo va Andriamanitra?
  - type: text
    content: 'Efa nohidiany an-katezerana va ny fiantrany? '
  - type: text
    content: Fiatoana.
