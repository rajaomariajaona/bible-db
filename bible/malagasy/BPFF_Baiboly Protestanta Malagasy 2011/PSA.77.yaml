document_id: PSA.77
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amin’ny andro fahoriako no itadiavako NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Al-Jedotona. Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny feoko dia mankany amin’Andriamanitra ka mitaraina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny feoko dia mankany amin’Andriamanitra ka manongilan-tsofina amiko Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Amin’ny andro fahoriako no itadiavako ny Tompo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misandratra mandritra ny alina ny tanako fa tsy vizana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanahiko dia tsy mety ampiononina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mahatsiaro an’Andriamanitra aho ka misento;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'te hieritreritra aho, reraka ny fanahiko. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy avelanao hahita torimaso aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitebiteby aho ka tsy mahateny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mihevitra ny andro fahiny aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny taon-dasa ela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mahatsiaro ny hirako tamin’ny alina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamadibadika ao am-poko aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny fanahiko dia manontany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hanary mandrakizay va ny Tompo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hankasitraka intsony va Izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Efa nitsahatra mandrakizay va ny famindrampony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa tapitra tsy ho an’ny taranaka rehetra va ny teniny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa nanadino hamindra fo va Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Efa nohidiany an-katezerana va ny fiantrany? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy aho: Izao no mahararirary ny foko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny niovan’ny tanana ankavanan’ny Avo Indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hampahatsiaro ny asan’NY TOMPO aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahatsiaro ny fahagagana nataonao fahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, hisaina ny asanao rehetra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihevitra ny nataonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andriamanitra ô, amin’ny fahamasinana ny lalanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no andriamanitra lehibe tahaka an’Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ianao no Andriamanitra izay manao fahagagana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampahafantatra ny herinao teny amin’ny firenena Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Navotan’ny sandrinao ny olonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ny taranak’i Jakoba sy i Josefa. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nahita Anao ny ranobe, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahita Anao ny ranobe ka toran-kovitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, nanonjanonja ny lalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nandatsaka ranonorana ny rahona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nikotrokotroka ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nifanaretsaka koa ny zana-tsipìkanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny fikotrokotroky ny kotrokorana dia miaraka amin’ny tadio;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahazava izao rehetra izao ny tselatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nihovotrovotra sy nihorohoro ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tany amin’ny ranomasina ny lalanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny nalehanao dia tany amin’ny rano mandriaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy fantatra ny dian-tongotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tamin’ny tanan’i Mosesy sy i Arona
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nitarihanao ny olonao toy ny andian’ondry.
