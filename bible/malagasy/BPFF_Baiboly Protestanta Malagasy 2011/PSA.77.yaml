document_id: PSA.77,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amin’ny andro fahoriako no itadiavako NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-Jedotona. Salamo nataon’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny feoko dia mankany amin’Andriamanitra ka mitaraina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny feoko dia mankany amin’Andriamanitra ka manongilan-tsofina amiko Izy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hoy aho: Izao no mahararirary ny foko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny niovan’ny tanana ankavanan’ny Avo Indrindra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hampahatsiaro ny asan’NY TOMPO aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahatsiaro ny fahagagana nataonao fahiny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Eny, hisaina ny asanao rehetra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hihevitra ny nataonao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Andriamanitra ô, amin’ny fahamasinana ny lalanao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no andriamanitra lehibe tahaka an’Andriamanitra?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ianao no Andriamanitra izay manao fahagagana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nampahafantatra ny herinao teny amin’ny firenena Ianao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Navotan’ny sandrinao ny olonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ny taranak’i Jakoba sy i Josefa. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nahita Anao ny ranobe, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nahita Anao ny ranobe ka toran-kovitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nanonjanonja ny lalina.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nandatsaka ranonorana ny rahona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nikotrokotroka ny lanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nifanaretsaka koa ny zana-tsipìkanao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny fikotrokotroky ny kotrokorana dia miaraka amin’ny tadio;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nahazava izao rehetra izao ny tselatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nihovotrovotra sy nihorohoro ny tany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tany amin’ny ranomasina ny lalanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny nalehanao dia tany amin’ny rano mandriaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy fantatra ny dian-tongotrao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Amin’ny andro fahoriako no itadiavako ny Tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misandratra mandritra ny alina ny tanako fa tsy vizana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanahiko dia tsy mety ampiononina.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tamin’ny tanan’i Mosesy sy i Arona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nitarihanao ny olonao toy ny andian’ondry.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mahatsiaro an’Andriamanitra aho ka misento;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'te hieritreritra aho, reraka ny fanahiko. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy avelanao hahita torimaso aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitebiteby aho ka tsy mahateny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mihevitra ny andro fahiny aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny taon-dasa ela.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mahatsiaro ny hirako tamin’ny alina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamadibadika ao am-poko aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny fanahiko dia manontany hoe:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hanary mandrakizay va ny Tompo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hankasitraka intsony va Izy?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Efa nitsahatra mandrakizay va ny famindrampony?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tapitra tsy ho an’ny taranaka rehetra va ny teniny?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Efa nanadino hamindra fo va Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Efa nohidiany an-katezerana va ny fiantrany? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
