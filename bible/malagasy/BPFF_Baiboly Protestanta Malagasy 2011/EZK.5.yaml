document_id: EZK.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hikapoka ny Israely Andriamanitra
  - type: text
    content: 'Ary ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', makà sabatra maranitra ka ampiasao toy ny harezan’ny mpanala volombava izany, dia anarato ny lohanao sy ny somotrao, ary makà mizana dia zarao ny volo. '
  '10':
  - type: text
    content: 'Koa ny ray dia hihinana ny zanany eo aminao, ary ny zanaka kosa hihinana ny rainy. Hanao fitsarana eo aminao Aho, koa izay sisa rehetra aminao dia haeliko eny amin’ny rivotra rehetra. '
  '11':
  - type: text
    content: 'Eny, raha velona koa Aho, hoy NY TOMPO Andriamanitra, noho ny nandotoanao ny fitoerako masina tamin’ny zavatra maharikorikonao rehetra sy tamin’ny fahavetavetanao rehetra, Izaho kosa dia hanary ka tsy hiantra anao ny masoko; eny, tsy hamindra fo Aho. '
  '12':
  - type: text
    content: Ny ampahatelony eo aminao dia ho fatin’ny areti-mandringana na ho ringan’ny mosary eo aminao; ary ny ampahatelony dia ho lavon’ny sabatra manodidina anao; ary ny ampahatelony sisa dia haeliko eny amin’ny rivotra rehetra; ary hanatsoaka sabatra hoentiko manenjika azy Aho.
  '13':
  - type: text
    content: 'Ary ho tanteraka amin’izany ny fahatezerako, sady hampariko aminy ny fahatezerako ka hamaly faty Aho; dia ho fantany fa Izaho TOMPO no niteny izany tamin’ny fahasaro-piaroko, rehefa notanterahiko taminy ny fahatezerako. '
  '14':
  - type: text
    content: 'Ary hataoko lao ka ho fandatsa eny amin’ny firenena izay manodidina anao ianao eo imason’izay rehetra mandalo. '
  '15':
  - type: text
    content: 'Koa ho latsa, fitenenan-dratsy, famaizana sy figagana amin’ny Jentilisa manodidina ianao, rehefa manao fitsarana aminao Aho, amin’ny fahatezerana sy ny fahavinirana ary amin’ny fananarana mafy. Izaho TOMPO no niteny izany; '
  '16':
  - type: text
    content: 'rehefa alefako ho fandringanana azy ny mosary dia zana-tsipìka ratsy halefako handringana anareo izany sady hampitomboiko ny mosary eo aminareo ka hotapahiko ny mofonareo izay tohan’aina. '
  '17':
  - type: text
    content: Dia handefasako mosary sy biby masiaka eo aminareo ka hahalany fara anareo izany; handroso eo aminao ny areti-mandringana sy ny fandatsahan-dra, ary hataoko mihatra aminao ny sabatra. Izaho TOMPO no niteny izany.
  '2':
  - type: text
    content: 'Ny ampahatelony dia doroy amin’ny afo ao an-tanàna rehefa tapitra ny andron’ny fahirano; alao koa ny ampahatelony ka asio ny sabatra manodidina ny tanàna; ary ny ampahatelony sisa dia aelezo eny amin’ny rivotra; ary hanatsoaka sabatra ho enti-manenjika azy Aho. '
  '3':
  - type: text
    content: 'Ary analao vitsivitsy ireo ka fonosy ao amin’ny sisin’akanjonao. '
  '4':
  - type: text
    content: Ary ireny indray dia mbola analao koa ka atsipazo ao anaty afo izany dia doroy ao. Hisy afo hivoaka avy aminy ho amin’ny taranak’Israely rehetra.
  '5':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Ity Jerosalema ity dia nataoko eo afovoan’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ka voahodidin’ireny tany ireny izy. '
  '6':
  - type: text
    content: 'Nanao ditra tsy nanaraka ny fitsipiko sy ny didiko izy, fa nanao izay ratsy mihoatra noho ny Jentilisa sy ny tany manodidina azy; eny, nandà ny fitsipiko sy ny didiko izy ka tsy nandeha araka izany. '
  '7':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Satria ianareo dia nitabataba mihoatra noho ny firenena manodidina anareo ka tsy nandeha araka ny didiko na nanaraka ny fitsipiko sady tsy nanaraka ny fitsipiky ny firenena izay manodidina anareo aza, '
  '8':
  - type: text
    content: 'dia izao no lazain’NY TOMPO Andriamanitra: Indro, Izaho dia Izaho no manohitra anao ka hanao fitsarana eo aminao eo imason’ny Jentilisa. '
  '9':
  - type: text
    content: 'Noho ny fahavetavetanao rehetra dia hataoko aminao izay tsy mbola nataoko, sady tsy hataoko tahaka izany intsony. '
