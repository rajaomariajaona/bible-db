document_id: JDG.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan’i Samsona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary ny Zanak’Israely dia nanao izay ratsy teo imason’NY TOMPO indray ka natolotry NY TOMPO teo an-tanan’ny Filistina nandritra ny efapolo taona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nisy lehilahy avy tany Zora, avy amin’ny fianakavian’ny Danita, i Manoa no anarany; ary momba ny vadiny ka tsy niteraka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary niseho tamin-dRavehivavy ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ' ka niteny taminy hoe: Indro, momba ianao ka tsy niteraka; nefa hanana anaka ianao ka hiteraka zazalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa mitandrema ianao ankehitriny ka aza misotro divay na toaka ary aza mihinana izay zavatra maloto, na inona na inona izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa indro, hanana anaka ianao ka hiteraka zazalahy; ary tsy hokasihin-kareza ny lohany fa ho Nazirita ho an’Andriamanitra hatrany an-kibo ny zaza. Izy no hanomboka hamonjy ny Israely amin’ny tanan’ny Filistina. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nandeha Ravehivavy ka nilaza tamin’ny vadiny hoe: Nisy lehilahin’Andriamanitra tonga tamiko, ary nahatahotra indrindra ny fijery azy, tahaka ny fijery ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’Andriamanitra
  - type: text
    text: ' ka tsy nanontany Azy izay niaviany aho, ary tsy nambarany ahy ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy Izy tamiko: Indro, hanana anaka ianao ka hiteraka zazalahy; koa ankehitriny, aza misotro divay na toaka ianao ary aza mihinana izay zavatra maloto na inona na inona izany; fa ho Nazirita ho an’Andriamanitra hatrany an-kibo ka ambara-pahafatiny ny zaza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nangataka tamin’NY TOMPO i Manoa hoe: Tompo ô, aoka mba hankaty aminay indray ny lehilahin’Andriamanitra, ilay nirahinao, ka hampianatra anay ny fomba hitondranay ny zaza izay ho teraka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Andriamanitra nihaino ny feon’i Manoa ka nankany amin-dRavehivavy indray ilay Anjelin’Andriamanitra raha tany an-tsaha izy; fa tsy teo aminy i Manoa vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nihazakazaka haingana Ravehivavy ka nanambara tamin’ny vadiny hoe: Indro, niseho tamiko indray ny lehilahy izay tonga tamiko tamin’ilay indray andro! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nitsangana i Manoa ka nandeha nanaraka ny vadiny, dia nankany amin-dRalehilahy ka niteny taminy hoe: Ianao moa ilay lehilahy niteny tamin-dRavehivavy? Dia hoy Izy: Eny, Izaho no Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy i Manoa: Raha tanteraka ilay teninao, ahoana ange no fomba hitondranay ny zaza ary inona no ho asany? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy ilay iraky NY TOMPO tamin’i Manoa: Izay rehetra nolazaiko tamin-dRavehivavy dia aoka hotandremany avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izay rehetra avy amin’ny voaloboka dia aza avela hohaniny, ary aza avela hisotro divay na toaka izy, na hihinana izay zavatra tsy madio na inona na inona izany; izay rehetra nandidiako azy dia aoka hotandremany avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy i Manoa tamin’ilay Anjelin’NY TOMPO: Aoka mba hotananay Ianao mandra-panomanay zanak’osy ho Anao! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy ilay Anjelin’NY TOMPO tamin’i Manoa: Na dia tananao aza Aho, tsy mba hihinana amin’ny mofonao; fa raha hanolotra fanatitra dorana manontolo ianao, dia aoka NY TOMPO no hanoloranao izany. Fa tsy fantatr’i Manoa ho Anjelin’NY TOMPO Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Manoa tamin’ilay Anjelin’NY TOMPO: Iza moa no anaranao mba hanomezanay voninahitra Anao, rehefa tanteraka ny teninao? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy ilay Anjelin’NY TOMPO taminy: Nahoana no manontany ny anarako ianao? Anarana mahagaga izany! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia naka ny zanak’osy sy ny fanatitra avy amin’ny zavamaniry i Manoa ka nanolotra ireny ho fanatitra dorana manontolo teo amin’ny vatolampy ho an’NY TOMPO izay miasa amin’ny fomba mahagaga; ary nijery izany i Manoa sy ny vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rehefa niakatra ho amin’ny lanitra ny lelafo avy teo amin’ny alitara dia niakatra teo anatin’ny lelafo avy teo amin’ny alitara ilay Anjelin’NY TOMPO. Ary nijery izany i Manoa sy ny vadiny dia niankohoka tamin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary tsy niseho tamin’i Manoa sy ny vadiny intsony ilay Anjelin’NY TOMPO. Dia fantatr’i Manoa tamin’izay fa Anjelin’NY TOMPO izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy i Manoa tamin’ny vadiny: Ho faty tokoa isika satria efa nahita an’Andriamanitra! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy ny vadiny taminy: Raha sitraky NY TOMPO ny hahafaty antsika dia tsy ho nety nandray fanatitra dorana manontolo sy fanatitra avy amin’ny zavamaniry avy tamin’ny tanantsika akory Izy, ary tsy ho nampahita antsika izany rehetra izany, ary tsy ho nampandre antsika izany zavatra izany ankehitriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary niteraka zazalahy Ravehivavy ka ny anarany nataony hoe Samsona. Dia nitombo ny zaza ary NY TOMPO nitahy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia nanomboka nanetsika azy ny Fanahin’NY TOMPO tany Mahane-Dana, teo anelanelan’i Zora sy i Estaola.
