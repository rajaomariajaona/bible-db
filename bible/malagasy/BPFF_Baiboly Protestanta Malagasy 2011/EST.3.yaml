document_id: EST.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nandà tsy handohalika teo anatrehan’i Hamana i Mordekay
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa afaka izany zavatra izany dia nasandratr’i Ahasoerosy mpanjaka i Hamana, zanak’i Hamedota agagita, ka nomeny voninahitra, ary ny toerany dia nataony ambony noho ny an’ny mpitarika hafa niaraka taminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nesorin’ny mpanjaka tamin’ny tanany ny peratra fitombo-kaseny ka nomeny an’i Hamana, zanak’i Hamedota agagita, fahavalon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’i Hamana: Homena anao ny volafotsy mbamin’ny vahoaka koa hanaovanao azy araka izay sitrakao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nantsoina ny mpitantsoratry ny mpanjaka tamin’ny andro fahatelo amby folo tamin’ny volana voalohany ka nosoratana araka ny didy rehetra nomen’i Hamana izany, ho amin’ireo solontenan’ny mpanjaka sy ireo governora amin’ny fari-piadidiana tsirairay ary ny mpitondra ny firenena rehetra, ho any amin’ny fari-piadidiana tsirairay araka ny fomba fanoratany avy ary ho amin’ny firenena tsirairay araka ny fiteniny avy. Tamin’ny anaran’i Ahasoerosy mpanjaka no nanoratany azy ka notombohiny tamin’ny peratra fitombo-kasen’ny mpanjaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nisy taratasy maro nampitondrainy ny iraka haingam-pandeha ho any amin’ny fari-piadidiana rehetra ao amin’ny fanjakan’ny mpanjaka mba handringanana sy hamonoana ary handripahana ny Jiosy rehetra, na tanora na antitra, hatramin’ny zaza amam-behivavy aza, amin’ny indray andro monja, amin’ny andro fahatelo amby folo amin’ny volana faharoa amby folo, na ny volana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Adara
    - type: text
      text: '; ary horobaina avokoa ny fananany rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ny dika mitovy amin’ny teny izay natao didy ho amin’ny fari-piadidiana tsirairay ao amin’ny fanjakana dia novakina tamin’ny olona rehetra mba hampiomana azy ho amin’izany andro izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia niainga ny iraka haingam-pandeha nododonan’ny tenin’ny mpanjaka; ary novakina tany Sosana, tanàna mimanda, koa ny lalàna. Nipetraka hisotro ny mpanjaka sy i Hamana fa ny tao an-tanàna Sosana kosa dia very hevitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nandohalika sy niankohoka teo anatrehan’i Hamana ny mpanompon’ny mpanjaka rehetra izay teo am-bavahadin’ny mpanjaka, fa izany no didin’ny mpanjaka. I Mordekay kosa dia tsy mba nety nandohalika na niankohoka. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy ny mpanompon’ny mpanjaka izay teo am-bavahadin’ny mpanjaka tamin’i Mordekay: Nahoana ianao no mandika ny didin’ny mpanjaka? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nefa na dia niteny taminy isanandro aza ireo dia tsy nihaino azy izy ka nolazain’ireo tamin’i Hamana mba hizahany na hijoro amin’ny fihetsiny ihany i Mordekay na tsia; fa efa nilaza tamin’ireo izy fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Rehefa hitan’i Hamana fa tsy mba nety nandohalika na niankohoka teo anatrehany i Mordekay dia tezitra loatra izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tsy ampy an’i Hamana ny hanainga ny tanany hamely an’i Mordekay irery; satria efa nambara azy ny firenen’i Mordekay, koa dia nitady izay handringanana ny Jiosy rehetra manerana ny fanjakan’i Ahasoerosy koa izy, dia ny Jiosy izay firenen’i Mordekay. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tamin’ny volana voalohany na ny volana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Nisana
    - type: text
      text: ', tamin’ny taona faharoa amby ny folo nanjakan’i Ahasoerosy mpanjaka dia nanaovana Pora, na antsapaka, teo anatrehan’i Hamana, ny andro tsirairay sy ny volana tsirairay hatramin’ny volana faharoa amby folo, koa ny volana Adara no voatondro.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manomana ny handringanana ny Jiosy i Hamana
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia hoy i Hamana tamin’i Ahasoerosy mpanjaka: Misy firenena iray efa miely sy mihahaka eny amin’ny fari-piadidiana rehetra manerana ny fanjakanao; ny lalànan’izy ireo dia hafa noho ny an’ny firenena rehetra, ary tsy mba mankatò ny didin’ny mpanjaka izy ireo; tsy mendrika amin’ny mpanjaka ny hamela azy ireo amin’izao fotsiny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Koa raha sitraky ny mpanjaka, aoka hosoratana ny didy handringanana ireny, dia handanja volafotsy iray alina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ' aho mba homena ireo mpanao raharaha ka harotsaka ao amin’ny fitahirizan-drakitry ny mpanjaka. '
