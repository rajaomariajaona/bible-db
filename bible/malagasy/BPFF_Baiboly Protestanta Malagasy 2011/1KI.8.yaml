document_id: 1KI.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Napetraka tao amin’ny tempoly ny vata misy ny Fanekena
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 5.2–6.2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorianan’izany i Solomona mpanjaka dia namory tany aminy any Jerosalema ny loholon’ny Israely sy ny lohan’ny foko rehetra, dia ny lohan’ny fianakaviana tamin’ny Zanak’Israely, mba hampiakatra ny vata misy ny faneken’NY TOMPO avy ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ', Tanànan’i Davida.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia nivory tao amin’i Solomona mpanjaka ny lehilahy rehetra amin’ny Israely tamin’ny andro firavoravoana tamin’ny volana Etanima na ny volana fahafito.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tonga ny loholon’ny Israely rehetra ka ny mpisorona no nitondra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vata misy ny Fanekena
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nampiakariny ny vata misy ny faneken’NY TOMPO sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' mbamin’ny fanaka masina rehetra izay tao amin’ny tranolay. Nampiakarin’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' ireo zavatra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary i Solomona mpanjaka sy ny fiangonana, dia ny Israely rehetra, izay nivory teo aminy teo anoloan’ny vata misy ny Fanekena, dia namono zavatra hatao fanatitra: Ondry aman’osy sy omby izay tsy tambo isaina sady tsy hita isa noho ny hamaroany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny mpisorona dia nampiditra ny vata misy ny faneken’NY TOMPO ho ao amin’ny fitoerany ao amin’ny efitra anatiny, dia ny fitoerana masina indrindra, teo ambanin’ny elatry ny kerobima. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa nivelatra teo ambonin’ny toeran’ny vata misy ny Fanekena ny elatry ny kerobima ka nanaloka ny vata misy ny Fanekena sy ny baony. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lava ny bao ka hita ny tendrony raha avy eo amin’ny fitoerana masina eo anoloan’ny fitoerana masina indrindra, nefa tsy hita avy eny ivelany. Mbola ao mandraka androany ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy nisy na inona na inona tao anatin’ny vata misy ny Fanekena afa-tsy ny vato fisaka roa izay nataon’i Mosesy tao anatiny, tany Horeba, tamin’ny nanaovan’NY TOMPO fanekena tamin’ny Zanak’Israely, rehefa nivoaka avy tany amin’ny tany Ejipta izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nony nivoaka avy tao amin’ny fitoerana masina ny mpisorona dia nameno ny tranon’NY TOMPO ny rahona. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy nahajanona hanao fanompoam-pivavahana ny mpisorona noho ny rahona, satria ny voninahitry NY TOMPO nameno ny tranon’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy i Solomona:'
- type: usfm
  marker: p
  children:
  - type: text
    text: NY TOMPO efa nilaza fa hitoetra ao amin’ny haizim-pito Izy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Efa nanao trano honenanao tokoa aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fitoerana hitoeranao mandrakizay!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny fanokanana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 6.3-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nitodika ny mpanjaka ka nitsodrano ny fiangonana, dia ny Israely rehetra. Nijoro avokoa ny fiangonan’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy izy: Isaorana anie NY TOMPO, Andriamanitry ny Israely, fa ny vavany no niteny tamin’i Davida raiko, ary ny tanany no nanatanteraka izany taminy, dia ilay teny hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hatramin’ny andro nitondrako ny Israely oloko nivoaka avy tany Ejipta dia tsy mbola nisy tanàna nofidiko tamin’ireo firenen’ny Israely hanorenako trano hitoeran’ny anarako; nefa nifidy an’i Davida Aho hitondra ny Israely oloko. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary efa tonga tao am-pon’i Davida raiko ny hanorina trano ho an’ny anaran’NY TOMPO, Andriamanitry ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa hoy NY TOMPO tamin’i Davida raiko: Satria tao am-ponao ny fikasana hanao trano ho an’ny anarako, dia tsara izany fikasanao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa kosa tsy ianao no hanorina ny Trano fa ny zanakao izay haterakao; izy no hanorina ny Trano ho an’ny anarako. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary NY TOMPO efa nanatanteraka ny teniny izay nolazainy. Koa nitsangana handimby an’i Davida raiko aho ary mipetraka eo amin’ny sezafiandrianan’ny Israely araka izay nolazain’NY TOMPO, sady izaho koa dia efa nanorina ny trano ho an’ny anaran’NY TOMPO, Andriamanitry ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nasiako toerana ho an’ny vata izay itoeran’ny faneken’NY TOMPO ao, dia ilay nataony tamin’ny razantsika fony Izy nitondra azy nivoaka avy tany Ejipta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Solomona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 6.12-40
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nijoro teo anoloan’ny alitaran’NY TOMPO teo anatrehan’ny fiangonana, dia ny Israely rehetra, i Solomona sady namelatra ny tanany nanandrify ny lanitra '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'no niteny hoe: Ry TOMPO, Andriamanitry ny Israely ô, tsy misy andriamanitra tahaka Anao na any amin’ny lanitra ambony na etỳ amin’ny tany ambany, izay mitandrina ny fanekena sy ny famindrampo ho an’ny mpanomponao izay mandeha eo anatrehanao amin’ny fony manontolo, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'sady efa nanatanteraka tamin’i Davida raiko mpanomponao ilay nolazainao taminy; fa nolazain’ny vavanao izany dia notanterahin’ny tananao tahaka ny amin’izao anio izao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ankehitriny, ry TOMPO, Andriamanitry ny Israely ô, tanteraho amin’i Davida mpanomponao ilay nolazainao taminy hoe: Tsy ho diso zanakalahy eo anatrehako, izay hipetraka eo amin’ny sezafiandrianan’ny Israely ianao, raha mitandrina ny alehany ny zanakao ka mandeha eo anatrehako tahaka ny nandehananao teo anatrehako. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Koa ankehitriny, ry Andriamanitry ny Israely ô, mifona aminao aho, aoka ho to anie ny teninao izay nolazainao tamin’i Davida raiko mpanomponao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Andriamanitra va honina etỳ an-tany tokoa? E, ny lanitra ary ny lanitry ny lanitra aza tsy omby Anao, koa mainka fa ity trano naoriko ity! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa atreho ny vavaka sy ny fifonan’ny mpanomponao, ry TOMPO Andriamanitro ô, mba hohenoinao ny fitarainana sy ny vavaka izay ataon’ny mpanomponao eto anatrehanao anio. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Aoka hihiratra andro aman’alina amin’ity trano ity ny masonao, dia amin’ny toerana nolazainao hoe: Ao no hisy ny anarako, mba hihainoanao ny vavaka izay ataon’ny mpanomponao izay manatrika ity toerana ity. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Koa henoy ny fifonan’ny mpanomponao sy ny Israely olonao rehefa mivavaka manatrika ity toerana ity izy; dia mihainoa any an-danitra fonenanao Ianao; eny, mihainoa ka mamelà heloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha misy olona manota amin’ny namany ka asaina mianiana, ary tonga hianiana eo anoloan’ny alitaranao amin’ity trano ity izy, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: dia mihainoa any an-danitra Ianao ka mihetseha ary tsarao ny mpanomponao, mba hanamelohana ny ratsy fanahy ka hampitsingerina ny nataony ho amin’ny lohany ary hanamarina ny marina kosa ka hanome azy araka ny fahamarinany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Raha resy eo anoloan’ny fahavalo ny Israely olonao noho ny nanotany taminao ary miverina aminao sy manaiky ny anaranao indray ka mivavaka sy mifona Aminao eto amin’ity trano ity izy, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia mihainoa any an-danitra Ianao ka mamelà ny fahotan’ny Israely olonao, ary ampodio amin’ny tany nomenao ny razany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Raha mihantona ny andro ka tsy misy ranonorana noho ny nanotan’ny olona Taminao, nefa mivavaka manatrika ity toerana ity izy ary manaiky ny anaranao sady miala amin’ny fahotany, satria ampahorinao, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: dia mihainoa any an-danitra Ianao ka mamelà ny fahotan’ny mpanomponao, dia ny Israely olonao, satria atoronao azy ny lalana tsara izay tokony halehany ary mandatsaha ranonorana amin’ny taninao izay nomenao ho lovan’ny olonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Raha misy mosary amin’ny tany, na areti-mandringana, na mainan’ny hafanana ny vary, na maty fotsy, na koa misy valala sy sompanga, na misy fahavalo manao fahirano azy ao amin’ny taniny, dia ao amin’ny tanànany, ka na inona fahoriana, na inona aretina, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'izay vavaka rehetra sy fifonana rehetra ataon’ny olona rehetra, na ny Israely olonao rehetra, izay samy mahalala ny fahorian’ny fony avy ka mamelatra ny tanany manatrika ity trano ity izy, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'dia mihainoa any an-danitra fonenanao Ianao ka mamelà heloka, ary mihetseha ka omeo araka ny alehany rehetra ny olona; fa fantatrao ny fony, fa Ianao dia Ianao irery ihany no mahalala ny fon’ny zanak’olombelona rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: mba hatahorany Anao amin’izay andro rehetra iainany etỳ amin’ny tany nomenao ny razanay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Henoy koa ny vahiny izay tsy isan’ny Israely olonao, fa tonga avy any amin’ny tany lavitra noho ny amin’ny anaranao izy, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'satria ho reny ny anaranao lehibe sy ny tananao mahery ary ny sandrinao natsotra; koa raha avy izy ka mivavaka manatrika ity trano ity '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: dia mihainoa any an-danitra fonenanao Ianao ka manaova araka izay rehetra iantsoan’ny vahiny Anao, mba ho fantatry ny firenena rehetra ambonin’ny tany ny anaranao, hatahorany Anao tahaka ny ataon’ny Israely olonao ihany, ary mba ho fantany fa ny anaranao no antsoina eto amin’ity trano naoriko ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Raha miainga hiady amin’ny fahavalony ny olonao, na ho aiza na ho aiza no hanirahanao azy, ka mivavaka amin’NY TOMPO manandrify ny tanàna izay nofidinao sy ny trano izay naoriko ho an’ny anaranao izy, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: dia henoy any an-danitra ny vavaka ataony sy ny fifonany ka omeo rariny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Raha manota aminao izy, satria tsy misy olombelona tsy manota, ka tezitra aminy Ianao ary manolotra azy eo anoloan’ny fahavalony ka hoentin’ny mpamabo ho babo any amin’ny tanin’ny fahavalo izy, na ho lavitra izany na ho akaiky, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'raha mahatsiaro any amin’ny tanin’ireo mamabo azy ireo izy ka mibebaka sy mifona aminao any amin’ny tany izay nitondrany azy ho babo any ary miteny hoe: Efa nanota izahay sady nanao izay meloka sy nanao izay ratsy, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'raha miverina aminao amin’ny fony manontolo sy ny fanahiny manontolo ao amin’ny tanin’ny fahavalony izay namabo azy izy, ary mivavaka Aminao manandrify ny taniny izay nomenao ny razany sy ny tanàna izay nofidinao ary ny trano izay naoriko ho an’ny anaranao, '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'dia henoy any an-danitra fonenanao ny vavaka ataony sy ny fifonany ka omeo rariny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Eny, mamelà ny heloky ny olonao izay nanota Taminao, ary mamelà ny fahadisoany rehetra izay nataony Taminao; ataovy mahazo famindrampo amin’izay mamabo azy izy ka hamindra fo aminy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Fa olonao sy lovanao izy ary noentinao nivoaka avy tany Ejipta, dia avy tao amin’ny memy fandrendreham-by,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Aoka hihiratra ny masonao amin’ny fifonan’ny mpanomponao sy ny fifonan’ny Israely olonao ka hihainoanao azy amin’izay rehetra iantsoany Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Fa Ianao no nanavaka azy tamin’ny firenena rehetra ambonin’ny tany mba ho lovanao, araka izay nampilazainao an’i Mosesy mpanomponao tamin’ny nitondranao ny razanay nivoaka avy tany Ejipta, ry TOMPO Andriamanitra ô!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mangata-pitahiana amin’Andriamanitra ho an’ny vahoaka i Solomona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Rehefa vita izany vavaka sy fifonana rehetra nataon’i Solomona tamin’NY TOMPO izany dia nitsangana izy ka niala teo amin’ny alitaran’NY TOMPO izay nandohalehany sy namelarany ny tanany ho amin’ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Dia nijoro nitsodrano ny fiangonana, dia ny Israely rehetra, tamin’ny feo mahery izy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Isaorana anie NY TOMPO, izay nanome fitsaharana ho an’ny Israely olony araka izay rehetra nolazainy! Tsy misy latsaka na dia teny iray aza tamin’izay teny soa rehetra nampilazainy an’i Mosesy mpanompony. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ho amintsika anie NY TOMPO Andriamanitsika, tahaka ny tamin’ny razantsika. Enga anie ka tsy handao na hahafoy antsika Izy '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'fa mba hampanatoniny Azy ny fontsika hahazoantsika mandeha amin’ny lalany rehetra sy hitandremantsika ny lalànany sy ny didiny ary ny fitsipiny izay nandidiany ny razantsika! '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ary aoka izany teny nifonako teto anatrehan’NY TOMPO izany ho eo anatrehan’NY TOMPO Andriamanitsika andro aman’alina, mba hanomezany rariny ho ahy mpanompony sy ny Israely olony araka izay tandrify azy isanandro, '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'mba ho fantatry ny firenena rehetra ambonin’ny tany fa NY TOMPO no Andriamanitra, ary tsy misy afa-tsy Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Ho marina amin’NY TOMPO Andriamanitsika anie ny fonareo, mba handehananareo amin’ny didiny sy hitandremanareo ny lalànany, tahaka ny amin’izao anio izao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo fanatitra natolotra ho an’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 7.4-10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Niaraka tamin’ny Israely rehetra namono zavatra hatao fanatitra teo anatrehan’NY TOMPO ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Namono zavatra hatao fanati-pihavanana izay natolony ho an’NY TOMPO i Solomona, dia omby roa arivo sy roa alina sy ondry aman’osy roa alina sy iray hetsy. Toy izany no nitokanan’ny mpanjaka sy ny Zanak’Israely rehetra ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Tamin’io andro io no nanamasinan’ny mpanjaka ny teo afovoan’ny kianja izay teo anoloan’ny tranon’NY TOMPO, satria teo no nanolorany fanatitra dorana manontolo sy fanatitra avy amin’ny zavamaniry ary ny jaboran’ny fanati-pihavanana, rehefa hita fa kely loatra ny alitara varahina izay teo anatrehan’NY TOMPO ka tsy omby ny fanatitra dorana manontolo sy ny fanatitra avy amin’ny zavamaniry ary ny jaboran’ny fanati-pihavanana naterina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Tamin’io fotoana io i Solomona, niaraka tamin’ny Israely rehetra, dia fiangonana lehibe izay tonga hatrany akaikin’i Hamata ka hatrany amin’ny lohasahan-driakan’i Ejipta, dia nitandrina ny andro firavoravoana teo anatrehan’NY TOMPO Andriamanitsika hafitoana indroa, izany hoe efatra amby folo andro. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Tamin’ny andro fahavalo dia nampodiny ny olona. Dia nisaotra ny mpanjaka ireo ka lasa nandeha ho any amin’ny tranolainy avy, sady faly no ravoravo ny fony noho ny soa rehetra nataon’NY TOMPO tamin’i Davida mpanompony sy ny Israely olony.
