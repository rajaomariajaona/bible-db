document_id: HEB.5,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa ny Mpisoronabe rehetra dia alaina amin’ny olona ka tendrena ho solon’ny olona hanao ny raharahan’Andriamanitra, hanolotra fanomezana sy fanatitra hanafaka ota. '
  '10':
  - type: text
    content: ka nambaran’Andriamanitra hoe Mpisoronabe araka ny fomban’i Melkizedeka.
  - type: heading
    content: Ny amin’izay sarotra ambara
  '11':
  - type: text
    content: 'Ny amin’izany dia manana teny maro sady sarotra hazavaina izahay satria lalodalovana ny sofinareo. '
  '12':
  - type: text
    content: 'Fa na dia tokony ho efa mpampianatra aza ianareo noho ny fotoana efa ela dia mbola mila izay hampianatra anareo ny abidim-pianaran’ny tenin’Andriamanitra indray; ary ianareo dia mbola toy izay tokony homen-dronono fa tsy ventin-kanina. '
  '13':
  - type: text
    content: 'Fa izay rehetra mivelona amin’ny ronono dia tsy zatra amin’ny tenin’ny fahamarinana satria mbola zazabodo. '
  '14':
  - type: text
    content: Fa ho an’izay efa lehibe ny ventin-kanina, dia ho an’izay manana ny saina efa zatra nampiasaina tsara ka mahay manavaka ny tsara sy ny ratsy.
  '2':
  - type: text
    content: 'Izy dia olona izay mahay mitondra mora ny tsy mahalala sy ny mania, satria ny tenany koa dia mba hodidinin’ny fahalemena ihany; '
  '3':
  - type: text
    content: 'ary noho izany dia tsy maintsy hanolotra fanatitra hanafaka ota ho an’ny tenany koa izy, toy ny ataony ho an’ny olona ihany. '
  '4':
  - type: text
    content: Ary tsy misy maka izany voninahitra izany ho an’ny tenany afa-tsy izay antsoin’Andriamanitra, tahaka ny tamin’i Arona.
  '5':
  - type: text
    content: 'Dia toy izany koa Kristy: Tsy Izy no nanandratra ny tenany ho Mpisoronabe fa Ilay niteny taminy hoe:'
  - type: text
    content: «Zanako Ianao,
  - type: text
    content: Izaho no niteraka Anao androany» (Sal 2.7).
  '6':
  - type: text
    content: 'Ary toy ny lazainy eo amin’ny teny hafa koa hoe:'
  - type: text
    content: «Ianao no mpisorona mandrakizay araka ny fomban’i Melkizedeka» (Sal 110.4).
  '7':
  - type: text
    content: 'Tamin’ny andron’ny nofony, raha nanao fivavahana sy fangatahana niaraka tamin’ny fitarainana mafy sy ranomaso be tamin’izay nahavonjy Azy tamin’ny fahafatesana Izy, ary nohenoina noho ny fahatahorany an’Andriamanitra, '
  '8':
  - type: text
    content: 'dia nianatra fankatoavana tamin’izay fahoriana noentiny Izy, na dia Zanaka aza. '
  '9':
  - type: text
    content: 'Ary rehefa nahatanteraka izany Izy dia tonga loharanon’ny famonjena mandrakizay ho an’izay rehetra mankatò Azy '
