document_id: HEB.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ny Mpisoronabe rehetra dia alaina amin’ny olona ka tendrena ho solon’ny olona hanao ny raharahan’Andriamanitra, hanolotra fanomezana sy fanatitra hanafaka ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izy dia olona izay mahay mitondra mora ny tsy mahalala sy ny mania, satria ny tenany koa dia mba hodidinin’ny fahalemena ihany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary noho izany dia tsy maintsy hanolotra fanatitra hanafaka ota ho an’ny tenany koa izy, toy ny ataony ho an’ny olona ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary tsy misy maka izany voninahitra izany ho an’ny tenany afa-tsy izay antsoin’Andriamanitra, tahaka ny tamin’i Arona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia toy izany koa Kristy: Tsy Izy no nanandratra ny tenany ho Mpisoronabe fa Ilay niteny taminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Zanako Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no niteraka Anao androany» (Sal 2.7).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary toy ny lazainy eo amin’ny teny hafa koa hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ianao no mpisorona mandrakizay araka ny fomban’i Melkizedeka» (Sal 110.4).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’ny andron’ny nofony, raha nanao fivavahana sy fangatahana niaraka tamin’ny fitarainana mafy sy ranomaso be tamin’izay nahavonjy Azy tamin’ny fahafatesana Izy, ary nohenoina noho ny fahatahorany an’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia nianatra fankatoavana tamin’izay fahoriana noentiny Izy, na dia Zanaka aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa nahatanteraka izany Izy dia tonga loharanon’ny famonjena mandrakizay ho an’izay rehetra mankatò Azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ka nambaran’Andriamanitra hoe Mpisoronabe araka ny fomban’i Melkizedeka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’izay sarotra ambara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny amin’izany dia manana teny maro sady sarotra hazavaina izahay satria lalodalovana ny sofinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa na dia tokony ho efa mpampianatra aza ianareo noho ny fotoana efa ela dia mbola mila izay hampianatra anareo ny abidim-pianaran’ny tenin’Andriamanitra indray; ary ianareo dia mbola toy izay tokony homen-dronono fa tsy ventin-kanina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izay rehetra mivelona amin’ny ronono dia tsy zatra amin’ny tenin’ny fahamarinana satria mbola zazabodo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ho an’izay efa lehibe ny ventin-kanina, dia ho an’izay manana ny saina efa zatra nampiasaina tsara ka mahay manavaka ny tsara sy ny ratsy.
