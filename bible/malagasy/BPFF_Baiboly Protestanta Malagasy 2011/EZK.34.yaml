document_id: EZK.34,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’ireo mpitondra eo amin’ny Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra: Indro, avy hamely ny mpiandry ondry Aho, dia hampamoahiko ny amin’ny ondriko izy ka hesoriko tsy hiandry ny ondry intsony; dia tsy hamahan-tena intsony ny mpiandry ondry fa hosarihiko avy eo am-bavany ny ondriko mba tsy ho azony hohanina intsony.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa izao no lazain’NY TOMPO Andriamanitra: Indro, Izaho, eny, Izaho no hiahy ny ondriko sy hikarakara azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Toy ny fikarakaran’ny mpiandry ny ondriny rehefa eo anivon’ny ondriny izay efa niely izy, dia toy izany no hikarakarako ny ondriko sy hisarihako azy avy amin’ny toerana rehetra nielezany tamin’ny andro mandrahona sy feno haizim-pito. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hoentiko mivoaka avy any amin’ny firenena izy ka hangoniko avy any amin’ny tany samihafa; hoentiko any amin’ny taniny izy ary handrasako eny amin’ny tendrombohitry ny Israely sy eny amin’ny lohasahan-driaka ary eny amin’izay tsara honenana rehetra eo amin’ny tany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Eny amin’ny tany tsara ho fiandrasana no hiandrasako azy ary eny amin’ny tendrombohitra avon’ny Israely no ho tany hiandrasana azy; any no handriany amin’ny tany tsara ary eny amin’ny fiandrasana tsara ahitra no hihinanany, dia any amin’ny tendrombohitry ny Israely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Izaho no hiandry ny ondriko ary Izaho no hampandry azy, hoy NY TOMPO Andriamanitra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny very dia hotadiaviko, ny diso lalana haveriko, ny naratra hotsaboiko, ny malemy hohatanjahiko; fa ny matavy sy ny matanjaka kosa dia haringako. Handrasako amin’ny fitondrana tsara ny ondriko.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miditra an-tsehatra hamonjy ny olony Andriamanitra
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa ny aminareo, ry ondriko, izao no lazain’NY TOMPO Andriamanitra: Indro, hotsaraiko ny adin’ny ondry aman’osy amin’ny namany, dia ny ady ataon’ny ondrilahy amin’ny osilahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Moa ataonareo ho zavatra kely va ny nandanianareo ny ahitra tsara no dia nohosihosen’ny tongotrareo ny ahitrareo sisa, ary ny nisotroanareo ny rano madio no dia nolotoin’ny tongotrareo ny sisa? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary ny amin’ny ondriko, moa izay voahosihosin’ny tongotrareo va no hohaniny, ary izay voaloton’ny tongotrareo va no hosotroiny?
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', maminania ny hamelezana ny mpiandry ny Israely! Eny, maminania ka lazao aminy, amin’ny mpiandry hoe: Izao no lazain’NY TOMPO Andriamanitra: Lozan’ny mpiandry ondrin’ny Israely izay mamahan-tena! Moa tsy ny ondry va no tokony handrasan’ny mpiandry? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Koa izao no lazain’NY TOMPO Andriamanitra aminy: Indro, Izaho, eny, Izaho no hitsara ny adin’ny ondry matavy amin’ny ondry mahia. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Satria ny tehezanareo sy ny sorokareo no entinareo manosika ny marary rehetra, ary ny tandrokareo no entinareo manoto azy ka aronjinareo ho any ivelany izy, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'dia hovonjeko ny ondriko ka tsy ho babo intsony izy, ary hotsaraiko ny adin’ny ondry amin’ny ondry namany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Hanangana mpiandry tokana ho azy, izay hiandry azy Aho, dia i Davida mpanompoko. Izy no hitondra azy, ary izy no ho mpiandry azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Izaho TOMPO no ho Andriamaniny, ary i Davida mpanompoko no ho Mpanapaka aminy. Izaho TOMPO no niteny izany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hanao fanekem-pihavanana aminy Aho ka hampiala ny biby masiaka tsy ho eo amin’ny tany intsony, dia handry fehizay izy na dia any an-tany efitra aza, sady hatory na dia any anaty ala aza. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Izy sy ny manodidina ny havoanako dia hataoko fitahiana, ary hampilatsaka ranonorana amin’ny fotoanany Aho, dia ranonoram-pitahiana mivatravatra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Hamoa ny hazo any an-tsaha sady hahavokatra ny tany, ary handry fehizay amin’ny tany izy; dia ho fantany fa Izaho no TOMPO, rehefa tapahiko ny ziogany, ary hafahako amin’ny tanan’izay nampanompo azy izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tsy ho babon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' na ho rembin’ny bibidia intsony izy fa handry fehizay, ary tsy hisy hampitahotra azy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary hampaniry saha malaza ho azy Aho ka tsy ho ritran’ny mosary amin’ny tany intsony izy na hitondra ny latsan’ny Jentilisa intsony; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny taviny dia haninareo, ary ny volony dia itafinareo; ny nafahy dia vonoinareo nefa ny ondry tsy mba andrasanareo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'dia ho fantany fa Izaho, NY TOMPO Andriamaniny, no momba azy, ary izy, taranak’Israely, no oloko, hoy NY TOMPO Andriamanitra. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary ny aminareo ondriko, izay ondry andrasako, olombelona ianareo, ary Izaho no Andriamanitrareo, hoy NY TOMPO Andriamanitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tsy manatanjaka ny malemy ianareo, na manasitrana ny marary, na nifehy izay tapaka ny tongony, na mamerina ny diso lalana, na mikatsaka ny very; fa loza loatra ny nanjakazakanareo taminy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia miely izy satria tsy misy mpiandry; ary rehefa miely izy dia tonga rembin’ny bibidia rehetra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mirenireny eny an-tendrombohitra sy eny amin’ny havoana rehetra ny ondriko; eny, any amin’ny tany rehetra no ielezan’ny ondriko ary tsy misy mitady na miahy azy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa mihainoa ny tenin’NY TOMPO ianareo, ry mpiandry ondry: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Raha velona koa Aho, hoy NY TOMPO Andriamanitra, noho ny ondriko tonga babo sy ny ondriko tonga rembin’ny bibidia rehetra, satria tsy nisy mpiandry azy, ary tsy nitady ny ondriko ny mpiandry fa ny mamahan-tena kosa no ataony ka tsy namahana ny ondriko, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'dia mihainoa ny tenin’NY TOMPO ianareo, ry mpiandry ondry! '
