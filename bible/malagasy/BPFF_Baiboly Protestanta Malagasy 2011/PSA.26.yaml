document_id: PSA.26,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miantso an’Andriamanitra ny tsy manan-tsiny
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tsarao aho, TOMPO ô, fa mandeha araka ny hitsim-poko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no itokiako ka tsy mivembena aho.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: izay misy fitaka eny an-tanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary feno kolikoly ny tanany havanana!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa izaho dia mandeha amin’ny tsy fananako tsiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avoty aho ary amindrao fo!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mijoro mahitsy amin’ny tongotro aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny fiangonana no isaorako NY TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Diniho aho, TOMPO ô, ka fantaro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izahao toetra ny voako sy ny foko;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: fa ny famindramponao no eo anoloan’ny masoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandeha amin’ny fahamarinanao aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy mba miara-mipetraka amin’ny olon-dratsy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na manan-draharaha amin’ny olom-petsy;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: halako ny fivorian’ny mpanao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy miara-mipetraka amin’ny ratsy fanahy aho.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Manasa ny tanako amin’ny tsy fananako tsiny aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanodidina ny alitaranao
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: mba hanandratra feo fiderana, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hilaza ny asanao mahagaga rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: TOMPO ô, tiako ny trano itoeranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fonenan’ny voninahitrao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aza entinao miaraka amin’ny mpanota aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny aiko miaraka amin’ny mpandatsa-dra
