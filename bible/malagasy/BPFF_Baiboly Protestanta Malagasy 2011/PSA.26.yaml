document_id: PSA.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Miantso an’Andriamanitra ny tsy manan-tsiny
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Tsarao aho, TOMPO ô, fa mandeha araka ny hitsim-poko;
  - type: text
    content: NY TOMPO no itokiako ka tsy mivembena aho.
  '10':
  - type: text
    content: izay misy fitaka eny an-tanany
  - type: text
    content: ary feno kolikoly ny tanany havanana!
  '11':
  - type: text
    content: Fa izaho dia mandeha amin’ny tsy fananako tsiny;
  - type: text
    content: avoty aho ary amindrao fo!
  '12':
  - type: text
    content: Mijoro mahitsy amin’ny tongotro aho;
  - type: text
    content: ao amin’ny fiangonana no isaorako NY TOMPO.
  '2':
  - type: text
    content: Diniho aho, TOMPO ô, ka fantaro,
  - type: text
    content: izahao toetra ny voako sy ny foko;
  '3':
  - type: text
    content: fa ny famindramponao no eo anoloan’ny masoko;
  - type: text
    content: mandeha amin’ny fahamarinanao aho.
  '4':
  - type: text
    content: Tsy mba miara-mipetraka amin’ny olon-dratsy aho
  - type: text
    content: na manan-draharaha amin’ny olom-petsy;
  '5':
  - type: text
    content: halako ny fivorian’ny mpanao ratsy
  - type: text
    content: ary tsy miara-mipetraka amin’ny ratsy fanahy aho.
  '6':
  - type: text
    content: Manasa ny tanako amin’ny tsy fananako tsiny aho
  - type: text
    content: ka hanodidina ny alitaranao
  '7':
  - type: text
    content: mba hanandratra feo fiderana, TOMPO ô,
  - type: text
    content: sady hilaza ny asanao mahagaga rehetra.
  '8':
  - type: text
    content: TOMPO ô, tiako ny trano itoeranao,
  - type: text
    content: dia ny fonenan’ny voninahitrao.
  '9':
  - type: text
    content: Aza entinao miaraka amin’ny mpanota aho,
  - type: text
    content: na ny aiko miaraka amin’ny mpandatsa-dra
