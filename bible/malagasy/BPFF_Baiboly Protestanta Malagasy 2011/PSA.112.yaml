document_id: PSA.112,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahasambaran’ny olona mahitsy
  - type: text
    content: ' '
  - type: text
    content: Haleloia
  - type: text
    content: .
  - type: text
    content: Sambatra ny olona izay matahotra NY TOMPO
  - type: text
    content: sady mankasitraka ny didiny indrindra.
  '10':
  - type: text
    content: Hahita azy ny ratsy fanahy ka ho sosotra;
  - type: text
    content: hihidy vazana izy ka ho levona;
  - type: text
    content: ho foana ny fanirian’ny ratsy fanahy.
  '2':
  - type: text
    content: Hahery ambonin’ny tany ny zanany;
  - type: text
    content: hotahina ny taranaky ny marina.
  '3':
  - type: text
    content: Fananana sy harena no ao an-tranony;
  - type: text
    content: haharitra mandrakizay ny fahamarinany.
  '4':
  - type: text
    content: Ao amin’ny maizina no iposahan’ny mazava ho an’ny olona mahitsy;
  - type: text
    content: mamindra fo sy miantra ary marina ireny.
  '5':
  - type: text
    content: Sambatra ny olona izay miantra ka mampisambotra
  - type: text
    content: ary mitantana ny raharahany amin’ny fahamarinana.
  '6':
  - type: text
    content: Fa tsy hangozohozo mandrakizay izy;
  - type: text
    content: hotsarovana mandrakizay ny marina.
  '7':
  - type: text
    content: Tsy mba matahotra ny hahare loza izy;
  - type: text
    content: tafatoetra ny fony, matoky NY TOMPO izy.
  '8':
  - type: text
    content: Tsara mpanohana ny fony ka tsy hatahotra izy,
  - type: text
    content: mandra-pifaliny mahita ny amin’ny mpandrafy azy.
  '9':
  - type: text
    content: Malala-tanana izy; eny, manome ho an’ny mahantra;
  - type: text
    content: maharitra mandrakizay ny fahamarinany;
  - type: text
    content: hisandratra amim-boninahitra ny fahamboniany.
