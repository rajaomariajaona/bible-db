document_id: PSA.112
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahasambaran’ny olona mahitsy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Haleloia
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra ny olona izay matahotra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mankasitraka ny didiny indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hahery ambonin’ny tany ny zanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hotahina ny taranaky ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fananana sy harena no ao an-tranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: haharitra mandrakizay ny fahamarinany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ao amin’ny maizina no iposahan’ny mazava ho an’ny olona mahitsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamindra fo sy miantra ary marina ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sambatra ny olona izay miantra ka mampisambotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitantana ny raharahany amin’ny fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tsy hangozohozo mandrakizay izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hotsarovana mandrakizay ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy mba matahotra ny hahare loza izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tafatoetra ny fony, matoky NY TOMPO izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsara mpanohana ny fony ka tsy hatahotra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pifaliny mahita ny amin’ny mpandrafy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Malala-tanana izy; eny, manome ho an’ny mahantra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maharitra mandrakizay ny fahamarinany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hisandratra amim-boninahitra ny fahamboniany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hahita azy ny ratsy fanahy ka ho sosotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hihidy vazana izy ka ho levona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho foana ny fanirian’ny ratsy fanahy.
