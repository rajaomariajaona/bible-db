document_id: ZEC.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana faharoa: Ny tandroka sy ny mpanefy'
  - type: text
    content: 'Ary natopiko ny masoko ka hitako fa indreo, '
  - type: text
    content: tandroka
  - type: text
    content: ' efatra. '
  '10':
  - type: text
    content: E! E!
  - type: text
    content: Mandosira avy any amin’ny tany avaratra,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: ianareo izay naeliko tany amin’ny rivotra efatry ny lanitra,
  - type: text
    content: hoy NY TOMPO.
  '11':
  - type: text
    content: E! Vonjeo ny tenanao,
  - type: text
    content: 'ry '
  - type: text
    content: Ziona
  - type: text
    content: ', izay monina any Babilona zanakavavy!'
  '12':
  - type: text
    content: Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: izay naniraka ahy hampiseho voninahitra
  - type: text
    content: 'tany amin’ireo firenena izay namabo anareo:'
  - type: text
    content: Izay mikasika anareo
  - type: text
    content: dia mikasika ny anakandriamasoko.
  '13':
  - type: text
    content: Fa indro, hatsotrako eo ambonin’ireo firenena ny tanako
  - type: text
    content: ka ho tonga babon’ireo nanompo azy izy;
  - type: text
    content: dia ho fantatrareo fa Andriamanitra, Tompon’izao rehetra izao, no naniraka ahy.
  '14':
  - type: text
    content: Mihobia sy mifalia,
  - type: text
    content: ry Ziona zanakavavy!
  - type: text
    content: Fa indro, avy Aho
  - type: text
    content: ka honina ao afovoanao,
  - type: text
    content: hoy NY TOMPO.
  '15':
  - type: text
    content: Firenena maro no hanaiky ho an’NY TOMPO amin’izany andro izany.
  - type: text
    content: Ho oloko izy,
  - type: text
    content: ary hitoetra ao afovoanao Aho;
  - type: text
    content: dia ho fantatrao fa Andriamanitra, Tompon’izao rehetra izao, no naniraka ahy ho aminao.
  '16':
  - type: text
    content: Ary NY TOMPO hanana an’i Joda ho anjarany ao amin’ny tany masina
  - type: text
    content: ary mbola hifidy an’i Jerosalema indray.
  '17':
  - type: text
    content: Mangìna eo anatrehan’NY TOMPO, ry nofo rehetra!
  - type: text
    content: Fa mifoha avy ao amin’ny fitoerany masina Izy.
  '2':
  - type: text
    content: 'Ary hoy aho tamin’ilay anjely niresaka tamiko: Inona moa ireo? Dia hoy izy tamiko: Ireo no tandroka izay nampihahaka an’i Joda sy an’i Israely ary an’i Jerosalema.'
  '3':
  - type: text
    content: 'Ary nanehoan’NY TOMPO mpanefy efatra aho. '
  '4':
  - type: text
    content: 'Dia hoy aho: Avy hanao inona moa ireto? Ary Izy niteny hoe: Ireo no tandroka nampihahaka ny Joda ka tsy nisy olona nanandratra ny lohany; fa ireto kosa dia avy hampatahotra azy mba hampiongana ny tandroky ny firenena, dia izay nanandratra ny tandrony tamin’ny tanin’i Joda hanely azy.'
  - type: heading
    content: 'Fahitana fahatelo: Ny kofehy fandrefesana'
  '5':
  - type: text
    content: 'Dia natopiko ny masoko ka hitako fa indro, lehilahy iray mitondra kofehy fandrefesana eny an-tanany. '
  '6':
  - type: text
    content: 'Dia hoy aho: Ho aiza moa ianao? Ary hoy izy tamiko: Handrefy an’i Jerosalema aho mba hizaha ny sakany sy ny lavany. '
  '7':
  - type: text
    content: 'Ary indro, nandroso ilay anjely niresaka tamiko, ary nisy anjely iray hafa nandroso hitsena azy '
  '8':
  - type: text
    content: 'ka niteny taminy hoe: Mihazakazaha ka milazà amin’io zatovo io hoe:'
  - type: text
    content: Hijanona ho tanàna tsy mimanda i Jerosalema
  - type: text
    content: noho ny hamaroan’ny olona sy ny biby fiompy ao aminy.
  '9':
  - type: text
    content: Fa Izaho no ho manda afo manodidina azy,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: ary ho voninahitra ao afovoany.
  - type: heading
    content: Miantso ny babo hiverina NY TOMPO
