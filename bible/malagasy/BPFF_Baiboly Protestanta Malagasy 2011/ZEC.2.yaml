document_id: ZEC.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fahitana faharoa: Ny tandroka sy ny mpanefy'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary natopiko ny masoko ka hitako fa indreo, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroka
    - type: text
      text: ' efatra. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: E! E!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandosira avy any amin’ny tany avaratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo izay naeliko tany amin’ny rivotra efatry ny lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: E! Vonjeo ny tenanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ', izay monina any Babilona zanakavavy!'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay naniraka ahy hampiseho voninahitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tany amin’ireo firenena izay namabo anareo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mikasika anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mikasika ny anakandriamasoko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa indro, hatsotrako eo ambonin’ireo firenena ny tanako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tonga babon’ireo nanompo azy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho fantatrareo fa Andriamanitra, Tompon’izao rehetra izao, no naniraka ahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mihobia sy mifalia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Ziona zanakavavy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa indro, avy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka honina ao afovoanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Firenena maro no hanaiky ho an’NY TOMPO amin’izany andro izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho oloko izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitoetra ao afovoanao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho fantatrao fa Andriamanitra, Tompon’izao rehetra izao, no naniraka ahy ho aminao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary NY TOMPO hanana an’i Joda ho anjarany ao amin’ny tany masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mbola hifidy an’i Jerosalema indray.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mangìna eo anatrehan’NY TOMPO, ry nofo rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mifoha avy ao amin’ny fitoerany masina Izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary hoy aho tamin’ilay anjely niresaka tamiko: Inona moa ireo? Dia hoy izy tamiko: Ireo no tandroka izay nampihahaka an’i Joda sy an’i Israely ary an’i Jerosalema.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nanehoan’NY TOMPO mpanefy efatra aho. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy aho: Avy hanao inona moa ireto? Ary Izy niteny hoe: Ireo no tandroka nampihahaka ny Joda ka tsy nisy olona nanandratra ny lohany; fa ireto kosa dia avy hampatahotra azy mba hampiongana ny tandroky ny firenena, dia izay nanandratra ny tandrony tamin’ny tanin’i Joda hanely azy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fahitana fahatelo: Ny kofehy fandrefesana'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia natopiko ny masoko ka hitako fa indro, lehilahy iray mitondra kofehy fandrefesana eny an-tanany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy aho: Ho aiza moa ianao? Ary hoy izy tamiko: Handrefy an’i Jerosalema aho mba hizaha ny sakany sy ny lavany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary indro, nandroso ilay anjely niresaka tamiko, ary nisy anjely iray hafa nandroso hitsena azy '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'ka niteny taminy hoe: Mihazakazaha ka milazà amin’io zatovo io hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hijanona ho tanàna tsy mimanda i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny hamaroan’ny olona sy ny biby fiompy ao aminy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa Izaho no ho manda afo manodidina azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho voninahitra ao afovoany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miantso ny babo hiverina NY TOMPO
    marker-yv: yv-h
