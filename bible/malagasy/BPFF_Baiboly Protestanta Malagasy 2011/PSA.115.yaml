document_id: PSA.115,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ho an’Andriamanitra irery ihany ny voninahitra
  - type: text
    content: TOMPO ô, aza izahay, aza izahay
  - type: text
    content: no omena voninahitra fa ny anaranao ihany,
  - type: text
    content: noho ny famindramponao sy ny fahamarinanao.
  '10':
  - type: text
    content: Ry taranak’i Arona ô, matokia NY TOMPO;
  - type: text
    content: heriny sy ampingany Izy.
  '11':
  - type: text
    content: Ianareo izay matahotra NY TOMPO, matokia NY TOMPO;
  - type: text
    content: heriny sy ampingany Izy.
  '12':
  - type: text
    content: Mahatsiaro antsika NY TOMPO ka mitahy;
  - type: text
    content: hitahy ny taranak’Israely Izy;
  - type: text
    content: hitahy ny taranak’i Arona Izy;
  '13':
  - type: text
    content: hotahiny izay matahotra NY TOMPO,
  - type: text
    content: na ny kely na ny lehibe.
  '14':
  - type: text
    content: Hahamaro anareo anie NY TOMPO,
  - type: text
    content: dia ianareo mbamin’ny zanakareo.
  '15':
  - type: text
    content: Hitahy anareo anie NY TOMPO,
  - type: text
    content: Mpanao ny lanitra sy ny tany.
  '16':
  - type: text
    content: Ny lanitra dia lanitry NY TOMPO;
  - type: text
    content: fa ny tany dia nomeny ho an’ny zanak’olombelona.
  '17':
  - type: text
    content: Tsy mba hidera NY TOMPO ny maty,
  - type: text
    content: na izay rehetra midina any amin’ny mangingina;
  '18':
  - type: text
    content: fa izahay kosa dia hisaotra NY TOMPO
  - type: text
    content: hatramin’izao ka ho mandrakizay.
  - type: text
    content: Haleloia
  - type: text
    content: .
  '2':
  - type: text
    content: 'Nahoana ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' no miteny hoe:'
  - type: text
    content: Aiza izay Andriamaniny?
  '3':
  - type: text
    content: Nefa any an-danitra Andriamanitsika;
  - type: text
    content: efa nanao izay sitrapony rehetra Izy.
  '4':
  - type: text
    content: Volafotsy sy volamena ny sampin’ireny,
  - type: text
    content: asa nataon’ny tanan’olombelona.
  '5':
  - type: text
    content: Manam-bava izy nefa tsy miteny;
  - type: text
    content: mana-maso izy nefa tsy mahita;
  '6':
  - type: text
    content: manan-tsofina izy nefa tsy mandre;
  - type: text
    content: manana orona izy nefa tsy manimbolo;
  '7':
  - type: text
    content: manan-tanana izy nefa tsy mandray;
  - type: text
    content: manan-tongotra izy nefa tsy mandeha
  - type: text
    content: ary tsy mahaloa-peo ny tendany.
  '8':
  - type: text
    content: Ho tahaka azy izay manao azy
  - type: text
    content: sy izay rehetra matoky azy.
  '9':
  - type: text
    content: Ry Israely ô, matokia NY TOMPO;
  - type: text
    content: heriny sy ampingany Izy.
