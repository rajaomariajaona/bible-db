document_id: PSA.115,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ho an’Andriamanitra irery ihany ny voninahitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TOMPO ô, aza izahay, aza izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no omena voninahitra fa ny anaranao ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny famindramponao sy ny fahamarinanao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ry taranak’i Arona ô, matokia NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heriny sy ampingany Izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ianareo izay matahotra NY TOMPO, matokia NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heriny sy ampingany Izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mahatsiaro antsika NY TOMPO ka mitahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitahy ny taranak’Israely Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitahy ny taranak’i Arona Izy;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: hotahiny izay matahotra NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny kely na ny lehibe.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hahamaro anareo anie NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ianareo mbamin’ny zanakareo.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hitahy anareo anie NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanao ny lanitra sy ny tany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny lanitra dia lanitry NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tany dia nomeny ho an’ny zanak’olombelona.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tsy mba hidera NY TOMPO ny maty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na izay rehetra midina any amin’ny mangingina;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: fa izahay kosa dia hisaotra NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’izao ka ho mandrakizay.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloia
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nahoana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' no miteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza izay Andriamaniny?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nefa any an-danitra Andriamanitsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nanao izay sitrapony rehetra Izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Volafotsy sy volamena ny sampin’ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: asa nataon’ny tanan’olombelona.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Manam-bava izy nefa tsy miteny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mana-maso izy nefa tsy mahita;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: manan-tsofina izy nefa tsy mandre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manana orona izy nefa tsy manimbolo;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: manan-tanana izy nefa tsy mandray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manan-tongotra izy nefa tsy mandeha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahaloa-peo ny tendany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ho tahaka azy izay manao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay rehetra matoky azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ry Israely ô, matokia NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heriny sy ampingany Izy.
