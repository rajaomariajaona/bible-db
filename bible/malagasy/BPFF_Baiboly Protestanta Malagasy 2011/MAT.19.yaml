document_id: MAT.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy ny fisaraham-panambadiana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 10.1-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa vitan’i Jesosy ireo teny ireo dia niala tany Galilia Izy ka nihazo ny lalana teny andafin’i Jordana, dia tonga tany amin’ny faritanin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nisy vahoaka betsaka nanaraka Azy dia nanasitrana azy tany Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' nanatona sady naka fanahy Azy hoe: Mahazo misaotra ny vadiny va ny lehilahy na inona na inona antony? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Izy namaly hoe: Tsy mbola novakinareo va, fa izay nahary azy tamin’ny voalohany dia nahary azy ho lahy sy vavy (Gen 1.27), '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'hoy koa Izy: Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin’ny vadiny; dia ho nofo iray ihany izy roa (Gen 2.24), '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'koa tsy roa intsony izy fa nofo iray ihany. Koa amin’izany, izay nampiraisin’Andriamanitra dia aoka tsy hosarahin’olona. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy ireo Taminy: Nahoana ary i Mosesy no nandidy hanome taratasy fisaoram-bady sy hisaotra azy (Deo 24.1)? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Jesosy taminy: Noho ny hamafin’ny fonareo no namelan’i Mosesy anareo hisao-bady; fa tamin’ny voalohany dia tsy mba toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa lazaiko aminareo: Na zovy na zovy no misaotra ny vadiny, afa-tsy noho ny fijangajangana ihany, ka mampakatra hafa, dia mijangajanga; ary izay mampakatra ny voasaotra dia mijangajanga koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny mpianany Taminy: Raha izany no toerana misy ny lehilahy manoloana ny vadiny dia aleo tsy manambady. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy Izy taminy: Tsy ny olona rehetra no mahay mandray izany teny izany fa izay nomena ihany; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'fa misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ionòka
  - type: text
    text: ' efa hatrany an-kibon’ny reniny; ary misy ionòka, noho ny nataon’ny olona; ary misy ionòka noho ny fanjakan’ny lanitra. Aoka handray izany izay mahay mandray.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy ny zaza
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 10.13-16; Lio 18.15-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tamin’izany, nisy zazakely noentina teo amin’i Jesosy mba hametrahany tanana sy hoentiny am-bavaka; saingy ny mpianany dia niteny mafy ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa hoy Jesosy: Avelao ny zaza ary aza rarana tsy hanatona Ahy; fa an’ny toa azy ny fanjakan’ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Rehefa avy nametraka ny tanany taminy Izy dia niala teo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy ilay zatovo mpanankarena
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 10.17-31; Lio 18.18-30; 13.30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Indro, nisy lehilahy iray nanatona Azy niteny hoe: Mpampianatra ô, inona no tsara hataoko mba hahazoako fiainana mandrakizay? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy Jesosy taminy: Nahoana Aho no anontanianao ny amin’izay tsara? Iray no tsara; fa raha te hiditra any amin’ny fiainana ianao, tandremo ny didy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy Ralehilahy taminy: Inona avy moa izany? Dia hoy Jesosy: Ny hoe: «Aza mamono olona, aza mijangajanga, aza mangalatra, aza mety ho vavolombelona mandainga, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'manajà ny rainao sy ny reninao (Eks 20.12-16), ary tiava ny namanao tahaka ny tenanao» (Lev 19.18). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy ilay zatovo Taminy: Izany rehetra izany dia efa voatandriko avokoa; fa inona no mbola tsy ampy amiko? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy Jesosy taminy: Raha te ho tanteraka ianao dia mandehana, amidio ny fanananao ka omeo ny mahantra, dia hanana rakitra any an-danitra ianao; ary avia hanaraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa nony nandre izany teny izany ilay zatovo dia niala tamin’alahelo satria nanankarena be izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy Jesosy tamin’ny mpianany: Lazaiko aminareo marina tokoa fa sarotra ny hidiran’ny mpanankarena amin’ny fanjakan’ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lazaiko aminareo indray: Moramora kokoa ny hidiran’ny rameva amin’ny vodifanjaitra noho ny hidiran’ny mpanankarena ao amin’ny fanjakan’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nony nandre izany ny mpianatra dia talanjona indrindra ka niresaka hoe: Iza indray ary no azo vonjena? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa Jesosy nibanjina azy ka niteny tamin’ireo hoe: Tsy hain’ny olona izany, kanefa ny zavatra rehetra dia hain’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy i Petera Taminy: Indro, efa nahafoy ny zavatra rehetra izahay ka nanaraka Anao; koa ahoana ny ho aminay? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hoy Jesosy taminy: Lazaiko aminareo marina tokoa fa rehefa tonga amin’ny fahateraham-baovao ka hipetraka amin’ny sezafiandrianan’ny voninahiny ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ', ianareo koa, izay nanaraka Ahy, dia hipetraka amin’ny sezafiandrianana roa amby folo ka hitsara ny fokon’Israely roa amby folo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary izay rehetra efa nahafoy trano, na rahalahy, na anabavy, na ray, na reny, na zanaka, na tany, noho ny anarako, dia handray avo zato heny ka handova fiainana mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nefa maro izay voalohany no ho farany ary izay farany no ho voalohany.
