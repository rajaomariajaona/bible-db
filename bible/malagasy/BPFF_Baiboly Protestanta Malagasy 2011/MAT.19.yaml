document_id: MAT.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Jesosy sy ny fisaraham-panambadiana
  - type: heading
    content: Mar 10.1-12
  - type: text
    content: 'Ary rehefa vitan’i Jesosy ireo teny ireo dia niala tany Galilia Izy ka nihazo ny lalana teny andafin’i Jordana, dia tonga tany amin’ny faritanin’i '
  - type: text
    content: Jodia
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Dia hoy ny mpianany Taminy: Raha izany no toerana misy ny lehilahy manoloana ny vadiny dia aleo tsy manambady. '
  '11':
  - type: text
    content: 'Fa hoy Izy taminy: Tsy ny olona rehetra no mahay mandray izany teny izany fa izay nomena ihany; '
  '12':
  - type: text
    content: 'fa misy '
  - type: text
    content: ionòka
  - type: text
    content: ' efa hatrany an-kibon’ny reniny; ary misy ionòka, noho ny nataon’ny olona; ary misy ionòka noho ny fanjakan’ny lanitra. Aoka handray izany izay mahay mandray.'
  - type: heading
    content: Jesosy sy ny zaza
  - type: heading
    content: Mar 10.13-16; Lio 18.15-17
  '13':
  - type: text
    content: 'Tamin’izany, nisy zazakely noentina teo amin’i Jesosy mba hametrahany tanana sy hoentiny am-bavaka; saingy ny mpianany dia niteny mafy ireny. '
  '14':
  - type: text
    content: 'Nefa hoy Jesosy: Avelao ny zaza ary aza rarana tsy hanatona Ahy; fa an’ny toa azy ny fanjakan’ny lanitra. '
  '15':
  - type: text
    content: Rehefa avy nametraka ny tanany taminy Izy dia niala teo.
  - type: heading
    content: Jesosy sy ilay zatovo mpanankarena
  - type: heading
    content: Mar 10.17-31; Lio 18.18-30; 13.30
  '16':
  - type: text
    content: 'Indro, nisy lehilahy iray nanatona Azy niteny hoe: Mpampianatra ô, inona no tsara hataoko mba hahazoako fiainana mandrakizay? '
  '17':
  - type: text
    content: 'Fa hoy Jesosy taminy: Nahoana Aho no anontanianao ny amin’izay tsara? Iray no tsara; fa raha te hiditra any amin’ny fiainana ianao, tandremo ny didy. '
  '18':
  - type: text
    content: 'Hoy Ralehilahy taminy: Inona avy moa izany? Dia hoy Jesosy: Ny hoe: «Aza mamono olona, aza mijangajanga, aza mangalatra, aza mety ho vavolombelona mandainga, '
  '19':
  - type: text
    content: 'manajà ny rainao sy ny reninao (Eks 20.12-16), ary tiava ny namanao tahaka ny tenanao» (Lev 19.18). '
  '2':
  - type: text
    content: Ary nisy vahoaka betsaka nanaraka Azy dia nanasitrana azy tany Izy.
  '20':
  - type: text
    content: 'Hoy ilay zatovo Taminy: Izany rehetra izany dia efa voatandriko avokoa; fa inona no mbola tsy ampy amiko? '
  '21':
  - type: text
    content: 'Dia hoy Jesosy taminy: Raha te ho tanteraka ianao dia mandehana, amidio ny fanananao ka omeo ny mahantra, dia hanana rakitra any an-danitra ianao; ary avia hanaraka Ahy. '
  '22':
  - type: text
    content: Fa nony nandre izany teny izany ilay zatovo dia niala tamin’alahelo satria nanankarena be izy.
  '23':
  - type: text
    content: 'Dia hoy Jesosy tamin’ny mpianany: Lazaiko aminareo marina tokoa fa sarotra ny hidiran’ny mpanankarena amin’ny fanjakan’ny lanitra. '
  '24':
  - type: text
    content: 'Lazaiko aminareo indray: Moramora kokoa ny hidiran’ny rameva amin’ny vodifanjaitra noho ny hidiran’ny mpanankarena ao amin’ny fanjakan’Andriamanitra.'
  '25':
  - type: text
    content: 'Ary nony nandre izany ny mpianatra dia talanjona indrindra ka niresaka hoe: Iza indray ary no azo vonjena? '
  '26':
  - type: text
    content: 'Fa Jesosy nibanjina azy ka niteny tamin’ireo hoe: Tsy hain’ny olona izany, kanefa ny zavatra rehetra dia hain’Andriamanitra.'
  '27':
  - type: text
    content: 'Dia hoy i Petera Taminy: Indro, efa nahafoy ny zavatra rehetra izahay ka nanaraka Anao; koa ahoana ny ho aminay? '
  '28':
  - type: text
    content: 'Hoy Jesosy taminy: Lazaiko aminareo marina tokoa fa rehefa tonga amin’ny fahateraham-baovao ka hipetraka amin’ny sezafiandrianan’ny voninahiny ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ', ianareo koa, izay nanaraka Ahy, dia hipetraka amin’ny sezafiandrianana roa amby folo ka hitsara ny fokon’Israely roa amby folo. '
  '29':
  - type: text
    content: 'Ary izay rehetra efa nahafoy trano, na rahalahy, na anabavy, na ray, na reny, na zanaka, na tany, noho ny anarako, dia handray avo zato heny ka handova fiainana mandrakizay. '
  '3':
  - type: text
    content: 'Dia nisy '
  - type: text
    content: Fariseo
  - type: text
    content: ' nanatona sady naka fanahy Azy hoe: Mahazo misaotra ny vadiny va ny lehilahy na inona na inona antony? '
  '30':
  - type: text
    content: Nefa maro izay voalohany no ho farany ary izay farany no ho voalohany.
  '4':
  - type: text
    content: 'Fa Izy namaly hoe: Tsy mbola novakinareo va, fa izay nahary azy tamin’ny voalohany dia nahary azy ho lahy sy vavy (Gen 1.27), '
  '5':
  - type: text
    content: 'hoy koa Izy: Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin’ny vadiny; dia ho nofo iray ihany izy roa (Gen 2.24), '
  '6':
  - type: text
    content: 'koa tsy roa intsony izy fa nofo iray ihany. Koa amin’izany, izay nampiraisin’Andriamanitra dia aoka tsy hosarahin’olona. '
  '7':
  - type: text
    content: 'Hoy ireo Taminy: Nahoana ary i Mosesy no nandidy hanome taratasy fisaoram-bady sy hisaotra azy (Deo 24.1)? '
  '8':
  - type: text
    content: 'Ary hoy Jesosy taminy: Noho ny hamafin’ny fonareo no namelan’i Mosesy anareo hisao-bady; fa tamin’ny voalohany dia tsy mba toy izany. '
  '9':
  - type: text
    content: 'Fa lazaiko aminareo: Na zovy na zovy no misaotra ny vadiny, afa-tsy noho ny fijangajangana ihany, ka mampakatra hafa, dia mijangajanga; ary izay mampakatra ny voasaotra dia mijangajanga koa.'
