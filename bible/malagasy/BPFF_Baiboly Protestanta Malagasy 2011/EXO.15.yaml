document_id: EXO.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hira nataon’i Mosesy sy ny Zanak’Israely
  - type: text
    content: 'Tamin’izay i Mosesy sy ny Zanak’Israely dia nihira izao hira izao ho an’NY TOMPO hoe:'
  - type: text
    content: Hihira ho an’NY TOMPO aho fa avo indrindra Izy;
  - type: text
    content: ny soavaly sy ny mpitaingina azy dia nariany any amin’ny ranomasina.
  '10':
  - type: text
    content: Ny fofonainao no nitsofanao
  - type: text
    content: dia nanarona azy ny ranomasina;
  - type: text
    content: nilentika tahaka ny firaka ao anatin’ny rano mahery izy.
  '11':
  - type: text
    content: TOMPO ô, iza no tahaka Anao
  - type: text
    content: amin’izay andriamanitra?
  - type: text
    content: Iza no tahaka Anao,
  - type: text
    content: izay ankalazaina amin’ny fahamasinana,
  - type: text
    content: deraina amin’ny fahatahorana,
  - type: text
    content: ary mpanao fahagagana?
  '12':
  - type: text
    content: Natsotranao ny tananao ankavanana
  - type: text
    content: dia nitelina azy ireo ny tany.
  '13':
  - type: text
    content: Tarihinao amin’ny famindramponao
  - type: text
    content: ny firenena izay navotanao;
  - type: text
    content: entinao amin’ny herinao izy ho any amin’ny fonenanao masina.
  '14':
  - type: text
    content: Mandre ireo firenena ka raiki-tahotra;
  - type: text
    content: hovitra no mahazo ny mponina any Filistia;
  '15':
  - type: text
    content: toran-kovitra ireo loham-pirenen’i Edoma;
  - type: text
    content: azon-korohoro ireo lehilahy maherin’i Moaba;
  - type: text
    content: reraka ny fon’izay rehetra monina any Kanana.
  '16':
  - type: text
    content: Tonga aminy ny tahotra sy ny hovitra;
  - type: text
    content: noho ny halehiben’ny sandrinao
  - type: text
    content: dia mangina tahaka ny vato izy,
  - type: text
    content: mandra-pandalon’ny olonao, TOMPO ô,
  - type: text
    content: mandra-pandalon’ny olona izay nalainao ho Anao.
  '17':
  - type: text
    content: Dia hampiditra azy Ianao
  - type: text
    content: ka hamponina azy ao amin’ny tendrombohitra lovanao,
  - type: text
    content: ao amin’ny fonenana nataonao hitoeranao, TOMPO ô,
  - type: text
    content: dia ao amin’ny fitoerana masina
  - type: text
    content: naorin’ny tananao, Tompo ô.
  '18':
  - type: text
    content: NY TOMPO hanjaka mandrakizay doria.
  '19':
  - type: text
    content: Fa niditra tao anaty ranomasina ny soavalin’i Farao sy ny kalesy fitondrany miady ary ny mpitaingin-tsoavaliny, ary NY TOMPO nampikatona ny ranomasina tamin’izy ireo; fa ny Zanak’Israely kosa dia nandeha tamin’ny tany maina teo afovoan’ny ranomasina.
  '2':
  - type: text
    content: NY TOMPO no heriko sy anton’ny fiderako,
  - type: text
    content: fa famonjena ahy Izy;
  - type: text
    content: Izy no Andriamanitro ka hankalaza Azy aho.
  - type: text
    content: Izy no Andriamanitry ny razako
  - type: text
    content: ka hanandratra Azy aho.
  '20':
  - type: text
    content: 'Ary i Miriama mpaminanivavy, anabavin’i Arona, dia nitondra ny ampongatapaka teny an-tanany; ary nanaraka azy ny vehivavy rehetra nitondra ampongatapaka sady nandihy. '
  '21':
  - type: text
    content: 'Ary namaly azy ireo i Miriama hoe:'
  - type: text
    content: Mihirà ho an’NY TOMPO
  - type: text
    content: fa avo indrindra Izy;
  - type: text
    content: ny soavaly sy ny mpitaingina azy
  - type: text
    content: dia nariany ao amin’ny ranomasina.
  - type: heading
    content: Ny rano tao Mara
  '22':
  - type: text
    content: Ary nitondra ny Israely nifindra avy teo amoron’ny Ranomasina Mena i Mosesy ka nitarika azy ho any amin’ny tany efitra Sora, ary nandeha hateloana tany an-tany efitra ireo nefa tsy nahita rano.
  '23':
  - type: text
    content: Dia tonga tao Mara izy ireo nefa tsy nahasotro ny rano tao Mara satria nangidy ny rano tao. Izany no nanaovany ny anarany hoe Mara
  - type: note
    content: 'Mara: Mangidy.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Ary nimonomonona tamin’i Mosesy ny olona ka niteny hoe: Inona no hosotroinay? '
  '25':
  - type: text
    content: 'Dia nitaraina tamin’NY TOMPO i Mosesy ka nanehoan’NY TOMPO hazo iray; rehefa natsipiny tao anatin’ny rano io hazo io dia tonga mamy ny rano. Tao no nanomezan’NY TOMPO lalàna sy fitsipika ho azy ary tao no nizahany toetra azy '
  '26':
  - type: text
    content: 'ka hoy Izy: Raha mazoto mihaino ny feon’NY TOMPO Andriamanitrao ianao ka manao izay mahitsy eo imasony sy mihaino ny lalànany ary mitandrina ny didiny rehetra dia tsy hisy hataoko aminao ireny aretina rehetra izay nataoko tamin’ny Ejiptiana ireny; fa Izaho no TOMPO izay manasitrana anao. '
  '27':
  - type: text
    content: Dia tonga tao Elima izy ireo; tao no nisy loharano roa amby folo sy hazo daty fitopolo, dia nitoby teo anilan’ny rano izy.
  '3':
  - type: text
    content: NY TOMPO dia mpiady mahery.
  - type: text
    content: NY TOMPO no anarany.
  '4':
  - type: text
    content: Ny kalesin’i Farao fitondra miady sy ny miaramilany
  - type: text
    content: dia natsipiny ao amin’ny ranomasina;
  - type: text
    content: ary ny manamboninahitra voafantina
  - type: text
    content: dia nilentika ao amin’ny Ranomasina Mena.
  '5':
  - type: text
    content: 'Nanarona azy ireo ny lalina:'
  - type: text
    content: Nilentika tany ambany indrindra tahaka ny vato izy ireo.
  '6':
  - type: text
    content: Ny tananao ankavanana, TOMPO ô,
  - type: text
    content: dia malaza amin’ny hery;
  - type: text
    content: ny tananao ankavanana, TOMPO ô,
  - type: text
    content: no manorotoro ny fahavalo.
  '7':
  - type: text
    content: Amin’ny halehiben’ny voninahitrao
  - type: text
    content: no andringananao izay mitsangana hanohitra Anao;
  - type: text
    content: alefanao ny fahatezeranao mirehitra
  - type: text
    content: ka mandevona azy toy ny mololo.
  '8':
  - type: text
    content: Ny fofonain’ny vavoronao
  - type: text
    content: no nampivangongo ny rano;
  - type: text
    content: nijoro toy ny antontan-javatra ny rano mikoriana;
  - type: text
    content: nivaingana teo afovoan’ny ranomasina ny rano lalina.
  '9':
  - type: text
    content: 'Hoy ny fahavalo: Hanenjika aho, hahatratra aho,'
  - type: text
    content: hizara babo aho ka hameno ny tendako amin’izany,
  - type: text
    content: hotsoahiko ny sabatro
  - type: text
    content: ka hamongotra azy ny tanako.
