document_id: EXO.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hira nataon’i Mosesy sy ny Zanak’Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izay i Mosesy sy ny Zanak’Israely dia nihira izao hira izao ho an’NY TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihira ho an’NY TOMPO aho fa avo indrindra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny soavaly sy ny mpitaingina azy dia nariany any amin’ny ranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: NY TOMPO no heriko sy anton’ny fiderako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa famonjena ahy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no Andriamanitro ka hankalaza Azy aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no Andriamanitry ny razako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanandratra Azy aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: NY TOMPO dia mpiady mahery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny kalesin’i Farao fitondra miady sy ny miaramilany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia natsipiny ao amin’ny ranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny manamboninahitra voafantina
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nilentika ao amin’ny Ranomasina Mena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nanarona azy ireo ny lalina:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nilentika tany ambany indrindra tahaka ny vato izy ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny tananao ankavanana, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia malaza amin’ny hery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tananao ankavanana, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no manorotoro ny fahavalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’ny halehiben’ny voninahitrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no andringananao izay mitsangana hanohitra Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alefanao ny fahatezeranao mirehitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandevona azy toy ny mololo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny fofonain’ny vavoronao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nampivangongo ny rano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nijoro toy ny antontan-javatra ny rano mikoriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nivaingana teo afovoan’ny ranomasina ny rano lalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy ny fahavalo: Hanenjika aho, hahatratra aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hizara babo aho ka hameno ny tendako amin’izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hotsoahiko ny sabatro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamongotra azy ny tanako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fofonainao no nitsofanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanarona azy ny ranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nilentika tahaka ny firaka ao anatin’ny rano mahery izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: TOMPO ô, iza no tahaka Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no tahaka Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ankalazaina amin’ny fahamasinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: deraina amin’ny fahatahorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mpanao fahagagana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Natsotranao ny tananao ankavanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nitelina azy ireo ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tarihinao amin’ny famindramponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny firenena izay navotanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: entinao amin’ny herinao izy ho any amin’ny fonenanao masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mandre ireo firenena ka raiki-tahotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hovitra no mahazo ny mponina any Filistia;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: toran-kovitra ireo loham-pirenen’i Edoma;
- type: usfm
  marker: q1
  children:
  - type: text
    text: azon-korohoro ireo lehilahy maherin’i Moaba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: reraka ny fon’izay rehetra monina any Kanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tonga aminy ny tahotra sy ny hovitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny halehiben’ny sandrinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mangina tahaka ny vato izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pandalon’ny olonao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pandalon’ny olona izay nalainao ho Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia hampiditra azy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamponina azy ao amin’ny tendrombohitra lovanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny fonenana nataonao hitoeranao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ao amin’ny fitoerana masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: naorin’ny tananao, Tompo ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: NY TOMPO hanjaka mandrakizay doria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa niditra tao anaty ranomasina ny soavalin’i Farao sy ny kalesy fitondrany miady ary ny mpitaingin-tsoavaliny, ary NY TOMPO nampikatona ny ranomasina tamin’izy ireo; fa ny Zanak’Israely kosa dia nandeha tamin’ny tany maina teo afovoan’ny ranomasina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary i Miriama mpaminanivavy, anabavin’i Arona, dia nitondra ny ampongatapaka teny an-tanany; ary nanaraka azy ny vehivavy rehetra nitondra ampongatapaka sady nandihy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary namaly azy ireo i Miriama hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihirà ho an’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa avo indrindra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny soavaly sy ny mpitaingina azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nariany ao amin’ny ranomasina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny rano tao Mara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary nitondra ny Israely nifindra avy teo amoron’ny Ranomasina Mena i Mosesy ka nitarika azy ho any amin’ny tany efitra Sora, ary nandeha hateloana tany an-tany efitra ireo nefa tsy nahita rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia tonga tao Mara izy ireo nefa tsy nahasotro ny rano tao Mara satria nangidy ny rano tao. Izany no nanaovany ny anarany hoe Mara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mara: Mangidy.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nimonomonona tamin’i Mosesy ny olona ka niteny hoe: Inona no hosotroinay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nitaraina tamin’NY TOMPO i Mosesy ka nanehoan’NY TOMPO hazo iray; rehefa natsipiny tao anatin’ny rano io hazo io dia tonga mamy ny rano. Tao no nanomezan’NY TOMPO lalàna sy fitsipika ho azy ary tao no nizahany toetra azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ka hoy Izy: Raha mazoto mihaino ny feon’NY TOMPO Andriamanitrao ianao ka manao izay mahitsy eo imasony sy mihaino ny lalànany ary mitandrina ny didiny rehetra dia tsy hisy hataoko aminao ireny aretina rehetra izay nataoko tamin’ny Ejiptiana ireny; fa Izaho no TOMPO izay manasitrana anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia tonga tao Elima izy ireo; tao no nisy loharano roa amby folo sy hazo daty fitopolo, dia nitoby teo anilan’ny rano izy.
