document_id: EXO.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Mosesy sy i Jetro rafozany
  - type: text
    content: 'Ary ren’i Jetro, rafozan’i Mosesy, mpisorona tany Midiana, izay rehetra nataon’Andriamanitra ho an’i Mosesy sy ny Israelita olony, dia ny nitondran’NY TOMPO ny Israely nivoaka avy tany Ejipta. '
  '10':
  - type: text
    content: 'Ary hoy i Jetro: Isaorana anie NY TOMPO izay nanafaka anareo tamin’ny tanan’ny Ejiptiana sy tamin’ny tanan’i Farao, NY TOMPO izay nanafaka ny olona tsy ho ao ambanin’ny tanan’ny Ejiptiana. '
  '11':
  - type: text
    content: Ankehitriny, fantatro fa lehibe NY TOMPO mihoatra noho ny andriamanitra rehetra, na dia nanitsakitsaka ny olony aza ny Ejiptiana.
  '12':
  - type: text
    content: Ary i Jetro, rafozan’i Mosesy, dia nitondra fanatitra dorana manontolo sy fanatitra hafa alatsa-dra ho an’Andriamanitra. Dia tonga i Arona sy ny loholon’ny Israely rehetra hiara-misakafo amin’ny rafozan’i Mosesy teo anatrehan’Andriamanitra.
  - type: heading
    content: Manendry lehibe hitsara ny olona i Mosesy
  '13':
  - type: text
    content: 'Nony maraina dia nipetraka hitsara ny olona i Mosesy, ary nijoro teo anatrehan’i Mosesy hatramin’ny maraina ka hatramin’ny hariva ny olona. '
  '14':
  - type: text
    content: 'Rehefa hitan’ny rafozan’i Mosesy izay rehetra nataony tamin’ny olona dia hoy izy: Inona izao zavatra ataonao amin’ny olona izao? Nahoana no ianao irery no mipetraka fa ny olona rehetra kosa dia mitsangana eo anoloanao hatramin’ny maraina ka hatramin’ny hariva? '
  '15':
  - type: text
    content: 'Ary hoy i Mosesy tamin’ny rafozany: Satria mankaty amiko ny olona hanontany amin’Andriamanitra. '
  '16':
  - type: text
    content: Raha misy manana ady izy ireo dia mankaty amiko ka mitsara azy roa tonta aho ary mampahalala azy ny didin’Andriamanitra sy ny lalànany.
  '17':
  - type: text
    content: 'Dia hoy ny rafozan’i Mosesy taminy: Tsy tsara izao zavatra ataonao izao. '
  '18':
  - type: text
    content: 'Samy ho reraka mihitsy, na ianao na ireo olona miaraka aminao ireo; mavesatra aminao loatra izao zavatra izao ka tsy ho zakanao irery ny hanao izao. '
  '19':
  - type: text
    content: 'Koa ankehitriny, ekeo ny teniko fa hanoro hevitra anao aho, ary Andriamanitra anie homba anao: Aoka ianao ho solontenan’ny olona amin’Andriamanitra mba hitondranao ny raharahany ho eo amin’Andriamanitra. '
  '2':
  - type: text
    content: 'Koa noentin’i Jetro, rafozan’i Mosesy, i Zipora vadin’i Mosesy, izay nalefany nody, '
  '20':
  - type: text
    content: 'Hampianatra azy ny didy sy ny lalàna ianao sady hampahalala azy ny lalana izay mety halehany sy izay tokony hataony. '
  '21':
  - type: text
    content: 'Nefa mizahà izay lehilahy mahay sy matahotra an’Andriamanitra eo amin’ny olona rehetra, dia izay lehilahy marina sady tsy tia kolikoly, ary manendre mpifehy arivo, mpifehy zato, mpifehy dimampolo ary mpifehy folo hifehy azy. '
  '22':
  - type: text
    content: 'Aoka ireo no hitsara ny olona isak’izay mandeha, fa ny ady lehibe rehetra ihany no aoka hoentiny eo aminao, ary ny ady madinidinika rehetra kosa dia aoka hotsarainy ihany. Ho maivamaivana kokoa aminao izany, fa hiara-mitondra aminao ireo. '
  '23':
  - type: text
    content: Raha tanterahinao izany zavatra izany ka hilaza izay didy aminao Andriamanitra dia haharitra ianao, ary izao olona rehetra izao koa dia ho tonga soa amantsara any amin’ny taniny.
  '24':
  - type: text
    content: 'Dia neken’i Mosesy ny tenin’ny rafozany ka nataony avokoa izay rehetra efa nolazainy. '
  '25':
  - type: text
    content: 'Nofidin’i Mosesy ary izay lehilahy mahay tamin’ny Israely rehetra ka nataony lohan’ny olona hifehy azy, ho mpifehy arivo, ho mpifehy zato, ho mpifehy dimampolo ary ho mpifehy folo. '
  '26':
  - type: text
    content: Dia nitsara ny olona hatrany hatrany ireo; koa ny ady sarotra ihany no noentiny teo amin’i Mosesy, fa ny ady madinika rehetra kosa dia notsarainy ihany.
  '27':
  - type: text
    content: Dia navelan’i Mosesy handeha ny rafozany ka lasa nody any amin’ny taniny izy.
  '3':
  - type: text
    content: 'sy ny zanany mirahalahy: Gersoma'
  - type: note
    content: 'Gersoma: Mpivahiny.'
  - type: text
    content: ' no anaran’ny iray, satria hoy izy: Vahiny atỳ amin’ny tanin’ny firenena hafa aho; '
  '4':
  - type: text
    content: ary Eliezera
  - type: note
    content: 'Eliezera: Andriamanitro no famonjena.'
  - type: text
    content: ' kosa no anaran’ny faharoa, fa hoy izy: Andriamanitry ny razako no namonjy ahy ka nahafaka ahy tsy ho voan’ny sabatr’i Farao. '
  '5':
  - type: text
    content: 'Dia tonga i Jetro, rafozan’i Mosesy, nitondra ny vady aman-janak’i Mosesy hankany aminy any an-tany efitra izay nitobiany, teo anilan’ny tendrombohitr’Andriamanitra. '
  '6':
  - type: text
    content: 'Dia nampilaza tamin’i Mosesy izy hoe: Izaho Jetro rafozanao dia tonga hamangy anao, miaraka amin’ny vadinao sy ny zanany roa lahy. '
  '7':
  - type: text
    content: 'Ary tonga hitsena ny rafozany i Mosesy dia niankohoka sady nanoroka azy. Nifampiarahaba izy mianaka, dia niditra tao an-day. '
  '8':
  - type: text
    content: Dia notantarain’i Mosesy tamin’ny rafozany izay rehetra nataon’NY TOMPO tamin’i Farao sy tamin’ny Ejiptiana noho ny amin’ny Israelita, nolazainy mbamin’ny fahoriana rehetra nanjo azy teny an-dalana sy ny namonjen’NY TOMPO azy.
  '9':
  - type: text
    content: 'Dia faly i Jetro noho ny soa rehetra izay nataon’NY TOMPO tamin’ny Israelita izay novonjeny ho afaka tamin’ny tanan’ny Ejiptiana. '
