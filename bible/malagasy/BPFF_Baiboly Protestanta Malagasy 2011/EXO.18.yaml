document_id: EXO.18,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Mosesy sy i Jetro rafozany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary ren’i Jetro, rafozan’i Mosesy, mpisorona tany Midiana, izay rehetra nataon’Andriamanitra ho an’i Mosesy sy ny Israelita olony, dia ny nitondran’NY TOMPO ny Israely nivoaka avy tany Ejipta. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy i Jetro: Isaorana anie NY TOMPO izay nanafaka anareo tamin’ny tanan’ny Ejiptiana sy tamin’ny tanan’i Farao, NY TOMPO izay nanafaka ny olona tsy ho ao ambanin’ny tanan’ny Ejiptiana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ankehitriny, fantatro fa lehibe NY TOMPO mihoatra noho ny andriamanitra rehetra, na dia nanitsakitsaka ny olony aza ny Ejiptiana.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary i Jetro, rafozan’i Mosesy, dia nitondra fanatitra dorana manontolo sy fanatitra hafa alatsa-dra ho an’Andriamanitra. Dia tonga i Arona sy ny loholon’ny Israely rehetra hiara-misakafo amin’ny rafozan’i Mosesy teo anatrehan’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manendry lehibe hitsara ny olona i Mosesy
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nony maraina dia nipetraka hitsara ny olona i Mosesy, ary nijoro teo anatrehan’i Mosesy hatramin’ny maraina ka hatramin’ny hariva ny olona. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Rehefa hitan’ny rafozan’i Mosesy izay rehetra nataony tamin’ny olona dia hoy izy: Inona izao zavatra ataonao amin’ny olona izao? Nahoana no ianao irery no mipetraka fa ny olona rehetra kosa dia mitsangana eo anoloanao hatramin’ny maraina ka hatramin’ny hariva? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy i Mosesy tamin’ny rafozany: Satria mankaty amiko ny olona hanontany amin’Andriamanitra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Raha misy manana ady izy ireo dia mankaty amiko ka mitsara azy roa tonta aho ary mampahalala azy ny didin’Andriamanitra sy ny lalànany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy ny rafozan’i Mosesy taminy: Tsy tsara izao zavatra ataonao izao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Samy ho reraka mihitsy, na ianao na ireo olona miaraka aminao ireo; mavesatra aminao loatra izao zavatra izao ka tsy ho zakanao irery ny hanao izao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa ankehitriny, ekeo ny teniko fa hanoro hevitra anao aho, ary Andriamanitra anie homba anao: Aoka ianao ho solontenan’ny olona amin’Andriamanitra mba hitondranao ny raharahany ho eo amin’Andriamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Koa noentin’i Jetro, rafozan’i Mosesy, i Zipora vadin’i Mosesy, izay nalefany nody, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hampianatra azy ny didy sy ny lalàna ianao sady hampahalala azy ny lalana izay mety halehany sy izay tokony hataony. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nefa mizahà izay lehilahy mahay sy matahotra an’Andriamanitra eo amin’ny olona rehetra, dia izay lehilahy marina sady tsy tia kolikoly, ary manendre mpifehy arivo, mpifehy zato, mpifehy dimampolo ary mpifehy folo hifehy azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Aoka ireo no hitsara ny olona isak’izay mandeha, fa ny ady lehibe rehetra ihany no aoka hoentiny eo aminao, ary ny ady madinidinika rehetra kosa dia aoka hotsarainy ihany. Ho maivamaivana kokoa aminao izany, fa hiara-mitondra aminao ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Raha tanterahinao izany zavatra izany ka hilaza izay didy aminao Andriamanitra dia haharitra ianao, ary izao olona rehetra izao koa dia ho tonga soa amantsara any amin’ny taniny.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia neken’i Mosesy ny tenin’ny rafozany ka nataony avokoa izay rehetra efa nolazainy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nofidin’i Mosesy ary izay lehilahy mahay tamin’ny Israely rehetra ka nataony lohan’ny olona hifehy azy, ho mpifehy arivo, ho mpifehy zato, ho mpifehy dimampolo ary ho mpifehy folo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia nitsara ny olona hatrany hatrany ireo; koa ny ady sarotra ihany no noentiny teo amin’i Mosesy, fa ny ady madinika rehetra kosa dia notsarainy ihany.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia navelan’i Mosesy handeha ny rafozany ka lasa nody any amin’ny taniny izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'sy ny zanany mirahalahy: Gersoma'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gersoma: Mpivahiny.'
      marker-yv: yv-n
    - type: text
      text: ' no anaran’ny iray, satria hoy izy: Vahiny atỳ amin’ny tanin’ny firenena hafa aho; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ary Eliezera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Eliezera: Andriamanitro no famonjena.'
      marker-yv: yv-n
    - type: text
      text: ' kosa no anaran’ny faharoa, fa hoy izy: Andriamanitry ny razako no namonjy ahy ka nahafaka ahy tsy ho voan’ny sabatr’i Farao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia tonga i Jetro, rafozan’i Mosesy, nitondra ny vady aman-janak’i Mosesy hankany aminy any an-tany efitra izay nitobiany, teo anilan’ny tendrombohitr’Andriamanitra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nampilaza tamin’i Mosesy izy hoe: Izaho Jetro rafozanao dia tonga hamangy anao, miaraka amin’ny vadinao sy ny zanany roa lahy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary tonga hitsena ny rafozany i Mosesy dia niankohoka sady nanoroka azy. Nifampiarahaba izy mianaka, dia niditra tao an-day. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia notantarain’i Mosesy tamin’ny rafozany izay rehetra nataon’NY TOMPO tamin’i Farao sy tamin’ny Ejiptiana noho ny amin’ny Israelita, nolazainy mbamin’ny fahoriana rehetra nanjo azy teny an-dalana sy ny namonjen’NY TOMPO azy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia faly i Jetro noho ny soa rehetra izay nataon’NY TOMPO tamin’ny Israelita izay novonjeny ho afaka tamin’ny tanan’ny Ejiptiana. '
