document_id: 2SA.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tonga mpanjakan’i Joda tao Hebrona i Davida
  - type: text
    content: 'Rehefa afaka izany dia nanontany NY TOMPO i Davida hoe: Hiakatra ho any amin’ny tanana iray any '
  - type: text
    content: Joda
  - type: text
    content: ' va aho? Dia hoy NY TOMPO taminy: Miakara! Hoy i Davida: Aiza no hiakarako? Dia hoy Izy: Any Hebrona. '
  '10':
  - type: text
    content: 'Efapolo taona no nahaveloman’Isboseta, zanak’i Saoly, fony izy nanomboka nanjaka tamin’ny Israely, ary roa taona no nanjakany. Ny fokon’i '
  - type: text
    content: Joda
  - type: text
    content: ' ihany no nomba an’i Davida. '
  '11':
  - type: text
    content: Fito taona sy enim-bolana no nanjakan’i Davida tao Hebrona tamin’ny taranak’i Joda.
  - type: heading
    content: Ny adin’ny Joda sy ny Israely tao Gibeona
  '12':
  - type: text
    content: 'Ary i Abnera, zanak’i Nera, sy ny mpanompon’Isboseta, zanak’i Saoly, dia niala tao Mahanaima ka nankany Gibeona. '
  '13':
  - type: text
    content: 'I Joaba, zanak’i Zeroia, sy ireo mpanompon’i Davida kosa dia nandeha ka tafahaona tamin’ireo teo amoron’ny kamory tao Gibeona; dia samy nipetraka teo amin’ny lafin’ny kamory avy izy. '
  '14':
  - type: text
    content: 'Ary hoy i Abnera tamin’i Joaba: Miangavy anao aho, aoka hitsangana ny zatovo hanao kilalao eto anatrehantsika. Hoy i Joaba: Aoka ary izy hitsangana. '
  '15':
  - type: text
    content: 'Dia nisy nitsangana ka nita, roa amby folo lahy tamin’ny Benjamina, izay an’Isboseta, zanak’i Saoly, ary roa amby folo lahy koa tamin’ny mpanompon’i Davida. '
  '16':
  - type: text
    content: Samy nifampisavika izy rehetra sady nifampihazon-doha ka nifandefon-tehezana tamin’ny sabatra dia niara-niankarapoka; koa izany no nanaovana izany toerana ao Gibeona izany hoe Helkata-Hazorima
  - type: note
    content: 'Helkata-Hazorima: Tanin’ny sabatra maranitra.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: Mafy ny ady tamin’izany andro izany ka resy teo anoloan’ny mpanompon’i Davida i Abnera sy ny lehilahin’ny Israely.
  '18':
  - type: text
    content: 'Mba teo koa izy telo lahy zanak’i Zeroia, dia i Joaba sy i Abisay ary i Asahela. I Asahela dia haingam-pandeha tahaka ny gazela any an-tany efitra. '
  '19':
  - type: text
    content: 'Nanenjika an’i Abnera i Asahela ka ny fandehany nanenjika an’i Abnera dia tsy nivily mihitsy na tamin’ny ankavanana na tamin’ny ankavia. '
  '2':
  - type: text
    content: 'Dia niakatra nankany i Davida mbamin’ny vadiny roa, dia i Ahinoama jezirelita sy i Abigaila, ilay novadin’i Nabala karmelita. '
  '20':
  - type: text
    content: 'Ary niherika i Abnera ka niteny hoe: Ianao moa izany, ry Asahela? Dia hoy izy: Izaho ity. '
  '21':
  - type: text
    content: 'Dia hoy i Abnera taminy: Mivilia ianao, na ho amin’ny ankavanana, na ho amin’ny ankavia; zatovo iray no sambory ka baboy ho anao izay eny aminy rehetra. Tsy nety nivily anefa i Asahela fa nanenjika azy ihany. '
  '22':
  - type: text
    content: 'Hoy indray i Abnera tamin’i Asahela: Mivilia ianao fa aza manenjika ahy; fa nahoana moa aho no hamely anao hiankarapoka amin’ny tany, ary hataoko ahoana no fijery an’i Joaba rahalahinao? '
  '23':
  - type: text
    content: Nefa tsy nety nivily ihany izy ka nasian’i Abnera ny vodilefona ny kibony dia niboroaka teo an-damosiny ny lefona ka niankarapoka teo izy ary maty niaraka tamin’izay. Ary izay rehetra tonga teo amin’ilay niankarapohan’i Asahela sy nahafatesany dia nijanona.
  '24':
  - type: text
    content: 'Nanenjika an’i Abnera i Joaba sy i Abisay ka nony tonga teo amin’ny havoanan’i Ama izay tandrifin’i Gia amin’ny lalana mankany amin’ny tany efitr’i Gibeona izy dia maty ny masoandro. '
  '25':
  - type: text
    content: 'Dia niangona teo amin’i Abnera ny taranak’i Benjamina ka nivondrona ho andiany iray ary nijanona teo an-tampon’ny havoana iray. '
  '26':
  - type: text
    content: 'Ary niantso an’i Joaba i Abnera hoe: Dia handany mandrakizay va ny sabatra? Tsy fantatrao va fa hangidy no hiafaran’izany? Mandra-pahoviana no tsy hampivereninao tsy hanenjika ny rahalahiny ny olona? '
  '27':
  - type: text
    content: 'Hoy i Joaba: Raha velona koa Andriamanitra, raha tsy ilay teninao iny'
  - type: note
    content: Zahao 2.14.
  - type: text
    content: ' dia efa lasa nody androany maraina avokoa ny olona ka tsy nanenjika ny rahalahiny akory. '
  '28':
  - type: text
    content: Dia nitsoka ny anjomara i Joaba ka nijanona ny olona rehetra ary tsy nanenjika ny Israely na niady taminy intsony izy.
  '29':
  - type: text
    content: 'Rehefa nandeha nandritra ny alina namakivaky ny tany ngazana i Abnera sy ny olony dia nita an’i Jordana sy namakivaky an’i Bitirona manontolo ka tonga tao Mahanaima. '
  '3':
  - type: text
    content: Ny olona izay tao amin’i Davida mbamin’ny ankohonan’ireo koa dia samy noentiny niakatra ary nonina tao amin’ny tanànan’i Hebrona izy ireo.
  '30':
  - type: text
    content: 'Nony niverina avy nanenjika an’i Abnera i Joaba dia novoriny ny olona rehetra; sivy amby folo lahy ihany mbamin’i Asahela no tsy teo ny mpanompon’i Davida. '
  '31':
  - type: text
    content: 'Ny mpanompon’i Davida kosa dia nahafaty enimpolo sy telonjato lahy tamin’ny Benjaminita sy ny olon’i Abnera. '
  '32':
  - type: text
    content: Ary noentiny i Asahela ka naleviny tao amin’ny fasan-drainy izay tao Betlehema. Ary nandeha mandritra ny alina i Joaba sy ny olony ka tonga tao Hebrona raha vao nazava ratsy ny andro.
  '4':
  - type: text
    content: Dia avy ny lehilahin’ny Joda ka nanosotra an’i Davida tao mba ho mpanjaka amin’ny taranak’i Joda.
  - type: text
    content: 'Ary nisy nanambara tamin’i Davida hoe: Ny olona any Jabesy-Gileada no nandevina an’i Saoly. '
  '5':
  - type: text
    content: 'Dia nandefa iraka hankany amin’ny mponina any Jabesy-Gileada i Davida hilaza aminy hoe: Hotahin’NY TOMPO anie ianareo noho ny soa nataonareo tamin’i Saoly tomponareo tamin’ny nandevenanareo azy. '
  '6':
  - type: text
    content: 'Koa haneho famindrampo sy fahamarinana aminareo anie NY TOMPO, sady izaho koa dia efa manao izao soa izao aminareo noho ny nanaovanareo izany zavatra izany. '
  '7':
  - type: text
    content: Ary ankehitriny, aoka hampaherezina anie ny tananareo, ary aoka hatanjaka ianareo; fa maty i Saoly tomponareo, koa izaho no nohosoran’ny fokon’i Joda ho mpanjaka eo aminy.
  - type: heading
    content: Voatendry ho mpanjakan’ny Israely Isboseta
  '8':
  - type: text
    content: 'Fa i Abnera, zanak’i Nera, komandin’ny miaramilan’i Saoly kosa, dia naka an’Isboseta, zanakalahin’i Saoly, ka nitondra azy nankany Mahanaima '
  '9':
  - type: text
    content: 'dia nampanjaka azy tamin’ny Gileada sy ny Asorita sy i Jezirela sy i Efraima ary i Benjamina ary tamin’ny Israely rehetra. '
