document_id: 2SA.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga mpanjakan’i Joda tao Hebrona i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany dia nanontany NY TOMPO i Davida hoe: Hiakatra ho any amin’ny tanana iray any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' va aho? Dia hoy NY TOMPO taminy: Miakara! Hoy i Davida: Aiza no hiakarako? Dia hoy Izy: Any Hebrona. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niakatra nankany i Davida mbamin’ny vadiny roa, dia i Ahinoama jezirelita sy i Abigaila, ilay novadin’i Nabala karmelita. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny olona izay tao amin’i Davida mbamin’ny ankohonan’ireo koa dia samy noentiny niakatra ary nonina tao amin’ny tanànan’i Hebrona izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia avy ny lehilahin’ny Joda ka nanosotra an’i Davida tao mba ho mpanjaka amin’ny taranak’i Joda.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nisy nanambara tamin’i Davida hoe: Ny olona any Jabesy-Gileada no nandevina an’i Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nandefa iraka hankany amin’ny mponina any Jabesy-Gileada i Davida hilaza aminy hoe: Hotahin’NY TOMPO anie ianareo noho ny soa nataonareo tamin’i Saoly tomponareo tamin’ny nandevenanareo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa haneho famindrampo sy fahamarinana aminareo anie NY TOMPO, sady izaho koa dia efa manao izao soa izao aminareo noho ny nanaovanareo izany zavatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ankehitriny, aoka hampaherezina anie ny tananareo, ary aoka hatanjaka ianareo; fa maty i Saoly tomponareo, koa izaho no nohosoran’ny fokon’i Joda ho mpanjaka eo aminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voatendry ho mpanjakan’ny Israely Isboseta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa i Abnera, zanak’i Nera, komandin’ny miaramilan’i Saoly kosa, dia naka an’Isboseta, zanakalahin’i Saoly, ka nitondra azy nankany Mahanaima '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia nampanjaka azy tamin’ny Gileada sy ny Asorita sy i Jezirela sy i Efraima ary i Benjamina ary tamin’ny Israely rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Efapolo taona no nahaveloman’Isboseta, zanak’i Saoly, fony izy nanomboka nanjaka tamin’ny Israely, ary roa taona no nanjakany. Ny fokon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' ihany no nomba an’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fito taona sy enim-bolana no nanjakan’i Davida tao Hebrona tamin’ny taranak’i Joda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny adin’ny Joda sy ny Israely tao Gibeona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary i Abnera, zanak’i Nera, sy ny mpanompon’Isboseta, zanak’i Saoly, dia niala tao Mahanaima ka nankany Gibeona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I Joaba, zanak’i Zeroia, sy ireo mpanompon’i Davida kosa dia nandeha ka tafahaona tamin’ireo teo amoron’ny kamory tao Gibeona; dia samy nipetraka teo amin’ny lafin’ny kamory avy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy i Abnera tamin’i Joaba: Miangavy anao aho, aoka hitsangana ny zatovo hanao kilalao eto anatrehantsika. Hoy i Joaba: Aoka ary izy hitsangana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nisy nitsangana ka nita, roa amby folo lahy tamin’ny Benjamina, izay an’Isboseta, zanak’i Saoly, ary roa amby folo lahy koa tamin’ny mpanompon’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Samy nifampisavika izy rehetra sady nifampihazon-doha ka nifandefon-tehezana tamin’ny sabatra dia niara-niankarapoka; koa izany no nanaovana izany toerana ao Gibeona izany hoe Helkata-Hazorima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Helkata-Hazorima: Tanin’ny sabatra maranitra.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mafy ny ady tamin’izany andro izany ka resy teo anoloan’ny mpanompon’i Davida i Abnera sy ny lehilahin’ny Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mba teo koa izy telo lahy zanak’i Zeroia, dia i Joaba sy i Abisay ary i Asahela. I Asahela dia haingam-pandeha tahaka ny gazela any an-tany efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nanenjika an’i Abnera i Asahela ka ny fandehany nanenjika an’i Abnera dia tsy nivily mihitsy na tamin’ny ankavanana na tamin’ny ankavia. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary niherika i Abnera ka niteny hoe: Ianao moa izany, ry Asahela? Dia hoy izy: Izaho ity. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy i Abnera taminy: Mivilia ianao, na ho amin’ny ankavanana, na ho amin’ny ankavia; zatovo iray no sambory ka baboy ho anao izay eny aminy rehetra. Tsy nety nivily anefa i Asahela fa nanenjika azy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy indray i Abnera tamin’i Asahela: Mivilia ianao fa aza manenjika ahy; fa nahoana moa aho no hamely anao hiankarapoka amin’ny tany, ary hataoko ahoana no fijery an’i Joaba rahalahinao? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nefa tsy nety nivily ihany izy ka nasian’i Abnera ny vodilefona ny kibony dia niboroaka teo an-damosiny ny lefona ka niankarapoka teo izy ary maty niaraka tamin’izay. Ary izay rehetra tonga teo amin’ilay niankarapohan’i Asahela sy nahafatesany dia nijanona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nanenjika an’i Abnera i Joaba sy i Abisay ka nony tonga teo amin’ny havoanan’i Ama izay tandrifin’i Gia amin’ny lalana mankany amin’ny tany efitr’i Gibeona izy dia maty ny masoandro. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niangona teo amin’i Abnera ny taranak’i Benjamina ka nivondrona ho andiany iray ary nijanona teo an-tampon’ny havoana iray. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary niantso an’i Joaba i Abnera hoe: Dia handany mandrakizay va ny sabatra? Tsy fantatrao va fa hangidy no hiafaran’izany? Mandra-pahoviana no tsy hampivereninao tsy hanenjika ny rahalahiny ny olona? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hoy i Joaba: Raha velona koa Andriamanitra, raha tsy ilay teninao iny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.14.
    marker-yv: yv-n
  - type: text
    text: ' dia efa lasa nody androany maraina avokoa ny olona ka tsy nanenjika ny rahalahiny akory. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia nitsoka ny anjomara i Joaba ka nijanona ny olona rehetra ary tsy nanenjika ny Israely na niady taminy intsony izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rehefa nandeha nandritra ny alina namakivaky ny tany ngazana i Abnera sy ny olony dia nita an’i Jordana sy namakivaky an’i Bitirona manontolo ka tonga tao Mahanaima. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nony niverina avy nanenjika an’i Abnera i Joaba dia novoriny ny olona rehetra; sivy amby folo lahy ihany mbamin’i Asahela no tsy teo ny mpanompon’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny mpanompon’i Davida kosa dia nahafaty enimpolo sy telonjato lahy tamin’ny Benjaminita sy ny olon’i Abnera. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary noentiny i Asahela ka naleviny tao amin’ny fasan-drainy izay tao Betlehema. Ary nandeha mandritra ny alina i Joaba sy ny olony ka tonga tao Hebrona raha vao nazava ratsy ny andro.
