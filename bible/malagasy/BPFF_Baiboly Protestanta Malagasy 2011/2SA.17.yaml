document_id: 2SA.17,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manohitra ny hevitr’i Ahitofela i Hosay
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Ahitofela tamin’i Absaloma: Aoka aho hifantina lehilahy roa arivo sy iray alina ka hiainga hanenjika an’i Davida anio alina. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary na dia izay mahery ka manana fo tahaka ny fon’ny liona aza dia ho ketraka tokoa; satria fantatry ny Israely rehetra fa lehilahy mahery rainao, sady lehilahy mahery koa ireny manaraka azy ireny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao kosa no mba hevitro: Aoka hovorina ho eto aminao avokoa ny Israely rehetra hatrany Dana ka hatrany Bery-Sheba fa toy ny fasika amoron-dranomasina ny hamarony, ary ny tenanao mihitsy no hiantafika. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ho tonga ao aminy amin’izay fitoerana iray hahitana azy isika ka hilatsaka aminy toy ny filatsaky ny ando amin’ny tany; dia tsy hasiantsika miangana na iray akory aza izy mbamin’izay olona rehetra manaraka azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha miditra an-tanàna izy dia hitondran’ny Israely rehetra mahazaka izany tanàna izany ka hotarihintsika ho any amin’ny ony ambara-paha tsy hisy na dia vato kely iray aza ho hita ao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Absaloma sy ny lehilahy rehetra amin’ny Israely: Tsara noho ny torohevitr’i Ahitofela ny torohevitr’i Hosay arkita. Fa efa notendren’NY TOMPO ny hahafoana ny sain-dalina nataon’i Ahitofela mba hampidiran’NY TOMPO loza amin’i Absaloma.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nitan’i Davida an’i Jordana
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Hosay tamin’i Zadoka sy i Abiatara mpisorona: Izany sy izany no hevitra nomen’i Ahitofela an’i Absaloma sy ny loholon’ny Israely; ary izao sy izao kosa no hevitra nomeko azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa maniraha olona haingana izao ary ambarao amin’i Davida hoe: Aza mitoetra any amin’ny tanetin’ny tany efitra anio alina fa mità haingana, fandrao ho levona na ny mpanjaka na ny olona rehetra miaraka aminy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitoetra tao Eny-Rogela i Jonatana sy i Ahimaza satria tsy sahy niseho tao an-tanàna. Nisy mpanompovavy iray nivezivezy nitatitra tamin’izy ireo; izy roa lahy kosa dia nanambara tany amin’i Davida mpanjaka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy zatovo iray nahita azy ireo ka nanambara tamin’i Absaloma; nefa lasa haingana izy roa lahy ka tonga tao an-tranon’olona tao Bahorima izay nisy lavaka fantsakana teo an-tokotaniny; dia nidina tao izy roa lahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naka rakotra ny vadin-dRalehilahy ka novelariny teo am-bavan’ny lavaka fantsakana; dia nanahy koba teo amboniny izy ka tsy nisy nahafantatra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho tonga ao aminy aho amin’ilay izy mbola sasatra sy reraka iny; hotairiko izy ka handositra ny vahoaka rehetra izay any aminy fa ny mpanjaka ihany no hasiako. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga tao amin-dRavehivavy tao an-trano ny mpanompon’i Absaloma dia niteny hoe: Aiza i Ahimaza sy i Jonatana teto? Fa hoy Ravehivavy taminy: Efa tafita ny renirano kely izy izay. Nony efa nitady izy ireo ka tsy nahita dia niverina nankany Jerosalema '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa lasa ireo dia niakatra avy ao amin’ny lavaka fantsakana izy roa lahy ka lasa nandeha ary nanambara tamin’i Davida mpanjaka hoe: Miaingà ka mità haingana ny rano; fa izany no hevitra nataon’i Ahitofela hamelezana anareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niainga i Davida sy ny olona nanaraka azy ka nita an’i Jordana; ary nony maraina ny andro dia tsy nisy tsy tafita an’i Jordana na dia olona iray aza.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony hitan’i Ahitofela fa tsy narahina ny hevitra nataony dia nasiany lasely ny borikiny, ary niainga izy ka nody tany an-tranony tany an-tanànany; ary nanafatra ny ankohonany izy dia nananton-tena ka maty ary nalevina tao amin’ny fasan’ny rainy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida tao Mahanaima
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tao Mahanaima i Davida. Ary nita an’i Jordana i Absaloma, dia izy sy ny lehilahy rehetra amin’ny Israely izay nanaraka azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Amasa no notendren’i Absaloma ho komandin’ny miaramilany ho solon’i Joaba; i Amasa moa dia zanak’ilay Israelita antsoina hoe Jitira, ilay nandry tamin’i Abigaila, zanakavavin’i Nahasy sady rahavavin’i Zeroia, renin’i Joaba. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nitoby tany amin’ny tany Gileada ny Israely sy i Absaloma.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga tao Mahanaima i Davida dia indreo, tamy i Soby, zanak’i Nahasy, avy any Raban’ny taranak’i Amona sy i Makira, zanak’i Amiela, avy any Lo-Debara ary i Barizilay gileadita, avy any Rogelima, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy mitondra fandriana sy lamba volonondry, vilany tany sy varimbazaha isan-karazany, koba, lango, tsaramaso, voanemba, voanemba voaendy, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tantely, rononomandry, ondry ary zanak’omby ho an’i Davida sy ny olona nanaraka azy; fa hoy izy: Noana sy sasatra ary mangetaheta atỳ an-tany efitra ny vahoaka.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haveriko ho etỳ aminao ny vahoaka rehetra avy eo; miankina amin’io lehilahy tadiavinareo io ny hiverenan’ny vahoaka rehetra ka hiadana ny olona rehetra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia sitrak’i Absaloma sy ny loholon’ny Israely rehetra izany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa hoy i Absaloma: Mba antsoy kosa i Hosay arkita, ary aoka ho rentsika koa izay teniny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga teo amin’i Absaloma i Hosay dia hoy i Absaloma taminy: Izany no hevitr’i Ahitofela; koa hanatanteraka ny teniny va isika? Sa ahoana kosa no hevitrao? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Hosay tamin’i Absaloma: Tsy mety ny hevitra nataon’i Ahitofela tamin’ity indray mandeha ity. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ihany i Hosay: Ianao mahafantatra ny rainao sy ny olony fa olona mahery izy sady masiaka tahaka ny bera very anaka any an-tsaha; ary lehilahy mpiady rainao ka tsy miara-mitoetra amin’ny vahoaka raha alina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa indro, miery any amin’ny lavaka iray izy izao, na any amin’ny toeran-kafa ka raha misy resiny amin’ny voalohany, izay mandre izany dia hiteny hoe: Nahafatesana ny olona manaraka an’i Absaloma, '
