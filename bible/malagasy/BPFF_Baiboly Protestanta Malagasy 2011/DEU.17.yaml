document_id: DEU.17
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza vonoina hatao fanatitra ho an’NY TOMPO Andriamanitrao, na omby na ondry na osy, izay ratsy na misy kilema, fa fahavetavetana eo imason’NY TOMPO Andriamanitrao ny manao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha misy hita manao izay ratsy eo imason’NY TOMPO Andriamanitrao ny ao aminao ao an-tanànanao, izay omen’NY TOMPO Andriamanitrao anao, na lehilahy na vehivavy ka mivadika ny fanekeny '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary lasa mandeha manompo andriamanitra hafa sy mivavaka aminy, na amin’ny masoandro, na amin’ny volana, na amin’ny kintana eny amin’ny lanitra, araka izay zavatra efa nandrarako azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka voalaza aminao sy renao izany, dia diniho tsara; koa raha nisy marina tokoa izany zavatra izany ka natao teo amin’ny Israely io fahavetavetana io '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia avoahy ho eo am-bavahadinao izay lehilahy na vehivavy efa nanao izany zava-dratsy izany, ary torahy vato ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amin’ny tenin’ny vavolombelona roa na telo no hamonoana izay tokony ho faty; fa ny tenin’ny vavolombelona iray monja dia tsy hahafatesana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny tanan’ny vavolombelona no ho voalohany hamono azy, vao ny tanan’ny vahoaka rehetra; hofongoranao tsy ho eo aminao tokoa ny fanao ratsy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Raharaha sarotra tsaraina ao amin’ny fitoerana masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha misy raharaha sarotra tsaraina loatra ka tsy efanao, na mikasika ny ra latsaka, na ny ady, na ny vonoan’olona, izay mety hiadiana ao an-tanànanao, dia miaingà ianao ka miakara any amin’ny tany izay hofidin’NY TOMPO Andriamanitrao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary mankanesa any amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' mpisorona sy any amin’ny iray izay mpitsara amin’izany andro izany ka manontania, dia hambarany aminao ny didim-pitsarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary araho ny teny izay hambarany aminao eo amin’ny tany izay hofidin’NY TOMPO, dia mitandrema ka ataovy araka izay rehetra hatorony anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Araka ny lalàna izay hatorony anao sy araka ny fitsarana izay holazainy aminao no hataonao; aza mivily miala amin’ny teny izay hambarany aminao, na ho amin’ny ankavanana na ho amin’ny ankavia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ny olona izay miavonavona ka tsy mihaino ny mpisorona izay mitsangana hanao fanompoam-pivavahana eo anatrehan’NY TOMPO Andriamanitrao, na ny mpitsara, dia aoka ho faty; hofongoranao tsy ho eo amin’ny Israely ny fanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny vahoaka rehetra dia handre ka hatahotra ary tsy hiavonavona intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitsipika ny amin’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa tonga any amin’ny tany izay omen’NY TOMPO Andriamanitrao anao ianao ka mandova azy sy monina eo ary milaza hoe: Hanangana mpanjaka ho ahy aho, mba ho tahaka ny firenena rehetra izay manodidina ahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia izay hofidin’NY TOMPO Andriamanitrao ihany no hatsanganao ho mpanjakanao: Iray amin’ny rahalahinao no hatsanganao ho mpanjakanao fa tsy mahazo mifidy olona hafa firenena izay tsy avy amin’ny rahalahinao ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa aoka tsy hanana soavaly maro izy, na hampiverina ny olona ho any Ejipta mba hahazoany soavaly maro, satria hoy NY TOMPO taminareo: Aza miverina amin’izany lalana izany intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary aoka tsy hampirafy maro izy, fandrao hivily ny fony; ary aoka tsy hamory volafotsy na volamena betsaka ho azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa mipetraka eo ambonin’ny sezam-panjakany izy dia aoka hanaovany dika mitovy amin’izay any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' mpisorona izao lalàna izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ho eo akaikiny izany ka hovakiny amin’ny andro rehetra hiainany, mba hianarany hatahotra NY TOMPO Andriamaniny ka hitandrina ny teny rehetra amin’izao lalàna izao sy ireto didy ireto hankatoavany azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mba tsy hiavonavonan’ny fony amin’ny rahalahiny, ary mba tsy hiviliany hiala amin’ny lalàna, na ho amin’ny ankavanana, na ho amin’ny ankavia, mba ho maro andro amin’ny fanjakany eo amin’ny Israely izy sy ny taranany.
