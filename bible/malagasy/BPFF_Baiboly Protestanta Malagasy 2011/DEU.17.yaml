document_id: DEU.17,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Aza vonoina hatao fanatitra ho an’NY TOMPO Andriamanitrao, na omby na ondry na osy, izay ratsy na misy kilema, fa fahavetavetana eo imason’NY TOMPO Andriamanitrao ny manao izany.
  '10':
  - type: text
    content: 'Ary araho ny teny izay hambarany aminao eo amin’ny tany izay hofidin’NY TOMPO, dia mitandrema ka ataovy araka izay rehetra hatorony anao. '
  '11':
  - type: text
    content: 'Araka ny lalàna izay hatorony anao sy araka ny fitsarana izay holazainy aminao no hataonao; aza mivily miala amin’ny teny izay hambarany aminao, na ho amin’ny ankavanana na ho amin’ny ankavia. '
  '12':
  - type: text
    content: 'Fa ny olona izay miavonavona ka tsy mihaino ny mpisorona izay mitsangana hanao fanompoam-pivavahana eo anatrehan’NY TOMPO Andriamanitrao, na ny mpitsara, dia aoka ho faty; hofongoranao tsy ho eo amin’ny Israely ny fanao ratsy. '
  '13':
  - type: text
    content: Ary ny vahoaka rehetra dia handre ka hatahotra ary tsy hiavonavona intsony.
  - type: heading
    content: Fitsipika ny amin’ny mpanjaka
  '14':
  - type: text
    content: 'Rehefa tonga any amin’ny tany izay omen’NY TOMPO Andriamanitrao anao ianao ka mandova azy sy monina eo ary milaza hoe: Hanangana mpanjaka ho ahy aho, mba ho tahaka ny firenena rehetra izay manodidina ahy, '
  '15':
  - type: text
    content: 'dia izay hofidin’NY TOMPO Andriamanitrao ihany no hatsanganao ho mpanjakanao: Iray amin’ny rahalahinao no hatsanganao ho mpanjakanao fa tsy mahazo mifidy olona hafa firenena izay tsy avy amin’ny rahalahinao ianao. '
  '16':
  - type: text
    content: 'Kanefa aoka tsy hanana soavaly maro izy, na hampiverina ny olona ho any Ejipta mba hahazoany soavaly maro, satria hoy NY TOMPO taminareo: Aza miverina amin’izany lalana izany intsony. '
  '17':
  - type: text
    content: 'Ary aoka tsy hampirafy maro izy, fandrao hivily ny fony; ary aoka tsy hamory volafotsy na volamena betsaka ho azy izy. '
  '18':
  - type: text
    content: 'Ary rehefa mipetraka eo ambonin’ny sezam-panjakany izy dia aoka hanaovany dika mitovy amin’izay any amin’ny '
  - type: text
    content: levita
  - type: text
    content: ' mpisorona izao lalàna izao. '
  '19':
  - type: text
    content: 'Ary ho eo akaikiny izany ka hovakiny amin’ny andro rehetra hiainany, mba hianarany hatahotra NY TOMPO Andriamaniny ka hitandrina ny teny rehetra amin’izao lalàna izao sy ireto didy ireto hankatoavany azy, '
  '2':
  - type: text
    content: 'Raha misy hita manao izay ratsy eo imason’NY TOMPO Andriamanitrao ny ao aminao ao an-tanànanao, izay omen’NY TOMPO Andriamanitrao anao, na lehilahy na vehivavy ka mivadika ny fanekeny '
  '20':
  - type: text
    content: mba tsy hiavonavonan’ny fony amin’ny rahalahiny, ary mba tsy hiviliany hiala amin’ny lalàna, na ho amin’ny ankavanana, na ho amin’ny ankavia, mba ho maro andro amin’ny fanjakany eo amin’ny Israely izy sy ny taranany.
  '3':
  - type: text
    content: 'ary lasa mandeha manompo andriamanitra hafa sy mivavaka aminy, na amin’ny masoandro, na amin’ny volana, na amin’ny kintana eny amin’ny lanitra, araka izay zavatra efa nandrarako azy '
  '4':
  - type: text
    content: 'ka voalaza aminao sy renao izany, dia diniho tsara; koa raha nisy marina tokoa izany zavatra izany ka natao teo amin’ny Israely io fahavetavetana io '
  '5':
  - type: text
    content: 'dia avoahy ho eo am-bavahadinao izay lehilahy na vehivavy efa nanao izany zava-dratsy izany, ary torahy vato ho faty. '
  '6':
  - type: text
    content: 'Amin’ny tenin’ny vavolombelona roa na telo no hamonoana izay tokony ho faty; fa ny tenin’ny vavolombelona iray monja dia tsy hahafatesana azy. '
  '7':
  - type: text
    content: Ny tanan’ny vavolombelona no ho voalohany hamono azy, vao ny tanan’ny vahoaka rehetra; hofongoranao tsy ho eo aminao tokoa ny fanao ratsy.
  - type: heading
    content: Raharaha sarotra tsaraina ao amin’ny fitoerana masina
  '8':
  - type: text
    content: 'Raha misy raharaha sarotra tsaraina loatra ka tsy efanao, na mikasika ny ra latsaka, na ny ady, na ny vonoan’olona, izay mety hiadiana ao an-tanànanao, dia miaingà ianao ka miakara any amin’ny tany izay hofidin’NY TOMPO Andriamanitrao, '
  '9':
  - type: text
    content: 'ary mankanesa any amin’ireo '
  - type: text
    content: levita
  - type: text
    content: ' mpisorona sy any amin’ny iray izay mpitsara amin’izany andro izany ka manontania, dia hambarany aminao ny didim-pitsarana. '
