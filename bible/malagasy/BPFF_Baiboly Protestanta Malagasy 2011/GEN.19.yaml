document_id: GEN.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voavonjy tamin’ny fandringanana an’i Sodoma i Lota
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nankany Sodoma ireo anjely roa nony hariva ny andro, tamin’iny i Lota nipetraka teo am-bavahadin’i Sodoma iny. Nony nahita azy ireo i Lota dia nitsangana hitsena azy ary niankohoka tamin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy izy: Mba mivilia ianareo, tompoko, ho ato an-tranon’ny mpanomponareo ka matoria ato anio alina ary sasao ny tongotrareo, fa rehefa mifoha maraina ianareo vao handeha amin’izay lalan-kalehanareo. Fa hoy izy roa lahy: Tsia, fa aleo izahay hitoetra eto an-kianja ihany anio alina. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Rehefa noteren’i Lota fatratra izy roa lahy dia nivily tany aminy ka nandroso tao an-tranony. Nahandroany sakafo izy ireo sady nanendasany mofo tsy misy masirasira, dia nisakafo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha tsy mbola natory anefa izy ireo dia tonga nanodidina ny trano ny mponina tao an-tanàna, ny lehilahin’i Sodoma, na ny tanora na ny antitra, izany hoe ny vahoaka rehetra tao an-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Niantso an’i Lota izy ireo ka niteny taminy hoe: Aiza ireo lehilahy vao tonga tato aminao izao alina izao? Asaivo mankaty aminay izy mba hahalalanay azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nivoaka ny varavarana i Lota hankeo amin’izy ireo ka nanakatona ny varavarana tao aorianany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy izy: Ry rahalahiko, miangavy anareo aho mba tsy hanao ratsy! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Indro, manan-janaka roa vavy izay tsy mbola nahalala lahy aho; miangavy anareo aho, aoka re ireo no havoakako ho eto aminareo ka hanaovanareo izay sitraponareo. Fa ireo lehilahy ireo kosa dia aza anaovanareo na inona na inona, fa tonga hialoka ato ambanin’ny tafon-tranoko izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy ny navalin’ny vahoaka azy: Mialà eto Ialahy! Avy eo indray dia hoe: Ilehity tonga tetỳ hivahiny, kanefa izy indray ity no miseho ho mpitsara! Ankehitriny dia hanao ratsiratsy kokoa aminao noho ny amin’ireo lehilahy ireo izahay! Sady nanosika mafy an’i Lota izy ireo no nisesika hamaky ny varavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa nanatsotra ny tanany izy roa lahy vahiny dia nisintona an’i Lota hankao aminy ao an-trano ary nakatony ny varavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary izy roa lahy dia nampahajambena ny mason’ireo lehilahy izay teo am-baravaran’ny trano, na kely na lehibe, ka sasa-poana nitady ny varavarana ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy izy roa lahy tamin’i Lota: Mbola misy olon-kafa va ato aminao, na vinantolahinao, na zanakao lahy, na zanakao vavy? Na zovy na zovy anananao ato an-tanàna dia ento miala amin’ity tanàna ity. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa horavanay ity tanàna ity satria lehibe loatra ny fitarainana momba azy ireo tonga eo anatrehan’NY TOMPO, koa naniraka anay NY TOMPO handrava azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia lasa i Lota ka niteny tamin’ireo vinantony izay efa hanambady ny zanany vavy hoe: Miaingà, mialà amin’ity tanàna ity, fa horavan’NY TOMPO ity tanàna ity. Nefa nataon’ireo vinantony ho manao vazivazy izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vao maraina ny andro dia nandodona an’i Lota ireo anjely ka niteny hoe: Miaingà, ento ny vadinao sy ny zanakao roa vavy izay eto, fandrao ho voaringana koa ianao noho ny heloky ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary satria nitaredretra izy dia notantanan’izy roa lahy izy sy ny vadiny ary ny zanany roa vavy noho ny famindrampon’NY TOMPO taminy; dia nitondra azy niala teo izy roa lahy ka namela azy tany ivelan’ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa nahatondra azy tany ivelany izy ireo dia niteny hoe: Mandosira hamonjy ny ainao! Aza miherika ianao ary aza mijanona mihitsy eto amin’ny tany lemaka; mandosira any an-tendrombohitra mba tsy haharingana anao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy i Lota taminy: Aza atao an’izany, Tompo ô! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Indro, efa nahita fitia teo imasonao ny mpanomponao, sady Ianao efa nahalehibe ny famindramponao izay nataonao tamiko hamonjenao ahy; tsy afa-mandositra any an-tendrombohitra aho, fandrao hahatratra ahy ny loza ka ho faty aho! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa indro, misy vohitra itsy, izay akaiky handosirana sady kely! Miangavy Anao re aho, aoka handositra ao aho; tsy kely va izy io? Dia ho velona aho. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy Izy taminy: Indro, ekeko koa ny fangatahanao ny amin’izany zavatra izany ka tsy horavako io vohitra voalazanao io. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mandehana haingana, mandosira ho ao, fa tsy mahazo manao na inona na inona Aho mandra-pahatonganao ao. Izany no nanaovana ny anaran’io tanàna io hoe: Zoara'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Zoara: Kely.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Efa niposaka tamin’ny tany ny masoandro raha tonga tao Zoara i Lota.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nandatsaka solifara sy afo avy tany an-danitra tamin’i Sodoma sy i Gomora NY TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ka nandrava ireo tanàna, ny tany lemaka rehetra, ny mponina manontolo tao an-tanàna ary ny zavamaniry teo amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nefa nitodika tany aorianany ny vadin’i Lota ka tonga vongan-tsira mitsangana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nifoha vao maraina i Abrahama ka nankany amin’ilay nijoroany teo anatrehan’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nitazana an’i Sodoma sy i Gomora ary ny tany lemaka rehetra izy ka hitany fa indro, niakatra ny setroky ny tany, tahaka ny setroky ny lafaoro lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tamin’ny nandravan’Andriamanitra ny tanàna tany amin’ny tany lemaka dia nahatsiaro an’i Abrahama Andriamanitra ka noentiny niala avy tao afovoan’ny loza i Lota, rehefa nandrava ny tanàna izay nonenan’i Lota izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Lota sy ireo zanany vavy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia niakatra avy tao Zoara i Lota ka nitoetra tany amin’ny tendrombohitra, izy sy ny zanany roa vavy, satria natahotra hitoetra tao Zoara izy. Nitoetra tao anaty zohy iray izy sy ny zanany roa vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy ny vavimatoa tamin’ny zandriny: Efa antitra izao raintsika, ary tsy misy lehilahy etỳ ambonin’ny tany hanambady antsika araka ny fanaon’ny tany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa andeha hampisotrointsika divay ny raintsika, dia handry aminy isika mba hananantsika taranaka avy amin’ny raintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nampisotroiny divay ny rainy tamin’iny alina iny; dia niditra ny vavimatoa ka nandry tamin’ny rainy; kanefa izy io dia tsy nahafantatra izay nandriany, na izay nifohazany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nony ampitson’iny dia hoy ny vavimatoa tamin’ny zandriny: Indro, efa nandry tamin’ny raintsika aho alina; aoka hampisotrointsika divay indray izy anio alina, dia midira ianao ka mandria aminy hananantsika taranaka avy amin’ny raintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nampisotroiny divay indray ny rainy tamin’iny alina iny; dia nitsangana ilay zandriny ka nandry taminy; ary tsy nahafantatra ihany koa izay nandriany izy, na izay nifohazany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia samy nanana anaka tamin’ny rainy ny zanak’i Lota roa vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Niteraka zazalahy ny vavimatoa ka ny anarany nataony hoe Moaba; izy no rain’ny Moabita ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary ny zandriny koa dia niteraka zazalahy ka ny anarany nataony hoe Beny-Amỳ, na ny zanaky ny fireneko; izy kosa no rain’ny taranak’i Amona ankehitriny.
