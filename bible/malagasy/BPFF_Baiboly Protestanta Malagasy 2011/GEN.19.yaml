document_id: GEN.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Voavonjy tamin’ny fandringanana an’i Sodoma i Lota
  - type: text
    content: 'Dia nankany Sodoma ireo anjely roa nony hariva ny andro, tamin’iny i Lota nipetraka teo am-bavahadin’i Sodoma iny. Nony nahita azy ireo i Lota dia nitsangana hitsena azy ary niankohoka tamin’ny tany. '
  '10':
  - type: text
    content: 'Fa nanatsotra ny tanany izy roa lahy vahiny dia nisintona an’i Lota hankao aminy ao an-trano ary nakatony ny varavarana. '
  '11':
  - type: text
    content: Ary izy roa lahy dia nampahajambena ny mason’ireo lehilahy izay teo am-baravaran’ny trano, na kely na lehibe, ka sasa-poana nitady ny varavarana ireo.
  '12':
  - type: text
    content: 'Dia hoy izy roa lahy tamin’i Lota: Mbola misy olon-kafa va ato aminao, na vinantolahinao, na zanakao lahy, na zanakao vavy? Na zovy na zovy anananao ato an-tanàna dia ento miala amin’ity tanàna ity. '
  '13':
  - type: text
    content: 'Fa horavanay ity tanàna ity satria lehibe loatra ny fitarainana momba azy ireo tonga eo anatrehan’NY TOMPO, koa naniraka anay NY TOMPO handrava azy. '
  '14':
  - type: text
    content: 'Dia lasa i Lota ka niteny tamin’ireo vinantony izay efa hanambady ny zanany vavy hoe: Miaingà, mialà amin’ity tanàna ity, fa horavan’NY TOMPO ity tanàna ity. Nefa nataon’ireo vinantony ho manao vazivazy izy.'
  '15':
  - type: text
    content: 'Vao maraina ny andro dia nandodona an’i Lota ireo anjely ka niteny hoe: Miaingà, ento ny vadinao sy ny zanakao roa vavy izay eto, fandrao ho voaringana koa ianao noho ny heloky ny tanàna. '
  '16':
  - type: text
    content: 'Ary satria nitaredretra izy dia notantanan’izy roa lahy izy sy ny vadiny ary ny zanany roa vavy noho ny famindrampon’NY TOMPO taminy; dia nitondra azy niala teo izy roa lahy ka namela azy tany ivelan’ny tanàna. '
  '17':
  - type: text
    content: 'Rehefa nahatondra azy tany ivelany izy ireo dia niteny hoe: Mandosira hamonjy ny ainao! Aza miherika ianao ary aza mijanona mihitsy eto amin’ny tany lemaka; mandosira any an-tendrombohitra mba tsy haharingana anao. '
  '18':
  - type: text
    content: 'Ary hoy i Lota taminy: Aza atao an’izany, Tompo ô! '
  '19':
  - type: text
    content: 'Indro, efa nahita fitia teo imasonao ny mpanomponao, sady Ianao efa nahalehibe ny famindramponao izay nataonao tamiko hamonjenao ahy; tsy afa-mandositra any an-tendrombohitra aho, fandrao hahatratra ahy ny loza ka ho faty aho! '
  '2':
  - type: text
    content: 'Ary hoy izy: Mba mivilia ianareo, tompoko, ho ato an-tranon’ny mpanomponareo ka matoria ato anio alina ary sasao ny tongotrareo, fa rehefa mifoha maraina ianareo vao handeha amin’izay lalan-kalehanareo. Fa hoy izy roa lahy: Tsia, fa aleo izahay hitoetra eto an-kianja ihany anio alina. '
  '20':
  - type: text
    content: 'Fa indro, misy vohitra itsy, izay akaiky handosirana sady kely! Miangavy Anao re aho, aoka handositra ao aho; tsy kely va izy io? Dia ho velona aho. '
  '21':
  - type: text
    content: 'Dia hoy Izy taminy: Indro, ekeko koa ny fangatahanao ny amin’izany zavatra izany ka tsy horavako io vohitra voalazanao io. '
  '22':
  - type: text
    content: 'Mandehana haingana, mandosira ho ao, fa tsy mahazo manao na inona na inona Aho mandra-pahatonganao ao. Izany no nanaovana ny anaran’io tanàna io hoe: Zoara'
  - type: note
    content: 'Zoara: Kely.'
  - type: text
    content: '. '
  '23':
  - type: text
    content: Efa niposaka tamin’ny tany ny masoandro raha tonga tao Zoara i Lota.
  '24':
  - type: text
    content: 'Dia nandatsaka solifara sy afo avy tany an-danitra tamin’i Sodoma sy i Gomora NY TOMPO '
  '25':
  - type: text
    content: 'ka nandrava ireo tanàna, ny tany lemaka rehetra, ny mponina manontolo tao an-tanàna ary ny zavamaniry teo amin’ny tany. '
  '26':
  - type: text
    content: Nefa nitodika tany aorianany ny vadin’i Lota ka tonga vongan-tsira mitsangana.
  '27':
  - type: text
    content: 'Ary nifoha vao maraina i Abrahama ka nankany amin’ilay nijoroany teo anatrehan’NY TOMPO. '
  '28':
  - type: text
    content: 'Nitazana an’i Sodoma sy i Gomora ary ny tany lemaka rehetra izy ka hitany fa indro, niakatra ny setroky ny tany, tahaka ny setroky ny lafaoro lehibe. '
  '29':
  - type: text
    content: Tamin’ny nandravan’Andriamanitra ny tanàna tany amin’ny tany lemaka dia nahatsiaro an’i Abrahama Andriamanitra ka noentiny niala avy tao afovoan’ny loza i Lota, rehefa nandrava ny tanàna izay nonenan’i Lota izy.
  - type: heading
    content: I Lota sy ireo zanany vavy
  '3':
  - type: text
    content: Rehefa noteren’i Lota fatratra izy roa lahy dia nivily tany aminy ka nandroso tao an-tranony. Nahandroany sakafo izy ireo sady nanendasany mofo tsy misy masirasira, dia nisakafo.
  '30':
  - type: text
    content: 'Dia niakatra avy tao Zoara i Lota ka nitoetra tany amin’ny tendrombohitra, izy sy ny zanany roa vavy, satria natahotra hitoetra tao Zoara izy. Nitoetra tao anaty zohy iray izy sy ny zanany roa vavy. '
  '31':
  - type: text
    content: 'Ary hoy ny vavimatoa tamin’ny zandriny: Efa antitra izao raintsika, ary tsy misy lehilahy etỳ ambonin’ny tany hanambady antsika araka ny fanaon’ny tany rehetra. '
  '32':
  - type: text
    content: 'Koa andeha hampisotrointsika divay ny raintsika, dia handry aminy isika mba hananantsika taranaka avy amin’ny raintsika. '
  '33':
  - type: text
    content: 'Dia nampisotroiny divay ny rainy tamin’iny alina iny; dia niditra ny vavimatoa ka nandry tamin’ny rainy; kanefa izy io dia tsy nahafantatra izay nandriany, na izay nifohazany. '
  '34':
  - type: text
    content: 'Nony ampitson’iny dia hoy ny vavimatoa tamin’ny zandriny: Indro, efa nandry tamin’ny raintsika aho alina; aoka hampisotrointsika divay indray izy anio alina, dia midira ianao ka mandria aminy hananantsika taranaka avy amin’ny raintsika. '
  '35':
  - type: text
    content: 'Dia nampisotroiny divay indray ny rainy tamin’iny alina iny; dia nitsangana ilay zandriny ka nandry taminy; ary tsy nahafantatra ihany koa izay nandriany izy, na izay nifohazany. '
  '36':
  - type: text
    content: 'Dia samy nanana anaka tamin’ny rainy ny zanak’i Lota roa vavy. '
  '37':
  - type: text
    content: 'Niteraka zazalahy ny vavimatoa ka ny anarany nataony hoe Moaba; izy no rain’ny Moabita ankehitriny. '
  '38':
  - type: text
    content: Ary ny zandriny koa dia niteraka zazalahy ka ny anarany nataony hoe Beny-Amỳ, na ny zanaky ny fireneko; izy kosa no rain’ny taranak’i Amona ankehitriny.
  '4':
  - type: text
    content: 'Raha tsy mbola natory anefa izy ireo dia tonga nanodidina ny trano ny mponina tao an-tanàna, ny lehilahin’i Sodoma, na ny tanora na ny antitra, izany hoe ny vahoaka rehetra tao an-tanàna. '
  '5':
  - type: text
    content: 'Niantso an’i Lota izy ireo ka niteny taminy hoe: Aiza ireo lehilahy vao tonga tato aminao izao alina izao? Asaivo mankaty aminay izy mba hahalalanay azy. '
  '6':
  - type: text
    content: 'Dia nivoaka ny varavarana i Lota hankeo amin’izy ireo ka nanakatona ny varavarana tao aorianany. '
  '7':
  - type: text
    content: 'Hoy izy: Ry rahalahiko, miangavy anareo aho mba tsy hanao ratsy! '
  '8':
  - type: text
    content: 'Indro, manan-janaka roa vavy izay tsy mbola nahalala lahy aho; miangavy anareo aho, aoka re ireo no havoakako ho eto aminareo ka hanaovanareo izay sitraponareo. Fa ireo lehilahy ireo kosa dia aza anaovanareo na inona na inona, fa tonga hialoka ato ambanin’ny tafon-tranoko izy ireo. '
  '9':
  - type: text
    content: 'Hoy ny navalin’ny vahoaka azy: Mialà eto Ialahy! Avy eo indray dia hoe: Ilehity tonga tetỳ hivahiny, kanefa izy indray ity no miseho ho mpitsara! Ankehitriny dia hanao ratsiratsy kokoa aminao noho ny amin’ireo lehilahy ireo izahay! Sady nanosika mafy an’i Lota izy ireo no nisesika hamaky ny varavarana. '
