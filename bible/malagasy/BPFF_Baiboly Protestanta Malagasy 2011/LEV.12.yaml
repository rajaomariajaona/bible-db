document_id: LEV.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanadiovana ny vehivavy avy niteraka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Raha misy vehivavy bevohoka ka tera-dahy dia haloto hafitoana izy; tahaka ny andro fahalotoany raha mararin’ny fadimbolany no hahalotoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Amin’ny andro fahavalo dia hoforana ny zaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Telo amby telopolo andro no hitoeran-dRavehivavy mba hadio amin’ny rany izy; tsy hanendry zava-masina izy, na hiditra ao amin’ny fitoerana masina mandra-pahatapitra ny andro fidiovany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha tera-bavy kosa izy dia haloto tapa-bolana, tahaka ny tamin’ny fahalotoany amin’ny fadimbolany ihany koa, ary enina amby enimpolo andro no hitoerany mba hadio amin’ny rany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa tapitra ny andro fidiovany, na lahy na vavy no naterany, dia zanak’ondry iray izay iray taona, no halainy hatao fanatitra dorana manontolo ary voromailala, na domohina, hatao fanatitra fanadiovana, ka hoentiny eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' ho eo amin’ny mpisorona ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hanatitra izany eo anatrehan’NY TOMPO ny mpisorona ka hanao fanavotana ho an-dRavehivavy dia hadio tamin’ny fandehanan’ny rany izy. Izany no lalàna ny amin’ny vehivavy tera-dahy na tera-bavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha tsy tratry ny ananany ny zanak’ondry dia hitondra domohina roa na voromailala roa izy; ny iray dia hatao fanatitra dorana manontolo ary ny iray kosa dia hatao fanatitra fanadiovana; dia hanao fanavotana ho an-dRavehivavy ny mpisorona ka hadio izy.
