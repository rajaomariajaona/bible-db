document_id: LEV.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanadiovana ny vehivavy avy niteraka
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '2':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Raha misy vehivavy bevohoka ka tera-dahy dia haloto hafitoana izy; tahaka ny andro fahalotoany raha mararin’ny fadimbolany no hahalotoany. '
  '3':
  - type: text
    content: 'Amin’ny andro fahavalo dia hoforana ny zaza. '
  '4':
  - type: text
    content: 'Telo amby telopolo andro no hitoeran-dRavehivavy mba hadio amin’ny rany izy; tsy hanendry zava-masina izy, na hiditra ao amin’ny fitoerana masina mandra-pahatapitra ny andro fidiovany. '
  '5':
  - type: text
    content: 'Fa raha tera-bavy kosa izy dia haloto tapa-bolana, tahaka ny tamin’ny fahalotoany amin’ny fadimbolany ihany koa, ary enina amby enimpolo andro no hitoerany mba hadio amin’ny rany izy. '
  '6':
  - type: text
    content: 'Rehefa tapitra ny andro fidiovany, na lahy na vavy no naterany, dia zanak’ondry iray izay iray taona, no halainy hatao fanatitra dorana manontolo ary voromailala, na domohina, hatao fanatitra fanadiovana, ka hoentiny eo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' ho eo amin’ny mpisorona ireo. '
  '7':
  - type: text
    content: 'Ary hanatitra izany eo anatrehan’NY TOMPO ny mpisorona ka hanao fanavotana ho an-dRavehivavy dia hadio tamin’ny fandehanan’ny rany izy. Izany no lalàna ny amin’ny vehivavy tera-dahy na tera-bavy. '
  '8':
  - type: text
    content: Raha tsy tratry ny ananany ny zanak’ondry dia hitondra domohina roa na voromailala roa izy; ny iray dia hatao fanatitra dorana manontolo ary ny iray kosa dia hatao fanatitra fanadiovana; dia hanao fanavotana ho an-dRavehivavy ny mpisorona ka hadio izy.
