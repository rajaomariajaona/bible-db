document_id: ACT.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tany Ikonioma i Paoly sy i Barnabasy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tany Ikonioma i Paoly sy i Barnabasy dia niara-niditra tao amin’ny sinagogan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' izy ireo ka nitoriteny tao, ary olona betsaka no nino, na Jiosy na Grika. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niteny tamin’ny feo mahery hoe: Mitsangàna ary mijoroa amin’ny tongotrao. Dia nitsambikina Ralehilahy ka nandehandeha. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitan’ny vahoaka izay zavatra nataon’i Paoly izay dia nanandratra ny feony izy ka niteny tamin’ny fitenin’ny Likaoniana hoe: Efa nidina nankaty amintsika ny andriamanitra maka ny endriky ny olona! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ny anaran’i Barnabasy dia nataony hoe Jopitera, ary i Paoly kosa dia Merkiora, satria izy no mpitondra teny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niaraka tamin’ny vahoaka teo koa ilay mpisoron’i Jopitera teo anoloan’ny tanàna ka nitondra ombilahy voaravaka voninkazo ho eo am-bavahady izy ary nikasa hanao fanatitra.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony nahare izany i Barnabasy sy i Paoly, apostoly, dia nandriatra ny fitafiany ka niantoraka nankeo afovoan’ny olona sady niantso hoe: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tompokolahy, ahoana no anaovanareo izao? Olona tahaka anareo ihany izahay ary mitory ny Filazantsara aminareo mba hialanareo amin’izao zava-poana izao ka hanatonanareo an’Andriamanitra velona izay nanao ny lanitra sy ny tany ary ny ranomasina mbamin’izay rehetra ao anatiny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy dia namela ny firenena rehetra nandeha tamin’ny lalana tiany naleha tamin’ny andro lasa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa Izy tsy namela ny tenany tsy hanana vavolombelona tamin’ny fanaovany soa: Mampilatsaka ny ranonorana avy eny amin’ny lanitra ho anareo Izy sady manome taon-jina ka mahavoky anareo amin’ny hanina ary mahafeno fifaliana ny fonareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa na dia nilaza izany aza izy dia saika tsy nahasakana ny olona tsy hamono zavatra hatao fanatitra aminy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' tonga avy tany Antiokia sy Ikonioma, izay nitaona ny vahoaka ka nitora-bato an’i Paoly, dia nitarika azy ho eny ivelan’ny tanàna satria noheveriny fa efa maty izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny Jiosy izay tsy nino dia nandrisika sy nanome sain-dratsy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' hanohitra ny rahalahy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa nony nanodidina azy ny mpianatra dia nitsangana izy ka nankao an-tanàna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiverenana tany Antiokia any Pisidia
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ampitso dia niala tao izy sy i Barnabasy ka nankany Derbe. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nitory ny Filazantsara tamin’izany tanàna izany izy ka nahazo mpianatra maro dia niverina nankany Listra sy Ikonioma ary Antiokia indray, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nampahery ny fanahin’ny mpianatra ka nananatra azy haharitra amin’ny finoana sady nilaza fa tsy maintsy ho amin’ny fahoriana be no hidirantsika ao amin’ny fanjakan’Andriamanitra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanendry loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' ho azy ireo teo amin’ny isam-piangonana izy, dia nivavaka sady nifady hanina ary nanolotra azy ho an’ny Tompo izay efa ninoany.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nandeha namakivaky an’i Pisidia izy dia tonga tany Pamfilia. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony avy nitory ny teny tany Perga izy dia nidina nankany Atalia. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo izy dia niondrana an-tsambo hankany Antiokia, izay efa nanolorana azy ho amin’ny fahasoavan’Andriamanitra mba hanao ny asa izay efa novitainy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga tao izy ka namory ny fiangonana dia nilaza izay rehetra nataon’Andriamanitra tamin’ny niarahany taminy sy ny namohany ny varavaran’ny finoana ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nijanona elaela ihany teo amin’ireo mpianatra izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nijanona naharitra tao anefa izy ireo ary nitory tamin’ny fahasahiana noho ny fahatokiany ny Tompo, izay nanome vavolombelona hanamarina ny tenin’ny fahasoavany ka nampanao famantarana sy fahagagana tamin’ny tanan’izy ireo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisara-tsaina ny vahoaka tao an-tanàna, ny sasany nomba ny Jiosy fa ny sasany kosa dia nomba ny Apostoly. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niray tetika ny Jentilisa sy ny Jiosy mbamin’ny loholony hampijaly sy hitora-bato azy ireo, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa rehefa fantatr’izy ireo izany dia nandositra nankany Listra sy Derbe, tanàna any Likaonia, sy tany amin’ny manodidina izy, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary tany no nitorian’izy ireo ny Filazantsara.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanasitranana lehilahy malemy iray tany Listra
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy lehilahy iray nipetraka tany Listra, nalemy tongotra hatrany an-kibon-dreniny ka tsy afaka namindra; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nahare an’i Paoly nitoriteny izy; ary nony nibanjina azy mafy i Paoly ka nahita fa nanam-pinoana hositranina izy '
