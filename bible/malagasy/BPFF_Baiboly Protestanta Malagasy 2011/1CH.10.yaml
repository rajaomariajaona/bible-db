document_id: 1CH.10
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: TANTARAN’I DAVIDA, MPANJAKAN’NY ISRAELY
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ady tao Gilboa; ny nahafatesan’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Sam 31.1-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niady tamin’ny Israely ny Filistina. Ary nandositra teo anoloan’ny Filistina ny lehilahy amin’ny Israely ka niampatrampatra teny an-tendrombohitra Gilboa ny faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanenjika fatratra an’i Saoly sy ny zanany ny Filistina ka matin’ny Filistina i Jonatana sy i Abinadaba ary i Malky-Soa, zanakalahin’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mafy tamin’i Saoly ny ady; nifanehatra tamin’ny mpandefa tsipìka izy ary raiki-tahotra izy noho ny mpandefa tsipìka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy i Saoly tamin’ny mpitondra ny fiadiany: Tsoahy ny sabatrao ka atsatohy miboroaka amiko; fandrao avy irerỳ tsy mifora irerỳ ka hanao ahy ho fihomehezana. Nefa tsy nety ny mpitondra ny fiadiany fa natahotra loatra. Dia nalain’i Saoly ny sabatra ka nianjerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa hitan’ny mpitondra ny fiadiana fa maty i Saoly dia mba nianjera tamin’ny sabany koa izy ka maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niara-maty i Saoly sy ny zanany telo lahy ary ny ankohonany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nony hitan’ny lehilahy rehetra amin’ny Israely teny amin’ny lohasaha fa nandositra ny olona, ary maty i Saoly sy ny zanany, dia nandao ny tanànany avy izy ireo ka nandositra; ary tonga ny Filistina ka nonina tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nony ampitso, raha tonga hanendaka ny zavatra teny amin’ny faty ny Filistina, dia nahita an’i Saoly sy ny zanany lahy niampatrampatra teo an-tendrombohitra Gilboa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nesoriny ny akanjony ka ny loha izay notapahiny sy ny fiadiany no noentiny tany amin’ny tanin’ny Filistina manodidina mba hanambaràna izany zavatra mahafaly izany tamin’ny sampiny sy ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia napetrany tao amin’ny tranon’ny andriamaniny ny fiadian’i Saoly, ary nohomboany teo amin’ny tempolin’i Dagona ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nony ren’ny mponina rehetra tao Jabesy-Gileada izay rehetra nataon’ny Filistina tamin’i Saoly '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia niainga ny lehilahy mahery rehetra naka ny fatin’i Saoly sy ny fatin’ny zanany ka nitondra azy ho any Jabesy, ary nandevina ny taolambalony teo ambanin’ilay hazo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terebinta
  - type: text
    text: ' tany Jabesy, avy eo dia nifady hanina hafitoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Eny, maty i Saoly noho ny nivadihany tamin’NY TOMPO, dia noho ny tsy nitandremany ny tenin’NY TOMPO sy noho ny nakany saina tamin’izay mpila hevitra amin’ny maty '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ary noho ny tsy nanontaniany tamin’NY TOMPO; dia novonoiny izy ary nafindrany ho an’i Davida, zanak’i Jese, ny fanjakana.
