document_id: 1CH.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: TANTARAN’I DAVIDA, MPANJAKAN’NY ISRAELY
  - type: heading
    content: Ady tao Gilboa; ny nahafatesan’i Saoly
  - type: heading
    content: 1Sam 31.1-13
  - type: text
    content: 'Niady tamin’ny Israely ny Filistina. Ary nandositra teo anoloan’ny Filistina ny lehilahy amin’ny Israely ka niampatrampatra teny an-tendrombohitra Gilboa ny faty. '
  '10':
  - type: text
    content: 'Dia napetrany tao amin’ny tranon’ny andriamaniny ny fiadian’i Saoly, ary nohomboany teo amin’ny tempolin’i Dagona ny lohany. '
  '11':
  - type: text
    content: 'Nony ren’ny mponina rehetra tao Jabesy-Gileada izay rehetra nataon’ny Filistina tamin’i Saoly '
  '12':
  - type: text
    content: 'dia niainga ny lehilahy mahery rehetra naka ny fatin’i Saoly sy ny fatin’ny zanany ka nitondra azy ho any Jabesy, ary nandevina ny taolambalony teo ambanin’ilay hazo '
  - type: text
    content: terebinta
  - type: text
    content: ' tany Jabesy, avy eo dia nifady hanina hafitoana. '
  '13':
  - type: text
    content: 'Eny, maty i Saoly noho ny nivadihany tamin’NY TOMPO, dia noho ny tsy nitandremany ny tenin’NY TOMPO sy noho ny nakany saina tamin’izay mpila hevitra amin’ny maty '
  '14':
  - type: text
    content: ary noho ny tsy nanontaniany tamin’NY TOMPO; dia novonoiny izy ary nafindrany ho an’i Davida, zanak’i Jese, ny fanjakana.
  '2':
  - type: text
    content: 'Nanenjika fatratra an’i Saoly sy ny zanany ny Filistina ka matin’ny Filistina i Jonatana sy i Abinadaba ary i Malky-Soa, zanakalahin’i Saoly. '
  '3':
  - type: text
    content: 'Mafy tamin’i Saoly ny ady; nifanehatra tamin’ny mpandefa tsipìka izy ary raiki-tahotra izy noho ny mpandefa tsipìka. '
  '4':
  - type: text
    content: 'Dia hoy i Saoly tamin’ny mpitondra ny fiadiany: Tsoahy ny sabatrao ka atsatohy miboroaka amiko; fandrao avy irerỳ tsy mifora irerỳ ka hanao ahy ho fihomehezana. Nefa tsy nety ny mpitondra ny fiadiany fa natahotra loatra. Dia nalain’i Saoly ny sabatra ka nianjerany. '
  '5':
  - type: text
    content: 'Rehefa hitan’ny mpitondra ny fiadiana fa maty i Saoly dia mba nianjera tamin’ny sabany koa izy ka maty. '
  '6':
  - type: text
    content: 'Dia niara-maty i Saoly sy ny zanany telo lahy ary ny ankohonany rehetra. '
  '7':
  - type: text
    content: Nony hitan’ny lehilahy rehetra amin’ny Israely teny amin’ny lohasaha fa nandositra ny olona, ary maty i Saoly sy ny zanany, dia nandao ny tanànany avy izy ireo ka nandositra; ary tonga ny Filistina ka nonina tao.
  '8':
  - type: text
    content: 'Nony ampitso, raha tonga hanendaka ny zavatra teny amin’ny faty ny Filistina, dia nahita an’i Saoly sy ny zanany lahy niampatrampatra teo an-tendrombohitra Gilboa. '
  '9':
  - type: text
    content: 'Dia nesoriny ny akanjony ka ny loha izay notapahiny sy ny fiadiany no noentiny tany amin’ny tanin’ny Filistina manodidina mba hanambaràna izany zavatra mahafaly izany tamin’ny sampiny sy ny olona. '
