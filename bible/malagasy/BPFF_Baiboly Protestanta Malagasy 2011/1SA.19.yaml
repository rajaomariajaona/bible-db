type_code: plt
verses:
  '1':
  - type: heading
    content: Miaro an’i Davida i Jonatana
  - type: text
    content: 'Niresaka tamin’i Jonatana zanany sy tamin’ny mpanompony rehetra i Saoly ny amin’izay hamonoana an’i Davida. I Jonatana, zanak’i Saoly kosa anefa dia tena tia an’i Davida. '
  '10':
  - type: text
    content: Ary nikasa hamely an’i Davida tamin’ny lefona i Saoly ka hataony miboroaka mihatra amin’ny rindrina; nefa nahay niala teo anatrehan’i Saoly izy ka ny rindrina no voan’ny lefona; dia nandositra i Davida ka afaka tamin’iny alina iny ihany.
  '11':
  - type: text
    content: 'Dia nandefa iraka hankany amin’ny tranon’i Davida i Saoly hiambina azy mba hamonoany azy raha maraina; fa i Mikala, vadin’i Davida dia nanambara taminy hoe: Raha tsy mamonjy ny ainao ianao anio alina dia ho faty rahampitso maraina. '
  '12':
  - type: text
    content: 'Ary nampidinin’i Mikala teo am-baravarankely i Davida dia lasa nandositra ka afaka. '
  '13':
  - type: text
    content: 'Dia nalain’i Mikala ny '
  - type: text
    content: terafima
  - type: text
    content: ' ka napetrany teo amin’ny farafarany, ary nosaronany makarakara volon’osy ny lohany sady norakofany lamba. '
  '14':
  - type: text
    content: 'Koa nony nandefa iraka haka an’i Davida i Saoly dia hoy izy: Marary izy. '
  '15':
  - type: text
    content: 'Ary nandefa iraka indray i Saoly hizaha an’i Davida ka niteny hoe: Ento miakatra atỳ amiko amin’ny farafara izy hovonoiko. '
  '16':
  - type: text
    content: 'Dia tonga ny iraka, kanjo indro, ny terafima no teo am-parafara ary voasaron’ilay makarakara volon’osy ny lohany. '
  '17':
  - type: text
    content: 'Dia hoy i Saoly tamin’i Mikala: Nahoana ianao no namitaka ahy toy izany ka nandefa ny fahavaloko ary afa-nandositra izy? Fa hoy i Mikala tamin’i Saoly: Hoy izy tamiko: Avelao aho handeha, raha tsy izany dia hovonoiko ianao.'
  - type: heading
    content: I Davida sy i Saoly tany Rama
  '18':
  - type: text
    content: 'Dia nandositra i Davida ka afaka ary tonga tany amin’i Samoela tany Rama. Nambarany azy izay rehetra nataon’i Saoly taminy; ary nandeha izy sy i Samoela ka nonina tany Naiota. '
  '19':
  - type: text
    content: 'Nisy nanambara tamin’i Saoly anefa hoe: Indro, i Davida dia ao Naiota any Rama. '
  '2':
  - type: text
    content: 'Dia nanambara tamin’i Davida i Jonatana hoe: Mitady hamono anao i Saoly raiko; koa miangavy anao aho, mitandrema ianao rahampitso maraina, ary mizahà fiafenana ka miere; '
  '20':
  - type: text
    content: 'Dia nandefa iraka i Saoly hisambotra an’i Davida; koa nony hitan’ireo ny mpaminany tafangona sady maminany, ary i Samoela no lohany mitarika azy, dia tonga tamin’ireo irak’i Saoly ny Fanahin’Andriamanitra ka mba naminany koa izy ireo. '
  '21':
  - type: text
    content: 'Nambara tamin’i Saoly izany ka nandefa iraka hafa indray izy ary naminany koa ireo. Mbola nandefa iraka hafa indray fanintelony i Saoly nefa naminany indray koa ireo. '
  '22':
  - type: text
    content: 'Dia lasa nankany Rama koa ny tenany, ary tonga teo amin’ny lavaka lehibe famorian-drano izay ao Seko izy ka nanontany hoe: Aiza i Samoela sy i Davida? Ary hoy ny iray: Indreo ao Naiota any Rama izy. '
  '23':
  - type: text
    content: 'Dia nankany Naiota any Rama izy avy eo, ary tonga tao aminy koa ny Fanahin’Andriamanitra, dia nandroso hatrany izy sady naminany teny am-pandehanana ambara-pahatongany tany Naiota any Rama. '
  '24':
  - type: text
    content: 'Ary nanaisotra ny fitafiany koa izy ka mba naminany tahaka ny sasany teo anatrehan’i Samoela, ary lavo nitanjaka nandritra iny andro sy alina iny izy. Koa izany no nanaovan’ny olona hoe: Moa mba isan’ny mpaminany koa va i Saoly?'
  '3':
  - type: text
    content: 'fa handeha aho ka hitsangana eo anilan’Ikaky ao amin’ny saha izay misy anao dia hiresaka amin’ny raiko ny momba anao; koa izay hitako dia hambarako aminao. '
  '4':
  - type: text
    content: 'Ary nilaza soa an’i Davida tamin’i Saoly rainy i Jonatana ka hoy izy taminy: Aoka tsy hanota amin’i Davida mpanompony ny mpanjaka, satria tsy nanota taminao izy fa tena nahasoa anao ny nataony; '
  '5':
  - type: text
    content: 'ary efa nanao ny ainy tsy ho zavatra izy ka namono ny Filistina; eny, NY TOMPO nahavita famonjena lehibe ho an’ny Israely rehetra, ary nahita izany ianao ka faly. Koa nahoana no dia hanota handatsaka ny ran’ny tsy manan-tsiny ianao ka hahafaty an’i Davida tsy amin’antony? '
  '6':
  - type: text
    content: 'Ary nihaino ny tenin’i Jonatana i Saoly. Dia nianiana i Saoly hoe: Raha velona koa NY TOMPO dia tsy hovonoina izy. '
  '7':
  - type: text
    content: Dia niantso an’i Davida i Jonatana ka nanambara izany rehetra izany taminy, ary nitondra an’i Davida ho eo amin’i Saoly ka nitoetra teo anatrehany tahaka ny teo aloha ihany indray izy.
  - type: heading
    content: Voavonjin’i Mikala i Davida
  '8':
  - type: text
    content: 'Mbola nitohy ihany ny ady; ary niainga i Davida dia niady tamin’ny Filistina ary nahafaty betsaka, hany ka nandositra azy ireny. '
  '9':
  - type: text
    content: 'Dia nisy fanahy ratsy avy tany amin’NY TOMPO tonga tao amin’i Saoly rehefa nipetraka tao an-tranony izy sady nitana ny lefony teny an-tanany; ary i Davida dia nitendry lokanga tamin’ny tanany. '
