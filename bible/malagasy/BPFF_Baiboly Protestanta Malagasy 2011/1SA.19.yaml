document_id: 1SA.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miaro an’i Davida i Jonatana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niresaka tamin’i Jonatana zanany sy tamin’ny mpanompony rehetra i Saoly ny amin’izay hamonoana an’i Davida. I Jonatana, zanak’i Saoly kosa anefa dia tena tia an’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nanambara tamin’i Davida i Jonatana hoe: Mitady hamono anao i Saoly raiko; koa miangavy anao aho, mitandrema ianao rahampitso maraina, ary mizahà fiafenana ka miere; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa handeha aho ka hitsangana eo anilan’Ikaky ao amin’ny saha izay misy anao dia hiresaka amin’ny raiko ny momba anao; koa izay hitako dia hambarako aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nilaza soa an’i Davida tamin’i Saoly rainy i Jonatana ka hoy izy taminy: Aoka tsy hanota amin’i Davida mpanompony ny mpanjaka, satria tsy nanota taminao izy fa tena nahasoa anao ny nataony; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary efa nanao ny ainy tsy ho zavatra izy ka namono ny Filistina; eny, NY TOMPO nahavita famonjena lehibe ho an’ny Israely rehetra, ary nahita izany ianao ka faly. Koa nahoana no dia hanota handatsaka ny ran’ny tsy manan-tsiny ianao ka hahafaty an’i Davida tsy amin’antony? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nihaino ny tenin’i Jonatana i Saoly. Dia nianiana i Saoly hoe: Raha velona koa NY TOMPO dia tsy hovonoina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia niantso an’i Davida i Jonatana ka nanambara izany rehetra izany taminy, ary nitondra an’i Davida ho eo amin’i Saoly ka nitoetra teo anatrehany tahaka ny teo aloha ihany indray izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voavonjin’i Mikala i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mbola nitohy ihany ny ady; ary niainga i Davida dia niady tamin’ny Filistina ary nahafaty betsaka, hany ka nandositra azy ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nisy fanahy ratsy avy tany amin’NY TOMPO tonga tao amin’i Saoly rehefa nipetraka tao an-tranony izy sady nitana ny lefony teny an-tanany; ary i Davida dia nitendry lokanga tamin’ny tanany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nikasa hamely an’i Davida tamin’ny lefona i Saoly ka hataony miboroaka mihatra amin’ny rindrina; nefa nahay niala teo anatrehan’i Saoly izy ka ny rindrina no voan’ny lefona; dia nandositra i Davida ka afaka tamin’iny alina iny ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nandefa iraka hankany amin’ny tranon’i Davida i Saoly hiambina azy mba hamonoany azy raha maraina; fa i Mikala, vadin’i Davida dia nanambara taminy hoe: Raha tsy mamonjy ny ainao ianao anio alina dia ho faty rahampitso maraina. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nampidinin’i Mikala teo am-baravarankely i Davida dia lasa nandositra ka afaka. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nalain’i Mikala ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terafima
  - type: text
    text: ' ka napetrany teo amin’ny farafarany, ary nosaronany makarakara volon’osy ny lohany sady norakofany lamba. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa nony nandefa iraka haka an’i Davida i Saoly dia hoy izy: Marary izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nandefa iraka indray i Saoly hizaha an’i Davida ka niteny hoe: Ento miakatra atỳ amiko amin’ny farafara izy hovonoiko. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia tonga ny iraka, kanjo indro, ny terafima no teo am-parafara ary voasaron’ilay makarakara volon’osy ny lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Saoly tamin’i Mikala: Nahoana ianao no namitaka ahy toy izany ka nandefa ny fahavaloko ary afa-nandositra izy? Fa hoy i Mikala tamin’i Saoly: Hoy izy tamiko: Avelao aho handeha, raha tsy izany dia hovonoiko ianao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida sy i Saoly tany Rama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nandositra i Davida ka afaka ary tonga tany amin’i Samoela tany Rama. Nambarany azy izay rehetra nataon’i Saoly taminy; ary nandeha izy sy i Samoela ka nonina tany Naiota. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nisy nanambara tamin’i Saoly anefa hoe: Indro, i Davida dia ao Naiota any Rama. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nandefa iraka i Saoly hisambotra an’i Davida; koa nony hitan’ireo ny mpaminany tafangona sady maminany, ary i Samoela no lohany mitarika azy, dia tonga tamin’ireo irak’i Saoly ny Fanahin’Andriamanitra ka mba naminany koa izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nambara tamin’i Saoly izany ka nandefa iraka hafa indray izy ary naminany koa ireo. Mbola nandefa iraka hafa indray fanintelony i Saoly nefa naminany indray koa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia lasa nankany Rama koa ny tenany, ary tonga teo amin’ny lavaka lehibe famorian-drano izay ao Seko izy ka nanontany hoe: Aiza i Samoela sy i Davida? Ary hoy ny iray: Indreo ao Naiota any Rama izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nankany Naiota any Rama izy avy eo, ary tonga tao aminy koa ny Fanahin’Andriamanitra, dia nandroso hatrany izy sady naminany teny am-pandehanana ambara-pahatongany tany Naiota any Rama. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nanaisotra ny fitafiany koa izy ka mba naminany tahaka ny sasany teo anatrehan’i Samoela, ary lavo nitanjaka nandritra iny andro sy alina iny izy. Koa izany no nanaovan’ny olona hoe: Moa mba isan’ny mpaminany koa va i Saoly?'
