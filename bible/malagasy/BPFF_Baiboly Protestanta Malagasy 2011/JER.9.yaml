document_id: JER.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manjaka hatraiza hatraiza ny lainga
  - type: text
    content: Enga anie aho ka hahita fitoerana any an-tany efitra tahaka ny olona mpandeha lavitra!
  - type: text
    content: Dia hahafoy ny fireneko aho ka hiala aminy
  - type: text
    content: satria mpijangajanga avokoa izy rehetra,
  - type: text
    content: eny, mpivadika miray tetika izy ireo.
  '10':
  - type: text
    content: Ary Jerosalema dia hataoko korontam-bato
  - type: text
    content: sy fonenan’ny amboadia;
  - type: text
    content: ary ny tanànan’ny Joda dia hataoko lao
  - type: text
    content: tsy hisy mponina.
  '11':
  - type: text
    content: Iza no olon-kendry mba hahafantatra izao?
  - type: text
    content: Iza no efa nitenenan’ny vavan’NY TOMPO mba hanambara izao?
  - type: text
    content: Fa nahoana no noravana ny tany
  - type: text
    content: sady may ho toy ny tany efitra ka tsy misy olona mandeha eo intsony?
  '12':
  - type: text
    content: 'Ary hoy NY TOMPO: Satria nahafoy ny lalànako izay nataoko teo anoloany izy; satria tsy nihaino ny feoko izy ary tsy nankatò izany, '
  '13':
  - type: text
    content: 'fa nandeha araka ny ditran’ny fony sy nanaraka ireo '
  - type: text
    content: Baala
  - type: text
    content: ' araka izay nampianarin’ny razany azy, '
  '14':
  - type: text
    content: 'dia izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hofahanako zava-mahafaty ity firenena ity ary hampisotroiko rano misy poizina. '
  '15':
  - type: text
    content: 'Haeliko any amin’izay '
  - type: text
    content: Jentilisa
  - type: text
    content: ' tsy fantany na fantatry ny razany izy; ary hampanenjehiko azy ny sabatra ambara-pandaniko azy.'
  '16':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Mihevera tsara
  - type: text
    content: ka antsoy ireny vehivavy mpanao hira fahalahelovana ireny
  - type: text
    content: mba ho avy;
  - type: text
    content: eny, ampanantsoy ireny vehivavy mahay ireny
  - type: text
    content: mba ho tonga.
  '17':
  - type: text
    content: Ary asaivo tonga haingana ireny hanandratra fidradradradrana ho antsika
  - type: text
    content: mba hampijohy ny ranomasontsika
  - type: text
    content: sy handatsaka ny ranomaso avy amin’ny hodimasontsika.
  '18':
  - type: text
    content: 'Fa misy feo midradradradra re avy any '
  - type: text
    content: Ziona
  - type: text
    content: ' hoe:'
  - type: text
    content: Indrisy! Rava isika;
  - type: text
    content: afa-baraka indrindra isika
  - type: text
    content: satria tsy maintsy mamoy ny tany
  - type: text
    content: fa efa narodana ny trano nitoerantsika.
  '19':
  - type: text
    content: Nefa mihainoa ny tenin’NY TOMPO, ianareo vehivavy,
  - type: text
    content: ary aoka hohenoin’ny sofinareo ny tenin’ny vavany
  - type: text
    content: ka ampianaro fidradradradrana ny zanakavavinareo,
  - type: text
    content: ary samia mampianatra hira fahalahelovana ny namany avy.
  '2':
  - type: text
    content: Manenjana ny lelany toy ny fanenjana tsipìka izy
  - type: text
    content: mba handefa lainga.
  - type: text
    content: Ary tsy tamin’ny fahamarinana
  - type: text
    content: no nahazoany hery etỳ ambonin’ny tany;
  - type: text
    content: fa mandroso amin’ny ratsy kokoa hatrany izy
  - type: text
    content: ary tsy mba fantany Aho,
  - type: text
    content: hoy NY TOMPO.
  '20':
  - type: text
    content: Fa efa nananika ny varavarankelintsika ny fahafatesana
  - type: text
    content: ka niditra tao an-dapantsika
  - type: text
    content: mba handringana ny ankizy madinika tsy ho eny an-dalambe,
  - type: text
    content: ary ny zatovo tsy ho eny amin’ny kianja malalaka.
  '21':
  - type: text
    content: 'Lazao hoe: Izao no lazain’NY TOMPO:'
  - type: text
    content: Hiampatrampatra ny fatin’ny olona
  - type: text
    content: ka ho tonga tahaka ny zezika eny an-tsaha
  - type: text
    content: sy tahaka ny amboara nilaozan’ny mpijinja,
  - type: text
    content: izay tsy misy manangona azy.
  - type: heading
    content: 'Ny tena fahendrena: Ny mahafantatra NY TOMPO'
  '22':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Aoka ny hendry tsy hirehareha amin’ny fahendreny,
  - type: text
    content: aoka ny mahery tsy hirehareha amin’ny heriny,
  - type: text
    content: aoka ny manankarena tsy hirehareha amin’ny hareny.
  '23':
  - type: text
    content: 'Fa izay te hirehareha dia aoka hirehareha amin’izao:'
  - type: text
    content: Dia ny ananany fahendrena
  - type: text
    content: sy ny fahalalany Ahy ho TOMPO
  - type: text
    content: izay manao famindrampo sy fitsarana marina ary fahamarinana etỳ ambonin’ny tany;
  - type: text
    content: fa izany no sitrako,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Loza ho an’ireo voafora sandoka
  '24':
  - type: text
    content: 'Indro, avy ny andro, hoy NY TOMPO, izay hamaliako ny voafora rehetra izay toy ny tsy voafora, '
  '25':
  - type: text
    content: 'dia i Ejipta, i Joda, i Edoma, ny taranak’i Amona ary Moaba mbamin’izay rehetra mihety volombava, izay monina any an-tany efitra; fa ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra dia tsy voafora, ary ny taranak’Israely rehetra kosa dia tsy voafora fo.'
  '3':
  - type: text
    content: Samia miaro tena amin’ny namany avy ianareo
  - type: text
    content: ary aza misy matoky olona na dia ny rahalahy aza;
  - type: text
    content: fa ny rahalahy rehetra dia mamingana tokoa
  - type: text
    content: ary ny namana rehetra dia mandehandeha manaratsy olona.
  '4':
  - type: text
    content: Samy mamitaka ny namany avy izy rehetra
  - type: text
    content: ka tsy misy milaza ny marina;
  - type: text
    content: mampianatra ny lelany handainga izy
  - type: text
    content: ary manasa tena amin’ny fanaovan-dratsy.
  '5':
  - type: text
    content: Ny fonenanao dia ao anatin’ny fitaka;
  - type: text
    content: fitaka no nandavany tsy hahalalana Ahy,
  - type: text
    content: hoy NY TOMPO.
  '6':
  - type: text
    content: 'Koa izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Indro, handrendrika sy hizaha toetra azy Aho;
  - type: text
    content: fa ahoana no hataoko manoloana ny oloko zanakavavy?
  '7':
  - type: text
    content: Zana-tsipìka mahafaty ny lelany
  - type: text
    content: fa miteny fitaka;
  - type: text
    content: raha amin’ny vavany dia miteny fihavanana amin’ny namany izy,
  - type: text
    content: kanjo ny ao anatiny kosa dia manao otri-po.
  '8':
  - type: text
    content: Tsy hovaliko va izy amin’izany zavatra izany?
  - type: text
    content: Hoy NY TOMPO;
  - type: text
    content: tsy hanamparako ny fahatezerako va ny firenena toy izany?
  - type: heading
    content: Ny fotoanan’ny fitomaniana
  '9':
  - type: text
    content: Noho ny amin’ny tendrombohitra
  - type: text
    content: no hitomaniako sy hidradradradrako,
  - type: text
    content: ary noho ny amin’ny kijana any an-tany efitra
  - type: text
    content: no hanaovako hira falahelovana,
  - type: text
    content: satria may izy
  - type: text
    content: ka tsy misy olona mandeha eo intsony,
  - type: text
    content: ary tsy re intsony ny feon’ny andian’ondry,
  - type: text
    content: ary na ny voromanidina na ny biby
  - type: text
    content: dia samy efa nandositra ka lasa avokoa.
