document_id: JER.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manjaka hatraiza hatraiza ny lainga
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie aho ka hahita fitoerana any an-tany efitra tahaka ny olona mpandeha lavitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hahafoy ny fireneko aho ka hiala aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mpijangajanga avokoa izy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mpivadika miray tetika izy ireo.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Jerosalema dia hataoko korontam-bato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fonenan’ny amboadia;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tanànan’ny Joda dia hataoko lao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hisy mponina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no olon-kendry mba hahafantatra izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no efa nitenenan’ny vavan’NY TOMPO mba hanambara izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nahoana no noravana ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady may ho toy ny tany efitra ka tsy misy olona mandeha eo intsony?
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy NY TOMPO: Satria nahafoy ny lalànako izay nataoko teo anoloany izy; satria tsy nihaino ny feoko izy ary tsy nankatò izany, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nandeha araka ny ditran’ny fony sy nanaraka ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' araka izay nampianarin’ny razany azy, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hofahanako zava-mahafaty ity firenena ity ary hampisotroiko rano misy poizina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haeliko any amin’izay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' tsy fantany na fantatry ny razany izy; ary hampanenjehiko azy ny sabatra ambara-pandaniko azy.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihevera tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka antsoy ireny vehivavy mpanao hira fahalahelovana ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho avy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ampanantsoy ireny vehivavy mahay ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho tonga.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary asaivo tonga haingana ireny hanandratra fidradradradrana ho antsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampijohy ny ranomasontsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy handatsaka ny ranomaso avy amin’ny hodimasontsika.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa misy feo midradradradra re avy any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! Rava isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afa-baraka indrindra isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy maintsy mamoy ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa narodana ny trano nitoerantsika.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa mihainoa ny tenin’NY TOMPO, ianareo vehivavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hohenoin’ny sofinareo ny tenin’ny vavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ampianaro fidradradradrana ny zanakavavinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary samia mampianatra hira fahalahelovana ny namany avy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manenjana ny lelany toy ny fanenjana tsipìka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba handefa lainga.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy tamin’ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahazoany hery etỳ ambonin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mandroso amin’ny ratsy kokoa hatrany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba fantany Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nananika ny varavarankelintsika ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niditra tao an-dapantsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba handringana ny ankizy madinika tsy ho eny an-dalambe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zatovo tsy ho eny amin’ny kianja malalaka.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lazao hoe: Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiampatrampatra ny fatin’ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tonga tahaka ny zezika eny an-tsaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny amboara nilaozan’ny mpijinja,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy misy manangona azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny tena fahendrena: Ny mahafantatra NY TOMPO'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny hendry tsy hirehareha amin’ny fahendreny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ny mahery tsy hirehareha amin’ny heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ny manankarena tsy hirehareha amin’ny hareny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izay te hirehareha dia aoka hirehareha amin’izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny ananany fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fahalalany Ahy ho TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manao famindrampo sy fitsarana marina ary fahamarinana etỳ ambonin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izany no sitrako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loza ho an’ireo voafora sandoka
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, avy ny andro, hoy NY TOMPO, izay hamaliako ny voafora rehetra izay toy ny tsy voafora, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia i Ejipta, i Joda, i Edoma, ny taranak’i Amona ary Moaba mbamin’izay rehetra mihety volombava, izay monina any an-tany efitra; fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' rehetra dia tsy voafora, ary ny taranak’Israely rehetra kosa dia tsy voafora fo.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samia miaro tena amin’ny namany avy ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza misy matoky olona na dia ny rahalahy aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny rahalahy rehetra dia mamingana tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny namana rehetra dia mandehandeha manaratsy olona.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy mamitaka ny namany avy izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy milaza ny marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampianatra ny lelany handainga izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manasa tena amin’ny fanaovan-dratsy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fonenanao dia ao anatin’ny fitaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fitaka no nandavany tsy hahalalana Ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, handrendrika sy hizaha toetra azy Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ahoana no hataoko manoloana ny oloko zanakavavy?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zana-tsipìka mahafaty ny lelany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa miteny fitaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha amin’ny vavany dia miteny fihavanana amin’ny namany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo ny ao anatiny kosa dia manao otri-po.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hovaliko va izy amin’izany zavatra izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hanamparako ny fahatezerako va ny firenena toy izany?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fotoanan’ny fitomaniana
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny amin’ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hitomaniako sy hidradradradrako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary noho ny amin’ny kijana any an-tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanaovako hira falahelovana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria may izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy olona mandeha eo intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy re intsony ny feon’ny andian’ondry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na ny voromanidina na ny biby
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy efa nandositra ka lasa avokoa.
