document_id: LUK.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo izay milaza tena fa mpomba an’i Jesosy
  - type: text
    content: 'Tamin’izany, raha niangona ny vahoaka betsaka, an’arivony maro, ka nifanitsa-kitro, dia niteny tamin’ny mpianany aloha Jesosy hoe: Mitandrema ianareo amin’ny masirasiran’ny '
  - type: text
    content: Fariseo
  - type: text
    content: ', dia ny fihatsarambelatsihy.'
  - type: heading
    content: Mat 10.26-33
  '10':
  - type: text
    content: Fa na zovy na zovy no hiteny hanohitra ny Zanak’Olona dia hahazo famelan-keloka; fa izay miteny ratsy ny Fanahy Masina dia tsy mba hahazo famelan-keloka.
  '11':
  - type: text
    content: 'Ary raha entina ho ao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' sy ny mpitsara ary ny manampahefana ianareo dia aza manahy izay havalinareo na izay holazainareo; '
  '12':
  - type: text
    content: fa ny Fanahy Masina no hampianatra anareo amin’izany ora izany izay tokony holazainareo.
  - type: heading
    content: Fanoharana ny amin’ilay mpanankarena adala
  '13':
  - type: text
    content: 'Nisy olona iray teo amin’ny vahoaka niteny tamin’i Jesosy hoe: Mpampianatra ô, teneno ny rahalahiko mba hizara lova amiko. '
  '14':
  - type: text
    content: 'Fa hoy Izy taminy: Ralehilahy, iza no nanendry Ahy ho mpitsara na mpizara eo aminareo? '
  '15':
  - type: text
    content: 'Ary hoy Izy tamin’ny olona: Mitandrema ianareo ka miarova tena amin’ny fitiavan-karena; fa ny ain’ny olona dia tsy miankina amin’ny habetsahan’ny zavatra ananany.'
  '16':
  - type: text
    content: 'Dia nilaza fanoharana taminy Izy hoe: Nahavokatra be ny tanin’ny lehilahy manankarena iray. '
  '17':
  - type: text
    content: 'Ary nihevitra tao am-pony izy hoe: Ahoana no hataoko fa tsy manana toerana hamoriako ny vokatro aho? '
  '18':
  - type: text
    content: 'Ary hoy izy: Izao no hataoko: handrava ny trano fitahirizako aho ka hanangana izay lehibe kokoa, ary ao no hamoriako ny variko rehetra sy ny fananako. '
  '19':
  - type: text
    content: 'Dia hilaza amin’ny fanahiko aho hoe: Ry fanahy ô, manana fananana be voatahiry ho amin’ny taona maro ianao; mitsahara, mihinàna, misotroa, mifalia. '
  '2':
  - type: text
    content: 'Fa tsy misy nafenina izay tsy haseho, na takona izay tsy ho fantatra. '
  '20':
  - type: text
    content: 'Fa Andriamanitra kosa niteny taminy hoe: Ry adala, anio alina no halaina aminao ny fanahinao, koa ho an’iza izay zavatra noharìnao? '
  '21':
  - type: text
    content: Toy izany izay mihary harena ho an’ny tenany ihany, nefa tsy mba manankarena ny amin’Andriamanitra.
  - type: heading
    content: Ny fitokiana an’Andriamanitra
  - type: heading
    content: Mat 6.25-34
  '22':
  - type: text
    content: 'Hoy Jesosy tamin’ny mpianany: Noho izany dia lazaiko aminareo hoe: Aza manahy ny amin’ny ainareo, dia izay hohaninareo, na ny amin’ny tenanareo, dia izay hotafinareo. '
  '23':
  - type: text
    content: 'Fa ny aina dia mihoatra noho ny hanina ary ny tena noho ny fitafiana. '
  '24':
  - type: text
    content: 'Hevero ny goaika; fa tsy mba mamafy na mijinja ireny; ary tsy manana fitoeran-javatra na trano fitahirizana, nefa Andriamanitra no mamelona azy ireny; tsy mihoatra lavitra noho ny vorona va ianareo? '
  '25':
  - type: text
    content: 'Ary iza moa ao aminareo, na dia manahy aza, no mahay manampy ny andro iainany, na dia '
  - type: text
    content: hakiho
  - type: text
    content: ' iray aza? '
  '26':
  - type: text
    content: 'Koa raha ny kely indrindra aza tsy hainareo, nahoana ianareo no manahy ny amin’ny sisa? '
  '27':
  - type: text
    content: 'Hevero ny fanirin’ny voninkazo; tsy mba miasa na mamoly ireny; nefa lazaiko aminareo: Na dia i Solomona teo amin’ny voninahiny rehetra aza tsy mba nitafy tahaka ny iray amin’ireny. '
  '28':
  - type: text
    content: 'Koa raha ny ahitra izay any an-tsaha anio, nefa hatao ao am-patana rahampitso, no ampitafin’Andriamanitra toy izany, tsy mainka va ianareo ry kely finoana? '
  '29':
  - type: text
    content: 'Koa aza mitady izay hohaninareo na izay hosotroinareo ianareo, ary aza miahiahy foana. '
  '3':
  - type: text
    content: 'Koa na inona na inona teneninareo ao amin’ny maizina dia ho re eo amin’ny mazava; ary izay bitsihinareo mangingina ao amin’ny efitrano dia hotorìna eny amin’ny '
  - type: text
    content: tampon-trano
  - type: text
    content: .
  '30':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' amin’izao tontolo izao dia fatra-pitady izany rehetra izany; nefa ny Rainareo mahalala fa tokony ho anareo izany zavatra izany. '
  '31':
  - type: text
    content: 'Kanefa katsaho ny fanjakany; dia hanampy ho anareo izany zavatra izany. '
  '32':
  - type: text
    content: Aza matahotra, ry ondry vitsy, fa efa sitraky ny Rainareo ny hanome anareo ny fanjakana.
  - type: heading
    content: Rakitra any an-danitra
  - type: heading
    content: Mat 6.19-21
  '33':
  - type: text
    content: 'Amidio ny fanananareo ka atolory ho fiantrana, manaova kitapom-bola tsy mety ho tonta ho anareo, dia harena any an-danitra tsy mety ho lany, izay tsy azon’ny mpangalatra atonina sady tsy misy kalalao manimba. '
  '34':
  - type: text
    content: Fa izay itoeran’ny harenanareo dia ho any koa ny fonareo.
  - type: heading
    content: Fanoharana ny amin’ny fotoam-piambenana
  '35':
  - type: text
    content: 'Aoka hisikina ianareo, ary aoka hirehitra ny jironareo; '
  '36':
  - type: text
    content: 'aoka ianareo ho tahaka ny olona izay miandry ny tompony, raha mody avy amin’ny fampakaram-bady izy, koa nony tonga sy mandondòna izy dia vohàny miaraka amin’izay. '
  '37':
  - type: text
    content: 'Sambatra ny mpanompo izay ho hitan’ny tompony miambina, raha avy izy. Lazaiko aminareo marina tokoa fa hisikina ny tompony dia hampipetraka azy ireo hisakafo, ary ho avy ka hanompo azy. '
  '38':
  - type: text
    content: Ary na amin’ny fotoam-piambenana faharoa amin’ny alina izy no tonga na amin’ny fotoam-piambenana fahatelo ka mahita toy izany dia sambatra ireo mpanompo ireo.
  - type: heading
    content: Mat 24.43-51
  '39':
  - type: text
    content: 'Fantaro izao, fa raha fantatry ny tompon-trano izay ora hiavian’ny mpangalatra dia ho niambina izy ka tsy namela ny tranony hovakina. '
  '4':
  - type: text
    content: 'Ary lazaiko aminareo sakaizako hoe: Aza matahotra izay mamono ny tena, nefa aorianan’izany dia tsy mahavita na inona na inona mihoatra noho izany. '
  '40':
  - type: text
    content: 'Dia miomàna koa ianareo; fa ho avy ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' amin’izay ora tsy ampoizinareo.'
  '41':
  - type: text
    content: 'Hoy i Petera: Tompoko, ho anay va no ilazanao izany fanoharana izany sa ho an’ny olona rehetra? '
  '42':
  - type: text
    content: 'Hoy ny Tompo: Iza moa no mpitandrin-draharaha mahatoky sy manan-tsaina, izay hotendren’ny tompony hifehy ny mpanompony mba hanome azy anjara sakafo ara-potoana? '
  '43':
  - type: text
    content: 'Sambatra ny mpanompo izay ho hitan’ny tompony fa indro, manatanteraka izany, raha avy izy. '
  '44':
  - type: text
    content: 'Lazaiko aminareo marina fa hotendreny ho mpiandraikitra ny fananany rehetra izy. '
  '45':
  - type: text
    content: 'Fa raha miteny anakampo kosa izany mpanompo izany hoe: Mbola ho ela ny tompoko vao ho avy; dia mikapoka ny mpanompolahy sy ny mpanompovavy izy sady mihinana sy misotro ka mamo, '
  '46':
  - type: text
    content: dia ho avy ny tompon’izany mpanompo izany amin’ny andro izay tsy ampoiziny sy amin’ny ora izay tsy fantany, dia hofaiziny mafy izy ka homeny anjara any amin’ny tsy mahatoky.
  '47':
  - type: text
    content: 'Ilay mpanompo izay mahafantatra ny sitrapon’ny tompony ihany nefa tsy miomana na manatanteraka izay sitraky ny fony dia hokapohina be. '
  '48':
  - type: text
    content: Fa izay tsy nahafantatra kosa ka nanatanteraka izay zavatra tokony hikapohana azy dia hokapohina kely. Fa izay nomena be no hitadiavana be; ary izay nampitahirizina be no hitakina bebe kokoa.
  - type: heading
    content: Jesosy, anton’ny fisarahana
  '49':
  - type: text
    content: 'Tonga hanipy afo etỳ ambonin’ny tany Aho; koa toy inona ny faniriako mba hirehetan’izany sahady? '
  '5':
  - type: text
    content: 'Fa hasehoko anareo izay hatahoranareo: Matahora Izay manampahefana hanary any amin’ny '
  - type: text
    content: afobe
  - type: text
    content: ', rehefa nahafaty; eny, hoy Aho aminareo: Matahora Azy. '
  '50':
  - type: text
    content: Ary manana batisa hanaovana Ahy batisa Aho; koa toy inona ny tebitebiko ambara-pahatanterany!
  - type: heading
    content: Mat 10.34-36
  '51':
  - type: text
    content: 'Heverinareo va fa tonga hanome fihavanana etỳ ambonin’ny tany Aho? Tsia, hoy Aho aminareo fa fampisarahana. '
  '52':
  - type: text
    content: 'Fa hatramin’izao dia hisy dimy hisara-tsaina ao amin’ny trano iray, ny telo dia hanohitra ny roa ary ny roa dia hanohitra ny telo. '
  '53':
  - type: text
    content: Hisara-tsaina ireo, koa ny ray dia hanohitra ny zanakalahy ary ny zanakalahy dia hanohitra ny ray; ny reny dia hanohitra ny zanakavavy ary ny zanakavavy dia hanohitra ny reny; ny rafozam-bavy dia hanohitra ny vinantovaviny, ary ny vinantovavy dia hanohitra ny rafozam-bavy.
  - type: heading
    content: Ny fahafantarana ny toetry ny andro
  '54':
  - type: text
    content: 'Hoy Jesosy tamin’ny vahoaka: Raha mahita rahona miposaka any andrefana ianareo, miaraka amin’izay, dia hoy ianareo: Ho avy ny ranonorana; dia tonga izany. '
  '55':
  - type: text
    content: 'Ary raha avy any atsimo ny rivotra dia hoy ianareo: Hafana ny andro; dia tonga izany. '
  '56':
  - type: text
    content: Ianareo mpihatsaravelatsihy, ny tarehin’ny tany sy ny lanitra dia hainareo fantarina; fa ahoana kosa no tsy ahaizanareo mamantatra izao andro izao?
  - type: heading
    content: Ny fifampiraharahana amin’izay manana ady aminao
  - type: heading
    content: Mat 5.25-26
  '57':
  - type: text
    content: 'Nahoana ianareo no tsy mahay mitsara izay marina? '
  '58':
  - type: text
    content: 'Fa raha miara-mandeha amin’ny manana ady aminao ianao hanatrika ny lehibe, raha mbola any an-dalana, dia ezaho izay hifanarahanao aminy, fandrao hitondra anao any amin’ny mpitsara izy, ary ny mpitsara dia hanolotra anao amin’ny mpamatotra, ary ny mpamatotra dia hampiditra anao any an-tranomaizina. '
  '59':
  - type: text
    content: 'Lazaiko aminao fa tsy ho afaka ao ianao, ambara-pandoanao ny '
  - type: text
    content: kaodiranta
  - type: text
    content: ' farany indrindra.'
  '6':
  - type: text
    content: 'Tsy '
  - type: text
    content: asariona
  - type: text
    content: ' roa va no vidin’ny tsintsina dimy? Nefa tsy misy hadinoina eo anatrehan’Andriamanitra ireny na dia iray akory aza. '
  '7':
  - type: text
    content: Fa na dia ny volon-dohanareo aza dia voaisa avokoa. Aza matahotra; fa mihoatra noho ny tsintsina maro ianareo.
  '8':
  - type: text
    content: 'Fa lazaiko aminareo: Na zovy na zovy no manaiky Ahy eo anatrehan’ny olona dia heken’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' izy eo anatrehan’ny anjelin’Andriamanitra; '
  '9':
  - type: text
    content: fa izay mandà Ahy eo anatrehan’ny olona dia holavina kosa izy eo anatrehan’ny anjelin’Andriamanitra.
