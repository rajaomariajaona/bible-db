document_id: LUK.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo izay milaza tena fa mpomba an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany, raha niangona ny vahoaka betsaka, an’arivony maro, ka nifanitsa-kitro, dia niteny tamin’ny mpianany aloha Jesosy hoe: Mitandrema ianareo amin’ny masirasiran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ', dia ny fihatsarambelatsihy.'
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 10.26-33
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa tsy misy nafenina izay tsy haseho, na takona izay tsy ho fantatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa na inona na inona teneninareo ao amin’ny maizina dia ho re eo amin’ny mazava; ary izay bitsihinareo mangingina ao amin’ny efitrano dia hotorìna eny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-trano
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary lazaiko aminareo sakaizako hoe: Aza matahotra izay mamono ny tena, nefa aorianan’izany dia tsy mahavita na inona na inona mihoatra noho izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hasehoko anareo izay hatahoranareo: Matahora Izay manampahefana hanary any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: afobe
  - type: text
    text: ', rehefa nahafaty; eny, hoy Aho aminareo: Matahora Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: asariona
  - type: text
    text: ' roa va no vidin’ny tsintsina dimy? Nefa tsy misy hadinoina eo anatrehan’Andriamanitra ireny na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa na dia ny volon-dohanareo aza dia voaisa avokoa. Aza matahotra; fa mihoatra noho ny tsintsina maro ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa lazaiko aminareo: Na zovy na zovy no manaiky Ahy eo anatrehan’ny olona dia heken’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' izy eo anatrehan’ny anjelin’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: fa izay mandà Ahy eo anatrehan’ny olona dia holavina kosa izy eo anatrehan’ny anjelin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa na zovy na zovy no hiteny hanohitra ny Zanak’Olona dia hahazo famelan-keloka; fa izay miteny ratsy ny Fanahy Masina dia tsy mba hahazo famelan-keloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha entina ho ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' sy ny mpitsara ary ny manampahefana ianareo dia aza manahy izay havalinareo na izay holazainareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: fa ny Fanahy Masina no hampianatra anareo amin’izany ora izany izay tokony holazainareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ilay mpanankarena adala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nisy olona iray teo amin’ny vahoaka niteny tamin’i Jesosy hoe: Mpampianatra ô, teneno ny rahalahiko mba hizara lova amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy Izy taminy: Ralehilahy, iza no nanendry Ahy ho mpitsara na mpizara eo aminareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Izy tamin’ny olona: Mitandrema ianareo ka miarova tena amin’ny fitiavan-karena; fa ny ain’ny olona dia tsy miankina amin’ny habetsahan’ny zavatra ananany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nilaza fanoharana taminy Izy hoe: Nahavokatra be ny tanin’ny lehilahy manankarena iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nihevitra tao am-pony izy hoe: Ahoana no hataoko fa tsy manana toerana hamoriako ny vokatro aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy izy: Izao no hataoko: handrava ny trano fitahirizako aho ka hanangana izay lehibe kokoa, ary ao no hamoriako ny variko rehetra sy ny fananako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hilaza amin’ny fanahiko aho hoe: Ry fanahy ô, manana fananana be voatahiry ho amin’ny taona maro ianao; mitsahara, mihinàna, misotroa, mifalia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa Andriamanitra kosa niteny taminy hoe: Ry adala, anio alina no halaina aminao ny fanahinao, koa ho an’iza izay zavatra noharìnao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Toy izany izay mihary harena ho an’ny tenany ihany, nefa tsy mba manankarena ny amin’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitokiana an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 6.25-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy Jesosy tamin’ny mpianany: Noho izany dia lazaiko aminareo hoe: Aza manahy ny amin’ny ainareo, dia izay hohaninareo, na ny amin’ny tenanareo, dia izay hotafinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa ny aina dia mihoatra noho ny hanina ary ny tena noho ny fitafiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hevero ny goaika; fa tsy mba mamafy na mijinja ireny; ary tsy manana fitoeran-javatra na trano fitahirizana, nefa Andriamanitra no mamelona azy ireny; tsy mihoatra lavitra noho ny vorona va ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary iza moa ao aminareo, na dia manahy aza, no mahay manampy ny andro iainany, na dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' iray aza? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa raha ny kely indrindra aza tsy hainareo, nahoana ianareo no manahy ny amin’ny sisa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hevero ny fanirin’ny voninkazo; tsy mba miasa na mamoly ireny; nefa lazaiko aminareo: Na dia i Solomona teo amin’ny voninahiny rehetra aza tsy mba nitafy tahaka ny iray amin’ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa raha ny ahitra izay any an-tsaha anio, nefa hatao ao am-patana rahampitso, no ampitafin’Andriamanitra toy izany, tsy mainka va ianareo ry kely finoana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa aza mitady izay hohaninareo na izay hosotroinareo ianareo, ary aza miahiahy foana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' amin’izao tontolo izao dia fatra-pitady izany rehetra izany; nefa ny Rainareo mahalala fa tokony ho anareo izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Kanefa katsaho ny fanjakany; dia hanampy ho anareo izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Aza matahotra, ry ondry vitsy, fa efa sitraky ny Rainareo ny hanome anareo ny fanjakana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rakitra any an-danitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 6.19-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Amidio ny fanananareo ka atolory ho fiantrana, manaova kitapom-bola tsy mety ho tonta ho anareo, dia harena any an-danitra tsy mety ho lany, izay tsy azon’ny mpangalatra atonina sady tsy misy kalalao manimba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa izay itoeran’ny harenanareo dia ho any koa ny fonareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny fotoam-piambenana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Aoka hisikina ianareo, ary aoka hirehitra ny jironareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'aoka ianareo ho tahaka ny olona izay miandry ny tompony, raha mody avy amin’ny fampakaram-bady izy, koa nony tonga sy mandondòna izy dia vohàny miaraka amin’izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Sambatra ny mpanompo izay ho hitan’ny tompony miambina, raha avy izy. Lazaiko aminareo marina tokoa fa hisikina ny tompony dia hampipetraka azy ireo hisakafo, ary ho avy ka hanompo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary na amin’ny fotoam-piambenana faharoa amin’ny alina izy no tonga na amin’ny fotoam-piambenana fahatelo ka mahita toy izany dia sambatra ireo mpanompo ireo.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 24.43-51
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fantaro izao, fa raha fantatry ny tompon-trano izay ora hiavian’ny mpangalatra dia ho niambina izy ka tsy namela ny tranony hovakina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia miomàna koa ianareo; fa ho avy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' amin’izay ora tsy ampoizinareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hoy i Petera: Tompoko, ho anay va no ilazanao izany fanoharana izany sa ho an’ny olona rehetra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Hoy ny Tompo: Iza moa no mpitandrin-draharaha mahatoky sy manan-tsaina, izay hotendren’ny tompony hifehy ny mpanompony mba hanome azy anjara sakafo ara-potoana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Sambatra ny mpanompo izay ho hitan’ny tompony fa indro, manatanteraka izany, raha avy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Lazaiko aminareo marina fa hotendreny ho mpiandraikitra ny fananany rehetra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa raha miteny anakampo kosa izany mpanompo izany hoe: Mbola ho ela ny tompoko vao ho avy; dia mikapoka ny mpanompolahy sy ny mpanompovavy izy sady mihinana sy misotro ka mamo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: dia ho avy ny tompon’izany mpanompo izany amin’ny andro izay tsy ampoiziny sy amin’ny ora izay tsy fantany, dia hofaiziny mafy izy ka homeny anjara any amin’ny tsy mahatoky.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ilay mpanompo izay mahafantatra ny sitrapon’ny tompony ihany nefa tsy miomana na manatanteraka izay sitraky ny fony dia hokapohina be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Fa izay tsy nahafantatra kosa ka nanatanteraka izay zavatra tokony hikapohana azy dia hokapohina kely. Fa izay nomena be no hitadiavana be; ary izay nampitahirizina be no hitakina bebe kokoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy, anton’ny fisarahana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Tonga hanipy afo etỳ ambonin’ny tany Aho; koa toy inona ny faniriako mba hirehetan’izany sahady? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Ary manana batisa hanaovana Ahy batisa Aho; koa toy inona ny tebitebiko ambara-pahatanterany!
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 10.34-36
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Heverinareo va fa tonga hanome fihavanana etỳ ambonin’ny tany Aho? Tsia, hoy Aho aminareo fa fampisarahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Fa hatramin’izao dia hisy dimy hisara-tsaina ao amin’ny trano iray, ny telo dia hanohitra ny roa ary ny roa dia hanohitra ny telo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Hisara-tsaina ireo, koa ny ray dia hanohitra ny zanakalahy ary ny zanakalahy dia hanohitra ny ray; ny reny dia hanohitra ny zanakavavy ary ny zanakavavy dia hanohitra ny reny; ny rafozam-bavy dia hanohitra ny vinantovaviny, ary ny vinantovavy dia hanohitra ny rafozam-bavy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahafantarana ny toetry ny andro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Hoy Jesosy tamin’ny vahoaka: Raha mahita rahona miposaka any andrefana ianareo, miaraka amin’izay, dia hoy ianareo: Ho avy ny ranonorana; dia tonga izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary raha avy any atsimo ny rivotra dia hoy ianareo: Hafana ny andro; dia tonga izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Ianareo mpihatsaravelatsihy, ny tarehin’ny tany sy ny lanitra dia hainareo fantarina; fa ahoana kosa no tsy ahaizanareo mamantatra izao andro izao?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifampiraharahana amin’izay manana ady aminao
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 5.25-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Nahoana ianareo no tsy mahay mitsara izay marina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Fa raha miara-mandeha amin’ny manana ady aminao ianao hanatrika ny lehibe, raha mbola any an-dalana, dia ezaho izay hifanarahanao aminy, fandrao hitondra anao any amin’ny mpitsara izy, ary ny mpitsara dia hanolotra anao amin’ny mpamatotra, ary ny mpamatotra dia hampiditra anao any an-tranomaizina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Lazaiko aminao fa tsy ho afaka ao ianao, ambara-pandoanao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kaodiranta
  - type: text
    text: ' farany indrindra.'
