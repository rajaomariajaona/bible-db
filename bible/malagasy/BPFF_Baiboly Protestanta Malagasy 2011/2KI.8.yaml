document_id: 2KI.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tohin’ny tantaran’ilay vehivavy sonemita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary i Elisa niteny tamin-dRavehivavy, renin’ilay zaza novelominy indray hoe: Miaingà ka mandehana ianao sy ny ankohonanao, ary mivahinia any amin’izay azonao ivahiniana; fa NY TOMPO efa niantso ny mosary, sady efa ho tonga izany ka haharitra fito taona amin’ny tany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hoy i Elisa taminy: Mandehana ka lazao aminy hoe: Eny, ho sitrana tokoa ianao! Kanefa NY TOMPO naneho ahy fa tena ho faty izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nibanjina azy ela ny lehilahin’Andriamanitra, ary farany dia nitomany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy i Hazaela: Nahoana no mitomany ianao, tompoko? Ary hoy izy hoe: Satria fantatro izay ratsy hataonao amin’ny Zanak’Israely: Ny fiarovany mafy dia hodoranao, ny zatovony dia hovonoinao amin’ny sabatra, ny zanany madinika dia hotorotoroinao, ary izay bevohoka eo aminy dia hotatahanao ny kibony.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa hoy i Hazaela: Zinona moa ny mpanomponao, dia ity alika ity, no dia hahavita izany zavatra lehibe izany? Fa hoy i Elisa: Efa nasehon’NY TOMPO tamiko fa indro, ianao no ho mpanjakan’i Arama. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nisaraka tamin’i Elisa izy ka nankany amin’ny tompony; ary nanontany azy izy hoe: Ahoana no nolazain’i Elisa taminao? Dia namaly izy hoe: Nolazainy tamiko fa ho velona tokoa ianao!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nony ampitso dia nalain’i Hazaela ny lamba firakotra ka natsobony tamin’ny rano ary nasarony ny tavan’i Beny-Hadada ka maty ny mpanjaka; ary i Hazaela no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jehorama, mpanjakan’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 21.5-20
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tamin’ny taona fahadimy nanjakan’i Jehorama, zanak’i Ahaba, mpanjakan’ny Israely, no nanomboka nanjaka i Jehorama, zanak’i Josafata, mpanjakan’ny Joda. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Roa amby telopolo taona izy raha nanomboka nanjaka, ary valo taona no nanjakany tany Jerosalema. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nandeha tamin’ny lalan’ny mpanjakan’ny Israely izy, dia tahaka ny nataon’ny taranak’i Ahaba, fa ny zanakavavin’i Ahaba no vadiny; eny, nanao izay ratsy teo imason’NY TOMPO izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nefa NY TOMPO tsy nety nandringana ny Joda noho ny amin’i Davida mpanompony, araka ilay nolazainy taminy, fa homeny jiro mandrakizay ho an’ny taranany izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia niainga Ravehivavy ka nanatanteraka ny tenin’ilay lehilahin’Andriamanitra; eny, lasa izy sy ny ankohonany ka nivahiny fito taona tany amin’ny tanin’ny Filistina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tamin’ny androny no nikomian’i Edoma tsy hanoa ny Joda, fa nanangana mpanjaka ho azy; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'koa nankany Zaira i Jehorama ary noentiny niaraka taminy ny kalesy fitondrany miady rehetra; nanaovany latsaka alina ny Edomita izay nanodidina azy mbamin’ny mpitondra kalesy; ary ny olona dia nandositra ho any an-dainy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nefa ny Edomita dia mbola nikomy ka tsy nanoa ny Joda mandraka androany. I Libna koa dia nikomy tamin’izany andro izany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ny tantaran’i Jehorama sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary nodimandry any amin’ny razany i Jehorama dia nalevina tao amin’ny razany tao amin’ny Tanànan’i Davida; ary i Ahazia zanany no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Ahazia, mpanjakan’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 22.1-6
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tamin’ny taona faharoa amby folo nanjakan’i Jehorama, zanak’i Ahaba, mpanjakan’ny Israely, no nanomboka nanjaka i Ahazia, zanak’i Jehorama, mpanjakan’ny Joda. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Roa amby roapolo taona i Ahazia raha nanomboka nanjaka, ary herintaona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Atalia, zanakavavin’i Omry, mpanjakan’ny Israely. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nandeha tamin’ny lalan’ireo taranak’i Ahaba izy ka nanao izay ratsy teo imason’NY TOMPO tahaka ny nataon’ny taranak’i Ahaba, fa vinanton’ny taranak’i Ahaba ihany izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Niaraka tamin’i Jehorama zanak’i Ahaba izy mba hiady amin’i Hazaela, mpanjakan’i Arama, tany Ramota-Gileada; ary ny Arameana dia nahavoa an’i Jehorama. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Dia niverina tany Jezirela i Jehorama mpanjaka mba hotsaboina tamin’ny feriny; izany dia tamin’ny nahavoazan’ny Arameana azy tao Rama, fony izy niady tamin’i Hazaela, mpanjakan’i Arama. Ary nidina hamangy an’i Jehorama zanak’i Ahaba, tao Jezirela i Ahazia, zanak’i Jehorama, mpanjakan’i Joda, satria narary izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nony afaka ny fito taona dia nody avy tany amin’ny tanin’ny Filistina Ravehivavy ary lasa nitaraina tamin’ny mpanjaka izy ny amin’ny tranony sy ny taniny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny mpanjaka dia niteny tamin’i Gehazy, zatovon’ny lehilahin’Andriamanitra hoe: Miangavy anao aho, lazao amiko izay zava-dehibe rehetra nataon’i Elisa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Raha mbola nilazalaza tamin’ny mpanjaka ny amin’ny nameloman’i Elisa ny maty izy dia indro, ilay vehivavy, renin’ny zaza maty novelominy, nitaraina tamin’ny mpanjaka ny amin’ny tranony sy ny taniny. Ary hoy i Gehazy: Ry mpanjaka tompoko ô, ity ilay vehivavy, ary io koa ilay zanany maty novelomin’i Elisa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony nanontanian’ny mpanjaka Ravehivavy dia nanamafy izany. Dia notendren’ny mpanjaka ny tandapa iray ka nomeny teny hoe: Avereno izay azy rehetra ary onero ny vokatry ny taniny rehetra hatramin’ny andro nialany tamin’ny tany ka mandraka ankehitriny.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elisa sy i Hazaela
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary i Elisa dia tonga tany Damaskosy, ary tamin’izay dia narary i Beny-Hadada, mpanjakan’i Arama; ary nisy nanambara taminy hoe: Indro, tonga atỳ ny lehilahin’Andriamanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia hoy ny mpanjaka tamin’i Hazaela: Mitondrà fanomezana miaraka aminao ka mandehana, tsenao ny lehilahin’Andriamanitra, ary anontanio azy izay tenin’NY TOMPO ka lazao hoe: Ho sitrana ihany va aho amin’izao aretiko izao? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia lasa i Hazaela nitsena azy sady nitondra fanomezana tamin’izay zava-tsoa rehetra any Damaskosy, dia entana zakan’ny rameva efapolo. Ary tonga izy ka nitsangana teo anatrehany ary niteny hoe: I Beny-Hadada zanakao, mpanjakan’i Arama, no naniraka ahy ho atỳ aminao hanontany hoe: Ho sitrana ihany va aho amin’izao aretiko izao? '
