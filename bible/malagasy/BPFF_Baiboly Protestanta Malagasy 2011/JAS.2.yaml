document_id: JAS.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy misy ny fiangarana ho an’ny mpanankarena
  - type: text
    content: 'Ry rahalahiko, aoka tsy hasiana fizahan-tavan’olona ny finoanareo ny Tompontsika be voninahitra, dia Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Na iza na iza mitandrina ny lalàna rehetra, nefa diso amin’ny iray loha dia meloka amin’izy rehetra. '
  '11':
  - type: text
    content: 'Fa Ilay niteny hoe: «Aza mijangajanga», no niteny koa hoe: «Aza mamono olona» (Eks 20.13, 14). Raha toa tsy mijangajanga ianao kanefa mamono olona ihany dia mpandika ny lalàna ianao.'
  '12':
  - type: text
    content: 'Aoka hiteny sy hiasa araka izay mahamendrika anareo ianareo izay olona hotsarain’ny lalànan’ny fahafahana. '
  '13':
  - type: text
    content: Fa fitsarana tsy misy famindrampo no ho anjaran’izay tsy mamindra fo; ary izay mamindra fo kosa dia tsy mba matahotra ny fitsarana.
  - type: heading
    content: Foana ny finoana tsy misy asa
  '14':
  - type: text
    content: 'Inona moa no soa azo, ry rahalahiko, raha misy milaza fa manam-pinoana izy nefa tsy manana asa? Ny finoana va mahavonjy azy? '
  '15':
  - type: text
    content: 'Raha misy rahalahy na anabavy tsy manan-kitafy sady tsy manan-kohanina isanandro '
  '16':
  - type: text
    content: 'ka misy aminareo miteny aminy hoe: Mandehana amin’ny fiadanana, mamindroa, mivokisa! Kanefa tsy omenareo azy akory izay ilain’ny tenany, inona moa no soa azo amin’izany? '
  '17':
  - type: text
    content: Toy izany koa ny finoana, raha tsy misy asa dia maty mihitsy.
  '18':
  - type: text
    content: 'Fa angamba hisy hiteny hoe: Ianao dia manam-pinoana, ary izaho dia manana asa. Asehoy amiko tsy amin’ny asa ary ny finoanao, ary izaho kosa dia haneho aminao ny finoako amin’ny asako. '
  '19':
  - type: text
    content: 'Ianao mino fa iray ihany no Andriamanitra. Tsara izany ataonao izany: Ny '
  - type: text
    content: devoly
  - type: text
    content: ' koa dia mba mino izany ka mangovitra.'
  '2':
  - type: text
    content: 'Raha misy olona miditra eo amin’ny sinagoganareo ka misy peratra volamena amin’ny rantsantanany sady miakanjo tsara, ary mba miditra kosa izay olona mahantra sady miakanjo ratsy, '
  '20':
  - type: text
    content: 'Moa tsy fantatrao va, ry olom-poana, fa tsy vanona ny finoana tsy misy asa? '
  '21':
  - type: text
    content: 'Tsy nohamarinina tamin’ny asa va i Abrahama razantsika tamin’ny nanolorany an’Isaka zanany teo ambonin’ny alitara? '
  '22':
  - type: text
    content: 'Hitanao fa niara-niasa tamin’ny finoana ny asany, ary ny finoana dia notanterahina tamin’ny asa. '
  '23':
  - type: text
    content: 'Koa tanteraka ny Soratra Masina milaza hoe: «Ary i Abrahama dia nino an’Andriamanitra ka nisaina ho fahamarinany izany» (Gen 15.6), ary natao hoe «Sakaizan’Andriamanitra» izy (Isa 41.8). '
  '24':
  - type: text
    content: 'Koa hitanareo amin’izany fa hamarinina amin’ny asa ny olona fa tsy amin’ny finoana ihany. '
  '25':
  - type: text
    content: 'Toy izany koa Rahaba janga, tsy nohamarinina tamin’ny asa va izy tamin’ny nandraisany ireny iraka ireny sy ny nampandehanany azy tamin’ny lalan-kafa? '
  '26':
  - type: text
    content: Fa maty ny tena raha tsy misy fanahy, ary maty toy izany koa ny finoana raha tsy misy asa.
  '3':
  - type: text
    content: 'raha mijery ilay miakanjo tsara ianareo ka miteny hoe: Mipetraha etsy amin’ny toerana aloha ianao! Nefa miteny amin’ilay mahantra kosa hoe: Mijoroa eroa ianao! Na: Mipetraha etsy amin’ny fitoeran-tongotro! '
  '4':
  - type: text
    content: Moa tsy manavakavaka va ianareo amin’izany ka efa mpitsara manan-kevi-dratsy?
  '5':
  - type: text
    content: 'Mihainoa, ry rahalahy malalako: Tsy efa nofidin’Andriamanitra va ny mahantra amin’izao fiainana izao ho mpanankarena amin’ny finoana sy ho mpandova ny fanjakana nolazainy homena izay tia Azy? '
  '6':
  - type: text
    content: 'Kanefa ianareo dia nanala baraka ny mahantra! Moa tsy ny mpanankarena va no mampahory anareo? Ary tsy izy ireny va no mitarika anareo ho eo amin’ny fitsarana? '
  '7':
  - type: text
    content: Tsy izy ireny koa va no miteny ratsy ny anarana tsara izay niantsoana anareo?
  '8':
  - type: text
    content: 'Kanefa raha mankatò ilay didy ambony indrindra ianareo, araka ny Soratra Masina hoe: «Tiava ny namanao tahaka ny tenanao» (Lev 19.18), dia tsara no hataonareo. '
  '9':
  - type: text
    content: 'Fa raha mizaha tavan’olona kosa ianareo dia manota ka hohelohin’ny lalàna ho mpanota. '
