document_id: JAS.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy misy ny fiangarana ho an’ny mpanankarena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ry rahalahiko, aoka tsy hasiana fizahan-tavan’olona ny finoanareo ny Tompontsika be voninahitra, dia Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha misy olona miditra eo amin’ny sinagoganareo ka misy peratra volamena amin’ny rantsantanany sady miakanjo tsara, ary mba miditra kosa izay olona mahantra sady miakanjo ratsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'raha mijery ilay miakanjo tsara ianareo ka miteny hoe: Mipetraha etsy amin’ny toerana aloha ianao! Nefa miteny amin’ilay mahantra kosa hoe: Mijoroa eroa ianao! Na: Mipetraha etsy amin’ny fitoeran-tongotro! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moa tsy manavakavaka va ianareo amin’izany ka efa mpitsara manan-kevi-dratsy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mihainoa, ry rahalahy malalako: Tsy efa nofidin’Andriamanitra va ny mahantra amin’izao fiainana izao ho mpanankarena amin’ny finoana sy ho mpandova ny fanjakana nolazainy homena izay tia Azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Kanefa ianareo dia nanala baraka ny mahantra! Moa tsy ny mpanankarena va no mampahory anareo? Ary tsy izy ireny va no mitarika anareo ho eo amin’ny fitsarana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy izy ireny koa va no miteny ratsy ny anarana tsara izay niantsoana anareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa raha mankatò ilay didy ambony indrindra ianareo, araka ny Soratra Masina hoe: «Tiava ny namanao tahaka ny tenanao» (Lev 19.18), dia tsara no hataonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa raha mizaha tavan’olona kosa ianareo dia manota ka hohelohin’ny lalàna ho mpanota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Na iza na iza mitandrina ny lalàna rehetra, nefa diso amin’ny iray loha dia meloka amin’izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa Ilay niteny hoe: «Aza mijangajanga», no niteny koa hoe: «Aza mamono olona» (Eks 20.13, 14). Raha toa tsy mijangajanga ianao kanefa mamono olona ihany dia mpandika ny lalàna ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aoka hiteny sy hiasa araka izay mahamendrika anareo ianareo izay olona hotsarain’ny lalànan’ny fahafahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa fitsarana tsy misy famindrampo no ho anjaran’izay tsy mamindra fo; ary izay mamindra fo kosa dia tsy mba matahotra ny fitsarana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Foana ny finoana tsy misy asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Inona moa no soa azo, ry rahalahiko, raha misy milaza fa manam-pinoana izy nefa tsy manana asa? Ny finoana va mahavonjy azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha misy rahalahy na anabavy tsy manan-kitafy sady tsy manan-kohanina isanandro '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ka misy aminareo miteny aminy hoe: Mandehana amin’ny fiadanana, mamindroa, mivokisa! Kanefa tsy omenareo azy akory izay ilain’ny tenany, inona moa no soa azo amin’izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toy izany koa ny finoana, raha tsy misy asa dia maty mihitsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa angamba hisy hiteny hoe: Ianao dia manam-pinoana, ary izaho dia manana asa. Asehoy amiko tsy amin’ny asa ary ny finoanao, ary izaho kosa dia haneho aminao ny finoako amin’ny asako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ianao mino fa iray ihany no Andriamanitra. Tsara izany ataonao izany: Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' koa dia mba mino izany ka mangovitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moa tsy fantatrao va, ry olom-poana, fa tsy vanona ny finoana tsy misy asa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy nohamarinina tamin’ny asa va i Abrahama razantsika tamin’ny nanolorany an’Isaka zanany teo ambonin’ny alitara? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hitanao fa niara-niasa tamin’ny finoana ny asany, ary ny finoana dia notanterahina tamin’ny asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa tanteraka ny Soratra Masina milaza hoe: «Ary i Abrahama dia nino an’Andriamanitra ka nisaina ho fahamarinany izany» (Gen 15.6), ary natao hoe «Sakaizan’Andriamanitra» izy (Isa 41.8). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa hitanareo amin’izany fa hamarinina amin’ny asa ny olona fa tsy amin’ny finoana ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Toy izany koa Rahaba janga, tsy nohamarinina tamin’ny asa va izy tamin’ny nandraisany ireny iraka ireny sy ny nampandehanany azy tamin’ny lalan-kafa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa maty ny tena raha tsy misy fanahy, ary maty toy izany koa ny finoana raha tsy misy asa.
