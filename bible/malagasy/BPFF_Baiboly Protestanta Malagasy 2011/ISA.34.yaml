document_id: ISA.34,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsarana an’i Edoma
  - type: text
    content: 'Manatòna ianareo '
  - type: text
    content: Jentilisa
  - type: text
    content: ' mba handre!'
  - type: text
    content: Mihainoa ianareo firenena!
  - type: text
    content: Aoka handre ny tany sy ny ao aminy rehetra,
  - type: text
    content: izao tontolo izao sy ny vokatra rehetra avy aminy!
  '10':
  - type: text
    content: Tsy hovonoina izany na alina na andro,
  - type: text
    content: ary hisavoana tsy mitsahatra ny setrony;
  - type: text
    content: ho tany karankaina hatramin’ny taranaka fara aman-dimby izy,
  - type: text
    content: tsy hisy handeha hamakivaky azy intsony mandrakizay mandrakizay.
  '11':
  - type: text
    content: Fa ho zaratanin’ny tararaka sy ny sokina izy.
  - type: text
    content: Hitoetra ao ny vorondolo lehibe sy ny goaika,
  - type: text
    content: ary hohenjanina eo aminy ny kofehy fandrefesan’ny fikorontanana
  - type: text
    content: sy ny fandrefesana marindranon’ny fahafoanana.
  '12':
  - type: text
    content: Tsy hisy ho ao intsony ny lehibe
  - type: text
    content: hanendry izay ho mpanjaka,
  - type: text
    content: fa ho fongana ny mpanapaka rehetra ao aminy.
  '13':
  - type: text
    content: Ho rakotry ny tsilo ny ao anatin’ny lapan’ny mpanjakany,
  - type: text
    content: songosongo sy voaroy no ho ao amin’ny manda fiarovany,
  - type: text
    content: ary ho fonenan’ny amboadia
  - type: text
    content: sy fitoeran’ny aotirisy izany.
  '14':
  - type: text
    content: Hihaona amin’ny kary ireo mponina any an-tany efitra,
  - type: text
    content: hiantso ny namany ny osilahy;
  - type: text
    content: ary ilay biby mandehandeha amin’ny alina no hitoetra any
  - type: text
    content: ka hahita toeram-pialan-tsasatra ho azy;
  '15':
  - type: text
    content: hanao ny lavany any ny bibilava ka hanatody
  - type: text
    content: sy hikotrika ary hifana ao amin’ny alokalony;
  - type: text
    content: any koa no hiangonan’ny papango,
  - type: text
    content: samy eo amin’ny namany avy.
  '16':
  - type: text
    content: Tadiavo ny bokin’NY TOMPO ka vakio!
  - type: text
    content: Tsy misy tsy ao ireo na dia iray akory aza;
  - type: text
    content: tsy misy na dia iray akory aza hitady ny namany;
  - type: text
    content: fa ny vavan’NY TOMPO no nandidy izany,
  - type: text
    content: ary ny Fanahiny ihany no nanangona azy.
  '17':
  - type: text
    content: Izy no nanendry anjara ho an’ireo
  - type: text
    content: ary ny tanany no nizara izany ho an’ireo tamin’ny kofehy fandrefesana.
  - type: text
    content: Handova izany mandrakizay ireo
  - type: text
    content: ka hitoetra ao hatramin’ny taranany fara aman-dimby.
  '2':
  - type: text
    content: Fa ny fahatezeran’NY TOMPO
  - type: text
    content: dia amin’ny Jentilisa rehetra
  - type: text
    content: ary mirehitra amin’ny miaramilany rehetra ny fisafoahany;
  - type: text
    content: efa nodidiany hatao zavatra voaozona ireo
  - type: text
    content: ary natolony hovonoina.
  '3':
  - type: text
    content: Izay voavono amin’ireo dia hariana
  - type: text
    content: ka hamofona ny hamaimbon’ny fatiny,
  - type: text
    content: ary hiempo ny tendrombohitra azon’ny rany.
  '4':
  - type: text
    content: Ho levona ny tafiky ny lanitra rehetra
  - type: text
    content: ary hahorona tahaka ny fangorona taratasy ny lanitra;
  - type: text
    content: ny tafiny rehetra dia halazo
  - type: text
    content: tahaka ny falazon’ny ravina mihintsana avy amin’ny voaloboka,
  - type: text
    content: ary tahaka ny ravina malazo, mihintsana avy amin’ny aviavy.
  '5':
  - type: text
    content: Fa ny sabatro dia mamo any amin’ny lanitra;
  - type: text
    content: indro, hidina ao amin’i Edoma izy
  - type: text
    content: sy amin’ny firenena voatendriko ho zavatra voaozona mba ho fitsarana azy.
  '6':
  - type: text
    content: Feno ra ny sabatry NY TOMPO; eny, mihoso-menaka avy amin’ny matavy
  - type: text
    content: sy amin’ny ran’ny zanak’ondry sy ny osilahy
  - type: text
    content: ary amin’ny jabora fonom-boan’ny ondrilahy;
  - type: text
    content: fa misy fanatitra ataon’NY TOMPO ao Bozra,
  - type: text
    content: ary misy fandringanana be ao amin’ny tany Edoma.
  '7':
  - type: text
    content: Miaraka aripaka aminy ny ombimanga
  - type: text
    content: mbamin’ny vantotra omby sy ny ombilahy
  - type: text
    content: ka vonton-dra ny taniny
  - type: text
    content: ary mihoso-menaka ny vovo-taniny.
  '8':
  - type: text
    content: Fa andro famalian’NY TOMPO izany,
  - type: text
    content: 'taona famaliana hiadiana ho an’i '
  - type: text
    content: Ziona
  - type: text
    content: .
  '9':
  - type: text
    content: Hovana ho tonga dity ny renirano any Edoma,
  - type: text
    content: ary ho solifara ny vovo-taniny;
  - type: text
    content: ho toy ny dity mirehitra ny taniny.
