document_id: ISA.34
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsarana an’i Edoma
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Manatòna ianareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' mba handre!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihainoa ianareo firenena!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka handre ny tany sy ny ao aminy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izao tontolo izao sy ny vokatra rehetra avy aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa ny fahatezeran’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny Jentilisa rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mirehitra amin’ny miaramilany rehetra ny fisafoahany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nodidiany hatao zavatra voaozona ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary natolony hovonoina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izay voavono amin’ireo dia hariana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamofona ny hamaimbon’ny fatiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiempo ny tendrombohitra azon’ny rany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ho levona ny tafiky ny lanitra rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahorona tahaka ny fangorona taratasy ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tafiny rehetra dia halazo
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny falazon’ny ravina mihintsana avy amin’ny voaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny ravina malazo, mihintsana avy amin’ny aviavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa ny sabatro dia mamo any amin’ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: indro, hidina ao amin’i Edoma izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny firenena voatendriko ho zavatra voaozona mba ho fitsarana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Feno ra ny sabatry NY TOMPO; eny, mihoso-menaka avy amin’ny matavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny ran’ny zanak’ondry sy ny osilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny jabora fonom-boan’ny ondrilahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa misy fanatitra ataon’NY TOMPO ao Bozra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy fandringanana be ao amin’ny tany Edoma.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Miaraka aripaka aminy ny ombimanga
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny vantotra omby sy ny ombilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka vonton-dra ny taniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihoso-menaka ny vovo-taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa andro famalian’NY TOMPO izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'taona famaliana hiadiana ho an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hovana ho tonga dity ny renirano any Edoma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho solifara ny vovo-taniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho toy ny dity mirehitra ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy hovonoina izany na alina na andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisavoana tsy mitsahatra ny setrony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tany karankaina hatramin’ny taranaka fara aman-dimby izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hisy handeha hamakivaky azy intsony mandrakizay mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ho zaratanin’ny tararaka sy ny sokina izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitoetra ao ny vorondolo lehibe sy ny goaika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hohenjanina eo aminy ny kofehy fandrefesan’ny fikorontanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fandrefesana marindranon’ny fahafoanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy hisy ho ao intsony ny lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanendry izay ho mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho fongana ny mpanapaka rehetra ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ho rakotry ny tsilo ny ao anatin’ny lapan’ny mpanjakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: songosongo sy voaroy no ho ao amin’ny manda fiarovany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho fonenan’ny amboadia
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fitoeran’ny aotirisy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hihaona amin’ny kary ireo mponina any an-tany efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiantso ny namany ny osilahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ilay biby mandehandeha amin’ny alina no hitoetra any
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahita toeram-pialan-tsasatra ho azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: hanao ny lavany any ny bibilava ka hanatody
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hikotrika ary hifana ao amin’ny alokalony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: any koa no hiangonan’ny papango,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy eo amin’ny namany avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tadiavo ny bokin’NY TOMPO ka vakio!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy tsy ao ireo na dia iray akory aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy na dia iray akory aza hitady ny namany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vavan’NY TOMPO no nandidy izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Fanahiny ihany no nanangona azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izy no nanendry anjara ho an’ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tanany no nizara izany ho an’ireo tamin’ny kofehy fandrefesana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handova izany mandrakizay ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitoetra ao hatramin’ny taranany fara aman-dimby.
