document_id: ZEC.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ady farany sy ny fiavian’NY TOMPO
  - type: text
    content: Indro, hisy Andron’NY TOMPO ho avy,
  - type: text
    content: koa ny babo aminao dia hozaraina ao ampovoanao.
  '10':
  - type: text
    content: Ho tonga tahaka ny tany ngazana ny tany rehetra hatrany Geba ka hatrany Rimona ao atsimon’i Jerosalema. Fa i Jerosalema kosa dia hasandratra sy hijanona eo amin’ny toerany ihany, hatramin’ny vavahadin’i Benjamina ka hatramin’ny vavahady voalohany, hatramin’ny vavahady an-jorony ary hatramin’ny tilikambo fiambenana Hananela ka hatramin’ireo famiazam-boaloboky ny mpanjaka.
  '11':
  - type: text
    content: Dia hisy mponina any
  - type: text
    content: ary tsy hisy ozona intsony,
  - type: text
    content: fa Jerosalema dia handry fehizay.
  '12':
  - type: text
    content: 'Ary izao no areti-mandringana hamelezan’NY TOMPO ny firenena rehetra izay nanafika an’i Jerosalema: Hataony miha lò am-pitsanganana ny nofony ary hiha lò ao amin’ny lavaka fitoerany ny masony ary ny lelany koa hiha lò ao am-bavany.'
  '13':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: NY TOMPO dia hahatonga
  - type: text
    content: fifanaritahana lehibe eo aminy,
  - type: text
    content: ary hifampihazona izy,
  - type: text
    content: sady samy hanainga tanana hifamely.
  '14':
  - type: text
    content: Ary ny Joda koa dia hiady any Jerosalema
  - type: text
    content: ary hovorina ny harenan’ny firenena manodidina rehetra,
  - type: text
    content: dia volamena sy volafotsy ary fitafiana betsaka.
  '15':
  - type: text
    content: Ary ny areti-mandringana dia hamely koa ny soavaly, ny ampondra, ny rameva ary ny boriky mbamin’ny biby fiompy rehetra izay ao amin’ireny toby ireny; izany areti-mandringana izany dia ho tahaka ilay iray koa.
  '16':
  - type: text
    content: Ary ny sisa rehetra amin’ny Jentilisa rehetra izay niakatra namely an’i Jerosalema
  - type: text
    content: dia hiakatra isan-taona isan-taona
  - type: text
    content: hiankohoka eo anatrehan’ny Mpanjaka, dia Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: ka hitandrina ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo.
  '17':
  - type: text
    content: 'Ary na iza na iza amin’ny firenena samihafa amin’ny tany no tsy hiakatra ho any Jerosalema hiankohoka eo anatrehan’ny Mpanjaka, dia Andriamanitra, Tompon’izao rehetra izao, dia tsy hisy ranonorana mirotsaka aminy. '
  '18':
  - type: text
    content: 'Ary raha ny firenen’i Ejipta no tsy mba miakatra ka tsy tonga dia tsy hisy ranonorana hirotsaka aminy koa, sady ho tonga aminy ny areti-mandringana izay hamelezan’NY TOMPO ny firenena tsy miakatra hitandrina ny andro firavoravoana amin’ny trano rantsan-kazo. '
  '19':
  - type: text
    content: Izany no fampijaliana an’i Ejipta sy fampijaliana ny firenena rehetra izay tsy miakatra hitandrina ny andro firavoravoana fitoerana an-trano rantsan-kazo.
  '2':
  - type: text
    content: 'Ary hangoniko ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra'
  - type: text
    content: hamely an’i Jerosalema,
  - type: text
    content: dia ho azony ny tanàna
  - type: text
    content: ka horobaina ny trano
  - type: text
    content: ary hisy hanolana ny vehivavy;
  - type: text
    content: ny antsasaky ny tanàna dia ho lasan-ko babo,
  - type: text
    content: fa ny vahoaka sisa
  - type: text
    content: dia tsy hofongorana amin’ny tanàna.
  '20':
  - type: text
    content: 'Amin’izany andro izany dia hosoratana eo amin’ny lakolosy kely amin’ny soavaly hoe: «NOHAMASININA HO AN’NY TOMPO». Ary ny vilany ao amin’ny tranon’NY TOMPO dia ho tahaka ny lovia famafazana eo anoloan’ny alitara. '
  '21':
  - type: text
    content: Eny, ny vilany rehetra any Jerosalema sy i Joda dia hohamasinina ho an’Andriamanitra, Tompon’izao rehetra izao, ary izay rehetra mamono zavatra hatao fanatitra dia ho avy haka amin’ireny ka hahandro izany. Amin’izany andro izany dia tsy hisy mpivarotra intsony ao amin’ny tranon’Andriamanitra, Tompon’izao rehetra izao.
  '3':
  - type: text
    content: Dia ho avy NY TOMPO
  - type: text
    content: ka hiady amin’ireny Jentilisa ireny,
  - type: text
    content: tahaka ny fameliny amin’ny andron’ny ady.
  '4':
  - type: text
    content: Amin’izany andro izany ny tongony
  - type: text
    content: dia hijoro eo amin’ny Tendrombohitra Oliva
  - type: text
    content: izay manatrika an’i Jerosalema eo atsinanana;
  - type: text
    content: ary ny Tendrombohitra Oliva dia hitresaka eo afovoany,
  - type: text
    content: hiantsinanana sy hiankandrefana
  - type: text
    content: ka hisy lohasaha lehibe;
  - type: text
    content: ary ny antsasaky ny tendrombohitra dia hifindra hianavaratra,
  - type: text
    content: fa ny antsasany kosa dia hianatsimo.
  '5':
  - type: text
    content: Dia handositra hamaky ny lohasahan’ny tendrombohitro ianareo, fa hipaka hatrany Azela izany lohasahan’ny tendrombohitra izany; eny, handositra ianareo, tahaka ny nandosiranareo ny horohoron-tany tamin’ny andron’i Ozia mpanjakan’i Joda.
  - type: text
    content: Ary ho avy NY TOMPO Andriamanitro
  - type: text
    content: mbamin’ny masina rehetra momba Azy.
  '6':
  - type: text
    content: Ary amin’izany andro izany
  - type: text
    content: dia tsy hisy mazava,
  - type: text
    content: ary ireo mamirapiratra dia tsy hiseho intsony.
  '7':
  - type: text
    content: Ary hisy andro iray
  - type: text
    content: izay fantatry NY TOMPO,
  - type: text
    content: tsy andro na alina;
  - type: text
    content: nefa raha hariva ny andro dia hisy mazava.
  '8':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: dia hisy rano velona hivoaka avy any Jerosalema,
  - type: text
    content: koa ny antsasany dia hankany amin’ny ranomasina atsinanana
  - type: text
    content: ary ny antsasany dia hankany amin’ny ranomasina andrefana;
  - type: text
    content: na amin’ny fahavaratra
  - type: text
    content: na amin’ny ririnina dia hisy izany.
  '9':
  - type: text
    content: Ary NY TOMPO dia ho Mpanjakan’ny tany rehetra;
  - type: text
    content: amin’izany andro izany
  - type: text
    content: NY TOMPO dia ho tokana,
  - type: text
    content: sady ho tokana ny anarany.
