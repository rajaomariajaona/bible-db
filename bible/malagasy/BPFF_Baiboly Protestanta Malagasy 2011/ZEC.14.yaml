document_id: ZEC.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ady farany sy ny fiavian’NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hisy Andron’NY TOMPO ho avy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ny babo aminao dia hozaraina ao ampovoanao.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho tonga tahaka ny tany ngazana ny tany rehetra hatrany Geba ka hatrany Rimona ao atsimon’i Jerosalema. Fa i Jerosalema kosa dia hasandratra sy hijanona eo amin’ny toerany ihany, hatramin’ny vavahadin’i Benjamina ka hatramin’ny vavahady voalohany, hatramin’ny vavahady an-jorony ary hatramin’ny tilikambo fiambenana Hananela ka hatramin’ireo famiazam-boaloboky ny mpanjaka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hisy mponina any
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy ozona intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Jerosalema dia handry fehizay.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no areti-mandringana hamelezan’NY TOMPO ny firenena rehetra izay nanafika an’i Jerosalema: Hataony miha lò am-pitsanganana ny nofony ary hiha lò ao amin’ny lavaka fitoerany ny masony ary ny lelany koa hiha lò ao am-bavany.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO dia hahatonga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fifanaritahana lehibe eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hifampihazona izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady samy hanainga tanana hifamely.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny Joda koa dia hiady any Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hovorina ny harenan’ny firenena manodidina rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia volamena sy volafotsy ary fitafiana betsaka.
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary ny areti-mandringana dia hamely koa ny soavaly, ny ampondra, ny rameva ary ny boriky mbamin’ny biby fiompy rehetra izay ao amin’ireny toby ireny; izany areti-mandringana izany dia ho tahaka ilay iray koa.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sisa rehetra amin’ny Jentilisa rehetra izay niakatra namely an’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiakatra isan-taona isan-taona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiankohoka eo anatrehan’ny Mpanjaka, dia Andriamanitra, Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitandrina ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na iza na iza amin’ny firenena samihafa amin’ny tany no tsy hiakatra ho any Jerosalema hiankohoka eo anatrehan’ny Mpanjaka, dia Andriamanitra, Tompon’izao rehetra izao, dia tsy hisy ranonorana mirotsaka aminy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha ny firenen’i Ejipta no tsy mba miakatra ka tsy tonga dia tsy hisy ranonorana hirotsaka aminy koa, sady ho tonga aminy ny areti-mandringana izay hamelezan’NY TOMPO ny firenena tsy miakatra hitandrina ny andro firavoravoana amin’ny trano rantsan-kazo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no fampijaliana an’i Ejipta sy fampijaliana ny firenena rehetra izay tsy miakatra hitandrina ny andro firavoravoana fitoerana an-trano rantsan-kazo.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary hangoniko ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' rehetra'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamely an’i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho azony ny tanàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka horobaina ny trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisy hanolana ny vehivavy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny antsasaky ny tanàna dia ho lasan-ko babo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vahoaka sisa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hofongorana amin’ny tanàna.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany dia hosoratana eo amin’ny lakolosy kely amin’ny soavaly hoe: «NOHAMASININA HO AN’NY TOMPO». Ary ny vilany ao amin’ny tranon’NY TOMPO dia ho tahaka ny lovia famafazana eo anoloan’ny alitara. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, ny vilany rehetra any Jerosalema sy i Joda dia hohamasinina ho an’Andriamanitra, Tompon’izao rehetra izao, ary izay rehetra mamono zavatra hatao fanatitra dia ho avy haka amin’ireny ka hahandro izany. Amin’izany andro izany dia tsy hisy mpivarotra intsony ao amin’ny tranon’Andriamanitra, Tompon’izao rehetra izao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho avy NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiady amin’ireny Jentilisa ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny fameliny amin’ny andron’ny ady.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany ny tongony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hijoro eo amin’ny Tendrombohitra Oliva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manatrika an’i Jerosalema eo atsinanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny Tendrombohitra Oliva dia hitresaka eo afovoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiantsinanana sy hiankandrefana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hisy lohasaha lehibe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny antsasaky ny tendrombohitra dia hifindra hianavaratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny antsasany kosa dia hianatsimo.
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia handositra hamaky ny lohasahan’ny tendrombohitro ianareo, fa hipaka hatrany Azela izany lohasahan’ny tendrombohitra izany; eny, handositra ianareo, tahaka ny nandosiranareo ny horohoron-tany tamin’ny andron’i Ozia mpanjakan’i Joda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho avy NY TOMPO Andriamanitro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny masina rehetra momba Azy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hisy mazava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ireo mamirapiratra dia tsy hiseho intsony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy andro iray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay fantatry NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy andro na alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa raha hariva ny andro dia hisy mazava.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hisy rano velona hivoaka avy any Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ny antsasany dia hankany amin’ny ranomasina atsinanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny antsasany dia hankany amin’ny ranomasina andrefana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na amin’ny fahavaratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na amin’ny ririnina dia hisy izany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary NY TOMPO dia ho Mpanjakan’ny tany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO dia ho tokana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho tokana ny anarany.
