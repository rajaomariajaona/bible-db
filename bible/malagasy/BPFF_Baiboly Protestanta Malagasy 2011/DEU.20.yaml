document_id: DEU.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitsipika momba ny ady
  - type: text
    content: 'Raha mandeha hanafika ny fahavalonao ianao ka mahita soavaly sy kalesy fitondra miady ary olona maro noho ianao dia aza matahotra azy; fa NY TOMPO Andriamanitrao kosa, izay nitondra anao niakatra avy tany amin’ny tany Ejipta, no momba anao. '
  '10':
  - type: text
    content: 'Rehefa manakaiky ny tanàna hiadiana ianao dia milazà fihavanana aminy. '
  '11':
  - type: text
    content: 'Raha fihavanana no avaliny anao ka mampandroso anao izy dia hampanaovinao fanompoana ny olona rehetra ao ka hanompo anao. '
  '12':
  - type: text
    content: 'Fa raha tsy mety manao fihavanana aminao kosa izy, fa te hiady aminao, dia ataovy fahirano. '
  '13':
  - type: text
    content: 'Ary rehefa atolotry NY TOMPO Andriamanitrao eo an-tananao izy dia hovonoinao amin’ny lelan-tsabatra ny lehilahy rehetra ao. '
  '14':
  - type: text
    content: 'Fa ny babo rehetra ao, dia ny zaza amam-behivavy sy ny biby fiompy mbamin’izay rehetra ao an-tanàna kosa, dia hoentinao ho anao; ary hohaninao ny babo azo tamin’ny fahavalonao, izay omen’NY TOMPO Andriamanitrao anao. '
  '15':
  - type: text
    content: 'Toy izany no hataonao amin’ny tanàna rehetra izay lavitra anao indrindra ka tsy tanànan’ireto firenena ireto. '
  '16':
  - type: text
    content: 'Fa ny tanànan’ireto firenena ireto kosa, izay omen’NY TOMPO Andriamanitrao ho lovanao, dia aza asiana miangana izay olona rehetra ao. '
  '17':
  - type: text
    content: 'Ataovy ho zavatra voaozona avokoa ireo, dia ny Hetita, ny Amorita, ny Kananita, ny Perizita, ny Hivita ary ny Jebosita, araka izay nandidian’NY TOMPO Andriamanitrao anao, '
  '18':
  - type: text
    content: 'izany dia mba tsy hampianarany anareo ny fahavetavetany rehetra izay nataony tamin’ireo andriamaniny ka tsy hanotanareo amin’NY TOMPO Andriamanitrareo. '
  '19':
  - type: text
    content: 'Raha maharitra ela ny fanaovanao fahirano ny tanàna izay tafihinao mba halaina dia aza kapaina ho simban’ny famaky ny hazo maniry eo aminy; fa hisy hohaninao amin’ireo, koa aza kapaina, fa olona va ny hazo any an-tsaha no hataonao fahirano? '
  '2':
  - type: text
    content: 'Rehefa hanafika ianareo dia hanatona ny mpisorona ka hiteny amin’ny olona hoe: '
  '20':
  - type: text
    content: Kanefa ny hazo izay fantatrao fa tsy fihinam-boa dia kapao ihany ka ataovy manda hamelezana ny tanàna izay miady aminao mandra-paharesiny.
  '3':
  - type: text
    content: 'Mihainoa, ry Israely ô, fa hanafika ny fahavalonareo ianareo anio; koa aza ketraka ny fonareo ary aza matahotra, na mikorapaka foana, na mangorohoro eo anoloany; '
  '4':
  - type: text
    content: fa NY TOMPO Andriamanitrareo no miara-mandeha aminareo hiady ho anareo amin’ny fahavalonareo mba hamonjy anareo.
  '5':
  - type: text
    content: 'Dia hiteny amin’ny olona ireo mpifehy azy hoe: Iza no olona izay nanorina trano vaovao nefa tsy mbola notokanany? Aoka handeha hiverina any an-tranony izy, fandrao maty any amin’ny ady ka olon-kafa no hitokana ny tranony. '
  '6':
  - type: text
    content: 'Iza no olona izay nanamboatra tanim-boaloboka nefa tsy mbola nihinana ny vokatra? Aoka handeha hiverina any an-tranony izy, fandrao maty any amin’ny ady ka olon-kafa no hihinana ny vokatra. '
  '7':
  - type: text
    content: 'Ary iza no olona izay nifofo vady nefa tsy mbola nampakatra azy? Aoka handeha hiverina any an-tranony izy, fandrao maty any amin’ny ady ka olon-kafa no hampakatra ny vadiny. '
  '8':
  - type: text
    content: 'Ary mbola hiteny amin’ny olona ihany ny mpifehy azy hoe: Iza no olona izay matahotra sy osa fo? Aoka handeha hiverina any an-tranony izy, fandrao ho ketraka tahaka ny fony koa ny fon’ny rahalahiny. '
  '9':
  - type: text
    content: Rehefa vitan’ny mpifehy vahoaka ny teny ataony amin’ny olona dia hasiany mpifehy ny miaramila hitarika azy.
