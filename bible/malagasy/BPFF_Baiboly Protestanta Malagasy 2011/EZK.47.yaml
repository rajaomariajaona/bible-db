document_id: EZK.47,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loharano ao amin’ny tempoly
  - type: text
    content: 'Dia noentiny niverina ho eo amin’ny varavaran’ny Trano aho. Ary indro, nisy rano niboiboika avy ao ambanin’ny tokonan’ny Trano, teo atsinanana; fa manatrika ny atsinanana ny Trano, ary ny rano dia nidina avy teo ambanin’ny lafiny havanan’ny Trano, teo atsimon’ny alitara. '
  '10':
  - type: text
    content: 'Ary hisy mpanarato hijoro eny amorony. Hatrany Eny-Gedỳ ka hatrany Eny-Eglaìma no hamelarana harato; ary ny hazandranony ho maro karazana, tahaka ny hazandrano be dia be any amin’ny Ranomasina Lehibe. '
  '11':
  - type: text
    content: 'Fa ny honahona sy ny heniheny dia tsy hositranina fa havela ho sira. '
  '12':
  - type: text
    content: Ary eny amoron’ny ony, eny an-daniny roa, no hanirian’ny hazo rehetra fihinam-boa. Tsy halazo ny raviny na ho lany ny voany fa hamoa voa vaovao isam-bolana izy satria mivoaka avy ao amin’ny fitoerana masina ny ranony. Ho fihinana ny voany ary ho fanafody ny raviny.
  - type: heading
    content: NY TOMPO no mamaritra ny ho sisintanin’ny Israely
  '13':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Izao no faritry ny tany hozarainareo ho lova araka ny fokon’ny Israely roa amby folo; anjaran-droa no ho an’i Josefa. '
  '14':
  - type: text
    content: 'Samy handova avokoa ianareo rehetra satria efa nanangan-tanana hanome ity ho an’ny razanareo Aho ka ho azonareo ho lova ity tany ity. '
  '15':
  - type: text
    content: 'Ary izao no sisintaniny: Ny lafiny avaratra dia hatramin’ny Ranomasina Lehibe amin’ny lalana mankany Hetlona ka hatramin’ny sisintanin’i Zedada, '
  '16':
  - type: text
    content: 'dia i Hamata, i Berota, i Sibraima, izay eo anelanelan’ny faritanin’i Damaskosy sy ny faritanin’i Hamata, i Hazera afovoany, izay eo an-tsisin’i Haorana. '
  '17':
  - type: text
    content: 'Ny sisintaniny ary dia hatramin’ny ranomasina, dia i Hazara-Enona, ny sisintanin’i Damaskosy, i Tsafona any avaratra, dia ny sisintanin’i Hamata. Izany no lafiny avaratra. '
  '18':
  - type: text
    content: 'Ny lafiny atsinanana hatrany anelanelan’i Haorana, i Damaskosy, i Gileada ary ny tanin’ny Israely dia i Jordana; hatramin’ny sisintany ka hatreo amoron’ny ranomasina atsinanana no horefesinareo. Izany no lafiny atsinanana. '
  '19':
  - type: text
    content: 'Ny lafiny atsimo dia hatrany Tamara ka hatramin’ny ranon’i Meriba any Kadesy sy ny lohasahan-driaka ka hatramin’ny Ranomasina Lehibe. Izany no lafiny atsimo. '
  '2':
  - type: text
    content: Dia noentiny nivoaka tamin’ny lalana mankany amin’ny vavahady avaratra aho ka nampandehaniny manodidina tamin’ny lalana ivelany hankany amin’ny vavahady ivelany, dia teo amin’ny lalana manatrika ny atsinanana. Ary indro, nisy rano nipoitra avy teo amin’ny ilany havanana.
  '20':
  - type: text
    content: Ny lafiny andrefana koa dia ny Ranomasina Lehibe hatramin’ny sisintany ka hatrany akaikin’i Hamata. Izany no lafiny andrefana.
  '21':
  - type: text
    content: 'Hozarainareo aminareo izany tany izany araka ny fokon’ny Israely. '
  '22':
  - type: text
    content: 'Amin’ny antsapaka no hizaranareo azy ho lova ho anareo sy ny vahiny monina ao aminareo izay miteraka ao aminareo, ka hataonareo ho tahaka ny tena Zanak’Israely izy. Hiara-manao antsapaka aminareo izy ka hiara-mandova amin’ny fokon’ny Israely. '
  '23':
  - type: text
    content: Ao amin’izay firenena hitoeran’ny vahiny, dia ao no hanomezanareo azy ny lovany, hoy NY TOMPO Andriamanitra.
  '3':
  - type: text
    content: 'Nony nandeha niantsinanana Ralehilahy, ary nisy kofehy fandrefesana teny an-tanany, dia nandrefy arivo '
  - type: text
    content: hakiho
  - type: text
    content: ' izy; nampitainy ny rano aho ka hakitrokely ny rano. '
  '4':
  - type: text
    content: 'Nandrefy arivo hakiho indray izy dia nampitainy ny rano aho ka halohalika ny rano. Nandrefy arivo hakiho indray izy dia nampitainy aho, ka hatehezana ny rano. '
  '5':
  - type: text
    content: Nandrefy arivo hakiho indray koa izy ka ony tsy azo nitana fa efa nihalalina ny rano, ka tsy maintsy hilomanosana, eny, ony tsy azo itana.
  '6':
  - type: text
    content: 'Dia hoy izy tamiko: Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', hitanao va izany? Dia nitondra ahy niverina ho eny amoron’ny ony izy. '
  '7':
  - type: text
    content: 'Nony niverina aho, indro, nisy hazo betsaka teny amoron’ny ony, teny an-daniny roa. '
  '8':
  - type: text
    content: 'Dia hoy izy tamiko: Ity rano ity dia mivoaka mankany amin’ny tany atsinanana dia midina any amin’ny tany ngazana ka miditra ao amin’ny ranomasina; ary rehefa tonga eo an-dranomasina izy dia sitrana ny rano. '
  '9':
  - type: text
    content: 'Ary ny zavamananaina rehetra mifanaretsaka dia ho velona, na aiza na aiza alehan’ny ony, ary hisy hazandrano sesehena; fa rehefa tonga ao ity rano ity dia ho sitrana izy, ary ho velona izay rehetra hidiran’ny ony. '
