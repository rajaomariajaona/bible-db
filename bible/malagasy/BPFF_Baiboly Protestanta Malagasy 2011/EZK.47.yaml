document_id: EZK.47
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loharano ao amin’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia noentiny niverina ho eo amin’ny varavaran’ny Trano aho. Ary indro, nisy rano niboiboika avy ao ambanin’ny tokonan’ny Trano, teo atsinanana; fa manatrika ny atsinanana ny Trano, ary ny rano dia nidina avy teo ambanin’ny lafiny havanan’ny Trano, teo atsimon’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia noentiny nivoaka tamin’ny lalana mankany amin’ny vavahady avaratra aho ka nampandehaniny manodidina tamin’ny lalana ivelany hankany amin’ny vavahady ivelany, dia teo amin’ny lalana manatrika ny atsinanana. Ary indro, nisy rano nipoitra avy teo amin’ny ilany havanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nony nandeha niantsinanana Ralehilahy, ary nisy kofehy fandrefesana teny an-tanany, dia nandrefy arivo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' izy; nampitainy ny rano aho ka hakitrokely ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nandrefy arivo hakiho indray izy dia nampitainy ny rano aho ka halohalika ny rano. Nandrefy arivo hakiho indray izy dia nampitainy aho, ka hatehezana ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nandrefy arivo hakiho indray koa izy ka ony tsy azo nitana fa efa nihalalina ny rano, ka tsy maintsy hilomanosana, eny, ony tsy azo itana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy izy tamiko: Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', hitanao va izany? Dia nitondra ahy niverina ho eny amoron’ny ony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nony niverina aho, indro, nisy hazo betsaka teny amoron’ny ony, teny an-daniny roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy izy tamiko: Ity rano ity dia mivoaka mankany amin’ny tany atsinanana dia midina any amin’ny tany ngazana ka miditra ao amin’ny ranomasina; ary rehefa tonga eo an-dranomasina izy dia sitrana ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny zavamananaina rehetra mifanaretsaka dia ho velona, na aiza na aiza alehan’ny ony, ary hisy hazandrano sesehena; fa rehefa tonga ao ity rano ity dia ho sitrana izy, ary ho velona izay rehetra hidiran’ny ony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hisy mpanarato hijoro eny amorony. Hatrany Eny-Gedỳ ka hatrany Eny-Eglaìma no hamelarana harato; ary ny hazandranony ho maro karazana, tahaka ny hazandrano be dia be any amin’ny Ranomasina Lehibe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny honahona sy ny heniheny dia tsy hositranina fa havela ho sira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary eny amoron’ny ony, eny an-daniny roa, no hanirian’ny hazo rehetra fihinam-boa. Tsy halazo ny raviny na ho lany ny voany fa hamoa voa vaovao isam-bolana izy satria mivoaka avy ao amin’ny fitoerana masina ny ranony. Ho fihinana ny voany ary ho fanafody ny raviny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO no mamaritra ny ho sisintanin’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Izao no faritry ny tany hozarainareo ho lova araka ny fokon’ny Israely roa amby folo; anjaran-droa no ho an’i Josefa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Samy handova avokoa ianareo rehetra satria efa nanangan-tanana hanome ity ho an’ny razanareo Aho ka ho azonareo ho lova ity tany ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary izao no sisintaniny: Ny lafiny avaratra dia hatramin’ny Ranomasina Lehibe amin’ny lalana mankany Hetlona ka hatramin’ny sisintanin’i Zedada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia i Hamata, i Berota, i Sibraima, izay eo anelanelan’ny faritanin’i Damaskosy sy ny faritanin’i Hamata, i Hazera afovoany, izay eo an-tsisin’i Haorana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny sisintaniny ary dia hatramin’ny ranomasina, dia i Hazara-Enona, ny sisintanin’i Damaskosy, i Tsafona any avaratra, dia ny sisintanin’i Hamata. Izany no lafiny avaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny lafiny atsinanana hatrany anelanelan’i Haorana, i Damaskosy, i Gileada ary ny tanin’ny Israely dia i Jordana; hatramin’ny sisintany ka hatreo amoron’ny ranomasina atsinanana no horefesinareo. Izany no lafiny atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny lafiny atsimo dia hatrany Tamara ka hatramin’ny ranon’i Meriba any Kadesy sy ny lohasahan-driaka ka hatramin’ny Ranomasina Lehibe. Izany no lafiny atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny lafiny andrefana koa dia ny Ranomasina Lehibe hatramin’ny sisintany ka hatrany akaikin’i Hamata. Izany no lafiny andrefana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hozarainareo aminareo izany tany izany araka ny fokon’ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Amin’ny antsapaka no hizaranareo azy ho lova ho anareo sy ny vahiny monina ao aminareo izay miteraka ao aminareo, ka hataonareo ho tahaka ny tena Zanak’Israely izy. Hiara-manao antsapaka aminareo izy ka hiara-mandova amin’ny fokon’ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ao amin’izay firenena hitoeran’ny vahiny, dia ao no hanomezanareo azy ny lovany, hoy NY TOMPO Andriamanitra.
