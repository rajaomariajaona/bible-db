document_id: JOB.36,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitaiza ny olona Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mbola nandroso niteny ihany i Eliho hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia manokatra ny sofiny hihaino fananarana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandidy azy ireny hibebaka hiala amin’ny ratsy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Raha mihaino ka manaiky Azy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lany amin’ny fiadanana ny androny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taonany dia amin’ny fahafinaretana.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa raha tsy mihaino kosa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho voatifitry ny lefona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho faty ao amin’ny tsy fahalalana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa ny mpihatsaravelatsihy dia mirakitra fahatezerana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mitaraina izy na dia afatony aza;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: maty tanora izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, afaka aina eo amin’ny mpijangajanga.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa ny fahorian’ny ory kosa no entin’Andriamanitra mamonjy azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny manjo azy no entiny manokatra ny sofiny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary ianao koa aza dia sarihiny hiala tao amin’ny fahaterena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho amin’ny malalaka tsy misy manembantsembana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny matavy indrindra no aroso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho eo ambonin’ny latabatrao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Raha mitsara ny adin’ny ratsy fanahy ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka hazonina ny rariny sy ny hitsiny;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: aoka tsy hampirisika anao hiteny ratsy ny fahatezerana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka tsy hampivily saina anao ny haben’ny kolikoly!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Moa hahafaka anao amin’ny fahoriana va ny fitarainanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na izay rehetra tratry ny hery sy tanjakao?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mahareta kely amiko dia hambarako aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mbola misy teny holazaina hanamarina an’Andriamanitra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Aza irinao ny hiavian’ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay ampialana ny olona amin’ny fitoerany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tandremo, aza mivily ho amin’ny ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa saingy ozoim-pahoriana ianao dia mifidy izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahefan’Andriamanitra Tsitoha
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Indro Andriamanitra dia misandratra amin’ny heriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iza no mba mpampianatra tahaka Azy?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Iza no nandidy Azy tamin’izay lalan-kalehany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary iza no afaka hilaza Aminy hoe: Nanao ratsy Ianao?'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tsarovy ny hankalaza ny asany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa nataon’ny olona an-kira.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Mandinika izany ny olona rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mijery izany eny lavitra eny ny zanak’olombelona.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Indro, lehibe Andriamanitra ka tsy takatry ny saintsika Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hita isa ny taonany.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa manintona ny rano Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia milatsaka ho ranonorana aman-javona izany
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ary aidin’ny rahona izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka alatsany amin’ny olona maro be.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary koa, iza moa no mahalala ny amin’ny fivelatry ny rahona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fikotrokotroka ao an-dainy?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Halaiko avy lavitra ny fahalalako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanamarina ny Mpanao ahy aho.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Indro, mamelatra ny fahazavany eo amboniny Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manao ny fanambanin’ny ranomasina ho firakofany.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa ireny zavatra ireny no itsarany ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady anomezany hanina betsaka.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Mifono fahazavana ny tanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary baikoiny iny mba hahavoa ny fahavalony.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ny fikotrokotrony dia manambara Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny omby aman’ondry koa aza dia milaza ny hiaviany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa tsy lainga tsy akory ny teniko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lehilahy tanteraka amin’ny fahalalana no eto aminao!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Indro, lehibe Andriamanitra, kanefa tsy mba mamingavinga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lehibe amin’ny herin’ny fahalalana Izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsy mitsimbina ny ain’ny ratsy fanahy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manome rariny ho an’ny ory.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy mampiala ny masony amin’ny marina Izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny amin’ny mpanjaka dia ambonin’ny sezafiandrianany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ampitoerany azy ho mandrakizay ka tafasandratra izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary raha voafatotra amin’ny gadra izy ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy voafehy amin’ny tadin’ny fahoriana
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: dia ambarany azy ny asany sy ny fahotany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha manandra-tena izy.
