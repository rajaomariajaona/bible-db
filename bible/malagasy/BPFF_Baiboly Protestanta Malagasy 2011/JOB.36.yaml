document_id: JOB.36,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitaiza ny olona Andriamanitra
  - type: text
    content: 'Mbola nandroso niteny ihany i Eliho hoe:'
  '10':
  - type: text
    content: Dia manokatra ny sofiny hihaino fananarana Izy
  - type: text
    content: ka mandidy azy ireny hibebaka hiala amin’ny ratsy.
  '11':
  - type: text
    content: Raha mihaino ka manaiky Azy izy
  - type: text
    content: dia lany amin’ny fiadanana ny androny
  - type: text
    content: ary ny taonany dia amin’ny fahafinaretana.
  '12':
  - type: text
    content: Fa raha tsy mihaino kosa izy
  - type: text
    content: dia ho voatifitry ny lefona
  - type: text
    content: ka ho faty ao amin’ny tsy fahalalana.
  '13':
  - type: text
    content: Fa ny mpihatsaravelatsihy dia mirakitra fahatezerana;
  - type: text
    content: tsy mitaraina izy na dia afatony aza;
  '14':
  - type: text
    content: maty tanora izy;
  - type: text
    content: eny, afaka aina eo amin’ny mpijangajanga.
  '15':
  - type: text
    content: Fa ny fahorian’ny ory kosa no entin’Andriamanitra mamonjy azy
  - type: text
    content: ary ny manjo azy no entiny manokatra ny sofiny.
  '16':
  - type: text
    content: Ary ianao koa aza dia sarihiny hiala tao amin’ny fahaterena
  - type: text
    content: ho amin’ny malalaka tsy misy manembantsembana
  - type: text
    content: ary ny matavy indrindra no aroso
  - type: text
    content: ho eo ambonin’ny latabatrao.
  '17':
  - type: text
    content: Raha mitsara ny adin’ny ratsy fanahy ianao
  - type: text
    content: dia aoka hazonina ny rariny sy ny hitsiny;
  '18':
  - type: text
    content: aoka tsy hampirisika anao hiteny ratsy ny fahatezerana
  - type: text
    content: ary aoka tsy hampivily saina anao ny haben’ny kolikoly!
  '19':
  - type: text
    content: Moa hahafaka anao amin’ny fahoriana va ny fitarainanao,
  - type: text
    content: na izay rehetra tratry ny hery sy tanjakao?
  '2':
  - type: text
    content: Mahareta kely amiko dia hambarako aminao,
  - type: text
    content: fa mbola misy teny holazaina hanamarina an’Andriamanitra.
  '20':
  - type: text
    content: Aza irinao ny hiavian’ny alina
  - type: text
    content: izay ampialana ny olona amin’ny fitoerany.
  '21':
  - type: text
    content: Tandremo, aza mivily ho amin’ny ratsy,
  - type: text
    content: fa saingy ozoim-pahoriana ianao dia mifidy izany.
  - type: heading
    content: Ny fahefan’Andriamanitra Tsitoha
  '22':
  - type: text
    content: Indro Andriamanitra dia misandratra amin’ny heriny;
  - type: text
    content: iza no mba mpampianatra tahaka Azy?
  '23':
  - type: text
    content: Iza no nandidy Azy tamin’izay lalan-kalehany?
  - type: text
    content: 'Ary iza no afaka hilaza Aminy hoe: Nanao ratsy Ianao?'
  '24':
  - type: text
    content: Tsarovy ny hankalaza ny asany
  - type: text
    content: izay efa nataon’ny olona an-kira.
  '25':
  - type: text
    content: Mandinika izany ny olona rehetra
  - type: text
    content: ary mijery izany eny lavitra eny ny zanak’olombelona.
  '26':
  - type: text
    content: Indro, lehibe Andriamanitra ka tsy takatry ny saintsika Izy;
  - type: text
    content: tsy hita isa ny taonany.
  '27':
  - type: text
    content: Fa manintona ny rano Izy
  - type: text
    content: dia milatsaka ho ranonorana aman-javona izany
  '28':
  - type: text
    content: ary aidin’ny rahona izany
  - type: text
    content: ka alatsany amin’ny olona maro be.
  '29':
  - type: text
    content: Ary koa, iza moa no mahalala ny amin’ny fivelatry ny rahona
  - type: text
    content: sy ny fikotrokotroka ao an-dainy?
  '3':
  - type: text
    content: Halaiko avy lavitra ny fahalalako
  - type: text
    content: ka hanamarina ny Mpanao ahy aho.
  '30':
  - type: text
    content: Indro, mamelatra ny fahazavany eo amboniny Izy
  - type: text
    content: ary manao ny fanambanin’ny ranomasina ho firakofany.
  '31':
  - type: text
    content: Fa ireny zavatra ireny no itsarany ny firenena
  - type: text
    content: sady anomezany hanina betsaka.
  '32':
  - type: text
    content: Mifono fahazavana ny tanany
  - type: text
    content: ary baikoiny iny mba hahavoa ny fahavalony.
  '33':
  - type: text
    content: Ny fikotrokotrony dia manambara Azy
  - type: text
    content: ary ny omby aman’ondry koa aza dia milaza ny hiaviany.
  '4':
  - type: text
    content: Fa tsy lainga tsy akory ny teniko;
  - type: text
    content: lehilahy tanteraka amin’ny fahalalana no eto aminao!
  '5':
  - type: text
    content: Indro, lehibe Andriamanitra, kanefa tsy mba mamingavinga;
  - type: text
    content: lehibe amin’ny herin’ny fahalalana Izy.
  '6':
  - type: text
    content: Tsy mitsimbina ny ain’ny ratsy fanahy Izy
  - type: text
    content: fa manome rariny ho an’ny ory.
  '7':
  - type: text
    content: Tsy mampiala ny masony amin’ny marina Izy.
  - type: text
    content: Ny amin’ny mpanjaka dia ambonin’ny sezafiandrianany
  - type: text
    content: no ampitoerany azy ho mandrakizay ka tafasandratra izy.
  '8':
  - type: text
    content: Ary raha voafatotra amin’ny gadra izy ireny
  - type: text
    content: sy voafehy amin’ny tadin’ny fahoriana
  '9':
  - type: text
    content: dia ambarany azy ny asany sy ny fahotany
  - type: text
    content: raha manandra-tena izy.
