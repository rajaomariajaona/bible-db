document_id: ISA.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay zanak’Isaia izay manana anarana mifono hevi-dalina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy NY TOMPO tamiko: Makà fafana lehibe ka soraty eo araka ny fanoratry ny olona hoe: Mahera-Salala-Hasy-Baza, izany hoe: Avy haingana ny famaboana, mihazakazaka ny fandrobana! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary haka vavolombelona mahatoky Aho, dia i Oria mpisorona sy i Zakaria, zanakalahin’i Jeberekia. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanakaiky ny mpaminanivavy aho; dia nanana anaka izy ka niteraka zazalahy. Ary hoy NY TOMPO tamiko: Aoka ny anarany hataonao hoe Mahera-Salala-Hasy-Baza'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mahera-Salala-Hasy-Baza: Avy haingana ny famaboana, mihazakazaka ny fandrobana.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Satria raha tsy mbola mahatonona hoe: Dada! Neny! Io zazalahy io dia hoentina eo anatrehan’ny mpanjakan’i Asiria ny harenan’i Damaskosy sy ny fananan’i Samaria.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanafihan’ny Asiriana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mbola niteny tamiko indray NY TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Satria mandà ny rano Siloa
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay misononoka ity firenena ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mifaly amin’i Rezina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny zanak’i Remalia
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia indro, hampiakarin’ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanafotra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ranobe manonja amin’ny ony Eofrata,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny mpanjakan’i Asiria sy ny voninahiny rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tondraka ny renirano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihoarany ny morony rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia hiriotra mafy izy ka hipaoka ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanafotra sady mbola hisondrotra ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pahatongany havozona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fivelatry ny elany dia hanenika ny taninao, ry Imanoela ô
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.14.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amintsika Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mangovita ianareo, ry firenena ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mbola ho ringana ianareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihainoa tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry tany lavitra rehetra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misikìna ianareo hiady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ho ringana ihany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, misikìna ianareo hiady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ho ringana tanteraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Makà saina ianareo hanaovana vinavinan’asa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa hofoanana izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Milazà teny iray;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy ho tanteraka tsy akory izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aminay Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO no tokony hatahoranareo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izao no nolazain’NY TOMPO tamiko raha nihazona ahy mafy ny tanany ka nanariny tsy handeha amin’ny falehan’ity firenena ity aho:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aza mba lazainareo ho tetika fikomiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay lazain’ity firenena ity ho tetika fikomiana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza matahotra izay atahorany ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mangorohoro noho ny aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hamasino;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy ihany no tokony hatahoranareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izy ihany no tokony hampangovitra anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia ho fitoerana masina ho anareo Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho vato mahatafintohina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy vatolampy mahasolafaka kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny firenena roa amin’ny Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ho fandrika sy tonta
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny mponin’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Maro no ho tafintohina Aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ho lavo sy ho torotoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho voafandrika sy ho voasambotra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiandrasana sy ny fanantenan’ny mpaminany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tehirizo ny teny vavolombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary asio tombo-kase ny lalàna eo amin’ny mpianatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hiandry NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manafina ny tavany amin’ny taranak’i Jakoba aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanantena Azy ihany aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indreto izaho sy ireo zaza nomen’NY TOMPO ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fambara sy fahagagana ao amin’ny Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay monina ao amin’ny tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha misy milaza aminareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Makà saina amin’ny olona izay mpiantso ny fanahin’ny maty sy ny mpanandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mingonongonona sy miboredidredika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy Andriamaniny va no tokony hilan’ny olona saina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa hila saina amin’ny maty ho an’ny velona va izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ho amin’ny lalàna sy ny teny vavolombelona ihany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy miteny araka izany teny izany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho olona izay tsy hiposahan’ny fahazavan’ny maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hivezivezy amin’ny tany amin’ny fahantrana sy ny mosary ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rehefa mosarena izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho sosotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanozona ny Mpanjakany sy Andriamaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiandrandra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hijery ny tany izy avy eo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka indro, fahoriana sy fahamaizinana ary tebiteby mampanjombona no eo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary horoahina ho any amin’ny haizim-pito izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay Andrianan’ny fiadanana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy hanjombona mandrakariva anefa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay efa niharam-pahoriana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Taloha dia natao tsinontsinona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tany Zebolona sy ny tany Naftaly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa amin’ny ho avy kosa dia homeny voninahitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lalana amoron-dranomasina, any andafin’i Jordana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia any Galilia, tanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: .
