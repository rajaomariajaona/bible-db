document_id: ISA.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay zanak’Isaia izay manana anarana mifono hevi-dalina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamiko: Makà fafana lehibe ka soraty eo araka ny fanoratry ny olona hoe: Mahera-Salala-Hasy-Baza, izany hoe: Avy haingana ny famaboana, mihazakazaka ny fandrobana! '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Makà saina ianareo hanaovana vinavinan’asa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa hofoanana izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Milazà teny iray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ho tanteraka tsy akory izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aminay Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: NY TOMPO no tokony hatahoranareo
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no nolazain’NY TOMPO tamiko raha nihazona ahy mafy ny tanany ka nanariny tsy handeha amin’ny falehan’ity firenena ity aho:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mba lazainareo ho tetika fikomiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay lazain’ity firenena ity ho tetika fikomiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza matahotra izay atahorany ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mangorohoro noho ny aminy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hamasino;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy ihany no tokony hatahoranareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izy ihany no tokony hampangovitra anareo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho fitoerana masina ho anareo Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho vato mahatafintohina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy vatolampy mahasolafaka kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny firenena roa amin’ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho fandrika sy tonta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny mponin’i Jerosalema.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maro no ho tafintohina Aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho lavo sy ho torotoro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho voafandrika sy ho voasambotra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiandrasana sy ny fanantenan’ny mpaminany
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tehirizo ny teny vavolombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary asio tombo-kase ny lalàna eo amin’ny mpianatro.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiandry NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manafina ny tavany amin’ny taranak’i Jakoba aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanantena Azy ihany aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreto izaho sy ireo zaza nomen’NY TOMPO ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fambara sy fahagagana ao amin’ny Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’Andriamanitra, Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay monina ao amin’ny tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha misy milaza aminareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Makà saina amin’ny olona izay mpiantso ny fanahin’ny maty sy ny mpanandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mingonongonona sy miboredidredika!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy Andriamaniny va no tokony hilan’ny olona saina?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa hila saina amin’ny maty ho an’ny velona va izy?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary haka vavolombelona mahatoky Aho, dia i Oria mpisorona sy i Zakaria, zanakalahin’i Jeberekia. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho amin’ny lalàna sy ny teny vavolombelona ihany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy miteny araka izany teny izany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho olona izay tsy hiposahan’ny fahazavan’ny maraina.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hivezivezy amin’ny tany amin’ny fahantrana sy ny mosary ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa mosarena izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho sosotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanozona ny Mpanjakany sy Andriamaniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiandrandra izy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hijery ny tany izy avy eo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka indro, fahoriana sy fahamaizinana ary tebiteby mampanjombona no eo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary horoahina ho any amin’ny haizim-pito izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay Andrianan’ny fiadanana
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hanjombona mandrakariva anefa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay efa niharam-pahoriana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taloha dia natao tsinontsinona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tany Zebolona sy ny tany Naftaly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa amin’ny ho avy kosa dia homeny voninahitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lalana amoron-dranomasina, any andafin’i Jordana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia any Galilia, tanin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanakaiky ny mpaminanivavy aho; dia nanana anaka izy ka niteraka zazalahy. Ary hoy NY TOMPO tamiko: Aoka ny anarany hataonao hoe Mahera-Salala-Hasy-Baza'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
