      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria raha tsy mbola mahatonona hoe: Dada! Neny! Io zazalahy io dia hoentina eo anatrehan’ny mpanjakan’i Asiria ny harenan’i Damaskosy sy ny fananan’i Samaria.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanafihan’ny Asiriana
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola niteny tamiko indray NY TOMPO hoe:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria mandà ny rano Siloa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay misononoka ity firenena ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mifaly amin’i Rezina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zanak’i Remalia
  '7':
