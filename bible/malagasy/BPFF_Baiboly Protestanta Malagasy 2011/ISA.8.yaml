document_id: ISA.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay zanak’Isaia izay manana anarana mifono hevi-dalina
  - type: text
    content: 'Hoy NY TOMPO tamiko: Makà fafana lehibe ka soraty eo araka ny fanoratry ny olona hoe: Mahera-Salala-Hasy-Baza, izany hoe: Avy haingana ny famaboana, mihazakazaka ny fandrobana! '
  '10':
  - type: text
    content: Makà saina ianareo hanaovana vinavinan’asa,
  - type: text
    content: nefa hofoanana izany!
  - type: text
    content: Milazà teny iray;
  - type: text
    content: fa tsy ho tanteraka tsy akory izany!
  - type: text
    content: Fa aminay Andriamanitra.
  - type: heading
    content: NY TOMPO no tokony hatahoranareo
  '11':
  - type: text
    content: 'Fa izao no nolazain’NY TOMPO tamiko raha nihazona ahy mafy ny tanany ka nanariny tsy handeha amin’ny falehan’ity firenena ity aho:'
  '12':
  - type: text
    content: Aza mba lazainareo ho tetika fikomiana
  - type: text
    content: izay lazain’ity firenena ity ho tetika fikomiana;
  - type: text
    content: aza matahotra izay atahorany ianareo
  - type: text
    content: na mangorohoro noho ny aminy.
  '13':
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: no hamasino;
  - type: text
    content: Izy ihany no tokony hatahoranareo,
  - type: text
    content: ary Izy ihany no tokony hampangovitra anareo.
  '14':
  - type: text
    content: Dia ho fitoerana masina ho anareo Izy,
  - type: text
    content: fa ho vato mahatafintohina
  - type: text
    content: sy vatolampy mahasolafaka kosa
  - type: text
    content: ho an’ny firenena roa amin’ny Israely,
  - type: text
    content: sady ho fandrika sy tonta
  - type: text
    content: ho an’ny mponin’i Jerosalema.
  '15':
  - type: text
    content: Maro no ho tafintohina Aminy
  - type: text
    content: sady ho lavo sy ho torotoro
  - type: text
    content: ary ho voafandrika sy ho voasambotra.
  - type: heading
    content: Ny fiandrasana sy ny fanantenan’ny mpaminany
  '16':
  - type: text
    content: Tehirizo ny teny vavolombelona,
  - type: text
    content: ary asio tombo-kase ny lalàna eo amin’ny mpianatro.
  '17':
  - type: text
    content: Hiandry NY TOMPO
  - type: text
    content: izay manafina ny tavany amin’ny taranak’i Jakoba aho;
  - type: text
    content: hanantena Azy ihany aho.
  '18':
  - type: text
    content: Indreto izaho sy ireo zaza nomen’NY TOMPO ahy,
  - type: text
    content: fambara sy fahagagana ao amin’ny Israely
  - type: text
    content: avy amin’Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: 'izay monina ao amin’ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: .
  '19':
  - type: text
    content: 'Raha misy milaza aminareo hoe:'
  - type: text
    content: Makà saina amin’ny olona izay mpiantso ny fanahin’ny maty sy ny mpanandro,
  - type: text
    content: izay mingonongonona sy miboredidredika!
  - type: text
    content: Moa tsy Andriamaniny va no tokony hilan’ny olona saina?
  - type: text
    content: Moa hila saina amin’ny maty ho an’ny velona va izy?
  '2':
  - type: text
    content: 'Ary haka vavolombelona mahatoky Aho, dia i Oria mpisorona sy i Zakaria, zanakalahin’i Jeberekia. '
  '20':
  - type: text
    content: Ho amin’ny lalàna sy ny teny vavolombelona ihany!
  - type: text
    content: Raha tsy miteny araka izany teny izany izy
  - type: text
    content: dia ho olona izay tsy hiposahan’ny fahazavan’ny maraina.
  '21':
  - type: text
    content: Hivezivezy amin’ny tany amin’ny fahantrana sy ny mosary ny olona;
  - type: text
    content: ary rehefa mosarena izy
  - type: text
    content: dia ho sosotra
  - type: text
    content: ka hanozona ny Mpanjakany sy Andriamaniny
  - type: text
    content: ary hiandrandra izy.
  '22':
  - type: text
    content: Hijery ny tany izy avy eo
  - type: text
    content: ka indro, fahoriana sy fahamaizinana ary tebiteby mampanjombona no eo;
  - type: text
    content: ary horoahina ho any amin’ny haizim-pito izy.
  - type: heading
    content: Ilay Andrianan’ny fiadanana
  '23':
  - type: text
    content: Tsy hanjombona mandrakariva anefa
  - type: text
    content: ilay efa niharam-pahoriana.
  - type: text
    content: Taloha dia natao tsinontsinona
  - type: text
    content: ny tany Zebolona sy ny tany Naftaly;
  - type: text
    content: fa amin’ny ho avy kosa dia homeny voninahitra
  - type: text
    content: ny lalana amoron-dranomasina, any andafin’i Jordana,
  - type: text
    content: 'dia any Galilia, tanin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: .
  '3':
  - type: text
    content: 'Nanakaiky ny mpaminanivavy aho; dia nanana anaka izy ka niteraka zazalahy. Ary hoy NY TOMPO tamiko: Aoka ny anarany hataonao hoe Mahera-Salala-Hasy-Baza'
  - type: note
    content: 'Mahera-Salala-Hasy-Baza: Avy haingana ny famaboana, mihazakazaka ny fandrobana.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Satria raha tsy mbola mahatonona hoe: Dada! Neny! Io zazalahy io dia hoentina eo anatrehan’ny mpanjakan’i Asiria ny harenan’i Damaskosy sy ny fananan’i Samaria.'
  - type: heading
    content: Ny fanafihan’ny Asiriana
  '5':
  - type: text
    content: 'Mbola niteny tamiko indray NY TOMPO hoe:'
  '6':
  - type: text
    content: Satria mandà ny rano Siloa
  - type: text
    content: izay misononoka ity firenena ity
  - type: text
    content: ary mifaly amin’i Rezina
  - type: text
    content: sy ny zanak’i Remalia
  '7':
  - type: text
    content: dia indro, hampiakarin’ny Tompo
  - type: text
    content: hanafotra azy
  - type: text
    content: ny ranobe manonja amin’ny ony Eofrata,
  - type: text
    content: dia ny mpanjakan’i Asiria sy ny voninahiny rehetra.
  - type: text
    content: Ho tondraka ny renirano
  - type: text
    content: ary hihoarany ny morony rehetra;
  '8':
  - type: text
    content: dia hiriotra mafy izy ka hipaoka ny Joda
  - type: text
    content: ary hanafotra sady mbola hisondrotra ihany
  - type: text
    content: mandra-pahatongany havozona.
  - type: text
    content: Ary ny fivelatry ny elany dia hanenika ny taninao, ry Imanoela ô
  - type: note
    content: Zahao 7.14.
  - type: text
    content: '!'
  - type: heading
    content: Amintsika Andriamanitra
  '9':
  - type: text
    content: Mangovita ianareo, ry firenena ô,
  - type: text
    content: fa mbola ho ringana ianareo!
  - type: text
    content: Mihainoa tsara,
  - type: text
    content: ry tany lavitra rehetra!
  - type: text
    content: Misikìna ianareo hiady,
  - type: text
    content: nefa ho ringana ihany!
  - type: text
    content: Eny, misikìna ianareo hiady,
  - type: text
    content: nefa ho ringana tanteraka.
