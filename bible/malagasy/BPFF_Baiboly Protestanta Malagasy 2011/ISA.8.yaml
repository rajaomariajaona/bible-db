      text: dia ny mpanjakan’i Asiria sy ny voninahiny rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tondraka ny renirano
  - type: usfm
    marker: q1
    children:
    - type: text
