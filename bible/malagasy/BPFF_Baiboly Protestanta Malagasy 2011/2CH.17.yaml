document_id: 2CH.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Josafata; ny fahatokiany an’Andriamanitra
  - type: text
    content: 'I Josafata, zanak’i Asa, no nanjaka nandimby azy, ary nitombo hery hifanandrina tamin’ny Israely izy. '
  '10':
  - type: text
    content: 'Ary nahazo ny fanjakana rehetra tamin’ny tany manodidina an’i Joda ny tahotra NY TOMPO ka tsy nisy niady tamin’i Josafata ireo. '
  '11':
  - type: text
    content: Ary ny Filistina sasany dia nitondra fanomezana sy vola hetra ho an’i Josafata; ny Arabo koa dia nitondra ondry aman’osy, dia ondrilahy fitonjato sy fito arivo sy osilahy fitonjato sy fito arivo.
  - type: heading
    content: Ny herin’ny miaramilan’i Josafata
  '12':
  - type: text
    content: 'Ary nihanahery indrindra i Josafata ka nanao trano fiarovana sy tanàna fitahirizana tany Joda. '
  '13':
  - type: text
    content: 'Nanana fananana betsaka tao amin’ny tanànan’i Joda izy ary koa miaramila sy lehilahy mahery tany Jerosalema. '
  '14':
  - type: text
    content: 'Toy izao no nandaminana azy araka ny fianakaviany avy:'
  - type: text
    content: Ny mpifehy arivo tamin’ny Joda dia i Adna mpitarika ary lehilahy mahery telo hetsy no niaraka taminy;
  '15':
  - type: text
    content: teo anilany i Johanana mpitarika ary valo alina sy roa hetsy no niaraka taminy;
  '16':
  - type: text
    content: teo anilany indray dia i Amasia, zanak’i Zikry, ilay nanolo-tena ho an’NY TOMPO ary lehilahy mahery roa hetsy no niaraka taminy.
  '17':
  - type: text
    content: Tamin’ny Benjamina dia i Eliada, lehilahy mahery, ary lehilahy roa hetsy mitondra tsipìka sy ampinga no niaraka taminy;
  '18':
  - type: text
    content: teo anilany dia i Jozabada ary valo alina sy iray hetsy efa voaomana hiady no niaraka taminy.
  '19':
  - type: text
    content: Ireo no nanompo teo amin’ny mpanjaka, afa-tsy izay nampitoerin’ny mpanjaka tany amin’ny tanàna mimanda manerana ny tanin’i Joda rehetra.
  '2':
  - type: text
    content: 'Namponina miaramila tamin’ny tanàna mimanda rehetra manerana ny tanin’i Joda izy sady nametraka miaramila tany amin’ny tanin’i Joda sy tany amin’izay tanànan’i Efraima efa azon’i Asa rainy. '
  '3':
  - type: text
    content: 'Ary NY TOMPO nomba an’i Josafata satria nandeha tamin’ny lalan’i Davida rainy tamin’ny voalohany izy fa tsy mba nitady ireo '
  - type: text
    content: Baala
  - type: text
    content: '; '
  '4':
  - type: text
    content: 'fa NY TOMPO, Andriamanitry ny rainy, kosa no notadiaviny, ary araka ny didiny no nandehanany, fa tsy mba araka ny fanaon’ny Israely. '
  '5':
  - type: text
    content: 'Koa nampitoerin’NY TOMPO teo an-tanany ny fanjakana; ary nitondra fanomezana ho an’i Josafata ny Joda rehetra ka nanana harena sy voninahitra be izy. '
  '6':
  - type: text
    content: 'Ary nihanatoky tamin’ny lalan’NY TOMPO ny fony dia noravany tsy ho eo amin’ny Joda ny toerana fanaovana sorona sy ny tsangakazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: .
  '7':
  - type: text
    content: 'Ary tamin’ny taona fahatelo nanjakany dia naniraka ny mpanapaka teo aminy izy, dia i Benaila, i Obadia, i Zakaria, i Netanela ary i Mikaia, hampianatra any amin’ny tanànan’i Joda. '
  '8':
  - type: text
    content: 'Ary nisy '
  - type: text
    content: levita
  - type: text
    content: ' koa niaraka tamin’ireo, dia i Semaia, i Netania, i Zebadia, i Asahela, i Semiramota, i Jonatana, i Adonia, i Tobia ary i Toba-Adonia, mbamin’i Elisama sy i Jorama, mpisorona. '
  '9':
  - type: text
    content: Ary nampianatra tany Joda izy ireo ka noentiny ny bokin’ny lalànan’NY TOMPO, dia nitety ny tanànan’ny Joda rehetra izy ka nampianatra teny amin’ny olona.
