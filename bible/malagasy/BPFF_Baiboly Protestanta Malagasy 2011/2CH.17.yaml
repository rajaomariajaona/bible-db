document_id: 2CH.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan’i Josafata; ny fahatokiany an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Josafata, zanak’i Asa, no nanjaka nandimby azy, ary nitombo hery hifanandrina tamin’ny Israely izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Namponina miaramila tamin’ny tanàna mimanda rehetra manerana ny tanin’i Joda izy sady nametraka miaramila tany amin’ny tanin’i Joda sy tany amin’izay tanànan’i Efraima efa azon’i Asa rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary NY TOMPO nomba an’i Josafata satria nandeha tamin’ny lalan’i Davida rainy tamin’ny voalohany izy fa tsy mba nitady ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa NY TOMPO, Andriamanitry ny rainy, kosa no notadiaviny, ary araka ny didiny no nandehanany, fa tsy mba araka ny fanaon’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa nampitoerin’NY TOMPO teo an-tanany ny fanjakana; ary nitondra fanomezana ho an’i Josafata ny Joda rehetra ka nanana harena sy voninahitra be izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nihanatoky tamin’ny lalan’NY TOMPO ny fony dia noravany tsy ho eo amin’ny Joda ny toerana fanaovana sorona sy ny tsangakazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tamin’ny taona fahatelo nanjakany dia naniraka ny mpanapaka teo aminy izy, dia i Benaila, i Obadia, i Zakaria, i Netanela ary i Mikaia, hampianatra any amin’ny tanànan’i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' koa niaraka tamin’ireo, dia i Semaia, i Netania, i Zebadia, i Asahela, i Semiramota, i Jonatana, i Adonia, i Tobia ary i Toba-Adonia, mbamin’i Elisama sy i Jorama, mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nampianatra tany Joda izy ireo ka noentiny ny bokin’ny lalànan’NY TOMPO, dia nitety ny tanànan’ny Joda rehetra izy ka nampianatra teny amin’ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nahazo ny fanjakana rehetra tamin’ny tany manodidina an’i Joda ny tahotra NY TOMPO ka tsy nisy niady tamin’i Josafata ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny Filistina sasany dia nitondra fanomezana sy vola hetra ho an’i Josafata; ny Arabo koa dia nitondra ondry aman’osy, dia ondrilahy fitonjato sy fito arivo sy osilahy fitonjato sy fito arivo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny herin’ny miaramilan’i Josafata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nihanahery indrindra i Josafata ka nanao trano fiarovana sy tanàna fitahirizana tany Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nanana fananana betsaka tao amin’ny tanànan’i Joda izy ary koa miaramila sy lehilahy mahery tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Toy izao no nandaminana azy araka ny fianakaviany avy:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ny mpifehy arivo tamin’ny Joda dia i Adna mpitarika ary lehilahy mahery telo hetsy no niaraka taminy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: teo anilany i Johanana mpitarika ary valo alina sy roa hetsy no niaraka taminy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: teo anilany indray dia i Amasia, zanak’i Zikry, ilay nanolo-tena ho an’NY TOMPO ary lehilahy mahery roa hetsy no niaraka taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tamin’ny Benjamina dia i Eliada, lehilahy mahery, ary lehilahy roa hetsy mitondra tsipìka sy ampinga no niaraka taminy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: teo anilany dia i Jozabada ary valo alina sy iray hetsy efa voaomana hiady no niaraka taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ireo no nanompo teo amin’ny mpanjaka, afa-tsy izay nampitoerin’ny mpanjaka tany amin’ny tanàna mimanda manerana ny tanin’i Joda rehetra.
