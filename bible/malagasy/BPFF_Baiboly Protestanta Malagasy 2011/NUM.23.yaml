document_id: NUM.23,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Balama tamin’i Balaka: Manorena alitara fito eto ho ahy ka manomàna vantotra ombilahy fito sy ondrilahy fito eto. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no mahaisa ny vovok’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny isan’ny ampahefatry ny Israely akory?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho tahaka ny fahafatesan’ny olo-marina ny fahafatesako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny hiafarako ho tahaka ny azy!
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia hoy i Balaka tamin’i Balama: Inona izao nataonao tamiko izao? Hanozona ny fahavaloko no nakako anao, kanjo ny nanome azy tsodrano feno indray no nataonao! '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia namaly izy hoe: Tsy izay napetraky NY TOMPO tao am-bavako va no hotandremako ka tsy maintsy holazaiko?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitahiana faharoa notononin’i Balama
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Balaka taminy: Andeha mba hiaraka amiko ho any amin’ny toerana hafa izay hahatazananao azy; kanefa ny tapany ihany no ho hitanao eo fa tsy ho hitanao avokoa izy rehetra, koa ozòny avy eo izy!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitondra azy tao an-tsaha Zofima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Zofima: Mpitily.'
      marker-yv: yv-n
    - type: text
      text: ', tao an-tampon’i Pisga izy; ary nanorina alitara fito izy ka nanatitra vantotra ombilahy iray sy ondrilahy iray teo ambonin’ny alitara tsirairay. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Balama tamin’i Balaka: Mijoroa eto anilan’ny fanatitra dorana manontolo atolotrao, fa izaho dia hankerỳ hihaona amin’NY TOMPO. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO nitsena an’i Balama dia nanisy teny teo am-bavany hoe: Miverena mankeo amin’i Balaka ary izany no holazainao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga tany aminy izy dia indreo, teo anilan’ny fanatitra dorana manontolo izay nateriny izy sy ireo andriandahin’i Moaba izay teo aminy. Dia hoy i Balaka taminy: Ahoana no nolazain’NY TOMPO? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nilaza ny oha-teniny i Balama hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, ry Balaka, ka mandrenesa!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano amiko ny sofinao, ry zanak’i Zipora!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra tsy mba olona ka handainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na zanak’olombelona ka hanenina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa efa nilaza va Izy nefa tsy nanatanteraka?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na efa niteny va Izy ka tsy notoviny?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia narahin’i Balaka izay efa nolazain’i Balama; ary nanolotra vantotra ombilahy iray sy ondrilahy iray teo ambonin’ny alitara tsirairay i Balaka sy i Balama ho fanatitra dorana manontolo. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny hitahy no nomena hataoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa nitahy Izy ka tsy mahaova izany aho.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahita faharatsiana eo amin’i Jakoba Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahatsikaritra fahoriana eo amin’Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO Andriamaniny no momba azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoby fanao amin’andriana no re eo aminy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noentin’Andriamanitra nivoaka avy tany Ejipta izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manan-kery toy ny ombimanga.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy fisikidiana eo amin’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy fanandroana eo amin’Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’ny fotoanany no hilazana amin’i Jakoba sy Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny asa izay ataon’NY TOMPO.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, firenena mitsangana toy ny liom-bavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy miarina toy ny liona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy handry izy mandra-pihinany haza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mandra-pisotrony ny ran’ny voavono.
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia hoy i Balaka tamin’i Balama: Rehefa tsy hanozona azy ihany ianao dia aza mitsodrano azy! '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa namaly an’i Balaka kosa i Balama hoe: Tsy efa nilaza taminao va aho hoe: Izay rehetra holazain’NY TOMPO ihany no hataoko?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitahiana fahatelo notononin’i Balama
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Balaka tamin’i Balama: Andeha hoentiko amin’ny toerana hafa indray ianao; angamba ho sitrak’Andriamanitra ny hanozonanao azy avy any! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noentin’i Balaka ho ao an-tampon’i Peora, izay manatrika ny tany efitra, i Balama. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Balama tamin’i Balaka: Manorena alitara fito eto ho ahy ka manamboara vantotra ombilahy fito sy ondrilahy fito. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Balama tamin’i Balaka: Mijoroa eo anilan’ny fanatitra doranao, fa izaho kosa dia handeha; angamba ho avy hitsena ahy NY TOMPO; ary izay hasehony amiko dia hambarako aminao. Dia lasa nankany amin’ny tendrombohitra iray mangadihady izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanatanteraka izay efa nolazain’i Balama i Balaka ka nanatitra vantotra ombilahy iray sy ondrilahy iray teo ambonin’ny alitara tsirairay.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Andriamanitra nitsena an’i Balama; dia hoy i Balama Taminy: Efa namboariko ny alitara fito ary efa nanolotra vantotra ombilahy iray sy ondrilahy iray teo ambonin’ny alitara tsirairay aho.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitsodrano ny Zanak’Israely i Balama
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO nanisy teny teo am-bavan’i Balama ka niteny hoe: Miverena any amin’i Balaka ka toy izany no holazainao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niverina tany amin’i Balaka izy ary indro, nijoro teo anilan’ny fanatitra dorany izy, dia izy sy ireo andriandahin’i Moaba rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nilaza ny oha-teniny i Balama ka niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Balaka dia nampaka ahy avy tany Arama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny mpanjakan’i Moaba dia nampaka ahy avy tany amin’ny tendrombohitra atsinanana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avia ka ozòny i Jakoba!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankanesa atỳ ka anamparo ny fahatezeranao Israely!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko ahoana no ho fanozona izay tsy nozonin’Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataoko ahoana no ho tezitra amin’izay tsy nitezeran’NY TOMPO?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa avy eto an-tampon’ny vatolampy no ahitako azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy eto amin’ny havoana no itazanako azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, firenena mitoka-monina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary tsy hatao ho isan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: .
