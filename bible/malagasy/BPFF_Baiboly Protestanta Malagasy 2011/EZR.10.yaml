document_id: EZR.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nisaraka tamin’ireo vehivavy hafa firenena ireo Jiosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha mbola nivavaka sy nifona i Ezra sady nitomany sy niankohoka teo anoloan’ny tranon’Andriamanitra dia nivory teo aminy ny olona marobe avy tamin’ny Israely, na lehilahy na vehivavy mbamin’ny ankizy madinika; fa nitomany mafy dia mafy koa ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy i Sekania, zanak’i Jehiela, isan’ny taranak’i Elama, tamin’i Ezra hoe: Efa nanao izay mahadiso teo anatrehan’Andriamanitsika izahay satria naka vehivavy hafa firenena avy tamin’ny tompon-tany ho vadinay; nefa mbola misy fanantenana ihany ho an’ny Israely ny amin’izany zavatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa aoka izahay hanao fanekena amin’Andriamanitsika ka hisaotra ny vady rehetra sy hanary izay naterany araka ny anatra nataonao, tompokolahy, sy araka ny anatra nataon’ireo izay mangovitra noho ny didin’Andriamanitsika; ary aoka hatao araka ny lalàna izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mitsangàna fa adidinao izany; ary indreto koa izahay eto aminao; dia matokia tsara ka ataovy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nitsangana i Ezra ka nampianiana ny lehiben’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' ary ny Israely rehetra fa hanatanteraka izany teny izany; dia nianiana ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nitsangana niala teo anoloan’ny tranon’Andriamanitra i Ezra ka nankany amin’ny efitrano nitoeran’i Johanana, zanak’i Eliasiba; nony tafiditra tao izy dia tsy mba nihinan-kanina na nisotro rano, fa nalahelo izy noho ny fahadisoan’ny olona izay efa niverina avy tamin’ny fahababoana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nandefa teny manerana an’i Joda sy Jerosalema ireo ho any amin’ny olona rehetra izay efa niverina avy tamin’ny fahababoana mba hivory any Jerosalema; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary na iza na iza no tsy tonga ao anatin’ny hateloana araka ny tenin’ny mpanapaka sy ny loholona dia hatao ho zavatra voaozona ny fananany rehetra ary hesorina amin’ny fiangonan’ny olona izay efa niverina avy tamin’ny fahababoana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony tamin’ny andro fahatelo dia vory tany Jerosalema ny lehilahy rehetra tamin’ny Joda sy ny Benjamina, dia tamin’ny andro faharoapolo tamin’ny volana fahasivy; nipetraka teo amin’ny toerana malalaka akaikin’ny tranon’Andriamanitra ny olona rehetra ka nangovitra noho izany zavatra izany sy noho ny ranonorana be. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nitsangana i Ezra mpisorona ka niteny taminy hoe: Ianareo dia efa nanao izay mahadiso satria naka vehivavy hafa firenena ho vadinareo ka nampitombo ny fahadisoan’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa mitsora amin’NY TOMPO Andriamanitry ny razanareo ka ataovy ny sitrapony; ary misaraha amin’ny olona tompon-tany sy ny vehivavy hafa firenena. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia namaly ny fiangonana manontolo ka niredona mafy hoe: Izay lazainao dia tsy maintsy hataonay. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nefa maro ny olona, ary fahavaratra ny andro, ka tsy mahatoetra etỳ alatrano izahay, sady raharaha tsy vita indray andro na indroa andro aza izao, fa maro izahay no efa nanota tamin’izany zavatra izany; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'koa aoka ny mpanapaka anay no hitoetra eto ho solon’ny fiangonana rehetra ary ny olona rehetra any amin’ny tanànantsika avy izay naka vehivavy hafa firenena ho vadiny no aoka hankaty amin’izay fotoanandro hatao, ary hiaraka aminy koa ny loholony isan-tanàna sy ny mpitsara ao, mandra-pahavitan’izany raharaha izany sy ny hialan’ny firehetan’ny fahatezeran’Andriamanitsika amintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I Jonatana zanak’i Asahela sy i Jahaza, zanak’i Tikva ihany no nanohitra izany; niandany taminy koa i Mesolama sy i Sabetahy levita. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa ny olona izay niverina avy tamin’ny fahababoana kosa dia nanaraka izany; ary natokana i Ezra mpisorona sy ny sasany amin’ny lohan’ny fianakaviana, araka ny fianakaviany avy, sady samy efa notononina anarana; dia nipetraka handinika izany raharaha izany izy ireo tamin’ny andro voalohany tamin’ny volana fahafolo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nony tonga ny andro voalohany tamin’ny volana voalohany dia vitany ny raharaha ny amin’ny lehilahy rehetra izay efa naka vehivavy hafa firenena ho vadiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anaran’ireo Jiosy nahavita hadisoana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny hita teo amin’ny taranaky ny mpisorona fa naka vehivavy hafa firenena ho vadiny dia ireto: Ny teo amin’ny taranak’i Josoa, zanak’i Jozadaka, sy ny rahalahiny dia i Mahaseia, i Eliezera, i Jariba ary i Gedalia; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: dia nanolo-tanana nanaiky hisaotra ny vadiny izy ireo sady handoa ondrilahy iray avy ho fanati-panonerany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny avy tamin’ny taranak’Imera dia i Hanany sy i Zebedia;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ny avy tamin’ny taranak’i Harima dia i Mahaseia, i Elia, i Semaia, i Jehiela ary i Ozia;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ny avy tamin’ny taranak’i Pasora dia i Elioenay, i Mahaseia, Ismaela, i Netanela, i Jozabada ary i Elasa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny avy tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' dia i Jozabada, i Simey, i Kelaia na i Kelita izany mbamin’i Petahia sy i Joda ary i Eliezera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny avy tamin’ny mpihira dia i Eliasiba; ary ny avy tamin’ny mpiandry varavarana dia i Saloma sy i Talema ary i Ory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny avy tamin’ny Israely kosa dia ireto avy: Ny avy tamin’ny taranak’i Parosy dia i Ramia, i Jizia, i Malkia, i Miamina, i Eleazara, i Malkia ary i Benaia;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ary ny avy tamin’ny taranak’i Elema dia i Matania, i Zakaria, i Jehiela, i Abdia, i Jeremota ary i Elia;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ny avy tamin’ny taranak’i Zato dia i Elioenay, i Eliasiba, i Matania, i Jeremota, i Zabada ary i Aziza;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ny avy tamin’ny taranak’i Bebay dia i Johanana, i Hanania, i Zabay ary i Atlay;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ny avy tamin’ny taranak’i Bany dia i Mesolama, i Maloka, i Adaia, i Jasoba, i Seala ary i Ramota;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ny avy tamin’ny taranak’i Pahata-Moaba dia i Adna, i Kelala, i Benaia, i Mahaseia, i Matania, i Bezalila, i Binoy ary i Manase;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ny avy tamin’ny taranak’i Harima dia i Eliezera, i Jisia, i Malkia, i Semaia, i Simeona, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: i Benjamina, i Maloka ary i Semaria;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ny avy tamin’ny taranak’i Hasoma dia i Matenay, i Matata, i Zabada, i Elifeleta, i Jeremay, i Manase ary i Simey;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ny avy tamin’ny taranak’i Bany dia i Maday, i Amrama, i Oela, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'i Benaia, i Bedeia, i Keloho, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'i Vania, i Meremota, i Eliasiba, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Matania, i Matenay, i Jasao, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'i Bany, i Binoy, i Simey, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'i Selemia, i Natana, i Adaia, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'i Maknadebay, i Sasay, i Saray, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'i Azarela, i Selemia, i Semaria, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: i Saloma, i Amaria ary i Josefa;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'ary ny avy tamin’ny taranak’i Nebo dia i Jeiela, i Matitia, i Zabada, i Zebina, i Jadao, i Joela ary i Benaia. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ireny rehetra ireny no samy efa naka vehivavy hafa firenena ho vadiny avokoa sady efa niteraka ny vehivavy sasany tamin’ireny.
