document_id: 2KI.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manavao ny fanekena amin’Andriamanitra i Josia
  - type: heading
    content: 2Tan 34.29-32
  - type: text
    content: 'Ary ny mpanjaka dia nandefa iraka hamory ny loholon’i Joda sy Jerosalema rehetra any aminy. '
  '10':
  - type: text
    content: 'Nolotoiny koa i Tofeta izay eo amin’ny lohasahan’ny taranak’i Hinoma, mba tsy hisy hampandeha ny zanany lahy na ny zanany vavy hamakivaky ny afo ho an’i Moloka intsony. '
  '11':
  - type: text
    content: 'Ary ny soavaly izay nohamasinin’ireo mpanjakan’ny Joda ho an’ny masoandro ka nataony teo amin’ny fidirana ho ao amin’ny tranon’NY TOMPO, teo akaikin’ny efitranon’i Natana-Meleka tandapa, izay tao amin’ireo trano madinika tao an-kianjan’ny tempoly, dia noesoriny; ny kalesin’ny masoandro koa dia nodorany tamin’ny afo. '
  '12':
  - type: text
    content: Ary ireo alitara teo amin’ny efitrano ambony, teo an-
  - type: text
    content: tampon-trano
  - type: text
    content: ' tamin’ny tranon’i Ahaza, izay nataon’ireo mpanjakan’ny Joda, sy ny alitara izay nataon’i Manase tao anatin’ny kianja roa tamin’ny tranon’NY TOMPO, dia noravan’ny mpanjaka ka notorotoroiny, dia nafafiny tany amin’ny lohasahan-driaka Kidrona ny vovony. '
  '13':
  - type: text
    content: Nolotoin’ny mpanjaka ireo toerana fanaovana sorona izay teo anoloan’i Jerosalema, teo amin’ny ankavanan’ny Tendrombohitra nahitan-doza
  - type: note
    content: 'Na: Ny Tendrombohitra Oliva.'
  - type: text
    content: ', dia ireo naorin’i Solomona, mpanjakan’ny Israely, ho an’i Astarta, fahavetavetan’ny Sidoniana, sy ho an’i Kemosy, fahavetavetan’i Moaba, ary ho an’i Milkoma, fahavetavetan’ny taranak’i Amona. '
  '14':
  - type: text
    content: Dia notorotoroiny ireo tsangambaton-tsampy sady nokapainy koa ireo tsangankazon-tsampy ho an’ny Aseraha ka nofenoiny taolan’olona ny toerana nisy azy.
  - type: heading
    content: Fanitsiam-pivavahana samihafa tany amin’ny tanin’ny Israely
  '15':
  - type: text
    content: 'Ny alitara izay tao Betela sy ny toerana fanaovana sorona izay nataon’i Jeroboama, zanak’i Nebata, ilay nampanota ny Israely, dia noravany koa; nodorany ny toerana fanaovana sorona ka notorotoroiny ho vovoka, ary nodorany koa ny tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: .
  '16':
  - type: text
    content: Ary nitodika i Josia ka nahita ny fasana teny an-tendrombohitra, dia nandefa olona haka ny taolana tao am-pasana izy ary nodorany teo ambonin’ny alitara ireny mba handotoany azy, araka ny tenin’NY TOMPO izay notorin’ilay lehilahin’Andriamanitra
  - type: note
    content: Zahao 1Mpa 13.2.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Dia hoy izy: Tsangambaton’iza itsy hitako itsy? Ary hoy ny mponina tao an-tanàna taminy: Fasan’ny lehilahin’Andriamanitra izay avy tany Joda io, dia ilay nitory izao zavatra nataonao tamin’ny alitara eto Betela izao. '
  '18':
  - type: text
    content: 'Hoy i Josia: Aoka itsỳ! Aza misy manetsika ny taolany! Dia tsy voakasika ny taolany sy ny taolan’ilay mpaminany avy tany Samaria.'
  - type: heading
    content: 2Tan 34.6-7
  '19':
  - type: text
    content: 'Ny trano rehetra tamin’ireo toerana fanaovana sorona, izay teny amin’ny tanànan’i Samaria, izay nataon’ireo mpanjakan’ny Israely ka nahatonga fahatezerana, dia noravan’i Josia koa ka nataony araka izay rehetra nataony tany Betela. '
  '2':
  - type: text
    content: 'Dia niakatra ho ao amin’ny tranon’NY TOMPO ny mpanjaka sy ny lehilahin’i Joda rehetra ary ny mponina rehetra tany Jerosalema mbamin’ny mpisorona sy ny mpaminany ary ny vahoaka rehetra, na kely na lehibe. Dia novakiny teo anatrehany ny teny rehetra tamin’ny bokin’ny fanekena izay hita tao amin’ny tranon’NY TOMPO. '
  '20':
  - type: text
    content: Novonoiny teo ambonin’ny alitara koa ny mpisorona rehetra izay teo, dia ny mpisorona tamin’ny toerana fanaovana sorona; ary nandoro taolan’olona teo izy vao niverina nankany Jerosalema.
  - type: heading
    content: Ny fankalazana ny Paska
  - type: heading
    content: 2Tan 35.1, 18-19
  '21':
  - type: text
    content: 'Ary nandidy ny vahoaka rehetra ny mpanjaka hoe: Tandremo ny Paskan’ny NY TOMPO Andriamanitrareo, araka ny voasoratra ato amin’ity bokin’ny fanekena ity. '
  '22':
  - type: text
    content: 'Fa tsy nisy Paska notandremana toy izany hatramin’ny andron’ny mpitsara izay nitsara ny Israely, na tamin’ny andro rehetra nanjakan’ny mpanjakan’ny Israely sy ny mpanjakan’ny Joda; '
  '23':
  - type: text
    content: fa tamin’ny taona fahavalo amby folo nanjakan’i Josia mpanjaka no nitandremany izany Paska izany ho an’NY TOMPO tany Jerosalema.
  - type: heading
    content: Teny famaranana momba ny fanjakan’i Josia
  - type: heading
    content: Ampit. 2Tan 35.20–36.1
  '24':
  - type: text
    content: 'Nesorin’i Josia koa ny mpiantso ny fanahin’ny maty, ny mpanandro, ny '
  - type: text
    content: terafima
  - type: text
    content: ', ny sampy ary ny fahavetavetana rehetra izay hita tany amin’ny tany Joda sy tany Jerosalema, mba hanatanterahana ny tenin’ny lalàna voasoratra ao amin’ilay boky hitan’i Hilkia mpisorona tao amin’ny tranon’NY TOMPO. '
  '25':
  - type: text
    content: Tsy nisy mpanjaka tahaka azy teo alohany, izay niverina ho amin’NY TOMPO tamin’ny fony manontolo sy ny fanahiny manontolo ary ny heriny manontolo araka ny lalànan’i Mosesy rehetra, sady tsy nisy tahaka azy intsony niseho tao aorianany.
  '26':
  - type: text
    content: 'Nefa NY TOMPO tsy nitsahatra tamin’ny firehetan’ny fahatezerany mafy, dia ilay fahatezerana nirehitra tamin’ny Joda noho ny zavatra rehetra izay nataon’i Manase ka nahatezitra Azy. '
  '27':
  - type: text
    content: 'Dia hoy NY TOMPO: Hesoriko koa ny Joda hiala eo imasoko, tahaka ny nanesorako ny Israely, ary holaviko ity tanàna Jerosalema nofidiko ity sy ny trano izay nolazaiko hoe: Ho ao ny anarako. '
  '28':
  - type: text
    content: Ny tantaran’i Josia sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany?
  '29':
  - type: text
    content: 'Tamin’ny andro nanjakan’i Josia no niakaran’ny farao Neko, mpanjakan’i Ejipta, hankany amoron’ny ony Eofrata hiady amin’ny mpanjakan’i Asiria. Ary nandeha hiady tamin’ny farao i Josia mpanjaka. Kanjo nony tojo azy dia matiny tao Megido izy. '
  '3':
  - type: text
    content: Ary nijoro teo amin’ny lampihazo ny mpanjaka ka nanao fanekena teo anatrehan’NY TOMPO fa hanaraka Azy sy hitandrina ny lalànany sy ny teny vavolombelony ary ny didiny amin’ny fony manontolo sy ny fanahiny manontolo, hanatanteraka ny tenin’ny fanekena sy izay voasoratra ao amin’izany boky izany. Ary nankatò ny fanekena koa ny vahoaka rehetra.
  - type: heading
    content: Fanitsiam-pivavahana samihafa natao tany Joda
  - type: heading
    content: 2Tan 34.3-5
  '30':
  - type: text
    content: Napetraky ny mpanompony tao anaty kalesy fitondra miady ny fatiny ka noentiny niala tao Megido ho any Jerosalema dia naleviny tao amin’ny fasany. Ary nalain’ny vahoaka i Joahaza, zanak’i Josia, ka nohosorany sy nampanjakainy handimby ny rainy.
  - type: heading
    content: I Joahaza, mpanjakan’ny Joda
  - type: heading
    content: 2Tan 36.2-4
  '31':
  - type: text
    content: 'Telo amby roapolo taona i Joahaza raha nanomboka nanjaka, ary telo volana no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Hamotala, zanakavavin’i Jeremia, avy any Libna. '
  '32':
  - type: text
    content: 'Nanao izay ratsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’ny razany. '
  '33':
  - type: text
    content: 'Nafatotry ny farao Neko tao Ribla any amin’ny tany Hamata izy mba tsy hanjakany any Jerosalema, sady nampandoaviny sazy '
  - type: text
    content: talenta
  - type: text
    content: ' volafotsy zato sy talenta volamena iray ny fanjakana. '
  '34':
  - type: text
    content: 'Ary ny farao Neko dia nanendry an’i Eliakima, zanak’i Josia, ho mpanjaka hisolo an’i Josia rainy ka ny anarany dia novany hoe Joiakima, fa i Joahaza kosa dia noentiny ho any Ejipta ka maty tany. '
  '35':
  - type: text
    content: Ary ny volafotsy sy ny volamena dia nomen’i Joiakima ny farao; mba hanomezana ny vola dia voatery notombanany ny tany araka ny didin’ny farao; notereny ny vahoaka rehetra handoa ny vola araka ny tombany avy mba homeny ny farao Neko.
  - type: heading
    content: I Joiakima, mpanjakan’i Joda
  - type: heading
    content: 2Tan 36.5-8
  '36':
  - type: text
    content: 'Dimy amby roapolo taona i Joiakima raha nanomboka nanjaka, ary nanjaka iraika amby folo taona tany Jerosalema izy. Ny anaran’ny reniny dia Zebida, zanakavavin’i Pedaia, avy any Romaha. '
  '37':
  - type: text
    content: Nanao izay ratsy eo imason’NY TOMPO izy, tahaka izay nataon’ny razany.
  '4':
  - type: text
    content: 'Ary ny mpanjaka dia nandidy an’i Hilkia mpisoronabe sy ireo mpisorona manarakaraka azy ary ny mpiandry varavarana hamoaka ny fanaka rehetra izay natao ho an’ny '
  - type: text
    content: Baala
  - type: text
    content: ' sy i '
  - type: text
    content: Aseraha
  - type: text
    content: ' ary ho an’izay rehetra eny amin’ny lanitra hiala amin’ny tempolin’NY TOMPO ka nodorany tany ivelan’i Jerosalema teny amin’ny saha amoron’i Kidrona ireny ary noentiny ho any Betela ny vovony. '
  '5':
  - type: text
    content: 'Natsahany koa ny mpisorona tamin’ny andriamanitra tsy izy izay notendren’ny mpanjakan’ny Joda handoro ditin-kazo manitra eny amin’ireny toerana fanaovana sorona tany amin’ny tanànan’i Joda sy tamin’ny manodidina an’i Jerosalema sy izay nandoro ditin-kazo manitra koa ho an’ny Baala sy ny masoandro ary ny volana sy ny antokon’ny kintana eny amin’ny habakabaka mbamin’izay rehetra eny amin’ny lanitra. '
  '6':
  - type: text
    content: 'Ary ny tsangankazon-tsampy ho an’ny Aseraha dia navoakany hiala tao amin’ny tranon’NY TOMPO ho any ivelan’i Jerosalema, ao amin’ny lohasahan-driaka Kidrona; nodorany tao io ka notorotoroiny ho vovoka, ary nafafiny teny ambonin’ny fasam-bahoaka ny vovony. '
  '7':
  - type: text
    content: 'Narodany koa ny tranon’ny olona nanolo-tena hijangajanga ho fanompoan-tsampy, izay natao tao amin’ny tranon’NY TOMPO, dia ireo trano nanenoman’ny vehivavy lay ho an’ny tsangankazon-tsampy ho an’ny Aseraha. '
  '8':
  - type: text
    content: 'Nampiantso ny mpisorona rehetra avy tamin’ny tanànan’i Joda izy dia nolotoiny ny toerana fanaovana sorona izay nandoroan’ny mpisorona ditin-kazo manitra, hatrany Geba ka hatrany Bery-Sheba, ary noravany ny toerana fanaovana sorona tao akaikin’ny vavahady, dia ilay teo anoloan’ny vavahadin’i Josoa, lehiben’ny tanàna, sy ilay teo ankavia raha miditra amin’ny vavahadin’ny tanàna. '
  '9':
  - type: text
    content: 'Fa ny mpisorona tamin’ny toerana fanaovana sorona dia tsy navela hanolotra fanatitra teo ambonin’ny alitaran’NY TOMPO any Jerosalema; nefa nahazo niara-nihinana mofo tsy misy masirasira tamin’ny rahalahiny ihany izy. '
