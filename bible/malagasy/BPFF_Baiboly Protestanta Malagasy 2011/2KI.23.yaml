document_id: 2KI.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manavao ny fanekena amin’Andriamanitra i Josia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 34.29-32
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny mpanjaka dia nandefa iraka hamory ny loholon’i Joda sy Jerosalema rehetra any aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niakatra ho ao amin’ny tranon’NY TOMPO ny mpanjaka sy ny lehilahin’i Joda rehetra ary ny mponina rehetra tany Jerosalema mbamin’ny mpisorona sy ny mpaminany ary ny vahoaka rehetra, na kely na lehibe. Dia novakiny teo anatrehany ny teny rehetra tamin’ny bokin’ny fanekena izay hita tao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nijoro teo amin’ny lampihazo ny mpanjaka ka nanao fanekena teo anatrehan’NY TOMPO fa hanaraka Azy sy hitandrina ny lalànany sy ny teny vavolombelony ary ny didiny amin’ny fony manontolo sy ny fanahiny manontolo, hanatanteraka ny tenin’ny fanekena sy izay voasoratra ao amin’izany boky izany. Ary nankatò ny fanekena koa ny vahoaka rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanitsiam-pivavahana samihafa natao tany Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 34.3-5
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny mpanjaka dia nandidy an’i Hilkia mpisoronabe sy ireo mpisorona manarakaraka azy ary ny mpiandry varavarana hamoaka ny fanaka rehetra izay natao ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' sy i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: ' ary ho an’izay rehetra eny amin’ny lanitra hiala amin’ny tempolin’NY TOMPO ka nodorany tany ivelan’i Jerosalema teny amin’ny saha amoron’i Kidrona ireny ary noentiny ho any Betela ny vovony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Natsahany koa ny mpisorona tamin’ny andriamanitra tsy izy izay notendren’ny mpanjakan’ny Joda handoro ditin-kazo manitra eny amin’ireny toerana fanaovana sorona tany amin’ny tanànan’i Joda sy tamin’ny manodidina an’i Jerosalema sy izay nandoro ditin-kazo manitra koa ho an’ny Baala sy ny masoandro ary ny volana sy ny antokon’ny kintana eny amin’ny habakabaka mbamin’izay rehetra eny amin’ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny tsangankazon-tsampy ho an’ny Aseraha dia navoakany hiala tao amin’ny tranon’NY TOMPO ho any ivelan’i Jerosalema, ao amin’ny lohasahan-driaka Kidrona; nodorany tao io ka notorotoroiny ho vovoka, ary nafafiny teny ambonin’ny fasam-bahoaka ny vovony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Narodany koa ny tranon’ny olona nanolo-tena hijangajanga ho fanompoan-tsampy, izay natao tao amin’ny tranon’NY TOMPO, dia ireo trano nanenoman’ny vehivavy lay ho an’ny tsangankazon-tsampy ho an’ny Aseraha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nampiantso ny mpisorona rehetra avy tamin’ny tanànan’i Joda izy dia nolotoiny ny toerana fanaovana sorona izay nandoroan’ny mpisorona ditin-kazo manitra, hatrany Geba ka hatrany Bery-Sheba, ary noravany ny toerana fanaovana sorona tao akaikin’ny vavahady, dia ilay teo anoloan’ny vavahadin’i Josoa, lehiben’ny tanàna, sy ilay teo ankavia raha miditra amin’ny vavahadin’ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ny mpisorona tamin’ny toerana fanaovana sorona dia tsy navela hanolotra fanatitra teo ambonin’ny alitaran’NY TOMPO any Jerosalema; nefa nahazo niara-nihinana mofo tsy misy masirasira tamin’ny rahalahiny ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nolotoiny koa i Tofeta izay eo amin’ny lohasahan’ny taranak’i Hinoma, mba tsy hisy hampandeha ny zanany lahy na ny zanany vavy hamakivaky ny afo ho an’i Moloka intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny soavaly izay nohamasinin’ireo mpanjakan’ny Joda ho an’ny masoandro ka nataony teo amin’ny fidirana ho ao amin’ny tranon’NY TOMPO, teo akaikin’ny efitranon’i Natana-Meleka tandapa, izay tao amin’ireo trano madinika tao an-kianjan’ny tempoly, dia noesoriny; ny kalesin’ny masoandro koa dia nodorany tamin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ireo alitara teo amin’ny efitrano ambony, teo an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-trano
  - type: text
    text: ' tamin’ny tranon’i Ahaza, izay nataon’ireo mpanjakan’ny Joda, sy ny alitara izay nataon’i Manase tao anatin’ny kianja roa tamin’ny tranon’NY TOMPO, dia noravan’ny mpanjaka ka notorotoroiny, dia nafafiny tany amin’ny lohasahan-driaka Kidrona ny vovony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nolotoin’ny mpanjaka ireo toerana fanaovana sorona izay teo anoloan’i Jerosalema, teo amin’ny ankavanan’ny Tendrombohitra nahitan-doza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny Tendrombohitra Oliva.
    marker-yv: yv-n
  - type: text
    text: ', dia ireo naorin’i Solomona, mpanjakan’ny Israely, ho an’i Astarta, fahavetavetan’ny Sidoniana, sy ho an’i Kemosy, fahavetavetan’i Moaba, ary ho an’i Milkoma, fahavetavetan’ny taranak’i Amona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia notorotoroiny ireo tsangambaton-tsampy sady nokapainy koa ireo tsangankazon-tsampy ho an’ny Aseraha ka nofenoiny taolan’olona ny toerana nisy azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanitsiam-pivavahana samihafa tany amin’ny tanin’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny alitara izay tao Betela sy ny toerana fanaovana sorona izay nataon’i Jeroboama, zanak’i Nebata, ilay nampanota ny Israely, dia noravany koa; nodorany ny toerana fanaovana sorona ka notorotoroiny ho vovoka, ary nodorany koa ny tsangankazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nitodika i Josia ka nahita ny fasana teny an-tendrombohitra, dia nandefa olona haka ny taolana tao am-pasana izy ary nodorany teo ambonin’ny alitara ireny mba handotoany azy, araka ny tenin’NY TOMPO izay notorin’ilay lehilahin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Mpa 13.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy izy: Tsangambaton’iza itsy hitako itsy? Ary hoy ny mponina tao an-tanàna taminy: Fasan’ny lehilahin’Andriamanitra izay avy tany Joda io, dia ilay nitory izao zavatra nataonao tamin’ny alitara eto Betela izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy i Josia: Aoka itsỳ! Aza misy manetsika ny taolany! Dia tsy voakasika ny taolany sy ny taolan’ilay mpaminany avy tany Samaria.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 34.6-7
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny trano rehetra tamin’ireo toerana fanaovana sorona, izay teny amin’ny tanànan’i Samaria, izay nataon’ireo mpanjakan’ny Israely ka nahatonga fahatezerana, dia noravan’i Josia koa ka nataony araka izay rehetra nataony tany Betela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Novonoiny teo ambonin’ny alitara koa ny mpisorona rehetra izay teo, dia ny mpisorona tamin’ny toerana fanaovana sorona; ary nandoro taolan’olona teo izy vao niverina nankany Jerosalema.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fankalazana ny Paska
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 35.1, 18-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nandidy ny vahoaka rehetra ny mpanjaka hoe: Tandremo ny Paskan’ny NY TOMPO Andriamanitrareo, araka ny voasoratra ato amin’ity bokin’ny fanekena ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa tsy nisy Paska notandremana toy izany hatramin’ny andron’ny mpitsara izay nitsara ny Israely, na tamin’ny andro rehetra nanjakan’ny mpanjakan’ny Israely sy ny mpanjakan’ny Joda; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: fa tamin’ny taona fahavalo amby folo nanjakan’i Josia mpanjaka no nitandremany izany Paska izany ho an’NY TOMPO tany Jerosalema.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny famaranana momba ny fanjakan’i Josia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. 2Tan 35.20–36.1
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nesorin’i Josia koa ny mpiantso ny fanahin’ny maty, ny mpanandro, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terafima
  - type: text
    text: ', ny sampy ary ny fahavetavetana rehetra izay hita tany amin’ny tany Joda sy tany Jerosalema, mba hanatanterahana ny tenin’ny lalàna voasoratra ao amin’ilay boky hitan’i Hilkia mpisorona tao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy nisy mpanjaka tahaka azy teo alohany, izay niverina ho amin’NY TOMPO tamin’ny fony manontolo sy ny fanahiny manontolo ary ny heriny manontolo araka ny lalànan’i Mosesy rehetra, sady tsy nisy tahaka azy intsony niseho tao aorianany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nefa NY TOMPO tsy nitsahatra tamin’ny firehetan’ny fahatezerany mafy, dia ilay fahatezerana nirehitra tamin’ny Joda noho ny zavatra rehetra izay nataon’i Manase ka nahatezitra Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy NY TOMPO: Hesoriko koa ny Joda hiala eo imasoko, tahaka ny nanesorako ny Israely, ary holaviko ity tanàna Jerosalema nofidiko ity sy ny trano izay nolazaiko hoe: Ho ao ny anarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny tantaran’i Josia sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tamin’ny andro nanjakan’i Josia no niakaran’ny farao Neko, mpanjakan’i Ejipta, hankany amoron’ny ony Eofrata hiady amin’ny mpanjakan’i Asiria. Ary nandeha hiady tamin’ny farao i Josia mpanjaka. Kanjo nony tojo azy dia matiny tao Megido izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Napetraky ny mpanompony tao anaty kalesy fitondra miady ny fatiny ka noentiny niala tao Megido ho any Jerosalema dia naleviny tao amin’ny fasany. Ary nalain’ny vahoaka i Joahaza, zanak’i Josia, ka nohosorany sy nampanjakainy handimby ny rainy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Joahaza, mpanjakan’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 36.2-4
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Telo amby roapolo taona i Joahaza raha nanomboka nanjaka, ary telo volana no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Hamotala, zanakavavin’i Jeremia, avy any Libna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nanao izay ratsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’ny razany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nafatotry ny farao Neko tao Ribla any amin’ny tany Hamata izy mba tsy hanjakany any Jerosalema, sady nampandoaviny sazy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' volafotsy zato sy talenta volamena iray ny fanjakana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny farao Neko dia nanendry an’i Eliakima, zanak’i Josia, ho mpanjaka hisolo an’i Josia rainy ka ny anarany dia novany hoe Joiakima, fa i Joahaza kosa dia noentiny ho any Ejipta ka maty tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary ny volafotsy sy ny volamena dia nomen’i Joiakima ny farao; mba hanomezana ny vola dia voatery notombanany ny tany araka ny didin’ny farao; notereny ny vahoaka rehetra handoa ny vola araka ny tombany avy mba homeny ny farao Neko.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Joiakima, mpanjakan’i Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 36.5-8
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dimy amby roapolo taona i Joiakima raha nanomboka nanjaka, ary nanjaka iraika amby folo taona tany Jerosalema izy. Ny anaran’ny reniny dia Zebida, zanakavavin’i Pedaia, avy any Romaha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Nanao izay ratsy eo imason’NY TOMPO izy, tahaka izay nataon’ny razany.
