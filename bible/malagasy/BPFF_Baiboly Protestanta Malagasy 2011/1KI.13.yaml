document_id: 1KI.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nisy lehilahin’Andriamanitra tonga tao Betela
  - type: text
    content: 'Raha mbola nijoro teo anilan’ny alitara handoro ditin-kazo manitra i Jeroboama, indro nisy lehilahin’Andriamanitra avy tany Joda tonga tany Betela noho ny tenin’NY TOMPO. '
  '10':
  - type: text
    content: Dia nandeha tamin’ny lalan-kafa izy fa tsy niverina tamin’ilay nalehany ho any Betela intsony.
  - type: heading
    content: Tsy nankatò ilay lehilahin’Andriamanitra
  '11':
  - type: text
    content: 'Nisy mpaminany antitra iray hafa tao Betela. Tonga ireo zanany dia nitantara taminy izay rehetra nataon’ilay lehilahin’Andriamanitra tamin’io andro io tao Betela, ary nolazain’ireo tamin’ny rainy koa ny teny izay nolazain-dRalehilahy tamin’ny mpanjaka. '
  '12':
  - type: text
    content: 'Dia hoy ny rainy taminy: Aiza no lalana nalehany? Fa ireo zanany no nahita ny lalana nalehan’ilay lehilahin’Andriamanitra izay tonga avy tany Joda. '
  '13':
  - type: text
    content: 'Hoy izy tamin’ireo zanany: Asio lasely ny boriky hitaingenako. Dia nasiany lasely ny boriky ka nitaingenany. '
  '14':
  - type: text
    content: 'Ary lasa nanaraka ilay lehilahin’Andriamanitra izy ka nahita azy nipetraka teo ambanin’ny hazo '
  - type: text
    content: terebinta
  - type: text
    content: ' iray. Hoy izy taminy: Ianao moa ilay lehilahin’Andriamanitra avy tany Joda? Hoy ny navaliny: Eny, izaho no izy. '
  '15':
  - type: text
    content: 'Hoy izy taminy: Andeha hiaraka amiko ho any an-tranoko mba hisakafo. '
  '16':
  - type: text
    content: 'Hoy kosa izy: Tsy mahazo miverina hiaraka aminao aho na hiditra any an-tranonao, ary tsy hihinan-kanina na hisotro rano eto amin’ity toerana ity aho, '
  '17':
  - type: text
    content: 'satria tonga tamiko ny tenin’NY TOMPO hoe: Aza mihinan-kanina, na misotro rano any, ary aza miverina amin’ny lalana efa nalehanao. '
  '18':
  - type: text
    content: 'Nefa hoy ilay iray taminy: Izaho koa dia mba mpaminany tahaka anao ihany; ary nisy anjely nilaza tamiko araka ny tenin’NY TOMPO hoe: Ento miverina hiaraka aminao ho any an-tranonao izy hihinan-kanina sy hisotro rano. Kanjo laingany izany. '
  '19':
  - type: text
    content: Dia niverina niaraka taminy izy ka nihinan-kanina sy nisotro rano tao an-tranony.
  - type: heading
    content: Maty ilay lehilahin’Andriamanitra
  '2':
  - type: text
    content: 'Niantso ny alitara araka ny tenin’NY TOMPO ilay lehilahin’Andriamanitra ka niteny hoe: Ry alitara! Ry alitara! Izao no lazain’NY TOMPO: Indro hisy zaza hateraka ho an’ny taranak’i Davida; Josia no ho anarany; ary hovonoiny ka hateriny eo amboninao ireo mpisoron’ny toerana fanaovana sorona izay mandoro ditin-kazo manitra eo aminao, ary taolan’olona no hodorana eo amboninao! '
  '20':
  - type: text
    content: 'Raha mbola nipetraka teo amin’ny latabatra anefa izy roa lahy dia tonga tamin’ilay mpaminany nitondra azy niverina ny tenin’NY TOMPO '
  '21':
  - type: text
    content: 'ka niteny mafy tamin’ilay lehilahin’Andriamanitra avy tany Joda izy hoe: Izao no lazain’NY TOMPO: Satria nandà ny tenin’NY TOMPO ianao ka tsy nitandrina ny didy izay nandidian’NY TOMPO Andriamanitrao anao '
  '22':
  - type: text
    content: 'fa niverina nihinan-kanina sy nisotro rano teto amin’ny tany izay nandraran’NY TOMPO anao hoe: Aza mihinan-kanina na misotro rano, dia tsy ho tonga any am-pasan-drazanao ny fatinao.'
  '23':
  - type: text
    content: 'Rehefa avy nihinana sy nisotro izy dia nasiany lasely ny boriky hitaingenan’ilay mpaminany izay noentiny niverina. '
  '24':
  - type: text
    content: 'Nony nandeha io dia nisy liona nifanena taminy teny an-dalana ka nahafaty azy. Niampatra teo an-dalana ny fatiny, nijanona teo anilany ny boriky, ary ilay liona dia nitoetra teo anilan’ny faty. '
  '25':
  - type: text
    content: 'Ary indreo nisy olona nandalo ka nahita ny faty niampatra teo an-dalana sy ny liona nijanona teo anilan’ny faty, dia lasa nandeha ireo ka nilaza izany tany an-tanàna izay nitoeran’ilay mpaminany antitra. '
  '26':
  - type: text
    content: 'Nony nandre izany ilay mpaminany izay namerina azy tany an-dalana dia niteny hoe: Ilay lehilahin’Andriamanitra nandà ny tenin’NY TOMPO izay; fa natolotry NY TOMPO tamin’ny liona izy ka noviravirainy sy novonoiny araka ny tenin’NY TOMPO izay nolazainy taminy. '
  '27':
  - type: text
    content: 'Dia niteny tamin’ny zanany lahy izy hoe: Asio lasely ny boriky hitaingenako. Dia nasiany lasely ilay boriky. '
  '28':
  - type: text
    content: 'Nony nandeha izy dia nahita ny fatin-dRalehilahy niampatra teo an-dalana, ary ny boriky sy ny liona samy nijanona teo anilan’ny faty; nefa ny liona dia tsy nihinana ny faty na namiravira ny boriky. '
  '29':
  - type: text
    content: 'Dia nobatain’ilay mpaminany ny fatin’ilay lehilahin’Andriamanitra ka nasampiny tamin’ny boriky ary noentiny niverina. Tonga tao an-tanàna ilay lehilahy antitra mba hisaona sy handevina azy. '
  '3':
  - type: text
    content: 'Tamin’io andro io ihany koa dia nanambara famantarana izy ka nilaza hoe: Izao no famantarana nolazain’NY TOMPO: Indro, hitresaka ny alitara ka hiely ny lavenona izay eo amboniny.'
  '30':
  - type: text
    content: 'Ary naleviny tao amin’ny fasany ny fatin-dRalehilahy ka nitomanian’ny olona hoe: Indrisy, ry rahalahiko! '
  '31':
  - type: text
    content: 'Rehefa voaleviny Ralehilahy dia hoy izy tamin’ny zanany: Rehefa maty aho dia mba aleveno ao amin’ny fasana izay ilevenan’ilay lehilahin’Andriamanitra ka ataovy eo anilan’ny taolany ny taolako. '
  '32':
  - type: text
    content: Fa tsy maintsy ho tanteraka ilay teny nantsoantsoiny noho ny tenin’NY TOMPO nilaza ny loza ho tonga amin’ny alitara ao Betela sy amin’ny trano rehetra eny amin’ny toerana fanaovana sorona izay any amin’ireo tanànan’i Samaria.
  '33':
  - type: text
    content: 'Taorianan’izany dia tsy mbola niala tamin’ny lalan-dratsiny ihany i Jeroboama fa mbola naka olona avy tamin’ny vahoaka ho mpisorona amin’ny toerana fanaovana sorona izy; koa na iza na iza no naniry hatokana dia natokany mba ho tonga mpisoron’ny toerana fanaovana sorona. '
  '34':
  - type: text
    content: Koa izany no tonga fahotan’ny taranak’i Jeroboama ka namongorana sy nandringanana azy tsy ho eo ambonin’ny tany.
  '4':
  - type: text
    content: 'Nony ren’i Jeroboama mpanjaka ny tenin’ny lehilahin’Andriamanitra izay niantso ny alitara tao Betela dia nampiala ny tanany tamin’ny alitara izy ka niteny hoe: Hazòny Ilehio! Nefa tonga maina ny tanany ilay nanondro azy iny ka tsy azony noketrahina intsony. '
  '5':
  - type: text
    content: 'Dia nitresaka tokoa ny alitara ka niraraka ny lavenona teo amboniny, araka ny famantarana izay nasehon’ilay lehilahin’Andriamanitra noho ny tenin’NY TOMPO. '
  '6':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’ilay lehilahin’Andriamanitra: Mba ifony amin’NY TOMPO Andriamanitrao aho ka mivavaha ho ahy, mba ho azoko ketrahina indray ny tanako. Dia nifona tamin’NY TOMPO ilay lehilahin’Andriamanitra ka azon’ny mpanjaka noketrahina indray ny tanany ary tonga tahaka ny teo aloha. '
  '7':
  - type: text
    content: 'Dia hoy ny mpanjaka tamin’ilay lehilahin’Andriamanitra: Andeha hiaraka amiko ho any an-trano ianao mba hanao ody am-bavafo kely sady homeko zavatra koa ianao. '
  '8':
  - type: text
    content: 'Hoy anefa ilay lehilahin’Andriamanitra tamin’ny mpanjaka: Na dia homenao ahy aza ny antsasaky ny tranonao, tsy hiditra any an-tranonao aho, na hihinan-kanina, na hisotro rano eto amin’ity toerana ity; '
  '9':
  - type: text
    content: 'fa izao no tenin’NY TOMPO nandrara ahy: Aza mihinan-kanina, na misotro rano, na miverina amin’izay lalana efa nalehanao ianao. '
