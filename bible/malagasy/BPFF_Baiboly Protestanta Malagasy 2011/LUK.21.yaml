document_id: LUK.21,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny rakitra narotsak’ilay mpitondratena
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 12.41-44
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nanopy ny masony Jesosy ka nahita ny mpanankarena nandrotsaka rakitra tao amin’ny fandatsahan-drakitra; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy Izy taminy: Hisy firenena hitsangana hamely firenena, hisy fanjakana hitsangana hamely fanjakana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hisy horohoron-tany lehibe sy mosary ary areti-mandringana any amin’ny tany samihafa, ary hisy zava-mahatahotra sy famantarana lehibe avy any an-danitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanenjehana, famantarana lehibe indrindra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 10.17-22; Mar 13.9-12
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha tsy mbola tonga izany rehetra izany dia hisambotra anareo izy ka hanenjika ary hanolotra anareo ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' sy any an-tranomaizina ka hoentina eo anatrehan’ny mpanjaka sy ny manampahefana ianareo noho ny anarako. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia ho tonga ho vavolombelona aminareo izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa aoreno ao am-ponareo ny tsy hihevitra mialoha izay ho fiarovan-tenanareo; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'fa Izaho no hanome anareo teny sy fahendrena izay tsy ho azon’ny fahavalonareo rehetra toherina na valìna. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hatolotry ny ray sy ny reny, ny rahalahy sy ny havana aman-tsakaiza koa aza ianareo, koa ny sasany aminareo dia hovonoiny.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.9-13; Mar 13.13
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ho halan’ny olona rehetra ianareo noho ny anarako. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nefa tsy hisy ho very na dia singam-bolo iray eo amin’ny lohanareo aza. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Amin’ny faharetanareo no hahatananareo ny ainareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandravana an’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.15-22; Mar 13.14-20
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ary nahita mpitondratena mahantra iray koa Izy izay nandrotsaka lepta roa tao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Rehefa mahita an’i Jerosalema voahodidin’ny miaramila ianareo dia aoka ho fantatrareo fa efa manakaiky ny fandravana azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary izay any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' amin’izany andro izany, aoka handositra ho any an-tendrombohitra; izay ao Jerosalema, aoka handositra ho any ivelany; ary izay any an-tsaha, aoka tsy hiditra ao an-tanàna intsony. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa ireo dia andro famaliana mba hahatanteraka izay rehetra voasoratra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa loza no hanjo ny bevohoka sy ny mitaiza kely amin’izany andro izany! Satria hisy fahoriana lehibe eo amin’ny tany ary fahatezerana amin’ity firenena ity. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia ho ringana amin’ny lelan-tsabatra izy ka hoentina ho babon’ny firenena rehetra, ary hohitsahin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' i Jerosalema mandra-pahatanteraka ny andron’ny Jentilisa.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiavian’ny Zanak’Olona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.29-31; Mar 13.24-27
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hisy famantarana eny amin’ny masoandro sy ny volana ary ny kintana, ary etỳ ambonin’ny tany dia hitebiteby ny firenena amin’ny fahaverezan-kevitra noho ny firohondrohon’ny ranomasina sy ny fanonjany, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'koa ho reraka ny fon’ny olona noho ny fahatahorany sy ny fiandrasany izay zavatra ho tonga ambonin’ny tany; fa ireo herin’ny lanitra dia hohozongozonina. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Amin’izany dia hahita ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ' tonga eo amin’ny rahona amin-kery sy voninahitra lehibe izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary raha vao miandoha izany zavatra izany dia miandrandrà ka asandrato ny lohanareo; fa manakaiky ny fanavotana anareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Akaiky ny fanjakan’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.32-35; Mar 13.28-31
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary nilaza fanoharana tamin’izy ireo Izy hoe: Jereo ny aviavy sy ny hazo rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy Izy: Lazaiko aminareo marina tokoa fa io mpitondratena mahantra io no nandrotsaka be noho izy rehetra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Raha hitanareo fa vao mitsiry ny rantsany dia fantatrareo ihany fa efa akaiky ny lohataona. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia tahaka izany koa ianareo, raha vao hitanareo fa tonga izany zavatra izany, dia aoka ho fantatrareo fa akaiky ny fanjakan’Andriamanitra. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Lazaiko aminareo marina tokoa fa tsy ho tapitra ity taranaka ity mandra-pahatongan’izany rehetra izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ny lanitra sy ny tany ho levona, fa ny teniko dia tsy mba ho levona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ilàna ny fiambenana
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Mitandrema, fandrao ny fonareo hovesaran’ny vokatry ny fisotroan-toaka sy ny fahamamoana ary ny fiahiahian’izao fiainana izao ka ho avy tampoka aminareo tahaka ny fandrika izany andro izany. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Fa hihatra amin’izay rehetra mitoetra etỳ ambonin’ny tany rehetra izany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Fa miambena ka mivavaha mandrakariva mba hahery ianareo ka ho afa-mandositra izany zavatra ho avy rehetra izany ary hitsangana eo anatrehan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo andro faramparany niainan’i Jesosy
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Nony antoandro dia nampianatra tao amin’ny tempoly Izy; ary nony alina dia niala tao izy ka nitoetra teny amin’ny tendrombohitra atao hoe Oliva. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Ary ny vahoaka rehetra dia tonga vao maraina teo Aminy, tao amin’ny tempoly, mba hihaino Azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa ireo rehetra ireo dia tamin’ny haben’ny fananany no nandrotsahany tao amin’ny rakitra; fa izy kosa tamin’ny fahantrany no nandrotsahany ny fivelomany rehetra izay nananany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanambaràn’i Jesosy ny handravana ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.1-2; Mar 13.1-2
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nisy nilaza fa voaravaka vato tsara sy fanatitra ny tempoly; fa hoy Jesosy: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny amin’ireo zavatra hitanareo ireo dia ho avy ny andro, koa tsy havela hisy vato hifanongoa eto ka tsy horavana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famantarana ny hiavian’ny farany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.3-8; Mar 13.3-8
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nanontany Azy izy ireo hoe: Mpampianatra ô, rahoviana no ho avy izany? Ary inona no ho famantarana, rehefa ho tonga izany? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia hoy Izy: Mitandrema fandrao ho voafitaka ianareo; fa maro no ho avy amin’ny anarako sady hilaza hoe: Izaho no Izy, ary koa: Efa akaiky ny andro; koa aza manaraka azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha handre ady sy tabataba ianareo, aza matahotra; fa tsy maintsy ho tonga aloha izany, nefa tsy mbola miaraka amin’izay akory ny farany.
