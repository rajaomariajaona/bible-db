document_id: ACT.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Niara-niasa tamin’i Timoty i Paoly sy i Silasy
  - type: text
    content: 'Tonga tany Derbe sy Listra koa izy; ary indro, nisy mpianatra iray tao antsoina hoe Timoty, zanaky ny vehivavy jiosy izay nino, fa grika kosa ny rainy; '
  '10':
  - type: text
    content: Rehefa nahita ny fahitana izy dia nitady handeha avy hatrany hankany Makedonia izahay, satria noheverinay fa Andriamanitra no niantso anay hitory ny Filazantsara amin’ny olona any.
  - type: heading
    content: Ny nanaovana batisa an’i Lidia tany Filipia
  '11':
  - type: text
    content: 'Nony niondrana an-tsambo niala tao Troasy izahay dia nizotra nankany Samotrakia ary nony ampitso dia nankany Neapolisy. '
  '12':
  - type: text
    content: 'Rehefa niala teo izahay dia nankany Filipia, izay tanàna voalohany amin’izany zaratanin’i Makedonia izany sady zanatany romana; ary nipetraka tao amin’izany tanàna izany andro vitsivitsy izahay. '
  '13':
  - type: text
    content: 'Tamin’ny andro '
  - type: text
    content: Sabata
  - type: text
    content: ' dia nankeo ivelan’ny vavahady teo amoron’ny ony izahay satria noheverinay fa nisy toerana fivavahana teo; dia nipetraka teo izahay ka niresaka tamin’ny vehivavy vory teo. '
  '14':
  - type: text
    content: 'Ary nisy vehivavy antsoina hoe Lidia, mpivarotra lamba volomparasy, avy any an-tanànan’i Tiatira, izay nivavaka tamin’Andriamanitra. Nihaino izy ary ny Tompo nanokatra ny fony hitandrina ny teny izay nolazain’i Paoly. '
  '15':
  - type: text
    content: 'Rehefa natao batisa Ravehivavy mbamin’ny ankohonany dia nangataka izy hoe: Raha ataonareo ho mahatoky amin’ny Tompo aho dia mandrosoa ao an-tranoko ka mipetraha ao. Dia naharesy lahatra anay izy.'
  - type: heading
    content: Nampidirina an-tranomaizina i Paoly sy i Silasy nefa nafahana
  '16':
  - type: text
    content: 'Raha nandeha ho any amin’ilay toerana fivavahana izahay dia nisy mpanompovavy iray nanana fanahy ratsy milaza ny ho avin’ny olona, nifanena taminay, ary ny faminaniana nataony no nahazoan’ny tompony harena be. '
  '17':
  - type: text
    content: 'Nanaraka an’i Paoly sy izahay izy ka niantsoantso hoe: Ireo lehilahy ireo dia mpanompon’Andriamanitra Avo Indrindra izay manoro lalam-pamonjena ho anareo. '
  '18':
  - type: text
    content: 'Nandritra ny andro maro no nanaovany izany. Ary sosotra i Paoly, dia nitodika taminy ka niteny tamin’ilay fanahy hoe: Mandidy anao amin’ny anaran’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' aho hiala aminy. Dia niala tamin’izany ora izany indrindra ny fanahy ratsy.'
  '19':
  - type: text
    content: 'Nony hitan’ireo tompony fa very ny fanantenany hahazoany harena dia nisambotra an’i Paoly sy i Silasy izy ka nitondra azy ho any an-tsena any amin’ireo lehibe; '
  '2':
  - type: text
    content: 'tsara laza teo amin’ny rahalahy tany Listra sy Ikonioma izy. '
  '20':
  - type: text
    content: 'ary rehefa noentiny tany amin’ireo governora izy roa lahy dia nolazainy hoe: Ireto lehilahy ireto dia mampitabataba ny tanànantsika loatra; '
  - type: text
    content: Jiosy
  - type: text
    content: ' izy ireo '
  '21':
  - type: text
    content: 'ka mampianatra fanao tsy azontsika horaisina na hatao amin’ny maha Romana antsika. '
  '22':
  - type: text
    content: 'Dia niara-nitsangana hamely azy ireo ny vahoaka; ary ireo governora dia nanaisotra ny akanjony ka nasainy nokapohina tamin’ny hazo izy ireo. '
  '23':
  - type: text
    content: 'Nony efa nokapohiny mafy dia mafy izy dia nataony tao an-tranomaizina, ka nasainy niambina azy tsara ny mpiandry tranomaizina. '
  '24':
  - type: text
    content: Rehefa nahazo teny toy izany Ralehilahy dia nataony tao amin’ny tranomaizina anatiny indrindra izy roa lahy ary ny tongony dia nobolokiny mafy tamin’ny boloky hazo.
  '25':
  - type: text
    content: 'Nony nisasaka ny alina dia nivavaka sy nihira fiderana an’Andriamanitra i Paoly sy i Silasy ka nihaino azy ny mpifatotra. '
  '26':
  - type: text
    content: 'Dia nisy horohoron-tany mafy dia mafy avy tampoka ka nihozongozona ny fototry ny tranomaizina; ary nivoha niaraka tamin’izay ny varavarana rehetra sady nivaha avokoa ny fatoran’izy rehetra. '
  '27':
  - type: text
    content: 'Taitra ny mpiandry tranomaizina ary nahita ny varavaran’ny tranomaizina nivoha, dia nanatsoaka ny sabany izy ka saika hamono tena satria nataony fa efa nandositra ny mpifatotra. '
  '28':
  - type: text
    content: 'Nefa niantso mafy i Paoly hoe: Aza mamono tena fa ato ihany izahay rehetra. '
  '29':
  - type: text
    content: 'Ary nangataka jiro izy dia niditra sady toran-kovitra ka niankohoka teo anatrehan’i Paoly sy i Silasy. '
  '3':
  - type: text
    content: 'Tian’i Paoly hoentina miaraka aminy izy ka nalainy ary noforàny noho ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' tany amin’izany tany izany, satria fantatr’izy rehetra fa Grika rainy.'
  '30':
  - type: text
    content: 'Rehefa noentiny nivoaka izy roa lahy dia hoy izy: Tompoko, inona no tokony hataoko mba hovonjena aho? '
  '31':
  - type: text
    content: 'Dia hoy izy roa lahy: Minoa an’i Jesosy Tompo dia hovonjena ianao sy ny ankohonanao. '
  '32':
  - type: text
    content: 'Dia nitory ny tenin’ny Tompo taminy sy tamin’izay rehetra tao an-tranony izy roa lahy. '
  '33':
  - type: text
    content: 'Ary nandray azy roa lahy tamin’izany ora amin’ny alina izany izy ka nanasa ny dian-kapoka taminy; dia natao batisa avy hatrany izy mbamin’ny ankohonany rehetra. '
  '34':
  - type: text
    content: Rehefa noentiny niakatra ho ao an-trano izy roa lahy dia norosoany sakafo teo anoloany ary nifaly indrindra izy mbamin’izay rehetra tao an-tranony satria efa nino an’Andriamanitra.
  '35':
  - type: text
    content: 'Nony maraina ny andro dia naniraka ny mpitan-defona ireo governora ka niteny hoe: Alefaso ireo olona ireo. '
  '36':
  - type: text
    content: 'Ary ny mpiandry tranomaizina nitatitra izany teny izany tamin’i Paoly hoe: Naniraka handefa anareo ireo governora, koa ankehitriny, mialà eto ianareo ka mandehana amin’ny fiadanana. '
  '37':
  - type: text
    content: 'Fa hoy i Paoly taminy: Efa nokapohiny tsy voatsara teo amin’ny miharihary izahay na dia Romana aza ka nataony tao an-tranomaizina, ary ankehitriny, moa mamoaka anay mangingina va izy? Tsia, fa aoka izy ireo ihany no hankaty hamoaka anay. '
  '38':
  - type: text
    content: 'Ary ny mpitan-defona nilaza izany teny izany tamin’ireo governora; dia natahotra izy ireo raha nahare fa Romana izy roa lahy. '
  '39':
  - type: text
    content: 'Dia tonga izy ka nampitony azy ireo sady namoaka azy ary niangavy azy mba handeha hiala ny tanàna. '
  '4':
  - type: text
    content: Nony nandeha nitety ny tanàna tao izy dia natolony hotandreman’ny olona ireo didy navoakan’ny Apostoly sy ny loholona
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: ' tany Jerosalema. '
  '40':
  - type: text
    content: Dia niala tao an-tranomaizina izy roa lahy ka niditra tao an-tranon’i Lidia; ary rehefa nahita ny rahalahy izy dia nampahery azy ary lasa nandeha.
  '5':
  - type: text
    content: Ary nihanahery ara-pinoana ireo fiangonana sady nihamaro isanandro.
  - type: heading
    content: Ny antson’ilay Makedoniana
  '6':
  - type: text
    content: 'Ary nandeha namakivaky ny faritany Frigia sy Galatia izy rehefa noraran’ny Fanahy Masina tsy hitory ny teny tany Azia, '
  '7':
  - type: text
    content: 'rehefa tonga tany an-tsisin’i Misia izy, dia nitady hankany Bitinia, nefa tsy navelan’ny Fanahin’i Jesosy. '
  '8':
  - type: text
    content: Dia nanamorona an’i Misia izy ka nidina nankany Troasy.
  '9':
  - type: text
    content: 'Nony alina dia nisy fahitana niseho tamin’i Paoly. Nisy lehilahy makedoniana nitsangana teo ka nangataka azy hoe: Mità mankaty Makedonia ka vonjeo izahay! '
