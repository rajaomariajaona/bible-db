document_id: ACT.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niara-niasa tamin’i Timoty i Paoly sy i Silasy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tonga tany Derbe sy Listra koa izy; ary indro, nisy mpianatra iray tao antsoina hoe Timoty, zanaky ny vehivavy jiosy izay nino, fa grika kosa ny rainy; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Rehefa nahita ny fahitana izy dia nitady handeha avy hatrany hankany Makedonia izahay, satria noheverinay fa Andriamanitra no niantso anay hitory ny Filazantsara amin’ny olona any.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanaovana batisa an’i Lidia tany Filipia
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nony niondrana an-tsambo niala tao Troasy izahay dia nizotra nankany Samotrakia ary nony ampitso dia nankany Neapolisy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Rehefa niala teo izahay dia nankany Filipia, izay tanàna voalohany amin’izany zaratanin’i Makedonia izany sady zanatany romana; ary nipetraka tao amin’izany tanàna izany andro vitsivitsy izahay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tamin’ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sabata
    - type: text
      text: ' dia nankeo ivelan’ny vavahady teo amoron’ny ony izahay satria noheverinay fa nisy toerana fivavahana teo; dia nipetraka teo izahay ka niresaka tamin’ny vehivavy vory teo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary nisy vehivavy antsoina hoe Lidia, mpivarotra lamba volomparasy, avy any an-tanànan’i Tiatira, izay nivavaka tamin’Andriamanitra. Nihaino izy ary ny Tompo nanokatra ny fony hitandrina ny teny izay nolazain’i Paoly. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Rehefa natao batisa Ravehivavy mbamin’ny ankohonany dia nangataka izy hoe: Raha ataonareo ho mahatoky amin’ny Tompo aho dia mandrosoa ao an-tranoko ka mipetraha ao. Dia naharesy lahatra anay izy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nampidirina an-tranomaizina i Paoly sy i Silasy nefa nafahana
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Raha nandeha ho any amin’ilay toerana fivavahana izahay dia nisy mpanompovavy iray nanana fanahy ratsy milaza ny ho avin’ny olona, nifanena taminay, ary ny faminaniana nataony no nahazoan’ny tompony harena be. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nanaraka an’i Paoly sy izahay izy ka niantsoantso hoe: Ireo lehilahy ireo dia mpanompon’Andriamanitra Avo Indrindra izay manoro lalam-pamonjena ho anareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nandritra ny andro maro no nanaovany izany. Ary sosotra i Paoly, dia nitodika taminy ka niteny tamin’ilay fanahy hoe: Mandidy anao amin’ny anaran’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' aho hiala aminy. Dia niala tamin’izany ora izany indrindra ny fanahy ratsy.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nony hitan’ireo tompony fa very ny fanantenany hahazoany harena dia nisambotra an’i Paoly sy i Silasy izy ka nitondra azy ho any an-tsena any amin’ireo lehibe; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'tsara laza teo amin’ny rahalahy tany Listra sy Ikonioma izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ary rehefa noentiny tany amin’ireo governora izy roa lahy dia nolazainy hoe: Ireto lehilahy ireto dia mampitabataba ny tanànantsika loatra; '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' izy ireo '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ka mampianatra fanao tsy azontsika horaisina na hatao amin’ny maha Romana antsika. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia niara-nitsangana hamely azy ireo ny vahoaka; ary ireo governora dia nanaisotra ny akanjony ka nasainy nokapohina tamin’ny hazo izy ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nony efa nokapohiny mafy dia mafy izy dia nataony tao an-tranomaizina, ka nasainy niambina azy tsara ny mpiandry tranomaizina. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Rehefa nahazo teny toy izany Ralehilahy dia nataony tao amin’ny tranomaizina anatiny indrindra izy roa lahy ary ny tongony dia nobolokiny mafy tamin’ny boloky hazo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nony nisasaka ny alina dia nivavaka sy nihira fiderana an’Andriamanitra i Paoly sy i Silasy ka nihaino azy ny mpifatotra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nisy horohoron-tany mafy dia mafy avy tampoka ka nihozongozona ny fototry ny tranomaizina; ary nivoha niaraka tamin’izay ny varavarana rehetra sady nivaha avokoa ny fatoran’izy rehetra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Taitra ny mpiandry tranomaizina ary nahita ny varavaran’ny tranomaizina nivoha, dia nanatsoaka ny sabany izy ka saika hamono tena satria nataony fa efa nandositra ny mpifatotra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nefa niantso mafy i Paoly hoe: Aza mamono tena fa ato ihany izahay rehetra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary nangataka jiro izy dia niditra sady toran-kovitra ka niankohoka teo anatrehan’i Paoly sy i Silasy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tian’i Paoly hoentina miaraka aminy izy ka nalainy ary noforàny noho ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' tany amin’izany tany izany, satria fantatr’izy rehetra fa Grika rainy.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Rehefa noentiny nivoaka izy roa lahy dia hoy izy: Tompoko, inona no tokony hataoko mba hovonjena aho? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia hoy izy roa lahy: Minoa an’i Jesosy Tompo dia hovonjena ianao sy ny ankohonanao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia nitory ny tenin’ny Tompo taminy sy tamin’izay rehetra tao an-tranony izy roa lahy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary nandray azy roa lahy tamin’izany ora amin’ny alina izany izy ka nanasa ny dian-kapoka taminy; dia natao batisa avy hatrany izy mbamin’ny ankohonany rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Rehefa noentiny niakatra ho ao an-trano izy roa lahy dia norosoany sakafo teo anoloany ary nifaly indrindra izy mbamin’izay rehetra tao an-tranony satria efa nino an’Andriamanitra.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Nony maraina ny andro dia naniraka ny mpitan-defona ireo governora ka niteny hoe: Alefaso ireo olona ireo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary ny mpiandry tranomaizina nitatitra izany teny izany tamin’i Paoly hoe: Naniraka handefa anareo ireo governora, koa ankehitriny, mialà eto ianareo ka mandehana amin’ny fiadanana. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fa hoy i Paoly taminy: Efa nokapohiny tsy voatsara teo amin’ny miharihary izahay na dia Romana aza ka nataony tao an-tranomaizina, ary ankehitriny, moa mamoaka anay mangingina va izy? Tsia, fa aoka izy ireo ihany no hankaty hamoaka anay. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary ny mpitan-defona nilaza izany teny izany tamin’ireo governora; dia natahotra izy ireo raha nahare fa Romana izy roa lahy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia tonga izy ka nampitony azy ireo sady namoaka azy ary niangavy azy mba handeha hiala ny tanàna. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nony nandeha nitety ny tanàna tao izy dia natolony hotandreman’ny olona ireo didy navoakan’ny Apostoly sy ny loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' tany Jerosalema. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Dia niala tao an-tranomaizina izy roa lahy ka niditra tao an-tranon’i Lidia; ary rehefa nahita ny rahalahy izy dia nampahery azy ary lasa nandeha.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary nihanahery ara-pinoana ireo fiangonana sady nihamaro isanandro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny antson’ilay Makedoniana
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nandeha namakivaky ny faritany Frigia sy Galatia izy rehefa noraran’ny Fanahy Masina tsy hitory ny teny tany Azia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'rehefa tonga tany an-tsisin’i Misia izy, dia nitady hankany Bitinia, nefa tsy navelan’ny Fanahin’i Jesosy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia nanamorona an’i Misia izy ka nidina nankany Troasy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nony alina dia nisy fahitana niseho tamin’i Paoly. Nisy lehilahy makedoniana nitsangana teo ka nangataka azy hoe: Mità mankaty Makedonia ka vonjeo izahay! '
