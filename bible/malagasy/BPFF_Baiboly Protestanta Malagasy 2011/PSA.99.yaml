document_id: PSA.99,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: NY TOMPO no Mpanjaka, masina Izy
  - type: text
    content: NY TOMPO no Mpanjaka! Aoka hangovitra ny firenena.
  - type: text
    content: 'Mipetraka eo amin’ny '
  - type: text
    content: kerobima
  - type: text
    content: ' Izy, mihorohoro ny tany.'
  '2':
  - type: text
    content: 'Lehibe ao '
  - type: text
    content: Ziona
  - type: text
    content: ' NY TOMPO,'
  - type: text
    content: ary misandratra ambonin’ny firenena rehetra Izy.
  '3':
  - type: text
    content: Aoka hidera ny anaranao lehibe sy mahatahotra ireo!
  - type: text
    content: Fa masina NY TOMPO!
  '4':
  - type: text
    content: Ny herin’ny mpanjaka dia izy tia rariny;
  - type: text
    content: Ianao no mampitoetra ny fahitsiana.
  - type: text
    content: Fitsarana marina no ataonao eo amin’i Jakoba.
  '5':
  - type: text
    content: Manandrata NY TOMPO Andriamanitsika ianareo
  - type: text
    content: ka miankohofa eo amin’ny fitoeran-tongony!
  - type: text
    content: Fa masina Izy!
  '6':
  - type: text
    content: I Mosesy sy i Arona izay isan’ny mpisorony
  - type: text
    content: ary i Samoela izay isan’ny mpiantso ny anarany
  - type: text
    content: dia niantso NY TOMPO ka namaly azy Izy.
  '7':
  - type: text
    content: Niteny taminy tao anatin’ny andry rahona Izy;
  - type: text
    content: nitandrina ny teny vavolombelony izy ireo,
  - type: text
    content: dia ny didy izay nomeny azy.
  '8':
  - type: text
    content: RY TOMPO Andriamanitray ô, Ianao no namaly ny nataony;
  - type: text
    content: Andriamanitra mamela ny helony Ianao,
  - type: text
    content: na dia namaly azy noho ny nataony aza.
  '9':
  - type: text
    content: Asandrato NY TOMPO Andriamanitsika
  - type: text
    content: ary miankohofa eo an-tendrombohiny masina!
  - type: text
    content: Fa masina NY TOMPO Andriamanitsika!
