document_id: PSA.99
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO no Mpanjaka, masina Izy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY TOMPO no Mpanjaka! Aoka hangovitra ny firenena.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mipetraka eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' Izy, mihorohoro ny tany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lehibe ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' NY TOMPO,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misandratra ambonin’ny firenena rehetra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aoka hidera ny anaranao lehibe sy mahatahotra ireo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa masina NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny herin’ny mpanjaka dia izy tia rariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no mampitoetra ny fahitsiana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fitsarana marina no ataonao eo amin’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Manandrata NY TOMPO Andriamanitsika ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miankohofa eo amin’ny fitoeran-tongony!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa masina Izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I Mosesy sy i Arona izay isan’ny mpisorony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary i Samoela izay isan’ny mpiantso ny anarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia niantso NY TOMPO ka namaly azy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Niteny taminy tao anatin’ny andry rahona Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nitandrina ny teny vavolombelony izy ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny didy izay nomeny azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: RY TOMPO Andriamanitray ô, Ianao no namaly ny nataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra mamela ny helony Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia namaly azy noho ny nataony aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Asandrato NY TOMPO Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miankohofa eo an-tendrombohiny masina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa masina NY TOMPO Andriamanitsika!
