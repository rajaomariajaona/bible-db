document_id: ZEC.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahavalo: Ny kalesy fitondra miady efatra'
  - type: text
    content: 'Ary natopiko indray ny masoko ka hitako fa indreo, kalesy fitondra miady efatra nivoaka avy teo anelanelan’ny tendrombohitra roa; ary tendrombohitra varahina ireo tendrombohitra ireo. '
  '10':
  - type: text
    content: 'Mandraisa avy amin’ny fananan’ny babo, dia avy amin’ny fananan’i Helday sy i Tobia ary i Jedaia, eny, mandehana ianao izao anio izao ihany ka midira ao an-tranon’i Josia, zanak’i Zefania, izay novantaniny nony vao tonga avy tany Babilona izy. '
  '11':
  - type: text
    content: 'Eny, mandraisa volafotsy sy volamena ka anaovy satroboninahitra izany dia apetraho eo an-dohan’i Josoa, zanak’i Jozadaka, mpisoronabe. '
  '12':
  - type: text
    content: 'Dia lazao aminy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Indro ny Lehilahy atao hoe Rantsana
  - type: note
    content: Zahao 3.8.
  - type: text
    content: ;
  - type: text
    content: amin’ny androny dia hitsimoka ny zava-drehetra
  - type: text
    content: sady hanao ny tempolin’NY TOMPO izy.
  '13':
  - type: text
    content: Eny, Izy no hanao ny tempolin’NY TOMPO
  - type: text
    content: ary Izy no hitondra voninahitra
  - type: text
    content: ka hipetraka sy hanapaka eo amin’ny sezafiandrianany;
  - type: text
    content: hisy mpisorona hafa koa eo amin’ny sezafiandrianany
  - type: text
    content: ary hisy fihavanana tanteraka amin’izy roa.
  '14':
  - type: text
    content: 'Ary ny satroboninahitra dia ho ao amin’ny tempolin’NY TOMPO, ho fahatsiarovana ho an’i Helema, i Tobia, i Jedaia ary i Henà, zanak’i Zefania. '
  '15':
  - type: text
    content: Ary izay lavitra dia ho avy ka hanangana ny tempolin’NY TOMPO ka ho fantatrareo fa Andriamanitra, Tompon’izao rehetra izao, no naniraka ahy ho aminareo. Dia ho tonga izany raha mazoto mihaino ny feon’NY TOMPO Andriamanitrareo ianareo.
  '2':
  - type: text
    content: 'Tamin’ny kalesy voalohany dia nisy soavaly mena; tamin’ny kalesy faharoa dia soavaly mainty; '
  '3':
  - type: text
    content: 'tamin’ny kalesy fahatelo dia soavaly fotsy; ary tamin’ny kalesy fahefatra dia soavaly sada sady matanjaka. '
  '4':
  - type: text
    content: 'Dia nanontany tamin’ilay anjely niresaka tamiko aho hoe: Inona moa ireo, tompoko? '
  '5':
  - type: text
    content: 'Ary ilay anjely namaly ahy hoe: Ireo no rivotra efatry ny lanitra izay miroso rehefa avy nijoro teo anatrehan’ny Tompon’ny tany rehetra. '
  '6':
  - type: text
    content: 'Ny kalesy misy ny soavaly mainty dia miroso mankany amin’ny tany avaratra; ny misy ny soavaly fotsy dia miroso manaraka azy; ny misy ny sada dia mivoaka mankany amin’ny tany atsimo. '
  '7':
  - type: text
    content: 'Matanjaka izy ireo ary miroso ka mitady handeha hivezivezy eny amin’ny tany; dia hoy NY TOMPO: Mandehana ianareo, miveziveze eny amin’ny tany! Dia nandeha nivezivezy teny amin’ny tany ireo kalesy. '
  '8':
  - type: text
    content: 'Dia niantso mafy tamiko NY TOMPO hoe: Indro, ireo izay mivoaka mankany amin’ny tany avaratra dia nampionona ny fahatezerako tany amin’ny tany avaratra.'
  - type: heading
    content: Ny satroboninahitra teo an-dohan’i Josoa
  '9':
  - type: text
    content: 'Ary tonga tamiko ny tenin’NY TOMPO hoe: '
