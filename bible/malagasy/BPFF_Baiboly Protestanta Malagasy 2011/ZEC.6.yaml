document_id: ZEC.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitana fahavalo: Ny kalesy fitondra miady efatra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary natopiko indray ny masoko ka hitako fa indreo, kalesy fitondra miady efatra nivoaka avy teo anelanelan’ny tendrombohitra roa; ary tendrombohitra varahina ireo tendrombohitra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’ny kalesy voalohany dia nisy soavaly mena; tamin’ny kalesy faharoa dia soavaly mainty; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tamin’ny kalesy fahatelo dia soavaly fotsy; ary tamin’ny kalesy fahefatra dia soavaly sada sady matanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanontany tamin’ilay anjely niresaka tamiko aho hoe: Inona moa ireo, tompoko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ilay anjely namaly ahy hoe: Ireo no rivotra efatry ny lanitra izay miroso rehefa avy nijoro teo anatrehan’ny Tompon’ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny kalesy misy ny soavaly mainty dia miroso mankany amin’ny tany avaratra; ny misy ny soavaly fotsy dia miroso manaraka azy; ny misy ny sada dia mivoaka mankany amin’ny tany atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Matanjaka izy ireo ary miroso ka mitady handeha hivezivezy eny amin’ny tany; dia hoy NY TOMPO: Mandehana ianareo, miveziveze eny amin’ny tany! Dia nandeha nivezivezy teny amin’ny tany ireo kalesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niantso mafy tamiko NY TOMPO hoe: Indro, ireo izay mivoaka mankany amin’ny tany avaratra dia nampionona ny fahatezerako tany amin’ny tany avaratra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny satroboninahitra teo an-dohan’i Josoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mandraisa avy amin’ny fananan’ny babo, dia avy amin’ny fananan’i Helday sy i Tobia ary i Jedaia, eny, mandehana ianao izao anio izao ihany ka midira ao an-tranon’i Josia, zanak’i Zefania, izay novantaniny nony vao tonga avy tany Babilona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, mandraisa volafotsy sy volamena ka anaovy satroboninahitra izany dia apetraho eo an-dohan’i Josoa, zanak’i Jozadaka, mpisoronabe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia lazao aminy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro ny Lehilahy atao hoe Rantsana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.8.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny androny dia hitsimoka ny zava-drehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hanao ny tempolin’NY TOMPO izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, Izy no hanao ny tempolin’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izy no hitondra voninahitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hipetraka sy hanapaka eo amin’ny sezafiandrianany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hisy mpisorona hafa koa eo amin’ny sezafiandrianany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisy fihavanana tanteraka amin’izy roa.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny satroboninahitra dia ho ao amin’ny tempolin’NY TOMPO, ho fahatsiarovana ho an’i Helema, i Tobia, i Jedaia ary i Henà, zanak’i Zefania. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary izay lavitra dia ho avy ka hanangana ny tempolin’NY TOMPO ka ho fantatrareo fa Andriamanitra, Tompon’izao rehetra izao, no naniraka ahy ho aminareo. Dia ho tonga izany raha mazoto mihaino ny feon’NY TOMPO Andriamanitrareo ianareo.
