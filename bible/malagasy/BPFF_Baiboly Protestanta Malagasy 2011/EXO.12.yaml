document_id: EXO.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Paska
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona teo amin’ny tany Ejipta hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza asianareo sisa ho tra-maraina; fa raha toa ka misy sisa tsy lany ka tra-maraina dia hodoranareo amin’ny afo izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izao no hataonareo rehefa mihinana azy: Ho voasikina ianareo, ary hisy kapa ny tongotrareo, ary ho eny an-tananareo ny tehinareo; dia hohaninareo haingana izany, fa Paska'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Paska: Fandalovana, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and 12, 13.
      marker-yv: yv-n
    - type: text
      text: ' an’NY TOMPO.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa handeha hamakivaky ny tany Ejipta amin’izany alina izany Aho ka hamono ny lahimatoa rehetra ao amin’ny tany Ejipta, hatramin’ny olona ka hatramin’ny biby fiompy. Hanao fitsarana amin’ireo andriamanitry ny Ejiptiana rehetra Aho. Izaho no TOMPO. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny ra dia ho famantarana ho anareo eo amin’ny trano izay itoeranareo. Koa raha mahita ny ra Aho dia handalo anareo fotsiny ka tsy hisy loza handringana anareo rehefa mamely ny tany Ejipta Aho.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany andro izany dia ho andro fahatsiarovana ho anareo ka hotandremanareo ho andro firavoravoana ho an’NY TOMPO; hatramin’ny taranakareo fara aman-dimby no hitandremanareo izany ho andro firavoravoana, ho lalàna maharitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fetin’ny mofo tsy misy masirasira
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hafitoana no hihinananareo mofo tsy misy masirasira. Amin’ny andro voalohany no hanesoranareo ny masirasira amin’ny tranonareo; fa na iza na iza no hihinana mofo misy masirasira manomboka amin’ny andro voalohany ka hatramin’ny fahafito dia hofongorana tsy ho eo amin’ny Israely izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny andro voalohany dia hisy fivoriana masina ho anareo, ary amin’ny andro fahafito koa dia hisy fivoriana masina. Tsy hanao raharaha akory ianareo amin’ireo andro ireo, afa-tsy izay hohanin’ny olona tsirairay, dia izany ihany no hamboarinareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hitandrina ny andron’ny mofo tsy misy masirasira ianareo, fa tamin’izany andro izany indrindra no nitondrako ny antokonareo nivoaka avy tany amin’ny tany Ejipta; koa hotandremanareo izany hatramin’ny taranakareo fara aman-dimby, ho lalàna maharitra.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny andro fahefatra amby folo amin’ny volana voalohany, amin’ny hariva, no hihinananareo mofo tsy misy masirasira, hatramin’ny harivan’ny andro fahiraika amby roapolo amin’ny volana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hafitoana no tsy hisiana masirasira ao an-tranonareo; fa na iza na iza homana izay misy masirasira dia hofongorana tsy ho eo amin’ny fiangonan’ny Israely, na vahiny na tompon-tany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ity volana ity no volana voalohany ho anareo; ho volana voalohany amin’ny taona ho anareo izany.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hihinana na inona na inona izay misy masirasira ianareo fa samy hihinana mofo tsy misy masirasira ao amin’izay itoeranareo rehetra avy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanomanana ny Paska
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso ny loholon’ny Israely rehetra i Mosesy ka hoy izy taminy: Mandehana ianareo dia makà ondry ho anareo araka ny fokom-pirenenareo avy ka vonoy ny Paska. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia makà '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hisopa
    - type: text
      text: ' iray fihina ka atsobohy amin’ny ra izay ao anatin’ny bakoly, ary ny ra izay ao anatin’ny bakoly dia ahosory amin’ny tataom-baravarana sy ny tolàna roa. Aza misy mivoaka ny varavaran’ny tranonareo ianareo mandra-paharain’ny andro. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa handeha hamely ny Ejiptiana NY TOMPO; ary raha mahita ny ra eo amin’ny tataom-baravarana sy ny tolàna roa NY TOMPO dia handalo fotsiny ny varavarana ka tsy havelany hiditra ao an-tranonareo hamely anareo ny mpandringana.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitandrina izany zavatra izany ianareo ho lalàna maharitra ho anareo sy ho an’ny taranakareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga any amin’ny tany izay homen’NY TOMPO anareo araka izay nolazainy ianareo dia tandremo izany fanompoana izany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha manontany anareo ny zanakareo hoe: Inona no anton’izao fanompoana ataonareo izao? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia holazainareo hoe: Izao dia famonoana ny Paska an’NY TOMPO, izay nandalo fotsiny ny tranon’ny Zanak’Israely tany Ejipta; raha namely ny Ejiptiana Izy dia namonjy ny tao an-tranontsika kosa.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niankohoka tamin’ny tany ny olona ka nivavaka. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandeha ny Zanak’Israely ka nanatanteraka izany. Araka izay nandidian’NY TOMPO an’i Mosesy sy i Arona no nataony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny loza fahafolo: Maty ny voalohan-teraka'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony misasakalina dia namono ny lahimatoa rehetra tany amin’ny tany Ejipta NY TOMPO, hatramin’ny lahimatoan’i Farao izay nipetraka teo ambonin’ny sezafiandrianany ka hatramin’ny lahimatoan’ny babo izay tao amin’ny tranomaizina, mbamin’izay voalohan-teraky ny biby fiompy rehetra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena ianareo amin’ny fiangonan’ny Israely manontolo hoe: Amin’ny andro fahafolo amin’ity volana ity dia aoka haka zanak’ondry na zanak’osy iray avy ny isam-pianakaviana, zanak’ondry iray avy isan-trano. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola alina dia nifoha i Farao sy ny mpanompony rehetra ary ny Ejiptiana rehetra, fa nisy fidradradradrana mafy tany Ejipta satria tsy nisy trano izay tsy nahafatesana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampiantso an’i Mosesy sy i Arona izy tamin’iny mbola alina iny ka niteny hoe: Mitsangàna, mialà eto amin’ny vahoakako ianareo sy ny Zanak’Israely ary mandehana ka manompoa NY TOMPO araka ny nolazainareo. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny ondry aman’osinareo sy ny ombinareo dia ento koa araka izay efa nolazainareo ka mandehana; ary mba tsofy rano aho!
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandodona ny olona ny Ejiptiana ka nampandeha azy haingana hiala tamin’ny tany satria hoy izy: Ho faty avokoa izahay rehetra! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia noentin’ny olona ny kobany efa voalena, raha tsy mbola tonga masirasira, sy ny vilany famolavolana koba, voafehy tamin’ny lambany teny an-tsorony.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanaraka ny tenin’i Mosesy ny Zanak’Israely ka nangataka firavaka volafotsy sy firavaka volamena ary fitafiana tamin’ny Ejiptiana. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa nataon’NY TOMPO nahita fitia teo imason’ny Ejiptiana ny olona ka nomen’ireo azy izay nangatahiny. Nofoanany tamin’izany ny Ejiptiana.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga tao Ramesesa ny Zanak’Israely ka nankany Sokota, dia lehilahy mahalia lalana tokony ho enina hetsy, afa-tsy ny zaza amam-behivavy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy olona maro samihafa firenena koa niara-niakatra taminy, ary ondry aman’osy sy omby, dia fananana be tokoa. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanendy mofo tsy nisy masirasira tamin’ny koba nohamandoina izay noentiny avy tany Ejipta izy ireo; tsy mbola tonga masirasira ilay izy satria noroahina tany Ejipta izy ireo ka tsy nahazo nitaredretra, tsy nisy fotoana hanomanana vatsy akory.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha vitsy loatra ny iray trano ka tsy mahalany zanak’ondry iray dia aoka izy sy izay namany mifanakaiky trano aminy no haka araka izay isan’ny olona; araka izay tokony ho lanin’ny olona no hifidiananareo ilay zanak’ondry.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny andro nitoeran’ny Zanak’Israely tany Ejipta dia telopolo sy efajato taona. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa tapitra ny telopolo sy efajato taona dia tamin’izany andro izany indrindra no nivoahan’ireo antoko rehetra izay an’NY TOMPO avy tany amin’ny tany Ejipta.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alina natao hotandremana ho an’NY TOMPO izany satria nitondrany azy ireo hivoaka avy tamin’ny tany Ejipta; eny, izany alina izany dia an’NY TOMPO ka hotandreman’ny Zanak’Israely rehetra hatramin’ny taranany fara aman-dimby.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsipika samihafa momba ny fankalazana ny Paska
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamin’i Mosesy sy i Arona: Izao no fitsipiky ny Paska: Tsy hisy olona hafa firenena hahazo hihinana azy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpanompolahy rehetra izay novidim-bola dia hoforana aloha vao hahazo hihinana. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vahiny sy ny mpikarama kosa dia tsy mba hihinana azy. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao amin’ny trano iray ihany no hihinanana azy; tsy hamoahanao eny alatrano akory ny hena, ary tsy hisy hotapahinareo ny taolany na dia iray aza. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fiangonan’ny Israely manontolo no hitandrina izany. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy mivahiny eo aminao ka mba te hitandrina ny Paska an’NY TOMPO dia aoka hoforana ny lehilahy rehetra eo aminy vao manatona hitandrina izany ka ho tahaka ny tompon-tany ihany izy; fa ny tsy voafora rehetra kosa dia tsy mahazo mihinana azy. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lalàna iray no ho amin’ny tompon-tany sy ny vahiny izay mitoetra eo aminareo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zanak’ondry tsy misy kilema, na zanak’osy, ary lahy izay iray taona, no halainareo; halainareo amin’ny ondry na amin’ny osy izany. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia notanterahin’ny Zanak’Israely rehetra izany. Araka izay nandidian’NY TOMPO an’i Mosesy sy i Arona no nataony. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany andro izany indrindra no nitondran’NY TOMPO ny Zanak’Israely nivoaka ny tany Ejipta araka ny antokony.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hotahirizinareo hatramin’ny andro fahefatra amby folo amin’ity volana ity izany; dia hamono azy amin’ny hariva
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izany hoe: Ny harivan’ny andro fahatelo amby folo, milenti-masoandro, amin’ny fanisantsika ny andro.'
      marker-yv: yv-n
    - type: text
      text: ' ny fiangonan’ny Israely manontolo.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hakana ny ra ka hatentina amin’ny tolanam-baravarana roa sy amin’ny tataom-baravaran’ny trano izay hihinanana azy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hohanina amin’izany alina izany ny hena; voatsatsika tamin’ny afo no hihinanana azy, miaraka amin’ny mofo tsy misy masirasira sady hampiarahina amin’ny anana mangidy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza hanina manta na voahandro amin’ny rano izany fa atsatsiho amin’ny afo mbamin’ny lohany sy ny tongony ary ny taovany. '
