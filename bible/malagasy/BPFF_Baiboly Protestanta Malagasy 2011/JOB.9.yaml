document_id: JOB.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba: Afaka hifandahatra amin’Andriamanitra va ny olona?'
  - type: text
    content: 'Dia namaly i Joba hoe:'
  '10':
  - type: text
    content: Manao zava-dehibe tsy takatry ny saina Izy;
  - type: text
    content: eny, fahagagana tsy hita isa.
  '11':
  - type: text
    content: Indro, mandalo ahy Izy nefa tsy hitako
  - type: text
    content: ary mihelina Izy nefa tsy fantatro.
  '12':
  - type: text
    content: Indro, mipaoka Izy, koa iza no mahasakana Azy?
  - type: text
    content: 'Iza no hilaza Aminy hoe: Inona no ataonao?'
  '13':
  - type: text
    content: Andriamanitra tsy mampitony ny fahatezerany;
  - type: text
    content: ny mpanampy an’i Rahaba
  - type: note
    content: 'Rahaba: biby mahatahotra, ilazana ny mpanohitra an’Andriamanitra.'
  - type: text
    content: ' aza dia mitanondrika eo ambaniny.'
  '14':
  - type: text
    content: Mainka fa izaho dia tsy mahavaly Azy
  - type: text
    content: na mahafidy teny hifandaharako Aminy;
  '15':
  - type: text
    content: fa na dia marina aza aho dia tsy hahavaly akory;
  - type: text
    content: hifona amin’Ilay manana ady amiko no hany heriko.
  '16':
  - type: text
    content: Raha mba niantso aho ka namaly ahy aza Izy
  - type: text
    content: dia tsy ho nino aho fa nihaino ny feoko Izy.
  '17':
  - type: text
    content: Fa manorotoro ahy amin’ny tafio-drivotra Izy
  - type: text
    content: ka manamaro ny ratrako tsy amin’antony
  '18':
  - type: text
    content: sady tsy avelany haka aina akory aho
  - type: text
    content: fa vokisany zava-mangidy.
  '19':
  - type: text
    content: Raha ny amin’ny hery, ny matanjaka, dia Izy izany!
  - type: text
    content: Ary raha ny amin’ny fitsarana, iza no hampiantso ahy?
  '2':
  - type: text
    content: Fantatro tokoa fa izany no izy;
  - type: text
    content: fa aiza no hahamarina ny zanak’olombelona
  - type: text
    content: eo anatrehan’Andriamanitra?
  '20':
  - type: text
    content: Na dia marina aza aho dia hanameloka ahy ihany ny vavako
  - type: text
    content: ary na dia tsy manan-tsiny aza aho dia hanao ahy ho meloka ihany Izy.
  '21':
  - type: text
    content: Marina aho nefa ataoko tsinontsinona ny aiko;
  - type: text
    content: tsy ahoako izay ho velona.
  '22':
  - type: text
    content: 'Mitovy ihany, koa izany no nilazako hoe:'
  - type: text
    content: Ny marina sy ny meloka dia samy aringany avokoa.
  '23':
  - type: text
    content: Raha misy loza mahafaty tampoka
  - type: text
    content: dia ihomehezany ny fizahan-toetra manjo ny tsy manan-tsiny.
  '24':
  - type: text
    content: Ny tany dia efa voatolotra ho eo an-tanan’ny ratsy fanahy;
  - type: text
    content: manarona ny tavan’ny mpitsara Izy.
  - type: text
    content: Raha tsy Izy no manao izany dia iza indray ary?
  '25':
  - type: text
    content: Ny androko dia haingana noho ny iraka haingam-pandeha;
  - type: text
    content: lasa ireny ka tsy nahita soa akory.
  '26':
  - type: text
    content: Mihelina tahaka ny lakana zozoro izy,
  - type: text
    content: tahaka ny voromahery mipaoka ny rembiny.
  '27':
  - type: text
    content: 'Raha hoy aho hoe: Hanadino ny fitarainako aho,'
  - type: text
    content: hitsahatra tsy hanjonitra aho ka ho miramiran-tava,
  '28':
  - type: text
    content: dia maharaiki-tahotra ahy ny fahoriako rehetra.
  - type: text
    content: Fantatro fa tsy hataonao ho afa-tsiny aho.
  '29':
  - type: text
    content: Tsy maintsy hatao ho meloka ihany aho!
  - type: text
    content: Koa nahoana aho no hanasa-tena foana?
  '3':
  - type: text
    content: Raha te hifandahatra Aminy izy
  - type: text
    content: dia tsy mahavaly teny Azy na dia iray amin’ny arivo aza.
  '30':
  - type: text
    content: Na dia mandro amin’ny orampanala aza aho
  - type: text
    content: ka manadio ny tanako amin’ny ranon-davenona
  '31':
  - type: text
    content: dia hanitrika ahy any am-pahitra miaraka amin’izay Ianao
  - type: text
    content: ka hataon’ny fitafiako ho zava-betaveta aho.
  '32':
  - type: text
    content: Fa tsy olona tahaka ahy Izy ka ho azoko valina
  - type: text
    content: mba hifanatrehanay eo amin’ny fitsarana.
  '33':
  - type: text
    content: Tsy misy mpanelanelana anay
  - type: text
    content: ka hametraka ny tanany aminay roa tonta.
  '34':
  - type: text
    content: Aoka hanaisotra ny tsorakazony amiko Izy
  - type: text
    content: ary aoka tsy hampaharaiki-tahotra ahy intsony ny fampitahorana ataony!
  '35':
  - type: text
    content: Dia hiteny aho ka tsy hatahotra Azy
  - type: text
    content: satria ho fantatro fa tsy hatahotra foana aho!
  '4':
  - type: text
    content: Lalim-pahendrena Izy sady feno hery sy tanjaka.
  - type: text
    content: Iza no nikiry nanohitra Azy ka tsy naninona?
  '5':
  - type: text
    content: Mamindra tendrombohitra Izy nefa tsy mahalala izany akory ireny.
  - type: text
    content: Mamadika azy amin’ny fahatezerany Izy,
  '6':
  - type: text
    content: mampihorohoro ny tany ho afaka amin’ny toerany Izy
  - type: text
    content: ka mihozongozona ny andriny.
  '7':
  - type: text
    content: Manome teny ny masoandro Izy ka tsy miposaka iny;
  - type: text
    content: manisy tombo-kase manafina ny kintana Izy.
  '8':
  - type: text
    content: Izy irery ihany no mamelatra ny lanitra
  - type: text
    content: sy mandia ny onjan-dranomasina;
  '9':
  - type: text
    content: manao ireo kintana lehibe Izy, dia ny Bera sy ny Telonohorefy ary ny Ikotokelimiadilaona
  - type: text
    content: mbamin’ireo kintana maro any atsimo.
