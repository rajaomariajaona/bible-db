document_id: JOB.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny navalin’i Joba: Afaka hifandahatra amin’Andriamanitra va ny olona?'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly i Joba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao zava-dehibe tsy takatry ny saina Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, fahagagana tsy hita isa.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, mandalo ahy Izy nefa tsy hitako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihelina Izy nefa tsy fantatro.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, mipaoka Izy, koa iza no mahasakana Azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Iza no hilaza Aminy hoe: Inona no ataonao?'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra tsy mampitony ny fahatezerany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanampy an’i Rahaba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Rahaba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: biby mahatahotra, ilazana ny mpanohitra an’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ' aza dia mitanondrika eo ambaniny.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mainka fa izaho dia tsy mahavaly Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mahafidy teny hifandaharako Aminy;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na dia marina aza aho dia tsy hahavaly akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hifona amin’Ilay manana ady amiko no hany heriko.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mba niantso aho ka namaly ahy aza Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho nino aho fa nihaino ny feoko Izy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa manorotoro ahy amin’ny tafio-drivotra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manamaro ny ratrako tsy amin’antony
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy avelany haka aina akory aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa vokisany zava-mangidy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ny amin’ny hery, ny matanjaka, dia Izy izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha ny amin’ny fitsarana, iza no hampiantso ahy?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantatro tokoa fa izany no izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aiza no hahamarina ny zanak’olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehan’Andriamanitra?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia marina aza aho dia hanameloka ahy ihany ny vavako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia tsy manan-tsiny aza aho dia hanao ahy ho meloka ihany Izy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina aho nefa ataoko tsinontsinona ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ahoako izay ho velona.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mitovy ihany, koa izany no nilazako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny marina sy ny meloka dia samy aringany avokoa.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha misy loza mahafaty tampoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ihomehezany ny fizahan-toetra manjo ny tsy manan-tsiny.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tany dia efa voatolotra ho eo an-tanan’ny ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manarona ny tavan’ny mpitsara Izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy Izy no manao izany dia iza indray ary?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny androko dia haingana noho ny iraka haingam-pandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lasa ireny ka tsy nahita soa akory.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihelina tahaka ny lakana zozoro izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny voromahery mipaoka ny rembiny.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha hoy aho hoe: Hanadino ny fitarainako aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitsahatra tsy hanjonitra aho ka ho miramiran-tava,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia maharaiki-tahotra ahy ny fahoriako rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantatro fa tsy hataonao ho afa-tsiny aho.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy maintsy hatao ho meloka ihany aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana aho no hanasa-tena foana?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha te hifandahatra Aminy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mahavaly teny Azy na dia iray amin’ny arivo aza.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mandro amin’ny orampanala aza aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manadio ny tanako amin’ny ranon-davenona
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanitrika ahy any am-pahitra miaraka amin’izay Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hataon’ny fitafiako ho zava-betaveta aho.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy olona tahaka ahy Izy ka ho azoko valina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hifanatrehanay eo amin’ny fitsarana.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy mpanelanelana anay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hametraka ny tanany aminay roa tonta.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hanaisotra ny tsorakazony amiko Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka tsy hampaharaiki-tahotra ahy intsony ny fampitahorana ataony!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiteny aho ka tsy hatahotra Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ho fantatro fa tsy hatahotra foana aho!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lalim-pahendrena Izy sady feno hery sy tanjaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nikiry nanohitra Azy ka tsy naninona?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamindra tendrombohitra Izy nefa tsy mahalala izany akory ireny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamadika azy amin’ny fahatezerany Izy,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampihorohoro ny tany ho afaka amin’ny toerany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mihozongozona ny andriny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manome teny ny masoandro Izy ka tsy miposaka iny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manisy tombo-kase manafina ny kintana Izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy irery ihany no mamelatra ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mandia ny onjan-dranomasina;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao ireo kintana lehibe Izy, dia ny Bera sy ny Telonohorefy ary ny Ikotokelimiadilaona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ireo kintana maro any atsimo.
