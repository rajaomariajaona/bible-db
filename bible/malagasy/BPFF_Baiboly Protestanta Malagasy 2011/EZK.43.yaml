document_id: EZK.43
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niverina tao amin’ny tempoly ny voninahitry NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary noentiny ho any amin’ny vavahady aho, dia ilay vavahady manatrika ny atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary indro, tamy ny voninahitry ny Andriamanitry ny Israely avy tany atsinanana. Ny feony dia tahaka ny firohondrohon’ny ranobe, ary ny tany dia namirapiratra azon’ny voninahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny fahitana hitako dia tahaka an’ilay hitako fony Izy tonga handrava ny tanàna; ary ireo fahitana ireo dia tahaka ny fahitana hitako teo amoron’ny ony Kebara ihany. Niankarapoka tamin’ny tany aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny voninahitr’NY TOMPO dia niditra tao amin’ny Trano, tamin’ny vavahady manatrika ny atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nisy fanahy nanainga ahy ka nitondra ahy niditra ho ao amin’ny kianja anatiny; ary indro, feno ny voninahitr’NY TOMPO ny Trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia reko fa nisy niteny tamiko avy tao amin’ny Trano; ary nisy lehilahy nitsangana teo anilako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy Izy tamiko: Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', eto no hitoeran’ny sezafiandrianako sy hitoeran’ny faladiako, izay honenako mandrakizay eto amin’ny Zanak’Israely. Tsy holotoin’ny taranak’Israely, na izy na ny mpanjakany, amin’ny fijangajangany sy amin’ny fatin’ny mpanjakany ao amin’ny fasany intsony ny anarako masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Napetrany teo anilan’ny tokonam-baravarako ny tokonam-baravaran’ireny, ary nataony teo anilan’ny tolanako ny tolanan’ireny, ka rindrina ihany no teo anelanelako sy ireny; nolotoiny tamin’ny fahavetavetana nataony ny anarako masina; izany no nahalany ringana azy tamin’ny fahatezerako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa amin’izao kosa dia aoka hariany lavitra Ahy ny fijangajangany sy ny fatin’ny mpanjakany, dia honina eo anivony mandrakizay Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ianao, ry zanak’olona, asehoy amin’ny taranak’Israely ny Trano mba hahamenatra azy ny amin’ny helony ka horefesiny ny mari-trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha menatra ny amin’izay rehetra nataony izy dia asehoy azy ny endriky ny Trano mbamin’ny fombafombany, ny fivoahana avy ao aminy, ny fidirana ho ao aminy, ny endriny rehetra ary ny didy rehetra momba azy, eny, ny endriny rehetra ary ny lalàna rehetra momba azy. Ampahafantaro azy izany sady soraty eo imasony, hitandremany ny endriny rehetra sy ny didy rehetra momba izany ka hanatanterahany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lalàna ny amin’ny Trano: Ho masina dia ho masina avokoa izay rehetra voafaritra ho azy eo an-tampon’ny tendrombohitra. Eny, izany no lalàna ny amin’ny Trano.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny alitara sy ny fanatitra samihafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no mariky ny alitara araka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ', nefa isaky ny hakiho iray dia mihoatra felatanana iray noho ny fanao: Ny fanorenany dia iray hakiho ary iray hakiho koa ny sakany, ary ny sisiny manodidina dia irain-jehy; ireo no fiorenan’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hatreo amin’ny fanorenany eo amin’ny tany ka hatramin’ny foto-drindriny ambany dia roa hakiho, ary ny sakany dia iray hakiho; ary hatreo amin’ny foto-drindrina kely ka hatramin’ny rindriny lehibe dia efatra hakiho, ary ny sakany dia iray hakiho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny fatan’ny alitara dia efatra hakiho amin’ny tapany ambony, ary misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandroka
  - type: text
    text: ' eo an-jorony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Roa amby folo hakiho ny lavan’ny fatana ary roa amby folo hakiho koa ny sakany; efamira izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fanorenany dia efatra amby folo hakiho ny lavany, efatra amby folo hakiho koa ny sakany, amin’ny lafiny efatra; ary ny sisiny manodidina dia antsasaky ny hakiho; ny haavon’ny fanorenana dia iray hakiho manodidina, ary ny zanatohatra aminy dia manatrika ny atsinanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy izy tamiko: Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', izao no lazain’NY TOMPO Andriamanitra: Izao no didy ny amin’ny alitara amin’izay andro hanaovana azy, hanaterana fanatitra dorana manontolo sy hamafazana ra aminy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' mpisorona, taranak’i Zadoka, izay manatona Ahy hanao fanompoana ho Ahy, dia homenao vantotra ombilahy iray hatao fanatitra noho ny ota, hoy NY TOMPO Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hanalanao ny rany ka hatentinao amin’ny tandrony efatra sy amin’ny zorony efatra amin’ny fanorenany ary amin’ny haingony manodidina. Izany no hataonao hanadiovana azy sy hanaovana fanavotana ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Halainao koa ny vantotra ombilahy hatao fanatitra noho ny ota ka hodorana eo amin’ny toerana voatokana ao amin’ny Trano, ivelan’ny fitoerana masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Amin’ny andro faharoa no hanateranao osilahy tsy misy kilema hatao fanatitra noho ny ota, koa izany no hanadiovana ny alitara, tahaka ny nanadiovana azy tamin’ny vantotra ombilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Rehefa vita ny fanadiovanao azy dia hanatitra vantotra ombilahy tsy misy kilema sy ondrilahy tsy misy kilema ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Haterinao eo anatrehan’NY TOMPO ireo, ary ny mpisorona dia handraraka sira eo aminy ary hanatitra azy ho fanatitra dorana manontolo ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Isanandro, mandritra ny hafitoana, no hanoloranao osilahy hatao fanatitra noho ny ota sy vantotra ombilahy ary ondrilahy izay tsy misy kilema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hafitoana no hanaovana fanavotana ho an’ny alitara sy hanadiovana azy ary hanokanana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Rehefa tapitra izany andro izany dia hiantomboka amin’ny andro fahavalo ny hanoloran’ny mpisorona ny fanatitra doranareo manontolo eo amin’ny alitara sy ny fanati-pihavananareo, dia hankasitrahako ianareo, hoy NY TOMPO Andriamanitra.
