document_id: EZK.43,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Niverina tao amin’ny tempoly ny voninahitry NY TOMPO
  - type: text
    content: 'Ary noentiny ho any amin’ny vavahady aho, dia ilay vavahady manatrika ny atsinanana. '
  '10':
  - type: text
    content: 'Ianao, ry zanak’olona, asehoy amin’ny taranak’Israely ny Trano mba hahamenatra azy ny amin’ny helony ka horefesiny ny mari-trano. '
  '11':
  - type: text
    content: 'Ary raha menatra ny amin’izay rehetra nataony izy dia asehoy azy ny endriky ny Trano mbamin’ny fombafombany, ny fivoahana avy ao aminy, ny fidirana ho ao aminy, ny endriny rehetra ary ny didy rehetra momba azy, eny, ny endriny rehetra ary ny lalàna rehetra momba azy. Ampahafantaro azy izany sady soraty eo imasony, hitandremany ny endriny rehetra sy ny didy rehetra momba izany ka hanatanterahany izany. '
  '12':
  - type: text
    content: 'Izao no lalàna ny amin’ny Trano: Ho masina dia ho masina avokoa izay rehetra voafaritra ho azy eo an-tampon’ny tendrombohitra. Eny, izany no lalàna ny amin’ny Trano.'
  - type: heading
    content: Ny alitara sy ny fanatitra samihafa
  '13':
  - type: text
    content: 'Izao no mariky ny alitara araka ny '
  - type: text
    content: hakiho
  - type: text
    content: ', nefa isaky ny hakiho iray dia mihoatra felatanana iray noho ny fanao: Ny fanorenany dia iray hakiho ary iray hakiho koa ny sakany, ary ny sisiny manodidina dia irain-jehy; ireo no fiorenan’ny alitara. '
  '14':
  - type: text
    content: 'Ary hatreo amin’ny fanorenany eo amin’ny tany ka hatramin’ny foto-drindriny ambany dia roa hakiho, ary ny sakany dia iray hakiho; ary hatreo amin’ny foto-drindrina kely ka hatramin’ny rindriny lehibe dia efatra hakiho, ary ny sakany dia iray hakiho. '
  '15':
  - type: text
    content: 'Ny fatan’ny alitara dia efatra hakiho amin’ny tapany ambony, ary misy '
  - type: text
    content: tandroka
  - type: text
    content: ' eo an-jorony. '
  '16':
  - type: text
    content: 'Roa amby folo hakiho ny lavan’ny fatana ary roa amby folo hakiho koa ny sakany; efamira izany. '
  '17':
  - type: text
    content: Ny fanorenany dia efatra amby folo hakiho ny lavany, efatra amby folo hakiho koa ny sakany, amin’ny lafiny efatra; ary ny sisiny manodidina dia antsasaky ny hakiho; ny haavon’ny fanorenana dia iray hakiho manodidina, ary ny zanatohatra aminy dia manatrika ny atsinanana.
  '18':
  - type: text
    content: 'Ary hoy izy tamiko: Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', izao no lazain’NY TOMPO Andriamanitra: Izao no didy ny amin’ny alitara amin’izay andro hanaovana azy, hanaterana fanatitra dorana manontolo sy hamafazana ra aminy: '
  '19':
  - type: text
    content: 'Ny '
  - type: text
    content: levita
  - type: text
    content: ' mpisorona, taranak’i Zadoka, izay manatona Ahy hanao fanompoana ho Ahy, dia homenao vantotra ombilahy iray hatao fanatitra noho ny ota, hoy NY TOMPO Andriamanitra. '
  '2':
  - type: text
    content: 'Ary indro, tamy ny voninahitry ny Andriamanitry ny Israely avy tany atsinanana. Ny feony dia tahaka ny firohondrohon’ny ranobe, ary ny tany dia namirapiratra azon’ny voninahiny. '
  '20':
  - type: text
    content: 'Hanalanao ny rany ka hatentinao amin’ny tandrony efatra sy amin’ny zorony efatra amin’ny fanorenany ary amin’ny haingony manodidina. Izany no hataonao hanadiovana azy sy hanaovana fanavotana ho azy. '
  '21':
  - type: text
    content: 'Halainao koa ny vantotra ombilahy hatao fanatitra noho ny ota ka hodorana eo amin’ny toerana voatokana ao amin’ny Trano, ivelan’ny fitoerana masina. '
  '22':
  - type: text
    content: 'Amin’ny andro faharoa no hanateranao osilahy tsy misy kilema hatao fanatitra noho ny ota, koa izany no hanadiovana ny alitara, tahaka ny nanadiovana azy tamin’ny vantotra ombilahy. '
  '23':
  - type: text
    content: 'Rehefa vita ny fanadiovanao azy dia hanatitra vantotra ombilahy tsy misy kilema sy ondrilahy tsy misy kilema ianao. '
  '24':
  - type: text
    content: 'Haterinao eo anatrehan’NY TOMPO ireo, ary ny mpisorona dia handraraka sira eo aminy ary hanatitra azy ho fanatitra dorana manontolo ho an’NY TOMPO. '
  '25':
  - type: text
    content: 'Isanandro, mandritra ny hafitoana, no hanoloranao osilahy hatao fanatitra noho ny ota sy vantotra ombilahy ary ondrilahy izay tsy misy kilema. '
  '26':
  - type: text
    content: 'Hafitoana no hanaovana fanavotana ho an’ny alitara sy hanadiovana azy ary hanokanana azy. '
  '27':
  - type: text
    content: Rehefa tapitra izany andro izany dia hiantomboka amin’ny andro fahavalo ny hanoloran’ny mpisorona ny fanatitra doranareo manontolo eo amin’ny alitara sy ny fanati-pihavananareo, dia hankasitrahako ianareo, hoy NY TOMPO Andriamanitra.
  '3':
  - type: text
    content: Ny fahitana hitako dia tahaka an’ilay hitako fony Izy tonga handrava ny tanàna; ary ireo fahitana ireo dia tahaka ny fahitana hitako teo amoron’ny ony Kebara ihany. Niankarapoka tamin’ny tany aho.
  '4':
  - type: text
    content: 'Ary ny voninahitr’NY TOMPO dia niditra tao amin’ny Trano, tamin’ny vavahady manatrika ny atsinanana. '
  '5':
  - type: text
    content: 'Dia nisy fanahy nanainga ahy ka nitondra ahy niditra ho ao amin’ny kianja anatiny; ary indro, feno ny voninahitr’NY TOMPO ny Trano. '
  '6':
  - type: text
    content: 'Dia reko fa nisy niteny tamiko avy tao amin’ny Trano; ary nisy lehilahy nitsangana teo anilako. '
  '7':
  - type: text
    content: 'Dia hoy Izy tamiko: Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', eto no hitoeran’ny sezafiandrianako sy hitoeran’ny faladiako, izay honenako mandrakizay eto amin’ny Zanak’Israely. Tsy holotoin’ny taranak’Israely, na izy na ny mpanjakany, amin’ny fijangajangany sy amin’ny fatin’ny mpanjakany ao amin’ny fasany intsony ny anarako masina. '
  '8':
  - type: text
    content: 'Napetrany teo anilan’ny tokonam-baravarako ny tokonam-baravaran’ireny, ary nataony teo anilan’ny tolanako ny tolanan’ireny, ka rindrina ihany no teo anelanelako sy ireny; nolotoiny tamin’ny fahavetavetana nataony ny anarako masina; izany no nahalany ringana azy tamin’ny fahatezerako. '
  '9':
  - type: text
    content: Fa amin’izao kosa dia aoka hariany lavitra Ahy ny fijangajangany sy ny fatin’ny mpanjakany, dia honina eo anivony mandrakizay Aho.
