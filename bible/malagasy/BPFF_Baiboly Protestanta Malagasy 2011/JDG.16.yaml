document_id: JDG.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Samsona sy ny vavahadin’i Gaza
  - type: text
    content: 'Nankany Gaza i Samsona ka nahita vehivavy janga teo dia niditra tao aminy. '
  '10':
  - type: text
    content: 'Dia hoy i Delila tamin’i Samsona: Indro, efa namitaka ahy ianao ka nilaza lainga tamiko. Ankehitriny, mba lazao amiko re izay hahazoana mamatotra anao. '
  '11':
  - type: text
    content: 'Dia hoy izy taminy: Raha mahazaka vaovao izay tsy mbola nampiasaina no amatorana ahy mafy dia ho tonga osa aho ka ho tahaka ny olon-kafa rehetra. '
  '12':
  - type: text
    content: 'Dia naka mahazaka vaovao i Delila ka namatorany azy izany, dia hoy izy taminy: Tonga hamely anao ny Filistina, ry Samsona! Tamin’izany dia efa nisy nanao vela-pandrika nitoetra tao amin’ny efitrano. Dia notapahin’i Samsona ho afaka tamin’ny sandriny ireny, tahaka ny fahatapahan’ireny kofehy tsy voafoly ireny.'
  '13':
  - type: text
    content: 'Dia hoy i Delila tamin’i Samsona: Mandraka ankehitriny dia mbola namitaka ahy ihany ianao ka nilaza lainga tamiko. Lazao amiko izay hahazoana mamatotra anao. Dia hoy izy taminy: Raha randraninao miaraka amin’ny lamba voatenona ny randrana fito amin’ny lohako. '
  '14':
  - type: text
    content: 'Nofeheziny tamin’ny tsatòka izany, dia hoy izy taminy: Tonga hamely anao ny Filistina, ry Samsona! Dia nifoha tamin’ny torimasony izy ka nohongotany ny tsatòka sy ny tenona. '
  '15':
  - type: text
    content: 'Dia hoy Ravehivavy taminy: Nahoana ianao no nilaza hoe: Tiako ianao, nefa ny fonao tsy amiko tsinona? Efa namitaka ahy intelo ianao izao ary tsy mbola nolazainao tamiko ihany izay itoeran’ny herinao lehibe. '
  '16':
  - type: text
    content: 'Rehefa nanjohy azy isanandro tamin’ny teniny Ravehivavy ka nahasosotra azy dia tonga leon’ny miaina izy ka naniry ho faty aza. '
  '17':
  - type: text
    content: 'Dia nambarany azy ny tao am-pony rehetra ka hoy izy taminy: Tsy mbola nokasihin-kareza ny lohako, fa Nazirita ho an’Andriamanitra hatrany an-kibon-dreniko aho. Koa raha aratana aho dia hiala amiko ny heriko, ary ho osa aho ka ho tonga tahaka ny olona rehetra.'
  '18':
  - type: text
    content: 'Rehefa hitan’i Delila fa efa nambarany azy ny tao am-pony rehetra dia nandefa iraka haka ireo andrianan’ny Filistina izy, hilaza hoe: Miakara amin’izao indray mandeha izao, fa efa nambarany ahy ny tao am-pony rehetra. Dia niakatra ho any aminy ireo andrianan’ny Filistina nitondra ny vola teny an-tanany. '
  '19':
  - type: text
    content: 'Ary nampatory an’i Samsona teo an-dohaliny Ravehivavy dia niantso lehilahy izay nanaratra ny randrana fito tamin’ny lohany; dia nanomboka nampietry azy izy satria niala taminy ny heriny. '
  '2':
  - type: text
    content: 'Ary nisy nilaza tamin’ny Gazita hoe: Tonga atỳ i Samsona. Dia nanodidina azy izy ireo ka nanao vela-pandrika mandritra ny alina teo am-bavahadin’ny tanàna ary nangina mandritra ny alina, fa hoy ireo: Rehefa maraina ny andro dia hovonointsika izy. '
  '20':
  - type: text
    content: 'Dia hoy Ravehivavy: Tonga hamely anao ny Filistina, ry Samsona! Dia nifoha tamin’ny torimasony izy ka niteny hoe: Hivoaka tahaka ny teo aloha aho ka hanetsika ny tenako. Kanjo tsy fantany fa NY TOMPO efa niala taminy. '
  '21':
  - type: text
    content: Dia nisambotra azy ny Filistina ka namotsitra ny masony dia nitondra azy nidina nankany Gaza ary namatotra azy tamin’ny gadra varahina. Nanodina ny vato fikosoham-bary tao amin’ny trano famatorana no nataony.
  - type: heading
    content: Ny asa farany nataon’i Samsona sy ny nahafatesany
  '22':
  - type: text
    content: 'Naniry indray anefa ny volon-dohany efa voaharatra. '
  '23':
  - type: text
    content: 'Ary nivory ireo lehiben’ny Filistina hamono zavatra hatao fanatitra lehibe ho an’i Dagona, andriamaniny sy hifaly. Hoy ireo:'
  - type: text
    content: Efa natolotry ny andriamanitsika eto an-tanantsika i Samsona fahavalontsika!
  '24':
  - type: text
    content: 'Rehefa nahita azy ny vahoaka dia nidera ny andriamaniny hoe:'
  - type: text
    content: Efa natolotry ny andriamanitsika eto an-tanantsika ilay fahavalontsika
  - type: text
    content: izay nanapotika ny tanintsika,
  - type: text
    content: sady nahabe maty antsika!
  '25':
  - type: text
    content: 'Rehefa faly iny ny fony dia niteny izy ireo hoe: Alao i Samsona mba hanao kilalao ho antsika! Dia nampaka an’i Samsona avy tao an-trano famatorana izy ka nanao kilalao teo anatrehan’ireo i Samsona. Nampijoroiny teo anelanelan’ny andry izy. '
  '26':
  - type: text
    content: 'Ary hoy i Samsona tamin’ny zatovo izay nitantana azy: Avelao kely aho hitsapa ny andry izay manohana ny trano mba hiankinako aminy.'
  '27':
  - type: text
    content: Ary feno lehilahy sy vehivavy ny trano, ary tao ireo andrianan’ny Filistina rehetra, ary teo an-
  - type: text
    content: tampon-trano
  - type: text
    content: ' koa nisy lehilahy sy vehivavy tokony ho telo arivo izay finaritra nijery an’i Samsona nanao kilalao. '
  '28':
  - type: text
    content: 'Ary niantso NY TOMPO i Samsona hoe: TOMPO Andriamanitra ô, mifona aminao aho, tsarovy aho ka ampaherezo izao indray mandeha izao monja, ry Andriamanitra ô, hanaovako indray mamaly ny Filistina noho ny masoko roa! '
  '29':
  - type: text
    content: 'Dia nitady hitsapa ny andry roa teo afovoany izay nanohana ny trano izy, ny iray dia tamin’ny tanany havanana, ary ny iray dia tamin’ny tanany havia, ka niankina tamin’ireo. '
  '3':
  - type: text
    content: Ary nandry mandra-paha-mamatonalina i Samsona. Dia nifoha izy nony namatonalina ka noraisiny ireo lelam-baravarana teo amin’ny vavahadin’ny tanàna mbamin’ny tolàna roa, dia nongotany mbamin’ny hidiny ka nataony teny an-tsorony dia noentiny ho any an-tampon’ny tendrombohitra izay tandrifin’i Hebrona.
  - type: heading
    content: Namadika an’i Samsona i Delila
  '30':
  - type: text
    content: 'Dia hoy i Samsona: Aoka hiara-maty amin’ny Filistina aho. Dia nioitra mafy i Samsona ka nianjera tamin’ireo lehibe sy ny vahoaka rehetra teo ny trano. Ary ny maty izay novonoiny teo amin’ny nahafatesany dia be lavitra noho izay novonoiny tamin’ny andro niainany. '
  '31':
  - type: text
    content: Ary nidina ny rahalahiny sy ny ankohonan-drainy rehetra dia naka ny fatiny ka nitondra azy niakatra ary nandevina azy teo anelanelan’i Zora sy i Estaola, tao amin’ny fasan’i Manoa rainy. Roapolo taona no nitsarany ny Israely.
  '4':
  - type: text
    content: 'Rehefa afaka izany dia nitia vehivavy iray, tany an-dohasaha Soreka, izy. Nantsoina hoe Delila izy io. '
  '5':
  - type: text
    content: 'Ary ireo andrianan’ny Filistina dia niakatra nankany amin-dRavehivavy ka niteny taminy hoe: Kolikoleo izy ka zahao izay itoeran’ny heriny lehibe sy izay hahafahanay mandresy azy ka hamatoranay azy ary hahafolaka azy; dia samy hanome anao sekela zato sy arivo avy izahay rehetra. '
  '6':
  - type: text
    content: 'Dia hoy i Delila tamin’i Samsona: Mba lazao amiko izay itoeran’ny herinao lehibe sy izay hahazoana mamatotra anao ka hahafolaka anao. '
  '7':
  - type: text
    content: 'Hoy i Samsona taminy: Raha tady vaovao fito izay tsy mbola maina no amatorany ahy dia ho tonga osa aho ka ho tahaka ny olon-kafa rehetra. '
  '8':
  - type: text
    content: 'Dia nitondran’ireo lehiben’ny Filistina tady vaovao fito izay tsy mbola maina Ravehivavy ka namatotra azy tamin’ireny. '
  '9':
  - type: text
    content: 'Tamin’izany dia efa nisy lehilahy nanao vela-pandrika ka nitoetra tao amin-dRavehivavy tao an’efitranony. Dia hoy Ravehivavy tamin’i Samsona: Tonga hamely anao ny Filistina, ry Samsona! Dia notapahiny tahaka ny fahatapahan’ny tady rongony izay efa maimbo afo ny tady. Kanefa tsy fantatra izay fiavian’ny heriny.'
