document_id: JDG.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Samsona sy ny vavahadin’i Gaza
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nankany Gaza i Samsona ka nahita vehivavy janga teo dia niditra tao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy nilaza tamin’ny Gazita hoe: Tonga atỳ i Samsona. Dia nanodidina azy izy ireo ka nanao vela-pandrika mandritra ny alina teo am-bavahadin’ny tanàna ary nangina mandritra ny alina, fa hoy ireo: Rehefa maraina ny andro dia hovonointsika izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nandry mandra-paha-mamatonalina i Samsona. Dia nifoha izy nony namatonalina ka noraisiny ireo lelam-baravarana teo amin’ny vavahadin’ny tanàna mbamin’ny tolàna roa, dia nongotany mbamin’ny hidiny ka nataony teny an-tsorony dia noentiny ho any an-tampon’ny tendrombohitra izay tandrifin’i Hebrona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Namadika an’i Samsona i Delila
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa afaka izany dia nitia vehivavy iray, tany an-dohasaha Soreka, izy. Nantsoina hoe Delila izy io. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ireo andrianan’ny Filistina dia niakatra nankany amin-dRavehivavy ka niteny taminy hoe: Kolikoleo izy ka zahao izay itoeran’ny heriny lehibe sy izay hahafahanay mandresy azy ka hamatoranay azy ary hahafolaka azy; dia samy hanome anao sekela zato sy arivo avy izahay rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy i Delila tamin’i Samsona: Mba lazao amiko izay itoeran’ny herinao lehibe sy izay hahazoana mamatotra anao ka hahafolaka anao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy i Samsona taminy: Raha tady vaovao fito izay tsy mbola maina no amatorany ahy dia ho tonga osa aho ka ho tahaka ny olon-kafa rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nitondran’ireo lehiben’ny Filistina tady vaovao fito izay tsy mbola maina Ravehivavy ka namatotra azy tamin’ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tamin’izany dia efa nisy lehilahy nanao vela-pandrika ka nitoetra tao amin-dRavehivavy tao an’efitranony. Dia hoy Ravehivavy tamin’i Samsona: Tonga hamely anao ny Filistina, ry Samsona! Dia notapahiny tahaka ny fahatapahan’ny tady rongony izay efa maimbo afo ny tady. Kanefa tsy fantatra izay fiavian’ny heriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy i Delila tamin’i Samsona: Indro, efa namitaka ahy ianao ka nilaza lainga tamiko. Ankehitriny, mba lazao amiko re izay hahazoana mamatotra anao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy izy taminy: Raha mahazaka vaovao izay tsy mbola nampiasaina no amatorana ahy mafy dia ho tonga osa aho ka ho tahaka ny olon-kafa rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia naka mahazaka vaovao i Delila ka namatorany azy izany, dia hoy izy taminy: Tonga hamely anao ny Filistina, ry Samsona! Tamin’izany dia efa nisy nanao vela-pandrika nitoetra tao amin’ny efitrano. Dia notapahin’i Samsona ho afaka tamin’ny sandriny ireny, tahaka ny fahatapahan’ireny kofehy tsy voafoly ireny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Delila tamin’i Samsona: Mandraka ankehitriny dia mbola namitaka ahy ihany ianao ka nilaza lainga tamiko. Lazao amiko izay hahazoana mamatotra anao. Dia hoy izy taminy: Raha randraninao miaraka amin’ny lamba voatenona ny randrana fito amin’ny lohako. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nofeheziny tamin’ny tsatòka izany, dia hoy izy taminy: Tonga hamely anao ny Filistina, ry Samsona! Dia nifoha tamin’ny torimasony izy ka nohongotany ny tsatòka sy ny tenona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy Ravehivavy taminy: Nahoana ianao no nilaza hoe: Tiako ianao, nefa ny fonao tsy amiko tsinona? Efa namitaka ahy intelo ianao izao ary tsy mbola nolazainao tamiko ihany izay itoeran’ny herinao lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa nanjohy azy isanandro tamin’ny teniny Ravehivavy ka nahasosotra azy dia tonga leon’ny miaina izy ka naniry ho faty aza. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nambarany azy ny tao am-pony rehetra ka hoy izy taminy: Tsy mbola nokasihin-kareza ny lohako, fa Nazirita ho an’Andriamanitra hatrany an-kibon-dreniko aho. Koa raha aratana aho dia hiala amiko ny heriko, ary ho osa aho ka ho tonga tahaka ny olona rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa hitan’i Delila fa efa nambarany azy ny tao am-pony rehetra dia nandefa iraka haka ireo andrianan’ny Filistina izy, hilaza hoe: Miakara amin’izao indray mandeha izao, fa efa nambarany ahy ny tao am-pony rehetra. Dia niakatra ho any aminy ireo andrianan’ny Filistina nitondra ny vola teny an-tanany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nampatory an’i Samsona teo an-dohaliny Ravehivavy dia niantso lehilahy izay nanaratra ny randrana fito tamin’ny lohany; dia nanomboka nampietry azy izy satria niala taminy ny heriny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy Ravehivavy: Tonga hamely anao ny Filistina, ry Samsona! Dia nifoha tamin’ny torimasony izy ka niteny hoe: Hivoaka tahaka ny teo aloha aho ka hanetsika ny tenako. Kanjo tsy fantany fa NY TOMPO efa niala taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia nisambotra azy ny Filistina ka namotsitra ny masony dia nitondra azy nidina nankany Gaza ary namatotra azy tamin’ny gadra varahina. Nanodina ny vato fikosoham-bary tao amin’ny trano famatorana no nataony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny asa farany nataon’i Samsona sy ny nahafatesany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Naniry indray anefa ny volon-dohany efa voaharatra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nivory ireo lehiben’ny Filistina hamono zavatra hatao fanatitra lehibe ho an’i Dagona, andriamaniny sy hifaly. Hoy ireo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa natolotry ny andriamanitsika eto an-tanantsika i Samsona fahavalontsika!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Rehefa nahita azy ny vahoaka dia nidera ny andriamaniny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa natolotry ny andriamanitsika eto an-tanantsika ilay fahavalontsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nanapotika ny tanintsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nahabe maty antsika!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa faly iny ny fony dia niteny izy ireo hoe: Alao i Samsona mba hanao kilalao ho antsika! Dia nampaka an’i Samsona avy tao an-trano famatorana izy ka nanao kilalao teo anatrehan’ireo i Samsona. Nampijoroiny teo anelanelan’ny andry izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy i Samsona tamin’ny zatovo izay nitantana azy: Avelao kely aho hitsapa ny andry izay manohana ny trano mba hiankinako aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary feno lehilahy sy vehivavy ny trano, ary tao ireo andrianan’ny Filistina rehetra, ary teo an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-trano
  - type: text
    text: ' koa nisy lehilahy sy vehivavy tokony ho telo arivo izay finaritra nijery an’i Samsona nanao kilalao. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary niantso NY TOMPO i Samsona hoe: TOMPO Andriamanitra ô, mifona aminao aho, tsarovy aho ka ampaherezo izao indray mandeha izao monja, ry Andriamanitra ô, hanaovako indray mamaly ny Filistina noho ny masoko roa! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nitady hitsapa ny andry roa teo afovoany izay nanohana ny trano izy, ny iray dia tamin’ny tanany havanana, ary ny iray dia tamin’ny tanany havia, ka niankina tamin’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia hoy i Samsona: Aoka hiara-maty amin’ny Filistina aho. Dia nioitra mafy i Samsona ka nianjera tamin’ireo lehibe sy ny vahoaka rehetra teo ny trano. Ary ny maty izay novonoiny teo amin’ny nahafatesany dia be lavitra noho izay novonoiny tamin’ny andro niainany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary nidina ny rahalahiny sy ny ankohonan-drainy rehetra dia naka ny fatiny ka nitondra azy niakatra ary nandevina azy teo anelanelan’i Zora sy i Estaola, tao amin’ny fasan’i Manoa rainy. Roapolo taona no nitsarany ny Israely.
