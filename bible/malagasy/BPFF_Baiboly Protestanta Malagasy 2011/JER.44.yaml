document_id: JER.44,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Filazana loza ho an’ireo mponin’ny Joda monina any amin’ny tany Ejipta
  - type: text
    content: 'Ny teny izay tonga tamin’i Jeremia ho amin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' rehetra izay nonina tany amin’ny tany Ejipta, dia izay nonina tao Migdola, tao Tapanesa, tao Nofa, ary tany amin’ny tany Patrosa.'
  '10':
  - type: text
    content: 'Tsy mbola torotoro fo izy na dia mandraka androany aza, sady tsy natahotra na nandeha araka ny lalànako sy ny didiko, izay napetrako teo anoloanareo sy teo anoloan’ny razanareo. '
  '11':
  - type: text
    content: 'Koa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hanandrina anareo Aho hahatonga loza haharingana ny Joda rehetra. '
  '12':
  - type: text
    content: 'Ary halaiko ny sisa amin’ny Joda, izay nikiry hankany amin’ny tany Ejipta hivahiny any, ka ho lany ritra izy rehetra; any amin’ny tany Ejipta no hahalavoany, samy ho ringan’ny sabatra sy ny mosary, eny, izy rehetra na ny kely na ny lehibe dia samy ho fatin-tsabatra sy mosary ka ho tonga fianianana sy figagana sy fanozonana ary fandatsa. '
  '13':
  - type: text
    content: 'Fa hovaliko toy ny namaliako an’i Jerosalema, izay monina any amin’ny tany Ejipta, dia amin’ny sabatra sy ny mosary ary ny areti-mandringana. '
  '14':
  - type: text
    content: Ary ny sisa amin’ny Joda izay lasa nivahiny any Ejipta dia tsy hisy ho afa-mandositra ka ho tafaverina any amin’ny tanin’ny Joda, izay niriny hiverenana mba honenany indray, afa-tsy izay vitsy sendra afa-mandositra ihany.
  - type: heading
    content: Ireo fanatitra natolotra ho an’ny mpanjakavavin’ny lanitra
  '15':
  - type: text
    content: 'Ary ny lehilahy rehetra izay nahalala fa ny vadiny efa nandoro ditin-kazo manitra ho an’ny andriamanitra hafa, sy ny vehivavy rehetra izay nitsangana teo, dia vahoaka be dia be, ary ny olona rehetra izay nonina tany amin’ny tany Ejipta, tao Patrosa, dia namaly an’i Jeremia hoe: '
  '16':
  - type: text
    content: 'Raha ny amin’ilay teny voalazanao taminay tamin’ny anaran’NY TOMPO dia tsy hihaino anao izahay. '
  '17':
  - type: text
    content: 'Fa hotanterahinay tokoa ny teny rehetra izay naloaky ny vavanay, dia ny handoro ditin-kazo manitra ho an’ny mpanjakavavin’ny lanitra sy ny hanidina fanatitra aidina ho azy, toy ny efa nataonay sy ny razanay sy ny mpanjakanay ary ny mpanapaka anay tany amin’ny tanànan’ny Joda sy teny amin’ny lalamben’i Jerosalema; fa fahizany dia voky hanina izahay sady nambinina ary tsy nahita loza. '
  '18':
  - type: text
    content: 'Fa hatramin’izay nitsaharanay tsy nandoro ditin-kazo manitra ho an’ny mpanjakavavin’ny lanitra sy tsy nanidinana fanatitra aidina ho azy izay dia saika tsy nanana na inona na inona akory izahay sady ringan’ny sabatra sy ny mosary. '
  '19':
  - type: text
    content: Ary raha nandoro ditin-kazo manitra ho an’ny mpanjakavavin’ny lanitra izahay sy nanidina fanatitra aidina ho azy dia moa tsy fantatry ny vadinay va ny nanaovanay mofo hasiana ny sariny sy ny nanidinanay fanatitra aidina ho azy?
  '2':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Efa nahita ny loza rehetra izay nataoko nihatra tamin’i Jerosalema sy ny tanànan’ny Joda rehetra ianareo; ary indro, efa tany lao ireo ankehitriny ka tsy misy olona monina intsony ao aminy, '
  '20':
  - type: text
    content: 'Ary hoy i Jeremia tamin’ny olona rehetra, na ny lehilahy na ny vehivavy, dia ny olona rehetra izay namaly azy: '
  '21':
  - type: text
    content: 'Ny nandoroanareo ditin-kazo manitra tany an-tanànan’ny Joda sy tany an-dalamben’i Jerosalema, dia ianareo sy ny razanareo sy ny mpanjakanareo sy ny mpanapaka anareo mbamin’ny vahoaka, moa tsy notsarovan’NY TOMPO va izany, ary tsy tao an-tsainy va? '
  '22':
  - type: text
    content: 'Koa dia tsy nahalefitra intsony NY TOMPO noho ny ratsy nataonareo sy noho ny fahavetavetana nataonareo; koa izany no nanaovana ny taninareo ho lao sy ho figagana ary ho fanozonana ka tsy misy mponina, tahaka ny amin’izao anio izao. '
  '23':
  - type: text
    content: Noho ny nandoroanareo ditin-kazo manitra sy ny nanotanareo tamin’NY TOMPO, fa tsy nihaino ny feon’NY TOMPO ianareo, na nandeha araka ny lalànany sy ny didiny ary ny teny vavolombelony, dia izany no nahatonga izao loza izao taminareo tahaka ny amin’izao anio izao.
  '24':
  - type: text
    content: 'Hoy koa i Jeremia tamin’ny olona rehetra sy tamin’ny vehivavy rehetra: Mihainoa ny tenin’NY TOMPO, ry Joda rehetra, izay atỳ amin’ny tany Ejipta: '
  '25':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Samy niteny tamin’ny vavanareo ianareo sy ny vadinareo sady nanatanteraka tamin’ny tananareo ka niteny hoe: Hanefa tokoa izay efa nivoadianay izahay ka handoro ditin-kazo manitra ho an’ny mpanjakavavin’ny lanitra sy hanidina fanatitra aidina ho azy; eny, hefainareo tokoa ny voadinareo sady hataonareo tanteraka. '
  '26':
  - type: text
    content: 'Koa henoinareo ny tenin’NY TOMPO, ry Joda rehetra, izay monina atỳ amin’ny tany Ejipta: Indro Aho efa nianiana tamin’ny anarako lehibe, hoy NY TOMPO, fa tsy hotononin’ny vavan’ny lehilahy amin’ny Joda manerana ny tany Ejipta intsony ny anarako ka hilazany hoe: Raha velona koa Andriamanitra Tompo. '
  '27':
  - type: text
    content: Indro, miambina anareo Aho hahatonga loza fa tsy soa; ary ny lehilahy rehetra amin’ny Joda, izay atỳ amin’ny tany Ejipta, dia ho ringan’ny sabatra sy ny mosary mandra-pahalany ritra azy.
  '28':
  - type: text
    content: 'Ary izay afaka mandositra ny sabatra dia ho tafaverina avy atỳ amin’ny tany Ejipta ho any amin’ny tanin’ny Joda, ho vitsy foana anefa ireny; ary ny sisa amin’ny Joda rehetra izay mankany amin’ny tany Ejipta hivahiny any dia hahafantatra izay ho to teny, na ho Izaho, na ho izy. '
  '29':
  - type: text
    content: 'Ary izao no famantarana ho anareo, hoy NY TOMPO, fa hovaliko eto amin’ity tany ity ianareo, mba hahafantaranareo fa to tokoa ny teniko hahatonga loza aminareo: '
  '3':
  - type: text
    content: 'noho ny ratsy nataony nampahatezitra Azy tamin’ny nandehanany nandoro ditin-kazo manitra sy nanompo andriamanitra hafa izay tsy fantany, na izy, na ianareo, na ny razanareo. '
  '30':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Indro, i Farao-Hofra, mpanjakan’i Ejipta, dia hatolotro eo an-tanan’ny fahavalony sy eo an-tanan’izay mitady ny ainy, toy ny efa nanolorako an’i Zedekia, mpanjakan’ny Joda, ho eo an-tanan’i Nebokadnezara, mpanjakan’i Babilona, izay fahavalony nitady ny ainy.'
  '4':
  - type: text
    content: 'Ary naniraka ny mpaminany mpanompoko rehetra taminareo Aho, eny, nifoha vao maraina Aho ka naniraka azy hiteny hoe: Miangavy anareo aho, aza manao izany fahavetavetana halako izany. '
  '5':
  - type: text
    content: 'Nefa tsy nihaino izy na nanongilana ny sofiny hialany amin’ny haratsiany tsy handoro ditin-kazo manitra ho an’ny andriamanitra hafa. '
  '6':
  - type: text
    content: 'Dia naidina ny fahavinirako sy ny fahatezerako, eny, nandoro ny tanànan’ny Joda sy ny teny amin’ny lalamben’i Jerosalema izany ka rava sy lao ireny tahaka ny amin’izao anio izao. '
  '7':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao, Andriamanitry ny Israely: Ahoana no anaovanareo izao ratsy lehibe maningotra ny ainareo izao, haharingana ny lehilahy sy ny vehivavy, ny ankizy madinika sy ny zaza minono ao amin’ny Joda ka tsy hisy miangana anareo? '
  '8':
  - type: text
    content: 'Mampahatezitra Ahy ianareo amin’ny asan’ny tananareo sy amin’ny andoroana ditin-kazo manitra ho an’ny andriamanitra hafa any amin’ny tany Ejipta izay alehanareo hivahiniana. Izany no haharingana anareo ka hahatonga anareo ho fanozonana sy ho fandatsa any amin’ny firenena rehetra ambonin’ny tany? '
  '9':
  - type: text
    content: 'Moa hadinonareo va ny ratsy nataon’ny razanareo sy ny mpanjakan’ny Joda sy ny vadiny ary ny tenanareo sy ny vadinareo, dia izay nataony tany amin’ny tanin’ny Joda sy teny amin’ny lalamben’i Jerosalema? '
