document_id: JOS.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandresen’ny Israely ireo mpanjakan’ny Amorita
  - type: text
    content: 'Rehefa ren’i Adony-Zedeka, mpanjakan’i Jerosalema, fa azon’i Josoa ka nataony zavatra voaozona i Ay; ary araka izay nataony tamin’i Jeriko sy ny mpanjakany no nataony tamin’i Ay sy ny mpanjakany sady nanao fihavanana tamin’ny Israely ny mponina tany Gibeona ka tafatoetra eo aminy, '
  '10':
  - type: text
    content: 'Ary NY TOMPO nampifanaritaka ireo teo anoloan’ny Israely; namely ireo tany Gibeona ny Israely ka nahafaty olona maro be sady nanenjika azy tamin’ny fiakarana mankany Bety-Horona ka namely azy hatrany Azeka ka hatrany Makeda. '
  '11':
  - type: text
    content: Nony nandositra teo anoloan’ny Israely teo am-pidinan’i Bety-Horona izy ireo dia nandatsaka havandra vaventy taminy avy tany an-danitra hatrany Azeka NY TOMPO ka nahafaty azy. Be lavitra ny matin’ny havandra noho izay novonoin’ny Zanak’Israely tamin’ny sabatra.
  '12':
  - type: text
    content: 'Tamin’io andro nanoloran’NY TOMPO ny Amorita teo anoloan’ny Zanak’Israely io i Josoa dia niteny tamin’NY TOMPO teo imason’ny Zanak’Israely hoe:'
  - type: text
    content: Ry masoandro, mijanòna eo ambonin’i Gibeona;
  - type: text
    content: Ary, ianao kosa, ry volana, dia mijanòna any an-dohasahan’i Aialona.
  '13':
  - type: text
    content: Dia nijanona ny masoandro, ary nijanona koa ny volana,
  - type: text
    content: mandra-pamalin’ny olona ny fahavalony.
  - type: text
    content: Tsy efa voasoratra ao amin’ny Bokin’i Jasara
  - type: note
    content: 'Jasara: Ilay mahitsy.'
  - type: text
    content: ' va izany? Dia nijanona teo afovoan’ny lanitra ny masoandro ka tsy nandroso hilentika saika indray andro manontolo. '
  '14':
  - type: text
    content: 'Ary tsy nisy andro tahaka izany, na tany alohany, na tatỳ aorianany, izay nihainoan’NY TOMPO ny feon’olona; fa NY TOMPO niady ho an’ny Israely. '
  '15':
  - type: text
    content: Avy eo i Josoa sy ny Israely rehetra dia niverina nankany an-toby tany Gilgala.
  - type: heading
    content: Novonoin’i Josoa ireo mpanjaka dimy izay resy
  '16':
  - type: text
    content: 'Ary nandositra ny mpanjaka dimy ka niery tao anatin’ny zohy any Makeda. '
  '17':
  - type: text
    content: 'Dia nolazaina tamin’i Josoa hoe: Indreo, miery ao anatin’ilay zohy any Makeda ny mpanjaka dimy. '
  '18':
  - type: text
    content: 'Ary hoy i Josoa: Manakodiava vato lehibe hatampina ny vavan’ny zohy ary asio olona eo anoloany hiambina azy; '
  '19':
  - type: text
    content: 'nefa aza mijanona ianareo, fa manenjeha ny fahavalonareo ka mameleza ny vodilalana; aza avela ho tafiditra any an-tanànany ireny, fa efa natolotry NY TOMPO Andriamanitrareo eo an-tananareo. '
  '2':
  - type: text
    content: 'dia raiki-tahotra indrindra izy satria tanàna lehibe i Gibeona, tahaka ny tanàn-dehibe iray ao amin’ny fanjakan’ny mpanjaka, sady lehibe noho Ay, ary nahery daholo ny lehilahy tao. '
  '20':
  - type: text
    content: 'Ary voaringan’i Josoa sy ny Zanak’Israely ireny mandra-pahalany ritra azy ka izay afa-nandositra no lasa niditra tany amin’ny tanàna mimanda. '
  '21':
  - type: text
    content: Dia niverina soa amantsara ho any amin’i Josoa teo an-toby tany Makeda ny vahoaka rehetra; ary tsy nisy sahy nanao vava ratsy tamin’ny Zanak’Israely intsony.
  '22':
  - type: text
    content: 'Ary hoy indray i Josoa: Sokafy ny vavan’ny zohy ka avoahy tao an-johy ireo mpanjaka dimy ireo hankaty amiko. '
  '23':
  - type: text
    content: 'Dia nataon’ny olona izany ka navoakany avy tao an-johy ireo mpanjaka dimy ireo ho eo aminy, dia ny mpanjakan’i Jerosalema, ny mpanjakan’i Hebrona, ny mpanjakan’i Jarmota, ny mpanjakan’i Lakisy ary ny mpanjakan’i Eglona. '
  '24':
  - type: text
    content: 'Rehefa navoaka tao ireo mpanjaka ireo ka noentina ho eo amin’i Josoa dia niantso ny lehilahy rehetra amin’ny Israely i Josoa ka niteny tamin’ny mpitarika ny mpiady izay teo aminy hoe: Manatòna ka ataovy eo amin’ny vozon’ireto mpanjaka ireto ny tongotrareo. Dia nanatona ireo ka nanao ny tongony teo amin’ny vozon’ireo. '
  '25':
  - type: text
    content: 'Ary hoy i Josoa taminy: Aza matahotra na mivadi-po; mahereza sy matanjaha; fa toy izao no hataon’NY TOMPO amin’ny fahavalonareo rehetra izay iadianareo. '
  '26':
  - type: text
    content: 'Rehefa afaka izany dia namely ireo i Josoa ka nahafaty azy ary nahantony tamin’ny hazo dimy ny fatiny; dia nihantona tamin’ny hazo ireo, mandra-paharivan’ny andro. '
  '27':
  - type: text
    content: Tamin’ny filentehan’ny masoandro kosa dia nasain’i Josoa nesorina tamin’ny hazo izy ireo ka nariana tao anatin’ilay zohy niereny ary nasiana vato lehibe teo amin’ny vavan’ny zohy ka mbola ao izany mandraka androany.
  - type: heading
    content: Ny nahazoan’i Josoa an’i Kanana atsimo rehetra
  '28':
  - type: text
    content: Azon’i Josoa koa i Makeda tamin’izany andro izany ka nasiany tamin’ny lelan-tsabatra izy sy ny mpanjakany. Naringany avokoa ny olona rehetra tao ka tsy nasiany niangana na dia iray akory aza. Tahaka izay efa nataony tamin’ny mpanjakan’i Jeriko no nataony tamin’ny mpanjakan’i Makeda koa.
  '29':
  - type: text
    content: 'Ary i Josoa sy ny Israely rehetra niaraka taminy dia niala tany Makeda ka nankany Libna ary namely azy; '
  '3':
  - type: text
    content: 'Koa nandefa iraka i Adony-Zedeka, mpanjakan’i Jerosalema, ho any amin’i Hohama, mpanjakan’i Hebrona, i Pirama, mpanjakan’i Jarmota, i Jafia, mpanjakan’i Lakisy, ary i Debira, mpanjakan’i Eglona, hiteny hoe: '
  '30':
  - type: text
    content: dia natolotry NY TOMPO teo an-tanan’ny Israely koa izy sy ny mpanjakany ka nasiany tamin’ny lelan-tsabatra izy mbamin’ny olona rehetra tao. Tsy nasiany niangana na dia iray akory aza; tahaka izay efa nataony tamin’ny mpanjakan’i Jeriko no nataony tamin’ny mpanjakany koa.
  '31':
  - type: text
    content: 'Ary niala tany Libna i Josoa sy ny Israely rehetra niaraka taminy ka nankany Lakisy, dia nitoby tandrifiny ka namely azy. '
  '32':
  - type: text
    content: 'Natolotry NY TOMPO teo an-tanan’ny Israely koa i Lakisy ka azony tamin’ny andro faharoa, dia nasiany tamin’ny lelan-tsabatra izy sy ny olona rehetra tao, tahaka izay rehetra efa nataony tamin’i Libna koa. '
  '33':
  - type: text
    content: Ary niakatra i Horama, mpanjakan’i Gezera, hamonjy an’i Lakisy; dia nasian’i Josoa izy sy ny vahoakany mandra-paharingany.
  '34':
  - type: text
    content: 'Niala tany Lakisy indray i Josoa sy ny Israely rehetra teo aminy ka nankany Eglona, dia nitoby tandrifiny ka namely azy, '
  '35':
  - type: text
    content: dia azony tamin’izany andro izany koa izy ka nasiany tamin’ny lelan-tsabatra; ary ny olona rehetra tao dia nataony zavatra voaozona tamin’io andro io ihany, tahaka izay rehetra efa nataony tamin’i Lakisy.
  '36':
  - type: text
    content: 'Niakatra niala tany Eglona i Josoa sy ny Israely rehetra teo aminy ka nankany Hebrona ary namely azy, '
  '37':
  - type: text
    content: dia azony koa izy ka nasiany tamin’ny lelan-tsabatra izy sy ny mpanjakany sy ny tanànany rehetra ary ny olona rehetra tao. Tsy nasiany niangana na dia iray akory aza, tahaka izay rehetra efa nataony tamin’i Eglona; nataony zavatra voaozona avokoa izy sy ny olona rehetra tao.
  '38':
  - type: text
    content: 'Ary niverina i Josoa sy ny Israely rehetra teo aminy ka nankany Debira ary namely azy, '
  '39':
  - type: text
    content: dia azony koa izy sy ny mpanjakany ary ny tanànany rehetra; ary nasiany tamin’ny lelan-tsabatra izy ka nataony zavatra voaozona avokoa ny olona rehetra tao. Tsy nasiany niangana na dia iray akory aza, tahaka izay efa nataony tamin’i Hebrona, dia toy izany koa no nataony tamin’i Debira sy ny mpanjakany, tahaka izay efa nataony tamin’i Libna sy ny mpanjakany koa.
  '4':
  - type: text
    content: 'Miakara atỳ amiko ka manampia ahy, hamelezantsika an’i Gibeona; fa efa nanao fihavanana tamin’i Josoa sy ny Zanak’Israely izy. '
  '40':
  - type: text
    content: 'Ary nasian’i Josoa ny tany rehetra sy ny mpanjakany rehetra, dia ny tany amin’ny havoana, tany Negeva, tany Sefela ary ny tany am-pototry ny tendrombohitra. Tsy nasiany niangana ireny fa nataony zavatra voaozona avokoa ny manam-pofonaina rehetra, araka ny didin’NY TOMPO, Andriamanitry ny Israely. '
  '41':
  - type: text
    content: 'Nasian’i Josoa izy ireo hatrany Kadesy-Barnea ka hatrany Gaza ary ny tany Gosena rehetra hatrany Gibeona. '
  '42':
  - type: text
    content: 'Ary ireo mpanjaka rehetra ireo sy ny taniny dia azon’i Josoa indray mandeha satria NY TOMPO, Andriamanitry ny Israely, no niady ho an’ny Israely. '
  '43':
  - type: text
    content: Dia niverina ho any an-toby tany Gilgala i Josoa sy ny Israely rehetra niaraka taminy.
  '5':
  - type: text
    content: Ary niangona ireo mpanjaka dimy tamin’ny Amorita ireo, dia ny mpanjakan’i Jerosalema, ny mpanjakan’i Hebrona, ny mpanjakan’i Jarmota, ny mpanjakan’i Lakisy, ary ny mpanjakan’i Eglona, ka niakatra izy sy ny miaramilany rehetra dia nitoby tandrifin’i Gibeona ka namely azy.
  '6':
  - type: text
    content: 'Ary nandefa iraka ho any amin’i Josoa teo an-toby tany Gilgala ny mponina tao Gibeona mba hiteny hoe: Aza mampiketraka ny tananao tsy hamonjy ny mpanomponao; miakara haingana ho atỳ aminay ary vonjeo sy ampio izahay fa miangona hamely anay ny mpanjakan’ny Amorita rehetra izay monina any amin’ny tany havoana. '
  '7':
  - type: text
    content: Dia niakatra niala tany Gilgala i Josoa sy ny mpanafika rehetra tao aminy, dia ny lehilahy mahery rehetra.
  '8':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Josoa: Aza matahotra azy fa efa natolotra eo an-tananao izy ka tsy hisy hahajanona eo anoloanao izy na dia iray akory aza. '
  '9':
  - type: text
    content: 'Dia tonga tampoka tamin’ireo i Josoa fa nanao lava alina avy tany Gilgala izy. '
