document_id: JOS.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandresen’ny Israely ireo mpanjakan’ny Amorita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa ren’i Adony-Zedeka, mpanjakan’i Jerosalema, fa azon’i Josoa ka nataony zavatra voaozona i Ay; ary araka izay nataony tamin’i Jeriko sy ny mpanjakany no nataony tamin’i Ay sy ny mpanjakany sady nanao fihavanana tamin’ny Israely ny mponina tany Gibeona ka tafatoetra eo aminy, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia raiki-tahotra indrindra izy satria tanàna lehibe i Gibeona, tahaka ny tanàn-dehibe iray ao amin’ny fanjakan’ny mpanjaka, sady lehibe noho Ay, ary nahery daholo ny lehilahy tao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa nandefa iraka i Adony-Zedeka, mpanjakan’i Jerosalema, ho any amin’i Hohama, mpanjakan’i Hebrona, i Pirama, mpanjakan’i Jarmota, i Jafia, mpanjakan’i Lakisy, ary i Debira, mpanjakan’i Eglona, hiteny hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Miakara atỳ amiko ka manampia ahy, hamelezantsika an’i Gibeona; fa efa nanao fihavanana tamin’i Josoa sy ny Zanak’Israely izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary niangona ireo mpanjaka dimy tamin’ny Amorita ireo, dia ny mpanjakan’i Jerosalema, ny mpanjakan’i Hebrona, ny mpanjakan’i Jarmota, ny mpanjakan’i Lakisy, ary ny mpanjakan’i Eglona, ka niakatra izy sy ny miaramilany rehetra dia nitoby tandrifin’i Gibeona ka namely azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nandefa iraka ho any amin’i Josoa teo an-toby tany Gilgala ny mponina tao Gibeona mba hiteny hoe: Aza mampiketraka ny tananao tsy hamonjy ny mpanomponao; miakara haingana ho atỳ aminay ary vonjeo sy ampio izahay fa miangona hamely anay ny mpanjakan’ny Amorita rehetra izay monina any amin’ny tany havoana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia niakatra niala tany Gilgala i Josoa sy ny mpanafika rehetra tao aminy, dia ny lehilahy mahery rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Josoa: Aza matahotra azy fa efa natolotra eo an-tananao izy ka tsy hisy hahajanona eo anoloanao izy na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia tonga tampoka tamin’ireo i Josoa fa nanao lava alina avy tany Gilgala izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary NY TOMPO nampifanaritaka ireo teo anoloan’ny Israely; namely ireo tany Gibeona ny Israely ka nahafaty olona maro be sady nanenjika azy tamin’ny fiakarana mankany Bety-Horona ka namely azy hatrany Azeka ka hatrany Makeda. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nony nandositra teo anoloan’ny Israely teo am-pidinan’i Bety-Horona izy ireo dia nandatsaka havandra vaventy taminy avy tany an-danitra hatrany Azeka NY TOMPO ka nahafaty azy. Be lavitra ny matin’ny havandra noho izay novonoin’ny Zanak’Israely tamin’ny sabatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’io andro nanoloran’NY TOMPO ny Amorita teo anoloan’ny Zanak’Israely io i Josoa dia niteny tamin’NY TOMPO teo imason’ny Zanak’Israely hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry masoandro, mijanòna eo ambonin’i Gibeona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary, ianao kosa, ry volana, dia mijanòna any an-dohasahan’i Aialona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nijanona ny masoandro, ary nijanona koa ny volana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pamalin’ny olona ny fahavalony.
- type: usfm
  marker: m
  children:
  - type: text
    text: Tsy efa voasoratra ao amin’ny Bokin’i Jasara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jasara: Ilay mahitsy.'
    marker-yv: yv-n
  - type: text
    text: ' va izany? Dia nijanona teo afovoan’ny lanitra ny masoandro ka tsy nandroso hilentika saika indray andro manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tsy nisy andro tahaka izany, na tany alohany, na tatỳ aorianany, izay nihainoan’NY TOMPO ny feon’olona; fa NY TOMPO niady ho an’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Avy eo i Josoa sy ny Israely rehetra dia niverina nankany an-toby tany Gilgala.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Novonoin’i Josoa ireo mpanjaka dimy izay resy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nandositra ny mpanjaka dimy ka niery tao anatin’ny zohy any Makeda. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nolazaina tamin’i Josoa hoe: Indreo, miery ao anatin’ilay zohy any Makeda ny mpanjaka dimy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy i Josoa: Manakodiava vato lehibe hatampina ny vavan’ny zohy ary asio olona eo anoloany hiambina azy; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'nefa aza mijanona ianareo, fa manenjeha ny fahavalonareo ka mameleza ny vodilalana; aza avela ho tafiditra any an-tanànany ireny, fa efa natolotry NY TOMPO Andriamanitrareo eo an-tananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary voaringan’i Josoa sy ny Zanak’Israely ireny mandra-pahalany ritra azy ka izay afa-nandositra no lasa niditra tany amin’ny tanàna mimanda. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia niverina soa amantsara ho any amin’i Josoa teo an-toby tany Makeda ny vahoaka rehetra; ary tsy nisy sahy nanao vava ratsy tamin’ny Zanak’Israely intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy indray i Josoa: Sokafy ny vavan’ny zohy ka avoahy tao an-johy ireo mpanjaka dimy ireo hankaty amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nataon’ny olona izany ka navoakany avy tao an-johy ireo mpanjaka dimy ireo ho eo aminy, dia ny mpanjakan’i Jerosalema, ny mpanjakan’i Hebrona, ny mpanjakan’i Jarmota, ny mpanjakan’i Lakisy ary ny mpanjakan’i Eglona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Rehefa navoaka tao ireo mpanjaka ireo ka noentina ho eo amin’i Josoa dia niantso ny lehilahy rehetra amin’ny Israely i Josoa ka niteny tamin’ny mpitarika ny mpiady izay teo aminy hoe: Manatòna ka ataovy eo amin’ny vozon’ireto mpanjaka ireto ny tongotrareo. Dia nanatona ireo ka nanao ny tongony teo amin’ny vozon’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy i Josoa taminy: Aza matahotra na mivadi-po; mahereza sy matanjaha; fa toy izao no hataon’NY TOMPO amin’ny fahavalonareo rehetra izay iadianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa afaka izany dia namely ireo i Josoa ka nahafaty azy ary nahantony tamin’ny hazo dimy ny fatiny; dia nihantona tamin’ny hazo ireo, mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tamin’ny filentehan’ny masoandro kosa dia nasain’i Josoa nesorina tamin’ny hazo izy ireo ka nariana tao anatin’ilay zohy niereny ary nasiana vato lehibe teo amin’ny vavan’ny zohy ka mbola ao izany mandraka androany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahazoan’i Josoa an’i Kanana atsimo rehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Azon’i Josoa koa i Makeda tamin’izany andro izany ka nasiany tamin’ny lelan-tsabatra izy sy ny mpanjakany. Naringany avokoa ny olona rehetra tao ka tsy nasiany niangana na dia iray akory aza. Tahaka izay efa nataony tamin’ny mpanjakan’i Jeriko no nataony tamin’ny mpanjakan’i Makeda koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary i Josoa sy ny Israely rehetra niaraka taminy dia niala tany Makeda ka nankany Libna ary namely azy; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: dia natolotry NY TOMPO teo an-tanan’ny Israely koa izy sy ny mpanjakany ka nasiany tamin’ny lelan-tsabatra izy mbamin’ny olona rehetra tao. Tsy nasiany niangana na dia iray akory aza; tahaka izay efa nataony tamin’ny mpanjakan’i Jeriko no nataony tamin’ny mpanjakany koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary niala tany Libna i Josoa sy ny Israely rehetra niaraka taminy ka nankany Lakisy, dia nitoby tandrifiny ka namely azy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Natolotry NY TOMPO teo an-tanan’ny Israely koa i Lakisy ka azony tamin’ny andro faharoa, dia nasiany tamin’ny lelan-tsabatra izy sy ny olona rehetra tao, tahaka izay rehetra efa nataony tamin’i Libna koa. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary niakatra i Horama, mpanjakan’i Gezera, hamonjy an’i Lakisy; dia nasian’i Josoa izy sy ny vahoakany mandra-paharingany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Niala tany Lakisy indray i Josoa sy ny Israely rehetra teo aminy ka nankany Eglona, dia nitoby tandrifiny ka namely azy, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: dia azony tamin’izany andro izany koa izy ka nasiany tamin’ny lelan-tsabatra; ary ny olona rehetra tao dia nataony zavatra voaozona tamin’io andro io ihany, tahaka izay rehetra efa nataony tamin’i Lakisy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Niakatra niala tany Eglona i Josoa sy ny Israely rehetra teo aminy ka nankany Hebrona ary namely azy, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: dia azony koa izy ka nasiany tamin’ny lelan-tsabatra izy sy ny mpanjakany sy ny tanànany rehetra ary ny olona rehetra tao. Tsy nasiany niangana na dia iray akory aza, tahaka izay rehetra efa nataony tamin’i Eglona; nataony zavatra voaozona avokoa izy sy ny olona rehetra tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary niverina i Josoa sy ny Israely rehetra teo aminy ka nankany Debira ary namely azy, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: dia azony koa izy sy ny mpanjakany ary ny tanànany rehetra; ary nasiany tamin’ny lelan-tsabatra izy ka nataony zavatra voaozona avokoa ny olona rehetra tao. Tsy nasiany niangana na dia iray akory aza, tahaka izay efa nataony tamin’i Hebrona, dia toy izany koa no nataony tamin’i Debira sy ny mpanjakany, tahaka izay efa nataony tamin’i Libna sy ny mpanjakany koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary nasian’i Josoa ny tany rehetra sy ny mpanjakany rehetra, dia ny tany amin’ny havoana, tany Negeva, tany Sefela ary ny tany am-pototry ny tendrombohitra. Tsy nasiany niangana ireny fa nataony zavatra voaozona avokoa ny manam-pofonaina rehetra, araka ny didin’NY TOMPO, Andriamanitry ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Nasian’i Josoa izy ireo hatrany Kadesy-Barnea ka hatrany Gaza ary ny tany Gosena rehetra hatrany Gibeona. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary ireo mpanjaka rehetra ireo sy ny taniny dia azon’i Josoa indray mandeha satria NY TOMPO, Andriamanitry ny Israely, no niady ho an’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Dia niverina ho any an-toby tany Gilgala i Josoa sy ny Israely rehetra niaraka taminy.
