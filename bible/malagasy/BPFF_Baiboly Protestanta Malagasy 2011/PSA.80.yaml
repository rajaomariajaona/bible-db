document_id: PSA.80
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mihainoa, ry Mpiandry ny Israely!
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Al-shoshanim-edot. Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ry Mpiandry ny Israely ô, mihainoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao izay mitarika an’i Josefa toy ny andian’ondry!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao, izay mipetraka eo amin’ny kerobima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misehoa ka mamirapirata!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fohazy ny herinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anoloan’i Efraima sy i Benjamina ary i Manase
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka avia hamonjy anay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Andriamanitra ô, ampodio izahay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampamirapirato ny tavanao mba ho voavonjy izahay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pahoviana no hanetroka amin’ny vavaka ataon’ny olonao ny fahatezeranao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mampihinana azy mofo lenan-dranomaso Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampisotro azy ranomaso tovozina an-kapoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ataonao antom-pifandirana amin’ny mifanila fonenana aminay izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahavalonay dia mifaly handatsa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ry Andriamanitra, Tompon’izao rehetra izao ô, ampodio izahay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampamirapirato ny tavanao mba ho voavonjy izahay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nisy voaloboka nafindranao avy tany Ejipta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nandroaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' Ianao ka namboly azy kosa.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nitevy teo alohany Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia namaka lalina izy ka nameno ny tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: nanaloka ny tendrombohitra ny alokalony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanaloka ny sederan’Andriamanitra ny sampany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nampisandrahaka ny rantsany hatramin’ny ranomasina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sakeliny hatramin’ny ony Eofrata.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahoana no noravanao ny fefiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka anotazan’izay rehetra mandalo eny an-dalana izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny lambo avy any an’ala dia mitrongy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay bibidia any an-tsaha no mandany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ry Andriamanitra, Tompon’izao rehetra izao ô, miverena!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsinjovy avy any an-danitra ka jereo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vangio ity voaloboka ity!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Arovy izay nambolen’ny tananao ankavanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny zanaka izay nampaherezinao ho Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Voadotry ny afo izy sady voakapa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fongotry ny fananaran’ny tavanao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka ny tananao ho amin’ny lehilahy izay eo ankavananao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny zanak’olombelona izay nampaherezinao ho Anao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia tsy hihemotra hiala Aminao izahay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Velomy izahay dia hiantso ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ry Andriamanitra, Tompon’izao rehetra izao ô, ampodio izahay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampamirapirato ny tavanao mba ho voavonjy izahay!
