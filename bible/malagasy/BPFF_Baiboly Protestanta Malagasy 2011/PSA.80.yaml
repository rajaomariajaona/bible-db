document_id: PSA.80,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mihainoa, ry Mpiandry ny Israely!
  - type: text
    content: Ho an’ny mpiventy hira. Al-shoshanim-edot. Salamo nataon’i Asafa.
  - type: text
    content: Ry Mpiandry ny Israely ô, mihainoa,
  - type: text
    content: Ianao izay mitarika an’i Josefa toy ny andian’ondry!
  - type: text
    content: Ianao, izay mipetraka eo amin’ny kerobima,
  - type: text
    content: misehoa ka mamirapirata!
  '10':
  - type: text
    content: nanaloka ny tendrombohitra ny alokalony
  - type: text
    content: ary nanaloka ny sederan’Andriamanitra ny sampany.
  '11':
  - type: text
    content: Nampisandrahaka ny rantsany hatramin’ny ranomasina izy
  - type: text
    content: ary ny sakeliny hatramin’ny ony Eofrata.
  '12':
  - type: text
    content: Nahoana no noravanao ny fefiny
  - type: text
    content: ka anotazan’izay rehetra mandalo eny an-dalana izy?
  '13':
  - type: text
    content: Ny lambo avy any an’ala dia mitrongy azy
  - type: text
    content: ary izay bibidia any an-tsaha no mandany azy.
  '14':
  - type: text
    content: Ry Andriamanitra, Tompon’izao rehetra izao ô, miverena!
  - type: text
    content: Tsinjovy avy any an-danitra ka jereo!
  - type: text
    content: Vangio ity voaloboka ity!
  '15':
  - type: text
    content: Arovy izay nambolen’ny tananao ankavanana
  - type: text
    content: sy ny zanaka izay nampaherezinao ho Anao.
  '16':
  - type: text
    content: Voadotry ny afo izy sady voakapa;
  - type: text
    content: fongotry ny fananaran’ny tavanao izy.
  '17':
  - type: text
    content: Aoka ny tananao ho amin’ny lehilahy izay eo ankavananao,
  - type: text
    content: dia amin’ny zanak’olombelona izay nampaherezinao ho Anao!
  '18':
  - type: text
    content: Dia tsy hihemotra hiala Aminao izahay.
  - type: text
    content: Velomy izahay dia hiantso ny anaranao.
  '19':
  - type: text
    content: Ry Andriamanitra, Tompon’izao rehetra izao ô, ampodio izahay!
  - type: text
    content: Ampamirapirato ny tavanao mba ho voavonjy izahay!
  '2':
  - type: text
    content: Fohazy ny herinao
  - type: text
    content: eo anoloan’i Efraima sy i Benjamina ary i Manase
  - type: text
    content: ka avia hamonjy anay!
  '3':
  - type: text
    content: Andriamanitra ô, ampodio izahay!
  - type: text
    content: Ampamirapirato ny tavanao mba ho voavonjy izahay!
  '4':
  - type: text
    content: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô,
  - type: text
    content: mandra-pahoviana no hanetroka amin’ny vavaka ataon’ny olonao ny fahatezeranao?
  '5':
  - type: text
    content: Mampihinana azy mofo lenan-dranomaso Ianao
  - type: text
    content: ary mampisotro azy ranomaso tovozina an-kapoaka.
  '6':
  - type: text
    content: Ataonao antom-pifandirana amin’ny mifanila fonenana aminay izahay
  - type: text
    content: ary ny fahavalonay dia mifaly handatsa.
  '7':
  - type: text
    content: Ry Andriamanitra, Tompon’izao rehetra izao ô, ampodio izahay!
  - type: text
    content: Ampamirapirato ny tavanao mba ho voavonjy izahay!
  '8':
  - type: text
    content: Nisy voaloboka nafindranao avy tany Ejipta;
  - type: text
    content: 'nandroaka ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' Ianao ka namboly azy kosa.'
  '9':
  - type: text
    content: Nitevy teo alohany Ianao
  - type: text
    content: dia namaka lalina izy ka nameno ny tany;
