document_id: 1CO.13,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitiavana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia miteny amin’ny fitenin’ny olona sy ny anjely aza aho, kanefa tsy manana fitiavana, dia varahina maneno sy kipantsona mikarantsana ihany aho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa rehefa tonga ny tanteraka dia tsy hisy sombintsombiny intsony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fony mbola zaza aho dia niteny toy ny zaza, nihevitra toy ny zaza, nisaina toy ny zaza; fa nony efa lehibe aho dia nariako ny fahazazana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ankehitriny isika dia mizaha ao amin’ny fitaratra ka tsy mahita tsara fa manjavozavo; fa rahatrizay dia hahita mifanatrika; ankehitriny dia sombintsombiny ihany no fantatro; fa rahatrizay dia ho fantatro tsara toy izay nahafantarana ahy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny dia ireto telo ireto no mitoetra: Ny finoana, ny fanantenana, ny fitiavana; fa ny fitiavana no lehibe indrindra amin’ireo.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia manana ny fanahin’ny faminaniana aza aho ka mahalala ny zavamiafina rehetra sady manana ny fahalalana rehetra, ary na dia manana ny finoana rehetra aza aho ka mahafindra tendrombohitra, kanefa tsy manana fitiavana, dia tsinontsinona aho. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na dia omeko ho an’ny mahantra aza ny fananako rehetra, ary na dia atolotro hodorana aza ny tenako, kanefa tsy manana fitiavana aho, dia tsy mahasoa ahy akory izany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fitiavana dia mahari-po sady mora fanahy; ny fitiavana dia tsy mialona, tsy mirehareha, tsy mieboebo, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy manao izay tsy mahamendrika, tsy mitady ho an’ny tenany, tsy mora sosotra, tsy manao otri-po, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy mifaly amin’ny tsy fahamarinana fa miara-mifaly amin’ny fahamarinana kosa, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mandefitra ny zavatra rehetra, mino ny zavatra rehetra, manantena ny zavatra rehetra, maharitra ny zavatra rehetra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fitiavana dia tsy ho levona mandrakizay; fa raha ny faminaniana dia ho levona; raha ny fiteny tsy fantatra dia hitsahatra; raha ny fahalalana dia ho foana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa sombintsombiny ny fahalalantsika ary sombintsombiny ny faminaniantsika; '
