document_id: 2TI.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Paoly, apostolin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy noho ny sitrapon’Andriamanitra mba ho mpitory ny teny fikasana milaza ny fiainana izay ao amin’i Kristy Jesosy, '
  '10':
  - type: text
    content: Naharihary izany ankehitriny
  - type: text
    content: tamin’ny nisehoan’i Kristy Jesosy, Mpamonjy antsika,
  - type: text
    content: izay nahafoana ny herin’ny fahafatesana,
  - type: text
    content: koa ny Filazantsara no nampisehoany mazava ny fiainana sy ny tsy fahalovana mandrakizay.
  '11':
  - type: text
    content: 'Ny amin’io Filazantsara io no nanendrena ahy ho mpitory sy Apostoly ary mpampianatra ny '
  - type: text
    content: Jentilisa
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ary noho izany koa no iaretako izao zavatra izao, koa tsy menatra aho satria fantatro Izy izay inoako, ary matoky aho fa Izy dia mahatahiry ilay zavatra natolony ahy mandra-piavin’izay andro izay.
  '13':
  - type: text
    content: 'Tano amin’ny finoana sy ny fitiavana ao amin’i Kristy Jesosy ny mariky ny teny tsy misy kilema izay efa renao tamiko. '
  '14':
  - type: text
    content: Ilay zavatra tsara natolotra anao dia tahirizo amin’ny fampaherezan’ny Fanahy Masina izay mitoetra ao anatintsika.
  - type: heading
    content: Mahatoky ry Onesiforosy sy ny ankohonany
  '15':
  - type: text
    content: 'Fantatrao fa efa nahafoy ahy izay rehetra any Azia; isan’ireny i Figelo sy i Hermogena. '
  '16':
  - type: text
    content: 'Homen’ny Tompo famindrampo anie ny ankohonan’i Onesiforosy satria namelombelona ny fanahiko matetika sady tsy nahamenatra azy ny gadrako; '
  '17':
  - type: text
    content: 'fa raha tatỳ Roma izy dia nitady ahy fatratra ka hitany aho. '
  '18':
  - type: text
    content: Ny Tompo anie hampahita azy famindrampo avy amin’ny Tompo amin’izay andro izay. Ary fantatrao tsara fa be dia be ny fanompoana nataony tamiko tany Efesosy.
  '2':
  - type: text
    content: 'no mamangy an’i Timoty, zanako malala: Ho aminao anie ny fahasoavana sy ny famindrampo ary ny fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy Tompontsika!'
  - type: heading
    content: Fankasitrahana an’Andriamanitra
  '3':
  - type: text
    content: 'Misaotra an’Andriamanitra izay tompoiko araka ny nataon’ny razako amin’ny fieritreretana madio aho; fa tsy manam-pitsaharana ny fahatsiarovako anao amin’ny fivavahako andro aman’alina; '
  '4':
  - type: text
    content: 'ary maniry hahita anao aho mba ho feno ny fifaliako satria tsaroako ny ranomasonao; '
  '5':
  - type: text
    content: fa nisy nahatsiarovako ny finoana tsy mihatsaravelatsihy izay ao anatinao, izay nitoetra taloha tao amin’i Loisa renibenao sy i Eonika reninao, ary matoky aho fa ao aminao koa izany.
  - type: heading
    content: Ho mpiombona fahoriana amiko noho ny Filazantsara
  '6':
  - type: text
    content: 'Noho izany dia mampahatsiaro anao aho mba hamelomanao ny fanomezam-pahasoavana avy amin’Andriamanitra, izay ao anatinao tamin’ny nametrahako ny tanako taminao. '
  '7':
  - type: text
    content: 'Fa tsy nomen’Andriamanitra fanahin’ny fahosana isika fa fanahin’ny hery sy ny fitiavana ary ny fahononan-tena. '
  '8':
  - type: text
    content: Koa aza menatra ny ho vavolombelon’ny Tompontsika ianao na amiko izay mpifatony. Fa aoka ianao ho mpiombona fahoriana amiko noho ny Filazantsara araka ny herin’Andriamanitra,
  '9':
  - type: text
    content: dia izay namonjy antsika
  - type: text
    content: sy niantso antsika tamin’ny fiantsoana masina,
  - type: text
    content: tsy araka ny asantsika
  - type: text
    content: fa araka ny fikasany sy ny fahasoavany
  - type: text
    content: 'izay nomena antsika tao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy'
  - type: text
    content: hatry ny fony fahagola.
