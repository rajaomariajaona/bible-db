document_id: 2TI.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I Paoly, apostolin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy noho ny sitrapon’Andriamanitra mba ho mpitory ny teny fikasana milaza ny fiainana izay ao amin’i Kristy Jesosy, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Naharihary izany ankehitriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny nisehoan’i Kristy Jesosy, Mpamonjy antsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nahafoana ny herin’ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ny Filazantsara no nampisehoany mazava ny fiainana sy ny tsy fahalovana mandrakizay.
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny amin’io Filazantsara io no nanendrena ahy ho mpitory sy Apostoly ary mpampianatra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary noho izany koa no iaretako izao zavatra izao, koa tsy menatra aho satria fantatro Izy izay inoako, ary matoky aho fa Izy dia mahatahiry ilay zavatra natolony ahy mandra-piavin’izay andro izay.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tano amin’ny finoana sy ny fitiavana ao amin’i Kristy Jesosy ny mariky ny teny tsy misy kilema izay efa renao tamiko. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ilay zavatra tsara natolotra anao dia tahirizo amin’ny fampaherezan’ny Fanahy Masina izay mitoetra ao anatintsika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahatoky ry Onesiforosy sy ny ankohonany
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fantatrao fa efa nahafoy ahy izay rehetra any Azia; isan’ireny i Figelo sy i Hermogena. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Homen’ny Tompo famindrampo anie ny ankohonan’i Onesiforosy satria namelombelona ny fanahiko matetika sady tsy nahamenatra azy ny gadrako; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'fa raha tatỳ Roma izy dia nitady ahy fatratra ka hitany aho. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny Tompo anie hampahita azy famindrampo avy amin’ny Tompo amin’izay andro izay. Ary fantatrao tsara fa be dia be ny fanompoana nataony tamiko tany Efesosy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'no mamangy an’i Timoty, zanako malala: Ho aminao anie ny fahasoavana sy ny famindrampo ary ny fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy Tompontsika!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fankasitrahana an’Andriamanitra
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Misaotra an’Andriamanitra izay tompoiko araka ny nataon’ny razako amin’ny fieritreretana madio aho; fa tsy manam-pitsaharana ny fahatsiarovako anao amin’ny fivavahako andro aman’alina; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ary maniry hahita anao aho mba ho feno ny fifaliako satria tsaroako ny ranomasonao; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: fa nisy nahatsiarovako ny finoana tsy mihatsaravelatsihy izay ao anatinao, izay nitoetra taloha tao amin’i Loisa renibenao sy i Eonika reninao, ary matoky aho fa ao aminao koa izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ho mpiombona fahoriana amiko noho ny Filazantsara
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Noho izany dia mampahatsiaro anao aho mba hamelomanao ny fanomezam-pahasoavana avy amin’Andriamanitra, izay ao anatinao tamin’ny nametrahako ny tanako taminao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa tsy nomen’Andriamanitra fanahin’ny fahosana isika fa fanahin’ny hery sy ny fitiavana ary ny fahononan-tena. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa aza menatra ny ho vavolombelon’ny Tompontsika ianao na amiko izay mpifatony. Fa aoka ianao ho mpiombona fahoriana amiko noho ny Filazantsara araka ny herin’Andriamanitra,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: dia izay namonjy antsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy niantso antsika tamin’ny fiantsoana masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy araka ny asantsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa araka ny fikasany sy ny fahasoavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay nomena antsika tao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatry ny fony fahagola.
