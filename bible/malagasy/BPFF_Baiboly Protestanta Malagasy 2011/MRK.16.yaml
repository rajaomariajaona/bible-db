document_id: MRK.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitsanganan’i Jesosy tamin’ny maty
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 28.1-8; Lio 24.1-11; Jao 20.1-2
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa lasa ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sabata
    - type: text
      text: ' dia nandeha nividy zavamanitra i Maria Magdalena sy i Salome ary i Maria, renin’i Jakoba, mba hoentiny hanosorana ny fatin’i Jesosy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nandeha i Maria ka nilaza tamin’ireo izay efa nomba an’i Jesosy, izay mbola nisaona sy nitomany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary izy ireo, na dia nandre aza fa velona Izy sady efa hitan-dRavehivavy, dia mbola tsy nety nino ihany.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Taorianan’izany Jesosy dia niseho tamin’ny endrika hafa tamin’ny roa lahy namany, izay nankany an-tsaha. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izy ireo koa dia nandeha nilaza tamin’ireo namany hafa; kanefa na ireo koa aza tsy ninoany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Rehefa afaka izany dia niseho tamin’ny iraika amby folo lahy Jesosy, raha nipetraka nisakafo izy ireo; ary nanome tsiny azy ireo Izy noho ny tsy finoany sy ny hamafin’ny fony, satria tsy nino ireo izay nahita Azy efa tafatsangana izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy Izy taminy: Mandehana any amin’izao tontolo izao ianareo ka mitoria ny Filazantsara amin’ny olombelona rehetra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izay mino sy atao batisa no hovonjena, fa izay tsy mety mino no hohelohina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary izao famantarana izao no hanaraka izay mino: Handroaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' amin’ny anarako izy; hiteny amin’ny fiteny izay tsy mbola hainy izy; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: handray menarana izy, na dia misotro zava-mahafaty aza izy dia tsy hampaninona azy izany; hametra-tanana amin’ny marary izy dia ho sitrana ireny.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary Jesosy Tompo, rehefa avy niteny tamin’izy ireo, dia nampiakarina ho any an-danitra ka mipetraka eo ankavanan’Andriamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nony marainan’ny andro voalohany amin’ny herinandro dia nankany amin’ny fasana izy ireo raha vao niposaka ny masoandro. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa izy ireo kosa dia lasa ka nitoriteny manerana ny tontolo, ary ny Tompo niara-niasa taminy ka nanamarina ny teny tamin’ny famantarana nampombaina azy. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary niresaka izy ireo hoe: Iza re no hanampy antsika hanakodia ny vato hiala amin’ny varavaran’ny fasana? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa nony nitraka izy ireo dia indro, hitany fa efa voakodia niala ny vato, nefa lehibe ilay vato. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary raha niditra tao anatin’ny fasana izy ireo dia nahita zatovo iray nipetraka teo amin’ny ankavanana, niakanjo akanjo fotsy, dia raiki-tahotra izy ireo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa hoy ilay zatovo taminy: Aza matahotra ianareo; Jesosy avy any Nazareta izay voahombo tamin’ny hazofijaliana no tadiavinareo; efa nitsangana Izy; tsy ato Izy; jereo fa teo no nametrahana Azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Koa mandehana ianareo dia lazao amin’ny mpianany sy i Petera fa mialoha anareo any Galilia Izy. Any no hahitanareo Azy, araka izay nolazainy taminareo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia nandeha izy ireo ka lasa nandositra niala tao amin’ny fasana, fa toran-kovitra sady natahotra. Ary tsy mba nilaza na inona na inona tamin’olona izy satria natahotra.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Rehefa tafatsangana tamin’ny marainan’ny andro voalohany amin’ny herinandro Jesosy dia niseho voalohany tamin’i Maria Magdalena, ilay namoahany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' fito, Izy. '
