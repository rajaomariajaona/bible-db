document_id: ISA.58,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fifadian-kanina ankasitrahan’NY TOMPO
  - type: text
    content: Ezaho mafy ny antsonao
  - type: text
    content: fa aza atao moramora!
  - type: text
    content: Asandrato ny feonao ho tahaka ny an’ny anjomara
  - type: text
    content: ka ambarao amin’ny oloko ny fahadisoany
  - type: text
    content: ary amin’ny taranak’i Jakoba ny fahotany!
  '10':
  - type: text
    content: ary afoinao ho an’ny noana
  - type: text
    content: izay hanina tianao
  - type: text
    content: ka mahavoky ny ory ianao,
  - type: text
    content: dia hiposaka ao amin’ny maizina ny fahazavanao
  - type: text
    content: ary ho tonga tahaka ny mitataovovonana ny haizim-pitonao.
  '11':
  - type: text
    content: NY TOMPO hitari-dalana anao mandrakariva
  - type: text
    content: sady hahavoky anao na dia ao amin’ny tany karankaina aza
  - type: text
    content: ary hampatanjaka ny taolanao koa.
  - type: text
    content: Dia ho tahaka ny saha vonton-drano ianao
  - type: text
    content: ary ho tahaka ny loharano miboiboika izay tsy mety ritra.
  '12':
  - type: text
    content: Izay taranakao no hanangana ny efa rava ela,
  - type: text
    content: hamboarinao ny naorina hatry ny fony fahagola;
  - type: text
    content: ary ianao dia hatao hoe mpanamboatra ny rava,
  - type: text
    content: mpamelon-dalana
  - type: text
    content: hahatonga ny tany ho azo onenana.
  - type: heading
    content: Ny Sabata ankasitrahan’NY TOMPO
  '13':
  - type: text
    content: Raha miaro ny tongotrao amin’ny Sabata ianao
  - type: text
    content: ka tsy manao izay tianao amin’ny androko masina,
  - type: text
    content: ary miantso ny Sabata hoe Fahafinaretana
  - type: text
    content: ary nohamasinin’NY TOMPO ka Mendrika hohajaina,
  - type: text
    content: sady manome voninahitra azy
  - type: text
    content: ka tsy mandeha amin’ny lalanao,
  - type: text
    content: na manao izay tianao
  - type: text
    content: na miteniteny foana,
  '14':
  - type: text
    content: dia hiravoravo amin’NY TOMPO ianao,
  - type: text
    content: ary hasandratro eny amin’ny havoana amin’ny tany ianao,
  - type: text
    content: sy hofahanako amin’ny lovan’i Jakoba rainao,
  - type: text
    content: fa ny vavan’NY TOMPO no efa niteny.
  '2':
  - type: text
    content: Mitady Ahy isanandro isanandro izy,
  - type: text
    content: ary ny hahalala ny lalako no sitrany,
  - type: text
    content: tahaka ny firenena efa nanao ny marina
  - type: text
    content: ka tsy nahafoy ny fitsipik’Andriamaniny;
  - type: text
    content: manontany Amiko ny fitsipiky ny fahamarinana izy
  - type: text
    content: ary maniry hanakaiky an’Andriamanitra.
  '3':
  - type: text
    content: Nahoana izahay no mifady hoy izy
  - type: text
    content: nefa tsy hitanao?
  - type: text
    content: Nahoana izahay no mampahory ny tenanay
  - type: text
    content: nefa tsy ahoanao?
  - type: text
    content: Indro fa amin’ny andro fifadianareo aza
  - type: text
    content: dia mbola ny tianareo ihany no ataonareo,
  - type: text
    content: ary ny mpiasa rehetra ao aminareo dia mbola ampahorinareo.
  '4':
  - type: text
    content: Indro, ny hiady sy ny hifanditra no anton’ny ifadianareo
  - type: text
    content: ary ny hamely amin’ny totohondrin’ny faharatsiana;
  - type: text
    content: izao fifadianareo izao
  - type: text
    content: dia tsy andrenesana ny feonareo any amin’ny avo.
  '5':
  - type: text
    content: Moa fifadiana toy izany va no ankasitrahako,
  - type: text
    content: dia andro hampahorian’ny olona tena?
  - type: text
    content: Ny hampiondrika ny lohany tahaka ny zozoro
  - type: text
    content: sy ny hamelatra lamba fisaonana rarahan-davenona ho fandrianany va?
  - type: text
    content: Moa izany va no ataonao hoe fifadiana
  - type: text
    content: sy andro ankasitrahan’NY TOMPO?
  '6':
  - type: text
    content: 'Tsy izao va no fifadiana izay ankasitrahako:'
  - type: text
    content: Ny hamaha ny famatoran’ny faharatsiana,
  - type: text
    content: ny hanaboraka ny fehin’ny zioga,
  - type: text
    content: ny handefa ny ampahorina ho afaka
  - type: text
    content: ary ny hanapatapaka ny zioga rehetra?
  '7':
  - type: text
    content: Moa tsy ny hizara ny mofonao ho an’ny noana va
  - type: text
    content: sy ny hampiantrano ny ory manjenjena
  - type: text
    content: ary ny mba hanafianao izay hitanao mitanjaka
  - type: text
    content: ka tsy hihirim-belona amin’ny iray ra aminao ianao?
  '8':
  - type: text
    content: Fa raha izany dia hiposaka tahaka ny fahazavan’ny maraina ny fahazavanao
  - type: text
    content: ary ho tonga haingana ny fahasitrananao;
  - type: text
    content: ny fahamarinanao no hialoha lalana anao
  - type: text
    content: ary ny voninahitry NY TOMPO no ho vodilalanao.
  '9':
  - type: text
    content: Amin’izany dia hiantso ianao
  - type: text
    content: ary hamaly NY TOMPO;
  - type: text
    content: eny, hanandratra ny feonao ianao
  - type: text
    content: 'ary hiteny Izy hoe: Inty Aho!'
  - type: text
    content: Raha esorinao tsy ho eo aminao ny zioga
  - type: text
    content: sy ny fanondro miampanga
  - type: text
    content: ary ny fitenenan-dratsy,
