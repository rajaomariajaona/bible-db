document_id: ISA.58,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fifadian-kanina ankasitrahan’NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ezaho mafy ny antsonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aza atao moramora!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandrato ny feonao ho tahaka ny an’ny anjomara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ambarao amin’ny oloko ny fahadisoany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny taranak’i Jakoba ny fahotany!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary afoinao ho an’ny noana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hanina tianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahavoky ny ory ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiposaka ao amin’ny maizina ny fahazavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tonga tahaka ny mitataovovonana ny haizim-pitonao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO hitari-dalana anao mandrakariva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hahavoky anao na dia ao amin’ny tany karankaina aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampatanjaka ny taolanao koa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tahaka ny saha vonton-drano ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tahaka ny loharano miboiboika izay tsy mety ritra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay taranakao no hanangana ny efa rava ela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamboarinao ny naorina hatry ny fony fahagola;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ianao dia hatao hoe mpanamboatra ny rava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mpamelon-dalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahatonga ny tany ho azo onenana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Sabata ankasitrahan’NY TOMPO
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha miaro ny tongotrao amin’ny Sabata ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy manao izay tianao amin’ny androko masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miantso ny Sabata hoe Fahafinaretana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nohamasinin’NY TOMPO ka Mendrika hohajaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manome voninahitra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mandeha amin’ny lalanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na manao izay tianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na miteniteny foana,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiravoravo amin’NY TOMPO ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hasandratro eny amin’ny havoana amin’ny tany ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hofahanako amin’ny lovan’i Jakoba rainao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vavan’NY TOMPO no efa niteny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitady Ahy isanandro isanandro izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hahalala ny lalako no sitrany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny firenena efa nanao ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nahafoy ny fitsipik’Andriamaniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manontany Amiko ny fitsipiky ny fahamarinana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary maniry hanakaiky an’Andriamanitra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana izahay no mifady hoy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hitanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana izahay no mampahory ny tenanay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy ahoanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro fa amin’ny andro fifadianareo aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mbola ny tianareo ihany no ataonareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpiasa rehetra ao aminareo dia mbola ampahorinareo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny hiady sy ny hifanditra no anton’ny ifadianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hamely amin’ny totohondrin’ny faharatsiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izao fifadianareo izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy andrenesana ny feonareo any amin’ny avo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa fifadiana toy izany va no ankasitrahako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia andro hampahorian’ny olona tena?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hampiondrika ny lohany tahaka ny zozoro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny hamelatra lamba fisaonana rarahan-davenona ho fandrianany va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa izany va no ataonao hoe fifadiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy andro ankasitrahan’NY TOMPO?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tsy izao va no fifadiana izay ankasitrahako:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hamaha ny famatoran’ny faharatsiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hanaboraka ny fehin’ny zioga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny handefa ny ampahorina ho afaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hanapatapaka ny zioga rehetra?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy ny hizara ny mofonao ho an’ny noana va
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny hampiantrano ny ory manjenjena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mba hanafianao izay hitanao mitanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hihirim-belona amin’ny iray ra aminao ianao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha izany dia hiposaka tahaka ny fahazavan’ny maraina ny fahazavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tonga haingana ny fahasitrananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahamarinanao no hialoha lalana anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny voninahitry NY TOMPO no ho vodilalanao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany dia hiantso ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamaly NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hanandratra ny feonao ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary hiteny Izy hoe: Inty Aho!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha esorinao tsy ho eo aminao ny zioga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fanondro miampanga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fitenenan-dratsy,
