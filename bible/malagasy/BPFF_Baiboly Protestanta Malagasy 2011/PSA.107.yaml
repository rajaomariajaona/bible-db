document_id: PSA.107
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: BOKY FAHADIMY
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miderà NY TOMPO mpanafaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miderà NY TOMPO fa tsara Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mandrakizay ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka hilaza izany ny navotan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay navotany ho afaka tamin’ny tanan’ny fahavalo
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: sy nangoniny avy tany amin’ny tany maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia avy tany atsinanana sy andrefana ary tany avaratra sy tany amin’ny ranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nirenireny tany an-tany efitra ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanavatsava tany an-tany foana ary tsy nahita tanàna honenana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noana sy nangetaheta izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady reraka ny ainy tao anatiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nitaraina tamin’NY TOMPO ireo raha ory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nafahany tamin’izay mahatahotra azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia nitondra azy tamin’ny lalana mahitsy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hankanesany any amin’izay tanàna honenana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka hidera NY TOMPO ireo noho ny famindrampony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fahagagana ataony amin’ny zanak’olombelona!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa mahafa-po ny fanahy mangetaheta Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanahy noana dia vokisany soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay nipetraka tao amin’ny haizina sy ny aloky ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia voafato-pahoriana sy vy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: satria nandà ny tenin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady naniratsira ny anatry ny Avo Indrindra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia nampietreny tamin’ny fahoriana ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa potraka izy nefa tsy nisy hamonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nitaraina tamin’NY TOMPO ireo raha ory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nafahany tamin’izay nampahatahotra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nitondra azy nivoaka avy tao amin’ny haizina sy ny aloky ny fahafatesana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary notapahany ny fatorany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aoka hidera NY TOMPO ireo noho ny famindrampony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fahagagana ataony amin’ny zanak’olombelona!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa nanorotoro ny varavarana varahina Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary notapatapahiny ny hidy vy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mitondra fahoriana ny adala
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fahadisoany sy ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nahamonamonaina azy ny hanina rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanakaiky ny vavahadin’ny fahafatesana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nitaraina tamin’NY TOMPO ireo raha ory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nafahany tamin’izay nampahatahotra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nandefa ny teniny Izy mba hahasitrana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanafaka azy tao amin’ny lavaka nianjerany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aoka hidera NY TOMPO ireo noho ny famindrampony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fahagagana ataony amin’ny zanak’olombelona!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aoka hanolotra fanati-pisaorana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hilaza ny asany amin’ny fihobiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay midina any an-dranomasina ka mandeha an-tsambo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manao raharaha any amin’ny rano lehibe
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: no mahita ny asan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fahagagana ataony amin’ny rano lalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa niteny Izy ka nanangana rivotra mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nampisondrotra ny onjan-drano;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: niakatra hatrany amin’ny lanitra ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nidina hatrany amin’ny lalina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: torotoro noho ny fahoriana ny fanahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fanina ireo sady nivembena toy ny mamo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka very ny fahaizany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia nitaraina tamin’NY TOMPO ireo raha ory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanafaka azy tamin’izay nampahatahotra azy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nampahatony ny rivotra mahery Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nitsahatra ny onjan-drano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia faly ireo satria nitsahatra izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary notarihiny ho amin’ny fitodiana niriny izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aoka hidera NY TOMPO ireo noho ny famindrampony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fahagagana ataony amin’ny zanak’olombelona!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary aoka hanandratra Azy eo amin’ny fiangonan’ny olona izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hidera Azy eo amin’ny fipetrahan’ny loholona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Mampody ny ony ho tany efitra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny loharano ho tany mangentana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ny tany mahavokatra ho tanin-tsira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny faharatsian’ny mponina eo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Mampody ny tany efitra ho farihy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tany maina ho loharano;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: amponeniny ao izay noana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanamboatra tanàna honenana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: hamafy eny an-tsaha izy sady hamboly voaloboka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahazo vokatra be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Dia mitahy azy Izy mba hitomboany betsaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy avelany hihavitsy ny biby fiompiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Fa mihakely sy mietry indray izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fampahoriana sy ny loza ary ny alahelo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Mampidina fanamavoana amin’ny mpitondra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampirenireny azy any an-tany efitra tsy misy lalana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: fa manandratra ny mahantra ho afa-pahoriana kosa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampahamaro ny fianakaviany toy ny andian’ondry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Hahita izany ny marina ka ho faly
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hikombom-bava kosa ny ratsy fanahy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Izay hendry dia aoka hitandrina izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahalala ny famindrampon’NY TOMPO.
