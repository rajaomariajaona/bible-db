document_id: PSA.107,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY FAHADIMY
  - type: heading
    content: Miderà NY TOMPO mpanafaka
  - type: text
    content: Miderà NY TOMPO fa tsara Izy;
  - type: text
    content: fa mandrakizay ny famindrampony.
  '10':
  - type: text
    content: Izay nipetraka tao amin’ny haizina sy ny aloky ny fahafatesana
  - type: text
    content: dia voafato-pahoriana sy vy
  '11':
  - type: text
    content: satria nandà ny tenin’Andriamanitra
  - type: text
    content: sady naniratsira ny anatry ny Avo Indrindra;
  '12':
  - type: text
    content: dia nampietreny tamin’ny fahoriana ny fony;
  - type: text
    content: koa potraka izy nefa tsy nisy hamonjy.
  '13':
  - type: text
    content: Dia nitaraina tamin’NY TOMPO ireo raha ory
  - type: text
    content: ka nafahany tamin’izay nampahatahotra azy.
  '14':
  - type: text
    content: Nitondra azy nivoaka avy tao amin’ny haizina sy ny aloky ny fahafatesana Izy
  - type: text
    content: ary notapahany ny fatorany.
  '15':
  - type: text
    content: Aoka hidera NY TOMPO ireo noho ny famindrampony
  - type: text
    content: sy ny fahagagana ataony amin’ny zanak’olombelona!
  '16':
  - type: text
    content: Fa nanorotoro ny varavarana varahina Izy
  - type: text
    content: ary notapatapahiny ny hidy vy.
  '17':
  - type: text
    content: Mitondra fahoriana ny adala
  - type: text
    content: noho ny fahadisoany sy ny helony.
  '18':
  - type: text
    content: Nahamonamonaina azy ny hanina rehetra
  - type: text
    content: ary nanakaiky ny vavahadin’ny fahafatesana izy.
  '19':
  - type: text
    content: Dia nitaraina tamin’NY TOMPO ireo raha ory
  - type: text
    content: ka nafahany tamin’izay nampahatahotra azy.
  '2':
  - type: text
    content: Aoka hilaza izany ny navotan’NY TOMPO,
  - type: text
    content: dia izay navotany ho afaka tamin’ny tanan’ny fahavalo
  '20':
  - type: text
    content: Nandefa ny teniny Izy mba hahasitrana azy
  - type: text
    content: ary nanafaka azy tao amin’ny lavaka nianjerany Izy.
  '21':
  - type: text
    content: Aoka hidera NY TOMPO ireo noho ny famindrampony
  - type: text
    content: sy ny fahagagana ataony amin’ny zanak’olombelona!
  '22':
  - type: text
    content: Aoka hanolotra fanati-pisaorana izy
  - type: text
    content: ary hilaza ny asany amin’ny fihobiana.
  '23':
  - type: text
    content: Izay midina any an-dranomasina ka mandeha an-tsambo
  - type: text
    content: sy manao raharaha any amin’ny rano lehibe
  '24':
  - type: text
    content: no mahita ny asan’NY TOMPO
  - type: text
    content: sy ny fahagagana ataony amin’ny rano lalina.
  '25':
  - type: text
    content: Fa niteny Izy ka nanangana rivotra mahery
  - type: text
    content: izay nampisondrotra ny onjan-drano;
  '26':
  - type: text
    content: niakatra hatrany amin’ny lanitra ny olona
  - type: text
    content: ary nidina hatrany amin’ny lalina;
  - type: text
    content: torotoro noho ny fahoriana ny fanahiny.
  '27':
  - type: text
    content: Fanina ireo sady nivembena toy ny mamo
  - type: text
    content: ka very ny fahaizany rehetra.
  '28':
  - type: text
    content: Dia nitaraina tamin’NY TOMPO ireo raha ory
  - type: text
    content: ka nanafaka azy tamin’izay nampahatahotra azy Izy.
  '29':
  - type: text
    content: Nampahatony ny rivotra mahery Izy
  - type: text
    content: ka nitsahatra ny onjan-drano.
  '3':
  - type: text
    content: sy nangoniny avy tany amin’ny tany maro,
  - type: text
    content: dia avy tany atsinanana sy andrefana ary tany avaratra sy tany amin’ny ranomasina.
  '30':
  - type: text
    content: Dia faly ireo satria nitsahatra izany
  - type: text
    content: ary notarihiny ho amin’ny fitodiana niriny izy.
  '31':
  - type: text
    content: Aoka hidera NY TOMPO ireo noho ny famindrampony
  - type: text
    content: sy ny fahagagana ataony amin’ny zanak’olombelona!
  '32':
  - type: text
    content: Ary aoka hanandratra Azy eo amin’ny fiangonan’ny olona izy
  - type: text
    content: ka hidera Azy eo amin’ny fipetrahan’ny loholona.
  '33':
  - type: text
    content: Mampody ny ony ho tany efitra Izy
  - type: text
    content: ary ny loharano ho tany mangentana,
  '34':
  - type: text
    content: ny tany mahavokatra ho tanin-tsira,
  - type: text
    content: noho ny faharatsian’ny mponina eo.
  '35':
  - type: text
    content: Mampody ny tany efitra ho farihy Izy
  - type: text
    content: ary ny tany maina ho loharano;
  '36':
  - type: text
    content: amponeniny ao izay noana
  - type: text
    content: mba hanamboatra tanàna honenana;
  '37':
  - type: text
    content: hamafy eny an-tsaha izy sady hamboly voaloboka
  - type: text
    content: ka hahazo vokatra be.
  '38':
  - type: text
    content: Dia mitahy azy Izy mba hitomboany betsaka
  - type: text
    content: ka tsy avelany hihavitsy ny biby fiompiny.
  '39':
  - type: text
    content: Fa mihakely sy mietry indray izy
  - type: text
    content: noho ny fampahoriana sy ny loza ary ny alahelo.
  '4':
  - type: text
    content: Nirenireny tany an-tany efitra ireny
  - type: text
    content: ka nanavatsava tany an-tany foana ary tsy nahita tanàna honenana.
  '40':
  - type: text
    content: Mampidina fanamavoana amin’ny mpitondra NY TOMPO
  - type: text
    content: ka mampirenireny azy any an-tany efitra tsy misy lalana;
  '41':
  - type: text
    content: fa manandratra ny mahantra ho afa-pahoriana kosa izy
  - type: text
    content: ka mampahamaro ny fianakaviany toy ny andian’ondry.
  '42':
  - type: text
    content: Hahita izany ny marina ka ho faly
  - type: text
    content: fa hikombom-bava kosa ny ratsy fanahy rehetra.
  '43':
  - type: text
    content: Izay hendry dia aoka hitandrina izany
  - type: text
    content: ka hahalala ny famindrampon’NY TOMPO.
  '5':
  - type: text
    content: Noana sy nangetaheta izy
  - type: text
    content: sady reraka ny ainy tao anatiny.
  '6':
  - type: text
    content: Dia nitaraina tamin’NY TOMPO ireo raha ory
  - type: text
    content: ka nafahany tamin’izay mahatahotra azy;
  '7':
  - type: text
    content: dia nitondra azy tamin’ny lalana mahitsy Izy
  - type: text
    content: mba hankanesany any amin’izay tanàna honenana.
  '8':
  - type: text
    content: Aoka hidera NY TOMPO ireo noho ny famindrampony
  - type: text
    content: sy ny fahagagana ataony amin’ny zanak’olombelona!
  '9':
  - type: text
    content: Fa mahafa-po ny fanahy mangetaheta Izy
  - type: text
    content: ary ny fanahy noana dia vokisany soa.
