document_id: ISA.37,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mila hevitra amin’Isaia mpaminany i Hezekia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 19.1-7
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nony nandre izany i Hezekia mpanjaka dia nandriatra ny fitafiany sady nitafy lamba fisaonana ka lasa niditra tao amin’ny tranon’NY TOMPO.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izao no holazainareo amin’i Hezekia mpanjakan’ny Joda: Aza mety hofitahin’ny Andriamanitrao izay itokianao ianao, hoe: Tsy hatolotra eo an-tanan’ny mpanjakan’i Asiria i Jerosalema! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Indro, efa renao izay nataon’ireo mpanjakan’i Asiria tamin’ny tany rehetra, dia ny nanaovany ho zavatra voaozona azy; koa ianao indray va no ho voavonjy? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Moa nahavonjy azy va ireo andriamanitry ny firenena noravan’ny razako, dia i Gozana, i Harana, i Rezefa ary ny taranak’i Edena izay tao Telasara? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aiza ny mpanjakan’i Hamata, ny mpanjakan’i Arpada, ny mpanjakan’ny tanànan’i Sefarvaima, i Henà ary Iva?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka nataon’i Hezekia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 19.14-19
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia noraisin’i Hezekia tamin’ny tanan’ny iraka ny taratasy ka novakiny, dia niakatra nankao amin’ny tranon’NY TOMPO izy ka namelatra izany teo anatrehan’NY TOMPO. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nivavaka tamin’NY TOMPO i Hezekia hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ry Andriamanitra, Tompon’izao rehetra izao ô, Andriamanitry ny Israely, izay mipetraka amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: '; Ianao dia Ianao ihany no Andriamanitry ny fanjakana rehetra ambonin’ny tany; Ianao no nanao ny lanitra sy ny tany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Atongilano ny sofinao, TOMPO ô, ka mihainoa! Ahirato ny masonao, TOMPO ô, ka mijere! Ary mihainoa ny teny rehetra izay nampitondrain’i Sankeriba hihantsy an’Andriamanitra velona! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'TOMPO ô, marina ihany tokoa fa ireo mpanjakan’i Asiria dia efa nandrava ny firenena rehetra sy ny taniny '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ary efa nariany tao anaty afo ny andriamaniny; tsy Andriamanitra akory mantsy ireny, fa asan’ny tanan’olona ihany, dia hazo sy vato, ka azony nosimbana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nirahiny ho any amin’Isaia mpaminany, zanak’i Amoza, i Eliakima, lehiben’ny tao an-dapa, sy i Sebna mpitantsoratra ary ny lehiben’ny mpisorona, izay samy nitafy lamba fisaonana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Koa ankehitriny, RY TOMPO Andriamanitray ô, vonjeo amin’ny tanany izahay mba hahafantaran’ny fanjakana rehetra ambonin’ny tany fa Ianao irery ihany no TOMPO!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampita ny valinteny avy amin’Andriamanitra Isaia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 19.20-28
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nandefa iraka Isaia zanak’i Amoza, hankany amin’i Hezekia hilaza hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ny amin’ilay fitarainana nataonao tamiko ny amin’i Sankeriba, mpanjakan’i Asiria, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'dia izao no teny nolazain’NY TOMPO ny amin’i Sankeriba:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Manao tsinontsinona sy mandatsalatsa anao i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ', zanakavavy virijiny,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihifikifi-doha ao aoriananao i Jerosalema zanakavavy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa iza no nohantsianao sy nompanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanohitra an’iza no nanandratanao ny feonao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampiandrandra ny masonao any ambony ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanohitra ny Iray Masin’ny Israely!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tamin’ny alalan’ny mpanomponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nihantsianao ny Tompo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hoy ianao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny kalesiko fitondra miady maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no niakarako tany an-tampon’ny tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tao afovoan’i Libanona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hokapaiko ny sedera avo sy ny kipreso voafantina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiditra any amin’izay farany azo iakarana ao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy any amin’ny alany matevina.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nihady lavaka Aho ka nisotro rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny faladiako no handritako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lakandrano rehetra any Ejipta.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Tsy mbola renao va fa hatry ny fony ela no nanaovako izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatramin’ny andro taloha no namolavolako izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia nahatanteraka izany Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ny anjaranao sisa dia ny handrava tanàna mimanda ho tonga korontam-bato.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Efa tsy nahatohitra ny mponina any,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady raiki-tahotra izy ireo no nangaihay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny ahitra any an-tsaha sy ny ahi-maitso izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tahaka ny ahitra eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tampon-trano
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny vary maty raha vao mitsiry.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fa samy fantatro avokoa na mipetraka ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mivoaka hiady, na miverina avy niady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mihetsiketsika hanohitra Ahy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Satria mihetsiketsika hanohitra Ahy tokoa ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa tafakatra atỳ an-tsofiko ny fireharehanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hasiako ny faraingoko ny oronao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hopetahiko ny lamboridiko ny vavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hampivereniko amin’ny lalana izay niavianao ianao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famantarana nomena an’i Hezekia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 19.29-31
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Izao no nampilazainy azy ireo: Izao no lazain’i Hezekia: Andro fahoriana sy famaizana ary fanalam-baraka ity andro ity; fa efa hivoaka ny kibon’ny reniny ny zaza nefa tsy misy hery hiterahana azy izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Izao kosa no famantarana ho anao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihinana ny vokatry ny voa nihintsana ianareo amin’ity taona ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny taona manaraka dia ny kolokolon’izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’ny taona fahatelo kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mamafaza ianareo ka mijinjà
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manaova tanim-boaloboka ka mihinàna izay vokatra avy aminy.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary izay sisa ho tavela amin’ny taranak’i Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mbola hamaka lalindalina kokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hisondrotra hamoa.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Fa hisy sisa hivoaka avy ao Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny sisa afaka avy ao amin’ny tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no hataon’ny fahasaro-piaron’Andriamanitra, Tompon’izao rehetra izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny niafaran’i Sankeriba
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 19.32-37; 2Tan 32.21-22
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Noho izany dia izao no lazain’NY TOMPO ny amin’ny mpanjakan’i Asiria:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho tafiditra amin’ity tanàna ity izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na handefa zana-tsipìka ho ato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hitondra ampinga eo anoloany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hanandratra tovon-tany hamelezany azy.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ny lalana izay niaviany ihany no hiverenany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ho tafiditra amin’ity tanàna ity izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Fa hiaro ity tanàna ity Aho ka hamonjy azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny amin’ny tenako sy i Davida mpanompoko.
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia avy ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anjelin’NY TOMPO
    - type: text
      text: ' ka namely olona dimy arivo sy valo alina sy iray hetsy tao amin’ny tobin’ny Asiriana; ary nony nifoha vao maraina ny olona dia hita fa indreo, efa maty avokoa ireo! '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Dia niainga i Sankeriba, mpanjakan’i Asiria, ka lasa nody ary nitoetra tany Ninive. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Ary raha niankohoka tao an-tranon’i Nisroka andriamaniny izy dia nokapain’i Adrameleka sy i Sarezera zanany lahy tamin’ny sabatra; dia afaka nandositra ho any amin’ny tany Ararata izy mirahalahy; ary i Esara-Hadona zanany lahy no nanjaka nandimby azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Angamba ho ren’NY TOMPO Andriamanitrao ny tenin’i Rabsake, izay nirahin’ny mpanjakan’i Asiria tompony hihantsy an’Andriamanitra velona ka mba hovaliny izy noho ny teny izay efa ren’NY TOMPO Andriamanitrao. Koa manandrata vavaka ianao ho an’ireo izay mbola sisa.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nankany amin’Isaia ireo mpanompon’i Hezekia mpanjaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy Isaia taminy: Ambarao amin’ny tomponareo hoe: Izao no lazain’NY TOMPO: Aza matahotra ny teny renao, dia izay nanompan’iretsy mpanompolahin’ny mpanjakan’i Asiria iretsy Ahy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa indro, hanisy fanahy ao anatiny Aho, ary hahare vaovao izy ka hiverina ho any amin’ny taniny, dia hataoko lavon-tsabatra any amin’ny taniny izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandrahona indray i Sankeriba
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 19.8-13; 2Tan 32.16-19
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia niverina i Rabsake ka nankany Libna izay nataon’ny mpanjakan’i Asiria fahirano tamin’izay, satria reny fa efa niala tany Lakisy ny mpanjaka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nandre vaovao mikasika an’i Tiraka mpanjakan’i Kosy i Sankeriba hoe: Avy hiady aminao izy. Nony nandre izany izy dia nandefa iraka ho any amin’i Hezekia ary niteny hoe: '
