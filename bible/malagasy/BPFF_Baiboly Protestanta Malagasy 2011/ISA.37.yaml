document_id: ISA.37,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mila hevitra amin’Isaia mpaminany i Hezekia
  - type: heading
    content: 2Mpa 19.1-7
  - type: text
    content: Nony nandre izany i Hezekia mpanjaka dia nandriatra ny fitafiany sady nitafy lamba fisaonana ka lasa niditra tao amin’ny tranon’NY TOMPO.
  '10':
  - type: text
    content: 'Izao no holazainareo amin’i Hezekia mpanjakan’ny Joda: Aza mety hofitahin’ny Andriamanitrao izay itokianao ianao, hoe: Tsy hatolotra eo an-tanan’ny mpanjakan’i Asiria i Jerosalema! '
  '11':
  - type: text
    content: 'Indro, efa renao izay nataon’ireo mpanjakan’i Asiria tamin’ny tany rehetra, dia ny nanaovany ho zavatra voaozona azy; koa ianao indray va no ho voavonjy? '
  '12':
  - type: text
    content: 'Moa nahavonjy azy va ireo andriamanitry ny firenena noravan’ny razako, dia i Gozana, i Harana, i Rezefa ary ny taranak’i Edena izay tao Telasara? '
  '13':
  - type: text
    content: Aiza ny mpanjakan’i Hamata, ny mpanjakan’i Arpada, ny mpanjakan’ny tanànan’i Sefarvaima, i Henà ary Iva?
  - type: heading
    content: Vavaka nataon’i Hezekia
  - type: heading
    content: 2Mpa 19.14-19
  '14':
  - type: text
    content: 'Dia noraisin’i Hezekia tamin’ny tanan’ny iraka ny taratasy ka novakiny, dia niakatra nankao amin’ny tranon’NY TOMPO izy ka namelatra izany teo anatrehan’NY TOMPO. '
  '15':
  - type: text
    content: 'Ary nivavaka tamin’NY TOMPO i Hezekia hoe: '
  '16':
  - type: text
    content: 'Ry Andriamanitra, Tompon’izao rehetra izao ô, Andriamanitry ny Israely, izay mipetraka amin’ny '
  - type: text
    content: kerobima
  - type: text
    content: '; Ianao dia Ianao ihany no Andriamanitry ny fanjakana rehetra ambonin’ny tany; Ianao no nanao ny lanitra sy ny tany. '
  '17':
  - type: text
    content: 'Atongilano ny sofinao, TOMPO ô, ka mihainoa! Ahirato ny masonao, TOMPO ô, ka mijere! Ary mihainoa ny teny rehetra izay nampitondrain’i Sankeriba hihantsy an’Andriamanitra velona! '
  '18':
  - type: text
    content: 'TOMPO ô, marina ihany tokoa fa ireo mpanjakan’i Asiria dia efa nandrava ny firenena rehetra sy ny taniny '
  '19':
  - type: text
    content: 'ary efa nariany tao anaty afo ny andriamaniny; tsy Andriamanitra akory mantsy ireny, fa asan’ny tanan’olona ihany, dia hazo sy vato, ka azony nosimbana. '
  '2':
  - type: text
    content: 'Ary nirahiny ho any amin’Isaia mpaminany, zanak’i Amoza, i Eliakima, lehiben’ny tao an-dapa, sy i Sebna mpitantsoratra ary ny lehiben’ny mpisorona, izay samy nitafy lamba fisaonana. '
  '20':
  - type: text
    content: Koa ankehitriny, RY TOMPO Andriamanitray ô, vonjeo amin’ny tanany izahay mba hahafantaran’ny fanjakana rehetra ambonin’ny tany fa Ianao irery ihany no TOMPO!
  - type: heading
    content: Mampita ny valinteny avy amin’Andriamanitra Isaia
  - type: heading
    content: 2Mpa 19.20-28
  '21':
  - type: text
    content: 'Dia nandefa iraka Isaia zanak’i Amoza, hankany amin’i Hezekia hilaza hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ny amin’ilay fitarainana nataonao tamiko ny amin’i Sankeriba, mpanjakan’i Asiria, '
  '22':
  - type: text
    content: 'dia izao no teny nolazain’NY TOMPO ny amin’i Sankeriba:'
  - type: text
    content: 'Manao tsinontsinona sy mandatsalatsa anao i '
  - type: text
    content: Ziona
  - type: text
    content: ', zanakavavy virijiny,'
  - type: text
    content: mihifikifi-doha ao aoriananao i Jerosalema zanakavavy.
  '23':
  - type: text
    content: Fa iza no nohantsianao sy nompanao?
  - type: text
    content: Ary hanohitra an’iza no nanandratanao ny feonao?
  - type: text
    content: Nampiandrandra ny masonao any ambony ianao
  - type: text
    content: mba hanohitra ny Iray Masin’ny Israely!
  '24':
  - type: text
    content: Tamin’ny alalan’ny mpanomponao
  - type: text
    content: no nihantsianao ny Tompo
  - type: text
    content: 'ka hoy ianao:'
  - type: text
    content: Tamin’ny kalesiko fitondra miady maro
  - type: text
    content: no niakarako tany an-tampon’ny tendrombohitra,
  - type: text
    content: tao afovoan’i Libanona;
  - type: text
    content: hokapaiko ny sedera avo sy ny kipreso voafantina,
  - type: text
    content: dia hiditra any amin’izay farany azo iakarana ao aho
  - type: text
    content: sy any amin’ny alany matevina.
  '25':
  - type: text
    content: Nihady lavaka Aho ka nisotro rano
  - type: text
    content: ary ny faladiako no handritako
  - type: text
    content: ny lakandrano rehetra any Ejipta.
  '26':
  - type: text
    content: Tsy mbola renao va fa hatry ny fony ela no nanaovako izany,
  - type: text
    content: ary hatramin’ny andro taloha no namolavolako izao?
  - type: text
    content: Ankehitriny dia nahatanteraka izany Aho.
  - type: text
    content: Koa ny anjaranao sisa dia ny handrava tanàna mimanda ho tonga korontam-bato.
  '27':
  - type: text
    content: Efa tsy nahatohitra ny mponina any,
  - type: text
    content: sady raiki-tahotra izy ireo no nangaihay;
  - type: text
    content: tahaka ny ahitra any an-tsaha sy ny ahi-maitso izy,
  - type: text
    content: 'tahaka ny ahitra eo amin’ny '
  - type: text
    content: tampon-trano
  - type: text
    content: ','
  - type: text
    content: ary tahaka ny vary maty raha vao mitsiry.
  '28':
  - type: text
    content: Fa samy fantatro avokoa na mipetraka ianao
  - type: text
    content: na mivoaka hiady, na miverina avy niady,
  - type: text
    content: na mihetsiketsika hanohitra Ahy.
  '29':
  - type: text
    content: Satria mihetsiketsika hanohitra Ahy tokoa ianao
  - type: text
    content: ary efa tafakatra atỳ an-tsofiko ny fireharehanao,
  - type: text
    content: dia hasiako ny faraingoko ny oronao
  - type: text
    content: ary hopetahiko ny lamboridiko ny vavanao
  - type: text
    content: dia hampivereniko amin’ny lalana izay niavianao ianao.
  - type: heading
    content: Ny famantarana nomena an’i Hezekia
  - type: heading
    content: 2Mpa 19.29-31
  '3':
  - type: text
    content: 'Izao no nampilazainy azy ireo: Izao no lazain’i Hezekia: Andro fahoriana sy famaizana ary fanalam-baraka ity andro ity; fa efa hivoaka ny kibon’ny reniny ny zaza nefa tsy misy hery hiterahana azy izy. '
  '30':
  - type: text
    content: 'Izao kosa no famantarana ho anao:'
  - type: text
    content: Hihinana ny vokatry ny voa nihintsana ianareo amin’ity taona ity
  - type: text
    content: ary amin’ny taona manaraka dia ny kolokolon’izany.
  - type: text
    content: Fa amin’ny taona fahatelo kosa
  - type: text
    content: dia mamafaza ianareo ka mijinjà
  - type: text
    content: ary manaova tanim-boaloboka ka mihinàna izay vokatra avy aminy.
  '31':
  - type: text
    content: Ary izay sisa ho tavela amin’ny taranak’i Joda
  - type: text
    content: dia mbola hamaka lalindalina kokoa
  - type: text
    content: sady hisondrotra hamoa.
  '32':
  - type: text
    content: Fa hisy sisa hivoaka avy ao Jerosalema
  - type: text
    content: 'ary ny sisa afaka avy ao amin’ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: .
  - type: text
    content: Izany no hataon’ny fahasaro-piaron’Andriamanitra, Tompon’izao rehetra izao.
  - type: heading
    content: Ny niafaran’i Sankeriba
  - type: heading
    content: 2Mpa 19.32-37; 2Tan 32.21-22
  '33':
  - type: text
    content: 'Noho izany dia izao no lazain’NY TOMPO ny amin’ny mpanjakan’i Asiria:'
  - type: text
    content: Tsy ho tafiditra amin’ity tanàna ity izy,
  - type: text
    content: na handefa zana-tsipìka ho ato,
  - type: text
    content: na hitondra ampinga eo anoloany,
  - type: text
    content: na hanandratra tovon-tany hamelezany azy.
  '34':
  - type: text
    content: Ny lalana izay niaviany ihany no hiverenany
  - type: text
    content: fa tsy ho tafiditra amin’ity tanàna ity izy,
  - type: text
    content: hoy NY TOMPO
  '35':
  - type: text
    content: Fa hiaro ity tanàna ity Aho ka hamonjy azy
  - type: text
    content: noho ny amin’ny tenako sy i Davida mpanompoko.
  '36':
  - type: text
    content: 'Dia avy ilay '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: ' ka namely olona dimy arivo sy valo alina sy iray hetsy tao amin’ny tobin’ny Asiriana; ary nony nifoha vao maraina ny olona dia hita fa indreo, efa maty avokoa ireo! '
  '37':
  - type: text
    content: 'Dia niainga i Sankeriba, mpanjakan’i Asiria, ka lasa nody ary nitoetra tany Ninive. '
  '38':
  - type: text
    content: Ary raha niankohoka tao an-tranon’i Nisroka andriamaniny izy dia nokapain’i Adrameleka sy i Sarezera zanany lahy tamin’ny sabatra; dia afaka nandositra ho any amin’ny tany Ararata izy mirahalahy; ary i Esara-Hadona zanany lahy no nanjaka nandimby azy.
  '4':
  - type: text
    content: Angamba ho ren’NY TOMPO Andriamanitrao ny tenin’i Rabsake, izay nirahin’ny mpanjakan’i Asiria tompony hihantsy an’Andriamanitra velona ka mba hovaliny izy noho ny teny izay efa ren’NY TOMPO Andriamanitrao. Koa manandrata vavaka ianao ho an’ireo izay mbola sisa.
  '5':
  - type: text
    content: 'Dia nankany amin’Isaia ireo mpanompon’i Hezekia mpanjaka. '
  '6':
  - type: text
    content: 'Ary hoy Isaia taminy: Ambarao amin’ny tomponareo hoe: Izao no lazain’NY TOMPO: Aza matahotra ny teny renao, dia izay nanompan’iretsy mpanompolahin’ny mpanjakan’i Asiria iretsy Ahy. '
  '7':
  - type: text
    content: Fa indro, hanisy fanahy ao anatiny Aho, ary hahare vaovao izy ka hiverina ho any amin’ny taniny, dia hataoko lavon-tsabatra any amin’ny taniny izy.
  - type: heading
    content: Mandrahona indray i Sankeriba
  - type: heading
    content: 2Mpa 19.8-13; 2Tan 32.16-19
  '8':
  - type: text
    content: 'Dia niverina i Rabsake ka nankany Libna izay nataon’ny mpanjakan’i Asiria fahirano tamin’izay, satria reny fa efa niala tany Lakisy ny mpanjaka. '
  '9':
  - type: text
    content: 'Ary nandre vaovao mikasika an’i Tiraka mpanjakan’i Kosy i Sankeriba hoe: Avy hiady aminao izy. Nony nandre izany izy dia nandefa iraka ho any amin’i Hezekia ary niteny hoe: '
