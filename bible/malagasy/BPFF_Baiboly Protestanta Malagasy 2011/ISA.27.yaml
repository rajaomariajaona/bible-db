document_id: ISA.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fandresena ny leviatana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Amin’izany andro izany, ny sabatry NY TOMPO, izay mafy sady lehibe no mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no hoentiny mamaly ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviatana
  - type: text
    text: ', ilay menarana mandositra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny leviatana, ilay menarana miolikolika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hovonoiny ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: dragona
  - type: text
    text: ' ao an-dranomasina.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO sy ny tanim-boalobony
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no hihiranareo ny amin’ny tanim-boaloboka ahazoana divay mahery hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izaho TOMPO no mpiaro io,
- type: usfm
  marker: q1
  children:
  - type: text
    text: isaky ny indray mipy maso no anondrahako azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao misy manimba azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miambina azy Aho na andro na alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy misy fahatezerana ato Amiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enga anie ka hisy anjavidy sy tsilo eto anatrehako mba hiadiako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hohitsakitsahiko ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hodorako avokoa!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha tsy izany dia aoka hanao Ahy ho fiarovana mafy kosa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hihavana Amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, aoka hihavana Amiko izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’ny andro ho avy dia hiorina tsara i Jakoba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamony sy hitsimoka Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hameno izao tontolo izao amin’ny vokany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famindrampo amin’ny taranak’i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Moa tahaka ny namelezana izay namely azy va no mba namelezany azy koa?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny namonoana izay novonoiny va no mba namonoana azy koa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tamin’ny nandroahana azy, tamin’ny famoahana azy tany ivelany no nitsarana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nokororohiny tamin’ny rivony mahery izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny andron’ny rivotra avy any atsinanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ka izao no hamelana ny helok’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary izao ihany no vokatry ny fanesorana ny fahotany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hanaovany ny vato rehetra amin’ny alitara
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tahaka ny vato sokay voatorotoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny tsangankazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: ' sy ny tsangambato ho an’ny masoandro dia tsy hitsangana intsony.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa hitoka-monina ny tanàna mimanda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho fonenana afoy sy ilaozana tahaka ny tany efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao no hihinanan’ny zanak’omby sy handriany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handaniany ny rantsan-kazony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raha malazo ny rantsany dia hotapatapahina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho avy hitaina azy ny vehivavy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria firenena tsy manam-pahalalana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hiantra azy ny Mpanao azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hamindra fo aminy ny Mpamorona azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiverenan’ireo voaroaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hahintsan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatreo amin’ny ony Eofrata mandriaka ka hatramin’ny lohasahan-driakan’i Ejipta ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary samy hotsimponina tsirairay ianareo, ry Zanak’Israely!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Amin’izany andro izany dia hotsofina ny anjomara lehibe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho avy izay very tany amin’ny tany Asiria
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay efa niely tany amin’ny tany Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiankohoka eo anatrehan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny tendrombohitra masina, ao Jerosalema.
