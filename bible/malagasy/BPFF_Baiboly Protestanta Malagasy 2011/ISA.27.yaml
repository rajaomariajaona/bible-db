document_id: ISA.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fandresena ny leviatana
  - type: text
    content: Amin’izany andro izany, ny sabatry NY TOMPO, izay mafy sady lehibe no mahery,
  - type: text
    content: 'no hoentiny mamaly ny '
  - type: text
    content: leviatana
  - type: text
    content: ', ilay menarana mandositra,'
  - type: text
    content: ny leviatana, ilay menarana miolikolika,
  - type: text
    content: 'ary hovonoiny ilay '
  - type: text
    content: dragona
  - type: text
    content: ' ao an-dranomasina.'
  - type: heading
    content: NY TOMPO sy ny tanim-boalobony
  '10':
  - type: text
    content: Fa hitoka-monina ny tanàna mimanda
  - type: text
    content: ka ho fonenana afoy sy ilaozana tahaka ny tany efitra;
  - type: text
    content: ao no hihinanan’ny zanak’omby sy handriany
  - type: text
    content: ary handaniany ny rantsan-kazony.
  '11':
  - type: text
    content: Raha malazo ny rantsany dia hotapatapahina
  - type: text
    content: ka ho avy hitaina azy ny vehivavy.
  - type: text
    content: Satria firenena tsy manam-pahalalana izy,
  - type: text
    content: dia tsy hiantra azy ny Mpanao azy
  - type: text
    content: ary tsy hamindra fo aminy ny Mpamorona azy.
  - type: heading
    content: Ny fiverenan’ireo voaroaka
  '12':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: dia hahintsan’NY TOMPO
  - type: text
    content: hatreo amin’ny ony Eofrata mandriaka ka hatramin’ny lohasahan-driakan’i Ejipta ianareo
  - type: text
    content: ary samy hotsimponina tsirairay ianareo, ry Zanak’Israely!
  '13':
  - type: text
    content: Amin’izany andro izany dia hotsofina ny anjomara lehibe;
  - type: text
    content: dia ho avy izay very tany amin’ny tany Asiria
  - type: text
    content: sy izay efa niely tany amin’ny tany Ejipta
  - type: text
    content: ka hiankohoka eo anatrehan’NY TOMPO
  - type: text
    content: eo amin’ny tendrombohitra masina, ao Jerosalema.
  '2':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: 'no hihiranareo ny amin’ny tanim-boaloboka ahazoana divay mahery hoe:'
  '3':
  - type: text
    content: Izaho TOMPO no mpiaro io,
  - type: text
    content: isaky ny indray mipy maso no anondrahako azy,
  - type: text
    content: fandrao misy manimba azy,
  - type: text
    content: dia miambina azy Aho na andro na alina.
  '4':
  - type: text
    content: Tsy misy fahatezerana ato Amiko.
  - type: text
    content: Enga anie ka hisy anjavidy sy tsilo eto anatrehako mba hiadiako!
  - type: text
    content: Hohitsakitsahiko ireo
  - type: text
    content: ka hodorako avokoa!
  '5':
  - type: text
    content: Fa raha tsy izany dia aoka hanao Ahy ho fiarovana mafy kosa izy
  - type: text
    content: ka hihavana Amiko;
  - type: text
    content: eny, aoka hihavana Amiko izy!
  '6':
  - type: text
    content: Amin’ny andro ho avy dia hiorina tsara i Jakoba;
  - type: text
    content: ary hamony sy hitsimoka Israely
  - type: text
    content: ka hameno izao tontolo izao amin’ny vokany.
  - type: heading
    content: Ny famindrampo amin’ny taranak’i Jakoba
  '7':
  - type: text
    content: Moa tahaka ny namelezana izay namely azy va no mba namelezany azy koa?
  - type: text
    content: Tahaka ny namonoana izay novonoiny va no mba namonoana azy koa?
  '8':
  - type: text
    content: Tamin’ny nandroahana azy, tamin’ny famoahana azy tany ivelany no nitsarana azy;
  - type: text
    content: nokororohiny tamin’ny rivony mahery izy
  - type: text
    content: tamin’ny andron’ny rivotra avy any atsinanana.
  '9':
  - type: text
    content: Ka izao no hamelana ny helok’i Jakoba,
  - type: text
    content: 'ary izao ihany no vokatry ny fanesorana ny fahotany:'
  - type: text
    content: Ny hanaovany ny vato rehetra amin’ny alitara
  - type: text
    content: ho tahaka ny vato sokay voatorotoro,
  - type: text
    content: 'ary ny tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: ' sy ny tsangambato ho an’ny masoandro dia tsy hitsangana intsony.'
