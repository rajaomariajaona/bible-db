document_id: PSA.95,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Enga anie ka hohenoinareo ny feony!
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Avia, aoka isika hihoby ho an’NY TOMPO!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka isika hanao feo fifaliana ho an’ny Vatolampy famonjena antsika!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Efapolo taona no nahamonamonaina Ahy tamin’izany taranaka izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hoy Aho: Olona maniasia amin’ny fony izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahalala ny lalako.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa nianiana tamin’ny fahatezerako Aho hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hiditra amin’ny fitsaharako mihitsy izy!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aoka hankeo anatrehany amin’ny fiderana isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hanao feo fifaliana ho Azy amin’ny salamo isika.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa Andriamanitra lehibe NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanjaka lehibe ambonin’ny andriamanitra rehetra Izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Eo an-tanany ny fitoerana lalina amin’ny tany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azy ny tendrombohitra avo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Azy ny ranomasina fa Izy no nanao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tany maina dia novolavolain’ny tanany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Avia, aoka isika hiondrika sy hiankohoka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka isika handohalika eo anatrehan’NY TOMPO, Mpanao antsika;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa Izy no Andriamanitsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary olona fiandriny sy ondry tandremany isika.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Enga anie ka hohenoinareo anio ny feony hoe:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aza manamafy ny fonareo tahaka ny tao Meriba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny tamin’ny andro tao Masa, fony tany an-tany efitra,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: izay nakan’ny razanareo fanahy Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nizahany toetra Ahy, na dia efa hitany aza ny asako.
