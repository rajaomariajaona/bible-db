document_id: PSA.95,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Enga anie ka hohenoinareo ny feony!
  - type: text
    content: Avia, aoka isika hihoby ho an’NY TOMPO!
  - type: text
    content: Aoka isika hanao feo fifaliana ho an’ny Vatolampy famonjena antsika!
  '10':
  - type: text
    content: Efapolo taona no nahamonamonaina Ahy tamin’izany taranaka izany
  - type: text
    content: 'ka hoy Aho: Olona maniasia amin’ny fony izy'
  - type: text
    content: ka tsy mahalala ny lalako.
  '11':
  - type: text
    content: 'Koa nianiana tamin’ny fahatezerako Aho hoe:'
  - type: text
    content: Tsy hiditra amin’ny fitsaharako mihitsy izy!
  '2':
  - type: text
    content: Aoka hankeo anatrehany amin’ny fiderana isika,
  - type: text
    content: aoka hanao feo fifaliana ho Azy amin’ny salamo isika.
  '3':
  - type: text
    content: Fa Andriamanitra lehibe NY TOMPO;
  - type: text
    content: Mpanjaka lehibe ambonin’ny andriamanitra rehetra Izy.
  '4':
  - type: text
    content: Eo an-tanany ny fitoerana lalina amin’ny tany.
  - type: text
    content: Azy ny tendrombohitra avo.
  '5':
  - type: text
    content: Azy ny ranomasina fa Izy no nanao azy
  - type: text
    content: ary ny tany maina dia novolavolain’ny tanany.
  '6':
  - type: text
    content: Avia, aoka isika hiondrika sy hiankohoka,
  - type: text
    content: aoka isika handohalika eo anatrehan’NY TOMPO, Mpanao antsika;
  '7':
  - type: text
    content: Fa Izy no Andriamanitsika
  - type: text
    content: ary olona fiandriny sy ondry tandremany isika.
  - type: text
    content: 'Enga anie ka hohenoinareo anio ny feony hoe:'
  '8':
  - type: text
    content: Aza manamafy ny fonareo tahaka ny tao Meriba
  - type: text
    content: sy tahaka ny tamin’ny andro tao Masa, fony tany an-tany efitra,
  '9':
  - type: text
    content: izay nakan’ny razanareo fanahy Ahy
  - type: text
    content: sy nizahany toetra Ahy, na dia efa hitany aza ny asako.
