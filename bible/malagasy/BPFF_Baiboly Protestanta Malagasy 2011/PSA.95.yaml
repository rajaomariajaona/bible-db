document_id: PSA.95
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Enga anie ka hohenoinareo ny feony!
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Avia, aoka isika hihoby ho an’NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka isika hanao feo fifaliana ho an’ny Vatolampy famonjena antsika!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka hankeo anatrehany amin’ny fiderana isika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hanao feo fifaliana ho Azy amin’ny salamo isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Andriamanitra lehibe NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanjaka lehibe ambonin’ny andriamanitra rehetra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eo an-tanany ny fitoerana lalina amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Azy ny tendrombohitra avo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Azy ny ranomasina fa Izy no nanao azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tany maina dia novolavolain’ny tanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Avia, aoka isika hiondrika sy hiankohoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka isika handohalika eo anatrehan’NY TOMPO, Mpanao antsika;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa Izy no Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary olona fiandriny sy ondry tandremany isika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Enga anie ka hohenoinareo anio ny feony hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza manamafy ny fonareo tahaka ny tao Meriba
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tahaka ny tamin’ny andro tao Masa, fony tany an-tany efitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: izay nakan’ny razanareo fanahy Ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nizahany toetra Ahy, na dia efa hitany aza ny asako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Efapolo taona no nahamonamonaina Ahy tamin’izany taranaka izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hoy Aho: Olona maniasia amin’ny fony izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahalala ny lalako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa nianiana tamin’ny fahatezerako Aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiditra amin’ny fitsaharako mihitsy izy!
