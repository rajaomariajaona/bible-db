document_id: LUK.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jaona Mpanao batisa, mpaminanin’Andriamanitra
  - type: heading
    content: Mat 3.1-6; Mar 1.2-6; ampit. Jao 1.19-23
  - type: text
    content: 'Tamin’ny taona fahadimy amby folo nanjakan’i Tiberio Kaisara, fony i Pontio Pilato no governora tany '
  - type: text
    content: Jodia
  - type: text
    content: ', i Heroda no mpanapaka tany Galilia, i Filipo rahalahiny no mpanapaka ny tany Itoria sy Trakonitisy, i Lisaniasy no mpanapaka tany Abilena '
  '10':
  - type: text
    content: 'Nanontany an’i Jaona ny vahoaka hoe: Inona ary no hataonay? '
  '11':
  - type: text
    content: 'Namaly azy izy hoe: Izay manana akanjo roa dia aoka hanome ho an’ny tsy manana ary izay manan-kanina dia aoka hanao toy izany koa. '
  '12':
  - type: text
    content: 'Dia avy koa ny mpamory hetra sasany mba hataony batisa ka niteny taminy hoe: Mpampianatra ô, inona no hataonay? '
  '13':
  - type: text
    content: 'Hoy izy taminy: Aza mampandoa mihoatra noho izay notendrena halainareo. '
  '14':
  - type: text
    content: 'Nisy miaramila koa nanontany azy hoe: Inona kosa no mba hataonay? Dia hoy izy taminy: Aza mampiasa hery amin’ny tsy antony na miampanga lainga, ary aoka ho afa-po amin’ny karamanareo ianareo.'
  - type: heading
    content: Ny filazan’i Jaona Mpanao batisa ny amin’Ilay ho avy
  - type: heading
    content: Mat 3.11-12; Mar 1.7-8; ampit. Jao 1.24-28
  '15':
  - type: text
    content: 'Raha mbola niandry ny olona ka samy nieritreritra an’i Jaona tao am-pony, na izy no '
  - type: text
    content: Kristy
  - type: text
    content: ' na tsia, '
  '16':
  - type: text
    content: 'dia hoy i Jaona tamin’izy rehetra: Izaho dia manao batisa anareo amin’ny rano, fa avy Izay mahery noho izaho ka tsy mendrika hamaha ny fehin-kapany akory aza aho; Izy no hanao batisa anareo amin’ny Fanahy Masina sy ny afo; '
  '17':
  - type: text
    content: eny an-tanany ny fikororohany hanadiovany tsara ny ao am-pamoloany ka hanangonany ny vary ho ao amin’ny sompiny; fa ny akofa sy ny mololo dia hodorany amin’ny afo tsy azo vonoina.
  - type: heading
    content: I Heroda sy i Jaona Mpanao batisa
  - type: heading
    content: Mat 14.3-4; Mar 6.17-18
  '18':
  - type: text
    content: Fananarana maro hafa koa no notorìny tamin’ny olona.
  '19':
  - type: text
    content: 'Fa i Heroda mpanapaka, nony nanarin’i Jaona noho ny amin’i Herodiasy, vadin’ny rahalahiny, sy noho ny ratsy rehetra izay nataony, '
  '2':
  - type: text
    content: 'ary i Anasy sy i Kaiafa no '
  - type: text
    content: Mpisoronabe
  - type: text
    content: ', dia tonga tamin’i Jaona, zanak’i Zakaria, tany an-tany efitra ny tenin’Andriamanitra.'
  - type: heading
    content: Mat 3.1-6; Mar 1.2-6; Jao 1.19-23
  '20':
  - type: text
    content: dia nanidy an’i Jaona tao an-tranomaizina ho fanampin’izany rehetra izany koa.
  - type: heading
    content: Ny nanaovana batisa an’i Jesosy
  - type: heading
    content: Mat 3.13-17; Mar 1.9-11; ampit. Jao 1.29-34
  '21':
  - type: text
    content: 'Rehefa natao batisa ny vahoaka rehetra, ary Jesosy koa efa natao batisa sy nivavaka, dia nisokatra ny lanitra; '
  '22':
  - type: text
    content: 'ary ny Fanahy Masina nidina teo amboniny, koa ny endriny dia tahaka ny voromailala. Dia nisy feo avy tany an-danitra hoe: Ianao no Zanako malalako; Ianao no sitrako.'
  - type: heading
    content: Ireo razamben’i Jesosy
  - type: heading
    content: Mat 1.1-17
  '23':
  - type: text
    content: 'Tokony ho telopolo taona Jesosy, rehefa nanomboka ny raharahany, ka natao ho zanak’i Josefa izay zanak’i Hely, '
  '24':
  - type: text
    content: 'zanak’i Matata, zanak’i Levy, zanak’i Melky, zanak’i Janay, zanak’i Josefa, '
  '25':
  - type: text
    content: 'zanak’i Matatia, zanak’i Amosa, zanak’i Nahoma, zanak’i Esly, zanak’i Nagay, '
  '26':
  - type: text
    content: 'zanak’i Mata, zanak’i Matatia, zanak’i Semeina, zanak’i Joseka, zanak’i Joda, '
  '27':
  - type: text
    content: 'zanak’i Joanana, zanak’i Resa, zanak’i Zerobabela, zanak’i Salatiela, zanak’i Nery, '
  '28':
  - type: text
    content: 'zanak’i Melky, zanak’i Ady, zanak’i Kosama, zanak’i Elmadama, zanak’i Era, '
  '29':
  - type: text
    content: 'zanak’i Jesosy, zanak’i Eliezera, zanak’i Jorima, zanak’i Matata, zanak’i Levy, '
  '3':
  - type: text
    content: 'Ary nankany amin’ny faritra rehetra any amoron’i Jordana izy nitory ny batisan’ny fibebahana ho famelan-keloka; '
  '30':
  - type: text
    content: 'zanak’i Simeona, zanak’i Joda, zanak’i Josefa, zanak’i Jonama, zanak’i Eliakima, '
  '31':
  - type: text
    content: 'zanak’i Melea, zanak’i Mena, zanak’i Matata, zanak’i Natama, zanak’i Davida, '
  '32':
  - type: text
    content: 'zanak’i Jese, zanak’i Jobeda, zanak’i Boaza, zanak’i Salmona, zanak’i Nahasona, '
  '33':
  - type: text
    content: 'zanak’i Aminadaba, zanak’i Admina, zanak’i Arny, zanak’i Hezroma, zanak’i Fareza, zanak’i Joda, '
  '34':
  - type: text
    content: 'zanak’i Jakoba, zanak’Isaka, zanak’i Abrahama, zanak’i Tera, zanak’i Nahora, '
  '35':
  - type: text
    content: 'zanak’i Seroga, zanak’i Reo, zanak’i Palega, zanak’i Ebera, zanak’i Sela, '
  '36':
  - type: text
    content: 'zanak’i Kenama, zanak’i Arpaksada, zanak’i Sema, zanak’i Noa, zanak’i Lameka, '
  '37':
  - type: text
    content: 'zanak’i Metosela, zanak’i Enoka, zanak’i Jareda, zanak’i Mahalalila, zanak’i Kenama, '
  '38':
  - type: text
    content: zanak’i Enosy, zanak’i Seta, zanak’i Adama, zanak’Andriamanitra.
  '4':
  - type: text
    content: araka ny voasoratra ao amin’ny bokin’ny tenin’Isaia mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' hoe:'
  - type: text
    content: '«Injany misy feon’ny miantso mafy any an-tany efitra hoe:'
  - type: text
    content: Amboary ny lalan’NY TOMPO,
  - type: text
    content: ataovy mahitsy ny lalan-kalehany.
  '5':
  - type: text
    content: Ny lohasaha rehetra dia hototofana,
  - type: text
    content: ny tendrombohitra sy ny havoana rehetra dia haetry,
  - type: text
    content: ny miolikolika dia hahitsy,
  - type: text
    content: ny lalana mikitoantoana dia hohamarinina;
  '6':
  - type: text
    content: Ary ny nofo rehetra dia hahita ny famonjen’Andriamanitra» (Isa 40.3-5).
  - type: heading
    content: Ny fanambaràn’i Jaona Mpanao batisa
  - type: heading
    content: Mat 3.7-10
  '7':
  - type: text
    content: 'Hoy izy tamin’ny vahoaka izay nankeo aminy mba hataony batisa: Ry taranaky ny menarana, iza no nanoro hevitra anareo handositra ny fahatezerana ho avy? '
  '8':
  - type: text
    content: 'Koa mamoaza voa mendrika ny fibebahana; ary aza miteny anakampo hoe: Manana an’i Abrahama ho rainay izahay; fa lazaiko aminareo fa Andriamanitra mahay manangana zanaka ho an’i Abrahama avy amin’ireto vato ireto. '
  '9':
  - type: text
    content: Indro, efa mipetraka ao amin’ny fototry ny hazo sahady ny famaky; koa ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo.
  - type: heading
    content: Ny vokatry ny fiovana tanteraka
