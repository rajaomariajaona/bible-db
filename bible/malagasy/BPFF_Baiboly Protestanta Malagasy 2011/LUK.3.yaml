document_id: LUK.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jaona Mpanao batisa, mpaminanin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 3.1-6; Mar 1.2-6; ampit. Jao 1.19-23
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny taona fahadimy amby folo nanjakan’i Tiberio Kaisara, fony i Pontio Pilato no governora tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ', i Heroda no mpanapaka tany Galilia, i Filipo rahalahiny no mpanapaka ny tany Itoria sy Trakonitisy, i Lisaniasy no mpanapaka tany Abilena '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nanontany an’i Jaona ny vahoaka hoe: Inona ary no hataonay? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Namaly azy izy hoe: Izay manana akanjo roa dia aoka hanome ho an’ny tsy manana ary izay manan-kanina dia aoka hanao toy izany koa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia avy koa ny mpamory hetra sasany mba hataony batisa ka niteny taminy hoe: Mpampianatra ô, inona no hataonay? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hoy izy taminy: Aza mampandoa mihoatra noho izay notendrena halainareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nisy miaramila koa nanontany azy hoe: Inona kosa no mba hataonay? Dia hoy izy taminy: Aza mampiasa hery amin’ny tsy antony na miampanga lainga, ary aoka ho afa-po amin’ny karamanareo ianareo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny filazan’i Jaona Mpanao batisa ny amin’Ilay ho avy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 3.11-12; Mar 1.7-8; ampit. Jao 1.24-28
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Raha mbola niandry ny olona ka samy nieritreritra an’i Jaona tao am-pony, na izy no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' na tsia, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'dia hoy i Jaona tamin’izy rehetra: Izaho dia manao batisa anareo amin’ny rano, fa avy Izay mahery noho izaho ka tsy mendrika hamaha ny fehin-kapany akory aza aho; Izy no hanao batisa anareo amin’ny Fanahy Masina sy ny afo; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: eny an-tanany ny fikororohany hanadiovany tsara ny ao am-pamoloany ka hanangonany ny vary ho ao amin’ny sompiny; fa ny akofa sy ny mololo dia hodorany amin’ny afo tsy azo vonoina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Heroda sy i Jaona Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 14.3-4; Mar 6.17-18
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fananarana maro hafa koa no notorìny tamin’ny olona.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa i Heroda mpanapaka, nony nanarin’i Jaona noho ny amin’i Herodiasy, vadin’ny rahalahiny, sy noho ny ratsy rehetra izay nataony, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ary i Anasy sy i Kaiafa no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpisoronabe
    - type: text
      text: ', dia tonga tamin’i Jaona, zanak’i Zakaria, tany an-tany efitra ny tenin’Andriamanitra.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 3.1-6; Mar 1.2-6; Jao 1.19-23
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: dia nanidy an’i Jaona tao an-tranomaizina ho fanampin’izany rehetra izany koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanaovana batisa an’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 3.13-17; Mar 1.9-11; ampit. Jao 1.29-34
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Rehefa natao batisa ny vahoaka rehetra, ary Jesosy koa efa natao batisa sy nivavaka, dia nisokatra ny lanitra; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ary ny Fanahy Masina nidina teo amboniny, koa ny endriny dia tahaka ny voromailala. Dia nisy feo avy tany an-danitra hoe: Ianao no Zanako malalako; Ianao no sitrako.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo razamben’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 1.1-17
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tokony ho telopolo taona Jesosy, rehefa nanomboka ny raharahany, ka natao ho zanak’i Josefa izay zanak’i Hely, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'zanak’i Matata, zanak’i Levy, zanak’i Melky, zanak’i Janay, zanak’i Josefa, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'zanak’i Matatia, zanak’i Amosa, zanak’i Nahoma, zanak’i Esly, zanak’i Nagay, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'zanak’i Mata, zanak’i Matatia, zanak’i Semeina, zanak’i Joseka, zanak’i Joda, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'zanak’i Joanana, zanak’i Resa, zanak’i Zerobabela, zanak’i Salatiela, zanak’i Nery, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'zanak’i Melky, zanak’i Ady, zanak’i Kosama, zanak’i Elmadama, zanak’i Era, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'zanak’i Jesosy, zanak’i Eliezera, zanak’i Jorima, zanak’i Matata, zanak’i Levy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nankany amin’ny faritra rehetra any amoron’i Jordana izy nitory ny batisan’ny fibebahana ho famelan-keloka; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'zanak’i Simeona, zanak’i Joda, zanak’i Josefa, zanak’i Jonama, zanak’i Eliakima, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'zanak’i Melea, zanak’i Mena, zanak’i Matata, zanak’i Natama, zanak’i Davida, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'zanak’i Jese, zanak’i Jobeda, zanak’i Boaza, zanak’i Salmona, zanak’i Nahasona, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'zanak’i Aminadaba, zanak’i Admina, zanak’i Arny, zanak’i Hezroma, zanak’i Fareza, zanak’i Joda, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'zanak’i Jakoba, zanak’Isaka, zanak’i Abrahama, zanak’i Tera, zanak’i Nahora, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'zanak’i Seroga, zanak’i Reo, zanak’i Palega, zanak’i Ebera, zanak’i Sela, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'zanak’i Kenama, zanak’i Arpaksada, zanak’i Sema, zanak’i Noa, zanak’i Lameka, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'zanak’i Metosela, zanak’i Enoka, zanak’i Jareda, zanak’i Mahalalila, zanak’i Kenama, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: zanak’i Enosy, zanak’i Seta, zanak’i Adama, zanak’Andriamanitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: araka ny voasoratra ao amin’ny bokin’ny tenin’Isaia mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: profeta.
      marker-yv: yv-n
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Injany misy feon’ny miantso mafy any an-tany efitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amboary ny lalan’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataovy mahitsy ny lalan-kalehany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny lohasaha rehetra dia hototofana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tendrombohitra sy ny havoana rehetra dia haetry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny miolikolika dia hahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lalana mikitoantoana dia hohamarinina;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary ny nofo rehetra dia hahita ny famonjen’Andriamanitra» (Isa 40.3-5).
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanambaràn’i Jaona Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 3.7-10
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hoy izy tamin’ny vahoaka izay nankeo aminy mba hataony batisa: Ry taranaky ny menarana, iza no nanoro hevitra anareo handositra ny fahatezerana ho avy? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa mamoaza voa mendrika ny fibebahana; ary aza miteny anakampo hoe: Manana an’i Abrahama ho rainay izahay; fa lazaiko aminareo fa Andriamanitra mahay manangana zanaka ho an’i Abrahama avy amin’ireto vato ireto. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Indro, efa mipetraka ao amin’ny fototry ny hazo sahady ny famaky; koa ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vokatry ny fiovana tanteraka
    marker-yv: yv-h
