document_id: PRO.22,396
type_code: plt
verses:
  '1':
  - type: text
    content: Aleo laza tsara toy izay harem-be;
  - type: text
    content: ary aleo mahazo sitraka amin’olona
  - type: text
    content: toy izay mahazo volamena sy volafotsy.
  '10':
  - type: text
    content: Roahy ny mpaniratsira fa hitsahatra ny fifandirana,
  - type: text
    content: ary hifarana koa na ny ady na ny fanalam-baràka.
  '11':
  - type: text
    content: Izay te ho sakaizan’ny mpanjaka
  - type: text
    content: dia handala eritreritra madio sy fiteny mahatehotia.
  '12':
  - type: text
    content: Ny TOMPO miahy sy miaro ny tena fahalalana,
  - type: text
    content: fa mamaky bantsilana kosa ireo tenin’ny mpamadika.
  '13':
  - type: text
    content: 'Hoy ny kamo hoe: «Misy liona ao ivelany ao;'
  - type: text
    content: ka mety ho fatiny aho, raha eny an-dalambe.»
  '14':
  - type: text
    content: Tevana lalina ny tenin’ny vehivavy vadin’olona,
  - type: text
    content: ka izay voaozon’ny TOMPO no hianjera ao
  - type: note
    content: Jereo 5.5 sy nta.
  - type: text
    content: .
  '15':
  - type: text
    content: Latsa-paka ao am-pon’ny zaza ny hadalana,
  - type: text
    content: ka tsorakazom-pamaizana no hanongotra izany aminy.
  '16':
  - type: text
    content: Izay mampahory ny mahantra dia mampahazo tombontsoa azy;
  - type: text
    content: izay manome ny mpanankarena dia mihamahantra
  - type: note
    content: Jereo 1 Sam 2.8; Jôb 5.11; Lk 1.51-53...
  - type: text
    content: .
  - type: heading
    content: 'Fampitandremana samihafa: Anatra telopolo'
  '17':
  - type: text
    content: Atongilano ny sofinao ka henoy ny tenin’ny hendry
  - type: text
    content: ary aoka hotandremanao ny traikefa ananany.
  '18':
  - type: text
    content: Ho hafinaretanao ny fitahirizana izany ao am-po;
  - type: text
    content: ary aoka izy tsy hiala eo amin’ny molotrao.
  '19':
  - type: text
    content: Ny hanananao fitokiana ny TOMPO
  - type: text
    content: no ampahafantarako izany aminao anio.
  '2':
  - type: text
    content: 'Izao no iombonan’ny mpanankarena sy ny mahantra:'
  - type: text
    content: samy nataon’ny TOMPO izy roa.
  '20':
  - type: text
    content: Ho anao no nanoratako anatra telopolo
  - type: text
    content: izay feno torohevitra sy traikefa,
  '21':
  - type: text
    content: mba hahafantaranao fa mitombina
  - type: text
    content: ireo fampianarana azo antoka ireo
  - type: text
    content: sy hanaovanao koa tatitra azo antoka
  - type: text
    content: amin’izay olona naniraka anao.
  - type: heading
    content: (anatra voalohany)
  '22':
  - type: text
    content: Aza manendaka ny mahantra, noho izy mahantra;
  - type: text
    content: ary aza mampahory tsy mana-mpiahy amin’ny fitsarana.
  '23':
  - type: text
    content: fa ny TOMPO hiaro azy amin’ny adiny,
  - type: text
    content: ka hipaoka ny ain’ireo nipaoka ny fananany.
  - type: heading
    content: (anatra faharoa)
  '24':
  - type: text
    content: Aza mety ho sakaizan’ny olona mora tezitra
  - type: text
    content: ary aza miaraka amin’ny olona saro-po,
  '25':
  - type: text
    content: fandrao hianatra ny fanaony ianao
  - type: text
    content: ka ho voasingotra hatramin’ny ainao.
  - type: heading
    content: (anatra fahatelo)
  '26':
  - type: text
    content: Aza mety mandray tanan’olon-kafa ianao
  - type: text
    content: ho mariky ny fiantohanao trosan’ny namanao;
  '27':
  - type: text
    content: fa raha tsy manan-kaloa ianao,
  - type: text
    content: dia halaina mbamin’ny farafara fandrianao
  - type: note
    content: Jereo 6.1 sy nta.
  - type: text
    content: .
  - type: heading
    content: (anatra fahefatra)
  '28':
  - type: text
    content: Aza mba mamindra ny baorina tranainy
  - type: text
    content: izay napetraky ny razanao ho faritry ny saha.
  - type: heading
    content: (anatra fahadimy)
  '29':
  - type: text
    content: 'Jereo io olona manao tsara ny asany io:'
  - type: text
    content: ho afa-miasa eo anatrehan’ny mpanjaka izy
  - type: text
    content: toy izay ho mpiasa tsy misy mpahalala.
  - type: heading
    content: (anatra fahenina)
  '3':
  - type: text
    content: Mahatsinjo ny loza ny malina ka miery;
  - type: text
    content: fa ny kely saina kosa mandroso ka voa.
  '4':
  - type: text
    content: Ny vokatry ny fanetren-tena sy ny fanajana ny TOMPO
  - type: text
    content: dia harena sy voninahitra ary fiainana.
  '5':
  - type: text
    content: Feno tsilo sy fandrika ny lalan’ny ratsy fanahy;
  - type: text
    content: koa izay te hiaro ny ainy dia manalavitra izany.
  '6':
  - type: text
    content: Vao manomboka fiainana, dia omeo fizàrana tsara ny zaza;
  - type: text
    content: fa na rehefa antitra aza izy, dia tsy hiala amin’izany.
  '7':
  - type: text
    content: Ny mpanankarena manapaka ny mahantra,
  - type: text
    content: ary izay misambotra dia andevon’ny mpampisambotra.
  '8':
  - type: text
    content: Izay mamafy tsy fahamarinana dia hijinja fahoriana,
  - type: text
    content: fa ho levona ny fitaovam-pamoretany.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Hotahîna
  - type: text
    content: ' izay manana fijery mangoraka,'
  - type: text
    content: satria mizara ny haniny amin’ny mahantra izy.
