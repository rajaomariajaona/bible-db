document_id: PRO.22,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo laza tsara toy izay harem-be;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aleo mahazo sitraka amin’olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay mahazo volamena sy volafotsy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Roahy ny mpaniratsira fa hitsahatra ny fifandirana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hifarana koa na ny ady na ny fanalam-baràka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay te ho sakaizan’ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handala eritreritra madio sy fiteny mahatehotia.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO miahy sy miaro ny tena fahalalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mamaky bantsilana kosa ireo tenin’ny mpamadika.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy ny kamo hoe: «Misy liona ao ivelany ao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mety ho fatiny aho, raha eny an-dalambe.»
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tevana lalina ny tenin’ny vehivavy vadin’olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izay voaozon’ny TOMPO no hianjera ao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 5.5 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Latsa-paka ao am-pon’ny zaza ny hadalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsorakazom-pamaizana no hanongotra izany aminy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mampahory ny mahantra dia mampahazo tombontsoa azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manome ny mpanankarena dia mihamahantra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Sam 2.8; Jôb 5.11; Lk 1.51-53...
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fampitandremana samihafa: Anatra telopolo'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano ny sofinao ka henoy ny tenin’ny hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hotandremanao ny traikefa ananany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho hafinaretanao ny fitahirizana izany ao am-po;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka izy tsy hiala eo amin’ny molotrao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hanananao fitokiana ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ampahafantarako izany aminao anio.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no iombonan’ny mpanankarena sy ny mahantra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy nataon’ny TOMPO izy roa.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho anao no nanoratako anatra telopolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay feno torohevitra sy traikefa,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahafantaranao fa mitombina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo fampianarana azo antoka ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanaovanao koa tatitra azo antoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay olona naniraka anao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra voalohany)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manendaka ny mahantra, noho izy mahantra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mampahory tsy mana-mpiahy amin’ny fitsarana.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny TOMPO hiaro azy amin’ny adiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hipaoka ny ain’ireo nipaoka ny fananany.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra faharoa)
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mety ho sakaizan’ny olona mora tezitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza miaraka amin’ny olona saro-po,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hianatra ny fanaony ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho voasingotra hatramin’ny ainao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra fahatelo)
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mety mandray tanan’olon-kafa ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho mariky ny fiantohanao trosan’ny namanao;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha tsy manan-kaloa ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia halaina mbamin’ny farafara fandrianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 6.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra fahefatra)
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mba mamindra ny baorina tranainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay napetraky ny razanao ho faritry ny saha.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra fahadimy)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jereo io olona manao tsara ny asany io:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho afa-miasa eo anatrehan’ny mpanjaka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay ho mpiasa tsy misy mpahalala.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra fahenina)
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatsinjo ny loza ny malina ka miery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny kely saina kosa mandroso ka voa.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vokatry ny fanetren-tena sy ny fanajana ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia harena sy voninahitra ary fiainana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno tsilo sy fandrika ny lalan’ny ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa izay te hiaro ny ainy dia manalavitra izany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao manomboka fiainana, dia omeo fizàrana tsara ny zaza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na rehefa antitra aza izy, dia tsy hiala amin’izany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanankarena manapaka ny mahantra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay misambotra dia andevon’ny mpampisambotra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamafy tsy fahamarinana dia hijinja fahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho levona ny fitaovam-pamoretany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hotahîna
    - type: text
      text: ' izay manana fijery mangoraka,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mizara ny haniny amin’ny mahantra izy.
