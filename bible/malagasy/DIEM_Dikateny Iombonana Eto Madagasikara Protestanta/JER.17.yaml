    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: TOMPO ô, sitrano aho, dia ho sitrana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vonjeo aho, dia ho voavonjy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa antony hiderako Anao izany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Indreo ny besinimaro milaza amiko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aiza ihany ity tenin’ny TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho tanteraka amin’izay izany!»
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tsy izaho no nanery Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanafaingana ny loza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tsy izaho... hanafaingana ny loza: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt tranainy grika anankiroa izany; ny RM dia manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ho mpiandry ondry.
      marker-yv: yv-n
    - type: text
      text: ', Tompo ô,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nirary hiavian’ny antambo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantatrao tokoa izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria niharihary teo anatrehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hafatra naloaky ny molotro.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Aoka tsy ho fampitahorana ahy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao no fialofako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny androm-pahoriana!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Aoka ireo mpanenjika ahy no ho menatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ny tenako velively;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ireo no ho trotraka, fa tsy izaho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy tonga aminy ny andro mandoza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary potipoteho tanteraka izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antso ho fanajana ny andro sabata
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Izao no voalazan’ny TOMPO tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana, ka mijoroa eo amin’ny vavahadim-bahoaka izay fandalovan’ny mpanjakan’i Joda raha miditra sy mivoaka ny tanàna izy; ary hanaovanao toy izany koa amin’ny vavahady rehetra eto Jerosalema. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ka ho marika hiampangana azy ireo alitarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ireo tsatokazo fanajany an’i Aserà,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny akaiky hazo maitso sy eny ambony havoana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ho marika hiampangana azy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny RM «araka ny tsaroan’ireo zanany lahy». –
      - type: usfm
        marker: bd
        children:
        - type: text
          text: tsatokazo fanasinana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Mpits 3.7 sy nta. –'
      - type: usfm
        marker: bd
        children:
        - type: text
          text: hazo maitso sy havoana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 3.20 sy nta. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: tendrombohitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': araka ny RM '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tendrombohitro
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –And 3-4: ampit 15.13-14.'
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ka lazao amin’ny mpandalo hoe: «Mihainoa ny tenin’ny TOMPO ianareo mpanjakan’i Joda sy ianareo rehetra vahoakan’i Joda ary ianareo rehetra mponina eto Jerosalema izay miditra amin’ireto vavahady ireto. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Izao no lazain’ny TOMPO: Mitandrema tena ianareo mba tsy hitondra entana amin’ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' ka hampandalo azy amin’ireo vavahadin’i Jerosalema ireo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Fanajana ny sabata: jereo Ne 13.15-22.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Aza mitondra entana mivoaka ny tranonareo amin’ny andro sabata na manao raharaha akory amin’izany; fa atokany ho Ahy ny andro sabata tahaka izay efa nandidiako ny razanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny andron’ny Tompo: jereo Eks 20.8-10; Deot 5.12-14.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Nefa tsy nihaino izy na nampandry sofina fa nanamafy hatoka; eny, tsy nihaino izy fa nandà ny fampitandremako.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '«Ianareo kosa, mihainoa Ahy tsara, hoy ny teny hentitra avy amiko TOMPO. Aza mampandalo entana amin’ireo vavahadin’ny tanàna ireo amin’ny andro sabata; fa atokany ho Ahy izany andro izany ka aza manao raharaha akory ianareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Amin’izay ireo mpanjaka mipetraka eo amin’ny sezafiandrianan’i Davida ka mandeha mitaingin-tsoavaly na kalesy sy ireo mpitondra sy ny vahoakan’i Joda ary ireo mponina rehetra eto Jerosalema dia hahazo hiditra amin’ireo vavahady ireo hatrany; ary ity tanàna ity dia honenana mandrakizay. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Amin’izay dia ho avy ireo olona avy amin’ny tanànan’i Joda sy ny manodidina an’i Jerosalema mbamin’ny faritanin’i Benjamîna ary koa ireo olona avy eny amin’ny lemak’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sefelà
    - type: text
      text: ' sy ny tany be tendrombohitra mbamin’ny faritr’i Negeba; ka hankao an-tempoly izy hanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy sorona hafa, hanolotra fanatitra hanina sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: ' nafangaro ary sorom-pisaorana. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa raha tsy mihaino Ahy kosa ianareo ka tsy manokana ny andro sabata ho Ahy fa mbola mitondra entana mandalo amin’ireo vavahadin’i Jerosalema ireo amin’ny andro sabata ihany, dia handrehetako afo ao anaty tanàna; ka handevona ireo tranony tsara tarehy izany afo izany sady tsy ho faty.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ary eny antampon-tendrombohitra any an-tsaha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatolotro horobaina avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanananao sy ny haren-tsarobidinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ireo toeran-tsampinao koa aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho valin’ny ota nataonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tao amin’ny faritaninao manontolo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary tsy maintsy hafoinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zaratany izay nomeko anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampanompoiko ny fahavalonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny tany tsy fantatrao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria narehitrao ny afom-pahatezerako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hirehitra mandrakizay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fialofana azo antoka sy ny fialofana sandoka
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Izao no lazain’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Voaozona izay mitoky amin’olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy miantehitra amin’ny nofo ho heriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampiala ny fony amiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ho tahaka ny anjavidy ao an-tany hay izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hahita ny soa ho avy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitoetra an-tsaham-bato any an-taniefitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia eo amin’ny tanin-tsira tsy azo onenana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa hotahîna izay mitoky amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manana Ahy TOMPO ho fialofany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ho tahaka ny hazo ambolena eo amoron-drano izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka misandraha-paka eo akaikin’ny renirano.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy atahorany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 1.3.
      marker-yv: yv-n
    - type: text
      text: ' na avy aza ny hafanana,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary maitso hatrany ny raviny;
  - type: usfm
