    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ry TOMPO fanantenàn’i Israely ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho menatra izay rehetra mandao Anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voasoratra anarana eo am-bovoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nihataka taminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho izy efa nandao Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry TOMPO loharano velona ô
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
