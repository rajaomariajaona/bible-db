document_id: JER.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Atsikafon’ny Tompo ny heloky ny vahoakan’i Joda
  - type: text
    content: Ny fahotan’ireo vahoakan’i Joda dia voasoratra
  - type: text
    content: tamin’ny vy sy diamondra fanoratana.
  - type: text
    content: Tahaka ny voasokitra soratra amin’ny vatofisaka
  - type: text
    content: no mahavoasokitra izany ao am-pony
  - type: text
    content: 'sy eny an-joron’ny '
  - type: text
    content: alitarany
  - type: note
    content: 'Zoron’ny alitara: jereo Eks 27.2, fa io no faritra heverina ho masina indrindra.'
  - type: text
    content: ;
  '10':
  - type: text
    content: –Izaho TOMPO kosa
  - type: text
    content: dia mahita ny ao am-po
  - type: text
    content: sy mamantatra ny ao an’eritreritra.
  - type: text
    content: Koa araka ny fitondrantenany
  - type: text
    content: sy ny vokatry ny asany avy
  - type: text
    content: no hamaliako ny olona
  - type: note
    content: 'Ny miafina ao an’eritreritra: jereo Jer 11.20 sy nta. –araka ny fitondrantenany avy: jereo Apôk 2.23.'
  - type: text
    content: .
  '11':
  - type: text
    content: Tahaka ny akoho mikotrika atodin-gana
  - type: note
    content: na tsipoy mikotrika ny atody tsy nalatsany.
  - type: text
    content: ','
  - type: text
    content: 'toy izany izay manangon-karena tsy ara-drariny:'
  - type: text
    content: eo antenatenan’androny izy
  - type: text
    content: no hilaozan’izany hareny izany,
  - type: text
    content: ka ho lasa adala no iafarany.
  - type: heading
    content: Ny Tompo no hany loharanom-piainana
  '12':
  - type: text
    content: Sezafiandrianana be voninahitra
  - type: text
    content: sady miteronterona hatrany am-boalohany
  - type: text
    content: no tempoly masina ho antsika
  - type: note
    content: Jereo 3.17.
  - type: text
    content: .
  '13':
  - type: text
    content: Ry TOMPO fanantenàn’i Israely ô,
  - type: text
    content: ho menatra izay rehetra mandao Anao.
  - type: text
    content: Voasoratra anarana eo am-bovoka
  - type: text
    content: izay nihataka taminao,
  - type: text
    content: noho izy efa nandao Anao,
  - type: text
    content: ry TOMPO loharano velona ô
  - type: note
    content: Jereo 2.13.
  - type: text
    content: .
  - type: heading
    content: Vavak’i Jeremià
  '14':
  - type: text
    content: TOMPO ô, sitrano aho, dia ho sitrana;
  - type: text
    content: vonjeo aho, dia ho voavonjy,
  - type: text
    content: fa antony hiderako Anao izany.
  '15':
  - type: text
    content: 'Indreo ny besinimaro milaza amiko hoe:'
  - type: text
    content: «Aiza ihany ity tenin’ny TOMPO?
  - type: text
    content: Aoka ho tanteraka amin’izay izany!»
  '16':
  - type: text
    content: Tsy izaho no nanery Anao
  - type: text
    content: hanafaingana ny loza
  - type: note
    content: 'Tsy izaho... hanafaingana ny loza: araka ny dkt tranainy grika anankiroa izany; ny RM dia manao hoe ho mpiandry ondry.'
  - type: text
    content: ', Tompo ô,'
  - type: text
    content: na nirary hiavian’ny antambo.
  - type: text
    content: Fantatrao tokoa izany,
  - type: text
    content: satria niharihary teo anatrehanao
  - type: text
    content: izay hafatra naloaky ny molotro.
  '17':
  - type: text
    content: Aoka tsy ho fampitahorana ahy Ianao
  - type: text
    content: fa Ianao no fialofako
  - type: text
    content: amin’ny androm-pahoriana!
  '18':
  - type: text
    content: Aoka ireo mpanenjika ahy no ho menatra
  - type: text
    content: fa tsy ny tenako velively;
  - type: text
    content: aoka ireo no ho trotraka, fa tsy izaho.
  - type: text
    content: Ataovy tonga aminy ny andro mandoza,
  - type: text
    content: ary potipoteho tanteraka izy.
  - type: heading
    content: Antso ho fanajana ny andro sabata
  '19':
  - type: text
    content: 'Izao no voalazan’ny TOMPO tamiko:'
  - type: text
    content: '–Mandehana, ka mijoroa eo amin’ny vavahadim-bahoaka izay fandalovan’ny mpanjakan’i Joda raha miditra sy mivoaka ny tanàna izy; ary hanaovanao toy izany koa amin’ny vavahady rehetra eto Jerosalema. '
  '2':
  - type: text
    content: ka ho marika hiampangana azy ireo alitarany
  - type: text
    content: sy ireo tsatokazo fanajany an’i Aserà,
  - type: text
    content: eny akaiky hazo maitso sy eny ambony havoana
  - type: note
    content: 'ho marika hiampangana azy: araka ny RM «araka ny tsaroan’ireo zanany lahy». –tsatokazo fanasinana: jereo Mpits 3.7 sy nta. –hazo maitso sy havoana: jereo 3.20 sy nta. –tendrombohitra: araka ny RM tendrombohitro. –And 3-4: ampit 15.13-14.'
  '20':
  - type: text
    content: 'Ka lazao amin’ny mpandalo hoe: «Mihainoa ny tenin’ny TOMPO ianareo mpanjakan’i Joda sy ianareo rehetra vahoakan’i Joda ary ianareo rehetra mponina eto Jerosalema izay miditra amin’ireto vavahady ireto. '
  '21':
  - type: text
    content: 'Izao no lazain’ny TOMPO: Mitandrema tena ianareo mba tsy hitondra entana amin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' ka hampandalo azy amin’ireo vavahadin’i Jerosalema ireo'
  - type: note
    content: 'Fanajana ny sabata: jereo Ne 13.15-22.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: Aza mitondra entana mivoaka ny tranonareo amin’ny andro sabata na manao raharaha akory amin’izany; fa atokany ho Ahy ny andro sabata tahaka izay efa nandidiako ny razanareo
  - type: note
    content: 'Ny andron’ny Tompo: jereo Eks 20.8-10; Deot 5.12-14.'
  - type: text
    content: '. '
  '23':
  - type: text
    content: Nefa tsy nihaino izy na nampandry sofina fa nanamafy hatoka; eny, tsy nihaino izy fa nandà ny fampitandremako.
  '24':
  - type: text
    content: '«Ianareo kosa, mihainoa Ahy tsara, hoy ny teny hentitra avy amiko TOMPO. Aza mampandalo entana amin’ireo vavahadin’ny tanàna ireo amin’ny andro sabata; fa atokany ho Ahy izany andro izany ka aza manao raharaha akory ianareo. '
  '25':
  - type: text
    content: 'Amin’izay ireo mpanjaka mipetraka eo amin’ny sezafiandrianan’i Davida ka mandeha mitaingin-tsoavaly na kalesy sy ireo mpitondra sy ny vahoakan’i Joda ary ireo mponina rehetra eto Jerosalema dia hahazo hiditra amin’ireo vavahady ireo hatrany; ary ity tanàna ity dia honenana mandrakizay. '
  '26':
  - type: text
    content: 'Amin’izay dia ho avy ireo olona avy amin’ny tanànan’i Joda sy ny manodidina an’i Jerosalema mbamin’ny faritanin’i Benjamîna ary koa ireo olona avy eny amin’ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ' sy ny tany be tendrombohitra mbamin’ny faritr’i Negeba; ka hankao an-tempoly izy hanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorona hafa, hanolotra fanatitra hanina sy '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' nafangaro ary sorom-pisaorana. '
  '27':
  - type: text
    content: Fa raha tsy mihaino Ahy kosa ianareo ka tsy manokana ny andro sabata ho Ahy fa mbola mitondra entana mandalo amin’ireo vavahadin’i Jerosalema ireo amin’ny andro sabata ihany, dia handrehetako afo ao anaty tanàna; ka handevona ireo tranony tsara tarehy izany afo izany sady tsy ho faty.»
  '3':
  - type: text
    content: ary eny antampon-tendrombohitra any an-tsaha.
  - type: text
    content: Hatolotro horobaina avokoa
  - type: text
    content: ny fanananao sy ny haren-tsarobidinao,
  - type: text
    content: mbamin’ireo toeran-tsampinao koa aza
  - type: text
    content: ho valin’ny ota nataonao
  - type: text
    content: tao amin’ny faritaninao manontolo.
  '4':
  - type: text
    content: Ary tsy maintsy hafoinao
  - type: text
    content: ny zaratany izay nomeko anao.
  - type: text
    content: Hampanompoiko ny fahavalonao
  - type: text
    content: any amin’ny tany tsy fantatrao ianao,
  - type: text
    content: satria narehitrao ny afom-pahatezerako
  - type: text
    content: izay hirehitra mandrakizay.
  - type: heading
    content: Ny fialofana azo antoka sy ny fialofana sandoka
  '5':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: –Voaozona izay mitoky amin’olombelona
  - type: text
    content: sy miantehitra amin’ny nofo ho heriny
  - type: text
    content: ka mampiala ny fony amiko.
  '6':
  - type: text
    content: Ho tahaka ny anjavidy ao an-tany hay izy
  - type: text
    content: ka tsy hahita ny soa ho avy;
  - type: text
    content: hitoetra an-tsaham-bato any an-taniefitra izy
  - type: text
    content: dia eo amin’ny tanin-tsira tsy azo onenana.
  '7':
  - type: text
    content: Fa hotahîna izay mitoky amiko
  - type: text
    content: ka manana Ahy TOMPO ho fialofany.
  '8':
  - type: text
    content: Ho tahaka ny hazo ambolena eo amoron-drano izy
  - type: text
    content: ka misandraha-paka eo akaikin’ny renirano.
  - type: text
    content: Tsy misy atahorany
  - type: note
    content: Ampit Sal 1.3.
  - type: text
    content: ' na avy aza ny hafanana,'
  - type: text
    content: ary maitso hatrany ny raviny;
  - type: text
    content: Na dia amin’ny taonan’ny hain-tany aza,
  - type: text
    content: tsy manahy izy fa mamokatra hatrany.
  '9':
  - type: text
    content: –Tsy misy zavatra mamitaka
  - type: text
    content: hoatra ny fon’olombelona.
  - type: text
    content: Tsy azo sitranina izy,
  - type: text
    content: ary tsy misy mahafantatra ny aminy.
