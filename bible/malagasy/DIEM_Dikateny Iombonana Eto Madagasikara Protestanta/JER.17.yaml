    - type: text
      text: Tahaka ny akoho mikotrika atodin-gana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
