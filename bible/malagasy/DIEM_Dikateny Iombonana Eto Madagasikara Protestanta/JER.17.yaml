  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho lasa adala no iafarany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Tompo no hany loharanom-piainana
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
