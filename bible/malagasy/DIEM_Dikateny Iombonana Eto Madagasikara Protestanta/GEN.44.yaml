document_id: GEN.44
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Notsapain’i Jôsefa toetra ireo rahalahiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy eo i Jôsefa dia nandidy ny mpikarakara ny ao an-tranony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fenoy hanina araka izay zakany ny kitapon’ireo lehilahy ireo, dia apetraho ao am-bavan-kitapon’ny tsirairay avy koa ny volany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Apetraho eo am-bava-kitapon’ilay faralahy koa ny tsangambavako volafotsy mbamin’ny vola hividianany vary.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia notanterahiny tokoa izay nandidian’i Jôsefa azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nony ampitso vao mangiran-dratsy, dia navela handeha ireo lehilahy ireo mbamin’ny borikiny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa nivoaka ny tanàna izy, ka tsy mbola lasa lavitra akory, dia hoy i Jôsefa tamin’ilay mpikarakara ny ao an-tranony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ndeha, enjeho ireny lehilahy ireny, ary tratraro ka anontanio hoe: «Nahoana ianareo no mamaly ratsy ny soa? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nahoana no nangalarinareo ny tsangambava izay fisotroan’ny tompoko sy fanaovany sikidy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny tian’i Jôsefa holazaina an-kolaka eto dia karazana sikidy izay mamoaka ny hevitry ny fihanaky ny menaka indray mitete eo ambonin’ny rano anaty tsangambava.
    marker-yv: yv-n
  - type: text
    text: '? Ratsy izao nataonareo izao!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nahatratra ireo rahalahin’i Jôsefa ralehilahy ka namerina taminy ireo teny ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary namaly izy mirahalahy avy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ahoana no ahazoanao miampanga anay toy izany, tompoko? Tsy ho sahy nanao izany zavatra izany na oviana na oviana izahay mpanomponao! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny vola izay hitanay tao am-bavan’ny kitapom-bary aza nentinay niverina avy any Kanahàna ho atỳ aminao. Koa ahoana no hangalaranay izay volafotsy na volamena avy ao an-tranon’ny tomponao? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa izay ahitana izany aminay mpanomponao dia hatao maty; ary izahay kosa handevozinao, tompoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ka hoy ralehilahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny àry, fa hotanako amin’ny teninareo ianareo; kanefa izay ahitana ny tsangambava ihany no ho tonga andevoko, fa ny sisa kosa dia ho afaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Samy nampidina faingana ny kitapony tamin’ny tany avy izy ireo ary samy nanokatra ny azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nosavain-dralehilahy avokoa ny kitapo rehetra nanomboka tamin’ny lehibe indrindra ka hatramin’ny kely indrindra, ka tao amin’ny kitapon’i Benjamîna no nahitana ilay tsangambava. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Samy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandriatra
  - type: text
    text: ' ny fitafiany izy ary samy namatratra ny entany teny amin’ny borikiny avy, dia niverina ho ao an-tanàna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tonga tao an-tranon’i Jôsefa i Joda sy ireo rahalahiny, fa mbola tratra tao izy. Dia niankohoka tamin’ny tany teo anatrehany izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy i Jôsefa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana no nanaovanareo izao zavatra izao? Tsy fantatrareo angaha fa ny lehilahy toa ahy izao dia mahay mamanta-javatra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia namaly i Joda hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona moa, tompoko, no holazainay anao? Inona no ho azonay lazaina mba hampiseho ny fahamarinanay? Andriamanitra no nahita ny fahadisoan’ny mpanomponao: indreto àry izahay, tompoko, manaiky ho andevonao miaraka amin’ilay nahitana ny tsangambava.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy kosa i Jôsefa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, sanatria ahy ny hanao izany! Ny olona izay nahitana ny tsangambava ihany no ho andevoko; ianareo kosa modia soa aman-tsara any amin’ny rainareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa nanatona azy i Joda ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tompokolahy ô, ianao no mitovy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: '. Koa azafady, tompoko, raha mba hiteny kely aminao aho ary aoka tsy ho tezitra ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ianao, tompoko, dia nanontany anay mpanomponao raha mbola manan-dray na rahalahy izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia namaly izahay hoe: «Mbola manan-dray efa antitra izahay ary koa ny zandrinay faralahy izay zanaky ny fahanterany. Tian-drainay fatratra izy, satria izy sisa no hany navelan’ny reniny fa ny rahalahiny dia efa maty.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nilaza taminay ianao hoe: «Ento aty amiko izy, fa tiako ho hita.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nanazava taminao izahay, tompoko, fa tsy afaka mandao an-drainy ny zaza; fa raha ilaozany ny rainy, dia ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanefa nilaza taminay ianao fa tsy handray anay intsony, raha tsy tonga miaraka aminay ny zandrinay faralahy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia niverina tany amin’i dada mpanomponao àry izahay, tompoko, ka nitatitra taminy ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa rehefa nilaza taminay ny rainay mba hiverina hividy sakafo, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'dia nitenenanay hoe: «Tsy afaka mankany izahay, raha tsy miaraka aminay ny zandrinay faralahy; fa raha tsy midina miaraka aminay izy, dia tsy afaka handray anay ilay tompon’ny tany.» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy i dada mpanomponao hoe: «Fantatrareo tsara fa roa lahy ihany no zanakay sy i Rahely vadiko. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny anankiray dia niala teto amiko; ary heveriko fa lanin’ny bibidia tokoa izy, satria tsy hitako intsony mandraka androany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Kanefa dia tadiavinareo halaina amiko indray ity ny anankiray. Raha hiharan-doza izy, dia ianareo no hahatonga ity tenako efa antitra ity ho difotr’alahelo hankany amin’ny toeran’ny maty.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ankehitriny ahoana no hodiako any amin’i dada, kanefa tsy miaraka aminay io zatovo io? Fa ny ain’i dada dia miankina amin’ny ain’io zatovo io; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'koa rehefa mahita azy tsy tafaverina izy, dia ho faty ka izahay mpanomponao no hahatonga io rainay efa antitra io ho difotr’alahelo hankany amin’ny toeran’ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izaho mpanomponao no niantoka io zatovo io tamin’ny raiko ka nanao hoe: «Raha tsy tafaveriko aminao izy, dia ho meloka amin’i dada mandritra ny androko rehetra aho.» '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa ankehitriny miangavy aho, tompoko, aoka ny tenako no hijanona hisolo toerana io zatovo io ho andevonao, fa izy kosa hiakatra hiaraka amin’ireo rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa tsy afaka hiverina any amin’i dada aho, raha tsy miaraka amin’io zatovo io satria tsy ho zakako ny hahita an’i dada hiharan-doza.
