document_id: GEN.44,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Notsapain’i Jôsefa toetra ireo rahalahiny
  - type: text
    content: 'Avy eo i Jôsefa dia nandidy ny mpikarakara ny ao an-tranony hoe:'
  - type: text
    content: '–Fenoy hanina araka izay zakany ny kitapon’ireo lehilahy ireo, dia apetraho ao am-bavan-kitapon’ny tsirairay avy koa ny volany. '
  '10':
  - type: text
    content: 'Ka hoy ralehilahy:'
  - type: text
    content: –Eny àry, fa hotanako amin’ny teninareo ianareo; kanefa izay ahitana ny tsangambava ihany no ho tonga andevoko, fa ny sisa kosa dia ho afaka.
  '11':
  - type: text
    content: 'Samy nampidina faingana ny kitapony tamin’ny tany avy izy ireo ary samy nanokatra ny azy. '
  '12':
  - type: text
    content: 'Nosavain-dralehilahy avokoa ny kitapo rehetra nanomboka tamin’ny lehibe indrindra ka hatramin’ny kely indrindra, ka tao amin’ny kitapon’i Benjamîna no nahitana ilay tsangambava. '
  '13':
  - type: text
    content: 'Samy '
  - type: text
    content: nandriatra
  - type: text
    content: ' ny fitafiany izy ary samy namatratra ny entany teny amin’ny borikiny avy, dia niverina ho ao an-tanàna.'
  '14':
  - type: text
    content: 'Tonga tao an-tranon’i Jôsefa i Joda sy ireo rahalahiny, fa mbola tratra tao izy. Dia niankohoka tamin’ny tany teo anatrehany izy ireo. '
  '15':
  - type: text
    content: 'Ary hoy i Jôsefa taminy:'
  - type: text
    content: –Ahoana no nanaovanareo izao zavatra izao? Tsy fantatrareo angaha fa ny lehilahy toa ahy izao dia mahay mamanta-javatra?
  '16':
  - type: text
    content: 'Dia namaly i Joda hoe:'
  - type: text
    content: '–Inona moa, tompoko, no holazainay anao? Inona no ho azonay lazaina mba hampiseho ny fahamarinanay? Andriamanitra no nahita ny fahadisoan’ny mpanomponao: indreto àry izahay, tompoko, manaiky ho andevonao miaraka amin’ilay nahitana ny tsangambava.'
  '17':
  - type: text
    content: 'Hoy kosa i Jôsefa hoe:'
  - type: text
    content: –Tsia, sanatria ahy ny hanao izany! Ny olona izay nahitana ny tsangambava ihany no ho andevoko; ianareo kosa modia soa aman-tsara any amin’ny rainareo.
  '18':
  - type: text
    content: 'Fa nanatona azy i Joda ka nanao hoe:'
  - type: text
    content: '–Tompokolahy ô, ianao no mitovy amin’ny '
  - type: text
    content: Farao
  - type: text
    content: '. Koa azafady, tompoko, raha mba hiteny kely aminao aho ary aoka tsy ho tezitra ianao. '
  '19':
  - type: text
    content: 'Ianao, tompoko, dia nanontany anay mpanomponao raha mbola manan-dray na rahalahy izahay. '
  '2':
  - type: text
    content: Apetraho eo am-bava-kitapon’ilay faralahy koa ny tsangambavako volafotsy mbamin’ny vola hividianany vary.
  - type: text
    content: 'Dia notanterahiny tokoa izay nandidian’i Jôsefa azy. '
  '20':
  - type: text
    content: 'Dia namaly izahay hoe: «Mbola manan-dray efa antitra izahay ary koa ny zandrinay faralahy izay zanaky ny fahanterany. Tian-drainay fatratra izy, satria izy sisa no hany navelan’ny reniny fa ny rahalahiny dia efa maty.» '
  '21':
  - type: text
    content: 'Dia nilaza taminay ianao hoe: «Ento aty amiko izy, fa tiako ho hita.» '
  '22':
  - type: text
    content: 'Nanazava taminao izahay, tompoko, fa tsy afaka mandao an-drainy ny zaza; fa raha ilaozany ny rainy, dia ho faty. '
  '23':
  - type: text
    content: 'Kanefa nilaza taminay ianao fa tsy handray anay intsony, raha tsy tonga miaraka aminay ny zandrinay faralahy. '
  '24':
  - type: text
    content: 'Dia niverina tany amin’i dada mpanomponao àry izahay, tompoko, ka nitatitra taminy ny teninao. '
  '25':
  - type: text
    content: 'Koa rehefa nilaza taminay ny rainay mba hiverina hividy sakafo, '
  '26':
  - type: text
    content: 'dia nitenenanay hoe: «Tsy afaka mankany izahay, raha tsy miaraka aminay ny zandrinay faralahy; fa raha tsy midina miaraka aminay izy, dia tsy afaka handray anay ilay tompon’ny tany.» '
  '27':
  - type: text
    content: 'Dia hoy i dada mpanomponao hoe: «Fantatrareo tsara fa roa lahy ihany no zanakay sy i Rahely vadiko. '
  '28':
  - type: text
    content: 'Ny anankiray dia niala teto amiko; ary heveriko fa lanin’ny bibidia tokoa izy, satria tsy hitako intsony mandraka androany. '
  '29':
  - type: text
    content: Kanefa dia tadiavinareo halaina amiko indray ity ny anankiray. Raha hiharan-doza izy, dia ianareo no hahatonga ity tenako efa antitra ity ho difotr’alahelo hankany amin’ny toeran’ny maty.»
  '3':
  - type: text
    content: 'Nony ampitso vao mangiran-dratsy, dia navela handeha ireo lehilahy ireo mbamin’ny borikiny. '
  '30':
  - type: text
    content: 'Ary ankehitriny ahoana no hodiako any amin’i dada, kanefa tsy miaraka aminay io zatovo io? Fa ny ain’i dada dia miankina amin’ny ain’io zatovo io; '
  '31':
  - type: text
    content: 'koa rehefa mahita azy tsy tafaverina izy, dia ho faty ka izahay mpanomponao no hahatonga io rainay efa antitra io ho difotr’alahelo hankany amin’ny toeran’ny maty. '
  '32':
  - type: text
    content: 'Izaho mpanomponao no niantoka io zatovo io tamin’ny raiko ka nanao hoe: «Raha tsy tafaveriko aminao izy, dia ho meloka amin’i dada mandritra ny androko rehetra aho.» '
  '33':
  - type: text
    content: 'Koa ankehitriny miangavy aho, tompoko, aoka ny tenako no hijanona hisolo toerana io zatovo io ho andevonao, fa izy kosa hiakatra hiaraka amin’ireo rahalahiny. '
  '34':
  - type: text
    content: Fa tsy afaka hiverina any amin’i dada aho, raha tsy miaraka amin’io zatovo io satria tsy ho zakako ny hahita an’i dada hiharan-doza.
  '4':
  - type: text
    content: 'Ary rehefa nivoaka ny tanàna izy, ka tsy mbola lasa lavitra akory, dia hoy i Jôsefa tamin’ilay mpikarakara ny ao an-tranony:'
  - type: text
    content: '–Ndeha, enjeho ireny lehilahy ireny, ary tratraro ka anontanio hoe: «Nahoana ianareo no mamaly ratsy ny soa? '
  '5':
  - type: text
    content: Nahoana no nangalarinareo ny tsangambava izay fisotroan’ny tompoko sy fanaovany sikidy
  - type: note
    content: Ny tian’i Jôsefa holazaina an-kolaka eto dia karazana sikidy izay mamoaka ny hevitry ny fihanaky ny menaka indray mitete eo ambonin’ny rano anaty tsangambava.
  - type: text
    content: '? Ratsy izao nataonareo izao!»'
  '6':
  - type: text
    content: 'Dia nahatratra ireo rahalahin’i Jôsefa ralehilahy ka namerina taminy ireo teny ireo. '
  '7':
  - type: text
    content: 'Ary namaly izy mirahalahy avy ka nanao hoe:'
  - type: text
    content: '–Ahoana no ahazoanao miampanga anay toy izany, tompoko? Tsy ho sahy nanao izany zavatra izany na oviana na oviana izahay mpanomponao! '
  '8':
  - type: text
    content: 'Fa ny vola izay hitanay tao am-bavan’ny kitapom-bary aza nentinay niverina avy any Kanahàna ho atỳ aminao. Koa ahoana no hangalaranay izay volafotsy na volamena avy ao an-tranon’ny tomponao? '
  '9':
  - type: text
    content: Koa izay ahitana izany aminay mpanomponao dia hatao maty; ary izahay kosa handevozinao, tompoko.
