document_id: JER.42,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nila hevitra tamin’i Jeremià ireo sisa tavela
  - type: text
    content: Tamin’izay ireo rehetra mpifehy ny andia-miaramila, indrindra i Jôhanàna zanakalahin’i Karea sy i Hazarià
  - type: note
    content: 'Hazarià: araka ny dkt grika tranainy toy ny ao 43.2; ny RM kosa manao hoe Jazanià.'
  - type: text
    content: 'zanakalahin’i Hôsaià, ary koa ny vahoaka rehetra teo na kely na lehibe, '
  '10':
  - type: text
    content: «Raha hiverina hipetraka
  - type: text
    content: ao amin’ity tany ity ianareo,
  - type: text
    content: dia haoriko indray ny vahoakanareo
  - type: text
    content: fa tsy horavako intsony;
  - type: text
    content: hamboleko indray ianareo
  - type: text
    content: fa tsy hongotako
  - type: note
    content: 'haoriko... hongotako: jereo 1.10; 24.6; 31.28; 45.4.'
  - type: text
    content: ','
  - type: text
    content: ary hanenenako ny loza
  - type: text
    content: izay efa namelezako anareo.
  '11':
  - type: text
    content: 'Koa aza matahotra ny mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' intsony.'
  - type: text
    content: 'Eny, Izaho TOMPO no manao teny hentitra hoe:'
  - type: text
    content: Aza matahotra azy fa momba anareo Aho
  - type: text
    content: hamonjy sy hanafaka anareo teo am-pelatanany.
  '12':
  - type: text
    content: Homeko indrafo ianareo
  - type: text
    content: ka hamindrafo anareo izy
  - type: text
    content: ary hamela anareo hiverina any an-taninareo.»
  '13':
  - type: text
    content: 'Hoy ihany i Jeremià:'
  - type: text
    content: '–Kanefa mety tsy hanaraka ny baikon’ny TOMPO Andriamanitrareo ianareo ka hilaza tsy hipetraka amin’io tany io, '
  '14':
  - type: text
    content: 'fa handeha any Ejipta mba tsy hahita ady sy tsy handre ny feon’ny anjomara ary tsy ho faty mosary intsony, dia hipetraka any! '
  '15':
  - type: text
    content: 'Ny amin’izay kosa dia mihainoa ny tenin’ny TOMPO ankehitriny ianareo izay sisa tavela amin’ny fanjakan’i Joda, fa izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely:'
  - type: text
    content: «Raha mikiry hankany Ejipta ianareo
  - type: text
    content: ka mandeha hialokaloka any,
  '16':
  - type: text
    content: dia any no hahatratra anareo
  - type: text
    content: ny ady izay atahoranareo
  - type: text
    content: ary any no hanaraka anareo ny mosary
  - type: text
    content: izay ahinareo mafy ka hahafaty anareo.
  '17':
  - type: text
    content: Izay rehetra mikiry hankany Ejipta
  - type: text
    content: mba handeha hialokaloka any
  - type: text
    content: dia ho fatin’ny ady sy ny mosary
  - type: text
    content: ary ny areti-mandringana
  - type: text
    content: ka tsy hisy ho afaka amin’ny loza
  - type: text
    content: izay halefako hamely azy.»
  '18':
  - type: text
    content: 'Dia niteny indray i Jeremià hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Tahaka ny nanosahako ny fahatezerako sy ny fahavinirako tamin’ny mponin’i Jerosalema no hanosahako ny fahavinirako aminareo koa, raha mankany Ejipta ianareo. Dia hatsiravina sy hampahonena ianareo ka ho tonga oha-panozonana sy oha-pandatsana, ary tsy hahita ity toerana ity intsony.»'
  '19':
  - type: text
    content: 'Dia mbola nampian’i Jeremià hoe:'
  - type: text
    content: '–Ny TOMPO mihitsy no miteny aminareo sisa tavela amin’ny fanjakan’i Joda mba tsy hankany Ejipta. Aoka ho fantatrao tokoa fa vavolombelona aminareo aho androany. '
  '2':
  - type: text
    content: 'dia nanatona an’i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: ' ka niteny taminy hoe:'
  - type: text
    content: '–Mba ekeo re ny fiangaviana ataonay eto anatrehanao, ka mivavaha amin’ny TOMPO Andriamanitrao ho anay rehetra sisa tavela ireto satria vitsy kely izahay araka izao hitanao maso izao. '
  '20':
  - type: text
    content: 'Nanao hevitra kinangananga ianareo, raha naniraka ahy hanontany ny TOMPO Andriamanitrareo, ary nangataka ahy hivavaka ho anareo, ka nanao tamiko hoe: «Ampahafantaro anay avokoa izay rehetra nandidian’ny TOMPO anao, dia hataonay izany». '
  '21':
  - type: text
    content: 'Nefa androany raha nitondra ny valin-teny avy amin’ny TOMPO Andriamanitsika aho, dia tsy mihaino Azy ianareo ny amin’izay zavatra nanirahany ahy ho aminareo. '
  '22':
  - type: text
    content: Noho izany, dia aoka ho fantatrareo tokoa fa ho fatin’ny ady sy ny mosary ary ny areti-mandringana ianareo any amin’io tany izay tianareo haleha hialokalofana io!
  '3':
  - type: text
    content: Mangataha amin’ny TOMPO Andriamanitrao mba hatorony anay ny lalana tokony hizoranay sy ny zavatra tokony hataonay.
  '4':
  - type: text
    content: 'Dia hoy i Jeremià mpaminany taminy:'
  - type: text
    content: –Efa reko izany, koa handeha hivavaka amin’ny TOMPO Andriamanitsika aho araka izay efa nangatahanareo tamiko; avy eo dia hatoroko anareo ny valin-tenin’ny TOMPO fa tsy hisy hafeniko anareo.
  '5':
  - type: text
    content: 'Ary namaly an’i Jeremià ireo hoe:'
  - type: text
    content: '–Aoka ny TOMPO no ho vavolombelona marina sy mahatoky amintsika! Mianiana izahay fa araka ny teny anirahan’ny TOMPO Andriamanitrao aminay tokoa no hataonay. '
  '6':
  - type: text
    content: Naniraka anao hanontany ny TOMPO Andriamanitsika izahay. Koa hotanterahinay izay rehetra asainy hataonay, na tianay na tsy tianay; ary handeha tsara ho anay ny zavatra rehetra, satria mankatò ny feon’ny TOMPO Andriamanitsika izahay.
  '7':
  - type: text
    content: 'Nony afaka folo andro, dia tonga tamin’i Jeremià ny valin-tenin’ny TOMPO. '
  '8':
  - type: text
    content: 'Koa nampiantso an’i Jôhanàna zanakalahin’i Karea sy ireo olon-kafa mpifehy ny andia-miaramila izay niaraka taminy mbamin’ny vahoaka rehetra na kely na lehibe i Jeremià, '
  '9':
  - type: text
    content: 'ary nanao taminy hoe:'
  - type: text
    content: '–Naniraka ahy hitondra ny fangatahanareo tamin’ny TOMPO Andriamanitr’i Israely ianareo, ka izao no valin-teniny:'
