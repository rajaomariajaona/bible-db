  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy ho afaka amin’ny loza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay halefako hamely azy.»
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny indray i Jeremià hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Tahaka ny nanosahako ny fahatezerako sy ny fahavinirako tamin’ny mponin’i Jerosalema no hanosahako ny fahavinirako aminareo koa, raha mankany Ejipta ianareo. Dia hatsiravina sy hampahonena ianareo ka ho tonga oha-panozonana sy oha-pandatsana, ary tsy hahita ity toerana ity intsony.»'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mbola nampian’i Jeremià hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny TOMPO mihitsy no miteny aminareo sisa tavela amin’ny fanjakan’i Joda mba tsy hankany Ejipta. Aoka ho fantatrao tokoa fa vavolombelona aminareo aho androany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nanatona an’i Jeremià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ka niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mba ekeo re ny fiangaviana ataonay eto anatrehanao, ka mivavaha amin’ny TOMPO Andriamanitrao ho anay rehetra sisa tavela ireto satria vitsy kely izahay araka izao hitanao maso izao. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nanao hevitra kinangananga ianareo, raha naniraka ahy hanontany ny TOMPO Andriamanitrareo, ary nangataka ahy hivavaka ho anareo, ka nanao tamiko hoe: «Ampahafantaro anay avokoa izay rehetra nandidian’ny TOMPO anao, dia hataonay izany». '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nefa androany raha nitondra ny valin-teny avy amin’ny TOMPO Andriamanitsika aho, dia tsy mihaino Azy ianareo ny amin’izay zavatra nanirahany ahy ho aminareo. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Noho izany, dia aoka ho fantatrareo tokoa fa ho fatin’ny ady sy ny mosary ary ny areti-mandringana ianareo any amin’io tany izay tianareo haleha hialokalofana io!
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mangataha amin’ny TOMPO Andriamanitrao mba hatorony anay ny lalana tokony hizoranay sy ny zavatra tokony hataonay.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jeremià mpaminany taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa reko izany, koa handeha hivavaka amin’ny TOMPO Andriamanitsika aho araka izay efa nangatahanareo tamiko; avy eo dia hatoroko anareo ny valin-tenin’ny TOMPO fa tsy hisy hafeniko anareo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namaly an’i Jeremià ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka ny TOMPO no ho vavolombelona marina sy mahatoky amintsika! Mianiana izahay fa araka ny teny anirahan’ny TOMPO Andriamanitrao aminay tokoa no hataonay. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Naniraka anao hanontany ny TOMPO Andriamanitsika izahay. Koa hotanterahinay izay rehetra asainy hataonay, na tianay na tsy tianay; ary handeha tsara ho anay ny zavatra rehetra, satria mankatò ny feon’ny TOMPO Andriamanitsika izahay.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka folo andro, dia tonga tamin’i Jeremià ny valin-tenin’ny TOMPO. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nampiantso an’i Jôhanàna zanakalahin’i Karea sy ireo olon-kafa mpifehy ny andia-miaramila izay niaraka taminy mbamin’ny vahoaka rehetra na kely na lehibe i Jeremià, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Naniraka ahy hitondra ny fangatahanareo tamin’ny TOMPO Andriamanitr’i Israely ianareo, ka izao no valin-teniny:'
