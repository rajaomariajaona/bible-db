document_id: JER.42
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nila hevitra tamin’i Jeremià ireo sisa tavela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’izay ireo rehetra mpifehy ny andia-miaramila, indrindra i Jôhanàna zanakalahin’i Karea sy i Hazarià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hazarià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy toy ny ao 43.2; ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jazanià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'zanakalahin’i Hôsaià, ary koa ny vahoaka rehetra teo na kely na lehibe, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia nanatona an’i Jeremià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' ka niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mba ekeo re ny fiangaviana ataonay eto anatrehanao, ka mivavaha amin’ny TOMPO Andriamanitrao ho anay rehetra sisa tavela ireto satria vitsy kely izahay araka izao hitanao maso izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mangataha amin’ny TOMPO Andriamanitrao mba hatorony anay ny lalana tokony hizoranay sy ny zavatra tokony hataonay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy i Jeremià mpaminany taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa reko izany, koa handeha hivavaka amin’ny TOMPO Andriamanitsika aho araka izay efa nangatahanareo tamiko; avy eo dia hatoroko anareo ny valin-tenin’ny TOMPO fa tsy hisy hafeniko anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary namaly an’i Jeremià ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka ny TOMPO no ho vavolombelona marina sy mahatoky amintsika! Mianiana izahay fa araka ny teny anirahan’ny TOMPO Andriamanitrao aminay tokoa no hataonay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Naniraka anao hanontany ny TOMPO Andriamanitsika izahay. Koa hotanterahinay izay rehetra asainy hataonay, na tianay na tsy tianay; ary handeha tsara ho anay ny zavatra rehetra, satria mankatò ny feon’ny TOMPO Andriamanitsika izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nony afaka folo andro, dia tonga tamin’i Jeremià ny valin-tenin’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa nampiantso an’i Jôhanàna zanakalahin’i Karea sy ireo olon-kafa mpifehy ny andia-miaramila izay niaraka taminy mbamin’ny vahoaka rehetra na kely na lehibe i Jeremià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Naniraka ahy hitondra ny fangatahanareo tamin’ny TOMPO Andriamanitr’i Israely ianareo, ka izao no valin-teniny:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: «Raha hiverina hipetraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ity tany ity ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia haoriko indray ny vahoakanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy horavako intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamboleko indray ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hongotako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'haoriko... hongotako: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.10; 24.6; 31.28; 45.4.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanenenako ny loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa namelezako anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa aza matahotra ny mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: ' intsony.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, Izaho TOMPO no manao teny hentitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra azy fa momba anareo Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamonjy sy hanafaka anareo teo am-pelatanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Homeko indrafo ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamindrafo anareo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamela anareo hiverina any an-taninareo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy ihany i Jeremià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Kanefa mety tsy hanaraka ny baikon’ny TOMPO Andriamanitrareo ianareo ka hilaza tsy hipetraka amin’io tany io, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa handeha any Ejipta mba tsy hahita ady sy tsy handre ny feon’ny anjomara ary tsy ho faty mosary intsony, dia hipetraka any! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny amin’izay kosa dia mihainoa ny tenin’ny TOMPO ankehitriny ianareo izay sisa tavela amin’ny fanjakan’i Joda, fa izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Raha mikiry hankany Ejipta ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandeha hialokaloka any,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: dia any no hahatratra anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ady izay atahoranareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary any no hanaraka anareo ny mosary
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ahinareo mafy ka hahafaty anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay rehetra mikiry hankany Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba handeha hialokaloka any
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fatin’ny ady sy ny mosary
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny areti-mandringana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy ho afaka amin’ny loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay halefako hamely azy.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niteny indray i Jeremià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Tahaka ny nanosahako ny fahatezerako sy ny fahavinirako tamin’ny mponin’i Jerosalema no hanosahako ny fahavinirako aminareo koa, raha mankany Ejipta ianareo. Dia hatsiravina sy hampahonena ianareo ka ho tonga oha-panozonana sy oha-pandatsana, ary tsy hahita ity toerana ity intsony.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia mbola nampian’i Jeremià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny TOMPO mihitsy no miteny aminareo sisa tavela amin’ny fanjakan’i Joda mba tsy hankany Ejipta. Aoka ho fantatrao tokoa fa vavolombelona aminareo aho androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nanao hevitra kinangananga ianareo, raha naniraka ahy hanontany ny TOMPO Andriamanitrareo, ary nangataka ahy hivavaka ho anareo, ka nanao tamiko hoe: «Ampahafantaro anay avokoa izay rehetra nandidian’ny TOMPO anao, dia hataonay izany». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nefa androany raha nitondra ny valin-teny avy amin’ny TOMPO Andriamanitsika aho, dia tsy mihaino Azy ianareo ny amin’izay zavatra nanirahany ahy ho aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Noho izany, dia aoka ho fantatrareo tokoa fa ho fatin’ny ady sy ny mosary ary ny areti-mandringana ianareo any amin’io tany izay tianareo haleha hialokalofana io!
