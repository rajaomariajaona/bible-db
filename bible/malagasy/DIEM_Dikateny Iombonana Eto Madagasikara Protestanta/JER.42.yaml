      - type: text
        text: Babilôna
    - type: text
      text: ' intsony.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, Izaho TOMPO no manao teny hentitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra azy fa momba anareo Aho
  - type: usfm
    marker: q1
    children:
