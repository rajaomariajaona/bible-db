    children:
    - type: text
      text: ary hamela anareo hiverina any an-taninareo.»
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ihany i Jeremià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Kanefa mety tsy hanaraka ny baikon’ny TOMPO Andriamanitrareo ianareo ka hilaza tsy hipetraka amin’io tany io, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'fa handeha any Ejipta mba tsy hahita ady sy tsy handre ny feon’ny anjomara ary tsy ho faty mosary intsony, dia hipetraka any! '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny amin’izay kosa dia mihainoa ny tenin’ny TOMPO ankehitriny ianareo izay sisa tavela amin’ny fanjakan’i Joda, fa izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Raha mikiry hankany Ejipta ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandeha hialokaloka any,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any no hahatratra anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ady izay atahoranareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary any no hanaraka anareo ny mosary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay ahinareo mafy ka hahafaty anareo.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra mikiry hankany Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
