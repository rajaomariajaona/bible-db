document_id: JOB.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba: Mandà ny hiresaka amiko Andriamanitra'
  - type: text
    content: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Na izany aza, fantany tsara ny lalana falehako;
  - type: text
    content: fa raha mizaha toetra ahy Izy,
  - type: text
    content: dia hivoaka madio toy ny volamena aho.
  '11':
  - type: text
    content: Nifikitra tamin’ny sori-dalany ny diako;
  - type: text
    content: eny, nizotra ny lalany Aho fa tsy nivilivily.
  '12':
  - type: text
    content: Tsy nandà izay didy nambarany aho;
  - type: text
    content: fa tao am-poko no nitahirizako
  - type: text
    content: izay rehetra naloaky ny vavany.
  - type: heading
    content: '*'
  '13':
  - type: text
    content: Nefa tokam-pisainana Andriamanitra
  - type: text
    content: koa iza no afaka hampiova hevitra Azy?
  - type: text
    content: Fa izay voakasany no ataony.
  '14':
  - type: text
    content: Hotanterahiny izay efa nodidiny ho ahy
  - type: text
    content: ary koa ny fikasana maro mbola ao aminy.
  '15':
  - type: text
    content: Izany no mampangovitra ahy eo anatrehany;
  - type: text
    content: raha mandinika izany aho, dia matahotra Azy.
  '16':
  - type: text
    content: Satria Andriamanitra no nampiketraka ny herim-poko;
  - type: text
    content: eny, ilay Tsitoha no nampivarahontsana ahy.
  '17':
  - type: text
    content: Kanefa tsy nangina aho, na dia avy aza ny alina
  - type: text
    content: ary na dia nohajambain’ny haizim-pito aza aho.
  '2':
  - type: text
    content: Ankehitriny vao tena mangidy ny fitarainako
  - type: text
    content: na dia efa nampanginiko aza ny tolokoko.
  '3':
  - type: text
    content: Satriko hofantarina mihitsy
  - type: text
    content: izay hahitako an’Andriamanitra!
  - type: text
    content: Dia ho nataoko izay hahatongavana
  - type: text
    content: hatrany amin’ny toeram-pitsaràny.
  '4':
  - type: text
    content: Halahatro eo anatrehany ny adiko,
  - type: text
    content: ka hataoko be ao am-bavako ireo porofo.
  '5':
  - type: text
    content: Dia ho fantatro izay teny havaliny ahy,
  - type: text
    content: ary ho azoko tsara izay holazainy amiko.
  '6':
  - type: text
    content: Hiezaka mafy ve Izy hifandahatra amiko?
  - type: text
    content: Tsia, fa Izy indrindra no hihaino ahy.
  '7':
  - type: text
    content: Amin’izay dia olo-mahitsy no hifanazava aminy,
  - type: text
    content: ary hanafaka ahy mandrakizay Izy mpitsara ahy.
  - type: heading
    content: '*'
  '8':
  - type: text
    content: Nefa raha miantsinanana aho, dia tsy any Izy;
  - type: text
    content: ary miankandrefana aho, saingy tsy mahita Azy.
  '9':
  - type: text
    content: Sahirana any avaratra ve Izy ka tsy tazako,
  - type: text
    content: na koa miery any atsimo ka tsy tsikaritro!
