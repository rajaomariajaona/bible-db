document_id: JOB.23,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Valintenin’i Jôba: Mandà ny hiresaka amiko Andriamanitra'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Na izany aza, fantany tsara ny lalana falehako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha mizaha toetra ahy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hivoaka madio toy ny volamena aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nifikitra tamin’ny sori-dalany ny diako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nizotra ny lalany Aho fa tsy nivilivily.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsy nandà izay didy nambarany aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tao am-poko no nitahirizako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra naloaky ny vavany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nefa tokam-pisainana Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa iza no afaka hampiova hevitra Azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay voakasany no ataony.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hotanterahiny izay efa nodidiny ho ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa ny fikasana maro mbola ao aminy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izany no mampangovitra ahy eo anatrehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mandinika izany aho, dia matahotra Azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Satria Andriamanitra no nampiketraka ny herim-poko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ilay Tsitoha no nampivarahontsana ahy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Kanefa tsy nangina aho, na dia avy aza ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia nohajambain’ny haizim-pito aza aho.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ankehitriny vao tena mangidy ny fitarainako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia efa nampanginiko aza ny tolokoko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Satriko hofantarina mihitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hahitako an’Andriamanitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho nataoko izay hahatongavana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany amin’ny toeram-pitsaràny.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Halahatro eo anatrehany ny adiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hataoko be ao am-bavako ireo porofo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia ho fantatro izay teny havaliny ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho azoko tsara izay holazainy amiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hiezaka mafy ve Izy hifandahatra amiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, fa Izy indrindra no hihaino ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Amin’izay dia olo-mahitsy no hifanazava aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanafaka ahy mandrakizay Izy mpitsara ahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nefa raha miantsinanana aho, dia tsy any Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miankandrefana aho, saingy tsy mahita Azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Sahirana any avaratra ve Izy ka tsy tazako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na koa miery any atsimo ka tsy tsikaritro!
