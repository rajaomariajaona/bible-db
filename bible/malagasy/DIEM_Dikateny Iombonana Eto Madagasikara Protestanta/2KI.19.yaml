document_id: 2KI.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naka hevitra tamin’i Isaià mpaminany i Hezekià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha vao nandre izany tatitra izany i Hezekià mpanjaka, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandriatra ny fitafiany
  - type: text
    text: ' ka nitafy gony ary lasa niditra tao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Avy teo izy naniraka an’i Eliakima mpiandraikitra ny lapa sy i Sebnà mpitantsoratra ary ireo mpisorona tranainy indrindra izay samy nitafy gony mba hankany amin’i Isaià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' zanakalahin’i Amôtsa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'hanao aminy hoe: «Izao no lazain’i Hezekià: Andro fahoriana sy famaizana ary fahafaham-baràka ho antsika ity andro ity! Tonga amin’ny fitenenana hoe: ‹Efa ho teraka ny zaza nefa tsy misy hery hiterahana azy ny reniny.›. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Angamba ho ren’ny TOMPO Andriamanitrao ny teny rehetra nataon’ny dekà asirianina izay nirahin’ny mpanjakan’i Asiria tompony hanevateva an’Andriamanitra velona, ka hofaizin’ny TOMPO Andriamanitrao izy noho izany! Koa manandrata vavaka ianao ho an’ireo sisa tavela amin’ny vahoakany.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa tonga tany amin’i Isaià ireo irak’i Hezekià mpanjaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ambarao amin’ny tomponareo izao tenin’ny TOMPO izao: «Aza matahotra eo anatrehan’ny teny renao nanevatevan’ireo manamboninahitry ny mpanjakan’i Asiria Ahy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa indro Aho hanoro hevitra azy hiverina any amin’ny taniny, rehefa handre siosio izy; ary any no hampamonoako azy ho fatin’ny sabatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny and 35-37.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nandrahona indray i Saneheriba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Is 37.8-13; jereo koa 2 Tan 32.17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia niverina ilay dekà, ka nankany Libnà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Libnà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 8.22 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' izay nataon’ny mpanjakan’i Asiria fahirano; satria reny fa efa nandao an’i Lakisy ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Kanjo rehefa henon’i Saneheriba fa efa an-dalana hamely azy i Tirihakà mpanjakan’i Etiôpia, dia naniraka hankany amin’i Hezekià '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mpanjakan’i Joda indray izy mba hitondra izao hafatra izao: «Aoka tsy ho voafitaky ny Andriamanitra itokianao ianao amin’ny filazany fa i Jerosalema dia tsy hatolotra eo an-tanan’ny mpanjakan’i Asiria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indro ianao mihitsy no efa nandre ny nanaovan’ireo mpanjakan’i Asiria ny tany hafa rehetra sy ny nandravany azy; ka dia ianao kosa ve no ho voavonjy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fony noravan’ireo razako i Gôzàna, sy i Haràna ary i Retsefa mbamin’i Telasara renivohitry ny Hedenita, moa nahavonjy ireny firenena ireny ve ny andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aiza izao ny mpanjakan’i Hamata sy i Arpada ary i Lahira? Aiza izao ny mpanjakan’i Sefarvaîma sy i Henà ary i Hivà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Gôzàna...Hivà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(and 12-13): jereo 17.24; 18.34 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ?»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavak’i Hezekià
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Is 37.14-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary noraisin’i Hezekià ny taratasy nentin’ireo iraka asirianina ka novakiny; avy teo izy dia niakatra tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ' ka namelatra izany taratasy izany teo anatrehan’ny TOMPO, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary nivavaka tamin’ny TOMPO nanao hoe: «Ry TOMPO Andriamanitr’i Israely ô, Ianao Izay mipetraka eo ambony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerôbima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 25.22.
    marker-yv: yv-n
  - type: text
    text: ', Ianao irery no Andriamanitry ny fanjakana rehetra eto an-tany, satria Ianao no nanao ny lanitra sy ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'TOMPO ô, mba atongilano ny sofinao ka mihainoa; TOMPO ô, mba ahirato ny masonao ka mijere; ary aoka ho renao ny teny izay nampitondrain’i Saneheriba hanevatevana Anao Andriamanitra velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'TOMPO ô, marina fa ireo mpanjakan’i Asiria dia nandringana ny hafa firenena sy nandrava ny taniny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary nodorany tamin’ny afo sy nosimbany aza ny andriamaniny satria tsy Andriamanitra ireny fa asan’ny tanan’olombelona, vato aman-kazo ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa ankehitriny kosa ry TOMPO Andriamanitray ô, vonjeo tsy ho azon’ny tanan’i Saneheriba izahay mba hahafantaran’ny fanjakana rehetra etỳ an-tany fa Ianao irery ihany, TOMPO ô, no Andriamanitra.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Namaly an’i Hezekià tamin’ny alalan’i Isaià ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Is 37.21-35)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary i Isaià, zanakalahin’i Amôtsa, dia naniraka hankany amin’i Hezekià nanao hoe: «Izao no lazain’ny TOMPO Andriamanitr’i Israely: Ny vavaka nataonao tamiko ny amin’i Saneheriba mpanjakan’i Asiria dia efa nohenoiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa izao no teny tononiko hamelezana azy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manao tsinontsinona sy maneso anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny tanàna kanton’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ', ry Saneheriba;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihifikifi-doha ho fanamavoana anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanànan’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa iza moa no voatevatevanao sy nompanao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no nanaovanao lela miakatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy niandranandranan’ny masonao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy iza fa Izaho Ilay Masin’i Israely!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tamin’ny alalan’ny irakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanevatevanao Ahy Tompo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy ianao hoe: ‹Izaho Saneheriba'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny kalesiko marobe no niakarako
- type: usfm
  marker: q1
  children:
  - type: text
    text: teny an-tampon-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatreo afovoan-tanin’i Libano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hikapa ny sedera mijoalajoala
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny kipreso voafantina ao aminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiakarako ao ny tendrombohitra faran’izay avo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tahirin’alany matevina indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izaho no efa nihady vovo fantsakana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nisotro ny ranon’ny firenen-kafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary horitiko ny sakeli-drano rehetra any Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha vao migadona any ny faladiako!›
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Moa tsy fantatrao va, ry Saneheriba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa hatry ny ela no nanomanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: an’izao zava-nitranga tato ho ato izao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa hatramin’ny elabe no namolavolako azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ankehitriny dia manatanteraka azy Aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voatendriko handrava ireo tanànamimanda ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahatonga azy ho korontam-bato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia miraviravy tanana ny mponina eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady raiki-tahotra no safo-kenatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny vilona any an-tsaha izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tahaka ny ahi-maitso eny an-jaridaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny zava-maniry eny an-tampon-trano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka main’ny rivotra avy any atsinanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fantatro avokoa ny momba anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mipetraka ianao na mitsangana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mivoaka ny trano ianao na miditra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy rehefa tezitra misafoaka amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Eny, efa tezitra nisafoaka tamiko tokoa ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa tafakatra an-tsofiko ny fireharehànao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa hasiako farango ny oronao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hasiako farango ny oronao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tahaka ny fanasiana mason-drojo amin’ny oron’ny biby mba hamolahana azy. Ireo sary sokitra tranainy dia mampiseho mpigadra voaisy farango na mason-drojo ny orony.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hasiako lamboridy ny vavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hampivereniko lalana any an-taninao ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay lalana niavianao ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izao kosa no famantarana ho anao, ry Hezekià: Amin’ity taona ity dia hihinana izay vary maniry ho azy ny olona; ary amin’ny taona manaraka dia mbola ho toy izany koa. Fa amin’ny taona fahatelo kosa dia hamafy vary sy hijinja ianareo ary hamboly voaloboka sy hihinana ny vokatra avy aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary izay sisa velona amin’ny taranak’i Joda dia ho toy ny hazo hamaka lalina indray ary ho feno voa ny rantsany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: satria ao Jerosalema no hipoiran’ny sisa tavela, ary ao an-tendrombohitra Tsiôna no hiarenan’ny sisa velona.»
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy i Isaià hoe: «Izany no hataon’ny TOMPOn’izao rehetra izao noho ny fitia miredareda manesika Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izao kosa no lazain’ny TOMPO ny amin’ny mpanjakan’i Asiria: Tsy hiditra amin’ity tanàna ity izy, na handefa zana-tsipîka hamelezana azy na hiady aminy ombàn’ny ampinga na hanangana tovon-tany hanafihana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny lalana izay niaviany ihany no hiverenany, fa tsy hiditra amin’ity tanàna ity izy. Teny hentitra avy amiko TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Harovako i Jerosalema ary hovonjeko noho ny amin’ny tenako sy i Davida mpanompoko.› »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fandehanan’ny Asirianina sy ny nafatesan’i Saneheriba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Is 37.36-38; 2 Tan 32.21-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny alin’io ihany dia niainga hankao an-tobin’ny Asirianina ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’ny TOMPO ka nisy 185 ny antoko-miaramila naripany; ary raha vao nifoha ny sisa velona tamin’ny maraina, dia nahita fa efa maty avokoa ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia noravan’i Saneheriba mpanjakan’i Asiria ny toby, ka lasa izy nankany Ninive ary nijanona tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Indray andro raha sendra nivavaka tamin’i Nisrôka andriamaniny izy, dia matin’i Adramelèka sy i Saretsera zanany lahy tamin’ny sabatra; avy teo dia nandositra nankany amin’ny tany Ararata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tany Ararata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ampit Gen 8.4) dia manondro an’i Armenia ankehitriny.'
    marker-yv: yv-n
  - type: text
    text: ' izy roa lahy. Ary i Hesara-Hadôna zanany lahy no nanjaka nandimby azy.'
