document_id: 2KI.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Naka hevitra tamin’i Isaià mpaminany i Hezekià
  - type: text
    content: 'Raha vao nandre izany tatitra izany i Hezekià mpanjaka, dia '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' ka nitafy gony ary lasa niditra tao an-'
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'mpanjakan’i Joda indray izy mba hitondra izao hafatra izao: «Aoka tsy ho voafitaky ny Andriamanitra itokianao ianao amin’ny filazany fa i Jerosalema dia tsy hatolotra eo an-tanan’ny mpanjakan’i Asiria. '
  '11':
  - type: text
    content: 'Indro ianao mihitsy no efa nandre ny nanaovan’ireo mpanjakan’i Asiria ny tany hafa rehetra sy ny nandravany azy; ka dia ianao kosa ve no ho voavonjy? '
  '12':
  - type: text
    content: 'Fony noravan’ireo razako i Gôzàna, sy i Haràna ary i Retsefa mbamin’i Telasara renivohitry ny Hedenita, moa nahavonjy ireny firenena ireny ve ny andriamaniny. '
  '13':
  - type: text
    content: Aiza izao ny mpanjakan’i Hamata sy i Arpada ary i Lahira? Aiza izao ny mpanjakan’i Sefarvaîma sy i Henà ary i Hivà
  - type: note
    content: 'Gôzàna...Hivà (and 12-13): jereo 17.24; 18.34 sy nta.'
  - type: text
    content: ?»
  - type: heading
    content: Ny vavak’i Hezekià
  - type: heading
    content: (Jereo Is 37.14-20)
  '14':
  - type: text
    content: Ary noraisin’i Hezekià ny taratasy nentin’ireo iraka asirianina ka novakiny; avy teo izy dia niakatra tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' ka namelatra izany taratasy izany teo anatrehan’ny TOMPO, '
  '15':
  - type: text
    content: 'ary nivavaka tamin’ny TOMPO nanao hoe: «Ry TOMPO Andriamanitr’i Israely ô, Ianao Izay mipetraka eo ambony '
  - type: text
    content: kerôbima
  - type: note
    content: Jereo Eks 25.22.
  - type: text
    content: ', Ianao irery no Andriamanitry ny fanjakana rehetra eto an-tany, satria Ianao no nanao ny lanitra sy ny tany. '
  '16':
  - type: text
    content: 'TOMPO ô, mba atongilano ny sofinao ka mihainoa; TOMPO ô, mba ahirato ny masonao ka mijere; ary aoka ho renao ny teny izay nampitondrain’i Saneheriba hanevatevana Anao Andriamanitra velona. '
  '17':
  - type: text
    content: 'TOMPO ô, marina fa ireo mpanjakan’i Asiria dia nandringana ny hafa firenena sy nandrava ny taniny; '
  '18':
  - type: text
    content: 'ary nodorany tamin’ny afo sy nosimbany aza ny andriamaniny satria tsy Andriamanitra ireny fa asan’ny tanan’olombelona, vato aman-kazo ihany. '
  '19':
  - type: text
    content: Fa ankehitriny kosa ry TOMPO Andriamanitray ô, vonjeo tsy ho azon’ny tanan’i Saneheriba izahay mba hahafantaran’ny fanjakana rehetra etỳ an-tany fa Ianao irery ihany, TOMPO ô, no Andriamanitra.»
  - type: heading
    content: Namaly an’i Hezekià tamin’ny alalan’i Isaià ny Tompo
  - type: heading
    content: (Jereo Is 37.21-35)
  '2':
  - type: text
    content: 'Avy teo izy naniraka an’i Eliakima mpiandraikitra ny lapa sy i Sebnà mpitantsoratra ary ireo mpisorona tranainy indrindra izay samy nitafy gony mba hankany amin’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' zanakalahin’i Amôtsa '
  '20':
  - type: text
    content: 'Ary i Isaià, zanakalahin’i Amôtsa, dia naniraka hankany amin’i Hezekià nanao hoe: «Izao no lazain’ny TOMPO Andriamanitr’i Israely: Ny vavaka nataonao tamiko ny amin’i Saneheriba mpanjakan’i Asiria dia efa nohenoiko. '
  '21':
  - type: text
    content: 'Koa izao no teny tononiko hamelezana azy:'
  - type: text
    content: Manao tsinontsinona sy maneso anao
  - type: text
    content: 'ny tanàna kanton’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ', ry Saneheriba;'
  - type: text
    content: mihifikifi-doha ho fanamavoana anao
  - type: text
    content: ny tanànan’i Jerosalema.
  '22':
  - type: text
    content: Fa iza moa no voatevatevanao sy nompanao?
  - type: text
    content: Ary iza no nanaovanao lela miakatra
  - type: text
    content: sy niandranandranan’ny masonao?
  - type: text
    content: Tsy iza fa Izaho Ilay Masin’i Israely!
  '23':
  - type: text
    content: Tamin’ny alalan’ny irakao
  - type: text
    content: no nanevatevanao Ahy Tompo.
  - type: text
    content: 'Hoy ianao hoe: ‹Izaho Saneheriba'
  - type: text
    content: dia ny kalesiko marobe no niakarako
  - type: text
    content: teny an-tampon-tendrombohitra
  - type: text
    content: hatreo afovoan-tanin’i Libano,
  - type: text
    content: mba hikapa ny sedera mijoalajoala
  - type: text
    content: sy ny kipreso voafantina ao aminy.
  - type: text
    content: Hiakarako ao ny tendrombohitra faran’izay avo
  - type: text
    content: sy ny tahirin’alany matevina indrindra.
  '24':
  - type: text
    content: Izaho no efa nihady vovo fantsakana
  - type: text
    content: sy nisotro ny ranon’ny firenen-kafa;
  - type: text
    content: Ary horitiko ny sakeli-drano rehetra any Ejipta
  - type: text
    content: raha vao migadona any ny faladiako!›
  '25':
  - type: text
    content: Moa tsy fantatrao va, ry Saneheriba,
  - type: text
    content: fa efa hatry ny ela no nanomanako
  - type: text
    content: an’izao zava-nitranga tato ho ato izao?
  - type: text
    content: Efa hatramin’ny elabe no namolavolako azy,
  - type: text
    content: ary ankehitriny dia manatanteraka azy Aho.
  - type: text
    content: Voatendriko handrava ireo tanànamimanda ianao
  - type: text
    content: ka hahatonga azy ho korontam-bato.
  '26':
  - type: text
    content: Dia miraviravy tanana ny mponina eo aminy,
  - type: text
    content: sady raiki-tahotra no safo-kenatra;
  - type: text
    content: toy ny vilona any an-tsaha izy ireo
  - type: text
    content: sy tahaka ny ahi-maitso eny an-jaridaina
  - type: text
    content: ary tahaka ny zava-maniry eny an-tampon-trano,
  - type: text
    content: ka main’ny rivotra avy any atsinanana.
  '27':
  - type: text
    content: Fantatro avokoa ny momba anao
  - type: text
    content: na mipetraka ianao na mitsangana,
  - type: text
    content: na mivoaka ny trano ianao na miditra,
  - type: text
    content: sy rehefa tezitra misafoaka amiko.
  '28':
  - type: text
    content: Eny, efa tezitra nisafoaka tamiko tokoa ianao
  - type: text
    content: ary efa tafakatra an-tsofiko ny fireharehànao.
  - type: text
    content: Koa hasiako farango ny oronao
  - type: note
    content: 'hasiako farango ny oronao: tahaka ny fanasiana mason-drojo amin’ny oron’ny biby mba hamolahana azy. Ireo sary sokitra tranainy dia mampiseho mpigadra voaisy farango na mason-drojo ny orony.'
  - type: text
    content: ary hasiako lamboridy ny vavanao,
  - type: text
    content: dia hampivereniko lalana any an-taninao ianao
  - type: text
    content: amin’izay lalana niavianao ihany.
  '29':
  - type: text
    content: 'Izao kosa no famantarana ho anao, ry Hezekià: Amin’ity taona ity dia hihinana izay vary maniry ho azy ny olona; ary amin’ny taona manaraka dia mbola ho toy izany koa. Fa amin’ny taona fahatelo kosa dia hamafy vary sy hijinja ianareo ary hamboly voaloboka sy hihinana ny vokatra avy aminy. '
  '3':
  - type: text
    content: 'hanao aminy hoe: «Izao no lazain’i Hezekià: Andro fahoriana sy famaizana ary fahafaham-baràka ho antsika ity andro ity! Tonga amin’ny fitenenana hoe: ‹Efa ho teraka ny zaza nefa tsy misy hery hiterahana azy ny reniny.›. '
  '30':
  - type: text
    content: 'Ary izay sisa velona amin’ny taranak’i Joda dia ho toy ny hazo hamaka lalina indray ary ho feno voa ny rantsany; '
  '31':
  - type: text
    content: satria ao Jerosalema no hipoiran’ny sisa tavela, ary ao an-tendrombohitra Tsiôna no hiarenan’ny sisa velona.»
  - type: text
    content: 'Dia hoy i Isaià hoe: «Izany no hataon’ny TOMPOn’izao rehetra izao noho ny fitia miredareda manesika Azy. '
  '32':
  - type: text
    content: 'Izao kosa no lazain’ny TOMPO ny amin’ny mpanjakan’i Asiria: Tsy hiditra amin’ity tanàna ity izy, na handefa zana-tsipîka hamelezana azy na hiady aminy ombàn’ny ampinga na hanangana tovon-tany hanafihana azy. '
  '33':
  - type: text
    content: 'Ny lalana izay niaviany ihany no hiverenany, fa tsy hiditra amin’ity tanàna ity izy. Teny hentitra avy amiko TOMPO izany. '
  '34':
  - type: text
    content: Harovako i Jerosalema ary hovonjeko noho ny amin’ny tenako sy i Davida mpanompoko.› »
  - type: heading
    content: Ny fandehanan’ny Asirianina sy ny nafatesan’i Saneheriba
  - type: heading
    content: (Jereo Is 37.36-38; 2 Tan 32.21-22)
  '35':
  - type: text
    content: 'Ny alin’io ihany dia niainga hankao an-tobin’ny Asirianina ilay '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny TOMPO ka nisy 185 ny antoko-miaramila naripany; ary raha vao nifoha ny sisa velona tamin’ny maraina, dia nahita fa efa maty avokoa ireo. '
  '36':
  - type: text
    content: 'Dia noravan’i Saneheriba mpanjakan’i Asiria ny toby, ka lasa izy nankany Ninive ary nijanona tany. '
  '37':
  - type: text
    content: Indray andro raha sendra nivavaka tamin’i Nisrôka andriamaniny izy, dia matin’i Adramelèka sy i Saretsera zanany lahy tamin’ny sabatra; avy teo dia nandositra nankany amin’ny tany Ararata
  - type: note
    content: Ny tany Ararata (ampit Gen 8.4) dia manondro an’i Armenia ankehitriny.
  - type: text
    content: ' izy roa lahy. Ary i Hesara-Hadôna zanany lahy no nanjaka nandimby azy.'
  '4':
  - type: text
    content: Angamba ho ren’ny TOMPO Andriamanitrao ny teny rehetra nataon’ny dekà asirianina izay nirahin’ny mpanjakan’i Asiria tompony hanevateva an’Andriamanitra velona, ka hofaizin’ny TOMPO Andriamanitrao izy noho izany! Koa manandrata vavaka ianao ho an’ireo sisa tavela amin’ny vahoakany.»
  '5':
  - type: text
    content: 'Rehefa tonga tany amin’i Isaià ireo irak’i Hezekià mpanjaka, '
  '6':
  - type: text
    content: 'dia nilazany hoe:'
  - type: text
    content: '–Ambarao amin’ny tomponareo izao tenin’ny TOMPO izao: «Aza matahotra eo anatrehan’ny teny renao nanevatevan’ireo manamboninahitry ny mpanjakan’i Asiria Ahy! '
  '7':
  - type: text
    content: Fa indro Aho hanoro hevitra azy hiverina any amin’ny taniny, rehefa handre siosio izy; ary any no hampamonoako azy ho fatin’ny sabatra
  - type: note
    content: Jereo ny and 35-37.
  - type: text
    content: .»
  - type: heading
    content: Nandrahona indray i Saneheriba
  - type: heading
    content: (Jereo Is 37.8-13; jereo koa 2 Tan 32.17)
  '8':
  - type: text
    content: Dia niverina ilay dekà, ka nankany Libnà
  - type: note
    content: 'Libnà: jereo 8.22 sy nta.'
  - type: text
    content: ' izay nataon’ny mpanjakan’i Asiria fahirano; satria reny fa efa nandao an’i Lakisy ny mpanjaka. '
  '9':
  - type: text
    content: 'Kanjo rehefa henon’i Saneheriba fa efa an-dalana hamely azy i Tirihakà mpanjakan’i Etiôpia, dia naniraka hankany amin’i Hezekià '
