document_id: JOB.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fidiran’i Elifaza:'
  - type: heading
    content: Sambatra ny olona izay anarin’Andriamanitra
  - type: text
    content: 'Dia nandray fitenenana i Elifaza avy any Temàna ka nanao tamin’i Jôba hoe:'
  '10':
  - type: text
    content: na mierona toa liona izy na minaonaona toa tigra,
  - type: text
    content: dia tapatapahiny nify ireo toa biby masiaka ireo.
  '11':
  - type: text
    content: Lany remby ny bibidia ka maty;
  - type: text
    content: ary ny zanaky ny liom-bavy kosa miparitaka.
  - type: heading
    content: '*'
  '12':
  - type: text
    content: Nisy teny izay tonga tamiko mangingina;
  - type: text
    content: ary bitsika malefaka no reko taminy.
  '13':
  - type: text
    content: Noho ny eritreritra misafotofoto
  - type: text
    content: vokatry ny nofy amin’ny alina
  - type: text
    content: raha sondrian-tory ny olona
  - type: note
    content: Ampit Jôb 33.15.
  - type: text
    content: ','
  '14':
  - type: text
    content: dia nangovitry ny tahotra aho
  - type: text
    content: ka nipararetra ny taolako rehetra.
  '15':
  - type: text
    content: Ary nisy rivotra nisafo ny tavako
  - type: text
    content: ka nampihoron-koditra ny tenako.
  '16':
  - type: text
    content: Nisy endrik’olona mitsangana nefa tsy fantatro,
  - type: text
    content: fa manjavozavo izy no teo anoloan’ny masoko.
  - type: text
    content: 'Dia nangina aloha, vao nisy niteny hoe:'
  '17':
  - type: text
    content: «Ho marina sy ho madio ve ny olona
  - type: text
    content: eo anatrehan’Andriamanitra Mpahary azy?
  '18':
  - type: text
    content: Indreo ny mpanompony aza tsy atokiany,
  - type: text
    content: 'ary ny '
  - type: text
    content: anjeliny
  - type: text
    content: ' mbola ahitany tsininy;'
  '19':
  - type: text
    content: koa mainka fa izay olombelona
  - type: text
    content: mora potika toa tanimanga,
  - type: text
    content: sady vovo-tany no fiaviany!
  - type: text
    content: ka mety voaporitra tahaka ny fositra.
  '2':
  - type: text
    content: Tsy misy sahy miteny aminao, satria sorena mafy ianao
  - type: note
    content: 'Dkt hafa: Raha mba miteny aminao aho, moa ho zakanao ve? Vao zahan’Andriamanitra toetra ianao, dia indro fa sorena!'
  - type: text
    content: ;
  - type: text
    content: nefa tsy azo atao ny hangina ela intsony.
  '20':
  - type: text
    content: Indray andro monja no hahamontsana
  - type: text
    content: sy hahalevona azy mandrakizay;
  - type: text
    content: ka tsy hisy hahatandrintandrina akory.
  '21':
  - type: text
    content: Tsy efa tapaka va ny kofehin-dainy?
  - type: text
    content: Ho faty tsy manam-pahendrena izy.»
  '3':
  - type: text
    content: Indro efa nanabe olona maro ianao
  - type: text
    content: ary nampahery ireo niraviravy tanana.
  '4':
  - type: text
    content: Ny teninao no nampitraka ireo efa saiky lavo;
  - type: text
    content: efa nampatanjaka lohalika mangozohozo ianao.
  '5':
  - type: text
    content: Ankehitriny, tojo izany ianao ka kivy,
  - type: text
    content: mby an-koditrao ka mahaketraka anao!
  '6':
  - type: text
    content: Satria nanaja an’Andriamanitra ianao
  - type: text
    content: sy nanana fitondrantena mendrika,
  - type: text
    content: ka moa tsy hatoky sy hanantena va?
  '7':
  - type: text
    content: 'Tsarovy izao: efa nahita tsy manan-tsiny'
  - type: text
    content: na olo-marina maty nahantra ve ianao?
  '8':
  - type: text
    content: Hitako tsara fa izay mamboly tsy fahamarinana
  - type: text
    content: sy mamafy fahoriana no hijinja ny vokany.
  '9':
  - type: text
    content: Ny fofonain’Andriamanitra no andringanana azy;
  - type: text
    content: ny fahatezerany no toa rivo-mahery mahalevona azy;
