verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'Fidiran’i Elifaza:'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sambatra ny olona izay anarin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nandray fitenenana i Elifaza avy any Temàna ka nanao tamin’i Jôba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: na mierona toa liona izy na minaonaona toa tigra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tapatapahiny nify ireo toa biby masiaka ireo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Lany remby ny bibidia ka maty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zanaky ny liom-bavy kosa miparitaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nisy teny izay tonga tamiko mangingina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary bitsika malefaka no reko taminy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Noho ny eritreritra misafotofoto
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vokatry ny nofy amin’ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha sondrian-tory ny olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôb 33.15.
      marker-yv: yv-n
    - type: text
      text: ','
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: dia nangovitry ny tahotra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nipararetra ny taolako rehetra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary nisy rivotra nisafo ny tavako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampihoron-koditra ny tenako.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nisy endrik’olona mitsangana nefa tsy fantatro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manjavozavo izy no teo anoloan’ny masoko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia nangina aloha, vao nisy niteny hoe:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: «Ho marina sy ho madio ve ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehan’Andriamanitra Mpahary azy?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Indreo ny mpanompony aza tsy atokiany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeliny
    - type: text
      text: ' mbola ahitany tsininy;'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: koa mainka fa izay olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mora potika toa tanimanga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady vovo-tany no fiaviany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mety voaporitra tahaka ny fositra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsy misy sahy miteny aminao, satria sorena mafy ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dkt hafa: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Raha mba miteny aminao aho, moa ho zakanao ve? Vao zahan’Andriamanitra toetra ianao, dia indro fa sorena!
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy azo atao ny hangina ela intsony.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Indray andro monja no hahamontsana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hahalevona azy mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy hahatandrintandrina akory.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tsy efa tapaka va ny kofehin-dainy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho faty tsy manam-pahendrena izy.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Indro efa nanabe olona maro ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampahery ireo niraviravy tanana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny teninao no nampitraka ireo efa saiky lavo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nampatanjaka lohalika mangozohozo ianao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ankehitriny, tojo izany ianao ka kivy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mby an-koditrao ka mahaketraka anao!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Satria nanaja an’Andriamanitra ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanana fitondrantena mendrika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka moa tsy hatoky sy hanantena va?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tsarovy izao: efa nahita tsy manan-tsiny'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na olo-marina maty nahantra ve ianao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Hitako tsara fa izay mamboly tsy fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mamafy fahoriana no hijinja ny vokany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny fofonain’Andriamanitra no andringanana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahatezerany no toa rivo-mahery mahalevona azy;
