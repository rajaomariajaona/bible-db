document_id: PHP.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: Avy amiko Paoly ity taratasy ity.
  - type: text
    content: 'Mamangy anareo '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' rehetra atỳ Filipy'
  - type: note
    content: Tamin’ny andron’i Paoly, i Filipy dia tanàna tany Masedônia izay nonenan’ny voanjo rômanina maro (4.5). Nijanonjanona tao i Paoly tamin’ny diany faharoa (Asa 16.12).
  - type: text
    content: ' aho, dia ianareo efa tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa ary ao anatin’izany ireo mpitondra Fiangonana sy '
  - type: text
    content: diakônina
  - type: text
    content: '. Mamangy anareo koa i Timôty. Samy mpanompon’i Kristy Jesoa izahay. '
  '10':
  - type: text
    content: 'mba hahaizanareo mifidy izay tsara; dia hadio sady tsy hanan-tsiny amin’ny andro hiavian’i Kristy ianareo, '
  '11':
  - type: text
    content: ary ho heniky ny vokatry ny fahamarinana, izay avy amin’ny alalan’i Jesoa Kristy, mba hanomezam-boninahitra sy hiderana an’Andriamanitra.
  - type: heading
    content: I Kristy no fiainako
  '12':
  - type: text
    content: 'Ry havana, tiako ny hahafantaranareo fa izay nihatra tamiko dia vao mainka nanjary fampandrosoana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: '; '
  '13':
  - type: text
    content: ka ny ato an-dapa manontolo sy ny olon-kafa rehetra dia samy mahalala fa voafonja noho ny amin’i Kristy aho
  - type: note
    content: Ampit Asa 28.30; Ef 3.1; 4.1.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Nony nahita ahy voafonja ny ankamaroan’ireo havana iray finoana, dia vao mainka nataon’ny Tompo feno fahatokiana ka mihasahisahy kokoa mitory ny tenin’Andriamanitra
  - type: note
    content: 'tenin’Andriamanitra: tsy ahitana ny hoe n’Andriamanitra ny stf sasany.'
  - type: text
    content: ' tsy amin-tahotra.'
  '15':
  - type: text
    content: 'Eny, fialonana ahy sy fitia te hifanditra no itorian’ny sasany an’i Kristy, fa hitsim-po kosa no manentana ny sasany. '
  '16':
  - type: text
    content: 'Ireto dia asesiky ny fitiavana, satria fantany fa voatendrin’Andriamanitra hampandresy lahatra ny Vaovao Mahafaly aho; '
  '17':
  - type: text
    content: irerỳ kosa asesiky ny fifampiandaniana, ka tsy manambara an’i Kristy amin-kitsim-po, fa mihevitra hanampy trotraka ny fijaliako amin’izao maha voafonja ahy izao.
  '18':
  - type: text
    content: 'Kanefa mampaninona moa izany? Amin’ny atao rehetra, na asesiky ny fihatsarambelatsihy na asesiky ny hevitra mahitsy, dia i Kristy no torîna, ka ifaliako izany; eny, hifaliako hatrany izany '
  '19':
  - type: text
    content: 'satria fantatro fa ho tonga famonjena ahy noho ny vavakareo ary noho ny fanampian’ilay Fanahy Masina nampanantenain’i Jesoa Kristy. '
  '2':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
  - type: heading
    content: Vavaka ataon’i Paoly ho an’ny Filipianina
  '20':
  - type: text
    content: 'Miandry sy manantena mafy tokoa aho, ka tsy hahazo henatra tsy akory; fa na ankehitriny aza, toy ny mandrakariva ihany, dia ho feno fahasahiana aho ka i Kristy no hankalazaina ao amin’ny tenako, na velona aho na maty. '
  '21':
  - type: text
    content: 'Fa amiko, dia i Kristy no fiainana; ary ny fahafatesana no ahazoako tombony. '
  '22':
  - type: text
    content: 'Kanefa raha ny mbola miaina eto an-tany no hampisy vokany ny asako, dia tsy hitako izay hofidiko. '
  '23':
  - type: text
    content: 'Sanganehana eo anelanelan-javatra roa aho: tiako hilaozana ity fiainana ity mba hiarahako amin’i Kristy, satria tsara lavitra izany; '
  '24':
  - type: text
    content: 'kanefa noho ny aminareo, dia ilaina kokoa ny mbola hijanonako eto an-tany. '
  '25':
  - type: text
    content: 'Matoky izany aho, ka fantatro fa hitoetra maharitra eo akaikinareo rehetra mba hanampy anareo handroso sy ho faly amin’ny finoana. '
  '26':
  - type: text
    content: Ka rehefa mby eo aminareo indray aho, dia hitombo tokoa ny reharehanareo, satria efa tafaray amin’i Kristy Jesoa ianareo noho ny nataoko.
  '27':
  - type: text
    content: 'Izao ihany: manàna fitondrantena mendrika ny Vaovao Mahafaly momba an’i Kristy. Ka amin’izany, tonga moa aho, dia hahita anareo; tsy tonga kosa, dia handre ny aminareo: ka ho fantatro fa miorina tsara amin’ny firaisam-panahy ianareo, sady miray fo miara-miezaka hampandroso ny finoana vokatry ny Vaovao Mahafaly. '
  '28':
  - type: text
    content: 'Aoka tsy ho azon’ireo mpanohitra ampitahorina ianareo na amin’inona na amin’inona: mariky ny fahaverezana izany ho azy; fa ho anareo kosa mariky ny famonjena, dia famonjena avy amin’Andriamanitra. '
  '29':
  - type: text
    content: 'Eny, tombon-tsoa nomena anareo ny hanompoanareo an’i Kristy, ka tsy hoe ny hino Azy ihany fa ny hiaritra fijaliana koa noho ny aminy: '
  '3':
  - type: text
    content: 'Velom-pisaorana an’Andriamanitro ny aminareo aho, isaky ny mahatsiaro anareo. '
  '30':
  - type: text
    content: dia ny miatrika ady mitovy amin’izay hitanareo natrehiko fahiny
  - type: note
    content: Jereo Asa 16.19-40.
  - type: text
    content: ' sady renareo fa mbola atrehiko ankehitriny.'
  '4':
  - type: text
    content: 'Ary isaky ny mivavaka ho anareo rehetra aho, dia manao izany amin-kafaliana, '
  '5':
  - type: text
    content: 'noho ianareo niray hina nanampy ahy hampandroso ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' hatramin’ny andro voalohany'
  - type: note
    content: Jereo Asa 16.13-15.
  - type: text
    content: ' ka mandraka ankehitriny. '
  '6':
  - type: text
    content: 'Matoky aho fa Andriamanitra, Izay nanomboka asa tsara tao aminareo, dia hanohy izany hatrany ka hahatanteraka azy amin’ny andro hiavian’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa'
  - type: note
    content: Ampit 1.10; 1Kôr 1.8.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Rariny tokoa ny iheverako anareo rehetra toy izany. Eny, entiko ato am-poko ianareo, satria mpiombona ny tombon-tsoa nomen’Andriamanitra ahy ianareo rehetra, na amin’izao maha voafonja
  - type: note
    content: Jereo 1.13. Tsy fantatra ny toerana izay nigadran’i Paoly.
  - type: text
    content: ' ahy izao na fony aho nampandresy lahatra sy nanamafy orina ny Vaovao Mahafaly. '
  '8':
  - type: text
    content: 'Andriamanitra no vavolombeloko fa marina izao lazaiko izao: manina anareo rehetra amin’ny fon’i Kristy Jesoa aho.'
  '9':
  - type: text
    content: 'Ary izao no tonombavaka ataoko ho anareo: hitombo bebe kokoa hatrany anie ny fitiavanareo ka hombàn’ny fahalalana marina sy ny tena fahatakaran-javatra '
