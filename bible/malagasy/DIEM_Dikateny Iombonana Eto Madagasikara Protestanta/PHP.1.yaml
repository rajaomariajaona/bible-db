        children:
        - type: text
          text: Filipy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tanàna tany Masedônia izay nonenan’ny voanjo rômanina maro (4.5). Nijanonjanona tao i Paoly tamin’ny diany faharoa (Asa 16.12).'
      marker-yv: yv-n
    - type: text
      text: ' aho, dia ianareo efa tafaray amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa ary ao anatin’izany ireo mpitondra Fiangonana sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diakônina
    - type: text
      text: '. Mamangy anareo koa i Timôty. Samy mpanompon’i Kristy Jesoa izahay. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hahaizanareo mifidy izay tsara; dia hadio sady tsy hanan-tsiny amin’ny andro hiavian’i Kristy ianareo, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ho heniky ny vokatry ny fahamarinana, izay avy amin’ny alalan’i Jesoa Kristy, mba hanomezam-boninahitra sy hiderana an’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: w
      children:
      - type: text
