document_id: PHP.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Avy amiko Paoly ity taratasy ity.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mamangy anareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' rehetra atỳ Filipy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tamin’ny andron’i Paoly, i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Filipy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tanàna tany Masedônia izay nonenan’ny voanjo rômanina maro (4.5). Nijanonjanona tao i Paoly tamin’ny diany faharoa (Asa 16.12).'
    marker-yv: yv-n
  - type: text
    text: ' aho, dia ianareo efa tafaray amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa ary ao anatin’izany ireo mpitondra Fiangonana sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diakônina
  - type: text
    text: '. Mamangy anareo koa i Timôty. Samy mpanompon’i Kristy Jesoa izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka ataon’i Paoly ho an’ny Filipianina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Velom-pisaorana an’Andriamanitro ny aminareo aho, isaky ny mahatsiaro anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary isaky ny mivavaka ho anareo rehetra aho, dia manao izany amin-kafaliana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'noho ianareo niray hina nanampy ahy hampandroso ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' hatramin’ny andro voalohany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 16.13-15.
    marker-yv: yv-n
  - type: text
    text: ' ka mandraka ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Matoky aho fa Andriamanitra, Izay nanomboka asa tsara tao aminareo, dia hanohy izany hatrany ka hahatanteraka azy amin’ny andro hiavian’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1.10; 1Kôr 1.8.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Rariny tokoa ny iheverako anareo rehetra toy izany. Eny, entiko ato am-poko ianareo, satria mpiombona ny tombon-tsoa nomen’Andriamanitra ahy ianareo rehetra, na amin’izao maha voafonja
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.13. Tsy fantatra ny toerana izay nigadran’i Paoly.
    marker-yv: yv-n
  - type: text
    text: ' ahy izao na fony aho nampandresy lahatra sy nanamafy orina ny Vaovao Mahafaly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Andriamanitra no vavolombeloko fa marina izao lazaiko izao: manina anareo rehetra amin’ny fon’i Kristy Jesoa aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izao no tonombavaka ataoko ho anareo: hitombo bebe kokoa hatrany anie ny fitiavanareo ka hombàn’ny fahalalana marina sy ny tena fahatakaran-javatra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mba hahaizanareo mifidy izay tsara; dia hadio sady tsy hanan-tsiny amin’ny andro hiavian’i Kristy ianareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ary ho heniky ny vokatry ny fahamarinana, izay avy amin’ny alalan’i Jesoa Kristy, mba hanomezam-boninahitra sy hiderana an’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'I '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no fiainako'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ry havana, tiako ny hahafantaranareo fa izay nihatra tamiko dia vao mainka nanjary fampandrosoana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ka ny ato an-dapa manontolo sy ny olon-kafa rehetra dia samy mahalala fa voafonja noho ny amin’i Kristy aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 28.30; Ef 3.1; 4.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nony nahita ahy voafonja ny ankamaroan’ireo havana iray finoana, dia vao mainka nataon’ny Tompo feno fahatokiana ka mihasahisahy kokoa mitory ny tenin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tenin’Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tsy ahitana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: n’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny stf sasany.'
    marker-yv: yv-n
  - type: text
    text: ' tsy amin-tahotra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Eny, fialonana ahy sy fitia te hifanditra no itorian’ny sasany an’i Kristy, fa hitsim-po kosa no manentana ny sasany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ireto dia asesiky ny fitiavana, satria fantany fa voatendrin’Andriamanitra hampandresy lahatra ny Vaovao Mahafaly aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: irerỳ kosa asesiky ny fifampiandaniana, ka tsy manambara an’i Kristy amin-kitsim-po, fa mihevitra hanampy trotraka ny fijaliako amin’izao maha voafonja ahy izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Kanefa mampaninona moa izany? Amin’ny atao rehetra, na asesiky ny fihatsarambelatsihy na asesiky ny hevitra mahitsy, dia i Kristy no torîna, ka ifaliako izany; eny, hifaliako hatrany izany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'satria fantatro fa ho tonga famonjena ahy noho ny vavakareo ary noho ny fanampian’ilay Fanahy Masina nampanantenain’i Jesoa Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Miandry sy manantena mafy tokoa aho, ka tsy hahazo henatra tsy akory; fa na ankehitriny aza, toy ny mandrakariva ihany, dia ho feno fahasahiana aho ka i Kristy no hankalazaina ao amin’ny tenako, na velona aho na maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa amiko, dia i Kristy no fiainana; ary ny fahafatesana no ahazoako tombony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kanefa raha ny mbola miaina eto an-tany no hampisy vokany ny asako, dia tsy hitako izay hofidiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sanganehana eo anelanelan-javatra roa aho: tiako hilaozana ity fiainana ity mba hiarahako amin’i Kristy, satria tsara lavitra izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'kanefa noho ny aminareo, dia ilaina kokoa ny mbola hijanonako eto an-tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Matoky izany aho, ka fantatro fa hitoetra maharitra eo akaikinareo rehetra mba hanampy anareo handroso sy ho faly amin’ny finoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ka rehefa mby eo aminareo indray aho, dia hitombo tokoa ny reharehanareo, satria efa tafaray amin’i Kristy Jesoa ianareo noho ny nataoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izao ihany: manàna fitondrantena mendrika ny Vaovao Mahafaly momba an’i Kristy. Ka amin’izany, tonga moa aho, dia hahita anareo; tsy tonga kosa, dia handre ny aminareo: ka ho fantatro fa miorina tsara amin’ny firaisam-panahy ianareo, sady miray fo miara-miezaka hampandroso ny finoana vokatry ny Vaovao Mahafaly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aoka tsy ho azon’ireo mpanohitra ampitahorina ianareo na amin’inona na amin’inona: mariky ny fahaverezana izany ho azy; fa ho anareo kosa mariky ny famonjena, dia famonjena avy amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Eny, tombon-tsoa nomena anareo ny hanompoanareo an’i Kristy, ka tsy hoe ny hino Azy ihany fa ny hiaritra fijaliana koa noho ny aminy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: dia ny miatrika ady mitovy amin’izay hitanareo natrehiko fahiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 16.19-40.
    marker-yv: yv-n
  - type: text
    text: ' sady renareo fa mbola atrehiko ankehitriny.'
