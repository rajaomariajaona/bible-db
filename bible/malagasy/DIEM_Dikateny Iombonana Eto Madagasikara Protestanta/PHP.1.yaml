      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony nahita ahy voafonja ny ankamaroan’ireo havana iray finoana, dia vao mainka nataon’ny Tompo feno fahatokiana ka mihasahisahy kokoa mitory ny tenin’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tenin’Andriamanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tsy ahitana ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: n’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ny stf sasany.'
      marker-yv: yv-n
    - type: text
      text: ' tsy amin-tahotra.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, fialonana ahy sy fitia te hifanditra no itorian’ny sasany an’i Kristy, fa hitsim-po kosa no manentana ny sasany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto dia asesiky ny fitiavana, satria fantany fa voatendrin’Andriamanitra hampandresy lahatra ny Vaovao Mahafaly aho; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: irerỳ kosa asesiky ny fifampiandaniana, ka tsy manambara an’i Kristy amin-kitsim-po, fa mihevitra hanampy trotraka ny fijaliako amin’izao maha voafonja ahy izao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa mampaninona moa izany? Amin’ny atao rehetra, na asesiky ny fihatsarambelatsihy na asesiky ny hevitra mahitsy, dia i Kristy no torîna, ka ifaliako izany; eny, hifaliako hatrany izany '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria fantatro fa ho tonga famonjena ahy noho ny vavakareo ary noho ny fanampian’ilay Fanahy Masina nampanantenain’i Jesoa Kristy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka ataon’i Paoly ho an’ny Filipianina
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miandry sy manantena mafy tokoa aho, ka tsy hahazo henatra tsy akory; fa na ankehitriny aza, toy ny mandrakariva ihany, dia ho feno fahasahiana aho ka i Kristy no hankalazaina ao amin’ny tenako, na velona aho na maty. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa amiko, dia i Kristy no fiainana; ary ny fahafatesana no ahazoako tombony. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa raha ny mbola miaina eto an-tany no hampisy vokany ny asako, dia tsy hitako izay hofidiko. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sanganehana eo anelanelan-javatra roa aho: tiako hilaozana ity fiainana ity mba hiarahako amin’i Kristy, satria tsara lavitra izany; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kanefa noho ny aminareo, dia ilaina kokoa ny mbola hijanonako eto an-tany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Matoky izany aho, ka fantatro fa hitoetra maharitra eo akaikinareo rehetra mba hanampy anareo handroso sy ho faly amin’ny finoana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka rehefa mby eo aminareo indray aho, dia hitombo tokoa ny reharehanareo, satria efa tafaray amin’i Kristy Jesoa ianareo noho ny nataoko.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao ihany: manàna fitondrantena mendrika ny Vaovao Mahafaly momba an’i Kristy. Ka amin’izany, tonga moa aho, dia hahita anareo; tsy tonga kosa, dia handre ny aminareo: ka ho fantatro fa miorina tsara amin’ny firaisam-panahy ianareo, sady miray fo miara-miezaka hampandroso ny finoana vokatry ny Vaovao Mahafaly. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy ho azon’ireo mpanohitra ampitahorina ianareo na amin’inona na amin’inona: mariky ny fahaverezana izany ho azy; fa ho anareo kosa mariky ny famonjena, dia famonjena avy amin’Andriamanitra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, tombon-tsoa nomena anareo ny hanompoanareo an’i Kristy, ka tsy hoe ny hino Azy ihany fa ny hiaritra fijaliana koa noho ny aminy: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Velom-pisaorana an’Andriamanitro ny aminareo aho, isaky ny mahatsiaro anareo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia ny miatrika ady mitovy amin’izay hitanareo natrehiko fahiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 16.19-40.
      marker-yv: yv-n
    - type: text
      text: ' sady renareo fa mbola atrehiko ankehitriny.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary isaky ny mivavaka ho anareo rehetra aho, dia manao izany amin-kafaliana, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'noho ianareo niray hina nanampy ahy hampandroso ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' hatramin’ny andro voalohany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 16.13-15.
      marker-yv: yv-n
    - type: text
      text: ' ka mandraka ankehitriny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Matoky aho fa Andriamanitra, Izay nanomboka asa tsara tao aminareo, dia hanohy izany hatrany ka hahatanteraka azy amin’ny andro hiavian’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1.10; 1Kôr 1.8.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rariny tokoa ny iheverako anareo rehetra toy izany. Eny, entiko ato am-poko ianareo, satria mpiombona ny tombon-tsoa nomen’Andriamanitra ahy ianareo rehetra, na amin’izao maha voafonja
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.13. Tsy fantatra ny toerana izay nigadran’i Paoly.
      marker-yv: yv-n
    - type: text
      text: ' ahy izao na fony aho nampandresy lahatra sy nanamafy orina ny Vaovao Mahafaly. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitra no vavolombeloko fa marina izao lazaiko izao: manina anareo rehetra amin’ny fon’i Kristy Jesoa aho.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no tonombavaka ataoko ho anareo: hitombo bebe kokoa hatrany anie ny fitiavanareo ka hombàn’ny fahalalana marina sy ny tena fahatakaran-javatra '
