document_id: 1TI.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo mpanely fampianaran-diso
  - type: text
    content: Lazain’ny Fanahy Masina mazava tsara fa any am-parany any dia hisy olona sasany handao ny finoana; ny hahababo azy dia fanahy mamitaka sy fampianaran-demony
  - type: note
    content: Ny demony dia noheverina ho fanahy ratsy irakiraky ny devoly na mpanompony.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Eny, izany no ikelezanay aina sy iezahanay
  - type: note
    content: 'iezahanay: misy stf sasany ahitana hoe ampijalîna anay.'
  - type: text
    content: ', satria ny fanantenanay dia efa napetrakay amin’Andriamanitra velona, Izay Mpamonjy ny olona rehetra, indrindra fa ireo mino.'
  '11':
  - type: text
    content: 'Anafatrafaro sady ampianaro izany zavatra izany. '
  '12':
  - type: text
    content: Aoka tsy hisy olona hanao tsinontsinona anao noho ny maha tanora anao, fa aoka ianao ho ohatra ho an’ny mpino amin’ny fiteny, amin’ny fitondrantena, amin’ny fitiavana, amin’ny finoana, amin’ny fahadiovana.
  '13':
  - type: text
    content: 'Mandra-pahatongako, dia mahavara tsara mamaky ny '
  - type: text
    content: Soratra Masina
  - type: note
    content: Izany famakiana ny Soratra Masina ampahibemaso izany dia tahaka izay fanao tao amin’ny sinagôga (jereo Lk 4.16-21).
  - type: text
    content: ' sy mampirisika ary mampianatra. '
  '14':
  - type: text
    content: 'Aza atao tandrevaka ny fanomezam-pahasoavana ao anatinao, fanomezam-pahasoavana izay natolotra anao fony niteny taminao ny mpilaza hafatr’Andriamanitra ary nametra-tanana taminao ny loholona tafangona. '
  '15':
  - type: text
    content: 'Tontosay ireo adidy ireo ka imasoy tsara, mba hiharihary amin’ny olona rehetra ny fandrosoanao. '
  '16':
  - type: text
    content: Tandremo ny tenanao sy ny fampianaranao, ka mahareta amin’ireo adidy ireo; fa raha manao izany ianao, dia hamonjy ny tenanao sy izay mihaino anao.
  '2':
  - type: text
    content: izay haelina mpihatsaravelatsihy sy mpilaza lainga. Maty toy ny efa nasiana vy mahamay
  - type: note
    content: 'nasiana vy mahamay: ny marika, natao tamin’ny vy mahamay teo amin’ny tenan’olona, dia fanao manokana tamin’ireo olona nahavita heloka be vava sy ireo andevo nandositra.'
  - type: text
    content: ' mihitsy ny eritreritr’ireto mpilaza lainga ireto; '
  '3':
  - type: text
    content: 'raran-dry zareo ny fanambadiana; ary asainy fadina ny hanina sasantsasany. Hanina noarîn’Andriamanitra anefa ireny; ka ho an’ireo mpino sady mpahafantatra ny hafatra marim-pototra dia amim-pisaorana an’Andriamanitra no ihinanana azy. '
  '4':
  - type: text
    content: Fa tsara avokoa izay noarîn’Andriamanitra
  - type: note
    content: Ampit Gen 1.31.
  - type: text
    content: ', ka tsy misy tokony holavina fa horaisina amim-pisaorana an’Andriamanitra; '
  '5':
  - type: text
    content: satria hamasinin’ny tenin’Andriamanitra sy ny vavaka izany.
  - type: heading
    content: Ny mpanompo tsaran’i Kristy
  '6':
  - type: text
    content: 'Raha izany torohevitra izany no arosonao ny havana iray finoana, dia ho mpanompo tsaran’i Kristy Jesoa ianao, ka hiharihary fa mivelona amin’ireo teny momba ny finoana sy ny fampianarana tsara izay efa narahinao ianao. '
  '7':
  - type: text
    content: 'Aoka ianao tsy hiraharaha izay angano manazimba fivavahana sady tsy misy fotony. Manazara tena amin’ny toe-panahy araka an’Andriamanitra. '
  '8':
  - type: text
    content: 'Ny fampiasan-tena ara-batana dia mba mahasoa ihany, nefa tsy dia manao ahoana loatra; fa ny toe-panahy araka an’Andriamanitra kosa dia mahasoa amin’ny zavatra rehetra, satria mampanantena fiainana na ankehitriny na amin’ny ho avy. '
  '9':
  - type: text
    content: 'Azo antoka izany teny izany, ka mendrika hankatoavina tanteraka. '
