  - type: text
    text: Ireo mpanely fampianaran-diso
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lazain’ny Fanahy Masina mazava tsara fa any am-parany any dia hisy olona sasany handao ny finoana; ny hahababo azy dia fanahy mamitaka sy fampianaran-demony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: demony
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia noheverina ho fanahy ratsy irakiraky ny devoly na mpanompony.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: izay haelina mpihatsaravelatsihy sy mpilaza lainga. Maty toy ny efa nasiana vy mahamay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nasiana vy mahamay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny marika, natao tamin’ny vy mahamay teo amin’ny tenan’olona, dia fanao manokana tamin’ireo olona nahavita heloka be vava sy ireo andevo nandositra.
    marker-yv: yv-n
  - type: text
    text: ' mihitsy ny eritreritr’ireto mpilaza lainga ireto; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'raran-dry zareo ny fanambadiana; ary asainy fadina ny hanina sasantsasany. Hanina noarîn’Andriamanitra anefa ireny; ka ho an’ireo mpino sady mpahafantatra ny hafatra marim-pototra dia amim-pisaorana an’Andriamanitra no ihinanana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa tsara avokoa izay noarîn’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 1.31.
    marker-yv: yv-n
  - type: text
    text: ', ka tsy misy tokony holavina fa horaisina amim-pisaorana an’Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: satria hamasinin’ny tenin’Andriamanitra sy ny vavaka izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny mpanompo tsaran’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha izany torohevitra izany no arosonao ny havana iray finoana, dia ho mpanompo tsaran’i Kristy Jesoa ianao, ka hiharihary fa mivelona amin’ireo teny momba ny finoana sy ny fampianarana tsara izay efa narahinao ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aoka ianao tsy hiraharaha izay angano manazimba fivavahana sady tsy misy fotony. Manazara tena amin’ny toe-panahy araka an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny fampiasan-tena ara-batana dia mba mahasoa ihany, nefa tsy dia manao ahoana loatra; fa ny toe-panahy araka an’Andriamanitra kosa dia mahasoa amin’ny zavatra rehetra, satria mampanantena fiainana na ankehitriny na amin’ny ho avy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Azo antoka izany teny izany, ka mendrika hankatoavina tanteraka. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eny, izany no ikelezanay aina sy iezahanay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'iezahanay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ampijalîna anay.
    marker-yv: yv-n
  - type: text
    text: ', satria ny fanantenanay dia efa napetrakay amin’Andriamanitra velona, Izay Mpamonjy ny olona rehetra, indrindra fa ireo mino.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Anafatrafaro sady ampianaro izany zavatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka tsy hisy olona hanao tsinontsinona anao noho ny maha tanora anao, fa aoka ianao ho ohatra ho an’ny mpino amin’ny fiteny, amin’ny fitondrantena, amin’ny fitiavana, amin’ny finoana, amin’ny fahadiovana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mandra-pahatongako, dia mahavara tsara mamaky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Izany '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: famakiana ny Soratra Masina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampahibemaso izany dia tahaka izay fanao tao amin’ny sinagôga (jereo Lk 4.16-21).'
    marker-yv: yv-n
  - type: text
    text: ' sy mampirisika ary mampianatra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Aza atao tandrevaka ny fanomezam-pahasoavana ao anatinao, fanomezam-pahasoavana izay natolotra anao fony niteny taminao ny mpilaza hafatr’Andriamanitra ary nametra-tanana taminao ny loholona tafangona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tontosay ireo adidy ireo ka imasoy tsara, mba hiharihary amin’ny olona rehetra ny fandrosoanao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tandremo ny tenanao sy ny fampianaranao, ka mahareta amin’ireo adidy ireo; fa raha manao izany ianao, dia hamonjy ny tenanao sy izay mihaino anao.
