document_id: EZK.39
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loza vaovao mananontanona an’i Gôga
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '«Ianao kosa, ry ilay taranak’olombelona, ijoroy ny maha-mpaminany anao manoloana an’i Gôga, ka ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: «Hirotsaka an-tsehatra hamely anao Aho, ry Gôga, filoha faratampon’ny vahoakan’i Mesèka sy i Tobala'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gôga
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Mesèka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tobala:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny naoty momba ny 38.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nentiko nirenireny ianao mba hamongorako anao. Nampialako avy any am-parany avaratra ianao hampanafihako ny tendrombohitr’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Avy eo kosa hasiako ianao, ka ho tapaka eny an-tananao ankavia ny tsipîkanao ary hianjera avy eny an-tananao ankavanana ny zana-tsipîkanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ho faty miampatrampatra eny an-tendrombohitr’i Israely ianao sy ny tafikao manontolo ary ireo firenena maro mpomba anao. Homeko hohanin’ireo vorona mpihaza isan-karazany sy ny bibidia ny fatinareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty momba ny 29.5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny an-kodahoda no hahafatesanao, satria Izaho no efa nilaza; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Handrehetako afo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.6 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'afo miledaleda:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: handoran-tanàna sy handoran-tanety izany.
    marker-yv: yv-n
  - type: text
    text: ' ao amin’ny tanin’i Magôga sy ao amin’ireo mponin’ny nosy izay mihevitra ho milamina. Amin’izay dia hoekena fa Izaho no TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hataoko izay hahalalan’i Israely vahoakako fa tena masina Aho ka tsy havelako hanazimbazimba Ahy intsony izy; amin’izay dia hoeken’ireo hafa firenena fa Izaho no TOMPO, Ilay Masina ao amin’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Indro ho avy izany toe-javatra izany ary efa manomboka tanteraka. Izany no andro fitsarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andro fitsarana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny RM dia manao fotsiny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny andro
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo ny naoty momba ny 7.7.'
    marker-yv: yv-n
  - type: text
    text: ' nambarako; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hivoaka ny tanànany ny Israelita, dia handrehitra afo miledaleda handorana ireo fiadian’ny fahavalony. Koa ny ampinga sy ny tsipîka ary ny zana-tsipîka mbamin’ny lefona sy ny langilangy dia hisy hanaovany afo mandritra ny fito taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy handeha hanangon-kitay any an-tsaha akory ny olona na hikapa hazo any an’ala, fa ireo fiadiana ireo no hataony kitay eo. Hamabo sy handroba ireo efa namabo sy nandroba azy izy; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Ary amin’ny andro hahatongavan’izany, dia homeko toerana iray handevenana azy any Israely i Gôga, dia ny lohasahan’ny mpandalo ao atsinanan’ny Ranomasina Maty; ka hisakan-dalana ny mpandalo izany fandevenana azy eo izany. Any no handevenana an’i Gôga sy ny tafiny marobe manontolo. Ary hantsoina hoe «Lohasahan’ny tafika maroben’i Gôga» io toerana io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Haharitra fito volana no handevenan’ny Israelita azy rehetra sy hanadiovany ny taniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny ankapobeny dia tsy ekena ny hanome fasana ho an’ny fahavalo (jereo 2 Mp 9.37; Jer 8.1-3), kanefa ny fisian’ny fatin’i Gôga sy ny olony dia mety nandoto ny tanin’i Israely (jereo Nom 19.11).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny mponina rehetra amin’izany faritra izany dia hifarimbona handevina azy ao avokoa; ary ho rehareha ho azy izany amin’ny andro hanehoako ny voninahitro; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rehefa afaka fito volana, dia hisy olona hotendrena hitety tsy an-kitsahatra ny tany mba hanadio azy amin’ny fikarohana sy fandevenana ireo faty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo faty: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy maro izany, fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ireo mpandalo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'sisa tavela eny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hitety ny tany izy ka raha misy mahita taolan’olona, dia hametraka antontam-bato ho marika eo anilany mba hiavian’ny mpandevina haka azy sy handevina azy ao amin’ny Lohasahan’ny tafika maroben’i Gôga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hisy koa aza tanàna iray hantsoina hoe Hamônà na hoe tafika marobe. Dia toy izany no hanadiovan’ireo ny tany.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izao koa no lazain’ny Tompo ANDRIANANAHARY tamiko: «Ianao kosa, ry ilay taranak’olombelona, antsoy ny voro-manidina rehetra sy ny bibidia rehetra, ka iteneno hoe: Mivoria eto avokoa avy any rehetra any ianareo, mba hahazo anjara amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' izay omaniko ho anareo. Eny an-tendrombohitr’i Israely no hisy izany sorona lehibe izany, ka hihinananareo nofo sy hisotroanareo ra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hohaninareo ny nofon’ireo miaramila maherifo ary hosotroinareo ny ran’ireo mpitondra an’izao tontolo izao, natolotra ho sorona ho solon’ny ondrilahy sy ny zanak’ondry ary ny osilahy mbamin’ny zanak’omby, izay samy biby natavezina tany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ' avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Io sorona io no anasako anareo, koa hihinana ny matavy eo ianareo ambara-pahavoky anareo, ary hisotro ny ra ianareo ambara-pahaleo anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ao amin’io fanasàko io no hivokisanareo amin’ny soavaly sy ny mpitaingina azy ary ny miaramila maherifo mbamin’ny mpiady isan-karazany; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Hasehoko amin’ny hafa firenena ny voninahitro. Ho hitan’izy rehetra didim-pitsarana izay hampihariko aminy sy ny fahefana izay hampiasaiko aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary manomboka amin’izay andro izay dia hoeken’ny Israelita fa Izaho no TOMPO Andriamaniny.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famintinana ny toritenin’i Ezekiela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Ho takatr’ireo firenen-kafa fa matoa nentina ho babo ireo Israelita dia noho ny heloka nivadihany tamiko, hoy ny Tompo. Fa niafenako tava ireo, ka natolotro ho eo an-tanan’ny fahavalony mba ho faty an’ady izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Niafenako tava ireo ho setrin’ny asany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' amam-pikomiany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '«Kanefa izao no lazain’ny Tompo ANDRIANANAHARY: Ankehitriny dia hamindrako fo ny Israelita rehetra izay taranak’i Jakôba ka hampodiko avy amin’ny fahababoany; ary hotakîko ny hanajan’ny olona rehetra ny anarako masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Amin’izay dia hohadinoiny ny fahafaham-baràka nanjo azy noho ny hadisoana rehetra nataony tamiko. Hiaina indray am-pilaminana eo amin’ny taniny izy ka tsy hisy hanaitaitra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hampodiko avy any amin’ireo hafa firenena izy ary hangoniko avy any amin’ny tanin’ireo fahavalony. Ny ataoko amin’ny Israelita no hanehoako eo imason’ny firenena maro manodidina fa Andriamanitra masina Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Amin’izay dia hoekeny fa Izaho no TOMPO Andriamaniny, rehefa hangoniko ho eo amin’ny taniny izy, ka tsy hisy havelako any amin’ireo firenena izay nanaovako sesitany azy na iray aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny Fanahiko no hatosako amin’ny Israelita, ka tsy hiafenako tava intsony ireo; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
