document_id: EZK.39,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Loza vaovao mananontanona an’i Gôga
  - type: text
    content: '«Ianao kosa, ry ilay taranak’olombelona, ijoroy ny maha-mpaminany anao manoloana an’i Gôga, ka ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: «Hirotsaka an-tsehatra hamely anao Aho, ry Gôga, filoha faratampon’ny vahoakan’i Mesèka sy i Tobala'
  - type: note
    content: 'Gôga, Mesèka, Tobala: jereo ny naoty momba ny 38.2.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Tsy handeha hanangon-kitay any an-tsaha akory ny olona na hikapa hazo any an’ala, fa ireo fiadiana ireo no hataony kitay eo. Hamabo sy handroba ireo efa namabo sy nandroba azy izy; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
  '11':
  - type: text
    content: '«Ary amin’ny andro hahatongavan’izany, dia homeko toerana iray handevenana azy any Israely i Gôga, dia ny lohasahan’ny mpandalo ao atsinanan’ny Ranomasina Maty; ka hisakan-dalana ny mpandalo izany fandevenana azy eo izany. Any no handevenana an’i Gôga sy ny tafiny marobe manontolo. Ary hantsoina hoe «Lohasahan’ny tafika maroben’i Gôga» io toerana io. '
  '12':
  - type: text
    content: Haharitra fito volana no handevenan’ny Israelita azy rehetra sy hanadiovany ny taniny
  - type: note
    content: Amin’ny ankapobeny dia tsy ekena ny hanome fasana ho an’ny fahavalo (jereo 2 Mp 9.37; Jer 8.1-3), kanefa ny fisian’ny fatin’i Gôga sy ny olony dia mety nandoto ny tanin’i Israely (jereo Nom 19.11).
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Ny mponina rehetra amin’izany faritra izany dia hifarimbona handevina azy ao avokoa; ary ho rehareha ho azy izany amin’ny andro hanehoako ny voninahitro; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '14':
  - type: text
    content: Rehefa afaka fito volana, dia hisy olona hotendrena hitety tsy an-kitsahatra ny tany mba hanadio azy amin’ny fikarohana sy fandevenana ireo faty
  - type: note
    content: 'ireo faty: araka ny dkt tranainy maro izany, fa ny RM kosa manao hoe ireo mpandalo.'
  - type: text
    content: 'sisa tavela eny. '
  '15':
  - type: text
    content: 'Hitety ny tany izy ka raha misy mahita taolan’olona, dia hametraka antontam-bato ho marika eo anilany mba hiavian’ny mpandevina haka azy sy handevina azy ao amin’ny Lohasahan’ny tafika maroben’i Gôga. '
  '16':
  - type: text
    content: Hisy koa aza tanàna iray hantsoina hoe Hamônà na hoe tafika marobe. Dia toy izany no hanadiovan’ireo ny tany.»
  '17':
  - type: text
    content: 'Ary izao koa no lazain’ny Tompo ANDRIANANAHARY tamiko: «Ianao kosa, ry ilay taranak’olombelona, antsoy ny voro-manidina rehetra sy ny bibidia rehetra, ka iteneno hoe: Mivoria eto avokoa avy any rehetra any ianareo, mba hahazo anjara amin’ny '
  - type: text
    content: sorona
  - type: text
    content: ' izay omaniko ho anareo. Eny an-tendrombohitr’i Israely no hisy izany sorona lehibe izany, ka hihinananareo nofo sy hisotroanareo ra. '
  '18':
  - type: text
    content: 'Hohaninareo ny nofon’ireo miaramila maherifo ary hosotroinareo ny ran’ireo mpitondra an’izao tontolo izao, natolotra ho sorona ho solon’ny ondrilahy sy ny zanak’ondry ary ny osilahy mbamin’ny zanak’omby, izay samy biby natavezina tany '
  - type: text
    content: Basàna
  - type: text
    content: ' avokoa. '
  '19':
  - type: text
    content: 'Io sorona io no anasako anareo, koa hihinana ny matavy eo ianareo ambara-pahavoky anareo, ary hisotro ny ra ianareo ambara-pahaleo anareo. '
  '2':
  - type: text
    content: 'Nentiko nirenireny ianao mba hamongorako anao. Nampialako avy any am-parany avaratra ianao hampanafihako ny tendrombohitr’i Israely. '
  '20':
  - type: text
    content: Ao amin’io fanasàko io no hivokisanareo amin’ny soavaly sy ny mpitaingina azy ary ny miaramila maherifo mbamin’ny mpiady isan-karazany; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
  '21':
  - type: text
    content: '«Hasehoko amin’ny hafa firenena ny voninahitro. Ho hitan’izy rehetra didim-pitsarana izay hampihariko aminy sy ny fahefana izay hampiasaiko aminy. '
  '22':
  - type: text
    content: Ary manomboka amin’izay andro izay dia hoeken’ny Israelita fa Izaho no TOMPO Andriamaniny.»
  - type: heading
    content: Famintinana ny toritenin’i Ezekiela
  '23':
  - type: text
    content: '«Ho takatr’ireo firenen-kafa fa matoa nentina ho babo ireo Israelita dia noho ny heloka nivadihany tamiko, hoy ny Tompo. Fa niafenako tava ireo, ka natolotro ho eo an-tanan’ny fahavalony mba ho faty an’ady izy rehetra. '
  '24':
  - type: text
    content: 'Niafenako tava ireo ho setrin’ny asany '
  - type: text
    content: maloto
  - type: text
    content: ' amam-pikomiany.'
  '25':
  - type: text
    content: '«Kanefa izao no lazain’ny Tompo ANDRIANANAHARY: Ankehitriny dia hamindrako fo ny Israelita rehetra izay taranak’i Jakôba ka hampodiko avy amin’ny fahababoany; ary hotakîko ny hanajan’ny olona rehetra ny anarako masina. '
  '26':
  - type: text
    content: 'Amin’izay dia hohadinoiny ny fahafaham-baràka nanjo azy noho ny hadisoana rehetra nataony tamiko. Hiaina indray am-pilaminana eo amin’ny taniny izy ka tsy hisy hanaitaitra azy. '
  '27':
  - type: text
    content: 'Hampodiko avy any amin’ireo hafa firenena izy ary hangoniko avy any amin’ny tanin’ireo fahavalony. Ny ataoko amin’ny Israelita no hanehoako eo imason’ny firenena maro manodidina fa Andriamanitra masina Aho. '
  '28':
  - type: text
    content: 'Amin’izay dia hoekeny fa Izaho no TOMPO Andriamaniny, rehefa hangoniko ho eo amin’ny taniny izy, ka tsy hisy havelako any amin’ireo firenena izay nanaovako sesitany azy na iray aza. '
  '29':
  - type: text
    content: Ny Fanahiko no hatosako amin’ny Israelita, ka tsy hiafenako tava intsony ireo; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
  '3':
  - type: text
    content: 'Avy eo kosa hasiako ianao, ka ho tapaka eny an-tananao ankavia ny tsipîkanao ary hianjera avy eny an-tananao ankavanana ny zana-tsipîkanao. '
  '4':
  - type: text
    content: Ho faty miampatrampatra eny an-tendrombohitr’i Israely ianao sy ny tafikao manontolo ary ireo firenena maro mpomba anao. Homeko hohanin’ireo vorona mpihaza isan-karazany sy ny bibidia ny fatinareo
  - type: note
    content: Jereo ny naoty momba ny 29.5.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Eny an-kodahoda no hahafatesanao, satria Izaho no efa nilaza; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '6':
  - type: text
    content: Handrehetako afo
  - type: note
    content: 'afo miledaleda: handoran-tanàna sy handoran-tanety izany.'
  - type: text
    content: ' ao amin’ny tanin’i Magôga sy ao amin’ireo mponin’ny nosy izay mihevitra ho milamina. Amin’izay dia hoekena fa Izaho no TOMPO. '
  '7':
  - type: text
    content: 'Hataoko izay hahalalan’i Israely vahoakako fa tena masina Aho ka tsy havelako hanazimbazimba Ahy intsony izy; amin’izay dia hoeken’ireo hafa firenena fa Izaho no TOMPO, Ilay Masina ao amin’i Israely. '
  '8':
  - type: text
    content: Indro ho avy izany toe-javatra izany ary efa manomboka tanteraka. Izany no andro fitsarana
  - type: note
    content: 'Ny andro fitsarana: ny RM dia manao fotsiny hoe ny andro, jereo ny naoty momba ny 7.7.'
  - type: text
    content: ' nambarako; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '9':
  - type: text
    content: 'Hivoaka ny tanànany ny Israelita, dia handrehitra afo miledaleda handorana ireo fiadian’ny fahavalony. Koa ny ampinga sy ny tsipîka ary ny zana-tsipîka mbamin’ny lefona sy ny langilangy dia hisy hanaovany afo mandritra ny fito taona. '
