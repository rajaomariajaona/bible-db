document_id: JER.34,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatra ho an’i Jeremià
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niady tamin’i Jerosalema sy ireo tanànan’i Joda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 25.1-11; 2 Mp 36.17-21; ampit Jer 21.2.
      marker-yv: yv-n
    - type: text
      text: ' i Nebokadnetsara mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Babilôna
    - type: text
      text: ', niaraka taminy ny tafiny rehetra sy ny miaramilan’ny fanjakana rehetra eran-tany mbamin’ny vahoaka rehetra teo ambany fahefàny. Tamin’izany no tonga ho an’i Jeremià avy amin’n TOMPO izao teny manaraka izao:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpitondra fanjakana rehetra sy ny mponina tao Jerosalema dia samy nandray anjara tamin’izany fifanekena ampahibemaso izany avokoa ary nanaiky tsy hampanompo intsony ireo lehilahy sy vehivavy eo an-tanany, fa samy handefa azy ireny ho afaka. Samy nanaiky izany fifanekena izany avokoa ny olona ka namela ny mpanompony handeha. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanjo niova hevitra izy ireo taorian’izany ka namerina ny lehilahy sy vehivavy nafahany ary nanandevo azy indray.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tonga tamin’i Jeremià ny teny avy amin’ny TOMPO nanao hoe:'
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Izao no lazain’ny TOMPO Andriamanitr’i Israely: Efa nanao fifanekena tamin’ny razanareo koa Aho fony namoaka azy tany Ejipta izay toerana nanandevozana azy. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Isaky ny fito taona, hoy Aho taminy, dia aoka ianareo samy handefa ho afaka ireo Hebreo mpiray firenena aminareo, Hebreo izay nitolo-tena ho andevo taminareo ka efa nanompo anareo enin-taona. Tokony havelanareo ho afaka malalaka izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 21.2-3; Deot 15.12-15.
      marker-yv: yv-n
    - type: text
      text: '. Kanjo ny razanareo tsy nanaiky Ahy, ary tsy nihaino Ahy akory. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ianareo kosa tato ho ato dia nanao fanapahan-kevitra mifanohitra amin’izany, ary hitako fa nanao izay mahitsy ianareo raha nanambara fanafahana ho an’ny namanareo, sady nanao fifanekena ampahibemaso tao amin’ny trano natokana ho Ahy. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Kanjo niova hevitra ianareo sady nanao tsinontsinona Ahy, fa samy namerina indray ireo mpanompo lahy sy vavy izay efa nalefanareo handeha ka nanery azy ho andevo indray.»
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ihany i Jeremià hoe: «Noho izany dia izao no lazain’ny TOMPO: Samy tokony ho nanambara fanafahana ho an’ny mpanompony avy ianareo, dia ho an’ny namany sady mpiray firenena aminy; nefa tsy nankatò Ahy ianareo. Koa Izaho TOMPO mihitsy no manambara sy miteny hentitra aminareo fa halefako hamely anareo ny ady sy ny areti-mandringana ary ny mosary; hany ka hataoko mampivarahontsana ianareo any amin’ny fanjakana rehetra eran-tany.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Ireo manampahefana eto Joda sy i Jerosalema, ireo mpiasam-panjakana ambony, ireo mpisorona ary ireo olona afaka rehetra teo amin’ny tany, dia nivadika ny fifanekena tamiko ka tsy nahatana ny tenin’ny fanekena nataony teo anatrehako fony nosasahana ny ombilahikely ka nandeha namaky teo anivony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny karazan-tsorona toy itony dia natao hanamafisana sy hamatorana ny fifanekena iray (jereo Gen 15.9-18 sy nta).
      marker-yv: yv-n
    - type: text
      text: ' izy. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Izaho TOMPO Andriamanitr’i Israely no mandidy anao hankany amin’i Tsedekià mpanjakan’i Joda mba hilaza izao hafatro izao: Hatolotro eo an-tanan’i Nebokadnetsara mpanjakan’i Babilôna ity tanàna ity mba hodorany amin’ny afo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hatolotro ho eo an-tanan’ny fahavalo izay mitady hahafaty azy izy; ary ho sakafon’ny voromahery sy ny bibidia ny fatiny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Tsedekià mpanjaka sy ireo mpiasam-panjakana ambony koa dia hatolotro ho eo an-tanan’ny fahavalo izay mitady hahafaty azy, dia ny tafiky ny mpanjakan’i Babilôna. Nisinda nihataka kely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny fihatahana kely vetivety nataon’ny tafika babilônianina, jereo 37.5-11.
      marker-yv: yv-n
    - type: text
      text: ' ankehitriny izany tafika izany; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: saingy hasaiko hiverina hanafika ity tanàna ity indray izy, ka hahafaka sy handoro azy. Ary ireo tanànan’i Joda dia hataoko lao tsy hisy mponina; teny hentitra avy amiko TOMPO izany.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary tsy ho afa-miala aminy ianao, fa ho azo sambo-belona ka hatolotra azy. Tsy maintsy hifanatri-maso aminy ianao ka hamaly azy mivantana alohan’ny hankanesanao any Babilôna.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Kanefa raha mankatò ny teniko ianao, ry Tsedekià mpanjakan’i Joda, dia tsy ho faty an’ady ianao. Izaho TOMPO mihitsy no milaza izany aminao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ho faty amim-piadanana aza ianao, ka ny fandevenana anao dia hatao tahaka ny an’ireo razanao izay mpanjaka talohanao: handoran’ny olona zava-manitra ianao sady hanaovany hira fisaonana hoe: ‹Indrisy, ry mpanjaka tompoko!› Izaho TOMPO mihitsy no milaza, ary teny hentitra avy amiko izany!»'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany teny rehetra izany no nampitain’i Jeremià tamin’i Tsedekià, mpanjakan’i Joda, tany Jerosalema. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay fotoana izay ny tafiky ny mpanjakan’i Babilôna dia namely an’i Jerosalema sy ireo tanànamimanda hafa tany Joda izay mbola sisa nijoro, dia i Lakisy sy i Hazekà.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naverin’ny tompony indray ireo andevo efa nohafahany
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao indray no teny tonga ho an’i Jeremià avy amin’ny TOMPO. Izany moa dia taorian’ny nanaovan’i Tsedekià mpanjaka sy ny mponina rehetra tao Jerosalema fifanekena ampahibemaso fa samy hanambara ny fahafahan’ny andevony avy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy maintsy handefa ny andevony hebreo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny andevony hebreo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eto angamba ny resahina dia ireo jiosy izay voatery nitolo-tena ho andevo mba handoavana ny trosany (jereo and 14).
      marker-yv: yv-n
    - type: text
      text: ' na lahy na vavy ho afaka ny olona tsirairay, ka tsy hisy intsony hampanompo ny taranak’i Joda mpiray firenena aminy. '
