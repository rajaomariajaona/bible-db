document_id: JER.34,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hafatra ho an’i Jeremià
  - type: text
    content: Niady tamin’i Jerosalema sy ireo tanànan’i Joda
  - type: note
    content: Jereo 2 Mp 25.1-11; 2 Mp 36.17-21; ampit Jer 21.2.
  - type: text
    content: ' i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ', niaraka taminy ny tafiny rehetra sy ny miaramilan’ny fanjakana rehetra eran-tany mbamin’ny vahoaka rehetra teo ambany fahefàny. Tamin’izany no tonga ho an’i Jeremià avy amin’n TOMPO izao teny manaraka izao:'
  '10':
  - type: text
    content: 'Ny mpitondra fanjakana rehetra sy ny mponina tao Jerosalema dia samy nandray anjara tamin’izany fifanekena ampahibemaso izany avokoa ary nanaiky tsy hampanompo intsony ireo lehilahy sy vehivavy eo an-tanany, fa samy handefa azy ireny ho afaka. Samy nanaiky izany fifanekena izany avokoa ny olona ka namela ny mpanompony handeha. '
  '11':
  - type: text
    content: Kanjo niova hevitra izy ireo taorian’izany ka namerina ny lehilahy sy vehivavy nafahany ary nanandevo azy indray.
  '12':
  - type: text
    content: 'Koa tonga tamin’i Jeremià ny teny avy amin’ny TOMPO nanao hoe:'
  '13':
  - type: text
    content: '«Izao no lazain’ny TOMPO Andriamanitr’i Israely: Efa nanao fifanekena tamin’ny razanareo koa Aho fony namoaka azy tany Ejipta izay toerana nanandevozana azy. '
  '14':
  - type: text
    content: Isaky ny fito taona, hoy Aho taminy, dia aoka ianareo samy handefa ho afaka ireo Hebreo mpiray firenena aminareo, Hebreo izay nitolo-tena ho andevo taminareo ka efa nanompo anareo enin-taona. Tokony havelanareo ho afaka malalaka izy
  - type: note
    content: Jereo Eks 21.2-3; Deot 15.12-15.
  - type: text
    content: '. Kanjo ny razanareo tsy nanaiky Ahy, ary tsy nihaino Ahy akory. '
  '15':
  - type: text
    content: 'Fa ianareo kosa tato ho ato dia nanao fanapahan-kevitra mifanohitra amin’izany, ary hitako fa nanao izay mahitsy ianareo raha nanambara fanafahana ho an’ny namanareo, sady nanao fifanekena ampahibemaso tao amin’ny trano natokana ho Ahy. '
  '16':
  - type: text
    content: Kanjo niova hevitra ianareo sady nanao tsinontsinona Ahy, fa samy namerina indray ireo mpanompo lahy sy vavy izay efa nalefanareo handeha ka nanery azy ho andevo indray.»
  '17':
  - type: text
    content: 'Dia hoy ihany i Jeremià hoe: «Noho izany dia izao no lazain’ny TOMPO: Samy tokony ho nanambara fanafahana ho an’ny mpanompony avy ianareo, dia ho an’ny namany sady mpiray firenena aminy; nefa tsy nankatò Ahy ianareo. Koa Izaho TOMPO mihitsy no manambara sy miteny hentitra aminareo fa halefako hamely anareo ny ady sy ny areti-mandringana ary ny mosary; hany ka hataoko mampivarahontsana ianareo any amin’ny fanjakana rehetra eran-tany.'
  '18':
  - type: text
    content: «Ireo manampahefana eto Joda sy i Jerosalema, ireo mpiasam-panjakana ambony, ireo mpisorona ary ireo olona afaka rehetra teo amin’ny tany, dia nivadika ny fifanekena tamiko ka tsy nahatana ny tenin’ny fanekena nataony teo anatrehako fony nosasahana ny ombilahikely ka nandeha namaky teo anivony
  - type: note
    content: Ny karazan-tsorona toy itony dia natao hanamafisana sy hamatorana ny fifanekena iray (jereo Gen 15.9-18 sy nta).
  - type: text
    content: ' izy. '
  '2':
  - type: text
    content: '«Izaho TOMPO Andriamanitr’i Israely no mandidy anao hankany amin’i Tsedekià mpanjakan’i Joda mba hilaza izao hafatro izao: Hatolotro eo an-tanan’i Nebokadnetsara mpanjakan’i Babilôna ity tanàna ity mba hodorany amin’ny afo. '
  '20':
  - type: text
    content: 'Koa hatolotro ho eo an-tanan’ny fahavalo izay mitady hahafaty azy izy; ary ho sakafon’ny voromahery sy ny bibidia ny fatiny. '
  '21':
  - type: text
    content: I Tsedekià mpanjaka sy ireo mpiasam-panjakana ambony koa dia hatolotro ho eo an-tanan’ny fahavalo izay mitady hahafaty azy, dia ny tafiky ny mpanjakan’i Babilôna. Nisinda nihataka kely
  - type: note
    content: Momba ny fihatahana kely vetivety nataon’ny tafika babilônianina, jereo 37.5-11.
  - type: text
    content: ' ankehitriny izany tafika izany; '
  '22':
  - type: text
    content: saingy hasaiko hiverina hanafika ity tanàna ity indray izy, ka hahafaka sy handoro azy. Ary ireo tanànan’i Joda dia hataoko lao tsy hisy mponina; teny hentitra avy amiko TOMPO izany.
  '3':
  - type: text
    content: Ary tsy ho afa-miala aminy ianao, fa ho azo sambo-belona ka hatolotra azy. Tsy maintsy hifanatri-maso aminy ianao ka hamaly azy mivantana alohan’ny hankanesanao any Babilôna.
  '4':
  - type: text
    content: '«Kanefa raha mankatò ny teniko ianao, ry Tsedekià mpanjakan’i Joda, dia tsy ho faty an’ady ianao. Izaho TOMPO mihitsy no milaza izany aminao. '
  '5':
  - type: text
    content: 'Fa ho faty amim-piadanana aza ianao, ka ny fandevenana anao dia hatao tahaka ny an’ireo razanao izay mpanjaka talohanao: handoran’ny olona zava-manitra ianao sady hanaovany hira fisaonana hoe: ‹Indrisy, ry mpanjaka tompoko!› Izaho TOMPO mihitsy no milaza, ary teny hentitra avy amiko izany!»'
  '6':
  - type: text
    content: 'Izany teny rehetra izany no nampitain’i Jeremià tamin’i Tsedekià, mpanjakan’i Joda, tany Jerosalema. '
  '7':
  - type: text
    content: Tamin’izay fotoana izay ny tafiky ny mpanjakan’i Babilôna dia namely an’i Jerosalema sy ireo tanànamimanda hafa tany Joda izay mbola sisa nijoro, dia i Lakisy sy i Hazekà.
  - type: heading
    content: Naverin’ny tompony indray ireo andevo efa nohafahany
  '8':
  - type: text
    content: 'Ary izao indray no teny tonga ho an’i Jeremià avy amin’ny TOMPO. Izany moa dia taorian’ny nanaovan’i Tsedekià mpanjaka sy ny mponina rehetra tao Jerosalema fifanekena ampahibemaso fa samy hanambara ny fahafahan’ny andevony avy. '
  '9':
  - type: text
    content: Tsy maintsy handefa ny andevony hebreo
  - type: note
    content: 'ny andevony hebreo: eto angamba ny resahina dia ireo jiosy izay voatery nitolo-tena ho andevo mba handoavana ny trosany (jereo and 14).'
  - type: text
    content: ' na lahy na vavy ho afaka ny olona tsirairay, ka tsy hisy intsony hampanompo ny taranak’i Joda mpiray firenena aminy. '
