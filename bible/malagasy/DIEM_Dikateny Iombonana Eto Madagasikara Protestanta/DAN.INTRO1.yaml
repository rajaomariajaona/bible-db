    - type: text
      text: Sava lalana
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Ny bokin’i
    - type: text
      text: ' Daniela '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia mitantara amintsika ny fomba nataon’ireo zatovo jiosy efa-dahy isan’ireo babo nentin’i Nebokadnetsara mba hijanonany ho mpivavaka mahatoky tsy azo hozongozonina amin’ilay Andriamaniny. Ny tapany voalohany (toko 1–6) dia mirakitra fitantarana enina toa samy mahaleo tena izay mampiseho ny karazam-panerena sy fandrahonana ary famaizana azon’ireo mpamoritra nampiharina tamin’ny Jiosy. Eto ohatra no ahitana ilay tantara malaza momba ny nanipazana an’i Daniela tao an-davaky ny liona.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny tapany faharoa (7–12) dia mitantara ireo fahitana efatra nomen’Andriamanitra an’i Daniela. Asehon’ireo fahitana ireo ny tantaran’ny vahoaka jiosy, teo ambany fanjanahan’ny firenen-kafa mandra-panarenan’Andriamanitra indray ny fanjakana jiosy.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny karazan’ity boky ity sy ny fomba fanoratra azy dia misy itoviany betsaka amin’ny bokin’ny
    - type: text
      text: ' Fanambaràna '
    - type: usfm
      marker: it
      children:
      - type: text
        text: izay mamarana ny Testamenta Vaovao. Na ny bokin’i
    - type: text
      text: ' Daniela '
    - type: usfm
      marker: it
      children:
      - type: text
        text: na ny bokin’ny
    - type: text
      text: ' Fanambaràna '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia samy mikendry hampahery ny mpino amin’ny taonjato rehetra haharitra amin’ny finoana, na toa inona na toa inona fitsapana sy fanenjehana sedraina. Lahatsora-pitolomana ireo.
