document_id: DAN.INTRO1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: –Ny bokin’i
  - type: text
    content: ' Daniela '
  - type: text
    content: dia mitantara amintsika ny fomba nataon’ireo zatovo jiosy efa-dahy isan’ireo babo nentin’i Nebokadnetsara mba hijanonany ho mpivavaka mahatoky tsy azo hozongozonina amin’ilay Andriamaniny. Ny tapany voalohany (toko 1–6) dia mirakitra fitantarana enina toa samy mahaleo tena izay mampiseho ny karazam-panerena sy fandrahonana ary famaizana azon’ireo mpamoritra nampiharina tamin’ny Jiosy. Eto ohatra no ahitana ilay tantara malaza momba ny nanipazana an’i Daniela tao an-davaky ny liona.
  - type: text
    content: Ny tapany faharoa (7–12) dia mitantara ireo fahitana efatra nomen’Andriamanitra an’i Daniela. Asehon’ireo fahitana ireo ny tantaran’ny vahoaka jiosy, teo ambany fanjanahan’ny firenen-kafa mandra-panarenan’Andriamanitra indray ny fanjakana jiosy.
  - type: text
    content: Ny karazan’ity boky ity sy ny fomba fanoratra azy dia misy itoviany betsaka amin’ny bokin’ny
  - type: text
    content: ' Fanambaràna '
  - type: text
    content: izay mamarana ny Testamenta Vaovao. Na ny bokin’i
  - type: text
    content: ' Daniela '
  - type: text
    content: na ny bokin’ny
  - type: text
    content: ' Fanambaràna '
  - type: text
    content: dia samy mikendry hampahery ny mpino amin’ny taonjato rehetra haharitra amin’ny finoana, na toa inona na toa inona fitsapana sy fanenjehana sedraina. Lahatsora-pitolomana ireo.
