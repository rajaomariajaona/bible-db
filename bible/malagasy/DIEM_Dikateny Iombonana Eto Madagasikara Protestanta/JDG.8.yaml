document_id: JDG.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy faly ny Efraîmita
  - type: text
    content: 'Ary hoy ny vatan-dehilahy efraîmita tamin’i Gidehôna:'
  - type: text
    content: –Nahoana no nanao izao fihetsika izao taminay ianao? Nahoana no tsy niantso anay ianao fony nandeha niady tamin’ny Midianita?
  - type: text
    content: 'Dia nanome tsiny azy mafy ireo. '
  '10':
  - type: text
    content: I Zebaha sy i Tsalmonà tamin’io dia tao Karkôra
  - type: note
    content: 'Karkôra: toerana tsy fantatra izay misy azy.'
  - type: text
    content: ' niaraka tamin’ny andian-tafiny 15 eo ho eo. Izay no sisa tamin’ny tafik’ireo mpifindrafindra lasy avy any atsinanana, satria nahafatesana andian-tafika 120 nisy vatan-dehilahy kinga famely sabatra avokoa. '
  '11':
  - type: text
    content: Ny lalan’ny mpifindrafindra lasy, teo atsinanan’ny faritra misy ny tarika Nôba sy ny tanàna Jôgbôhà
  - type: note
    content: 'Nôba: anaran’ny tarika iray ao amin’ny antsasa-pokon’i Manase eny atsinanan’i Jôrdàna (jereo Nom 32.42). I Jôgbôhà dia tanàna gadita eo amin’ny 13 km avaratra andrefan’i Hamàna (jereo Nom 32.35).'
  - type: text
    content: ', no narahin’i Gidehôna ka namelezany ny tobin’ny fahavalony izay tsy nanampo akory. '
  '12':
  - type: text
    content: Nitsoaka nandositra i Zebaha sy i Tsalmonà, mpanjaka midianita roa lahy, nefa nenjehin’i Gidehôna ka azony sambo-belona; dia izany no nampihorohoroany ny tafika midianita manontolo.
  '13':
  - type: text
    content: Ary rehefa niverina avy niady i Gidehôna ka mby teo amin’ny fiakaran’i Heresa
  - type: note
    content: 'Heresa: toerana tsy fantatra izay misy azy.'
  - type: text
    content: ', '
  '14':
  - type: text
    content: 'dia nisambotra tovolahy iray avy ao Sokôta ary nanontany azy. Dia nomen’ilehio azy an-tsoratra ny anaran’ireo lehibe sy '
  - type: text
    content: loholona
  - type: text
    content: ' tao Sokôta ka nisy 77 no isany. '
  '15':
  - type: text
    content: 'Avy eo dia nankany amin’ny mponina tao Sokôta i Gidehôna ka nanao taminy hoe:'
  - type: text
    content: '–Indreto i Zebaha sy i Tsalmonà izay nanesoanareo ahy hoe: «Ahoana moa izahay no hanome hanina ny tafikao efa reraka? Efa eo ambany fahefànao sahady angaha i Zebaha sy i Tsalmonà?»'
  '16':
  - type: text
    content: 'Dia nalain’i Gidehôna ny tsilo sy ny songosongo avy tany an-taniefitra ka nofaiziny tamin’ireny ireo loholona tao Sokôta. '
  '17':
  - type: text
    content: Noravany koa ny tilikambon’i Peniela ary novonoiny ny mponina tao.
  '18':
  - type: text
    content: 'Avy eo dia nanontany an’i Zebaha sy i Tsalmonà i Gidehôna hoe:'
  - type: text
    content: –Tahatahaka ny ahoana moa ireo lehilahy izay novonoinareo tao Tabôra
  - type: note
    content: 'Tabôra: jereo Jos 19.22 sy nta. I Gidehôna dia mampahatsiahy ady iray tsy fantatra sady tsy mitovy amin’ilay voatantaran’ny toko faha-7.'
  - type: text
    content: '?'
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Mitovy aminao izy. Miendrika zanak’andriamanjaka avokoa izy rehetra.
  '19':
  - type: text
    content: 'Fa hoy i Gidehôna taminy:'
  - type: text
    content: –Rahalahiko, zanakalahin’ny reniko mihitsy ireny. Velona ny TOMPO ka mianiana aho fa raha tsy novonoinareo ho faty ireny, dia tsy hovonoiko ho faty koa ianareo!
  '2':
  - type: text
    content: 'Fa namaly azy i Gidehôna ka nanao hoe:'
  - type: text
    content: '–Inona moa izay nataoko raha mitaha amin’ny zava-bitanareo? Moa tsy ny firotsahanareo Efraîmita na dia teo amin’ny sehatra kely aza ve no tsara lavitra noho ny nataon’ny tarika abihezerita fiaviako? '
  '20':
  - type: text
    content: 'Ary nandidy an’i Jetera zanany lahimatoa i Gidehôna hoe:'
  - type: text
    content: –Mitsangàna, vonoy ho faty ireo
  - type: note
    content: Ny havana akaikin’ny lehilahy matin’olon-kafa dia manana adidy hamono hahafaty an’ilay mpamono, jereo ohatra Nom 35.19-29; 2 Sam 3.27,30.
  - type: text
    content: '!'
  - type: text
    content: 'Fa tsy sahy nanatsoaka ny sabany ilay zatovolahy, satria mbola tanora loatra izy ka natahotra. '
  '21':
  - type: text
    content: 'Dia hoy i Zebaha sy i Tsalmonà tamin’i Gidehôna:'
  - type: text
    content: –Aoka ny tenanao mihitsy no hamono hahafaty anay, satria adidin’ny lehilahy mahery fo ny manao izany!
  - type: text
    content: Dia nitsangana i Gidehôna ka namono hahafaty ireo mpanjaka roa lahy; ary nalainy ny firavaka nihantona teny am-bozon’ireo ramevany.
  - type: heading
    content: Ny fiafaran’ny fiainan’i Gidehôna
  '22':
  - type: text
    content: 'Taorian’izany dia hoy ny Israelita tamin’i Gidehôna:'
  - type: text
    content: –Aoka ianao no hanjaka aminay ary ny zanakalahinao sy ny zafinao no handimby anao, satria ianao no nanafaka anay tamin’ny Midianita.
  '23':
  - type: text
    content: 'Fa novalian’i Gidehôna hoe:'
  - type: text
    content: –Tsia, tsy ho mpanjakanareo na ny tenako na ny zanakalahiko, fa ny TOMPO no ho mpanjakanareo.
  '24':
  - type: text
    content: 'Saingy hoy indray i Gidehôna taminy:'
  - type: text
    content: '–Izaho anefa te hangataka zavatra aminareo: aoka ianareo samy hanome ahy haba iray, nalaina tamin’ny babonareo avy!'
  - type: text
    content: Ny Midianita manko dia nitondra haba volamena toy ny lehilahy rehetra monina any an-taniefitra.
  '25':
  - type: text
    content: 'Ka hoy ny navalin’ny Israelita an’i Gidehôna:'
  - type: text
    content: –Eny, fa homenay anao tokoa izany.
  - type: text
    content: 'Dia namelatra lamba iray tamin’ny tany ireo ka samy nanipy haba volamena iray teo, dia haba nalain’ny isan’olona tamin’ny babony avy. '
  '26':
  - type: text
    content: 'Ny lanjan’ny volamena nangatahin’i Gidehôna dia nahatratra roapolo kilao. Nahazo izay firavaka sy kavina ary fitafiana jaky nentin’ireo mpanjaka midianita koa izy, ankoatra ireo rojo nandravaka ny vozon’ny ramevany. '
  '27':
  - type: text
    content: Ary ny volamena dia nanamboaran’i Gidehôna efôda izay napetrany tao Hofrà tanànany. Ary notompoin’ny Israelita rehetra toy ny sampy izany efôda izany, ka tonga fandrika ho an’i Gidehôna sy ny ankohonany.
  '28':
  - type: text
    content: Resin’ny Israelita hatreo ny Midianita ka tsy nahatraka tamin’ny fahareseny intsony; koa nandry fahalemana ny tany nandritra ny efapolo taona nahaveloman’i Gidehôna.
  '29':
  - type: text
    content: Ary i Jerobahala
  - type: note
    content: 'Jerobahala: jereo 6.32.'
  - type: text
    content: ' na hoe Gidehôna, zanakalahin’i Jôasy, dia niverina nonina tany an-tranony. '
  '3':
  - type: text
    content: Fa teo an-tananareo no nanoloran’Andriamanitra an’i Hôreba sy i Zeeba lehiben’ny Midianita. Koa inona izay vitako raha oharina amin’ny nataonareo?
  - type: text
    content: Dia nitony ny fahatezeran’ireo Efraîmita, rehefa nandre izany tenin’i Gidehôna izany izy.
  - type: heading
    content: I Gidehôna tany ampita atsinanan’i Jôrdàna
  '30':
  - type: text
    content: 'Nanan-janakalahy fitopolo izy satria maro vady. '
  '31':
  - type: text
    content: 'Nisy vadikeliny tao Sekema, izay niterahany zanakalahy nantsoina hoe Abimelèka. '
  '32':
  - type: text
    content: Ary maty i Gidehôna rehefa tratra antitra tsara ka nalevina tao Hofrà, tanànan’ny tarika abihezerita, tao amin’ny fasan’i Jôasy rainy.
  '33':
  - type: text
    content: 'Rehefa maty i Gidehôna, dia nanompo an’i '
  - type: text
    content: Bahala
  - type: text
    content: ' indray ny Israelita ary nanao an’i Bahala-Berita'
  - type: note
    content: I Bahala-Berita dia toa andriamanitra sampy nivavahana tao Sekema (jereo 9.4)
  - type: text
    content: ' ho andriamaniny. '
  '34':
  - type: text
    content: 'Hadinony ny TOMPO Andriamaniny Izay nanafaka azy tamin’ny fahavalony rehetra nanodidina azy. '
  '35':
  - type: text
    content: Tsy nanehoany fitiavana koa ny ankohonan’i Jerobahala na Gidehôna, araka ny soa rehetra vitan’i Gidehôna tamin’i Israely.
  '4':
  - type: text
    content: 'Ary tonga teo Jôrdàna i Gidehôna sy ireo telonjato lahy niaraka taminy ka niampita. Efa reraka izy ireo nefa mbola nanenjika ny fahavalony ihany. '
  '5':
  - type: text
    content: 'Nony tonga tao an-tanàna Sokôta izy, dia hoy i Gidehôna tamin’ny mponina tao:'
  - type: text
    content: –Mba omeo mofo ireto olona miaraka amiko ireto fa reraka; eo am-panenjehana an’i Zebaha sy i Tsalmonà mpanjaka midianita aho izao
  - type: note
    content: 'Sokôta: jereo Gen 33.17 sy nta. I Zebaha (ilay hajedaka) sy i Tsalmonà (ilay aloka mirenireny) dia toa anaram-bositra fanesoan’ilay mpitantara an’ireo mpanjaka midianita roa.'
  - type: text
    content: .
  '6':
  - type: text
    content: 'Fa novalian’ireo lehibe tao an-tanàna izy ka nataony hoe:'
  - type: text
    content: –Ahoana moa izahay no hanome hanina ny tafikao? Efa eo ambany fahefànao sahady angaha i Zebaha sy i Tsalmonà?
  '7':
  - type: text
    content: 'Dia hoy i Gedehôna hoe:'
  - type: text
    content: –Ho hitanareo izany fa rehefa hatolotry ny TOMPO eo an-tanako i Zebaha sy i Tsalmonà, dia horovitiko amin’ny tsilo sy songosongo avy any an-taniefitra ny hoditrareo.
  '8':
  - type: text
    content: Avy teo i Gidehôna nankany Peniela
  - type: note
    content: 'Peniela: tanàna eny amin’ny faritra atsinanan’i Jôrdàna, sady eo akaikin’i Sokôta (jereo Gen 32.31-32).'
  - type: text
    content: ', ary nilaza fangatahana tahaka izany koa tamin’ny mponina tao. Kanefa ny mponina tao Peniela dia namaly tahaka izay nataon’ny olona tao Sokôta ihany. '
  '9':
  - type: text
    content: 'Koa niteny tamin’ny mponina tao Peniela i Gidehôna hoe:'
  - type: text
    content: –Rehefa hiverina avy mandresy soa aman-tsara aho, dia horavako ny tilikambon’ny tanànanareo.
