document_id: JDG.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy faly ny Efraîmita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy ny vatan-dehilahy efraîmita tamin’i Gidehôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no nanao izao fihetsika izao taminay ianao? Nahoana no tsy niantso anay ianao fony nandeha niady tamin’ny Midianita?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nanome tsiny azy mafy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa namaly azy i Gidehôna ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona moa izay nataoko raha mitaha amin’ny zava-bitanareo? Moa tsy ny firotsahanareo Efraîmita na dia teo amin’ny sehatra kely aza ve no tsara lavitra noho ny nataon’ny tarika abihezerita fiaviako? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa teo an-tananareo no nanoloran’Andriamanitra an’i Hôreba sy i Zeeba lehiben’ny Midianita. Koa inona izay vitako raha oharina amin’ny nataonareo?
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nitony ny fahatezeran’ireo Efraîmita, rehefa nandre izany tenin’i Gidehôna izany izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Gidehôna tany ampita atsinanan’i Jôrdàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary tonga teo Jôrdàna i Gidehôna sy ireo telonjato lahy niaraka taminy ka niampita. Efa reraka izy ireo nefa mbola nanenjika ny fahavalony ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony tonga tao an-tanàna Sokôta izy, dia hoy i Gidehôna tamin’ny mponina tao:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba omeo mofo ireto olona miaraka amiko ireto fa reraka; eo am-panenjehana an’i Zebaha sy i Tsalmonà mpanjaka midianita aho izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sokôta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo Gen 33.17 sy nta. I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zebaha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ilay hajedaka) sy i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tsalmonà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ilay aloka mirenireny) dia toa anaram-bositra fanesoan’ilay mpitantara an’ireo mpanjaka midianita roa.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa novalian’ireo lehibe tao an-tanàna izy ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana moa izahay no hanome hanina ny tafikao? Efa eo ambany fahefànao sahady angaha i Zebaha sy i Tsalmonà?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy i Gedehôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho hitanareo izany fa rehefa hatolotry ny TOMPO eo an-tanako i Zebaha sy i Tsalmonà, dia horovitiko amin’ny tsilo sy songosongo avy any an-taniefitra ny hoditrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avy teo i Gidehôna nankany Peniela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Peniela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eny amin’ny faritra atsinanan’i Jôrdàna, sady eo akaikin’i Sokôta (jereo Gen 32.31-32).
    marker-yv: yv-n
  - type: text
    text: ', ary nilaza fangatahana tahaka izany koa tamin’ny mponina tao. Kanefa ny mponina tao Peniela dia namaly tahaka izay nataon’ny olona tao Sokôta ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa niteny tamin’ny mponina tao Peniela i Gidehôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rehefa hiverina avy mandresy soa aman-tsara aho, dia horavako ny tilikambon’ny tanànanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I Zebaha sy i Tsalmonà tamin’io dia tao Karkôra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Karkôra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tsy fantatra izay misy azy.
    marker-yv: yv-n
  - type: text
    text: ' niaraka tamin’ny andian-tafiny 15 eo ho eo. Izay no sisa tamin’ny tafik’ireo mpifindrafindra lasy avy any atsinanana, satria nahafatesana andian-tafika 120 nisy vatan-dehilahy kinga famely sabatra avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny lalan’ny mpifindrafindra lasy, teo atsinanan’ny faritra misy ny tarika Nôba sy ny tanàna Jôgbôhà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Nôba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'anaran’ny tarika iray ao amin’ny antsasa-pokon’i Manase eny atsinanan’i Jôrdàna (jereo Nom 32.42). I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jôgbôhà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tanàna gadita eo amin’ny 13 km avaratra andrefan’i Hamàna (jereo Nom 32.35).'
    marker-yv: yv-n
  - type: text
    text: ', no narahin’i Gidehôna ka namelezany ny tobin’ny fahavalony izay tsy nanampo akory. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nitsoaka nandositra i Zebaha sy i Tsalmonà, mpanjaka midianita roa lahy, nefa nenjehin’i Gidehôna ka azony sambo-belona; dia izany no nampihorohoroany ny tafika midianita manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary rehefa niverina avy niady i Gidehôna ka mby teo amin’ny fiakaran’i Heresa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heresa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tsy fantatra izay misy azy.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia nisambotra tovolahy iray avy ao Sokôta ary nanontany azy. Dia nomen’ilehio azy an-tsoratra ny anaran’ireo lehibe sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' tao Sokôta ka nisy 77 no isany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Avy eo dia nankany amin’ny mponina tao Sokôta i Gidehôna ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indreto i Zebaha sy i Tsalmonà izay nanesoanareo ahy hoe: «Ahoana moa izahay no hanome hanina ny tafikao efa reraka? Efa eo ambany fahefànao sahady angaha i Zebaha sy i Tsalmonà?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nalain’i Gidehôna ny tsilo sy ny songosongo avy tany an-taniefitra ka nofaiziny tamin’ireny ireo loholona tao Sokôta. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Noravany koa ny tilikambon’i Peniela ary novonoiny ny mponina tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avy eo dia nanontany an’i Zebaha sy i Tsalmonà i Gidehôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tahatahaka ny ahoana moa ireo lehilahy izay novonoinareo tao Tabôra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tabôra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jos 19.22 sy nta. I Gidehôna dia mampahatsiahy ady iray tsy fantatra sady tsy mitovy amin’ilay voatantaran’ny toko faha-7.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitovy aminao izy. Miendrika zanak’andriamanjaka avokoa izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy i Gidehôna taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rahalahiko, zanakalahin’ny reniko mihitsy ireny. Velona ny TOMPO ka mianiana aho fa raha tsy novonoinareo ho faty ireny, dia tsy hovonoiko ho faty koa ianareo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nandidy an’i Jetera zanany lahimatoa i Gidehôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitsangàna, vonoy ho faty ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny havana akaikin’ny lehilahy matin’olon-kafa dia manana adidy hamono hahafaty an’ilay mpamono, jereo ohatra Nom 35.19-29; 2 Sam 3.27,30.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa tsy sahy nanatsoaka ny sabany ilay zatovolahy, satria mbola tanora loatra izy ka natahotra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy i Zebaha sy i Tsalmonà tamin’i Gidehôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ny tenanao mihitsy no hamono hahafaty anay, satria adidin’ny lehilahy mahery fo ny manao izany!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nitsangana i Gidehôna ka namono hahafaty ireo mpanjaka roa lahy; ary nalainy ny firavaka nihantona teny am-bozon’ireo ramevany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiafaran’ny fiainan’i Gidehôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Taorian’izany dia hoy ny Israelita tamin’i Gidehôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ianao no hanjaka aminay ary ny zanakalahinao sy ny zafinao no handimby anao, satria ianao no nanafaka anay tamin’ny Midianita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa novalian’i Gidehôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, tsy ho mpanjakanareo na ny tenako na ny zanakalahiko, fa ny TOMPO no ho mpanjakanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Saingy hoy indray i Gidehôna taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho anefa te hangataka zavatra aminareo: aoka ianareo samy hanome ahy haba iray, nalaina tamin’ny babonareo avy!'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ny Midianita manko dia nitondra haba volamena toy ny lehilahy rehetra monina any an-taniefitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ka hoy ny navalin’ny Israelita an’i Gidehôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, fa homenay anao tokoa izany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia namelatra lamba iray tamin’ny tany ireo ka samy nanipy haba volamena iray teo, dia haba nalain’ny isan’olona tamin’ny babony avy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny lanjan’ny volamena nangatahin’i Gidehôna dia nahatratra roapolo kilao. Nahazo izay firavaka sy kavina ary fitafiana jaky nentin’ireo mpanjaka midianita koa izy, ankoatra ireo rojo nandravaka ny vozon’ny ramevany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary ny volamena dia nanamboaran’i Gidehôna efôda izay napetrany tao Hofrà tanànany. Ary notompoin’ny Israelita rehetra toy ny sampy izany efôda izany, ka tonga fandrika ho an’i Gidehôna sy ny ankohonany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Resin’ny Israelita hatreo ny Midianita ka tsy nahatraka tamin’ny fahareseny intsony; koa nandry fahalemana ny tany nandritra ny efapolo taona nahaveloman’i Gidehôna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary i Jerobahala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jerobahala: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 6.32.
    marker-yv: yv-n
  - type: text
    text: ' na hoe Gidehôna, zanakalahin’i Jôasy, dia niverina nonina tany an-tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nanan-janakalahy fitopolo izy satria maro vady. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nisy vadikeliny tao Sekema, izay niterahany zanakalahy nantsoina hoe Abimelèka. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary maty i Gidehôna rehefa tratra antitra tsara ka nalevina tao Hofrà, tanànan’ny tarika abihezerita, tao amin’ny fasan’i Jôasy rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa maty i Gidehôna, dia nanompo an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' indray ny Israelita ary nanao an’i Bahala-Berita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Bahala-Berita '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia toa andriamanitra sampy nivavahana tao Sekema (jereo 9.4)
    marker-yv: yv-n
  - type: text
    text: ' ho andriamaniny. '
  - type: usfm
    marker: v
    metadata:
