document_id: 1SA.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida tany Kehilà sy tany Hôresa
  - type: text
    content: Indray andro dia nisy nampandre an’i Davida fa notafihin’ny Filistinina ny tanànan’i Kehilà
  - type: note
    content: 'Kehilà: tanàna eo amin’ny 4 na 5 km ao atsimon’i Hadolama (jereo 22.1 sy nta).'
  - type: text
    content: ' ka norobainy izay teo am-pamoloana sy tany an-tsompitra. '
  '10':
  - type: text
    content: 'Dia hoy i Davida taminy:'
  - type: text
    content: '–Ry TOMPO Andriamanitr’i Israely ô, ren’ny mpanomponao fa miomana hankatỳ Kehilà i Saoly handrava ny tanàna noho ny amiko. '
  '11':
  - type: text
    content: Moa hanolotra ahy eo an-tanany ve ny manampahefana eto Kehilà? Ary ho avy amiko araka ny reko tokoa ve i Saoly? Mba valio re, ry TOMPO Andriamanitr’i Israely ô!
  - type: text
    content: 'Ka hoy ny navalin’ny TOMPO azy:'
  - type: text
    content: –Eny, ho avy tokoa izy.
  '12':
  - type: text
    content: 'Dia nanontany indray i Davida hoe:'
  - type: text
    content: –Hanolotra ahy sy ny oloko eo an-tanan’i Saoly ve ireo manampahefana eto Kehilà?
  - type: text
    content: 'Ary novalian’ny TOMPO hoe:'
  - type: text
    content: –Eny, hanolotra anareo izy.
  '13':
  - type: text
    content: 'Dia niainga nandao an’i Kehilà i Davida sy ny olony miisa ho eninjato lahy, ary nandeha tamin’ny lalana anjoanjo. Rehefa ren’i Saoly fa nandositra niala tao Kehilà i Davida, dia najanony ny dia. '
  '14':
  - type: text
    content: Nijanona tany an-taniefitra tao amin’ny toerana be harambato i Davida, ary nonina tany amin’ny havoan’ny taniefitr’i Zifa
  - type: note
    content: 'Zifa: tanàna tokony ho 35 km ao atsimon’i Jerosalema.'
  - type: text
    content: '. Nitady azy isan’andro i Saoly, kanefa tsy navelan’Andriamanitra hatolotra eo an-tanany i Davida. '
  '15':
  - type: text
    content: Hitan’i Davida fa niainga hiantafika mba hifofo ny ainy i Saoly, ka dia nijanona tao Hôresa
  - type: note
    content: 'Hôresa: eo amin’ny 3 km ao atsimon’i Zifa.'
  - type: text
    content: ' tany an-taniefitr’i Zifa izy.'
  '16':
  - type: text
    content: 'Ary i Jônatàna zanakalahin’i Saoly nankany amin’i Davida any Hôresa ka nankahery azy tamin’ny anaran’Andriamanitra. '
  '17':
  - type: text
    content: 'Hoy izy tamin’i Davida:'
  - type: text
    content: –Aza matahotra fa tsy hahazo anao akory ny tanan’i Saoly raiko. Ianao no ho mpanjakan’i Israely fa izaho kosa ho lefitrao; ary na i Saoly raiko aza dia mahalala tsara izany!
  '18':
  - type: text
    content: Ary nanao dinam-pisakaizana
  - type: note
    content: Jereo 18.3.
  - type: text
    content: ' teo anatrehan’ny TOMPO izy roa lahy. Dia nijanona tany Hôresa ihany i Davida fa i Jônatàna kosa niverina nody.'
  - type: heading
    content: Nanenjika an’i Davida i Saoly
  '19':
  - type: text
    content: 'Nankany amin’i Saoly tany Gibehà ny mponin’i Zifa ka nanao taminy hoe:'
  - type: text
    content: –Moa tsy fantatrao fa i Davida anie ka miafina any aminay ao amin’ny toerana be harambato any Hôresa, any amin’ny havoanan’i Hakilà
  - type: note
    content: 'Zifa, Hôresa: jereo and 14-15 sy nta. –Gibehà: jereo 10.5 sy nta. –Hakilà: toa ao atsinanan’i Zifa, jereo Sal 54.2.'
  - type: text
    content: ' eo atsimon’ny faritra be lobolobo? '
  '2':
  - type: text
    content: 'Ary i Davida nanontany tamin’ny TOMPO hoe:'
  - type: text
    content: –Handeha hiady amin’ireo Filistinina ireo ve aho?
  - type: text
    content: Ka hoy ny navalin’ny TOMPO azy;
  - type: text
    content: –Mandehana miady aminy ka vonjeo Kehilà.
  '20':
  - type: text
    content: Koa raha te hanampoka azy ianao, ry mpanjaka, dia midina any, fa anjaranay ny manolotra azy eo an-tananao.
  '21':
  - type: text
    content: 'Dia hoy i Saoly hoe:'
  - type: text
    content: –
  - type: text
    content: Hitahy
  - type: text
    content: ' anareo anie ny TOMPO noho izao fiahianareo ahy izao! '
  '22':
  - type: text
    content: 'Koa mandehana indray ianareo, dia alaivo antoka sy fantaro tsara izay toerana marina misy azy sy izay nahita azy tany, fa tena fetsy lahy hono izy izany. '
  '23':
  - type: text
    content: Ataovy fantatra avokoa izay toerana rehetra mety iafenany, dia miverena atỳ amiko rehefa tena azonareo antoka, fa hiaraka aminareo aho. Raha mbola eto amin’ny faritany koa iny, dia hosavako avokoa ny isam-pianakaviamben’i Joda mba hahitako azy.
  '24':
  - type: text
    content: Dia lasa nankany Zifa nialoha an’i Saoly izy ireo, fa i Davida sy ny olony kosa dia tao amin’ny taniefitr’i Mahôna
  - type: note
    content: Ny taniefitr’i Mahôna dia nitandavana tao atsimon’ny taniefitr’i Zifa.
  - type: text
    content: ', amin’ny lemaka eo atsimon’ny faritra be lobolobo. '
  '25':
  - type: text
    content: 'Niainga i Saoly sy ny miaramilany hitady an’i Davida. Raha nandre izany i Davida, dia nitsontsorika nidina ny harambato ka nijanona tao amin’ny taniefitr’i Mahôna. Rehefa fantatr’i Saoly izany dia nanenjika an’i Davida hatrany koa izy. '
  '26':
  - type: text
    content: 'Tamin’ny lafiny ilan’ny tendrombohitra no nandehanan’i Saoly, fa i Davida sy ny olony kosa nandroso tamin’ny lafiny iray hafa. Nohafainganin’i Davida ny diany mba tsy hahazoan’i Saoly azy, satria ny mpanjaka sy ny olony efa manodidina vonon-kisambotra an’i Davida sy ny namany. '
  '27':
  - type: text
    content: 'Fa nisy iraka iray tonga nilaza tamin’i Saoly hoe:'
  - type: text
    content: '–Faingàna ianao fa manafika ny tanin’i Israely ny Filistinina. '
  '28':
  - type: text
    content: 'Dia natsahatr’i Saoly ny fanenjehana an’i Davida, fa lasa izy niady tamin’ny Filistinina. Izany no niantsoana io toerana io hoe: «Vatolampin’ny Fisarahana».'
  '3':
  - type: text
    content: 'Dia hoy ny olon’i Davida taminy:'
  - type: text
    content: –Indreto atỳ Joda aza isika matahotra, koa mainka rehefa mankany Kehilà hiady amin’ny tafika filistinina?
  '4':
  - type: text
    content: 'Ary i Davida nanontany indray ny Tompo, ka novaliany hoe:'
  - type: text
    content: –Mandehana mankany Kehilà, fa hatolotro ho eo an-tananao ny Filistinina.
  '5':
  - type: text
    content: Lasa nankany Kehilà i Davida sy ny olony ary notafihiny ny Filistinina. Nentiny an-kery ny biby fiompiny, ka faharesena tsy nisy toy izany no nahazo azy ireo. Izany no nanafahan’i Davida ny mponin’i Kehilà.
  '6':
  - type: text
    content: Raha nialokaloka eo amin’i Davida tany Kehilà i Abiatara zanakalahin’i Ahimelèka, dia nitondra ny efôda niaraka taminy.
  '7':
  - type: text
    content: 'Vao fantatr’i Saoly fa tafiditra tao Kehilà i Davida, dia hoy izy hoe:'
  - type: text
    content: –Efa natolotr’Andriamanitra eto an-tanako izy, fa namandri-tena niditra an-tanàna mihidy vavahady.
  '8':
  - type: text
    content: 'Nohetsehin’i Saoly ny tafika manontolo hidina any Kehilà mba hanao fahirano an’i Davida sy ny olony. '
  '9':
  - type: text
    content: 'Fantatr’i Davida fa nisaina hanao ratsy azy i Saoly; koa nasainy nentin’i Abiatara mpisorona ny efôda hanontaniana ny Tompo. '
