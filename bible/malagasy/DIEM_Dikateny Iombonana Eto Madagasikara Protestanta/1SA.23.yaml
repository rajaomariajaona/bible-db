document_id: 1SA.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida tany Kehilà sy tany Hôresa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indray andro dia nisy nampandre an’i Davida fa notafihin’ny Filistinina ny tanànan’i Kehilà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kehilà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eo amin’ny 4 na 5 km ao atsimon’i Hadolama (jereo 22.1 sy nta).
    marker-yv: yv-n
  - type: text
    text: ' ka norobainy izay teo am-pamoloana sy tany an-tsompitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary i Davida nanontany tamin’ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handeha hiady amin’ireo Filistinina ireo ve aho?
- type: usfm
  marker: p
  children:
  - type: text
    text: Ka hoy ny navalin’ny TOMPO azy;
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana miady aminy ka vonjeo Kehilà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy ny olon’i Davida taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indreto atỳ Joda aza isika matahotra, koa mainka rehefa mankany Kehilà hiady amin’ny tafika filistinina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary i Davida nanontany indray ny Tompo, ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana mankany Kehilà, fa hatolotro ho eo an-tananao ny Filistinina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lasa nankany Kehilà i Davida sy ny olony ary notafihiny ny Filistinina. Nentiny an-kery ny biby fiompiny, ka faharesena tsy nisy toy izany no nahazo azy ireo. Izany no nanafahan’i Davida ny mponin’i Kehilà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha nialokaloka eo amin’i Davida tany Kehilà i Abiatara zanakalahin’i Ahimelèka, dia nitondra ny efôda niaraka taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vao fantatr’i Saoly fa tafiditra tao Kehilà i Davida, dia hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa natolotr’Andriamanitra eto an-tanako izy, fa namandri-tena niditra an-tanàna mihidy vavahady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nohetsehin’i Saoly ny tafika manontolo hidina any Kehilà mba hanao fahirano an’i Davida sy ny olony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fantatr’i Davida fa nisaina hanao ratsy azy i Saoly; koa nasainy nentin’i Abiatara mpisorona ny efôda hanontaniana ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy i Davida taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry TOMPO Andriamanitr’i Israely ô, ren’ny mpanomponao fa miomana hankatỳ Kehilà i Saoly handrava ny tanàna noho ny amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moa hanolotra ahy eo an-tanany ve ny manampahefana eto Kehilà? Ary ho avy amiko araka ny reko tokoa ve i Saoly? Mba valio re, ry TOMPO Andriamanitr’i Israely ô!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny navalin’ny TOMPO azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, ho avy tokoa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nanontany indray i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hanolotra ahy sy ny oloko eo an-tanan’i Saoly ve ireo manampahefana eto Kehilà?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary novalian’ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, hanolotra anareo izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niainga nandao an’i Kehilà i Davida sy ny olony miisa ho eninjato lahy, ary nandeha tamin’ny lalana anjoanjo. Rehefa ren’i Saoly fa nandositra niala tao Kehilà i Davida, dia najanony ny dia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nijanona tany an-taniefitra tao amin’ny toerana be harambato i Davida, ary nonina tany amin’ny havoan’ny taniefitr’i Zifa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zifa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tokony ho 35 km ao atsimon’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: '. Nitady azy isan’andro i Saoly, kanefa tsy navelan’Andriamanitra hatolotra eo an-tanany i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hitan’i Davida fa niainga hiantafika mba hifofo ny ainy i Saoly, ka dia nijanona tao Hôresa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hôresa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eo amin’ny 3 km ao atsimon’i Zifa.
    marker-yv: yv-n
  - type: text
    text: ' tany an-taniefitr’i Zifa izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary i Jônatàna zanakalahin’i Saoly nankany amin’i Davida any Hôresa ka nankahery azy tamin’ny anaran’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy izy tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza matahotra fa tsy hahazo anao akory ny tanan’i Saoly raiko. Ianao no ho mpanjakan’i Israely fa izaho kosa ho lefitrao; ary na i Saoly raiko aza dia mahalala tsara izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary nanao dinam-pisakaizana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 18.3.
    marker-yv: yv-n
  - type: text
    text: ' teo anatrehan’ny TOMPO izy roa lahy. Dia nijanona tany Hôresa ihany i Davida fa i Jônatàna kosa niverina nody.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanenjika an’i Davida i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nankany amin’i Saoly tany Gibehà ny mponin’i Zifa ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa tsy fantatrao fa i Davida anie ka miafina any aminay ao amin’ny toerana be harambato any Hôresa, any amin’ny havoanan’i Hakilà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Zifa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hôresa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo and 14-15 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gibehà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 10.5 sy nta. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hakilà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toa ao atsinanan’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zifa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Sal 54.2.'
    marker-yv: yv-n
  - type: text
    text: ' eo atsimon’ny faritra be lobolobo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa raha te hanampoka azy ianao, ry mpanjaka, dia midina any, fa anjaranay ny manolotra azy eo an-tananao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hitahy
  - type: text
    text: ' anareo anie ny TOMPO noho izao fiahianareo ahy izao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa mandehana indray ianareo, dia alaivo antoka sy fantaro tsara izay toerana marina misy azy sy izay nahita azy tany, fa tena fetsy lahy hono izy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ataovy fantatra avokoa izay toerana rehetra mety iafenany, dia miverena atỳ amiko rehefa tena azonareo antoka, fa hiaraka aminareo aho. Raha mbola eto amin’ny faritany koa iny, dia hosavako avokoa ny isam-pianakaviamben’i Joda mba hahitako azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia lasa nankany Zifa nialoha an’i Saoly izy ireo, fa i Davida sy ny olony kosa dia tao amin’ny taniefitr’i Mahôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: taniefitr’i Mahôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia nitandavana tao atsimon’ny taniefitr’i Zifa.'
    marker-yv: yv-n
  - type: text
    text: ', amin’ny lemaka eo atsimon’ny faritra be lobolobo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Niainga i Saoly sy ny miaramilany hitady an’i Davida. Raha nandre izany i Davida, dia nitsontsorika nidina ny harambato ka nijanona tao amin’ny taniefitr’i Mahôna. Rehefa fantatr’i Saoly izany dia nanenjika an’i Davida hatrany koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tamin’ny lafiny ilan’ny tendrombohitra no nandehanan’i Saoly, fa i Davida sy ny olony kosa nandroso tamin’ny lafiny iray hafa. Nohafainganin’i Davida ny diany mba tsy hahazoan’i Saoly azy, satria ny mpanjaka sy ny olony efa manodidina vonon-kisambotra an’i Davida sy ny namany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa nisy iraka iray tonga nilaza tamin’i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Faingàna ianao fa manafika ny tanin’i Israely ny Filistinina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia natsahatr’i Saoly ny fanenjehana an’i Davida, fa lasa izy niady tamin’ny Filistinina. Izany no niantsoana io toerana io hoe: «Vatolampin’ny Fisarahana».'
