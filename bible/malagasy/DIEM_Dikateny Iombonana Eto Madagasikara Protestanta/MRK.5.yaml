document_id: MRK.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay lehilahy nampahorîn’ny fanahy maloto tany Gergesà
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 8.28-34; Lk 8.26-39)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nandeha sambokely i Jesoa sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' ka tonga teny ampitan’ny farihin’i Galilea, teo amin’ny faritanin’i Gergesà'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny tondroin’i Marka eto dia toa ny faritany tamin’iny atsinanan’ny farihin’i Genesareta na farihin’i Galilea iny. Ampit Mt 8.28 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha vao niala tao an-tsambokely i Jesoa, dia indro nisy lehilahy nipoitra avy eny amin’ny fasana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fasana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fahizany dia mazàna namboarina tanaty zohy vita nanahary na nolavahana tamin’ny vatolampy.'
    marker-yv: yv-n
  - type: text
    text: ', tonga nitsena Azy. Azon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanahy maloto
  - type: text
    text: ' ralehilahy, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka teny amin’ny fasana no niorim-ponenana ary tsy nisy olona nahafatotra azy intsony na dia tamin’ny rojo vy aza. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Matetika tokoa manko dia nasiana gadra ny tongony sady nofatorana rojo vy ny tanany; fa ny rojo vy notapahiny, ary ny gadra nopotehiny, ka dia tsy nisy olona nahafolaka an-dralehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Na andro na alina dia teny amin’ny fasana sy tany an-tendrombohitra tany foana izy, niantsoantso sy nandratra tena tamin’ny vato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony nahatazana an’i Jesoa ralehilahy, dia nihazakazaka nanatona Azy ka niankohoka teo anatrehany, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary niantsoantso ka niteny tamin’ny feo mahery hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fa hataonao inona aho, ry Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: ' avo indrindra? Miangavy Anao amin’ny anaran’Andriamanitra aho, aza dia ampijalîna re!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '(Satria i Jesoa efa nandidy azy hoe: «Mialà amin’io lehilahy io, ry fanahy maloto!»)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nanontany an-dralehilahy i Jesoa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no anaranao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka namaly izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tafika no anarako, satria maro izahay!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nitalaho mafy tamin’i Jesoa ralehilahy mba tsy horoahiny lavitra an’io tany io ireo fanahy maloto ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary nisy kisoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka Lev 11.7 sy Deot 14.8, ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kisoa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia isan’ny biby maloto ary tsy azo hanina ho an’ny Jiosy. Raha marihina manokana toy izao ny momba ny kisoa, dia hilazana fa tsy eo amin’ny tanin’ny Jiosy velively no isehoan’ny tantara.'
    marker-yv: yv-n
  - type: text
    text: ' maro, andiany iray, nandrasana teny amin’ny kisolosolon’ny havoana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa nitalaho tamin’i Jesoa ireo fanahy maloto nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Alefaso amin’iretsy kisoa iretsy izahay, hiditra ao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Neken’i Jesoa ny fangatahany. Koa dia niala tamin-dralehilahy ireo fanahy maloto ka lasa niditra tao amin’ny kisoa. Ary nirifatra ny andian-kisoa, tokony ho kisoa roa arivo, ka nivarimbarina tan-kilahila ho any anaty farihy, dia maty tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nandositra ireo mpiandry kisoa ka lasa nilaza ny vaovao tao an-tanàna sy teny ambanivohitra. Koa avy ny olona hijery ny zava-niseho, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia tonga teo akaikin’i Jesoa ary nandinika ilay lehilahy azon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demony
  - type: text
    text: ' antsoina hoe Tafika teo, efa mipetraka tsara, mitafy lamba sady ary saina; ka nihoron-koditra izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ry zareo nanatri-maso kosa nitantara tamin’ireo vao tonga ny zava-niseho tamin’ilay azon’ny demony sy ny nanjo ny kisoa teo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tamin’izay dia nitalahoan’ny olona i Jesoa hiala teo amin’ny taniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha ilay niondrana an-tsambokely iny i Jesoa, dia niangavy taminy kosa ilay azon’ny demony teo aloha nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avelao aho hiaraka aminao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy nanaiky i Jesoa fa niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha mody any an-tranonao, any amin’ireo havanao; ka lazao azy izay rehetra nataon’ny Tompo taminao noho ny famindrampony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia lasa ralehilahy nanao antso avo, eran’ny faritany atao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Dekapôly
  - type: text
    text: ', izay rehetra nataon’i Jesoa taminy; ka dia gaga avokoa ny olona.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay vehivavy mitsi-dra sy ilay zanakavavin’i Jaîro
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 9.18-28; Lk 8.40-56)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nony tafaverina an-tsambokely teny ampita i Jesoa, dia vahoaka maro no nitangorona nanatona Azy, fa Izy kosa nijanona teo amoron’ny farihy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia avy ny anankiray tamin’ireo lehiben’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ', atao hoe Jaîro; raha vao nahita an’i Jesoa izy, dia niankohoka teo an-tongony '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'sady niangavy azy mafy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eo ambavahoanan’ny fahafatesana ny zanako vavy; koa tongava hametra-tanana aminy, dia ho sitrana izy ka ho velona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia lasa niaraka tamin’i Jaîro i Jesoa. Vahoaka nifanitsa-kitro no nitanjozotra nanaraka Azy, ka nifanety taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nisy vehivavy marary mitsi-dra nandritra ny 12 taona; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'efa niaritra zavatra mafy maro tamin’ny dokotera maro izy io ka lany fananana tamin’izany rehetra izany, nefa tsy nihatsara velively fa vao mainka niharatsiratsy kokoa aza. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nandre ny amin’i Jesoa ravehivavy, dia lasa nifanjevo tamin’ny vahoaka avy tao ivoho, ka nikasika ny lamban’i Jesoa '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fa hoy mantsy izy: «Na dia ny lambany ihany aza no voakasiko, dia ho sitrana aho.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia ritra niaraka tamin’izay ny loharanon’aretiny, ka tsapany tao amin’ny tenany fa sitrana tsy nandeha ra intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Niaraka tamin’izay koa dia tsapan’i Jesoa fa nisy hery niala avy tao aminy; ka niherikerika teo afovoan’ny vahoaka Izy nanontany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no nikasika ny lambako teo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hitanao ireto vahoaka mifanety aminao, ka hoy indray Ianao hoe: Iza no nikasika Ahy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nanopy maso manodidina Azy i Jesoa mba hijery ilay vehivavy izay efa nanao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia raiki-tahotra sady nangovitra ravehivavy satria nahalala tsara ny zavatra nitranga tao aminy; ka tonga niankohoka teo anatrehan’i Jesoa izy ary nilaza taminy ny marina rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny finoanao, anaka, no nahasitrana anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nahasitrana anao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nahavonjy anao.
    marker-yv: yv-n
  - type: text
    text: '! Ndeha àry ka veloma finaritra, mitohiza fahasalamana soa aman-tsara!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Raha mbola niteny i Jesoa, dia nisy iraka tonga avy tany an-tranon’ity lehiben’ny sinagôga ka nanao tamin’i Jaîro hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa maty ny zanakao vavy, ka nahoana ianao no mbola manahirana ny Mpampianatra ihany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Fa tsy nahoan’i Jesoa izany teny izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.36 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsy nahoan’...teny izany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sendra ren’i Jesoa izany teny izany.
    marker-yv: yv-n
  - type: text
    text: ', ka hoy Izy tamin’ilay lehiben’ny sinagôga:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza matahotra, minoa fotsiny ihany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia tsy nisy olona navelan’i Jesoa hiaraka aminy afa-tsy i Petera sy i Jakôba ary i Jôhany rahalahin’i Jakôba. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Nankao an-tranon’ilay lehiben’ny sinagôga izy efa-mianaka, ary hitan’i Jesoa ireto olona misomaritaka sy mitomany ary mikiakiaka. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Koa sady niditra tao an-trano i Jesoa no niteny tamin’ireo olona tao nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ianareo no misomaritaka sy mitomany tahaka izao? Tsy maty akory ny zaza, fa matory!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia nihomehezan’ny olona i Jesoa; nefa noroahiny any alatrano izy rehetra ka ny ray aman-drenin-jaza sy ireo mpianatra niaraka taminy no nentiny nankao amin’ny toerana nisy ny zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia noraisin’i Jesoa ny tanan’ilay zaza ka hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Talità komỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.41 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Talità komỳ: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voambolana aramianina anankiroa. Ny teny aramianina no fitenin’ny Jiosy tamin’ny andron’i Jesoa.
    marker-yv: yv-n
  - type: text
    text: '! (Izany hoe: «Razazavavy, mandidy anao Aho, mifohaza!»)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
