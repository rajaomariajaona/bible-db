document_id: MRK.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sitranin’i Jesoa ilay lehilahy nampahorîn’ny fanahy maloto tany Gergesà
  - type: heading
    content: (Jereo Mt 8.28-34; Lk 8.26-39)
  - type: text
    content: 'Nandeha sambokely i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: ' ka tonga teny ampitan’ny farihin’i Galilea, teo amin’ny faritanin’i Gergesà'
  - type: note
    content: Ny tondroin’i Marka eto dia toa ny faritany tamin’iny atsinanan’ny farihin’i Genesareta na farihin’i Galilea iny. Ampit Mt 8.28 sy nta.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Dia nitalaho mafy tamin’i Jesoa ralehilahy mba tsy horoahiny lavitra an’io tany io ireo fanahy maloto ireo.
  '11':
  - type: text
    content: Ary nisy kisoa
  - type: note
    content: Araka Lev 11.7 sy Deot 14.8, ny kisoa dia isan’ny biby maloto ary tsy azo hanina ho an’ny Jiosy. Raha marihina manokana toy izao ny momba ny kisoa, dia hilazana fa tsy eo amin’ny tanin’ny Jiosy velively no isehoan’ny tantara.
  - type: text
    content: ' maro, andiany iray, nandrasana teny amin’ny kisolosolon’ny havoana. '
  '12':
  - type: text
    content: 'Koa nitalaho tamin’i Jesoa ireo fanahy maloto nanao hoe:'
  - type: text
    content: –Alefaso amin’iretsy kisoa iretsy izahay, hiditra ao aminy.
  '13':
  - type: text
    content: Neken’i Jesoa ny fangatahany. Koa dia niala tamin-dralehilahy ireo fanahy maloto ka lasa niditra tao amin’ny kisoa. Ary nirifatra ny andian-kisoa, tokony ho kisoa roa arivo, ka nivarimbarina tan-kilahila ho any anaty farihy, dia maty tao.
  '14':
  - type: text
    content: 'Nandositra ireo mpiandry kisoa ka lasa nilaza ny vaovao tao an-tanàna sy teny ambanivohitra. Koa avy ny olona hijery ny zava-niseho, '
  '15':
  - type: text
    content: 'dia tonga teo akaikin’i Jesoa ary nandinika ilay lehilahy azon’ny '
  - type: text
    content: demony
  - type: text
    content: ' antsoina hoe Tafika teo, efa mipetraka tsara, mitafy lamba sady ary saina; ka nihoron-koditra izy rehetra. '
  '16':
  - type: text
    content: 'Ry zareo nanatri-maso kosa nitantara tamin’ireo vao tonga ny zava-niseho tamin’ilay azon’ny demony sy ny nanjo ny kisoa teo. '
  '17':
  - type: text
    content: Tamin’izay dia nitalahoan’ny olona i Jesoa hiala teo amin’ny taniny.
  '18':
  - type: text
    content: 'Raha ilay niondrana an-tsambokely iny i Jesoa, dia niangavy taminy kosa ilay azon’ny demony teo aloha nanao hoe:'
  - type: text
    content: –Avelao aho hiaraka aminao!
  '19':
  - type: text
    content: 'Tsy nanaiky i Jesoa fa niteny taminy hoe:'
  - type: text
    content: –Andeha mody any an-tranonao, any amin’ireo havanao; ka lazao azy izay rehetra nataon’ny Tompo taminao noho ny famindrampony.
  '2':
  - type: text
    content: Raha vao niala tao an-tsambokely i Jesoa, dia indro nisy lehilahy nipoitra avy eny amin’ny fasana
  - type: note
    content: Ny fasana fahizany dia mazàna namboarina tanaty zohy vita nanahary na nolavahana tamin’ny vatolampy.
  - type: text
    content: ', tonga nitsena Azy. Azon’ny '
  - type: text
    content: fanahy maloto
  - type: text
    content: ' ralehilahy, '
  '20':
  - type: text
    content: 'Dia lasa ralehilahy nanao antso avo, eran’ny faritany atao hoe '
  - type: text
    content: Dekapôly
  - type: text
    content: ', izay rehetra nataon’i Jesoa taminy; ka dia gaga avokoa ny olona.'
  - type: heading
    content: Ilay vehivavy mitsi-dra sy ilay zanakavavin’i Jaîro
  - type: heading
    content: (Jereo Mt 9.18-28; Lk 8.40-56)
  '21':
  - type: text
    content: 'Nony tafaverina an-tsambokely teny ampita i Jesoa, dia vahoaka maro no nitangorona nanatona Azy, fa Izy kosa nijanona teo amoron’ny farihy ihany. '
  '22':
  - type: text
    content: 'Dia avy ny anankiray tamin’ireo lehiben’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ', atao hoe Jaîro; raha vao nahita an’i Jesoa izy, dia niankohoka teo an-tongony '
  '23':
  - type: text
    content: 'sady niangavy azy mafy nanao hoe:'
  - type: text
    content: –Eo ambavahoanan’ny fahafatesana ny zanako vavy; koa tongava hametra-tanana aminy, dia ho sitrana izy ka ho velona.
  '24':
  - type: text
    content: Dia lasa niaraka tamin’i Jaîro i Jesoa. Vahoaka nifanitsa-kitro no nitanjozotra nanaraka Azy, ka nifanety taminy.
  '25':
  - type: text
    content: 'Ary nisy vehivavy marary mitsi-dra nandritra ny 12 taona; '
  '26':
  - type: text
    content: 'efa niaritra zavatra mafy maro tamin’ny dokotera maro izy io ka lany fananana tamin’izany rehetra izany, nefa tsy nihatsara velively fa vao mainka niharatsiratsy kokoa aza. '
  '27':
  - type: text
    content: 'Nandre ny amin’i Jesoa ravehivavy, dia lasa nifanjevo tamin’ny vahoaka avy tao ivoho, ka nikasika ny lamban’i Jesoa '
  '28':
  - type: text
    content: 'fa hoy mantsy izy: «Na dia ny lambany ihany aza no voakasiko, dia ho sitrana aho.» '
  '29':
  - type: text
    content: 'Dia ritra niaraka tamin’izay ny loharanon’aretiny, ka tsapany tao amin’ny tenany fa sitrana tsy nandeha ra intsony izy. '
  '3':
  - type: text
    content: 'ka teny amin’ny fasana no niorim-ponenana ary tsy nisy olona nahafatotra azy intsony na dia tamin’ny rojo vy aza. '
  '30':
  - type: text
    content: 'Niaraka tamin’izay koa dia tsapan’i Jesoa fa nisy hery niala avy tao aminy; ka niherikerika teo afovoan’ny vahoaka Izy nanontany hoe:'
  - type: text
    content: –Iza no nikasika ny lambako teo?
  '31':
  - type: text
    content: 'Ary hoy ny '
  - type: text
    content: mpianany
  - type: text
    content: ' taminy:'
  - type: text
    content: '–Hitanao ireto vahoaka mifanety aminao, ka hoy indray Ianao hoe: Iza no nikasika Ahy?'
  '32':
  - type: text
    content: 'Dia nanopy maso manodidina Azy i Jesoa mba hijery ilay vehivavy izay efa nanao izany. '
  '33':
  - type: text
    content: 'Dia raiki-tahotra sady nangovitra ravehivavy satria nahalala tsara ny zavatra nitranga tao aminy; ka tonga niankohoka teo anatrehan’i Jesoa izy ary nilaza taminy ny marina rehetra. '
  '34':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Ny finoanao, anaka, no nahasitrana anao
  - type: note
    content: nahasitrana anao na hoe nahavonjy anao.
  - type: text
    content: '! Ndeha àry ka veloma finaritra, mitohiza fahasalamana soa aman-tsara!'
  '35':
  - type: text
    content: 'Raha mbola niteny i Jesoa, dia nisy iraka tonga avy tany an-tranon’ity lehiben’ny sinagôga ka nanao tamin’i Jaîro hoe:'
  - type: text
    content: –Efa maty ny zanakao vavy, ka nahoana ianao no mbola manahirana ny Mpampianatra ihany?
  '36':
  - type: text
    content: Fa tsy nahoan’i Jesoa izany teny izany
  - type: note
    content: 'tsy nahoan’...teny izany: dkt hafa sendra ren’i Jesoa izany teny izany.'
  - type: text
    content: ', ka hoy Izy tamin’ilay lehiben’ny sinagôga:'
  - type: text
    content: –Aza matahotra, minoa fotsiny ihany!
  '37':
  - type: text
    content: 'Dia tsy nisy olona navelan’i Jesoa hiaraka aminy afa-tsy i Petera sy i Jakôba ary i Jôhany rahalahin’i Jakôba. '
  '38':
  - type: text
    content: 'Nankao an-tranon’ilay lehiben’ny sinagôga izy efa-mianaka, ary hitan’i Jesoa ireto olona misomaritaka sy mitomany ary mikiakiaka. '
  '39':
  - type: text
    content: 'Koa sady niditra tao an-trano i Jesoa no niteny tamin’ireo olona tao nanao hoe:'
  - type: text
    content: –Nahoana ianareo no misomaritaka sy mitomany tahaka izao? Tsy maty akory ny zaza, fa matory!
  '4':
  - type: text
    content: 'Matetika tokoa manko dia nasiana gadra ny tongony sady nofatorana rojo vy ny tanany; fa ny rojo vy notapahiny, ary ny gadra nopotehiny, ka dia tsy nisy olona nahafolaka an-dralehilahy. '
  '40':
  - type: text
    content: 'Dia nihomehezan’ny olona i Jesoa; nefa noroahiny any alatrano izy rehetra ka ny ray aman-drenin-jaza sy ireo mpianatra niaraka taminy no nentiny nankao amin’ny toerana nisy ny zaza. '
  '41':
  - type: text
    content: 'Dia noraisin’i Jesoa ny tanan’ilay zaza ka hoy Izy taminy:'
  - type: text
    content: –Talità komỳ
  - type: note
    content: 'Talità komỳ: voambolana aramianina anankiroa. Ny teny aramianina no fitenin’ny Jiosy tamin’ny andron’i Jesoa.'
  - type: text
    content: '! (Izany hoe: «Razazavavy, mandidy anao Aho, mifohaza!»)'
  '42':
  - type: text
    content: 'Dia nitsangana niaraka tamin’izay razazavavy, ka nandehandeha, fa efa feno 12 taona. Ary dia talanjona aoka izany ny olona teo; '
  '43':
  - type: text
    content: fa i Jesoa kosa namepetra mafy mba tsy hisy hahalala izao zavatra izao; ary dia nasainy nomena sakafo razazavavy.
  '5':
  - type: text
    content: Na andro na alina dia teny amin’ny fasana sy tany an-tendrombohitra tany foana izy, niantsoantso sy nandratra tena tamin’ny vato.
  '6':
  - type: text
    content: 'Nony nahatazana an’i Jesoa ralehilahy, dia nihazakazaka nanatona Azy ka niankohoka teo anatrehany, '
  '7':
  - type: text
    content: 'ary niantsoantso ka niteny tamin’ny feo mahery hoe:'
  - type: text
    content: '–Fa hataonao inona aho, ry Jesoa '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ' avo indrindra? Miangavy Anao amin’ny anaran’Andriamanitra aho, aza dia ampijalîna re!'
  '8':
  - type: text
    content: '(Satria i Jesoa efa nandidy azy hoe: «Mialà amin’io lehilahy io, ry fanahy maloto!»)'
  '9':
  - type: text
    content: 'Dia nanontany an-dralehilahy i Jesoa nanao hoe:'
  - type: text
    content: –Iza no anaranao?
  - type: text
    content: 'Ka namaly izy hoe:'
  - type: text
    content: –Tafika no anarako, satria maro izahay!
