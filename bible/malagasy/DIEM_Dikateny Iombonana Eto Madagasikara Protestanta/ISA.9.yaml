document_id: ISA.9,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ny vahoaka mandeha ao anatin’ny haizina
  - type: text
    content: dia hahita hazavana lehibe;
  - type: text
    content: ary ny olona mipetraka ao amin’ny tany
  - type: text
    content: izay tandindomin’ny fahafatesana
  - type: text
    content: dia hiposahan’ny hazavana.
  '10':
  - type: text
    content: Kanjo nomen’ny TOMPO tombon-dahiny
  - type: text
    content: ny fahavalon’i Israely, dia i Retsîna
  - type: note
    content: 'Retsîna: jereo 7.1.'
  - type: text
    content: ' izany;'
  - type: text
    content: eny, notairiny tokoa ireo fahavalony,
  '11':
  - type: text
    content: dia ny Sirianina teo anoloany
  - type: text
    content: ary ny Filistinina tao an-damosiny,
  - type: text
    content: ka nandrapaka an’i Israely indraim-bava.
  - type: text
    content: Saingy, na teo aza izany rehetra izany,
  - type: text
    content: dia mbola tsy afaka ny fahatezeran’ny TOMPO
  - type: text
    content: fa mihinji-tanana mandrahona ihany Izy.
  '12':
  - type: text
    content: Dia toy izany no nikapohan’Andriamanitra ny vahoakany;
  - type: text
    content: kanefa tsy niverina tamin’Andriamanitra ihany izy,
  - type: text
    content: tsy notadiaviny ny TOMPOn’izao rehetra izao.
  '13':
  - type: text
    content: Koa tanatin’ny indray andro monja
  - type: text
    content: no namongoran’ny TOMPO an’i Israely,
  - type: text
    content: na ny any an-tampony na ny any am-potony,
  - type: text
    content: na ny sampandrofia na ny volotara.
  '14':
  - type: text
    content: Fa ny loholona sy ny manankaja no tampony,
  - type: text
    content: 'ary ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' mampianatra lainga no fotony.'
  '15':
  - type: text
    content: Ny mpitarika ity firenena ity
  - type: text
    content: dia tsy nanao afa-tsy ny nampivoana azy,
  - type: text
    content: ka izay rehetra notarihiny
  - type: text
    content: dia nandeha tamin’ny lalan-tsiizy avokoa.
  '16':
  - type: text
    content: Noho izany, dia tsy hiantran’ny Tompo ireo tanorany
  - type: text
    content: ary tsy hamindrany fo ireo kamboty sy mpitondratenany.
  - type: text
    content: Fa olona tsy mahatoky sady mpanao ratsy izy rehetra
  - type: text
    content: ary ny vavany samy miteny hadalana avokoa.
  - type: text
    content: Saingy, na teo aza izany rehetra izany,
  - type: text
    content: dia tsy mbola afaka ny fahatezeran’ny Tompo
  - type: text
    content: fa mihinji-tanana mandrahona ihany Izy.
  '17':
  - type: text
    content: Eny, midedadeda tokoa ny faharatsiana
  - type: text
    content: toy ny afo mandoro ny tsilo sy ny songosongo
  - type: text
    content: sady mandrehitra ny kirihitr’ala
  - type: text
    content: ka mampisavoana ny setroka mitambolina.
  '18':
  - type: text
    content: Tezitra mafy ny TOMPOn’izao rehetra izao,
  - type: text
    content: ka dia mirehitra izany tany izany
  - type: text
    content: ary toy ny levon’ny afo ny vahoakany.
  - type: text
    content: 'Tsy misy olona miantra ny namany:'
  '19':
  - type: text
    content: andidiana ny eo an-kavanana
  - type: text
    content: nefa mbola noana ihany ny tena,
  - type: text
    content: ihinanana ny eo an-kavia
  - type: text
    content: nefa mbola tsy voky ihany.
  - type: text
    content: 'Samy mihinana ny havany avokoa izy:'
  '2':
  - type: text
    content: Nohamaroinao ny fifaliany
  - type: text
    content: ary nampitomboinao ny firavoravoany.
  - type: text
    content: Miravoravo eo anatrehanao izy
  - type: text
    content: tahaka ny iravoravoana amin’ny fararano
  - type: text
    content: sy anaovana antsoantsom-pifaliana
  - type: text
    content: rehefa injay mizara babo ny olona.
  '20':
  - type: text
    content: ny fokon’i Manase mihinana ny fokon’i Efraîma,
  - type: text
    content: ny an’i Efraîma kosa mihinana ny an’i Manase,
  - type: text
    content: ary izy roa tonta no indray mamely ny fokon’i Joda.
  - type: text
    content: Saingy, na teo aza izany rehetra izany,
  - type: text
    content: dia mbola tsy afaka ny fahatezeran’ny TOMPO
  - type: text
    content: fa mihinji-tanana mandrahona ihany Izy.
  '3':
  - type: text
    content: 'Fa ny '
  - type: text
    content: ziogam
  - type: text
    content: -pamoretana nanindry ny vahoakanao
  - type: text
    content: ny tsora-kazo nikapohana ny lamosiny,
  - type: text
    content: ny kibay namelezan’ny mpampiasa azy
  - type: text
    content: dia samy hopotehinao avokoa
  - type: text
    content: toy ny tamin’ny andro nampandosiranao ny Midianita
  - type: note
    content: Fahatsiahivana ny fandresen’i Gidehôna (Mpits 6–7) izany.
  - type: text
    content: .
  '4':
  - type: text
    content: Fa ny kiraro rehetra entim-pahavalo
  - type: text
    content: ka mikatrokatroka mampihozongozon-tany
  - type: text
    content: ary ny fitafiana rehetra voahorona mihosin-dra
  - type: text
    content: dia samy hodorana avokoa ho levon’ny afo.
  '5':
  - type: text
    content: Satria misy zaza teraka ho antsika,
  - type: text
    content: zazalahy no omena antsika;
  - type: text
    content: eny an-tsorony ny mari-piandrianany,
  - type: text
    content: 'ary ny anaram-boninahiny dia hatao hoe:'
  - type: text
    content: Mpitondra mahay, Andriamanitra mahery,
  - type: text
    content: Ray mandrakizay, Andriana mitondra ny fiadanana.
  '6':
  - type: text
    content: Hanao izay hanitarana ny fahefàny izy
  - type: text
    content: ary hampisy fiadanana tsy misy fetra.
  - type: text
    content: Ny sezafiandrianan’i Davida no hipetrahany
  - type: text
    content: ary ny fanjakany no hofeheziny
  - type: text
    content: ka haoriny sy hohamafisiny
  - type: text
    content: amin’ny rariny sy ny hitsiny,
  - type: text
    content: hatramin’izao ka ho mandrakizay
  - type: note
    content: 'And 6: jereo Lk 1.32-33.'
  - type: text
    content: .
  - type: text
    content: Izany no hotanterahin’ny TOMPOn’izao rehetra izao,
  - type: text
    content: vokatry ny firedaredam-pitiavany.
  - type: heading
    content: Toa totohondry voavonkina ny fandrahonan’ny Tompo
  - type: heading
    content: (Jereo 5.25)
  '7':
  - type: text
    content: Namoaka didim-pitsarana ny Tompo
  - type: text
    content: ho fanoherana ny taranak’i Jakôba,
  - type: text
    content: ka ny fanjakan’i Israely no niharan’izany
  - type: note
    content: Ny fanjakan’i Israely na fanjakana avaratra dia tafasaraka tamin’ny fanjakan’i Joda efa ho 200 taona eo ho eo izao (jereo 1 Mp 12).
  - type: text
    content: .
  '8':
  - type: text
    content: Samy mahalala izany avokoa
  - type: text
    content: ny mpiray firenena rehetra,
  - type: text
    content: dia ny fanjakan’i Efraîma manontolo
  - type: text
    content: sy ny mponina ao Samaria
  - type: note
    content: 'Efraîma: jereo 7.2 sy nta. –Samaria: renivohitry ny fanjakan’i Israely faha-Isaià.'
  - type: text
    content: .
  - type: text
    content: Fa tamin’avonavona sy fireharehana
  - type: text
    content: 'no nitenenan’izy ireny hoe:'
  '9':
  - type: text
    content: «Rindrina biriky no nirodana
  - type: text
    content: fa rindrim-bato kosa no hatsanganay.
  - type: text
    content: Tsivalan-kazo aviavy no nadaboka
  - type: text
    content: fa tsivalan-kazo sedera kosa no hasolonay azy.»
