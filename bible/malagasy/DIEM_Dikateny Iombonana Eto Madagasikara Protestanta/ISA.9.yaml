  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny vahoaka mandeha ao anatin’ny haizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hahita hazavana lehibe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny olona mipetraka ao amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tandindomin’ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiposahan’ny hazavana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nohamaroinao ny fifaliany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nampitomboinao ny firavoravoany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miravoravo eo anatrehanao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny iravoravoana amin’ny fararano
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy anaovana antsoantsom-pifaliana
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa injay mizara babo ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ziogam
  - type: text
    text: -pamoretana nanindry ny vahoakanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tsora-kazo nikapohana ny lamosiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny kibay namelezan’ny mpampiasa azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy hopotehinao avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny tamin’ny andro nampandosiranao ny Midianita
  - type: usfm
    marker: f
    children:
