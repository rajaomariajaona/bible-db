      - type: text
        text: Fahatsiahivana ny fandresen’i Gidehôna (Mpits 6–7) izany.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ny kiraro rehetra entim-pahavalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mikatrokatroka mampihozongozon-tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fitafiana rehetra voahorona mihosin-dra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy hodorana avokoa ho levon’ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Satria misy zaza teraka ho antsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: zazalahy no omena antsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny an-tsorony ny mari-piandrianany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny anaram-boninahiny dia hatao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpitondra mahay, Andriamanitra mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ray mandrakizay, Andriana mitondra ny fiadanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hanao izay hanitarana ny fahefàny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampisy fiadanana tsy misy fetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny sezafiandrianan’i Davida no hipetrahany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanjakany no hofeheziny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka haoriny sy hohamafisiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny rariny sy ny hitsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’izao ka ho mandrakizay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
