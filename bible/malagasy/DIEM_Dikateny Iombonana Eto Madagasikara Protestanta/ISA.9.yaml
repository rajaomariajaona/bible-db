  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no hotanterahin’ny TOMPOn’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vokatry ny firedaredam-pitiavany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Toa totohondry voavonkina ny fandrahonan’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 5.25)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Namoaka didim-pitsarana ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fanoherana ny taranak’i Jakôba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny fanjakan’i Israely no niharan’izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny fanjakan’i Israely '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: na fanjakana avaratra dia tafasaraka tamin’ny fanjakan’i Joda efa ho 200 taona eo ho eo izao (jereo 1 Mp 12).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Samy mahalala izany avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpiray firenena rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fanjakan’i Efraîma manontolo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mponina ao Samaria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Efraîma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 7.2 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Samaria:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' renivohitry ny fanjakan’i Israely faha-Isaià.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tamin’avonavona sy fireharehana
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no nitenenan’izy ireny hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Rindrina biriky no nirodana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rindrim-bato kosa no hatsanganay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsivalan-kazo aviavy no nadaboka
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsivalan-kazo sedera kosa no hasolonay azy.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Kanjo nomen’ny TOMPO tombon-dahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahavalon’i Israely, dia i Retsîna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Retsîna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 7.1.
    marker-yv: yv-n
  - type: text
    text: ' izany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, notairiny tokoa ireo fahavalony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: dia ny Sirianina teo anoloany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Filistinina tao an-damosiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandrapaka an’i Israely indraim-bava.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saingy, na teo aza izany rehetra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola tsy afaka ny fahatezeran’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mihinji-tanana mandrahona ihany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia toy izany no nikapohan’Andriamanitra ny vahoakany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa tsy niverina tamin’Andriamanitra ihany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy notadiaviny ny TOMPOn’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa tanatin’ny indray andro monja
- type: usfm
  marker: q1
  children:
  - type: text
    text: no namongoran’ny TOMPO an’i Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny any an-tampony na ny any am-potony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny sampandrofia na ny volotara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ny loholona sy ny manankaja no tampony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' mampianatra lainga no fotony.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny mpitarika ity firenena ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy nanao afa-tsy ny nampivoana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka izay rehetra notarihiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nandeha tamin’ny lalan-tsiizy avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Noho izany, dia tsy hiantran’ny Tompo ireo tanorany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hamindrany fo ireo kamboty sy mpitondratenany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa olona tsy mahatoky sady mpanao ratsy izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vavany samy miteny hadalana avokoa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saingy, na teo aza izany rehetra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mbola afaka ny fahatezeran’ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mihinji-tanana mandrahona ihany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eny, midedadeda tokoa ny faharatsiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny afo mandoro ny tsilo sy ny songosongo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mandrehitra ny kirihitr’ala
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampisavoana ny setroka mitambolina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tezitra mafy ny TOMPOn’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia mirehitra izany tany izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny levon’ny afo ny vahoakany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tsy misy olona miantra ny namany:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: andidiana ny eo an-kavanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mbola noana ihany ny tena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ihinanana ny eo an-kavia
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mbola tsy voky ihany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Samy mihinana ny havany avokoa izy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ny fokon’i Manase mihinana ny fokon’i Efraîma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny an’i Efraîma kosa mihinana ny an’i Manase,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izy roa tonta no indray mamely ny fokon’i Joda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saingy, na teo aza izany rehetra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola tsy afaka ny fahatezeran’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mihinji-tanana mandrahona ihany Izy.
