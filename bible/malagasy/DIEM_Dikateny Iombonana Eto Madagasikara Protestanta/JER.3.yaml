      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ka any no hanomezako anareo mpitondra araka izay sitrako sy afaka hitondra anareo amim-pahalalana sy amim-pahendrena.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
