          text: '3.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Raha misy lehilahy...: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Deot 24.1-4. –Momba ny fivadihana amin’Andriamanitra nampitoviana amin’ny fijangajangana, jereo 2.20.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitry ny Tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka moa hahazo miverina amiko indray ve ianao?
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nefa na dia tao aza izany dia tsy mbola niverina tamiko tamin’ny fony fa tamin-tendro-molotra ihany i Joda mpivadika, rahavavin’i Israely. Izaho TOMPO no manao izany teny hentitra izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa mbola niteny tamiko indray ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Toa marimarina ihany i Israely mpiodina raha miohatra amin’i Joda mpivadika. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa mandehana ambarao any avaratra any izao hafatra izao hoe:'
  - type: usfm
