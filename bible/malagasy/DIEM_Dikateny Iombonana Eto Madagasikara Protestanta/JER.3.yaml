document_id: JER.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Vehivavy janga be kirina
  - type: text
    content: 'Hoy ny TOMPO tamiko:'
  - type: text
    content: Raha misy lehilahy misaraka amin’ny vadiny
  - type: text
    content: ka mandao azy ravehivavy mba hanambady olon-kafa,
  - type: text
    content: moa mahazo mampody azy indray ve izy?
  - type: text
    content: Tsia, fa haloto ny tany.
  - type: text
    content: Kanefa ianao, ry Israely,
  - type: text
    content: dia efa lehilahy maro no nijangajanganao
  - type: note
    content: 'Raha misy lehilahy...: jereo Deot 24.1-4. –Momba ny fivadihana amin’Andriamanitra nampitoviana amin’ny fijangajangana, jereo 2.20.'
  - type: text
    content: ','
  - type: text
    content: hoy ny teny hentitry ny Tompo;
  - type: text
    content: ka moa hahazo miverina amiko indray ve ianao?
  '10':
  - type: text
    content: Nefa na dia tao aza izany dia tsy mbola niverina tamiko tamin’ny fony fa tamin-tendro-molotra ihany i Joda mpivadika, rahavavin’i Israely. Izaho TOMPO no manao izany teny hentitra izany.
  '11':
  - type: text
    content: 'Fa mbola niteny tamiko indray ny TOMPO hoe:'
  - type: text
    content: '–Toa marimarina ihany i Israely mpiodina raha miohatra amin’i Joda mpivadika. '
  '12':
  - type: text
    content: 'Koa mandehana ambarao any avaratra any izao hafatra izao hoe:'
  - type: text
    content: Miverena, ry Israely mpiodina,
  - type: text
    content: hoy ny teny hentitry ny TOMPO;
  - type: text
    content: fa tsy hanao tarehy ratsy aminao Aho,
  - type: text
    content: satria entanim-pitiavana,
  - type: text
    content: fa tsy mitahiry hatezerana maharitra.
  '13':
  - type: text
    content: Kanefa aoka hiaiky heloka ianao
  - type: text
    content: 'fa nikomy tamiko TOMPO Andriamanitrao:'
  - type: text
    content: nivezivezy nanaraka ireo andriamani-kafa ianao
  - type: text
    content: teny am-pototry ny hazo maitso rehetra teny
  - type: text
    content: 'fa tsy nihaino ny feoko:'
  - type: text
    content: teny hentitra avy amiko TOMPO izany.
  - type: heading
    content: Ny fiverenan’i Joda
  '14':
  - type: text
    content: 'Miverena amiko, ry zaza mpiodina, hoy ny teny hentitry ny TOMPO, satria Izaho no tomponareo. Hangalako iray isan-tanàna na roa isan-tarika ianareo ka hoentiko any an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: '. '
  '15':
  - type: text
    content: Ka any no hanomezako anareo mpitondra araka izay sitrako sy afaka hitondra anareo amim-pahalalana sy amim-pahendrena.
  '16':
  - type: text
    content: 'Amin’izany fotoana izany, hoy ihany ny teny hentitry ny TOMPO, dia hanjary ho maro sy hitombo be dia be ao amin’ity tany ity ianareo. Tsy horesahina intsony ny '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanako
  - type: text
    content: . Tsy ho ao an-tsain’ny olona intsony izany fa hohadinoiny, tsy hisy ho manina azy na hanao Vatamasina hafa
  - type: note
    content: 'Vatamasina: jereo Sal 132.6-7 sy nta.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Amin’izany fotoana izany i Jerosalema dia hantsoina hoe «Sezafiandrianan’ny TOMPO». Hivory ao ny firenena rehetra hanome voninahitra Ahy TOMPO sady tsy hanaraka intsony ny ditran’ny fony ratsy. '
  '18':
  - type: text
    content: 'Hankany amin’izay nielezan’ny vahoakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' ny vahoakan’i Joda ka hiara-miverina avy any amin’ny tany avaratra izy roa tonta ary hankany amin’ny tany izay nomeko ny razany ho fananany.'
  - type: heading
    content: Miverina amin’Andriamanitra ilay vahoaka mpiodina
  - type: heading
    content: (Ny Tompo)
  '19':
  - type: text
    content: 'Hoy Aho anakampo hoe:'
  - type: text
    content: Ahoana raha ataoko lohalaharana
  - type: text
    content: amin’ireo zanako lahy ianao
  - type: text
    content: ka homeko tany mahafinaritra
  - type: text
    content: izay fananana tsara indrindra
  - type: text
    content: eo amin’ny samy firenena?
  - type: text
    content: Amin’izay dia hiantso Ahy ho rainao ianao
  - type: text
    content: ka tsy hiodina amiko intsony.
  '2':
  - type: text
    content: Atopazo eny amin’ny havoana
  - type: note
    content: 'eny amin’ny havoana: eny no anatanterahana ny fivavahana momba ny fananahana (jereo 2.20).'
  - type: text
    content: ' ny masonao:'
  - type: text
    content: jereo raha misy toerana tsy nandrian’olona taminao.
  - type: text
    content: Tahaka ny Arabo mpirenireny any an-taniefitra
  - type: text
    content: miandry ny rembiny
  - type: text
    content: no nipetrahanao teo amoron-dalana
  - type: text
    content: niandry ny lehilahinao.
  - type: text
    content: Ny fijangajanganao sy ny faharatsianao
  - type: text
    content: no nandotoanao ny tany.
  '20':
  - type: text
    content: Kanjo toy ny vehivavy nisintaka tamim-badiny
  - type: text
    content: no nisintahanao tamiko, ry taranak’i Israely;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.
  '21':
  - type: text
    content: 'Injany misy feo re any an-tampon-kavoana:'
  - type: text
    content: tsy inona izany fa ireo Israelita
  - type: text
    content: izay mitomany sy mitaraina mafy
  - type: text
    content: satria diso lalana tamin’izay nalehany
  - type: text
    content: ka nanadino Ahy TOMPO Andriamaniny.
  '22':
  - type: text
    content: Miverena amiko, ry zaza mpiodina,
  - type: text
    content: fa hositraniko amin’ny fiodinanareo ianareo!
  - type: heading
    content: (Ny vahoaka)
  - type: text
    content: Indreto izahay manatona Anao,
  - type: text
    content: satria Ianao no TOMPO Andriamanitray.
  '23':
  - type: text
    content: Eny tokoa, fa nanodoka anay
  - type: text
    content: ny fanompoan-tsampy teny an-kavoana
  - type: text
    content: sy ny horakoraka teny an-tendrombohitra,
  - type: text
    content: kanefa aminao TOMPO Andriamanitray ihany
  - type: text
    content: no hahitan’Israely famonjena.
  '24':
  - type: text
    content: Fa hatry ny fahazazànay
  - type: text
    content: dia efa lanin’io fivavahana mahamenatra
  - type: text
    content: 'nanompoana an’i '
  - type: text
    content: Bahala
  - type: text
    content: ' io'
  - type: text
    content: ny zavatra rehetra nisasaran’ny razanay,
  - type: text
    content: dia ny omby aman’ondriny sy ny osiny,
  - type: text
    content: ny zanany lahy sy ny zanany vavy
  - type: note
    content: 'ny zanany lahy sy ny zanany vavy: filazana an-kolaka ireo fanaovana sorona ny ankizy fanao teo amin’ny fivavahana kanahanita: jereo 7.31; 19.5; 22.3; Deot 18.10; 2 Mp 16.3; 17.17; 21.6; Sal 106.38.'
  - type: text
    content: .
  '25':
  - type: text
    content: Aoka hatory ombàn-kenatra izahay
  - type: text
    content: ka hanaiky ny fahafaham-baràka,
  - type: text
    content: satria efa nanao heloka
  - type: text
    content: teo anatrehanao TOMPO Andriamanitray.
  - type: text
    content: Fa na izahay na ny razanay dia tsy nihaino
  - type: text
    content: izay nolazain’ny TOMPO Andriamanitray
  - type: text
    content: hatry ny fahazazànay ka mandrak’androany.
  - type: heading
    content: (Ny Tompo)
  '3':
  - type: text
    content: Koa nosakanako tsy ho avy aminao ny oram-be
  - type: text
    content: sady tsy nisy koa ny oran-dohataona
  - type: note
    content: Tany Palestinina dia nilaina mihitsy ny oran-dohataona mba hitomboan’ny voa eny amin’ny salohy sy hahatomombana ny vokatra. –Momba ity and ity, jereo Ham 4.7-8.
  - type: text
    content: .
  - type: text
    content: Nefa nikiry hijangajanga ihany ianao
  - type: text
    content: fa tsy nety niaiky ny fahadisoanao.
  '4':
  - type: text
    content: Ankehitriny anefa ianao
  - type: text
    content: 'dia sahy miantsoantso Ahy hoe:'
  - type: text
    content: «Ry raiko sady sakaizako fahazaza,
  '5':
  - type: text
    content: mbola ho tezitra amiko ihany ve ianao
  - type: text
    content: ka hitahiry alahelo amiko hatrany?»
  - type: text
    content: Izany no teninao tamiko,
  - type: text
    content: nefa tsy nitsahatra nanao ratsy ianao,
  - type: text
    content: sady tena havanana tamin’izany.
  - type: heading
    content: I Israely mpiodina sy i Joda mpivadika
  '6':
  - type: text
    content: 'Tamin’ny andron’i Jôsià mpanjaka dia hoy ny TOMPO tamiko:'
  - type: text
    content: '–Hitanao ve izay nataon’i '
  - type: text
    content: Israely
  - type: text
    content: ' mpiodina? Nankeny amin’ny havoana rehetra sy teny am-pototry ny hazo maitso rehetra izy ka nanolo-tena hijangajanga'
  - type: note
    content: 'I Jôsià dia mpanjakan’i Joda ny taona 640-609 tal J.K; jereo ny naoty 1.2a. –Israely eto dia ny fanjakana avaratra teo aloha izay mifanohitra amin’i Joda eo amin’ny and 7. Ny vahoakan’Andriamanitra eto dia naseho ho toy ny vehivavy tanora iray: jereo 2.2 sy nta. Ireo fanjakana roa ireo dia oharina amin’ny mpirahavavy: jereo Ezek 23. –fijangajangana: jereo 2.20 sy nta.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Dia hoy Aho anakampo hoe: Rehefa afaka izany dia hiverina amiko izy. Kanjo tsy niverina izy; ary nahita izany i Joda mpivadika rahavaviny. '
  '8':
  - type: text
    content: Hitany fa nomeko taratasy fisaoram-bady
  - type: note
    content: 'nomeko taratasy fisaoram-bady: jereo Deot 24.1,3; Is 50.1. Ny mpaminany eto dia tsy isalasalana fa milaza an-kolaka ny faharavan’i Samaria izay niseho tamin’ny 721 tal J.K (jereo 2 Mp 17). Ny fivadihan’ny vahoakan’Andriamanitra izay oharina amin’ny fanitsakitsahana tokantrano: jereo 5.7; 9.1; 13.27 sns.'
  - type: text
    content: ' i Israely mpiodina, ary nisaorako noho izy nijangajanga. Kanefa tsy natahotra akory i Joda mpivadika fa mba lasa koa aza izy nijangajanga. '
  '9':
  - type: text
    content: 'Nijangajanga tamin’ireo andriamanitra vato aman-kazo izy ary nandoto ny tany tamin’ny nataony. '
