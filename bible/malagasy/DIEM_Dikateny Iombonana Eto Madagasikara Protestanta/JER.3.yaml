      children:
      - type: text
        text: '17'
    - type: text
      text: 'Amin’izany fotoana izany i Jerosalema dia hantsoina hoe «Sezafiandrianan’ny TOMPO». Hivory ao ny firenena rehetra hanome voninahitra Ahy TOMPO sady tsy hanaraka intsony ny ditran’ny fony ratsy. '
