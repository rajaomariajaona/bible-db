  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa mahazo mampody azy indray ve izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, fa haloto ny tany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa ianao, ry Israely,
  - type: usfm
    marker: q1
    children:
