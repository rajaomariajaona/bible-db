        text: '14'
    - type: text
      text: 'Miverena amiko, ry zaza mpiodina, hoy ny teny hentitry ny TOMPO, satria Izaho no tomponareo. Hangalako iray isan-tanàna na roa isan-tarika ianareo ka hoentiko any an-tendrombohitra '
    - type: usfm
