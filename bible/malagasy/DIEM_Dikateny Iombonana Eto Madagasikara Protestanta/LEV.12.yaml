document_id: LEV.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanadiovana ny vehivavy aorian’ny fiterahany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'mba hamepetra ny Israelita hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha misy vehivavy niandry volana ka tera-dahy, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: haloto
    - type: text
      text: ' mandritra ny fito andro izy, tahaka ny aharetan’ny fahalotoany amin’ny fadimbolany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Amin’ny andro fahavalo, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hoforana
    - type: text
      text: ' ny zaza'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 17.12; Lk 2.21.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary mandritra ny 33 andro aorian’izany kosa no mbola hidiovan-dravehivavy noho izy very ra teo am-piterahana; ka tsy hikasika zava-masina izy na hiditra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ', mandra-pahatapitry ny andro fidiovany.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: «Raha misy kosa vehivavy tera-bavy, dia haloto tahaka ny amin’ny fadimbolany izy, kanefa tapa-bolana no haharetan’ny fahalotoany; ary mandritra ny 66 andro aorian’izany kosa no mbola hidiovan-dravehivavy noho izy very ra teo am-piterahana.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '«Rehefa tapitra ny fetr’andro fidiovany, araka izay zaza naterany na lahy na vavy, dia izao no hateriny amin’ny mpisorona eo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ': zanak’ondry anankiray efa iray taona mba ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo, ary voromahailala na domohina anankiray mba ho sorona fanalana ny ota. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hatolory ny mpisorona eo anatrehan’ny TOMPO ireo sorona ireo, ary rehefa nataony tamin-dravehivavy ny fombam-pivavahana fanadiovana, dia hadio ny amin’ny ra very teo am-piterahana izy.»
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fepetra momba ny vehivavy tera-dahy na tera-bavy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Raha tsy tratry ny fananan-dravehivavy ny zanakondry anankiray, dia hitondra domohina na voromahailala anankiroa izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lk 2.24.
      marker-yv: yv-n
    - type: text
      text: ': ny anankiray hatao sorona dorana manontolo, ny anankiray kosa hatao sorona fanalana ny ota. Ary rehefa nataon’ny mpisorona tamin’ilay vehivavy ny fombam-pivavahana fanadiovana, dia hadio izy.'
