document_id: LEV.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanadiovana ny vehivavy aorian’ny fiterahany
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Raha misy vehivavy niandry volana ka tera-dahy, dia '
  - type: text
    content: haloto
  - type: text
    content: ' mandritra ny fito andro izy, tahaka ny aharetan’ny fahalotoany amin’ny fadimbolany. '
  '3':
  - type: text
    content: 'Amin’ny andro fahavalo, dia '
  - type: text
    content: hoforana
  - type: text
    content: ' ny zaza'
  - type: note
    content: Jereo Gen 17.12; Lk 2.21.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Ary mandritra ny 33 andro aorian’izany kosa no mbola hidiovan-dravehivavy noho izy very ra teo am-piterahana; ka tsy hikasika zava-masina izy na hiditra ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ', mandra-pahatapitry ny andro fidiovany.'
  '5':
  - type: text
    content: «Raha misy kosa vehivavy tera-bavy, dia haloto tahaka ny amin’ny fadimbolany izy, kanefa tapa-bolana no haharetan’ny fahalotoany; ary mandritra ny 66 andro aorian’izany kosa no mbola hidiovan-dravehivavy noho izy very ra teo am-piterahana.
  '6':
  - type: text
    content: '«Rehefa tapitra ny fetr’andro fidiovany, araka izay zaza naterany na lahy na vavy, dia izao no hateriny amin’ny mpisorona eo anoloan’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ': zanak’ondry anankiray efa iray taona mba ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo, ary voromahailala na domohina anankiray mba ho sorona fanalana ny ota. '
  '7':
  - type: text
    content: Hatolory ny mpisorona eo anatrehan’ny TOMPO ireo sorona ireo, ary rehefa nataony tamin-dravehivavy ny fombam-pivavahana fanadiovana, dia hadio ny amin’ny ra very teo am-piterahana izy.»
  - type: text
    content: Ireo no fepetra momba ny vehivavy tera-dahy na tera-bavy.
  '8':
  - type: text
    content: Raha tsy tratry ny fananan-dravehivavy ny zanakondry anankiray, dia hitondra domohina na voromahailala anankiroa izy
  - type: note
    content: Jereo Lk 2.24.
  - type: text
    content: ': ny anankiray hatao sorona dorana manontolo, ny anankiray kosa hatao sorona fanalana ny ota. Ary rehefa nataon’ny mpisorona tamin’ilay vehivavy ny fombam-pivavahana fanadiovana, dia hadio izy.'
