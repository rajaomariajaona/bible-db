document_id: JHN.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ampahiratin’i Jesoa ralehilahy teraka jamba
  - type: text
    content: 'Raha nandalo ry i Jesoa, dia nahita lehilahy jamba hatry ny vao teraka. '
  '10':
  - type: text
    content: 'Dia hoy ny olona taminy:'
  - type: text
    content: –Fomba ahoana àry no nahiratan’ny masonao?
  '11':
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: '–Ilay Lehilahy atao hoe Jesoa no nanao feta sy nanosotra ny masoko, dia nanao tamiko hoe: «Ndeha ianao mankany amin’ny dobo Silôà, dia misasà maso.» Koa lasa nankany aho, dia nisasa maso ary nahiratra.'
  '12':
  - type: text
    content: 'Dia hoy ny olona taminy:'
  - type: text
    content: –Aiza moa izany Lehilahy izay?
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: –Tsy fantatro!
  - type: heading
    content: Fotopotorin’ireo Farisianina ilay jamba sitrana
  '13':
  - type: text
    content: 'Dia nentin’ny olona tany amin’ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' ilay jamba taloha. '
  '14':
  - type: text
    content: 'Andro '
  - type: text
    content: sabata
  - type: text
    content: ' no nanaovan’i Jesoa ny feta sy nampahiratany maso azy; '
  '15':
  - type: text
    content: 'koa ireo Farisianina indray no nanontany ilay jamba taloha ny amin’ny fomba nahiratany, ary izao no navaliny:'
  - type: text
    content: –Nasiany feta ny masoko, dia nisasa maso aho ka nahiratra!
  '16':
  - type: text
    content: 'Tamin’izay ny sasany tamin’ireo Farisianina dia nanao hoe:'
  - type: text
    content: –Tsy avy amin’Andriamanitra izany Lehilahy izany, satria tsy mitandrina ny fepetra momba ny sabata!
  - type: text
    content: 'Ny sasany kosa nanao hoe:'
  - type: text
    content: '–Fomba ahoana moa no ahafahan’olona mpanota manao '
  - type: text
    content: famantarana
  - type: text
    content: ' toy ireny?'
  - type: text
    content: 'Dia nisara-tsaina ry zareo. '
  '17':
  - type: text
    content: 'Ary hoy indray ireto Farisianina tamin’ilay jamba:'
  - type: text
    content: –Ianao kosa, ahoana no mba ilazanao Azy, raha nampahiratra ny masonao Izy?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –
  - type: text
    content: Mpaminany
  - type: text
    content: ' Izy.'
  '18':
  - type: text
    content: 'Tamin’izay ny manampahefana jiosy dia tsy nino hoe jamba taloha ralehilahy ka nahiratra, ambara-piantson-dry zareo ny ray aman-dreniny '
  '19':
  - type: text
    content: 'nanontaniany hoe:'
  - type: text
    content: –Ralehilahy io ve no zanakareo izay lazainareo fa teraka jamba? Fomba ahoana àry no nahiratany ankehitriny?
  '2':
  - type: text
    content: 'Dia nanontany an’i Jesoa ny mpianany nanao hoe:'
  - type: text
    content: –Mpampianatra ô, iza moa no nanota, ralehilahy io sa ny ray aman-dreniny, no dia teraka jamba izy
  - type: note
    content: Jereo Eks 20.5.
  - type: text
    content: '?'
  '20':
  - type: text
    content: 'Dia izao no navalin’ny ray aman-dreniny:'
  - type: text
    content: '–Fantatray fa izy io dia zanakay sady teraka jamba; '
  '21':
  - type: text
    content: fa tsy fantatray ny fomba nahiratany ankehitriny, ary tsy fantatray koa izay olona nampahiratra ny masony. Izy anontaniana fa efa lehibe, ka dia izy ihany no hilaza ny amin’ny tenany.
  '22':
  - type: text
    content: 'Izany no tenin’ny ray aman-dreniny noho izy ireo natahotra ny manampahefana jiosy; satria efa nifanaraka ny manampahefana jiosy fa raha manaiky an’i Jesoa ho '
  - type: text
    content: Mesia
  - type: text
    content: ', dia horoahina hiala amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Ka izany no nitenenan’ny ray aman-dreniny hoe: «Efa lehibe izy, ka izy anontaniana!»'
  '24':
  - type: text
    content: 'Dia nantsoin’ireo Farisianina indray ilay jamba taloha, ka nilazany hoe:'
  - type: text
    content: –Lazao ny marina eo anatrehan’Andriamanitra! Izahay aloha dia tsy mahalala fa mpanota iny Lehilahy iny.
  '25':
  - type: text
    content: 'Ka hoy ny navaliny azy:'
  - type: text
    content: '–Tsy fantatro na mpanota Izy na tsia; zavatra iray ihany no fantatro: jamba aho taloha fa mahiratra ankehitriny.'
  '26':
  - type: text
    content: 'Dia hoy ireo taminy:'
  - type: text
    content: –Inona no nataony taminao? Fomba ahoana no nampahiratany ny masonao?
  '27':
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: '–Efa voalazako taminareo, fa tsy nohenoinareo! Ka ahoana no itiavanareo mihaino izany indray? Te ho tonga '
  - type: text
    content: mpianany
  - type: text
    content: ' koa ve ianareo?'
  '28':
  - type: text
    content: 'Dia notevatevain’ireo Farisianina ralehilahy sady nataony hoe:'
  - type: text
    content: '–Ianao no mpianany fa izahay mpianatr’i Mosesy. '
  '29':
  - type: text
    content: Fantatray fa i Mosesy dia nitenenan’Andriamanitra; ilay iny kosa tsy fantatray izay ipoirany.
  '3':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Tsy izy no nanota na ny ray aman-dreniny, fa mba hanehoana ny asan’Andriamanitra eo aminy. '
  '30':
  - type: text
    content: 'Dia niteny ralehilahy ka nanao taminy hoe:'
  - type: text
    content: '–Izany tokoa no mahagaga: tsy fantatrareo izay ipoirany, nefa nampahiratra ny masoko Izy! '
  '31':
  - type: text
    content: Fantatsika fa Andriamanitra tsy mihaino ny mpanota; fa izay tia vavaka sy manao ny sitrapony no henoiny
  - type: note
    content: Jereo Is 1.15; Sal 34.16; 66.18; Ohab 15.29.
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Hatrizay hatrizay dia tsy mbola nandrenesana fa hoe nisy nampahiratra mason’olona teraka jamba. '
  '33':
  - type: text
    content: Raha toa tsy avy amin’Andriamanitra izany Lehilahy izany, dia tsy hahefa na inona na inona.
  '34':
  - type: text
    content: 'Namaly kosa ry zareo ka nanao taminy hoe:'
  - type: text
    content: –Tena teraka tanatin’ny ota ianao, ka ianao indray ve no mampianatra anay?
  - type: text
    content: Dia noroahin’ny Farisianina hiala amin’ny sinagôga ilay jamba taloha.
  - type: heading
    content: Ny hajambam-po
  '35':
  - type: text
    content: 'Ren’i Jesoa fa voaroaka hiala amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' ilay jamba taloha, ka nony hitany dia nilazany hoe:'
  - type: text
    content: '–Mino ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' ve ianao?'
  '36':
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: –Iza moa no Izy, Tompoko, mba hinoako Azy?
  '37':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Efa nahita Azy ianao, ary Ilay miresaka aminao izao no Izy!
  '38':
  - type: text
    content: 'Ka hoy ralehilahy hoe:'
  - type: text
    content: –Mino aho, Tompoko!
  - type: text
    content: Sady niankohoka teo anatrehany izy.
  '39':
  - type: text
    content: 'Dia hoy i Jesoa:'
  - type: text
    content: –Ho fitsarana no nahatongavako eto amin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ', mba hahiratra izay tsy mahiratra ary ho tonga jamba izay mahiratra!'
  '4':
  - type: text
    content: 'Isika tsy maintsy manao ny asan’Ilay naniraka Ahy, raha mbola antoandro; fa ho avy ny alina izay tsy ahafahan’iza na iza miasa! '
  '40':
  - type: text
    content: 'Nandre izany ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' sasany teo ka nanao taminy hoe:'
  - type: text
    content: –Izahay koa ve jamba?
  '41':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Raha jamba ianareo, dia tsy ho nanan-keloka; fa noho ianareo ankehitriny manao hoe: «Mahiratra izahay», dia tsy afaka ny helokareo.'
  '5':
  - type: text
    content: Raha mbola eo amin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' Aho, dia fahazavana ho an’izao tontolo izao'
  - type: note
    content: Jereo 8.12 sy nta.
  - type: text
    content: .
  '6':
  - type: text
    content: Nony avy nilaza izany Izy, dia nandrora tamin’ny tany sy nanao feta tamin’ny rorany
  - type: note
    content: Ampit Mk 8.23.
  - type: text
    content: ', ka nanosotra feta ny mason’ilay jamba '
  '7':
  - type: text
    content: 'ary nanao taminy hoe:'
  - type: text
    content: –Ndeha ianao misasa maso any amin’ny dobo Silôà
  - type: note
    content: 'Ny dobo Silôà dia tao anatin’ny mandan’i Jerosalema: jereo 2 Mp 20.20; Is 8.6 sy nta.'
  - type: text
    content: . (Silôà dia midika hoe «Nirahina».)
  - type: text
    content: 'Dia lasa nankany izy ary nisasa maso ka nahiratra rehefa niverina. '
  '8':
  - type: text
    content: 'Tamin’izay ireo mpiara-monina aminy sy ireo olona nahita fa mpangataka izy taloha, dia nanao hoe:'
  - type: text
    content: –Tsy ity ve ilay nipetraka nangataka?
  - type: text
    content: 'Ka hoy ny sasany:'
  - type: text
    content: –Izy io!
  '9':
  - type: text
    content: 'Fa hoy ny sasany:'
  - type: text
    content: –Tsia, fa olona mitovy aminy!
  - type: text
    content: 'Ralehilahy kosa nilaza hoe:'
  - type: text
    content: –Izaho mihitsy ity!
