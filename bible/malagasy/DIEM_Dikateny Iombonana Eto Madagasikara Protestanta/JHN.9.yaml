document_id: JHN.9,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ampahiratin’i Jesoa ralehilahy teraka jamba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nandalo ry i Jesoa, dia nahita lehilahy jamba hatry ny vao teraka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny olona taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fomba ahoana àry no nahiratan’ny masonao?
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ilay Lehilahy atao hoe Jesoa no nanao feta sy nanosotra ny masoko, dia nanao tamiko hoe: «Ndeha ianao mankany amin’ny dobo Silôà, dia misasà maso.» Koa lasa nankany aho, dia nisasa maso ary nahiratra.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny olona taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza moa izany Lehilahy izay?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy fantatro!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fotopotorin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' ilay jamba sitrana'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nentin’ny olona tany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' ilay jamba taloha. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' no nanaovan’i Jesoa ny feta sy nampahiratany maso azy; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa ireo Farisianina indray no nanontany ilay jamba taloha ny amin’ny fomba nahiratany, ary izao no navaliny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nasiany feta ny masoko, dia nisasa maso aho ka nahiratra!
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay ny sasany tamin’ireo Farisianina dia nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy avy amin’Andriamanitra izany Lehilahy izany, satria tsy mitandrina ny fepetra momba ny sabata!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sasany kosa nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fomba ahoana moa no ahafahan’olona mpanota manao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famantarana
    - type: text
      text: ' toy ireny?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisara-tsaina ry zareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray ireto Farisianina tamin’ilay jamba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianao kosa, ahoana no mba ilazanao Azy, raha nampahiratra ny masonao Izy?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpaminany
    - type: text
      text: ' Izy.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay ny manampahefana jiosy dia tsy nino hoe jamba taloha ralehilahy ka nahiratra, ambara-piantson-dry zareo ny ray aman-dreniny '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nanontaniany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ralehilahy io ve no zanakareo izay lazainareo fa teraka jamba? Fomba ahoana àry no nahiratany ankehitriny?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany an’i Jesoa ny mpianany nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mpampianatra ô, iza moa no nanota, ralehilahy io sa ny ray aman-dreniny, no dia teraka jamba izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 20.5.
      marker-yv: yv-n
    - type: text
      text: '?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia izao no navalin’ny ray aman-dreniny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fantatray fa izy io dia zanakay sady teraka jamba; '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: fa tsy fantatray ny fomba nahiratany ankehitriny, ary tsy fantatray koa izay olona nampahiratra ny masony. Izy anontaniana fa efa lehibe, ka dia izy ihany no hilaza ny amin’ny tenany.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no tenin’ny ray aman-dreniny noho izy ireo natahotra ny manampahefana jiosy; satria efa nifanaraka ny manampahefana jiosy fa raha manaiky an’i Jesoa ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: ', dia horoahina hiala amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka izany no nitenenan’ny ray aman-dreniny hoe: «Efa lehibe izy, ka izy anontaniana!»'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nantsoin’ireo Farisianina indray ilay jamba taloha, ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lazao ny marina eo anatrehan’Andriamanitra! Izahay aloha dia tsy mahalala fa mpanota iny Lehilahy iny.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny navaliny azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy fantatro na mpanota Izy na tsia; zavatra iray ihany no fantatro: jamba aho taloha fa mahiratra ankehitriny.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no nataony taminao? Fomba ahoana no nampahiratany ny masonao?
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa voalazako taminareo, fa tsy nohenoinareo! Ka ahoana no itiavanareo mihaino izany indray? Te ho tonga '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' koa ve ianareo?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia notevatevain’ireo Farisianina ralehilahy sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianao no mpianany fa izahay mpianatr’i Mosesy. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fantatray fa i Mosesy dia nitenenan’Andriamanitra; ilay iny kosa tsy fantatray izay ipoirany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy izy no nanota na ny ray aman-dreniny, fa mba hanehoana ny asan’Andriamanitra eo aminy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny ralehilahy ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izany tokoa no mahagaga: tsy fantatrareo izay ipoirany, nefa nampahiratra ny masoko Izy! '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fantatsika fa Andriamanitra tsy mihaino ny mpanota; fa izay tia vavaka sy manao ny sitrapony no henoiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 1.15; Sal 34.16; 66.18; Ohab 15.29.
      marker-yv: yv-n
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hatrizay hatrizay dia tsy mbola nandrenesana fa hoe nisy nampahiratra mason’olona teraka jamba. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Raha toa tsy avy amin’Andriamanitra izany Lehilahy izany, dia tsy hahefa na inona na inona.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly kosa ry zareo ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tena teraka tanatin’ny ota ianao, ka ianao indray ve no mampianatra anay?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia noroahin’ny Farisianina hiala amin’ny sinagôga ilay jamba taloha.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hajambam-po
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ren’i Jesoa fa voaroaka hiala amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' ilay jamba taloha, ka nony hitany dia nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mino ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' ve ianao?'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa no Izy, Tompoko, mba hinoako Azy?
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa nahita Azy ianao, ary Ilay miresaka aminao izao no Izy!
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ralehilahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mino aho, Tompoko!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sady niankohoka teo anatrehany izy.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ho fitsarana no nahatongavako eto amin’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ', mba hahiratra izay tsy mahiratra ary ho tonga jamba izay mahiratra!'
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Isika tsy maintsy manao ny asan’Ilay naniraka Ahy, raha mbola antoandro; fa ho avy ny alina izay tsy ahafahan’iza na iza miasa! '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandre izany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' sasany teo ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izahay koa ve jamba?
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha jamba ianareo, dia tsy ho nanan-keloka; fa noho ianareo ankehitriny manao hoe: «Mahiratra izahay», dia tsy afaka ny helokareo.'
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Raha mbola eo amin’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' Aho, dia fahazavana ho an’izao tontolo izao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 8.12 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony avy nilaza izany Izy, dia nandrora tamin’ny tany sy nanao feta tamin’ny rorany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mk 8.23.
      marker-yv: yv-n
    - type: text
      text: ', ka nanosotra feta ny mason’ilay jamba '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha ianao misasa maso any amin’ny dobo Silôà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny dobo Silôà '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia tao anatin’ny mandan’i Jerosalema: jereo 2 Mp 20.20; Is 8.6 sy nta.'
      marker-yv: yv-n
    - type: text
      text: . (Silôà dia midika hoe «Nirahina».)
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa nankany izy ary nisasa maso ka nahiratra rehefa niverina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay ireo mpiara-monina aminy sy ireo olona nahita fa mpangataka izy taloha, dia nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy ity ve ilay nipetraka nangataka?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny sasany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izy io!
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny sasany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, fa olona mitovy aminy!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ralehilahy kosa nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho mihitsy ity!
