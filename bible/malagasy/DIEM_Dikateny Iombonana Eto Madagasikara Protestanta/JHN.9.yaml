document_id: JHN.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampahiratin’i Jesoa ralehilahy teraka jamba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha nandalo ry i Jesoa, dia nahita lehilahy jamba hatry ny vao teraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nanontany an’i Jesoa ny mpianany nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, iza moa no nanota, ralehilahy io sa ny ray aman-dreniny, no dia teraka jamba izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 20.5.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy izy no nanota na ny ray aman-dreniny, fa mba hanehoana ny asan’Andriamanitra eo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Isika tsy maintsy manao ny asan’Ilay naniraka Ahy, raha mbola antoandro; fa ho avy ny alina izay tsy ahafahan’iza na iza miasa! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha mbola eo amin’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ' Aho, dia fahazavana ho an’izao tontolo izao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 8.12 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nony avy nilaza izany Izy, dia nandrora tamin’ny tany sy nanao feta tamin’ny rorany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mk 8.23.
    marker-yv: yv-n
  - type: text
    text: ', ka nanosotra feta ny mason’ilay jamba '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndeha ianao misasa maso any amin’ny dobo Silôà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny dobo Silôà '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia tao anatin’ny mandan’i Jerosalema: jereo 2 Mp 20.20; Is 8.6 sy nta.'
    marker-yv: yv-n
  - type: text
    text: . (Silôà dia midika hoe «Nirahina».)
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia lasa nankany izy ary nisasa maso ka nahiratra rehefa niverina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’izay ireo mpiara-monina aminy sy ireo olona nahita fa mpangataka izy taloha, dia nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy ity ve ilay nipetraka nangataka?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny sasany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izy io!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy ny sasany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, fa olona mitovy aminy!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ralehilahy kosa nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho mihitsy ity!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny olona taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fomba ahoana àry no nahiratan’ny masonao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ilay Lehilahy atao hoe Jesoa no nanao feta sy nanosotra ny masoko, dia nanao tamiko hoe: «Ndeha ianao mankany amin’ny dobo Silôà, dia misasà maso.» Koa lasa nankany aho, dia nisasa maso ary nahiratra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy ny olona taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza moa izany Lehilahy izay?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy fantatro!
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fotopotorin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' ilay jamba sitrana'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nentin’ny olona tany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' ilay jamba taloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' no nanaovan’i Jesoa ny feta sy nampahiratany maso azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'koa ireo Farisianina indray no nanontany ilay jamba taloha ny amin’ny fomba nahiratany, ary izao no navaliny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nasiany feta ny masoko, dia nisasa maso aho ka nahiratra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’izay ny sasany tamin’ireo Farisianina dia nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy avy amin’Andriamanitra izany Lehilahy izany, satria tsy mitandrina ny fepetra momba ny sabata!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny sasany kosa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fomba ahoana moa no ahafahan’olona mpanota manao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' toy ireny?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nisara-tsaina ry zareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy indray ireto Farisianina tamin’ilay jamba:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao kosa, ahoana no mba ilazanao Azy, raha nampahiratra ny masonao Izy?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpaminany
  - type: text
    text: ' Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tamin’izay ny manampahefana jiosy dia tsy nino hoe jamba taloha ralehilahy ka nahiratra, ambara-piantson-dry zareo ny ray aman-dreniny '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ralehilahy io ve no zanakareo izay lazainareo fa teraka jamba? Fomba ahoana àry no nahiratany ankehitriny?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia izao no navalin’ny ray aman-dreniny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fantatray fa izy io dia zanakay sady teraka jamba; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: fa tsy fantatray ny fomba nahiratany ankehitriny, ary tsy fantatray koa izay olona nampahiratra ny masony. Izy anontaniana fa efa lehibe, ka dia izy ihany no hilaza ny amin’ny tenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izany no tenin’ny ray aman-dreniny noho izy ireo natahotra ny manampahefana jiosy; satria efa nifanaraka ny manampahefana jiosy fa raha manaiky an’i Jesoa ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ', dia horoahina hiala amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ka izany no nitenenan’ny ray aman-dreniny hoe: «Efa lehibe izy, ka izy anontaniana!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nantsoin’ireo Farisianina indray ilay jamba taloha, ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lazao ny marina eo anatrehan’Andriamanitra! Izahay aloha dia tsy mahalala fa mpanota iny Lehilahy iny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ka hoy ny navaliny azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy fantatro na mpanota Izy na tsia; zavatra iray ihany no fantatro: jamba aho taloha fa mahiratra ankehitriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy ireo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no nataony taminao? Fomba ahoana no nampahiratany ny masonao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa voalazako taminareo, fa tsy nohenoinareo! Ka ahoana no itiavanareo mihaino izany indray? Te ho tonga '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' koa ve ianareo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia notevatevain’ireo Farisianina ralehilahy sady nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianao no mpianany fa izahay mpianatr’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fantatray fa i Mosesy dia nitenenan’Andriamanitra; ilay iny kosa tsy fantatray izay ipoirany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia niteny ralehilahy ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izany tokoa no mahagaga: tsy fantatrareo izay ipoirany, nefa nampahiratra ny masoko Izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fantatsika fa Andriamanitra tsy mihaino ny mpanota; fa izay tia vavaka sy manao ny sitrapony no henoiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 1.15; Sal 34.16; 66.18; Ohab 15.29.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hatrizay hatrizay dia tsy mbola nandrenesana fa hoe nisy nampahiratra mason’olona teraka jamba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Raha toa tsy avy amin’Andriamanitra izany Lehilahy izany, dia tsy hahefa na inona na inona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Namaly kosa ry zareo ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tena teraka tanatin’ny ota ianao, ka ianao indray ve no mampianatra anay?
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia noroahin’ny Farisianina hiala amin’ny sinagôga ilay jamba taloha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hajambam-po
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ren’i Jesoa fa voaroaka hiala amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' ilay jamba taloha, ka nony hitany dia nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mino ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' ve ianao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa no Izy, Tompoko, mba hinoako Azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nahita Azy ianao, ary Ilay miresaka aminao izao no Izy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ka hoy ralehilahy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mino aho, Tompoko!
- type: usfm
  marker: p
  children:
  - type: text
    text: Sady niankohoka teo anatrehany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hoy i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho fitsarana no nahatongavako eto amin’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ', mba hahiratra izay tsy mahiratra ary ho tonga jamba izay mahiratra!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nandre izany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' sasany teo ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izahay koa ve jamba?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha jamba ianareo, dia tsy ho nanan-keloka; fa noho ianareo ankehitriny manao hoe: «Mahiratra izahay», dia tsy afaka ny helokareo.'
