document_id: PSA.98
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Ankalazao ny Tompo Izay tamy hifehy ny tany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Salamo nataon’i Davida
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihirà hira vao ho an’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nahavita zava-mahagaga Izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hery sy ny fahefana ananany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nampiasainy hahazoam-pandresena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia nampahafantarin’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany fandresena izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo anatrehan’ireo firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no nanehoany fa mpanafaka Izy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy nohadinoin’ny Tompo, ry terak’i Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny naneho fitia sy toetra mahatoky tamintsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia hitan’ny vahoaka hatrany am-paran’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nandresy tokoa ilay Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mihobia ny TOMPO, ry mponin’ny tany tontolo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy manakoako ny horakora-pifaliana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny feon’ireo zava-maneno.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mankalazà ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: amim-baliha sy feon-kira;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mihobia ilay TOMPO Mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny trompetra sy feon’anjomara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka hirohondrohona ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’izay rehetra ao anatiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hiredona hira ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mponina ao aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka hiteha-tanana ny ony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny tendrombohitra hihoby
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mba hitsena ny TOMPO satria tamy Izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tamy Izy mba hifehy ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hifehy ny tontolo araka ny rariny Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hifehy ny firenena araka ny hitsiny.
