document_id: PSA.98,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ankalazao ny Tompo Izay tamy hifehy ny tany
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida
  - type: text
    content: .
  - type: text
    content: Mihirà hira vao ho an’ny TOMPO
  - type: text
    content: fa nahavita zava-mahagaga Izy!
  - type: text
    content: Ny hery sy ny fahefana ananany
  - type: text
    content: no nampiasainy hahazoam-pandresena.
  '2':
  - type: text
    content: Dia nampahafantarin’ny TOMPO
  - type: text
    content: izany fandresena izany;
  - type: text
    content: teo anatrehan’ireo firenena
  - type: text
    content: 'no nanehoany fa mpanafaka Izy:'
  '3':
  - type: text
    content: Tsy nohadinoin’ny Tompo, ry terak’i Israely,
  - type: text
    content: ny naneho fitia sy toetra mahatoky tamintsika;
  - type: text
    content: ka dia hitan’ny vahoaka hatrany am-paran’ny tany
  - type: text
    content: fa nandresy tokoa ilay Andriamanitsika.
  '4':
  - type: text
    content: Mihobia ny TOMPO, ry mponin’ny tany tontolo;
  - type: text
    content: ataovy manakoako ny horakora-pifaliana
  - type: text
    content: mbamin’ny feon’ireo zava-maneno.
  '5':
  - type: text
    content: Mankalazà ny TOMPO
  - type: text
    content: amim-baliha sy feon-kira;
  '6':
  - type: text
    content: Mihobia ilay TOMPO Mpanjaka
  - type: text
    content: amin’ny trompetra sy feon’anjomara.
  '7':
  - type: text
    content: Aoka hirohondrohona ny ranomasina
  - type: text
    content: mbamin’izay rehetra ao anatiny
  - type: text
    content: ary aoka hiredona hira ny tany
  - type: text
    content: sy ny mponina ao aminy!
  '8':
  - type: text
    content: Aoka hiteha-tanana ny ony
  - type: text
    content: ary aoka ny tendrombohitra hihoby
  '9':
  - type: text
    content: 'mba hitsena ny TOMPO satria tamy Izy:'
  - type: text
    content: eny, tamy Izy mba hifehy ny tany;
  - type: text
    content: dia hifehy ny tontolo araka ny rariny Izy
  - type: text
    content: ary hifehy ny firenena araka ny hitsiny.
