document_id: AMO.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hampamoahan’Andriamanitra ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ry taranak’i Israely, dia ianareo ankohonana rehetra izay nampiakarin’ny TOMPO avy tany Ejipta, henoy izao teny nambarany momba anareo izao:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Amin’ny fianakaviana rehetra eto ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo ihany no nofidiko sy nokarakaraiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho izany, dia hampamoahako anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahadisoana rehetra nataonareo.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy manam-pidiny ny mpaminany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hiara-dalana ve ny olon-droa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy efa nifanaiky?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hanerona ao anaty ala ve ny liona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy mahita remby?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanerongerona ao an-davany ve ny liona tanora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy misy zavatra azony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voan’ny fandrika amin’ny tany ve ny vorona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy nisy sakafo nisarika azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mikatona ve ny fandrika-harato
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy mahazo zavatra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsofina ao an-tanàna ve ny trompetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisahotaka ny vahoaka?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy loza ve ao an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy ny TOMPO no nanao azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Satria tsy manao zavatra ny Tompo ANDRIANANAHARY,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy efa mampahafantatra ny fikasany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' mpanompony.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny liona no nierona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka iza no tsy hatahotra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Tompo ANDRIANANAHARY no niteny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka iza no tsy hampita ny hafatra ampitondrainy?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsarana an’i Samaria
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ataovy re eny an-tafon-tranon’ireo lapa ao Asdôda
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy eny an-tafon-tranon’ireo lapa any Ejipta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka lazao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mivoria eny an-tendrombohitr’i Samaria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Asdôda: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 1.8 sy nta; ny dkt tranainy grika dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asiria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Samaria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': renivohitry ny fanjakan’i Israely avaratra.'
    marker-yv: yv-n
  - type: text
    text: ' ianareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka jereo ny korontana marobe eo anivony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny famoretana mihatra ao anatiny.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa izao no teny hentitry ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy nahalala hanao asa marina ry zareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: zavatra vokatry ny herisetra sy ny fandrobana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no angoniny ho ao an-dapany.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Noho izany, ry Samaria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izao no lazain’ny Tompo ANDRIANANAHARY:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hohodidinin’ny fahavalo ny taninao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: harodany hiala aminao ny mànda-fiarovanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary horobainy ireo lapanao.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famonjena mampalahelo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lazain’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Rehefa misy ondry azon’ny liona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tongotra roa na sombin-tsofina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tongotra roa na sombin-tsofina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 22.12; ampit Gen 31.39.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no tsoahan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ondry'
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy eo am-bavan’ny liona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izany ny amin’ireo Israelita
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mipetraka ao Samaria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo an-joron’ny saofà
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'na eo ambony fandriana malemilemy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vitsivitsy ihany no hovonjena.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Henoinareo ka ambarao amin’ny taranak’i Jakôba:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny teny hentitry ny Tompo ANDRIANANAHARY,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ilay Andriamanitr’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Amin’ny andro hamaliako ny Israely noho ny helony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia horavako ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ao Betela;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hopotehiko ny tandroky ny alitara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Betela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia toerana 15 km eo avaratr’i Jerosalema. Tao no nanorenan’i Jerobôhama I mpanjakan’i Israely ny toeram-panasinana hifaninana amin’ny tempolin’i Jerosalema (jereo 1 Mp 12.26-29). –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tandroky ny alitara
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Jer 17.1 sy nta. –Ny amin’ny fandravana ireo alitara tao Betela dia jereo 2 Mp 23.15.'
    marker-yv: yv-n
  - type: text
    text: ' isanisany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hianjerazera amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hazerako ny trano ririnina sy trano fahavaratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'trano ririnina '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: trano fahavaratra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': maro ireo mpanankarena no nianatra ny mpanjaka, ka nanao trano fonenana roa samihafa ho an’ny ririnina sy fahavaratra.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho simba ny trano miravaka ivoara
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ho fongana ny trano miezinezina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teny hentitry avy amiko TOMPO izany.»
