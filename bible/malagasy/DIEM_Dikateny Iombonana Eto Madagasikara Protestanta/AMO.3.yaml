document_id: AMO.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hampamoahan’Andriamanitra ny vahoakany
  - type: text
    content: 'Ry taranak’i Israely, dia ianareo ankohonana rehetra izay nampiakarin’ny TOMPO avy tany Ejipta, henoy izao teny nambarany momba anareo izao:'
  '10':
  - type: text
    content: 'Fa izao no teny hentitry ny TOMPO:'
  - type: text
    content: «Tsy nahalala hanao asa marina ry zareo;
  - type: text
    content: zavatra vokatry ny herisetra sy ny fandrobana
  - type: text
    content: no angoniny ho ao an-dapany.»
  '11':
  - type: text
    content: Noho izany, ry Samaria,
  - type: text
    content: 'izao no lazain’ny Tompo ANDRIANANAHARY:'
  - type: text
    content: «Hohodidinin’ny fahavalo ny taninao,
  - type: text
    content: harodany hiala aminao ny mànda-fiarovanao,
  - type: text
    content: ary horobainy ireo lapanao.»
  - type: heading
    content: Famonjena mampalahelo
  '12':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Rehefa misy ondry azon’ny liona,
  - type: text
    content: dia tongotra roa na sombin-tsofina
  - type: note
    content: 'tongotra roa na sombin-tsofina: jereo Eks 22.12; ampit Gen 31.39.'
  - type: text
    content: 'no tsoahan’ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry'
  - type: text
    content: avy eo am-bavan’ny liona;
  - type: text
    content: toy izany ny amin’ireo Israelita
  - type: text
    content: izay mipetraka ao Samaria,
  - type: text
    content: eo an-joron’ny saofà
  - type: text
    content: 'na eo ambony fandriana malemilemy:'
  - type: text
    content: Vitsivitsy ihany no hovonjena.»
  - type: heading
    content: Fampitandremana
  '13':
  - type: text
    content: 'Henoinareo ka ambarao amin’ny taranak’i Jakôba:'
  - type: text
    content: ny teny hentitry ny Tompo ANDRIANANAHARY,
  - type: text
    content: 'dia ilay Andriamanitr’izao rehetra izao:'
  '14':
  - type: text
    content: «Amin’ny andro hamaliako ny Israely noho ny helony,
  - type: text
    content: 'dia horavako ireo '
  - type: text
    content: alitara
  - type: text
    content: ' ao Betela;'
  - type: text
    content: hopotehiko ny tandroky ny alitara
  - type: note
    content: 'I Betela dia toerana 15 km eo avaratr’i Jerosalema. Tao no nanorenan’i Jerobôhama I mpanjakan’i Israely ny toeram-panasinana hifaninana amin’ny tempolin’i Jerosalema (jereo 1 Mp 12.26-29). –tandroky ny alitara: jereo Jer 17.1 sy nta. –Ny amin’ny fandravana ireo alitara tao Betela dia jereo 2 Mp 23.15.'
  - type: text
    content: ' isanisany,'
  - type: text
    content: ka hianjerazera amin’ny tany.
  '15':
  - type: text
    content: Hazerako ny trano ririnina sy trano fahavaratra
  - type: note
    content: 'trano ririnina sy trano fahavaratra: maro ireo mpanankarena no nianatra ny mpanjaka, ka nanao trano fonenana roa samihafa ho an’ny ririnina sy fahavaratra.'
  - type: text
    content: ','
  - type: text
    content: ary ho simba ny trano miravaka ivoara
  - type: text
    content: sady ho fongana ny trano miezinezina.
  - type: text
    content: Teny hentitry avy amiko TOMPO izany.»
  '2':
  - type: text
    content: «Amin’ny fianakaviana rehetra eto ambonin’ny tany,
  - type: text
    content: dia ianareo ihany no nofidiko sy nokarakaraiko;
  - type: text
    content: noho izany, dia hampamoahako anareo
  - type: text
    content: ny fahadisoana rehetra nataonareo.»
  - type: heading
    content: Tsy manam-pidiny ny mpaminany
  '3':
  - type: text
    content: Hiara-dalana ve ny olon-droa,
  - type: text
    content: raha tsy efa nifanaiky?
  '4':
  - type: text
    content: Hanerona ao anaty ala ve ny liona,
  - type: text
    content: raha tsy mahita remby?
  - type: text
    content: Hanerongerona ao an-davany ve ny liona tanora,
  - type: text
    content: raha tsy misy zavatra azony?
  '5':
  - type: text
    content: Voan’ny fandrika amin’ny tany ve ny vorona,
  - type: text
    content: raha tsy nisy sakafo nisarika azy?
  - type: text
    content: Mikatona ve ny fandrika-harato
  - type: text
    content: raha tsy mahazo zavatra?
  '6':
  - type: text
    content: Tsofina ao an-tanàna ve ny trompetra,
  - type: text
    content: ka tsy hisahotaka ny vahoaka?
  - type: text
    content: Misy loza ve ao an-tanàna,
  - type: text
    content: raha tsy ny TOMPO no nanao azy?
  '7':
  - type: text
    content: Satria tsy manao zavatra ny Tompo ANDRIANANAHARY,
  - type: text
    content: raha tsy efa mampahafantatra ny fikasany
  - type: text
    content: 'amin’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' mpanompony.'
  '8':
  - type: text
    content: Ny liona no nierona,
  - type: text
    content: ka iza no tsy hatahotra?
  - type: text
    content: Ny Tompo ANDRIANANAHARY no niteny,
  - type: text
    content: ka iza no tsy hampita ny hafatra ampitondrainy?
  - type: heading
    content: Ny fitsarana an’i Samaria
  '9':
  - type: text
    content: Ataovy re eny an-tafon-tranon’ireo lapa ao Asdôda
  - type: text
    content: sy eny an-tafon-tranon’ireo lapa any Ejipta,
  - type: text
    content: 'ka lazao hoe:'
  - type: text
    content: «Mivoria eny an-tendrombohitr’i Samaria
  - type: note
    content: 'Asdôda: jereo 1.8 sy nta; ny dkt tranainy grika dia manao hoe Asiria. Samaria: renivohitry ny fanjakan’i Israely avaratra.'
  - type: text
    content: ' ianareo,'
  - type: text
    content: ka jereo ny korontana marobe eo anivony
  - type: text
    content: sy ny famoretana mihatra ao anatiny.»
