document_id: PRO.20
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny divay mahatonga ho mpaniratsira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny toaka mahatonga ho mpitabataba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa izay mimamo amin’izany tsy ho hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny fandrahonan’ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mampatahotra toy ny fieron’ny liona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka izay mampahatezitra azy tandindomin-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voninahitry ny olona ny mandositra fifandirana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny adala rehetra kosa no mikiribiby amin’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy mety miasa ny kamo fa ririnina ny andro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa hitady izy amin’ny fotoam-pijinjana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hahita na inona na inona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny hevitra ao ampon’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miafina toy ny rano ao an-kibon’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny manan-tsaina no afaka hanovo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Maro ny olona samy midera tena ny amin’ny soa vitany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa sarotra kosa ny mahita izay olona mahatoky marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Toetra vanona no izoran’ny olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka sambatra izay zanaka handimby azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny mpanjaka, rehefa mipetraka hanao fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mahita ratsy isan-karazany raha vao mijery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Iza no afaka hiteny hoe: «Nandio ny foko aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia voadio ho afaka amin’ny fahotako»?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny vatomizana sy famarana roa karazana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zavatra samy halan’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Na ny zaza aza dia fantatra amin’ny ataony
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsara sy mahitsy ny fitondrantenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny sofina andrenesana sy ny maso ijerena
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zavatra roa samy nataon’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza fatra-pitia torimaso fandrao mihamahantra ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifohaza vao maraina kosa dia ho voky hanina ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoy ny mpividy: «Ratsy! Ratsy!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo rehefa lasa izy, dia faly nahazo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ao ny volamena ary betsaka ny perla;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tenim-pahalalana no vatosoa tsy fahita firy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha misy olona sahy miantoka trosan’olona vahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tano ny akanjony ho antoka ny amin’io olon-tsy fantatra io.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mety mamin’ny olona ny hanina nangalarina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa fasika no hameno ny vavany amin’ny farany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny hevitra tsara no mahatanteraka ny fikasana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tetika voarindra no tokony hoenti-miady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay mifosa namana dia manambara tsiambaratelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa aza mifanerasera amin’ny olona basivava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Raha misy manozona ny rainy na ny reniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho toy ny jiro maty ao anaty haizim-pito ny fiainany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay maika hangoron-karena am-boalohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hotahina any am-parany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aza manao hoe: «Hamaly ny ratsy natao tamiko aho!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa matokia ny TOMPO, dia hamonjy anao Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Halan’ny TOMPO ny vatomizana tsy marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy tsara ny mizana mandainga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 11.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny TOMPO no mampahery ny olona eo amin’ny lalan-kalehany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ahoana moa no hahalalan’olombelona ny hombany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Zava-doza ho an’ny olona ny mora miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Zavatra voatokako ho an’Andriamanitra ity»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny mivoady ka avy eo vao mieritreritra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Kôh 5.3-5.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny mpanjaka hendry misivana ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamela azy hohosen’ny kodiaram-by.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny fanahin’ny olona no jiro omen’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitsilovana ny ao am-po tsy miloaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fitiavana sy toetra mahatoky no miaro ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fampiharana ny marina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'marina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika. Ny RM dia mamerina ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fitiavana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: no mahamafy orina ny fahefàny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny fahatanjahana no haingon’ny tanora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny volofotsy no voninahitry ny antitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny fery mangirifiry dia mety mahafaka ny haratsiam-panahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kapoka mahadio ny ao am-po tsy miloaka.
