document_id: PRO.20,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ny divay mahatonga ho mpaniratsira,
  - type: text
    content: ny toaka mahatonga ho mpitabataba,
  - type: text
    content: koa izay mimamo amin’izany tsy ho hendry.
  '10':
  - type: text
    content: Ny vatomizana sy famarana roa karazana
  - type: text
    content: dia zavatra samy halan’ny TOMPO.
  '11':
  - type: text
    content: Na ny zaza aza dia fantatra amin’ny ataony
  - type: text
    content: raha tsara sy mahitsy ny fitondrantenany.
  '12':
  - type: text
    content: Ny sofina andrenesana sy ny maso ijerena
  - type: text
    content: dia zavatra roa samy nataon’ny TOMPO.
  '13':
  - type: text
    content: Aza fatra-pitia torimaso fandrao mihamahantra ianao;
  - type: text
    content: mifohaza vao maraina kosa dia ho voky hanina ianao.
  '14':
  - type: text
    content: 'Hoy ny mpividy: «Ratsy! Ratsy!»'
  - type: text
    content: Kanjo rehefa lasa izy, dia faly nahazo.
  '15':
  - type: text
    content: Ao ny volamena ary betsaka ny perla;
  - type: text
    content: fa ny tenim-pahalalana no vatosoa tsy fahita firy.
  '16':
  - type: text
    content: Raha misy olona sahy miantoka trosan’olona vahiny,
  - type: text
    content: dia tano ny akanjony ho antoka ny amin’io olon-tsy fantatra io.
  '17':
  - type: text
    content: Mety mamin’ny olona ny hanina nangalarina,
  - type: text
    content: nefa fasika no hameno ny vavany amin’ny farany.
  '18':
  - type: text
    content: Ny hevitra tsara no mahatanteraka ny fikasana;
  - type: text
    content: ary tetika voarindra no tokony hoenti-miady.
  '19':
  - type: text
    content: Izay mifosa namana dia manambara tsiambaratelo;
  - type: text
    content: koa aza mifanerasera amin’ny olona basivava.
  '2':
  - type: text
    content: Ny fandrahonan’ny mpanjaka
  - type: text
    content: dia mampatahotra toy ny fieron’ny liona;
  - type: text
    content: ka izay mampahatezitra azy tandindomin-doza.
  '20':
  - type: text
    content: Raha misy manozona ny rainy na ny reniny,
  - type: text
    content: dia ho toy ny jiro maty ao anaty haizim-pito ny fiainany.
  '21':
  - type: text
    content: Izay maika hangoron-karena am-boalohany,
  - type: text
    content: dia tsy hotahina any am-parany.
  '22':
  - type: text
    content: 'Aza manao hoe: «Hamaly ny ratsy natao tamiko aho!»'
  - type: text
    content: Fa matokia ny TOMPO, dia hamonjy anao Izy.
  '23':
  - type: text
    content: Halan’ny TOMPO ny vatomizana tsy marina;
  - type: text
    content: ary tsy tsara ny mizana mandainga
  - type: note
    content: Jereo 11.1 sy nta.
  - type: text
    content: .
  '24':
  - type: text
    content: Ny TOMPO no mampahery ny olona eo amin’ny lalan-kalehany;
  - type: text
    content: fa ahoana moa no hahalalan’olombelona ny hombany?
  '25':
  - type: text
    content: 'Zava-doza ho an’ny olona ny mora miteny hoe:'
  - type: text
    content: «Zavatra voatokako ho an’Andriamanitra ity»,
  - type: text
    content: na ny mivoady ka avy eo vao mieritreritra
  - type: note
    content: Jereo Kôh 5.3-5.
  - type: text
    content: .
  '26':
  - type: text
    content: Ny mpanjaka hendry misivana ny olon-dratsy
  - type: text
    content: ka mamela azy hohosen’ny kodiaram-by.
  '27':
  - type: text
    content: Ny fanahin’ny olona no jiro omen’ny TOMPO
  - type: text
    content: mba hitsilovana ny ao am-po tsy miloaka.
  '28':
  - type: text
    content: Fitiavana sy toetra mahatoky no miaro ny mpanjaka;
  - type: text
    content: ary fampiharana ny marina
  - type: note
    content: 'marina: araka ny dkt tranainy grika. Ny RM dia mamerina ny hoe fitiavana.'
  - type: text
    content: no mahamafy orina ny fahefàny.
  '29':
  - type: text
    content: Ny fahatanjahana no haingon’ny tanora,
  - type: text
    content: ary ny volofotsy no voninahitry ny antitra.
  '3':
  - type: text
    content: Voninahitry ny olona ny mandositra fifandirana;
  - type: text
    content: fa ny adala rehetra kosa no mikiribiby amin’izany.
  '30':
  - type: text
    content: Ny fery mangirifiry dia mety mahafaka ny haratsiam-panahy,
  - type: text
    content: ary ny kapoka mahadio ny ao am-po tsy miloaka.
  '4':
  - type: text
    content: Tsy mety miasa ny kamo fa ririnina ny andro;
  - type: text
    content: nefa hitady izy amin’ny fotoam-pijinjana
  - type: text
    content: fa tsy hahita na inona na inona.
  '5':
  - type: text
    content: Ny hevitra ao ampon’ny olona
  - type: text
    content: dia miafina toy ny rano ao an-kibon’ny tany,
  - type: text
    content: ka ny manan-tsaina no afaka hanovo aminy.
  '6':
  - type: text
    content: Maro ny olona samy midera tena ny amin’ny soa vitany;
  - type: text
    content: fa sarotra kosa ny mahita izay olona mahatoky marina.
  '7':
  - type: text
    content: Toetra vanona no izoran’ny olo-marina;
  - type: text
    content: ka sambatra izay zanaka handimby azy.
  '8':
  - type: text
    content: Ny mpanjaka, rehefa mipetraka hanao fitsarana,
  - type: text
    content: dia mahita ratsy isan-karazany raha vao mijery.
  '9':
  - type: text
    content: 'Iza no afaka hiteny hoe: «Nandio ny foko aho,'
  - type: text
    content: ka dia voadio ho afaka amin’ny fahotako»?
