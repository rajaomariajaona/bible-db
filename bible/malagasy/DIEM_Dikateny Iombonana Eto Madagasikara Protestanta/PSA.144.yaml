document_id: PSA.144,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaky ny mpanjaka
  - type: text
    content: ' '
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Hisaorana anie ny TOMPO vatolampiko,
  - type: text
    content: Ilay manazatra ahy hamely fahavalo
  - type: text
    content: sy manomana ahy hiady amin’ireo!
  '10':
  - type: text
    content: «Ianao no manome fandresena ny mpanjaka
  - type: text
    content: sy manafaka an’i Davida mpanomponao.»
  '11':
  - type: text
    content: Vonjeo tsy ho voan’ny sabatry ny olon-dratsy
  - type: note
    content: Ny firîndran’ny rijan-teny hebreo dia manainga hanambatra ny hoe (izay mamarana ny and 10) amin’ny and 11, araka ny efa nataon’ny dkt grika tranainy rahateo.
  - type: text
    content: ' aho,'
  - type: text
    content: afaho amin’ny famelezan’ny hafa firenena,
  - type: text
    content: izay miteny fitaka ny vavany
  - type: text
    content: ary fianianana tsy marina
  - type: text
    content: no anandratany tanana ankavanana
  '12':
  - type: text
    content: 'Ny zanakay lahy anie ho toy ny zana-kazo:'
  - type: text
    content: toy ny hazo tanora maroroka fitsiry!
  - type: text
    content: Ny zanakay vavy anie ho toy ny andry fehizoro,
  - type: text
    content: izay tsara sokitra toy ny any an-dapa!
  '13':
  - type: text
    content: Ny sompitray anie ho feno hika,
  - type: text
    content: ho hipoka vokatra isan-karazany!
  - type: text
    content: Ny biby fiompy any an-tsahanay anie
  - type: text
    content: hitombo arivoarivo sy alinalina!
  '14':
  - type: text
    content: Ny mpiandany aminay no hizaka ny mafy,
  - type: text
    content: ka ny mandanay anie tsy hisy banga!
  - type: text
    content: Samy tsy hisy koa na ny faharesena
  - type: text
    content: na ny fibabababàna eny an-kianja!
  '15':
  - type: text
    content: Sambatra ny firenena
  - type: text
    content: izay hahazo fanambinana toy izany!
  - type: text
    content: Sambatra ny firenena
  - type: text
    content: izay manana ny TOMPO ho Andriamanitra!
  '2':
  - type: text
    content: Izy no fialofako sy fonena-mimandako
  - type: text
    content: fiarovana avo sy mpanafaka ahy.
  - type: text
    content: Izy no ampingako sy fiereko,
  - type: text
    content: mampietry firenena maro
  - type: note
    content: firenena maro; araka ny stf maro sy ny dkt tranainy maro ary ny Sal 18.48; ny TM kosa manao hoe ny vahoakako.
  - type: text
    content: hanoa ahy.
  '3':
  - type: text
    content: TOMPO ô, mba inona moa ny olombelona no ahînao
  - type: text
    content: sy izay zanak’olombelona no karakarainao?
  '4':
  - type: text
    content: Fa ny olombelona toa tsio-drivotra ihany;
  - type: text
    content: ny androm-piainany toa aloka mihelina
  - type: note
    content: Jereo Sal 8.5; ampit Jôb 7.17-18.
  - type: text
    content: .
  '5':
  - type: text
    content: TOMPO ô, mba aletseo ny lanitra ka midîna;
  - type: text
    content: tendreo ny tendrombohitra hanetona.
  '6':
  - type: text
    content: Ataovy mitselatselatra ny helatra hipariaka;
  - type: text
    content: alefao ny zana-tsipîkanao hifanaretsaka.
  '7':
  - type: text
    content: Ny tananao atsory avy any ambony
  - type: text
    content: mba hisarika ahy ho afaka amin’ny ranobe,
  - type: text
    content: dia amin’ny famelezan’ny hafa firenena,
  '8':
  - type: text
    content: izay miteny fitaka ny vavany
  - type: text
    content: ary fianianana tsy marina
  - type: text
    content: no anandratany tanana ankavanana.
  '9':
  - type: text
    content: Andriamanitra ô, hihirako hira vaovao Ianao
  - type: text
    content: 'ary hankalazaiko amin’ny valiha torifolo:'
