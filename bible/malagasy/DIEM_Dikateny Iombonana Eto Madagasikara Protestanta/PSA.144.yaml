document_id: PSA.144
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Vavaky ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisaorana anie ny TOMPO vatolampiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay manazatra ahy hamely fahavalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manomana ahy hiady amin’ireo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izy no fialofako sy fonena-mimandako
- type: usfm
  marker: q1
  children:
  - type: text
    text: fiarovana avo sy mpanafaka ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no ampingako sy fiereko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampietry firenena maro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '144.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'firenena maro; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny stf maro sy ny dkt tranainy maro ary ny Sal 18.48; ny TM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny vahoakako
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: hanoa ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: TOMPO ô, mba inona moa ny olombelona no ahînao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay zanak’olombelona no karakarainao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ny olombelona toa tsio-drivotra ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny androm-piainany toa aloka mihelina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '144.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 8.5; ampit Jôb 7.17-18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: TOMPO ô, mba aletseo ny lanitra ka midîna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tendreo ny tendrombohitra hanetona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ataovy mitselatselatra ny helatra hipariaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alefao ny zana-tsipîkanao hifanaretsaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny tananao atsory avy any ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hisarika ahy ho afaka amin’ny ranobe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny famelezan’ny hafa firenena,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: izay miteny fitaka ny vavany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fianianana tsy marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anandratany tanana ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Andriamanitra ô, hihirako hira vaovao Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hankalazaiko amin’ny valiha torifolo:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: «Ianao no manome fandresena ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manafaka an’i Davida mpanomponao.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vonjeo tsy ho voan’ny sabatry ny olon-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '144.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny firîndran’ny rijan-teny hebreo dia manainga hanambatra ny hoe (izay mamarana ny and 10) amin’ny and 11, araka ny efa nataon’ny dkt grika tranainy rahateo.
    marker-yv: yv-n
  - type: text
    text: ' aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: afaho amin’ny famelezan’ny hafa firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay miteny fitaka ny vavany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fianianana tsy marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anandratany tanana ankavanana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny zanakay lahy anie ho toy ny zana-kazo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny hazo tanora maroroka fitsiry!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanakay vavy anie ho toy ny andry fehizoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsara sokitra toy ny any an-dapa!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny sompitray anie ho feno hika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho hipoka vokatra isan-karazany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny biby fiompy any an-tsahanay anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitombo arivoarivo sy alinalina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny mpiandany aminay no hizaka ny mafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny mandanay anie tsy hisy banga!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy tsy hisy koa na ny faharesena
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny fibabababàna eny an-kianja!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sambatra ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hahazo fanambinana toy izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manana ny TOMPO ho Andriamanitra!
