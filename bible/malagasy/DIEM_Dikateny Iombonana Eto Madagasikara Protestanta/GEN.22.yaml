document_id: GEN.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Vonona hanao sorona an’i Itsehàka i Abrahama
  - type: text
    content: 'Taorian’izany toe-javatra izany, dia nizaha toetra an’i Abrahama Andriamanitra ka niantso azy hoe:'
  - type: text
    content: –Ry Abrahama!
  - type: text
    content: 'Dia namaly i Abrahama hoe:'
  - type: text
    content: –Inty aho.
  '10':
  - type: text
    content: 'Ary naninji-tanana handray ny antsy i Abrahama mba hamonoana ny zanany. '
  '11':
  - type: text
    content: 'Fa niantso azy avy any an-danitra ny '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny TOMPO ka nanao hoe:'
  - type: text
    content: –Abrahama ô! Abrahama ô!
  - type: text
    content: 'Hoy kosa ny navalin’i Abrahama azy:'
  - type: text
    content: –Inty aho.
  '12':
  - type: text
    content: 'Dia hoy indray ilay anjely:'
  - type: text
    content: –Aza maninji-tanana amin’io zazalahy io ianao ary aza manao aminy na inona na inona akory, satria fantatro ankehitriny fa manaja Ahy ianao; ka, na dia ny zanaka lahitokanao aza, dia tsy narovanao tamiko.
  '13':
  - type: text
    content: 'Dia nanopy maso i Abrahama ka nahatazana ondrilahy iray voasarangotry ny kirihitr’ala ny tandrony; dia lasa i Abrahama naka ilay ondrilahy, ka nanolotra azy ho sorona dorana manontolo ho solon’ny zanany lahy. '
  '14':
  - type: text
    content: 'Dia nataon’i Abrahama hoe «Ny TOMPO no hahita» ny anaran’izany toerana izany ary mbola fiteny ankehitriny ny hoe: «Any an-tendrombohitra ny TOMPO no hahita'
  - type: note
    content: Jereo and 8.
  - type: text
    content: .»
  '15':
  - type: text
    content: 'Ary ny anjelin’ny TOMPO niantso an’i Abrahama fanindroany avy tany an-danitra '
  '16':
  - type: text
    content: 'ka nanao taminy hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO noho ianao nanao izany zavatra izany, ka tsy niaro ny zanakao lahitokanao tamiko, dia ny tenako no ianianako '
  '17':
  - type: text
    content: 'fa '
  - type: text
    content: hitahy
  - type: text
    content: ' anao tokoa Aho ka hahamaro dia hahamaro ny taranakao ho tahaka ny kintana eny an-danitra na ny fasika eny amoron-dranomasina. Ary ny taranakao dia haka ny tanànan’ireo fahavalony'
  - type: note
    content: 'Momba ny fianianan’Andriamanitra: jereo Heb 6.13-14. –hahamaro: Heb 11.12.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: Amin’ny alalan’ny taranakao no hitahiana ny firenena rehetra eto an-tany, satria ianao nihaino ny feoko
  - type: note
    content: Jereo Gen 12.3 sy nta.
  - type: text
    content: .
  '19':
  - type: text
    content: Dia niverina nankeny amin’ny zatovony i Abrahama. Niainga izy rehetra ka niaraka nankany Beera-Seba; dia teo no niorim-ponenana i Abrahama.
  '2':
  - type: text
    content: 'Dia hoy Andriamanitra hoe:'
  - type: text
    content: '–Ento i Itsehàka zanakao lahitokana izay tianao; dia mandehana any amin’ny tany Môrià eo ambonin’ny tendrombohitra anankiray izay holazaiko anao, ka atolory ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana eo izy'
  - type: note
    content: 'Môrià: jereo 2 Tan 3.1. –atolory ho sorona dorana eo izy: jereo Heb 11.17-19.'
  - type: text
    content: .
  '20':
  - type: text
    content: 'Taorian’izany, dia ren’i Abrahama fa tera-dahy maro tamin’i Nahôra rahalahiny koa i Milkà: '
  '21':
  - type: text
    content: 'dia i Hotsa lahimatoa sy i Boza rahalahiny, i Kemoela rain’i Arama, '
  '22':
  - type: text
    content: 'i Keseda sy i Hazao, i Pildasy sy i Jildafa ary i Betoela. '
  '23':
  - type: text
    content: 'Izy valo lahy no naterak’i Milkà tamin’i Nahôra rahalahin’i Abrahama. I Betoela no rain’i Rebekà. '
  '24':
  - type: text
    content: Mbola nanana vadikely natao hoe Reomà i Nahôra ka niterahany an’i Teba sy i Gahama ary i Tahasa sy i Mahekà.
  '3':
  - type: text
    content: 'Dia nifoha vao maraina be i Abrahama nony ampitso. Namaky kitay hanaovana sorona izy, dia nanisy lasely ny borikiny ary niainga ho any amin’ny toerana izay voatondron’Andriamanitra. Nentiny niaraka taminy koa ny zatovony roa lahy sy i Itsehàka zanany lahy. '
  '4':
  - type: text
    content: 'Nony afaka ampitso maraina dia tazan’i Abrahama tery lavitra tery ny tendrombohitra izay halehany. '
  '5':
  - type: text
    content: 'Koa hoy izy tamin’ireo zatovony roa lahy:'
  - type: text
    content: –Mijanòna eto ianareo miaraka amin’ny boriky, fa izaho sy ny zazalahy handeha hatreny an-tendrombohitra mba hivavaka amin’Andriamanitra, dia hiverina aty aminareo indray.
  '6':
  - type: text
    content: 'Dia nalain’i Abrahama ny kitay hanaovana sorona ka natataony an’i Itsehàka zanany; fa izy kosa nitondra ny vainafo sy ny antsy. Ary raha mbola niara-nandeha izy mianaka, '
  '7':
  - type: text
    content: 'dia hoy i Itsehàka tamin’i Abrahama rainy:'
  - type: text
    content: –Dada ô!
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Mihaino anao aho, anaka.
  - type: text
    content: 'Ary hoy i Itsehàka hoe:'
  - type: text
    content: –Indreo ny vainafo sy ny kitay, fa aiza kosa ny zanak’ondry hatao sorona dorana manontolo?
  '8':
  - type: text
    content: 'Fa namaly azy i Abrahama hoe:'
  - type: text
    content: –Andriamanitra no hahita izay zanak’ondry hatao sorona dorana manontolo, anaka!
  - type: text
    content: 'Dia niara-nanohy ny diany izy mianaka. '
  '9':
  - type: text
    content: 'Rehefa tonga teo amin’ny toerana izay voatondron’Andriamanitra izy ireo, dia nanorina '
  - type: text
    content: alitara
  - type: text
    content: ' teo i Abrahama sady nandahatra ny kitay. Dia namatotra an’i Itsehàka zanany izy, ka nametraka azy teo amin’ny alitara, teo ambony kitay. '
