document_id: GEN.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vonona hanao sorona an’i Itsehàka i Abrahama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany toe-javatra izany, dia nizaha toetra an’i Abrahama Andriamanitra ka niantso azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Abrahama!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia namaly i Abrahama hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inty aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy Andriamanitra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ento i Itsehàka zanakao lahitokana izay tianao; dia mandehana any amin’ny tany Môrià eo ambonin’ny tendrombohitra anankiray izay holazaiko anao, ka atolory ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana eo izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Môrià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Tan 3.1. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'atolory ho sorona dorana eo izy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Heb 11.17-19.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nifoha vao maraina be i Abrahama nony ampitso. Namaky kitay hanaovana sorona izy, dia nanisy lasely ny borikiny ary niainga ho any amin’ny toerana izay voatondron’Andriamanitra. Nentiny niaraka taminy koa ny zatovony roa lahy sy i Itsehàka zanany lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony afaka ampitso maraina dia tazan’i Abrahama tery lavitra tery ny tendrombohitra izay halehany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa hoy izy tamin’ireo zatovony roa lahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mijanòna eto ianareo miaraka amin’ny boriky, fa izaho sy ny zazalahy handeha hatreny an-tendrombohitra mba hivavaka amin’Andriamanitra, dia hiverina aty aminareo indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nalain’i Abrahama ny kitay hanaovana sorona ka natataony an’i Itsehàka zanany; fa izy kosa nitondra ny vainafo sy ny antsy. Ary raha mbola niara-nandeha izy mianaka, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia hoy i Itsehàka tamin’i Abrahama rainy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Dada ô!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mihaino anao aho, anaka.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy i Itsehàka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indreo ny vainafo sy ny kitay, fa aiza kosa ny zanak’ondry hatao sorona dorana manontolo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa namaly azy i Abrahama hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andriamanitra no hahita izay zanak’ondry hatao sorona dorana manontolo, anaka!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niara-nanohy ny diany izy mianaka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa tonga teo amin’ny toerana izay voatondron’Andriamanitra izy ireo, dia nanorina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' teo i Abrahama sady nandahatra ny kitay. Dia namatotra an’i Itsehàka zanany izy, ka nametraka azy teo amin’ny alitara, teo ambony kitay. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary naninji-tanana handray ny antsy i Abrahama mba hamonoana ny zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa niantso azy avy any an-danitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’ny TOMPO ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Abrahama ô! Abrahama ô!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hoy kosa ny navalin’i Abrahama azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inty aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy indray ilay anjely:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza maninji-tanana amin’io zazalahy io ianao ary aza manao aminy na inona na inona akory, satria fantatro ankehitriny fa manaja Ahy ianao; ka, na dia ny zanaka lahitokanao aza, dia tsy narovanao tamiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nanopy maso i Abrahama ka nahatazana ondrilahy iray voasarangotry ny kirihitr’ala ny tandrony; dia lasa i Abrahama naka ilay ondrilahy, ka nanolotra azy ho sorona dorana manontolo ho solon’ny zanany lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nataon’i Abrahama hoe «Ny TOMPO no hahita» ny anaran’izany toerana izany ary mbola fiteny ankehitriny ny hoe: «Any an-tendrombohitra ny TOMPO no hahita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo and 8.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny anjelin’ny TOMPO niantso an’i Abrahama fanindroany avy tany an-danitra '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO noho ianao nanao izany zavatra izany, ka tsy niaro ny zanakao lahitokanao tamiko, dia ny tenako no ianianako '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hitahy
  - type: text
    text: ' anao tokoa Aho ka hahamaro dia hahamaro ny taranakao ho tahaka ny kintana eny an-danitra na ny fasika eny amoron-dranomasina. Ary ny taranakao dia haka ny tanànan’ireo fahavalony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny fianianan’Andriamanitra: jereo Heb 6.13-14. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hahamaro: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Heb 11.12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Amin’ny alalan’ny taranakao no hitahiana ny firenena rehetra eto an-tany, satria ianao nihaino ny feoko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 12.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia niverina nankeny amin’ny zatovony i Abrahama. Niainga izy rehetra ka niaraka nankany Beera-Seba; dia teo no niorim-ponenana i Abrahama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Taorian’izany, dia ren’i Abrahama fa tera-dahy maro tamin’i Nahôra rahalahiny koa i Milkà: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia i Hotsa lahimatoa sy i Boza rahalahiny, i Kemoela rain’i Arama, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'i Keseda sy i Hazao, i Pildasy sy i Jildafa ary i Betoela. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izy valo lahy no naterak’i Milkà tamin’i Nahôra rahalahin’i Abrahama. I Betoela no rain’i Rebekà. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mbola nanana vadikely natao hoe Reomà i Nahôra ka niterahany an’i Teba sy i Gahama ary i Tahasa sy i Mahekà.
