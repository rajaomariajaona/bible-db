document_id: JOB.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Tenin’i Bildada: fandrika ho an’ny ratsy fanahy'
  - type: text
    content: 'Dia niteny indray Bildada avy any Soha ka nanao hoe:'
  '10':
  - type: text
    content: Miafina eo amin’ny tany eo ny tady hamingana azy;
  - type: text
    content: ary efa misy longoa mitoto-bozaka eny an-dàlany.
  '11':
  - type: text
    content: Manemitra azy hatraiza hatraiza ny horohoro
  - type: text
    content: ary manara-dia azy amin’izay alehany.
  - type: heading
    content: '*'
  '12':
  - type: text
    content: Lanin’ny mosary ny fahavitrihan’ny olon-dratsy
  - type: text
    content: ary mitoetra eo anilany ny fahantrana.
  '13':
  - type: text
    content: Eny, laniny tsikelikely ny sombin-kodiny,
  - type: text
    content: ary kikisan’ny areti-mandoza ny rantsam-batany.
  '14':
  - type: text
    content: Hoesorina amin’ny fonenany azo antoka izy
  - type: text
    content: ka hoentina eo anatrehan’ilay mpanjaka Rafahafatesana.
  '15':
  - type: text
    content: Tsy misy mpipetraka ny tranony ka azo itoerana,
  - type: text
    content: dia hofafazana solifara ny faritra fonenany
  - type: note
    content: Fihetsika tsy dia mazava loatra ny heviny; amin’ny sasany ny solifara dia manana toetra manadio, fa amin’ny hafa kosa dia mahatonga ny tany tsy hamokatra izy.
  - type: text
    content: .
  '16':
  - type: text
    content: Fa ho tonga toy ny hazo efa ho faty izy;
  - type: text
    content: mihamaina ny fakany avy ao ambany
  - type: text
    content: ary mihamalazo ny raviny avy any ambony.
  - type: heading
    content: '*'
  '17':
  - type: text
    content: Ho foana eto amin’ity tany ity
  - type: text
    content: ny fahatsiarovana ny olon-dratsy,
  - type: text
    content: ary efa hadino hatrany ivelany ny anarany.
  '18':
  - type: text
    content: Hakifika hiala amin’ny mazava hankamin’ny haizina izy
  - type: text
    content: ary horoahina hiala amin’izao tontolon’ny velona izao.
  '19':
  - type: text
    content: Ho lany tamingana tsy hamela taranaka izy
  - type: text
    content: ary tsy hisy ho velona ny ao amin’ny fonenany.
  '2':
  - type: text
    content: Rahoviana no hatsahatrareo roa lahy izany teny izany?
  - type: text
    content: Mieritrereta aloha ianareo; izay isika vao miresaka!
  '20':
  - type: text
    content: Igagan’ny any Andrefana ny fahavoazany,
  - type: text
    content: ka mampihorohoro ny any Atsinanana.
  '21':
  - type: text
    content: «Toy izany, hoy ireo, no miandry
  - type: text
    content: ny fonenan’ny mpanao ratsy;
  - type: text
    content: izao no manjo ny toerana
  - type: text
    content: izay tsy niekena an’Andriamanitra.»
  '3':
  - type: text
    content: Nahoana no ataon’i Jôba ho donto toy ny biby isika telo lahy?
  - type: text
    content: Sa olona tery saina ve isika eo imasonareo?
  '4':
  - type: text
    content: Ary ianao kosa, ry Jôba,
  - type: text
    content: izay mampahory tena amin’ny fahatezeranao,
  - type: text
    content: noho ny aminao ve no hahalao ny tany
  - type: text
    content: sy hampifindra toerana ny vatolampy?
  - type: heading
    content: '*'
  '5':
  - type: text
    content: Eny, ho faty tokoa ny jiron’ny olon-dratsy,
  - type: text
    content: ary tsy hirehitra intsony ny lelafony.
  '6':
  - type: text
    content: Ny hazavana hihamaizina ao an-tranony;
  - type: text
    content: ary ho faty ny fanaovan-jiro eo amboniny
  - type: note
    content: 'And 5-6: ampit Jôb 21.17.'
  - type: text
    content: .
  '7':
  - type: text
    content: Hiambakavaka ilay famindrany matoky iny,
  - type: text
    content: ary ho lavon’ny foto-pisainany ihany izy;
  '8':
  - type: text
    content: satria ny tongony no hitarika azy ho amin’ny harato,
  - type: text
    content: ka dia handroso ho voasingotra avy hatrany izy.
  '9':
  - type: text
    content: Ho azon’ny fandrika ny ombalahintongony,
  - type: text
    content: ary hangeja azy mafy ny tadivavarana.
