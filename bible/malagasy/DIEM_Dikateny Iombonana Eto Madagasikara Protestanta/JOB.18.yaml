document_id: JOB.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Tenin’i Bildada: fandrika ho an’ny ratsy fanahy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niteny indray Bildada avy any Soha ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rahoviana no hatsahatrareo roa lahy izany teny izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mieritrereta aloha ianareo; izay isika vao miresaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nahoana no ataon’i Jôba ho donto toy ny biby isika telo lahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa olona tery saina ve isika eo imasonareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ianao kosa, ry Jôba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mampahory tena amin’ny fahatezeranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny aminao ve no hahalao ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hampifindra toerana ny vatolampy?
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eny, ho faty tokoa ny jiron’ny olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hirehitra intsony ny lelafony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny hazavana hihamaizina ao an-tranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho faty ny fanaovan-jiro eo amboniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 5-6:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Jôb 21.17.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hiambakavaka ilay famindrany matoky iny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho lavon’ny foto-pisainany ihany izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: satria ny tongony no hitarika azy ho amin’ny harato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia handroso ho voasingotra avy hatrany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho azon’ny fandrika ny ombalahintongony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hangeja azy mafy ny tadivavarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miafina eo amin’ny tany eo ny tady hamingana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa misy longoa mitoto-bozaka eny an-dàlany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Manemitra azy hatraiza hatraiza ny horohoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manara-dia azy amin’izay alehany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lanin’ny mosary ny fahavitrihan’ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitoetra eo anilany ny fahantrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, laniny tsikelikely ny sombin-kodiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary kikisan’ny areti-mandoza ny rantsam-batany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hoesorina amin’ny fonenany azo antoka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hoentina eo anatrehan’ilay mpanjaka Rafahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsy misy mpipetraka ny tranony ka azo itoerana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hofafazana solifara ny faritra fonenany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fihetsika tsy dia mazava loatra ny heviny; amin’ny sasany ny solifara dia manana toetra manadio, fa amin’ny hafa kosa dia mahatonga ny tany tsy hamokatra izy.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa ho tonga toy ny hazo efa ho faty izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihamaina ny fakany avy ao ambany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihamalazo ny raviny avy any ambony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho foana eto amin’ity tany ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahatsiarovana ny olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa hadino hatrany ivelany ny anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hakifika hiala amin’ny mazava hankamin’ny haizina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary horoahina hiala amin’izao tontolon’ny velona izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ho lany tamingana tsy hamela taranaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy ho velona ny ao amin’ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Igagan’ny any Andrefana ny fahavoazany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampihorohoro ny any Atsinanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: «Toy izany, hoy ireo, no miandry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fonenan’ny mpanao ratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izao no manjo ny toerana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy niekena an’Andriamanitra.»
