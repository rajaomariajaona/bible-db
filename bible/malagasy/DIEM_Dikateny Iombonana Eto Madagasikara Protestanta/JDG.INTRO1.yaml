type_code: plt
verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: Ny fitantarana ao amin’ny bokin’ny
  - type: text
    content: ' Mpitsara '
  - type: text
    content: dia momba ny vanim-potoana mihotakotaka izay manomboka amin’ny fipetrahan’ny Israelita tany Kanahàna ka hatramin’ny fananganana ny fitondrà-mpanjaka. Ny anaran’ny boky dia nateraky ny fahitana fa ny vontoatin’ny boky dia mitantara ireo asa lehibe nataon’ny mpitsara sasany na mamintina ny tantaram-piainany. Ny teny hoe «Mpitsara» dia enti-manondro ireo olona izay nomen’Andriamanitra fahefana ary mitatra mahafaoka sehatra midadasika kokoa noho ny raharaham-pitsarana. Ireny olona ireny dia nomen’Andriamanitra andraikitra mba hitondra ny vahoaka na hanafaka foko iray na maromaro izay tra-pahasahiranana.
  - type: text
    content: Ny bokin’ny
  - type: text
    content: ' Mpitsara '
  - type: text
    content: 'dia misy fizaràna telo lehibe:'
  - type: text
    content: Ny
  - type: text
    content: ' voalohany '
  - type: text
    content: dia mampahatsiaro ireo toe-javatra izay nanamarika ny fidiran’ny Israelita tany Kanahàna ka hatramin’ny nahafatesan’i Josoa (1.1–2.10).
  - type: text
    content: Ny
  - type: text
    content: ' faharoa '
  - type: text
    content: dia mampiseho indrindra ny fomba nanafahan’Andriamanitra ny vahoakany tamin’ny fifidianana sy fanirahana olona izay nanatanteraka mivantana izany fanafahana izany (2.11–16.31).
  - type: text
    content: Ny
  - type: text
    content: ' fizaràna fahatelo '
  - type: text
    content: dia mitatitra tantara anankiroa izay mampisongadina ny korontana nihanaka teo amin’ny foko israelita talohan’ny fananganana ny fitondrà-mpanjaka (17–21).
  - type: text
    content: Ho an’ny Bokin’ny
  - type: text
    content: ' Mpitsara, '
  - type: text
    content: 'izay mitranga amin’i Israely dia miankina amin’ny fifandraisan’io vahoaka io amin’Andriamanitra. Rehefa mivadika amin’Andriamanitra i Israely, dia poretin’ireo valovotaka ao an-toerana sy ireo firenena manodidina azy; ary rehefa miverina amin’Andriamanitra kosa izy ka miantso vonjy aminy, dia manafaka azy Andriamanitra. Kanefa tsy an-kijanona ny Israelita no alaim-panahy hanao fanompoam-pivavahana amin’ireo andriamanitra kanahanita na nanararaotra an’Andriamanitra ho an’ny tombontsoan’ny tenany manokana (17–18) na koa manadino ireo fepetra naroson’Andriamanitra (19–21). Amin’ny fanaovana izany anefa i Israely dia miantso fahavoazana ho an’ny tenany raha tsy Andriamanitra no tonga namonjy azy. Ny fizaràna fahatelo ao amin’ny boky dia maneho indrindra izay tokony ho nanjo ny foko israelita raha navela hanaraka ny danin’ny fony. Aseho ao fa, ho an’ny vahoakan’Andriamanitra, ny zava-dehibe dia ny fahalalana hoe eo ambany fahefana toa inona no tiany hiainana: moa azon’ny olona tsirairay atao ve ny mbola hiaina araka «izay heveriny ho mety?»'
