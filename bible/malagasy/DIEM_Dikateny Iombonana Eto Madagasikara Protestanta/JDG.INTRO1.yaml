    - type: text
      text: Ny fitantarana ao amin’ny bokin’ny
  - type: text
    text: ' Mpitsara '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dia momba ny vanim-potoana mihotakotaka izay manomboka amin’ny fipetrahan’ny Israelita tany Kanahàna ka hatramin’ny fananganana ny fitondrà-mpanjaka. Ny anaran’ny boky dia nateraky ny fahitana fa ny vontoatin’ny boky dia mitantara ireo asa lehibe nataon’ny mpitsara sasany na mamintina ny tantaram-piainany. Ny teny hoe «Mpitsara» dia enti-manondro ireo olona izay nomen’Andriamanitra fahefana ary mitatra mahafaoka sehatra midadasika kokoa noho ny raharaham-pitsarana. Ireny olona ireny dia nomen’Andriamanitra andraikitra mba hitondra ny vahoaka na hanafaka foko iray na maromaro izay tra-pahasahiranana.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny bokin’ny
  - type: text
    text: ' Mpitsara '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'dia misy fizaràna telo lehibe:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny
  - type: text
    text: ' voalohany '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dia mampahatsiaro ireo toe-javatra izay nanamarika ny fidiran’ny Israelita tany Kanahàna ka hatramin’ny nahafatesan’i Josoa (1.1–2.10).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
