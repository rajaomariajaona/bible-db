    - type: text
      text: Ny
  - type: text
    text: ' faharoa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dia mampiseho indrindra ny fomba nanafahan’Andriamanitra ny vahoakany tamin’ny fifidianana sy fanirahana olona izay nanatanteraka mivantana izany fanafahana izany (2.11–16.31).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
