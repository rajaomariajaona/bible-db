    - type: text
      text: Ny
  - type: text
    text: ' fizaràna fahatelo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dia mitatitra tantara anankiroa izay mampisongadina ny korontana nihanaka teo amin’ny foko israelita talohan’ny fananganana ny fitondrà-mpanjaka (17–21).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ho an’ny Bokin’ny
  - type: text
    text: ' Mpitsara, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'izay mitranga amin’i Israely dia miankina amin’ny fifandraisan’io vahoaka io amin’Andriamanitra. Rehefa mivadika amin’Andriamanitra i Israely, dia poretin’ireo valovotaka ao an-toerana sy ireo firenena manodidina azy; ary rehefa miverina amin’Andriamanitra kosa izy ka miantso vonjy aminy, dia manafaka azy Andriamanitra. Kanefa tsy an-kijanona ny Israelita no alaim-panahy hanao fanompoam-pivavahana amin’ireo andriamanitra kanahanita na nanararaotra an’Andriamanitra ho an’ny tombontsoan’ny tenany manokana (17–18) na koa manadino ireo fepetra naroson’Andriamanitra (19–21). Amin’ny fanaovana izany anefa i Israely dia miantso fahavoazana ho an’ny tenany raha tsy Andriamanitra no tonga namonjy azy. Ny fizaràna fahatelo ao amin’ny boky dia maneho indrindra izay tokony ho nanjo ny foko israelita raha navela hanaraka ny danin’ny fony. Aseho ao fa, ho an’ny vahoakan’Andriamanitra, ny zava-dehibe dia ny fahalalana hoe eo ambany fahefana toa inona no tiany hiainana: moa azon’ny olona tsirairay atao ve ny mbola hiaina araka «izay heveriny ho mety?»'
