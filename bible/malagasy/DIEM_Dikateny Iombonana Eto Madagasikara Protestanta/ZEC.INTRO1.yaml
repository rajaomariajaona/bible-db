  - type: text
    content: Sava lalana
  - type: text
    content: –Ny bokin’i
  - type: text
    content: ' Zakarià '
  - type: text
    content: dia azo antsoina hoe ny bokin’ny fanantenana. Asehony amintsika manokana ny fomba nampisoritra sy nampisongadina miandalana ny fanantenàn’ny Israelita.
  - type: text
    content: Mizara roa miavaka tsara io boky io.
  - type: text
    content: Ny fizaràna voalohany (toko 1–8) dia misy ireo faminaniana niseho tany amin’ny taona 520 ka hatramin’ny 518 tal J.K. ary noho izany dia nambaran’olona niara-belona tamin’ny
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: text
    content: ' '
  - type: text
    content: Hagay. Ireo faminaniana ireo matetika dia manana endrika tantaram-pahitana. Ambarany fa ny fanorenana indray ny
  - type: text
    content: ' '
  - type: text
    content: tempoly
  - type: text
    content: ' '
  - type: text
    content: sy ny fanarenana an’i Jerosalema amin’ny maha ivotoerana azy no manamarika ny fidirana amin’ny vanim-potoana iray vaovao. Mba hanokatra izany indrindra no nifidianan’Andriamanitra ny governora Zerobabela ary ny mpisorombe Josoa.
  - type: text
    content: –Tsikelikely ny fanantenàn’i Israely dia hifantoka tanteraka amin’ny fiandrasana ny fotoana izay hanjakan’Andriamanitra amin’ny tany manontolo. Izany fanantenana izany koa anefa dia mifamatotra amin’ny asan’ny olona anankiray voafidin’Andriamanitra.
  - type: text
    content: Ny fizaràna faharoa amin’ny bokin’i Zakarià (toko 9–10), izay voasoratra taoriana kokoa noho ny fizaràna voalohany, dia mbola manamafy ireo foto-javatra roa ireo. Manome filazalazana manokana momba ilay hampijoro ny fanjakan’Andriamanitra izy amin’ny fanehoana azy mifandimby ho mpanjaka malemy fanahy sy mpandresy ary koa ho
  - type: text
    content: ' '
  - type: text
    content: mpiandry
  - type: text
    content: ' '
  - type: text
    content: na koa ho iraka hovonoina. Ireo mpanoratra ny Vaovao Mahafaly dia nandray ireo toetra ireo mba hanehoana kosa ny tenan’i Jesoa sy ny iraka nampanaovina Azy, indrindra ao amin’ireo tantaran’ny fahafatesany (jereo Mt 21.4-5; 26.31; Mk 14.27; Jôh 19.37).
