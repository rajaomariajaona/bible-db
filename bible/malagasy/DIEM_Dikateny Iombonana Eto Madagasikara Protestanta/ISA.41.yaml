document_id: ISA.41,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay mpanompo nirahin’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mponina any amin’ny nosy lavitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mangina ka henoy Aho, hoy ny TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ianareo firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misikîna herim-po.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misehoa aloha vao miteny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary andeha isika hiara-kiatrika fitsarana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra ianao fa miaraka aminao Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza miherikerika foana fa Izaho no Andriamanitrao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampahery anao Aho ary mamonjy anao tokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanan-kavanako manafaka no anohanako anao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro ho menatra sy ho afa-baràka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra naneso anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanjary tsinontsinona sy ho levona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanohitra anao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotadiavinao ireo mpisetrasetra anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ho hitanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanjary tsinontsinona sy zava-poana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo mpiady aminao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria Izaho no TOMPO Andriamanitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mitantana anao amin’ny tanan-kavananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady mamerimberina aminao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aza matahotra, Izaho no hamonjy anao.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tonga hamonjy anao Aho
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry vahoaka Israely, firenen’i Jakôba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lazaina hoe mora vonoina toa kankana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO mihitsy no tonga hamonjy anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho ilay Masin’i Israely no mpanavotra anao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro ianao hataoko toy ny hersa vaovao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay misy nifiny maranitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 28.27 sy nta.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hosamatsamahinao ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hataonao lasa akofa ny havoana.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hokororohinao hoentin’ny rivotra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy haelin’ny tadio;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianao kosa dia Izaho TOMPO no hifalianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho ilay Masin’i Israely no hireharehanao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taniefitra niova ho saha lonaka
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitady rano ny mahantra sy ny malahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy mahita mihitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mainan’ny hetaheta ny lelany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO kosa hihaino azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho Andriamanitr’i Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba handao azy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampiboiboika renirano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny havoana mangadihady Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa loharano eny an-dohasaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanova ny taniefitra ho farihy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tany karakaina ho mpamoaka rano.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko mitsiry hazo sedera sy mimôzà
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rotra sy ôliva any an-taniefitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hasiako kipreso sy hazo kesika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary kirihitr’ala any an-tany hay.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy Izaho ve no nampipoitra ilay Mpanafaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any atsinanana any,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niantso azy hanainga ny diany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nampilavo lefona ny firenena teo anatrehany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny mpaminany eto dia toa manondro an’i Kirôsa mpanjakan’i Persia, na dia tsy mbola manonona anarana azy mivantana aza, satria izy no nandresy haingana an’iny faritra afovoany atsinanana iny ka naka an’i Babilôna tamin’ny taona 539 tal J.K. Jereo 41.25; 44.28; 45.1 sns.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampilefitra ireo mpanjaka?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataon’ny sabany lasa vovoka ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary naelin’ny zana-tsipîkany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny akofa entin’ny rivotra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izay dia ho hitan’ny olona sy ho fantany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tsapany sy ho takany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho TOMPO, ilay Masin’i Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no namboatra sy nahary izany fanovana izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanebahana ny andriamani-tsiizy
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo andriamanitry ny firenen-kafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alaharo ny kabarinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arosoy ny porofonareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny TOMPO mpanjakan’i Jakôba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Eto, tahaka ny ao amin’ny Test. Tal. matetika, ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Jakôba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia manondro ny firenena israelita tsivakivolo; '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpanjakan’i Jakôba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ampit 44.6.'
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manatòna hanazava aminay ny zava-hitranga.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lazao ny zava-niseho voalohany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny zava-niseho voalohany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa filazana ny firotsahan’i Kirôsa an-tsehatra (jereo 41.2 sy nta).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hifantohan’ny fandinihanay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ambarao kosa izay ho avy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho fantatray izay hiafarany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ambarao anay ny zavatra ho avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hoekenay fa andriamanitra tokoa ianareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova soa na manaova ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiarahanay mahita sy mijery.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo indro fa tsinontsinona ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zava-poana ny asa ataonareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izay nifidy anareo ho andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia maharikoriko toa anareo.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy any avaratra no napoitrako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ity lehilahy anankiray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia tonga tokoa izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any amin’ny fiposahan’ny masoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanononana ny anarany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanosihosy ny mpitondra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fanosy fotaka izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na toy ny fanaon’ny mpanefy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihosihosy tanimanga.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza àry no nanambara izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany am-piandohana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hoekenay fa mitombina?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no nanambara izany mialoha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hilazanay hoe: «Marina ny azy»?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nisy nanambara izany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nisy nandrenesam-peo akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nisy mihitsy nandre ny teninareo.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho no voalohany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nilaza izany tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka naniraka mpitondra vaovao mahafaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’i Jerosalema.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nijery foana Aho fa tsy nahita olona:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ireo andriamani-tsiizy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy misy mpanolotsaina na iray aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy azoko nanontaniana mba hanome valin-teny Ahy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsinontsinona ny andriamani-tsiizy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zava-poana ny zavatra ataony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsio-drivotra miserana ny sampiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady zavatra tsy misy fotony!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanenjika ireny izy, ka tsy nandia tany akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no namakivaky soamantsara ny laharany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy izaho ve no nanao sy nahatanteraka izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady niantso ny taranaka hatrany am-piandohana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no TOMPO teo am-piandohana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho ihany no ho Izy any am-piafarana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahita izany ka raiki-tahotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mponina any amin’ny nosy lavitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manatona amin-kovitra sy tonga koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny avy any am-paran’ny tany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy lehilahy mifanampy amin’ny asa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka mifampiteny hoe: «Mahereza'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny and 6-7 dia mamerina ny lohahevitra tao amin’ny 40.19-20.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanefy vy mampahery ny mpanefy firavaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpandama amin’ny tantanana kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampirisika ny mpively amin’ny riandriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady loa-bolana ny amin’ny solohoto hoe: «Tsara ity!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia homboany amin’ny fantsika ny sampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hihozongozona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aza matahotra ankehitriny
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao kosa, ry Israely mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: firenen’i Jakôba izay nofidiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: taranak’i Abrahama sakaizako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.8 '
      - type: usfm
