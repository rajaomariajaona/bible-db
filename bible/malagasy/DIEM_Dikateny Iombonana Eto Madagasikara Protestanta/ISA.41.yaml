  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianao izay nalaiko avy tany am-paran’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nantsoiko avy amin’ny faritra lavitra indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ianao no itenenako hoe: «Mpanompoko ianao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no nifidy anao ka tsy manary anao.»
