document_id: ISA.41,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay mpanompo nirahin’ny Tompo
  - type: text
    content: Ry mponina any amin’ny nosy lavitra,
  - type: text
    content: mangina ka henoy Aho, hoy ny TOMPO.
  - type: text
    content: Ary ianareo firenena,
  - type: text
    content: misikîna herim-po.
  - type: text
    content: Misehoa aloha vao miteny
  - type: text
    content: ary andeha isika hiara-kiatrika fitsarana.
  '10':
  - type: text
    content: Aza matahotra ianao fa miaraka aminao Aho,
  - type: text
    content: aza miherikerika foana fa Izaho no Andriamanitrao.
  - type: text
    content: Mampahery anao Aho ary mamonjy anao tokoa;
  - type: text
    content: ny tanan-kavanako manafaka no anohanako anao.
  '11':
  - type: text
    content: Indro ho menatra sy ho afa-baràka
  - type: text
    content: izay rehetra naneso anao.
  - type: text
    content: Hanjary tsinontsinona sy ho levona
  - type: text
    content: ny mpanohitra anao.
  '12':
  - type: text
    content: Hotadiavinao ireo mpisetrasetra anao
  - type: text
    content: fa tsy ho hitanao;
  - type: text
    content: hanjary tsinontsinona sy zava-poana
  - type: text
    content: ireo mpiady aminao.
  '13':
  - type: text
    content: Satria Izaho no TOMPO Andriamanitrao,
  - type: text
    content: Izay mitantana anao amin’ny tanan-kavananao
  - type: text
    content: 'sady mamerimberina aminao hoe:'
  - type: text
    content: «Aza matahotra, Izaho no hamonjy anao.»
  - type: heading
    content: Tonga hamonjy anao Aho
  '14':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: text
    content: Aza matahotra ianao,
  - type: text
    content: ry vahoaka Israely, firenen’i Jakôba,
  - type: text
    content: lazaina hoe mora vonoina toa kankana.
  - type: text
    content: Izaho TOMPO mihitsy no tonga hamonjy anao,
  - type: text
    content: Izaho ilay Masin’i Israely no mpanavotra anao.
  '15':
  - type: text
    content: Indro ianao hataoko toy ny hersa vaovao
  - type: text
    content: izay misy nifiny maranitra
  - type: note
    content: Jereo 28.27 sy nta.
  - type: text
    content: ;
  - type: text
    content: ka hosamatsamahinao ny tendrombohitra
  - type: text
    content: ary hataonao lasa akofa ny havoana.
  '16':
  - type: text
    content: Hokororohinao hoentin’ny rivotra izy
  - type: text
    content: sy haelin’ny tadio;
  - type: text
    content: fa ianao kosa dia Izaho TOMPO no hifalianao
  - type: text
    content: ary Izaho ilay Masin’i Israely no hireharehanao.
  - type: heading
    content: Ny taniefitra niova ho saha lonaka
  '17':
  - type: text
    content: Mitady rano ny mahantra sy ny malahelo
  - type: text
    content: nefa tsy mahita mihitsy,
  - type: text
    content: ka mainan’ny hetaheta ny lelany.
  - type: text
    content: Izaho TOMPO kosa hihaino azy;
  - type: text
    content: Izaho Andriamanitr’i Israely
  - type: text
    content: tsy mba handao azy.
  '18':
  - type: text
    content: Hampiboiboika renirano
  - type: text
    content: eny amin’ny havoana mangadihady Aho
  - type: text
    content: ary koa loharano eny an-dohasaha,
  - type: text
    content: ka hanova ny taniefitra ho farihy
  - type: text
    content: ary ny tany karakaina ho mpamoaka rano.
  '19':
  - type: text
    content: Hataoko mitsiry hazo sedera sy mimôzà
  - type: text
    content: ary rotra sy ôliva any an-taniefitra;
  - type: text
    content: hasiako kipreso sy hazo kesika
  - type: text
    content: ary kirihitr’ala any an-tany hay.
  '2':
  - type: text
    content: Tsy Izaho ve no nampipoitra ilay Mpanafaka
  - type: text
    content: avy any atsinanana any,
  - type: text
    content: ka niantso azy hanainga ny diany,
  - type: text
    content: sy nampilavo lefona ny firenena teo anatrehany
  - type: note
    content: Ny mpaminany eto dia toa manondro an’i Kirôsa mpanjakan’i Persia, na dia tsy mbola manonona anarana azy mivantana aza, satria izy no nandresy haingana an’iny faritra afovoany atsinanana iny ka naka an’i Babilôna tamin’ny taona 539 tal J.K. Jereo 41.25; 44.28; 45.1 sns.
  - type: text
    content: ary nampilefitra ireo mpanjaka?
  - type: text
    content: Nataon’ny sabany lasa vovoka ireny
  - type: text
    content: ary naelin’ny zana-tsipîkany
  - type: text
    content: toy ny akofa entin’ny rivotra.
  '20':
  - type: text
    content: Amin’izay dia ho hitan’ny olona sy ho fantany,
  - type: text
    content: ary ho tsapany sy ho takany
  - type: text
    content: fa Izaho TOMPO, ilay Masin’i Israely,
  - type: text
    content: no namboatra sy nahary izany fanovana izany.
  - type: heading
    content: Fanebahana ny andriamani-tsiizy
  '21':
  - type: text
    content: Ianareo andriamanitry ny firenen-kafa,
  - type: text
    content: alaharo ny kabarinareo,
  - type: text
    content: arosoy ny porofonareo,
  - type: text
    content: hoy ny TOMPO mpanjakan’i Jakôba
  - type: note
    content: 'Eto, tahaka ny ao amin’ny Test. Tal. matetika, ny hoe Jakôba dia manondro ny firenena israelita tsivakivolo; mpanjakan’i Jakôba : ampit 44.6.'
  - type: text
    content: .
  '22':
  - type: text
    content: Manatòna hanazava aminay ny zava-hitranga.
  - type: text
    content: Lazao ny zava-niseho voalohany
  - type: note
    content: 'Ny zava-niseho voalohany: toa filazana ny firotsahan’i Kirôsa an-tsehatra (jereo 41.2 sy nta).'
  - type: text
    content: mba hifantohan’ny fandinihanay;
  - type: text
    content: na ambarao kosa izay ho avy,
  - type: text
    content: dia ho fantatray izay hiafarany.
  '23':
  - type: text
    content: Eny, ambarao anay ny zavatra ho avy
  - type: text
    content: dia hoekenay fa andriamanitra tokoa ianareo.
  - type: text
    content: Manaova soa na manaova ratsy
  - type: text
    content: mba hiarahanay mahita sy mijery.
  '24':
  - type: text
    content: Kanjo indro fa tsinontsinona ianareo,
  - type: text
    content: zava-poana ny asa ataonareo;
  - type: text
    content: ka izay nifidy anareo ho andriamanitra
  - type: text
    content: dia maharikoriko toa anareo.
  '25':
  - type: text
    content: Avy any avaratra no napoitrako
  - type: text
    content: ity lehilahy anankiray,
  - type: text
    content: ka dia tonga tokoa izy;
  - type: text
    content: avy any amin’ny fiposahan’ny masoandro
  - type: text
    content: no hanononana ny anarany.
  - type: text
    content: Dia hanosihosy ny mpitondra
  - type: text
    content: toy ny fanosy fotaka izy,
  - type: text
    content: na toy ny fanaon’ny mpanefy
  - type: text
    content: mihosihosy tanimanga.
  '26':
  - type: text
    content: Iza àry no nanambara izany
  - type: text
    content: hatrany am-piandohana
  - type: text
    content: mba hoekenay fa mitombina?
  - type: text
    content: Ary iza no nanambara izany mialoha
  - type: text
    content: 'hilazanay hoe: «Marina ny azy»?'
  - type: text
    content: Tsy nisy nanambara izany ianareo,
  - type: text
    content: tsy nisy nandrenesam-peo akory;
  - type: text
    content: tsy nisy mihitsy nandre ny teninareo.
  '27':
  - type: text
    content: Fa Izaho no voalohany
  - type: text
    content: 'nilaza izany tamin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ka naniraka mpitondra vaovao mahafaly
  - type: text
    content: ho an’i Jerosalema.
  '28':
  - type: text
    content: 'Nijery foana Aho fa tsy nahita olona:'
  - type: text
    content: tamin’ireo andriamani-tsiizy ireo
  - type: text
    content: dia tsy misy mpanolotsaina na iray aza;
  - type: text
    content: tsy misy azoko nanontaniana mba hanome valin-teny Ahy.
  '29':
  - type: text
    content: Tsinontsinona ny andriamani-tsiizy rehetra,
  - type: text
    content: zava-poana ny zavatra ataony,
  - type: text
    content: tsio-drivotra miserana ny sampiny
  - type: text
    content: sady zavatra tsy misy fotony!
  '3':
  - type: text
    content: Nanenjika ireny izy, ka tsy nandia tany akory
  - type: text
    content: no namakivaky soamantsara ny laharany.
  '4':
  - type: text
    content: Tsy izaho ve no nanao sy nahatanteraka izany
  - type: text
    content: sady niantso ny taranaka hatrany am-piandohana?
  - type: text
    content: Izaho no TOMPO teo am-piandohana
  - type: text
    content: ary Izaho ihany no ho Izy any am-piafarana.
  '5':
  - type: text
    content: Nahita izany ka raiki-tahotra
  - type: text
    content: ny mponina any amin’ny nosy lavitra;
  - type: text
    content: manatona amin-kovitra sy tonga koa
  - type: text
    content: ny avy any am-paran’ny tany.
  '6':
  - type: text
    content: Misy lehilahy mifanampy amin’ny asa
  - type: text
    content: 'ka mifampiteny hoe: «Mahereza'
  - type: note
    content: Ny and 6-7 dia mamerina ny lohahevitra tao amin’ny 40.19-20.
  - type: text
    content: '!»'
  '7':
  - type: text
    content: Ny mpanefy vy mampahery ny mpanefy firavaka;
  - type: text
    content: ary ny mpandama amin’ny tantanana kosa
  - type: text
    content: mampirisika ny mpively amin’ny riandriana
  - type: text
    content: 'sady loa-bolana ny amin’ny solohoto hoe: «Tsara ity!»'
  - type: text
    content: Dia homboany amin’ny fantsika ny sampy
  - type: text
    content: mba tsy hihozongozona.
  - type: heading
    content: Aza matahotra ankehitriny
  '8':
  - type: text
    content: Ianao kosa, ry Israely mpanompoko,
  - type: text
    content: firenen’i Jakôba izay nofidiko,
  - type: text
    content: taranak’i Abrahama sakaizako
  - type: note
    content: Jereo 2 Tan 20.7; Jak 2.23.
  - type: text
    content: ','
  '9':
  - type: text
    content: ianao izay nalaiko avy tany am-paran’ny tany
  - type: text
    content: sady nantsoiko avy amin’ny faritra lavitra indrindra,
  - type: text
    content: 'ianao no itenenako hoe: «Mpanompoko ianao;'
  - type: text
    content: Izaho no nifidy anao ka tsy manary anao.»
