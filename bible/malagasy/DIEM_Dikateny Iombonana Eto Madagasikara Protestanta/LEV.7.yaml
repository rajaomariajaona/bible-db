verses:
  '1':
  - type: heading
    content: e. Ny sorom-panonerana
  - type: text
    content: '«Izao no lalàna momba ny '
  - type: text
    content: sorom-panonerana
  - type: text
    content: ':'
  - type: text
    content: '«Zava-masina dia masina izany, '
  '10':
  - type: text
    content: Ny fanatitra tsy masaka rehetra kosa, na miharo menaka na maina, dia zaraina
  - type: note
    content: 'Ny fanatitra...kosa: dkt hafa Ny fanatitra hafa rehetra kosa.'
  - type: text
    content: mitovy amin’ny taranak’i Aharôna rehetra.
  - type: heading
    content: g. Ny sorom-pihavanana
  '11':
  - type: text
    content: '«Izao no lalàna momba ny sorom-pihavanana izay haterina amin’ny TOMPO:'
  '12':
  - type: text
    content: «Raha misy olona manatitra sorom-pihavanana mba ho fisaorana an’Andriamanitra
  - type: note
    content: Jereo Sal 107.22; 116.17.
  - type: text
    content: ', dia ireto zavatra ireto no hateriny ho fanampiny: mofo vaventy tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ' sady miharo menaka, mofo fisaka tsy misy leviora sady voahoso-menaka; ary mofo atao amin’ny koba lafarinina miharo menaka. '
  '13':
  - type: text
    content: 'Ankoatra ireo mofo tsy misy leviora ireo, dia hanatitra mofo misy leviora koa izy ho fanampin’ilay sorom-pihavanana atao ho fisaorana an’Andriamanitra. '
  '14':
  - type: text
    content: 'Samy hangalana anankiray avy ireo fanatitra isan-karazany ireo hasandratra ho an’ny TOMPO; fa ny mofo sisa kosa dia ho an’ilay mpisorona mamafy ny ran’ny sorom-pihavanana. '
  '15':
  - type: text
    content: Ny henan’ny sorom-pihavanana atao ho fisaorana an’Andriamanitra dia hohanina amin’ny andro anaterana azy, fa tsy hisy havela ho tra-maraina.
  '16':
  - type: text
    content: «Raha misy olona manatitra sorom-pihavanana fanalam-
  - type: text
    content: boady
  - type: text
    content: ' na an-tsitrapo, dia amin’ny andro anaterana azy no ihinanana ampahan’ny hena; izay ambiny kosa azo hanina ampitson’iny, '
  '17':
  - type: text
    content: 'fa ny sisa tavela dia hodorana amin’ny andro fahatelo. '
  '18':
  - type: text
    content: 'Raha tàhiny hihinanana amin’ny andro fahatelo izany henan’ny sorom-pihavanana izany, dia tsy hahazo sitraka amin’Andriamanitra ny mpanatitra azy; hoheverina ho tsinontsinona izany sorom-pihavanana izany, satria ny henany efa nanjary tsy azo ampiasaina amin’ny fombam-pivavahana intsony. Izay olona mihinana amin’izany dia itambesaran-keloka. '
  '19':
  - type: text
    content: Raha nikasika zava-
  - type: text
    content: maloto
  - type: text
    content: ' ara-pivavahana koa izany henan’ny sorom-pihavanana izany, dia tsy tokony hohanina fa hodorana.'
  - type: text
    content: '«Ny amin’ny henan’ny sorom-pihavanana dia izay olona madio rehetra no mahazo mihinana azy; '
  '2':
  - type: text
    content: 'ka eo amin’ny toerana famonoana ny sorona dorana manontolo no hamonoana ny sorom-panonerana; ary ny ra dia hatopiny manodidina amin’ny lafin’ny '
  - type: text
    content: alitara
  - type: text
    content: '. '
  '20':
  - type: text
    content: fa ny olona misy fahalotoana ara-pivavahana
  - type: note
    content: Jereo Lev 12–15.
  - type: text
    content: ', kanefa mihinana hena ambin’ilay sorom-pihavanana voatokana ho an’ny TOMPO, dia hofongorana tsy ho anisan’ny vahoaka israelita. '
  '21':
  - type: text
    content: Ary izay nahakasika fahalotoana ara-pivavahana, na olona maloto na biby maloto na zavatra hafa maloto, kanefa mihinana amin’izany hena izany, dia hofongorana tsy ho anisan’ny vahoaka israelita.»
  - type: heading
    content: Fepetra ho an’ny vahoaka israelita
  '22':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '23':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Aza misy hanina ny tavin-kenan’ireo biby fanao sorona, na ny an’ny omby, na ny an’ny ondry, na ny an’ny osy. '
  '24':
  - type: text
    content: 'Ny tavin-kenan’ny biby maty ho azy na voaviraviram-bibidia kosa dia azo anaovan-javatra hafa ihany, saingy tsy azonareo hanina velively. '
  '25':
  - type: text
    content: 'Fa izay rehetra mihinana ny tavin-kenam-biby, natao hatolotra ho sorona levonina amin’ny afo ho an’ny TOMPO, dia hofongorana tsy ho anisan’ny vahoaka israelita. '
  '26':
  - type: text
    content: 'Aza mihinana ram-borona na ram-biby ianareo, na aiza na aiza hitoeranareo. '
  '27':
  - type: text
    content: Izay rehetra mihinana ra dia hofongorana koa tsy ho anisan’ny vahoaka israelita
  - type: note
    content: 'And 26-27: jereo 17.10-14; Gen 9.4; Deot 12.16,23; 15.23.'
  - type: text
    content: .»
  '28':
  - type: text
    content: 'Dia niteny tamin’i Mosesy indray ny TOMPO '
  '29':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Izay manatitra sorom-pihavanana amin’ny TOMPO dia hitondra ny ampahany voatokana ho an’ny TOMPO avy amin’izany sorom-pihavanana izany. '
  '3':
  - type: text
    content: 'Hatolotra avokoa ny tavin-kena rehetra: dia ny hofany'
  - type: note
    content: Jereo Eks 29.22 sy nta.
  - type: text
    content: ', ny safodrorohany sy ny jaboran-tsinainy, '
  '30':
  - type: text
    content: 'Ny tanany ihany no hitondra ny zavatra holevonina amin’ny afo ho an’ny TOMPO, dia ny tavin-kenan’ilay biby mbamin’ny tratrany; ka io tratrany io dia hahevaheva eo anatrehan’ny TOMPO no fomba fanolotra azy. '
  '31':
  - type: text
    content: 'Hodoran’ny mpisorona hanetona eo ambonin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' ny tavin-kena; fa ny tratrany kosa dia ho an’i Aharôna sy ireo taranany. '
  '32':
  - type: text
    content: 'Halainareo avy amin’ilay biby sorom-pihavanana kosa ny feny ankavanana, ka homenareo ny mpisorona: '
  '33':
  - type: text
    content: 'io feny ankavanana io dia ho anjaran’izay iray amin’ny taranak’i Aharôna hanolotra ny ra aman-tavin-kenan’ny sorom-pihavanana, '
  '34':
  - type: text
    content: satria alain’ny TOMPO avy amin’ny sorom-pihavanan’ny Israelita ny tratrany nahevaheva sy ny feny navahana, ka nomeny an’i Aharôna sy ireo taranany, mba ho anjara raikitra ho azy hatrany hatrany avy amin’ny Israelita.»
  '35':
  - type: text
    content: 'Ireny zavatra navahana avy amin’ny sorona nolevonina tamin’ny afo mba ho an’ny TOMPO ireny no anjaran’i Aharôna sy ireo taranany amin’ny maha mpisorona azy, manomboka amin’ny andro nametrahana azy hanao ny fanompoana maha mpisorona eo anatrehan’ny TOMPO. '
  '36':
  - type: text
    content: Nodidian’ny TOMPO mihitsy izany mba homen’ny Israelita azy ireo, manomboka amin’ny andro nanokanana azy ho mpisorona.
  '37':
  - type: text
    content: 'Izany sy izany no lalàna momba ny sorona dorana manontolo, ny fanatitra vokatry ny tany, ny sorona fanalana ny ota, ny sorom-panonerana, ny sorona fanokanana, ary ny sorom-pihavanana. '
  '38':
  - type: text
    content: Nandidian’ny TOMPO an’i Mosesy teo an-tendrombohitra Sinay tany an-taniefitra ireny, dia tamin’ny andro nandidian’ny TOMPO hanateran’ny Israelita sorona aminy.
  '4':
  - type: text
    content: 'ny voany roa mbamin’ny jabora izay miraikitra amin’ny voany sy amin’ny takibany, ary koa ny ila-atiny izay hatao indray manala amin’ny voany. '
  '5':
  - type: text
    content: 'Hodoran’ny mpisorona hanetona eo ambonin’ny alitara ireo, ho sorona levonina amin’ny afo ho an’ny TOMPO: sorom-panonerana izany. '
  '6':
  - type: text
    content: 'Ny lehilahy rehetra anisan’ny mpisorona no mahazo mihinana ny hena; eo amina faritra voatokana no hihinanany azy, satria zava-masina dia masina izany. '
  '7':
  - type: text
    content: 'Sahala amin’ny sorona fanalana ny ota ihany ny sorom-panonerana, ka lalàna iray no ho amin’izy roa: ho an’ilay mpisorona manao ny fombam-pivavahana famelan-keloka ny henan-tsorona.'
  - type: heading
    content: f. Ny anjara tazonin’ny mpisorona
  '8':
  - type: text
    content: '«Raha misy sorona dorana manontolo aterin’olona, dia hahazo ny hoditr’izany ilay mpisorona manolotra azy. '
  '9':
  - type: text
    content: 'Ny fanatitra masaka rehetra, nendasina tamin’ny lafaoro na tamin’ny lapoaly na tamin’ny takela-by, dia an’ilay mpisorona manolotra azy. '
