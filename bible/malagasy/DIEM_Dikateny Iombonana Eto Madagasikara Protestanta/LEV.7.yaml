      children:
      - type: text
        text: maloto
    - type: text
      text: ' ara-pivavahana koa izany henan’ny sorom-pihavanana izany, dia tsy tokony hohanina fa hodorana.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ny amin’ny henan’ny sorom-pihavanana dia izay olona madio rehetra no mahazo mihinana azy; '
