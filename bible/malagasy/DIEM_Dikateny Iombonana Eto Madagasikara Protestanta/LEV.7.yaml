  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Raha tàhiny hihinanana amin’ny andro fahatelo izany henan’ny sorom-pihavanana izany, dia tsy hahazo sitraka amin’Andriamanitra ny mpanatitra azy; hoheverina ho tsinontsinona izany sorom-pihavanana izany, satria ny henany efa nanjary tsy azo ampiasaina amin’ny fombam-pivavahana intsony. Izay olona mihinana amin’izany dia itambesaran-keloka. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
