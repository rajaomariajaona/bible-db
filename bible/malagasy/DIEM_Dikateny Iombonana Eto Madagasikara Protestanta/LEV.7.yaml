  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izay manatitra sorom-pihavanana amin’ny TOMPO dia hitondra ny ampahany voatokana ho an’ny TOMPO avy amin’izany sorom-pihavanana izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hatolotra avokoa ny tavin-kena rehetra: dia ny hofany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 29.22 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', ny safodrorohany sy ny jaboran-tsinainy, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ny tanany ihany no hitondra ny zavatra holevonina amin’ny afo ho an’ny TOMPO, dia ny tavin-kenan’ilay biby mbamin’ny tratrany; ka io tratrany io dia hahevaheva eo anatrehan’ny TOMPO no fomba fanolotra azy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Hodoran’ny mpisorona hanetona eo ambonin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' ny tavin-kena; fa ny tratrany kosa dia ho an’i Aharôna sy ireo taranany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Halainareo avy amin’ilay biby sorom-pihavanana kosa ny feny ankavanana, ka homenareo ny mpisorona: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'io feny ankavanana io dia ho anjaran’izay iray amin’ny taranak’i Aharôna hanolotra ny ra aman-tavin-kenan’ny sorom-pihavanana, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: satria alain’ny TOMPO avy amin’ny sorom-pihavanan’ny Israelita ny tratrany nahevaheva sy ny feny navahana, ka nomeny an’i Aharôna sy ireo taranany, mba ho anjara raikitra ho azy hatrany hatrany avy amin’ny Israelita.»
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ireny zavatra navahana avy amin’ny sorona nolevonina tamin’ny afo mba ho an’ny TOMPO ireny no anjaran’i Aharôna sy ireo taranany amin’ny maha mpisorona azy, manomboka amin’ny andro nametrahana azy hanao ny fanompoana maha mpisorona eo anatrehan’ny TOMPO. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Nodidian’ny TOMPO mihitsy izany mba homen’ny Israelita azy ireo, manomboka amin’ny andro nanokanana azy ho mpisorona.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Izany sy izany no lalàna momba ny sorona dorana manontolo, ny fanatitra vokatry ny tany, ny sorona fanalana ny ota, ny sorom-panonerana, ny sorona fanokanana, ary ny sorom-pihavanana. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Nandidian’ny TOMPO an’i Mosesy teo an-tendrombohitra Sinay tany an-taniefitra ireny, dia tamin’ny andro nandidian’ny TOMPO hanateran’ny Israelita sorona aminy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ny voany roa mbamin’ny jabora izay miraikitra amin’ny voany sy amin’ny takibany, ary koa ny ila-atiny izay hatao indray manala amin’ny voany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hodoran’ny mpisorona hanetona eo ambonin’ny alitara ireo, ho sorona levonina amin’ny afo ho an’ny TOMPO: sorom-panonerana izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny lehilahy rehetra anisan’ny mpisorona no mahazo mihinana ny hena; eo amina faritra voatokana no hihinanany azy, satria zava-masina dia masina izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Sahala amin’ny sorona fanalana ny ota ihany ny sorom-panonerana, ka lalàna iray no ho amin’izy roa: ho an’ilay mpisorona manao ny fombam-pivavahana famelan-keloka ny henan-tsorona.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: f. Ny anjara tazonin’ny mpisorona
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '«Raha misy sorona dorana manontolo aterin’olona, dia hahazo ny hoditr’izany ilay mpisorona manolotra azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny fanatitra masaka rehetra, nendasina tamin’ny lafaoro na tamin’ny lapoaly na tamin’ny takela-by, dia an’ilay mpisorona manolotra azy. '
