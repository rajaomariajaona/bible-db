segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: e. Ny sorom-panonerana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '«Izao no lalàna momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorom-panonerana
  - type: text
    text: ':'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Zava-masina dia masina izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka eo amin’ny toerana famonoana ny sorona dorana manontolo no hamonoana ny sorom-panonerana; ary ny ra dia hatopiny manodidina amin’ny lafin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hatolotra avokoa ny tavin-kena rehetra: dia ny hofany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 29.22 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', ny safodrorohany sy ny jaboran-tsinainy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ny voany roa mbamin’ny jabora izay miraikitra amin’ny voany sy amin’ny takibany, ary koa ny ila-atiny izay hatao indray manala amin’ny voany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hodoran’ny mpisorona hanetona eo ambonin’ny alitara ireo, ho sorona levonina amin’ny afo ho an’ny TOMPO: sorom-panonerana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny lehilahy rehetra anisan’ny mpisorona no mahazo mihinana ny hena; eo amina faritra voatokana no hihinanany azy, satria zava-masina dia masina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sahala amin’ny sorona fanalana ny ota ihany ny sorom-panonerana, ka lalàna iray no ho amin’izy roa: ho an’ilay mpisorona manao ny fombam-pivavahana famelan-keloka ny henan-tsorona.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: f. Ny anjara tazonin’ny mpisorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Raha misy sorona dorana manontolo aterin’olona, dia hahazo ny hoditr’izany ilay mpisorona manolotra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny fanatitra masaka rehetra, nendasina tamin’ny lafaoro na tamin’ny lapoaly na tamin’ny takela-by, dia an’ilay mpisorona manolotra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fanatitra tsy masaka rehetra kosa, na miharo menaka na maina, dia zaraina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny fanatitra...kosa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny fanatitra hafa rehetra kosa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: mitovy amin’ny taranak’i Aharôna rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: g. Ny sorom-pihavanana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Izao no lalàna momba ny sorom-pihavanana izay haterina amin’ny TOMPO:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: «Raha misy olona manatitra sorom-pihavanana mba ho fisaorana an’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 107.22; 116.17.
    marker-yv: yv-n
  - type: text
    text: ', dia ireto zavatra ireto no hateriny ho fanampiny: mofo vaventy tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: ' sady miharo menaka, mofo fisaka tsy misy leviora sady voahoso-menaka; ary mofo atao amin’ny koba lafarinina miharo menaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ankoatra ireo mofo tsy misy leviora ireo, dia hanatitra mofo misy leviora koa izy ho fanampin’ilay sorom-pihavanana atao ho fisaorana an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Samy hangalana anankiray avy ireo fanatitra isan-karazany ireo hasandratra ho an’ny TOMPO; fa ny mofo sisa kosa dia ho an’ilay mpisorona mamafy ny ran’ny sorom-pihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny henan’ny sorom-pihavanana atao ho fisaorana an’Andriamanitra dia hohanina amin’ny andro anaterana azy, fa tsy hisy havela ho tra-maraina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Raha misy olona manatitra sorom-pihavanana fanalam-
  - type: usfm
    marker: w
    children:
    - type: text
      text: boady
  - type: text
    text: ' na an-tsitrapo, dia amin’ny andro anaterana azy no ihinanana ampahan’ny hena; izay ambiny kosa azo hanina ampitson’iny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'fa ny sisa tavela dia hodorana amin’ny andro fahatelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha tàhiny hihinanana amin’ny andro fahatelo izany henan’ny sorom-pihavanana izany, dia tsy hahazo sitraka amin’Andriamanitra ny mpanatitra azy; hoheverina ho tsinontsinona izany sorom-pihavanana izany, satria ny henany efa nanjary tsy azo ampiasaina amin’ny fombam-pivavahana intsony. Izay olona mihinana amin’izany dia itambesaran-keloka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Raha nikasika zava-
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' ara-pivavahana koa izany henan’ny sorom-pihavanana izany, dia tsy tokony hohanina fa hodorana.'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Ny amin’ny henan’ny sorom-pihavanana dia izay olona madio rehetra no mahazo mihinana azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: fa ny olona misy fahalotoana ara-pivavahana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 12–15.
    marker-yv: yv-n
  - type: text
    text: ', kanefa mihinana hena ambin’ilay sorom-pihavanana voatokana ho an’ny TOMPO, dia hofongorana tsy ho anisan’ny vahoaka israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary izay nahakasika fahalotoana ara-pivavahana, na olona maloto na biby maloto na zavatra hafa maloto, kanefa mihinana amin’izany hena izany, dia hofongorana tsy ho anisan’ny vahoaka israelita.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fepetra ho an’ny vahoaka israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Aza misy hanina ny tavin-kenan’ireo biby fanao sorona, na ny an’ny omby, na ny an’ny ondry, na ny an’ny osy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny tavin-kenan’ny biby maty ho azy na voaviraviram-bibidia kosa dia azo anaovan-javatra hafa ihany, saingy tsy azonareo hanina velively. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa izay rehetra mihinana ny tavin-kenam-biby, natao hatolotra ho sorona levonina amin’ny afo ho an’ny TOMPO, dia hofongorana tsy ho anisan’ny vahoaka israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Aza mihinana ram-borona na ram-biby ianareo, na aiza na aiza hitoeranareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay rehetra mihinana ra dia hofongorana koa tsy ho anisan’ny vahoaka israelita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'And 26-27: jereo 17.10-14; Gen 9.4; Deot 12.16,23; 15.23.'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia niteny tamin’i Mosesy indray ny TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Izay manatitra sorom-pihavanana amin’ny TOMPO dia hitondra ny ampahany voatokana ho an’ny TOMPO avy amin’izany sorom-pihavanana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny tanany ihany no hitondra ny zavatra holevonina amin’ny afo ho an’ny TOMPO, dia ny tavin-kenan’ilay biby mbamin’ny tratrany; ka io tratrany io dia hahevaheva eo anatrehan’ny TOMPO no fomba fanolotra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hodoran’ny mpisorona hanetona eo ambonin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ny tavin-kena; fa ny tratrany kosa dia ho an’i Aharôna sy ireo taranany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Halainareo avy amin’ilay biby sorom-pihavanana kosa ny feny ankavanana, ka homenareo ny mpisorona: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'io feny ankavanana io dia ho anjaran’izay iray amin’ny taranak’i Aharôna hanolotra ny ra aman-tavin-kenan’ny sorom-pihavanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: satria alain’ny TOMPO avy amin’ny sorom-pihavanan’ny Israelita ny tratrany nahevaheva sy ny feny navahana, ka nomeny an’i Aharôna sy ireo taranany, mba ho anjara raikitra ho azy hatrany hatrany avy amin’ny Israelita.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ireny zavatra navahana avy amin’ny sorona nolevonina tamin’ny afo mba ho an’ny TOMPO ireny no anjaran’i Aharôna sy ireo taranany amin’ny maha mpisorona azy, manomboka amin’ny andro nametrahana azy hanao ny fanompoana maha mpisorona eo anatrehan’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Nodidian’ny TOMPO mihitsy izany mba homen’ny Israelita azy ireo, manomboka amin’ny andro nanokanana azy ho mpisorona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izany sy izany no lalàna momba ny sorona dorana manontolo, ny fanatitra vokatry ny tany, ny sorona fanalana ny ota, ny sorom-panonerana, ny sorona fanokanana, ary ny sorom-pihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Nandidian’ny TOMPO an’i Mosesy teo an-tendrombohitra Sinay tany an-taniefitra ireny, dia tamin’ny andro nandidian’ny TOMPO hanateran’ny Israelita sorona aminy.
