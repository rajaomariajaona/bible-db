  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ankoatra ireo mofo tsy misy leviora ireo, dia hanatitra mofo misy leviora koa izy ho fanampin’ilay sorom-pihavanana atao ho fisaorana an’Andriamanitra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Samy hangalana anankiray avy ireo fanatitra isan-karazany ireo hasandratra ho an’ny TOMPO; fa ny mofo sisa kosa dia ho an’ilay mpisorona mamafy ny ran’ny sorom-pihavanana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny henan’ny sorom-pihavanana atao ho fisaorana an’Andriamanitra dia hohanina amin’ny andro anaterana azy, fa tsy hisy havela ho tra-maraina.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
