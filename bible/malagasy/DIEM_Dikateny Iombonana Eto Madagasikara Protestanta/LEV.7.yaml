      children:
      - type: text
        text: boady
    - type: text
      text: ' na an-tsitrapo, dia amin’ny andro anaterana azy no ihinanana ampahan’ny hena; izay ambiny kosa azo hanina ampitson’iny, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
