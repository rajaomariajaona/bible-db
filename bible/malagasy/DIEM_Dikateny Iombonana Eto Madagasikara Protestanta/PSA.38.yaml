document_id: PSA.38
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Vavaky ny marary miaiky heloka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Salamo nataon’i Davida. Hitaomana an’Andriamanitra hahatsiaro azy
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy fanatitra koa miaraka amin’izany: Lev 2.2,9.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: TOMPO ô, tezitra amiko Ianao nefa aza faizina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, vinitra amiko Ianao nefa aza sazîna aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 6.2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nitsatohan’ny zana-tsipîkanao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary niantefan’ny tehamaina famaizanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy misy tsy marofy ny nofoko noho ny fahatezeranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy tsy marary ny taolako noho ny fahotako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa mivangongo mihoatra ny lohako ny heloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny enta-mavesatra tsy zakako mihitsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Maimbo sy mandoaka ny feriko
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny hadalàko ihany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: mitanondrika sy manjoretra loatra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manjonitra tontolo andro, toa misaona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mahamay voan’ny tazo ny tenako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy tsy marofy ny nofoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Reraka aho ary drodroka tanteraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitoloko ny foko ka midradradradra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tompo ô, hitanao tokoa izay irîko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy miafina aminao ny sentosentoko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: miemponempona ny foko, lany hery aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa jambena mihitsy ny masoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny sakaizako sy ny olon-tiako aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihataka ahy noho ny aretiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny havako manao tazan-davitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ireo maniry ny ahafatesako mamela-pandrika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo mitady hanisy ratsy dia miteny hasomparana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mamorom-pitaka isan’andro hamelezana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa toy ny marenina aho ka tsy mahahaino,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny moana ka tsy mahaloa-bava;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eny, tahaka ny olona tsy mandre aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba manana teny havaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ianao, TOMPO ô, no antenaiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tompo Andriamanitro ô, Ianao no hamaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa izao no vavaka nataoko taminao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aza avela ho fanesom-pahavalo aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy hirehaka ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha sendra mivoana ny famindrako!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Efa mila ho torana mihitsy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanaintainako tsy miala amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Eny, miaiky ny fahadisoako aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary matahotra noho ny amin’ny otako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mahery ireo mandrafy ahy tsy amin’antony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: maro no mankahala ahy tsy an-drariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Valiany ratsy ny soa nataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampangainy aho satria manao ny tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: TOMPO ô, aza ilaozanao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra ô, aza manalavitra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Faingàna hamonjy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Tompo Mpamonjiko ô.
