document_id: PSA.38,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaky ny marary miaiky heloka
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida. Hitaomana an’Andriamanitra hahatsiaro azy
  - type: text
    content: ' '
  - type: note
    content: 'Misy fanatitra koa miaraka amin’izany: Lev 2.2,9.'
  - type: text
    content: .
  '10':
  - type: text
    content: Tompo ô, hitanao tokoa izay irîko,
  - type: text
    content: tsy miafina aminao ny sentosentoko;
  '11':
  - type: text
    content: miemponempona ny foko, lany hery aho,
  - type: text
    content: ary efa jambena mihitsy ny masoko.
  '12':
  - type: text
    content: Ny sakaizako sy ny olon-tiako aza
  - type: text
    content: mihataka ahy noho ny aretiko;
  - type: text
    content: ary ny havako manao tazan-davitra.
  '13':
  - type: text
    content: Ireo maniry ny ahafatesako mamela-pandrika;
  - type: text
    content: ireo mitady hanisy ratsy dia miteny hasomparana,
  - type: text
    content: sy mamorom-pitaka isan’andro hamelezana ahy.
  '14':
  - type: text
    content: Fa toy ny marenina aho ka tsy mahahaino,
  - type: text
    content: ary tahaka ny moana ka tsy mahaloa-bava;
  '15':
  - type: text
    content: Eny, tahaka ny olona tsy mandre aho
  - type: text
    content: ka tsy mba manana teny havaly.
  '16':
  - type: text
    content: Ianao, TOMPO ô, no antenaiko;
  - type: text
    content: Tompo Andriamanitro ô, Ianao no hamaly.
  '17':
  - type: text
    content: 'Fa izao no vavaka nataoko taminao:'
  - type: text
    content: «Aza avela ho fanesom-pahavalo aho;
  - type: text
    content: ary aoka tsy hirehaka ireo,
  - type: text
    content: raha sendra mivoana ny famindrako!»
  '18':
  - type: text
    content: Efa mila ho torana mihitsy aho
  - type: text
    content: ary ny fanaintainako tsy miala amiko.
  '19':
  - type: text
    content: Eny, miaiky ny fahadisoako aho
  - type: text
    content: ary matahotra noho ny amin’ny otako.
  '2':
  - type: text
    content: TOMPO ô, tezitra amiko Ianao nefa aza faizina aho;
  - type: text
    content: eny, vinitra amiko Ianao nefa aza sazîna aho
  - type: note
    content: Jereo Sal 6.2.
  - type: text
    content: .
  '20':
  - type: text
    content: Mahery ireo mandrafy ahy tsy amin’antony,
  - type: text
    content: maro no mankahala ahy tsy an-drariny.
  '21':
  - type: text
    content: Valiany ratsy ny soa nataoko
  - type: text
    content: ary ampangainy aho satria manao ny tsara.
  '22':
  - type: text
    content: TOMPO ô, aza ilaozanao aho;
  - type: text
    content: Andriamanitra ô, aza manalavitra ahy.
  '23':
  - type: text
    content: Faingàna hamonjy ahy,
  - type: text
    content: ry Tompo Mpamonjiko ô.
  '3':
  - type: text
    content: Nitsatohan’ny zana-tsipîkanao aho,
  - type: text
    content: ary niantefan’ny tehamaina famaizanao.
  '4':
  - type: text
    content: Tsy misy tsy marofy ny nofoko noho ny fahatezeranao;
  - type: text
    content: tsy misy tsy marary ny taolako noho ny fahotako.
  '5':
  - type: text
    content: Fa mivangongo mihoatra ny lohako ny heloko
  - type: text
    content: toy ny enta-mavesatra tsy zakako mihitsy.
  '6':
  - type: text
    content: Maimbo sy mandoaka ny feriko
  - type: text
    content: noho ny hadalàko ihany;
  '7':
  - type: text
    content: mitanondrika sy manjoretra loatra aho,
  - type: text
    content: manjonitra tontolo andro, toa misaona.
  '8':
  - type: text
    content: Mahamay voan’ny tazo ny tenako
  - type: text
    content: ka tsy misy tsy marofy ny nofoko.
  '9':
  - type: text
    content: Reraka aho ary drodroka tanteraka;
  - type: text
    content: mitoloko ny foko ka midradradradra aho.
