document_id: HEB.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jesoa Mpisoromben’ny Fanekempihavanana Vaovao
  - type: text
    content: 'Izao no vontoatin’ny zavatra lazainay: Mpisorombe toy izany no ananantsika, ary Mpisorombe efa mipetraka any an-danitra eo ankavanan’ny sezafiandrianan’ilay Andriamanitra lehibe'
  - type: note
    content: Jereo Sal 110.1.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Fa izao no Fanekempihavanana hataoko amin’ny
  - type: text
    content: vahoaka Israely
  - type: text
    content: 'rehefa afaka izany andro izany, hoy ny Tompo:'
  - type: text
    content: Hataoko ao an-tsainy ny lalànako,
  - type: text
    content: ary hosoratako ao am-pony;
  - type: text
    content: dia ho Andriamanitr’ireo Aho,
  - type: text
    content: ary izy ho vahoakako!
  '11':
  - type: text
    content: Ka samy tsy hisy hampianatra ny mpiray firenena aminy
  - type: text
    content: 'na hampianatra ny havany intsony hanao hoe:'
  - type: text
    content: ‹Mahalalà ny Tompo!›
  - type: text
    content: Fa samy hahalala Ahy avokoa izy rehetra,
  - type: text
    content: hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra.
  '12':
  - type: text
    content: Havelako tokoa ny helony
  - type: text
    content: ary tsy hotsarovako intsony ny fahotany
  - type: note
    content: 'And 8-12: Jer 31.31-34, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .»
  '13':
  - type: text
    content: Matoa milaza Fanekempihavanana Vaovao Andriamanitra, dia nambarany ho efa tranainy ilay voalohany; fa izay efa tranainy sy mihatonta dia madiva ho levona.
  '2':
  - type: text
    content: 'Mpanao fanompoam-pivavahana ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' Izy, dia ao amin’ny tena tranolay izay naorin’ny Tompo fa tsy naorin’olombelona.'
  '3':
  - type: text
    content: 'Ny mpisorombe rehetra dia tendrena mba hanolotra fanatitra sy sorona; ka dia tsy maintsy hanan-katolotra koa ilay Mpisorombentsika. '
  '4':
  - type: text
    content: 'Raha etỳ an-tany Izy, dia tsy ho mpisorona akory, fa efa misy rahateo ireo mpisorona manolotra fanatitra araka ny '
  - type: text
    content: lalàna
  - type: text
    content: ' jiosy. '
  '5':
  - type: text
    content: 'Ny fanompoam-pivavahana ataon’ireo mpisorona ireo dia sarintsary sy tandindon’ny ao an-danitra fotsiny; tahaka ny natoron’Andriamanitra tamin’i Mosesy ihany izany, fa nony efa hanao ny tranolay izy dia nilazan’Andriamanitra hoe: «Tandremo mba ho araka ny ohatra nasehoko anao tany an-tendrombohitra no hanaovanao ny zavatra rehetra'
  - type: note
    content: Eks 25.40.
  - type: text
    content: '.» '
  '6':
  - type: text
    content: Fa ankehitriny i Jesoa dia nanankinana fanompoam-pivavahana tsara lavitra noho ny an’ireo mpisorona ireo, satria Izy no mpanalalana amin’ny Fanekempihavanana tsara lavitra izay miorina amin’ny fampanantenana tsara lavitra
  - type: note
    content: 'Izay miorina... tsara lavitra: dkt hafa izay mirakitra fepetra momba ny fampanantenana tsara lavitra.'
  - type: text
    content: .
  '7':
  - type: text
    content: Raha tsy nanan-tsiny tokoa ilay Fanekempihavanana voalohany
  - type: note
    content: Izany fanekempihavanana voalohany izany dia ilay natao tany Sinay (jereo Eks 20.3-8).
  - type: text
    content: ', dia tsy nilaina hisy faharoa hisolo azy. '
  '8':
  - type: text
    content: 'Kanefa omen’Andriamanitra tsiny ny vahoakany, raha ilazany hoe:'
  - type: text
    content: «Indro fa avy ny andro, hoy ny Tompo,
  - type: text
    content: izay hanaovako Fanekempihavanana Vaovao
  - type: text
    content: 'amin’ny mponin’i '
  - type: text
    content: Israely
  - type: text
    content: ' sy amin’ny mponin’i Joda.'
  '9':
  - type: text
    content: Nefa tsy mba Fanekempihavanana mitovy amin’izay
  - type: text
    content: nataoko tamin’ny razany,
  - type: text
    content: tamin’ny andro nitantanako azy hivoaka ny tany Ejipta;
  - type: text
    content: tsy nahatritra tamin’izany Fanekempihavanana nataoko izany ireo,
  - type: text
    content: koa dia tsy niraharaha azy Aho, hoy ny Tompo.
