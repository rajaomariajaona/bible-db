document_id: HEB.8,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'I Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpisoromben’ny Fanekempihavanana Vaovao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no vontoatin’ny zavatra lazainay: Mpisorombe toy izany no ananantsika, ary Mpisorombe efa mipetraka any an-danitra eo ankavanan’ny sezafiandrianan’ilay Andriamanitra lehibe'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 110.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa izao no Fanekempihavanana hataoko amin’ny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vahoaka Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'rehefa afaka izany andro izany, hoy ny Tompo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko ao an-tsainy ny lalànako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hosoratako ao am-pony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho Andriamanitr’ireo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izy ho vahoakako!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ka samy tsy hisy hampianatra ny mpiray firenena aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'na hampianatra ny havany intsony hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Mahalalà ny Tompo!›
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa samy hahalala Ahy avokoa izy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Havelako tokoa ny helony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hotsarovako intsony ny fahotany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 8-12:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer 31.31-34, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: .»
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Matoa milaza Fanekempihavanana Vaovao Andriamanitra, dia nambarany ho efa tranainy ilay voalohany; fa izay efa tranainy sy mihatonta dia madiva ho levona.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mpanao fanompoam-pivavahana ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' Izy, dia ao amin’ny tena tranolay izay naorin’ny Tompo fa tsy naorin’olombelona.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny mpisorombe rehetra dia tendrena mba hanolotra fanatitra sy sorona; ka dia tsy maintsy hanan-katolotra koa ilay Mpisorombentsika. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Raha etỳ an-tany Izy, dia tsy ho mpisorona akory, fa efa misy rahateo ireo mpisorona manolotra fanatitra araka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' jiosy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny fanompoam-pivavahana ataon’ireo mpisorona ireo dia sarintsary sy tandindon’ny ao an-danitra fotsiny; tahaka ny natoron’Andriamanitra tamin’i Mosesy ihany izany, fa nony efa hanao ny tranolay izy dia nilazan’Andriamanitra hoe: «Tandremo mba ho araka ny ohatra nasehoko anao tany an-tendrombohitra no hanaovanao ny zavatra rehetra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eks 25.40.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa ankehitriny i Jesoa dia nanankinana fanompoam-pivavahana tsara lavitra noho ny an’ireo mpisorona ireo, satria Izy no mpanalalana amin’ny Fanekempihavanana tsara lavitra izay miorina amin’ny fampanantenana tsara lavitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izay miorina... tsara lavitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: izay mirakitra fepetra momba ny fampanantenana tsara lavitra.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha tsy nanan-tsiny tokoa ilay Fanekempihavanana voalohany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izany fanekempihavanana voalohany izany dia ilay natao tany Sinay (jereo Eks 20.3-8).
      marker-yv: yv-n
    - type: text
      text: ', dia tsy nilaina hisy faharoa hisolo azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Kanefa omen’Andriamanitra tsiny ny vahoakany, raha ilazany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro fa avy ny andro, hoy ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hanaovako Fanekempihavanana Vaovao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'amin’ny mponin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' sy amin’ny mponin’i Joda.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nefa tsy mba Fanekempihavanana mitovy amin’izay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nataoko tamin’ny razany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny andro nitantanako azy hivoaka ny tany Ejipta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nahatritra tamin’izany Fanekempihavanana nataoko izany ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa dia tsy niraharaha azy Aho, hoy ny Tompo.
