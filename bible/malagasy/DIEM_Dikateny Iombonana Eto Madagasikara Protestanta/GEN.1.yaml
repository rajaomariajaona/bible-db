document_id: GEN.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noarîn’Andriamanitra izao tontolo izao sy ny olombelona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny fiandohana, fony Andriamanitra nahary ny lanitra sy ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Fomba fandikanteny roa no azo arahina eto: anankiray ny mijanona eo amin’ny tany, ka lasa karazana lohahevitra sy mahaleo tena ny and 1; nefa koa anankiray hafa ny manakambana ny and 1 sy ny and 2 araka izao endriny izao dia mitohy tsara ny fehezanteny.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia tsy nisy endriny sady foana ny tany fa ny haizina no nandrakotra ny lalina, ary ny Fanahin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny Fanahin’Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'azo adika koa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny fofonain’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny rivotra mahery
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: no nanomba tambonin’ny rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Andriamanitra niteny hoe: «Misia mazava.» Dia nisy mazava'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 3:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2Kôr 4.6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hitan’Andriamanitra fa tsara ny mazava, koa nosarahiny ny mazava sy ny haizina. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny mazava nantsoin’Andriamanitra hoe andro, fa ny haizina kosa nantsoiny hoe alina. Dia nisy hariva ary nisy maraina; izany no andro voalohany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Andriamanitra niteny hoe: «Misia habakabaka mba hampisaraka ny rano ho antonta roa.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia tanteraka izany. Nataon’Andriamanitra ny habakabaka ka nampisaraka ny rano ho antonta roa, dia ny rano ambanin’ny habakabaka sy ny rano ambonin’ny habakabaka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny habakabaka nantsoin’Andriamanitra hoe lanitra. Dia nisy hariva ary nisy maraina; izany no andro faharoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Andriamanitra niteny hoe: «Aoka hihandrona amin’ny toerana iray ny rano etỳ ambanin’ny lanitra ka ho hita ny toerana maina!» Dia tanteraka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny toerana maina dia nantsoin’Andriamanitra hoe tany, ary ny rano nihandrona kosa nantsoiny hoe ranomasina; ka hitany fa tsara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Andriamanitra niteny hoe: «Aoka ny tany ho rakotra zava-maitso: zava-maniry misy voa famafy, hazo fihinam-boa isan-karazany eny ambonin’ny tany izay samy manana ny voany avy!» Dia tanteraka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ny tany nampitsimoka zava-maitso: zava-maniry misy voa famafy isan-karazany, hazo vokatra voankazo izay misy voany na taolany isan-karazany; ka hitan’Andriamanitra fa tsara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nisy hariva ary nisy maraina; izany no andro fahatelo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Andriamanitra niteny hoe: «Aoka hisy fanazavana eny amin’ny habakabaky ny lanitra mba hampiavaka ny andro sy ny alina sady ho marika hamantarana ny fety mbamin’ny andro sy ny taona! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ho fanazavana eny amin’ny habakabaky ny lanitra izy mba hanazava ny etỳ ambonin’ny tany.» Dia tanteraka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Andriamanitra nanao ny loharanom-panazavana roa lehibe: ny lehibe kokoa dia ny masoandro mba hanapaka ny andro, ary ny kely kokoa dia ny volana mba hanapaka ny alina; dia nanao ireo kintana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Raha milaza ny Baiboly fa Andriamanitra no namorona ireo planeta sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kintana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dia ho fanoherany ny karazam-pivavahana izay mihevitra ireo planeta sy kintana ho andriamanitra.'
    marker-yv: yv-n
  - type: text
    text: ' ihany koa Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Napetrak’Andriamanitra teny amin’ny habakabaky ny lanitra ireny mba hanazava ny etỳ ambonin’ny tany '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'sy hanapaka ny andro sy ny alina ary hampisaraka ny mazava sy ny haizina. Ka hitan’Andriamanitra fa tsara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nisy hariva ary nisy maraina; izany no andro fahefatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Andriamanitra niteny hoe: «Aoka ny rano ho feno zava-miaina mihetsiketsika isan-karazany, ary aoka ny vorona hanidintsidina ambonin’ny tany eny amin’ny habakabaky ny lanitra!» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia noarin’Andriamanitra ireo fanano anaty ranomasina sy ireo zava-miaina rehetra isan-karazany mihetsiketsika sady miriaria ao anaty rano, ary koa ireo voro-manidina isan-karazany. Ka hitan’Andriamanitra fa tsara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nitsodrano
  - type: text
    text: ' azy Andriamanitra nanao hoe: «Aoka ireo zava-miaina ao anaty rano hiteraka maro sy hihabetsaka ary hameno ny ranomasina; ary aoka ny voro-manidina hihabetsaka eny ambonin’ny tany!» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia nisy hariva ary nisy maraina; izany no andro fahadimy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Andriamanitra niteny hoe: «Aoka ny tany hamoaka zava-miaina isan-karazany: biby fiompy, biby madinika mandady ary bibidia, samy araka ny karazany avy.» Dia tanteraka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nataon’Andriamanitra avokoa ny bibidia isan-karazany, ny biby fiompy isan-karazany, ary ny biby madinika isan-karazany mandady amin’ny tany; ka hitan’Andriamanitra fa tsara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Andriamanitra niteny hoe: «Aoka isika hanao olombelona mitovy endrika amintsika sy manahaka antsika; ary aoka hanjakany ny trondro any an-dranomasina sy ny voro-manidina eny an-danitra, ny biby fiompy sy bibidia rehetra eto an-tany ary koa ny biby madinika rehetra mandady amin’ny tany!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia nahary ny olombelona mitovy endrika aminy tokoa Andriamanitra; lehilahy sy vehivavy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mitovy endrika aminy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Gen 5.1-2; 9.6; 1Kôr 11.7. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lehilahy sy vehivavy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Mt 19.4; Mk 10.6.'
    marker-yv: yv-n
  - type: text
    text: ' no nahariany azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nitsodrano azy Andriamanitra ka nanao taminy hoe: «Miteraha maro sy mihabetsaha ary mamenoa ny tany mba hifehy azy. Anjakao ny trondro any an-dranomasina sy ny voro-manidina eny an-danitra ary ny biby rehetra mihetsiketsika ambonin’ny tany.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy koa Izy hoe: «Indro omeko ho anareo eran’ny tany tontolo ny zava-maniry rehetra mamokatra voa, ary ny hazo rehetra mamokatra voankazo: ireny voanjavatra sy voankazo fihinana ireny no ho sakafonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny omeko ny ahi-maitso rehetra ho sakafony kosa dia ny biby rehetra eto an-tany sy ny voro-manidina rehetra eny an-danitra ary ny biby madinika rehetra mandady amin’ny tany, izany hoe ny manam-pofonaina rehetra.» Dia tanteraka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary hitan’Andriamanitra fa izay rehetra nataony dia indro tena tsara. Dia nisy hariva ary nisy maraina; izany no andro fahenina.
