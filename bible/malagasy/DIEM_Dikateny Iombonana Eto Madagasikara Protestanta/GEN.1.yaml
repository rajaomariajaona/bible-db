document_id: GEN.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Noarîn’Andriamanitra izao tontolo izao sy ny olombelona
  - type: text
    content: Tamin’ny fiandohana, fony Andriamanitra nahary ny lanitra sy ny tany
  - type: note
    content: 'Fomba fandikanteny roa no azo arahina eto: anankiray ny mijanona eo amin’ny tany, ka lasa karazana lohahevitra sy mahaleo tena ny and 1; nefa koa anankiray hafa ny manakambana ny and 1 sy ny and 2 araka izao endriny izao dia mitohy tsara ny fehezanteny.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Ny toerana maina dia nantsoin’Andriamanitra hoe tany, ary ny rano nihandrona kosa nantsoiny hoe ranomasina; ka hitany fa tsara izany. '
  '11':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: «Aoka ny tany ho rakotra zava-maitso: zava-maniry misy voa famafy, hazo fihinam-boa isan-karazany eny ambonin’ny tany izay samy manana ny voany avy!» Dia tanteraka izany. '
  '12':
  - type: text
    content: 'Fa ny tany nampitsimoka zava-maitso: zava-maniry misy voa famafy isan-karazany, hazo vokatra voankazo izay misy voany na taolany isan-karazany; ka hitan’Andriamanitra fa tsara izany. '
  '13':
  - type: text
    content: Dia nisy hariva ary nisy maraina; izany no andro fahatelo.
  '14':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: «Aoka hisy fanazavana eny amin’ny habakabaky ny lanitra mba hampiavaka ny andro sy ny alina sady ho marika hamantarana ny fety mbamin’ny andro sy ny taona! '
  '15':
  - type: text
    content: 'Ho fanazavana eny amin’ny habakabaky ny lanitra izy mba hanazava ny etỳ ambonin’ny tany.» Dia tanteraka izany. '
  '16':
  - type: text
    content: 'Ary Andriamanitra nanao ny loharanom-panazavana roa lehibe: ny lehibe kokoa dia ny masoandro mba hanapaka ny andro, ary ny kely kokoa dia ny volana mba hanapaka ny alina; dia nanao ireo kintana'
  - type: note
    content: Raha milaza ny Baiboly fa Andriamanitra no namorona ireo planeta sy kintana, dia ho fanoherany ny karazam-pivavahana izay mihevitra ireo planeta sy kintana ho andriamanitra.
  - type: text
    content: ' ihany koa Izy. '
  '17':
  - type: text
    content: 'Napetrak’Andriamanitra teny amin’ny habakabaky ny lanitra ireny mba hanazava ny etỳ ambonin’ny tany '
  '18':
  - type: text
    content: 'sy hanapaka ny andro sy ny alina ary hampisaraka ny mazava sy ny haizina. Ka hitan’Andriamanitra fa tsara izany. '
  '19':
  - type: text
    content: Dia nisy hariva ary nisy maraina; izany no andro fahefatra.
  '2':
  - type: text
    content: dia tsy nisy endriny sady foana ny tany fa ny haizina no nandrakotra ny lalina, ary ny Fanahin’Andriamanitra
  - type: note
    content: 'ny Fanahin’Andriamanitra: azo adika koa hoe ny fofonain’Andriamanitra, na ny rivotra mahery.'
  - type: text
    content: no nanomba tambonin’ny rano.
  '20':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: «Aoka ny rano ho feno zava-miaina mihetsiketsika isan-karazany, ary aoka ny vorona hanidintsidina ambonin’ny tany eny amin’ny habakabaky ny lanitra!» '
  '21':
  - type: text
    content: 'Dia noarin’Andriamanitra ireo fanano anaty ranomasina sy ireo zava-miaina rehetra isan-karazany mihetsiketsika sady miriaria ao anaty rano, ary koa ireo voro-manidina isan-karazany. Ka hitan’Andriamanitra fa tsara izany. '
  '22':
  - type: text
    content: 'Dia '
  - type: text
    content: nitsodrano
  - type: text
    content: ' azy Andriamanitra nanao hoe: «Aoka ireo zava-miaina ao anaty rano hiteraka maro sy hihabetsaka ary hameno ny ranomasina; ary aoka ny voro-manidina hihabetsaka eny ambonin’ny tany!» '
  '23':
  - type: text
    content: Dia nisy hariva ary nisy maraina; izany no andro fahadimy.
  '24':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: «Aoka ny tany hamoaka zava-miaina isan-karazany: biby fiompy, biby madinika mandady ary bibidia, samy araka ny karazany avy.» Dia tanteraka izany. '
  '25':
  - type: text
    content: 'Nataon’Andriamanitra avokoa ny bibidia isan-karazany, ny biby fiompy isan-karazany, ary ny biby madinika isan-karazany mandady amin’ny tany; ka hitan’Andriamanitra fa tsara izany. '
  '26':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: «Aoka isika hanao olombelona mitovy endrika amintsika sy manahaka antsika; ary aoka hanjakany ny trondro any an-dranomasina sy ny voro-manidina eny an-danitra, ny biby fiompy sy bibidia rehetra eto an-tany ary koa ny biby madinika rehetra mandady amin’ny tany!»'
  '27':
  - type: text
    content: Dia nahary ny olombelona mitovy endrika aminy tokoa Andriamanitra; lehilahy sy vehivavy
  - type: note
    content: 'mitovy endrika aminy: ampit Gen 5.1-2; 9.6; 1Kôr 11.7. –lehilahy sy vehivavy: jereo Mt 19.4; Mk 10.6.'
  - type: text
    content: ' no nahariany azy.'
  '28':
  - type: text
    content: 'Nitsodrano azy Andriamanitra ka nanao taminy hoe: «Miteraha maro sy mihabetsaha ary mamenoa ny tany mba hifehy azy. Anjakao ny trondro any an-dranomasina sy ny voro-manidina eny an-danitra ary ny biby rehetra mihetsiketsika ambonin’ny tany.» '
  '29':
  - type: text
    content: 'Ary hoy koa Izy hoe: «Indro omeko ho anareo eran’ny tany tontolo ny zava-maniry rehetra mamokatra voa, ary ny hazo rehetra mamokatra voankazo: ireny voanjavatra sy voankazo fihinana ireny no ho sakafonareo. '
  '3':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: «Misia mazava.» Dia nisy mazava'
  - type: note
    content: 'And 3: jereo 2Kôr 4.6.'
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Ary ny omeko ny ahi-maitso rehetra ho sakafony kosa dia ny biby rehetra eto an-tany sy ny voro-manidina rehetra eny an-danitra ary ny biby madinika rehetra mandady amin’ny tany, izany hoe ny manam-pofonaina rehetra.» Dia tanteraka izany. '
  '31':
  - type: text
    content: Ary hitan’Andriamanitra fa izay rehetra nataony dia indro tena tsara. Dia nisy hariva ary nisy maraina; izany no andro fahenina.
  '4':
  - type: text
    content: 'Hitan’Andriamanitra fa tsara ny mazava, koa nosarahiny ny mazava sy ny haizina. '
  '5':
  - type: text
    content: Ny mazava nantsoin’Andriamanitra hoe andro, fa ny haizina kosa nantsoiny hoe alina. Dia nisy hariva ary nisy maraina; izany no andro voalohany.
  '6':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: «Misia habakabaka mba hampisaraka ny rano ho antonta roa.» '
  '7':
  - type: text
    content: 'Dia tanteraka izany. Nataon’Andriamanitra ny habakabaka ka nampisaraka ny rano ho antonta roa, dia ny rano ambanin’ny habakabaka sy ny rano ambonin’ny habakabaka. '
  '8':
  - type: text
    content: Ary ny habakabaka nantsoin’Andriamanitra hoe lanitra. Dia nisy hariva ary nisy maraina; izany no andro faharoa.
  '9':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: «Aoka hihandrona amin’ny toerana iray ny rano etỳ ambanin’ny lanitra ka ho hita ny toerana maina!» Dia tanteraka izany. '
