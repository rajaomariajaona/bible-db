      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ka hoy ireo amin’izay ifanenany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mihatakataha lavitra, aza mikasika ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao mahafaty anareo ny fahamasinako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mba maka tahaka ny olona voatokan’Andriamanitra ireo mpanompo sampy, ka mihevitra ho manan-kasina sady fady kasihina rehefa avy nanao ny fombafombam-pivavahany.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireny fomban-tsampy isan-karazany ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny setroka mampirongatra ny hatezerako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy toy ny afo mampirehidrehitra azy isan’andro.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
