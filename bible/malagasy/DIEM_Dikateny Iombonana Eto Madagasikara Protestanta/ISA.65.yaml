  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitsarana ho avy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia hoy ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa vonona hamaly Aho saingy tsy nisy nanontany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa niandry Aho, saingy tsy nisy nitady fanampiana tamiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa firenena izay tsy niantso Ahy akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no nanambarako hoe: «Inty Aho! Inty Aho'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ao amin’ny Rm 10.20-21 dia tsiahivin’i Paoly apôstôly ny and 1-2 araka ny dkt tranainy grika.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ho an’ny vahoakako izay nitady Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanjary saha fiandrasana ondry i Sarôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanjary valan’omby ny lohasaha Hakôra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny faritr’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Sarôna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia lemaka mahavokatra eo amoron’ny Ranomasina Mediteranea. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny lohasaha Hakôra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jos 7.24-26; 15.7; Hôs 2.17.
      marker-yv: yv-n
    - type: text
