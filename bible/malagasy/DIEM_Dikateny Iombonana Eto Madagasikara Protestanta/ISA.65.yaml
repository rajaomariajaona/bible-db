document_id: ISA.65,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsarana ho avy
  - type: text
    content: 'Dia hoy ny TOMPO hoe:'
  - type: text
    content: Efa vonona hamaly Aho saingy tsy nisy nanontany;
  - type: text
    content: efa niandry Aho, saingy tsy nisy nitady fanampiana tamiko;
  - type: text
    content: koa firenena izay tsy niantso Ahy akory
  - type: text
    content: 'no nanambarako hoe: «Inty Aho! Inty Aho'
  - type: note
    content: Ao amin’ny Rm 10.20-21 dia tsiahivin’i Paoly apôstôly ny and 1-2 araka ny dkt tranainy grika.
  - type: text
    content: '!»'
  '10':
  - type: text
    content: Ho an’ny vahoakako izay nitady Ahy
  - type: text
    content: dia hanjary saha fiandrasana ondry i Sarôna,
  - type: text
    content: ary hanjary valan’omby ny lohasaha Hakôra
  - type: note
    content: 'Ny faritr’i Sarôna dia lemaka mahavokatra eo amoron’ny Ranomasina Mediteranea. –ny lohasaha Hakôra: jereo Jos 7.24-26; 15.7; Hôs 2.17.'
  - type: text
    content: .
  '11':
  - type: text
    content: Ianareo izay nandao Ahy TOMPO kosa
  - type: text
    content: ka nanadino ny mankeny an-tendrombohitro masina,
  - type: text
    content: ianareo izay nandroso sakafo ho an’i Gada
  - type: text
    content: sady nanatitra divay voaharoharo ho an’i Menỳ
  - type: note
    content: 'tendrombohitro masina: jereo 56.7 sy nta. –Gada: andriamanitry ny anjara teo amin’ny fanompoan-tsampy tany Kanahàna fahizay; ka fahita teo amin’ny anaran-tanàna sy anaran’olona sasantsasany izany voambolana izany (jereo Jos 11.17; 15.37; Gen 30.11). –Menỳ: andriamanitry ny vintana teo amin’ny fanompoan-tsampy fahizay koa.'
  - type: text
    content: ','
  '12':
  - type: text
    content: dia hatolotro ho voan’ny sabatra ianareo
  - type: text
    content: ka haringana avokoa eo am-pandohalehana,
  - type: text
    content: satria nantsoiko ianareo fa tsy namaly
  - type: text
    content: ary nitenenako fa tsy nihaino.
  - type: text
    content: Izay ratsy eo imasoko no nataonareo,
  - type: text
    content: ary izay tsy sitrako no nofidinareo.
  '13':
  - type: text
    content: 'Koa hoy Izaho Tompo ANDRIANANAHARY hoe:'
  - type: text
    content: Indro ny mpanompoko hihinana,
  - type: text
    content: fa ianareo kosa ho mosarena;
  - type: text
    content: indro ny mpanompoko hisotro
  - type: text
    content: fa ianareo kosa ho main-ketaheta;
  - type: text
    content: indro ny mpanompoko hifaly,
  - type: text
    content: fa ianareo kosa ho menatra.
  '14':
  - type: text
    content: Indro ny mpanompoko hihorakora-pifaliana
  - type: text
    content: noho ny hasambarana ao am-pony,
  - type: text
    content: fa ianareo kosa hiantsoantso noho ny alahelom-po
  - type: text
    content: sy hikiakiaka noho ny fanahy torotoro.
  '15':
  - type: text
    content: Eo amin’ny olom-boafidiko
  - type: text
    content: dia hatao ohatra ny anaranareo
  - type: text
    content: 'amin’ny fomba fanozonana toy izao:'
  - type: text
    content: «Hovonoin’ny Tompo ANDRIANANAHARY
  - type: text
    content: tahaka an-dRanona na Ranona anie ianao!»
  - type: text
    content: Ho fanasoavana ny mpanompoko kosa
  - type: text
    content: dia anarana hafa no hotononina aminy.
  '16':
  - type: text
    content: Fa izay hifampirary fitahiana eto amin’ity tany ity,
  - type: text
    content: dia hifanao izany ao amin’Andriamanitra hany mahatoky;
  - type: text
    content: izay hianiana eto amin’ity tany ity,
  - type: text
    content: dia hanao izany ao amin’Andriamanitra hany mahatoky.
  - type: heading
    content: Lanitra vaovao sy tany vaovao
  - type: text
    content: 'Hoy kosa ny TOMPO hoe:'
  - type: text
    content: Eny, ireo fahoriana taloha dia hohadinoina
  - type: text
    content: sy ho voakosoka tanteraka tsy ho eo imasoko.
  '17':
  - type: text
    content: Fa indro Aho mahary habakabaka vaovao sy tany vaovao
  - type: text
    content: ka tsy hotsarovana intsony
  - type: text
    content: ny habakabaka sy tany taloha
  - type: note
    content: 'ny habakabaka sy tany taloha: ampit Is 66.22; 2Pt 3.13; Apôk 21.1.'
  - type: text
    content: na ho mby ao an-tsaina akory aza.
  '18':
  - type: text
    content: Fa mifalia sy miravoravoa hatrany ianareo
  - type: text
    content: 'ny amin’ny zavatra izay hoarîko:'
  - type: text
    content: dia i Jerosalema heni-karavoana
  - type: text
    content: ary ny vahoakany heni-kafaliana.
  '19':
  - type: text
    content: Izaho koa hiravo amin’i Jerosalema
  - type: text
    content: sy hifaly amin’ny vahoakako.
  - type: text
    content: Fa tsy ho re ao Jerosalema intsony
  - type: text
    content: na ny tomany na ny kiakiakam-pitarainana
  - type: note
    content: Ampit Apôk 21.4.
  - type: text
    content: .
  '2':
  - type: text
    content: Nanolo-tanana hatrany Aho
  - type: text
    content: tamina vahoaka mpikomy,
  - type: text
    content: dia olona manaraka ny lalan-dratsiny
  - type: text
    content: sady mirona amin’ny saim-pantany.
  '20':
  - type: text
    content: Tsy hisy ao intsony ny zaza minono
  - type: text
    content: izay ho faty anatin’ny andro vitsivitsy
  - type: text
    content: na ny antitra tsy hahatapitra ny androny;
  - type: text
    content: fa ho maty tanora izay maty zato taona,
  - type: text
    content: ary heverina ho olona voaozona
  - type: text
    content: izay tsy mahatratra zato taona.
  '21':
  - type: text
    content: Hanao trano ny vahoakako,
  - type: text
    content: ka hitoerany tokoa izany;
  - type: text
    content: hamboly voaloboka izy
  - type: text
    content: ka hihinana tokoa ny vokany.
  '22':
  - type: text
    content: Tsy hanao trano hitoeran’ny hafa intsony izy
  - type: text
    content: na hamboly zavatra hohanin’ny olon-kafa;
  - type: text
    content: fa ho tahaka ny andro hiainan’ny hazo
  - type: text
    content: ny andro hiainan’ny vahoakako,
  - type: text
    content: ary ny olom-boafidiko hanaram-po
  - type: text
    content: amin’ny vokatry ny asa vitany
  - type: note
    content: 'hanaram-po... vitany: jereo 62.8-9; Jer 31.5; Ham 9.14.'
  - type: text
    content: .
  '23':
  - type: text
    content: Tsy hisasatra foana intsony izy
  - type: text
    content: na hitera-jaza ho fatin’ny loza tampoka;
  - type: text
    content: fa fianakaviana izay notahiko izy,
  - type: text
    content: na ny tenany na ny zanany naterany.
  '24':
  - type: text
    content: Mbola tsy miantso akory izy,
  - type: text
    content: dia efa hamaly azy Aho;
  - type: text
    content: ary mbola tsy tapi-miteny izy,
  - type: text
    content: dia efa azoko ny tiany holazaina.
  '25':
  - type: text
    content: Hiara-miraoka ahitra ny amboadia sy ny zanak’ondry;
  - type: text
    content: ny liona hihinam-bilona toy ny omby,
  - type: text
    content: ary ny menarana kosa dia vovoka no ho fihinany.
  - type: text
    content: Tsy hisy fanaovan-dratsy intsony, hoy AHO,
  - type: text
    content: na fanimbàn-javatra intsony,
  - type: text
    content: manerana ny tendrombohitro masina
  - type: note
    content: 'tendrombohitro masina: jereo 56.7 sy nta. –Momba ny and manontolo dia jereo Is 11.6-9.'
  - type: text
    content: '!'
  '3':
  - type: text
    content: Vahoaka mampahatezitra Ahy mandrakariva izany;
  - type: text
    content: sady eo imasoko no anaovany sorona eny an-tanimboly
  - type: text
    content: sy andoroany zava-manitra mifangaro
  - type: text
    content: 'eny amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' tanimanga'
  - type: text
    content: ho fanajana ny andriamani-kafa.
  '4':
  - type: text
    content: Mipetraka any am-pasana izy ireny
  - type: text
    content: na misitrika any an-dava-bato
  - type: note
    content: Ny mpanompo sampy dia nipetraka tany am-pasana satria nanantena hifandray amin’ny maty; ampit Lev 19.31; Deot 18.11-12.
  - type: text
    content: ' amin’ny alina,'
  - type: text
    content: sady mihinana hena kisoa
  - type: text
    content: 'ary manisy ron-kena '
  - type: text
    content: maloto
  - type: text
    content: ' ao an-doviany.'
  '5':
  - type: text
    content: 'Ka hoy ireo amin’izay ifanenany:'
  - type: text
    content: «Mihatakataha lavitra, aza mikasika ahy
  - type: text
    content: fandrao mahafaty anareo ny fahamasinako
  - type: note
    content: Mba maka tahaka ny olona voatokan’Andriamanitra ireo mpanompo sampy, ka mihevitra ho manan-kasina sady fady kasihina rehefa avy nanao ny fombafombam-pivavahany.
  - type: text
    content: .»
  - type: text
    content: Ireny fomban-tsampy isan-karazany ireny
  - type: text
    content: dia toy ny setroka mampirongatra ny hatezerako
  - type: text
    content: sy toy ny afo mampirehidrehitra azy isan’andro.
  '6':
  - type: text
    content: Indro voasoratra eto anatrehako avokoa ireny,
  - type: text
    content: koa tsy hangina Aho raha tsy voavaliko ny nataony,
  - type: text
    content: ary hovaliako mitafotafo mihitsy aza;
  '7':
  - type: text
    content: ka indray hatsingeriko aminy, hoy Aho,
  - type: text
    content: ny heloka vitany sy ny heloky ny razany.
  - type: text
    content: Satria ireto koa efa nandoro zava-manitra mifangaro
  - type: text
    content: ho an’ny sampy teny an-tendrombohitra
  - type: text
    content: sy nihantsy Ahy teny amin’ny havoana;
  - type: text
    content: ka dia ho fatra mitafotafo mihitsy
  - type: text
    content: no hasetriko ny fitondrantenany fahiny!
  '8':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: Rehefa ahitana sampaho mamy
  - type: text
    content: eo amin’ny rantsam-boaloboka iray
  - type: text
    content: 'dia ataon’ny olona hoe: «Aza simbana izany,'
  - type: text
    content: fa misy fitahiana hahazoan-divay tsara eo aminy»;
  - type: text
    content: ho tahaka izany koa
  - type: text
    content: no hataoko amin’ny mpanompoko
  - type: text
    content: mba tsy hosimbako izy rehetra.
  '9':
  - type: text
    content: Homeko taranaka ny firenen’i Jakôba sy ny fokon’i Joda.
  - type: text
    content: 'Ireny no ho tompon’ny tendrombohitro:'
  - type: text
    content: ireo voafidiko no ho tompony,
  - type: text
    content: ireo mpanompoko no honina eo.
