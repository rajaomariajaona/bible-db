      text: ny heloka vitany sy ny heloky ny razany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ireto koa efa nandoro zava-manitra mifangaro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny sampy teny an-tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nihantsy Ahy teny amin’ny havoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia ho fatra mitafotafo mihitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hasetriko ny fitondrantenany fahiny!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izao no lazain’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa ahitana sampaho mamy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny rantsam-boaloboka iray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ataon’ny olona hoe: «Aza simbana izany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa misy fitahiana hahazoan-divay tsara eo aminy»;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka izany koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hataoko amin’ny mpanompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hosimbako izy rehetra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Homeko taranaka ny firenen’i Jakôba sy ny fokon’i Joda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ireny no ho tompon’ny tendrombohitro:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo voafidiko no ho tompony,
  - type: usfm
