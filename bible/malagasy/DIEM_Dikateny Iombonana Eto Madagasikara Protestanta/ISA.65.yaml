  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ianareo izay nandao Ahy TOMPO kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanadino ny mankeny an-tendrombohitro masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo izay nandroso sakafo ho an’i Gada
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nanatitra divay voaharoharo ho an’i Menỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tendrombohitro masina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 56.7 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gada: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: andriamanitry ny anjara teo amin’ny fanompoan-tsampy tany Kanahàna fahizay; ka fahita teo amin’ny anaran-tanàna sy anaran’olona sasantsasany izany voambolana izany (jereo Jos 11.17; 15.37; Gen 30.11). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Menỳ: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: andriamanitry ny vintana teo amin’ny fanompoan-tsampy fahizay koa.
      marker-yv: yv-n
    - type: text
      text: ','
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: dia hatolotro ho voan’ny sabatra ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka haringana avokoa eo am-pandohalehana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nantsoiko ianareo fa tsy namaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nitenenako fa tsy nihaino.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay ratsy eo imasoko no nataonareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay tsy sitrako no nofidinareo.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa hoy Izaho Tompo ANDRIANANAHARY hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro ny mpanompoko hihinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianareo kosa ho mosarena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro ny mpanompoko hisotro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianareo kosa ho main-ketaheta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro ny mpanompoko hifaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianareo kosa ho menatra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Indro ny mpanompoko hihorakora-pifaliana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny hasambarana ao am-pony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianareo kosa hiantsoantso noho ny alahelom-po
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hikiakiaka noho ny fanahy torotoro.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Eo amin’ny olom-boafidiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hatao ohatra ny anaranareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'amin’ny fomba fanozonana toy izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Hovonoin’ny Tompo ANDRIANANAHARY
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka an-dRanona na Ranona anie ianao!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho fanasoavana ny mpanompoko kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia anarana hafa no hotononina aminy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa izay hifampirary fitahiana eto amin’ity tany ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hifanao izany ao amin’Andriamanitra hany mahatoky;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hianiana eto amin’ity tany ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanao izany ao amin’Andriamanitra hany mahatoky.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lanitra vaovao sy tany vaovao
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy kosa ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ireo fahoriana taloha dia hohadinoina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho voakosoka tanteraka tsy ho eo imasoko.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa indro Aho mahary habakabaka vaovao sy tany vaovao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hotsarovana intsony
  - type: usfm
    marker: q1
    children:
    - type: text
