          text: Tibihata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kona:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tanàna roa any Siria heverina ho teo amin’ny manodidina an’i Bahalbeka ankehitriny. '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: –fitobian-drano boribory goavana sy ny andry ary ny fanaka rehetra vita varahina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 1 Mp 7.23-26, 15-22, 45.'
      marker-yv: yv-n
