document_id: 1CH.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandresen’i Davida ireo firenena manodidina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 8.1-14)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany, dia nandresy ny Filistinina i Davida ka nampilefitra azy ary nalainy teo an-tanan’ny Filistinina i Gata sy ireo tanàna kely manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nandresy ny Môabita koa izy; dia tonga olom-pehezin’i Davida ireo sady mpandoa hetra ho azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mbola resin’i Davida koa i Hadadehezera mpanjakan’i Tsôbà, akaikin’i Hamata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsôbà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanjakana ao avaratr’i Damasy. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hamata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tanàna sy fanjakana mbola any avarabaratra kokoa; jereo and 9 ary koa ny 2 Sam 8.9 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '; tamin’iny nanitaran’i Hadadehezera ny fanjakany teny amoron’ny ony Eofrata iny indrindra no nandresen’i Davida azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Kalesy arivo sy mpitaingin-tsoavaly fito arivo ary miaramila an-tongotra 20 000 no voababon’i Davida taminy; saingy nasain’i Davida nokapain-tongotra avokoa ny soavalin-kalesy fa ny tokony ho amin’ny kalesy zato ihany no sisa notazoniny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia tonga ny Sirianina avy any Damasy mba hamonjy an’i Hadadehezera mpanjakan’i Tsôbà; kanefa nahafatesan’i Davida miaramila 22 000 koa ny Sirianina. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nametrahan’i Davida governora tany Siria, faritr’i Damasy; ka dia tonga olom-pehezin’i Davida sady mpandoa hetra ho azy ny Sirianina. Fa nampandresy an’i Davida tamin’izay fanafihany rehetra ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nalain’i Davida ny ampinga volamena izay teny amin’ny mpanompon’i Hadadehezera ka nentiny tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nahazoan’i Davida halimo be dia be koa tao Tibihata sy Kona, izay samy tanànan’i Hadadehezera; ka izany halimo izany no nanaovan’i Salômôna ilay fitobian-drano boribory goavana mbamin’ireo andry sy ireo fanaka halimo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tibihata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kona:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tanàna roa any Siria heverina ho teo amin’ny manodidina an’i Bahalbeka ankehitriny. '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: –fitobian-drano boribory goavana sy ny andry ary ny fanaka rehetra vita varahina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 1 Mp 7.23-26, 15-22, 45.'
    marker-yv: yv-n
  - type: text
    text: ' (tao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ren’i Tôhỳ, mpanjakan’i Hamàta, fa resin’i Davida avokoa ny tafik’i Hadadehezera mpanjakan’i Tsôbà; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia nirahin’i Tôhỳ ho any amin’i Davida mpanjaka i Hadôrama zanany lahy mba hiarahaba sy hidera azy noho ny niadiany tamin’i Hadadehezera ka nandreseny azy, satria mpiady tamin’i Tôhỳ io Hadadehezera io; koa fanaka volamena sy volafotsy ary halimo isan-karazany no nampitondrain’i Tôhỳ ho an’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ireo fanaka ireo koa dia natokan’i Davida mpanjaka ho an’ny TOMPO, niaraka tamin’ny volafotsy sy volamena izay nentiny avy any amin’ny firenena hafa rehetra: dia ny Edômita sy Môabita ary Hamônita mbamin’ny Filistinina sy Hamalekîta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I Abisay, zanakalahin’i Tseroià, dia nandresy ny Edômita tokony ho 18 000 lahy, tao amin’ny Lohasahan-tsira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Lohasahan-tsira: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 8.13 sy nta; jereo koa Sal 60.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nametrahany governora tao Edôma, ka tonga olom-pehezin’i Davida ny Edômita rehetra; ary nampandresy an’i Davida tamin’izay fanafihany rehetra ny TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpiasam-panjakan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 8.15-18)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nanjaka tamin’i Israely manontolo i Davida ka nanao ny rariny sy ny fahamarinana tamin’ny vahoakany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I Jôaba zanakalahin’i Tseroià, no lehiben’ny tafika; i Jôsafata zanakalahin’i Ahiloda, no mpitondra tenin’ny mpanjaka, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'i Tsadôka zanakalahin’i Ahitoba mbamin’i Abimelèka zanakalahin’i Abiatara no mpisorona; i Savesà no mpitantsoratra; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: i Benaià, zanakalahin’i Jôiadà, no lehiben’ny Keretita sy Peletita mpiambina ny mpanjaka; ary ireo zanakalahin’i Davida kosa dia mpiara-miasa akaiky amin’ny mpanjaka.
