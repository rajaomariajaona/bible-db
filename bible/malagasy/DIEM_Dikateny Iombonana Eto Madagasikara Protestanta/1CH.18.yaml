document_id: 1CH.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandresen’i Davida ireo firenena manodidina
  - type: heading
    content: (Jereo 2 Sam 8.1-14)
  - type: text
    content: 'Taorian’izany, dia nandresy ny Filistinina i Davida ka nampilefitra azy ary nalainy teo an-tanan’ny Filistinina i Gata sy ireo tanàna kely manodidina azy. '
  '10':
  - type: text
    content: 'dia nirahin’i Tôhỳ ho any amin’i Davida mpanjaka i Hadôrama zanany lahy mba hiarahaba sy hidera azy noho ny niadiany tamin’i Hadadehezera ka nandreseny azy, satria mpiady tamin’i Tôhỳ io Hadadehezera io; koa fanaka volamena sy volafotsy ary halimo isan-karazany no nampitondrain’i Tôhỳ ho an’i Davida. '
  '11':
  - type: text
    content: 'Ireo fanaka ireo koa dia natokan’i Davida mpanjaka ho an’ny TOMPO, niaraka tamin’ny volafotsy sy volamena izay nentiny avy any amin’ny firenena hafa rehetra: dia ny Edômita sy Môabita ary Hamônita mbamin’ny Filistinina sy Hamalekîta.'
  '12':
  - type: text
    content: I Abisay, zanakalahin’i Tseroià, dia nandresy ny Edômita tokony ho 18 000 lahy, tao amin’ny Lohasahan-tsira
  - type: note
    content: 'Lohasahan-tsira: jereo 2 Sam 8.13 sy nta; jereo koa Sal 60.2.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: Dia nametrahany governora tao Edôma, ka tonga olom-pehezin’i Davida ny Edômita rehetra; ary nampandresy an’i Davida tamin’izay fanafihany rehetra ny TOMPO.
  - type: heading
    content: Ireo mpiasam-panjakan’i Davida
  - type: heading
    content: (Jereo 2 Sam 8.15-18)
  '14':
  - type: text
    content: 'Dia nanjaka tamin’i Israely manontolo i Davida ka nanao ny rariny sy ny fahamarinana tamin’ny vahoakany rehetra. '
  '15':
  - type: text
    content: 'I Jôaba zanakalahin’i Tseroià, no lehiben’ny tafika; i Jôsafata zanakalahin’i Ahiloda, no mpitondra tenin’ny mpanjaka, '
  '16':
  - type: text
    content: 'i Tsadôka zanakalahin’i Ahitoba mbamin’i Abimelèka zanakalahin’i Abiatara no mpisorona; i Savesà no mpitantsoratra; '
  '17':
  - type: text
    content: i Benaià, zanakalahin’i Jôiadà, no lehiben’ny Keretita sy Peletita mpiambina ny mpanjaka; ary ireo zanakalahin’i Davida kosa dia mpiara-miasa akaiky amin’ny mpanjaka.
  '2':
  - type: text
    content: 'Nandresy ny Môabita koa izy; dia tonga olom-pehezin’i Davida ireo sady mpandoa hetra ho azy. '
  '3':
  - type: text
    content: Mbola resin’i Davida koa i Hadadehezera mpanjakan’i Tsôbà, akaikin’i Hamata
  - type: note
    content: 'Tsôbà: fanjakana ao avaratr’i Damasy. –Hamata: tanàna sy fanjakana mbola any avarabaratra kokoa; jereo and 9 ary koa ny 2 Sam 8.9 sy nta.'
  - type: text
    content: '; tamin’iny nanitaran’i Hadadehezera ny fanjakany teny amoron’ny ony Eofrata iny indrindra no nandresen’i Davida azy. '
  '4':
  - type: text
    content: 'Kalesy arivo sy mpitaingin-tsoavaly fito arivo ary miaramila an-tongotra 20 000 no voababon’i Davida taminy; saingy nasain’i Davida nokapain-tongotra avokoa ny soavalin-kalesy fa ny tokony ho amin’ny kalesy zato ihany no sisa notazoniny. '
  '5':
  - type: text
    content: 'Dia tonga ny Sirianina avy any Damasy mba hamonjy an’i Hadadehezera mpanjakan’i Tsôbà; kanefa nahafatesan’i Davida miaramila 22 000 koa ny Sirianina. '
  '6':
  - type: text
    content: 'Nametrahan’i Davida governora tany Siria, faritr’i Damasy; ka dia tonga olom-pehezin’i Davida sady mpandoa hetra ho azy ny Sirianina. Fa nampandresy an’i Davida tamin’izay fanafihany rehetra ny TOMPO. '
  '7':
  - type: text
    content: 'Ary nalain’i Davida ny ampinga volamena izay teny amin’ny mpanompon’i Hadadehezera ka nentiny tany Jerosalema. '
  '8':
  - type: text
    content: Nahazoan’i Davida halimo be dia be koa tao Tibihata sy Kona, izay samy tanànan’i Hadadehezera; ka izany halimo izany no nanaovan’i Salômôna ilay fitobian-drano boribory goavana mbamin’ireo andry sy ireo fanaka halimo
  - type: note
    content: 'Tibihata, Kona: tanàna roa any Siria heverina ho teo amin’ny manodidina an’i Bahalbeka ankehitriny. –fitobian-drano boribory goavana sy ny andry ary ny fanaka rehetra vita varahina: jereo 1 Mp 7.23-26, 15-22, 45.'
  - type: text
    content: ' (tao an-'
  - type: text
    content: tempoly
  - type: text
    content: ).
  '9':
  - type: text
    content: 'Ren’i Tôhỳ, mpanjakan’i Hamàta, fa resin’i Davida avokoa ny tafik’i Hadadehezera mpanjakan’i Tsôbà; '
