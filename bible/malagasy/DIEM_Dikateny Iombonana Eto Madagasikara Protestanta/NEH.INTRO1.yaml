  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ny bokin’i Nehemià dia tohin’ny bokin’i Hezrà; sady boky anankiray nitambatra ihany izy roa tonta vao nisaraka. Ny bokin’i Nehemià dia mirakitra tantara manokana izay azo heverina ho toy ny tahirin-tsoratr’i Nehemià mihitsy.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tamin’ny vaninandron’i Hezrà mpisorona no niainan’i Nehemià. Jiosy sarambabem-bahoaka izy kanefa mpiasa ambony toerana tao an-dapan’i Artakserksesa amperôran’i Persia. Nahazo lalana tamin’ity andriamanjaka tompony izy mba ho any Jerosalema hikarakara ny fanarenan-tanindrazana ara-pôlitika sy ara-toekarena ary ara-sôsialy (1.1–2.10). Rehefa tonga tao an-toerana i Nehemià, dia maro ny mpiray firenena manohana azy; ka, na midrikina aza ny mpanohitra sasantsasany, dia ireo mpomba azy no iarahany manorina indray ny mandan’i Jerosalema (2.11–7.72). Hita eo anilan’i Hezrà koa izy amin’ny fanompoam-pivavahana manetriketrika anankiray; ka mandritra izany indrindra no amakian’i Hezrà ny lalànan’Andriamanitra. Manao famoaboasana kosa ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: na toa mandika teny mihitsy aza ho an’ireo olona tsy mahazo intsony ny fiteny hebreo; ary dia havaozin’ny vahoaka israelita indray ny fanomezan-tokiny amin’Andriamanitra (8.1–10.40). Avy eo dia mampihatra fepetram-pandaminana isan-karazany i Nehemià (11.1–12.26) sy mitarika ny fitokanana ny manda voavoatra (12.27-43) ary miroso amina fanitsiana sasantsasany ara-pivavahana (12.44–13.31).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny toetoetr’i Nehemià, asongadin’ity boky mitondra ny anarany ity, dia maneho lehilahy mahavatra miasa, vonon-kanao zavatra, mitandro fahamasinana sy be herim-po; sady ny asa rehetra ataony koa dia trotroiny am-bavaka hatrany.
