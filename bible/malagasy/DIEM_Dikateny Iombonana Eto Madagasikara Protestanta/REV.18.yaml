document_id: REV.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faharavàn’i Babilôna
  - type: text
    content: 'Taorian’izany, dia hitako nisy '
  - type: text
    content: anjely
  - type: text
    content: ' anankiray hafa koa nidina avy tany an-danitra; nanana fahefana lehibe io anjely io ary nanazava ny tany tontolo ny famirapiratany. '
  '10':
  - type: text
    content: 'Hijanona eny lavitra eny izy ireo, satria raiki-tahotra noho ny fanaintainana mianjady amin’i Babilôna, ka hanao hoe: «Indrisy! Indrisy! Ry Babilôna, tanàna lehibe, tanàna matanjaka! Satria tanaty adiny iray monja dia niharan’ny sazy ianao'
  - type: note
    content: 'And 9-10: ampit Ezek 26.16-17.'
  - type: text
    content: '!»'
  '11':
  - type: text
    content: 'Ny mpandranto manerana ny tany koa dia mitomany sy misaona azy, satria tsy misy mpividy intsony ny entany: '
  '12':
  - type: text
    content: 'dia volamena sy volafotsy; vatosoa sy perla; lamba rongony madinika sy lamba volomparasy; lamba landy sy lamba jaky; hazo mani-pofona isan-karazany; fanaka isan-karazany vita amin’ny ivoary sy hazo sarobidy mbamy halimo sy vy ary vatokaranana; '
  '13':
  - type: text
    content: 'havozomamy sy hodi-kazo manitra; ilomanitra sy miora ary vovo-javamanitra; divay sy diloilo; lafarinina tsara toto sy varimbazaha; omby sy ondry; soavaly sy kalesy; ary mpanompo sy babo. '
  '14':
  - type: text
    content: 'Hoy ireo mpandranto ireo amin’i Babilôna: «Ny vokatra soa nirin’ny fonao dia efa niala taminao; ary ny zava-tsarobidy sy marevaka rehetra dia efa levona lavitra anao, ka tsy ho hitanao intsony!» '
  '15':
  - type: text
    content: Ny mpandranto, izay nahazo harena tamin’i Babilôna noho ireny entana ireny, dia hijanona eny lavitra eny, satria raiki-tahotra noho ny fanaintainana mianjady amin’i Babilôna
  - type: note
    content: 'And 11-15: ampit Ezek 27.31, 36; 27.12, 13, 22.'
  - type: text
    content: ' ka hitomany sy hisaona '
  '16':
  - type: text
    content: 'sady hanao hoe: «Indrisy! Indrisy! Ry tanàna lehibe, izay nitafy lamba rongony madinika sy lamba volomparasy ary lamba jaky, sady niravaka volamena sy vatosoa ary perla! '
  '17':
  - type: text
    content: Satria tanaty adiny iray monja dia foana izany harem-be izany!»
  - type: text
    content: 'Ny mpitondra sambo rehetra sy ny mpandeha sambo rehetra amin’iny faritra iny ary ny matilò mbamy izay rehetra manao raharaha eny an-dranomasina, dia nijanona teny lavitra teny koa; '
  '18':
  - type: text
    content: 'ary niantsoantso izy rehetra, raha nahita ny setroka vokatry ny fandoroana an’i Babilôna, ka nanao hoe: «Aiza intsony re no misy tahaka izany tanàna lehibe izany?» '
  '19':
  - type: text
    content: 'Dia nanipy vovoka hiraraka tamin’ny lohany izy ireo sady nitomany sy nisaona ka niantsoantso hoe: «Indrisy! Indrisy! Ry tanàna lehibe, izay rakotra zava-tsarobidy ka nampahazo harena ny olona rehetra manana sambo eny an-dranomasina! Satria tanaty adiny iray monja dia foana ianao'
  - type: note
    content: 'And 17-19: ampit Ezek 27.29-34.'
  - type: text
    content: '!»'
  '2':
  - type: text
    content: 'Dia niantso tamin’ny feo mahery izy nanao hoe: «Rava, rava i Babilôna lehibe, ka tonga fonenan’ny '
  - type: text
    content: demony
  - type: text
    content: ', sy fieren’ny '
  - type: text
    content: fanahy maloto
  - type: text
    content: ' rehetra, ary fieren’ny vorona amam-biby '
  - type: text
    content: maloto
  - type: text
    content: ' rehetra hàlan’ny olona! '
  '20':
  - type: text
    content: Mifalia amin’ny manjo an’i Babilôna ianao, ry lanitra
  - type: note
    content: Ampit Jer 51.48.
  - type: text
    content: ', sy ianareo vahoakan’Andriamanitra mbamy ianareo '
  - type: text
    content: apôstôly
  - type: text
    content: ' sy '
  - type: text
    content: mpaminany
  - type: text
    content: ', satria efa nitsara azy Andriamanitra ka nanome rariny anareo!'
  '21':
  - type: text
    content: 'Ary nisy anjely anankiray manan-kery, naka vato tahaka ny vato lehibe fikoseham-bary, dia nanipy azy tany an-dranomasina ka nanao hoe: «Hatsipy mafy toy izay i Babilôna, ilay tanàna lehibe, ka tsy ho hita intsony! '
  '22':
  - type: text
    content: 'Dia tsy ho re ao aminao intsony ny mozika fanaon’ny mpitendry lokanga sy ny mpihira ary ny mpitsoka sodina sy ny mpitsoka trompetra; tsy ho hita ao aminao intsony ny mpiasa rehetra amin’ny taozavatra isan-karazany; tsy ho re ao aminao intsony ny feon’ny vato fikoseham-bary. '
  '23':
  - type: text
    content: Tsy hamiratra ao aminao intsony ny fahazavan’ny jiro; tsy ho re ao aminao intsony ny feon’ny mpivady vao. Satria ny mpandrantonao no efa mpifehy ny tany, sady ny ody ratsinao no nentinao namitaka ny firenena rehetra
  - type: note
    content: 'And 21-23: ampit Jer 51.63-64; Ezek 26.21; 26.13; Is 24.8; Jer 7.34; 25.10.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: Hatsipy mafy toy izany i Babilôna, satria tao aminy no nahitana ny ran’ireo mpaminany sy ny ran’ireo vahoakan’Andriamanitra ary ny ran’izay rehetra novonoina tetỳ ambonin’ny tany
  - type: note
    content: Ampit Jer 51.40.
  - type: text
    content: '!»'
  '3':
  - type: text
    content: 'Fa ilay divain’ny '
  - type: text
    content: fijangajangàny
  - type: text
    content: ' mihoa-pampana no nisotroan’ny firenena rehetra; ka ny mpanjakan’ny tany dia nijangajanga taminy'
  - type: note
    content: 'And 2-3: jereo 14.8 sy nta. –demony: jereo 1 Tim 4.1 sy nta.'
  - type: text
    content: ', ary ny mpandranto manerana ny tany efa tonga mpanankarena satria tia filibana loatra io tanàna io.»'
  '4':
  - type: text
    content: 'Dia reko nisy feo iray hafa koa avy tany an-danitra nanao hoe: «Mialà amin’io tanàna io ianareo, ry '
  - type: text
    content: vahoakako
  - type: text
    content: ', mba tsy hiombom-pahotana aminy ary mba tsy hiharan’ny loza hanjo azy; '
  '5':
  - type: text
    content: 'satria efa niavosa nitehika tamin’ny lanitra ny fahotany ary tsy hadinon’Andriamanitra ny hanasazy ny ratsy nataony. '
  '6':
  - type: text
    content: 'Mamalia azy araka izay nafitsony taminareo, ka ataovy avo sasaka noho izay vitany; ny tsatokaty, izay nasiany zava-pisotro mifangaro ho anareo, dia asio zava-pisotro mifangaro indroa heny ho azy; '
  '7':
  - type: text
    content: 'toraka izay nitiavany voninahitra sy filibana no anomezo azy fanaintainana sy fisaonana. Fa izao no lazain’io tanàna io anakampony: ‹Mipetraka toy ny mpanjakavavy aho fa tsy mpitondratena, ka lavitra ahy raha izay fisaonana!› '
  '8':
  - type: text
    content: Noho izany, anatin’ny indray andro monja no hiantontan’ny loza hanjo azy, dia fahafatesana sy fisaonana ary mosary, sady handevonan’ny afo azy; satria mahery ny Tompo Andriamanitra, Izay nitsara azy
  - type: note
    content: 'And 4: jereo Is 48.20; Jer 50.8; 51.6, 45. –And 5: jereo Gen 18.20-21; Jer 51.9. –And 6: jereo Sal 137.8; Jer 50.29. –And 7-8: jereo Is 47.7-8.'
  - type: text
    content: .»
  '9':
  - type: text
    content: 'Ny mpanjakan’ny tany, izay nijangajanga tamin’i Babilôna sy niara-niliba taminy dia hitomany azy sy handondòn-tratra hisaona azy, rehefa hahita ny setroka vokatry ny fandoroana azy. '
