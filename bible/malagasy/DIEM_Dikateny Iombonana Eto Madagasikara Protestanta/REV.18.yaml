document_id: REV.18,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny faharavàn’i Babilôna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany, dia hitako nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' anankiray hafa koa nidina avy tany an-danitra; nanana fahefana lehibe io anjely io ary nanazava ny tany tontolo ny famirapiratany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hijanona eny lavitra eny izy ireo, satria raiki-tahotra noho ny fanaintainana mianjady amin’i Babilôna, ka hanao hoe: «Indrisy! Indrisy! Ry Babilôna, tanàna lehibe, tanàna matanjaka! Satria tanaty adiny iray monja dia niharan’ny sazy ianao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 9-10:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Ezek 26.16-17.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpandranto manerana ny tany koa dia mitomany sy misaona azy, satria tsy misy mpividy intsony ny entany: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia volamena sy volafotsy; vatosoa sy perla; lamba rongony madinika sy lamba volomparasy; lamba landy sy lamba jaky; hazo mani-pofona isan-karazany; fanaka isan-karazany vita amin’ny ivoary sy hazo sarobidy mbamy halimo sy vy ary vatokaranana; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'havozomamy sy hodi-kazo manitra; ilomanitra sy miora ary vovo-javamanitra; divay sy diloilo; lafarinina tsara toto sy varimbazaha; omby sy ondry; soavaly sy kalesy; ary mpanompo sy babo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ireo mpandranto ireo amin’i Babilôna: «Ny vokatra soa nirin’ny fonao dia efa niala taminao; ary ny zava-tsarobidy sy marevaka rehetra dia efa levona lavitra anao, ka tsy ho hitanao intsony!» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mpandranto, izay nahazo harena tamin’i Babilôna noho ireny entana ireny, dia hijanona eny lavitra eny, satria raiki-tahotra noho ny fanaintainana mianjady amin’i Babilôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 11-15:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Ezek 27.31, 36; 27.12, 13, 22.
      marker-yv: yv-n
    - type: text
      text: ' ka hitomany sy hisaona '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady hanao hoe: «Indrisy! Indrisy! Ry tanàna lehibe, izay nitafy lamba rongony madinika sy lamba volomparasy ary lamba jaky, sady niravaka volamena sy vatosoa ary perla! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Satria tanaty adiny iray monja dia foana izany harem-be izany!»
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpitondra sambo rehetra sy ny mpandeha sambo rehetra amin’iny faritra iny ary ny matilò mbamy izay rehetra manao raharaha eny an-dranomasina, dia nijanona teny lavitra teny koa; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary niantsoantso izy rehetra, raha nahita ny setroka vokatry ny fandoroana an’i Babilôna, ka nanao hoe: «Aiza intsony re no misy tahaka izany tanàna lehibe izany?» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanipy vovoka hiraraka tamin’ny lohany izy ireo sady nitomany sy nisaona ka niantsoantso hoe: «Indrisy! Indrisy! Ry tanàna lehibe, izay rakotra zava-tsarobidy ka nampahazo harena ny olona rehetra manana sambo eny an-dranomasina! Satria tanaty adiny iray monja dia foana ianao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 17-19:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Ezek 27.29-34.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso tamin’ny feo mahery izy nanao hoe: «Rava, rava i Babilôna lehibe, ka tonga fonenan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: ', sy fieren’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanahy maloto
    - type: text
      text: ' rehetra, ary fieren’ny vorona amam-biby '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ' rehetra hàlan’ny olona! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifalia amin’ny manjo an’i Babilôna ianao, ry lanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jer 51.48.
      marker-yv: yv-n
    - type: text
      text: ', sy ianareo vahoakan’Andriamanitra mbamy ianareo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ', satria efa nitsara azy Andriamanitra ka nanome rariny anareo!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anjely anankiray manan-kery, naka vato tahaka ny vato lehibe fikoseham-bary, dia nanipy azy tany an-dranomasina ka nanao hoe: «Hatsipy mafy toy izay i Babilôna, ilay tanàna lehibe, ka tsy ho hita intsony! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tsy ho re ao aminao intsony ny mozika fanaon’ny mpitendry lokanga sy ny mpihira ary ny mpitsoka sodina sy ny mpitsoka trompetra; tsy ho hita ao aminao intsony ny mpiasa rehetra amin’ny taozavatra isan-karazany; tsy ho re ao aminao intsony ny feon’ny vato fikoseham-bary. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hamiratra ao aminao intsony ny fahazavan’ny jiro; tsy ho re ao aminao intsony ny feon’ny mpivady vao. Satria ny mpandrantonao no efa mpifehy ny tany, sady ny ody ratsinao no nentinao namitaka ny firenena rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 21-23:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Jer 51.63-64; Ezek 26.21; 26.13; Is 24.8; Jer 7.34; 25.10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatsipy mafy toy izany i Babilôna, satria tao aminy no nahitana ny ran’ireo mpaminany sy ny ran’ireo vahoakan’Andriamanitra ary ny ran’izay rehetra novonoina tetỳ ambonin’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jer 51.40.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ilay divain’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fijangajangàny
    - type: text
      text: ' mihoa-pampana no nisotroan’ny firenena rehetra; ka ny mpanjakan’ny tany dia nijangajanga taminy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.3 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 2-3:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 14.8 sy nta. –
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'demony:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 1 Tim 4.1 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ', ary ny mpandranto manerana ny tany efa tonga mpanankarena satria tia filibana loatra io tanàna io.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia reko nisy feo iray hafa koa avy tany an-danitra nanao hoe: «Mialà amin’io tanàna io ianareo, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakako
    - type: text
      text: ', mba tsy hiombom-pahotana aminy ary mba tsy hiharan’ny loza hanjo azy; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria efa niavosa nitehika tamin’ny lanitra ny fahotany ary tsy hadinon’Andriamanitra ny hanasazy ny ratsy nataony. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mamalia azy araka izay nafitsony taminareo, ka ataovy avo sasaka noho izay vitany; ny tsatokaty, izay nasiany zava-pisotro mifangaro ho anareo, dia asio zava-pisotro mifangaro indroa heny ho azy; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'toraka izay nitiavany voninahitra sy filibana no anomezo azy fanaintainana sy fisaonana. Fa izao no lazain’io tanàna io anakampony: ‹Mipetraka toy ny mpanjakavavy aho fa tsy mpitondratena, ka lavitra ahy raha izay fisaonana!› '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho izany, anatin’ny indray andro monja no hiantontan’ny loza hanjo azy, dia fahafatesana sy fisaonana ary mosary, sady handevonan’ny afo azy; satria mahery ny Tompo Andriamanitra, Izay nitsara azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.8 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 4:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Is 48.20; Jer 50.8; 51.6, 45. –
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 5:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Gen 18.20-21; Jer 51.9. –'
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 6:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Sal 137.8; Jer 50.29. –'
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 7-8:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Is 47.7-8.'
      marker-yv: yv-n
    - type: text
      text: .»
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpanjakan’ny tany, izay nijangajanga tamin’i Babilôna sy niara-niliba taminy dia hitomany azy sy handondòn-tratra hisaona azy, rehefa hahita ny setroka vokatry ny fandoroana azy. '
