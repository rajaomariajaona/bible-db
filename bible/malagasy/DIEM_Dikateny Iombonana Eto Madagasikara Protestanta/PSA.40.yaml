document_id: PSA.40,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaka fiderana sy fangatahana
  - type: heading
    content: (40.14-18; jereo Sal 70.2-6)
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  '10':
  - type: text
    content: Ny vahoakanao tafangona maro no hilazako
  - type: text
    content: vaovao mahafaly ny amin’ny fanafahanao.
  - type: text
    content: Indro tsy hangina mihitsy aho,
  - type: text
    content: ary fantatrao izany, ry TOMPO ô!
  '11':
  - type: text
    content: Tsy mba afeniko ato am-poko ny fanafahanao,
  - type: text
    content: ambarako fa Mpamonjy mahatoky Ianao;
  - type: text
    content: ny vahoakanao tafangona amborahako
  - type: text
    content: ilay fitiavanao tsy miova ho anay.
  '12':
  - type: text
    content: TOMPO ô, tsy hitsahatra hamindrafo amiko Ianao;
  - type: text
    content: ilay fitiavanao tsy miova no hiaro ahy lalandava.
  '13':
  - type: text
    content: Manemitra ahy ny loza tsy hita isa;
  - type: text
    content: mizaka ny vokatry ny heloko aho
  - type: text
    content: sady tsy mahajery azy intsony
  - type: text
    content: noho izy ireny maro noho ny volon-dohako;
  - type: text
    content: ka ketraka dia ketraka ny foko.
  '14':
  - type: text
    content: TOMPO ô, aoka ho sitrakao ny hanafaka ahy!
  - type: text
    content: TOMPO ô, faingàna hamonjy ahy!
  '15':
  - type: text
    content: Ho menatra sy mangaihay avokoa anie
  - type: text
    content: izay olona mitady hahafaty ahy!
  - type: text
    content: Hihemotra sy ho afa-baràka anie
  - type: text
    content: izay olona maniry loza ho ahy!
  '16':
  - type: text
    content: Aoka ho ankona safotry ny henatra
  - type: text
    content: 'ireo mpanakora ahy hoe: «Akorinao izay!»'
  '17':
  - type: text
    content: Izay rehetra mitady Anao kosa anie
  - type: text
    content: hifaly sy hiravoravo amin’ny nataonao;
  - type: text
    content: ary izay olona mpitia Anao Mpamonjy anie
  - type: text
    content: 'hivolan-dava hoe: «Lehibe tokoa ny TOMPO!»'
  '18':
  - type: text
    content: Tompo ô, mahantra sy malahelo aho
  - type: text
    content: nefa Ianao tsy mba manadino ahy.
  - type: text
    content: Mpamonjy sy mpanafaka ahy Ianao,
  - type: text
    content: ka aza ela fa tongava, Andriamanitro ô!
  '2':
  - type: text
    content: Niandry ny Tompo am-paharetana aho
  - type: text
    content: ka niondrehany ary nohenoiny taraina;
  '3':
  - type: text
    content: nosintoniny avy tao an-davaka lalina aho,
  - type: text
    content: nakariny avy tao amin’ny fota-mandrevo;
  - type: text
    content: ny tongotro najorony tambony vatolampy
  - type: text
    content: ka indro azo antoka sy matotra ny diako.
  '4':
  - type: text
    content: Nasiany hira vaovao teo am-bavako,
  - type: text
    content: dia hira fiderana an’Andriamanitsika!
  - type: text
    content: Maro tokoa no hahita izany,
  - type: text
    content: ka hanaja sy hatoky ny TOMPO.
  '5':
  - type: text
    content: Sambatra ny olona manao ny TOMPO ho tokiny
  - type: text
    content: ka tsy mba mirona velively amin’ny sampy
  - type: text
    content: na miandany amin’ny mpanompo andriamani-tsiizy.
  '6':
  - type: text
    content: TOMPO Andriamanitro ô, maro tokoa
  - type: text
    content: ny zava-mahagaga izay nataonao;
  - type: text
    content: ka tsy misy azo ampitahaina aminao!
  - type: text
    content: Ary ny hevitra anasoavanao anay
  - type: text
    content: dia maro loatra ka tsy tambo isaina,
  - type: text
    content: tsy ary ho voatanisako na ho voalazako.
  '7':
  - type: text
    content: Nampahafantarinao ahy tsara tokoa
  - type: text
    content: 'fa tsy sitrakao ny '
  - type: text
    content: sorona
  - type: text
    content: ' amam-panatitra'
  - type: note
    content: 'fa tsy sitrakao... amam-panatitra: jereo Sal 50.8-10; 51.18-21; 69.31-32; Hôs 6.6; Ham 5.22. –Voatsiahy ao amin’ny Heb 10.5-7 ny and 7-9.'
  - type: text
    content: ;
  - type: text
    content: 'tsy ilainao ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo'
  - type: text
    content: sy ny sorona fanalana ny ota.
  '8':
  - type: text
    content: 'Ka hoy aho hoe: «Inty aho tamy!'
  - type: text
    content: Ao amin’ny bokin’ny Lalàna no ahitako
  - type: text
    content: fa voasoratra izay tokony hataoko.»
  '9':
  - type: text
    content: Ny hanao ny sitraponao, Andriamanitro ô,
  - type: text
    content: eny, ny hanao ny sitraponao no sitrako;
  - type: text
    content: 'ary ny '
  - type: text
    content: lalànanao
  - type: text
    content: ' dia ato anatin’ny foko.'
