document_id: PSA.40
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Vavaka fiderana sy fangatahana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (40.14-18; jereo Sal 70.2-6)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tao amin’ny tahirin-kiran’ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: filohan’antoko-mpihira
  - type: text
    text: '. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Niandry ny Tompo am-paharetana aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka niondrehany ary nohenoiny taraina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: nosintoniny avy tao an-davaka lalina aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nakariny avy tao amin’ny fota-mandrevo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tongotro najorony tambony vatolampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka indro azo antoka sy matotra ny diako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nasiany hira vaovao teo am-bavako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hira fiderana an’Andriamanitsika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maro tokoa no hahita izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanaja sy hatoky ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sambatra ny olona manao ny TOMPO ho tokiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba mirona velively amin’ny sampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na miandany amin’ny mpanompo andriamani-tsiizy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: TOMPO Andriamanitro ô, maro tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zava-mahagaga izay nataonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy azo ampitahaina aminao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hevitra anasoavanao anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia maro loatra ka tsy tambo isaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ary ho voatanisako na ho voalazako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nampahafantarinao ahy tsara tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa tsy sitrakao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' amam-panatitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fa tsy sitrakao... amam-panatitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Sal 50.8-10; 51.18-21; 69.31-32; Hôs 6.6; Ham 5.22. –Voatsiahy ao amin’ny Heb 10.5-7 ny and 7-9.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tsy ilainao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny sorona fanalana ny ota.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ka hoy aho hoe: «Inty aho tamy!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny bokin’ny Lalàna no ahitako
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa voasoratra izay tokony hataoko.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny hanao ny sitraponao, Andriamanitro ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny hanao ny sitraponao no sitrako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànanao
  - type: text
    text: ' dia ato anatin’ny foko.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny vahoakanao tafangona maro no hilazako
- type: usfm
  marker: q1
  children:
  - type: text
    text: vaovao mahafaly ny amin’ny fanafahanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro tsy hangina mihitsy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fantatrao izany, ry TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy mba afeniko ato am-poko ny fanafahanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambarako fa Mpamonjy mahatoky Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vahoakanao tafangona amborahako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay fitiavanao tsy miova ho anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: TOMPO ô, tsy hitsahatra hamindrafo amiko Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay fitiavanao tsy miova no hiaro ahy lalandava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Manemitra ahy ny loza tsy hita isa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mizaka ny vokatry ny heloko aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy mahajery azy intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho izy ireny maro noho ny volon-dohako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ketraka dia ketraka ny foko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: TOMPO ô, aoka ho sitrakao ny hanafaka ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, faingàna hamonjy ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ho menatra sy mangaihay avokoa anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay olona mitady hahafaty ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihemotra sy ho afa-baràka anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay olona maniry loza ho ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka ho ankona safotry ny henatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ireo mpanakora ahy hoe: «Akorinao izay!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay rehetra mitady Anao kosa anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: hifaly sy hiravoravo amin’ny nataonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay olona mpitia Anao Mpamonjy anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hivolan-dava hoe: «Lehibe tokoa ny TOMPO!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tompo ô, mahantra sy malahelo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa Ianao tsy mba manadino ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpamonjy sy mpanafaka ahy Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aza ela fa tongava, Andriamanitro ô!
