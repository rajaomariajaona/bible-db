document_id: PSA.40,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Vavaka fiderana sy fangatahana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (40.14-18; jereo Sal 70.2-6)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao amin’ny tahirin-kiran’ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira
    - type: text
      text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vahoakanao tafangona maro no hilazako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vaovao mahafaly ny amin’ny fanafahanao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro tsy hangina mihitsy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fantatrao izany, ry TOMPO ô!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba afeniko ato am-poko ny fanafahanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambarako fa Mpamonjy mahatoky Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vahoakanao tafangona amborahako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay fitiavanao tsy miova ho anay.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, tsy hitsahatra hamindrafo amiko Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay fitiavanao tsy miova no hiaro ahy lalandava.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manemitra ahy ny loza tsy hita isa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mizaka ny vokatry ny heloko aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mahajery azy intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho izy ireny maro noho ny volon-dohako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ketraka dia ketraka ny foko.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, aoka ho sitrakao ny hanafaka ahy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, faingàna hamonjy ahy!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho menatra sy mangaihay avokoa anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay olona mitady hahafaty ahy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihemotra sy ho afa-baràka anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay olona maniry loza ho ahy!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho ankona safotry ny henatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ireo mpanakora ahy hoe: «Akorinao izay!»'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra mitady Anao kosa anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hifaly sy hiravoravo amin’ny nataonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay olona mpitia Anao Mpamonjy anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hivolan-dava hoe: «Lehibe tokoa ny TOMPO!»'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, mahantra sy malahelo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa Ianao tsy mba manadino ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpamonjy sy mpanafaka ahy Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aza ela fa tongava, Andriamanitro ô!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niandry ny Tompo am-paharetana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niondrehany ary nohenoiny taraina;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nosintoniny avy tao an-davaka lalina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nakariny avy tao amin’ny fota-mandrevo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tongotro najorony tambony vatolampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka indro azo antoka sy matotra ny diako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nasiany hira vaovao teo am-bavako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hira fiderana an’Andriamanitsika!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maro tokoa no hahita izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanaja sy hatoky ny TOMPO.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra ny olona manao ny TOMPO ho tokiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mba mirona velively amin’ny sampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na miandany amin’ny mpanompo andriamani-tsiizy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO Andriamanitro ô, maro tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zava-mahagaga izay nataonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy azo ampitahaina aminao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hevitra anasoavanao anay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia maro loatra ka tsy tambo isaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ary ho voatanisako na ho voalazako.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampahafantarinao ahy tsara tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa tsy sitrakao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' amam-panatitra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fa tsy sitrakao... amam-panatitra: '
      - type: usfm
        marker: ft
