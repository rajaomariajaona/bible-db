      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tsy ilainao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny sorona fanalana ny ota.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hoy aho hoe: «Inty aho tamy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny bokin’ny Lalàna no ahitako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa voasoratra izay tokony hataoko.»
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hanao ny sitraponao, Andriamanitro ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny hanao ny sitraponao no sitrako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànanao
    - type: text
      text: ' dia ato anatin’ny foko.'
