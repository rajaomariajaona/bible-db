document_id: ZEC.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahefatra: i Josoa mpisorombe'
  - type: text
    content: 'Ary nasehon’ny TOMPO tamiko i Josoa mpisorombe izay nitsangana teo anatrehan’ny '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny TOMPO. Ary nijoro teo ankavanan’i Josoa i '
  - type: text
    content: Satàna
  - type: note
    content: i Satàna na hoe ilay mpiampanga, jereo Jôb 1.6-12.
  - type: text
    content: ' mba hiampanga azy. '
  '10':
  - type: text
    content: Amin’izany andro izany ianareo
  - type: text
    content: dia samy ho finaritra hifanasa
  - type: text
    content: ho eo ambany voaloboka aman’aviavinareo,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPOn’izao rehetra izao.»
  '2':
  - type: text
    content: 'Dia hoy ilay anjelin’ny TOMPO tamin’i Satàna:'
  - type: text
    content: –Hanery anao hangina anie ny TOMPO; eny, hanery anao hangina anie ny TOMPO Izay efa nifidy an’i Jerosalema! Fa tsy toy ny forohana nalaina tamin’ny afo va i Josoa
  - type: note
    content: 'anjely: araka ny dkt siriaka tranainy izay mitombina kokoa; hebreo Ny Tompo. –forohana nalaina tamin’ny afo: sary ahatsiarovana fa i Josoa dia tafaverina an-tsesitany niaraka tamin’ireo andiany voalohany nody an-tanindrazana (Hez 2.36).'
  - type: text
    content: '?'
  '3':
  - type: text
    content: 'Ary nitafy akanjo maloto i Josoa no nitsangana teo anoloan’ilay anjely. '
  '4':
  - type: text
    content: 'Dia niteny io anjely io ka nandidy ireo olona teo akaikin’i Josoa hoe:'
  - type: text
    content: –Esory aminy ny fitafiana maloto.
  - type: text
    content: 'Dia hoy kosa ilay anjely tamin’i Josoa:'
  - type: text
    content: –Indro efa nesoriko ny fahotanao ka hampiakanjoako fitafiana mihaja ianao.
  '5':
  - type: text
    content: Ary nandidy ireo olona indray ilay anjely hanisy hamama madio eo an-dohan’i Josoa. Dia nasiany hamama
  - type: note
    content: ny hamama sy ny fitafiana tsara dia izay fitondran’ny mpisorona manao ny raharahany (jereo Eks 28.39-43)
  - type: text
    content: ' madio ny lohany sady nampiakanjoiny fitafiana madio teo anatrehan’ilay anjelin’ny TOMPO izy. '
  '6':
  - type: text
    content: 'Ary nilaza fanambarana tamin’i Josoa ilay anjelin’ny TOMPO nanao hoe:'
  '7':
  - type: text
    content: '«Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: Raha izoranao ny sori-dàlako,
  - type: text
    content: ka tandremanao ny didiko,
  - type: text
    content: 'dia ianao no hiandraikitra ny '
  - type: text
    content: tranoko
  - type: text
    content: 'sy hitandrina ny kianjan’ny '
  - type: text
    content: tempoly
  - type: text
    content: ary hisy hataoko mpanoro hevitra anao
  - type: text
    content: amin’ireto olona mijoro etoana ireto.»
  - type: heading
    content: Ny fahatongavan’ny Mesia «Solofo»
  '8':
  - type: text
    content: '«Koa mihainoa, ry Josoa '
  - type: text
    content: mpisorombe
  - type: text
    content: 'sy ianareo '
  - type: text
    content: mpisorona
  - type: text
    content: ' namany rehetra'
  - type: text
    content: izay mipetraka eo akaikiny,
  - type: text
    content: satria fambara ny famonjena ho avy ianareo.
  - type: text
    content: Indro fa hasehoko ilay mpanompoko,
  - type: text
    content: dia ilay antsoina hoe Itsimoka
  - type: note
    content: 'Itsimoka: io teny io toa milaza ny mpandimby ara-dalàna ny fiandrianam-panjakana, izay mety ho ilay mesia* andrasana, jereo Jer 23.5; 33.15.'
  - type: text
    content: .
  '9':
  - type: text
    content: Eo anatrehan’i Josoa
  - type: text
    content: no ametrahako vato anankiray,
  - type: text
    content: dia vato tokana
  - type: text
    content: misy maso fito mamiratra.
  - type: text
    content: Indro hasiako soratra eo aminy,
  - type: text
    content: ary indray andro monja
  - type: text
    content: no hanesorako ny helok’ity tany ity,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPOn’izao rehetra izao
  - type: note
    content: Araka ny olona sasany, io vato io no anehoana an’ohatra ny tempoly ary ireo maso fito mamiratra no anambaràna ny fanetrehan’Andriamanitra mpiaro.
  - type: text
    content: .
