  - type: heading
    content: (Jereo 2 Tan 14.1-2; 15.16-19; 16.1-6, 11-14)
  '9':
  - type: text
    content: 'Tamin’ny taona faharoapolo nanjakàn’i Jerôbohama mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' no tonga mpanjakan’i Joda i Asà; '
