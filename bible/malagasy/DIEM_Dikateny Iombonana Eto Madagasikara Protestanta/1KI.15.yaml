document_id: 1KI.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Abiama mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 13.1-3, 22-23)
  - type: text
    content: 'Tamin’ny taona faha-18 nanjakàn’i Jerôbohama zanakalahin’i Nebata tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' no tonga mpanjakan’i Joda i Abiama; '
  '10':
  - type: text
    content: ary naharitra 41 taona no nanjakany tao Jerosalema. Ny anaran-drenibeny
  - type: note
    content: 'renibeny: jereo 15.2 izay i Mahekà no renin’i Abiama. Matetika ny renin’ny mpanjaka no voatonona eo am-piandohan’ny tantaran’ny fanjakana iray, satria isan’izay to teny ao an-dapa izy. Mbola nahatana izany toerana izany i Mahekà teo am-piandohan’ny fanjakan’i Asà zafikeliny, taorian’ny fanjakana tapan’i Abiama zanany (15.1-8).'
  - type: text
    content: ' dia Mahekà zanakavavin’i Abisalôma. '
  '11':
  - type: text
    content: 'Nanao izay mahitsy eo imason’ny TOMPO toy ny nataon’i Davida rainy i Asà. '
  '12':
  - type: text
    content: Noroahiny teo amin’ny tany ny olona izay nanolo-tena hijangajanga ho fanompoan-tsampy ary nofoanany avokoa ny sampy rehetra nataon-drainy
  - type: note
    content: Jereo 2 Tan 15.8-15.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Na dia i Mahekà renibeny aza dia naetrin’ity mpanjaka tsy ho andriambavy intsony, noho izy nanao tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: '. Nasain’i Asà nazera sy nodorana tao amoron-driakan’i Kidrôna ny sampin’i Mahekà. '
  '14':
  - type: text
    content: 'Fa ny toeram-panasinana kosa tsy fongotra tanteraka, na dia nahitsy teo imason’ny TOMPO aza ny fon’i Asà nandritra ny andro rehetra niainany. '
  '15':
  - type: text
    content: Nampidiriny tao an-tranon’ny TOMPO ireo zavatra natokan-drainy sy natokan’ny tenany ho an’Andriamanitra, dia volafotsy sy volamena ary kojakoja maro isan-karazany.
  '16':
  - type: text
    content: 'Ary nisy hatrany ny ady teo amin’i Asà sy i Bahasà mpanjakan’i Israely. '
  '17':
  - type: text
    content: Dia niakatra hanafika ny tanin’i Joda i Bahasà mpanjakan’i Israely; fa nohamafisiny ny tanànan’i Ramà
  - type: note
    content: Toerana 9 km avaratr’i Jerosalema.
  - type: text
    content: ' mba hisakanan-dalana an’i Asà mpanjakan’i Joda. '
  '18':
  - type: text
    content: 'Dia nalain’i Asà ny volafotsy sy ny volamena rehetra sisa tamin’ny raki-tsoa tao an-tranon’ny TOMPO sy tao an-dapan’ny mpanjaka, ka natolony teo an-tanan’ny solotenany; ary nampanateriny tany amin’i Bena-Hadada zanakalahin’i Tabrimôna sy zafikelin’i Heziôna izany, dia i Bena-Hadada mpanjakan’i Siria izay nonina tao Damasy sady nombany hafatra hoe: '
  '19':
  - type: text
    content: '«Aoka hisy fifanekena amiko sy aminao, toy izay nisy tamin-draiko sy tamin-drainao. Indro mampanatitra volafotsy sy volamena ho fanomezana ho anao aho; fa ndeha tsoahy ny fifanekenao tamin’i Bahasà mpanjakan’i Israely mba hialany amin’ny taniko.» '
  '2':
  - type: text
    content: ary naharitra telo taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia Mahekà zanakavavin’i Abisalôma
  - type: note
    content: 'Abisalôma: na dia samy hafa kely aza amin’ny hebreo ny fanoratra ny anarana, dia mety ho i Absalôma zanakalahin’i Davida ihany no ambara eto.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Dia neken’i Bena-Hadada ny fangatahan’i Asà mpanjaka; ary nirahiny ireo filohan-tafiny hamely ny tanànan’i Israely, ka dia nahazo an’i Hiôna sy i Dana ary i Abela-Bety-Mahekà sy ny faritr’i Kinerôta mbamin’ny tanin’i Naftalỳ manontolo. '
  '21':
  - type: text
    content: 'Nony ren’i Bahasà izany vaovao izany, dia nitsahatra tsy nanamafy an’i Ramà intsony izy ary niverina nipetraka tao Tiritsà. '
  '22':
  - type: text
    content: Nampiantsoin’i Asà mpanjaka avokoa ny Jodeanina tsy ankanavaka hitondra ny vato sy ny hazo izay voaangon’i Bahasà hanamafisana an’i Ramà; dia nampiasain’i Asà ireo fitaovana ireo hanamafisana an’i Geban’i Benjamîna ary koa i Mitsepà
  - type: note
    content: Toerana akaikin’i Ramà.
  - type: text
    content: .
  '23':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Asà sy ny herimpo nasehony ary koa ny zavatra hafa rehetra nataony sy ny tanàna mafy naoriny dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda
  - type: text
    content: '. Tamin’ny androm-pahanterany dia narary tongotra izy. '
  '24':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina am-pasan-drazana tao an-
  - type: text
    content: tanànan’i Davida
  - type: text
    content: ; ary i Jôsafata zanany lahy no nanjaka nandimby azy.
  - type: heading
    content: I Nadaba mpanjakan’i Israely
  '25':
  - type: text
    content: 'Tamin’ny taona faharoa nanjakàn’i Asà mpanjakan’i Joda no tonga mpanjaka tamin’i Israely i Nadaba zanakalahin’i Jerôbohama; ary naharitra roa taona no nanjakany tamin’i Israely. '
  '26':
  - type: text
    content: Nanao izay ratsy eo imason’ny TOMPO izy satria nizorany ny fitondrantenan-drainy sy ny fahotana izay nampanaoviny an’i Israely
  - type: note
    content: Jereo 12.29-30.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Koa nioko hanohitra azy i Bahasà zanakalahin’i Ahià avy amin’ny fokon’i Jisakara. Ary dia namely nahafaty an’i Nadaba tao Gibetôna i Bahasà, tamin’ny fotoana nanaovan’i Nadaba sy i Israely manontolo fahirano an’i Gibetôna izay voatanan’ny Filistinina. '
  '28':
  - type: text
    content: 'Eny, novonoin’i Bahasà ho faty i Nadaba tamin’ny taona fahatelo nanjakàn’i Asà mpanjakan’i Joda; ary izy no nanjaka nandimby an’i Nadaba. '
  '29':
  - type: text
    content: 'Raha vantany vao tonga mpanjaka izy, dia naringany avokoa ny fianakavian’i Jerôbohama manontolo, ka tsy nasiany niangana na iray aza ny taranany araka ny teny nolazain’ny TOMPO tamin’ny alalan’i Ahià mpanompony avy any Silao. '
  '3':
  - type: text
    content: 'Ny fahotana rehetra nataon-drainy teo alohany ihany no nizorany; ary tsy mba nahitsy fo tamin’ny TOMPO Andriamaniny tahaka an’i Davida rainy izy. '
  '30':
  - type: text
    content: Ny nahatonga izany kosa dia ny fahotana nataon’i Jerôbohama sady nampanaoviny an’i Israely ka nampahatezitra mafy ny TOMPO Andriamanitr’i Israely
  - type: note
    content: Jereo 14.10-11.
  - type: text
    content: .
  '31':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Nadaba ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely
  - type: text
    content: .
  '32':
  - type: text
    content: Ary nisy hatrany ny ady teo amin’i Asà sy i Bahasà mpanjakan’i Israely
  - type: note
    content: Ity and ity dia mamerina ara-bakiteny ny 15.16 izay toerana sahaza tsara ny zavatra ambara.
  - type: text
    content: .
  - type: heading
    content: I Bahasà mpanjakan’i Israely
  '33':
  - type: text
    content: 'Tamin’ny taona fahatelo nanjakàn’i Asà mpanjakan’i Joda no tonga mpanjaka tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' avaratra manontolo i Bahasa zanakalahin’i Ahià; ary naharitra 24 taona no nanjakany tao Tiritsà. '
  '34':
  - type: text
    content: Nanao izay ratsy eo imason’ny TOMPO izy, satria nizorany ny fitondrantenan’i Jerôbohama sy ny fahotana izay nampanaoviny an’i Israely.
  '4':
  - type: text
    content: Kanefa nomen’ny TOMPO Andriamaniny zanakalahy handimby izy mba tsy ho faty ilay fanilo tao Jerosalema
  - type: note
    content: Jereo 11.36.
  - type: text
    content: ' ary mba hampaharitra an’i Jerosalema ho renivohitra; noho ny amin’i Davida izany, '
  '5':
  - type: text
    content: satria nanao izay mahitsy eo imason’ny TOMPO i Davida ka tsy niala tamin’izay nandidiany azy tamin’ny andro rehetra niainany, afa-tsy tamin’ny raharahan’i Orià ilay Hetita ihany
  - type: note
    content: Jereo 2 Sam 11.
  - type: text
    content: .
  '6':
  - type: text
    content: Ary nisy hatrany ny ady teo amin’i Rehabohama sy i Jerôbohama
  - type: note
    content: Ity and ity dia mamerina saika ara-bakiteny ny 14.30.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Abiama ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda
  - type: text
    content: . Ary nisy ady hatrany teo amin’i Abiama sy i Jerôbohama
  - type: note
    content: Jereo 2 Tan 13.3-21.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina tao an-
  - type: text
