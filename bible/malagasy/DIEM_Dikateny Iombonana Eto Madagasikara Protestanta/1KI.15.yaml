verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Abiama mpanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 13.1-3, 22-23)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona faha-18 nanjakàn’i Jerôbohama zanakalahin’i Nebata tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' no tonga mpanjakan’i Joda i Abiama; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary naharitra 41 taona no nanjakany tao Jerosalema. Ny anaran-drenibeny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'renibeny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 15.2 izay i Mahekà no renin’i Abiama. Matetika ny renin’ny mpanjaka no voatonona eo am-piandohan’ny tantaran’ny fanjakana iray, satria isan’izay to teny ao an-dapa izy. Mbola nahatana izany toerana izany i Mahekà teo am-piandohan’ny fanjakan’i Asà zafikeliny, taorian’ny fanjakana tapan’i Abiama zanany (15.1-8).
      marker-yv: yv-n
    - type: text
      text: ' dia Mahekà zanakavavin’i Abisalôma. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay mahitsy eo imason’ny TOMPO toy ny nataon’i Davida rainy i Asà. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noroahiny teo amin’ny tany ny olona izay nanolo-tena hijangajanga ho fanompoan-tsampy ary nofoanany avokoa ny sampy rehetra nataon-drainy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Tan 15.8-15.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia i Mahekà renibeny aza dia naetrin’ity mpanjaka tsy ho andriambavy intsony, noho izy nanao tsatokazo fanajana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserà
    - type: text
      text: '. Nasain’i Asà nazera sy nodorana tao amoron-driakan’i Kidrôna ny sampin’i Mahekà. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny toeram-panasinana kosa tsy fongotra tanteraka, na dia nahitsy teo imason’ny TOMPO aza ny fon’i Asà nandritra ny andro rehetra niainany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nampidiriny tao an-tranon’ny TOMPO ireo zavatra natokan-drainy sy natokan’ny tenany ho an’Andriamanitra, dia volafotsy sy volamena ary kojakoja maro isan-karazany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy hatrany ny ady teo amin’i Asà sy i Bahasà mpanjakan’i Israely. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niakatra hanafika ny tanin’i Joda i Bahasà mpanjakan’i Israely; fa nohamafisiny ny tanànan’i Ramà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toerana 9 km avaratr’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: ' mba hisakanan-dalana an’i Asà mpanjakan’i Joda. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalain’i Asà ny volafotsy sy ny volamena rehetra sisa tamin’ny raki-tsoa tao an-tranon’ny TOMPO sy tao an-dapan’ny mpanjaka, ka natolony teo an-tanan’ny solotenany; ary nampanateriny tany amin’i Bena-Hadada zanakalahin’i Tabrimôna sy zafikelin’i Heziôna izany, dia i Bena-Hadada mpanjakan’i Siria izay nonina tao Damasy sady nombany hafatra hoe: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Aoka hisy fifanekena amiko sy aminao, toy izay nisy tamin-draiko sy tamin-drainao. Indro mampanatitra volafotsy sy volamena ho fanomezana ho anao aho; fa ndeha tsoahy ny fifanekenao tamin’i Bahasà mpanjakan’i Israely mba hialany amin’ny taniko.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary naharitra telo taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia Mahekà zanakavavin’i Abisalôma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Abisalôma: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: na dia samy hafa kely aza amin’ny hebreo ny fanoratra ny anarana, dia mety ho i Absalôma zanakalahin’i Davida ihany no ambara eto.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia neken’i Bena-Hadada ny fangatahan’i Asà mpanjaka; ary nirahiny ireo filohan-tafiny hamely ny tanànan’i Israely, ka dia nahazo an’i Hiôna sy i Dana ary i Abela-Bety-Mahekà sy ny faritr’i Kinerôta mbamin’ny tanin’i Naftalỳ manontolo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ren’i Bahasà izany vaovao izany, dia nitsahatra tsy nanamafy an’i Ramà intsony izy ary niverina nipetraka tao Tiritsà. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nampiantsoin’i Asà mpanjaka avokoa ny Jodeanina tsy ankanavaka hitondra ny vato sy ny hazo izay voaangon’i Bahasà hanamafisana an’i Ramà; dia nampiasain’i Asà ireo fitaovana ireo hanamafisana an’i Geban’i Benjamîna ary koa i Mitsepà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toerana akaikin’i Ramà.
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Asà sy ny herimpo nasehony ary koa ny zavatra hafa rehetra nataony sy ny tanàna mafy naoriny dia voasoratra ao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo mpanjakan’i Joda
    - type: text
      text: '. Tamin’ny androm-pahanterany dia narary tongotra izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina am-pasan-drazana tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: ; ary i Jôsafata zanany lahy no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Nadaba mpanjakan’i Israely
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona faharoa nanjakàn’i Asà mpanjakan’i Joda no tonga mpanjaka tamin’i Israely i Nadaba zanakalahin’i Jerôbohama; ary naharitra roa taona no nanjakany tamin’i Israely. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanao izay ratsy eo imason’ny TOMPO izy satria nizorany ny fitondrantenan-drainy sy ny fahotana izay nampanaoviny an’i Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 12.29-30.
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nioko hanohitra azy i Bahasà zanakalahin’i Ahià avy amin’ny fokon’i Jisakara. Ary dia namely nahafaty an’i Nadaba tao Gibetôna i Bahasà, tamin’ny fotoana nanaovan’i Nadaba sy i Israely manontolo fahirano an’i Gibetôna izay voatanan’ny Filistinina. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, novonoin’i Bahasà ho faty i Nadaba tamin’ny taona fahatelo nanjakàn’i Asà mpanjakan’i Joda; ary izy no nanjaka nandimby an’i Nadaba. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vantany vao tonga mpanjaka izy, dia naringany avokoa ny fianakavian’i Jerôbohama manontolo, ka tsy nasiany niangana na iray aza ny taranany araka ny teny nolazain’ny TOMPO tamin’ny alalan’i Ahià mpanompony avy any Silao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahotana rehetra nataon-drainy teo alohany ihany no nizorany; ary tsy mba nahitsy fo tamin’ny TOMPO Andriamaniny tahaka an’i Davida rainy izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny nahatonga izany kosa dia ny fahotana nataon’i Jerôbohama sady nampanaoviny an’i Israely ka nampahatezitra mafy ny TOMPO Andriamanitr’i Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 14.10-11.
      marker-yv: yv-n
    - type: text
      text: .
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Nadaba ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo mpanjakan’i Israely
    - type: text
      text: .
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
