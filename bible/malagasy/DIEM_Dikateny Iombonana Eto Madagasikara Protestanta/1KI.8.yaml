document_id: 1KI.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fametrahana ny Vatamasina tao an-tempoly
  - type: heading
    content: (Jereo 2 Tan 5.2–6.2)
  - type: text
    content: 'Tamin’izay fotoana izay dia novorin’i Salômôna mpanjaka teo aminy tao Jerosalema ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely sy ny lehibem-poko rehetra ary ny filoham-pianakaviana israelita mba hampakatra ny '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: ', avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' Tanànan’i Davida'
  - type: note
    content: Jereo 2 Sam 6.12-16; 1 Tan 15.25-29.
  - type: text
    content: ' hankao an-tempoly. '
  '10':
  - type: text
    content: 'Rehefa nivoaka ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' ireo mpisorona, dia nisy rahona nameno ny tranon’ny TOMPO; '
  '11':
  - type: text
    content: ka tsy nahajanona hanohy fanompoam-pivavahana ny mpisorona noho izany rahona izany, satria feno ny voninahitry ny TOMPO ilay tranony
  - type: note
    content: 'And 10-11: ampit Eks 40.34-35.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Dia hoy i Salômôna hoe:'
  - type: text
    content: «TOMPO ô, efa nilaza Ianao fa honina ao anaty haizim-pito.
  '13':
  - type: text
    content: Kanefa izaho dia nanorina trano hipetrahanao,
  - type: text
    content: dia toerana honenanao mandrakizay!»
  - type: heading
    content: Kabary fitokanana ny tempoly
  - type: heading
    content: (Jereo 2 Tan 6.3-11)
  '14':
  - type: text
    content: 'Nitsangana avokoa tamin’izay ny Israelita rehetra tafangona teo; dia nitodika tamin’izy ireo ny mpanjaka ary niarahaba azy. '
  '15':
  - type: text
    content: 'Avy eo izy dia niteny hoe:'
  - type: text
    content: '–Hisaorana anie ny TOMPO Andriamanitr’i Israely! Fa notontosainy tokoa ny zavatra nampanantenainy tamin’i Davida raiko hoe: '
  '16':
  - type: text
    content: «Hatramin’ny andro nitondrako an’i Israely vahoakako niala tany Ejipta, dia tsy mbola nisy tanàna nofidiko tamin’ny foko israelita rehetra hanaovana tempoly mba hitoeran’ny voninahitro; nefa kosa nofidiko ianao, ry Davida, hifehy ilay Israely vahoakako
  - type: note
    content: 'tsy mbola nisy tanàna nofidiko...: an’ny Jebosita ny tanànan’i Jerosalema talohan’ny nakan’i Davida azy ka nanaovany izany ho renivohitr’i Israely, jereo 2 Sam 5.6-9. – filohan’ny vahoakako: jereo 2 Sam 7.4-11; 1 Tan 17.3-10.'
  - type: text
    content: '.» '
  '17':
  - type: text
    content: 'Efa mby tao am-pon’i Davida raiko ny hanorina tempoly ho voninahitry ny TOMPO Andriamanitr’i Israely. '
  '18':
  - type: text
    content: 'Kanefa dia hoy ny TOMPO taminy: «Tao am-ponao ny fikasana hanorina tempoly ho voninahitro, dia tsara tokoa izany fikasanao izany'
  - type: note
    content: 'And 17-18: jereo 2 Sam 7.1-3; 1 Tan 17.1-2.'
  - type: text
    content: '; '
  '19':
  - type: text
    content: saingy tsy ianao no hanorina izany, fa ny zanakao lahy haterakao. Izy no hanorina tempoly ho voninahitro
  - type: note
    content: Jereo 2 Sam 7.12-13; 1 Tan 17.11-12.
  - type: text
    content: '.» '
  '2':
  - type: text
    content: Ary tafavory teo amin’i Salômôna mpanjaka ny vatan-dehilahy israelita rehetra nandritra ilay fety fanao amin’ny volana Etanima, dia ny volana fahafito izany
  - type: note
    content: 'Etanima: jereo ny FTS amin’ny voambolana hoe FANISANANDRO. –ny fetin’ny volana fahafito dia mety ho ny fetin’ny Tranotomboka, jereo Lev 23.33-43.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Dia notanterahin’ny TOMPO araka izany tokoa ny fampanantenana izay nolazainy; fa nandimby an’i Davida raiko ary mipetraka eo amin’ny sezafiandrianan’i Israely, araka ny voalazan’ny TOMPO, sady efa nanorina ity tempoly ity ho voninahitry ny TOMPO Andriamanitr’i Israely. '
  '21':
  - type: text
    content: 'Nasiako toerana aza teo ho an’ny Vatamasina misy ny raki-tsoratry ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataon’ny TOMPO tamin’ny razantsika, fony Izy nitondra azy niala tany Ejipta.'
  - type: heading
    content: Ny vavaka lehibe nataon’i Salômôna
  - type: heading
    content: (Jereo 2 Tan 6.12-40)
  '22':
  - type: text
    content: 'Dia nitsangana teo anoloan’ny '
  - type: text
    content: alitara
  - type: text
    content: 'n’ny TOMPO sady nanatrika ny Israelita rehetra tafangona i Salômôna, ka nanandra-tanana nanandrify ny lanitra '
  '23':
  - type: text
    content: 'ary nivavaka hoe: «Ry TOMPO Andriamanitr’i Israely ô, tsy misy Andriamanitra tahaka Anao, na any an-danitra ambony, na etỳ an-tany ambany. Tandrovinao hatrany ny '
  - type: text
    content: fanekempihavananao
  - type: text
    content: ' sy ny fitiavanao amin’ireo mpanomponao izay mizotra eo anatrehanao amin’ny fony manontolo. '
  '24':
  - type: text
    content: 'Efa notanterahinao tamin’i Davida raiko sady mpanomponao ny zavatra nampanantenainao azy; eny, izay voalazanao dia notontosainao, araka izao hita anio izao. '
  '25':
  - type: text
    content: 'Koa ankehitriny, ry TOMPO Andriamanitr’i Israely ô, mba tanteraho hanambinana an’i Davida raiko sady mpanomponao ilay fampanantenana nataonao taminy, fony Ianao nilaza hoe: ‹Raha mitandrina fitondrantena ireo taranakao, ka mizotra eo anatrehako toy ny nataonao, dia tsy ho diso zanakalahy amin’ireo ianao noho ny amiko, dia zanakalahy izay hanjaka handimby anao eo amin’ny sezafiandrianan’i Israely'
  - type: note
    content: Jereo 2.4.
  - type: text
    content: '.› '
  '26':
  - type: text
    content: Ankehitriny àry, ry Andriamanitr’i Israely ô, ho to anie ny fampanantenana voalazanao tamin’i Davida raiko sady mpanomponao!
  '27':
  - type: text
    content: «Nefa hety honina marina etỳ an-tany ve Ianao, Andriamanitra ô? Indro ny lanitra, na dia midadasika tokoa aza, tsy omby Anao
  - type: note
    content: Jereo 2 Tan 2.5.
  - type: text
    content: '; koa mainka fa ity tempoly izay nataoko ity. '
  '28':
  - type: text
    content: 'Na izany aza, ry TOMPO Andriamanitro ô, mba atreho ny vavaka amam-pifonako; eny, mba henoy ny antso sy ny vavaka izay ataoko eto anatrehanao anio. '
  '29':
  - type: text
    content: Aoka hojerenao amin-kamorampo andro aman’alina ity tempoly ity, dia ilay toerana nolazainao fa hampitoeranao ny voninahitrao
  - type: note
    content: Jereo Deot 12.11.
  - type: text
    content: '. Koa mba henoy ny vavaka izay ataoko, rehefa mitodika amin’ity toerana ity aho. '
  '3':
  - type: text
    content: 'Rehefa tonga avokoa ny loholon’i Israely, dia noraisin’ireo mpisorona ny Vatamasina. '
  '30':
  - type: text
    content: Mba henoy ny fifonako sy ny an’ilay Israely vahoakanao, rehefa mivavaka mitodika amin’ity toerana ity izahay. Mba mihainoa any an-danitra toeram-ponenanao Ianao; eny, mihainoa anay ka mamelà ny helokay.
  '31':
  - type: text
    content: '«Mety hisy olona manota amin’ny namany, ka asaina manao fianianana ombàm-piozonana. Rehefa tonga hanao izany eto anoloan’ny alitaranao amin’ity tempolinao ity izy, '
  '32':
  - type: text
    content: dia mba mihainoa avy any an-danitra Ianao, TOMPO ô, ka midira an-tsehatra hitsara ireo mpanomponao ireo; dia sazio ny olo-meloka ary atsingereno aminy ny ratsy nataony, fa ambarao ho marina kosa ny olo-marina ka valio soa araka ny fahamarinany.
  '33':
  - type: text
    content: '«Mety ho resim-pahavalo ny Israelita vahoakanao noho ny nanotany taminao. Rehefa miverina aminao izy ka midera ny anaranao ary mivavaka sy mifona aminao eto amin’ity tempoly ity, '
  '34':
  - type: text
    content: dia mba mihainoa avy any an-danitra Ianao, TOMPO ô, ka mamelà ny fahotany ary mamerena azy indray amin’ny tany izay nomenao ny razany.
  '35':
  - type: text
    content: '«Mety koa hikatona ny lanitra ka tsy misy ny orana noho ny nanotan’ny Israelita taminao. Rehefa mivavaka mitodika amin’ity toerana ity izy ka midera ny anaranao sady miala amin’ny fahotany satria nampahorinao, '
  '36':
  - type: text
    content: dia mba mihainoa avy any an-danitra Ianao, TOMPO ô, ka hamela ny fahotan’ireo mpanomponao, izany hoe ny Israelita vahoakanao; dia hampianarinao azy anie ny fitondrantena tsara izay tokony hizorany ary handatsahanao ranonorana ity taninao izay efa nomenao ho fananan’ny vahoakanao ity.
  '37':
  - type: text
    content: '«Mety hisy mosary eto amin’ity tany ity na areti-mandringana, mety ho mainan’ny rivotra na ho lo am-potony ny vary, na koa hisy andiam-balala sy sompanga tonga; mety hisy fahavalo manao fahirano ireo Israelita ao amin’ny tanàna anankiray, na koa hipoitra ny fahoriana aman’areti-mifindra isan-karazany. '
  '38':
  - type: text
    content: 'Rehefa ny olona tsirairay na ny Israelita vahoakanao no samy mahatsapa ny fahoriam-pony, ka manandra-tanana mitodika amin’ity trano ity ary manao vavaka amam-pifonana isan-karazany, '
  '39':
  - type: text
    content: 'dia mba mihainoa avy any an-danitra toeram-ponenanao Ianao, TOMPO ô, ka mamelà heloka azy; ary midira an-tsehatra Ianao ka araka ny sori-dalana rehetra nizorany anie no samy hamalianao azy avy, satria fantatrao ny fony; eny, Ianao dia Ianao irery ihany no mahalala ny fon’ny olombelona rehetra. '
  '4':
  - type: text
    content: 'Ny mpisorona sy ny '
  - type: text
    content: levita
  - type: text
    content: ' no nampakatra ny Vatamasin’ny TOMPO niaraka tamin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' sy ny fanaka masina rehetra izay tao anatiny. '
  '40':
  - type: text
    content: Izany no hataonao amin’ny Israelita, dia ny mba hanajany Anao mandritra ny andro rehetra hiainany eto amin’ity tany nomenao ny razanay ity.
  '41':
  - type: text
    content: '«Mety hisy ny vahiny izay tsy anisan’ny Israelita vahoakanao; kanefa niainga avy any an-tany lavitra izy hankatỳ noho ny aminao, '
  '42':
  - type: text
    content: 'satria nandre ny lazanao lehibe sy ny fiarovanao mahery ary ny fahefana ampiharinao. Rehefa tonga hivavaka mitodika amin’ity tempoly ity izy, '
  '43':
  - type: text
    content: dia mba mihainoa avy any an-danitra toeram-ponenanao Ianao, TOMPO ô, ka manaova araka izay rehetra angatahiny. Izany no hahalalan’ny firenena rehetra ambonin’ny tany Anao sy hanajany Anao tahaka ny ataon’ny Israelita vahoakanao ary hiekeny fa ny anaranao no efa nantsoina tamin’ity trano naoriko ity.
  '44':
  - type: text
    content: '«Mety hiainga hiady amim-pahavalo ny vahoakanao, na aiza na aiza hanirahanao azy; rehefa mivavaka aminao izy, TOMPO ô, ka mitodika amin’ity tanàna voafidinao sy amin’ity tempoly naoriko ho voninahitrao ity, '
  '45':
  - type: text
    content: dia mba henoy ny vavaka amam-pifonana ataony, ka omeo rariny izy.
  '46':
  - type: text
    content: '«Mety hanota aminao ny Israelita fa tsy misy olombelona tsy manota, ka tezitra aminy Ianao ary manolotra azy amin’ny fahavalony; dia hoentin’ny mpamabo ho babo any an-tany lavitra na akaiky ireo. '
  '47':
  - type: text
    content: 'Rehefa mieritreritra izy any amin’ny tany nitondrana azy ho babo, dia hivalo sy hifona aminao manao hoe: ‹Efa nanota izahay sady efa nahavita heloka sy efa nanao ratsy›; '
  '48':
  - type: text
    content: 'ary hiverina aminao amin’ny fo sy fanahy manontolo izy ao amin’izany tany nitondrana azy ho babo izany sady hivavaka mitodika amin’ity taniny izay nomenao ny razany ity sy amin’ity tanàna voafidinao ity ary amin’ity tempoly izay naoriko ho voninahitrao ity, '
  '49':
  - type: text
    content: 'dia mba henoy avy any an-danitra toeram-ponenanao ny vavaka amam-pifonana ataony, TOMPO ô, ka omeo rariny izy; '
  '5':
  - type: text
    content: I Salômôna mpanjaka sy ireo Israelita rehetra tafangona niaraka taminy teo anoloan’ny Vatamasina kosa dia samy nanao sorona omby sy ondry aman’osy marobe tokoa hany ka tsy tambo nisaina intsony.
  '50':
  - type: text
    content: 'ary dia avelao ny heloky ny vahoakanao izay efa nanota taminao sy ny fahadisoana rehetra izay vitany taminao. Enga anie hataonao mahazo indrafo amin’ny mpamabo azy, ka hamindrany fo tokoa. '
  '51':
  - type: text
    content: Vahoakanao sy fanananao manko ireo hatramin’ny nitondranao azy niala tany Ejipta, dia avy tao amin’ny memy fandrendreham-by.
  '52':
  - type: text
    content: '«Ry Tompo ANDRIANANAHARY ô, enga anie ny masonao hijery ary enga anie Ianao hihaino ny fifonako sy ny an’ilay Israely vahoakanao isaky ny miantso Anao izahay. '
  '53':
  - type: text
    content: Satria Ianao no nanavaka anay tamin’ny firenen-drehetra ambonin’ny tany mba ho fanananao, araka ny nampilazainao an’i Mosesy mpanomponao fony Ianao nitondra ny razanay niala tany Ejipta.»
  - type: heading
    content: I Salômôna nangataka ny tsodranon’Andriamanitra
  '54':
  - type: text
    content: 'Raha vao vitan’i Salômôna izany vavaka sy fifonana manontolo nataony tamin’ny TOMPO izany, dia nitsangana avy teo am-pandohalehana nanoloana ny '
  - type: text
    content: alitara
  - type: text
    content: 'n’ny TOMPO izy sady nanainga tanana nanandrify ny lanitra. '
  '55':
  - type: text
    content: 'Nijoro izy no '
  - type: text
    content: nitsodrano
  - type: text
    content: ' tamin’ny feo mahery ny Israelita tafangona teo nanao hoe: '
  '56':
  - type: text
    content: «Hisaorana anie ny TOMPO Izay nanome fiadanana ny Israelita vahoakany araka izay rehetra nolazainy; fa tanterany antsipiriany avokoa ny teny soa nampilazainy an’i Mosesy mpanompony
  - type: note
    content: Jereo Deot 12.10; Jos 21.44-45.
  - type: text
    content: '. '
  '57':
  - type: text
    content: 'Koa enga anie ny TOMPO Andriamanitsika mba hiaraka amintsika tahaka izay efa niarahany tamin’ireo razantsika; tsy hahafoy na handao antsika anie Izy, '
  '58':
  - type: text
    content: 'fa hampirona ny fontsika aminy mba hizorantsika araka ny sori-dalany rehetra ary hitandremantsika ny didy aman-dalàna sy ny fitsipika izay nomeny an’ireo razantsika. '
  '59':
  - type: text
    content: 'Hotsaroan’ny TOMPO Andriamanitsika andro aman’alina anie izany teny fifonana nataoko teo anatrehany izany mba hanomezany rariny antsika vahoakany araka izay sahaza antsika isan’andro. '
  '6':
  - type: text
    content: 'Ary ilay Vatamasina mirakitra ny fanekempihavanan’ny TOMPO dia nampidirin’ny mpisorona ho ao amin’ny toerany, tao anatin’ny efitrano atao hoe '
  - type: text
    content: Toeramasina Indrindra
  - type: text
    content: ', teo ambanin’ny elatr’ireo '
  - type: text
    content: kerobima
  - type: text
    content: '. '
  '60':
  - type: text
    content: 'Dia ho fantatry ny firenen-drehetra ambonin’ny tany fa ny TOMPO irery ihany no Andriamanitra fa tsy misy hafa; '
  '61':
  - type: text
    content: ary hiraiki-po amin’ny TOMPO Andriamanitsika ianareo mba hizoranareo araka ny lalànany sy hitandremanareo ny didiny tahaka izao ataonareo anio izao.»
  - type: heading
    content: Ny sorona naterina ho an’ny Tompo
  - type: heading
    content: (Jereo 2 Tan 7.4-10)
  '62':
  - type: text
    content: 'I Salômôna mpanjaka sy ny Israelita rehetra tafaraka taminy dia nanao sorona teo anatrehan’ny TOMPO. '
  '63':
  - type: text
    content: 'Ka omby 22 000 sy ondry aman’osy 120 000 no nataon’i Salômôna ho '
  - type: text
    content: sorom-pihavanana
  - type: text
    content: ' ho an’ny TOMPO. Toy izany no nitokanan’ny mpanjaka sy ny Israelita rehetra ny tranon’ny TOMPO. '
  '64':
  - type: text
    content: 'Io andro io ihany no nanokanan’ny mpanjaka ny afovoan’ny kianja manoloana ny tranon’ny TOMPO, satria teo no nanaterany ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy ny fanatitra vokatry ny tany ary ny saboran’ny sorom-pihavanana. Kely loatra manko ny '
  - type: text
    content: alitara
  - type: text
    content: ' halimo teo anoloan’ny Toeramasina ka tsy omby ny zavatra rehetra natolotra.'
  '65':
  - type: text
    content: 'Tamin’io volana fahafito io koa no niarahan’i Salômôna nankalaza ny fetin’ny Tranotomboka tamin’ny Israelita rehetra izay tafangona marobe, tonga avy amin’ny lafy valo hatreo Lebô-Hamata ka hatrany amin’ny lohasahan-driakan’i Ejipta. Koa nankalaza fety teo anatrehan’ny TOMPO Andriamanitsika izy nandritra ny fito andro indroa: izany hoe 14 andro'
  - type: note
    content: 'fetin’ny Tranotomboka: ny teny hebreo dia milaza tsotra hoe ny fety, jereo and 2 sy nta. –Lebô-Hamata: jereo Nom 13.21 sy nta; lohasahan-driakan’i Ejipta: jereo Nom 34.5 sy nta. –fito andro indroa: fito andro voalohany ho fitokanana ny alitara, ary fito andro faharoa ho fankalazana ny Tranotomboka (jereo 2 Tan 7.9).'
  - type: text
    content: '. '
  '66':
  - type: text
    content: Ary tamin’ny andro fahavalo dia nalefan’ny mpanjaka hody ny Israelita. Dia nanao veloma
  - type: note
    content: 'andro fahavalo: andro manaraka ny fito andro fankalazana ny Tranotomboka. –nanao veloma: dkt hafa nirary soa na hoe nisaotra.'
  - type: text
    content: ny mpanjaka ireo ary lasa nody tany an-tranony avy sady faly sy ravoravo fo noho ny soa isan-karazany nataon’ny TOMPO tamin’i Davida mpanompony sy tamin’i Israely vahoakany.
  '7':
  - type: text
    content: 'Fa nivelatra tambonin’ny toeran’ny Vatamasina ny elatr’ireo kerobima ka nanarona ny Vatamasina sy ny bao filanjana azy. '
  '8':
  - type: text
    content: 'Lava ihany ireto bao ireto, ka mety hita ny lohany, raha tazanina avy eo amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' manoloana ny efitra anatiny, saingy tsy hita kosa avy any ivelany; ary mbola ao mandraka androany ireo bao ireo. '
  '9':
  - type: text
    content: 'Tsy nisy na inona na inona tao anatin’ilay Vatamasina afa-tsy ny vatofisaka roa izay napetrak’i Mosesy tao fony tany '
  - type: text
    content: Hôreba
  - type: note
    content: Jereo Deot 10.5.
  - type: text
    content: ', rehefa nanaovan’ny TOMPO fanekempihavanana ny Israelita taorian’ny nialany tany Ejipta.'
