      text: '62'
  - type: text
    text: 'I Salômôna mpanjaka sy ny Israelita rehetra tafaraka taminy dia nanao sorona teo anatrehan’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ka omby 22 000 sy ondry aman’osy 120 000 no nataon’i Salômôna ho '
