    text: ' ho an’ny TOMPO. Toy izany no nitokanan’ny mpanjaka sy ny Israelita rehetra ny tranon’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Io andro io ihany no nanokanan’ny mpanjaka ny afovoan’ny kianja manoloana ny tranon’ny TOMPO, satria teo no nanaterany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo sy ny fanatitra vokatry ny tany ary ny saboran’ny sorom-pihavanana. Kely loatra manko ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' halimo teo anoloan’ny Toeramasina ka tsy omby ny zavatra rehetra natolotra.'
