document_id: 1KI.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fametrahana ny Vatamasina tao an-tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 5.2–6.2)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izay fotoana izay dia novorin’i Salômôna mpanjaka teo aminy tao Jerosalema ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Israely sy ny lehibem-poko rehetra ary ny filoham-pianakaviana israelita mba hampakatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    text: ', avy ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ' Tanànan’i Davida'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 6.12-16; 1 Tan 15.25-29.
    marker-yv: yv-n
  - type: text
    text: ' hankao an-tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary tafavory teo amin’i Salômôna mpanjaka ny vatan-dehilahy israelita rehetra nandritra ilay fety fanao amin’ny volana Etanima, dia ny volana fahafito izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Etanima: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo ny FTS amin’ny voambolana hoe FANISANANDRO. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –ny fetin’ny volana fahafito
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mety ho ny fetin’ny Tranotomboka, jereo Lev 23.33-43.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa tonga avokoa ny loholon’i Israely, dia noraisin’ireo mpisorona ny Vatamasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' no nampakatra ny Vatamasin’ny TOMPO niaraka tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' sy ny fanaka masina rehetra izay tao anatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I Salômôna mpanjaka sy ireo Israelita rehetra tafangona niaraka taminy teo anoloan’ny Vatamasina kosa dia samy nanao sorona omby sy ondry aman’osy marobe tokoa hany ka tsy tambo nisaina intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ilay Vatamasina mirakitra ny fanekempihavanan’ny TOMPO dia nampidirin’ny mpisorona ho ao amin’ny toerany, tao anatin’ny efitrano atao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina Indrindra
  - type: text
    text: ', teo ambanin’ny elatr’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa nivelatra tambonin’ny toeran’ny Vatamasina ny elatr’ireo kerobima ka nanarona ny Vatamasina sy ny bao filanjana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lava ihany ireto bao ireto, ka mety hita ny lohany, raha tazanina avy eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' manoloana ny efitra anatiny, saingy tsy hita kosa avy any ivelany; ary mbola ao mandraka androany ireo bao ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsy nisy na inona na inona tao anatin’ilay Vatamasina afa-tsy ny vatofisaka roa izay napetrak’i Mosesy tao fony tany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hôreba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 10.5.
    marker-yv: yv-n
  - type: text
    text: ', rehefa nanaovan’ny TOMPO fanekempihavanana ny Israelita taorian’ny nialany tany Ejipta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa nivoaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' ireo mpisorona, dia nisy rahona nameno ny tranon’ny TOMPO; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ka tsy nahajanona hanohy fanompoam-pivavahana ny mpisorona noho izany rahona izany, satria feno ny voninahitry ny TOMPO ilay tranony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 10-11:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Eks 40.34-35.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy i Salômôna hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «TOMPO ô, efa nilaza Ianao fa honina ao anaty haizim-pito.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Kanefa izaho dia nanorina trano hipetrahanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toerana honenanao mandrakizay!»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Kabary fitokanana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 6.3-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nitsangana avokoa tamin’izay ny Israelita rehetra tafangona teo; dia nitodika tamin’izy ireo ny mpanjaka ary niarahaba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Avy eo izy dia niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hisaorana anie ny TOMPO Andriamanitr’i Israely! Fa notontosainy tokoa ny zavatra nampanantenainy tamin’i Davida raiko hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Hatramin’ny andro nitondrako an’i Israely vahoakako niala tany Ejipta, dia tsy mbola nisy tanàna nofidiko tamin’ny foko israelita rehetra hanaovana tempoly mba hitoeran’ny voninahitro; nefa kosa nofidiko ianao, ry Davida, hifehy ilay Israely vahoakako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsy mbola nisy tanàna nofidiko...: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'an’ny Jebosita ny tanànan’i Jerosalema talohan’ny nakan’i Davida azy ka nanaovany izany ho renivohitr’i Israely, jereo 2 Sam 5.6-9. – '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'filohan’ny vahoakako:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 2 Sam 7.4-11; 1 Tan 17.3-10.'
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Efa mby tao am-pon’i Davida raiko ny hanorina tempoly ho voninahitry ny TOMPO Andriamanitr’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Kanefa dia hoy ny TOMPO taminy: «Tao am-ponao ny fikasana hanorina tempoly ho voninahitro, dia tsara tokoa izany fikasanao izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.18 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 17-18:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 7.1-3; 1 Tan 17.1-2.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: saingy tsy ianao no hanorina izany, fa ny zanakao lahy haterakao. Izy no hanorina tempoly ho voninahitro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 7.12-13; 1 Tan 17.11-12.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia notanterahin’ny TOMPO araka izany tokoa ny fampanantenana izay nolazainy; fa nandimby an’i Davida raiko ary mipetraka eo amin’ny sezafiandrianan’i Israely, araka ny voalazan’ny TOMPO, sady efa nanorina ity tempoly ity ho voninahitry ny TOMPO Andriamanitr’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nasiako toerana aza teo ho an’ny Vatamasina misy ny raki-tsoratry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' nataon’ny TOMPO tamin’ny razantsika, fony Izy nitondra azy niala tany Ejipta.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka lehibe nataon’i Salômôna
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 6.12-40)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nitsangana teo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: 'n’ny TOMPO sady nanatrika ny Israelita rehetra tafangona i Salômôna, ka nanandra-tanana nanandrify ny lanitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary nivavaka hoe: «Ry TOMPO Andriamanitr’i Israely ô, tsy misy Andriamanitra tahaka Anao, na any an-danitra ambony, na etỳ an-tany ambany. Tandrovinao hatrany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavananao
  - type: text
    text: ' sy ny fitiavanao amin’ireo mpanomponao izay mizotra eo anatrehanao amin’ny fony manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Efa notanterahinao tamin’i Davida raiko sady mpanomponao ny zavatra nampanantenainao azy; eny, izay voalazanao dia notontosainao, araka izao hita anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa ankehitriny, ry TOMPO Andriamanitr’i Israely ô, mba tanteraho hanambinana an’i Davida raiko sady mpanomponao ilay fampanantenana nataonao taminy, fony Ianao nilaza hoe: ‹Raha mitandrina fitondrantena ireo taranakao, ka mizotra eo anatrehako toy ny nataonao, dia tsy ho diso zanakalahy amin’ireo ianao noho ny amiko, dia zanakalahy izay hanjaka handimby anao eo amin’ny sezafiandrianan’i Israely'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.4.
    marker-yv: yv-n
  - type: text
    text: '.› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ankehitriny àry, ry Andriamanitr’i Israely ô, ho to anie ny fampanantenana voalazanao tamin’i Davida raiko sady mpanomponao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: «Nefa hety honina marina etỳ an-tany ve Ianao, Andriamanitra ô? Indro ny lanitra, na dia midadasika tokoa aza, tsy omby Anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Tan 2.5.
    marker-yv: yv-n
  - type: text
    text: '; koa mainka fa ity tempoly izay nataoko ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Na izany aza, ry TOMPO Andriamanitro ô, mba atreho ny vavaka amam-pifonako; eny, mba henoy ny antso sy ny vavaka izay ataoko eto anatrehanao anio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Aoka hojerenao amin-kamorampo andro aman’alina ity tempoly ity, dia ilay toerana nolazainao fa hampitoeranao ny voninahitrao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 12.11.
    marker-yv: yv-n
  - type: text
    text: '. Koa mba henoy ny vavaka izay ataoko, rehefa mitodika amin’ity toerana ity aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mba henoy ny fifonako sy ny an’ilay Israely vahoakanao, rehefa mivavaka mitodika amin’ity toerana ity izahay. Mba mihainoa any an-danitra toeram-ponenanao Ianao; eny, mihainoa anay ka mamelà ny helokay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '«Mety hisy olona manota amin’ny namany, ka asaina manao fianianana ombàm-piozonana. Rehefa tonga hanao izany eto anoloan’ny alitaranao amin’ity tempolinao ity izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: dia mba mihainoa avy any an-danitra Ianao, TOMPO ô, ka midira an-tsehatra hitsara ireo mpanomponao ireo; dia sazio ny olo-meloka ary atsingereno aminy ny ratsy nataony, fa ambarao ho marina kosa ny olo-marina ka valio soa araka ny fahamarinany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '«Mety ho resim-pahavalo ny Israelita vahoakanao noho ny nanotany taminao. Rehefa miverina aminao izy ka midera ny anaranao ary mivavaka sy mifona aminao eto amin’ity tempoly ity, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia mba mihainoa avy any an-danitra Ianao, TOMPO ô, ka mamelà ny fahotany ary mamerena azy indray amin’ny tany izay nomenao ny razany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '«Mety koa hikatona ny lanitra ka tsy misy ny orana noho ny nanotan’ny Israelita taminao. Rehefa mivavaka mitodika amin’ity toerana ity izy ka midera ny anaranao sady miala amin’ny fahotany satria nampahorinao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: dia mba mihainoa avy any an-danitra Ianao, TOMPO ô, ka hamela ny fahotan’ireo mpanomponao, izany hoe ny Israelita vahoakanao; dia hampianarinao azy anie ny fitondrantena tsara izay tokony hizorany ary handatsahanao ranonorana ity taninao izay efa nomenao ho fananan’ny vahoakanao ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '«Mety hisy mosary eto amin’ity tany ity na areti-mandringana, mety ho mainan’ny rivotra na ho lo am-potony ny vary, na koa hisy andiam-balala sy sompanga tonga; mety hisy fahavalo manao fahirano ireo Israelita ao amin’ny tanàna anankiray, na koa hipoitra ny fahoriana aman’areti-mifindra isan-karazany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Rehefa ny olona tsirairay na ny Israelita vahoakanao no samy mahatsapa ny fahoriam-pony, ka manandra-tanana mitodika amin’ity trano ity ary manao vavaka amam-pifonana isan-karazany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'dia mba mihainoa avy any an-danitra toeram-ponenanao Ianao, TOMPO ô, ka mamelà heloka azy; ary midira an-tsehatra Ianao ka araka ny sori-dalana rehetra nizorany anie no samy hamalianao azy avy, satria fantatrao ny fony; eny, Ianao dia Ianao irery ihany no mahalala ny fon’ny olombelona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Izany no hataonao amin’ny Israelita, dia ny mba hanajany Anao mandritra ny andro rehetra hiainany eto amin’ity tany nomenao ny razanay ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '«Mety hisy ny vahiny izay tsy anisan’ny Israelita vahoakanao; kanefa niainga avy any an-tany lavitra izy hankatỳ noho ny aminao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'satria nandre ny lazanao lehibe sy ny fiarovanao mahery ary ny fahefana ampiharinao. Rehefa tonga hivavaka mitodika amin’ity tempoly ity izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: dia mba mihainoa avy any an-danitra toeram-ponenanao Ianao, TOMPO ô, ka manaova araka izay rehetra angatahiny. Izany no hahalalan’ny firenena rehetra ambonin’ny tany Anao sy hanajany Anao tahaka ny ataon’ny Israelita vahoakanao ary hiekeny fa ny anaranao no efa nantsoina tamin’ity trano naoriko ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '«Mety hiainga hiady amim-pahavalo ny vahoakanao, na aiza na aiza hanirahanao azy; rehefa mivavaka aminao izy, TOMPO ô, ka mitodika amin’ity tanàna voafidinao sy amin’ity tempoly naoriko ho voninahitrao ity, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: dia mba henoy ny vavaka amam-pifonana ataony, ka omeo rariny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: '«Mety hanota aminao ny Israelita fa tsy misy olombelona tsy manota, ka tezitra aminy Ianao ary manolotra azy amin’ny fahavalony; dia hoentin’ny mpamabo ho babo any an-tany lavitra na akaiky ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Rehefa mieritreritra izy any amin’ny tany nitondrana azy ho babo, dia hivalo sy hifona aminao manao hoe: ‹Efa nanota izahay sady efa nahavita heloka sy efa nanao ratsy›; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'ary hiverina aminao amin’ny fo sy fanahy manontolo izy ao amin’izany tany nitondrana azy ho babo izany sady hivavaka mitodika amin’ity taniny izay nomenao ny razany ity sy amin’ity tanàna voafidinao ity ary amin’ity tempoly izay naoriko ho voninahitrao ity, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'dia mba henoy avy any an-danitra toeram-ponenanao ny vavaka amam-pifonana ataony, TOMPO ô, ka omeo rariny izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'ary dia avelao ny heloky ny vahoakanao izay efa nanota taminao sy ny fahadisoana rehetra izay vitany taminao. Enga anie hataonao mahazo indrafo amin’ny mpamabo azy, ka hamindrany fo tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Vahoakanao sy fanananao manko ireo hatramin’ny nitondranao azy niala tany Ejipta, dia avy tao amin’ny memy fandrendreham-by.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: '«Ry Tompo ANDRIANANAHARY ô, enga anie ny masonao hijery ary enga anie Ianao hihaino ny fifonako sy ny an’ilay Israely vahoakanao isaky ny miantso Anao izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Satria Ianao no nanavaka anay tamin’ny firenen-drehetra ambonin’ny tany mba ho fanananao, araka ny nampilazainao an’i Mosesy mpanomponao fony Ianao nitondra ny razanay niala tany Ejipta.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Salômôna nangataka ny tsodranon’Andriamanitra
  marker-yv: yv-h
- type: usfm
