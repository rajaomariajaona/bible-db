    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Raha vao vitan’i Salômôna izany vavaka sy fifonana manontolo nataony tamin’ny TOMPO izany, dia nitsangana avy teo am-pandohalehana nanoloana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: 'n’ny TOMPO izy sady nanainga tanana nanandrify ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Nijoro izy no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nitsodrano
  - type: text
    text: ' tamin’ny feo mahery ny Israelita tafangona teo nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: «Hisaorana anie ny TOMPO Izay nanome fiadanana ny Israelita vahoakany araka izay rehetra nolazainy; fa tanterany antsipiriany avokoa ny teny soa nampilazainy an’i Mosesy mpanompony
  - type: usfm
    marker: f
