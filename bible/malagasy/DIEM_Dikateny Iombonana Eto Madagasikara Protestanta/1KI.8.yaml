  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Koa enga anie ny TOMPO Andriamanitsika mba hiaraka amintsika tahaka izay efa niarahany tamin’ireo razantsika; tsy hahafoy na handao antsika anie Izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'fa hampirona ny fontsika aminy mba hizorantsika araka ny sori-dalany rehetra ary hitandremantsika ny didy aman-dalàna sy ny fitsipika izay nomeny an’ireo razantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Hotsaroan’ny TOMPO Andriamanitsika andro aman’alina anie izany teny fifonana nataoko teo anatrehany izany mba hanomezany rariny antsika vahoakany araka izay sahaza antsika isan’andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Dia ho fantatry ny firenen-drehetra ambonin’ny tany fa ny TOMPO irery ihany no Andriamanitra fa tsy misy hafa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: ary hiraiki-po amin’ny TOMPO Andriamanitsika ianareo mba hizoranareo araka ny lalànany sy hitandremanareo ny didiny tahaka izao ataonareo anio izao.»
