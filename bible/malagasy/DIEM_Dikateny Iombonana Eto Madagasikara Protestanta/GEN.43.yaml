document_id: GEN.43,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanaiky handefa an’i Benjamîna ihany i Jakôba
  - type: text
    content: 'Mbola nanindry mafy tany Kanahàna ny mosary. '
  '10':
  - type: text
    content: Ary ankehitriny raha tsy nitaredretra izahay, dia efa tafaverina fanindroany toy izay.
  '11':
  - type: text
    content: 'Ka hoy i Jakôba tamin’ireo zanany:'
  - type: text
    content: '–Raha izany àry, dia izao no ataovy: Mitondrà an-kitaponareo zavatra tsara vokatry ny tany mba hataonareo fanomezana ho an’ilay Ejiptianina. Mitondrà zava-manitra isan-karazany: menaka manitra, làdana, tantely, voam-boatavo, ary amandy. '
  '12':
  - type: text
    content: 'Mitondrà vola toy ny taloha ary ento koa ireo vola teo am-bavan-kitaponareo, dia avereno aminy fa angamba nisy fahadisoana. '
  '13':
  - type: text
    content: 'Dia ento ny rahalahinareo ary miaingà ka miverena any amin’izany lehilahy izany. '
  '14':
  - type: text
    content: 'Andriamanitra '
  - type: text
    content: Tsitoha
  - type: text
    content: ' anie hahatonga azy hamindra fo aminareo ka hamela an’i Benjamîna sy i Simehôna hiverina hiaraka aminareo! Fa izao dia tsy hombàn-janaka aho tahaka ny tsy nanan-janaka mihitsy.'
  - type: heading
    content: Ny nihaonan’i Jôsefa fanindroany tamin’ireo rahalahiny
  '15':
  - type: text
    content: 'Dia nentin’izy mirahalahy avy ny fanomezana sy ny vola ary koa i Benjamîna; dia niainga izy niara-nidina nankany Ejipta, ka niseho teo anatrehan’i Jôsefa. '
  '16':
  - type: text
    content: 'Ary rehefa hitan’i Jôsefa fa niaraka tamin’ireo i Benjamîna, dia hoy izy tamin’ny mpikarakara ny ao an-tranony:'
  - type: text
    content: –Ento any an-trano ireo lehilahy ireo, dia mamonoa zavatra ka manamboara sakafo, fa hiara-mihinana amiko izy ireo anio antoandro.
  '17':
  - type: text
    content: 'Notanterahin-dralehilahy ny baikon’i Jôsefa; ary nentiny tany an-tranon’i Jôsefa ireo, '
  '18':
  - type: text
    content: 'dia raiki-tahotra satria naiditra tao ka nifampilaza hoe: «Noho ilay vola naverina tao anaty kitapom-barintsika teo aloha izay no nampidirana antsika eto mba hahavoa antsika sy hakany ny borikintsika ary hanandevozany ny tenantsika.» '
  '19':
  - type: text
    content: 'Koa rehefa teo am-baravarana izy ireo, dia nanatona an’ilay mpikarakara ny tao an-tranon’i Jôsefa ka niresaka taminy hoe:'
  '2':
  - type: text
    content: 'Koa rehefa lany avokoa ny vary rehetra nentina avy tany Ejipta, dia hoy i Jakôba tamin’ireo zanany lahy:'
  - type: text
    content: –Andeha indray ianareo miverina mividy sakafo ho antsika.
  '20':
  - type: text
    content: '–Aza fady aminao, tompoko! Efa tonga taty indray mandeha izahay teo aloha mba hividy sakafo. '
  '21':
  - type: text
    content: 'Nony tonga teo amin’ny toerana handriana hariva anefa izahay ka nanokatra ny kitaponay, dia samy nahita ny vola teo am-bavan-kitaponay avy fa naverina taminay ny vola naloanay. Nentinay niverina aty ireo vola ireo, '
  '22':
  - type: text
    content: ary nitondra vola hafa koa izahay mba hividianana sakafo. Tsy fantatray izay namerina ny volanay tao anaty kitaponay.
  '23':
  - type: text
    content: 'Ka hoy ny navalin-dralehilahy azy:'
  - type: text
    content: –Milamîna ianareo, ary aza matahotra. Ny Andriamanitrareo, dia Ilay Andriamanitry ny rainareo, no nametraka harena tao an-kitaponareo; fa raha ny amin’ny volanareo dia efa voaraiko tokoa.
  - type: text
    content: 'Dia navoakan-dralehilahy i Simehôna, '
  '24':
  - type: text
    content: 'ka nasainy niditra tao an-tranon’i Jôsefa izy rehetra, ary nomeny rano hanasany tongotra; sady nomeny vilona koa ny borikiny. '
  '25':
  - type: text
    content: 'Nanomana ny fanomezana ireo mandra-piavin’i Jôsefa tamin’ny antoandro, satria efa reny fa hiara-misakafo aminy eo izy. '
  '26':
  - type: text
    content: 'Vao niditra i Jôsefa, dia natolotr’ireo azy ny fanomezana sady niankohoka tamin’ny tany teo anatrehany izy. '
  '27':
  - type: text
    content: 'Dia nanontany ny fahasalaman’izy ireo i Jôsefa, sady nanampy hoe:'
  - type: text
    content: –Ary mba manao ahoana ilay rainareo efa antitra izay nolazainareo tamiko? Moa mbola velona ihany ve izy?
  '28':
  - type: text
    content: 'Ka hoy ny navaliny azy:'
  - type: text
    content: –Salama tsara ilay mpanomponao sady rainay, ary mbola velona izy.
  - type: text
    content: 'Dia niondrika sy niankohoka ireo. '
  '29':
  - type: text
    content: 'Ary nanopy maso i Jôsefa ka nahita an’i Benjamîna rahalahiny izay iray reny aminy, dia nanao hoe:'
  - type: text
    content: –Io moa izany ilay zandrinareo faralahy nolazainareo tamiko?
  - type: text
    content: 'Ary dia nampian’i Jôsefa hoe:'
  - type: text
    content: –Andriamanitra anie hitahy anao, anaka!
  '3':
  - type: text
    content: 'Fa namaly azy i Joda nanao hoe:'
  - type: text
    content: '–Ilay tompon’ny tany dia nanafatrafatra mafy anay hoe: «Tsy handray anareo aho, raha tsy miaraka aminareo ilay rahalahinareo.» '
  '30':
  - type: text
    content: 'Feno loatra ny fon’i Jôsefa nahita ity zandriny ka nitady hitomany izy; dia niala faingana teo izy ka niditra tao amin’ny efitranony ary nitomany tao. '
  '31':
  - type: text
    content: 'Rehefa avy nanasa tarehy izy, dia niditra indray. Notsindriany ny fihetseham-pony ary nasainy naroso ny sakafo. '
  '32':
  - type: text
    content: 'Norosoana sakafo mitokana i Jôsefa, natao mitokana ny an’ireo rahalahiny, ary nihinana mitokana koa ireo Ejiptianina nasaina fa tsy mahazo mihinana miaraka amin’ny Hebreo satria fady izany. '
  '33':
  - type: text
    content: 'Nipetraka nanoloana an’i Jôsefa arakara-jokiny ireo rahalahin’i Jôsefa, manomboka amin’ny lahimatoa ka miafara amin’ny faralahy. Dia nifampijerijery ireo sady gaga. '
  '34':
  - type: text
    content: Nasain’i Jôsefa samy norosoana ny sakafo matsiro avy teo anatrehany izy mirahalahy avy, fa ny an’i Benjamîna dia nataony indimy tahaka ny anjaran-drery tamin’ireo zokiny rehetra.
  - type: text
    content: Dia nanaram-po nisotro divay niaraka tamin’i Jôsefa izy ireo.
  '4':
  - type: text
    content: 'Koa raha alefanao hiaraka aminay i Benjamîna, dia handeha hidina hividy sakafo ho anao izahay. '
  '5':
  - type: text
    content: 'Fa raha tsy alefanao kosa izy, dia tsy handeha izahay satria ralehilahy io dia nilaza taminay hoe: «Tsy handray anareo aho, raha tsy miaraka aminareo ilay rahalahinareo.»'
  '6':
  - type: text
    content: 'Ary hoy i Jakôba hoe:'
  - type: text
    content: –Nahoana no dia nampidi-doza ahy ianareo ka nilaza tamin’izany lehilahy izany fa mbola manana rahalahy ianareo?
  '7':
  - type: text
    content: 'Ka namaly ireo hoe:'
  - type: text
    content: '–Ralehilahy io no namotopototra mafy momba anay sy momba ny fianakavianay, ka nanontany hoe: «Mbola velona ve ny rainareo? Mbola manana rahalahy ve ianareo.» Ary izahay dia namaly fotsiny ny fanontaniany, fa tsy nampoizinay ny hilazany hoe: «Ampidino aty ny rahalahinareo.»'
  '8':
  - type: text
    content: 'Ary i Joda kosa nanampy hoe:'
  - type: text
    content: '–Avelao, ry Dada, hiaraka amiko io zanakao io; fa tsy maintsy mandeha izahay, raha te ho velona fa tsy ho faty ianao sy ny tenanay ary ny fianakaviantsika. '
  '9':
  - type: text
    content: 'Izaho no hiantoka azy ka azonao takîna amiko; fa raha tsy haveriko eto anatrehanao izy, dia ho meloka aminao mandritra ny androko rehetra aho. '
