document_id: GEN.43
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanaiky handefa an’i Benjamîna ihany i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mbola nanindry mafy tany Kanahàna ny mosary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa rehefa lany avokoa ny vary rehetra nentina avy tany Ejipta, dia hoy i Jakôba tamin’ireo zanany lahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha indray ianareo miverina mividy sakafo ho antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa namaly azy i Joda nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ilay tompon’ny tany dia nanafatrafatra mafy anay hoe: «Tsy handray anareo aho, raha tsy miaraka aminareo ilay rahalahinareo.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa raha alefanao hiaraka aminay i Benjamîna, dia handeha hidina hividy sakafo ho anao izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha tsy alefanao kosa izy, dia tsy handeha izahay satria ralehilahy io dia nilaza taminay hoe: «Tsy handray anareo aho, raha tsy miaraka aminareo ilay rahalahinareo.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no dia nampidi-doza ahy ianareo ka nilaza tamin’izany lehilahy izany fa mbola manana rahalahy ianareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ka namaly ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ralehilahy io no namotopototra mafy momba anay sy momba ny fianakavianay, ka nanontany hoe: «Mbola velona ve ny rainareo? Mbola manana rahalahy ve ianareo.» Ary izahay dia namaly fotsiny ny fanontaniany, fa tsy nampoizinay ny hilazany hoe: «Ampidino aty ny rahalahinareo.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary i Joda kosa nanampy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Avelao, ry Dada, hiaraka amiko io zanakao io; fa tsy maintsy mandeha izahay, raha te ho velona fa tsy ho faty ianao sy ny tenanay ary ny fianakaviantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izaho no hiantoka azy ka azonao takîna amiko; fa raha tsy haveriko eto anatrehanao izy, dia ho meloka aminao mandritra ny androko rehetra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ankehitriny raha tsy nitaredretra izahay, dia efa tafaverina fanindroany toy izay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka hoy i Jakôba tamin’ireo zanany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha izany àry, dia izao no ataovy: Mitondrà an-kitaponareo zavatra tsara vokatry ny tany mba hataonareo fanomezana ho an’ilay Ejiptianina. Mitondrà zava-manitra isan-karazany: menaka manitra, làdana, tantely, voam-boatavo, ary amandy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mitondrà vola toy ny taloha ary ento koa ireo vola teo am-bavan-kitaponareo, dia avereno aminy fa angamba nisy fahadisoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia ento ny rahalahinareo ary miaingà ka miverena any amin’izany lehilahy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Andriamanitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsitoha
  - type: text
    text: ' anie hahatonga azy hamindra fo aminareo ka hamela an’i Benjamîna sy i Simehôna hiverina hiaraka aminareo! Fa izao dia tsy hombàn-janaka aho tahaka ny tsy nanan-janaka mihitsy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nihaonan’i Jôsefa fanindroany tamin’ireo rahalahiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nentin’izy mirahalahy avy ny fanomezana sy ny vola ary koa i Benjamîna; dia niainga izy niara-nidina nankany Ejipta, ka niseho teo anatrehan’i Jôsefa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary rehefa hitan’i Jôsefa fa niaraka tamin’ireo i Benjamîna, dia hoy izy tamin’ny mpikarakara ny ao an-tranony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ento any an-trano ireo lehilahy ireo, dia mamonoa zavatra ka manamboara sakafo, fa hiara-mihinana amiko izy ireo anio antoandro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Notanterahin-dralehilahy ny baikon’i Jôsefa; ary nentiny tany an-tranon’i Jôsefa ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia raiki-tahotra satria naiditra tao ka nifampilaza hoe: «Noho ilay vola naverina tao anaty kitapom-barintsika teo aloha izay no nampidirana antsika eto mba hahavoa antsika sy hakany ny borikintsika ary hanandevozany ny tenantsika.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa rehefa teo am-baravarana izy ireo, dia nanatona an’ilay mpikarakara ny tao an-tranon’i Jôsefa ka niresaka taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '–Aza fady aminao, tompoko! Efa tonga taty indray mandeha izahay teo aloha mba hividy sakafo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nony tonga teo amin’ny toerana handriana hariva anefa izahay ka nanokatra ny kitaponay, dia samy nahita ny vola teo am-bavan-kitaponay avy fa naverina taminay ny vola naloanay. Nentinay niverina aty ireo vola ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ary nitondra vola hafa koa izahay mba hividianana sakafo. Tsy fantatray izay namerina ny volanay tao anaty kitaponay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ka hoy ny navalin-dralehilahy azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Milamîna ianareo, ary aza matahotra. Ny Andriamanitrareo, dia Ilay Andriamanitry ny rainareo, no nametraka harena tao an-kitaponareo; fa raha ny amin’ny volanareo dia efa voaraiko tokoa.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia navoakan-dralehilahy i Simehôna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ka nasainy niditra tao an-tranon’i Jôsefa izy rehetra, ary nomeny rano hanasany tongotra; sady nomeny vilona koa ny borikiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nanomana ny fanomezana ireo mandra-piavin’i Jôsefa tamin’ny antoandro, satria efa reny fa hiara-misakafo aminy eo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vao niditra i Jôsefa, dia natolotr’ireo azy ny fanomezana sady niankohoka tamin’ny tany teo anatrehany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nanontany ny fahasalaman’izy ireo i Jôsefa, sady nanampy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ary mba manao ahoana ilay rainareo efa antitra izay nolazainareo tamiko? Moa mbola velona ihany ve izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ka hoy ny navaliny azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Salama tsara ilay mpanomponao sady rainay, ary mbola velona izy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niondrika sy niankohoka ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nanopy maso i Jôsefa ka nahita an’i Benjamîna rahalahiny izay iray reny aminy, dia nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Io moa izany ilay zandrinareo faralahy nolazainareo tamiko?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary dia nampian’i Jôsefa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andriamanitra anie hitahy anao, anaka!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Feno loatra ny fon’i Jôsefa nahita ity zandriny ka nitady hitomany izy; dia niala faingana teo izy ka niditra tao amin’ny efitranony ary nitomany tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Rehefa avy nanasa tarehy izy, dia niditra indray. Notsindriany ny fihetseham-pony ary nasainy naroso ny sakafo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Norosoana sakafo mitokana i Jôsefa, natao mitokana ny an’ireo rahalahiny, ary nihinana mitokana koa ireo Ejiptianina nasaina fa tsy mahazo mihinana miaraka amin’ny Hebreo satria fady izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nipetraka nanoloana an’i Jôsefa arakara-jokiny ireo rahalahin’i Jôsefa, manomboka amin’ny lahimatoa ka miafara amin’ny faralahy. Dia nifampijerijery ireo sady gaga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Nasain’i Jôsefa samy norosoana ny sakafo matsiro avy teo anatrehany izy mirahalahy avy, fa ny an’i Benjamîna dia nataony indimy tahaka ny anjaran-drery tamin’ireo zokiny rehetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nanaram-po nisotro divay niaraka tamin’i Jôsefa izy ireo.
