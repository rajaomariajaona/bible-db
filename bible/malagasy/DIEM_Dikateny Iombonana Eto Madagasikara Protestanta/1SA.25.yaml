document_id: 1SA.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy nety nanampy an’i Davida i Nabala
  - type: text
    content: Tamin’izay no maty i Samoela; ary dia nivory ny Israelita rehetra mba hiara-misaona azy. Nalevina tao amin’ny fonenany tao Ramà
  - type: note
    content: 'Ramà: jereo 1.1 sy nta. –taniefitr’i Paràna: taniefitra ao amin’ny saikanosin’i Sinay.'
  - type: text
    content: ' izy. Rehefa izany, dia lasa nankany an-taniefitr’i Paràna i Davida.'
  '10':
  - type: text
    content: 'Nefa namaly ireo mpanompon’i Davida i Nabala hoe:'
  - type: text
    content: '–I Davida zanakalahin’i Jisay hoe? Iza moa izany? Maro ankehitriny ireo mpanompo izay mitsoaka mandositra ny tompony. '
  '11':
  - type: text
    content: Ary haka amin’ny mofo sy ny rano ary ny hena izay efa nomaniko ho an’ny mpanety ondriko ve aho, ka hanome izany ho an’olona izay tsy fantatra fiaviana akory!
  '12':
  - type: text
    content: 'Nitodi-doha niverina ireo mpanompon’i Davida; ka nony tonga izy ireo, dia nitatitra izany rehetra izany tamin’i Davida. '
  '13':
  - type: text
    content: 'Ary hoy i Davida taminy:'
  - type: text
    content: –Fehezo avokoa ny sabatrareo!
  - type: text
    content: Dia samy namehy ny sabany avy ny tsirairay; ary mba namehy ny azy koa i Davida. Vatan-dehilahy tokony ho efajato no niara-niakatra tamin’i Davida, fa ny roanjato kosa nijanona teo amin’ny entana.
  - type: heading
    content: I Abigaîla nanampy an’i Davida
  '14':
  - type: text
    content: 'Fa ny iray tamin’ny mpanompon’i Nabala nampandre an’i Abigaîla vadiny hoe:'
  - type: text
    content: '–Indro nandefa iraka avy any an-taniefitra i Davida mba hiarahaba ny tompontsika, kanjo dia levilevy no nandraisany azy ireo. '
  '15':
  - type: text
    content: 'Ireo olona ireo anefa dia tena tsara tokoa taminay. tsy nisy ratsy nataony taminay ary tsy very na inona na inona izahay nandritra ny fifaneraseranay taminy, fony mbola tany an-tsaha izahay. '
  '16':
  - type: text
    content: 'Izy ireo no toy ny manda fiarovana ho anay andro aman’alina tamin’ny andro rehetra niandrasanay ondry teo aminy. '
  '17':
  - type: text
    content: Koa diniho sy eritrereto tsara izay tokony hataonao, fa hianjera amin’ny tompontsika sy ny fianakaviany ny loza. Fa ratsy fanahy tokoa i Nabala iny ka tsy azo ifampiresahana akory.
  '18':
  - type: text
    content: 'Nilomay i Abigaîla naka mofo roanjato, divay roa '
  - type: text
    content: siny hoditra
  - type: text
    content: ', ondry dimy efa voamboatra, lango voatono 17 kilao, sampahom-boaloboka maina zato ary mofomamin’aviavy roanjato. Nakariny teo an-damosin’ireo borikiny izany, '
  '19':
  - type: text
    content: 'ka hoy izy tamin’ny mpanompony:'
  - type: text
    content: '–Mandehana eo alohako, fa harahiko ianareo. Tsy niteny na inona na inona tamin’i Nabala vadiny anefa i Abigaîla. '
  '2':
  - type: text
    content: Tao amin’ny tanàna Mahôna dia nisy lehilahy iray nikarakara ny fananany tao Karmela. Mpanefoefo izany olona izany, fa nanana ondry telo arivo sy osy arivo. Tonga tao Karmela izy hanatrika ny fanetezana ny ondry aman’osiny
  - type: note
    content: 'Mahôna, Karmela: tanàna roa tokony ho 40 km ao atsimon’i Jerosalema. –Ny fanetezana ny ondry, amin’ny lohataona, dia fotoam-pety, jereo and 8 ary ampit 2 Sam 13.23-27.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: Raha nitaingina ny borikiny nidina ny toerana takon’ny havoana izy, dia indro nidina nanatona azy i Davida sy ny olony ka nifanehatra taminy.
  '21':
  - type: text
    content: 'Fa i Davida efa niteny anakampo hoe: «Tsy misy vokany ny niarovako ny fananan’ilehiny tany an-taniefitra mba tsy hisy ho very, fa dia novaliany ratsy ny soa nataoko taminy. '
  '22':
  - type: text
    content: Hosazîn’Andriamanitra mafy tokoa anie aho raha toa mbola hasiako miangana na dia lehilahy iray aza amin’ny fianakavian’i Nabala, hatramin’ny rahampitso maraina!»
  '23':
  - type: text
    content: 'Raha vao nahita an’i Davida i Abigaîla, dia nialany faingana ny borikiny, ka niondrika teo anatrehan’i Davida izy '
  '24':
  - type: text
    content: 'ary niantoraka teo an-tongony sady nanao hoe:'
  - type: text
    content: '–Aoka, tompoko, ho ahy dia ho ahy ny fahadisoana! Fa mba avelao aho mpanomponao hiteny kely aminao, koa henoy izay holazaiko. '
  '25':
  - type: text
    content: 'Aza miraharaha an’i Nabala ianao, fa olona adala tsy misy antony iny, dia araka ny anarany ihany hoe Nabala-Adala; eny, olona adala lozabe izy. Fa izaho kosa, tompoko, tsy mba nahita ireo tovolahy izay nirahinao. '
  '26':
  - type: text
    content: Kanefa velona ny TOMPO ary velona koa ny ainao, ka dia Izy TOMPO mihitsy no efa niaro anao tsy handatsa-dra sy tsy haninji-tanana hamalifaty. Enga anie, tompoko, hanjo ny fahavalonao sy izay te hanisy ratsy anao ny nanjo an’i Nabala
  - type: note
    content: Ny faran’ny and 26 dia efa mialoha sahady ny tantaran’ny famaizana sy fahafatesan’i Nabala.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Ankehitriny aoka ireto fanomezana entiko ho anao ireto mba hozaraina amin’ireo tovolahy miaraka aminao. '
  '28':
  - type: text
    content: 'Mifona aminao aho, tompoko, mba avelao re ny fahadisoan’ny mpanomponao, fa hampaharitra tokoa ny fanjakanao sy ny an’ny taranakao ny TOMPO satria ny adin’ny TOMPO no imasoanao, ary tsy hisy ratsy hanimba anao amin’ny andro rehetra iainanao. '
  '29':
  - type: text
    content: 'Raha misy olona milofo hanenjika anao, tompoko, ka mitady hahafaty anao, dia ny TOMPO Andriamanitrao hiaro mandrakariva ny ainao eo anilany, fa ny ain’ny fahavalonao kosa hatorany lavitra, toy ny atoraka amin’ny antsamotady. '
  '3':
  - type: text
    content: I Nabala no anaran’izany lehilahy izany, ary i Abigaîla kosa ny vadiny. Ramatoa dia hendry no tsara tarehy, fa rangahy kosa lozabe sady ratsy fanahy. Avy amin’ny taranak’i Kaleba io Nabala io.
  '30':
  - type: text
    content: 'Rehefa tanteraky ny TOMPO aminao ny soa rehetra nampanantenainy ka voatsangany ho filohan’i Israely ianao, '
  '31':
  - type: text
    content: dia aoka tsy harahin’alahelo na nenina ianao satria hoe nahalatsa-dra amin’ny antony ka nanao fitsaran-tenany. Mba tsarovy aho mpanomponao, tompoko, rehefa manisy soa anao ny TOMPO!
  '32':
  - type: text
    content: 'Dia hoy i Davida tamin’i Abigaîla:'
  - type: text
    content: '–Hisaorana anie ny TOMPO Andriamanitr’i Israely, Izay naniraka anao hihaona amiko androany. '
  '33':
  - type: text
    content: 'Misaotra anao koa aho noho ny fahendrenao, dia ianao izay niaro ahy tsy handatsa-dra tsy amin’antony sy hanao fitsaran-tenany. '
  '34':
  - type: text
    content: Nefa velona ny TOMPO Andriamanitr’i Israely Izay nisakana ahy tsy hanisy ratsy anao, ka Izy no ianianako aminao fa raha tsy tonga faingana nihaona tamiko ianao, dia ho tsy nasiako niangana na dia lehilahy iray aza tamin’ny fianakavian’i Nabala rahampitso vao maraina.
  '35':
  - type: text
    content: 'Noraisin’i Davida ireo zavatra nentin’i Abigaîla ho azy, ary hoy indray izy taminy:'
  - type: text
    content: –Miverena soa aman-tsara any an-tranonao. Jereo fa efa nihaino ny feonao aho ary nanaiky ny fifonanao.
  - type: heading
    content: Ny nahafatesan’i Nabala. I Davida manambady an’i Abigaîla
  '36':
  - type: text
    content: 'Ary i Abigaîla tonga tany amin’i Nabala izay nanao fety be tao an-tranony toy ireny amin’ny fanasan’ny mpanjaka ireny. Faly aoka izany ny fon’i Nabala, ka dia nanao mamo be izy. Noho izany, dia tsy nisy zavatra azon’i Abigaîla nambara taminy na kely aza mandra-paharainan’ny andro. '
  '37':
  - type: text
    content: 'Ny ampitso maraina, rehefa afaka ny hamamoan’i Nabala, vao notantarain’ny vadiny taminy izay nitranga, ka voadona mafy ny fony, hany ka tsy nahahetsika toy ny vato izy. '
  '38':
  - type: text
    content: Ary tokony ho folo andro taorian’izany, dia nasian’ny TOMPO indray i Nabala ka dia maty.
  '39':
  - type: text
    content: 'Rehefa ren’i Davida fa maty i Nabala, dia hoy izy hoe:'
  - type: text
    content: –Hisaorana anie ny TOMPO Izay nomba ahy tamin’ny fanalam-baràka nataon’i Nabala, sy niaro ahy mpanompony tsy hanao ratsy ary nampitsingerina teo an-dohan’i Nabala ihany ny ratsy nafitsony.
  - type: text
    content: 'Rehefa izany, dia naniraka hankany amin’i Abigaîla i Davida mba haka azy ho vady. '
  '4':
  - type: text
    content: 'Tany an-taniefitra, rehefa ren’i Davida fa nampanety ireo ondriny i Nabala, '
  '40':
  - type: text
    content: 'Dia tonga tany amin’i Abigaîla tao Karmela ny mpanompon’i Davida, ka nilaza taminy hoe:'
  - type: text
    content: –Nirahin’i Davida hankatỳ aminao izahay mba haka anao ho vadiny.
  '41':
  - type: text
    content: 'Dia nitsangana i Abigaîla ka niankohoka tamin’ny tany ary niteny hoe:'
  - type: text
    content: –Ho mpanompon’i Davida aho, ka vonona hanasa ny tongotr’ireo mpanompony toy ny andevo.
  '42':
  - type: text
    content: Nitsangana faingana i Abigaîla, nitaingina ny borikiny, nombàn’ny mpanompony dimy, dia nanaraka ireo irak’i Davida, ary lasa vadiny.
  '43':
  - type: text
    content: Efa nanambady an’i Ahinôhama avy any Jizrehela
  - type: note
    content: 'Jizrehela: tanàna ao amin’ny faritr’i Joda, jereo Jos 15.56.'
  - type: text
    content: ' koa i Davida, ka dia samy vadiny avokoa izy roa. '
  '44':
  - type: text
    content: Fa i Saoly efa nanome ny zanany Mikàla, vadin’i Davida, ho vadin’i Paltỳ zanakalahin’i Laîsy avy any Galîma
  - type: note
    content: 'Galîma: tanàna eo akaikin’i Jerosalema, ao avaratra atsinanana.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'dia naniraka tanora folo lahy izy nohafarany hoe:'
  - type: text
    content: '–Miakara any Karmela, dia mankanesa ao amin’i Nabala mitondra fiarahabana ho azy amin’ny anarako. '
  '6':
  - type: text
    content: 'Izao no holazainareo aminy: «Ho taom-pahombiazana anie ity taona ity ho anao! Fiadanana anie ho aminao sy ho amin’ny fianakavianao ary ho amin’izay anananao rehetra! '
  '7':
  - type: text
    content: 'Ren’i Davida fa fanetezam-bolon’ondry ankehitriny eto aminao. Nandritra ny fotoana rehetra naha tany Karmela ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondrinao izay niaraka taminay, dia tsy nisy ratsy nataonay taminy ary tsy very na inona na inona koa izy ireo. '
  '8':
  - type: text
    content: Anontanio ny mpiandry ondrinao fa afaka hanamarina izany aminao. Koa miangavy i Davida ny hanehoanao fitiavana aminay, satria tonga amin’ny andro fety izahay. Ary mba omeo izay azonao omena ireto mpanomponao sy i Davida zanakao.»
  '9':
  - type: text
    content: 'Rehefa tonga tany Karmela ireo tovolahy nalefan’i Davida, dia naveriny tamin’i Nabala izany teny rehetra izany tamin’ny anaran’i Davida, ary dia niandry izy ireo. '
