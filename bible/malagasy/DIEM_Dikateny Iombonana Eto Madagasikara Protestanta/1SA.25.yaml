document_id: 1SA.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy nety nanampy an’i Davida i Nabala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’izay no maty i Samoela; ary dia nivory ny Israelita rehetra mba hiara-misaona azy. Nalevina tao amin’ny fonenany tao Ramà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ramà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.1 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: taniefitr’i Paràna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': taniefitra ao amin’ny saikanosin’i Sinay.'
    marker-yv: yv-n
  - type: text
    text: ' izy. Rehefa izany, dia lasa nankany an-taniefitr’i Paràna i Davida.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tao amin’ny tanàna Mahôna dia nisy lehilahy iray nikarakara ny fananany tao Karmela. Mpanefoefo izany olona izany, fa nanana ondry telo arivo sy osy arivo. Tonga tao Karmela izy hanatrika ny fanetezana ny ondry aman’osiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Mahôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Karmela:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tanàna roa tokony ho 40 km ao atsimon’i Jerosalema. –Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fanetezana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny ondry, amin’ny lohataona, dia fotoam-pety, jereo and 8 ary ampit 2 Sam 13.23-27.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I Nabala no anaran’izany lehilahy izany, ary i Abigaîla kosa ny vadiny. Ramatoa dia hendry no tsara tarehy, fa rangahy kosa lozabe sady ratsy fanahy. Avy amin’ny taranak’i Kaleba io Nabala io.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tany an-taniefitra, rehefa ren’i Davida fa nampanety ireo ondriny i Nabala, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia naniraka tanora folo lahy izy nohafarany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Miakara any Karmela, dia mankanesa ao amin’i Nabala mitondra fiarahabana ho azy amin’ny anarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no holazainareo aminy: «Ho taom-pahombiazana anie ity taona ity ho anao! Fiadanana anie ho aminao sy ho amin’ny fianakavianao ary ho amin’izay anananao rehetra! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ren’i Davida fa fanetezam-bolon’ondry ankehitriny eto aminao. Nandritra ny fotoana rehetra naha tany Karmela ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ondrinao izay niaraka taminay, dia tsy nisy ratsy nataonay taminy ary tsy very na inona na inona koa izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Anontanio ny mpiandry ondrinao fa afaka hanamarina izany aminao. Koa miangavy i Davida ny hanehoanao fitiavana aminay, satria tonga amin’ny andro fety izahay. Ary mba omeo izay azonao omena ireto mpanomponao sy i Davida zanakao.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa tonga tany Karmela ireo tovolahy nalefan’i Davida, dia naveriny tamin’i Nabala izany teny rehetra izany tamin’ny anaran’i Davida, ary dia niandry izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nefa namaly ireo mpanompon’i Davida i Nabala hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–I Davida zanakalahin’i Jisay hoe? Iza moa izany? Maro ankehitriny ireo mpanompo izay mitsoaka mandositra ny tompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary haka amin’ny mofo sy ny rano ary ny hena izay efa nomaniko ho an’ny mpanety ondriko ve aho, ka hanome izany ho an’olona izay tsy fantatra fiaviana akory!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nitodi-doha niverina ireo mpanompon’i Davida; ka nony tonga izy ireo, dia nitatitra izany rehetra izany tamin’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy i Davida taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fehezo avokoa ny sabatrareo!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia samy namehy ny sabany avy ny tsirairay; ary mba namehy ny azy koa i Davida. Vatan-dehilahy tokony ho efajato no niara-niakatra tamin’i Davida, fa ny roanjato kosa nijanona teo amin’ny entana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Abigaîla nanampy an’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny iray tamin’ny mpanompon’i Nabala nampandre an’i Abigaîla vadiny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro nandefa iraka avy any an-taniefitra i Davida mba hiarahaba ny tompontsika, kanjo dia levilevy no nandraisany azy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ireo olona ireo anefa dia tena tsara tokoa taminay. tsy nisy ratsy nataony taminay ary tsy very na inona na inona izahay nandritra ny fifaneraseranay taminy, fony mbola tany an-tsaha izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izy ireo no toy ny manda fiarovana ho anay andro aman’alina tamin’ny andro rehetra niandrasanay ondry teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa diniho sy eritrereto tsara izay tokony hataonao, fa hianjera amin’ny tompontsika sy ny fianakaviany ny loza. Fa ratsy fanahy tokoa i Nabala iny ka tsy azo ifampiresahana akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nilomay i Abigaîla naka mofo roanjato, divay roa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: siny hoditra
  - type: text
    text: ', ondry dimy efa voamboatra, lango voatono 17 kilao, sampahom-boaloboka maina zato ary mofomamin’aviavy roanjato. Nakariny teo an-damosin’ireo borikiny izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka hoy izy tamin’ny mpanompony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mandehana eo alohako, fa harahiko ianareo. Tsy niteny na inona na inona tamin’i Nabala vadiny anefa i Abigaîla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Raha nitaingina ny borikiny nidina ny toerana takon’ny havoana izy, dia indro nidina nanatona azy i Davida sy ny olony ka nifanehatra taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa i Davida efa niteny anakampo hoe: «Tsy misy vokany ny niarovako ny fananan’ilehiny tany an-taniefitra mba tsy hisy ho very, fa dia novaliany ratsy ny soa nataoko taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hosazîn’Andriamanitra mafy tokoa anie aho raha toa mbola hasiako miangana na dia lehilahy iray aza amin’ny fianakavian’i Nabala, hatramin’ny rahampitso maraina!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha vao nahita an’i Davida i Abigaîla, dia nialany faingana ny borikiny, ka niondrika teo anatrehan’i Davida izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary niantoraka teo an-tongony sady nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka, tompoko, ho ahy dia ho ahy ny fahadisoana! Fa mba avelao aho mpanomponao hiteny kely aminao, koa henoy izay holazaiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Aza miraharaha an’i Nabala ianao, fa olona adala tsy misy antony iny, dia araka ny anarany ihany hoe Nabala-Adala; eny, olona adala lozabe izy. Fa izaho kosa, tompoko, tsy mba nahita ireo tovolahy izay nirahinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Kanefa velona ny TOMPO ary velona koa ny ainao, ka dia Izy TOMPO mihitsy no efa niaro anao tsy handatsa-dra sy tsy haninji-tanana hamalifaty. Enga anie, tompoko, hanjo ny fahavalonao sy izay te hanisy ratsy anao ny nanjo an’i Nabala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny faran’ny and 26 dia efa mialoha sahady ny tantaran’ny famaizana sy fahafatesan’i Nabala.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ankehitriny aoka ireto fanomezana entiko ho anao ireto mba hozaraina amin’ireo tovolahy miaraka aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mifona aminao aho, tompoko, mba avelao re ny fahadisoan’ny mpanomponao, fa hampaharitra tokoa ny fanjakanao sy ny an’ny taranakao ny TOMPO satria ny adin’ny TOMPO no imasoanao, ary tsy hisy ratsy hanimba anao amin’ny andro rehetra iainanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha misy olona milofo hanenjika anao, tompoko, ka mitady hahafaty anao, dia ny TOMPO Andriamanitrao hiaro mandrakariva ny ainao eo anilany, fa ny ain’ny fahavalonao kosa hatorany lavitra, toy ny atoraka amin’ny antsamotady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Rehefa tanteraky ny TOMPO aminao ny soa rehetra nampanantenainy ka voatsangany ho filohan’i Israely ianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: dia aoka tsy harahin’alahelo na nenina ianao satria hoe nahalatsa-dra amin’ny antony ka nanao fitsaran-tenany. Mba tsarovy aho mpanomponao, tompoko, rehefa manisy soa anao ny TOMPO!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia hoy i Davida tamin’i Abigaîla:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hisaorana anie ny TOMPO Andriamanitr’i Israely, Izay naniraka anao hihaona amiko androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Misaotra anao koa aho noho ny fahendrenao, dia ianao izay niaro ahy tsy handatsa-dra tsy amin’antony sy hanao fitsaran-tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Nefa velona ny TOMPO Andriamanitr’i Israely Izay nisakana ahy tsy hanisy ratsy anao, ka Izy no ianianako aminao fa raha tsy tonga faingana nihaona tamiko ianao, dia ho tsy nasiako niangana na dia lehilahy iray aza tamin’ny fianakavian’i Nabala rahampitso vao maraina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Noraisin’i Davida ireo zavatra nentin’i Abigaîla ho azy, ary hoy indray izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miverena soa aman-tsara any an-tranonao. Jereo fa efa nihaino ny feonao aho ary nanaiky ny fifonanao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Nabala. I Davida manambady an’i Abigaîla
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary i Abigaîla tonga tany amin’i Nabala izay nanao fety be tao an-tranony toy ireny amin’ny fanasan’ny mpanjaka ireny. Faly aoka izany ny fon’i Nabala, ka dia nanao mamo be izy. Noho izany, dia tsy nisy zavatra azon’i Abigaîla nambara taminy na kely aza mandra-paharainan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ny ampitso maraina, rehefa afaka ny hamamoan’i Nabala, vao notantarain’ny vadiny taminy izay nitranga, ka voadona mafy ny fony, hany ka tsy nahahetsika toy ny vato izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary tokony ho folo andro taorian’izany, dia nasian’ny TOMPO indray i Nabala ka dia maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Rehefa ren’i Davida fa maty i Nabala, dia hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hisaorana anie ny TOMPO Izay nomba ahy tamin’ny fanalam-baràka nataon’i Nabala, sy niaro ahy mpanompony tsy hanao ratsy ary nampitsingerina teo an-dohan’i Nabala ihany ny ratsy nafitsony.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Rehefa izany, dia naniraka hankany amin’i Abigaîla i Davida mba haka azy ho vady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia tonga tany amin’i Abigaîla tao Karmela ny mpanompon’i Davida, ka nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nirahin’i Davida hankatỳ aminao izahay mba haka anao ho vadiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia nitsangana i Abigaîla ka niankohoka tamin’ny tany ary niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho mpanompon’i Davida aho, ka vonona hanasa ny tongotr’ireo mpanompony toy ny andevo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Nitsangana faingana i Abigaîla, nitaingina ny borikiny, nombàn’ny mpanompony dimy, dia nanaraka ireo irak’i Davida, ary lasa vadiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Efa nanambady an’i Ahinôhama avy any Jizrehela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.43 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jizrehela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna ao amin’ny faritr’i Joda, jereo Jos 15.56.
    marker-yv: yv-n
  - type: text
    text: ' koa i Davida, ka dia samy vadiny avokoa izy roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Fa i Saoly efa nanome ny zanany Mikàla, vadin’i Davida, ho vadin’i Paltỳ zanakalahin’i Laîsy avy any Galîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.44 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Galîma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eo akaikin’i Jerosalema, ao avaratra atsinanana.
    marker-yv: yv-n
  - type: text
    text: .
