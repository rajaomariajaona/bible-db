document_id: JOL.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Tompo mitsara ny hafa firenena
  - type: text
    content: Amin’izany andro izany indrindra, hoy ny TOMPO,
  - type: text
    content: dia haveriko amin’ny toetrany taloha
  - type: text
    content: i Joda sy i Jerosalema
  - type: note
    content: 'haveriko amin’ny toetrany taloha: dkt hafa hampodiko ny babo tao Joda sy Jerosalema.'
  - type: text
    content: .
  '10':
  - type: text
    content: Tefeo ho sabatra ny lelan’angadinombinareo
  - type: text
    content: ary ho lefona ny antsim-barinareo;
  - type: text
    content: aoka na dia ny osa aza
  - type: text
    content: 'mba hihiaka hoe: ‹Mahery aho›.'
  '11':
  - type: text
    content: Tongava faingana ianareo rehetra
  - type: text
    content: any amin’ny firenena manodidina any
  - type: text
    content: ka mivoria ao amin’io lohasaha io.»
  - type: text
    content: Ampidino ao, TOMPO ô,
  - type: text
    content: ireo maherinao mba hamely azy.
  '12':
  - type: text
    content: «Aoka hiara-manainga ireo hafa firenena
  - type: text
    content: ka hiakatra ao amin’ny lohasaha
  - type: text
    content: atao hoe ‹ny TOMPO no mitsara›
  - type: note
    content: Jereo 4.2 sy nta.
  - type: text
    content: .»
  - type: text
    content: Eo Izaho TOMPO no hipetraka hitsara
  - type: text
    content: ny hafa firenena rehetra manodidina.
  '13':
  - type: text
    content: Arosoy ny antsim-bary hijinjana azy
  - type: text
    content: toy ny fijinja ny vokatra masaka
  - type: text
    content: Avia ianareo hanosihosy azy
  - type: text
    content: toy ny fanosy ny voaloboka
  - type: text
    content: izay mameno ny famiazana.
  - type: text
    content: Mihoatra ny vata fanantazana azy ny divay;
  - type: text
    content: eny, be tokoa ny faharatsian’ireo olona ireo.»
  '14':
  - type: text
    content: Vahoaka tsy hita isa no tonga
  - type: text
    content: ao amin’ny lohasaha Fitsarana
  - type: note
    content: 'ny lohasaha Fitsarana: mety ilay lohasaha voalazan’ny and 2 sy 12 ihany, saingy anarana somary samy hafa kely.'
  - type: text
    content: fa efa antomotra ny androm-pahatezeran’ny TOMPO.
  '15':
  - type: text
    content: Mihamaizina ny masoandro sy ny volana
  - type: text
    content: ary tsy mamiratra intsony ny kintana.
  '16':
  - type: text
    content: 'Avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ny TOMPO no manerona,'
  - type: text
    content: ary avy ao Jerosalema Izy no manandra-peo.
  - type: text
    content: Mihorohoro ny tany aman-danitra!
  - type: text
    content: Fa ny TOMPO no fialofan’ny vahoakany
  - type: text
    content: sy fiarovana ho an’ny Israelita.
  '17':
  - type: text
    content: Ary hiaiky ianareo
  - type: text
    content: fa Izaho no TOMPO Andriamanitrareo,
  - type: text
    content: Ilay monina ao Tsiôna
  - type: text
    content: tendrombohitro masina
  - type: note
    content: Momba ny tendrombohitr’Andriamanitra dia jereo Ezek 20.40 sy nta.
  - type: text
    content: .
  - type: text
    content: Dia ho tanàna masina i Jerosalema,
  - type: text
    content: ka tsy hidiran’ny hafa firenena intsony.
  - type: heading
    content: Hitahy ny vahoakany Andriamanitra
  '18':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: dia hamokatra divay vao ny tendrombohitra,
  - type: text
    content: handriaka ronono ny biby fiompy eny an-kavoana.
  - type: text
    content: Hikoriana rano avokoa
  - type: text
    content: ny sakeli-dranon’i Joda.
  - type: text
    content: Ary hisy loharano hifantsitsitra
  - type: text
    content: avy ao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ka hanondraka ny lohasahan’i Sitîma
  - type: note
    content: 'ny lohasahan’i Sitîma: dia mety ho akaikin’ny Ranomasina Maty.'
  - type: text
    content: .
  '19':
  - type: text
    content: Ho tonga tany lao i Ejipta
  - type: text
    content: ary ho taniefitra foana i Edôma
  - type: text
    content: noho ny herisetra nataony
  - type: text
    content: tamin’ny taranak’i Joda,
  - type: text
    content: dia ny nandatsahany
  - type: text
    content: ran’ny tsy manan-tsiny
  - type: text
    content: teo amin’izany tany izany.
  '2':
  - type: text
    content: Hangoniko ny hafa firenena rehetra
  - type: text
    content: ka hampidiniko avokoa
  - type: text
    content: ho eo amin’ny lohasaha
  - type: text
    content: atao hoe «Ny TOMPO no mitsara».
  - type: text
    content: Eo no hitsarako azy
  - type: text
    content: noho izay rehetra nataony
  - type: text
    content: tamin’i Israely vahoakako sy fananako,
  - type: text
    content: ka nampielezany azy
  - type: text
    content: tany amin’ny firenen-kafa
  - type: text
    content: sy nizarazarany ny taniko.
  '20':
  - type: text
    content: Eny, hambarako ho tsy manan-keloka izy
  - type: note
    content: 'Hambarako ho tsy manan-keloka izy: dkt hafa araka ny grika sy siriaka tranainy. Hovaliako ny fahafatesany, ka tsy havelako ho afa-maina.'
  - type: text
    content: .
  - type: text
    content: Fa i Joda sy i Jerosalema
  - type: text
    content: dia honenana mandrakizay
  - type: text
    content: ary Izaho TOMPO kosa
  - type: text
    content: 'dia honina ao '
  - type: text
    content: Tsiôna
  - type: text
    content: .
  '3':
  - type: text
    content: Nanaovany an-tsapaka ny vahoakako;
  - type: text
    content: ka zazalahy no namidiny
  - type: text
    content: ho takalona mpivarotena,
  - type: text
    content: ary zazavavy no namidiny
  - type: text
    content: hahazoana divay hosotroina.
  '4':
  - type: text
    content: Ianareo kosa, ry i Tiro sy i Tsidôna,
  - type: text
    content: mbaminareo rehetra faritr’i Filistia
  - type: note
    content: 'I Tiro sy i Tsidôna: jereo nta amin’ny Is 23.1. faritr’i Filistia: jereo nta amin’ny Is 14.29.'
  - type: text
    content: ','
  - type: text
    content: inona no tadiavinareo hatao amiko?
  - type: text
    content: Moa hamaly faty Ahy va ianareo?
  - type: text
    content: Raha izany no tadiavinareo hatao amiko,
  - type: text
    content: dia hatsingeriko haingana eo an-dohanareo.
  '5':
  - type: text
    content: Nalainareo ny volafotsiko
  - type: text
    content: sy ny volamenako ary ny raki-tsarobidiko
  - type: text
    content: ka nentinareo any amin’ny tempolinareo.
  '6':
  - type: text
    content: Ary ny mponin’i Joda sy i Jerosalema kosa
  - type: text
    content: dia namidinareo tamin’ny Grika
  - type: text
    content: mba hampanalavirina ny taniny.
  '7':
  - type: text
    content: Fa hampodîko avy amin’ny tany
  - type: text
    content: izay nivarotanareo azy izy
  - type: text
    content: ka hatsingeriko ho eo an-dohanareo
  - type: text
    content: ny ratsy izay nataonareo.
  '8':
  - type: text
    content: Koa hamidiko amin’ny mponin’i Joda
  - type: text
    content: ny zanakalahy sy ny zanakavavinareo.
  - type: text
    content: Ireo indray hivarotra azy amin’ny Sabeanina
  - type: note
    content: 'ny Sabeanina: firenena any Arabia atsimo (Jereo Is 60.6).'
  - type: text
    content: izay firenena any lavitra.
  - type: text
    content: Izaho TOMPO no miteny izany.
  - type: heading
    content: Ady farany sy fitsarana
  '9':
  - type: text
    content: 'Antsoantsoy any amin’ny hafa firenena izao:'
  - type: text
    content: «Miomàna hiady, vonòny ny miaramilanareo;
  - type: text
    content: aoka ny mpiady rehetra hiara-manainga.
