  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro kosa Andriamanitra manampy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny Tompo no hany mpanohana ahy;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy anie hamaly ny ratsy ataon’ny mpitsikilo ahy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aringano ireo satria mahatoky tokoa Ianao.
