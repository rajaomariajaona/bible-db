document_id: PSA.54,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Antson’ny enjehim-pahavalo
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hampiarahina amin’ny valiha. Tononkalo fananarana nataon’i Davida,
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'fony tonga ny Zifita ka nanao tamin’i Saoly hoe: Miery any aminay i Davida'
  - type: note
    content: Jereo 1 Sam 23.19-28; 26.1.
  - type: text
    content: .
  '3':
  - type: text
    content: Andriamanitra ô, vonjeo aho noho ny voninahitrao;
  - type: text
    content: ary omeo rariny aho satria mahery Ianao!
  '4':
  - type: text
    content: Andriamanitra ô, henoy ny fivavako;
  - type: text
    content: mba mampandria sofina amin’ny teniko.
  '5':
  - type: text
    content: Fa olona hafa firenena no mitsangan-kamely ahy,
  - type: text
    content: olon-dozabe no mitady hahafaty ahy
  - type: text
    content: tsy miraharaha Anao akory ireo.
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: Indro kosa Andriamanitra manampy ahy,
  - type: text
    content: ny Tompo no hany mpanohana ahy;
  '7':
  - type: text
    content: Izy anie hamaly ny ratsy ataon’ny mpitsikilo ahy!
  - type: text
    content: Aringano ireo satria mahatoky tokoa Ianao.
  '8':
  - type: text
    content: 'An-tsitrapo no anaterako '
  - type: text
    content: sorona
  - type: text
    content: ' ho Anao;'
  - type: text
    content: TOMPO ô, hidera Anao aho fa tsara Ianao;
  - type: text
    content: nafahanao tamin’ny fahoriako rehetra aho
  - type: text
    content: ka hitako maso ny fahavaloko resy.
