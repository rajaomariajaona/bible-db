document_id: JER.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tanàna efa lò tanteraka
  - type: heading
    content: (Ny Tompo)
  - type: text
    content: Mandehana mivezivezy
  - type: text
    content: eny an-dalamben’i Jerosalema ianareo;
  - type: text
    content: dia jereo tsara sy hadihadio,
  - type: text
    content: tadiavo eny amin’ny toera-malalaka
  - type: text
    content: raha mahita olona anankiray
  - type: text
    content: manao ny mahitsy sy ny rariny ianareo;
  - type: text
    content: fa raha mahita anankiray monja ianareo
  - type: text
    content: dia havelako ny helok’i Jerosalema.
  - type: heading
    content: (Jeremià)
  '10':
  - type: text
    content: Iakaro ka simbasimbao
  - type: text
    content: ny tanimboalobony manao ambaratonga;
  - type: text
    content: nefa aza potehina tanteraka!
  - type: text
    content: Esory ny rantsam-boaloboka
  - type: text
    content: satria tsy an’ny Tompo ireny
  - type: note
    content: Mikasika ny voaloboka atao sarin’ny vahoakan’Andriamanitra, jereo Is 5.1-7.
  - type: text
    content: .
  '11':
  - type: text
    content: Fa efa nivadika tamiko mihitsy
  - type: text
    content: na ny fanjakan’i Joda na ny fanjakan’i Israely,
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  - type: heading
    content: Ny vokatry ny nandaozana ny Tompo
  '12':
  - type: text
    content: Nandà ny Tompo ny vahoakan’i Joda,
  - type: text
    content: 'ka nilaza hoe: «Tsy misy ny TOMPO;'
  - type: text
    content: tsy hahatratra antsika ny loza
  - type: text
    content: sady tsy hahita ady na mosary isika.»
  '13':
  - type: text
    content: 'Tsinontsinona ihany ireo '
  - type: text
    content: mpaminaniny
  - type: text
    content: ','
  - type: text
    content: fa tsy ao aminy ny tenin’ny Tompo.
  - type: text
    content: Aoka hotodîn’izay lazainy izy!
  '14':
  - type: text
    content: Koa izao no lazain’ny TOMPO
  - type: text
    content: 'Andriamanitr’izao rehetra izao:'
  - type: text
    content: «Noho izany tenin’ireo vahoaka ireo izany,
  - type: text
    content: dia hataoko ho toy ny afo ny teniko
  - type: text
    content: izay ampitondraiko anao, ry Jeremià;
  - type: text
    content: ity firenena ity kosa dia ho toy ny kitay
  - type: text
    content: ka holevonin’izany afo izany.
  '15':
  - type: text
    content: Ny aminareo indray, ry vahoakan’i Israely,
  - type: text
    content: hoy ny teny hentitry ny TOMPO,
  - type: text
    content: dia indro Aho hahatonga
  - type: text
    content: firenena avy lavitra hamely anareo,
  - type: text
    content: dia firenena tsy mety resy
  - type: text
    content: sady anisan’ireo tranainy indrindra,
  - type: text
    content: firenena tsy fantatrareo ny fiteniny
  - type: text
    content: sady tsy azonareo izay lazainy.
  '16':
  - type: text
    content: Toy ny fasana misokatra ny tranon-jana-tsipîkany;
  - type: text
    content: ary mpiady mahery ny miaramilany rehetra.
  '17':
  - type: text
    content: Tapitra haripak’io firenena io avokoa
  - type: text
    content: ny vokatrareo sy ny mofonareo,
  - type: text
    content: ny zanakareo lahy sy ny zanakareo vavy,
  - type: text
    content: ny omby sy ondry aman’osinareo,
  - type: text
    content: ary ny voalobokareo sy ny aviavinareo.
  - type: text
    content: Horavany amin’ny ady ny tanànamimanda
  - type: text
    content: izay noheverinareo hitokiana.
  '18':
  - type: text
    content: 'Nefa na amin’izany andro izany aza, hoy ny teny hentitry ny TOMPO, dia tsy hataoko ringana avokoa ianareo. '
  '19':
  - type: text
    content: 'Koa raha misy manontany hoe: «Nahoana no namely anay tamin’izao loza rehetra izao ny TOMPO Andriamanitray?», dia izao no havalinao, ry Jeremià: «Toy ny nandaozanareo ny TOMPO ka nanompoanareo ny andriamani-kafa tao amin’ny taninareo no hanompoanareo ny firenen-kafa any amin’ny tany izay tsy anareo!»'
  - type: heading
    content: Vahoaka tsy mahalala ny fahefàn’Andriamanitra
  '2':
  - type: text
    content: 'Rehefa manao fianianana ny mponina, dia manao hoe:'
  - type: text
    content: «Velona ny TOMPO, ka mianiana aho...»;
  - type: text
    content: nefa tsy marina akory ny fianianany.
  '20':
  - type: text
    content: Ampitao amin’ny taranak’i Jakôba
  - type: text
    content: izao hafatra izao
  - type: text
    content: ka, ampandreneso ny vahoakan’i Joda,
  - type: text
    content: 'hoy ny teny hentitry ny TOMPO:'
  '21':
  - type: text
    content: Henoy àry izao, ry vahoaka
  - type: text
    content: dondrona sy tsy misaina,
  - type: text
    content: mana-maso fa tsy mahita,
  - type: text
    content: manan-tsofina fa tsy mandre
  - type: note
    content: Ampit Is 6.9-10; Ezek 12.2; Mk 8.18.
  - type: text
    content: .
  '22':
  - type: text
    content: Tsy mba atahoranareo akory ve Izaho TOMPO?
  - type: text
    content: Tsy mba mangovitra eo anatrehako ve ianareo?
  - type: text
    content: Izaho anefa no nametraka ny fasika
  - type: text
    content: ho fefin’ny ranomasina,
  - type: text
    content: 'dia fetra mandrakizay tsy hihoarany:'
  - type: text
    content: na dia misamboaravoara mafy aza izy
  - type: text
    content: dia tsy mahavaky izany fefy izany;
  - type: text
    content: na dia mirohondrohona be aza ny onjany,
  - type: text
    content: dia tsy afaka mihoatra
  - type: note
    content: Ampit Jôb 38.8-11.
  - type: text
    content: ' azy.'
  '23':
  - type: text
    content: Ianareo kosa vahoaka mafy fo sy mpiodina,
  - type: text
    content: misintaka lavitra ianareo dia lasa,
  '24':
  - type: text
    content: 'fa tsy mba miteny anakampo hoe:'
  - type: text
    content: «Aoka hananantsika fanajana
  - type: text
    content: ny TOMPO Andriamanitsika,
  - type: text
    content: fa Izy no nanome antsika
  - type: text
    content: ny orana amin’ny fotoany,
  - type: text
    content: dia ny oram-pararano sy ny oran-dohataona
  - type: text
    content: ka mitahiry ho antsika ireo herinandro
  - type: text
    content: izay voatendry ho fotoam-pijinjana.»
  '25':
  - type: text
    content: Ny helokareo no nanakorontana izany firindrana izany,
  - type: text
    content: ny fahadisoanareo no nisakana ny soa ho anareo.
  '26':
  - type: text
    content: Ahitana olon-dratsy manko ao amin’ny vahoakako,
  - type: text
    content: miandry kendrin-tohina toy ny mpamandri-borona izy.
  - type: text
    content: Namela-pandrika tokoa ny olon-dratsy,
  - type: text
    content: mba hisamboran’olona.
  '27':
  - type: text
    content: Tahaka ny tranom-borona feno vorona
  - type: text
    content: dia feno zavatra nangalarina ny tranony.
  - type: text
    content: Izany no nahatonga azy
  - type: text
    content: ho lehibe sy manan-karena,
  '28':
  - type: text
    content: ho matavy sy mandimandina.
  - type: text
    content: 'Mihoa-pampana ny ratsy ataony:'
  - type: text
    content: Manohana ny ratsy fanahy izy amin’ny fitsarana
  - type: text
    content: fa tsy manome rariny ny kamboty;
  - type: text
    content: tsy raharahany akory izay zon’ny mahantra.
  '29':
  - type: text
    content: Koa tsy hirotsaka an-tsehatra
  - type: text
    content: hamely ireny olona ireny ve Aho,
  - type: text
    content: ka hamaly faty ny firenena toy izany,
  - type: text
    content: hoy ny teny hentitry ny TOMPO?
  '3':
  - type: text
    content: TOMPO ô, moa tsy ny toe-panahy mahatoky ve
  - type: text
    content: no zavatra andrandrainao?
  - type: text
    content: Nokapohinao ny mponin’i Jerosalema,
  - type: text
    content: nefa tsy nahoany akory izany.
  - type: text
    content: Saika hofarananao ny aminy,
  - type: text
    content: nefa tsy nino anatra izy.
  - type: text
    content: Fa mafy loha toy ny vato izy,
  - type: text
    content: ka tsy nety niverina taminao.
  '30':
  - type: text
    content: Misy zava-doza sy mahatsiravina
  - type: text
    content: 'miseho ao amin’ny tany:'
  '31':
  - type: text
    content: 'maminany lainga ny '
  - type: text
    content: mpaminany
  - type: text
    content: ','
  - type: text
    content: mitady ny tombontsoany ny mpisorona
  - type: note
    content: 'mitady ny tombontsoany ny mpisorona: dkt hafa manapaka araka ny fanohanan’ireny.'
  - type: text
    content: ','
  - type: text
    content: ary ny vahoakako mankasitraka izany.
  - type: text
    content: Koa rehefa tonga ny farany,
  - type: text
    content: inona kosa no hataonareo?
  '4':
  - type: text
    content: 'Dia hoy aho anakampo hoe:'
  - type: text
    content: «Momba ireo olona mahantra ihany izany;
  - type: text
    content: tsy misaina loatra izy ireny
  - type: text
    content: ka tsy mahalala ny sori-dalan’ny TOMPO
  - type: text
    content: na izay fitsipik’ilay Andriamaniny.
  '5':
  - type: text
    content: Fa handeha hiteny amin’ireo olo-maventy aho;
  - type: text
    content: ireny izao no mahalala ny sori-dalan’ny TOMPO,
  - type: text
    content: dia izay fitsipik’ilay Andriamaniny.»
  - type: text
    content: 'Kinanjo mitovy ihany izy rehetra:'
  - type: text
    content: samy efa nanapaka zioga
  - type: text
    content: sy nanito ny fatorany amin’Andriamanitra.
  '6':
  - type: text
    content: Noho izany dia hivoaka hamely azy
  - type: text
    content: avy ao amin’ny kirihitr’ala ny liona;
  - type: text
    content: ary handrotidrotika azy
  - type: text
    content: eny an-tsaha ny amboadia.
  - type: text
    content: Ny leôparda hamitsaka eo akaikin’ny tanànany
  - type: text
    content: ka hamiravira izay rehetra mivoaka avy ao,
  - type: text
    content: satria nohamaroiny ny fahadisoany
  - type: text
    content: ary tsy hita isa ny fiodinany.
  - type: heading
    content: (Ny Tompo)
  '7':
  - type: text
    content: Ry Jerosalema ô,
  - type: text
    content: ahoana moa no hamelako ny helokao?
  - type: text
    content: Ny zanakao efa nandao Ahy
  - type: text
    content: ka nianiana tamin’ny andriamani-tsiizy.
  - type: text
    content: Novokisako tamin’izay nilainy izy
  - type: text
    content: nefa nanitsakitsa-bady ihany,
  - type: text
    content: ka nirohotra ho amin’ny fijangajangana.
  '8':
  - type: text
    content: Toa soavaly mpikarenjy tsara fahana izy,
  - type: text
    content: ka samy nandeha mitrentrena
  - type: text
    content: tamin’ny vadin’ny namany avy.
  '9':
  - type: text
    content: Koa tsy hirotsaka an-tsehatra
  - type: text
    content: hamely ireny olona ireny ve Aho,
  - type: text
    content: ka hamaly faty ny firenena toy izany,
  - type: text
    content: hoy ny teny hentitry ny TOMPO?
