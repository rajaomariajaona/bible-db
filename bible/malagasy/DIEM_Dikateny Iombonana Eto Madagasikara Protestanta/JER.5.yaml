document_id: JER.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tanàna efa lò tanteraka
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ny Tompo)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandehana mivezivezy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny an-dalamben’i Jerosalema ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia jereo tsara sy hadihadio,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tadiavo eny amin’ny toera-malalaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mahita olona anankiray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao ny mahitsy sy ny rariny ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha mahita anankiray monja ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia havelako ny helok’i Jerosalema.
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Jeremià)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iakaro ka simbasimbao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanimboalobony manao ambaratonga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa aza potehina tanteraka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Esory ny rantsam-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy an’ny Tompo ireny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mikasika ny voaloboka atao sarin’ny vahoakan’Andriamanitra, jereo Is 5.1-7.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nivadika tamiko mihitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny fanjakan’i Joda na ny fanjakan’i Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitry ny TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vokatry ny nandaozana ny Tompo
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nandà ny Tompo ny vahoakan’i Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka nilaza hoe: «Tsy misy ny TOMPO;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hahatratra antsika ny loza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy hahita ady na mosary isika.»
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tsinontsinona ihany ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminaniny
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ao aminy ny tenin’ny Tompo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hotodîn’izay lazainy izy!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izao no lazain’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Andriamanitr’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Noho izany tenin’ireo vahoaka ireo izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hataoko ho toy ny afo ny teniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay ampitondraiko anao, ry Jeremià;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ity firenena ity kosa dia ho toy ny kitay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka holevonin’izany afo izany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny aminareo indray, ry vahoakan’i Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitry ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia indro Aho hahatonga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: firenena avy lavitra hamely anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia firenena tsy mety resy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady anisan’ireo tranainy indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: firenena tsy fantatrareo ny fiteniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy azonareo izay lazainy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny fasana misokatra ny tranon-jana-tsipîkany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mpiady mahery ny miaramilany rehetra.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tapitra haripak’io firenena io avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vokatrareo sy ny mofonareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanakareo lahy sy ny zanakareo vavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny omby sy ondry aman’osinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny voalobokareo sy ny aviavinareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Horavany amin’ny ady ny tanànamimanda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay noheverinareo hitokiana.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa na amin’izany andro izany aza, hoy ny teny hentitry ny TOMPO, dia tsy hataoko ringana avokoa ianareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha misy manontany hoe: «Nahoana no namely anay tamin’izao loza rehetra izao ny TOMPO Andriamanitray?», dia izao no havalinao, ry Jeremià: «Toy ny nandaozanareo ny TOMPO ka nanompoanareo ny andriamani-kafa tao amin’ny taninareo no hanompoanareo ny firenen-kafa any amin’ny tany izay tsy anareo!»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vahoaka tsy mahalala ny fahefàn’Andriamanitra
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rehefa manao fianianana ny mponina, dia manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Velona ny TOMPO, ka mianiana aho...»;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy marina akory ny fianianany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampitao amin’ny taranak’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izao hafatra izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka, ampandreneso ny vahoakan’i Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hoy ny teny hentitry ny TOMPO:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy àry izao, ry vahoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dondrona sy tsy misaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mana-maso fa tsy mahita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manan-tsofina fa tsy mandre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 6.9-10; Ezek 12.2; Mk 8.18.
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba atahoranareo akory ve Izaho TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba mangovitra eo anatrehako ve ianareo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho anefa no nametraka ny fasika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fefin’ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia fetra mandrakizay tsy hihoarany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia misamboaravoara mafy aza izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mahavaky izany fefy izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia mirohondrohona be aza ny onjany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy afaka mihoatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôb 38.8-11.
      marker-yv: yv-n
    - type: text
      text: ' azy.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo kosa vahoaka mafy fo sy mpiodina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misintaka lavitra ianareo dia lasa,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa tsy mba miteny anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aoka hananantsika fanajana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny TOMPO Andriamanitsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izy no nanome antsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny orana amin’ny fotoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny oram-pararano sy ny oran-dohataona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitahiry ho antsika ireo herinandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay voatendry ho fotoam-pijinjana.»
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny helokareo no nanakorontana izany firindrana izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahadisoanareo no nisakana ny soa ho anareo.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahitana olon-dratsy manko ao amin’ny vahoakako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miandry kendrin-tohina toy ny mpamandri-borona izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namela-pandrika tokoa ny olon-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hisamboran’olona.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny tranom-borona feno vorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia feno zavatra nangalarina ny tranony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no nahatonga azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho lehibe sy manan-karena,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho matavy sy mandimandina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mihoa-pampana ny ratsy ataony:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manohana ny ratsy fanahy izy amin’ny fitsarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy manome rariny ny kamboty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy raharahany akory izay zon’ny mahantra.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tsy hirotsaka an-tsehatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamely ireny olona ireny ve Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamaly faty ny firenena toy izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitry ny TOMPO?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, moa tsy ny toe-panahy mahatoky ve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no zavatra andrandrainao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nokapohinao ny mponin’i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy nahoany akory izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saika hofarananao ny aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy nino anatra izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mafy loha toy ny vato izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nety niverina taminao.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy zava-doza sy mahatsiravina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'miseho ao amin’ny tany:'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'maminany lainga ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitady ny tombontsoany ny mpisorona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mitady ny tombontsoany ny mpisorona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dkt hafa manapaka araka ny fanohanan’ireny.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vahoakako mankasitraka izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa rehefa tonga ny farany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: inona kosa no hataonareo?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hoy aho anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Momba ireo olona mahantra ihany izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misaina loatra izy ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahalala ny sori-dalan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na izay fitsipik’ilay Andriamaniny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa handeha hiteny amin’ireo olo-maventy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireny izao no mahalala ny sori-dalan’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay fitsipik’ilay Andriamaniny.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Kinanjo mitovy ihany izy rehetra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy efa nanapaka zioga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanito ny fatorany amin’Andriamanitra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia hivoaka hamely azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy ao amin’ny kirihitr’ala ny liona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handrotidrotika azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny an-tsaha ny amboadia.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny leôparda hamitsaka eo akaikin’ny tanànany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamiravira izay rehetra mivoaka avy ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nohamaroiny ny fahadisoany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hita isa ny fiodinany.
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ny Tompo)
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Jerosalema ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ahoana moa no hamelako ny helokao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanakao efa nandao Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nianiana tamin’ny andriamani-tsiizy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Novokisako tamin’izay nilainy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa nanitsakitsa-bady ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nirohotra ho amin’ny fijangajangana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toa soavaly mpikarenjy tsara fahana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka samy nandeha mitrentrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny vadin’ny namany avy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tsy hirotsaka an-tsehatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamely ireny olona ireny ve Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamaly faty ny firenena toy izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitry ny TOMPO?
