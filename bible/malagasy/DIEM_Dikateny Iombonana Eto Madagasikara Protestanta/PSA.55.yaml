document_id: PSA.55,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaky ny olona voafitaky ny sakaizany
  - type: text
    content: ' '
  - type: text
    content: 'Tao amin’ny tahirin-kiran’ny '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hampiarahina amin’ny valiha. Tononkalo fananarana nataon’i Davida.
  '10':
  - type: text
    content: Akorontano, Tompo ô, ny fikasan’ireo mpanohitra ahy;
  - type: text
    content: asaritaho ny teny ifanaovany
  - type: note
    content: Ampit Gen 11.11-9.
  - type: text
    content: .
  - type: text
    content: Ady sy an-keriny no hitako ao an-tanàna
  '11':
  - type: text
    content: sy manodidina ny màndany andro aman’alina;
  - type: text
    content: heloka sy fampahoriana no ao anivon-tanàna
  '12':
  - type: text
    content: tsy ialam-pitaka sy kolikoly ny lalambeny.
  '13':
  - type: text
    content: Raha fahavalo no mamingavinga ahy,
  - type: text
    content: ho niaretako ihany;
  - type: text
    content: raha mpankahala no mirehareha hamely ahy,
  - type: text
    content: ho niafenako fotsiny.
  '14':
  - type: text
    content: Saingy ianao iray tarika amiko,
  - type: text
    content: tapaka, namana sy sakaiza!
  '15':
  - type: text
    content: Izany isika nifanao teny mamy sy niara-dia,
  - type: text
    content: fony nankao an-
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: '!'
  '16':
  - type: text
    content: Aoka ireo mpanohitra ahy ho faty tampoka;
  - type: text
    content: aoka hidina velona any an-toeran’ny maty izy,
  - type: text
    content: fa toe-dratsy no ao amin’ny fonenany,
  - type: text
    content: hevi-dratsy no ao anatin’ny fony!
  '17':
  - type: text
    content: Izaho kosa miantso an’Andriamanitra
  - type: text
    content: ka Izy TOMPO mihitsy no hamonjy ahy.
  '18':
  - type: text
    content: Na hariva na maraina na antoandro
  - type: text
    content: no anaovako sento sy toloko,
  - type: text
    content: dia ho henony hatrany aho.
  '19':
  - type: text
    content: Hohatoniny akaiky aho ka hafahany;
  - type: text
    content: eny, hotsoahiny soa aman-tsara aho
  - type: text
    content: amin’ny ady am-parimbona atao ahy.
  '2':
  - type: text
    content: Andriamanitra ô, mba henoy ny fivavako,
  - type: text
    content: ary aza idifiana ny tarainako.
  '20':
  - type: text
    content: Hihaino anie Andriamanitra ka hampietry an’ireo,
  - type: text
    content: satria Izy no Mpanjaka hatrizay hatrizay!
  - type: text
    content: Fiatoana
  - type: text
    content: Tsy mety miova toetra ireo olon-dratsy ireo
  - type: text
    content: sady tsy matahotra an’Andriamanitra.
  '21':
  - type: text
    content: Ny olona nihavanany, aninjirany tanana;
  - type: text
    content: ny fifanekena nataony, ivadihany.
  '22':
  - type: text
    content: Malemy noho ny hero-dronono ny firesany,
  - type: text
    content: kanjo ady no mameno ny fony;
  - type: text
    content: malefaka noho ny diloilo ny teniny,
  - type: text
    content: kanjo toy ny sabatra vonon-kamely.
  '23':
  - type: text
    content: Apetraho amin’ny TOMPO ny fiahianao,
  - type: text
    content: fa Izy no hanohana anao;
  - type: text
    content: na oviana na oviana ny olo-marina
  - type: text
    content: tsy havelany hangozohozo.
  '24':
  - type: text
    content: Ianao, Andriamanitra ô, hampidina ao am-pasana
  - type: text
    content: ny olona mpandatsa-dra sy mpamitaka,
  - type: text
    content: na tsy mbola misasaka aza ny androm-piainany.
  - type: text
    content: Fa izaho kosa dia hatoky Anao hatrany.
  '3':
  - type: text
    content: Aoka aho ho tandrinao sy hovalianao
  - type: text
    content: fa mivezi-poana amin-tsento sy toloko,
  '4':
  - type: text
    content: noho ny fahavaloko mihiaka
  - type: text
    content: sy ny olon-dratsy mampahory ahy;
  - type: text
    content: eny, hasomparana no atorany amiko,
  - type: text
    content: sady tezerany sy ankahalainy aho.
  '5':
  - type: text
    content: Mangorohoro ato anatiko ny foko;
  - type: text
    content: fanahiana ny ho faty no mamely ahy.
  '6':
  - type: text
    content: Voan’ny tahotra sy tebiteby aho
  - type: text
    content: ary koa heniky ny horohoro.
  '7':
  - type: text
    content: 'Hoy aho hoe: «Raha izay, hono aho,'
  - type: text
    content: no mba ary elatra toa voromahailala
  - type: text
    content: hisidinako hitady izay hitoerako,
  '8':
  - type: text
    content: dia handositra lavitra aho
  - type: text
    content: ka honina any an-taniefitra!
  - type: text
    content: Fiatoana
  '9':
  - type: text
    content: Ho dodona hamonjy fialofana aho,
  - type: text
    content: tsy ho tratry ny tafiotra sy ny oram-baratra.»
