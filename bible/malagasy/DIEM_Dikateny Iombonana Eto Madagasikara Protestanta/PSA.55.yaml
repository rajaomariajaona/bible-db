document_id: PSA.55
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Vavaky ny olona voafitaky ny sakaizany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Tao amin’ny tahirin-kiran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: filohan’antoko-mpihira
  - type: text
    text: '. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hampiarahina amin’ny valiha. Tononkalo fananarana nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Andriamanitra ô, mba henoy ny fivavako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza idifiana ny tarainako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aoka aho ho tandrinao sy hovalianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mivezi-poana amin-tsento sy toloko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: noho ny fahavaloko mihiaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny olon-dratsy mampahory ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hasomparana no atorany amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tezerany sy ankahalainy aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mangorohoro ato anatiko ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanahiana ny ho faty no mamely ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Voan’ny tahotra sy tebiteby aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa heniky ny horohoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy aho hoe: «Raha izay, hono aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mba ary elatra toa voromahailala
- type: usfm
  marker: q1
  children:
  - type: text
    text: hisidinako hitady izay hitoerako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia handositra lavitra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka honina any an-taniefitra!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho dodona hamonjy fialofana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho tratry ny tafiotra sy ny oram-baratra.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Akorontano, Tompo ô, ny fikasan’ireo mpanohitra ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: asaritaho ny teny ifanaovany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 11.11-9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ady sy an-keriny no hitako ao an-tanàna
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: sy manodidina ny màndany andro aman’alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: heloka sy fampahoriana no ao anivon-tanàna
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: tsy ialam-pitaka sy kolikoly ny lalambeny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha fahavalo no mamingavinga ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho niaretako ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mpankahala no mirehareha hamely ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho niafenako fotsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Saingy ianao iray tarika amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tapaka, namana sy sakaiza!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izany isika nifanao teny mamy sy niara-dia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fony nankao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’Andriamanitra
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka ireo mpanohitra ahy ho faty tampoka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hidina velona any an-toeran’ny maty izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa toe-dratsy no ao amin’ny fonenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hevi-dratsy no ao anatin’ny fony!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izaho kosa miantso an’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka Izy TOMPO mihitsy no hamonjy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Na hariva na maraina na antoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anaovako sento sy toloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho henony hatrany aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hohatoniny akaiky aho ka hafahany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hotsoahiny soa aman-tsara aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny ady am-parimbona atao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hihaino anie Andriamanitra ka hampietry an’ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Izy no Mpanjaka hatrizay hatrizay!
- type: usfm
  marker: qr
  children:
  - type: text
    text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mety miova toetra ireo olon-dratsy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy matahotra an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny olona nihavanany, aninjirany tanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fifanekena nataony, ivadihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Malemy noho ny hero-dronono ny firesany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo ady no mameno ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: malefaka noho ny diloilo ny teniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo toy ny sabatra vonon-kamely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Apetraho amin’ny TOMPO ny fiahianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izy no hanohana anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na oviana na oviana ny olo-marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy havelany hangozohozo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ianao, Andriamanitra ô, hampidina ao am-pasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona mpandatsa-dra sy mpamitaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na tsy mbola misasaka aza ny androm-piainany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izaho kosa dia hatoky Anao hatrany.
