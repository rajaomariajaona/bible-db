      children:
      - type: text
        text: 'Tao amin’ny tahirin-kiran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira
    - type: text
      text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hampiarahina amin’ny valiha. Tononkalo fananarana nataon’i Davida.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akorontano, Tompo ô, ny fikasan’ireo mpanohitra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: asaritaho ny teny ifanaovany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Gen 11.11-9.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ady sy an-keriny no hitako ao an-tanàna
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manodidina ny màndany andro aman’alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heloka sy fampahoriana no ao anivon-tanàna
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ialam-pitaka sy kolikoly ny lalambeny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha fahavalo no mamingavinga ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho niaretako ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mpankahala no mirehareha hamely ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho niafenako fotsiny.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saingy ianao iray tarika amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tapaka, namana sy sakaiza!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany isika nifanao teny mamy sy niara-dia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony nankao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’Andriamanitra
    - type: text
      text: '!'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ireo mpanohitra ahy ho faty tampoka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hidina velona any an-toeran’ny maty izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa toe-dratsy no ao amin’ny fonenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hevi-dratsy no ao anatin’ny fony!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa miantso an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka Izy TOMPO mihitsy no hamonjy ahy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hariva na maraina na antoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no anaovako sento sy toloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho henony hatrany aho.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hohatoniny akaiky aho ka hafahany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hotsoahiny soa aman-tsara aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny ady am-parimbona atao ahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, mba henoy ny fivavako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza idifiana ny tarainako.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihaino anie Andriamanitra ka hampietry an’ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Izy no Mpanjaka hatrizay hatrizay!
  - type: usfm
    marker: qr
    children:
    - type: text
      text: Fiatoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mety miova toetra ireo olon-dratsy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy matahotra an’Andriamanitra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona nihavanany, aninjirany tanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fifanekena nataony, ivadihany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malemy noho ny hero-dronono ny firesany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo ady no mameno ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: malefaka noho ny diloilo ny teniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo toy ny sabatra vonon-kamely.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apetraho amin’ny TOMPO ny fiahianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izy no hanohana anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na oviana na oviana ny olo-marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy havelany hangozohozo.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao, Andriamanitra ô, hampidina ao am-pasana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olona mpandatsa-dra sy mpamitaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na tsy mbola misasaka aza ny androm-piainany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho kosa dia hatoky Anao hatrany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka aho ho tandrinao sy hovalianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mivezi-poana amin-tsento sy toloko,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahavaloko mihiaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny olon-dratsy mampahory ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hasomparana no atorany amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tezerany sy ankahalainy aho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangorohoro ato anatiko ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fanahiana ny ho faty no mamely ahy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voan’ny tahotra sy tebiteby aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa heniky ny horohoro.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy aho hoe: «Raha izay, hono aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mba ary elatra toa voromahailala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisidinako hitady izay hitoerako,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handositra lavitra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka honina any an-taniefitra!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho dodona hamonjy fialofana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho tratry ny tafiotra sy ny oram-baratra.»
