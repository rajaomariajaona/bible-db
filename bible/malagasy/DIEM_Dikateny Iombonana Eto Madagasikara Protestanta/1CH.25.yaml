        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: I Davida mbamin’ireo komandin’ny tafika dia nanavaka an-dry i Asafa sy i Hemàna ary i Jedotòna mbamin’ny taranany avy, ho an’ny fanompoam-pivavahana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ny taranak’i Asafa sy i Hemàna ary i Jedotòna, ho mpampita an-kira ny hafatr’Andriamanitra, ombàn’ny lokanga sy ny valiha ary ny kipantsona; ka izao no isan’ny lehilahy mpanao izany raharaha izany araka ny fanompoany avy:'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny an’ny zanakalahin’i Asafa dia ry i Zakora sy i Jôsefa ary i Netanià sy i Asarelà. Ireo zanakalahin’i Asafa ireo dia notarihin’i Asafa rainy izay nampita an-kira ny hafatr’Andriamanitra araka ny fitarihan’ny mpanjaka.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny an’ny zanakalahin’i Jedotòna dia ry i Gedalià sy i Tserỳ, i Jesahià sy i Simehỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Simehỳ: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny dkt grika tranainy Septoazinta sy ny lisitra etsy ambanimbany; tsy ao amin’ny RM io anarana io, kanefa ilaina mba hahazoana ny isa enina.
      marker-yv: yv-n
    - type: text
      text: ' ary i Hasabià sy i Matitià. Izy enin-dahy ireo dia notarihin’i Jedotòna rainy izay nampita an-kira ny hafatr’Andriamanitra, ombàn’ny lokanga, mba hankalazana sy hiderana ny TOMPO. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny an’ny zanakalahin’i Hemàna dia ry i Bokià sy i Matanià, i Hoziela, i Seboela, i Jerimôta, i Hananià, i Hananỳ, i Eliatà, i Gidaltỳ, i Rômamtỳ-Hezera, i Jôsbekasà, i Malôtỳ, i Hôtira, ary i Mahaziôta
