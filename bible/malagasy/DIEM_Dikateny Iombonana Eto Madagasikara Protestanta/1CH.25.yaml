      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') dia mamorona fehezanteny hebreo izay azo adika toy izao: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Amindrao fo aho, Tompo ô; / amindrao fo aho. / Ianao no Andriamanitro. Nankalazaiko sy nasandratro ny fanampianao. / Tanaty fahoriana aho / no niteny. / Omeo betsaka / ny fisehoam-pahitana
      - type: usfm
