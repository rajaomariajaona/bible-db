  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo rehetra ireo no zanakalahin’i Hemàna izay isehoam-pahitana ka mampita amin’ny mpanjaka ireo tenin’Andriamanitra, mba hanandratana ny heriny
    - type: usfm
