      marker-yv: yv-n
    - type: text
      text: . Ary zazalahy 14 sy zazavavy telo no efa nomen’Andriamanitra an’i Hemàna.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy rehetra ireo dia samy notarihin-drainy avy no nihira tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny Tompo
    - type: text
      text: ', ombàn’ny kipantsona sy ny valiha ary ny lokanga; ny hanao fanompoana tao an-tranon’ny TOMPO no raharahany, teo ambany fitarihan’ny mpanjaka mbamin-dry i Asafa sy i Jedotòna ary i Hemàna. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo rehetra efa havanana amin’ny hira ireo, miaraka amin’ny sokaji-mpihira izay ofaniny koa hihira ho an’ny TOMPO, dia 288 no isany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao antsapaka ny anjara raharahany avy izy rehetra, na ny kely na ny lehibe, na ny efa havanana na ny mbola miofana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka ny antsapaka voalohany dia azon’i Jôsefa; ny faharoa, azon’i Gedalià; ny fahatelo, azon’i Zakora; ny fahefatra, azon’i Jitserỳ; ny fahadimy, azon’i Netanià; ny fahenina azon’i Bokià; ny fahafito, azon’i Asarelà; ny fahavalo, azon’i Jesahià; ny fahasivy azon’i Matanià; ny faha-folo, azon’i Simehỳ; ny faha-11, azon’i Hoziela; ny faha-12, azon’i Hasabià; ny faha-13, azon’i Sobaela; ny faha-14, azon’i Matitià; ny faha-15, azon’i Jeremôta; ny faha-16, azon’i Hananià; ny faha-17, azon’i Jôsbekasà; ny faha-18, azon’i Hananỳ; ny faha-19, azon’i Malôtỳ; ny faharoapolo, azon’i Eliatà; ny faha-21, azon’i Hôtira; ny faha-22, azon’i Gidaltỳ; ny faha-23, azon’i Mehaziôta; ny faha-24, azon’i Rômamtỳ-Hezera
