document_id: 1JN.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Endrey ity haben’ny fitiavana nasehon’ny Ray ho antsika: fa nantsoina hoe zanak’Andriamanitra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 1.12.
      marker-yv: yv-n
    - type: text
      text: ' isika, sady zanany tokoa! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Izao tontolo izao
    - type: text
      text: ' no tsy mahalala antsika, dia noho izy tsy nahalala an’Andriamanitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Izany no mampiavaka miharihary ireo zanak’Andriamanitra amin’ireo olona andevozin’ny devoly. Tsy mba avy amin’Andriamanitra izay rehetra tsy manao ny marina soritany sy izay tsy tia ny namana iray finoana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aoka hifankatia
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izao manko no hafatra efa renareo hatramin’ny voalohany: aoka isika hifankatia'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jôh 13.34.
      marker-yv: yv-n
    - type: text
      text: '! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa tsy hanao tahaka an’i Kaina izay avy amin’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ilay Ratsy
    - type: text
      text: ' ka namono ny rahalahiny. Ary inona no anton’ny namonoan’i Kaina azy? Dia satria ratsy ny asan’i Kaina, fa marina kosa ny an’ny rahalahiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 4.1-8. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izay avy amin’ilay Ratsy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izany hoe eo ambany fahefan’ny devoly.'
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aza gaga, ry havana, raha ankahalain’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' ianareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lk 6.22; Jôh 15.18; 17.14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fantatsika fa tafafindra avy tamin’ny fahafatesana mba hiditra ao amin’ny fiainana isika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 5.24.
      marker-yv: yv-n
    - type: text
      text: ', satria tia ireo namana iray finoana. Izay tsy tia dia mitoetra ao amin’ny fahafatesana ihany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Izay rehetra mankahala ny namany iray finoana dia mpamono olona; ary fantatrareo fa tsy misy mpamono olona manana ny fiaina-maharitra mandrakizay mitoetra ao anatiny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izao no ahafantarantsika ny fitiavana: i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' dia nahafoy ny ainy hamonjeny antsika; ary isika koa dia mba tokony hahafoy ny aintsika hamonjena ny namana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Na iza na iza manan-karena eto amin’izao tontolo izao, ary mahita ny namany mahantra nefa mihirim-belona tsy mangoraka azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Deot 15.7-8.
      marker-yv: yv-n
    - type: text
      text: ', ahoana no itoeran’ny fitiavan’Andriamanitra ao anatiny? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Rey anaka, aoka tsy ho tia amin’ny teny tsara lahatra fotsiny isika, fa ho tia amin’ny asa sy araka ny tena marina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manan-toky isika eo anatrehan’Andriamanitra
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Izany no hahafantarantsika fa mpiandany amin’ny marina isika. Izany no hampahatokiantsika ny fontsika eo anatrehan’Andriamanitra, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry hava-malala, zanak’Andriamanitra isika ankehitriny, kanefa mbola tsy naseho izay ho tena toetrantsika rahatrizay. Saingy fantatsika fa rahatrizay hiseho i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', dia ho tahaka Azy isika, satria hahita Azy araka ny maha Izy Azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'raha toa manameloka antsika ny fontsika: Andriamanitra manko dia fantatsika fa lehibe noho ny fontsika sady mahalala ny zavatra rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ry hava-malala, raha toa tsy manameloka antsika ny fontsika, dia manan-toky eo anatrehan’Andriamanitra isika; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ary na inona na inona angatahintsika dia azontsika avy aminy, satria mitandrina ireo didiny sy manao izay ankasitrahina eo imasony isika. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny didin’Andriamanitra dia ny hinoantsika ny anaran’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy Zanany
    - type: text
      text: ' sy ny hifankatiavantsika araka ny didy nomen’i Kristy antsika'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jôh 13.34; 15.12, 17.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Izay mitandrina ireo didin’Andriamanitra no mitoetra ao anatin’Andriamanitra ary Andriamanitra kosa ao anatiny; ary ny ahafantarantsika fa mitoetra ao anatintsika Andriamanitra, dia ny Fanahy Masina Izay nomeny antsika.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary izay rehetra manana izany fanantenana miorina amin’i Kristy izany dia mitandrin-tena hanana toetra madio mba hadio toetra tahaka Azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izay rehetra manota dia mandika ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànan
    - type: text
      text: '’Andriamanitra, fa ny ota no fandikana ny lalànan’Andriamanitra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fantatrareo kosa fa i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' no niseho, dia mba hanala ny ota'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny ota: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny otantsika.
      marker-yv: yv-n
    - type: text
      text: ', ary tsy mba misy ota ao aminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Izay rehetra miray amin’i Kristy dia tsy manota; izay rehetra manota, dia tsy nahita Azy na nahalala Azy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rey anaka, aza avela hisy hamitaka anareo; izay manao ny marina soritan’Andriamanitra ihany no marina tahaka an’i Jesoa Kristy koa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izay manota dia avy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ', satria ny devoly dia mpanota hatrany am-boalohany. Ary ny anton’ny nisehoan’ilay Zanak’Andriamanitra, dia ny handrava ny asan’ny devoly.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izay rehetra naterak’Andriamanitra dia tsy manota, satria ilay voa nafafin’Andriamanitra no mitoetra ao anatiny; ary tsy mahay manota izy satria naterak’Andriamanitra. '
