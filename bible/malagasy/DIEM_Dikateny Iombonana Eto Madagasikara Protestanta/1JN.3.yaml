document_id: 1JN.3,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Endrey ity haben’ny fitiavana nasehon’ny Ray ho antsika: fa nantsoina hoe zanak’Andriamanitra'
  - type: note
    content: Ampit Jôh 1.12.
  - type: text
    content: ' isika, sady zanany tokoa! '
  - type: text
    content: Izao tontolo izao
  - type: text
    content: ' no tsy mahalala antsika, dia noho izy tsy nahalala an’Andriamanitra. '
  '10':
  - type: text
    content: Izany no mampiavaka miharihary ireo zanak’Andriamanitra amin’ireo olona andevozin’ny devoly. Tsy mba avy amin’Andriamanitra izay rehetra tsy manao ny marina soritany sy izay tsy tia ny namana iray finoana.
  - type: heading
    content: Aoka hifankatia
  '11':
  - type: text
    content: 'Izao manko no hafatra efa renareo hatramin’ny voalohany: aoka isika hifankatia'
  - type: note
    content: Jereo Jôh 13.34.
  - type: text
    content: '! '
  '12':
  - type: text
    content: Fa tsy hanao tahaka an’i Kaina izay avy amin’
  - type: text
    content: ilay Ratsy
  - type: text
    content: ' ka namono ny rahalahiny. Ary inona no anton’ny namonoan’i Kaina azy? Dia satria ratsy ny asan’i Kaina, fa marina kosa ny an’ny rahalahiny'
  - type: note
    content: 'Jereo Gen 4.1-8. –izay avy amin’ilay Ratsy: izany hoe eo ambany fahefan’ny devoly.'
  - type: text
    content: .
  '13':
  - type: text
    content: Aza gaga, ry havana, raha ankahalain’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' ianareo'
  - type: note
    content: Ampit Lk 6.22; Jôh 15.18; 17.14.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Fantatsika fa tafafindra avy tamin’ny fahafatesana mba hiditra ao amin’ny fiainana isika
  - type: note
    content: Ampit Jôh 5.24.
  - type: text
    content: ', satria tia ireo namana iray finoana. Izay tsy tia dia mitoetra ao amin’ny fahafatesana ihany. '
  '15':
  - type: text
    content: 'Izay rehetra mankahala ny namany iray finoana dia mpamono olona; ary fantatrareo fa tsy misy mpamono olona manana ny fiaina-maharitra mandrakizay mitoetra ao anatiny. '
  '16':
  - type: text
    content: 'Izao no ahafantarantsika ny fitiavana: i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' dia nahafoy ny ainy hamonjeny antsika; ary isika koa dia mba tokony hahafoy ny aintsika hamonjena ny namana. '
  '17':
  - type: text
    content: Na iza na iza manan-karena eto amin’izao tontolo izao, ary mahita ny namany mahantra nefa mihirim-belona tsy mangoraka azy
  - type: note
    content: Ampit Deot 15.7-8.
  - type: text
    content: ', ahoana no itoeran’ny fitiavan’Andriamanitra ao anatiny? '
  '18':
  - type: text
    content: Rey anaka, aoka tsy ho tia amin’ny teny tsara lahatra fotsiny isika, fa ho tia amin’ny asa sy araka ny tena marina.
  - type: heading
    content: Manan-toky isika eo anatrehan’Andriamanitra
  '19':
  - type: text
    content: 'Izany no hahafantarantsika fa mpiandany amin’ny marina isika. Izany no hampahatokiantsika ny fontsika eo anatrehan’Andriamanitra, '
  '2':
  - type: text
    content: 'Ry hava-malala, zanak’Andriamanitra isika ankehitriny, kanefa mbola tsy naseho izay ho tena toetrantsika rahatrizay. Saingy fantatsika fa rahatrizay hiseho i '
  - type: text
    content: Kristy
  - type: text
    content: ', dia ho tahaka Azy isika, satria hahita Azy araka ny maha Izy Azy. '
  '20':
  - type: text
    content: 'raha toa manameloka antsika ny fontsika: Andriamanitra manko dia fantatsika fa lehibe noho ny fontsika sady mahalala ny zavatra rehetra. '
  '21':
  - type: text
    content: 'Ry hava-malala, raha toa tsy manameloka antsika ny fontsika, dia manan-toky eo anatrehan’Andriamanitra isika; '
  '22':
  - type: text
    content: 'ary na inona na inona angatahintsika dia azontsika avy aminy, satria mitandrina ireo didiny sy manao izay ankasitrahina eo imasony isika. '
  '23':
  - type: text
    content: 'Ary ny didin’Andriamanitra dia ny hinoantsika ny anaran’i Jesoa '
  - type: text
    content: Kristy Zanany
  - type: text
    content: ' sy ny hifankatiavantsika araka ny didy nomen’i Kristy antsika'
  - type: note
    content: Jereo Jôh 13.34; 15.12, 17.
  - type: text
    content: '. '
  '24':
  - type: text
    content: Izay mitandrina ireo didin’Andriamanitra no mitoetra ao anatin’Andriamanitra ary Andriamanitra kosa ao anatiny; ary ny ahafantarantsika fa mitoetra ao anatintsika Andriamanitra, dia ny Fanahy Masina Izay nomeny antsika.
  '3':
  - type: text
    content: Ary izay rehetra manana izany fanantenana miorina amin’i Kristy izany dia mitandrin-tena hanana toetra madio mba hadio toetra tahaka Azy.
  '4':
  - type: text
    content: 'Izay rehetra manota dia mandika ny '
  - type: text
    content: lalànan
  - type: text
    content: '’Andriamanitra, fa ny ota no fandikana ny lalànan’Andriamanitra. '
  '5':
  - type: text
    content: 'Fantatrareo kosa fa i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' no niseho, dia mba hanala ny ota'
  - type: note
    content: 'ny ota: misy stf sasany ahitana hoe ny otantsika.'
  - type: text
    content: ', ary tsy mba misy ota ao aminy. '
  '6':
  - type: text
    content: Izay rehetra miray amin’i Kristy dia tsy manota; izay rehetra manota, dia tsy nahita Azy na nahalala Azy.
  '7':
  - type: text
    content: 'Rey anaka, aza avela hisy hamitaka anareo; izay manao ny marina soritan’Andriamanitra ihany no marina tahaka an’i Jesoa Kristy koa. '
  '8':
  - type: text
    content: 'Izay manota dia avy amin’ny '
  - type: text
    content: devoly
  - type: text
    content: ', satria ny devoly dia mpanota hatrany am-boalohany. Ary ny anton’ny nisehoan’ilay Zanak’Andriamanitra, dia ny handrava ny asan’ny devoly.'
  '9':
  - type: text
    content: 'Izay rehetra naterak’Andriamanitra dia tsy manota, satria ilay voa nafafin’Andriamanitra no mitoetra ao anatiny; ary tsy mahay manota izy satria naterak’Andriamanitra. '
