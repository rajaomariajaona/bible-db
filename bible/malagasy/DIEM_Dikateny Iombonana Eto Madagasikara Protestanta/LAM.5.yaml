document_id: LAM.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avereno aminao izahay, ry Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, tsarovy izay nanjo anay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: diniho sy jereo ny fandatsana anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Lasan’ny hafa ny tanindrazanay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lasan’ny vahiny ny tranonay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa tsy eo intsony ny rainay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tonga kamboty izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mpitondratena ny reninay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Na dia ny lavaka fantsakanay aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy maintsy andoavanay vola
- type: usfm
  marker: q1
  children:
  - type: text
    text: vao azonay isotroana rano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vidînay koa ny kitainay
- type: usfm
  marker: q1
  children:
  - type: text
    text: vao azonay ampidirina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Avy eo an-damosina ny mpanenjika anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka trotraka izahay fa tsy manam-pitsaharana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nanolo-tanana tamin’i Ejipta sy i Asiria izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho voky hanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nanota ny razanay kanefa tsy eo intsony izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izahay no mivesatra ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mpanompo no manapaka anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy misy manafaka anay amin’ny fahefàny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manao vy very ny ainay izahay hahazoan-kanina
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ireo dahalo mirongo fiadiana any an-taniefitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mahamay toy ny lafaoro ny hoditray
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ampijalijalian’ny mosary izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Misy manolana ireo vehivavy ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ireo virijiny any an-tanànan’i Joda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahantona tamin’ny tanany ireo mpitondra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba nohajaina ny zokiolona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny zatovo mitondra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vato fikosoham-bary
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ankizy mivembena mivesatra ny hazo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny loholona nitsaha-nanao antenimiera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zatovo nitsaha-nitendry valiha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nitsahatra ny hafalian’ny fonay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niova ho fisaonana ny dihin-karavoanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nianjera ny satroboninahitra teny an-dohanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: idiran-doza izahay satria efa nanota!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Matoa rera-po izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: matoa jembin-dranomaso ny masonay,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia noho ny tendrombohitr’i Tsiôna efa lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanjary fonenan’ny amboadia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ianao kosa, TOMPO ô, dia mipetraka mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny sezafiandriananao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanjakanao no maharitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny taonjato mifandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa ahoana no anadinoanao anay hatrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy andaozanao anay mandritra ny andro-piainanay?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: TOMPO ô, ampivereno aminao izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hiverenanay aminao tokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: havaozy ny fiainanay ho toy ny fahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Sa holavinao tanteraka ve izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hiharan’ny hatezeranao mihoa-pampana?
