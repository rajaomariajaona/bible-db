document_id: LAM.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Avereno aminao izahay, ry Tompo
  - type: text
    content: TOMPO ô, tsarovy izay nanjo anay,
  - type: text
    content: diniho sy jereo ny fandatsana anay.
  '10':
  - type: text
    content: Mahamay toy ny lafaoro ny hoditray
  - type: text
    content: satria ampijalijalian’ny mosary izahay.
  '11':
  - type: text
    content: 'Misy manolana ireo vehivavy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: mbamin’ireo virijiny any an-tanànan’i Joda.
  '12':
  - type: text
    content: Nahantona tamin’ny tanany ireo mpitondra;
  - type: text
    content: ary tsy mba nohajaina ny zokiolona.
  '13':
  - type: text
    content: 'Ny zatovo mitondra ny '
  - type: text
    content: vato fikosoham-bary
  - type: text
    content: ;
  - type: text
    content: ary ny ankizy mivembena mivesatra ny hazo.
  '14':
  - type: text
    content: Ny loholona nitsaha-nanao antenimiera;
  - type: text
    content: ary ny zatovo nitsaha-nitendry valiha.
  '15':
  - type: text
    content: Nitsahatra ny hafalian’ny fonay;
  - type: text
    content: niova ho fisaonana ny dihin-karavoanay.
  '16':
  - type: text
    content: Nianjera ny satroboninahitra teny an-dohanay;
  - type: text
    content: idiran-doza izahay satria efa nanota!
  '17':
  - type: text
    content: Matoa rera-po izahay
  - type: text
    content: matoa jembin-dranomaso ny masonay,
  '18':
  - type: text
    content: dia noho ny tendrombohitr’i Tsiôna efa lao
  - type: text
    content: ka nanjary fonenan’ny amboadia.
  '19':
  - type: text
    content: Ianao kosa, TOMPO ô, dia mipetraka mandrakizay
  - type: text
    content: eo amin’ny sezafiandriananao;
  - type: text
    content: ary ny fanjakanao no maharitra
  - type: text
    content: amin’ny taonjato mifandimby.
  '2':
  - type: text
    content: Lasan’ny hafa ny tanindrazanay,
  - type: text
    content: lasan’ny vahiny ny tranonay.
  '20':
  - type: text
    content: Koa ahoana no anadinoanao anay hatrany
  - type: text
    content: sy andaozanao anay mandritra ny andro-piainanay?
  '21':
  - type: text
    content: TOMPO ô, ampivereno aminao izahay
  - type: text
    content: mba hiverenanay aminao tokoa;
  - type: text
    content: havaozy ny fiainanay ho toy ny fahiny.
  '22':
  - type: text
    content: Sa holavinao tanteraka ve izahay
  - type: text
    content: na hiharan’ny hatezeranao mihoa-pampana?
  '3':
  - type: text
    content: Efa tsy eo intsony ny rainay
  - type: text
    content: ka tonga kamboty izahay,
  - type: text
    content: ary mpitondratena ny reninay.
  '4':
  - type: text
    content: Na dia ny lavaka fantsakanay aza
  - type: text
    content: dia tsy maintsy andoavanay vola
  - type: text
    content: vao azonay isotroana rano;
  - type: text
    content: ary vidînay koa ny kitainay
  - type: text
    content: vao azonay ampidirina.
  '5':
  - type: text
    content: Avy eo an-damosina ny mpanenjika anay
  - type: text
    content: ka trotraka izahay fa tsy manam-pitsaharana.
  '6':
  - type: text
    content: Nanolo-tanana tamin’i Ejipta sy i Asiria izahay
  - type: text
    content: mba ho voky hanina.
  '7':
  - type: text
    content: Nanota ny razanay kanefa tsy eo intsony izy;
  - type: text
    content: fa izahay no mivesatra ny helony.
  '8':
  - type: text
    content: Mpanompo no manapaka anay
  - type: text
    content: nefa tsy misy manafaka anay amin’ny fahefàny.
  '9':
  - type: text
    content: Manao vy very ny ainay izahay hahazoan-kanina
  - type: text
    content: noho ireo dahalo mirongo fiadiana any an-taniefitra.
