document_id: LAM.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avereno aminao izahay, ry Tompo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TOMPO ô, tsarovy izay nanjo anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: diniho sy jereo ny fandatsana anay.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mahamay toy ny lafaoro ny hoditray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ampijalijalian’ny mosary izahay.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Misy manolana ireo vehivavy ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ireo virijiny any an-tanànan’i Joda.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nahantona tamin’ny tanany ireo mpitondra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba nohajaina ny zokiolona.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny zatovo mitondra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vato fikosoham-bary
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ankizy mivembena mivesatra ny hazo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny loholona nitsaha-nanao antenimiera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zatovo nitsaha-nitendry valiha.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nitsahatra ny hafalian’ny fonay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niova ho fisaonana ny dihin-karavoanay.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nianjera ny satroboninahitra teny an-dohanay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: idiran-doza izahay satria efa nanota!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Matoa rera-po izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: matoa jembin-dranomaso ny masonay,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: dia noho ny tendrombohitr’i Tsiôna efa lao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanjary fonenan’ny amboadia.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ianao kosa, TOMPO ô, dia mipetraka mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny sezafiandriananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanjakanao no maharitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny taonjato mifandimby.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lasan’ny hafa ny tanindrazanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lasan’ny vahiny ny tranonay.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Koa ahoana no anadinoanao anay hatrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy andaozanao anay mandritra ny andro-piainanay?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: TOMPO ô, ampivereno aminao izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiverenanay aminao tokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: havaozy ny fiainanay ho toy ny fahiny.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Sa holavinao tanteraka ve izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hiharan’ny hatezeranao mihoa-pampana?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Efa tsy eo intsony ny rainay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tonga kamboty izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mpitondratena ny reninay.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Na dia ny lavaka fantsakanay aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy maintsy andoavanay vola
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vao azonay isotroana rano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vidînay koa ny kitainay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vao azonay ampidirina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Avy eo an-damosina ny mpanenjika anay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka trotraka izahay fa tsy manam-pitsaharana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nanolo-tanana tamin’i Ejipta sy i Asiria izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho voky hanina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nanota ny razanay kanefa tsy eo intsony izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izahay no mivesatra ny helony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mpanompo no manapaka anay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy misy manafaka anay amin’ny fahefàny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Manao vy very ny ainay izahay hahazoan-kanina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ireo dahalo mirongo fiadiana any an-taniefitra.
