- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Araka ny lovantsofina niampitampita teo amin’ny tantaran’ny Fiangonana, dia misy taratasy telo voatondro ho avy amin’i Jôhany apôstôly, na dia tsy voatonona ao anatin’ireo taratasy ireo mihitsy aza ny anarany. Ny taratasy voalohany dia tsy ahitana fanamarihana velively na momba ny mpanoratra azy na momba ny olona nandefasana azy. Kanefa misy lafin-javatra sasany iantefan’ilay taratasy. Toy ny ankamaroan’ireo Fiangonana kristianina teo amin’ny faramparan’ny taonjato voalohany dia niatrika antokom-pivavahana sasany mivaona amin’ny tena finoana kristianina ireo iantefan’ny taratasy ireo. Noho izany, dia zavatra anankiroa indrindra no imasoan’ny mpanoratra amin’ity taratasy ity:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –fampirisihana ireo mpamaky sy mpihaino mba hiombona tokoa amin’Andriamanitra Ray sy amin’i Jesoa Kristy Zanany, ka izany dia tsy maintsy aseho amin’ny fifankatiavana arahin’asa eo amin’ny samy iray finoana;
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –fiadiana amin’ireo fampianaran-diso izay mety mahatonga ny olona tsy hifikitra amin’ny Vaovao Mahafaly.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny sasin-tenin’ity taratasy ity (1.1-4) no mamariparitra ny zava-kendren’ny mpanoratra: manamafy ny fiombonana tokony hananan’ireo mpino amin’Andriamanitra sy amin’i Jesoa Kristy ary koa ny fiombonan’ireo mpino amin’izy samy izy. Hanatanterahana izany, dia tsy maintsy mifikitra amin’ny fanambaràn’ireo nahita maso sy nandre mivantana an’i Jesoa Kristy izy ireo; koa manainga ireo mpamaky sy mpihaino ny mpanoratra mba hiaina ao amin’ny fahazavana, satria Andriamanitra dia fahazavana; ary izany koa no anton’ny iainana ny didim-pitiavana (1.5–2.17). Manaraka izany, dia ambaran’ny mpanoratra fa manomboka miseho ireo mpanohitra an’i Kristy: dia ireo mpandainga izay mandà an’i Jesoa tsy ho Kristy (2.18-29). Ampahatsiahiviny avy eo ny toetra mampiavaka ireo tena zanak’Andriamanitra: ny fitondrantena mahitsy, ny fifankatiavana amin’izy samy izy, ny firaiketam-po amin’i Jesoa Kristy (3.1-24). Rehefa nasehon’ny mpanoratra ny fomba enti-manavaka ny fitaka sy ny marina (4.1-6), dia iverenany resahiny indray ny amin’ny fifankatiavana: izay an’Andriamanitra dia tokony ho tia, satria Andriamanitra dia fitiavana (4.7-12). Ho famaranana ny taratasiny dia antitranterin’ny mpanoratra fa ny finoana an’i Jesoa Kristy no mandresy ny herin’izao tontolo izao ary fintininy koa ireo lafin-javatra vaventy efa voalazany (5.1-21).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Voasoritr’ity taratasy ity ny tena endriky ny fiainana kristianina mangarangarana. Taominy hieritreritra hatrany ireo kristianina ka ampiany hanilika ny fitaka manodoka sady ampirisihiny hampifamatotra tsara kokoa ny finoana an’i Jesoa Kristy sy ny fitiava-namana.
