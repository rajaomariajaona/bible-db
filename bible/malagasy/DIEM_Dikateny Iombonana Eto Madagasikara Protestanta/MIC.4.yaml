  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Aoka ianareo hanaintaina sy hitaraindraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny vehivavy miteraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mponina ao Tsiôna!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ankehitriny dia hivoaka ny tanàna ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitoby any an-tsaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handeha hatrany Babilôna.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any no hanafahana anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any no hanavotan’ny TOMPO anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy eo am-pelatanan’ny fahavalonareo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ankehitriny efa nangoniko hamely anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny firenena maro izay miteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aoka ho afa-baràka i Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka isika hijery ny faharavàny!»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo tsy fantatr’ireny ny hevitry ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy takany ny fikasany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny nanangonany azy tahaka ny amboara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao am-pamoloana hivelezana azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mitsangàna ka miveleza, ry mponina ao Tsiôna.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hataoko mahery ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny omby misy tandroka vy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manan-kitro varahina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanorotoro firenena maro.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny harena voaangony ankeriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hatokanareo
