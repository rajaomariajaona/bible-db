    - type: text
      text: ho Ahy TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tompon’ny tany tontolo.»
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny aloha, asio tombokavatsa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny baiko mampanao '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tombokavatsa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na fandidididiana ny tena dia tokony ho raisina ho fanesoana. Izy io manko dia fomban’ny mpanompo sampy ka voararan’ny lalàna teo amin’ny Jiosy (jereo Lev 19.28). Kanefa tsy mazava loatra ny hevitry ny RM eto; dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ankehitriny aloha, mivoria ianareo ry mponin’i Jerosalema, izay...
      marker-yv: yv-n
    - type: text
      text: ny tenanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho mariky ny fisaonana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mponin’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manangona ny andia-miaramilanareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ataon’ny fahavalo fahirano ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dia hokapohiny amin’ny tsorakazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny takolan’ilay mpitsaran’i Israely.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Maro ny firenena hankany ka hilaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha isika hiakatra any an-tendrombohitry ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any an-tempolin’ilay Andriamanitr’i Jakôba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampianariny antsika ny lalana soritany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka harahintsika izay atorony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa avy any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' no ivoahan’ny fampianaran’ny TOMPO;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any Jerosalema no ipoiran’ny teniny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsara eo anivon’ny firenena maro Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handresy lahatra ny firenena matanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny akaiky na ny lavitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanefy ny sabany ho fangady ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lefony ho antsy fijinjana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hifamely amin’ny sabatra ny asany firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hianatra ady intsony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona samy hipetraka eo anivon’ny voalobony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy aviaviny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy hampahatahotra azy.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO Andriamanitr’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mampanantena izany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firenen-kafa rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy mankato ny andriamaniny avy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa isika kosa mankatò ny TOMPO Andriamanitsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandrakizay doria.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Tompo no mpanjaka ao Jerosalema
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hangoniko indray ny saozanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hovorîko indray izay niely sy nampahorîko.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny saozanina sisa tavela hataoko mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo voasesitany hataoko firenena matanjaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka Izaho TOMPO no hanjaka aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ao an-tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrizao ka ho mandrakizay.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ianao, ry tendrombohitra Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitsinjo ny vahoaka toy ny tilikambo fiambenana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haverina aminao ny fahefana taloha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho renivohi-panjakana indray i Jerosalema.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsapana sy fanavotana an’i Jerosalema
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana kosa no mitaraina mafy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mponin’i Jerosalema?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa angaha tsy misy mpanjaka ao aminareo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa maty ireo mpanolo-tsainareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no dia manaintaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny vehivavy miteraka ianareo?
