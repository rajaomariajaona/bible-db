document_id: MIC.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jerosalema, renivohitra anjakan’ny fiadanana
  - type: text
    content: '«Izao no ho tonga any aoriana any:'
  - type: text
    content: 'Ny tendrombohitra misy ilay '
  - type: text
    content: tempoli
  - type: text
    content: n’ny TOMPO
  - type: note
    content: Momba ny and 1-3, jereo Is 2.2-4. –Ny tendrombohitra misy ilay tempolin’ny Tompo dia antsoina hoe Tsiôna eo amin’ny and 2.
  - type: text
    content: dia haorina mafy ho faratampon’ny tendrombohitra,
  - type: text
    content: sy hanerinerina ambonin’ny havoana;
  - type: text
    content: ka vahoaka no hitanjozotra ho any.
  '10':
  - type: text
    content: –Aoka ianareo hanaintaina sy hitaraindraina
  - type: text
    content: toy ny vehivavy miteraka,
  - type: text
    content: ry mponina ao Tsiôna!
  - type: text
    content: Satria ankehitriny dia hivoaka ny tanàna ianareo
  - type: text
    content: ka hitoby any an-tsaha
  - type: text
    content: ary handeha hatrany Babilôna.
  - type: text
    content: Any no hanafahana anareo;
  - type: text
    content: any no hanavotan’ny TOMPO anareo
  - type: text
    content: avy eo am-pelatanan’ny fahavalonareo.
  '11':
  - type: text
    content: Ary ankehitriny efa nangoniko hamely anareo
  - type: text
    content: 'ny firenena maro izay miteny hoe:'
  - type: text
    content: «Aoka ho afa-baràka i Tsiôna
  - type: text
    content: ary aoka isika hijery ny faharavàny!»
  '12':
  - type: text
    content: Kanjo tsy fantatr’ireny ny hevitry ny TOMPO,
  - type: text
    content: tsy takany ny fikasany,
  - type: text
    content: dia ny nanangonany azy tahaka ny amboara
  - type: text
    content: ao am-pamoloana hivelezana azy.
  '13':
  - type: text
    content: «Mitsangàna ka miveleza, ry mponina ao Tsiôna.
  - type: text
    content: Fa hataoko mahery ianareo,
  - type: text
    content: toy ny omby misy tandroka vy
  - type: text
    content: sy manan-kitro varahina,
  - type: text
    content: ka hanorotoro firenena maro.
  - type: text
    content: Ary ny harena voaangony ankeriny
  - type: text
    content: dia hatokanareo
  - type: note
    content: 'hatokanareo: araka ny dkt tranainy grika sy siriaka ary latinina; fa araka ny RM dia hoe natokako.'
  - type: text
    content: ho Ahy TOMPO,
  - type: text
    content: Izay tompon’ny tany tontolo.»
  '14':
  - type: text
    content: Ankehitriny aloha, asio tombokavatsa
  - type: note
    content: Ny baiko mampanao tombokavatsa na fandidididiana ny tena dia tokony ho raisina ho fanesoana. Izy io manko dia fomban’ny mpanompo sampy ka voararan’ny lalàna teo amin’ny Jiosy (jereo Lev 19.28). Kanefa tsy mazava loatra ny hevitry ny RM eto; dkt hafa Ankehitriny aloha, mivoria ianareo ry mponin’i Jerosalema, izay...
  - type: text
    content: ny tenanareo
  - type: text
    content: mba ho mariky ny fisaonana,
  - type: text
    content: ry mponin’i Jerosalema
  - type: text
    content: izay manangona ny andia-miaramilanareo;
  - type: text
    content: fa ataon’ny fahavalo fahirano ianareo,
  - type: text
    content: ary dia hokapohiny amin’ny tsorakazo
  - type: text
    content: ny takolan’ilay mpitsaran’i Israely.
  '2':
  - type: text
    content: 'Maro ny firenena hankany ka hilaza hoe:'
  - type: text
    content: Andeha isika hiakatra any an-tendrombohitry ny TOMPO,
  - type: text
    content: any an-tempolin’ilay Andriamanitr’i Jakôba.
  - type: text
    content: Hampianariny antsika ny lalana soritany,
  - type: text
    content: ka harahintsika izay atorony.
  - type: text
    content: 'Fa avy any '
  - type: text
    content: Tsiôna
  - type: text
    content: ' no ivoahan’ny fampianaran’ny TOMPO;'
  - type: text
    content: avy any Jerosalema no ipoiran’ny teniny.
  '3':
  - type: text
    content: Hitsara eo anivon’ny firenena maro Izy
  - type: text
    content: ary handresy lahatra ny firenena matanjaka,
  - type: text
    content: na ny akaiky na ny lavitra.
  - type: text
    content: Dia hanefy ny sabany ho fangady ireny
  - type: text
    content: ary ny lefony ho antsy fijinjana.
  - type: text
    content: Tsy hifamely amin’ny sabatra ny asany firenena,
  - type: text
    content: ary tsy hianatra ady intsony.
  '4':
  - type: text
    content: Ny olona samy hipetraka eo anivon’ny voalobony
  - type: text
    content: sy aviaviny
  - type: text
    content: ka tsy hisy hampahatahotra azy.»
  - type: text
    content: Ny TOMPO Andriamanitr’izao rehetra izao,
  - type: text
    content: no mampanantena izany.
  '5':
  - type: text
    content: Ny firenen-kafa rehetra
  - type: text
    content: samy mankato ny andriamaniny avy;
  - type: text
    content: fa isika kosa mankatò ny TOMPO Andriamanitsika,
  - type: text
    content: mandrakizay doria.
  - type: heading
    content: Ny Tompo no mpanjaka ao Jerosalema
  '6':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: text
    content: «Amin’izany andro izany
  - type: text
    content: dia hangoniko indray ny saozanina,
  - type: text
    content: hovorîko indray izay niely sy nampahorîko.
  '7':
  - type: text
    content: Ny saozanina sisa tavela hataoko mahery,
  - type: text
    content: ireo voasesitany hataoko firenena matanjaka.
  - type: text
    content: Ka Izaho TOMPO no hanjaka aminy
  - type: text
    content: 'ao an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: hatrizao ka ho mandrakizay.
  '8':
  - type: text
    content: Ary ianao, ry tendrombohitra Tsiôna
  - type: text
    content: izay mitsinjo ny vahoaka toy ny tilikambo fiambenana,
  - type: text
    content: haverina aminao ny fahefana taloha;
  - type: text
    content: ho renivohi-panjakana indray i Jerosalema.»
  - type: heading
    content: Fitsapana sy fanavotana an’i Jerosalema
  '9':
  - type: text
    content: Nahoana kosa no mitaraina mafy ianareo,
  - type: text
    content: ry mponin’i Jerosalema?
  - type: text
    content: Fa angaha tsy misy mpanjaka ao aminareo?
  - type: text
    content: Sa maty ireo mpanolo-tsainareo
  - type: text
    content: no dia manaintaina
  - type: text
    content: toy ny vehivavy miteraka ianareo?
