document_id: DEU.25,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fomba fitsarana ara-drariny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mety misy olona anankiroa manana ady ka mankeo amin’ny fitsarana; dia tsaraina izy roroa ka homen-drariny izay manan-drariny ary hohelohina kosa izay meloka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fianakavian’izany lehilahy izany eo amin’i Israely dia hampiana anarana hoe: «Fianakavian’ilay nalan-kapa.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fihetsika tsy azo atao amin’ny ady antsanga
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mety misy olona roa lahy miady, ary ny vadin’ny anankiray kosa manatona hanafaka ny vadiny eo an-tanan’ilay mamely azy; raha maninji-tanana ravehivavy ka mandray ny ankasarotan’ilay lehilahy mifamely amin’ny vadiny, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia tsy hanananareo antra izany vehivavy izany fa hotapahinareo ny tanany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lanja sy refy ara-dalàna
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy hisy vatomizàna mahery lanja sy latsa-danja ao an-kitaponareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy hisy famarana lehibebe sy kelikely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vatomizana sy famarana tonga ohatra sy ara-dalàna no aoka hotananareo mba ho maro andro iainana ianareo, any amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Satria izay rehetra manao zavatra tsy an-drariny toy ireny dia maharikoriko eo imason’ny TOMPO Andriamanitrareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.16 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 13-16:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Lev 19.35-36.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny handringanana ny Hamalekîta
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsarovy izay nataon’ny Hamalekita taminareo teny an-dalàna, taorian’ny nialanareo tany Ejipta. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nanan-tahotra an’Andriamanitra ireo fa nanehatra anareo teny an-dalàna sy namely izay trotraka teo amin’ny vodilaharanareo fony ianareo reraka sy sasatra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hataon’ny TOMPO Andriamanitrareo mahazo fitsaharana ianareo izao ka tsy ho voahelingelin’ny fahavalo rehetra manodidina anareo any amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho anjara fanananareo; dia hovonoinareo ho faty ny Hamalekîta amin’izay mba tsy hisy olona hahatsiaro azy intsony eto amin’izao tontolo izao. Aza hadinoinareo izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.19 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 17-19:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 17.8-14; 1 Sam 15.2-9.
      marker-yv: yv-n
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tokony hokapohina ny meloka, dia hasain’ny mpitsara hivalandotra amin’ny tany izy ka hokapohina eo anatrehan’ilay mpitsara; ary arakaraka ny helony no isan’ny kapoka hatao aminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatramin’ny efapolo no kapoka azo amelezana azy, fa tsy hatao mihoatra; fandrao raha mihoatra noho izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mba tsy hihoarana ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kapoka efapolo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dia eo amin’ny kapoka faha-39 no tokony hatsahatra, jereo 2 Kôr 11.24. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: '–fandrao raha mihoatra noho izany, dia ho toy... '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fandrao raha mihoatra noho izany, dia hiteraka ratra be ary ho toy...
      marker-yv: yv-n
    - type: text
      text: ', dia ho toy ny tsinontsinona eo imasonareo ny mpiray firenena aminareo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny omby
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza akombonareo ny vavan’ny omby mively vary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Akombona ny vavan’ny omby mively vary mba hisakanana azy tsy hirao-bilona mandritra ny iasany. Jereo 1Kôr 9.9; 1Tim 5.18.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vehivavy entin-doloha
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mety misy mpirahalahy miara-monina, ka maty momba ny anankiray. Amin’izay, dia aoka ny vadin’ny maty tsy hanambady vahiny any ivelam-pianakaviana; fa ny zaodahiny ihany no aoka handeha hanambady azy, ka hitondra loloha azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny lahimatoa izay haterany no haka ny anaran’ilay rahalahy efa maty, mba tsy hahafaty anarana azy eo amin’i Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.6 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 5-6:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Mt 22.24; Mk 12.19; Lk 20.28.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tsy sitra-dralehilahy ny hitondra loloha ny vadin-drahalahiny, dia aoka hanatona ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' eo amin’ny fitsarana ravehivavy ka hanao hoe: «Tsy mety mamelona ny anaran’ny rahalahiny eo amin’i Israely ny zaodahiko, fa tsy te hitondra loloha ahy». '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hantsoin’ireo loholon’ny tanàna ralehilahy ka hohadininy. Ary raha miteny izy ka manao hoe: «Tsy sitrako ny hanambady azy!», '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hanatona azy eo anatrehan’ireo loholona ity vadin-drahalahiny ka hanala ny kapa amin’ny tongo-dralehilahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tahaka ny hita ao amin’i Rot 4.7, izany fihetsika izany dia manambara fa tsy manan-jo hanambady ny vady navelan-drahalahiny ary tsy manan-jo handova ny fananana navelan-drahalahiny intsony ilay tokony hitondra loloha. Ankoatra izany, dia manala baràka olona ny fihetsika toy ireny eto amin’ity sehatra ity.
      marker-yv: yv-n
    - type: text
      text: ' ary handrora amin’ny tavany sady hiteny hoe: «Toy izany no hatao amin’ny lehilahy tsy mety manome taranaka ny rahalahiny!» '
