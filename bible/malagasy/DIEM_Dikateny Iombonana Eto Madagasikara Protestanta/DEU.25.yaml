document_id: DEU.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fomba fitsarana ara-drariny
  - type: text
    content: 'Mety misy olona anankiroa manana ady ka mankeo amin’ny fitsarana; dia tsaraina izy roroa ka homen-drariny izay manan-drariny ary hohelohina kosa izay meloka. '
  '10':
  - type: text
    content: 'Ary ny fianakavian’izany lehilahy izany eo amin’i Israely dia hampiana anarana hoe: «Fianakavian’ilay nalan-kapa.»'
  - type: heading
    content: Fihetsika tsy azo atao amin’ny ady antsanga
  '11':
  - type: text
    content: 'Mety misy olona roa lahy miady, ary ny vadin’ny anankiray kosa manatona hanafaka ny vadiny eo an-tanan’ilay mamely azy; raha maninji-tanana ravehivavy ka mandray ny ankasarotan’ilay lehilahy mifamely amin’ny vadiny, '
  '12':
  - type: text
    content: dia tsy hanananareo antra izany vehivavy izany fa hotapahinareo ny tanany.
  - type: heading
    content: Lanja sy refy ara-dalàna
  '13':
  - type: text
    content: 'Aoka tsy hisy vatomizàna mahery lanja sy latsa-danja ao an-kitaponareo. '
  '14':
  - type: text
    content: 'Aoka tsy hisy famarana lehibebe sy kelikely. '
  '15':
  - type: text
    content: 'Vatomizana sy famarana tonga ohatra sy ara-dalàna no aoka hotananareo mba ho maro andro iainana ianareo, any amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo. '
  '16':
  - type: text
    content: Satria izay rehetra manao zavatra tsy an-drariny toy ireny dia maharikoriko eo imason’ny TOMPO Andriamanitrareo
  - type: note
    content: 'And 13-16: jereo Lev 19.35-36.'
  - type: text
    content: .
  - type: heading
    content: Ny amin’ny handringanana ny Hamalekîta
  '17':
  - type: text
    content: 'Tsarovy izay nataon’ny Hamalekita taminareo teny an-dalàna, taorian’ny nialanareo tany Ejipta. '
  '18':
  - type: text
    content: 'Tsy nanan-tahotra an’Andriamanitra ireo fa nanehatra anareo teny an-dalàna sy namely izay trotraka teo amin’ny vodilaharanareo fony ianareo reraka sy sasatra. '
  '19':
  - type: text
    content: Hataon’ny TOMPO Andriamanitrareo mahazo fitsaharana ianareo izao ka tsy ho voahelingelin’ny fahavalo rehetra manodidina anareo any amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho anjara fanananareo; dia hovonoinareo ho faty ny Hamalekîta amin’izay mba tsy hisy olona hahatsiaro azy intsony eto amin’izao tontolo izao. Aza hadinoinareo izany
  - type: note
    content: 'And 17-19: jereo Eks 17.8-14; 1 Sam 15.2-9.'
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'Raha tokony hokapohina ny meloka, dia hasain’ny mpitsara hivalandotra amin’ny tany izy ka hokapohina eo anatrehan’ilay mpitsara; ary arakaraka ny helony no isan’ny kapoka hatao aminy. '
  '3':
  - type: text
    content: Hatramin’ny efapolo no kapoka azo amelezana azy, fa tsy hatao mihoatra; fandrao raha mihoatra noho izany
  - type: note
    content: 'Mba tsy hihoarana ny kapoka efapolo, dia eo amin’ny kapoka faha-39 no tokony hatsahatra, jereo 2 Kôr 11.24. –fandrao raha mihoatra noho izany, dia ho toy... : dkt hafa fandrao raha mihoatra noho izany, dia hiteraka ratra be ary ho toy...'
  - type: text
    content: ', dia ho toy ny tsinontsinona eo imasonareo ny mpiray firenena aminareo.'
  - type: heading
    content: Ny omby
  '4':
  - type: text
    content: Aza akombonareo ny vavan’ny omby mively vary
  - type: note
    content: Akombona ny vavan’ny omby mively vary mba hisakanana azy tsy hirao-bilona mandritra ny iasany. Jereo 1Kôr 9.9; 1Tim 5.18.
  - type: text
    content: .
  - type: heading
    content: Ny vehivavy entin-doloha
  '5':
  - type: text
    content: 'Mety misy mpirahalahy miara-monina, ka maty momba ny anankiray. Amin’izay, dia aoka ny vadin’ny maty tsy hanambady vahiny any ivelam-pianakaviana; fa ny zaodahiny ihany no aoka handeha hanambady azy, ka hitondra loloha azy. '
  '6':
  - type: text
    content: Ary ny lahimatoa izay haterany no haka ny anaran’ilay rahalahy efa maty, mba tsy hahafaty anarana azy eo amin’i Israely
  - type: note
    content: 'And 5-6: jereo Mt 22.24; Mk 12.19; Lk 20.28.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Raha tsy sitra-dralehilahy ny hitondra loloha ny vadin-drahalahiny, dia aoka hanatona ny '
  - type: text
    content: loholona
  - type: text
    content: ' eo amin’ny fitsarana ravehivavy ka hanao hoe: «Tsy mety mamelona ny anaran’ny rahalahiny eo amin’i Israely ny zaodahiko, fa tsy te hitondra loloha ahy». '
  '8':
  - type: text
    content: 'Dia hantsoin’ireo loholon’ny tanàna ralehilahy ka hohadininy. Ary raha miteny izy ka manao hoe: «Tsy sitrako ny hanambady azy!», '
  '9':
  - type: text
    content: dia hanatona azy eo anatrehan’ireo loholona ity vadin-drahalahiny ka hanala ny kapa amin’ny tongo-dralehilahy
  - type: note
    content: Tahaka ny hita ao amin’i Rot 4.7, izany fihetsika izany dia manambara fa tsy manan-jo hanambady ny vady navelan-drahalahiny ary tsy manan-jo handova ny fananana navelan-drahalahiny intsony ilay tokony hitondra loloha. Ankoatra izany, dia manala baràka olona ny fihetsika toy ireny eto amin’ity sehatra ity.
  - type: text
    content: ' ary handrora amin’ny tavany sady hiteny hoe: «Toy izany no hatao amin’ny lehilahy tsy mety manome taranaka ny rahalahiny!» '
