  - type: text
    text: ary nankany amin’ny tanàna nahabe Azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.54 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tanàna nahabe Azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe i Nazareta. Jereo 2.23 sy Lk 4.16.
    marker-yv: yv-n
  - type: text
    text: '. Nampianatra ny olona tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' i Jesoa, hany ka talanjona ry zareo sady loa-bolana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Avy taiza re no nahazoan’ilay io izany fahendrena izany sy nahavitany ireny asa mahagaga ireny? '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Tsy ny zanak’i Jôsefa mpandrafitra ve io? Tsy i Maria ve no anaran-dreniny? Tsy i Jakôba sy i Jôsefa ary i Simôna sy i Joda ve no anaran’ireo rahalahiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.55 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jôh 6.42. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Jôsefa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (faharoa): misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jôsèta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ampit Mk 6.3).'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Ary moa tsy miara-monina amintsika avokoa ve ireo anabaviny? Koa avy taiza àry ny nahazoan’ilay io izany rehetra izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Dia voasakana tsy hino Azy ry zareo. Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '– '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpaminany
  - type: text
    text: ' tsy hajaina eo amin’ny tanàna nahabe azy sy eo amin’ny fianakaviany, na dia heni-kaja any an-kafa aza'
