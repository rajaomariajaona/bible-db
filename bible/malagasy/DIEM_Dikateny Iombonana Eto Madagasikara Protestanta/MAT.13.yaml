segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ny mpamafy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 4.1-9; Lk 8.4-8)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’izany andro izany i Jesoa dia niala tao an-trano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mk 2.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ary lasa nipetraka teo amoron’ny farihin’i Galilea mba hampianatra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nisy vahoaka betsaka nitangorona teo akaikiny, ka voatery niakatra tao an-tsambokely anankiray Izy dia nipetraka teo. Ary ny vahoaka rehetra kosa terỳ amoron-drano. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanoharana
  - type: text
    text: ' no nilazan’i Jesoa zavatra maro taminy ka hoy Izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro niainga ity mpamafy hamafy voa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony namafy izy, ny voa sasany latsaka teny amoron-dalana, ka tonga ny voro-manidina nitsindroka azy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny voa sasany latsaka tamin’ny toerana be vato sady manify nofon-tany, ka vetivety dia nitsimoka satria tsy lalina ny tany nilentehany; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'saingy nony nipoaka ny andro, dia nalazon’ny hafanana ireo tsimoka ireo ka maina, satria tsy namaka lalina. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny voa sasany indray latsaka tany anaty tsilo; dia nitombo ny tsilo ary voageja ny tsimoka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny voa sasany kosa latsaka tamin’ny tany lonaka dia namoa: tao ny zato heny, tao ny enimpolo heny ary tao ny telopolo heny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nofaranan’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izay manan-tsofina hihainoana, aoka hihaino!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anton’ny ampiasain’i Jesoa fanoharana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 4.10-12; Lk 8.9-10)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nanatona an’i Jesoa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' no itenenanao amin’ny vahoaka?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianareo no natao hahalala ny tsiambaratelo momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ', fa ireo kosa tsy natao hahalala. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Satria izay manana no homena, ka hanana amby ampy; fa izay tsy manana kosa, na izay kely ananany aza dia halàna aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Noho izany, dia fanoharana no itenenako aminy: satria mijery izy fa tsy mahita, ary mihaino fa tsy mandre sady tsy mahafantatra; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka tanteraka aminy tokoa ny faminaniana voalazan’i Isaià hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hihaino dia hihaino ianareo fa tsy hahafantatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hijery dia hijery fa tsy hahita,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: satria nihamafy fo ity vahoaka ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nihadonto sofina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanakimpy maso;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao ny masony hahita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sofiny handre
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fony hahafantatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiverina amiko sy hositraniko ity vahoaka ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny Tompo Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 6.9-10, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa sambatra kosa ianareo, mana-maso mahita ary manan-tsofina mandre. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Eny, lazaiko marina aminareo fa maro ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminanin
  - type: text
    text: ’Andriamanitra sy ireo olo-marina naniry hahita izay hitanareo nefa tsy nahita, ary hahare izay renareo nefa tsy nahare
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Pt 1.10-12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hazavain’i Jesoa ny fanoharana momba ny mpamafy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 4.13-20; Lk 8.11-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '–Ianareo kosa, henoy àry ny hevitr’ilay fanoharana ny amin’ny mpamafy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny olona mahaheno ny teny momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ' kanefa tsy mahafantatra, dia ny voa nafafy teny amoron-dalana: avy ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ratsy
  - type: text
    text: ' ka manaisotra izay nafafy tao am-pony. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny voa nafafy tamin’ny tany be vato dia izay mahaheno ny teny ka mandray azy avy hatrany amin-kafaliana, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'saingy tsy mandatsaka lalina izany ao aminy fa vetivety foana no itanany azy; ka raha vao misy fijaliana na fanenjehana noho ny tenin’Andriamanitra, dia very finoana. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny voa nafafy tany anaty tsilo dia izay mahaheno ny teny, kanefa ny fiahiana ny fiainana etoana sy ny fanodokan’ny harena mangeja ny teny tsy ho afa-mamoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny fiahiana... harena: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 6.24-34. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mangeja ny teny tsy ho afa-mamoa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mangeja ny teny ka tsy afa-mamoa ilay nandray azy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny voa nafafy tamin’ny tany lonaka dia izay mahaheno ny teny sy mahafantatra azy; ary dia miharihary fa mamoa sy mahavokatra: ao ny zato heny, ao ny enimpolo heny ary ao ny telopolo heny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ny tsimparifary nafafin’ny fahavalo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nanolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' hafa tamin’ny vahoaka i Jesoa ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ' dia tahaka ny amin’ity lehilahy namafy voa tsara tamin’ny tanimbariny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Kanjo raha natory ny olona, dia tonga ny fahavalon-dralehilahy tompon-tanimbary ka namafy voan-tsimparifary tamin’ny vary, dia lasa nandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa naniry ny vary ka niteraka dia nipoitra koa ny tsimparifary. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia avy ny mpanompon-dralehilahy ka nilaza taminy hoe: «Tompoko, tsy voa tsara ve no nafafinao tamin’ny tanimbarinao? Koa avy aiza kosa ny tsimparifary?» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia novaliany hoe: «Fahavalo no nanao izany!» Ary hoy ny mpanompony taminy: «Koa tianao ve ny handehananay hanaisotra ny tsimparifary?» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa nataon’ny tompon-tanimbary hoe: «Tsia, fandrao hongotanareo mbamin’ny vary raha esorinareo ny tsimparifary!» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Aoka ihany hiara-maniry izy roroa mandra-piavin’ny taom-pijinjana; ary amin’izay vao holazaiko amin’ny mpijinja hoe: «Esory aloha ny tsimparifary, ka fehezo ho amboarany mba hodorana; fa ny vary kosa, angony ho any an-tsompitro.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ny voan-tsinapy sy ny leviora
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 4.30-32; Lk 13.18-21)
  marker-yv: yv-h
- type: usfm
