      marker: ft
      children:
      - type: text
        text: Ampit Dan 13.3.
    marker-yv: yv-n
  - type: text
    text: . Izay manan-tsofina hihainoana, aoka hihaino!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ny harena miafina sy ny vatosoa sarobidy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '–Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ' dia tahaka ny harena miafina ao anaty saha. Nisy olona nahita ilay harena ka nafeniny tao ihany aloha; ary noho ny hafaliany dia lasa izy nivarotra ny fananany rehetra, ka nividy izany saha izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: '–Ary izao koa: ny Fanjakàn’ny lanitra dia tahaka ny amin’ny mpandranto mitady vatosoa. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Rehefa nahita anankiray sarobidy izy, dia lasa nivarotra ny fananany rehetra, ka nividy izany vatosoa izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ny harato
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '–Ary izao koa: ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ' dia tahaka ny harato nalatsaka anaty ranomasina ka nanangona izao karazan-trondro rehetra izao. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Rehefa feno ny harato, dia notarihina ho eny amoron-drano; ary nipetraka ny mpanarato nifantina ny tsara hataony an-karona, fa ny ratsy kosa nariany. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Dia tahaka izany no hatao amin’ny fiafaran’izao tontolo izao; ho tonga ny anjely hanavaka ny ratsy fanahy hisaraka amin’ny olo-marina, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'ka hanipy azy any amin’ny memy mirehitra: any ireo no hitomany sy hikotro-nify.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zava-baovao sy tranainy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary hoy i Jesoa tamin’ny mpianany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa fantatrareo ve izany rehetra izany?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, efa fantatray!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Dia hoy indray i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Koa amin’izany àry, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' rehetra izay nanjary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ' dia tahaka ny tompon-drakitra izay mamoaka zava-baovao sy tranainy avy amin’ny tahirin-drakiny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy inoan’ny olona tao Nazareta i Jesoa
  marker-yv: yv-h
