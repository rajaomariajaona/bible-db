document_id: MAT.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana momba ny mpamafy
  - type: heading
    content: (Jereo Mk 4.1-9; Lk 8.4-8)
  - type: text
    content: Tamin’izany andro izany i Jesoa dia niala tao an-trano
  - type: note
    content: Jereo Mk 2.1 sy nta.
  - type: text
    content: ' ary lasa nipetraka teo amoron’ny farihin’i Galilea mba hampianatra. '
  '10':
  - type: text
    content: 'Ary nanatona an’i Jesoa ny '
  - type: text
    content: mpianany
  - type: text
    content: ' ka nanao taminy hoe:'
  - type: text
    content: '–Nahoana no '
  - type: text
    content: fanoharana
  - type: text
    content: ' no itenenanao amin’ny vahoaka?'
  '11':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Ianareo no natao hahalala ny tsiambaratelo momba ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ', fa ireo kosa tsy natao hahalala. '
  '12':
  - type: text
    content: 'Satria izay manana no homena, ka hanana amby ampy; fa izay tsy manana kosa, na izay kely ananany aza dia halàna aminy. '
  '13':
  - type: text
    content: 'Noho izany, dia fanoharana no itenenako aminy: satria mijery izy fa tsy mahita, ary mihaino fa tsy mandre sady tsy mahafantatra; '
  '14':
  - type: text
    content: 'ka tanteraka aminy tokoa ny faminaniana voalazan’i Isaià hoe:'
  - type: text
    content: «Hihaino dia hihaino ianareo fa tsy hahafantatra
  - type: text
    content: ary hijery dia hijery fa tsy hahita,
  '15':
  - type: text
    content: satria nihamafy fo ity vahoaka ity,
  - type: text
    content: nihadonto sofina
  - type: text
    content: ary nanakimpy maso;
  - type: text
    content: fandrao ny masony hahita,
  - type: text
    content: ny sofiny handre
  - type: text
    content: ary ny fony hahafantatra
  - type: text
    content: ka hiverina amiko sy hositraniko ity vahoaka ity,
  - type: text
    content: hoy ny Tompo Andriamanitra
  - type: note
    content: Is 6.9-10, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '!'
  '16':
  - type: text
    content: 'Fa sambatra kosa ianareo, mana-maso mahita ary manan-tsofina mandre. '
  '17':
  - type: text
    content: 'Eny, lazaiko marina aminareo fa maro ireo '
  - type: text
    content: mpaminanin
  - type: text
    content: ’Andriamanitra sy ireo olo-marina naniry hahita izay hitanareo nefa tsy nahita, ary hahare izay renareo nefa tsy nahare
  - type: note
    content: Ampit 1Pt 1.10-12.
  - type: text
    content: .
  - type: heading
    content: Hazavain’i Jesoa ny fanoharana momba ny mpamafy
  - type: heading
    content: (Jereo Mk 4.13-20; Lk 8.11-15)
  '18':
  - type: text
    content: '–Ianareo kosa, henoy àry ny hevitr’ilay fanoharana ny amin’ny mpamafy. '
  '19':
  - type: text
    content: 'Ny olona mahaheno ny teny momba ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' kanefa tsy mahafantatra, dia ny voa nafafy teny amoron-dalana: avy ilay '
  - type: text
    content: Ratsy
  - type: text
    content: ' ka manaisotra izay nafafy tao am-pony. '
  '2':
  - type: text
    content: 'Nisy vahoaka betsaka nitangorona teo akaikiny, ka voatery niakatra tao an-tsambokely anankiray Izy dia nipetraka teo. Ary ny vahoaka rehetra kosa terỳ amoron-drano. '
  '20':
  - type: text
    content: 'Ny voa nafafy tamin’ny tany be vato dia izay mahaheno ny teny ka mandray azy avy hatrany amin-kafaliana, '
  '21':
  - type: text
    content: 'saingy tsy mandatsaka lalina izany ao aminy fa vetivety foana no itanany azy; ka raha vao misy fijaliana na fanenjehana noho ny tenin’Andriamanitra, dia very finoana. '
  '22':
  - type: text
    content: Ny voa nafafy tany anaty tsilo dia izay mahaheno ny teny, kanefa ny fiahiana ny fiainana etoana sy ny fanodokan’ny harena mangeja ny teny tsy ho afa-mamoa
  - type: note
    content: 'Ny fiahiana... harena: jereo Mt 6.24-34. –mangeja ny teny tsy ho afa-mamoa: dkt hafa mangeja ny teny ka tsy afa-mamoa ilay nandray azy.'
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Ary ny voa nafafy tamin’ny tany lonaka dia izay mahaheno ny teny sy mahafantatra azy; ary dia miharihary fa mamoa sy mahavokatra: ao ny zato heny, ao ny enimpolo heny ary ao ny telopolo heny.'
  - type: heading
    content: Fanoharana momba ny tsimparifary nafafin’ny fahavalo
  '24':
  - type: text
    content: 'Ary nanolotra '
  - type: text
    content: fanoharana
  - type: text
    content: ' hafa tamin’ny vahoaka i Jesoa ka nanao hoe:'
  - type: text
    content: '–Ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' dia tahaka ny amin’ity lehilahy namafy voa tsara tamin’ny tanimbariny. '
  '25':
  - type: text
    content: 'Kanjo raha natory ny olona, dia tonga ny fahavalon-dralehilahy tompon-tanimbary ka namafy voan-tsimparifary tamin’ny vary, dia lasa nandeha. '
  '26':
  - type: text
    content: 'Rehefa naniry ny vary ka niteraka dia nipoitra koa ny tsimparifary. '
  '27':
  - type: text
    content: 'Dia avy ny mpanompon-dralehilahy ka nilaza taminy hoe: «Tompoko, tsy voa tsara ve no nafafinao tamin’ny tanimbarinao? Koa avy aiza kosa ny tsimparifary?» '
  '28':
  - type: text
    content: 'Dia novaliany hoe: «Fahavalo no nanao izany!» Ary hoy ny mpanompony taminy: «Koa tianao ve ny handehananay hanaisotra ny tsimparifary?» '
  '29':
  - type: text
    content: 'Fa nataon’ny tompon-tanimbary hoe: «Tsia, fandrao hongotanareo mbamin’ny vary raha esorinareo ny tsimparifary!» '
  '3':
  - type: text
    content: Fanoharana
  - type: text
    content: ' no nilazan’i Jesoa zavatra maro taminy ka hoy Izy:'
  - type: text
    content: '–Indro niainga ity mpamafy hamafy voa. '
  '30':
  - type: text
    content: 'Aoka ihany hiara-maniry izy roroa mandra-piavin’ny taom-pijinjana; ary amin’izay vao holazaiko amin’ny mpijinja hoe: «Esory aloha ny tsimparifary, ka fehezo ho amboarany mba hodorana; fa ny vary kosa, angony ho any an-tsompitro.»'
  - type: heading
    content: Fanoharana momba ny voan-tsinapy sy ny leviora
  - type: heading
    content: (Jereo Mk 4.30-32; Lk 13.18-21)
  '31':
  - type: text
    content: 'Ary nanolotra '
  - type: text
    content: fanoharana
  - type: text
    content: ' hafa indray tamin’ny vahoaka i Jesoa ka nanao hoe:'
  - type: text
    content: '–Ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' dia tahaka ny '
  - type: text
    content: voan-tsinapy
  - type: text
    content: ' nalain’ity lehilahy anankiray ary nafafiny tany an-tanimboliny. '
  '32':
  - type: text
    content: Madinika indrindra amin’ny voa famafy rehetra ny voan-tsinapy, saingy rehefa maniry, dia izy no lehibe indrindra amin’ny anana rehetra sady tonga hazo; dia avy ny voro-manidina manao akany honenana ao amin’ny rantsany
  - type: note
    content: Jereo Ezek 17.22-23 sy Dan 4.9,18.
  - type: text
    content: .
  '33':
  - type: text
    content: 'Ary nilaza fanoharana hafa koa tamin’ny vahoaka i Jesoa ka nanao hoe:'
  - type: text
    content: '–Ny Fanjakàn’ny lanitra dia tahaka ny '
  - type: text
    content: leviora
  - type: text
    content: ' nalain’ity vehivavy anankiray ary nampifangaroiny tamin’ny koba eran’ny kovetabe mandra-pibohaky ny koba manontolo.'
  - type: heading
    content: Ny fanoharana sy ny fampiasan’i Jesoa azy
  - type: heading
    content: (Jereo Mk 4.33-34)
  '34':
  - type: text
    content: ' '
  - type: text
    content: Fanoharana
  - type: text
    content: ' no nanambaran’i Jesoa izany rehetra izany tamin’ny vahoaka. Ary tsy nanambara zavatra tamin’ny vahoaka afa-tsy tamin’ny fanoharana i Jesoa, '
  '35':
  - type: text
    content: 'hany ka tanteraka ilay voalazan’ny Tompo tamin’ny alalan’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  - type: text
    content: «Fanoharana no hitenenako;
  - type: text
    content: zavatra nafenina hatramin’ny nahariana izao tontolo izao no hambarako
  - type: note
    content: Sal 78.2.
  - type: text
    content: .»
  - type: heading
    content: Hazavain’i Jesoa ny fanoharana momba ny tsimparifary nafafin’ny fahavalo
  '36':
  - type: text
    content: 'Tamin’izay dia nandao ny vahoaka i Jesoa ary nody tany an-trano; dia nanatona Azy ny '
  - type: text
    content: mpianany
  - type: text
    content: ' ka nanao hoe:'
  - type: text
    content: '–Hazavao aminay ny hevitry ny '
  - type: text
    content: fanoharana
  - type: text
    content: ' momba ny tsimparifary nafafy an-tanimbary.'
  '37':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Ny mpamafy ny voa tsara dia ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '; '
  '38':
  - type: text
    content: 'ny tanimbary dia izao tontolo izao; ny voa tsara dia ny olona miaina araka ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ; ny tsimparifary dia ny olona andevozin’
  - type: text
    content: ilay Ratsy
  - type: text
    content: '; '
  '39':
  - type: text
    content: 'ny fahavalo namafy ny tsimparifary dia ny devoly; ny taom-pijinjana dia ny fiafaran’izao tontolo izao; ary ny mpijinja dia ny anjely. '
  '4':
  - type: text
    content: 'Nony namafy izy, ny voa sasany latsaka teny amoron-dalana, ka tonga ny voro-manidina nitsindroka azy rehetra. '
  '40':
  - type: text
    content: 'Koa tahaka ny anesorana ny tsimparifary sy andorana azy amin’ny afo no hatao amin’ny fiafaran’izao tontolo izao. '
  '41':
  - type: text
    content: 'Hirahin’ny Zanak’olona ny anjeliny; ary ny anjely no hanaisotra tsy ho eo amin’ny Fanjakan’ny Zanak’olona izay rehetra mpitaona ny hafa hanota sy izay mpanao ratsy, '
  '42':
  - type: text
    content: 'ka hanipy azy any anatin’ny memy mirehitra; dia any ireo no hitomany sy hikotro-nify. '
  '43':
  - type: text
    content: Amin’izay kosa ny olo-marina dia hamirapiratra tahaka ny masoandro ao amin’ny Fanjakan’ny Rainy
  - type: note
    content: Ampit Dan 13.3.
  - type: text
    content: . Izay manan-tsofina hihainoana, aoka hihaino!
  - type: heading
    content: Fanoharana momba ny harena miafina sy ny vatosoa sarobidy
  '44':
  - type: text
    content: '–Ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' dia tahaka ny harena miafina ao anaty saha. Nisy olona nahita ilay harena ka nafeniny tao ihany aloha; ary noho ny hafaliany dia lasa izy nivarotra ny fananany rehetra, ka nividy izany saha izany.'
  '45':
  - type: text
    content: '–Ary izao koa: ny Fanjakàn’ny lanitra dia tahaka ny amin’ny mpandranto mitady vatosoa. '
  '46':
  - type: text
    content: Rehefa nahita anankiray sarobidy izy, dia lasa nivarotra ny fananany rehetra, ka nividy izany vatosoa izany.
  - type: heading
    content: Fanoharana momba ny harato
  '47':
  - type: text
    content: '–Ary izao koa: ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' dia tahaka ny harato nalatsaka anaty ranomasina ka nanangona izao karazan-trondro rehetra izao. '
  '48':
  - type: text
    content: 'Rehefa feno ny harato, dia notarihina ho eny amoron-drano; ary nipetraka ny mpanarato nifantina ny tsara hataony an-karona, fa ny ratsy kosa nariany. '
  '49':
  - type: text
    content: 'Dia tahaka izany no hatao amin’ny fiafaran’izao tontolo izao; ho tonga ny anjely hanavaka ny ratsy fanahy hisaraka amin’ny olo-marina, '
  '5':
  - type: text
    content: 'Ny voa sasany latsaka tamin’ny toerana be vato sady manify nofon-tany, ka vetivety dia nitsimoka satria tsy lalina ny tany nilentehany; '
  '50':
  - type: text
    content: 'ka hanipy azy any amin’ny memy mirehitra: any ireo no hitomany sy hikotro-nify.'
  - type: heading
    content: Zava-baovao sy tranainy
  '51':
  - type: text
    content: 'Ary hoy i Jesoa tamin’ny mpianany:'
  - type: text
    content: –Efa fantatrareo ve izany rehetra izany?
  - type: text
    content: 'Ka novalian’ireo hoe:'
  - type: text
    content: –Eny, efa fantatray!
  '52':
  - type: text
    content: 'Dia hoy indray i Jesoa taminy:'
  - type: text
    content: '–Koa amin’izany àry, ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' rehetra izay nanjary '
  - type: text
    content: mpianatra
  - type: text
    content: ' ao amin’ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' dia tahaka ny tompon-drakitra izay mamoaka zava-baovao sy tranainy avy amin’ny tahirin-drakiny.'
  - type: heading
    content: Tsy inoan’ny olona tao Nazareta i Jesoa
  - type: heading
    content: (Jereo Mk 6.1-6; Lk 4.16-30)
  '53':
  - type: text
    content: 'Rehefa vitan’i Jesoa ireo '
  - type: text
    content: fanoharana
  - type: text
    content: ' ireo, dia niala teo Izy '
  '54':
  - type: text
    content: ary nankany amin’ny tanàna nahabe Azy
  - type: note
    content: 'tanàna nahabe Azy: izany hoe i Nazareta. Jereo 2.23 sy Lk 4.16.'
  - type: text
    content: '. Nampianatra ny olona tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' i Jesoa, hany ka talanjona ry zareo sady loa-bolana hoe:'
  - type: text
    content: '–Avy taiza re no nahazoan’ilay io izany fahendrena izany sy nahavitany ireny asa mahagaga ireny? '
  '55':
  - type: text
    content: Tsy ny zanak’i Jôsefa mpandrafitra ve io? Tsy i Maria ve no anaran-dreniny? Tsy i Jakôba sy i Jôsefa ary i Simôna sy i Joda ve no anaran’ireo rahalahiny
  - type: note
    content: 'Ampit Jôh 6.42. –Jôsefa (faharoa): misy stf sasany ahitana hoe Jôsèta (ampit Mk 6.3).'
  - type: text
    content: '? '
  '56':
  - type: text
    content: Ary moa tsy miara-monina amintsika avokoa ve ireo anabaviny? Koa avy taiza àry ny nahazoan’ilay io izany rehetra izany?
  '57':
  - type: text
    content: 'Dia voasakana tsy hino Azy ry zareo. Fa hoy i Jesoa taminy:'
  - type: text
    content: '– '
  - type: text
    content: Mpaminany
  - type: text
    content: ' tsy hajaina eo amin’ny tanàna nahabe azy sy eo amin’ny fianakaviany, na dia heni-kaja any an-kafa aza'
  - type: note
    content: Ampit Lk 4.24; Jôh 4.44.
  - type: text
    content: '!'
  '58':
  - type: text
    content: Ary tsy nahavita asa mahagaga firy teo i Jesoa, noho ry zareo tsy nanam-pinoana.
  '6':
  - type: text
    content: 'saingy nony nipoaka ny andro, dia nalazon’ny hafanana ireo tsimoka ireo ka maina, satria tsy namaka lalina. '
  '7':
  - type: text
    content: 'Ny voa sasany indray latsaka tany anaty tsilo; dia nitombo ny tsilo ary voageja ny tsimoka. '
  '8':
  - type: text
    content: 'Ny voa sasany kosa latsaka tamin’ny tany lonaka dia namoa: tao ny zato heny, tao ny enimpolo heny ary tao ny telopolo heny.'
  '9':
  - type: text
    content: 'Dia nofaranan’i Jesoa hoe:'
  - type: text
    content: –Izay manan-tsofina hihainoana, aoka hihaino!
  - type: heading
    content: Ny anton’ny ampiasain’i Jesoa fanoharana
  - type: heading
    content: (Jereo Mk 4.10-12; Lk 8.9-10)
