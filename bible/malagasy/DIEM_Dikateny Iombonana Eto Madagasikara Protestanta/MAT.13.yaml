    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nanolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' hafa indray tamin’ny vahoaka i Jesoa ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ' dia tahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voan-tsinapy
  - type: text
    text: ' nalain’ity lehilahy anankiray ary nafafiny tany an-tanimboliny. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Madinika indrindra amin’ny voa famafy rehetra ny voan-tsinapy, saingy rehefa maniry, dia izy no lehibe indrindra amin’ny anana rehetra sady tonga hazo; dia avy ny voro-manidina manao akany honenana ao amin’ny rantsany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Ezek 17.22-23 sy Dan 4.9,18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nilaza fanoharana hafa koa tamin’ny vahoaka i Jesoa ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny Fanjakàn’ny lanitra dia tahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: ' nalain’ity vehivavy anankiray ary nampifangaroiny tamin’ny koba eran’ny kovetabe mandra-pibohaky ny koba manontolo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanoharana sy ny fampiasan’i Jesoa azy
  marker-yv: yv-h
- type: usfm
