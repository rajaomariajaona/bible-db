  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tamin’izay dia nandao ny vahoaka i Jesoa ary nody tany an-trano; dia nanatona Azy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hazavao aminay ny hevitry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' momba ny tsimparifary nafafy an-tanimbary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny mpamafy ny voa tsara dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ny tanimbary dia izao tontolo izao; ny voa tsara dia ny olona miaina araka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ; ny tsimparifary dia ny olona andevozin’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ilay Ratsy
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ny fahavalo namafy ny tsimparifary dia ny devoly; ny taom-pijinjana dia ny fiafaran’izao tontolo izao; ary ny mpijinja dia ny anjely. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Koa tahaka ny anesorana ny tsimparifary sy andorana azy amin’ny afo no hatao amin’ny fiafaran’izao tontolo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hirahin’ny Zanak’olona ny anjeliny; ary ny anjely no hanaisotra tsy ho eo amin’ny Fanjakan’ny Zanak’olona izay rehetra mpitaona ny hafa hanota sy izay mpanao ratsy, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'ka hanipy azy any anatin’ny memy mirehitra; dia any ireo no hitomany sy hikotro-nify. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Amin’izay kosa ny olo-marina dia hamirapiratra tahaka ny masoandro ao amin’ny Fanjakan’ny Rainy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.43 '
