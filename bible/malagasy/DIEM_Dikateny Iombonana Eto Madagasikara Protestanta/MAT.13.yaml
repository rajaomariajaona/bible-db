      children:
      - type: text
        text: Sal 78.2.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hazavain’i Jesoa ny fanoharana momba ny tsimparifary nafafin’ny fahavalo
  marker-yv: yv-h
