  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanoharana
  - type: text
    text: ' no nanambaran’i Jesoa izany rehetra izany tamin’ny vahoaka. Ary tsy nanambara zavatra tamin’ny vahoaka afa-tsy tamin’ny fanoharana i Jesoa, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'hany ka tanteraka ilay voalazan’ny Tompo tamin’ny alalan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Fanoharana no hitenenako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: zavatra nafenina hatramin’ny nahariana izao tontolo izao no hambarako
  - type: usfm
    marker: f
    children:
