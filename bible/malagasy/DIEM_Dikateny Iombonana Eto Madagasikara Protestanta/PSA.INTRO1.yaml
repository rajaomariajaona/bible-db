document_id: PSA.INTRO1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: Ny anaran’ity boky ity araka ny lohateny nomen’ny dikanteny grika momba ny Testamenta Taloha azy dia Psalmoi, izany hoe poezia natao hohiraina miaraka amin’ny zava-maneno. Ny fanagasiana hoe Salamo kosa dia notakarîna tamin’ny teny latinina sy anglisy. Ny Boky Salamo dia fitambaran’ny vavaka 150 fampiasa mandritra ny fanompoam-pivavahan’ilay vahoaka Israely fahiny; misy fanampiny anankiray antsoina hoe salamo 151 aza. Ny laharana voatondro ao anaty fonon-teny dia ny an’ny dikanteny grika tranainy izay mbola fampiasa ao amin’ny Fiangonana sasany.
  - type: text
    content: Ankehitriny dia mizara ho boky dimy ny Salamo, ka ahitana antokony noraketin’ny tahirin-kira. Misy andian-tsalamo voalaza fa nataon’i Davida (Sal 51–65; 67–71; sns) sy nataon’ireo terak’i Kôra (42–49; 84–88) ary nataon’i Asafa (73–83); misy koa andian-tsalamo antsoina hoe Salamo momba ny Fanjakàn’Andriamanitra (93–99) sy Salamo fiakarana na fivahiniana masina (120–134) sns.
  - type: text
    content: Salamo miisa 116 no ahitana sasinteny fohy mialoha azy, sasinteny mety hanondro ny niaviany, ny karazany, ny zava-maneno natao hampiarahina aminy, indraindray koa ny feony, ny gaman’ny mozika anarahana azy, ny fampiasana ny salamo eo amin’ny fotoam-pivavahana, ny toe-javatra nanainga ny namoronana azy, sns.
  - type: text
    content: 'Maro ny salamo tsy hita izay hisokajiana azy. Na izany aza anefa dia azo atao ny manatsitokotoko ny salamo ho karazany maromaro:'
  - type: text
    content: 1) Ny
  - type: text
    content: ' salamo fiderana '
  - type: text
    content: 'dia mankalaza ny halehibiazana aman-katsaram-pon’ny Tompo: Sal 8; 10; 33; 100; 103–105; 111; 113; 114; 117; 135; 136; 145–149.'
  - type: text
    content: 2) Ny
  - type: text
    content: ' salamo momba ny Fanjakàn’Andriamanitra '
  - type: text
    content: 'dia voamariky ny fanamafisana fa «Ny Tompo no mpanjaka»: 47; 93; 96–99.'
  - type: text
    content: 3) Ny
  - type: text
    content: ' salamo momba ny mpanjaka '
  - type: text
    content: 'dia vavaka ho an’ny mpanjaka na vavaky ny mpanjaka: 2; 18; 20; 21; 45; 72; 89; 101; 110; 114.'
  - type: text
    content: 4) Ny
  - type: text
    content: ' salamo fidirana ao an-tempoly: '
  - type: text
    content: 15; 24.
  - type: text
    content: 5) Ny
  - type: text
    content: ' salamo fiakarana na fivahiniana masina '
  - type: text
    content: 'dia fihiran’ny Israelita izay mandeha any Jerosalema amin’ireo fety lehibe telo ankalazaina isan-taona (Paska, Pentekôsta na fetin’ny Herinandro, fetin’ny Tranotomboka): 84; 91; 121; 122.'
  - type: text
    content: 6) Ny
  - type: text
    content: ' hira momba an’i Tsiôna '
  - type: text
    content: 'dia mankalaza ny tombontsoan’io toerana io izay nofidin’Andriamanitra hiorenan’ny tempoly tao Jerosalema: 46; 48; 76; 87; 132.'
  - type: text
    content: 7) Ny
  - type: text
    content: ' salamo misy hafatra '
  - type: text
    content: 'dia manome fampitandremana na torolalana avy amin’Andriamanitra ho an’ny mpino ka ampitain’ny mpaminany na mpisorona: 14; 50; 53; 75; 81; 95.'
  - type: text
    content: 8) Ny
  - type: text
    content: ' salamo natao hampianarana ny mpino: '
  - type: text
    content: 37; 49; 73; 78; 112; 127; 133; ary azo atambatra amin’ireo ny Sal 1 sy 119.
  - type: text
    content: 9) Rehefa iharan-doza ny fikambanan’ny mpino, dia ny
  - type: text
    content: ' salamon’ny vahoaka tra-pahoriana '
  - type: text
    content: 'no maneho ny antso ataony amin’Andriamanitra: 12; 44; 58; 60; 74; 79; 80; 83; 85; 90; 94; 106; 108; 123; 126; 137.'
  - type: text
    content: 10) Ny fahoriana isan-karazany (fanenjehana, endrikendrika, aretina, sesitany, sns...) dia mety hitarika ny mpino isam-batan’olona hitady vonjy amin’Andriamanitra. Ireny
  - type: text
    content: ' salamo fitalahoana ataon’olon-drery '
  - type: text
    content: 'ireny no karazany iray maro isa indrindra ao amin’ny salamo: 5-7; 13; 17; 22; 25; 26; 28; 31; 35; 38; 39; 41–43; 51; 54; 57; 59; 61; 63; 64; 69–71; 86; 88; 102; 109; 120; 130; 140–143.'
  - type: text
    content: 11) Ao amin’ny
  - type: text
    content: ' salamo fisaorana '
  - type: text
    content: 'no ilazan’ny mpino amin’Andriamanitra ny fankasitrahany Azy noho ny fanafahana na noho ny famelan-keloka nomeny: 9–10; 30; 32; 34; 40.1-12; 92; 107; 116; 118.'
  - type: text
    content: 12) Farany, dia ao amin’ireo
  - type: text
    content: ' salamo fitokiana '
  - type: text
    content: 'no anehoan’ny mpino izay hafaliana sy fiadanana tsapany: 3; 4; 11; 16; 23; 62; 131; 139.'
  - type: text
    content: Nihira ny salamo i Jesoa (Mk 14.26). Nampiasa matetika ny salamo Izy na tamin’ny fampianarany (Mk 12.10; 12.36 sy ny andininy mirazotra aminy, izay ahatsiahivana ny Sal 118.22-23 sy 110.1), na tamin’ny tonom-bavaka manokana nataony (Mk 15.34 sy ny and mirazotra aminy; Lk 23.46 izay amerenan’i Jesoa teny vitsivitsy avy ao amin’ny Sal 22 sy 31).
  - type: text
    content: Ao amin’ny Salamo –ary koa ao amin’ireo boky sisa hafa rehetra ao amin’ny Testamenta Taloha– dia ahitan’ny Testamenta Vaovao filazana mialoha ny amin’i Kristy, na ny amin’ny fijaliany (ny Sal 22 sy 69, ohatra, dia voatsiahy imbetsaka ao amin’ny Mt 27.34-48), na ny amin’ny fitsanganany ho velona sy fanomezam-boninahitra Azy (ohatra ny Sal 16 sy 110 ary 118 dia misy and voatsiahy ao amin’ny lahatenin’i Petera izay taterina ao amin’ny Asa 2 sy 4). Ao amin’ny Testamenta Vaovao dia voatsiahy mihoatra ny injato ny salamo raha atambatra.
  - type: text
    content: Vavaky ny vahoaka Israely sy vavak’i Jesoa ary vavak’ireo kristianina voalohany ny salamo ka nijanona mandraka ankehitriny ho loharano nanovozana ary mbola hanovozana ho an’ny olona rehetra izay mitady ny voambolan’Andriamanitra mba hitenenana amin’Andriamanitra.
