document_id: PSA.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny anaran’ity boky ity araka ny lohateny nomen’ny dikanteny grika momba ny Testamenta Taloha azy dia Psalmoi, izany hoe poezia natao hohiraina miaraka amin’ny zava-maneno. Ny fanagasiana hoe Salamo kosa dia notakarîna tamin’ny teny latinina sy anglisy. Ny Boky Salamo dia fitambaran’ny vavaka 150 fampiasa mandritra ny fanompoam-pivavahan’ilay vahoaka Israely fahiny; misy fanampiny anankiray antsoina hoe salamo 151 aza. Ny laharana voatondro ao anaty fonon-teny dia ny an’ny dikanteny grika tranainy izay mbola fampiasa ao amin’ny Fiangonana sasany.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ankehitriny dia mizara ho boky dimy ny Salamo, ka ahitana antokony noraketin’ny tahirin-kira. Misy andian-tsalamo voalaza fa nataon’i Davida (Sal 51–65; 67–71; sns) sy nataon’ireo terak’i Kôra (42–49; 84–88) ary nataon’i Asafa (73–83); misy koa andian-tsalamo antsoina hoe Salamo momba ny Fanjakàn’Andriamanitra (93–99) sy Salamo fiakarana na fivahiniana masina (120–134) sns.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Salamo miisa 116 no ahitana sasinteny fohy mialoha azy, sasinteny mety hanondro ny niaviany, ny karazany, ny zava-maneno natao hampiarahina aminy, indraindray koa ny feony, ny gaman’ny mozika anarahana azy, ny fampiasana ny salamo eo amin’ny fotoam-pivavahana, ny toe-javatra nanainga ny namoronana azy, sns.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Maro ny salamo tsy hita izay hisokajiana azy. Na izany aza anefa dia azo atao ny manatsitokotoko ny salamo ho karazany maromaro:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 1) Ny
  - type: text
    text: ' salamo fiderana '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'dia mankalaza ny halehibiazana aman-katsaram-pon’ny Tompo: Sal 8; 10; 33; 100; 103–105; 111; 113; 114; 117; 135; 136; 145–149.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 2) Ny
  - type: text
    text: ' salamo momba ny Fanjakàn’Andriamanitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'dia voamariky ny fanamafisana fa «Ny Tompo no mpanjaka»: 47; 93; 96–99.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 3) Ny
  - type: text
    text: ' salamo momba ny mpanjaka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'dia vavaka ho an’ny mpanjaka na vavaky ny mpanjaka: 2; 18; 20; 21; 45; 72; 89; 101; 110; 114.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 4) Ny
  - type: text
    text: ' salamo fidirana ao an-tempoly: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 15; 24.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 5) Ny
  - type: text
    text: ' salamo fiakarana na fivahiniana masina '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'dia fihiran’ny Israelita izay mandeha any Jerosalema amin’ireo fety lehibe telo ankalazaina isan-taona (Paska, Pentekôsta na fetin’ny Herinandro, fetin’ny Tranotomboka): 84; 91; 121; 122.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 6) Ny
  - type: text
    text: ' hira momba an’i Tsiôna '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'dia mankalaza ny tombontsoan’io toerana io izay nofidin’Andriamanitra hiorenan’ny tempoly tao Jerosalema: 46; 48; 76; 87; 132.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 7) Ny
  - type: text
    text: ' salamo misy hafatra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'dia manome fampitandremana na torolalana avy amin’Andriamanitra ho an’ny mpino ka ampitain’ny mpaminany na mpisorona: 14; 50; 53; 75; 81; 95.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 8) Ny
  - type: text
    text: ' salamo natao hampianarana ny mpino: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 37; 49; 73; 78; 112; 127; 133; ary azo atambatra amin’ireo ny Sal 1 sy 119.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 9) Rehefa iharan-doza ny fikambanan’ny mpino, dia ny
  - type: text
    text: ' salamon’ny vahoaka tra-pahoriana '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'no maneho ny antso ataony amin’Andriamanitra: 12; 44; 58; 60; 74; 79; 80; 83; 85; 90; 94; 106; 108; 123; 126; 137.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 10) Ny fahoriana isan-karazany (fanenjehana, endrikendrika, aretina, sesitany, sns...) dia mety hitarika ny mpino isam-batan’olona hitady vonjy amin’Andriamanitra. Ireny
  - type: text
    text: ' salamo fitalahoana ataon’olon-drery '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'ireny no karazany iray maro isa indrindra ao amin’ny salamo: 5-7; 13; 17; 22; 25; 26; 28; 31; 35; 38; 39; 41–43; 51; 54; 57; 59; 61; 63; 64; 69–71; 86; 88; 102; 109; 120; 130; 140–143.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 11) Ao amin’ny
  - type: text
    text: ' salamo fisaorana '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'no ilazan’ny mpino amin’Andriamanitra ny fankasitrahany Azy noho ny fanafahana na noho ny famelan-keloka nomeny: 9–10; 30; 32; 34; 40.1-12; 92; 107; 116; 118.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 12) Farany, dia ao amin’ireo
  - type: text
    text: ' salamo fitokiana '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'no anehoan’ny mpino izay hafaliana sy fiadanana tsapany: 3; 4; 11; 16; 23; 62; 131; 139.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nihira ny salamo i Jesoa (Mk 14.26). Nampiasa matetika ny salamo Izy na tamin’ny fampianarany (Mk 12.10; 12.36 sy ny andininy mirazotra aminy, izay ahatsiahivana ny Sal 118.22-23 sy 110.1), na tamin’ny tonom-bavaka manokana nataony (Mk 15.34 sy ny and mirazotra aminy; Lk 23.46 izay amerenan’i Jesoa teny vitsivitsy avy ao amin’ny Sal 22 sy 31).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ao amin’ny Salamo –ary koa ao amin’ireo boky sisa hafa rehetra ao amin’ny Testamenta Taloha– dia ahitan’ny Testamenta Vaovao filazana mialoha ny amin’i Kristy, na ny amin’ny fijaliany (ny Sal 22 sy 69, ohatra, dia voatsiahy imbetsaka ao amin’ny Mt 27.34-48), na ny amin’ny fitsanganany ho velona sy fanomezam-boninahitra Azy (ohatra ny Sal 16 sy 110 ary 118 dia misy and voatsiahy ao amin’ny lahatenin’i Petera izay taterina ao amin’ny Asa 2 sy 4). Ao amin’ny Testamenta Vaovao dia voatsiahy mihoatra ny injato ny salamo raha atambatra.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vavaky ny vahoaka Israely sy vavak’i Jesoa ary vavak’ireo kristianina voalohany ny salamo ka nijanona mandraka ankehitriny ho loharano nanovozana ary mbola hanovozana ho an’ny olona rehetra izay mitady ny voambolan’Andriamanitra mba hitenenana amin’Andriamanitra.
