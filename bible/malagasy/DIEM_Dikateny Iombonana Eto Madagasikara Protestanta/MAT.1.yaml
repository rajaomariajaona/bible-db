document_id: MAT.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Taranak’i Davida sy taranak’i Abrahama i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 3.23-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fitanisana ny razan’i Jesoa Kristy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Fitanisana... Kristy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bokin’ny tetiaran’i Jesoa Kristy.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Isan’ny karazan-dahatsoratra fampiasan’ny Baiboly ny tetiarana (Jereo Gen 5; Rot 4.18-22; 1 Tan 1 snm).'
    marker-yv: yv-n
  - type: text
    text: ', taranak’i Davida, dia i Davida taranak’i Abrahama.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I Abrahama no ray niteraka an’i Itsehàka, i Itsehàka, ray niteraka an’i Jakôba; i Jakôba, ray niteraka an’i Joda mirahalahy avy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I Joda, ray niteraka an’i Farèsa sy i Zara (ary dia i Tamara no renin’izy roa lahy); i Farèsa, ray niteraka an’i Hesrôna; i Hesrôna, ray niteraka an’i Arama. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I Arama, ray niteraka an’i Haminadàba; i Haminadàba, ray niteraka an’i Nahasôna; i Nahasôna, ray niteraka an’i Salmôna. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I Salmôna, ray niteraka an’i Bôhaza (ary dia i Rahaba no reniny); i Bôhaza, ray niteraka an’i Ôbeda (ary i Rota no reniny); i Ôbeda, ray niteraka an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jisay
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: i Jisay, ray niteraka an’i Davida mpanjaka.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Davida kosa no ray niteraka an’i Salômôna (ary dia ny vadin’i Orià no reniny); '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'i Salômôna, ray niteraka an’i Rehabohàma; i Rehabohàma, ray niteraka an’i Abià; i Abià, ray niteraka an’i Asà. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I Asà, ray niteraka an’i Jôsafata; i Jôsafata, ray niteraka an’i Jôrama; i Jôrama, ray niteraka an’i Ozià. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I Ozià, ray niteraka an’i Jôtama; i Jôtama, ray niteraka an’i Ahaza; i Ahaza, ray niteraka an’i Hezekià. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I Hezekià, ray niteraka an’i Manase; i Manase, ray niteraka an’i Amôna; i Amôna, ray niteraka an’i Jôsià. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I Jôsià, ray niteraka an’i Jekônià mirahalahy avy. Tamin’izany no nahababo ny vahoaka israelita tany Babilôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 24.12-16
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Taorian’ny nahababo ny vahoaka israelita tany Babilôna kosa dia izao: i Jekônià no ray niteraka an’i Sealtièla; i Sealtièla, ray niteraka an’i Zerobabèla. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I Zerobabèla, ray niteraka an’i Abihoda; i Abihoda, ray niteraka an’i Eliakîma; i Eliakîma, ray niteraka an’i Azôra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I Azôra, ray niteraka an’i Sadôka; i Sadôka, ray niteraka an’i Akima; i Akima, ray niteraka an’i Elihoda. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I Elihoda, ray niteraka an’i Eleazara; i Eleazara, ray niteraka an’i Matàna; i Matàna, ray niteraka an’i Jakôba. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I Jakôba, ray niteraka an’i Jôsefa vadin’i Maria; ary dia i Maria no reny niteraka an’i Jesoa, ilay atao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa 14 izany no isan’ny taranaka rehetra hatramin’i Abrahama ka hatramin’i Davida; 14 koa hatramin’i Davida ka hatramin’ny nahababo ny vahoaka israelita tany Babilôna ka hatramin’ny Mesia.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zanak’i Jôsefa sady Andriamanitra miaraka amintsika i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 2.1-7)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Toy izao no nahaterahan’i Jesoa Kristy. Efa fofombadin’i Jôsefa i Maria renin’i Jesoa tamin’izay; raha mbola tsy niray trano anefa izy roa dia hita fa nitoe-jaza i Maria noho ny asan’ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Olo-marina i Jôsefa vadiny, ka tsy te hanala baràka azy, fa nikasa hametraka azy mangingina. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Raha mbola nieritreritra izany izy, dia nisehoan’
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjelin
  - type: text
    text: '’ny Tompo tamin’ny nofy ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry Jôsefa taranak’i Davida ô, aza matahotra ny hampakatra an’i Maria vadinao! Noho ny asan’ny Fanahy Masina tokoa no nampitoe-jaza azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ho tera-dahy izy ka i Jesoa no anarana hiantsoanao ny zaza: fa io zaza io no hamonjy ny vahoakany ho afaka amin’ny fahotany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny hoe '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Jesoa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mitovy amin’ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Josoa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ihany ka midika hoe: Ny Tompo no famonjena (na hoe ny Tompo no manome ny famonjena).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izany rehetra izany no tonga dia mba ho tanteraka ilay voalazan’ny Tompo tamin’ny alalan’ny mpaminany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: «Indro hitoe-jaza ny virijiny ka ho tera-dahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny anarana hiantsoana ny zaza dia Himanoela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 7.14, voatsiahy araka ny dkt grika tranainy Septoazinta, somary nisy novan’i Matio variraiventy.
    marker-yv: yv-n
  - type: text
    text: ',»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: (izany hoe «miaraka amintsika Andriamanitra»).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vao nifoha maraina i Jôsefa dia nanatontosa izay nandidian’ilay anjelin’ny Tompo azy, ka nampakatra an’i Maria vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy niray tamin’i Maria i Jôsefa mandra-pahatera-dahy an’i Maria; ary i Jesoa no anarana niantsoan’i Jôsefa ny zaza.
