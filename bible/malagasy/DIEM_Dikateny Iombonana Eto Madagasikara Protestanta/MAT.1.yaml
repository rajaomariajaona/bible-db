document_id: MAT.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Taranak’i Davida sy taranak’i Abrahama i Jesoa
  - type: heading
    content: (Jereo Lk 3.23-38)
  - type: text
    content: Fitanisana ny razan’i Jesoa Kristy
  - type: note
    content: 'Fitanisana... Kristy: dkt hafa Bokin’ny tetiaran’i Jesoa Kristy. Isan’ny karazan-dahatsoratra fampiasan’ny Baiboly ny tetiarana (Jereo Gen 5; Rot 4.18-22; 1 Tan 1 snm).'
  - type: text
    content: ', taranak’i Davida, dia i Davida taranak’i Abrahama.'
  '10':
  - type: text
    content: 'I Hezekià, ray niteraka an’i Manase; i Manase, ray niteraka an’i Amôna; i Amôna, ray niteraka an’i Jôsià. '
  '11':
  - type: text
    content: I Jôsià, ray niteraka an’i Jekônià mirahalahy avy. Tamin’izany no nahababo ny vahoaka israelita tany Babilôna
  - type: note
    content: Jereo 2 Mp 24.12-16
  - type: text
    content: .
  '12':
  - type: text
    content: 'Taorian’ny nahababo ny vahoaka israelita tany Babilôna kosa dia izao: i Jekônià no ray niteraka an’i Sealtièla; i Sealtièla, ray niteraka an’i Zerobabèla. '
  '13':
  - type: text
    content: 'I Zerobabèla, ray niteraka an’i Abihoda; i Abihoda, ray niteraka an’i Eliakîma; i Eliakîma, ray niteraka an’i Azôra. '
  '14':
  - type: text
    content: 'I Azôra, ray niteraka an’i Sadôka; i Sadôka, ray niteraka an’i Akima; i Akima, ray niteraka an’i Elihoda. '
  '15':
  - type: text
    content: 'I Elihoda, ray niteraka an’i Eleazara; i Eleazara, ray niteraka an’i Matàna; i Matàna, ray niteraka an’i Jakôba. '
  '16':
  - type: text
    content: 'I Jakôba, ray niteraka an’i Jôsefa vadin’i Maria; ary dia i Maria no reny niteraka an’i Jesoa, ilay atao hoe '
  - type: text
    content: Mesia
  - type: text
    content: .
  '17':
  - type: text
    content: Koa 14 izany no isan’ny taranaka rehetra hatramin’i Abrahama ka hatramin’i Davida; 14 koa hatramin’i Davida ka hatramin’ny nahababo ny vahoaka israelita tany Babilôna ka hatramin’ny Mesia.
  - type: heading
    content: Zanak’i Jôsefa sady Andriamanitra miaraka amintsika i Jesoa
  - type: heading
    content: (Jereo Lk 2.1-7)
  '18':
  - type: text
    content: 'Toy izao no nahaterahan’i Jesoa Kristy. Efa fofombadin’i Jôsefa i Maria renin’i Jesoa tamin’izay; raha mbola tsy niray trano anefa izy roa dia hita fa nitoe-jaza i Maria noho ny asan’ny Fanahy Masina. '
  '19':
  - type: text
    content: 'Olo-marina i Jôsefa vadiny, ka tsy te hanala baràka azy, fa nikasa hametraka azy mangingina. '
  '2':
  - type: text
    content: 'I Abrahama no ray niteraka an’i Itsehàka, i Itsehàka, ray niteraka an’i Jakôba; i Jakôba, ray niteraka an’i Joda mirahalahy avy. '
  '20':
  - type: text
    content: Raha mbola nieritreritra izany izy, dia nisehoan’
  - type: text
    content: anjelin
  - type: text
    content: '’ny Tompo tamin’ny nofy ka nilazany hoe:'
  - type: text
    content: '–Ry Jôsefa taranak’i Davida ô, aza matahotra ny hampakatra an’i Maria vadinao! Noho ny asan’ny Fanahy Masina tokoa no nampitoe-jaza azy. '
  '21':
  - type: text
    content: 'Ary ho tera-dahy izy ka i Jesoa no anarana hiantsoanao ny zaza: fa io zaza io no hamonjy ny vahoakany ho afaka amin’ny fahotany'
  - type: note
    content: 'Ny hoe Jesoa dia mitovy amin’ny hoe Josoa ihany ka midika hoe: Ny Tompo no famonjena (na hoe ny Tompo no manome ny famonjena).'
  - type: text
    content: .
  '22':
  - type: text
    content: 'Izany rehetra izany no tonga dia mba ho tanteraka ilay voalazan’ny Tompo tamin’ny alalan’ny mpaminany hoe:'
  '23':
  - type: text
    content: «Indro hitoe-jaza ny virijiny ka ho tera-dahy;
  - type: text
    content: ary ny anarana hiantsoana ny zaza dia Himanoela
  - type: note
    content: Is 7.14, voatsiahy araka ny dkt grika tranainy Septoazinta, somary nisy novan’i Matio variraiventy.
  - type: text
    content: ',»'
  - type: text
    content: (izany hoe «miaraka amintsika Andriamanitra»).
  '24':
  - type: text
    content: 'Vao nifoha maraina i Jôsefa dia nanatontosa izay nandidian’ilay anjelin’ny Tompo azy, ka nampakatra an’i Maria vadiny. '
  '25':
  - type: text
    content: Tsy niray tamin’i Maria i Jôsefa mandra-pahatera-dahy an’i Maria; ary i Jesoa no anarana niantsoan’i Jôsefa ny zaza.
  '3':
  - type: text
    content: 'I Joda, ray niteraka an’i Farèsa sy i Zara (ary dia i Tamara no renin’izy roa lahy); i Farèsa, ray niteraka an’i Hesrôna; i Hesrôna, ray niteraka an’i Arama. '
  '4':
  - type: text
    content: 'I Arama, ray niteraka an’i Haminadàba; i Haminadàba, ray niteraka an’i Nahasôna; i Nahasôna, ray niteraka an’i Salmôna. '
  '5':
  - type: text
    content: 'I Salmôna, ray niteraka an’i Bôhaza (ary dia i Rahaba no reniny); i Bôhaza, ray niteraka an’i Ôbeda (ary i Rota no reniny); i Ôbeda, ray niteraka an’i '
  - type: text
    content: Jisay
  - type: text
    content: '; '
  '6':
  - type: text
    content: i Jisay, ray niteraka an’i Davida mpanjaka.
  - type: text
    content: 'I Davida kosa no ray niteraka an’i Salômôna (ary dia ny vadin’i Orià no reniny); '
  '7':
  - type: text
    content: 'i Salômôna, ray niteraka an’i Rehabohàma; i Rehabohàma, ray niteraka an’i Abià; i Abià, ray niteraka an’i Asà. '
  '8':
  - type: text
    content: 'I Asà, ray niteraka an’i Jôsafata; i Jôsafata, ray niteraka an’i Jôrama; i Jôrama, ray niteraka an’i Ozià. '
  '9':
  - type: text
    content: 'I Ozià, ray niteraka an’i Jôtama; i Jôtama, ray niteraka an’i Ahaza; i Ahaza, ray niteraka an’i Hezekià. '
