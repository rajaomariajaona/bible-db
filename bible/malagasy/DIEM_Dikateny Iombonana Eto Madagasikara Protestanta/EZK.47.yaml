document_id: EZK.47,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loharanon’ny tempoly
  - type: text
    content: 'Ary nitondra ahy niverina ho eo am-pidirana amin’ny tempoly ralehilahy. Koa hitako fa nisy rano niboiboika avy tao ambanin’ny tokonana atsinanana, fa nitodika niantsinanana ny '
  - type: text
    content: tempoly
  - type: text
    content: '. Io rano io dia nidina teo ambanin’ny lafiny ankavanan’ny tempoly ka nandalo teo atsimon’ny '
  - type: text
    content: alitara
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ary manomboka eo Haîna-Gedỳ ka hatrany Haîna-Heglaima, dia hisy mpanarato hanahy ny haratony eny amoron’io ranomasina io. Fa hahitana trondro marobe isan-karazany ao tahaka ny any amin’ny Ranomasina Mediteranea. '
  '11':
  - type: text
    content: 'Nefa kosa ireo heniheny sy honahona eo amoron-tsiraka dia tsy hodiovina fa havela ho fakana sira. '
  '12':
  - type: text
    content: Ary eny amoron’ny ony an-daniny roa dia hanirian’ny hazo fihinam-boa isan-karazany. Tsy halazo na oviana na oviana ny raviny ary tsy hitsahatra ny voany, fa hamoa isam-bolana izy satria voatondrak’ilay rano mivoaka avy ao amin’ny tempoly. Ny voany dia hatao sakafo, ary ny raviny hatao fanafody.»
  - type: heading
    content: Araikitry ny Tompo ny sisin-tanin’i Israely.
  '13':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Toy izao no faritry ny tany izay hifampizaràn’ny foko israelita roa ambin’ny folo, ka hahazoan’ny fokon’i Jôsefa anjaran-droa'
  - type: note
    content: Mahazo anjaran-droa i Jôsefa satria izy no rain’i Efraîma sy i Manase izay natsangan’i Jakôba (jereo Gen 48) ary hatreo dia nisaina ho isan’ny foko israelita roa ambin’ny folo niaraka tamin’ireo zanakalahin’i Jakôba hafa (and 21).
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Samy hanana anjara faritany mitovy ny foko tsirairay. Efa nianiana manko Aho fa homeko ny razanareo ity tany ity, ka ho azonareo ho fanananareo. '
  '15':
  - type: text
    content: 'Toy izao no faritry ny tany: Ny sisin-tany avaratra dia hiainga eo amin’ny Ranomasina Mediteranea, ka hanaraka ny lalana mankany Hetlôna sy Lebô-Hamata ary Tsedada; '
  '16':
  - type: text
    content: 'avy eo dia mandalo ny tanàna Berôtà sy Sibraîma anelanelan’ny fanjakan’i Damasy sy fanjakan’i Hamata ary mandalo ny tanàna Hatsara-Henôna ao akaikin’ny sisin-tanin’i Haoràna. '
  '17':
  - type: text
    content: 'Izany sisin-tany izany dia miainga eo amin’ny Ranomasina Mediteranea ka hatrany Hatsara-Henôna any atsinanana. Any avaratra izy dia voafefin’ny fanjakan’i Damasy sy i Hamata. Izay no sisin-tany avaratra. '
  '18':
  - type: text
    content: Ny sisin-tany atsinanana kosa dia hiainga eo Hatsara-Henôna anelanelan’i Damasy sy i Haoràna, ka hanaraka ny lohasahan’i Jôrdàna eo anelanelan’ny faritanin’i Gilehada sy ny tanin’i Israely, ary hipaka any Tamara
  - type: note
    content: 'eo anelanelan’ny faritanin’i Gilehada sy ny tanin’i Israely: misy faritra sasany eny am-pitan’i Jôrdàna nomena ny fokon’i Israely, kanefa ireny dia tsy isan’ny tany lova nampanantenain’ny Tompo (jereo Nom 34.12; Jos 22.19,25). –Tamara: araka ny dkt tranainy grika sy siriaka ary ny and 19, fa ny RM kosa manao hoe horefesinareo.'
  - type: text
    content: 'eo amoron’ny Ranomasina Maty. Izay no sisin-tany atsinanana. '
  '19':
  - type: text
    content: Ny sisin-tany atsimo dia hiainga eo Tamara ka hipaka hatrany amin’ny ranon’i Meribà any Kadesy, ary hanaraka ny ranon-driakan’i Ejipta
  - type: note
    content: 'ny ranon-driakan’i Ejipta: jereo Nom 34.5 sy nta.'
  - type: text
    content: ' ka hipaka eo amin’ny Ranomasina Mediteranea. Izay no sisin-tany atsimo. '
  '2':
  - type: text
    content: 'Dia nitondra ahy nivoaka ny tempoly tamin’ny vavahady avaratra izy ka nampandeha ahy nanodidina tany ivelany hipaka amin’ny vavahady atsinanana. Ary indro avy teo ankavanan’ity vavahady ity no nikoriana ny rano. '
  '20':
  - type: text
    content: Ny sisin-tany andrefana kosa dia ny Ranomasina Mediteranea no mamaritra azy hatreo atsimo ka hatrany Lebô-Hamata any avaratra. Izay no sisin-tany andrefana.
  '21':
  - type: text
    content: '«Hifampizarànareo foko israelita io tany io. '
  '22':
  - type: text
    content: 'Antsapaka no hizarànareo azy ho anareo ary koa ho an’ny vahiny mipetraka sy efa miteraka eo aminareo. Ireny koa dia tokony hoentinareo tahaka ny Israelita ka ho valovotaka hahazo zaratany antsapaka eo anivon’ny fokon’i Israely. '
  '23':
  - type: text
    content: Samy homenareo ny anjarany avy eo amin’ny foko izay hipetrahany ny vahiny. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '3':
  - type: text
    content: 'Nandroso niantsinanana ralehilahy, nitana tady izay nandrefesany dimanjato metatra niantsinanana. Avy eo dia nampita ahy ny rano izy ka hatreny an-kitrokeliko izany. '
  '4':
  - type: text
    content: 'Dia nandrefy dimanjato metatra indray izy, ary nampita ahy ny rano ka hatreny an-dohaliko izany. Nony afaka dimanjato metatra manaraka dia nampita ahy ny rano indray izy, ka hatreny andilako ny rano. '
  '5':
  - type: text
    content: 'Nandrefy dimanjato metatra indray izy, ka ony tsy azoko niampitana intsony ny rano fa efa nihalalina. Eny, ony tsy azo iampitana intsony izy raha tsy amin’ny lomano. '
  '6':
  - type: text
    content: 'Ary hoy ralehilahy tamiko: «Hitanao tsara ve izany, ry ilay taranak’olombelona?» Dia nentiny nihataka kely aho, vao naveriny indray hankeo amoron’ny ony. '
  '7':
  - type: text
    content: 'Rehefa tafaverina teo aho, dia hitako fa nisy hazo marobe teny amoron’ny ony an-daniny roa. '
  '8':
  - type: text
    content: 'Ary hoy ralehilahy tamiko: «Mizotra hankany amin’ny faritra atsinanana ity ony ity ka midina ny lohasahan’i Jôrdàna ary mivarina eo amin’ny Ranomasina Maty. Rehefa tonga eo an-dranomasina izy, dia manavao ny ranony hanjary hahasalama'
  - type: note
    content: Ny Ranomasina Maty dia be sira loatra ka tsy misy zava-miaina afaka hivelona ao raha tsy hoe diovina hahasalama angaha ny ranony, jereo Eks 15.23-35; 2 Mp 2.21-22.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Hifanaretsaka ny zava-miaina isan-karazany ary hitombo marobe ny trondro, na aiza na aiza hivarinan’ilay ony. Fa hanadio ny ranomasina izany; ka any amin’izay hivarinany dia hitondrany aina. '
