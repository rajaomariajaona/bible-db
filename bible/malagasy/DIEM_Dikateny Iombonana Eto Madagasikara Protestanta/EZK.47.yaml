document_id: EZK.47
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loharanon’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nitondra ahy niverina ho eo am-pidirana amin’ny tempoly ralehilahy. Koa hitako fa nisy rano niboiboika avy tao ambanin’ny tokonana atsinanana, fa nitodika niantsinanana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: '. Io rano io dia nidina teo ambanin’ny lafiny ankavanan’ny tempoly ka nandalo teo atsimon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nitondra ahy nivoaka ny tempoly tamin’ny vavahady avaratra izy ka nampandeha ahy nanodidina tany ivelany hipaka amin’ny vavahady atsinanana. Ary indro avy teo ankavanan’ity vavahady ity no nikoriana ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nandroso niantsinanana ralehilahy, nitana tady izay nandrefesany dimanjato metatra niantsinanana. Avy eo dia nampita ahy ny rano izy ka hatreny an-kitrokeliko izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nandrefy dimanjato metatra indray izy, ary nampita ahy ny rano ka hatreny an-dohaliko izany. Nony afaka dimanjato metatra manaraka dia nampita ahy ny rano indray izy, ka hatreny andilako ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nandrefy dimanjato metatra indray izy, ka ony tsy azoko niampitana intsony ny rano fa efa nihalalina. Eny, ony tsy azo iampitana intsony izy raha tsy amin’ny lomano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy ralehilahy tamiko: «Hitanao tsara ve izany, ry ilay taranak’olombelona?» Dia nentiny nihataka kely aho, vao naveriny indray hankeo amoron’ny ony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa tafaverina teo aho, dia hitako fa nisy hazo marobe teny amoron’ny ony an-daniny roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy ralehilahy tamiko: «Mizotra hankany amin’ny faritra atsinanana ity ony ity ka midina ny lohasahan’i Jôrdàna ary mivarina eo amin’ny Ranomasina Maty. Rehefa tonga eo an-dranomasina izy, dia manavao ny ranony hanjary hahasalama'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ranomasina Maty
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia be sira loatra ka tsy misy zava-miaina afaka hivelona ao raha tsy hoe diovina hahasalama angaha ny ranony, jereo Eks 15.23-35; 2 Mp 2.21-22.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hifanaretsaka ny zava-miaina isan-karazany ary hitombo marobe ny trondro, na aiza na aiza hivarinan’ilay ony. Fa hanadio ny ranomasina izany; ka any amin’izay hivarinany dia hitondrany aina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary manomboka eo Haîna-Gedỳ ka hatrany Haîna-Heglaima, dia hisy mpanarato hanahy ny haratony eny amoron’io ranomasina io. Fa hahitana trondro marobe isan-karazany ao tahaka ny any amin’ny Ranomasina Mediteranea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nefa kosa ireo heniheny sy honahona eo amoron-tsiraka dia tsy hodiovina fa havela ho fakana sira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary eny amoron’ny ony an-daniny roa dia hanirian’ny hazo fihinam-boa isan-karazany. Tsy halazo na oviana na oviana ny raviny ary tsy hitsahatra ny voany, fa hamoa isam-bolana izy satria voatondrak’ilay rano mivoaka avy ao amin’ny tempoly. Ny voany dia hatao sakafo, ary ny raviny hatao fanafody.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Araikitry ny Tompo ny sisin-tanin’i Israely.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Toy izao no faritry ny tany izay hifampizaràn’ny foko israelita roa ambin’ny folo, ka hahazoan’ny fokon’i Jôsefa anjaran-droa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mahazo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anjaran-droa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' i Jôsefa satria izy no rain’i Efraîma sy i Manase izay natsangan’i Jakôba (jereo Gen 48) ary hatreo dia nisaina ho isan’ny foko israelita roa ambin’ny folo niaraka tamin’ireo zanakalahin’i Jakôba hafa (and 21).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Samy hanana anjara faritany mitovy ny foko tsirairay. Efa nianiana manko Aho fa homeko ny razanareo ity tany ity, ka ho azonareo ho fanananareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Toy izao no faritry ny tany: Ny sisin-tany avaratra dia hiainga eo amin’ny Ranomasina Mediteranea, ka hanaraka ny lalana mankany Hetlôna sy Lebô-Hamata ary Tsedada; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'avy eo dia mandalo ny tanàna Berôtà sy Sibraîma anelanelan’ny fanjakan’i Damasy sy fanjakan’i Hamata ary mandalo ny tanàna Hatsara-Henôna ao akaikin’ny sisin-tanin’i Haoràna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izany sisin-tany izany dia miainga eo amin’ny Ranomasina Mediteranea ka hatrany Hatsara-Henôna any atsinanana. Any avaratra izy dia voafefin’ny fanjakan’i Damasy sy i Hamata. Izay no sisin-tany avaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny sisin-tany atsinanana kosa dia hiainga eo Hatsara-Henôna anelanelan’i Damasy sy i Haoràna, ka hanaraka ny lohasahan’i Jôrdàna eo anelanelan’ny faritanin’i Gilehada sy ny tanin’i Israely, ary hipaka any Tamara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'eo anelanelan’ny faritanin’i Gilehada sy ny tanin’i Israely: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: misy faritra sasany eny am-pitan’i Jôrdàna nomena ny fokon’i Israely, kanefa ireny dia tsy isan’ny tany lova nampanantenain’ny Tompo (jereo Nom 34.12; Jos 22.19,25). –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tamara
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': araka ny dkt tranainy grika sy siriaka ary ny and 19, fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: horefesinareo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'eo amoron’ny Ranomasina Maty. Izay no sisin-tany atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny sisin-tany atsimo dia hiainga eo Tamara ka hipaka hatrany amin’ny ranon’i Meribà any Kadesy, ary hanaraka ny ranon-driakan’i Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny ranon-driakan’i Ejipta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 34.5 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ka hipaka eo amin’ny Ranomasina Mediteranea. Izay no sisin-tany atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny sisin-tany andrefana kosa dia ny Ranomasina Mediteranea no mamaritra azy hatreo atsimo ka hatrany Lebô-Hamata any avaratra. Izay no sisin-tany andrefana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Hifampizarànareo foko israelita io tany io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Antsapaka no hizarànareo azy ho anareo ary koa ho an’ny vahiny mipetraka sy efa miteraka eo aminareo. Ireny koa dia tokony hoentinareo tahaka ny Israelita ka ho valovotaka hahazo zaratany antsapaka eo anivon’ny fokon’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Samy homenareo ny anjarany avy eo amin’ny foko izay hipetrahany ny vahiny. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
