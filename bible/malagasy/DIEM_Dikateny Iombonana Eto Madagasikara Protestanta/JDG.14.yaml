document_id: JDG.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zava-bitan’i Samsôna voalohany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary nidina nankany Timnà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Timnà '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tanàna danita (Jos 19.43) teo akaikin’i Tsôrehà (13.2), kanefa voatazon’ny Filistinina tamin’izay.
    marker-yv: yv-n
  - type: text
    text: ' i Samsôna ka nahatsikaritra tovovavy filistinina iray tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Rehefa niverina izy, dia nitantara tamin’ny ray sy reniny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nisy tovovavy filistinina iray tsikaritro tany Timnà, ka tiako hangatahinareo ho vadiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa namaly azy ny ray sy reniny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Angaha tsy misy tovovavy ato amin’ny fokonao na ato amin’ny firenenao manontolo no handeha haka vady any amin’izay Filistinina tsy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mifora
  - type: text
    text: ' ianao?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hoy i Samsôna tamin’ny rainy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iny no mahafinaritra ahy, ka angataho ho vadiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy fantatry ny ray aman-dreniny fa ny TOMPO mihitsy no namelona izany faniriana izany tao amin’i Samsôna mba hahazoany miady amin’ny Filistinina, satria tamin’izany fotoana izany dia ny Filistinina no nanjaka tamin’ny Israelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niainga hankany Timnà i Samsôna. Nony tonga tao amin’ny tanim-boaloboka akaikin’i Timnà izy, dia nisy liona tanora nierona nanatona azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa nilatsaka tamin’i Samsôna ny Fanahin’ny TOMPO, ka tanam-polo no nentiny nanasamatsamaka ilay liona tanora toy ny fanasamatsamahana zanak’osy; saingy tsy nambarany tamin’ny ray aman-dreniny izany zavatra nataony izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nanohy ny diany i Samsôna ka nandeha nifampidinika tamin’ilay tovovavy filistinina, fa nahafinaritra azy razazavavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Andro vitsivitsy tato aoriana dia niverina tao Timnà izy mba hampakatra azy. Ary nivily izy mba hijery ny fatin’ilay liona ka nahita renitantely sy tantely tao anatin’ny vondron-taolan’ilay fatin-diona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nalainy tamin’ny tanany ny tantely ka nihinanany teny am-pandehanana. Ary nankany amin’ireo ray aman-dreniny izy, dia nanome tantely azy ka nihinana koa izy mivady; nefa tsy nambaran-janany taminy fa tao anatin’ny vondron-taolana fatin-diona no nangalany azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanao ankamantatra tamin’ny Filistinina i Samsôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nidina nankany amin’ilay tovovavy i Samsôna, ka nanao fanasana fampakaram-bady tao toy ny fanaon’ny tovolahy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Rehefa nahita azy ny Filistinina, dia nifantina tovolahy telopolo mba hiara-mikorana aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary i Samsôna nilaza tamin’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hanao ankamantatra aminareo aho. Koa raha milaza ny valiny amiko ato anatin’ny fito andro fanaovam-panasàna ianareo, dia homeko lobaka telopolo tsara tarehy sy akanjo telopolo fitondra mianjaika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha tsy izany kosa, dia ianareo no hanome ahy lobaka telopolo tsara tarehy sy akanjo telopolo fitondra mianjaika.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny navaliny azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy àry ny ankamantatrao, fa mihaino anao izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy i Samsôna taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona àry izany? Ilay mihinana no ipoiran’ny hanina, ilay mahery no ipoiran’ny mamy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tapitra ny telo andro, nefa mbola tsy nahalaza ny valin’ilay ankamantatra ihany ireo tovolahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tamin’ny andro fahefatra kosa dia hoy ireo tamin’ny vadin’i Samsôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Langolangoy ny vadinao mba hilaza aminay ny valin’ny ankamantatra; fa raha tsy izany, dia hodoranay ianao sy ny ankohonan-drainao. Fa moa ny handraofanareo ny fanananay ve no nanasanareo anay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nandeha nanao an-dranomaso tamin’i Samsôna ny vadiny ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Halanao aho fa tsy tianao akory! Nisy ankamantatra nataonao tamin’ny mpiray firenena amiko nefa tsy mba nilazanao ny valiny aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy i Samsôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy nilazako ny valiny na dia ny ray aman-dreniko aza, koa ahoana moa no hilazako azy aminao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nanjohy azy tamin-dranomaso ny vadiny tao anatin’ireo andro fito fanasana; ka tamin’ny andro fahafito, dia nilazan’i Samsôna ny valin’ny ankamantatra izy satria fatra-panao lemozy taminy. Avy eo ravehivavy dia nampita izany tamin’ny mpiray firenena aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa tamin’iny andro fahafito iny, talohan’ny hilentehan’ny masoandro, dia tonga ireo lehilahy tao an-tanàna nilaza tamin’i Samsôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no mamy noho ny tantely?
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary inona no mahery noho ny liona?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hoy ny navalin’i Samsôna azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha tsy nampiasa ny vantotr’ombivaviko ianareo, dia tsy ho nahita ny valin’ny ankamantatro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nilatsaka tamin’i Samsôna ny Fanahin’ny TOMPO, ka lasa nidina tany Askelôna izy. Namono nahafaty telopolo lahy tao izy ka naka ny fitafiany ary nanome ireny ho an’ireo nilaza ny valin’ny ankamantatra. Ary nirehi-pahatezerana i Samsôna ka niakatra nody tany amin’ny rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa ilay vadiny kosa dia nomena ho vadin’ny tovolahy naman’i Samsôna sady mpandahatra ny fanasàny.
