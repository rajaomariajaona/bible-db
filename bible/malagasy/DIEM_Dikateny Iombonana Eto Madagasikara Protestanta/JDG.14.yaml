document_id: JDG.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zava-bitan’i Samsôna voalohany
  - type: text
    content: Ary nidina nankany Timnà
  - type: note
    content: Timnà dia tanàna danita (Jos 19.43) teo akaikin’i Tsôrehà (13.2), kanefa voatazon’ny Filistinina tamin’izay.
  - type: text
    content: ' i Samsôna ka nahatsikaritra tovovavy filistinina iray tao. '
  '10':
  - type: text
    content: 'Ary nidina nankany amin’ilay tovovavy i Samsôna, ka nanao fanasana fampakaram-bady tao toy ny fanaon’ny tovolahy rehetra. '
  '11':
  - type: text
    content: Rehefa nahita azy ny Filistinina, dia nifantina tovolahy telopolo mba hiara-mikorana aminy.
  '12':
  - type: text
    content: 'Ary i Samsôna nilaza tamin’ireo hoe:'
  - type: text
    content: '–Hanao ankamantatra aminareo aho. Koa raha milaza ny valiny amiko ato anatin’ny fito andro fanaovam-panasàna ianareo, dia homeko lobaka telopolo tsara tarehy sy akanjo telopolo fitondra mianjaika. '
  '13':
  - type: text
    content: Raha tsy izany kosa, dia ianareo no hanome ahy lobaka telopolo tsara tarehy sy akanjo telopolo fitondra mianjaika.
  - type: text
    content: 'Ka hoy ny navaliny azy:'
  - type: text
    content: –Ataovy àry ny ankamantatrao, fa mihaino anao izahay.
  '14':
  - type: text
    content: 'Dia hoy i Samsôna taminy:'
  - type: text
    content: –Inona àry izany? Ilay mihinana no ipoiran’ny hanina, ilay mahery no ipoiran’ny mamy.
  - type: text
    content: 'Tapitra ny telo andro, nefa mbola tsy nahalaza ny valin’ilay ankamantatra ihany ireo tovolahy. '
  '15':
  - type: text
    content: 'Tamin’ny andro fahefatra kosa dia hoy ireo tamin’ny vadin’i Samsôna:'
  - type: text
    content: –Langolangoy ny vadinao mba hilaza aminay ny valin’ny ankamantatra; fa raha tsy izany, dia hodoranay ianao sy ny ankohonan-drainao. Fa moa ny handraofanareo ny fanananay ve no nanasanareo anay?
  '16':
  - type: text
    content: 'Dia nandeha nanao an-dranomaso tamin’i Samsôna ny vadiny ka nanao hoe:'
  - type: text
    content: –Halanao aho fa tsy tianao akory! Nisy ankamantatra nataonao tamin’ny mpiray firenena amiko nefa tsy mba nilazanao ny valiny aho.
  - type: text
    content: 'Ka hoy i Samsôna hoe:'
  - type: text
    content: –Tsy nilazako ny valiny na dia ny ray aman-dreniko aza, koa ahoana moa no hilazako azy aminao?
  '17':
  - type: text
    content: 'Dia nanjohy azy tamin-dranomaso ny vadiny tao anatin’ireo andro fito fanasana; ka tamin’ny andro fahafito, dia nilazan’i Samsôna ny valin’ny ankamantatra izy satria fatra-panao lemozy taminy. Avy eo ravehivavy dia nampita izany tamin’ny mpiray firenena aminy. '
  '18':
  - type: text
    content: 'Koa tamin’iny andro fahafito iny, talohan’ny hilentehan’ny masoandro, dia tonga ireo lehilahy tao an-tanàna nilaza tamin’i Samsôna hoe:'
  - type: text
    content: –Inona no mamy noho ny tantely?
  - type: text
    content: Ary inona no mahery noho ny liona?
  - type: text
    content: 'Fa hoy ny navalin’i Samsôna azy:'
  - type: text
    content: –Raha tsy nampiasa ny vantotr’ombivaviko ianareo, dia tsy ho nahita ny valin’ny ankamantatro.
  '19':
  - type: text
    content: 'Dia nilatsaka tamin’i Samsôna ny Fanahin’ny TOMPO, ka lasa nidina tany Askelôna izy. Namono nahafaty telopolo lahy tao izy ka naka ny fitafiany ary nanome ireny ho an’ireo nilaza ny valin’ny ankamantatra. Ary nirehi-pahatezerana i Samsôna ka niakatra nody tany amin’ny rainy. '
  '2':
  - type: text
    content: 'Rehefa niverina izy, dia nitantara tamin’ny ray sy reniny hoe:'
  - type: text
    content: –Nisy tovovavy filistinina iray tsikaritro tany Timnà, ka tiako hangatahinareo ho vadiko.
  '20':
  - type: text
    content: Fa ilay vadiny kosa dia nomena ho vadin’ny tovolahy naman’i Samsôna sady mpandahatra ny fanasàny.
  '3':
  - type: text
    content: 'Fa namaly azy ny ray sy reniny hoe:'
  - type: text
    content: '–Angaha tsy misy tovovavy ato amin’ny fokonao na ato amin’ny firenenao manontolo no handeha haka vady any amin’izay Filistinina tsy '
  - type: text
    content: mifora
  - type: text
    content: ' ianao?'
  - type: text
    content: 'Fa hoy i Samsôna tamin’ny rainy:'
  - type: text
    content: –Iny no mahafinaritra ahy, ka angataho ho vadiko.
  '4':
  - type: text
    content: Tsy fantatry ny ray aman-dreniny fa ny TOMPO mihitsy no namelona izany faniriana izany tao amin’i Samsôna mba hahazoany miady amin’ny Filistinina, satria tamin’izany fotoana izany dia ny Filistinina no nanjaka tamin’ny Israelita.
  '5':
  - type: text
    content: 'Dia niainga hankany Timnà i Samsôna. Nony tonga tao amin’ny tanim-boaloboka akaikin’i Timnà izy, dia nisy liona tanora nierona nanatona azy. '
  '6':
  - type: text
    content: 'Fa nilatsaka tamin’i Samsôna ny Fanahin’ny TOMPO, ka tanam-polo no nentiny nanasamatsamaka ilay liona tanora toy ny fanasamatsamahana zanak’osy; saingy tsy nambarany tamin’ny ray aman-dreniny izany zavatra nataony izany. '
  '7':
  - type: text
    content: 'Ary nanohy ny diany i Samsôna ka nandeha nifampidinika tamin’ilay tovovavy filistinina, fa nahafinaritra azy razazavavy. '
  '8':
  - type: text
    content: 'Andro vitsivitsy tato aoriana dia niverina tao Timnà izy mba hampakatra azy. Ary nivily izy mba hijery ny fatin’ilay liona ka nahita renitantely sy tantely tao anatin’ny vondron-taolan’ilay fatin-diona. '
  '9':
  - type: text
    content: Dia nalainy tamin’ny tanany ny tantely ka nihinanany teny am-pandehanana. Ary nankany amin’ireo ray aman-dreniny izy, dia nanome tantely azy ka nihinana koa izy mivady; nefa tsy nambaran-janany taminy fa tao anatin’ny vondron-taolana fatin-diona no nangalany azy.
  - type: heading
    content: Nanao ankamantatra tamin’ny Filistinina i Samsôna
