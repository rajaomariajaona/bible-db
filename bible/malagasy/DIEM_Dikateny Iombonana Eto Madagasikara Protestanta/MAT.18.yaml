    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izay dia nanatona an’i Jesoa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' ka nanontany Azy hoe;'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Iza moa no lehibe indrindra ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakan’ny lanitra
    - type: text
      text: '?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '–Tandremo fandrao ataonareo tsinontsinona na dia ny anankiray amin’itony madinika itony aza. Eny, lazaiko aminareo fa ny anjelin’izy ireny, any an-danitra, dia manatrika lalandava ny Raiko Izay any an-danitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '[Satria ny hitady sy hamonjy ny very no nahatongavan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lk 19.10.
      marker-yv: yv-n
    - type: text
      text: .]
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ahoana no hevitrareo? Raha misy olona manana ondry zato ka mania ny anankiray, moa tsy hamela ny 99 eo an-tampon-kavoana ve izy ary hiezaka hitady ilay nania? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary raha tàhiny ilay nania ka hitan’ny tompony, dia lazaiko marina aminareo fa hifaliany bebe kokoa noho ny 99 tsy nania. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Toy izany koa, tsy sitraky ny Rainareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny Rainareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitany hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny Raiko.
      marker-yv: yv-n
    - type: text
      text: Izay any an-danitra hisy very na dia ny anankiray amin’itony madinika itony aza!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Raha diso taminao ny havana iray finoana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 17.3)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: –Raha diso taminao ny havana iray finoana, dia hatony; ary ianao sy izy mitokana iny no asehoy azy ny hadisoany. Raha mihaino anao izy, dia efa azonao ny havanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Raha diso taminao ny havana iray finoana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany tsy ahitana ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: taminao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo Lk 17.3).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa raha tsy mihaino anao izy, dia makà olona iray na roa hiaraka aminao mba «hitombenan’ny raharaha rehetra noho ny tenin’ny vavolombelona roa na telo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deot 19.15.
      marker-yv: yv-n
    - type: text
      text: '», araka ny voalazan’ny Soratra Masina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa raha tsy mihaino azy ireo izy, dia ambarao amin’ny iray Fiangonana; ary raha tsy mihaino ny iray Fiangonana koa izy, dia ataovy toy ny hafa firenena sy toy ny mpamory hetra.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Lazaiko marina aminareo fa na inona na inona hofehezinareo etỳ an-tany dia ho voafehy koa any an-danitra; ary na inona na inona hovahanareo etỳ an-tany dia ho voavaha koa any an-danitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 16.19; Jôh 20.23.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiaraha-mivavaka
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '–Lazaiko marina aminareo koa fa raha misy roa aminareo mifanaiky etỳ an-tany fa hangataka zavatra na inona na inona am-bavaka, dia ho azony avy amin’ny Raiko Izay any an-danitra izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia niantso zazakely i Jesoa napetrany teo afovoan’izy rehetra '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Satria na aiza na aiza iangonan’olona roa na telo amin’ny anarako, dia eo afovoany Aho.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana momba ilay mpanompo tsy mahay mamela heloka
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tamin’izay dia nanatona an’i Jesoa i Petera ka nanontany Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, impiry moa aho no tokony hamela ny havana iray finoana raha diso amiko izy? Hatramin’ny impito ve?
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy hatramin’ny impito ihany no lazaiko aminao fa hatramin’ny impitopolo impito
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'impitopolo impito: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dkt hafa im-77.
      marker-yv: yv-n
    - type: text
      text: '!'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Koa amin’izany, ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’ny lanitra
    - type: text
      text: ' dia tahaka ny amin’ny mpanjaka anankiray izay te hampamoaka ireo mpanompony momba ny kaontim-bolany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Raha vao natomboka ny fampamoahana, dia nentina teo anatrehan’ny mpanjaka ity mpanompo izay nananany trosa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: denàry
    - type: text
      text: ' enimpolo tapitrisa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary noho izy tsy nanan-kaloa, dia nasain’ny tompony hamidy ho andevo ny tenan’ilay mpanompo mbamin’ny vady aman-janany ary hamidy koa ny fananany rehetra, mba handoavana ny trosa. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia niantoraka sy niankohoka teo anoloan’ny mpanjaka ilay mpanompo sady nanao hoe: «Mba omeo andro re aho fa haloako avokoa ny anao!» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Onena azy kosa ilay tompony ka namoy ny trosa taminy ary nandefa azy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Vao tafavoaka anefa ilay mpanompo, dia tojo ity mpanompo namany izay nananany trosa denàry zato. Noraisin’ilay mpampitrosa teo am-bozona izy, ka nokendainy sady nataony hoe: «Aloavy izay trosako aminao.» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia niantoraka teo anoloan’ilay mpampitrosa izy sady nifona taminy nanao hoe: «Mba omeo andro re aho, fa haloako ny anao!» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka hoy Izy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Lazaiko marina aminareo fa raha tsy miova ianareo ka tonga tahaka ny zazakely, dia tsy hiditra mihitsy ao amin’ny Fanjakàn’ny lanitra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Tsy nety anefa ilay mpampitrosa fa lasa nampanao azy am-ponja mandra-pandoany ny trosa. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Nalahelo mafy ireo mpanompo namany nony nahita ny zava-nitranga, ka lasa nitantara izany rehetra izany tamin’ny tompony. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia nampanalain’ny tompony tamin’izay ilay mpanompo nananany trosa be ka noteneniny hoe: «Mpanompo ratsy fanahy ianao! Efa nafoiko avokoa ny trosako taminao, noho ianao nifona tamiko. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ka moa tsy tokony mba hamindranao fo koa ve ilay mpanompo namanao tahaka ny namindrako fo taminao?» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Dia tezitra ny tompony ka nanolotra an’ilay mpanompo ratsy fanahy mba hatao am-ponja sy hampijalîna mandra-pandoany ny trosany manontolo.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia nofaranan’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ho tahaka izany koa no hataon’ny Raiko Izay any an-danitra aminareo, raha tsy samy mamela ny havanareo amin’ny fonareo tokoa ianareo.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa izay hanetry tena tahaka ity zazakely ity no ho lehibe indrindra ao amin’ny Fanjakàn’ny lanitra. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary na iza na iza handray zazakely anankiray tahaka ity amin’ny anarako dia Izaho no raisiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zava-doza ny fahotana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 9.42-48; Lk 17.1-2)
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '–Na iza na iza mitarika ny anankiray amin’itony madinika mino Ahy itony hanao ratsy, dia aleo izy anantonana vatobe fikoseham-bary eo amin’ny vozony, ka halentika any anaty ranomasina mangitsokitsoka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tataovan-doza izao tontolo izao satria betsaka ny toe-javatra mitarika amin’ny ratsy! Eny, tsy maintsy hisy ny toe-javatra mitarika amin’ny ratsy, kanefa mampalahelo izay olona hahatonga izany!
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Raha mitarika anao amin’ny ratsy ny tananao ila na ny tongotrao ila, dia tapaho ka ario lavitra anao; fa aleo ianao tokan-tanana na tokan-tongotra nefa tafiditra any amin’ny fiainana toy izay ary tanan-droa na tongotra roa nefa atsipy any amin’ny afo maharitra mandrakizay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary raha mitarika anao amin’ny ratsy ny masonao ila, dia esory ka ario lavitra anao; fa aleo ianao toka-maso nefa tafiditra any amin’ny fiainana toy izay ary maso roa nefa atsipy any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lohasahan’afo
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay ondry nania ka hita indray
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 15.3-7)
    marker-yv: yv-h
