document_id: MAT.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Iza no lehibe indrindra?
  - type: heading
    content: (Jereo Mk 9.33-37; Lk 9.46-48)
  - type: text
    content: 'Tamin’izay dia nanatona an’i Jesoa ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' ka nanontany Azy hoe;'
  - type: text
    content: '–Iza moa no lehibe indrindra ao amin’ny '
  - type: text
    content: Fanjakan’ny lanitra
  - type: text
    content: '?'
  '10':
  - type: text
    content: '–Tandremo fandrao ataonareo tsinontsinona na dia ny anankiray amin’itony madinika itony aza. Eny, lazaiko aminareo fa ny anjelin’izy ireny, any an-danitra, dia manatrika lalandava ny Raiko Izay any an-danitra. '
  '11':
  - type: text
    content: '[Satria ny hitady sy hamonjy ny very no nahatongavan’ny '
  - type: text
    content: Zanak’olona
  - type: note
    content: Jereo Lk 19.10.
  - type: text
    content: .]
  '12':
  - type: text
    content: 'Ahoana no hevitrareo? Raha misy olona manana ondry zato ka mania ny anankiray, moa tsy hamela ny 99 eo an-tampon-kavoana ve izy ary hiezaka hitady ilay nania? '
  '13':
  - type: text
    content: 'Ary raha tàhiny ilay nania ka hitan’ny tompony, dia lazaiko marina aminareo fa hifaliany bebe kokoa noho ny 99 tsy nania. '
  '14':
  - type: text
    content: Toy izany koa, tsy sitraky ny Rainareo
  - type: note
    content: 'ny Rainareo: misy stf sasany ahitany hoe ny Raiko.'
  - type: text
    content: Izay any an-danitra hisy very na dia ny anankiray amin’itony madinika itony aza!
  - type: heading
    content: Raha diso taminao ny havana iray finoana
  - type: heading
    content: (Jereo Lk 17.3)
  '15':
  - type: text
    content: –Raha diso taminao ny havana iray finoana, dia hatony; ary ianao sy izy mitokana iny no asehoy azy ny hadisoany. Raha mihaino anao izy, dia efa azonao ny havanao
  - type: note
    content: 'Raha diso taminao ny havana iray finoana: misy stf sasany tsy ahitana ny hoe taminao (jereo Lk 17.3).'
  - type: text
    content: '. '
  '16':
  - type: text
    content: Fa raha tsy mihaino anao izy, dia makà olona iray na roa hiaraka aminao mba «hitombenan’ny raharaha rehetra noho ny tenin’ny vavolombelona roa na telo
  - type: note
    content: Deot 19.15.
  - type: text
    content: '», araka ny voalazan’ny Soratra Masina. '
  '17':
  - type: text
    content: Fa raha tsy mihaino azy ireo izy, dia ambarao amin’ny iray Fiangonana; ary raha tsy mihaino ny iray Fiangonana koa izy, dia ataovy toy ny hafa firenena sy toy ny mpamory hetra.
  '18':
  - type: text
    content: Lazaiko marina aminareo fa na inona na inona hofehezinareo etỳ an-tany dia ho voafehy koa any an-danitra; ary na inona na inona hovahanareo etỳ an-tany dia ho voavaha koa any an-danitra
  - type: note
    content: Ampit 16.19; Jôh 20.23.
  - type: text
    content: .
  - type: heading
    content: Fiaraha-mivavaka
  '19':
  - type: text
    content: '–Lazaiko marina aminareo koa fa raha misy roa aminareo mifanaiky etỳ an-tany fa hangataka zavatra na inona na inona am-bavaka, dia ho azony avy amin’ny Raiko Izay any an-danitra izany. '
  '2':
  - type: text
    content: 'Dia niantso zazakely i Jesoa napetrany teo afovoan’izy rehetra '
  '20':
  - type: text
    content: Satria na aiza na aiza iangonan’olona roa na telo amin’ny anarako, dia eo afovoany Aho.
  - type: heading
    content: Fanoharana momba ilay mpanompo tsy mahay mamela heloka
  '21':
  - type: text
    content: 'Tamin’izay dia nanatona an’i Jesoa i Petera ka nanontany Azy hoe:'
  - type: text
    content: –Tompo ô, impiry moa aho no tokony hamela ny havana iray finoana raha diso amiko izy? Hatramin’ny impito ve?
  '22':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Tsy hatramin’ny impito ihany no lazaiko aminao fa hatramin’ny impitopolo impito
  - type: note
    content: 'impitopolo impito: dkt hafa im-77.'
  - type: text
    content: '!'
  '23':
  - type: text
    content: 'Koa amin’izany, ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' dia tahaka ny amin’ny mpanjaka anankiray izay te hampamoaka ireo mpanompony momba ny kaontim-bolany. '
  '24':
  - type: text
    content: 'Raha vao natomboka ny fampamoahana, dia nentina teo anatrehan’ny mpanjaka ity mpanompo izay nananany trosa '
  - type: text
    content: denàry
  - type: text
    content: ' enimpolo tapitrisa. '
  '25':
  - type: text
    content: 'Ary noho izy tsy nanan-kaloa, dia nasain’ny tompony hamidy ho andevo ny tenan’ilay mpanompo mbamin’ny vady aman-janany ary hamidy koa ny fananany rehetra, mba handoavana ny trosa. '
  '26':
  - type: text
    content: 'Dia niantoraka sy niankohoka teo anoloan’ny mpanjaka ilay mpanompo sady nanao hoe: «Mba omeo andro re aho fa haloako avokoa ny anao!» '
  '27':
  - type: text
    content: Onena azy kosa ilay tompony ka namoy ny trosa taminy ary nandefa azy.
  '28':
  - type: text
    content: 'Vao tafavoaka anefa ilay mpanompo, dia tojo ity mpanompo namany izay nananany trosa denàry zato. Noraisin’ilay mpampitrosa teo am-bozona izy, ka nokendainy sady nataony hoe: «Aloavy izay trosako aminao.» '
  '29':
  - type: text
    content: 'Dia niantoraka teo anoloan’ilay mpampitrosa izy sady nifona taminy nanao hoe: «Mba omeo andro re aho, fa haloako ny anao!» '
  '3':
  - type: text
    content: 'ka hoy Izy:'
  - type: text
    content: '–Lazaiko marina aminareo fa raha tsy miova ianareo ka tonga tahaka ny zazakely, dia tsy hiditra mihitsy ao amin’ny Fanjakàn’ny lanitra. '
  '30':
  - type: text
    content: 'Tsy nety anefa ilay mpampitrosa fa lasa nampanao azy am-ponja mandra-pandoany ny trosa. '
  '31':
  - type: text
    content: 'Nalahelo mafy ireo mpanompo namany nony nahita ny zava-nitranga, ka lasa nitantara izany rehetra izany tamin’ny tompony. '
  '32':
  - type: text
    content: 'Dia nampanalain’ny tompony tamin’izay ilay mpanompo nananany trosa be ka noteneniny hoe: «Mpanompo ratsy fanahy ianao! Efa nafoiko avokoa ny trosako taminao, noho ianao nifona tamiko. '
  '33':
  - type: text
    content: 'Ka moa tsy tokony mba hamindranao fo koa ve ilay mpanompo namanao tahaka ny namindrako fo taminao?» '
  '34':
  - type: text
    content: Dia tezitra ny tompony ka nanolotra an’ilay mpanompo ratsy fanahy mba hatao am-ponja sy hampijalîna mandra-pandoany ny trosany manontolo.
  '35':
  - type: text
    content: 'Dia nofaranan’i Jesoa hoe:'
  - type: text
    content: –Ho tahaka izany koa no hataon’ny Raiko Izay any an-danitra aminareo, raha tsy samy mamela ny havanareo amin’ny fonareo tokoa ianareo.
  '4':
  - type: text
    content: 'Koa izay hanetry tena tahaka ity zazakely ity no ho lehibe indrindra ao amin’ny Fanjakàn’ny lanitra. '
  '5':
  - type: text
    content: Ary na iza na iza handray zazakely anankiray tahaka ity amin’ny anarako dia Izaho no raisiny.
  - type: heading
    content: Zava-doza ny fahotana
  - type: heading
    content: (Jereo Mk 9.42-48; Lk 17.1-2)
  '6':
  - type: text
    content: '–Na iza na iza mitarika ny anankiray amin’itony madinika mino Ahy itony hanao ratsy, dia aleo izy anantonana vatobe fikoseham-bary eo amin’ny vozony, ka halentika any anaty ranomasina mangitsokitsoka. '
  '7':
  - type: text
    content: Tataovan-doza izao tontolo izao satria betsaka ny toe-javatra mitarika amin’ny ratsy! Eny, tsy maintsy hisy ny toe-javatra mitarika amin’ny ratsy, kanefa mampalahelo izay olona hahatonga izany!
  '8':
  - type: text
    content: 'Raha mitarika anao amin’ny ratsy ny tananao ila na ny tongotrao ila, dia tapaho ka ario lavitra anao; fa aleo ianao tokan-tanana na tokan-tongotra nefa tafiditra any amin’ny fiainana toy izay ary tanan-droa na tongotra roa nefa atsipy any amin’ny afo maharitra mandrakizay. '
  '9':
  - type: text
    content: 'Ary raha mitarika anao amin’ny ratsy ny masonao ila, dia esory ka ario lavitra anao; fa aleo ianao toka-maso nefa tafiditra any amin’ny fiainana toy izay ary maso roa nefa atsipy any amin’ny '
  - type: text
    content: lohasahan’afo
  - type: text
    content: .
  - type: heading
    content: Ilay ondry nania ka hita indray
  - type: heading
    content: (Jereo Lk 15.3-7)
