document_id: 1CH.9
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia vita isa, araka ny firazanany avy, ny Israelita rehetra; ary indro efa voasoratra ao amin’ny boky firaketan’ny mpanjakan’i Israely izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mponina tao Jerosalema taorian’ny namaboana azy tany Babilôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny olona tao Joda dia nentina ho babo tany Babilôna, noho ny fahotany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ireo tafaverina voalohany teo amin’ny taniny sy teo amin’ny tanànany aloha dia sarambabem-bahoaka israelita, vao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' ary ny mpanampy azy ireo tao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tao Jerosalema no nonina ny sasany tamin’ny taranaky ry i Joda sy i Benjamîna ary i Efraîma sy i Manase
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 2-3:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Hez 2.70; Ne 7.72.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’ny taranak’i Joda: avy tamin’ny terak’i Peretsa, dia i Hotahy zanakalahin’i Hamihoda sy zafin’i Homrỳ sy zafiafin’i Imrỳ ary zafin-dohalik’i Banỳ; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: avy tamin’ny terak’i Selà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'terak’i Selà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny RM, dia hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Silônita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', dia i Asaià lahimatoa sy ireo zanany lahy; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: avy tamin’ny terak’i Zerà, dia i Jehiela. Ireo mbamin’ny havany rehetra dia nisy 690 tao Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’ny taranak’i Benjamîna: dia i Salò zanakalahin’i Mesolama sy zafin’i Hôdavià ary zafiafin’i Senoà; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'i Jibneià zanakalahin’i Jerôhama; i Elà zanakalahin’i Hozỳ sy zafin’i Mikrỳ; i Mesolama zanakalahin’i Sefatià sy zafin’i Rehoela ary zafiafin’i Jibnià. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Samy lohan’ny fianakaviany avy ireo lehilahy rehetra ireo; izy mbamin’ny havany rehetra, araka ny firazanany avy, dia nisy 956 tao Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin’ny mpisorona: dia i Jesahià, zanakalahin’i Jehôiakima; i Jehôiariba, zanakalahin’i Hazarià; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'i Seraià, zanakalahin’i Hilkià sy zafin’i Mesolama sy zafiafin’i Tsadôka sy zafin-dohalik’i Meraiôta ary zafin-kitrokelin’i Ahitoba mpanapaka ny tempoly; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'i Hadaià, zanakalahin’i Jerôhama sy zafin’i Pasehora ary zafiafin’i Malkià; i Mahesay, zanakalahin’i Hadiela sy zafin’i Jahazerà sy zafiafin’i Mesolama sy zafin-dohalik’i Mesilemôta ary zafin-kitrokelin’i Imera. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ireo mbamin’ny mpisorona havany, izay samy lohan’ny fianakaviany avy, dia nisy 1 760: lehilahy mahery teo amin’ny fanaovana fanompoana tao an-tranon’Andriamanitra izy rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tamin’ny levita: dia i Semahià, zanakalahin’i Hasoba sy zafin’i Hazrikama ary zafiafin’i Hasabià izay isan’ny taranak’i Merarỳ; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'i Bakboko, zanakalahin’i Heresa sy zafin’i Galala; i Matanià, zanakalahin’i Mikà sy zafin’i Zikrỳ ary zafiafin’i Asafa; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: i Hôbadià, zanakalahin’i Semahià sy zafin’i Galala ary zafiafin’i Jedotòna; i Berekià, zanakalahin’i Asà sy zafin’i Elkanà, izay nonina tao amin’ireo tanànan’ny Netôfatita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny mpiandry vavahady dia ry i Saloma sy i Hakoba ary i Talmôna sy i Ahimàna mbamin’ireo namany; ka i Saloma no filohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 2-17:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Ne 11.3-19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ireo no mpiandry vavahady tamin’ny tobin’ny levîta; ary ny taranany, mandraka izao, no eo amin’ny vavahadin’ny mpanjaka, dia ny vavahady atsinanana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I Saloma, zanakalahin’i Kôrà sy zafin’i Abiasafa ary zafiafin’i Kôra, mbamin’ny Kôrahita havany satria fianakaviana iray razana aminy, ireo no mpanao fanompoana amin’ny fiandrasana ilay varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '; ary ny razany koa dia mpiandry an’ilay varavaran’ny tobin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Taloha i Pinehasa, zanakalahin’i Elehazara, no mpanapaka ireo; ary nomba an’i Pinehasa ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary i Zakarià, zanakalahin’i Meselemià, dia isan’ireo mpiandry ilay varavaran’ny Tranolay fihaonana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny isan’izy rehetra voafidy ho mpiandry vavahady sy varavarana dia 212. Voasoratra tany amin’ny tanàna fiaviany avy ireo. I Davida sy i Samoela, ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' isehoam-pahitana, no nanendry ny razambeny hanao izany raharaha izany noho ny toetra mahatoky nananany; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ka dia ireo sy ny taranany hatrany no teo amin’ny vavahadin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ' sy teo akaikin’ny Tranolay fihaonana, mba hiambina azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izy efa-dahy filohan’ny mpiandry vavahady no nanankinana ny vavahady efatra, dia teo atsinanana sy andrefana ary teo avaratra sy atsimo; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ny havany mpiara-miasa aminy kosa dia nonina tany amin’ny tanànany avy ary nasaina ho tonga, isaky ny fotoanandrony, mba hiasa mandritra ny herinandro. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Toetra mahatoky manko no nananan’ireo efa-dahy filohan’ny mpiandry vavahady ireo sady levita rahateo izy, ka niadidy ny efitrano fitahirizana mbamin’ny rakitry ny tempoly; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ary teny amin’ny fonenana manodidina ny tempoly no nandriany, satria adidiny koa ny fiambenana azy sy ny famohana azy isa-maraina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny sasany tamin’ny mpiandry vavahady dia niadidy ny fanaka momba ny fanompoam-pivavahana, ka nanisa ireo fanaka entina hampiasaina sy entina haverina. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny sasany kosa notendrena hiadidy ny tavoara, dia ireo tavoara masina rehetra, ary koa hiadidy ny koba lafarinina sy ny divay ary ny menaka mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovo-javamanitra
  - type: text
    text: ' sy ny zava-mamerovero hafa; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: kanefa dia mpisorona no tena mpiandraikitra ny fampifangaroana zava-manitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'I Matitià, anankiray tamin’ny levita, dia lahimatoan’i Saloma izay taranak’i Kôra; noho ny toetra mahatoky nasehony, dia tonian’ny fanendasana mofomamy fanao fanatitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary i Benaià, taranak’i Kehata sady anankiray tamin’ireo levita, no tonian’ny mofo apetraka eo anatrehan’Andriamanitra ka namboatra azy isan-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tsabata
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny mpiventy hira kosa, izay loham-pianakaviana teo amin’ny levita, dia nitoetra tao amin’ny efitrano voatokana ho azy; ary tsy nanana andraikitra hafa ireo satria nanao ny raharahany andro aman’alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ireo àry no loham-pianakaviana teo amin’ny levita, dia loham-pianakaviana ho an’ny taranany avy, ary nonina tao Jerosalema.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fianakaviamben’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 8.29-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tao Gibehôna no nonina i Jehiela, ilay mpanorina io tanàna io; ary ny anaran’ny vadiny dia Mahekà. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'I Habdôna no zanany lahimatoa, dia i Tsoro sy i Kisy, i Bahala sy i Nera, i Nadaba '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'sy i Gedôra mbamin’i Ahiao sy i Zakarià ary i Miklôta. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'I Miklôta no ray niteraka an’i Simamy: izy mianaka ireto dia niara-nonina tamin’ny mpiray foko namany tany Jerosalema ka nifanandrify fonenana taminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'I Nera no ray niteraka an’i Kisy; i Kisy, ray niteraka an’i Saoly; i Saoly, ray niteraka an-dry i Jônatàna sy i Melkîsa ary i Abinadaba sy i Esbahala. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ny zanakalahin’i Jônatàna dia i Meribahala; i Meribahala no ray niteraka an’i Mikà. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ny zanakalahin’i Mikà dia ry i Pitôny sy i Melèka ary i Taharea sy i Ahaza. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: I Ahaza no ray niteraka an’i Jahirà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.42 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jahirà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jahidà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ary ny ao amin’ny 8.36 kosa dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jôhadà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '; i Jahirà, ray niteraka an-dry Halemeta sy i Hazmavety ary i Zimrỳ; i Zimrỳ, ray niteraka an’i Môtsà; '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: i Môtsà, ray niteraka an’i Binehà. I Refaià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.43 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Refaià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rafà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo 8.37).'
    marker-yv: yv-n
  - type: text
    text: ' no zanakalahin’i Binehà; i Elehasà no zanakalahin’i Refaià; ary i Atsela no zanakalahin’i Elehasà. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Nanan-janaka enina mirahalahy i Atsela ka ireto avy no anarany: i Hazrikama (lahimatoany) sy i Jismahela, i Seharià sy i Hazarià ary i Hôbadià sy i Hanàna; ireo no zanakalahin’i Atsela.'
