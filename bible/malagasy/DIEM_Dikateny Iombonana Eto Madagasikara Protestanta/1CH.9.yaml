document_id: 1CH.9,396
type_code: plt
verses:
  '1':
  - type: text
    content: Dia vita isa, araka ny firazanany avy, ny Israelita rehetra; ary indro efa voasoratra ao amin’ny boky firaketan’ny mpanjakan’i Israely izany.
  - type: heading
    content: Ny mponina tao Jerosalema taorian’ny namaboana azy tany Babilôna
  - type: text
    content: 'Ny olona tao Joda dia nentina ho babo tany Babilôna, noho ny fahotany. '
  '10':
  - type: text
    content: 'Tamin’ny mpisorona: dia i Jesahià, zanakalahin’i Jehôiakima; i Jehôiariba, zanakalahin’i Hazarià; '
  '11':
  - type: text
    content: 'i Seraià, zanakalahin’i Hilkià sy zafin’i Mesolama sy zafiafin’i Tsadôka sy zafin-dohalik’i Meraiôta ary zafin-kitrokelin’i Ahitoba mpanapaka ny tempoly; '
  '12':
  - type: text
    content: 'i Hadaià, zanakalahin’i Jerôhama sy zafin’i Pasehora ary zafiafin’i Malkià; i Mahesay, zanakalahin’i Hadiela sy zafin’i Jahazerà sy zafiafin’i Mesolama sy zafin-dohalik’i Mesilemôta ary zafin-kitrokelin’i Imera. '
  '13':
  - type: text
    content: 'Ireo mbamin’ny mpisorona havany, izay samy lohan’ny fianakaviany avy, dia nisy 1 760: lehilahy mahery teo amin’ny fanaovana fanompoana tao an-tranon’Andriamanitra izy rehetra.'
  '14':
  - type: text
    content: 'Tamin’ny levita: dia i Semahià, zanakalahin’i Hasoba sy zafin’i Hazrikama ary zafiafin’i Hasabià izay isan’ny taranak’i Merarỳ; '
  '15':
  - type: text
    content: 'i Bakboko, zanakalahin’i Heresa sy zafin’i Galala; i Matanià, zanakalahin’i Mikà sy zafin’i Zikrỳ ary zafiafin’i Asafa; '
  '16':
  - type: text
    content: i Hôbadià, zanakalahin’i Semahià sy zafin’i Galala ary zafiafin’i Jedotòna; i Berekià, zanakalahin’i Asà sy zafin’i Elkanà, izay nonina tao amin’ireo tanànan’ny Netôfatita.
  '17':
  - type: text
    content: Ny mpiandry vavahady dia ry i Saloma sy i Hakoba ary i Talmôna sy i Ahimàna mbamin’ireo namany; ka i Saloma no filohany
  - type: note
    content: 'And 2-17: ampit Ne 11.3-19.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Ireo no mpiandry vavahady tamin’ny tobin’ny levîta; ary ny taranany, mandraka izao, no eo amin’ny vavahadin’ny mpanjaka, dia ny vavahady atsinanana. '
  '19':
  - type: text
    content: 'I Saloma, zanakalahin’i Kôrà sy zafin’i Abiasafa ary zafiafin’i Kôra, mbamin’ny Kôrahita havany satria fianakaviana iray razana aminy, ireo no mpanao fanompoana amin’ny fiandrasana ilay varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '; ary ny razany koa dia mpiandry an’ilay varavaran’ny tobin’ny TOMPO. '
  '2':
  - type: text
    content: 'Ireo tafaverina voalohany teo amin’ny taniny sy teo amin’ny tanànany aloha dia sarambabem-bahoaka israelita, vao ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: levita
  - type: text
    content: ' ary ny mpanampy azy ireo tao an-'
  - type: text
    content: tempoly
  - type: text
    content: .
  '20':
  - type: text
    content: 'Taloha i Pinehasa, zanakalahin’i Elehazara, no mpanapaka ireo; ary nomba an’i Pinehasa ny TOMPO. '
  '21':
  - type: text
    content: Ary i Zakarià, zanakalahin’i Meselemià, dia isan’ireo mpiandry ilay varavaran’ny Tranolay fihaonana.
  '22':
  - type: text
    content: 'Ny isan’izy rehetra voafidy ho mpiandry vavahady sy varavarana dia 212. Voasoratra tany amin’ny tanàna fiaviany avy ireo. I Davida sy i Samoela, ilay '
  - type: text
    content: mpaminany
  - type: text
    content: ' isehoam-pahitana, no nanendry ny razambeny hanao izany raharaha izany noho ny toetra mahatoky nananany; '
  '23':
  - type: text
    content: 'ka dia ireo sy ny taranany hatrany no teo amin’ny vavahadin’ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' sy teo akaikin’ny Tranolay fihaonana, mba hiambina azy.'
  '24':
  - type: text
    content: 'Izy efa-dahy filohan’ny mpiandry vavahady no nanankinana ny vavahady efatra, dia teo atsinanana sy andrefana ary teo avaratra sy atsimo; '
  '25':
  - type: text
    content: 'ny havany mpiara-miasa aminy kosa dia nonina tany amin’ny tanànany avy ary nasaina ho tonga, isaky ny fotoanandrony, mba hiasa mandritra ny herinandro. '
  '26':
  - type: text
    content: 'Toetra mahatoky manko no nananan’ireo efa-dahy filohan’ny mpiandry vavahady ireo sady levita rahateo izy, ka niadidy ny efitrano fitahirizana mbamin’ny rakitry ny tempoly; '
  '27':
  - type: text
    content: ary teny amin’ny fonenana manodidina ny tempoly no nandriany, satria adidiny koa ny fiambenana azy sy ny famohana azy isa-maraina.
  '28':
  - type: text
    content: 'Ny sasany tamin’ny mpiandry vavahady dia niadidy ny fanaka momba ny fanompoam-pivavahana, ka nanisa ireo fanaka entina hampiasaina sy entina haverina. '
  '29':
  - type: text
    content: 'Ny sasany kosa notendrena hiadidy ny tavoara, dia ireo tavoara masina rehetra, ary koa hiadidy ny koba lafarinina sy ny divay ary ny menaka mbamin’ny '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' sy ny zava-mamerovero hafa; '
  '3':
  - type: text
    content: Tao Jerosalema no nonina ny sasany tamin’ny taranaky ry i Joda sy i Benjamîna ary i Efraîma sy i Manase
  - type: note
    content: 'And 2-3: jereo Hez 2.70; Ne 7.72.'
  - type: text
    content: .
  '30':
  - type: text
    content: kanefa dia mpisorona no tena mpiandraikitra ny fampifangaroana zava-manitra.
  '31':
  - type: text
    content: 'I Matitià, anankiray tamin’ny levita, dia lahimatoan’i Saloma izay taranak’i Kôra; noho ny toetra mahatoky nasehony, dia tonian’ny fanendasana mofomamy fanao fanatitra izy. '
  '32':
  - type: text
    content: Ary i Benaià, taranak’i Kehata sady anankiray tamin’ireo levita, no tonian’ny mofo apetraka eo anatrehan’Andriamanitra ka namboatra azy isan-
  - type: text
    content: tsabata
  - type: text
    content: .
  '33':
  - type: text
    content: Ny mpiventy hira kosa, izay loham-pianakaviana teo amin’ny levita, dia nitoetra tao amin’ny efitrano voatokana ho azy; ary tsy nanana andraikitra hafa ireo satria nanao ny raharahany andro aman’alina.
  '34':
  - type: text
    content: Ireo àry no loham-pianakaviana teo amin’ny levita, dia loham-pianakaviana ho an’ny taranany avy, ary nonina tao Jerosalema.
  - type: heading
    content: Ny fianakaviamben’i Saoly
  - type: heading
    content: (Jereo 8.29-38)
  '35':
  - type: text
    content: 'Tao Gibehôna no nonina i Jehiela, ilay mpanorina io tanàna io; ary ny anaran’ny vadiny dia Mahekà. '
  '36':
  - type: text
    content: 'I Habdôna no zanany lahimatoa, dia i Tsoro sy i Kisy, i Bahala sy i Nera, i Nadaba '
  '37':
  - type: text
    content: 'sy i Gedôra mbamin’i Ahiao sy i Zakarià ary i Miklôta. '
  '38':
  - type: text
    content: 'I Miklôta no ray niteraka an’i Simamy: izy mianaka ireto dia niara-nonina tamin’ny mpiray foko namany tany Jerosalema ka nifanandrify fonenana taminy.'
  '39':
  - type: text
    content: 'I Nera no ray niteraka an’i Kisy; i Kisy, ray niteraka an’i Saoly; i Saoly, ray niteraka an-dry i Jônatàna sy i Melkîsa ary i Abinadaba sy i Esbahala. '
  '4':
  - type: text
    content: 'Tamin’ny taranak’i Joda: avy tamin’ny terak’i Peretsa, dia i Hotahy zanakalahin’i Hamihoda sy zafin’i Homrỳ sy zafiafin’i Imrỳ ary zafin-dohalik’i Banỳ; '
  '40':
  - type: text
    content: 'Ny zanakalahin’i Jônatàna dia i Meribahala; i Meribahala no ray niteraka an’i Mikà. '
  '41':
  - type: text
    content: 'Ny zanakalahin’i Mikà dia ry i Pitôny sy i Melèka ary i Taharea sy i Ahaza. '
  '42':
  - type: text
    content: I Ahaza no ray niteraka an’i Jahirà
  - type: note
    content: 'Jahirà: misy stf sasany ahitana hoe Jahidà, ary ny ao amin’ny 8.36 kosa dia Jôhadà.'
  - type: text
    content: '; i Jahirà, ray niteraka an-dry Halemeta sy i Hazmavety ary i Zimrỳ; i Zimrỳ, ray niteraka an’i Môtsà; '
  '43':
  - type: text
    content: i Môtsà, ray niteraka an’i Binehà. I Refaià
  - type: note
    content: 'Refaià: na hoe Rafà (jereo 8.37).'
  - type: text
    content: ' no zanakalahin’i Binehà; i Elehasà no zanakalahin’i Refaià; ary i Atsela no zanakalahin’i Elehasà. '
  '44':
  - type: text
    content: 'Nanan-janaka enina mirahalahy i Atsela ka ireto avy no anarany: i Hazrikama (lahimatoany) sy i Jismahela, i Seharià sy i Hazarià ary i Hôbadià sy i Hanàna; ireo no zanakalahin’i Atsela.'
  '5':
  - type: text
    content: avy tamin’ny terak’i Selà
  - type: note
    content: 'terak’i Selà: araka ny RM, dia hoe Silônita.'
  - type: text
    content: ', dia i Asaià lahimatoa sy ireo zanany lahy; '
  '6':
  - type: text
    content: avy tamin’ny terak’i Zerà, dia i Jehiela. Ireo mbamin’ny havany rehetra dia nisy 690 tao Jerosalema.
  '7':
  - type: text
    content: 'Tamin’ny taranak’i Benjamîna: dia i Salò zanakalahin’i Mesolama sy zafin’i Hôdavià ary zafiafin’i Senoà; '
  '8':
  - type: text
    content: 'i Jibneià zanakalahin’i Jerôhama; i Elà zanakalahin’i Hozỳ sy zafin’i Mikrỳ; i Mesolama zanakalahin’i Sefatià sy zafin’i Rehoela ary zafiafin’i Jibnià. '
  '9':
  - type: text
    content: Samy lohan’ny fianakaviany avy ireo lehilahy rehetra ireo; izy mbamin’ny havany rehetra, araka ny firazanany avy, dia nisy 956 tao Jerosalema.
