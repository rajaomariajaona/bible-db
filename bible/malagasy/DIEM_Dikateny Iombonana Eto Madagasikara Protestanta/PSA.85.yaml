document_id: PSA.85,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Fiadanana ho an’ny vahoakan’Andriamanitra
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’ny terak’i Kôra
  - type: note
    content: 'terak’i Kôra: jereo Sal 42.1 sy nta.'
  - type: text
    content: .
  '10':
  - type: text
    content: Eny, akaiky an’izay manaja Azy ny famonjeny;
  - type: text
    content: hitoetra eto amin’ity tanintsika ity ny voninahiny.
  '11':
  - type: text
    content: Tafahaona ny fitiavana sy ny fahamarinana,
  - type: text
    content: mifanoroka ny rariny sy ny fiadanana.
  '12':
  - type: text
    content: Mitrebona avy amin’ny tany ny fahamarinana
  - type: text
    content: ary midina avy any an-danitra ny rariny.
  '13':
  - type: text
    content: Ny TOMPO mihitsy no hanome ny zava-tsoa
  - type: text
    content: ka hahavokatra tokoa ny tanintsika;
  '14':
  - type: text
    content: ary handeha eo alohany ny rariny
  - type: text
    content: ka hanoritra ny lalan-kodiaviny.
  '2':
  - type: text
    content: TOMPO ô, nanehoanao fitia ilay taninao
  - type: text
    content: ka nampodînao ny babo tamin’ny terak’i Jakôba.
  '3':
  - type: text
    content: Nesorinao ny heloky ny vahoakanao
  - type: text
    content: ary navelanao avokoa ny fahotany.
  - type: text
    content: Fiatoana
  '4':
  - type: text
    content: Nofoananao manontolo ny fahatezeranao
  - type: text
    content: ka nialanao ny fahaviniranao mirehitra.
  '5':
  - type: text
    content: Andriamanitra mpamonjy anay ô,
  - type: text
    content: mba avereno ho firenena matanjaka izahay,
  - type: text
    content: ka atsaharo ny loniloninao aminay.
  '6':
  - type: text
    content: Ho tezitra aminay mandrakizay ve Ianao
  - type: text
    content: ka hampaharitra ny fahaviniranao
  - type: text
    content: amin’ny taranaka mifandimby?
  '7':
  - type: text
    content: Tsy hovelominao indray ve izahay
  - type: text
    content: mba hifalianay vahoakanao aminao?
  '8':
  - type: text
    content: TOMPO ô, asehoy anay ny fitiavanao
  - type: text
    content: ka omeo anay ny famonjenao.
  '9':
  - type: text
    content: Te hihaino izay lazain’Andriamanitra TOMPO aho.
  - type: text
    content: Fiadanana tokoa no ampanantenainy
  - type: text
    content: ho an’ny vahoakany, dia ireo mpivavaka aminy,
  - type: text
    content: raha tsy miverina amin’ny hadalàny intsony ireo.
