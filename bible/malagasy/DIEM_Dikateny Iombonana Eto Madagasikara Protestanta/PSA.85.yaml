  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Eny, akaiky an’izay manaja Azy ny famonjeny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitoetra eto amin’ity tanintsika ity ny voninahiny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tafahaona ny fitiavana sy ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifanoroka ny rariny sy ny fiadanana.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mitrebona avy amin’ny tany ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary midina avy any an-danitra ny rariny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny TOMPO mihitsy no hanome ny zava-tsoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahavokatra tokoa ny tanintsika;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ary handeha eo alohany ny rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanoritra ny lalan-kodiaviny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: TOMPO ô, nanehoanao fitia ilay taninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampodînao ny babo tamin’ny terak’i Jakôba.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nesorinao ny heloky ny vahoakanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary navelanao avokoa ny fahotany.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nofoananao manontolo ny fahatezeranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nialanao ny fahaviniranao mirehitra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Andriamanitra mpamonjy anay ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba avereno ho firenena matanjaka izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka atsaharo ny loniloninao aminay.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ho tezitra aminay mandrakizay ve Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampaharitra ny fahaviniranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny taranaka mifandimby?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy hovelominao indray ve izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hifalianay vahoakanao aminao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: TOMPO ô, asehoy anay ny fitiavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka omeo anay ny famonjenao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Te hihaino izay lazain’Andriamanitra TOMPO aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fiadanana tokoa no ampanantenainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny vahoakany, dia ireo mpivavaka aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy miverina amin’ny hadalàny intsony ireo.
