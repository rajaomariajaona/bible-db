      - type: text
        text: Tao amin’ny tahirin-kiran’ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira.
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hampiarahina amin’ny sodina. Salamo nataon’i Davida.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy azo ianteherana izay lazain’ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady feno heloka ny ao am-pony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lelany toy ny lala-malama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tendany toy ny fasa-mitanatana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
