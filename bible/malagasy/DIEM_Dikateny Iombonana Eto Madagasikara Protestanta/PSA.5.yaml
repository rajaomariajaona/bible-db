document_id: PSA.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaky ny olona iray rehefa noraisina tao an-tranon’ny Tompo izy
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Hampiarahina amin’ny sodina. Salamo nataon’i Davida.
  '10':
  - type: text
    content: Tsy misy azo ianteherana izay lazain’ireo,
  - type: text
    content: sady feno heloka ny ao am-pony;
  - type: text
    content: ny lelany toy ny lala-malama,
  - type: text
    content: ny tendany toy ny fasa-mitanatana
  - type: note
    content: Jereo Rm 3.13.
  - type: text
    content: .
  '11':
  - type: text
    content: Andriamanitra ô, melohy izy;
  - type: text
    content: ny fikasany anie hampianjera azy!
  - type: text
    content: Roahy izy fa be ota loatra,
  - type: text
    content: satria efa nikomy taminao.
  '12':
  - type: text
    content: Izay rehetra mialoka aminao kosa, aoka hifaly;
  - type: text
    content: ireo arovanao, aoka hihoby mandrakizay;
  - type: text
    content: ireo tia Anao, aoka hiravoravo aminao!
  '13':
  - type: text
    content: TOMPO ô, Ianao no mitahy ny olo-marina;
  - type: text
    content: ny fanambinanao no toy ny ampinga miaro azy.
  '2':
  - type: text
    content: TOMPO ô, mba henoy re ny teniko;
  - type: text
    content: aoka ho tandrinao ny sentom-poko.
  '3':
  - type: text
    content: Ry Mpanjakako sy Andriamanitro ô,
  - type: text
    content: mandrenesa ny feoko fa miantso Anao aho;
  - type: text
    content: Eny, Ianao no ivavahako vao maraina,
  '4':
  - type: text
    content: ka hohenoinao ny feoko, TOMPO ô.
  - type: text
    content: Vao maraina aho dia efa miomana ny horaisinao,
  - type: text
    content: ary miandry ny valim-bavaka avy aminao.
  '5':
  - type: text
    content: Tsy mba Andriamanitra tia ratsy Ianao;
  - type: text
    content: ka tsy hitoetra eo aminao ny olon-dratsy,
  '6':
  - type: text
    content: tsy zakanao ho eo anoloanao ny mpirehareha,
  - type: text
    content: halanao ny mpanao ratsy rehetra.
  '7':
  - type: text
    content: Haringanao ny mpandainga;
  - type: text
    content: ary maharikoriko Anao, TOMPO ô,
  - type: text
    content: ny mpamitaka sy mpamono olona.
  '8':
  - type: text
    content: Izaho kosa hiditra ao an-tranonao,
  - type: text
    content: satria Ianao efa fatra-pitia ahy;
  - type: text
    content: dia hiankohoka amim-panajana
  - type: text
    content: manoloana ny Toeramasinao aho.
  '9':
  - type: text
    content: TOMPO ô, tariho amin’ny fahamarinanao aho
  - type: text
    content: noho ny afitsok’ireo olona mitsikilo ahy;
  - type: text
    content: ataovy mahitsy eo anatrehako
  - type: text
    content: ny lalana asainao alehako.
