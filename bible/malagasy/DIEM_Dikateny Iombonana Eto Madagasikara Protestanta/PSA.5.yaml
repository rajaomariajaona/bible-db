      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, melohy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fikasany anie hampianjera azy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Roahy izy fa be ota loatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa nikomy taminao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra mialoka aminao kosa, aoka hifaly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo arovanao, aoka hihoby mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo tia Anao, aoka hiravoravo aminao!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, Ianao no mitahy ny olo-marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanambinanao no toy ny ampinga miaro azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, mba henoy re ny teniko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho tandrinao ny sentom-poko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Mpanjakako sy Andriamanitro ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandrenesa ny feoko fa miantso Anao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, Ianao no ivavahako vao maraina,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hohenoinao ny feoko, TOMPO ô.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao maraina aho dia efa miomana ny horaisinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miandry ny valim-bavaka avy aminao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba Andriamanitra tia ratsy Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hitoetra eo aminao ny olon-dratsy,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy zakanao ho eo anoloanao ny mpirehareha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: halanao ny mpanao ratsy rehetra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haringanao ny mpandainga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary maharikoriko Anao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpamitaka sy mpamono olona.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa hiditra ao an-tranonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao efa fatra-pitia ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiankohoka amim-panajana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manoloana ny Toeramasinao aho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, tariho amin’ny fahamarinanao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny afitsok’ireo olona mitsikilo ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataovy mahitsy eo anatrehako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lalana asainao alehako.
