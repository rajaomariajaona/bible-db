document_id: EXO.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Mosesy sy i Aharôna miatrika ny Farao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany dia nankany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' i Mosesy sy i Aharôna ka niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no nambaran’ny TOMPO, Andriamanitr’i Israely: «Alefaso ny vahoakako mba hanao fety any an-taniefitra ho fanajana Ahy.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy ny Farao:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa ny TOMPO no hoekeko, ka handefasako ny Israelita handeha? Tsy fantatro IZY, koa tsy halefako handeha ianareo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy indray i Mosesy sy i Aharôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ilay Andriamanitry ny Hebreo, ilay TOMPO Andriamanitray, no niseho taminay. Koa mba avelao izahay handeha lalana telo andro any an-taniefitra hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' aminy, fandrao hamely anay amin’ny areti-mifindra na amin’ny ady Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa hoy ny mpanjakan’i Ejipta taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–O ry Mosesy sy i Aharôna, nahoana ianareo no manaketraka ny vahoaka israelita amin’ny asany? Mandehana ianareo mankany amin’ny asa fanompoanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ankehitriny efa tonga marobe eto amin’ity tany ity ireo olona ireo, ka tianareo hitsahatra amin’ny asa fanompoany ve?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampitomboin’ny Farao ny asan’ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Androtr’iny ihany dia nomen’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' baiko ireo Ejiptianina lehiben’ny asa fanompoana sy ireo Israelita mpitandrin-draharaha ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: –Aza omenareo mololo toy ny taloha intsony ny Israelita amin’ny fanaovam-biriky, fa izy ireo ihany no aoka handeha hanangona mololo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Noharoina mololo voatetitetika ny tanimanga mba hahatonga ny biriky ho mafy tsara (tsy nodorana akory izy ity fa nahahy tamin’ny hainandro fotsiny). '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Handeha hanangona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': rehefa mijinja vary ny Ejiptianina, dia ny salohy ihany no tapahany fa avelany eo am-potony ny mololo, toy ny mioty vary an-tanety atỳ amintsika.'
    marker-yv: yv-n
  - type: text
    text: ' ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa ny isan’ny biriky izay fanaony teo aloha dia takio aminy ihany fa aza ahenanareo, satria olona kamo ireo. Koa izany no itarainany handeha hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ho amin’ilay Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hamafiso fanompoana ireo olona ireo, dia hifototra amin’izany ka tsy hanonofinofy teny lainga.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nivoaka ny lapa ireo lehiben’ny fanompoana sy ireo mpitandrin-draharaha ka nilaza tamin’ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny Farao: tsy hanome mololo anareo intsony aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ianareo ihany no mandehana maka mololo ho anareo amin’izay ahitanareo any, kanefa tsy hisy hahena ny asa fanompoanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia niparitaka manerana ny tany Ejipta manontolo ny Israelita hanangona vodivary hatao mololo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ireo lehiben’ny fanompoana kosa dia nandodona hoe: «Vitao ny asa takîna aminareo isan’andro, tahaka ny tamin’ny mbola nisy mololo ihany!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nokapohiny aza ny mpitandrin-draharaha israelita notinendriny, sady nanontaniany hoe: «Nahoana omaly sy androany no tsy vitanareo ny isan’ny biriky anjaranareo toy ny teo aloha?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nankao amin’ny Farao ireo Israelita mpitandrin-draharaha ka nitaraina hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no dia ataonao toy izao izahay mpanomponao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy omena mololo izahay kanefa asaina manao biriky ihany. Ary jereo fa nokapohina izahay mpanomponao, ka heloky ny vahoakanao izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: heloky ny vahoakanao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ny Ejiptianina) '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izao:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny Septoazinta dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: noho izany, dia hampidi-doza ny vahoakanao ianao.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa novalian’ny Farao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Olona tena kamo mihitsy ianareo! Izany no antony nilazanareo hoe: «Handeha hanao sorona ho an’ny TOMPO izahay.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa ankehitriny, ndeha miasa fa tsy homena mololo intsony ianareo, nefa ny isam-biriky anjaranareo tsy maintsy homenareo ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hitan’ireo mpitandrin-draharaha israelita fa tafalatsaka amin’ny kizo izy raha nilazana hoe: «Tsy hahenanareo ny isam-birikinareo, fa ny anjara fanao isan’andro ihany.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa vantany vao nivoaka avy tao amin’ny Farao ry zareo, dia nandeha nihaona tamin’i Mosesy sy i Aharôna izay efa niandry azy rahateo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ka hoy ireto mpitandrin-draharaha tamin’izy mirahalahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ho hitan’ny TOMPO izao nataonareo izao ka hanamelohany anareo, satria efa nataonareo mangidy hoditra tamin’ny Farao sy ny tandapany izahay; eny, nasianareo sabatra eny an-tanan’ireo mba hamonoany anay!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia niverina tany amin’ny TOMPO i Mosesy ka niteny hoe
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tompo ô, nahoana no nampidi-doza an’ity vahoaka ity ianao? Ahoana àry no nanirahanao ahy atỳ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa hatramin’ny nankanesako tany amin’ny Farao niteny tamin’ny anaranao no nahatonga izao loza izao tamin’ny Israelita, ary ianao dia tsy mamonjy ny vahoakanao akory!
