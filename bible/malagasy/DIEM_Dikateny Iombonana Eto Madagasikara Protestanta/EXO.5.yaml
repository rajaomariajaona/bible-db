document_id: EXO.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Mosesy sy i Aharôna miatrika ny Farao
  - type: text
    content: 'Taorian’izany dia nankany amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' i Mosesy sy i Aharôna ka niteny taminy hoe:'
  - type: text
    content: '–Izao no nambaran’ny TOMPO, Andriamanitr’i Israely: «Alefaso ny vahoakako mba hanao fety any an-taniefitra ho fanajana Ahy.»'
  '10':
  - type: text
    content: 'Dia nivoaka ny lapa ireo lehiben’ny fanompoana sy ireo mpitandrin-draharaha ka nilaza tamin’ny Israelita hoe:'
  - type: text
    content: '–Izao no lazain’ny Farao: tsy hanome mololo anareo intsony aho. '
  '11':
  - type: text
    content: Ianareo ihany no mandehana maka mololo ho anareo amin’izay ahitanareo any, kanefa tsy hisy hahena ny asa fanompoanareo.
  '12':
  - type: text
    content: 'Dia niparitaka manerana ny tany Ejipta manontolo ny Israelita hanangona vodivary hatao mololo. '
  '13':
  - type: text
    content: 'Ireo lehiben’ny fanompoana kosa dia nandodona hoe: «Vitao ny asa takîna aminareo isan’andro, tahaka ny tamin’ny mbola nisy mololo ihany!» '
  '14':
  - type: text
    content: 'Nokapohiny aza ny mpitandrin-draharaha israelita notinendriny, sady nanontaniany hoe: «Nahoana omaly sy androany no tsy vitanareo ny isan’ny biriky anjaranareo toy ny teo aloha?»'
  '15':
  - type: text
    content: 'Nankao amin’ny Farao ireo Israelita mpitandrin-draharaha ka nitaraina hoe:'
  - type: text
    content: '–Nahoana no dia ataonao toy izao izahay mpanomponao? '
  '16':
  - type: text
    content: Tsy omena mololo izahay kanefa asaina manao biriky ihany. Ary jereo fa nokapohina izahay mpanomponao, ka heloky ny vahoakanao izao
  - type: note
    content: 'heloky ny vahoakanao (ny Ejiptianina) izao: ny Septoazinta dia manao hoe noho izany, dia hampidi-doza ny vahoakanao ianao.'
  - type: text
    content: '!'
  '17':
  - type: text
    content: 'Fa novalian’ny Farao hoe:'
  - type: text
    content: '–Olona tena kamo mihitsy ianareo! Izany no antony nilazanareo hoe: «Handeha hanao sorona ho an’ny TOMPO izahay.» '
  '18':
  - type: text
    content: Koa ankehitriny, ndeha miasa fa tsy homena mololo intsony ianareo, nefa ny isam-biriky anjaranareo tsy maintsy homenareo ihany.
  '19':
  - type: text
    content: 'Hitan’ireo mpitandrin-draharaha israelita fa tafalatsaka amin’ny kizo izy raha nilazana hoe: «Tsy hahenanareo ny isam-birikinareo, fa ny anjara fanao isan’andro ihany.» '
  '2':
  - type: text
    content: 'Dia hoy ny Farao:'
  - type: text
    content: –Iza moa ny TOMPO no hoekeko, ka handefasako ny Israelita handeha? Tsy fantatro IZY, koa tsy halefako handeha ianareo!
  '20':
  - type: text
    content: 'Koa vantany vao nivoaka avy tao amin’ny Farao ry zareo, dia nandeha nihaona tamin’i Mosesy sy i Aharôna izay efa niandry azy rahateo; '
  '21':
  - type: text
    content: 'ka hoy ireto mpitandrin-draharaha tamin’izy mirahalahy:'
  - type: text
    content: –Aoka ho hitan’ny TOMPO izao nataonareo izao ka hanamelohany anareo, satria efa nataonareo mangidy hoditra tamin’ny Farao sy ny tandapany izahay; eny, nasianareo sabatra eny an-tanan’ireo mba hamonoany anay!
  '22':
  - type: text
    content: Dia niverina tany amin’ny TOMPO i Mosesy ka niteny hoe
  - type: text
    content: '–Tompo ô, nahoana no nampidi-doza an’ity vahoaka ity ianao? Ahoana àry no nanirahanao ahy atỳ? '
  '23':
  - type: text
    content: Fa hatramin’ny nankanesako tany amin’ny Farao niteny tamin’ny anaranao no nahatonga izao loza izao tamin’ny Israelita, ary ianao dia tsy mamonjy ny vahoakanao akory!
  '3':
  - type: text
    content: 'Dia hoy indray i Mosesy sy i Aharôna hoe:'
  - type: text
    content: '–Ilay Andriamanitry ny Hebreo, ilay TOMPO Andriamanitray, no niseho taminay. Koa mba avelao izahay handeha lalana telo andro any an-taniefitra hanao '
  - type: text
    content: sorona
  - type: text
    content: ' aminy, fandrao hamely anay amin’ny areti-mifindra na amin’ny ady Izy.'
  '4':
  - type: text
    content: 'Fa hoy ny mpanjakan’i Ejipta taminy:'
  - type: text
    content: '–O ry Mosesy sy i Aharôna, nahoana ianareo no manaketraka ny vahoaka israelita amin’ny asany? Mandehana ianareo mankany amin’ny asa fanompoanareo. '
  '5':
  - type: text
    content: Ankehitriny efa tonga marobe eto amin’ity tany ity ireo olona ireo, ka tianareo hitsahatra amin’ny asa fanompoany ve?
  - type: heading
    content: Ampitomboin’ny Farao ny asan’ny Israelita
  '6':
  - type: text
    content: 'Androtr’iny ihany dia nomen’ny '
  - type: text
    content: Farao
  - type: text
    content: ' baiko ireo Ejiptianina lehiben’ny asa fanompoana sy ireo Israelita mpitandrin-draharaha ka nilazany hoe:'
  '7':
  - type: text
    content: –Aza omenareo mololo toy ny taloha intsony ny Israelita amin’ny fanaovam-biriky, fa izy ireo ihany no aoka handeha hanangona mololo
  - type: note
    content: 'Noharoina mololo voatetitetika ny tanimanga mba hahatonga ny biriky ho mafy tsara (tsy nodorana akory izy ity fa nahahy tamin’ny hainandro fotsiny). –Handeha hanangona: rehefa mijinja vary ny Ejiptianina, dia ny salohy ihany no tapahany fa avelany eo am-potony ny mololo, toy ny mioty vary an-tanety atỳ amintsika.'
  - type: text
    content: ' ho azy. '
  '8':
  - type: text
    content: 'Kanefa ny isan’ny biriky izay fanaony teo aloha dia takio aminy ihany fa aza ahenanareo, satria olona kamo ireo. Koa izany no itarainany handeha hanao '
  - type: text
    content: sorona
  - type: text
    content: ' ho amin’ilay Andriamaniny. '
  '9':
  - type: text
    content: Hamafiso fanompoana ireo olona ireo, dia hifototra amin’izany ka tsy hanonofinofy teny lainga.
