document_id: MRK.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fikasana hamono an’i Jesoa
  - type: heading
    content: (Jereo Mt 26.1-5; Lk 22.1-12; Jôh 11.45-52)
  - type: text
    content: 'Indroa andro sisa tsy hahatongavan’ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ' sy ny '
  - type: text
    content: azima
  - type: note
    content: Jereo Eks 12.1-27.
  - type: text
    content: ', dia nitady izay hisamborana an’i Jesoa am-pitaka ny lohandoha-mpisorona sy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' hamonoany Azy. '
  '10':
  - type: text
    content: 'Fa i Jodasy '
  - type: text
    content: Iskariôta
  - type: text
    content: ', anankiray tamin’ny 12 lahy, dia nankany amin’ny lohandoha-mpisorona mba hanolotra an’i Jesoa hovonoina. '
  '11':
  - type: text
    content: Faly ry zareo nandre izany, ka nanaiky hanome vola an’i Jodasy; ary dia notadiavin’i Jodasy izay fotoana mety hanolorany an’i Jesoa.
  - type: heading
    content: Ny sakafo Paska iarahan’i Jesoa amin’ny mpianany
  - type: heading
    content: (Jereo Mt 26.17-25; Lk 22.7-14, 21-23; Jôh 13.21-30)
  '12':
  - type: text
    content: 'Tamin’ny andro voalohany natao hihinanana ny '
  - type: text
    content: azima
  - type: text
    content: ', izay andro famonoana ny zanak’ondry ho an’ny sakafo '
  - type: text
    content: Paska
  - type: text
    content: ', dia hoy ny '
  - type: text
    content: mpianany
  - type: text
    content: ' tamin’i Jesoa:'
  - type: text
    content: –Aiza no tianao hanomananay ho Anao ny sakafo Paska?
  '13':
  - type: text
    content: 'Dia naniraka roa lahy tamin’ny mpianany i Jesoa ka nanao taminy hoe:'
  - type: text
    content: '–Mandehana mankany an-tanàna, fa hisy lehilahy mitondra siny feno rano hifanena aminareo, dia iny arahina; '
  '14':
  - type: text
    content: 'ary ilazao ny tompon’izay trano hidirany hoe: «Izao no tenin’ny Mpampianatra: aiza, hono, izay efitrano hiarahako mihinana ny sakafo Paska amin’ny mpianatro?» '
  '15':
  - type: text
    content: Dia hotoroany efitrano ambony rihana ianareo, efitrano malalaka sy ary fomba sady voavoatra tsara; ka ao ny sakafontsika no omàny.
  '16':
  - type: text
    content: Dia nandeha izy roa lahy ka tonga tany an-tanàna, ary nahita ny toe-javatra araka izay voalazan’i Jesoa taminy sy nanomana ny sakafo Paska.
  '17':
  - type: text
    content: 'Nony hariva ny andro, dia tonga i Jesoa mbamin’ny 12 lahy. '
  '18':
  - type: text
    content: 'Dia nipetraka hihinana izy rehetra, ka iny teo am-pisakafoana iny dia hoy i Jesoa:'
  - type: text
    content: –Lazaiko marina aminareo fa hanolotra Ahy ny anankiray aminareo; dia ilay miara-mihinana amiko
  - type: note
    content: Ampit Sal 41.10.
  - type: text
    content: .
  '19':
  - type: text
    content: 'Nalahelo ny mpianatra ka nanomboka niteny tsirairay tamin’i Jesoa hoe:'
  - type: text
    content: –Tsy izaho manko izany!
  '2':
  - type: text
    content: 'Nefa hoy ry zareo:'
  - type: text
    content: –Aoka tsy ho amin’ny andro fankalazana, fandrao hitabataba ny vahoaka.
  - type: heading
    content: Hosoran’ny vehivavy iray ilomanitra ny lohan’i Jesoa
  - type: heading
    content: (Jereo Mt 26.6-13; Jôh 12.1-8)
  '20':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Ny anankiray aminareo 12 lahy, ilay miara-manatsoboka mofo amiko ao anaty lovia, no izy
  - type: note
    content: Ny mpiara-misakafo dia mihinana ao amin’ny loviabe anankiray iombonana.
  - type: text
    content: '! '
  '21':
  - type: text
    content: 'Ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' dia efa akaikin’ny ho faty, araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' momba Azy'
  - type: note
    content: Jereo Sal 22.2-19; Is 53.
  - type: text
    content: ; mampalahelo anefa ilay olona hanolotra ny Zanak’olona! Tsara raha tsy ary izany olona izany.
  - type: heading
    content: Ny Fanasan’ny Tompo
  - type: heading
    content: (Jereo Mt 26.26-30; Lk 22.15-20; 1 Kôr 11.23-25)
  '22':
  - type: text
    content: 'Raha mbola teo am-pisakafoana iny i Jesoa mbamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ', dia nandray mofo i Jesoa; ary nisaorany an’Andriamanitra izany, dia notapatapahiny sy nomeny ny mpianany ka nataony hoe:'
  - type: text
    content: –Raiso fa ny tenako ity!
  '23':
  - type: text
    content: 'Avy eo nandray kalisy i Jesoa, ary nisaorany an’Andriamanitra izany ka nomeny ny mpianany sy nisotroan’izy rehetra; '
  '24':
  - type: text
    content: 'dia hoy i Jesoa tamin’ny mpianany:'
  - type: text
    content: –Ny rako ity, dia ilay ra anorenan’Andriamanitra ny fanekempihavanany
  - type: note
    content: Ampit Eks 24.8; Jer 31.31-34.
  - type: text
    content: ' sady alatsaka ho an’ny besinimaro. '
  '25':
  - type: text
    content: 'Lazaiko marina aminareo fa tsy hisotro divay intsony Aho mandra-pahatongan’ilay andro hisotroako ny divay vaovao any amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: .
  '26':
  - type: text
    content: Ary rehefa avy nihira ny salamo fiderana
  - type: note
    content: Ny Salamo 115–118 dia fihira aorian’ny famaranana ny sakafo Paska.
  - type: text
    content: ' i Jesoa mbamin’ny mpianany, dia lasa nankany amin’ny tendrombohitra Analanôliva.'
  - type: heading
    content: Ambaran’i Jesoa ny handavan’i Petera Azy
  - type: heading
    content: (Jereo Mt 26.31-35; Lk 22.31-34; Jôh 13.36-38)
  '27':
  - type: text
    content: 'Ary hoy i Jesoa tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  - type: text
    content: '–Handao Ahy avokoa ianareo rehetra, satria izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: '; «Hasiako ny '
  - type: text
    content: mpiandry
  - type: text
    content: ', dia hiparitaka ny '
  - type: text
    content: ondry
  - type: note
    content: Za 13.7.
  - type: text
    content: '.» '
  '28':
  - type: text
    content: Kanefa rehefa tafatsangana velona Aho, dia hialoha anareo any Galilea.
  '29':
  - type: text
    content: 'Fa novalian’i Petera hoe:'
  - type: text
    content: –Na dia handao Anao avokoa aza ny olona rehetra, izaho kosa tsy mba handao Anao.
  '3':
  - type: text
    content: 'Tany Betania i Jesoa tamin’izay ary tao an-tranon’i Simôna mpivarotra bakoly. Raha mbola teo am-pisakafoana i Jesoa, dia tonga ity vehivavy anankiray nitondra tavoahangy '
  - type: text
    content: alabasitra
  - type: text
    content: ' feno ilomanitra sarobidy atao hoe '
  - type: text
    content: narda
  - type: text
    content: '. Dia novakîn-dravehivavy ny tavoahangy ka naidiny tamin’ny lohan’i Jesoa ny ilomanitra. '
  '30':
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: –Lazaiko marina aminao fa anio dia anio ihany, raha mbola tsy maneno indroa akory ny akoho, dia handà Ahy intelo ianao.
  '31':
  - type: text
    content: 'Fa vao mainka koa nanamafy ny teniny i Petera nanao hoe:'
  - type: text
    content: –Na dia hovonoina miaraka aminao aza aho, dia tsy handà Anao.
  - type: text
    content: Ary dia samy nilaza toy izany avokoa ny mpianatra rehetra.
  - type: heading
    content: Vavak’i Jesoa tao Getsemane
  - type: heading
    content: (Jereo Mt 26.36-46; Lk 22.39-46)
  '32':
  - type: text
    content: Dia tonga tany amin’ny saha atao hoe Getsemane
  - type: note
    content: Jereo Mt 26.26 sy nta.
  - type: text
    content: ' i Jesoa mbamin’ireo '
  - type: text
    content: mpianany
  - type: text
    content: ', ka hoy i Jesoa taminy:'
  - type: text
    content: –Mipetraha eto ianareo mandra-pivavako!
  '33':
  - type: text
    content: 'Fa nentin’i Jesoa niaraka taminy kosa ry i Petera sy i Jôhany ary i Jakôba. Dia nanomboka nihoron-koditra sy feno tebiteby fatratra i Jesoa '
  '34':
  - type: text
    content: 'ka niteny tamin’izy telo lahy hoe:'
  - type: text
    content: –Ory dia ory ny fanahiko, ka hila hahafaty Ahy. Mijanòna eto ianareo ary miareta tory.
  '35':
  - type: text
    content: 'Dia nandroso kely i Jesoa ary niankohoka tamin’ny tany, ka nivavaka mba hialan’izany ora fijaliana izany aminy raha azo atao; '
  '36':
  - type: text
    content: 'ary hoy Izy:'
  - type: text
    content: –Raiko ô
  - type: note
    content: 'Raiko ô: ny rijan-teny grika fototra dia nitazona ilay voambolana aramianina hoe Abbà izay manondro ny ray niteraka an’ilay miteny na niteraka an’ilay tenenina.'
  - type: text
    content: ', vitanao ny zavatra rehetra; esory lavitra ahy izao fijaliana izao, kanefa tsy hoe izay sitrapoko, fa izay sitraponao!'
  '37':
  - type: text
    content: 'Dia niverina nankeo amin’izy telo lahy i Jesoa ary nahita azy natory; ka hoy Izy tamin’i Petera:'
  - type: text
    content: '–Matory ve ianao, ry Simôna? Tsy nahari-tory adiny iray akory ve ianao? '
  '38':
  - type: text
    content: Miareta tory ianareo ary mivavaha mba tsy ho azon’ny fakampanahy. Marisika ihany ny fanahin’ny olona fa ny nofo no malemy.
  '39':
  - type: text
    content: 'Dia nihataka indray i Jesoa ary namerina ny vavaka nataony teo. '
  '4':
  - type: text
    content: 'Ary nisy sasany tezitra ka nifampilaza hoe:'
  - type: text
    content: '–Nahoana no dia lanîna foana tahaka izao ity ilomanitra? '
  '40':
  - type: text
    content: Nony niverina nankeo amin’izy telo lahy Izy, dia mbola nahita azy natory, fa efa navesatra ny masony ka tsy hitany izay havaly an’i Jesoa.
  '41':
  - type: text
    content: 'Ary niverina fanintelony teo amin’izy telo lahy Izy dia nanao taminy hoe:'
  - type: text
    content: '–Mbola matory sy miala sasatra ihany ve ianareo? Ampy izay! Tonga ny fotoanandro: indro efa hatolotra eo am-pelatanan’ny mpanota ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '! '
  '42':
  - type: text
    content: Mitsangàna, andao isika handeha! Indro efa akaiky ilay hanolotra Ahy!
  - type: heading
    content: Voasambotra i Jesoa
  - type: heading
    content: (Jereo Mt 26.47-56; Lk 22.47-53; Jôh 18.3-12)
  '43':
  - type: text
    content: 'Ary niaraka tamin’izay, raha mbola miteny eo i Jesoa, dia tonga i Jodasy, anankiray amin’ny 12 lahy; ary andian’olona nirongo sabatra sy kibay, irak’ireo lohandoha-mpisorona sy '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' ary '
  - type: text
    content: loholona
  - type: text
    content: ', no tafaraka taminy. '
  '44':
  - type: text
    content: 'Ilay hanolotra an’i Jesoa dia efa nanome famantarana an-dry zareo hoe: «Izay horohako no Izy ka sambory, dia ento ka ambeno tsara.» '
  '45':
  - type: text
    content: 'Vao tonga i Jodasy, dia nanatona an’i Jesoa avy hatrany ka nanao taminy hoe:'
  - type: text
    content: –Mpampianatra ô!
  - type: text
    content: 'Dia nanoroka Azy i Jodasy. '
  '46':
  - type: text
    content: 'Nohazonin’ireo iraka tamin’izay i Jesoa ary nosamboriny. '
  '47':
  - type: text
    content: 'Nanatsoaka sabatra kosa ny anankiray tamin’ny olona teo anilan’i Jesoa, dia namely an’ilay mpanompon’ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ', ka nahafaka ny sofiny'
  - type: note
    content: Ampit Jôh 18.26.
  - type: text
    content: '. '
  '48':
  - type: text
    content: 'Fa hoy i Jesoa tamin’ireo iraka:'
  - type: text
    content: '–Toy ny hisambotra jiolahy izato fiavinareo mirongo sabatra sy kibay hisambotra Ahy! '
  '49':
  - type: text
    content: Teo aminareo isan’andro aho ary nampianatra tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ', kanefa tsy nosamborinareo. Eny àry, fa dia aoka ho tanteraka ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: '!'
  '5':
  - type: text
    content: 'Azo namidy '
  - type: text
    content: denàry
  - type: text
    content: ' telonjato mahery iny ka omena ny mahantra ny vidiny!'
  - type: text
    content: 'Dia nolevileven-dry zareo ravehivavy. '
  '50':
  - type: text
    content: 'Dia nandao an’i Jesoa ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' rehetra ka nandositra'
  - type: note
    content: Ampit 14.27.
  - type: text
    content: .
  '51':
  - type: text
    content: 'Ary nisy zatovolahy iray nanaraka an’i Jesoa, tsy nanana afa-tsy akanjo manolo-koditra. Nosamborin’ny olona koa izy; '
  '52':
  - type: text
    content: fa nafoin’ilay zatovo ny akanjony ka lasa izy nandositra niboridana.
  - type: heading
    content: Voaheloky ny Fitsarana jiosy i Jesoa
  - type: heading
    content: (Jereo Mt 26.57-68; Lk 22.54-55, 63-71; Jôh 18.13-14, 19-24)
  '53':
  - type: text
    content: 'Nentina tao an-tranon’ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' i Jesoa. Tonga tao avokoa ireo lohandoha-mpisorona sy '
  - type: text
    content: loholona
  - type: text
    content: ' ary '
  - type: text
    content: mpahay lalàna
  - type: text
    content: '. '
  '54':
  - type: text
    content: Fa i Petera kosa nanaraka an’i Jesoa teny lavidavitra teny mandra-pahatonga tao an-tokotanin’ny tranon’ny mpisorombe, dia niara-nipetraka tamin’ireo mpiandry raharaha ka namindro teo anilan’ny afo.
  '55':
  - type: text
    content: 'Nokarohin’ireo lohandoha-mpisorona sy ireo rehetra anisan’ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: ' teo amin’ny Jiosy izay mety hiampangana an’i Jesoa hanamelohana Azy ho faty, saingy tsy nahita ry zareo. '
  '56':
  - type: text
    content: Eny, maro ireo niampanga lainga an’i Jesoa
  - type: note
    content: Ampit Sal 27.12; 35.11.
  - type: text
    content: ', nefa tsy nifanaraka ny fiampangana nataony. '
  '57':
  - type: text
    content: 'Dia nisy nitsangana niampanga lainga an’i Jesoa toy izao:'
  '58':
  - type: text
    content: '–Renay ilay io nanao hoe: «Horavako ity '
  - type: text
    content: tempoly
  - type: text
    content: ' nataon-tanan’olombelona ity, ary ao anatin’ny telo andro, dia hanorina hafa tsy nataon-tanan’olombelona Aho'
  - type: note
    content: Jereo Jôh 2.19.
  - type: text
    content: .»
  '59':
  - type: text
    content: Fa tsy nifanaraka akory ny filàzan’ireo mpiampanga na dia tamin’izany aza.
  '6':
  - type: text
    content: 'Fa hoy i Jesoa:'
  - type: text
    content: '–Avelao izy! Nahoana no anaovanareo izay mampalahelo azy? Asa soa iny nataony tamiko iny. '
  '60':
  - type: text
    content: 'Dia nitsangana nankeo afovoan’ny mpivory ny mpisorombe ary nanontany an’i Jesoa hoe:'
  - type: text
    content: –Tsy mamaly akory ve Ianao? Inona no iampangan’ireo Anao?
  '61':
  - type: text
    content: 'Fa nangina i Jesoa ary tsy namaly akory. Dia nanontany Azy indray ny mpisorombe nanao hoe:'
  - type: text
    content: '–Ianao ve no '
  - type: text
    content: Kristy
  - type: text
    content: ', '
  - type: text
    content: Zanak’ilay Andriamanitra
  - type: text
    content: ' ankalazaintsika lalandava?'
  '62':
  - type: text
    content: 'Ka novalian’i Jesoa hoe:'
  - type: text
    content: '–Izaho no Izy, ary «ho hitanareo ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' mipetraka eo ankavanan’ilay Andriamanitra mahery» ary koa «tamy eo amin’ny rahon’ny habakabaka'
  - type: note
    content: Sal 110.1; Dan 7.13.
  - type: text
    content: .»
  '63':
  - type: text
    content: 'Tamin’izay ny mpisorombe dia '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' sady niteny hoe:'
  - type: text
    content: '–Inona indray no ilàntsika vavolombelona hiampanga? '
  '64':
  - type: text
    content: Renareo teo ny fanevatevàny an’Andriamanitra, ka ahoana ianareo amin’izany?
  - type: text
    content: Dia samy nanameloka an’i Jesoa izy rehetra ka nilaza fa mendrika Azy ny ho faty
  - type: note
    content: Jereo Lev 24.16.
  - type: text
    content: .
  '65':
  - type: text
    content: 'Tamin’ny olona teo dia nisy sasany nandrora an’i Jesoa, nanarona ny tavany, namely totohondry Azy sady nanao taminy hoe:'
  - type: text
    content: –Vinanio hoe!
  - type: text
    content: Dia nalain’ny mpiandry raharaha i Jesoa ary nasian’ireo tahamaina
  - type: note
    content: Ampit Is 50.6.
  - type: text
    content: .
  - type: heading
    content: Lavin’i Petera intelo i Jesoa
  - type: heading
    content: (Jereo Mt 26.69-75; Lk 22.56-62; Jôh 18.15-18, 25-27)
  '66':
  - type: text
    content: 'Raha mbola tao ambany tao an-tokotany i Petera, dia avy ny anankiray tamin’ireo vehivavy mpiasan’ny '
  - type: text
    content: mpisorombe
  - type: text
    content: '. '
  '67':
  - type: text
    content: 'Nahita an’i Petera namindro teo ravehivavy, dia nijery azy tsara ka nanao hoe:'
  - type: text
    content: –Ianao koa niaraka tamin’ilay Jesoa avy any Nazareta iny?
  '68':
  - type: text
    content: 'Fa nandà i Petera ka nanao hoe:'
  - type: text
    content: –Tsy fantatro sady tsy azoko izay lazainao.
  - type: text
    content: Dia nivoaka ny tokotany izy, ary nisy akoho naneno
  - type: note
    content: Misy stf sasany tsy ahitana ny fehezanteny hoe ary nisy akoho naneno.
  - type: text
    content: '. '
  '69':
  - type: text
    content: 'Fa nahatazana an’i Petera ilay vehivavy mpiasa, ka nilazany indray ny olona teo hoe:'
  - type: text
    content: –Anisan’ireny koa io rangahy io!
  '7':
  - type: text
    content: Ny mahantra moa misy eto aminareo mandrakariva
  - type: note
    content: Ampit Deot 15.11.
  - type: text
    content: ', ka azonareo asiana soa amin’izay fotoana tianareo; fa Izaho kosa tsy mba eto aminareo mandrakariva. '
  '70':
  - type: text
    content: 'Fa mbola nandà indray i Petera. Nony afaka kelikely, dia hoy indray ny olona teo amin’i Petera:'
  - type: text
    content: –Tena anisan’ireny tokoa ianao sady Galileanina rahateo.
  '71':
  - type: text
    content: 'Fa niozona sy nianiana i Petera ka nanao hoe:'
  - type: text
    content: –Tsy fantatro izany Lehilahy lazainareo izany.
  '72':
  - type: text
    content: 'Ary niaraka tamin’izay dia nisy akoho naneno fanindroany; ka tsaroan’i Petera ilay tenin’i Jesoa fony Izy nilaza taminy hoe: «Raha mbola tsy maneno indroa akory ny akoho, dia handà Ahy intelo ianao.» Dia nigogogogo nitomany i Petera'
  - type: note
    content: 'Jereo 14.30. –Dia nigogogogo nitomany i Petera: dkt hafa Dia nitsoaka any alatrano i Petera ka nitomany na hoe Dia nisaron-tava i Petera ka nitomany.'
  - type: text
    content: .
  '8':
  - type: text
    content: Nanao izay azony natao izy nanosotra ilomanitra ny tenako dieny mialoha mba hamboarany Ahy halevina
  - type: note
    content: Ny fomba fandevenana jiosy fahizany dia misy fanosorana ilomanitra sy zava-manitra ny razana.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Lazaiko marina aminareo fa na aiza na aiza eran’izao tontolo izao hanambarana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ', dia holazaina koa izao nataon’ity vehivavy ity izao mba ho fahatsiarovana azy.'
  - type: heading
    content: Mitetika hanolotra an’i Jesoa i Jodasy Iskariôta
  - type: heading
    content: (Jereo Mt 26.14-16; Lk 22.3-6)
