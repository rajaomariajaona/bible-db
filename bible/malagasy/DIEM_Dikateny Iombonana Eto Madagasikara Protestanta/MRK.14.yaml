document_id: MRK.14,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fikasana hamono an’i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 26.1-5; Lk 22.1-12; Jôh 11.45-52)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Indroa andro sisa tsy hahatongavan’ny fankalazana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: azima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 12.1-27.
      marker-yv: yv-n
    - type: text
      text: ', dia nitady izay hisamborana an’i Jesoa am-pitaka ny lohandoha-mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' hamonoany Azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa i Jodasy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Iskariôta
    - type: text
      text: ', anankiray tamin’ny 12 lahy, dia nankany amin’ny lohandoha-mpisorona mba hanolotra an’i Jesoa hovonoina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Faly ry zareo nandre izany, ka nanaiky hanome vola an’i Jodasy; ary dia notadiavin’i Jodasy izay fotoana mety hanolorany an’i Jesoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny sakafo Paska iarahan’i Jesoa amin’ny mpianany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 26.17-25; Lk 22.7-14, 21-23; Jôh 13.21-30)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tamin’ny andro voalohany natao hihinanana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: azima
    - type: text
      text: ', izay andro famonoana ny zanak’ondry ho an’ny sakafo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ', dia hoy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' tamin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza no tianao hanomananay ho Anao ny sakafo Paska?
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia naniraka roa lahy tamin’ny mpianany i Jesoa ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana mankany an-tanàna, fa hisy lehilahy mitondra siny feno rano hifanena aminareo, dia iny arahina; '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary ilazao ny tompon’izay trano hidirany hoe: «Izao no tenin’ny Mpampianatra: aiza, hono, izay efitrano hiarahako mihinana ny sakafo Paska amin’ny mpianatro?» '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia hotoroany efitrano ambony rihana ianareo, efitrano malalaka sy ary fomba sady voavoatra tsara; ka ao ny sakafontsika no omàny.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia nandeha izy roa lahy ka tonga tany an-tanàna, ary nahita ny toe-javatra araka izay voalazan’i Jesoa taminy sy nanomana ny sakafo Paska.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nony hariva ny andro, dia tonga i Jesoa mbamin’ny 12 lahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nipetraka hihinana izy rehetra, ka iny teo am-pisakafoana iny dia hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lazaiko marina aminareo fa hanolotra Ahy ny anankiray aminareo; dia ilay miara-mihinana amiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 41.10.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nalahelo ny mpianatra ka nanomboka niteny tsirairay tamin’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy izaho manko izany!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nefa hoy ry zareo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka tsy ho amin’ny andro fankalazana, fandrao hitabataba ny vahoaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hosoran’ny vehivavy iray ilomanitra ny lohan’i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 26.6-13; Jôh 12.1-8)
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny anankiray aminareo 12 lahy, ilay miara-manatsoboka mofo amiko ao anaty lovia, no izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny mpiara-misakafo dia mihinana ao amin’ny loviabe anankiray iombonana.
      marker-yv: yv-n
    - type: text
      text: '! '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' dia efa akaikin’ny ho faty, araka ny voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' momba Azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 22.2-19; Is 53.
      marker-yv: yv-n
    - type: text
      text: ; mampalahelo anefa ilay olona hanolotra ny Zanak’olona! Tsara raha tsy ary izany olona izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Fanasan’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 26.26-30; Lk 22.15-20; 1 Kôr 11.23-25)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha mbola teo am-pisakafoana iny i Jesoa mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ', dia nandray mofo i Jesoa; ary nisaorany an’Andriamanitra izany, dia notapatapahiny sy nomeny ny mpianany ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiso fa ny tenako ity!
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Avy eo nandray kalisy i Jesoa, ary nisaorany an’Andriamanitra izany ka nomeny ny mpianany sy nisotroan’izy rehetra; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'dia hoy i Jesoa tamin’ny mpianany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny rako ity, dia ilay ra anorenan’Andriamanitra ny fanekempihavanany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 24.8; Jer 31.31-34.
      marker-yv: yv-n
    - type: text
      text: ' sady alatsaka ho an’ny besinimaro. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Lazaiko marina aminareo fa tsy hisotro divay intsony Aho mandra-pahatongan’ilay andro hisotroako ny divay vaovao any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary rehefa avy nihira ny salamo fiderana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny Salamo 115–118 dia fihira aorian’ny famaranana ny sakafo Paska.
      marker-yv: yv-n
    - type: text
      text: ' i Jesoa mbamin’ny mpianany, dia lasa nankany amin’ny tendrombohitra Analanôliva.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa ny handavan’i Petera Azy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 26.31-35; Lk 22.31-34; Jôh 13.36-38)
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary hoy i Jesoa tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Handao Ahy avokoa ianareo rehetra, satria izao no voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: '; «Hasiako ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpiandry
    - type: text
      text: ', dia hiparitaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ondry
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Za 13.7.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Kanefa rehefa tafatsangana velona Aho, dia hialoha anareo any Galilea.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa novalian’i Petera hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Na dia handao Anao avokoa aza ny olona rehetra, izaho kosa tsy mba handao Anao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tany Betania i Jesoa tamin’izay ary tao an-tranon’i Simôna mpivarotra bakoly. Raha mbola teo am-pisakafoana i Jesoa, dia tonga ity vehivavy anankiray nitondra tavoahangy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alabasitra
    - type: text
      text: ' feno ilomanitra sarobidy atao hoe '
    - type: usfm
      marker: w
      children:
      - type: text
        text: narda
    - type: text
      text: '. Dia novakîn-dravehivavy ny tavoahangy ka naidiny tamin’ny lohan’i Jesoa ny ilomanitra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lazaiko marina aminao fa anio dia anio ihany, raha mbola tsy maneno indroa akory ny akoho, dia handà Ahy intelo ianao.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa vao mainka koa nanamafy ny teniny i Petera nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Na dia hovonoina miaraka aminao aza aho, dia tsy handà Anao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia samy nilaza toy izany avokoa ny mpianatra rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavak’i Jesoa tao Getsemane
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 26.36-46; Lk 22.39-46)
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Dia tonga tany amin’ny saha atao hoe Getsemane
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 26.26 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' i Jesoa mbamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ', ka hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mipetraha eto ianareo mandra-pivavako!
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Fa nentin’i Jesoa niaraka taminy kosa ry i Petera sy i Jôhany ary i Jakôba. Dia nanomboka nihoron-koditra sy feno tebiteby fatratra i Jesoa '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'ka niteny tamin’izy telo lahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ory dia ory ny fanahiko, ka hila hahafaty Ahy. Mijanòna eto ianareo ary miareta tory.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia nandroso kely i Jesoa ary niankohoka tamin’ny tany, ka nivavaka mba hialan’izany ora fijaliana izany aminy raha azo atao; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'ary hoy Izy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiko ô
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.36 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Raiko ô: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny rijan-teny grika fototra dia nitazona ilay voambolana aramianina hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abbà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izay manondro ny ray niteraka an’ilay miteny na niteraka an’ilay tenenina.'
      marker-yv: yv-n
    - type: text
      text: ', vitanao ny zavatra rehetra; esory lavitra ahy izao fijaliana izao, kanefa tsy hoe izay sitrapoko, fa izay sitraponao!'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Dia niverina nankeo amin’izy telo lahy i Jesoa ary nahita azy natory; ka hoy Izy tamin’i Petera:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Matory ve ianao, ry Simôna? Tsy nahari-tory adiny iray akory ve ianao? '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Miareta tory ianareo ary mivavaha mba tsy ho azon’ny fakampanahy. Marisika ihany ny fanahin’ny olona fa ny nofo no malemy.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia nihataka indray i Jesoa ary namerina ny vavaka nataony teo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nisy sasany tezitra ka nifampilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana no dia lanîna foana tahaka izao ity ilomanitra? '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Nony niverina nankeo amin’izy telo lahy Izy, dia mbola nahita azy natory, fa efa navesatra ny masony ka tsy hitany izay havaly an’i Jesoa.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary niverina fanintelony teo amin’izy telo lahy Izy dia nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
