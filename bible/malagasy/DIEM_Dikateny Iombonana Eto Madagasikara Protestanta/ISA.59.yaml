document_id: ISA.59,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny efitra mampisaraka ny Tompo sy ny vahoakany
  - type: text
    content: Tsia, tsy fohy ny tanan’ny TOMPO fa mahavonjy,
  - type: text
    content: tsy lalodalovana ny sofiny fa mahare.
  '10':
  - type: text
    content: Mandeha mitsapatsapa manara-drindrina
  - type: text
    content: toy ny olona jamba isika
  - type: text
    content: ary miraparapa toy ny tsy mana-maso.
  - type: text
    content: Antoandro mitataovovonana dia tafintohina isika
  - type: text
    content: tahaka ny efa amin’ny maizimaizina;
  - type: text
    content: ary salama be izao isika nefa toy ny olona maty.
  '11':
  - type: text
    content: Mierona sahala amin’ny orsa isika rehetra
  - type: text
    content: na mitolokoloko tahaka ny voromahailala.
  - type: text
    content: Nanantena ny rariny isika, nefa tsy nisy;
  - type: text
    content: niandrandra famonjena, nefa lavitra antsika izany.
  '12':
  - type: text
    content: TOMPO ô, imbetsaka izahay
  - type: text
    content: no efa nikomy taminao tokoa;
  - type: text
    content: miampanga anay ny helokay
  - type: text
    content: ary manjohy anay ny otanay,
  - type: text
    content: ka fantatray tsara ny hadisoanay.
  '13':
  - type: text
    content: Eny, nikomy sy nivadika taminao izahay
  - type: text
    content: ka tsy nanaiky hanaraka Anao Andriamanitray.
  - type: text
    content: Famoretana sy fikomiana no resakay
  - type: text
    content: ary lainga fotsiny no foroninay ao am-po
  - type: text
    content: sy avoakan’ny teny ataonay.
  '14':
  - type: text
    content: Noho izany, dia mihemotra ny rariny
  - type: text
    content: ary mijanon-davitra ny hitsiny,
  - type: text
    content: satria eny an-kianja malalaka
  - type: text
    content: no voatohintohina ny fahamarinana
  - type: text
    content: ary tsy mahazo miditra ny hitsim-po.
  '15':
  - type: text
    content: Tsy eo tokoa ny fahamarinana;
  - type: text
    content: ary izay miala amin’ny ratsy
  - type: text
    content: dia mitolo-tena ho voaroba.
  - type: heading
    content: Mirotsaka an-tsehatra ny Tompo
  - type: text
    content: Hitan’ny TOMPO izany rehetra izany,
  - type: text
    content: ary ratsy eo imasony ny tsy fisian’ny rariny.
  '16':
  - type: text
    content: Hitan’ny Tompo fa tsy nisy niraika akory,
  - type: text
    content: gaga Izy fa tsy nisy olona mpanelanelana;
  - type: text
    content: koa ny fahefàny ihany no nentiny hamonjy
  - type: text
    content: ary ny fahamarinany no nandrisika ny tenany
  - type: note
    content: Ampit 63.5.
  - type: text
    content: .
  '17':
  - type: text
    content: Eny, ny fahamarinana no nakanjoin’ny Tompo
  - type: text
    content: ho tahaka ny akanjo vy fiarovan-tena
  - type: text
    content: ary ny famonjena no nataony ho satro-by fiarovan-doha.
  - type: text
    content: Ny famaliana no toy ny fitafiana nanaovany
  - type: text
    content: ary ny fitiavana miredareda manentana Azy
  - type: text
    content: no toy ny lamba nisalorany
  - type: note
    content: Ampit Ef 6.14,17; 1Tes 5.8.
  - type: text
    content: .
  '18':
  - type: text
    content: Hamaly ny olona araka ny nataony Izy,
  - type: text
    content: dia valifaty mirehidrehitra tokoa
  - type: text
    content: ho an’ny mpanohitra Azy sy ho an’ny fahavalony;
  - type: text
    content: hatramin’ireo any amin’ny nosy lavitra aza!
  - type: text
    content: dia hiharan’izany valifaty izany.
  '19':
  - type: text
    content: Amin’izay dia hohajaina ny anaran’ny TOMPO
  - type: text
    content: hatrany amin’ny fiposahan’ny masoandro
  - type: text
    content: ka hatrany amin’ny filentehany;
  - type: text
    content: hohajaina ny fanatrehany be voninahitra,
  - type: text
    content: rehefa ho avy Izy toy ny ranomaria
  - type: text
    content: asesiky ny tafio-drivotra goavana.
  '2':
  - type: text
    content: Saingy ny helokareo no mampisy efitra
  - type: text
    content: manelanelana anareo amin’Andriamanitrareo
  - type: text
    content: ary ny fahotanareo no manery Azy hanafin-tava,
  - type: text
    content: ho lavitra anareo ka tsy mahahaino anareo.
  '20':
  - type: text
    content: Ho avy ny TOMPO hanavotra an’i Tsiôna
  - type: text
    content: sy hanavotra ireo anisan’ny firenen’i Jakôba
  - type: text
    content: miala amin’ny fahadisoany
  - type: note
    content: Ampit Rm 11.26.
  - type: text
    content: .
  - type: text
    content: Izany no teny hentitry ny TOMPO.
  '21':
  - type: text
    content: 'Dia hoy koa ny TOMPO hoe: «Izaho kosa hanao izao fanekempihavanana izao aminy: ny Fanahiko hitoetra eo aminareo ary ny teniko dia efa teo am-bavanareo, ka samy tsy hiala aminareo hatramin’izao ka ho mandrakizay.'
  - type: text
    content: Ny Fanahiko sy ny teniko dia tsy hiala aminareo na amin’ny zanakareo na amin’ny taranaky ny taranakareo. Izaho TOMPO no mampanantena izany.»
  '3':
  - type: text
    content: Satria voaloto amin’ny ra ny felatananareo
  - type: text
    content: ary voaloto amin’ny heloka ny rantsan-tananareo;
  - type: text
    content: lainga sy fanaratsiana
  - type: text
    content: no afafin’ny teninareo.
  '4':
  - type: text
    content: Tsy ara-drariny no itorianareo olona,
  - type: text
    content: tsy araka ny toetra mahatoky
  - type: text
    content: no iadianareo am-pitsarana;
  - type: text
    content: porofo tsy azo antoka no ianteheranareo,
  - type: text
    content: zavatra tsy marim-pototra no teniteneninareo;
  - type: text
    content: torontoronina ny ratsy ianareo ka miteraka loza.
  '5':
  - type: text
    content: Toa atodin’ny menarana no kotrehin’ny fikasanareo,
  - type: text
    content: 'ka izay manandrana amin’ireny dia maty:'
  - type: text
    content: vao vaky iny, dia menarana no mivoaka avy ao.
  - type: text
    content: Toa ladin-kala ny lamba tenominareo
  - type: text
    content: ka tsy natao hotafîna na hirakofana izany
  - type: text
    content: satria zavatra mampidi-doza.
  - type: text
    content: Herisetra no asa vokarin’ny tananareo.
  '7':
  - type: text
    content: Mihazakazaka erỳ ianareo hanao ratsy
  - type: text
    content: ary mirohotra hamono ny tsy manan-tsiny.
  - type: text
    content: Ny hanisy ratsy ny hafa ihany no kendrenareo;
  - type: text
    content: fandravana sy fandringanana no eo amin’ny alehanareo.
  '8':
  - type: text
    content: Tsy fantatrareo ny lalan’ny fiadanana,
  - type: text
    content: ary tsy misy rariny eo amin’izay andalovanareo;
  - type: text
    content: lalana miolakolaka no tianareo hosoritana,
  - type: text
    content: ka tsy hahita fiadanana izay mandia izany
  - type: note
    content: 'And 7-8: ampit Rm 3.15-17.'
  - type: text
    content: .
  - type: heading
    content: Miaiky hadisoana ny vahoakan’Andriamanitra
  '9':
  - type: text
    content: Noho izany, dia lavitra antsika ny rariny
  - type: text
    content: ary tsy tonga amintsika ny hitsiny.
  - type: text
    content: Nanantena hahita fahazavana isika,
  - type: text
    content: kanjo indro haizina mikitroka;
  - type: text
    content: hazavàn’ny maraina no nandrandraintsika,
  - type: text
    content: kanjo haizim-pito no andehanantsika.
