document_id: ISA.59
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny efitra mampisaraka ny Tompo sy ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsia, tsy fohy ny tanan’ny TOMPO fa mahavonjy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy lalodalovana ny sofiny fa mahare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Saingy ny helokareo no mampisy efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: manelanelana anareo amin’Andriamanitrareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahotanareo no manery Azy hanafin-tava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho lavitra anareo ka tsy mahahaino anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Satria voaloto amin’ny ra ny felatananareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voaloto amin’ny heloka ny rantsan-tananareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lainga sy fanaratsiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no afafin’ny teninareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy ara-drariny no itorianareo olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy araka ny toetra mahatoky
- type: usfm
  marker: q1
  children:
  - type: text
    text: no iadianareo am-pitsarana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: porofo tsy azo antoka no ianteheranareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: zavatra tsy marim-pototra no teniteneninareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: torontoronina ny ratsy ianareo ka miteraka loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: Toa atodin’ny menarana no kotrehin’ny fikasanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka izay manandrana amin’ireny dia maty:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vao vaky iny, dia menarana no mivoaka avy ao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toa ladin-kala ny lamba tenominareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy natao hotafîna na hirakofana izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria zavatra mampidi-doza.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Herisetra no asa vokarin’ny tananareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mihazakazaka erỳ ianareo hanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mirohotra hamono ny tsy manan-tsiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hanisy ratsy ny hafa ihany no kendrenareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandravana sy fandringanana no eo amin’ny alehanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy fantatrareo ny lalan’ny fiadanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy rariny eo amin’izay andalovanareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lalana miolakolaka no tianareo hosoritana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hahita fiadanana izay mandia izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 7-8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Rm 3.15-17.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miaiky hadisoana ny vahoakan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho izany, dia lavitra antsika ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy tonga amintsika ny hitsiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanantena hahita fahazavana isika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo indro haizina mikitroka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hazavàn’ny maraina no nandrandraintsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo haizim-pito no andehanantsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mandeha mitsapatsapa manara-drindrina
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny olona jamba isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miraparapa toy ny tsy mana-maso.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Antoandro mitataovovonana dia tafintohina isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny efa amin’ny maizimaizina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary salama be izao isika nefa toy ny olona maty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mierona sahala amin’ny orsa isika rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mitolokoloko tahaka ny voromahailala.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanantena ny rariny isika, nefa tsy nisy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niandrandra famonjena, nefa lavitra antsika izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: TOMPO ô, imbetsaka izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: no efa nikomy taminao tokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miampanga anay ny helokay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manjohy anay ny otanay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka fantatray tsara ny hadisoanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, nikomy sy nivadika taminao izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nanaiky hanaraka Anao Andriamanitray.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Famoretana sy fikomiana no resakay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary lainga fotsiny no foroninay ao am-po
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy avoakan’ny teny ataonay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Noho izany, dia mihemotra ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mijanon-davitra ny hitsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria eny an-kianja malalaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: no voatohintohina ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mahazo miditra ny hitsim-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsy eo tokoa ny fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay miala amin’ny ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitolo-tena ho voaroba.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mirotsaka an-tsehatra ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitan’ny TOMPO izany rehetra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ratsy eo imasony ny tsy fisian’ny rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hitan’ny Tompo fa tsy nisy niraika akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: gaga Izy fa tsy nisy olona mpanelanelana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny fahefàny ihany no nentiny hamonjy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahamarinany no nandrisika ny tenany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 63.5.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eny, ny fahamarinana no nakanjoin’ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tahaka ny akanjo vy fiarovan-tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny famonjena no nataony ho satro-by fiarovan-doha.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny famaliana no toy ny fitafiana nanaovany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fitiavana miredareda manentana Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no toy ny lamba nisalorany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ef 6.14,17; 1Tes 5.8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hamaly ny olona araka ny nataony Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia valifaty mirehidrehitra tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny mpanohitra Azy sy ho an’ny fahavalony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ireo any amin’ny nosy lavitra aza!
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiharan’izany valifaty izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amin’izay dia hohajaina ny anaran’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrany amin’ny fiposahan’ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatrany amin’ny filentehany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hohajaina ny fanatrehany be voninahitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa ho avy Izy toy ny ranomaria
- type: usfm
  marker: q1
  children:
  - type: text
    text: asesiky ny tafio-drivotra goavana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ho avy ny TOMPO hanavotra an’i Tsiôna
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanavotra ireo anisan’ny firenen’i Jakôba
- type: usfm
  marker: q1
  children:
  - type: text
    text: miala amin’ny fahadisoany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 11.26.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no teny hentitry ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy koa ny TOMPO hoe: «Izaho kosa hanao izao fanekempihavanana izao aminy: ny Fanahiko hitoetra eo aminareo ary ny teniko dia efa teo am-bavanareo, ka samy tsy hiala aminareo hatramin’izao ka ho mandrakizay.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ny Fanahiko sy ny teniko dia tsy hiala aminareo na amin’ny zanakareo na amin’ny taranaky ny taranakareo. Izaho TOMPO no mampanantena izany.»
