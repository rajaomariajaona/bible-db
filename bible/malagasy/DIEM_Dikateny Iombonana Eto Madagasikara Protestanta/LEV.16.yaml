document_id: LEV.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andro lehibe fankalazana ny Famelan-keloka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Niteny tamin’i Mosesy ny TOMPO, taorian’ny nahafatesan’izy roa lahy zanak’i Aharôna, dia izy mirahalahy maty tamin’ny nanatonany hitondra ditin-kazo manitra tsy sahaza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 10.1-2.
    marker-yv: yv-n
  - type: text
    text: ' teo anatrehan’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ka hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Ilazao i Aharôna rahalahinao mba tsy hiditra ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina Indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Heb 6.19.
    marker-yv: yv-n
  - type: text
    text: ', ambadiky ny efitra lamba, afa-tsy amin’ny andro sahaza ihany; ary ilazao koa izy tsy hankeo anoloan’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina
  - type: text
    text: ' izay misy rakotra volamena eo amboniny, sao ho faty izy satria hiseho anaty rahona eo ambonin’io rakotra volamena io Aho.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa miditra ao amin’ny Toeramasina Indrindra kosa i Aharôna, dia ireto avy no fomba harahiny. Ombilahy iray hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanalana ny ota sy ondrilahy iray hatao sorona dorana manontolo no hoentiny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Heb 9.7.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Akanjo lava voatokana, vita amin’ny kiran-drongony fotsy, no hanaovany; kalisaonina, vita amin’ny kiran-drongony fotsy, no hataony manolo-koditra; fehikibo, vita amin’ny kiran-drongony fotsy, no hietrany; ary fehiloha, vita amin’ny kiran-drongony fotsy, no hisatrohany: samy fanamiana voatokana ireo ka rehefa avy nandro i Aharôna vao hitafy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny Fiangonan’ny Israelita tsivakivolo dia handraisany osilahy roa hatao sorona fanalana ny ota sy ondrilahy iray hatao sorona dorana manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Dia hatolotr’i Aharôna ny ombilahy hatao sorona fanalana ny ota ho an’ny tenany; izay izy vao hanao fombam-pivavahana famelan-keloka ho an’ny tenany sy ny ankohonany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Halainy koa ny osilahy roa ka hapetrany eo anatrehan’ny TOMPO, eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia hataon’i Aharôna antsapaka ireo osilahy ireo mba hahafantarana izay osilahy ho an’ny TOMPO sy izay osilahy ho osy mikarenjy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'osy mikarenjy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hazazela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' amin’ny teny Hebreo. Tokony ho nisaraka Hoz’azal izy io tamin’ny voalohany izany hoe osy mikarenjy saingy voatambatra tsy nahy ka lasa anarana hoe Hazazela tatỳ aoriana rehefa nanisy zanatsoratra ny Masôreta ka noheverina ho demony mihaodihaody any an-taniefitra. Mba hampahazava ny hoe osilahy iray hovonoina ary ny iray halefa hikarenjy dia jereo 14.4-5, 49-53.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hatolotr’i Aharôna ny osilahy voatendrin’ny antsapaka ho an’ny TOMPO, ka hataony sorona fanalana ny ota. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ny osilahy voatendrin’ny antsapaka ho osy mikarenjy kosa dia ampiasaina hanatontosana ny fombam-pivavahana famelan-keloka: hapetraka velona eo anatrehan’ny TOMPO aloha ilay osilahy, vao horoahina ho osy mikarenjy any an-taniefitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Koa hatolotr’i Aharôna izany ny ombilahy hatao sorona fanalana ny ota ho an’ny tenany; izay izy vao hanao ny fombam-pivavahana famelan-keloka ho an’ny tenany sy ny ankohonany. Rehefa avy namono ilay ombilahy i Aharôna, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia haka fanembohana nofenoina vain’afo avy amin’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' izay ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' sy haka vovoka ditin-kazo manitra eran-tanan-droa, ka hitondra izany rehetra izany ao anatin’ny Toeramasina Indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eo anatrehan’ny TOMPO eo i Aharôna no hanisy ditin-kazo manitra eo ambonin’ny vain’afo ka hosaronan’ny setrok’izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Io '
    - type: usfm
      marker: it
      children:
      - type: text
        text: setroka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' io dia mampahatsiahy ilay setroka voateny ao amin’ny Boky Eksôdy (jereo Eks 19.9) ka anambaràna fa sady eo tokoa Andriamanitra (Lev 16.2) no miafina.'
    marker-yv: yv-n
  - type: text
    text: ' ilay rakotra volamena eo ambonin’ny Fanekempihavanana mba tsy hahafaty an’i Aharôna. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hangalany ny ran’ilay ombilahy ka hafafin’ny fanondrony eo amin’ny rakotra volamena, lafy atsinanana; ary eo anoloan’ny rakotra volamena koa dia hamafazany ra impito amin’ny fanondrony. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Manaraka izany, rehefa voavonon’i Aharôna ny osilahy izay hatao sorona fanalana ny ota ho an’ny vahoaka israelita, dia hoentiny miditra ao anatin’ny Toeramasina Indrindra koa ny rany; hataony tahaka ny efa nataony tamin’ny ran’ilay ombilahy izany, ka hafafiny eo ambonin’ny rakotra volamena sy eo anoloany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Heb 9.12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hotontosain’i Aharôna ny fombam-pivavahana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanadiovana
  - type: text
    text: ' ny Toeramasina Indrindra, noho ny fahalotoana amam-pahadisoan’ny Israelita, araka ny fahotana rehetra vitany; toy izany koa no hataon’i Aharôna amin’ny faritra sisa ao amin’ny Tranolay fihaonana, izay mitoetra miaraka amin’ny Israelita sady eo afovoan’ny fahalotoany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy tokony hisy olona eo amin’ny Tranolay fihaonana, manomboka hatreo amin’ny idiran’i Aharôna hanao ny fombam-pivavahana famelan-keloka mandra-pialany tao. Rehefa vita ny fombam-pivavahana famelan-keloka ho an’ny tenany sy ho an’ny ankohonany ary ho an’ny Fiangonan’ny Israelita tsivakivolo, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia hivoaka hankeo amin’ny alitara eo anoloan’ny Tranolay fihaonana izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alitara fisoronana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no tian-kolazaina. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –dia hivoaka... fihaonana izy ka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dkt hafa azo aroso '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia hivoaka ny Toeramasina Indrindra izy hankeo amin’ilay alitara ao anatin’ny Tranolay fihaonana ka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; ny alitara fandoroana ditin-kazo manitra no tian-kolazaina amin’izany.
    marker-yv: yv-n
  - type: text
    text: ', ka hanao ny fombam-pivavahana fanadiovana io alitara io. Samy hangalany avy ny ran’ny ombilahy sy ny ran’ny osilahy hanentenany ny tandroky ny alitara eo amin’ny zorony efatra; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary hamafazany ra impito amin’ny fanondro koa ny alitara. Dia toy izany no hanadiovan’i Aharôna ny alitara ho afaka amin’ny fahalotoan’ny Israelita ka hamerenan-kasina azy indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '«Rehefa tapitra ny fombam-pivavahana fanadiovana ny Toeramasina Indrindra sy ny faritra sisa amin’ny Tranolay fihaonana ary koa ny alitara fisoronana, dia ilay osilahy mbola velona no hatolotr’i Aharôna. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hapetrany amin’ny lohan’io osilahy io ny tanany roa, ary hotanisainy eo amboniny avokoa ny heloka amam-pahadisoan’ny Israelita, araka ny fahotana rehetra vitany. Hatambesatr’i Aharôna amin’ilay osilahy ireo fahotana rehetra ireo; izay izy vao hampandroaka azy hankany an-taniefitra, hoentina lehilahy anankiray voatendry. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia hindaosin’ny osilahy ho any an-taniefitra ny helok’izy rehetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Rehefa voaroaka ho any an-taniefitra ilay osilahy, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: dia hiditra ao amin’ny Tranolay fihaonana i Aharôna ka hanala sy hametraka ny fanamiana vita kiran-drongony fotsy, izay niakanjoany tamin’izy niditra tao amin’ny Toeramasina Indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Ezek 44.19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Handro ao amin’ny faritra anankiray voatokana ho an’izany izy, dia hiakanjo fitafiana hafa; ary hiainga hanolotra ny sorona dorana manontolo ho an’ny tenany sy ny sorona dorana manontolo ho an’ny vahoaka izy ka hanatontosa ny fombam-pivavahana famelan-keloka ho an’ny tenany sy ho an’ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny tavin-kenan’ireo biby natao sorona fanalana ny ota dia hodorany hanetona eo ambonin’ny alitara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '«Ilay lehilahy nandroaka ny osilahy ho osy mikarenjy dia hanasa fitafiana sy handro, vao mahazo miditra ny toby. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary ny ombilahy sy osilahy, izay natao sorona fanalana ny ota sady samy efa nangalana ra mba hanaovana ny fombam-pivavahana famelan-keloka ao amin’ny Toeramasina Indrindra, dia hindaosina any ivelan’ny toby, ka hodorana ny hodiny sy henany ary dikin-drorohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Heb 13.11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ilay lehilahy nandoro azy dia hanasa fitafiana sy handro koa, vao hiditra ny toby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '«Izao no lalàna raikitra ho anareo: Ny andro fahafolo amin’ny volana fahafito, dia aoka ianareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hifady hanina
  - type: text
    text: ' sady tsy hanao raharaha akory, na ianareo Israelita tompontany na ireo vahiny valovotaka eo aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa amin’io andro io no hanaovana ny fombam-pivavahana famelan-keloka mba hanadiovana anareo, ka dia hadio ho afaka amin’ny fahotana rehetra eo anatrehan’ny TOMPO ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ho tena andro fitsaharana sy fifadian-kanina ho anareo io andro io. Lalàna raikitra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '«Any aoriana any, dia ny mpisorona izay voahosotra sy voatokana ho mpisorombe hisolo ny rainy no hanao ireo fombam-pivavahana famelan-keloka sy fanadiovana ireo; ny fanamiana masina, ireo fanamiana vita kiran-drongony fotsy, no hiakanjoany amin’izany; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: dia hanao ny fombam-pivavahana fanadiovana ho an’ny Toeramasina Indrindra sy ho an’ny faritra sisa amin’ny Tranolay fihaonana ary ho an’ny alitara fisoronana izy, ary koa hanao ny fombam-pivavahana famelan-keloka ho an’ny mpisorona sy ho an’ny Fiangonan’ny Israelita tsivakivolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: «Lalàna raikitra ho anareo izany, mba hahazoana, indray mandeha isan-taona, ny famelana ny heloka rehetra ho an’ny Israelita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.34 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 29-34:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 23.26-32; Nom 29.7-11.'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia araka izay zavatra nandidian’ny TOMPO an’i Mosesy no nataon’i Aharôna.
