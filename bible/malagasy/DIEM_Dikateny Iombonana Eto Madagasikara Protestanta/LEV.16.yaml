document_id: LEV.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny andro lehibe fankalazana ny Famelan-keloka
  - type: text
    content: Niteny tamin’i Mosesy ny TOMPO, taorian’ny nahafatesan’izy roa lahy zanak’i Aharôna, dia izy mirahalahy maty tamin’ny nanatonany hitondra ditin-kazo manitra tsy sahaza
  - type: note
    content: Jereo 10.1-2.
  - type: text
    content: ' teo anatrehan’ny TOMPO. '
  '10':
  - type: text
    content: 'Fa ny osilahy voatendrin’ny antsapaka ho osy mikarenjy kosa dia ampiasaina hanatontosana ny fombam-pivavahana famelan-keloka: hapetraka velona eo anatrehan’ny TOMPO aloha ilay osilahy, vao horoahina ho osy mikarenjy any an-taniefitra.'
  '11':
  - type: text
    content: '«Koa hatolotr’i Aharôna izany ny ombilahy hatao sorona fanalana ny ota ho an’ny tenany; izay izy vao hanao ny fombam-pivavahana famelan-keloka ho an’ny tenany sy ny ankohonany. Rehefa avy namono ilay ombilahy i Aharôna, '
  '12':
  - type: text
    content: 'dia haka fanembohana nofenoina vain’afo avy amin’ilay '
  - type: text
    content: alitara
  - type: text
    content: ' izay ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' sy haka vovoka ditin-kazo manitra eran-tanan-droa, ka hitondra izany rehetra izany ao anatin’ny Toeramasina Indrindra. '
  '13':
  - type: text
    content: Eo anatrehan’ny TOMPO eo i Aharôna no hanisy ditin-kazo manitra eo ambonin’ny vain’afo ka hosaronan’ny setrok’izany
  - type: note
    content: Io setroka io dia mampahatsiahy ilay setroka voateny ao amin’ny Boky Eksôdy (jereo Eks 19.9) ka anambaràna fa sady eo tokoa Andriamanitra (Lev 16.2) no miafina.
  - type: text
    content: ' ilay rakotra volamena eo ambonin’ny Fanekempihavanana mba tsy hahafaty an’i Aharôna. '
  '14':
  - type: text
    content: 'Dia hangalany ny ran’ilay ombilahy ka hafafin’ny fanondrony eo amin’ny rakotra volamena, lafy atsinanana; ary eo anoloan’ny rakotra volamena koa dia hamafazany ra impito amin’ny fanondrony. '
  '15':
  - type: text
    content: Manaraka izany, rehefa voavonon’i Aharôna ny osilahy izay hatao sorona fanalana ny ota ho an’ny vahoaka israelita, dia hoentiny miditra ao anatin’ny Toeramasina Indrindra koa ny rany; hataony tahaka ny efa nataony tamin’ny ran’ilay ombilahy izany, ka hafafiny eo ambonin’ny rakotra volamena sy eo anoloany
  - type: note
    content: Jereo Heb 9.12.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ary hotontosain’i Aharôna ny fombam-pivavahana '
  - type: text
    content: fanadiovana
  - type: text
    content: ' ny Toeramasina Indrindra, noho ny fahalotoana amam-pahadisoan’ny Israelita, araka ny fahotana rehetra vitany; toy izany koa no hataon’i Aharôna amin’ny faritra sisa ao amin’ny Tranolay fihaonana, izay mitoetra miaraka amin’ny Israelita sady eo afovoan’ny fahalotoany. '
  '17':
  - type: text
    content: 'Tsy tokony hisy olona eo amin’ny Tranolay fihaonana, manomboka hatreo amin’ny idiran’i Aharôna hanao ny fombam-pivavahana famelan-keloka mandra-pialany tao. Rehefa vita ny fombam-pivavahana famelan-keloka ho an’ny tenany sy ho an’ny ankohonany ary ho an’ny Fiangonan’ny Israelita tsivakivolo, '
  '18':
  - type: text
    content: dia hivoaka hankeo amin’ny alitara eo anoloan’ny Tranolay fihaonana izy
  - type: note
    content: 'Ny alitara fisoronana no tian-kolazaina. –dia hivoaka... fihaonana izy ka: dkt hafa azo aroso dia hivoaka ny Toeramasina Indrindra izy hankeo amin’ilay alitara ao anatin’ny Tranolay fihaonana ka; ny alitara fandoroana ditin-kazo manitra no tian-kolazaina amin’izany.'
  - type: text
    content: ', ka hanao ny fombam-pivavahana fanadiovana io alitara io. Samy hangalany avy ny ran’ny ombilahy sy ny ran’ny osilahy hanentenany ny tandroky ny alitara eo amin’ny zorony efatra; '
  '19':
  - type: text
    content: ary hamafazany ra impito amin’ny fanondro koa ny alitara. Dia toy izany no hanadiovan’i Aharôna ny alitara ho afaka amin’ny fahalotoan’ny Israelita ka hamerenan-kasina azy indray.
  '2':
  - type: text
    content: 'Ka hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '«Ilazao i Aharôna rahalahinao mba tsy hiditra ao amin’ny '
  - type: text
    content: Toeramasina Indrindra
  - type: note
    content: Jereo Heb 6.19.
  - type: text
    content: ', ambadiky ny efitra lamba, afa-tsy amin’ny andro sahaza ihany; ary ilazao koa izy tsy hankeo anoloan’ilay '
  - type: text
    content: Vatamasina
  - type: text
    content: ' izay misy rakotra volamena eo amboniny, sao ho faty izy satria hiseho anaty rahona eo ambonin’io rakotra volamena io Aho.»'
  '20':
  - type: text
    content: '«Rehefa tapitra ny fombam-pivavahana fanadiovana ny Toeramasina Indrindra sy ny faritra sisa amin’ny Tranolay fihaonana ary koa ny alitara fisoronana, dia ilay osilahy mbola velona no hatolotr’i Aharôna. '
  '21':
  - type: text
    content: 'Hapetrany amin’ny lohan’io osilahy io ny tanany roa, ary hotanisainy eo amboniny avokoa ny heloka amam-pahadisoan’ny Israelita, araka ny fahotana rehetra vitany. Hatambesatr’i Aharôna amin’ilay osilahy ireo fahotana rehetra ireo; izay izy vao hampandroaka azy hankany an-taniefitra, hoentina lehilahy anankiray voatendry. '
  '22':
  - type: text
    content: Dia hindaosin’ny osilahy ho any an-taniefitra ny helok’izy rehetra.
  - type: text
    content: '«Rehefa voaroaka ho any an-taniefitra ilay osilahy, '
  '23':
  - type: text
    content: dia hiditra ao amin’ny Tranolay fihaonana i Aharôna ka hanala sy hametraka ny fanamiana vita kiran-drongony fotsy, izay niakanjoany tamin’izy niditra tao amin’ny Toeramasina Indrindra
  - type: note
    content: Jereo Ezek 44.19.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Handro ao amin’ny faritra anankiray voatokana ho an’izany izy, dia hiakanjo fitafiana hafa; ary hiainga hanolotra ny sorona dorana manontolo ho an’ny tenany sy ny sorona dorana manontolo ho an’ny vahoaka izy ka hanatontosa ny fombam-pivavahana famelan-keloka ho an’ny tenany sy ho an’ny vahoaka. '
  '25':
  - type: text
    content: Ary ny tavin-kenan’ireo biby natao sorona fanalana ny ota dia hodorany hanetona eo ambonin’ny alitara.
  '26':
  - type: text
    content: '«Ilay lehilahy nandroaka ny osilahy ho osy mikarenjy dia hanasa fitafiana sy handro, vao mahazo miditra ny toby. '
  '27':
  - type: text
    content: Ary ny ombilahy sy osilahy, izay natao sorona fanalana ny ota sady samy efa nangalana ra mba hanaovana ny fombam-pivavahana famelan-keloka ao amin’ny Toeramasina Indrindra, dia hindaosina any ivelan’ny toby, ka hodorana ny hodiny sy henany ary dikin-drorohany
  - type: note
    content: Jereo Heb 13.11.
  - type: text
    content: '. '
  '28':
  - type: text
    content: Ilay lehilahy nandoro azy dia hanasa fitafiana sy handro koa, vao hiditra ny toby.
  '29':
  - type: text
    content: '«Izao no lalàna raikitra ho anareo: Ny andro fahafolo amin’ny volana fahafito, dia aoka ianareo '
  - type: text
    content: hifady hanina
  - type: text
    content: ' sady tsy hanao raharaha akory, na ianareo Israelita tompontany na ireo vahiny valovotaka eo aminareo. '
  '3':
  - type: text
    content: 'Rehefa miditra ao amin’ny Toeramasina Indrindra kosa i Aharôna, dia ireto avy no fomba harahiny. Ombilahy iray hatao '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota sy ondrilahy iray hatao sorona dorana manontolo no hoentiny'
  - type: note
    content: Jereo Heb 9.7.
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Fa amin’io andro io no hanaovana ny fombam-pivavahana famelan-keloka mba hanadiovana anareo, ka dia hadio ho afaka amin’ny fahotana rehetra eo anatrehan’ny TOMPO ianareo. '
  '31':
  - type: text
    content: Ho tena andro fitsaharana sy fifadian-kanina ho anareo io andro io. Lalàna raikitra izany.
  '32':
  - type: text
    content: '«Any aoriana any, dia ny mpisorona izay voahosotra sy voatokana ho mpisorombe hisolo ny rainy no hanao ireo fombam-pivavahana famelan-keloka sy fanadiovana ireo; ny fanamiana masina, ireo fanamiana vita kiran-drongony fotsy, no hiakanjoany amin’izany; '
  '33':
  - type: text
    content: dia hanao ny fombam-pivavahana fanadiovana ho an’ny Toeramasina Indrindra sy ho an’ny faritra sisa amin’ny Tranolay fihaonana ary ho an’ny alitara fisoronana izy, ary koa hanao ny fombam-pivavahana famelan-keloka ho an’ny mpisorona sy ho an’ny Fiangonan’ny Israelita tsivakivolo.
  '34':
  - type: text
    content: «Lalàna raikitra ho anareo izany, mba hahazoana, indray mandeha isan-taona, ny famelana ny heloka rehetra ho an’ny Israelita
  - type: note
    content: 'And 29-34: jereo 23.26-32; Nom 29.7-11.'
  - type: text
    content: .»
  - type: text
    content: Dia araka izay zavatra nandidian’ny TOMPO an’i Mosesy no nataon’i Aharôna.
  '4':
  - type: text
    content: 'Akanjo lava voatokana, vita amin’ny kiran-drongony fotsy, no hanaovany; kalisaonina, vita amin’ny kiran-drongony fotsy, no hataony manolo-koditra; fehikibo, vita amin’ny kiran-drongony fotsy, no hietrany; ary fehiloha, vita amin’ny kiran-drongony fotsy, no hisatrohany: samy fanamiana voatokana ireo ka rehefa avy nandro i Aharôna vao hitafy azy. '
  '5':
  - type: text
    content: Ny Fiangonan’ny Israelita tsivakivolo dia handraisany osilahy roa hatao sorona fanalana ny ota sy ondrilahy iray hatao sorona dorana manontolo.
  '6':
  - type: text
    content: '«Dia hatolotr’i Aharôna ny ombilahy hatao sorona fanalana ny ota ho an’ny tenany; izay izy vao hanao fombam-pivavahana famelan-keloka ho an’ny tenany sy ny ankohonany. '
  '7':
  - type: text
    content: 'Halainy koa ny osilahy roa ka hapetrany eo anatrehan’ny TOMPO, eo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '8':
  - type: text
    content: Dia hataon’i Aharôna antsapaka ireo osilahy ireo mba hahafantarana izay osilahy ho an’ny TOMPO sy izay osilahy ho osy mikarenjy
  - type: note
    content: osy mikarenjy na Hazazela amin’ny teny Hebreo. Tokony ho nisaraka Hoz’azal izy io tamin’ny voalohany izany hoe osy mikarenjy saingy voatambatra tsy nahy ka lasa anarana hoe Hazazela tatỳ aoriana rehefa nanisy zanatsoratra ny Masôreta ka noheverina ho demony mihaodihaody any an-taniefitra. Mba hampahazava ny hoe osilahy iray hovonoina ary ny iray halefa hikarenjy dia jereo 14.4-5, 49-53.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Ary hatolotr’i Aharôna ny osilahy voatendrin’ny antsapaka ho an’ny TOMPO, ka hataony sorona fanalana ny ota. '
