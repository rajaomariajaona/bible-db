  children:
  - type: text
    text: Fepetra raisin’i Nehemià hiarovana an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony vita ny manda ka voalatsako ny lela-vavahady, dia napetraka tamin’ny fandraharahany avy ny mpiandry varavarana sy ny mpihira ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Notendreko hitantana an’i Jerosalema i Hanany rahalahiko sy i Hananià, lehiben’ny tranomimanda, izay lehilahy mahatoky sady matahotra an’Andriamanitra mihoatra noho ny maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ka hoy aho tamin’ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza avela hovohana ny vavahadin’i Jerosalema mandra-pahafanan’ny andro; ary ny hariva, dieny mbola eo ny mpiambina no aoka hanidiana ny vavahady sy hametrahana ny barany. Aoka hanendrena mpiambina avy amin’ny mponina eto Jerosalema ka samy hatao amin’ny anjara toerany sy tandrifin’ny tranony avy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lisitr’ireo Jiosy tafaverina ao Palestinina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Malalaka sy lehibe ny tanànan’i Jerosalema, nefa vitsy mponina sady tsy mbola voaorina indray ny trano.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sady tsy... ny trano: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dkt hafa sady tsy mbola tafatambatra ny fianakaviana sasany.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ka nomen’Andriamanitro hevitra aho hamory ny loholona sy mpanapaka mbamin’ny vahoaka mba hakana ny isany. Ary hitako ny boky nanoratana ny lisitr’ireo tafaverina voalohany avy any an-tsesitany, ka izao no hitako voasoratra tao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny lisitra eto amin’ny Me 7.6-72 dia efa hita ao amin’ny Hez 2.1-10, saingy misy fahasamihafana vitsivitsy.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Tamin’ireo olona nobaboin’i Nebokadnetsara mpanjakan’i Babilôna, dia ireto ny teraky ny faritanin’i Joda izay niala sesitany ka nitodi-doha ho any Jerosalema sy Joda, samy niverina ho any an-tanànany avy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ireo no nandeha niaraka tamin’ireto mpitarika azy ireto, dia ry i Zerobabela, i Jesoa, i Nehemià, i Hazarià, i Rahamià, i Nahamany, i Môrdôkay, i Bilsana, i Mispereta, i Bigvay, i Nehoma, ary i Bahanà. Izao kosa ny isan’ireo vatan-dehilahy tao anatin’izany andian’Israelita izany:'
