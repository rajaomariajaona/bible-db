    content: 'Nisy loham-pianakaviana sasantsasany nanao fanomezana ho an’ny asa fanorenana ny tempoly. Ny governora nanome volamena valo kilao sy lovia famafazana dimampolo ary fanamiam-pisoronana telopolo ho an’ny rakitry ny tempoly. '
  '7':
