  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Nisy loham-pianakaviana sasantsasany nanao fanomezana ho an’ny asa fanorenana ny tempoly. Ny governora nanome volamena valo kilao sy lovia famafazana dimampolo ary fanamiam-pisoronana telopolo ho an’ny rakitry ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
