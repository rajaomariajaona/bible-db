    content: 'Ka hoy aho tamin’ireo:'
  - type: text
    content: –Aza avela hovohana ny vavahadin’i Jerosalema mandra-pahafanan’ny andro; ary ny hariva, dieny mbola eo ny mpiambina no aoka hanidiana ny vavahady sy hametrahana ny barany. Aoka hanendrena mpiambina avy amin’ny mponina eto Jerosalema ka samy hatao amin’ny anjara toerany sy tandrifin’ny tranony avy.
