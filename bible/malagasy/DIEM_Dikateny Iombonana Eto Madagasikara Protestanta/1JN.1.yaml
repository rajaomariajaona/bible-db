document_id: 1JN.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay Teny manome fiainana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny amin’ilay Teny manome fiainana no anoratanay aminareo. Izy, Izay nisy hatramin’ny voalohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hatramin’ny voalohany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toa midika hoe hatramin’ny fiantombohan’ny asan’i Jesoa ampahibemaso izany (jereo Jôh 1.14, 31, 39); kanefa misy mpandinika mihevitra fa hatramin’ny fiantombohan’ny fitoriana Vaovao Mahafaly nataon’ireo apôstôly izany; ary misy aza mihevitra fa hatramin’izay talohan’ny fahariana izao tontolo izao mihitsy (jereo Jôh 1.1).
    marker-yv: yv-n
  - type: text
    text: ', ka efa renay, efa hitan’ny masonay, efa nobanjininay ary efa notsapain’ny tananay no ambaranay aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Eny, efa naseho ny fiainana sady efa hitanay; ary tonga vavolombelony izahay ka manambara aminareo ny fiaina-maharitra mandrakizay, dia ilay fiainana nitodika tany amin’ny Ray ka efa naseho taminay. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izay efa hitanay sy renay no ambaranay aminareo, mba hahazoanareo fiombonana aminay koa; fa izahay dia miombona amin’ny Ray sy amin’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy Zanany
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izany no soratanay aminareo, mba ho feno ny hafaliantsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny hafaliantsika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny hafalianareo.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra dia fahazavana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no hafatra renay tamin’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', ka mba ambaranay aminareo: Andriamanitra dia fahazavana, ary tsy mba misy haizina akory ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha milaza ho manam-piombonana amin’Andriamanitra isika, nefa miaina ao amin’ny haizina, dia mandainga sady tsy manatanteraka ny hafatra marim-pototra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Andriamanitra dia ao amin’ny mazava: ka raha miaina ao amin’ny fahazavana tahaka Azy isika, dia misy fiombonana amintsika samy isika; ary ny ran’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: ' no manadio antsika ho afaka amin’ny karazam-pahotana rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha milaza ho tsy manam-pahotana isika, dia mamita-tena, ary tsy ao anatintsika ny hafatra marim-pototra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa raha miaiky ny fahotantsika isika, dia mitana ny toky nomeny Andriamanitra sady miantra, ka hamela ny fahotantsika sy hanadio antsika ho afaka amin’ny ratsy isan-karazany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 32.1-5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha milaza ho tsy nanota isika, dia mampandainga an’Andriamanitra sady tsy ao anatintsika ny teniny.
