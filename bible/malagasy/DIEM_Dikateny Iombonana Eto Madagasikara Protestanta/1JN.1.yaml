document_id: 1JN.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay Teny manome fiainana
  - type: text
    content: Ny amin’ilay Teny manome fiainana no anoratanay aminareo. Izy, Izay nisy hatramin’ny voalohany
  - type: note
    content: 'hatramin’ny voalohany: toa midika hoe hatramin’ny fiantombohan’ny asan’i Jesoa ampahibemaso izany (jereo Jôh 1.14, 31, 39); kanefa misy mpandinika mihevitra fa hatramin’ny fiantombohan’ny fitoriana Vaovao Mahafaly nataon’ireo apôstôly izany; ary misy aza mihevitra fa hatramin’izay talohan’ny fahariana izao tontolo izao mihitsy (jereo Jôh 1.1).'
  - type: text
    content: ', ka efa renay, efa hitan’ny masonay, efa nobanjininay ary efa notsapain’ny tananay no ambaranay aminareo. '
  '10':
  - type: text
    content: Raha milaza ho tsy nanota isika, dia mampandainga an’Andriamanitra sady tsy ao anatintsika ny teniny.
  '2':
  - type: text
    content: 'Eny, efa naseho ny fiainana sady efa hitanay; ary tonga vavolombelony izahay ka manambara aminareo ny fiaina-maharitra mandrakizay, dia ilay fiainana nitodika tany amin’ny Ray ka efa naseho taminay. '
  '3':
  - type: text
    content: 'Izay efa hitanay sy renay no ambaranay aminareo, mba hahazoanareo fiombonana aminay koa; fa izahay dia miombona amin’ny Ray sy amin’i Jesoa '
  - type: text
    content: Kristy Zanany
  - type: text
    content: '. '
  '4':
  - type: text
    content: Izany no soratanay aminareo, mba ho feno ny hafaliantsika
  - type: note
    content: 'ny hafaliantsika: misy stf sasany ahitana hoe ny hafalianareo.'
  - type: text
    content: .
  - type: heading
    content: Andriamanitra dia fahazavana
  '5':
  - type: text
    content: 'Izao no hafatra renay tamin’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ', ka mba ambaranay aminareo: Andriamanitra dia fahazavana, ary tsy mba misy haizina akory ao aminy. '
  '6':
  - type: text
    content: 'Raha milaza ho manam-piombonana amin’Andriamanitra isika, nefa miaina ao amin’ny haizina, dia mandainga sady tsy manatanteraka ny hafatra marim-pototra. '
  '7':
  - type: text
    content: 'Andriamanitra dia ao amin’ny mazava: ka raha miaina ao amin’ny fahazavana tahaka Azy isika, dia misy fiombonana amintsika samy isika; ary ny ran’i Jesoa '
  - type: text
    content: Zanany
  - type: text
    content: ' no manadio antsika ho afaka amin’ny karazam-pahotana rehetra.'
  '8':
  - type: text
    content: 'Raha milaza ho tsy manam-pahotana isika, dia mamita-tena, ary tsy ao anatintsika ny hafatra marim-pototra. '
  '9':
  - type: text
    content: Fa raha miaiky ny fahotantsika isika, dia mitana ny toky nomeny Andriamanitra sady miantra, ka hamela ny fahotantsika sy hanadio antsika ho afaka amin’ny ratsy isan-karazany
  - type: note
    content: Ampit Sal 32.1-5.
  - type: text
    content: '. '
