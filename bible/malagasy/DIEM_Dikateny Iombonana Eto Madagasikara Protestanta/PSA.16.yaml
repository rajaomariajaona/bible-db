document_id: PSA.16,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Hafalian’ny olona nafahan’Andriamanitra tamin’ny fahafatesana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hira malefaka nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, arovy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao no fialofako.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao tsy manary ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho rembin’ny fonenan’ny maty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mamela ahy hogiazan’ny fasana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho izaho tena mpivavaka aminao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: And voatsiahy ao amin’ny Asa 13.35.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampahafantarinao ahy ny lalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mankany amin’ny fiainana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hafaliana no manenika ahy eo anatrehanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahafinaretana mitohy no eo ankavananao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'eo ankavananao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 45.10; 110.1. –Ny and 8-11 dia voatsiahy ao amin’ny Asa 2.25-28.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy aho tamin’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianao tokoa no Tompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy hasambarako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy eo akaikinao!»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vahoakan’Andriamanitra eto amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tena tsara laza ka sitrako fatratra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay mpirohotra amin’andriamani-kafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hampitombo kosa ny fahorian-tsainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba hiaraka aminy velively aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanolotra ny fanati-dra izay ararany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hanonona anarana azy akory.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, Ianao no zarako sy lovako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao tokoa no mitantana ny hoaviko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-mahafinaritra no voatendry ho ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ilay fananana soa indrindra no azoko.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorako ny TOMPO Izay manolo-tsaina ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na amin’ny alina aza dia anarin’ny eritreritro aho.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataoko eo anoloako mandrakariva ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo ankavanako Izy ka tsy hihontsona aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'eo ankavanako... aho: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 110.5 sy nta; Sal 109.31 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa faly sy ravo ny fo amam-panahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izany no itoerako amim-pahatokiana;
