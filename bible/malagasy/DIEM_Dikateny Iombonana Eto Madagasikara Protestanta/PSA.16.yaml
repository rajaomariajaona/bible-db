document_id: PSA.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Hafalian’ny olona nafahan’Andriamanitra tamin’ny fahafatesana
  - type: text
    content: ' '
  - type: text
    content: Hira malefaka nataon’i Davida.
  - type: text
    content: Andriamanitra ô, arovy aho
  - type: text
    content: satria Ianao no fialofako.
  '10':
  - type: text
    content: satria Ianao tsy manary ahy
  - type: text
    content: ho rembin’ny fonenan’ny maty
  - type: text
    content: sady tsy mamela ahy hogiazan’ny fasana
  - type: text
    content: noho izaho tena mpivavaka aminao
  - type: note
    content: And voatsiahy ao amin’ny Asa 13.35.
  - type: text
    content: .
  '11':
  - type: text
    content: Ampahafantarinao ahy ny lalana
  - type: text
    content: izay mankany amin’ny fiainana;
  - type: text
    content: hafaliana no manenika ahy eo anatrehanao,
  - type: text
    content: fahafinaretana mitohy no eo ankavananao
  - type: note
    content: 'eo ankavananao: jereo Sal 45.10; 110.1. –Ny and 8-11 dia voatsiahy ao amin’ny Asa 2.25-28.'
  - type: text
    content: .
  '2':
  - type: text
    content: 'Hoy aho tamin’ny TOMPO:'
  - type: text
    content: «Ianao tokoa no Tompoko
  - type: text
    content: ka tsy misy hasambarako,
  - type: text
    content: raha tsy eo akaikinao!»
  '3':
  - type: text
    content: Ny vahoakan’Andriamanitra eto amin’ny tany
  - type: text
    content: no tena tsara laza ka sitrako fatratra.
  '4':
  - type: text
    content: Fa izay mpirohotra amin’andriamani-kafa
  - type: text
    content: dia hampitombo kosa ny fahorian-tsainy;
  - type: text
    content: tsy mba hiaraka aminy velively aho
  - type: text
    content: hanolotra ny fanati-dra izay ararany,
  - type: text
    content: ary tsy hanonona anarana azy akory.
  '5':
  - type: text
    content: TOMPO ô, Ianao no zarako sy lovako;
  - type: text
    content: Ianao tokoa no mitantana ny hoaviko.
  '6':
  - type: text
    content: Zava-mahafinaritra no voatendry ho ahy;
  - type: text
    content: eny, ilay fananana soa indrindra no azoko.
  '7':
  - type: text
    content: Isaorako ny TOMPO Izay manolo-tsaina ahy;
  - type: text
    content: na amin’ny alina aza dia anarin’ny eritreritro aho.
  '8':
  - type: text
    content: Ataoko eo anoloako mandrakariva ny TOMPO,
  - type: text
    content: eo ankavanako Izy ka tsy hihontsona aho
  - type: note
    content: 'eo ankavanako... aho: jereo Sal 110.5 sy nta; Sal 109.31 sy nta.'
  - type: text
    content: .
  '9':
  - type: text
    content: Koa faly sy ravo ny fo amam-panahiko,
  - type: text
    content: ary izany no itoerako amim-pahatokiana;
