document_id: NUM.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny filahatr’ireo foko tao amin’ny toby
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny tamin’i Mosesy sy i Aharôna ny TOMPO nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Amin’ny lafiny atsimo no hisy ireo tafika mivondrona ao anatin’ny tobin’i Reobena, ka ahitana mifanila ny tafika reobenita sy simehônita ary gadita. Ny vatan-dehilahy voaisa ho afa-mitam-piadiana dia hotarihin’ny filoha anankiray avy amin’ny fokony araka izao:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’ny fokon’i Reobena dia i Elitsora zanakalahin’i Sedeora miaraka amin’ny vatan-dehilahy 46 500;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’ny fokon’i Simehôna dia i Selomiela zanakalahin’i Tsorisaday miaraka amin’ny vatan-dehilahy 59 300;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’ny fokon’i Gada dia i Eliafasa zanakalahin’i Dehoela miaraka amin’ny vatan-dehilahy 45 650.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vatan-dehilahy ao anatin’ny tobin’i Reobena dia mitontaly 151 450. Ireo no mandeha faharoa.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Dia handroso ny Tranolay fihaonana sy ny andian’ny Levita eo anelanelan’ny vondron-tafika roa mialoha sy ny vondron-tafika roa manaraka. Handroso araka ny filaharany eo amin’izay itobiany ihany ny levita, ka hanaraka ny fanevan’ny tarika misy azy avy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Amin’ny lafiny andrefana no hisy ireo tafika mivondrona ao amin’ny tobin’i Efraîma, ka ahitana ny tafika efraîmita sy manasita ary benjaminita. Ny vatan-dehilahy voaisa ho afa-mitam-piadiana dia hotarihin’ny filoha anankiray avy amin’ny fokony araka izao:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’ny fokon’i Efraîma dia i Elisamà zanakalahin’i Hamihoda miaraka amin’ny vatan-dehilahy 40 500;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’ny fokon’i Manase dia i Gamaliela zanakalahin’i Pedahatsoro miaraka amin’ny vatan-dehilahy 32 200;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’ny fokon’i Benjamîna dia i Abidàna zanakalahin’i Gidehônỳ miaraka amin’ny vatan-dehilahy 35 400.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Ny Israelita dia samy hitoby eo akaikin’ny vondron-tafiny sy ny fanevan’ny fokony avy. Ny toby dia tsy maintsy manodidina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' kanefa lavidavitra azy.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vatan-dehilahy ao anatin’ny tobin’i Efraîma dia mitontaly 108 100. Ireo no mandeha fahatelo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Amin’ny lafiny avaratra kosa no hisy ireo tafika mivondrona ao anatin’ny tobin’i Dana, izay ahitana mifanila ny tafika danita sy aserita ary naftalita. Ny vatan-dehilahy voaisa ho afa-mitam-piadiana dia hotarihin’ny filoha anankiray avy amin’ny fokony araka izao:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’ny fokon’i Dana dia i Ahihezera zanakalahin’i Hamisaday miaraka amin’ny vatan-dehilahy 62 700;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’ny fokon’i Asera dia i Pagihiela zanakalahin’i Hôkràna miaraka amin’ny vatan-dehilahy 41 500;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’ny fokon’i Naftalỳ dia i Ahira zanakalahin’i Henàna miaraka amin’ny vatan-dehilahy 53 400.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Amin’ny lafiny atsinanana no hisy ireo tafika lohalaharana mivondrona ao anatin’ny tobin’i Joda, ka ahitana mifanila ny tafika jodeanina sy jisakarita ary zebolonita. Ny vatan-dehilahy voaisa ho afa-mitam-piadiana dia hotarihin’ny filoha anankiray avy amin’ny fokony araka izao:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’ny fokon’i Joda dia i Nahasôna zanakalahin’i Haminadaba, miaraka amin’ny vatan-dehilahy 74 600
