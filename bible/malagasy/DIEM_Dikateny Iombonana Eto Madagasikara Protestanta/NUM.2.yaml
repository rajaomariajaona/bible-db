    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niteny tamin’i Mosesy sy i Aharôna ny TOMPO nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Ny Israelita dia samy hitoby eo akaikin’ny vondron-tafiny sy ny fanevan’ny fokony avy. Ny toby dia tsy maintsy manodidina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' kanefa lavidavitra azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-8
  - type: text
    text: '«Amin’ny lafiny atsinanana no hisy ireo tafika lohalaharana mivondrona ao anatin’ny tobin’i Joda, ka ahitana mifanila ny tafika jodeanina sy jisakarita ary zebolonita. Ny vatan-dehilahy voaisa ho afa-mitam-piadiana dia hotarihin’ny filoha anankiray avy amin’ny fokony araka izao:'
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Joda dia i Nahasôna zanakalahin’i Haminadaba, miaraka amin’ny vatan-dehilahy 74 600
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 74 600
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sns... dia mety mivaky hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: andiany 74 misy vatan-dehilahy 600
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sns...'
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Jisakara dia i Natanaela, zanakalahin’i Tsohara, miaraka amin’ny vatan-dehilahy 54 400;
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Zebolòna dia i Eliaba zanakalahin’i Helôna, miaraka amin’ny vatan-dehilahy 57 400.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny vatan-dehilahy ao anatin’ny tobin’i Joda dia mitontaly 186 400. Ireo no mpialoha lalana ny vahoaka israelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-15
  - type: text
    text: '«Amin’ny lafiny atsimo no hisy ireo tafika mivondrona ao anatin’ny tobin’i Reobena, ka ahitana mifanila ny tafika reobenita sy simehônita ary gadita. Ny vatan-dehilahy voaisa ho afa-mitam-piadiana dia hotarihin’ny filoha anankiray avy amin’ny fokony araka izao:'
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Reobena dia i Elitsora zanakalahin’i Sedeora miaraka amin’ny vatan-dehilahy 46 500;
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Simehôna dia i Selomiela zanakalahin’i Tsorisaday miaraka amin’ny vatan-dehilahy 59 300;
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Gada dia i Eliafasa zanakalahin’i Dehoela miaraka amin’ny vatan-dehilahy 45 650.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny vatan-dehilahy ao anatin’ny tobin’i Reobena dia mitontaly 151 450. Ireo no mandeha faharoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: «Dia handroso ny Tranolay fihaonana sy ny andian’ny Levita eo anelanelan’ny vondron-tafika roa mialoha sy ny vondron-tafika roa manaraka. Handroso araka ny filaharany eo amin’izay itobiany ihany ny levita, ka hanaraka ny fanevan’ny tarika misy azy avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-23
  - type: text
    text: '«Amin’ny lafiny andrefana no hisy ireo tafika mivondrona ao amin’ny tobin’i Efraîma, ka ahitana ny tafika efraîmita sy manasita ary benjaminita. Ny vatan-dehilahy voaisa ho afa-mitam-piadiana dia hotarihin’ny filoha anankiray avy amin’ny fokony araka izao:'
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Efraîma dia i Elisamà zanakalahin’i Hamihoda miaraka amin’ny vatan-dehilahy 40 500;
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Manase dia i Gamaliela zanakalahin’i Pedahatsoro miaraka amin’ny vatan-dehilahy 32 200;
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Benjamîna dia i Abidàna zanakalahin’i Gidehônỳ miaraka amin’ny vatan-dehilahy 35 400.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny vatan-dehilahy ao anatin’ny tobin’i Efraîma dia mitontaly 108 100. Ireo no mandeha fahatelo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-30
  - type: text
    text: '«Amin’ny lafiny avaratra kosa no hisy ireo tafika mivondrona ao anatin’ny tobin’i Dana, izay ahitana mifanila ny tafika danita sy aserita ary naftalita. Ny vatan-dehilahy voaisa ho afa-mitam-piadiana dia hotarihin’ny filoha anankiray avy amin’ny fokony araka izao:'
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Dana dia i Ahihezera zanakalahin’i Hamisaday miaraka amin’ny vatan-dehilahy 62 700;
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Asera dia i Pagihiela zanakalahin’i Hôkràna miaraka amin’ny vatan-dehilahy 41 500;
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Naftalỳ dia i Ahira zanakalahin’i Henàna miaraka amin’ny vatan-dehilahy 53 400.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: «Ny vatan-dehilahy ao anatin’ny tobin’i Dana dia mitontaly 157 600. Ireo kosa no ho vodilaharana.
- type: usfm
  marker: p
  children:
  - type: text
    text: «Dia samy handeha miaraka amin’ny fanevany avy ireo vondron-tafika efatra ireo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny vatan-dehilahy israelita voaisa araka ny foko sy araka ny toby nisy ireo tafika dia tafakatra 603 550 ny fitambarany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny Levita ihany no tsy natao fanisana niaraka tamin’ny Israelita hafa araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Notanterahin’ny Israelita izany, araka ny nandidian’ny TOMPO an’i Mosesy; ka araka ny fanevany avy no nitobiany ary araka ny foko sy ny tarika nisy azy avy no niaingany.
