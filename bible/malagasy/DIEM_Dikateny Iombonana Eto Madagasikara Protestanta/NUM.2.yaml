      text: ho an’ny fokon’i Zebolòna dia i Eliaba zanakalahin’i Helôna, miaraka amin’ny vatan-dehilahy 57 400.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Ny vatan-dehilahy ao anatin’ny tobin’i Dana dia mitontaly 157 600. Ireo kosa no ho vodilaharana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Dia samy handeha miaraka amin’ny fanevany avy ireo vondron-tafika efatra ireo.»
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vatan-dehilahy israelita voaisa araka ny foko sy araka ny toby nisy ireo tafika dia tafakatra 603 550 ny fitambarany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny Levita ihany no tsy natao fanisana niaraka tamin’ny Israelita hafa araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Notanterahin’ny Israelita izany, araka ny nandidian’ny TOMPO an’i Mosesy; ka araka ny fanevany avy no nitobiany ary araka ny foko sy ny tarika nisy azy avy no niaingany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vatan-dehilahy ao anatin’ny tobin’i Joda dia mitontaly 186 400. Ireo no mpialoha lalana ny vahoaka israelita.
