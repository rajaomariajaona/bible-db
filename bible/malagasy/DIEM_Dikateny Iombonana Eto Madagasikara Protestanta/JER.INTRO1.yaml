type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Azo lazaina ho irery na saika irery tamin’ny fanoherana ny besinimaro kanefa nijanona ho nahatoky hatramin’ny farany teo amin’ny asa nankinin’Andriamanitra taminy no fijery an’i Jeremià
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: '. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Izy araka izany no lehilahy niaina talohan’i Paoly apôstôly ny tenin’Andriamanitra hoe: «Ampy ho anao ny fahasoavako satria ao amin’ny fahalemenao no isehoan’ny heriko tanteraka» (2 Kôr 12.9).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ireto zavatra ireto no isan’ny nanamarika manokana ny fiainan’i Jeremià: mbola tanora izy dia efa mpitondra ny tenin’Andriamanitra tao Jerosalema (Jer 1.4-9), izany hoe tamin’ny taona 626 tal J.K., nandritra ny andro nanjakan’i Jôsià (640-609). Naharitra tamin’izany andraikiny izany izy nandritra ny efapolo taona izay vanim-potoana nitomboan’ny korontana.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nanomboka nihena ny herin’ny Asirianina izay nanjaka tamin’iny faritra rehetra iny (jereo sava lalana Hôsea, Hamôsa, Isaià) noho ny fanafihan’ny Babilônianina. Nanararaotra izany toe-javatra izany i Jôsià mba hamerenana ireo ampahan-tany sasany izay very tao anatin’ny fanjakana Israely tany aloha. Nampalahelo anefa fa maty an’ady tao Megidao izy tamin’ny taona 609 raha nikasa hanohitra ny tafika nalefan’i Ejipta hamonjy ny Asirianina. Nentin’ny Ejiptianina ho babo ny zanany lahy tokony handimby azy atao hoe Salôma (na Jôahaza) ka i Jôakima no natsangany hisolo azy. Tamin’ny 597 dia tonga hatrany Jerosalema ireo Babilônianina miaramilan’i Nebokadnetsara ka nitondra ho babo ny ampahany tamin’ny vahoaka niaraka tamin’i Jôakina (na Kônià) izay vao nanjaka nandimby an’i Jôakima rainy. I Tsedekià, mpanjaka osa sy mora taomina, no napetraky ny Babilônianina teo amin’ny sezafiandrianan’i Davida hisolo an’i Jôakina; hany ka tamin’ny farany dia voatarika izy hikomy tamin’ireo Babilônianina lehibeny. Nahery vaika ny valin’izany, fa rehefa avy nanao fahirano nandritra ny herintaona an’i Jerosalema ny tafik’i Nebokadnetsara dia nahafaka azy tamin’ny volana jolay 587, ary nanao sambo-belona an’i Tsedekià sy nandoro ny tempoly ary nitondra ireo mponina mazoto miasa ho babo tany Babilôna.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vao lasa ireny, dia nisy namono ho faty kosa i Gedalià izay governora napetrak’ireo mpanjanaka. Ary ireo olona sisa tavela tamin’i Joda dia nitsoaka nandositra tany Ejipta sady nitondra an-keriny an’i Jeremià mpaminany hiaraka taminy; koa tany Ejipta no maty i Jeremià.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Toy ireo mpaminany hafa, dia karazana fanairana alefan’Andriamanitra amin’ny vahoakany tsy mahatoky no fahitan’i Jeremià ireo toe-javatra mampalahelo mihatra eo amin’ny fireneny. Averimberin’i Jeremià fa ny fomba tokana hialana amin’ny fahavoazana dia ny fihavanana amin’Andriamanitra: atsahatra ny filàna sotasota miaraka amin’ny Ejiptianina, ary ekena ny fitsapana ataon’ny fanjakana Babilônianina. Avy hatrany dia nampangaina ho mpamadika i Jeremià ka nenjehina, ary izay no tena tsy tantiny satria fatratra ny fitiavany ny fireneny. Noho izany dia nananosarotra tokoa ny fiainan’i Jeremià satria nifandroritan’ny fampitana ny hafatra milaza loza izay teren’Andriamanitra hambarany sy izato fitiavana nokoboniny tao anatiny ho an’ny vahoakany tandindomin’antambo. Izany no nahatonga azy hitaraina matetika amin’Andriamanitra (11.18–12.6; 15.10-21; 17.14-18; 18.18-23; 20.7-18).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ankoatra ny fahafatesana izay hitany manatona ity firenena tsy mahatoky ity anefa dia tazany koa ny karazana fitsanganana ho velona, ao anatin’ny fanekempihavanana vaovao amin’Andriamanitra (31). Koa ijoroany ho vavolombelona ny fahatokiany ny fandresen’Andriamanitra ilay fihetsika manaitra sady feno fanantenana nasehony (32).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hita ao amin’ny fiandohan’ny toko faha-25 ny famintinana ny toritenin’i Jeremià. Ny toko 2–24 dia manangona antsipiriany ireo hafatry ny mpaminany izay ravahan’ny fihetsika an’ohatra indraindray toy ny fehikibo lò (13), ny fitsidihana mpanefy tanimanga (18), ny siny vaky (19) sns.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny toko 26–45 no misy ireo fitantarana izay angamba avy amin’i Baròka mpitantsoratra sady sakaizan’i Jeremià ny sasany tamin’ireny; ka ireo tantara ireo no mamelon-tsoratra ny zava-nitranga vitsivitsy tamin’ny fiainan’ity mpaminany.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny toko 46–51 no manangona ireo hafatra ho an’ireo firenen-kafa any ivelany. Ny toko 52 dia famenon-tantara mamisavisa ny nakana sy nandravana an’i Jerosalema; io toko io dia miafara amin’ny fanamariham-panantenana: ny famindrampo nomena an’i Jôakîna mpanjaka izay babo.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Koa amin’i Jeremià, iraka mahatoky sy voaenjika, no hoheverina hampitahana an’i Jesoa (Mt 16.14) atỳ aoriana. Kanefa i Jesoa Kristy mihitsy koa, talohan’ny nahafatesany, raha nizara ny fanasana masina tamin’ny mpianany, no nanambara fa tanteraka ny «fanekempihavanana vaovao» izay efa nolazain’i Jeremià (Lk 22.20; 1 Kôr 11.25).
