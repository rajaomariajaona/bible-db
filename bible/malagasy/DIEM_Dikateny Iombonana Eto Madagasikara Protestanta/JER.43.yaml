document_id: JER.43
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nentina an-keriny ho any Ejipta i Jeremià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa tapitra voalazan’i Jeremià avokoa tamin’ny vahoaka rehetra teo ny tenin’ny TOMPO Andriamaniny araka izay nanirahany azy holazainy aninkeheo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia namaly i Hazarià zanakalahin’i Hosaià sy i Jôhanàna zanakalahin’i Karea ary ireo lehilahy mpirehaka rehetra ka nanao tamin’i Jeremià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mpandainga ianao fa tsy naniraka anao hisakana anay tsy handeha hialokaloka any Ejipta ny TOMPO Andriamanitsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I Baròka, zanakalahin’i Nerià, no nanome saina anao hamely anay, fa tiany ho voatolotra eo an-tanan’ny Babilônianina izahay mba hamonoany anay ho faty na hitondrany anay ho babo any Babilôna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Noho izany, tsy nanaiky hipetraka tany Joda araka izay nambaran’ny TOMPO azy i Jôhanàna zanakalahin’i Karea sy ireo rehetra mpifehy ny andia-miaramila mbamin’ireo olona niaraka taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa nentin’i Jôhànana zanakalahin’i Karehà sy ireo rehetra mpifehy ny andia-miaramila kosa ny vahoaka sisa tavela tao amin’ny fanjakan’i Joda, izany hoe ny olona rehetra voaroaka tany amin’ireo firenena manodidina ka niverina honina tao Joda indray, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia lehilahy mpiady sy zaza amam-behivavy ary ireo zanakavavin’ny mpanjaka; ireo olona rehetra ireo dia izay napetrak’i Nebozaradàna lehiben’ny mpiambina tamin’i Gedalià, zanakalahin’i Ahikama sy zafikelin’i Safàna. Nentiny niaraka taminy koa i Jeremià mpaminany sy i Baròka zanakalahin’i Nerià. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy nihaino ny feon’ny TOMPO ireo, fa lasa nankany Ejipta, ary tonga hatrany Tahapanehesa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tahapanehesa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 2.16 sy nta. –fandosirana tany Ejipta: jereo 2 Mp 25.26.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manambara ny fanafihana an’i Ejipta i Jeremià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia tonga tamin’i Jeremià tao Tahapanehesa ny baikon’ny TOMPO hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Makà vato lehibe vitsivitsy ka aleveno ao amin’ny gorodona rarivato eo am-pidirana mankao an-dapan’ny Farao ao Tahapanehesa eo imason’ny lehilahy jodeanina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia ambarao amin’ireo hoe: ‹Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Indro Aho haniraka hampaka an’i Nebokadnetsara mpanjakan’i Babilôna izay mpanompoko, ka eto ambonin’ireto vato izay nalevina eto ireto no haoriko ny sezafiandrianany, ary eto no hamelarany ny trano lain’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ho avy hamely ny tany Ejipta izy, ka izay olona natao ho amin’ny areti-mandringana dia hianjadian’ny areti-mandringana, izay natao ho amin’ny fahababoana dia hianjadian’ny fahababoana, ary izay natao ho amin’ny sabatra dia hovonoina ho faty amin’ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hodorany amin’ny afo ny tempolin’ireo andriamanitry ny Ejiptianina, hodorany koa ireo andriamanitry ny Ejiptianina na hoentiny ho babo any aminy. Tahaka ny hitsimponan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ondry ny haofotsy amin’ny fitafiany no hitsimponany an’i Ejipta. Avy eo dia hiala am-pilaminana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hotorotoroin’i Nebokadnetsara koa ireo vato mitsangana ao Heliôpôly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heliôpôly: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàn-dehibe ao atsimon’ny vinani-hefak’i Neily.
    marker-yv: yv-n
  - type: text
    text: ' ary horavany amin’ny afo ireo tempolin’ny andriamanitry ny Ejiptianina.› »'
