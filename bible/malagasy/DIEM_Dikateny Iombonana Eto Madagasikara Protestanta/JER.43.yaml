document_id: JER.43,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nentina an-keriny ho any Ejipta i Jeremià
  - type: text
    content: 'Rehefa tapitra voalazan’i Jeremià avokoa tamin’ny vahoaka rehetra teo ny tenin’ny TOMPO Andriamaniny araka izay nanirahany azy holazainy aninkeheo, '
  '10':
  - type: text
    content: 'Dia ambarao amin’ireo hoe: ‹Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Indro Aho haniraka hampaka an’i Nebokadnetsara mpanjakan’i Babilôna izay mpanompoko, ka eto ambonin’ireto vato izay nalevina eto ireto no haoriko ny sezafiandrianany, ary eto no hamelarany ny trano lain’ny mpanjaka. '
  '11':
  - type: text
    content: 'Ho avy hamely ny tany Ejipta izy, ka izay olona natao ho amin’ny areti-mandringana dia hianjadian’ny areti-mandringana, izay natao ho amin’ny fahababoana dia hianjadian’ny fahababoana, ary izay natao ho amin’ny sabatra dia hovonoina ho faty amin’ny sabatra. '
  '12':
  - type: text
    content: 'Hodorany amin’ny afo ny tempolin’ireo andriamanitry ny Ejiptianina, hodorany koa ireo andriamanitry ny Ejiptianina na hoentiny ho babo any aminy. Tahaka ny hitsimponan’ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry ny haofotsy amin’ny fitafiany no hitsimponany an’i Ejipta. Avy eo dia hiala am-pilaminana izy. '
  '13':
  - type: text
    content: Hotorotoroin’i Nebokadnetsara koa ireo vato mitsangana ao Heliôpôly
  - type: note
    content: 'Heliôpôly: tanàn-dehibe ao atsimon’ny vinani-hefak’i Neily.'
  - type: text
    content: ' ary horavany amin’ny afo ireo tempolin’ny andriamanitry ny Ejiptianina.› »'
  '2':
  - type: text
    content: 'dia namaly i Hazarià zanakalahin’i Hosaià sy i Jôhanàna zanakalahin’i Karea ary ireo lehilahy mpirehaka rehetra ka nanao tamin’i Jeremià hoe:'
  - type: text
    content: '–Mpandainga ianao fa tsy naniraka anao hisakana anay tsy handeha hialokaloka any Ejipta ny TOMPO Andriamanitsika. '
  '3':
  - type: text
    content: I Baròka, zanakalahin’i Nerià, no nanome saina anao hamely anay, fa tiany ho voatolotra eo an-tanan’ny Babilônianina izahay mba hamonoany anay ho faty na hitondrany anay ho babo any Babilôna.
  '4':
  - type: text
    content: 'Noho izany, tsy nanaiky hipetraka tany Joda araka izay nambaran’ny TOMPO azy i Jôhanàna zanakalahin’i Karea sy ireo rehetra mpifehy ny andia-miaramila mbamin’ireo olona niaraka taminy. '
  '5':
  - type: text
    content: 'Fa nentin’i Jôhànana zanakalahin’i Karehà sy ireo rehetra mpifehy ny andia-miaramila kosa ny vahoaka sisa tavela tao amin’ny fanjakan’i Joda, izany hoe ny olona rehetra voaroaka tany amin’ireo firenena manodidina ka niverina honina tao Joda indray, '
  '6':
  - type: text
    content: 'dia lehilahy mpiady sy zaza amam-behivavy ary ireo zanakavavin’ny mpanjaka; ireo olona rehetra ireo dia izay napetrak’i Nebozaradàna lehiben’ny mpiambina tamin’i Gedalià, zanakalahin’i Ahikama sy zafikelin’i Safàna. Nentiny niaraka taminy koa i Jeremià mpaminany sy i Baròka zanakalahin’i Nerià. '
  '7':
  - type: text
    content: Tsy nihaino ny feon’ny TOMPO ireo, fa lasa nankany Ejipta, ary tonga hatrany Tahapanehesa
  - type: note
    content: 'Tahapanehesa: jereo 2.16 sy nta. –fandosirana tany Ejipta: jereo 2 Mp 25.26.'
  - type: text
    content: .
  - type: heading
    content: Manambara ny fanafihana an’i Ejipta i Jeremià
  '8':
  - type: text
    content: 'Dia tonga tamin’i Jeremià tao Tahapanehesa ny baikon’ny TOMPO hoe: '
  '9':
  - type: text
    content: '«Makà vato lehibe vitsivitsy ka aleveno ao amin’ny gorodona rarivato eo am-pidirana mankao an-dapan’ny Farao ao Tahapanehesa eo imason’ny lehilahy jodeanina. '
