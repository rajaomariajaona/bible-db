document_id: JOS.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faritany mbola tsy azo
  - type: text
    content: 'Nony efa tena antitra i Josoa, dia nitenenan’ny TOMPO hoe:'
  - type: text
    content: '–Efa tena antitra ianao ity, nefa midadasika tokoa ny faritany sisa tsy mbola azo: '
  '10':
  - type: text
    content: 'dia mahazo ireo tanànan’i Sihôna, ilay mpanjaka '
  - type: text
    content: amôrita
  - type: text
    content: ' nanjaka tao Hesbôna sy nanan-tany tafapaka hatrany amin’ny sisin-tanin’ny Hamônita; '
  '11':
  - type: text
    content: 'ao anatiny koa i Gilehada, ny faritanin’i Gesora sy i Mahekà, ny tendrombohitra Hermôna, ary i '
  - type: text
    content: Basàna
  - type: text
    content: ' manontolo hatrany Salkà'
  - type: note
    content: 'Gesora sy Mahekà: jereo Deot 3.14.'
  - type: text
    content: '; '
  '12':
  - type: text
    content: mbola anisan’izany koa ny fanjakan’i Hôga, iray amin’ireo Refaîta sisa tavela
  - type: note
    content: Jereo Deot 2.11 sy nta.
  - type: text
    content: ' ary nanjaka tao Hastarôta sy Edrehỳ tany Basàna. Resin’i Mosesy avokoa ireo firenena ireo ka noroahiny. '
  '13':
  - type: text
    content: Tsy noroahin’ny Israelita anefa ny mponina tao Gesora sy Mahekà; koa miara-monina amin’ny Israelita ry zareo mandraka androany.
  '14':
  - type: text
    content: 'Ny fokon’i Levỳ kosa no hany tsy nomen’i Mosesy zaratany holovany. Ny anjarany dia alaina amin’ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana amin’ny afo ho an’ny TOMPO Andriamanitr’i Israely araka izay efa nampanantenain’ny Tompo azy'
  - type: note
    content: Jereo Deot 18.1-8.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Nomen’i Mosesy anjara ny fokon’ny Reobenita ho an’ireo tarika ao aminy. '
  '16':
  - type: text
    content: 'Ny faritaniny dia manomboka eo amin’ny tanàna Harôhera amoron’ny lohasahan-driaka Arnôna sy eo amin’ilay tanàna antenatenan’io lohasaha io, any atsimo, dia mahafaoka ny lembalemba rehetra manodidina an’i Medebà; '
  '17':
  - type: text
    content: 'isan’izany koa i Hesbôna sy ny tanàna rehetra eny amin’io lembalemba io, dia i Dibôna, i Bamôta-Bahala, i Bety-Bahala-Mehôna, '
  '18':
  - type: text
    content: 'i Jahatsa, i Kedemôta, i Mefahata, '
  '19':
  - type: text
    content: 'i Kiriataîma, Sibmà, i Tsereta-Sahary izay eo amin’ilay havoana mandondona ny lohasahan’i Jôrdàna, '
  '2':
  - type: text
    content: dia ny faritany manontolo misy ny Filistinina sy ny Gesorita
  - type: note
    content: ny Gesorita eto dia mponina any atsimon’i Palestinina; koa aza afangaro amin’ireo Gesorita eo amin’ny and 11 izay manamorona ny sisiny atsinanana amin’ny farihin’i Genesareta ny taniny.
  - type: text
    content: ', '
  '20':
  - type: text
    content: 'i Bety-Pehôra, ny kisolosolon’i Pisgà, ary i Bety-Jerimôta. '
  '21':
  - type: text
    content: 'Ankoatra ireo tanàna rehetra teny amin’ny lembalemba ireo, dia ao anatiny koa ny fanjakana manontolo izay an’i Sikôna, ilay mpanjaka amôrita nanjaka tao Hesbôna. Noresen’i Mosesy niaraka tamin’i Sihôna ireo mpanjaka midianita izay nanoa an’i Sihôna ka nonina tao amin’izany tany izany: dia ry i Evỳ, i Rekema, i Tsora, i Hora, ary i Rebà. '
  '22':
  - type: text
    content: 'I Balahama mpimasy, ilay zanakalahin’i Behôra, dia isan’ireo novonoin’ny Israelita tamin’izay. '
  '23':
  - type: text
    content: I Jôrdàna sy ny morontsiraka
  - type: note
    content: 'morontsiraka: izany hoe ny moron’ny Ranomasina Maty, lafy avaratra atsinanana.'
  - type: text
    content: ' no sisin-tanin’ny Reobenita, ao andrefana. Ireo tanàn-dehibe voatanisa ireo, miampy ny tanàna kely miankina aminy, no zaratany nolovan’ny Reobenita ho an’ireo tarika ao anatiny.'
  '24':
  - type: text
    content: 'Nomen’i Mosesy anjara koa ny fokon’i Gada; nomena ny Gadita izany ho an’ireo tarika ao anatiny. '
  '25':
  - type: text
    content: 'Ny faritaniny dia mahafaoka ny tanàna Jahezera, ny tanàna rehetra ao Gilehada, ary ny antsasaky ny tanin’ny Hamônita tafapaka hatrany Harôhera akaikin’i Rabà; '
  '26':
  - type: text
    content: 'dia mitatra hatreo Hesbôna ka hatrany Ramata-Mitsipè sy Betônima, ary hatreo Mahanaîma ka hatrany amin’ny sisin-tanin’i Lô-Dabara. '
  '27':
  - type: text
    content: 'Tany amin’ny lohasahan’i Jôrdàna kosa dia nisy an’i Bety-Harama sy i Bety-Nimrà ary i Sokôta sy i Tsafôna, izany hoe ny sisa amin’ny fanjakan’i Sihôna izay nanjaka tao Hesbôna: tao andafy atsinanan’i Jôrdàna no misy izany faritany izany, ka mipaka hatrany amin’ny farihin’i Genesareta any avaratra. '
  '28':
  - type: text
    content: Ireo tanàn-dehibe voatanisa ireo miampy ny tanàna kely miankina aminy no zaratany nolovan’ny Gadita ho an’ireo tarika ao anatiny.
  '29':
  - type: text
    content: 'Ary nomen’i Mosesy anjara koa ny antsasa-pokon’i Manase; azon’ilay antsasa-poko taranak’i Manase izany ho an’ireo tarika ao anatiny. '
  '3':
  - type: text
    content: izany hoe ny faritra noheverina ho kanahanita manomboka hatreo amin’ny lohasahan-driaka Sihôra izay sisin-tany atsinanan’i Ejipta ka hatrany amin’ny faritanin’i Hekrôna any avaratra; ao no misy ireo fanjakana dimy tamin’ny Filistinina, dia i Gazà, i Asdôda, i Askelôna, i Gata ary i Hekrôna; ao koa no misy ny Havita
  - type: note
    content: 'Ny fanjakana dimin’ny Filistinina: jereo Gen 26.1 sy nta. ny –Havita dia mponina kanahanita tao amin’ny faritanin’i Gazà (Deot 2.23).'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Ny faritaniny dia manomboka eo Mahanaîma ao atsimo ary mahafaoka an’i Basàna manontolo, izany hoe ny fanjakana manontolo izay an’i Hôga mpanjaka tao Basàna, mbamin’ny fitambaran’i Havôta-Jaîro, izay tanàna enimpolo tao Basàna; '
  '31':
  - type: text
    content: ao anatiny koa ny antsasak’i Gilehada, ary i Hastarôta sy i Edrehỳ renivohitry ny fanjakan’i Hôga mpanjakan’i Basàna. Izany no faritany azon’ny taranak’i Makira zanakalahin’i Manase; azon’ilay antsasaky ny taranak’i Makira izany ho an’ireo tarika ao anatiny.
  '32':
  - type: text
    content: 'Ireo tany ireo no voazaran’i Mosesy teny atsinanan’i Jerikao, ampita atsinanan’i Jôrdàna, fony izy tao amin’ny lemak’i Môaba. '
  '33':
  - type: text
    content: Tsy mba nomen’i Mosesy zaratany kosa ny fokon’i Levỳ; satria, araka ny nolazainy taminy, dia ny manompo ny TOMPO Andriamanitr’i Israely no anjarany
  - type: note
    content: Jereo Fanis 18.20; Fifan 18.2.
  - type: text
    content: .
  '4':
  - type: text
    content: any atsimo. Tsy mbola azo koa ny tanin’ny Kanahanita, manomboka hatreo Harà
  - type: note
    content: hatreo Harà na hoe sy i Meharà.
  - type: text
    content: 'izay an’ny Tsidônianina ka hatrany Afeka any amin’ny sisin-tanin’ny '
  - type: text
    content: Amôrita
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ao ihany koa ny faritanin’i Gebala sy i Libano atsinanana manomboka hatreo Bahala-Gada eo am-pototry ny tendrombohitra Hermôna ka hatrany Lebô-Hamata. '
  '6':
  - type: text
    content: 'Anisany koa ny faritra be tendrombohitra eo anelanelan’i Libano sy i Misrefôta-Maina izay Tsidônianina avokoa no monina ao. Izaho no handroaka ireny mponina ireny eo anoloan’ny Israelita; fa ianao kosa no hizara antsapaka ny taniny ho lovan’ny Israelita araka izay efa nandidiako anao. '
  '7':
  - type: text
    content: Koa ankehitriny, zarao ireto tany efa azo ireto ho lovan’ny foko sivy sy antsasa-pokon’i Manase
  - type: note
    content: Jereo and 8.
  - type: text
    content: .
  - type: heading
    content: Fizaràna ny tany tao andafy atsinanan’i Jôrdàna
  '8':
  - type: text
    content: Ny Reobenita sy Gadita miaraka amin’ilay antsasa-pokon’i Manase manko dia efa nahazo ny zaratany nomen’i Mosesy teny atsinanan’i Jôrdàna. Araka izay nomen’i Mosesy mpanompon’ny TOMPO azy
  - type: note
    content: jereo 1.12-15 sy 12.6.
  - type: text
    content: ', '
  '9':
  - type: text
    content: 'ny tanin’izy telo tonta dia manomboka eo amin’ny tanàna Harôhera amoron’ny lohasahan-driaka Arnôna sy eo amin’ilay tanàna antenatenan’io lohasaha io, any atsimo; dia mahafaoka ny lembalemba rehetra manodidina an’i Medebà ka hatrany Dibôna; '
