      marker-yv: yv-n
    - type: text
      text: ' no sisin-tanin’ny Reobenita, ao andrefana. Ireo tanàn-dehibe voatanisa ireo, miampy ny tanàna kely miankina aminy, no zaratany nolovan’ny Reobenita ho an’ireo tarika ao anatiny.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomen’i Mosesy anjara koa ny fokon’i Gada; nomena ny Gadita izany ho an’ireo tarika ao anatiny. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny faritaniny dia mahafaoka ny tanàna Jahezera, ny tanàna rehetra ao Gilehada, ary ny antsasaky ny tanin’ny Hamônita tafapaka hatrany Harôhera akaikin’i Rabà; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia mitatra hatreo Hesbôna ka hatrany Ramata-Mitsipè sy Betônima, ary hatreo Mahanaîma ka hatrany amin’ny sisin-tanin’i Lô-Dabara. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tany amin’ny lohasahan’i Jôrdàna kosa dia nisy an’i Bety-Harama sy i Bety-Nimrà ary i Sokôta sy i Tsafôna, izany hoe ny sisa amin’ny fanjakan’i Sihôna izay nanjaka tao Hesbôna: tao andafy atsinanan’i Jôrdàna no misy izany faritany izany, ka mipaka hatrany amin’ny farihin’i Genesareta any avaratra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo tanàn-dehibe voatanisa ireo miampy ny tanàna kely miankina aminy no zaratany nolovan’ny Gadita ho an’ireo tarika ao anatiny.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
