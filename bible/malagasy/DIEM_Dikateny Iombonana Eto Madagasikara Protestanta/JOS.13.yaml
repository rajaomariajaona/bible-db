  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomen’i Mosesy anjara ny fokon’ny Reobenita ho an’ireo tarika ao aminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny faritaniny dia manomboka eo amin’ny tanàna Harôhera amoron’ny lohasahan-driaka Arnôna sy eo amin’ilay tanàna antenatenan’io lohasaha io, any atsimo, dia mahafaoka ny lembalemba rehetra manodidina an’i Medebà; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'isan’izany koa i Hesbôna sy ny tanàna rehetra eny amin’io lembalemba io, dia i Dibôna, i Bamôta-Bahala, i Bety-Bahala-Mehôna, '
