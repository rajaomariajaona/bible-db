  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ankoatra ireo tanàna rehetra teny amin’ny lembalemba ireo, dia ao anatiny koa ny fanjakana manontolo izay an’i Sikôna, ilay mpanjaka amôrita nanjaka tao Hesbôna. Noresen’i Mosesy niaraka tamin’i Sihôna ireo mpanjaka midianita izay nanoa an’i Sihôna ka nonina tao amin’izany tany izany: dia ry i Evỳ, i Rekema, i Tsora, i Hora, ary i Rebà. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Balahama mpimasy, ilay zanakalahin’i Behôra, dia isan’ireo novonoin’ny Israelita tamin’izay. '
