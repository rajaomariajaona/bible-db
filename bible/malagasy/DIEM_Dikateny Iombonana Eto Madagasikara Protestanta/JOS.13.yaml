  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy noroahin’ny Israelita anefa ny mponina tao Gesora sy Mahekà; koa miara-monina amin’ny Israelita ry zareo mandraka androany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
