document_id: 1SA.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Saoly sy ny borikivavy very
  - type: text
    content: 'Tamin’izany fotoana izany, dia nisy lehilahy tsongoin’olom-bolo avy amin’ny fokon’i Benjamîna natao hoe Kisy. Izy dia zanakalahin’i Abièla sy zafikelin’i Tserôra ary zafiafin’i Bekôrata sy zafindohalik’i Afia. '
  '12':
  - type: text
    content: 'Dia hoy no navalin’ireo tovovavy hoe:'
  - type: text
    content: '–Eny, ao izy, vao tonga talohanareo teo izy; koa faingàna ianareo, fa efa ao an-tanàna izy izao satria anio no andro fanateran’ny vahoaka '
  - type: text
    content: sorona
  - type: text
    content: ' eo amin’ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: '. '
  '13':
  - type: text
    content: Ho hitanareo izy raha vantany vao miditra ny tanàna ianareo, mialoha ny hiakarany hisakafo ao amin’ny toeram-panasinana. Tsy hisy olona hihinana alohan’ny ahatongavany, satria izy no tsy maintsy mitsodrano ny sorona; dia aorian’izay vao hihinana ireo olona nasaina. Koa miakara amin’izay ianareo, fa ho hitanareo anio izy.
  - type: heading
    content: I Saoly mihaona amin’i Samoela
  '14':
  - type: text
    content: Dia niakatra ny tanàna i Saoly sy ilay mpanompony; ary raha vantany vao tafiditra tao izy roa lahy, dia indro tafahaona tamin’i Samoela izay nivoaka indrindra ny tanàna hankeny amin’ilay toeram-panasinana.
  '15':
  - type: text
    content: 'Fa indray andro tsy hahatongavan-dry Saoly, dia efa nilaza tamin’i Samoela ny momba izao fihaonana izao ny Tompo hoe: '
  '16':
  - type: text
    content: '«Rahampitso, amin’ny ora toy izao, dia halefako ho atỳ aminao lehilahy iray avy amin’ny fokon’i Benjamîna; hatokanao ho filohan’ilay Israely vahoakako izy mba hanafahany azy amin’ny fahefàn’ny Filistinina. Fa efa hitako ny fahorian’ny vahoakako ary efa reko ny antso vonjiny.» '
  '17':
  - type: text
    content: 'Koa raha vao nahatazana an’i Saoly i Samoela, dia hoy ny TOMPO tamin’i Samoela: «Io ilay lehilahy voalazako taminao, izy no hitondra ny vahoakako.»'
  '18':
  - type: text
    content: 'Dia nanatona an’i Samoela teny am-bavahadin’ny tanàna i Saoly ka nanontany azy hoe:'
  - type: text
    content: –Azafady, tompoko, mba atoroy ahy ny tranon’ilay mpahita.
  '19':
  - type: text
    content: 'Ary hoy ny navalin’i Samoela:'
  - type: text
    content: '–Izaho no izy. Koa dia mialohava ahy any amin’ny toeram-panasinana ianao, fa hiara-misakafo amiko ianareo anio; ary rahampitso maraina, rehefa voalazako avokoa izay tianao ho fantatra, dia halefako mody ianareo. '
  '2':
  - type: text
    content: Ary i Kisy nanan-janakalahy atao hoe Saoly izay tovolahy sady taviny no volony; tsy nisy teo amin’i Israely nihoatra azy tamin’ny hatsaran-tarehy, ary nanatombo halavana amin’ny olon-drehetra koa izy.
  '20':
  - type: text
    content: Ny amin’ireo borikivavy very hateloana, dia aza manahy intsony ianao, satria efa hita izy ireo. Ary iza moa ankehitriny no tena ilain’ny vahoaka israelita fa tsy ianao sy ny fianakavian-drainao ve?
  '21':
  - type: text
    content: 'Dia hoy i Saoly hoe:'
  - type: text
    content: –Fa izaho ahoana? Izaho anie ka avy amin’i Benjamîna e, avy amin’ilay foko kely indrindra amin’ny fokon’ny Israely? Ary ny fianakavian-draiko moa ve tsy ilay fianakaviana vitsy indrindra amin’ny fokon’i Benjamîna? Koa ahoana no ilazanao zavatra toy izany amiko?
  '22':
  - type: text
    content: 'Avy teo dia notarihin’i Samoela hiditra tao amin’ny efitra fisakafoana i Saoly sy ny mpanompony ka napetrany teo amin’ny toeram-boninahitra niaraka tamin’ireo vahiny nasaina miisa telopolo eo ho eo. '
  '23':
  - type: text
    content: 'Dia hoy i Samoela tamin’ny mpahandro: «Arosoy ilay didin-kena izay nomeko anao ka nasaiko hotehirizinao.» '
  '24':
  - type: text
    content: 'Nalain’ilay mpahandro ny fen’ondry miaraka amin’ny hofany ka narosony teo anoloan’i Saoly. Dia hoy i Samoela tamin’i Saoly:'
  - type: text
    content: –Indro eo anatrehanao ny anjara voatokana ho anao amin’izao andro lehibe izao, ka mihinàna miaraka amin’ireto vahiny nasaiko ireto.
  - type: text
    content: 'Koa tamin’izay andro izay, dia niara-nihinana tamin’i Samoela i Saoly. '
  '25':
  - type: text
    content: Avy eo izy ireo, dia nidina avy teo amin’ny toeram-panasinana ka nankany an-tanàna, ary nifampiresaka teo an-tampon-trano.
  - type: heading
    content: Manokana an’i Saoly ho mpanjakan’i Israely i Samoela
  '26':
  - type: text
    content: 'Nony ampitso dia nifoha maraina be i Saoly sy ny mpanompony. Rehefa nazava ratsy ny andro, dia niantso an’i Saoly avy teo an-tampon-trano i Samoela hoe:'
  - type: text
    content: –Miomàna ianao fa hateriko antsasa-dalana.
  - type: text
    content: 'Dia nanaiky i Saoly, ary niara-nivoaka ny trano izy sy i Samoela. '
  '27':
  - type: text
    content: 'Nony mby teo amin’ny faran’ny tanàna izy ireo, dia hoy i Samoela tamin’i Saoly:'
  - type: text
    content: –Lazao ny mpanomponao hialoha antsika.
  - type: text
    content: 'Rehefa lasa lavitra ilay mpanompo, dia hoy indray i Samoela hoe:'
  - type: text
    content: –Ary ianao kosa, mijanòna eto ankehitriny, fa tiako hampahafantarina ny tenin’Andriamanitra.
  '3':
  - type: text
    content: 'Indray andro dia very ireo borikivavin’i Kisy rain’i Saoly; dia hoy i Kisy tamin-janany: «Ento miaraka aminao ny mpanompo iray, ka mandehana ianareo mitady ireo borikivavy». '
  '4':
  - type: text
    content: Nitety ny faritra be tendrombohitra any Efraîma aloha i Saoly sy ilay namany, avy eo ny faritanin’i Salisà, nefa tsy nahita na inona na inona; dia namakivaky ny faritanin’i Salima
  - type: note
    content: 'Salisà sy Salima: faritra tsy fantatra mazava ny misy azy; ampit 2 Mp 4.42.'
  - type: text
    content: ' indray izy ireo, nefa tsy mbola nahita ihany. '
  '5':
  - type: text
    content: Nony tonga teo amin’ny faritanin’i Tsofo
  - type: note
    content: 'Tsofo: anarana samirery manondro toerana sa manondro olona (jereo 1.1).'
  - type: text
    content: ' izy ireo, dia hoy i Saoly tamin’ilay mpanompo nanaraka azy:'
  - type: text
    content: –Andeha hitodi-doha hiverina isika, sao isika indray no mampanahy an’i Dada fa tsy ny borikivavy intsony.
  '6':
  - type: text
    content: 'Hoy kosa ilay mpanompo taminy:'
  - type: text
    content: –Andraso fa misy izay lehilahin’Andriamanitra izay amin’irỳ tanàna irỳ; ary malaza tokoa izy, satria tsy misy tsy tanteraka izay rehetra ambarany. Koa aoka halehantsika any aminy izy, sao mba ho afaka hanoro antsika izay lalana mety hahitana ny borikivavy izy.
  '7':
  - type: text
    content: 'Dia hoy i Saoly tamin’ny mpanompony:'
  - type: text
    content: –Raha mankany àry isika, dia inona kosa no mba homentsika ilay mpaminany? Efa lany manko ny mofo nentintsika, ka tsy misy fanomezana azo atolotra azy; tsy manana na inona na inona intsony isika.
  '8':
  - type: text
    content: 'Fa hoy ny navalin’ilay mpanompo an’i Saoly hoe:'
  - type: text
    content: –Mbola manana vola madinika kely izay aho atỳ amiko atỳ; homentsika azy izany, mba hanoroany antsika izay lalana tokony haleha.
  '9':
  - type: text
    content: 'Dia hoy i Saoly hoe:'
  - type: text
    content: –Marina ny anao; andeha àry isika ho any.
  - type: text
    content: 'Ary lasa izy ireo nankany an-tanànan’ilay lehilahin’Andriamanitra. Teny an-dalana izy ireo dia sendra tovovavy nandeha hantsaka izay nanontaniany hoe:'
  - type: text
    content: –Ao ihany ve ilay mpahita izay?
  - type: text
    content: '(Fahiny teo amin’ny Israely dia fanaon’ny olona izay te hanontany mivantana an’Andriamanitra ny manao hoe: «Andeha isika ho any amin’ny mpahita.» Fa izay antsoina ankehitriny hoe «mpaminany» manko no nantsoina taloha hoe «mpahita.»)'
