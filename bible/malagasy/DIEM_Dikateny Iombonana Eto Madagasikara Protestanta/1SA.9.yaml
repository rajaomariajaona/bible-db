document_id: 1SA.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Saoly sy ny borikivavy very
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany fotoana izany, dia nisy lehilahy tsongoin’olom-bolo avy amin’ny fokon’i Benjamîna natao hoe Kisy. Izy dia zanakalahin’i Abièla sy zafikelin’i Tserôra ary zafiafin’i Bekôrata sy zafindohalik’i Afia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary i Kisy nanan-janakalahy atao hoe Saoly izay tovolahy sady taviny no volony; tsy nisy teo amin’i Israely nihoatra azy tamin’ny hatsaran-tarehy, ary nanatombo halavana amin’ny olon-drehetra koa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Indray andro dia very ireo borikivavin’i Kisy rain’i Saoly; dia hoy i Kisy tamin-janany: «Ento miaraka aminao ny mpanompo iray, ka mandehana ianareo mitady ireo borikivavy». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nitety ny faritra be tendrombohitra any Efraîma aloha i Saoly sy ilay namany, avy eo ny faritanin’i Salisà, nefa tsy nahita na inona na inona; dia namakivaky ny faritanin’i Salima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Salisà '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Salima
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': faritra tsy fantatra mazava ny misy azy; ampit 2 Mp 4.42.'
    marker-yv: yv-n
  - type: text
    text: ' indray izy ireo, nefa tsy mbola nahita ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nony tonga teo amin’ny faritanin’i Tsofo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsofo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anarana samirery manondro toerana sa manondro olona (jereo 1.1).
    marker-yv: yv-n
  - type: text
    text: ' izy ireo, dia hoy i Saoly tamin’ilay mpanompo nanaraka azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha hitodi-doha hiverina isika, sao isika indray no mampanahy an’i Dada fa tsy ny borikivavy intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy kosa ilay mpanompo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andraso fa misy izay lehilahin’Andriamanitra izay amin’irỳ tanàna irỳ; ary malaza tokoa izy, satria tsy misy tsy tanteraka izay rehetra ambarany. Koa aoka halehantsika any aminy izy, sao mba ho afaka hanoro antsika izay lalana mety hahitana ny borikivavy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy i Saoly tamin’ny mpanompony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha mankany àry isika, dia inona kosa no mba homentsika ilay mpaminany? Efa lany manko ny mofo nentintsika, ka tsy misy fanomezana azo atolotra azy; tsy manana na inona na inona intsony isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy ny navalin’ilay mpanompo an’i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mbola manana vola madinika kely izay aho atỳ amiko atỳ; homentsika azy izany, mba hanoroany antsika izay lalana tokony haleha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: 'Dia hoy i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Marina ny anao; andeha àry isika ho any.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary lasa izy ireo nankany an-tanànan’ilay lehilahin’Andriamanitra. Teny an-dalana izy ireo dia sendra tovovavy nandeha hantsaka izay nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ao ihany ve ilay mpahita izay?
- type: usfm
  marker: p
  children:
  - type: text
    text: '(Fahiny teo amin’ny Israely dia fanaon’ny olona izay te hanontany mivantana an’Andriamanitra ny manao hoe: «Andeha isika ho any amin’ny mpahita.» Fa izay antsoina ankehitriny hoe «mpaminany» manko no nantsoina taloha hoe «mpahita.»)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy no navalin’ireo tovovavy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Eny, ao izy, vao tonga talohanareo teo izy; koa faingàna ianareo, fa efa ao an-tanàna izy izao satria anio no andro fanateran’ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-panasinana
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ho hitanareo izy raha vantany vao miditra ny tanàna ianareo, mialoha ny hiakarany hisakafo ao amin’ny toeram-panasinana. Tsy hisy olona hihinana alohan’ny ahatongavany, satria izy no tsy maintsy mitsodrano ny sorona; dia aorian’izay vao hihinana ireo olona nasaina. Koa miakara amin’izay ianareo, fa ho hitanareo anio izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Saoly mihaona amin’i Samoela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia niakatra ny tanàna i Saoly sy ilay mpanompony; ary raha vantany vao tafiditra tao izy roa lahy, dia indro tafahaona tamin’i Samoela izay nivoaka indrindra ny tanàna hankeny amin’ilay toeram-panasinana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa indray andro tsy hahatongavan-dry Saoly, dia efa nilaza tamin’i Samoela ny momba izao fihaonana izao ny Tompo hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Rahampitso, amin’ny ora toy izao, dia halefako ho atỳ aminao lehilahy iray avy amin’ny fokon’i Benjamîna; hatokanao ho filohan’ilay Israely vahoakako izy mba hanafahany azy amin’ny fahefàn’ny Filistinina. Fa efa hitako ny fahorian’ny vahoakako ary efa reko ny antso vonjiny.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa raha vao nahatazana an’i Saoly i Samoela, dia hoy ny TOMPO tamin’i Samoela: «Io ilay lehilahy voalazako taminao, izy no hitondra ny vahoakako.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nanatona an’i Samoela teny am-bavahadin’ny tanàna i Saoly ka nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Azafady, tompoko, mba atoroy ahy ny tranon’ilay mpahita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy ny navalin’i Samoela:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no izy. Koa dia mialohava ahy any amin’ny toeram-panasinana ianao, fa hiara-misakafo amiko ianareo anio; ary rahampitso maraina, rehefa voalazako avokoa izay tianao ho fantatra, dia halefako mody ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny amin’ireo borikivavy very hateloana, dia aza manahy intsony ianao, satria efa hita izy ireo. Ary iza moa ankehitriny no tena ilain’ny vahoaka israelita fa tsy ianao sy ny fianakavian-drainao ve?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa izaho ahoana? Izaho anie ka avy amin’i Benjamîna e, avy amin’ilay foko kely indrindra amin’ny fokon’ny Israely? Ary ny fianakavian-draiko moa ve tsy ilay fianakaviana vitsy indrindra amin’ny fokon’i Benjamîna? Koa ahoana no ilazanao zavatra toy izany amiko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Avy teo dia notarihin’i Samoela hiditra tao amin’ny efitra fisakafoana i Saoly sy ny mpanompony ka napetrany teo amin’ny toeram-boninahitra niaraka tamin’ireo vahiny nasaina miisa telopolo eo ho eo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy i Samoela tamin’ny mpahandro: «Arosoy ilay didin-kena izay nomeko anao ka nasaiko hotehirizinao.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nalain’ilay mpahandro ny fen’ondry miaraka amin’ny hofany ka narosony teo anoloan’i Saoly. Dia hoy i Samoela tamin’i Saoly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro eo anatrehanao ny anjara voatokana ho anao amin’izao andro lehibe izao, ka mihinàna miaraka amin’ireto vahiny nasaiko ireto.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Koa tamin’izay andro izay, dia niara-nihinana tamin’i Samoela i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Avy eo izy ireo, dia nidina avy teo amin’ny toeram-panasinana ka nankany an-tanàna, ary nifampiresaka teo an-tampon-trano.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manokana an’i Saoly ho mpanjakan’i Israely i Samoela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nony ampitso dia nifoha maraina be i Saoly sy ny mpanompony. Rehefa nazava ratsy ny andro, dia niantso an’i Saoly avy teo an-tampon-trano i Samoela hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miomàna ianao fa hateriko antsasa-dalana.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nanaiky i Saoly, ary niara-nivoaka ny trano izy sy i Samoela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nony mby teo amin’ny faran’ny tanàna izy ireo, dia hoy i Samoela tamin’i Saoly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lazao ny mpanomponao hialoha antsika.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Rehefa lasa lavitra ilay mpanompo, dia hoy indray i Samoela hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ary ianao kosa, mijanòna eto ankehitriny, fa tiako hampahafantarina ny tenin’Andriamanitra.
