document_id: GEN.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nambaran’Andriamanitra fa hitera-dahy i Sarà
  - type: text
    content: 'Niseho tamin’i Abrahama tao amin’ny hazo ôakan’i Mamre ny TOMPO, raha nipetraka teo am-baravaran’ny lainy izy fa nafana ny andro. '
  '10':
  - type: text
    content: 'Dia nilaza ny iray tamin’ny vahiny hoe:'
  - type: text
    content: –Hiverina eto aminao aho amin’ny herintaona toy izao, ka hitera-dahy i Sarà vadinao.
  - type: text
    content: 'I Sarà anefa tamin’izay dia nihaino teo am-baravaran’ny tranolay, tao an-damosin’i Abrahama. '
  '11':
  - type: text
    content: 'Samy antitra i Abrahama sy i Sarà fa samy nandroso taona; ary i Sarà dia efa nitsahatra tamin’ny fadimbolana. '
  '12':
  - type: text
    content: 'Koa nihomehy anakampo i Sarà nanao hoe: «Dia mbola hisy fahafinaretana ho ahy ve amin’izao fahanterako izao sady efa antitra koa ny vadiko'
  - type: note
    content: 'ny vadiko na ny tompoko: jereo 1Pt 3.6.'
  - type: text
    content: '?» '
  '13':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Abrahama:'
  - type: text
    content: '–Nahoana moa no mihomehy i Sarà? Nahoana izy no manao anakampo hoe: «Marina ve fa hiteraka tokoa ity izaho efa antitra ity?» '
  '14':
  - type: text
    content: Moa misy zavatra tsy hain’ny TOMPO tanterahina ve
  - type: note
    content: Jereo Lk 1.37.
  - type: text
    content: '? Koa rehefa miverina eto aminao aho amin’ny herintaona toy izao, dia hanan-janaka lahy i Sarà.'
  '15':
  - type: text
    content: 'Fa nandà noho ny tahotra i Sarà ka nanao hoe:'
  - type: text
    content: –Tsy nihomehy aho.
  - type: text
    content: Hoy kosa ny TOMPO
  - type: note
    content: Jereo Gen 17.17-19 sy nta.
  - type: text
    content: ' hoe:'
  - type: text
    content: –Tsia, fa nihomehy ianao.
  '16':
  - type: text
    content: 'Dia nitsangana niala teo ireo lehilahy vahiny ka nitazana an’i Sôdôma, ary i Abrahama niaraka taminy hanatitra azy. '
  '17':
  - type: text
    content: 'Dia hoy ny TOMPO anakampo hoe: «Moa hafeniko an’i Abrahama ve izay hataoko? '
  '18':
  - type: text
    content: 'Tsy maintsy ho tonga razamben’ny firenena lehibe sy matanjaka izy; ary amin’ny alalany no '
  - type: text
    content: hitahiako
  - type: text
    content: ' ny firenena rehetra eto an-tany'
  - type: note
    content: Jereo Gen 12.3 sy nta.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Nofidîko izy mba handidiany ireo zanany sy ny taranany hitandrina ny didiko ka hanao ny rariny sy ny hitsiny mba hotanterahiko amin’i Abrahama izay rehetra efa nampanantenaiko momba azy.» '
  '2':
  - type: text
    content: Nanopy maso i Abrahama ka nahita lehilahy telo
  - type: note
    content: 'lehilahy telo: ao amin’ny tohin’ny fitantarana izy ireo dia lazaina fotsiny amin’ny anarana hoe lehilahy (and 16, 22) na ny Tompo (and 13, 20, 33) na koa hoe ny anjely roa (19.1). Ampit Heb 13.2.'
  - type: text
    content: ' nijoro nanandrify azy. Raha nahita ireo izy, dia nihazakazaka avy teo an-dainy mba hitsena azy sady niankohoka teo anatrehany. '
  '20':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Abrahama:'
  - type: text
    content: '–Betsaka ny fitarainana momba an’i Sôdôma sy i Gômôra; ary mavesatra loatra ny fahotany. '
  '21':
  - type: text
    content: Koa voatery hidina Aho mba hijery raha toa ka araka ny fitarainana tonga any amiko tokoa no nataony. Ho fantatro raha nanao izany rehetra izany izy na tsia.
  '22':
  - type: text
    content: Ny roa tamin’ireo lehilahy vahiny dia niainga ka nankany Sôdôma, fa ny TOMPO kosa mbola nijanona niaraka tamin’i Abrahama
  - type: note
    content: 'fa ny Tompo kosa mbola nijanona niaraka tamin’i Abrahama na nijanona nijoro teo anatrehan’i Abrahama: rijan-teny naverina amin’ny laoniny. Ireo mpandika soratra jiosy manko dia milaza fa nahitsin’ireo ny TM, angamba mba tsy hanafintohina. Ka toy izao no tokony hamakiana azy hoy izy ireo: Fa i Abrahama kosa mbola nijanona nijoro teo anatrehan’ny Tompo.'
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Koa nanatona i Abrahama sady nanao hoe:'
  - type: text
    content: '–Dia haringanao tokoa miaraka amin’ny meloka ve ny marina? '
  '24':
  - type: text
    content: 'Angamba mety hisy olo-marina dimampolo ao Sôdôma. Koa haringanao ve io tanàna io? Moa tsy havelanao heloka ve izy noho ireo olo-marina dimampolo ao aminy? '
  '25':
  - type: text
    content: Tsia, sanatria aminao ny hanao izany! Raha hovonoinao miaraka amin’ny meloka ny marina, dia hitovy ny marina sy ny meloka. Sanatria Anao izany! Ianao Izay mpitsara ny tany tontolo ve no tsy hitandro ny rariny.
  '26':
  - type: text
    content: 'Dia namaly ny TOMPO hoe:'
  - type: text
    content: –Raha mahita olo-marina dimampolo ao Sôdôma Aho, dia havelako heloka ny tanàna manontolo noho ny amin’ireo.
  '27':
  - type: text
    content: 'Fa hoy indray i Abrahama:'
  - type: text
    content: '–Miangavy re, Tompo ô, fa mbola sahy hiteny aminao ihany aho, na dia vovoka sy lavenona aza. '
  '28':
  - type: text
    content: Angamba tsy ampy dimampolo ny olo-marina fa latsaka dimy, dia horavanao ve ny tanàna manontolo noho ny amin’ny dimy?
  - type: text
    content: 'Ka namaly ny Tompo hoe:'
  - type: text
    content: –Tsy handrava ny tanàna Aho, raha mahita olo-marina dimy amby efapolo ao!
  '29':
  - type: text
    content: 'Mbola niteny taminy indray i Abrahama hoe:'
  - type: text
    content: –Angamba tsy hahitana afa-tsy efapolo ao!
  - type: text
    content: 'Dia novalian’ny Tompo hoe:'
  - type: text
    content: –Tsy handrava ny tanàna Aho noho ny amin’ny olo-marina efapolo.
  '3':
  - type: text
    content: 'Ka ny anankiray tamin’ireo no nilazany hoe:'
  - type: text
    content: '–Tompoko, raha mba mahita fitia eo imasonao aho, dia aza lalovana fotsiny. '
  '30':
  - type: text
    content: 'Fa niteny indray i Abrahama hoe:'
  - type: text
    content: –Aoka tsy ho sosotra Ianao, Tompo ô, raha mbola hiteny aho. Angamba tsy hahitana afa-tsy telopolo ao.
  - type: text
    content: 'Ka novalian’ny Tompo hoe:'
  - type: text
    content: –Tsy handrava ny tanàna Aho, raha mahita olo-marina telopolo ao.
  '31':
  - type: text
    content: 'Dia hoy ihany i Abrahama:'
  - type: text
    content: –Miangavy re, Tompo ô, fa mbola sahy hiteny aminao ihany aho; angamba tsy hahitana afa-tsy roapolo ao.
  - type: text
    content: 'Fa novalian’ny Tompo hoe:'
  - type: text
    content: –Tsy handrava ny tanàna Aho noho ny amin’ny olo-marina roapolo.
  '32':
  - type: text
    content: 'Ka hoy indray i Abrahama:'
  - type: text
    content: –Miangavy re, Tompo ô, aoka tsy ho tezitra Ianao fa hiteny farany aho. Angamba tsy hahitana afa-tsy folo ao.
  - type: text
    content: 'Ary novalian’ny Tompo hoe:'
  - type: text
    content: –Tsy handrava ny tanàna Aho noho ny amin’ireo folo.
  '33':
  - type: text
    content: Rehefa nahavita ny resaka nataony tamin’i Abrahama ny TOMPO, dia lasa; fa i Abrahama kosa niverina any amin’ny fonenany.
  '4':
  - type: text
    content: 'Fa aoka hakana rano kely hanasanareo tongotra, ka hiala sasatra eto am-pototr’ity hazo ity ianareo. '
  '5':
  - type: text
    content: Izaho kosa handroso sakafo hohaninareo mba hampody hery anareo; avy eo vao hanohy ny dianareo ianareo, satria efa nandalo teto amiko tokoa.
  - type: text
    content: 'Dia namaly izy telo lahy hoe:'
  - type: text
    content: –Tanteraho araka izay nambaranao àry.
  '6':
  - type: text
    content: 'Koa niverina faingana ho any an-day i Abrahama hilaza amin’i Sarà hoe:'
  - type: text
    content: –Haingàna maka lafarinina tsara indrindra intelon’ny famarana ka manendasa mofo.
  '7':
  - type: text
    content: 'Avy teo i Abrahama dia nihazakazaka nankany amin’ny andian’ombiny ary naka zanak’omby matavy tsara ka nomeny ny mpanompony mba hamboariny haingana. '
  '8':
  - type: text
    content: 'Dia nalainy ny dibera sy ronono ary ny zanak’omby efa voavoatra ka narosony tamin’ireo vahiny. Dia nihinana ireo fa i Abrahama kosa nitsangana teo akaikiny teo am-pototry ny hazo. '
  '9':
  - type: text
    content: 'Ary nanontany izy telo lahy hoe:'
  - type: text
    content: –Aiza i Sarà vadinao?
  - type: text
    content: 'Ka hoy ny navaliny azy:'
  - type: text
    content: –Indro ao an-day izy.
