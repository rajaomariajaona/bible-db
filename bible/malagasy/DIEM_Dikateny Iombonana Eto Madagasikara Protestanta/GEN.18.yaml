document_id: GEN.18,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nambaran’Andriamanitra fa hitera-dahy i Sarà
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Niseho tamin’i Abrahama tao amin’ny hazo ôakan’i Mamre ny TOMPO, raha nipetraka teo am-baravaran’ny lainy izy fa nafana ny andro. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nilaza ny iray tamin’ny vahiny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hiverina eto aminao aho amin’ny herintaona toy izao, ka hitera-dahy i Sarà vadinao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Sarà anefa tamin’izay dia nihaino teo am-baravaran’ny tranolay, tao an-damosin’i Abrahama. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Samy antitra i Abrahama sy i Sarà fa samy nandroso taona; ary i Sarà dia efa nitsahatra tamin’ny fadimbolana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa nihomehy anakampo i Sarà nanao hoe: «Dia mbola hisy fahafinaretana ho ahy ve amin’izao fahanterako izao sady efa antitra koa ny vadiko'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny vadiko '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'ny tompoko:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1Pt 3.6.
      marker-yv: yv-n
    - type: text
      text: '?» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Abrahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana moa no mihomehy i Sarà? Nahoana izy no manao anakampo hoe: «Marina ve fa hiteraka tokoa ity izaho efa antitra ity?» '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Moa misy zavatra tsy hain’ny TOMPO tanterahina ve
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lk 1.37.
      marker-yv: yv-n
    - type: text
      text: '? Koa rehefa miverina eto aminao aho amin’ny herintaona toy izao, dia hanan-janaka lahy i Sarà.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa nandà noho ny tahotra i Sarà ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy nihomehy aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hoy kosa ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 17.17-19 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, fa nihomehy ianao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nitsangana niala teo ireo lehilahy vahiny ka nitazana an’i Sôdôma, ary i Abrahama niaraka taminy hanatitra azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy ny TOMPO anakampo hoe: «Moa hafeniko an’i Abrahama ve izay hataoko? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tsy maintsy ho tonga razamben’ny firenena lehibe sy matanjaka izy; ary amin’ny alalany no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hitahiako
    - type: text
      text: ' ny firenena rehetra eto an-tany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 12.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nofidîko izy mba handidiany ireo zanany sy ny taranany hitandrina ny didiko ka hanao ny rariny sy ny hitsiny mba hotanterahiko amin’i Abrahama izay rehetra efa nampanantenaiko momba azy.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nanopy maso i Abrahama ka nahita lehilahy telo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lehilahy telo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ao amin’ny tohin’ny fitantarana izy ireo dia lazaina fotsiny amin’ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lehilahy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 16, 22) na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny Tompo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 13, 20, 33) na koa hoe ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: anjely roa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (19.1). Ampit Heb 13.2.'
      marker-yv: yv-n
    - type: text
      text: ' nijoro nanandrify azy. Raha nahita ireo izy, dia nihazakazaka avy teo an-dainy mba hitsena azy sady niankohoka teo anatrehany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary hoy ny TOMPO tamin’i Abrahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Betsaka ny fitarainana momba an’i Sôdôma sy i Gômôra; ary mavesatra loatra ny fahotany. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Koa voatery hidina Aho mba hijery raha toa ka araka ny fitarainana tonga any amiko tokoa no nataony. Ho fantatro raha nanao izany rehetra izany izy na tsia.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny roa tamin’ireo lehilahy vahiny dia niainga ka nankany Sôdôma, fa ny TOMPO kosa mbola nijanona niaraka tamin’i Abrahama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fa ny Tompo kosa mbola nijanona niaraka tamin’i Abrahama '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'nijanona nijoro teo anatrehan’i Abrahama:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' rijan-teny naverina amin’ny laoniny. Ireo mpandika soratra jiosy manko dia milaza fa nahitsin’ireo ny TM, angamba mba tsy hanafintohina. Ka toy izao no tokony hamakiana azy hoy izy ireo: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Fa i Abrahama kosa mbola nijanona nijoro teo anatrehan’ny Tompo.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Koa nanatona i Abrahama sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Dia haringanao tokoa miaraka amin’ny meloka ve ny marina? '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Angamba mety hisy olo-marina dimampolo ao Sôdôma. Koa haringanao ve io tanàna io? Moa tsy havelanao heloka ve izy noho ireo olo-marina dimampolo ao aminy? '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tsia, sanatria aminao ny hanao izany! Raha hovonoinao miaraka amin’ny meloka ny marina, dia hitovy ny marina sy ny meloka. Sanatria Anao izany! Ianao Izay mpitsara ny tany tontolo ve no tsy hitandro ny rariny.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia namaly ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha mahita olo-marina dimampolo ao Sôdôma Aho, dia havelako heloka ny tanàna manontolo noho ny amin’ireo.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa hoy indray i Abrahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Miangavy re, Tompo ô, fa mbola sahy hiteny aminao ihany aho, na dia vovoka sy lavenona aza. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Angamba tsy ampy dimampolo ny olo-marina fa latsaka dimy, dia horavanao ve ny tanàna manontolo noho ny amin’ny dimy?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka namaly ny Tompo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy handrava ny tanàna Aho, raha mahita olo-marina dimy amby efapolo ao!
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Mbola niteny taminy indray i Abrahama hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Angamba tsy hahitana afa-tsy efapolo ao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’ny Tompo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy handrava ny tanàna Aho noho ny amin’ny olo-marina efapolo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ka ny anankiray tamin’ireo no nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tompoko, raha mba mahita fitia eo imasonao aho, dia aza lalovana fotsiny. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa niteny indray i Abrahama hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka tsy ho sosotra Ianao, Tompo ô, raha mbola hiteny aho. Angamba tsy hahitana afa-tsy telopolo ao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’ny Tompo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy handrava ny tanàna Aho, raha mahita olo-marina telopolo ao.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia hoy ihany i Abrahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miangavy re, Tompo ô, fa mbola sahy hiteny aminao ihany aho; angamba tsy hahitana afa-tsy roapolo ao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novalian’ny Tompo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy handrava ny tanàna Aho noho ny amin’ny olo-marina roapolo.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ka hoy indray i Abrahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miangavy re, Tompo ô, aoka tsy ho tezitra Ianao fa hiteny farany aho. Angamba tsy hahitana afa-tsy folo ao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary novalian’ny Tompo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy handrava ny tanàna Aho noho ny amin’ireo folo.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Rehefa nahavita ny resaka nataony tamin’i Abrahama ny TOMPO, dia lasa; fa i Abrahama kosa niverina any amin’ny fonenany.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa aoka hakana rano kely hanasanareo tongotra, ka hiala sasatra eto am-pototr’ity hazo ity ianareo. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izaho kosa handroso sakafo hohaninareo mba hampody hery anareo; avy eo vao hanohy ny dianareo ianareo, satria efa nandalo teto amiko tokoa.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly izy telo lahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tanteraho araka izay nambaranao àry.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa niverina faingana ho any an-day i Abrahama hilaza amin’i Sarà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Haingàna maka lafarinina tsara indrindra intelon’ny famarana ka manendasa mofo.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Avy teo i Abrahama dia nihazakazaka nankany amin’ny andian’ombiny ary naka zanak’omby matavy tsara ka nomeny ny mpanompony mba hamboariny haingana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nalainy ny dibera sy ronono ary ny zanak’omby efa voavoatra ka narosony tamin’ireo vahiny. Dia nihinana ireo fa i Abrahama kosa nitsangana teo akaikiny teo am-pototry ny hazo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nanontany izy telo lahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza i Sarà vadinao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny navaliny azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro ao an-day izy.
