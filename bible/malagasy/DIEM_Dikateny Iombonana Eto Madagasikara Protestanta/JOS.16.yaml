document_id: JOS.16,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zaratanin’i Efraîma sy i Manase
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no zaratany navoakan’ny antsapaka ho an’ny taranak’i Jôsefa. Ny sisiny atsimo dia manomboka hatreo Jôrdàna akaikin’i Jerikao, eo atsinanan’ny loharanon’ny tanàna. Avy eo Jerikao dia mihazo ilay taniefitra miakatra ho any amin’ny tendrombohitr’i Betela. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary ny taranak’i Efraîma dia tsy nandroaka ny Kanahanita izay nonina tao Gezera. Koa mbola miara-monina aminy ihany ireny kanahanita ireny mandraka androany, ary nampanaoviny asa fanompoana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia mankany Lozy, mandalo an’i Hatarôta izay sisin-tanin’ny Arkita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Arkita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tokony ho mponina Kanahanita toy ny Jafletita eo amin’ny and 3.'
      marker-yv: yv-n
    - type: text
      text: ', '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'midina miankandrefana ho any amin’ny sisin-tanin’ny Jafletita, mandalo an’i Bety-Hôrôna ambany sy i Gezera, ary mipaka amin’ny Ranomasina Mediteranea. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ireo taranak’i Jôsefa, izany hoe ny fokon-dry i Manase sy i Efraîma, no nandova izany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Izao kosa no velaran-tanin’ny Efraîmita ho an’ireo tarika ao anatiny: ny sisiny atsimo dia manomboka hatreo Hatarôta-Adara any atsinanana, tonga hatrany Bety-Hôrôna ambony '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary mipaka amin’ny Ranomasina Mediteranea. Ny sisin-tany tendrony avaratra kosa dia eo Mikmetata. Eo atsinanan’i Mikmetata dia mihodina mankany Taanata-Silao ary mizotra miantsinanana ho any Janôhà; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'avy eo dia midina ho any Hatarôta sy Naharà, dia mihazo an’i Jerikao ary mipaka any Jôrdàna. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Eo andrefan’i Mikmetata kosa dia mihodina mankany Tapoa, manaraka ny reniranon’i Kanà, ary mipaka amin’ny Ranomasina Mediteranea. Izany no zaratany nomena ireo tarika ao anatin’ny fokon’i Efraîma, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'miampy ireo tanàna sy zana-bohitra notsongaina teo anivon’ny zara tanin’ny fokon’i Manase. '
