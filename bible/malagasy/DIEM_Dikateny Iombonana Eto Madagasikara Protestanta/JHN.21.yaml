document_id: JHN.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisehoan’i Jesoa amin’ny mpianatra folo lahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany, dia niseho tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' indray i Jesoa teo amoron’ny farihin’i Tiberiada, ary toy izao no nisehoany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tafaraka i Simôna Petera, sy i Tômà ilay atao hoe Ikambana, ary i Natanaela ilay avy any Kanà any Galilea, mbamin’ireo zanakalahin’i Zebedeo sy mpianatra roa lahy hafa koa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy i Simôna Petera tamin’izy enin-dahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndeha hanarato aho!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ireo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndeha hiaraka aminao koa izahay.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niainga izy rehetra ka niditra tao an-tsambokely, saingy tamin’iny alina iny dia tsy nahazo na inona na inona akory. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nony efa nazava ratsy ny andro, dia nijoro teo amorom-parihy i Jesoa, kanefa tsy fantatry ny mpianatra hoe i Jesoa Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manan-javatra hohanina ve ianareo, rey anaka?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Alatsaho ao ankavanan’ny sambokely ny haratonareo, fa hahazo ianareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nalatsak’izy fito lahy ny harato, ka tsy zakany nakarina noho ny habetsahan’ny trondro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lk 5.4-7 sy ny and 3 sy 6 etoana.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ilay mpianatra tian’i Jesoa tamin’i Petera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny Tompo io!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Vao ren’i Simôna Petera fa hoy ny Tompo io, dia niakanjoany ny akanjo ivelany fa efa nesoriny, ka lasa izy nirotsaka tao anaty rano. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny mpianatra sasany kosa nandeha an-tsambokely ihany nisarika ny harato feno trondro; tsy lavitra ny tany manko izy ireo, fa tokony ho zato metatra eo ho eo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa tafakatra teo an-tanety izy fito lahy, dia nahita afon’arina teo sy trondro teo amboniny ary mofo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Itondray trondro amin’ireo vao azonareo teo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niakatra tao an-tsambokely i Simôna Petera, ka nisarika ho eo an-tanety ny harato feno trondro vaventy 153; kanefa na dia betsaka tahaka izany aza ny trondro, dia tsy triatra ny harato. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Jesoa tamin’izy fito lahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia hisakafo!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny mpianatra izany tsy nisy na iray aza sahy nanontany Azy hoe: «Iza moa Ianao?», satria fantany ihany fa ny Tompo io. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nanatona i Jesoa dia nandray ny mofo ka natolony azy ireo; ary nataony toy izany koa ny trondro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izany no fisehoan’i Jesoa fanintelony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fanintelony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 20.19, 26.
    marker-yv: yv-n
  - type: text
    text: ' tamin’ny mpianany, fony Izy tafatsangana velona avy any amin’ny maty.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anankinan’i Jesoa andraikitra i Petera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa avy nisakafo ireo mpianatra, dia hoy i Jesoa tamin’i Simôna Petera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Simôna zanakalahin’i Jôhany, moa tia Ahy mihoatra noho ny itiavan’ireto Ahy ve ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, ry Tompo, fantatrao fa tiako Ianao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fahano ireo zanakondriko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy indray i Jesoa tamin’i Petera fanindroany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Simôna zanakalahin’i Jôhany, moa tia Ahy ve ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, ry Tompo, fantatrao fa tiako Ianao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka ianao ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ondriko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 20.28; 1Pt 5.2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy indray i Jesoa tamin’i Petera fanintelony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Simôna zanakalahin’i Jôhany, moa tia Ahy ve ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nalahelo i Petera fa nataon’i Jesoa fanintelony hoe: «Moa tia Ahy ve ianao?», ka hoy ny navaliny Azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao, ry Tompo, no mahalala ny zavatra rehetra, ka fantatrao fa tiako Ianao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fahano ireo ondriko. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lazaiko marina dia marina aminao fa fony mbola tanora ianao, dia nahasikin-tena sy nandeha tamin’izay tianao haleha; fa rehefa antitra kosa ianao, dia hatsotranao ny tananao, ka olon-kafa no hanikina anao sy hitondra anao amin’izay tsy tianao haleha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '(Izany voalazan’i Jesoa izany, dia manambara ny karazam-pahafatesana hanomezan’i Petera voninahitra an’Andriamanitra). Avy nilaza izany i Jesoa, dia nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia hiaraka amiko!
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny amin’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' tian’i Jesoa'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nitodika i Petera ka hitany manaraka azy ireo ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' tian’i Jesoa, ilay mpianatra izay nirona teo amin’ny tratran’i Jesoa tamin’ny fisakafoana ka nanontany Azy hoe: «Tompo ô, iza moa ilay efa hanolotra Anao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 13.25.
    marker-yv: yv-n
  - type: text
    text: '?» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa nahita an’ilay mpianatra i Petera, dia niteny tamin’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ary izy io, ry Tompo, mba inona no ho anjarany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy i Jesoa tamin’i Petera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha tiako haharitra mandra-piaviko izy, ahoanao izany? Fa ianao, avia hiaraka amiko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Noho izany teny izany, dia niely tamin’ireo havana mpino fa hoe tsy ho faty io mpianatra io; kanefa i Jesoa tsy niteny tamin’i Petera hoe: «Tsy ho faty izy», fa hoe «Raha tiako haharitra mandra-piaviko izy, ahoanao izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ahoanao izany?: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: misy stf sasany tsy ahitana ireo teny ireo.
    marker-yv: yv-n
  - type: text
    text: ?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Io mpianatra io no vavolombelona manambara izany zavatra izany sy nanoratra azy; ary fantatray fa azo antoka ny fijoroany ho vavolombelona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 19.35.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famaranana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Misy zavatra maro hafa koa izay nataon’i Jesoa; ka raha izany no voasoratra tsirairay, dia ataoko fa na izao tontolo izao aza dia tsy ho omby ny boky voasoratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 20.30.
    marker-yv: yv-n
  - type: text
    text: .
