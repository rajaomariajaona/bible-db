document_id: JHN.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisehoan’i Jesoa amin’ny mpianatra folo lahy
  - type: text
    content: 'Tamin’izany, dia niseho tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ' indray i Jesoa teo amoron’ny farihin’i Tiberiada, ary toy izao no nisehoany. '
  '10':
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: –Itondray trondro amin’ireo vao azonareo teo.
  '11':
  - type: text
    content: 'Dia niakatra tao an-tsambokely i Simôna Petera, ka nisarika ho eo an-tanety ny harato feno trondro vaventy 153; kanefa na dia betsaka tahaka izany aza ny trondro, dia tsy triatra ny harato. '
  '12':
  - type: text
    content: 'Ary hoy i Jesoa tamin’izy fito lahy:'
  - type: text
    content: –Avia hisakafo!
  - type: text
    content: 'Ny mpianatra izany tsy nisy na iray aza sahy nanontany Azy hoe: «Iza moa Ianao?», satria fantany ihany fa ny Tompo io. '
  '13':
  - type: text
    content: Ary nanatona i Jesoa dia nandray ny mofo ka natolony azy ireo; ary nataony toy izany koa ny trondro.
  '14':
  - type: text
    content: Izany no fisehoan’i Jesoa fanintelony
  - type: note
    content: 'fanintelony: jereo 20.19, 26.'
  - type: text
    content: ' tamin’ny mpianany, fony Izy tafatsangana velona avy any amin’ny maty.'
  - type: heading
    content: Anankinan’i Jesoa andraikitra i Petera
  '15':
  - type: text
    content: 'Rehefa avy nisakafo ireo mpianatra, dia hoy i Jesoa tamin’i Simôna Petera:'
  - type: text
    content: –Ry Simôna zanakalahin’i Jôhany, moa tia Ahy mihoatra noho ny itiavan’ireto Ahy ve ianao?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Eny, ry Tompo, fantatrao fa tiako Ianao.
  - type: text
    content: 'Dia hoy Izy taminy:'
  - type: text
    content: –Fahano ireo zanakondriko.
  '16':
  - type: text
    content: 'Ary hoy indray i Jesoa tamin’i Petera fanindroany:'
  - type: text
    content: –Ry Simôna zanakalahin’i Jôhany, moa tia Ahy ve ianao?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Eny, ry Tompo, fantatrao fa tiako Ianao.
  - type: text
    content: 'Dia hoy Izy taminy:'
  - type: text
    content: '–Aoka ianao ho '
  - type: text
    content: mpiandry
  - type: text
    content: ' ireo '
  - type: text
    content: ondriko
  - type: note
    content: Ampit Asa 20.28; 1Pt 5.2.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Ary hoy indray i Jesoa tamin’i Petera fanintelony:'
  - type: text
    content: –Ry Simôna zanakalahin’i Jôhany, moa tia Ahy ve ianao?
  - type: text
    content: 'Dia nalahelo i Petera fa nataon’i Jesoa fanintelony hoe: «Moa tia Ahy ve ianao?», ka hoy ny navaliny Azy:'
  - type: text
    content: –Ianao, ry Tompo, no mahalala ny zavatra rehetra, ka fantatrao fa tiako Ianao.
  - type: text
    content: 'Dia hoy Izy taminy:'
  - type: text
    content: '–Fahano ireo ondriko. '
  '18':
  - type: text
    content: Lazaiko marina dia marina aminao fa fony mbola tanora ianao, dia nahasikin-tena sy nandeha tamin’izay tianao haleha; fa rehefa antitra kosa ianao, dia hatsotranao ny tananao, ka olon-kafa no hanikina anao sy hitondra anao amin’izay tsy tianao haleha.
  '19':
  - type: text
    content: '(Izany voalazan’i Jesoa izany, dia manambara ny karazam-pahafatesana hanomezan’i Petera voninahitra an’Andriamanitra). Avy nilaza izany i Jesoa, dia nanao taminy hoe:'
  - type: text
    content: –Avia hiaraka amiko!
  - type: heading
    content: Ny amin’ilay mpianatra tian’i Jesoa
  '2':
  - type: text
    content: 'Tafaraka i Simôna Petera, sy i Tômà ilay atao hoe Ikambana, ary i Natanaela ilay avy any Kanà any Galilea, mbamin’ireo zanakalahin’i Zebedeo sy mpianatra roa lahy hafa koa. '
  '20':
  - type: text
    content: 'Dia nitodika i Petera ka hitany manaraka azy ireo ilay '
  - type: text
    content: mpianatra
  - type: text
    content: ' tian’i Jesoa, ilay mpianatra izay nirona teo amin’ny tratran’i Jesoa tamin’ny fisakafoana ka nanontany Azy hoe: «Tompo ô, iza moa ilay efa hanolotra Anao'
  - type: note
    content: Jereo 13.25.
  - type: text
    content: '?» '
  '21':
  - type: text
    content: 'Rehefa nahita an’ilay mpianatra i Petera, dia niteny tamin’i Jesoa hoe:'
  - type: text
    content: –Ary izy io, ry Tompo, mba inona no ho anjarany?
  '22':
  - type: text
    content: 'Dia hoy i Jesoa tamin’i Petera:'
  - type: text
    content: –Raha tiako haharitra mandra-piaviko izy, ahoanao izany? Fa ianao, avia hiaraka amiko!
  '23':
  - type: text
    content: 'Noho izany teny izany, dia niely tamin’ireo havana mpino fa hoe tsy ho faty io mpianatra io; kanefa i Jesoa tsy niteny tamin’i Petera hoe: «Tsy ho faty izy», fa hoe «Raha tiako haharitra mandra-piaviko izy, ahoanao izany'
  - type: note
    content: 'ahoanao izany?: misy stf sasany tsy ahitana ireo teny ireo.'
  - type: text
    content: ?»
  '24':
  - type: text
    content: Io mpianatra io no vavolombelona manambara izany zavatra izany sy nanoratra azy; ary fantatray fa azo antoka ny fijoroany ho vavolombelona
  - type: note
    content: Ampit 19.35.
  - type: text
    content: .
  - type: heading
    content: Famaranana
  '25':
  - type: text
    content: Misy zavatra maro hafa koa izay nataon’i Jesoa; ka raha izany no voasoratra tsirairay, dia ataoko fa na izao tontolo izao aza dia tsy ho omby ny boky voasoratra
  - type: note
    content: Ampit 20.30.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Fa hoy i Simôna Petera tamin’izy enin-dahy:'
  - type: text
    content: –Ndeha hanarato aho!
  - type: text
    content: 'Ka hoy ireo taminy:'
  - type: text
    content: –Ndeha hiaraka aminao koa izahay.
  - type: text
    content: 'Dia niainga izy rehetra ka niditra tao an-tsambokely, saingy tamin’iny alina iny dia tsy nahazo na inona na inona akory. '
  '4':
  - type: text
    content: 'Ary nony efa nazava ratsy ny andro, dia nijoro teo amorom-parihy i Jesoa, kanefa tsy fantatry ny mpianatra hoe i Jesoa Izy. '
  '5':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Manan-javatra hohanina ve ianareo, rey anaka?
  - type: text
    content: 'Ka novalian’ireo hoe:'
  - type: text
    content: –Tsia!
  '6':
  - type: text
    content: 'Ary hoy Izy taminy:'
  - type: text
    content: –Alatsaho ao ankavanan’ny sambokely ny haratonareo, fa hahazo ianareo.
  - type: text
    content: Dia nalatsak’izy fito lahy ny harato, ka tsy zakany nakarina noho ny habetsahan’ny trondro
  - type: note
    content: Ampit Lk 5.4-7 sy ny and 3 sy 6 etoana.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ary hoy ilay mpianatra tian’i Jesoa tamin’i Petera:'
  - type: text
    content: –Ny Tompo io!
  - type: text
    content: 'Vao ren’i Simôna Petera fa hoy ny Tompo io, dia niakanjoany ny akanjo ivelany fa efa nesoriny, ka lasa izy nirotsaka tao anaty rano. '
  '8':
  - type: text
    content: 'Fa ny mpianatra sasany kosa nandeha an-tsambokely ihany nisarika ny harato feno trondro; tsy lavitra ny tany manko izy ireo, fa tokony ho zato metatra eo ho eo. '
  '9':
  - type: text
    content: 'Rehefa tafakatra teo an-tanety izy fito lahy, dia nahita afon’arina teo sy trondro teo amboniny ary mofo. '
