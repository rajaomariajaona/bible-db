document_id: 1SA.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voaroba i Tsiklaga. I Davida manenjika ny Hamalekita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny afakampitso, rehefa tonga tany Tsiklaga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsiklaga: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 27.6 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Davida sy ny olony, dia notafihin’ny Hamalekita ny atsimon’i Joda sy i Tsiklaga, noravan’izy ireo sy nodorany ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nobaboin’izy ireo ny vehivavy mbamin’izay rehetra tao an-tanàna na kely na lehibe, nefa tsy nisy novonoiny na iray aza, fa nentiny avokoa ary dia notohiziny ny diany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa tonga i Davida sy ny olony, dia nahita fa nisy nandoro ny tanàna, ary nisy nitondra ireo vadiny mbamin’ny zanany lahy sy ny zanany vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanala ny fony nitomany i Davida sy ireo mpanaraka azy mandra-pahatankin’ny ranomasony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voasambotra koa ireo vadin’i Davida roa, dia Ahinôhama avy any Jizrehèla sy i Abigaîla vadin’i Nabala avy any Karmela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mafy ny fahoriam-panahy nahazo an’i Davida, fa niara-nioko hitora-bato azy ny olona satria samy nalahelo mafy izy ireo nieritreritra ny zanany lahy sy ny zanany vavy avy. Na izany aza dia nankahery tena i Davida, noho ny amin’ny TOMPO Andriamaniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ka hoy i Davida tamin’i Abiatara mpisorona sady zanakalahin’i Ahimeleka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 22.20.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ento atỳ amiko ny efôda fanontaniana ny Tompo, azafady.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nentin’i Abiatara teo amin’i Davida ny efôda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nanontany tamin’ny TOMPO i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha henjehiko ve ireny tontakely ireny, dia mety ho azoko?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny navalin’ny TOMPO azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Enjeho izy ireo fa ho azonao, ary dia hoafahanao ireo babo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia niainga i Davida sy ny namany eninjato lahy. Rehefa tonga teo amin’ny riakan’i Besôra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ranon-driakan’i Besôra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tokony ho 35 km ao atsimo atsinanan’i Tsiklaga no andalovany ary lasa mivarina any amin’ny Ranomasina Mediteranea.'
    marker-yv: yv-n
  - type: text
    text: ' izy ireo, dia nijanona ny roanjato lahy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'satria reraka loatra ka tsy afa-niampita; fa i Davida sy ny efajato lahy no nanohy ny fanenjehana ireo Hamalekita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Teny an-tsaha teny ireo miaramila dia nahita tovolahy Ejiptianina ka nentiny tany amin’i Davida. Nomena mofo izy hohaniny, ary rano hosotroiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nomena didina mofomamin’aviavimbazaha sy sampahom-boaloboka maina roa. Rehefa avy nihinana ireo izy, dia nihanahazo hery, satria efa tsy nihinan-kanina nandritra ny telo andro sy telo alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nanontany azy i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –An’iza moa ianao, ary mba avy taiza?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tovolahy ejiptianina aho ary mpanompon’ny Hamalekita iray. Nilaozan’ny tompoko aho afak’omaly satria narary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Talohan’izao dia nanafika ny faritra atsimo amin’ny Keretita sy ny an’i Joda ary ny an’i Kalebita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kalebita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tarika iray ao anatin’ny fokon’i Joda.'
    marker-yv: yv-n
  - type: text
    text: ' izahay. Ary nodoranay ny tanànan’i Tsiklaga.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy i Davida taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Azonao entina any amin’izany andian-tontakely izany ve aho?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny navaliny azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha mianiana amiko eto anatrehan’Andriamanitra ianao fa tsy hahafaty ahy, na hanolotra ahy amin’ny tompoko, dia hitondra anao eo amin’izany andian-tontakely izany aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Resin’i Davida ny Hamalekita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nentin’ilay tovolahy ejiptianina tany amin’ny Hamalekita i Davida. Ary ny Hamalekita efa niparitaka nanerana ny faritany, ka nihinana sy nisotro ary nanao lanonana fa nahazo harem-be tany amin’ny tanin’ny Filistinina sy ny tanin’i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Namely azy ireo vao mangiran-dratsy i Davida mandra-paharivan’ny andro manaraka. Tsy nisy niangana na iray aza afa-tsy tovolahy efajato izay afa-nandositra nitaingin-drameva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avotr’i Davida avokoa izay rehetra lasan’ny Hamalekita. Navotany manokana ireo vadiny roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy nisy tsy azony na kely na lehibe hatramin’ny zazalahy sy ny zazavavy ary ny harem-be, dia izay rehetra nobaboin’ny fahavalo. Tafaverin’i Davida avokoa izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nalain’i Davida koa ny biby fiompy rehetra na kely na lehibe. Ary nandeha teo alohan’ireo biby ireo ny mpitarika azy ka niantsoantso hoe: «Itony no azon’i Davida!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary i Davida niverina tany amin’ny roanjato lahy izay efa reraka tsy afa-nanaraka azy ka nijanona teo amin’ny ranon-driakan’i Besôra. Niainga izy ireo hitsena an’i Davida sy ny mpanaraka azy. Dia nanatona azy ry Davida ka niarahaba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ireo ratsy fanahy sy faikan’olona tamin’izay nanaraka an’i Davida dia samy niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Satria tsy mba niaraka tamintsika ireo, dia tsy omentsika amin’ny babo izay azontsika afa-tsy ny vady aman-janak’izy ireo ihany; aoka hoentiny any ireo dia, avelao izy handeha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry rahalahy, aza mba manao izany amin’izay nomen’ny TOMPO antsika; Izy no niaro antsika sady nanolotra ho eo am-pelatanantsika ny andian-tontakely izay tonga namely antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa iza no hihaino anareo amin’izany hevitrareo izany? Tsia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: «fa mitovy ihany ny anjaran’izay nidina hiady
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy izay nijanona niandry entana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiarahan’ny roa tonta mizara ireo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nanomboka tamin’io andro io, dia nataon’i Davida lalàna sy fomba ho an’i Israely izany ary mbola arahina mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa tafaverina tany Tsiklaga i Davida, dia nandefasany anjara tamin’ny babo ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Joda sakaizany, ka nataony hoe: «Iny fanomezana ho anareo avy amin’ny babo azo tamin’ny fahavalon’ny TOMPO.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nandefasany koa ireo loholon’i Betela sy i Ramôta-Negeba ary i Jatira, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ireo loholon’i Harôhera, sy i Sifmôta ary i Estemôa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ireo loholon’i Rakala sy ny tanànan’ny Jerahimelita ary ny Kenita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ireo loholon’i Hôrmà sy i Bôra-Hasàna ary i Hatàka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ireo loholon’i Hebrôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny ankamaroan’ny toerana voatanisa ao amin’ny and 27-31 dia ao amin’ny tanin’i Joda. Ny fahalalahan-tanan’i Davida (and 26) no nahazoany tato afara ny fanohanan’ny vahoaka jodeanina izay voalohany nifidy azy ho mpanjaka, dia tao '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hebrôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany (jereo 2 Sam 2.1-4).'
    marker-yv: yv-n
  - type: text
    text: ' ary ireo izay any amin’ny toerana rehetra nodiavin’i Davida sy ny olony.'
