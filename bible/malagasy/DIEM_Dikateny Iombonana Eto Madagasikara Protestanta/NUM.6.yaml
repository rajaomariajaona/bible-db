      marker-yv: yv-n
    - type: text
      text: '; tsy hisotro vinaingitra natao tamin’ny divay na tamin’ny zava-pisotro misy alikaola izy; ary tsy hisotro rehefa mety ho ranom-boaloboka izy, na hihinana akory voaloboka lena na voaloboka maina. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Mandritra ny fotoana rehetra maha Nazirita azy dia tsy hihinan-javatra natao amin’ny voaloboka izy, eny, fa na dia ny voany mbamin’ny hodiny aza. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mandritra ny fotoana rehetra anaovany voady, dia tsy hihety volo na hiharatra izy; fa mandra-pahatapitry ny fotoana izay hitokanany tena ho an’ny TOMPO, dia ho masina izy ka hamela ny volon-dohany sy ny volom-bavany haniry
    - type: usfm
