  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Mandritra izany fotoana rehetra itokanany tena ho an’ny TOMPO izany koa, dia tsy mahazo manakaiky fatin’olona izy; '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'na dia ny fatin-drainy sy ny reniny ary ny mpiray tampo aminy aza, dia aoka tsy '
