    - type: text
      text: Lalàna ny amin’ny voady ho Nazirita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny andro manaraka kosa no hitondrany domohina roa na voromahailala roa eo amin’ny mpisorona, eo am-baravaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haterin’ny mpisorona ho sorona fanalana ny ota ny anankiray, ary ny anankiray kosa ho sorona dorana manontolo. Dia hataony amin’ilay olona ny fombam-pivavahana fanadiovana azy noho ny ota vokatr’ilay faty; amin’io andro io izy dia ho masina indray ka hamela ny lohany hitsiry volo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hamerina tanteraka indray ny fanokanan-tenany ho an’ny TOMPO izy, ka hitondra ondrilahy iray taona izy ho sorom-panonerana. Tsy hoisaina ireo andro teo aloha satria voaloto ny naha nazirita azy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izao no lalàna ny amin’ny nazirita, rehefa tapitra ny andro naha nazirita azy. Hoentina mankeo am-baravaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' izy '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hitondra sorona ho an’ny TOMPO, dia ondrilahikely iray taona tsy misy kilema ho sorona dorana manontolo sy ondrivavikely iray taona tsy misy kilema ho sorona fanalana ny ota, ary ondrilahy iray tsy misy kilema ho sorom-pihavanana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitondra mofo tsy misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviora
    - type: text
      text: ' iray harona koa izy, dia mofomamy nofetaina menaka sy mofo manify tsy misy leviora sady voahoso-menaka mbamin’ny fanatitra lafarinina sy divay ampombaina ny sorona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoentin’ny mpisorona eo anatrehan’ny TOMPO ireo fanatitra ireo, vao hatolony ny sorona fanalana ny ota sy ny sorona dorana manontolo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ondrilahy kosa dia hatolony amin’ny TOMPO ho sorom-pihavanana miaraka amin’ny mofo tsy misy leviora iray harona. Ary hatolony farany ny fanatitra lafarinina sy divay. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hanaratra ny lohany eo am-baravaran’ny Tranolay fihaonana ilay nanokan-tena; ary halainy izany volon-dohany izany ka hatsipiny ao anatin’ny afo izay mirehitra eo ambanin’ilay sorom-pihavanana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horaisin’ny mpisorony kosa ny sorok’ilay ondrilahy rehefa masaka, ary samy hakany iray avy ny mofomamy sy ny mofo manify tsy misy leviora ao anaty harona; ka hataony eo an-tanan’ilay nanokan-tena ireo, rehefa avy niharatra ny mariky ny naha nazirita azy izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hamepetra ny Israelita hoe:'
  - type: usfm
    marker: m
    children:
