          text: ' dia mampiseho ny maha mpanompon’Andriamanitra azy amin’ireto famantarana ivelany roa ireto: mifady ny zava-pisotro misy alikaola ary mifady ny fanapaham-bolo.'
      marker-yv: yv-n
    - type: text
      text: ' mba hanokan-tena ho an’ny TOMPO, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hasehon’ny mpisorona amin’ny TOMPO ireo sady hahevahevany ho fanolorana azy; zava-masina miverina amin’ny mpisorona ihany izany, fanampin’ny tratra nahevahevany sy ny fen’ondry navahany. Rehefa izany vao mahazo misotro divay indray ilay nazirita afa-boady.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Izany no lalàna ny amin’ny Nazirita izay nivoady; izany no fanomezana atolony ho an’ny TOMPO noho ny naha nazirita azy, ankoatra izay mety ho takatry ny fananany. Hanaraka ny voady notononiny izy amin’izany, ka hanao araka ny lalàna momba ny fanokanan-tena nirosoany
    - type: usfm
