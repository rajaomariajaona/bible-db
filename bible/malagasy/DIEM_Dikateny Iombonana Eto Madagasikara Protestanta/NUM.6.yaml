  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa hanonona ny anarako amin’ny Israelita toy izany ny mpisorona, dia hitahy azy tokoa Aho.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: dia hifady divay sy zava-pisotro misy alikaola izy
    - type: usfm
