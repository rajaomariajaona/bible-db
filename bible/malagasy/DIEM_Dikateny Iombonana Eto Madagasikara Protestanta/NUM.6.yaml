document_id: NUM.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Lalàna ny amin’ny voady ho Nazirita
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: 'Amin’ny andro manaraka kosa no hitondrany domohina roa na voromahailala roa eo amin’ny mpisorona, eo am-baravaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Haterin’ny mpisorona ho sorona fanalana ny ota ny anankiray, ary ny anankiray kosa ho sorona dorana manontolo. Dia hataony amin’ilay olona ny fombam-pivavahana fanadiovana azy noho ny ota vokatr’ilay faty; amin’io andro io izy dia ho masina indray ka hamela ny lohany hitsiry volo. '
  '12':
  - type: text
    content: Hamerina tanteraka indray ny fanokanan-tenany ho an’ny TOMPO izy, ka hitondra ondrilahy iray taona izy ho sorom-panonerana. Tsy hoisaina ireo andro teo aloha satria voaloto ny naha nazirita azy.
  '13':
  - type: text
    content: '«Izao no lalàna ny amin’ny nazirita, rehefa tapitra ny andro naha nazirita azy. Hoentina mankeo am-baravaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' izy '
  '14':
  - type: text
    content: 'ary hitondra sorona ho an’ny TOMPO, dia ondrilahikely iray taona tsy misy kilema ho sorona dorana manontolo sy ondrivavikely iray taona tsy misy kilema ho sorona fanalana ny ota, ary ondrilahy iray tsy misy kilema ho sorom-pihavanana. '
  '15':
  - type: text
    content: 'Hitondra mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ' iray harona koa izy, dia mofomamy nofetaina menaka sy mofo manify tsy misy leviora sady voahoso-menaka mbamin’ny fanatitra lafarinina sy divay ampombaina ny sorona. '
  '16':
  - type: text
    content: 'Hoentin’ny mpisorona eo anatrehan’ny TOMPO ireo fanatitra ireo, vao hatolony ny sorona fanalana ny ota sy ny sorona dorana manontolo. '
  '17':
  - type: text
    content: 'Ny ondrilahy kosa dia hatolony amin’ny TOMPO ho sorom-pihavanana miaraka amin’ny mofo tsy misy leviora iray harona. Ary hatolony farany ny fanatitra lafarinina sy divay. '
  '18':
  - type: text
    content: 'Dia hanaratra ny lohany eo am-baravaran’ny Tranolay fihaonana ilay nanokan-tena; ary halainy izany volon-dohany izany ka hatsipiny ao anatin’ny afo izay mirehitra eo ambanin’ilay sorom-pihavanana. '
  '19':
  - type: text
    content: 'Horaisin’ny mpisorony kosa ny sorok’ilay ondrilahy rehefa masaka, ary samy hakany iray avy ny mofomamy sy ny mofo manify tsy misy leviora ao anaty harona; ka hataony eo an-tanan’ilay nanokan-tena ireo, rehefa avy niharatra ny mariky ny naha nazirita azy izy. '
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: –Raha misy lehilahy na vehivavy mivoady ho Nazirita
  - type: note
    content: 'Ny Nazirita dia mampiseho ny maha mpanompon’Andriamanitra azy amin’ireto famantarana ivelany roa ireto: mifady ny zava-pisotro misy alikaola ary mifady ny fanapaham-bolo.'
  - type: text
    content: ' mba hanokan-tena ho an’ny TOMPO, '
  '20':
  - type: text
    content: Dia hasehon’ny mpisorona amin’ny TOMPO ireo sady hahevahevany ho fanolorana azy; zava-masina miverina amin’ny mpisorona ihany izany, fanampin’ny tratra nahevahevany sy ny fen’ondry navahany. Rehefa izany vao mahazo misotro divay indray ilay nazirita afa-boady.
  '21':
  - type: text
    content: «Izany no lalàna ny amin’ny Nazirita izay nivoady; izany no fanomezana atolony ho an’ny TOMPO noho ny naha nazirita azy, ankoatra izay mety ho takatry ny fananany. Hanaraka ny voady notononiny izy amin’izany, ka hanao araka ny lalàna momba ny fanokanan-tena nirosoany
  - type: note
    content: 'Jereo and 13-21: jereo Asa 18.18; 21.23-24.'
  - type: text
    content: .»
  - type: heading
    content: Teny fanao amin’ny tsodrano
  '22':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO mba hamepetra an’i Aharôna sy ny zanany hoe:'
  '23':
  - type: text
    content: '–Izao no teny hataonareo rehefa '
  - type: text
    content: mitsodrano
  - type: text
    content: ' ny Israelita ianareo:'
  '24':
  - type: text
    content: «Hitahy sy hiaro anareo anie ny TOMPO!
  '25':
  - type: text
    content: Hijery anareo amin-kamorampo anie ny TOMPO ka hiantra anareo!
  '26':
  - type: text
    content: Handray anareo amin-kazavampo anie ny TOMPO ka hanome anareo fiadanana!»
  '27':
  - type: text
    content: Rehefa hanonona ny anarako amin’ny Israelita toy izany ny mpisorona, dia hitahy azy tokoa Aho.
  '3':
  - type: text
    content: dia hifady divay sy zava-pisotro misy alikaola izy
  - type: note
    content: Jereo Lk 1.15.
  - type: text
    content: '; tsy hisotro vinaingitra natao tamin’ny divay na tamin’ny zava-pisotro misy alikaola izy; ary tsy hisotro rehefa mety ho ranom-boaloboka izy, na hihinana akory voaloboka lena na voaloboka maina. '
  '4':
  - type: text
    content: 'Mandritra ny fotoana rehetra maha Nazirita azy dia tsy hihinan-javatra natao amin’ny voaloboka izy, eny, fa na dia ny voany mbamin’ny hodiny aza. '
  '5':
  - type: text
    content: Mandritra ny fotoana rehetra anaovany voady, dia tsy hihety volo na hiharatra izy; fa mandra-pahatapitry ny fotoana izay hitokanany tena ho an’ny TOMPO, dia ho masina izy ka hamela ny volon-dohany sy ny volom-bavany haniry
  - type: note
    content: Jereo Mpits 13.5; 16.17; 1 Sam 1.11.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Mandritra izany fotoana rehetra itokanany tena ho an’ny TOMPO izany koa, dia tsy mahazo manakaiky fatin’olona izy; '
  '7':
  - type: text
    content: 'na dia ny fatin-drainy sy ny reniny ary ny mpiray tampo aminy aza, dia aoka tsy '
  - type: text
    content: hahaloto
  - type: text
    content: ' azy satria efa entiny eo an-dohany ny marika maha voatokana ny tenany ho an’Andriamanitra!'
  '8':
  - type: text
    content: '«Mandritra ny fotoana rehetra anaovany voady dia ho masina ho an’ny TOMPO izy. '
  '9':
  - type: text
    content: 'Raha misy olona maty tampoka eo anilany ka mahaloto ny fanokanan-tenany, dia hanaratra ny lohany amin’ny andro fidiovany izy, izany hoe afaka herinandro. '
