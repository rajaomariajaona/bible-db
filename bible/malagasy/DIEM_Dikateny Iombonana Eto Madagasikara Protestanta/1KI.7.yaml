- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ireo kojakoja rehetra, izay nataon’i Hirama araka ny baikon’i Salômôna mpanjaka mba ho an’ny tranon’ny TOMPO, dia vita tamin’ny halimo mamiratra avokoa. '
  - type: usfm
