document_id: 1KI.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanorenana ny lapan’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanorina lapa ho azy koa i Salômôna; 13 taona no nilainy namitana ny asa rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Naorina aloha ilay trano nantsoina hoe «Ny Alan’i Libano», izay nirefy dimampolo metatra ny lavany, 25 metatra ny sakany ary 15 metatra ny haavony. Io trano io dia naorina tambonin’ny andry efatra miandalana vita tamin’ny vatan-kazo sedera notaingenana rairainy sedera. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny valin-tafo, izay hazo sedera koa, dia mipetraka eo ambony rairainy 45, izany hoe andalana telo misy rairainy 15 avy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Isaky ny lafin-trano dia nisy andalam-baravarankely telo nifanandrify intelo miantoana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny varavarana rehetra mbamin’ny tolàny dia mahitsizoro avokoa, ary dia nifanandrify ihany koa ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia natao koa ny «Efitra maro andry» izay mirefy 25 metatra ny lavany ary 15 metatra ny sakany. Izany no natao lalantsara fidirana niaraka tamin’ny andry sy ny tatao fialofana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tatao fialofana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: io no miaro ny fidirana raha sendra andro ratsy.
    marker-yv: yv-n
  - type: text
    text: ' izay teo anoloan’ny «Ny Alan’i Libano».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Natao koa ny «Efitry ny sezafiandrianana», izay nantsoina koa hoe «Efitra Fitsarana»; teo no namoahan’i Salômôna ny didim-pitsarany; ary norakofana hazo sedera hatreo ambany ka hatrany ambony izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 3.1.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny trano izay nitoeran’i Salômôna dia tany amin’ny kianja hafa anatiny kokoa noho ny «Efitra Fitsarana», nefa dia nitovy rafitra tamin’ny trano «Alan’i Libano» ihany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Farany, ny trano ho an’ny zanakavavin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', izay nampakarin’i Salômôna ho vady, dia natao tahaka ny nanaovana ny lalantsaran’ny «Ny Alan’i Libano».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ireo trano rehetra ireo dia natao tamin’ny vato voafantina tsara avokoa izay nanana ny refin’ny vato voapaika; sady voatsofa ny lafiny hita maso amin’ny tavan-drindrina atiny sy ivelany. Hatreo am-poto-trano ka hatrany an-tampony no nampiasana ireo vato ireo ary koa hatramin’ny tamboho ivelany manodidina ny kianja lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny fototra rahateo dia natao tamin’ny vato tsara sady be velarana izay mirefy efatra sy dimy metatra ny halavany; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'teo ambonin’izany no nametrahana ny vato voapaika sy ny vatan-kazo sedera. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary manodidina ny kianja lehibe dia nisy tamboho natao vato voapaika telo andalana mifanongoa sy rairainy sedera iray andalana, tahaka ny tamin’ny kianja anatin’ny tranon’ny TOMPO sy tamin’ny lalantsara fidirana mankao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny asa nankinina tamin’i Hirama
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 2.12-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: Tany Tiro dia nisy lehilahy nantsoina hoe Hirama izay mpiasa havanana momba ny halimo. Lehilahy tirianina ny rainy ary vehivavy mpitondratena avy amin’ny fokon’i Naftalỳ ny reniny. Io Hirama io dia tena kinga sy mahira-tsaina ary mahay tsara ny fanaovana ny asa isan-karazany momba ny halimo. Izany no nampiantsoan’i Salômôna mpanjaka azy avy any Tiro mba hanao ny asa rehetra ilany azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andry halimo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 3.15-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nanao andry halimo roa i Hirama, ka sivy metatra ny haavony ary enina metatra ny manodidina azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo Jer 52.21 izay milaza marina ny hatevin’ny andry (holoka): valo santimetatra.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nanao koronosy roa koa izy hapetraka eo an-tampon’ny andry, ary izany dia halimo narendrika mirefy roa metatra sy sasany avy ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia mbola nohaingoiny sarina harato sy karazana mason-drojo ny koronosy teo an-tampon’ny andry tsirairay, ka nisy fito isaky ny koronosy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nohaingoiny sarin’ampongabendanitra nisy andalana roa koa teo amin’ny harato mandrakotra ny koronosy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary teo an-tampon’ny andry tsirairay dia nisy koronosy faharoa mirefy roa metatra ny haavony sady miendrika voninkazo lisy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Teo ambonin’ireo koronosy ireo dia nisy faritra mivohitra izay any an-koatry ny harato sy ny ampongabendanitra roanjato mitandahatra manodidina ny koronosy tsirairay. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia natsangana teo anoloan’ny lalantsara mankao amin’ny Toeramasina ireo andry roa; ka ny anaran’ilay teo ankavanana dia Jakîna, izany hoe «Andriamanitra mampiorina mafy», ary ny anaran’ilay teo ankavia dia Bôhaza, izany hoe «Ao amin’Andriamanitra ny hery». '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny RM eto dia mamerina ny ampahan’ny and 19 manao hoe: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ary teo an-tampon’ny andry tsirairay dia nisy koronosy miendrika lisy.
    marker-yv: yv-n
  - type: text
    text: Toy izany no nahavitan’i Hirama ny fanaovana ny andry.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitobian-drano goavana halimo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 4.2-5)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nanao ilay fitobian-drano goavana boribory i Hirama; halimo voaempo no nanefeny azy, ka nirefy dimy metatra ny savaivony, roa metatra sy sasany ny haavony ary 15 metatra ny morony manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tambanin’ny molotr’ilay fitobian-drano goavana, tamin’ny manodidina azy manontolo, dia nisy sarim-boatango folo isaky ny antsasa-metatra; roa andalana nifanongoa ireo ary niara-narendrika tamin’ilay fitobian-drano. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tambony sarin’ombilahy halimo 12 no nametrahana ilay fitobian-drano; ka ny telo nitodika nianavaratra, ny telo nitodika niankandrefana, ny telo nitodika nianatsimo ary ny telo nitodika niantsinanana. Eny, ilay fitobian-drano goavana dia teo ambonin’ireo sarin’ombilahy izay nifampiamboho ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny hateviny dia valo santimetatra, ary ny molony dia natao tahaka ny molo-tsangambava ka miendrika felana lisy. Niaty 90 000 litatra eo ho eo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Io tahirin-drano io dia natao hanasana ireo biby hatao sorona (jereo Lev 1.9), sy ho fidiovana litorjika ho an’ny olona (jereo Lev 16.22-24).
    marker-yv: yv-n
  - type: text
    text: ' izany fitobian-drano goavana izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny kalesy halimo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia nanao kalesy halimo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ireto '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kalesy halimo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ireto dia natao hitondrana ny kovetabe fasian-drano izay azo nafindrafindra teo an-kianjan’ny tempoly araka izay mety nilana azy. Jereo 7.38-39a.'
    marker-yv: yv-n
  - type: text
    text: ' folo i Hirama; efamira avy izy ireo ka nirefy roa metatra ny lafiny ary iray metatra sy sasany ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Toy izao no nanaovana ireo kalesy ireo: takelaka halimo matevina ny tanja-drafitra; takelaka halimo kosa no napetaka tanelanelan’ny tanja-drafitra, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'sady noravahana sarina liona sy ombilahy ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: '; dia voaravaka tahaka izany koa ny tanja-drafitra ambony, ary teo ambanin’ny sarina liona sy ombilahy dia nisy karazana fesitaonina mihantona. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny kalesy tsirairay dia nanana kodiarana efatra halimo izay samy nihodina tamin’ny lahin-tangerina halimo. Ireo lahin-tangerina ireo kosa dia naraikitra tamina karazana faladiany teo amin’ny zoro efatra. Ireo faladia ireo dia voarendrika niaraka amin’ny tanja-drafitra, kanefa tsy nihoatra ny fesitaonina. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tamin’ny faritra ambonin’ny kalesy dia nisy vavany boribory mitovona dimampolo santimetatra izay natao handraisana kovetabe; io vavany io dia mirefy 75 santimetatra ny savaivony. Ny faritra mihoatra ny tanja-drafitra dia efamira fa tsy boribory, ary voaravaka sary sokitra amin’ny takelaka halimo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny kodiarana efatra dia tao ambanin’ny tanja-drafitra; ary ny lahin-tangerina dia niraikitra tamin’ny tanjan-kalesy. Nirefy 75 santimetatra ny savaivon’ny kodiarana; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'tahaka ny kodiaran-kalesy ihany no nanaovana azy: na ny atikodiarana na ny sisiny na ny tanany na ny foibeny dia samy halimo voarendrika avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ireo faladia efatra, teo amin’ny zoro efatry ny kalesy, dia nitambatra tamin’ny kalesy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny tampon’ny kalesy tsirairay dia voaravaka fehy boribory nirefy 25 santimetatra ny sakany ary nanodidina ny molony. Teo amin’izany tampony izany koa dia nisy fihazonana izay nitambatra tamin’ny tanja-drafitry ny kalesy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Teo amin’io faritra marin-tampona io, ny toerana tsy mbola voaravaka fihazonana dia nosokirina sarina kerobima sy liona ary hazo rofia; ary nasiana fesitaonina ny manodidina. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tahaka izany no nanaovana ny kalesy folo; samy metaly iray ihany, samy mitovy refy ary samy mitovy endrika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary nanao kovetabe halimo folo fasian-drano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 30.17-21.
    marker-yv: yv-n
  - type: text
    text: ' i Hirama, dia kovetabe hapetraka eo amin’ny kalesy folo. Ny kovetabe tsirairay dia nirefy roa metatra ny haavony ary niaty 1 600 litatra eo ho eo. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Nametraka kalesy dimy teo amin’ny ila ankavanan’ny tempoly izy, ary dimy hafa teo amin’ny ila ankavia. Ny fitobian-drano goavana dia napetrany teo amin’ny ila ankavanan’ny tempoly, akaikin’ny zoro atsimo atsinanana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lisitra fitanisana mitambatra ireo fitaovana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 4.7–5.1)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Rehefa vitan’i Hirama ny kovetabe sy ny lapelina ary ny tsatokaty famafazana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 27.3.
    marker-yv: yv-n
  - type: text
    text: ', dia efany avokoa izay tokony ho nataony ho an’i Salômôna mpanjaka tao amin’ny tranon’ny TOMPO, dia ireto avy:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ny andry anankiroa sy ny koronosy boribory roa teo an-tampony;
- type: usfm
  marker: p
  children:
  - type: text
    text: ny karazana harato roa nafono ny koronosy boribory teo an-tampon’ny andry;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
