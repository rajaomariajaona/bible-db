  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Nampanaovin’i Salômôna koa ny kojakoja volamena rehetra izay nilaina tao amin’ny tranon’ny TOMPO:'
