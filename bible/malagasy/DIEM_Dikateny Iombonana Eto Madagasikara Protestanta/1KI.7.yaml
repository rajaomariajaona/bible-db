    - type: usfm
      marker: ft
      children:
      - type: text
        text: Toerana eo amorony atsinanan’i Jôrdàna, sahabo ho 60 km avaratra atsinanan’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' no nasain’ny mpanjaka narendrika tao anaty tanimanga ireny. '
  - type: usfm
    marker: v
