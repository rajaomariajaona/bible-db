  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Dia napetrak’i Salômôna tao an-tranon’ny Tompo ireo kojakoja ireo, nefa marobe loatra ka tsy nolanjainy hahitany izay lanjan’ny halimo nampiasaina.
