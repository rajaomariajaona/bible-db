document_id: MRK.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sitranin’i Jesoa ilay lehilahy maty tanana anila
  - type: heading
    content: (Jereo Mt 12.9-21; Lk 6.6-11)
  - type: text
    content: 'Niditra tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' indray i Jesoa ary nisy lehilahy maty tanana anila tao. '
  '10':
  - type: text
    content: 'Fa maro tokoa ny olona nositraniny, ka nifanesika mba hikasika Azy izay rehetra nanana aretina. '
  '11':
  - type: text
    content: 'Ary ireo '
  - type: text
    content: fanahy maloto
  - type: text
    content: ', isaky ny mahita an’i Jesoa, dia niankohoka teo anatrehany sady niantsoantso hoe:'
  - type: text
    content: '–Ianao no ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: '!'
  '12':
  - type: text
    content: 'Fa i Jesoa niteny mafy azy ireo hoe:'
  - type: text
    content: –Aza manao izay hahafantarana Ahy!
  - type: heading
    content: Ireo apôstôly 12 lahy
  - type: heading
    content: (Jereo Mt 10.1-4; Lk 6.12-16)
  '13':
  - type: text
    content: 'Ary niakatra teo an-tendrombohitra i Jesoa, ka niantso izay tiany hantsoina; ary niala teo amin’ny vahoaka ireo ka nanatona Azy. '
  '14':
  - type: text
    content: 'Ary nanendry 12 lahy izay nomeny anarana hoe '
  - type: text
    content: apôstôly
  - type: text
    content: ' Izy, mba hiaraka aminy sy hirahiny hitoriteny '
  '15':
  - type: text
    content: 'ka hanam-pahefana handroaka ny '
  - type: text
    content: demony
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ireto no voatendriny ho isan’ny 12 lahy: i Simôna izay nampian’i Jesoa anarana hoe Petera'
  - type: note
    content: 'Petera: na hoe Vato. Ampit Mt 16.16-18; Jôh 1.42.'
  - type: text
    content: '; '
  '17':
  - type: text
    content: i Jakôba sy i Jôhany mirahalahy zanak’i Zebedeo ary nampian’i Jesoa anarana hoe Boanerjesy, izany hoe olona mahery setra tahaka ny varatra
  - type: note
    content: Ampit Lk 9.54.
  - type: text
    content: '; '
  '18':
  - type: text
    content: 'i Andrea, i Filipo, i Bartôlômeo, i Matio, i Tômà, i Jakôba zanak’i Halfeo, i Tadeo, i Simôna '
  - type: text
    content: Kananeanina
  - type: text
    content: ', '
  '19':
  - type: text
    content: 'ary i Jodasy '
  - type: text
    content: Iskariôta
  - type: text
    content: ' ilay nanolotra an’i Jesoa.'
  - type: heading
    content: Heverina ho adala i Jesoa
  '2':
  - type: text
    content: 'Dia nizaha taratra an’i Jesoa ny olona raha hanasitrana an’io marary io amin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' Izy, mba hahazoany miampanga Azy. '
  '20':
  - type: text
    content: 'Dia niverina tao an-trano i Jesoa; ary vory maro teo indray ny vahoaka, hany ka tsy afaka nisakafo Izy sy ny '
  - type: text
    content: mpianany
  - type: text
    content: '. '
  '21':
  - type: text
    content: Ren’ny fianakavian’i Jesoa izany ka niainga ireo mba haka Azy an-keriny satria hoe
  - type: note
    content: 'satria hoe: dkt hafa satria nolazain’ireo hoe.'
  - type: text
    content: lasa adala Izy.
  - type: heading
    content: Ny avalin’i Jesoa ny fiampangana natao taminy
  - type: heading
    content: (Jereo Mt 12.22-32; Lk 11.14-23; 12.10)
  '22':
  - type: text
    content: 'Ary hoy ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' nidina avy tany Jerosalema hoe:'
  - type: text
    content: '–I '
  - type: text
    content: Belzeboba
  - type: text
    content: ' no ao amin’ilay io ary fahefana avy amin’ny filohan’ny '
  - type: text
    content: demony
  - type: text
    content: ' no androahany ny demony.'
  '23':
  - type: text
    content: 'Fa nantsoin’i Jesoa iretsy mpahay lalàna ka '
  - type: text
    content: fanoharana
  - type: text
    content: ' no nitenenany taminy hoe:'
  - type: text
    content: '–Ahoana no hahafahan’i '
  - type: text
    content: Satàna
  - type: text
    content: ' mandroaka an’i Satàna? '
  '24':
  - type: text
    content: 'Raha misy fanjakana miady an-trano, dia tsy haharitra izany fanjakana izany; '
  '25':
  - type: text
    content: 'ary raha misy fianakaviana miady an-trano, dia tsy haharitra izany fianakaviana izany. '
  '26':
  - type: text
    content: Koa raha i Satàna no mitsangana hanohitra ny tenany sy miady an-trano, dia tsy haharitra izy fa ho vita eo ny aminy.
  '27':
  - type: text
    content: Kanefa tsy misy olona afaka hiditra ao an-tranon’olona matanjaka mba handroba ny fananany, raha tsy voafatony aloha ilay olona matanjaka; dia izay izy vao mandroba ny ao an-trano.
  '28':
  - type: text
    content: 'Ary lazaiko marina aminareo fa havelan’Andriamanitra avokoa ny heloka rehetra vitan’ny olombelona ary koa ny fanevatevana rehetra ataony an’Andriamanitra; '
  '29':
  - type: text
    content: fa na iza na iza manevateva ny Fanahy Masina, dia tsy mba hahazo famelan-keloka na oviana na oviana, satria fahotana raiki-tampisaka aminy mandrakizay no mahameloka azy.
  '3':
  - type: text
    content: 'Fa hoy i Jesoa tamin’ilay lehilahy maty tanana:'
  - type: text
    content: –Ndeha mijoro etsy afovoan’ny olona.
  '30':
  - type: text
    content: Nilaza manko ireo mpahay lalàna fa hoe fanahy maloto no ao amin’i Jesoa.
  - type: heading
    content: Ny tena fianakavian’i Jesoa
  - type: heading
    content: (Jereo Mt 12.46-50; Lk 8.19-21)
  '31':
  - type: text
    content: 'Tamin’izay dia tonga ny renin’i Jesoa sy ireo rahalahiny, nijanona teo alatrano ary naniraka olona hiantso Azy. '
  '32':
  - type: text
    content: 'Vahoaka be no nipetraka nanodidina an’i Jesoa; ary nisy nilaza taminy hoe:'
  - type: text
    content: –Indreo mitady Anao ao alatrano ao ny reninao sy ny rahalahinao.
  '33':
  - type: text
    content: 'Fa hoy ny navalin’i Jesoa:'
  - type: text
    content: –Iza moa no reniko sy rahalahiko?
  '34':
  - type: text
    content: 'Dia natopiny tamin’ireo olona nipetraka nanodidina Azy ny masony ka hoy Izy:'
  - type: text
    content: '–Ireto no reniko sy rahalahiko. '
  '35':
  - type: text
    content: Fa na iza na iza manao ny sitrapon’Andriamanitra, dia izany no rahalahiko, anabaviko na reniko.
  '4':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ny olona nizaha taratra Azy:'
  - type: text
    content: –Inona moa no azo atao amin’ny andro sabata, ny manao soa sa ny manao ratsy? ny mamonjy ain’olona sa ny mamono olona?
  - type: text
    content: 'Fa tsy nisy niteny ny olona. '
  '5':
  - type: text
    content: 'Dia tezitra i Jesoa nanopy maso manodidina nijery azy ireo, sady nalahelo tokoa noho ny hamafin’ny fony, ka niteny tamin-dralehilahy hoe:'
  - type: text
    content: –Atsory ny tananao!
  - type: text
    content: 'Dia natsotran’ilay marary ny tanany ka sitrana. '
  '6':
  - type: text
    content: 'Fa lasa nivoaka ny sinagôga avy hatrany kosa ny '
  - type: text
    content: Farisianina
  - type: text
    content: ', ary niara-nioko tamin’ny '
  - type: text
    content: Herôdianina
  - type: text
    content: ' ny amin’izay hamonoana an’i Jesoa.'
  - type: heading
    content: Mirohotra manatona an’i Jesoa ny vahoaka
  '7':
  - type: text
    content: 'Dia lasa i Jesoa nihataka teny amoron’ny farihin’i Galilea niaraka tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: '. Vahoaka maro no nanaraka Azy avy ao Galilea; toy izany koa ny avy any Jodea '
  '8':
  - type: text
    content: sy avy any Jerosalema, avy any Idomea
  - type: note
    content: 'Idomea: faritany atsimon’i Jodea ka isan’ny tanàna tao anatin’izany faritany izany i Hebrôna.'
  - type: text
    content: ' sy andafin’ny ony Jôrdàna, ary avy amin’ny faritra manodidina an’i Tiro sy i Sidôna. Samy nandre izay nataon’i Jesoa izy rehetra ka nanatona Azy. '
  '9':
  - type: text
    content: 'Ary dia hoy i Jesoa tamin’ny mpianany:'
  - type: text
    content: –Anomany sambokely eto akaikiko Aho fandrao hifanosehan’ny vahoaka.
