document_id: MRK.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ilay lehilahy maty tanana anila
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 12.9-21; Lk 6.6-11)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niditra tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' indray i Jesoa ary nisy lehilahy maty tanana anila tao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa maro tokoa ny olona nositraniny, ka nifanesika mba hikasika Azy izay rehetra nanana aretina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanahy maloto
    - type: text
      text: ', isaky ny mahita an’i Jesoa, dia niankohoka teo anatrehany sady niantsoantso hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianao no ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Andriamanitra
    - type: text
      text: '!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Jesoa niteny mafy azy ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza manao izay hahafantarana Ahy!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo apôstôly 12 lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 10.1-4; Lk 6.12-16)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra teo an-tendrombohitra i Jesoa, ka niantso izay tiany hantsoina; ary niala teo amin’ny vahoaka ireo ka nanatona Azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanendry 12 lahy izay nomeny anarana hoe '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' Izy, mba hiaraka aminy sy hirahiny hitoriteny '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hanam-pahefana handroaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no voatendriny ho isan’ny 12 lahy: i Simôna izay nampian’i Jesoa anarana hoe Petera'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Petera: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: na hoe Vato. Ampit Mt 16.16-18; Jôh 1.42.
      marker-yv: yv-n
    - type: text
      text: '; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Jakôba sy i Jôhany mirahalahy zanak’i Zebedeo ary nampian’i Jesoa anarana hoe Boanerjesy, izany hoe olona mahery setra tahaka ny varatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lk 9.54.
      marker-yv: yv-n
    - type: text
      text: '; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Andrea, i Filipo, i Bartôlômeo, i Matio, i Tômà, i Jakôba zanak’i Halfeo, i Tadeo, i Simôna '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kananeanina
    - type: text
      text: ', '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary i Jodasy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Iskariôta
    - type: text
      text: ' ilay nanolotra an’i Jesoa.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Heverina ho adala i Jesoa
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nizaha taratra an’i Jesoa ny olona raha hanasitrana an’io marary io amin’ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' Izy, mba hahazoany miampanga Azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niverina tao an-trano i Jesoa; ary vory maro teo indray ny vahoaka, hany ka tsy afaka nisakafo Izy sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ren’ny fianakavian’i Jesoa izany ka niainga ireo mba haka Azy an-keriny satria hoe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'satria hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: satria nolazain’ireo hoe.
      marker-yv: yv-n
    - type: text
      text: lasa adala Izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny avalin’i Jesoa ny fiampangana natao taminy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 12.22-32; Lk 11.14-23; 12.10)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' nidina avy tany Jerosalema hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–I '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Belzeboba
    - type: text
      text: ' no ao amin’ilay io ary fahefana avy amin’ny filohan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: ' no androahany ny demony.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nantsoin’i Jesoa iretsy mpahay lalàna ka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' no nitenenany taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ahoana no hahafahan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: text
      text: ' mandroaka an’i Satàna? '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha misy fanjakana miady an-trano, dia tsy haharitra izany fanjakana izany; '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ary raha misy fianakaviana miady an-trano, dia tsy haharitra izany fianakaviana izany. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa raha i Satàna no mitsangana hanohitra ny tenany sy miady an-trano, dia tsy haharitra izy fa ho vita eo ny aminy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa tsy misy olona afaka hiditra ao an-tranon’olona matanjaka mba handroba ny fananany, raha tsy voafatony aloha ilay olona matanjaka; dia izay izy vao mandroba ny ao an-trano.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lazaiko marina aminareo fa havelan’Andriamanitra avokoa ny heloka rehetra vitan’ny olombelona ary koa ny fanevatevana rehetra ataony an’Andriamanitra; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa na iza na iza manevateva ny Fanahy Masina, dia tsy mba hahazo famelan-keloka na oviana na oviana, satria fahotana raiki-tampisaka aminy mandrakizay no mahameloka azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa tamin’ilay lehilahy maty tanana:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha mijoro etsy afovoan’ny olona.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nilaza manko ireo mpahay lalàna fa hoe fanahy maloto no ao amin’i Jesoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tena fianakavian’i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 12.46-50; Lk 8.19-21)
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia tonga ny renin’i Jesoa sy ireo rahalahiny, nijanona teo alatrano ary naniraka olona hiantso Azy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vahoaka be no nipetraka nanodidina an’i Jesoa; ary nisy nilaza taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indreo mitady Anao ao alatrano ao ny reninao sy ny rahalahinao.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny navalin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa no reniko sy rahalahiko?
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natopiny tamin’ireo olona nipetraka nanodidina Azy ny masony ka hoy Izy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ireto no reniko sy rahalahiko. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa na iza na iza manao ny sitrapon’Andriamanitra, dia izany no rahalahiko, anabaviko na reniko.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa tamin’ny olona nizaha taratra Azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona moa no azo atao amin’ny andro sabata, ny manao soa sa ny manao ratsy? ny mamonjy ain’olona sa ny mamono olona?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy nisy niteny ny olona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tezitra i Jesoa nanopy maso manodidina nijery azy ireo, sady nalahelo tokoa noho ny hamafin’ny fony, ka niteny tamin-dralehilahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Atsory ny tananao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natsotran’ilay marary ny tanany ka sitrana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa lasa nivoaka ny sinagôga avy hatrany kosa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ', ary niara-nioko tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôdianina
    - type: text
      text: ' ny amin’izay hamonoana an’i Jesoa.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mirohotra manatona an’i Jesoa ny vahoaka
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa i Jesoa nihataka teny amoron’ny farihin’i Galilea niaraka tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: '. Vahoaka maro no nanaraka Azy avy ao Galilea; toy izany koa ny avy any Jodea '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sy avy any Jerosalema, avy any Idomea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Idomea: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: faritany atsimon’i Jodea ka isan’ny tanàna tao anatin’izany faritany izany i Hebrôna.
      marker-yv: yv-n
    - type: text
      text: ' sy andafin’ny ony Jôrdàna, ary avy amin’ny faritra manodidina an’i Tiro sy i Sidôna. Samy nandre izay nataon’i Jesoa izy rehetra ka nanatona Azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia hoy i Jesoa tamin’ny mpianany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Anomany sambokely eto akaikiko Aho fandrao hifanosehan’ny vahoaka.
