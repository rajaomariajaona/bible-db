    - type: text
      text: '1'
  - type: text
    text: «Amin’ny andro voalohan’ny volana fahafito
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.1 '
    - type: usfm
      marker: ft
