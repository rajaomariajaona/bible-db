      - type: text
        text: Jereo Lev 23.24 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' dia hisy fivoriana masina ho anareo, ka tsy hanao ny asa fanaonareo andavanandro ianareo fa andro fitsofana trompetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny hatolotrareo ho sorona dorana manontolo, ka hanetona ho hanitra hankasitrahin’ny TOMPO, dia izao: ombilahy iray sy ondrilahy iray avy ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina nofetaina tamin’ny menaka, ka lafarinina sivy kilao isan’ombilahy, enina kilao isan’ondrilahy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary telo kilao isan-janak’ondry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hanatitra osilahy iray koa ianareo ho sorona fanalana ny ota, hanaovana ny fombam-pivavahana famelan-keloka ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hataonareo izany ho fanampin’ny sorona dorana manontolo isan’andro sy ny sorona dorana manontolo isaky ny andro voalohan’ny volana miaraka amin’ny fanatitra lafarinina sy divay momba azy; ho sakafo dorana ho an’ny TOMPO izany ka hanetona ho hanitra hankasitrahiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: h. Amin’ny andro lehibe famelan-keloka
  marker-yv: yv-h
- type: usfm
