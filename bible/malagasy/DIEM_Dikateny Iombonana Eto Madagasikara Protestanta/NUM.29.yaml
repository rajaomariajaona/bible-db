  - type: heading
    content: i. Amin’ny fetin’ny Tranotomboka
  '12':
  - type: text
    content: «Ny andro faha-15 amin’ny volana fahafito, dia hisy fivoriana masina ho anareo, ka tsy hanao ny asa fanao andavanandro ianareo. Hanao fetim-piravoravoana ho voninahitry ny TOMPO mandritra ny herinandro ianareo
  - type: note
    content: Ny fetin’ny Tranotomboka no lazaina eto, izay antsoina koa hoe fetin’ny vokatra, jereo Eks 23.16; 34.22; Lev 23.33-43; Deot 16.13-15.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Amin’ny andro voalohany, ny hatolotrareo ho sorona dorana manontolo ka hanetona ho hanitra hankasitrahin’ny TOMPO, dia izao: ombilahy 13 sy ondrilahy roa ary zanak’ondry 14 izay samy herintaona avy sady tsy misy kilema. '
  '14':
  - type: text
    content: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina nofetaina tamin’ny menaka, ka lafarinina sivy kilao isan’ombilahy, enina kilao isan’ondrilahy '
  '15':
  - type: text
    content: 'ary telo kilao isan-janak’ondry. '
  '16':
  - type: text
    content: Hanatitra osilahy iray koa ianareo ho sorona fanalana ny ota. Hataonareo izany ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro ary ny fanatitra lafarinina sy divay momba azy.
  '17':
  - type: text
    content: '«Amin’ny andro faharoa ka hatramin’ny andro fahafito dia biby tsy misy kilema no hatolotrareo ho sorona dorana miaraka amin’ireo fanatitra mahazatra ho fanampin’ny sorona dorana isa-maraina. Ireto avy izany: amin’ny andro faharoa, dia ombilahy 12 sy ondrilahy roa sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray; amin’ny andro fahatelo, dia ombilahy 11 sy ondrilahy roa sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray; amin’ny andro fahefatra, dia ombilahy folo sy ondrilahy roa sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray; amin’ny andro fahadimy, dia ombilahy sivy sy ondrilahy roa sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray; amin’ny andro fahenina, dia ombilahy valo sy ondrilahy roa, sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray; amin’ny andro fahafito, dia ombilahy fito sy ondrilahy roa sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray.'
  '2':
  - type: text
    content: 'Ny hatolotrareo ho sorona dorana manontolo, ka hanetona ho hanitra hankasitrahin’ny TOMPO, dia izao: ombilahy iray sy ondrilahy iray avy ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema. '
  '3':
  - type: text
    content: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina nofetaina tamin’ny menaka, ka lafarinina sivy kilao isan’ombilahy, enina kilao isan’ondrilahy '
  '35':
  - type: text
    content: '«Ary amin’ny andro fahavalo, dia hisy fivoriana famaranana ny fetinareo, ka tsy hanao ny asa fanao andavanandro ianareo. '
  '36':
  - type: text
    content: 'Ny hatolotrareo ho sorona dorana manontolo, ka hanetona ho hanitra hankasitrahin’ny TOMPO, dia izao: ombilahy iray sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema. '
  '37':
  - type: text
    content: 'Ny biby tsirairay dia hampiarahina amin’ny fanatitra lafarinina sy divay momba azy araka ny mahazatra. '
  '38':
  - type: text
    content: Hanolotra osilahy iray koa ianareo ho sorona fanalana ny ota. Hataonareo izany ho fanampin’ny sorona dorana manontolo isan’andro miaraka amin’ny fanatitra lafarinina sy divay momba azy.
  '39':
  - type: text
    content: «Ireo no sorona hatolotrareo ho an’ny TOMPO amin’ny andro fetinareo, afa-tsy izay hataonareo ho fanalàm-
  - type: text
    content: boady
  - type: text
    content: ' sy fanati-tsitrapo na sorona dorana izany na fanatitra lafarinina sy divay na koa sorom-pihavanana.»'
  '4':
  - type: text
    content: 'ary telo kilao isan-janak’ondry. '
  '5':
  - type: text
    content: 'Hanatitra osilahy iray koa ianareo ho sorona fanalana ny ota, hanaovana ny fombam-pivavahana famelan-keloka ho anareo. '
  '6':
  - type: text
    content: Hataonareo izany ho fanampin’ny sorona dorana manontolo isan’andro sy ny sorona dorana manontolo isaky ny andro voalohan’ny volana miaraka amin’ny fanatitra lafarinina sy divay momba azy; ho sakafo dorana ho an’ny TOMPO izany ka hanetona ho hanitra hankasitrahiny.
  - type: heading
    content: h. Amin’ny andro lehibe famelan-keloka
  '7':
  - type: text
    content: '«Amin’ny andro fahafolon’ny volana fahafito, dia hisy fivoriana masina ho anareo. '
  - type: text
    content: Hifady hanina
  - type: text
    content: ' ianareo ka tsy hanao ny asa fanaonareo andavanandro. '
  '8':
  - type: text
    content: 'Ny hatolotrareo ho sorona dorana manontolo ho an’ny TOMPO, ka hanetona ho hanitra hankasitrahiny, dia izao: ombilahy iray sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema. '
