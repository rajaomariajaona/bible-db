    content: g. Amin’ny andro fitsofana trompetra
  - type: text
    content: «Amin’ny andro voalohan’ny volana fahafito
  - type: note
    content: Jereo Lev 23.24 sy nta.
  - type: text
    content: ' dia hisy fivoriana masina ho anareo, ka tsy hanao ny asa fanaonareo andavanandro ianareo fa andro fitsofana trompetra izany. '
  '10':
  - type: text
    content: 'ary telo kilao isan-janak’ondry. '
  '11':
  - type: text
    content: Hanatitra osilahy iray koa ianareo ho sorona fanalana ny ota. Hataonareo izany rehetra izany ho fanampin’ny sorona noho ny andro lehibe famelan-keloka sy ny sorona dorana manontolo tsy tapaka isan’andro ary ny fanatitra divay momba azy
  - type: note
    content: 'And 7-11: jereo Lev 16; 23.27-32.'
  - type: text
