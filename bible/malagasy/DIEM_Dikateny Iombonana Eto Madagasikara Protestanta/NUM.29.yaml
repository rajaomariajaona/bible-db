  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Amin’ny andro fahafolon’ny volana fahafito, dia hisy fivoriana masina ho anareo. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hifady hanina
  - type: text
    text: ' ianareo ka tsy hanao ny asa fanaonareo andavanandro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny hatolotrareo ho sorona dorana manontolo ho an’ny TOMPO, ka hanetona ho hanitra hankasitrahiny, dia izao: ombilahy iray sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina nofetaina tamin’ny menaka, ka lafarinina sivy kilao isan’ombilahy, enina kilao isan’ondrilahy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary telo kilao isan-janak’ondry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hanatitra osilahy iray koa ianareo ho sorona fanalana ny ota. Hataonareo izany rehetra izany ho fanampin’ny sorona noho ny andro lehibe famelan-keloka sy ny sorona dorana manontolo tsy tapaka isan’andro ary ny fanatitra divay momba azy
  - type: usfm
    marker: f
    children:
