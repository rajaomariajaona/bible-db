- type: usfm
  marker: s1
  children:
  - type: text
    text: i. Amin’ny fetin’ny Tranotomboka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: «Ny andro faha-15 amin’ny volana fahafito, dia hisy fivoriana masina ho anareo, ka tsy hanao ny asa fanao andavanandro ianareo. Hanao fetim-piravoravoana ho voninahitry ny TOMPO mandritra ny herinandro ianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.12 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny fetin’ny Tranotomboka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: no lazaina eto, izay antsoina koa hoe fetin’ny vokatra, jereo Eks 23.16; 34.22; Lev 23.33-43; Deot 16.13-15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Amin’ny andro voalohany, ny hatolotrareo ho sorona dorana manontolo ka hanetona ho hanitra hankasitrahin’ny TOMPO, dia izao: ombilahy 13 sy ondrilahy roa ary zanak’ondry 14 izay samy herintaona avy sady tsy misy kilema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina nofetaina tamin’ny menaka, ka lafarinina sivy kilao isan’ombilahy, enina kilao isan’ondrilahy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary telo kilao isan-janak’ondry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hanatitra osilahy iray koa ianareo ho sorona fanalana ny ota. Hataonareo izany ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro ary ny fanatitra lafarinina sy divay momba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-34
  - type: text
    text: '«Amin’ny andro faharoa ka hatramin’ny andro fahafito dia biby tsy misy kilema no hatolotrareo ho sorona dorana miaraka amin’ireo fanatitra mahazatra ho fanampin’ny sorona dorana isa-maraina. Ireto avy izany: amin’ny andro faharoa, dia ombilahy 12 sy ondrilahy roa sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray; amin’ny andro fahatelo, dia ombilahy 11 sy ondrilahy roa sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray; amin’ny andro fahefatra, dia ombilahy folo sy ondrilahy roa sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray; amin’ny andro fahadimy, dia ombilahy sivy sy ondrilahy roa sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray; amin’ny andro fahenina, dia ombilahy valo sy ondrilahy roa, sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray; amin’ny andro fahafito, dia ombilahy fito sy ondrilahy roa sy zanak’ondry 14 izay samy herintaona avy, ary koa osilahy iray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '«Ary amin’ny andro fahavalo, dia hisy fivoriana famaranana ny fetinareo, ka tsy hanao ny asa fanao andavanandro ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny hatolotrareo ho sorona dorana manontolo, ka hanetona ho hanitra hankasitrahin’ny TOMPO, dia izao: ombilahy iray sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ny biby tsirairay dia hampiarahina amin’ny fanatitra lafarinina sy divay momba azy araka ny mahazatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Hanolotra osilahy iray koa ianareo ho sorona fanalana ny ota. Hataonareo izany ho fanampin’ny sorona dorana manontolo isan’andro miaraka amin’ny fanatitra lafarinina sy divay momba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: «Ireo no sorona hatolotrareo ho an’ny TOMPO amin’ny andro fetinareo, afa-tsy izay hataonareo ho fanalàm-
  - type: usfm
    marker: w
    children:
    - type: text
      text: boady
  - type: text
    text: ' sy fanati-tsitrapo na sorona dorana izany na fanatitra lafarinina sy divay na koa sorom-pihavanana.»'
