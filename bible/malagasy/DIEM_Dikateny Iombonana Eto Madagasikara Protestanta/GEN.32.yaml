document_id: GEN.32,396
type_code: plt
verses:
  '1':
  - type: text
    content: Nifoha maraina koa i Labàna ny ampitso, dia nanoroka ireo zanany vavy sy ireo zafikeliny, ka nanao veloma azy ary niverina nody
  - type: note
    content: Amin’ny edisiona sasany io dia mitondra ny laharana 31.55; ireo andininy manaraka kosa dia mitondra ny laharana 32.1-32.
  - type: text
    content: .
  - type: heading
    content: Ny fiomanan’i Jakôba hihaona amin’i Hesao
  '10':
  - type: text
    content: 'Ary nivavaka i Jakôba nanao hoe:'
  - type: text
    content: '–Ry Andriamanitr’i Abrahama raibeko sy Andriamanitr’i Itsehàka raiko ô, Ianao Ilay TOMPO efa nilaza tamiko hoe: «Miverena any amin’ny taninao sy ny fianakavianao, dia hanisy soa anao Aho.» '
  '11':
  - type: text
    content: 'Tsy mendrika an’ireo mari-pitiavana sy zavatra azo antoka rehetra izay nataonao tamiko mpanomponao akory aho, satria tsy nanana afa-tsy tehina ny tenako raha niampita an’ity Jôrdàna ity, ary ankehitriny kosa efa tonga antokony roa. '
  '12':
  - type: text
    content: 'Mba afaho amin’ny tanan’i Hesao rahalahiko aho, satria matahotra azy, fandrao tonga izy ka hamono ahy sy ny zaza amam-behivavy ho faty. '
  '13':
  - type: text
    content: 'Ianao manko efa nampanantena ahy hoe: «Hanisy soa anao tokoa Aho, ka hahatonga ny taranakao ho marobe tsy hita isa tahaka ny fasika eny amoron-dranomasina'
  - type: note
    content: Jereo ny 28.14; ampit 22.17.
  - type: text
    content: .»
  '14':
  - type: text
    content: 'Dia nandry teo i Jakôba tamin’iny alina iny. Ary naka avy tamin’izay teo an-tanany izy mba hatao fanomezana ho an’i Hesao rahalahiny, '
  '15':
  - type: text
    content: 'dia osivavy roanjato sy osilahy roapolo, ondrivavy roanjato sy ondrilahy roapolo, '
  '16':
  - type: text
    content: 'rameva telopolo ampianahany ombivavy efapolo sy ombilahy folo, borikivavy roapolo ary borikilahy folo. '
  '17':
  - type: text
    content: 'Dia natolony hiandraiketan’ireo mpanompony ireny, ka nozarainy ho andiany vitsivitsy; dia hoy izy tamin’ireo mpanompony: «Mandehana any alohako ka asio elanelany hatrany isaky ny andiany.»'
  '18':
  - type: text
    content: 'Nanome baiko ny mpanompo voalohany i Jakôba nanao hoe:'
  - type: text
    content: '–Rehefa mifanena aminao i Hesao rahalahiko, ka manontany anao hoe: «An’iza moa ianao? Ho aiza ianao ary an’iza ireo biby fiompy mandeha eo alohanao?» '
  '19':
  - type: text
    content: 'dia hovalianao hoe: «An’i Jakôba mpanomponao ireo, ary fanomezana izay nalefany ho anao, tompokolahy; fa izy kosa manaraka ao aorianay ao.»'
  '2':
  - type: text
    content: 'Nanohy ny diany i Jakôba, ary nisy '
  - type: text
    content: anjeli
  - type: text
    content: 'n’Andriamanitra nifanena taminy. '
  '20':
  - type: text
    content: 'Nomeny baiko toy ny teo ihany koa ny faharoa sy ny fahatelo ary izay rehetra nanaraka ny andiam-biby hoe:'
  - type: text
    content: '–Izany teny izany no holazainareo amin’i Hesao, rehefa mifanena aminareo izy; '
  '21':
  - type: text
    content: 'sady hampianareo hoe: «Indro i Jakôba mpanomponao manaraka ao aorianay ao.»'
  - type: text
    content: 'I Jakôba manko dia niteny anakampo hoe: «Hampitoneko amin’ireo fanomezana alefako mialoha ahy ireo izy, ka aorian’izay vao hiseho eo anatrehany aho; antenaiko fa ho tsara fandray ahy izy.» '
  '22':
  - type: text
    content: Dia nalefan’i Jakôba nialoha azy ny andiam-biby fa ny tenany kosa mbola nijanona tao an-toby tamin’iny alina iny.
  - type: heading
    content: Ny tolona nataon’i Jakôba tamin’Andriamanitra
  '23':
  - type: text
    content: 'Tamin’iny alina iny ihany no niainga i Jakôba, ka naka ny vadiny roa sy ny mpanompovaviny roa ary ny zanany iraika ambin’ny folo, dia lasa nita teo amin’ny fitana an’i Jabôka. '
  '24':
  - type: text
    content: 'Nalainy ary nampitainy teo avokoa izay rehetra azy. '
  '25':
  - type: text
    content: I Jakôba irery no sisa nijanona ary nisy lehilahy nifampitolona taminy mandra-pahazava ratsy ny andro
  - type: note
    content: 'Momba ilay nifampitolona tamin’i Jakôba: jereo ny and 29, 31, Hôs 12.5.'
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Ary rehefa hitany fa tsy naharesy an’i Jakôba izy, dia nodoniny ny foto-pen’i Jakôba ka nipitsoka, raha izy mbola nifampitolona iny. '
  '27':
  - type: text
    content: 'Dia hoy izy hoe:'
  - type: text
    content: –Avelao aho handeha fa efa mazava ratsy ny andro.
  - type: text
    content: 'Hoy kosa i Jakôba taminy:'
  - type: text
    content: –Tsy havelako ianao, raha tsy tsofinao rano aho.
  '28':
  - type: text
    content: 'Dia nanontany izy hoe:'
  - type: text
    content: –Iza moa no anaranao?
  - type: text
    content: 'Ka hoy ny navaliny azy:'
  - type: text
    content: –Jakôba.
  '29':
  - type: text
    content: 'Dia nanohy ny teniny izy hoe:'
  - type: text
    content: –Tsy hantsoina hoe Jakôba intsony ianao fa hatao hoe Israely, satria efa nitolona tamin’Andriamanitra
  - type: note
    content: Ny anarana hoe Israely amin’ny teny hebreo dia mampahatsiaro ny fomba fiteny izay midika hoe nitolona tamin’Andriamanitra eto. Jereo koa 35.10.
  - type: text
    content: ' sy tamin’ny olona ianao ka nandresy.'
  '3':
  - type: text
    content: 'Rehefa nahita ireo i Jakôba, dia niteny hoe:'
  - type: text
    content: –Tobin’Andriamanitra ity!
  - type: text
    content: Dia nantsoiny hoe Mahanaima izany toerana izany
  - type: note
    content: Toby roa no hevitry ny hoe Mahanaima. Io toerana io dia any am-pitan’i Jôrdàna tsy lavitra ny ranon-driaka Jabôka, saingy tsy mbola fantatra mazava.
  - type: text
    content: .
  '30':
  - type: text
    content: 'Dia nanontany kosa i Jakôba hoe:'
  - type: text
    content: –Mba lazao ahy, azafady, ny anaranao!
  - type: text
    content: Ary hoy izy hoe
  - type: note
    content: Ampit Mpits 13.17-18.
  - type: text
    content: ':'
  - type: text
    content: –Ahoana no anontanianao ny anarako?
  - type: text
    content: Dia notsofiny rano teo i Jakôba.
  '31':
  - type: text
    content: 'Ka hoy i Jakôba hoe:'
  - type: text
    content: –Efa nahita an’Andriamanitra nifanatri-tava tamiko aho, nefa tsy maty fo aman’aina.
  - type: text
    content: 'Izany no niantsoany io toerana io hoe Peniela, na hoe Tavan’Andriamanitra. '
  '32':
  - type: text
    content: 'Efa niposaka ny masoandro raha niala teo Peniela i Jakôba, ary nandringa izy noho ny feny. '
  '33':
  - type: text
    content: Izany no tsy ihinanan’ny Israelita ny hozatra eo amin’ny foto-pe mandraka androany, satria voadona teo amin’io hozatra io i Jakôba.
  '4':
  - type: text
    content: 'Ary i Jakôba nandefa iraka hialoha azy ho any amin’i Hesao rahalahiny, any ambanivohitr’i Edôma, any amin’ny tany Sehira. '
  '5':
  - type: text
    content: 'Nanafatra an’ireo iraka izy hoe:'
  - type: text
    content: '–Izao no holazainareo amin’i Hesao: «I Jakôba mpanomponao, tompokolahy, dia nanafatra anay hilaza hoe: Nivahiny tany amin’i Labàna aho ary nijanona tany hatramin’izao. '
  '6':
  - type: text
    content: Manana omby sy boriky sy ondry aman’osy aho ary koa mpanompo lahy sy vavy maro. Nandefa ireto irako ireto aho hampilaza aminao tompokolahy mba handraisanao ahy tsara.»
  '7':
  - type: text
    content: 'Niverina tany amin’i Jakôba ireo iraka ka nilaza hoe:'
  - type: text
    content: –Tonga tany amin’i Hesao rahalahinao izahay; ary ny tenany mihitsy no tamy hitsena anao miaraka amin’ny olona efajato lahy.
  '8':
  - type: text
    content: 'Dia raiki-tahotra mafy i Jakôba ka nangitakitaka; ary nozarainy ho antoko roa ny olona niaraka taminy sy ireo ondry aman’osy ary omby sy rameva, '
  '9':
  - type: text
    content: 'fa hoy izy anakampony: «Raha tonga hamely ny antoko iray i Hesao, dia afa-mandositra kosa ny antoko hafa.» '
