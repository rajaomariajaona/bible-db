document_id: GEN.32
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nifoha maraina koa i Labàna ny ampitso, dia nanoroka ireo zanany vavy sy ireo zafikeliny, ka nanao veloma azy ary niverina nody
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny edisiona sasany io dia mitondra ny laharana 31.55; ireo andininy manaraka kosa dia mitondra ny laharana 32.1-32.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiomanan’i Jakôba hihaona amin’i Hesao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanohy ny diany i Jakôba, ary nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’Andriamanitra nifanena taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa nahita ireo i Jakôba, dia niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tobin’Andriamanitra ity!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nantsoiny hoe Mahanaima izany toerana izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.3 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Toby roa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'no hevitry ny hoe '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Mahanaima.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Io toerana io dia any am-pitan’i Jôrdàna tsy lavitra ny ranon-driaka Jabôka, saingy tsy mbola fantatra mazava.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary i Jakôba nandefa iraka hialoha azy ho any amin’i Hesao rahalahiny, any ambanivohitr’i Edôma, any amin’ny tany Sehira. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nanafatra an’ireo iraka izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no holazainareo amin’i Hesao: «I Jakôba mpanomponao, tompokolahy, dia nanafatra anay hilaza hoe: Nivahiny tany amin’i Labàna aho ary nijanona tany hatramin’izao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manana omby sy boriky sy ondry aman’osy aho ary koa mpanompo lahy sy vavy maro. Nandefa ireto irako ireto aho hampilaza aminao tompokolahy mba handraisanao ahy tsara.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Niverina tany amin’i Jakôba ireo iraka ka nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tonga tany amin’i Hesao rahalahinao izahay; ary ny tenany mihitsy no tamy hitsena anao miaraka amin’ny olona efajato lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia raiki-tahotra mafy i Jakôba ka nangitakitaka; ary nozarainy ho antoko roa ny olona niaraka taminy sy ireo ondry aman’osy ary omby sy rameva, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'fa hoy izy anakampony: «Raha tonga hamely ny antoko iray i Hesao, dia afa-mandositra kosa ny antoko hafa.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nivavaka i Jakôba nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry Andriamanitr’i Abrahama raibeko sy Andriamanitr’i Itsehàka raiko ô, Ianao Ilay TOMPO efa nilaza tamiko hoe: «Miverena any amin’ny taninao sy ny fianakavianao, dia hanisy soa anao Aho.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy mendrika an’ireo mari-pitiavana sy zavatra azo antoka rehetra izay nataonao tamiko mpanomponao akory aho, satria tsy nanana afa-tsy tehina ny tenako raha niampita an’ity Jôrdàna ity, ary ankehitriny kosa efa tonga antokony roa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mba afaho amin’ny tanan’i Hesao rahalahiko aho, satria matahotra azy, fandrao tonga izy ka hamono ahy sy ny zaza amam-behivavy ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ianao manko efa nampanantena ahy hoe: «Hanisy soa anao tokoa Aho, ka hahatonga ny taranakao ho marobe tsy hita isa tahaka ny fasika eny amoron-dranomasina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny 28.14; ampit 22.17.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nandry teo i Jakôba tamin’iny alina iny. Ary naka avy tamin’izay teo an-tanany izy mba hatao fanomezana ho an’i Hesao rahalahiny, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia osivavy roanjato sy osilahy roapolo, ondrivavy roanjato sy ondrilahy roapolo, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'rameva telopolo ampianahany ombivavy efapolo sy ombilahy folo, borikivavy roapolo ary borikilahy folo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia natolony hiandraiketan’ireo mpanompony ireny, ka nozarainy ho andiany vitsivitsy; dia hoy izy tamin’ireo mpanompony: «Mandehana any alohako ka asio elanelany hatrany isaky ny andiany.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nanome baiko ny mpanompo voalohany i Jakôba nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Rehefa mifanena aminao i Hesao rahalahiko, ka manontany anao hoe: «An’iza moa ianao? Ho aiza ianao ary an’iza ireo biby fiompy mandeha eo alohanao?» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia hovalianao hoe: «An’i Jakôba mpanomponao ireo, ary fanomezana izay nalefany ho anao, tompokolahy; fa izy kosa manaraka ao aorianay ao.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nomeny baiko toy ny teo ihany koa ny faharoa sy ny fahatelo ary izay rehetra nanaraka ny andiam-biby hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izany teny izany no holazainareo amin’i Hesao, rehefa mifanena aminareo izy; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'sady hampianareo hoe: «Indro i Jakôba mpanomponao manaraka ao aorianay ao.»'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Jakôba manko dia niteny anakampo hoe: «Hampitoneko amin’ireo fanomezana alefako mialoha ahy ireo izy, ka aorian’izay vao hiseho eo anatrehany aho; antenaiko fa ho tsara fandray ahy izy.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nalefan’i Jakôba nialoha azy ny andiam-biby fa ny tenany kosa mbola nijanona tao an-toby tamin’iny alina iny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tolona nataon’i Jakôba tamin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’iny alina iny ihany no niainga i Jakôba, ka naka ny vadiny roa sy ny mpanompovaviny roa ary ny zanany iraika ambin’ny folo, dia lasa nita teo amin’ny fitana an’i Jabôka. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nalainy ary nampitainy teo avokoa izay rehetra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I Jakôba irery no sisa nijanona ary nisy lehilahy nifampitolona taminy mandra-pahazava ratsy ny andro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.25 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Momba ilay nifampitolona tamin’i Jakôba:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny and 29, 31, Hôs 12.5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary rehefa hitany fa tsy naharesy an’i Jakôba izy, dia nodoniny ny foto-pen’i Jakôba ka nipitsoka, raha izy mbola nifampitolona iny. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avelao aho handeha fa efa mazava ratsy ny andro.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hoy kosa i Jakôba taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy havelako ianao, raha tsy tsofinao rano aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nanontany izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa no anaranao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny navaliny azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Jakôba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nanohy ny teniny izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy hantsoina hoe Jakôba intsony ianao fa hatao hoe Israely, satria efa nitolona tamin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israely
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' amin’ny teny hebreo dia mampahatsiaro ny fomba fiteny izay midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nitolona tamin’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto. Jereo koa 35.10.'
    marker-yv: yv-n
  - type: text
    text: ' sy tamin’ny olona ianao ka nandresy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nanontany kosa i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba lazao ahy, azafady, ny anaranao!
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary hoy izy hoe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mpits 13.17-18.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana no anontanianao ny anarako?
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia notsofiny rano teo i Jakôba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ka hoy i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nahita an’Andriamanitra nifanatri-tava tamiko aho, nefa tsy maty fo aman’aina.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Izany no niantsoany io toerana io hoe Peniela, na hoe Tavan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Efa niposaka ny masoandro raha niala teo Peniela i Jakôba, ary nandringa izy noho ny feny. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izany no tsy ihinanan’ny Israelita ny hozatra eo amin’ny foto-pe mandraka androany, satria voadona teo amin’io hozatra io i Jakôba.
