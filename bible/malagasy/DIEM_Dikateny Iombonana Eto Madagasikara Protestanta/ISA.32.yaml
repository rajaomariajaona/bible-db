document_id: ISA.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanjakana filamatra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro hisy mpanjaka iray hanjaka araka ny rariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpanapaka hanapaka araka ny hitsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Samy toy ny fierena amin’ny tafio-drivotra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy toy ny fialofana amin’ny oram-baratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy toy ny sakeli-drano amin’ny tany karankaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny aloky ny harambato amin’ny tany ngazana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy hikimpy intsony ny mason’ny mahiratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihaino tsara ny sofin’ny mandre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny olona dodona dia handinika mba hahalala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ireo bada lela dia hiteny mazava sy mailamailaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny adala tsy hatao intsony hoe
- type: usfm
  marker: q1
  children:
  - type: text
    text: olona manan-toe-tsaina ambony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fangoloka tsy holazaina hoe
- type: usfm
  marker: q1
  children:
  - type: text
    text: olona malala-tanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny adala miteny hadalana hatrany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fony manomana heloka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manatanteraka izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny tsy mpivavaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa miteny ratsy ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avelany hitofezaka ny noana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ampisotroiny rano ny mangetaheta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fangoloka kosa manana fitaovana ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamorona teti-dratsy hamelezana ny malahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny filazana zavatra hosoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mitaky ny hitsiny ny mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny olona manan-toe-tsaina ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: no afaka hihevitra tanjona ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy hirotsaka an-tsehatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy ho an’ny tanjona ambony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ho an’ny vehivavy ao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ry andriambavilanitra mitoredretra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsangàna hihaino ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry tovovavy tsy rototra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandremo izay hambarako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Afaka herintaona mahery kely eo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho raiki-tahotra ianareo tsy rototra
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria hamono antoka ny fiotazam-boaloboka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy vokatra hangonina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mangovita ianareo mitoredretra
- type: usfm
  marker: q1
  children:
  - type: text
    text: matahora ianareo tsy rototra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esory avokoa ny fitafianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka lamba fisaonana no isikino.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka handondon-tratra ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: malahelova amin’ny saha mahafinaritra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny voaloboka mahavokatra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: malahelova amin’ny tanin’ny vahoakako
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rakotry ny kirihitra tsilo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, malahelova tokoa ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny amin’ny korana fanao isan-trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto amin’ity tanàna revon-danonana ity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nilaozana ny lapan’ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nangina ilay tanàna naresaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny faritr’i Hôfela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny faritr’i Hôfela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Tan 27.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' sy ny tilikambo fitiliana'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanjary toera-malalaka lalandava
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay fikarenjen’ny borikidia
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy firaofan’ny andiam-biby fiompy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsimbadihan-toe-draharaha
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indray andro any, dia hatosaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Fanahy avy amin’ny Tompo ao ambony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanjary saha mahavokatra ny taniefitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny saha mahavokatra hanana ny lanjan’ny ala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Honina any amin’ny taniefitra ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanjaka ao amin’ny saha mahavokatra ny hitsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fiadanana no ho vokatry ny hitsiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary filaminana sy fandriampahalemana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no haterany hatrany hatrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny vahoakako hitoetra ao amin’ny faritra miadana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny fonenana misy fandriampahalemana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ao amin’ny fialan-tsasatra feno fitoniana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amin’izay kosa ho ripaka ny ala noho ny havandra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary harodana hilamaka tokoa ny tanàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Kanefa ho sambatra ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: afaka mamafy eny amoron-drano na aiza na aiza
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mamela ny omby sy ny boriky hiriaria!
