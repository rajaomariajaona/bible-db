document_id: ISA.32,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanjakana filamatra
  - type: text
    content: Indro hisy mpanjaka iray hanjaka araka ny rariny;
  - type: text
    content: ary ny mpanapaka hanapaka araka ny hitsiny.
  '10':
  - type: text
    content: Afaka herintaona mahery kely eo,
  - type: text
    content: dia ho raiki-tahotra ianareo tsy rototra
  - type: text
    content: satria hamono antoka ny fiotazam-boaloboka
  - type: text
    content: ary tsy hisy vokatra hangonina intsony.
  '11':
  - type: text
    content: Mangovita ianareo mitoredretra
  - type: text
    content: matahora ianareo tsy rototra.
  - type: text
    content: Esory avokoa ny fitafianareo,
  - type: text
    content: ka lamba fisaonana no isikino.
  '12':
  - type: text
    content: Aoka handondon-tratra ianareo;
  - type: text
    content: malahelova amin’ny saha mahafinaritra
  - type: text
    content: sy amin’ny voaloboka mahavokatra;
  '13':
  - type: text
    content: malahelova amin’ny tanin’ny vahoakako
  - type: text
    content: izay rakotry ny kirihitra tsilo;
  - type: text
    content: eny, malahelova tokoa ianareo;
  - type: text
    content: ny amin’ny korana fanao isan-trano
  - type: text
    content: eto amin’ity tanàna revon-danonana ity.
  '14':
  - type: text
    content: Nilaozana ny lapan’ny mpanjaka,
  - type: text
    content: nangina ilay tanàna naresaka;
  - type: text
    content: ny faritr’i Hôfela
  - type: note
    content: 'ny faritr’i Hôfela: jereo 2 Tan 27.3 sy nta.'
  - type: text
    content: ' sy ny tilikambo fitiliana'
  - type: text
    content: dia nanjary toera-malalaka lalandava
  - type: text
    content: izay fikarenjen’ny borikidia
  - type: text
    content: sy firaofan’ny andiam-biby fiompy.
  - type: heading
    content: Ny fitsimbadihan-toe-draharaha
  '15':
  - type: text
    content: Indray andro any, dia hatosaka
  - type: text
    content: ny Fanahy avy amin’ny Tompo ao ambony;
  - type: text
    content: ka hanjary saha mahavokatra ny taniefitra
  - type: text
    content: ary ny saha mahavokatra hanana ny lanjan’ny ala.
  '16':
  - type: text
    content: Honina any amin’ny taniefitra ny rariny
  - type: text
    content: ary hanjaka ao amin’ny saha mahavokatra ny hitsiny.
  '17':
  - type: text
    content: Fiadanana no ho vokatry ny hitsiny;
  - type: text
    content: ary filaminana sy fandriampahalemana
  - type: text
    content: no haterany hatrany hatrany.
  '18':
  - type: text
    content: Ny vahoakako hitoetra ao amin’ny faritra miadana,
  - type: text
    content: ao amin’ny fonenana misy fandriampahalemana
  - type: text
    content: sy ao amin’ny fialan-tsasatra feno fitoniana.
  '19':
  - type: text
    content: Amin’izay kosa ho ripaka ny ala noho ny havandra
  - type: text
    content: ary harodana hilamaka tokoa ny tanàna.
  '2':
  - type: text
    content: Samy toy ny fierena amin’ny tafio-drivotra izy
  - type: text
    content: samy toy ny fialofana amin’ny oram-baratra,
  - type: text
    content: samy toy ny sakeli-drano amin’ny tany karankaina
  - type: text
    content: ary toy ny aloky ny harambato amin’ny tany ngazana.
  '20':
  - type: text
    content: Kanefa ho sambatra ianareo
  - type: text
    content: afaka mamafy eny amoron-drano na aiza na aiza
  - type: text
    content: sady mamela ny omby sy ny boriky hiriaria!
  '3':
  - type: text
    content: Tsy hikimpy intsony ny mason’ny mahiratra
  - type: text
    content: ary hihaino tsara ny sofin’ny mandre.
  '4':
  - type: text
    content: Ny olona dodona dia handinika mba hahalala;
  - type: text
    content: ary ireo bada lela dia hiteny mazava sy mailamailaka.
  '5':
  - type: text
    content: Ny adala tsy hatao intsony hoe
  - type: text
    content: olona manan-toe-tsaina ambony;
  - type: text
    content: ary ny fangoloka tsy holazaina hoe
  - type: text
    content: olona malala-tanana.
  '6':
  - type: text
    content: Ny adala miteny hadalana hatrany,
  - type: text
    content: ary ny fony manomana heloka;
  - type: text
    content: dia manatanteraka izany
  - type: text
    content: tahaka ny tsy mpivavaka izy
  - type: text
    content: ary koa miteny ratsy ny TOMPO.
  - type: text
    content: Avelany hitofezaka ny noana
  - type: text
    content: ary tsy ampisotroiny rano ny mangetaheta.
  '7':
  - type: text
    content: Ny fangoloka kosa manana fitaovana ratsy,
  - type: text
    content: mamorona teti-dratsy hamelezana ny malahelo
  - type: text
    content: amin’ny filazana zavatra hosoka
  - type: text
    content: rehefa mitaky ny hitsiny ny mahantra.
  '8':
  - type: text
    content: Fa ny olona manan-toe-tsaina ambony
  - type: text
    content: no afaka hihevitra tanjona ambony
  - type: text
    content: sady tsy hirotsaka an-tsehatra
  - type: text
    content: afa-tsy ho an’ny tanjona ambony.
  - type: heading
    content: Fampitandremana ho an’ny vehivavy ao Jerosalema
  '9':
  - type: text
    content: Ry andriambavilanitra mitoredretra,
  - type: text
    content: mitsangàna hihaino ahy,
  - type: text
    content: ry tovovavy tsy rototra,
  - type: text
    content: tandremo izay hambarako!
