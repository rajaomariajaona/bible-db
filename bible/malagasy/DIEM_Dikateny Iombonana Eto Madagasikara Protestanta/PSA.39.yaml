  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy aho hoe: «Hotandremako ny fitondrantenako'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hanota amin’ny teniko aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataoko toy ny tampina ny vavako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mbola eo anatrehako ny olon-dratsy.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa tena nangina mihitsy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nivolana na dia tsy nahasoa aza.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vao mainka nitombo ny fijaliako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: nandevilevy ny foko tato anatiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny doran’ny afo ny eritreritro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tamin’ny farany aho nahateny hoe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 32.3-5.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: TOMPO ô, ampahafantaro ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: rahoviana no hifarana ny fiainako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hafiriana sisa no ahavelomako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho fantatro fa mihelina aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Indro fohy dia fohy tokoa ny androm-piainako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny fisiako toy ny tsinontsinona eo anatrehanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny olona rehetra matanjaka aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toa tsio-drivotra mandalo;
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: eny tokoa fa ny olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toa aloka miserana ihany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misahirana tsy misy antony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manangon-karena nefa tsy mahalala
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hanjary ho tompon’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ankehitriny, Tompo ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: inona no azoko andrasana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao ihany no antenaiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Afaho amin’izay rehetra mpamadika ahy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza avela ho fanakòran’ireo adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa mangina aho ary tsy miloa-bava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Ianao no nahatonga izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Fit 3.25-29,37.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nefa aza kapohinao intsony aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mila ho faty noho ny famelezanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha manitsy ny olona Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manafay azy noho ny helony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manimba izay maminy indrindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny zavatra lanin’ny kalalao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny tokoa fa ny olona rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toa tsio-drivotra mandalo.
- type: usfm
  marker: qr
  children:
  - type: text
    text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: TOMPO ô, henoy ny vavaka ataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandrenesa ny fitarainako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza odian-tsy hita ny ranomasoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa olona nasaina aho no eto aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mpivahiny ihany toy ny razako rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mba ampiatoy ny famaizanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahazoako mitsiky indray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alohan’ny hahalasanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho any amin’ny varo-tsy mifody.
