    children:
    - type: text
      text: Tao amin’ny tahirin-kiran’i Jedotòna,
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: filohan’antoko-mpihira
  - type: text
    text: '. '
  - type: usfm
