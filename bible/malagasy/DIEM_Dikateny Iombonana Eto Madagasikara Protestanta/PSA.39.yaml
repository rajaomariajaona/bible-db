document_id: PSA.39,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Mba ampiatoy ny famaizanao fa fohy loatra ny fiainana.
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’i Jedotòna,
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida
  - type: note
    content: jereo 1 Tan 25.1, 3, 6.
  - type: text
    content: .
  '10':
  - type: text
    content: Koa mangina aho ary tsy miloa-bava,
  - type: text
    content: satria Ianao no nahatonga izao
  - type: note
    content: Jereo Fit 3.25-29,37.
  - type: text
    content: .
  '11':
  - type: text
    content: Nefa aza kapohinao intsony aho,
  - type: text
    content: fa mila ho faty noho ny famelezanao.
  '12':
  - type: text
    content: Raha manitsy ny olona Ianao
  - type: text
    content: ka manafay azy noho ny helony,
  - type: text
    content: dia manimba izay maminy indrindra
  - type: text
    content: toy ny zavatra lanin’ny kalalao.
  - type: text
    content: Eny tokoa fa ny olona rehetra
  - type: text
    content: dia toa tsio-drivotra mandalo.
  - type: text
    content: Fiatoana
  '13':
  - type: text
    content: TOMPO ô, henoy ny vavaka ataoko
  - type: text
    content: ary mandrenesa ny fitarainako;
  - type: text
    content: aza odian-tsy hita ny ranomasoko
  - type: text
    content: fa olona nasaina aho no eto aminao,
  - type: text
    content: mpivahiny ihany toy ny razako rehetra.
  '14':
  - type: text
    content: Mba ampiatoy ny famaizanao
  - type: text
    content: hahazoako mitsiky indray,
  - type: text
    content: alohan’ny hahalasanako
  - type: text
    content: ho any amin’ny varo-tsy mifody.
  '2':
  - type: text
    content: 'Hoy aho hoe: «Hotandremako ny fitondrantenako'
  - type: text
    content: mba tsy hanota amin’ny teniko aho.
  - type: text
    content: Hataoko toy ny tampina ny vavako,
  - type: text
    content: raha mbola eo anatrehako ny olon-dratsy.»
  '3':
  - type: text
    content: Koa tena nangina mihitsy aho,
  - type: text
    content: tsy nivolana na dia tsy nahasoa aza.
  - type: text
    content: Vao mainka nitombo ny fijaliako,
  '4':
  - type: text
    content: nandevilevy ny foko tato anatiko,
  - type: text
    content: toy ny doran’ny afo ny eritreritro,
  - type: text
    content: ka tamin’ny farany aho nahateny hoe
  - type: note
    content: Jereo Sal 32.3-5.
  - type: text
    content: ':'
  '5':
  - type: text
    content: TOMPO ô, ampahafantaro ahy
  - type: text
    content: rahoviana no hifarana ny fiainako
  - type: text
    content: ary hafiriana sisa no ahavelomako;
  - type: text
    content: aoka ho fantatro fa mihelina aho!
  '6':
  - type: text
    content: Indro fohy dia fohy tokoa ny androm-piainako;
  - type: text
    content: ka ny fisiako toy ny tsinontsinona eo anatrehanao.
  - type: text
    content: Eny, ny olona rehetra matanjaka aza
  - type: text
    content: dia toa tsio-drivotra mandalo;
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: eny tokoa fa ny olombelona
  - type: text
    content: dia toa aloka miserana ihany!
  - type: text
    content: Misahirana tsy misy antony izy,
  - type: text
    content: manangon-karena nefa tsy mahalala
  - type: text
    content: izay hanjary ho tompon’izany.
  '8':
  - type: text
    content: Ary ankehitriny, Tompo ô,
  - type: text
    content: inona no azoko andrasana?
  - type: text
    content: Ianao ihany no antenaiko.
  '9':
  - type: text
    content: Afaho amin’izay rehetra mpamadika ahy aho,
  - type: text
    content: aza avela ho fanakòran’ireo adala.
