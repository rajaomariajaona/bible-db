document_id: 2TI.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny toetran’ny olona any am-parany any
  - type: text
    content: 'Aoka ho fantatrao fa any am-parany any dia hisy fotoana sarotra; '
  '10':
  - type: text
    content: 'Fa ianao kosa efa nanaraka tsara ny fampianarako, ny fitondrantenako, ny foto-pisainako, ny finoako, ny fandeferako, ny fitiavako, ny faharetako, '
  '11':
  - type: text
    content: ny fanenjehana ahy ary ny fijaliana nanjo ahy. Fantatrao avokoa izay nihatra tamiko tany Antiôkia, tany Ikôniôma, tany Listra, mbamin’ireo fanenjehana nianjady tamiko; kanefa dia nafahan’ny Tompo tamin’izany rehetra izany aho
  - type: note
    content: 'Antiôkia (any Pisidia), Ikôniôma, Listra: jereo Asa 13–14. –kanefa... izany aho: ampit Sal 34.20.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Eny, izay te hiaina araka ny maha mpivavaka tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa dia hoenjehina. '
  '13':
  - type: text
    content: 'Fa ny olona ratsy fanahy sy mpanoloky dia vao mainka hiharatsy hatrany, sady mamitaka no voafitaka. '
  '14':
  - type: text
    content: Ianao kosa, mahareta tsara amin’izay nianaranao sy nekenao tokoa; satria fantatrao ireo olona nampianatra anao izany
  - type: note
    content: Jereo 1.5; 2.2.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Hatramin’ny fahazazànao no efa nahalalanao ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' izay manome fahendrena anao hahazoanao famonjena, noho ny finoanao an’i Kristy Jesoa. '
  '16':
  - type: text
    content: Ny Soratra Masina rehetra dia nomen’ny tsindrimandrin’Andriamanitra sady mahasoa
  - type: note
    content: 'Ny Soratra Masina rehetra... mahasoa: dkt hafa Ny Soratra Masina rehetra nomen’ny tsindrimandrin’Andriamanitra dia mahasoa.'
  - type: text
    content: 'hampianarana ny marina, hendresen-dahatra, hanitsiana ny diso, hanabeazana ho tia rariny, '
  '17':
  - type: text
    content: mba hahatonga ny olon’Andriamanitra ho tsara ofana sy ary fitaovana hanao asa soa isan-karazany.
  '2':
  - type: text
    content: 'satria ho tia tena ny olona, ho matimatim-bola, ho mpandoka tena, ho mpiavonavona, ho mpanevateva an’Andriamanitra, tsy hanoa ray aman-dreny, tsy hahay mankasitraka, tsy hanaja ny zavatra masina, '
  '3':
  - type: text
    content: 'tsy hifaditra ovana, tsy hitsimbina fihavanana, ho mpanendrikendrika, tsy hahafehy tena, hisetrasetra, hankahala ny tsara, '
  '4':
  - type: text
    content: 'ho mpamadika, ho kirîna, ho mpieboebo, hankamamy ny fahafinaretana toy izay hankamamy an’Andriamanitra, '
  '5':
  - type: text
    content: 'hitana ny endrika ivelany isehoan’ny fivavahana nefa mandà ny heriny. Halaviro ireny olona ireny! '
  '6':
  - type: text
    content: 'Fa isan’ireny izay misokosoko miditra an-tranon’olona ka mambabo vehivavy adala ivangongoam-pahotana sy ifandroritam-pilàna maro, '
  '7':
  - type: text
    content: 'vehivavy mianatra lalandava nefa tsy afaka hahalala ny fampianarana marim-pototra na oviana na oviana. '
  '8':
  - type: text
    content: Tahaka ny nanoheran-dry i Janà sy i Jambrà
  - type: note
    content: Janà sy Jambrà dia anarana niantsoan’ny lovantsofina jiosy an’ireo mpanao majika tany Ejipta voalaza ao amin’ny Eks 7.11, 22 sns.
  - type: text
    content: ' an’i Mosesy no anoheran-dry zareo ny fampianarana marim-pototra; fa ireo dia olona efa maloto saina, ary ny finoany efa tsy azo antoka. '
  '9':
  - type: text
    content: Kanefa tsy handroso intsony ireo, satria haseho amin’ny olona rehetra toy ny an’i Janà sy i Jambrà koa ny hadalàny.
  - type: heading
    content: Anatranatra farany ho an’i Timôty
