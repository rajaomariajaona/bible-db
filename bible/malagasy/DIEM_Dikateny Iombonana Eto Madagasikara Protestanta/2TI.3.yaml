document_id: 2TI.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny toetran’ny olona any am-parany any
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aoka ho fantatrao fa any am-parany any dia hisy fotoana sarotra; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'satria ho tia tena ny olona, ho matimatim-bola, ho mpandoka tena, ho mpiavonavona, ho mpanevateva an’Andriamanitra, tsy hanoa ray aman-dreny, tsy hahay mankasitraka, tsy hanaja ny zavatra masina, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tsy hifaditra ovana, tsy hitsimbina fihavanana, ho mpanendrikendrika, tsy hahafehy tena, hisetrasetra, hankahala ny tsara, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ho mpamadika, ho kirîna, ho mpieboebo, hankamamy ny fahafinaretana toy izay hankamamy an’Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'hitana ny endrika ivelany isehoan’ny fivavahana nefa mandà ny heriny. Halaviro ireny olona ireny! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa isan’ireny izay misokosoko miditra an-tranon’olona ka mambabo vehivavy adala ivangongoam-pahotana sy ifandroritam-pilàna maro, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'vehivavy mianatra lalandava nefa tsy afaka hahalala ny fampianarana marim-pototra na oviana na oviana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tahaka ny nanoheran-dry i Janà sy i Jambrà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Janà '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Jambrà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia anarana niantsoan’ny lovantsofina jiosy an’ireo mpanao majika tany Ejipta voalaza ao amin’ny Eks 7.11, 22 sns.'
    marker-yv: yv-n
  - type: text
    text: ' an’i Mosesy no anoheran-dry zareo ny fampianarana marim-pototra; fa ireo dia olona efa maloto saina, ary ny finoany efa tsy azo antoka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Kanefa tsy handroso intsony ireo, satria haseho amin’ny olona rehetra toy ny an’i Janà sy i Jambrà koa ny hadalàny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anatranatra farany ho an’i Timôty
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ianao kosa efa nanaraka tsara ny fampianarako, ny fitondrantenako, ny foto-pisainako, ny finoako, ny fandeferako, ny fitiavako, ny faharetako, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ny fanenjehana ahy ary ny fijaliana nanjo ahy. Fantatrao avokoa izay nihatra tamiko tany Antiôkia, tany Ikôniôma, tany Listra, mbamin’ireo fanenjehana nianjady tamiko; kanefa dia nafahan’ny Tompo tamin’izany rehetra izany aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Antiôkia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(any Pisidia), '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Ikôniôma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Listra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Asa 13–14. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kanefa... izany aho:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Sal 34.20.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eny, izay te hiaina araka ny maha mpivavaka tafaray amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa dia hoenjehina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ny olona ratsy fanahy sy mpanoloky dia vao mainka hiharatsy hatrany, sady mamitaka no voafitaka. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ianao kosa, mahareta tsara amin’izay nianaranao sy nekenao tokoa; satria fantatrao ireo olona nampianatra anao izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.5; 2.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hatramin’ny fahazazànao no efa nahalalanao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' izay manome fahendrena anao hahazoanao famonjena, noho ny finoanao an’i Kristy Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny Soratra Masina rehetra dia nomen’ny tsindrimandrin’Andriamanitra sady mahasoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny Soratra Masina rehetra... mahasoa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny Soratra Masina rehetra nomen’ny tsindrimandrin’Andriamanitra dia mahasoa.
    marker-yv: yv-n
  - type: text
    text: 'hampianarana ny marina, hendresen-dahatra, hanitsiana ny diso, hanabeazana ho tia rariny, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: mba hahatonga ny olon’Andriamanitra ho tsara ofana sy ary fitaovana hanao asa soa isan-karazany.
