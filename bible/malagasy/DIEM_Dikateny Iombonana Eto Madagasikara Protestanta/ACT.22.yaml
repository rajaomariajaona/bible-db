document_id: ACT.22,396
type_code: plt
verses:
  '1':
  - type: text
    content: –Ianareo havana sy ianareo ray aman-dreny, henoy ny teny alahatro aminareo ankehitriny mba hiarovako tena.
  '10':
  - type: text
    content: 'Dia nanontany indray aho hoe: «Tompo ô, inona no tokony hataoko?» Dia hoy ny Tompo tamiko: «Mitsangàna, mankanesa ao Damasy, ka ao ianao no hilazana izay rehetra asain’Andriamanitra hataonao.» '
  '11':
  - type: text
    content: Tsy nahita ny masoko, azon’ilay hazavana mamirapiratra teo, ka dia notantanan’ny mpiara-dia tamiko aho vao tonga tao Damasy.
  '12':
  - type: text
    content: 'Tao Damasy dia nisy lehilahy atao hoe Hananià, izay mpivavaka tsara sy mpanaraka ny lalànantsika sady tsara laza tamin’ny mponina jiosy rehetra tao an-tanàna. '
  '13':
  - type: text
    content: 'Tonga tao amiko izy, nijoro teo anilako ary nanao hoe: «Ry Saoly rahalahiko, mahirata!» Dia nahiratra teo no ho eo aho ka nahita azy. '
  '14':
  - type: text
    content: 'Fa hoy i Hananià: «Efa voafidin’ilay Andriamanitry ny razantsika ianao mba hahafantatra ny sitrapony ary hahita an’ilay hany Marina sy handre ny teny aloaky ny vavany. '
  '15':
  - type: text
    content: 'Ho vavolombelon’ilay hany marina ianao ka hanambara amin’ny olona rehetra ny zavatra efa hitanao sy renao. '
  '16':
  - type: text
    content: 'Koa inona ankehitriny no andrasanao? Mitsangàna, antsoy ny anaran’i Jesoa ary aoka hatao '
  - type: text
    content: batisa
  - type: text
    content: ' ianao ka ho voasasa amin’ny fahotanao.»'
  - type: heading
    content: Nirahina ho amin’ny hafa firenena i Paoly
  '17':
  - type: text
    content: –Tafaverina tany Jerosalema aho, ka raha mbola nivavaka tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' dia nisehoam-pahitana. '
  '18':
  - type: text
    content: 'Hitako ny Tompo ary izao no teniny tamiko: «Malakia ianao, ialao faingana i Jerosalema, fa ny mponina eto tsy hiraharaha ny fijoroanao ho vavolombelona hanambara Ahy.» '
  '19':
  - type: text
    content: 'Dia novaliako hoe: «Tompo ô, fantany tsara fa mpitety ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' aho ary nataoko am-ponja sy nasaiko nodarofana kapoka ny mpino Anao. '
  '2':
  - type: text
    content: 'Nony henon’ny olona fa teny aramianina no nitenenan’i Paoly taminy, dia vao mainka nangina izy rehetra. Ary hoy i Paoly:'
  '20':
  - type: text
    content: Ary tamin’ny namonoana an’i Stefàna vavolombelona nanambara Anao, dia teo koa aho. Nankasitrahiko ireo namono nahafaty azy, ary izaho no mpitan-damban’izy rehetra
  - type: note
    content: Jereo 7.58; 8.1.
  - type: text
    content: '.» '
  '21':
  - type: text
    content: 'Dia hoy ny Tompo tamiko: «Mandehana fa Izaho no haniraka anao any lavitra, ho amin’ny hafa firenena.»'
  - type: heading
    content: I Paoly sy ny komandy rômanina
  '22':
  - type: text
    content: 'Nihaino an’i Paoly hatrany hatrany ny olona; fa nony mby tamin’ireo teny ireo, dia velona antsoantso mafy hoe:'
  - type: text
    content: –Esory amin’ny tany ny karazan’olona toy itony, fa tsy mendrika ho velona!
  '23':
  - type: text
    content: 'Horakoraka, tsipy lamba ary tora-bovoka ny an’ny olona amin’izany! '
  '24':
  - type: text
    content: 'Ka nanome baiko ny komandy hampidirana an’i Paoly ao amin’ny toby sy hikapohana azy mba hanerena azy hiteny, hahafantarana ny anton’ny anakoràna azy toy izao. '
  '25':
  - type: text
    content: 'Efa voafatotra hokapohina i Paoly no niteny tamin’ilay kapiteny nanatrika teo hoe:'
  - type: text
    content: –Azonareo kapohina ve ny olona mizaka ny zom-pirenena rômanina, na dia tsy mbola voatsara aza
  - type: note
    content: Jereo 16.37 sy nta.
  - type: text
    content: '?'
  '26':
  - type: text
    content: 'Nony nandre izany teny izany ilay kapiteny, dia nandeha nampandre ny komandy sady nilaza hoe:'
  - type: text
    content: –Inona ity hataonao? Olona mizaka ny zom-pirenena rômanina io lehilahy io.
  '27':
  - type: text
    content: 'Nanatona an’i Paoly kosa ny komandy ka nanontany azy hoe:'
  - type: text
    content: –Hono ho’aho, mizaka ny zom-pirenena rômanina ve ianao?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Eny.
  '28':
  - type: text
    content: 'Ary izao no tenin’ny komandy:'
  - type: text
    content: –Izaho dia vola be tokoa no naloako hizakako ny zom-pirenena rômanina.
  - type: text
    content: 'Fa hoy i Paoly:'
  - type: text
    content: –Izaho kosa vao teraka dia efa nizaka izany.
  '29':
  - type: text
    content: Niaraka tamin’izay dia nihataka ry zareo efa ndeha hikapoka an’i Paoly hanerena azy hiteny; natahotra mbamin’ilay komandy aza nony nahalala fa mizaka zom-pirenena rômanina i Paoly, satria izy komandy no efa nampamatotra azy.
  - type: heading
    content: Miatrika ny Fitsarana ambony i Paoly
  '3':
  - type: text
    content: –Izaho dia Jiosy teraka tany Tarsa any Silisia, fa nobeazina teto amin’ity tanànan’i Jerosalema ity; ny mpampianatra ahy dia i Gamaliela
  - type: note
    content: 'Gamaliela: jereo 5.34 sy nta.'
  - type: text
    content: ' izay nampahalala ahy tsara ny '
  - type: text
    content: lalànan
  - type: text
    content: '’ny razantsika. Nafana fo tamin’ny fanompoana an’Andriamanitra aho, tahaka anareo rehetra ankehitriny. '
  '30':
  - type: text
    content: Te hahalala marina izay anton’ny niampangan’ny Jiosy an’i Paoly ity komandy; noho izany, dia nasainy novahana izy ny ampitson’iny ary nampiantsoiny hivory ny lohandoha-mpisorona sy ny Fitsarana ambony manontolo. Dia nentin’ilay komandy i Paoly, ka najorony hiatrika azy rehetra.
  '4':
  - type: text
    content: 'Nenjehiko nataoko maty aza ireo mpanaraka ny lalana nosoritan’ny Tompo. Nosamboriko na lahy na vavy ka nampidiriko am-ponja. '
  '5':
  - type: text
    content: 'Ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' rehetra no vavolombelona fa marina ny filàzako. Taminy manko no nahazoako taratasy ho an’ny Jiosy tany Damasy fony aho nandeha hisambotra ny mpino tao hoentina hofaizina atỳ Jerosalema'
  - type: note
    content: 'And 4-5: jereo 8.3; 9.1-2.'
  - type: text
    content: .
  - type: heading
    content: Tantarain’i Paoly ny niovany fo
  - type: heading
    content: (Jereo Asa 9.1-19; 26.12-18)
  '6':
  - type: text
    content: '–Raha nandeha aho ka mby teo akaikin’i Damasy, dia indro, tampotampoka teo, tokony ho tamin’ny mitataovovonana, nisy hazavana lehibe avy tany an-danitra nanodidina ahy. '
  '7':
  - type: text
    content: 'Niankarapoka tamin’ny tany aho ary injay nisy feo reko niteny tamiko hoe; «Saoly, Saoly, nahoana no manenjika Ahy ianao?» '
  '8':
  - type: text
    content: 'Izaho kosa nanontany hoe: «Iza moa izato Ianao, Tompoko?» Ary hoy ilay feo tamiko: «Izaho no i Jesoa avy any Nazareta, Ilay enjehinao.» '
  '9':
  - type: text
    content: 'Ny mpiara-dia tamiko dia nahita ilay hazavana, nefa sy mba nandre ny feon’ilay niteny tamiko. '
