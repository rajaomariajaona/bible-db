document_id: ACT.22,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: –Ianareo havana sy ianareo ray aman-dreny, henoy ny teny alahatro aminareo ankehitriny mba hiarovako tena.
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nanontany indray aho hoe: «Tompo ô, inona no tokony hataoko?» Dia hoy ny Tompo tamiko: «Mitsangàna, mankanesa ao Damasy, ka ao ianao no hilazana izay rehetra asain’Andriamanitra hataonao.» '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tsy nahita ny masoko, azon’ilay hazavana mamirapiratra teo, ka dia notantanan’ny mpiara-dia tamiko aho vao tonga tao Damasy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tao Damasy dia nisy lehilahy atao hoe Hananià, izay mpivavaka tsara sy mpanaraka ny lalànantsika sady tsara laza tamin’ny mponina jiosy rehetra tao an-tanàna. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tonga tao amiko izy, nijoro teo anilako ary nanao hoe: «Ry Saoly rahalahiko, mahirata!» Dia nahiratra teo no ho eo aho ka nahita azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa hoy i Hananià: «Efa voafidin’ilay Andriamanitry ny razantsika ianao mba hahafantatra ny sitrapony ary hahita an’ilay hany Marina sy handre ny teny aloaky ny vavany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ho vavolombelon’ilay hany marina ianao ka hanambara amin’ny olona rehetra ny zavatra efa hitanao sy renao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Koa inona ankehitriny no andrasanao? Mitsangàna, antsoy ny anaran’i Jesoa ary aoka hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' ianao ka ho voasasa amin’ny fahotanao.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Nirahina ho amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' i Paoly'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: –Tafaverina tany Jerosalema aho, ka raha mbola nivavaka tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ' dia nisehoam-pahitana. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hitako ny Tompo ary izao no teniny tamiko: «Malakia ianao, ialao faingana i Jerosalema, fa ny mponina eto tsy hiraharaha ny fijoroanao ho vavolombelona hanambara Ahy.» '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia novaliako hoe: «Tompo ô, fantany tsara fa mpitety ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' aho ary nataoko am-ponja sy nasaiko nodarofana kapoka ny mpino Anao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nony henon’ny olona fa teny aramianina no nitenenan’i Paoly taminy, dia vao mainka nangina izy rehetra. Ary hoy i Paoly:'
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary tamin’ny namonoana an’i Stefàna vavolombelona nanambara Anao, dia teo koa aho. Nankasitrahiko ireo namono nahafaty azy, ary izaho no mpitan-damban’izy rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 7.58; 8.1.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia hoy ny Tompo tamiko: «Mandehana fa Izaho no haniraka anao any lavitra, ho amin’ny hafa firenena.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Paoly sy ny komandy rômanina
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nihaino an’i Paoly hatrany hatrany ny olona; fa nony mby tamin’ireo teny ireo, dia velona antsoantso mafy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Esory amin’ny tany ny karazan’olona toy itony, fa tsy mendrika ho velona!
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Horakoraka, tsipy lamba ary tora-bovoka ny an’ny olona amin’izany! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ka nanome baiko ny komandy hampidirana an’i Paoly ao amin’ny toby sy hikapohana azy mba hanerena azy hiteny, hahafantarana ny anton’ny anakoràna azy toy izao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Efa voafatotra hokapohina i Paoly no niteny tamin’ilay kapiteny nanatrika teo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Azonareo kapohina ve ny olona mizaka ny zom-pirenena rômanina, na dia tsy mbola voatsara aza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.37 sy nta.
      marker-yv: yv-n
    - type: text
      text: '?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nony nandre izany teny izany ilay kapiteny, dia nandeha nampandre ny komandy sady nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona ity hataonao? Olona mizaka ny zom-pirenena rômanina io lehilahy io.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nanatona an’i Paoly kosa ny komandy ka nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hono ho’aho, mizaka ny zom-pirenena rômanina ve ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary izao no tenin’ny komandy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho dia vola be tokoa no naloako hizakako ny zom-pirenena rômanina.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Paoly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho kosa vao teraka dia efa nizaka izany.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Niaraka tamin’izay dia nihataka ry zareo efa ndeha hikapoka an’i Paoly hanerena azy hiteny; natahotra mbamin’ilay komandy aza nony nahalala fa mizaka zom-pirenena rômanina i Paoly, satria izy komandy no efa nampamatotra azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Miatrika ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fitsarana ambony
    - type: text
      text: ' i Paoly'
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: –Izaho dia Jiosy teraka tany Tarsa any Silisia, fa nobeazina teto amin’ity tanànan’i Jerosalema ity; ny mpampianatra ahy dia i Gamaliela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gamaliela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 5.34 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' izay nampahalala ahy tsara ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànan
    - type: text
      text: '’ny razantsika. Nafana fo tamin’ny fanompoana an’Andriamanitra aho, tahaka anareo rehetra ankehitriny. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Te hahalala marina izay anton’ny niampangan’ny Jiosy an’i Paoly ity komandy; noho izany, dia nasainy novahana izy ny ampitson’iny ary nampiantsoiny hivory ny lohandoha-mpisorona sy ny Fitsarana ambony manontolo. Dia nentin’ilay komandy i Paoly, ka najorony hiatrika azy rehetra.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nenjehiko nataoko maty aza ireo mpanaraka ny lalana nosoritan’ny Tompo. Nosamboriko na lahy na vavy ka nampidiriko am-ponja. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorombe
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' rehetra no vavolombelona fa marina ny filàzako. Taminy manko no nahazoako taratasy ho an’ny Jiosy tany Damasy fony aho nandeha hisambotra ny mpino tao hoentina hofaizina atỳ Jerosalema'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.5 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 4-5:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 8.3; 9.1-2.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tantarain’i Paoly ny niovany fo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Asa 9.1-19; 26.12-18)
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '–Raha nandeha aho ka mby teo akaikin’i Damasy, dia indro, tampotampoka teo, tokony ho tamin’ny mitataovovonana, nisy hazavana lehibe avy tany an-danitra nanodidina ahy. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Niankarapoka tamin’ny tany aho ary injay nisy feo reko niteny tamiko hoe; «Saoly, Saoly, nahoana no manenjika Ahy ianao?» '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izaho kosa nanontany hoe: «Iza moa izato Ianao, Tompoko?» Ary hoy ilay feo tamiko: «Izaho no i Jesoa avy any Nazareta, Ilay enjehinao.» '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny mpiara-dia tamiko dia nahita ilay hazavana, nefa sy mba nandre ny feon’ilay niteny tamiko. '
