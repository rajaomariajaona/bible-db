document_id: EST.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tonga mpanjakavavy i Estera
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany, rehefa nionona ny fahatezeran’ny amperôra Kserksesa, dia nahatsiaro izay efa nataon’i Vastỳ sy izay tinapaka ny aminy izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nolazain’i Estera ny fireneny na firazanany, satria nopeperan’i Môrdôkay izy mba tsy hilaza izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Môrdôkay kosa nitsangantsangana isan’andro teo anoloan’ny kianjan’ny tranom-behivavy mba hahafantarany ny toe-pahasalaman’i Estera sy izay anaovan’ny olona azy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandritra ny herintaona, ireto tovovavy ireto dia nanaraka ny fomba fikarakaran-tena sahaza ny vehivavy, ka enim-bolana notrorina menaka misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: miora
    - type: text
      text: ' ary enim-bolana notrorina ilomanitra sy zavatra isan-karazany fampiasam-behivavy. Rehefa tapitra izany herintaona izany, dia mandeha tsirairay any amin’ny amperôra Kserksesa ireo tovovavy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony miala ny tranom-behivavy mba hiditra ao an-dapa razazavavy, dia nomena azy ny zavatra rehetra nilainy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny hariva izy no mandeha any amin’ny amperôra, ary ny ampitso maraina kosa lasa mankao amin’ilay trano faharoa fitoeram-behivavy, iandraiketan’i Sahasgaza tandapa mpitandrina ny vaditsindranon’ny amperôra. Tsy mba miverina any amin’ny amperôra intsony ireto vehivavy ireto, afa-tsy raha irin’ny amperôra ka tononony anarana.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro, dia anjaran’i Estera zanakavavin’i Abihaîla rahalahin-drain’i Môrdôkay sady zanaka natsangan’i Môrdôkay rahateo ny mandeha any amin’ny amperôra. Tsy nila na inona na inona razazavavy, afa-tsy izay natoron’i Hegay tandapa mpitandrina ny vehivavy; kanefa i Estera dia nahazo fitia teo imason’ny olona rehetra nahita azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nentina hankao an-dapa ho any amin’ny amperôra izy tamin’ny taona fahafito nanjakan’i Kserksesa, volana fahafolo na volana Tebeta. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naharaiki-pitia ny amperôra mihoatra noho ny vehivavy hafa i Estera; ka tamin’ireo tovovavy rehetra ireo, dia izy no nahazo fitia sy fanambinana teo anatrehan’ny amperôra. Ary nosatrohan’i Kserksesa ny satroboninahi-piandrianana izy sady nambarany ho mpanjakavavy hisolo an’i Vastỳ. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanao fanasana ny amperôra ho fanomezam-boninahitra an’i Estera ka niantso izay rehetra andriambaventiny sy mpandraharahany izy. Nisy hetra nofoanany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hetra nofoanany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tsy mazava ny hevitry ny voambolana hebreo nadika araka izany; ny dkt latinina tranainy dia ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: andro tsy fiasana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ho an’ireo mponina isam-paritra eran’ny fanjakany sady nisy fanomezana be nataony, satria nalala-tanana tokoa izy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nisy famoriana tovovavy fanindroany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tsy fantatra mazava ny anton’ity '
      - type: usfm
        marker: it
        children:
        - type: text
          text: famoriana tovovavy fanindroany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ity, kanefa mety ho fikasana te hanongana an’i Estera izay nahery lanja tokoa tamin’ny amperôra.'
      marker-yv: yv-n
    - type: text
      text: ', ka tamin’izay i Môrdôkay efa mpiasam-panjakana tao an-dapan’ny amperôra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ireo tandapa mpanompon’ny amperôra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka ianao, ry andriamanjaka, hitadiavana tovovavy virijiny sady tsara tarehy! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Estera kosa tsy nilaza ny firazanany na fireneny araka ny nameperan’i Môrdôkay azy; satria nankatoavin’i Estera hatrany ny tenin’i Môrdôkay tahaka ny fony izy mbola notezainy ihany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misy teti-dratsy hitan’i Môrdôkay
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany, raha nanao ny asam-panjakana tao an-dapa i Môrdôkay, dia tezitra tamin’i Kserksesa i Bigtana sy i Taresa anisan’ny tandapa mpiambina teo am-baravaran’ny efitranon’ny amperôra; ka nitady hamono an’i Kserksesa izy roa lahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatr’i Môrdôkay io tetika io ka nambarany tamin’i Estera mpanjakavavy izay nampita izany tamin’ny amperôra kosa, ho filazana avy amin’i Môrdôkay. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nofotorana izany zavatra izany, dia hita fa marina; ka dia nahantona tamin’ny hazo izy roa lahy. Ary teo anatrehan’ny amperôra no nanoratana izany raharaha izany tao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo amperôra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny boky milohateny hoe Asan’ireo amperôra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny fomba fahagolan-tany, dia noraketina an-tsoratra tanaty boky anankiray ny zava-baventy nitranga nandritra ny fanjakan’ny mpanjaka anankiray.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Anendreo olona any amin’ny faritany isan-tokony eran’ny fanjakanao, dia aoka ireo no hamory ny tovovavy virijiny sady tsara tarehy ho atỳ Sosany renivohitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'i '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sosany renivohitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. I Hegay, tandapa mpiandraikitra ny tranom-behivavy, no hitandrina azy sady hanome ny fitaovana hikarakarany tena; '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ka izay tovovavy sitrakao no ho mpanjakavavy solon’i Vastỳ.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sitraky ny amperôra izany torohevitra izany ka dia narahiny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nisy Jiosy anankiray nantsoina hoe Môrdôkay tao Sosany renivohitra; izy io dia lehilahy benjaminita zanak’i Jaîro, izay taranak’i Simehỳ sy i Kisy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kisy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia rain’i Saoly. I Môrdôkay izany dia taranak’i Saoly.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anisan’ireo nobaboin’i Nebokadnetsara mpanjakan’i Babilôna izy, ka nentiny avy tany Jerosalema niaraka tamin’i Jekônià mpanjakan’i Joda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Io famaboana nataon’i Nebokadnetsara io dia tamin’ny taona 597 tal J.K..
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nitaiza an’i Hadasà (na hoe Estera)
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hadasà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no anarana jiosy nentin-drazazavavy. Ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Estera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' kosa dia anarana babilônianina fiantsoana azy.'
      marker-yv: yv-n
    - type: text
      text: ' zanakavavin’ny rahalahin-drainy izy. Soa sady tsara tarehy razazavavy ary rehefa maty irainy sy ireniny, dia natsangan’i Môrdôkay ho zanany.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tafaely ny didy aman-dalànan’ny amperôra, dia tovovavy maro no voavory tao Sosany renivohitra mba hiandraiketan’i Hegay. Anisan’ireo nentina ho ao an-dapan’ny amperôra koa i Estera ka niandraiketan’i Hegay mpitandrina ny vehivavy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahazo fanambinana teo anatrehan’i Hegay i Estera, satria nahafinaritra azy ny toetran-drazazavavy: nomeny faingana azy ny fitaovana hikarakarany tena sy ny anjara sakafony ary koa mpanompovavy fito izay voafantina manokana avy tao an-dapa; dia nafindrany ho ao amin’ny efitra tsara indrindra tao amin’ny tranom-behivavy izy sy ireo mpanompovaviny. '
