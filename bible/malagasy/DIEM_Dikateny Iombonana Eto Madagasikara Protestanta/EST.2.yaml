document_id: EST.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tonga mpanjakavavy i Estera
  - type: text
    content: 'Taorian’izany, rehefa nionona ny fahatezeran’ny amperôra Kserksesa, dia nahatsiaro izay efa nataon’i Vastỳ sy izay tinapaka ny aminy izy. '
  '10':
  - type: text
    content: 'Tsy nolazain’i Estera ny fireneny na firazanany, satria nopeperan’i Môrdôkay izy mba tsy hilaza izany. '
  '11':
  - type: text
    content: I Môrdôkay kosa nitsangantsangana isan’andro teo anoloan’ny kianjan’ny tranom-behivavy mba hahafantarany ny toe-pahasalaman’i Estera sy izay anaovan’ny olona azy.
  '12':
  - type: text
    content: 'Nandritra ny herintaona, ireto tovovavy ireto dia nanaraka ny fomba fikarakaran-tena sahaza ny vehivavy, ka enim-bolana notrorina menaka misy '
  - type: text
    content: miora
  - type: text
    content: ' ary enim-bolana notrorina ilomanitra sy zavatra isan-karazany fampiasam-behivavy. Rehefa tapitra izany herintaona izany, dia mandeha tsirairay any amin’ny amperôra Kserksesa ireo tovovavy. '
  '13':
  - type: text
    content: 'Nony miala ny tranom-behivavy mba hiditra ao an-dapa razazavavy, dia nomena azy ny zavatra rehetra nilainy; '
  '14':
  - type: text
    content: ny hariva izy no mandeha any amin’ny amperôra, ary ny ampitso maraina kosa lasa mankao amin’ilay trano faharoa fitoeram-behivavy, iandraiketan’i Sahasgaza tandapa mpitandrina ny vaditsindranon’ny amperôra. Tsy mba miverina any amin’ny amperôra intsony ireto vehivavy ireto, afa-tsy raha irin’ny amperôra ka tononony anarana.
  '15':
  - type: text
    content: 'Indray andro, dia anjaran’i Estera zanakavavin’i Abihaîla rahalahin-drain’i Môrdôkay sady zanaka natsangan’i Môrdôkay rahateo ny mandeha any amin’ny amperôra. Tsy nila na inona na inona razazavavy, afa-tsy izay natoron’i Hegay tandapa mpitandrina ny vehivavy; kanefa i Estera dia nahazo fitia teo imason’ny olona rehetra nahita azy. '
  '16':
  - type: text
    content: 'Nentina hankao an-dapa ho any amin’ny amperôra izy tamin’ny taona fahafito nanjakan’i Kserksesa, volana fahafolo na volana Tebeta. '
  '17':
  - type: text
    content: 'Naharaiki-pitia ny amperôra mihoatra noho ny vehivavy hafa i Estera; ka tamin’ireo tovovavy rehetra ireo, dia izy no nahazo fitia sy fanambinana teo anatrehan’ny amperôra. Ary nosatrohan’i Kserksesa ny satroboninahi-piandrianana izy sady nambarany ho mpanjakavavy hisolo an’i Vastỳ. '
  '18':
  - type: text
    content: Dia nanao fanasana ny amperôra ho fanomezam-boninahitra an’i Estera ka niantso izay rehetra andriambaventiny sy mpandraharahany izy. Nisy hetra nofoanany
  - type: note
    content: 'hetra nofoanany: tsy mazava ny hevitry ny voambolana hebreo nadika araka izany; ny dkt latinina tranainy dia ahitana hoe andro tsy fiasana.'
  - type: text
    content: ho an’ireo mponina isam-paritra eran’ny fanjakany sady nisy fanomezana be nataony, satria nalala-tanana tokoa izy.
  '19':
  - type: text
    content: Dia nisy famoriana tovovavy fanindroany
  - type: note
    content: Tsy fantatra mazava ny anton’ity famoriana tovovavy fanindroany ity, kanefa mety ho fikasana te hanongana an’i Estera izay nahery lanja tokoa tamin’ny amperôra.
  - type: text
    content: ', ka tamin’izay i Môrdôkay efa mpiasam-panjakana tao an-dapan’ny amperôra. '
  '2':
  - type: text
    content: 'Ka hoy ireo tandapa mpanompon’ny amperôra hoe:'
  - type: text
    content: '–Aoka ianao, ry andriamanjaka, hitadiavana tovovavy virijiny sady tsara tarehy! '
  '20':
  - type: text
    content: I Estera kosa tsy nilaza ny firazanany na fireneny araka ny nameperan’i Môrdôkay azy; satria nankatoavin’i Estera hatrany ny tenin’i Môrdôkay tahaka ny fony izy mbola notezainy ihany.
  - type: heading
    content: Misy teti-dratsy hitan’i Môrdôkay
  '21':
  - type: text
    content: 'Tamin’izany andro izany, raha nanao ny asam-panjakana tao an-dapa i Môrdôkay, dia tezitra tamin’i Kserksesa i Bigtana sy i Taresa anisan’ny tandapa mpiambina teo am-baravaran’ny efitranon’ny amperôra; ka nitady hamono an’i Kserksesa izy roa lahy. '
  '22':
  - type: text
    content: 'Fantatr’i Môrdôkay io tetika io ka nambarany tamin’i Estera mpanjakavavy izay nampita izany tamin’ny amperôra kosa, ho filazana avy amin’i Môrdôkay. '
  '23':
  - type: text
    content: 'Rehefa nofotorana izany zavatra izany, dia hita fa marina; ka dia nahantona tamin’ny hazo izy roa lahy. Ary teo anatrehan’ny amperôra no nanoratana izany raharaha izany tao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo amperôra
  - type: note
    content: 'ny boky milohateny hoe Asan’ireo amperôra: araka ny fomba fahagolan-tany, dia noraketina an-tsoratra tanaty boky anankiray ny zava-baventy nitranga nandritra ny fanjakan’ny mpanjaka anankiray.'
  - type: text
    content: .
  '3':
  - type: text
    content: Anendreo olona any amin’ny faritany isan-tokony eran’ny fanjakanao, dia aoka ireo no hamory ny tovovavy virijiny sady tsara tarehy ho atỳ Sosany renivohitra
  - type: note
    content: 'i Sosany renivohitra: jereo 1.2 sy nta.'
  - type: text
    content: '. I Hegay, tandapa mpiandraikitra ny tranom-behivavy, no hitandrina azy sady hanome ny fitaovana hikarakarany tena; '
  '4':
  - type: text
    content: ka izay tovovavy sitrakao no ho mpanjakavavy solon’i Vastỳ.
  - type: text
    content: Sitraky ny amperôra izany torohevitra izany ka dia narahiny.
  '5':
  - type: text
    content: Nisy Jiosy anankiray nantsoina hoe Môrdôkay tao Sosany renivohitra; izy io dia lehilahy benjaminita zanak’i Jaîro, izay taranak’i Simehỳ sy i Kisy
  - type: note
    content: I Kisy dia rain’i Saoly. I Môrdôkay izany dia taranak’i Saoly.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Anisan’ireo nobaboin’i Nebokadnetsara mpanjakan’i Babilôna izy, ka nentiny avy tany Jerosalema niaraka tamin’i Jekônià mpanjakan’i Joda
  - type: note
    content: Io famaboana nataon’i Nebokadnetsara io dia tamin’ny taona 597 tal J.K..
  - type: text
    content: '. '
  '7':
  - type: text
    content: Nitaiza an’i Hadasà (na hoe Estera)
  - type: note
    content: I Hadasà no anarana jiosy nentin-drazazavavy. Ny hoe Estera kosa dia anarana babilônianina fiantsoana azy.
  - type: text
    content: ' zanakavavin’ny rahalahin-drainy izy. Soa sady tsara tarehy razazavavy ary rehefa maty irainy sy ireniny, dia natsangan’i Môrdôkay ho zanany.'
  '8':
  - type: text
    content: 'Nony tafaely ny didy aman-dalànan’ny amperôra, dia tovovavy maro no voavory tao Sosany renivohitra mba hiandraiketan’i Hegay. Anisan’ireo nentina ho ao an-dapan’ny amperôra koa i Estera ka niandraiketan’i Hegay mpitandrina ny vehivavy. '
  '9':
  - type: text
    content: 'Nahazo fanambinana teo anatrehan’i Hegay i Estera, satria nahafinaritra azy ny toetran-drazazavavy: nomeny faingana azy ny fitaovana hikarakarany tena sy ny anjara sakafony ary koa mpanompovavy fito izay voafantina manokana avy tao an-dapa; dia nafindrany ho ao amin’ny efitra tsara indrindra tao amin’ny tranom-behivavy izy sy ireo mpanompovaviny. '
