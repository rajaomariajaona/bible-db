document_id: JER.18,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jeremià tao amin’ny mpanefy tanimanga
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy baiko avy amin’ny TOMPO ho an’i Jeremià nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa raha manao izay ratsy eo imasoko izy ka tsy mihaino ny feoko, dia hiova hevitra Aho amin’ny soa izay nampanantenaiko hatao aminy.
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Ankehitriny, ry Jeremià, mitenena amin’ny olon’i Joda sy ny mponin’i Jerosalema, ka ambarao aminy hoe: ‹Izao no lazain’ny TOMPO: Indro efa namolavola loza hamelezana anareo Aho, ary eo am-panomanana ny tetika hampiharana izany. Koa samia miala amin’ny fitondrantena ratsy avy ianareo ary ovay ho tsara ny fitondrantenanareo sy ny asanareo.› »'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo nifikitra tamin’ny ditram-pony sy ny firehan-dratsiny izy ka namaly hoe: «Mamoiza! Izay efa tapakay ihany no hataonay.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hadinon’i Israely ny Tompony
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Noho izany dia izao no lazain’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba anontanio ange any amin’ny firenen-kafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mba nisy nandrenesana zavatra toy izao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-mahatsiravina loatra ity nataon’i Israely.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa ve ny harambato eny an-tsaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ilaozan’ny oram-panalan’i Libano?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa mba efa ritra ve ny rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mikoriana mangatsiatsiaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any an-tany hafa any? Tsia.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny vahoakako kosa nanadino Ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nandoro zava-manitra mifangaro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ireo sampy tsinontsinona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nandavo azy teny an-dalany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hialany amin’ny lalana mahazatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampandeha azy tamin’ny lalan-kely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mbola tsy voasoritra akory.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Io vahoakako io no nahatonga ny taniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampahonena sy hampivarahontsana mandrakizay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ny olona rehetra mandalo azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mivanàka sady mihifikifi-doha.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny vovoka tsofin’ny rivotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any atsinanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hampielezako ny vahoakako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anoloan’ny fahavalony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny androm-pahavoazany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiambohoako izy fa tsy hatrehiko!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiokoana tamin’i Jeremià sy ny vavaka nataony
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny olona hoe: «Andeha isika hanao tetika hamelezana an’i Jeremià, fa tsy ho foana akory ny mpisorona hanome fampianarana, na ny olon-kendry hanolo-tsaina na ny mpaminany hampita ny tenin’Andriamanitra. Andeha hasiantsika amin’ny fanalam-baràka izy, ka tsy horaharahaintsika akory izay lazainy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 4.9; 8.9. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: fa tsy ho foana...Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': dkt hafa aroso indraindray '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fa hisy hatrany fampianarana avy amin’ny mpisorona*
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: it
        children:
        - type: text
          text: torohevitra avy amin’ny olon-kendry ary tenin’Andriamanitra avy amin’ny mpaminany*
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fa tsy ho foana ny fampianarana na tsisy mpisorona aza, tsy ho foana ny torohevitra na tsisy olon-kendry aza ary tsy ho foana ny tenin’Andriamanitra na tsisy mpaminany aza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .»
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, hevero tsara ny amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary henoy ny tenin’ireo miampanga ahy.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitsangàna, ary midîna any an-tranon’ny mpanefy tanimanga, fa any no hampandrenesako anao ny teniko.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tokony hovaliana ratsy ve ny soa?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa izy manomana fandrika hamely ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao kosa, ry Tompo, aoka hahatsiaro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nitsangana nitaraina teo anatrehanao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hialan’ny fahatezeranao taminy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany, avelao ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fatin’ny mosary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tenan’ireo mpiampanga ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: poteho amin’ny sabatra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny vadiny ho maty anaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho tonga mpitondratena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny lehilahy lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haripaky ny areti-mandringana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zatovony ho faty an’ady.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny fidradradradrana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho re avy ao an-tranony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa hataonao tonga tampoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny andia-miaramila hamely azy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa namela-pandrika hisamborana ahy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanafina harato haningorana ny tongotro.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, fantatrao avokoa ny teti-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nokotrehiny hamonoana ahy ho faty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka aza avelanao ny helony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza kosehinao ny hadisoany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho lavo eo anatrehanao izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary asio amin’ny androm-pahatezeranao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nidina tao an-tranon’ny mpanefy tanimanga aho, ka indro izy nanao ny asany teo ambony kodia fanodinana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha simba ny vilany ataony fa mety hitranga amin’ny tanimanga eo an-tanan’ny mpanefy ihany izany, dia anaovany vilany hafa indray iny araka izay tiany hanaovana azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanafatra ahy ny TOMPO hoe: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Moa tsy afaka manao aminareo toy izay ataon’ity mpanefy tanimanga ity va Aho, ry olon’i Israely, hoy ny fanontaniana hentitra avy amiko TOMPO? Indro eo an-tanako ianareo, tahaka ny tanimanga eo an-tanan’ny mpanefy azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indraindray dia milaza ny hanongotra sy hanjera ary handrava firenena iray na fanjakana iray Aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa raha miala amin’ny ratsy izay nahatonga ny fandrahonako izy, dia hiova hevitra amin’ny loza izay nokasaiko hamelezana azy Aho. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indraindray dia milaza ny hanorina sy hamboly firenena iray na fanjakana iray Aho. '
