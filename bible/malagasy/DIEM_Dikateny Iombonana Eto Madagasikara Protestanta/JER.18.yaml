document_id: JER.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jeremià tao amin’ny mpanefy tanimanga
  - type: text
    content: 'Nisy baiko avy amin’ny TOMPO ho an’i Jeremià nanao hoe:'
  '10':
  - type: text
    content: Nefa raha manao izay ratsy eo imasoko izy ka tsy mihaino ny feoko, dia hiova hevitra Aho amin’ny soa izay nampanantenaiko hatao aminy.
  '11':
  - type: text
    content: '«Ankehitriny, ry Jeremià, mitenena amin’ny olon’i Joda sy ny mponin’i Jerosalema, ka ambarao aminy hoe: ‹Izao no lazain’ny TOMPO: Indro efa namolavola loza hamelezana anareo Aho, ary eo am-panomanana ny tetika hampiharana izany. Koa samia miala amin’ny fitondrantena ratsy avy ianareo ary ovay ho tsara ny fitondrantenanareo sy ny asanareo.› »'
  '12':
  - type: text
    content: 'Kanjo nifikitra tamin’ny ditram-pony sy ny firehan-dratsiny izy ka namaly hoe: «Mamoiza! Izay efa tapakay ihany no hataonay.»'
  - type: heading
    content: Hadinon’i Israely ny Tompony
  '13':
  - type: text
    content: 'Noho izany dia izao no lazain’ny TOMPO:'
  - type: text
    content: Mba anontanio ange any amin’ny firenen-kafa
  - type: text
    content: raha mba nisy nandrenesana zavatra toy izao!
  - type: text
    content: Zava-mahatsiravina loatra ity nataon’i Israely.
  '14':
  - type: text
    content: Moa ve ny harambato eny an-tsaha
  - type: text
    content: mba ilaozan’ny oram-panalan’i Libano?
  - type: text
    content: Moa mba efa ritra ve ny rano
  - type: text
    content: izay mikoriana mangatsiatsiaka
  - type: text
    content: avy any an-tany hafa any? Tsia.
  '15':
  - type: text
    content: Fa ny vahoakako kosa nanadino Ahy,
  - type: text
    content: ka nandoro zava-manitra mifangaro
  - type: text
    content: tamin’ireo sampy tsinontsinona
  - type: text
    content: izay nandavo azy teny an-dalany
  - type: text
    content: mba hialany amin’ny lalana mahazatra
  - type: text
    content: ary nampandeha azy tamin’ny lalan-kely
  - type: text
    content: izay mbola tsy voasoritra akory.
  '16':
  - type: text
    content: Io vahoakako io no nahatonga ny taniny
  - type: text
    content: hampahonena sy hampivarahontsana mandrakizay.
  - type: text
    content: Ka ny olona rehetra mandalo azy
  - type: text
    content: dia mivanàka sady mihifikifi-doha.
  '17':
  - type: text
    content: Tahaka ny vovoka tsofin’ny rivotra
  - type: text
    content: avy any atsinanana
  - type: text
    content: no hampielezako ny vahoakako
  - type: text
    content: eo anoloan’ny fahavalony.
  - type: text
    content: Amin’ny androm-pahavoazany
  - type: text
    content: dia hiambohoako izy fa tsy hatrehiko!
  - type: heading
    content: Ny fiokoana tamin’i Jeremià sy ny vavaka nataony
  '18':
  - type: text
    content: 'Dia hoy ny olona hoe: «Andeha isika hanao tetika hamelezana an’i Jeremià, fa tsy ho foana akory ny mpisorona hanome fampianarana, na ny olon-kendry hanolo-tsaina na ny mpaminany hampita ny tenin’Andriamanitra. Andeha hasiantsika amin’ny fanalam-baràka izy, ka tsy horaharahaintsika akory izay lazainy'
  - type: note
    content: 'Jereo 4.9; 8.9. –fa tsy ho foana...Andriamanitra: dkt hafa aroso indraindray fa hisy hatrany fampianarana avy amin’ny mpisorona*, torohevitra avy amin’ny olon-kendry ary tenin’Andriamanitra avy amin’ny mpaminany* na hoe fa tsy ho foana ny fampianarana na tsisy mpisorona aza, tsy ho foana ny torohevitra na tsisy olon-kendry aza ary tsy ho foana ny tenin’Andriamanitra na tsisy mpaminany aza.'
  - type: text
    content: .»
  '19':
  - type: text
    content: TOMPO ô, hevero tsara ny amiko
  - type: text
    content: ary henoy ny tenin’ireo miampanga ahy.
  '2':
  - type: text
    content: –Mitsangàna, ary midîna any an-tranon’ny mpanefy tanimanga, fa any no hampandrenesako anao ny teniko.
  '20':
  - type: text
    content: Moa tokony hovaliana ratsy ve ny soa?
  - type: text
    content: Nefa izy manomana fandrika hamely ahy
  - type: text
    content: Ianao kosa, ry Tompo, aoka hahatsiaro
  - type: text
    content: fa nitsangana nitaraina teo anatrehanao aho
  - type: text
    content: mba hialan’ny fahatezeranao taminy.
  '21':
  - type: text
    content: Noho izany, avelao ny zanany
  - type: text
    content: ho fatin’ny mosary;
  - type: text
    content: ary ny tenan’ireo mpiampanga ahy
  - type: text
    content: poteho amin’ny sabatra.
  - type: text
    content: Aoka ny vadiny ho maty anaka
  - type: text
    content: sy ho tonga mpitondratena.
  - type: text
    content: Aoka ny lehilahy lehibe
  - type: text
    content: haripaky ny areti-mandringana
  - type: text
    content: ary ny zatovony ho faty an’ady.
  '22':
  - type: text
    content: Aoka ny fidradradradrana
  - type: text
    content: no ho re avy ao an-tranony,
  - type: text
    content: rehefa hataonao tonga tampoka
  - type: text
    content: ny andia-miaramila hamely azy!
  - type: text
    content: Fa namela-pandrika hisamborana ahy izy
  - type: text
    content: sy nanafina harato haningorana ny tongotro.
  '23':
  - type: text
    content: TOMPO ô, fantatrao avokoa ny teti-dratsy
  - type: text
    content: nokotrehiny hamonoana ahy ho faty.
  - type: text
    content: Ka aza avelanao ny helony
  - type: text
    content: ary aza kosehinao ny hadisoany.
  - type: text
    content: Aoka ho lavo eo anatrehanao izy,
  - type: text
    content: ary asio amin’ny androm-pahatezeranao.
  '3':
  - type: text
    content: 'Dia nidina tao an-tranon’ny mpanefy tanimanga aho, ka indro izy nanao ny asany teo ambony kodia fanodinana. '
  '4':
  - type: text
    content: 'Ary raha simba ny vilany ataony fa mety hitranga amin’ny tanimanga eo an-tanan’ny mpanefy ihany izany, dia anaovany vilany hafa indray iny araka izay tiany hanaovana azy. '
  '5':
  - type: text
    content: 'Dia nanafatra ahy ny TOMPO hoe: '
  '6':
  - type: text
    content: '«Moa tsy afaka manao aminareo toy izay ataon’ity mpanefy tanimanga ity va Aho, ry olon’i Israely, hoy ny fanontaniana hentitra avy amiko TOMPO? Indro eo an-tanako ianareo, tahaka ny tanimanga eo an-tanan’ny mpanefy azy. '
  '7':
  - type: text
    content: 'Indraindray dia milaza ny hanongotra sy hanjera ary handrava firenena iray na fanjakana iray Aho. '
  '8':
  - type: text
    content: 'Nefa raha miala amin’ny ratsy izay nahatonga ny fandrahonako izy, dia hiova hevitra amin’ny loza izay nokasaiko hamelezana azy Aho. '
  '9':
  - type: text
    content: 'Ary indraindray dia milaza ny hanorina sy hamboly firenena iray na fanjakana iray Aho. '
