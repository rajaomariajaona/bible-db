document_id: MAT.7,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manainga tsy hanameloka olona i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 6.37-38, 41-42)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Aza mitsara olona, dia tsy hotsarain’Andriamanitra ianareo; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na hangatahany trondro ka hanome bibilava azy? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa raha ianareo, na dia ratsy aza, mahalala manome zava-tsoa ny zanakareo, mainka fa ny Rainareo Izay any an-danitra no hanome zava-tsoa ho an’izay mangataka aminy!
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany àry, ataovy amin’ny olona izay rehetra tianareo hataon’ny olona aminareo; fa izany no vontoatin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànan
    - type: text
      text: '’i Mosesy mbamin’ny fampianaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Rm 13.8-10.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vavahady èty
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 13.24)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Midira amin’ny vavahady èty ianareo! Fa lehibe ny vavahady mankany amin’ny fahaverezana ary malalaka ny lalana, ka maro no miditra any; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tena èty kosa ny vavahady mankany amin’ny fiainana ary tena tery ny lalana, ka vitsy no mahita azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hazo sy ny voany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 6.43-44)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Mitandrema amin’ny mpaminany sandoka: malemy paika toy ny ondry izy manatona anareo; kanefa ao anatiny, toy ny amboadia mandramatra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny asany no hahafantaranareo ny mpaminany sandoka: fa foto-tsilo tsy ahazoana voaloboka; ary songosongo tsy ahazoana voanaviavy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia toy izany: ny hazo tsara rehetra mamoa voa tsara; fa ny hazo ratsy rehetra mamoa voa ratsy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mba hazo tsara no mety hamoa voa ratsy, na hazo ratsy no mety hamoa voa tsara. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina, ka hatsipy ao anaty afo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa araka izay fomba hitsaranareo olona ihany no hitsaran’Andriamanitra anareo koa, ary araka izay fomba hamaranareo ho an’ny olona ihany no hamaran’Andriamanitra ho anareo koa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa dia ny asany no hahafantaranareo ny mpaminany sandoka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy fantatro na oviana na oviana ianareo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 13.25-27)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Tsy izay rehetra manao amiko hoe: «Tompo ô! Tompo ô!», no hiditra any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’ny lanitra
    - type: text
      text: ', fa izay manao ny sitrapon’ny Raiko Izay any an-danitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany, dia maro no hanao amiko hoe: «Tompo ô, Tompo ô, tsy efa nilaza hafatra tamin’ny anaranao ve izahay? tsy efa nandroaka demony tamin’ny anaranao ve izahay? tsy efa nanao asa mahagaga maro tamin’ny anaranao ve izahay?» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’izay no hanambarako aminy hoe: «Tsy fantatro na oviana na oviana ianareo; mialà amiko, ianareo mpanao ratsy!»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny orin-trano tsy mitovy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 6.47-49)
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Koa amin’izany, na zovy na zovy mihaino ireo teniko ireo ka manatanteraka azy dia ho tahaka ny lehilahy misaina, izay nanorina ny tranony teo ambony vatolampy: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'latsaka ny ranonorana, nitosaka ny riaka, nifofofofo ny rivotra ka samy namely izany trano izany; nefa tsy nianjera izy, satria niorina teo ambony vatolampy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay rehetra mihaino ireo teniko ireo ka tsy manatanteraka azy dia ho tahaka ny lehilahy tsy misaina, izay nanorina ny tranony teo ambony fasika: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: latsaka ny ranonorana, nitosaka ny riaka, nifofofofo ny rivotra ka samy namely izany trano izany; dia nianjera izy, ka loza ny faharavàny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampianatra amim-pahefana i Jesoa
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vitan’i Jesoa izany teny izany, dia talanjona ny vahoaka noho ny fomba fampianarany; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nampianatra azy tamim-pahefana manko i Jesoa fa tsy mba tahaka ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' jiosy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana moa ianao no mahita ny tapak’ahitra eo amin’ny mason’ny havana iray finoana, nefa ny vatan-kazo eo amin’ny masonao tsy tandrinao akory? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ahoana no hilazanao amin’ny havanao hoe: «Etsy hoesoriko ny tapak’ahitra eo amin’ny masonao», nefa jereo ange ity vatan-kazo eo amin’ny anao? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ry mpihatsaravelatsihy, esory aloha ny vatan-kazo eo amin’ny masonao; izay ianao vao hahiratra tsara ka hahaisotra ny tapak’ahitra eo amin’ny mason-kavana.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zava-masina, aza omena ny alika, fandrao hifoteran’ny alika ianareo ka hoviravirainy; ary ny vatosoanareo, aza atsipy amin’ny kisoa, fandrao voahosihosiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mangataha, mitadiava, dondòny
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 11.9-13)
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Mangataha dia homena ianareo; mitadiava dia hahita ianareo; dondòny dia hovohàna ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay rehetra mangataka no mahazo; izay mitady no mahita; ary izay mandondòna no hovohàna. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny hevitrareo, iza no olona hangatahan-janany mofo ka hanome vato azy? '
