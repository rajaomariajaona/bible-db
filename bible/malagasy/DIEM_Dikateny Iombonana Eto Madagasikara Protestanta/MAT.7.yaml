document_id: MAT.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manainga tsy hanameloka olona i Jesoa
  - type: heading
    content: (Jereo Lk 6.37-38, 41-42)
  - type: text
    content: '–Aza mitsara olona, dia tsy hotsarain’Andriamanitra ianareo; '
  '10':
  - type: text
    content: 'Na hangatahany trondro ka hanome bibilava azy? '
  '11':
  - type: text
    content: Koa raha ianareo, na dia ratsy aza, mahalala manome zava-tsoa ny zanakareo, mainka fa ny Rainareo Izay any an-danitra no hanome zava-tsoa ho an’izay mangataka aminy!
  '12':
  - type: text
    content: 'Noho izany àry, ataovy amin’ny olona izay rehetra tianareo hataon’ny olona aminareo; fa izany no vontoatin’ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy mbamin’ny fampianaran’ny '
  - type: text
    content: mpaminany
  - type: note
    content: Ampit Rm 13.8-10.
  - type: text
    content: .
  - type: heading
    content: Ny vavahady èty
  - type: heading
    content: (Jereo Lk 13.24)
  '13':
  - type: text
    content: '–Midira amin’ny vavahady èty ianareo! Fa lehibe ny vavahady mankany amin’ny fahaverezana ary malalaka ny lalana, ka maro no miditra any; '
  '14':
  - type: text
    content: tena èty kosa ny vavahady mankany amin’ny fiainana ary tena tery ny lalana, ka vitsy no mahita azy.
  - type: heading
    content: Ny hazo sy ny voany
  - type: heading
    content: (Jereo Lk 6.43-44)
  '15':
  - type: text
    content: '–Mitandrema amin’ny mpaminany sandoka: malemy paika toy ny ondry izy manatona anareo; kanefa ao anatiny, toy ny amboadia mandramatra. '
  '16':
  - type: text
    content: 'Ny asany no hahafantaranareo ny mpaminany sandoka: fa foto-tsilo tsy ahazoana voaloboka; ary songosongo tsy ahazoana voanaviavy. '
  '17':
  - type: text
    content: 'Dia toy izany: ny hazo tsara rehetra mamoa voa tsara; fa ny hazo ratsy rehetra mamoa voa ratsy. '
  '18':
  - type: text
    content: 'Tsy mba hazo tsara no mety hamoa voa ratsy, na hazo ratsy no mety hamoa voa tsara. '
  '19':
  - type: text
    content: 'Ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina, ka hatsipy ao anaty afo. '
  '2':
  - type: text
    content: 'fa araka izay fomba hitsaranareo olona ihany no hitsaran’Andriamanitra anareo koa, ary araka izay fomba hamaranareo ho an’ny olona ihany no hamaran’Andriamanitra ho anareo koa. '
  '20':
  - type: text
    content: Koa dia ny asany no hahafantaranareo ny mpaminany sandoka.
  - type: heading
    content: Tsy fantatro na oviana na oviana ianareo
  - type: heading
    content: (Jereo Lk 13.25-27)
  '21':
  - type: text
    content: '–Tsy izay rehetra manao amiko hoe: «Tompo ô! Tompo ô!», no hiditra any amin’ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ', fa izay manao ny sitrapon’ny Raiko Izay any an-danitra. '
  '22':
  - type: text
    content: 'Amin’izany andro izany, dia maro no hanao amiko hoe: «Tompo ô, Tompo ô, tsy efa nilaza hafatra tamin’ny anaranao ve izahay? tsy efa nandroaka demony tamin’ny anaranao ve izahay? tsy efa nanao asa mahagaga maro tamin’ny anaranao ve izahay?» '
  '23':
  - type: text
    content: 'Ary amin’izay no hanambarako aminy hoe: «Tsy fantatro na oviana na oviana ianareo; mialà amiko, ianareo mpanao ratsy!»'
  - type: heading
    content: Ny orin-trano tsy mitovy
  - type: heading
    content: (Jereo Lk 6.47-49)
  '24':
  - type: text
    content: '–Koa amin’izany, na zovy na zovy mihaino ireo teniko ireo ka manatanteraka azy dia ho tahaka ny lehilahy misaina, izay nanorina ny tranony teo ambony vatolampy: '
  '25':
  - type: text
    content: 'latsaka ny ranonorana, nitosaka ny riaka, nifofofofo ny rivotra ka samy namely izany trano izany; nefa tsy nianjera izy, satria niorina teo ambony vatolampy. '
  '26':
  - type: text
    content: 'Fa izay rehetra mihaino ireo teniko ireo ka tsy manatanteraka azy dia ho tahaka ny lehilahy tsy misaina, izay nanorina ny tranony teo ambony fasika: '
  '27':
  - type: text
    content: latsaka ny ranonorana, nitosaka ny riaka, nifofofofo ny rivotra ka samy namely izany trano izany; dia nianjera izy, ka loza ny faharavàny.
  - type: heading
    content: Mampianatra amim-pahefana i Jesoa
  '28':
  - type: text
    content: 'Rehefa vitan’i Jesoa izany teny izany, dia talanjona ny vahoaka noho ny fomba fampianarany; '
  '29':
  - type: text
    content: 'nampianatra azy tamim-pahefana manko i Jesoa fa tsy mba tahaka ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' jiosy.'
  '3':
  - type: text
    content: 'Nahoana moa ianao no mahita ny tapak’ahitra eo amin’ny mason’ny havana iray finoana, nefa ny vatan-kazo eo amin’ny masonao tsy tandrinao akory? '
  '4':
  - type: text
    content: 'Ary ahoana no hilazanao amin’ny havanao hoe: «Etsy hoesoriko ny tapak’ahitra eo amin’ny masonao», nefa jereo ange ity vatan-kazo eo amin’ny anao? '
  '5':
  - type: text
    content: Ry mpihatsaravelatsihy, esory aloha ny vatan-kazo eo amin’ny masonao; izay ianao vao hahiratra tsara ka hahaisotra ny tapak’ahitra eo amin’ny mason-kavana.
  '6':
  - type: text
    content: Ny zava-masina, aza omena ny alika, fandrao hifoteran’ny alika ianareo ka hoviravirainy; ary ny vatosoanareo, aza atsipy amin’ny kisoa, fandrao voahosihosiny.
  - type: heading
    content: Mangataha, mitadiava, dondòny
  - type: heading
    content: (Jereo Lk 11.9-13)
  '7':
  - type: text
    content: '–Mangataha dia homena ianareo; mitadiava dia hahita ianareo; dondòny dia hovohàna ianareo. '
  '8':
  - type: text
    content: 'Fa izay rehetra mangataka no mahazo; izay mitady no mahita; ary izay mandondòna no hovohàna. '
  '9':
  - type: text
    content: 'Araka ny hevitrareo, iza no olona hangatahan-janany mofo ka hanome vato azy? '
