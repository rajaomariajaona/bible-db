  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny taona fahafolo taorian’ny fahababoana, nony andro faha-12 tamin’ny volana fahafolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Desambra 588 Janoary 587 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ry ilay taranak’olombelona, mitodiha manandrify ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' mpanjakan’i Ejipta ianao, ka ijoroy ny maha-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' anao mba hamelezana azy sy ny tany Ejipta manontolo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny 29.2–32.32, jereo ny naoty momba ny Is 19.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: «Hirotsaka hamely anao Aho, ry Farao mpanjakan’i Ejipta, fa toy ny fanano goavana mamitsaka eo afovoan’ireo sakeli-dranon’i Neily ianao. Nolazainao fa anao io ony io satria ianao no namorona azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa hasiako farango vy ny valanoranonao sady haraikitro amin’ny kiranao ny trondro eo amin’ny oninao. Hampiakariko avy ao Neily ianao sy ireo trondro miraikitra amin’ny kiranao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hatsipiko any an-taniefitra ianao sy ireo trondro rehetra ireo. Ho faty mitsitra amin’ny tany ianao, ka tsy hisy hanangona ny taolambalonao na handevina azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny tsy mba halevina am-pasana dia noheverina ho famaizana ratsy indrindra, jereo 2 Mp 9.37; Jer 8.2; 22.19.
    marker-yv: yv-n
  - type: text
    text: '. Homeko hohanin’ny voromanidina sy ny bibidia ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’izay dia hoeken’ny mponina rehetra any Ejipta fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Ny fanampiana izay nomenao an’ireo Israelita dia marefo tahaka ny volotara. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nitehina taminao izy, kanjo vaky tao an-tanany ianao, ka nandratra azy tamin’ny sorony sy nampitolefika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nampitolefika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt siriaka tranainy izany, fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nanamafy.
    marker-yv: yv-n
  - type: text
    text: 'ny tehezany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY: Hahatonga tafika mirongo fiadiana hamely anao Aho, ka hofongorako tsy ho amin’ny taninao ny olona sy ny biby. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho tany rava sy lao i Ejipta; amin’izay dia hoekena fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Nolazainao fa anao i Neily ary ianao no namorona azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Noho izany dia hirotsaka hamely anao sy ny oninao Aho. Horavako i Ejipta, hataoko lao manomboka eo an-tanànan’i Migdola any avaratra ka hatrany an-tanànan’i Asoana sy ny sisin-tanin’i Etiôpia any atsimo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy misy olona na biby handia any intsony, fa ao anatin’ny efapolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'efapolo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 4.6 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' taona dia tsy hahitana zava-miaina mihitsy any. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hataoko tany lao dia lao i Ejipta; ary ho rava dia ho rava ireo tanànany. Haharitra efapolo taona izany mba hanereko ny Ejiptianina hiely any amin’ny firenen-kafa sy hiparitaka any an-tany hafa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '«Kanefa izao no lazain’ny Tompo ANDRIANANAHARY: Rehefa afaka efapolo taona, dia hangoniko avy amin’ny firenen-kafa izay nielezany ny Ejiptianina. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hatsahatro izay manjo ny Ejiptianina, ka haveriko any Ejipta ambony tany niaviany izy, ary hanorina fanjakana osaosa any; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ho osa noho ny fanjakana rehetra izy, ka tsy hisandratra ho ambonin’ny firenen-kafa intsony. Hahenako ny isany mba tsy hanjakazakany amin’ny firenen-kafa intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy ho tokin’ny Israelita intsony i Ejipta, ka tsy hampanao heloka azy hiantso vonjy any aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Filazana an-kolaka ireo fifanekena tamin’i Ejipta no ataon’i Ezekiela eto, jereo 17.15; 29.6, dia fifanekena izay efa nomelohin’ireo mpaminany hafa koa (jereo Is 30.2; Jer 2.18; Hôs 7.11).
    marker-yv: yv-n
  - type: text
    text: . Amin’izay dia hoekena fa Izaho no TOMPO.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hanafika an’i Ejipta i Nebokadnetsara mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tamin’ny taona faha-27 taorian’ny fahababoana, nony andro voalohan’ny volana voalohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe volana Marsa-Avrily 571 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: «Ry ilay taranak’olombelona, nanery ny tafiny hanao ezaka lehibe hamelezana ny tanànan’i Tiro i Nebokadnetsara mpanjakan’i Babilôna, hany ka efa sola avokoa ny lohan’ny miaramilany sady rotidrotika ny sorony. Nefa na izy mpanjaka na ireo miaramilany dia samy tsy nahita tombontsoa tamin’i Tiro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hanao ezaka lehibe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'naharitra 13 taona ny nanaovana fahirano an’i Tiro. – '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'ny loha sola sy ny soroka rotidrotika:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia noho ny enta-mavesatra nentin’ny miaramila. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tsy nahita tombontsoa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': resin’i Nebokadnetsara ihany tamin’ny farany i Tiro, nefa tsy afaka nandroba azy izy.'
    marker-yv: yv-n
  - type: text
    text: ' ho setrin’ny famelezany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hatolotro eo an-tanan’i Nebokadnetsara mpanjakan’i Babilôna i Ejipta. Horobainy sy hobaboiny avokoa izay ao; ka ny hareny rehetra dia hoentiny ary hataony karaman’ny miaramilany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Homeko azy ny tany Ejipta ho valin’ny asa nataony tao Tiro, satria ho Ahy no niasan’ny tafiny; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: «Rehefa tonga izany andro izany, dia hohavaoziko ny tanjaky ny Israelita. Ary ianao, ry Ezekiela, homeko fahefana hiteny eo aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 3.26; 24.27.
    marker-yv: yv-n
  - type: text
    text: ; ka dia hoekeny fa Izaho no TOMPO.»
