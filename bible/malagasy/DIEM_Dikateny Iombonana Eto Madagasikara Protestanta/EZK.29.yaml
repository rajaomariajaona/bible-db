document_id: EZK.29,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Loza mananontanona an’i Ejipta
  - type: text
    content: Tamin’ny taona fahafolo taorian’ny fahababoana, nony andro faha-12 tamin’ny volana fahafolo
  - type: note
    content: Desambra 588 Janoary 587 tal J.K.
  - type: text
    content: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: 'Noho izany dia hirotsaka hamely anao sy ny oninao Aho. Horavako i Ejipta, hataoko lao manomboka eo an-tanànan’i Migdola any avaratra ka hatrany an-tanànan’i Asoana sy ny sisin-tanin’i Etiôpia any atsimo. '
  '11':
  - type: text
    content: Tsy misy olona na biby handia any intsony, fa ao anatin’ny efapolo
  - type: note
    content: 'efapolo: jereo 4.6 sy nta.'
  - type: text
    content: ' taona dia tsy hahitana zava-miaina mihitsy any. '
  '12':
  - type: text
    content: Hataoko tany lao dia lao i Ejipta; ary ho rava dia ho rava ireo tanànany. Haharitra efapolo taona izany mba hanereko ny Ejiptianina hiely any amin’ny firenen-kafa sy hiparitaka any an-tany hafa.
  '13':
  - type: text
    content: '«Kanefa izao no lazain’ny Tompo ANDRIANANAHARY: Rehefa afaka efapolo taona, dia hangoniko avy amin’ny firenen-kafa izay nielezany ny Ejiptianina. '
  '14':
  - type: text
    content: 'Hatsahatro izay manjo ny Ejiptianina, ka haveriko any Ejipta ambony tany niaviany izy, ary hanorina fanjakana osaosa any; '
  '15':
  - type: text
    content: 'ho osa noho ny fanjakana rehetra izy, ka tsy hisandratra ho ambonin’ny firenen-kafa intsony. Hahenako ny isany mba tsy hanjakazakany amin’ny firenen-kafa intsony. '
  '16':
  - type: text
    content: Tsy ho tokin’ny Israelita intsony i Ejipta, ka tsy hampanao heloka azy hiantso vonjy any aminy
  - type: note
    content: Filazana an-kolaka ireo fifanekena tamin’i Ejipta no ataon’i Ezekiela eto, jereo 17.15; 29.6, dia fifanekena izay efa nomelohin’ireo mpaminany hafa koa (jereo Is 30.2; Jer 2.18; Hôs 7.11).
  - type: text
    content: . Amin’izay dia hoekena fa Izaho no TOMPO.»
  - type: heading
    content: Hanafika an’i Ejipta i Nebokadnetsara mpanjaka
  '17':
  - type: text
    content: Tamin’ny taona faha-27 taorian’ny fahababoana, nony andro voalohan’ny volana voalohany
  - type: note
    content: Izany hoe volana Marsa-Avrily 571 tal J.K.
  - type: text
    content: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '18':
  - type: text
    content: «Ry ilay taranak’olombelona, nanery ny tafiny hanao ezaka lehibe hamelezana ny tanànan’i Tiro i Nebokadnetsara mpanjakan’i Babilôna, hany ka efa sola avokoa ny lohan’ny miaramilany sady rotidrotika ny sorony. Nefa na izy mpanjaka na ireo miaramilany dia samy tsy nahita tombontsoa tamin’i Tiro
  - type: note
    content: 'hanao ezaka lehibe: naharitra 13 taona ny nanaovana fahirano an’i Tiro. – ny loha sola sy ny soroka rotidrotika: dia noho ny enta-mavesatra nentin’ny miaramila. –tsy nahita tombontsoa: resin’i Nebokadnetsara ihany tamin’ny farany i Tiro, nefa tsy afaka nandroba azy izy.'
  - type: text
    content: ' ho setrin’ny famelezany azy. '
  '19':
  - type: text
    content: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hatolotro eo an-tanan’i Nebokadnetsara mpanjakan’i Babilôna i Ejipta. Horobainy sy hobaboiny avokoa izay ao; ka ny hareny rehetra dia hoentiny ary hataony karaman’ny miaramilany. '
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, mitodiha manandrify ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta ianao, ka ijoroy ny maha-'
  - type: text
    content: mpaminany
  - type: text
    content: ' anao mba hamelezana azy sy ny tany Ejipta manontolo'
  - type: note
    content: Momba ny 29.2–32.32, jereo ny naoty momba ny Is 19.1.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Homeko azy ny tany Ejipta ho valin’ny asa nataony tao Tiro, satria ho Ahy no niasan’ny tafiny; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.›
  '21':
  - type: text
    content: «Rehefa tonga izany andro izany, dia hohavaoziko ny tanjaky ny Israelita. Ary ianao, ry Ezekiela, homeko fahefana hiteny eo aminy
  - type: note
    content: Jereo 3.26; 24.27.
  - type: text
    content: ; ka dia hoekeny fa Izaho no TOMPO.»
  '3':
  - type: text
    content: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: «Hirotsaka hamely anao Aho, ry Farao mpanjakan’i Ejipta, fa toy ny fanano goavana mamitsaka eo afovoan’ireo sakeli-dranon’i Neily ianao. Nolazainao fa anao io ony io satria ianao no namorona azy. '
  '4':
  - type: text
    content: 'Koa hasiako farango vy ny valanoranonao sady haraikitro amin’ny kiranao ny trondro eo amin’ny oninao. Hampiakariko avy ao Neily ianao sy ireo trondro miraikitra amin’ny kiranao. '
  '5':
  - type: text
    content: Hatsipiko any an-taniefitra ianao sy ireo trondro rehetra ireo. Ho faty mitsitra amin’ny tany ianao, ka tsy hisy hanangona ny taolambalonao na handevina azy
  - type: note
    content: Ny tsy mba halevina am-pasana dia noheverina ho famaizana ratsy indrindra, jereo 2 Mp 9.37; Jer 8.2; 22.19.
  - type: text
    content: '. Homeko hohanin’ny voromanidina sy ny bibidia ianao. '
  '6':
  - type: text
    content: Amin’izay dia hoeken’ny mponina rehetra any Ejipta fa Izaho no TOMPO.
  - type: text
    content: '«Ny fanampiana izay nomenao an’ireo Israelita dia marefo tahaka ny volotara. '
  '7':
  - type: text
    content: Nitehina taminao izy, kanjo vaky tao an-tanany ianao, ka nandratra azy tamin’ny sorony sy nampitolefika
  - type: note
    content: 'nampitolefika: araka ny dkt siriaka tranainy izany, fa ny RM kosa manao hoe nanamafy.'
  - type: text
    content: 'ny tehezany. '
  '8':
  - type: text
    content: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY: Hahatonga tafika mirongo fiadiana hamely anao Aho, ka hofongorako tsy ho amin’ny taninao ny olona sy ny biby. '
  '9':
  - type: text
    content: Ho tany rava sy lao i Ejipta; amin’izay dia hoekena fa Izaho no TOMPO.
  - type: text
    content: '«Nolazainao fa anao i Neily ary ianao no namorona azy. '
