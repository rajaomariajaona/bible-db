document_id: PSA.138,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Midera Anao amin’ny foko manontolo aho
  - type: text
    content: ' '
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Tompo ô, midera Anao amin’ny foko manontolo aho
  - type: text
    content: sady mankalaza Anao eo anatrehan’ireo anjely;
  '2':
  - type: text
    content: 'Miankohoka mitodika ny '
  - type: text
    content: tempolinao
  - type: text
    content: ' masina aho'
  - type: text
    content: sy midera Anao noho ny fitiavanao mahatoky,
  - type: text
    content: fa ny lazanao sy ny fampanantenànao
  - type: text
    content: dia nataonao ambonin’ny zava-drehetra.
  '3':
  - type: text
    content: Tamin’ny andro nitarainako, dia novalianao aho
  - type: text
    content: ka nampitomboinao ny hery tao anatiko.
  '4':
  - type: text
    content: TOMPO ô, hidera Anao avokoa ny mpanjakan’ny tany,
  - type: text
    content: rehefa handre ny fampanantenana voalazanao.
  '5':
  - type: text
    content: 'Hihira ny amin’ny sori-dàlanao izy ireo hanao hoe:'
  - type: text
    content: '«Eny, lehibe ny '
  - type: text
    content: voninahitry
  - type: text
    content: ' ny TOMPO!'
  '6':
  - type: text
    content: Fa na dia avo toerana aza IZY,
  - type: text
    content: dia mijery ny manetry tena;
  - type: text
    content: saingy ny mpiavonavona kosa
  - type: text
    content: dia fantany avy eny lavitra eny.»
  '7':
  - type: text
    content: Na mizotra eo anivom-pahoriana aza aho,
  - type: text
    content: dia hamelombelona ny aiko Ianao;
  - type: text
    content: na misafoaka amiko aza ny fahavaloko,
  - type: text
    content: dia haneho hery hampandresy ahy Ianao.
  '8':
  - type: text
    content: TOMPO ô, hotanterahinao amiko izany.
  - type: text
    content: Maharitra mandrakizay ny fitiavanao, TOMPO ô,
  - type: text
    content: ka aza atsahatra ny asa ataonao.
