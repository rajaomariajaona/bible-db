document_id: PSA.138,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Midera Anao amin’ny foko manontolo aho
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, midera Anao amin’ny foko manontolo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mankalaza Anao eo anatrehan’ireo anjely;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Miankohoka mitodika ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempolinao
    - type: text
      text: ' masina aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy midera Anao noho ny fitiavanao mahatoky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lazanao sy ny fampanantenànao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nataonao ambonin’ny zava-drehetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny andro nitarainako, dia novalianao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampitomboinao ny hery tao anatiko.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, hidera Anao avokoa ny mpanjakan’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa handre ny fampanantenana voalazanao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hihira ny amin’ny sori-dàlanao izy ireo hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Eny, lehibe ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahitry
    - type: text
      text: ' ny TOMPO!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia avo toerana aza IZY,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mijery ny manetry tena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy ny mpiavonavona kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fantany avy eny lavitra eny.»
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mizotra eo anivom-pahoriana aza aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hamelombelona ny aiko Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na misafoaka amiko aza ny fahavaloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia haneho hery hampandresy ahy Ianao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, hotanterahinao amiko izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maharitra mandrakizay ny fitiavanao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aza atsahatra ny asa ataonao.
