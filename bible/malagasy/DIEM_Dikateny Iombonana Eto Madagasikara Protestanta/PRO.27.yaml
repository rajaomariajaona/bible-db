document_id: PRO.27,396
type_code: plt
verses:
  '1':
  - type: text
    content: Aza mirehareha ny amin’ny ho ampitso ianao;
  - type: text
    content: fa izay hiseho anio aza tsy fantatrao akory
  - type: note
    content: Jereo Jak 4.13-16.
  - type: text
    content: .
  '10':
  - type: text
    content: Aza mahafoy ny sakaizanao na ny naman-drainao.
  - type: text
    content: Raha tojo fahasahiranana ianao,
  - type: text
    content: aza mankany amin’ny rahalahinao,
  - type: text
    content: fa tsara kokoa ny mpifanila akaiky
  - type: text
    content: noho ny rahalahy lavitra.
  '11':
  - type: text
    content: Hendre, anaka, ary ampifalio ny foko
  - type: text
    content: mba hamaliako izay miteny ratsy ahy.
  '12':
  - type: text
    content: Mahatsinjo ny loza ny malina ka miery,
  - type: text
    content: fa ny kely saina kosa mandroso ka voa.
  '13':
  - type: text
    content: Raha misy olona sahy miantoka trosan’olona vahiny,
  - type: text
    content: dia tano ny akanjony ho antoka ny amin’io olon-tsy fantatra io.
  '14':
  - type: text
    content: Izay manaitra namana vao maraina be
  - type: text
    content: satria niarahaba azy tamim-peo mahery
  - type: text
    content: dia tahaka ny manozona azy.
  '15':
  - type: text
    content: Ny vehivavy tia ady dia toy ny fantsona
  - type: text
    content: izay tsy mitsaha-mitete amin’ny andro manorana,
  '16':
  - type: text
    content: izay misakana azy dia toy ny misakan-drivotra
  - type: text
    content: na mamihina menaka amin-tanana ila.
  '17':
  - type: text
    content: Ny vy no andranitana ny vy;
  - type: text
    content: dia toy izany koa ny olona ihany
  - type: text
    content: no andranitana ny sain’olon-kafa.
  '18':
  - type: text
    content: Izay mikolokolo ny aviaviny hihinana ny voany
  - type: text
    content: ary izay mikarakara ny tompony homem-boninahitra.
  '19':
  - type: text
    content: Tahaka ny itarafanao ny tandindonao anatin’ny rano
  - type: text
    content: no itarafanao ny tenanao anatin’ny fonao.
  '2':
  - type: text
    content: Aoka ny olon-kafa na ny vahiny no hidera anao,
  - type: text
    content: fa tsy ny tenanao no hisoka-bava hanao izany.
  '20':
  - type: text
    content: Tsy mba mety voky ny fonenan’ny maty
  - type: text
    content: ary tsy mba mety afa-po ny mason’olombelona.
  '21':
  - type: text
    content: Misy ny memy fisedrana ny volafotsy
  - type: text
    content: ary ny fatana fandrendrehana ny volamena,
  - type: text
    content: fa ny lazany kosa no itsarana ny olona.
  '22':
  - type: text
    content: Na dia totoinao toy ny vary an-daona aza ny adala,
  - type: text
    content: dia tsy ho afaka aminy akory ny hadalàny.
  '23':
  - type: text
    content: Fantaro tsara ny toetoetry ny ondry aman’osinao
  - type: text
    content: ary tandremo fatratra ireo biby fiompinao;
  '24':
  - type: text
    content: satria ny harena akory tsy haharitra mandrakizay
  - type: text
    content: ary ny satroboninahitra tsy hateza
  - type: text
    content: hampitaina amin’ny taranaka mifandimby.
  '25':
  - type: text
    content: Tapaho ny ahitra eny an-tsaha,
  - type: text
    content: ka mandritra ny itsiran’ny solofony,
  - type: text
    content: dia angony ny vilo-maina eny an-tendrombohitra.
  '26':
  - type: text
    content: Manàna ondry hahazoanao fitafiana,
  - type: text
    content: manàna osilahy hahafahanao mividy saha;
  '27':
  - type: text
    content: ary hanome ronono be ny osivavinao
  - type: text
    content: ka hisy hamelomanao ny tenanao
  - type: text
    content: sy ny ankohonanao ary ny mpanompovavinao.
  '3':
  - type: text
    content: Mavesatra ny vato ary manan-danja ny fasika;
  - type: text
    content: fa manoatra noho izy roa tonta ny lolom-pon’ny adala.
  '4':
  - type: text
    content: Masiaka ny havinirana ary manafotra ny hatezerana,
  - type: text
    content: fa iza no mahajoro eo anoloan’ny fialonana?
  '5':
  - type: text
    content: Aleo fampitandremana tsy misorona
  - type: text
    content: toy izay fitia afinafenina.
  '6':
  - type: text
    content: Ny tsikera ataon-tsakaiza dia itokiana hahasoa
  - type: text
    content: fa ny oroky ny fahavalo kosa mamitaka
  - type: note
    content: 'mamitaka: dkt hafa tafahoatra.'
  - type: text
    content: .
  '7':
  - type: text
    content: Izay voky tsy mahahinan-tantely
  - type: text
    content: fa izay noana kosa mankamamy sakafo mangidy.
  '8':
  - type: text
    content: Toy ny vorona miriorio lavitry ny akaniny
  - type: text
    content: ny olona mirenireny lavitry ny fonenany.
  '9':
  - type: text
    content: Ny menaka fanosotra sy ny ranomanitra dia mahafaly ny fo
  - type: text
    content: fa ny fahoriana mampisafotofoto ny fanahy.
