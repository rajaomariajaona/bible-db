document_id: PRO.27
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza mirehareha ny amin’ny ho ampitso ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay hiseho anio aza tsy fantatrao akory
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jak 4.13-16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka ny olon-kafa na ny vahiny no hidera anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy ny tenanao no hisoka-bava hanao izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mavesatra ny vato ary manan-danja ny fasika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa manoatra noho izy roa tonta ny lolom-pon’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Masiaka ny havinirana ary manafotra ny hatezerana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza no mahajoro eo anoloan’ny fialonana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aleo fampitandremana tsy misorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay fitia afinafenina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny tsikera ataon-tsakaiza dia itokiana hahasoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny oroky ny fahavalo kosa mamitaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mamitaka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hafa tafahoatra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay voky tsy mahahinan-tantely
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay noana kosa mankamamy sakafo mangidy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toy ny vorona miriorio lavitry ny akaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona mirenireny lavitry ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny menaka fanosotra sy ny ranomanitra dia mahafaly ny fo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahoriana mampisafotofoto ny fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza mahafoy ny sakaizanao na ny naman-drainao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tojo fahasahiranana ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza mankany amin’ny rahalahinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsara kokoa ny mpifanila akaiky
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny rahalahy lavitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hendre, anaka, ary ampifalio ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamaliako izay miteny ratsy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mahatsinjo ny loza ny malina ka miery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny kely saina kosa mandroso ka voa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha misy olona sahy miantoka trosan’olona vahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tano ny akanjony ho antoka ny amin’io olon-tsy fantatra io.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izay manaitra namana vao maraina be
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria niarahaba azy tamim-peo mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka ny manozona azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny vehivavy tia ady dia toy ny fantsona
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy mitsaha-mitete amin’ny andro manorana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: izay misakana azy dia toy ny misakan-drivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mamihina menaka amin-tanana ila.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny vy no andranitana ny vy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany koa ny olona ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no andranitana ny sain’olon-kafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay mikolokolo ny aviaviny hihinana ny voany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mikarakara ny tompony homem-boninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tahaka ny itarafanao ny tandindonao anatin’ny rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: no itarafanao ny tenanao anatin’ny fonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy mba mety voky ny fonenan’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba mety afa-po ny mason’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Misy ny memy fisedrana ny volafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fatana fandrendrehana ny volamena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lazany kosa no itsarana ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Na dia totoinao toy ny vary an-daona aza ny adala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho afaka aminy akory ny hadalàny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fantaro tsara ny toetoetry ny ondry aman’osinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tandremo fatratra ireo biby fiompinao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: satria ny harena akory tsy haharitra mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny satroboninahitra tsy hateza
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampitaina amin’ny taranaka mifandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tapaho ny ahitra eny an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandritra ny itsiran’ny solofony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia angony ny vilo-maina eny an-tendrombohitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Manàna ondry hahazoanao fitafiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manàna osilahy hahafahanao mividy saha;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ary hanome ronono be ny osivavinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hisy hamelomanao ny tenanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny ankohonanao ary ny mpanompovavinao.
