  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa mba iza anefa ianao, ry olombelona, no mifamaly amin’Andriamanitra? Moa ve ny zavatra vita tamin’ny tanimanga hanao amin’ny mpanefy azy hoe: «Nahoana no toy izao no nanefenao ahy'
