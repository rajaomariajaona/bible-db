    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hisy angamba hilaza amiko hoe: Raha izany no izy, inona no mbola anomezan’Andriamanitra tsiny ny olona? Iza moa no mahatohitra ny sitrapony? '
  - type: usfm
    marker: v
    metadata:
