  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izany no ampahafantaran’Andriamanitra fa be voninahitra Izy ka manan-karena ho antsika izay fanaka amindrany fo sady efa voaomany rahateo hahazo voninahitra. '
  - type: usfm
    marker: v
