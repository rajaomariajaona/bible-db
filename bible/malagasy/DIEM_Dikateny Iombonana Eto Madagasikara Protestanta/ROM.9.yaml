      text: Farao
  - type: text
    text: ', mpanjakan’i Ejipta, hoe: «Izao no antony nanandratako anao ho mpanjaka, dia ny mba hanehoako ny heriko ao aminao ary mba hanambarana ny anarako eran’ny tany tontolo'
