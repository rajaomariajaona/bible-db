document_id: ROM.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra sy ny vahoaka Israely voafidiny
  - type: text
    content: 'Noho izaho tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ', dia ny marina no lazaiko ka tsy mandainga aho; ary tarihin’ny Fanahy Masina ny fieritreretako no mijoro ho vavolombelona miara-manambara amiko '
  '10':
  - type: text
    content: 'Ary tsy izany ihany fa tokana ny rain’ireo zanakalahin’i Rebekà, dia i Itsehàka razantsika. '
  '11':
  - type: text
    content: 'Andriamanitra anefa, mba haharetan’ny fikasany, dia mifidy olona; ary ny fifidianana dia tsy miankina amin’ny asa vitan’ny olona fa miankina amin’ny fiantsoan’Andriamanitra azy. Koa tsy mbola teraka akory ireo zaza ireo ary tsy mbola nanao tsara na nanao ratsy, dia izao no tenin’Andriamanitra tamin’i Rebekà: «Ny zokiny no hanompo ny zandriny'
  - type: note
    content: Gen 25.23.
  - type: text
    content: '!» '
  '13':
  - type: text
    content: 'Izany dia araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «I Jakôba no tiako, fa i Hesao nailiko'
  - type: note
    content: Mal 1.2-3.
  - type: text
    content: .»
  '14':
  - type: text
    content: 'Inona àry no holazaintsika? Misy zavatra tsy ara-drariny ve ao amin’Andriamanitra? Sanatria izany! '
  '15':
  - type: text
    content: 'Fa izao no lazain’Andriamanitra amin’i Mosesy: «Hamindra fo amin’izay tiako hamindrana'
  - type: note
    content: Eks 33.19.
  - type: text
    content: ' fo aho; ary hiantra an’izay tiako hiantrana!» '
  '16':
  - type: text
    content: 'Koa tsy izay fanirian’ny olona na izay fiezahany no ahazoany famindrampo fa Andriamanitra no mamindra fo aminy. '
  '17':
  - type: text
    content: 'Ao amin’ny Soratra Masina dia hoy Andriamanitra amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ', mpanjakan’i Ejipta, hoe: «Izao no antony nanandratako anao ho mpanjaka, dia ny mba hanehoako ny heriko ao aminao ary mba hanambarana ny anarako eran’ny tany tontolo'
  - type: note
    content: Eks 9.16, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '.» '
  '18':
  - type: text
    content: Koa izay tian’Andriamanitra hamindrana fo no amindrany fo, ary izay tiany hohamafisina fo no hamafisiny fo.
  - type: heading
    content: Ny fahatezeran’Andriamanitra sy ny famindrampony
  '19':
  - type: text
    content: 'Hisy angamba hilaza amiko hoe: Raha izany no izy, inona no mbola anomezan’Andriamanitra tsiny ny olona? Iza moa no mahatohitra ny sitrapony? '
  '2':
  - type: text
    content: 'fa mafy ny alaheloko ary tsy mitsahatra ny fahorian’ny foko; '
  '20':
  - type: text
    content: 'Fa mba iza anefa ianao, ry olombelona, no mifamaly amin’Andriamanitra? Moa ve ny zavatra vita tamin’ny tanimanga hanao amin’ny mpanefy azy hoe: «Nahoana no toy izao no nanefenao ahy'
  - type: note
    content: Ampit Is 19.16; 45.9.
  - type: text
    content: '?» '
  '21':
  - type: text
    content: 'Sa tsy manam-pahefana amin’ny tanimanga ve ny mpanefy? Moa tsy azony anaovana zavatra samihafa ve ny vongan-tanimanga anankiray: ka ny zavatra iray, fanaka mihaja; ny zavatra iray kosa, fanaka tsotsotra'
  - type: note
    content: Ampit Jer 18.6.
  - type: text
    content: '?'
  '22':
  - type: text
    content: 'Na dia te haneho ny fahatezerany sy te hampahafantatra ny heriny aza Andriamanitra, dia be fahari-po ka nandefitra tamintsika izay fanaka mendrika hirehetan’ny fahatezerany sy tokony hosimbana. '
  '23':
  - type: text
    content: 'Izany no ampahafantaran’Andriamanitra fa be voninahitra Izy ka manan-karena ho antsika izay fanaka amindrany fo sady efa voaomany rahateo hahazo voninahitra. '
  '24':
  - type: text
    content: 'Isika manko dia nantsoin’Andriamanitra, tsy avy tamin’ny Jiosy ihany fa avy tamin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' koa, '
  '25':
  - type: text
    content: 'araka ny lazainy ao amin’ny bokin’i Hôsea '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  - type: text
    content: «Ilay tsy vahoakako dia hantsoiko hoe vahoakako;
  - type: text
    content: ary ilay tsy malalako dia hantsoiko hoe malalako.
  '26':
  - type: text
    content: 'Ary eo amin’ny toerana nilazana taminy hoe:'
  - type: text
    content: ‹tsy vahoakako ianareo›,
  - type: text
    content: 'dia eo indrindra no hiantsoana azy hoe:'
  - type: text
    content: ‹zanak’Andriamanitra velona
  - type: note
    content: 'And 25: Hôs 2.25. And 26: Hôs 2.1.'
  - type: text
    content: ›. »
  '27':
  - type: text
    content: 'Ary i Isaià mpaminany dia miantsoantso ny amin’i '
  - type: text
    content: Israely
  - type: text
    content: ' hoe: «Na dia mifanisa amin’ny fasika eny amoron-dranomasina aza ny Israelita, dia izay hany sisa tavela tamin’izy ireo ihany no hovonjena; '
  '28':
  - type: text
    content: satria hampihàrin’ny Tompo tanteraka sy haingana eto ambonin’ny tany ny teniny
  - type: note
    content: 'And 27-28: Is 10.22-23, voatsiahy araka ny dkt tranainy Septoazinta.'
  - type: text
    content: '.» '
  '29':
  - type: text
    content: 'Ary izany dia araka izay voalazan’i Isaià taloha hoe:'
  - type: text
    content: «Raha tsy ny Tompon’izao rehetra izao
  - type: text
    content: no namela taranaka ho antsika,
  - type: text
    content: 'dia ho efa sahala amin’i '
  - type: text
    content: Sôdôma
  - type: text
    content: ' isika'
  - type: text
    content: 'ary ho efa nanahaka an’i '
  - type: text
    content: Gômôra
  - type: note
    content: 'Is 1.9, voatsiahy araka ny dkt grika tranainy Septoazinta. –Sôdôma sy Gômôra: jereo Gen 19.23-28.'
  - type: text
    content: .»
  - type: heading
    content: I Israely manoloana ny Vaovao Mahafaly
  '3':
  - type: text
    content: 'eny, satriko mihitsy aza ny ho voaozon’Andriamanitra ka ho tafasaraka amin’i Kristy, hanasoavako ireo iray firazanana amiko, havako ara-nofo. '
  '30':
  - type: text
    content: 'Inona àry no holazaintsika? Izao: ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' tsy nitady ho marina teo anatrehan’Andriamanitra no neken’Andriamanitra ho marina noho ny finoana; '
  '31':
  - type: text
    content: 'fa ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ', izay nitady '
  - type: text
    content: lalàna
  - type: text
    content: ' hahamarina eo anatrehan’Andriamanitra, dia tsy tody tamin’izay nokendren’ny lalàna. '
  '32':
  - type: text
    content: 'Inona no antony? Satria tsy tamin’ny finoana fa tamin’ny asa vitany no heveriny hahamarina eo anatrehan’Andriamanitra. Ka dia solafaka tamin’ny «vato mahasolafaka» ny vahoaka Israely, '
  '33':
  - type: text
    content: 'araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: '«Indro Aho mametraka vato mahasolafaka sy vatolampy mampianjera ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ;
  - type: text
    content: kanefa izay mino Azy tsy mba hangaihay
  - type: note
    content: Is 28.16, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '4':
  - type: text
    content: 'Izy ireo no '
  - type: text
    content: Israelita
  - type: text
    content: ': natsangan’Andriamanitra ho zanany ary nomena ny voninahiny, manana ireo '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' sy ny '
  - type: text
    content: lalàna
  - type: text
    content: ' mbamin’ny fombam-pivavahana sy ireo fampanantenana'
  - type: note
    content: 'Jereo Eks 4.22; Deot 7.6; Hôs 11.1. –ireo fanekempihavanana (milaza maro): fanekempihavanana (milaza tokana).'
  - type: text
    content: '; '
  '5':
  - type: text
    content: 'ary koa manana ny razana niavian’i Kristy ara-nofo, dia i Kristy Ilay ambonin’ny zavatra rehetra, Andriamanitra ankalazaina mandrakizay. '
  - type: text
    content: Amen
  - type: note
    content: 'razana: jereo Asa 2.29 sy nta. –Kristy... Amen: dkt hafa ...Kristy. Enga anie Andriamanitra, Ilay ambonin’ny zavatra rehetra, hankalazaina mandrakizay! Amen.'
  - type: text
    content: '!'
  '6':
  - type: text
    content: 'Tsy milaza anefa aho fa foana ny tenin’Andriamanitra saingy izao: tsy izay rehetra nipoitra avy amin’i Israely'
  - type: note
    content: avy amin’i Israely na hoe avy amin’i Jakôba (jereo Gen 32.29).
  - type: text
    content: ' no tena vahoaka Israely, '
  '7':
  - type: text
    content: 'ary tsy izay rehetra zanak’i Abrahama no tena taranany, fa hoy Andriamanitra tamin’i Abrahama hoe: «Avy amin’i Itsehàka no hiantsoana taranaka ho anao'
  - type: note
    content: Gen 21.22.
  - type: text
    content: '!» '
  '8':
  - type: text
    content: 'Izany hoe: tsy ireo zanaka teraka ara-nofo'
  - type: note
    content: ireo zanaka teraka ara-nofo dia ireo taranak’i Abrahama avy amin’i Jismahela izay zanakalahin’i Abrahama tamin’i Hagara (ampit Gal 4.22-23).
  - type: text
    content: ' no tena zanak’Andriamanitra, fa ireo zanaka teraka araka ny fampanantenan’Andriamanitra no heverina ho tena taranaka. '
  '9':
  - type: text
    content: 'Satria toy izao ny teny fampanantenana: «Raha avy taona toy izao, dia hiverina aho ka hahazo zazalahy i Sarà'
  - type: note
    content: 'Gen 18.10. –Raha avy taona toy izao: dkt hafa Amin’ny fotoanandro voatendry.'
  - type: text
    content: '!»'
