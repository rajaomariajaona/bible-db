  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Sa tsy manam-pahefana amin’ny tanimanga ve ny mpanefy? Moa tsy azony anaovana zavatra samihafa ve ny vongan-tanimanga anankiray: ka ny zavatra iray, fanaka mihaja; ny zavatra iray kosa, fanaka tsotsotra'
