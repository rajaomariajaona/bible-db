    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary tsy izany ihany fa tokana ny rain’ireo zanakalahin’i Rebekà, dia i Itsehàka razantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'Andriamanitra anefa, mba haharetan’ny fikasany, dia mifidy olona; ary ny fifidianana dia tsy miankina amin’ny asa vitan’ny olona fa miankina amin’ny fiantsoan’Andriamanitra azy. Koa tsy mbola teraka akory ireo zaza ireo ary tsy mbola nanao tsara na nanao ratsy, dia izao no tenin’Andriamanitra tamin’i Rebekà: «Ny zokiny no hanompo ny zandriny'
  - type: usfm
    marker: f
    children:
    - type: usfm
