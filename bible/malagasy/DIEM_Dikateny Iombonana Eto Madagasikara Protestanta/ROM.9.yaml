    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa izao no lazain’Andriamanitra amin’i Mosesy: «Hamindra fo amin’izay tiako hamindrana'
