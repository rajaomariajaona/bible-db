document_id: HOS.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsaran’Andriamanitra an’i Israely
  - type: text
    content: Voaloboka misandrahaka
  - type: text
    content: sady namoa tsara i Israely.
  - type: text
    content: Arakaraka ny hamaron’ny voany
  - type: text
    content: 'no nanamaroany ny '
  - type: text
    content: alitarany
  - type: text
    content: ;
  - type: text
    content: arakaraka ny nandrosoan’ny taniny
  - type: text
    content: no nanaovany tsangambaton-tsampy
  - type: note
    content: Miaraka amin’ny alitara sy ny tsatokazo ho an’i Aserà, ny tsangambaton-tsampy dia anisan’ny fitaovana ampiasainy amin’ny fivavahana kanahanita; jereo Deot 16.22; 2 Mp 17.10-11; 23.14.
  - type: text
    content: tsara tarehy kokoa hatrany.
  '10':
  - type: text
    content: 'Sitrako ny hanafay azy, hoy Izaho TOMPO:'
  - type: text
    content: ireo firenena no hifamory hamely azy
  - type: text
    content: ho valin’ny heloka roa nataony.
  '11':
  - type: text
    content: I Efraîma dia ombivavy kely
  - type: text
    content: efa voafolaka tsara
  - type: text
    content: ary tia mively vary.
  - type: text
    content: Raha nahita ny vozony tsara tarehy aho,
  - type: text
    content: 'dia nanisy zioga azy:'
  - type: text
    content: ka i Joda hiasa tany
  - type: text
    content: ary i Israely handravona.
  '12':
  - type: text
    content: Mamafaza fahamarinana,
  - type: text
    content: dia hijinja fitiavana ianareo.
  - type: text
    content: Miasà tany vaovao
  - type: note
    content: Ampit Jer 4.3.
  - type: text
    content: fa izao no fotoana hitadiavana ny TOMPO,
  - type: text
    content: mandra-piaviny handatsaka aminareo ny famonjena.
  '13':
  - type: text
    content: Faharatsiana kosa no nambolenareo
  - type: text
    content: ka nijinja heloka ianareo
  - type: text
    content: ary nihinana ny vokatry ny lainga.
  - type: text
    content: «Ry Israely ô, ny herinao no nitokianao
  - type: text
    content: ary koa ny habetsahan’ny miaramilanao.
  '14':
  - type: text
    content: Koa hitrangan-tabataban’ady ny vahoakanao,
  - type: text
    content: ary ho rava avokoa ny tanànamimandanao,
  - type: text
    content: tahaka ny nandravan’i Salmàna
  - type: text
    content: an’i Bety-Arbèla
  - type: text
    content: tamin’ny andro niadiana
  - type: text
    content: izay nahatorotoro ireo reny
  - type: text
    content: mbamin’ireo zanany
  - type: note
    content: 'Bety-Arbèla: tanànan’i Transjôrdania. –Salmàna: angamba mpanjaka môabita, voalazan’ny tahirin-tsoratry ny mpanjakan’i Asiria Teglaty-Pilesera III (747-727) tal J.K. –Faran’andininy: momba izany fitondrana nampiharina tamin’ireo resy izany, dia jereo Sal 137.9; 2 Mp 8.12; Is 13.16. Dkt hafa izay nanorotoro ny tanàna reniny mbamin’ireo tanàna manodidina.'
  - type: text
    content: .
  '15':
  - type: text
    content: Toy izany no hanjo anareo,
  - type: text
    content: ry vahoakan’i Israely
  - type: note
    content: 'vahoakan’i Israely: araka ny dkt grika tranainy; Betela: teny hebreo.'
  - type: text
    content: ','
  - type: text
    content: noho ny haratsiana mihoa-pampana vitanareo.
  - type: text
    content: Vao maraina ny andro,
  - type: text
    content: dia ho faty ny mpanjakan’i Israely.»
  '2':
  - type: text
    content: Feno fitaka ny fony,
  - type: text
    content: ka hianjady amin’ireo olona ireo
  - type: text
    content: ny vesatry ny heloka vitany.
  - type: text
    content: Izy TOMPO mihitsy
  - type: text
    content: no hamotika ny alitaran’ireo
  - type: text
    content: sy handrava ny tsangambaton-tsampiny.
  '3':
  - type: text
    content: 'Ankehitriny hiteny ireo hoe:'
  - type: text
    content: «Tsy mana-mpanjaka izahay
  - type: text
    content: noho ny tsy nanajanay ny TOMPO.
  - type: text
    content: Sady soa inona ho anay moa
  - type: text
    content: no ho vitan’izay mpanjaka?»
  '4':
  - type: text
    content: Miteniteny foana izy
  - type: text
    content: no mianian-tsy tò
  - type: text
    content: sady manao fifanekena,
  - type: text
    content: ka ny rariny dia nitrebona
  - type: text
    content: toy ny zava-maniry misy poizina
  - type: text
    content: eny an-tsaha voaasa eny.
  '5':
  - type: text
    content: Ny mponin’i Samaria dia manaja
  - type: text
    content: ilay sarin’ombilahikely
  - type: text
    content: izay ao Bety-Avena,
  - type: text
    content: satria misaona azy ny vahoakany
  - type: text
    content: mbamin’ireo mihambo ho mpisorony
  - type: note
    content: 'Samaria: jereo 8.5 sy nta. –Momba ilay ombilahikely volamena napetraka tao Betela dia jereo 8.5 sy nta. –Bety-Avena: jereo 4.15; 5.8, sy nta Ham 5.5. –misaona azy: ny fanajana an’i Bahala* dia misy fanompoam-pivavahana fisaonana. Tahaka ny voaary ihany i Bahala ka noheverina fa maty ary velona indray araka ny fivadibadihan’ny fizaran-taona. Ho an’i Hôsea mpaminany, ireny fombam-pivavahana fisaonana an’i Bahala ireny dia fambara sahady ny fisaonana hataon’ny vahoaka rehefa hoentina any Asiria ilay ombilahikely volamena.'
  - type: text
    content: .
  - type: text
    content: Ny voninahitr’ilay ombilahikely anie
  - type: text
    content: no aoka hiravoravoany,
  - type: text
    content: amin’izao izy lasa babo
  - type: text
    content: ho lavitra antsika izao!
  '6':
  - type: text
    content: Satria io ombilahikely io koa
  - type: text
    content: dia hoentina any Asiria ho fanomezana
  - type: text
    content: ho an’ilay Mpanjaka lehibe;
  - type: text
    content: hahafa-baràka an’i Efraîma izany;
  - type: text
    content: eny, hangaihay i Israely
  - type: text
    content: noho ny sain-dratsiny.
  '7':
  - type: text
    content: Vita hatreo ny amin’i Samaria,
  - type: text
    content: fa ny mpanjakany dia toa sila-kazo
  - type: text
    content: mitsingevaheva eny ambonin’ny rano.
  '8':
  - type: text
    content: 'Ho rava ireo toeram-panasinana:'
  - type: text
    content: izany no hadisoana sy fahotan’i Israely.
  - type: text
    content: Songosongo aman-tsilo
  - type: text
    content: no handadina ny alitarany.
  - type: text
    content: 'Amin’izay no hitenenana hoe:'
  - type: text
    content: «Ry tendrombohitra, saròny izahay!»
  - type: text
    content: «Ry havoana, mianjerà aminay
  - type: note
    content: Ampit Lk 23.30; jereo koa Apôk 6.16.
  - type: text
    content: ».
  - type: heading
    content: Izay nafafin’i Israely no hojinjainy
  '9':
  - type: text
    content: Hatramin’ny andron’ilay raharaha
  - type: text
    content: izay niseho tao Gibehà
  - type: text
    content: no efa nanota i Israely,
  - type: text
    content: ary tsy niova tamin’izany izy.
  - type: text
    content: Koa tsy rariny ve raha ao Gibehà ny ady
  - type: text
    content: no hahatratra ireo olon-dratsy ireo?
