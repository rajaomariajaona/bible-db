        text: ': ny fanajana an’i Bahala* dia misy fanompoam-pivavahana fisaonana. Tahaka ny voaary ihany i Bahala ka noheverina fa maty ary velona indray araka ny fivadibadihan’ny fizaran-taona. Ho an’i Hôsea mpaminany, ireny fombam-pivavahana fisaonana an’i Bahala ireny dia fambara sahady ny fisaonana hataon’ny vahoaka rehefa hoentina any Asiria ilay ombilahikely volamena.'
