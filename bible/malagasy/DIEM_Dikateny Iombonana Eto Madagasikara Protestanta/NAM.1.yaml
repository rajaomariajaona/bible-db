    children:
    - type: text
      text: '1'
  - type: text
    text: Izao no hafatra faminaniana momba ny tanànan’i Ninive, mitantara izay nasehon’Andriamanitra tamin’i Nahoma avy any Elkôsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ninive: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: renivohitry ny fanjakana asirianina, tokony ho 850 km avy any Jerosalema. Entina manambara ny fanjakana asirianina manontolo i Ninive. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Elkôsy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tanàna tsy dia fantatra marina ny aminy. Ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: avy any Elkôsy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dia mandika mpamaritra anarana iray izay azo adika koa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «ilay toy ny oram-pararano»
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Ny amin’ny 1.1–3.19, dia jereo Is 10.5-34; 14.24-27; Tsef 2.13-15.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Tompo dia Andriamanitra mahatahotra nefa koa tsara
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Andriamanitra sarotiny sy mpanafay ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manafay tokoa ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahatsiravina ny fahatezerany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, manafay izay manohitra Azy ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mirehi-kavinirana amin’ny fahavalony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mirehi-kavinirana amin’ny fahavalony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary mirehitra mamely ny fahavalony
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy mora tezitra ny TOMPO, nefa lehibe ny heriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy avelany ho afa-maina ny meloka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tafio-drivotra mahery no amin’izay alehan’ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny rahona no toy ny vovoka apariaky ny dian-tongony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Teneniny mafy ny ranomasina dia tankina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataony ritra avokoa ny ony rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tonga maina ny ahitr’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ' sy i Karmela,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manjary malazo ny voninkazon’i Libàno
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Karmela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Ham 1.2 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Libàno
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo ny naoty momba ny Is 10.34. Ny T.T dia miteny matetika ireo faritr’i Basàna sy i Karmela ary i Libano ireo noho ny harem-be misy eo aminy.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mihovitrovitra eo anoloany ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihotsaka koa ny havoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihorohoro eo anatrehany ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izao tontolo izao sy ny mponina ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Iza no mahajanona eo anoloan’ny fahavinirany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary zovy no mahatanty ny firehitry ny fahatezerany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mihanaka toy ny afo ny fahatezerany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia ny vatolampy aza mitresaka eo anatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa tsara ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fialofana amin’ny andro mahory Izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no miahy izay mialoka aminy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: na dia tonga hanafotra aza ny loza.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa potehiny kosa ny fahavalony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Potehiny kosa ny fahavalony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy sasany izany; ny rijan-teny hebreo dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ravany kosa ny toerana iorenany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ka efa tanànan’i Ninive sahady no tenenina amin’izany.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary alefany any amin’ny haizim-pahafatesana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’i Joda sy ho an’i Ninive
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Inona moa no iokoanareo hanohitra ny TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa handringana ny mpamoritra Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hanindroa intsony ny fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tahaka ny tsilo misafotofoto ry zareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ry zareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny Asirianina fahavalon’i Joda izany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay miboboka mandra-pahamamony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho levon’ny afo toy ny ahi-maina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avy tao aminao, ry Ninive, no nipoitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay misain-dratsy hanohitra ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay lehilahy mpamorona hevi-poana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay lehilahy... hevi-poana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toa ny mpanjakan’i Asiria no ambara amin’izany, jereo koa 2.1.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy ny TOMPO amin’ny vahoakan’i Joda:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Na dia maro sy matanjaka aza ny fahavalonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanjavona tsy ho hitanareo intsony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nampahory anareo Aho ka tsy hampahory intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ankehitriny dia homontsaniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ziogam
  - type: text
    text: -pahavalo mangeja anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotapahiko ny gadranareo.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny aminareo kosa, ry mponin’i Ninive
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny aminareo kosa, ry mponin’i Ninive: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'azo heverina koa fa ny andininy faha-14 dia mivantana manokana amin’ny mpanjakan’i Ninive, ka mety hadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny aminao, ry mpanjakan’i Ninive
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' io fanombohana io.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny TOMPO dia efa nandidy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy hisy taranaka hitondra ny anaranareo intsony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hopotehiko ao an-tranon’andriamanitrareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sampy hazo voasikotra na metaly voarendrika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manomana fasana ho anareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria maivan-danja eo anatrehako ianareo.»
