document_id: NAM.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Izao no hafatra faminaniana momba ny tanànan’i Ninive, mitantara izay nasehon’Andriamanitra tamin’i Nahoma avy any Elkôsy
  - type: note
    content: 'Ninive: renivohitry ny fanjakana asirianina, tokony ho 850 km avy any Jerosalema. Entina manambara ny fanjakana asirianina manontolo i Ninive. –Elkôsy: tanàna tsy dia fantatra marina ny aminy. Ny hoe avy any Elkôsy, dia mandika mpamaritra anarana iray izay azo adika koa hoe «ilay toy ny oram-pararano». Ny amin’ny 1.1–3.19, dia jereo Is 10.5-34; 14.24-27; Tsef 2.13-15.'
  - type: text
    content: .
  - type: heading
    content: Ny Tompo dia Andriamanitra mahatahotra nefa koa tsara
  '10':
  - type: text
    content: Tahaka ny tsilo misafotofoto ry zareo
  - type: note
    content: 'ry zareo: ny Asirianina fahavalon’i Joda izany.'
  - type: text
    content: izay miboboka mandra-pahamamony
  - type: text
    content: ka ho levon’ny afo toy ny ahi-maina.
  '11':
  - type: text
    content: Avy tao aminao, ry Ninive, no nipoitra
  - type: text
    content: ilay misain-dratsy hanohitra ny TOMPO
  - type: text
    content: dia ilay lehilahy mpamorona hevi-poana
  - type: note
    content: 'ilay lehilahy... hevi-poana: toa ny mpanjakan’i Asiria no ambara amin’izany, jereo koa 2.1.'
  - type: text
    content: .
  '12':
  - type: text
    content: 'Hoy ny TOMPO amin’ny vahoakan’i Joda:'
  - type: text
    content: «Na dia maro sy matanjaka aza ny fahavalonareo,
  - type: text
    content: dia hanjavona tsy ho hitanareo intsony.
  - type: text
    content: Efa nampahory anareo Aho ka tsy hampahory intsony.
  '13':
  - type: text
    content: Ankehitriny dia homontsaniko
  - type: text
    content: 'ny '
  - type: text
    content: ziogam
  - type: text
    content: -pahavalo mangeja anareo;
  - type: text
    content: ary hotapahiko ny gadranareo.»
  '14':
  - type: text
    content: Ny aminareo kosa, ry mponin’i Ninive
  - type: note
    content: 'Ny aminareo kosa, ry mponin’i Ninive: azo heverina koa fa ny andininy faha-14 dia mivantana manokana amin’ny mpanjakan’i Ninive, ka mety hadika hoe ny aminao, ry mpanjakan’i Ninive io fanombohana io.'
  - type: text
    content: ','
  - type: text
    content: 'ny TOMPO dia efa nandidy hoe:'
  - type: text
    content: «Tsy hisy taranaka hitondra ny anaranareo intsony.
  - type: text
    content: Hopotehiko ao an-tranon’andriamanitrareo
  - type: text
    content: ny sampy hazo voasikotra na metaly voarendrika.
  - type: text
    content: Manomana fasana ho anareo Aho,
  - type: text
    content: satria maivan-danja eo anatrehako ianareo.»
  '2':
  - type: text
    content: Andriamanitra sarotiny sy mpanafay ny TOMPO.
  - type: text
    content: Manafay tokoa ny TOMPO
  - type: text
    content: ary mahatsiravina ny fahatezerany;
  - type: text
    content: eny, manafay izay manohitra Azy ny TOMPO,
  - type: text
    content: ary mirehi-kavinirana amin’ny fahavalony
  - type: note
    content: 'mirehi-kavinirana amin’ny fahavalony: dkt hafa ary mirehitra mamely ny fahavalony.'
  - type: text
    content: .
  '3':
  - type: text
    content: Tsy mora tezitra ny TOMPO, nefa lehibe ny heriny,
  - type: text
    content: ary tsy avelany ho afa-maina ny meloka.
  - type: text
    content: Tafio-drivotra mahery no amin’izay alehan’ny TOMPO;
  - type: text
    content: ny rahona no toy ny vovoka apariaky ny dian-tongony.
  '4':
  - type: text
    content: Teneniny mafy ny ranomasina dia tankina;
  - type: text
    content: ataony ritra avokoa ny ony rehetra.
  - type: text
    content: 'Tonga maina ny ahitr’i '
  - type: text
    content: Basàna
  - type: text
    content: ' sy i Karmela,'
  - type: text
    content: ary manjary malazo ny voninkazon’i Libàno
  - type: note
    content: 'Karmela: jereo Ham 1.2 sy nta. –Libàno: jereo ny naoty momba ny Is 10.34. Ny T.T dia miteny matetika ireo faritr’i Basàna sy i Karmela ary i Libano ireo noho ny harem-be misy eo aminy.'
  - type: text
    content: .
  '5':
  - type: text
    content: Mihovitrovitra eo anoloany ny tendrombohitra,
  - type: text
    content: ary mihotsaka koa ny havoana;
  - type: text
    content: mihorohoro eo anatrehany ny tany,
  - type: text
    content: izao tontolo izao sy ny mponina ao aminy.
  '6':
  - type: text
    content: Iza no mahajanona eo anoloan’ny fahavinirany?
  - type: text
    content: Ary zovy no mahatanty ny firehitry ny fahatezerany?
  - type: text
    content: Fa mihanaka toy ny afo ny fahatezerany;
  - type: text
    content: na dia ny vatolampy aza mitresaka eo anatrehany.
  '7':
  - type: text
    content: Fa tsara ny TOMPO,
  - type: text
    content: fialofana amin’ny andro mahory Izy.
  - type: text
    content: Izy no miahy izay mialoka aminy,
  '8':
  - type: text
    content: na dia tonga hanafotra aza ny loza.
  - type: text
    content: Fa potehiny kosa ny fahavalony
  - type: note
    content: 'Potehiny kosa ny fahavalony: araka ny dkt tranainy sasany izany; ny rijan-teny hebreo dia manao hoe Ravany kosa ny toerana iorenany ka efa tanànan’i Ninive sahady no tenenina amin’izany.'
  - type: text
    content: ary alefany any amin’ny haizim-pahafatesana.
  - type: heading
    content: Hafatra ho an’i Joda sy ho an’i Ninive
  '9':
  - type: text
    content: Inona moa no iokoanareo hanohitra ny TOMPO?
  - type: text
    content: Fa handringana ny mpamoritra Izy,
  - type: text
    content: ka tsy hanindroa intsony ny fahoriana.
