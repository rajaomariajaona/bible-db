segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Tsy nanary an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' Andriamanitra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Manontany àry aho hoe: Sao narian’Andriamanitra ny vahoakany? Sanatria izany! Fa izaho koa mba '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israelita
  - type: text
    text: ', taranak’i Abrahama sady anisan’ny fokon’i Benjamîna'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Fil 3.5.
    marker-yv: yv-n
  - type: text
    text: '! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsia, Andriamanitra tsy nanary ny vahoakany, izay efa nofidiny rahateo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 94.14.
    marker-yv: yv-n
  - type: text
    text: '. Ataoko fa fantatrareo izay lazain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' ao amin’ny tantaran’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Elià
  - type: text
    text: ', fony i Elià nitaraina tamin’Andriamanitra ny amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Tompo ô, ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminaninao
  - type: text
    text: ' novonoiny, ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitaranao
  - type: text
    text: ' noravàny; ary izaho irery no sisa tavela, nefa dia fofoiny ho faty.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Inona kosa no avalin’Andriamanitra an’i Elià? «Efa nanokana fito arivo lahy ho Ahy Aho, dia ireo tsy nandohalika tamin’ny sampy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 3-4:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1 Mp 19.10, 18.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Toy izany koa àry amin’izao ankehitriny izao. Misy olom-bitsy sisa tavela, izay voafidy noho ny fahasoavan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary raha noho ny fahasoavana, dia tsy avy amin’ny asa vitan’ny olona; fa raha avy amin’ny asa vitan’ny olona, dia tsy fahasoavana intsony ny fahasoavana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ahoana àry? Tsy nahazo izay nokatsahiny akory ny vahoaka Israely, fa ireo voafidin’Andriamanitra no nahazo izany. Nohamafisina kosa ny fon’ny hafa rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'araka izay voalazan’ny Soratra Masina hoe: «Nomen’Andriamanitra fanahy mahadonto izy ireo ka ny masony tsy mahita ary ny sofiny tsy mandre mandraka androany.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy koa i Davida hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ho fandrika sy ho tonta ho azy ireo anie ny sakafony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho fandavoana sy ho famaizana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ho rakotry ny haizina anie ny masony ka tsy hahita;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho vokoka lalandava anie ny lamosiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny and 8-10: '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'and 8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Deot 29.3; Is 6.10; 29.10. '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 9-10:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Sal 69.23-24, voatsiahy araka ny dkt grika tranainy Septoazinta.'
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Manontany àry aho hoe: Sao solafaka ny Jiosy, ka lavo tsy ho tafarina intsony? Sanatria izany! Fa ny hadisoan’ny Jiosy no ahazoan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' ny famonjena mba hahavelom-pialonana ny Jiosy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa raha ny fahadisoan’ny Jiosy aza tonga harena ara-panahy ho an’izao tontolo izao, ary ny fietreny tonga harena ara-panahy ho an’ny hafa firenena, vao mainka fa ny fiverenany tanteraka amin’ny famonjena!
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny famonjena ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aminareo hafa firenena dia izao kosa no teniko: araka ny maha '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôli
  - type: text
    text: 'n’ny hafa firenena ahy, dia hajaiko ny asa fanompoana nankinina tamiko; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'sao mba hahavelom-pialonana ireo havako ara-nofo, ka hahavonjeko ny sasany amin’izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nony nailika ry zareo, dia voavitrana ny fihavanan’izao tontolo izao amin’Andriamanitra. Ka raha voaray indray ry zareo, inona no hitranga? Ny fiainana ho an’ireo efa maty!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha voatolotra ho an’Andriamanitra ny santatry ny mofo, dia Azy koa ny mofo rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Nom 15.19-21.
    marker-yv: yv-n
  - type: text
    text: '. Raha voatokana ho an’Andriamanitra ny foto-kazo, dia Azy koa ny rantsany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' dia toy ny hazo ôliva voakolokolo, izay nanesorana rantsana sasantsasany. Fa ianao hafa firenena kosa dia toy ny rantsan’ny hazo ôliva dia, izay natao grefy amin’ny hazo ôliva voakolokolo, ho solon’ireo rantsana nesorina ireo; ary manjary iombonanao ilay fototra feno tsiron-tany ao amin’ny hazo ôliva voakolokolo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa aza mirehareha amin’ireo rantsana nesorina ireo ianao. Fa raha mirehareha aza ianao, tsy ianao no mitondra ny foto-kazo, fa ny foto-kazo no mitondra anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hoy angaha ianao hoe: Nisy rantsana nesorina mba hanaovana grefy ahy! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Marina izany! Nesorina izy ireny noho ny tsy finoana. Kanefa aza miavonavona, fa matahòra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Andriamanitra tsy nitsimbina an-dry zareo Jiosy izay tena rantsana, ka tsy hitsimbina anao koa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ka tsy hitsimbina anao koa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ka mitandrema fa tsy hitsimbina anao koa Izy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', araka ny stf sasany.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jereo àry fa sady mora fo Andriamanitra no sarotiny: sarotiny amin’izay lavo Izy, fa mora fo aminao kosa raha mitoetra ao amin’ny hamoram-pony ianao; fa raha tsy mitoetra ao ianao, dia hoesorina koa. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa raha miala amin’ny tsy finoana ry zareo Jiosy, dia hatao grefy indray, satria vitan’Andriamanitra ny manao grefy azy indray. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Eny, raha ianao hafa firenena aza, nesorina tamin’ny hazo ôliva dia, ka natao grefy amin’ny hazo ôliva voakolokolo izay tsy nipoiranao; mainka fa ireo Jiosy, tena rantsan’ilay hazo ôliva voakolokolo, no hatao grefy indray amin’ny hazo ôliva nipoirany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny hahavonjy ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' amin’ny farany'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izao tsiambaratelo izao, ry havako, dia tiako ho fantatrareo tokoa, fandrao hihevi-tena ho hendry ianareo: misy mafy fo ny sasany amin’ny vahoaka Israely, mandrapiditry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' rehetra amin’ny famonjena. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Toy izany no hahavonjy an’i Israely manontolo araka ny voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«Hiainga avy ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ' ny mpanafaka,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanala ny haratsiam-panahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny taranak’i Jakôba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izany no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' hataoko aminy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa voaesotro ny fahotany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.27 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 26-27:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 59.20-21 sy 27.9, samy voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Raha ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ', dia fahavalon’Andriamanitra ny Jiosy noho ny aminareo; fa raha ny amin’ny fifidianana kosa, dia malalan’Andriamanitra izy ireo noho ny amin’ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Satria tsy anenenan’Andriamanitra ny fanomezam-pahasoavany sy ny fiantsoany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ianareo tsy nanaiky an’Andriamanitra fahiny, nefa nahazo famindrampo kosa ankehitriny noho ny tsy faneken’ny Jiosy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Toy izany koa: tsy manaiky an’Andriamanitra ny Jiosy ankehitriny, mba hahazoany famindrampo koa any aoriana any noho ny famindrampo azonareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'any aoriana any: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toy izay ireo teny ireo dia misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ankehitriny
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: amin’izay
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ary misy stf sasany tsy ahitana na inona na inona.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Eny, nohidin’Andriamanitra tanatin’ny tsy fanekena avokoa ny olon-drehetra mba hanehoany famindrampo amin’izy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampitolagaga ny halehibiazan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Endrey tsy hita pesimpesenina ny haren’Andriamanitra sy ny fahendreny ary ny fahalalany! Endrey tsy takatry ny saina ny fitsarany ary tsy azo fantarina ny lalany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 55.8; Sal 139.6, 17-18.
    marker-yv: yv-n
  - type: text
    text: '! Ka hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: «Iza no mahalala ny hevitry ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary zovy no mpanolo-tsaina Azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
