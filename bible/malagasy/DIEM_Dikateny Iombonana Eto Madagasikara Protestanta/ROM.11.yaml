document_id: ROM.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy nanary an’i Israely Andriamanitra
  - type: text
    content: 'Manontany àry aho hoe: Sao narian’Andriamanitra ny vahoakany? Sanatria izany! Fa izaho koa mba '
  - type: text
    content: Israelita
  - type: text
    content: ', taranak’i Abrahama sady anisan’ny fokon’i Benjamîna'
  - type: note
    content: Ampit Fil 3.5.
  - type: text
    content: '! '
  '10':
  - type: text
    content: Ho rakotry ny haizina anie ny masony ka tsy hahita;
  - type: text
    content: ary ho vokoka lalandava anie ny lamosiny
  - type: note
    content: 'Momba ny and 8-10: and 8: jereo Deot 29.3; Is 6.10; 29.10. And 9-10: Sal 69.23-24, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: '!»'
  '11':
  - type: text
    content: 'Manontany àry aho hoe: Sao solafaka ny Jiosy, ka lavo tsy ho tafarina intsony? Sanatria izany! Fa ny hadisoan’ny Jiosy no ahazoan’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' ny famonjena mba hahavelom-pialonana ny Jiosy. '
  '12':
  - type: text
    content: Koa raha ny fahadisoan’ny Jiosy aza tonga harena ara-panahy ho an’izao tontolo izao, ary ny fietreny tonga harena ara-panahy ho an’ny hafa firenena, vao mainka fa ny fiverenany tanteraka amin’ny famonjena!
  - type: heading
    content: Ny famonjena ireo hafa firenena
  '13':
  - type: text
    content: 'Aminareo hafa firenena dia izao kosa no teniko: araka ny maha '
  - type: text
    content: apôstôli
  - type: text
    content: 'n’ny hafa firenena ahy, dia hajaiko ny asa fanompoana nankinina tamiko; '
  '14':
  - type: text
    content: 'sao mba hahavelom-pialonana ireo havako ara-nofo, ka hahavonjeko ny sasany amin’izy ireo. '
  '15':
  - type: text
    content: Nony nailika ry zareo, dia voavitrana ny fihavanan’izao tontolo izao amin’Andriamanitra. Ka raha voaray indray ry zareo, inona no hitranga? Ny fiainana ho an’ireo efa maty!
  '16':
  - type: text
    content: Raha voatolotra ho an’Andriamanitra ny santatry ny mofo, dia Azy koa ny mofo rehetra
  - type: note
    content: Ampit Nom 15.19-21.
  - type: text
    content: '. Raha voatokana ho an’Andriamanitra ny foto-kazo, dia Azy koa ny rantsany rehetra. '
  '17':
  - type: text
    content: 'Ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' dia toy ny hazo ôliva voakolokolo, izay nanesorana rantsana sasantsasany. Fa ianao hafa firenena kosa dia toy ny rantsan’ny hazo ôliva dia, izay natao grefy amin’ny hazo ôliva voakolokolo, ho solon’ireo rantsana nesorina ireo; ary manjary iombonanao ilay fototra feno tsiron-tany ao amin’ny hazo ôliva voakolokolo. '
  '18':
  - type: text
    content: Koa aza mirehareha amin’ireo rantsana nesorina ireo ianao. Fa raha mirehareha aza ianao, tsy ianao no mitondra ny foto-kazo, fa ny foto-kazo no mitondra anao.
  '19':
  - type: text
    content: 'Hoy angaha ianao hoe: Nisy rantsana nesorina mba hanaovana grefy ahy! '
  '2':
  - type: text
    content: Tsia, Andriamanitra tsy nanary ny vahoakany, izay efa nofidiny rahateo
  - type: note
    content: Ampit Sal 94.14.
  - type: text
    content: '. Ataoko fa fantatrareo izay lazain’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' ao amin’ny tantaran’i '
  - type: text
    content: Elià
  - type: text
    content: ', fony i Elià nitaraina tamin’Andriamanitra ny amin’i '
  - type: text
    content: Israely
  - type: text
    content: ' nanao hoe: '
  '20':
  - type: text
    content: 'Marina izany! Nesorina izy ireny noho ny tsy finoana. Kanefa aza miavonavona, fa matahòra. '
  '21':
  - type: text
    content: Andriamanitra tsy nitsimbina an-dry zareo Jiosy izay tena rantsana, ka tsy hitsimbina anao koa
  - type: note
    content: ka tsy hitsimbina anao koa na hoe ka mitandrema fa tsy hitsimbina anao koa Izy, araka ny stf sasany.
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Jereo àry fa sady mora fo Andriamanitra no sarotiny: sarotiny amin’izay lavo Izy, fa mora fo aminao kosa raha mitoetra ao amin’ny hamoram-pony ianao; fa raha tsy mitoetra ao ianao, dia hoesorina koa. '
  '23':
  - type: text
    content: 'Fa raha miala amin’ny tsy finoana ry zareo Jiosy, dia hatao grefy indray, satria vitan’Andriamanitra ny manao grefy azy indray. '
  '24':
  - type: text
    content: Eny, raha ianao hafa firenena aza, nesorina tamin’ny hazo ôliva dia, ka natao grefy amin’ny hazo ôliva voakolokolo izay tsy nipoiranao; mainka fa ireo Jiosy, tena rantsan’ilay hazo ôliva voakolokolo, no hatao grefy indray amin’ny hazo ôliva nipoirany.
  - type: heading
    content: Ny hahavonjy ny vahoaka Israely amin’ny farany
  '25':
  - type: text
    content: 'Izao tsiambaratelo izao, ry havako, dia tiako ho fantatrareo tokoa, fandrao hihevi-tena ho hendry ianareo: misy mafy fo ny sasany amin’ny vahoaka Israely, mandrapiditry ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' rehetra amin’ny famonjena. '
  '26':
  - type: text
    content: 'Toy izany no hahavonjy an’i Israely manontolo araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: '«Hiainga avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ny mpanafaka,'
  - type: text
    content: dia hanala ny haratsiam-panahy
  - type: text
    content: amin’ny taranak’i Jakôba.
  '27':
  - type: text
    content: 'Izany no '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' hataoko aminy,'
  - type: text
    content: rehefa voaesotro ny fahotany
  - type: note
    content: 'And 26-27: Is 59.20-21 sy 27.9, samy voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .»
  '28':
  - type: text
    content: 'Raha ny amin’ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ', dia fahavalon’Andriamanitra ny Jiosy noho ny aminareo; fa raha ny amin’ny fifidianana kosa, dia malalan’Andriamanitra izy ireo noho ny amin’ny razany. '
  '29':
  - type: text
    content: 'Satria tsy anenenan’Andriamanitra ny fanomezam-pahasoavany sy ny fiantsoany. '
  '3':
  - type: text
    content: '«Tompo ô, ireo '
  - type: text
    content: mpaminaninao
  - type: text
    content: ' novonoiny, ireo '
  - type: text
    content: alitaranao
  - type: text
    content: ' noravàny; ary izaho irery no sisa tavela, nefa dia fofoiny ho faty.» '
  '30':
  - type: text
    content: 'Fa ianareo tsy nanaiky an’Andriamanitra fahiny, nefa nahazo famindrampo kosa ankehitriny noho ny tsy faneken’ny Jiosy. '
  '31':
  - type: text
    content: 'Toy izany koa: tsy manaiky an’Andriamanitra ny Jiosy ankehitriny, mba hahazoany famindrampo koa any aoriana any noho ny famindrampo azonareo'
  - type: note
    content: 'any aoriana any: toy izay ireo teny ireo dia misy stf sasany ahitana hoe ankehitriny na amin’izay ary misy stf sasany tsy ahitana na inona na inona.'
  - type: text
    content: '. '
  '32':
  - type: text
    content: Eny, nohidin’Andriamanitra tanatin’ny tsy fanekena avokoa ny olon-drehetra mba hanehoany famindrampo amin’izy rehetra.
  - type: heading
    content: Mampitolagaga ny halehibiazan’Andriamanitra
  '33':
  - type: text
    content: Endrey tsy hita pesimpesenina ny haren’Andriamanitra sy ny fahendreny ary ny fahalalany! Endrey tsy takatry ny saina ny fitsarany ary tsy azo fantarina ny lalany
  - type: note
    content: Ampit Is 55.8; Sal 139.6, 17-18.
  - type: text
    content: '! Ka hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  '34':
  - type: text
    content: «Iza no mahalala ny hevitry ny Tompo,
  - type: text
    content: ary zovy no mpanolo-tsaina Azy?
  '35':
  - type: text
    content: Iza no nanome zavatra Azy voalohany
  - type: text
    content: mba handray valiny avy aminy
  - type: note
    content: 'And 34: Is 40.13, voatsiahy araka ny dkt grika tranainy Septoazinta. –And 35: jereo Jôb 41.3.'
  - type: text
    content: ?»
  '36':
  - type: text
    content: 'Fa Izy no iavian’ny zavatra rehetra, Izy no mihazona azy, ary Izy no iafarany. Ho Azy mandrakizay anie ny voninahitra! '
  - type: text
    content: Amen
  - type: text
    content: .
  '4':
  - type: text
    content: 'Inona kosa no avalin’Andriamanitra an’i Elià? «Efa nanokana fito arivo lahy ho Ahy Aho, dia ireo tsy nandohalika tamin’ny sampy '
  - type: text
    content: Bahala
  - type: note
    content: 'And 3-4: 1 Mp 19.10, 18.'
  - type: text
    content: '.» '
  '5':
  - type: text
    content: 'Toy izany koa àry amin’izao ankehitriny izao. Misy olom-bitsy sisa tavela, izay voafidy noho ny fahasoavan’Andriamanitra. '
  '6':
  - type: text
    content: Ary raha noho ny fahasoavana, dia tsy avy amin’ny asa vitan’ny olona; fa raha avy amin’ny asa vitan’ny olona, dia tsy fahasoavana intsony ny fahasoavana.
  '7':
  - type: text
    content: 'Ahoana àry? Tsy nahazo izay nokatsahiny akory ny vahoaka Israely, fa ireo voafidin’Andriamanitra no nahazo izany. Nohamafisina kosa ny fon’ny hafa rehetra, '
  '8':
  - type: text
    content: 'araka izay voalazan’ny Soratra Masina hoe: «Nomen’Andriamanitra fanahy mahadonto izy ireo ka ny masony tsy mahita ary ny sofiny tsy mandre mandraka androany.» '
  '9':
  - type: text
    content: 'Hoy koa i Davida hoe:'
  - type: text
    content: «Ho fandrika sy ho tonta ho azy ireo anie ny sakafony,
  - type: text
    content: ary ho fandavoana sy ho famaizana azy.
