document_id: PSA.105,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Mitana ny teny nataony Andriamanitra
  - type: text
    content: 'Miderà ny TOMPO ianareo:'
  - type: text
    content: ataovy antso avo ny lazany,
  - type: text
    content: ampahafantaro ny firenen-kafa ny asany lehibe.
  '10':
  - type: text
    content: Naoriny ho zo raikitra ho an’i Jakôba izany
  - type: text
    content: ka ho fanekempihavanana mandrakizay
  - type: text
    content: ho an’ny taranak’i Israely,
  '11':
  - type: text
    content: 'fony Andriamanitra nilaza hoe:'
  - type: text
    content: «Homeko anao ny tany Kanahàna
  - type: text
    content: ho anjara lova ho anao sy ny taranakao
  - type: note
    content: 'And 10-11: jereo koa Gen 12.3; 13.15; 15,18; 17.8; 26.3; 35.12; 48.4; Deot 1.8; 34.4; Asa 7.5.'
  - type: text
    content: .»
  '12':
  - type: text
    content: Tamin’izay izy ireo mbola mora isaina,
  - type: text
    content: mpifindra monina vitsy kely teo amin’ny tany
  - type: note
    content: Jereo Gen 34.30; Deot 7.7; 26.5.
  - type: text
    content: .
  '13':
  - type: text
    content: Nivezivezy nitety firenena maro izy,
  - type: text
    content: ka niala tamin’ny fanjakana iray
  - type: text
    content: hankany amin’ny vahoaka hafa.
  '14':
  - type: text
    content: Nefa tsy nisy navelan’Andriamanitra hampahory azy
  - type: text
    content: 'fa nampitandrina mpanjaka Izy noho ny amin’ireo hoe:'
  '15':
  - type: text
    content: «Aza kasihina ireo voahosotro
  - type: text
    content: ary aza asian-dratsy ireo mpitondra hafatro
  - type: note
    content: 'And 14-15: Gen 20.3-7.'
  - type: text
    content: .»
  '16':
  - type: text
    content: Niantso mosary
  - type: note
    content: 'mosary: jereo Gen 41.53-57.'
  - type: text
    content: ' ho amin’ny tany Izy'
  - type: text
    content: ka nanafoana ny sakafo rehetra.
  '17':
  - type: text
    content: Nefa naniraka olona hialoha an’ireo Izy,
  - type: text
    content: dia i Jôsefa izay namidy handevozina
  - type: note
    content: Gen 37.28; 45.5.
  - type: text
    content: .
  '18':
  - type: text
    content: Nogiazana tady ny tongony
  - type: text
    content: ary norohizana rojo vy ny vozony
  - type: note
    content: I Jôsefa tao an-tranomaizina Gen 39.20.
  - type: text
    content: ','
  '19':
  - type: text
    content: mandra-pahatanterahan’ny zavatra nambarany;
  - type: text
    content: ny tenin’ny TOMPO no naneho azy ho tsy manan-tsiny
  - type: note
    content: Tsiahivina eto ny Gen 41.16, 25.
  - type: text
    content: '!'
  '2':
  - type: text
    content: Mihirà ho Azy ary mankalazà Azy amin-java-maneno;
  - type: text
    content: tantarao ny asa mahagaga rehetra nataony.
  '20':
  - type: text
    content: Nanome baiko hamahàna azy ny mpanjaka;
  - type: text
    content: eny, nampanafaka azy ny mpifehy vahoaka
  - type: note
    content: Gen 41.14.
  - type: text
    content: .
  '21':
  - type: text
    content: Notendreny ho lehiben’ny fitondram-panjakana izy
  - type: text
    content: sy ho mpanapaka ny taniny manontolo
  - type: note
    content: Gen 41.39-41.
  - type: text
    content: ','
  '22':
  - type: text
    content: mba hisarika ny andriambaventy hanaraka ny heviny
  - type: text
    content: sy hanolo-pahendrena an’ireo loholom-bahoaka.
  '23':
  - type: text
    content: Taorian’izany, dia tonga tany Ejipta
  - type: text
    content: i Jakôba mianakavy
  - type: note
    content: 'I Jakôba tany Ejipta: Gen 46.6; 47.11.'
  - type: text
    content: ary nifindra monina tao amin’ny tanin’i Hama
  - type: note
    content: 'Hama: jereo Sal 78.51 sy nta.'
  - type: text
    content: .
  '24':
  - type: text
    content: Nohamaroin’Andriamanitra tokoa ny vahoakany
  - type: text
    content: ary nataony mahery noho ny mpampahory azy.
  '25':
  - type: text
    content: Ny fon’ireo Ejiptianina novany hankahala ny vahoakany
  - type: text
    content: sy hanao kendry tohina amin’ireo mpanompony
  - type: note
    content: 'And 24-25: jereo Eks 1.7-14.'
  - type: text
    content: .
  '26':
  - type: text
    content: Kanjo nirahiny i Mosesy mpanompony
  - type: text
    content: sy i Aharôna ilay voafidiny
  - type: note
    content: Eks 3.1–4.17.
  - type: text
    content: ':'
  '27':
  - type: text
    content: Izy roa lahy no naneho teo amin’ny Ejiptianina
  - type: text
    content: ireo famantarana nambaran’ny Tompo mialoha
  - type: text
    content: ary nahavita zava-mahagaga
  - type: text
    content: teo amin’ny tanin’i Hama.
  '28':
  - type: text
    content: Dia nahatonga haizim-pito Andriamanitra
  - type: text
    content: ka nanjary maizina izany tany izany
  - type: text
    content: ary tsy nisy nahatohitra ny teniny
  - type: note
    content: 'haizim-pito: Eks 10.21-29.'
  - type: text
    content: .
  '29':
  - type: text
    content: Novany ho ra ny oniny
  - type: text
    content: ka maty avokoa ny trondrony
  - type: note
    content: Eks 7.14-15.
  - type: text
    content: ;
  '3':
  - type: text
    content: Ireharehao ny anarany masina;
  - type: text
    content: ianareo mitady ny TOMPO, aoka ho ravo ny fonareo!
  '30':
  - type: text
    content: nataony feno sahona ny tanin’ny Ejiptianina
  - type: text
    content: hatrany amin’ny efitranon’ny mpanjakany
  - type: note
    content: Eks 7.26–8.11.
  - type: text
    content: .
  '31':
  - type: text
    content: Niteny Andriamanitra, dia tonga ny fihitra sy moka
  - type: text
    content: nihanaka tamin’ny faritany manontolo
  - type: note
    content: Eks 8.12-28.
  - type: text
    content: .
  '32':
  - type: text
    content: Havandra no narotsany ho solon’ny orana
  - type: text
    content: ary koa varatra izay nandoro ny tanetiny.
  '33':
  - type: text
    content: Nosimbany ny voalobony sy ny aviaviny
  - type: text
    content: ary nopotehiny ny hazo tamin’ny faritaniny
  - type: note
    content: 'And 32-33: jereo Eks 9.13-35.'
  - type: text
    content: .
  '34':
  - type: text
    content: Niteny Izy, dia tonga ny valala
  - type: text
    content: sy ny kijeja tsy hita isa
  '35':
  - type: text
    content: ka nihinana ny ahitra rehetra an-tanety
  - type: text
    content: sy nihinana ny vokatr’ireo tanimboliny
  - type: note
    content: 'And 34-35: jereo Eks 10.1-20.'
  - type: text
    content: .
  '36':
  - type: text
    content: Novonoin’Andriamanitra ho faty avokoa
  - type: text
    content: ny lahimatoa rehetra tamin’io tany io,
  - type: text
    content: dia ireo santatry ny hery
  - type: text
    content: tamin’ny ankohonana ejiptianina
  - type: note
    content: Jereo Eks 12.29-30.
  - type: text
    content: .
  '37':
  - type: text
    content: Fa navoakany kosa ilay vahoakany
  - type: text
    content: nombàn’ny volafotsy sy volamena
  - type: note
    content: Eks 12.35-36.
  - type: text
    content: ;
  - type: text
    content: ka tsy nisy tamin’ireo fokony
  - type: text
    content: izay hoe narisarisa na iray aza.
  '38':
  - type: text
    content: Ravoravo ny Ejiptianina rehefa niala ny Israelita,
  - type: text
    content: satria efa nianjadian’ny tahotra azy loatra
  - type: note
    content: Eks 12.33; 15.16.
  - type: text
    content: .
  '39':
  - type: text
    content: Dia novelarin’Andriamanitra ny rahona
  - type: text
    content: hanalokaloka ny vahoakany,
  - type: text
    content: ary najorony koa ny afo
  - type: text
    content: hanazava azy nony alina
  - type: note
    content: Eks 13.21-22; 14.19-20.
  - type: text
    content: .
  '4':
  - type: text
    content: Katsaho ny TOMPO mahery,
  - type: text
    content: tadiavo lalandava ny fanatrehany.
  '40':
  - type: text
    content: Nangataka ireo, dia nandefasany papelika;
  - type: text
    content: ary mofo avy any an-danitra no namokisany azy
  - type: note
    content: Eks 16.13-18.
  - type: text
    content: .
  '41':
  - type: text
    content: Nosokafany ny vatolampy, dia nigororoana ny rano
  - type: text
    content: ka zary renirano nizotra teny an-tany hay
  - type: note
    content: Eks 17.1-7; Nom 20.2-13.
  - type: text
    content: .
  '42':
  - type: text
    content: Eny, tsaroan’Andriamanitra ny teniny masina
  - type: text
    content: nataony tamin’i Abrahama mpanompony
  - type: note
    content: Gen 15.13-14; Eks 2.24; Lk 1.54-55.
  - type: text
    content: .
  '43':
  - type: text
    content: Dia navoakany ny vahoaka voafidiny,
  - type: text
    content: ka niravo sy nanao horakora-pifaliana;
  '44':
  - type: text
    content: nomeny azy ny tanin’ireo hafa firenena
  - type: text
    content: ka izay nisasaran’izy ireny no lasany
  - type: note
    content: Jos 11.16-23.
  - type: text
    content: ','
  '45':
  - type: text
    content: mba hitandremany ny didiny
  - type: text
    content: sy hankatoavany ny Lalàny.
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  '5':
  - type: text
    content: Tsarovy ny asa mahagaga nataony,
  - type: text
    content: dia ny zava-mahatalanjona vitany
  - type: text
    content: sy ny didim-pitsarana navoakany,
  '6':
  - type: text
    content: ry taranak’i Abrahama mpanompony
  - type: text
    content: sady terak’i Jakôba voafidiny.
  '7':
  - type: text
    content: Izy no TOMPO Andriamanitsika;
  - type: text
    content: manerana ny tany tontolo ny fanapahany.
  '8':
  - type: text
    content: Tsaroany hatrany ny fanekempihavanany,
  - type: text
    content: dia ny fampanantenana izay napetrany
  - type: text
    content: ho an’ny taranaka arivo mifandimby
  - type: note
    content: Jereo Deot 7.9.
  - type: text
    content: ':'
  '9':
  - type: text
    content: ' '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataony tamin’i Abrahama'
  - type: note
    content: 'fanekempihavanana...Abrahama: Gen 12.7; 17.8.'
  - type: text
    content: sy fianianana nataony tamin’i Itsehàka
  - type: note
    content: 'fianianana...i Itsehàka: Gen 22.16-17; 26.3.'
  - type: text
    content: .
