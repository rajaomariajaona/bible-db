- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: I Ezekiela dia nahazo aingam-panahy tamin’ny alalan’ireo fahitana maro; koa matetika izy no mandravaka ny toriteniny amin’ny fanaovana asa sy fihetsika mifono hafatra. Ary amin’ny maha mpisorona azy dia omeny lanja lehibe ny tempoly, kanefa hamafisiny fa ny fanatrehan’Andriamanitra dia tsy voafatotry ny Toeramasina ao Jerosalema, fa afaka miasa na dia any Babilônia aza (ohatra 11.16). Miala amin’ny lovam-pampianarana jiosy mifototra amin’ny «andraikitra iombonana» i Ezekiela raha manambara fa ny olona tsirairay dia tompon’andraikitra amin’ny ataony avy (toko 18). Noho izany dia tsindriany manokana ny fihavaozam-piainan’ny olona tsirairay; nefa koa dia ambarany fa ny vahoakan’Andriamanitra, rehefa havaozina amina karazana fitsanganana amin’ny maty (toko 37), dia haverina any amin’ny taniny (11.14-20; 36.1-38).
