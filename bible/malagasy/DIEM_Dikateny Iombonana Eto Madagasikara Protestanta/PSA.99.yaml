    children:
    - type: text
      text: SALAMO Andriamanitra masina no mpanjakantsika
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny TOMPO no mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hany ka mangovitra ireo vahoaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ambony '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' ny sezafiandrianany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hany ka mihorohoro ny tany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Lehibe ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' ny TOMPO,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avo ambonin’ny firenena rehetra Izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aoka ireo hidera ny anaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay lehibe sy mampitolagaga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria masina tokoa Ianao!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ry mpanjaka mahery sy tia rariny ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no nampiorina ny hitsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady niantoka ny rariny sy ny fitsarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo amin’ny taranak’i Jakôba.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Asandrato ny TOMPO Andriamanitsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no masina ka iankohofy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anoloan’ny fitoeran-tongony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '99.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny mpanjaka, rehefa mitoetra amin’ny sezafiandrianany, dia mametra-tongotra eo amin’ny fitoeran-tongony. Koa ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: miankohoka eo anoloan’ny fitoeran-tongotr’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia manambara ny haja atolotra an’Andriamanitra Mpanjaka. Noheverin’ny Israelita ho fitoeran-tongotr’Andriamanitra ny Vatamasina mirakitra ny fanekempihavanana.'
      marker-yv: yv-n
    - type: text
      text: .
