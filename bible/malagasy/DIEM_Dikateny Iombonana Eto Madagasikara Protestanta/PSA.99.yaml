document_id: PSA.99,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Andriamanitra masina no mpanjakantsika
  - type: text
    content: Ny TOMPO no mpanjaka,
  - type: text
    content: hany ka mangovitra ireo vahoaka.
  - type: text
    content: 'Ambony '
  - type: text
    content: kerobima
  - type: text
    content: ' ny sezafiandrianany,'
  - type: text
    content: hany ka mihorohoro ny tany.
  '2':
  - type: text
    content: 'Lehibe ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ny TOMPO,'
  - type: text
    content: avo ambonin’ny firenena rehetra Izy.
  '3':
  - type: text
    content: Aoka ireo hidera ny anaranao
  - type: text
    content: izay lehibe sy mampitolagaga,
  - type: text
    content: satria masina tokoa Ianao!
  '4':
  - type: text
    content: Ry mpanjaka mahery sy tia rariny ô,
  - type: text
    content: Ianao no nampiorina ny hitsiny
  - type: text
    content: sady niantoka ny rariny sy ny fitsarana
  - type: text
    content: teo amin’ny taranak’i Jakôba.
  '5':
  - type: text
    content: Asandrato ny TOMPO Andriamanitsika;
  - type: text
    content: Izy no masina ka iankohofy
  - type: text
    content: eo anoloan’ny fitoeran-tongony
  - type: note
    content: Ny mpanjaka, rehefa mitoetra amin’ny sezafiandrianany, dia mametra-tongotra eo amin’ny fitoeran-tongony. Koa ny miankohoka eo anoloan’ny fitoeran-tongotr’Andriamanitra dia manambara ny haja atolotra an’Andriamanitra Mpanjaka. Noheverin’ny Israelita ho fitoeran-tongotr’Andriamanitra ny Vatamasina mirakitra ny fanekempihavanana.
  - type: text
    content: .
  '6':
  - type: text
    content: I Mosesy
  - type: note
    content: 'I Mosesy: mpanelanelana: jereo Eks 17.11-13; 32.11-14, 30-34; Nom 12.13; 14.13-19; 21.7; Sal 106.23.'
  - type: text
    content: ' sy i '
  - type: text
    content: Aharôna
  - type: note
    content: 'I Aharôna: mpanelanelana: jereo Nom 17.11-15.'
  - type: text
    content: ' tamin’ireo mpisorony'
  - type: text
    content: ary i Samoela
  - type: note
    content: 'I Samoela: mpanelanelana: 1 Sam 7.8-9; 12.16-23. –I Mosesy sy i Samoela: jereo Jer 15.1.'
  - type: text
    content: ' tamin’ireo mpivavaka aminy'
  - type: text
    content: dia samy niantso vonjy taminy ka novaliany.
  '7':
  - type: text
    content: Tao anaty andry rahona ny Tompo
  - type: note
    content: Jereo Eks 13.21; 19.9; 33.9; Nom 12.5.
  - type: text
    content: no niteny tamin’ny vahoakany;
  - type: text
    content: dia nankatoavin’ireo ny baikony
  - type: text
    content: mbamin’ny fitsipika nomeny azy.
  '8':
  - type: text
    content: TOMPO Andriamanitray ô,
  - type: text
    content: Ianao mihitsy no mamaly azy;
  - type: text
    content: fa Andriamanitra nahari-po taminy Ianao,
  - type: text
    content: nefa kosa nanafay azy noho ny ratsy nataony
  - type: note
    content: Jereo Nom 20.12,24; 27.14; Deot 3.26-27.
  - type: text
    content: .
  '9':
  - type: text
    content: Asandrato ny TOMPO Andriamanitsika;
  - type: text
    content: eny, masina ny TOMPO Andriamanitsika
  - type: text
    content: ka iankohofy eo an-tendrombohiny masina
  - type: note
    content: Ao Tsiôna tendrombohitra masina no iorenan’ny tempoly izay noheverina ho fonenan’Andriamanitra; jereo Sal 2.6.
  - type: text
    content: .
