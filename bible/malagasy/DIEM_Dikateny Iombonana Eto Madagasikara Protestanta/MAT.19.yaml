document_id: MAT.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampianaran’i Jesoa momba ny fanambadiana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 10.1-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa nahavita izany anatranatra izany i Jesoa, dia niala tao Galilea ary nankany amin’ny faritra antsisin’i Jodea, eny andafin’ny ony Jôrdàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'eny andafin’ny ony Jôrdàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe eny andafy atsinanan’io ony io.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Vahoaka maro no nanaraka Azy ary nahasitrana ny marary teo i Jesoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' nanatona Azy mba hamandrika Azy ka nanontany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Azon’ny lehilahy atao ve ny manary vady na inona na inona antony?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia izao no navalin’i Jesoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 1.27; 5.2.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy mbola novakînareo tao amin’ny Soratra Masina ve fa ilay Mpahary, hatrany am-piandohana, dia «nanao ny olona ho lahy sy vavy», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'sady niteny hoe: «noho izany, dia handao ny ray aman-dreniny ny lehilahy ka hikambana amin’ny vadiny, ary dia ho tena iray ihany izy roroa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 2.24.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa tsy roa intsony rehefa mpivady fa tena iray ihany; noho izany, izay nakamban’Andriamanitra dia aoka tsy hosarahin’olombelona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hoy ireo Farisianina tamin’i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Koa nahoana àry no nandidian’i Mosesy ny lehilahy hanome taratasy fisaraham-panambadiana ho an’ny vadiny rehefa hanary azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 24.1; Mt 5.31.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Noho ianareo mafy fo no namelan’i Mosesy anareo hanary vady, fa tsy toy izany hatrany am-piandohana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao kosa no lazaiko aminareo: na iza na iza lehilahy manary vady, afa-tsy noho ny fifandraisana mamoafady'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fifandraisana mamoafady: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 5.32 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', ka mampakatra vehivavy hafa, dia manitsakitsaka ny vadiny teo aloha.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misy olona tsy hanambady noho ny Fanjakàn’ny lanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' kosa niteny tamin’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha izany no takîna amin’ny lehilahy manoloana ny vadiny, dia aleo tsy manambady!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy ny olona rehetra no mandray izany fampianarana izany, fa izay nomen’Andriamanitra fahasoavana ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eny, misy olona tsy hanambady noho ny antony samihafa: ao ny tsy manambady, satria manan-kilema hatrany an-kibon-dreniny; ao ny tsy manambady, satria noterena hahazo takaitra; ary ao ny tsy manambady an-tsitrapo noho ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: . Izay afa-mandray izany, aoka handray!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsofin’i Jesoa rano ny zaza
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 10.13-16; Lk 18.15-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tamin’izay dia nisy ankizy madinika maro nentin’ny olona teo amin’i Jesoa hametrahany tanana sy hivavahany. Notenenin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' mafy ireo olona ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa hoy kosa i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Avelao ny ankizy madinika hanatona Ahy, fa aza raràna, satria an’ny toa azy ireny ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nametra-tanana tamin’ireo ankizy madinika ireo i Jesoa vao niala teo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay zatovo mpanankarena
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 10.17-31; Lk 18.18-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary indro nisy tovolahy nanatona an’i Jesoa ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, inona no tsara tokony hataoko hahavelona aina ahy mandrakizay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana Aho no anontanianao ny amin’izay tsara? Tokana no tsara tapitra ohatra. Raha te hiroso amin’ny fiainana kosa ianao, dia tandremo ny didy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy ilay zatovo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Didy sahala amin’inona moa izany?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka izao no navalin’i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny didy sahala amin’ny hoe: Aza mamono olona, aza maka vadin’olona, aza mangalatra, aza manao vavolombelona tsy marina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: hajao ny rainao sy ny reninao, ary tiavo ny namanao tahaka ny itiavanao ny tenanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 20.12-16; Deot 5.16-20; Lev 19.18.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy ilay zatovo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izany rehetra izany dia efa voatandriko; ka inona no mbola tsy ampy amiko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary i Jesoa nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha te ho velona aina tanteraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 5.48.
    marker-yv: yv-n
  - type: text
    text: ' ianao, ndeha amidio ny fanananao ka zarao amin’ny mahantra ny vidiny, dia hanana rakitra any an-danitra ianao; raha efa izany, dia avia hiaraka amiko!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nony nandre izany teny izany ilay zatovo, dia lasa nandeha tamin’alahelo, satria nanan-karem-be.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’izay i Jesoa dia niteny tamin’ny mpianany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazaiko marina aminareo fa sarotra amin’ny mpanankarena ny hiditra ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy koa Aho aminareo: moramora kokoa ny hidiran’ny rameva ao amin’ny vodifanjaikely noho ny hidiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'moramora... Fanjakàn’Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: moramora kokoa ny hidiran’ny tadimahazaka ao amin’ny vodifanjaikely noho ny hidiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Talanjona tokoa ny mpianatra raha nandre izany ka vaky vava hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza àry no mety ho voavonjy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa nojeren’i Jesoa tsara ireto mpianany sady nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha amin’ny olombelona, dia zavatra tsy hainy izany; fa raha amin’Andriamanitra, dia hainy avokoa ny zavatra rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 18.14; Jer 32.17.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’izay i Petera dia niteny tamin’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro izahay efa nahafoy ny zavatra rehetra, ary dia izao miaraka aminao izao; ka inona àry no ho azonay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy i Jesoa tamin’ny mpianany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazaiko marina aminareo fa rehefa hohavaozina tanteraka izao tontolo izao ka hipetraka eo amin’ny sezafiandrianany be voninahitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Dan 7.14.
    marker-yv: yv-n
  - type: text
    text: ', ianareo 12 lahy niaraka tamiko dia samy hipetraka amina sezafiandrianana mba hitsara ny foko 12 amin’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary izay rehetra mahafoy trano na mpiray tampo na ray aman-dreny na zanaka na tany noho ny fitiavana Ahy dia hahazo injato henin’izany ary hanana anjara amin’ny fiaina-maharitra mandrakizay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ny mpiasa tanimboaloboka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Maro amin’ireo voalohany no ho farany, ary maro amin’ireo farany no ho voalohany.
