document_id: MAT.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampianaran’i Jesoa momba ny fanambadiana
  - type: heading
    content: (Jereo Mk 10.1-12)
  - type: text
    content: Rehefa nahavita izany anatranatra izany i Jesoa, dia niala tao Galilea ary nankany amin’ny faritra antsisin’i Jodea, eny andafin’ny ony Jôrdàna
  - type: note
    content: 'eny andafin’ny ony Jôrdàna: izany hoe eny andafy atsinanan’io ony io.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ary ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' kosa niteny tamin’i Jesoa hoe:'
  - type: text
    content: –Raha izany no takîna amin’ny lehilahy manoloana ny vadiny, dia aleo tsy manambady!
  '11':
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: '–Tsy ny olona rehetra no mandray izany fampianarana izany, fa izay nomen’Andriamanitra fahasoavana ihany. '
  '12':
  - type: text
    content: 'Eny, misy olona tsy hanambady noho ny antony samihafa: ao ny tsy manambady, satria manan-kilema hatrany an-kibon-dreniny; ao ny tsy manambady, satria noterena hahazo takaitra; ary ao ny tsy manambady an-tsitrapo noho ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: . Izay afa-mandray izany, aoka handray!
  - type: heading
    content: Tsofin’i Jesoa rano ny zaza
  - type: heading
    content: (Jereo Mk 10.13-16; Lk 18.15-17)
  '13':
  - type: text
    content: 'Tamin’izay dia nisy ankizy madinika maro nentin’ny olona teo amin’i Jesoa hametrahany tanana sy hivavahany. Notenenin’ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' mafy ireo olona ireo, '
  '14':
  - type: text
    content: 'fa hoy kosa i Jesoa:'
  - type: text
    content: '–Avelao ny ankizy madinika hanatona Ahy, fa aza raràna, satria an’ny toa azy ireny ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: .
  '15':
  - type: text
    content: Dia nametra-tanana tamin’ireo ankizy madinika ireo i Jesoa vao niala teo.
  - type: heading
    content: Ilay zatovo mpanankarena
  - type: heading
    content: (Jereo Mk 10.17-31; Lk 18.18-30)
  '16':
  - type: text
    content: 'Ary indro nisy tovolahy nanatona an’i Jesoa ka nanao taminy hoe:'
  - type: text
    content: –Mpampianatra ô, inona no tsara tokony hataoko hahavelona aina ahy mandrakizay?
  '17':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Nahoana Aho no anontanianao ny amin’izay tsara? Tokana no tsara tapitra ohatra. Raha te hiroso amin’ny fiainana kosa ianao, dia tandremo ny didy!
  '18':
  - type: text
    content: 'Fa hoy ilay zatovo taminy:'
  - type: text
    content: –Didy sahala amin’inona moa izany?
  - type: text
    content: 'Ka izao no navalin’i Jesoa:'
  - type: text
    content: '–Ny didy sahala amin’ny hoe: Aza mamono olona, aza maka vadin’olona, aza mangalatra, aza manao vavolombelona tsy marina; '
  '19':
  - type: text
    content: hajao ny rainao sy ny reninao, ary tiavo ny namanao tahaka ny itiavanao ny tenanao
  - type: note
    content: Jereo Eks 20.12-16; Deot 5.16-20; Lev 19.18.
  - type: text
    content: '!'
  '2':
  - type: text
    content: Vahoaka maro no nanaraka Azy ary nahasitrana ny marary teo i Jesoa.
  '20':
  - type: text
    content: 'Dia hoy ilay zatovo taminy:'
  - type: text
    content: –Izany rehetra izany dia efa voatandriko; ka inona no mbola tsy ampy amiko?
  '21':
  - type: text
    content: 'Ary i Jesoa nanao taminy hoe:'
  - type: text
    content: –Raha te ho velona aina tanteraka
  - type: note
    content: Ampit 5.48.
  - type: text
    content: ' ianao, ndeha amidio ny fanananao ka zarao amin’ny mahantra ny vidiny, dia hanana rakitra any an-danitra ianao; raha efa izany, dia avia hiaraka amiko!'
  '22':
  - type: text
    content: Nony nandre izany teny izany ilay zatovo, dia lasa nandeha tamin’alahelo, satria nanan-karem-be.
  '23':
  - type: text
    content: 'Tamin’izay i Jesoa dia niteny tamin’ny mpianany hoe:'
  - type: text
    content: '–Lazaiko marina aminareo fa sarotra amin’ny mpanankarena ny hiditra ao amin’ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Ary hoy koa Aho aminareo: moramora kokoa ny hidiran’ny rameva ao amin’ny vodifanjaikely noho ny hidiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra'
  - type: note
    content: 'moramora... Fanjakàn’Andriamanitra: dkt hafa moramora kokoa ny hidiran’ny tadimahazaka ao amin’ny vodifanjaikely noho ny hidiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra.'
  - type: text
    content: '!'
  '25':
  - type: text
    content: 'Talanjona tokoa ny mpianatra raha nandre izany ka vaky vava hoe:'
  - type: text
    content: –Iza àry no mety ho voavonjy?
  '26':
  - type: text
    content: 'Fa nojeren’i Jesoa tsara ireto mpianany sady nataony hoe:'
  - type: text
    content: –Raha amin’ny olombelona, dia zavatra tsy hainy izany; fa raha amin’Andriamanitra, dia hainy avokoa ny zavatra rehetra
  - type: note
    content: Jereo Gen 18.14; Jer 32.17.
  - type: text
    content: .
  '27':
  - type: text
    content: 'Tamin’izay i Petera dia niteny tamin’i Jesoa hoe:'
  - type: text
    content: –Indro izahay efa nahafoy ny zavatra rehetra, ary dia izao miaraka aminao izao; ka inona àry no ho azonay?
  '28':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ny mpianany:'
  - type: text
    content: '–Lazaiko marina aminareo fa rehefa hohavaozina tanteraka izao tontolo izao ka hipetraka eo amin’ny sezafiandrianany be voninahitra ny '
  - type: text
    content: Zanak’olona
  - type: note
    content: Ampit Dan 7.14.
  - type: text
    content: ', ianareo 12 lahy niaraka tamiko dia samy hipetraka amina sezafiandrianana mba hitsara ny foko 12 amin’i Israely. '
  '29':
  - type: text
    content: Ary izay rehetra mahafoy trano na mpiray tampo na ray aman-dreny na zanaka na tany noho ny fitiavana Ahy dia hahazo injato henin’izany ary hanana anjara amin’ny fiaina-maharitra mandrakizay.
  - type: heading
    content: Fanoharana momba ny mpiasa tanimboaloboka
  '3':
  - type: text
    content: 'Dia nisy '
  - type: text
    content: Farisianina
  - type: text
    content: ' nanatona Azy mba hamandrika Azy ka nanontany hoe:'
  - type: text
    content: –Azon’ny lehilahy atao ve ny manary vady na inona na inona antony?
  '30':
  - type: text
    content: Maro amin’ireo voalohany no ho farany, ary maro amin’ireo farany no ho voalohany.
  '4':
  - type: text
    content: Dia izao no navalin’i Jesoa
  - type: note
    content: Gen 1.27; 5.2.
  - type: text
    content: ':'
  - type: text
    content: '–Tsy mbola novakînareo tao amin’ny Soratra Masina ve fa ilay Mpahary, hatrany am-piandohana, dia «nanao ny olona ho lahy sy vavy», '
  '5':
  - type: text
    content: 'sady niteny hoe: «noho izany, dia handao ny ray aman-dreniny ny lehilahy ka hikambana amin’ny vadiny, ary dia ho tena iray ihany izy roroa'
  - type: note
    content: Gen 2.24.
  - type: text
    content: '.» '
  '6':
  - type: text
    content: Koa tsy roa intsony rehefa mpivady fa tena iray ihany; noho izany, izay nakamban’Andriamanitra dia aoka tsy hosarahin’olombelona.
  '7':
  - type: text
    content: 'Fa hoy ireo Farisianina tamin’i Jesoa:'
  - type: text
    content: –Koa nahoana àry no nandidian’i Mosesy ny lehilahy hanome taratasy fisaraham-panambadiana ho an’ny vadiny rehefa hanary azy
  - type: note
    content: Jereo Deot 24.1; Mt 5.31.
  - type: text
    content: '?'
  '8':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Noho ianareo mafy fo no namelan’i Mosesy anareo hanary vady, fa tsy toy izany hatrany am-piandohana. '
  '9':
  - type: text
    content: 'Izao kosa no lazaiko aminareo: na iza na iza lehilahy manary vady, afa-tsy noho ny fifandraisana mamoafady'
  - type: note
    content: 'fifandraisana mamoafady: jereo Mt 5.32 sy nta.'
  - type: text
    content: ', ka mampakatra vehivavy hafa, dia manitsakitsaka ny vadiny teo aloha.'
  - type: heading
    content: Misy olona tsy hanambady noho ny Fanjakàn’ny lanitra
