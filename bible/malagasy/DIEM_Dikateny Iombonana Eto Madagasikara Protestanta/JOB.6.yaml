document_id: JOB.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny valintenin’i Jôba: mitaraina amin’ireo sakaizany izy.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly i Jôba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha mba azo nolanjaina ny fahasosorako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka natao teo ambony mizana miaraka amin’ny fahoriako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia ho navesatra noho ny fasi-dranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no nahatonga ahy hiteniteny foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa mitsatoka amiko ny zana-tsipîkan’ny ilay Tsitoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miely amin’ny tenako ny poiziny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary alahatr’Andriamanitra hamely ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra mety ho fampitahorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Maneno ve ny borikidia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha eo anoloan’ny ahi-maitso?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mimàma ve ny omby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mihinam-bilona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Azo hanina tsy misy sira ve ny sakafo matsatso?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahitan-tsirony ve ny tapotsin’atody manta?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy mahatelina ireo ny tendako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria sakafo maharikoriko ahy,
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Enga anie ka ho to ny faniriako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotanterahin’Andriamanitra ny fanantenako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho sitrak’Andriamanitra anie ny hanorotoro ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoesoiny anie ilay tànam-piarovany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanaperany ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hibita-kafaliana aho na dia omba-ngirifiry mazana aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hahita fiononana ahay amin’ny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba nandika ny didin’Andriamanitra masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa tsy manan-kery azoko antenaina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: inona intsony no mbola iaretako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy misy tanjona iafarako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Moa vato ve aho ka hahatanty ny zava-drehetra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa mafy toy ny varahina ve ny tenako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Foana ilay fanampiana mba nandrandrain’ny tenako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nesorina tamiko izay mety ho famonjena ahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tokony hiantran-tsakaiza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona efa ketraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao tsy hifikitra intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’Andriamanitra Tsitoha izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nanodoka ahy toy ny ranotrambo ny rahalahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka ny mason-dranon-driaka malaky ritra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: itosahan’ny rano matromatroka ny riaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa miempo ny ranomandry sy oram-panala any erà.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa nony tonga ny hafanambe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ritra ireny ranon-driaka ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nony midanika ny masoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manjavona ho azy am-pitoerana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izany no mampivily lalana ny andia-mpifindralasy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka irosoany any an-taniefitra sy mahavery azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Na andia-mpifindralasy avy any Temà
- type: usfm
  marker: q1
  children:
  - type: text
    text: na andia-mpandranto avy any Sebà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Temà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vondron-java-maniry any an-taniefitr’i Arabia avaratra. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Sebà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': any atsimon’i Arabia; jereo 1.15 sy nta.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy mitazana ny riaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary samy manantena azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Diso fanantenana ireo satria samy nanampo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo nangaihay nony tonga teo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Efa toy izany ianareo izao ho an’ity sakaizanareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitanareo ny fahavoazako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia natahotra ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Efa nangata-panomezana taminareo ve aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na niangavy hahafoizanareo ampaham-pananana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: mba hamonjena ahy amin’ny tanan’ny fahavalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanafaka ahy amin’ny vahohon’ny mpampahory?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ampianaro aho fa vonona ny hangina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampahafantaro ahy ny nahadisoako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny teny marina tsy mba mandratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mba inona izay fanomezan-tsiny ataonareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hanome tsiny ahy noho ny teniko ve ianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa natao hoentin-drivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireny tenin’olona mamoy fo ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny kamboty aza moa ataonareo antoka loka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary sahinareo amidy hatramin’ny sakaizanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ankehitriny mba meteza hijery ahy kely
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahitanareo fa tsy mandainga aho akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Diniho indray ange ka aza mitsara tsy marina e!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, diniho indray fa hiharihary ny fahamarinako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Misy fitaka ve izay nolazaiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa izaho no tsy mahay manavaka ny ratsy?
