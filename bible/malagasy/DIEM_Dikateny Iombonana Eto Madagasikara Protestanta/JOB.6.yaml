document_id: JOB.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny valintenin’i Jôba: mitaraina amin’ireo sakaizany izy.'
  - type: text
    content: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Hibita-kafaliana aho na dia omba-ngirifiry mazana aza
  - type: text
    content: 'ary hahita fiononana ahay amin’ny hoe:'
  - type: text
    content: tsy mba nandika ny didin’Andriamanitra masina.
  '11':
  - type: text
    content: Fa tsy manan-kery azoko antenaina aho;
  - type: text
    content: inona intsony no mbola iaretako,
  - type: text
    content: raha tsy misy tanjona iafarako!
  '12':
  - type: text
    content: Moa vato ve aho ka hahatanty ny zava-drehetra?
  - type: text
    content: Moa mafy toy ny varahina ve ny tenako?
  '13':
  - type: text
    content: Foana ilay fanampiana mba nandrandrain’ny tenako,
  - type: text
    content: fa nesorina tamiko izay mety ho famonjena ahy.
  - type: heading
    content: '*'
  '14':
  - type: text
    content: Tokony hiantran-tsakaiza
  - type: text
    content: ny olona efa ketraka,
  - type: text
    content: fandrao tsy hifikitra intsony
  - type: text
    content: amin’Andriamanitra Tsitoha izy.
  '15':
  - type: text
    content: Nanodoka ahy toy ny ranotrambo ny rahalahiko,
  - type: text
    content: dia tahaka ny mason-dranon-driaka malaky ritra,
  '16':
  - type: text
    content: itosahan’ny rano matromatroka ny riaka,
  - type: text
    content: rehefa miempo ny ranomandry sy oram-panala any erà.
  '17':
  - type: text
    content: Fa nony tonga ny hafanambe,
  - type: text
    content: dia ritra ireny ranon-driaka ireny;
  - type: text
    content: ary nony midanika ny masoandro,
  - type: text
    content: dia manjavona ho azy am-pitoerana izy.
  '18':
  - type: text
    content: Izany no mampivily lalana ny andia-mpifindralasy,
  - type: text
    content: ka irosoany any an-taniefitra sy mahavery azy.
  '19':
  - type: text
    content: Na andia-mpifindralasy avy any Temà
  - type: text
    content: na andia-mpandranto avy any Sebà
  - type: note
    content: 'Temà: vondron-java-maniry any an-taniefitr’i Arabia avaratra. –Sebà: any atsimon’i Arabia; jereo 1.15 sy nta.'
  - type: text
    content: dia samy mitazana ny riaka
  - type: text
    content: ary samy manantena azy.
  '2':
  - type: text
    content: Raha mba azo nolanjaina ny fahasosorako
  - type: text
    content: ka natao teo ambony mizana miaraka amin’ny fahoriako,
  '20':
  - type: text
    content: Diso fanantenana ireo satria samy nanampo,
  - type: text
    content: kanjo nangaihay nony tonga teo.
  '21':
  - type: text
    content: Efa toy izany ianareo izao ho an’ity sakaizanareo;
  - type: text
    content: hitanareo ny fahavoazako
  - type: text
    content: ka dia natahotra ianareo.
  '22':
  - type: text
    content: Efa nangata-panomezana taminareo ve aho
  - type: text
    content: na niangavy hahafoizanareo ampaham-pananana,
  '23':
  - type: text
    content: mba hamonjena ahy amin’ny tanan’ny fahavalo
  - type: text
    content: sy hanafaka ahy amin’ny vahohon’ny mpampahory?
  '24':
  - type: text
    content: Ampianaro aho fa vonona ny hangina
  - type: text
    content: ary ampahafantaro ahy ny nahadisoako.
  '25':
  - type: text
    content: Ny teny marina tsy mba mandratra;
  - type: text
    content: fa mba inona izay fanomezan-tsiny ataonareo?
  '26':
  - type: text
    content: Hanome tsiny ahy noho ny teniko ve ianareo?
  - type: text
    content: Kanefa natao hoentin-drivotra
  - type: text
    content: ireny tenin’olona mamoy fo ireny.
  '27':
  - type: text
    content: Ny kamboty aza moa ataonareo antoka loka;
  - type: text
    content: ary sahinareo amidy hatramin’ny sakaizanareo.
  '28':
  - type: text
    content: Ankehitriny mba meteza hijery ahy kely
  - type: text
    content: hahitanareo fa tsy mandainga aho akory.
  '29':
  - type: text
    content: Diniho indray ange ka aza mitsara tsy marina e!
  - type: text
    content: Eny, diniho indray fa hiharihary ny fahamarinako.
  '3':
  - type: text
    content: dia ho navesatra noho ny fasi-dranomasina;
  - type: text
    content: Izany no nahatonga ahy hiteniteny foana.
  '30':
  - type: text
    content: Misy fitaka ve izay nolazaiko?
  - type: text
    content: Sa izaho no tsy mahay manavaka ny ratsy?
  '4':
  - type: text
    content: Fa mitsatoka amiko ny zana-tsipîkan’ny ilay Tsitoha,
  - type: text
    content: ka miely amin’ny tenako ny poiziny.
  - type: text
    content: Ary alahatr’Andriamanitra hamely ahy
  - type: text
    content: izay rehetra mety ho fampitahorana.
  '5':
  - type: text
    content: Maneno ve ny borikidia,
  - type: text
    content: raha eo anoloan’ny ahi-maitso?
  - type: text
    content: Ary mimàma ve ny omby,
  - type: text
    content: raha mihinam-bilona?
  '6':
  - type: text
    content: Azo hanina tsy misy sira ve ny sakafo matsatso?
  - type: text
    content: Ahitan-tsirony ve ny tapotsin’atody manta?
  '7':
  - type: text
    content: Tsy mahatelina ireo ny tendako,
  - type: text
    content: satria sakafo maharikoriko ahy,
  - type: heading
    content: '*'
  '8':
  - type: text
    content: Enga anie ka ho to ny faniriako
  - type: text
    content: ary hotanterahin’Andriamanitra ny fanantenako!
  '9':
  - type: text
    content: Ho sitrak’Andriamanitra anie ny hanorotoro ahy;
  - type: text
    content: hoesoiny anie ilay tànam-piarovany
  - type: text
    content: mba hanaperany ny aiko.
