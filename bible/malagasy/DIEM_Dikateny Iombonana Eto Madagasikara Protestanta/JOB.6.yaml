document_id: JOB.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny valintenin’i Jôba: mitaraina amin’ireo sakaizany izy.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hibita-kafaliana aho na dia omba-ngirifiry mazana aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary hahita fiononana ahay amin’ny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba nandika ny didin’Andriamanitra masina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy manan-kery azoko antenaina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: inona intsony no mbola iaretako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy misy tanjona iafarako!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa vato ve aho ka hahatanty ny zava-drehetra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa mafy toy ny varahina ve ny tenako?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foana ilay fanampiana mba nandrandrain’ny tenako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nesorina tamiko izay mety ho famonjena ahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tokony hiantran-tsakaiza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olona efa ketraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao tsy hifikitra intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’Andriamanitra Tsitoha izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanodoka ahy toy ny ranotrambo ny rahalahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tahaka ny mason-dranon-driaka malaky ritra,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: itosahan’ny rano matromatroka ny riaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa miempo ny ranomandry sy oram-panala any erà.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nony tonga ny hafanambe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ritra ireny ranon-driaka ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nony midanika ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia manjavona ho azy am-pitoerana izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no mampivily lalana ny andia-mpifindralasy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka irosoany any an-taniefitra sy mahavery azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na andia-mpifindralasy avy any Temà
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na andia-mpandranto avy any Sebà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Temà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vondron-java-maniry any an-taniefitr’i Arabia avaratra. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Sebà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': any atsimon’i Arabia; jereo 1.15 sy nta.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy mitazana ny riaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary samy manantena azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mba azo nolanjaina ny fahasosorako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka natao teo ambony mizana miaraka amin’ny fahoriako,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Diso fanantenana ireo satria samy nanampo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo nangaihay nony tonga teo.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa toy izany ianareo izao ho an’ity sakaizanareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitanareo ny fahavoazako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia natahotra ianareo.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nangata-panomezana taminareo ve aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na niangavy hahafoizanareo ampaham-pananana,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamonjena ahy amin’ny tanan’ny fahavalo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanafaka ahy amin’ny vahohon’ny mpampahory?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampianaro aho fa vonona ny hangina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampahafantaro ahy ny nahadisoako.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny teny marina tsy mba mandratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mba inona izay fanomezan-tsiny ataonareo?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanome tsiny ahy noho ny teniko ve ianareo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa natao hoentin-drivotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireny tenin’olona mamoy fo ireny.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kamboty aza moa ataonareo antoka loka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary sahinareo amidy hatramin’ny sakaizanareo.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny mba meteza hijery ahy kely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahitanareo fa tsy mandainga aho akory.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Diniho indray ange ka aza mitsara tsy marina e!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, diniho indray fa hiharihary ny fahamarinako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho navesatra noho ny fasi-dranomasina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no nahatonga ahy hiteniteny foana.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy fitaka ve izay nolazaiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa izaho no tsy mahay manavaka ny ratsy?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mitsatoka amiko ny zana-tsipîkan’ny ilay Tsitoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miely amin’ny tenako ny poiziny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary alahatr’Andriamanitra hamely ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra mety ho fampitahorana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maneno ve ny borikidia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha eo anoloan’ny ahi-maitso?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mimàma ve ny omby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mihinam-bilona?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azo hanina tsy misy sira ve ny sakafo matsatso?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahitan-tsirony ve ny tapotsin’atody manta?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahatelina ireo ny tendako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria sakafo maharikoriko ahy,
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka ho to ny faniriako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hotanterahin’Andriamanitra ny fanantenako!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho sitrak’Andriamanitra anie ny hanorotoro ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoesoiny anie ilay tànam-piarovany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanaperany ny aiko.
