document_id: ECC.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary dia hoy aho anakampoko: «Andeha hojerena ny lanjan’ny fifaliana eo amin’ny fiainana, ary hotadiavina ny atao hoe fahasambarana.» Kanjo indro fa zava-poana koa izany. '
  '10':
  - type: text
    content: 'Azoko avokoa izay nirîko rehetra. Tsy nanakana ny tenako tsy hifaly aho. Eny, nanararaotra ireo asako rehetra aho ka nahazo izay anjara fifaliana vokatr’izany. '
  '11':
  - type: text
    content: Natrehiko nodinihina ny asa rehetra nataoko sy ny fisasarako tamin’ny fanatontosana azy. Tsapako fa zava-poana sy manenji-drivotra izany rehetra izany; ary tsy misy voka-tsoa maharitra azo amin’izany etỳ ambonin’ny tany
  - type: note
    content: Jereo Sal 62.10; Rom 8.20.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Ary natrehiko nojerena izay tombontsoa azo, raha hendry na very saina na adala. Ka nanontany tena aho ny amin’izay hataon’ny mpanjaka handimby ahy, raha tsy ny hamerina ny natao teo aloha? '
  '13':
  - type: text
    content: 'Eny, hitako fa tsara kokoa ny fahendrena noho ny fahadalana, tahaka ny mahatsara kokoa ny fahazavana noho ny haizina. '
  '14':
  - type: text
    content: 'Satria ny hendry mahita ny tokony halehany, fa ny adala kosa miraparapa ao anaty haizina. Nefa fantatro koa fa mitovy ihany ny hanjo azy roa tonta. '
  '15':
  - type: text
    content: 'Dia hoy aho anakampoko: «Satria ny hanjo ny adala ihany no hanjo ahy, inona no tombontsoako amin’ny maha hendry ahy kokoa noho izy?» Ka hoy aho anakampoko: «Zava-poana koa izany». '
  '16':
  - type: text
    content: 'Ny zava-drehetra mitranga dia hadino amin’ny andro manaraka. Maty toy ny adala koa ny hendry, ary na ny andaniny na ny ankilany dia samy tsy hisy hahatsiaro. Fa ahoana izany? '
  '17':
  - type: text
    content: Koa halako ny miaina, satria ratsy no fahitàko ny asa atao etỳ ambonin’ny tany; fa zava-poana sy manenji-drivotra izany rehetra izany.
  '18':
  - type: text
    content: 'Halako ny fisasarana rehetra nataoko tetỳ ambonin’ny tany, satria izay rehetra vitako dia tsy maintsy havelako ho an’ny mpandimby ahy. '
  '19':
  - type: text
    content: 'Iza no mahalala na ho hendry na ho adala izy? Nefa dia ho eo am-pelatanany avokoa izay rehetra nisasarako sy nataoko tamim-pahendrena tetỳ ambonin’ny tany. Zava-poana koa izany. '
  '2':
  - type: text
    content: 'Fahadalana ny fihomehezana, hoy aho; ary tsy mitondra mankaiza ny fifaliana. '
  '20':
  - type: text
    content: 'Nitarika ahy hamoy fo izany fisasarana rehetra nataoko tetỳ ambonin’ny tany izany. '
  '21':
  - type: text
    content: 'Misy manko olona izay nisasatra niasa tamim-pahakingana sy tamim-pahaizana ary tamim-pahombiazana, kanefa dia olona izay tsy nisasatra tamin’izany akory ny no tsy maintsy hamelany azy ho lova. Zava-poana koa izany, ary tsy rariny goavana. '
  '22':
  - type: text
    content: 'Koa araka izany, inona no tombontsoa azon’ny olona amin’ny fisasarany rehetra sy amin’ny ezaka ataony etỳ ambonin’ny tany? '
  '23':
  - type: text
    content: Fanaintainana sy fahasorenana no ateraky ny asany mandritra ny andro rehetra iainany; ary, na dia amin’ny alina aza, dia tsy miala sasatra ny sainy
  - type: note
    content: Jereo Jôb 5.7; 7.1-4; 14.1.
  - type: text
    content: . Zava-poana koa izany!
  '24':
  - type: text
    content: Ny hany fahasambaran’ny olona dia ny mihinana sy ny misotro ary ny mifaly amin’ny valin-kasasarany
  - type: note
    content: Jereo 3.12-13; 5.18; 8.15; 9.7.
  - type: text
    content: '. Tsapako fa avy amin’Andriamanitra izany fahasambarana izany; '
  '25':
  - type: text
    content: satria tsy misy olona afaka mihinana na mifaly, raha tsy Andriamanitra no manome azy izany
  - type: note
    content: Andininy nadika araka ny dikanteny grika tranainy; hebreo tsy misy mahahinana sy afaka manarampo afa-tsy izaho.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Eny, izay olona sitrak’Andriamanitra no omeny fahakingana sy ny fahaizana ary ny fifaliana. Fa izay mpanota kosa dia asainy manangona sy mamory mba hisy homeny an’izay sitrak’Andriamanitra
  - type: note
    content: Jereo Jôba 27.16-17; 32.8; Oha 2.6; 13.22.
  - type: text
    content: . Mbola zava-poana sy manenji-drivotra koa izany.
  '3':
  - type: text
    content: 'Tapa-kevitra aho hamalifaly tena amin’ny divay ka hisary adala, nefa dia mbola hanam-pahendrena ho tompon’ny tenako ihany. Mba tiako ho fantatra manko izay tsara tokony hataon’ny olona mandritra ny androm-piainany fohy etỳ ambonin’ny tany. '
  '4':
  - type: text
    content: 'Nanao asa lehibe ho ahy aho: nanangana trano maro ho ahy ary namboly voaloboka. '
  '5':
  - type: text
    content: 'Nanao zaridaina sy saha aho ary namboly hazo fihinam-boa isan-karazany. '
  '6':
  - type: text
    content: 'Nanamboatra lavaka famorian-drano aho mba hahafahana manondraka ny alan-jana-kazo. '
  '7':
  - type: text
    content: 'Nampiditra mpiasa lehilahy sy vehivavy aho, ho fanampin’ny mpanompo efa nananako. Nanana omby sy ondry aman’osy betsaka noho ireo rehetra nodimbiasako teto Jerosalema aho, '
  '8':
  - type: text
    content: 'ary nahangom-bolamena amam-bolafotsy izay fananan’ireo mpanjaka mbamin’ny faritany samy hafa. Mpihira lahy sy vavy maro no azoko hanala sorisory ahy; ary azoko izay mahafinaritra ny lehilahy, dia vady sy vaditsindrano betsaka. '
  '9':
  - type: text
    content: Tonga olona ambony aho ka nomem-boninahitra mihoatra noho ireo izay nanjaka talohako tao Jerosalema
  - type: note
    content: Ny and 4-9 dia tsifanondro amin’ny rehaka nisy tamin’ny fanjakan’i Salômôna, jereo 1 Tan 29.25; 1 Mp 5.2-4; 10.10; 14-27; 2 Tan 9.22-27.
  - type: text
    content: '. Nefa, na dia izany aza, dia nijanona ho olon-kendry aho. '
