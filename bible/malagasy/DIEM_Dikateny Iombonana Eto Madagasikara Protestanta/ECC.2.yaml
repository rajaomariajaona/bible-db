document_id: ECC.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary dia hoy aho anakampoko: «Andeha hojerena ny lanjan’ny fifaliana eo amin’ny fiainana, ary hotadiavina ny atao hoe fahasambarana.» Kanjo indro fa zava-poana koa izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Azoko avokoa izay nirîko rehetra. Tsy nanakana ny tenako tsy hifaly aho. Eny, nanararaotra ireo asako rehetra aho ka nahazo izay anjara fifaliana vokatr’izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Natrehiko nodinihina ny asa rehetra nataoko sy ny fisasarako tamin’ny fanatontosana azy. Tsapako fa zava-poana sy manenji-drivotra izany rehetra izany; ary tsy misy voka-tsoa maharitra azo amin’izany etỳ ambonin’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 62.10; Rom 8.20.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary natrehiko nojerena izay tombontsoa azo, raha hendry na very saina na adala. Ka nanontany tena aho ny amin’izay hataon’ny mpanjaka handimby ahy, raha tsy ny hamerina ny natao teo aloha? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Eny, hitako fa tsara kokoa ny fahendrena noho ny fahadalana, tahaka ny mahatsara kokoa ny fahazavana noho ny haizina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Satria ny hendry mahita ny tokony halehany, fa ny adala kosa miraparapa ao anaty haizina. Nefa fantatro koa fa mitovy ihany ny hanjo azy roa tonta. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy aho anakampoko: «Satria ny hanjo ny adala ihany no hanjo ahy, inona no tombontsoako amin’ny maha hendry ahy kokoa noho izy?» Ka hoy aho anakampoko: «Zava-poana koa izany». '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny zava-drehetra mitranga dia hadino amin’ny andro manaraka. Maty toy ny adala koa ny hendry, ary na ny andaniny na ny ankilany dia samy tsy hisy hahatsiaro. Fa ahoana izany? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Koa halako ny miaina, satria ratsy no fahitàko ny asa atao etỳ ambonin’ny tany; fa zava-poana sy manenji-drivotra izany rehetra izany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Halako ny fisasarana rehetra nataoko tetỳ ambonin’ny tany, satria izay rehetra vitako dia tsy maintsy havelako ho an’ny mpandimby ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Iza no mahalala na ho hendry na ho adala izy? Nefa dia ho eo am-pelatanany avokoa izay rehetra nisasarako sy nataoko tamim-pahendrena tetỳ ambonin’ny tany. Zava-poana koa izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fahadalana ny fihomehezana, hoy aho; ary tsy mitondra mankaiza ny fifaliana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nitarika ahy hamoy fo izany fisasarana rehetra nataoko tetỳ ambonin’ny tany izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Misy manko olona izay nisasatra niasa tamim-pahakingana sy tamim-pahaizana ary tamim-pahombiazana, kanefa dia olona izay tsy nisasatra tamin’izany akory ny no tsy maintsy hamelany azy ho lova. Zava-poana koa izany, ary tsy rariny goavana. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Koa araka izany, inona no tombontsoa azon’ny olona amin’ny fisasarany rehetra sy amin’ny ezaka ataony etỳ ambonin’ny tany? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fanaintainana sy fahasorenana no ateraky ny asany mandritra ny andro rehetra iainany; ary, na dia amin’ny alina aza, dia tsy miala sasatra ny sainy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jôb 5.7; 7.1-4; 14.1.
      marker-yv: yv-n
    - type: text
      text: . Zava-poana koa izany!
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny hany fahasambaran’ny olona dia ny mihinana sy ny misotro ary ny mifaly amin’ny valin-kasasarany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.12-13; 5.18; 8.15; 9.7.
      marker-yv: yv-n
    - type: text
      text: '. Tsapako fa avy amin’Andriamanitra izany fahasambarana izany; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: satria tsy misy olona afaka mihinana na mifaly, raha tsy Andriamanitra no manome azy izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Andininy nadika araka ny dikanteny grika tranainy; hebreo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsy misy mahahinana sy afaka manarampo afa-tsy izaho
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Eny, izay olona sitrak’Andriamanitra no omeny fahakingana sy ny fahaizana ary ny fifaliana. Fa izay mpanota kosa dia asainy manangona sy mamory mba hisy homeny an’izay sitrak’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jôba 27.16-17; 32.8; Oha 2.6; 13.22.
      marker-yv: yv-n
    - type: text
      text: . Mbola zava-poana sy manenji-drivotra koa izany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tapa-kevitra aho hamalifaly tena amin’ny divay ka hisary adala, nefa dia mbola hanam-pahendrena ho tompon’ny tenako ihany. Mba tiako ho fantatra manko izay tsara tokony hataon’ny olona mandritra ny androm-piainany fohy etỳ ambonin’ny tany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nanao asa lehibe ho ahy aho: nanangana trano maro ho ahy ary namboly voaloboka. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nanao zaridaina sy saha aho ary namboly hazo fihinam-boa isan-karazany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nanamboatra lavaka famorian-drano aho mba hahafahana manondraka ny alan-jana-kazo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nampiditra mpiasa lehilahy sy vehivavy aho, ho fanampin’ny mpanompo efa nananako. Nanana omby sy ondry aman’osy betsaka noho ireo rehetra nodimbiasako teto Jerosalema aho, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'ary nahangom-bolamena amam-bolafotsy izay fananan’ireo mpanjaka mbamin’ny faritany samy hafa. Mpihira lahy sy vavy maro no azoko hanala sorisory ahy; ary azoko izay mahafinaritra ny lehilahy, dia vady sy vaditsindrano betsaka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tonga olona ambony aho ka nomem-boninahitra mihoatra noho ireo izay nanjaka talohako tao Jerosalema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny and 4-9 dia tsifanondro amin’ny rehaka nisy tamin’ny fanjakan’i Salômôna, jereo 1 Tan 29.25; 1 Mp 5.2-4; 10.10; 14-27; 2 Tan 9.22-27.
      marker-yv: yv-n
    - type: text
      text: '. Nefa, na dia izany aza, dia nijanona ho olon-kendry aho. '
