document_id: ACT.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tao Malta
  - type: text
    content: 'Voavonjy teo àry izahay vao nahalala fa hay i Malta no iantsoana ilay nosy. '
  '10':
  - type: text
    content: Tsy tambo ny fanomezana natolotry ny tompontany ho anay; ary nony niondrana indray izahay, dia novatsîny izay zavatra ilainay.
  - type: heading
    content: Tonga tao Rôma i Paoly
  '11':
  - type: text
    content: Nony afaka telo volana, dia niondrana izahay tamin’ilay sambo anankiray nijanona tao amin’izany nosy izany nandritra ny ririnina. Sambo avy any Aleksandria izy io ary nantsoina hoe «Diôskory
  - type: note
    content: 'Diôskory: izany hoe andriamanitra kambana, dia i Kastôro sy i Pôliksa izay malaza amin’ireo andriamanitry ny Grika ary ninoana ho mpiaro ny tantsambo.'
  - type: text
    content: '». '
  '12':
  - type: text
    content: 'Tody tao Sirakoza izahay ary nitoetra telo andro tao. '
  '13':
  - type: text
    content: 'Avy eo izahay, dia nanara-morona ka tafapaka hatrany Reziôma. Nifofofofo ny rivotra avy any atsimo ny ampitson’iny, ka dia tratranay indroa andro ny seranan’i Potioly. '
  '14':
  - type: text
    content: 'Tao amin’io tanàna io dia nahitanay havana iray finoana izay niangavy anay hitoetra ao aminy mandritra ny fito andro. Dia toy izany no nandrosoanay nankany Rôma. '
  '15':
  - type: text
    content: 'Efa nahazo vaovao momba anay ny havana iray finoana tao Rôma, ka tamy nitsena anay hatreny an-Tsenan’i Apio sy hatreny Antranotelombahiny. Nony nahita azy rehetra i Paoly, dia velom-pisaorana an’Andriamanitra sady nahazo toky. '
  '16':
  - type: text
    content: Rehefa tonga tao Rôma izahay, dia nahazo lalana hitoetra mitokana i Paoly, saingy miaraka amina miaramila anankiray miambina azy.
  - type: heading
    content: Mitoriteny ao Rôma i Paoly
  '17':
  - type: text
    content: 'Nony afaka telo andro, dia nampiantsoin’i Paoly ny Jiosy lohandohany tao Rôma. Rehefa tafangona izy rehetra, dia hoy i Paoly taminy:'
  - type: text
    content: '–Ry rahalahy, tsy nisy ratsy nataoko ny firenentsika, na fandikàko ny fomban-drazantsika. Kanefa dia nosamborina aho tany Jerosalema ary natolotra teo an-tanan’ny Rômanina. '
  '18':
  - type: text
    content: 'Namotopototra ahy ny Rômanina ka saika nandefa ahy, satria tsy nahita antony hanamelohana ahy ho faty. '
  '19':
  - type: text
    content: Notoherin’ny Jiosy izany, ka dia voatery aho nampakatra ny raharaha tamin’ny amperôra rômanina, kanefa tsy misy amiko mihitsy izay hoe hiampanga ny fireneko
  - type: note
    content: Jereo 25.11 sy nta.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Be ny soa nataon’ny tompontany anay: noraisiny tsara izahay rehetra, ka namelomany afo nidonaka be hamindroanay, satria nilatsaka ny ranonorana ary namirifiry ny hatsiaka. '
  '20':
  - type: text
    content: 'Izany àry no nangatahako hahita anareo sy hiresaka aminareo, satria mifatotra amin’ity gadra ity aho noho ny amin’Ilay antenain’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: .
  '21':
  - type: text
    content: 'Dia hoy ry zareo taminy:'
  - type: text
    content: '–Tsy nisy taratasy momba anao, azonay avy any Jodea; ary tsy nisy koa rahalahy avy any mba nandrenesana ny aminao na niteny ratsy anao. '
  '22':
  - type: text
    content: Fa sitrakay ny handre izay fiheveranao, satria fantatray fa toherin’ny olona hatraiza hatraiza izany antokom-pivavahana misy anao izany.
  '23':
  - type: text
    content: 'Dia nanao fotoana tamin’i Paoly ireo, ka nihamaro ny tonga tamin’ny andro voatendry, tao amin’ny trano nitoerany. Hatramin’ny maraina ka mandra-paharivan’ny andro, dia nanao famelabelarana i Paoly; vavolombelona nanambara ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' izy ary niezaka nandresy lahatra azy ireo momba an’i Jesoa, tamin’ny teny notsoahany avy amin’ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy sy ny bokin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Ny sasany dia resy lahatry ny teny nataony, fa ny sasany kosa tsy nety nino. '
  '25':
  - type: text
    content: 'Tsy nifanara-tsaina ry zareo ka dia nirava taorian’ny teny indraim-bava nataon’i Paoly hoe:'
  - type: text
    content: '–Rariny izay nampilazain’ny Fanahy Masina an’i Isaià mpaminany tamin’ny razanareo '
  '26':
  - type: text
    content: 'hoe:'
  - type: text
    content: '«Mandehana ka izao lazaina amin’ity vahoaka ity:'
  - type: text
    content: Hihaino dia hihaino ianareo fa tsy hahafantatra ary
  - type: text
    content: hijery dia hijery fa tsy hahita,
  '27':
  - type: text
    content: satria nihamafy fo ity vahoaka ity,
  - type: text
    content: nihadonto sofina,
  - type: text
    content: ary nanakimpy maso;
  - type: text
    content: fandrao ny masony hahita,
  - type: text
    content: ny sofiny handre,
  - type: text
    content: ary ny fony hahafantatra,
  - type: text
    content: ka hiverina amiko sy hositraniko ity vahoaka ity,
  - type: text
    content: hoy ny Tompo Andriamanitra
  - type: note
    content: 'And 26-27: Is 6.9-10, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: '!»'
  '28':
  - type: text
    content: 'Dia nofaranan’i Paoly:'
  - type: text
    content: '–Aoka ho fantatrareo fa izany tenim-pamonjena avy amin’Andriamanitra izany dia efa nampitondraina ho any amin’ny '
  - type: text
    content: hafa firenena
  - type: note
    content: Ampit Sal 27.3; Lk 3.6.
  - type: text
    content: ' ka izy ireo dia hihaino.'
  - type: text
    content: '[ '
  '29':
  - type: text
    content: Nony voalazan’i Paoly izany teny izany, dia lasa ny Jiosy ka niady hevitra fatratra.]
  '3':
  - type: text
    content: 'Nahatsimpon-kitay iray trotroana i Paoly ary natohony teo amin’ny afo; kanjo nisy menarana nivoaka tampoka avy ao, azon’ny hafanana, ka niantsampy niraikitra tamin’ny tanany. '
  '30':
  - type: text
    content: 'Nitoetra roa taona ngarangidina tao an-trano nohofàny i Paoly, ka nandray izay rehetra tonga hihaona aminy. '
  '31':
  - type: text
    content: 'Nitory ny Fanjakàn’Andriamanitra izy ary nampianatra momba an’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo tamim-pahasahiana tokoa sady tsy nisy fisakantsakanana.'
  '4':
  - type: text
    content: 'Nony hitan’ny tompontany kosa ny bibilava niraviravy teny amin’ny tanan’i Paoly, dia nifampiresaka ry zareo hoe:'
  - type: text
    content: –Tena mpamono olona raha io lehilahy io; anarany foana no voavonjy tamin’ny ranomasina izy, saingy tsy navelan’ny fitsaran’Andriamanitra ho velona.
  '5':
  - type: text
    content: 'Fa nakifik’i Paoly tao amin’ny afo ilay biby, ary ny tenan’i Paoly dia tsy naninona tsy naninona. '
  '6':
  - type: text
    content: 'Nampoizin’ny olona hivonto na hikarapoka ho faty tampoka izy. Niandry ela ihany ry zareo ka nony nahita azy tsy naninon-tsy naninona, dia niova hevitra tanteraka, ka namerimberina hoe: «Isan’ireo andriamanitra io'
  - type: note
    content: Ampit 14.11.
  - type: text
    content: '!»'
  '7':
  - type: text
    content: 'Teo akaikin’ilay toerana, dia nisy sahan’ilay natao hoe Pòbly, lehiben’io nosy io. Nandray anay tamim-pitiavana tokoa izy ka nampiantrano anay mandritra ny telo andro. '
  '8':
  - type: text
    content: 'Nandamaka teo am-pandriana ny rain’i Pòbly fa sady voan’ny tazo no nivalan-dra. Nitsidika azy i Paoly, dia nivavaka sy nametra-tanana taminy, ka nahasitrana azy. '
  '9':
  - type: text
    content: 'Nony vita izany, dia nanatona koa ny marary sasany teo amin’ny nosy ka sitrana. '
