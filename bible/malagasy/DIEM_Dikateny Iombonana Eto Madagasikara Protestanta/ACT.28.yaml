document_id: ACT.28,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tao Malta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voavonjy teo àry izahay vao nahalala fa hay i Malta no iantsoana ilay nosy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy tambo ny fanomezana natolotry ny tompontany ho anay; ary nony niondrana indray izahay, dia novatsîny izay zavatra ilainay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tonga tao Rôma i Paoly
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony afaka telo volana, dia niondrana izahay tamin’ilay sambo anankiray nijanona tao amin’izany nosy izany nandritra ny ririnina. Sambo avy any Aleksandria izy io ary nantsoina hoe «Diôskory
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Diôskory: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany hoe andriamanitra kambana, dia i Kastôro sy i Pôliksa izay malaza amin’ireo andriamanitry ny Grika ary ninoana ho mpiaro ny tantsambo.
      marker-yv: yv-n
    - type: text
      text: '». '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tody tao Sirakoza izahay ary nitoetra telo andro tao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo izahay, dia nanara-morona ka tafapaka hatrany Reziôma. Nifofofofo ny rivotra avy any atsimo ny ampitson’iny, ka dia tratranay indroa andro ny seranan’i Potioly. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao amin’io tanàna io dia nahitanay havana iray finoana izay niangavy anay hitoetra ao aminy mandritra ny fito andro. Dia toy izany no nandrosoanay nankany Rôma. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nahazo vaovao momba anay ny havana iray finoana tao Rôma, ka tamy nitsena anay hatreny an-Tsenan’i Apio sy hatreny Antranotelombahiny. Nony nahita azy rehetra i Paoly, dia velom-pisaorana an’Andriamanitra sady nahazo toky. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa tonga tao Rôma izahay, dia nahazo lalana hitoetra mitokana i Paoly, saingy miaraka amina miaramila anankiray miambina azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitoriteny ao Rôma i Paoly
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka telo andro, dia nampiantsoin’i Paoly ny Jiosy lohandohany tao Rôma. Rehefa tafangona izy rehetra, dia hoy i Paoly taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry rahalahy, tsy nisy ratsy nataoko ny firenentsika, na fandikàko ny fomban-drazantsika. Kanefa dia nosamborina aho tany Jerosalema ary natolotra teo an-tanan’ny Rômanina. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Namotopototra ahy ny Rômanina ka saika nandefa ahy, satria tsy nahita antony hanamelohana ahy ho faty. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Notoherin’ny Jiosy izany, ka dia voatery aho nampakatra ny raharaha tamin’ny amperôra rômanina, kanefa tsy misy amiko mihitsy izay hoe hiampanga ny fireneko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 25.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be ny soa nataon’ny tompontany anay: noraisiny tsara izahay rehetra, ka namelomany afo nidonaka be hamindroanay, satria nilatsaka ny ranonorana ary namirifiry ny hatsiaka. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izany àry no nangatahako hahita anareo sy hiresaka aminareo, satria mifatotra amin’ity gadra ity aho noho ny amin’Ilay antenain’ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ry zareo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy nisy taratasy momba anao, azonay avy any Jodea; ary tsy nisy koa rahalahy avy any mba nandrenesana ny aminao na niteny ratsy anao. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa sitrakay ny handre izay fiheveranao, satria fantatray fa toherin’ny olona hatraiza hatraiza izany antokom-pivavahana misy anao izany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao fotoana tamin’i Paoly ireo, ka nihamaro ny tonga tamin’ny andro voatendry, tao amin’ny trano nitoerany. Hatramin’ny maraina ka mandra-paharivan’ny andro, dia nanao famelabelarana i Paoly; vavolombelona nanambara ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ' izy ary niezaka nandresy lahatra azy ireo momba an’i Jesoa, tamin’ny teny notsoahany avy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànan
    - type: text
      text: '’i Mosesy sy ny bokin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sasany dia resy lahatry ny teny nataony, fa ny sasany kosa tsy nety nino. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nifanara-tsaina ry zareo ka dia nirava taorian’ny teny indraim-bava nataon’i Paoly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Rariny izay nampilazain’ny Fanahy Masina an’i Isaià mpaminany tamin’ny razanareo '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Mandehana ka izao lazaina amin’ity vahoaka ity:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihaino dia hihaino ianareo fa tsy hahafantatra ary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hijery dia hijery fa tsy hahita,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nihamafy fo ity vahoaka ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nihadonto sofina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanakimpy maso;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao ny masony hahita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sofiny handre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fony hahafantatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiverina amiko sy hositraniko ity vahoaka ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny Tompo Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.27 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 26-27:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 6.9-10, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nofaranan’i Paoly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka ho fantatrareo fa izany tenim-pamonjena avy amin’Andriamanitra izany dia efa nampitondraina ho any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 27.3; Lk 3.6.
      marker-yv: yv-n
    - type: text
      text: ' ka izy ireo dia hihaino.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony voalazan’i Paoly izany teny izany, dia lasa ny Jiosy ka niady hevitra fatratra.]
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahatsimpon-kitay iray trotroana i Paoly ary natohony teo amin’ny afo; kanjo nisy menarana nivoaka tampoka avy ao, azon’ny hafanana, ka niantsampy niraikitra tamin’ny tanany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitoetra roa taona ngarangidina tao an-trano nohofàny i Paoly, ka nandray izay rehetra tonga hihaona aminy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitory ny Fanjakàn’Andriamanitra izy ary nampianatra momba an’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompo tamim-pahasahiana tokoa sady tsy nisy fisakantsakanana.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitan’ny tompontany kosa ny bibilava niraviravy teny amin’ny tanan’i Paoly, dia nifampiresaka ry zareo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tena mpamono olona raha io lehilahy io; anarany foana no voavonjy tamin’ny ranomasina izy, saingy tsy navelan’ny fitsaran’Andriamanitra ho velona.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nakifik’i Paoly tao amin’ny afo ilay biby, ary ny tenan’i Paoly dia tsy naninona tsy naninona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampoizin’ny olona hivonto na hikarapoka ho faty tampoka izy. Niandry ela ihany ry zareo ka nony nahita azy tsy naninon-tsy naninona, dia niova hevitra tanteraka, ka namerimberina hoe: «Isan’ireo andriamanitra io'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 14.11.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo akaikin’ilay toerana, dia nisy sahan’ilay natao hoe Pòbly, lehiben’io nosy io. Nandray anay tamim-pitiavana tokoa izy ka nampiantrano anay mandritra ny telo andro. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandamaka teo am-pandriana ny rain’i Pòbly fa sady voan’ny tazo no nivalan-dra. Nitsidika azy i Paoly, dia nivavaka sy nametra-tanana taminy, ka nahasitrana azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony vita izany, dia nanatona koa ny marary sasany teo amin’ny nosy ka sitrana. '
