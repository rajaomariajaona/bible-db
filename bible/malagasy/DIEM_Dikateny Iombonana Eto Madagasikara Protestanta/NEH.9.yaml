      text: '3'
  - type: text
    text: Ary nitsangana teo amin’ny toerany avy izy, dia novakîna nandritra ny adiny telo ny teny tao amin’ny boky mirakitra ny lalànan’ny TOMPO Andriamaniny; nandritra ny adiny telo manaraka kosa dia niaiky heloka ireo sy niankohoka teo anatrehan’ny TOMPO Andriamaniny.
