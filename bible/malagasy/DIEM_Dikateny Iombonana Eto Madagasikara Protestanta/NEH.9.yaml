  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Kanjo rehefa niadana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanao ratsy teo anatrehanao indray;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nafoinao izy ho eo an-tanan’ny fahavalony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ireo no nanjakazaka taminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nitaraina taminao indray izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nohenoinao tany an-danitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary novonjenao imbetsaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria be fiantra Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nanarinao mafy izy hiverina amin’ny lalànao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mbola niavonavona ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nihaino ny didinao fa nandika ny fitsipikao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mahavelona ny olona manatanteraka azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Naneho ditra sy nanamafy ny hatony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nety nihaino Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nandefitra taona maro taminy Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpaminaninao, nentanin’ny Fanahinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nananaranao azy mafy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy nety nihaino izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia natolotrao ho eo an-tanan’ny hafa firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Be fiantra Ianao ka tsy nandringana ary tsy nahafoy azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Andriamanitra mamindra fo sy miantra Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Koa ankehitriny, ry Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lehibe sady mahery no mahatahotra Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitandro ny fanekempihavananao sy fitiavanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka re tsy ho zavatra kely eo imasonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahoriana rehetra efa nanjo ny vahoakanao tsivakivolo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny mpanjakanay sy mpanapaka anay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpisoronay sy mpaminaninay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny razanay mbamin’ny tenanay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manomboka tamin’ny andron’ireo mpanjakan’i Asiria
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandrak’izao andro anio izao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Mandala ny rariny Ianao tamin’izay rehetra nanjo anay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria marina ny nataonao, fa izahay no nanao ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ny mpanjakanay sy mpanapaka anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpisoronay sy ny razanay
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy tsy nanatanteraka ny lalànao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy niraharaha ny didinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fananarana nataonao taminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Teo amin’ny zava-tsoa marobe nomenao azy nandritra ny nanjakàny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary teo amin’ny tany malalaka sy lonaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: natolotrao ho eo anoloany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy nanompo Anao ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy niala tamin’ny ratsy fanaony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ankehitriny dia indreto andevozina izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto amin’ny tany izay nomenao ny razanay
- type: usfm
  marker: q1
  children:
  - type: text
    text: hihinanany ny vokatra sy ny soa avy aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Vokatra marobe tokoa no aterak’ity tany ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa lasan’ireo mpanjaka izay notendrenao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanapaka anay noho ny fahotanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, manapaka ny tenanay sy biby fiompinay
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka izay itiavany azy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ozoim-pahoriana mafy izahay!
