  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avy eo ry i Jesoa sy i Kadmiela, i Banỳ sy i Hasabneià, i Serebià sy i Hôdià, ary i Sebanià sy i Petahià, izay samy levita, dia niteny hoe:'
