document_id: NEH.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fieken-keloka rodombe
  - type: text
    content: 'Ny andro faha-24 tamin’izany volana izany ihany, dia nivory '
  - type: text
    content: hifady hanina
  - type: text
    content: ' ny Israelita ka samy nitondra akanjo malailay sy nanosim-bovoka ny lohany. '
  '10':
  - type: text
    content: dia nanao famantarana sy fahagagana Ianao
  - type: text
    content: hamelezana ny Farao sy ny mpanompony rehetra
  - type: text
    content: ary ny olona rehetra teo amin’ny taniny,
  - type: text
    content: satria fantatrao fa nianjonanjona
  - type: text
    content: tamin’ny razanay ry zareo.
  - type: text
    content: Nahazoanao laza izany
  - type: text
    content: tahaka izay hita amin’izao anio izao.
  '11':
  - type: text
    content: Nosarahinao teo anoloan’ny razanay ny ranomasina
  - type: text
    content: ka nandeha teo afovoany nandia tany maina izy;
  - type: text
    content: 'fa ireo mpanenjika azy kosa natsipinao tao amin’ny '
  - type: text
    content: hantsana
  - type: text
    content: ka nilentika tahaka ny vato amin’ny rano lalina.
  '12':
  - type: text
    content: Andry rahona no nitarihanao azy raha antoandro,
  - type: text
    content: ary andry afo kosa nony alina,
  - type: text
    content: mba hanazava ny lalan-kalehany.
  '13':
  - type: text
    content: Nidina avy tany an-
  - type: text
    content: danitra
  - type: text
    content: ' Ianao'
  - type: text
    content: dia niteny tamin’ny razanay
  - type: text
    content: teo an-tendrombohitra Sinay
  - type: text
    content: ary nanome azy fitsipika mahitsy sy lalàna marina
  - type: text
    content: ary fepetra sy didy lavorary.
  '14':
  - type: text
    content: Tamin’ny alalan’i Mosesy mpanomponao
  - type: text
    content: 'no nampahalalanao azy ny '
  - type: text
    content: Sabata
  - type: text
    content: izay andro voatokana ho Anao
  - type: text
    content: 'sy nanoloranao azy didy sy fepetra ary '
  - type: text
    content: lalàna
  - type: text
    content: .
  '15':
  - type: text
    content: Mofo avy tany an-danitra no nomenao azy hanafaka ny hanoanany;
  - type: text
    content: rano avy tamin’ny vatolampy no navoakanao hanala hetaheta azy;
  - type: text
    content: ary nilazanao izy fa hiditra haka ny tany
  - type: text
    content: izay efa nianiananao homena azy.
  '16':
  - type: text
    content: Kanjo niavonavona ireo razanay ireo,
  - type: text
    content: dia nanamafy ny hatony izy
  - type: text
    content: ka tsy nihaino ny didinao
  '17':
  - type: text
    content: ary nandà tsy nety nanaraka izany
  - type: text
    content: sady tsy nahatsiaro ny zava-mahagaga nataonao hanasoavana azy;
  - type: text
    content: eny, nanamafy ny hatony izy
  - type: text
    content: ka nanao di-doha hiverina
  - type: text
    content: amin’ny fanandevozana azy tany Ejipta.
  - type: text
    content: Fa Andriamanitra mpamela heloka Ianao,
  - type: text
    content: Andriamanitra miantra sy mamindra fo,
  - type: text
    content: ary mahari-po sady be hatsarampo,
  - type: text
    content: ka dia tsy nafoinao ny razanay.
  '18':
  - type: text
    content: 'Tamin’ny nanaovany ombilahikely anidina sy nilazany hoe:'
  - type: text
    content: «Io no andriamanitrao
  - type: text
    content: izay nitondra anao niakatra avy tany Ejipta!»,
  - type: text
    content: dia notevatevainy tokoa Ianao;
  '19':
  - type: text
    content: kanefa noho Ianao be famindrampo,
  - type: text
    content: 'dia tsy nafoinao tany an-taniefitra izy:'
  - type: text
    content: Ny andry rahona, izay nitari-dalana azy raha antoandro,
  - type: text
    content: dia tsy niala teo akaikiny
  - type: text
    content: na ny andry afo nony alina
  - type: text
    content: mba hanazava ny lalan-kalehany,
  '2':
  - type: text
    content: 'Niavaka tamin’ny olona rehetra hafa firenena ry zareo ka naka toerana mba hiaiky ny fahotany sy ny heloky ny razany. '
  '20':
  - type: text
    content: Nomenao azy koa ilay Fanahinao tsara
  - type: text
    content: mba hahatonga hahay manavaka.
  - type: text
    content: 'Ianao nandefa hatrany ny '
  - type: text
    content: mana
  - type: text
    content: ' ho sakafony'
  - type: text
    content: sy namorona rano hanala hetaheta azy.
  '21':
  - type: text
    content: Eny, efapolo taona no namelomanao azy tany an-taniefitra
  - type: text
    content: ka tsy nanan-java-mahory akory izy;
  - type: text
    content: tsy nihatonta ny fitafiany
  - type: text
    content: ary tsy nivonto ny tongony.
  '22':
  - type: text
    content: Nanome azy fanjakana sy firenena maro Ianao,
  - type: text
    content: dia nitsinjara ho azy ny faritanin’ireny,
  - type: text
    content: ka lasany ny tanin’i Sihôna mpanjakan’i Hesbôna
  - type: text
    content: 'sy ny tanin’i Hôga mpanjakan’i '
  - type: text
    content: Basàna
  - type: text
    content: .
  '23':
  - type: text
    content: Nohamaroinao ny taranaky ny razanay
  - type: text
    content: ho tahaka ny kintana eny amin’ny habakabaka;
  - type: text
    content: ary nentinao izy ho any amin’ny tany
  - type: text
    content: izay nolazainao tamin’ny razany
  - type: text
    content: fa hidirany hataony fananany.
  '24':
  - type: text
    content: Dia niditra ny taranany haka ny tany ho fananany,
  - type: text
    content: ary naetrinao teo anoloany ny Kanahanîta tompon-tany
  - type: text
    content: ka natolotrao ho eo an-tanany.
  - type: text
    content: Dia nataony araka izay nitiavany azy
  - type: text
    content: ny mpanjaka sy ny vahoakan’izany tany izany.
  '25':
  - type: text
    content: Nahazo tanàna mimanda sy tany lonaka izy;
  - type: text
    content: nahazo trano feno zava-tsoa isan-karazany,
  - type: text
    content: lavaka famorian-drano voahady,
  - type: text
    content: tany voavoly voaloboka sy ôliva,
  - type: text
    content: ary tany misy hazo fihinam-boa marobe.
  - type: text
    content: Noho ny hatsaramponao lehibe,
  - type: text
    content: dia nihinana izy ka voky
  - type: text
    content: ary nihanatavy ka faly nanaram-po.
  '26':
  - type: text
    content: Kanefa nikomiany sy niodinany Ianao,
  - type: text
    content: nariany lavitra azy ny lalànao,
  - type: text
    content: 'novonoiny ny '
  - type: text
    content: mpaminaninao
  - type: text
    content: izay nananatra azy mafy hiverina aminao;
  - type: text
    content: koa notevatevainy tokoa Ianao.
  '27':
  - type: text
    content: Dia natolotrao izy ho eo an-tanan’ny fahavalony
  - type: text
    content: ka ireo no nampahory azy.
  - type: text
    content: Nefa, tamin’ny andro fahoriany,
  - type: text
    content: dia nitaraina taminao izy
  - type: text
    content: ka nohenoinao tany an-danitra;
  - type: text
    content: ary satria be fiantra Ianao
  - type: text
    content: dia nomenao mpamonjy hatrany izy
  - type: text
    content: hanafaka azy eo an-tanan’ny fahavalony.
  '28':
  - type: text
    content: Kanjo rehefa niadana izy,
  - type: text
    content: dia nanao ratsy teo anatrehanao indray;
  - type: text
    content: ary nafoinao izy ho eo an-tanan’ny fahavalony
  - type: text
    content: ka ireo no nanjakazaka taminy.
  - type: text
    content: Dia nitaraina taminao indray izy
  - type: text
    content: ka nohenoinao tany an-danitra;
  - type: text
    content: ary novonjenao imbetsaka izy
  - type: text
    content: satria be fiantra Ianao.
  '29':
  - type: text
    content: Nanarinao mafy izy hiverina amin’ny lalànao;
  - type: text
    content: nefa mbola niavonavona ihany,
  - type: text
    content: ka tsy nihaino ny didinao fa nandika ny fitsipikao
  - type: text
    content: izay mahavelona ny olona manatanteraka azy.
  - type: text
    content: Naneho ditra sy nanamafy ny hatony izy,
  - type: text
    content: ary tsy nety nihaino Anao.
  '3':
  - type: text
    content: Ary nitsangana teo amin’ny toerany avy izy, dia novakîna nandritra ny adiny telo ny teny tao amin’ny boky mirakitra ny lalànan’ny TOMPO Andriamaniny; nandritra ny adiny telo manaraka kosa dia niaiky heloka ireo sy niankohoka teo anatrehan’ny TOMPO Andriamaniny.
  '30':
  - type: text
    content: Nandefitra taona maro taminy Ianao,
  - type: text
    content: ary ny mpaminaninao, nentanin’ny Fanahinao,
  - type: text
    content: no nananaranao azy mafy;
  - type: text
    content: fa tsy nety nihaino izy,
  - type: text
    content: ka dia natolotrao ho eo an-tanan’ny hafa firenena.
  '31':
  - type: text
    content: Be fiantra Ianao ka tsy nandringana ary tsy nahafoy azy,
  - type: text
    content: satria Andriamanitra mamindra fo sy miantra Ianao.
  '32':
  - type: text
    content: Koa ankehitriny, ry Andriamanitra ô,
  - type: text
    content: lehibe sady mahery no mahatahotra Ianao,
  - type: text
    content: ary mitandro ny fanekempihavananao sy fitiavanao.
  - type: text
    content: Aoka re tsy ho zavatra kely eo imasonao
  - type: text
    content: ny fahoriana rehetra efa nanjo ny vahoakanao tsivakivolo
  - type: text
    content: dia ny mpanjakanay sy mpanapaka anay,
  - type: text
    content: ny mpisoronay sy mpaminaninay,
  - type: text
    content: ary ny razanay mbamin’ny tenanay,
  - type: text
    content: manomboka tamin’ny andron’ireo mpanjakan’i Asiria
  - type: text
    content: ka mandrak’izao andro anio izao!
  '33':
  - type: text
    content: Mandala ny rariny Ianao tamin’izay rehetra nanjo anay;
  - type: text
    content: satria marina ny nataonao, fa izahay no nanao ratsy.
  '34':
  - type: text
    content: Ny mpanjakanay sy mpanapaka anay
  - type: text
    content: ary ny mpisoronay sy ny razanay
  - type: text
    content: dia samy tsy nanatanteraka ny lalànao,
  - type: text
    content: ary tsy niraharaha ny didinao
  - type: text
    content: sy ny fananarana nataonao taminy.
  '35':
  - type: text
    content: Teo amin’ny zava-tsoa marobe nomenao azy nandritra ny nanjakàny
  - type: text
    content: ary teo amin’ny tany malalaka sy lonaka
  - type: text
    content: natolotrao ho eo anoloany,
  - type: text
    content: dia tsy nanompo Anao ireo
  - type: text
    content: sady tsy niala tamin’ny ratsy fanaony.
  '36':
  - type: text
    content: Ankehitriny dia indreto andevozina izahay
  - type: text
    content: eto amin’ny tany izay nomenao ny razanay
  - type: text
    content: hihinanany ny vokatra sy ny soa avy aminy.
  '37':
  - type: text
    content: Vokatra marobe tokoa no aterak’ity tany ity
  - type: text
    content: kanefa lasan’ireo mpanjaka izay notendrenao
  - type: text
    content: hanapaka anay noho ny fahotanay;
  - type: text
    content: eny, manapaka ny tenanay sy biby fiompinay
  - type: text
    content: araka izay itiavany azy izy,
  - type: text
    content: ka ozoim-pahoriana mafy izahay!
  '4':
  - type: text
    content: 'Ry i Jesoa sy i Binoy, i Kadmiela sy i Sebanià, i Bony sy Serebià, ary i Banỳ sy i Kenany dia nitsangana teo ambonin’ny lampihazo natokana ho an’ny '
  - type: text
    content: levita
  - type: text
    content: ' ka nitaraina mafy tamin’ny TOMPO Andriamaniny. '
  '5':
  - type: text
    content: 'Avy eo ry i Jesoa sy i Kadmiela, i Banỳ sy i Hasabneià, i Serebià sy i Hôdià, ary i Sebanià sy i Petahià, izay samy levita, dia niteny hoe:'
  - type: text
    content: –Mitsangàna ka ankalazao ny TOMPO, ilay Andriamanitrareo hatrizay ka ho mandrakizay!
  - type: heading
    content: Vavaka fiderana
  - type: text
    content: «Hankalazaina anie, TOMPO ô, ny anaranao malaza
  - type: text
    content: izay ambonin’ny fisaorana sy fiderana rehetra!
  '6':
  - type: text
    content: Ianao irery ihany no TOMPO;
  - type: text
    content: Ianao no nanao ny habakabaka midadasika
  - type: text
    content: mbamin’ny kintana rehetra
  - type: text
    content: ny tany sy izay rehetra eo aminy,
  - type: text
    content: ny ranomasina sy izay rehetra ao aminy;
  - type: text
    content: Ianao no mamelona ny voaary rehetra,
  - type: text
    content: ka iankohofan’ny tafiky ny lanitra.
  '7':
  - type: text
    content: Ianao no TOMPO Andriamanitra,
  - type: text
    content: Izay nifidy an’i Abrama
  - type: text
    content: ka nampiala azy tao Ora any Kaldea
  - type: text
    content: sy nanome anarana azy hoe Abrahama.
  '8':
  - type: text
    content: Fo mahatoky anao no hitanao taminy,
  - type: text
    content: 'ka nanaovanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' izy'
  - type: text
    content: fa homenao ho azy sy ho an’ny taranany
  - type: text
    content: 'ny tanin’ny Kanahanita sy ny Hitita, ary ny '
  - type: text
    content: Amôrita
  - type: text
    content: mbamin’ny Perizita sy ny Jebosita ary ny Girgasita;
  - type: text
    content: ary efa notanterahinao ny teninao,
  - type: text
    content: satria marina Ianao.
  '9':
  - type: text
    content: Hitanao ny fahorian’ny razanay tany Ejipta
  - type: text
    content: 'sady renao ny fitarainany teo amoron’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: ;
