document_id: ISA.37,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Naka torohevitra tamin’i Isaià mpaminany i Hezekià
  - type: heading
    content: (Jereo 2 Mp 19.1-7)
  - type: text
    content: 'Raha vao nandre izany tatitra izany i Hezekià mpanjaka, dia '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' ka nitafy gony ary lasa niditra tao an-tranon’ny TOMPO. '
  '10':
  - type: text
    content: 'mpanjakan’i Joda indray izy, mba hitondra izao hafatra izao: «Aoka tsy ho voafitaky ny Andriamanitra itokianao ianao amin’ny filazany fa i Jerosalema dia tsy hatolotra ho eo an-tanan’ny mpanjakan’i Asiria. '
  '11':
  - type: text
    content: 'Indro ianao mihitsy no efa nandre ny nanaovan’ireo mpanjakan’i Asiria ny tany hafa rehetra sy ny nandravany azy; ka dia ianao kosa ve no ho voavonjy? '
  '12':
  - type: text
    content: 'Fony nandrava an’i Gôzàna sy i Haràna ary i Retsefa mbamin’i Telasara renivohitry ny Hedenita ireo razako, moa nahavonjy ireny firenena ireny ve ny andriamaniny? '
  '13':
  - type: text
    content: Aiza izao ny mpanjakan’i Hamata sy i Arpada ary i Lahîra, aiza izao ny mpanjakan’i Sefarvaîma sy i Henà ary i Hivà
  - type: note
    content: 'Gôzàna, Haràna (and 12) ...Hamata (and 13)...: jereo 2 Mp 17.24; 18.34 sy nta.'
  - type: text
    content: ?»
  - type: heading
    content: Vavak’i Hezekià
  - type: heading
    content: (Jereo 2 Mp 19.14-19)
  '14':
  - type: text
    content: 'Ary noraisin’i Hezekià ny taratasy nentin’ireo iraka asirianina ka novakiny; avy teo izy dia niakatra tao an-tranon’ny TOMPO ka namelatra izany taratasy izany teo anatrehan’ny TOMPO, '
  '15':
  - type: text
    content: 'ary nivavaka tamin’ny TOMPO nanao hoe:'
  '16':
  - type: text
    content: 'Ry TOMPOn’izao rehetra izao sady Andriamanitr’i Israely ô, Ianao Izay mipetraka eo ambony '
  - type: text
    content: kerobima
  - type: note
    content: 'eo ambony kerobima: jereo Eks 25.22.'
  - type: text
    content: ', Ianao irery no Andriamanitry ny fanjakana rehetra eto an-tany, satria Ianao no nanao ny lanitra sy ny tany. '
  '17':
  - type: text
    content: 'TOMPO ô, mba atongilano ny sofinao ka mihainoa; TOMPO ô, mba ahirato ny masonao ka mijere; ary aoka ho renao ny teny rehetra izay nampitondrain’i Saneheriba hanevatevana Anao Andriamanitra velona. '
  '18':
  - type: text
    content: 'TOMPO ô, marina fa ireo mpanjakan’i Asiria dia nandringana ny hafa firenena sy nandrava ny taniny; '
  '19':
  - type: text
    content: 'ary nodorany tamin’ny afo sy nosimbany aza ny andriamanitr’ireny firenena ireny satria tsy tena Andriamanitra ireo fa zavatra nataon-tanan’olona, eny, vato aman-kazo ihany. '
  '2':
  - type: text
    content: 'Avy teo izy naniraka an’i Eliakima mpiandraikitra ny lapa sy i Sebnà mpitantsoratra ary ireo mpisorona tranainy indrindra izay samy nitafy gony, mba hankany amin’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' zanakalahin’i Amôtsa, '
  '20':
  - type: text
    content: Fa ankehitriny kosa, ry TOMPO Andriamanitray ô, vonjeo tsy ho azon’ny tanan’i Saneheriba izahay mba hahafantaran’ny fanjakana rehetra etỳ an-tany fa Ianao irery ihany no TOMPO.»
  - type: heading
    content: Nampita ny valin-teny avy amin’ny Tompo i Isaià
  - type: heading
    content: (2 Mp 19.20-34)
  '21':
  - type: text
    content: 'Ary i Isaià, zanakalahin’i Amôtsa, dia naniraka hankany amin’i Hezekià nanao hoe: «Izao no lazain’ny TOMPO Andriamanitr’i Israely ho valin’ny vavaka nataonao ny amin’i Saneheriba mpanjakan’i Asiria. '
  '22':
  - type: text
    content: 'Izao no teny tononin’ny TOMPO hamelezana azy:'
  - type: text
    content: Manao tsinontsinona sy maneso anao
  - type: text
    content: 'ny tanàna kanton’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ', ry Saneheriba;'
  - type: text
    content: mihifikifi-doha ho fanamavoana anao
  - type: text
    content: ny tanànan’i Jerosalema.
  '23':
  - type: text
    content: Fa iza moa no voatevatevanao sy nompanao?
  - type: text
    content: Ary iza no nanaovanao lela miakatra
  - type: text
    content: sy niandranandranan’ny masonao?
  - type: text
    content: Tsy iza fa Izaho Ilay Masin’i Israely!
  '24':
  - type: text
    content: Tamin’ny alalan’ny mpanomponao
  - type: text
    content: no nanevatevanao Ahy Tompo.
  - type: text
    content: 'Hoy ianao hoe: ‹Izaho Saneheriba'
  - type: text
    content: dia ny kalesiko marobe no niakarako
  - type: text
    content: teny an-tampon-tendrombohitra
  - type: text
    content: hatreo afovoan-tanin’i Libano
  - type: text
    content: mba hikapa ny sedera mijoalajoala
  - type: text
    content: sy ny kipreso voafantina eo aminy.
  - type: text
    content: Hiakarako ao ny tendrombohitra faran’izay avo
  - type: text
    content: sy ny tahirin’alany matevina indrindra.
  '25':
  - type: text
    content: Izaho no efa nihady vovo fantsakana
  - type: text
    content: sy nisotro ny ranon’ny firenen-kafa
  - type: note
    content: 'ranon’ny firenen-kafa: Ampit 2 Mp 19.24.'
  - type: text
    content: ;
  - type: text
    content: ary horitiko ny sakeli-drano rehetra any Ejipta
  - type: text
    content: raha vao migadona any ny faladiako!›
  '26':
  - type: text
    content: Moa tsy fantatrao va, ry Saneheriba,
  - type: text
    content: fa efa hatry ny ela no nanomanako
  - type: text
    content: an’izao zava-nitranga tato ho ato izao?
  - type: text
    content: Efa hatramin’ny ela be no namolavolako azy,
  - type: text
    content: ary ankehitriny dia manatanteraka azy Aho.
  - type: text
    content: Voatendriko handrava ireo tanànamimanda ianao
  - type: text
    content: ka hahatonga azy ho korontam-bato.
  '27':
  - type: text
    content: Dia miraviravy tanana ny mponina ao aminy,
  - type: text
    content: sady raiki-tahotra no safo-kenatra;
  - type: text
    content: toy ny vilona any an-tsaha izy ireo
  - type: text
    content: sy tahaka ny ahi-maitso eny an-jaridaina
  - type: text
    content: ary tahaka ny zava-maniry eny an-tampon-trano
  - type: text
    content: ka main’ny rivotra avy any atsinanana.
  '28':
  - type: text
    content: Fantatro avokoa ny momba anao, ry Saneheriba,
  - type: text
    content: na mipetraka ianao na mitsangana,
  - type: text
    content: na mivoaka ny trano ianao na miditra,
  - type: text
    content: sy rehefa tezitra misafoaka amiko.
  '29':
  - type: text
    content: Eny, efa tezitra nisafoaka tamiko tokoa ianao
  - type: text
    content: ary efa tafakatra an-tsofiko ny fireharehànao;
  - type: text
    content: koa hasiako farango ny oronao
  - type: text
    content: ary hasiako lamboridy ny vavanao,
  - type: text
    content: dia hampivereniko any an-taninao ianao
  - type: text
    content: amin’izay lalana niavianao ihany.
  '3':
  - type: text
    content: 'hanao aminy hoe: «Izao no lazain’i Hezekià: Andro fahoriana sy famaizana ary fahafaham-baràka ho antsika ity andro ity! Tonga amin’ny fitenenana hoe: ‹Efa ho teraka ny zaza nefa tsy misy hery hiterahana azy ny reniny.› '
  '30':
  - type: text
    content: 'Izao kosa no famantarana ho anao, ry Hezekià: Amin’ity taona ity dia hihinana izay vary maniry ho azy ny olona; ary amin’ny taona manaraka dia mbola ho toy izany koa. Fa amin’ny taona fahatelo kosa dia hamafy vary sy hijinja ianareo ary hamboly voaloboka sy hihinana ny vokatra avy aminy. '
  '31':
  - type: text
    content: 'Ary izay sisa velona amin’ny taranak’i Joda dia ho toy ny hazo hamaka lalina indray ary ho feno voa ny rantsany; '
  '32':
  - type: text
    content: 'satria ao Jerosalema no hipoiran’ny sisa tavela, ary ao an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ' no hiarenan’ny sisa velona.»'
  - type: text
    content: 'Dia hoy ihany i Isaià hoe: «Izany no hataon’ny TOMPOn’izao rehetra izao noho ny fitia miredareda manesika Azy. '
  '33':
  - type: text
    content: 'Izao kosa no lazain’ny TOMPO ny amin’ny mpanjakan’i Asiria: ‹Tsy hiditra amin’ity tanàna ity izy, na handefa zana-tsipîka hamelezana azy na hiady aminy ombàn’ny ampinga na hanangana tovon-tany hanafihana azy. '
  '34':
  - type: text
    content: 'Ny lalana izay niaviany ihany no hiverenany, fa tsy hiditra amin’ity tanàna ity izy. Izany no teny hentitra avy amiko TOMPO. '
  '35':
  - type: text
    content: Harovako i Jerosalema ary hovonjeko noho ny amin’ny tenako sy i Davida mpanompoko.› »
  - type: heading
    content: Fialàn’ny Asirianina, fahafatesan’ny mpanjakan’i Asiria
  - type: heading
    content: (Jereo 2 Mp 19.35-37)
  '36':
  - type: text
    content: 'Dia niainga hankao an-tobin’ny Asirianina ilay '
  - type: text
    content: anjelin
  - type: text
    content: '’ny TOMPO ka nisy 185 ny antoko-miaramila naripany; ary raha vao nifoha ny sisa velona tamin’ny maraina, dia nahita fa efa maty avokoa ireo. '
  '37':
  - type: text
    content: 'Koa niainga teo i Saneheriba mpanjakan’i Asiria mba handeha hiverina any Ninive ary nijanona tany. '
  '38':
  - type: text
    content: Kanjo raha iny izy niankohoka tao amin’ny tempolin’i Nisrôka andriamaniny iny indrindra, no avy namono azy tamin’ny sabatra ny zanany roa lahy, dia i Adramelèka sy i Saretsera; avy eo lasa nandositra any amin’ny tany Ararata izy mirahalahy
  - type: note
    content: Jereo 2 Mp 19.37 sy nta.
  - type: text
    content: ' fa i Esara-Hadôna zanakalahin’i Saneheriba no nanjaka nandimby azy.'
  '4':
  - type: text
    content: Angamba ho ren’ny TOMPO Andriamanitrao ny tenin’ilay dekà asirianina izay nirahin’ny mpanjakan’i Asiria tompony hanevateva an’Andriamanitra velona; ka hofaizin’ny TOMPO Andriamanitrao izy noho izany. Fa manandrata vavaka ianao ho an’ireo sisa tavela amin’ny vahoakany.»
  '5':
  - type: text
    content: 'Rehefa tonga tany amin’i Isaià ireo irak’i Hezekià mpanjaka, '
  '6':
  - type: text
    content: 'dia nilazany hoe:'
  - type: text
    content: '–Ambarao amin’ny tomponareo izao hafatry ny TOMPO izao: Aza matahotra eo anatrehan’ny teny renao nanevatevan’ireo manamboninahitry ny mpanjakan’i Asiria Ahy. '
  '7':
  - type: text
    content: Fa indro Aho hanoro hevitra azy hiverina any amin’ny taniny, rehefa handre siosio izy; ary any no hampamonoako azy ho fatin-tsabatra
  - type: note
    content: Jereo ny and 38.
  - type: text
    content: .»
  - type: heading
    content: Fandrahonana hafa nataon’i Saneheriba
  - type: heading
    content: (Jereo 2 Mp 19.8-13)
  '8':
  - type: text
    content: Dia niverina ilay dekà, ka nankany Libnà
  - type: note
    content: 'Libnà: jereo 2 Mp 8.22 sy nta.'
  - type: text
    content: ' izay nataon’ny mpanjakan’i Asiria fahirano tamin’izay; satria reny fa efa nandao an’i Lakisy ny mpanjaka. '
  '9':
  - type: text
    content: 'Kanjo henon’i Saneheriba fa efa an-dalana hamely azy i Tirihakà mpanjakan’i Etiôpia; koa rehefa nahare izany izy, dia naniraka hankany amin’i Hezekià '
