document_id: ISA.37,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naka torohevitra tamin’i Isaià mpaminany i Hezekià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 19.1-7)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Raha vao nandre izany tatitra izany i Hezekià mpanjaka, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nandriatra ny fitafiany
    - type: text
      text: ' ka nitafy gony ary lasa niditra tao an-tranon’ny TOMPO. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'mpanjakan’i Joda indray izy, mba hitondra izao hafatra izao: «Aoka tsy ho voafitaky ny Andriamanitra itokianao ianao amin’ny filazany fa i Jerosalema dia tsy hatolotra ho eo an-tanan’ny mpanjakan’i Asiria. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Indro ianao mihitsy no efa nandre ny nanaovan’ireo mpanjakan’i Asiria ny tany hafa rehetra sy ny nandravany azy; ka dia ianao kosa ve no ho voavonjy? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fony nandrava an’i Gôzàna sy i Haràna ary i Retsefa mbamin’i Telasara renivohitry ny Hedenita ireo razako, moa nahavonjy ireny firenena ireny ve ny andriamaniny? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aiza izao ny mpanjakan’i Hamata sy i Arpada ary i Lahîra, aiza izao ny mpanjakan’i Sefarvaîma sy i Henà ary i Hivà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.13 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Gôzàna, Haràna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 12) ...'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Hamata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 13)...: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2 Mp 17.24; 18.34 sy nta.
      marker-yv: yv-n
    - type: text
      text: ?»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavak’i Hezekià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 19.14-19)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary noraisin’i Hezekià ny taratasy nentin’ireo iraka asirianina ka novakiny; avy teo izy dia niakatra tao an-tranon’ny TOMPO ka namelatra izany taratasy izany teo anatrehan’ny TOMPO, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary nivavaka tamin’ny TOMPO nanao hoe:'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ry TOMPOn’izao rehetra izao sady Andriamanitr’i Israely ô, Ianao Izay mipetraka eo ambony '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'eo ambony kerobima: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 25.22.
      marker-yv: yv-n
    - type: text
      text: ', Ianao irery no Andriamanitry ny fanjakana rehetra eto an-tany, satria Ianao no nanao ny lanitra sy ny tany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'TOMPO ô, mba atongilano ny sofinao ka mihainoa; TOMPO ô, mba ahirato ny masonao ka mijere; ary aoka ho renao ny teny rehetra izay nampitondrain’i Saneheriba hanevatevana Anao Andriamanitra velona. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'TOMPO ô, marina fa ireo mpanjakan’i Asiria dia nandringana ny hafa firenena sy nandrava ny taniny; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ary nodorany tamin’ny afo sy nosimbany aza ny andriamanitr’ireny firenena ireny satria tsy tena Andriamanitra ireo fa zavatra nataon-tanan’olona, eny, vato aman-kazo ihany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Avy teo izy naniraka an’i Eliakima mpiandraikitra ny lapa sy i Sebnà mpitantsoratra ary ireo mpisorona tranainy indrindra izay samy nitafy gony, mba hankany amin’i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' zanakalahin’i Amôtsa, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa ankehitriny kosa, ry TOMPO Andriamanitray ô, vonjeo tsy ho azon’ny tanan’i Saneheriba izahay mba hahafantaran’ny fanjakana rehetra etỳ an-tany fa Ianao irery ihany no TOMPO.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nampita ny valin-teny avy amin’ny Tompo i Isaià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Mp 19.20-34)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary i Isaià, zanakalahin’i Amôtsa, dia naniraka hankany amin’i Hezekià nanao hoe: «Izao no lazain’ny TOMPO Andriamanitr’i Israely ho valin’ny vavaka nataonao ny amin’i Saneheriba mpanjakan’i Asiria. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Izao no teny tononin’ny TOMPO hamelezana azy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao tsinontsinona sy maneso anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny tanàna kanton’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ', ry Saneheriba;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihifikifi-doha ho fanamavoana anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanànan’i Jerosalema.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa iza moa no voatevatevanao sy nompanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no nanaovanao lela miakatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy niandranandranan’ny masonao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy iza fa Izaho Ilay Masin’i Israely!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tamin’ny alalan’ny mpanomponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanevatevanao Ahy Tompo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy ianao hoe: ‹Izaho Saneheriba'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny kalesiko marobe no niakarako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny an-tampon-tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatreo afovoan-tanin’i Libano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hikapa ny sedera mijoalajoala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny kipreso voafantina eo aminy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiakarako ao ny tendrombohitra faran’izay avo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tahirin’alany matevina indrindra.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Izaho no efa nihady vovo fantsakana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nisotro ny ranon’ny firenen-kafa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ranon’ny firenen-kafa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2 Mp 19.24.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary horitiko ny sakeli-drano rehetra any Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha vao migadona any ny faladiako!›
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Moa tsy fantatrao va, ry Saneheriba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa hatry ny ela no nanomanako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an’izao zava-nitranga tato ho ato izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa hatramin’ny ela be no namolavolako azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ankehitriny dia manatanteraka azy Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voatendriko handrava ireo tanànamimanda ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahatonga azy ho korontam-bato.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia miraviravy tanana ny mponina ao aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady raiki-tahotra no safo-kenatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny vilona any an-tsaha izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny ahi-maitso eny an-jaridaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny zava-maniry eny an-tampon-trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka main’ny rivotra avy any atsinanana.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fantatro avokoa ny momba anao, ry Saneheriba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mipetraka ianao na mitsangana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mivoaka ny trano ianao na miditra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy rehefa tezitra misafoaka amiko.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Eny, efa tezitra nisafoaka tamiko tokoa ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa tafakatra an-tsofiko ny fireharehànao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa hasiako farango ny oronao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hasiako lamboridy ny vavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hampivereniko any an-taninao ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay lalana niavianao ihany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'hanao aminy hoe: «Izao no lazain’i Hezekià: Andro fahoriana sy famaizana ary fahafaham-baràka ho antsika ity andro ity! Tonga amin’ny fitenenana hoe: ‹Efa ho teraka ny zaza nefa tsy misy hery hiterahana azy ny reniny.› '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Izao kosa no famantarana ho anao, ry Hezekià: Amin’ity taona ity dia hihinana izay vary maniry ho azy ny olona; ary amin’ny taona manaraka dia mbola ho toy izany koa. Fa amin’ny taona fahatelo kosa dia hamafy vary sy hijinja ianareo ary hamboly voaloboka sy hihinana ny vokatra avy aminy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary izay sisa velona amin’ny taranak’i Joda dia ho toy ny hazo hamaka lalina indray ary ho feno voa ny rantsany; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'satria ao Jerosalema no hipoiran’ny sisa tavela, ary ao an-tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' no hiarenan’ny sisa velona.»'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ihany i Isaià hoe: «Izany no hataon’ny TOMPOn’izao rehetra izao noho ny fitia miredareda manesika Azy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Izao kosa no lazain’ny TOMPO ny amin’ny mpanjakan’i Asiria: ‹Tsy hiditra amin’ity tanàna ity izy, na handefa zana-tsipîka hamelezana azy na hiady aminy ombàn’ny ampinga na hanangana tovon-tany hanafihana azy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ny lalana izay niaviany ihany no hiverenany, fa tsy hiditra amin’ity tanàna ity izy. Izany no teny hentitra avy amiko TOMPO. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Harovako i Jerosalema ary hovonjeko noho ny amin’ny tenako sy i Davida mpanompoko.› »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fialàn’ny Asirianina, fahafatesan’ny mpanjakan’i Asiria
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 19.35-37)
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia niainga hankao an-tobin’ny Asirianina ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjelin
    - type: text
      text: '’ny TOMPO ka nisy 185 ny antoko-miaramila naripany; ary raha vao nifoha ny sisa velona tamin’ny maraina, dia nahita fa efa maty avokoa ireo. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Koa niainga teo i Saneheriba mpanjakan’i Asiria mba handeha hiverina any Ninive ary nijanona tany. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Kanjo raha iny izy niankohoka tao amin’ny tempolin’i Nisrôka andriamaniny iny indrindra, no avy namono azy tamin’ny sabatra ny zanany roa lahy, dia i Adramelèka sy i Saretsera; avy eo lasa nandositra any amin’ny tany Ararata izy mirahalahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 19.37 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' fa i Esara-Hadôna zanakalahin’i Saneheriba no nanjaka nandimby azy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Angamba ho ren’ny TOMPO Andriamanitrao ny tenin’ilay dekà asirianina izay nirahin’ny mpanjakan’i Asiria tompony hanevateva an’Andriamanitra velona; ka hofaizin’ny TOMPO Andriamanitrao izy noho izany. Fa manandrata vavaka ianao ho an’ireo sisa tavela amin’ny vahoakany.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Rehefa tonga tany amin’i Isaià ireo irak’i Hezekià mpanjaka, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'dia nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ambarao amin’ny tomponareo izao hafatry ny TOMPO izao: Aza matahotra eo anatrehan’ny teny renao nanevatevan’ireo manamboninahitry ny mpanjakan’i Asiria Ahy. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
