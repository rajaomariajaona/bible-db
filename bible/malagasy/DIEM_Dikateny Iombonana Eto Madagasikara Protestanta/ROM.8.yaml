  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saingy fantatsika fa mandraka ankehitriny, ny zavaboaary manontolo dia miara-misento sy mijaly toy ny vehivavy mihetsi-jaza. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsy ny zavaboaary ihany; fa isika koa, izay manana ny Fanahy Masina ho santatry ny fanomezan’Andriamanitra, dia misento ao anatintsika ao, miandry ny hanaovan’Andriamanitra antsika ho zanany ka hanavotany tanteraka ny tenantsika
