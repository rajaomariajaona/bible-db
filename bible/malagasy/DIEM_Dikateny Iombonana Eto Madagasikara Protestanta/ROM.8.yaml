  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha zanaka, dia mpandova koa; ka sady mpandova ny soa nampanantenain’Andriamanitra no mpiara-mandova izany amin’i Kristy: satria raha miara-mijaly amin’i Kristy isika, dia hiara-komem-boninahitra'
