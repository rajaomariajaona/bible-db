  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha manantena ny tsy hitantsika isika, dia miandry amim-paharetana.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izany koa no anampian’ny Fanahy Masina antsika amin’ny halementsika. Satria izay vavaka, araka ny tokony hataontsika, dia tsy fantatsika akory; fa ny Fanahy Masina mihitsy no mivavaka ho antsika amin-tsento tsy hay ambara amin-teny. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Andriamanitra mahita ny ao am-po no mahalala izay firònan’ny Fanahy Masina, satria araka izay irîn’Andriamanitra no ivavahan’ny Fanahy Masina ho an’ny '
