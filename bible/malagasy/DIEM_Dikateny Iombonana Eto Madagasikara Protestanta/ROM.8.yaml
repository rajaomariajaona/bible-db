  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iza no hiampanga ireo olom-boafidin’Andriamanitra? Tsy misy, satria Andriamanitra no efa nanaiky azy ireo ho marina! '
  '34':
