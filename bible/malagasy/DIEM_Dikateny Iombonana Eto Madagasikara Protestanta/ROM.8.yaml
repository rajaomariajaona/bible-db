  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notontosain’Andriamanitra izany mba ho tanteraka ao amintsika ny zavatra rehetra takîn’ny lalàna amintsika, dia isika izay mizotra tsy araka ny maha olona mpanota intsony fa araka ny Fanahy Masina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, izay miaina araka ny maha olona mpanota, dia mirona amin’ny zavatra ankafizin’ny maha olona mpanota; fa izay miaina araka ny Fanahy Masina, dia mirona amin’ny zavatra ankafizin’ny Fanahy Masina. '
  '6':
