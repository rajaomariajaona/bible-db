document_id: ROM.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay Fanahy Masina manome aina
  - type: text
    content: 'Koa ankehitriny dia tsy misy intsony fanamelohana ho an’izay tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa. '
  '10':
  - type: text
    content: Fa raha ao anatinareo kosa i Kristy, na dia ho faty aza ny vatanareo noho ny fahotana, ny Fanahy Masina no fiainanareo
  - type: note
    content: 'ny Fanahy Masina no fiainanareo: dkt hafa velona ny fanahinareo.'
  - type: text
    content: 'satria efa neken’Andriamanitra ho marina ianareo. '
  '11':
  - type: text
    content: Ary raha monina ao anatinareo ny Fanahin’ilay Andriamanitra nanangana an’i Jesoa ho velona avy tany amin’ny maty, dia Izy nanangana an’i Jesoa ho velona avy tany amin’ny maty no hamelona koa ny vatanareo mety maty, amin’ny alalan’ilay Fanahiny monina ao anatinareo.
  '12':
  - type: text
    content: 'Koa amin’izany, ry havana, misy adidy ananantsika, nefa tsy adidy amin’ny maha olona mpanota ka hivelomantsika araka ny maha olona mpanota. '
  '13':
  - type: text
    content: 'Satria raha velona araka ny maha olona mpanota ianareo, dia ho faty; fa raha ny Fanahy Masina no amonoanareo ny asan’ny maha olona mpanota, dia ho velona ianareo. '
  '14':
  - type: text
    content: 'Eny, izay rehetra tarihin’ny Fanahin’Andriamanitra no '
  - type: text
    content: zanak’Andriamanitra
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Satria tsy fanahy maha mpanompo no voarainareo ka hahatonga anareo hatahotra indray; fa ny Fanahy Masina maha zanak’Andriamanitra no voarainareo, ka ahafahantsika miantso an’Andriamanitra hoe: «Raiko ô'
  - type: note
    content: 'Raiko ô: eto ny rijan-teny grika fototra dia mampiasa ihany koa ny teny aramianina hoe Abbà. Jereo Mk 14.36 sy nta.'
  - type: text
    content: '!» '
  '16':
  - type: text
    content: 'Ny Fanahy Masina mihitsy no manambara amin’ny fanahintsika fa zanak’Andriamanitra isika. '
  '17':
  - type: text
    content: 'Ary raha zanaka, dia mpandova koa; ka sady mpandova ny soa nampanantenain’Andriamanitra no mpiara-mandova izany amin’i Kristy: satria raha miara-mijaly amin’i Kristy isika, dia hiara-komem-boninahitra'
  - type: note
    content: Ampit 2Kôr 4.17; 1Pt 4.13.
  - type: text
    content: ' aminy koa.'
  - type: heading
    content: Ny voninahitra ho avy
  '18':
  - type: text
    content: 'Heveriko fa tsy mendrika hohàrina amin’ny voninahitra izay haseho ao amintsika ny fijaliana amin’izao andro izao. '
  '19':
  - type: text
    content: 'Fa tsindrian-daona erỳ ny zavaboaary miandry ny hanehoan’Andriamanitra an’ireo '
  - type: text
    content: zanany
  - type: text
    content: '. '
  '2':
  - type: text
    content: Fa ny fanapahan’ny Fanahy Masina, mpanome aina ho an’izay tafaray amin’i Kristy Jesoa, dia nanafaka ahy
  - type: note
    content: 'nanafaka antsika: misy stf sasany ahitana hoe nanafaka anao ary misy ahitana hoe nanafaka antsika.'
  - type: text
    content: 'tsy ho voafehin’ny fanapahan’ny fahotana sy ny fahafatesana. '
  '20':
  - type: text
    content: Fa tonga nanaiky ho zavatra tsinontsinona ny zavaboaary, tsy araka ny nahiny anefa, fa noho ilay nampanaiky azy toy izany
  - type: note
    content: Ny rijan-teny grika fototra dia milaza fotsiny hoe ilay nampanaiky azy toy izany; kanefa ny lazainy eto dia toa Andriamanitra sy ny vokatry ny fitsarany eo anoloan’ny fahotan’ny olombelona. Misy kosa mihevitra fa i Satàna no lazaina eto.
  - type: text
    content: '. Saingy eo ny fanantenana: '
  '21':
  - type: text
    content: 'Fa ny zavaboaary koa aza dia hoafahana tsy ho andevon’ny fahasimbana indray andro any ka handray anjara amin’ny fahafahana be voninahitra hananan’ireo zanak’Andriamanitra. '
  '22':
  - type: text
    content: 'Saingy fantatsika fa mandraka ankehitriny, ny zavaboaary manontolo dia miara-misento sy mijaly toy ny vehivavy mihetsi-jaza. '
  '23':
  - type: text
    content: Ary tsy ny zavaboaary ihany; fa isika koa, izay manana ny Fanahy Masina ho santatry ny fanomezan’Andriamanitra, dia misento ao anatintsika ao, miandry ny hanaovan’Andriamanitra antsika ho zanany ka hanavotany tanteraka ny tenantsika
  - type: note
    content: Ampit 2Kôr 5.2-4. –Misy stf sasany tsy ahitana hoe hanaovan’Andriamanitra antsika ho zanany ka.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Eny, efa voavonjy isika saingy mbola amin’ny fanantenana; ny mahita izay nantenaina dia tsy manantena intsony; satria iza no mbola hanantena izay zavatra efa hitany? '
  '25':
  - type: text
    content: Fa raha manantena ny tsy hitantsika isika, dia miandry amim-paharetana.
  '26':
  - type: text
    content: 'Toy izany koa no anampian’ny Fanahy Masina antsika amin’ny halementsika. Satria izay vavaka, araka ny tokony hataontsika, dia tsy fantatsika akory; fa ny Fanahy Masina mihitsy no mivavaka ho antsika amin-tsento tsy hay ambara amin-teny. '
  '27':
  - type: text
    content: 'Ary Andriamanitra mahita ny ao am-po no mahalala izay firònan’ny Fanahy Masina, satria araka izay irîn’Andriamanitra no ivavahan’ny Fanahy Masina ho an’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: .
  '28':
  - type: text
    content: Fantatsika fa Andriamanitra dia miasa hahatonga ny zavatra rehetra hahasoa ny olona tia Azy
  - type: note
    content: 'Andriamanitra... olona tia Azy: misy stf sasany ahitana hoe Ny zavatra rehetra dia miara-miasa hahasoa ireo izay tia an’Andriamanitra.'
  - type: text
    content: ', dia ny olona nantsoiny araka ny fikasany rahateo. '
  '29':
  - type: text
    content: 'Satria izay nofidin’Andriamanitra mialoha dia voatendry rahateo koa hitovy endrika amin’ilay '
  - type: text
    content: Zanany
  - type: text
    content: ', mba hahatonga ny Zanany ho lahimatoa manan-jandry maro. '
  '3':
  - type: text
    content: 'Satria izay tsy vitan’ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy, noho ny lalàna nolemen’ny maha olona mpanota, dia notontosain’Andriamanitra. Voahelok’Andriamanitra ny fahotana tao amin’ny maha olona mpanota fony Izy naniraka ny '
  - type: text
    content: Zanany
  - type: text
    content: ', Izay naka ny endriky ny maha olombelona mba hanaisotra ny fahotana. '
  '30':
  - type: text
    content: Izay voatendrin’Andriamanitra rahateo dia nantsoiny koa; izay nantsoiny dia nekeny ho marina koa; ary izay nekeny ho marina dia nomeny voninahitra koa.
  - type: heading
    content: Lehibe ny fitiavan’Andriamanitra
  '31':
  - type: text
    content: 'Koa inona àry no mbola holazaintsika eo anoloan’izany? Raha Andriamanitra no momba antsika, iza no hahatohitra antsika? '
  '32':
  - type: text
    content: 'Izy Ilay tsy nandala ny tena '
  - type: text
    content: Zanany
  - type: text
    content: ', ka nanolotra Azy ho famonjena antsika rehetra, moa ve Izy tsy hanome antsika maimaimpoana ny zavatra rehetra miaraka amin’ny Zanany koa? '
  '33':
  - type: text
    content: 'Iza no hiampanga ireo olom-boafidin’Andriamanitra? Tsy misy, satria Andriamanitra no efa nanaiky azy ireo ho marina! '
  '34':
  - type: text
    content: 'Iza no afa-manameloka? Tsy misy, satria i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa efa maty sady efa nitsangana velona rahateo koa, ary mitoetra eo ankavanan’Andriamanitra ka mivavaka ho antsika!'
  '35':
  - type: text
    content: 'Iza no hahasaraka antsika amin’ny fitiavan’i Kristy? Fahoriana ve, sa fihafiana, sa fanenjehana, sa mosary, sa fahantrana, sa loza, sa fahafatesana? '
  '36':
  - type: text
    content: 'Araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: «Noho ny aminao no anatrehanay fahafatesana
  - type: text
    content: tontolo andro;
  - type: text
    content: toy ny ondry hovonoina ny fihevitry ny olona anay
  - type: note
    content: Sal 44.23.
  - type: text
    content: '!»'
  '37':
  - type: text
    content: 'Amin’izany rehetra izany anefa, dia tena mpandresy tanteraka isika, amin’ny alalan’Ilay efa tia antsika. '
  '38':
  - type: text
    content: 'Satria matoky aho fa tsy hisy hahasaraka antsika amin’ny fitiavana asehon’Andriamanitra antsika; eny, na ny fahafatesana, na fiainana, na '
  - type: text
    content: anjely
  - type: text
    content: ', na ireo fanapahana na ireo hery eny ana habakabaka, na zavatra ankehitriny na zavatra ho avy, '
  '39':
  - type: text
    content: na zavaboaary inona, dia tsy hisy hahasaraka antsika amin’ny fitiavana asehon’Andriamanitra antsika ao amin’i Kristy Jesoa Tompontsika.
  '4':
  - type: text
    content: 'Notontosain’Andriamanitra izany mba ho tanteraka ao amintsika ny zavatra rehetra takîn’ny lalàna amintsika, dia isika izay mizotra tsy araka ny maha olona mpanota intsony fa araka ny Fanahy Masina. '
  '5':
  - type: text
    content: 'Eny, izay miaina araka ny maha olona mpanota, dia mirona amin’ny zavatra ankafizin’ny maha olona mpanota; fa izay miaina araka ny Fanahy Masina, dia mirona amin’ny zavatra ankafizin’ny Fanahy Masina. '
  '6':
  - type: text
    content: 'Satria ny firònan’ny maha olona mpanota dia mitondra amin’ny fahafatesana; fa ny firònan’ny Fanahy Masina dia mitondra amin’ny fiainana sy ny fiadanana. '
  '7':
  - type: text
    content: 'Ny firònan’ny maha olona mpanota dia mifanohitra amin’Andriamanitra, ka tsy manoa sady tsy afa-manoa ny lalànan’Andriamanitra akory. '
  '8':
  - type: text
    content: Fa izay anjakan’ny maha olona mpanota dia tsy mety ho sitrak’Andriamanitra.
  '9':
  - type: text
    content: Ianareo kosa, tsy anjakan’ny maha olona mpanota ianareo fa anjakan’ny Fanahy Masina, satria
  - type: note
    content: satria na hoe raha toa.
  - type: text
    content: 'efa monina ao anatinareo ny Fanahin’Andriamanitra. Raha misy tsy manana ny Fanahin’i Kristy, dia tsy an’i Kristy. '
