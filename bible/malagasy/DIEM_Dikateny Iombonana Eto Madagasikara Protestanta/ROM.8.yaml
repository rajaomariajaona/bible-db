  children:
  - type: text
    text: Ilay Fanahy Masina manome aina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa ankehitriny dia tsy misy intsony fanamelohana ho an’izay tafaray amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa ny fanapahan’ny Fanahy Masina, mpanome aina ho an’izay tafaray amin’i Kristy Jesoa, dia nanafaka ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'nanafaka antsika:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nanafaka anao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ary misy ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nanafaka antsika.
    marker-yv: yv-n
  - type: text
    text: 'tsy ho voafehin’ny fanapahan’ny fahotana sy ny fahafatesana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Satria izay tsy vitan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy, noho ny lalàna nolemen’ny maha olona mpanota, dia notontosain’Andriamanitra. Voahelok’Andriamanitra ny fahotana tao amin’ny maha olona mpanota fony Izy naniraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: ', Izay naka ny endriky ny maha olombelona mba hanaisotra ny fahotana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Notontosain’Andriamanitra izany mba ho tanteraka ao amintsika ny zavatra rehetra takîn’ny lalàna amintsika, dia isika izay mizotra tsy araka ny maha olona mpanota intsony fa araka ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny, izay miaina araka ny maha olona mpanota, dia mirona amin’ny zavatra ankafizin’ny maha olona mpanota; fa izay miaina araka ny Fanahy Masina, dia mirona amin’ny zavatra ankafizin’ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Satria ny firònan’ny maha olona mpanota dia mitondra amin’ny fahafatesana; fa ny firònan’ny Fanahy Masina dia mitondra amin’ny fiainana sy ny fiadanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny firònan’ny maha olona mpanota dia mifanohitra amin’Andriamanitra, ka tsy manoa sady tsy afa-manoa ny lalànan’Andriamanitra akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa izay anjakan’ny maha olona mpanota dia tsy mety ho sitrak’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ianareo kosa, tsy anjakan’ny maha olona mpanota ianareo fa anjakan’ny Fanahy Masina, satria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'satria '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raha toa.
    marker-yv: yv-n
  - type: text
    text: 'efa monina ao anatinareo ny Fanahin’Andriamanitra. Raha misy tsy manana ny Fanahin’i Kristy, dia tsy an’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa raha ao anatinareo kosa i Kristy, na dia ho faty aza ny vatanareo noho ny fahotana, ny Fanahy Masina no fiainanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny Fanahy Masina no fiainanareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: velona ny fanahinareo.
    marker-yv: yv-n
  - type: text
    text: 'satria efa neken’Andriamanitra ho marina ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary raha monina ao anatinareo ny Fanahin’ilay Andriamanitra nanangana an’i Jesoa ho velona avy tany amin’ny maty, dia Izy nanangana an’i Jesoa ho velona avy tany amin’ny maty no hamelona koa ny vatanareo mety maty, amin’ny alalan’ilay Fanahiny monina ao anatinareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa amin’izany, ry havana, misy adidy ananantsika, nefa tsy adidy amin’ny maha olona mpanota ka hivelomantsika araka ny maha olona mpanota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Satria raha velona araka ny maha olona mpanota ianareo, dia ho faty; fa raha ny Fanahy Masina no amonoanareo ny asan’ny maha olona mpanota, dia ho velona ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Eny, izay rehetra tarihin’ny Fanahin’Andriamanitra no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’Andriamanitra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Satria tsy fanahy maha mpanompo no voarainareo ka hahatonga anareo hatahotra indray; fa ny Fanahy Masina maha zanak’Andriamanitra no voarainareo, ka ahafahantsika miantso an’Andriamanitra hoe: «Raiko ô'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Raiko ô: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'eto ny rijan-teny grika fototra dia mampiasa ihany koa ny teny aramianina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abbà.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Jereo Mk 14.36 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny Fanahy Masina mihitsy no manambara amin’ny fanahintsika fa zanak’Andriamanitra isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha zanaka, dia mpandova koa; ka sady mpandova ny soa nampanantenain’Andriamanitra no mpiara-mandova izany amin’i Kristy: satria raha miara-mijaly amin’i Kristy isika, dia hiara-komem-boninahitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2Kôr 4.17; 1Pt 4.13.
    marker-yv: yv-n
  - type: text
    text: ' aminy koa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny voninahitra ho avy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Heveriko fa tsy mendrika hohàrina amin’ny voninahitra izay haseho ao amintsika ny fijaliana amin’izao andro izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa tsindrian-daona erỳ ny zavaboaary miandry ny hanehoan’Andriamanitra an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanany
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa tonga nanaiky ho zavatra tsinontsinona ny zavaboaary, tsy araka ny nahiny anefa, fa noho ilay nampanaiky azy toy izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny rijan-teny grika fototra dia milaza fotsiny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay nampanaiky azy toy izany;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' kanefa ny lazainy eto dia toa Andriamanitra sy ny vokatry ny fitsarany eo anoloan’ny fahotan’ny olombelona. Misy kosa mihevitra fa i Satàna no lazaina eto.'
    marker-yv: yv-n
  - type: text
    text: '. Saingy eo ny fanantenana: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa ny zavaboaary koa aza dia hoafahana tsy ho andevon’ny fahasimbana indray andro any ka handray anjara amin’ny fahafahana be voninahitra hananan’ireo zanak’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Saingy fantatsika fa mandraka ankehitriny, ny zavaboaary manontolo dia miara-misento sy mijaly toy ny vehivavy mihetsi-jaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary tsy ny zavaboaary ihany; fa isika koa, izay manana ny Fanahy Masina ho santatry ny fanomezan’Andriamanitra, dia misento ao anatintsika ao, miandry ny hanaovan’Andriamanitra antsika ho zanany ka hanavotany tanteraka ny tenantsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ampit 2Kôr 5.2-4. –Misy stf sasany tsy ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hanaovan’Andriamanitra antsika ho zanany ka.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Eny, efa voavonjy isika saingy mbola amin’ny fanantenana; ny mahita izay nantenaina dia tsy manantena intsony; satria iza no mbola hanantena izay zavatra efa hitany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa raha manantena ny tsy hitantsika isika, dia miandry amim-paharetana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Toy izany koa no anampian’ny Fanahy Masina antsika amin’ny halementsika. Satria izay vavaka, araka ny tokony hataontsika, dia tsy fantatsika akory; fa ny Fanahy Masina mihitsy no mivavaka ho antsika amin-tsento tsy hay ambara amin-teny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Andriamanitra mahita ny ao am-po no mahalala izay firònan’ny Fanahy Masina, satria araka izay irîn’Andriamanitra no ivavahan’ny Fanahy Masina ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fantatsika fa Andriamanitra dia miasa hahatonga ny zavatra rehetra hahasoa ny olona tia Azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Andriamanitra... olona tia Azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny zavatra rehetra dia miara-miasa hahasoa ireo izay tia an’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: ', dia ny olona nantsoiny araka ny fikasany rahateo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Satria izay nofidin’Andriamanitra mialoha dia voatendry rahateo koa hitovy endrika amin’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: ', mba hahatonga ny Zanany ho lahimatoa manan-jandry maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Izay voatendrin’Andriamanitra rahateo dia nantsoiny koa; izay nantsoiny dia nekeny ho marina koa; ary izay nekeny ho marina dia nomeny voninahitra koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lehibe ny fitiavan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Koa inona àry no mbola holazaintsika eo anoloan’izany? Raha Andriamanitra no momba antsika, iza no hahatohitra antsika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izy Ilay tsy nandala ny tena '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: ', ka nanolotra Azy ho famonjena antsika rehetra, moa ve Izy tsy hanome antsika maimaimpoana ny zavatra rehetra miaraka amin’ny Zanany koa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Iza no hiampanga ireo olom-boafidin’Andriamanitra? Tsy misy, satria Andriamanitra no efa nanaiky azy ireo ho marina! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Iza no afa-manameloka? Tsy misy, satria i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa efa maty sady efa nitsangana velona rahateo koa, ary mitoetra eo ankavanan’Andriamanitra ka mivavaka ho antsika!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Iza no hahasaraka antsika amin’ny fitiavan’i Kristy? Fahoriana ve, sa fihafiana, sa fanenjehana, sa mosary, sa fahantrana, sa loza, sa fahafatesana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Araka ny voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Noho ny aminao no anatrehanay fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: tontolo andro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny ondry hovonoina ny fihevitry ny olona anay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 44.23.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Amin’izany rehetra izany anefa, dia tena mpandresy tanteraka isika, amin’ny alalan’Ilay efa tia antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Satria matoky aho fa tsy hisy hahasaraka antsika amin’ny fitiavana asehon’Andriamanitra antsika; eny, na ny fahafatesana, na fiainana, na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ', na ireo fanapahana na ireo hery eny ana habakabaka, na zavatra ankehitriny na zavatra ho avy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: na zavaboaary inona, dia tsy hisy hahasaraka antsika amin’ny fitiavana asehon’Andriamanitra antsika ao amin’i Kristy Jesoa Tompontsika.
