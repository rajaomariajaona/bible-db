  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: I Isaià no nilaza izany, dia satria nahita mialoha ny voninahitra hananan’i Jesoa izy sy niteny momba Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Kanefa i Jesoa dia ninoan’olona maro ihany na tamin’ireo manampahefana jiosy aza; saingy noho ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' dia tsy nanaiky ho mpiandany amin’i Jesoa izy ireo, fandrao voaroaka hiala amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
