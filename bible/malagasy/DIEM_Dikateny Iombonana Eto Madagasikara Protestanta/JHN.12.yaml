  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: «Andriamanitra efa nanajamba ny mason’ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nanamafy ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hany ka ny masony tsy hahita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fony tsy hahafantatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hiverina amiko ireo mba hositraniko
  - type: usfm
