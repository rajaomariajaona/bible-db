document_id: JHN.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hosoran’i Maria ilomanitra ny tongotr’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.6-13; Mk 14.3-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Enina andro talohan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ', dia tonga tao Betania'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mk 11.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ry i Jesoa, tao amin’izay nitoeran’i Lazara, ilay natsangany ho velona avy any amin’ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanaovan’ny tao fanasana Izy; ary i Marta no nandroso sakafo, fa i Lazara kosa isan’izay niara-nihinana tamin’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’izay i Maria dia naka ilomanitra sarobidy, natao tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: narda
  - type: text
    text: ', lànjana ampahatelon-kilao. Nanosotra ny tongotr’i Jesoa izy, dia namaoka ny tongony tamin’ny volon-dohany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lk 7.37-38.
    marker-yv: yv-n
  - type: text
    text: ' ka heraka ny fofona mamerovero avy amin’ilay ilomanitra ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa hoy i Jodasy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Iskariôta
  - type: text
    text: ', anankiray tamin’ny mpianatr’i Jesoa, ilay efa hanolotra Azy:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '–Nahoana iny ilomanitra iny no tsy namidy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denàry
  - type: text
    text: ' telonjato homena ny mahantra?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy ny fiahiany ny mahantra anefa no nitenenany an’izany fa noho izy mpangalatra: mpitana ny kitapom-bola izy ary naka izay nalatsaka tao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hoy i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka re izy, ry Jodasy, fa ho fitsinjovana ny andro hamboarana Ahy halevina no anatontosany izany! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny mahantra moa eto aminareo mandrakariva, fa Izaho tsy mba eto aminareo mandrakariva
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 15.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitetika hamono an’i Lazara ny manampahefana jiosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vahoaka maro tamin’ny Jiosy no nahalala fa tao Betania i Jesoa. Dia tonga tao ireo, tsy noho i Jesoa ihany fa mba hahita koa an’i Lazara, ilay natsangany ho velona avy any amin’ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny lohandoha-mpisorona kosa dia tapa-kevitra hamono an’i Lazara koa, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: satria noho izy dia maro ny Jiosy niala tamin-dry zareo ka nino an’i Jesoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miditra ao Jerosalema i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 21.1-11; Mk 11.1-11; Lk 19.28-40)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny ampitson’iny, dia ren’ny vahoaka maro izay tonga hankalaza ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' fa ho avy ao Jerosalema i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia naka sampan-drofia izy ireo, ka niainga hitsena Azy sady niantsoantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Dera anie ho an’Andriamanitra! Hombàm-pitahiana amin’ny anaran’ny Tompo anie Ilay avy, ilay Mpanjakan’i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 118.25-26. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Dera:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Hôsannà no hita ao amin’ny rijan-teny grika fototra (jereo Mt 21.9 sy nta). –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hombàm-pitahiana... Israely
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hombàm-pitahiana anie Ilay avy amin’ny anaran’ny Tompo, dia ilay Mpanjakan’i Israely.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I Jesoa kosa nahita zana-boriky anankiray, ka nitaingina azy, araka ny voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Aza matahotra, ry mponina ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro fa tonga ny Mpanjakanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitaingina zana-boriky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Za 9.9.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izany zavatra izany dia tsy azon’ny mpianany tamin’ny voalohany; fa rehefa nomen’Andriamanitra voninahitra i Jesoa, vao tsaroan’ny mpianany fa voalazan’ny Soratra Masina ny amin’i Jesoa izany sady nataon’ny olona taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vavolombelona manambara an’i Jesoa ny vahoaka izay niaraka taminy fony Izy niantso an’i Lazara hiala tao am-pasana sy nanangana azy ho velona avy any amin’ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izany koa no nitsenan’ny vahoaka azy: efa ren’izy ireo manko ny nanaovan’i Jesoa izany famantarana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tamin’izay ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' dia nifampilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hitanareo fa tsy mahefa na inona na inona ianareo! Jereo fa lasa manaraka Azy avokoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misy Grika te hahita an’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nisy Grika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Grika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ireto Grika ireto dia mandray anjara amin’ny fivahiniana fankalazàna ny Paska jiosy. Tsy Jiosy velively izy ireo fa hafa firenena; saingy anisan’ireo hafa firenena mpanaraka tanteraka ny fivavahana jiosy («prôzelita») na mpanaraka ampahany («sebômena», mpanaja an’ilay Andriamanitra tompoin’ny Jiosy).
    marker-yv: yv-n
  - type: text
    text: ' vitsivitsy anisan’izay niakatra tao Jerosalema hivavaka mandritra ny fankalazana. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nohatonin’ireo i Filipo, izay avy any Betsaidà tanànan’i Galilea, ka nanaovany fangatahana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba te hahita an’i Jesoa izahay, tompoko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia lasa i Filipo nilaza tamin’i Andrea; ary i Andrea sy i Filipo no lasa nilaza tamin’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy i Jesoa tamin’izy roa lahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tonga ny fotoanandro hanomezam-boninahitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lazaiko marina dia marina aminareo fa raha tsy maty ny voam-bary latsaka ao amin’ny tany, dia mitoetra irery; raha maty kosa izy, dia mahavokatra be. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izay mandala ny ainy no hahavery azy; fa izay tsy mandala ny ainy eto amin’izao tontolo izao no hitahiry azy ho aina maharitra mandrakizay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 10.39; 16.25; Mk 8.35; Lk 9.24.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Raha misy olona manompo Ahy, dia aoka izy hanaraka Ahy; ary izay itoerako, dia ao koa no hitoeran’ny mpanompoko. Raha misy olona manompo Ahy, dia homen’ny Raiko voninahitra izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lazain’i Jesoa ny hahafatesany
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '–Ankehitriny, mangorohoro ny fanahiko, ka inona re no holazaiko? Hoe: Ray ô, vonjeo Aho ho afaka amin’izao ora fijaliana izao? Kanefa ny handalo amin’izao ora fijaliana izao indrindra no nahatongavako. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ray ô, omeo voninahitra ny anaranao!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamin’izay dia nisy feo avy tany an-danitra nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nomeko voninahitra ny anarako ary mbola homeko voninahitra indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny vahoaka izay teo ka nahare, dia nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Kotro-baratra izany!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hoy ny sasany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjely
  - type: text
    text: ' no niteny taminy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'I Jesoa kosa nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy ho Ahy no nahatongavan’izany feo izany fa ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ankehitriny no hanamelohana an’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: '; ankehitriny no handroahana ny filohan’izao tontolo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary Izaho, rehefa voasandratra avy eo amin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny hoe '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: voasandratra avy eo amin’ny tany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia fomba fiteny mifono hevitra misampana roa, araka ny hita ombieniombieny ato amin’ny Jôh (jereo 3.3,8 sy nta): ity fomba fiteny ity dia sady miantefa amin’ny fanandratana an’i Jesoa eo amin’ny hazofijaliana no miantefa amin’ny fanandratana azy amin’ny voninahitra (jereo 12.33; 3.14-15; 8.28).'
    marker-yv: yv-n
  - type: text
    text: ', dia hitaona ny olona rehetra hanatona Ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny nolazain’i Jesoa tamin’izany dia ny karazam-pahafatesana efa hihatra aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ka hoy ny vahoaka namaly Azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa renay tamin’ny bokin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: ' fa maharitra mandrakizay ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 110.4; Is 9.6; Dan 7.14.
    marker-yv: yv-n
  - type: text
    text: '; ka ahoana no ilazanao hoe: tsy maintsy hasandratra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: '? Iza moa izany Zanak’olona izany?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Kely foana sisa hitoeran’ny fahazavana eo aminareo. Mandehana dieny mbola anananareo ny fahazavana, mba tsy ho tratry ny haizina ianareo; fa izay mandeha amin’ny haizina dia tsy mahalala izay alehany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Minoa ny fahazavana dieny mbola anananareo ny fahazavana, mba ho tonga olona miaina araka ny fahazavana ianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy mino an’i Jesoa ny ankapoben’ny Jiosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nony voalazan’i Jesoa izany, dia lasa Izy niery ny vahoaka jiosy. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Na dia betsaka aza ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' nataony teo anatrehan-dry zareo, dia tsy ninoan’ireo Izy; '
  - type: usfm
