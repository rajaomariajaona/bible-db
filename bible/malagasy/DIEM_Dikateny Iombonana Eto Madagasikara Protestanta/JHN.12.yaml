document_id: JHN.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hosoran’i Maria ilomanitra ny tongotr’i Jesoa
  - type: heading
    content: (Jereo Mt 26.6-13; Mk 14.3-9)
  - type: text
    content: 'Enina andro talohan’ny '
  - type: text
    content: Paska
  - type: text
    content: ', dia tonga tao Betania'
  - type: note
    content: Jereo Mk 11.1 sy nta.
  - type: text
    content: ' ry i Jesoa, tao amin’izay nitoeran’i Lazara, ilay natsangany ho velona avy any amin’ny maty. '
  '10':
  - type: text
    content: 'Ny lohandoha-mpisorona kosa dia tapa-kevitra hamono an’i Lazara koa, '
  '11':
  - type: text
    content: satria noho izy dia maro ny Jiosy niala tamin-dry zareo ka nino an’i Jesoa.
  - type: heading
    content: Miditra ao Jerosalema i Jesoa
  - type: heading
    content: (Jereo Mt 21.1-11; Mk 11.1-11; Lk 19.28-40)
  '12':
  - type: text
    content: 'Ny ampitson’iny, dia ren’ny vahoaka maro izay tonga hankalaza ny '
  - type: text
    content: Paska
  - type: text
    content: ' fa ho avy ao Jerosalema i Jesoa. '
  '13':
  - type: text
    content: 'Dia naka sampan-drofia izy ireo, ka niainga hitsena Azy sady niantsoantso hoe:'
  - type: text
    content: –Dera anie ho an’Andriamanitra! Hombàm-pitahiana amin’ny anaran’ny Tompo anie Ilay avy, ilay Mpanjakan’i Israely
  - type: note
    content: 'Ampit Sal 118.25-26. –Dera: Hôsannà no hita ao amin’ny rijan-teny grika fototra (jereo Mt 21.9 sy nta). –Hombàm-pitahiana... Israely dkt hafa Hombàm-pitahiana anie Ilay avy amin’ny anaran’ny Tompo, dia ilay Mpanjakan’i Israely.'
  - type: text
    content: '!'
  '14':
  - type: text
    content: 'I Jesoa kosa nahita zana-boriky anankiray, ka nitaingina azy, araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  '15':
  - type: text
    content: '«Aza matahotra, ry mponina ao '
  - type: text
    content: Tsiôna
  - type: text
    content: '!'
  - type: text
    content: Indro fa tonga ny Mpanjakanareo
  - type: text
    content: mitaingina zana-boriky
  - type: note
    content: Za 9.9.
  - type: text
    content: '!»'
  '16':
  - type: text
    content: Izany zavatra izany dia tsy azon’ny mpianany tamin’ny voalohany; fa rehefa nomen’Andriamanitra voninahitra i Jesoa, vao tsaroan’ny mpianany fa voalazan’ny Soratra Masina ny amin’i Jesoa izany sady nataon’ny olona taminy.
  '17':
  - type: text
    content: 'Vavolombelona manambara an’i Jesoa ny vahoaka izay niaraka taminy fony Izy niantso an’i Lazara hiala tao am-pasana sy nanangana azy ho velona avy any amin’ny maty. '
  '18':
  - type: text
    content: 'Izany koa no nitsenan’ny vahoaka azy: efa ren’izy ireo manko ny nanaovan’i Jesoa izany famantarana izany. '
  '19':
  - type: text
    content: 'Tamin’izay ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' dia nifampilaza hoe:'
  - type: text
    content: '–Hitanareo fa tsy mahefa na inona na inona ianareo! Jereo fa lasa manaraka Azy avokoa '
  - type: text
    content: izao tontolo izao
  - type: text
    content: .
  - type: heading
    content: Misy Grika te hahita an’i Jesoa
  '2':
  - type: text
    content: 'Nanaovan’ny tao fanasana Izy; ary i Marta no nandroso sakafo, fa i Lazara kosa isan’izay niara-nihinana tamin’i Jesoa. '
  '20':
  - type: text
    content: Nisy Grika
  - type: note
    content: 'Grika: ireto Grika ireto dia mandray anjara amin’ny fivahiniana fankalazàna ny Paska jiosy. Tsy Jiosy velively izy ireo fa hafa firenena; saingy anisan’ireo hafa firenena mpanaraka tanteraka ny fivavahana jiosy («prôzelita») na mpanaraka ampahany («sebômena», mpanaja an’ilay Andriamanitra tompoin’ny Jiosy).'
  - type: text
    content: ' vitsivitsy anisan’izay niakatra tao Jerosalema hivavaka mandritra ny fankalazana. '
  '21':
  - type: text
    content: 'Nohatonin’ireo i Filipo, izay avy any Betsaidà tanànan’i Galilea, ka nanaovany fangatahana hoe:'
  - type: text
    content: –Mba te hahita an’i Jesoa izahay, tompoko!
  '22':
  - type: text
    content: 'Dia lasa i Filipo nilaza tamin’i Andrea; ary i Andrea sy i Filipo no lasa nilaza tamin’i Jesoa. '
  '23':
  - type: text
    content: 'Dia hoy i Jesoa tamin’izy roa lahy:'
  - type: text
    content: '–Tonga ny fotoanandro hanomezam-boninahitra ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Lazaiko marina dia marina aminareo fa raha tsy maty ny voam-bary latsaka ao amin’ny tany, dia mitoetra irery; raha maty kosa izy, dia mahavokatra be. '
  '25':
  - type: text
    content: Izay mandala ny ainy no hahavery azy; fa izay tsy mandala ny ainy eto amin’izao tontolo izao no hitahiry azy ho aina maharitra mandrakizay
  - type: note
    content: Ampit Mt 10.39; 16.25; Mk 8.35; Lk 9.24.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Raha misy olona manompo Ahy, dia aoka izy hanaraka Ahy; ary izay itoerako, dia ao koa no hitoeran’ny mpanompoko. Raha misy olona manompo Ahy, dia homen’ny Raiko voninahitra izy.
  - type: heading
    content: Lazain’i Jesoa ny hahafatesany
  '27':
  - type: text
    content: '–Ankehitriny, mangorohoro ny fanahiko, ka inona re no holazaiko? Hoe: Ray ô, vonjeo Aho ho afaka amin’izao ora fijaliana izao? Kanefa ny handalo amin’izao ora fijaliana izao indrindra no nahatongavako. '
  '28':
  - type: text
    content: Ray ô, omeo voninahitra ny anaranao!
  - type: text
    content: 'Tamin’izay dia nisy feo avy tany an-danitra nanao hoe:'
  - type: text
    content: –Efa nomeko voninahitra ny anarako ary mbola homeko voninahitra indray.
  '29':
  - type: text
    content: 'Ny vahoaka izay teo ka nahare, dia nanao hoe:'
  - type: text
    content: –Kotro-baratra izany!
  - type: text
    content: 'Fa hoy ny sasany:'
  - type: text
    content: –
  - type: text
    content: Anjely
  - type: text
    content: ' no niteny taminy!'
  '3':
  - type: text
    content: 'Tamin’izay i Maria dia naka ilomanitra sarobidy, natao tamin’ny '
  - type: text
    content: narda
  - type: text
    content: ', lànjana ampahatelon-kilao. Nanosotra ny tongotr’i Jesoa izy, dia namaoka ny tongony tamin’ny volon-dohany'
  - type: note
    content: Ampit Lk 7.37-38.
  - type: text
    content: ' ka heraka ny fofona mamerovero avy amin’ilay ilomanitra ny trano. '
  '30':
  - type: text
    content: 'I Jesoa kosa nilaza hoe:'
  - type: text
    content: '–Tsy ho Ahy no nahatongavan’izany feo izany fa ho anareo. '
  '31':
  - type: text
    content: Ankehitriny no hanamelohana an’
  - type: text
    content: izao tontolo izao
  - type: text
    content: '; ankehitriny no handroahana ny filohan’izao tontolo izao. '
  '32':
  - type: text
    content: Ary Izaho, rehefa voasandratra avy eo amin’ny tany
  - type: note
    content: 'Ny hoe voasandratra avy eo amin’ny tany dia fomba fiteny mifono hevitra misampana roa, araka ny hita ombieniombieny ato amin’ny Jôh (jereo 3.3,8 sy nta): ity fomba fiteny ity dia sady miantefa amin’ny fanandratana an’i Jesoa eo amin’ny hazofijaliana no miantefa amin’ny fanandratana azy amin’ny voninahitra (jereo 12.33; 3.14-15; 8.28).'
  - type: text
    content: ', dia hitaona ny olona rehetra hanatona Ahy.'
  '33':
  - type: text
    content: 'Ny nolazain’i Jesoa tamin’izany dia ny karazam-pahafatesana efa hihatra aminy. '
  '34':
  - type: text
    content: 'Ka hoy ny vahoaka namaly Azy:'
  - type: text
    content: '–Efa renay tamin’ny bokin’ny '
  - type: text
    content: lalàna
  - type: text
    content: ' fa maharitra mandrakizay ny '
  - type: text
    content: Mesia
  - type: note
    content: Jereo Sal 110.4; Is 9.6; Dan 7.14.
  - type: text
    content: '; ka ahoana no ilazanao hoe: tsy maintsy hasandratra ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '? Iza moa izany Zanak’olona izany?'
  '35':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Kely foana sisa hitoeran’ny fahazavana eo aminareo. Mandehana dieny mbola anananareo ny fahazavana, mba tsy ho tratry ny haizina ianareo; fa izay mandeha amin’ny haizina dia tsy mahalala izay alehany. '
  '36':
  - type: text
    content: Minoa ny fahazavana dieny mbola anananareo ny fahazavana, mba ho tonga olona miaina araka ny fahazavana ianareo.
  - type: heading
    content: Tsy mino an’i Jesoa ny ankapoben’ny Jiosy
  - type: text
    content: 'Nony voalazan’i Jesoa izany, dia lasa Izy niery ny vahoaka jiosy. '
  '37':
  - type: text
    content: 'Na dia betsaka aza ny '
  - type: text
    content: famantarana
  - type: text
    content: ' nataony teo anatrehan-dry zareo, dia tsy ninoan’ireo Izy; '
  '38':
  - type: text
    content: 'hany ka tanteraka ny tenin’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  - type: text
    content: «Tompo ô, iza no nino ny hafatra nambaranay?
  - type: text
    content: Ary iza no nampisehoana ny herin’ny Tompo
  - type: note
    content: Is 53.1, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: ?»
  '39':
  - type: text
    content: 'Ny tsy nahazoan’izy ireo nino, dia satria hoy indray i Isaià:'
  '4':
  - type: text
    content: 'Fa hoy i Jodasy '
  - type: text
    content: Iskariôta
  - type: text
    content: ', anankiray tamin’ny mpianatr’i Jesoa, ilay efa hanolotra Azy:'
  '40':
  - type: text
    content: «Andriamanitra efa nanajamba ny mason’ireo
  - type: text
    content: sy nanamafy ny fony;
  - type: text
    content: hany ka ny masony tsy hahita,
  - type: text
    content: ny fony tsy hahafantatra,
  - type: text
    content: ary tsy hiverina amiko ireo mba hositraniko
  - type: note
    content: Is 6.9-10, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: ','
  - type: text
    content: hoy Andriamanitra.»
  '41':
  - type: text
    content: I Isaià no nilaza izany, dia satria nahita mialoha ny voninahitra hananan’i Jesoa izy sy niteny momba Azy.
  '42':
  - type: text
    content: 'Kanefa i Jesoa dia ninoan’olona maro ihany na tamin’ireo manampahefana jiosy aza; saingy noho ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' dia tsy nanaiky ho mpiandany amin’i Jesoa izy ireo, fandrao voaroaka hiala amin’ny '
  - type: text
    content: sinagôga
  - type: note
    content: Jereo 9.22.
  - type: text
    content: ': '
  '43':
  - type: text
    content: satria tiany kokoa ny voninahitra avy amin’ny olombelona noho ny voninahitra avy amin’Andriamanitra.
  - type: heading
    content: Ny tenin’i Jesoa no mitsara sy manameloka
  '44':
  - type: text
    content: 'I Jesoa kosa niantso mafy hoe:'
  - type: text
    content: '–Izay mino Ahy, dia tsy Izaho ihany no inoany fa Ilay naniraka Ahy; '
  '45':
  - type: text
    content: 'ary izay mahita Ahy, dia mahita Ilay naniraka Ahy. '
  '46':
  - type: text
    content: 'Izaho, ilay fahazavana, dia tonga amin’izao tontolo izao, mba tsy hitoetra ao anatin’ny haizina izay rehetra mino Ahy. '
  '47':
  - type: text
    content: Raha misy mandre ny teniko ka tsy mitandrina ireny, dia tsy manameloka azy Aho; satria tsy hanameloka an’izao tontolo izao no nahatongavako, fa hamonjy an’
  - type: text
    content: izao tontolo izao
  - type: text
    content: '. '
  '48':
  - type: text
    content: 'Izay manamavo Ahy ka tsy mandray ny teniko, dia manana izay manameloka azy: ny teny izay nambarako ihany no hanameloka azy amin’ny andro farany; '
  '49':
  - type: text
    content: 'satria tsy avy amin’ny tenako no nanaovako fanambaràna, fa ny Ray Izay naniraka Ahy no nandidy izay holazaiko sy hambarako. '
  '5':
  - type: text
    content: '–Nahoana iny ilomanitra iny no tsy namidy '
  - type: text
    content: denàry
  - type: text
    content: ' telonjato homena ny mahantra?'
  '50':
  - type: text
    content: Fantatro fa ny didin’ny Ray no mitondra fiaina-maharitra mandrakizay. Koa ireo zavatra nambarako dia nambarako araka ny voalazan’ny Ray tamiko.
  '6':
  - type: text
    content: 'Tsy ny fiahiany ny mahantra anefa no nitenenany an’izany fa noho izy mpangalatra: mpitana ny kitapom-bola izy ary naka izay nalatsaka tao anatiny. '
  '7':
  - type: text
    content: 'Fa hoy i Jesoa:'
  - type: text
    content: '–Aoka re izy, ry Jodasy, fa ho fitsinjovana ny andro hamboarana Ahy halevina no anatontosany izany! '
  '8':
  - type: text
    content: Ny mahantra moa eto aminareo mandrakariva, fa Izaho tsy mba eto aminareo mandrakariva
  - type: note
    content: Ampit Deot 15.11.
  - type: text
    content: .
  - type: heading
    content: Mitetika hamono an’i Lazara ny manampahefana jiosy
  '9':
  - type: text
    content: 'Vahoaka maro tamin’ny Jiosy no nahalala fa tao Betania i Jesoa. Dia tonga tao ireo, tsy noho i Jesoa ihany fa mba hahita koa an’i Lazara, ilay natsangany ho velona avy any amin’ny maty. '
