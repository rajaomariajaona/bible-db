      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'hany ka tanteraka ny tenin’i Isaià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tompo ô, iza no nino ny hafatra nambaranay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no nampisehoana ny herin’ny Tompo
  - type: usfm
