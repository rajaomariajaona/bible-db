    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: satria tiany kokoa ny voninahitra avy amin’ny olombelona noho ny voninahitra avy amin’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tenin’i Jesoa no mitsara sy manameloka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'I Jesoa kosa niantso mafy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izay mino Ahy, dia tsy Izaho ihany no inoany fa Ilay naniraka Ahy; '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'ary izay mahita Ahy, dia mahita Ilay naniraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Izaho, ilay fahazavana, dia tonga amin’izao tontolo izao, mba tsy hitoetra ao anatin’ny haizina izay rehetra mino Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Raha misy mandre ny teniko ka tsy mitandrina ireny, dia tsy manameloka azy Aho; satria tsy hanameloka an’izao tontolo izao no nahatongavako, fa hamonjy an’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Izay manamavo Ahy ka tsy mandray ny teniko, dia manana izay manameloka azy: ny teny izay nambarako ihany no hanameloka azy amin’ny andro farany; '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'satria tsy avy amin’ny tenako no nanaovako fanambaràna, fa ny Ray Izay naniraka Ahy no nandidy izay holazaiko sy hambarako. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Fantatro fa ny didin’ny Ray no mitondra fiaina-maharitra mandrakizay. Koa ireo zavatra nambarako dia nambarako araka ny voalazan’ny Ray tamiko.
