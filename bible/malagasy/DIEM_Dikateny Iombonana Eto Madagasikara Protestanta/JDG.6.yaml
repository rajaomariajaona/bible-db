document_id: JDG.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nampahory ny Israelita ny Midianita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary nanao izay ratsy eo imason’ny TOMPO indray ny Israelita ka natolotry ny TOMPO ho eo an-tanan’ny Midianita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 2.15 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' nandritra ny fito taona. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nahery vaika tamin’ny Israelita loatra ny famelezan’ny Midianita; koa noho ny tahony azy dia nanamboatra lalan-kizo sy zohy fierena ary toerana sarotra anihina tany an-tendrombohitra ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa isaky ny avy nanao famafazam-boa ny sahany ny Israelita, dia tonga nanafika ny Midianita niaraka tamin’ny Hamalekita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hamalekita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 3.13 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' sy ireo mpifindrafindra lasy avy any atsinanana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nitoby teo amin’ny sahan’ny Israelita ireny ka nanimba ny vokatry ny taniny hatrany Gazà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gazà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: iray amin’ireo renivohitra filistinina dimy, ka izy no atsimo indrindra sady akaikin’ny ranomasina.
    marker-yv: yv-n
  - type: text
    text: ', ary tsy nisy zavatra navelany hohanin’ny Israelita, tsy nisy navelany ho azy na ondry aman’osy na omby na boriky. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nifindrafindra niaraka tamin’ny biby fiompiny sy ny lainy ireny sady toy ny valala no fiaviny; fa maro izy mbamin’ny ramevany ka tsy hita isa. Niditra tamin’ny tany izy mba handrava azy; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ary nahantra loatra ny Israelita noho ny nafitsoky ny Midianita, ka niantso vonjy tamin’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa nitaraina tamin’ny TOMPO ny Israelita mba hanafaka azy amin’ny Midianita, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia nanirahany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' hiteny aminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely: «Izaho no nitondra anareo niala tany Ejipta sy namoaka anareo tao amin’ny toerana nanandevozana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izaho no nanafaka anareo teo am-pelatanan’ny Ejiptianina sy izay rehetra nampahory anareo. Noroahiko ny fahavalonareo arakaraky ny nandrosoanareo ka nomeko anareo ny taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nambarako taminareo fa Izaho no TOMPO Andriamanitrareo. Ka tsy tokony hatahoranareo ny andriamanitry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' eo amin’ny tany izay onenanareo nefa tsy nihaino Ahy ianareo.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naniraka an’i Gidehôna hamonjy an’i Israely ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary tonga tao an-tanàna Hôfrà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hôfrà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tsy fantatra mazava ny misy azy, kanefa ao anatin’ny faritr’i Manase.
    marker-yv: yv-n
  - type: text
    text: ' ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: n’ny TOMPO ka nipetraka teo ambanin’ny hazo terebinta izay an’i Jôasy lehilahy anisan’ny tarik’i Abihezera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny tarik’i Abihezera dia anisan’ny fokon’i Manase.
    marker-yv: yv-n
  - type: text
    text: '. I Gidehôna zanakalahin’i Jôasy tamin’izay dia teo am-pivelezam-bary tao amin’ny famiazam-boaloboka mba tsy ho hitan’ny Midianita. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nisehoan’ilay anjelin’ny TOMPO izy ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny TOMPO no momba anao, ry ilay mpiady mahery fo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa novalian’i Gidehôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Azafady, tompoko! Raha momba anay ny TOMPO, nahoana no iharan’izao loza rehetra izao izahay? Aiza avokoa ireo zava-mahagaga notantarain’ny razanay fa nataon’ny TOMPO fony Izy namoaka azy ireny avy tany Ejipta? Fa ankehitriny efa nanary anay ny TOMPO, ka nanolotra anay eo an-tanan’ny Midianita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nitodika nijery azy ny TOMPO ka niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehàna amin’izao herinao izao, ka afaho teo am-pelatanan’ny Midianita ny Israelita, fa Izaho no naniraka anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia novalian’i Gidehôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indrisy, Tompo ô, ahoana no ahazoako mamonjy an’i Israely? Kanefa ny fianakaviako no osa indrindra amin’ny fokon’i Manase ary izaho no tanora indrindra ao an-tranon’ny raiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy kosa ny TOMPO taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Homba anao Aho, ka toy ny famelezana olona iray monja no hamelezanao ny Midianita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia namaly Azy i Gidehôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha sitrakao àry, dia mba omeo famantarana aho fa Ianao tokoa no miteny amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aoka mba tsy hiala eto Ianao mandra-piveriko mitondra fanatitra izay tiako hatolotra eto anatrehanao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hijanona eto Aho mandra-piverinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nandeha i Gidehôna ka namboatra zanak’osy sy mofo tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: ' tamin’ny koba ankevitry ny telopolo kilao. Nataony tao anaty harona ny hena ary nataony tao anaty vilany ny ron-kena, dia nentiny teo ambanin’ny terebinta ka natolony ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy ilay anjelin’Andriamanitra taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Apetraho eo ambonin’ity harambato ity ny hena sy ny mofo tsy misy leviora ka tondrahy ron-kena.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nataon’i Gidehôna izany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary naninji-tanana ilay anjelin’ny TOMPO, ka nokasihiny tamin’ny tendron’ilay tehina teny an-tanany ny hena sy ny mofo tsy nisy leviora; dia nivoaka afo ny vatolampy ka nandevona ny hena sy ny mofo. Avy eo ilay anjelin’ny TOMPO dia nanjavona teo imasony. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Takatr’i Gidehôna tamin’izay fa anjelin’ny TOMPO ilay teo ka hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lozako, ry Tompo ANDRIANANAHARY ô, fa nahita ny anjelinao nifanatrika tamiko aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Hoy kosa ny TOMPO taminy;
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fiadanana anie ho aminao; aza matahotra, fa tsy ho faty ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nanorina alitara ho an’ny TOMPO teo i Gidehôna, ka io toerana io dia nantsoiny hoe «Ny TOMPO manome fiadanana»; ary mandraka androany izany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' izany dia mbola ao Hôfrà, tanànan’ny tarik’i Abihezera.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noravan’i Gidehôna ny alitaran’i Bahala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tamin’io alina io ihany ny TOMPO dia nandidy an’i Gidehôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Alao ny ombilahin-drainao, ilay faharoa efa fito taona. Ravao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitaran
  - type: text
    text: '’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' izay an-drainao ary kapao ny tsatokazon-tsampy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.25 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Tsatokazon’i Aserà:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mariky ny andriamani-bavy Aserà, jereo 3.7 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' eo anilany; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'dia manangàna alitara voamboatra tsara ho an’ny TOMPO Andriamanitrao eo an-tampon’io havoana io. Ary ento ny ombilahin-drainao ka atolory ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo eo; ka ny tsatokazon-tsampy nokapainao no ataovy kitay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nifidy folo lahy tamin’ireo mpanompony i Gidehôna mba hanao araka izay efa nandidian’ny TOMPO azy. Saingy tamin’ny alina no nanatanterahany azy fa natahotra ny hanao azy tamin’ny antoandro izy noho ny amin’ny fianakaviany sy ny mponina tao an-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nony nifoha ny olona ny maraina, dia nahita fa rava ny alitaran’i Bahala, voakapa ny tsatokazon’i Aserà teo anilany, ary nisy ombilahy iray natao sorona dorana manontolo teo ambonin’ilay alitara vao namboarina. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa nifanontany ny olona hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no nanao an’izao zavatra izao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nikaroka sy nanao ampamoaka izy; ka nisy nilaza fa i Gidehôna, zanakalahin’i Jôasy, no nanao azy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy ny olona tao an-tanàna tamin’i Jôasy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avoahy atỳ ny zanakao lahy hovonoina ho faty, satria nandrava ny alitaran’i Bahala izy sady nikapa ny tsatokazon-tsampy teo anilany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa namaly ireo rehetra nitsangan-kanohitra azy i Jôasy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa ianareo va no hiaro an’i Bahala sy tonga hamonjy azy? Na iza na iza hiaro an’i Bahala dia hovonoina ho faty, alohan’ny rahampitso maraina. Fa raha andriamanitra i Bahala, aoka izy hiaro tena satria ny alitarany no noravana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nanomboka hatreo i Gidehôna dia nantsoina hoe Jerobahala, izany hoe «Aoka hiaro tena i Bahala»; ny antony moa dia ny amin’ny tenin’i Jôasy hoe: «Aoka hiaro tena i Bahala satria ny alitarany no noravana!»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nangataka famantarana tamin’Andriamanitra i Gidehôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny Midianita rehetra mbamin’ny Hamalekita ary ny mpifindrafindra lasy avy any atsinanana dia nivondrona ka niampita an’i Jôrdàna ary nanorina ny tobiny tao amin’ny lemak’i Jizrehela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny Midianita rehetra mbamin’ny Hamalekita ary ny mpifindrafindra lasy avy any atsinanana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 6.1-3 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny lemak’i Jizrehela:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Jos 19.18 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa notsindrian’ny Fanahin’ny TOMPO i Gidehôna, dia nitsoka trompetra mba hiantso ny vatan-dehilahy tao amin’ny tarika abihezerita hanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nandefa iraka tany amin’ny faritany manasita manontolo koa izy mba hiantso ny vatan-dehilahy any hanaraka azy. Mbola nandefa iraka tany amin’ny foko aserita sy i zebolonita ary naftalita koa izy ka tonga nanaraka azy ny vatan-dehilahy tamin’ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia hoy i Gidehôna tamin’Andriamanitra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha sitrakao tokoa ny hamonjy ny Israelita amin’ny alalan’ny tanako araka izay efa voalazanao, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: dia indro havelatro eo am-pamoloana ny volon’ondry; ka raha ny volon’ondry ihany no lenan’ny ando, fa ny tany manodidina azy kosa ho maina avokoa, dia ho fantatro fa ny tanako tokoa no hamonjenao an’i Israely, araka izay efa nambaranao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia tanteraka tokoa araka izany; fa raha nifoha maraina i Gidehôna ny ampitso ka nofiazany ny volon’ondry, dia nisy ranon’ando tokony hahafeno kaopy iray. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary hoy indray izy tamin’Andriamanitra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka mba tsy hirehi-pahatezerana amiko Ianao raha mbola angatahiko zavatra indray mandeha! Te hahazo porofo farany ny amin’ny volon’ondry aho: ka amin’ity indray mandeha ity dia aoka ny volon’ondry ihany no ho maina, fa ny tany manodidina azy kosa ho lenan’ny ando avokoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tamin’iny alina iny ihany dia notanterahin’Andriamanitra izany ka ny volon’ondry ihany no maina fa ny tany nanodidina azy kosa dia lenan’ny ando avokoa.
