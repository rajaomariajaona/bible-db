document_id: JDG.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nampahory ny Israelita ny Midianita
  - type: text
    content: Ary nanao izay ratsy eo imason’ny TOMPO indray ny Israelita ka natolotry ny TOMPO ho eo an-tanan’ny Midianita
  - type: note
    content: Jereo Eks 2.15 sy nta.
  - type: text
    content: ' nandritra ny fito taona. '
  '10':
  - type: text
    content: 'Ary nambarako taminareo fa Izaho no TOMPO Andriamanitrareo. Ka tsy tokony hatahoranareo ny andriamanitry ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' eo amin’ny tany izay onenanareo nefa tsy nihaino Ahy ianareo.»'
  - type: heading
    content: Naniraka an’i Gidehôna hamonjy an’i Israely ny Tompo
  '11':
  - type: text
    content: Ary tonga tao an-tanàna Hôfrà
  - type: note
    content: 'Hôfrà: toerana tsy fantatra mazava ny misy azy, kanefa ao anatin’ny faritr’i Manase.'
  - type: text
    content: ' ilay '
  - type: text
    content: anjeli
  - type: text
    content: n’ny TOMPO ka nipetraka teo ambanin’ny hazo terebinta izay an’i Jôasy lehilahy anisan’ny tarik’i Abihezera
  - type: note
    content: Ny tarik’i Abihezera dia anisan’ny fokon’i Manase.
  - type: text
    content: '. I Gidehôna zanakalahin’i Jôasy tamin’izay dia teo am-pivelezam-bary tao amin’ny famiazam-boaloboka mba tsy ho hitan’ny Midianita. '
  '12':
  - type: text
    content: 'Ary nisehoan’ilay anjelin’ny TOMPO izy ka nilazany hoe:'
  - type: text
    content: –Ny TOMPO no momba anao, ry ilay mpiady mahery fo!
  '13':
  - type: text
    content: 'Fa novalian’i Gidehôna hoe:'
  - type: text
    content: –Azafady, tompoko! Raha momba anay ny TOMPO, nahoana no iharan’izao loza rehetra izao izahay? Aiza avokoa ireo zava-mahagaga notantarain’ny razanay fa nataon’ny TOMPO fony Izy namoaka azy ireny avy tany Ejipta? Fa ankehitriny efa nanary anay ny TOMPO, ka nanolotra anay eo an-tanan’ny Midianita.
  '14':
  - type: text
    content: 'Dia nitodika nijery azy ny TOMPO ka niteny taminy hoe:'
  - type: text
    content: –Mandehàna amin’izao herinao izao, ka afaho teo am-pelatanan’ny Midianita ny Israelita, fa Izaho no naniraka anao.
  '15':
  - type: text
    content: 'Dia novalian’i Gidehôna hoe:'
  - type: text
    content: –Indrisy, Tompo ô, ahoana no ahazoako mamonjy an’i Israely? Kanefa ny fianakaviako no osa indrindra amin’ny fokon’i Manase ary izaho no tanora indrindra ao an-tranon’ny raiko.
  '16':
  - type: text
    content: 'Fa hoy kosa ny TOMPO taminy:'
  - type: text
    content: –Homba anao Aho, ka toy ny famelezana olona iray monja no hamelezanao ny Midianita.
  '17':
  - type: text
    content: 'Dia namaly Azy i Gidehôna hoe:'
  - type: text
    content: '–Raha sitrakao àry, dia mba omeo famantarana aho fa Ianao tokoa no miteny amiko. '
  '18':
  - type: text
    content: Aoka mba tsy hiala eto Ianao mandra-piveriko mitondra fanatitra izay tiako hatolotra eto anatrehanao.
  - type: text
    content: 'Ka hoy ny TOMPO hoe:'
  - type: text
    content: –Hijanona eto Aho mandra-piverinao.
  '19':
  - type: text
    content: 'Dia nandeha i Gidehôna ka namboatra zanak’osy sy mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ' tamin’ny koba ankevitry ny telopolo kilao. Nataony tao anaty harona ny hena ary nataony tao anaty vilany ny ron-kena, dia nentiny teo ambanin’ny terebinta ka natolony ny Tompo. '
  '2':
  - type: text
    content: 'Ary nahery vaika tamin’ny Israelita loatra ny famelezan’ny Midianita; koa noho ny tahony azy dia nanamboatra lalan-kizo sy zohy fierena ary toerana sarotra anihina tany an-tendrombohitra ny Israelita. '
  '20':
  - type: text
    content: 'Ary hoy ilay anjelin’Andriamanitra taminy:'
  - type: text
    content: –Apetraho eo ambonin’ity harambato ity ny hena sy ny mofo tsy misy leviora ka tondrahy ron-kena.
  - type: text
    content: 'Dia nataon’i Gidehôna izany. '
  '21':
  - type: text
    content: 'Ary naninji-tanana ilay anjelin’ny TOMPO, ka nokasihiny tamin’ny tendron’ilay tehina teny an-tanany ny hena sy ny mofo tsy nisy leviora; dia nivoaka afo ny vatolampy ka nandevona ny hena sy ny mofo. Avy eo ilay anjelin’ny TOMPO dia nanjavona teo imasony. '
  '22':
  - type: text
    content: 'Takatr’i Gidehôna tamin’izay fa anjelin’ny TOMPO ilay teo ka hoy izy hoe:'
  - type: text
    content: –Lozako, ry Tompo ANDRIANANAHARY ô, fa nahita ny anjelinao nifanatrika tamiko aho.
  '23':
  - type: text
    content: Hoy kosa ny TOMPO taminy;
  - type: text
    content: –Fiadanana anie ho aminao; aza matahotra, fa tsy ho faty ianao.
  '24':
  - type: text
    content: 'Ary nanorina alitara ho an’ny TOMPO teo i Gidehôna, ka io toerana io dia nantsoiny hoe «Ny TOMPO manome fiadanana»; ary mandraka androany izany '
  - type: text
    content: alitara
  - type: text
    content: ' izany dia mbola ao Hôfrà, tanànan’ny tarik’i Abihezera.'
  - type: heading
    content: Noravan’i Gidehôna ny alitaran’i Bahala
  '25':
  - type: text
    content: 'Tamin’io alina io ihany ny TOMPO dia nandidy an’i Gidehôna hoe:'
  - type: text
    content: '–Alao ny ombilahin-drainao, ilay faharoa efa fito taona. Ravao ny '
  - type: text
    content: alitaran
  - type: text
    content: '’i '
  - type: text
    content: Bahala
  - type: text
    content: ' izay an-drainao ary kapao ny tsatokazon-tsampy'
  - type: note
    content: 'Tsatokazon’i Aserà: mariky ny andriamani-bavy Aserà, jereo 3.7 sy nta.'
  - type: text
    content: ' eo anilany; '
  '26':
  - type: text
    content: 'dia manangàna alitara voamboatra tsara ho an’ny TOMPO Andriamanitrao eo an-tampon’io havoana io. Ary ento ny ombilahin-drainao ka atolory ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo eo; ka ny tsatokazon-tsampy nokapainao no ataovy kitay.'
  '27':
  - type: text
    content: 'Dia nifidy folo lahy tamin’ireo mpanompony i Gidehôna mba hanao araka izay efa nandidian’ny TOMPO azy. Saingy tamin’ny alina no nanatanterahany azy fa natahotra ny hanao azy tamin’ny antoandro izy noho ny amin’ny fianakaviany sy ny mponina tao an-tanàna. '
  '28':
  - type: text
    content: 'Ary nony nifoha ny olona ny maraina, dia nahita fa rava ny alitaran’i Bahala, voakapa ny tsatokazon’i Aserà teo anilany, ary nisy ombilahy iray natao sorona dorana manontolo teo ambonin’ilay alitara vao namboarina. '
  '29':
  - type: text
    content: 'Koa nifanontany ny olona hoe:'
  - type: text
    content: –Iza no nanao an’izao zavatra izao?
  - type: text
    content: 'Dia nikaroka sy nanao ampamoaka izy; ka nisy nilaza fa i Gidehôna, zanakalahin’i Jôasy, no nanao azy. '
  '3':
  - type: text
    content: Fa isaky ny avy nanao famafazam-boa ny sahany ny Israelita, dia tonga nanafika ny Midianita niaraka tamin’ny Hamalekita
  - type: note
    content: 'Hamalekita: jereo 3.13 sy nta.'
  - type: text
    content: ' sy ireo mpifindrafindra lasy avy any atsinanana. '
  '30':
  - type: text
    content: 'Ary hoy ny olona tao an-tanàna tamin’i Jôasy hoe:'
  - type: text
    content: –Avoahy atỳ ny zanakao lahy hovonoina ho faty, satria nandrava ny alitaran’i Bahala izy sady nikapa ny tsatokazon-tsampy teo anilany.
  '31':
  - type: text
    content: 'Fa namaly ireo rehetra nitsangan-kanohitra azy i Jôasy ka nanao hoe:'
  - type: text
    content: –Moa ianareo va no hiaro an’i Bahala sy tonga hamonjy azy? Na iza na iza hiaro an’i Bahala dia hovonoina ho faty, alohan’ny rahampitso maraina. Fa raha andriamanitra i Bahala, aoka izy hiaro tena satria ny alitarany no noravana!
  '32':
  - type: text
    content: 'Nanomboka hatreo i Gidehôna dia nantsoina hoe Jerobahala, izany hoe «Aoka hiaro tena i Bahala»; ny antony moa dia ny amin’ny tenin’i Jôasy hoe: «Aoka hiaro tena i Bahala satria ny alitarany no noravana!»'
  - type: heading
    content: Nangataka famantarana tamin’Andriamanitra i Gidehôna
  '33':
  - type: text
    content: Ny Midianita rehetra mbamin’ny Hamalekita ary ny mpifindrafindra lasy avy any atsinanana dia nivondrona ka niampita an’i Jôrdàna ary nanorina ny tobiny tao amin’ny lemak’i Jizrehela
  - type: note
    content: 'Ny Midianita rehetra mbamin’ny Hamalekita ary ny mpifindrafindra lasy avy any atsinanana: jereo 6.1-3 sy nta. –ny lemak’i Jizrehela: jereo Jos 19.18 sy nta.'
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Fa notsindrian’ny Fanahin’ny TOMPO i Gidehôna, dia nitsoka trompetra mba hiantso ny vatan-dehilahy tao amin’ny tarika abihezerita hanaraka azy. '
  '35':
  - type: text
    content: 'Nandefa iraka tany amin’ny faritany manasita manontolo koa izy mba hiantso ny vatan-dehilahy any hanaraka azy. Mbola nandefa iraka tany amin’ny foko aserita sy i zebolonita ary naftalita koa izy ka tonga nanaraka azy ny vatan-dehilahy tamin’ireny. '
  '36':
  - type: text
    content: 'Dia hoy i Gidehôna tamin’Andriamanitra:'
  - type: text
    content: '–Raha sitrakao tokoa ny hamonjy ny Israelita amin’ny alalan’ny tanako araka izay efa voalazanao, '
  '37':
  - type: text
    content: dia indro havelatro eo am-pamoloana ny volon’ondry; ka raha ny volon’ondry ihany no lenan’ny ando, fa ny tany manodidina azy kosa ho maina avokoa, dia ho fantatro fa ny tanako tokoa no hamonjenao an’i Israely, araka izay efa nambaranao.
  '38':
  - type: text
    content: 'Dia tanteraka tokoa araka izany; fa raha nifoha maraina i Gidehôna ny ampitso ka nofiazany ny volon’ondry, dia nisy ranon’ando tokony hahafeno kaopy iray. '
  '39':
  - type: text
    content: 'Ary hoy indray izy tamin’Andriamanitra:'
  - type: text
    content: '–Aoka mba tsy hirehi-pahatezerana amiko Ianao raha mbola angatahiko zavatra indray mandeha! Te hahazo porofo farany ny amin’ny volon’ondry aho: ka amin’ity indray mandeha ity dia aoka ny volon’ondry ihany no ho maina, fa ny tany manodidina azy kosa ho lenan’ny ando avokoa.'
  '4':
  - type: text
    content: Nitoby teo amin’ny sahan’ny Israelita ireny ka nanimba ny vokatry ny taniny hatrany Gazà
  - type: note
    content: 'Gazà: iray amin’ireo renivohitra filistinina dimy, ka izy no atsimo indrindra sady akaikin’ny ranomasina.'
  - type: text
    content: ', ary tsy nisy zavatra navelany hohanin’ny Israelita, tsy nisy navelany ho azy na ondry aman’osy na omby na boriky. '
  '40':
  - type: text
    content: Tamin’iny alina iny ihany dia notanterahin’Andriamanitra izany ka ny volon’ondry ihany no maina fa ny tany nanodidina azy kosa dia lenan’ny ando avokoa.
  '5':
  - type: text
    content: 'Nifindrafindra niaraka tamin’ny biby fiompiny sy ny lainy ireny sady toy ny valala no fiaviny; fa maro izy mbamin’ny ramevany ka tsy hita isa. Niditra tamin’ny tany izy mba handrava azy; '
  '6':
  - type: text
    content: ary nahantra loatra ny Israelita noho ny nafitsoky ny Midianita, ka niantso vonjy tamin’ny TOMPO.
  '7':
  - type: text
    content: 'Rehefa nitaraina tamin’ny TOMPO ny Israelita mba hanafaka azy amin’ny Midianita, '
  '8':
  - type: text
    content: 'dia nanirahany '
  - type: text
    content: mpaminany
  - type: text
    content: ' hiteny aminy hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely: «Izaho no nitondra anareo niala tany Ejipta sy namoaka anareo tao amin’ny toerana nanandevozana anareo. '
  '9':
  - type: text
    content: 'Izaho no nanafaka anareo teo am-pelatanan’ny Ejiptianina sy izay rehetra nampahory anareo. Noroahiko ny fahavalonareo arakaraky ny nandrosoanareo ka nomeko anareo ny taniny. '
