  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria hiboiboika any an-taniefitra ny rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisy ranon-driaka any amin’ny tany ngazana.
