document_id: ISA.35,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiverenan’ireo voababo ho any Tsiôna
  - type: text
    content: Aoka hiravoravo ny taniefitra
  - type: text
    content: sy ny tany karankaina!
  - type: text
    content: Aoka hifaly ny tany ngazana
  - type: text
    content: ka hamony voninkazo meva toy ny lisy.
  '10':
  - type: text
    content: Izany no lalana hiverenan’ireo navotan’ny TOMPO,
  - type: text
    content: 'ka hahatongavany ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' amin’ny fihobiana;'
  - type: text
    content: haravoana mandrakizay no ho eny amin’ny endriny,
  - type: text
    content: hafaliana sy haravoana no hanenika azy
  - type: text
    content: fa handositra kosa ny alahelo aman-tsento.
  '2':
  - type: text
    content: Aoka ho rakotra voninkazo izy
  - type: text
    content: ka hitotorebika sy handihy
  - type: text
    content: ary hihorakora-pifaliana!
  - type: text
    content: Satria nomen’ny TOMPO azy ny voninahitr’i Libano
  - type: text
    content: mbamin’ny famirapiratan’ny tendrombohitra Karmela
  - type: text
    content: sy ny famirapiratan’ny lemak’i Sarôna
  - type: note
    content: Jereo 33.9 sy nta.
  - type: text
    content: .
  - type: text
    content: Amin’izay no hahitana ny voninahitry ny TOMPO
  - type: text
    content: sy ny famirapiratan’ilay Andriamanitsika.
  '3':
  - type: text
    content: Ampaherezo ny tanana miraviravy
  - type: text
    content: ary hatanjaho ny lohalika malemy
  - type: note
    content: And tsiahivina ao amin’ny Heb 12.12.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Lazao amin’izay kivy hoe:'
  - type: text
    content: «Mahereza, aza matahotra;
  - type: text
    content: indro ny Andriamanitrareo
  - type: text
    content: tonga hitondra famaizana
  - type: text
    content: ka hanasazy ny fahavalonareo;
  - type: text
    content: Izy mihitsy no tonga hamonjy anareo.»
  '5':
  - type: text
    content: Dia hahiratra ny mason’ny jamba
  - type: text
    content: ary handre ny sofin’ny marenina.
  '6':
  - type: text
    content: Hitsambikina toy ny diera ny mandringa,
  - type: text
    content: hiteny an-kafaliana ny lelan’ny moana
  - type: note
    content: Ny and 5-6a dia tsiahivina ao amin’ny Mt 11.5; Lk 7.22.
  - type: text
    content: ','
  - type: text
    content: satria hiboiboika any an-taniefitra ny rano
  - type: text
    content: ary hisy ranon-driaka any amin’ny tany ngazana.
  '7':
  - type: text
    content: Ny tany karakaina hanjary farihy,
  - type: text
    content: ny tany mangentana hiboiboika loharano.
  - type: text
    content: Ary eo amin’ny toerana famitsahan’ny amboadia
  - type: text
    content: dia hanirian’ny volotara sy ny zozoro.
  '8':
  - type: text
    content: Any no hisy arabe voamboatra
  - type: text
    content: hantsoina hoe «lalana voatokana».
  - type: text
    content: 'Tsy hahazo handalo eo izay '
  - type: text
    content: maloto
  - type: text
    content: ary tsy hitonantonana eo ny mpanompo sampy;
  - type: text
    content: fa ny Tompo dia hisava izany lalana izany,
  - type: text
    content: ho an’ny vahoakany ihany.
  '9':
  - type: text
    content: Tsy hahitana liona io lalana io
  - type: text
    content: sady tsy hiakaran’ny biby masiaka;
  - type: text
    content: tsy hisy ho hita eo ireny
  - type: text
    content: fa izay nafahan’ny Tompo no handeha eo.
