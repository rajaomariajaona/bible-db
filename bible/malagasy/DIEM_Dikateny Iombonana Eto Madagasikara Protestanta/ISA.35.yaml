    - type: text
      text: '7'
  - type: text
    text: Ny tany karakaina hanjary farihy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tany mangentana hiboiboika loharano.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eo amin’ny toerana famitsahan’ny amboadia
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanirian’ny volotara sy ny zozoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Any no hisy arabe voamboatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hantsoina hoe «lalana voatokana».
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tsy hahazo handalo eo izay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hitonantonana eo ny mpanompo sampy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny Tompo dia hisava izany lalana izany,
- type: usfm
  marker: q1
  children:
