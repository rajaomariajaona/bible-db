- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanasazy ny fahavalonareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy mihitsy no tonga hamonjy anareo.»
- type: usfm
  marker: q1
  children:
