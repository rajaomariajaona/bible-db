document_id: 1SA.10,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia nandray tavoahangy kely feno diloilo i Samoela ka nandraraka izany teo an-dohan’i Saoly. Ary nanoroka an’i Saoly izy sady nanao hoe:'
  - type: text
    content: '–Ny TOMPO mihitsy no nanokana anao ho filohan’ilay vahoakany. '
  '10':
  - type: text
    content: 'Koa rehefa tonga tany Gibehà i Saoly sy ny mpanompony, dia indreo andiana mpaminany nifanena taminy; dia nilatsahan’ny Fanahin’Andriamanitra i Saoly, ary niara-naminany tamin’izy ireo. '
  '11':
  - type: text
    content: 'Ary izay rehetra efa nahalala azy hatramin’izay, raha nahita azy tsindrian-daona miaraka amin’ny mpaminany, dia nifampanontany hoe: «Fa inona no nanjò ity zanakalahin’i Kisy? Lasa mpaminany koa angaha i Saoly'
  - type: note
    content: Jereo 19.23-24.
  - type: text
    content: '?» '
  '12':
  - type: text
    content: 'Dia hoy koa ny iray tamin’izy ireo: «Fa mba iza no rain’ireto mpaminany hafa ireto'
  - type: note
    content: Tsy mazava avy hatrany ny hevitr’ilay fanontaniana. Mety milaza hagagàna eo am-pahitana fa toa tsy misy filoha izany andiana-mpaminany izany na mety fisokajiana ireo ho ambany laharana satria tsy fantatra izay mpitarika azy. Kanefa dia gaga ny olona mahita an’i Saoly eo anivon’ireo mpaminany ireo.
  - type: text
    content: '?» Izany no nahatonga ilay ohabolana hoe: «Mba tonga anisan’ny mpaminany koa ve i Saoly?»'
  '13':
  - type: text
    content: 'Rehefa tony tsy naminany intsony i Saoly, dia nankeo amin’ny toeram-panasinana. '
  '14':
  - type: text
    content: 'Ary hoy ny rahalahin-drainy taminy:'
  - type: text
    content: –Fa taiza ianao sy ny mpanomponao?
  - type: text
    content: 'Dia hoy ny navaliny hoe:'
  - type: text
    content: –Nitady ny borikivavy izahay, nefa tsy nahita, ka dia nankany amin’i Samoela.
  '15':
  - type: text
    content: 'Ary hoy ilay dadatoany hoe:'
  - type: text
    content: –Tantarao amiko àry izay nambaran’i Samoela anareo.
  '16':
  - type: text
    content: 'Ka hoy i Saoly taminy:'
  - type: text
    content: –Nambarany taminay fotsiny fa efa hita indray ireo borikivavy.
  - type: heading
    content: Voatendry ho mpanjaka tamin’ny antsapaka i Saoly
  '17':
  - type: text
    content: Nampiantso ny vahoaka israelita hankeo anatrehan’ny TOMPO any Mitsepà
  - type: note
    content: 'Mitsepà: jereo 7.5 sy nta.'
  - type: text
    content: ' i Samoela, '
  '18':
  - type: text
    content: 'ka nanao tamin’izy ireo hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely: «Izaho no nampiakatra anareo Israelita hiala avy tany Ejipta; Izaho no namonjy anareo tamin’ny vahoakan’ny Ejiptianina sy ny fanjakana rehetra izay namoritra anareo.» '
  '19':
  - type: text
    content: 'Fa ankehitriny kosa ianareo dia efa nandà ny Andriamanitrareo Izay namonjy anareo tamin’ny andro mahory sy fijaliana rehetra, ka hoy ianareo taminy: «Omeo mpanjaka izahay'
  - type: note
    content: 'ianareo dia efa nandà ny Andriamanitrareo: fampahatsiahivana ny 8.7.'
  - type: text
    content: '!» Noho izany, dia mankanesa ianareo eo anatrehan’ny TOMPO araka ny fokonareo sy fianakavianareo avy.'
  '2':
  - type: text
    content: Anio, rehefa tafasaraka isika, dia hihaona amin’ny lehilahy anankiroa ianao, eo akaikin’ny fasan’i Rahely ao Tselitsà
  - type: note
    content: 'Tselitsà: toerana tsy fantatra mazava ny misy azy.'
  - type: text
    content: ' amin’ny faritanin’i Benjamîna; ary izy ireo hiteny aminao hoe: «Efa hita ireo borikivavy izay notadiavinao; ary ankehitriny dia tsy ny borikiny intsony no mampanahy ny rainao, fa ianareo indray. Koa dia nanontany ny amin’izay tokony hataony hahitany an-janany izy.» '
  '20':
  - type: text
    content: 'Nasain’i Samoela nandroso tsirairay ny fokon’i Israely, ka ny fokon’i Benjamîna no voatendrin’ny antsapaka. '
  '21':
  - type: text
    content: 'Dia nampanatoniny isam-pianakaviana ny fokon’i Benjamîna, ka ny fianakavian’i Matrỳ no voatendrin’ny antsapaka. Ary farany, tamin’io fianakaviana io dia i Saoly zanakalahin’i Kisy no voatendrin’ny antsapaka. Rehefa izany, dia nitady azy ny olona nefa tsy nahita azy mihitsy. '
  '22':
  - type: text
    content: 'Dia nanontanian’ny olona indray ny TOMPO hoe:'
  - type: text
    content: –Mba efa tonga teto ve iny lehilahy iny?
  - type: text
    content: 'Ka novalian’ny TOMPO hoe:'
  - type: text
    content: –Eny, andeha jereo ao amin’ny entana fa ao izy no miafina.
  '23':
  - type: text
    content: Dia nilomay naka azy tao ny olona, ary niseho tamin’izay izy sady nitsangana teo afovoan’ny vahoaka, ka nanatombo halavana amin’ny olon-drehetra.
  '24':
  - type: text
    content: 'Ary hoy i Samoela tamin’ny vahoaka rehetra:'
  - type: text
    content: –Indro ilay nofidin’ny TOMPO; jereo fa tsy misy tahaka azy amin’ny vahoaka rehetra.
  - type: text
    content: 'Dia nihoby azy ny olon-drehetra, ka nihiaka mafy hoe: «Ho ela velona anie ny mpanjaka!» '
  '25':
  - type: text
    content: Ary nohazavain’i Samoela tamin’ny vahoaka ny zo aman’andraikitry ny mpanjaka
  - type: note
    content: Ampit Deot 17.14-20.
  - type: text
    content: ', ary nosoratany tamina boky izany ka napetrany teo anatrehan’ny TOMPO tao amin’ny Toeramasina. Farany dia nasain’i Samoela nody any an-tranony avy ny vahoaka rehetra. '
  '26':
  - type: text
    content: 'I Saoly koa mba nody tany aminy any Gibehà, niaraka tamin’ireo vatan-dehilahy izay nentanin’Andriamanitra ho mpomba azy. '
  '27':
  - type: text
    content: 'Fa nisy kosa ireo olona ratsy fanahy izay nanao hoe: «Ahoana tsara? Io ve no mba hamonjy antsika?» Notebahin’ireo i Saoly ary tsy nitondrany fanomezana. Nefa tsy noraharahain’i Saoly akory izany.'
  '3':
  - type: text
    content: Hanohy ny lalanao ianao ka ho tonga eo akaikin’ny hazo ôakan’i Tabôra, ary hahita lehilahy telo ho any amin’Andriamanitra any Betela
  - type: note
    content: 'Tabôra: toerana tsy fantatra mazava ny misy azy; (tsy ny tendrombohitra Tabôra no voalaza eto). –Betela: jereo 7.6 sy nta.'
  - type: text
    content: ': ny voalohany mitondra zanak’osy telo, ny faharoa mofo telo ary ny fahatelo '
  - type: text
    content: siny hoditra
  - type: text
    content: ' feno divay. '
  '4':
  - type: text
    content: 'Hiarahaba anao izy ireo ary hanome mofo roa izay horaisinao amim-panajana. '
  '5':
  - type: text
    content: Rehefa izany dia ho tonga ao Gibehà-Elôhima misy andia-miaramila filistinina ianao
  - type: note
    content: 'Gibehà-Elôhima (indraindray Gibehà fotsiny): tanàna tokony ho 6 km any avaratr’i Jerosalema.'
  - type: text
    content: '. Rehefa tonga ao an-tanàna ianao, dia hifanena amin’ny andiana mpaminany izay midina avy eny amin’ny Toeramasina, ka ialohavan’ny mpitendry lokanga sy valiha ny mpively amponga tapaka ary ny mpitsoka sodina. Efa tsindrian-daona haminany avokoa izy ireo. '
  '6':
  - type: text
    content: 'Hilatsaka aminao ny Fanahin’ny TOMPO, ka haminany miaraka amin’izy ireo ianao ary ho tonga olom-baovao. '
  '7':
  - type: text
    content: 'Rehefa tanteraka aminao ireo famantarana ireo, dia ho fantatrao fa Andriamanitra tokoa no momba anao koa ataovy izay fantatrao fa mety. '
  '8':
  - type: text
    content: Tsy maintsy midina mialoha ahy any Gilgàla
  - type: note
    content: 'Gilgàla: jereo 7.16 sy nta.'
  - type: text
    content: ' anefa ianao, ka ho tratrako tsy ho ela, any ny hanatrarako mba hanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorom-pihavanana. Fito andro no hiandrasanao ahy ao; ka rehefa tonga aho, dia hambarako anao izay tokony hataonao.'
  '9':
  - type: text
    content: 'Raha vao nihodina i Saoly ka dify an’i Samoela, dia novan’Andriamanitra fo, ary tanteraka taminy androtrizay ihany ireo zavatra rehetra voalazan’i Samoela. '
