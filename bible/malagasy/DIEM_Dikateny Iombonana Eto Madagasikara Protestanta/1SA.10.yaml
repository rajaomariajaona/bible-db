document_id: 1SA.10,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nandray tavoahangy kely feno diloilo i Samoela ka nandraraka izany teo an-dohan’i Saoly. Ary nanoroka an’i Saoly izy sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny TOMPO mihitsy no nanokana anao ho filohan’ilay vahoakany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Koa rehefa tonga tany Gibehà i Saoly sy ny mpanompony, dia indreo andiana mpaminany nifanena taminy; dia nilatsahan’ny Fanahin’Andriamanitra i Saoly, ary niara-naminany tamin’izy ireo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary izay rehetra efa nahalala azy hatramin’izay, raha nahita azy tsindrian-daona miaraka amin’ny mpaminany, dia nifampanontany hoe: «Fa inona no nanjò ity zanakalahin’i Kisy? Lasa mpaminany koa angaha i Saoly'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 19.23-24.
      marker-yv: yv-n
    - type: text
      text: '?» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy koa ny iray tamin’izy ireo: «Fa mba iza no rain’ireto mpaminany hafa ireto'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy mazava avy hatrany ny hevitr’ilay fanontaniana. Mety milaza hagagàna eo am-pahitana fa toa tsy misy filoha izany andiana-mpaminany izany na mety fisokajiana ireo ho ambany laharana satria tsy fantatra izay mpitarika azy. Kanefa dia gaga ny olona mahita an’i Saoly eo anivon’ireo mpaminany ireo.
      marker-yv: yv-n
    - type: text
      text: '?» Izany no nahatonga ilay ohabolana hoe: «Mba tonga anisan’ny mpaminany koa ve i Saoly?»'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Rehefa tony tsy naminany intsony i Saoly, dia nankeo amin’ny toeram-panasinana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hoy ny rahalahin-drainy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa taiza ianao sy ny mpanomponao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navaliny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nitady ny borikivavy izahay, nefa tsy nahita, ka dia nankany amin’i Samoela.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy ilay dadatoany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tantarao amiko àry izay nambaran’i Samoela anareo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ka hoy i Saoly taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nambarany taminay fotsiny fa efa hita indray ireo borikivavy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voatendry ho mpanjaka tamin’ny antsapaka i Saoly
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nampiantso ny vahoaka israelita hankeo anatrehan’ny TOMPO any Mitsepà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mitsepà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 7.5 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' i Samoela, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ka nanao tamin’izy ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely: «Izaho no nampiakatra anareo Israelita hiala avy tany Ejipta; Izaho no namonjy anareo tamin’ny vahoakan’ny Ejiptianina sy ny fanjakana rehetra izay namoritra anareo.» '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa ankehitriny kosa ianareo dia efa nandà ny Andriamanitrareo Izay namonjy anareo tamin’ny andro mahory sy fijaliana rehetra, ka hoy ianareo taminy: «Omeo mpanjaka izahay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ianareo dia efa nandà ny Andriamanitrareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fampahatsiahivana ny 8.7.
      marker-yv: yv-n
    - type: text
      text: '!» Noho izany, dia mankanesa ianareo eo anatrehan’ny TOMPO araka ny fokonareo sy fianakavianareo avy.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Anio, rehefa tafasaraka isika, dia hihaona amin’ny lehilahy anankiroa ianao, eo akaikin’ny fasan’i Rahely ao Tselitsà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tselitsà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana tsy fantatra mazava ny misy azy.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny faritanin’i Benjamîna; ary izy ireo hiteny aminao hoe: «Efa hita ireo borikivavy izay notadiavinao; ary ankehitriny dia tsy ny borikiny intsony no mampanahy ny rainao, fa ianareo indray. Koa dia nanontany ny amin’izay tokony hataony hahitany an-janany izy.» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nasain’i Samoela nandroso tsirairay ny fokon’i Israely, ka ny fokon’i Benjamîna no voatendrin’ny antsapaka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nampanatoniny isam-pianakaviana ny fokon’i Benjamîna, ka ny fianakavian’i Matrỳ no voatendrin’ny antsapaka. Ary farany, tamin’io fianakaviana io dia i Saoly zanakalahin’i Kisy no voatendrin’ny antsapaka. Rehefa izany, dia nitady azy ny olona nefa tsy nahita azy mihitsy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nanontanian’ny olona indray ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba efa tonga teto ve iny lehilahy iny?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, andeha jereo ao amin’ny entana fa ao izy no miafina.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Dia nilomay naka azy tao ny olona, ary niseho tamin’izay izy sady nitsangana teo afovoan’ny vahoaka, ka nanatombo halavana amin’ny olon-drehetra.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hoy i Samoela tamin’ny vahoaka rehetra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro ilay nofidin’ny TOMPO; jereo fa tsy misy tahaka azy amin’ny vahoaka rehetra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihoby azy ny olon-drehetra, ka nihiaka mafy hoe: «Ho ela velona anie ny mpanjaka!» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary nohazavain’i Samoela tamin’ny vahoaka ny zo aman’andraikitry ny mpanjaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Deot 17.14-20.
      marker-yv: yv-n
    - type: text
      text: ', ary nosoratany tamina boky izany ka napetrany teo anatrehan’ny TOMPO tao amin’ny Toeramasina. Farany dia nasain’i Samoela nody any an-tranony avy ny vahoaka rehetra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'I Saoly koa mba nody tany aminy any Gibehà, niaraka tamin’ireo vatan-dehilahy izay nentanin’Andriamanitra ho mpomba azy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa nisy kosa ireo olona ratsy fanahy izay nanao hoe: «Ahoana tsara? Io ve no mba hamonjy antsika?» Notebahin’ireo i Saoly ary tsy nitondrany fanomezana. Nefa tsy noraharahain’i Saoly akory izany.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Hanohy ny lalanao ianao ka ho tonga eo akaikin’ny hazo ôakan’i Tabôra, ary hahita lehilahy telo ho any amin’Andriamanitra any Betela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tabôra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana tsy fantatra mazava ny misy azy; (tsy ny tendrombohitra Tabôra no voalaza eto). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Betela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 7.6 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ': ny voalohany mitondra zanak’osy telo, ny faharoa mofo telo ary ny fahatelo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: siny hoditra
    - type: text
      text: ' feno divay. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hiarahaba anao izy ireo ary hanome mofo roa izay horaisinao amim-panajana. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Rehefa izany dia ho tonga ao Gibehà-Elôhima misy andia-miaramila filistinina ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gibehà-Elôhima '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(indraindray '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gibehà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' fotsiny): tanàna tokony ho 6 km any avaratr’i Jerosalema.'
      marker-yv: yv-n
    - type: text
      text: '. Rehefa tonga ao an-tanàna ianao, dia hifanena amin’ny andiana mpaminany izay midina avy eny amin’ny Toeramasina, ka ialohavan’ny mpitendry lokanga sy valiha ny mpively amponga tapaka ary ny mpitsoka sodina. Efa tsindrian-daona haminany avokoa izy ireo. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hilatsaka aminao ny Fanahin’ny TOMPO, ka haminany miaraka amin’izy ireo ianao ary ho tonga olom-baovao. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rehefa tanteraka aminao ireo famantarana ireo, dia ho fantatrao fa Andriamanitra tokoa no momba anao koa ataovy izay fantatrao fa mety. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tsy maintsy midina mialoha ahy any Gilgàla
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gilgàla: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 7.16 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' anefa ianao, ka ho tratrako tsy ho ela, any ny hanatrarako mba hanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy sorom-pihavanana. Fito andro no hiandrasanao ahy ao; ka rehefa tonga aho, dia hambarako anao izay tokony hataonao.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Raha vao nihodina i Saoly ka dify an’i Samoela, dia novan’Andriamanitra fo, ary tanteraka taminy androtrizay ihany ireo zavatra rehetra voalazan’i Samoela. '
