document_id: ISA.66,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpivavaka sandoka sy ny tena mpivavaka
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Ny lanitra no sezafiandrianako
  - type: note
    content: 'ny lanitra no sezafiandrianako: jereo Mt 5.34; 23.22. –fitoeran-tongotro: ampit Sal 99.5 sy nta; Mt 5.35.'
  - type: text
    content: ary ny tany no fitoeran-tongotro.
  - type: text
    content: Koa trano toa inona moa no hataonareo ho Ahy?
  - type: text
    content: Ary toerana toa inona no hialako sasatra?
  '10':
  - type: text
    content: Ianareo rehetra izay tia an’i Jerosalema,
  - type: text
    content: miaraha mifaly aminy, eny, miravoravoa.
  - type: text
    content: Ianareo rehetra izay nisaona
  - type: text
    content: noho ny loza nanjo azy,
  - type: text
    content: aoka hiara-paly aminy tokoa!
  '11':
  - type: text
    content: Dia ho vokin’ny fampiononana omeny ianareo
  - type: text
    content: ary ho finaritra migoka ny zava-tsoa atosany,
  - type: text
    content: tahaka ny zaza minono voatambitambin-dreniny.
  '12':
  - type: text
    content: 'Fa izao tokoa no lazain’ny TOMPO:'
  - type: text
    content: «Indro hotarihiko hankao Jerosalema
  - type: text
    content: ny fiadanana ka hihanaka toy ny ony;
  - type: text
    content: ny haren’ny firenen-kafa hotarihiko hankao
  - type: text
    content: ka ho tondraka toy ny renirano.
  - type: text
    content: Hikarakara fatratra anareo Aho
  - type: text
    content: toy ny ataon-dreny mampinono ny zanany
  - type: text
    content: ka mitondra azy eo an-trotroany
  - type: text
    content: sy mandrotsirotsy azy eo am-pofoany.
  '13':
  - type: text
    content: Eny, ho toy ny reny mampionona ny zanany
  - type: text
    content: no hampiononako anareo koa;
  - type: text
    content: ary ao Jerosalema no hampiononako anareo!
  '14':
  - type: text
    content: Dia ho tsapanareo amin’izany
  - type: text
    content: fa ho dibo-kafaliana ny fonareo,
  - type: text
    content: ary ny taolanareo efa maina hahazo hery indray
  - type: text
    content: tahaka ny ahitra mirobona.»
  - type: text
    content: Hataon’ny TOMPO fantatr’ireo mpanompo Azy ny fahefàny;
  - type: text
    content: fa ho tezitra kosa amin’ny fahavalony Izy.
  '15':
  - type: text
    content: Satria indro ny TOMPO fa tamy ao anaty afo,
  - type: text
    content: miriotra toy ny rambon-danitra ny kalesiny.
  - type: text
    content: Misafoaka erỳ Izy mampihatra ny fahatezerany
  - type: text
    content: sy ny fandrahonany amin’ny lelafo miredareda.
  '16':
  - type: text
    content: Fa amin’ny alalan’ny afo sy ny sabatra
  - type: text
    content: no hitsaran’ny TOMPO ny olombelona rehetra;
  - type: text
    content: ka maro no haringan’ny TOMPO,
  '17':
  - type: text
    content: 'dia ireo mihambo '
  - type: text
    content: hidio
  - type: text
    content: ' manokana'
  - type: text
    content: mba ho afa-miditra ao an-tanimboly
  - type: text
    content: sy hipetraka aorian’ilay eo afovoany
  - type: note
    content: Tsy fantatra tsara ireo fombafomban’ny mpanompo sampy ireo; ary ity hoe ilay eo afovoany ity dia tsy fantatra mazava na tsatokazon’i Aserà na vehivavy mpisorona eo amin’ny fanompoan-tsampy.
  - type: text
    content: ','
  - type: text
    content: na koa ireo mihinana henakisoa
  - type: text
    content: sy voalavo mbamin’ny zava-maharikoriko.
  - type: text
    content: Ho indray levona avokoa ny fanao amam-pisainan’ireny.
  - type: text
    content: Izany no teny hentitry ny TOMPO.
  - type: heading
    content: Famoriana goavana amin’ny andro farany
  '18':
  - type: text
    content: 'Hoy koa ny TOMPO hoe: «Tonga Aho hanangona ny firenen-kafa rehetra sy ny samihafa fiteny rehetra, ka ho avy ireny mba hahita ny voninahitro. '
  '19':
  - type: text
    content: Hapetrako eo anivony ny mariky ny fahefàko. Ary ireo sisa velona tamin’ny fitsarako dia hirahiko ho any amin’ny vahoakan’i Tarsisy sy i Pola ary i Loda izay olona kinga amin’ny fandefasana zana-tsipîka, na hirahiko ho any Tobala sy i Javàna
  - type: note
    content: 'Tarsisy: toa ny faritra atsimo andrefana amin’i Espaina izany. –Pola (na Poto): faritra afrikanina teo amoron’ny Ranomasina Mena sady teny akaikikaikin’i Etiôpia teny, angamba i Eritrea; misy kosa manao hoe i Libia io. –Loda: faritra akaikin’i Ejipta tany ho any. –Tobala: faritra tao Azia Minôra, angamba teo amoron’ny Ranomasina Mainty. –Javàna: i Gresy sy ireo nosy manodidina azy.'
  - type: text
    content: ' ary any amin’ireo nosy lavitra izay tsy mbola nandre ny lazako sady tsy mbola nahita ny voninahitro. Dia hotorîn’ireo irako any amin’ny hafa firenena ny voninahitro. '
  '2':
  - type: text
    content: Fa izao rehetra izao dia nataon’ny tanako,
  - type: text
    content: ka dia Ahy avokoa izao rehetra izao
  - type: note
    content: Ny and 1-2 dia tsiahivina ao amin’ny Asa 7.49-50.
  - type: text
    content: ;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.
  - type: text
    content: Kanefa ny olona tsinjoviko
  - type: text
    content: dia ny mahantra sy ny torotoro fanahy
  - type: text
    content: ary ny mandray ny teniko amin-kovitra.
  '20':
  - type: text
    content: Ary hitondra ireo rehetra mpiray firenena aminareo avy amin’ny firenen-drehetra kosa ireto hafa firenena ireto. Mitaingin-tsoavaly ny mpiray firenena aminareo, entina an-kalesy na am-pilanjana, mitaingina boriky na rameva hatrany an-tendrombohitro masina
  - type: note
    content: tendrombohitro masina jereo 56.7 sy nta.
  - type: text
    content: ' any Jerosalema. Izany no ho fanatitr’ireo hafa firenena ho Ahy TOMPO, ka horaisiko tahaka ny fanatitra entin’ireo Israelita ao anaty lovia '
  - type: text
    content: madio
  - type: text
    content: ' hankao an-tranoko. '
  '21':
  - type: text
    content: 'Ary amin’ireo hafa firenena ireo koa, hoy AHO, dia hisy hofidiko ho '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy '
  - type: text
    content: levita
  - type: text
    content: .»
  '22':
  - type: text
    content: 'Dia hoy ny teny hentitry ny TOMPO hoe: «Ny taranakareo sy ny lazanareo dia haharitra eo anatrehako, tahaka ny haharetan’ny habakabaka vaovao sy tany vaovao'
  - type: note
    content: 'habakabaka vaovao, tany vaovao: jereo 65.17 sy nta.'
  - type: text
    content: ' izay hataoko.'
  '23':
  - type: text
    content: Amin’izay, hoy AHO isaky ny tonga
  - type: text
    content: 'ny tsinam-bolana sy ny '
  - type: text
    content: sabata
  - type: text
    content: ','
  - type: text
    content: dia ho avy hiankohoka eo anatrehako
  - type: text
    content: ny olombelona rehetra.
  '24':
  - type: text
    content: Ary raha sendra misy mivoaka ny tanàna,
  - type: text
    content: dia hahita ny fatin’ny olona izay nikomy tamiko;
  - type: text
    content: fa ny kankana mihinana azy tsy ho faty,
  - type: text
    content: ary ny afo mandoro azy tsy ho levona
  - type: note
    content: Ampit Mk 9.48.
  - type: text
    content: ','
  - type: text
    content: ka hahatsiravina ny olona rehetra ireo.»
  '3':
  - type: text
    content: Ao ny manao sorona mamono omby,
  - type: text
    content: kanefa mamono olona koa;
  - type: text
    content: ao ny mamono zanak’ondry,
  - type: text
    content: kanefa mamono alika koa;
  - type: text
    content: ao ny manao fanatitra lafarinina,
  - type: text
    content: kanefa manolotra ran-kisoa koa;
  - type: text
    content: 'ao ny mandoro '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' ho Ahy,'
  - type: text
    content: kanefa manaja sampy koa
  - type: note
    content: Sady manolotra sorona amam-panatitra ara-dalàna amin’Andriamanitra ireo olona ireo (jereo ohatra Lev 1–2) no manao koa zavatra voarara (jereo ohatra Lev 11.7-8; 20.1-5).
  - type: text
    content: .
  - type: text
    content: Noho ireo nifidy izany lalana izany
  - type: text
    content: sady finaritra amin’ny zava-maharikoriko,
  '4':
  - type: text
    content: dia ho tahaka izany koa no hifidianako
  - type: text
    content: ny fampahoriana hampiharina aminy
  - type: text
    content: sy handatsahako ny loza mahatahotra azy.
  - type: text
    content: Satria niantso azy Aho fa tsy nisy namaly izy,
  - type: text
    content: ary niteny taminy Aho fa tsy nohenoiny akory.
  - type: text
    content: Izay ratsy eo imasoko ihany no nataony
  - type: text
    content: ary izay tsy sitrako no nofidiny.»
  - type: heading
    content: Firotsahan’ny Tompo an-tsehatra farany
  '5':
  - type: text
    content: Mihainoa ny tenin’ny TOMPO ianareo
  - type: text
    content: 'izay mandray ny teniny amin-kovitra:'
  - type: text
    content: «Misy mankahala anareo ny mpiray firenena aminareo
  - type: text
    content: ka manilika anareo noho ny fanajanareo Ahy,
  - type: text
    content: 'sady loa-bolana maneso anareo hoe:'
  - type: text
    content: ‹Aoka ny TOMPO hampiseho ny voninahiny,
  - type: text
    content: dia hahita anareo mandresy izahay!›
  - type: text
    content: Kanjo ireny kosa no ho menatra.»
  '6':
  - type: text
    content: Injany misy feo avy any an-tanàna,
  - type: text
    content: 'misy feo avy ao amin’ny tempoly:'
  - type: text
    content: dia feon’ny Tompo Izay mamaly
  - type: text
    content: ny nataon’ny fahavalony.
  '7':
  - type: text
    content: Mbola tsy nihetsi-jaza akory, dia niteraka;
  - type: text
    content: ary mbola tsy nanaintaina akory, dia velon-jaza!
  '8':
  - type: text
    content: Iza no efa nandre sy nahita zavatra toy izany?
  - type: text
    content: Tany anankiray ve hateraka indray andro monja?
  - type: text
    content: ary firenena iray ve ho azo atao indray miteraka?
  - type: text
    content: 'Kanefa izany no niseho tamin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ':'
  - type: text
    content: vao nihetsi-jaza izy, dia teraka ireo zanany.
  '9':
  - type: text
    content: 'Ka hoy ny TOMPO Andriamanitrao hoe:'
  - type: text
    content: «Raha Izaho no nikarakara ny vehivavy iray
  - type: text
    content: nandritra ny fitondràny vohòka,
  - type: text
    content: dia tsy Izaho no hisakana ny hahaterahany.
  - type: text
    content: Raha Izaho no nanomana ny fahaterahana,
  - type: text
    content: dia tsy Izaho no hanao izay tsy hiterahany.»
