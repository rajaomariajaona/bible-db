document_id: PRO.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahendrena sy ny fanajana ny Tompo
  - type: text
    content: Anaka, aza manadino ny fampianarako;
  - type: text
    content: ary aoka ho voatandron’ny fonao ny didiko.
  '10':
  - type: text
    content: Dia ho feno vary mitafotafo ny sompitrao;
  - type: text
    content: ary hihoatra ny barika fanantazanao azy ny divay.
  '11':
  - type: text
    content: Anaka, aza hamavoinao ny famaizan’ny TOMPO
  - type: text
    content: ary aza tofoka amin’ny fananarany.
  '12':
  - type: text
    content: Fa izay tian’ny TOMPO no anariny
  - type: text
    content: toy ny ataon-dray amin’ny zanany malala
  - type: note
    content: Jereo Jôb 5.17; 1Kôr 11.32; Heb 12.5-6.
  - type: text
    content: .
  - type: heading
    content: Fahendrena sy fahasambarana
  '13':
  - type: text
    content: Sambatra izay olona nahita ny fahendrena
  - type: text
    content: sy izay olona nahazo ny fahaiza-manavaka.
  '14':
  - type: text
    content: Fa ny fananana azy dia tsara noho ny fananana volafotsy
  - type: text
    content: ary ny tombontsoany dia mihoatra noho ny volamena.
  '15':
  - type: text
    content: Sarobidy noho ny voahangy ny fahendrena;
  - type: text
    content: ary izay rehetra azo irina dia tsy misy mitovy aminy
  - type: note
    content: Jereo 2.4 sy nta.
  - type: text
    content: .
  '16':
  - type: text
    content: Mahaela velona ny fahendrena etsy an-kilany
  - type: text
    content: ary mampahazo harena sy haja etsy an-daniny.
  '17':
  - type: text
    content: Lalana mahafinaritra ny lalany;
  - type: text
    content: ary antoky ny fiadanana ny sakeli-dalany rehetra.
  '18':
  - type: text
    content: Hazon’aina sy fahasambarana ny fahendrena
  - type: text
    content: ho an’izay mitana azy sy mifikitra aminy
  - type: note
    content: Jereo 4.10; 9.11; 13.14; Kôh 7.12.
  - type: text
    content: .
  '19':
  - type: text
    content: Fahendrena sy fahaiza-manavaka
  - type: text
    content: no nanorenan’ny TOMPO ny tany
  - type: text
    content: sady nahariany ny lanitra.
  '2':
  - type: text
    content: Fa andro lava sy taona maro iainana
  - type: text
    content: ka hiadam-pinaritra hatrany
  - type: text
    content: 'no ho vokatr’ireny ho an’ny tenanao:'
  '20':
  - type: text
    content: Ny fahaizany no nampiboiboika rano
  - type: text
    content: avy any an-kibon-tany lalina any
  - type: text
    content: sy mampitosaka orana avy amin’ny rahona
  - type: note
    content: Jereo Gen 1.7.
  - type: text
    content: .
  - type: heading
    content: Miaro ny hendry ny Tompo
  '21':
  - type: text
    content: Anaka, ny fahamalinana sy ny fahaiza-mandinika
  - type: text
    content: no ifikiro ka imasoy hatrany.
  '22':
  - type: text
    content: Fa ho antoky ny fiainana ho anao izany
  - type: text
    content: sady sarobidy toa firavaka fiambozonanao.
  '23':
  - type: text
    content: Handroso amim-pahatokiana ianao
  - type: text
    content: ka tsy hosolafa-mamindra.
  '24':
  - type: text
    content: Tsy hatahotra ianao rehefa miala sasatra,
  - type: text
    content: ary ho tafandry mandry rehefa matory.
  '25':
  - type: text
    content: Aza manahy ny fampitahoran’ireo adala
  - type: text
    content: na ny famelezan’ny olon-dratsy, raha tonga izany.
  '26':
  - type: text
    content: Fa ny TOMPO no ho tokinao
  - type: text
    content: ka hiaro ny tongotrao tsy ho voafandrika.
  - type: heading
    content: Ny fitiavana ny namana
  '27':
  - type: text
    content: Aza misalasala manao soa
  - type: text
    content: amin’izay mila izany
  - type: text
    content: raha azonao atao ihany.
  '28':
  - type: text
    content: 'Aza manao amin’ny namanao hoe:'
  - type: text
    content: «Miverena fa rahampitso aho manome»,
  - type: text
    content: raha manan-komena azy izao ianao.
  '29':
  - type: text
    content: Aza mikendry hanisy ratsy namana
  - type: text
    content: izay mitoetra amin-toky eo anilanao.
  '3':
  - type: text
    content: Aoka tsy hialanao mihitsy ny fitiavana sy ny toetra mahatoky;
  - type: text
    content: kajio toa firavaka fiambozonanao izany,
  - type: text
    content: ary soraty ao am-ponao toy ny amin’ny vatofisaka.
  '30':
  - type: text
    content: Aza miady tsy amin’antony amin’olona,
  - type: text
    content: raha tsy mbola nanisy ratsy anao izy.
  '31':
  - type: text
    content: Aza mialona ny mpanao an-keriny
  - type: text
    content: ary aza misy alain-tahaka ny ataony,
  '32':
  - type: text
    content: satria halan’ny TOMPO ny mpaniasia
  - type: text
    content: fa ny olo-marina kosa isakaizany fatratra.
  '33':
  - type: text
    content: Ozonin’ny TOMPO ny tranon’ny olon-dratsy
  - type: text
    content: 'fa ny fonenan’ny olo-marina kosa '
  - type: text
    content: tahîny
  - type: text
    content: .
  '34':
  - type: text
    content: Maniratsira izay mpaniratsira Azy Izy
  - type: text
    content: nefa kosa manome fahasoavana ny manetry tena
  - type: note
    content: Ity and ity dia tsiahivina ao amin’ny Jak 4.6 sy 1Pt 5.5, saingy araka ny dkt tranainy grika.
  - type: text
    content: .
  '35':
  - type: text
    content: Haja no anjaran’ny hendry
  - type: text
    content: fa henatra kosa ny an’ireo adala.
  '4':
  - type: text
    content: Fa hahita sitraka sy fahombiazana ianao
  - type: text
    content: eo imason’Andriamanitra sy ny olona.
  '5':
  - type: text
    content: Matokia ny TOMPO amin’ny fonao manontolo,
  - type: text
    content: fa aza miantehitra amin’ny fahakingan-tsainao.
  '6':
  - type: text
    content: Mieke Azy amin’izay rehetra alehanao,
  - type: text
    content: dia hatorony anao ny soritra harahinao.
  '7':
  - type: text
    content: Aza manao ny tenanao ho hendry,
  - type: text
    content: fa hajao ny TOMPO ka ialao ny ratsy
  - type: note
    content: Jereo Rm 12.16.
  - type: text
    content: .
  '8':
  - type: text
    content: Hanasitranana ny tenanao izany
  - type: text
    content: ary hamelombelomana ny taolanao.
  '9':
  - type: text
    content: Anomezo voninahitra ny TOMPO ireo fanananao
  - type: text
    content: sy izay voaloham-bokatrao rehetra.
