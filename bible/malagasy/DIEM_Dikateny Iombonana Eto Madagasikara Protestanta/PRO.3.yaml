document_id: PRO.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahendrena sy ny fanajana ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Anaka, aza manadino ny fampianarako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho voatandron’ny fonao ny didiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa andro lava sy taona maro iainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiadam-pinaritra hatrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no ho vokatr’ireny ho an’ny tenanao:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aoka tsy hialanao mihitsy ny fitiavana sy ny toetra mahatoky;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kajio toa firavaka fiambozonanao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary soraty ao am-ponao toy ny amin’ny vatofisaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa hahita sitraka sy fahombiazana ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo imason’Andriamanitra sy ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Matokia ny TOMPO amin’ny fonao manontolo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aza miantehitra amin’ny fahakingan-tsainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mieke Azy amin’izay rehetra alehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hatorony anao ny soritra harahinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aza manao ny tenanao ho hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hajao ny TOMPO ka ialao ny ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Rm 12.16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hanasitranana ny tenanao izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamelombelomana ny taolanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Anomezo voninahitra ny TOMPO ireo fanananao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay voaloham-bokatrao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia ho feno vary mitafotafo ny sompitrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihoatra ny barika fanantazanao azy ny divay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Anaka, aza hamavoinao ny famaizan’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza tofoka amin’ny fananarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa izay tian’ny TOMPO no anariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny ataon-dray amin’ny zanany malala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jôb 5.17; 1Kôr 11.32; Heb 12.5-6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahendrena sy fahasambarana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sambatra izay olona nahita ny fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay olona nahazo ny fahaiza-manavaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ny fananana azy dia tsara noho ny fananana volafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tombontsoany dia mihoatra noho ny volamena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sarobidy noho ny voahangy ny fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay rehetra azo irina dia tsy misy mitovy aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mahaela velona ny fahendrena etsy an-kilany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampahazo harena sy haja etsy an-daniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lalana mahafinaritra ny lalany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary antoky ny fiadanana ny sakeli-dalany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hazon’aina sy fahasambarana ny fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’izay mitana azy sy mifikitra aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 4.10; 9.11; 13.14; Kôh 7.12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fahendrena sy fahaiza-manavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanorenan’ny TOMPO ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nahariany ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny fahaizany no nampiboiboika rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any an-kibon-tany lalina any
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mampitosaka orana avy amin’ny rahona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 1.7.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miaro ny hendry ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Anaka, ny fahamalinana sy ny fahaiza-mandinika
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ifikiro ka imasoy hatrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ho antoky ny fiainana ho anao izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady sarobidy toa firavaka fiambozonanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Handroso amim-pahatokiana ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hosolafa-mamindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tsy hatahotra ianao rehefa miala sasatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho tafandry mandry rehefa matory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aza manahy ny fampitahoran’ireo adala
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny famelezan’ny olon-dratsy, raha tonga izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa ny TOMPO no ho tokinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiaro ny tongotrao tsy ho voafandrika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitiavana ny namana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Aza misalasala manao soa
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay mila izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha azonao atao ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aza manao amin’ny namanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Miverena fa rahampitso aho manome»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha manan-komena azy izao ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Aza mikendry hanisy ratsy namana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitoetra amin-toky eo anilanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Aza miady tsy amin’antony amin’olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy mbola nanisy ratsy anao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aza mialona ny mpanao an-keriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza misy alain-tahaka ny ataony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: satria halan’ny TOMPO ny mpaniasia
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olo-marina kosa isakaizany fatratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ozonin’ny TOMPO ny tranon’ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa ny fonenan’ny olo-marina kosa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tahîny
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Maniratsira izay mpaniratsira Azy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa kosa manome fahasoavana ny manetry tena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ity and ity dia tsiahivina ao amin’ny Jak 4.6 sy 1Pt 5.5, saingy araka ny dkt tranainy grika.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Haja no anjaran’ny hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa henatra kosa ny an’ireo adala.
