document_id: PRO.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahendrena sy ny fanajana ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, aza manadino ny fampianarako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ho voatandron’ny fonao ny didiko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho feno vary mitafotafo ny sompitrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hihoatra ny barika fanantazanao azy ny divay.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, aza hamavoinao ny famaizan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza tofoka amin’ny fananarany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay tian’ny TOMPO no anariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny ataon-dray amin’ny zanany malala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jôb 5.17; 1Kôr 11.32; Heb 12.5-6.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahendrena sy fahasambarana
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay olona nahita ny fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay olona nahazo ny fahaiza-manavaka.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fananana azy dia tsara noho ny fananana volafotsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tombontsoany dia mihoatra noho ny volamena.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sarobidy noho ny voahangy ny fahendrena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay rehetra azo irina dia tsy misy mitovy aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.4 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahaela velona ny fahendrena etsy an-kilany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampahazo harena sy haja etsy an-daniny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lalana mahafinaritra ny lalany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary antoky ny fiadanana ny sakeli-dalany rehetra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hazon’aina sy fahasambarana ny fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’izay mitana azy sy mifikitra aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 4.10; 9.11; 13.14; Kôh 7.12.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahendrena sy fahaiza-manavaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanorenan’ny TOMPO ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nahariany ny lanitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa andro lava sy taona maro iainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiadam-pinaritra hatrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no ho vokatr’ireny ho an’ny tenanao:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahaizany no nampiboiboika rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any an-kibon-tany lalina any
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mampitosaka orana avy amin’ny rahona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 1.7.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miaro ny hendry ny Tompo
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, ny fahamalinana sy ny fahaiza-mandinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ifikiro ka imasoy hatrany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho antoky ny fiainana ho anao izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady sarobidy toa firavaka fiambozonanao.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handroso amim-pahatokiana ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hosolafa-mamindra.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hatahotra ianao rehefa miala sasatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tafandry mandry rehefa matory.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manahy ny fampitahoran’ireo adala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny famelezan’ny olon-dratsy, raha tonga izany.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny TOMPO no ho tokinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiaro ny tongotrao tsy ho voafandrika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitiavana ny namana
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza misalasala manao soa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay mila izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha azonao atao ihany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aza manao amin’ny namanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Miverena fa rahampitso aho manome»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha manan-komena azy izao ianao.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mikendry hanisy ratsy namana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitoetra amin-toky eo anilanao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hialanao mihitsy ny fitiavana sy ny toetra mahatoky;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kajio toa firavaka fiambozonanao izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary soraty ao am-ponao toy ny amin’ny vatofisaka.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza miady tsy amin’antony amin’olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy mbola nanisy ratsy anao izy.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mialona ny mpanao an-keriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza misy alain-tahaka ny ataony,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria halan’ny TOMPO ny mpaniasia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olo-marina kosa isakaizany fatratra.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ozonin’ny TOMPO ny tranon’ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa ny fonenan’ny olo-marina kosa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tahîny
    - type: text
      text: .
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maniratsira izay mpaniratsira Azy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa kosa manome fahasoavana ny manetry tena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ity and ity dia tsiahivina ao amin’ny Jak 4.6 sy 1Pt 5.5, saingy araka ny dkt tranainy grika.
      marker-yv: yv-n
    - type: text
      text: .
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haja no anjaran’ny hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa henatra kosa ny an’ireo adala.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hahita sitraka sy fahombiazana ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo imason’Andriamanitra sy ny olona.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matokia ny TOMPO amin’ny fonao manontolo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aza miantehitra amin’ny fahakingan-tsainao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieke Azy amin’izay rehetra alehanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hatorony anao ny soritra harahinao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manao ny tenanao ho hendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hajao ny TOMPO ka ialao ny ratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rm 12.16.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanasitranana ny tenanao izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamelombelomana ny taolanao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anomezo voninahitra ny TOMPO ireo fanananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay voaloham-bokatrao rehetra.
