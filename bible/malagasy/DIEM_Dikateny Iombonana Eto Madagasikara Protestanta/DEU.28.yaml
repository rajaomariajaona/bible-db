document_id: DEU.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny soa izay ho valin’ny fanarahana ny Tompo
  - type: text
    content: 'Raha ekenareo tokoa ny TOMPO Andriamanitrareo ka imasoanareo hotanterahina ny didiny rehetra izay ampitaiko aminareo anio, dia hasandrany ho ambonin’ny firenena rehetra amin’ny tany ianareo; '
  '10':
  - type: text
    content: 'dia hahita avokoa ny firenena fa ny anaran’ny TOMPO no antsoina aminareo, ka hatahotra anareo izy rehetra. '
  '11':
  - type: text
    content: 'Hataon’ny TOMPO manana amby ampy ny soa hafafiny aminareo, any amin’ny tany izay nianianany tamin’ny razambenareo homena anareo: ho maro anaka ianareo, ho maro taranaka ny biby fiompinareo ary hiavosa ny vokatry ny taninareo. '
  '12':
  - type: text
    content: 'Hovohan’ny TOMPO ho anareo ny lanitra izay itahirizany rano sarobidy, mba handatsahany orana ny taninareo amin’ny fotoanandrony ary hitahiany ny asa rehetra ataonareo. Ianareo tsy mba hisambotra vola mihitsy, fa firenena maro kosa no hampisamborinareo. '
  '13':
  - type: text
    content: 'Hataon’ny TOMPO ho lohalaharana ianareo fa tsy ho farany, ary hiroso ho ambony hatrany fa tsy ho ambany, satria ekenareo sady imasoanareo harahina ny didin’ny TOMPO Andriamanitrareo, didy izay ampitaiko aminareo anio; '
  '14':
  - type: text
    content: eny, ny didy rehetra izay ampitaiko aminareo anio dia aza ialana mihitsy mba hanarahana sy hanompoana andriamani-kafa
  - type: note
    content: 'And 1-14: jereo 11.13-17.'
  - type: text
    content: .
  - type: heading
    content: Ny loza izay ho valin’ny tsy fanarahana ny Tompo
  '15':
  - type: text
    content: 'Raha tsy ekenareo kosa ny TOMPO Andriamanitrareo ka tsy imasoanareo hotanterahina ny didy aman-dalànany rehetra izay ampitaiko aminareo anio, dia ho tonga sy hianjady aminareo ireto ozona rehetra ireto:'
  '16':
  - type: text
    content: 'Ho voaozona ianareo na ny ao an-tanàn-dehibe na ny any ambanivohitra. '
  '17':
  - type: text
    content: 'Tsy hisy voankazo ny haronareo ary tsy hisy lafarinina ny vata fitahirizan-tsakafonareo. '
  '18':
  - type: text
    content: 'Tsy ho maro anaka ianareo; tsy hiavosa ny vokatry ny taninareo, ary tsy ho maro taranaka ny omby sy ondry aman’osinareo. '
  '19':
  - type: text
    content: Ho voaozona ianareo na miditra na mivoaka ny tranonareo.
  '2':
  - type: text
    content: 'eny, raha ekenareo ny TOMPO Andriamanitrareo, dia ho tonga aminareo sy ho azonareo ireto fitahiana isan-karazany ireto:'
  '20':
  - type: text
    content: 'Amin’izay rehetra ataonareo, dia ozona sy tahotra aman’ahiahy no halefan’ny TOMPO aminareo; ka ho ringana sy ho levona faingana ianareo satria ratsy tokoa ny nataonareo tamin’ny nandaozanareo Azy. '
  '21':
  - type: text
    content: 'Hataon’ny TOMPO azon’ny areti-mandringana ianareo ka ho lany ritra tsy ho eo amin’ny tany izay efa hidiranareo mba halainareo ho fananana. '
  '22':
  - type: text
    content: Areti-mahasaozanina sy tazo mahamay ary fanaintainana no hamelezan’ny TOMPO anareo; hasiany amin’ny andro mihantona
  - type: note
    content: 'Hasiany amin’ny haintany: araka ny dkt latinina tranainy (izay mifanaraka kokoa amin’ny konteksta). Araka ny rijan-teny hebreo kosa dia hoe hasiany amin’ny sabatra: kanefa ovana kely ny zana-tsoratra amin’ny voambolana hebreo midika hoe sabatra na ady, dia manjary midika hoe haintany.'
  - type: text
    content: 'sy vary main’ny rivotra na maty fotsy ianareo; dia hanjohy anareo ireny rehetra ireny ka ho lany ritra ianareo. '
  '23':
  - type: text
    content: 'Ho mafy toy ny varahina ny lanitra eo ambony lohanareo, ary ho mafy toy ny vy ny tany eo ambany tongotrareo. '
  '24':
  - type: text
    content: 'Toy izay ranonorana, dia vovoka sy fasika no halefan’ny TOMPO ho amin’ny taninareo; avy eny amin’ny habakabaka no hilatsahan’izany vovoka sy fasika izany aminareo, mandra-paharinganareo. '
  '25':
  - type: text
    content: 'Hatolotry ny TOMPO horesen’ny fahavalo ianareo; ka raha lalana iray no handrosoanareo hiady aminy, dia lalana fito kosa no handosiranareo hiala eo anoloany. Ho zava-mahatsiravina ny nihatra taminareo ho an’ny fanjakana rehetra ambonin’ny tany. '
  '26':
  - type: text
    content: Ary hihinana ny fatinareo ny voro-manidina rehetra sy ny bibidia, ka tsy hisy hanaitaitra azy.
  '27':
  - type: text
    content: Hamelezan’ny TOMPO anareo, tahaka ny hamelezany an’i Ejipta
  - type: note
    content: Jereo Eks 9.8-12.
  - type: text
    content: ', ny vay isan-karazany sy ny hatina ary ny hazaka tsy andairam-panafody; '
  '28':
  - type: text
    content: 'hamelezan’ny TOMPO anareo koa ny fahadalana sy ny fahajambana ary ny fahaverezan-tsaina. '
  '29':
  - type: text
    content: Dia hitsapatsapa ianareo na dia amin’ny mitataovovonana aza, tahaka ny jamba mitsapatsapa ao anaty haizim-pito; tsy hahomby amin’ny zavatra hirosoanareo ianareo; hampahorîn’ny sasany sy hobaboiny mandrakariva ianareo, fa tsy hisy hamonjy.
  '3':
  - type: text
    content: ' '
  - type: text
    content: Hotahîna
  - type: text
    content: ' ianareo na ny ao an-tanàn-dehibe na ny any ambanivohitra. '
  '30':
  - type: text
    content: 'Hisy vehivavy efa fofombadinareo fa lehilahy hafa no hahazo azy; hanao trano ianareo, fa tsy hitoetra ao; hamboly voaloboka ianareo, fa tsy handray ny vokany. '
  '31':
  - type: text
    content: 'Ny ombinareo hovonoina eo imasonareo, fa tsy hihinananareo; ny borikinareo halaina an-keriny eo anatrehanareo, fa tsy haverina aminareo; ny ondry aman’osinareo hafoy ho an’ny fahavalonareo, fa tsy hisy hamonjy anareo; '
  '32':
  - type: text
    content: 'ny zanakalahinareo sy zanakavavinareo hafoy ho an’ny firenena hafa ka ny masonareo hipitrapitra sy ho valalanina manontolo andro noho ny alahelo azy, fa tsy hahefa na inona na inona ny tananareo. '
  '33':
  - type: text
    content: 'Ny vokatry ny taninareo sy izay rehetra efa nisasaranareo dia hohanin’ny firenena izay tsy fantatrareo; ary hampahorîn’ny sasany sy homongomongoiny mandrakariva ianareo. '
  '34':
  - type: text
    content: Dia hanjary adala ianareo eo am-pijerena ny zavatra izay ho hitan’ny masonareo.
  '35':
  - type: text
    content: Hamelezan’ny TOMPO anareo ny vay ratsy, izay tsy andairam-panafody, dia vay ratsy hahavoa ny lohalikareo sy ny fenareo, ary hanenika ny tenanareo manontolo hatreo an-tampon-doha ka hatrany am-paladia.
  '36':
  - type: text
    content: Hoentin’ny TOMPO ianareo sy ny mpanjaka hatsanganareo ho filohanareo mba ho any amin’ny firenena izay tsy fantatrareo na ny razambenareo; ary any no hanompoanareo andriamani-kafa, dia vato aman-kazo voasokitra
  - type: note
    content: Jereo 4.27-28; 2 Mp 17.4-6; 25.11.
  - type: text
    content: '. '
  '37':
  - type: text
    content: Ho figagàn’ny olona sy ho ambentinteniny ary ho fihomehezany ianareo any amin’ny firenena rehetra izay hitondran’ny TOMPO anareo.
  '38':
  - type: text
    content: 'Voan-javatra betsaka no hoentinareo hafafy any an-tsaha, fa kely kosa no vokatra hangoninareo, satria ho lanin’ny valala ireny. '
  '39':
  - type: text
    content: 'Hamboly voaloboka ka hikolokolo azy ianareo, nefa tsy hisotro divay akory; tsy hioty voaloboka akory aza ianareo, satria hohanin’ny fositra ireny. '
  '4':
  - type: text
    content: 'Ho maro anaka ianareo, hiavosa ny vokatry ny taninareo ary ho maro taranaka ny biby fiompinareo, dia ny omby sy ondry aman’osinareo. '
  '40':
  - type: text
    content: 'Hanana fototr’ôliva manerana ny faritaninareo ianareo; nefa tsy hisy menaka hihosoranareo akory, satria hihintsana tsy mbola matoy ny ôlivanareo. '
  '41':
  - type: text
    content: 'Hiteraka zazalahy sy zazavavy ianareo; nefa tsy ho anareo ireny, satria ho lasan-ko babo. '
  '42':
  - type: text
    content: Ny hazonareo sy ny vokatry ny taninareo dia ho lanin’ny valala avokoa.
  '43':
  - type: text
    content: 'Ny vahiny eo aminareo no hisandratra ho ambony dia ambony noho ianareo, fa ianareo kosa ho ambany dia ambany. '
  '44':
  - type: text
    content: Ireo no hampisambo-bola anareo fa tsy ianareo intsony no hampisambotra azy. Ireo no ho lohalaharana fa ianareo ho farany.
  '45':
  - type: text
    content: 'Dia ho tonga aminareo ireo ozona rehetra ireo, fa hanjohy anareo sy hianjady aminareo mandra-paharinganareo, satria tsy nekenareo ny TOMPO Andriamanitrareo sady tsy notandremanareo ny didy aman-dalàna izay nampitainy taminareo. '
  '46':
  - type: text
    content: Ho famantarana sy fampitandremana hatrany hatrany ireny ho anareo sy ho an’ny taranakareo.
  '47':
  - type: text
    content: 'Noho ianareo tsy manompo amin-kafaliana sy risipo ilay TOMPO Andriamanitrareo, fony ianareo nanam-be tamin’ny zavatra rehetra, '
  '48':
  - type: text
    content: 'dia ho mpanompon’ny fahavalo halefan’ny TOMPO hamely anareo, ka hianjadian’ny hanoanana sy hetaheta ary hihafy amin’ny fitafiana sy ny zavatra isan-karazany. Hanisy '
  - type: text
    content: zioga
  - type: text
    content: ' vy eo an-tsorokareo ny Tompo, mandra-pandringany anareo. '
  '49':
  - type: text
    content: 'Firenena avy lavitra, firenena avy any am-paran’ny tany sady tsy fantatrareo ny fiteniny, izany no hoentin’ny TOMPO hiady aminareo; tahaka ny voromahery miantonta hipaoka remby no hiavian’izany firenena izany aminareo: '
  '5':
  - type: text
    content: 'Hotahîna ianareo ka ho feno voankazo ny haronareo ary ho feno lafarinina ny vata fitahirizan-tsakafonareo. '
  '50':
  - type: text
    content: 'dia firenena masiaka endrika, tsy hanaja ny antitra na hiantra ny tanora, '
  '51':
  - type: text
    content: 'hihinana ny vokatry ny fiompianareo sy ny vokatry ny taninareo, mandra-paharinganareo. Tsy havelany ho anareo na vary, na divay, na ny zanak’omby sy ondry aman’osinareo, mandra-pahafongony anareo. '
  '52':
  - type: text
    content: 'Hataony fahirano ianareo, any amin’ny tanàna rehetra misy anareo eran’ny taninareo, mandra-pandravany ny manda avo sy mafy izay itokianareo; eny, hataony fahirano ianareo, any amin’ny tanàna rehetra misy anareo, eran’ny tany izay omen’ny TOMPO Andriamanitrareo anareo. '
  '53':
  - type: text
    content: 'Mandritra izany fahirano izany, rehefa hanery mafy anareo ny fahavalonareo, dia ny zanakareo no hohaninareo; eny, ny nofon’ny zanakalahy sy zanakavavy izay omen’ny TOMPO Andriamanitrareo anareo no hataonareo sakafo. '
  '54':
  - type: text
    content: 'Ny lehilahy faran’izay miangentsana sy miaingitraingitra eo aminareo, dia ho ratsy fijery ny rahalahiny sy ny vady andefimandriny mbamin’ny zanany sisa; '
  '55':
  - type: text
    content: 'tsy misy homeny amin’ny mofon-janany izay hohaniny manko ireo havany akaiky ireo; sao manko tsy hisy sakafo tavela ho an’ny tenany intsony mandritra ny fahirano, rehefa hanery mafy anareo ny fahavalonareo any amin’ny tanàna rehetra misy anareo any. '
  '56':
  - type: text
    content: 'Ny vehivavy, faran’izay miangentsana sy miaingitraingitra eo aminareo, ka tsy mbola nanandrana nandia tany, dia ho ratsy fijery ny vady andefimandriny sy ny zanakalahiny ary ny zanakavaviny; '
  '57':
  - type: text
    content: eny, na hoe ny zazakely vao natera-dravehivavy sy ny tavony afaka taminy aza, dia hataony ratsy fijery; hohaniny mangingina manko ireny fa tsy manana na inona hatao sakafo izy mandritra izany fahirano izany, rehefa hanery mafy anareo ny fahavalonareo any amin’ny tanànareo any
  - type: note
    content: 'And 56-57: jereo 2 Mp 6.28-29; Fit 4.10.'
  - type: text
    content: .
  '58':
  - type: text
    content: 'Imasoy hotanterahina ny didy rehetra amin’ity Lalàna ity, dia ny didy rehetra voasoratra ato amin’ity boky ity; ary hajao ilay mitondra ny anarana be voninahitra sady mendri-kohajaina hoe «Ny TOMPO Andriamanitrareo». Raha tsy izany no tandrovinareo, '
  '59':
  - type: text
    content: 'dia fery mahatsiravina, eny fery sy aretina samy màzana sy maharitra ela, no hataon’ny TOMPO mianjady aminareo sy amin’ny taranakareo. '
  '6':
  - type: text
    content: Hotahîna ianareo na miditra na mivoaka ny tranonareo.
  '60':
  - type: text
    content: 'Hataony mifotitra aminareo ny aretina rehetra nihatra tamin’ny Ejiptianina, aretina izay natahoranareo kanefa dia hiraikitra aminareo. '
  '61':
  - type: text
    content: 'Na ny aretina sy fery isan-karazany tsy voasoratra amin’ity bokin’ny Lalàna ity aza, dia hoentin’ny TOMPO hamelezana anareo mandra-paharinganareo. '
  '62':
  - type: text
    content: 'Iny ianareo efa maro toy ny kintana eny amin’ny habakabaka iny, dia olona vitsy no ho sisa tavela aminareo, satria ianareo tsy nanaiky ny TOMPO Andriamanitrareo. '
  '63':
  - type: text
    content: 'Araka izay nifalian’ny TOMPO hahasoa sy hahamaro anareo no hifaliany handringana sy handrava anareo; ka hofongorana ianareo tsy ho eo amin’ny tany izay efa hidiranareo mba halainareo ho fananana. '
  '64':
  - type: text
    content: 'Dia haelin’ny TOMPO any amin’ny firenena rehetra hatrany amin’ny faran’ny tany ianareo; ary any no hanompoanareo andriamani-kafa vato aman-kazo voasokitra, andriamani-kafa izay tsy fantatry ny tenanareo na ny razambenareo akory. '
  '65':
  - type: text
    content: 'Any amin’ireo firenena ireo dia tsy hisy hilaminanareo ary tsy hisy toerana hahazoanareo miorim-ponenana; fa any kosa dia fo manahy sy maso jambena ary fanahy kivy no homen’ny TOMPO anareo. '
  '66':
  - type: text
    content: 'Ny ainareo hihevingevina eo anatrehanareo; dia hatahotra andro aman’alina ianareo ka tsy hanampo izay ho velona intsony. '
  '67':
  - type: text
    content: 'Maraina ianareo hanao hoe: «Malakia hariva!», hariva ianareo hanao hoe: «Malakia maraina!» noho ny tahotra hangeja ny fonareo ary noho ny zavatra ho hitan’ny masonareo. '
  '68':
  - type: text
    content: Dia hoentin’ny TOMPO hiverina an-tsambo any Ejipta ianareo ka hihazo ny lalana efa nolazaiko taminareo hoe tsy ho hitanareo intsony
  - type: note
    content: 'nolazaiko: dkt hafa azo aroso nolazainy.'
  - type: text
    content: ; any ianareo, na lahy na vavy, dia hivaro-tena ho mpanompon’ny fahavalonareo, nefa tsy hisy mpividy.
  - type: heading
    content: LAHATENY FARANY ATAON’I MOSESY
  '69':
  - type: text
    content: 'Ireto kosa no fepetra momba ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nodidian’ny TOMPO hataon’i Mosesy amin’ny Israelita tany Môaba. Izao fanekempihavanana izao dia ankoatra ilay natao tany amin’ny tendrombohitra '
  - type: text
    content: Hôreba
  - type: note
    content: 'Amin’ny dkt sasany, ny and 28.69 dia voalahatra ho 29.1. –tany Môaba: jereo 1.4-5. –fanekempihavanana natao tany amin’ny tendrombohitra Hôreba: jereo Eks 3.1 sy nta; 24.3-8.'
  - type: text
    content: .
  '7':
  - type: text
    content: 'Hatolotry ny TOMPO horesenareo ny fahavalo izay mitsangana hiady aminareo; ka raha lalana iray no handrosoany hiady aminareo, dia lalana fito kosa no handosirany hiala eo anoloanareo. '
  '8':
  - type: text
    content: Handidy ny fitahiany ho aminareo ny TOMPO Andriamanitrareo, ka hambenany ny sompitrareo ary hampanjariany avokoa izay rehetra ataon’ny tananareo; eny, hotahîny ianareo any amin’ny tany izay omeny anareo.
  '9':
  - type: text
    content: 'Raha tandremanareo ny didin’ny TOMPO Andriamanitrareo ka tanterahinareo ny sori-dàlany, dia hasandrany ho firenena voatokana ho Azy ianareo araka izay efa nianianany taminareo; '
