document_id: DEU.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny soa izay ho valin’ny fanarahana ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha ekenareo tokoa ny TOMPO Andriamanitrareo ka imasoanareo hotanterahina ny didiny rehetra izay ampitaiko aminareo anio, dia hasandrany ho ambonin’ny firenena rehetra amin’ny tany ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'eny, raha ekenareo ny TOMPO Andriamanitrareo, dia ho tonga aminareo sy ho azonareo ireto fitahiana isan-karazany ireto:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hotahîna
  - type: text
    text: ' ianareo na ny ao an-tanàn-dehibe na ny any ambanivohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ho maro anaka ianareo, hiavosa ny vokatry ny taninareo ary ho maro taranaka ny biby fiompinareo, dia ny omby sy ondry aman’osinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hotahîna ianareo ka ho feno voankazo ny haronareo ary ho feno lafarinina ny vata fitahirizan-tsakafonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hotahîna ianareo na miditra na mivoaka ny tranonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hatolotry ny TOMPO horesenareo ny fahavalo izay mitsangana hiady aminareo; ka raha lalana iray no handrosoany hiady aminareo, dia lalana fito kosa no handosirany hiala eo anoloanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Handidy ny fitahiany ho aminareo ny TOMPO Andriamanitrareo, ka hambenany ny sompitrareo ary hampanjariany avokoa izay rehetra ataon’ny tananareo; eny, hotahîny ianareo any amin’ny tany izay omeny anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha tandremanareo ny didin’ny TOMPO Andriamanitrareo ka tanterahinareo ny sori-dàlany, dia hasandrany ho firenena voatokana ho Azy ianareo araka izay efa nianianany taminareo; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia hahita avokoa ny firenena fa ny anaran’ny TOMPO no antsoina aminareo, ka hatahotra anareo izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hataon’ny TOMPO manana amby ampy ny soa hafafiny aminareo, any amin’ny tany izay nianianany tamin’ny razambenareo homena anareo: ho maro anaka ianareo, ho maro taranaka ny biby fiompinareo ary hiavosa ny vokatry ny taninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hovohan’ny TOMPO ho anareo ny lanitra izay itahirizany rano sarobidy, mba handatsahany orana ny taninareo amin’ny fotoanandrony ary hitahiany ny asa rehetra ataonareo. Ianareo tsy mba hisambotra vola mihitsy, fa firenena maro kosa no hampisamborinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hataon’ny TOMPO ho lohalaharana ianareo fa tsy ho farany, ary hiroso ho ambony hatrany fa tsy ho ambany, satria ekenareo sady imasoanareo harahina ny didin’ny TOMPO Andriamanitrareo, didy izay ampitaiko aminareo anio; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: eny, ny didy rehetra izay ampitaiko aminareo anio dia aza ialana mihitsy mba hanarahana sy hanompoana andriamani-kafa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.14 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 1-14:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 11.13-17.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loza izay ho valin’ny tsy fanarahana ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha tsy ekenareo kosa ny TOMPO Andriamanitrareo ka tsy imasoanareo hotanterahina ny didy aman-dalànany rehetra izay ampitaiko aminareo anio, dia ho tonga sy hianjady aminareo ireto ozona rehetra ireto:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ho voaozona ianareo na ny ao an-tanàn-dehibe na ny any ambanivohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy hisy voankazo ny haronareo ary tsy hisy lafarinina ny vata fitahirizan-tsakafonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy ho maro anaka ianareo; tsy hiavosa ny vokatry ny taninareo, ary tsy ho maro taranaka ny omby sy ondry aman’osinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ho voaozona ianareo na miditra na mivoaka ny tranonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Amin’izay rehetra ataonareo, dia ozona sy tahotra aman’ahiahy no halefan’ny TOMPO aminareo; ka ho ringana sy ho levona faingana ianareo satria ratsy tokoa ny nataonareo tamin’ny nandaozanareo Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hataon’ny TOMPO azon’ny areti-mandringana ianareo ka ho lany ritra tsy ho eo amin’ny tany izay efa hidiranareo mba halainareo ho fananana. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Areti-mahasaozanina sy tazo mahamay ary fanaintainana no hamelezan’ny TOMPO anareo; hasiany amin’ny andro mihantona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.22 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Hasiany amin’ny haintany:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt latinina tranainy (izay mifanaraka kokoa amin’ny konteksta). Araka ny rijan-teny hebreo kosa dia hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hasiany amin’ny sabatra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': kanefa ovana kely ny zana-tsoratra amin’ny voambolana hebreo midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sabatra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ady
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dia manjary midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: haintany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'sy vary main’ny rivotra na maty fotsy ianareo; dia hanjohy anareo ireny rehetra ireny ka ho lany ritra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ho mafy toy ny varahina ny lanitra eo ambony lohanareo, ary ho mafy toy ny vy ny tany eo ambany tongotrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Toy izay ranonorana, dia vovoka sy fasika no halefan’ny TOMPO ho amin’ny taninareo; avy eny amin’ny habakabaka no hilatsahan’izany vovoka sy fasika izany aminareo, mandra-paharinganareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hatolotry ny TOMPO horesen’ny fahavalo ianareo; ka raha lalana iray no handrosoanareo hiady aminy, dia lalana fito kosa no handosiranareo hiala eo anoloany. Ho zava-mahatsiravina ny nihatra taminareo ho an’ny fanjakana rehetra ambonin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary hihinana ny fatinareo ny voro-manidina rehetra sy ny bibidia, ka tsy hisy hanaitaitra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hamelezan’ny TOMPO anareo, tahaka ny hamelezany an’i Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 9.8-12.
    marker-yv: yv-n
  - type: text
    text: ', ny vay isan-karazany sy ny hatina ary ny hazaka tsy andairam-panafody; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'hamelezan’ny TOMPO anareo koa ny fahadalana sy ny fahajambana ary ny fahaverezan-tsaina. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia hitsapatsapa ianareo na dia amin’ny mitataovovonana aza, tahaka ny jamba mitsapatsapa ao anaty haizim-pito; tsy hahomby amin’ny zavatra hirosoanareo ianareo; hampahorîn’ny sasany sy hobaboiny mandrakariva ianareo, fa tsy hisy hamonjy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hisy vehivavy efa fofombadinareo fa lehilahy hafa no hahazo azy; hanao trano ianareo, fa tsy hitoetra ao; hamboly voaloboka ianareo, fa tsy handray ny vokany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny ombinareo hovonoina eo imasonareo, fa tsy hihinananareo; ny borikinareo halaina an-keriny eo anatrehanareo, fa tsy haverina aminareo; ny ondry aman’osinareo hafoy ho an’ny fahavalonareo, fa tsy hisy hamonjy anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ny zanakalahinareo sy zanakavavinareo hafoy ho an’ny firenena hafa ka ny masonareo hipitrapitra sy ho valalanina manontolo andro noho ny alahelo azy, fa tsy hahefa na inona na inona ny tananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny vokatry ny taninareo sy izay rehetra efa nisasaranareo dia hohanin’ny firenena izay tsy fantatrareo; ary hampahorîn’ny sasany sy homongomongoiny mandrakariva ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia hanjary adala ianareo eo am-pijerena ny zavatra izay ho hitan’ny masonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Hamelezan’ny TOMPO anareo ny vay ratsy, izay tsy andairam-panafody, dia vay ratsy hahavoa ny lohalikareo sy ny fenareo, ary hanenika ny tenanareo manontolo hatreo an-tampon-doha ka hatrany am-paladia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Hoentin’ny TOMPO ianareo sy ny mpanjaka hatsanganareo ho filohanareo mba ho any amin’ny firenena izay tsy fantatrareo na ny razambenareo; ary any no hanompoanareo andriamani-kafa, dia vato aman-kazo voasokitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 4.27-28; 2 Mp 17.4-6; 25.11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ho figagàn’ny olona sy ho ambentinteniny ary ho fihomehezany ianareo any amin’ny firenena rehetra izay hitondran’ny TOMPO anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Voan-javatra betsaka no hoentinareo hafafy any an-tsaha, fa kely kosa no vokatra hangoninareo, satria ho lanin’ny valala ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Hamboly voaloboka ka hikolokolo azy ianareo, nefa tsy hisotro divay akory; tsy hioty voaloboka akory aza ianareo, satria hohanin’ny fositra ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hanana fototr’ôliva manerana ny faritaninareo ianareo; nefa tsy hisy menaka hihosoranareo akory, satria hihintsana tsy mbola matoy ny ôlivanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hiteraka zazalahy sy zazavavy ianareo; nefa tsy ho anareo ireny, satria ho lasan-ko babo. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ny hazonareo sy ny vokatry ny taninareo dia ho lanin’ny valala avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ny vahiny eo aminareo no hisandratra ho ambony dia ambony noho ianareo, fa ianareo kosa ho ambany dia ambany. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ireo no hampisambo-bola anareo fa tsy ianareo intsony no hampisambotra azy. Ireo no ho lohalaharana fa ianareo ho farany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dia ho tonga aminareo ireo ozona rehetra ireo, fa hanjohy anareo sy hianjady aminareo mandra-paharinganareo, satria tsy nekenareo ny TOMPO Andriamanitrareo sady tsy notandremanareo ny didy aman-dalàna izay nampitainy taminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ho famantarana sy fampitandremana hatrany hatrany ireny ho anareo sy ho an’ny taranakareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Noho ianareo tsy manompo amin-kafaliana sy risipo ilay TOMPO Andriamanitrareo, fony ianareo nanam-be tamin’ny zavatra rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'dia ho mpanompon’ny fahavalo halefan’ny TOMPO hamely anareo, ka hianjadian’ny hanoanana sy hetaheta ary hihafy amin’ny fitafiana sy ny zavatra isan-karazany. Hanisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zioga
  - type: text
    text: ' vy eo an-tsorokareo ny Tompo, mandra-pandringany anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Firenena avy lavitra, firenena avy any am-paran’ny tany sady tsy fantatrareo ny fiteniny, izany no hoentin’ny TOMPO hiady aminareo; tahaka ny voromahery miantonta hipaoka remby no hiavian’izany firenena izany aminareo: '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'dia firenena masiaka endrika, tsy hanaja ny antitra na hiantra ny tanora, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'hihinana ny vokatry ny fiompianareo sy ny vokatry ny taninareo, mandra-paharinganareo. Tsy havelany ho anareo na vary, na divay, na ny zanak’omby sy ondry aman’osinareo, mandra-pahafongony anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Hataony fahirano ianareo, any amin’ny tanàna rehetra misy anareo eran’ny taninareo, mandra-pandravany ny manda avo sy mafy izay itokianareo; eny, hataony fahirano ianareo, any amin’ny tanàna rehetra misy anareo, eran’ny tany izay omen’ny TOMPO Andriamanitrareo anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Mandritra izany fahirano izany, rehefa hanery mafy anareo ny fahavalonareo, dia ny zanakareo no hohaninareo; eny, ny nofon’ny zanakalahy sy zanakavavy izay omen’ny TOMPO Andriamanitrareo anareo no hataonareo sakafo. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ny lehilahy faran’izay miangentsana sy miaingitraingitra eo aminareo, dia ho ratsy fijery ny rahalahiny sy ny vady andefimandriny mbamin’ny zanany sisa; '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'tsy misy homeny amin’ny mofon-janany izay hohaniny manko ireo havany akaiky ireo; sao manko tsy hisy sakafo tavela ho an’ny tenany intsony mandritra ny fahirano, rehefa hanery mafy anareo ny fahavalonareo any amin’ny tanàna rehetra misy anareo any. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ny vehivavy, faran’izay miangentsana sy miaingitraingitra eo aminareo, ka tsy mbola nanandrana nandia tany, dia ho ratsy fijery ny vady andefimandriny sy ny zanakalahiny ary ny zanakavaviny; '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: eny, na hoe ny zazakely vao natera-dravehivavy sy ny tavony afaka taminy aza, dia hataony ratsy fijery; hohaniny mangingina manko ireny fa tsy manana na inona hatao sakafo izy mandritra izany fahirano izany, rehefa hanery mafy anareo ny fahavalonareo any amin’ny tanànareo any
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.57 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 56-57:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Mp 6.28-29; Fit 4.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Imasoy hotanterahina ny didy rehetra amin’ity Lalàna ity, dia ny didy rehetra voasoratra ato amin’ity boky ity; ary hajao ilay mitondra ny anarana be voninahitra sady mendri-kohajaina hoe «Ny TOMPO Andriamanitrareo». Raha tsy izany no tandrovinareo, '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'dia fery mahatsiravina, eny fery sy aretina samy màzana sy maharitra ela, no hataon’ny TOMPO mianjady aminareo sy amin’ny taranakareo. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Hataony mifotitra aminareo ny aretina rehetra nihatra tamin’ny Ejiptianina, aretina izay natahoranareo kanefa dia hiraikitra aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Na ny aretina sy fery isan-karazany tsy voasoratra amin’ity bokin’ny Lalàna ity aza, dia hoentin’ny TOMPO hamelezana anareo mandra-paharinganareo. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Iny ianareo efa maro toy ny kintana eny amin’ny habakabaka iny, dia olona vitsy no ho sisa tavela aminareo, satria ianareo tsy nanaiky ny TOMPO Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Araka izay nifalian’ny TOMPO hahasoa sy hahamaro anareo no hifaliany handringana sy handrava anareo; ka hofongorana ianareo tsy ho eo amin’ny tany izay efa hidiranareo mba halainareo ho fananana. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Dia haelin’ny TOMPO any amin’ny firenena rehetra hatrany amin’ny faran’ny tany ianareo; ary any no hanompoanareo andriamani-kafa vato aman-kazo voasokitra, andriamani-kafa izay tsy fantatry ny tenanareo na ny razambenareo akory. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Any amin’ireo firenena ireo dia tsy hisy hilaminanareo ary tsy hisy toerana hahazoanareo miorim-ponenana; fa any kosa dia fo manahy sy maso jambena ary fanahy kivy no homen’ny TOMPO anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ny ainareo hihevingevina eo anatrehanareo; dia hatahotra andro aman’alina ianareo ka tsy hanampo izay ho velona intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Maraina ianareo hanao hoe: «Malakia hariva!», hariva ianareo hanao hoe: «Malakia maraina!» noho ny tahotra hangeja ny fonareo ary noho ny zavatra ho hitan’ny masonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: Dia hoentin’ny TOMPO hiverina an-tsambo any Ejipta ianareo ka hihazo ny lalana efa nolazaiko taminareo hoe tsy ho hitanareo intsony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.68 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nolazaiko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa azo aroso '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nolazainy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ; any ianareo, na lahy na vavy, dia hivaro-tena ho mpanompon’ny fahavalonareo, nefa tsy hisy mpividy.
