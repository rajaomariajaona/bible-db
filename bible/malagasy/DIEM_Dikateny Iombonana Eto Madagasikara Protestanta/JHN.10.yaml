document_id: JHN.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana momba ny mpiandry sy ny ondry
  - type: text
    content: –Lazaiko marina dia marina aminareo fa izay tsy miditra amin’ny vavahady mankao amin’ny valan’
  - type: text
    content: ondry
  - type: note
    content: Mandritra ny alina dia apetraka anaty vala voafehy rindrim-bato ireo andiam-biby fiompy sady anaramàna mpiambina.
  - type: text
    content: ', fa mananika ny fefy, dia mpangalatra sy jiolahy; '
  '10':
  - type: text
    content: Ny mpangalatra dia tsy tonga raha tsy hangalatra sy hamono ary handringana; Izaho kosa no tonga dia ny hahavelona aina ny ondry ary hahavelona aina azy tsy misy fetra.
  '11':
  - type: text
    content: 'Izaho no '
  - type: text
    content: Mpiandry
  - type: note
    content: Ampit Sal 23.1; Is 40.11; Ezek 34.15; 37.24.
  - type: text
    content: ' tsara. Ny Mpiandry tsara no manolotra ny ainy hamonjena ny ondry. '
  '12':
  - type: text
    content: 'Ny mpikarama kosa, noho izy tsy mpiandry sady tsy tompon’ny ondry, dia mandao ny ondry sy mandositra raha vao mahita ny amboadia tamy; ka ny amboadia no misambotra ny ondry sy mampihahaka azy. '
  '13':
  - type: text
    content: 'Ny mpikarama no mandositra, dia satria mpikarama izy ka tsy raharahainy akory ny ondry. '
  '14':
  - type: text
    content: 'Izaho no Mpiandry tsara: fantatro ny ondriko ary ny ondriko mahafantatra Ahy, '
  '15':
  - type: text
    content: tahaka ny ahafantaran’ny Ray
  - type: note
    content: Jereo Mt 11.27; Lk 10.22.
  - type: text
    content: ' Ahy sady ahafantarako ny Ray; ary manolotra ny aiko Aho hamonjena ny ondry. '
  '16':
  - type: text
    content: Manana ondry hafa izay tsy avy amin’ity vala ity aho; ireny koa dia tsy maintsy tarihiko, ka hihaino ny feoko ary ho tonga andiany tokana entin’ny mpiandry tokana
  - type: note
    content: 'ary ho tonga... mpiandry tokana: misy stf sasany ahitana hoe ary tsy hisy afa-tsy andiany tokana sy mpiandry tokana.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ny itiavan’ny Ray Ahy dia satria manolotra ny aiko Aho mba handraisako azy indray. '
  '18':
  - type: text
    content: 'Tsy misy manaisotra ny aiko amiko, fa Izaho ihany no manolotra azy. Manana fahefana hanolotra ny aiko Aho, ary manana fahefana handray azy indray: izany didy izany no azoko tamin’ny Raiko.'
  '19':
  - type: text
    content: 'Dia nisara-tsaina indray ny Jiosy noho izany teny izany. '
  '2':
  - type: text
    content: 'fa izay miditra amin’ny vavahady no '
  - type: text
    content: mpiandry
  - type: text
    content: ' ny ondry. '
  '20':
  - type: text
    content: 'Maro tamin’ireo no nanao hoe:'
  - type: text
    content: –Ondranondranana io sady very saina, ka inona no ihainoanareo Azy?
  '21':
  - type: text
    content: 'Ny sasany kosa nanao hoe:'
  - type: text
    content: –Tsy mba tenin’olona azon-
  - type: text
    content: demony
  - type: text
    content: ' izany! Demony ve mahay mampahiratra ny mason’ny jamba?'
  - type: heading
    content: Toherin’ny Jiosy i Jesoa
  '22':
  - type: text
    content: 'Ririnina ny andro tamin’izay ary notontosaina tao Jerosalema ny fankalazana ny '
  - type: text
    content: Fitokanana
  - type: text
    content: '. '
  '23':
  - type: text
    content: I Jesoa dia nitsangantsangana tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ', teo amin’ny '
  - type: text
    content: lala-mitafon
  - type: text
    content: '’i Salômôna. '
  '24':
  - type: text
    content: 'Koa nitangoronan’ny Jiosy Izy nanontaniany hoe:'
  - type: text
    content: '–Ambara-pahoviana no hampisalasalanao anay? Raha Ianao tokoa no ilay '
  - type: text
    content: Mesia
  - type: text
    content: ', mba lazao mazava aminay!'
  '25':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Efa nilaza taminareo Aho, nefa tsy mino ianareo; ny asa izay ataoko amin’ny anaran’ny Raiko dia mijoro ho vavolombelona manambara Ahy, '
  '26':
  - type: text
    content: 'nefa ianareo tsy mino satria tsy mba isan’ny '
  - type: text
    content: ondriko
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Ireo ondriko mihaino ny feoko: Izaho mahafantatra ny ondriko, ary izy manaraka Ahy. '
  '28':
  - type: text
    content: 'Izaho no manome azy ny aina maharitra mandrakizay ka tsy ho very izy na oviana na oviana, ary tsy hisy haharombaka azy eo an-tanako. '
  '29':
  - type: text
    content: Ny Raiko Izay nanolotra azy tamiko dia lehibe noho ny rehetra, ka tsy misy olona maharombaka azy eo an-tanan’ny Ray
  - type: note
    content: 'Ny Raiko Izay nanolotra... eo an-tanan’ny Ray: misy stf sasany ahitana hoe Izay nomen’ny Raiko Ahy dia lehibe noho izao rehetra izao; ary tsy misy olona maharombaka zavatra eo an-tanan’ny Ray.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ny mpiandry no vohan’ny mpiambina vavahady; ary ny ondry mihaino ny feon’ny mpiandry izay miantso ny ondriny araka ny anarany avy sy mamoaka azy. '
  '30':
  - type: text
    content: Izaho sy ny Ray dia iray ihany.
  '31':
  - type: text
    content: 'Dia naka vato indray ny Jiosy hitorahana Azy, '
  '32':
  - type: text
    content: 'fa hoy i Jesoa taminy:'
  - type: text
    content: –Maro ny asa tsara nasehoko teo aminareo noho ny fahefana azoko tamin’ny Ray; ka inona amin’ireny asa ireny no itorahanareo vato Ahy?
  '33':
  - type: text
    content: 'Ka novalian’ny Jiosy hoe:'
  - type: text
    content: –Tsy ny asa tsara no itorahanay vato Anao, fa ny fanevatevànao an’Andriamanitra; olombelona ihany manko Ianao, nefa manao ny tenanao ho Andriamanitra
  - type: note
    content: Jereo Lev 24.16.
  - type: text
    content: .
  '34':
  - type: text
    content: 'I Jesoa kosa niteny taminy hoe:'
  - type: text
    content: '–Tsy voalaza ao amin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' ve izao: «Hoy Aho: Andriamanitra ianareo'
  - type: note
    content: Sal 82.6.
  - type: text
    content: '»? '
  '35':
  - type: text
    content: 'Ary tsy azo foanana ny Soratra Masina; fa ireo olona nanambarana ny tenin’Andriamanitra dia natao hoe «Andriamanitra». '
  '36':
  - type: text
    content: 'Izaho kosa natokan’ny Ray sy nirahiny ho eo amin’izao tontolo izao; kanefa dia ataonareo hoe manevateva an’Andriamanitra Aho satria nilaza hoe: '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ' Aho! '
  '37':
  - type: text
    content: 'Raha tsy manao ny asan’ny Raiko Aho, dia aza mino ahy; '
  '38':
  - type: text
    content: fa raha manao ihany kosa Aho, na dia tsy mino ahy aza ianareo, dia minoa ny asako mba hahafantaranareo sy hanekenareo fa ny Ray ato anatiko, ary Izaho ao anatin’ny Ray!
  '39':
  - type: text
    content: Tamin’izay dia nitady hisambotra an’i Jesoa indray ry zareo fa niala teo Izy ka tsy voatanany.
  '4':
  - type: text
    content: 'Rehefa tafavoakany avokoa ny ondriny, dia lasa izy mialoha azy; ary manaraka azy ny ondriny, satria mahalala ny feony. '
  '40':
  - type: text
    content: 'Dia lasa i Jesoa nankany andafin’ny ony Jôrdàna, any amin’ilay toerana nanombohan’i Jôhany nanao '
  - type: text
    content: batisa
  - type: note
    content: Jereo 1.28.
  - type: text
    content: ', ka nijanona tany. '
  '41':
  - type: text
    content: 'Maro no nankeo aminy ka nanao hoe:'
  - type: text
    content: '–I Jôhany tsy nanao '
  - type: text
    content: famantarana
  - type: text
    content: ' na dia iray aza; nefa izay rehetra voalazan’i Jôhany ny amin’ity Lehilahy ity, dia marina avokoa.'
  '42':
  - type: text
    content: Ary maro no nino an’i Jesoa teo.
  '5':
  - type: text
    content: Ny vahiny kosa tsy mba harahin’ny ondry fa handosirany, satria tsy fantany ny feon’ireo vahiny.
  '6':
  - type: text
    content: 'Izany '
  - type: text
    content: fanoharana
  - type: text
    content: ' izany dia nolazain’i Jesoa tamin’ireo Jiosy, kanefa tsy azon-dry zareo ny zavatra noresahiny taminy.'
  - type: heading
    content: I Jesoa no Mpiandry tsara
  '7':
  - type: text
    content: 'Dia hoy indray i Jesoa:'
  - type: text
    content: '–Lazaiko marina dia marina aminareo fa Izaho no vavahadin’ny '
  - type: text
    content: ondry
  - type: text
    content: '. '
  '8':
  - type: text
    content: Mpangalatra sy jiolahy
  - type: note
    content: Jereo Jer 23.1-2; Ezek 34.2-3.
  - type: text
    content: ' avokoa izay rehetra tonga talohako, fa tsy nihaino azy ny ondry. '
  '9':
  - type: text
    content: 'Izaho no vavahady: raha amin’ny alalako no idiran’ny ondry, dia hovonjena izy ary ho afa-miditra sy mivoaka ny vala sady hahita tanim-bilona. '
