document_id: 2CO.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Paoly ity taratasy ity, dia izaho '
  - type: text
    content: apôstôlin’i Kristy
  - type: text
    content: ' Jesoa noho ny sitrapon’Andriamanitra.'
  - type: text
    content: Mamangy anareo isan’ny Fiangonan’Andriamanitra atỳ Kôrinto
  - type: note
    content: 'I Kôrinto: jereo Asa 18.1 sy nta. Momba ny nitoeran’i Paoly voalohany tany Kôrinto, jereo Asa 18.1-18. –Akaîa: faritany rômanina mahafaoka ny antsasak’i Gresy ankehitriny, tapany atsimo.'
  - type: text
    content: ' mbaminareo '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' rehetra manerana an’i Akaîa aho. Mamangy anareo koa i Timôty havantsika. '
  '10':
  - type: text
    content: Izy no nanafaka anay tamin’ny fahafatesana nananontanona anay
  - type: note
    content: 'tamin’ny fahafatesana nananontanona anay: dkt hafa, araka ny stf sasany, tamin’ny fahafatesana mahatsiravina.'
  - type: text
    content: ', ary dia mbola hanafaka any hatrany; eny, Izy no antenainay fa hanafaka hatrany, '
  '11':
  - type: text
    content: satria ianareo koa hanampy anay amin’ny fivavahana ataonareo ho anay. Dia ho maro ny olona hisaotra an’Andriamanitra ny aminay satria maro no nangataka mba hahazoanay izany fitahiana izany.
  - type: heading
    content: Nahemotr’i Paoly ny famangiany
  '12':
  - type: text
    content: 'Izao manko no ireharehanay: ny fieritreretanay dia vavolombelona manambara fa ny fomba nitondranay tena teto amin’izao tontolo izao, indrindra teo aminareo, dia tamin’ny fahatsorana'
  - type: note
    content: 'fahatsorana: misy stf sasany ahitana hoe fahamasinana.'
  - type: text
    content: 'sy hitsimpo nomen’Andriamanitra; satria ny fahasoavan’Andriamanitra no nitarika anay fa tsy ny fahendren’olombelona. '
  '13':
  - type: text
    content: 'Ka izay soratanay amin’ny taratasinay dia izay vakînareo sy azonareo tsara. Ary manantena aho fa araka ny efa fantapantatrareo ihany ankehitriny, dia ho fantatrareo tanteraka izao zavatra izao: amin’ny andro hiavian’i Jesoa Tompo, dia ho reharehanareo izahay toy ny maha reharehanay anareo.'
  '15':
  - type: text
    content: Natoky izany tokoa aho, ka dia nikasa ho atỳ aminareo tam-boalohany mba hahazoanareo soa
  - type: note
    content: 'hahazoanareo soa: misy stf sasany ahitana hoe hahazoanareo fifaliana.'
  - type: text
    content: 'indroa miantoana. '
  '16':
  - type: text
    content: Nokasaiko ny hihazo atỳ aminareo amin’ny diako hankany Masedônia, ary dia mbola hamangy anareo indray aho rehefa avy any
  - type: note
    content: 'Masedônia: faritany rômanina (renivohiny i Tesalônika) mahafaoka ny antsasak’i Gresy ankehitriny, tapany avaratra. –Jereo Asa 19.21.'
  - type: text
    content: '; ka ho nanampy ahy koa ianareo hanohizako dia hankany Jodea. '
  '17':
  - type: text
    content: 'Moa nanao kitoatoa ve aho raha nikasa izany? Araka ny maha olombelona fotsiny ve no nikasako izany ka hahazoako hiroa teny, sady hanao «eny» no hanao «tsia»? '
  '18':
  - type: text
    content: 'Raha mahatoky koa Andriamanitra, dia tsy mandray roa ny teninay taminareo ka sady ho «eny» no ho «tsia». '
  '19':
  - type: text
    content: 'Satria i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ', ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ', Izay notorînay sy i Silasy ary i Timôty'
  - type: note
    content: Jereo Asa 18.5.
  - type: text
    content: ' teo aminareo, dia tsy hoe sady «eny» no «tsia»; fa i Jesoa Kristy dia «eny» hatrany hatrany: '
  '2':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
  - type: heading
    content: Misaotra an’Andriamanitra i Paoly
  '20':
  - type: text
    content: koa Izy no ilay «eny» mahatò ny fampanantenana rehetra nataon’Andriamanitra. Izany koa no anton’ny anononantsika ny «
  - type: text
    content: Amen
  - type: text
    content: '» amin’ny alalan’i Jesoa Kristy ho voninahitr’Andriamanitra. '
  '21':
  - type: text
    content: 'Fa Andriamanitra no manamafy ny firaisanay sy ny firaisanareo amin’i Kristy; Andriamanitra no nifidy anay hanao izao asa izao; '
  '22':
  - type: text
    content: ary Izy no nanisy ny tombokase maha fananany antsika sy nandrotsaka ny Fanahy Masina ao am-pontsika ho antoky ny soa natokany ho antsika.
  '23':
  - type: text
    content: 'Antsoiko ho vavolombeloko Andriamanitra, satria fantany ny ato am-poko: fitsimbinako anareo no nahatapa-kevitra ahy tsy hiverina any Kôrinto. '
  '24':
  - type: text
    content: Izahay dia tsy manao jadona aminareo ny amin’izay tokony hinoanareo, satria efa tsara orina amin’ny finoana ianareo; fa miara-miasa aminareo izahay hampandroso ny hafalianareo.
  '3':
  - type: text
    content: 'Hankalazaina anie ilay Andriamanitra sady Rain’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika, ilay Ray feno hatsaram-po sady Andriamanitra loharanon’ny fampaherezana rehetra'
  - type: note
    content: 'loharanon’ny fampaherezana rehetra: ampit Is 40.1; Sal 94.19.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Mampahery anay amin’ny fahoriana isan-karazany manjo anay Andriamanitra, ka ny fampaherezana azonay taminy no entinay mampahery ny olona ianjadian’ny fahoriana isan-karazany. '
  '5':
  - type: text
    content: 'Miara-mijaly be dia be amin’i Kristy izahay; ary betsaka araka izany koa ny fampaherezana azonay amin’ny alalan’i Kristy. '
  '6':
  - type: text
    content: 'Raha ampahorîna izahay, dia ho fampaherezana anareo sy ho famonjena anareo izany; raha ampaherezina izahay, dia ho fampaherezana anareo koa izany, ka miasa hiaretanareo fijaliana mitovy indrindra amin’izay entinay. '
  '7':
  - type: text
    content: Ary miorina mafy ny fanantenany ny aminareo, satria fantatray fa toy ny iombonanareo fijaliana aminay no iombonanareo fampaherezana aminay koa.
  '8':
  - type: text
    content: Tianay, ry havako, ny hahalalanareo ny fahoriana nanjo anay tany amin’ny faritany Azia; nitambesatra loatra taminay izany ary tafahoatra ny zakanay, ka tsy nanantena intsony izay hoe mbola ho velona izahay
  - type: note
    content: Ampit 1Kôr 15.32. –ny faritany Azia dia faritany rômanina manana an’i Efeso ho renivohiny.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Tsapanay tao amin’ny tenanay fa voaheloka ho faty izahay, mba tsy hitokianay amin’ny tenanay, fa hitokianay amin’Andriamanitra Izay manangana ho velona ny efa maty. '
