document_id: 2CO.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy amiko Paoly ity taratasy ity, dia izaho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôlin’i Kristy
  - type: text
    text: ' Jesoa noho ny sitrapon’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mamangy anareo isan’ny Fiangonan’Andriamanitra atỳ Kôrinto
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kôrinto: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 18.1 sy nta. Momba ny nitoeran’i Paoly voalohany tany Kôrinto, jereo Asa 18.1-18. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Akaîa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' faritany rômanina mahafaoka ny antsasak’i Gresy ankehitriny, tapany atsimo.'
    marker-yv: yv-n
  - type: text
    text: ' mbaminareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' rehetra manerana an’i Akaîa aho. Mamangy anareo koa i Timôty havantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misaotra an’Andriamanitra i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hankalazaina anie ilay Andriamanitra sady Rain’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika, ilay Ray feno hatsaram-po sady Andriamanitra loharanon’ny fampaherezana rehetra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'loharanon’ny fampaherezana rehetra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Is 40.1; Sal 94.19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mampahery anay amin’ny fahoriana isan-karazany manjo anay Andriamanitra, ka ny fampaherezana azonay taminy no entinay mampahery ny olona ianjadian’ny fahoriana isan-karazany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Miara-mijaly be dia be amin’i Kristy izahay; ary betsaka araka izany koa ny fampaherezana azonay amin’ny alalan’i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha ampahorîna izahay, dia ho fampaherezana anareo sy ho famonjena anareo izany; raha ampaherezina izahay, dia ho fampaherezana anareo koa izany, ka miasa hiaretanareo fijaliana mitovy indrindra amin’izay entinay. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary miorina mafy ny fanantenany ny aminareo, satria fantatray fa toy ny iombonanareo fijaliana aminay no iombonanareo fampaherezana aminay koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tianay, ry havako, ny hahalalanareo ny fahoriana nanjo anay tany amin’ny faritany Azia; nitambesatra loatra taminay izany ary tafahoatra ny zakanay, ka tsy nanantena intsony izay hoe mbola ho velona izahay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Kôr 15.32. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny faritany Azia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia faritany rômanina manana an’i Efeso ho renivohiny.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsapanay tao amin’ny tenanay fa voaheloka ho faty izahay, mba tsy hitokianay amin’ny tenanay, fa hitokianay amin’Andriamanitra Izay manangana ho velona ny efa maty. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izy no nanafaka anay tamin’ny fahafatesana nananontanona anay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tamin’ny fahafatesana nananontanona anay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa, araka ny stf sasany, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tamin’ny fahafatesana mahatsiravina.
    marker-yv: yv-n
  - type: text
    text: ', ary dia mbola hanafaka any hatrany; eny, Izy no antenainay fa hanafaka hatrany, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: satria ianareo koa hanampy anay amin’ny fivavahana ataonareo ho anay. Dia ho maro ny olona hisaotra an’Andriamanitra ny aminay satria maro no nangataka mba hahazoanay izany fitahiana izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nahemotr’i Paoly ny famangiany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao manko no ireharehanay: ny fieritreretanay dia vavolombelona manambara fa ny fomba nitondranay tena teto amin’izao tontolo izao, indrindra teo aminareo, dia tamin’ny fahatsorana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fahatsorana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fahamasinana.
    marker-yv: yv-n
  - type: text
    text: 'sy hitsimpo nomen’Andriamanitra; satria ny fahasoavan’Andriamanitra no nitarika anay fa tsy ny fahendren’olombelona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Ka izay soratanay amin’ny taratasinay dia izay vakînareo sy azonareo tsara. Ary manantena aho fa araka ny efa fantapantatrareo ihany ankehitriny, dia ho fantatrareo tanteraka izao zavatra izao: amin’ny andro hiavian’i Jesoa Tompo, dia ho reharehanareo izahay toy ny maha reharehanay anareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Natoky izany tokoa aho, ka dia nikasa ho atỳ aminareo tam-boalohany mba hahazoanareo soa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hahazoanareo soa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hahazoanareo fifaliana.
    marker-yv: yv-n
  - type: text
    text: 'indroa miantoana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nokasaiko ny hihazo atỳ aminareo amin’ny diako hankany Masedônia, ary dia mbola hamangy anareo indray aho rehefa avy any
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Masedônia: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: faritany rômanina (renivohiny i Tesalônika) mahafaoka ny antsasak’i Gresy ankehitriny, tapany avaratra. –Jereo Asa 19.21.
    marker-yv: yv-n
  - type: text
    text: '; ka ho nanampy ahy koa ianareo hanohizako dia hankany Jodea. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moa nanao kitoatoa ve aho raha nikasa izany? Araka ny maha olombelona fotsiny ve no nikasako izany ka hahazoako hiroa teny, sady hanao «eny» no hanao «tsia»? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha mahatoky koa Andriamanitra, dia tsy mandray roa ny teninay taminareo ka sady ho «eny» no ho «tsia». '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Satria i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: ', Izay notorînay sy i Silasy ary i Timôty'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 18.5.
    marker-yv: yv-n
  - type: text
    text: ' teo aminareo, dia tsy hoe sady «eny» no «tsia»; fa i Jesoa Kristy dia «eny» hatrany hatrany: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: koa Izy no ilay «eny» mahatò ny fampanantenana rehetra nataon’Andriamanitra. Izany koa no anton’ny anononantsika ny «
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: '» amin’ny alalan’i Jesoa Kristy ho voninahitr’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa Andriamanitra no manamafy ny firaisanay sy ny firaisanareo amin’i Kristy; Andriamanitra no nifidy anay hanao izao asa izao; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ary Izy no nanisy ny tombokase maha fananany antsika sy nandrotsaka ny Fanahy Masina ao am-pontsika ho antoky ny soa natokany ho antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Antsoiko ho vavolombeloko Andriamanitra, satria fantany ny ato am-poko: fitsimbinako anareo no nahatapa-kevitra ahy tsy hiverina any Kôrinto. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izahay dia tsy manao jadona aminareo ny amin’izay tokony hinoanareo, satria efa tsara orina amin’ny finoana ianareo; fa miara-miasa aminareo izahay hampandroso ny hafalianareo.
