      text: '11'
  - type: text
    text: Vatan-dehilahy avy any Arvada no niambina ny mandanao niaraka tamin’ny miaramilanao, ary olona avy any Gamada no niaro ny tilikambonao. Nanantona ny ampingany teny amin’ny manda manodidina anao
