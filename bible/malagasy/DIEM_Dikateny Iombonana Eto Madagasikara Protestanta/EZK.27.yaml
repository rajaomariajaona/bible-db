document_id: EZK.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fisaonana noho ny faharavan’i Tiro
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: Olona avy any Persia sy Loda ary Ponto
  - type: note
    content: 'Loda sy Ponto: jereo ny naoty momba ny Is 66.19.'
  - type: text
    content: no miaramila nanompo tao amin’ny tafikao.
  - type: text
    content: Nahantony tao anatin’ny tobinao
  - type: text
    content: ny ampingany sy ny fiarovan-dohany,
  - type: text
    content: ka nanomezany laza anao izany.
  '11':
  - type: text
    content: Vatan-dehilahy avy any Arvada no niambina ny mandanao niaraka tamin’ny miaramilanao, ary olona avy any Gamada no niaro ny tilikambonao. Nanantona ny ampingany teny amin’ny manda manodidina anao
  - type: note
    content: 'Gamada: faritany na tanàna tsy dia fantatra loatra. –Nahantona teny amin’ny manda ny ampinga mba ho toy ny fehiloha mandravaka azy (jereo Ton 4.4).'
  - type: text
    content: ' izy. Ireo rehetra ireo no nahatonga anao ho tsara tarehy fatratra›. »'
  - type: heading
    content: I Tiro renivohitry ny varotra
  '12':
  - type: text
    content: «Ny olon’i Tarsîsy
  - type: note
    content: Tarsîsy; toerana tsy voatondro mazava ara-jeôgrafia, jereo Sal 72.10; Jon 1.3.
  - type: text
    content: ' no nifanao varotra taminao momba ny harena zavon-tany isan-karazany. Volafotsy sy vy sy vifotsy ary firaka no natolony ho takalon’ny entanao. '
  '13':
  - type: text
    content: Ny olona avy any Gresy sy Tobala ary Mesèka
  - type: note
    content: 'Tobala sy Mesèka: faritanin’i Azia Minôra, jereo koa 38.2.'
  - type: text
    content: ' ihany koa dia nifanao varotra taminao, ka olona sy fanaka halimo no natolony ho takalon’ny entanao. '
  '14':
  - type: text
    content: Ny terak’i Bety-Tôgarmà
  - type: note
    content: 'Bety-Tôgarmà: mety ho i Armenia izany, jereo 38.6.'
  - type: text
    content: ' no nanolotra ny soavaly hoenti-miasa sy ny soavaly hoenti-miady ary ny boriky ho takalon’ny entanao. '
  '15':
  - type: text
    content: Nifandray ara-barotra taminao koa ny olona avy ao Dedàna
  - type: note
    content: 'Dedàna: jereo 25.13 sy ny nta.'
  - type: text
    content: '. Nitatra tamin’ireo nosy maro ny tsenam-barotrao, ka tandroka ivoara sy hazomainty no natakalony ny entanao. '
  '16':
  - type: text
    content: Nividy entana betsaka taminao koa ny Edômita
  - type: note
    content: 'Ny Edômita: araka ny stf hebreo maro sy ny dkt siriaka tranainy; ny RM mahazatra kosa manao hoe ny Sirianina.'
  - type: text
    content: ', ka vato emeralda sy lamba miloko volomparasy, lamba vita peta-kofehy sy rongony fotsy madinika ary koa akorandriaka sy vato robisy no natolony ho takalony. '
  '17':
  - type: text
    content: 'Nifandray ara-barotra taminao koa ny vahoakan’i Joda sy i '
  - type: text
    content: Israely
  - type: text
    content: ' ka varimbazaha avy any Minita'
  - type: note
    content: 'Minita: tanàn-dehibe any amin’ny tanin’ny Hamônita ka tonga anarana fiantsoana karazana voamaina anankiray.'
  - type: text
    content: ' sy ampemba sy tantely sy diloilo ary balsamo no natolony ho takalon’ny entanao. '
  '18':
  - type: text
    content: Ny mponin’i Damasy dia nifanao varotra taminao momba ny taozavatrao sy ny harenao zavon-tany isan-karazany. Divay avy any Helbôna sy volonondry avy any Tsahara
  - type: note
    content: 'Damasy: renivohitr’i Siria (and. 16). –Helbôna: faritany any avaratr’i Damasy, malaza fahizany hatrany Asiria noho ny divainy. –Tsahara: tsy dia fantatra loatra, kanefa tsy maintsy tanàna mifanakaiky amin’i Helbôna.'
  - type: text
    content: ' no nataony takalony. '
  '19':
  - type: text
    content: Avy ao an-tanànan’i Ozala ny mponin’i Vedàna sy i Javàna
  - type: note
    content: 'Vedàna sy i Javàna: eto ireo dia toa foko arabo mpiompy andiam-biby mifindrafindra lasy ka ny tanànan’i Ozala no foibe ivotoerany.'
  - type: text
    content: ' no manolotra ny vy voatefy sy ny kanela ary ny veromanitra ho takalon’ny entanao. '
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, manaova ianao hira fisaonana ny amin’ny tanànan’i Tiro, '
  '20':
  - type: text
    content: 'Ny olona avy any Dedàna kosa nifandray ara-barotra taminao ka nitondra lamba fandrakofan-tsoavaly. '
  '21':
  - type: text
    content: I Arabia sy ireo mpitondra rehetra any Kedara
  - type: note
    content: 'Kedara: faritanin’i Arabia, jereo Is 21.13-17 sy Ton 1.5.'
  - type: text
    content: ' dia nifanao varotra taminao. Zanak’ondry sy ondrilahy ary osilahy no natakalony ny entanao. '
  '22':
  - type: text
    content: Ny mpivarotra avy any Sebà sy Rahemà
  - type: note
    content: 'Sebà sy Rahemà: faritany any atsimon’i Arabia, jereo Gen 10.7; 1 Mp 10.1.'
  - type: text
    content: ' ihany koa dia nifandray ara-barotra taminao ka zava-manitra ambony karazana sy vatosoa ary volamena no natolony ho takalon’ny entanao. '
  '23':
  - type: text
    content: Ny ao an-tanànan’i Haràna sy i Kane ary i Hedèna koa dia nifandray ara-barotra taminao toy ireo mpivarotra avy any Sebà mbamin’ireo tanànan’i Asora sy i Kilmady
  - type: note
    content: Haràna, Kane, ary Hedèna dia tanàn-dehibe tany amin’ny lohasahan’i Eôfrata. I Kilmady dia mety ho tanàna mifanila amin’i Asora eny amoron’ny ony Tigra.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Nivarotra fitafiana mihaja taminao izy, ka entiny eny an-tsenanao ny fitafiana miloko volomparasy sy ny lamba vita peta-kofehy, karipetra misoratsoratra ary tady voarandrana mafy. '
  '25':
  - type: text
    content: Ireo sambo vaventy no mpitatitra ny entam-barotrao.»
  - type: heading
    content: Tohin’ny hira fisaonana momba an’i TiroAmpit Apôk 18.11-19 ity tohin’ny hira fisaonana ity.
  - type: text
    content: «Toa sambo feno entana ianao
  - type: text
    content: ka navesatra dia navesatra,
  - type: text
    content: teny anivon’ny ranomasina.
  '26':
  - type: text
    content: Nentin’ireo mpivoinao teny amin’ny ranobe ianao
  - type: text
    content: ka ny rivotra avy any atsinanana
  - type: text
    content: no nahavaky anao teny anivon’ny ranomasina.
  '27':
  - type: text
    content: Ny fanananao sy ny vokatrao
  - type: text
    content: mbamin’ny entam-barotrao rehetra,
  - type: text
    content: ny tantsambonao sy ny mpanampy azy,
  - type: text
    content: ireo mpanamboatra ny simba
  - type: text
    content: amin’ny vatan-tsambonao,
  - type: text
    content: ireo mpivarotra mpanondrana entana,
  - type: text
    content: ny miaramila rehetra niasa tao aminao,
  - type: text
    content: ary ny vahoaka rehetra nandeha taminao,
  - type: text
    content: dia samy nilentika any an-dranomasina
  - type: text
    content: tamin’ny andro naharendrika anao.
  '28':
  - type: text
    content: Noho ny fidradradradràn’ireo tantsambonao
  - type: text
    content: dia mangovitra ny mponina amoron-tsiraka.
  '29':
  - type: text
    content: Miala ny sambony avy ireo mpivoy rehetra
  - type: text
    content: sy ireo tantsambo rehetra eny an-dranomasina
  - type: text
    content: ka samy maka toerana eny an-tanety.
  '3':
  - type: text
    content: 'izay miorina eo amin’ny vava-ranomasina, ary manao varotra amin’ny firenena maro eny amoron-dranomasina. Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY:'
  - type: text
    content: ‹Ry Tiro
  - type: note
    content: 'Tiro: jereo ny naoty momba ny 26.2.'
  - type: text
    content: ' ô, Ianao dia nilaza ny tenanao'
  - type: text
    content: ho sambo tsara tarehy fatratra!
  '30':
  - type: text
    content: Heno migogogogo noho ny manjo anao izy,
  - type: text
    content: sady manao fidradradradrana mafy.
  - type: text
    content: Mandraraka vovoka amin’ny lohany izy,
  - type: text
    content: ary mihosinkosina amin’ny lavenona.
  '31':
  - type: text
    content: Manaratra loha sady mitafy gony
  - type: note
    content: Jereo 7.18 sy nta.
  - type: text
    content: noho ny aminao izy,
  - type: text
    content: ka mitomany anao fa mangidy ny manjo
  - type: text
    content: ary mangidy ny fisaonany.
  '32':
  - type: text
    content: Tamin’alahelo no niventesany
  - type: text
    content: hiram-palahelovana ny aminao,
  - type: text
    content: 'dia hiram-pisaonana manao hoe:'
  - type: text
    content: Iza no tahaka an’i Tiro
  - type: text
    content: izay tonga mangina ankehitriny
  - type: text
    content: eo anivon’ny ranomasina?
  '33':
  - type: text
    content: Rehefa tonga avy any an-dranomasina any ianao
  - type: text
    content: ka nampidinina ny entam-barotrao,
  - type: text
    content: dia firenena maro no voavatsy tamin’izany.
  - type: text
    content: Ny habetsahan’ny harenao aman’entanao
  - type: text
    content: no nampanan-karena ireo mpanjakan’ny tany.
  '34':
  - type: text
    content: Ankehitriny novakîn’ny onjan-dranomasina ianao
  - type: text
    content: ary tafalentika ao anaty rano lalimbe.
  - type: text
    content: Ny entanao sy ny vahoaka rehetra nandeha taminao
  - type: text
    content: dia niaraka rendrika taminao avokoa.
  '35':
  - type: text
    content: Nalahelo mafy ny aminao
  - type: text
    content: ny mponina rehetra amoron-tsiraka;
  - type: text
    content: raiki-tahotra ny mpanjakany
  - type: text
    content: ka tonga hatsatra ny endriny.
  '36':
  - type: text
    content: Ny mpivarotry ny firenen-kafa
  - type: text
    content: dia misiotsioka talanjona ny aminao,
  - type: text
    content: satria tonga fampitahorana ianao,
  - type: text
    content: sady tsy hisy intsony mandrakizay.»
  '4':
  - type: text
    content: Eny anivon-dranomasina ny faritaninao,
  - type: text
    content: ary nataon’ireo mpandrafitra anao
  - type: text
    content: ho tsara tarehy fatratra ianao.
  '5':
  - type: text
    content: Hazo kipreso avy any Senira
  - type: note
    content: 'Senira: anaran’ny tendrombohitra Hermôna (jereo Deot 3.9) na ankapobeny kokoa anaran’ilay tandavan-tendrombohitra eny atsinanan’ny tendrombohitr’i Libano ka i Hermôna no faratampony.'
  - type: text
    content: no nanamboarany manontolo ny vatan-tsambonao;
  - type: text
    content: hazo sedera avy any Libano
  - type: text
    content: no nalainy hanaovana ny andrin-tsambonao.
  '6':
  - type: text
    content: 'Hazo ôaka avy any '
  - type: text
    content: Basàna
  - type: text
    content: no nanaovany ny fivoin-tsambonao.
  - type: text
    content: Hazo sedera avy any amin’ny nosy Kitima
  - type: text
    content: izay nasiana sisika ivoary
  - type: text
    content: no nanamboarany ny tokotanin-tsambonao.
  '7':
  - type: text
    content: Rongony madinika misoratsoratra avy any Ejipta
  - type: text
    content: no natao lain-tsambonao
  - type: text
    content: mba ho faneva hamantarana anao.
  - type: text
    content: Lamba miloko volomparasy sy jaky
  - type: text
    content: avy any amin’ny nosy Sipra
  - type: text
    content: no natao labasy hiarovana ny entanao.
  '8':
  - type: text
    content: Mponina avy any Tsidôna sy Arvada
  - type: note
    content: 'Tsidôna sy Arvada: tanàna fenisianina roa teo amoron-tsiraka akaikin’i Tiro.'
  - type: text
    content: no nampiasainao ho mpivoy;
  - type: text
    content: ny olona havanana teo aminao
  - type: text
    content: no tantsambonao, ry Tiro ô,
  '9':
  - type: text
    content: Mpahay taozavatra avy any Biblôsy,
  - type: text
    content: izay za-draharaha sady kinga,
  - type: text
    content: no mpanamboatra ny simba
  - type: text
    content: amin’ny vatan-tsambonao.
  - type: text
    content: Ny sambo rehetra izay teny an-dranomasina
  - type: text
    content: dia nijanona avokoa teo aminao;
  - type: text
    content: ka ny tantsambony no mividy ny entanao.
