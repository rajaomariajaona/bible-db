document_id: JOS.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny mpanjaka rehetra, tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amôrita
    - type: text
      text: ' nonina teny andafy andrefan’i Jôrdàna sy tamin’ny Kanahanita nonina tany amoron’ny Ranomasina Mediteranea, dia nahare fa nataon’ny TOMPO maina ny falehan’ny ranon’i Jôrdàna teo anoloan’ny Israelita mandra-pitany; noho izany dia ketraka ny fon’ireo mpanjaka ireo ka tsy nanam-pahasahiana intsony ry zareo hanoherana ny Israelita.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famorana Israelita tao Gilgala
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Gen 17.9-14, 23-27; Kôl 2.11-12; Fil 4.9)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nitoby tao Gilgala ny Israelita, teo amin’ny tany lemaka akaikin’i Jerikao, ka nankalaza ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' fony harivan’ny andro faha-14 tamin’io volana io'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny andro faha-14 tamin’io volana io: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo 4.19 sy nta; io no daty fankalazana ny Paska: jereo Eks 12.6.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny ampitson’ny Paska dia nihinana mofo tsy misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviora
    - type: text
      text: ' sy lango avy amin’ny vokatry ny tany izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny andro nihinanany ny vokatry ny tany dia nitsahatra ny mana ka tsy nisy mana ho an’ny Israelita intsony; satria izany taona izany no nihinanany ny vokatry ny tany Kanahàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 16.13-35. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Kanahàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': anaran’ny tany nampanantenaina talohan’ny nahatongavan’ny Israelita.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay lehiben’ny tafiky ny Tompo
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Iny teo akaikin’i Jerikao iny i Josoa, dia nanopy maso nijery ka indro lehilahy iray nitsangana tandrifiny sady nitana sabatra voatsoaka teny an-tanany; dia nanatona azy i Josoa ka nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Namanay ve ianao sa naman’ny fahavalonay?
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, fa lehiben’ny tafiky ny TOMPO aho ka tonga atỳ ankehitriny.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niankohoka tamin’ny tany i Josoa ka niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mpanomponao aho, tompoko; ka inona no baikonao amiko?
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy ilay lehiben’ny tafiky ny TOMPO tamin’i Josoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Esory eny an-tongotrao ny kapanao fa masina io toerana ijoroanao io
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Ny manaisotra kapa eny an-tongotra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia mari-panajana ny fahamasinan’ny faritra iray, jereo Eks 3.5.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataon’i Josoa izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tamin’izay koa dia hoy ny TOMPO tamin’i Josoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Manaova antsy vato ho anao, ka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: forao
    - type: text
      text: ' ireto Israelita taranaka vaovao ireto.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nanao antsy vato ho azy i Josoa ka namora ny Israelita. Teo amin’ny toerana izay nantsoina hoe Gibehà-Haralôta na havoana famorana no nanaovana izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: 'Fony niala tany Ejipta ny vahoaka Israelita, ny lehilahy rehetra mahatam-piadiana dia samy efa voafora avokoa; nefa maty teny an-dalana tany an-taniefitra avokoa ireo. Fa ny zazalahy teraka teny an-dalana tany an-taniefitra kosa dia tsy mbola nisy voafora: izany no anton’ny namoran’i Josoa azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Efapolo taona no nandehanan’ny Israelita tany an-taniefitra. Lany ritra tamin’izany ny lehilahy afa-miantafika rehetra izay indray niala tany Ejipta, satria tsy nanaiky ny TOMPO ry zareo; ary efa nianianan’ny TOMPO ireo fa tsy hisy hahita ny tany izay nampanantenainy tamin’ny razany fa homena antsika, dia tany tondra-dronono sy tantely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tany tondra-dronono sy tantely: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 3.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny zanakalahin’ireo no najoron’ny TOMPO handimby azy ka noforan’i Josoa, noho izy tsy mbola voafora mihitsy satria tsy noforana teny an-dalana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary rehefa voafora avokoa izy rehetra, dia nijanona tao an-toby ihany aloha ambara-pahasitrany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Avy eo dia hoy ny TOMPO tamin’i Josoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Androany no nanesorako taminareo ny henatra izay nentinareo avy tany Ejipta.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no niantsoana an’io toerana io hoe Gilgala mandraka androany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Androany no nanesorako...Ejipta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny henatra noho ny tsy nahavoafora no resahina eto. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Gilgala
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 4.19 sy nta; io anarana io amin’ny teny hebreo dia iray fototra amin’ny matoanteny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: «manaisotra»
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Paska voalohany tao Kanahàna
    marker-yv: yv-h
