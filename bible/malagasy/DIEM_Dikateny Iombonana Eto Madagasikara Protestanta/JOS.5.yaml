document_id: JOS.5,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ny mpanjaka rehetra, tamin’ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' nonina teny andafy andrefan’i Jôrdàna sy tamin’ny Kanahanita nonina tany amoron’ny Ranomasina Mediteranea, dia nahare fa nataon’ny TOMPO maina ny falehan’ny ranon’i Jôrdàna teo anoloan’ny Israelita mandra-pitany; noho izany dia ketraka ny fon’ireo mpanjaka ireo ka tsy nanam-pahasahiana intsony ry zareo hanoherana ny Israelita.'
  - type: heading
    content: Famorana Israelita tao Gilgala
  - type: heading
    content: (Jereo Gen 17.9-14, 23-27; Kôl 2.11-12; Fil 4.9)
  '10':
  - type: text
    content: 'Dia nitoby tao Gilgala ny Israelita, teo amin’ny tany lemaka akaikin’i Jerikao, ka nankalaza ny '
  - type: text
    content: Paska
  - type: text
    content: ' fony harivan’ny andro faha-14 tamin’io volana io'
  - type: note
    content: 'ny andro faha-14 tamin’io volana io: jereo 4.19 sy nta; io no daty fankalazana ny Paska: jereo Eks 12.6.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ny ampitson’ny Paska dia nihinana mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ' sy lango avy amin’ny vokatry ny tany izy. '
  '12':
  - type: text
    content: Ny andro nihinanany ny vokatry ny tany dia nitsahatra ny mana ka tsy nisy mana ho an’ny Israelita intsony; satria izany taona izany no nihinanany ny vokatry ny tany Kanahàna
  - type: note
    content: 'mana: jereo Eks 16.13-35. –Kanahàna: anaran’ny tany nampanantenaina talohan’ny nahatongavan’ny Israelita.'
  - type: text
    content: .
  - type: heading
    content: Ilay lehiben’ny tafiky ny Tompo
  '13':
  - type: text
    content: 'Iny teo akaikin’i Jerikao iny i Josoa, dia nanopy maso nijery ka indro lehilahy iray nitsangana tandrifiny sady nitana sabatra voatsoaka teny an-tanany; dia nanatona azy i Josoa ka nanontany azy hoe:'
  - type: text
    content: –Namanay ve ianao sa naman’ny fahavalonay?
  '14':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Tsia, fa lehiben’ny tafiky ny TOMPO aho ka tonga atỳ ankehitriny.
  - type: text
    content: 'Dia niankohoka tamin’ny tany i Josoa ka niteny taminy hoe:'
  - type: text
    content: –Mpanomponao aho, tompoko; ka inona no baikonao amiko?
  '15':
  - type: text
    content: 'Dia hoy ilay lehiben’ny tafiky ny TOMPO tamin’i Josoa:'
  - type: text
    content: –Esory eny an-tongotrao ny kapanao fa masina io toerana ijoroanao io
  - type: note
    content: Ny manaisotra kapa eny an-tongotra dia mari-panajana ny fahamasinan’ny faritra iray, jereo Eks 3.5.
  - type: text
    content: .
  - type: text
    content: Dia nataon’i Josoa izany.
  '2':
  - type: text
    content: 'Tamin’izay koa dia hoy ny TOMPO tamin’i Josoa:'
  - type: text
    content: '–Manaova antsy vato ho anao, ka '
  - type: text
    content: forao
  - type: text
    content: ' ireto Israelita taranaka vaovao ireto.'
  '3':
  - type: text
    content: 'Dia nanao antsy vato ho azy i Josoa ka namora ny Israelita. Teo amin’ny toerana izay nantsoina hoe Gibehà-Haralôta na havoana famorana no nanaovana izany. '
  '4':
  - type: text
    content: 'Fony niala tany Ejipta ny vahoaka Israelita, ny lehilahy rehetra mahatam-piadiana dia samy efa voafora avokoa; nefa maty teny an-dalana tany an-taniefitra avokoa ireo. Fa ny zazalahy teraka teny an-dalana tany an-taniefitra kosa dia tsy mbola nisy voafora: izany no anton’ny namoran’i Josoa azy. '
  '6':
  - type: text
    content: Efapolo taona no nandehanan’ny Israelita tany an-taniefitra. Lany ritra tamin’izany ny lehilahy afa-miantafika rehetra izay indray niala tany Ejipta, satria tsy nanaiky ny TOMPO ry zareo; ary efa nianianan’ny TOMPO ireo fa tsy hisy hahita ny tany izay nampanantenainy tamin’ny razany fa homena antsika, dia tany tondra-dronono sy tantely
  - type: note
    content: 'tany tondra-dronono sy tantely: jereo Eks 3.8 sy nta.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ny zanakalahin’ireo no najoron’ny TOMPO handimby azy ka noforan’i Josoa, noho izy tsy mbola voafora mihitsy satria tsy noforana teny an-dalana. '
  '8':
  - type: text
    content: 'Ary rehefa voafora avokoa izy rehetra, dia nijanona tao an-toby ihany aloha ambara-pahasitrany. '
  '9':
  - type: text
    content: 'Avy eo dia hoy ny TOMPO tamin’i Josoa:'
  - type: text
    content: –Androany no nanesorako taminareo ny henatra izay nentinareo avy tany Ejipta.
  - type: text
    content: Izany no niantsoana an’io toerana io hoe Gilgala mandraka androany
  - type: note
    content: 'Androany no nanesorako...Ejipta: ny henatra noho ny tsy nahavoafora no resahina eto. –Gilgala: jereo 4.19 sy nta; io anarana io amin’ny teny hebreo dia iray fototra amin’ny matoanteny hoe «manaisotra».'
  - type: text
    content: .
  - type: heading
    content: Ny Paska voalohany tao Kanahàna
