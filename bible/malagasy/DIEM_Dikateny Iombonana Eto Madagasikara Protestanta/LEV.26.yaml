document_id: LEV.26,396
type_code: plt
verses:
  '1':
  - type: text
    content: «Aza manao andriamani-tsiizy, aza manangana sarin-tsampy voasokitra na manao tsangambaton-tsampy, aza manorina vato voaravaka hiankohofana eo amin’ny taninareo
  - type: note
    content: Jereo 19.4 sy nta.
  - type: text
    content: ; fa Izaho no TOMPO Andriamanitrareo.
  '10':
  - type: text
    content: 'Ho be ny vokatra miakatra ka haharitra hihinananareo ny vokatra tranainy ary hisy sisa hatao varo-boba fotsiny aza mba hasiana ny vao. '
  '11':
  - type: text
    content: 'Hiorim-ponenana eo afovoanareo Aho ary tsy ho tofoka aminareo. '
  '12':
  - type: text
    content: Handeha miaraka aminareo Aho, ka Izaho ho Andriamanitrareo ary ianareo ho vahoakako
  - type: note
    content: Jereo 2Kôr 6.16; Apôk 21.3.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Izaho no TOMPO Andriamanitrareo, Ilay namoaka anareo hiala tany Ejipta mba tsy hanandevozany anareo intsony; notapahiko ny zioga izay teo aminareo mba hitrakanareo fandeha.
  - type: heading
    content: Loza aman’antambo
  '14':
  - type: text
    content: '«Fa raha tàhiny tsy henoinareo kosa Aho, ka tsy tanterahinareo ireo didy rehetra ireo, '
  '15':
  - type: text
    content: 'raha hamavoinareo ny lalànako na halanareo ny fitsipiko, ka tsy tanterahinareo ny didiko rehetra fa ivadihanareo ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: ' taminareo, '
  '16':
  - type: text
    content: 'dia izao no hataoko anareo: loza mampivarahontsana no halefako hamelezana anareo, dia areti-mahasaozanina sy tazo mahery izay mahalali-maso sy mandreraka aina anareo; ary hafafinareo foana ny voa famafinareo, fa ny fahavalonareo no hihinana azy. '
  '17':
  - type: text
    content: Dia hohandriniko ianareo ka ho resy eo anoloan’ny fahavalonareo; ireo mpankahala anareo no hanapaka anareo; ary handositra ianareo, na dia tsy misy mpanenjika aza.
  '18':
  - type: text
    content: '«Raha amin’izany no tsy henoinareo ihany Aho, dia mbola hofaiziko impito henin’izany ianareo noho ny fahotanareo. '
  '19':
  - type: text
    content: 'Horavako ny hery ireharehanareo, ka ny lanitra tandrifinareo hataoko mafy toy ny vy ary ny tany volenareo hataoko mafy toy ny varahina. '
  '2':
  - type: text
    content: '«Tandremo ny '
  - type: text
    content: sabata
  - type: text
    content: ' nodidiako hitsaharana ary hajao ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' onenako. Izaho no TOMPO.'
  - type: heading
    content: Tsodrano amam-pitahiana
  '20':
  - type: text
    content: Ho lany foana ny herinareo, fa tsy hahavokatra ny tany volenareo ary tsy hamoa ny hazo.
  '21':
  - type: text
    content: '«Raha mbola toherinareo ihany Aho ka tsy henoinareo, dia hokapohiko impito henin’izany koa ianareo araka ny fahotanareo. '
  '22':
  - type: text
    content: Halefako hamely anareo ny bibidia, ka hamono ny zanakareo sy handringana ny biby fiompinareo; ary hahavitsy isa anareo ireny ka ho tonga taniefitra ny lalambenareo.
  '23':
  - type: text
    content: '«Raha amin’izany no tsy raisinareo ny anatro fa mbola toherinareo ihany Aho, '
  '24':
  - type: text
    content: 'dia Izaho mihitsy kosa no hamely anareo ka hokapohiko impito henin’izany ianareo noho ny fahotanareo. '
  '25':
  - type: text
    content: Ady no harongatro hamelezana anareo, ho sazin’ny nivadihanareo ny fanekempihavanako. Ary rehefa tafangona hialoka ao anaty tanànanareo ianareo, dia handefasako areti-mandringana eo aminareo
  - type: note
    content: Ny ady sy areti-mandringana (and 25) ary mosary (and 26) no kapoka telo mahabango ny loza mianjady amina tanàna atao fahirano; jereo Jer 21.7; Ezek 7.15.
  - type: text
    content: ' ary ho voatolotra eo an-tanan’ny fahavalo ianareo. '
  '26':
  - type: text
    content: Hotapahiko ny vary tohan’ainareo, ka lafaoro anankiray fanendasa-mofo ihany no hanendasan’ny vehivavy folo ny mofonareo; ary an-danjany kely dia kely no hizaràny azy, ka hihinana ianareo fa tsy ho voky.
  '27':
  - type: text
    content: '«Raha amin’izany no tsy henoinareo indray Aho fa mbola toherinareo ihany, '
  '28':
  - type: text
    content: 'dia hamely anareo amin’ny fahatezerako Aho; ka Izaho mihitsy no hitondra famaizana impito henin’izany noho ny fahotanareo. '
  '29':
  - type: text
    content: 'Ho mosarena ianareo ka hihinana ny nofon-janakalahy aman-janakavavinareo. '
  '3':
  - type: text
    content: '«Raha manaraka ny lalànako ianareo ka imasoanareo hotanterahina ny didiko, '
  '30':
  - type: text
    content: 'Haharikoriko Ahy ianareo, ka horavako ny toerana anajànareo sampy, hazerako ny tsangambato anompoanareo ny masoandro, ary ny fatinareo hampifanongoaviko eo ambonin’ny sampy rava. '
  '31':
  - type: text
    content: 'Horavako ny tanànanareo, ka hataoko tonga lao ny trano fivavahanareo, ary tsy hankasitrahiko velively ny hanitry ny '
  - type: text
    content: soronareo
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Hataoko tonga lao ny taninareo ka ho talanjon’izany ireo fahavalonareo, dia ireo fahavalo hiorim-ponenana ao. '
  '33':
  - type: text
    content: Ianareo kosa, ady no hapoakako hamelezana anareo ka haeliko any amin’ny firenen-kafa ianareo; dia ho lao ny taninareo ary ho rava ny tanànanareo.
  '34':
  - type: text
    content: «Amin’izany ny taninareo hahazo fitsaharana mandritra ny taona rehetra hahafoana azy rehefa any amin’ny tanin’ny fahavalonareo any ianareo; amin’izay tokoa ny taninareo no hiala sasatra ka hahazo fitsaharana
  - type: note
    content: Raha tsy tandrovin’ny Israelita ireo fe-potoana tokony hahazoan’ny tany fialàn-tsasatra (25.4-5), dia horoahin’Andriamanitra teo amin’ilay tany nampanantenaina izy ireo ary hahazo fialàn-tsasatra fanonerana kosa ny tany.
  - type: text
    content: '. '
  '35':
  - type: text
    content: Eny, mandritra ny taona rehetra hahafoana azy, dia hiala sasatra izy mba ho solon’izay fitsaharana tsy azony, fony ianareo mbola nonina teo aminy.
  '36':
  - type: text
    content: '«Izay sisa velona aminareo, any amin’ny tanin’ny fahavalony any, dia hampidirako fahareraham-po ka na ny fipikan’ny ravinkazo anankiray paohin-drivotra aza dia hampandositra azy; handositra ireo toy ny mandositra fahavalo mitan-tsabatra, ary ho lavo ireo na dia tsy misy mpanenjika aza. '
  '37':
  - type: text
    content: 'Ho lavo mifanindry ireo toy ny rehefa mandositra fahavalo mitan-tsabatra, na dia tsy misy mpanenjika aza, koa tsy hahatoha ny fahavalony akory. '
  '38':
  - type: text
    content: 'Ho lany ringana any amin’ny firenen-kafa ireo, ka ho lanin’ny tanin’ny fahavalony ihany. '
  '39':
  - type: text
    content: Noho ny heloka vitany sy ny heloka vitan’ny razany, ireo sisa velona aminareo dia ho levona any amin’ny tanin’ny fahavalony any.
  - type: heading
    content: Hotsarovan’Andriamanitra ny fanekempihavanany
  '4':
  - type: text
    content: 'dia homeko ny ranonorana sahaza anareo amin’ny fotoanandrony mba hahavokaran’ny tany ary hamoazan’ny hazo eny an-tsaha. '
  '40':
  - type: text
    content: '«Kanefa ireo sisa velona aminareo kosa hiaiky ny heloka vitany sy ny heloka vitan’ny razany, dia ny fahadisoana nataony tamiko; eny, hiaiky ireo fa noho ny fanoherany Ahy '
  '41':
  - type: text
    content: 'no nanoherako azy sy nandefasako azy ho any amin’ny tanin’ny fahavalony. Noho ny fony tsy voatokana ho Ahy, dia hietry tena ireo ka hanefa ny sazin’ny heloka nataony. '
  '42':
  - type: text
    content: 'Amin’izay no hahatsiarovako ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: ' tamin-dry i Jakôba sy i Itsehàka ary i Abrahama razambeny sady hahatsiarovako ny fampanantenana momba ilay taniny'
  - type: note
    content: Jereo Gen 12.7;17.7-8; 26.3-4; 28.13-14.
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'Ilay tany, izay nilaozan’ireo Israelita, dia hahazo fitsaharana mandritra ny fotoana hahafoana azy; fa hanefa ny sazin’ny heloka vitany kosa ireo Israelita, satria nandà ny fitsipiko ary nankahala ny lalànako. '
  '44':
  - type: text
    content: 'Kanefa, na amin’izany fotoana itoerany any amin’ny tanin’ny fahavalony any izany aza, dia tsy holaviko tanteraka izy ary tsy ho halako hataoko lany ringana na ho halako hanapahako ny fanekempihavanako taminy, satria Izaho no TOMPO Andriamaniny. '
  '45':
  - type: text
    content: Eny, hotsarovako hanasoavana azy ny fanekempihavanana nataoko tamin’ny razany, izay navoakako hiala tany Ejipta teo imason’ny firenen-kafa mba hahatonga Ahy ho Andriamaniny. Izaho no TOMPO.»
  '46':
  - type: text
    content: Ireo no lalàna sy fitsipika ary fampianarana izay ifampitondran’ny TOMPO amin’ny Israelita, ka nomen’ny TOMPO azy tamin’ny alalan’i Mosesy tany an-tendrombohitra Sinay.
  '5':
  - type: text
    content: Ho tratry ny fiotazam-boaloboka ny fivelezam-bary eo aminareo, ary ho tratry ny famafazana ny fiotazam-boaloboka; dia hihinana ianareo ka ho voky, ary handry feizay eo amin’ny taninareo
  - type: note
    content: 'And 3-5: jereo Deot 11.13-15.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Hasiako fiadanana eo amin’ny tany, ka handry tsy hisy hanaitra ianareo; fa hofongorako ny biby masiaka eo amin’ny tany, ary tsy mba handalovan’ady intsony izy. '
  '7':
  - type: text
    content: 'Hataonareo mandositra ny fahavalonareo ka ho lavon-tsabatra eo anoloanareo; '
  '8':
  - type: text
    content: 'hampandositra zato ny dimy aminareo ary hampandositra iray alina ny zato aminareo ka ho lavon-tsabatra eo anoloanareo ireny. '
  '9':
  - type: text
    content: 'Hijery anareo am-pitiavana Aho ka hahamaro ny taranakareo sy hampitombo anareo ary hitazona ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: ' aminareo. '
