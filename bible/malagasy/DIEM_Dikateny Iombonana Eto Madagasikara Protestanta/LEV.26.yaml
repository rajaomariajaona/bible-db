        children:
        - type: text
          text: mosary
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 26) no kapoka telo mahabango ny loza mianjady amina tanàna atao fahirano; jereo Jer 21.7; Ezek 7.15.'
      marker-yv: yv-n
    - type: text
      text: ' ary ho voatolotra eo an-tanan’ny fahavalo ianareo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hotapahiko ny vary tohan’ainareo, ka lafaoro anankiray fanendasa-mofo ihany no hanendasan’ny vehivavy folo ny mofonareo; ary an-danjany kely dia kely no hizaràny azy, ka hihinana ianareo fa tsy ho voky.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha amin’izany no tsy henoinareo indray Aho fa mbola toherinareo ihany, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hamely anareo amin’ny fahatezerako Aho; ka Izaho mihitsy no hitondra famaizana impito henin’izany noho ny fahotanareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho mosarena ianareo ka hihinana ny nofon-janakalahy aman-janakavavinareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha manaraka ny lalànako ianareo ka imasoanareo hotanterahina ny didiko, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haharikoriko Ahy ianareo, ka horavako ny toerana anajànareo sampy, hazerako ny tsangambato anompoanareo ny masoandro, ary ny fatinareo hampifanongoaviko eo ambonin’ny sampy rava. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horavako ny tanànanareo, ka hataoko tonga lao ny trano fivavahanareo, ary tsy hankasitrahiko velively ny hanitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: soronareo
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hataoko tonga lao ny taninareo ka ho talanjon’izany ireo fahavalonareo, dia ireo fahavalo hiorim-ponenana ao. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ianareo kosa, ady no hapoakako hamelezana anareo ka haeliko any amin’ny firenen-kafa ianareo; dia ho lao ny taninareo ary ho rava ny tanànanareo.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Amin’izany ny taninareo hahazo fitsaharana mandritra ny taona rehetra hahafoana azy rehefa any amin’ny tanin’ny fahavalonareo any ianareo; amin’izay tokoa ny taninareo no hiala sasatra ka hahazo fitsaharana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Raha tsy tandrovin’ny Israelita ireo fe-potoana tokony hahazoan’ny tany fialàn-tsasatra (25.4-5), dia horoahin’Andriamanitra teo amin’ilay tany nampanantenaina izy ireo ary hahazo fialàn-tsasatra fanonerana kosa ny tany.
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, mandritra ny taona rehetra hahafoana azy, dia hiala sasatra izy mba ho solon’izay fitsaharana tsy azony, fony ianareo mbola nonina teo aminy.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izay sisa velona aminareo, any amin’ny tanin’ny fahavalony any, dia hampidirako fahareraham-po ka na ny fipikan’ny ravinkazo anankiray paohin-drivotra aza dia hampandositra azy; handositra ireo toy ny mandositra fahavalo mitan-tsabatra, ary ho lavo ireo na dia tsy misy mpanenjika aza. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho lavo mifanindry ireo toy ny rehefa mandositra fahavalo mitan-tsabatra, na dia tsy misy mpanenjika aza, koa tsy hahatoha ny fahavalony akory. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho lany ringana any amin’ny firenen-kafa ireo, ka ho lanin’ny tanin’ny fahavalony ihany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho ny heloka vitany sy ny heloka vitan’ny razany, ireo sisa velona aminareo dia ho levona any amin’ny tanin’ny fahavalony any.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hotsarovan’Andriamanitra ny fanekempihavanany
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia homeko ny ranonorana sahaza anareo amin’ny fotoanandrony mba hahavokaran’ny tany ary hamoazan’ny hazo eny an-tsaha. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Kanefa ireo sisa velona aminareo kosa hiaiky ny heloka vitany sy ny heloka vitan’ny razany, dia ny fahadisoana nataony tamiko; eny, hiaiky ireo fa noho ny fanoherany Ahy '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'no nanoherako azy sy nandefasako azy ho any amin’ny tanin’ny fahavalony. Noho ny fony tsy voatokana ho Ahy, dia hietry tena ireo ka hanefa ny sazin’ny heloka nataony. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izay no hahatsiarovako ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanako
    - type: text
      text: ' tamin-dry i Jakôba sy i Itsehàka ary i Abrahama razambeny sady hahatsiarovako ny fampanantenana momba ilay taniny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 12.7;17.7-8; 26.3-4; 28.13-14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay tany, izay nilaozan’ireo Israelita, dia hahazo fitsaharana mandritra ny fotoana hahafoana azy; fa hanefa ny sazin’ny heloka vitany kosa ireo Israelita, satria nandà ny fitsipiko ary nankahala ny lalànako. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa, na amin’izany fotoana itoerany any amin’ny tanin’ny fahavalony any izany aza, dia tsy holaviko tanteraka izy ary tsy ho halako hataoko lany ringana na ho halako hanapahako ny fanekempihavanako taminy, satria Izaho no TOMPO Andriamaniny. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, hotsarovako hanasoavana azy ny fanekempihavanana nataoko tamin’ny razany, izay navoakako hiala tany Ejipta teo imason’ny firenen-kafa mba hahatonga Ahy ho Andriamaniny. Izaho no TOMPO.»
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no lalàna sy fitsipika ary fampianarana izay ifampitondran’ny TOMPO amin’ny Israelita, ka nomen’ny TOMPO azy tamin’ny alalan’i Mosesy tany an-tendrombohitra Sinay.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho tratry ny fiotazam-boaloboka ny fivelezam-bary eo aminareo, ary ho tratry ny famafazana ny fiotazam-boaloboka; dia hihinana ianareo ka ho voky, ary handry feizay eo amin’ny taninareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.5 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 3-5:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Deot 11.13-15.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hasiako fiadanana eo amin’ny tany, ka handry tsy hisy hanaitra ianareo; fa hofongorako ny biby masiaka eo amin’ny tany, ary tsy mba handalovan’ady intsony izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hataonareo mandositra ny fahavalonareo ka ho lavon-tsabatra eo anoloanareo; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hampandositra zato ny dimy aminareo ary hampandositra iray alina ny zato aminareo ka ho lavon-tsabatra eo anoloanareo ireny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hijery anareo am-pitiavana Aho ka hahamaro ny taranakareo sy hampitombo anareo ary hitazona ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanako
    - type: text
      text: ' aminareo. '
