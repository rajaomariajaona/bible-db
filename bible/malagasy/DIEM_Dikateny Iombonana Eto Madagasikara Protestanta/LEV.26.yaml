          text: Jereo 2Kôr 6.16; Apôk 21.3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho no TOMPO Andriamanitrareo, Ilay namoaka anareo hiala tany Ejipta mba tsy hanandevozany anareo intsony; notapahiko ny zioga izay teo aminareo mba hitrakanareo fandeha.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loza aman’antambo
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fa raha tàhiny tsy henoinareo kosa Aho, ka tsy tanterahinareo ireo didy rehetra ireo, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha hamavoinareo ny lalànako na halanareo ny fitsipiko, ka tsy tanterahinareo ny didiko rehetra fa ivadihanareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanako
    - type: text
      text: ' taminareo, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izao no hataoko anareo: loza mampivarahontsana no halefako hamelezana anareo, dia areti-mahasaozanina sy tazo mahery izay mahalali-maso sy mandreraka aina anareo; ary hafafinareo foana ny voa famafinareo, fa ny fahavalonareo no hihinana azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hohandriniko ianareo ka ho resy eo anoloan’ny fahavalonareo; ireo mpankahala anareo no hanapaka anareo; ary handositra ianareo, na dia tsy misy mpanenjika aza.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha amin’izany no tsy henoinareo ihany Aho, dia mbola hofaiziko impito henin’izany ianareo noho ny fahotanareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horavako ny hery ireharehanareo, ka ny lanitra tandrifinareo hataoko mafy toy ny vy ary ny tany volenareo hataoko mafy toy ny varahina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Tandremo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' nodidiako hitsaharana ary hajao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' onenako. Izaho no TOMPO.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsodrano amam-pitahiana
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho lany foana ny herinareo, fa tsy hahavokatra ny tany volenareo ary tsy hamoa ny hazo.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha mbola toherinareo ihany Aho ka tsy henoinareo, dia hokapohiko impito henin’izany koa ianareo araka ny fahotanareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Halefako hamely anareo ny bibidia, ka hamono ny zanakareo sy handringana ny biby fiompinareo; ary hahavitsy isa anareo ireny ka ho tonga taniefitra ny lalambenareo.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha amin’izany no tsy raisinareo ny anatro fa mbola toherinareo ihany Aho, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia Izaho mihitsy kosa no hamely anareo ka hokapohiko impito henin’izany ianareo noho ny fahotanareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ady no harongatro hamelezana anareo, ho sazin’ny nivadihanareo ny fanekempihavanako. Ary rehefa tafangona hialoka ao anaty tanànanareo ianareo, dia handefasako areti-mandringana eo aminareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
