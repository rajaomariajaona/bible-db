document_id: LEV.26
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: «Aza manao andriamani-tsiizy, aza manangana sarin-tsampy voasokitra na manao tsangambaton-tsampy, aza manorina vato voaravaka hiankohofana eo amin’ny taninareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 19.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: ; fa Izaho no TOMPO Andriamanitrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Tandremo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' nodidiako hitsaharana ary hajao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' onenako. Izaho no TOMPO.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsodrano amam-pitahiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Raha manaraka ny lalànako ianareo ka imasoanareo hotanterahina ny didiko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia homeko ny ranonorana sahaza anareo amin’ny fotoanandrony mba hahavokaran’ny tany ary hamoazan’ny hazo eny an-tsaha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ho tratry ny fiotazam-boaloboka ny fivelezam-bary eo aminareo, ary ho tratry ny famafazana ny fiotazam-boaloboka; dia hihinana ianareo ka ho voky, ary handry feizay eo amin’ny taninareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 3-5:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Deot 11.13-15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hasiako fiadanana eo amin’ny tany, ka handry tsy hisy hanaitra ianareo; fa hofongorako ny biby masiaka eo amin’ny tany, ary tsy mba handalovan’ady intsony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hataonareo mandositra ny fahavalonareo ka ho lavon-tsabatra eo anoloanareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'hampandositra zato ny dimy aminareo ary hampandositra iray alina ny zato aminareo ka ho lavon-tsabatra eo anoloanareo ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hijery anareo am-pitiavana Aho ka hahamaro ny taranakareo sy hampitombo anareo ary hitazona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanako
  - type: text
    text: ' aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ho be ny vokatra miakatra ka haharitra hihinananareo ny vokatra tranainy ary hisy sisa hatao varo-boba fotsiny aza mba hasiana ny vao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hiorim-ponenana eo afovoanareo Aho ary tsy ho tofoka aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Handeha miaraka aminareo Aho, ka Izaho ho Andriamanitrareo ary ianareo ho vahoakako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2Kôr 6.16; Apôk 21.3.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izaho no TOMPO Andriamanitrareo, Ilay namoaka anareo hiala tany Ejipta mba tsy hanandevozany anareo intsony; notapahiko ny zioga izay teo aminareo mba hitrakanareo fandeha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loza aman’antambo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '«Fa raha tàhiny tsy henoinareo kosa Aho, ka tsy tanterahinareo ireo didy rehetra ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'raha hamavoinareo ny lalànako na halanareo ny fitsipiko, ka tsy tanterahinareo ny didiko rehetra fa ivadihanareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanako
  - type: text
    text: ' taminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia izao no hataoko anareo: loza mampivarahontsana no halefako hamelezana anareo, dia areti-mahasaozanina sy tazo mahery izay mahalali-maso sy mandreraka aina anareo; ary hafafinareo foana ny voa famafinareo, fa ny fahavalonareo no hihinana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia hohandriniko ianareo ka ho resy eo anoloan’ny fahavalonareo; ireo mpankahala anareo no hanapaka anareo; ary handositra ianareo, na dia tsy misy mpanenjika aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '«Raha amin’izany no tsy henoinareo ihany Aho, dia mbola hofaiziko impito henin’izany ianareo noho ny fahotanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Horavako ny hery ireharehanareo, ka ny lanitra tandrifinareo hataoko mafy toy ny vy ary ny tany volenareo hataoko mafy toy ny varahina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ho lany foana ny herinareo, fa tsy hahavokatra ny tany volenareo ary tsy hamoa ny hazo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Raha mbola toherinareo ihany Aho ka tsy henoinareo, dia hokapohiko impito henin’izany koa ianareo araka ny fahotanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Halefako hamely anareo ny bibidia, ka hamono ny zanakareo sy handringana ny biby fiompinareo; ary hahavitsy isa anareo ireny ka ho tonga taniefitra ny lalambenareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Raha amin’izany no tsy raisinareo ny anatro fa mbola toherinareo ihany Aho, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia Izaho mihitsy kosa no hamely anareo ka hokapohiko impito henin’izany ianareo noho ny fahotanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ady no harongatro hamelezana anareo, ho sazin’ny nivadihanareo ny fanekempihavanako. Ary rehefa tafangona hialoka ao anaty tanànanareo ianareo, dia handefasako areti-mandringana eo aminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ady
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: areti-mandringana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 25) ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mosary
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 26) no kapoka telo mahabango ny loza mianjady amina tanàna atao fahirano; jereo Jer 21.7; Ezek 7.15.'
    marker-yv: yv-n
  - type: text
    text: ' ary ho voatolotra eo an-tanan’ny fahavalo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hotapahiko ny vary tohan’ainareo, ka lafaoro anankiray fanendasa-mofo ihany no hanendasan’ny vehivavy folo ny mofonareo; ary an-danjany kely dia kely no hizaràny azy, ka hihinana ianareo fa tsy ho voky.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Raha amin’izany no tsy henoinareo indray Aho fa mbola toherinareo ihany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'dia hamely anareo amin’ny fahatezerako Aho; ka Izaho mihitsy no hitondra famaizana impito henin’izany noho ny fahotanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ho mosarena ianareo ka hihinana ny nofon-janakalahy aman-janakavavinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Haharikoriko Ahy ianareo, ka horavako ny toerana anajànareo sampy, hazerako ny tsangambato anompoanareo ny masoandro, ary ny fatinareo hampifanongoaviko eo ambonin’ny sampy rava. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Horavako ny tanànanareo, ka hataoko tonga lao ny trano fivavahanareo, ary tsy hankasitrahiko velively ny hanitry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: soronareo
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hataoko tonga lao ny taninareo ka ho talanjon’izany ireo fahavalonareo, dia ireo fahavalo hiorim-ponenana ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ianareo kosa, ady no hapoakako hamelezana anareo ka haeliko any amin’ny firenen-kafa ianareo; dia ho lao ny taninareo ary ho rava ny tanànanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: «Amin’izany ny taninareo hahazo fitsaharana mandritra ny taona rehetra hahafoana azy rehefa any amin’ny tanin’ny fahavalonareo any ianareo; amin’izay tokoa ny taninareo no hiala sasatra ka hahazo fitsaharana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Raha tsy tandrovin’ny Israelita ireo fe-potoana tokony hahazoan’ny tany fialàn-tsasatra (25.4-5), dia horoahin’Andriamanitra teo amin’ilay tany nampanantenaina izy ireo ary hahazo fialàn-tsasatra fanonerana kosa ny tany.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Eny, mandritra ny taona rehetra hahafoana azy, dia hiala sasatra izy mba ho solon’izay fitsaharana tsy azony, fony ianareo mbola nonina teo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '«Izay sisa velona aminareo, any amin’ny tanin’ny fahavalony any, dia hampidirako fahareraham-po ka na ny fipikan’ny ravinkazo anankiray paohin-drivotra aza dia hampandositra azy; handositra ireo toy ny mandositra fahavalo mitan-tsabatra, ary ho lavo ireo na dia tsy misy mpanenjika aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ho lavo mifanindry ireo toy ny rehefa mandositra fahavalo mitan-tsabatra, na dia tsy misy mpanenjika aza, koa tsy hahatoha ny fahavalony akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ho lany ringana any amin’ny firenen-kafa ireo, ka ho lanin’ny tanin’ny fahavalony ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Noho ny heloka vitany sy ny heloka vitan’ny razany, ireo sisa velona aminareo dia ho levona any amin’ny tanin’ny fahavalony any.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hotsarovan’Andriamanitra ny fanekempihavanany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: '«Kanefa ireo sisa velona aminareo kosa hiaiky ny heloka vitany sy ny heloka vitan’ny razany, dia ny fahadisoana nataony tamiko; eny, hiaiky ireo fa noho ny fanoherany Ahy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'no nanoherako azy sy nandefasako azy ho any amin’ny tanin’ny fahavalony. Noho ny fony tsy voatokana ho Ahy, dia hietry tena ireo ka hanefa ny sazin’ny heloka nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Amin’izay no hahatsiarovako ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanako
  - type: text
    text: ' tamin-dry i Jakôba sy i Itsehàka ary i Abrahama razambeny sady hahatsiarovako ny fampanantenana momba ilay taniny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 12.7;17.7-8; 26.3-4; 28.13-14.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ilay tany, izay nilaozan’ireo Israelita, dia hahazo fitsaharana mandritra ny fotoana hahafoana azy; fa hanefa ny sazin’ny heloka vitany kosa ireo Israelita, satria nandà ny fitsipiko ary nankahala ny lalànako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Kanefa, na amin’izany fotoana itoerany any amin’ny tanin’ny fahavalony any izany aza, dia tsy holaviko tanteraka izy ary tsy ho halako hataoko lany ringana na ho halako hanapahako ny fanekempihavanako taminy, satria Izaho no TOMPO Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Eny, hotsarovako hanasoavana azy ny fanekempihavanana nataoko tamin’ny razany, izay navoakako hiala tany Ejipta teo imason’ny firenen-kafa mba hahatonga Ahy ho Andriamaniny. Izaho no TOMPO.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ireo no lalàna sy fitsipika ary fampianarana izay ifampitondran’ny TOMPO amin’ny Israelita, ka nomen’ny TOMPO azy tamin’ny alalan’i Mosesy tany an-tendrombohitra Sinay.
