    children:
    - type: text
      text: BOKY FAHADIMY
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: (Salamo 107–150)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Fisaorana an’Andriamanitra mpanafaka
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Miderà ny TOMPO ianareo fa tsara Izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –eny, maharitra mandrakizay ny fitiavany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 106.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: '!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao ireo nipetraka tao am-ponja maizim-pito,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voagejam-pahoriana sy voagadra vy,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nikomy tamin’ny tenin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady naniratsira ny anatr’ilay Avo Indrindra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nofolahiny tamin’ny fahoriana ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: potraka izy, nefa tsy nisy mpanarina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia niantso vonjy tamin’ny TOMPO izy fa ory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nafahany tamin’ny fahatereny,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: navoakany tamin’ny haizim-pito
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady novahany fatorana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy hidera ny TOMPO noho ny fitiavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zava-mahagaga vitany ho an’ny olombelona,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny vavahady varahina novakîny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hidy vy notapatapahiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 45.2.
      marker-yv: yv-n
    - type: text
      text: '!'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao ireo adala toetra nijaly tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny hadisoana sy ny heloka vitany,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nomonamonainan’ny sakafo rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa teo ambavahaonan’ny fahafatesana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia niantso vonjy tamin’ny TOMPO izy fa ory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nafahany tamin’ny fahatereny,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiredona izany ny navotan’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo navotany ho afaka teo an-tanan’ny mpampahory
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nandefasany ny teniny, dia sitrana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary notsoahany tao anaty lavaka.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy hidera ny TOMPO noho ny fitiavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zava-mahagaga vitany ho an’ny olombelona!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka izy hanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorom
    - type: text
      text: -piderana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hihoby mitanisa ny asan’Andriamanitra!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao ireo niainga hiantsambo an-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanao raharaha teny ambony ranobe,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia indreo nahita ny asan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zava-mahagaga nataony an-drano lalina.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa vao niteny ny Tompo, dia nirongatra ny rivo-mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampisamboaravoara ny onjan-dranomasina.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sambo nisavoana nanakatra ny lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nitontona ao an-davaky ny onja;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fadiranovana toa miempo ny ain’ny mpiantsambo.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fanina izy sady nivembena toy ny mamo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka very avokoa izay mba hakingàny.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia niantso vonjy tamin’ny TOMPO izy fa ory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka notsoahany tamin’ny fahatereny.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rivo-mahery novany ho tsiotsioka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny onjan-drano nihanalefaka;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nangoniny avy tany amin’ny tany rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atsinanana sy andrefana, avaratra sy atsimo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'atsimo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny TM dia manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ranomasina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', kanefa ampit Sal 89.13.'
      marker-yv: yv-n
    - type: text
      text: '!'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia faly ny mpiantsambo fa nisy fitoniana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nentin’ny Tompo an-tseranana irîna.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy hidera ny TOMPO noho ny fitiavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zava-mahagaga vitany ho an’ny olombelona!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hanandratra Azy ny vahoaka tafangona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary hidera Azy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' tafavory!'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Tompo no manova ny ony ho taniefitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny loharano ho tany mangentana
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tany lonaka ho tanin-tsira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny faharatsian’ny mponina eo.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa koa ny taniefitra ovàny ho farihy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tany karankaina ho feno loharano
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamponenana ireo noana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hanorin-tanàna honenana,
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamafy eny an-tsaha sy hamboly voaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanangona ny vokatr’ireny.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tahîn
    - type: text
      text: ’ny Tompo izy ka mihamaro fatratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny biby fiompiny koa tsy avelany hihavitsy.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy kosa firenena mihavitsy sy mietry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahoriana sy ny loza ary ny alahelo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao ireo nirenireny tany an-taniefitra aman-tany foana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nahita tanàna honenana akory,
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataon’ny Tompo rakotra henatra ny mpifehy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mirenireny an-tany foana tsy misy lalana;
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa atrakany ho afa-pahoriana kosa ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamaroiny toy ny andian’ondry ny fianakaviany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 33-41: jereo 1 Sam 2.4-8; Is 40.4; Ham 5.8; Lk 1.51-53.'
      marker-yv: yv-n
    - type: text
      text: .
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahita izany ny olo-mahitsy ka mifaly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mikombom-bava kosa ny olon-dratsy rehetra.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hendry, aoka hisaintsaina izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hahatsapa ny fitiavan’ny TOMPO!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noana sy nangetaheta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady reraka aina koa tao anatiny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia niantso vonjy tamin’ny TOMPO izy fa ory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nafahany tamin’ny fahatereny,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nentiny tamin’ny lala-mahitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahatongavana an-tanàna honenana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy hidera ny TOMPO noho ny fitiavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zava-mahagaga vitany ho an’ny olombelona,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny main’ny hetaheta nomeny hosotroina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny reraky ny hanoanana novokisany soa!
