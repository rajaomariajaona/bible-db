document_id: PSA.107,396
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY FAHADIMY
  - type: heading
    content: (Salamo 107–150)
  - type: heading
    content: SALAMO Fisaorana an’Andriamanitra mpanafaka
  - type: text
    content: 'Miderà ny TOMPO ianareo fa tsara Izy:'
  - type: text
    content: –eny, maharitra mandrakizay ny fitiavany
  - type: note
    content: Jereo Sal 106.1 sy nta.
  - type: text
    content: '!'
  '10':
  - type: text
    content: Tao ireo nipetraka tao am-ponja maizim-pito,
  - type: text
    content: voagejam-pahoriana sy voagadra vy,
  '11':
  - type: text
    content: satria nikomy tamin’ny tenin’Andriamanitra
  - type: text
    content: sady naniratsira ny anatr’ilay Avo Indrindra.
  '12':
  - type: text
    content: Dia nofolahiny tamin’ny fahoriana ny fony;
  - type: text
    content: potraka izy, nefa tsy nisy mpanarina.
  '13':
  - type: text
    content: Dia niantso vonjy tamin’ny TOMPO izy fa ory
  - type: text
    content: ka nafahany tamin’ny fahatereny,
  '14':
  - type: text
    content: navoakany tamin’ny haizim-pito
  - type: text
    content: sady novahany fatorana.
  '15':
  - type: text
    content: Aoka izy hidera ny TOMPO noho ny fitiavany
  - type: text
    content: sy ny zava-mahagaga vitany ho an’ny olombelona,
  '16':
  - type: text
    content: satria ny vavahady varahina novakîny
  - type: text
    content: ary ny hidy vy notapatapahiny
  - type: note
    content: Jereo Is 45.2.
  - type: text
    content: '!'
  '17':
  - type: text
    content: Tao ireo adala toetra nijaly tokoa
  - type: text
    content: noho ny hadisoana sy ny heloka vitany,
  '18':
  - type: text
    content: ka nomonamonainan’ny sakafo rehetra
  - type: text
    content: ary efa teo ambavahaonan’ny fahafatesana.
  '19':
  - type: text
    content: Dia niantso vonjy tamin’ny TOMPO izy fa ory
  - type: text
    content: ka nafahany tamin’ny fahatereny,
  '2':
  - type: text
    content: Aoka hiredona izany ny navotan’ny TOMPO,
  - type: text
    content: dia ireo navotany ho afaka teo an-tanan’ny mpampahory
  '20':
  - type: text
    content: nandefasany ny teniny, dia sitrana
  - type: text
    content: ary notsoahany tao anaty lavaka.
  '21':
  - type: text
    content: Aoka izy hidera ny TOMPO noho ny fitiavany
  - type: text
    content: sy ny zava-mahagaga vitany ho an’ny olombelona!
  '22':
  - type: text
    content: 'Aoka izy hanolotra '
  - type: text
    content: sorom
  - type: text
    content: -piderana
  - type: text
    content: sy hihoby mitanisa ny asan’Andriamanitra!
  '23':
  - type: text
    content: Tao ireo niainga hiantsambo an-dranomasina
  - type: text
    content: sy nanao raharaha teny ambony ranobe,
  '24':
  - type: text
    content: dia indreo nahita ny asan’ny TOMPO
  - type: text
    content: sy ny zava-mahagaga nataony an-drano lalina.
  '25':
  - type: text
    content: Fa vao niteny ny Tompo, dia nirongatra ny rivo-mahery
  - type: text
    content: ka nampisamboaravoara ny onjan-dranomasina.
  '26':
  - type: text
    content: Ny sambo nisavoana nanakatra ny lanitra,
  - type: text
    content: dia nitontona ao an-davaky ny onja;
  - type: text
    content: fadiranovana toa miempo ny ain’ny mpiantsambo.
  '27':
  - type: text
    content: Fanina izy sady nivembena toy ny mamo,
  - type: text
    content: ka very avokoa izay mba hakingàny.
  '28':
  - type: text
    content: Dia niantso vonjy tamin’ny TOMPO izy fa ory
  - type: text
    content: ka notsoahany tamin’ny fahatereny.
  '29':
  - type: text
    content: Ny rivo-mahery novany ho tsiotsioka,
  - type: text
    content: ary ny onjan-drano nihanalefaka;
  '3':
  - type: text
    content: ka nangoniny avy tany amin’ny tany rehetra
  - type: text
    content: atsinanana sy andrefana, avaratra sy atsimo
  - type: note
    content: 'atsimo: ny TM dia manao hoe ranomasina, kanefa ampit Sal 89.13.'
  - type: text
    content: '!'
  '30':
  - type: text
    content: dia faly ny mpiantsambo fa nisy fitoniana
  - type: text
    content: sady nentin’ny Tompo an-tseranana irîna.
  '31':
  - type: text
    content: Aoka izy hidera ny TOMPO noho ny fitiavany
  - type: text
    content: sy ny zava-mahagaga vitany ho an’ny olombelona!
  '32':
  - type: text
    content: Aoka hanandratra Azy ny vahoaka tafangona
  - type: text
    content: 'ary hidera Azy ny '
  - type: text
    content: loholona
  - type: text
    content: ' tafavory!'
  '33':
  - type: text
    content: Ny Tompo no manova ny ony ho taniefitra
  - type: text
    content: sy ny loharano ho tany mangentana
  '34':
  - type: text
    content: ary ny tany lonaka ho tanin-tsira,
  - type: text
    content: noho ny faharatsian’ny mponina eo.
  '35':
  - type: text
    content: Kanefa koa ny taniefitra ovàny ho farihy,
  - type: text
    content: ny tany karankaina ho feno loharano
  '36':
  - type: text
    content: mba hamponenana ireo noana
  - type: text
    content: izay hanorin-tanàna honenana,
  '37':
  - type: text
    content: hamafy eny an-tsaha sy hamboly voaloboka
  - type: text
    content: ka hanangona ny vokatr’ireny.
  '38':
  - type: text
    content: ' '
  - type: text
    content: Tahîn
  - type: text
    content: ’ny Tompo izy ka mihamaro fatratra;
  - type: text
    content: ny biby fiompiny koa tsy avelany hihavitsy.
  '39':
  - type: text
    content: Fa misy kosa firenena mihavitsy sy mietry
  - type: text
    content: noho ny fahoriana sy ny loza ary ny alahelo.
  '4':
  - type: text
    content: Tao ireo nirenireny tany an-taniefitra aman-tany foana,
  - type: text
    content: tsy nahita tanàna honenana akory,
  '40':
  - type: text
    content: Ataon’ny Tompo rakotra henatra ny mpifehy
  - type: text
    content: ka mirenireny an-tany foana tsy misy lalana;
  '41':
  - type: text
    content: fa atrakany ho afa-pahoriana kosa ny mahantra
  - type: text
    content: ary hamaroiny toy ny andian’ondry ny fianakaviany
  - type: note
    content: 'And 33-41: jereo 1 Sam 2.4-8; Is 40.4; Ham 5.8; Lk 1.51-53.'
  - type: text
    content: .
  '42':
  - type: text
    content: Mahita izany ny olo-mahitsy ka mifaly;
  - type: text
    content: fa mikombom-bava kosa ny olon-dratsy rehetra.
  '43':
  - type: text
    content: Izay hendry, aoka hisaintsaina izany
  - type: text
    content: sy hahatsapa ny fitiavan’ny TOMPO!
  '5':
  - type: text
    content: noana sy nangetaheta,
  - type: text
    content: sady reraka aina koa tao anatiny.
  '6':
  - type: text
    content: Dia niantso vonjy tamin’ny TOMPO izy fa ory
  - type: text
    content: ka nafahany tamin’ny fahatereny,
  '7':
  - type: text
    content: nentiny tamin’ny lala-mahitsy
  - type: text
    content: hahatongavana an-tanàna honenana.
  '8':
  - type: text
    content: Aoka izy hidera ny TOMPO noho ny fitiavany
  - type: text
    content: sy ny zava-mahagaga vitany ho an’ny olombelona,
  '9':
  - type: text
    content: fa ny main’ny hetaheta nomeny hosotroina
  - type: text
    content: ary ny reraky ny hanoanana novokisany soa!
