document_id: 2SA.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida voahosotra ho mpanjakan’i Israely
  - type: heading
    content: (Jereo 1 Tan 11.1-3)
  - type: text
    content: Dia tonga tao amin’i Davida tao Hebrôna
  - type: note
    content: 'Hebrôna: jereo 2.1-4.'
  - type: text
    content: ' ny fokon’i Israely rehetra ka nanao taminy hoe:'
  - type: text
    content: '–Indreto izahay havanao sy tapakao. '
  '10':
  - type: text
    content: Dia nihanatanjaka hatrany i Davida, satria ny TOMPO Andriamanitr’izao rehetra izao no niaraka taminy.
  '11':
  - type: text
    content: 'Naniraka olona hankany amin’i Davida i Hirama mpanjakan’i Tiro mba hitondra hazo sedera sy mpandrafitra ary mpipai-bato. Dia nanangana trano ho an’i Davida ireo. '
  '12':
  - type: text
    content: Fantatr’i Davida fa ny TOMPO no efa nampanjaka azy tamin’i Israely ary nanandratra ny fanjakany noho ny amin’i Israely vahoakany.
  - type: heading
    content: Ireo zanakalahin’i Davida teraka tao Jerosalema
  - type: heading
    content: (Jereo 1 Tan 3.5-9; 14.3-7)
  '13':
  - type: text
    content: 'Rehefa niala tao Hebrôna ka tonga tany Jerosalema i Davida, dia mbola naka vaditsindrano sy vady hafa koa izay niterahany zanakalahy sy zanakavavy. '
  '14':
  - type: text
    content: 'Ireto avy no anaran’izay naterany tany Jerosalema: i Samòa'
  - type: note
    content: 'Samòa: indraindray antsoina hoe Simehà (1 Tan 3.5.).'
  - type: text
    content: ' sy i Sôbaba, i Natàna sy i Salômôna, '
  '15':
  - type: text
    content: 'i Jibehara sy i Elisoa, i Nefega sy i Jafia, '
  '16':
  - type: text
    content: i Elisamà sy i Eliadà
  - type: note
    content: 'Eliadà: indraindray antsoina hoe Beheliadà (1 Tan 14.7).'
  - type: text
    content: ' ary i Elifelety.'
  - type: heading
    content: Fandresen’i Davida ny Filistinina
  - type: heading
    content: (Jereo 1 Tan 14.8-16)
  '17':
  - type: text
    content: Nony ren’ny Filistinina fa nohosorana ho mpanjakan’i Israely i Davida dia niakatra avokoa izy rehetra mba hambabo an’i Davida. Raha nahare izany koa i Davida, dia nidina nankao amin’ny fialofana mimanda
  - type: note
    content: 'fialofana mimanda: mety ho ny an’i Hadolama, jereo 1 Sam 22.1-5; 24.23.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: Nony tonga ny Filistinina dia niparitaka teny amin’ny lohasahan’ny Refaîta
  - type: note
    content: Ny lohasahan’ny Refaîta dia ao atsimo andrefan’i Jerosalema.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Nanontany ny TOMPO i Davida nanao hoe:'
  - type: text
    content: –Hiakatra hanafika ny Filistinina ve aho? Hatolotrao eo an-tanako ve izy ireo?
  - type: text
    content: 'Dia hoy ny TOMPO namaly an’i Davida:'
  - type: text
    content: –Eny, miakara fa hatolotro eo an-tananao tokoa ny Filistinina.
  '2':
  - type: text
    content: 'Fahiny, fony mbola nanjaka taminay aza i Saoly, dia ianao no mpitarika ny miaramilan’i Israely tamin’ny ady; ary ny TOMPO efa nilaza taminao hoe: «Ianao no hitondra ilay Israely vahoakako, ary ianao no ho filohany.»'
  '20':
  - type: text
    content: 'Tonga tao Bahala-Peratsima i Davida ka nandresy ny Filistinina, ary nilaza hoe:'
  - type: text
    content: –Ny Tompo efa nahavaky ny fahavaloko teo anatrehako hipariakany toy ny rano vaky.
  - type: text
    content: 'Izany no nanaovana io toerana io hoe: «Bahala-Peratsima» na «Tompon’ny fahavakiana». '
  '21':
  - type: text
    content: Ary nilaozan’ny Filistinina teo ny sampiny, ka nalain’i Davida sy ny olony.
  '22':
  - type: text
    content: 'Mbola niverina niakatra teo amin’ny lohasahan’ny Refaîta indray ny Filistinina ka niparitaka teo. '
  '23':
  - type: text
    content: 'Dia nanontany ny TOMPO indray i Davida ka novaliany hoe:'
  - type: text
    content: '–Aza miakatra fa hodidino avy any aoriana izy, dia hanatona azy avy eo amin’ny tandrifin’ny foto-boaroihazo ianao. '
  '24':
  - type: text
    content: Rehefa nahare hoatra fingadongadon’olona eny an-tendron-kazo ianao, dia mihetseha faingana; satria amin’izay ny TOMPO no hiainga eo alohanao mba handresy ny tafiky ny Filistinina.
  '25':
  - type: text
    content: Dia nanao araka ny nandidian’ny TOMPO azy i Davida ka nandresy ny Filistinina hatreo Geba ka hatrany Gezera
  - type: note
    content: 'Geba: jereo 1 Sam 13.3 sy nta; Gezera: toerana tokony ho 30 km avaratra andrefan’i Jerosalema, akaikin’ny sisin-tany iraisana amin’ny Filistinina.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Tonga tao amin’ny mpanjaka tao Hebrôna avokoa ireo loholon’i Israely. Ary tao Hebrôna dia nanaovan’i Davida mpanjaka fanekempihavanana teo anatrehan’ny TOMPO ry zareo, ka nanosotra azy ho mpanjakan’i Israely. '
  '4':
  - type: text
    content: 'Telopolo taona i Davida fony tonga mpanjaka ary nanjaka efapolo taona izy. '
  '5':
  - type: text
    content: Teo Hebrôna, dia fito taona sy tapany no nanjakany tamin’ny fokon’i Joda; ary tany Jerosalema dia 33 taona no nanjakany tamin’i Israely sy i Joda mitambatra
  - type: note
    content: 'And 4-5: jereo 1 Mp 2.11; 1 Tan 3.4; 29.27.'
  - type: text
    content: .
  - type: heading
    content: Azon’i Davida i Jerosalema
  - type: heading
    content: (Jereo 1 Tan 11.4-9; 14.1-2)
  '6':
  - type: text
    content: Nankany Jerosalema hiady amin’ny Jebôsita tompon-tany ny mpanjaka sy ny olony; nefa hoy ny Jebôsita
  - type: note
    content: 'Ny Jebôsita: jereo Jos 15.63; Mpits 1.21.'
  - type: text
    content: ' tamin’i Davida:'
  - type: text
    content: –Tsy ho tafiditra atỳ ianao, fa na ny jamba sy ny mandringa aza dia hahasakana anao.
  - type: text
    content: 'Izany no fomba nilazan’ny Jebôsita fa tsy ho tafiditra ao mihitsy i Davida. '
  '7':
  - type: text
    content: 'Kanjo azon’i Davida ihany ilay tanànamimanda, dia i '
  - type: text
    content: Tsiôna
  - type: text
    content: ' izay hatao hoe '
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: .
  '8':
  - type: text
    content: 'Tamin’izay andro izay dia hoy i Davida hoe: «Raha misy te hamely ny Jebôsita, dia aoka izy hihazo ny lakan-drano!» Ny amin’ny mandringa sy jamba dia nankahalain’i Davida ireo, ka nahatonga ny fitenenana hoe: «Tsy mahazo miditra ny Tranon’ny Tompo ny jamba sy ny mandringa».'
  '9':
  - type: text
    content: Nipetraka tao an-tanàna mimanda i Davida, ary niantso azy hoe «Tanànan’i Davida». Dia narafitr’i Davida ny manodidina, nanomboka hatreo Milao ka mifarana amin’ny trano fonenany
  - type: note
    content: 'Milao: jereo 1 Mp 9.15 sy nta.'
  - type: text
    content: '. '
