document_id: 2SA.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida voahosotra ho mpanjakan’i Israely
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 11.1-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia tonga tao amin’i Davida tao Hebrôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hebrôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2.1-4.
    marker-yv: yv-n
  - type: text
    text: ' ny fokon’i Israely rehetra ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indreto izahay havanao sy tapakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fahiny, fony mbola nanjaka taminay aza i Saoly, dia ianao no mpitarika ny miaramilan’i Israely tamin’ny ady; ary ny TOMPO efa nilaza taminao hoe: «Ianao no hitondra ilay Israely vahoakako, ary ianao no ho filohany.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tonga tao amin’ny mpanjaka tao Hebrôna avokoa ireo loholon’i Israely. Ary tao Hebrôna dia nanaovan’i Davida mpanjaka fanekempihavanana teo anatrehan’ny TOMPO ry zareo, ka nanosotra azy ho mpanjakan’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Telopolo taona i Davida fony tonga mpanjaka ary nanjaka efapolo taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Teo Hebrôna, dia fito taona sy tapany no nanjakany tamin’ny fokon’i Joda; ary tany Jerosalema dia 33 taona no nanjakany tamin’i Israely sy i Joda mitambatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 4-5:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 2.11; 1 Tan 3.4; 29.27.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Azon’i Davida i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 11.4-9; 14.1-2)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nankany Jerosalema hiady amin’ny Jebôsita tompon-tany ny mpanjaka sy ny olony; nefa hoy ny Jebôsita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny Jebôsita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jos 15.63; Mpits 1.21.
    marker-yv: yv-n
  - type: text
    text: ' tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy ho tafiditra atỳ ianao, fa na ny jamba sy ny mandringa aza dia hahasakana anao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Izany no fomba nilazan’ny Jebôsita fa tsy ho tafiditra ao mihitsy i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Kanjo azon’i Davida ihany ilay tanànamimanda, dia i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ' izay hatao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tanànan’i Davida
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’izay andro izay dia hoy i Davida hoe: «Raha misy te hamely ny Jebôsita, dia aoka izy hihazo ny lakan-drano!» Ny amin’ny mandringa sy jamba dia nankahalain’i Davida ireo, ka nahatonga ny fitenenana hoe: «Tsy mahazo miditra ny Tranon’ny Tompo ny jamba sy ny mandringa».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nipetraka tao an-tanàna mimanda i Davida, ary niantso azy hoe «Tanànan’i Davida». Dia narafitr’i Davida ny manodidina, nanomboka hatreo Milao ka mifarana amin’ny trano fonenany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Milao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 9.15 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nihanatanjaka hatrany i Davida, satria ny TOMPO Andriamanitr’izao rehetra izao no niaraka taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Naniraka olona hankany amin’i Davida i Hirama mpanjakan’i Tiro mba hitondra hazo sedera sy mpandrafitra ary mpipai-bato. Dia nanangana trano ho an’i Davida ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fantatr’i Davida fa ny TOMPO no efa nampanjaka azy tamin’i Israely ary nanandratra ny fanjakany noho ny amin’i Israely vahoakany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo zanakalahin’i Davida teraka tao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 3.5-9; 14.3-7)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa niala tao Hebrôna ka tonga tany Jerosalema i Davida, dia mbola naka vaditsindrano sy vady hafa koa izay niterahany zanakalahy sy zanakavavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ireto avy no anaran’izay naterany tany Jerosalema: i Samòa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Samòa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'indraindray antsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Simehà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (1 Tan 3.5.).'
    marker-yv: yv-n
  - type: text
    text: ' sy i Sôbaba, i Natàna sy i Salômôna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'i Jibehara sy i Elisoa, i Nefega sy i Jafia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: i Elisamà sy i Eliadà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Eliadà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'indraindray antsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Beheliadà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (1 Tan 14.7).'
    marker-yv: yv-n
  - type: text
    text: ' ary i Elifelety.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fandresen’i Davida ny Filistinina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 14.8-16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nony ren’ny Filistinina fa nohosorana ho mpanjakan’i Israely i Davida dia niakatra avokoa izy rehetra mba hambabo an’i Davida. Raha nahare izany koa i Davida, dia nidina nankao amin’ny fialofana mimanda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fialofana mimanda: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety ho ny an’i Hadolama, jereo 1 Sam 22.1-5; 24.23.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nony tonga ny Filistinina dia niparitaka teny amin’ny lohasahan’ny Refaîta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lohasahan’ny Refaîta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ao atsimo andrefan’i Jerosalema.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nanontany ny TOMPO i Davida nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hiakatra hanafika ny Filistinina ve aho? Hatolotrao eo an-tanako ve izy ireo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny TOMPO namaly an’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, miakara fa hatolotro eo an-tananao tokoa ny Filistinina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tonga tao Bahala-Peratsima i Davida ka nandresy ny Filistinina, ary nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny Tompo efa nahavaky ny fahavaloko teo anatrehako hipariakany toy ny rano vaky.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Izany no nanaovana io toerana io hoe: «Bahala-Peratsima» na «Tompon’ny fahavakiana». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary nilaozan’ny Filistinina teo ny sampiny, ka nalain’i Davida sy ny olony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mbola niverina niakatra teo amin’ny lohasahan’ny Refaîta indray ny Filistinina ka niparitaka teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nanontany ny TOMPO indray i Davida ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza miakatra fa hodidino avy any aoriana izy, dia hanatona azy avy eo amin’ny tandrifin’ny foto-boaroihazo ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Rehefa nahare hoatra fingadongadon’olona eny an-tendron-kazo ianao, dia mihetseha faingana; satria amin’izay ny TOMPO no hiainga eo alohanao mba handresy ny tafiky ny Filistinina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia nanao araka ny nandidian’ny TOMPO azy i Davida ka nandresy ny Filistinina hatreo Geba ka hatrany Gezera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Geba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 1 Sam 13.3 sy nta; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gezera:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' toerana tokony ho 30 km avaratra andrefan’i Jerosalema, akaikin’ny sisin-tany iraisana amin’ny Filistinina.'
    marker-yv: yv-n
  - type: text
    text: .
