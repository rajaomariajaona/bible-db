  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Amin’ny raharaha mampifanolana momba ny omby na boriky, na ondry na osy, na fitafiana, ary ny zavatra very rehetra, ireo olon-droa samy milaza ho tompony dia hoentina eo anatrehan’Andriamanitra: izay voatondron’Andriamanitra ho diso dia tsy maintsy handoa onitra avo roa heny amin’ny anankiray.'
- type: usfm
  marker: p
  children:
