  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Mety hisy olona manome boriky iray na omby iray na ondry iray na osy iray na biby hafa handrasan’ny namany, ka maty ilay biby na maratra na lasan’ny mpandroba nefa tsy misy vavolombelona; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia tsy maintsy mianiana amin’ny anaran’ny TOMPO ilay olona fa tsy naka ny zavatry ny namany. Hanaiky izany fianianana izany kosa ilay tompom-biby
  - type: usfm
