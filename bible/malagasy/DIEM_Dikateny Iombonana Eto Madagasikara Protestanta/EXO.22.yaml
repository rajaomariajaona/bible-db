    children:
    - type: text
      text: '5'
  - type: text
    text: «Raha misy olona mandoro lobolobo misy tsilo ka mitatra amin’ny antontam-bary na vary hojinjana na tanimboly ny afo, dia tsy maintsy hanonitra ny may ilay nandoro.
- type: usfm
  marker: p
