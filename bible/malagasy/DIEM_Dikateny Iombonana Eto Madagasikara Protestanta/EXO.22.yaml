  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha voaviraviran’ny bibidia ilay izy, dia hoentina ho porofo ny sisa tavela aminy; ka amin’izay dia tsy hanonitra izy.
