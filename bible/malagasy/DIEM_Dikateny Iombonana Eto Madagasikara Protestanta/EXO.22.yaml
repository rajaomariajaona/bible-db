    children:
    - type: text
      text: '4'
  - type: text
    text: «Raha misy olona mampitondraka ny bibiny amin’ny voly na ny tanimboaloboky ny hafa ka manimba izany, dia izay tsara indrindra amin’ny vokatry ny sahany sy ny tanimboalobony no homeny ho onitra.
