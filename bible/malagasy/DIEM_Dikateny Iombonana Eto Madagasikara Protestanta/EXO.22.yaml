document_id: EXO.22,396
type_code: plt
verses:
  '1':
  - type: text
    content: '«Raha misy mpangalatra tratra eo am-pangalarana amin’ny alina ary voakapoka ka maty, dia tsy vono olona akory izany; '
  '10':
  - type: text
    content: dia tsy maintsy mianiana amin’ny anaran’ny TOMPO ilay olona fa tsy naka ny zavatry ny namany. Hanaiky izany fianianana izany kosa ilay tompom-biby
  - type: note
    content: 'Hanaiky... ilay tompom-biby: dkt hafa Handray izay sisa tamin’ilay biby kosa ny tompony.'
  - type: text
    content: ' ary tsy hisy onitra hefain’ilay namany. '
  '11':
  - type: text
    content: 'Fa raha tàhiny kosa nangalarina tao aminy tokoa izany biby izany, dia handoa onitra amin’ny tompon-javatra izy. '
  '12':
  - type: text
    content: Raha voaviraviran’ny bibidia ilay izy, dia hoentina ho porofo ny sisa tavela aminy; ka amin’izay dia tsy hanonitra izy.
  '13':
  - type: text
    content: '«Raha misy olona mindrana biby amin’ny namany ka maratra na maty ilay biby nefa tsy teo anatrehan’ny tompony, dia tsy maintsy manonitra izy. '
  '14':
  - type: text
    content: Fa raha teo anatrehan’ny tompony kosa, dia tsy hanonitra ilay mpindrana; raha biby nofàna moa izany, dia ho vitan’ny hofany ihany
  - type: note
    content: 'raha biby... ihany: dkt hafa raha mpikarama no nindrana ilay biby, dia handray ny karamany ihany izy.'
  - type: text
    content: ' ny onitra.'
  - type: heading
    content: Lalàna samihafa ara-pitondratena sy ara-pivavahana
  '15':
  - type: text
    content: '«Raha misy olona mahasarika tovovavy tsy mbola voafofo ka mandry aminy, dia tsy maintsy mandoa vodiondry izy ka mampakatra azy ho vadiny. '
  '16':
  - type: text
    content: Raha tsy manaiky ny hanome an-drazazavavy ny rainy, dia tsy maintsy mandoa vola an-kevitry ny vodiondry fanome amin’ny fampakarana zazavavy izy
  - type: note
    content: 'And 15-16: jereo Deot 22.28-29.'
  - type: text
    content: .
  '17':
  - type: text
    content: «Aza avela ho velona ny vehivavy mpanao ody ratsy
  - type: note
    content: Jereo Lev 19.26,31; Deot 18.10-11.
  - type: text
    content: .
  '18':
  - type: text
    content: «Izay olona mandry amin’ny biby dia tsy maintsy vonoina ho faty
  - type: note
    content: Jereo Lev 18.23; 20.15-16; Deot 27.21.
  - type: text
    content: .
  '19':
  - type: text
    content: '«Izay manao '
  - type: text
    content: sorona
  - type: text
    content: ' ho an’andriamani-kafa, afa-tsy amin’ny TOMPO irery ihany, dia haringana'
  - type: note
    content: Jereo Deot 17.2-5.
  - type: text
    content: .
  '2':
  - type: text
    content: fa rehefa mihiratra masoandro kosa no hisehoan’izany, dia tena vono olona
  - type: note
    content: 'fa rehefa mihiratra masoandro kosa: tsy maintsy ho azo atao amin’izay ny manaisotra ny mpangalatra, nefa tsy mamono azy ho faty; fa raha tàhiny misy mamono azy ho faty ihany dia tena vono olona izany.'
  - type: text
    content: . Raha tàhiny izy tsy manana hoenti-manonitra ny halatra nataony, dia hamidy ho andevo.
  '20':
  - type: text
    content: '«Aza mampijaly na mitsentsitra ny vahiny izay mipetraka ao aminareo, satria efa mba vahiny tany Ejipta koa ny tenanareo. '
  '21':
  - type: text
    content: Aza mampahory ny mpitondratena sy ny kamboty ianareo
  - type: note
    content: 'And 20-21: jereo 23.9; Lev 19.33-34; Deot 24.17-18; 27.19.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Fa raha mampahory azy ianareo, dia hiantso vonjy amiko izy ka hihaino ny fitarainany tokoa Aho. '
  '23':
  - type: text
    content: Hirehitra ny fahatezerako ka hovonoiko amin’ny ady ianareo, dia ho mpitondratena ny vadinareo, ary ho kamboty ny zanakareo.
  '24':
  - type: text
    content: «Raha mampisambo-bola amin’ny mahantra mpiray firenena aminareo ianareo, dia aza mampandoa zana-bola azy
  - type: note
    content: Jereo Lev 25.36-37; Deot 15.7-11; 23.20-21.
  - type: text
    content: ' toy ny ataon’ireo mpanjana-bola.'
  '25':
  - type: text
    content: '«Raha maka ny lamban’ny namanareo ho anto-bola ianareo, dia avereno aminy alohan’ny maty masoandro izany, '
  '26':
  - type: text
    content: satria tsy manana afa-tsy iny mba hirakofana sy hiarovan-tena izy. Raha tsy misy an’iny, inona àry no hirakofany rehefa hatory? Hiantso vonjy Amiko izy, ka hihaino azy Aho, satria izaho dia Andriamanitra be fangorahana
  - type: note
    content: 'And 25-26: jereo Deot 24.10-13.'
  - type: text
    content: .
  '27':
  - type: text
    content: «Aza miteny ratsy Ahy Andriamanitrareo, ary aza manozona ny filohan’ny firenenareo
  - type: note
    content: Jereo Asa 23.5.
  - type: text
    content: .
  '28':
  - type: text
    content: «Aza avelanareo ho tratra aoriana ny fanateranareo amiko ny santa-bokatrareo sy ny santatry ny divainareo.
  - type: text
    content: «Tsy maintsy hatokanareo ho Ahy ny lahimatoanareo.
  '29':
  - type: text
    content: «Momba ny voalohan-teraky ny ombivavy na voalohan-teraky ny ondry aman’osy, dia avelao ho eo amin’ny reniny ihany mandritra ny fito andro; fa amin’ny andro fahavalo izy dia atero ho sorona ho Ahy.
  '3':
  - type: text
    content: «Raha misy omby na boriky na ondry na osy nangalarina ka tratra mbola velona eo amin’ilay mpangalatra, dia haveriny amin’ny tompony avo roa heny iny.
  - type: heading
    content: Ny fahavoazana amin’ny fananana
  '30':
  - type: text
    content: «Olona voatokana ho Ahy ianareo, koa aza mihinana ny hena voaviraviran’ny bibidia
  - type: note
    content: Jereo Lev 17-15. –Io hena io dia tsy azo hanina satria tsy novonoina araka ny fitsipika ilay biby.
  - type: text
    content: ', fa atsipazo ho an’ny alika ireny.'
  '4':
  - type: text
    content: «Raha misy olona mampitondraka ny bibiny amin’ny voly na ny tanimboaloboky ny hafa ka manimba izany, dia izay tsara indrindra amin’ny vokatry ny sahany sy ny tanimboalobony no homeny ho onitra.
  '5':
  - type: text
    content: «Raha misy olona mandoro lobolobo misy tsilo ka mitatra amin’ny antontam-bary na vary hojinjana na tanimboly ny afo, dia tsy maintsy hanonitra ny may ilay nandoro.
  '6':
  - type: text
    content: '«Mety hisy olona manome vola na fanaka hotehirizin’ny namany ka nisy nangalatra tao an-tranony. Koa raha hita ilay nangalatra, dia hanonitra avo roa heny; '
  '7':
  - type: text
    content: fa raha tsy hita kosa izay nangalatra, dia hataon’ilay tompon-trano vavolombelona Andriamanitra
  - type: note
    content: 'hataon’ilay... Andriamanitra: jereo 21.6 sy nta.'
  - type: text
    content: ' ka hianianany fa tsy naka ny zavatry ny namany izy. '
  '8':
  - type: text
    content: 'Amin’ny raharaha mampifanolana momba ny omby na boriky, na ondry na osy, na fitafiana, ary ny zavatra very rehetra, ireo olon-droa samy milaza ho tompony dia hoentina eo anatrehan’Andriamanitra: izay voatondron’Andriamanitra ho diso dia tsy maintsy handoa onitra avo roa heny amin’ny anankiray.'
  '9':
  - type: text
    content: '«Mety hisy olona manome boriky iray na omby iray na ondry iray na osy iray na biby hafa handrasan’ny namany, ka maty ilay biby na maratra na lasan’ny mpandroba nefa tsy misy vavolombelona; '
