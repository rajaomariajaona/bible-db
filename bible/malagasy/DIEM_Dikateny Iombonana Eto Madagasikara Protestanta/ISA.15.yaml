document_id: ISA.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana momba an’i Môaba
  - type: heading
    content: (Toko 15–16; jereo Jer 48)
  - type: text
    content: Hafatra momba an’i Môaba.
  - type: text
    content: Indray alina monja dia rava
  - type: text
    content: tsy nisy niangana ny tanàna Hara-Môaba,
  - type: text
    content: indray alina monja dia rava
  - type: text
    content: tsy nisy niangana ny tanàna Kira-Môaba
  - type: note
    content: 'Hara-Môaba sy Kira-Môaba: tanàna anankiroa anisan’ireo lehibe tao Môaba, any atsimon’i Arnôna. Ilay faharoa dia antsoina koa hoe Kira-Heresa ao amin’ny Jer 48.31 (jereo Is 16.7); toa io no renivohi-panjakana. –Momba ny Môabita, dia jereo 25.10-12; Jer 48; Ezek 25.8-11; Ham 2.1-3; Tsef 2.8-11.'
  - type: text
    content: .
  '2':
  - type: text
    content: Ny mponin’i Dibôna dia miakatra
  - type: text
    content: eny amin’ny toeram-pivavahany mba hitomany.
  - type: text
    content: Any Nebao sy Medebà no idradradradran’i Môaba.
  - type: text
    content: Voaharatra avokoa ny loha rehetra
  - type: text
    content: ary voaala ny volombava rehetra
  - type: note
    content: 'I Dibôna no toa renivohitra ara-pivavahana tao Môaba. –loha voaharatra, volombava voaala: mariky ny fisaonana; jereo Jer 48.37.'
  - type: text
    content: .
  '3':
  - type: text
    content: Eny an-dalambe dia lamba fisaonana
  - type: text
    content: no itafian’ny besinimaro,
  - type: text
    content: eny an-tampon-trano sy eny an-kianja eny
  - type: text
    content: no idradradradran’izy rehetra
  - type: text
    content: sady irotsahan’ny ranomasony
  - type: note
    content: Jereo Jer 48.38.
  - type: text
    content: .
  '4':
  - type: text
    content: Miantso vonjy ny any Hesbôna sy Elehale
  - type: text
    content: ka re hatrany Jahatsa ny feony;
  - type: text
    content: izany no mampilofika an’i Môaba
  - type: text
    content: sy mahakivy ny fanahiny
  - type: note
    content: 'And 4: jereo Jer 48.34. –Hesbôna, Elehale: tanàna môabita any akaikin’ny sisintany avaratra.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Mitaraina ny foko noho ny amin’i Môaba:'
  - type: text
    content: tonga hatrany Tsôhara sy Heglata-Selisià ny mpandositra.
  - type: text
    content: Mitomany ny olona mianika ny fiakaran’i Lohita
  - type: text
    content: ary midradradradra mamoy fo eny an-dalana ho any Hôrônaima
  - type: note
    content: 'Mitaraina... Môaba: jereo Jer 48.31 sy nta. –Tsôhara: jereo Jer 48.4 sy nta; 48.34. –fiakaran’i Lohita, Hôrônaima: jereo Jer 48.5.'
  - type: text
    content: .
  '6':
  - type: text
    content: Nanjary ritra ny ranon’i Nimrima
  - type: note
    content: 'Nimrima: jereo Jer 48.34 sy nta.'
  - type: text
    content: ','
  - type: text
    content: maina ny vilona, nalazo ny zava-maniry,
  - type: text
    content: ary tsy nisy ahi-maitso intsony.
  '7':
  - type: text
    content: Ireo harena vitsivitsy hany sisa voatahiry
  - type: text
    content: dia nentin’ireo Môabita nitsoaka
  - type: text
    content: any am-pitan’ny lohasahan-driakan’ny Hazomalahelo.
  '8':
  - type: text
    content: Antsoantsom-pitarainana no heno
  - type: text
    content: manodidina ny faritanin’i Môaba;
  - type: text
    content: hatrany Eglaîma sy hatrany Beera-Elima aza
  - type: text
    content: no andrenesana ny fidradradradràny
  - type: note
    content: 'Eglaîma: toa tanàna ao avaratry ny Ranomasina Maty. –Beera-Elima: eo akaikin’ny sisintany avaratra atsinanan’i Môaba.'
  - type: text
    content: .
  '9':
  - type: text
    content: Feno ra ny rano mandalo ao Dibôna,
  - type: text
    content: 'fa hoy ny TOMPO hoe:'
  - type: text
    content: «Eny, hitondra loza vaovao ao Dibôna Aho,
  - type: text
    content: dia liona hamely izay afa-nandositra tao Môaba,
  - type: text
    content: sy izay sisa velona amin’izany tany izany.»
