document_id: ISA.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainana momba an’i Môaba
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Toko 15–16; jereo Jer 48)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hafatra momba an’i Môaba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indray alina monja dia rava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nisy niangana ny tanàna Hara-Môaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indray alina monja dia rava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nisy niangana ny tanàna Kira-Môaba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Hara-Môaba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kira-Môaba:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna anankiroa anisan’ireo lehibe tao Môaba, any atsimon’i Arnôna. Ilay faharoa dia antsoina koa hoe Kira-Heresa ao amin’ny Jer 48.31 (jereo Is 16.7); toa io no renivohi-panjakana. –Momba ny Môabita, dia jereo 25.10-12; Jer 48; Ezek 25.8-11; Ham 2.1-3; Tsef 2.8-11.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mponin’i Dibôna dia miakatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny toeram-pivavahany mba hitomany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any Nebao sy Medebà no idradradradran’i Môaba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaharatra avokoa ny loha rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary voaala ny volombava rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Dibôna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'no toa renivohitra ara-pivavahana tao Môaba. –loha voaharatra, volombava voaala: mariky ny fisaonana; jereo Jer 48.37.'
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-dalambe dia lamba fisaonana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no itafian’ny besinimaro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny an-tampon-trano sy eny an-kianja eny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no idradradradran’izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady irotsahan’ny ranomasony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 48.38.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantso vonjy ny any Hesbôna sy Elehale
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka re hatrany Jahatsa ny feony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no mampilofika an’i Môaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mahakivy ny fanahiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.4 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 4:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo Jer 48.34. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: '–Hesbôna, Elehale: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna môabita any akaikin’ny sisintany avaratra.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mitaraina ny foko noho ny amin’i Môaba:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga hatrany Tsôhara sy Heglata-Selisià ny mpandositra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitomany ny olona mianika ny fiakaran’i Lohita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary midradradradra mamoy fo eny an-dalana ho any Hôrônaima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mitaraina... Môaba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jer 48.31 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tsôhara: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jer 48.4 sy nta; 48.34. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: fiakaran’i Lohita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hôrônaima: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jer 48.5.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanjary ritra ny ranon’i Nimrima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Nimrima: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jer 48.34 sy nta.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maina ny vilona, nalazo ny zava-maniry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nisy ahi-maitso intsony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo harena vitsivitsy hany sisa voatahiry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nentin’ireo Môabita nitsoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any am-pitan’ny lohasahan-driakan’ny Hazomalahelo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Antsoantsom-pitarainana no heno
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manodidina ny faritanin’i Môaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany Eglaîma sy hatrany Beera-Elima aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no andrenesana ny fidradradradràny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Eglaîma: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa tanàna ao avaratry ny Ranomasina Maty. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Beera-Elima: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eo akaikin’ny sisintany avaratra atsinanan’i Môaba.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno ra ny rano mandalo ao Dibôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa hoy ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Eny, hitondra loza vaovao ao Dibôna Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia liona hamely izay afa-nandositra tao Môaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay sisa velona amin’izany tany izany.»
