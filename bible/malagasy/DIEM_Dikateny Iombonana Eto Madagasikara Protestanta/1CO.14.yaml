document_id: 1CO.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitenenana fiteny tsy fantatra sy filazana hafatra avy amin’Andriamanitra
  - type: text
    content: 'Iezaho hatrany izay hananana ny fitiavana; nefa irio fatratra koa ny fanomezam-pahasoavana avy amin’ny Fanahy Masina, indrindra fa ny milaza hafatra avy amin’Andriamanitra. '
  '10':
  - type: text
    content: Maro samy hafa ny fiteny eto amin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ', kanefa samy misy heviny avokoa. '
  '11':
  - type: text
    content: 'Ka raha tsy fantatro àry ny hevitry ny fiteny iresahan’olona amiko, dia ho vahiny amin’ilay olona miresaka amiko aho ary ho vahiny amiko ilay olona miresaka amiko. '
  '12':
  - type: text
    content: 'Dia toy izany koa ianareo: satria fatra-paniry ny fanomezam-pahasoavana avy amin’ny Fanahy Masina ianareo, dia ireo hampandroso ny fiangonana amin’ny finoana no aoka hotadiavinareo hananana be dia be.'
  '13':
  - type: text
    content: 'Noho izany, izay miteny amin’ny fiteny tsy fantatra dia aoka hangataka amin’Andriamanitra mba ho afaka hanazava izany koa. '
  '14':
  - type: text
    content: 'Raha mivavaka amin’ny fiteny tsy fantatra manko aho, dia ny fanahiko no hany mivavaka fa tsy mba mandray anjara ny saiko. '
  '15':
  - type: text
    content: 'Ahoana àry no hataoko? Hivavaka amin’ny fanahiko aho no sady hivavaka amin’ny saiko ihany koa; hihira amin’ny fanahiko aho no sady hihira amin’ny saiko ihany koa. '
  '16':
  - type: text
    content: Raha am-panahy fotsiny no isaoranao an’Andriamanitra, hataon’izay mpiangona sarambabe ahoana no famaly «
  - type: text
    content: Amen
  - type: text
    content: '» ny vavaka fisaorana vitanao? Tsy fantany akory manko izay lazainao. '
  '17':
  - type: text
    content: Raha ianao, dia vavaka fisaorana kanto no vitanao, fa ny hafa kosa tsy nampandrosoinao amin’ny finoana.
  '18':
  - type: text
    content: 'Misaotra an’Andriamanitra aho fa miteny amin’ny fiteny tsy fantatra mihoatra noho ianareo rehetra. '
  '19':
  - type: text
    content: Kanefa, ao am-piangonana, dia aleoko manao teny dimy mazava amin’ny saiko mba hampianarako ny hafa toy izay teny arivoarivo amin’ny fiteny tsy fantatra.
  '2':
  - type: text
    content: 'Izay miteny amin’ny fiteny tsy fantatra dia tsy miteny miantefa amin’ny olona fa miantefa amin’Andriamanitra, satria tsy azon’olona izay teneniny fa herin’ny Fanahy Masina no anambaràny zava-miafina; '
  '20':
  - type: text
    content: 'Ry havako, aoka tsy ho zaza ianareo amin’ny fisainana; eny, raha momba ny ratsy dia aoka ho zaza ianareo, fa raha amin’ny fisainana dia aoka ho olondehibe. '
  '21':
  - type: text
    content: 'Fa izao no voalaza ao amin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ':'
  - type: text
    content: «Olona hafa fiteny no hitenenako amin’ity vahoaka ity,
  - type: text
    content: hoy ny Tompo,
  - type: text
    content: vavan’ny vahiny no hiresahako aminy!
  - type: text
    content: Nefa, na dia amin’izany aza, dia tsy hohenoiny Aho
  - type: note
    content: Is 28.11-12.
  - type: text
    content: .»
  '22':
  - type: text
    content: Koa ny fanomezana hiteny amin’ny fiteny tsy fantatra dia famantarana ho an’ny tsy mpino, fa tsy famantarana ho an’ny mpino; ny fanomezana hilaza hafatra avy amin’Andriamanitra kosa dia famantarana ho an’ny mpino, fa tsy famantarana ho an’ny tsy mpino.
  '23':
  - type: text
    content: 'Koa raha vory daholo ny mpiangona, ka fiteny tsy fantatra no itenenan’ny olona rehetra, ary misy miditra ao aminareo ny mbola tsy mahalala na ny tsy mpino, tsy holazainy ve fa very saina ianareo? '
  '24':
  - type: text
    content: 'Fa raha samy milaza hafatra avy amin’Andriamanitra kosa ny olona rehetra, ka miditra ny tsy mpino na ny mbola tsy mahalala, dia hiaiky ho diso sy meloka izy noho ny anatra ataon’ny olona rehetra; '
  '25':
  - type: text
    content: hiseho miharihary ny zavatra takona ao am-pony, ka hiankohoka hivavaka amin’Andriamanitra izy sady hilaza fa eo aminareo tokoa Andriamanitra.
  - type: heading
    content: Fiangonana milamina
  '26':
  - type: text
    content: 'Ahoana àry no izy, ry havako? Raha miangona ianareo, dia misy manana hira, misy manana fampianarana, misy manana fanambarana, misy milaza hafatra amin’ny fiteny tsy fantatra ary misy manazava izany: aoka ny zavatra rehetra hatao mba hampandroso ny mpiangona amin’ny finoana. '
  '27':
  - type: text
    content: 'Raha misy miteny amin’ny fiteny tsy fantatra, dia aoka ho roa na telo raha be dia be, ka hifandimby; ary aoka hisy anankiray manazava izany. '
  '28':
  - type: text
    content: 'Fa raha tsy misy olona manazava, dia aoka samy hangina izy ireo mandritra ny fiaraha-miangona, ka ny tenany sy Andriamanitra ihany no hitenenany. '
  '29':
  - type: text
    content: 'Ary ny amin’ireo mpilaza hafatra avy amin’Andriamanitra kosa, dia aoka ho roa na telo no hiteny fa ny sisa kosa mamantatra izay lazainy. '
  '3':
  - type: text
    content: 'fa izay milaza hafatra avy amin’Andriamanitra kosa dia miteny miantefa amin’ny olona mba hampandroso azy ireo amin’ny finoana ary koa hankahery sy hampionona azy ireo. '
  '30':
  - type: text
    content: 'Raha misy mahazo fanambarana avy amin’Andriamanitra anefa amin’ireo izay mipetraka, dia aoka hangina ilay efa miteny. '
  '31':
  - type: text
    content: 'Mahazo mifandimby milaza hafatra avy amin’Andriamanitra ianareo rehetra, mba hahazoan’ny daholobe fampianarana sy fampirisihana. '
  '32':
  - type: text
    content: 'Ireo mpilaza hafatra avy amin’Andriamanitra dia aoka hifehy ny fanomezana voarainy, '
  '33':
  - type: text
    content: satria Andriamanitra tsy mba loharanon’ny fikorontanana fa loharanon’ny fiadanana.
  - type: text
    content: 'Araka ny fanaon’ny Fiangonana rehetra eo amin’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ', '
  '34':
  - type: text
    content: 'dia aoka hangina ireo vehivavy mandritra ny fiaraha-miangona, satria tsy azony atao ny miteny; fa aoka hanoa izy ireo araka ny voalazan’ny bokin’ny '
  - type: text
    content: lalàna
  - type: text
    content: ' rahateo. '
  '35':
  - type: text
    content: Raha te hamotopoto-javatra izy, dia aoka samy hanontany ny vadiny any an-trano; fa tsy sahaza raha vehivavy no hiteny mandritra ny fiaraha-miangona.
  '36':
  - type: text
    content: 'Ianareo ve no nipoiran’ny tenin’Andriamanitra sa ianareo no hany nahatongavany? '
  '37':
  - type: text
    content: 'Raha misy mihambo ho mpilaza hafatra avy amin’Andriamanitra na mpanana fanomezana avy amin’ny Fanahy Masina, dia aoka ho fantany tsara fa didin’ny Tompo izao soratako aminareo izao. '
  '38':
  - type: text
    content: Fa raha misy tsy miraharaha izany, dia tsy miraharaha azy ny Tompo
  - type: note
    content: 'dia tsy miraharaha azy ny Tompo: dkt hafa dia avelao izy tsy hiraharaha.'
  - type: text
    content: .
  '39':
  - type: text
    content: 'Koa amin’izany, ry havako, irio mafy ny hilaza hafatra avy amin’Andriamanitra, saingy aza rarana ny miteny amin’ny fiteny tsy fantatra. '
  '4':
  - type: text
    content: Izay miteny amin’ny fiteny tsy fantatra dia ny tenany fotsiny no ampandrosoiny amin’ny finoana; fa izay milaza hafatra avy amin’Andriamanitra kosa dia ny fiangonana no ampandrosoiny amin’ny finoana.
  '40':
  - type: text
    content: Aoka hatao amim-pahamendrehana sy filaminana avokoa ny zavatra rehetra.
  '5':
  - type: text
    content: 'Satriko ny samy hitenenanareo rehetra amin’ny fiteny tsy fantatra, nefa aleoko ny hilazanareo hafatra avy amin’Andriamanitra. Fa izay milaza hafatra avy amin’Andriamanitra dia ambony kokoa noho izay miteny amin’ny fiteny tsy fantatra, raha tsy hoe misy olona afaka manazava izay lazainy mba hampandroso ny mpiangona amin’ny finoana. '
  '6':
  - type: text
    content: 'Koa manontany anareo aho, ry havako: raha mankatỳ aminareo aho ka fiteny tsy fantatra no itenenako aminareo, moa hahasoa anareo ve aho? Tsy hahasoa anareo aho raha tsy fanambarana, na teny feno fahalalana, na hafatra avy amin’Andriamanitra, na fampianarana no itenenako aminareo.'
  '7':
  - type: text
    content: 'Raiso ho ohatra ireo zavamaneno tsy manana aina, toy ny sodina na ny valiha. Raha tsy re mazava sady miavaka tsara ny feo avoakany, moa ve hisy hahalalana ny hira atao aminy avy? '
  '8':
  - type: text
    content: 'Ary raha manao feo hafahafa ny trompetra, iza no hioman-kiady? '
  '9':
  - type: text
    content: 'Dia toy izany koa ianareo: ahoana no hahazoan’ny olona izay lazainareo, raha tsy mazava ny hafatra ambaranareo amin’ny fiteny tsy fantatra? Dia hanao teny entin-drivotra ianareo! '
