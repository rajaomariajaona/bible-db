    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mihirà ho Azy ary mankalazà Azy amin-java-maneno;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tantarao ny asa mahagaga rehetra nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ireharehao ny anarany masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hifaly ny fon’ireo mitady ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Katsaho ny TOMPO mahery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tadiavo lalandava ny fanatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: Ry taranak’i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Israely: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anaran’i Jakôba koa io, jereo Gen 32.29; 35.10.
    marker-yv: yv-n
  - type: text
    text: ' mpanompony'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady terak’i Jakôba voafidiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsarovy ny asa mahagaga nataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny zava-mahatalanjona vitany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny didim-pitsarana navoakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izy no TOMPO Andriamanitsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manerana ny tany tontolo ny fanapahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsarovy hatrany ny fanekempihavanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fampanantenana izay napetrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ho an’ny taranaka arivo mifandimby:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fanekempihavanana nataony tamin’i Abrahama
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fianianana nataony tamin’i Itsehàka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Naoriny ho zo raikitra ho an’i Jakôba izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fanekempihavanana mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny taranak’i Israely,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'fony Andriamanitra nilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Homeko ho anao ny tany Kanahàna
- type: usfm
  marker: q1
