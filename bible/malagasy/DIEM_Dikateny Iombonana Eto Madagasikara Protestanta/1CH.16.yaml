  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Niaraka tamin’ny mpisorona ry i Hemàna sy i Jedotòna ary ireo sisa voafidy sy voatondro anarana mba hidera ny TOMPO noho ny fitiavany maharitra mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Niaraka tamin’i Hemàna sy i Jedotòna, dia nisy trompetra sy kipantsona natao hampanenoina ary zava-maneno hafa natao hanarahana ny hira ho an’Andriamanitra; ary ny zanakalahin’i Jedotòna no mpiandry vavahady.
