    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Lazao hoe: «Vonjeo izahay, ry Andriamanitra mpamonjy anay ô!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afaho avy any amin’ny hafa firenena izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka angony mba hideranay ny anaranao masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hireharehanay amin’ny fankalazana Anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
