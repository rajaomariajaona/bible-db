      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tamin’izay ianareo mbola mora isaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mpifindra monina vitsy kely teo amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: nivezivezy nitety firenena ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka niala tamin’ny fanjakana iray
- type: usfm
  marker: q1
  children:
  - type: text
    text: hankany amin’ny vahoaka hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Kanefa tsy nisy navelan’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampahory anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nampitandrina ny mpanjaka Izy
- type: usfm
  marker: q1
  children:
