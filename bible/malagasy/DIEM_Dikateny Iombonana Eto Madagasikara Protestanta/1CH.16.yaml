document_id: 1CH.16,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia nentina ny Vatamasina ka napetraka tao afovoan’ny tranolay izay efa namboarin’i Davida ho azy. Avy eo dia nisy sorona dorana manontolo sy sorom-pihavanana natolotra teo anatrehan’Andriamanitra. '
  '10':
  - type: text
    content: Ireharehao ny anarany masina;
  - type: text
    content: aoka hifaly ny fon’ireo mitady ny TOMPO.
  '11':
  - type: text
    content: Katsaho ny TOMPO mahery;
  - type: text
    content: tadiavo lalandava ny fanatrehany.
  '12':
  - type: text
    content: Ry taranak’i Israely
  - type: note
    content: 'Israely: anaran’i Jakôba koa io, jereo Gen 32.29; 35.10.'
  - type: text
    content: ' mpanompony'
  - type: text
    content: sady terak’i Jakôba voafidiny,
  - type: text
    content: tsarovy ny asa mahagaga nataony,
  - type: text
    content: dia ny zava-mahatalanjona vitany
  - type: text
    content: sy ny didim-pitsarana navoakany.
  '14':
  - type: text
    content: Izy no TOMPO Andriamanitsika;
  - type: text
    content: manerana ny tany tontolo ny fanapahany.
  '15':
  - type: text
    content: Tsarovy hatrany ny fanekempihavanany,
  - type: text
    content: dia ny fampanantenana izay napetrany
  - type: text
    content: 'ho an’ny taranaka arivo mifandimby:'
  '16':
  - type: text
    content: Fanekempihavanana nataony tamin’i Abrahama
  - type: text
    content: sy fianianana nataony tamin’i Itsehàka.
  '17':
  - type: text
    content: Naoriny ho zo raikitra ho an’i Jakôba izany
  - type: text
    content: ho fanekempihavanana mandrakizay
  - type: text
    content: ho an’ny taranak’i Israely,
  '18':
  - type: text
    content: 'fony Andriamanitra nilaza hoe:'
  - type: text
    content: «Homeko ho anao ny tany Kanahàna
  - type: text
    content: ho anjara lova ho anao sy ny taranakao
  - type: note
    content: 'And 16-18: jereo Gen 12.7; 26.3; 28.13.'
  - type: text
    content: ».
  '19':
  - type: text
    content: Tamin’izay ianareo mbola mora isaina,
  - type: text
    content: mpifindra monina vitsy kely teo amin’ny tany;
  '2':
  - type: text
    content: 'Ary rehefa nahavita ireo sorona ireo i Davida, dia '
  - type: text
    content: nitsodrano
  - type: text
    content: ' ny vahoaka tamin’ny anaran’ny TOMPO. '
  '20':
  - type: text
    content: nivezivezy nitety firenena ianareo
  - type: text
    content: ka niala tamin’ny fanjakana iray
  - type: text
    content: hankany amin’ny vahoaka hafa.
  '21':
  - type: text
    content: Kanefa tsy nisy navelan’Andriamanitra
  - type: text
    content: hampahory anareo
  - type: text
    content: fa nampitandrina ny mpanjaka Izy
  - type: text
    content: 'noho ny aminareo hoe:'
  '22':
  - type: text
    content: «Aza kasihina ireo voahosotro,
  - type: text
    content: ary aza asian-dratsy ireo mpitondra hafatro
  - type: note
    content: 'And 21-22: jereo Gen 20.3-7.'
  - type: text
    content: '!»'
  '23':
  - type: text
    content: Mihirà ho an’ny TOMPO, ry mponin’ny tany tontolo,
  - type: text
    content: torio isan’andro isan’andro ny namonjeny antsika
  - type: note
    content: 'And 23-33: jereo Sal 96.'
  - type: text
    content: .
  '24':
  - type: text
    content: 'Ambarao amin’ireo firenena ny '
  - type: text
    content: voninahiny
  - type: text
    content: ','
  - type: text
    content: lazao amin’ny vahoaka rehetra ny zava-mahagaga nataony.
  '25':
  - type: text
    content: Fa lehibe ny TOMPO ka mendrika hoderaina fatratra
  - type: text
    content: sady mahatahotra mihoatra noho ny andriamanitra rehetra.
  '26':
  - type: text
    content: Tsinontsinona avokoa ireo andriamanitry ny firenen-kafa,
  - type: text
    content: fa ny TOMPO kosa no nanao ny lanitra.
  '27':
  - type: text
    content: Fahalehibeazana sy famirapiratana no manodidina Azy,
  - type: text
    content: ary hery sy fifaliana no mameno ny fonenany.
  '28':
  - type: text
    content: Ianareo fianakaviamben’ny firenen-drehetra,
  - type: text
    content: tolory haja ny TOMPO fa be voninahitra sy hery.
  '29':
  - type: text
    content: Tolory haja ny TOMPO satria be voninahitra Izy.
  - type: text
    content: Mitondrà fanatitra ka mankanesa eo anatrehany;
  - type: text
    content: dia miankohofa eo anatrehan’ny TOMPO,
  - type: text
    content: rehefa miseho ny fahamasinany.
  '3':
  - type: text
    content: Nasainy nizaràna sakafo ny Israelita rehetra teo, ka na lehilahy na vehivavy dia samy nahazo mofo boribory iray sy didin-kena voatono iray ary ampempam-boaloboka iray avy
  - type: note
    content: Jereo 2 Sam 6.19 sy nta.
  - type: text
    content: .
  - type: heading
    content: Ny hira fiderana nataon’ny levita ho an’ny Tompo
  - type: heading
    content: (Jereo Sal 105.1-15; 96; 106.1-47, 48)
  '30':
  - type: text
    content: Mangovita eo anoloany,
  - type: text
    content: ry mponin’ny tany tontolo,
  - type: text
    content: fa izao rehetra izao
  - type: text
    content: voaorina mafy ka tsy hihontsona.
  '31':
  - type: text
    content: Aoka hifaly ny lanitra,
  - type: text
    content: ary hiravoravo ny tany!
  - type: text
    content: 'Lazao amin’ny olona hoe: «Ny TOMPO no mpanjaka!»'
  '32':
  - type: text
    content: Aoka hirohondrohona ny ranomasina
  - type: text
    content: mbamin’izay ao anatiny!
  - type: text
    content: Aoka hibita-kafaliana ny saha
  - type: text
    content: mbamin’izay rehetra ao aminy!
  '33':
  - type: text
    content: Aoka ny hazo any an’ala hihoby
  - type: text
    content: mba hitsena ny TOMPO, satria tamy Izy.
  - type: text
    content: Eny, tamy Izy mba hifehy ny tany.
  '34':
  - type: text
    content: 'Miderà ny TOMPO ianareo fa tsara Izy:'
  - type: text
    content: Eny, maharitra mandrakizay ny fitiavany
  - type: note
    content: Jereo 2 Tan 5.13; Hez 3.11; Sal 100.5; 106.1; 107.1; 118.1, 29; 136.1; Jer 33.11.
  - type: text
    content: .
  '35':
  - type: text
    content: 'Lazao hoe: «Vonjeo izahay, ry Andriamanitra mpamonjy anay ô!'
  - type: text
    content: Afaho avy any amin’ny hafa firenena izahay
  - type: text
    content: ka angony mba hideranay ny anaranao masina,
  - type: text
    content: sy hireharehanay amin’ny fankalazana Anao
  - type: note
    content: 'And 35-36: jereo Sal 106.1, 47-48.'
  - type: text
    content: '!»'
  '36':
  - type: text
    content: Hisaorana anie ny TOMPO Andriamanitr’i Israely
  - type: text
    content: hatrizay hatrizay ka ho mandrakizay.
  - type: text
    content: 'Ary ny vahoaka rehetra niredona hoe: «'
  - type: text
    content: Amen
  - type: text
    content: '!» sy hoe: «Ankalazao ny TOMPO!»'
  '37':
  - type: text
    content: 'Dia teo anoloan’ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO teo i Davida no nanankina adidy tamin-dry i Asafa sy ny namany mba hanao fanompoam-pivavahana tsy an-kiato eo, araka ny raharaha tokony hatao isan’andro; '
  '38':
  - type: text
    content: nanankinany adidy koa ry i Hôbeda-Edôma sy ny namany 68 lahy, sy ilay Hôbeda-Edôma zanakalahin’i Jeditòna, ary i Hôsà mba ho mpiandry vavahady.
  '39':
  - type: text
    content: 'Ny adidy nankinin’i Davida tamin’i Tsadôka mpisorona sy ny mpisorona namany kosa dia ny raharaha teo anoloan’ny '
  - type: text
    content: Tranolain
  - type: text
    content: '’ny TOMPO izay tao amin’ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' any Gibehôna'
  - type: note
    content: Jereo 1 Mp 3.4 sy nta.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Nisy '
  - type: text
    content: levita
  - type: text
    content: ' sasany notendren’i Davida ho amin’ny fanompoana teo anoloan’ny '
  - type: text
    content: Vatamasin’ny TOMPO
  - type: text
    content: ' mba hampahatsiaro sy hidera ary hanome voninahitra ny TOMPO Andriamanitr’i Israely. '
  '40':
  - type: text
    content: 'Izy ireo no hanatitra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho an’ny TOMPO tsy an-kiato marain-tsy hariva ary eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' fisoronana sy hanao izay fandraharahana rehetra voasoratra ao amin’ny lalàna nandidian’ny TOMPO an’i Israely, '
  '41':
  - type: text
    content: 'Niaraka tamin’ny mpisorona ry i Hemàna sy i Jedotòna ary ireo sisa voafidy sy voatondro anarana mba hidera ny TOMPO noho ny fitiavany maharitra mandrakizay. '
  '42':
  - type: text
    content: Niaraka tamin’i Hemàna sy i Jedotòna, dia nisy trompetra sy kipantsona natao hampanenoina ary zava-maneno hafa natao hanarahana ny hira ho an’Andriamanitra; ary ny zanakalahin’i Jedotòna no mpiandry vavahady.
  '43':
  - type: text
    content: Farany, dia samy nody tany an-tranony avy ny olona rehetra; ary i Davida koa lasa nody mba hiarahaba ny ankohonany
  - type: note
    content: Jereo 2 Sam 6.19-20.
  - type: text
    content: .
  '5':
  - type: text
    content: I Asafa no filohany, ary i Zakarià no lefitra. I Jahaziela
  - type: note
    content: 'Jahaziela: araka ny 15.18; fa Jehiela no ao amin’ny RM.'
  - type: text
    content: ' sy i Semiramôta, i Jehiela sy i Matitià, i Eliaba sy i Benaià ary i Hôbeda-Edôma sy i Jehiela no nitendry ny valiha sy ny lokanga; fa i Asafa no nively ny kipantsona. '
  '6':
  - type: text
    content: I Benaià sy i Elihezera
  - type: note
    content: 'Elihezera: nahitsy araka ny 15.23, fa Jahaziela no ao amin’ny RM.'
  - type: text
    content: ' '
  - type: text
    content: mpisorona
  - type: text
    content: ' kosa no mpitsoka ny trompetra mandrakariva eo anoloan’ny Vatamasina mirakitra ny fanekempihavanan’Andriamanitra. '
  '7':
  - type: text
    content: Koa tamin’io andro io no voalohany nanendren’i Davida an’i Asafa sy ny namany hidera ny TOMPO.
  '8':
  - type: text
    content: 'Miderà ny TOMPO ianareo: ataovy antso avo ny lazany,'
  - type: text
    content: ampahafantaro ny firenen-kafa ny asany lehibe
  - type: note
    content: Jereo Sal 105.1-15.
  - type: text
    content: '!'
  '9':
  - type: text
    content: Mihirà ho Azy ary mankalazà Azy amin-java-maneno;
  - type: text
    content: tantarao ny asa mahagaga rehetra nataony.
