  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nentina ny Vatamasina ka napetraka tao afovoan’ny tranolay izay efa namboarin’i Davida ho azy. Avy eo dia nisy sorona dorana manontolo sy sorom-pihavanana natolotra teo anatrehan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary rehefa nahavita ireo sorona ireo i Davida, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nitsodrano
  - type: text
    text: ' ny vahoaka tamin’ny anaran’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nasainy nizaràna sakafo ny Israelita rehetra teo, ka na lehilahy na vehivavy dia samy nahazo mofo boribory iray sy didin-kena voatono iray ary ampempam-boaloboka iray avy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 6.19 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hira fiderana nataon’ny levita ho an’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Sal 105.1-15; 96; 106.1-47, 48)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' sasany notendren’i Davida ho amin’ny fanompoana teo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasin’ny TOMPO
  - type: text
    text: ' mba hampahatsiaro sy hidera ary hanome voninahitra ny TOMPO Andriamanitr’i Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I Asafa no filohany, ary i Zakarià no lefitra. I Jahaziela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jahaziela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny 15.18; fa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jehiela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no ao amin’ny RM.'
    marker-yv: yv-n
  - type: text
    text: ' sy i Semiramôta, i Jehiela sy i Matitià, i Eliaba sy i Benaià ary i Hôbeda-Edôma sy i Jehiela no nitendry ny valiha sy ny lokanga; fa i Asafa no nively ny kipantsona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I Benaià sy i Elihezera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Elihezera: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'nahitsy araka ny 15.23, fa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jahaziela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no ao amin’ny RM.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' kosa no mpitsoka ny trompetra mandrakariva eo anoloan’ny Vatamasina mirakitra ny fanekempihavanan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa tamin’io andro io no voalohany nanendren’i Davida an’i Asafa sy ny namany hidera ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Miderà ny TOMPO ianareo: ataovy antso avo ny lazany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampahafantaro ny firenen-kafa ny asany lehibe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: ft
