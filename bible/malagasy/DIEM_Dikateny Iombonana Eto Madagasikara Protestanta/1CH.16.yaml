    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia teo anoloan’ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO teo i Davida no nanankina adidy tamin-dry i Asafa sy ny namany mba hanao fanompoam-pivavahana tsy an-kiato eo, araka ny raharaha tokony hatao isan’andro; '
  - type: usfm
