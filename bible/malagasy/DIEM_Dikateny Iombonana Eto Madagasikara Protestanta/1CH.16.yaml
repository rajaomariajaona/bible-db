    text: lazao amin’ny vahoaka rehetra ny zava-mahagaga nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa lehibe ny TOMPO ka mendrika hoderaina fatratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mahatahotra mihoatra noho ny andriamanitra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsinontsinona avokoa ireo andriamanitry ny firenen-kafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny TOMPO kosa no nanao ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fahalehibeazana sy famirapiratana no manodidina Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hery sy fifaliana no mameno ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ianareo fianakaviamben’ny firenen-drehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tolory haja ny TOMPO fa be voninahitra sy hery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tolory haja ny TOMPO satria be voninahitra Izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitondrà fanatitra ka mankanesa eo anatrehany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miankohofa eo anatrehan’ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa miseho ny fahamasinany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mangovita eo anoloany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry mponin’ny tany tontolo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: voaorina mafy ka tsy hihontsona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aoka hifaly ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiravoravo ny tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lazao amin’ny olona hoe: «Ny TOMPO no mpanjaka!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Aoka hirohondrohona ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’izay ao anatiny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hibita-kafaliana ny saha
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’izay rehetra ao aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Aoka ny hazo any an’ala hihoby
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitsena ny TOMPO, satria tamy Izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tamy Izy mba hifehy ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Miderà ny TOMPO ianareo fa tsara Izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, maharitra mandrakizay ny fitiavany
  - type: usfm
    marker: f
    children:
