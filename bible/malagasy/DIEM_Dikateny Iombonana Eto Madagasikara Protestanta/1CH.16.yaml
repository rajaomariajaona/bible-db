  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ambarao amin’ireo firenena ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voninahiny
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
