    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mihirà ho an’ny TOMPO, ry mponin’ny tany tontolo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: torio isan’andro isan’andro ny namonjeny antsika
  - type: usfm
    marker: f
    children:
