document_id: JDG.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Mikà sy ny toeram-pivavahany manokana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tao amin’ny faritra be tendrombohitra any Efraîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny faritra be tendrombohitra any Efraîma '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia ao avaratr’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' dia nisy lehilahy natao hoe Mikà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Indray andro dia hoy izy tamin’ny reniny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsaroanao moa fony nisy naka ny volanao sekela volafotsy 1 100, ka nanaovanao ozona izay reko tokoa ny nanononanao azy? Ao amiko io vola io, ary izaho ihany no naka azy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny reniny taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hotahin
  - type: text
    text: ’ny TOMPO anie ianao, anaka!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia naverin’i Mikà tamin’ny reniny ny vola sekela 1 100; fa hoy kosa ny reniny taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa natokako mihitsy ho an’ny TOMPO ireo vola ireo ka hankinina aminao, anaka, mba hanamboarana sampy atao sarivongana metaly narendrika. Indro àry averiko aminao izy izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Kanjo naverin’i Mikà tamin’ny reniny indray ireo. Ary nakan-dreniny sekela roanjato izany, ka nomeny ny mpandrendrika. Dia nanamboatra sampy atao sarivongana metaly narendrika io; ary napetraka tao an-tranon’i Mikà izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ity lehilahy atao hoe Mikà ity dia nanana toeram-pivavahana iray sady efa nampamboatra koa efôda mbamin’ny terafima; ary ny zanany lahy anankiray no natokany ho mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tamin’izany fotoana izany dia tsy mbola nisy mpanjaka tany Israely, ka samy nanao izay heveriny ho mety avy ny olona tsirairay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nisy zatovo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' anankiray nivahiny tao Betlehema any Joda, tanàna anisan’ny fokon’i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Niala tao Betlehema izy mba hivahiny any amin’izay azony hitoerana. Raha mbola nandeha izy, dia tonga tany amin’ny faritra be tendrombohitra any Efraîma ka tafapaka teo amin’ny tranon’i Mikà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nanontany azy i Mikà hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avy aiza moa ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Levita avy any Betlehema any Joda aho, fa mandeha hivahiny any amin’izay azoko hitoerana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy i Mikà taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mijanòna eto amiko fa hataoko mpisorona ato anatin’ny fianakaviako ianao. Sekela volafotsy folo isan-taona sy fitafiana ary sakafo izay ilainao no homeko anao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niditra ny trano ilay levita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary nanaiky hitoetra tao amin’i Mikà izay nitondra azy toy ny zanany lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary natokan’i Mikà ilay levita ka tonga mpisorony ary nipetraka teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Mikà anakampo hoe: «Azoko antoka izao fa hanisy soa ahy ny TOMPO, satria ity levita ity no efa tonga mpisoroko.»'
