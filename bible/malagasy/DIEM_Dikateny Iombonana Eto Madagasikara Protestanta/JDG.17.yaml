document_id: JDG.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Mikà sy ny toeram-pivavahany manokana
  - type: text
    content: Tao amin’ny faritra be tendrombohitra any Efraîma
  - type: note
    content: Ny faritra be tendrombohitra any Efraîma dia ao avaratr’i Jerosalema.
  - type: text
    content: ' dia nisy lehilahy natao hoe Mikà. '
  '10':
  - type: text
    content: 'Dia hoy i Mikà taminy:'
  - type: text
    content: –Mijanòna eto amiko fa hataoko mpisorona ato anatin’ny fianakaviako ianao. Sekela volafotsy folo isan-taona sy fitafiana ary sakafo izay ilainao no homeko anao.
  - type: text
    content: 'Dia niditra ny trano ilay levita, '
  '11':
  - type: text
    content: 'ary nanaiky hitoetra tao amin’i Mikà izay nitondra azy toy ny zanany lahy. '
  '12':
  - type: text
    content: 'Ary natokan’i Mikà ilay levita ka tonga mpisorony ary nipetraka teo aminy. '
  '13':
  - type: text
    content: 'Dia hoy i Mikà anakampo hoe: «Azoko antoka izao fa hanisy soa ahy ny TOMPO, satria ity levita ity no efa tonga mpisoroko.»'
  '2':
  - type: text
    content: 'Indray andro dia hoy izy tamin’ny reniny:'
  - type: text
    content: –Tsaroanao moa fony nisy naka ny volanao sekela volafotsy 1 100, ka nanaovanao ozona izay reko tokoa ny nanononanao azy? Ao amiko io vola io, ary izaho ihany no naka azy.
  - type: text
    content: 'Dia hoy ny reniny taminy:'
  - type: text
    content: –
  - type: text
    content: Hotahin
  - type: text
    content: ’ny TOMPO anie ianao, anaka!
  '3':
  - type: text
    content: 'Dia naverin’i Mikà tamin’ny reniny ny vola sekela 1 100; fa hoy kosa ny reniny taminy:'
  - type: text
    content: –Efa natokako mihitsy ho an’ny TOMPO ireo vola ireo ka hankinina aminao, anaka, mba hanamboarana sampy atao sarivongana metaly narendrika. Indro àry averiko aminao izy izao.
  '4':
  - type: text
    content: Kanjo naverin’i Mikà tamin’ny reniny indray ireo. Ary nakan-dreniny sekela roanjato izany, ka nomeny ny mpandrendrika. Dia nanamboatra sampy atao sarivongana metaly narendrika io; ary napetraka tao an-tranon’i Mikà izany.
  '5':
  - type: text
    content: 'Fa ity lehilahy atao hoe Mikà ity dia nanana toeram-pivavahana iray sady efa nampamboatra koa efôda mbamin’ny terafima; ary ny zanany lahy anankiray no natokany ho mpisorona. '
  '6':
  - type: text
    content: Tamin’izany fotoana izany dia tsy mbola nisy mpanjaka tany Israely, ka samy nanao izay heveriny ho mety avy ny olona tsirairay.
  '7':
  - type: text
    content: 'Nisy zatovo '
  - type: text
    content: levita
  - type: text
    content: ' anankiray nivahiny tao Betlehema any Joda, tanàna anisan’ny fokon’i Joda. '
  '8':
  - type: text
    content: 'Niala tao Betlehema izy mba hivahiny any amin’izay azony hitoerana. Raha mbola nandeha izy, dia tonga tany amin’ny faritra be tendrombohitra any Efraîma ka tafapaka teo amin’ny tranon’i Mikà. '
  '9':
  - type: text
    content: 'Dia nanontany azy i Mikà hoe:'
  - type: text
    content: –Avy aiza moa ianao?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Levita avy any Betlehema any Joda aho, fa mandeha hivahiny any amin’izay azoko hitoerana.
