document_id: PRO.24,396
type_code: plt
verses:
  '1':
  - type: text
    content: Aza mitsiriritra ny ratsy fanahy
  - type: text
    content: na maniry hiaraka aminy.
  '10':
  - type: text
    content: Raha osa amin’ny androm-pahoriana ianao,
  - type: text
    content: dia kely dia kely herim-po tokoa!
  - type: heading
    content: (anatra faha-25)
  '11':
  - type: text
    content: Aza misalasala mamonjy ireo voaheloka ho faty
  - type: text
    content: kanefa tsy mitombina ny antony amonoana azy.
  '12':
  - type: text
    content: 'Raha hoy ianao hoe: «Tsy fantatro izany»,'
  - type: text
    content: dia mahatakatra an-tsaina izany kosa
  - type: text
    content: Ilay mahita ny ao am-po tsy miloaka
  - type: text
    content: ary mahalala izany Ilay mandinika anao;
  - type: text
    content: sady hovaliany araka ny asany avy ny olona
  - type: note
    content: Jereo 16.2 sy 21.2.
  - type: text
    content: .
  - type: heading
    content: (anatra faha-26)
  '13':
  - type: text
    content: Anaka, mihinàna tantely fa tsara izany;
  - type: text
    content: ary ho mamy am-bavanao ny tohony.
  '14':
  - type: text
    content: Aoka ho fantatrao fa toy izany koa
  - type: text
    content: ny hatsàran’ny fahendrena ho anao.
  - type: text
    content: Koa raha anananao izany, dia hisy ny hoavy handrandrainao
  - type: text
    content: ary tsy ho foana ny fanantenànao.
  - type: heading
    content: (anatra faha-27)
  '15':
  - type: text
    content: Ry ilay olon-dratsy, aza anaovanao otrika
  - type: text
    content: eo akaikin’ny tranon’ny olo-marina,
  - type: text
    content: ary aza ravanao ny fonenany;
  '16':
  - type: text
    content: satria mety lavo impito ny olo-marina,
  - type: text
    content: kanefa tafarina ihany,
  - type: text
    content: fa ny olon-dratsy kosa mianjera
  - type: text
    content: rehefa injay idiran-doza.
  - type: heading
    content: (anatra faha-28)
  '17':
  - type: text
    content: Aza mifaly, raha lavo ny fahavalonao;
  - type: text
    content: ary aza mibitaka, raha mianjera izy.
  '18':
  - type: text
    content: Fandrao hitan’ny TOMPO amin’ny maso ratsy izany,
  - type: text
    content: ka tsy ho tezitra amin’ny fahavalonao intsony Izy.
  - type: heading
    content: (anatra faha-29)
  '19':
  - type: text
    content: Aza tezitra amin’ny mpanao ratsy
  - type: text
    content: ary aza mialona ny olon-dratsy;
  '2':
  - type: text
    content: Fa tsy misaina afa-tsy fandravana ny fony,
  - type: text
    content: ary tsy miteny afa-tsy faharatsiana ny molony.
  - type: heading
    content: (anatra faha-20)
  '20':
  - type: text
    content: fa tsy mba manana hoavy handrandraina ireo
  - type: text
    content: ary ho faty toy ny jiro mitsilopy ny fiainany.
  - type: heading
    content: (anatra faha-30)
  '21':
  - type: text
    content: Anaka, manajà ny TOMPO ary koa ny mpanjaka;
  - type: text
    content: aza ikambananao ireo mitady hikomy aminy.
  '22':
  - type: text
    content: Fa hanjò azy tampoka ny antambo;
  - type: text
    content: ary iza no mahalala izay loza
  - type: text
    content: hataon’ny Tompo sy ny mpanjaka aminy?
  - type: heading
    content: Torohevitra hafa omen’ny olon-kendry
  '23':
  - type: text
    content: 'Izao koa dia mbola avy amin’ny hendry:'
  - type: text
    content: Tsy tsara ny manao fitsarà-mitanila.
  '24':
  - type: text
    content: 'Izay mpitsara manao amin’ny meloka hoe:'
  - type: text
    content: «Tsy manan-tsiny ianao»,
  - type: text
    content: dia hozonin’ny vahoaka
  - type: text
    content: ary hankahalain’ny firenena.
  '25':
  - type: text
    content: Fa izay mpitsara manameloka ny diso kosa
  - type: text
    content: dia ho finaritra sy hiantefan’ny laza tsara.
  '26':
  - type: text
    content: Porofom-pihavanana tena izy
  - type: text
    content: ny valinteny omena am-pahatsorana.
  '27':
  - type: text
    content: Vitao aloha ny asanao any ivelany
  - type: text
    content: ary ataovy vonon-kamokatra ny saha,
  - type: text
    content: vao izay ianao no manangana ny tranonao.
  '28':
  - type: text
    content: Aza mety ho vavolombelom-poana
  - type: text
    content: hanameloka tsy amin’antony ny namanao;
  - type: text
    content: sa ianao ve te hamitaka amin’ny teninao?
  '29':
  - type: text
    content: 'Aza manao hoe: «Hataoko aminy izay nataony tamiko,'
  - type: text
    content: hovaliako araka ny asany ny olona tsirairay!»
  - type: heading
    content: Ny toetoetry ny olona kamo
  '3':
  - type: text
    content: Ilàna fahendrena ny fanorenan-trano,
  - type: text
    content: ilàna fahaizana ny hahamafy azy;
  '30':
  - type: text
    content: Nandalovako, indray andro, ny sahan’ny kamo
  - type: text
    content: sy ny tanimboaloboky ny tsy ampy saina.
  '31':
  - type: text
    content: Indro tsilo sy ahidratsy sisa
  - type: text
    content: no hitako hatraiza hatraiza;
  - type: text
    content: ary ny fefy vato manodidina dia nirodana.
  '32':
  - type: text
    content: Nandinika ny zavatra hitako aho
  - type: text
    content: 'ka nahazo lesona avy aminy:'
  '33':
  - type: text
    content: matory kely ianao, rendremana kely,
  - type: text
    content: dia mitsotsotra kely manohon-tanana;
  '34':
  - type: text
    content: amin’izay anefa dia hamely anao tampoka
  - type: text
    content: toy ny mpisodisody ny fahantrana
  - type: text
    content: ary toy ny jiolahy ny fahoriana
  - type: note
    content: 'And 33-34: jereo 6.10-11.'
  - type: text
    content: .
  '4':
  - type: text
    content: ilàna fahalalana ny famenoana azy
  - type: text
    content: fanaka soa sy sarobidy ao anatiny.
  - type: heading
    content: (anatra faha-21)
  '5':
  - type: text
    content: Aleo hendry toy izay matanjaka;
  - type: text
    content: ary aleo manam-pahalalana toy izay mihetraketraka
  - type: note
    content: 'Mitovitovy amin’ny ohabolantsika hoe: Ny hery tsy mahaleo ny fanahy izany.'
  - type: text
    content: .
  '6':
  - type: text
    content: Tetika voarindra no hitondranao ny ady;
  - type: text
    content: ary tolotsaina maro no ahazoam-pandresena.
  - type: heading
    content: (anatra faha-22)
  '7':
  - type: text
    content: Avo tsy takatry ny adala ireo tenim-pahendrena,
  - type: text
    content: ka tsy mba manoka-bava izy eo am-bavahady
  - type: note
    content: Eo am-bavahady manko no fanaovam-pitsarana na fidinihana ny raharaham-bahoaka.
  - type: text
    content: .
  - type: heading
    content: (anatra faha-23)
  '8':
  - type: text
    content: Izay misaintsaina ny hanao ratsy
  - type: text
    content: no atao hoe mpanao tetika maizina;
  '9':
  - type: text
    content: ny tetika ataon’ny adala dia fahotana,
  - type: text
    content: ary halan’ny olona ny mpaniratsira.
  - type: heading
    content: (anatra faha-24)
