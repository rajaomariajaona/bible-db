document_id: PRO.24
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza mitsiriritra ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na maniry hiaraka aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa tsy misaina afa-tsy fandravana ny fony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy miteny afa-tsy faharatsiana ny molony.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-20)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ilàna fahendrena ny fanorenan-trano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilàna fahaizana ny hahamafy azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ilàna fahalalana ny famenoana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanaka soa sy sarobidy ao anatiny.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-21)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aleo hendry toy izay matanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aleo manam-pahalalana toy izay mihetraketraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mitovitovy amin’ny ohabolantsika hoe: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny hery tsy mahaleo ny fanahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tetika voarindra no hitondranao ny ady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tolotsaina maro no ahazoam-pandresena.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-22)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Avo tsy takatry ny adala ireo tenim-pahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba manoka-bava izy eo am-bavahady
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eo am-bavahady manko no fanaovam-pitsarana na fidinihana ny raharaham-bahoaka.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-23)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay misaintsaina ny hanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no atao hoe mpanao tetika maizina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ny tetika ataon’ny adala dia fahotana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary halan’ny olona ny mpaniratsira.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-24)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha osa amin’ny androm-pahoriana ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia kely dia kely herim-po tokoa!
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-25)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aza misalasala mamonjy ireo voaheloka ho faty
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa tsy mitombina ny antony amonoana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha hoy ianao hoe: «Tsy fantatro izany»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mahatakatra an-tsaina izany kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay mahita ny ao am-po tsy miloaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahalala izany Ilay mandinika anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hovaliany araka ny asany avy ny olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 16.2 sy 21.2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-26)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Anaka, mihinàna tantely fa tsara izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho mamy am-bavanao ny tohony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aoka ho fantatrao fa toy izany koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hatsàran’ny fahendrena ho anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa raha anananao izany, dia hisy ny hoavy handrandrainao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho foana ny fanantenànao.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-27)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ry ilay olon-dratsy, aza anaovanao otrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo akaikin’ny tranon’ny olo-marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza ravanao ny fonenany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: satria mety lavo impito ny olo-marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa tafarina ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olon-dratsy kosa mianjera
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa injay idiran-doza.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-28)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza mifaly, raha lavo ny fahavalonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mibitaka, raha mianjera izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fandrao hitan’ny TOMPO amin’ny maso ratsy izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho tezitra amin’ny fahavalonao intsony Izy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-29)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aza tezitra amin’ny mpanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mialona ny olon-dratsy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: fa tsy mba manana hoavy handrandraina ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho faty toy ny jiro mitsilopy ny fiainany.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (anatra faha-30)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Anaka, manajà ny TOMPO ary koa ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza ikambananao ireo mitady hikomy aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa hanjò azy tampoka ny antambo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary iza no mahalala izay loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: hataon’ny Tompo sy ny mpanjaka aminy?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Torohevitra hafa omen’ny olon-kendry
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izao koa dia mbola avy amin’ny hendry:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy tsara ny manao fitsarà-mitanila.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay mpitsara manao amin’ny meloka hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy manan-tsiny ianao»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hozonin’ny vahoaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hankahalain’ny firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa izay mpitsara manameloka ny diso kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho finaritra sy hiantefan’ny laza tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Porofom-pihavanana tena izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny valinteny omena am-pahatsorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Vitao aloha ny asanao any ivelany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataovy vonon-kamokatra ny saha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vao izay ianao no manangana ny tranonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aza mety ho vavolombelom-poana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanameloka tsy amin’antony ny namanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa ianao ve te hamitaka amin’ny teninao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Aza manao hoe: «Hataoko aminy izay nataony tamiko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hovaliako araka ny asany ny olona tsirairay!»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny toetoetry ny olona kamo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nandalovako, indray andro, ny sahan’ny kamo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tanimboaloboky ny tsy ampy saina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Indro tsilo sy ahidratsy sisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hitako hatraiza hatraiza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fefy vato manodidina dia nirodana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nandinika ny zavatra hitako aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka nahazo lesona avy aminy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: matory kely ianao, rendremana kely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitsotsotra kely manohon-tanana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: amin’izay anefa dia hamely anao tampoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny mpisodisody ny fahantrana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny jiolahy ny fahoriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.34 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 33-34:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 6.10-11.
    marker-yv: yv-n
  - type: text
    text: .
