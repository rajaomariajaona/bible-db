document_id: PRO.26,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ireo adala
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Diso toerana toy ny oram-panala fahavaratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na orana amin’ny fotoam-pijinjana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny voninahitra omena ny adala.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny mpampiasa manarama adala sendra mandalo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mandratra ny olona rehetra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny alika miverina amin’ny loany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2Pt 2.22.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny adala miverina amin’ny hadalàny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha mahita olona mihevi-tena ho hendry ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny adala no misy hantenaina kokoa noho izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Toetoetry ny olona kamo
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hoy ny kamo: «Misy liona ao an-dalana,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misy biby masiaka atsy an-dalambe.»
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny varavarana mihodina amin’ny saviliny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny kamo mivadibadika eo am-pandriany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mangarona ny sakafo ao an-doviany ny kamo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa mandreraka azy ny hampakatra izany ao am-bavany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny kamo dia mihevi-tena ho hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoatra noho ny olona fito kinga famaly.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ohabolana hafa
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny mpandalo izay misalovana amin’ny adin’ny hafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny misambotra amboa amin’ny sofiny.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: Ny olona mamitaka ny namany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka manao aminy hoe: «Vazivaziko ihany izany,»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tahaka ny olona adala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandefa forohana sy zana-tsipîka mahafaty.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Manidina tsy tafapetraka ny fody sy ny sindintsidina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'toy izany koa ny fanozonam-poana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba hihatra akory izany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Rehefa tsy misy kitay intsony, dia maty ny afo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa tsy misy mpanendrikendrika intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mitsahatra ny fifandirana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny arina mitaiza vain’afo, ny kitay mitaiza afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny olona liana ady mandrehitra fifandirana.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Toa hani-matsiro ny tenin’ny mpanendrikendrika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka any anaty kibo no mikorotsaka.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Toy ny ankoso-bolafotsy amin’ny tanimanga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny teny mandodoka manafina fo ratsy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Teny mihatsaravelatsihy no ataon’ny mpankahala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo ny ao anatiny mikotrika fitaka;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: koa na dia miteny amim-pitiavana aza izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aza matoky azy fa feno rikoriko ny fony;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: mahay manafim-pankahalana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa hiharihary am-pahibemaso ny haratsiany.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Izay mihady lavaka no ho latsaka ao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay manakodia vato no hikodiavany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny mampahory olona amin’ny lainga dia fankahalana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny teny mandokadoka no ahitan-doza.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny karavasy dia ho an’ny soavaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lamboridy ho an’ny boriky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tsorakazo ho an’ny lamosin’ny adala.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Aza mamaly ny adala araka ny hadalany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao mba adala tahaka azy koa ianao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Valio araka ny hadalany ny adala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao mihevi-tena ho hendry izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Izay mampitondra hafatra ny adala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny olona manapa-tongotra ny tenany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tonga miboboka fahavoazana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny ohabolana lazain’ny adala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mikolepaka tahaka ny malemy tongotra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Toy ny mamatotra vato amin’ny antsamotady
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mamatotra vato amin’ny antsamotady '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia hadalana satria amin’izay tsy voatsipy akory ilay vato.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny manome voninahitra ny adala.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny ohabolana lazain’ny adala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny tsilo hazonin’ny mamo.
