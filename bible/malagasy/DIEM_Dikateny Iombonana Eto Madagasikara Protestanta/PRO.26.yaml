document_id: PRO.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ireo adala
  - type: text
    content: Diso toerana toy ny oram-panala fahavaratra
  - type: text
    content: na orana amin’ny fotoam-pijinjana
  - type: text
    content: ny voninahitra omena ny adala.
  '10':
  - type: text
    content: Ny mpampiasa manarama adala sendra mandalo
  - type: text
    content: dia mandratra ny olona rehetra.
  '11':
  - type: text
    content: Ny alika miverina amin’ny loany
  - type: note
    content: Jereo 2Pt 2.22.
  - type: text
    content: ary ny adala miverina amin’ny hadalàny.
  '12':
  - type: text
    content: Raha mahita olona mihevi-tena ho hendry ianao,
  - type: text
    content: dia ny adala no misy hantenaina kokoa noho izy.
  - type: heading
    content: Toetoetry ny olona kamo
  '13':
  - type: text
    content: 'Hoy ny kamo: «Misy liona ao an-dalana,'
  - type: text
    content: misy biby masiaka atsy an-dalambe.»
  '14':
  - type: text
    content: Ny varavarana mihodina amin’ny saviliny
  - type: text
    content: ary ny kamo mivadibadika eo am-pandriany.
  '15':
  - type: text
    content: Mangarona ny sakafo ao an-doviany ny kamo
  - type: text
    content: nefa mandreraka azy ny hampakatra izany ao am-bavany.
  '16':
  - type: text
    content: Ny kamo dia mihevi-tena ho hendry
  - type: text
    content: mihoatra noho ny olona fito kinga famaly.
  - type: heading
    content: Ohabolana hafa
  '17':
  - type: text
    content: Ny mpandalo izay misalovana amin’ny adin’ny hafa
  - type: text
    content: dia toy ny misambotra amboa amin’ny sofiny.
  '18':
  - type: text
    content: Ny olona mamitaka ny namany
  - type: text
    content: 'ka manao aminy hoe: «Vazivaziko ihany izany,»'
  - type: text
    content: dia tahaka ny olona adala
  - type: text
    content: mandefa forohana sy zana-tsipîka mahafaty.
  '2':
  - type: text
    content: Manidina tsy tafapetraka ny fody sy ny sindintsidina;
  - type: text
    content: 'toy izany koa ny fanozonam-poana:'
  - type: text
    content: tsy mba hihatra akory izany.
  '20':
  - type: text
    content: Rehefa tsy misy kitay intsony, dia maty ny afo;
  - type: text
    content: ary rehefa tsy misy mpanendrikendrika intsony,
  - type: text
    content: dia mitsahatra ny fifandirana.
  '21':
  - type: text
    content: Ny arina mitaiza vain’afo, ny kitay mitaiza afo
  - type: text
    content: ary ny olona liana ady mandrehitra fifandirana.
  '22':
  - type: text
    content: Toa hani-matsiro ny tenin’ny mpanendrikendrika
  - type: text
    content: ka any anaty kibo no mikorotsaka.
  '23':
  - type: text
    content: Toy ny ankoso-bolafotsy amin’ny tanimanga
  - type: text
    content: ny teny mandodoka manafina fo ratsy.
  '24':
  - type: text
    content: Teny mihatsaravelatsihy no ataon’ny mpankahala
  - type: text
    content: kanjo ny ao anatiny mikotrika fitaka;
  '25':
  - type: text
    content: koa na dia miteny amim-pitiavana aza izy,
  - type: text
    content: dia aza matoky azy fa feno rikoriko ny fony;
  '26':
  - type: text
    content: mahay manafim-pankahalana izy,
  - type: text
    content: nefa hiharihary am-pahibemaso ny haratsiany.
  '27':
  - type: text
    content: Izay mihady lavaka no ho latsaka ao
  - type: text
    content: ary izay manakodia vato no hikodiavany.
  '28':
  - type: text
    content: Ny mampahory olona amin’ny lainga dia fankahalana azy;
  - type: text
    content: ary ny teny mandokadoka no ahitan-doza.
  '3':
  - type: text
    content: Ny karavasy dia ho an’ny soavaly,
  - type: text
    content: ny lamboridy ho an’ny boriky
  - type: text
    content: ary ny tsorakazo ho an’ny lamosin’ny adala.
  '4':
  - type: text
    content: Aza mamaly ny adala araka ny hadalany,
  - type: text
    content: fandrao mba adala tahaka azy koa ianao.
  '5':
  - type: text
    content: Valio araka ny hadalany ny adala
  - type: text
    content: fandrao mihevi-tena ho hendry izy.
  '6':
  - type: text
    content: Izay mampitondra hafatra ny adala
  - type: text
    content: dia toy ny olona manapa-tongotra ny tenany
  - type: text
    content: ka tonga miboboka fahavoazana.
  '7':
  - type: text
    content: Ny ohabolana lazain’ny adala
  - type: text
    content: dia mikolepaka tahaka ny malemy tongotra.
  '8':
  - type: text
    content: Toy ny mamatotra vato amin’ny antsamotady
  - type: note
    content: mamatotra vato amin’ny antsamotady dia hadalana satria amin’izay tsy voatsipy akory ilay vato.
  - type: text
    content: ny manome voninahitra ny adala.
  '9':
  - type: text
    content: Ny ohabolana lazain’ny adala
  - type: text
    content: dia toy ny tsilo hazonin’ny mamo.
