  children:
  - type: text
    text: Ny fahendrena, harena miafina
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Anaka, raisonao ny teniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataovy raki-tsoa ho anao ny didiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Henoy ny teny ataon’ny fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ampiezaho ny fonao hahay manavaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mangataha fanampiana amin’ny fahalalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miantsoa famonjena amin’ny fahaiza-manavaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa raha tadiavinao toy ny fitady volafotsy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary katsahinao toy ny fikatsaka harena nafenina
  - type: usfm
    marker: f
    children:
    - type: usfm
