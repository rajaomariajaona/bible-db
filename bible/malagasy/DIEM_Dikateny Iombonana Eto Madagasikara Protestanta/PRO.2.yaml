  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mitondra amin’ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny toetran’izany vehivavy izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mankany amin’ny fahaverezana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitapitaka ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay mankao amin’izany vehivavy izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy misy afa-miverina intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mihazo ny lalan’ny fiainana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Noho izany, ny toetran’ny tsara fanahy no hizoranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sori-dalan’ny olo-marina no hotandremanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa ny olo-mahitsy sady tsy manan-tsiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no honina amin’ny tany sy hitoetra eo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny olon-dratsy sy ny mpivadika kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: hofongorana amin’ny tany sy ho voaroaka tao.
