document_id: PRO.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahendrena, harena miafina
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, raisonao ny teniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataovy raki-tsoa ho anao ny didiko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tonga ao am-ponao ny fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampifaly anao ny fahalalana,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiaro anao ny fahamalinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiambina anao ny fahaiza-manavaka;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo no hampiala anao amin’ny toe-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny olona miteny fitaka
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mandao ny sori-dàlam-pahitsiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hizotra amin’ny lalan’ny haizina,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny olona faly manao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady finaritra amin’ny famitaha-namana,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miolikolika sori-dalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mivaona amin’ny fitapitaka.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamalinana sy fahaiza-manavaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hampiala anao koa amin’ny teny mandrobo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fanaon’ny vehivavy izay vadin’olona,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia vehivavy nandao ny vadiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanadino ny fifanekena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nataony teo amin’Andriamaniny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mal 2.14-16.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitondra amin’ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny toetran’izany vehivavy izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mankany amin’ny fahaverezana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fitapitaka ataony.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mankao amin’izany vehivavy izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy misy afa-miverina intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mihazo ny lalan’ny fiainana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy ny teny ataon’ny fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ampiezaho ny fonao hahay manavaka.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany, ny toetran’ny tsara fanahy no hizoranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sori-dalan’ny olo-marina no hotandremanao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny olo-mahitsy sady tsy manan-tsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no honina amin’ny tany sy hitoetra eo.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olon-dratsy sy ny mpivadika kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hofongorana amin’ny tany sy ho voaroaka tao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangataha fanampiana amin’ny fahalalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miantsoa famonjena amin’ny fahaiza-manavaka.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha tadiavinao toy ny fitady volafotsy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary katsahinao toy ny fikatsaka harena nafenina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.14-16; 8.11; 16.16; Jôb 28.12-19; Kôh 7.11; 9.16-18.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho fantatrao tokoa ny fanajana ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho hitanao ny fahalalana an’Andriamanitra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny TOMPO no manome ny fahendrena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy amin’ny vavany no mipoitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahalalana sy ny fahiratan-tsaina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Kôh 2.26.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampahomby ny olo-mahitsy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny ampinga fiarovana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’izay mandeha tsy misy tsiny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miaro ny lalan’ny fahamarinana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miambina izay mpifikitra aminy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mihaino Ahy ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho fantatrao ny marina sy rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hizoranao avokoa ny lalam-pahasambarana.
