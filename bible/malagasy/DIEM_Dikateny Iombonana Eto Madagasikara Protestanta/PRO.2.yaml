  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mampahomby ny olo-mahitsy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny ampinga fiarovana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’izay mandeha tsy misy tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Miaro ny lalan’ny fahamarinana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miambina izay mpifikitra aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha mihaino Ahy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fantatrao ny marina sy rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hizoranao avokoa ny lalam-pahasambarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ho tonga ao am-ponao ny fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampifaly anao ny fahalalana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: hiaro anao ny fahamalinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiambina anao ny fahaiza-manavaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ireo no hampiala anao amin’ny toe-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny olona miteny fitaka
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: na mandao ny sori-dàlam-pahitsiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hizotra amin’ny lalan’ny haizina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia ny olona faly manao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady finaritra amin’ny famitaha-namana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: miolikolika sori-dalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mivaona amin’ny fitapitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fahamalinana sy fahaiza-manavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hampiala anao koa amin’ny teny mandrobo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanaon’ny vehivavy izay vadin’olona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: dia vehivavy nandao ny vadiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nanadino ny fifanekena
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nataony teo amin’Andriamaniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
