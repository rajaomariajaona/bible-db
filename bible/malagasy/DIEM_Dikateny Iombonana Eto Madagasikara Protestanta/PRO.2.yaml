    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dia ho fantatrao tokoa ny fanajana ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho hitanao ny fahalalana an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny TOMPO no manome ny fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avy amin’ny vavany no mipoitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahalalana sy ny fahiratan-tsaina
  - type: usfm
    marker: f
    children:
    - type: usfm
