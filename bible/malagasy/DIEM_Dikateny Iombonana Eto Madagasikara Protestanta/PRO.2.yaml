document_id: PRO.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahendrena, harena miafina
  - type: text
    content: Anaka, raisonao ny teniko
  - type: text
    content: ary ataovy raki-tsoa ho anao ny didiko.
  '10':
  - type: text
    content: Ho tonga ao am-ponao ny fahendrena,
  - type: text
    content: ary hampifaly anao ny fahalalana,
  '11':
  - type: text
    content: hiaro anao ny fahamalinana
  - type: text
    content: ary hiambina anao ny fahaiza-manavaka;
  '12':
  - type: text
    content: ireo no hampiala anao amin’ny toe-dratsy
  - type: text
    content: sy amin’ny olona miteny fitaka
  '13':
  - type: text
    content: na mandao ny sori-dàlam-pahitsiana
  - type: text
    content: mba hizotra amin’ny lalan’ny haizina,
  '14':
  - type: text
    content: dia ny olona faly manao ratsy
  - type: text
    content: sady finaritra amin’ny famitaha-namana,
  '15':
  - type: text
    content: miolikolika sori-dalana
  - type: text
    content: ka mivaona amin’ny fitapitaka.
  '16':
  - type: text
    content: Ny fahamalinana sy fahaiza-manavaka
  - type: text
    content: no hampiala anao koa amin’ny teny mandrobo
  - type: text
    content: fanaon’ny vehivavy izay vadin’olona,
  '17':
  - type: text
    content: dia vehivavy nandao ny vadiny
  - type: text
    content: sy nanadino ny fifanekena
  - type: text
    content: izay nataony teo amin’Andriamaniny
  - type: note
    content: Jereo Mal 2.14-16.
  - type: text
    content: .
  '18':
  - type: text
    content: Mitondra amin’ny fahafatesana
  - type: text
    content: ny toetran’izany vehivavy izany,
  - type: text
    content: ary mankany amin’ny fahaverezana
  - type: text
    content: ny fitapitaka ataony.
  '19':
  - type: text
    content: Izay mankao amin’izany vehivavy izany
  - type: text
    content: dia tsy misy afa-miverina intsony
  - type: text
    content: ary tsy mihazo ny lalan’ny fiainana.
  '2':
  - type: text
    content: Henoy ny teny ataon’ny fahendrena
  - type: text
    content: ka ampiezaho ny fonao hahay manavaka.
  '20':
  - type: text
    content: Noho izany, ny toetran’ny tsara fanahy no hizoranao
  - type: text
    content: ary ny sori-dalan’ny olo-marina no hotandremanao.
  '21':
  - type: text
    content: Fa ny olo-mahitsy sady tsy manan-tsiny
  - type: text
    content: no honina amin’ny tany sy hitoetra eo.
  '22':
  - type: text
    content: Ny olon-dratsy sy ny mpivadika kosa
  - type: text
    content: hofongorana amin’ny tany sy ho voaroaka tao.
  '3':
  - type: text
    content: Mangataha fanampiana amin’ny fahalalana,
  - type: text
    content: miantsoa famonjena amin’ny fahaiza-manavaka.
  '4':
  - type: text
    content: Fa raha tadiavinao toy ny fitady volafotsy ireo
  - type: text
    content: ary katsahinao toy ny fikatsaka harena nafenina
  - type: note
    content: Jereo 3.14-16; 8.11; 16.16; Jôb 28.12-19; Kôh 7.11; 9.16-18.
  - type: text
    content: .
  '5':
  - type: text
    content: dia ho fantatrao tokoa ny fanajana ny TOMPO
  - type: text
    content: ary ho hitanao ny fahalalana an’Andriamanitra.
  '6':
  - type: text
    content: Fa ny TOMPO no manome ny fahendrena;
  - type: text
    content: ary avy amin’ny vavany no mipoitra
  - type: text
    content: ny fahalalana sy ny fahiratan-tsaina
  - type: note
    content: Jereo Kôh 2.26.
  - type: text
    content: .
  '7':
  - type: text
    content: Mampahomby ny olo-mahitsy Izy
  - type: text
    content: ary toy ny ampinga fiarovana
  - type: text
    content: ho an’izay mandeha tsy misy tsiny.
  '8':
  - type: text
    content: Miaro ny lalan’ny fahamarinana Izy
  - type: text
    content: ary miambina izay mpifikitra aminy.
  '9':
  - type: text
    content: Raha mihaino Ahy ianao,
  - type: text
    content: dia ho fantatrao ny marina sy rariny
  - type: text
    content: ary hizoranao avokoa ny lalam-pahasambarana.
