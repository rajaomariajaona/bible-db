document_id: NUM.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Voan’ny habokana i Miriama
  - type: text
    content: Nanome tsiny an’i Mosesy i Miriama sy i Aharôna noho ny nanambadiany vehivavy kosita
  - type: note
    content: 'kosita: dia mety ho dikan’ny hoe an’ny fokon’i Kosàna eto (ampit Hab 37).'
  - type: text
    content: ', fa nampakatra vehivavy kosita tokoa izy. '
  '10':
  - type: text
    content: 'Rehefa nisandratra ho eo ambonin’ny Tranolay ny rahona, dia indro feno pentina fotsy toa oram-panala i Miriama fa '
  - type: text
    content: boka
  - type: text
    content: '. Nijery azy i Aharôna ka nahita fa boka ny anabaviny. '
  '11':
  - type: text
    content: 'Ka hoy i Aharôna tamin’i Mosesy:'
  - type: text
    content: '–Meloka izahay, tompoko, koa aoka re tsy havalinao aminay izany toetran’adala amam-pahotanay izany! '
  '12':
  - type: text
    content: Aoka re i Miriama tsy ho toy ny zazarano tsy azo izay lany sasaka ny nofony raha vao teraka!
  '13':
  - type: text
    content: 'Nitaraina tamin’ny TOMPO i Mosesy ka nanao hoe:'
  - type: text
    content: –Andriamanitra ô, mba sitrano re izy!
  '14':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Raha nororan-drainy ny tavany, moa tsy ho menatra herinandro va izy? Avaho mandritra ny fito andro any ivelan’ny toby izy. Fa aorian’izany izy vao afaka miditra ao indray
  - type: note
    content: Ampit 5.2-3.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Dia navahana tany ivelan’ny toby nandritra ny herinandro i Miriama, ary tsy niainga ny Israelita, raha tsy efa nandray ny toerany indray izy. '
  '16':
  - type: text
    content: Rehefa izany, dia niala tao Hatserôta ny vahoaka ka nitoby tao an-taniefitr’i Paràna.
  '2':
  - type: text
    content: 'Hoy izy mianadahy hoe:'
  - type: text
    content: –I Mosesy ihany ve no nitenenan’ny TOMPO, fa tsy izahay koa?
  - type: text
    content: 'Dia ren’ny TOMPO izany. '
  '3':
  - type: text
    content: 'I Mosesy kosa dia lehilahy malemy fanahy mihoatra noho ny olona hafa rehetra ambonin’ny tany. '
  '4':
  - type: text
    content: 'Tampoka teo dia hoy ny TOMPO tamin’i Mosesy sy i Aharôna ary i Miriama:'
  - type: text
    content: '–Mankanesa ianareo telo mianadahy ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: .
  - type: text
    content: 'Dia nankany izy ireo. '
  '5':
  - type: text
    content: Nidina tanatin’ny andry rahona ny TOMPO
  - type: note
    content: Jereo Eks 13.21 sy nta.
  - type: text
    content: ' ka nijoro teo am-baravaran’ny Tranolay ary niantso an’i Aharôna sy i Miriama. Dia samy nandroso izy mianadahy, '
  '6':
  - type: text
    content: 'ka hoy ny TOMPO taminy:'
  - type: text
    content: '–Henoy tsara ny teniko: Raha misy '
  - type: text
    content: mpaminany
  - type: text
    content: ' eo aminareo, dia amin’ny fahitana no isehoako aminy, ary amin’ny nofy no itenenako aminy. '
  '7':
  - type: text
    content: Fa tsy mba toy izany kosa i Mosesy mpanompoko izay olona mahatoky tamin’ny fiandraiketana ny tranoko manontolo
  - type: note
    content: 'tranoko manontolo: jereo Heb 3.2. Tsy ny Fonena-masina no ambara amin’izany fa ny vahoaka israelita tsivakivolo.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: Mifanatrika no itenenako aminy, dia amin’ny teny mazava fa tsy miafina; ary mahita Ahy TOMPO miseho aminy izy; koa nahoana ianareo no tsy natahotra hanome tsiny an’i Mosesy mpanompoko?
  '9':
  - type: text
    content: 'Tezitra mafy tamin’izy mianadahy ny TOMPO ka lasa nandeha. '
