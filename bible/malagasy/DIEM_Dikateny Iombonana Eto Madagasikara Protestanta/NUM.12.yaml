document_id: NUM.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voan’ny habokana i Miriama
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanome tsiny an’i Mosesy i Miriama sy i Aharôna noho ny nanambadiany vehivavy kosita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'kosita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia mety ho dikan’ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: an’ny fokon’i Kosàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto (ampit Hab 37).'
      marker-yv: yv-n
    - type: text
      text: ', fa nampakatra vehivavy kosita tokoa izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nisandratra ho eo ambonin’ny Tranolay ny rahona, dia indro feno pentina fotsy toa oram-panala i Miriama fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: boka
    - type: text
      text: '. Nijery azy i Aharôna ka nahita fa boka ny anabaviny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Aharôna tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Meloka izahay, tompoko, koa aoka re tsy havalinao aminay izany toetran’adala amam-pahotanay izany! '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Aoka re i Miriama tsy ho toy ny zazarano tsy azo izay lany sasaka ny nofony raha vao teraka!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitaraina tamin’ny TOMPO i Mosesy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andriamanitra ô, mba sitrano re izy!
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha nororan-drainy ny tavany, moa tsy ho menatra herinandro va izy? Avaho mandritra ny fito andro any ivelan’ny toby izy. Fa aorian’izany izy vao afaka miditra ao indray
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 5.2-3.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia navahana tany ivelan’ny toby nandritra ny herinandro i Miriama, ary tsy niainga ny Israelita, raha tsy efa nandray ny toerany indray izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa izany, dia niala tao Hatserôta ny vahoaka ka nitoby tao an-taniefitr’i Paràna.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy mianadahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –I Mosesy ihany ve no nitenenan’ny TOMPO, fa tsy izahay koa?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ren’ny TOMPO izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Mosesy kosa dia lehilahy malemy fanahy mihoatra noho ny olona hafa rehetra ambonin’ny tany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tampoka teo dia hoy ny TOMPO tamin’i Mosesy sy i Aharôna ary i Miriama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mankanesa ianareo telo mianadahy ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankany izy ireo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nidina tanatin’ny andry rahona ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 13.21 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ka nijoro teo am-baravaran’ny Tranolay ary niantso an’i Aharôna sy i Miriama. Dia samy nandroso izy mianadahy, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy ny TOMPO taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Henoy tsara ny teniko: Raha misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' eo aminareo, dia amin’ny fahitana no isehoako aminy, ary amin’ny nofy no itenenako aminy. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa tsy mba toy izany kosa i Mosesy mpanompoko izay olona mahatoky tamin’ny fiandraiketana ny tranoko manontolo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tranoko manontolo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Heb 3.2. Tsy ny Fonena-masina no ambara amin’izany fa ny vahoaka israelita tsivakivolo.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mifanatrika no itenenako aminy, dia amin’ny teny mazava fa tsy miafina; ary mahita Ahy TOMPO miseho aminy izy; koa nahoana ianareo no tsy natahotra hanome tsiny an’i Mosesy mpanompoko?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tezitra mafy tamin’izy mianadahy ny TOMPO ka lasa nandeha. '
