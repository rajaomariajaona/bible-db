document_id: PSA.102,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Fahoriana lalina sy fanantenana
  - type: text
    content: ' '
  - type: text
    content: Vavaky ny ory, rehefa trotraka izy ka mamboraka ny tarainany amin’ny TOMPO.
  '10':
  - type: text
    content: Lavenona no toy ny sakafo hohaniko,
  - type: text
    content: haroiko ranomaso ny zavatra sotroiko.
  '11':
  - type: text
    content: Noho ny fahatezeranao sy ny fahaviniranao,
  - type: text
    content: dia ningainao aho ka natsipinao lavitra.
  '12':
  - type: text
    content: Toy ny fandroson’ny aloka ny androm-piainako;
  - type: text
    content: ary mihamalazo toy ny ahitra ny tenako.
  '13':
  - type: text
    content: Ianao kosa, TOMPO ô, manjaka mandrakizay
  - type: text
    content: ary maharitra hatrany hatrany ny lazanao.
  '14':
  - type: text
    content: Hirotsaka an-tsehatra Ianao
  - type: text
    content: 'ka hamindrafo amin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: fa tonga ny fotoana hiantranao azy;
  - type: text
    content: eny, izao no fotoana mety amin’izany.
  '15':
  - type: text
    content: Fa sitrakay mpanomponao i Tsiôna,
  - type: text
    content: na dia rava aza ny rari-vatony;
  - type: text
    content: ary mampangorakoraka anay izy,
  - type: text
    content: na dia voarodana zary vovotany aza.
  '16':
  - type: text
    content: Aoka ny firenen-kafa rehetra
  - type: text
    content: haneho fanajana ny TOMPO;
  - type: text
    content: 'ary aoka hiaiky Azy be '
  - type: text
    content: voninahitra
  - type: text
    content: ny mpanjaka rehetra eto an-tany!
  '17':
  - type: text
    content: Fa rehefa hanangana indray an’i Tsiôna IZY
  - type: text
    content: ka hiseho miharihary amim-boninahitra,
  '18':
  - type: text
    content: dia hitodika ny vavak’ireo norobaina
  - type: text
    content: ary tsy hanositosika ny fangatahany.
  '19':
  - type: text
    content: Soraty izany ho an’ny taranaka any aoriana
  - type: text
    content: ka hidera ny Tompo ireo vahoaka mbola ho ary
  - type: note
    content: Jereo Sal 22.31-32.
  - type: text
    content: .
  '2':
  - type: text
    content: TOMPO ô, mba henoy vavaka aho;
  - type: text
    content: aoka ho tonga any aminao ny tarainako!
  '20':
  - type: text
    content: Avy any an-
  - type: text
    content: Toeramasiny
  - type: text
    content: ' any ambony ny TOMPO'
  - type: text
    content: no miondrika mba hijery;
  - type: text
    content: avy any an-danitra any Izy
  - type: text
    content: no nitazana an’ity tany ity,
  '21':
  - type: text
    content: ka nihaino ny tarainan’ireo voafonja
  - type: text
    content: sy namaha ny fatoran’ireo voaheloka ho faty.
  '22':
  - type: text
    content: Dia hambara ao Tsiôna ny lazan’ny TOMPO
  - type: text
    content: ary hohiraina ao Jerosalema ny fiderana Azy,
  '23':
  - type: text
    content: rehefa ho tafaray ao ireo vahoaka sy ireo fanjakana
  - type: text
    content: mba hanao fanompoam-pivavahana ho an’ny TOMPO.
  '24':
  - type: text
    content: Mbola teo antsasa-dalam-piainako aho, Tompo ô,
  - type: text
    content: no nahenanao ny heriko ary nohafohezinao ny androko.
  '25':
  - type: text
    content: 'Ka hoy aho hoe: «Andriamanitra ô, aza alainao'
  - type: text
    content: eny antenatenan’ny androm-piainako aho;
  - type: text
    content: fa ny taonanao tsy mba ho tapitra rahoviana.»
  '26':
  - type: text
    content: Fahiny elabe no nanorenanao ny tany
  - type: text
    content: sy nanamboaranao ny lanitra.
  '27':
  - type: text
    content: Mbola ho levona ireo
  - type: text
    content: fa Ianao kosa maharitra.
  - type: text
    content: Mihatonta toy ny fitafiana ireo;
  - type: text
    content: hosoloanao toa akanjo, dia voasolo;
  '28':
  - type: text
    content: fa Ianao kosa tsy mba miova
  - type: text
    content: ary ny taonanao tsy mba hifarana
  - type: note
    content: Jereo Is 51.6-8. Ny and 26-28 dia tsiahivin’ny Heb 1.10-12.
  - type: text
    content: .
  '29':
  - type: text
    content: Ny zanakay hiorim-ponenana feizay
  - type: text
    content: ary ny taranakay hateza eo anatrehanao.
  '3':
  - type: text
    content: Aza lavinao ny hijery ahy
  - type: text
    content: amin’ny androm-pahoriako.
  - type: text
    content: Anongilano sofina aho ka valio faingana
  - type: text
    content: amin’ny andro iantsoako vonjy aminao.
  '4':
  - type: text
    content: Fa levona toy ny setroka ny androm-piainako,
  - type: text
    content: ary kila toy ny tapa-porohana ny faraheriko.
  '5':
  - type: text
    content: Toy ny ahitra voakapa ny foko ka malazo;
  - type: text
    content: hadinoko mbamin’ny homan-kanina aza.
  '6':
  - type: text
    content: Reraka noho ny fisentoako aho,
  - type: text
    content: ka taolana sisa no mipetaka amin’ny hoditro.
  '7':
  - type: text
    content: Sahala amin’ny vorondreo any an-taniefitra aho
  - type: text
    content: ary tahaka ny vorondolo an-tanàna aolo.
  '8':
  - type: text
    content: Tsy mahita tory aho, fa mitoloko
  - type: text
    content: tahaka ny voro-manirery eny an-tafontrano.
  '9':
  - type: text
    content: Tontolo andro aho latsaim-pahavalo
  - type: text
    content: sady iozonany amin-karomotana.
