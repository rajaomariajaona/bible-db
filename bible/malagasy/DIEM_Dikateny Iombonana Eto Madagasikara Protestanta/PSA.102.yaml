document_id: PSA.102
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Fahoriana lalina sy fanantenana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vavaky ny ory, rehefa trotraka izy ka mamboraka ny tarainany amin’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: TOMPO ô, mba henoy vavaka aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho tonga any aminao ny tarainako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza lavinao ny hijery ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny androm-pahoriako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anongilano sofina aho ka valio faingana
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro iantsoako vonjy aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa levona toy ny setroka ny androm-piainako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary kila toy ny tapa-porohana ny faraheriko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy ny ahitra voakapa ny foko ka malazo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hadinoko mbamin’ny homan-kanina aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Reraka noho ny fisentoako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka taolana sisa no mipetaka amin’ny hoditro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sahala amin’ny vorondreo any an-taniefitra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny vorondolo an-tanàna aolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy mahita tory aho, fa mitoloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny voro-manirery eny an-tafontrano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tontolo andro aho latsaim-pahavalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady iozonany amin-karomotana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lavenona no toy ny sakafo hohaniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: haroiko ranomaso ny zavatra sotroiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Noho ny fahatezeranao sy ny fahaviniranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ningainao aho ka natsipinao lavitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Toy ny fandroson’ny aloka ny androm-piainako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihamalazo toy ny ahitra ny tenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ianao kosa, TOMPO ô, manjaka mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maharitra hatrany hatrany ny lazanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hirotsaka an-tsehatra Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hamindrafo amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tonga ny fotoana hiantranao azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, izao no fotoana mety amin’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa sitrakay mpanomponao i Tsiôna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia rava aza ny rari-vatony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampangorakoraka anay izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia voarodana zary vovotany aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka ny firenen-kafa rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: haneho fanajana ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary aoka hiaiky Azy be '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voninahitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpanjaka rehetra eto an-tany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa rehefa hanangana indray an’i Tsiôna IZY
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiseho miharihary amim-boninahitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia hitodika ny vavak’ireo norobaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hanositosika ny fangatahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Soraty izany ho an’ny taranaka any aoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hidera ny Tompo ireo vahoaka mbola ho ary
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '102.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 22.31-32.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Avy any an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasiny
  - type: text
    text: ' any ambony ny TOMPO'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no miondrika mba hijery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any an-danitra any Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nitazana an’ity tany ity,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ka nihaino ny tarainan’ireo voafonja
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy namaha ny fatoran’ireo voaheloka ho faty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia hambara ao Tsiôna ny lazan’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hohiraina ao Jerosalema ny fiderana Azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: rehefa ho tafaray ao ireo vahoaka sy ireo fanjakana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanao fanompoam-pivavahana ho an’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mbola teo antsasa-dalam-piainako aho, Tompo ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nahenanao ny heriko ary nohafohezinao ny androko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ka hoy aho hoe: «Andriamanitra ô, aza alainao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny antenatenan’ny androm-piainako aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny taonanao tsy mba ho tapitra rahoviana.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fahiny elabe no nanorenanao ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nanamboaranao ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mbola ho levona ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Ianao kosa maharitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihatonta toy ny fitafiana ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hosoloanao toa akanjo, dia voasolo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: fa Ianao kosa tsy mba miova
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taonanao tsy mba hifarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '102.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 51.6-8. Ny and 26-28 dia tsiahivin’ny Heb 1.10-12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny zanakay hiorim-ponenana feizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taranakay hateza eo anatrehanao.
