type_code: plt
verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: Jiosy niova ho kristianina ny renin’i Timôty, ary Grika ny rainy. Tany Listra tanàna any Azia Minôra (i Torkia any Azia ankehitriny) no nahitan’i Paoly voalohany an’i Timôty, fony izy nitety tany fanindroany nitory ny Vaovao Mahafaly (Asa 16.1-3). Taorian’io fihaonana io, dia i Timôty no mpiara-dia akaiky indrindra an’i Paoly. Tamin’ny ankabeazan’ny fitetezan-tany nataon’i Paoly, dia mpiara-dia tsy nahasaraka azy i Timôty, ka imbetsaka no nametrahany adidy sarotra teo amin’ny Fiangonana nisy nanahirankirana. Izany no maha voatonona ny anarany matetika ao amin’ny boky mirakitra ny Asan’ny apôstôly (ohatra 17.14-15; 18.5; 19.22) na ao amin’ireo taratasin’i Paoly (ohatra 1 Kôr 4.17; 16.10-11; Fil 2.19-24; 1 Tes 3.2-6; sns). Ireo taratasy anankiroa ho an’i Timôty sy ilay ho an’i Tito dia antsoina hoe «taratasy pastôraly» nanomboka tamin’ny taonjato faha-18 satria nisy torolalana betsaka ho an’ny mpitondra Fiangonana na mpiandraikitra Fiangonana.
  - type: text
    content: 'Ny taratasy voalohany ho an’i Timôty dia miresaka lafin-javatra lehibe anankitelo:'
  - type: text
    content: –Voalohany indrindra ity taratasy ity dia mampitandrina ny Fiangonana amin’ireo fampianaran-diso, izay ifangaroan’ny fotokevitry ny Jiosy sy ny hafa firenena, ka ilofosan’ny sasany haely. Ny iankinan’ireo fampianaran-diso ireo dia ny finoana fa ratsy tokoa izao tontolo hita maso izao, ka tsy misy fomba hahatratrarana ny famonjena afa-tsy ny fahalalana tsiambaratelo manokana izay tsy fantatra raha tsy efa milatsaka ho isan’ny mpanaraka ireo fampianarana ireo. Mampifady ny hanina sasany sy ny fanambadiana koa ireo fampianarana ireo.
  - type: text
    content: –Manaraka izany, dia ambaran’ity taratasy ity ny fepetra momba ny fanompoam-pivavahana sy ny fandaminana ny Fiangonana ary ny fitondrantenan’ireo mpiandraikitra na mpitondra Fiangonana.
  - type: text
    content: –Farany, atolotr’ity taratasy ity ny torohevitra ho an’i Timôty momba ny tokony hanatontosany ny fanompoany sy hikarakarany ny sokajin’olona samihafa eo amin’ny mpino, mba ho «mpanompo tsaran’i Kristy Jesoa» (4.6) tokoa.
  - type: text
    content: 'Azo zaraina roa lehibe ity taratasy ity: fampianarana ho an’ny Fiangonana ankapobeny sy ireo mpitondra azy (toko 1–3); hafatrafatra momba ny asan’i Timôty manokana (toko 4–6).'
  - type: text
    content: Tsy dia fanoavana henjana tsy akory no takîna amin’ny Fiangonana sy ny mpitondra azy, fa fandraisana andraikitra mifototra amin’ny fiderana sy fitsaohana an’i Jesoa Kristy, ilay mpanavotra antsika (2.3-6).
