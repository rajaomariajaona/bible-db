document_id: 2CH.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao tonga tany Jerosalema i Rehabohama, dia namory miaramila voafantina miisa vondrona 180 tamin’ny fokon’i Joda sy i Benjamîna mba hiady amin’i Israely avaratra ka hamerina indray io fanjakana io ho an’ny tenany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mbamin’i Tsôrehà sy i Aialôna ary i Hebrôna, izay samy tanànamimanda ao anatin’ny faritr’i Joda sy i Benjamîna. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nohamafisin’i Rehabohama ny mandan’ireo tanàna ireo sady nametrahany mpifehy ary koa sakafo sy menaka aman-divay tao aminy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isan-tanàna dia nasiany ampinga lehibe sy lefona avokoa. Ny nanamafisany tsara ireo tanàna ireo no nitazonan’i Rehabohama ny faritr’i Joda sy i Benjamîna ho azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niandany tamin’i Rehabohama ny mpisorona sy ny levita
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' izay nonina tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' avaratra manontolo dia niainga avy any amin’ny faritra rehetra nisy azy ka niandany tamin’i Rehabohama. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nandao tanim-bilona amam-pananana ny levita ka nankany Joda sy Jerosalema, satria i Jerôbohama sy ireo zanany lahy efa nisakana azy tsy hanao ny raharaham-pisoronany ho an’ny TOMPO; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nanendry olona ho mpisorona manko izy hisahana ireo toeram-panasinana sy hikarakara ireo sarin’osilahy na ombilahikely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'osilahy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo Lev 7.7 sy nta; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ombilahikely
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 1 Mp 12.26-33.'
      marker-yv: yv-n
    - type: text
      text: ' izay sampy nampamboariny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na iza na iza anisan’ny foko rehetra tamin’i Israely avaratra, ka nafana fo hitady ny TOMPO Andriamanitr’i Israely, dia nanaraka ireo levita nankany Jerosalema mba hanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' amin’ny TOMPO Andriamanitry ny razany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka dia nampahery ny fanjakàn’i Joda izy ireny sady nijoro ho mpanohana an’i Rehabohama zanakalahin’i Salômôna, nandritra ny telo taona; fa ny fitondrantena tsara narahin’i Davida sy i Salômôna no nizoran’i Rehabohama nandritra ny telo taona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fianakavian’i Rehabohama
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Rehabohama dia nanambady an’i Mahalato izay i Jerimôta zanakalahin’i Davida no rainy ary i Abihaîla zanakavavin’i Eliaba sady zafin’i Jisay no reniny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Mahalato dia nahazoan’i Rehabohama zazalahy telo, dia i Jehosa sy i Semarià ary i Zahama. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo nisy tenin’ny TOMPO tamin’i Semahià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: olon’Andriamanitra
    - type: text
      text: ', dia teny nanao hoe:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ankoatran’i Mahalato dia nalain’i Rehabohama ho vady koa i Mahekà zanakavavin’i Absalôma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 15.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' sady niteraka an’i Abià sy i Hatahy ary i Zizà sy i Selômita. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Mahekà, zanakavavin’i Absalôma, dia notiavin’i Rehabohama mihoatra noho ny vadiny sy ny vaditsidranony rehetra; fa vady 18 ary vaditsidrano enimpolo no nananany, ka niterahany zazalahy 28 sy zazavavy enimpolo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Abià, zanakalahin’i Mahekà, no nataon’i Rehabohama ho filohan’ireo rahalahiny, satria izy no niriny hampanjakaina. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kinga i Rehabohama ka nanaparitaka ny zanakalahiny hafa rehetra eran’ny faritr’i Joda sy i Benjamîna, dia tany amin’ny tanànamimanda samihafa; nomeny sakafo betsaka ireo sady nitadiavany vady maro.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ambarao amin’i Rehabohama, zanakalahin’i Salômôna sady mpanjakan’i Joda, ary koa amin’ny Israelita rehetra ao anatin’ny faritr’i Joda sy i Benjamîna, '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'fa izao no lazain’ny TOMPO: «Aza mandeha hiady amin’ny mpiray firenena aminareo; samia mody any an-tranony avy ianareo, satria Izaho no nahatonga izao zavatra izao.»'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nankatoavin’ny olona izany tenin’ny TOMPO izany, ka samy lasa nody izy fa tsy nandeha hamely an’i Jerôbohama.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nohamafisin’i Rehabohama ny tanàna samy hafa
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitoetra tao Jerosalema i Rehabohama ary nanamboatra tanànamimanda tany Joda, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ireto avy: i Betlehema sy i Hetama ary i Tekôa, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Bety-Tsoro sy i Sôkao ary i Hadolama, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Gata sy i Maresà ary i Zifa, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Adôraîma sy i Lakisy ary i Hazekà, '
