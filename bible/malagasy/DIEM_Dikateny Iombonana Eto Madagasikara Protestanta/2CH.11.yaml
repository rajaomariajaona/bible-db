document_id: 2CH.11,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Vao tonga tany Jerosalema i Rehabohama, dia namory miaramila voafantina miisa vondrona 180 tamin’ny fokon’i Joda sy i Benjamîna mba hiady amin’i Israely avaratra ka hamerina indray io fanjakana io ho an’ny tenany. '
  '10':
  - type: text
    content: 'mbamin’i Tsôrehà sy i Aialôna ary i Hebrôna, izay samy tanànamimanda ao anatin’ny faritr’i Joda sy i Benjamîna. '
  '11':
  - type: text
    content: 'Nohamafisin’i Rehabohama ny mandan’ireo tanàna ireo sady nametrahany mpifehy ary koa sakafo sy menaka aman-divay tao aminy. '
  '12':
  - type: text
    content: Isan-tanàna dia nasiany ampinga lehibe sy lefona avokoa. Ny nanamafisany tsara ireo tanàna ireo no nitazonan’i Rehabohama ny faritr’i Joda sy i Benjamîna ho azy.
  - type: heading
    content: Niandany tamin’i Rehabohama ny mpisorona sy ny levita
  '13':
  - type: text
    content: 'Ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: levita
  - type: text
    content: ' izay nonina tany '
  - type: text
    content: Israely
  - type: text
    content: ' avaratra manontolo dia niainga avy any amin’ny faritra rehetra nisy azy ka niandany tamin’i Rehabohama. '
  '14':
  - type: text
    content: 'Fa nandao tanim-bilona amam-pananana ny levita ka nankany Joda sy Jerosalema, satria i Jerôbohama sy ireo zanany lahy efa nisakana azy tsy hanao ny raharaham-pisoronany ho an’ny TOMPO; '
  '15':
  - type: text
    content: nanendry olona ho mpisorona manko izy hisahana ireo toeram-panasinana sy hikarakara ireo sarin’osilahy na ombilahikely
  - type: note
    content: 'osilahy: jereo Lev 7.7 sy nta; ombilahikely: jereo 1 Mp 12.26-33.'
  - type: text
    content: ' izay sampy nampamboariny. '
  '16':
  - type: text
    content: 'Na iza na iza anisan’ny foko rehetra tamin’i Israely avaratra, ka nafana fo hitady ny TOMPO Andriamanitr’i Israely, dia nanaraka ireo levita nankany Jerosalema mba hanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' amin’ny TOMPO Andriamanitry ny razany. '
  '17':
  - type: text
    content: Ka dia nampahery ny fanjakàn’i Joda izy ireny sady nijoro ho mpanohana an’i Rehabohama zanakalahin’i Salômôna, nandritra ny telo taona; fa ny fitondrantena tsara narahin’i Davida sy i Salômôna no nizoran’i Rehabohama nandritra ny telo taona.
  - type: heading
    content: Ny fianakavian’i Rehabohama
  '18':
  - type: text
    content: 'I Rehabohama dia nanambady an’i Mahalato izay i Jerimôta zanakalahin’i Davida no rainy ary i Abihaîla zanakavavin’i Eliaba sady zafin’i Jisay no reniny. '
  '19':
  - type: text
    content: 'I Mahalato dia nahazoan’i Rehabohama zazalahy telo, dia i Jehosa sy i Semarià ary i Zahama. '
  '2':
  - type: text
    content: 'Kanjo nisy tenin’ny TOMPO tamin’i Semahià '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: ', dia teny nanao hoe:'
  '20':
  - type: text
    content: Ankoatran’i Mahalato dia nalain’i Rehabohama ho vady koa i Mahekà zanakavavin’i Absalôma
  - type: note
    content: Jereo 1 Mp 15.2 sy nta.
  - type: text
    content: ' sady niteraka an’i Abià sy i Hatahy ary i Zizà sy i Selômita. '
  '21':
  - type: text
    content: 'I Mahekà, zanakavavin’i Absalôma, dia notiavin’i Rehabohama mihoatra noho ny vadiny sy ny vaditsidranony rehetra; fa vady 18 ary vaditsidrano enimpolo no nananany, ka niterahany zazalahy 28 sy zazavavy enimpolo. '
  '22':
  - type: text
    content: 'I Abià, zanakalahin’i Mahekà, no nataon’i Rehabohama ho filohan’ireo rahalahiny, satria izy no niriny hampanjakaina. '
  '23':
  - type: text
    content: Kinga i Rehabohama ka nanaparitaka ny zanakalahiny hafa rehetra eran’ny faritr’i Joda sy i Benjamîna, dia tany amin’ny tanànamimanda samihafa; nomeny sakafo betsaka ireo sady nitadiavany vady maro.
  '3':
  - type: text
    content: '–Ambarao amin’i Rehabohama, zanakalahin’i Salômôna sady mpanjakan’i Joda, ary koa amin’ny Israelita rehetra ao anatin’ny faritr’i Joda sy i Benjamîna, '
  '4':
  - type: text
    content: 'fa izao no lazain’ny TOMPO: «Aza mandeha hiady amin’ny mpiray firenena aminareo; samia mody any an-tranony avy ianareo, satria Izaho no nahatonga izao zavatra izao.»'
  - type: text
    content: Dia nankatoavin’ny olona izany tenin’ny TOMPO izany, ka samy lasa nody izy fa tsy nandeha hamely an’i Jerôbohama.
  - type: heading
    content: Nohamafisin’i Rehabohama ny tanàna samy hafa
  '5':
  - type: text
    content: 'Nitoetra tao Jerosalema i Rehabohama ary nanamboatra tanànamimanda tany Joda, '
  '6':
  - type: text
    content: 'dia ireto avy: i Betlehema sy i Hetama ary i Tekôa, '
  '7':
  - type: text
    content: 'i Bety-Tsoro sy i Sôkao ary i Hadolama, '
  '8':
  - type: text
    content: 'i Gata sy i Maresà ary i Zifa, '
  '9':
  - type: text
    content: 'i Adôraîma sy i Lakisy ary i Hazekà, '
