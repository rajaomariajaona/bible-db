      marker-yv: yv-n
    - type: text
      text: ' sy ny hahalalan’izy rehetra ny finoana marina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Satria iray Andriamanitra, iray koa ny mpanalalana amin’Andriamanitra sy ny olona, dia i Kristy Jesoa Izay olona '
  '6':
