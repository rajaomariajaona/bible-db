  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Kanefa hovonjena ihany ny vehivavy amin’ny fananan-janaka, raha maharitra amin’ny finoana sy ny fitiavana ary ny fahamasinana ombàn’ny fahononan-tena.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'mivavaha ho an’ireo filoham-pirenena sy ny manam-pahefana rehetra, mba hiainantsika miadana sy mandry feizay ombàn’ny firaiketam-po tanteraka amin’Andriamanitra sy ny fitondrantena maotina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Izany no tsara sady sitrak’Andriamanitra, Mpamonjy antsika, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izay tia ny hahavoavonjy ny olona rehetra
