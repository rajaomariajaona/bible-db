document_id: 1TI.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Hafatrafarako voalohany indrindra àry ny hanaovana fangatahana sy fivavahana ary fitalahoana sy fisaorana amin’Andriamanitra ho an’ny olona rehetra; '
  '10':
  - type: text
    content: 'fa hiravaka asa soa mifanentana amin’ny vehivavy mankatò ny fivavahana amin’Andriamanitra. '
  '11':
  - type: text
    content: 'Aoka ny vehivavy mba hahay mandray fampianarana amim-panginana ka hanaiky tanteraka. '
  '12':
  - type: text
    content: 'Tsy mamela azy hampianatra aho na hanjakazaka amin’ny lahy, fa tokony hangina: '
  '13':
  - type: text
    content: 'satria i Adama no ary voalohany vao i Eva; '
  '14':
  - type: text
    content: tsy mba i Adama no voafitaka, fa ny vehivavy no voafitaka sady tonga nandika ny didin’Andriamanitra
  - type: note
    content: 'And 13-14: jereo Gen 2.7, 21-22; 3.1-6.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: Kanefa hovonjena ihany ny vehivavy amin’ny fananan-janaka, raha maharitra amin’ny finoana sy ny fitiavana ary ny fahamasinana ombàn’ny fahononan-tena.
  '2':
  - type: text
    content: 'mivavaha ho an’ireo filoham-pirenena sy ny manam-pahefana rehetra, mba hiainantsika miadana sy mandry feizay ombàn’ny firaiketam-po tanteraka amin’Andriamanitra sy ny fitondrantena maotina. '
  '3':
  - type: text
    content: 'Izany no tsara sady sitrak’Andriamanitra, Mpamonjy antsika, '
  '4':
  - type: text
    content: Izay tia ny hahavoavonjy ny olona rehetra
  - type: note
    content: Ampit Ezek 18.23.
  - type: text
    content: ' sy ny hahalalan’izy rehetra ny finoana marina. '
  '5':
  - type: text
    content: 'Satria iray Andriamanitra, iray koa ny mpanalalana amin’Andriamanitra sy ny olona, dia i Kristy Jesoa Izay olona '
  '6':
  - type: text
    content: nanolo-tena ho fanavotana ny olona rehetra
  - type: note
    content: Ampit Mt 20.28.
  - type: text
    content: ': izany no porofo mby amin’ny fotoanandrony tokoa fa tia ny hahavoavonjy ny olona rehetra Andriamanitra. '
  '7':
  - type: text
    content: 'Ary ny hitory izany no nanendrena ahy ho mpitoriteny sady '
  - type: text
    content: apôstôly
  - type: note
    content: Ampit 2Tim 1.11.
  - type: text
    content: ', ho mpampianatra ny finoana tena izy amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: . Milaza ny marina aho fa tsy mandainga.
  '8':
  - type: text
    content: Tiako mba hivavaka ny lehilahy na aiza na aiza, ka hanandra-tanana
  - type: note
    content: Ny manandra-tanana dia isan’ny fihetsika fanao teo amin’ny vahoaka Israely fahiny rehefa mivavaka. Jereo Eks 9.29; 1 Mp 8.22.
  - type: text
    content: ' hanao izany amin’ny fo madio, tsy misy fahatezerana na fifandirana.'
  '9':
  - type: text
    content: 'Toraka izany koa ny vehivavy: tiako mba hihaingo maotina tsara sy mahalala onony izy ireo ka hitondra fitafiana mendrika, tsy hanao taovolo mihaitraitra, tsy hirenty volamena na vatosoa na fitafiana sarobidy'
  - type: note
    content: Ampit 1Pt 3.3.
  - type: text
    content: ', '
