      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hafatrafarako voalohany indrindra àry ny hanaovana fangatahana sy fivavahana ary fitalahoana sy fisaorana amin’Andriamanitra ho an’ny olona rehetra; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'fa hiravaka asa soa mifanentana amin’ny vehivavy mankatò ny fivavahana amin’Andriamanitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Aoka ny vehivavy mba hahay mandray fampianarana amim-panginana ka hanaiky tanteraka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tsy mamela azy hampianatra aho na hanjakazaka amin’ny lahy, fa tokony hangina: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'satria i Adama no ary voalohany vao i Eva; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: tsy mba i Adama no voafitaka, fa ny vehivavy no voafitaka sady tonga nandika ny didin’Andriamanitra
