document_id: GAL.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Noraisin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' i Paoly'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niakatra tany Jerosalema indray aho, 14 taona tatỳ aoriana, ka nomban’i Barnabà sady nitondra an’i Tito niaraka tamiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 11.30; 15.2.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny hany zavatra nangatahin’izy telo lahy taminay dia ny hahatsiarovanay ireo mahantran’ny Fiangonana tao Jerosalema; ary nahazoto ahy rahateo ny hanao izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 11.29-30.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tenenin’i Paoly mafy i Petera tao Antiôkia
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa nony tonga tany Antiôkia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Antiôkia, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ilay any Siria izany: jereo Asa 11.19-26.'
      marker-yv: yv-n
    - type: text
      text: ' i Petera, dia notoheriko ampahibemaso satria tsy mety ny nataony. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa talohan’ny nahatongavan’ireo olona vitsivitsy naman’i Jakôba, dia niara-nihinana tamin’ny mpino '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' i Petera. Saingy nony tonga ireo, dia nihataka i Petera ka niala tamin’ny hafa firenena, noho izy natahotra ireo anisan’ny voafora. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo Jiosy mpino sasany dia niara-nihatsaravelatsihy tamin’i Petera, ka i Barnabà avy aza no voataonan’ny fihatsaràmbelatsihin-dry zareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa nony hitako fa tsy nandeha mahitsy araka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' marim-pototra izy ireo, dia hoy aho tamin’i Petera teo anatrehan’ny olona rehetra: «Raha ianao Jiosy aza miaina araka ny fanaon’ny hafa firenena fa tsy araka ny fanaon’ny Jiosy, ahoana no anerenao ny hafa firenena hanaraka ny fanaon’ny Jiosy?»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Na Jiosy na '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' dia voavonjy noho ny finoana'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy aho aminareo: «Jiosy ara-pirazanana izahay, fa tsy mba mpanota avy amin’ny hafa firenena. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saingy fantatray fa ny olombelona dia ankatoavin’Andriamanitra ho marina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny olombelona dia ankatoavin’Andriamanitra ho marina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany hoe Andriamanitra dia mahatonga ny olombelona hifandray aminy sy hihavana aminy araka tokony ho izy indray (jereo Rm 1.17). –
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'Tsy misy olombelona ankatoavin’Andriamanitra ho marina:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Sal 143.2; Rm 3.20, 22.'
      marker-yv: yv-n
    - type: text
      text: ', tsy avy amin’ny fanatanterahana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' fa noho ny finoana niainan’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. Izany no nahatonga anay hino an’i Kristy Jesoa mba hankatoavan’Andriamanitra anay ho marina, noho ny finoana niainan’i Kristy fa tsy avy amin’ny fanatanterahana ny lalàna. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mitady hiray amin’i Kristy izahay mba hankatoavin’Andriamanitra ho marina, dia hita fa mpanota koa izahay, kanefa mpanompon’ny fahotana ve i Kristy? Sanatria! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ny zavatra efa noravako manko no ajoroko indray, dia asehoko miharihary ny maha pandika lalàna ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izaho, dia tamin’ny alalan’ny lalàna no nahafatesako raha ny amin’ny lalàna mba hahavelomako ho an’Andriamanitra. Niara-nohomboana tamin’i Kristy teo amin’ny hazofijaliana aho; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niakatra aho satria nasehon’Andriamanitra tamiko fa tsy maintsy ataoko izany. Nihaonako manokana ireo tompon’andraikitra ka namelabelarako ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' izay torîko any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ', fandrao herim-po very maina ny asa efa notontosaiko sy ny mbola tontosaiko. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tsy izaho intsony no velona fa i Kristy no velona ato anatiko. Koa izao ahavelomako ankehitriny amin’ny fiaina-mandalo izao, dia ivelomako amin’ny finoana niainan’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Andriamanitra
    - type: text
      text: ', Ilay efa tia ahy sy nanolo-tena hamonjy ahy: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tsy ataoko very maina ny fahasoavan’Andriamanitra! Eny, raha ny lalàna no mahatonga ho marina eo imason’Andriamanitra, dia maty tsy amin’antony i Kristy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa i Tito izay niaraka tamiko, na dia Grika aza, dia tsy noterena hoforana, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: na teo aza ireo rahalahy sandoka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.7. Ampit 1.6 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' tafasisika an-tsokosoko teo anivonay. Ireo rahalahy sandoka ireo dia niditra an-tsokosoko mba hitsikera ny fahafahana anananay tafaray amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa, hahazoany manao izay hanandevozana anay. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy nikoy mihitsy izahay taminy, na indray mihelina aza, mba ho Vaovao Mahafaly marim-pototra no voatana ho anareo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo noheverina ho tena tompon’andraikitra kosa, – na ahoana na ahoana fahefàny, dia tsy mampaninona ahy izany, satria Andriamanitra tsy mba mizaha tavan’olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Fifan 10.17.
      marker-yv: yv-n
    - type: text
      text: '! –, ireo tompon’andraikitra dia tsy nandidy ahy hampihatra fepetra hafa na inona na inona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitany aza fa adidy nankinin’Andriamanitra tamiko ny mitory ny Vaovao Mahafaly amin’ireo hafa firenena, tahaka ny itorian’i Petera izany amin’ny Jiosy: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, Andriamanitra Izay niasa tao amin’i Petera hahatonga azy ho apôstôlin’ny Jiosy, dia niasa tao amiko ihany koa hahatonga ahy ho apôstôlin’ny hafa firenena. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Jakôba sy i Petera ary i Jôhany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Jôhany '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voatsiahy etoana dia ilay apôstôly.
      marker-yv: yv-n
    - type: text
      text: ', izay samy noheveriko ho filoha, dia niaiky izany tombon-tsoa nomen’Andriamanitra ahy izany ary nandray tanana ahy sy nandray tanana an’i Barnabà ho mariky ny fiombonana. Koa nifanarahana fa izaho sy i Barnabà dia hiasa any amin’ny hafa firenena, ary izy ireo kosa hiasa eo amin’ny Jiosy. '
