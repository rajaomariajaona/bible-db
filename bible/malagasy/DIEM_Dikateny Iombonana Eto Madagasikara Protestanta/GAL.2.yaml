document_id: GAL.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Noraisin’ireo apôstôly i Paoly
  - type: text
    content: Niakatra tany Jerosalema indray aho, 14 taona tatỳ aoriana, ka nomban’i Barnabà sady nitondra an’i Tito niaraka tamiko
  - type: note
    content: Jereo Asa 11.30; 15.2.
  - type: text
    content: .
  '10':
  - type: text
    content: Ny hany zavatra nangatahin’izy telo lahy taminay dia ny hahatsiarovanay ireo mahantran’ny Fiangonana tao Jerosalema; ary nahazoto ahy rahateo ny hanao izany
  - type: note
    content: Jereo Asa 11.29-30.
  - type: text
    content: .
  - type: heading
    content: Tenenin’i Paoly mafy i Petera tao Antiôkia
  '11':
  - type: text
    content: Kanefa nony tonga tany Antiôkia
  - type: note
    content: 'I Antiôkia, ilay any Siria izany: jereo Asa 11.19-26.'
  - type: text
    content: ' i Petera, dia notoheriko ampahibemaso satria tsy mety ny nataony. '
  '12':
  - type: text
    content: 'Fa talohan’ny nahatongavan’ireo olona vitsivitsy naman’i Jakôba, dia niara-nihinana tamin’ny mpino '
  - type: text
    content: hafa firenena
  - type: text
    content: ' i Petera. Saingy nony tonga ireo, dia nihataka i Petera ka niala tamin’ny hafa firenena, noho izy natahotra ireo anisan’ny voafora. '
  '13':
  - type: text
    content: 'Ary ireo Jiosy mpino sasany dia niara-nihatsaravelatsihy tamin’i Petera, ka i Barnabà avy aza no voataonan’ny fihatsaràmbelatsihin-dry zareo. '
  '14':
  - type: text
    content: 'Kanefa nony hitako fa tsy nandeha mahitsy araka ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' marim-pototra izy ireo, dia hoy aho tamin’i Petera teo anatrehan’ny olona rehetra: «Raha ianao Jiosy aza miaina araka ny fanaon’ny hafa firenena fa tsy araka ny fanaon’ny Jiosy, ahoana no anerenao ny hafa firenena hanaraka ny fanaon’ny Jiosy?»'
  - type: heading
    content: Na Jiosy na hafa firenena dia voavonjy noho ny finoana
  '15':
  - type: text
    content: 'Ary hoy aho aminareo: «Jiosy ara-pirazanana izahay, fa tsy mba mpanota avy amin’ny hafa firenena. '
  '16':
  - type: text
    content: Saingy fantatray fa ny olombelona dia ankatoavin’Andriamanitra ho marina
  - type: note
    content: 'Ny olombelona dia ankatoavin’Andriamanitra ho marina: izany hoe Andriamanitra dia mahatonga ny olombelona hifandray aminy sy hihavana aminy araka tokony ho izy indray (jereo Rm 1.17). –Tsy misy olombelona ankatoavin’Andriamanitra ho marina: jereo Sal 143.2; Rm 3.20, 22.'
  - type: text
    content: ', tsy avy amin’ny fanatanterahana ny '
  - type: text
    content: lalàna
  - type: text
    content: ' fa noho ny finoana niainan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: '. Izany no nahatonga anay hino an’i Kristy Jesoa mba hankatoavan’Andriamanitra anay ho marina, noho ny finoana niainan’i Kristy fa tsy avy amin’ny fanatanterahana ny lalàna. '
  '17':
  - type: text
    content: 'Raha mitady hiray amin’i Kristy izahay mba hankatoavin’Andriamanitra ho marina, dia hita fa mpanota koa izahay, kanefa mpanompon’ny fahotana ve i Kristy? Sanatria! '
  '18':
  - type: text
    content: 'Raha ny zavatra efa noravako manko no ajoroko indray, dia asehoko miharihary ny maha pandika lalàna ahy. '
  '19':
  - type: text
    content: 'Fa izaho, dia tamin’ny alalan’ny lalàna no nahafatesako raha ny amin’ny lalàna mba hahavelomako ho an’Andriamanitra. Niara-nohomboana tamin’i Kristy teo amin’ny hazofijaliana aho; '
  '2':
  - type: text
    content: 'Niakatra aho satria nasehon’Andriamanitra tamiko fa tsy maintsy ataoko izany. Nihaonako manokana ireo tompon’andraikitra ka namelabelarako ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' izay torîko any amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ', fandrao herim-po very maina ny asa efa notontosaiko sy ny mbola tontosaiko. '
  '20':
  - type: text
    content: 'ary tsy izaho intsony no velona fa i Kristy no velona ato anatiko. Koa izao ahavelomako ankehitriny amin’ny fiaina-mandalo izao, dia ivelomako amin’ny finoana niainan’ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ', Ilay efa tia ahy sy nanolo-tena hamonjy ahy: '
  '21':
  - type: text
    content: tsy ataoko very maina ny fahasoavan’Andriamanitra! Eny, raha ny lalàna no mahatonga ho marina eo imason’Andriamanitra, dia maty tsy amin’antony i Kristy.
  '3':
  - type: text
    content: 'Kanefa i Tito izay niaraka tamiko, na dia Grika aza, dia tsy noterena hoforana, '
  '4':
  - type: text
    content: na teo aza ireo rahalahy sandoka
  - type: note
    content: Jereo 1.7. Ampit 1.6 sy nta.
  - type: text
    content: ' tafasisika an-tsokosoko teo anivonay. Ireo rahalahy sandoka ireo dia niditra an-tsokosoko mba hitsikera ny fahafahana anananay tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa, hahazoany manao izay hanandevozana anay. '
  '5':
  - type: text
    content: Fa tsy nikoy mihitsy izahay taminy, na indray mihelina aza, mba ho Vaovao Mahafaly marim-pototra no voatana ho anareo.
  '6':
  - type: text
    content: Ireo noheverina ho tena tompon’andraikitra kosa, – na ahoana na ahoana fahefàny, dia tsy mampaninona ahy izany, satria Andriamanitra tsy mba mizaha tavan’olona
  - type: note
    content: Ampit Fifan 10.17.
  - type: text
    content: '! –, ireo tompon’andraikitra dia tsy nandidy ahy hampihatra fepetra hafa na inona na inona. '
  '7':
  - type: text
    content: 'Hitany aza fa adidy nankinin’Andriamanitra tamiko ny mitory ny Vaovao Mahafaly amin’ireo hafa firenena, tahaka ny itorian’i Petera izany amin’ny Jiosy: '
  '8':
  - type: text
    content: 'eny, Andriamanitra Izay niasa tao amin’i Petera hahatonga azy ho apôstôlin’ny Jiosy, dia niasa tao amiko ihany koa hahatonga ahy ho apôstôlin’ny hafa firenena. '
  '9':
  - type: text
    content: I Jakôba sy i Petera ary i Jôhany
  - type: note
    content: I Jôhany voatsiahy etoana dia ilay apôstôly.
  - type: text
    content: ', izay samy noheveriko ho filoha, dia niaiky izany tombon-tsoa nomen’Andriamanitra ahy izany ary nandray tanana ahy sy nandray tanana an’i Barnabà ho mariky ny fiombonana. Koa nifanarahana fa izaho sy i Barnabà dia hiasa any amin’ny hafa firenena, ary izy ireo kosa hiasa eo amin’ny Jiosy. '
