document_id: JOS.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tanànan’ny Levita
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 6.39-66)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary ny filoham-pianakaviana tamin’ny fokon’i Levỳ dia nanatona an’i Elehazara mpisorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 14.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' sy i Josoa zanakalahin’i Nona ary ny filoham-pianakaviana tamin’ny foko israelita; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'tao Silao, tao amin’ny tany Kanahàna, no nihaonana ka hoy ireo filoham-pianakaviana levita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny TOMPO efa nanome baiko tamin’ny alalan’i Mosesy mba homena tanàna maromaro honenanay izahay, ary koa homena ny kijàna manodidina azy avy ho an’ny biby fiompinay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia samy tamin’ny zarataniny avy no nanomezan’ny Israelita ireto tanàna ireto mbamin’ny kijàna manodidina azy mba ho an’ny Levita, araka ny baikon’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny anjara voatendrin’ny antsapaka voalohany dia ho an’ireo tarika taranak’i Kehata; anisan’ny levita kehatita ny taranak’i Aharôna mpisorona ka ny azon’ireo tamin’ny antsapaka dia tanàna 13 avy tamin’ny fokon’i Joda sy fokon’i Simehôna ary fokon’i Benjamîna. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny azon’ny taranak’i Kehata sisa kosa tamin’ny antsapaka dia tanàna folo avy tamin’ny fokon’i Efraîma sy fokon’i Dana ary antsasa-pokon’i Manase any andrefana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny azon’ny taranak’i Geresôna tamin’ny antsapaka dia tanàna 13 avy tamin’ny fokon’i Jisakara sy fokon’i Asera ary fokon’i Naftalỳ sy antsasa-pokon’i Manase any Basàna. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny azon’ny taranak’i Merarỳ kosa dia tanàna 12 avy tamin’ny fokon’i Reobena sy fokon’i Gada ary fokon’i Zebolòna. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ireo tanàna ireo mbamin’ny kijàna manodidina azy avy dia tamin’ny antsapaka no nanomezan’ny Israelita azy ny Levita, araka izay efa nandidian’ny TOMPO tamin’ny alalan’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ireto no anaran’ireo tanàna avy tamin’ny fokon’i Joda sy fokon’i Simehôna, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'tanàna izay nomena ny taranak’i Aharôna anisan’ny tarika levita kehatita satria ry zareo no nahazo ny antsapaka voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nomena azy i Kiriata-Arbà, na hoe tanànan’i Arbà araka ny anaran’ilay razamben’ny Hanakita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'razamben’ny Hanakita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 14.12 sy 15.13.
    marker-yv: yv-n
  - type: text
    text: '. Io tanàna io ankehitriny dia atao hoe Hebrôna, any amin’ny faritra havoan’i Joda. Nomena miaraka aminy koa ny kijàna manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ny saha sy ireo tanàna kely miankina amin’i Hebrôna kosa dia efa natolotra an’i Kaleba zanakalahin’i Jefonè. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Miaraka amin’i Hebrôna, izay tanàna fialofan’ny mpamono olona tsy nahy, dia natolotra ny taranak’i Aharôna koa i Libnà, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'i Jatira, i Estemôa, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'i Hôlôna, i Debira, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: i Hasàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hasàna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy Septoazinta sy ny stf sasany sady mifanaraka amin’ny 15.42 sy 19.7 ary 1 Tan 6.44, na dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Haîna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' aza no eo amin’ny TM.'
    marker-yv: yv-n
  - type: text
    text: ', i Jotà, ary i Bety-Semesa: izany hoe, avy amin’ny fokon’i Joda sy fokon’i Simehôna, tanàna sivy mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Avy tamin’ny fokon’i Benjamîna koa ny nomena ny taranak’i Aharôna dia i Gibehôna, i Geba, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'i Hanatôta, ary i Halemeta: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny tanàna rehetra nomena ny mpisorona taranak’i Aharôna dia tanàna 13 mbamin’ny kijàna samy manodidina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ireo tarika sisa tamin’ny levita taranak’i Kehata kosa dia ireto tanàna ireto no azony tamin’ny antsapaka. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Avy tamin’i fokon’i Efraîma dia i Sekema, izay tanàna fialofana ao anatin’ny faritra havoan’i Efraîma, i Gezera, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'i Kibetsaîma, ary i Bety-Hôrôna: izany hoe tanàna efatra mbamin’ireo kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Avy tamin’ny fokon’i Dana dia i Eltekè, i Gibetôna, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'i Aialôna, ary i Gata-Rimôna: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Avy tamin’ny antsasa-pokon’i Manase tany ampita andrefan’i Jôrdàna dia i Tahenàka sy i Jiblehama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jiblehama, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy Septoazinta fa ny TM eto dia mamerina ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gata-Rimôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 24).'
    marker-yv: yv-n
  - type: text
    text: ': izany hoe tanàna roa mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny tanàna rehetra azon’ireo tarika sisa taranak’i Kehata dia tanàna folo mbamin’ny kijàna samy manodidina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ireo tarika tamin’ny levita taranak’i Geresôna kosa dia ireto tanàna ireto no azony. Avy tamin’ny antsasa-pokon’i Manase teny atsinanana dia i Gôlàna any Basàna, izay tanàna fialofana, sy i Behestèra: izany hoe tanàna roa mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Avy tamin’ny fokon’i Jisakara dia i Kisiôna, i Daberata, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'i Jarmota, ary i Haîna-Genima: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Avy tamin’ny fokon’i Asera dia i Misala, i Habdôna, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'i Helkata, ary i Rehôba: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Avy tamin’ny fokon’i Naftalỳ dia i Kedesa any Galilea, izay tanàna fialofana, i Hamôta-Dôra ary i Kartàna: izany hoe tanàna telo mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny tanàna rehetra azon’ny Geresônita ho an’ireo tarika tao anatiny dia tanàna 13 mbamin’ny kijàna samy manodidina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ireo Levita hafa sisa dia ny tarika taranak’i Merarỳ, ka ireto tanàna ireto no azony. Avy tamin’ny fokon’i Zebolòna dia i Jôknehama, i Kartà, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'i Dimnà, ary i Nahalala: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Avy tamin’ny fokon’i Reobena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny and 36 sy 37 dia tsy hita eo amin’ny stf tranainy hebreo, fa ny ahitana azy dia ao amin’ny dkt grika sy latinina tranainy sy ao amin’ny lisitra mifandraika raketin’ny 1 Tan 6.62-66. Ilaina ireo andininy ireo mba ahazoana ny tanàna miisa 12 voalaza eo amin’ny and 40.
    marker-yv: yv-n
  - type: text
    text: ' any atsinanan’i Jôrdàna, dia i Betsera izay tanàna fialofana, i Jahatsà, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Kedemôta, ary i Mefahata: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Avy tamin’ny fokon’i Gada dia i Ramôta any Gilehada, izay tanàna fialofana, i Mahanaîma, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'i Hesbôna, ary i Jahezera: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Koa 12 ny tanàna rehetra azon’ny taranak’i Merarỳ antsapaka ho an’ireo tarika ao anatiny, dia ireo hafa sisa anisan’ny tarika levita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ny tanàna rehetra azon’ny Levita teo anivon’ny tanin’ny Israelita hafa dia 48 no isany. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ireo tanàna rehetra ireo dia samy manana ny kijàna manodidina azy avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nomen’ny TOMPO ho an’ny Israelita ny tany manontolo, izay efa nianianany homena ny razambeny: dia azony ho fananany tokoa izany ka nonenany. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Nampisy fandriam-pahalemana ho azy koa ny TOMPO tamin’ny sisin-tany manodidina azy, araka ny fianianana rehetra efa nataony tamin’ny razambeny. Nampandresen’ny TOMPO ireo fahavalony rehetra izy ka tsy nisy nahatohitra azy mihitsy ireny na iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Tanteraka avokoa ny zava-tsoa rehetra nambaran’ny TOMPO tamin’ny Israelita fa tsy nisy latsaka.
