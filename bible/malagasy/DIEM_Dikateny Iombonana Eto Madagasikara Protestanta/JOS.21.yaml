document_id: JOS.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tanànan’ny Levita
  - type: heading
    content: (Jereo 1 Tan 6.39-66)
  - type: text
    content: Ary ny filoham-pianakaviana tamin’ny fokon’i Levỳ dia nanatona an’i Elehazara mpisorona
  - type: note
    content: Jereo 14.1 sy nta.
  - type: text
    content: ' sy i Josoa zanakalahin’i Nona ary ny filoham-pianakaviana tamin’ny foko israelita; '
  '10':
  - type: text
    content: 'tanàna izay nomena ny taranak’i Aharôna anisan’ny tarika levita kehatita satria ry zareo no nahazo ny antsapaka voalohany. '
  '11':
  - type: text
    content: Nomena azy i Kiriata-Arbà, na hoe tanànan’i Arbà araka ny anaran’ilay razamben’ny Hanakita
  - type: note
    content: 'razamben’ny Hanakita: jereo 14.12 sy 15.13.'
  - type: text
    content: '. Io tanàna io ankehitriny dia atao hoe Hebrôna, any amin’ny faritra havoan’i Joda. Nomena miaraka aminy koa ny kijàna manodidina azy. '
  '12':
  - type: text
    content: 'Fa ny saha sy ireo tanàna kely miankina amin’i Hebrôna kosa dia efa natolotra an’i Kaleba zanakalahin’i Jefonè. '
  '13':
  - type: text
    content: 'Miaraka amin’i Hebrôna, izay tanàna fialofan’ny mpamono olona tsy nahy, dia natolotra ny taranak’i Aharôna koa i Libnà, '
  '14':
  - type: text
    content: 'i Jatira, i Estemôa, '
  '15':
  - type: text
    content: 'i Hôlôna, i Debira, '
  '16':
  - type: text
    content: i Hasàna
  - type: note
    content: Hasàna araka ny dkt grika tranainy Septoazinta sy ny stf sasany sady mifanaraka amin’ny 15.42 sy 19.7 ary 1 Tan 6.44, na dia Haîna aza no eo amin’ny TM.
  - type: text
    content: ', i Jotà, ary i Bety-Semesa: izany hoe, avy amin’ny fokon’i Joda sy fokon’i Simehôna, tanàna sivy mbamin’ny kijàna samy manodidina azy. '
  '17':
  - type: text
    content: 'Avy tamin’ny fokon’i Benjamîna koa ny nomena ny taranak’i Aharôna dia i Gibehôna, i Geba, '
  '18':
  - type: text
    content: 'i Hanatôta, ary i Halemeta: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  '19':
  - type: text
    content: Ny tanàna rehetra nomena ny mpisorona taranak’i Aharôna dia tanàna 13 mbamin’ny kijàna samy manodidina azy.
  '2':
  - type: text
    content: 'tao Silao, tao amin’ny tany Kanahàna, no nihaonana ka hoy ireo filoham-pianakaviana levita hoe:'
  - type: text
    content: –Ny TOMPO efa nanome baiko tamin’ny alalan’i Mosesy mba homena tanàna maromaro honenanay izahay, ary koa homena ny kijàna manodidina azy avy ho an’ny biby fiompinay.
  '20':
  - type: text
    content: 'Ary ireo tarika sisa tamin’ny levita taranak’i Kehata kosa dia ireto tanàna ireto no azony tamin’ny antsapaka. '
  '21':
  - type: text
    content: 'Avy tamin’i fokon’i Efraîma dia i Sekema, izay tanàna fialofana ao anatin’ny faritra havoan’i Efraîma, i Gezera, '
  '22':
  - type: text
    content: 'i Kibetsaîma, ary i Bety-Hôrôna: izany hoe tanàna efatra mbamin’ireo kijàna samy manodidina azy. '
  '23':
  - type: text
    content: 'Avy tamin’ny fokon’i Dana dia i Eltekè, i Gibetôna, '
  '24':
  - type: text
    content: 'i Aialôna, ary i Gata-Rimôna: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  '25':
  - type: text
    content: Avy tamin’ny antsasa-pokon’i Manase tany ampita andrefan’i Jôrdàna dia i Tahenàka sy i Jiblehama
  - type: note
    content: Jiblehama, araka ny dkt grika tranainy Septoazinta fa ny TM eto dia mamerina ny hoe Gata-Rimôna (and 24).
  - type: text
    content: ': izany hoe tanàna roa mbamin’ny kijàna samy manodidina azy. '
  '26':
  - type: text
    content: Ny tanàna rehetra azon’ireo tarika sisa taranak’i Kehata dia tanàna folo mbamin’ny kijàna samy manodidina azy.
  '27':
  - type: text
    content: 'Ireo tarika tamin’ny levita taranak’i Geresôna kosa dia ireto tanàna ireto no azony. Avy tamin’ny antsasa-pokon’i Manase teny atsinanana dia i Gôlàna any Basàna, izay tanàna fialofana, sy i Behestèra: izany hoe tanàna roa mbamin’ny kijàna samy manodidina azy. '
  '28':
  - type: text
    content: 'Avy tamin’ny fokon’i Jisakara dia i Kisiôna, i Daberata, '
  '29':
  - type: text
    content: 'i Jarmota, ary i Haîna-Genima: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  '3':
  - type: text
    content: Dia samy tamin’ny zarataniny avy no nanomezan’ny Israelita ireto tanàna ireto mbamin’ny kijàna manodidina azy mba ho an’ny Levita, araka ny baikon’ny TOMPO.
  '30':
  - type: text
    content: 'Avy tamin’ny fokon’i Asera dia i Misala, i Habdôna, '
  '31':
  - type: text
    content: 'i Helkata, ary i Rehôba: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  '32':
  - type: text
    content: 'Avy tamin’ny fokon’i Naftalỳ dia i Kedesa any Galilea, izay tanàna fialofana, i Hamôta-Dôra ary i Kartàna: izany hoe tanàna telo mbamin’ny kijàna samy manodidina azy. '
  '33':
  - type: text
    content: Ny tanàna rehetra azon’ny Geresônita ho an’ireo tarika tao anatiny dia tanàna 13 mbamin’ny kijàna samy manodidina azy.
  '34':
  - type: text
    content: 'Ireo Levita hafa sisa dia ny tarika taranak’i Merarỳ, ka ireto tanàna ireto no azony. Avy tamin’ny fokon’i Zebolòna dia i Jôknehama, i Kartà, '
  '35':
  - type: text
    content: 'i Dimnà, ary i Nahalala: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  '36':
  - type: text
    content: Avy tamin’ny fokon’i Reobena
  - type: note
    content: Ny and 36 sy 37 dia tsy hita eo amin’ny stf tranainy hebreo, fa ny ahitana azy dia ao amin’ny dkt grika sy latinina tranainy sy ao amin’ny lisitra mifandraika raketin’ny 1 Tan 6.62-66. Ilaina ireo andininy ireo mba ahazoana ny tanàna miisa 12 voalaza eo amin’ny and 40.
  - type: text
    content: ' any atsinanan’i Jôrdàna, dia i Betsera izay tanàna fialofana, i Jahatsà, '
  '37':
  - type: text
    content: 'i Kedemôta, ary i Mefahata: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  '38':
  - type: text
    content: 'Avy tamin’ny fokon’i Gada dia i Ramôta any Gilehada, izay tanàna fialofana, i Mahanaîma, '
  '39':
  - type: text
    content: 'i Hesbôna, ary i Jahezera: izany hoe tanàna efatra mbamin’ny kijàna samy manodidina azy. '
  '4':
  - type: text
    content: 'Ny anjara voatendrin’ny antsapaka voalohany dia ho an’ireo tarika taranak’i Kehata; anisan’ny levita kehatita ny taranak’i Aharôna mpisorona ka ny azon’ireo tamin’ny antsapaka dia tanàna 13 avy tamin’ny fokon’i Joda sy fokon’i Simehôna ary fokon’i Benjamîna. '
  '40':
  - type: text
    content: Koa 12 ny tanàna rehetra azon’ny taranak’i Merarỳ antsapaka ho an’ireo tarika ao anatiny, dia ireo hafa sisa anisan’ny tarika levita.
  '41':
  - type: text
    content: 'Ny tanàna rehetra azon’ny Levita teo anivon’ny tanin’ny Israelita hafa dia 48 no isany. '
  '42':
  - type: text
    content: Ireo tanàna rehetra ireo dia samy manana ny kijàna manodidina azy avy.
  '43':
  - type: text
    content: 'Nomen’ny TOMPO ho an’ny Israelita ny tany manontolo, izay efa nianianany homena ny razambeny: dia azony ho fananany tokoa izany ka nonenany. '
  '44':
  - type: text
    content: 'Nampisy fandriam-pahalemana ho azy koa ny TOMPO tamin’ny sisin-tany manodidina azy, araka ny fianianana rehetra efa nataony tamin’ny razambeny. Nampandresen’ny TOMPO ireo fahavalony rehetra izy ka tsy nisy nahatohitra azy mihitsy ireny na iray aza. '
  '45':
  - type: text
    content: Tanteraka avokoa ny zava-tsoa rehetra nambaran’ny TOMPO tamin’ny Israelita fa tsy nisy latsaka.
  '5':
  - type: text
    content: 'Ny azon’ny taranak’i Kehata sisa kosa tamin’ny antsapaka dia tanàna folo avy tamin’ny fokon’i Efraîma sy fokon’i Dana ary antsasa-pokon’i Manase any andrefana. '
  '6':
  - type: text
    content: 'Ny azon’ny taranak’i Geresôna tamin’ny antsapaka dia tanàna 13 avy tamin’ny fokon’i Jisakara sy fokon’i Asera ary fokon’i Naftalỳ sy antsasa-pokon’i Manase any Basàna. '
  '7':
  - type: text
    content: 'Ny azon’ny taranak’i Merarỳ kosa dia tanàna 12 avy tamin’ny fokon’i Reobena sy fokon’i Gada ary fokon’i Zebolòna. '
  '8':
  - type: text
    content: Ireo tanàna ireo mbamin’ny kijàna manodidina azy avy dia tamin’ny antsapaka no nanomezan’ny Israelita azy ny Levita, araka izay efa nandidian’ny TOMPO tamin’ny alalan’i Mosesy.
  '9':
  - type: text
    content: 'Ireto no anaran’ireo tanàna avy tamin’ny fokon’i Joda sy fokon’i Simehôna, '
