document_id: JER.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ity boky ity dia mirakitra ny asa sy teny nataon’i Jeremià, zanakalahin’i Hilkià isan’ny mpisorona tao Hanatôta, tanàna iray tamin’ny faritanin’i Benjamîna. '
  '10':
  - type: text
    content: Jereo fa omeko fahefana ianao anio
  - type: text
    content: amin’ireo firenena sy fanjakana
  - type: text
    content: mba hanongotra sy hanjera,
  - type: text
    content: hanapotika sy handrava,
  - type: text
    content: ary hanorina sy hamboly.
  - type: heading
    content: Ny rantsam-paiso sy ny vilany mangotraka
  '11':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanontany hoe:'
  - type: text
    content: –Inona no hitanao, ry Jeremià?
  - type: text
    content: 'Dia novaliako hoe:'
  - type: text
    content: –Rantsam-paiso na hazo mahatsiaro
  - type: note
    content: Amin’ny teny hebreo ny anarana hoe hazo mahatsiaro dia (karazana paiso), hazo voalohany mamony amin’ny lohataona, dia mampahatsiahy ny fahamalinana ananan’ny mpiambina na mahatsiaro.
  - type: text
    content: ' no hitako.'
  '12':
  - type: text
    content: 'Ary hoy ny TOMPO tamiko:'
  - type: text
    content: –Nahita tsara ianao, fa hahatsiaro Aho mba hanatanteraka izay lazaiko.
  '13':
  - type: text
    content: 'Dia mbola nisy tenin’ny TOMPO tamiko nanontany hoe:'
  - type: text
    content: –Ary inona no hitanao izao?
  - type: text
    content: 'Dia novaliako hoe:'
  - type: text
    content: –Vilany mangotraka no hitako; avy any avaratra no mitongilana mankatỳ ny vavany.
  '14':
  - type: text
    content: 'Ary hoy ny TOMPO nanazava tamiko:'
  - type: text
    content: –Avy any avaratra tokoa
  - type: text
    content: no hipoitra ny loza
  - type: text
    content: hamelezana ny mponina rehetra eto amin’ny tany
  - type: note
    content: Ny mpandrava izay natahoran’ny fanjakan’i Joda tamin’izany fotoana izany dia tsy afaka ho tonga raha tsy avy any avaratra; ampit 4.6; 6.1,22; 10.22; 13.20 sns...
  - type: text
    content: .
  '15':
  - type: text
    content: 'Fa Izao TOMPO dia miteny hentitra hoe:'
  - type: text
    content: Hantsoiko ny fokom-pirenena rehetra
  - type: text
    content: amin’ireo fanjakana any avaratra.
  - type: text
    content: Ho avy ireny ka samy hametraka
  - type: text
    content: ny sezafiandrianan’ny mpanjakany avy
  - type: text
    content: eo anoloan’ny vavahadin’i Jerosalema.
  - type: text
    content: Hanodidina ny mandany rehetra izy
  - type: text
    content: ary hanafika ny tanàn-dehibe rehetra any Joda.
  '16':
  - type: text
    content: Havoakako ny didim-pitsarana
  - type: text
    content: hamelezana ny mponin’ity tany ity
  - type: text
    content: 'noho ny ratsy rehetra izay nataony:'
  - type: text
    content: nandao Ahy izy ka nanao sorona
  - type: text
    content: ho an’ireo andriamani-kafa,
  - type: text
    content: dia ny andriamanitra asan-tanany izay ivavahany!
  '17':
  - type: text
    content: Fa ianao kosa, ry Jeremià, misikìna,
  - type: text
    content: mitsangàna ka ambarao azy
  - type: text
    content: izay rehetra nandidiako anao.
  - type: text
    content: Aza matahotra azy ianao
  - type: text
    content: fandrao hataoko raiki-tahotra eo anatrehany.
  '18':
  - type: text
    content: Manomboka izao dia hataoko mafy
  - type: text
    content: toy ny tanànamimanda ianao
  - type: text
    content: sy toy ny andry vy ary toy ny manda varahina
  - type: text
    content: raha mifanandrina amin’ny mponina rehetra
  - type: text
    content: eto amin’ny tany
  - type: text
    content: amin’ny mpanjakan’i Joda
  - type: text
    content: sy ireo mpitondra fanjakana sy ny mpisorona
  - type: text
    content: ary ny sarambabem-bahoaka ao amin’ny tany.
  '19':
  - type: text
    content: Hiady aminao izy nefa tsy haharesy anao,
  - type: text
    content: fa miaraka aminao Aho mba hanafaka anao.
  - type: text
    content: Teny hentitra avy amiko TOMPO izany.
  '2':
  - type: text
    content: Nampitondrain’ny TOMPO an’i Jeremià ireo hafatra ireo, nanomboka ny taona faha-13 nanjakan’i Jôsià, zanakalahin’i Amôna sady mpanjakan’i Joda
  - type: note
    content: 'Izany hoe tamin’ny taona 626 tal J.K tany ho any. –Ny fanjakan’i Jôsià: jereo 2 Mp 22.1–23.30; 2 Tan 34-35.'
  - type: text
    content: ', '
  '3':
  - type: text
    content: sy tamin’ny andron’i Jôiakima, zanakalahin’i Jôsià sady mpanjakan’i Joda, ka hatramin’ny taona farany nanjakan’i Tsedekià, zanakalahin’i Jôsià iray hafa koa; io taona io dia ny faha-11 nanjakan’i Tsedekià tamin’ny volana fahadimy, fony lasan-ko babo ny mponina tao Jerosalema
  - type: note
    content: 'Izany hoe tany amin’ny volana Jolay-Aogositra 587 tal J.K. –Ny fanjakan’i Jôiakima sy i Tsedekià: jereo 2 Mp 23.36–25.21; 2 Tan 36.'
  - type: text
    content: .
  - type: heading
    content: Ny fiantsoana an’i Jeremià ho mpaminany
  '4':
  - type: text
    content: 'Nisy tenin’ny TOMPO tamiko nanao hoe:'
  '5':
  - type: text
    content: –Mbola tsy noforoniko
  - type: text
    content: tao an-kibon-dreninao akory ianao
  - type: text
    content: dia efa fantatro,
  - type: text
    content: ary mbola tsy teraka akory ianao
  - type: text
    content: dia efa natokako hanompo Ahy
  - type: text
    content: sy notendreko ho mpaminany
  - type: text
    content: ho an’ny firenena maro.
  '6':
  - type: text
    content: 'Ary namaly aho hoe:'
  - type: text
    content: –Indrisy, ry Tompo ANDRIANANAHARY ô,
  - type: text
    content: mbola tanora loatra aho
  - type: text
    content: ka tsy mahay mandahateny.
  '7':
  - type: text
    content: 'Fa hoy ny TOMPO tamiko hoe:'
  - type: text
    content: –Aza manao hoe «mbola tanora loatra aho»
  - type: text
    content: fa tsy maintsy handeha
  - type: text
    content: amin’izay rehetra hanirahako anao ianao
  - type: text
    content: ka hilaza aminy
  - type: text
    content: izay rehetra nandidiako anao.
  '8':
  - type: text
    content: Aza matahotra azy
  - type: text
    content: fa miaraka anao Aho mba hanafaka anao.
  - type: text
    content: Izany no teny hentitry ny TOMPO tamiko.
  '9':
  - type: text
    content: Avy eo IZY dia nandroso ny tanany
  - type: text
    content: ka nanendry ny vavako
  - type: text
    content: 'ary nilaza tamiko hoe:'
  - type: text
    content: –Ianao no hanambara ny teniko.
