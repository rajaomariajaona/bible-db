document_id: JER.1
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ity boky ity dia mirakitra ny asa sy teny nataon’i Jeremià, zanakalahin’i Hilkià isan’ny mpisorona tao Hanatôta, tanàna iray tamin’ny faritanin’i Benjamîna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nampitondrain’ny TOMPO an’i Jeremià ireo hafatra ireo, nanomboka ny taona faha-13 nanjakan’i Jôsià, zanakalahin’i Amôna sady mpanjakan’i Joda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe tamin’ny taona 626 tal J.K tany ho any. –
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny fanjakan’i Jôsià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 2 Mp 22.1–23.30; 2 Tan 34-35.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: sy tamin’ny andron’i Jôiakima, zanakalahin’i Jôsià sady mpanjakan’i Joda, ka hatramin’ny taona farany nanjakan’i Tsedekià, zanakalahin’i Jôsià iray hafa koa; io taona io dia ny faha-11 nanjakan’i Tsedekià tamin’ny volana fahadimy, fony lasan-ko babo ny mponina tao Jerosalema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe tany amin’ny volana Jolay-Aogositra 587 tal J.K. –
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny fanjakan’i Jôiakima sy i Tsedekià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 2 Mp 23.36–25.21; 2 Tan 36.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiantsoana an’i Jeremià ho mpaminany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nisy tenin’ny TOMPO tamiko nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: –Mbola tsy noforoniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: tao an-kibon-dreninao akory ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa fantatro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mbola tsy teraka akory ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa natokako hanompo Ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy notendreko ho mpaminany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny firenena maro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary namaly aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Indrisy, ry Tompo ANDRIANANAHARY ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbola tanora loatra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahay mandahateny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hoy ny TOMPO tamiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Aza manao hoe «mbola tanora loatra aho»
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy maintsy handeha
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay rehetra hanirahako anao ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hilaza aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra nandidiako anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza matahotra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa miaraka anao Aho mba hanafaka anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no teny hentitry ny TOMPO tamiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Avy eo IZY dia nandroso ny tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanendry ny vavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary nilaza tamiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Ianao no hanambara ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jereo fa omeko fahefana ianao anio
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ireo firenena sy fanjakana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanongotra sy hanjera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanapotika sy handrava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanorina sy hamboly.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny rantsam-paiso sy ny vilany mangotraka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanontany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no hitanao, ry Jeremià?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novaliako hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rantsam-paiso na hazo mahatsiaro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny teny hebreo ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'hazo mahatsiaro '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia (karazana paiso), hazo voalohany mamony amin’ny lohataona, dia mampahatsiahy ny fahamalinana ananan’ny mpiambina na mahatsiaro.
    marker-yv: yv-n
  - type: text
    text: ' no hitako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ny TOMPO tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahita tsara ianao, fa hahatsiaro Aho mba hanatanteraka izay lazaiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia mbola nisy tenin’ny TOMPO tamiko nanontany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ary inona no hitanao izao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novaliako hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Vilany mangotraka no hitako; avy any avaratra no mitongilana mankatỳ ny vavany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy ny TOMPO nanazava tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Avy any avaratra tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hipoitra ny loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamelezana ny mponina rehetra eto amin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny mpandrava izay natahoran’ny fanjakan’i Joda tamin’izany fotoana izany dia tsy afaka ho tonga raha tsy avy any avaratra; ampit 4.6; 6.1,22; 10.22; 13.20 sns...
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa Izao TOMPO dia miteny hentitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hantsoiko ny fokom-pirenena rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ireo fanjakana any avaratra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho avy ireny ka samy hametraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sezafiandrianan’ny mpanjakany avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anoloan’ny vavahadin’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanodidina ny mandany rehetra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanafika ny tanàn-dehibe rehetra any Joda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Havoakako ny didim-pitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamelezana ny mponin’ity tany ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'noho ny ratsy rehetra izay nataony:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandao Ahy izy ka nanao sorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ireo andriamani-kafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny andriamanitra asan-tanany izay ivavahany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ianao kosa, ry Jeremià, misikìna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsangàna ka ambarao azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra nandidiako anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra azy ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao hataoko raiki-tahotra eo anatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Manomboka izao dia hataoko mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny tanànamimanda ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy toy ny andry vy ary toy ny manda varahina
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mifanandrina amin’ny mponina rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny mpanjakan’i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ireo mpitondra fanjakana sy ny mpisorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sarambabem-bahoaka ao amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hiady aminao izy nefa tsy haharesy anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa miaraka aminao Aho mba hanafaka anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teny hentitra avy amiko TOMPO izany.
