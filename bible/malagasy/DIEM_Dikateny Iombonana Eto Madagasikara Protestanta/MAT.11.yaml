document_id: MAT.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony vitan’i Jesoa ny hafatrafatra ho an’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' 12 lahy, dia niala teo Izy hampianatra sy hitoriteny any amin’ny tanànan-dry zareo Jiosy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Irak’i Jôhany Mpanao batisa tany amin’i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 7.18-35)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa i Jôhany no ilay voalazan’ny Soratra Masina hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro alefako hialoha Anao ny irako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamboatra ny lalan-kalehanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mal 3.1.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy mbola nisy lehibe noho i Jôhany tamin’ny olombelona rehetra; kanefa lazaiko marina aminareo fa izay kely indrindra ao amin’ny Fanjakàn’ny lanitra dia lehibe noho izy. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hatramin’ny andro nitorian’i Jôhany Mpanao batisa no mankatỳ, ny Fanjakàn’ny lanitra dia toherina amin’ny alalan’ny herisetra ka ny mpanao herisetra no mitady handrombaka azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny Fanjakàn’ny lanitra... handrombaka azy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mahery fiavy ny Fanjakàn’ny lanitra ka izay mahery miezaka no mahazo azy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (Jereo Lk 16.16).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Eny, ny mpaminany rehetra sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànan
    - type: text
      text: '’i Mosesy ka miafara amin’ny andron’i Jôhany dia nanambara mialoha ny Fanjakàn’ny lanitra. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary raha mety mandray ianareo, dia i Jôhany no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Elià
    - type: text
      text: ' voalaza fa ho avy. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izay manan-tsofina hihainoana, aoka hihaino!
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iza no hanoharako ny olona ankehitriny? Tahaka ny ankizy mipetra-potsiny eny an-kianja ka omen’ny namany tsiny hoe: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ianareo itsofany sodina, tsy mandihy; ianareo anaovanay hira fisaonana, tsy mitomany!» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tonga i Jôhany Mpanao batisa, tsy mihinana sady tsy misotro, nefa lazaina hoe: «Ondranondranana!» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga indray ny Zanak’olona, mihinana sy misotro, nefa lazaina hoe: «Olona tendan-kanina sy mpiboboka divay, sakaizan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpamory hetra
    - type: text
      text: ' sy ny mpanota!» Andriamanitra kosa, araka ny fahendreny, dia asehon’ny asany ho marina.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampalahelo ireo tanàna tsy mino an’i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 10.13-15)
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ren’i Jôhany Mpanao batisa tao am-ponja ny asa nataon’i Jesoa, ka nisy nirahin’i Jôhany ny mpianany '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay i Jesoa dia niteny mafy ireo tanàna nahavitana ny ankamaroan’ny asa mahagaga nataony, satria tsy niala tamin’ny toetra ratsiny ireo mponina ao aminy; ka hoy i Jesoa:'
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mampalahelo ianao, ry Kôrazìna! Mampalahelo ianao, ry Betsaidà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Kôrazìna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy i '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Betsaidà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia tanàna mifanila amin’i Kafanahòma. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'i Tiro sy i Sidôna:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ampit Is 23.1-18; Ezek 26; Jl 4.4-8; Ham 1.9-10.'
      marker-yv: yv-n
    - type: text
      text: '! Raha i Tiro sy i Sidôna no nahavitana ireo asa mahagaga natao teo aminareo, dia efa ela ireo no nitafy lamba fisaonana ary nihosin-davenona hanambaràny fa nialany ny toetra ratsiny. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ka hoy Aho aminareo hoe: amin’ny andro fitsarana, dia ho azoazo kokoa ny sazy hihatra amin’i Tiro sy i Sidôna noho ny hihatra amin’i Kôrazìna sy i Betsaidà! '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ianao, ry Kafarnahòma, heverinao ve fa hasandratra hatrany an-danitra ianao? Tsia, haetry hatrany amin’ny toeran’ny maty ianao! Raha i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sôdôma
    - type: text
      text: ' manko no nahavitana ireo asa mahagaga natao teo aminao, dia ho naharitra mandraka androany izany tanàna izany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hasandratra... maty ianao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 14.13-15. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sôdôma:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Gen 19.24-28.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ka hoy Aho aminareo hoe: amin’ny andro fitsarana dia ho azoazo kokoa ny sazy hihatra amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sôdôma
    - type: text
      text: ' noho ny hihatra amin’i Kafarnahòma!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ao amin’i Jesoa no anovozana fialan-tsasatra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 10.21-22)
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay fotoana izay dia niteny i Jesoa nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ray ô, Tompon’ny tany aman-danitra Ianao, ka misaotra Anao Aho fa ireo zavatra nafeninao tamin’ny hendry sy ny manan-tsaina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ampit Dan 2; 1Kôr 1.17-29. –Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: zavatra nafeninao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia manondro ny Fanjakàn’ny lanitra sy ny harena miafina raketiny.'
      marker-yv: yv-n
    - type: text
      text: ' dia nasehonao tamin’ny madinika. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Eny, Ray ô, izany tokoa no sitrakao!
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa natolotry ny Raiko ho Ahy ny zavatra rehetra; ary tsy misy olona mahalala tsara ny Zanaka afa-tsy ny Ray, na mahalala tsara ny Ray afa-tsy ny Zanaka mbamin’izay tian’ny Zanaka hanehoana azy!
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mankanesa atỳ amiko ianareo rehetra torovana sy vesaran’ny lalàna, fa Izaho no hanome fialan-tsasatra anareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raiso ny fampianarako ary mianara amiko fa malemy fanahy sady tsy miavona am-po Aho; ary dia hahita fialan-tsasatra ao anatinareo ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jer 6.16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianao ve no Ilay ho avy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ilay ho avy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany hoe ilay Mesia nandrandrain’ny Jiosy tamin’izay. Jereo 3.11; Jôh 1.27.
      marker-yv: yv-n
    - type: text
      text: ' sa olon-kafa no mbola tokony handrasanay?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, mora raisina ny fampianarako ary mora arahina ny lalànako.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa namaly ireto iraka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ndeha ambarao an’i Jôhany ny zavatra hitanareo sy renareo: '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'mahiratra ny jamba, mandeha tsara ny mandringa, madio ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: marary hoditra
    - type: text
      text: ', mandre ny marenina, atsangana ho velona ny maty, itoriana ny Vaovao Mahafaly ny mahantra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 26.19; 29.18; 35.5-6; 61.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa sambatra izay tsy voasakana hino Ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tsy voasakana hino Ahy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsy misalasala noho ny amiko.
      marker-yv: yv-n
    - type: text
      text: '!'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony lasa ireto iraka, dia niteny momba an’i Jôhany tamin’ny vahoaka i Jesoa nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hizaha inona no nalehanareo tany an-taniefitra? Volotara hetsiketsehin-drivotra ve? Tsia! '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa hizaha inona àry no nalehanareo tany? Olona marevaka fitafiana ve? Izay marevaka fitafiana dia any amin’ny lapan’ny mpanjaka! '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa hizaha inona àry no nalehanareo tany? '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpaminany
    - type: text
      text: ' ve? Izany tokoa, hoy Aho aminareo, ary mihoatra noho ny mpaminany aza. '
