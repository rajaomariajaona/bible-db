document_id: MAT.11,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Nony vitan’i Jesoa ny hafatrafatra ho an’ireo '
  - type: text
    content: mpianany
  - type: text
    content: ' 12 lahy, dia niala teo Izy hampianatra sy hitoriteny any amin’ny tanànan-dry zareo Jiosy.'
  - type: heading
    content: Irak’i Jôhany Mpanao batisa tany amin’i Jesoa
  - type: heading
    content: (Jereo Lk 7.18-35)
  '10':
  - type: text
    content: 'Fa i Jôhany no ilay voalazan’ny Soratra Masina hoe:'
  - type: text
    content: «Indro alefako hialoha Anao ny irako,
  - type: text
    content: hoy Andriamanitra,
  - type: text
    content: mba hamboatra ny lalan-kalehanao
  - type: note
    content: Mal 3.1.
  - type: text
    content: '!»'
  '11':
  - type: text
    content: '–Tsy mbola nisy lehibe noho i Jôhany tamin’ny olombelona rehetra; kanefa lazaiko marina aminareo fa izay kely indrindra ao amin’ny Fanjakàn’ny lanitra dia lehibe noho izy. '
  '12':
  - type: text
    content: Hatramin’ny andro nitorian’i Jôhany Mpanao batisa no mankatỳ, ny Fanjakàn’ny lanitra dia toherina amin’ny alalan’ny herisetra ka ny mpanao herisetra no mitady handrombaka azy
  - type: note
    content: 'ny Fanjakàn’ny lanitra... handrombaka azy: dkt hafa mahery fiavy ny Fanjakàn’ny lanitra ka izay mahery miezaka no mahazo azy (Jereo Lk 16.16).'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Eny, ny mpaminany rehetra sy ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy ka miafara amin’ny andron’i Jôhany dia nanambara mialoha ny Fanjakàn’ny lanitra. '
  '14':
  - type: text
    content: 'Ary raha mety mandray ianareo, dia i Jôhany no '
  - type: text
    content: Elià
  - type: text
    content: ' voalaza fa ho avy. '
  '15':
  - type: text
    content: Izay manan-tsofina hihainoana, aoka hihaino!
  '16':
  - type: text
    content: 'Iza no hanoharako ny olona ankehitriny? Tahaka ny ankizy mipetra-potsiny eny an-kianja ka omen’ny namany tsiny hoe: '
  '17':
  - type: text
    content: '«Ianareo itsofany sodina, tsy mandihy; ianareo anaovanay hira fisaonana, tsy mitomany!» '
  '18':
  - type: text
    content: 'Fa tonga i Jôhany Mpanao batisa, tsy mihinana sady tsy misotro, nefa lazaina hoe: «Ondranondranana!» '
  '19':
  - type: text
    content: 'Tonga indray ny Zanak’olona, mihinana sy misotro, nefa lazaina hoe: «Olona tendan-kanina sy mpiboboka divay, sakaizan’ny '
  - type: text
    content: mpamory hetra
  - type: text
    content: ' sy ny mpanota!» Andriamanitra kosa, araka ny fahendreny, dia asehon’ny asany ho marina.'
  - type: heading
    content: Mampalahelo ireo tanàna tsy mino an’i Jesoa
  - type: heading
    content: (Jereo Lk 10.13-15)
  '2':
  - type: text
    content: 'Ren’i Jôhany Mpanao batisa tao am-ponja ny asa nataon’i Jesoa, ka nisy nirahin’i Jôhany ny mpianany '
  '20':
  - type: text
    content: 'Tamin’izay i Jesoa dia niteny mafy ireo tanàna nahavitana ny ankamaroan’ny asa mahagaga nataony, satria tsy niala tamin’ny toetra ratsiny ireo mponina ao aminy; ka hoy i Jesoa:'
  '21':
  - type: text
    content: –Mampalahelo ianao, ry Kôrazìna! Mampalahelo ianao, ry Betsaidà
  - type: note
    content: 'I Kôrazìna sy i Betsaidà dia tanàna mifanila amin’i Kafanahòma. –i Tiro sy i Sidôna: ampit Is 23.1-18; Ezek 26; Jl 4.4-8; Ham 1.9-10.'
  - type: text
    content: '! Raha i Tiro sy i Sidôna no nahavitana ireo asa mahagaga natao teo aminareo, dia efa ela ireo no nitafy lamba fisaonana ary nihosin-davenona hanambaràny fa nialany ny toetra ratsiny. '
  '22':
  - type: text
    content: 'Ka hoy Aho aminareo hoe: amin’ny andro fitsarana, dia ho azoazo kokoa ny sazy hihatra amin’i Tiro sy i Sidôna noho ny hihatra amin’i Kôrazìna sy i Betsaidà! '
  '23':
  - type: text
    content: 'Ary ianao, ry Kafarnahòma, heverinao ve fa hasandratra hatrany an-danitra ianao? Tsia, haetry hatrany amin’ny toeran’ny maty ianao! Raha i '
  - type: text
    content: Sôdôma
  - type: text
    content: ' manko no nahavitana ireo asa mahagaga natao teo aminao, dia ho naharitra mandraka androany izany tanàna izany'
  - type: note
    content: 'Hasandratra... maty ianao: Is 14.13-15. –Sôdôma: jereo Gen 19.24-28.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Ka hoy Aho aminareo hoe: amin’ny andro fitsarana dia ho azoazo kokoa ny sazy hihatra amin’i '
  - type: text
    content: Sôdôma
  - type: text
    content: ' noho ny hihatra amin’i Kafarnahòma!'
  - type: heading
    content: Ao amin’i Jesoa no anovozana fialan-tsasatra
  - type: heading
    content: (Jereo Lk 10.21-22)
  '25':
  - type: text
    content: 'Tamin’izay fotoana izay dia niteny i Jesoa nanao hoe:'
  - type: text
    content: –Ray ô, Tompon’ny tany aman-danitra Ianao, ka misaotra Anao Aho fa ireo zavatra nafeninao tamin’ny hendry sy ny manan-tsaina
  - type: note
    content: Ampit Dan 2; 1Kôr 1.17-29. –Ny zavatra nafeninao dia manondro ny Fanjakàn’ny lanitra sy ny harena miafina raketiny.
  - type: text
    content: ' dia nasehonao tamin’ny madinika. '
  '26':
  - type: text
    content: Eny, Ray ô, izany tokoa no sitrakao!
  '27':
  - type: text
    content: Efa natolotry ny Raiko ho Ahy ny zavatra rehetra; ary tsy misy olona mahalala tsara ny Zanaka afa-tsy ny Ray, na mahalala tsara ny Ray afa-tsy ny Zanaka mbamin’izay tian’ny Zanaka hanehoana azy!
  '28':
  - type: text
    content: 'Mankanesa atỳ amiko ianareo rehetra torovana sy vesaran’ny lalàna, fa Izaho no hanome fialan-tsasatra anareo. '
  '29':
  - type: text
    content: Raiso ny fampianarako ary mianara amiko fa malemy fanahy sady tsy miavona am-po Aho; ary dia hahita fialan-tsasatra ao anatinareo ianareo
  - type: note
    content: Ampit Jer 6.16.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'hanontany azy hoe:'
  - type: text
    content: –Ianao ve no Ilay ho avy
  - type: note
    content: 'Ilay ho avy: izany hoe ilay Mesia nandrandrain’ny Jiosy tamin’izay. Jereo 3.11; Jôh 1.27.'
  - type: text
    content: ' sa olon-kafa no mbola tokony handrasanay?'
  '30':
  - type: text
    content: Eny, mora raisina ny fampianarako ary mora arahina ny lalànako.
  '4':
  - type: text
    content: 'Dia hoy i Jesoa namaly ireto iraka:'
  - type: text
    content: '–Ndeha ambarao an’i Jôhany ny zavatra hitanareo sy renareo: '
  '5':
  - type: text
    content: 'mahiratra ny jamba, mandeha tsara ny mandringa, madio ny '
  - type: text
    content: marary hoditra
  - type: text
    content: ', mandre ny marenina, atsangana ho velona ny maty, itoriana ny Vaovao Mahafaly ny mahantra'
  - type: note
    content: Ampit Is 26.19; 29.18; 35.5-6; 61.1.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Koa sambatra izay tsy voasakana hino Ahy
  - type: note
    content: 'tsy voasakana hino Ahy: dkt hafa tsy misalasala noho ny amiko.'
  - type: text
    content: '!'
  '7':
  - type: text
    content: 'Nony lasa ireto iraka, dia niteny momba an’i Jôhany tamin’ny vahoaka i Jesoa nanao hoe:'
  - type: text
    content: '–Hizaha inona no nalehanareo tany an-taniefitra? Volotara hetsiketsehin-drivotra ve? Tsia! '
  '8':
  - type: text
    content: 'Fa hizaha inona àry no nalehanareo tany? Olona marevaka fitafiana ve? Izay marevaka fitafiana dia any amin’ny lapan’ny mpanjaka! '
  '9':
  - type: text
    content: 'Koa hizaha inona àry no nalehanareo tany? '
  - type: text
    content: Mpaminany
  - type: text
    content: ' ve? Izany tokoa, hoy Aho aminareo, ary mihoatra noho ny mpaminany aza. '
