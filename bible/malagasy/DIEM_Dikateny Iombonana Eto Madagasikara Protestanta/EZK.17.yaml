document_id: EZK.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voromahery sy ny voaloboka
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: Voavoly tsara tokoa ny voaloboka kanefa tsy mety ho vanona. Raha vao tsofin’ny rivotra avy any atsinanana izy, dia ho maina tanteraka. Eo amin’ny tany tokony haniriany no hahamaina azy am-potony›. »
  - type: heading
    content: Fanazavana ny fanoharana
  '11':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '12':
  - type: text
    content: '«Anontanio ange ireo olona maditra ireo raha mba fantany akory ny dikan’izany fanoharana izany e! Ampahatsiahivo azy ny fomba nidiran’ny mpanjakan’i Babilôna tao Jerosalema, ny nisamborany ny mpanjaka sy ireo mpitondra ambony mbamin’ny nitondrany azy tany Babilôna. '
  '13':
  - type: text
    content: 'Avy eo dia naka olona iray tamin’ny fianakavian’ny mpanjaka izy ka nanao fifanekena taminy, ary nampianiana azy. Nampanalaviriny ny tany ireo olo-maventy rehetra, '
  '14':
  - type: text
    content: 'mba hampietry ny fanjakana, tsy ho afaka hitraka intsony fa hanaja tanteraka ny fifanekena. '
  '15':
  - type: text
    content: Kanjo ity mpanjaka vaovao nikomy tamin’ny mpandresy, ary nandefa iraka tany Ejipta mba hangataka soavaly sy miaramila marobe. Hahomby sy ho tafavoaka ve izy raha nanao izany? Tsy ho tafavoaka mihitsy izy, satria tsy nitandro fifanekena!
  '16':
  - type: text
    content: '«Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa ho faty any amin’ny tanin’ilay mpanjaka izay nahatonga azy hanjaka io mpanjaka io. Nanao tsinontsinona ny fianianana nataony ary tsy nitandro ny fifanekena vita izy, ka ho faty any Babilôna. '
  '17':
  - type: text
    content: 'Ary na dia miaraka amin’ny tafika goavana vory marobe aza ny '
  - type: text
    content: Farao
  - type: text
    content: 'n’i Ejipta dia tsy afaka hanampy azy hiaro tena rehefa manangana tovon-tany sy manao hady ho enti-mamono ireo vahoaka betsaka ny Babilônianina. '
  '18':
  - type: text
    content: Nanao tsinontsinona ny fianianana nataony io mpanjaka io raha tsy nitandro ny fifanekena. Nanao ireo hadisoana rehetra ireo izy ka tsy tafavoaka satria efa nanome toky tamim-pianianana.
  '19':
  - type: text
    content: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: Velona Aho ka mianiana fa noho ny mpanjakan’i Israely nanao tsinontsinona ny fifanekena izay nianianany hotandremana, dia hampihariko aminy ny vokatr’izany. '
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, manaova ankamantatra ary '
  - type: text
    content: fanoharana
  - type: text
    content: ' ho an’ny Israelita, '
  '20':
  - type: text
    content: 'Hamelarako fandrika izy ka ho tratra. Hoentiko any Babilôna izy ka any no hotsaraiko noho ny fivadihany tamiko. '
  '21':
  - type: text
    content: 'Ho faty an’ady ireo miaramila kinga amin’ny andian-tafiny rehetra, ary izay sisa velona dia haely amin’ny vazan-tany efatra: Amin’izay dia hoekenareo fa Izaho TOMPO no efa niteny taminareo.»'
  - type: heading
    content: Fanomezan-toky nataon’ny Tompo
  '22':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Izaho mihitsy no haka rantsan-kazo tanora iray eny an-tendron’ny hazo sedera avo, ary hamboleko izany; eny amin’ny lohan’ny rantsany no hakako izany, ka hamboleko eny an-tendrombohitra avo be'
  - type: note
    content: 'rantsan-kazo tanora iray: io sary io dia enti-manondro ny mpanjakan’i Israely amin’ny ho avy, ilay fanantenan’ny taranak’i Davida (jereo 34.23; 2 Sam 7.12-16). –tendrombohitra avo be: jereo 20.40 sy nta; 40.2.'
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Eny an-tendrombohitra avon’i Israely no hamboleko azy. Handrobona ny rantsany ka hamoa, dia hanjary sedera mahafinaritra izy. Hanao akany eny amin’ny rantsany sy hitoetra eo ambany alony ny vorona isan-karazany. '
  '24':
  - type: text
    content: Amin’izay dia ho fantatry ny hazo rehetra any an-tsaha fa Izaho no TOMPO. Kapaiko ny hazo avo loatra ary ampaniriko ny kely indrindra. Hataoko maina ny hazo maitso milenodenoka, ka homeko aina indray ireo hazo efa maina. Izaho TOMPO no manambara sady manatanteraka izany.»
  '3':
  - type: text
    content: 'ka ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Nisy voromahery iray lehibe'
  - type: note
    content: Ny voromahery lehibe dia enti-milaza an’i Nebokadnetsara, mpanjakan’i Babilôna, izay nandresy an’i Jerosalema, jereo and 12.
  - type: text
    content: ' nanana elatra goavana sy volo lava sady matevina no misoratsoratra. Nanidina hatrany an-tendrombohitr’i Libano izy ary naka ny tendron’ny hazo sedera, '
  '4':
  - type: text
    content: nanapaka izay avo indrindra tamin’ny rantsany, dia nitondra azy ho any amin’ny tanin’ny mpandranto ary nametraka azy tao an-tanànan’ny mpivarotra
  - type: note
    content: Ity and ity dia milaza ankolaka ny fitondrana ho babo an’i Jôiakina, mpanjakan’i Joda sy ireo olo-maventin’ny fanjakany, jereo and 12.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Nalainy koa ny voa famafy anankiray hafa
  - type: note
    content: Ny voa famafy anankiray hafa dia ilazana an’i Tsedekià, dadatoan’i Jôiakina izay napetrak’i Nebokadnetsara teo amin’ny sezafiandrianan’i Joda, jereo 2 Mp 24.7.
  - type: text
    content: ' tao amin’ny tanin’i Israely ka naleviny tao anaty saha lonaka. Avy eo dia nafindrany teo amoron’ny rano mikoriana ny tsimok’io voa famafy io, ka nataony araka ny fanao amin’ny zanaka hazomalahelo. '
  '6':
  - type: text
    content: 'Ary naniry tokoa izany, dia tonga foto-boaloboka niroborobo sady nandadina. Nisandrahaka ny rantsany ka nitodika ho any amin’ilay voromahery ary ny fakany nitatra teo ambaniny. Tonga voaloboka izy ka nanome sakelika sy rantsana vaovao hatrany. '
  '7':
  - type: text
    content: Kanjo nisy voromahery lehibe iray hafa koa
  - type: note
    content: Ny voromahery lehibe iray hafa dia manondro ny Farao* mpanjakan’i Ejipta izay nezahin’i Tsedekià nohatonina, jereo and 15.
  - type: text
    content: ', nanana elatra goavana sy volo matevina. Koa nalefan’ilay voaloboka nankany aminy ny fakany sady natodiny nankany koa ny rantsany, mba hahazo rano betsaka kokoa noho ny teo amin’ny tany nisy azy izy. '
  '8':
  - type: text
    content: Kanefa saha tsara teo amoron’ny rano mikoriana no nambolena azy mba handrobonan’ny rantsany sy hamoazany ka ho tonga voaloboka mahafinaritra.›
  '9':
  - type: text
    content: '«Koa ambarao amin’ny Israelita fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Moa ho vanona ve izany voaloboka izany? Tsy hongotan’ilay voromahery voalohany ve ny fakany, hosimbany ny voany ary hataony izay hahamaina ny sakeliny'
  - type: note
    content: Ny amin’ny fomba nanafaizan’i Nebokadnetsara ny fifanekena nataon’i Tsedekià tamin’i Ejipta, dia jereo and 16; 2 Mp 24.20–25.7; 2 Tan 36.13, 17-20.
  - type: text
    content: '? Tsy mila hery lehibe na antokon-tafika maro akory izy hanongotana azy. '
