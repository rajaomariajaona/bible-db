document_id: EZK.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny voromahery sy ny voaloboka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Voavoly tsara tokoa ny voaloboka kanefa tsy mety ho vanona. Raha vao tsofin’ny rivotra avy any atsinanana izy, dia ho maina tanteraka. Eo amin’ny tany tokony haniriany no hahamaina azy am-potony›. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanazavana ny fanoharana
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '«Anontanio ange ireo olona maditra ireo raha mba fantany akory ny dikan’izany fanoharana izany e! Ampahatsiahivo azy ny fomba nidiran’ny mpanjakan’i Babilôna tao Jerosalema, ny nisamborany ny mpanjaka sy ireo mpitondra ambony mbamin’ny nitondrany azy tany Babilôna. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Avy eo dia naka olona iray tamin’ny fianakavian’ny mpanjaka izy ka nanao fifanekena taminy, ary nampianiana azy. Nampanalaviriny ny tany ireo olo-maventy rehetra, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'mba hampietry ny fanjakana, tsy ho afaka hitraka intsony fa hanaja tanteraka ny fifanekena. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Kanjo ity mpanjaka vaovao nikomy tamin’ny mpandresy, ary nandefa iraka tany Ejipta mba hangataka soavaly sy miaramila marobe. Hahomby sy ho tafavoaka ve izy raha nanao izany? Tsy ho tafavoaka mihitsy izy, satria tsy nitandro fifanekena!
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '«Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa ho faty any amin’ny tanin’ilay mpanjaka izay nahatonga azy hanjaka io mpanjaka io. Nanao tsinontsinona ny fianianana nataony ary tsy nitandro ny fifanekena vita izy, ka ho faty any Babilôna. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary na dia miaraka amin’ny tafika goavana vory marobe aza ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: 'n’i Ejipta dia tsy afaka hanampy azy hiaro tena rehefa manangana tovon-tany sy manao hady ho enti-mamono ireo vahoaka betsaka ny Babilônianina. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nanao tsinontsinona ny fianianana nataony io mpanjaka io raha tsy nitandro ny fifanekena. Nanao ireo hadisoana rehetra ireo izy ka tsy tafavoaka satria efa nanome toky tamim-pianianana.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: Velona Aho ka mianiana fa noho ny mpanjakan’i Israely nanao tsinontsinona ny fifanekena izay nianianany hotandremana, dia hampihariko aminy ny vokatr’izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Ry ilay taranak’olombelona, manaova ankamantatra ary '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' ho an’ny Israelita, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hamelarako fandrika izy ka ho tratra. Hoentiko any Babilôna izy ka any no hotsaraiko noho ny fivadihany tamiko. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ho faty an’ady ireo miaramila kinga amin’ny andian-tafiny rehetra, ary izay sisa velona dia haely amin’ny vazan-tany efatra: Amin’izay dia hoekenareo fa Izaho TOMPO no efa niteny taminareo.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanomezan-toky nataon’ny Tompo
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Izaho mihitsy no haka rantsan-kazo tanora iray eny an-tendron’ny hazo sedera avo, ary hamboleko izany; eny amin’ny lohan’ny rantsany no hakako izany, ka hamboleko eny an-tendrombohitra avo be'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'rantsan-kazo tanora iray: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: io sary io dia enti-manondro ny mpanjakan’i Israely amin’ny ho avy, ilay fanantenan’ny taranak’i Davida (jereo 34.23; 2 Sam 7.12-16). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tendrombohitra avo be:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 20.40 sy nta; 40.2.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Eny an-tendrombohitra avon’i Israely no hamboleko azy. Handrobona ny rantsany ka hamoa, dia hanjary sedera mahafinaritra izy. Hanao akany eny amin’ny rantsany sy hitoetra eo ambany alony ny vorona isan-karazany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Amin’izay dia ho fantatry ny hazo rehetra any an-tsaha fa Izaho no TOMPO. Kapaiko ny hazo avo loatra ary ampaniriko ny kely indrindra. Hataoko maina ny hazo maitso milenodenoka, ka homeko aina indray ireo hazo efa maina. Izaho TOMPO no manambara sady manatanteraka izany.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Nisy voromahery iray lehibe'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: voromahery lehibe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia enti-milaza an’i Nebokadnetsara, mpanjakan’i Babilôna, izay nandresy an’i Jerosalema, jereo and 12.
      marker-yv: yv-n
    - type: text
      text: ' nanana elatra goavana sy volo lava sady matevina no misoratsoratra. Nanidina hatrany an-tendrombohitr’i Libano izy ary naka ny tendron’ny hazo sedera, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: nanapaka izay avo indrindra tamin’ny rantsany, dia nitondra azy ho any amin’ny tanin’ny mpandranto ary nametraka azy tao an-tanànan’ny mpivarotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ity and ity dia milaza ankolaka ny fitondrana ho babo an’i Jôiakina, mpanjakan’i Joda sy ireo olo-maventin’ny fanjakany, jereo and 12.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nalainy koa ny voa famafy anankiray hafa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny voa famafy anankiray hafa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia ilazana an’i Tsedekià, dadatoan’i Jôiakina izay napetrak’i Nebokadnetsara teo amin’ny sezafiandrianan’i Joda, jereo 2 Mp 24.7.
      marker-yv: yv-n
    - type: text
      text: ' tao amin’ny tanin’i Israely ka naleviny tao anaty saha lonaka. Avy eo dia nafindrany teo amoron’ny rano mikoriana ny tsimok’io voa famafy io, ka nataony araka ny fanao amin’ny zanaka hazomalahelo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary naniry tokoa izany, dia tonga foto-boaloboka niroborobo sady nandadina. Nisandrahaka ny rantsany ka nitodika ho any amin’ilay voromahery ary ny fakany nitatra teo ambaniny. Tonga voaloboka izy ka nanome sakelika sy rantsana vaovao hatrany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Kanjo nisy voromahery lehibe iray hafa koa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'voromahery lehibe iray hafa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia manondro ny Farao* mpanjakan’i Ejipta izay nezahin’i Tsedekià nohatonina, jereo and 15.
      marker-yv: yv-n
    - type: text
      text: ', nanana elatra goavana sy volo matevina. Koa nalefan’ilay voaloboka nankany aminy ny fakany sady natodiny nankany koa ny rantsany, mba hahazo rano betsaka kokoa noho ny teo amin’ny tany nisy azy izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kanefa saha tsara teo amoron’ny rano mikoriana no nambolena azy mba handrobonan’ny rantsany sy hamoazany ka ho tonga voaloboka mahafinaritra.›
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '«Koa ambarao amin’ny Israelita fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Moa ho vanona ve izany voaloboka izany? Tsy hongotan’ilay voromahery voalohany ve ny fakany, hosimbany ny voany ary hataony izay hahamaina ny sakeliny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny amin’ny fomba nanafaizan’i Nebokadnetsara ny fifanekena nataon’i Tsedekià tamin’i Ejipta, dia jereo and 16; 2 Mp 24.20–25.7; 2 Tan 36.13, 17-20.
      marker-yv: yv-n
    - type: text
      text: '? Tsy mila hery lehibe na antokon-tafika maro akory izy hanongotana azy. '
