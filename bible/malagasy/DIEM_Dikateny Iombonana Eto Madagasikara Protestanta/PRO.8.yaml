    children:
    - type: text
      text: Mampiseho ny maha izy azy ny Fahendrena
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izaho Fahendrena no manana ny fahamalinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahazo ny fahaiza-manao drafitrasa.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fankahalana ny ratsy no fanajana ny TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy halako na ny fiavonavonana na ny fireharehana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny fitondrantena ratsy na ny vava fandainga.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahy ny fahaiza-mamolavola sy mampihatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahy koa ny fahaiza-manavaka sy ny hery manatanteraka.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny alalako no anjakan’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ahazoan’ny mpitondra manao didy ara-drariny;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny alalako no ifehezan’ireo mpifehy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy anaovan’ireo loholona fitsarana ara-drariny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia tia izay tia ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mikatsaka ahy no hahita ahy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miaraka amiko ny harena sy ny voninahitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fananana mateza sy fanambinana sahaza.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay omeko dia tsara noho ny volamena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, noho ny volamena madio indrindra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay azo avy amiko dia tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny volafotsy voafantina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo an-tampon-kavoana amoron-dalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady eo am-pihaonan-tsakelidalana no ijoroany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny soritry ny fahamarinana no izorako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny lalana anjakan’ny rariny,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampahazoako zava-tsoa ireo tia ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamenoako ny tranon-drakiny.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nateraky ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: ft
