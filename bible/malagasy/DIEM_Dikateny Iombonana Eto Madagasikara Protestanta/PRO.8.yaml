  - type: text
    text: ho voalohan’asany aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia talohan’ny asa nataony hatry ny elabe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Natokany hatramin’ny fahagola aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, natokany hatrany am-piandohana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fony tsy mbola nisy akory ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fony tsy mbola ary ny rano lalimbe no efa teraka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fony tsy mbola ary ny loharano miboiboika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Talohan’ny niorenan’ny tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy talohan’ny havoana no efa teraka aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: dia fony tsy mbola nataon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny tany na ny saha midadasika eo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny vovotany singany voalohany
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Efa teo aho, fony Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: namorona ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy namaritra ny faravodilanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo ambonin’ny rano lalimbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nampivangongo ny rahona eny ambony Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nampiboiboika ny loharano lalina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: nanisy faritra ho an’ny ranomasina Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia faritra tsy azony hihoarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nametraka ny fanorenan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tamin’izany asa rehetra nataony izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanampy azy toy ny mpanao mari-trano aho
  - type: usfm
    marker: f
    children:
    - type: usfm
