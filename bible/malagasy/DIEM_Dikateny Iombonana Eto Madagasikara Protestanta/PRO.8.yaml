document_id: PRO.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Antso vaovao ataon’ny Fahendrena
  - type: text
    content: Injany fa miantso ny Fahendrena
  - type: note
    content: Jereo 1.20 sy nta.
  - type: text
    content: ary manandra-peo ny fahaiza-manavaka.
  '10':
  - type: text
    content: Ny fampianarako no raiso fa tsy ny volafotsy
  - type: text
    content: ary aleo fahalalana toy izay ny volamena voafantina.
  '11':
  - type: text
    content: Satria Izaho Fahendrena dia tsara noho ny perla;
  - type: text
    content: tsy misy zava-tsarobidy azo ampitahaina amiko
  - type: note
    content: Jereo 2.4 sy nta.
  - type: text
    content: .»
  - type: heading
    content: Mampiseho ny maha izy azy ny Fahendrena
  '12':
  - type: text
    content: «Izaho Fahendrena no manana ny fahamalinana
  - type: text
    content: ka nahazo ny fahaiza-manao drafitrasa.
  '13':
  - type: text
    content: Ny fankahalana ny ratsy no fanajana ny TOMPO.
  - type: text
    content: Samy halako na ny fiavonavonana na ny fireharehana
  - type: text
    content: na ny fitondrantena ratsy na ny vava fandainga.
  '14':
  - type: text
    content: Ahy ny fahaiza-mamolavola sy mampihatra;
  - type: text
    content: Ahy koa ny fahaiza-manavaka sy ny hery manatanteraka.
  '15':
  - type: text
    content: amin’ny alalako no anjakan’ny mpanjaka,
  - type: text
    content: sy ahazoan’ny mpitondra manao didy ara-drariny;
  '16':
  - type: text
    content: amin’ny alalako no ifehezan’ireo mpifehy
  - type: text
    content: sy anaovan’ireo loholona fitsarana ara-drariny.
  '17':
  - type: text
    content: Izaho dia tia izay tia ahy;
  - type: text
    content: ary izay mikatsaka ahy no hahita ahy.
  '18':
  - type: text
    content: Miaraka amiko ny harena sy ny voninahitra,
  - type: text
    content: dia fananana mateza sy fanambinana sahaza.
  '19':
  - type: text
    content: Izay omeko dia tsara noho ny volamena,
  - type: text
    content: eny, noho ny volamena madio indrindra;
  - type: text
    content: ary izay azo avy amiko dia tsara
  - type: text
    content: noho ny volafotsy voafantina.
  '2':
  - type: text
    content: Eo an-tampon-kavoana amoron-dalana
  - type: text
    content: sady eo am-pihaonan-tsakelidalana no ijoroany.
  '20':
  - type: text
    content: Ny soritry ny fahamarinana no izorako
  - type: text
    content: dia ny lalana anjakan’ny rariny,
  '21':
  - type: text
    content: mba hampahazoako zava-tsoa ireo tia ahy
  - type: text
    content: ka hamenoako ny tranon-drakiny.
  '22':
  - type: text
    content: «Nateraky ny TOMPO
  - type: note
    content: Dkt hafa Norantovin’ny Tompo.
  - type: text
    content: ho voalohan’asany aho,
  - type: text
    content: dia talohan’ny asa nataony hatry ny elabe.
  '23':
  - type: text
    content: Natokany hatramin’ny fahagola aho,
  - type: text
    content: eny, natokany hatrany am-piandohana,
  - type: text
    content: dia fony tsy mbola nisy akory ny tany.
  '24':
  - type: text
    content: Fony tsy mbola ary ny rano lalimbe no efa teraka aho
  - type: text
    content: dia fony tsy mbola ary ny loharano miboiboika.
  '25':
  - type: text
    content: Talohan’ny niorenan’ny tendrombohitra
  - type: text
    content: sy talohan’ny havoana no efa teraka aho,
  '26':
  - type: text
    content: dia fony tsy mbola nataon’Andriamanitra
  - type: text
    content: na ny tany na ny saha midadasika eo aminy
  - type: text
    content: na ny vovotany singany voalohany
  - type: text
    content: teo amin’izao tontolo izao.
  '27':
  - type: text
    content: Efa teo aho, fony Andriamanitra
  - type: text
    content: namorona ny lanitra,
  - type: text
    content: sy namaritra ny faravodilanitra
  - type: text
    content: teo ambonin’ny rano lalimbe.
  '28':
  - type: text
    content: Nampivangongo ny rahona eny ambony Izy
  - type: text
    content: ary nampiboiboika ny loharano lalina;
  '29':
  - type: text
    content: nanisy faritra ho an’ny ranomasina Izy,
  - type: text
    content: dia faritra tsy azony hihoarana,
  - type: text
    content: ary nametraka ny fanorenan’ny tany.
  '3':
  - type: text
    content: Eo anilan’ny vavahady fidirana ny tanàna
  - type: text
    content: 'sy toeram-pandalovan’olona no iantsoantsoany hoe:'
  '30':
  - type: text
    content: Tamin’izany asa rehetra nataony izany
  - type: text
    content: dia nanampy azy toy ny mpanao mari-trano aho
  - type: note
    content: 'dia nanampy... aho: dkt hafa dia teo anilany toy ny zaza lalainy aho.'
  - type: text
    content: ka sady antom-piravoravoany isan’andro isan’andro
  - type: text
    content: no nibita-kafaliana tsy tapaka teo anatrehany;
  '31':
  - type: text
    content: nibita-kafaliana aho teo amin’ny tany noarîny
  - type: text
    content: ary naharavoravo ahy teo amin’ny olombelona.»
  - type: heading
    content: Sambatra ny olona izay mihaino ny Fahendrena
  '32':
  - type: text
    content: «Ary ankehitriny henoinareo aho, rey anaka;
  - type: text
    content: fa sambatra ianareo manaraka ny sori-dalako.
  '33':
  - type: text
    content: Henoy ny anatro ary aza lavina
  - type: text
    content: fa hampahendry anareo izany.
  '34':
  - type: text
    content: Sambatra izay olona mihaino ahy
  - type: text
    content: ka miandry isan’andro eo am-baravarako
  - type: text
    content: sy miambina eo an-tokonako!
  '35':
  - type: text
    content: Izay mahita ahy dia mahita ny fiainana
  - type: text
    content: sady mahazo sitraka amin’ny TOMPO.
  '36':
  - type: text
    content: Fa izay diso amiko dia handratra ny tenany,
  - type: text
    content: ary izay mankahala ahy dia tia fahafatesana.»
  '4':
  - type: text
    content: «Ianareo anie, rey olona, no antsoiko;
  - type: text
    content: ianareo rehetra no iantefan’ny teniko.
  '5':
  - type: text
    content: Ry kely saina, fantaro ny fahendrena,
  - type: text
    content: ry adala, hamafiso ny fahalalana.
  '6':
  - type: text
    content: Henoy fa zava-dehibe no holazaiko
  - type: text
    content: ka hiteny tsy misorona aminareo aho.
  '7':
  - type: text
    content: Eny, ny marina ihany no lazain’ny vavako
  - type: text
    content: fa halan’ny molotro ny faharatsiana.
  '8':
  - type: text
    content: Rariny avokoa izay tenin’ny vavako,
  - type: text
    content: fa tsy misy lainga na fitaka.
  '9':
  - type: text
    content: Mazava avokoa izy ho an’ny mahira-tsaina
  - type: text
    content: ary mahitsy ho an’ny manam-pahalalana.
