          text: Norantovin’ny Tompo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ho voalohan’asany aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia talohan’ny asa nataony hatry ny elabe.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Natokany hatramin’ny fahagola aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, natokany hatrany am-piandohana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fony tsy mbola nisy akory ny tany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony tsy mbola ary ny rano lalimbe no efa teraka aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fony tsy mbola ary ny loharano miboiboika.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Talohan’ny niorenan’ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy talohan’ny havoana no efa teraka aho,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fony tsy mbola nataon’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny tany na ny saha midadasika eo aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny vovotany singany voalohany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo amin’izao tontolo izao.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa teo aho, fony Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: namorona ny lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy namaritra ny faravodilanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo ambonin’ny rano lalimbe.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampivangongo ny rahona eny ambony Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampiboiboika ny loharano lalina;
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanisy faritra ho an’ny ranomasina Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia faritra tsy azony hihoarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nametraka ny fanorenan’ny tany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo anilan’ny vavahady fidirana ny tanàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy toeram-pandalovan’olona no iantsoantsoany hoe:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’izany asa rehetra nataony izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nanampy azy toy ny mpanao mari-trano aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dia nanampy... aho: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dia teo anilany toy ny zaza lalainy aho.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka sady antom-piravoravoany isan’andro isan’andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nibita-kafaliana tsy tapaka teo anatrehany;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nibita-kafaliana aho teo amin’ny tany noarîny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary naharavoravo ahy teo amin’ny olombelona.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sambatra ny olona izay mihaino ny Fahendrena
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ary ankehitriny henoinareo aho, rey anaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sambatra ianareo manaraka ny sori-dalako.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy ny anatro ary aza lavina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hampahendry anareo izany.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay olona mihaino ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miandry isan’andro eo am-baravarako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy miambina eo an-tokonako!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mahita ahy dia mahita ny fiainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahazo sitraka amin’ny TOMPO.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay diso amiko dia handratra ny tenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mankahala ahy dia tia fahafatesana.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianareo anie, rey olona, no antsoiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo rehetra no iantefan’ny teniko.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry kely saina, fantaro ny fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry adala, hamafiso ny fahalalana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy fa zava-dehibe no holazaiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiteny tsy misorona aminareo aho.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny marina ihany no lazain’ny vavako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa halan’ny molotro ny faharatsiana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rariny avokoa izay tenin’ny vavako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy misy lainga na fitaka.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mazava avokoa izy ho an’ny mahira-tsaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahitsy ho an’ny manam-pahalalana.
