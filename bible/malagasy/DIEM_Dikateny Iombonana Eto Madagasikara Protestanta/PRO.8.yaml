  - type: text
    text: ary naharavoravo ahy teo amin’ny olombelona.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sambatra ny olona izay mihaino ny Fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
