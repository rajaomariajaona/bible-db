  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fampianarako no raiso fa tsy ny volafotsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aleo fahalalana toy izay ny volamena voafantina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria Izaho Fahendrena dia tsara noho ny perla;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy zava-tsarobidy azo ampitahaina amiko
    - type: usfm
