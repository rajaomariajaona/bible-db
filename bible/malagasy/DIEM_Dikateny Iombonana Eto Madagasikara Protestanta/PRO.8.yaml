  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: «Ary ankehitriny henoinareo aho, rey anaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa sambatra ianareo manaraka ny sori-dalako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Henoy ny anatro ary aza lavina
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hampahendry anareo izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Sambatra izay olona mihaino ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miandry isan’andro eo am-baravarako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy miambina eo an-tokonako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Izay mahita ahy dia mahita ny fiainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mahazo sitraka amin’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Fa izay diso amiko dia handratra ny tenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mankahala ahy dia tia fahafatesana.»
