- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eo an-tampon-kavoana amoron-dalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady eo am-pihaonan-tsakelidalana no ijoroany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eo anilan’ny vavahady fidirana ny tanàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy toeram-pandalovan’olona no iantsoantsoany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Ianareo anie, rey olona, no antsoiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo rehetra no iantefan’ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ry kely saina, fantaro ny fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry adala, hamafiso ny fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Henoy fa zava-dehibe no holazaiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiteny tsy misorona aminareo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Eny, ny marina ihany no lazain’ny vavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa halan’ny molotro ny faharatsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rariny avokoa izay tenin’ny vavako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy misy lainga na fitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mazava avokoa izy ho an’ny mahira-tsaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahitsy ho an’ny manam-pahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fampianarako no raiso fa tsy ny volafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aleo fahalalana toy izay ny volamena voafantina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Satria Izaho Fahendrena dia tsara noho ny perla;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy zava-tsarobidy azo ampitahaina amiko
  - type: usfm
