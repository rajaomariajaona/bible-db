    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampiseho ny maha izy azy ny Fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: «Izaho Fahendrena no manana ny fahamalinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nahazo ny fahaiza-manao drafitrasa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fankahalana ny ratsy no fanajana ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy halako na ny fiavonavonana na ny fireharehana
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny fitondrantena ratsy na ny vava fandainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ahy ny fahaiza-mamolavola sy mampihatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahy koa ny fahaiza-manavaka sy ny hery manatanteraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: amin’ny alalako no anjakan’ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ahazoan’ny mpitondra manao didy ara-drariny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: amin’ny alalako no ifehezan’ireo mpifehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy anaovan’ireo loholona fitsarana ara-drariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izaho dia tia izay tia ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mikatsaka ahy no hahita ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Miaraka amiko ny harena sy ny voninahitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fananana mateza sy fanambinana sahaza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay omeko dia tsara noho ny volamena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, noho ny volamena madio indrindra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay azo avy amiko dia tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny volafotsy voafantina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny soritry ny fahamarinana no izorako
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny lalana anjakan’ny rariny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: mba hampahazoako zava-tsoa ireo tia ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamenoako ny tranon-drakiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: «Nateraky ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
