document_id: JON.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitorian’i Jônà tany Ninive
  - type: text
    content: 'Ary nisy baikon’ny TOMPO fanindroany tamin’i Jônà nanao hoe:'
  '10':
  - type: text
    content: Rehefa hitan’Andriamanitra ny fihetsik’ireo Ninivita izay niala tamin’ny toetra ratsiny, dia niova fanapahan-kevitra Izy ka tsy nampihatra ny loza izay nolazainy hamelezany azy.
  '2':
  - type: text
    content: –Mitsangàna ka mankanesa any Ninive ilay tanàna lehibe; ary torio aminy ny hafatra izay nolazaiko anao.
  '3':
  - type: text
    content: 'Dia nitsangana i Jônà ka niainga nankany Ninive, araka ny baikon’ny TOMPO. Tanàna lehibe tokoa i Ninive, fa telo andro no fitetezana azy. '
  '4':
  - type: text
    content: 'Dia nanomboka ny fitetezana tamin’ny andro voalohany i Jônà ka nitory hoe: «Rehefa afaka efapolo andro, dia horavana i Ninive.» '
  '5':
  - type: text
    content: Nino an’Andriamanitra ny mponin’i Ninive
  - type: note
    content: Jereo Mt 12.41; Lk 11.30, 32.
  - type: text
    content: ', ka nanapa-kevitra ny '
  - type: text
    content: hifady hanina
  - type: text
    content: ' ary nitafy gony hatramin’ny lehibe ka hatramin’ny kely. '
  '6':
  - type: text
    content: Rehefa ren’ny mpanjakan’i Ninive ny vaovao, dia nidina avy teo amin’ny sezafiandrianany izy ka nanala ny akanjo maha mpanjaka azy, ary nitafy gony koa sady nipetraka teo amin’ny lavenona
  - type: note
    content: Ny mipetraka eo amin’ny lavenona dia mari-pisaonana na mari-pahalelovana lehibe, jereo Ezek 27.30.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Dia nasainy nambara nanerana ny tanàna izao didim-panjakana izao: «Araka ny didin’ny mpanjaka sy ny minisitra, dia rarana ny olona sy ny biby tsy hihinana na inona na inona na hisotro rano akory. '
  '8':
  - type: text
    content: 'Na olona na biby dia tsy maintsy misarona lamba fisaonana avokoa. Ary aoka hitaraina mafy amin’Andriamanitra ka hiala amin’ny toetra ratsiny sy ny herisetra nahazatra ny tanany. '
  '9':
  - type: text
    content: Iza no mahalala? Angamba hiova fanapahan-kevitra ihany Andriamanitra ka hiala amin’ny fahatezerany mirehitra mba tsy hahafaty antsika.»
