document_id: JON.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nitorian’i Jônà tany Ninive
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nisy baikon’ny TOMPO fanindroany tamin’i Jônà nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Rehefa hitan’Andriamanitra ny fihetsik’ireo Ninivita izay niala tamin’ny toetra ratsiny, dia niova fanapahan-kevitra Izy ka tsy nampihatra ny loza izay nolazainy hamelezany azy.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: –Mitsangàna ka mankanesa any Ninive ilay tanàna lehibe; ary torio aminy ny hafatra izay nolazaiko anao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nitsangana i Jônà ka niainga nankany Ninive, araka ny baikon’ny TOMPO. Tanàna lehibe tokoa i Ninive, fa telo andro no fitetezana azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nanomboka ny fitetezana tamin’ny andro voalohany i Jônà ka nitory hoe: «Rehefa afaka efapolo andro, dia horavana i Ninive.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nino an’Andriamanitra ny mponin’i Ninive
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 12.41; Lk 11.30, 32.
      marker-yv: yv-n
    - type: text
      text: ', ka nanapa-kevitra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hifady hanina
    - type: text
      text: ' ary nitafy gony hatramin’ny lehibe ka hatramin’ny kely. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Rehefa ren’ny mpanjakan’i Ninive ny vaovao, dia nidina avy teo amin’ny sezafiandrianany izy ka nanala ny akanjo maha mpanjaka azy, ary nitafy gony koa sady nipetraka teo amin’ny lavenona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Ny mipetraka eo amin’ny lavenona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia mari-pisaonana na mari-pahalelovana lehibe, jereo Ezek 27.30.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nasainy nambara nanerana ny tanàna izao didim-panjakana izao: «Araka ny didin’ny mpanjaka sy ny minisitra, dia rarana ny olona sy ny biby tsy hihinana na inona na inona na hisotro rano akory. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Na olona na biby dia tsy maintsy misarona lamba fisaonana avokoa. Ary aoka hitaraina mafy amin’Andriamanitra ka hiala amin’ny toetra ratsiny sy ny herisetra nahazatra ny tanany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Iza no mahalala? Angamba hiova fanapahan-kevitra ihany Andriamanitra ka hiala amin’ny fahatezerany mirehitra mba tsy hahafaty antsika.»
