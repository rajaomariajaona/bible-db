document_id: 2CO.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ao amin’ity taratasy ity no ahitana fa vao mainka mihahenjana ny tsy fifankazahoan’i Paoly sy ny kristianina tany Kôrinto. Nanafintohina fatratra an’i Paoly ny nahasahian-dry zareo sasany nanambara fa tsy tena mitombina ny fahefana maha apôstôly azy. Notsipahin’i Paoly mafy izany fanambarana izany, kanefa nafeniny koa fa tena havan-tiany ny Kôrintianina ary ny hirindran’ny fihavanana no niriny. Ka akory ny hafaliany nony efa mba vaovao tsara kokoa no azony avy any Kôrinto (7.5-15).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Toy izao no fizotran’ity taratasy ity: vao vita ny fiarahabana (1.1-2), dia tsahivin’i Paoly ny loza mahatsiravina nosetrainy tany Efeso (1.3-11). Ampahatsiaroviny koa ireo zava-tsarotra natrehiny momba ny fifandraisany tamin’ny Kôrintianina. Marihiny tsara fa andraikitra mavesa-danja ny maha apôstôlin’i Jesoa Kristy (na hoe maha irak’i Jesoa Kristy). Ka dia hazavainy araka izany ny antony nahahenjakenjana an’ilay taratasy talohan’ity. Faly aoka izany izy mandre fa nisy vokany tsara ilay taratasy (1.12–7.16).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ampirisihin’i Paoly ny Kôrintianina mba halala-tanana tokoa amin’ny famoriam-bola ho an’ireo kristianina sahirana any Jodea (8–9), satria, hoy izy, «fantatrareo ny fahasoavan’i Jesoa Kristy Tompontsika: fa na dia nanankarena aza Izy, dia tonga mahantra noho ny aminareo, mba hampanankarena anareo ny fahantrany» (8.9).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Miova ho mafimafy fiteny anefa i Paoly ao amin’ny toko 10–13: tsy misorona mihitsy izy amin’ireo olona mpiampanga azy ho tsy tena apôstôly. Teny fohy feno fitiavana no mamarana ny taratasy (13.11-13).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Aoka ny mpamaky tsy ho diso fandray raha toa i Paoly ka miteny momba ny tenany sady indraindray mirehidrehitra tokoa ato amin’ity taratasy ity: tsy hoe ny tenany na lafin-javatra anankiray tena mamin’ny fony no tiany harovana. Fa raha miady mafy tokoa izy hankatoavana ny fahefana maha apôstôly azy, dia ny mba handraisan’ny olona ny Vaovao Mahafaly tanteraka sy ny mba haneken’ny olona tokoa fa i Kristy no Tompo.'
