document_id: 2SA.24,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida mampanisa ny vahoakan’i Israely
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 21.1-6)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nirehi-pahatezerana tamin’ny Israelita indray ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fampahatsiahivana ny 21.1-14.
      marker-yv: yv-n
    - type: text
      text: ', ka nitaona an’i Davida hahatonga loza aminy sy nampanisa azy ny olona ao Israely sy ao Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahatsiaro ny tenany ho meloka i Davida taorian’ilay fanisam-bahoaka; ka hoy izy tamin’ny TOMPO:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fahotana lehibe no vitako tamin’izao nataoko izao. Koa ankehitriny mifona aminao aho, TOMPO ô, mba avelao ny heloko fa efa nanao fahadalana lehibe tokoa aho.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nifoha i Davida ny ampitso maraina, dia tonga tamin’i Gada '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' mpanolotsain’i Davida ny tenin’ny TOMPO nanao hoe:'
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ndeha ambarao amin’i Davida hoe: «Izao no lazain’ny TOMPO: Famaizana telo no ataoko eo anoloanao, koa fidio izay iray hampihariko aminao.»'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankany amin’i Davida i Gada ka nanambara taminy ny hafatr’Andriamanitra nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mosary fito taona hamelezana ny taninao ve no tianao, sa ny handosiranao telo volana eo anoloan’ny fahavalo izay manenjika anao, sa aretina pesta mandritra ny telo andro eto amin’ny taninao? Koa saino sy hevero tsara izay valin-teny hoentiko amin’Ilay naniraka ahy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Davida tamin’i Gada:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Sanganehana mafy aho; nefa aleoko ho azon’ny tanan’ny TOMPO, toy izay ho azon’ny tanan’olona, satria lehibe tokoa ny famindrampon’ny TOMPO.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia aretina pesta no nalefan’ny TOMPO hamelezana an’i Israely iny maraina iny ka mandra-pahatapitr’ilay fe-potoana, ary nahafatesana fito alina ny olona manomboka any Dana ka hatrany Bery-Seba. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha naninji-tanana hamely an’i Jerosalema ny anjelin’ny Tompo, dia nanenina ny amin’ny loza ny TOMPO, ka niteny tamin’Ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' mpandringana hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka izay! Aketraho ny tananao ankehitriny!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay ity anjelin’ny TOMPO dia teo amin’ny famoloan’i Araonà, ilay Jebosita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jebosita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: taranaky ny mponin’i Jebosa, izay anarana nentin’i Jerosalema talohan’ny nahazoan’i Davida azy.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nahita ilay anjely mpandringana ny vahoaka i Davida, dia nanao tamin’ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho no nanota, izaho no nanao ratsy! fa ireo ondry ireo moa no nanao inona? Koa mifona aminao re aho, aoka ny tananao hamely ahy sy ny fianakaviako.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida manao alitara ho an’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 21.18-26)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nankany amin’i Davida i Gada tamin’izay andro izay ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Miakara any am-pamoloan’i Araonà izay Jebôsita ianao, ka manangana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' ho an’ny TOMPO.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra tany araka ny tenin’i Gada i Davida, dia araka izay nandidian’ny TOMPO azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka tamin’i Jôaba filohan-tafika sady teo akaikiny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha tetezo avokoa ny fokon’i Israely manomboka ao Dana ka hatrany Bery-Seba, ary isao ny vahoaka mba hahafantarako ny tena isany.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nijery kosa i Araonà ka nahita ny mpanjaka sy ny mpanompony manatona azy. Ary nandroso i Araonà niankohoka teo anatrehan’ny mpanjaka '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa nahoana ianao, ry andriamanjaka, no mankatỳ amiko mpanomponao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navalin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hividy ity famoloana ity aminao hanorenako alitara ho an’ny TOMPO, mba hitsaharan’ny areti-mandringana tsy hamely intsony ny vahoaka.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Araonà tamin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Alao izay sitrakao, ry andriamanjaka, mba hanateranao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' ho an’Andriamanitra. Indreo ny omby ho sorona dorana manontolo, ary ny rambaramba sy ny zioga hatao kitay. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izany rehetra izany dia atolotro anao avokoa, ry mpanjaka. Ka hoy aho aminao: Ho sitraky ny TOMPO Andriamanitrao anie ianao.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’i Araonà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, tsy homenao ahy maimaim-poana ireo fa hovidiko araka izay tena vidiny. Tsy zavatra azoko maimaim-poana no hataoko sorona dorana manontolo amin’ny TOMPO Andriamanitro.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novidin’i Davida tamin’ny sekela volafotsy dimampolo ny famoloana sy ny omby. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanorina alitara tamin’io toerana io i Davida ka nanao sorona dorana manontolo sy sorom-pihavanana tamin’ny TOMPO. Dia niantran’ny TOMPO ilay tany; ka nitsahatra tsy namely an’i Israely intsony ny areti-mandringana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jôaba namaly ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hampitomboin’ny TOMPO Andriamanitrao ho injaton’izao anie ny vahoaka; ka ho hitan’ny masonao izany, ry andriamanjaka! Fa inona loatra ange no antony hanaovanao izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fanisam-bahoaka dia fomba iray ahazoana mamantatra ny herin’ny tafi-panjakana (jereo and.9). Saingy ny mpanjakan’ny vahoakan’Andriamanitra dia tsy tokony hiantehitra amin’ny hamaroan’ny miaramilany, fa amin’ny herin’ny Andriamaniny. Ny fanisam-bahoaka nampanaovin’i Davida dia noraisin’i Jôaba ho tsy fahatokiana an’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ', ry andriamanjaka?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saingy tsy azon’i Jôaba sy ireo filohan-tafika nolavina ny didin’ny mpanjaka. Nivoaka ny tranon’ny mpanjaka izy ireo ary lasa nanao ny fanisam-bahoaka teo amin’ny vahoaka israelita. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niampita an’i Jôrdàna izy ireo ka nitoby tao amin’ny tanànan’i Harôhera, eo an-kavanan’ilay tanàna afovoan’ny lohasan’i Gada
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Harôhera: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana ao atsinanan’ny ranomasina Maty, amin’ny sisin-tanin’i Môaba. –Araka ny fanoroan-dalana voalaza ao amin’ny and 7, ny iraka nalefan’i Davida dia nitety ny tany nanomboka tamin’ny faritra atsinanana nandalo tamin’ny avaratra sy ny andrefana ary nifarana tamin’ny atsimo.
      marker-yv: yv-n
    - type: text
      text: '. Avy eo dia nankany Jazera ireo, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka tonga tany Gilehada tao amin’ny tanin’i Tahitîma-Hôdsy, dia nipaka tany Dana-Jahàna sy ny manodidina hatrany Tsidôna. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tonga tao Tiro tanàna mimanda ireo sy tany amin’ny tanàna rehetra fonenan’ny Hivita sy Kanahanita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Hivita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kanahanita:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe AMÔRITA.
      marker-yv: yv-n
    - type: text
      text: ', ka tafapaka hatrany Bery-Seba, ao atsimon’ny faritanin’i Joda. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa avy nitety ny firenena manontolo izy ireo nandritra ny sivy volana sy roapolo andro, dia niverina indray tao Jerosalema. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary natolotr’i Jôaba ny mpanjaka ny tarehimarika vokatry ny fanisam-bahoaka: i Israely dia nisy 800 000 ny lehilahy matanjaka mahatam-piadiana, ary i Joda dia nisy 500 000.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voasazin’Andriamanitra ny fahadisoan’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 21.7-17)
    marker-yv: yv-h
