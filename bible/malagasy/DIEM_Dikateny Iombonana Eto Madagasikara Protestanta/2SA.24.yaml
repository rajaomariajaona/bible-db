document_id: 2SA.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida mampanisa ny vahoakan’i Israely
  - type: heading
    content: (Jereo 1 Tan 21.1-6)
  - type: text
    content: Nirehi-pahatezerana tamin’ny Israelita indray ny TOMPO
  - type: note
    content: Fampahatsiahivana ny 21.1-14.
  - type: text
    content: ', ka nitaona an’i Davida hahatonga loza aminy sy nampanisa azy ny olona ao Israely sy ao Joda. '
  '10':
  - type: text
    content: 'Nahatsiaro ny tenany ho meloka i Davida taorian’ilay fanisam-bahoaka; ka hoy izy tamin’ny TOMPO:'
  - type: text
    content: –Fahotana lehibe no vitako tamin’izao nataoko izao. Koa ankehitriny mifona aminao aho, TOMPO ô, mba avelao ny heloko fa efa nanao fahadalana lehibe tokoa aho.
  '11':
  - type: text
    content: 'Rehefa nifoha i Davida ny ampitso maraina, dia tonga tamin’i Gada '
  - type: text
    content: mpaminany
  - type: text
    content: ' mpanolotsain’i Davida ny tenin’ny TOMPO nanao hoe:'
  '12':
  - type: text
    content: '–Ndeha ambarao amin’i Davida hoe: «Izao no lazain’ny TOMPO: Famaizana telo no ataoko eo anoloanao, koa fidio izay iray hampihariko aminao.»'
  '13':
  - type: text
    content: 'Dia nankany amin’i Davida i Gada ka nanambara taminy ny hafatr’Andriamanitra nanao hoe:'
  - type: text
    content: –Mosary fito taona hamelezana ny taninao ve no tianao, sa ny handosiranao telo volana eo anoloan’ny fahavalo izay manenjika anao, sa aretina pesta mandritra ny telo andro eto amin’ny taninao? Koa saino sy hevero tsara izay valin-teny hoentiko amin’Ilay naniraka ahy.
  '14':
  - type: text
    content: 'Ary hoy i Davida tamin’i Gada:'
  - type: text
    content: –Sanganehana mafy aho; nefa aleoko ho azon’ny tanan’ny TOMPO, toy izay ho azon’ny tanan’olona, satria lehibe tokoa ny famindrampon’ny TOMPO.
  '15':
  - type: text
    content: 'Dia aretina pesta no nalefan’ny TOMPO hamelezana an’i Israely iny maraina iny ka mandra-pahatapitr’ilay fe-potoana, ary nahafatesana fito alina ny olona manomboka any Dana ka hatrany Bery-Seba. '
  '16':
  - type: text
    content: 'Fa raha naninji-tanana hamely an’i Jerosalema ny anjelin’ny Tompo, dia nanenina ny amin’ny loza ny TOMPO, ka niteny tamin’Ilay '
  - type: text
    content: anjely
  - type: text
    content: ' mpandringana hoe:'
  - type: text
    content: –Aoka izay! Aketraho ny tananao ankehitriny!
  - type: text
    content: Tamin’izay ity anjelin’ny TOMPO dia teo amin’ny famoloan’i Araonà, ilay Jebosita
  - type: note
    content: 'Jebosita: taranaky ny mponin’i Jebosa, izay anarana nentin’i Jerosalema talohan’ny nahazoan’i Davida azy.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Raha nahita ilay anjely mpandringana ny vahoaka i Davida, dia nanao tamin’ny TOMPO hoe:'
  - type: text
    content: –Izaho no nanota, izaho no nanao ratsy! fa ireo ondry ireo moa no nanao inona? Koa mifona aminao re aho, aoka ny tananao hamely ahy sy ny fianakaviako.
  - type: heading
    content: I Davida manao alitara ho an’ny Tompo
  - type: heading
    content: (Jereo 1 Tan 21.18-26)
  '18':
  - type: text
    content: 'Nankany amin’i Davida i Gada tamin’izay andro izay ka nanao taminy hoe:'
  - type: text
    content: '–Miakara any am-pamoloan’i Araonà izay Jebôsita ianao, ka manangana '
  - type: text
    content: alitara
  - type: text
    content: ' ho an’ny TOMPO.'
  '19':
  - type: text
    content: 'Ary niakatra tany araka ny tenin’i Gada i Davida, dia araka izay nandidian’ny TOMPO azy. '
  '2':
  - type: text
    content: 'Dia hoy ny mpanjaka tamin’i Jôaba filohan-tafika sady teo akaikiny:'
  - type: text
    content: –Ndeha tetezo avokoa ny fokon’i Israely manomboka ao Dana ka hatrany Bery-Seba, ary isao ny vahoaka mba hahafantarako ny tena isany.
  '20':
  - type: text
    content: 'Nijery kosa i Araonà ka nahita ny mpanjaka sy ny mpanompony manatona azy. Ary nandroso i Araonà niankohoka teo anatrehan’ny mpanjaka '
  '21':
  - type: text
    content: 'sady nanontany hoe:'
  - type: text
    content: –Fa nahoana ianao, ry andriamanjaka, no mankatỳ amiko mpanomponao?
  - type: text
    content: 'Dia hoy ny navalin’i Davida:'
  - type: text
    content: –Hividy ity famoloana ity aminao hanorenako alitara ho an’ny TOMPO, mba hitsaharan’ny areti-mandringana tsy hamely intsony ny vahoaka.
  '22':
  - type: text
    content: 'Hoy kosa i Araonà tamin’i Davida:'
  - type: text
    content: '–Alao izay sitrakao, ry andriamanjaka, mba hanateranao '
  - type: text
    content: sorona
  - type: text
    content: ' ho an’Andriamanitra. Indreo ny omby ho sorona dorana manontolo, ary ny rambaramba sy ny zioga hatao kitay. '
  '23':
  - type: text
    content: 'Izany rehetra izany dia atolotro anao avokoa, ry mpanjaka. Ka hoy aho aminao: Ho sitraky ny TOMPO Andriamanitrao anie ianao.'
  '24':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’i Araonà:'
  - type: text
    content: –Tsia, tsy homenao ahy maimaim-poana ireo fa hovidiko araka izay tena vidiny. Tsy zavatra azoko maimaim-poana no hataoko sorona dorana manontolo amin’ny TOMPO Andriamanitro.
  - type: text
    content: 'Dia novidin’i Davida tamin’ny sekela volafotsy dimampolo ny famoloana sy ny omby. '
  '25':
  - type: text
    content: Ary nanorina alitara tamin’io toerana io i Davida ka nanao sorona dorana manontolo sy sorom-pihavanana tamin’ny TOMPO. Dia niantran’ny TOMPO ilay tany; ka nitsahatra tsy namely an’i Israely intsony ny areti-mandringana.
  '3':
  - type: text
    content: 'Fa hoy i Jôaba namaly ny mpanjaka:'
  - type: text
    content: –Hampitomboin’ny TOMPO Andriamanitrao ho injaton’izao anie ny vahoaka; ka ho hitan’ny masonao izany, ry andriamanjaka! Fa inona loatra ange no antony hanaovanao izany
  - type: note
    content: Ny fanisam-bahoaka dia fomba iray ahazoana mamantatra ny herin’ny tafi-panjakana (jereo and.9). Saingy ny mpanjakan’ny vahoakan’Andriamanitra dia tsy tokony hiantehitra amin’ny hamaroan’ny miaramilany, fa amin’ny herin’ny Andriamaniny. Ny fanisam-bahoaka nampanaovin’i Davida dia noraisin’i Jôaba ho tsy fahatokiana an’Andriamanitra.
  - type: text
    content: ', ry andriamanjaka?'
  '4':
  - type: text
    content: 'Saingy tsy azon’i Jôaba sy ireo filohan-tafika nolavina ny didin’ny mpanjaka. Nivoaka ny tranon’ny mpanjaka izy ireo ary lasa nanao ny fanisam-bahoaka teo amin’ny vahoaka israelita. '
  '5':
  - type: text
    content: Niampita an’i Jôrdàna izy ireo ka nitoby tao amin’ny tanànan’i Harôhera, eo an-kavanan’ilay tanàna afovoan’ny lohasan’i Gada
  - type: note
    content: 'Harôhera: toerana ao atsinanan’ny ranomasina Maty, amin’ny sisin-tanin’i Môaba. –Araka ny fanoroan-dalana voalaza ao amin’ny and 7, ny iraka nalefan’i Davida dia nitety ny tany nanomboka tamin’ny faritra atsinanana nandalo tamin’ny avaratra sy ny andrefana ary nifarana tamin’ny atsimo.'
  - type: text
    content: '. Avy eo dia nankany Jazera ireo, '
  '6':
  - type: text
    content: 'ka tonga tany Gilehada tao amin’ny tanin’i Tahitîma-Hôdsy, dia nipaka tany Dana-Jahàna sy ny manodidina hatrany Tsidôna. '
  '7':
  - type: text
    content: Ary tonga tao Tiro tanàna mimanda ireo sy tany amin’ny tanàna rehetra fonenan’ny Hivita sy Kanahanita
  - type: note
    content: 'Hivita, Kanahanita: jereo ny FTS amin’ny voambolana hoe AMÔRITA.'
  - type: text
    content: ', ka tafapaka hatrany Bery-Seba, ao atsimon’ny faritanin’i Joda. '
  '8':
  - type: text
    content: 'Rehefa avy nitety ny firenena manontolo izy ireo nandritra ny sivy volana sy roapolo andro, dia niverina indray tao Jerosalema. '
  '9':
  - type: text
    content: 'Ary natolotr’i Jôaba ny mpanjaka ny tarehimarika vokatry ny fanisam-bahoaka: i Israely dia nisy 800 000 ny lehilahy matanjaka mahatam-piadiana, ary i Joda dia nisy 500 000.'
  - type: heading
    content: Voasazin’Andriamanitra ny fahadisoan’i Davida
  - type: heading
    content: (Jereo 1 Tan 21.7-17)
