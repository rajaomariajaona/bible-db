  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Rehefa nampiditra ny Zanany lahimatoa ho eto amin’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' Andriamanitra, dia niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aoka ny anjelin’Andriamanitra rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiankohoka eo anatrehany!»
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Sady izao no voalazan’Andriamanitra momba ny anjely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Andriamanitra dia nanao ny anjeliny ho rivotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanompony ho lelafo
    - type: usfm
      marker: f
      children:
      - type: usfm
