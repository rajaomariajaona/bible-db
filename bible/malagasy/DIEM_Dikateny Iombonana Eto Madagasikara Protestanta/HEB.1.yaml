          text: Deot 32.43 sy Sal 104.4 samy voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: .»
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ny amin’ilay Zanaka kosa dia hoy Izy hoe:'
  - type: usfm
