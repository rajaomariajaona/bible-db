document_id: HEB.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Niteny tamin’ny alalan’ny Zanany Andriamanitra
  - type: text
    content: 'Efa imbetsaka ary tamin’ny fomba samihafa no nitenenan’Andriamanitra fahiny tamin’ny razantsika tamin’ny alalan’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: '; '
  '10':
  - type: text
    content: 'Ary hoy koa Andriamanitra hoe:'
  - type: text
    content: «Ianao, Tompo ô, no nanorina ny tany tamin’ny voalohany;
  - type: text
    content: ary ny lanitra dia asan’ny tananao.
  '11':
  - type: text
    content: Ireo ho levona, fa Ianao kosa maharitra.
  - type: text
    content: Ny tany sy ny lanitra dia ho tonta toy ny fitafiana
  '12':
  - type: text
    content: sy havalonao toy ny lamba,
  - type: text
    content: ka hovana toy ny fitafiana.
  - type: text
    content: Ianao kosa dia mbola Ianao ihany,
  - type: text
    content: ary tsy manam-pahataperana
  - type: note
    content: 'And 10-12: Sal 102.25-27, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: ' ny fiainanao.»'
  '13':
  - type: text
    content: 'Tsy misy na oviana na oviana anjely nilazan’Andriamanitra hoe:'
  - type: text
    content: «Mipetraha amin’ny sezafiandrianana eto ankavanako;
  - type: text
    content: Izaho kosa hanao ny fahavalonao
  - type: text
    content: ho fitoeran-tongotrao
  - type: note
    content: Sal 110.1.
  - type: text
    content: '!»'
  '14':
  - type: text
    content: Fa inona moa ny anjely? Fanahy manompo an’Andriamanitra izy rehetra, ka irahiny mba hanasoa ireo olona natao handray famonjena.
  '2':
  - type: text
    content: 'fa amin’izao andro farany izao kosa dia tamin’ny alalan’ny '
  - type: text
    content: Zanany
  - type: text
    content: ' no nitenenany tamintsika. Io Zanany io no naharian’Andriamanitra '
  - type: text
    content: izao tontolo izao
  - type: note
    content: Ampit Jôh 1.3.
  - type: text
    content: ', ary notendreny koa ho mpandova ny zavatra rehetra. '
  '3':
  - type: text
    content: Taratra mamirapiratry ny voninahitr’Andriamanitra sady famantarana velona izay tena toetra amam-pomban’Andriamanitra Izy; ary ny teniny manan-kery no ihazonany ny zavatra rehetra. Nony avy nanadio ny olona ho afaka amin’ny fahotany Izy, dia nipetraka any amin’ny avo indrindra eo ankavanan’ilay Andriamanitra lehibe
  - type: note
    content: Jereo Sal 110.1. –Ny eo ankavanana no lafy fanomezam-boninahitra.
  - type: text
    content: .
  - type: heading
    content: Ny Zanaka dia ambony noho ny anjely
  '4':
  - type: text
    content: 'Tonga ambony lavitra noho ny anjely ny '
  - type: text
    content: Zanaka
  - type: text
    content: ', satria nandova anarana tsara noho ny an’ireo. '
  '5':
  - type: text
    content: 'Fa tsy nisy na oviana na oviana anjely nilazan’Andriamanitra hoe:'
  - type: text
    content: «Zanako Ianao,
  - type: text
    content: Ray niteraka Anao Aho manomboka anio!»
  - type: text
    content: 'Ary koa hoe:'
  - type: text
    content: «Izaho ho Rainy,
  - type: text
    content: ary Izy ho Zanako
  - type: note
    content: Sal 2.7; 2 Sam 7.14.
  - type: text
    content: '!»'
  '6':
  - type: text
    content: Rehefa nampiditra ny Zanany lahimatoa ho eto amin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' Andriamanitra, dia niteny hoe:'
  - type: text
    content: «Aoka ny anjelin’Andriamanitra rehetra
  - type: text
    content: hiankohoka eo anatrehany!»
  '7':
  - type: text
    content: 'Sady izao no voalazan’Andriamanitra momba ny anjely:'
  - type: text
    content: «Andriamanitra dia nanao ny anjeliny ho rivotra
  - type: text
    content: ary ny mpanompony ho lelafo
  - type: note
    content: 'And 6-7: Deot 32.43 sy Sal 104.4 samy voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .»
  '8':
  - type: text
    content: 'Fa ny amin’ilay Zanaka kosa dia hoy Izy hoe:'
  - type: text
    content: «Ny sezafiandriananao, Andriamanitra ô,
  - type: text
    content: dia maharitra mandrakizay mandrakizay;
  - type: text
    content: 'araka ny hitsiny no itondranao ny '
  - type: text
    content: Fanjakànao
  - type: text
    content: .
  '9':
  - type: text
    content: Tia rariny Ianao fa hàlanao kosa ny ratsy;
  - type: text
    content: noho izany Andriamanitra, ilay Andriamanitrao, dia
  - type: text
    content: nifidy sy nanokana Anao fa tsy ireo namanao,
  - type: text
    content: ka nampidina diloilom-pifaliana teo an-dohanao
  - type: note
    content: 'And 8-9: Sal 45.7-8. –ny Fanjakànao: (and 8) misy stf sasany ahitana hoe ny Fanjakàny.'
  - type: text
    content: .»
