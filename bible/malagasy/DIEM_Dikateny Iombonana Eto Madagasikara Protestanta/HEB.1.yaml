    children:
    - type: text
      text: 'Niteny tamin’ny alalan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanany
    - type: text
      text: ' Andriamanitra'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa imbetsaka ary tamin’ny fomba samihafa no nitenenan’Andriamanitra fahiny tamin’ny razantsika tamin’ny alalan’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: '; '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary hoy koa Andriamanitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianao, Tompo ô, no nanorina ny tany tamin’ny voalohany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lanitra dia asan’ny tananao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo ho levona, fa Ianao kosa maharitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tany sy ny lanitra dia ho tonta toy ny fitafiana
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy havalonao toy ny lamba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hovana toy ny fitafiana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao kosa dia mbola Ianao ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy manam-pahataperana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 10-12:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 102.25-27, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: ' ny fiainanao.»'
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsy misy na oviana na oviana anjely nilazan’Andriamanitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mipetraha amin’ny sezafiandrianana eto ankavanako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa hanao ny fahavalonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fitoeran-tongotrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 110.1.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa inona moa ny anjely? Fanahy manompo an’Andriamanitra izy rehetra, ka irahiny mba hanasoa ireo olona natao handray famonjena.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa amin’izao andro farany izao kosa dia tamin’ny alalan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanany
    - type: text
      text: ' no nitenenany tamintsika. Io Zanany io no naharian’Andriamanitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 1.3.
      marker-yv: yv-n
    - type: text
      text: ', ary notendreny koa ho mpandova ny zavatra rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taratra mamirapiratry ny voninahitr’Andriamanitra sady famantarana velona izay tena toetra amam-pomban’Andriamanitra Izy; ary ny teniny manan-kery no ihazonany ny zavatra rehetra. Nony avy nanadio ny olona ho afaka amin’ny fahotany Izy, dia nipetraka any amin’ny avo indrindra eo ankavanan’ilay Andriamanitra lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jereo Sal 110.1. –Ny '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: eo ankavanana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no lafy fanomezam-boninahitra.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny Zanaka dia ambony noho ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga ambony lavitra noho ny anjely ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanaka
    - type: text
      text: ', satria nandova anarana tsara noho ny an’ireo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy nisy na oviana na oviana anjely nilazan’Andriamanitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Zanako Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ray niteraka Anao Aho manomboka anio!»
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary koa hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izaho ho Rainy,
  - type: usfm
    marker: q1
    children:
