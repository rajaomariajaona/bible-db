document_id: 2CO.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hafatrafatra sy fanaovam-beloma
  - type: text
    content: 'Izao no fanintelony hankanesako atỳ aminareo. Hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Ny tenin’ny vavolombelona roa na telo no aoka hitombenan’ny raharaha rehetra'
  - type: note
    content: 'Jereo Fifan 19.5; Mt 18.16; 1Tim 5.19; Heb 10.28. –fanintelony: jereo 2 Kôr 12.14 sy nta.'
  - type: text
    content: '.» '
  '10':
  - type: text
    content: Izany no anoratako ireo zavatra ireo aminareo, dieny mbola lavitra anareo aho; fandrao, rehefa mby eo aminareo aho, dia voatery hanao mafy loatra, araka ny fahefana nomen’ny Tompo ahy, dia fahefana natao hampandrosoana ny Fiangonanareo fa tsy handravana azy.
  '11':
  - type: text
    content: Ary farany, ry havako, veloma finaritra ianareo! Miezaha ho tonga lafatra, mifampahereza, miraisa saina, mihavàna, dia homba anareo ilay Andriamanitra loharanon’ny fitiavana sy ny fiadanana.
  '12':
  - type: text
    content: Mifanaova veloma amin’ny fanoroham-pihavanana.
  '13':
  - type: text
    content: 'Manao veloma anareo avokoa ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: .
  '14':
  - type: text
    content: Homba anareo rehetra anie ny fahasoavan’i Jesoa Kristy Tompo sy ny fitiavan’Andriamanitra ary ny firaisana avy amin’ny Fanahy Masina
  - type: note
    content: 'Jesoa Kristy...Andriamanitra...Fanahy Masina: ampit Mt 28.19; Ef 2.18; 1Pt 1.2.'
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'Amin’izao hahatongavako izao àry, dia tsy hananako antra intsony ireo nanota teo aloha sy ny hafa rehetra: efa voalazako izany fony aho tany aminareo fanindroany, nefa dia antitranteriko ankehitriny amin’izao aho tsy atỳ aminareo izao. '
  '3':
  - type: text
    content: 'Tadiavinareo ny hahitana porofo fa i '
  - type: text
    content: Kristy
  - type: text
    content: ' no miteny ato anatiko; ka tsy fahalemena no ampiharin’i Kristy aminareo, fa hery no asehony eo anivonareo. '
  '4':
  - type: text
    content: Voahombo tamin’ny hazofijaliana i Kristy noho ny fahalemeny, kanefa dia velona kosa izao noho ny herin’Andriamanitra. Miombona amin’ny fahalemen’i Kristy izahay ankehitriny; kanefa hiseho fa velona miaraka amin’i Kristy izahay, ka ny herin’Andriamanitra no hampiharinay aminareo.
  '5':
  - type: text
    content: 'Diniho ny tenanareo, ka izahao toetra raha velona amin’ny finoana tokoa ianareo na tsia. Fantatrareo tsara fa ao anatinareo i Jesoa Kristy, afa-tsy raha olona tsy voazaha toetra ianareo! '
  '6':
  - type: text
    content: 'Manantena kosa aho fa raha izahay, dia ho fantatrareo fa tsy mba olona tsy voazaha toetra. '
  '7':
  - type: text
    content: 'Mangataka am-bavaka amin’Andriamanitra izahay mba tsy hahavita ratsy mihitsy ianareo, tsy hoe mba hisehoanay ho olona voazaha toetra, fa mba hanaovanareo izay tsara, na dia hoheverina ho olona tsy voazaha toetra aza izahay. '
  '8':
  - type: text
    content: 'Fa tsy mba mahatohitra ny marina izahay fa ny mampandroso ny marina ihany. '
  '9':
  - type: text
    content: 'Eny, mahafaly anay raha malemy izahay fa ianareo kosa mahery; ka ny angatahinay am-bavaka, dia ny hahatanteraka anareo. '
