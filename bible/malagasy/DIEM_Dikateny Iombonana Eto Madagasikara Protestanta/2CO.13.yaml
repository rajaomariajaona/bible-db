  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no fanintelony hankanesako atỳ aminareo. Hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «Ny tenin’ny vavolombelona roa na telo no aoka hitombenan’ny raharaha rehetra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Fifan 19.5; Mt 18.16; 1Tim 5.19; Heb 10.28. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fanintelony:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 2 Kôr 12.14 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amin’izao hahatongavako izao àry, dia tsy hananako antra intsony ireo nanota teo aloha sy ny hafa rehetra: efa voalazako izany fony aho tany aminareo fanindroany, nefa dia antitranteriko ankehitriny amin’izao aho tsy atỳ aminareo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tadiavinareo ny hahitana porofo fa i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no miteny ato anatiko; ka tsy fahalemena no ampiharin’i Kristy aminareo, fa hery no asehony eo anivonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voahombo tamin’ny hazofijaliana i Kristy noho ny fahalemeny, kanefa dia velona kosa izao noho ny herin’Andriamanitra. Miombona amin’ny fahalemen’i Kristy izahay ankehitriny; kanefa hiseho fa velona miaraka amin’i Kristy izahay, ka ny herin’Andriamanitra no hampiharinay aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Diniho ny tenanareo, ka izahao toetra raha velona amin’ny finoana tokoa ianareo na tsia. Fantatrareo tsara fa ao anatinareo i Jesoa Kristy, afa-tsy raha olona tsy voazaha toetra ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Manantena kosa aho fa raha izahay, dia ho fantatrareo fa tsy mba olona tsy voazaha toetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mangataka am-bavaka amin’Andriamanitra izahay mba tsy hahavita ratsy mihitsy ianareo, tsy hoe mba hisehoanay ho olona voazaha toetra, fa mba hanaovanareo izay tsara, na dia hoheverina ho olona tsy voazaha toetra aza izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa tsy mba mahatohitra ny marina izahay fa ny mampandroso ny marina ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eny, mahafaly anay raha malemy izahay fa ianareo kosa mahery; ka ny angatahinay am-bavaka, dia ny hahatanteraka anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izany no anoratako ireo zavatra ireo aminareo, dieny mbola lavitra anareo aho; fandrao, rehefa mby eo aminareo aho, dia voatery hanao mafy loatra, araka ny fahefana nomen’ny Tompo ahy, dia fahefana natao hampandrosoana ny Fiangonanareo fa tsy handravana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary farany, ry havako, veloma finaritra ianareo! Miezaha ho tonga lafatra, mifampahereza, miraisa saina, mihavàna, dia homba anareo ilay Andriamanitra loharanon’ny fitiavana sy ny fiadanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mifanaova veloma amin’ny fanoroham-pihavanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Manao veloma anareo avokoa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Homba anareo rehetra anie ny fahasoavan’i Jesoa Kristy Tompo sy ny fitiavan’Andriamanitra ary ny firaisana avy amin’ny Fanahy Masina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jesoa Kristy...Andriamanitra...Fanahy Masina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Mt 28.19; Ef 2.18; 1Pt 1.2.
    marker-yv: yv-n
  - type: text
    text: '!'
