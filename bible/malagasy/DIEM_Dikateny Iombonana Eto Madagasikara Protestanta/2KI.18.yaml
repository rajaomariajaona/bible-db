document_id: 2KI.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Hezekià mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 29.1-2; 31.1)
  - type: text
    content: 'Tamin’ny taona fahatelo nanjakan’i Hôsea zanakalahin’i Elà tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' no tonga mpanjakan’i Joda i Hezekià zanakalahin’i Ahaza. '
  '10':
  - type: text
    content: 'Azon’ny Asirianina ny tanàna nony afaka telo taona, izany hoe tamin’ny taona fahenina nanjakan’i Hezekià na tamin’ny taona fahasivy nanjakan’i Hôsea. '
  '11':
  - type: text
    content: Ary nentin’ny mpanjakan’i Asiria ho babo tany Asiria ny Israelita ka napetrany tao amin’i faritr’i Halà sy tao Gôzàna teo amoron’ny ony Habôra ary tao amin’ireo tanànan’i Media
  - type: note
    content: 'And 9-11: jereo 17.5-6 sy nta.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Tonga izany rehetra izany noho ny tsy nihainoan’ny Israelita ny feon’ny TOMPO Andriamaniny ary noho ny nivadihany tamin’ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ; tsy nohenoiny sady tsy nampihariny manko ny didy rehetra izay nampitain’i Mosesy mpanompon’ny TOMPO.
  - type: heading
    content: Ny nanafihan’i Saneherîba ny fanjakan’i Joda
  - type: heading
    content: (Jereo Is 36.1; 2 Tan 32.1)
  '13':
  - type: text
    content: Tamin’ny taona
  - type: note
    content: Ny toko 36–39 amin’ny bokin’i Isaià dia mampiseho tantara mirazotra amin’ny 2 Mp 18.13–20.19.
  - type: text
    content: ' faha-14 nanjakan’i Hezekià no nahatongavan’i Saneherîba mpanjakan’i Asiria hanafika ny tanànamimanda rehetra tao amin’ny fanjakan’i Joda ka nahazoany ireny.'
  '14':
  - type: text
    content: 'Ary naniraka olona nankany amin’ny mpanjakan’i Asiria tany Lakisy i Hezekià mpanjakan’i Joda nanao hoe:'
  - type: text
    content: –Efa diso aho
  - type: note
    content: 'Lakisy: jereo 14.19 sy nta. –Efa diso aho: angamba mety ho tamin’ilay fikomiana voalaza ao amin’ny and 7.'
  - type: text
    content: ', mialà amin’ny taniko, fa hozakaiko izay hampandoavinao ahy.'
  - type: text
    content: 'Koa nampandoa volafotsy sivy taonina sy volamena sivinjato kilao an’i Hezekià ny mpanjakan’i Asiria. '
  '15':
  - type: text
    content: Dia nomen’i Hezekià azy ny volafotsy rehetra tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' sy tao amin’ny rakitry ny lapan’ny mpanjaka. '
  '16':
  - type: text
    content: Tamin’izany fotoana izany no nanendahan’i Hezekià ny takela-bolamena napetany tamin’ireo varavaran’ny tempolin’ny TOMPO sy tamin’ireo tolana; ary dia nomeny ny mpanjakan’i Asiria izany.
  - type: heading
    content: Lahatenin’ny dekàn’i Saneherîba
  - type: heading
    content: (Jereo Is 36.2-22; 2 Tan 32.9-16)
  '17':
  - type: text
    content: Ary ny mpanjakan’i Asiria izay tany Lakisy dia naniraka ny filohan-tafika sy ny lehiben’ireo manamboninahitra ary ny dekàny notronin’ny miaramila marobe hankany amin’i Hezekià mpanjaka, any Jerosalema. Raha vao tonga tany Jerosalema ireto iraka, dia nijanona takaikin’ny lakan-drano mankany amin’ny dobo ambony, teo amin’ny lalana mankamin’ny sahan’ny Mpanasa lamba
  - type: note
    content: Ny dobo ambony, tsy fantatra marina, fa mety manondro ny dobon’i Silôà (jereo Jôh 9.7) izay eo an-joro atsimo-atsinanan’ny tanàna. Lakan-drano iray no mitondra ny rano mankao avy any amin’ny loharanon’i Gihôna (jereo 1 Mp 1.33 sy nta). Ny sahan’ny Mpanasa lamba dia tsy fantatra mazava koa, fa mety ho ao amin’ny lohasahan’i Kidrôna, akaikin’ny Loharanon’ny mpanasa lamba (jereo 1 Mp 1.9 sy nta).
  - type: text
    content: ', '
  '18':
  - type: text
    content: 'ka nangataka hiresaka amin’ny mpanjaka. Kanjo dia i Eliakima zanakalahin’i Hilkià sady mpiandraikitra ny lapa no niainga hitsena azy niaraka tamin’i Sebnà mpitantsoratra sy i Jôà zanakalahin’i Asafa sady mpitondratenin’ny mpanjaka. '
  '19':
  - type: text
    content: 'Dia hoy ilay dekà tamin’izy telo lahy:'
  - type: text
    content: '–Ndeha lazaonareo amin’i Hezekià ny hafatry ny mpanjaka lehibe, dia ny mpanjakan’i Asiria, manao hoe: «Mba inona izao itokianao izao? '
  '2':
  - type: text
    content: 'Feno 25 taona izy fony vao nanjaka; ary naharitra 29 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Abỳ zanakavavin’i Zakarià. '
  '20':
  - type: text
    content: 'Heverinao fa ho vitan’ny kobaka am-bava ny tetika sy herimpo hoenti-miady! Koa iza no itokianao no mba sahy mikomy amiko izato ianao? '
  '21':
  - type: text
    content: 'I Ejipta ve? Io volotara vaky manindrona sy mandrobaka ny tanan’izay mitehina aminy io ve? Fa toy izany ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta amin’izay rehetra matoky azy!'
  '22':
  - type: text
    content: '«Angamba ianareo hamaly ahy fa ny TOMPO Andriamanitrareo no itokianareo. Kanefa dia ianao indrindra, ry Hezekià, no nanafoana ireo '
  - type: text
    content: toeram-pisoronana
  - type: text
    content: ' aman’'
  - type: text
    content: alitarany
  - type: text
    content: ', ka nandidy ny mponin’i Joda sy i Jerosalema mba tsy hanao fanompoam-pivavahana afa-tsy eo anoloan’ny alitaran’i Jerosalema ihany.»'
  '23':
  - type: text
    content: '«Koa aoka hifanamby amin’ny andriamanjakan’i Asiria izay tompoiko ianao, fa homeko soavaly roa arivo raha manana olona afaka hitaingina ireo. '
  '24':
  - type: text
    content: 'Fa hataonao ahoana no hampandositra ny komandy iray amin’ireo manamboninahitry ny tompoko ireo, na dia izay bitika indrindra aza, raha tàhiny ka i Ejipta no itokianao hahazoana kalesy sy mpitaingin-tsoavaly? '
  '25':
  - type: text
    content: Ary ankehitriny, moa hamely sy handrava ity tany ity ve ilay mpanjaka tompoiko, raha tsy sitraky ny TOMPO izany? Tsia, fa ny TOMPO mihitsy no nanome baiko azy hamely sy handrava ity tany ity
  - type: note
    content: 'Ny Tompo mihitsy no...: jereo Is 7.17-25; 10.5-6.'
  - type: text
    content: .
  '26':
  - type: text
    content: 'Dia hoy i Eliakima sy i Sebnà ary Jôà tamin’ilay dekà asirianina:'
  - type: text
    content: –Mba teny aramianina
  - type: note
    content: Ny teny aramianina no tenim-pifandraisan’ny diplômasia iraisam-pirenena tamin’izany.
  - type: text
    content: ' re atao aminay, satria azonay ihany izany; fa aza itenenana hebreo izahay noho ny amin’ireo olona eny ambony manda mihaino antsika.'
  '27':
  - type: text
    content: 'Fa hoy ny navalin’ilay dekà hoe:'
  - type: text
    content: –Moa ho an’ny tomponareo sy ho anareo ihany va no nanirahan’ny tompoko ahy hilaza izany teny izany, fa tsy ho an’ny olona mipetraka eny ambony manda koa? Fa ho voatery tahaka anareo izy atsy ho atsy hihinana ny dikiny sy hisotro ny fivalanan-dranony
  - type: note
    content: Rehefa ho voafahirano ny tanàna ka hanjaka amin’izay ny mosary.
  - type: text
    content: '!'
  '28':
  - type: text
    content: 'Dia nijaridina ilay dekà ka nihiaka mafy tamin’ny teny hebreo hoe:'
  - type: text
    content: '–Henoy ny tenin’ny mpanjaka lehibe, dia ny mpanjakan’i Asiria, '
  '29':
  - type: text
    content: 'fa izao no lazainy: «Aza mety hofitahin’i Hezekià ianareo, satria tsy afaka hamonjy anareo izy tsy akory. '
  '3':
  - type: text
    content: 'Ary nanao izay mahitsy eo imason’ny TOMPO i Hezekià tahaka izay rehetra nataon’i Davida razambeny. '
  '30':
  - type: text
    content: 'Ary aza mety hotarihiny hitoky amin’ny TOMPO koa ianareo raha ilazany fa ny TOMPO no hamonjy anareo ka hisakana ahy tsy haka ity tanàna ity. '
  '31':
  - type: text
    content: 'Aza mihaino an’i Hezekià ianareo, fa izaho mpanjakan’i Asiria kosa miteny aminareo hoe: Manaova fanekempihavanana amiko ianareo ary samia mibaboka atỳ amiko; dia samy hihinana ny voalobony sy ny aviaviny, ary samy hisotro ny rano avy ao amin’ny lava-pantsakany avy. '
  '32':
  - type: text
    content: 'Ho avy aho atsy ho atsy hitondra anareo ho any amin’ny tany tahaka ny anareo, dia tany be varimbazaha hanaova-mofo sy tany be voaloboka hanaovan-divay ary tanin’ôliva tsara diloilo sy tantely. Dia ho velona ianareo amin’izany fa tsy ho faty. Koa aza mihaino an’i Hezekià fa atorony voho ianareo raha ilazany fa hamonjy anareo ny TOMPO! '
  '33':
  - type: text
    content: 'Moa nisy nahavonjy ny taniny tsy hiharan’ny fahefàko ve ireo andriamanitry ny firenen-kafa? '
  '34':
  - type: text
    content: Aiza ny andriamanitr’i Hamata sy i Arpada? Ary aiza koa ny andriamanitr’i Sefarvaîma sy i Henà ary i Hivà? Moa nahavonjy an’i Samaria tsy ho azoko ve ireo andriamaniny
  - type: note
    content: 'Hamata...: jereo ao amin’ny 17.24 ny lisitra anankiray somary samy hafa kely momba ireo tanàna izay nalain’ny Asirianina.'
  - type: text
    content: '? '
  '35':
  - type: text
    content: Tsy nisy tamin’ireny andriamanitra rehetra ireny, na dia iray aza, nahavonjy ny taniny tsy hiharan’ny fahefàko; koa ahoana ny TOMPO koa tsy hahavonjy an’i Jerosalema tsy hiharan’ny fahefàko»
  '36':
  - type: text
    content: 'Nangina ny vahoaka ary tsy nisy namaly na dia indraim-bava aza, satria efa nanome baiko ny mpanjaka hoe: «Aza misy mamaly azy ianareo!» '
  '37':
  - type: text
    content: 'Ary rehefa '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' i Eliakima mpiandraikitra ny lapa sy i Sebnà mpitantsoratra ary i Jôà zanakalahin’i Asafa sady mpitondratenin’ny mpanjaka, dia nankao amin’i Hezekià ka nitatitra taminy ny tenin’ilay dekà asirianina.'
  '4':
  - type: text
    content: Izy no nanafoana ny toeram-panasinana sy nanamontsana tsangambaton-tsampy sy nikapa ny tsatokazo fanajana an’i Aserà ary nanorotoro ny bibilava halimo izay nataon’i Mosesy
  - type: note
    content: Jereo Nom 21.8-9.
  - type: text
    content: '; satria hatramin’io fotoana io no efa nandoroan’ny Israelita ditin-kazo manitra ho an’ilay bibilava nantsoina hoe Nehostana. '
  '5':
  - type: text
    content: 'Fa ny TOMPO Andriamanitr’i Israely no nitokian’i Hezekià, ka dia tsy nisy tahaka azy tamin’ny mpanjakan’i Joda rehetra izay talohany sy izay nandimby azy. '
  '6':
  - type: text
    content: 'Nifikitra tamin’ny TOMPO izy ka tsy mba niala taminy, fa nitandrina ny didy izay nomen’ny TOMPO an’i Mosesy. '
  '7':
  - type: text
    content: 'Dia niaraka tamin’i Hezekià ny TOMPO, ka nampahomby izay rehetra nataony. Nikomy tamin’ny mpanjakan’i Asiria izy ka tsy nety hofeheziny intsony. '
  '8':
  - type: text
    content: Nandresy ny Filistinina izy ka nanenjika azy hatrany amin’ny faritr’i Gazà
  - type: note
    content: Tanànan’ny Filistinina teo amorontsiraky ny Ranomasina Mediteranea.
  - type: text
    content: ; ary azony avokoa na ireo tilikambom-pitiliana na ireo tanànamimanda.
  - type: heading
    content: Azon’i Salmanesera i Samaria
  '9':
  - type: text
    content: 'Tamin’ny taona fahefatra nanjakan’i Hezekià, izany hoe tamin’ny taona fahafito nanjakan’i Hôsea zanakalahin’i Elà tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ', no nahatongavan’i Salmanesera mpanjakan’i Asiria hanao fahirano an’i Samaria. '
