document_id: 2KI.18,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Hezekià mpanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 29.1-2; 31.1)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny taona fahatelo nanjakan’i Hôsea zanakalahin’i Elà tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' no tonga mpanjakan’i Joda i Hezekià zanakalahin’i Ahaza. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Azon’ny Asirianina ny tanàna nony afaka telo taona, izany hoe tamin’ny taona fahenina nanjakan’i Hezekià na tamin’ny taona fahasivy nanjakan’i Hôsea. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary nentin’ny mpanjakan’i Asiria ho babo tany Asiria ny Israelita ka napetrany tao amin’i faritr’i Halà sy tao Gôzàna teo amoron’ny ony Habôra ary tao amin’ireo tanànan’i Media
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 9-11:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 17.5-6 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tonga izany rehetra izany noho ny tsy nihainoan’ny Israelita ny feon’ny TOMPO Andriamaniny ary noho ny nivadihany tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ; tsy nohenoiny sady tsy nampihariny manko ny didy rehetra izay nampitain’i Mosesy mpanompon’ny TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanafihan’i Saneherîba ny fanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Is 36.1; 2 Tan 32.1)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tamin’ny taona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny toko 36–39 amin’ny bokin’i Isaià dia mampiseho tantara mirazotra amin’ny 2 Mp 18.13–20.19.
      marker-yv: yv-n
    - type: text
      text: ' faha-14 nanjakan’i Hezekià no nahatongavan’i Saneherîba mpanjakan’i Asiria hanafika ny tanànamimanda rehetra tao amin’ny fanjakan’i Joda ka nahazoany ireny.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary naniraka olona nankany amin’ny mpanjakan’i Asiria tany Lakisy i Hezekià mpanjakan’i Joda nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa diso aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Lakisy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 14.19 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Efa diso aho
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': angamba mety ho tamin’ilay fikomiana voalaza ao amin’ny and 7.'
      marker-yv: yv-n
    - type: text
      text: ', mialà amin’ny taniko, fa hozakaiko izay hampandoavinao ahy.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nampandoa volafotsy sivy taonina sy volamena sivinjato kilao an’i Hezekià ny mpanjakan’i Asiria. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia nomen’i Hezekià azy ny volafotsy rehetra tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' sy tao amin’ny rakitry ny lapan’ny mpanjaka. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tamin’izany fotoana izany no nanendahan’i Hezekià ny takela-bolamena napetany tamin’ireo varavaran’ny tempolin’ny TOMPO sy tamin’ireo tolana; ary dia nomeny ny mpanjakan’i Asiria izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lahatenin’ny dekàn’i Saneherîba
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Is 36.2-22; 2 Tan 32.9-16)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary ny mpanjakan’i Asiria izay tany Lakisy dia naniraka ny filohan-tafika sy ny lehiben’ireo manamboninahitra ary ny dekàny notronin’ny miaramila marobe hankany amin’i Hezekià mpanjaka, any Jerosalema. Raha vao tonga tany Jerosalema ireto iraka, dia nijanona takaikin’ny lakan-drano mankany amin’ny dobo ambony, teo amin’ny lalana mankamin’ny sahan’ny Mpanasa lamba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dobo ambony
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', tsy fantatra marina, fa mety manondro ny dobon’i Silôà (jereo Jôh 9.7) izay eo an-joro atsimo-atsinanan’ny tanàna. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Lakan-drano
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' iray no mitondra ny rano mankao avy any amin’ny loharanon’i Gihôna (jereo 1 Mp 1.33 sy nta). Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sahan’ny Mpanasa lamba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tsy fantatra mazava koa, fa mety ho ao amin’ny lohasahan’i Kidrôna, akaikin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Loharanon’ny mpanasa lamba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo 1 Mp 1.9 sy nta).'
      marker-yv: yv-n
    - type: text
      text: ', '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ka nangataka hiresaka amin’ny mpanjaka. Kanjo dia i Eliakima zanakalahin’i Hilkià sady mpiandraikitra ny lapa no niainga hitsena azy niaraka tamin’i Sebnà mpitantsoratra sy i Jôà zanakalahin’i Asafa sady mpitondratenin’ny mpanjaka. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy ilay dekà tamin’izy telo lahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ndeha lazaonareo amin’i Hezekià ny hafatry ny mpanjaka lehibe, dia ny mpanjakan’i Asiria, manao hoe: «Mba inona izao itokianao izao? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Feno 25 taona izy fony vao nanjaka; ary naharitra 29 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Abỳ zanakavavin’i Zakarià. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Heverinao fa ho vitan’ny kobaka am-bava ny tetika sy herimpo hoenti-miady! Koa iza no itokianao no mba sahy mikomy amiko izato ianao? '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I Ejipta ve? Io volotara vaky manindrona sy mandrobaka ny tanan’izay mitehina aminy io ve? Fa toy izany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' mpanjakan’i Ejipta amin’izay rehetra matoky azy!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '«Angamba ianareo hamaly ahy fa ny TOMPO Andriamanitrareo no itokianareo. Kanefa dia ianao indrindra, ry Hezekià, no nanafoana ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: toeram-pisoronana
    - type: text
      text: ' aman’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitarany
    - type: text
      text: ', ka nandidy ny mponin’i Joda sy i Jerosalema mba tsy hanao fanompoam-pivavahana afa-tsy eo anoloan’ny alitaran’i Jerosalema ihany.»'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '«Koa aoka hifanamby amin’ny andriamanjakan’i Asiria izay tompoiko ianao, fa homeko soavaly roa arivo raha manana olona afaka hitaingina ireo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa hataonao ahoana no hampandositra ny komandy iray amin’ireo manamboninahitry ny tompoko ireo, na dia izay bitika indrindra aza, raha tàhiny ka i Ejipta no itokianao hahazoana kalesy sy mpitaingin-tsoavaly? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary ankehitriny, moa hamely sy handrava ity tany ity ve ilay mpanjaka tompoiko, raha tsy sitraky ny TOMPO izany? Tsia, fa ny TOMPO mihitsy no nanome baiko azy hamely sy handrava ity tany ity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny Tompo mihitsy no...: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Is 7.17-25; 10.5-6.
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia hoy i Eliakima sy i Sebnà ary Jôà tamin’ilay dekà asirianina:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba teny aramianina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny teny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: aramianina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no tenim-pifandraisan’ny diplômasia iraisam-pirenena tamin’izany.'
      marker-yv: yv-n
    - type: text
      text: ' re atao aminay, satria azonay ihany izany; fa aza itenenana hebreo izahay noho ny amin’ireo olona eny ambony manda mihaino antsika.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa hoy ny navalin’ilay dekà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa ho an’ny tomponareo sy ho anareo ihany va no nanirahan’ny tompoko ahy hilaza izany teny izany, fa tsy ho an’ny olona mipetraka eny ambony manda koa? Fa ho voatery tahaka anareo izy atsy ho atsy hihinana ny dikiny sy hisotro ny fivalanan-dranony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rehefa ho voafahirano ny tanàna ka hanjaka amin’izay ny mosary.
      marker-yv: yv-n
    - type: text
      text: '!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nijaridina ilay dekà ka nihiaka mafy tamin’ny teny hebreo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Henoy ny tenin’ny mpanjaka lehibe, dia ny mpanjakan’i Asiria, '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'fa izao no lazainy: «Aza mety hofitahin’i Hezekià ianareo, satria tsy afaka hamonjy anareo izy tsy akory. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nanao izay mahitsy eo imason’ny TOMPO i Hezekià tahaka izay rehetra nataon’i Davida razambeny. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary aza mety hotarihiny hitoky amin’ny TOMPO koa ianareo raha ilazany fa ny TOMPO no hamonjy anareo ka hisakana ahy tsy haka ity tanàna ity. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Aza mihaino an’i Hezekià ianareo, fa izaho mpanjakan’i Asiria kosa miteny aminareo hoe: Manaova fanekempihavanana amiko ianareo ary samia mibaboka atỳ amiko; dia samy hihinana ny voalobony sy ny aviaviny, ary samy hisotro ny rano avy ao amin’ny lava-pantsakany avy. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ho avy aho atsy ho atsy hitondra anareo ho any amin’ny tany tahaka ny anareo, dia tany be varimbazaha hanaova-mofo sy tany be voaloboka hanaovan-divay ary tanin’ôliva tsara diloilo sy tantely. Dia ho velona ianareo amin’izany fa tsy ho faty. Koa aza mihaino an’i Hezekià fa atorony voho ianareo raha ilazany fa hamonjy anareo ny TOMPO! '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Moa nisy nahavonjy ny taniny tsy hiharan’ny fahefàko ve ireo andriamanitry ny firenen-kafa? '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Aiza ny andriamanitr’i Hamata sy i Arpada? Ary aiza koa ny andriamanitr’i Sefarvaîma sy i Henà ary i Hivà? Moa nahavonjy an’i Samaria tsy ho azoko ve ireo andriamaniny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hamata...: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ao amin’ny 17.24 ny lisitra anankiray somary samy hafa kely momba ireo tanàna izay nalain’ny Asirianina.
      marker-yv: yv-n
    - type: text
      text: '? '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Tsy nisy tamin’ireny andriamanitra rehetra ireny, na dia iray aza, nahavonjy ny taniny tsy hiharan’ny fahefàko; koa ahoana ny TOMPO koa tsy hahavonjy an’i Jerosalema tsy hiharan’ny fahefàko»
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Nangina ny vahoaka ary tsy nisy namaly na dia indraim-bava aza, satria efa nanome baiko ny mpanjaka hoe: «Aza misy mamaly azy ianareo!» '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary rehefa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nandriatra ny fitafiany
    - type: text
      text: ' i Eliakima mpiandraikitra ny lapa sy i Sebnà mpitantsoratra ary i Jôà zanakalahin’i Asafa sady mpitondratenin’ny mpanjaka, dia nankao amin’i Hezekià ka nitatitra taminy ny tenin’ilay dekà asirianina.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izy no nanafoana ny toeram-panasinana sy nanamontsana tsangambaton-tsampy sy nikapa ny tsatokazo fanajana an’i Aserà ary nanorotoro ny bibilava halimo izay nataon’i Mosesy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 21.8-9.
      marker-yv: yv-n
    - type: text
      text: '; satria hatramin’io fotoana io no efa nandoroan’ny Israelita ditin-kazo manitra ho an’ilay bibilava nantsoina hoe Nehostana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa ny TOMPO Andriamanitr’i Israely no nitokian’i Hezekià, ka dia tsy nisy tahaka azy tamin’ny mpanjakan’i Joda rehetra izay talohany sy izay nandimby azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nifikitra tamin’ny TOMPO izy ka tsy mba niala taminy, fa nitandrina ny didy izay nomen’ny TOMPO an’i Mosesy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia niaraka tamin’i Hezekià ny TOMPO, ka nampahomby izay rehetra nataony. Nikomy tamin’ny mpanjakan’i Asiria izy ka tsy nety hofeheziny intsony. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nandresy ny Filistinina izy ka nanenjika azy hatrany amin’ny faritr’i Gazà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tanànan’ny Filistinina teo amorontsiraky ny Ranomasina Mediteranea.
      marker-yv: yv-n
    - type: text
      text: ; ary azony avokoa na ireo tilikambom-pitiliana na ireo tanànamimanda.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Azon’i Salmanesera i Samaria
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tamin’ny taona fahefatra nanjakan’i Hezekià, izany hoe tamin’ny taona fahafito nanjakan’i Hôsea zanakalahin’i Elà tamin’i '
    - type: usfm
      marker: w
