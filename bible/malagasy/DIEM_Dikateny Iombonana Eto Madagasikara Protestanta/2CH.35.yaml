document_id: 2CH.35,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanao fankalazana ny Paska i Jôsià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 23.21-23)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nanao fankalazana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' i Jôsià ho voninahitry ny TOMPO; ary tamin’ny volana voalohany, andro faha-14, no namonoan’ny olona ny biby ho an’ny sakafo Paska. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nizotra toy izao ny fanompoam-pivavahana. Samy teo amin’ny toerany avy ny mpisorona, ary samy teo amin’ny antokony avy ny levita, araka ny baikon’ny mpanjaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia novonoin’ny olona ny biby ho an’ny sakafo Paska; ny ran’ireo biby ireo dia noraisin’ny mpisorona ka nararany teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: '; ary ny levita kosa nanoditra ireo biby voavono. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Rehefa nomena ny olona ny anjarany araka ny tarika sy fianakaviana teo amin’ny teraky ny firenena, dia navahana kosa ny sorona dorana manontolo hatolotra ho an’ny TOMPO, araka izay voasoratra ao amin’ny bokin’i Mosesy. Ary toy izany koa tamin’ny omby. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny zanakondrin’ny Paska dia natsatsika tamin’ny afo araka ny fanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 12.8-9.
      marker-yv: yv-n
    - type: text
      text: '; fa ny fanatitra masina hafa kosa nandrahoina tao anaty vilany sy vilanibe ary kaseraola, dia nozaraina faingana tamin’izay rehetra teraky ny firenena israelita. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Taorian’izay ny levita vao nanamboatra ny sakafo Paska ho an’ny tenany sy ny mpisorona; ireo mpisorona taranak’i Aharôna manko nanolotra ny sorona dorana manontolo sy ny sabora mandra-pahalin’ny andro, ka dia izany no nahatonga ny levita hanamboatra ny sakafo Paska ho an’ny tenany sy ny mpisorona taranak’i Aharôna. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ireo mpihira, taranak’i Asafa, dia teo amin’ny toerany araka ny fepetra nataon’i Davida ary koa nataon’i Asafa sy i Hemàna mbamin’i Jedotòna izay samy mpanoro hevitra ny mpanjaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Tan 25.1.
      marker-yv: yv-n
    - type: text
      text: '; ary ny mpiandry varavarana dia teo amin’ny isam-bavahady. Noho ireo tsy afaka niala tamin’ny fanompoany, dia ny levita namany koa no nanamboatra ny sakafo Paska ho azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia nizotra toy izany tamin’io andro io ny fanompoana ny TOMPO mba hankalazana ny Paska sy hanolorana ny sorona dorana manontolo eo ambony alitaran’ny TOMPO, araka ny fepetra nataon’i Jôsià mpanjaka.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny Israelita izay vory teo dia nankalaza ny Paska tamin’izany vaninandro izany, ary koa ny fety fihinanana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mofo tsy misy leviora
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 12.1-20.
      marker-yv: yv-n
    - type: text
      text: ' nandritra ny fito andro. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa tsy nisy Paska nankalazaina toy izany teo amin’i Israely, na dia hatramin’ny andron’i Samoela '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' aza; ary ny mpanjaka rehetra tamin’i Israely dia tsy nisy nankalaza ny Paska tahaka izay nataon’i Jôsià sy ny mpisorona ary ny levita mbamin’ny mponin’i Jerosalema sy ny Jodeanina rehetra ary ny Israelita hafa izay vory teo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tamin’ny taona faha-18 nanjakàn’i Jôsià no nankalazana izany Paska izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 34.8.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiafaran’ny nanjakàn’i Jôsià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 23.28-30)
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nampirisihin’i Jôsià hijoro amin’ny anjara raharahany avy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' ary nampahereziny hanao ny fanompoam-pivavahana ao an-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ankoatra izany rehetra izany, nony efa voavoatran’i Jôsià ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ', dia niakatra i Nekao mpanjakan’i Ejipta mba hiady any Karkemisy eo amoron’i Eofrata; tamin’izay i Jôsià no niainga hifanehatra aminy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I Nekao kosa naniraka olona ho any aminy hanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy natao hifamely akory izaho sy ianao, ry mpanjakan’i Joda! Tsy ady aminao izao ataoko anio izao, fa amin’ny fahavaloko; sady nasain’Andriamanitra handeha faingana aho. Koa aza toherinao Andriamanitra Izay momba ahy, fandrao matiny ianao.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Kanefa i Jôsià tsy niova hevitra fa nitady izay hiadiana tamin’i Nekao; tsy nety nihaino ny teny izay nampilazain’Andriamanitra an’i Nekao izy, fa nody olon-kafa mba tsy ho fantatra ka nandeha niady taminy ihany tao amin’ny lemak’i Megidao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 9.27 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nahavoa an’i Jôsià mpanjaka ny mpandefa tsipîka, ka hoy ity mpanjaka tamin’ny manamboninahiny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ento miala eto aho, fa voa mafy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dia nesorin’ny manamboninahiny tamin’ny kalesy nisy azy i Jôsià ka napetrany teo amin’ny kalesy hafa ary nentiny ho any Jerosalema. Dia maty izy, ka rehefa nalevina tao am-pasan-drazany, dia nisaonan’ny mponin’i Jerosalema sy ny Jodeanina hafa rehetra.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I Jeremià dia nanao hira fitomaniana an’i Jôsià; ny mpihira rehetra koa na lahy na vavy dia mahatsiahy an’i Jôsià mandraka androany, rehefa manao hira fitomaniana, satria nanjary fanao teo amin’i Israely izany; ary indreo efa voasoratra ho anisan’ny hira fitomaniana ireny hira ireny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mety ho nirakitra rijan-teny maro dia maro fahiny ny bokin’ny Fitomaniana. Ny rijan-teny eo am-pelatanantsika ankehitriny dia tsy perikôpa mitatitra ny nahafatesan’i Jôsia; ary Jer 22.10 dia filazana miserana izany.
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Jôsià ary koa ny asa soa nataony araka ny voasoratra ao amin’ny lalànan’ny TOMPO, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'eny, ny tantaran’i Jôsià, na tamboalohany na tafara, dia voasoratra ao amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bokin’ireo mpanjakan’i
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sy i Joda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' izay natao hampianatra ny Israelita rehetra sady efa voatokana ho an’ny TOMPO dia nitenenany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianareo natao hametraka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasin’ny Tompo
    - type: text
      text: ' ao amin’ny tempoly, izay nataon’i Salômôna zanakalahin’i Davida sady mpanjakan’i Israely, dia efa tsy milanja azy intsony izao; koa ankehitriny manompoa ny TOMPO Andriamanitrareo sy manompoa an’ilay Israely vahoakany; '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ary samia mitsinjara araka ny tarikareo sy ny antokonareo avy ianareo, fa izany no fepetra voasoratr’i Davida mpanjakan’i Israely ary koa i Salômôna zanakalahiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 8.14; 1 Tan 23–26.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary makà toerana ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ', araka ny fitsinjaran’ny tarik’ireo vahoaka mpiray firenena aminareo ary araka ny fitsinjaran’ny tarikareo samy levita. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Natao hamono ny biby ho an’ny sakafo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' ianareo ka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: midiova
    - type: text
      text: ' tena ary mivonòna hiasa ho an’ny mpiray firenena aminareo mba hanatontosana ny fankalazàna araka ny teny izay nampitain’ny TOMPO tamin’ny alalan’i Mosesy.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny vahoaka izay vory teo dia nomen’i Jôsià zanak’ondry sy zanak’osy hatao sakafo Paska: 30 000 no isan’ireo biby ireo, ary mbola niampy omby telo arivo, samy avy amin’ny fananan’ny mpanjaka. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ny mpandraharahan’i Jôsià koa dia nanome biby ho an’ny vahoaka sy ho an’ny mpisorona ary ho an’ny levita. I Hilkià sy i Zakarià ary i Jehiela izay samy mpiandraikitra ny tranon’Andriamanitra, dia nanome ondry aman’osy 2 600 ary omby roa arivo ho an’ny mpisorona mba hatao soron’ny Paska. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ireo filohan’ny levita, izany hoe ry i Kônanià sy i Semahià ary i Natanaela mirahalahy mbamin-dry i Hasabià sy i Jehiela ary i Jôzabada, dia nandroso ondry aman’osy dimy arivo ho an’ny levita mba hatao soron’ny Paska.
