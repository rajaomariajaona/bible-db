document_id: AMO.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Tenin’i Hamôsa izay anankiray tamin’ireo mpiompy tao Tekôa. Roa taona talohan’ny horohorontany, dia fahitana no nahafantarany an’ireo teny manakiana ny fanjakan’i Israely ireo, fony mpanjaka tao Joda i Hozià ary mpanjaka tao Israely i Jerôbohama zanakalahin’i Jôasy
  - type: note
    content: 'Tekôa: tanàna tokony ho 15 km ao atsimon’i Jerosalema, anatin’ny faritanin’i Joda. –I Israely eto dia manondro ny fanjakana israelita any avaratra, izay fanjakana nisaraka tamin’ny fanjakan’i Joda nanomboka tamin’ny nahafatesan’i Salômôna. –ny horohorontany voalaza eto dia heverina ho tamin’ny 760 tal J.K. eo ho eo; jereo Za 14.5. –Hozià na Hazarià, mpanjakan’i Joda: jereo 2 Mp 15.1-7; 2 Tan 26.1-23. –Jerôbohama II, zanakalahin’i Jôasy, mpanjakan’i Israely: jereo 2 Mp 14.23-29.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Handefasako afo ny tanànan’i Tiro
  - type: text
    content: ka ho levon’izany ireo lapany
  - type: note
    content: 'Momba ny and 9-10: jereo Is 23; Ezek 26–28.'
  - type: text
    content: .»
  - type: heading
    content: (Ny Edômita)
  '11':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Fahotana mifanesy no vitan’ny mponin’i Edôma
  - type: note
    content: 'Edôma (jereo and 9): vahoaka mipetraka ao atsimon’ny ranomasina Maty ary notondroina ho taranak’i Hesao ao amin’ny Gen 36; momba ny Edômita, dia jereo Is 34.5 sy nta.'
  - type: text
    content: ','
  - type: text
    content: 'fa indrindra ity anankiray ity:'
  - type: text
    content: Nenjehiny hotrobarana sabatra ny Israelita rahalahiny
  - type: text
    content: sady tsy nananany antra akory;
  - type: text
    content: tsy nisy fetra ny fahatezerany namiravira,
  - type: text
    content: ary nitahiry lolom-po mandrakariva izy.
  - type: text
    content: 'Noho izany, dia tsy hahemotro ny sazy momba azy:'
  '12':
  - type: text
    content: Handefasako afo ny tanànan’i Temàna
  - type: text
    content: ka ho levon’izany koa ireo lapa ao Bôtserà
  - type: note
    content: 'Temàna, Bôtserà: tanàna nisy ny fonenana nentim-paharazana ho an’ireo filohan’ny Edômita. –Momba ny and 11-12: jereo Hôb; Is 34; Jer 49.7-22; Ezek 25.12-14; 35.'
  - type: text
    content: .»
  - type: heading
    content: (Ny Hamônita)
  '13':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Fahotana mifanesy no vitan’ny Hamônita
  - type: note
    content: 'Hamônita: mponina ao amin’ny fanjakana kely anankiray ao atsinanan’i Jôrdàna. I Rabà (and 14) renivohiny dia teo amin’ny toerana misy ny tanàna Amman ankehitriny. Momba ny Hamônia dia jereo Jer 49.1 sy nta.'
  - type: text
    content: ','
  - type: text
    content: 'fa indrindra ity anankiray ity:'
  - type: text
    content: Notatahany ny kibon’ireo bevohòka tao Gilehada
  - type: text
    content: mba hanitarana faritany.
  - type: text
    content: 'Noho izany, dia tsy hahemotro ny sazy momba azy:'
  '14':
  - type: text
    content: Handefasako afo ny tanànan’i Rabà
  - type: text
    content: ka ho levon’izany ireo lapany;
  - type: text
    content: sady hisy akoran’ady amin’ny andro iadiana
  - type: text
    content: ka hahery vaika toy ny tafio-drivotra ny fifamelezana.
  '15':
  - type: text
    content: Ho lasan-ko babo ilay mpanjakany
  - type: text
    content: sy ireo manamboninahitra miaraka aminy
  - type: note
    content: Momba ny and 13-15; jereo Tsef 2.8-11; Jer 49.1-6; Ezek 21.33-37; 25.1-7.
  - type: text
    content: .
  - type: text
    content: Izaho Tompo no miteny.»
  - type: heading
    content: (Ny Môabita)
  '2':
  - type: text
    content: 'Hoy i Hamôsa hoe:'
  - type: text
    content: 'Avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ny TOMPO no manerona'
  - type: text
    content: ary avy ao Jerosalema Izy no manandra-peo.
  - type: text
    content: Dia malahelo ny saha fiandrasana biby fiompy
  - type: text
    content: ary maina ny tampon’i Karmela
  - type: note
    content: 'ny Tompo no manerona: ampit Jl 4.16. –Karmela: tendrombohitra mandondona ny ranomasina Mediteranea, eo atsimon’ny tanàna Haîfà ankehitriny. Saha mahavokatra no hevitry ny teny hebreo hoe Karmela.'
  - type: text
    content: .
  - type: heading
    content: Ny fanakianan’ny Tompo an’i Israely sy ireo firenena manodidina azy.
  - type: heading
    content: (Ny Sirianina)
  '3':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Fahotana mifanesy no vitan’ny mponin’i Damasy,
  - type: text
    content: 'fa indrindra ity anankiray ity:'
  - type: text
    content: Novakivakîny tamin’ny hersa vy ny mponin’i Gilehada
  - type: note
    content: 'Momba an’i Damasy, dia jereo Is 17.1 sy nta. –Gilehada: faritany israelita ao atsinanan’i Jôrdàna.'
  - type: text
    content: .
  - type: text
    content: 'Noho izany, dia tsy hahemotro ny sazy momba azy:'
  '4':
  - type: text
    content: «Handefasako afo ny lapan’i Hazaela mpanjaka,
  - type: text
    content: ka ho levon’izany koa ny trano-fiarovan’i Bena-Hadada
  - type: note
    content: 'afo: izany hoe ady mangotraka entin’ny fahavalo ka miafara amin’ny fandoroana ny tanàna na ny faritany (1.7, 10, 12, 14; 2.2, 5). –Hazaela: jereo 2 Mp 8.7-15, 26. –Bena-Hadada: jereo 2 Mp 13.3-4.'
  - type: text
    content: ' mpanjaka.'
  '5':
  - type: text
    content: Hopotehiko ny hidim-bavahadin’i Damasy;
  - type: text
    content: haringako ny mponina ao an-dohasahan-keloka
  - type: text
    content: sy ilay mpitana tehim-panjakana ao an-dapam-pilibana;
  - type: text
    content: ary ny vahoakan’i Siria ho lasan-ko babo any Kira
  - type: note
    content: 'an-dohasahan-keloka sy an-dapam-pilibana no hevitry ny teny hebreo hoe Bikata-Avena sy Bety-Hedena izay heverin’ny sasany ho anaran-tany. –Kira (jereo 2 Mp 16.9) dia faritra izay fiavian’ny Sirianina araka ny Ham 9.7. –Momba ny and 3-5: jereo Is 17.1-3; 2 Mp 10.32-33; 16.7-9; Jer 49.23-27.'
  - type: text
    content: .
  - type: text
    content: Izaho Tompo no miteny.»
  - type: heading
    content: (Ny Filistinina)
  '6':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Fahotana mifanesy no vitan’ny mponin’i Gazà
  - type: note
    content: Ny mponin’i Gazà dia anisan’ny Filistinina; jereo Is 14.29 sy nta.
  - type: text
    content: ','
  - type: text
    content: 'fa indrindra ity anankiray ity:'
  - type: text
    content: nentiny ho babo avokoa ny iray tanàna manontolo
  - type: text
    content: mba hatolony ho an’ny Edômita.
  - type: text
    content: 'Noho izany, dia tsy hahemotro ny sazy momba azy:'
  '7':
  - type: text
    content: Handefasako afo ny tanànan’i Gazà
  - type: text
    content: ka ho levon’izany ireo lapany.
  '8':
  - type: text
    content: Dia haringako ny mponina ao Asdôda
  - type: text
    content: sy ilay mpitana tehim-panjakana ao Askelôna;
  - type: text
    content: ary hahodiko hamely an’i Hekrôna ny tanako
  - type: note
    content: 'I Gazà (and 7) sy i Asdôda ary i Askelôna sy i Hekrôna no isan’ireo tanàn-dehibe any Filistia. –Momba ny and 6-8: jereo Tsef 2.4-7; Jer 47; Ezek 25.'
  - type: text
    content: ka ho faty izay sisa amin’ny Filistinina.
  - type: text
    content: Izaho Tompo ANDRIANANAHARY no miteny.»
  - type: heading
    content: (Ny Fenisianina)
  '9':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Fahotana mifanesy no vitan’ny mponin’i Tiro,
  - type: text
    content: 'fa indrindra ity anankiray ity:'
  - type: text
    content: Natolony ho babo ho an’ny Edômita avokoa
  - type: text
    content: ny iray tanàna manontolo,
  - type: text
    content: fa tsy notsarovany ny fanekem-pirahalahiana
  - type: text
    content: nataony tamin’i Israely
  - type: note
    content: 'Ny mponin’i Tiro dia anisan’ny Fenisianina; jereo Is 23.1 sy nta. –fanekem-pirahalahiana: jereo 1 Mp 5.26; 9.13.'
  - type: text
    content: .
  - type: text
    content: Noho izany, dia tsy hahemotro ny sazy momba azy.
