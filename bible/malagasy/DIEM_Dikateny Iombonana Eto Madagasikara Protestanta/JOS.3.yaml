document_id: JOS.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitàna an’i Jôrdàna
  - type: heading
    content: (Jereo Jos 4; Eks 14.15-31; 2 Mp 2.6-8, 13-14)
  - type: text
    content: 'Ny ampitso dia nifoha vao maraina i Josoa mbamin’ireo Israelita rehetra ka nandao ny tobin’i Sitima ary nankany amoron’i Jôrdàna, dia nijanona teo alohan’ny hiampitany. '
  '10':
  - type: text
    content: 'Ho fantatrareo amin’izao fa Andriamanitra velona no eo afovoanareo, ka horoahiny tanteraka eo anoloanareo ny Kanahanita sy Hetita, ny Hivîta sy Perizîta, ny Girgasita sy '
  - type: text
    content: Amôrita
  - type: text
    content: ' ary Jebosita. '
  '11':
  - type: text
    content: 'Indro ny Vatamasina mirakitra ny fanekempihavanan’ilay Tompon’ny tany rehetra handroso eo alohanareo ao Jôrdàna. '
  '12':
  - type: text
    content: 'Koa ankehitriny, mifidiana 12 lahy eo aminareo. iray avy isaky ny foko israelita. '
  '13':
  - type: text
    content: 'Raha vao mandroboka tongotra ao anaty rano ireo mpisorona mitondra ny Vatamasin’ny TOMPO, dia ho tapaka ny ranon’i Jôrdàna: hijanona ny rano avy any ambony ka hisavovona toy ny antontan-javatra.'
  '14':
  - type: text
    content: 'Dia nandao ny toby mba hiampita an’i Jôrdàna ny vahoaka; ary ny mpisorona nitondra ny Vatamasina mirakitra ny fanekempihavanana no teo alohany. '
  '15':
  - type: text
    content: Fotoan’ny fararano tamin’izay ka tondraka mihoatra ny morony rehetra i Jôrdàna
  - type: note
    content: Ny lazaina eto dia fararano fijinjana ny ôrza aorian’ny fiotazana ny rongony (jereo 2.6); amin’izay no tondraka ny ranon’i Jôrdàna noho ny fiempon’ny ranomandry eny an-tendrombohitr’i Libano (Volana Avrily).
  - type: text
    content: '. Raha vao tonga teo ny mpisorona nitondra ny Vatamasina ka nandroboka tongotra tao anaty renirano, '
  '16':
  - type: text
    content: dia nijanona ny rano avy any ambony ka nisavovona toy ny antontan-javatra terỳ lavitra terỳ, dia terỳ amin’ny tanàna Adama izay takaikin’ny tanàna Tsaratàna
  - type: note
    content: I Adama, voalaza koa ao amin’ny Hôs 6.7, dia tanàna iray any ampita atsinanan’i Jôrdàna, eo anilan’ny fihaonany amin’ny renirano Jabôka. –I Tsaratàna dia tanàna mifanila aminy saingy tsy tena mazava ny toerana nisy azy.
  - type: text
    content: '; ary ny rano ambany izay nikoriana ho any amin’ny Ranomasina Maty kosa dia ritra tanteraka, hany ka afaka niampita tandrifin’i Jerikao ny vahoaka. '
  '17':
  - type: text
    content: Ny mpisorona izay nitondra ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO dia nijoro tamin’ny tany maina teo afovoan’i Jôrdàna, mandra-pahatafita ny Israelita rehetra izay nandia tany maina ho eny ampita.
  '2':
  - type: text
    content: 'Nony afaka telo andro, dia nitety ny toby ireo mpifehy vahoaka '
  '3':
  - type: text
    content: 'ary nandidy azy hoe:'
  - type: text
    content: –Raha vao hitanareo fa entin’ny Levita mpisorona
  - type: note
    content: 'Ny Levita mpisorona: jereo Deot 17.9 sy nta.'
  - type: text
    content: ' ilay '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: ' Andriamanitrareo, dia ialao ity toerana misy anareo ity ka mandehana manaraka azy. '
  '4':
  - type: text
    content: Izany no hahafantaranareo ny lalana halehanareo satria tsy mbola nandalovanareo mihitsy io lalana io talohan’izao. Kanefa aza manatona akaikin’ny Vatamasina ianareo fa aoka hisy tokony ho iray kilaometatra ny elanelanareo aminy.
  '5':
  - type: text
    content: 'Ary hoy i Josoa tamin’ny vahoaka:'
  - type: text
    content: –
  - type: text
    content: Diovy
  - type: text
    content: ' ny tenanareo fa rahampitso dia hanao zava-mahagaga eo anivonareo ny TOMPO.'
  '6':
  - type: text
    content: 'Tamin’ny andro manaraka, dia nibaiko ny mpisorona i Josoa hoe:'
  - type: text
    content: –Entonareo ny Vatamasina mirakitra ny fankempihavanana ka miampità eo alohan’ny vahoaka.
  - type: text
    content: 'Dia nitondra ilay Vatamasina ireo ka nandeha teo alohan’ny vahoaka. '
  '7':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Josoa hoe:'
  - type: text
    content: '–Anio no hanamafisako ny fahefànao eo imason’ny Israelita rehetra mba hahafantarany fa tahaka izay nombàko an’i Mosesy no hombako anao koa. '
  '8':
  - type: text
    content: Ianao kosa mandidia ireo mpisorona mitondra ny Vatamasina mba hijanona ao anaty ranon’i Jôrdàna raha vao tafaroboka.
  '9':
  - type: text
    content: 'Ary i Josoa nanao tamin’ny Israelita hoe:'
  - type: text
    content: '–Manatona etỳ ka mihainoa izay lazain’ny TOMPO Andriamanitrareo. '
