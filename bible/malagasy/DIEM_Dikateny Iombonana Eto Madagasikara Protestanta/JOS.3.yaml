document_id: JOS.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitàna an’i Jôrdàna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Jos 4; Eks 14.15-31; 2 Mp 2.6-8, 13-14)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ampitso dia nifoha vao maraina i Josoa mbamin’ireo Israelita rehetra ka nandao ny tobin’i Sitima ary nankany amoron’i Jôrdàna, dia nijanona teo alohan’ny hiampitany. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ho fantatrareo amin’izao fa Andriamanitra velona no eo afovoanareo, ka horoahiny tanteraka eo anoloanareo ny Kanahanita sy Hetita, ny Hivîta sy Perizîta, ny Girgasita sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amôrita
    - type: text
      text: ' ary Jebosita. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Indro ny Vatamasina mirakitra ny fanekempihavanan’ilay Tompon’ny tany rehetra handroso eo alohanareo ao Jôrdàna. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa ankehitriny, mifidiana 12 lahy eo aminareo. iray avy isaky ny foko israelita. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha vao mandroboka tongotra ao anaty rano ireo mpisorona mitondra ny Vatamasin’ny TOMPO, dia ho tapaka ny ranon’i Jôrdàna: hijanona ny rano avy any ambony ka hisavovona toy ny antontan-javatra.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandao ny toby mba hiampita an’i Jôrdàna ny vahoaka; ary ny mpisorona nitondra ny Vatamasina mirakitra ny fanekempihavanana no teo alohany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fotoan’ny fararano tamin’izay ka tondraka mihoatra ny morony rehetra i Jôrdàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny lazaina eto dia fararano '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fijinjana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ny ôrza aorian’ny fiotazana ny rongony (jereo 2.6); amin’izay no tondraka ny ranon’i Jôrdàna noho ny fiempon’ny ranomandry eny an-tendrombohitr’i Libano (Volana Avrily).'
      marker-yv: yv-n
    - type: text
      text: '. Raha vao tonga teo ny mpisorona nitondra ny Vatamasina ka nandroboka tongotra tao anaty renirano, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia nijanona ny rano avy any ambony ka nisavovona toy ny antontan-javatra terỳ lavitra terỳ, dia terỳ amin’ny tanàna Adama izay takaikin’ny tanàna Tsaratàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Adama, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voalaza koa ao amin’ny Hôs 6.7, dia tanàna iray any ampita atsinanan’i Jôrdàna, eo anilan’ny fihaonany amin’ny renirano Jabôka. –I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Tsaratàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tanàna mifanila aminy saingy tsy tena mazava ny toerana nisy azy.'
      marker-yv: yv-n
    - type: text
      text: '; ary ny rano ambany izay nikoriana ho any amin’ny Ranomasina Maty kosa dia ritra tanteraka, hany ka afaka niampita tandrifin’i Jerikao ny vahoaka. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mpisorona izay nitondra ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO dia nijoro tamin’ny tany maina teo afovoan’i Jôrdàna, mandra-pahatafita ny Israelita rehetra izay nandia tany maina ho eny ampita.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka telo andro, dia nitety ny toby ireo mpifehy vahoaka '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nandidy azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha vao hitanareo fa entin’ny Levita mpisorona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny Levita mpisorona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Deot 17.9 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
    - type: text
      text: ' Andriamanitrareo, dia ialao ity toerana misy anareo ity ka mandehana manaraka azy. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izany no hahafantaranareo ny lalana halehanareo satria tsy mbola nandalovanareo mihitsy io lalana io talohan’izao. Kanefa aza manatona akaikin’ny Vatamasina ianareo fa aoka hisy tokony ho iray kilaometatra ny elanelanareo aminy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Josoa tamin’ny vahoaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –
    - type: usfm
      marker: w
      children:
      - type: text
        text: Diovy
    - type: text
      text: ' ny tenanareo fa rahampitso dia hanao zava-mahagaga eo anivonareo ny TOMPO.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro manaraka, dia nibaiko ny mpisorona i Josoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Entonareo ny Vatamasina mirakitra ny fankempihavanana ka miampità eo alohan’ny vahoaka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitondra ilay Vatamasina ireo ka nandeha teo alohan’ny vahoaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny TOMPO tamin’i Josoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Anio no hanamafisako ny fahefànao eo imason’ny Israelita rehetra mba hahafantarany fa tahaka izay nombàko an’i Mosesy no hombako anao koa. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ianao kosa mandidia ireo mpisorona mitondra ny Vatamasina mba hijanona ao anaty ranon’i Jôrdàna raha vao tafaroboka.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Josoa nanao tamin’ny Israelita hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Manatona etỳ ka mihainoa izay lazain’ny TOMPO Andriamanitrareo. '
