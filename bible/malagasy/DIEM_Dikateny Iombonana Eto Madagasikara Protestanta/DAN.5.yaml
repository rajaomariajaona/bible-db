document_id: DAN.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay fanasam-ben’i Belsatsara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanao fanasam-be ho an’ny olo-manan-kajany miisa arivo i Belsatsara mpanjaka, ka nisotro divay teo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rehefa avy niboboka divay i Belsatsara, dia nampaka ireo tsatokaty volamena sy volafotsy izay nalain’i Nebokadnetsara rainy tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoli
  - type: text
    text: n’i Jerosalema; tiany hisotro amin’ireny manko ny tenany sy ny olo-manan-kajany ary ireo vadiny mbamin’ny vaditsindranony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 25.14-15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nentina ireo tsatokaty volamena izay nalaina tao an-tempolin’i Jerosalema, izany hoe tao an-tranon’Andriamanitra; ka ireo fitaovana ireo no nisotroan’ny mpanjaka sy ny olona rehetra nasainy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Rehefa avy niboboka divay izy rehetra, dia nankalaza ireo andriamaniny volamena sy volafotsy, halimo sy vy ary hazo sy vato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’izay fotoana izay dia nisy rantsan-tanan’olona niseho teo akaikin’ny fitoeran-jiro, ka nanoratra teo amin’ny lalotra sokay tamin’ny rindrin’ny lapan’ny mpanjaka. Raha nahita ny rantsan-tanana nanoratra ny mpanjaka, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia nivaloarika ny tarehiny; nampitebiteby azy ny eritreriny, nivahavaha ny famavàn’ny vahiany ary nifampikitrana ny lohaliny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niantso tamin’ny feo mahery izy mba hampanalaina ny mpisikidy sy ny mpanandro ary ny ombiasy. Dia nitenenan’ny mpanjaka ireo olon-kendrin’i Babilôna ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Na iza na iza mahavaky io soratra io sady milaza ny heviny amiko dia hampiakanjoina jaky; sady hasiana rojo volamena ny vozony, ary ho isan’ny telo lahy mpiara-mitantana eto amin’ny fanjakana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary ho... fanjakana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary hitana ny toerana fahatelo eo amin’ny fitondram-panjakana izy.
    marker-yv: yv-n
  - type: text
    text: izy.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niditra avokoa ireo olon-kendrin’ny mpanjaka, nefa tsy nisy nahavaky ny soratra na nampahafantatra ny heviny tamin’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nitebiteby mafy i Belsatsara mpanjaka sady vao mainka nivaloarika ny tarehiny, ary very hevitra koa ireo olo-manan-kajany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lazain’i Daniela ny hevitr’ilay soratra mahagaga
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nahare ny antsoantson’ny mpanjaka sy ireo olo-manan-kajany ny renin’ny mpanjaka, ka niditra tao amin’ny efitrano fanasana ary niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ho ela velona anie ianao, ry mpanjaka! Aoka tsy hampitebiteby anao ny eritreritrao, ary aoka tsy hivaloarika ny tarehinao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ato amin’ny fanjakanao misy lehilahy iray entanin’ny fanahin’ireo andriamanitra masina; ary tamin’ny andron-drainao dia hita fa nisy fahazavan-tsaina sy fahalalana ary fahendrena toy ny fahendren’ireo andriamanitra tao aminy. Izany no nanendren’i Nebokadnetsara mpanjaka rainao azy ho lehiben’ny mpanao majika aman-tsikidy sy ny mpanandro ary ny ombiasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo andriamanitra masina '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay Andriamanitra masina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ireo andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa fanahy tena fatratra no hita tao amin’i Daniela izay nantsoin’ny mpanjaka hoe Beltesatsara; nanana fahalalana sy fahiratan-tsaina izy ka afa-manazava ny hevitry ny nofy sady mahatakatra ny teny saro-pantarina, ary mamaha ny olana. Koa ankehitriny, aoka hampanantsoina i Daniela, fa izy no hanazava ny hevitry ny soratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tamin’izay dia nentina teo anatrehan’ny mpanjaka i Daniela, ka nitenenany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianao ve no Daniela, isan’ny Jiosy babo izay nentin’ny mpanjaka raiko avy any Joda? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa reko ny momba anao fa entanin’ny fanahin’ireo andriamanitra ianao ary hita ao aminao ny fahazavan-tsaina sy ny fahalalana ary fahendrena tena fatratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo andriamanitra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary vao teo no nentina teto anatrehako ny olon-kendry sy ny mpisikidy mba hamaky io soratra io sy hampahafantatra ahy ny heviny, nefa tsy nahalaza izany ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nandre ny momba anao aho, fa ianao no mahalaza hevi-javatra sy mamaha olana; ankehitriny raha mahay mamaky io soratra io sy mampahafantatra ahy ny heviny ianao, dia hampiakanjoina jaky; sady hasiana volamena ny vozonao ary ho isan’ny telo lahy mpiara-mitantana eto amin’ny fanjakana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny and 7 sy nta, ary koa 6.3-4.
    marker-yv: yv-n
  - type: text
    text: ' ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia namaly i Daniela ka nanao teo anatrehan’ny mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry mpanjaka ô, aoka ho anao ihany ny fanomezanao, ary omeo ny hafa ny valim-pitianao; fa ny soratra dia hovakiko aminao ihany ary hampahafantariko anao koa ny heviny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ry mpanjaka ô, Andriamanitra Avo Indrindra no efa nahatonga an’i Nebokadnetsara rainao ho mpanjaka lehibe heni-boninahitra sy laza. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary noho io fahalehibiazana izay nomen’Andriamanitra azy io dia natahotra sy nangovitra avokoa teo anatrehany ny foko sy firenena ary ny olona samy hafa fiteny rehetra; fa nahafaty izay tiany ho faty izy ary namelona izay tiany ho velona, nanandratra izay tiany hasandratra izy ary nampietry izay tiany haetry. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Kanjo nony niavonavona ny fony ary feno fireharehana ny fanahiny, dia naongana teo amin’ny seza fiandrianany izy ary nesorina taminy ny voninahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Noroahina hiala teo amin’ny olombelona izy, nanam-pironana tahaka ny an’ny biby, niara-nonina tamin’ny borikidia ary nihinana ahitra toy ny omby; sady kotsan’ny ando ny tenany, ambara-piekeny fa Andriamanitra Avo Indrindra no manapaka amin’ny fanjakan’ny olombelona ary manendry izay tiany hanjaka aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ianao Belsatsara zanany lahy dia tsy mba nampietry ny fonao na dia efa fantatrao aza izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa nihantsy ny Tompon’ny lanitra ianao, raha nampaka ny tsatokaty voababo tao an-tempoliny ho eo anatrehanao; ka ny tenanao sy ny olo-manan-kajanao ary ireo vadinao mbamin’ny vaditsindranonao no nisotro divay taminy. Nankalazainao ireo andriamanitra volafotsy sy volamena, halimo sy vy ary vato aman-kazo izay tsy mahita na mandre na mahalala akory, fa ilay Andriamanitra Izay mihazona ny ainao sy miahy ny lalanao rehetra kosa tsy mba nomenao voninahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Noho izany dia Andriamanitra no niavian’ny rantsan-tanana izay nanoratra io soratra io. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary izao no teny voasoratra: MENE MENE TEKELA sy PARSINA. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izao no hevitry ny teny: MENE: Voaisa, voaisan’Andriamanitra ny nanjakanao ka taperiny amin’izao; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'TEKELA: Voalanja, voalanja tamin’ny mizana ianao ka hita fa maivan-danja; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'PERESA: Voazara, voazara ny fanjakanao ka omena ny Medianina sy ny Persianina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny teny hoe PERESA (and 28) sy PARSINA (and 25) dia tsy hafa fa fitanisana singany sy maro amin’ny voambolana aramianina iray ihany. Koa ny mpanoratra eto dia tsy manao tsilaolaon-teny amin’ny heviny fotsiny ihany (voazara) fa amin’ny fitovitovian-tsipelina amin’ny anarana hoe Persianina.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Niaraka tamin’izay dia nanome baiko i Belsatsara mba hampiakanjoina jaky i Daniela sady hasiana rojo volamena ny vozony. Ary nasainy nambara am-pahabemaso koa fa i Daniela dia isan’ny telo lahy mpiara-mitantana eo amin’ny fanjakana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'i Daniela... fanjakana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fa i Daniela dia mitana ny toerana fahatelo eo amin’ny fitondram-panjakana.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tamin’io alina io ihany dia novonoina ho faty i Belsatsara mpanjakan’i Babilôna.
