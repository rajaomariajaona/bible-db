document_id: DAN.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay fanasam-ben’i Belsatsara
  - type: text
    content: 'Nanao fanasam-be ho an’ny olo-manan-kajany miisa arivo i Belsatsara mpanjaka, ka nisotro divay teo anatrehany. '
  '10':
  - type: text
    content: 'Nahare ny antsoantson’ny mpanjaka sy ireo olo-manan-kajany ny renin’ny mpanjaka, ka niditra tao amin’ny efitrano fanasana ary niteny hoe:'
  - type: text
    content: '–Ho ela velona anie ianao, ry mpanjaka! Aoka tsy hampitebiteby anao ny eritreritrao, ary aoka tsy hivaloarika ny tarehinao. '
  '11':
  - type: text
    content: Fa ato amin’ny fanjakanao misy lehilahy iray entanin’ny fanahin’ireo andriamanitra masina; ary tamin’ny andron-drainao dia hita fa nisy fahazavan-tsaina sy fahalalana ary fahendrena toy ny fahendren’ireo andriamanitra tao aminy. Izany no nanendren’i Nebokadnetsara mpanjaka rainao azy ho lehiben’ny mpanao majika aman-tsikidy sy ny mpanandro ary ny ombiasy
  - type: note
    content: ireo andriamanitra masina na ilay Andriamanitra masina; ireo andriamanitra na ilay Andriamanitra.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Fa fanahy tena fatratra no hita tao amin’i Daniela izay nantsoin’ny mpanjaka hoe Beltesatsara; nanana fahalalana sy fahiratan-tsaina izy ka afa-manazava ny hevitry ny nofy sady mahatakatra ny teny saro-pantarina, ary mamaha ny olana. Koa ankehitriny, aoka hampanantsoina i Daniela, fa izy no hanazava ny hevitry ny soratra.
  '13':
  - type: text
    content: 'Tamin’izay dia nentina teo anatrehan’ny mpanjaka i Daniela, ka nitenenany hoe:'
  - type: text
    content: '–Ianao ve no Daniela, isan’ny Jiosy babo izay nentin’ny mpanjaka raiko avy any Joda? '
  '14':
  - type: text
    content: Efa reko ny momba anao fa entanin’ny fanahin’ireo andriamanitra ianao ary hita ao aminao ny fahazavan-tsaina sy ny fahalalana ary fahendrena tena fatratra
  - type: note
    content: ireo andriamanitra na Andriamanitra.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ary vao teo no nentina teto anatrehako ny olon-kendry sy ny mpisikidy mba hamaky io soratra io sy hampahafantatra ahy ny heviny, nefa tsy nahalaza izany ireo. '
  '16':
  - type: text
    content: Nandre ny momba anao aho, fa ianao no mahalaza hevi-javatra sy mamaha olana; ankehitriny raha mahay mamaky io soratra io sy mampahafantatra ahy ny heviny ianao, dia hampiakanjoina jaky; sady hasiana volamena ny vozonao ary ho isan’ny telo lahy mpiara-mitantana eto amin’ny fanjakana
  - type: note
    content: Jereo ny and 7 sy nta, ary koa 6.3-4.
  - type: text
    content: ' ianao.'
  '17':
  - type: text
    content: 'Dia namaly i Daniela ka nanao teo anatrehan’ny mpanjaka hoe:'
  - type: text
    content: '–Ry mpanjaka ô, aoka ho anao ihany ny fanomezanao, ary omeo ny hafa ny valim-pitianao; fa ny soratra dia hovakiko aminao ihany ary hampahafantariko anao koa ny heviny. '
  '18':
  - type: text
    content: 'Ry mpanjaka ô, Andriamanitra Avo Indrindra no efa nahatonga an’i Nebokadnetsara rainao ho mpanjaka lehibe heni-boninahitra sy laza. '
  '19':
  - type: text
    content: 'Ary noho io fahalehibiazana izay nomen’Andriamanitra azy io dia natahotra sy nangovitra avokoa teo anatrehany ny foko sy firenena ary ny olona samy hafa fiteny rehetra; fa nahafaty izay tiany ho faty izy ary namelona izay tiany ho velona, nanandratra izay tiany hasandratra izy ary nampietry izay tiany haetry. '
  '2':
  - type: text
    content: Rehefa avy niboboka divay i Belsatsara, dia nampaka ireo tsatokaty volamena sy volafotsy izay nalain’i Nebokadnetsara rainy tao an-
  - type: text
    content: tempoli
  - type: text
    content: n’i Jerosalema; tiany hisotro amin’ireny manko ny tenany sy ny olo-manan-kajany ary ireo vadiny mbamin’ny vaditsindranony
  - type: note
    content: Jereo 2 Mp 25.14-15.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Kanjo nony niavonavona ny fony ary feno fireharehana ny fanahiny, dia naongana teo amin’ny seza fiandrianany izy ary nesorina taminy ny voninahiny. '
  '21':
  - type: text
    content: 'Noroahina hiala teo amin’ny olombelona izy, nanam-pironana tahaka ny an’ny biby, niara-nonina tamin’ny borikidia ary nihinana ahitra toy ny omby; sady kotsan’ny ando ny tenany, ambara-piekeny fa Andriamanitra Avo Indrindra no manapaka amin’ny fanjakan’ny olombelona ary manendry izay tiany hanjaka aminy. '
  '22':
  - type: text
    content: 'Ary ianao Belsatsara zanany lahy dia tsy mba nampietry ny fonao na dia efa fantatrao aza izany rehetra izany. '
  '23':
  - type: text
    content: 'Fa nihantsy ny Tompon’ny lanitra ianao, raha nampaka ny tsatokaty voababo tao an-tempoliny ho eo anatrehanao; ka ny tenanao sy ny olo-manan-kajanao ary ireo vadinao mbamin’ny vaditsindranonao no nisotro divay taminy. Nankalazainao ireo andriamanitra volafotsy sy volamena, halimo sy vy ary vato aman-kazo izay tsy mahita na mandre na mahalala akory, fa ilay Andriamanitra Izay mihazona ny ainao sy miahy ny lalanao rehetra kosa tsy mba nomenao voninahitra. '
  '24':
  - type: text
    content: 'Noho izany dia Andriamanitra no niavian’ny rantsan-tanana izay nanoratra io soratra io. '
  '25':
  - type: text
    content: 'Ary izao no teny voasoratra: MENE MENE TEKELA sy PARSINA. '
  '26':
  - type: text
    content: 'Izao no hevitry ny teny: MENE: Voaisa, voaisan’Andriamanitra ny nanjakanao ka taperiny amin’izao; '
  '27':
  - type: text
    content: 'TEKELA: Voalanja, voalanja tamin’ny mizana ianao ka hita fa maivan-danja; '
  '28':
  - type: text
    content: 'PERESA: Voazara, voazara ny fanjakanao ka omena ny Medianina sy ny Persianina'
  - type: note
    content: Ny teny hoe PERESA (and 28) sy PARSINA (and 25) dia tsy hafa fa fitanisana singany sy maro amin’ny voambolana aramianina iray ihany. Koa ny mpanoratra eto dia tsy manao tsilaolaon-teny amin’ny heviny fotsiny ihany (voazara) fa amin’ny fitovitovian-tsipelina amin’ny anarana hoe Persianina.
  - type: text
    content: .»
  '29':
  - type: text
    content: Niaraka tamin’izay dia nanome baiko i Belsatsara mba hampiakanjoina jaky i Daniela sady hasiana rojo volamena ny vozony. Ary nasainy nambara am-pahabemaso koa fa i Daniela dia isan’ny telo lahy mpiara-mitantana eo amin’ny fanjakana
  - type: note
    content: 'i Daniela... fanjakana: dkt hafa fa i Daniela dia mitana ny toerana fahatelo eo amin’ny fitondram-panjakana.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Dia nentina ireo tsatokaty volamena izay nalaina tao an-tempolin’i Jerosalema, izany hoe tao an-tranon’Andriamanitra; ka ireo fitaovana ireo no nisotroan’ny mpanjaka sy ny olona rehetra nasainy. '
  '30':
  - type: text
    content: Tamin’io alina io ihany dia novonoina ho faty i Belsatsara mpanjakan’i Babilôna.
  '4':
  - type: text
    content: Rehefa avy niboboka divay izy rehetra, dia nankalaza ireo andriamaniny volamena sy volafotsy, halimo sy vy ary hazo sy vato.
  '5':
  - type: text
    content: 'Tamin’izay fotoana izay dia nisy rantsan-tanan’olona niseho teo akaikin’ny fitoeran-jiro, ka nanoratra teo amin’ny lalotra sokay tamin’ny rindrin’ny lapan’ny mpanjaka. Raha nahita ny rantsan-tanana nanoratra ny mpanjaka, '
  '6':
  - type: text
    content: 'dia nivaloarika ny tarehiny; nampitebiteby azy ny eritreriny, nivahavaha ny famavàn’ny vahiany ary nifampikitrana ny lohaliny. '
  '7':
  - type: text
    content: 'Dia niantso tamin’ny feo mahery izy mba hampanalaina ny mpisikidy sy ny mpanandro ary ny ombiasy. Dia nitenenan’ny mpanjaka ireo olon-kendrin’i Babilôna ka nataony hoe:'
  - type: text
    content: –Na iza na iza mahavaky io soratra io sady milaza ny heviny amiko dia hampiakanjoina jaky; sady hasiana rojo volamena ny vozony, ary ho isan’ny telo lahy mpiara-mitantana eto amin’ny fanjakana
  - type: note
    content: 'ary ho... fanjakana: dkt hafa ary hitana ny toerana fahatelo eo amin’ny fitondram-panjakana izy.'
  - type: text
    content: izy.»
  '8':
  - type: text
    content: 'Dia niditra avokoa ireo olon-kendrin’ny mpanjaka, nefa tsy nisy nahavaky ny soratra na nampahafantatra ny heviny tamin’ny mpanjaka. '
  '9':
  - type: text
    content: Nitebiteby mafy i Belsatsara mpanjaka sady vao mainka nivaloarika ny tarehiny, ary very hevitra koa ireo olo-manan-kajany.
  - type: heading
    content: Lazain’i Daniela ny hevitr’ilay soratra mahagaga
