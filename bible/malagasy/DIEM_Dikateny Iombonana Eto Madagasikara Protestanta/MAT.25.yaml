document_id: MAT.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny tovovavy folo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Amin’izay ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ' dia ho tahaka ny amin’ny tovovavy folo izay nitondra ny fanàlany ka lasa hitsena ny mpampakatra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny dimy tamin’ireo tovovavy ireo dia adala; fa ny dimy kosa hendry. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ireo adala dia nitondra ny fanalany, kanefa tsy nitondra solika; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa ireo hendry kosa nitondra ny fanalany sady nitondra solika tamin’ny tavoahangin-tsolika. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Andrasana ela ny fiavian’ny mpampakatra, ka dia samy rendremana avokoa izy folo vavy ary natory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony mamatonalina, dia nisy niantso mafy hoe: «Intỳ tamy ny mpampakatra! Mandehana ianareo mitsena azy!» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’izay dia samy niarina avokoa ireo tovovavy ary samy namboatra ny fanalany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ka hoy ireo adala tamin’ny hendry: «Mba omeo kely amin’ny solikareo izahay, fa efa ho faty ny fanalanay.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia novalian’ny hendry hoe: «Sao tsy ampy ho anay sy ho anareo; fa aleo mankany amin’ny mpivarotra ianareo mividy ho anareo.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha mbola nandeha nividy solika ireo adala, dia tonga ny mpampakatra; ka ireo tovovavy dimy efa vonona no niara-niditra tamin’ny mpampakatra tao amin’ny fanasambe fampakaram-bady ary nohidiana ny varavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Taorian’izany, dia tonga ireo tovovavy sasany ka nanao hoe: «Tompoko, tompoko, vohay izahay!» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa novalian’ny mpampakatra hoe: «Lazaiko marina aminareo fa tsy fantatro ianareo.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nofaranan’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miambena àry ianareo fa tsy fantatrareo na ny andro na ny ora.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny mpanompo anankitelo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 19.11-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ' dia tahaka ny amin’ny lehilahy handeha any an-tany hafa, ka niantso ny mpanompony ary nametraka ny fananany taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa ny anankiray dia nomeny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denàry
  - type: text
    text: ' 30 000, ny anankiray denàry 12 000 ary ny anankiray denàry 6 000, samy araka izay fahaizany avy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.15 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'denàry 30 000, denàry 12 000, denàry 6 000:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: na hoe talenta dimy, talenta roa, talenta iray; ka ny talenta iray dia vola mitentina denàry 6.000.
    marker-yv: yv-n
  - type: text
    text: '. Dia lasa ralehilahy tompom-pananana nandeha any an-tany hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Avy hatrany ilay nandray denàry 30 000 dia nampiasa izany ka nahazo tombony denàry 30 000. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Toy izany koa no nataon’ilay nandray ny denàry 12 000 ka nahazo tombony denàry 12 000. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa ilay nandray denàry 6 000 kosa dia lasa nihady tany ka nandevina ny volan’ny tompony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nony ela, dia niverina ny tompon’ireo mpanompo ireo ka nampamoaka azy telo lahy ny amin’ny petra-bolany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nanatona ilay nandray denàry 30 000 ka nanolotra denàry 30 000 hafa koa sady nilaza hoe: «Denàry 30 000, tompoko, no napetrakao tamiko; indro fa nahazo denàry 30 000 hafa tombony aho.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy ny tompony taminy: «Mahafinaritra izany, ry mpanompo tsara sy mahatoky! Nahatoky tamin’ny zava-madinika ianao ka dia tendreko hiandraikitra zava-dehibe; avia hiombon-kafaliana amiko tomponao!» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nanatona koa ilay nandray denàry 12 000 ary nilaza hoe: «Denàry 12 000, tompoko, no napetrakao tamiko; indro fa nahazo denàry 12 000 hafa tombony aho.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy ny tompony taminy: «Mahafinaritra izany, ry mpanompo tsara sy mahatoky! Nahatoky tamin’ny zava-madinika ianao, ka dia tendreko hiandraikitra zava-dehibe; avia hiombon-kafaliana amiko tomponao!» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nanatona kosa ilay nandray denàry 6 000 ary nilaza hoe: «Fantatro, tompoko, fa lehilahy mila voatsiary ianao, ka mijinja amin’izay tsy namafazanao ary manangona amin’izay tsy nanelezanao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia natahotra aho ka lasa nandevina ny volanao tao anaty tany; koa indro fa averiko aminao ny fanananao.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy ny tompony taminy: «Mpanompo ratsy sady kamo raha ianao! Fantatrao fa mijinja amin’izay tsy namafazako aho ary manangona amin’izay tsy nanelezako. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Noho izany, tokony ho napetrakao tany amin’ny banky ny volako ary ho noraisiko mbamin’ny zana-bola ny fananako rehefa tafaverina aho. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa alao ny denàry 6 000 eny aminy, dia omeo an’ilay manana denàry 60 000. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Eny, izay rehetra manana no homena hatrany ary hanam-be; fa izay tsy manana kosa, na izay kely ananany aza dia halàna aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary io mpanompo tsy misy ilana azy io, roahy any amin’ny haizina any ivelany; ka any izy no hitomany sy hikitro-nify.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hitsaran’ny Zanak’olona ireo firenena rehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '–Rehefa ho avy amin’ny voninahitra maha mpanjaka Azy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' sady hotronin’ny anjely rehetra, dia hipetraka eo amin’ny sezafiandrianany mamirapiratra. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hangonina eo anatrehan’ny Zanak’olona ny firenena rehetra. Dia hanavaka ny olona ho roa tonta ny Zanak’olona, tahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' manavaka ny ondry amin’ny osy; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ka ny ondry no hataon’ny Zanak’olona eo ankavanany fa ny osy hataony eo ankaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary dia izao no holazain’ny Mpanjaka amin’izay eo ankavanany: «Avia ianareo nombàn’ny Raiko fitahiana; raiso ho lova ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakana
  - type: text
    text: ' izay voavoatra ho anareo hatrizay nahariana an’izao tontolo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa noana Aho, dia nomenareo hanina; nangetaheta Aho, dia nomenareo hosotroina; nivahiny Aho, dia nampiantranoinareo; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'tsy nitafy Aho, dia notafînareo; narary Aho, dia nokarakarainareo; tany am-ponja Aho, dia novangianareo.» '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary dia hanontany Azy ny olo-marina ka hanao hoe: «Tompo ô, oviana Ianao no hitanay noana ka nomenay hanina; na nangetaheta ka nampisotroinay? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Oviana Ianao no hitanay nivahiny ka nampiantranoinay, na tsy nitafy ka notafînay? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Oviana Ianao no hitanay narary na tany am-ponja ka novangianay?» '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia hovalian’ny Mpanjaka hoe: «Lazaiko marina aminareo fa araka izay nataonareo tamin’ny anankiray amin’ireto havako madinika indrindra ireto no nataonareo tamiko.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary dia izao kosa no holazain’ny Mpanjaka amin’izay eo ankaviany: «Mialà amiko ianareo voaozona, mandehana any amin’ny afo maharitra mandrakizay izay voavoatra ho an’ny devoly sy ny anjeliny. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fa noana Aho, dia tsy nomenareo hanina; nangetaheta Aho, dia tsy nomenareo hosotroina; '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nivahiny Aho, dia tsy nampiantranoinareo; tsy nitafy Aho, dia tsy notafînareo; narary sy tany am-ponja Aho, dia tsy nokarakarainareo.» '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary dia hanontany Azy kosa ireo ka hanao hoe: «Tompo ô, oviana Ianao no hitanay noana na nangetaheta, na nivahiny, na tsy nitafy, na narary, na tany am-ponja ka tsy nampianay?» '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dia hovalian’ny Mpanjaka hoe: «Lazaiko marina aminareo fa araka izay tsy nataonareo tamin’ny anankiray amin’ireto havako madinika indrindra ireto no tsy nataonareo tamiko.» '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Dia hiroso ho any amin’ny fijaliana maharitra mandrakizay ireo fa ny olo-marina kosa ho any amin’ny fiaina-maharitra mandrakizay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Dan 12.2.
    marker-yv: yv-n
  - type: text
    text: .
