document_id: MAT.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ny tovovavy folo
  - type: text
    content: 'Amin’izay ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' dia ho tahaka ny amin’ny tovovavy folo izay nitondra ny fanàlany ka lasa hitsena ny mpampakatra. '
  '10':
  - type: text
    content: 'Raha mbola nandeha nividy solika ireo adala, dia tonga ny mpampakatra; ka ireo tovovavy dimy efa vonona no niara-niditra tamin’ny mpampakatra tao amin’ny fanasambe fampakaram-bady ary nohidiana ny varavarana. '
  '11':
  - type: text
    content: 'Taorian’izany, dia tonga ireo tovovavy sasany ka nanao hoe: «Tompoko, tompoko, vohay izahay!» '
  '12':
  - type: text
    content: 'Fa novalian’ny mpampakatra hoe: «Lazaiko marina aminareo fa tsy fantatro ianareo.»'
  '13':
  - type: text
    content: 'Dia nofaranan’i Jesoa hoe:'
  - type: text
    content: –Miambena àry ianareo fa tsy fantatrareo na ny andro na ny ora.
  - type: heading
    content: Fanoharana ny amin’ny mpanompo anankitelo
  - type: heading
    content: (Jereo Lk 19.11-27)
  '14':
  - type: text
    content: 'Ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' dia tahaka ny amin’ny lehilahy handeha any an-tany hafa, ka niantso ny mpanompony ary nametraka ny fananany taminy. '
  '15':
  - type: text
    content: 'Koa ny anankiray dia nomeny '
  - type: text
    content: denàry
  - type: text
    content: ' 30 000, ny anankiray denàry 12 000 ary ny anankiray denàry 6 000, samy araka izay fahaizany avy'
  - type: note
    content: 'denàry 30 000, denàry 12 000, denàry 6 000: na hoe talenta dimy, talenta roa, talenta iray; ka ny talenta iray dia vola mitentina denàry 6.000.'
  - type: text
    content: '. Dia lasa ralehilahy tompom-pananana nandeha any an-tany hafa. '
  '16':
  - type: text
    content: 'Avy hatrany ilay nandray denàry 30 000 dia nampiasa izany ka nahazo tombony denàry 30 000. '
  '17':
  - type: text
    content: 'Toy izany koa no nataon’ilay nandray ny denàry 12 000 ka nahazo tombony denàry 12 000. '
  '18':
  - type: text
    content: Fa ilay nandray denàry 6 000 kosa dia lasa nihady tany ka nandevina ny volan’ny tompony.
  '19':
  - type: text
    content: 'Nony ela, dia niverina ny tompon’ireo mpanompo ireo ka nampamoaka azy telo lahy ny amin’ny petra-bolany. '
  '2':
  - type: text
    content: 'Ny dimy tamin’ireo tovovavy ireo dia adala; fa ny dimy kosa hendry. '
  '20':
  - type: text
    content: 'Dia nanatona ilay nandray denàry 30 000 ka nanolotra denàry 30 000 hafa koa sady nilaza hoe: «Denàry 30 000, tompoko, no napetrakao tamiko; indro fa nahazo denàry 30 000 hafa tombony aho.» '
  '21':
  - type: text
    content: 'Dia hoy ny tompony taminy: «Mahafinaritra izany, ry mpanompo tsara sy mahatoky! Nahatoky tamin’ny zava-madinika ianao ka dia tendreko hiandraikitra zava-dehibe; avia hiombon-kafaliana amiko tomponao!» '
  '22':
  - type: text
    content: 'Dia nanatona koa ilay nandray denàry 12 000 ary nilaza hoe: «Denàry 12 000, tompoko, no napetrakao tamiko; indro fa nahazo denàry 12 000 hafa tombony aho.» '
  '23':
  - type: text
    content: 'Dia hoy ny tompony taminy: «Mahafinaritra izany, ry mpanompo tsara sy mahatoky! Nahatoky tamin’ny zava-madinika ianao, ka dia tendreko hiandraikitra zava-dehibe; avia hiombon-kafaliana amiko tomponao!» '
  '24':
  - type: text
    content: 'Dia nanatona kosa ilay nandray denàry 6 000 ary nilaza hoe: «Fantatro, tompoko, fa lehilahy mila voatsiary ianao, ka mijinja amin’izay tsy namafazanao ary manangona amin’izay tsy nanelezanao. '
  '25':
  - type: text
    content: 'Dia natahotra aho ka lasa nandevina ny volanao tao anaty tany; koa indro fa averiko aminao ny fanananao.» '
  '26':
  - type: text
    content: 'Dia hoy ny tompony taminy: «Mpanompo ratsy sady kamo raha ianao! Fantatrao fa mijinja amin’izay tsy namafazako aho ary manangona amin’izay tsy nanelezako. '
  '27':
  - type: text
    content: 'Noho izany, tokony ho napetrakao tany amin’ny banky ny volako ary ho noraisiko mbamin’ny zana-bola ny fananako rehefa tafaverina aho. '
  '28':
  - type: text
    content: 'Koa alao ny denàry 6 000 eny aminy, dia omeo an’ilay manana denàry 60 000. '
  '29':
  - type: text
    content: 'Eny, izay rehetra manana no homena hatrany ary hanam-be; fa izay tsy manana kosa, na izay kely ananany aza dia halàna aminy. '
  '3':
  - type: text
    content: 'Ireo adala dia nitondra ny fanalany, kanefa tsy nitondra solika; '
  '30':
  - type: text
    content: Ary io mpanompo tsy misy ilana azy io, roahy any amin’ny haizina any ivelany; ka any izy no hitomany sy hikitro-nify.»
  - type: heading
    content: Ny hitsaran’ny Zanak’olona ireo firenena rehetra
  '31':
  - type: text
    content: '–Rehefa ho avy amin’ny voninahitra maha mpanjaka Azy ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' sady hotronin’ny anjely rehetra, dia hipetraka eo amin’ny sezafiandrianany mamirapiratra. '
  '32':
  - type: text
    content: 'Ary hangonina eo anatrehan’ny Zanak’olona ny firenena rehetra. Dia hanavaka ny olona ho roa tonta ny Zanak’olona, tahaka ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' manavaka ny ondry amin’ny osy; '
  '33':
  - type: text
    content: 'ka ny ondry no hataon’ny Zanak’olona eo ankavanany fa ny osy hataony eo ankaviany. '
  '34':
  - type: text
    content: 'Ary dia izao no holazain’ny Mpanjaka amin’izay eo ankavanany: «Avia ianareo nombàn’ny Raiko fitahiana; raiso ho lova ny '
  - type: text
    content: Fanjakana
  - type: text
    content: ' izay voavoatra ho anareo hatrizay nahariana an’izao tontolo izao. '
  '35':
  - type: text
    content: 'Fa noana Aho, dia nomenareo hanina; nangetaheta Aho, dia nomenareo hosotroina; nivahiny Aho, dia nampiantranoinareo; '
  '36':
  - type: text
    content: 'tsy nitafy Aho, dia notafînareo; narary Aho, dia nokarakarainareo; tany am-ponja Aho, dia novangianareo.» '
  '37':
  - type: text
    content: 'Ary dia hanontany Azy ny olo-marina ka hanao hoe: «Tompo ô, oviana Ianao no hitanay noana ka nomenay hanina; na nangetaheta ka nampisotroinay? '
  '38':
  - type: text
    content: 'Oviana Ianao no hitanay nivahiny ka nampiantranoinay, na tsy nitafy ka notafînay? '
  '39':
  - type: text
    content: 'Oviana Ianao no hitanay narary na tany am-ponja ka novangianay?» '
  '4':
  - type: text
    content: 'fa ireo hendry kosa nitondra ny fanalany sady nitondra solika tamin’ny tavoahangin-tsolika. '
  '40':
  - type: text
    content: 'Dia hovalian’ny Mpanjaka hoe: «Lazaiko marina aminareo fa araka izay nataonareo tamin’ny anankiray amin’ireto havako madinika indrindra ireto no nataonareo tamiko.»'
  '41':
  - type: text
    content: 'Ary dia izao kosa no holazain’ny Mpanjaka amin’izay eo ankaviany: «Mialà amiko ianareo voaozona, mandehana any amin’ny afo maharitra mandrakizay izay voavoatra ho an’ny devoly sy ny anjeliny. '
  '42':
  - type: text
    content: 'Fa noana Aho, dia tsy nomenareo hanina; nangetaheta Aho, dia tsy nomenareo hosotroina; '
  '43':
  - type: text
    content: 'Nivahiny Aho, dia tsy nampiantranoinareo; tsy nitafy Aho, dia tsy notafînareo; narary sy tany am-ponja Aho, dia tsy nokarakarainareo.» '
  '44':
  - type: text
    content: 'Ary dia hanontany Azy kosa ireo ka hanao hoe: «Tompo ô, oviana Ianao no hitanay noana na nangetaheta, na nivahiny, na tsy nitafy, na narary, na tany am-ponja ka tsy nampianay?» '
  '45':
  - type: text
    content: 'Dia hovalian’ny Mpanjaka hoe: «Lazaiko marina aminareo fa araka izay tsy nataonareo tamin’ny anankiray amin’ireto havako madinika indrindra ireto no tsy nataonareo tamiko.» '
  '46':
  - type: text
    content: Dia hiroso ho any amin’ny fijaliana maharitra mandrakizay ireo fa ny olo-marina kosa ho any amin’ny fiaina-maharitra mandrakizay
  - type: note
    content: Ampit Dan 12.2.
  - type: text
    content: .
  '5':
  - type: text
    content: Andrasana ela ny fiavian’ny mpampakatra, ka dia samy rendremana avokoa izy folo vavy ary natory.
  '6':
  - type: text
    content: 'Nony mamatonalina, dia nisy niantso mafy hoe: «Intỳ tamy ny mpampakatra! Mandehana ianareo mitsena azy!» '
  '7':
  - type: text
    content: 'Tamin’izay dia samy niarina avokoa ireo tovovavy ary samy namboatra ny fanalany. '
  '8':
  - type: text
    content: 'Ka hoy ireo adala tamin’ny hendry: «Mba omeo kely amin’ny solikareo izahay, fa efa ho faty ny fanalanay.» '
  '9':
  - type: text
    content: 'Dia novalian’ny hendry hoe: «Sao tsy ampy ho anay sy ho anareo; fa aleo mankany amin’ny mpivarotra ianareo mividy ho anareo.» '
