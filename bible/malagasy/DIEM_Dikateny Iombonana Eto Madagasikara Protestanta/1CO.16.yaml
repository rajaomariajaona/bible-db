    - type: text
      text: ' any Jerosalema'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Momba ny famoriam-bola atao ho an’ny vahoakan’Andriamanitra any Jerosalema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rm 15.25-26.
      marker-yv: yv-n
    - type: text
      text: ', dia izao: mba manaova koa ianareo, araka ireo fepetra nasaiko narahin’ny Fiangonana rehetra any Galatia. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa tonga i Timôty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 4.17.
      marker-yv: yv-n
    - type: text
      text: ', dia mba ataovy izay hahatsapany fa tsara fandray azy ianareo; satria miasa tahaka ahy koa izy amin’ny asan’ny Tompo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka mba tsy hisy hanao tsinontsinona azy. Omeo vatsy izy ary atero mba ho tonga soa aman-tsara atỳ amiko, fa miandry azy aho sy ireo havana iray finoana eto.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Apôlao havantsika kosa dia nampirisihiko matetika hankatỳ aminareo miaraka amin’ny havana sasany iray finoana; saingy tsy tiany hatao mihitsy izany ankehitriny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Apôlao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Asa 18.24. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tsy tiany hatao mihitsy izany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsy sitrapon’Andriamanitra mihitsy izany.
      marker-yv: yv-n
    - type: text
      text: ', fa ho avy ihany izy rehefa misy hahafahany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teny farany sy fanaovam-beloma
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miambena ianareo, mamahara tsara amin’ny finoana, aoka hitombandahy, mahereza. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ataovy amim-pitiavana ny zavatra rehetra.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatrareo ry i Stefanasy mianakavy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.16.
      marker-yv: yv-n
    - type: text
      text: ': ireo no kristianina voalohany tany Akaîa sady nanokan-tena hanampy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakan’Andriamanitra
    - type: text
      text: '. Mangataka anareo aho, ry havako, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hanaiky tsara ny olona tahaka ireny mbamin’izay rehetra miara-miasa sy miara-misasatra aminy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahafaly ahy ny fahatongavan’i Stefanasy sy i Fôrtnato ary i Akaîko, fa ireo no nahefa ny tsy vitanareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sady namelombelona ahy izy telo lahy no namelombelona anareo. Koa mahaiza mankasitraka ny olona tahaka ireny.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao veloma anareo ireo Fiangonana atỳ amin’ny faritany Azia. Noho isika tafaray amin’ny Tompo, dia manao veloma anareo i Akoilà sy i Prisila
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 18.2.
      marker-yv: yv-n
    - type: text
      text: ' mbamin’ny Fiangonana mivory ao an-tranony. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isan’alahady dia samia mba manokana vola ao aminy avy arakaraka izay vola miditra ka hitahiry izany, mba tsy hilaina intsony ny hamoriam-bola amin’ny fahatongavako. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao veloma anareo ireo havana rehetra iray finoana eto.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifanaova veloma amin’ny fanoroham-pihavanana.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soratanako izao teny izao: Veloma, hoy i Paoly.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy tsy manam-pitiavana ny Tompo, aoka izy ho voaozona!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maràna tha – Avia, ry Tomponay ô
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Maràna tha: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fiteny aramianina, voarakitra ao amin’ny litorijia. Vakîn’ny sasany hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Maran atha: Avy ny Tompo!'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –Ampit Apôk 22.20.'
      marker-yv: yv-n
    - type: text
      text: '!'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Homba anareo anie ny fahasoavan’i Jesoa Tompo!
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Momba anareo rehetra izay tafaray amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa ny fitiavako!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga aho, dia izay olona sitrakareo no hirahiko sy hampombaiko taratasy mba hitondra ny fanomezanareo hankany Jerosalema. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha ilaina moa ny handehanako any, dia hiara-dia izahay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dia kasain’i Paoly hatao
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hankatỳ aminareo aho rehefa avy niteny an’i Masedônia (fa hitety io faritany io aho
    - type: usfm
