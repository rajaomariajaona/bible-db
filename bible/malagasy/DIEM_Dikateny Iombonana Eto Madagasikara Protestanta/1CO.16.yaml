      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 19.21.
      marker-yv: yv-n
    - type: text
      text: '). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Angamba hitoetra maharitra eo aminareo aho na handany ny ririnina mihitsy aza; ka dia ianareo no hamatsy ahy sy hanatitra ahy any amin’izay toerana tokony halehako. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy mikasa hitsidika anareo mandalo fotsiny aho, satria manantena hitoetra eo aminareo fotoana maharitraritra raha sitrapon’ny Tompo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa mbola hijanona eto Efeso aho mandra-piavin’ny '
    - type: usfm
