document_id: 1CO.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Famoriam-bola ho an’ny vahoakan’Andriamanitra any Jerosalema
  - type: text
    content: Momba ny famoriam-bola atao ho an’ny vahoakan’Andriamanitra any Jerosalema
  - type: note
    content: Jereo Rm 15.25-26.
  - type: text
    content: ', dia izao: mba manaova koa ianareo, araka ireo fepetra nasaiko narahin’ny Fiangonana rehetra any Galatia. '
  '10':
  - type: text
    content: Rehefa tonga i Timôty
  - type: note
    content: Jereo 4.17.
  - type: text
    content: ', dia mba ataovy izay hahatsapany fa tsara fandray azy ianareo; satria miasa tahaka ahy koa izy amin’ny asan’ny Tompo. '
  '11':
  - type: text
    content: Aoka mba tsy hisy hanao tsinontsinona azy. Omeo vatsy izy ary atero mba ho tonga soa aman-tsara atỳ amiko, fa miandry azy aho sy ireo havana iray finoana eto.
  '12':
  - type: text
    content: Fa i Apôlao havantsika kosa dia nampirisihiko matetika hankatỳ aminareo miaraka amin’ny havana sasany iray finoana; saingy tsy tiany hatao mihitsy izany ankehitriny
  - type: note
    content: 'Apôlao: jereo Asa 18.24. –tsy tiany hatao mihitsy izany: dkt hafa tsy sitrapon’Andriamanitra mihitsy izany.'
  - type: text
    content: ', fa ho avy ihany izy rehefa misy hahafahany.'
  - type: heading
    content: Teny farany sy fanaovam-beloma
  '13':
  - type: text
    content: 'Miambena ianareo, mamahara tsara amin’ny finoana, aoka hitombandahy, mahereza. '
  '14':
  - type: text
    content: Ataovy amim-pitiavana ny zavatra rehetra.
  '15':
  - type: text
    content: Fantatrareo ry i Stefanasy mianakavy
  - type: note
    content: Jereo 1.16.
  - type: text
    content: ': ireo no kristianina voalohany tany Akaîa sady nanokan-tena hanampy ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: '. Mangataka anareo aho, ry havako, '
  '16':
  - type: text
    content: mba hanaiky tsara ny olona tahaka ireny mbamin’izay rehetra miara-miasa sy miara-misasatra aminy.
  '17':
  - type: text
    content: 'Mahafaly ahy ny fahatongavan’i Stefanasy sy i Fôrtnato ary i Akaîko, fa ireo no nahefa ny tsy vitanareo. '
  '18':
  - type: text
    content: Sady namelombelona ahy izy telo lahy no namelombelona anareo. Koa mahaiza mankasitraka ny olona tahaka ireny.
  '19':
  - type: text
    content: Manao veloma anareo ireo Fiangonana atỳ amin’ny faritany Azia. Noho isika tafaray amin’ny Tompo, dia manao veloma anareo i Akoilà sy i Prisila
  - type: note
    content: Jereo Asa 18.2.
  - type: text
    content: ' mbamin’ny Fiangonana mivory ao an-tranony. '
  '2':
  - type: text
    content: 'Isan’alahady dia samia mba manokana vola ao aminy avy arakaraka izay vola miditra ka hitahiry izany, mba tsy hilaina intsony ny hamoriam-bola amin’ny fahatongavako. '
  '20':
  - type: text
    content: Manao veloma anareo ireo havana rehetra iray finoana eto.
  - type: text
    content: Mifanaova veloma amin’ny fanoroham-pihavanana.
  '21':
  - type: text
    content: 'Soratanako izao teny izao: Veloma, hoy i Paoly.'
  '22':
  - type: text
    content: Raha misy tsy manam-pitiavana ny Tompo, aoka izy ho voaozona!
  - type: text
    content: Maràna tha – Avia, ry Tomponay ô
  - type: note
    content: 'Maràna tha: fiteny aramianina, voarakitra ao amin’ny litorijia. Vakîn’ny sasany hoe Maran atha: Avy ny Tompo! –Ampit Apôk 22.20.'
  - type: text
    content: '!'
  '23':
  - type: text
    content: Homba anareo anie ny fahasoavan’i Jesoa Tompo!
  '24':
  - type: text
    content: 'Momba anareo rehetra izay tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa ny fitiavako!'
  '3':
  - type: text
    content: 'Ary rehefa tonga aho, dia izay olona sitrakareo no hirahiko sy hampombaiko taratasy mba hitondra ny fanomezanareo hankany Jerosalema. '
  '4':
  - type: text
    content: Raha ilaina moa ny handehanako any, dia hiara-dia izahay.
  - type: heading
    content: Dia kasain’i Paoly hatao
  '5':
  - type: text
    content: Hankatỳ aminareo aho rehefa avy niteny an’i Masedônia (fa hitety io faritany io aho
  - type: note
    content: Jereo Asa 19.21.
  - type: text
    content: '). '
  '6':
  - type: text
    content: 'Angamba hitoetra maharitra eo aminareo aho na handany ny ririnina mihitsy aza; ka dia ianareo no hamatsy ahy sy hanatitra ahy any amin’izay toerana tokony halehako. '
  '7':
  - type: text
    content: Fa tsy mikasa hitsidika anareo mandalo fotsiny aho, satria manantena hitoetra eo aminareo fotoana maharitraritra raha sitrapon’ny Tompo.
  '8':
  - type: text
    content: 'Kanefa mbola hijanona eto Efeso aho mandra-piavin’ny '
  - type: text
    content: Pentekôsta
  - type: text
    content: '; '
  '9':
  - type: text
    content: satria varavarana lehibe no misokatra ho ahy hahazoako miasa tsara eto, na dia maro aza ny mpanohitra
  - type: note
    content: 'And 8-9: jereo Asa 19.8-10.'
  - type: text
    content: .
