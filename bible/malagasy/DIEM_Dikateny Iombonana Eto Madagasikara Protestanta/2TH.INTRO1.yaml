  - type: text
    text: ' taratasy faharoa ho an’ny Tesalônisianina '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'ity, dia tsahivin’i Paoly indray ny lafin-javatra anankiray efa noresahiny tao amin’ilay taratasiny voalohany: ny olana ateraky ny fandraisana vilana ny hoe fiavian’ny Tompo amim-boninahitra. Mbola nampisahotaka ny kristianina tao Tesalônika ihany izany. Ny sasany tamin’izy ireo dia sahy nanambara fa efa tonga sahady io andro io (2.2); ary ny sasany dia tsy nety niasa intsony, satria efa akaiky ny farandro, ka dia mivelona manao tanty reraka amin’izay mbola miasa (3.6-12). Ny kendren’ity taratasy ity àry dia ny hanitsy ireo hevi-diso izay nampikorontana ny Fiangonana tao Tesalônika.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny ataon’i Paoly apôstôly, voalohany indrindra, dia ny misaotra an’Andriamanitra noho ny finoana sy ny fitiavana asehon’ny kristianina tao Tesalônika; mangataka amin’ny Tompo koa izy mba hanomezany azy ireo ny faharetana amin’ny fanompoana niantsoany azy (1.1-12). Vao vita izany, dia atrehin’i Paoly ny fotokevitra vontoatin’ity taratasy ity, izany hoe ny fampianarana momba ny fiavian’i Kristy amim-boninahitra. Tsy ho tonga izany raha tsy efa niseho «ilay mpanao ratsy», izay hampihoa-pampana ny fikomiana amin’Andriamanitra sy ny fanoherana an’i Kristy (2.1-12). Manoloana ny herin’ny ratsy izay mifofofofo mafy tokoa, dia tena ilain’ny mpino ny miorina tsara sy mifikitra amin’ny Vaovao Mahafaly ary ny tsy ketraka amin’ny fivavahana (2.13-35). Avy eo dia anarin’i Paoly apôstôly ny olona kamo ka ampifanatrehiny amin’ireo olona miasa mamelo-tena fa tsy manao tanty reraka amin’ny hafa (3.6-15). Tsodrano sy fanaovam-beloma no fehiteny fohy mamarana ny taratasy (3.16-18).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ilay teny malaza hoe: «Raha misy tsy te hiasa, aoka izy tsy hihinana», dia mampitandrina ny mpamaky amin’ny fiheverana mampifangaro ny atao hoe finoana amin’ny fialana andraikitra tsy hanefa ireo adidy andavanandro napetrak’Andriamanitra amin’ny vahoakany.'
