document_id: SNG.6,396
type_code: plt
verses:
  '1':
  - type: text
    content: Fa nankaiza ny malalanao,
  - type: text
    content: ry vehivavy tsara tarehy indrindra?
  - type: text
    content: Nivily aiza ny malalanao
  - type: text
    content: mba hiarahanay aminao hitady azy?
  - type: heading
    content: (Ravehivavy)
  '10':
  - type: text
    content: «Fa iza moa io vehivavy io
  - type: text
    content: izay manjelanjelatra toy ny maraina
  - type: text
    content: sady tsara tarehy toy ny volana
  - type: text
    content: sy mamirapiratra toy ny masoandro
  - type: text
    content: ary mahatalanjona toa andian-kintana
  - type: note
    content: Jereo and 4 sy nta.
  - type: text
    content: ?»
  '11':
  - type: text
    content: Midina ao an-jaridainam-boankazo aho
  - type: text
    content: hijery ny tsirim-boly eny an-dohasaha
  - type: note
    content: 'tsirim-boly eny an-dohasaha: dkt hafa fitsirin’ireo palma. Ampitahao 6.2-3 ny andininy manontolo.'
  - type: text
    content: sy hizaha raha mitsimoka ny voaloboka
  - type: text
    content: na mamony ny ampongabendanitra.
  '12':
  - type: text
    content: Kanefa tsy ampoimpoiziko ny nanjo ahy;
  - type: text
    content: fa nahatonga ahy hatahotahotra ianao,
  - type: text
    content: ry ilay vehivavy mpiray firenena amiko
  - type: text
    content: sady zanakavavin’olom-banona.
  - type: heading
    content: (Ireo tovovavy sy vehivavy)
  '2':
  - type: text
    content: Midina any an-jaridainany ny malalako,
  - type: text
    content: dia any an-tsaham-boninkazo mandraradraraka,
  - type: text
    content: mba hirao-bilona any sy hioty lisy.
  '3':
  - type: text
    content: An’ny malalako aho ary ahy ny malalako.
  - type: text
    content: Amin’ny toerana misy lisy
  - type: text
    content: no mirao-bilona izy
  - type: note
    content: Jer 4.16–5.1 sy 2.16 sy nta. Aza hadinoina fa oharina matetika amin’ny gazela na ny diera tanora ilay mpampakatra.
  - type: text
    content: .
  - type: heading
    content: Ny sarin’ilay malala
  - type: heading
    content: (Ralehilahy)
  '4':
  - type: text
    content: Ianao, rahavako, dia tsara tarehy
  - type: text
    content: tahaka ny tanàna Tiritsà
  - type: text
    content: sady kanto tahaka an’i Jerosalema
  - type: text
    content: ary mahatalanjona toa andian-kintana
  - type: note
    content: I Tiritsà dia renivohitry ny fanjakan’i Israely (1 Mp 15.33; 16.23) nandritra ny fotoana vitsy. –andian-kintana na hoe antokon-tafika.
  - type: text
    content: .
  '5':
  - type: text
    content: Aza ajerinao ahy ny masonao
  - type: text
    content: fa mampiontanontana ny foko.
  - type: text
    content: Ny volon-dohanao dia toy ny andian’osy
  - type: text
    content: midina ny tendrombohitra Gilehada.
  '6':
  - type: text
    content: Ny nifinao dia fotsy toa andian’ondrivavy
  - type: text
    content: izay efa voahety sy avy nampandroana;
  - type: text
    content: samy manana rahavavy kambana ireo,
  - type: text
    content: ka tsy misy izay tsy tahaka izany.
  '7':
  - type: text
    content: Menamena toa hasin’ampongabendanitra
  - type: text
    content: ireo takolakao anatin’ny voalinao.
  '8':
  - type: text
    content: Mpanjakavavy enimpolo no an’ny mpanjaka,
  - type: text
    content: valopolo ny vaditsindranony
  - type: text
    content: ary tsy hita isa ny zatovovaviny;
  '9':
  - type: text
    content: fa vehivavy iray ihany no voromahailalako,
  - type: text
    content: dia ilay voromahailalako tsy misy tomika,
  - type: text
    content: vavitokan’ny reniny sady zanany tiany indrindra.
  - type: text
    content: Ireo vehivavy hafa izay mahita azy
  - type: text
    content: dia manambara azy hoe sambatra
  - type: note
    content: 'manambara azy hoe sambatra: jereo Ohab 31.28; Lk 1.48.'
  - type: text
    content: ;
  - type: text
    content: ary ny mpanjakavavy sy ny vaditsindrano
  - type: text
    content: 'dia samy midera azy manao hoe:'
