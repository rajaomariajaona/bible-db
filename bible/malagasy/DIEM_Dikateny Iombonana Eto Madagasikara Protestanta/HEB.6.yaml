segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Noho izany, aoka hilaozantsika ny abidim-pianarana momba an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', fa aoka isika handroso amin’ny fampianarana sahaza ny olon-dehibe. Tsy hoe fanorenana indray no hataontsika: dia ny tokony hialana amin’ireo asa mitondra fahafatesana sy ny tokony hinoana an’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ny fampianarana momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ' samihafa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'batisa samihafa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety hilazana ireo fombam-pivavahana fidiovana fanaon’ny Jiosy sy fanaon’ny hafa firenena izany, na ny fombafomba isan-karazany arahina amin’ny fanaovana batisa kristianina, na koa ny fanavahana ny batisan’i Jôhany sy ny batisa kristianina (ampit Asa 18.25; 19.3-6).
    marker-yv: yv-n
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fametrahan-tanana
  - type: text
    text: ' ary momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitsanganan’ny maty
  - type: text
    text: ' ho velona sy ny fitsarana mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny mandroso amin’ny fampianarana sahaza ny olon-dehibe, izany no hataontsika raha avelan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ahoana kosa ny amin’ireo niverina tamin’ny toe-dratsy? Efa nohazavain’Andriamanitra indray mandeha ireo, efa nanandrana ny fanomezana avy any an-danitra ary efa nandray anjara tamin’ny Fanahy Masina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'efa nahatsapa fa tsara ny tenin’Andriamanitra ary efa nahatsapa ny asa mahagaga vokatry ny fiainana ho avy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'kanefa dia niverina tamin’ny toe-dratsy. Tsy azo havaozina indray ireo mba hiala amin’ny toetra ratsiny, satria manombo ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: ' amin’ny hazofijaliana indray sady manolotra Azy halàm-baràka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 10.26.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izay tany mifoka ny ranonorana milatsaka aminy matetika ka mahavokatra anana tsara ho an’ny olona iasana azy, dia mahazo fitahiana avy amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa izay tany maniry tsilo sy songosongo kosa dia tsy misy antony sady efa hiharan’ny ozon’Andriamanitra; ary hodorana no hiafarany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 3.17-18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Na izany aza no teninay, ry hava-malala, dia zavatra tsara kokoa sady miantoka ny famonjena anareo no antenainay, raha ny aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa tsy manao ny tsy rariny Andriamanitra: tsy hohadinoiny akory ny asanareo sy ny fitiavanareo Azy nasehonareo tamin’ny nanompoanareo sady mbola anompoanareo ny kristianina havanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary dia irînay haneho fahazotoana toy izany hatramin’ny farany ianareo tsirairay avy, mba ho tanteraka tokoa ny zavatra antenainareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy tianay ho ketraka ianareo fa mba hanahaka ireo mino sy maharitra ka manana anjara amin’ny soa nampanantenain’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampanantenana azo antoka ataon’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny fampanantenana nataon’Andriamanitra tamin’i Abrahama dia nombàm-pianianana. Ary satria tsy nisy lehibe noho ny tenany hianianan’Andriamanitra, dia nianiana tamin’ny tenany Izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka nanao hoe: «Homba fitahiana anao tokoa Aho ary hahamaro dia hahamaro fara sy dimby anao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 22.16-17.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nanam-paharetana i Abrahama ka, araka izany, dia nahazo izay nampanantenain’Andriamanitra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha mianiana ny olona, dia manao izany amin’ny anaran’izay lehibe noho ny tenany, ka ny fianianana no ho antoka mafy fa hitsahatra hatreo ny fifandirana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Sitrak’Andriamanitra hiharihary tsara kokoa tamin’ireto natao handova ny soa nampanantenainy, fa tsy miova ny fikasany; ka dia notovonany fianianana ny fampanantenana nataony: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ireo zavatra anankiroa ireo dia tsy azo ovàna sady tsy hain’Andriamanitra andaingana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Nom 23.19. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zavatra anankiroa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ny fampanantenana sy ny fianianana.'
    marker-yv: yv-n
  - type: text
    text: '. Noho izany, isika izay mitady fiarovana ao amin’Andriamanitra dia mahazo fampirisihana mafy hitana tsara ny fanantenana natolotra antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Toy ny vatofantsiky ny aintsika izany fanantenana izany ho antsika, fanantenana azo antoka sy mafy ary mamaky ny efitra lamban’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' any an-danitra ka miditra hatrany anatin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina Indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Fisor 16.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ao i Jesoa no tafiditra nialoha antsika mba ho fanasoavana antsika, rehefa tonga '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisorombe
  - type: text
    text: ' mandrakizay araka ny fomban’i Melkitsedeka.'
