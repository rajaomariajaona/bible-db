document_id: HEB.6,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Noho izany, aoka hilaozantsika ny abidim-pianarana momba an’i '
  - type: text
    content: Kristy
  - type: text
    content: ', fa aoka isika handroso amin’ny fampianarana sahaza ny olon-dehibe. Tsy hoe fanorenana indray no hataontsika: dia ny tokony hialana amin’ireo asa mitondra fahafatesana sy ny tokony hinoana an’Andriamanitra, '
  '10':
  - type: text
    content: 'Fa tsy manao ny tsy rariny Andriamanitra: tsy hohadinoiny akory ny asanareo sy ny fitiavanareo Azy nasehonareo tamin’ny nanompoanareo sady mbola anompoanareo ny kristianina havanareo. '
  '11':
  - type: text
    content: 'Ary dia irînay haneho fahazotoana toy izany hatramin’ny farany ianareo tsirairay avy, mba ho tanteraka tokoa ny zavatra antenainareo. '
  '12':
  - type: text
    content: Tsy tianay ho ketraka ianareo fa mba hanahaka ireo mino sy maharitra ka manana anjara amin’ny soa nampanantenain’Andriamanitra.
  - type: heading
    content: Fampanantenana azo antoka ataon’Andriamanitra
  '13':
  - type: text
    content: 'Ny fampanantenana nataon’Andriamanitra tamin’i Abrahama dia nombàm-pianianana. Ary satria tsy nisy lehibe noho ny tenany hianianan’Andriamanitra, dia nianiana tamin’ny tenany Izy '
  '14':
  - type: text
    content: 'ka nanao hoe: «Homba fitahiana anao tokoa Aho ary hahamaro dia hahamaro fara sy dimby anao'
  - type: note
    content: Gen 22.16-17.
  - type: text
    content: '.» '
  '15':
  - type: text
    content: 'Nanam-paharetana i Abrahama ka, araka izany, dia nahazo izay nampanantenain’Andriamanitra azy. '
  '16':
  - type: text
    content: 'Raha mianiana ny olona, dia manao izany amin’ny anaran’izay lehibe noho ny tenany, ka ny fianianana no ho antoka mafy fa hitsahatra hatreo ny fifandirana. '
  '17':
  - type: text
    content: 'Sitrak’Andriamanitra hiharihary tsara kokoa tamin’ireto natao handova ny soa nampanantenainy, fa tsy miova ny fikasany; ka dia notovonany fianianana ny fampanantenana nataony: '
  '18':
  - type: text
    content: ireo zavatra anankiroa ireo dia tsy azo ovàna sady tsy hain’Andriamanitra andaingana
  - type: note
    content: 'Ampit Nom 23.19. –zavatra anankiroa: dia ny fampanantenana sy ny fianianana.'
  - type: text
    content: '. Noho izany, isika izay mitady fiarovana ao amin’Andriamanitra dia mahazo fampirisihana mafy hitana tsara ny fanantenana natolotra antsika. '
  '19':
  - type: text
    content: 'Toy ny vatofantsiky ny aintsika izany fanantenana izany ho antsika, fanantenana azo antoka sy mafy ary mamaky ny efitra lamban’ilay '
  - type: text
    content: tempoly
  - type: text
    content: ' any an-danitra ka miditra hatrany anatin’ny '
  - type: text
    content: Toeramasina Indrindra
  - type: note
    content: Ampit Fisor 16.2.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'ny fampianarana momba ny '
  - type: text
    content: batisa
  - type: text
    content: ' samihafa'
  - type: note
    content: 'batisa samihafa: mety hilazana ireo fombam-pivavahana fidiovana fanaon’ny Jiosy sy fanaon’ny hafa firenena izany, na ny fombafomba isan-karazany arahina amin’ny fanaovana batisa kristianina, na koa ny fanavahana ny batisan’i Jôhany sy ny batisa kristianina (ampit Asa 18.25; 19.3-6).'
  - type: text
    content: ' sy ny '
  - type: text
    content: fametrahan-tanana
  - type: text
    content: ' ary momba ny '
  - type: text
    content: fitsanganan’ny maty
  - type: text
    content: ' ho velona sy ny fitsarana mandrakizay. '
  '20':
  - type: text
    content: 'Ao i Jesoa no tafiditra nialoha antsika mba ho fanasoavana antsika, rehefa tonga '
  - type: text
    content: Mpisorombe
  - type: text
    content: ' mandrakizay araka ny fomban’i Melkitsedeka.'
  '3':
  - type: text
    content: Fa ny mandroso amin’ny fampianarana sahaza ny olon-dehibe, izany no hataontsika raha avelan’Andriamanitra.
  '4':
  - type: text
    content: 'Ahoana kosa ny amin’ireo niverina tamin’ny toe-dratsy? Efa nohazavain’Andriamanitra indray mandeha ireo, efa nanandrana ny fanomezana avy any an-danitra ary efa nandray anjara tamin’ny Fanahy Masina, '
  '5':
  - type: text
    content: 'efa nahatsapa fa tsara ny tenin’Andriamanitra ary efa nahatsapa ny asa mahagaga vokatry ny fiainana ho avy, '
  '6':
  - type: text
    content: 'kanefa dia niverina tamin’ny toe-dratsy. Tsy azo havaozina indray ireo mba hiala amin’ny toetra ratsiny, satria manombo ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ' amin’ny hazofijaliana indray sady manolotra Azy halàm-baràka'
  - type: note
    content: Ampit 10.26.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Izay tany mifoka ny ranonorana milatsaka aminy matetika ka mahavokatra anana tsara ho an’ny olona iasana azy, dia mahazo fitahiana avy amin’Andriamanitra. '
  '8':
  - type: text
    content: Fa izay tany maniry tsilo sy songosongo kosa dia tsy misy antony sady efa hiharan’ny ozon’Andriamanitra; ary hodorana no hiafarany
  - type: note
    content: Ampit Gen 3.17-18.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Na izany aza no teninay, ry hava-malala, dia zavatra tsara kokoa sady miantoka ny famonjena anareo no antenainay, raha ny aminareo. '
