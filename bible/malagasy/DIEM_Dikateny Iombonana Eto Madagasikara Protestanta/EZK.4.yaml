document_id: EZK.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Ezekiela sy ny fahiranon’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampian’ny Tompo hoe: «Ry ilay taranak’olombelona, makà takela-tanimanga iray ianao ary apetraho eo anatrehanao; dia manaova sarin-tanàna eo aminy hoenti-maneho an’i Jerosalema. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fahefa-kilao isan’andro no sakafo hohaninao: ataovy ampy anao izany ambara-pahatongan’ny andro manaraka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ferana ho iray litatra isan’andro koa ny rano hosotroinao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatao miendrika mofo ôrza ny sakafonao, ka dikin’olona no hataonao kitay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ka dikin’olona no hataonao kitay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: heverina ho maloto* ny dikin’ny olona raha atao kitay ka mandoto ny sakafo andrahoina aminy, jereo and 13.
      marker-yv: yv-n
    - type: text
      text: ' hanendasanao azy eo imason’ny besinimaro.»'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mbola nampian’ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ho tahaka izany no hihinanan’ny Israelita sakafo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ' any amin’ny tanin’ny firenen-kafa izay handroahako azy.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly aho hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Adray, ry Tompo ANDRIANANAHARY ô, tsy mbola voaloto mihitsy aho! Hatramin’ny fahazazako ka mandraka ankehitriny dia tsy mbola nihinana biby maty ho azy na voaviraviran’ny bibidia aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'biby maty ho azy na voaviraviran’ny bibidia: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny mihinana biby tsy nalatsa-dra dia voararan’ny lalàna, jereo Lev 17.15; Deot 14.21.
      marker-yv: yv-n
    - type: text
      text: ', ary tsy mbola nikasika ny vavako akory ny hena heverina ho maloto.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny Tompo tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha izany àry, dia tain’omby no omeko anao ho solon’ny dikin’olona; ka izany no hataonao kitay hanendasanao ny mofonao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray ny Tompo tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry ilay taranak’olombelona, hitanao izao fa hosimbako ny tahiri-mofon’i Jerosalema. Tsy maintsy hametra mafy ny hanina sy ny fisotrony ny olona, ka ho azom-panahiana amin’izany. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy hanana mofo sy rano ny olona, ka hivarahontsana sy hihalevona noho ny fahotany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asehoy fa voan’ny fahirano izy amin’ny fametrahana hady fanafihana sy tovon-tany ary tobim-pamelezana sy kanontabe manodidina azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Makà takela-by ka apetraho izany ho toy ny manda manelanelana anao sy ny tanàna. Banjino tsara ny tanàna: voan’ny fahirano izy izao, ary ianao no manao fahirano azy. Izany dia ho marika fampitandremana ho an’ny taranak’i Israely.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Dia mandria ilika amin’ny ilanao havia ianao; fa araka ny haharetanao amin’izany fomba fandry izany no hivesaranao ny fahotan’ny fanjakàn’i Israely, fa ianao no hivesatra azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ferako hitovy isa amin’ny taona nanotan’i Israely no hanaovanao izany. Koa ho 390 andro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: '390 andro: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: io tarehimarika io raha boriborina dia mety hampitodika antsika amin’ny isan’ny taona lany teo anelanelan’ny nizaran’ny fanjakan’i Sôlômôna ho roa (1 Mp 12.19) sy ny fahazoan’ny fahavalo an’i Jerosalema (manodidina ny 587 tal J.K.).
      marker-yv: yv-n
    - type: text
      text: ' no hivesaranao ny fahotany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa mifarana izany fotoana izany, dia mivadiha ianao handry amin’ny ilanao havanana; ka mandritra ny efapolo andro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny isa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: efapolo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' matetika dia ilazana an’ohatra ny fotoam-pisedrana, ohatra ny efapolo andron’ny safo-drano, ny efapolo taona namakivakiana ny taniefitra.'
      marker-yv: yv-n
    - type: text
      text: ' no hivesaranao ny fahotan’ny fanjakàn’i Joda. Ferako ho andro iray isaky ny taona iray nanotany no hanaovanao izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aorian’izany dia banjino i Jerosalema voafahirano; ary ahinjiro manandrify azy ny sandrinao mihanjaka, ka lazao ny hafatra avy amiko hamelezana io tanàna io. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hafatotro ianao mandritra ny fanaovanao fahirano mba tsy hahafahanao mivadibadika. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa makà varimbazaha sy ôrza, tsaramaso sy voanemba ary ampemby sy vary henjana, dia ampifangaroy anaty vilia iray ireo mba hanaovanao mofo. Izany no ho sakafonao mandritra ny 390 andro izay handrianao amin’ny ilanao. '
