document_id: EZK.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Ezekiela sy ny fahiranon’i Jerosalema
  - type: text
    content: 'Dia nampian’ny Tompo hoe: «Ry ilay taranak’olombelona, makà takela-tanimanga iray ianao ary apetraho eo anatrehanao; dia manaova sarin-tanàna eo aminy hoenti-maneho an’i Jerosalema. '
  '10':
  - type: text
    content: 'Fahefa-kilao isan’andro no sakafo hohaninao: ataovy ampy anao izany ambara-pahatongan’ny andro manaraka. '
  '11':
  - type: text
    content: 'Ferana ho iray litatra isan’andro koa ny rano hosotroinao. '
  '12':
  - type: text
    content: Hatao miendrika mofo ôrza ny sakafonao, ka dikin’olona no hataonao kitay
  - type: note
    content: 'ka dikin’olona no hataonao kitay: heverina ho maloto* ny dikin’ny olona raha atao kitay ka mandoto ny sakafo andrahoina aminy, jereo and 13.'
  - type: text
    content: ' hanendasanao azy eo imason’ny besinimaro.»'
  '13':
  - type: text
    content: 'Dia mbola nampian’ny TOMPO hoe:'
  - type: text
    content: '–Ho tahaka izany no hihinanan’ny Israelita sakafo '
  - type: text
    content: maloto
  - type: text
    content: ' any amin’ny tanin’ny firenen-kafa izay handroahako azy.'
  '14':
  - type: text
    content: 'Dia namaly aho hoe:'
  - type: text
    content: –Adray, ry Tompo ANDRIANANAHARY ô, tsy mbola voaloto mihitsy aho! Hatramin’ny fahazazako ka mandraka ankehitriny dia tsy mbola nihinana biby maty ho azy na voaviraviran’ny bibidia aho
  - type: note
    content: 'biby maty ho azy na voaviraviran’ny bibidia: ny mihinana biby tsy nalatsa-dra dia voararan’ny lalàna, jereo Lev 17.15; Deot 14.21.'
  - type: text
    content: ', ary tsy mbola nikasika ny vavako akory ny hena heverina ho maloto.'
  '15':
  - type: text
    content: 'Ka hoy ny Tompo tamiko:'
  - type: text
    content: –Raha izany àry, dia tain’omby no omeko anao ho solon’ny dikin’olona; ka izany no hataonao kitay hanendasanao ny mofonao.
  '16':
  - type: text
    content: 'Ary hoy indray ny Tompo tamiko:'
  - type: text
    content: '–Ry ilay taranak’olombelona, hitanao izao fa hosimbako ny tahiri-mofon’i Jerosalema. Tsy maintsy hametra mafy ny hanina sy ny fisotrony ny olona, ka ho azom-panahiana amin’izany. '
  '17':
  - type: text
    content: Tsy hanana mofo sy rano ny olona, ka hivarahontsana sy hihalevona noho ny fahotany.
  '2':
  - type: text
    content: 'Asehoy fa voan’ny fahirano izy amin’ny fametrahana hady fanafihana sy tovon-tany ary tobim-pamelezana sy kanontabe manodidina azy. '
  '3':
  - type: text
    content: 'Makà takela-by ka apetraho izany ho toy ny manda manelanelana anao sy ny tanàna. Banjino tsara ny tanàna: voan’ny fahirano izy izao, ary ianao no manao fahirano azy. Izany dia ho marika fampitandremana ho an’ny taranak’i Israely.'
  '4':
  - type: text
    content: '«Dia mandria ilika amin’ny ilanao havia ianao; fa araka ny haharetanao amin’izany fomba fandry izany no hivesaranao ny fahotan’ny fanjakàn’i Israely, fa ianao no hivesatra azy. '
  '5':
  - type: text
    content: Ferako hitovy isa amin’ny taona nanotan’i Israely no hanaovanao izany. Koa ho 390 andro
  - type: note
    content: '390 andro: io tarehimarika io raha boriborina dia mety hampitodika antsika amin’ny isan’ny taona lany teo anelanelan’ny nizaran’ny fanjakan’i Sôlômôna ho roa (1 Mp 12.19) sy ny fahazoan’ny fahavalo an’i Jerosalema (manodidina ny 587 tal J.K.).'
  - type: text
    content: ' no hivesaranao ny fahotany. '
  '6':
  - type: text
    content: Rehefa mifarana izany fotoana izany, dia mivadiha ianao handry amin’ny ilanao havanana; ka mandritra ny efapolo andro
  - type: note
    content: Ny isa efapolo matetika dia ilazana an’ohatra ny fotoam-pisedrana, ohatra ny efapolo andron’ny safo-drano, ny efapolo taona namakivakiana ny taniefitra.
  - type: text
    content: ' no hivesaranao ny fahotan’ny fanjakàn’i Joda. Ferako ho andro iray isaky ny taona iray nanotany no hanaovanao izany. '
  '7':
  - type: text
    content: 'Aorian’izany dia banjino i Jerosalema voafahirano; ary ahinjiro manandrify azy ny sandrinao mihanjaka, ka lazao ny hafatra avy amiko hamelezana io tanàna io. '
  '8':
  - type: text
    content: 'Ary hafatotro ianao mandritra ny fanaovanao fahirano mba tsy hahafahanao mivadibadika. '
  '9':
  - type: text
    content: 'Koa makà varimbazaha sy ôrza, tsaramaso sy voanemba ary ampemby sy vary henjana, dia ampifangaroy anaty vilia iray ireo mba hanaovanao mofo. Izany no ho sakafonao mandritra ny 390 andro izay handrianao amin’ny ilanao. '
