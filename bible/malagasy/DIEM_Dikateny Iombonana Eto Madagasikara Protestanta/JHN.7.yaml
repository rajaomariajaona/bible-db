document_id: JHN.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy mino an’i Jesoa ny rahalahiny
  - type: text
    content: 'Taorian’izany i Jesoa dia nitety an’i Galilea fa tsy te hitety an’i Jodea, satria notadiavin’ny manampahefana jiosy hovonoina. '
  '10':
  - type: text
    content: 'Rehefa lasa niakatra any amin’io fankalazana io ny rahalahiny, dia niakatra koa i Jesoa, nefa tsy mba nisehoseho fa toa niafinafina. '
  '11':
  - type: text
    content: Nandritra ny fankalazana
  - type: note
    content: Jereo 7.2 sy nta.
  - type: text
    content: ' dia nitady Azy ny manampahefana jiosy ary fatra-panontany hoe:'
  - type: text
    content: –Aiza Izy?
  '12':
  - type: text
    content: 'Ary nitakoritsika be ny amin’i Jesoa ny vahoaka; ny sasany nanao hoe: «Tsara fanahy Izy»; ny sasany kosa nanao hoe: «Tsy izany, fa mamitaka ny vahoaka Izy.» '
  '13':
  - type: text
    content: Saingy tsy nisy niresaka Azy an-karihary noho ny fahatahorana ny manampahefana jiosy.
  '14':
  - type: text
    content: Teo antenatenan’ny fankalazana, dia niakatra tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Jesoa ka nampianatra. '
  '15':
  - type: text
    content: 'Dia gaga ny manampahefana jiosy ka vaky vava hoe:'
  - type: text
    content: '–Ahoana no ahaizan’ilay io '
  - type: text
    content: Soratra Masina
  - type: text
    content: ', nefa tsy mba nianatra Izy'
  - type: note
    content: Ampit Mt 13.54; Lk 2.47.
  - type: text
    content: '?'
  '16':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Tsy Ahy ny fampianarako, fa an’Ilay naniraka Ahy. '
  '17':
  - type: text
    content: 'Raha misy olona te hanao ny sitrapon’Andriamanitra, dia hahalala ny amin’ny fampianarako izy, na zavatra avy amin’Andriamanitra izany na zavatra teneniko avy amiko fotsiny. '
  '18':
  - type: text
    content: 'Izay miteny zavatra avy amin’ny tenany fotsiny dia mitady ny voninahitra ho an’ny tenany; fa izay mitady ny voninahitr’ilay naniraka azy no azo antoka sady tsy misy fitaka ao aminy. '
  '19':
  - type: text
    content: Moa tsy nomen’i Mosesy anareo ve ny lalàna? Kanefa tsy misy aminareo manatanteraka ny lalàna! Nahoana Aho no tadiavinareo hovonoina?
  '2':
  - type: text
    content: 'Efa akaiky kosa ny fankalazana fanaon’ny Jiosy, dia ny fankalazana ny '
  - type: text
    content: Tranolay
  - type: text
    content: '; '
  '20':
  - type: text
    content: 'Dia hoy ny vahoaka taminy:'
  - type: text
    content: –Ondranondranana Ianao! Iza no mitady hamono Anao?
  '21':
  - type: text
    content: 'Ka novalian’i Jesoa hoe:'
  - type: text
    content: '–Asa iray monja no nataoko, dia gaga ianareo rehetra! '
  '22':
  - type: text
    content: 'Noho i Mosesy nanome didy anareo hanao '
  - type: text
    content: famorana
  - type: text
    content: ' (kanefa tsy i Mosesy no nipoirany fa ny razanareo'
  - type: note
    content: Jereo Lev 12.3; Gen 17.10-13.
  - type: text
    content: '), dia mamora olona ihany ianareo na amin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' aza. '
  '23':
  - type: text
    content: Koa raha andro sabata no amorana olona mba tsy hahafoana ny lalànan’i Mosesy, dia tezitra amiko ve ianareo raha misy lehilahy anankiray nataoko sitrana soa aman-tsara ny tenany manontolo tamin’ny andro sabata
  - type: note
    content: Jereo 5.8-9.
  - type: text
    content: '? '
  '24':
  - type: text
    content: Aza dia mitsara araka ny ivelany fa mitsarà araka ny rariny
  - type: note
    content: Ampit Lev 19.15; Is 11.4.
  - type: text
    content: .
  - type: heading
    content: I Jesoa ve no ilay Mesia?
  '25':
  - type: text
    content: 'Tamin’izay ny mponina sasany tao Jerosalema nanao hoe:'
  - type: text
    content: '–Tsy Izy io ve Ilay tadiavin-dry zareo hovonoina? '
  '26':
  - type: text
    content: 'Indro Izy miteny an-karihary, kanefa ry zareo tsy mandrara Azy akory! Sao dia efa azon’ireo filohantsika antoka fa Izy no ilay '
  - type: text
    content: Mesia
  - type: text
    content: '? '
  '27':
  - type: text
    content: Ilay io anefa dia fantatsika ny ipoirany; fa ny Mesia, rehefa tonga, dia tsy misy mahalala ny ipoirany.
  '28':
  - type: text
    content: Koa raha nampianatra tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Jesoa, dia niantso mafy hoe:'
  - type: text
    content: '–Izaho ve dia fantatrareo tokoa, ary fantatrareo tokoa ve ny ipoirako? Tsy avy amin’ny tenako no nahatongavako; fa azo antoka Ilay naniraka Ahy, saingy ianareo tsy mahalala Azy. '
  '29':
  - type: text
    content: Izaho no mahalala Azy, satria avy any aminy no ipoirako sady Izy no naniraka Ahy.
  '3':
  - type: text
    content: 'ka hoy ny rahalahin’i Jesoa taminy:'
  - type: text
    content: '–Mialà eto Ianao ka mandehana any Jodea, mba ho hitan’ny '
  - type: text
    content: mpianatrao
  - type: text
    content: ' koa ireo asa ataonao. '
  '30':
  - type: text
    content: 'Tamin’izay dia nitady hisambotra Azy ny olona, kanefa tsy nisy naninji-tanana taminy satria tsy mbola tonga ny fotoanandron’i Jesoa. '
  '31':
  - type: text
    content: 'Maro kosa tamin’ny vahoaka no nino Azy sady niteny hoe: «Rehefa tonga ny Mesia, moa ve hanao famantarana maro mihoatra ny nataon’Izy io?»'
  - type: heading
    content: Irahina hisambotra an’i Jesoa ny mpiandry raharaha
  '32':
  - type: text
    content: 'Ren’ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' ny vahoaka mitakoritsika ny amin’i Jesoa toy izany; ka naniraka mpiandry raharaha hisambotra Azy ny lohandoha-mpisorona sy ny Farisianina. '
  '33':
  - type: text
    content: 'Dia hoy i Jesoa:'
  - type: text
    content: '–Kely foana sisa no itoerako aminareo, dia hankany amin’Ilay naniraka Ahy aho. '
  '34':
  - type: text
    content: Hitady Ahy ianareo fa tsy hahita, satria ny toerana hisy Ahy tsy azonareo aleha!
  '35':
  - type: text
    content: 'Tamin’izay ny manampahefana jiosy dia nifampilaza hoe:'
  - type: text
    content: –Aiza no toerana halehan’ilay io no tsy ho hitantsika Izy? Hankany amin’ireo Jiosy miely any amin’ny Grika
  - type: note
    content: Ny hoe Grika eto dia manondro ireo olona tsy Jiosy, fa tsy ireo Jiosy am-pielezana ivelan’i Palestinina.
  - type: text
    content: ' ve Izy ka hampianatra ny Grika? '
  '36':
  - type: text
    content: 'Inona no hevitr’ity teny voalazany hoe: «Hitady Ahy ianareo fa tsy hahita, sady ny toerana hisy Ahy tsy azonareo aleha»?'
  - type: heading
    content: Onin-drano velona
  '37':
  - type: text
    content: Tamin’ilay andro lehibe famaranana
  - type: note
    content: Jereo Lev 23.36.
  - type: text
    content: ' ny fankalazana, dia nijoro i Jesoa ka niantso mafy hoe:'
  - type: text
    content: '–Raha misy olona mangetaheta, aoka izy hanatona Ahy; '
  '38':
  - type: text
    content: 'ary izay mino Ahy, aoka hisotro! Fa araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: note
    content: 'Ireo tenin’i Jesoa, ao amin’ny and 37 sy 38, dia azo adika toy izao: Raha misy olona mangetaheta, aoka izy hanatona Ahy ka hisotro. «Izay mino Ahy dia hisy onin-drano velona hiboiboika avy ao am-pony», araka ny voalazan’ny Soratra Masina. –Ampit Ezek 47.1; Za 14.8; Ohab 18.4.'
  - type: text
    content: ', dia «hisy onin-dranovelona hiboiboika avy ao am-pony!»'
  '39':
  - type: text
    content: Ny Fanahy Masina efa horaisin’ireo nino an’i Jesoa no voalazany tamin’izany; tsy mbola nomena manko ny Fanahy Masina, satria tsy mbola nomem-boninahitra i Jesoa.
  - type: heading
    content: Mampifanohitra ny vahoaka ny amin’i Jesoa
  '4':
  - type: text
    content: Fa tsy misy olona manafina izay ataony raha mitady ho fanta-bahoaka. Raha manao ireny zavatra ireny Ianao, dia misehoa amin’izao tontolo izao.
  '40':
  - type: text
    content: 'Ny sasany tamin’ny vahoaka, nony nandre ireo teny ireo, dia nanao hoe:'
  - type: text
    content: '–Ity tokoa no ilay '
  - type: text
    content: Mpaminany
  - type: text
    content: '!'
  '41':
  - type: text
    content: 'Ny sasany nanao hoe:'
  - type: text
    content: '–Ity no ilay '
  - type: text
    content: Mesia
  - type: text
    content: '!'
  - type: text
    content: 'Ny sasany kosa nanao hoe:'
  - type: text
    content: –Fa angaha avy any Galilea
  - type: note
    content: Ampit 1.46; 7.52.
  - type: text
    content: ' no iavian’ny Mesia? '
  '42':
  - type: text
    content: 'Tsy efa voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' ve fa avy amin’ny taranak’i Davida sady avy ao Betlehema tanàna nonenan’i Davida no iavian’ny Mesia'
  - type: note
    content: Jereo 2 Sam 7.12; Mi 5.1; Lk 2.4.
  - type: text
    content: '?'
  '43':
  - type: text
    content: 'Koa nisara-tsaina ny amin’i Jesoa ny vahoaka; '
  '44':
  - type: text
    content: ny sasany tamin’izy ireo dia nitady hisambotra Azy, kanefa tsy nisy naninji-tanana taminy.
  - type: heading
    content: Tsy mino an’i Jesoa ireo manampahefana jiosy
  '45':
  - type: text
    content: 'Dia niverina tany amin’ireo lohandoha-mpisorona sy ireo '
  - type: text
    content: Farisianina
  - type: text
    content: ' ny mpiandry raharaha ka nilazan-dry zareo hoe:'
  - type: text
    content: –Ahoana no tsy nitondranareo Azy?
  '46':
  - type: text
    content: 'Dia novalian’ny mpiandry raharaha hoe:'
  - type: text
    content: –Tsy mbola nisy olona niteny tahaka izany!
  '47':
  - type: text
    content: 'Ka hoy ny Farisianina taminy:'
  - type: text
    content: '–Ianareo koa angaha voafitaka? '
  '48':
  - type: text
    content: 'Moa ve misy anankiray amin’ireo filohantsika na anankiray amin’ireo Farisianina mba nino Azy? '
  '49':
  - type: text
    content: 'Saingy ireto vahoaka tsy mahalala ny '
  - type: text
    content: lalànan
  - type: text
    content: ’i Mosesy no olona voaozona!
  '5':
  - type: text
    content: 'Fa na dia ny rahalahiny aza tsy nino Azy; '
  '50':
  - type: text
    content: 'Fa i Nikôdema, ilay efa nanatona an’i Jesoa teo aloha sady anisan’ny Farisianina, dia niteny tamin-dry zareo hoe:'
  '51':
  - type: text
    content: –Moa ny lalànantsika ve manameloka olona raha tsy efa re aloha izy sady fantatra izay nataony
  - type: note
    content: Ampit Deot 1.16.
  - type: text
    content: '?'
  '52':
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –Ianao koa angaha mba avy any Galilea? Diniho dia ho hitanao fa tsy misy mpaminany mipoitra avy any Galilea
  - type: note
    content: Ampit 1.46; 7.41.
  - type: text
    content: '!'
  - type: heading
    content: Ilay vehivavy azo nanitsakitsa-bady
  - type: text
    content: '[ '
  '53':
  - type: text
    content: Dia samy lasa nody any an-tranony avy ry zareo.
  '6':
  - type: text
    content: 'ka hoy i Jesoa taminy:'
  - type: text
    content: '–Tsy mbola migadona ny fotoanandroko, fa ny fotoanandro dia mety lalandava ho anareo. '
  '7':
  - type: text
    content: 'Tsy afa-mankahala anareo izao tontolo izao; fa Izaho no ankahalainy, satria mijoro ho vavolombelona manambara fa ratsy ny asany. '
  '8':
  - type: text
    content: Miakara any amin’ny fankalazana ianareo, fa Izaho tsy mbola miakatra
  - type: note
    content: 'Izaho tsy mbola miakatra...: misy stf sasany ahitana fotsiny hoe Izaho tsy miakatra...'
  - type: text
    content: ' any amin’izany fankalazana izany, satria tsy mbola feno ny fotoanandroko.'
  '9':
  - type: text
    content: Nony avy nilaza izany i Jesoa, dia nijanona tao Galilea ihany.
  - type: heading
    content: Tany amin’ny fankalazana ny Tranolay
