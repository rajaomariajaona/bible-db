      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 12.3; Gen 17.10-13.
      marker-yv: yv-n
    - type: text
      text: '), dia mamora olona ihany ianareo na amin’ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' aza. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa raha andro sabata no amorana olona mba tsy hahafoana ny lalànan’i Mosesy, dia tezitra amiko ve ianareo raha misy lehilahy anankiray nataoko sitrana soa aman-tsara ny tenany manontolo tamin’ny andro sabata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 5.8-9.
      marker-yv: yv-n
    - type: text
      text: '? '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Aza dia mitsara araka ny ivelany fa mitsarà araka ny rariny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
