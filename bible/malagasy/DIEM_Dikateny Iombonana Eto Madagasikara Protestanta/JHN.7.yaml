document_id: JHN.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy mino an’i Jesoa ny rahalahiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany i Jesoa dia nitety an’i Galilea fa tsy te hitety an’i Jodea, satria notadiavin’ny manampahefana jiosy hovonoina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Efa akaiky kosa ny fankalazana fanaon’ny Jiosy, dia ny fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka hoy ny rahalahin’i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mialà eto Ianao ka mandehana any Jodea, mba ho hitan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatrao
  - type: text
    text: ' koa ireo asa ataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa tsy misy olona manafina izay ataony raha mitady ho fanta-bahoaka. Raha manao ireny zavatra ireny Ianao, dia misehoa amin’izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa na dia ny rahalahiny aza tsy nino Azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy mbola migadona ny fotoanandroko, fa ny fotoanandro dia mety lalandava ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy afa-mankahala anareo izao tontolo izao; fa Izaho no ankahalainy, satria mijoro ho vavolombelona manambara fa ratsy ny asany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Miakara any amin’ny fankalazana ianareo, fa Izaho tsy mbola miakatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izaho tsy mbola miakatra...: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana fotsiny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Izaho tsy miakatra...
    marker-yv: yv-n
  - type: text
    text: ' any amin’izany fankalazana izany, satria tsy mbola feno ny fotoanandroko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nony avy nilaza izany i Jesoa, dia nijanona tao Galilea ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Tany amin’ny fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa lasa niakatra any amin’io fankalazana io ny rahalahiny, dia niakatra koa i Jesoa, nefa tsy mba nisehoseho fa toa niafinafina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nandritra ny fankalazana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 7.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' dia nitady Azy ny manampahefana jiosy ary fatra-panontany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza Izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nitakoritsika be ny amin’i Jesoa ny vahoaka; ny sasany nanao hoe: «Tsara fanahy Izy»; ny sasany kosa nanao hoe: «Tsy izany, fa mamitaka ny vahoaka Izy.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Saingy tsy nisy niresaka Azy an-karihary noho ny fahatahorana ny manampahefana jiosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Teo antenatenan’ny fankalazana, dia niakatra tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' i Jesoa ka nampianatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia gaga ny manampahefana jiosy ka vaky vava hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ahoana no ahaizan’ilay io '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ', nefa tsy mba nianatra Izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 13.54; Lk 2.47.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy Ahy ny fampianarako, fa an’Ilay naniraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha misy olona te hanao ny sitrapon’Andriamanitra, dia hahalala ny amin’ny fampianarako izy, na zavatra avy amin’Andriamanitra izany na zavatra teneniko avy amiko fotsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izay miteny zavatra avy amin’ny tenany fotsiny dia mitady ny voninahitra ho an’ny tenany; fa izay mitady ny voninahitr’ilay naniraka azy no azo antoka sady tsy misy fitaka ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moa tsy nomen’i Mosesy anareo ve ny lalàna? Kanefa tsy misy aminareo manatanteraka ny lalàna! Nahoana Aho no tadiavinareo hovonoina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy ny vahoaka taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ondranondranana Ianao! Iza no mitady hamono Anao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ka novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Asa iray monja no nataoko, dia gaga ianareo rehetra! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Noho i Mosesy nanome didy anareo hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famorana
  - type: text
    text: ' (kanefa tsy i Mosesy no nipoirany fa ny razanareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 12.3; Gen 17.10-13.
    marker-yv: yv-n
  - type: text
    text: '), dia mamora olona ihany ianareo na amin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Koa raha andro sabata no amorana olona mba tsy hahafoana ny lalànan’i Mosesy, dia tezitra amiko ve ianareo raha misy lehilahy anankiray nataoko sitrana soa aman-tsara ny tenany manontolo tamin’ny andro sabata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 5.8-9.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aza dia mitsara araka ny ivelany fa mitsarà araka ny rariny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lev 19.15; Is 11.4.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'I Jesoa ve no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '?'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tamin’izay ny mponina sasany tao Jerosalema nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy Izy io ve Ilay tadiavin-dry zareo hovonoina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Indro Izy miteny an-karihary, kanefa ry zareo tsy mandrara Azy akory! Sao dia efa azon’ireo filohantsika antoka fa Izy no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ilay io anefa dia fantatsika ny ipoirany; fa ny Mesia, rehefa tonga, dia tsy misy mahalala ny ipoirany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Koa raha nampianatra tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' i Jesoa, dia niantso mafy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho ve dia fantatrareo tokoa, ary fantatrareo tokoa ve ny ipoirako? Tsy avy amin’ny tenako no nahatongavako; fa azo antoka Ilay naniraka Ahy, saingy ianareo tsy mahalala Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izaho no mahalala Azy, satria avy any aminy no ipoirako sady Izy no naniraka Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tamin’izay dia nitady hisambotra Azy ny olona, kanefa tsy nisy naninji-tanana taminy satria tsy mbola tonga ny fotoanandron’i Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Maro kosa tamin’ny vahoaka no nino Azy sady niteny hoe: «Rehefa tonga ny Mesia, moa ve hanao famantarana maro mihoatra ny nataon’Izy io?»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Irahina hisambotra an’i Jesoa ny mpiandry raharaha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ren’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' ny vahoaka mitakoritsika ny amin’i Jesoa toy izany; ka naniraka mpiandry raharaha hisambotra Azy ny lohandoha-mpisorona sy ny Farisianina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia hoy i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Kely foana sisa no itoerako aminareo, dia hankany amin’Ilay naniraka Ahy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Hitady Ahy ianareo fa tsy hahita, satria ny toerana hisy Ahy tsy azonareo aleha!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tamin’izay ny manampahefana jiosy dia nifampilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza no toerana halehan’ilay io no tsy ho hitantsika Izy? Hankany amin’ireo Jiosy miely any amin’ny Grika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Grika
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto dia manondro ireo olona tsy Jiosy, fa tsy ireo Jiosy am-pielezana ivelan’i Palestinina.'
    marker-yv: yv-n
  - type: text
    text: ' ve Izy ka hampianatra ny Grika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Inona no hevitr’ity teny voalazany hoe: «Hitady Ahy ianareo fa tsy hahita, sady ny toerana hisy Ahy tsy azonareo aleha»?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Onin-drano velona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tamin’ilay andro lehibe famaranana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 23.36.
    marker-yv: yv-n
  - type: text
    text: ' ny fankalazana, dia nijoro i Jesoa ka niantso mafy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha misy olona mangetaheta, aoka izy hanatona Ahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary izay mino Ahy, aoka hisotro! Fa araka ny voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ireo tenin’i Jesoa, ao amin’ny and 37 sy 38, dia azo adika toy izao: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Raha misy olona mangetaheta, aoka izy hanatona Ahy ka hisotro. «Izay mino Ahy dia hisy onin-drano velona hiboiboika avy ao am-pony», araka ny voalazan’ny Soratra Masina.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' –Ampit Ezek 47.1; Za 14.8; Ohab 18.4.'
    marker-yv: yv-n
  - type: text
    text: ', dia «hisy onin-dranovelona hiboiboika avy ao am-pony!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ny Fanahy Masina efa horaisin’ireo nino an’i Jesoa no voalazany tamin’izany; tsy mbola nomena manko ny Fanahy Masina, satria tsy mbola nomem-boninahitra i Jesoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampifanohitra ny vahoaka ny amin’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ny sasany tamin’ny vahoaka, nony nandre ireo teny ireo, dia nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ity tokoa no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpaminany
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ny sasany nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ity no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny sasany kosa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa angaha avy any Galilea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1.46; 7.52.
    marker-yv: yv-n
  - type: text
    text: ' no iavian’ny Mesia? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Tsy efa voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' ve fa avy amin’ny taranak’i Davida sady avy ao Betlehema tanàna nonenan’i Davida no iavian’ny Mesia'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 7.12; Mi 5.1; Lk 2.4.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Koa nisara-tsaina ny amin’i Jesoa ny vahoaka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ny sasany tamin’izy ireo dia nitady hisambotra Azy, kanefa tsy nisy naninji-tanana taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy mino an’i Jesoa ireo manampahefana jiosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dia niverina tany amin’ireo lohandoha-mpisorona sy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' ny mpiandry raharaha ka nilazan-dry zareo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana no tsy nitondranareo Azy?
- type: usfm
