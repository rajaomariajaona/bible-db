document_id: DEU.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vady nariana
  - type: text
    content: Mety misy lehilahy naka vady sy efa nampakatra azy; kanefa tafara tsy tia azy intsony ralehilahy noho ny ahitany zavatra azo kianina eo amin-dravehivavy. Dia hanoratra taratasy fanariam-bady ho an-dravehivavy izy
  - type: note
    content: Jereo Mt 5.31; 19.7; Mk 10.4.
  - type: text
    content: ' sy hanolotra izany eo an-tanany ka hampiala azy ao an-tranony. '
  '10':
  - type: text
    content: 'Rehefa ny namanareo no ampindraminareo zavatra na inona na inona, dia aza miditra ao an-tranony handray ny antoka aminy. '
  '11':
  - type: text
    content: 'Mijanòna ao alatrano, ary ny lehilahy izay nampindraminareo zavatra no hamoaka ny antoka ho aminareo ao alatrano. '
  '12':
  - type: text
    content: Raha ohatra lehilahy mahantra no manome ny lambany ho antoka, dia aza tananareo miloaka alina io antoka io fa tsy maintsy haverinareo aminy mihitsy rehefa tokony ho maty masoandro, mba hirakofany ka hisaorany anareo. Dia ho asa soa vitanareo izany eo anatrehan’ny TOMPO Andriamanitrareo
  - type: note
    content: 'And 10-13: jereo Eks 22.25-26.'
  - type: text
    content: .
  - type: heading
    content: Fitandroana ny zon’ny mpikarama mahantra
  '14':
  - type: text
    content: 'Aza ampahorînareo ny mpikarama izay mahantra sy ory, na anisan’ny mpiray firenena aminareo izy na anisan’ny vahiny eo amin’ny taninareo sy ao an-tanànanareo. '
  '15':
  - type: text
    content: Fa ny andro anaovany ihany no hanomezanareo ny karamany, ary aza avela ho tratry ny masoandro milentika izany satria mahantra izy sady io karama io no andrandrain’ny fony. Aoka tsy hitaraina amin’ny TOMPO noho ny nafitsokareo izy, fa dia ho fahotana aminareo izany
  - type: note
    content: 'And 14-15: jereo Lev 19.13.'
  - type: text
    content: .
  - type: heading
    content: Samy tompon’andraikitra amin’ny ataony
  '16':
  - type: text
    content: Ny ray aman-dreny tsy hatao maty amin’ny ataon’ny zanany ary ny zanaka tsy hatao maty amin’ny ataon’ny ray aman-dreniny; fa samy hatao maty amin’ny fahotany avy ny isam-batan’olona
  - type: note
    content: Jereo 2 Mp 14.6; 2 Tan 25.4; Ezek 18.20.
  - type: text
    content: .
  - type: heading
    content: Fepetra itsimbinana ny mahantra
  '17':
  - type: text
    content: 'Aza manao fitsarana miangatra amin’ny vahiny sy ny kamboty ary aza maka ny fitafian’ny mpitondratena ho antoka. '
  '18':
  - type: text
    content: Tsarovy fa nandevozina tany Ejipta ianareo, ary ny TOMPO Andriamanitrareo no efa nanavotra anareo ho afaka tany
  - type: note
    content: 'And 17-18: jereo 27.19; Eks 23.9; Lev 19.33-34.'
  - type: text
    content: ; koa izany no andidiako anareo hanatanteraka izany zavatra izany.
  '19':
  - type: text
    content: 'Rehefa jinjainareo ny varinareo any an-tsaha, ka misy amboara iray hadinonareo any, dia aza miverina haka azy; fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena izany. Dia '
  - type: text
    content: hotahîn
  - type: text
    content: '’ny TOMPO Andriamanitrareo ianareo amin’ny asa rehetra ataonareo. '
  '2':
  - type: text
    content: 'Rehefa niala ny trano ravehivavy, dia lasa nanambady olon-kafa. '
  '20':
  - type: text
    content: 'Rehefa ahintsanareo sy angoninareo ny ôlivanareo, dia aza miverina hioty izay ôliva sisa tavela; fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena izany. '
  '21':
  - type: text
    content: Rehefa otazanareo ny voalobokareo, dia aza miverina hitsimpona izay sampaho sisa tavela; fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena
  - type: note
    content: 'And 19-21: jereo Lev 19.9-10; 23.22.'
  - type: text
    content: ' izany. '
  '22':
  - type: text
    content: Tsarovy fa nandevozina tany Ejipta ianareo; koa izany no andidiako anareo hanatanteraka izany zavatra izany.
  '3':
  - type: text
    content: 'Mety tsy tia an-dravehivavy intsony ilay lehilahy faharoa nanambady azy ka manoratra taratasy fanariam-bady sy manolotra izany eo an-tanany ary mampiala azy ao an-tranony; na koa mety maty izany lehilahy faharoa nanambady azy izany. '
  '4':
  - type: text
    content: 'Ilay lehilahy voalohany nanambady azy ka nanary azy dia tsy mahazo manambady azy intsony, satria efa '
  - type: text
    content: voaloto
  - type: text
    content: ' ravehivavy ho azy sady zava-mahatsiravina eo imason’ny TOMPO izany. Aza atao tototra heloka ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo.'
  - type: heading
    content: Ny zatovo vao nampaka-bady
  '5':
  - type: text
    content: Rehefa misy lehilahy vao nampaka-bady, dia tsy handehandeha hiantafika izy ary tsy hampanaovina raharaham-bahoaka; fa havela izy hitoetra herintaona ao an-tranony ka hampifaly ny vady izay vao nampakariny.
  - type: heading
    content: Ny antoka
  '6':
  - type: text
    content: 'Aza misy maka ny '
  - type: text
    content: vato
  - type: text
    content: ' roa fikoseham-bary na ny vatony ambony ho antoka, fa maka aina ho antoka izany.'
  - type: heading
    content: Ny fangalana olona handevozina
  '7':
  - type: text
    content: Rehefa misy Israelita hita mangalatra ny anankiray amin’ireo mpiray firenena aminy ka manandevo azy na mivarotra azy, dia hatao maty ilay mpangalatra. Izany no hanesoranareo ny fanao ratsy ho fongotra eo aminareo
  - type: note
    content: Jereo Eks 21.16.
  - type: text
    content: .
  - type: heading
    content: Ny aretin-koditra
  '8':
  - type: text
    content: 'Mitandrema ny amin’ny '
  - type: text
    content: aretin-koditra
  - type: text
    content: ' isan-karazany, ka imasoy fatratra ny hanatanteraka ny zavatra rehetra hatoron’ireo Levita mpisorona'
  - type: note
    content: Jereo Eks 20.29.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Tsarovy izay nataon’ny TOMPO Andriamanitrareo tamin’i Miriama teny an-dalana, fony ianareo niala tany Ejipta
  - type: note
    content: Jereo Nom 12.10.
  - type: text
    content: .
  - type: heading
    content: Ny amin’ny antoka ihany
