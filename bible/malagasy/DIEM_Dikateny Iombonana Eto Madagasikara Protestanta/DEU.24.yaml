document_id: DEU.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vady nariana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mety misy lehilahy naka vady sy efa nampakatra azy; kanefa tafara tsy tia azy intsony ralehilahy noho ny ahitany zavatra azo kianina eo amin-dravehivavy. Dia hanoratra taratasy fanariam-bady ho an-dravehivavy izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 5.31; 19.7; Mk 10.4.
    marker-yv: yv-n
  - type: text
    text: ' sy hanolotra izany eo an-tanany ka hampiala azy ao an-tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Rehefa niala ny trano ravehivavy, dia lasa nanambady olon-kafa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mety tsy tia an-dravehivavy intsony ilay lehilahy faharoa nanambady azy ka manoratra taratasy fanariam-bady sy manolotra izany eo an-tanany ary mampiala azy ao an-tranony; na koa mety maty izany lehilahy faharoa nanambady azy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ilay lehilahy voalohany nanambady azy ka nanary azy dia tsy mahazo manambady azy intsony, satria efa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voaloto
  - type: text
    text: ' ravehivavy ho azy sady zava-mahatsiravina eo imason’ny TOMPO izany. Aza atao tototra heloka ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zatovo vao nampaka-bady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa misy lehilahy vao nampaka-bady, dia tsy handehandeha hiantafika izy ary tsy hampanaovina raharaham-bahoaka; fa havela izy hitoetra herintaona ao an-tranony ka hampifaly ny vady izay vao nampakariny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny antoka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aza misy maka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vato
  - type: text
    text: ' roa fikoseham-bary na ny vatony ambony ho antoka, fa maka aina ho antoka izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fangalana olona handevozina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Rehefa misy Israelita hita mangalatra ny anankiray amin’ireo mpiray firenena aminy ka manandevo azy na mivarotra azy, dia hatao maty ilay mpangalatra. Izany no hanesoranareo ny fanao ratsy ho fongotra eo aminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 21.16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny aretin-koditra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mitandrema ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: aretin-koditra
  - type: text
    text: ' isan-karazany, ka imasoy fatratra ny hanatanteraka ny zavatra rehetra hatoron’ireo Levita mpisorona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 20.29.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsarovy izay nataon’ny TOMPO Andriamanitrareo tamin’i Miriama teny an-dalana, fony ianareo niala tany Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 12.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny antoka ihany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa ny namanareo no ampindraminareo zavatra na inona na inona, dia aza miditra ao an-tranony handray ny antoka aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mijanòna ao alatrano, ary ny lehilahy izay nampindraminareo zavatra no hamoaka ny antoka ho aminareo ao alatrano. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: Raha ohatra lehilahy mahantra no manome ny lambany ho antoka, dia aza tananareo miloaka alina io antoka io fa tsy maintsy haverinareo aminy mihitsy rehefa tokony ho maty masoandro, mba hirakofany ka hisaorany anareo. Dia ho asa soa vitanareo izany eo anatrehan’ny TOMPO Andriamanitrareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.13 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 10-13:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 22.25-26.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitandroana ny zon’ny mpikarama mahantra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Aza ampahorînareo ny mpikarama izay mahantra sy ory, na anisan’ny mpiray firenena aminareo izy na anisan’ny vahiny eo amin’ny taninareo sy ao an-tanànanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa ny andro anaovany ihany no hanomezanareo ny karamany, ary aza avela ho tratry ny masoandro milentika izany satria mahantra izy sady io karama io no andrandrain’ny fony. Aoka tsy hitaraina amin’ny TOMPO noho ny nafitsokareo izy, fa dia ho fahotana aminareo izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.15 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 14-15:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lev 19.13.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samy tompon’andraikitra amin’ny ataony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny ray aman-dreny tsy hatao maty amin’ny ataon’ny zanany ary ny zanaka tsy hatao maty amin’ny ataon’ny ray aman-dreniny; fa samy hatao maty amin’ny fahotany avy ny isam-batan’olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 14.6; 2 Tan 25.4; Ezek 18.20.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fepetra itsimbinana ny mahantra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza manao fitsarana miangatra amin’ny vahiny sy ny kamboty ary aza maka ny fitafian’ny mpitondratena ho antoka. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsarovy fa nandevozina tany Ejipta ianareo, ary ny TOMPO Andriamanitrareo no efa nanavotra anareo ho afaka tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.18 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 17-18:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 27.19; Eks 23.9; Lev 19.33-34.
    marker-yv: yv-n
  - type: text
    text: ; koa izany no andidiako anareo hanatanteraka izany zavatra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rehefa jinjainareo ny varinareo any an-tsaha, ka misy amboara iray hadinonareo any, dia aza miverina haka azy; fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena izany. Dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hotahîn
  - type: text
    text: '’ny TOMPO Andriamanitrareo ianareo amin’ny asa rehetra ataonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rehefa ahintsanareo sy angoninareo ny ôlivanareo, dia aza miverina hioty izay ôliva sisa tavela; fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena izany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rehefa otazanareo ny voalobokareo, dia aza miverina hitsimpona izay sampaho sisa tavela; fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.21 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 19-21:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lev 19.9-10; 23.22.
    marker-yv: yv-n
  - type: text
    text: ' izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsarovy fa nandevozina tany Ejipta ianareo; koa izany no andidiako anareo hanatanteraka izany zavatra izany.
