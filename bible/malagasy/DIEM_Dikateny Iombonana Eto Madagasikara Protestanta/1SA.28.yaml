document_id: 1SA.28,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Tamin’izany andro izany dia nangonin’ny Filistinina ho tafika tokana ny miaramilany mba hiady amin’i Israely. Ary hoy i Akisy tamin’i Davida:'
  - type: text
    content: –Fantatrao tsara fa hiantafika hiaraka amiko ianao sy ny olonao.
  '10':
  - type: text
    content: 'Ary nianiana taminy sady nanonona ny anaran’ny TOMPO i Saoly ka nanao hoe:'
  - type: text
    content: –Velona ny TOMPO ka milaza marina aho fa tsy hampaninona anao akory izao raharaha izao.
  '11':
  - type: text
    content: 'Dia nanontany azy ilay vehivavy hoe:'
  - type: text
    content: –Iza àry no tianao hantsoiko hanketo aminao?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –I Samoela antsoina hanketo amiko.
  '12':
  - type: text
    content: 'Nony nahita an’i Samoela ilay vehivavy, dia niantsoantso mafy ary nanao tamin’i Saoly hoe:'
  - type: text
    content: –Nahoana no dia nofitahinao aho? Hay i Saoly ianao!
  '13':
  - type: text
    content: 'Ka hoy ny mpanjaka taminy:'
  - type: text
    content: –Aza matahotra; fa inona no hitanao?
  - type: text
    content: 'Namaly kosa ravehivavy hoe:'
  - type: text
    content: –Matoatoa miakatra avy ao amin’ny tany no hitako.
  '14':
  - type: text
    content: 'Ary hoy ihany ny mpanjaka taminy:'
  - type: text
    content: –Manao ahoana izy izany?
  - type: text
    content: 'Dia hoy ravehivavy hoe:'
  - type: text
    content: –Lehilahy antitra misalotra akanjobe no miakatra.
  - type: text
    content: 'Fantatr’i Saoly fa i Samoela marina izay; koa dia niankohoka tamin’ny tany ho mari-panajana izy. '
  '15':
  - type: text
    content: 'Nanontany azy kosa i Samoela hoe:'
  - type: text
    content: –Fa ahoana no kotabainao aho ka nampiantsoinao?
  - type: text
    content: 'Dia hoy ny navalin’i Saoly:'
  - type: text
    content: –Mafy ny manjo ahy, fa miady amiko ny Filistinina ary efa nandao ahy Andriamanitra ka tsy mamaly ahy intsony na amin’ny mpaminany na amin’ny nofy. Izany no nampiantsoako anao mba hampahafantatra ahy izay tokony hataoko.
  '16':
  - type: text
    content: 'Fa hoy i Samoela hoe:'
  - type: text
    content: '–Nahoana no izaho no anontanianao? Kanefa ny TOMPO aza efa nandao anao ka tonga fahavalonao? '
  '17':
  - type: text
    content: Fa ny TOMPO efa nanatanteraka izay nambarako avy taminy, dia ny nanalany teo an-tananao ny fanjakana ka nanomezany izany ho an’olon-kafa, dia i Davida
  - type: note
    content: Jereo 15.28.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Satria tsy nohenoinao ny feon’ny TOMPO tamin’ny tsy nandringananao tanteraka ny Hamalekita
  - type: note
    content: Jereo toko faha-15.
  - type: text
    content: ', dia izany no nanaovan’ny TOMPO izao taminao androany. '
  '19':
  - type: text
    content: Ary hatolotry ny TOMPO eo an-tanan’ny Filistinina ianao mbamin’i Israely. Rahampitso ianao sy ny zanakao dia tafaraka amiko any amin’ny toeran’ny maty, ary ny tafik’i Israely hatolotry ny TOMPO eo an-tanan’ny Filistinina.
  '2':
  - type: text
    content: 'Ka hoy ny navalin’i Davida azy:'
  - type: text
    content: –Eny, tompokolahy, ho hitanao eo moa izay haiko hatao.
  - type: text
    content: 'Ary hoy indray Akisy tamin’i Davida:'
  - type: text
    content: –Eny àry, fa dia ianao no hataoko mpiambina ny tenako mandrakizay.
  - type: heading
    content: I Saoly mila saina amin’ilay mpamoha angatra tao Haîna-Dôra
  '20':
  - type: text
    content: 'Raha vao nandre izany tenin’i Samoela izany i Saoly, dia nitsirara tamin’ny tany fa raiki-tahotra mafy. Manampy trotraka izany dia efa ambivitra ny heriny satria tsy nihinan-kanina tontolo andro sy tontolo alina izy. '
  '21':
  - type: text
    content: 'Dia nanatona an’i Saoly ilay vehivavy ka nahita ny fahorian-tsainy. Koa dia hoy izy taminy:'
  - type: text
    content: '–Efa nihaino anao aho mpanompovavinao, fa na dia maningotra ny aiko aza izany, dia notanterahiko ihany izay nangatahinao tamiko. '
  '22':
  - type: text
    content: Ankehitriny dia mba henoy kosa ny teniko. Aoka aho handroso mofo kely hohaninao mba hampatanjaka anao alohan’ny hanohizanao ny dia.
  '23':
  - type: text
    content: 'Nandà tsy nety nihinana anefa i Saoly, saingy nikiry nanery azy kosa ireo mpanompony sy ilay vehivavy, koa dia nanaiky ihany izy tamin’ny farany. Dia niarina teo amin’ny tany izy ka nipetraka teo am-parafara. '
  '24':
  - type: text
    content: 'Najedak’ilay vehivavy faingana ny zanak’omby mifahy iray tao aminy, dia naka lafarinina izy ka nopotseriny ary nendasiny ho mofo tsy misy leviora. '
  '25':
  - type: text
    content: Narosony hohanin’i Saoly sy ireo mpanompony izany sakafo izany. Avy nihinana izy ireo, dia niainga ka lasa iny alina iny ihany.
  '3':
  - type: text
    content: Rehefa maty i Samoela, dia nisaona azy ny Israelita rehetra, ary nandevina azy tao Ramà tanànany. Ary efa noraran’i Saoly tsy hatao amin’ny taniny ny famohazana angatra sy ny sikidy
  - type: note
    content: 'Ny amin’ny fahafatesan’i Samoela, dia jereo 25.1. –ny famohazana angatra sy ny sikidy: jereo Lev 19.31 sy nta.'
  - type: text
    content: .
  '4':
  - type: text
    content: Indray andro dia vory lanona ny miaramila filistinina ka nitoby tao Sonema; dia novorin’i Saoly kosa ny miaramila israelita rehetra mba hitoby ao Gilbôa
  - type: note
    content: 'Sonema: tanàna kely ao Galilea, eo amin’ny 80 km any avaratr’i Jerosalema. –Gilbôa: tendrombohitra eo amin’ny km vitsivitsy ao atsimo andrefan’i Sonema eny andafin’ny lemak’i Jizrehela.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Raha vao nahita ny tobin’ny Filistinina i Saoly, dia raiki-tahotra sady nivadi-po. '
  '6':
  - type: text
    content: Te hanontany ny TOMPO izy nefa ny TOMPO tsy namaly azy na tamin’ny nofy, na tamin’ny orîma
  - type: note
    content: Jereo Eks 28.30 sy nta.
  - type: text
    content: ', na tamin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Koa dia nandidy ireo manamboninahiny i Saoly hoe:'
  - type: text
    content: –Itadiavo vehivavy mpamoha angatra aho hankanesako any aminy mba hanontaniako.
  - type: text
    content: 'Ary hoy ny mpanompony taminy:'
  - type: text
    content: –Misy vehivavy mpamoha angatra any Haîna-Dôra
  - type: note
    content: 'Haîna-Dôra: tanàna tokony ho 12 km any avaratr’i Gilbôa.'
  - type: text
    content: .
  '8':
  - type: text
    content: 'Dia nanova endrika i Saoly fa nisolo fitafy, ka nankany Haîna-Dôra niaraka tamin’ny lehilahy roa; ary alina izy ireo no tonga tao amin-dravehivavy, dia hoy i Saoly taminy:'
  - type: text
    content: –Anaovy majika amin’ny famohazana angatra aho, ka asehoy amiko izay hotononiko aminao.
  '9':
  - type: text
    content: 'Fa namaly azy ilay vehivavy hoe:'
  - type: text
    content: –Fantatro tsara izay nataon’i Saoly, dia ny namongorany hiala amin’ny tany ny mpamoha angatra sy ny mpisikidy. Koa nahoana no mamela-pandrika ahy haningotra ny aiko ianao?
