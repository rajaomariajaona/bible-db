document_id: 1SA.28,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany dia nangonin’ny Filistinina ho tafika tokana ny miaramilany mba hiady amin’i Israely. Ary hoy i Akisy tamin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatrao tsara fa hiantafika hiaraka amiko ianao sy ny olonao.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nianiana taminy sady nanonona ny anaran’ny TOMPO i Saoly ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO ka milaza marina aho fa tsy hampaninona anao akory izao raharaha izao.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany azy ilay vehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza àry no tianao hantsoiko hanketo aminao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –I Samoela antsoina hanketo amiko.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony nahita an’i Samoela ilay vehivavy, dia niantsoantso mafy ary nanao tamin’i Saoly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no dia nofitahinao aho? Hay i Saoly ianao!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza matahotra; fa inona no hitanao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly kosa ravehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Matoatoa miakatra avy ao amin’ny tany no hitako.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ihany ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Manao ahoana izy izany?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ravehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lehilahy antitra misalotra akanjobe no miakatra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatr’i Saoly fa i Samoela marina izay; koa dia niankohoka tamin’ny tany ho mari-panajana izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanontany azy kosa i Samoela hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa ahoana no kotabainao aho ka nampiantsoinao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navalin’i Saoly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mafy ny manjo ahy, fa miady amiko ny Filistinina ary efa nandao ahy Andriamanitra ka tsy mamaly ahy intsony na amin’ny mpaminany na amin’ny nofy. Izany no nampiantsoako anao mba hampahafantatra ahy izay tokony hataoko.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Samoela hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana no izaho no anontanianao? Kanefa ny TOMPO aza efa nandao anao ka tonga fahavalonao? '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa ny TOMPO efa nanatanteraka izay nambarako avy taminy, dia ny nanalany teo an-tananao ny fanjakana ka nanomezany izany ho an’olon-kafa, dia i Davida
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 15.28.
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Satria tsy nohenoinao ny feon’ny TOMPO tamin’ny tsy nandringananao tanteraka ny Hamalekita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo toko faha-15.
      marker-yv: yv-n
    - type: text
      text: ', dia izany no nanaovan’ny TOMPO izao taminao androany. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary hatolotry ny TOMPO eo an-tanan’ny Filistinina ianao mbamin’i Israely. Rahampitso ianao sy ny zanakao dia tafaraka amiko any amin’ny toeran’ny maty, ary ny tafik’i Israely hatolotry ny TOMPO eo an-tanan’ny Filistinina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny navalin’i Davida azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, tompokolahy, ho hitanao eo moa izay haiko hatao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray Akisy tamin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny àry, fa dia ianao no hataoko mpiambina ny tenako mandrakizay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Saoly mila saina amin’ilay mpamoha angatra tao Haîna-Dôra
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vao nandre izany tenin’i Samoela izany i Saoly, dia nitsirara tamin’ny tany fa raiki-tahotra mafy. Manampy trotraka izany dia efa ambivitra ny heriny satria tsy nihinan-kanina tontolo andro sy tontolo alina izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona an’i Saoly ilay vehivavy ka nahita ny fahorian-tsainy. Koa dia hoy izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa nihaino anao aho mpanompovavinao, fa na dia maningotra ny aiko aza izany, dia notanterahiko ihany izay nangatahinao tamiko. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ankehitriny dia mba henoy kosa ny teniko. Aoka aho handroso mofo kely hohaninao mba hampatanjaka anao alohan’ny hanohizanao ny dia.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandà tsy nety nihinana anefa i Saoly, saingy nikiry nanery azy kosa ireo mpanompony sy ilay vehivavy, koa dia nanaiky ihany izy tamin’ny farany. Dia niarina teo amin’ny tany izy ka nipetraka teo am-parafara. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Najedak’ilay vehivavy faingana ny zanak’omby mifahy iray tao aminy, dia naka lafarinina izy ka nopotseriny ary nendasiny ho mofo tsy misy leviora. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Narosony hohanin’i Saoly sy ireo mpanompony izany sakafo izany. Avy nihinana izy ireo, dia niainga ka lasa iny alina iny ihany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa maty i Samoela, dia nisaona azy ny Israelita rehetra, ary nandevina azy tao Ramà tanànany. Ary efa noraran’i Saoly tsy hatao amin’ny taniny ny famohazana angatra sy ny sikidy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny amin’ny fahafatesan’i Samoela, dia jereo 25.1. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: –ny famohazana angatra sy ny sikidy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Lev 19.31 sy nta.'
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indray andro dia vory lanona ny miaramila filistinina ka nitoby tao Sonema; dia novorin’i Saoly kosa ny miaramila israelita rehetra mba hitoby ao Gilbôa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sonema: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna kely ao Galilea, eo amin’ny 80 km any avaratr’i Jerosalema. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Gilbôa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': tendrombohitra eo amin’ny km vitsivitsy ao atsimo andrefan’i Sonema eny andafin’ny lemak’i Jizrehela.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vao nahita ny tobin’ny Filistinina i Saoly, dia raiki-tahotra sady nivadi-po. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Te hanontany ny TOMPO izy nefa ny TOMPO tsy namaly azy na tamin’ny nofy, na tamin’ny orîma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 28.30 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', na tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia nandidy ireo manamboninahiny i Saoly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Itadiavo vehivavy mpamoha angatra aho hankanesako any aminy mba hanontaniako.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanompony taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Misy vehivavy mpamoha angatra any Haîna-Dôra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Haîna-Dôra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna tokony ho 12 km any avaratr’i Gilbôa.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanova endrika i Saoly fa nisolo fitafy, ka nankany Haîna-Dôra niaraka tamin’ny lehilahy roa; ary alina izy ireo no tonga tao amin-dravehivavy, dia hoy i Saoly taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Anaovy majika amin’ny famohazana angatra aho, ka asehoy amiko izay hotononiko aminao.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly azy ilay vehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatro tsara izay nataon’i Saoly, dia ny namongorany hiala amin’ny tany ny mpamoha angatra sy ny mpisikidy. Koa nahoana no mamela-pandrika ahy haningotra ny aiko ianao?
