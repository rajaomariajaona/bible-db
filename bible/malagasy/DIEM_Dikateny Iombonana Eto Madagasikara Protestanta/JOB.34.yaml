document_id: JOB.34,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miampanga an’i Jôba i Elihò
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanohy ny teniny i Elihò ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa mihainoa ahy, ianareo olo-mahalala:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sanatria an’Andriamanitra ny hanao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary lavitra an’ilay Tsitoha ny tsy fahamarinana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mamaly ny olona araka ny asany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manome azy araka ny fitondrantenany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Sal 62.13.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny marina dia izao: Andriamanitra Tsitoha'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mba manao ratsy mihitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy manitsakitsaka ny rariny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no nanendry azy hifehy ny tany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary zovy no nanankina izao tontolo izao taminy?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy nihevitra afa-tsy ny tenany ihany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanangona ho azy samirery ny fofonaina,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiara-maty avokoa ny miaina rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hody vovoka indray ny olombelona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria olon-kendry ianao, dia mandrenesa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka mampandria sofina amin’izay lazaiko:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy tia rariny Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa afaka hifehy izao rehetra izao ve Izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hohelohinao ve Ilay Marina sady Mahery
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay afa-miteny amin’ny mpanjaka hoe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izay afa-miteny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny dkt grika tranainy, siriaka ary latinina, ny hebreo mety ve ny miteny...?
      marker-yv: yv-n
    - type: text
      text: ': «Olom-poana»,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy amin’ireo zanak’andriana hoe: «Olon-dratsy»?'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mitongilana amin’ny lehibe Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mampandefitra ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anoloan’ny mpanankarena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa asan’ny tanany avokoa izy rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrenesa izay holazaiko, ianareo olon-kendry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ianareo ela nihetezana lava volo, mihainoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba manongilàna sofina hihaino ahy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao anatin’ny indray mipy maso monja
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’iny mamatonalina iny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mety hahafatesan’ny olona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aringan’Andriamanitra ny mpanankarena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia manjavona tsy hita intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary lasa tsy natosiny akory ny mahery.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa arany maso ny toetran’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitany avokoa ny lalan-kalehany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ny haizim-pito na ny alo-mainty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tsy ahitany ny mpanao ratsy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra tsy mila manao famotorana olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tonga eo anatrehany mba hotsarainy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa montsamontsaniny ny olo-mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia tsy misy fakana am-bava aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka soloiny olon-kafa ny toerany;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria fantany mihitsy ny asan’ireo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka amin’ny indray alina ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no anonganany azy ho montsana.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tehamaina eo imasom-bahoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no namelezany azy toa olo-meloka.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria niala tamin’Andriamanitra ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy niraharaha ny sori-dalany rehetra.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no nanesika ny mahantra sy ory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiantso vonjy amin’Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka henony tokoa ny fitarainany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mangina Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zovy no hanameloka Azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha manafin-tava Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zovy no hahita Azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa miahy ireo firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny olombelona rehetra Izy
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa adidin’ny sofina ny mamantatra ny teny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary adidin’ny lanilany kosa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôba 12.11.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mahatsapa tsiron-kanina.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hanjakàn’ny olon-tsy mendrika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mpanao kobaka am-bava amin’ny vahoaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.30 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 29-30:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rijan-teny tohanan’ny dkt tranainy maro, ny rijan-teny hebreo indraindray mandika hoe Fa ambonin’ny firenena, ny olombelona izy mba hisoroka ny olona tsy mendrika, mpanao kobaka am-bava tsy handray fahefana.
      marker-yv: yv-n
    - type: text
      text: .
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa raha misy manao amin’Andriamanitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Efa namita ny saziko aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hanao ratsy intsony.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asehoy ahy izay heloko tsy mbola hitako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha nanao ratsy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hamerina izany intsony.»
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny hevitrao be tsikera io, ry Jôba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa hanafay azy va Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa satria tsy izaho no manapaka fa ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lazao izay fantatrao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiteny ny olo-manan-tsaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanao toy ny olon-kendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay mihaino ahy hoe:'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Miteny zavatra tsy fantany i Jôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy dikany akory izay lazainy.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka hosedraina mafy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pahatonga azy hilefitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny valin-teny nataony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tahaka ny an’ny olon-dratsy!
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mpanota izy sady mpikomy amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hany ka manao teny maro hanoherana Azy.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa aoka hodinihintsika izay rariny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hiarahantsika miaiky izay tsara.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa i Jôba efa nanao hoe: «Tsy manan-tsiny aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy tsy omen’Andriamanitra rariny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mitsara ahy ara-pahamarinana Izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tsy mitsara ahy ara-pahamarinana Izy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na mandainga momba ny fitsarana ahy Izy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt grika tranainy; ny hebreo dia manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mandainga aho...
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na dia tsy meloka akory aza aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia zana-tsipîka hahafaty ahy no alefany.»
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa misy lehilahy tahaka an’i Jôba va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny maneso fivavahana no rano fisotrony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miara-dalana amin’ny mpanao heloka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny olon-dratsy no iray dia aminy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa niteny izy hoe: «Tsy mahasoa ny olona'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mihavana amin’Andriamanitra.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
