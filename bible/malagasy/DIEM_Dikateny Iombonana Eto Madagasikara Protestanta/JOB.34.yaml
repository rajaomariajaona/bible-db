document_id: JOB.34,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miampanga an’i Jôba i Elihò
  - type: text
    content: 'Dia nanohy ny teniny i Elihò ka nanao hoe:'
  '10':
  - type: text
    content: 'Koa mihainoa ahy, ianareo olo-mahalala:'
  - type: text
    content: Sanatria an’Andriamanitra ny hanao ratsy
  - type: text
    content: ary lavitra an’ilay Tsitoha ny tsy fahamarinana.
  '11':
  - type: text
    content: Fa mamaly ny olona araka ny asany Izy
  - type: text
    content: ka manome azy araka ny fitondrantenany
  - type: note
    content: ampit Sal 62.13.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Ny marina dia izao: Andriamanitra Tsitoha'
  - type: text
    content: dia tsy mba manao ratsy mihitsy
  - type: text
    content: ary tsy manitsakitsaka ny rariny.
  '13':
  - type: text
    content: Iza moa no nanendry azy hifehy ny tany?
  - type: text
    content: ary zovy no nanankina izao tontolo izao taminy?
  '14':
  - type: text
    content: Raha tsy nihevitra afa-tsy ny tenany ihany Izy
  - type: text
    content: ka nanangona ho azy samirery ny fofonaina,
  '15':
  - type: text
    content: dia hiara-maty avokoa ny miaina rehetra,
  - type: text
    content: ary hody vovoka indray ny olombelona.
  - type: heading
    content: '*'
  '16':
  - type: text
    content: Satria olon-kendry ianao, dia mandrenesa
  - type: text
    content: 'ka mampandria sofina amin’izay lazaiko:'
  '17':
  - type: text
    content: Raha tsy tia rariny Andriamanitra,
  - type: text
    content: moa afaka hifehy izao rehetra izao ve Izy?
  - type: text
    content: Ary hohelohinao ve Ilay Marina sady Mahery
  '18':
  - type: text
    content: izay afa-miteny amin’ny mpanjaka hoe
  - type: note
    content: 'izay afa-miteny: araka ny dkt grika tranainy, siriaka ary latinina, ny hebreo mety ve ny miteny...?'
  - type: text
    content: ': «Olom-poana»,'
  - type: text
    content: 'sy amin’ireo zanak’andriana hoe: «Olon-dratsy»?'
  '19':
  - type: text
    content: Tsy mitongilana amin’ny lehibe Izy
  - type: text
    content: na mampandefitra ny mahantra
  - type: text
    content: eo anoloan’ny mpanankarena,
  - type: text
    content: fa asan’ny tanany avokoa izy rehetra.
  '2':
  - type: text
    content: Mandrenesa izay holazaiko, ianareo olon-kendry;
  - type: text
    content: ary ianareo ela nihetezana lava volo, mihainoa,
  - type: text
    content: mba manongilàna sofina hihaino ahy.
  '20':
  - type: text
    content: Ao anatin’ny indray mipy maso monja
  - type: text
    content: amin’iny mamatonalina iny
  - type: text
    content: no mety hahafatesan’ny olona.
  - type: text
    content: Aringan’Andriamanitra ny mpanankarena
  - type: text
    content: dia manjavona tsy hita intsony;
  - type: text
    content: ary lasa tsy natosiny akory ny mahery.
  '21':
  - type: text
    content: Fa arany maso ny toetran’ny olona,
  - type: text
    content: ary hitany avokoa ny lalan-kalehany.
  '22':
  - type: text
    content: Tsy ny haizim-pito na ny alo-mainty
  - type: text
    content: no tsy ahitany ny mpanao ratsy.
  - type: heading
    content: '*'
  '23':
  - type: text
    content: Andriamanitra tsy mila manao famotorana olona
  - type: text
    content: izay tonga eo anatrehany mba hotsarainy.
  '24':
  - type: text
    content: Fa montsamontsaniny ny olo-mahery
  - type: text
    content: na dia tsy misy fakana am-bava aza,
  - type: text
    content: ka soloiny olon-kafa ny toerany;
  '25':
  - type: text
    content: satria fantany mihitsy ny asan’ireo.
  - type: text
    content: Ka amin’ny indray alina ihany
  - type: text
    content: no anonganany azy ho montsana.
  '26':
  - type: text
    content: Tehamaina eo imasom-bahoaka
  - type: text
    content: no namelezany azy toa olo-meloka.
  '27':
  - type: text
    content: Satria niala tamin’Andriamanitra ireo
  - type: text
    content: ka tsy niraharaha ny sori-dalany rehetra.
  '28':
  - type: text
    content: Izany no nanesika ny mahantra sy ory
  - type: text
    content: hiantso vonjy amin’Andriamanitra;
  - type: text
    content: ka henony tokoa ny fitarainany.
  - type: heading
    content: '*'
  '29':
  - type: text
    content: Raha mangina Andriamanitra,
  - type: text
    content: zovy no hanameloka Azy?
  - type: text
    content: Raha manafin-tava Izy,
  - type: text
    content: zovy no hahita Azy?
  - type: text
    content: Kanefa miahy ireo firenena
  - type: text
    content: sy ny olombelona rehetra Izy
  '3':
  - type: text
    content: Fa adidin’ny sofina ny mamantatra ny teny
  - type: text
    content: ary adidin’ny lanilany kosa
  - type: note
    content: Ampit Jôba 12.11.
  - type: text
    content: ny mahatsapa tsiron-kanina.
  '30':
  - type: text
    content: mba tsy hanjakàn’ny olon-tsy mendrika,
  - type: text
    content: mpanao kobaka am-bava amin’ny vahoaka
  - type: note
    content: 'And 29-30: rijan-teny tohanan’ny dkt tranainy maro, ny rijan-teny hebreo indraindray mandika hoe Fa ambonin’ny firenena, ny olombelona izy mba hisoroka ny olona tsy mendrika, mpanao kobaka am-bava tsy handray fahefana.'
  - type: text
    content: .
  '31':
  - type: text
    content: 'Fa raha misy manao amin’Andriamanitra hoe:'
  - type: text
    content: «Efa namita ny saziko aho,
  - type: text
    content: ka tsy hanao ratsy intsony.
  '32':
  - type: text
    content: Asehoy ahy izay heloko tsy mbola hitako;
  - type: text
    content: fa raha nanao ratsy aho
  - type: text
    content: dia tsy hamerina izany intsony.»
  '33':
  - type: text
    content: Araka ny hevitrao be tsikera io, ry Jôba,
  - type: text
    content: moa hanafay azy va Andriamanitra?
  - type: text
    content: Koa satria tsy izaho no manapaka fa ianao,
  - type: text
    content: dia lazao izay fantatrao.
  - type: heading
    content: '*'
  '34':
  - type: text
    content: Hiteny ny olo-manan-tsaina
  - type: text
    content: ka hanao toy ny olon-kendry
  - type: text
    content: 'izay mihaino ahy hoe:'
  '35':
  - type: text
    content: «Miteny zavatra tsy fantany i Jôba
  - type: text
    content: ka tsy misy dikany akory izay lazainy.
  '36':
  - type: text
    content: Enga anie ka hosedraina mafy izy
  - type: text
    content: mandra-pahatonga azy hilefitra,
  - type: text
    content: satria ny valin-teny nataony
  - type: text
    content: dia tahaka ny an’ny olon-dratsy!
  '37':
  - type: text
    content: Fa mpanota izy sady mpikomy amin’Andriamanitra
  - type: text
    content: hany ka manao teny maro hanoherana Azy.»
  '4':
  - type: text
    content: Koa aoka hodinihintsika izay rariny,
  - type: text
    content: ary aoka hiarahantsika miaiky izay tsara.
  - type: heading
    content: '*'
  '5':
  - type: text
    content: 'Fa i Jôba efa nanao hoe: «Tsy manan-tsiny aho,'
  - type: text
    content: saingy tsy omen’Andriamanitra rariny.
  '6':
  - type: text
    content: Tsy mitsara ahy ara-pahamarinana Izy
  - type: note
    content: 'Tsy mitsara ahy ara-pahamarinana Izy: na mandainga momba ny fitsarana ahy Izy: araka ny dkt grika tranainy; ny hebreo dia manao hoe mandainga aho...'
  - type: text
    content: ;
  - type: text
    content: fa na dia tsy meloka akory aza aho,
  - type: text
    content: dia zana-tsipîka hahafaty ahy no alefany.»
  '7':
  - type: text
    content: Moa misy lehilahy tahaka an’i Jôba va?
  - type: text
    content: Ny maneso fivavahana no rano fisotrony.
  '8':
  - type: text
    content: Miara-dalana amin’ny mpanao heloka izy
  - type: text
    content: ka ny olon-dratsy no iray dia aminy.
  '9':
  - type: text
    content: 'Fa niteny izy hoe: «Tsy mahasoa ny olona'
  - type: text
    content: ny mihavana amin’Andriamanitra.»
  - type: heading
    content: '*'
