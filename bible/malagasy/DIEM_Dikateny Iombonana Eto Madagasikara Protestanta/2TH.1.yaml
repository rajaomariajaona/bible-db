    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Avy amiko Paoly ity taratasy ity.
- type: usfm
  marker: p
  children:
  - type: text
    text: Mamangy anareo isan’ny Fiangonana atỳ Tesalônika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tesalônika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1Tes 1.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', izay tafaray amin’Andriamanitra Raintsika sy i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo, aho. Mamangy anareo koa i Silasy sy i Timôty. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy i Jesoa Kristy Tompo!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsarana amin’ny andro hiavian’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy maintsy velom-pisaorana mandrakariva an’Andriamanitra izahay, ry havana, noho ny aminareo. Mendrika hataonay izany satria mandroso fatratra ny finoanareo ary mitombo hatrany ny fifankatiavanareo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izany no mahatonga anareo ho reharehanay manerana ireo Fiangonan’Andriamanitra, noho ianareo manam-paharetana sy mino hatrany eo anivon’ny fanenjehana sy fahoriana rehetra mianjady aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Porofo izany fa mitsara ara-drariny Andriamanitra, satria vokatr’izay mianjady aminareo dia hatao mendrika ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: ' ianareo, sady io Fanjakàn’Andriamanitra io no anton’ny iaretanareo fijaliana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Satria izao no ara-drariny amin’Andriamanitra: hovaliany fahoriana ireo mpampahory anareo, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary homeny fialan-tsasatra miaraka aminay ianareo ampahorîna. Ho tonga izany amin’ny andro hisehoan’i Jesoa Tompo avy any an-danitra, otronin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' mitory ny heriny; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: voahodidin’afo miredareda Izy no tonga hanasazy ireo tsy mahalala an’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 66.15.
    marker-yv: yv-n
  - type: text
    text: ' sady tsy manaiky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' momba an’i Jesoa Tompontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fahaverezana maharitra mandrakizay no sazy hihatra amin’ireo, ka tsy hifanatri-tava amin’ny Tompo sy ho lavitry ny heriny heni-boninahitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 2.10, 19, 21.
    marker-yv: yv-n
  - type: text
    text: ' ireo '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'amin’ilay andro hahatongavan’ny Tompo mba homen’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakany
  - type: text
    text: ' voninahitra sady higagan’izay rehetra mino Azy. Ho isan’ireto hanome voninahitra ny Tompo ireto koa ianareo, satria nino ny fijoroanay ho vavolombelona nanambara Azy taminareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izany no ivavahany lalandava ho anareo. Koa mangataka amin’Andriamanitsika izahay mba hataony mendrika ny fiainana niantsoany anareo ianareo. Mangataka izahay mba ho tanterahiny amin-kery avokoa ny fanirianareo hanao soa ary hataony lavorary koa ny asa ateraky ny finoanareo; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia homenareo voninahitra ny anaran’i Jesoa Tompontsika, sady ianareo koa homeny voninahitra. Izany no vokatr’ilay fahasoavana avy amin’ilay Andriamanitsika sy i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'avy amin’ilay Andriamanitsika... Tompo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: avy amin’i Jesoa Kristy, ilay Andriamanitsika sady Tompontsika.
    marker-yv: yv-n
  - type: text
    text: .
