document_id: 2TH.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: Avy amiko Paoly ity taratasy ity.
  - type: text
    content: Mamangy anareo isan’ny Fiangonana atỳ Tesalônika
  - type: note
    content: 'Tesalônika: jereo 1Tes 1.1 sy nta.'
  - type: text
    content: ', izay tafaray amin’Andriamanitra Raintsika sy i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo, aho. Mamangy anareo koa i Silasy sy i Timôty. '
  '10':
  - type: text
    content: 'amin’ilay andro hahatongavan’ny Tompo mba homen’ny '
  - type: text
    content: vahoakany
  - type: text
    content: ' voninahitra sady higagan’izay rehetra mino Azy. Ho isan’ireto hanome voninahitra ny Tompo ireto koa ianareo, satria nino ny fijoroanay ho vavolombelona nanambara Azy taminareo.'
  '11':
  - type: text
    content: 'Izany no ivavahany lalandava ho anareo. Koa mangataka amin’Andriamanitsika izahay mba hataony mendrika ny fiainana niantsoany anareo ianareo. Mangataka izahay mba ho tanterahiny amin-kery avokoa ny fanirianareo hanao soa ary hataony lavorary koa ny asa ateraky ny finoanareo; '
  '12':
  - type: text
    content: 'dia homenareo voninahitra ny anaran’i Jesoa Tompontsika, sady ianareo koa homeny voninahitra. Izany no vokatr’ilay fahasoavana avy amin’ilay Andriamanitsika sy i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo'
  - type: note
    content: 'avy amin’ilay Andriamanitsika... Tompo: dkt hafa avy amin’i Jesoa Kristy, ilay Andriamanitsika sady Tompontsika.'
  - type: text
    content: .
  '2':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy i Jesoa Kristy Tompo!
  - type: heading
    content: Ny fitsarana amin’ny andro hiavian’i Kristy
  '3':
  - type: text
    content: 'Tsy maintsy velom-pisaorana mandrakariva an’Andriamanitra izahay, ry havana, noho ny aminareo. Mendrika hataonay izany satria mandroso fatratra ny finoanareo ary mitombo hatrany ny fifankatiavanareo rehetra. '
  '4':
  - type: text
    content: Izany no mahatonga anareo ho reharehanay manerana ireo Fiangonan’Andriamanitra, noho ianareo manam-paharetana sy mino hatrany eo anivon’ny fanenjehana sy fahoriana rehetra mianjady aminareo.
  '5':
  - type: text
    content: 'Porofo izany fa mitsara ara-drariny Andriamanitra, satria vokatr’izay mianjady aminareo dia hatao mendrika ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' ianareo, sady io Fanjakàn’Andriamanitra io no anton’ny iaretanareo fijaliana. '
  '6':
  - type: text
    content: 'Satria izao no ara-drariny amin’Andriamanitra: hovaliany fahoriana ireo mpampahory anareo, '
  '7':
  - type: text
    content: 'ary homeny fialan-tsasatra miaraka aminay ianareo ampahorîna. Ho tonga izany amin’ny andro hisehoan’i Jesoa Tompo avy any an-danitra, otronin’ireo '
  - type: text
    content: anjely
  - type: text
    content: ' mitory ny heriny; '
  '8':
  - type: text
    content: voahodidin’afo miredareda Izy no tonga hanasazy ireo tsy mahalala an’Andriamanitra
  - type: note
    content: Ampit Is 66.15.
  - type: text
    content: ' sady tsy manaiky ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba an’i Jesoa Tompontsika. '
  '9':
  - type: text
    content: Fahaverezana maharitra mandrakizay no sazy hihatra amin’ireo, ka tsy hifanatri-tava amin’ny Tompo sy ho lavitry ny heriny heni-boninahitra
  - type: note
    content: Ampit Is 2.10, 19, 21.
  - type: text
    content: ' ireo '
