document_id: EZR.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nisy Jiosy maro nanambady vehivavy hafa firenena
  - type: text
    content: 'Taorian’izany zavatra izany, dia nanatona ahy ireo lehiben’ny Israelita ka nanao hoe:'
  - type: text
    content: '–Na sarambabem-bahoaka na '
  - type: text
    content: mpisorona
  - type: text
    content: ' na '
  - type: text
    content: levita
  - type: text
    content: ', dia tsy mbola miavaka amin’ny valovotaka, fa maka tahaka ny zava-maharikoriko fanaon’ny Kanahanita sy Hitita, ny Perizita sy Jebosita, ny Hamônita sy Môabita, ary ny Ejiptianina sy '
  - type: text
    content: Amôrita
  - type: text
    content: '. '
  '10':
  - type: text
    content: '«Koa ankehitriny, ry Andriamanitray ô, inona no holazainay amin’izany? Efa nafoinay ny didinao, '
  '11':
  - type: text
    content: 'dia ireo didy nampilazainao ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' mpanomponao. Nampitandrina Ianao hoe: ‹Ny tany, izay efa hidiranareo ho fanananareo, dia '
  - type: text
    content: maloto
  - type: text
    content: ' satria manenika azy hatraiza hatraiza ny fahalotoana sy zava-maharikoriko fanaon’ireo firenena tompon-tany. '
  '12':
  - type: text
    content: Koa aza manome ny zanakavavinareo ho vadin’ny zanakalahiny, na maka ny zanakavaviny ho vadin’ny zanakalahinareo
  - type: note
    content: Jereo Eks 34.11-16; Deot 7.1-5.
  - type: text
    content: '. Aza mitady izay hampiadana azy na hahasoa azy na oviana na oviana; izany no handrosoanareo ho mahery ka hiarananareo amin’ny voka-tsoan’izany tany izany sy hamelanareo azy ho lovan’ny taranakareo hatrany hatrany.› '
  '13':
  - type: text
    content: 'Ry Andriamanitray ô, na dia efa nanjo anay aza izany rehetra izany noho ny asa ratsy sy fahotana vitanay, dia tsy nanafay anay araka ny helokay Ianao fa mbola namela anay hisy sisa afaka toy izao ihany. '
  '14':
  - type: text
    content: 'Ahoana àry no mbola handikanay ny didinao indray ka hanambadianay amin’ireo olona mpanao zava-maharikoriko ireo? Tsy ho tezitra aminay ve Ianao ka handringana anay rehetra tsy misy ankanavaka? '
  '15':
  - type: text
    content: Ry TOMPO Andriamanitr’i Israely ô, miantra Ianao ka mbola misy sisa afaka ihany izahay amin’izao anio izao; indreto izahay vesaran’ny fahotanay eto anatrehanao, na dia tsy tokony hisy hahajanona eto anatrehanao aza noho izany.»
  '2':
  - type: text
    content: Ny zanakavavin’ireo manko no nalain’ny lehilahy israelita ho vadiny sy ho vadin’ny zananilahy, hany ka ny taranaka masina no miharoharo amin’ny valovotaka; ary ny lehibe sy mpifehy mihitsy aza no nitari-dàlana tamin’izany fahadisoana izany.
  '3':
  - type: text
    content: 'Vao nandre izany aho, dia '
  - type: text
    content: nandriatra
  - type: text
    content: ' ny lambako sy ny akanjoko sady nandrompotra ny volon-dohako sy ny somotro; ary nipetraka tahaka ilay torana iny aho, '
  '4':
  - type: text
    content: 'ka mbola tafapetraka toy izany ihany mandra-pahatongan’ny fotoana fanolorana ny '
  - type: text
    content: sorona
  - type: text
    content: ' hariva. Dia nivory teo amiko izay rehetra fatra-panaja ny tenin’Ilay Andriamanitr’i Israely ny amin’ny fahadisoan’ireo Jiosy efa tafaverina avy any an-tsesitany.'
  - type: heading
    content: Mivavaka ho an’ireo solafaka i Hezrà
  '5':
  - type: text
    content: 'Tamin’ny fotoana fanolorana ny '
  - type: text
    content: sorona
  - type: text
    content: ' hariva indrindra vao nody ny aiko, ka tafarina aho; dia mbola amin’ireto lambako sy akanjoko '
  - type: text
    content: triatra
  - type: text
    content: ' ireto aho no nandohalika sy nanandra-tanana ho amin’ny TOMPO Andriamanitro '
  '6':
  - type: text
    content: 'ka nivavaka nanao hoe:'
  - type: text
    content: '–Andriamanitro ô, menatra sy mangaihay loatra aho; ka tsy sahiko ny miandrandra aminao, ry Andriamanitro ô, satria efa nihamaro sady niavosa mihoatra ny lohanay ny helokay ary lehibe manakatra ny '
  - type: text
    content: lanitra
  - type: text
    content: ' ny fahotanay. '
  '7':
  - type: text
    content: 'Eny, hatramin’ny andron’ireo razanay ka mandraka androany, dia lehibe ny fahotanay vahoakanao; ny helokay ihany no nanoloranao anay sy ny mpanjakanay ary ny mpisoronay ho eo an-tanan’ireo mpanjakan’ny tany hafa hovonoin-tsabatra, ho babo, ho voaroba, ary hangaihay tahaka ny mbola mihatra aminay izao. '
  '8':
  - type: text
    content: 'Kanefa ankehitriny, ry TOMPO Andriamanitray ô, no fotoanandro nanehoanao famindrampo taminay, ka navelanao ho nisy sisa afaka izahay ary hiorim-ponenana eto amin’ity faritrao masina ity; dia nampamirapiratinao ny masonay ary nataonao velombelona kely ny ainay ao anatin’izao fahandevozanay izao. '
  '9':
  - type: text
    content: 'Eny, ry Andriamanitray ô, nandevozina izahay nefa tsy nafoinao na dia izany aza. Notarihinao ny amperôran’i Persia hamindrafo aminay; ka namelombelomany ny ainay izany, nahazoanay nanao ny '
  - type: text
    content: tranonao
  - type: text
    content: ' sy nanamboatra ny rava, ary nanomezany anay fonenana voaaro eto Jerosalema sy eran’i Joda.'
