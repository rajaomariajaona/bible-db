document_id: EZR.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nisy Jiosy maro nanambady vehivavy hafa firenena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany zavatra izany, dia nanatona ahy ireo lehiben’ny Israelita ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Na sarambabem-bahoaka na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', dia tsy mbola miavaka amin’ny valovotaka, fa maka tahaka ny zava-maharikoriko fanaon’ny Kanahanita sy Hitita, ny Perizita sy Jebosita, ny Hamônita sy Môabita, ary ny Ejiptianina sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny zanakavavin’ireo manko no nalain’ny lehilahy israelita ho vadiny sy ho vadin’ny zananilahy, hany ka ny taranaka masina no miharoharo amin’ny valovotaka; ary ny lehibe sy mpifehy mihitsy aza no nitari-dàlana tamin’izany fahadisoana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vao nandre izany aho, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandriatra
  - type: text
    text: ' ny lambako sy ny akanjoko sady nandrompotra ny volon-dohako sy ny somotro; ary nipetraka tahaka ilay torana iny aho, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka mbola tafapetraka toy izany ihany mandra-pahatongan’ny fotoana fanolorana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' hariva. Dia nivory teo amiko izay rehetra fatra-panaja ny tenin’Ilay Andriamanitr’i Israely ny amin’ny fahadisoan’ireo Jiosy efa tafaverina avy any an-tsesitany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mivavaka ho an’ireo solafaka i Hezrà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’ny fotoana fanolorana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' hariva indrindra vao nody ny aiko, ka tafarina aho; dia mbola amin’ireto lambako sy akanjoko '
  - type: usfm
    marker: w
    children:
    - type: text
      text: triatra
  - type: text
    text: ' ireto aho no nandohalika sy nanandra-tanana ho amin’ny TOMPO Andriamanitro '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka nivavaka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Andriamanitro ô, menatra sy mangaihay loatra aho; ka tsy sahiko ny miandrandra aminao, ry Andriamanitro ô, satria efa nihamaro sady niavosa mihoatra ny lohanay ny helokay ary lehibe manakatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lanitra
  - type: text
    text: ' ny fahotanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Eny, hatramin’ny andron’ireo razanay ka mandraka androany, dia lehibe ny fahotanay vahoakanao; ny helokay ihany no nanoloranao anay sy ny mpanjakanay ary ny mpisoronay ho eo an-tanan’ireo mpanjakan’ny tany hafa hovonoin-tsabatra, ho babo, ho voaroba, ary hangaihay tahaka ny mbola mihatra aminay izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa ankehitriny, ry TOMPO Andriamanitray ô, no fotoanandro nanehoanao famindrampo taminay, ka navelanao ho nisy sisa afaka izahay ary hiorim-ponenana eto amin’ity faritrao masina ity; dia nampamirapiratinao ny masonay ary nataonao velombelona kely ny ainay ao anatin’izao fahandevozanay izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eny, ry Andriamanitray ô, nandevozina izahay nefa tsy nafoinao na dia izany aza. Notarihinao ny amperôran’i Persia hamindrafo aminay; ka namelombelomany ny ainay izany, nahazoanay nanao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranonao
  - type: text
    text: ' sy nanamboatra ny rava, ary nanomezany anay fonenana voaaro eto Jerosalema sy eran’i Joda.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Koa ankehitriny, ry Andriamanitray ô, inona no holazainay amin’izany? Efa nafoinay ny didinao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia ireo didy nampilazainao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' mpanomponao. Nampitandrina Ianao hoe: ‹Ny tany, izay efa hidiranareo ho fanananareo, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' satria manenika azy hatraiza hatraiza ny fahalotoana sy zava-maharikoriko fanaon’ireo firenena tompon-tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa aza manome ny zanakavavinareo ho vadin’ny zanakalahiny, na maka ny zanakavaviny ho vadin’ny zanakalahinareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 34.11-16; Deot 7.1-5.
    marker-yv: yv-n
  - type: text
    text: '. Aza mitady izay hampiadana azy na hahasoa azy na oviana na oviana; izany no handrosoanareo ho mahery ka hiarananareo amin’ny voka-tsoan’izany tany izany sy hamelanareo azy ho lovan’ny taranakareo hatrany hatrany.› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ry Andriamanitray ô, na dia efa nanjo anay aza izany rehetra izany noho ny asa ratsy sy fahotana vitanay, dia tsy nanafay anay araka ny helokay Ianao fa mbola namela anay hisy sisa afaka toy izao ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ahoana àry no mbola handikanay ny didinao indray ka hanambadianay amin’ireo olona mpanao zava-maharikoriko ireo? Tsy ho tezitra aminay ve Ianao ka handringana anay rehetra tsy misy ankanavaka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ry TOMPO Andriamanitr’i Israely ô, miantra Ianao ka mbola misy sisa afaka ihany izahay amin’izao anio izao; indreto izahay vesaran’ny fahotanay eto anatrehanao, na dia tsy tokony hisy hahajanona eto anatrehanao aza noho izany.»
