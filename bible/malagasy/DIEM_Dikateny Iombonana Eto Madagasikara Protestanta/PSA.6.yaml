document_id: PSA.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Aza melohinao aho, ry Tompo
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hampiarahina amin’ny valiha torifolo
  - type: note
    content: 'valiha torifolo: jereo 1 Tan 15,21; Sal 12,1.'
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida
  - type: text
    content: .
  '10':
  - type: text
    content: Eny, ren’ny TOMPO tokoa ny tarainako
  - type: text
    content: ary noraisiny ny vavaka nataoko.
  '11':
  - type: text
    content: Aoka ho menatra avokoa ny fahavaloko;
  - type: text
    content: ho azon’ny horohoro izaitsizy anie ireo
  - type: text
    content: ka hiverina ilalana, feno henatra tampoka!
  '2':
  - type: text
    content: TOMPO ô, tezitra amiko Ianao nefa aza faizina aho;
  - type: text
    content: vinitra amiko Ianao nefa aza sazîna aho
  - type: note
    content: Jereo Sal 38,2.
  - type: text
    content: .
  '3':
  - type: text
    content: TOMPO ô, iantrao aho fa reraka;
  - type: text
    content: TOMPO ô, sitrano fa lany hery
  - type: note
    content: 'lany hery: jereo Sal 32.3.'
  - type: text
    content: .
  '4':
  - type: text
    content: Mangorohoro aoka izany aho;
  - type: text
    content: fa Ianao kosa re, TOMPO ô,
  - type: text
    content: aza mampiandry ahy ela loatra!
  '5':
  - type: text
    content: TOMPO ô, miverena hanafaka ahy,
  - type: text
    content: vonjeo aho noho ny fitiavanao.
  '6':
  - type: text
    content: Fa ny maty tsy hahatsiaro Anao;
  - type: text
    content: any amin’ny fonenany, tsy hisy hidera Anao.
  '7':
  - type: text
    content: Trotraky ny sento aho; ka isan’alina
  - type: text
    content: dia kotsan’ny tomaniko ny fandriako
  - type: text
    content: ary vonton-dranomaso ny kidoroko.
  '8':
  - type: text
    content: Jembin’ny alahelo tokoa ireto masoko,
  - type: text
    content: efa pahina noho ny ataon’ny fahavaloko.
  '9':
  - type: text
    content: Mialà amiko ianareo rehetra mpanao ratsy
  - type: note
    content: Jereo Mt 7.23; Lk 13.27.
  - type: text
    content: ','
  - type: text
    content: satria efa ren’ny TOMPO ny fitomaniako.
