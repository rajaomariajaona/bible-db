    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: TOMPO ô, iantrao aho fa reraka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, sitrano fa lany hery
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
