      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Eny, ren’ny TOMPO tokoa ny tarainako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary noraisiny ny vavaka nataoko.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Aoka ho menatra avokoa ny fahavaloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho azon’ny horohoro izaitsizy anie ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiverina ilalana, feno henatra tampoka!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: TOMPO ô, tezitra amiko Ianao nefa aza faizina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vinitra amiko Ianao nefa aza sazîna aho
