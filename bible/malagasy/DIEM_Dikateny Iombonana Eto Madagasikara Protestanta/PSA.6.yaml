  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mangorohoro aoka izany aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao kosa re, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza mampiandry ahy ela loatra!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: TOMPO ô, miverena hanafaka ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vonjeo aho noho ny fitiavanao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa ny maty tsy hahatsiaro Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny fonenany, tsy hisy hidera Anao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Trotraky ny sento aho; ka isan’alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia kotsan’ny tomaniko ny fandriako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vonton-dranomaso ny kidoroko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jembin’ny alahelo tokoa ireto masoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa pahina noho ny ataon’ny fahavaloko.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mialà amiko ianareo rehetra mpanao ratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.9 '
      - type: usfm
