document_id: JER.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra velona mifanandrina amin’ny sampy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mihainoa ny hafatra izay nambaran’ny TOMPO momba anareo, ry olon’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aza ianaranareo ny fomban’ny firenen-kafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza atahoranareo ny famantarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay miseho eny an-danitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny firenen-kafa no matahotra ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny fanaon’ny firenen-kafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zava-poana ihany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hazo any an’ala no kapainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia sokirin’ny mpandrafitra ho sampy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ravahany volamena na volafotsy izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamafisiny amin’ny tantanana sy ny fantsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hampihetsiketsika azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy ny kalo eny an-tanin-kôkômbra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo andriamanitra sampy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy miteny akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: entina izy fa tsy mba afa-mandeha.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra azy ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy afaka manisy ratsy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy afaka manisy soa ihany koa.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy misy tahaka Anao, ry TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa lehibe Ianao ary lehibe ny lazanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny asa mahery nataonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Iza no tsy hatahotra Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Mpanjakan’ireo firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mendrika anao izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hendry rehetra amin’ireo firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ao amin’ireo fanjakana rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy misy mitovy aminao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Apôk 15.4.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa adala sy very saina izy rehetra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: zava-poana ny fampianarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tapa-kazo ihany izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ireo sampy ireo dia ravahana
- type: usfm
  marker: q1
  children:
  - type: text
    text: takela-bolafotsy avy any Tarsisy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na volamena avy any Ôfira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tarsisy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'seranan-tsambo na faritany iray any Mediteranea andrefana, heverina ho tany Espaina. –Ôfira: faritany malaza noho ny volamenany (1 Mp 22.49), nefa ny TM manao hoe Ofaza izay faritany tsy fantatra kanefa voalaza koa ao amin’ny Dan 10.5.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay namboarin’ny mpanao asan-tanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mpanefy firavaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary lamba jaky sy volomparasy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nampitafiana azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asan’ny mpahay taozavatra avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireny sampy rehetra ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny TOMPO kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tena Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra velona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy Mpanjaka mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa tezitra Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mihorohoro ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny firenena dia tsy mahatanty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahavinirany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao àry no holazainareo aminy: ireo andriamanitra tsy nanao ny lanitra sy ny tany ireo dia holevonina tsy ho etỳ an-tany intsony, sady tsy hanan-toerana atỳ ambanin’ny lanitra.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tamin-kery no nanaovan’ny Tompo ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamim-pahendrena no nanorenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: izao tontolo izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tamim-pahaizana no namelarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny habakabaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Baikony no mampitoby
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ranobe any an-danitra any
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mampiakatra ny rahona matevina
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any am-paravodilanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary andatsahan’ny tselatra ny ranonorana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ivoahan’ny rivotra avy amin’ny fitoerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ketrina avokoa ny olona rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahatakatra ny hevitr’izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo mpandasitra sarivongan-tsampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia menatra avokoa tamin’ny nataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria fitaka ireo sarivongana ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy manam-pofonaina akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Zava-poana sy asa mahatsikaiky ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa amin’ny andro hamaizana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho levona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa tsy mitovy amin’ireo ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay Anjaran’i Jakôba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Izy no mpamorona ny zava-drehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vahoaka Israely dia fananany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay TOMPOn’izao rehetra izao no anarany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antomotra ny fahavoazana
  marker-yv: yv-h
- type: usfm
  marker: sp
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: (Jeremià)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Angòny hiala teo ny entanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Jerosalema voafahirano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izao no lazain’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Amin’ity indray mandeha ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia horoahiko ny mponina eo amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hotemeriko akaiky izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hisy ho afa-mitsoaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.18 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'tsy ho afa-mitsoaka:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt tranainy grika sy latinina; hebreo hahita na hahita Ahy izy.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: sp
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: (Jerosalema)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hoy kosa i Jerosalema hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indrisy ity fahavoazako e!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lalina ny ratra mahazo ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa anjara-fahoriako izao, hoy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia hozakaiko ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rava ny laiko, tapaka avokoa ny tadiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy manan-janaka intsony aho fa lasa ireo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy hanangana ny laiko intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanorina indray ny fialofako.»
- type: usfm
  marker: sp
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: (Jeremià)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hadalàn’ny mpitondra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nanontany ny TOMPO izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no tsy nahombiazany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary niparitahan’izay rehetra nandrasany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Injany misy feon-javatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mirohondrohona sy mihamanatona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fanakorontanana goavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any amin’ny tany avaratra any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatonga ny tanànan’i Joda ho lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho fonenan’ny amboadia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tany avaratra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.14 sy nta. –faran’ny and jereo Jer 9.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavak’i Jeremià
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: TOMPO ô, fantatrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olombelona tsy mahafehy ny lalany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpivahiny tsy mahalamin-dia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa ahitsio aho, ry TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa araka ny antonony ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy araka ny fahatezeranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao hataonao tonga tsinontsinona aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny firenen-kafa izay tsy mahalala Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny vahoaka izay tsy mivavaka aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no aoka hisafoahan’ny hatezeranao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nandripaka an’i Jakôba ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, nandripaka azy hatramin’ny farany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nandrava ny toeram-ponenany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 79.6-7.
