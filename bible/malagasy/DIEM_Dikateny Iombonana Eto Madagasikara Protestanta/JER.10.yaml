document_id: JER.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra velona mifanandrina amin’ny sampy
  - type: text
    content: 'Mihainoa ny hafatra izay nambaran’ny TOMPO momba anareo, ry olon’i Israely. '
  '10':
  - type: text
    content: Fa ny TOMPO kosa
  - type: text
    content: no tena Andriamanitra,
  - type: text
    content: Andriamanitra velona
  - type: text
    content: sy Mpanjaka mandrakizay.
  - type: text
    content: Rehefa tezitra Izy,
  - type: text
    content: dia mihorohoro ny tany;
  - type: text
    content: ary ny firenena dia tsy mahatanty
  - type: text
    content: ny fahavinirany.
  '11':
  - type: text
    content: 'Izao àry no holazainareo aminy: ireo andriamanitra tsy nanao ny lanitra sy ny tany ireo dia holevonina tsy ho etỳ an-tany intsony, sady tsy hanan-toerana atỳ ambanin’ny lanitra.'
  '12':
  - type: text
    content: Tamin-kery no nanaovan’ny Tompo ny tany,
  - type: text
    content: tamim-pahendrena no nanorenany
  - type: text
    content: izao tontolo izao,
  - type: text
    content: ary tamim-pahaizana no namelarany
  - type: text
    content: ny habakabaka.
  '13':
  - type: text
    content: Baikony no mampitoby
  - type: text
    content: ny ranobe any an-danitra any
  - type: text
    content: sy mampiakatra ny rahona matevina
  - type: text
    content: avy any am-paravodilanitra,
  - type: text
    content: ary andatsahan’ny tselatra ny ranonorana
  - type: text
    content: sy ivoahan’ny rivotra avy amin’ny fitoerany.
  '14':
  - type: text
    content: Ketrina avokoa ny olona rehetra
  - type: text
    content: ka tsy mahatakatra ny hevitr’izany.
  - type: text
    content: Ireo mpandasitra sarivongan-tsampy
  - type: text
    content: dia menatra avokoa tamin’ny nataony;
  - type: text
    content: satria fitaka ireo sarivongana ireo
  - type: text
    content: fa tsy manam-pofonaina akory.
  '15':
  - type: text
    content: Zava-poana sy asa mahatsikaiky ireny;
  - type: text
    content: fa amin’ny andro hamaizana azy,
  - type: text
    content: dia ho levona izy.
  '16':
  - type: text
    content: Fa tsy mitovy amin’ireo ny Tompo,
  - type: text
    content: ilay Anjaran’i Jakôba,
  - type: text
    content: satria Izy no mpamorona ny zava-drehetra;
  - type: text
    content: ary ny vahoaka Israely dia fananany.
  - type: text
    content: Ilay TOMPOn’izao rehetra izao no anarany.
  - type: heading
    content: Antomotra ny fahavoazana
  - type: heading
    content: (Jeremià)
  '17':
  - type: text
    content: Angòny hiala teo ny entanao,
  - type: text
    content: ry Jerosalema voafahirano.
  '18':
  - type: text
    content: 'Fa izao no lazain’ny TOMPO:'
  - type: text
    content: «Amin’ity indray mandeha ity
  - type: text
    content: dia horoahiko ny mponina eo amin’ny tany;
  - type: text
    content: hotemeriko akaiky izy
  - type: text
    content: mba tsy hisy ho afa-mitsoaka
  - type: note
    content: 'tsy ho afa-mitsoaka: araka ny dkt tranainy grika sy latinina; hebreo hahita na hahita Ahy izy.'
  - type: text
    content: .»
  - type: heading
    content: (Jerosalema)
  '19':
  - type: text
    content: 'Hoy kosa i Jerosalema hoe:'
  - type: text
    content: «Indrisy ity fahavoazako e!
  - type: text
    content: Lalina ny ratra mahazo ahy.
  - type: text
    content: Nefa anjara-fahoriako izao, hoy aho,
  - type: text
    content: ka dia hozakaiko ihany.
  '2':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Aza ianaranareo ny fomban’ny firenen-kafa;
  - type: text
    content: ary aza atahoranareo ny famantarana
  - type: text
    content: izay miseho eny an-danitra,
  - type: text
    content: fa ny firenen-kafa no matahotra ireny.
  '20':
  - type: text
    content: Rava ny laiko, tapaka avokoa ny tadiny.
  - type: text
    content: Tsy manan-janaka intsony aho fa lasa ireo.
  - type: text
    content: Tsy misy hanangana ny laiko intsony
  - type: text
    content: na hanorina indray ny fialofako.»
  - type: heading
    content: (Jeremià)
  '21':
  - type: text
    content: 'Hadalàn’ny mpitondra izao:'
  - type: text
    content: Tsy nanontany ny TOMPO izy.
  - type: text
    content: Izany no tsy nahombiazany,
  - type: text
    content: ary niparitahan’izay rehetra nandrasany.
  '22':
  - type: text
    content: Injany misy feon-javatra
  - type: text
    content: mirohondrohona sy mihamanatona,
  - type: text
    content: dia fanakorontanana goavana
  - type: text
    content: avy any amin’ny tany avaratra any,
  - type: text
    content: mba hahatonga ny tanànan’i Joda ho lao
  - type: text
    content: sy ho fonenan’ny amboadia
  - type: note
    content: 'tany avaratra: jereo 1.14 sy nta. –faran’ny and jereo Jer 9.10.'
  - type: text
    content: .
  - type: heading
    content: Vavak’i Jeremià
  '23':
  - type: text
    content: TOMPO ô, fantatrao
  - type: text
    content: fa ny olombelona tsy mahafehy ny lalany,
  - type: text
    content: ary ny mpivahiny tsy mahalamin-dia.
  '24':
  - type: text
    content: Koa ahitsio aho, ry TOMPO,
  - type: text
    content: nefa araka ny antonony ihany
  - type: text
    content: fa tsy araka ny fahatezeranao
  - type: text
    content: fandrao hataonao tonga tsinontsinona aho.
  '25':
  - type: text
    content: Ny firenen-kafa izay tsy mahalala Anao,
  - type: text
    content: dia ny vahoaka izay tsy mivavaka aminao,
  - type: text
    content: no aoka hisafoahan’ny hatezeranao.
  - type: text
    content: Fa nandripaka an’i Jakôba ireo,
  - type: text
    content: eny, nandripaka azy hatramin’ny farany
  - type: text
    content: ary nandrava ny toeram-ponenany
  - type: note
    content: Jereo Sal 79.6-7.
  - type: text
    content: .
  '3':
  - type: text
    content: Ny fanaon’ny firenen-kafa
  - type: text
    content: dia zava-poana ihany.
  - type: text
    content: Hazo any an’ala no kapainy,
  - type: text
    content: dia sokirin’ny mpandrafitra ho sampy.
  '4':
  - type: text
    content: Ravahany volamena na volafotsy izany,
  - type: text
    content: hamafisiny amin’ny tantanana sy ny fantsika
  - type: text
    content: mba tsy hampihetsiketsika azy.
  '5':
  - type: text
    content: Toy ny kalo eny an-tanin-kôkômbra
  - type: text
    content: ireo andriamanitra sampy ireo
  - type: text
    content: ka tsy miteny akory;
  - type: text
    content: entina izy fa tsy mba afa-mandeha.
  - type: text
    content: Aza matahotra azy ianareo,
  - type: text
    content: fa tsy afaka manisy ratsy izy
  - type: text
    content: ary tsy afaka manisy soa ihany koa.»
  '6':
  - type: text
    content: Tsy misy tahaka Anao, ry TOMPO,
  - type: text
    content: fa lehibe Ianao ary lehibe ny lazanao
  - type: text
    content: amin’ny asa mahery nataonao.
  '7':
  - type: text
    content: Iza no tsy hatahotra Anao,
  - type: text
    content: ry Mpanjakan’ireo firenena,
  - type: text
    content: fa mendrika anao izany.
  - type: text
    content: Ny hendry rehetra amin’ireo firenena
  - type: text
    content: sy ao amin’ireo fanjakana rehetra
  - type: text
    content: dia tsy misy mitovy aminao
  - type: note
    content: Ampit Apôk 15.4.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Fa adala sy very saina izy rehetra:'
  - type: text
    content: zava-poana ny fampianarany
  - type: text
    content: fa tapa-kazo ihany izany.
  '9':
  - type: text
    content: Ireo sampy ireo dia ravahana
  - type: text
    content: takela-bolafotsy avy any Tarsisy
  - type: text
    content: na volamena avy any Ôfira
  - type: note
    content: 'Tarsisy: seranan-tsambo na faritany iray any Mediteranea andrefana, heverina ho tany Espaina. –Ôfira: faritany malaza noho ny volamenany (1 Mp 22.49), nefa ny TM manao hoe Ofaza izay faritany tsy fantatra kanefa voalaza koa ao amin’ny Dan 10.5.'
  - type: text
    content: ','
  - type: text
    content: izay namboarin’ny mpanao asan-tanana
  - type: text
    content: sy ny mpanefy firavaka;
  - type: text
    content: ary lamba jaky sy volomparasy
  - type: text
    content: no nampitafiana azy.
  - type: text
    content: Asan’ny mpahay taozavatra avokoa
  - type: text
    content: ireny sampy rehetra ireny.
