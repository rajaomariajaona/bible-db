document_id: NEH.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tantara nalahatr’i Nehemià zanakalahin’i Hakalià.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahazo vaovao momba an’i Jerosalema i Nehemià
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taona faha-roapolo nanjakàn’i Artakserksesa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'taona faha-roapolo... Artakserksesa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny rijan-teny hebreo dia milaza fotsiny hoe taona faha-roapolo, kanefa i Artakserksesa dia voatonona etsy amin’ny 2.1. Toa ilay Artakserksesa 1 no ambara eto, ka dia ny taona 445 tal J.K. izany taona faha-roapolo nanjakany izany (jereo Hez 4.5 sy nta). –Kisleo: volana fahasivy amin’ny taona manomboka lohataona izany hoe nôvambra-desambra.'
      marker-yv: yv-n
    - type: text
      text: ', volana Kisleo, raha tany an-dapa tao Sosany aho, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tompo ô, mpanomponao sy vahoakanao izahay sady efa navotanao tamin’ny herinao lehibe sy ny fahefànao tsy hay tohaina. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Koa mitalaho aminao aho, Tompo ô; aoka Ianao hihaino ny vavaka ataoko sy ataon’ireo mpanomponao rehetra izay faly manaja Anao. Hambininao anie aho ka hataonao mahazo famindrampo eo imason’ny amperôra!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mpandroso divay ho an’ny amperôra aho tamin’izay.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: dia tonga avy any Joda i Hanany, anankiray amin’ireo rahalahiko, miaraka amina lehilahy vitsivitsy. Nanontaniako azy ny amin’ny Jiosy efa afaka, izany hoe tafaverina avy any an-tsesitany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny amin’ny Jiosy... an-tsesitany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dkt hafa ny amin’ireo mponin’ny faritr’i Joda, taranak’ireo tafaverina avy any an-tsesitany.
      marker-yv: yv-n
    - type: text
      text: ', ary ny amin’i Jerosalema. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ka izao no navaliny ahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ireo Jiosy tafaverina avy any an-tsesitany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ireo Jiosy... an-tsesitany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny taranak’ireo Jiosy tafaverina avy any an-tsesitany.
      marker-yv: yv-n
    - type: text
      text: ', ao amin’ny faritr’i Joda, dia mitondra latsa sy fahoriana be; ny mandan’i Jerosalema kosa voarodana, ary ny vavahadiny dia kilan’ny afo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vavaka ataon’i Nehemià ho an’ireo Jiosy
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Rehefa nandre izany vaovao izany aho, dia nipetraka nitomany sy niferinaina andro maromaro sady '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nifady hanina
    - type: text
      text: ' sy nivavaka teo anatrehan’Andriamanitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lanitra
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indrisy, ry TOMPO Andriamanitry ny lanitra, Andriamanitra lehibe sy mahatahotra! Mitandro ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' sy famindrampo Ianao amin’izay mitia Anao sy mitandrina ny didinao; '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'koa enga anie Ianao hihaino sy hijery ahy! Ekeo ny vavaka izay ataoko aminao ankehitriny fa mpanomponao aho. Andro aman’alina aho no mivavaka aminao ho anay Israelita mpanomponao; avelao heloka izahay fa miaiky ny fahotana nataonay taminao aho. Eny, izaho sy ny razako samy efa nanota avokoa; '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'efa nanao izay ratsy indrindra taminao izahay, ka tsy nitandrina ny didy sy lalàna amam-pitsipika nampitainao tamin’i Mosesy mpanomponao. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tsarovy ilay teny nasainao nolazain’i Mosesy mpanomponao hoe: «Raha manao izay mahadiso ianareo, dia haeliko any amin’ny firenen-kafa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 26.33; Deot 4.27; 28.64
      marker-yv: yv-n
    - type: text
      text: '; '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: nefa raha miverina amiko ianareo ka imasoanareo hotanterahina ny didiko, na dia hisy voasesy any am-paran’ny tany aza ianareo, dia hangoniko avy any sy hoentiko ho ao amin’ilay toerana voafidiko hiatrehanareo Ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy rijan-teny anankiray ao amin’ny Pentateoka no tsiahivina ara-bakiteny eto amin’ny and 8b-9; kanefa hevitra mitovy amin’izany no ambaran’ny Deot 30.1-5.
      marker-yv: yv-n
    - type: text
      text: '.» '
