document_id: NEH.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Tantara nalahatr’i Nehemià zanakalahin’i Hakalià.
  - type: heading
    content: Mahazo vaovao momba an’i Jerosalema i Nehemià
  - type: text
    content: Tamin’ny taona faha-roapolo nanjakàn’i Artakserksesa
  - type: note
    content: 'taona faha-roapolo... Artakserksesa: ny rijan-teny hebreo dia milaza fotsiny hoe taona faha-roapolo, kanefa i Artakserksesa dia voatonona etsy amin’ny 2.1. Toa ilay Artakserksesa 1 no ambara eto, ka dia ny taona 445 tal J.K. izany taona faha-roapolo nanjakany izany (jereo Hez 4.5 sy nta). –Kisleo: volana fahasivy amin’ny taona manomboka lohataona izany hoe nôvambra-desambra.'
  - type: text
    content: ', volana Kisleo, raha tany an-dapa tao Sosany aho, '
  '10':
  - type: text
    content: 'Tompo ô, mpanomponao sy vahoakanao izahay sady efa navotanao tamin’ny herinao lehibe sy ny fahefànao tsy hay tohaina. '
  '11':
  - type: text
    content: Koa mitalaho aminao aho, Tompo ô; aoka Ianao hihaino ny vavaka ataoko sy ataon’ireo mpanomponao rehetra izay faly manaja Anao. Hambininao anie aho ka hataonao mahazo famindrampo eo imason’ny amperôra!
  - type: text
    content: Mpandroso divay ho an’ny amperôra aho tamin’izay.
  '2':
  - type: text
    content: dia tonga avy any Joda i Hanany, anankiray amin’ireo rahalahiko, miaraka amina lehilahy vitsivitsy. Nanontaniako azy ny amin’ny Jiosy efa afaka, izany hoe tafaverina avy any an-tsesitany
  - type: note
    content: 'ny amin’ny Jiosy... an-tsesitany: dkt hafa ny amin’ireo mponin’ny faritr’i Joda, taranak’ireo tafaverina avy any an-tsesitany.'
  - type: text
    content: ', ary ny amin’i Jerosalema. '
  '3':
  - type: text
    content: 'Ka izao no navaliny ahy:'
  - type: text
    content: –Ireo Jiosy tafaverina avy any an-tsesitany
  - type: note
    content: 'Ireo Jiosy... an-tsesitany: Ny taranak’ireo Jiosy tafaverina avy any an-tsesitany.'
  - type: text
    content: ', ao amin’ny faritr’i Joda, dia mitondra latsa sy fahoriana be; ny mandan’i Jerosalema kosa voarodana, ary ny vavahadiny dia kilan’ny afo.'
  - type: heading
    content: Ny vavaka ataon’i Nehemià ho an’ireo Jiosy
  '4':
  - type: text
    content: 'Rehefa nandre izany vaovao izany aho, dia nipetraka nitomany sy niferinaina andro maromaro sady '
  - type: text
    content: nifady hanina
  - type: text
    content: ' sy nivavaka teo anatrehan’Andriamanitry ny '
  - type: text
    content: lanitra
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: '–Indrisy, ry TOMPO Andriamanitry ny lanitra, Andriamanitra lehibe sy mahatahotra! Mitandro ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' sy famindrampo Ianao amin’izay mitia Anao sy mitandrina ny didinao; '
  '6':
  - type: text
    content: 'koa enga anie Ianao hihaino sy hijery ahy! Ekeo ny vavaka izay ataoko aminao ankehitriny fa mpanomponao aho. Andro aman’alina aho no mivavaka aminao ho anay Israelita mpanomponao; avelao heloka izahay fa miaiky ny fahotana nataonay taminao aho. Eny, izaho sy ny razako samy efa nanota avokoa; '
  '7':
  - type: text
    content: 'efa nanao izay ratsy indrindra taminao izahay, ka tsy nitandrina ny didy sy lalàna amam-pitsipika nampitainao tamin’i Mosesy mpanomponao. '
  '8':
  - type: text
    content: 'Tsarovy ilay teny nasainao nolazain’i Mosesy mpanomponao hoe: «Raha manao izay mahadiso ianareo, dia haeliko any amin’ny firenen-kafa'
  - type: note
    content: Jereo Lev 26.33; Deot 4.27; 28.64
  - type: text
    content: '; '
  '9':
  - type: text
    content: nefa raha miverina amiko ianareo ka imasoanareo hotanterahina ny didiko, na dia hisy voasesy any am-paran’ny tany aza ianareo, dia hangoniko avy any sy hoentiko ho ao amin’ilay toerana voafidiko hiatrehanareo Ahy
  - type: note
    content: Tsy rijan-teny anankiray ao amin’ny Pentateoka no tsiahivina ara-bakiteny eto amin’ny and 8b-9; kanefa hevitra mitovy amin’izany no ambaran’ny Deot 30.1-5.
  - type: text
    content: '.» '
