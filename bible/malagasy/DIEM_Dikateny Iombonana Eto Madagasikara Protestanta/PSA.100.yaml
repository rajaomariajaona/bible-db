  - type: text
    text: SALAMO Isika no vahoakan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Salamo fampiasa amin’ny sorom-pisaorana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihobia ny TOMPO, ry mponin’ny tany tontolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Anaovy fanompoam-pivavahana amim-pifaliana IZY;
- type: usfm
  marker: q1
  children:
  - type: text
    text: midira eo anatrehany amin’ny hiram-piravoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fantaro fa ny TOMPO no Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izy no nanao antsika: ka Azy isika,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vahoakany sady andian’ondry andrasany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny vavahadin’ny tempoliny, idiro amin-tsaotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo kianja ao anatiny, idiro amin-dera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: isaory Izy, ary ankalazao ny anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny, tsara ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: maharitra mandrakizay ny fitiavany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '100.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 106.1 sy nta.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahatoky hatrany hatrany Izy.
