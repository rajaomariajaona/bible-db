document_id: PSA.100,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Isika no vahoakan’Andriamanitra
  - type: text
    content: ' '
  - type: text
    content: Salamo fampiasa amin’ny sorom-pisaorana.
  - type: text
    content: Mihobia ny TOMPO, ry mponin’ny tany tontolo.
  '2':
  - type: text
    content: Anaovy fanompoam-pivavahana amim-pifaliana IZY;
  - type: text
    content: midira eo anatrehany amin’ny hiram-piravoana.
  '3':
  - type: text
    content: Fantaro fa ny TOMPO no Andriamanitra;
  - type: text
    content: 'Izy no nanao antsika: ka Azy isika,'
  - type: text
    content: vahoakany sady andian’ondry andrasany.
  '4':
  - type: text
    content: Ny vavahadin’ny tempoliny, idiro amin-tsaotra;
  - type: text
    content: ireo kianja ao anatiny, idiro amin-dera;
  - type: text
    content: isaory Izy, ary ankalazao ny anarany.
  '5':
  - type: text
    content: 'Eny, tsara ny TOMPO:'
  - type: text
    content: maharitra mandrakizay ny fitiavany
  - type: note
    content: Jereo Sal 106.1 sy nta.
  - type: text
    content: ary mahatoky hatrany hatrany Izy.
