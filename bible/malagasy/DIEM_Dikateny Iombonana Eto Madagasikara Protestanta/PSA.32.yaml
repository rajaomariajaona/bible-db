verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Sambatra ny voavela heloka
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tononkalo fananarana nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra ny olona afa-keloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy voavelan’Andriamanitra ny otany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fijaliana maro ny an’ny ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mitoky amin’ny TOMPO kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia harovan’ny fitiavany hatrany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Noho ny amin’izay nataon’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mifalia sy miravoa, ry olo-marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manaova horakora-pihobiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo rehetra mahitsy fo.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Sambatra izay tsy heverin’ny TOMPO ho diso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy misy fitaka ny fanahiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rm 4.7-8.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fony aho tsy mbola niaiky fahotana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nihalany hery ny tenako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nitaraina tontolo andro aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Andro aman’alina, Tompo ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanasazianao ahy hatrany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanjary reraka mafy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toa nasian’ny hainandro migaina.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Koa dia naborako taminao ny otako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nafeniko Anao ny hadisoako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy aho hoe: «Meloka aho, TOMPO ô,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy maintsy hiaiky izany aminao.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’izay dia nafahanao ny otako.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: Fiatoana
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny mpivavaka marina rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tokony hitalaho aminao toy izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fotoana ilàny vonjy aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka na toa ranobe hitelina aza ny loza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hahatratra azy akory izany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ianao no fierena miaro ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy ho azon’ny fahoriana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ahodidinao ahy dia horakora-pihobiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataon’ireo mifaly fa nafahanao aho.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: Fiatoana
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hoy ny Tompo hoe: «Hampianariko ianao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hotondroiko ny lalan-kalehanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hotoroako hevitra sy harahiko maso:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: aoka ianao tsy ho ketrina toa soavaly na ampondra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay vy sy lamboridy no ihazonan’olona azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hisy zava-doza hihatra aminao.»
