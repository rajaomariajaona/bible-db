document_id: PSA.32,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Sambatra ny voavela heloka
  - type: text
    content: ' '
  - type: text
    content: Tononkalo fananarana nataon’i Davida.
  - type: text
    content: Sambatra ny olona afa-keloka
  - type: text
    content: sy voavelan’Andriamanitra ny otany.
  '10':
  - type: text
    content: Fijaliana maro ny an’ny ratsy fanahy;
  - type: text
    content: fa izay mitoky amin’ny TOMPO kosa
  - type: text
    content: dia harovan’ny fitiavany hatrany.
  '11':
  - type: text
    content: Noho ny amin’izay nataon’ny TOMPO,
  - type: text
    content: dia mifalia sy miravoa, ry olo-marina;
  - type: text
    content: manaova horakora-pihobiana,
  - type: text
    content: ianareo rehetra mahitsy fo.
  '2':
  - type: text
    content: Sambatra izay tsy heverin’ny TOMPO ho diso
  - type: text
    content: sady tsy misy fitaka ny fanahiny
  - type: note
    content: Jereo Rm 4.7-8.
  - type: text
    content: .
  '3':
  - type: text
    content: Fony aho tsy mbola niaiky fahotana,
  - type: text
    content: dia nihalany hery ny tenako
  - type: text
    content: satria nitaraina tontolo andro aho.
  '4':
  - type: text
    content: Andro aman’alina, Tompo ô,
  - type: text
    content: no nanasazianao ahy hatrany;
  - type: text
    content: ka nanjary reraka mafy aho,
  - type: text
    content: toa nasian’ny hainandro migaina.
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Koa dia naborako taminao ny otako
  - type: text
    content: ary tsy nafeniko Anao ny hadisoako.
  - type: text
    content: 'Hoy aho hoe: «Meloka aho, TOMPO ô,'
  - type: text
    content: ka tsy maintsy hiaiky izany aminao.»
  - type: text
    content: Tamin’izay dia nafahanao ny otako.
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: Ny mpivavaka marina rehetra
  - type: text
    content: dia tokony hitalaho aminao toy izany
  - type: text
    content: amin’ny fotoana ilàny vonjy aminao;
  - type: text
    content: ka na toa ranobe hitelina aza ny loza,
  - type: text
    content: dia tsy hahatratra azy akory izany.
  '7':
  - type: text
    content: Ianao no fierena miaro ahy
  - type: text
    content: mba tsy ho azon’ny fahoriana;
  - type: text
    content: ny ahodidinao ahy dia horakora-pihobiana
  - type: text
    content: ataon’ireo mifaly fa nafahanao aho.
  - type: text
    content: Fiatoana
  '8':
  - type: text
    content: 'Hoy ny Tompo hoe: «Hampianariko ianao'
  - type: text
    content: sady hotondroiko ny lalan-kalehanao,
  - type: text
    content: 'hotoroako hevitra sy harahiko maso:'
  '9':
  - type: text
    content: aoka ianao tsy ho ketrina toa soavaly na ampondra
  - type: text
    content: izay vy sy lamboridy no ihazonan’olona azy;
  - type: text
    content: dia tsy hisy zava-doza hihatra aminao.»
