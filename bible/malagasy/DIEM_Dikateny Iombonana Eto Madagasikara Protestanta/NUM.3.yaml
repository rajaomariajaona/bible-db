document_id: NUM.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny raharaha nampanaovina ny fokon’i Levỳ
  - type: text
    content: 'Ireto avy ny taranak’i Aharôna sy i Mosesy tamin’ny andro nitenenan’ny TOMPO tamin’i Mosesy teo an-tendrombohitra Sinay. '
  '10':
  - type: text
    content: Hatsanganao hitandrina ny asa fisoronana i Aharôna sy ny zanany; fa izay tsy mpisorona mitady hanatona kosa dia hatao maty.
  '11':
  - type: text
    content: 'Mbola niteny tamin’i Mosesy indray ny TOMPO ka nanao hoe:'
  '12':
  - type: text
    content: '–Indro Aho efa nifidy ny Levita tamin’ny Israelita rehetra ho solon’ny lahimatoa rehetra voalohan-teraka aminy; koa dia Ahy ny Levita, '
  '13':
  - type: text
    content: 'satria Ahy ny voalohan-teraka rehetra. Tamin’ny andro namelezako ny voalohan-teraka rehetra tany Ejipta no nanokanako ny voalohan-teraka rehetra tamin’ny Israelita ho Ahy, na olona izay na biby fiompy: Ahy ireo'
  - type: note
    content: Jereo 3.40-51. Ampit Eks 13.1-16.
  - type: text
    content: . Izaho no TOMPO.
  - type: heading
    content: Fanisana voalohany ny fokon’i Levỳ
  '14':
  - type: text
    content: 'Niteny tamin’i Mosesy tany an-taniefitr’i Sinay ny TOMPO ka nanao hoe:'
  '15':
  - type: text
    content: –Ataovy ny fanisana ny taranak’i Levỳ isam-pianakaviana sy isan-tarika avy, ka ny Levita lahy rehetra feno iray volana no ho miakatra no hoisainao.
  '16':
  - type: text
    content: Dia nataon’i Mosesy ny fanisana azy ireo, araka izay nandidian’ny TOMPO azy.
  '17':
  - type: text
    content: 'Ireto avy ny anaran’ny zanakalahin’i Levỳ: i Gersôna, i Kehata ary i Merarỳ. '
  '18':
  - type: text
    content: 'Indreto kosa ny anaran’ny zanakalahin’i Gersôna: i Libnỳ sy i Simehỳ ka izy roa lahy no razan’ny tarika avy aminy. '
  '19':
  - type: text
    content: 'Ary ny anaran’ny zanakalahin’i Kehata dia ireto avy: i Hamrama sy i Jitsehara ary i Hebrôna sy i Hoziela ka izy efa-dahy no razan’ny tarika avy aminy. '
  '2':
  - type: text
    content: Nanan-janaka efatra mirahalahy i Aharôna, ka i Nadaba no lahimatoa, ny sisa dia i Abihò sy i Elehazara ary i Itamara
  - type: note
    content: Jereo 26.60; Eks 6.23.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Ary ny zanakalahin’i Merarỳ dia i Mahilỳ sy i Mosỳ ka izy roa lahy no razan’ny tarika avy aminy. Izy valo lahy ireo no ipoiran’ny tariky ny Levita araka ny fianakaviambeny avy.
  '21':
  - type: text
    content: 'I Gersôna no razan’ny Gersônita izay misy tarika roa, dia ny Libnita sy ny Simehita. '
  '22':
  - type: text
    content: 'Rehefa natao fanisana ny lehilahy rehetra tao aminy, izay feno iray volana no ho miakatra, dia nahatratra 7 500. '
  '23':
  - type: text
    content: 'Nitoby teo ivohon’ny Fonena-masina, teo andrefany, ny Gersônita. '
  '24':
  - type: text
    content: 'I Eliasafa zanakalahin’i Laela no filoham-pianakaviamben’ny Gersônita. '
  '25':
  - type: text
    content: 'Niandraikitra ny amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' no raharahan’i Gersônita; dia ny Fonena-masina, ny lay, ny firakony, ny lambam-baravaran’ny Tranolay fihaonana, '
  '26':
  - type: text
    content: 'ny fefilamban’ny kianja sy ny vavahady lamba amin’ny kianja izay manodidina ny Fonena-masina sy ny '
  - type: text
    content: alitara
  - type: text
    content: ', ary ny tadin’ny lay. Nisahana ny fikarakarana rehetra momba ireny ny Gersônita.'
  '27':
  - type: text
    content: 'I Kehata no razan’ny Kehatita izay misy tarika efatra, dia ny Hamramita sy ny Jitseharita ary ny Hebrônita sy ny Hozielita. '
  '28':
  - type: text
    content: Rehefa natao fanisana ny lehilahy rehetra tao aminy, izay feno iray volana no ho miakatra, dia 8 600
  - type: note
    content: '8 600: ny dkt tranainy grika dia mamaky hoe 8 300, izay mifanaraka amin’ny fitambaran’isa omena ao amin’ny and 39. Kanefa jereo 3.39 sy nta.'
  - type: text
    content: '. Ireo no mpikarakara ny Fonena-masina. '
  '29':
  - type: text
    content: 'Nitoby teo amin’ny lafy atsimon’ny Fonena-masina ny Kehatita. '
  '3':
  - type: text
    content: 'Ireo no anaran’ny zanakalahin’i Aharôna izay samy mpisorona voahosotra sy voatokana hanao ny fisoronana. '
  '30':
  - type: text
    content: 'I Elisafàna zanakalahin’i Hoziela no filoham-pianakaviamben’ny Kehatita. '
  '31':
  - type: text
    content: 'Ny Kehatita no miandraikitra ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ', ny latabatra masina, ny fitoeran-jiro sy ny alitara roa ary ny fanaky ny Toeramasina izay fanaovana fanompoam-pivavahana, ary ny varavarana lamba. Nisahana ny fikarakarana rehetra momba ireny ny Kehatita.'
  '32':
  - type: text
    content: 'I Elehazara, zanakalahin’i Aharôna mpisorona, no filoha faratampon’ny '
  - type: text
    content: Levita
  - type: text
    content: '; izy no mpiandraikitra ireo olona mikarakara ny fanompoana ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: .
  '33':
  - type: text
    content: 'I Merarỳ no razan’ny Merarita izay nisy tarika roa dia ny Mahilita sy ny Mosita. '
  '34':
  - type: text
    content: 'Rehefa natao fanisana ny lehilahy rehetra tao aminy, izay feno iray volana no ho miakatra, dia 6 200. '
  '35':
  - type: text
    content: 'I Tsoriela zanakalahin’i Abihaîla no filoham-pianakaviamben’ny Merarita. Nitoby teo amin’ny lafy avaratry ny Fonena-masina izy ireo. '
  '36':
  - type: text
    content: 'Ny Merarita no miandraikitra ny hazo fisaka amin’ny Tranolay; ny barany, ny andriny mbamin’ny faladiany, ary ny fanaka rehetra momba azy. Nisahana ny fikarakarana rehetra momba ireny ny Merarita. '
  '37':
  - type: text
    content: Mbola izy ireo koa no niandraikitra ny andry manodidina ny kianja masina mbamin’ny faladiany sy ny tsatòka ary ny tady.
  '38':
  - type: text
    content: I Mosesy sy i Aharôna ary ny zanakalahin’i Aharôna dia nitoby teo anoloana atsinanan’ny Tranolay fihaonana eo amin’ny fiposahan’ny masoandro. Izy ireo no miandraikitra ny fiambenana ny Toeramasina amin’ny anaran’ny Israelita. Izay tsy mpisorona mitady hanatona eo dia hatao maty.
  '39':
  - type: text
    content: Ny fitambaran’ny lehilahy levita rehetra feno iray volana no ho miakatra, nisain’i Mosesy sy i Aharôna isan-tarika araka ny didin’ny TOMPO, dia nahatratra 22 000
  - type: note
    content: Ny isa hoe 7 500 (3.22), 8 600 (3.28), 6 200 (3.34), ary 22 000 (3.39) dia mety mivaky hoe andiany 7 misy lehilahy 500, andiany 8 misy lehilahy 600, andiany 6 misy lehilahy 200 ary andiany 21 misy lehilahy 1 300. Jereo 1.20-45 sy nta.
  - type: text
    content: .
  - type: heading
    content: Ny fanavotana indray ny voalohan-teraka
  '4':
  - type: text
    content: 'Maty teo anatrehan’ny TOMPO anefa i Nadaba sy Abihò fony nandoro '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' tsy sahaza Azy tany an-taniefitr’i Sinay'
  - type: note
    content: Jereo Lev 10.1-7. Tsy nety angamba ny fomba narahina tamin’ny fampifangaroana ny vovo-javamanitra; jereo Eks 30.34-35.
  - type: text
    content: . Samy tsy niteraka izy mirahalahy, koa dia i Elehazara sy i Itamara ihany no sisa nanao ny fisoronana teo anatrehan’i Aharôna rainy.
  '40':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Isao ny lahimatoa rehetra, eo amin’ny Israelita, dia izay feno iray volana no ho miakatra, ka ataovy lisitra ny anarany: '
  '41':
  - type: text
    content: 'Hatokanao ho Ahy ny '
  - type: text
    content: Levita
  - type: text
    content: ' ho solon’ny lahimatoa rehetra eo amin’ny Israelita fa Izaho no TOMPO; dia tahaka izany koa, ny biby fiompin’ny Levita no ho solon’ny voalohan-teraky ny biby fiompy rehetra eo amin’ny Israelita.'
  '42':
  - type: text
    content: 'Dia nisain’i Mosesy araka ny nandidian’ny TOMPO azy ny lahimatoa rehetra teo amin’ny Israelita, '
  '43':
  - type: text
    content: dia izay feno iray volana no ho miakatra; ka nahatratra 22 273 ny fitambarany araka ny lisitry ny anarany.
  '44':
  - type: text
    content: 'Hoy koa ny TOMPO tamin’i Mosesy:'
  '45':
  - type: text
    content: '–Atokano ho Ahy ny Levita ho solon’ny lahimatoa rehetra eo amin’ny Israelita fa Izaho no TOMPO; dia tahaka izany koa, ny biby fiompin’ny Levita no ho solon’ny voalohan-teraky ny biby fiompin’ny Israelita. '
  '46':
  - type: text
    content: 'Ho fanavotana ny lahimatoa miisa 273 eo amin’ny Israelita, izany hoe ireo lahimatoa izay nihoatra tamin’ny isan’ny Levita, '
  '47':
  - type: text
    content: 'dia hakanao sekela dimy isan’olona; ka araka ny sekela fampiasa ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ', izany hoe sekela iray milanja folo grama, no hangalanao azy. '
  '48':
  - type: text
    content: Homenao an’i Aharôna sy ny zanany io vola io ho avotr’ireo lahimatoa mihoatra isa ireo.
  '49':
  - type: text
    content: 'Nangonin’i Mosesy ny vola avotra izay nomen’ireo mihoatra isa noho ny voaavotry ny Levita ireo. '
  '5':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  '50':
  - type: text
    content: 'Vola denàry 1 365 no voaangony tamin’ny lahimatoan’ny Israelita, araka ny sekela fampiasa ao amin’ny Toeramasina; '
  '51':
  - type: text
    content: dia natolotr’i Mosesy an’i Aharôna sy ny zanany izany vola avotra izany, araka ny didy nampitain’ny TOMPO tamin’i Mosesy.
  '6':
  - type: text
    content: –Asaivo manatona ny fokon’i Levỳ ka apetraho eo ambany fahefàn’i Aharôna mpisorona mba hanampy azy
  - type: note
    content: 'mba hanampy azy: ny taranak’i Aharôna no sokajin’ny mpisorona. Ny taranak’i Levỳ hafa kosa no sokajin’ny Levita, izay sokajy miankina amin’ny mpisorona.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Eo anoloan’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' no hanatanterahany ny asany ho an’i Aharôna sy ho an’ny fiangonana manontolo, ka hanaovany ny fanompoana ao amin’ny Fonena-masina. '
  '8':
  - type: text
    content: 'Hiandraikitra ny fanaka rehetra momba ny Tranolay fihaonana izy ary ho vonona hanompo ny Israelita ka hanatanteraka izany ao amin’ny Tranolay. '
  '9':
  - type: text
    content: 'Koa homenao an’i Aharôna sy ny zanany ny '
  - type: text
    content: Levita
  - type: text
    content: '; eny, homenao azy marina tokoa avy amin’ny Israelita ireo. '
