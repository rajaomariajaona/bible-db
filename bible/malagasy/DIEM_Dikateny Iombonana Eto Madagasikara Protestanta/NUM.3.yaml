document_id: NUM.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny raharaha nampanaovina ny fokon’i Levỳ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ireto avy ny taranak’i Aharôna sy i Mosesy tamin’ny andro nitenenan’ny TOMPO tamin’i Mosesy teo an-tendrombohitra Sinay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nanan-janaka efatra mirahalahy i Aharôna, ka i Nadaba no lahimatoa, ny sisa dia i Abihò sy i Elehazara ary i Itamara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 26.60; Eks 6.23.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ireo no anaran’ny zanakalahin’i Aharôna izay samy mpisorona voahosotra sy voatokana hanao ny fisoronana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Maty teo anatrehan’ny TOMPO anefa i Nadaba sy Abihò fony nandoro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovo-javamanitra
  - type: text
    text: ' tsy sahaza Azy tany an-taniefitr’i Sinay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 10.1-7. Tsy nety angamba ny fomba narahina tamin’ny fampifangaroana ny vovo-javamanitra; jereo Eks 30.34-35.
    marker-yv: yv-n
  - type: text
    text: . Samy tsy niteraka izy mirahalahy, koa dia i Elehazara sy i Itamara ihany no sisa nanao ny fisoronana teo anatrehan’i Aharôna rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: –Asaivo manatona ny fokon’i Levỳ ka apetraho eo ambany fahefàn’i Aharôna mpisorona mba hanampy azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mba hanampy azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny taranak’i Aharôna no sokajin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpisorona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Ny taranak’i Levỳ hafa kosa no sokajin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Levita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', izay sokajy miankina amin’ny mpisorona.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' no hanatanterahany ny asany ho an’i Aharôna sy ho an’ny fiangonana manontolo, ka hanaovany ny fanompoana ao amin’ny Fonena-masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hiandraikitra ny fanaka rehetra momba ny Tranolay fihaonana izy ary ho vonona hanompo ny Israelita ka hanatanteraka izany ao amin’ny Tranolay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa homenao an’i Aharôna sy ny zanany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: '; eny, homenao azy marina tokoa avy amin’ny Israelita ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hatsanganao hitandrina ny asa fisoronana i Aharôna sy ny zanany; fa izay tsy mpisorona mitady hanatona kosa dia hatao maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mbola niteny tamin’i Mosesy indray ny TOMPO ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '–Indro Aho efa nifidy ny Levita tamin’ny Israelita rehetra ho solon’ny lahimatoa rehetra voalohan-teraka aminy; koa dia Ahy ny Levita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'satria Ahy ny voalohan-teraka rehetra. Tamin’ny andro namelezako ny voalohan-teraka rehetra tany Ejipta no nanokanako ny voalohan-teraka rehetra tamin’ny Israelita ho Ahy, na olona izay na biby fiompy: Ahy ireo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 3.40-51. Ampit Eks 13.1-16.
    marker-yv: yv-n
  - type: text
    text: . Izaho no TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanisana voalohany ny fokon’i Levỳ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Niteny tamin’i Mosesy tany an-taniefitr’i Sinay ny TOMPO ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: –Ataovy ny fanisana ny taranak’i Levỳ isam-pianakaviana sy isan-tarika avy, ka ny Levita lahy rehetra feno iray volana no ho miakatra no hoisainao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia nataon’i Mosesy ny fanisana azy ireo, araka izay nandidian’ny TOMPO azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ireto avy ny anaran’ny zanakalahin’i Levỳ: i Gersôna, i Kehata ary i Merarỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Indreto kosa ny anaran’ny zanakalahin’i Gersôna: i Libnỳ sy i Simehỳ ka izy roa lahy no razan’ny tarika avy aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny anaran’ny zanakalahin’i Kehata dia ireto avy: i Hamrama sy i Jitsehara ary i Hebrôna sy i Hoziela ka izy efa-dahy no razan’ny tarika avy aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny zanakalahin’i Merarỳ dia i Mahilỳ sy i Mosỳ ka izy roa lahy no razan’ny tarika avy aminy. Izy valo lahy ireo no ipoiran’ny tariky ny Levita araka ny fianakaviambeny avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I Gersôna no razan’ny Gersônita izay misy tarika roa, dia ny Libnita sy ny Simehita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa natao fanisana ny lehilahy rehetra tao aminy, izay feno iray volana no ho miakatra, dia nahatratra 7 500. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nitoby teo ivohon’ny Fonena-masina, teo andrefany, ny Gersônita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I Eliasafa zanakalahin’i Laela no filoham-pianakaviamben’ny Gersônita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Niandraikitra ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' no raharahan’i Gersônita; dia ny Fonena-masina, ny lay, ny firakony, ny lambam-baravaran’ny Tranolay fihaonana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ny fefilamban’ny kianja sy ny vavahady lamba amin’ny kianja izay manodidina ny Fonena-masina sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ', ary ny tadin’ny lay. Nisahana ny fikarakarana rehetra momba ireny ny Gersônita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'I Kehata no razan’ny Kehatita izay misy tarika efatra, dia ny Hamramita sy ny Jitseharita ary ny Hebrônita sy ny Hozielita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Rehefa natao fanisana ny lehilahy rehetra tao aminy, izay feno iray volana no ho miakatra, dia 8 600
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: '8 600: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny dkt tranainy grika dia mamaky hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 8 300
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', izay mifanaraka amin’ny fitambaran’isa omena ao amin’ny and 39. Kanefa jereo 3.39 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. Ireo no mpikarakara ny Fonena-masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nitoby teo amin’ny lafy atsimon’ny Fonena-masina ny Kehatita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'I Elisafàna zanakalahin’i Hoziela no filoham-pianakaviamben’ny Kehatita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny Kehatita no miandraikitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina
  - type: text
    text: ', ny latabatra masina, ny fitoeran-jiro sy ny alitara roa ary ny fanaky ny Toeramasina izay fanaovana fanompoam-pivavahana, ary ny varavarana lamba. Nisahana ny fikarakarana rehetra momba ireny ny Kehatita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I Elehazara, zanakalahin’i Aharôna mpisorona, no filoha faratampon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: '; izy no mpiandraikitra ireo olona mikarakara ny fanompoana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'I Merarỳ no razan’ny Merarita izay nisy tarika roa dia ny Mahilita sy ny Mosita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Rehefa natao fanisana ny lehilahy rehetra tao aminy, izay feno iray volana no ho miakatra, dia 6 200. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'I Tsoriela zanakalahin’i Abihaîla no filoham-pianakaviamben’ny Merarita. Nitoby teo amin’ny lafy avaratry ny Fonena-masina izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny Merarita no miandraikitra ny hazo fisaka amin’ny Tranolay; ny barany, ny andriny mbamin’ny faladiany, ary ny fanaka rehetra momba azy. Nisahana ny fikarakarana rehetra momba ireny ny Merarita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Mbola izy ireo koa no niandraikitra ny andry manodidina ny kianja masina mbamin’ny faladiany sy ny tsatòka ary ny tady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: I Mosesy sy i Aharôna ary ny zanakalahin’i Aharôna dia nitoby teo anoloana atsinanan’ny Tranolay fihaonana eo amin’ny fiposahan’ny masoandro. Izy ireo no miandraikitra ny fiambenana ny Toeramasina amin’ny anaran’ny Israelita. Izay tsy mpisorona mitady hanatona eo dia hatao maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ny fitambaran’ny lehilahy levita rehetra feno iray volana no ho miakatra, nisain’i Mosesy sy i Aharôna isan-tarika araka ny didin’ny TOMPO, dia nahatratra 22 000
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny isa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 7 500
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (3.22), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 8 600
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (3.28), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 6 200
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (3.34), ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 22 000
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (3.39) dia mety mivaky hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: andiany 7 misy lehilahy 500, andiany 8 misy lehilahy 600, andiany 6 misy lehilahy 200 ary andiany 21 misy lehilahy 1 300
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jereo 1.20-45 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanavotana indray ny voalohan-teraka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Isao ny lahimatoa rehetra, eo amin’ny Israelita, dia izay feno iray volana no ho miakatra, ka ataovy lisitra ny anarany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hatokanao ho Ahy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: ' ho solon’ny lahimatoa rehetra eo amin’ny Israelita fa Izaho no TOMPO; dia tahaka izany koa, ny biby fiompin’ny Levita no ho solon’ny voalohan-teraky ny biby fiompy rehetra eo amin’ny Israelita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia nisain’i Mosesy araka ny nandidian’ny TOMPO azy ny lahimatoa rehetra teo amin’ny Israelita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: dia izay feno iray volana no ho miakatra; ka nahatratra 22 273 ny fitambarany araka ny lisitry ny anarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Hoy koa ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: '–Atokano ho Ahy ny Levita ho solon’ny lahimatoa rehetra eo amin’ny Israelita fa Izaho no TOMPO; dia tahaka izany koa, ny biby fiompin’ny Levita no ho solon’ny voalohan-teraky ny biby fiompin’ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ho fanavotana ny lahimatoa miisa 273 eo amin’ny Israelita, izany hoe ireo lahimatoa izay nihoatra tamin’ny isan’ny Levita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'dia hakanao sekela dimy isan’olona; ka araka ny sekela fampiasa ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ', izany hoe sekela iray milanja folo grama, no hangalanao azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Homenao an’i Aharôna sy ny zanany io vola io ho avotr’ireo lahimatoa mihoatra isa ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Nangonin’i Mosesy ny vola avotra izay nomen’ireo mihoatra isa noho ny voaavotry ny Levita ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Vola denàry 1 365 no voaangony tamin’ny lahimatoan’ny Israelita, araka ny sekela fampiasa ao amin’ny Toeramasina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: dia natolotr’i Mosesy an’i Aharôna sy ny zanany izany vola avotra izany, araka ny didy nampitain’ny TOMPO tamin’i Mosesy.
