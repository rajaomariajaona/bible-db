document_id: HEB.INTRO1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: Izay mandinika tsara rehefa mamaky ity lahatsoratra ity dia hahatsapa fa toa manoloana toriteny na lahateny famelabelarana fa tsy mba tena taratasy. Marina fa ireo andininy farany indrindra ao amin’ny toko faha-13, izay ahitana fanaovam-beloma, dia mampahatsiahy fomba amaranana taratasy. Nefa ny fanombohan’ity lahatsoratra ity dia tsy mba misy soritra, na kely akory aza, azo amantarana ny mpanoratra na izay andefasana. Na dia tsy azo antoka aza, dia mety ho «taratasy» nalefa avy any Italia izy ity (13.24). Ireo kristianina natao hiantefany kosa dia efa tsy tian’ny olona sy toheriny hatrany, ka mila handao ny finoana an’i Kristy. Mankahery azy ilay mpandaha-teny mba hiorina tsara amin’ny finoana ka maneho ny fahambonian’ny tenan’i Kristy sy ny asany eo amin’ny lafin-javatra rehetra momba ny famonjena.
  - type: text
    content: 'Vao eo am-panombohana, dia hamafisin’ity taratasy ity fa Andriamanitra dia nanambara tena tamintsika tamin’ny alalan’i Jesoa Kristy Zanany (1.1-3). Fizarana roa lehibe no mety ho hita amin’ity lahateny famelabelarana ity, kanefa misy antso maro manapatapaka azy eny anelanelany eny:'
  - type: text
    content: '–Ny fizaràna voalohany (1.4–10.18) dia mampiharihary ny fahalehibiazana tsy manampaharoa ananan’i Kristy: tsy ambony noho ny mpaminany fotsiny izy (1.1) fa ambony koa noho ny anjely (1.4–2.18), ambony noho i Mosesy ary ambony noho i Josoa (3.1–4.13); Mpisorombe tsy manan-tsahala momba ny Fanekempihavanana Vaovao Izy ka ambony noho ireo mpisorombe momba ny Fanekempihavanana Taloha (4.14–7.28); ny fisoronany, tontòsany indray mandeha monja, dia ambony noho ny fisoronana marobe nataon’ny vahoaka Israely fahiny (8.1–10.18).'
  - type: text
    content: –Ny fizaràna faharoa (10.19–13.17) dia mampirisika voalohany indrindra ny mpihaino mba haharitra amin’ny finoana (10.19-39). Ao anatin’ity fizaràna ity no ahitana ilay perikôpa malaza momba ny ohatra tsara navelan’ireo ntaolo mpino voatantara ao amin’ny Testamenta Taloha (toko 11), sy ilay fanaingana hibanjina tsara an’i Jesoa Kristy mba hahatanty ny fanoherana tahaka Azy (12.1-13). Vita ireo anatranatra sy famarafarana vitsivitsy ary ny vavaka famaranana ilay toriteny (12.14–13.21), dia mbola misy ny hafatra sy fanaovam-beloma izay mety ho avy amin’ny mpitoriteny na koa avy amin’olon-kafa (13.22-25).
  - type: text
    content: 'Mba hanampiany an’ireo mpihaino handresy ny fahakiviana, dia tsy mianina amin’ny teny fampaherezana fotsiny ny mpitoriteny. Tsy odiany tsy hita ny toe-javatra sarotra mpahazo ny kristianina eto amin’izao tontolo izao, ary tondroiny mazava tsara izay kendren’ny asan’i Kristy: tamin’ny alalan’ny fahafatesany no nahavitan’i Kristy ny zavatra izay tsy hain’ny fisoronana hafa rehetra notontosaina. Koa dia manainga mafy ny mpihaino rehetra izy hilatsaka ho isan’ny vahoaka marobe vavolombelon’i Jesoa Kristy, dia ilay mpanatontosa ny famonjena mandrakizay ho an’ny olona rehetra manaiky Azy.'
