document_id: REV.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo lovia fito feno ny fahatezeran’Andriamanitra
  - type: text
    content: 'Dia reko nisy feo mahery avy tao amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' nanao tamin’ny '
  - type: text
    content: anjely
  - type: text
    content: ' fito hoe: «Mandehana, araraho amin’ny tany ny ao anatin’ireo lovia fito feno ny '
  - type: text
    content: haviniran
  - type: text
    content: ’Andriamanitra.»
  '10':
  - type: text
    content: Dia nandraraka ny tao an-doviany tamin’ny sezafiandrianan’ilay biby ny anjely fahadimy; ka tonga maizina
  - type: note
    content: Ampit Eks 10.21-22.
  - type: text
    content: ' ny fanjakan’ilay biby ary nanaiki-dela ny olona noho ny fanaintainana. '
  '11':
  - type: text
    content: Kanefa ny manevateva ilay Andriamanitra monina ao an-danitra no nataony noho ny fanaintainana sy ny vay nanjo azy fa tsy ny miova toetra miala amin’ny asa ratsiny.
  '12':
  - type: text
    content: Dia nandraraka ny tao an-doviany tamin’i Eofrata, ony lehibe, ny anjely fahenina; ka ritra ny ranony, hanomanan-dalana ho an’ny mpanjaka avy any atsinanana
  - type: note
    content: 'Ampit Is 11.15. –Eofrata: jereo 9.14 sy nta.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: Ary nisy fanahy maloto anankitelo, tahaka ny sahona, hitako nivoaka avy tany am-bavan’ny dràgona
  - type: note
    content: 'dràgona: jereo 12.3 sy nta.'
  - type: text
    content: ' sy avy tany am-bavan’ilay biby ary avy tany am-bavan’ilay mpaminany sandoka. '
  '14':
  - type: text
    content: Fanahin-
  - type: text
    content: demony
  - type: note
    content: 'demony: jereo 1Tim 4.1 sy nta.'
  - type: text
    content: ' manao zava-mampitolagaga ireo '
  - type: text
    content: fanahy maloto
  - type: text
    content: ' ireo, sady mankany amin’ny mpanjaka eran’ny tany tontolo mba hamory azy ho amin’ny ady hatao amin’ilay andro lehibe hitsaran’Andriamanitra Tsitoha.'
  '15':
  - type: text
    content: «Indro avy toy ny mpangalatra Aho
  - type: note
    content: Jereo 3.3 sy nta.
  - type: text
    content: ', hoy ny Tompo. Sambatra izay miari-tory sy mitandro ny fitafiany, fandrao mandeha miboridana ka ho hita mitanjaka!»'
  '16':
  - type: text
    content: Dia novorin’ireo fanahy maloto ireo ny mpanjakan’ny tany ho any amin’ilay toerana atao hoe Harmagedôna
  - type: note
    content: 'Harmagedôna: izany hoe ny havoana iorenan’ny tanàna Megidao. I Megidao dia tanàna kanahanita, niorina teo am-pototry ny tendrombohitra Karmèla, ary nitrangan’ady maromaro mahatsiravina (jereo Mpits 5.19; 2 Mp 23.29).'
  - type: text
    content: ' amin’ny teny hebreo.'
  '17':
  - type: text
    content: 'Dia nandraraka ny tao an-doviany tamin’ny rivotra ny anjely fahafito, ka reko nisy feo avy tao amin’ny tempoly; niainga avy teo amin’ny sezafiandrianana ilay feo ka nanao hoe: «Vita!» '
  '18':
  - type: text
    content: 'Dia nisy tselatra sy kotrokorana aman-kotro-baratra; nisy koa horohorontany mafy, ka tsy mbola nisy toy izany hatrizay nisian’olona tetỳ ambonin’ny tany, satria tena horohorontany mafy sy mahery vaika. '
  '19':
  - type: text
    content: Vaky ho telo toko ilay tanàna lehibe; rava ireo tanànan’ny firenena; tsy hadinon’Andriamanitra ny nanasazy an’i Babilôna lehibe, ka nomeny azy ny tsatokaty feno divay, dia ny divay manambara ny firehetam-
  - type: text
    content: pahatezeran
  - type: text
    content: ’Andriamanitra
  - type: note
    content: Ampit Is 51.17.
  - type: text
    content: '. '
  '2':
  - type: text
    content: Dia nandeha ny anjely voalohany nandraraka ny tao an-doviany tamin’ny tany; ka nisy vay mandoza sady mampahory
  - type: note
    content: Ampit Eks 9.10.
  - type: text
    content: ' nihatra tamin’ny olona izay nanana ny mariky ny biby sy nivavaka tamin’ny sariny.'
  '20':
  - type: text
    content: 'Ny nosy rehetra, nanjavona; ny tendrombohitra, tsy hita intsony; '
  '21':
  - type: text
    content: ny olona, nilatsahan’ny havandra
  - type: note
    content: Ampit Eks 9.23-24.
  - type: text
    content: ' vaventy avy tany an-danitra, dia havandra milanja tokony ho efapolo kilao ny anankiray. Ary nanevateva an’Andriamanitra ny olona noho ny loza vokatry ny havandra, fa lehibe loatra izany loza izany!'
  '3':
  - type: text
    content: Dia nandraraka ny tao an-doviany tamin’ny ranomasina ny anjely faharoa, ka tonga ra ny ranomasina, dia ra manahaka ny ran’olona novonoina; ary maty avokoa ny miaina rehetra tao aminy.
  '4':
  - type: text
    content: Dia nandraraka ny tao an-doviany tamin’ny ony sy ny loharano ny anjely fahatelo, ka tonga ra ny rano
  - type: note
    content: Ampit Eks 7.17-21.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ary reko ny anjely manam-pahefana amin’ny rano nanao hoe: «Ara-drariny tokoa no nataonao, ry Ilay ankehitriny sy taloha, dia ilay '
  - type: text
    content: Masina
  - type: text
    content: '; ara-drariny tokoa no nataonao raha nitsara toy izany Ianao. '
  '6':
  - type: text
    content: 'Fa ny ran’ireo anisan’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' sy ny ran’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' no nalatsak’ireny olona ireny; ka dia ra kosa no efa nomenao hosotroiny, ary mendrika azy izany.» '
  '7':
  - type: text
    content: 'Dia reko nisy feo avy tao amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' nanao hoe: «Eny, ry Tompo Andriamanitra Tsitoha, mahitsy sy ara-drariny ny fitsaranao!»'
  '8':
  - type: text
    content: 'Dia nandraraka ny tao an-doviany tamin’ny masoandro ny anjely fahefatra, ka navela handoro ny olona tamin’ny afony ny masoandro. '
  '9':
  - type: text
    content: Ary main’ny hafanana be ny olona; kanefa ny manevateva ny anaran’Andriamanitra Izay manam-pahefana amin’ireny loza ireny no nataony, fa tsy ny miala amin’ny toe-dratsiny
  - type: note
    content: 'miala amin’ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ' mba hanome voninahitra an’Andriamanitra.'
