document_id: REV.16,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ireo lovia fito feno ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fahatezeran’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia reko nisy feo mahery avy tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' nanao tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' fito hoe: «Mandehana, araraho amin’ny tany ny ao anatin’ireo lovia fito feno ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: haviniran
    - type: text
      text: ’Andriamanitra.»
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia nandraraka ny tao an-doviany tamin’ny sezafiandrianan’ilay biby ny anjely fahadimy; ka tonga maizina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 10.21-22.
      marker-yv: yv-n
    - type: text
      text: ' ny fanjakan’ilay biby ary nanaiki-dela ny olona noho ny fanaintainana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Kanefa ny manevateva ilay Andriamanitra monina ao an-danitra no nataony noho ny fanaintainana sy ny vay nanjo azy fa tsy ny miova toetra miala amin’ny asa ratsiny.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia nandraraka ny tao an-doviany tamin’i Eofrata, ony lehibe, ny anjely fahenina; ka ritra ny ranony, hanomanan-dalana ho an’ny mpanjaka avy any atsinanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 11.15. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Eofrata:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 9.14 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary nisy fanahy maloto anankitelo, tahaka ny sahona, hitako nivoaka avy tany am-bavan’ny dràgona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dràgona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 12.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' sy avy tany am-bavan’ilay biby ary avy tany am-bavan’ilay mpaminany sandoka. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fanahin-
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'demony: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1Tim 4.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' manao zava-mampitolagaga ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanahy maloto
    - type: text
      text: ' ireo, sady mankany amin’ny mpanjaka eran’ny tany tontolo mba hamory azy ho amin’ny ady hatao amin’ilay andro lehibe hitsaran’Andriamanitra Tsitoha.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: «Indro avy toy ny mpangalatra Aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', hoy ny Tompo. Sambatra izay miari-tory sy mitandro ny fitafiany, fandrao mandeha miboridana ka ho hita mitanjaka!»'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia novorin’ireo fanahy maloto ireo ny mpanjakan’ny tany ho any amin’ilay toerana atao hoe Harmagedôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Harmagedôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'izany hoe ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: havoana iorenan’ny tanàna Megidao.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' I Megidao dia tanàna kanahanita, niorina teo am-pototry ny tendrombohitra Karmèla, ary nitrangan’ady maromaro mahatsiravina (jereo Mpits 5.19; 2 Mp 23.29).'
      marker-yv: yv-n
    - type: text
      text: ' amin’ny teny hebreo.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia nandraraka ny tao an-doviany tamin’ny rivotra ny anjely fahafito, ka reko nisy feo avy tao amin’ny tempoly; niainga avy teo amin’ny sezafiandrianana ilay feo ka nanao hoe: «Vita!» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nisy tselatra sy kotrokorana aman-kotro-baratra; nisy koa horohorontany mafy, ka tsy mbola nisy toy izany hatrizay nisian’olona tetỳ ambonin’ny tany, satria tena horohorontany mafy sy mahery vaika. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Vaky ho telo toko ilay tanàna lehibe; rava ireo tanànan’ny firenena; tsy hadinon’Andriamanitra ny nanasazy an’i Babilôna lehibe, ka nomeny azy ny tsatokaty feno divay, dia ny divay manambara ny firehetam-
    - type: usfm
      marker: w
      children:
      - type: text
        text: pahatezeran
    - type: text
      text: ’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 51.17.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia nandeha ny anjely voalohany nandraraka ny tao an-doviany tamin’ny tany; ka nisy vay mandoza sady mampahory
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 9.10.
      marker-yv: yv-n
    - type: text
      text: ' nihatra tamin’ny olona izay nanana ny mariky ny biby sy nivavaka tamin’ny sariny.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny nosy rehetra, nanjavona; ny tendrombohitra, tsy hita intsony; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ny olona, nilatsahan’ny havandra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 9.23-24.
      marker-yv: yv-n
    - type: text
      text: ' vaventy avy tany an-danitra, dia havandra milanja tokony ho efapolo kilao ny anankiray. Ary nanevateva an’Andriamanitra ny olona noho ny loza vokatry ny havandra, fa lehibe loatra izany loza izany!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dia nandraraka ny tao an-doviany tamin’ny ranomasina ny anjely faharoa, ka tonga ra ny ranomasina, dia ra manahaka ny ran’olona novonoina; ary maty avokoa ny miaina rehetra tao aminy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia nandraraka ny tao an-doviany tamin’ny ony sy ny loharano ny anjely fahatelo, ka tonga ra ny rano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 7.17-21.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary reko ny anjely manam-pahefana amin’ny rano nanao hoe: «Ara-drariny tokoa no nataonao, ry Ilay ankehitriny sy taloha, dia ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Masina
    - type: text
      text: '; ara-drariny tokoa no nataonao raha nitsara toy izany Ianao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa ny ran’ireo anisan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakan’Andriamanitra
    - type: text
      text: ' sy ny ran’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' no nalatsak’ireny olona ireny; ka dia ra kosa no efa nomenao hosotroiny, ary mendrika azy izany.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia reko nisy feo avy tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' nanao hoe: «Eny, ry Tompo Andriamanitra Tsitoha, mahitsy sy ara-drariny ny fitsaranao!»'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nandraraka ny tao an-doviany tamin’ny masoandro ny anjely fahefatra, ka navela handoro ny olona tamin’ny afony ny masoandro. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary main’ny hafanana be ny olona; kanefa ny manevateva ny anaran’Andriamanitra Izay manam-pahefana amin’ireny loza ireny no nataony, fa tsy ny miala amin’ny toe-dratsiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.9 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'miala amin’ny toe-dratsy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.
      marker-yv: yv-n
    - type: text
      text: ' mba hanome voninahitra an’Andriamanitra.'
