  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Mahalala ireo lalàna mifehy ny lanitra ve ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandrindra ny fiantraikany amin’ny tany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ampy hampitosaka ny ranobe aminao ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanandratanao baiko amin’ny rahona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ianao ve no mahay mandefa ny tselatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hilazany aminao hoe: «Indreto izahay»?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
