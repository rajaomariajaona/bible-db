  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aiza moa ny lalana ipariahan’ny fahazavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny toerana iaingan’ny rivotra avy atsinanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hielezany etỳ ambonin’ny tany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Iza no nihady lalan-drano hikorianan’ny oram-be
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nanoritra ny lalan’ny varatra mikotrokotroka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Iza no nampisy orana amin’ny tany foana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny taniefitra tsy misy olona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: mba hahavonto rano ny tany karankaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampaniry ny ahi-maitso vao mitsimoka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Manan-dray ve ny ranonorana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no niteraka ny ranonando mitete?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Kibon’iza no nivoahan’ny ranomandry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary iza no niteraka ny fanàlan’ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ka mahatonga ny rano hihamafy toy ny vato
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahatonga ny velaran-dranomasina handry?
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
