    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Moa ve ianao mahafatotra mitambatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vondron-kintana Ikotokelimiadilaona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mahavaha ireo tady mamehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vondron-kintana Telonohorefy,
