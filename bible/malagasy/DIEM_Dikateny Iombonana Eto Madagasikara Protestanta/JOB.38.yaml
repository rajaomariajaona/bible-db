    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Jer 5.22.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Indray maka teo amin’ny androm-piainanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba efa nibaiko ny hisian’ny maraina ve ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa notondroinao toerana ve ny mazava atsinanana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mba handraisany ny tany amin’ny sisiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hakopany hihintsanan’ny olon-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fitondran’ny mazava atsinanana ny andro dia mampitsahatra ny asan’ny ratsy fanahy, dia tahaka ny hanintsanana ny vovoka amin’ny karipetra fandiavana.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa amin’izay ny tany dia hiseho endrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tahaka ny tanimanga '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voatombokase
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tahaka ny tanimanga voatombokase: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe hita misy avo sy iva, misy tendrombohitra sy lohasaha ny tany hazavain’ny tara-masoandro.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miloko tahaka ny lamba misoratsoratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nefa hoesorina amin’ny olon-dratsy ny fahazavàny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny alina ihany no mahazo aina ny olon-dratsy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotapahina izay sandry miainga hamely olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Efa tonga tany an-doharanon-dranomasina ve ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na efa nandehandeha tany amin’ny fanambanin’ny lalina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Efa naseho anao ve ny vavahadin’ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nahazoanao nahita ny fidirana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mankao amin’ny sehatra maizin’ny fahafatesana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Efa voadinikao ve ny fidadasiky ny velaran-tany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Valio aho raha toa hainao izany rehetra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aiza àry no lalana mankany amin’ny fonenan’ny mazava?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aiza koa no toerana misy ny haizina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mba hitondranao azy any amin’ny faritra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahafantaranao ny sakeli-dalana ho any an-tranony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tokony ho fantatrao tsara izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa teraka ianao tamin’izay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary marobe ny isan’ny androm-piainanao!
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Efa notsidihinao ve ny fitehirizana ny orampanala
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa hitanao ve ny fanangonana ny havandra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: fa voatahiriko ho amin’ny androm-pahoriana ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny andro ifamelezana sy iadiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.23 '
    - type: usfm
