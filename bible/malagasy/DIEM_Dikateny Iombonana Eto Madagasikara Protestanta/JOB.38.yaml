  - type: text
    text: na mampitranga ny andian-kintana ara-potoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na koa mahatarika ny vondron-kintana Orsa lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny vondron-kintana zanany Orsa kely
