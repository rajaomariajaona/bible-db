document_id: JOB.38,396
type_code: plt
verses:
  '1':
  - type: heading
    content: MIDITRA AN-TSEHATRA NY TOMPO
  - type: heading
    content: (38.1–42.6)
  - type: text
    content: 'Avy ao anaty tafio-drivotra ny TOMPO no namaly an’i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Namoaka didy aho hamerako ny fitroarany
  - type: text
    content: ary nanisy varavarana mihidy teo anoloany
  '11':
  - type: text
    content: 'sady niteny taminy hoe:'
  - type: text
    content: «Hatreto ihany fa tsy mahazo mihoatra;
  - type: text
    content: eto no hifarana ny fisafoaky ny onjanao
  - type: note
    content: 'And 8-11: ampit Jer 5.22.'
  - type: text
    content: '!»'
  '12':
  - type: text
    content: Indray maka teo amin’ny androm-piainanao
  - type: text
    content: mba efa nibaiko ny hisian’ny maraina ve ianao?
  - type: text
    content: Efa notondroinao toerana ve ny mazava atsinanana
  '13':
  - type: text
    content: mba handraisany ny tany amin’ny sisiny
  - type: text
    content: ka hakopany hihintsanan’ny olon-dratsy
  - type: note
    content: Ny fitondran’ny mazava atsinanana ny andro dia mampitsahatra ny asan’ny ratsy fanahy, dia tahaka ny hanintsanana ny vovoka amin’ny karipetra fandiavana.
  - type: text
    content: '?'
  '14':
  - type: text
    content: Koa amin’izay ny tany dia hiseho endrika
  - type: text
    content: 'tahaka ny tanimanga '
  - type: text
    content: voatombokase
  - type: note
    content: 'tahaka ny tanimanga voatombokase: izany hoe hita misy avo sy iva, misy tendrombohitra sy lohasaha ny tany hazavain’ny tara-masoandro.'
  - type: text
    content: ','
  - type: text
    content: ary miloko tahaka ny lamba misoratsoratra.
  '15':
  - type: text
    content: Nefa hoesorina amin’ny olon-dratsy ny fahazavàny
  - type: note
    content: Amin’ny alina ihany no mahazo aina ny olon-dratsy.
  - type: text
    content: ary hotapahina izay sandry miainga hamely olona.
  - type: heading
    content: '*'
  '16':
  - type: text
    content: Efa tonga tany an-doharanon-dranomasina ve ianao
  - type: text
    content: na efa nandehandeha tany amin’ny fanambanin’ny lalina?
  '17':
  - type: text
    content: Efa naseho anao ve ny vavahadin’ny fahafatesana,
  - type: text
    content: ka nahazoanao nahita ny fidirana
  - type: text
    content: mankao amin’ny sehatra maizin’ny fahafatesana?
  '18':
  - type: text
    content: Efa voadinikao ve ny fidadasiky ny velaran-tany?
  - type: text
    content: Valio aho raha toa hainao izany rehetra izany.
  '19':
  - type: text
    content: Aiza àry no lalana mankany amin’ny fonenan’ny mazava?
  - type: text
    content: Ary aiza koa no toerana misy ny haizina,
  '2':
  - type: text
    content: Zovy moa ianao no sahy maneso ny fikasàko
  - type: text
    content: amin’ireo teny foana tsisy dikany?
  '20':
  - type: text
    content: mba hitondranao azy any amin’ny faritra
  - type: text
    content: ka hahafantaranao ny sakeli-dalana ho any an-tranony?
  '21':
  - type: text
    content: Tokony ho fantatrao tsara izany
  - type: text
    content: satria efa teraka ianao tamin’izay
  - type: text
    content: ary marobe ny isan’ny androm-piainanao!
  - type: heading
    content: '*'
  '22':
  - type: text
    content: Efa notsidihinao ve ny fitehirizana ny orampanala
  - type: text
    content: ary efa hitanao ve ny fanangonana ny havandra,
  '23':
  - type: text
    content: fa voatahiriko ho amin’ny androm-pahoriana ireo,
  - type: text
    content: dia ny andro ifamelezana sy iadiana
  - type: note
    content: Ampit Jos 10.11; Is 28.17; 30.30; Sal 18.13.
  - type: text
    content: .
  '24':
  - type: text
    content: Aiza moa ny lalana ipariahan’ny fahazavana,
  - type: text
    content: ary ny toerana iaingan’ny rivotra avy atsinanana
  - type: text
    content: mba hielezany etỳ ambonin’ny tany?
  '25':
  - type: text
    content: Iza no nihady lalan-drano hikorianan’ny oram-be
  - type: text
    content: sy nanoritra ny lalan’ny varatra mikotrokotroka?
  '26':
  - type: text
    content: Iza no nampisy orana amin’ny tany foana,
  - type: text
    content: sy amin’ny taniefitra tsy misy olona,
  '27':
  - type: text
    content: mba hahavonto rano ny tany karankaina
  - type: text
    content: ka hampaniry ny ahi-maitso vao mitsimoka?
  '28':
  - type: text
    content: Manan-dray ve ny ranonorana?
  - type: text
    content: Ary iza no niteraka ny ranonando mitete?
  '29':
  - type: text
    content: Kibon’iza no nivoahan’ny ranomandry
  - type: text
    content: ary iza no niteraka ny fanàlan’ny lanitra,
  '3':
  - type: text
    content: Misikîna àry ho tena lehilahy,
  - type: text
    content: fa hanontany anao Aho ka hovalianao.
  - type: heading
    content: Andriamanitra, tompon’ny tontolo tsisy aina
  '30':
  - type: text
    content: ka mahatonga ny rano hihamafy toy ny vato
  - type: text
    content: ary mahatonga ny velaran-dranomasina handry?
  - type: heading
    content: '*'
  '31':
  - type: text
    content: Moa ve ianao mahafatotra mitambatra
  - type: text
    content: ny vondron-kintana Ikotokelimiadilaona,
  - type: text
    content: na mahavaha ireo tady mamehy
  - type: text
    content: ny vondron-kintana Telonohorefy,
  '32':
  - type: text
    content: na mampitranga ny andian-kintana ara-potoana,
  - type: text
    content: na koa mahatarika ny vondron-kintana Orsa lehibe
  - type: text
    content: mbamin’ny vondron-kintana zanany Orsa kely
  - type: note
    content: 'And 31-32: jereo Jôba 9.9 sy nta; andian-kintana: dkt hafa ny planeta na ny fitarikandro.'
  - type: text
    content: '?'
  '33':
  - type: text
    content: Mahalala ireo lalàna mifehy ny lanitra ve ianao
  - type: text
    content: ary mandrindra ny fiantraikany amin’ny tany?
  '34':
  - type: text
    content: Ampy hampitosaka ny ranobe aminao ve
  - type: text
    content: ny fanandratanao baiko amin’ny rahona?
  '35':
  - type: text
    content: Ianao ve no mahay mandefa ny tselatra
  - type: text
    content: 'ka hilazany aminao hoe: «Indreto izahay»?'
  '36':
  - type: text
    content: Iza no milaza amin’ny vorona ibisy
  - type: text
    content: fa hiakatra ny ony Neily?
  - type: text
    content: Iza no mampahalala ny akoholahy
  - type: text
    content: fa ho avy ny orana
  - type: note
    content: Ara-bakiteny iza no nanome fahendrena ny vorona ibisy, iza no nanome fahalalana ny akoholahy? Ny teny nadika ibisy sy akoholahy dia tsy hita na aiza na aiza amin’ny hebreo biblika. Tamin’i Ejipta tranainy ny ibisy dia noheverina fa mahafantatra mialoha ny fiakaran’ny ony Neily, ary fahiny manerana ny Faritra Atsinanana akaikin’i Mediteranea dia nomena ny akoholahy kosa ny fahaizana manambara ny oran-dohataona.
  - type: text
    content: '?'
  '37':
  - type: text
    content: Iza no manam-pahaizana mahaisa ny rahona?
  - type: text
    content: Iza no mampitotongana ireo siniben-drano any an-danitra,
  - type: text
    content: hampitosaka ranonorana mivatravatra
  '38':
  - type: text
    content: ka hanambatra ny vovo-tany ho tonga fotaka
  - type: text
    content: ary hampiraikidraikitra ny bainga vonton-drano?
  - type: heading
    content: Ilay tompon’ny tontolom-biby
  '39':
  - type: text
    content: Ianao va no mihaza remby ho an’ny liom-bavy
  - type: note
    content: Manomboka eto amin’ity andininy ity ka hatramin’ny faran’ny toko 41 ny dkt sasany dia manaraka fanisana andininy hafa.
  - type: text
    content: na mahavoky ny zana-diona noana,
  '4':
  - type: text
    content: Taiza moa ianao fony Aho nanorina ny tany?
  - type: text
    content: ambarao Ahy raha manam-pahalalana tokoa ianao.
  '40':
  - type: text
    content: raha mamitsaka ao an-davany izy
  - type: text
    content: na manotrika anaty kirihitra?
  '41':
  - type: text
    content: Iza no mikarakara ny hanin’ny goaika
  - type: text
    content: raha mitaraina amin’Andriamanitra ny zanany
  - type: text
    content: ka mirenireny tsy mahita hanina?
  '5':
  - type: text
    content: Iza no nametra ny refiny raha hainao?
  - type: text
    content: Ary iza no nanenjana izay andrefesana azy?
  '6':
  - type: text
    content: Amin’inona no ipetrahan’ny andry mitondra azy?
  - type: text
    content: Ary zovy no nametraka ny vato fehizorony,
  '7':
  - type: text
    content: raha niara-nihira ny kintan’ny maraina
  - type: text
    content: ary nihoby avokoa ireo anjelin’Andriamanitra?
  '8':
  - type: text
    content: Iza no nanidy varavarana tsy hihoaran’ny ranomasina,
  - type: text
    content: raha nifantsitsitra nivoaka avy tamin’ny lalina izy?
  '9':
  - type: text
    content: Dia nampitafiako rahona ny ranomasina
  - type: text
    content: ary nofonosiko zavona matevina.
