  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Iza no manam-pahaizana mahaisa ny rahona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no mampitotongana ireo siniben-drano any an-danitra,
- type: usfm
