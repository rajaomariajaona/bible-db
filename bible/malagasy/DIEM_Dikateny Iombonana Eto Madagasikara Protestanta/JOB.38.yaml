  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Iza no milaza amin’ny vorona ibisy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hiakatra ny ony Neily?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no mampahalala ny akoholahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho avy ny orana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ara-bakiteny iza no nanome fahendrena ny vorona ibisy, iza no nanome fahalalana ny akoholahy? Ny teny nadika ibisy sy akoholahy dia tsy hita na aiza na aiza amin’ny hebreo biblika. Tamin’i Ejipta tranainy ny ibisy dia noheverina fa mahafantatra mialoha ny fiakaran’ny ony Neily, ary fahiny manerana ny Faritra Atsinanana akaikin’i Mediteranea dia nomena ny akoholahy kosa ny fahaizana manambara ny oran-dohataona.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
