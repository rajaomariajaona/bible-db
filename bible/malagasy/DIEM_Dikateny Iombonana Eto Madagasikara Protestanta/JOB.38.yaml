    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy ao anaty tafio-drivotra ny TOMPO no namaly an’i Jôba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Zovy moa ianao no sahy maneso ny fikasàko
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ireo teny foana tsisy dikany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Misikîna àry ho tena lehilahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hanontany anao Aho ka hovalianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra, tompon’ny tontolo tsisy aina
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Taiza moa ianao fony Aho nanorina ny tany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambarao Ahy raha manam-pahalalana tokoa ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza no nametra ny refiny raha hainao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no nanenjana izay andrefesana azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’inona no ipetrahan’ny andry mitondra azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary zovy no nametraka ny vato fehizorony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: raha niara-nihira ny kintan’ny maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nihoby avokoa ireo anjelin’Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Iza no nanidy varavarana tsy hihoaran’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha nifantsitsitra nivoaka avy tamin’ny lalina izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nampitafiako rahona ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nofonosiko zavona matevina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Namoaka didy aho hamerako ny fitroarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanisy varavarana mihidy teo anoloany
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'sady niteny taminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hatreto ihany fa tsy mahazo mihoatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto no hifarana ny fisafoaky ny onjanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.11 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 8-11:'
    - type: usfm
      marker: ft
      children:
      - type: text
