document_id: ISA.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiantsoan’Andriamanitra an’i Isaià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny taona nahafatesan’i Hozià mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny taona nahafatesan’i Hozià-Hazarià mpanjaka (2 Mp 15.7; 2 Tan 26.23) dia tokony ho tamin’ny 740 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ' no nahitako ny Tompo nipetraka teo amin’ny sezafiandrianana avo dia avo; ary nahafeno ny tempoly ny rebareban’akanjony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nisy serafima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny hoe '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'serafima: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia karaza-mpiambina miendrika afo mivaivay toy ny tselatra.
    marker-yv: yv-n
  - type: text
    text: ' nitsangana teo amboniny, izay samy manana elatra enina avy: ka ny roa nanakonany endrika, ny roa nanakonany vatana, ary ny roa nanidinany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary niantso mafy ireo ka nifamaly hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Masina, masina, masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny TOMPOn’izao rehetra izao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feno ny voninahiny ny tany manontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Na tena masina dia masina tokoa ny Tompon’izao rehetra izao! jereo Apôk 4.8.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nipararetra ny fanambanin’ny tokonana noho ny hamafin’ny feon’ireo serafima ireo, sady feno setroka ny trano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Apôk 15.8.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy aho hoe: «Lozako, very aho satria olona maloto molotra sady eto amin’ny firenena maloto molotra no itoerako; kanefa ny Mpanjaka, ilay TOMPOn’izao rehetra izao, no hitan’ny masoko!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Kinanjo nanidina nanatona ahy ny iray tamin’ireo serafima, nitondra vainafo teny an-tanany, dia vainafo avy nalainy tamin’ny tandra teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Natehiny tamin’ny vavako izany, ary hoy izy tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro efa nitehika ny molotrao ity;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa afaka ny helokao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voavela ny fahotanao.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia reko ny feon’ny Tompo nanontany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Iza no hirahiko, ary iza no ho mpitondrateninay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia namaly aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Inty aho, iraho aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy indray Izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '–Ndeha lazao amin’ity firenena ity hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mihainoa ihany ianareo fa tsy handre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mijere ihany fa tsy hahita.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ataovy tonga mafy fo ity firenena ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy tonga mafy sofina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataovy tonga jamba ny masony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao ny masony hahita, ny sofiny handre
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fony hahafantatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiverina amiko izy ary ho sitrana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 9-10:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 13.14-15; Mk 4.12; Lk 8.10; Jôh 12.40; Asa 28.26-27.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tamin’izay dia nanontany aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Mandra-pahoviana anefa, Tompo ô?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia namaly Izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Mandra-pahasimba ny tanàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy mponina intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-paharava ny trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy olona tavela
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandra-pahalao tokoa ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, halefan’ny TOMPO any lavitra any ny mponina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho betsaka ny saha hilaozana eo amin’io tany io.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha misy ampahafolon-tany tsy tratry ny loza aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola hodorana amin’ny afo ihany koa izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy ho tahaka ny hazo terebinta na ny ôaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mamela fototra ihany na voakapa aza.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa avy amin’izany fototra tavela izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hisian’ny taranaka masina indray.
