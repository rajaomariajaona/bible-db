document_id: ISA.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiantsoan’Andriamanitra an’i Isaià
  - type: text
    content: Tamin’ny taona nahafatesan’i Hozià mpanjaka
  - type: note
    content: Ny taona nahafatesan’i Hozià-Hazarià mpanjaka (2 Mp 15.7; 2 Tan 26.23) dia tokony ho tamin’ny 740 tal J.K.
  - type: text
    content: ' no nahitako ny Tompo nipetraka teo amin’ny sezafiandrianana avo dia avo; ary nahafeno ny tempoly ny rebareban’akanjony. '
  '10':
  - type: text
    content: Ataovy tonga mafy fo ity firenena ity
  - type: text
    content: ataovy tonga mafy sofina izy
  - type: text
    content: ary ataovy tonga jamba ny masony,
  - type: text
    content: fandrao ny masony hahita, ny sofiny handre
  - type: text
    content: ary ny fony hahafantatra
  - type: text
    content: ka hiverina amiko izy ary ho sitrana
  - type: note
    content: 'And 9-10: jereo Mt 13.14-15; Mk 4.12; Lk 8.10; Jôh 12.40; Asa 28.26-27.'
  - type: text
    content: .
  '11':
  - type: text
    content: 'Tamin’izay dia nanontany aho hoe:'
  - type: text
    content: –Mandra-pahoviana anefa, Tompo ô?
  - type: text
    content: 'Dia namaly Izy hoe:'
  - type: text
    content: –Mandra-pahasimba ny tanàna
  - type: text
    content: ka tsy hisy mponina intsony,
  - type: text
    content: mandra-paharava ny trano
  - type: text
    content: ka tsy hisy olona tavela
  - type: text
    content: ary mandra-pahalao tokoa ny tany.
  '12':
  - type: text
    content: Eny, halefan’ny TOMPO any lavitra any ny mponina
  - type: text
    content: ka ho betsaka ny saha hilaozana eo amin’io tany io.
  '13':
  - type: text
    content: Raha misy ampahafolon-tany tsy tratry ny loza aza,
  - type: text
    content: dia mbola hodorana amin’ny afo ihany koa izany;
  - type: text
    content: saingy ho tahaka ny hazo terebinta na ny ôaka
  - type: text
    content: izay mamela fototra ihany na voakapa aza.
  - type: text
    content: Kanefa avy amin’izany fototra tavela izany
  - type: text
    content: no hisian’ny taranaka masina indray.
  '2':
  - type: text
    content: Nisy serafima
  - type: note
    content: 'Ny hoe serafima: dia karaza-mpiambina miendrika afo mivaivay toy ny tselatra.'
  - type: text
    content: ' nitsangana teo amboniny, izay samy manana elatra enina avy: ka ny roa nanakonany endrika, ny roa nanakonany vatana, ary ny roa nanidinany. '
  '3':
  - type: text
    content: 'Ary niantso mafy ireo ka nifamaly hoe:'
  - type: text
    content: «Masina, masina, masina
  - type: text
    content: ny TOMPOn’izao rehetra izao!
  - type: text
    content: Feno ny voninahiny ny tany manontolo
  - type: note
    content: Na tena masina dia masina tokoa ny Tompon’izao rehetra izao! jereo Apôk 4.8.
  - type: text
    content: '!»'
  '4':
  - type: text
    content: Nipararetra ny fanambanin’ny tokonana noho ny hamafin’ny feon’ireo serafima ireo, sady feno setroka ny trano
  - type: note
    content: Jereo Apôk 15.8.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Dia hoy aho hoe: «Lozako, very aho satria olona maloto molotra sady eto amin’ny firenena maloto molotra no itoerako; kanefa ny Mpanjaka, ilay TOMPOn’izao rehetra izao, no hitan’ny masoko!»'
  '6':
  - type: text
    content: 'Kinanjo nanidina nanatona ahy ny iray tamin’ireo serafima, nitondra vainafo teny an-tanany, dia vainafo avy nalainy tamin’ny tandra teo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Natehiny tamin’ny vavako izany, ary hoy izy tamiko:'
  - type: text
    content: «Indro efa nitehika ny molotrao ity;
  - type: text
    content: koa afaka ny helokao,
  - type: text
    content: ary voavela ny fahotanao.»
  '8':
  - type: text
    content: 'Dia reko ny feon’ny Tompo nanontany hoe:'
  - type: text
    content: –Iza no hirahiko, ary iza no ho mpitondrateninay?
  - type: text
    content: 'Dia namaly aho hoe:'
  - type: text
    content: –Inty aho, iraho aho.
  '9':
  - type: text
    content: 'Dia hoy indray Izy hoe:'
  - type: text
    content: '–Ndeha lazao amin’ity firenena ity hoe:'
  - type: text
    content: «Mihainoa ihany ianareo fa tsy handre,
  - type: text
    content: mijere ihany fa tsy hahita.»
