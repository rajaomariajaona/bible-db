document_id: DEU.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fankalazana ny Paska
  - type: text
    content: Tandremo fa amin’ny volana Abîba
  - type: note
    content: Jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
  - type: text
    content: ' no hankalazanareo ny '
  - type: text
    content: Paska
  - type: text
    content: ' ho fanajana ny TOMPO Andriamanitrareo. Volana Abîba manko no nitondran’ny TOMPO Andriamanitrareo anareo niala tany Ejipta tamin’ny alina. '
  '10':
  - type: text
    content: 'Dia hankalaza ny fetin’ny '
  - type: text
    content: Pentekôsta
  - type: text
    content: ' ianareo, ka hanavaka fanati-tsitrapo homenareo araka izay itahian’ny TOMPO Andriamanitrareo anareo. '
  '11':
  - type: text
    content: 'Hankany amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo hipetrahan’ny voninahiny ianareo, ary hifaly eo anatrehan’ilay '
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO Andriamanitrareo ny tenanareo sy ny zanakareo ary ny mpanomponareo mbamin’ny '
  - type: text
    content: Levita
  - type: text
    content: ' izay ao an-tanànanareo ary koa ny vahiny sy kamboty ary mpitondratena izay eo anivonareo. '
  '12':
  - type: text
    content: Tsarovy fa nandevozina tany Ejipta ianareo, ka imasoy hotanterahina ireo didy ireo
  - type: note
    content: 'And 9-12: jereo Lev 23.15-21; Lev 28.26-31.'
  - type: text
    content: .
  - type: heading
    content: Ny fetin’ny Tranotomboka
  '13':
  - type: text
    content: Rehefa voaangonareo ny avy amin’ny famoloanareo sy famiazanareo, dia hankalaza ny fetin’ny Tranotomboka ianareo
  - type: note
    content: Jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ary hifaly am-piravoravoana ianareo sy ny zanakareo ary ny mpanomponareo mbamin’ny '
  - type: text
    content: Levita
  - type: text
    content: ' ary koa ny vahiny sy kamboty ary ny mpitondratena izay ao an-tanànanareo. '
  '15':
  - type: text
    content: Mandritra ny fito andro no hanaovanareo izany fankalazana izany ho fanajana ny TOMPO Andriamanitrareo eo amin’ny toerana izay hofidiny; ary dia hifaly tokoa ianareo satria notahîn’ny TOMPO Andriamanitrareo avokoa ny vokatrareo sy ny asan-tananareo
  - type: note
    content: 'And 13.15: jereo Lev 23.33-43; Nom 29.12-38.'
  - type: text
    content: .
  '16':
  - type: text
    content: 'Intelo isan-taona ny lehilahy rehetra aminareo no hiseho eo anatrehan’ny TOMPO Andriamanitrareo any amin’ny toerana izay hofidiny, dia amin’ny fankalazana ny '
  - type: text
    content: mofo tsy misy leviora
  - type: text
    content: ' sy ny fankalazana ny '
  - type: text
    content: Pentekôsta
  - type: text
    content: ' ary ny fankalazana ny Tranotomboka. Ary aoka tsy ho tanam-polo no hisehoany eo anatrehan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO; '
  '17':
  - type: text
    content: fa aoka samy hitondra izay fanatitra zakany avy, araka ny fitahiana omen’ny TOMPO Andriamanitrareo azy.
  - type: heading
    content: Fepetra momba ny fitsarana
  '18':
  - type: text
    content: 'Mifidiana mpitsara sy mpifehy ao an-tanàna rehetra izay omen’ny TOMPO Andriamanitrareo anareo araka ny fokonareo avy; ary dia ho ara-drariny no aoka hitsaran’ireo ny vahoaka. '
  '19':
  - type: text
    content: Aza manao fitsarana miangatra, aza mizaha tavan’olona, ary aza mandray kolikoly; fa ny kolikoly mahajamba ny mason’ny hendry ka mampamadika ny raharahan’ny manan-drariny
  - type: note
    content: 'ka mampamadika ny...: dkt hafa mampivaona ny fanapahan-kevitry ny olo-marina. Jereo Eks 23.3, 6-8; Lev 19.15.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Koa hatolotrareo ho an’ny TOMPO Andriamanitrareo ny sorom-pihavanana fanao amin’ny Paska, dia ondry aman’osy na omby, eo amin’ny toerana izay hofidin’ny TOMPO mba hipetrahan’ny voninahiny. '
  '20':
  - type: text
    content: Ny ara-drariny mihitsy no harahinareo mba ho velona ianareo ka hahazo ny tany izay omen’ny TOMPO Andriamanitrareo anareo.
  - type: heading
    content: Fomba sasany tokony hofadina ara-pivavahana
  '21':
  - type: text
    content: 'Aza anangananareo tsato-kazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: ' eo anilan’ny '
  - type: text
    content: alitara
  - type: text
    content: ' izay hamboarinareo ho an’ny TOMPO Andriamanitrareo; '
  '22':
  - type: text
    content: ary aza ampijoroanareo tsangambaton-tsampy koa eo, fa halan’ny TOMPO Andriamanitrareo izany
  - type: note
    content: 'And 21-22: jereo Eks 34.13; Lev 26.11.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Aza mofo misy '
  - type: text
    content: leviora
  - type: text
    content: ' no haninareo amin’ny sakafo Paska; fa mandritra ny fito andro, dia mofo tsy misy leviora no hohaninareo mba hahatsiahivanareo fa an-kamehana no nialanareo tany Ejipta; eny, mofo tsizarizary no hohaninareo mba hahatsiarovanareo ilay andro nialanareo tany Ejipta, mandritra ny andro rehetra iainanareo. '
  '4':
  - type: text
    content: 'Aoka tsy hisy leviora eo aminareo, manerana ny taninareo, mandritra izany herinandro izany; ary aoka tsy hisy tavela ho tra-maraina ny henan’ilay sorom-pihavanana novonoinareo tamin’ny harivan’ny andro voalohany. '
  '5':
  - type: text
    content: 'Tsy ho azonareo anaovana ny soron’ny Paska avokoa tsy akory ny tanàna rehetra izay omen’ny TOMPO Andriamanitrareo anareo; '
  '6':
  - type: text
    content: fa amin’ny toerana izay hofidiny hipetrahan’ny voninahiny ihany no hanaovanareo ny soron’ny Paska, rehefa hariva maty masoandro iny, izany hoe amin’ilay fotoana nialanareo tany Ejipta
  - type: note
    content: 'amin’ilay fotoana: dkt hafa amin’ilay daty.'
  '7':
  - type: text
    content: 'Dia handrahoinareo izany ka hohaninareo eo amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo; ary rehefa maraina ny andro, dia hody any an-dainareo ianareo. '
  '8':
  - type: text
    content: Mandritra ny enina andro no hihinananareo mofo tsy misy leviora; fa amin’ny andro fahafito, dia hisy fivoriana famaranana manetriketrika ho fanajana ny TOMPO Andriamanitrareo, ka tsy hanao raharaha ianareo amin’izany
  - type: note
    content: 'And 1-8: jereo Eks 12.1-20; Lev 23.5-8; Nom 28.16-25.'
  - type: text
    content: .
  - type: heading
    content: Ny fetin’ny Pentekôsta
  '9':
  - type: text
    content: 'Hanisa fito herinandro ianareo, ka miantomboka amin’ny andro hiandohan’ny fijinjam-bary no hanisanareo izany. '
