verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fankalazana ny Paska
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tandremo fa amin’ny volana Abîba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
      marker-yv: yv-n
    - type: text
      text: ' no hankalazanareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' ho fanajana ny TOMPO Andriamanitrareo. Volana Abîba manko no nitondran’ny TOMPO Andriamanitrareo anareo niala tany Ejipta tamin’ny alina. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hankalaza ny fetin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pentekôsta
    - type: text
      text: ' ianareo, ka hanavaka fanati-tsitrapo homenareo araka izay itahian’ny TOMPO Andriamanitrareo anareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hankany amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo hipetrahan’ny voninahiny ianareo, ary hifaly eo anatrehan’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasin
    - type: text
      text: '’ny TOMPO Andriamanitrareo ny tenanareo sy ny zanakareo ary ny mpanomponareo mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Levita
    - type: text
      text: ' izay ao an-tanànanareo ary koa ny vahiny sy kamboty ary mpitondratena izay eo anivonareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsarovy fa nandevozina tany Ejipta ianareo, ka imasoy hotanterahina ireo didy ireo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 9-12:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Lev 23.15-21; Lev 28.26-31.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fetin’ny Tranotomboka
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Rehefa voaangonareo ny avy amin’ny famoloanareo sy famiazanareo, dia hankalaza ny fetin’ny Tranotomboka ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hifaly am-piravoravoana ianareo sy ny zanakareo ary ny mpanomponareo mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Levita
    - type: text
      text: ' ary koa ny vahiny sy kamboty ary ny mpitondratena izay ao an-tanànanareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mandritra ny fito andro no hanaovanareo izany fankalazana izany ho fanajana ny TOMPO Andriamanitrareo eo amin’ny toerana izay hofidiny; ary dia hifaly tokoa ianareo satria notahîn’ny TOMPO Andriamanitrareo avokoa ny vokatrareo sy ny asan-tananareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 13.15:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Lev 23.33-43; Nom 29.12-38.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Intelo isan-taona ny lehilahy rehetra aminareo no hiseho eo anatrehan’ny TOMPO Andriamanitrareo any amin’ny toerana izay hofidiny, dia amin’ny fankalazana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mofo tsy misy leviora
    - type: text
      text: ' sy ny fankalazana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pentekôsta
    - type: text
      text: ' ary ny fankalazana ny Tranotomboka. Ary aoka tsy ho tanam-polo no hisehoany eo anatrehan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasin
    - type: text
      text: '’ny TOMPO; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: fa aoka samy hitondra izay fanatitra zakany avy, araka ny fitahiana omen’ny TOMPO Andriamanitrareo azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fepetra momba ny fitsarana
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mifidiana mpitsara sy mpifehy ao an-tanàna rehetra izay omen’ny TOMPO Andriamanitrareo anareo araka ny fokonareo avy; ary dia ho ara-drariny no aoka hitsaran’ireo ny vahoaka. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Aza manao fitsarana miangatra, aza mizaha tavan’olona, ary aza mandray kolikoly; fa ny kolikoly mahajamba ny mason’ny hendry ka mampamadika ny raharahan’ny manan-drariny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ka mampamadika ny...: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mampivaona ny fanapahan-kevitry ny olo-marina.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Jereo Eks 23.3, 6-8; Lev 19.15.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Koa hatolotrareo ho an’ny TOMPO Andriamanitrareo ny sorom-pihavanana fanao amin’ny Paska, dia ondry aman’osy na omby, eo amin’ny toerana izay hofidin’ny TOMPO mba hipetrahan’ny voninahiny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny ara-drariny mihitsy no harahinareo mba ho velona ianareo ka hahazo ny tany izay omen’ny TOMPO Andriamanitrareo anareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fomba sasany tokony hofadina ara-pivavahana
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Aza anangananareo tsato-kazo fanajana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserà
    - type: text
      text: ' eo anilan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' izay hamboarinareo ho an’ny TOMPO Andriamanitrareo; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ary aza ampijoroanareo tsangambaton-tsampy koa eo, fa halan’ny TOMPO Andriamanitrareo izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 21-22:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 34.13; Lev 26.11.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Aza mofo misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviora
    - type: text
      text: ' no haninareo amin’ny sakafo Paska; fa mandritra ny fito andro, dia mofo tsy misy leviora no hohaninareo mba hahatsiahivanareo fa an-kamehana no nialanareo tany Ejipta; eny, mofo tsizarizary no hohaninareo mba hahatsiarovanareo ilay andro nialanareo tany Ejipta, mandritra ny andro rehetra iainanareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aoka tsy hisy leviora eo aminareo, manerana ny taninareo, mandritra izany herinandro izany; ary aoka tsy hisy tavela ho tra-maraina ny henan’ilay sorom-pihavanana novonoinareo tamin’ny harivan’ny andro voalohany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tsy ho azonareo anaovana ny soron’ny Paska avokoa tsy akory ny tanàna rehetra izay omen’ny TOMPO Andriamanitrareo anareo; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: fa amin’ny toerana izay hofidiny hipetrahan’ny voninahiny ihany no hanaovanareo ny soron’ny Paska, rehefa hariva maty masoandro iny, izany hoe amin’ilay fotoana nialanareo tany Ejipta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'amin’ilay fotoana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: amin’ilay daty
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia handrahoinareo izany ka hohaninareo eo amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo; ary rehefa maraina ny andro, dia hody any an-dainareo ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mandritra ny enina andro no hihinananareo mofo tsy misy leviora; fa amin’ny andro fahafito, dia hisy fivoriana famaranana manetriketrika ho fanajana ny TOMPO Andriamanitrareo, ka tsy hanao raharaha ianareo amin’izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.8 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 1-8:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 12.1-20; Lev 23.5-8; Nom 28.16-25.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fetin’ny Pentekôsta
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hanisa fito herinandro ianareo, ka miantomboka amin’ny andro hiandohan’ny fijinjam-bary no hanisanareo izany. '
