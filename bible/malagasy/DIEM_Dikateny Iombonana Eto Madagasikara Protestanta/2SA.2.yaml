document_id: 2SA.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida voahosotra ho mpanjakan’i Joda tao Hebrôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany dia nanontany ny TOMPO i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handeha ho any amin’ny tanàna iray any Joda ve aho?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, mandehana!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy indray i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza no handehanako?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Any Hebrôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hebrôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tokony ho 30 km ao atsimo andrefan’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nankany i Davida niaraka tamin’ny vadiny roa, dia i Ahinôhama avy any Jizrehela sy i Abigaîla vady navelan’i Nabala avy any Karmela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nentin’i Davida koa ireo namany nombàm-pianakaviany avy, ka nonina tao amin’ireo tanàna kely akaikin’i Hebrôna izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary tonga tao ny vahoakan’i Joda, ka nanosotra an’i Davida ho mpanjakan’i Joda.
- type: usfm
  marker: p
  children:
  - type: text
    text: Nisy nanambara tamin’i Davida fa ny mponin’i Jabesa any Gilehada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jabesa any Gilehada: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 31.11-13 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' no nandevina an’i Saoly; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia nandefa iraka hankany amin’ny mponin’i Jabesa izy hilaza hoe: «'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hitahy
  - type: text
    text: ' anareo anie ny TOMPO noho izao mari-pitiavana nasehonareo tamin’ny nandevenanareo an’i Saoly tomponareo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ka ny TOMPO anie haneho fitiavana sy toetra mahatoky aminareo; ary izaho koa dia hamaly soa anareo noho ny nanaovanareo izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ankehitriny, mahereza sy matanjaha; fa efa maty i Saoly tomponareo, ka izaho no natokan’ny vahoakan’i Joda ho mpanjaka eo aminy.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Isbôsèta voafidy ho mpanjakan’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa nentin’i Abinera zanakalahin’i Nera sady lehiben’ny tafik’i Saoly nankany Mahanaîma i Isbôsèta zanakalahin’i Saoly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mahanaîma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 32.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka nataony mpanjaka tamin’ny faritr’i Gilehada sy ny Asorita mbamin’i Jizrehela sy i Efraîma sy i Benjamîna ary i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Efapolo taona i Isbôsèta zanakalahin’i Saoly raha nanjaka tamin’i Israely, ary roa taona no nanjakany. Ny fokon’i Joda ihany no nanaiky an’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fito taona sy tapany no nanjakan’i Davida tamin’ny fokon’i Joda tao Hebrôna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny adin’i Joda sy i Israely tao Gibehôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Niala tao Mahanaîma i Abinera zanakalahin’i Nera sy ny mpanompon’i Isbôsèta zanakalahin’i Saoly ka nankany Gibehôna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niainga koa i Jôaba zanakalahin’i Tseroià sy ny mpanompon’i Davida; ka tafahoana teo akaikin’ny dobo tao Gibehôna ny roa tonta ary samy naka toerana nifanatrika teo amoron’ny dobo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy i Abinera tamin’i Jôaba:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka hitsangana ireo zatovontsika mba hifampitsapa hery eto anatrehantsika.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’i Jôaba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka àry izy hitsangana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nisy nitsangana ireo ary niroso hoisaina, ka 12 lahy tamin’i Benjamîna mpomba an’i Isbôsèta zanakalahin’i Saoly ary 12 lahy koa tamin’ny mpanompon’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Samy nifampihazon-doha avy ny mpifaninana sady nifanindron-tehezana tamin’ny sabatra ka dia samy niara-davo. Izany no nanaovana io toerana ao Gibehôna io hoe Sahan-tsaba-maranitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nafotaka tokoa ny ady tamin’io andro io. Nilavo lefona teo anoloan’ny mpanompon’i Davida i Abinera sy ny olon’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nanatrika teo koa ny zanak’i Tseroià telo lahy dia i Jôaba sy i Abisay ary i Asahela; ity Asahela ity dia faingaim-pandeha toy ny gazela any an-taniefitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka nanenjika an’i Abinera sady tsy nivilivily mihitsy na tamin’ny ankavia na tamin’ny ankavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Niherika kosa i Abinera ka nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao ve io, ry Asahela?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny navaliny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, izaho ihany ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy i Abinera taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza manenjika ahy ianao, fa mivilia amin’ny ankavanana na amin’ny ankavia ka sambory ny iray amin’ireo tovolahy ary alaivo ho anao izay fitaovana eny aminy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tsy nety nivily anefa i Asahela fa nanenjika azy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ka hoy indray i Abinera tamin’i Asahela:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mivilia ianao fa aza manenjika ahy intsony, fandrao dia hatrosiko amin’ny tany ho faty! Kanefa hataoko ahoana ny hahajery an’i Jôaba rahalahinao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mbola tsy nety nivily ihany anefa i Asahela, koa dia nasian’i Abinera tamin’ny vody lefona ny kibony ka tafagorobaka tany an-damosiny. Nitrosina tamin’ny tany izy ary maty tsy tra-drano teo. Izay rehetra tonga teo amin’ny toerana nahafatesan’i Asahela dia nijanona avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa i Jôaba sy i Abisay nanenjika an’i Abinera. Maty masoandro izy ireo raha tonga tao Gibehà-Amà izay eo atsinanan’i Giha amin’ny lalan’ny taniefitr’i Gibehôna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Niangona ho antoko iray teo amin’i Abinera ny miaramilan’i Benjamîna ka nijanona teo an-tampon-kavoana iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary niantso mafy an’i Jôaba i Abinera hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handripaka tsy hisy farany ve ny sabatra? Tsy mba fantatrao ve fa hampalahelo ny ho vokatr’izany? Koa mandra-pahoviana no hilazanao ny olonao hampitsahatra izao fanenjehana ifamonoan’ny mpirahalahy izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy i Jôaba:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Velona Andriamanitra ka manizingizina aho fa raha tsy noho ny teninao dia tsy ho nampitsahatra izao fifamonoan’ny mpirahalahy izao akory ny oloko alohan’ny rahampitso maraina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia notsofin’i Jôaba ny anjomara, ka nijanona tsy nanenjika ny Israelita intsony ny miaramilany rehetra; ary nitsahatra ny ady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nandritra ny alina dia nitety ny lemak’i Arabà i Abinera sy ny olony ka nita an’i Jôrdàna, namaky an’i Bitrôna iray manontolo ary tonga tao Mahanaîma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Rehefa nijanona tsy nanenjika an’i Abinera i Jôaba, dia namory ny tafiny manontolo; koa tamin’ireo mpanompon’i Davida, dia miaramila 19 sy Asahela ihany no tsy teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa ny mpanompon’i Davida kosa nahafaty 360 lahy tamin’ny Benjaminita sy miaramila hafan’i Abinera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nentina ny fatin’i Asahela ka nalevina tao amin’ny fasan-drainy tao Betlehema. Ary i Jôaba sy ny olony nanao lava alina, dia tonga tany Hebrôna tamin’ny mazava ratsy.
