document_id: 2SA.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida voahosotra ho mpanjakan’i Joda tao Hebrôna
  - type: text
    content: 'Taorian’izany dia nanontany ny TOMPO i Davida hoe:'
  - type: text
    content: –Handeha ho any amin’ny tanàna iray any Joda ve aho?
  - type: text
    content: 'Ka novalian’ny TOMPO hoe:'
  - type: text
    content: –Eny, mandehana!
  - type: text
    content: 'Dia hoy indray i Davida:'
  - type: text
    content: –Aiza no handehanako?
  - type: text
    content: 'Ka hoy ny TOMPO hoe:'
  - type: text
    content: –Any Hebrôna
  - type: note
    content: 'Hebrôna: tanàna tokony ho 30 km ao atsimo andrefan’i Jerosalema.'
  - type: text
    content: .
  '10':
  - type: text
    content: 'Efapolo taona i Isbôsèta zanakalahin’i Saoly raha nanjaka tamin’i Israely, ary roa taona no nanjakany. Ny fokon’i Joda ihany no nanaiky an’i Davida. '
  '11':
  - type: text
    content: Fito taona sy tapany no nanjakan’i Davida tamin’ny fokon’i Joda tao Hebrôna.
  - type: heading
    content: Ny adin’i Joda sy i Israely tao Gibehôna
  '12':
  - type: text
    content: 'Niala tao Mahanaîma i Abinera zanakalahin’i Nera sy ny mpanompon’i Isbôsèta zanakalahin’i Saoly ka nankany Gibehôna. '
  '13':
  - type: text
    content: 'Dia niainga koa i Jôaba zanakalahin’i Tseroià sy ny mpanompon’i Davida; ka tafahoana teo akaikin’ny dobo tao Gibehôna ny roa tonta ary samy naka toerana nifanatrika teo amoron’ny dobo. '
  '14':
  - type: text
    content: 'Ary hoy i Abinera tamin’i Jôaba:'
  - type: text
    content: –Aoka hitsangana ireo zatovontsika mba hifampitsapa hery eto anatrehantsika.
  - type: text
    content: 'Dia novalian’i Jôaba hoe:'
  - type: text
    content: –Aoka àry izy hitsangana.
  '15':
  - type: text
    content: 'Dia nisy nitsangana ireo ary niroso hoisaina, ka 12 lahy tamin’i Benjamîna mpomba an’i Isbôsèta zanakalahin’i Saoly ary 12 lahy koa tamin’ny mpanompon’i Davida. '
  '16':
  - type: text
    content: Samy nifampihazon-doha avy ny mpifaninana sady nifanindron-tehezana tamin’ny sabatra ka dia samy niara-davo. Izany no nanaovana io toerana ao Gibehôna io hoe Sahan-tsaba-maranitra.
  '17':
  - type: text
    content: 'Nafotaka tokoa ny ady tamin’io andro io. Nilavo lefona teo anoloan’ny mpanompon’i Davida i Abinera sy ny olon’i Israely. '
  '18':
  - type: text
    content: 'Nanatrika teo koa ny zanak’i Tseroià telo lahy dia i Jôaba sy i Abisay ary i Asahela; ity Asahela ity dia faingaim-pandeha toy ny gazela any an-taniefitra, '
  '19':
  - type: text
    content: 'ka nanenjika an’i Abinera sady tsy nivilivily mihitsy na tamin’ny ankavia na tamin’ny ankavanana. '
  '2':
  - type: text
    content: 'Dia nankany i Davida niaraka tamin’ny vadiny roa, dia i Ahinôhama avy any Jizrehela sy i Abigaîla vady navelan’i Nabala avy any Karmela. '
  '20':
  - type: text
    content: 'Niherika kosa i Abinera ka nanontany azy hoe:'
  - type: text
    content: –Ianao ve io, ry Asahela?
  - type: text
    content: 'Dia hoy ny navaliny:'
  - type: text
    content: –Eny, izaho ihany ity.
  '21':
  - type: text
    content: 'Ary hoy i Abinera taminy:'
  - type: text
    content: –Aza manenjika ahy ianao, fa mivilia amin’ny ankavanana na amin’ny ankavia ka sambory ny iray amin’ireo tovolahy ary alaivo ho anao izay fitaovana eny aminy.
  - type: text
    content: 'Tsy nety nivily anefa i Asahela fa nanenjika azy ihany. '
  '22':
  - type: text
    content: 'Ka hoy indray i Abinera tamin’i Asahela:'
  - type: text
    content: –Mivilia ianao fa aza manenjika ahy intsony, fandrao dia hatrosiko amin’ny tany ho faty! Kanefa hataoko ahoana ny hahajery an’i Jôaba rahalahinao?
  '23':
  - type: text
    content: Mbola tsy nety nivily ihany anefa i Asahela, koa dia nasian’i Abinera tamin’ny vody lefona ny kibony ka tafagorobaka tany an-damosiny. Nitrosina tamin’ny tany izy ary maty tsy tra-drano teo. Izay rehetra tonga teo amin’ny toerana nahafatesan’i Asahela dia nijanona avokoa.
  '24':
  - type: text
    content: 'Fa i Jôaba sy i Abisay nanenjika an’i Abinera. Maty masoandro izy ireo raha tonga tao Gibehà-Amà izay eo atsinanan’i Giha amin’ny lalan’ny taniefitr’i Gibehôna. '
  '25':
  - type: text
    content: 'Niangona ho antoko iray teo amin’i Abinera ny miaramilan’i Benjamîna ka nijanona teo an-tampon-kavoana iray. '
  '26':
  - type: text
    content: 'Ary niantso mafy an’i Jôaba i Abinera hoe:'
  - type: text
    content: –Handripaka tsy hisy farany ve ny sabatra? Tsy mba fantatrao ve fa hampalahelo ny ho vokatr’izany? Koa mandra-pahoviana no hilazanao ny olonao hampitsahatra izao fanenjehana ifamonoan’ny mpirahalahy izao?
  '27':
  - type: text
    content: 'Dia hoy i Jôaba:'
  - type: text
    content: –Velona Andriamanitra ka manizingizina aho fa raha tsy noho ny teninao dia tsy ho nampitsahatra izao fifamonoan’ny mpirahalahy izao akory ny oloko alohan’ny rahampitso maraina.
  '28':
  - type: text
    content: 'Dia notsofin’i Jôaba ny anjomara, ka nijanona tsy nanenjika ny Israelita intsony ny miaramilany rehetra; ary nitsahatra ny ady. '
  '29':
  - type: text
    content: 'Nandritra ny alina dia nitety ny lemak’i Arabà i Abinera sy ny olony ka nita an’i Jôrdàna, namaky an’i Bitrôna iray manontolo ary tonga tao Mahanaîma. '
  '3':
  - type: text
    content: 'Nentin’i Davida koa ireo namany nombàm-pianakaviany avy, ka nonina tao amin’ireo tanàna kely akaikin’i Hebrôna izy rehetra. '
  '30':
  - type: text
    content: 'Rehefa nijanona tsy nanenjika an’i Abinera i Jôaba, dia namory ny tafiny manontolo; koa tamin’ireo mpanompon’i Davida, dia miaramila 19 sy Asahela ihany no tsy teo. '
  '31':
  - type: text
    content: 'Fa ny mpanompon’i Davida kosa nahafaty 360 lahy tamin’ny Benjaminita sy miaramila hafan’i Abinera. '
  '32':
  - type: text
    content: Nentina ny fatin’i Asahela ka nalevina tao amin’ny fasan-drainy tao Betlehema. Ary i Jôaba sy ny olony nanao lava alina, dia tonga tany Hebrôna tamin’ny mazava ratsy.
  '4':
  - type: text
    content: Ary tonga tao ny vahoakan’i Joda, ka nanosotra an’i Davida ho mpanjakan’i Joda.
  - type: text
    content: Nisy nanambara tamin’i Davida fa ny mponin’i Jabesa any Gilehada
  - type: note
    content: 'Jabesa any Gilehada: jereo 1 Sam 31.11-13 sy nta.'
  - type: text
    content: ' no nandevina an’i Saoly; '
  '5':
  - type: text
    content: 'dia nandefa iraka hankany amin’ny mponin’i Jabesa izy hilaza hoe: «'
  - type: text
    content: Hitahy
  - type: text
    content: ' anareo anie ny TOMPO noho izao mari-pitiavana nasehonareo tamin’ny nandevenanareo an’i Saoly tomponareo izao. '
  '6':
  - type: text
    content: 'Ka ny TOMPO anie haneho fitiavana sy toetra mahatoky aminareo; ary izaho koa dia hamaly soa anareo noho ny nanaovanareo izany zavatra izany. '
  '7':
  - type: text
    content: Ary ankehitriny, mahereza sy matanjaha; fa efa maty i Saoly tomponareo, ka izaho no natokan’ny vahoakan’i Joda ho mpanjaka eo aminy.»
  - type: heading
    content: I Isbôsèta voafidy ho mpanjakan’i Israely
  '8':
  - type: text
    content: Fa nentin’i Abinera zanakalahin’i Nera sady lehiben’ny tafik’i Saoly nankany Mahanaîma i Isbôsèta zanakalahin’i Saoly
  - type: note
    content: 'Mahanaîma: jereo Gen 32.3 sy nta.'
  - type: text
    content: ', '
  '9':
  - type: text
    content: 'ka nataony mpanjaka tamin’ny faritr’i Gilehada sy ny Asorita mbamin’i Jizrehela sy i Efraîma sy i Benjamîna ary i '
  - type: text
    content: Israely
  - type: text
    content: ' manontolo. '
