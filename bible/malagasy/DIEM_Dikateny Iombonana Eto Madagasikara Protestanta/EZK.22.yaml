    children:
    - type: text
      text: Ny zavatra mahavoafady nataon’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: misy mandry amin’ny vadin-drainy, misy manolana vehivavy voan’ny fadimbolana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 18.6 sy nta. Momba ity and ity sy ny manaraka, jereo koa ny Lev 18.7-20.
      marker-yv: yv-n
    - type: text
      text: ', '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'misy manao zava-maharikoriko amin’ny vadin’ny namany, misy nanery ny vinantovaviny hijangajanga ary misy manolana ny anabaviny, dia ny zanakavavin-drainy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ao aminao misy manaiky hotambazam-bola mba hamono olona, misy mampindram-bola hakana zanany tafahoatra sy mangoron-karena tamin’ny fandrobana ny namany, ka manadino Ahy mihitsy. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '«Koa indro Aho hamely mafy anareo, ry mponin’i Jerosalema, noho ireo harena nangoninareo tsy an-drariny sy ireo vonoan’olona nataonareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Moa hanan-kery sy fahasahiana hahatohitra ve ianareo, amin’ny andro hamelezako anareo? Fa Izaho TOMPO dia milaza sady manatanteraka izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Haeliko sy haparitako any amin’ireo firenena any an-tany samy hafa ianareo ka hatako mifarana hatreo ny asa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ' fanaonareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny nataonareo no hanimbazimbana Ahy eo imason’ny firenen-kafa; kanefa amin’izay dia hoekenareo fa Izaho no TOMPO.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '«Ry ilay taranak’olombelona, amiko ny Israelita dia toy ny tain-drendrika metaly: Izy rehetra, na volafotsy na varahina na vifotsy na vy na firaka, dia samy tonga tain-drendrika tao anaty lafaoro'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Misy fampitahana tahaka izao koa amin’ireo rijan-teny hafan’ny mpaminany, jereo Jer 6.28.29, Mal 3.2-3 sns.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa Izaho Tompo ANDRIANANAHARY dia milaza hoe: «Efa tonga tain-drendrika ianareo rehetra ka hatobiko eo afovoan’i Jerosalema. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Ianao, ry ilay taranak’olombelona, miomàna sy mivonòna hitsara ity tanànan’i Jerosalema lian-dra ity! Ampahafantaro azy ny zavatra rehetra maharikoriko nataony. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa avangongo ao anaty lafaoro ny volafotsy sy varahina sy vy ary firaka na vifotsy, dia tsofina mafy ny afo ao ambany handrendrehana azy. Koa noho ny fahatezerako amam-pahavinirako dia toy izany no hanangonako anareo; ka havangongoko ao anaty lafaoro ianareo mba harendrika. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ao Jerosalema no hanangonako anareo handorako anareo amin’ny afom-pahatezerako izay handrendrika anareo tahaka ny metaly. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ho tahaka ny volafotsy miempo ao anaty lafaoro no handrendrehana anareo ao Jerosalema. Amin’izay dia hoekenareo fa Izaho TOMPO no mampitosaka ny fahavinirako aminareo.»
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia mbola nisy tenin’ny TOMPO tamiko nanao hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: «Ry ilay taranak’olombelona, ambarao amin’i Jerosalema fa sahala amin’ny tany tsy nilatsahan’ny ranonorana izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.24 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Tsy nilatsahan’ny ranonorana ny taniny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt grika tranainy, fa ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsy mbola nodiovina.
      marker-yv: yv-n
    - type: text
      text: ', ka ho tahaka ny tany tsy misy rano mihitsy amin’ny androm-pahatezerako. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tahaka ny liona mierona mamiravira haza ireo mpitondra azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ireo mpitondra azy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt grika tranainy izany, fa ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny fikomian’ireo mpaminany.
      marker-yv: yv-n
    - type: text
      text: 'ka mandripaka olona sy maka ny vola amam-pananan’ny hafa ka mahatonga vehivavy maro ho mpitondratena. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mandika ny lalànako ireo mpisorony sady manimbazimba ny toeramasiko. Mampifangaro ny zava-masina sy ny tsy masina izy, tsy mampianatra ny olona hanavaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ', ary minia tsy mahalala ny andro sabatako. Izany no animbazimbany Ahy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Lian-dra tahaka ny amboadia mamiravira haza ireo mpitondra ny vahoaka, ka mamono olona ho faty mba hangoronan-karena tsy an-drariny. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminaniny
    - type: text
      text: ' kosa manarona izany rehetra izany amin’ny lalotra fotaka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 13.10-16.
      marker-yv: yv-n
    - type: text
      text: '. Fahitana manodoka ary fanambaràna mamitaka no lazainy. Mihambo ho mampita hafatra avy amiko Tompo ANDRIANANAHARY izy nefa Izaho TOMPO tsy niteny taminy akory. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Manao herisetra ny olona eo amin’ny tany ka mangalatra sady mampahory ny mahantra sy ny fadiranovana, mitsentsitra tsy an-drariny ny vahiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny zon’ny vahiny, jereo ohatra ny Lev 19.33-34; Deot 14.29; 24.14-15.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Tanàna anjakàn’ny famonoana olona ianao ka hahatonga ny fotoana handravana anao; ary ny mponinao koa dia manamboatra sampy maharikoriko sady mandoto ny faritrao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Nokarohiko izay vonona hanangana ny manda na izay vonona hijanona eo amin’ny bangan’ny manda mba hifona eo anatrehako ho an’ny tany sy hisakana Ahy tsy handrava azy; nefa tsy nahita Aho. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Koa natosako teo aminy ny fahavinirako ary naripako tamin’ny afom-pahatezerako izy sady nampizakaiko ny vokatry ny fitondrantenany. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Meloka ianao noho ireo vonoan’olona rehetra ireo ary nandoto tena tamin’izany fanamboaran-tsampy izany! Ny tenanao ihany no nampanakaiky ny fotoana handravana anao; ka tafapaka amin’ny fiafaran’ny andronao ianao. Noho izany dia atolotro ho fihomehezan’ny firenen-kafa ianao ka ho fanarabian’ny tany rehetra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Vasoka ny lazanao, toerana be korontana ianao, ka na ny tany lavitra na ny akaiky dia samy manaraby anao.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: «Ao aminao dia samy manampatra fahefana ny mpitondra ary mamono olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ahitana ohatra toy ny eto ny 1 Mp 21.8; 2 Mp 21.16; 24.4; sns.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ao aminao dia tsy hajaina ny ray sy reny, tsentsefina ny vahiny, ampahorina ny kamboty sy ny mpitondratena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit amin’izay takin’ny lalàna, ohatra Eks 20.12; 22.20-23.
      marker-yv: yv-n
    - type: text
      text: ', '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'atao tsinontsinona ny toerana voatokana ho Ahy ary zimbazimbaina ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabatako
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ao aminao dia misy mpanaratsy mba handrisika amin’ny famonoana olona; ary ny mponinao dia misy mihinana sakafom-panompoan-tsampy eny an-tendrombohitra. Ao aminao dia fanaovam-pijangajangana
    - type: usfm
