document_id: EZK.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zavatra mahavoafady nataon’i Jerosalema
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: misy mandry amin’ny vadin-drainy, misy manolana vehivavy voan’ny fadimbolana
  - type: note
    content: Jereo 18.6 sy nta. Momba ity and ity sy ny manaraka, jereo koa ny Lev 18.7-20.
  - type: text
    content: ', '
  '11':
  - type: text
    content: 'misy manao zava-maharikoriko amin’ny vadin’ny namany, misy nanery ny vinantovaviny hijangajanga ary misy manolana ny anabaviny, dia ny zanakavavin-drainy. '
  '12':
  - type: text
    content: Ao aminao misy manaiky hotambazam-bola mba hamono olona, misy mampindram-bola hakana zanany tafahoatra sy mangoron-karena tamin’ny fandrobana ny namany, ka manadino Ahy mihitsy. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
  '13':
  - type: text
    content: '«Koa indro Aho hamely mafy anareo, ry mponin’i Jerosalema, noho ireo harena nangoninareo tsy an-drariny sy ireo vonoan’olona nataonareo. '
  '14':
  - type: text
    content: 'Moa hanan-kery sy fahasahiana hahatohitra ve ianareo, amin’ny andro hamelezako anareo? Fa Izaho TOMPO dia milaza sady manatanteraka izany. '
  '15':
  - type: text
    content: 'Haeliko sy haparitako any amin’ireo firenena any an-tany samy hafa ianareo ka hatako mifarana hatreo ny asa '
  - type: text
    content: maloto
  - type: text
    content: ' fanaonareo. '
  '16':
  - type: text
    content: Ny nataonareo no hanimbazimbana Ahy eo imason’ny firenen-kafa; kanefa amin’izay dia hoekenareo fa Izaho no TOMPO.
  '17':
  - type: text
    content: 'Dia nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  '18':
  - type: text
    content: '«Ry ilay taranak’olombelona, amiko ny Israelita dia toy ny tain-drendrika metaly: Izy rehetra, na volafotsy na varahina na vifotsy na vy na firaka, dia samy tonga tain-drendrika tao anaty lafaoro'
  - type: note
    content: Misy fampitahana tahaka izao koa amin’ireo rijan-teny hafan’ny mpaminany, jereo Jer 6.28.29, Mal 3.2-3 sns.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Koa Izaho Tompo ANDRIANANAHARY dia milaza hoe: «Efa tonga tain-drendrika ianareo rehetra ka hatobiko eo afovoan’i Jerosalema. '
  '2':
  - type: text
    content: '«Ianao, ry ilay taranak’olombelona, miomàna sy mivonòna hitsara ity tanànan’i Jerosalema lian-dra ity! Ampahafantaro azy ny zavatra rehetra maharikoriko nataony. '
  '20':
  - type: text
    content: 'Fa avangongo ao anaty lafaoro ny volafotsy sy varahina sy vy ary firaka na vifotsy, dia tsofina mafy ny afo ao ambany handrendrehana azy. Koa noho ny fahatezerako amam-pahavinirako dia toy izany no hanangonako anareo; ka havangongoko ao anaty lafaoro ianareo mba harendrika. '
  '21':
  - type: text
    content: 'Ao Jerosalema no hanangonako anareo handorako anareo amin’ny afom-pahatezerako izay handrendrika anareo tahaka ny metaly. '
  '22':
  - type: text
    content: Ho tahaka ny volafotsy miempo ao anaty lafaoro no handrendrehana anareo ao Jerosalema. Amin’izay dia hoekenareo fa Izaho TOMPO no mampitosaka ny fahavinirako aminareo.»
  '23':
  - type: text
    content: 'Dia mbola nisy tenin’ny TOMPO tamiko nanao hoe: '
  '24':
  - type: text
    content: «Ry ilay taranak’olombelona, ambarao amin’i Jerosalema fa sahala amin’ny tany tsy nilatsahan’ny ranonorana izy
  - type: note
    content: 'Tsy nilatsahan’ny ranonorana ny taniny: araka ny dkt grika tranainy, fa ny RM kosa manao hoe tsy mbola nodiovina.'
  - type: text
    content: ', ka ho tahaka ny tany tsy misy rano mihitsy amin’ny androm-pahatezerako. '
  '25':
  - type: text
    content: Tahaka ny liona mierona mamiravira haza ireo mpitondra azy
  - type: note
    content: 'ireo mpitondra azy: araka ny dkt grika tranainy izany, fa ny RM kosa manao hoe ny fikomian’ireo mpaminany.'
  - type: text
    content: 'ka mandripaka olona sy maka ny vola amam-pananan’ny hafa ka mahatonga vehivavy maro ho mpitondratena. '
  '26':
  - type: text
    content: 'Mandika ny lalànako ireo mpisorony sady manimbazimba ny toeramasiko. Mampifangaro ny zava-masina sy ny tsy masina izy, tsy mampianatra ny olona hanavaka ny '
  - type: text
    content: madio
  - type: text
    content: ' sy ny '
  - type: text
    content: maloto
  - type: text
    content: ', ary minia tsy mahalala ny andro sabatako. Izany no animbazimbany Ahy. '
  '27':
  - type: text
    content: 'Lian-dra tahaka ny amboadia mamiravira haza ireo mpitondra ny vahoaka, ka mamono olona ho faty mba hangoronan-karena tsy an-drariny. '
  '28':
  - type: text
    content: 'Ary ny '
  - type: text
    content: mpaminaniny
  - type: text
    content: ' kosa manarona izany rehetra izany amin’ny lalotra fotaka'
  - type: note
    content: Ampit 13.10-16.
  - type: text
    content: '. Fahitana manodoka ary fanambaràna mamitaka no lazainy. Mihambo ho mampita hafatra avy amiko Tompo ANDRIANANAHARY izy nefa Izaho TOMPO tsy niteny taminy akory. '
  '29':
  - type: text
    content: Manao herisetra ny olona eo amin’ny tany ka mangalatra sady mampahory ny mahantra sy ny fadiranovana, mitsentsitra tsy an-drariny ny vahiny
  - type: note
    content: Momba ny zon’ny vahiny, jereo ohatra ny Lev 19.33-34; Deot 14.29; 24.14-15.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Tanàna anjakàn’ny famonoana olona ianao ka hahatonga ny fotoana handravana anao; ary ny mponinao koa dia manamboatra sampy maharikoriko sady mandoto ny faritrao. '
  '30':
  - type: text
    content: 'Nokarohiko izay vonona hanangana ny manda na izay vonona hijanona eo amin’ny bangan’ny manda mba hifona eo anatrehako ho an’ny tany sy hisakana Ahy tsy handrava azy; nefa tsy nahita Aho. '
  '31':
  - type: text
    content: Koa natosako teo aminy ny fahavinirako ary naripako tamin’ny afom-pahatezerako izy sady nampizakaiko ny vokatry ny fitondrantenany. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '4':
  - type: text
    content: 'Meloka ianao noho ireo vonoan’olona rehetra ireo ary nandoto tena tamin’izany fanamboaran-tsampy izany! Ny tenanao ihany no nampanakaiky ny fotoana handravana anao; ka tafapaka amin’ny fiafaran’ny andronao ianao. Noho izany dia atolotro ho fihomehezan’ny firenen-kafa ianao ka ho fanarabian’ny tany rehetra. '
  '5':
  - type: text
    content: Vasoka ny lazanao, toerana be korontana ianao, ka na ny tany lavitra na ny akaiky dia samy manaraby anao.
  '6':
  - type: text
    content: «Ao aminao dia samy manampatra fahefana ny mpitondra ary mamono olona
  - type: note
    content: Ahitana ohatra toy ny eto ny 1 Mp 21.8; 2 Mp 21.16; 24.4; sns.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Ao aminao dia tsy hajaina ny ray sy reny, tsentsefina ny vahiny, ampahorina ny kamboty sy ny mpitondratena
  - type: note
    content: Ampit amin’izay takin’ny lalàna, ohatra Eks 20.12; 22.20-23.
  - type: text
    content: ', '
  '8':
  - type: text
    content: 'atao tsinontsinona ny toerana voatokana ho Ahy ary zimbazimbaina ny andro '
  - type: text
    content: sabatako
  - type: text
    content: '. '
  '9':
  - type: text
    content: Ao aminao dia misy mpanaratsy mba handrisika amin’ny famonoana olona; ary ny mponinao dia misy mihinana sakafom-panompoan-tsampy eny an-tendrombohitra. Ao aminao dia fanaovam-pijangajangana
  - type: note
    content: Jereo 18.6, 11, 15.
  - type: text
    content: ': '
