document_id: ZEC.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiadanana sy fahabetsaham-bokatra
  - type: text
    content: 'Ary nisy tenin’ny TOMPOn’izao rehetra izao tamiko nanao hoe:'
  '10':
  - type: text
    content: Talohan’izany andro izany
  - type: text
    content: dia tsy nisy valin-kasasarana
  - type: text
    content: na ho an’ny olona na ho an’ny biby.
  - type: text
    content: Ary tsy nisy olona afa-nivezivezy
  - type: text
    content: ka tsy notandindomim-pahavalo;
  - type: text
    content: fa navelako hifamely ny olon-drehetra.
  '11':
  - type: text
    content: Ankehitriny kosa dia tsy toy ny taloha intsony
  - type: text
    content: no ho fitondrako ny sisa amin’ny vahoakako.
  - type: text
    content: Izaho TOMPOn’izao rehetra izao no manao teny hentitra
  '12':
  - type: text
    content: fa hamafy fiadanana etỳ amin’ny tany Aho
  - type: text
    content: ka hamoa be ny voaloboka
  - type: text
    content: ary hahavokatra ny saha;
  - type: text
    content: ny lanitra hampilatsaka ny orana sahaza,
  - type: text
    content: ary dia homeko ireo soa rehetra ireo
  - type: text
    content: izay sisa velona amin’ny vahoakako.
  '13':
  - type: text
    content: Ry fanjakan’i Joda sy i Israely,
  - type: text
    content: toy ny nahatongavanareo ho oha-panozonana
  - type: text
    content: tany amin’ny hafa firenena,
  - type: text
    content: dia toy izany koa ankehitriny
  - type: text
    content: no anafahako anareo
  - type: text
    content: ka hahatonga anareo ho oha-pitahiana;
  - type: text
    content: koa aza matahotra intsony, fa mahereza.»
  '14':
  - type: text
    content: 'Izao manko no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Tamin’ny nampahatezeran’ny razanareo Ahy,
  - type: text
    content: dia nihevitra hahatonga loza aminareo
  - type: text
    content: Izaho TOMPOn’izao rehetra izao
  - type: text
    content: ka tsy nisalasala nanatanteraka izany.
  '15':
  - type: text
    content: Fa ankehitriny kosa dia mihevitra ny hanisy soa
  - type: text
    content: hanisy soa anareo Aho,
  - type: text
    content: mponin’i Jerosalema sy i Joda;
  - type: text
    content: koa aza matahotra intsony ianareo.
  '16':
  - type: text
    content: 'Izao no tsy maintsy hataonareo:'
  - type: text
    content: samia milaza ny marina
  - type: text
    content: amin’ny namany avy ianareo;
  - type: text
    content: aoka ho didim-pitsarana ara-drariny
  - type: text
    content: no havoaka eo amin’ny toeram-pitsaranareo
  - type: text
    content: mba hahatonga fiadanana eo aminareo.
  '17':
  - type: text
    content: Aza mieritreritra hanisy ratsy ny namana
  - type: text
    content: ary aza mety hianiana lainga,
  - type: text
    content: fa halako ny zavatra rehetra toy ireny.
  - type: text
    content: Izaho TOMPO no manao izany teny hentitra izany.»
  - type: heading
    content: Ho lasa andro fety ny andro fifadian-kanina
  '18':
  - type: text
    content: 'Ary nisy tenin’ny TOMPOn’izao rehetra izao tamiko nanao hoe:'
  '19':
  - type: text
    content: '–Izao no lazain’ny TOMPOn’izao rehetra izao: ny '
  - type: text
    content: fifadian-kanina
  - type: text
    content: ' izay tandremanareo amin’ny volana fahefatra sy fahadimy ary fahafito sy fahafolo, dia ho tonga fetim-pifaliana sy firavoravoana mahafinaritra ho an’ny vahoakan’i Joda'
  - type: note
    content: ny fifadian-kanina notandremana nandritra ny volana fahefatra dia fahatsiarovana ny loaka voalohany nataon’ny Babilônianina tamin’ny mandan’i Jerosalema. (Jer 52.6-7); ny fifadian-kanina amin’ny volana fahafolo dia fahatsiarovana ny fiantombohan’ny fanaovana fahirano an’i Jerosalema (2 Mp 25.1).
  - type: text
    content: . Kanefa tiava ny fahamarinana sy ny fiadanana.
  '2':
  - type: text
    content: '«Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: Miredaredam-pitiavana an’i Tsiôna Aho;
  - type: text
    content: eny, miredaredam-pitiavana fatratra azy Aho.
  '20':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Mbola hisy firenena vahiny
  - type: text
    content: sy mponina avy amin’ny tanàna maro
  - type: text
    content: ho tonga indray eto Jerosalema.
  '21':
  - type: text
    content: Ary ny mponina ao amin’ny tanàna iray
  - type: text
    content: dia hankany amin’ny mponin’ny tanàna iray hafa
  - type: text
    content: ka hitaona azy hanao hoe
  - type: text
    content: ‹Ndao tokoa isika handeha
  - type: text
    content: hivavaka amin’ny TOMPO,
  - type: text
    content: eny, hitady an’ilay TOMPOn’izao rehetra izao.›
  - type: text
    content: 'Dia hamaly ireo hoe:'
  - type: text
    content: ‹Izahay koa mba handeha›.
  '22':
  - type: text
    content: Eny, olona maro sy firenena matanjaka
  - type: text
    content: no ho tonga eto Jerosalema
  - type: text
    content: hitady Ahy TOMPOn’izao rehetra izao
  - type: text
    content: ka hivavaka amiko.
  '23':
  - type: text
    content: Amin’izay andro izay,
  - type: text
    content: hoy Izaho TOMPOn’izao rehetra izao,
  - type: text
    content: dia hisy vahiny folo izay samy hafa fiteny
  - type: text
    content: hihazona Jiosy iray amin’ny sisin’akanjony,
  - type: text
    content: 'ka hitambezo aminy hoe:'
  - type: text
    content: ‹Mba te handeha hiaraka aminareo izahay,
  - type: text
    content: satria efa renay fa momba anareo Andriamanitra›.»
  '3':
  - type: text
    content: Koa Izaho TOMPO mihitsy no milaza
  - type: text
    content: 'fa efa tafaverina indray eto '
  - type: text
    content: Tsiôna
  - type: text
    content: ' Aho'
  - type: text
    content: ka monina eo afovoan’i Jerosalema.
  - type: text
    content: Ny hiantsoana an’i Jerosalema dia «Tanàna mahatoky.»
  - type: text
    content: ary ny hiantsoana an’i Tsiôna tendrombohitro
  - type: text
    content: dia «Tendrombohitra masina.»
  '4':
  - type: text
    content: Eny, hoy Izaho TOMPOn’izao rehetra izao,
  - type: text
    content: mbola hisy lehilahy sy vehivavy antitra
  - type: text
    content: hipetrapetraka eny an-kianjan’i Jerosalema;
  - type: text
    content: ka isan’olona ireo, noho ny fahanterany,
  - type: text
    content: dia samy hitondra tehina an-tanana.
  '5':
  - type: text
    content: Ary ny kianjan’io tanàna io koa
  - type: text
    content: dia ho feno zazalahy sy zazavavy milalao.
  '6':
  - type: text
    content: 'Dia hoy ihany Izaho TOMPOn’izao rehetra izao:'
  - type: text
    content: Raha sarotra atao ho amin’ireo andro ireo izany
  - type: text
    content: ho an’ny vahoaka israelita sisa velona,
  - type: text
    content: dia tsy ho sarotra atao kosa izany amiko.
  - type: text
    content: Izaho TOMPOn’izao rehetra izao
  - type: text
    content: no manao izany teny hentitra izany.
  '7':
  - type: text
    content: Eny, Izaho TOMPOn’izao rehetra izao dia mampanantena
  - type: text
    content: fa ny vahoakako voaeliko dia hovonjeko
  - type: text
    content: avy any atsinanana sy avy any andrefana.
  '8':
  - type: text
    content: Hitondra azy avy any Aho,
  - type: text
    content: ka hamponina azy ao Jerosalema;
  - type: text
    content: dia ho vahoakako izy,
  - type: text
    content: ary Izaho ho Andriamaniny
  - type: text
    content: amim-pahitsiana sy amim-pahamarinana.»
  '9':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Mahereza, fa efa renareo ankehitriny
  - type: text
    content: 'ny fampanantenana izay nambaran’ny '
  - type: text
    content: mpaminany
  - type: text
    content: tamin’ny andro nametrahana ny fototry ny tranoko
  - type: text
    content: 'mba hanorenana indray ny '
  - type: text
    content: tempoliko
  - type: text
    content: .
