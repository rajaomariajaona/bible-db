      text: hanisy soa anareo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mponin’i Jerosalema sy i Joda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa aza matahotra intsony ianareo.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izao no tsy maintsy hataonareo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samia milaza ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
