  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa halako ny zavatra rehetra toy ireny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO no manao izany teny hentitra izany.»
  - type: usfm
