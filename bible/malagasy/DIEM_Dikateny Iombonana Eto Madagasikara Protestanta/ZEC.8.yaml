  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa ankehitriny kosa dia mihevitra ny hanisy soa
  - type: usfm
