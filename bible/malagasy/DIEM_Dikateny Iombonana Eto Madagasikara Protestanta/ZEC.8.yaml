        text: '14'
    - type: text
      text: 'Izao manko no lazain’ny TOMPOn’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tamin’ny nampahatezeran’ny razanareo Ahy,
  - type: usfm
    marker: q1
