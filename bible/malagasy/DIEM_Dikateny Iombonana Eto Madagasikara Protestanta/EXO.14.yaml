document_id: EXO.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanenjika ny Israelita ny Farao
  - type: text
    content: 'Niteny tamin’i Mosesy ny TOMPO manao hoe:'
  '10':
  - type: text
    content: 'Natopin’ny Israelita ny masony ka indreny ny Ejiptianina tamy manenjika azy, ary ny Farao dia efa mby akaiky. Raiki-tahotra loatra ny Israelita ka niantsoantso ny TOMPO '
  '11':
  - type: text
    content: 'sady niteny tamin’i Mosesy hoe:'
  - type: text
    content: '–Moa tsy nisy fasana ve tany Ejipta no nentinao ho faty atỳ an-taniefitra izahay? Izao ve no namoahanao anay hiala tany Ejipta? '
  '12':
  - type: text
    content: 'Moa tsy izao zavatra izao ve no efa nilazanay taminao tany Ejipta hoe: «Avelao hilamina izahay hanompo ny Ejiptianina. Fa aleonay manompo ny Ejiptianina toy izay ho faty any an-taniefitra».'
  '13':
  - type: text
    content: 'Fa namaly azy i Mosesy hoe:'
  - type: text
    content: '–Aza matahotra ianareo! Mahandrasa, fa ho hitanareo anio ny famonjena hataon’ny TOMPO aminareo! Satria ny Ejiptianina izay hitanareo androany dia tsy ho hitanareo intsony na oviana na oviana. '
  '14':
  - type: text
    content: Ny TOMPO no hiady ho anareo, fa ianareo kosa hangina fotsiny.
  - type: heading
    content: Manokatra lalana ao afovoan’ny ranomasina Andriamanitra
  '15':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Nahoana no miantso vonjy amiko ianao? Ilazao ny Israelita mba handroso. '
  '16':
  - type: text
    content: 'Ingao ny tehinao, ka ahinjiro eo ambony ranomasina ny tananao. Ary saraho ny rano, dia hamaky eo afovoan’ny rano eo amin’ny tany maina ny Israelita. '
  '17':
  - type: text
    content: 'Fa Izaho hanamafy fo ny Ejiptianina ka hitsofoka hanenjika anareo izy. Dia hasehoko ny '
  - type: text
    content: voninahitro
  - type: text
    content: ' amin’ny hanapotehako ny '
  - type: text
    content: Farao
  - type: text
    content: ' sy ny andian-tafiny rehetra, ny kalesiny sy ny mpitaingina azy. '
  '18':
  - type: text
    content: 'Ho fantatry ny Ejiptianina amin’izay fa Izaho no TOMPO rehefa asehoko azy araka izany ny voninahitro. '
  '19':
  - type: text
    content: 'Ny '
  - type: text
    content: anjeli
  - type: text
    content: n’Andriamanitra izay nialoha ny Israelita hatrizay dia nandeha nifindra teo aorian’ny toby. Toy izany koa, ny andry rahona
  - type: note
    content: 'andry rahona: jereo 13.21 sy nta.'
  - type: text
    content: ' izay teo alohan’izy ireo dia lasa any aoriany. '
  '2':
  - type: text
    content: –Ilazao ny Israelita mba hiverina hitoby ao akaikin’i Pi-Hahirôta
  - type: note
    content: 'Pi-Hahirôta, Migdôla, Bahala-Tsefôna: Tsy misy amin’ireo toerana ireo no fantatra mazava na iray aza; Pi-Hahirôta dia mety hidika hoe «Vinanin-dakan-drano», Migdôla dia «tobim-piarovana kely» na «tilikambom-pitiliana», ary Bahala-Tsefôna kosa dia «Bahala-Avaratra».'
  - type: text
    content: ' eo anelanelan’i Migdôla sy ny ranomasina. Ao no hanorenanareo toby, mifanatrika amin’i Bahala-Tsefôna, eo akaikin’ny ranomasina. '
  '20':
  - type: text
    content: Nifindra teo anelanelan’ny tobin’ny Ejiptianina sy ny tobin’ny Israelita teo anelanelan’ny tobin’ny Ejiptianina sy ny tobin’ny Israelita ny andry rahona. Io andry rahona io dia maizina tany andaniny fa nanazava ny alina kosa taty ankilany. Koa tsy afaka nifanatona izy roa tonta nandritra ny alina.
  '21':
  - type: text
    content: 'Nahinjitr’i Mosesy teo ambony ranomasina ny tanany. Ary ny TOMPO nampitsoka rivo-mahery avy any atsinanana nandritra ny alina manontolo ka nanosika ny ranomasina hanamaina azy. Nisaraka ny ranomasina, '
  '22':
  - type: text
    content: ary nita teo am-povoany nandia tany maina ny Israelita, fa nisavovona toa tamboho teo ankavanany sy ankaviany ny rano
  - type: note
    content: jereo 1Kôr 10.1-2; Heb 11.29.
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Nanenjika azy ny Ejiptianina; ny soavalin’ny farao rehetra mbamin’ny kalesiny sy ny mpitaingina azy dia samy nitsofoka nanaraka azy ireo tao afovoan’ny ranomasina avokoa. '
  '24':
  - type: text
    content: 'Ary nony efa nadiva haraina dia nijery ny tobin’ny Ejiptianina avy teo amin’ny andry afo sy rahona ny TOMPO, ka nanakorontana azy. '
  '25':
  - type: text
    content: Nohidiany
  - type: note
    content: 'nohidiany: araka ny Samaritanina sy ny Septoazinta ary ny Siriaka; ny RM manao hoe notsoahiny.'
  - type: text
    content: 'ny kodiaran’ny kalesy ka nihisatra ny fitarihana azy. Dia hoy ny Ejiptianina hoe:'
  - type: text
    content: –Andao handositra ny Israelita isika, fa ny TOMPO no miady ho azy ireo amintsika!
  '26':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Ahinjiro eo ambony ranomasina ny tananao mba hiverenan’ny rano eo amin’ny Ejiptianina sy ny kalesiny ary ny mpitaingin-tsoavaliny.
  '27':
  - type: text
    content: Dia nahinjitr’i Mosesy teo ambony ranomasina ny tanany. Niverina ho amin’ny toerany ny ranomasina rehefa ho maraina ny andro ka nifanehatra taminy ireo Ejiptianina nandositra, dia narian’ny TOMPO tao afovoan’ny ranomasina ny Ejiptianina.
  '28':
  - type: text
    content: 'Nikatona ny ranomasina ka nandrakotra ny kalesy sy ny mpitaingin-tsoavaly; izay tafiky ny Farao manontolo nanenjika ny Israelita tao an-dranomasina dia tsy nisy afa-nitsoaka na iray aza. '
  '29':
  - type: text
    content: 'Fa ny Israelita kosa dia niampita ny ranomasina nandia tany maina, fa ny rano dia nisavovona toa tamboho teo ankavanany sy ankaviany. '
  '3':
  - type: text
    content: 'Dia hiteny ny '
  - type: text
    content: Farao
  - type: text
    content: ' hoe: «voan’ny tamberintany ny Israelita, ka voahidin’ny taniefitra.» '
  '30':
  - type: text
    content: 'Namonjy ny Israelita teo an-tanan’ny Ejiptianina ny TOMPO tamin’izany andro izany, ka ny Israelita dia nahita ny fatin’ny Ejiptianina teny amoron-dranomasina. '
  '31':
  - type: text
    content: Hitan’ny Israelita ny hery lehibe izay nampiasain’ny TOMPO hamelezana ny Ejiptianina. Izany no nanajan’ny Israelita ny TOMPO, ka nitokiany AZY sy nitokiany an’i Mosesy mpanompony.
  '4':
  - type: text
    content: 'Ary hanamafy fo ny Farao Aho, dia hanenjika anareo izy. Kanefa hasehoko ny '
  - type: text
    content: voninahitro
  - type: text
    content: ' amin’ny hanapotehako ny Farao sy ny tafiny manontolo, ka ho fantatry ny Ejiptianina fa Izaho no TOMPO.'
  - type: text
    content: 'Notanterahin’ny Israelita izany araka ny torolalana. '
  '5':
  - type: text
    content: 'Rehefa nambara tamin’ny mpanjakan’i Ejipta sy ny tandapany fa efa mandositra ny Israelita, dia niova hevitra ny momba azy ireo ny Farao sy ny mpanompony ka niteny hoe: «Inona ity nataontsika? Nahoana no nalefantsika hiala tamin’ny fanompoana antsika ny Israelita?» '
  '6':
  - type: text
    content: 'Dia nasain’ny Farao noziogaina tamin’ny kalesy ny soavaliny, ary nentiny nanaraka azy koa ny tafiny. '
  '7':
  - type: text
    content: 'Nindaosiny avokoa ny kalesin’i Ejipta, ka isan’izany ny kalesy voafantina eninjato miaraka amin’ny mpitaingina azy tsirairay avy. '
  '8':
  - type: text
    content: Ary ny TOMPO dia nanamafy fo ny Farao, mpanjakan’i Ejipta, mba hanenjika ny Israelita izay niala tany Ejipta tamin-kalalahana
  - type: note
    content: tamin-kalalahana na hoe teo ambany fiarovan’Andriamanitra.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Ny tafika ejiptianina niaraka amin’ny soavaliny rehetra sy ny kalesiny rehetra ary ny mpitaingina azy dia nanenjika ny Israelita, ka nahatratra azy teo akaikin’i Pi-Hahirôta, mifanatrika amin’i Bahala-Tsefôna, izay nitobiany teo akaikin’ny ranomasina.
