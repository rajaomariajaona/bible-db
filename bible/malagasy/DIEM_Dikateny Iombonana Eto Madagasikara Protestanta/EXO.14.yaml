document_id: EXO.14,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanenjika ny Israelita ny Farao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Niteny tamin’i Mosesy ny TOMPO manao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Natopin’ny Israelita ny masony ka indreny ny Ejiptianina tamy manenjika azy, ary ny Farao dia efa mby akaiky. Raiki-tahotra loatra ny Israelita ka niantsoantso ny TOMPO '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'sady niteny tamin’i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Moa tsy nisy fasana ve tany Ejipta no nentinao ho faty atỳ an-taniefitra izahay? Izao ve no namoahanao anay hiala tany Ejipta? '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Moa tsy izao zavatra izao ve no efa nilazanay taminao tany Ejipta hoe: «Avelao hilamina izahay hanompo ny Ejiptianina. Fa aleonay manompo ny Ejiptianina toy izay ho faty any an-taniefitra».'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa namaly azy i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza matahotra ianareo! Mahandrasa, fa ho hitanareo anio ny famonjena hataon’ny TOMPO aminareo! Satria ny Ejiptianina izay hitanareo androany dia tsy ho hitanareo intsony na oviana na oviana. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny TOMPO no hiady ho anareo, fa ianareo kosa hangina fotsiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manokatra lalana ao afovoan’ny ranomasina Andriamanitra
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana no miantso vonjy amiko ianao? Ilazao ny Israelita mba handroso. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ingao ny tehinao, ka ahinjiro eo ambony ranomasina ny tananao. Ary saraho ny rano, dia hamaky eo afovoan’ny rano eo amin’ny tany maina ny Israelita. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa Izaho hanamafy fo ny Ejiptianina ka hitsofoka hanenjika anareo izy. Dia hasehoko ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahitro
    - type: text
      text: ' amin’ny hanapotehako ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' sy ny andian-tafiny rehetra, ny kalesiny sy ny mpitaingina azy. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ho fantatry ny Ejiptianina amin’izay fa Izaho no TOMPO rehefa asehoko azy araka izany ny voninahitro. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeli
    - type: text
      text: n’Andriamanitra izay nialoha ny Israelita hatrizay dia nandeha nifindra teo aorian’ny toby. Toy izany koa, ny andry rahona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'andry rahona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 13.21 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' izay teo alohan’izy ireo dia lasa any aoriany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: –Ilazao ny Israelita mba hiverina hitoby ao akaikin’i Pi-Hahirôta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Pi-Hahirôta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Migdôla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bahala-Tsefôna:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tsy misy amin’ireo toerana ireo no fantatra mazava na iray aza; '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Pi-Hahirôta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mety hidika hoe «Vinanin-dakan-drano», '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Migdôla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia «tobim-piarovana kely» na «tilikambom-pitiliana», ary '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bahala-Tsefôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' kosa dia «Bahala-Avaratra».'
      marker-yv: yv-n
    - type: text
      text: ' eo anelanelan’i Migdôla sy ny ranomasina. Ao no hanorenanareo toby, mifanatrika amin’i Bahala-Tsefôna, eo akaikin’ny ranomasina. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Nifindra teo anelanelan’ny tobin’ny Ejiptianina sy ny tobin’ny Israelita teo anelanelan’ny tobin’ny Ejiptianina sy ny tobin’ny Israelita ny andry rahona. Io andry rahona io dia maizina tany andaniny fa nanazava ny alina kosa taty ankilany. Koa tsy afaka nifanatona izy roa tonta nandritra ny alina.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nahinjitr’i Mosesy teo ambony ranomasina ny tanany. Ary ny TOMPO nampitsoka rivo-mahery avy any atsinanana nandritra ny alina manontolo ka nanosika ny ranomasina hanamaina azy. Nisaraka ny ranomasina, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ary nita teo am-povoany nandia tany maina ny Israelita, fa nisavovona toa tamboho teo ankavanany sy ankaviany ny rano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1Kôr 10.1-2; Heb 11.29.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nanenjika azy ny Ejiptianina; ny soavalin’ny farao rehetra mbamin’ny kalesiny sy ny mpitaingina azy dia samy nitsofoka nanaraka azy ireo tao afovoan’ny ranomasina avokoa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary nony efa nadiva haraina dia nijery ny tobin’ny Ejiptianina avy teo amin’ny andry afo sy rahona ny TOMPO, ka nanakorontana azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nohidiany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nohidiany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny Samaritanina sy ny Septoazinta ary ny Siriaka; ny RM manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: notsoahiny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ny kodiaran’ny kalesy ka nihisatra ny fitarihana azy. Dia hoy ny Ejiptianina hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andao handositra ny Israelita isika, fa ny TOMPO no miady ho azy ireo amintsika!
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahinjiro eo ambony ranomasina ny tananao mba hiverenan’ny rano eo amin’ny Ejiptianina sy ny kalesiny ary ny mpitaingin-tsoavaliny.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia nahinjitr’i Mosesy teo ambony ranomasina ny tanany. Niverina ho amin’ny toerany ny ranomasina rehefa ho maraina ny andro ka nifanehatra taminy ireo Ejiptianina nandositra, dia narian’ny TOMPO tao afovoan’ny ranomasina ny Ejiptianina.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nikatona ny ranomasina ka nandrakotra ny kalesy sy ny mpitaingin-tsoavaly; izay tafiky ny Farao manontolo nanenjika ny Israelita tao an-dranomasina dia tsy nisy afa-nitsoaka na iray aza. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa ny Israelita kosa dia niampita ny ranomasina nandia tany maina, fa ny rano dia nisavovona toa tamboho teo ankavanany sy ankaviany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hiteny ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' hoe: «voan’ny tamberintany ny Israelita, ka voahidin’ny taniefitra.» '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Namonjy ny Israelita teo an-tanan’ny Ejiptianina ny TOMPO tamin’izany andro izany, ka ny Israelita dia nahita ny fatin’ny Ejiptianina teny amoron-dranomasina. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Hitan’ny Israelita ny hery lehibe izay nampiasain’ny TOMPO hamelezana ny Ejiptianina. Izany no nanajan’ny Israelita ny TOMPO, ka nitokiany AZY sy nitokiany an’i Mosesy mpanompony.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hanamafy fo ny Farao Aho, dia hanenjika anareo izy. Kanefa hasehoko ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahitro
    - type: text
      text: ' amin’ny hanapotehako ny Farao sy ny tafiny manontolo, ka ho fantatry ny Ejiptianina fa Izaho no TOMPO.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notanterahin’ny Israelita izany araka ny torolalana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Rehefa nambara tamin’ny mpanjakan’i Ejipta sy ny tandapany fa efa mandositra ny Israelita, dia niova hevitra ny momba azy ireo ny Farao sy ny mpanompony ka niteny hoe: «Inona ity nataontsika? Nahoana no nalefantsika hiala tamin’ny fanompoana antsika ny Israelita?» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nasain’ny Farao noziogaina tamin’ny kalesy ny soavaliny, ary nentiny nanaraka azy koa ny tafiny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nindaosiny avokoa ny kalesin’i Ejipta, ka isan’izany ny kalesy voafantina eninjato miaraka amin’ny mpitaingina azy tsirairay avy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary ny TOMPO dia nanamafy fo ny Farao, mpanjakan’i Ejipta, mba hanenjika ny Israelita izay niala tany Ejipta tamin-kalalahana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tamin-kalalahana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: teo ambany fiarovan’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny tafika ejiptianina niaraka amin’ny soavaliny rehetra sy ny kalesiny rehetra ary ny mpitaingina azy dia nanenjika ny Israelita, ka nahatratra azy teo akaikin’i Pi-Hahirôta, mifanatrika amin’i Bahala-Tsefôna, izay nitobiany teo akaikin’ny ranomasina.
