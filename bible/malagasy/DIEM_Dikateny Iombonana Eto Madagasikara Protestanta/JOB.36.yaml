document_id: JOB.36,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manazava ny fomba fanabeazan’Andriamanitra ny olona i Elihò
  - type: text
    content: 'Nanohy indray ny teniny i Elihò ka nanao hoe:'
  '10':
  - type: text
    content: Dia manokatra sofina azy Andriamanitra
  - type: text
    content: mba hihaino ny fananarany
  - type: text
    content: ka mandidy azy hiala amin’ny ratsy.
  '11':
  - type: text
    content: Raha mety mihaino an’Andriamanitra izy,
  - type: text
    content: dia amin’ny fahasambarana sy ny hamamiana
  - type: text
    content: no handaniany ny androny sy ny taonany.
  '12':
  - type: text
    content: Fa raha tsy mety mihaino kosa izy,
  - type: text
    content: dia ho faty hiharan-tsabatra
  - type: text
    content: noho izy tsy manam-pahalalana akory
  - type: note
    content: Jereo 33.18 sy nta.
  - type: text
    content: .
  '13':
  - type: text
    content: Fa ny ratsy fanahy dia tezitra aminy
  - type: text
    content: ka tsy mahataraina na dia gadrainy aza.
  '14':
  - type: text
    content: Koa dia maty tanora sy ratsy fiafara ireo
  - type: text
    content: toy ny olona iharan’ny fahafaham-baràka
  - type: note
    content: 'Olona manolo-tena ho amin’ny fijangajangana: ny teny hebreo ampiasaina dia milaza mandrakariva ireo olona manao fijangajangana masina (jereo 1 Mp 14.24; 22.47 sns; ampit nta amin’ny Hos 1.2).'
  - type: text
    content: .
  - type: heading
    content: '*'
  '15':
  - type: text
    content: Fa ny fahorian’ny ory kosa
  - type: text
    content: no entin’Andriamanitra mamonjy azy,
  - type: text
    content: ary ny loza mianjady aminy no entiny mampianatra azy.
  '16':
  - type: text
    content: Fahiny dia nalany tamin’ny fahaterena ianao
  - type: text
    content: ka napetrany tamin’ny toera-malalaka,
  - type: text
    content: ary dia ny hanim-py no naroso
  - type: text
    content: teo ambonin’ny latabatrao.
  '17':
  - type: text
    content: Fa voaheloka toa olon-dratsy ianao izao,
  - type: text
    content: ary didim-pitsarana tsy azo ivalozana izany.
  '18':
  - type: text
    content: Aoka tsy hampisendaotra anao ny famaizana,
  - type: text
    content: ary tsy hampivily anao ny fanaovan-kolikoly.
  '19':
  - type: text
    content: Hahafa-pahoriana anao ve ny fitarainana
  - type: text
    content: sy ny fiezahana mafy rehetra ataonao?
  '2':
  - type: text
    content: Mahareta kely amiko, ry Jôba, fa hampianariko ianao;
  - type: text
    content: satria mbola misy teny hiandaniako an’Andriamanitra.
  '20':
  - type: text
    content: Aza manantena koa ny alina
  - type: text
    content: hanaisotra ny olona amin’ny toerany.
  '21':
  - type: text
    content: Koa mitandrema sao mivily ho amin’ny ratsy
  - type: text
    content: fa hisedrana anao izao fampahoriana izao.
  - type: heading
    content: Ny fiandrianan’Andriamanitra
  '22':
  - type: text
    content: Jereo fa mahery ny fiandrianan’Andriamanitra;
  - type: text
    content: Iza no mahay mampianatra tahaka Azy?
  '23':
  - type: text
    content: Iza no mahabaiko an’Andriamanitra
  - type: text
    content: amin’izay tiany hatao?
  - type: text
    content: 'Ary zovy no sahy hiteny aminy hoe:'
  - type: text
    content: «Tsy mety ny nataonao»?
  '24':
  - type: text
    content: Tsarovy ny mankalaza ny asany
  - type: text
    content: izay efa noderain’ny olona an-kira.
  '25':
  - type: text
    content: Fa banjinin’ny olona rehetra izany,
  - type: text
    content: ary na avy lavitra aza dia tazany.
  - type: heading
    content: '*'
  '26':
  - type: text
    content: Eny, lehibe Andriamanitra
  - type: text
    content: ka tsy takatry ny saintsika;
  - type: text
    content: tsy tambo isaina velively
  - type: text
    content: ny taona naha Andriamanitra Azy.
  '27':
  - type: text
    content: Sintoniny tsikelikely ny rano,
  - type: text
    content: dia lasa etona ka tonga orana.
  '28':
  - type: text
    content: Ary avelan’ny rahona hilatsaka izany
  - type: text
    content: ka mifafy amin’ny besinimaro.
  '29':
  - type: text
    content: Iza koa no mahafantatra
  - type: text
    content: ny amin’ny fivelatry ny rahona
  - type: text
    content: sy ny fipoakan’ny kotroka eo amin’ny andohalambo
  - type: note
    content: andohalambo izany hoe an’Andriamanitra.
  - type: text
    content: izay fonenan’Andriamanitra?
  '3':
  - type: text
    content: Ny fahalalako avy amin’ny sehatra midadasika no entiko
  - type: text
    content: hanomezan-drariny an’Andriamanitra Mpanao ahy.
  '30':
  - type: text
    content: Indro Izy fa manapariaka ny tselatra
  - type: text
    content: eny ambonin’ny rahona eny
  - type: text
    content: ary mandrakotra ny fanambanin-dranomasina.
  '31':
  - type: text
    content: Amin’ireny no anafaizany ny vahoaka
  - type: text
    content: na anomezany azy hanina betsaka.
  '32':
  - type: text
    content: Manafina ny tselatra eny an-tanany Izy
  - type: text
    content: ka mibaiko azy hahavoa izay kendreny.
  '33':
  - type: text
    content: Manambara ny fiavian’ny orana ny kotroka;
  - type: text
    content: ka na ny biby fiompy koa dia mahatsapa izany.
  '4':
  - type: text
    content: Fa tsy misy lainga tsy akory izay lazaiko;
  - type: text
    content: satria lehilahy azo antoka amin’ny fahalalana
  - type: text
    content: izaho izay eto aminao izao.
  '5':
  - type: text
    content: Jereo fa mahery Andriamanitra
  - type: text
    content: kanefa tsy mba manambany olona;
  - type: text
    content: eny, mahery tokoa Izy
  - type: text
    content: ka hentitra amin’ny fanapahan-keviny.
  '6':
  - type: text
    content: Tsy mamela ny olon-dratsy ho ela velona Izy
  - type: text
    content: fa manome rariny kosa ny mahantra.
  '7':
  - type: text
    content: Miahy ny olo-marina mandrakariva Izy
  - type: text
    content: ka manandratra voninahitra azy
  - type: text
    content: sy mampaharitra azy eo amin’ny fitondrana
  - type: text
    content: toy ny mpanjaka eo amin’ny sezafiandrianany.
  - type: heading
    content: '*'
  '8':
  - type: text
    content: Fa raha olo-marina no voagadra rojo vy
  - type: text
    content: sady voagejam-pahoriana,
  '9':
  - type: text
    content: 'dia ny asany no ambaran’Andriamanitra azy:'
  - type: text
    content: manota ireo, satria niavonavona.
