document_id: JOB.36,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manazava ny fomba fanabeazan’Andriamanitra ny olona i Elihò
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nanohy indray ny teniny i Elihò ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia manokatra sofina azy Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hihaino ny fananarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandidy azy hiala amin’ny ratsy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Raha mety mihaino an’Andriamanitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’ny fahasambarana sy ny hamamiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no handaniany ny androny sy ny taonany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa raha tsy mety mihaino kosa izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho faty hiharan-tsabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho izy tsy manam-pahalalana akory
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 33.18 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa ny ratsy fanahy dia tezitra aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahataraina na dia gadrainy aza.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Koa dia maty tanora sy ratsy fiafara ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny olona iharan’ny fahafaham-baràka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.14 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Olona manolo-tena ho amin’ny fijangajangana:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny teny hebreo ampiasaina dia milaza mandrakariva ireo olona manao fijangajangana masina (jereo 1 Mp 14.24; 22.47 sns; ampit nta amin’ny Hos 1.2).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa ny fahorian’ny ory kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no entin’Andriamanitra mamonjy azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny loza mianjady aminy no entiny mampianatra azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fahiny dia nalany tamin’ny fahaterena ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka napetrany tamin’ny toera-malalaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dia ny hanim-py no naroso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo ambonin’ny latabatrao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa voaheloka toa olon-dratsy ianao izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary didim-pitsarana tsy azo ivalozana izany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Aoka tsy hampisendaotra anao ny famaizana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hampivily anao ny fanaovan-kolikoly.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hahafa-pahoriana anao ve ny fitarainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fiezahana mafy rehetra ataonao?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mahareta kely amiko, ry Jôba, fa hampianariko ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mbola misy teny hiandaniako an’Andriamanitra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Aza manantena koa ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanaisotra ny olona amin’ny toerany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Koa mitandrema sao mivily ho amin’ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hisedrana anao izao fampahoriana izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiandrianan’Andriamanitra
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Jereo fa mahery ny fiandrianan’Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no mahay mampianatra tahaka Azy?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Iza no mahabaiko an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay tiany hatao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary zovy no sahy hiteny aminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy mety ny nataonao»?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tsarovy ny mankalaza ny asany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa noderain’ny olona an-kira.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa banjinin’ny olona rehetra izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na avy lavitra aza dia tazany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Eny, lehibe Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy takatry ny saintsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy tambo isaina velively
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny taona naha Andriamanitra Azy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Sintoniny tsikelikely ny rano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lasa etona ka tonga orana.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary avelan’ny rahona hilatsaka izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mifafy amin’ny besinimaro.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Iza koa no mahafantatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny amin’ny fivelatry ny rahona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fipoakan’ny kotroka eo amin’ny andohalambo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'andohalambo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany hoe an’Andriamanitra.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay fonenan’Andriamanitra?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny fahalalako avy amin’ny sehatra midadasika no entiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanomezan-drariny an’Andriamanitra Mpanao ahy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Indro Izy fa manapariaka ny tselatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny ambonin’ny rahona eny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandrakotra ny fanambanin-dranomasina.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Amin’ireny no anafaizany ny vahoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na anomezany azy hanina betsaka.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Manafina ny tselatra eny an-tanany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mibaiko azy hahavoa izay kendreny.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Manambara ny fiavian’ny orana ny kotroka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka na ny biby fiompy koa dia mahatsapa izany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa tsy misy lainga tsy akory izay lazaiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria lehilahy azo antoka amin’ny fahalalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izaho izay eto aminao izao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Jereo fa mahery Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy mba manambany olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mahery tokoa Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hentitra amin’ny fanapahan-keviny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsy mamela ny olon-dratsy ho ela velona Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manome rariny kosa ny mahantra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Miahy ny olo-marina mandrakariva Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manandratra voninahitra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mampaharitra azy eo amin’ny fitondrana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny mpanjaka eo amin’ny sezafiandrianany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa raha olo-marina no voagadra rojo vy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voagejam-pahoriana,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'dia ny asany no ambaran’Andriamanitra azy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manota ireo, satria niavonavona.
