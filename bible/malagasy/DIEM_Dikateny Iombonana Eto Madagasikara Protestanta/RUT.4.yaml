document_id: RUT.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Karakarain’i Bôhaza ny lovan’i Elimelèka
  - type: text
    content: 'Dia niakatra ho eo am-bavahadin’ny tanàna toerana fandaminan-draharaha i Bôhaza, ka nipetraka teo. Ary indro nandalo ilay havana mahavotra voalazan’i Bôhaza, ka nantsoiny hoe:'
  - type: text
    content: –Avia kely ianao, ranona, mipetraha eto.
  - type: text
    content: 'Dia nanatona izy, ary nipetraka. '
  '10':
  - type: text
    content: miaraka amin’izany koa i Rota, vehivavy môabita, dia efa noraisiko ho vadiko mba hamelo-maso ny anaran’ny maty ao amin’ny lovany, ka tsy ho tapaka ny anaran’ny maty eo amin’ny mpiara-monina sy eo am-bavahadin’ny tanàna toerana fandaminan-draharaha.
  '11':
  - type: text
    content: 'Dia hoy ireo vahoaka rehetra izay teo am-bavahady sy loholona hoe:'
  - type: text
    content: '–Eny, vavolombelona manatri-maso izahay. '
  - type: text
    content: Hotahin
  - type: text
    content: ’ny TOMPO anie ity vehivavy izay hankao an-tranonao, ka ho tahaka an-dRahely sy i Lea fa izy roa vavy no niavian’ny vahoaka Israely; hataony manan-karena eo amin’ny Efratîta
  - type: note
    content: 'Efratîta: jereo 1.2 sy nta.'
  - type: text
    content: ' anie ianao, ary halaza eran’i Betlehema anie ny anaranao! '
  '12':
  - type: text
    content: Enga anie ny tokantranonao ho tahaka ny an’i Peretsa
  - type: note
    content: 'Peretsa: dia razamben’i Bôhaza, jereo 4.18-21; 1 Tan 2.5, 9-12.'
  - type: text
    content: ', izay naterak’i Tamara reniny tamin’i Joda, ka ho betsaka ny taranaka izay homen’ny TOMPO anao amin’ity vehivavy tanora ity!'
  - type: heading
    content: Ny nampakaran’i Bôhaza an’i Rota ho vadiny
  '13':
  - type: text
    content: 'Dia nampakarin’i Bôhaza ho vadiny i Rota. Niray tamin’i Rota izy; ary nambinin’ny TOMPO ravehivavy ka bevohòka, dia niteraka zazalahy. '
  '14':
  - type: text
    content: 'Dia hoy ireo vehivavy tao Betlehema tamin’i Nahômỳ:'
  - type: text
    content: '–Hisaorana anie ny TOMPO fa tsy navelany tsy hanan-kavana mahavotra ianao ankehitriny! Halaza eo amin’i Israely anie ny anaran’ny zafinao! '
  '15':
  - type: text
    content: Io zafinao io dia hampitombina ny fanahinao sy ho mpanolokolo anao amin’ny fahanteranao, satria ilay vinantovavy fatra-pitia anao sady tsara lavitra ho anao noho ny zanakalahy fito no efa niteraka azy.
  '16':
  - type: text
    content: Dia nandray ny zaza i Nahômỳ ka namihina azy teo an-tratrany
  - type: note
    content: 'Ka namihina azy teo an-tratrany: mety ho fihetsika manambara fananganana, ampit Gen 30.3-8; 48.5-12; 50-23.'
  - type: text
    content: ', ary lasa mpitaiza azy. '
  '17':
  - type: text
    content: 'Ny vehivavy mpiara-monina kosa no nanome ny anarany, fa hoy ireo hoe: «Zazalahy no naterak’i Rota ho an’i Nahômỳ!»; koa ny anarany dia nantsoin’ireo hoe Hôbeda: Izy no rain’i Jisay izay rain’i Davida.'
  - type: heading
    content: Ny tetiaran’i Davida miainga avy eo amin’i Peretsa
  '18':
  - type: text
    content: 'Izao no taranak’i Peretsa: i Peretsa no ray niteraka an’i Hetsirôna, '
  '19':
  - type: text
    content: 'i Hetsirôna, ray niteraka an’i Rama; i Rama, ray niteraka an’i Haminadaba; '
  '2':
  - type: text
    content: 'Dia naka folo lahy tamin’ny '
  - type: text
    content: loholona
  - type: text
    content: ' tao an-tanàna i Bôhaza, ka nanao hoe:'
  - type: text
    content: –Mipetraha eto ianareo.
  - type: text
    content: 'Ary rehefa nipetraka ireo, '
  '20':
  - type: text
    content: 'i Haminadaba, ray niteraka an’i Nahasôna; Nahasôna, ray niteraka an’i Salmôna; '
  '21':
  - type: text
    content: 'i Salmôna, ray niteraka an’i Bôhaza; i Bôhaza, ray niteraka an’i Hôbeda; '
  '22':
  - type: text
    content: i Hôbeda, ray niteraka an’i Jisay; ary i Jisay no ray niteraka an’i Davida.
  '3':
  - type: text
    content: 'dia hoy i Bôhaza tamin’ilay havana mahavotra:'
  - type: text
    content: '–Vidio ny saha izay an’i Elimelèka izay havantsika fa amidin’i Nahômỳ izao izy tafaverina avy tany amin’ny faritr’i Môaba izao. '
  '4':
  - type: text
    content: Tapa-kevitra aho manko fa hampandre anao mba hampividy anao azy eo anatrehan’ireo olona manatrika eto sy ireo loholona. Koa raha hanavotra ianao, dia avoty; fa raha tsy hanavotra ianao, dia ambarao ahy ho fantatro, satria tsy misy afa-tsy ianao no tokony hanavotra ary izaho no manarakaraka anao.
  - type: text
    content: 'Ary hoy ny navaliny hoe:'
  - type: text
    content: –Izaho no hanavotra!
  '5':
  - type: text
    content: 'Dia hoy kosa i Bôhaza:'
  - type: text
    content: –Amin’ny andro ividiananao ny saha eo an-tanan’i Nahômỳ, dia halainao ho vady koa i Rota vehivavy môabita mba hamelo-maso ny anaran’ny maty eo amin’ny lovany
  - type: note
    content: 'halainao ho vady koa i Rota: Araka ireo dkt tranainy; amin’ny hebreo: hovidinao amin’i Rota koa. Ho an’ny and rehetra, jereo 2.20 sy nta.'
  - type: text
    content: .
  '6':
  - type: text
    content: 'Fa novalian’ilay havana mahavotra hoe:'
  - type: text
    content: –Tsy afaka hanavotra ho an’ny tenako aho raha izany, sao manimba ny anjara lovako. Avoty ho anao izay tokony havotako fa tsy afaka hanavotra aho.
  '7':
  - type: text
    content: Fa taloha, tany Israely, raha misy manavotra lova na mifanakalo fananana, dia esorin’ny olona ny kapany
  - type: note
    content: Ny fanesorana ny kapa dia manambara fa tsy manana alalana amin’ilay fananana intsony.
  - type: text
    content: ' ka omeny ny namany, mba hanamafy ny faharaiketan’ny raharaha. Tany Israely dia izany no antoka fa raikitra ny raharaha. '
  '8':
  - type: text
    content: Ka ilay havana mahavotra, raha niteny tamin’i Bôhaza hoe «Vidio ho anao izany», dia nanaisotra ny kapany sy nanome azy an’i Bôhaza
  - type: note
    content: 'sy nanome azy an’i Bôhaza: tsy hita ao amin’ny rijan-teny hebreo.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Tamin’izany dia hoy i Bôhaza tamin’ny loholona sy ny vahoaka rehetra:'
  - type: text
    content: '–Ianareo no vavolombelona manatri-maso androany fa efa novidiko teo an-tanan’i Nahômỳ izay rehetra an’i Elimelèka sy izay rehetra an’i Kiliôna sy i Mahalôna; '
