document_id: RUT.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Karakarain’i Bôhaza ny lovan’i Elimelèka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra ho eo am-bavahadin’ny tanàna toerana fandaminan-draharaha i Bôhaza, ka nipetraka teo. Ary indro nandalo ilay havana mahavotra voalazan’i Bôhaza, ka nantsoiny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avia kely ianao, ranona, mipetraha eto.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona izy, ary nipetraka. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: miaraka amin’izany koa i Rota, vehivavy môabita, dia efa noraisiko ho vadiko mba hamelo-maso ny anaran’ny maty ao amin’ny lovany, ka tsy ho tapaka ny anaran’ny maty eo amin’ny mpiara-monina sy eo am-bavahadin’ny tanàna toerana fandaminan-draharaha.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo vahoaka rehetra izay teo am-bavahady sy loholona hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Eny, vavolombelona manatri-maso izahay. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hotahin
    - type: text
      text: ’ny TOMPO anie ity vehivavy izay hankao an-tranonao, ka ho tahaka an-dRahely sy i Lea fa izy roa vavy no niavian’ny vahoaka Israely; hataony manan-karena eo amin’ny Efratîta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Efratîta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' anie ianao, ary halaza eran’i Betlehema anie ny anaranao! '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Enga anie ny tokantranonao ho tahaka ny an’i Peretsa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Peretsa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia razamben’i Bôhaza, jereo 4.18-21; 1 Tan 2.5, 9-12.
      marker-yv: yv-n
    - type: text
      text: ', izay naterak’i Tamara reniny tamin’i Joda, ka ho betsaka ny taranaka izay homen’ny TOMPO anao amin’ity vehivavy tanora ity!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampakaran’i Bôhaza an’i Rota ho vadiny
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampakarin’i Bôhaza ho vadiny i Rota. Niray tamin’i Rota izy; ary nambinin’ny TOMPO ravehivavy ka bevohòka, dia niteraka zazalahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo vehivavy tao Betlehema tamin’i Nahômỳ:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hisaorana anie ny TOMPO fa tsy navelany tsy hanan-kavana mahavotra ianao ankehitriny! Halaza eo amin’i Israely anie ny anaran’ny zafinao! '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Io zafinao io dia hampitombina ny fanahinao sy ho mpanolokolo anao amin’ny fahanteranao, satria ilay vinantovavy fatra-pitia anao sady tsara lavitra ho anao noho ny zanakalahy fito no efa niteraka azy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandray ny zaza i Nahômỳ ka namihina azy teo an-tratrany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ka namihina azy teo an-tratrany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mety ho fihetsika manambara fananganana, ampit Gen 30.3-8; 48.5-12; 50-23.
      marker-yv: yv-n
    - type: text
      text: ', ary lasa mpitaiza azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vehivavy mpiara-monina kosa no nanome ny anarany, fa hoy ireo hoe: «Zazalahy no naterak’i Rota ho an’i Nahômỳ!»; koa ny anarany dia nantsoin’ireo hoe Hôbeda: Izy no rain’i Jisay izay rain’i Davida.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tetiaran’i Davida miainga avy eo amin’i Peretsa
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no taranak’i Peretsa: i Peretsa no ray niteraka an’i Hetsirôna, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Hetsirôna, ray niteraka an’i Rama; i Rama, ray niteraka an’i Haminadaba; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naka folo lahy tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' tao an-tanàna i Bôhaza, ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mipetraha eto ianareo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nipetraka ireo, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Haminadaba, ray niteraka an’i Nahasôna; Nahasôna, ray niteraka an’i Salmôna; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Salmôna, ray niteraka an’i Bôhaza; i Bôhaza, ray niteraka an’i Hôbeda; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Hôbeda, ray niteraka an’i Jisay; ary i Jisay no ray niteraka an’i Davida.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hoy i Bôhaza tamin’ilay havana mahavotra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Vidio ny saha izay an’i Elimelèka izay havantsika fa amidin’i Nahômỳ izao izy tafaverina avy tany amin’ny faritr’i Môaba izao. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tapa-kevitra aho manko fa hampandre anao mba hampividy anao azy eo anatrehan’ireo olona manatrika eto sy ireo loholona. Koa raha hanavotra ianao, dia avoty; fa raha tsy hanavotra ianao, dia ambarao ahy ho fantatro, satria tsy misy afa-tsy ianao no tokony hanavotra ary izaho no manarakaraka anao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny navaliny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho no hanavotra!
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy kosa i Bôhaza:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Amin’ny andro ividiananao ny saha eo an-tanan’i Nahômỳ, dia halainao ho vady koa i Rota vehivavy môabita mba hamelo-maso ny anaran’ny maty eo amin’ny lovany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'halainao ho vady koa i Rota: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Araka ireo dkt tranainy; amin’ny hebreo: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hovidinao amin’i Rota koa.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Ho an’ny and rehetra, jereo 2.20 sy nta.'
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novalian’ilay havana mahavotra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy afaka hanavotra ho an’ny tenako aho raha izany, sao manimba ny anjara lovako. Avoty ho anao izay tokony havotako fa tsy afaka hanavotra aho.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa taloha, tany Israely, raha misy manavotra lova na mifanakalo fananana, dia esorin’ny olona ny kapany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fanesorana ny kapa dia manambara fa tsy manana alalana amin’ilay fananana intsony.
      marker-yv: yv-n
    - type: text
      text: ' ka omeny ny namany, mba hanamafy ny faharaiketan’ny raharaha. Tany Israely dia izany no antoka fa raikitra ny raharaha. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka ilay havana mahavotra, raha niteny tamin’i Bôhaza hoe «Vidio ho anao izany», dia nanaisotra ny kapany sy nanome azy an’i Bôhaza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'sy nanome azy an’i Bôhaza: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy hita ao amin’ny rijan-teny hebreo.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany dia hoy i Bôhaza tamin’ny loholona sy ny vahoaka rehetra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianareo no vavolombelona manatri-maso androany fa efa novidiko teo an-tanan’i Nahômỳ izay rehetra an’i Elimelèka sy izay rehetra an’i Kiliôna sy i Mahalôna; '
