document_id: 1SA.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra mandà an’i Saoly
  - type: text
    content: 'Hoy i Samoela tamin’i Saoly indray andro:'
  - type: text
    content: –Izaho no nirahin’ny TOMPO hanokana anao ho mpanjakan’ilay Israely vahoakany
  - type: note
    content: Jereo 10.1.
  - type: text
    content: '; koa ankehitriny henoy ny tenin’ny TOMPO. '
  '10':
  - type: text
    content: 'Ary izao no tenin’ny TOMPO tamin’i Samoela:'
  '11':
  - type: text
    content: –Tena nanenenako ny nanaovako an’i Saoly ho mpanjaka, satria nivadika tamiko izy ka tsy nanaraka ny teniko.
  - type: text
    content: Tezitra sady nalahelo i Samoela, ka nitaraina mafy tamin’ny TOMPO ny alina tontolo.
  '12':
  - type: text
    content: Ny ampitso vao maraina, dia lasa nitady an’i Saoly i Samoela. Nisy nampandre an’i Samoela fa tonga tao Karmela i Saoly, dia nanangana tsangambato ho an’ny tenany ary lasa indray nidina hatrany Gilgala
  - type: note
    content: 'Karmela: tanàna tokony ho 40 km ao atsimon’i Jerosalema. –Gilgala: jereo 7.16 sy nta.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Rehefa tonga teo amin’i Saoly i Samoela, dia nilazany hoe:'
  - type: text
    content: –
  - type: text
    content: Hitahy
  - type: text
    content: ' anao anie ny TOMPO! Efa narahiko ny tenin’ny Tompo.'
  '14':
  - type: text
    content: 'I Samoela kosa nanontany azy hoe:'
  - type: text
    content: –Fa inona àry izany ondry mibarareoka sy omby mimamà reko izany?
  '15':
  - type: text
    content: 'Ka hoy ny navalin’i Saoly:'
  - type: text
    content: '–Nentin’ny miaramila avy tany amin’ny Hamalekita izany; satria ny biby tsara tsy mba nokasihiny fa hatao '
  - type: text
    content: sorona
  - type: text
    content: ' ho an’ny TOMPO Andriamanitrao. Ny sisa rehetra kosa dia naringany avokoa.'
  '16':
  - type: text
    content: 'Fa hoy i Samoela tamin’i Saoly:'
  - type: text
    content: –Aoka izay, fa hambarako anao izay nolazain’ny TOMPO tamiko halina.
  - type: text
    content: 'Ary hoy izy taminy:'
  - type: text
    content: –Ambarao àry!
  '17':
  - type: text
    content: 'Dia hoy i Samoela hoe:'
  - type: text
    content: '–Na dia nihevitra ny tenanao ho tsy nanao ahoana aza ianao taloha, dia efa tonga filohan’ny fokon’i Israely, fa ny TOMPO efa nanosotra anao ho mpanjakan’i Israely. '
  '18':
  - type: text
    content: 'Ary IZY efa nanoro lalana anao handeha hamongotra tanteraka ireo Hamalekita mpanota ireo ary hiady aminy mandra-paharingany. '
  '19':
  - type: text
    content: Koa nahoana no tsy nohenoinao ny tenin’ny TOMPO, fa avy hatrany ianao dia niantoraka tamin’ny remby, ary nanao izay nampalahelo ny TOMPO?
  '2':
  - type: text
    content: 'Izao àry no lazain’ny TOMPOn’izao rehetra izao: «Tsaroako ny nanaovan’ny Hamalekita ny vahoaka israelita fony izy ireo nakarina niala tany Ejipta, dia ny nanakanany ny lalany izany'
  - type: note
    content: Jereo Eks 17.8-16; Deot 25.17-19.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Fa hoy i Saoly tamin’i Samoela:'
  - type: text
    content: '–Efa nanaiky ny tenin’ny TOMPO aho, ary efa nanaraka izay natorony ahy. Efa novonoin-ko faty avokoa ny Hamalekita, afa-tsy i Agaga mpanjakany ihany izay nentiko eto; '
  '21':
  - type: text
    content: fa ny miaramila kosa, raha nanavaka ireo biby izay tsara indrindra tokony ho naringana, dia ny hanolorana azy ho sorona ho an’ny TOMPO Andriamanitrao eto Gilgàla.
  '22':
  - type: text
    content: 'Dia hoy indray i Samoela hoe:'
  - type: text
    content: '–Moa sitraky ny TOMPO mihoatra noho ny fankatoavana AZY ve ny sorona dorana manontolo sy sorona hafa? Tsia! Fa tsara noho ny sorona rehetra ny fankatoavana AZY ary tsara noho ny jaboran’ondrilahy ny fanekena Azy. '
  '23':
  - type: text
    content: Fa ratsy toy ny sikidy ny fikomiana aminy, ary ratsy toy ny fanompoan-tsampy ny tsy fanekena Azy. Koa satria nandà ny tenin’ny TOMPO ianao, dia mba laviny kosa tsy ho mpanjaka intsony.
  '24':
  - type: text
    content: 'Ka hoy ny navalin’i Saoly azy:'
  - type: text
    content: '–Efa nanota tokoa aho, satria nandika ny didin’ny TOMPO sy ny teninao. Natahotra ny miaramila manko aho, ka nanaraka ny teniny. '
  '25':
  - type: text
    content: Ankehitriny, miangavy anao re aho, mamelà ny heloko ka miverena miaraka amiko mba hahazoako miankohoka eo anatrehan’ny TOMPO.
  '26':
  - type: text
    content: 'Hoy kosa i Samoela taminy:'
  - type: text
    content: –Tsia, tsy hiverina hiaraka aminao aho, satria efa nandà ny tenin’ny TOMPO ianao, ka dia laviny koa tsy ho mpanjakan’i Israely intsony.
  '27':
  - type: text
    content: 'Ary raha nihodina handeha iny i Samoela, dia nohazonin’i Saoly tamin’ny rebareban’akanjony, izay rovitra niendaka terỳ. '
  '28':
  - type: text
    content: 'Dia hoy i Samoela taminy:'
  - type: text
    content: –Tahaka izany koa androany no hanendahan’ny TOMPO aminao ny fanjakan’i Israely mba homeny ho an’ny hafa
  - type: note
    content: Dia i Davida izany, ampit 13.14 sy nta.
  - type: text
    content: ' izay mendrika kokoa noho ianao. '
  '29':
  - type: text
    content: Fa ny TOMPO, Ilay Herin’i Israely, dia tsy mba mandainga na miova hevitra. Tsy olombelona Izy ka hiova hevitra.
  '3':
  - type: text
    content: Koa ankehitriny, mandehana tafiho ny Hamalekita, ary levony avokoa izay rehetra ananany fa aza asiana miangana sy indrafo. Vonoy ho faty avokoa na lehilahy na vehivavy, na ankizy na zaza minono, na omby na ondry, na rameva na boriky.»
  '30':
  - type: text
    content: 'Fa hoy ihany i Saoly hoe:'
  - type: text
    content: '–Efa diso aho, kanefa aoka re mba homenao voninahitra eo anatrehan’ny '
  - type: text
    content: loholon
  - type: text
    content: ’ilay Israely vahoakako ihany aho; miverena miaraka amiko mba hahazoako eo anatrehan’ny TOMPO Andriamanitrao.
  '31':
  - type: text
    content: 'Ary i Samoela nandidy mba hoentina eo aminy i Agaga mpanjakan’ny Hamalekita. '
  '32':
  - type: text
    content: 'Dia tonga teo aminy tamim-pahatokiana i Agaga, satria hoy izy anankampo hoe: «Marina fa tsy misy tokony hatahorako fahafatesana intsony.» '
  '33':
  - type: text
    content: 'Nefa hoy i Samoela taminy:'
  - type: text
    content: –Ny sabatrao no tsy nananan’ny vehivavy maro ny zanany.
  - type: text
    content: Dia notetehin’i Samoela tamin’ny sabatra teo anatrehan’ny TOMPO tao Gilgala i Agaga.
  '34':
  - type: text
    content: Niverina nankany Ramà i Samoela, fa i Saoly kosa nody tany an-tranony tao Gibehà
  - type: note
    content: 'Gibehà: jereo 10.5 sy nta.'
  - type: text
    content: '. '
  '35':
  - type: text
    content: Ary i Samoela tsy nahita an’i Saoly intsony mandra-pahafatiny; fa nitomany an’i Saoly i Samoela, satria ny TOMPO efa nanenina noho ny nifidianany azy ho mpanjakan’i Israely.
  '4':
  - type: text
    content: Nohetsehin’i Saoly ny tafiny, dia nalahany tao Telaîma
  - type: note
    content: 'Telaîma: tanàna toa tokony ho 80 km ao atsimon’i Jerosalema.'
  - type: text
    content: ', ka nahitany miaramila an-tongotra andiany roanjato, ary koa vatan-dehilahy andiany folo avy amin’i Joda. '
  '5':
  - type: text
    content: Dia nandroso hatrany amin’ny tanànan’ny Hamalekita
  - type: note
    content: Tsy fantatra ity hoe tanànan’i Hamalekita ity, indrindra fa olona mpifindrafindra monina ry zareo.
  - type: text
    content: ' i Saoly ary nanotrika ady am-pitaka tao an-dohasaha. '
  '6':
  - type: text
    content: Hoy izy tamin’ny Kenita
  - type: note
    content: Ny Kenita dia firenena mpifindrafindra monina iray faritany tamin’ny Hamalekita.
  - type: text
    content: ': «Mandehana ianareo ka ilaozy ny Hamalekita, fandrao haringako miaraka aminy koa ianareo; fa mba nanisy soa ny Israelita ihany manko ianareo, raha niala tany Ejipta izy.» Dia nisaraka tamin’ny Hamalekita ny Kenita. '
  '7':
  - type: text
    content: Ary i Saoly nandresy ny Hamalekita nanomboka teo Havilà ka hatrany Sòra
  - type: note
    content: 'Havilà: faritra akaikin’i Ejipta, ao atsimon’i Palestinina. –Sòra: araka ny Eks 15.22, ny «taniefitr’i Sora» no ilany avaratra amin’ny saikanosin’i Sinay, eo anelanelan’ny «riakan’i Ejipta» (jereo Nom 34.5 sy nta) sy ny lakandranon’i Suez ankehitriny.'
  - type: text
    content: ', atsinanan’i Ejipta. '
  '8':
  - type: text
    content: 'Nataony jinja fary tamin’ny sabatra ny vahoaka rehetra, afa-tsy i Agaga mpanjakany izay natao sambobelona. '
  '9':
  - type: text
    content: Fa i Saoly sy ny miaramila kosa nitsimbina ny ain’i Agaga mbamin’izay tsara indrindra amin’ny biby fiompy, toy ny omby aman’ondry, mifahy na tsia, izany hoe rehefa biby tsara rehetra misy vidiny. Fa izay tsy misy vidiny sy tsy ilaina kosa dia samy naringany avokoa
  - type: note
    content: 'naringany: voatokana ho an’ny Tompo avokoa ny biby rehetra ka dia tokony hovonoina, jereo Lev 20.28-29.'
  - type: text
    content: .
