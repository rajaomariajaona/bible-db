document_id: 1SA.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Andriamanitra mandà an’i Saoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hoy i Samoela tamin’i Saoly indray andro:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho no nirahin’ny TOMPO hanokana anao ho mpanjakan’ilay Israely vahoakany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 10.1.
      marker-yv: yv-n
    - type: text
      text: '; koa ankehitriny henoy ny tenin’ny TOMPO. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary izao no tenin’ny TOMPO tamin’i Samoela:'
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: –Tena nanenenako ny nanaovako an’i Saoly ho mpanjaka, satria nivadika tamiko izy ka tsy nanaraka ny teniko.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tezitra sady nalahelo i Samoela, ka nitaraina mafy tamin’ny TOMPO ny alina tontolo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny ampitso vao maraina, dia lasa nitady an’i Saoly i Samoela. Nisy nampandre an’i Samoela fa tonga tao Karmela i Saoly, dia nanangana tsangambato ho an’ny tenany ary lasa indray nidina hatrany Gilgala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Karmela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna tokony ho 40 km ao atsimon’i Jerosalema. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gilgala:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 7.16 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Rehefa tonga teo amin’i Saoly i Samoela, dia nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hitahy
    - type: text
      text: ' anao anie ny TOMPO! Efa narahiko ny tenin’ny Tompo.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I Samoela kosa nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa inona àry izany ondry mibarareoka sy omby mimamà reko izany?
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ka hoy ny navalin’i Saoly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nentin’ny miaramila avy tany amin’ny Hamalekita izany; satria ny biby tsara tsy mba nokasihiny fa hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' ho an’ny TOMPO Andriamanitrao. Ny sisa rehetra kosa dia naringany avokoa.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa hoy i Samoela tamin’i Saoly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka izay, fa hambarako anao izay nolazain’ny TOMPO tamiko halina.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ambarao àry!
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy i Samoela hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Na dia nihevitra ny tenanao ho tsy nanao ahoana aza ianao taloha, dia efa tonga filohan’ny fokon’i Israely, fa ny TOMPO efa nanosotra anao ho mpanjakan’i Israely. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary IZY efa nanoro lalana anao handeha hamongotra tanteraka ireo Hamalekita mpanota ireo ary hiady aminy mandra-paharingany. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Koa nahoana no tsy nohenoinao ny tenin’ny TOMPO, fa avy hatrany ianao dia niantoraka tamin’ny remby, ary nanao izay nampalahelo ny TOMPO?
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izao àry no lazain’ny TOMPOn’izao rehetra izao: «Tsaroako ny nanaovan’ny Hamalekita ny vahoaka israelita fony izy ireo nakarina niala tany Ejipta, dia ny nanakanany ny lalany izany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 17.8-16; Deot 25.17-19.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa hoy i Saoly tamin’i Samoela:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa nanaiky ny tenin’ny TOMPO aho, ary efa nanaraka izay natorony ahy. Efa novonoin-ko faty avokoa ny Hamalekita, afa-tsy i Agaga mpanjakany ihany izay nentiko eto; '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: fa ny miaramila kosa, raha nanavaka ireo biby izay tsara indrindra tokony ho naringana, dia ny hanolorana azy ho sorona ho an’ny TOMPO Andriamanitrao eto Gilgàla.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hoy indray i Samoela hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Moa sitraky ny TOMPO mihoatra noho ny fankatoavana AZY ve ny sorona dorana manontolo sy sorona hafa? Tsia! Fa tsara noho ny sorona rehetra ny fankatoavana AZY ary tsara noho ny jaboran’ondrilahy ny fanekena Azy. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa ratsy toy ny sikidy ny fikomiana aminy, ary ratsy toy ny fanompoan-tsampy ny tsy fanekena Azy. Koa satria nandà ny tenin’ny TOMPO ianao, dia mba laviny kosa tsy ho mpanjaka intsony.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ka hoy ny navalin’i Saoly azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa nanota tokoa aho, satria nandika ny didin’ny TOMPO sy ny teninao. Natahotra ny miaramila manko aho, ka nanaraka ny teniny. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ankehitriny, miangavy anao re aho, mamelà ny heloko ka miverena miaraka amiko mba hahazoako miankohoka eo anatrehan’ny TOMPO.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Hoy kosa i Samoela taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, tsy hiverina hiaraka aminao aho, satria efa nandà ny tenin’ny TOMPO ianao, ka dia laviny koa tsy ho mpanjakan’i Israely intsony.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary raha nihodina handeha iny i Samoela, dia nohazonin’i Saoly tamin’ny rebareban’akanjony, izay rovitra niendaka terỳ. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia hoy i Samoela taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tahaka izany koa androany no hanendahan’ny TOMPO aminao ny fanjakan’i Israely mba homeny ho an’ny hafa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dia i Davida izany, ampit 13.14 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' izay mendrika kokoa noho ianao. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Fa ny TOMPO, Ilay Herin’i Israely, dia tsy mba mandainga na miova hevitra. Tsy olombelona Izy ka hiova hevitra.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Koa ankehitriny, mandehana tafiho ny Hamalekita, ary levony avokoa izay rehetra ananany fa aza asiana miangana sy indrafo. Vonoy ho faty avokoa na lehilahy na vehivavy, na ankizy na zaza minono, na omby na ondry, na rameva na boriky.»
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa hoy ihany i Saoly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa diso aho, kanefa aoka re mba homenao voninahitra eo anatrehan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: ’ilay Israely vahoakako ihany aho; miverena miaraka amiko mba hahazoako eo anatrehan’ny TOMPO Andriamanitrao.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary i Samoela nandidy mba hoentina eo aminy i Agaga mpanjakan’ny Hamalekita. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia tonga teo aminy tamim-pahatokiana i Agaga, satria hoy izy anankampo hoe: «Marina fa tsy misy tokony hatahorako fahafatesana intsony.» '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Nefa hoy i Samoela taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny sabatrao no tsy nananan’ny vehivavy maro ny zanany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia notetehin’i Samoela tamin’ny sabatra teo anatrehan’ny TOMPO tao Gilgala i Agaga.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Niverina nankany Ramà i Samoela, fa i Saoly kosa nody tany an-tranony tao Gibehà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gibehà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 10.5 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary i Samoela tsy nahita an’i Saoly intsony mandra-pahafatiny; fa nitomany an’i Saoly i Samoela, satria ny TOMPO efa nanenina noho ny nifidianany azy ho mpanjakan’i Israely.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nohetsehin’i Saoly ny tafiny, dia nalahany tao Telaîma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Telaîma: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna toa tokony ho 80 km ao atsimon’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: ', ka nahitany miaramila an-tongotra andiany roanjato, ary koa vatan-dehilahy andiany folo avy amin’i Joda. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia nandroso hatrany amin’ny tanànan’ny Hamalekita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tsy fantatra ity hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tanànan’i Hamalekita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ity, indrindra fa olona mpifindrafindra monina ry zareo.'
      marker-yv: yv-n
    - type: text
      text: ' i Saoly ary nanotrika ady am-pitaka tao an-dohasaha. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hoy izy tamin’ny Kenita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kenita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia firenena mpifindrafindra monina iray faritany tamin’ny Hamalekita.'
      marker-yv: yv-n
    - type: text
      text: ': «Mandehana ianareo ka ilaozy ny Hamalekita, fandrao haringako miaraka aminy koa ianareo; fa mba nanisy soa ny Israelita ihany manko ianareo, raha niala tany Ejipta izy.» Dia nisaraka tamin’ny Hamalekita ny Kenita. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary i Saoly nandresy ny Hamalekita nanomboka teo Havilà ka hatrany Sòra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Havilà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: faritra akaikin’i Ejipta, ao atsimon’i Palestinina. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sòra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' araka ny Eks 15.22, ny «taniefitr’i Sora» no ilany avaratra amin’ny saikanosin’i Sinay, eo anelanelan’ny «riakan’i Ejipta» (jereo Nom 34.5 sy nta) sy ny lakandranon’i Suez ankehitriny.'
      marker-yv: yv-n
    - type: text
      text: ', atsinanan’i Ejipta. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nataony jinja fary tamin’ny sabatra ny vahoaka rehetra, afa-tsy i Agaga mpanjakany izay natao sambobelona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa i Saoly sy ny miaramila kosa nitsimbina ny ain’i Agaga mbamin’izay tsara indrindra amin’ny biby fiompy, toy ny omby aman’ondry, mifahy na tsia, izany hoe rehefa biby tsara rehetra misy vidiny. Fa izay tsy misy vidiny sy tsy ilaina kosa dia samy naringany avokoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'naringany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voatokana ho an’ny Tompo avokoa ny biby rehetra ka dia tokony hovonoina, jereo Lev 20.28-29.
      marker-yv: yv-n
    - type: text
      text: .
