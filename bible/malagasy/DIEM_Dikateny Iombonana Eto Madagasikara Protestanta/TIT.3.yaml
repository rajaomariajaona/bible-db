document_id: TIT.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitondrantena kristianina
  - type: text
    content: Ampahatsiarovy ny mpino mba hanaiky ny mpitondra sy ny manampahefana
  - type: note
    content: Ampit Rm 13.1; 1Pt 2.13.
  - type: text
    content: ', hanoa azy ka ho vonona hanatontosa izay rehetra mety ho asa soa. '
  '10':
  - type: text
    content: Ny olona mpampisara-bazana dia anaro indray mandeha sy fanindroany
  - type: note
    content: Ampit Mt 18.15-17.
  - type: text
    content: '; ka rehefa tsy laitra anarina, dia ialao. '
  '11':
  - type: text
    content: Fantatrao manko fa ny olona toy izany dia efa mivaona ka sady manota no manamelo-tena rahateo.
  - type: heading
    content: Hafatrafatra sy fanaovam-beloma
  '12':
  - type: text
    content: Rehefa halefako atỳ aminao i Artemà na i Tisiko, dia ataovy mihitsy izay hahatongavanao atỳ amiko atỳ Nikôpôly
  - type: note
    content: 'Tisiko: jereo 2Tim 4.12 sy nta. –Nikôpôly: tanàna maro no nitondra izany anarana izany teo amin’ny tany fantatra fahizany. Toa ilay tao amorontsiraka andrefan’i Gresy ity tononin’i Paoly etoana ity.'
  - type: text
    content: '; fa ao no efa nokasaiko handaniana ny ririnina. '
  '13':
  - type: text
    content: Ampio mihitsy i Zenà mpahay lalàna sy i Apôlao
  - type: note
    content: 'Apôlao: jereo Asa 18.24; 1Kôr 16.12.'
  - type: text
    content: ' amin’ny dia ataony, mba tsy ho orin-javatra izy roa lahy. '
  '14':
  - type: text
    content: Aoka ny olontsika hiezaka hanao asa tsara koa mba ho afa-manampy rehefa misy mahatery, fandrao tsy hisy vokany ny fiainany.
  '15':
  - type: text
    content: Manao veloma anao izay rehetra miaraka amiko eto. Veloma any amin’ireo mandray anay ho sakaizany ao amin’ny finoana.
  - type: text
    content: Homba anareo rehetra anie ny fahasoavan’Andriamanitra!
  '2':
  - type: text
    content: 'Aoka ny mpino tsy hanevateva olona, tsy ho fiadîna, fa handefitra, haneho halemem-panahy lalandava amin’ny olona rehetra. '
  '3':
  - type: text
    content: 'Fa isika koa taloha mba adala, tsy nanaiky, naniasia; efa nandevozin’ny filàna sy fahafinaretana isan-karazany isika, lany andro tamin’ny haratsiam-panahy sy ny fialonana, sady ankahalain’olona no mankahala olona. '
  '4':
  - type: text
    content: 'Fa nony efa naneho ny hamoram-pony sy ny fitiavany olona ilay Andriamanitra Mpamonjy antsika, '
  '5':
  - type: text
    content: dia novonjeny isika, tsy noho ny asa marina vitantsika, fa noho ny famindrampony tamintsika. Ny namonjeny antsika dia tamin’ny alalan’ny rano fampandroana izay nanomezan’ny Fanahy Masina antsika fahateraham-baovao sy fiainam-baovao
  - type: note
    content: Ampit Ef 5.26 sy nta.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Fa nandrotsahan’Andriamanitra be dia be ny Fanahy Masina isika tamin’ny alalan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa Mpamonjy antsika, '
  '7':
  - type: text
    content: 'hahatonga antsika ho marina eo anatrehan’Andriamanitra noho ny fahasoavan’i Kristy sy hahatonga antsika hanana anjara amin’ny fiaina-maharitra mandrakizay efa antenaintsika. '
  '8':
  - type: text
    content: Teny azo antoka izany!
  - type: text
    content: 'Tiako hoantitranterinao ireo zavatra ireo mba himasoan’ny mpino an’Andriamanitra hiezaka manao asa tsara; izany no tsara sady mahasoa ny olona. '
  '9':
  - type: text
    content: Fa halaviro ny fanontaniana adaladala, ny tantaram-pirazanana
  - type: note
    content: Jereo 1Tim 1.4 sy nta.
  - type: text
    content: ', ny fifandirana sy ady momba ny lalàna jiosy; satria sady tsy mahasoa izany no zava-poana. '
