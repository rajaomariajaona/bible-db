document_id: TIT.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitondrantena kristianina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ampahatsiarovy ny mpino mba hanaiky ny mpitondra sy ny manampahefana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 13.1; 1Pt 2.13.
    marker-yv: yv-n
  - type: text
    text: ', hanoa azy ka ho vonona hanatontosa izay rehetra mety ho asa soa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aoka ny mpino tsy hanevateva olona, tsy ho fiadîna, fa handefitra, haneho halemem-panahy lalandava amin’ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa isika koa taloha mba adala, tsy nanaiky, naniasia; efa nandevozin’ny filàna sy fahafinaretana isan-karazany isika, lany andro tamin’ny haratsiam-panahy sy ny fialonana, sady ankahalain’olona no mankahala olona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa nony efa naneho ny hamoram-pony sy ny fitiavany olona ilay Andriamanitra Mpamonjy antsika, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dia novonjeny isika, tsy noho ny asa marina vitantsika, fa noho ny famindrampony tamintsika. Ny namonjeny antsika dia tamin’ny alalan’ny rano fampandroana izay nanomezan’ny Fanahy Masina antsika fahateraham-baovao sy fiainam-baovao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ef 5.26 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa nandrotsahan’Andriamanitra be dia be ny Fanahy Masina isika tamin’ny alalan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa Mpamonjy antsika, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'hahatonga antsika ho marina eo anatrehan’Andriamanitra noho ny fahasoavan’i Kristy sy hahatonga antsika hanana anjara amin’ny fiaina-maharitra mandrakizay efa antenaintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Teny azo antoka izany!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tiako hoantitranterinao ireo zavatra ireo mba himasoan’ny mpino an’Andriamanitra hiezaka manao asa tsara; izany no tsara sady mahasoa ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa halaviro ny fanontaniana adaladala, ny tantaram-pirazanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1Tim 1.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', ny fifandirana sy ady momba ny lalàna jiosy; satria sady tsy mahasoa izany no zava-poana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny olona mpampisara-bazana dia anaro indray mandeha sy fanindroany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 18.15-17.
    marker-yv: yv-n
  - type: text
    text: '; ka rehefa tsy laitra anarina, dia ialao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fantatrao manko fa ny olona toy izany dia efa mivaona ka sady manota no manamelo-tena rahateo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatrafatra sy fanaovam-beloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rehefa halefako atỳ aminao i Artemà na i Tisiko, dia ataovy mihitsy izay hahatongavanao atỳ amiko atỳ Nikôpôly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tisiko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2Tim 4.12 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Nikôpôly:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tanàna maro no nitondra izany anarana izany teo amin’ny tany fantatra fahizany. Toa ilay tao amorontsiraka andrefan’i Gresy ity tononin’i Paoly etoana ity.'
    marker-yv: yv-n
  - type: text
    text: '; fa ao no efa nokasaiko handaniana ny ririnina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ampio mihitsy i Zenà mpahay lalàna sy i Apôlao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Apôlao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 18.24; 1Kôr 16.12.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny dia ataony, mba tsy ho orin-javatra izy roa lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aoka ny olontsika hiezaka hanao asa tsara koa mba ho afa-manampy rehefa misy mahatery, fandrao tsy hisy vokany ny fiainany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Manao veloma anao izay rehetra miaraka amiko eto. Veloma any amin’ireo mandray anay ho sakaizany ao amin’ny finoana.
- type: usfm
  marker: p
  children:
  - type: text
    text: Homba anareo rehetra anie ny fahasoavan’Andriamanitra!
