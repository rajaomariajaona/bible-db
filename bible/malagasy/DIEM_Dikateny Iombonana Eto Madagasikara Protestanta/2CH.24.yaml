document_id: 2CH.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nampanamboarin’i Jôasy ny tempoly
  - type: heading
    content: (Jereo 2 Mp 12.1-17)
  - type: text
    content: Feno fito taona i Jôasy fony tonga mpanjaka; ary naharitra efapolo taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Tsibià, avy any Beera-Sebà
  - type: note
    content: 'Beera-Sebà: jereo 1 Mp 19.3.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Dia faly avokoa ny manampahefana sy ny vahoaka nitondra ny anjarany ary nandatsaka izany tao amin’ny vata mandra-pahafenony. '
  '11':
  - type: text
    content: 'Nisy ny fotoana fitondran’ny levita ny vata ho any amin’ny mpanaramaso voatendrin’ny mpanjaka; ka rehefa hitan’io mpiandraikitra io fa be ny vola tao anaty vata, dia avy ny mpitantsoratry ny mpanjaka sy ny tonia voatendrin’ny mpisorombe manaisotra izay vola rehetra ao, ary namerina indray ny vata eo amin’ny toerany. Toy izany no natao isan’andro isan’andro, ka vola betsaka no voavory. '
  '12':
  - type: text
    content: 'Dia natolotry ny mpanjaka sy i Jôiadà ho an’izay nisahana ny raharaha momba ny tranon’ny TOMPO izany vola izany, ka nanakaramany mpipai-bato sy mpandrafitra ary koa mpanefy vy sy halimo mba hanamboarana sy hanamafisana ny tranon’ny TOMPO. '
  '13':
  - type: text
    content: Dia nikatroka ny mpiasa, ka nandroso tsara ny asa nataony; ary namboariny ho toy ny teo aloha sady nohamafisiny ny tranon’Andriamanitra.
  '14':
  - type: text
    content: Nony vitan’ireto mpisahana azy izany asa izany, dia nentiny teo anatrehan’ny mpanjaka sy i Jôiadà ny vola sisa ka nanaovana fanaka ho an’ny tranon’ny TOMPO, dia fanaka hanatontosana fanompoam-pivavahana sy hanoloran-
  - type: text
    content: tsorona
  - type: text
    content: ', tsatokaty ary fanaka hafa volamena sy volafotsy. Ary nandritra ny andro rehetra niainan’i Jôiadà dia nisy mandrakariva sorona dorana manontolo natolotra tao an-tranon’ny TOMPO.'
  - type: heading
    content: Nivadika tamin’Andriamanitra i Jôasy
  '15':
  - type: text
    content: 'Efa tratrantitra sy ela niainana i Jôaidà vao maty; feno 130 taona izy tamin’ny nahafatesany. '
  '16':
  - type: text
    content: Dia tao an-
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ' niaraka tamin’ireo mpanjaka nodimandry izy no nalevina satria nanao soa teo amin’i Israely ary koa tamin’Andriamanitra sy ny '
  - type: text
    content: tempoliny
  - type: text
    content: .
  '17':
  - type: text
    content: 'Rehefa maty i Jôiadà, dia avy ireo manampahefana tao Joda ka niankohoka teo anatrehan’ny mpanjaka ho fiangaviana azy. Dia nihaino azy ny mpanjaka, '
  '18':
  - type: text
    content: 'hany ka nilaozan’ireo Israelita ny tranon’ny TOMPO Andriamanitry ny razany mba hanompoany ny tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: ' sy handalàny sampy hafa. Noho izany fahadisoana izany, dia niharan’ny fahatezeran’ny TOMPO i Joda sy i Jerosalema. '
  '19':
  - type: text
    content: 'Ary nanirahany '
  - type: text
    content: mpaminany
  - type: text
    content: ' izy mba hampiverina azy aminy; kanefa, na dia nananatra mafy aza ireo, dia tsy nety nihaino izy. '
  '2':
  - type: text
    content: 'Nanao izay mahitsy eo imason’ny TOMPO i Jôasy tamin’ny andro rehetra niainan’i Jôiadà mpisorona. '
  '20':
  - type: text
    content: 'Ary notsindrian’ny Fanahin’Andriamanitra kosa tamin’izay i Zakarià mpisorona zanakalahin’i Jôiadà, ka nitsangana teo amin’ny toerana avoavo manoloana ny vahoaka izy ary nanao taminy hoe: «Izao no lazain’Andriamanitra aminareo: ‹Nahoana no mandika ny didiko ianareo? Tsy ahitanareo fanambinana izany. Noho Izaho TOMPO efa nilaozanareo, dia mba handao anareo koa Aho!› »'
  '21':
  - type: text
    content: Dia nanao teti-dratsy nanohitra an’i Zakarià ny vahoaka, ary nitora-bato azy tao an-kianjan’ny tranon’ny TOMPO, araka ny baikon’ny mpanjaka
  - type: note
    content: 'And 20-21: jereo Mt 23.35; Lk 11.51.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Nohadinoin’i Jôasy mpanjaka tokoa ny soa nataon’i Jôiadà rain’i Zakarià, hany ka nampamono ho faty ity zanany lahy izy. Ary nony efa ho faty i Zakarià, dia niteny hoe: «Ny TOMPO anie hijery sy hamaly izao!»'
  - type: heading
    content: Fiafaràn’ny nanjakàn’i Jôasy
  - type: heading
    content: (Jereo 2 Mp 12.18-22)
  '23':
  - type: text
    content: 'Tamin’ny lohataona manaraka izany, dia avy ny tafika sirianina hiady tamin’i Jôasy; ary tonga tany Joda sy Jerosalema ireto fahavalo, ka matiny avokoa ny manampahefana teo amin’ny vahoaka ary nampitondrainy ho any amin’ny mpanjakan’i Damasy ny babo rehetra azo. '
  '24':
  - type: text
    content: 'Vitsy olona ihany ny tafika sirianina izay tonga teo, kanefa miaramila maro no natolotry ny TOMPO ho eo an-tanany noho ny Jodeanina efa nandao ny TOMPO Andriamanitry ny razany. Toy izany no nahatanterahan’ny tafika sirianina ny famaliana an’i Jôasy. '
  '25':
  - type: text
    content: Fony lasa nody ny Sirianina, dia namela an’i Jôasy hianjadian’aretina mafy; fa noho izy nampamono ho faty ny zanakalahin’i Jôiadà
  - type: note
    content: Ny zanakalahin’i Jôiadà lazaina eto dia i Zakarià (jereo 24.22).
  - type: text
    content: ' mpisorona, dia niokoan’ireo mpanompony koa ity mpanjaka, hany ka novonoiny ho faty teo am-pandriany. Mba nalevina tao an-'
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ' ihany izy, nefa tsy tao amin’ny fasan’ny mpanjaka. '
  '26':
  - type: text
    content: 'Ireto avy ireo nioko nanohitra an’i Jôasy: i Jôzakara zanakalahin’ilay vehivavy hamônita atao hoe Simehata, ary koa i Jehôzabada zanakalahin’ilay vehivavy môabita atao hoe Simrita.'
  '27':
  - type: text
    content: 'Ny amin’ireo zanakalahin’i Jôasy, ny teny faminaniana hentitra nilaza ny loza hanjo ity mpanjaka, ary ny fomba nanamboarany ny '
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ' dia samy voasoratra ao amin’ilay boky milohateny hoe '
  - type: text
    content: Fivoasana ny Bokin’ny Mpanjaka
  - type: note
    content: Efa very izany boky izany fa tsy ananantsika intsony.
  - type: text
    content: . Ary i Amatsià zanakalahin’i Jôasy no nanjaka nandimby azy.
  '3':
  - type: text
    content: Ary nangalan’i Jôiadà vady roa i Jôasy, ka niteraka zazalahy sy zazavavy taminy.
  '4':
  - type: text
    content: 'Taorian’izany kosa no mby tao am-pon’i Jôasy ny hanamboatra ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Dia namory ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' mbamin’ny '
  - type: text
    content: levita
  - type: text
    content: ' izy, ka nanao taminy hoe: «Mankanesa amin’ny tanànan’i Joda, ka mamoria vola amin’ny Israelita rehetra isan-taona mba hanamboarana ny tranon’ny Andriamanitrareo; ary aoka hohafainganinareo ny raharaha!»'
  - type: text
    content: 'Kanjo navelan’ny levita hitarazoka izany. '
  '6':
  - type: text
    content: 'Koa nampanantsoin’ny mpanjaka i Jôiadà mpisorombe ary nataony hoe: «Nahoana no tsy nohizingizininao ny hitondran’ny levita ny hetra avy tamin’ny mponin’i Joda sy Jerosalema, araka ny didin’i Mosesy mpanompon’ny TOMPO fony izy namory ny vahoaka Israely'
  - type: note
    content: 'ny hetra... Israely: jereo Eks 30.12-16.'
  - type: text
    content: '? Hanasoavana ny Fonena-masina misy ny '
  - type: text
    content: raki-tsoratry ny Fanekempihavanana
  - type: text
    content: ' io hetra io, '
  '7':
  - type: text
    content: 'satria i Hatalià, ilay vehivavy ratsy fanahy, sy ireo mpomba azy efa nandrava ny tranon’Andriamanitra; ary ny fanaka masina rehetra tao an-tranon’ny TOMPO koa dia efa nampiasainy hanompoana an’ireo '
  - type: text
    content: Bahala
  - type: text
    content: .»
  '8':
  - type: text
    content: 'Dia nasain’ny mpanjaka nanao vata anankiray fandatsahan-drakitra ny olona mba hapetraka eo ivelan’ny vavahadin’ny tranon’ny TOMPO. '
  '9':
  - type: text
    content: 'Ary nandefasan-teny eran’i Joda sy i Jerosalema mba haterina ho an’ny TOMPO ny hetra izay nasain’i Mosesy mpanompon’Andriamanitra hoefain’ny Israelita fony izy tany an-taniefitra. '
