document_id: 2CH.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nampanamboarin’i Jôasy ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 12.1-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Feno fito taona i Jôasy fony tonga mpanjaka; ary naharitra efapolo taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Tsibià, avy any Beera-Sebà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Beera-Sebà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 19.3.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanao izay mahitsy eo imason’ny TOMPO i Jôasy tamin’ny andro rehetra niainan’i Jôiadà mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nangalan’i Jôiadà vady roa i Jôasy, ka niteraka zazalahy sy zazavavy taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Taorian’izany kosa no mby tao am-pon’i Jôasy ny hanamboatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia namory ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' izy, ka nanao taminy hoe: «Mankanesa amin’ny tanànan’i Joda, ka mamoria vola amin’ny Israelita rehetra isan-taona mba hanamboarana ny tranon’ny Andriamanitrareo; ary aoka hohafainganinareo ny raharaha!»'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Kanjo navelan’ny levita hitarazoka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa nampanantsoin’ny mpanjaka i Jôiadà mpisorombe ary nataony hoe: «Nahoana no tsy nohizingizininao ny hitondran’ny levita ny hetra avy tamin’ny mponin’i Joda sy Jerosalema, araka ny didin’i Mosesy mpanompon’ny TOMPO fony izy namory ny vahoaka Israely'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny hetra... Israely: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 30.12-16.
    marker-yv: yv-n
  - type: text
    text: '? Hanasoavana ny Fonena-masina misy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: raki-tsoratry ny Fanekempihavanana
  - type: text
    text: ' io hetra io, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'satria i Hatalià, ilay vehivavy ratsy fanahy, sy ireo mpomba azy efa nandrava ny tranon’Andriamanitra; ary ny fanaka masina rehetra tao an-tranon’ny TOMPO koa dia efa nampiasainy hanompoana an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nasain’ny mpanjaka nanao vata anankiray fandatsahan-drakitra ny olona mba hapetraka eo ivelan’ny vavahadin’ny tranon’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nandefasan-teny eran’i Joda sy i Jerosalema mba haterina ho an’ny TOMPO ny hetra izay nasain’i Mosesy mpanompon’Andriamanitra hoefain’ny Israelita fony izy tany an-taniefitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia faly avokoa ny manampahefana sy ny vahoaka nitondra ny anjarany ary nandatsaka izany tao amin’ny vata mandra-pahafenony. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nisy ny fotoana fitondran’ny levita ny vata ho any amin’ny mpanaramaso voatendrin’ny mpanjaka; ka rehefa hitan’io mpiandraikitra io fa be ny vola tao anaty vata, dia avy ny mpitantsoratry ny mpanjaka sy ny tonia voatendrin’ny mpisorombe manaisotra izay vola rehetra ao, ary namerina indray ny vata eo amin’ny toerany. Toy izany no natao isan’andro isan’andro, ka vola betsaka no voavory. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia natolotry ny mpanjaka sy i Jôiadà ho an’izay nisahana ny raharaha momba ny tranon’ny TOMPO izany vola izany, ka nanakaramany mpipai-bato sy mpandrafitra ary koa mpanefy vy sy halimo mba hanamboarana sy hanamafisana ny tranon’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nikatroka ny mpiasa, ka nandroso tsara ny asa nataony; ary namboariny ho toy ny teo aloha sady nohamafisiny ny tranon’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nony vitan’ireto mpisahana azy izany asa izany, dia nentiny teo anatrehan’ny mpanjaka sy i Jôiadà ny vola sisa ka nanaovana fanaka ho an’ny tranon’ny TOMPO, dia fanaka hanatontosana fanompoam-pivavahana sy hanoloran-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tsorona
  - type: text
    text: ', tsatokaty ary fanaka hafa volamena sy volafotsy. Ary nandritra ny andro rehetra niainan’i Jôiadà dia nisy mandrakariva sorona dorana manontolo natolotra tao an-tranon’ny TOMPO.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nivadika tamin’Andriamanitra i Jôasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Efa tratrantitra sy ela niainana i Jôaidà vao maty; feno 130 taona izy tamin’ny nahafatesany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tanànan’i Davida
  - type: text
    text: ' niaraka tamin’ireo mpanjaka nodimandry izy no nalevina satria nanao soa teo amin’i Israely ary koa tamin’Andriamanitra sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoliny
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa maty i Jôiadà, dia avy ireo manampahefana tao Joda ka niankohoka teo anatrehan’ny mpanjaka ho fiangaviana azy. Dia nihaino azy ny mpanjaka, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'hany ka nilaozan’ireo Israelita ny tranon’ny TOMPO Andriamanitry ny razany mba hanompoany ny tsatokazo fanajana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aserà
  - type: text
    text: ' sy handalàny sampy hafa. Noho izany fahadisoana izany, dia niharan’ny fahatezeran’ny TOMPO i Joda sy i Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nanirahany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' izy mba hampiverina azy aminy; kanefa, na dia nananatra mafy aza ireo, dia tsy nety nihaino izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary notsindrian’ny Fanahin’Andriamanitra kosa tamin’izay i Zakarià mpisorona zanakalahin’i Jôiadà, ka nitsangana teo amin’ny toerana avoavo manoloana ny vahoaka izy ary nanao taminy hoe: «Izao no lazain’Andriamanitra aminareo: ‹Nahoana no mandika ny didiko ianareo? Tsy ahitanareo fanambinana izany. Noho Izaho TOMPO efa nilaozanareo, dia mba handao anareo koa Aho!› »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia nanao teti-dratsy nanohitra an’i Zakarià ny vahoaka, ary nitora-bato azy tao an-kianjan’ny tranon’ny TOMPO, araka ny baikon’ny mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.21 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 20-21:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 23.35; Lk 11.51.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nohadinoin’i Jôasy mpanjaka tokoa ny soa nataon’i Jôiadà rain’i Zakarià, hany ka nampamono ho faty ity zanany lahy izy. Ary nony efa ho faty i Zakarià, dia niteny hoe: «Ny TOMPO anie hijery sy hamaly izao!»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiafaràn’ny nanjakàn’i Jôasy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 12.18-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’ny lohataona manaraka izany, dia avy ny tafika sirianina hiady tamin’i Jôasy; ary tonga tany Joda sy Jerosalema ireto fahavalo, ka matiny avokoa ny manampahefana teo amin’ny vahoaka ary nampitondrainy ho any amin’ny mpanjakan’i Damasy ny babo rehetra azo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vitsy olona ihany ny tafika sirianina izay tonga teo, kanefa miaramila maro no natolotry ny TOMPO ho eo an-tanany noho ny Jodeanina efa nandao ny TOMPO Andriamanitry ny razany. Toy izany no nahatanterahan’ny tafika sirianina ny famaliana an’i Jôasy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fony lasa nody ny Sirianina, dia namela an’i Jôasy hianjadian’aretina mafy; fa noho izy nampamono ho faty ny zanakalahin’i Jôiadà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny zanakalahin’i Jôiadà '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lazaina eto dia i Zakarià (jereo 24.22).
    marker-yv: yv-n
  - type: text
    text: ' mpisorona, dia niokoan’ireo mpanompony koa ity mpanjaka, hany ka novonoiny ho faty teo am-pandriany. Mba nalevina tao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tanànan’i Davida
  - type: text
    text: ' ihany izy, nefa tsy tao amin’ny fasan’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ireto avy ireo nioko nanohitra an’i Jôasy: i Jôzakara zanakalahin’ilay vehivavy hamônita atao hoe Simehata, ary koa i Jehôzabada zanakalahin’ilay vehivavy môabita atao hoe Simrita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny amin’ireo zanakalahin’i Jôasy, ny teny faminaniana hentitra nilaza ny loza hanjo ity mpanjaka, ary ny fomba nanamboarany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’Andriamanitra
  - type: text
    text: ' dia samy voasoratra ao amin’ilay boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Fivoasana ny Bokin’ny Mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Efa very izany boky izany fa tsy ananantsika intsony.
    marker-yv: yv-n
  - type: text
    text: . Ary i Amatsià zanakalahin’i Jôasy no nanjaka nandimby azy.
