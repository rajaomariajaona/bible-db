document_id: JHN.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Voasambotra i Jesoa
  - type: heading
    content: (Jereo Mt 26.47-56; Mk 14.43-50; Lk 22.47-53)
  - type: text
    content: 'Rehefa voalazan’i Jesoa izany, dia lasa Izy mbamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ' nandeha nankeny andafin’ny lohasahan-driaka atao hoe Kidrôna'
  - type: note
    content: Jereo Mk 11.1 sy nta.
  - type: text
    content: '; ary nisy saha anankiray teo, izay nidiran’Izy sy ny mpianany. '
  '10':
  - type: text
    content: 'Ary nanan-tsabatra i Simôna Petera ka nanatsoaka azy; dia namely ny mpanompon’ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' izy ary nahafaka ny sofiny havanana (I Malko no anaran’ilay mpanompo.) '
  '11':
  - type: text
    content: 'Fa hoy i Jesoa tamin’i Petera:'
  - type: text
    content: –Ampidiro amin’ny tranony ny sabatrao. Tsy hiaretako ve ny anjara fijaliana nomen’ny Ray Ahy
  - type: note
    content: Ampit Mt 26.39; Mk 14.36; Lk 22.42.
  - type: text
    content: '?'
  - type: heading
    content: Entina ho eo anatrehan’i Hàna mpisorombe i Jesoa
  - type: heading
    content: (Jereo Mt 26.57-58; Mk 14.53-54; Lk 22.54)
  '12':
  - type: text
    content: 'Tamin’izay ny antoko miaramila sy ny komandy ary ny mpiandry raharaha nirahin’ireo manampahefana jiosy dia nisambotra an’i Jesoa ka namatotra Azy. '
  '13':
  - type: text
    content: Tany amin’i Hàna
  - type: note
    content: 'Hàna: jereo Lk 3.2 sy nta.'
  - type: text
    content: ' aloha no nitondrany Azy, fa i Hanà no rafozan’i Kaiafa izay '
  - type: text
    content: mpisorombe
  - type: text
    content: ' tamin’izany taona izany. '
  '14':
  - type: text
    content: 'I Kaiafa kosa no ilay nanome hevitra ireo manampahefana jiosy hoe: «Tsara raha maty ho an’ny vahoaka ny lehilahy anankiray'
  - type: note
    content: Jereo 11.49-50.
  - type: text
    content: .»
  - type: heading
    content: Lavin’i Petera i Jesoa
  - type: heading
    content: (Jereo Mt 26.69-70; Mk 14.66-68; Lk 22.55-57)
  '15':
  - type: text
    content: 'Dia nanaraka an’i Jesoa i Simôna Petera sy '
  - type: text
    content: mpianatra
  - type: text
    content: ' anankiray hafa. Fantatry ny mpisorombe io mpianatra io, ka niara-niditra tamin’i Jesoa tao an-tokotanin’ny mpisorombe. '
  '16':
  - type: text
    content: 'Fa i Petera kosa nijanona tany alatrano, teo akaikin’ny vavahady. Dia niainga ilay mpianatra izay fantatry ny mpisorombe, ka niteny tamin’ny vehivavy mpiandry vavahady, ary nampiditra an’i Petera. '
  '17':
  - type: text
    content: 'Fa hoy ity mpiandry vavahady tamin’i Petera:'
  - type: text
    content: –Ianao koa ve tsy isan’ny mpianatr’iny Lehilahy iny?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Tsia, tsy anisany aho!
  '18':
  - type: text
    content: Namelona afon’arina ny mpanompo sy ny mpiandry raharaha ka nipetraka namindro teo, fa nangatsiaka ny andro; ary dia mba nijanona niara-namindro taminy koa i Petera.
  - type: heading
    content: Fotorin’i Hàna mpisorombe i Jesoa
  - type: heading
    content: (Jereo Mt 26.59-66; Mk 14.54-64; Lk 22.66-71)
  '19':
  - type: text
    content: 'Tamin’izay i Hàna '
  - type: text
    content: mpisorombe
  - type: text
    content: ' dia nanadina an’i Jesoa momba ny '
  - type: text
    content: mpianany
  - type: text
    content: ' sy ny fampianarany, '
  '2':
  - type: text
    content: Fantatr’i Jodasy, ilay efa hanolotra Azy, io toerana io satria falehan’i Jesoa mbamin’ny mpianany matetika
  - type: note
    content: Jereo Lk 21.37; 22.39.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'ka novalian’i Jesoa hoe:'
  - type: text
    content: –Izaho dia niteny an-karihary tamin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: '; Izaho dia nampianatra mandrakariva tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' sy teo an-'
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' izay ivorian’ny Jiosy rehetra fa tsy niteny na inona na inona an-takona. '
  '21':
  - type: text
    content: Ka ahoana no anontanianao Ahy? Ireo nihaino Ahy anontaniana izay noteneniko taminy, fa ireo no mahalala izay nolazaiko.
  '22':
  - type: text
    content: 'Rehefa nilaza izany i Jesoa, dia nisy anankiray tamin’ny mpiandry raharaha teo namely tahamaina Azy sady nanao hoe:'
  - type: text
    content: –Izany ve no famalinao ny mpisorombe?
  '23':
  - type: text
    content: 'Fa hoy i Jesoa namaly azy:'
  - type: text
    content: –Raha ratsy ny teniko, lazao ny maha ratsy azy; fa raha tsara ihany kosa, nahoana no dia mamely Ahy ianao?
  '24':
  - type: text
    content: Tamin’izay i Jesoa dia nasain’i Hàna nentina am-patorana ho any amin’i Kaiafa mpisorombe.
  - type: heading
    content: Lavin’i Petera indray i Jesoa
  - type: heading
    content: (Jereo Mt 26.71-75; Mk 14.69-72; Lk 22.58-62)
  '25':
  - type: text
    content: 'I Simôna Petera kosa mbola nijanona namindro teo, ka nisy nilaza taminy hoe:'
  - type: text
    content: '–Ianao koa ve tsy isan’ny '
  - type: text
    content: mpianatr
  - type: text
    content: ’iny Lehilahy iny?
  - type: text
    content: 'Fa nandà izy nanao hoe:'
  - type: text
    content: –Tsia, tsy anisany aho!
  '26':
  - type: text
    content: 'Dia hoy ny anankiray tamin’ireo mpanompon’ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ', havan’ilay nokapain’i Petera ny sofiny:'
  - type: text
    content: –Tsy efa hitako niaraka taminy tao anaty saha ve ianao?
  '27':
  - type: text
    content: Fa nandà indray i Petera; ary niaraka tamin’izay dia nisy akoho naneno.
  - type: heading
    content: Tsarain’i Pilato i Jesoa
  - type: heading
    content: (Jereo Mt 27.1-3; Mk 15.1-5; Lk 23.1-5)
  '28':
  - type: text
    content: 'Dia nentina niala tao amin’i Kaiafa i Jesoa ho any an-dapan’ny governora. Mbola maraina be ny andro tamin’izay. Tsy niditra tao an-dapa anefa ry zareo manampahefana jiosy mba tsy ho voaloto ary mba ho afa-mihinana ny sakafo '
  - type: text
    content: Paska
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Koa dia i '
  - type: text
    content: Pilato
  - type: text
    content: ' no nivoaka nanatona azy teo alatrano ka nanao hoe:'
  - type: text
    content: –Inona no iampanganareo io Lehilahy io?
  '3':
  - type: text
    content: 'Ka nony voarain’i Jodasy ny antoko miaramila iray sy ny mpiandry raharaha avy tamin’ny lohandoha-mpisorona sy ny '
  - type: text
    content: Farisianina
  - type: text
    content: ', dia nankeo amin’ilay toerana izy iray tarika nitondra fanilo sy fanala ary fiadiana. '
  '30':
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –Raha toa mpanao ratsy Izy, dia tsy ho natolotray anao!
  '31':
  - type: text
    content: 'Ka hoy i Pilato taminy:'
  - type: text
    content: –Ento Izy, ka tsarao araka ny lalànanareo.
  - type: text
    content: 'Fa hoy ny Jiosy taminy:'
  - type: text
    content: –Tsy manam-pahefana hahafaty olona izahay.
  '32':
  - type: text
    content: Izany dia mba hahatanteraka ny teny nolazain’i Jesoa nanambara ny karazam-pahafatesana efa hanjo Azy
  - type: note
    content: Jereo 3.14; 12.32 sy nta.
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Tamin’izay dia niditra tao an-dapa indray i Pilato, ary niantso an’i Jesoa ka nanao taminy hoe:'
  - type: text
    content: –Ianao ve no Mpanjakan’ny Jiosy?
  '34':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: –Anao samirery izany teny izany sa nisy olon-kafa nilaza Ahy taminao?
  '35':
  - type: text
    content: 'I Pilato kosa niteny hoe:'
  - type: text
    content: –Fa izaho angaha Jiosy? Ireo olona iray firenena aminao sy ireo lohandoha-mpisorona no nanolotra Anao tamiko; inona moa no nataonao?
  '36':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: –Tsy anisan’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' ny Fanjakàko; fa raha an’izao tontolo izao ny Fanjakàko, dia ho niady ny mpanompoko mba tsy ho voatolotra tamin’ny manampahefana jiosy Aho; kanefa tsy anisan’izao etỳ izao ny Fanjakàko.'
  '37':
  - type: text
    content: 'Ary hoy i Pilato taminy:'
  - type: text
    content: –Koa Mpanjaka izany Ianao?
  - type: text
    content: 'I Jesoa kosa namaly hoe:'
  - type: text
    content: '–Voalazanao fa Mpanjaka Aho. Izao no nahaterahako ary izao no niaviako eto amin’izao tontolo izao: dia ny ho vavolombelona hanambara ny marina. Izay rehetra mpiandany amin’ny marina dia mihaino ny feoko.'
  '38':
  - type: text
    content: 'Dia hoy i Pilato taminy:'
  - type: text
    content: –Inona no marina?
  - type: heading
    content: Voaheloka ho faty i Jesoa
  - type: heading
    content: (Jereo Mt 27.15-31; Mk 15.6-20; Lk 23.13-25)
  - type: text
    content: 'Avy nanontany izany i '
  - type: text
    content: Pilato
  - type: text
    content: ', dia nivoaka nankeo amin’ny Jiosy indray ka nanao taminy hoe:'
  - type: text
    content: '–Izaho dia tsy mahita izay helony, na dia iray aza! '
  '39':
  - type: text
    content: 'Saingy fanao mahazatra anareo ny andefasako olo-meloka anankiray ho anareo, amin’ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ; koa sitrakareo ve raha halefako ho anareo ny Mpanjakan’ny Jiosy?
  '4':
  - type: text
    content: 'Tamin’izay i Jesoa dia efa nahalala izay rehetra hanjo Azy, ka lasa nitsena azy ireo sy nanao taminy hoe:'
  - type: text
    content: –Iza no tadiavinareo?
  '40':
  - type: text
    content: 'Dia niantsoantso indray izy rehetra nanao hoe:'
  - type: text
    content: –Tsy ilay io, fa i Barabasy!
  - type: text
    content: Kanefa jiolahy
  - type: note
    content: Ampit Asa 3.14.
  - type: text
    content: ' i Barabasy.'
  '5':
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –I Jesoa avy any Nazareta!
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: –Izaho no Izy!
  - type: text
    content: Teo koa izany i Jodasy ilay manolotra Azy, niaraka tamin-dry zareo.
  '6':
  - type: text
    content: 'Vao nilazan’i Jesoa ry zareo hoe: «Izaho no Izy», dia nianòtra, ka lavo tamin’ny tany. '
  '7':
  - type: text
    content: 'Dia nanontany azy indray i Jesoa hoe:'
  - type: text
    content: –Iza no tadiavinareo?
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –I Jesoa avy any Nazareta!
  '8':
  - type: text
    content: 'Ka hoy i Jesoa:'
  - type: text
    content: –Efa nolazaiko taminareo fa Izaho no Izy; koa raha Izaho no tadiavinareo, dia avelao handeha ireto!
  '9':
  - type: text
    content: 'Izany dia mba hahatanteraka ny teny voalazan’i Jesoa hoe: «Ray ô, tsy navelako hisy very tamin’ireo nomenao Ahy na dia iray aza.» '
