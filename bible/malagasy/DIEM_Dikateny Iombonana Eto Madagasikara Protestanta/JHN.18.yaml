document_id: JHN.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voasambotra i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.47-56; Mk 14.43-50; Lk 22.47-53)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa voalazan’i Jesoa izany, dia lasa Izy mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' nandeha nankeny andafin’ny lohasahan-driaka atao hoe Kidrôna'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mk 11.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; ary nisy saha anankiray teo, izay nidiran’Izy sy ny mpianany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fantatr’i Jodasy, ilay efa hanolotra Azy, io toerana io satria falehan’i Jesoa mbamin’ny mpianany matetika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lk 21.37; 22.39.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ka nony voarain’i Jodasy ny antoko miaramila iray sy ny mpiandry raharaha avy tamin’ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ', dia nankeo amin’ilay toerana izy iray tarika nitondra fanilo sy fanala ary fiadiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’izay i Jesoa dia efa nahalala izay rehetra hanjo Azy, ka lasa nitsena azy ireo sy nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no tadiavinareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –I Jesoa avy any Nazareta!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho no Izy!
- type: usfm
  marker: p
  children:
  - type: text
    text: Teo koa izany i Jodasy ilay manolotra Azy, niaraka tamin-dry zareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vao nilazan’i Jesoa ry zareo hoe: «Izaho no Izy», dia nianòtra, ka lavo tamin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nanontany azy indray i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no tadiavinareo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –I Jesoa avy any Nazareta!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ka hoy i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nolazaiko taminareo fa Izaho no Izy; koa raha Izaho no tadiavinareo, dia avelao handeha ireto!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izany dia mba hahatanteraka ny teny voalazan’i Jesoa hoe: «Ray ô, tsy navelako hisy very tamin’ireo nomenao Ahy na dia iray aza.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nanan-tsabatra i Simôna Petera ka nanatsoaka azy; dia namely ny mpanompon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
  - type: text
    text: ' izy ary nahafaka ny sofiny havanana (I Malko no anaran’ilay mpanompo.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy i Jesoa tamin’i Petera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ampidiro amin’ny tranony ny sabatrao. Tsy hiaretako ve ny anjara fijaliana nomen’ny Ray Ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 26.39; Mk 14.36; Lk 22.42.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Entina ho eo anatrehan’i Hàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
  - type: text
    text: ' i Jesoa'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.57-58; Mk 14.53-54; Lk 22.54)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’izay ny antoko miaramila sy ny komandy ary ny mpiandry raharaha nirahin’ireo manampahefana jiosy dia nisambotra an’i Jesoa ka namatotra Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tany amin’i Hàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lk 3.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' aloha no nitondrany Azy, fa i Hanà no rafozan’i Kaiafa izay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
  - type: text
    text: ' tamin’izany taona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I Kaiafa kosa no ilay nanome hevitra ireo manampahefana jiosy hoe: «Tsara raha maty ho an’ny vahoaka ny lehilahy anankiray'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 11.49-50.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lavin’i Petera i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.69-70; Mk 14.66-68; Lk 22.55-57)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanaraka an’i Jesoa i Simôna Petera sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' anankiray hafa. Fantatry ny mpisorombe io mpianatra io, ka niara-niditra tamin’i Jesoa tao an-tokotanin’ny mpisorombe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa i Petera kosa nijanona tany alatrano, teo akaikin’ny vavahady. Dia niainga ilay mpianatra izay fantatry ny mpisorombe, ka niteny tamin’ny vehivavy mpiandry vavahady, ary nampiditra an’i Petera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy ity mpiandry vavahady tamin’i Petera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao koa ve tsy isan’ny mpianatr’iny Lehilahy iny?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, tsy anisany aho!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Namelona afon’arina ny mpanompo sy ny mpiandry raharaha ka nipetraka namindro teo, fa nangatsiaka ny andro; ary dia mba nijanona niara-namindro taminy koa i Petera.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fotorin’i Hàna mpisorombe i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.59-66; Mk 14.54-64; Lk 22.66-71)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tamin’izay i Hàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
  - type: text
    text: ' dia nanadina an’i Jesoa momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' sy ny fampianarany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ka novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho dia niteny an-karihary tamin’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: '; Izaho dia nampianatra mandrakariva tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' sy teo an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' izay ivorian’ny Jiosy rehetra fa tsy niteny na inona na inona an-takona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ka ahoana no anontanianao Ahy? Ireo nihaino Ahy anontaniana izay noteneniko taminy, fa ireo no mahalala izay nolazaiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa nilaza izany i Jesoa, dia nisy anankiray tamin’ny mpiandry raharaha teo namely tahamaina Azy sady nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izany ve no famalinao ny mpisorombe?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy i Jesoa namaly azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha ratsy ny teniko, lazao ny maha ratsy azy; fa raha tsara ihany kosa, nahoana no dia mamely Ahy ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tamin’izay i Jesoa dia nasain’i Hàna nentina am-patorana ho any amin’i Kaiafa mpisorombe.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lavin’i Petera indray i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.71-75; Mk 14.69-72; Lk 22.58-62)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I Simôna Petera kosa mbola nijanona namindro teo, ka nisy nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianao koa ve tsy isan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatr
  - type: text
    text: ’iny Lehilahy iny?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa nandà izy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, tsy anisany aho!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy ny anankiray tamin’ireo mpanompon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
  - type: text
    text: ', havan’ilay nokapain’i Petera ny sofiny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy efa hitako niaraka taminy tao anaty saha ve ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa nandà indray i Petera; ary niaraka tamin’izay dia nisy akoho naneno.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsarain’i Pilato i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.1-3; Mk 15.1-5; Lk 23.1-5)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nentina niala tao amin’i Kaiafa i Jesoa ho any an-dapan’ny governora. Mbola maraina be ny andro tamin’izay. Tsy niditra tao an-dapa anefa ry zareo manampahefana jiosy mba tsy ho voaloto ary mba ho afa-mihinana ny sakafo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa dia i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' no nivoaka nanatona azy teo alatrano ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no iampanganareo io Lehilahy io?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha toa mpanao ratsy Izy, dia tsy ho natolotray anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ka hoy i Pilato taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ento Izy, ka tsarao araka ny lalànanareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hoy ny Jiosy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy manam-pahefana hahafaty olona izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izany dia mba hahatanteraka ny teny nolazain’i Jesoa nanambara ny karazam-pahafatesana efa hanjo Azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 3.14; 12.32 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tamin’izay dia niditra tao an-dapa indray i Pilato, ary niantso an’i Jesoa ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao ve no Mpanjakan’ny Jiosy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Anao samirery izany teny izany sa nisy olon-kafa nilaza Ahy taminao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'I Pilato kosa niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa izaho angaha Jiosy? Ireo olona iray firenena aminao sy ireo lohandoha-mpisorona no nanolotra Anao tamiko; inona moa no nataonao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy anisan’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ' ny Fanjakàko; fa raha an’izao tontolo izao ny Fanjakàko, dia ho niady ny mpanompoko mba tsy ho voatolotra tamin’ny manampahefana jiosy Aho; kanefa tsy anisan’izao etỳ izao ny Fanjakàko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary hoy i Pilato taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Koa Mpanjaka izany Ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Jesoa kosa namaly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Voalazanao fa Mpanjaka Aho. Izao no nahaterahako ary izao no niaviako eto amin’izao tontolo izao: dia ny ho vavolombelona hanambara ny marina. Izay rehetra mpiandany amin’ny marina dia mihaino ny feoko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hoy i Pilato taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no marina?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voaheloka ho faty i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.15-31; Mk 15.6-20; Lk 23.13-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Avy nanontany izany i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ', dia nivoaka nankeo amin’ny Jiosy indray ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho dia tsy mahita izay helony, na dia iray aza! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
