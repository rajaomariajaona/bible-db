document_id: JON.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nitady handositra lavitra ny Tompo i Jônà
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indray andro dia nisy baikon’ny TOMPO tamin’i Jônà zanakalahin’i Amitahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Misy mpaminany* atao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jônà zanakalahin’i Amitahy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voateny ao amin’ny 2 Mp 14.25.'
      marker-yv: yv-n
    - type: text
      text: ' nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia raiki-tahotra ireo matilò raha nitantarany fa hay nandositra ny Tompo izy. Ka hoy ireo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fa naninona ianao no nanao izany? '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hataonay ahoana àry ianao mba hampitony ny ranomasina aminay?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao mainka nihanahery hatrany ny ranomasina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Jônà tamin’ny matilò:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Batao aho ka atsipazo any anaty ranomasina dia hitony aminareo io. Fantatro fa noho ny fahadisoako no mahatonga izao tafio-drivotra mahery izao aminareo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nivoy mafy ireo matilò hahatrarana ny moron-dranomasina nefa tsy nahafa-piry, satria vao mainka nitroatra ny ranomasina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitaraina tamin’ny TOMPO ireo ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –TOMPO ô, aza avelanao ho faty noho ny amin’ity lehilahy ity izahay. Aza atambesatra aminay ny fahafatesan’ny anankiray izay tsy nanan-tsiny. Fa Ianao ry TOMPO no manao araka izay sitrakao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nobatain’ireo i Jônà ka natsipiny tany anaty ranomasina, ary nijanona ny fisafoaky ny tafio-drivotra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natahotra ny TOMPO noho izany ireo matilò ka nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' sady '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nivoady
    - type: text
      text: ' taminy.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitsangàna ka mankanesa any Ninive
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ninive: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: renivohitry ny fanjakana asirianina, jereo 2 Mp 19.36, Nah 1.1...
      marker-yv: yv-n
    - type: text
      text: ', ilay tanàna lehibe. Torio ny amin’ny hamelezana azy, satria tafakatra eto anatrehako ny faharatsian’ny mponiny.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa niainga handositra ho any Tarsîsy hanalavitra ny TOMPO i Jônà. Nankany Jafao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tarsîsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna manamorona ny Ranomasina Mediteranea, tsy voalaza mazava ny toerana marina misy azy, nefa dia tsy maintsy ho amin’ny zotra mifanohitra amin’izay mankany Ninive no nisy azy. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Jafao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', amin’ny teny grika Jôpa (Asa 10.5) dia natao seranan-tsambo ho an’i Jerosalema. Zanabohitr’i Telaviva ankehitriny i Jafao.'
      marker-yv: yv-n
    - type: text
      text: ' izy ka nahita sambo vonona ho any Tarsîsy. Naloany ny saran-dalana, dia niondrana niaraka tamin’ny tantsambo rehetra izy ary nihevitra ny hanalavitra ny TOMPO.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nampifofofofo rivo-mahery teny amin’ny ranomasina ny TOMPO; dia nanonja mafy ny ranomasina ka nila ho vakin’ny tafiotra ny sambo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natahotra mafy ny matilò ka samy niantso vonjy tamin’ny andriamaniny avy. Dia natsipy tany an-dranomasina ny entana mba hanamaivana ny sambo. Tamin’izay kosa i Jônà efa nidina nandry tao anaty sambo iray ka resin-tory. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona azy ny kapitenin-tsambo ary nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa manao inona eto ianao? Toa matory! Mitsangàna, ka mba antsoy koa ny Andriamanitrao, fa angamba hieritreritra antsika Izy ka tsy hamela antsika ho faty.
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: –’Ndeha isika hanao antsapaka hahitana izay tompon’andraikitra mahatonga izao loza izao amintsika.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natao ny antsapaka ka nianjera tamin’i Jônà. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ireo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompon’andraikitra amin’izao loza manjo antsika izao ianao, koa lazao anay izay mahatonga anao eto. Avy taiza ianao? Aiza no tany fiavianao? Olom-pirenena avy aiza ianao?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny navalin’i Jônà ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hebreo aho, ary ny TOMPO Andriamanitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lanitra
    - type: text
      text: ' Izay nanao ny ranomasina sy ny tany no ivavahako.'
