document_id: JON.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nitady handositra lavitra ny Tompo i Jônà
  - type: text
    content: Indray andro dia nisy baikon’ny TOMPO tamin’i Jônà zanakalahin’i Amitahy
  - type: note
    content: Misy mpaminany* atao hoe Jônà zanakalahin’i Amitahy, voateny ao amin’ny 2 Mp 14.25.
  - type: text
    content: ' nanao hoe:'
  '10':
  - type: text
    content: 'Tamin’izay dia raiki-tahotra ireo matilò raha nitantarany fa hay nandositra ny Tompo izy. Ka hoy ireo taminy:'
  - type: text
    content: '–Fa naninona ianao no nanao izany? '
  '11':
  - type: text
    content: Hataonay ahoana àry ianao mba hampitony ny ranomasina aminay?
  - type: text
    content: 'Vao mainka nihanahery hatrany ny ranomasina. '
  '12':
  - type: text
    content: 'Hoy i Jônà tamin’ny matilò:'
  - type: text
    content: –Batao aho ka atsipazo any anaty ranomasina dia hitony aminareo io. Fantatro fa noho ny fahadisoako no mahatonga izao tafio-drivotra mahery izao aminareo.
  '13':
  - type: text
    content: 'Nivoy mafy ireo matilò hahatrarana ny moron-dranomasina nefa tsy nahafa-piry, satria vao mainka nitroatra ny ranomasina. '
  '14':
  - type: text
    content: 'Dia nitaraina tamin’ny TOMPO ireo ka nanao hoe:'
  - type: text
    content: –TOMPO ô, aza avelanao ho faty noho ny amin’ity lehilahy ity izahay. Aza atambesatra aminay ny fahafatesan’ny anankiray izay tsy nanan-tsiny. Fa Ianao ry TOMPO no manao araka izay sitrakao.
  '15':
  - type: text
    content: 'Dia nobatain’ireo i Jônà ka natsipiny tany anaty ranomasina, ary nijanona ny fisafoaky ny tafio-drivotra. '
  '16':
  - type: text
    content: 'Natahotra ny TOMPO noho izany ireo matilò ka nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' sady '
  - type: text
    content: nivoady
  - type: text
    content: ' taminy.'
  '2':
  - type: text
    content: –Mitsangàna ka mankanesa any Ninive
  - type: note
    content: 'Ninive: renivohitry ny fanjakana asirianina, jereo 2 Mp 19.36, Nah 1.1...'
  - type: text
    content: ', ilay tanàna lehibe. Torio ny amin’ny hamelezana azy, satria tafakatra eto anatrehako ny faharatsian’ny mponiny.'
  '3':
  - type: text
    content: Nefa niainga handositra ho any Tarsîsy hanalavitra ny TOMPO i Jônà. Nankany Jafao
  - type: note
    content: 'Tarsîsy: tanàna manamorona ny Ranomasina Mediteranea, tsy voalaza mazava ny toerana marina misy azy, nefa dia tsy maintsy ho amin’ny zotra mifanohitra amin’izay mankany Ninive no nisy azy. –Jafao, amin’ny teny grika Jôpa (Asa 10.5) dia natao seranan-tsambo ho an’i Jerosalema. Zanabohitr’i Telaviva ankehitriny i Jafao.'
  - type: text
    content: ' izy ka nahita sambo vonona ho any Tarsîsy. Naloany ny saran-dalana, dia niondrana niaraka tamin’ny tantsambo rehetra izy ary nihevitra ny hanalavitra ny TOMPO.'
  '4':
  - type: text
    content: 'Fa nampifofofofo rivo-mahery teny amin’ny ranomasina ny TOMPO; dia nanonja mafy ny ranomasina ka nila ho vakin’ny tafiotra ny sambo. '
  '5':
  - type: text
    content: 'Natahotra mafy ny matilò ka samy niantso vonjy tamin’ny andriamaniny avy. Dia natsipy tany an-dranomasina ny entana mba hanamaivana ny sambo. Tamin’izay kosa i Jônà efa nidina nandry tao anaty sambo iray ka resin-tory. '
  '6':
  - type: text
    content: 'Dia nanatona azy ny kapitenin-tsambo ary nanontany azy hoe:'
  - type: text
    content: –Fa manao inona eto ianao? Toa matory! Mitsangàna, ka mba antsoy koa ny Andriamanitrao, fa angamba hieritreritra antsika Izy ka tsy hamela antsika ho faty.
  '7':
  - type: text
    content: –’Ndeha isika hanao antsapaka hahitana izay tompon’andraikitra mahatonga izao loza izao amintsika.
  - type: text
    content: 'Natao ny antsapaka ka nianjera tamin’i Jônà. '
  '8':
  - type: text
    content: 'Hoy ireo taminy:'
  - type: text
    content: –Tompon’andraikitra amin’izao loza manjo antsika izao ianao, koa lazao anay izay mahatonga anao eto. Avy taiza ianao? Aiza no tany fiavianao? Olom-pirenena avy aiza ianao?
  '9':
  - type: text
    content: 'Hoy ny navalin’i Jônà ireo:'
  - type: text
    content: '–Hebreo aho, ary ny TOMPO Andriamanitry ny '
  - type: text
    content: lanitra
  - type: text
    content: ' Izay nanao ny ranomasina sy ny tany no ivavahako.'
