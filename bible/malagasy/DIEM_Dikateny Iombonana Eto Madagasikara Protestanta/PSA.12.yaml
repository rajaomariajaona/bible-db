document_id: PSA.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny Tenin’ny Tompo eo anivon’ny fahalòvan’izao tontolo izao.
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hampiarahina amin’ny valiha torifolo
  - type: note
    content: Jereo Sal 6.1 sy nta.
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  '2':
  - type: text
    content: Mba vonjeo re, TOMPO ô,
  - type: text
    content: fa miharingana ny mpivavaka marina;
  - type: text
    content: ary dia tsy misy intsony
  - type: text
    content: ny olona azo itokiana.
  '3':
  - type: text
    content: 'Lainga hatrany no ifampilazana:'
  - type: text
    content: ny teny mandoka fa ny fo tsy azo antoka.
  '4':
  - type: text
    content: Hofoanan’ny TOMPO avokoa anie
  - type: text
    content: ny mpandoka sy ireo avo vava,
  '5':
  - type: text
    content: 'dia ireo izay manambara hoe:'
  - type: text
    content: «Ny filàzanay no handresenay lahatra;
  - type: text
    content: hainay ny miteny, ka tsisy atahoranay!»
  '6':
  - type: text
    content: 'Hoy kosa ny TOMPO hoe:'
  - type: text
    content: «Hirotsaka an-tsehatra Aho izao
  - type: text
    content: noho ireo mahantra ampahorîna
  - type: text
    content: sy ireo malahelo mitaraina;
  - type: text
    content: hovonjeko ireo voavingavinga
  - type: note
    content: 'ireo voavingavinga: jereo Sal 10.5.'
  - type: text
    content: .»
  '7':
  - type: text
    content: ' '
  - type: text
    content: Madio
  - type: text
    content: ' ny tenin’ny TOMPO:'
  - type: text
    content: toa volafotsy voarendrika
  - type: text
    content: tamin’ny memy anaty tany
  - type: text
    content: ka voadio impito miantoana.
  '8':
  - type: text
    content: TOMPO ô, mitana ny teninao Ianao
  - type: text
    content: ka hiambina anay mandrakariva
  - type: text
    content: tsy ho azon’ny karazan’olona toy izany,
  '9':
  - type: text
    content: na dia mihaodihaody aminay aza
  - type: text
    content: ireny ratsy fanahy ireny
  - type: text
    content: ary na dia mihalò hatrany aza
  - type: text
    content: ny toetran’ny olombelona.
