  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba vonjeo re, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa miharingana ny mpivavaka marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dia tsy misy intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olona azo itokiana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lainga hatrany no ifampilazana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny teny mandoka fa ny fo tsy azo antoka.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofoanan’ny TOMPO avokoa anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpandoka sy ireo avo vava,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ireo izay manambara hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny filàzanay no handresenay lahatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hainay ny miteny, ka tsisy atahoranay!»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy kosa ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Hirotsaka an-tsehatra Aho izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ireo mahantra ampahorîna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ireo malahelo mitaraina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hovonjeko ireo voavingavinga
    - type: usfm
