  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Madio
    - type: text
      text: ' ny tenin’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toa volafotsy voarendrika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny memy anaty tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voadio impito miantoana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, mitana ny teninao Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiambina anay mandrakariva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho azon’ny karazan’olona toy izany,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia mihaodihaody aminay aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireny ratsy fanahy ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia mihalò hatrany aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny toetran’ny olombelona.
