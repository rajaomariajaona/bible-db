document_id: HOS.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mofom-pisaonana
  - type: text
    content: Ry Israely ô! Aoka izay
  - type: text
    content: ny fetim-pifaliana mihoa-pampana
  - type: text
    content: toy ny fanaon’ireo firenen-kafa.
  - type: text
    content: Fa efa nanalavitra an’Andriamanitrao ianao
  - type: text
    content: tamin’ny fivarotan-tena nataonao
  - type: text
    content: sy tamin’ny fitiavan-karama maloto
  - type: text
    content: teny am-pivelezam-bary rehetra teny
  - type: note
    content: Eto ny mpaminany dia milaza ny fahavokaram-bary ho toy ny karama izay aloan’ny andriamanitra Bahala ho valin’izany fivarotan-tena izany.
  - type: text
    content: .
  '10':
  - type: text
    content: «Tahaka ny voaloboka any an-taniefitra
  - type: text
    content: no nahitako an’i Israely,
  - type: text
    content: tahaka ny aviavimbazaha
  - type: text
    content: masaka aloha indrindra
  - type: text
    content: no nahitako ny razanareo.
  - type: text
    content: 'Saingy rehefa mby tao '
  - type: text
    content: Bahala
  - type: text
    content: -Pehôra
  - type: note
    content: 'Bahala-Pehôra: na Bety Pehôra: jereo Nom 25.'
  - type: text
    content: ' izy,'
  - type: text
    content: dia nanokan-tena ho amin’ny henatra
  - type: text
    content: ka tonga maharikoriko
  - type: text
    content: toy ilay Bahala notiaviny ihany.
  '11':
  - type: text
    content: 'Ankehitriny ny '
  - type: text
    content: voninahitr
  - type: text
    content: ’i Efraîma
  - type: text
    content: dia hiserana toy ny fiseram-boromanidina;
  - type: text
    content: ka tsy hisy zaza teraka intsony,
  - type: text
    content: na zaza entina am-bohoka
  - type: text
    content: na zaza torontoronina akory aza.
  '12':
  - type: text
    content: Na dia misy mitaiza zanaka aza izy,
  - type: text
    content: dia hoesoriko aminy ireny,
  - type: text
    content: ka tsy hisy miangana.
  - type: text
    content: Eny, hahita loza koa izy
  - type: text
    content: amin’ny handaozako azy.
  '13':
  - type: text
    content: I Efraîma, araka ny hitako,
  - type: text
    content: dia manao ny zanany ho toy ny fihaza
  - type: text
    content: ka mamela azy hisehatra
  - type: text
    content: ny mpamono azy ho faty.»
  '14':
  - type: text
    content: TOMPO ô, inona no sazy
  - type: text
    content: mba homenao azy?
  - type: text
    content: Ataovy momba sy tsy afa-mampinono
  - type: text
    content: ireo vehivavy ao aminy!
  '15':
  - type: text
    content: «Tao Gilgala
  - type: note
    content: 'Tao Gilgala: jereo manokana 1 Sam 11.15; 15.12,21; jereo koa Hôs 4.15; Ham 4.4; 5.5 sy nta.'
  - type: text
    content: ', hoy ihany ny Tompo,'
  - type: text
    content: no niseho ny haratsiany isan-karazany.
  - type: text
    content: Tao no nanombohako nankahala azy.
  - type: text
    content: Horoahiko izy hiala amin’ny toeram-ponenako
  - type: text
    content: noho ny ratsy izay nataony.
  - type: text
    content: Tsy hanam-pitiavana azy intsony Aho;
  - type: text
    content: mpikomy avokoa ny filohany rehetra.
  '16':
  - type: text
    content: 'Voavely i Efraîma:'
  - type: text
    content: maina ny fàkany
  - type: text
    content: ka tsy hamoa intsony izy.
  - type: text
    content: Na dia miteraka aza
  - type: text
    content: ny vehivavy ao aminy,
  - type: text
    content: dia hataoko maty ihany
  - type: text
    content: ny malala naloaky ny kibony.»
  '17':
  - type: text
    content: Harian’ilay Andriamanitro izy
  - type: text
    content: satria tsy nihaino Azy,
  - type: text
    content: ka dia ho tonga mpirenireny
  - type: text
    content: any amin’ny hafa firenena any.
  '2':
  - type: text
    content: Tsy hahafa-po anao anefa
  - type: text
    content: na ny vary eo am-pamoloana
  - type: text
    content: na ny menaka eo am-pamiazana;
  - type: text
    content: ary ny divay vaovao andrasanao
  - type: text
    content: dia handiso fanantenana anao.
  '3':
  - type: text
    content: I Efraîma dia tsy hahazo monina intsony
  - type: text
    content: eo amin’ny tanin’ny TOMPO;
  - type: text
    content: fa tsy maintsy hiverina any Ejipta izy
  - type: text
    content: na hankany Asiria hihinan-java-pady.
  '4':
  - type: text
    content: Tsy ho afa-mandraraka divay intsony izy
  - type: text
    content: mba ho fanatitra ho an’ny TOMPO;
  - type: text
    content: 'tsy hahafaly Azy ny '
  - type: text
    content: sorona
  - type: text
    content: ' ateriny;'
  - type: text
    content: ho toy ny mofom-pisaonana
  - type: text
    content: amin’izy ireo izany,
  - type: text
    content: ka ho voaloto avokoa
  - type: text
    content: izay mihinana azy.
  - type: text
    content: Hahavoky azy ihany ny mofony
  - type: text
    content: fa tsy ho tafiditra ao an-tranon’ny TOMPO.
  '5':
  - type: text
    content: Inona kosa no hataonareo
  - type: text
    content: amin’ny androm-pankalazana manetriketrika,
  - type: text
    content: dia amin’ny andro fetin’ny TOMPO
  - type: note
    content: Mety ho ny fetin’ny tranotomboka; jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
  - type: text
    content: '?'
  '6':
  - type: text
    content: Rehefa tonga ny fandringanana
  - type: text
    content: ka mihahaka ny vahoaka,
  - type: text
    content: dia hanangona anareo i Ejipta;
  - type: text
    content: saingy Memfisa no ho fasanareo.
  - type: text
    content: Ho lovan-tsongosongo
  - type: text
    content: ny fana-bolafotsinareo sarobidy
  - type: text
    content: ary ho tongan’ny tsilo ny fonenanareo.
  '7':
  - type: text
    content: Tonga ny andro famaizana.
  - type: text
    content: Tonga ny andro famaliana
  - type: note
    content: Jereo Lk 21.22.
  - type: text
    content: .
  - type: text
    content: Ho fantatr’i Israely anie izany!
  - type: text
    content: 'Hoy ianareo hoe: «Adala ny '
  - type: text
    content: mpaminany
  - type: text
    content: ;
  - type: text
    content: ary mirediredy ny tsindriam-panahy.»
  - type: text
    content: Vokatry ny hamaroan’ny helokao
  - type: text
    content: sy ny fanohera-mafy nataonao izany.
  '8':
  - type: text
    content: Miaraka amin’Andriamanitro
  - type: text
    content: ny mpitily ho an’i Efraîma,
  - type: text
    content: dia ilay mpaminany.
  - type: text
    content: Amelaram-pandrika izy
  - type: text
    content: amin’izay alehany rehetra;
  - type: text
    content: ary fanoherana no afitsoka azy
  - type: text
    content: hatrany an-tranon’Andriamanitra.
  '9':
  - type: text
    content: Nihoa-pampana ny faharatsianareo
  - type: text
    content: toy ny fahiny tany Gibehà
  - type: note
    content: Jereo Mpits 19–21.
  - type: text
    content: .
  - type: text
    content: Nefa hotsaroan’ny Tompo ny helokareo,
  - type: text
    content: ary hoteteziny tsirairay ny fahotanareo.
  - type: heading
    content: Diso fanantenana ny Tompo
