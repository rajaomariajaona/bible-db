document_id: EXO.38,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny alitara fisoronana sy ny kovetabe fampiasa amin’ny fidiovana
  - type: text
    content: 'Ny '
  - type: text
    content: alitara
  - type: text
    content: ' fisoronana dia namboarina tamin’ny hazo mimôzà'
  - type: note
    content: 'And 1-7: ampit 27.1-8.'
  - type: text
    content: '. Efamira izy io, ka nirefy roa metatra sy sasany ny lafiny tsirairay ary iray metatra sy sasany ny haavony. '
  '10':
  - type: text
    content: 'farango sy ànjaka volafotsy no nanantonana azy teo amin’ny andry halimo roapolo, izay nitsatoka tamin’ny faladia halimo roapolo. '
  '11':
  - type: text
    content: 'Tahaka izany koa ny lafiny avaratra, ka nivelatra dimampolo metatra ny halavan’ny temitra ary nitovy tamin’ny teo ihany ny fanantonana azy. '
  '12':
  - type: text
    content: 'Tamin’ny lafiny andrefana dia nivelatra 25 metatra ny temitra ary nahantona tamin’ny andry folo nisy faladia folo. '
  '13':
  - type: text
    content: 'Tamin’ny lafiny fidirana atsinanana dia 25 metatra koa ny velaran’ny kianja; '
  '14':
  - type: text
    content: ka teo an-daniny roa amin’ny fidirana dia samy nisy temitra fito metatra sy sasany ny halavany, niaraka tamin’ny andry telo sy faladiany telo avy.
  '16':
  - type: text
    content: 'Ny temitra rehetra manodidina ny kianja dia samy vita tamin’ny kiran-drongony mafy avokoa. '
  '17':
  - type: text
    content: 'Ny faladian’ny andry dia halimo, ny farango sy ny anjany dia volafotsy, ny lohan’ny andry dia norakofana takela-bolafotsy; ary ny andry rehetra dia natohin’ny anjaka volafotsy avokoa. '
  '18':
  - type: text
    content: 'Ny efitra lamba eo am-bavahadin’ny kianja dia namboarin’ny mpanao peta-kofehy tamin’ny kiran-drongony mifangaro volon’ondry miloko volomparasy sy mena ary jaky; mirefy folo metatra ny halavany ary roa metatra sy sasany ny haavony, tahaka ireo temitra lamban’ny kianja. '
  '19':
  - type: text
    content: 'Andry efatra misy faladiany halimo efatra no nametahana azy; volafotsy ny farangony sady norakofana volafotsy koa ny lohan’ny andry sy ny anjany. '
  '2':
  - type: text
    content: 'Natao miendrika tandroka ny zorony efatra ambony sady narafitra niaraka tamin’ny tenan’ny alitara, izay norakofana takelaka halimo. '
  '20':
  - type: text
    content: Ny tsîmatra rehetra momba ny fonena-masina sy ny momba ny fefin’ny kianja dia samy natao halimo avokoa.
  - type: heading
    content: Ny tontalin’ny fitaovana nampiasaina
  '21':
  - type: text
    content: 'Ireto no isan’ny fitaovana nampiasaina tamin’ny fonena-masina misy ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: '. Araka ny baikon’i Mosesy, ny fanisana dia nataon’ny '
  - type: text
    content: Levita
  - type: text
    content: ' notarihan’i Itamara, zanakalahin’i Aharôna mpisorona. '
  '22':
  - type: text
    content: 'I Betsalela, zanakalahin’i Orỳ sady zafikelin’i Hora, avy amin’ny fokon’i Joda, no nanatanteraka izay rehetra nandidian’ny TOMPO an’i Mosesy. '
  '23':
  - type: text
    content: I Ôhôliaba, zanakalahin’i Ahisamàka avy amin’ny fokon’i Dana, izay mpandidy vatosoa sy mpanao sary ary mpanao peta-kofehy amin’ny volon’ondry miloko volomparasy sy mena ary jaky sady mpanao peta-kofehy amin’ny kiran-drongony, no nanampy azy tamin’izany.
  '24':
  - type: text
    content: 'Ny fitambaran’ny volamena izay nataon’ny Israelita fanatitra, ka nampiasaina tamin’ny fanaovana ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' dia 877 kilao sy 300 grama araka ny lanja fampiasa tao amin’ny Toeramasina.'
  '25':
  - type: text
    content: Ny fitambaran’ny
  - type: note
    content: 'And 25-26: ampit 30.11-16. Jereo koa Mt 17.24.'
  - type: text
    content: ' volafotsy voarotsaka tamin’ny fanisàm-bahoaka dia 3 017 kilao sy 750 grama araka ny lanja fampiasa ao amin’ny Toeramasina. '
  '26':
  - type: text
    content: 'Izany dia mitovy amin’ny dimy grama isan’olona ho an’ny 603 550 lahy izay roapolo taona no ho miakatra tamin’ny fanisana. '
  '27':
  - type: text
    content: 'Ny 3 000 kilao dia narendrika nanaovana ny faladia zato ho an’ireo andrin’ny Toeramasina sy ny efitra lamba anatiny, izany hoe telopolo kilao isaky ny faladia iray. '
  '28':
  - type: text
    content: Ny 17 kilao sisa kosa dia nanaovana ny farangon’ny andry sy nandrakofana ny lohan’ny andry mbamin’ireo anjaka nampitohy ny andry.
  '29':
  - type: text
    content: 'Ny fitambaran’ny halimo nataon’ny Israelita fanomezana dia 2 124 kilao. '
  '3':
  - type: text
    content: 'Halimo koa no nanaovana ny fanaka rehetra momba ny alitara: dia ny tavy fasiana lavenon-jabora, ny sotrobe fangaronana afo, ny tsatokaty famafazana, ny fitrebi-kena ary ny fitondrana afo. '
  '30':
  - type: text
    content: 'Io no nampiasaina nanamboarana ny faladian’ny andry teo amin’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', ny '
  - type: text
    content: alitara
  - type: text
    content: ' halimo sy ny makarakarany halimo, ny fitaovana rehetra teo amin’ny alitara, '
  '31':
  - type: text
    content: ny faladian’ny fefy sy ny fidirana teo an-kianja ary ny tsîmatra rehetra momba ny fonena-masina sy momba ny fefin’ny kianja.
  '4':
  - type: text
    content: 'Namboarina ny makarakara halimo miendrika harato, ka napetraka teo akaikin’ny fisasahan’ny aty alitara, teo ambanin’ny fehivavany. '
  '5':
  - type: text
    content: 'Natao ny haba halimo efatra ka napetaka teo amin’ny zoro efatry ny makarakara halimo mba hitsofohan’ny bao. '
  '6':
  - type: text
    content: 'Namboarina tamin’ny hazo mimôzà ireo bao roa ireo, dia norakofana takelaka halimo, '
  '7':
  - type: text
    content: ary natsofoka tao anatin’ny haba izay manatrika ny lafiny roa amin’ny alitara mba hilanjana ny makarakara. Hazo fisaka no nandrafetana ny alitara, ka natao holoka aty izany.
  '8':
  - type: text
    content: 'Avy eo, dia namboarina koa ny kovetabe halimo sy ny faladiany halimo; ny fitaratra halimo izay an’ireo vehivavy niasa teo am-baravaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' no nampiasaina tamin’izany'
  - type: note
    content: 'And 8: ampit 30.17-21. –Ireo vehivavy niasa...fihaonana: tsy fantatra izay asa nataon’ireo vehivavy ireo.'
  - type: text
    content: .
  - type: heading
    content: Ny temitry ny kianja
  '9':
  - type: text
    content: Ny fonena-masina
  - type: note
    content: 'And 9-20: ampit 27.9-19.'
  - type: text
    content: ' dia nohodidinina kianja izay nofefena temitra vita amin’ny kiran-drongony mafy. Tamin’ny lafiny atsimo, dia nivelatra dimampolo metatra ny halavan’ny temitra; '
