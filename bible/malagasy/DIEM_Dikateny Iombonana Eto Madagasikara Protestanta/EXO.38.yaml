document_id: EXO.38
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny alitara fisoronana sy ny kovetabe fampiasa amin’ny fidiovana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fisoronana dia namboarina tamin’ny hazo mimôzà'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.1 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 1-7:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 27.1-8.
    marker-yv: yv-n
  - type: text
    text: '. Efamira izy io, ka nirefy roa metatra sy sasany ny lafiny tsirairay ary iray metatra sy sasany ny haavony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Natao miendrika tandroka ny zorony efatra ambony sady narafitra niaraka tamin’ny tenan’ny alitara, izay norakofana takelaka halimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Halimo koa no nanaovana ny fanaka rehetra momba ny alitara: dia ny tavy fasiana lavenon-jabora, ny sotrobe fangaronana afo, ny tsatokaty famafazana, ny fitrebi-kena ary ny fitondrana afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Namboarina ny makarakara halimo miendrika harato, ka napetraka teo akaikin’ny fisasahan’ny aty alitara, teo ambanin’ny fehivavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Natao ny haba halimo efatra ka napetaka teo amin’ny zoro efatry ny makarakara halimo mba hitsofohan’ny bao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Namboarina tamin’ny hazo mimôzà ireo bao roa ireo, dia norakofana takelaka halimo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ary natsofoka tao anatin’ny haba izay manatrika ny lafiny roa amin’ny alitara mba hilanjana ny makarakara. Hazo fisaka no nandrafetana ny alitara, ka natao holoka aty izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Avy eo, dia namboarina koa ny kovetabe halimo sy ny faladiany halimo; ny fitaratra halimo izay an’ireo vehivavy niasa teo am-baravaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' no nampiasaina tamin’izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 30.17-21. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Ireo vehivavy niasa...fihaonana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tsy fantatra izay asa nataon’ireo vehivavy ireo.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny temitry ny kianja
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny fonena-masina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.9 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 9-20:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 27.9-19.
    marker-yv: yv-n
  - type: text
    text: ' dia nohodidinina kianja izay nofefena temitra vita amin’ny kiran-drongony mafy. Tamin’ny lafiny atsimo, dia nivelatra dimampolo metatra ny halavan’ny temitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'farango sy ànjaka volafotsy no nanantonana azy teo amin’ny andry halimo roapolo, izay nitsatoka tamin’ny faladia halimo roapolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tahaka izany koa ny lafiny avaratra, ka nivelatra dimampolo metatra ny halavan’ny temitra ary nitovy tamin’ny teo ihany ny fanantonana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’ny lafiny andrefana dia nivelatra 25 metatra ny temitra ary nahantona tamin’ny andry folo nisy faladia folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tamin’ny lafiny fidirana atsinanana dia 25 metatra koa ny velaran’ny kianja; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: ka teo an-daniny roa amin’ny fidirana dia samy nisy temitra fito metatra sy sasany ny halavany, niaraka tamin’ny andry telo sy faladiany telo avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny temitra rehetra manodidina ny kianja dia samy vita tamin’ny kiran-drongony mafy avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny faladian’ny andry dia halimo, ny farango sy ny anjany dia volafotsy, ny lohan’ny andry dia norakofana takela-bolafotsy; ary ny andry rehetra dia natohin’ny anjaka volafotsy avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny efitra lamba eo am-bavahadin’ny kianja dia namboarin’ny mpanao peta-kofehy tamin’ny kiran-drongony mifangaro volon’ondry miloko volomparasy sy mena ary jaky; mirefy folo metatra ny halavany ary roa metatra sy sasany ny haavony, tahaka ireo temitra lamban’ny kianja. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Andry efatra misy faladiany halimo efatra no nametahana azy; volafotsy ny farangony sady norakofana volafotsy koa ny lohan’ny andry sy ny anjany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny tsîmatra rehetra momba ny fonena-masina sy ny momba ny fefin’ny kianja dia samy natao halimo avokoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tontalin’ny fitaovana nampiasaina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ireto no isan’ny fitaovana nampiasaina tamin’ny fonena-masina misy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: raki-tsoratry ny fanekempihavanana
  - type: text
    text: '. Araka ny baikon’i Mosesy, ny fanisana dia nataon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: ' notarihan’i Itamara, zanakalahin’i Aharôna mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I Betsalela, zanakalahin’i Orỳ sady zafikelin’i Hora, avy amin’ny fokon’i Joda, no nanatanteraka izay rehetra nandidian’ny TOMPO an’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I Ôhôliaba, zanakalahin’i Ahisamàka avy amin’ny fokon’i Dana, izay mpandidy vatosoa sy mpanao sary ary mpanao peta-kofehy amin’ny volon’ondry miloko volomparasy sy mena ary jaky sady mpanao peta-kofehy amin’ny kiran-drongony, no nanampy azy tamin’izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny fitambaran’ny volamena izay nataon’ny Israelita fanatitra, ka nampiasaina tamin’ny fanaovana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' dia 877 kilao sy 300 grama araka ny lanja fampiasa tao amin’ny Toeramasina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny fitambaran’ny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.25 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 25-26:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 30.11-16. Jereo koa Mt 17.24.
    marker-yv: yv-n
  - type: text
    text: ' volafotsy voarotsaka tamin’ny fanisàm-bahoaka dia 3 017 kilao sy 750 grama araka ny lanja fampiasa ao amin’ny Toeramasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izany dia mitovy amin’ny dimy grama isan’olona ho an’ny 603 550 lahy izay roapolo taona no ho miakatra tamin’ny fanisana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny 3 000 kilao dia narendrika nanaovana ny faladia zato ho an’ireo andrin’ny Toeramasina sy ny efitra lamba anatiny, izany hoe telopolo kilao isaky ny faladia iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny 17 kilao sisa kosa dia nanaovana ny farangon’ny andry sy nandrakofana ny lohan’ny andry mbamin’ireo anjaka nampitohy ny andry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny fitambaran’ny halimo nataon’ny Israelita fanomezana dia 2 124 kilao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Io no nampiasaina nanamboarana ny faladian’ny andry teo amin’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ', ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' halimo sy ny makarakarany halimo, ny fitaovana rehetra teo amin’ny alitara, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ny faladian’ny fefy sy ny fidirana teo an-kianja ary ny tsîmatra rehetra momba ny fonena-masina sy momba ny fefin’ny kianja.
