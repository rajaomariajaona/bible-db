document_id: ACT.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anaovan’i Petera tatitra ny Fiangonana tao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ren’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' sy ny havana iray finoana tany Jodea fa efa nandray ny tenin’Andriamanitra koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ka nony tafaverina tany Jerosalema i Petera, dia nifandiran’ireo mpino jiosy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Dia olona tsy voafora ve no niantranoanao sy niarahanao nisakafo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa notantarain’i Petera tamin’ny antsipiriany hatrany am-boalohany izay nitranga, ka hoy izy tamin’ireo mpino jiosy:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '–Tao an-tanànan’i Jôpa aho, ary sendra nivavaka indrindra no nisehoam-pahitana mahavariana. Nisy zavatra nidina avy any an-danitra: toa lamba lehibe voatana amin’ny zorony efatra, nalatsaka avy any ary tonga teo akaikiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nijery tsara sy nandinika ny tao anatiny aho, ka nahita ny biby mandeha tongotra efatra, ny bibidia, ny biby mikisaka amin’ny tany ary ny voro-manidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nisy feo henoko nanao tamiko hoe: «Mitsangàna, ry Petera; mamonoa ka mihinàna!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary novaliako hoe: «Sanatria, Tompoko! Tsy mbola nisy mihitsy zavatra fady na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' niditra ny vavako.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia mbola heno indray ilay feo avy any an-danitra nanao hoe: «Izay efa nambaran’Andriamanitra fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: madio
  - type: text
    text: ', dia aza ataonao ho fady.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Intelo niverina izany, dia nakarina manontolo tany an-danitra indray ilay zavatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tamin’izany fotoana izany indrindra dia indreo nisy olona telo lahy tonga tao amin’ilay trano nitoerako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nitoerako: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nitoerany.
    marker-yv: yv-n
  - type: text
    text: ': iraka avy any Kesaria hankatỳ amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nitenenan’ny Fanahy Masina aho mba tsy hisalasala ny hiaraka aminy. Tafaraka tamiko tany koa ireto havana mpino enina nentiko eto aminareo ireto, ary niditra tao an-tranon’i Kôrnely izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia notantarain’i Kôrnely ny fomba nahitany tao an-trano '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' anankiray izay nanao taminy hoe: «Maniraha lehilahy any Jôpa haka an’i Simôna, izay antsoina koa hoe Petera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hitondra teny hamonjena anao sy ny ankohonanao rehetra izy.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vao nanomboka niteny aho, dia efa nilatsaka tamin’izy rehetra ny Fanahy Masina tahaka ny nilatsahany tamintsika tany am-boalohany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsaroako tamin’izay ilay tenin’ny Tompo hoe: «I Jôhany dia nanao batisa tamin’ny rano; fa ianareo kosa dia hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ' amin’ny Fanahy Masina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.5.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Notoloran’Andriamanitra ny fanomezany isika rehefa nino an’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo; koa raha notoloran’Andriamanitra fanomezana mitovy amin’ny antsika ireo hafa firenena, dia iza moa aho no ho afa-manohitra an’Andriamanitra?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony nandre izany ireo mpino jiosy, dia nitony ary nanome voninahitra an’Andriamanitra ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Marina fa nomen’Andriamanitra ny hafa firenena ihany koa ny hiala amin’ny toe-dratsy mba hahazoany fiainana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Fiangonana tao Antiôkia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Niely patrana ny mpino noho ilay fanenjehana nitranga taorian’ny namonoana an’i Stefàna. Ny sasany dia tonga hatrany Fenisia sy hatrany Sipra ary hatrany Antiôkia, nefa tsy nitory ny tenin’Andriamanitra afa-tsy tamin’ny Jiosy ihany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay fanenjehana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 8.1-4. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Antiôkia:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' renivohitry ny faritany rômanina atao hoe Siria.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nisy ihany mpino sasantsasany avy any Sipra sy avy any Sirena izay tonga tany Antiôkia ka niteny tamin’ireo Grika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Grika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jiosy miteny grika,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ireo Jiosy am-pielezana izany.'
    marker-yv: yv-n
  - type: text
    text: ' koa, ary nanambara ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' momba an’i Jesoa Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nombàn’ny herin’ny Tompo izy rehetra ka marobe ny olona nino sy nitodika tamin’ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nandre ny lazan’izany ny Fiangonana tany Jerosalema, ka naniraka an’i Barnabà hankany Antiôkia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hafaliana ny azy nony tonga tany ka nahita ny vokatry ny fahasoavan’Andriamanitra; ary nananatra azy rehetra i Barnabà mba tsy hiroa fo fa haharitra hiombona amin’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Lehilahy tsara fanahy i Barnabà, sady feno Fanahy Masina sy vontom-pinoana, ka vahoaka maro no niandany tamin’ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary lasa i Barnabà naka an’i Saoly tany Tarsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa hitany izy, dia nentiny nankany Antiôkia. Nandany herintaona ngarangidina tao amin’io Fiangonana io izy roa lahy ary nampianatra vahoaka maro. Tao Antiôkia no voalohany niantsoana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' hoe kristianina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’izany andro izany, dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' sasany avy tany Jerosalema nankany Antiôkia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Isan’ireo i Hagabo izay notsilovin’ny Fanahy Masina ka nijoro nilaza fa hisy mosary be eran’ny tany tontolo. (Dia nitranga tokoa izany tamin’ny andron’i Klaody amperôra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hagabo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manambara zavatra ho avy ny mpaminany kristianina (11.28; 21.10-14) indraindray. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Klaody:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' amperôra fahiny nitondra tao Rôma, ka nifehy ny tany sy ny fanjakana tamin’ny taona 41–54 taor J. K. Ny tahirin-tsoratra tamin’izany fotoana izany dia ahitana fa nisy mosary nihatra tamin’ny toerana samihafa tao anatin’ny fanjakana rômanina tanelanelan’ny taona 46 sy 48 taor J. K.'
    marker-yv: yv-n
  - type: text
    text: '). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nanapa-kevitra ny mpianatra tao Antiôkia fa samy hanome araka izay nanambinana azy avy mba halefa hanampiana ireo havana iray finoana nonina tany Jodea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nataony izany ka nampitondrainy an’i Barnabà mbamin’i Saoly ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholom
  - type: text
    text: -piangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'loholom-piangonana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo koa Asa 14.23; 20-27.
    marker-yv: yv-n
  - type: text
    text: ' tany Jodea.'
