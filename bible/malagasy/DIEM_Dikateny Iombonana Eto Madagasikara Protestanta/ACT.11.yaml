document_id: ACT.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Anaovan’i Petera tatitra ny Fiangonana tao Jerosalema
  - type: text
    content: 'Ren’ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' sy ny havana iray finoana tany Jodea fa efa nandray ny tenin’Andriamanitra koa ny '
  - type: text
    content: hafa firenena
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Intelo niverina izany, dia nakarina manontolo tany an-danitra indray ilay zavatra. '
  '11':
  - type: text
    content: Tamin’izany fotoana izany indrindra dia indreo nisy olona telo lahy tonga tao amin’ilay trano nitoerako
  - type: note
    content: 'nitoerako: misy stf sasany ahitana hoe nitoerany.'
  - type: text
    content: ': iraka avy any Kesaria hankatỳ amiko. '
  '12':
  - type: text
    content: 'Dia nitenenan’ny Fanahy Masina aho mba tsy hisalasala ny hiaraka aminy. Tafaraka tamiko tany koa ireto havana mpino enina nentiko eto aminareo ireto, ary niditra tao an-tranon’i Kôrnely izahay. '
  '13':
  - type: text
    content: 'Dia notantarain’i Kôrnely ny fomba nahitany tao an-trano '
  - type: text
    content: anjely
  - type: text
    content: ' anankiray izay nanao taminy hoe: «Maniraha lehilahy any Jôpa haka an’i Simôna, izay antsoina koa hoe Petera. '
  '14':
  - type: text
    content: 'Hitondra teny hamonjena anao sy ny ankohonanao rehetra izy.» '
  '15':
  - type: text
    content: 'Vao nanomboka niteny aho, dia efa nilatsaka tamin’izy rehetra ny Fanahy Masina tahaka ny nilatsahany tamintsika tany am-boalohany koa. '
  '16':
  - type: text
    content: 'Tsaroako tamin’izay ilay tenin’ny Tompo hoe: «I Jôhany dia nanao batisa tamin’ny rano; fa ianareo kosa dia hatao '
  - type: text
    content: batisa
  - type: text
    content: ' amin’ny Fanahy Masina'
  - type: note
    content: Jereo 1.5.
  - type: text
    content: '.» '
  '17':
  - type: text
    content: 'Notoloran’Andriamanitra ny fanomezany isika rehefa nino an’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo; koa raha notoloran’Andriamanitra fanomezana mitovy amin’ny antsika ireo hafa firenena, dia iza moa aho no ho afa-manohitra an’Andriamanitra?'
  '18':
  - type: text
    content: 'Nony nandre izany ireo mpino jiosy, dia nitony ary nanome voninahitra an’Andriamanitra ka nanao hoe:'
  - type: text
    content: –Marina fa nomen’Andriamanitra ny hafa firenena ihany koa ny hiala amin’ny toe-dratsy mba hahazoany fiainana.
  - type: heading
    content: Ny Fiangonana tao Antiôkia
  '19':
  - type: text
    content: Niely patrana ny mpino noho ilay fanenjehana nitranga taorian’ny namonoana an’i Stefàna. Ny sasany dia tonga hatrany Fenisia sy hatrany Sipra ary hatrany Antiôkia, nefa tsy nitory ny tenin’Andriamanitra afa-tsy tamin’ny Jiosy ihany
  - type: note
    content: 'ilay fanenjehana: jereo 8.1-4. –Antiôkia: renivohitry ny faritany rômanina atao hoe Siria.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Ka nony tafaverina tany Jerosalema i Petera, dia nifandiran’ireo mpino jiosy '
  '20':
  - type: text
    content: Nisy ihany mpino sasantsasany avy any Sipra sy avy any Sirena izay tonga tany Antiôkia ka niteny tamin’ireo Grika
  - type: note
    content: 'Grika: misy stf sasany ahitana hoe Jiosy miteny grika, dia ireo Jiosy am-pielezana izany.'
  - type: text
    content: ' koa, ary nanambara ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba an’i Jesoa Tompo. '
  '21':
  - type: text
    content: Nombàn’ny herin’ny Tompo izy rehetra ka marobe ny olona nino sy nitodika tamin’ny Tompo.
  '22':
  - type: text
    content: 'Nandre ny lazan’izany ny Fiangonana tany Jerosalema, ka naniraka an’i Barnabà hankany Antiôkia. '
  '23':
  - type: text
    content: 'Hafaliana ny azy nony tonga tany ka nahita ny vokatry ny fahasoavan’Andriamanitra; ary nananatra azy rehetra i Barnabà mba tsy hiroa fo fa haharitra hiombona amin’ny Tompo. '
  '24':
  - type: text
    content: Lehilahy tsara fanahy i Barnabà, sady feno Fanahy Masina sy vontom-pinoana, ka vahoaka maro no niandany tamin’ny Tompo.
  '25':
  - type: text
    content: 'Ary lasa i Barnabà naka an’i Saoly tany Tarsa. '
  '26':
  - type: text
    content: 'Rehefa hitany izy, dia nentiny nankany Antiôkia. Nandany herintaona ngarangidina tao amin’io Fiangonana io izy roa lahy ary nampianatra vahoaka maro. Tao Antiôkia no voalohany niantsoana ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' hoe kristianina.'
  '27':
  - type: text
    content: 'Tamin’izany andro izany, dia nisy '
  - type: text
    content: mpaminany
  - type: text
    content: ' sasany avy tany Jerosalema nankany Antiôkia. '
  '28':
  - type: text
    content: Isan’ireo i Hagabo izay notsilovin’ny Fanahy Masina ka nijoro nilaza fa hisy mosary be eran’ny tany tontolo. (Dia nitranga tokoa izany tamin’ny andron’i Klaody amperôra
  - type: note
    content: 'Hagabo: manambara zavatra ho avy ny mpaminany kristianina (11.28; 21.10-14) indraindray. –Klaody: amperôra fahiny nitondra tao Rôma, ka nifehy ny tany sy ny fanjakana tamin’ny taona 41–54 taor J. K. Ny tahirin-tsoratra tamin’izany fotoana izany dia ahitana fa nisy mosary nihatra tamin’ny toerana samihafa tao anatin’ny fanjakana rômanina tanelanelan’ny taona 46 sy 48 taor J. K.'
  - type: text
    content: '). '
  '29':
  - type: text
    content: 'Nanapa-kevitra ny mpianatra tao Antiôkia fa samy hanome araka izay nanambinana azy avy mba halefa hanampiana ireo havana iray finoana nonina tany Jodea. '
  '3':
  - type: text
    content: 'nataony hoe:'
  - type: text
    content: –Dia olona tsy voafora ve no niantranoanao sy niarahanao nisakafo?
  '30':
  - type: text
    content: 'Dia nataony izany ka nampitondrainy an’i Barnabà mbamin’i Saoly ho any amin’ny '
  - type: text
    content: loholom
  - type: text
    content: -piangonana
  - type: note
    content: 'loholom-piangonana: jereo koa Asa 14.23; 20-27.'
  - type: text
    content: ' tany Jodea.'
  '4':
  - type: text
    content: 'Fa notantarain’i Petera tamin’ny antsipiriany hatrany am-boalohany izay nitranga, ka hoy izy tamin’ireo mpino jiosy:'
  '5':
  - type: text
    content: '–Tao an-tanànan’i Jôpa aho, ary sendra nivavaka indrindra no nisehoam-pahitana mahavariana. Nisy zavatra nidina avy any an-danitra: toa lamba lehibe voatana amin’ny zorony efatra, nalatsaka avy any ary tonga teo akaikiko. '
  '6':
  - type: text
    content: 'Nijery tsara sy nandinika ny tao anatiny aho, ka nahita ny biby mandeha tongotra efatra, ny bibidia, ny biby mikisaka amin’ny tany ary ny voro-manidina. '
  '7':
  - type: text
    content: 'Dia nisy feo henoko nanao tamiko hoe: «Mitsangàna, ry Petera; mamonoa ka mihinàna!» '
  '8':
  - type: text
    content: 'Ary novaliako hoe: «Sanatria, Tompoko! Tsy mbola nisy mihitsy zavatra fady na '
  - type: text
    content: maloto
  - type: text
    content: ' niditra ny vavako.» '
  '9':
  - type: text
    content: 'Dia mbola heno indray ilay feo avy any an-danitra nanao hoe: «Izay efa nambaran’Andriamanitra fa '
  - type: text
    content: madio
  - type: text
    content: ', dia aza ataonao ho fady.» '
