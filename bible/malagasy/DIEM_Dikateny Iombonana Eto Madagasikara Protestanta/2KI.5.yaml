document_id: 2KI.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanasitranana an’i Nahamàna marary hoditra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nahamàna no anaran’ny filohan-tafiky ny mpanjakan’i Siria. Lehilahy mendri-kaja sy to teny teo anatrehan’ny tompony izy satria ny Sirianina efa nampandresen’ny TOMPO tamin’ny alalany. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Marary hoditra
    - type: text
      text: ' anefa izany lehilahy maherifo izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary i Elisà naniraka olona hankany aminy hilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana mandro impito ao Jôrdàna, fa hiverina amin’ny toetrany taloha indray ny hoditrao, ka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hadio
    - type: text
      text: ' ianao.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa tezitra i Nahamàna, dia lasa sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Noheveriko fa mba hankatỳ amiko tokoa ilay mpaminany ka hivavaka amin’ny TOMPO Andriamaniny sy hanevaheva ny tanany eo amin’ny faritra marary ary hanasitrana ny aretin-koditro. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsy tsara noho ny renirano rehetra amin’i Israely ve i Abanà sy i Farpara reniranon’i Damasy? Moa tsy azoko atao ve ny mandro ao amin’ireo mba hampahadio ahy?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihodina i Nahamàna ka lasa tamim-pahatezerana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa nanatona azy ny mpanompony ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry ikaky ô, raha toa ka zavatra sarotra no nampanaovin’ny mpaminany anao, moa va tsy ho nataonao izany? Koa nahoana no tsy hataonao izay lazainy aminao hoe: «Mandroa, dia hadio ianao?»'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia nidina i Nahamàna ka nisitrika impito tao Jôrdàna araka ny tenin’ilay olon’Andriamanitra; ary ny hodiny dia tonga tahaka ny hodi-jazakely indray, ka nadio izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 1-14:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Lk 4.27.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia niverina nankao amin’ilay olon’Andriamanitra izy mbamin’ireo rehetra mpanaraka azy; ary niseho teo anatrehany izy ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatro ankehitriny fa tsy misy Andriamanitra eto ambonin’ny tany tontolo afa-tsy ato amin’i Israely ihany. Koa mba raiso ny fanomezana atolotro anao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa hoy ny navalin’i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO izay tompoiko, ka manizingizina aminao aho fa tsy handray izany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitambezo azy handray ihany i Nahamàna, saingy nanda hatrany kosa i Elisà, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Satria nolavinao ny fanomezako, dia avelao aho mba hitondra tany kely zakan’ny boriky roa avy amin’ny taninao; fa izaho tsy mba hanolotra intsony '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo na sorom-pihavanana amin’ny andriamani-kafa afa-tsy amin’ny TOMPO ihany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tamin’izany fotoana izany izay nananan’ny isam-pirenena ny andriamaniny avy, dia noheverina fa ao amin’ny taniny ihany no ahazoana mivavaka amin’ny andriamanitra iray. Koa dia nanantena i Nahamàna fa hoeken’Andriamanitr’i Israely ny sorona nataony, raha toa ka tany Damasy no nanolorany izany teo amin’ny alitara vita tamin’ny tany avy any Israely.
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Saingy mangata-pamelana mialoha amin’ny TOMPO aho momba izao zavatra izao: Raha miditra mba hivavaka ao amin’ny tempolin’i Rimôna andriamaniny ny tompoko mpanjakan’i Siria, dia tsy maintsy hiankohoka hitehi-tany miaraka aminy koa aho satria mitehina amin’ny tanako izy. Ny TOMPO anie hamela heloka ahy amin’izany fihetsiko izany!'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hoy i Elisà taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana ombàm-piadanana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary lasa nandeha i Nahamàna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahadisoan’i Gehazỳ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola tsy lasa lavitra akory i Nahamàna, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nisy mpandroba sirianina nitsofoka an-keriny tany amin’ny tanin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' ka nitondra zazavavikely iray ho babo, izay lasa mpanompon’ny vadin’i Nahamàna. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'dia niteny anakampo i Gehazỳ mpanompon’i Elisà hoe: «Nalefan’ny tompoko tamin’izao fotsiny lahy i Nahamàna ilay Sirianina fa tsy nakany na inona na inona tamin’ny zavatra nentiny. Velona ny TOMPO, ka milokaloka aho fa tsy maintsy hotratrariko iny hahazoako zavatra.» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia lasa i Gehazỳ nanenjika an’i Nahamàna; ary nony nahita azy mihazakazaka manatona kosa i Nahamàna, dia niala faingana tamin’ny kalesiny hitsena azy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsara ihany va ianao?
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hoy ny navaliny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsara ihany aho; saingy nirahin’ny tompoko fotsiny aho hilaza aminao, fa misy zatovo roa lahy anisan’ny andia-
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' tonga ao aminy avy any amin’ny faritra havoan’i Efraîma. Koa miangavy anao izy mba hanome azy roa lahy volafotsy telopolo kilao ary akanjo fitondra mianjaika roa.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia hoy i Nahamàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Volafotsy enimpolo kilao re entina e!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notereny handray izany i Gehazỳ, ary dia nataony tao anaty kitapo roa tsara fehy ny volafotsy enimpolo kilao sy ny akanjo roa; ka nasainy nentin’ny mpanompony roa lahy izay nanaraka an’i Gehazỳ ireo rehetra ireo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Rehefa tonga teo amin’ny toerana atao hoe Hôfela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hôfela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mety ho faritra akaikin’ny fidirana amin’ny tanàna. Io voambolana io dia midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: haavo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ka mety hanondro havoana anankiray. Nisy '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hôfela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' iray koa tany Jerosalema, jereo Ne 3.26-27.'
      marker-yv: yv-n
    - type: text
      text: ' izy, dia nalain’i Gehazỳ ny kitapo sy ny akanjo ka napetrany tao an-tranony; ary nasainy niverina ireo mpanompon’i Nahamàna, ka lasa.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nony tafaverina teo anatrehan’ny tompony kosa i Gehazỳ, dia nanontanian’i Elisà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy taiza ianao, ry Gehazỳ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny navaliny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy avy taiza tsy avy taiza aho, tompoko.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa hoy indray i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Moa ataonao tsy ho hitako am-panahy ve iny lehilahy izay niala tamin’ny kalesiny hitsena anao iny? Tsy fotoana fandraisam-bola na fitafiana, na tanin’ôliva na tanimboaloboka, na ondry aman’osy, na omby, na mpanompolahy na mpanompovavy izao; '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'satria ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: aretin-koditr
    - type: text
      text: ’i Nahamàna dia hiraikitra aminao sy ny taranakao hatrany hatrany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa niala teo anatrehan’i Elisà i Gehazỳ, dia indro fa niempaka fotsy toa oram-panala ny hodiny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary hoy io tamin’ny tompovaviny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha mba afaka mankany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' any Samaria manko ny tompoko, dia hositraniny amin’izao aretin-koditra izao.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia lasa i Namahàna nilaza tamin’ny mpanjaka ny zavatra nambaran’ilay zazavavikely israelita taminy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ka hoy ny mpanjakan’i Siria:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana àry mankany amin’ny mpanjakan’i Israely, fa hampitondra taratasy ho azy aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa i Nahamàna nitondra volafotsy telonjato kilao sy volamena enimpolo kilao ary akanjo fitondra mianjaika folo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Natolony ny mpanjakan’i Israely ny taratasy milaza hoe: «Alefako atỳ aminao miaraka amin’ity taratasy ity i Nahamàna filohan-tafiko mba hositraninao amin’ny aretin-kodiny.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Raha vao voavakin’ny mpanjakan’i Israely ilay taratasy, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nandriatra ny fitafiany
    - type: text
      text: ' izy sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andriamanitra angaha aho ka hahafaty na hahavelona, no andefasan’ilehiny olona hositranina amin’ny aretin-kodiny? Jereonareo tsara fa mila ady amiko mihitsy izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Raha ren’i Elisà olon’Andriamanitra fa nandriatra ny fitafiany ny mpanjakan’i Israely, dia naniraka hankany amin’ny mpanjaka izy nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no nandriatra ny fitafianao ianao? Aoka hankatỳ amiko i Nahamàna mba hahafantarany fa misy mpaminany tokoa amin’i Israely.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia tonga àry i Nahamàna niaraka tamin’ny kalesy aman-tsoavaliny ka niandry teo anoloan’ny varavaran’ny tranon’i Elisà. '
