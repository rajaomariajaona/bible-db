document_id: 2KI.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanasitranana an’i Nahamàna marary hoditra
  - type: text
    content: 'Nahamàna no anaran’ny filohan-tafiky ny mpanjakan’i Siria. Lehilahy mendri-kaja sy to teny teo anatrehan’ny tompony izy satria ny Sirianina efa nampandresen’ny TOMPO tamin’ny alalany. '
  - type: text
    content: Marary hoditra
  - type: text
    content: ' anefa izany lehilahy maherifo izany. '
  '10':
  - type: text
    content: 'Ary i Elisà naniraka olona hankany aminy hilaza hoe:'
  - type: text
    content: '–Mandehana mandro impito ao Jôrdàna, fa hiverina amin’ny toetrany taloha indray ny hoditrao, ka '
  - type: text
    content: hadio
  - type: text
    content: ' ianao.'
  '11':
  - type: text
    content: 'Fa tezitra i Nahamàna, dia lasa sady nanao hoe:'
  - type: text
    content: '–Noheveriko fa mba hankatỳ amiko tokoa ilay mpaminany ka hivavaka amin’ny TOMPO Andriamaniny sy hanevaheva ny tanany eo amin’ny faritra marary ary hanasitrana ny aretin-koditro. '
  '12':
  - type: text
    content: Tsy tsara noho ny renirano rehetra amin’i Israely ve i Abanà sy i Farpara reniranon’i Damasy? Moa tsy azoko atao ve ny mandro ao amin’ireo mba hampahadio ahy?
  - type: text
    content: 'Dia nihodina i Nahamàna ka lasa tamim-pahatezerana. '
  '13':
  - type: text
    content: 'Fa nanatona azy ny mpanompony ka nanao taminy hoe:'
  - type: text
    content: '–Ry ikaky ô, raha toa ka zavatra sarotra no nampanaovin’ny mpaminany anao, moa va tsy ho nataonao izany? Koa nahoana no tsy hataonao izay lazainy aminao hoe: «Mandroa, dia hadio ianao?»'
  '14':
  - type: text
    content: Dia nidina i Nahamàna ka nisitrika impito tao Jôrdàna araka ny tenin’ilay olon’Andriamanitra; ary ny hodiny dia tonga tahaka ny hodi-jazakely indray, ka nadio izy
  - type: note
    content: 'And 1-14: jereo Lk 4.27.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Dia niverina nankao amin’ilay olon’Andriamanitra izy mbamin’ireo rehetra mpanaraka azy; ary niseho teo anatrehany izy ka nanao taminy hoe:'
  - type: text
    content: –Fantatro ankehitriny fa tsy misy Andriamanitra eto ambonin’ny tany tontolo afa-tsy ato amin’i Israely ihany. Koa mba raiso ny fanomezana atolotro anao.
  '16':
  - type: text
    content: 'Fa hoy ny navalin’i Elisà:'
  - type: text
    content: –Velona ny TOMPO izay tompoiko, ka manizingizina aminao aho fa tsy handray izany.
  - type: text
    content: 'Nitambezo azy handray ihany i Nahamàna, saingy nanda hatrany kosa i Elisà, '
  '17':
  - type: text
    content: 'ka nilazany hoe:'
  - type: text
    content: '–Satria nolavinao ny fanomezako, dia avelao aho mba hitondra tany kely zakan’ny boriky roa avy amin’ny taninao; fa izaho tsy mba hanolotra intsony '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo na sorom-pihavanana amin’ny andriamani-kafa afa-tsy amin’ny TOMPO ihany'
  - type: note
    content: Tamin’izany fotoana izany izay nananan’ny isam-pirenena ny andriamaniny avy, dia noheverina fa ao amin’ny taniny ihany no ahazoana mivavaka amin’ny andriamanitra iray. Koa dia nanantena i Nahamàna fa hoeken’Andriamanitr’i Israely ny sorona nataony, raha toa ka tany Damasy no nanolorany izany teo amin’ny alitara vita tamin’ny tany avy any Israely.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Saingy mangata-pamelana mialoha amin’ny TOMPO aho momba izao zavatra izao: Raha miditra mba hivavaka ao amin’ny tempolin’i Rimôna andriamaniny ny tompoko mpanjakan’i Siria, dia tsy maintsy hiankohoka hitehi-tany miaraka aminy koa aho satria mitehina amin’ny tanako izy. Ny TOMPO anie hamela heloka ahy amin’izany fihetsiko izany!'
  '19':
  - type: text
    content: 'Ary hoy i Elisà taminy:'
  - type: text
    content: –Mandehana ombàm-piadanana.
  - type: text
    content: Ary lasa nandeha i Nahamàna.
  - type: heading
    content: Ny fahadisoan’i Gehazỳ
  - type: text
    content: 'Raha mbola tsy lasa lavitra akory i Nahamàna, '
  '2':
  - type: text
    content: 'Ary nisy mpandroba sirianina nitsofoka an-keriny tany amin’ny tanin’i '
  - type: text
    content: Israely
  - type: text
    content: ' ka nitondra zazavavikely iray ho babo, izay lasa mpanompon’ny vadin’i Nahamàna. '
  '20':
  - type: text
    content: 'dia niteny anakampo i Gehazỳ mpanompon’i Elisà hoe: «Nalefan’ny tompoko tamin’izao fotsiny lahy i Nahamàna ilay Sirianina fa tsy nakany na inona na inona tamin’ny zavatra nentiny. Velona ny TOMPO, ka milokaloka aho fa tsy maintsy hotratrariko iny hahazoako zavatra.» '
  '21':
  - type: text
    content: 'Dia lasa i Gehazỳ nanenjika an’i Nahamàna; ary nony nahita azy mihazakazaka manatona kosa i Nahamàna, dia niala faingana tamin’ny kalesiny hitsena azy ka nanao hoe:'
  - type: text
    content: –Tsara ihany va ianao?
  '22':
  - type: text
    content: 'Ary hoy ny navaliny:'
  - type: text
    content: –Tsara ihany aho; saingy nirahin’ny tompoko fotsiny aho hilaza aminao, fa misy zatovo roa lahy anisan’ny andia-
  - type: text
    content: mpaminany
  - type: text
    content: ' tonga ao aminy avy any amin’ny faritra havoan’i Efraîma. Koa miangavy anao izy mba hanome azy roa lahy volafotsy telopolo kilao ary akanjo fitondra mianjaika roa.'
  '23':
  - type: text
    content: 'Dia hoy i Nahamàna:'
  - type: text
    content: –Volafotsy enimpolo kilao re entina e!
  - type: text
    content: 'Notereny handray izany i Gehazỳ, ary dia nataony tao anaty kitapo roa tsara fehy ny volafotsy enimpolo kilao sy ny akanjo roa; ka nasainy nentin’ny mpanompony roa lahy izay nanaraka an’i Gehazỳ ireo rehetra ireo. '
  '24':
  - type: text
    content: Rehefa tonga teo amin’ny toerana atao hoe Hôfela
  - type: note
    content: 'Hôfela: mety ho faritra akaikin’ny fidirana amin’ny tanàna. Io voambolana io dia midika hoe haavo ka mety hanondro havoana anankiray. Nisy Hôfela iray koa tany Jerosalema, jereo Ne 3.26-27.'
  - type: text
    content: ' izy, dia nalain’i Gehazỳ ny kitapo sy ny akanjo ka napetrany tao an-tranony; ary nasainy niverina ireo mpanompon’i Nahamàna, ka lasa.'
  '25':
  - type: text
    content: 'Nony tafaverina teo anatrehan’ny tompony kosa i Gehazỳ, dia nanontanian’i Elisà hoe:'
  - type: text
    content: –Avy taiza ianao, ry Gehazỳ?
  - type: text
    content: 'Ka hoy ny navaliny:'
  - type: text
    content: –Tsy avy taiza tsy avy taiza aho, tompoko.
  '26':
  - type: text
    content: 'Fa hoy indray i Elisà:'
  - type: text
    content: '–Moa ataonao tsy ho hitako am-panahy ve iny lehilahy izay niala tamin’ny kalesiny hitsena anao iny? Tsy fotoana fandraisam-bola na fitafiana, na tanin’ôliva na tanimboaloboka, na ondry aman’osy, na omby, na mpanompolahy na mpanompovavy izao; '
  '27':
  - type: text
    content: 'satria ny '
  - type: text
    content: aretin-koditr
  - type: text
    content: ’i Nahamàna dia hiraikitra aminao sy ny taranakao hatrany hatrany.
  - type: text
    content: Rehefa niala teo anatrehan’i Elisà i Gehazỳ, dia indro fa niempaka fotsy toa oram-panala ny hodiny.
  '3':
  - type: text
    content: 'Ary hoy io tamin’ny tompovaviny:'
  - type: text
    content: '–Raha mba afaka mankany amin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' any Samaria manko ny tompoko, dia hositraniny amin’izao aretin-koditra izao.'
  '4':
  - type: text
    content: Dia lasa i Namahàna nilaza tamin’ny mpanjaka ny zavatra nambaran’ilay zazavavikely israelita taminy.
  '5':
  - type: text
    content: 'Ka hoy ny mpanjakan’i Siria:'
  - type: text
    content: –Mandehana àry mankany amin’ny mpanjakan’i Israely, fa hampitondra taratasy ho azy aho.
  - type: text
    content: 'Dia lasa i Nahamàna nitondra volafotsy telonjato kilao sy volamena enimpolo kilao ary akanjo fitondra mianjaika folo. '
  '6':
  - type: text
    content: 'Natolony ny mpanjakan’i Israely ny taratasy milaza hoe: «Alefako atỳ aminao miaraka amin’ity taratasy ity i Nahamàna filohan-tafiko mba hositraninao amin’ny aretin-kodiny.» '
  '7':
  - type: text
    content: 'Raha vao voavakin’ny mpanjakan’i Israely ilay taratasy, dia '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' izy sady niteny hoe:'
  - type: text
    content: –Andriamanitra angaha aho ka hahafaty na hahavelona, no andefasan’ilehiny olona hositranina amin’ny aretin-kodiny? Jereonareo tsara fa mila ady amiko mihitsy izy.
  '8':
  - type: text
    content: 'Raha ren’i Elisà olon’Andriamanitra fa nandriatra ny fitafiany ny mpanjakan’i Israely, dia naniraka hankany amin’ny mpanjaka izy nanao hoe:'
  - type: text
    content: –Nahoana no nandriatra ny fitafianao ianao? Aoka hankatỳ amiko i Nahamàna mba hahafantarany fa misy mpaminany tokoa amin’i Israely.
  '9':
  - type: text
    content: 'Dia tonga àry i Nahamàna niaraka tamin’ny kalesy aman-tsoavaliny ka niandry teo anoloan’ny varavaran’ny tranon’i Elisà. '
