    - type: text
      text: '4'
  - type: text
    text: 'Ny TOMPO kosa mamaly anareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Inona no hataoko aminao, ry Efraîma?
- type: usfm
  marker: q1
  children:
