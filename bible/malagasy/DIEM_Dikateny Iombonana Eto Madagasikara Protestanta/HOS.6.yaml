  - type: text
    text: 'Hoy ianareo roa tonta hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ndeha hiverina amin’ny TOMPO isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izy no nahatonga ny ratrantsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa Izy ihany no hahasitrana antsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no nikapoka antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa Izy no hitsabo ny ferintsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rehefa afaka roa andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hovelominy indray isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro fahatelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hatsangany indray isika
- type: usfm
  marker: q1
  children:
