document_id: HOS.6,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Hoy ianareo roa tonta hoe:'
  - type: text
    content: «Ndeha hiverina amin’ny TOMPO isika;
  - type: text
    content: fa Izy no nahatonga ny ratrantsika,
  - type: text
    content: nefa Izy ihany no hahasitrana antsika.
  - type: text
    content: Izy no nikapoka antsika
  - type: text
    content: nefa Izy no hitsabo ny ferintsika.
  '10':
  - type: text
    content: Zava-maharikoriko no hitako
  - type: text
    content: tao amin’ny fanjakan’i Israely.
  - type: text
    content: Ny fivarotan-tenan’i Efraîma
  - type: note
    content: Jereo 1.2; 2-4; 4.17 sy nta.
  - type: text
    content: ' no ao'
  - type: text
    content: ka mahaloto an’i Israely.
  '11':
  - type: text
    content: Ny aminao koa, ry Joda,
  - type: text
    content: dia efa voatendry ny fijinjana anao
  - type: note
    content: Ampit Jer 51.33.
  - type: text
    content: .
  - type: heading
    content: Korontana sy loza mananontanona
  - type: text
    content: Rehefa Izaho TOMPO kosa
  - type: text
    content: hanarina indray ny vahoakako
  '2':
  - type: text
    content: Rehefa afaka roa andro,
  - type: text
    content: dia hovelominy indray isika;
  - type: text
    content: amin’ny andro fahatelo
  - type: text
    content: dia hatsangany indray isika
  - type: text
    content: ho velona eo anatrehany.
  '3':
  - type: text
    content: Amin’izay aoka hiaiky ny TOMPO isika;
  - type: text
    content: eny, aoka hiezaka hiaiky Azy isika!
  - type: text
    content: Azo antoka toy ny mazava atsinanana
  - type: text
    content: ny firotsahany hanao izany.
  - type: text
    content: Fa toy ny oram-baratra no hiaviany amintsika,
  - type: text
    content: dia toy ny oran-dohataona manamando tany.»
  '4':
  - type: text
    content: 'Ny TOMPO kosa mamaly anareo hoe:'
  - type: text
    content: «Inona no hataoko aminao, ry Efraîma?
  - type: text
    content: Inona no hataoko aminao, ry Joda?
  - type: text
    content: Fa ny fitiavanareo Ahy
  - type: text
    content: dia toy ny zavona maraina
  - type: text
    content: na tahaka ny ranon’ando
  - type: text
    content: izay levona vetivety!
  '5':
  - type: text
    content: 'Koa ny hafatr’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: no ikapohako anareo;
  - type: text
    content: ny vavako no milaza
  - type: text
    content: fa entiko hovonoina ianareo.
  - type: text
    content: Ary ny didim-pitsarako ny aminareo
  - type: text
    content: dia hipoitra tahaka ny hazavan’ny andro.
  '6':
  - type: text
    content: 'Fitiavana no sitrako fa tsy '
  - type: text
    content: sorona
  - type: note
    content: Andininy ataon’i Jesoa tonon-tsiahy ao amin’ny Mt 9.13; 12.7.
  - type: text
    content: ;
  - type: text
    content: ary ny fiekena Ahy ho Andriamanitra
  - type: text
    content: 'dia tiako noho ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo.»'
  - type: heading
    content: Zava-mahatsiravina tao Israely
  '7':
  - type: text
    content: Tao Adama
  - type: note
    content: Adama dia heverina ho anaran-toerana iray eto (jereo Jos 3.16).
  - type: text
    content: ' kosa ianareo'
  - type: text
    content: 'no nandika ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: tao ianareo no namadika Ahy.
  '8':
  - type: text
    content: I Gilehada
  - type: note
    content: 'Gilehada: tanàna any an-dafy atsinanan’i Jôrdàna (jereo 2 Mp 15.25).'
  - type: text
    content: ' dia tanànan’ny mpanao ratsy,'
  - type: text
    content: izay mamela dian-dra amin’ny falehany.
  '9':
  - type: text
    content: Tahaka ny jiolahy manotrika
  - type: text
    content: no ataon’ny andia-mpisorona
  - type: text
    content: ka amonoany olona ho faty
  - type: text
    content: eny an-dalana mankany Sekema
  - type: note
    content: 'Sekema: foibe tranainy ara-pivavahana ho an’ny foko israelita 12 (jereo Jos 24.1) sady tanàna fialofana (Jos 20.1-7).'
  - type: text
    content: ;
  - type: text
    content: zava-mahatsiravina afitsony!
