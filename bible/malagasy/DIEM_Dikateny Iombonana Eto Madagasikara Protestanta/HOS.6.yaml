    text: ho velona eo anatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Amin’izay aoka hiaiky ny TOMPO isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, aoka hiezaka hiaiky Azy isika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Azo antoka toy ny mazava atsinanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny firotsahany hanao izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa toy ny oram-baratra no hiaviany amintsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny oran-dohataona manamando tany.»
- type: usfm
  marker: q1
  children:
