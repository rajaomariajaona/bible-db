document_id: EZK.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tahom-boaloboka nodorana tamin’ny afo
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '2':
  - type: text
    content: «Ry ilay taranak’olombelona, moa sarobidy kokoa noho ny vatan-kazo avy amin’ny hazo any an’ala ve ny tahom-boaloboka
  - type: note
    content: Ao amin’ny Baiboly ny voaloboka dia ilazana an’ohatra matetika an’i Israely, vahoakan’Andriamanitra, jereo Is 5.1-7; Hôs 10.1; Ezek 17.6-8; 19.10-14; Mk 12.1-11.
  - type: text
    content: '? '
  '3':
  - type: text
    content: 'Moa mety hanaovana fanaka ve izy na hanamboarana fanantonan-javatra? '
  '4':
  - type: text
    content: Tsia, fa ny hatsipy ao anaty afo ho kitay no sahaza ny tahom-boaloboka. Rehefa main’ny afo ny tendrony roa ary efa mirehitra ny eo an-tenatenany
  - type: note
    content: Sarin’ny toe-javatra efa nihatra tao Jerosalema tamin’ny fahababoana voalohany, jereo and 6 sy 7.
  - type: text
    content: ', moa mbola azo ampiasaina hanaovan-javatra ihany ve izy? '
  '5':
  - type: text
    content: Fony mbola tsy nanombinana aza izy, tsy azo nanaovan-javatra; mainka rehefa may sy lanin’ny afo izy, dia tsy azo anaovana na inona na inona intsony.
  '6':
  - type: text
    content: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Ny tahom-boaloboka no atsipy ao anaty afo ho kitay, fa tsy ny vatan-kazo avy amin’ny hazo hafa. Toy izany no hanafaizako ny mponin’i Jerosalema, '
  '7':
  - type: text
    content: fa hirotsaka an-tsehatra Aho hamely azy. Mihevitra ho afaka tamin’ny afo izy kanjo ho levon’ny afo
  - type: note
    content: 'Mihevitra ho afaka...: ny sisa afaka tamin’ny fandrobana voalohany (talohan’ny 587) dia nihevitra ny tenany ho tsy misy atahorana (jereo 11.3,15; 33.24) kanjo tsy ho afaka hitsoaka amin’ny fandravana izy.'
  - type: text
    content: ' ihany. Amin’izay dia hiaiky ianareo fa Izaho no TOMPO, rehefa hirotsaka an-tsehatra hamely azy Aho. '
  '8':
  - type: text
    content: Hataoko lao ny taniny, satria nivadika tamiko ireo. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany›. »
