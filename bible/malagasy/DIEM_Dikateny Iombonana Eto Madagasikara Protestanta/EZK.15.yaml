  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Ry ilay taranak’olombelona, moa sarobidy kokoa noho ny vatan-kazo avy amin’ny hazo any an’ala ve ny tahom-boaloboka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ao amin’ny Baiboly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny voaloboka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ilazana an’ohatra matetika an’i Israely, vahoakan’Andriamanitra, jereo Is 5.1-7; Hôs 10.1; Ezek 17.6-8; 19.10-14; Mk 12.1-11.'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moa mety hanaovana fanaka ve izy na hanamboarana fanantonan-javatra? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsia, fa ny hatsipy ao anaty afo ho kitay no sahaza ny tahom-boaloboka. Rehefa main’ny afo ny tendrony roa ary efa mirehitra ny eo an-tenatenany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sarin’ny toe-javatra efa nihatra tao Jerosalema tamin’ny fahababoana voalohany, jereo and 6 sy 7.
    marker-yv: yv-n
  - type: text
    text: ', moa mbola azo ampiasaina hanaovan-javatra ihany ve izy? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fony mbola tsy nanombinana aza izy, tsy azo nanaovan-javatra; mainka rehefa may sy lanin’ny afo izy, dia tsy azo anaovana na inona na inona intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Ny tahom-boaloboka no atsipy ao anaty afo ho kitay, fa tsy ny vatan-kazo avy amin’ny hazo hafa. Toy izany no hanafaizako ny mponin’i Jerosalema, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fa hirotsaka an-tsehatra Aho hamely azy. Mihevitra ho afaka tamin’ny afo izy kanjo ho levon’ny afo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mihevitra ho afaka...: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny sisa afaka tamin’ny fandrobana voalohany (talohan’ny 587) dia nihevitra ny tenany ho tsy misy atahorana (jereo 11.3,15; 33.24) kanjo tsy ho afaka hitsoaka amin’ny fandravana izy.
    marker-yv: yv-n
  - type: text
    text: ' ihany. Amin’izay dia hiaiky ianareo fa Izaho no TOMPO, rehefa hirotsaka an-tsehatra hamely azy Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hataoko lao ny taniny, satria nivadika tamiko ireo. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany›. »
