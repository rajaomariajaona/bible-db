      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia niteny tamin’i Mosesy ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny dkt sasantsasany, ny and 6.1-23 dia voalahatra ho 6.8-30. Jereo ny naoty tandrifin’ny 5.20.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba handidy an’i Aharôna sy ireo zanany hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Izao no lalàna momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Ny sorona dorana manontolo dia hajanona eo am-patan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' mandritra ny alina mandra-pahamaraina, ka andrehetana afo tsy miato eo amin’ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Avy eo dia hiakanjoan’ny mpisorona ny akanjony sy ny kalisaoniny samy vita amin’ny lamba rongony; ary handraoka ny lavenona avy amin’ny sorona dorana levon’ny afo teo ambonin’ny alitara izy, ka hametraka azy eo anilan’ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hanala ny fanamiany teo ilay mpisorona ka hitafy fanamiana hafa, ary hamoaka ny lavenona ho eny ivelan’ny toby, amina toerana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: madio
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Harehitra tsy avela ho faty ny afo eo ambonin’ny alitara, fa hisy kitay hazo hatohoky ny mpisorona eo isa-maraina; dia halahany eo ambonin’ireo kitay ireo ny sorona dorana manontolo ary hodorany hanetona eo koa ny tavin-kenan’ny sorom-pihavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ka afo tsy maty no hirehitra lalandava eo ambonin’ny alitara.
- type: usfm
  marker: s1
  children:
  - type: text
    text: b. Ny fanatitra vokatry ny tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Izao no lalàna momba ny fanatitra vokatry ny tany:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Ireo zanakalahin’i Aharôna no hanolotra azy eo anatrehan’ny TOMPO, eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hangalan’ny mpisorona anankiray eran-tanan’ila ilay koba lafarinina voararaka menaka mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovoka zava-manitra
  - type: text
    text: ' rehetra eo amboniny, ka hodorany hanetona eo ambonin’ny alitara izany fanati-pahatsiarovana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' izany mba ho hanitra ankasitrahin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny sisa amin’ny fanatitra kosa dia hohanin’i Aharôna sy ny taranany; kanefa hataony mofo tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: ' izany, vao hohaniny eo amina faritra voatokana, dia eo amin’ny kianjan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy hasiana leviora no hanendasana azy; satria izany anjara omeko ny mpisorona izany, dia ambin’ilay fanatitra nolevonina tamin’ny afo ho Ahy. Zava-masina dia masina izany, tahaka ny amin’ny sorona fanalana ny ota sy tahaka ny ambin’ny sorom-panonerana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny lehilahy rehetra taranak’i Aharôna ihany no mihinana izany: anjara raikitra ho azy hatrany hatrany izany ambin’ny fanatitra nolevonina tamin’ny afo ho an’ny TOMPO izany. Ny olon-kafa rehetra, izay mikasika izany mofo izany, dia hofaizin’ny fahamasinan’Andriamanitra.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '«Izao no fanatitra fanaon’i Aharôna sy ireo taranany amiko TOMPO, rehefa voahosotra ho mpisorona izy: koba lafarinina telo kilao isan’andro, ka ny antsasany maraina, ary ny antsasany hariva. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Haroana menaka izany koba izany, dia hendasina amin’ny lapoaly; ary rehefa voaendy izy, dia vakivakîna, vao atao fanatitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny rijan-teny hebreo, amin’ity and ity, dia manjavozavo, ka tsy azo antoka ny dkt aroso.
    marker-yv: yv-n
  - type: text
    text: ' ho hanitra ankasitrahina ho Ahy Tompo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Rehefa misy anankiray amin’ny taranak’i Aharôna voahosotra ho mpisorombe handimby azy, dia hanao izany fanatitra izany koa izy. Anjara raikitra ho Ahy TOMPO izany ka hodorana hanetona avokoa: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ny fanatitra rehetra avy amina mpisorona dia hodorana avokoa, fa tsy misy tavela hohanina.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sorona fanalana ny ota
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niteny tamin’i Mosesy indray ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'mba hamepetra an’i Aharôna sy ireo zanany lahy hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Izao no lalàna momba ny sorona fanalana ny ota:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Eo amin’ny toerana famonoana ny sorona dorana manontolo, dia eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasin
  - type: text
    text: '’ny TOMPO, no famonoana ny sorona fanalana ny ota. Zava-masina dia masina izany, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka ilay mpisorona manolotra azy ho fanalana ny ota no hihinana azy eo amina faritra voatokana, dia eo amin’ny kianjan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny olon-kafa rehetra, izay mikasika ny henan’izany sorona izany, dia hofaizin’ny fahamasinan’Andriamanitra. Raha misy fitafiana ipitihan’ny rany, dia hosasana eo amina toerana voatokana ny faritra nipitihany: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny vilany tany izay nandrahoany azy dia homontsanina; fa raha vilany varahina no nandrahoana azy, dia hodiovina sy hohontsanan-drano ilay vilany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny lehilahy rehetra anisan’ny mpisorona no mahazo mihinana io hena io, satria zava-masina dia masina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Kanefa ny sorona fanalana ny ota, izay angalan-dra hoentina ao amin’ny Tranolay fihaonana mba hanaovana ny fombam-pivavahana famelan-keloka ao amin’ny Toeramasina, dia tsy hohanina ny henany fa hodorana amin’ny afo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 4.3-21
    marker-yv: yv-n
  - type: text
    text: .
