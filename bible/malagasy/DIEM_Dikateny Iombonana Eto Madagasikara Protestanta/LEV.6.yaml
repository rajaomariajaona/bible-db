document_id: LEV.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fepetra arahin’ny mpisorona
  - type: heading
    content: a. Ny sorona dorana manontolo
  - type: text
    content: Dia niteny tamin’i Mosesy ny TOMPO
  - type: note
    content: Amin’ny dkt sasantsasany, ny and 6.1-23 dia voalahatra ho 6.8-30. Jereo ny naoty tandrifin’ny 5.20.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Tsy hasiana leviora no hanendasana azy; satria izany anjara omeko ny mpisorona izany, dia ambin’ilay fanatitra nolevonina tamin’ny afo ho Ahy. Zava-masina dia masina izany, tahaka ny amin’ny sorona fanalana ny ota sy tahaka ny ambin’ny sorom-panonerana. '
  '11':
  - type: text
    content: 'Ny lehilahy rehetra taranak’i Aharôna ihany no mihinana izany: anjara raikitra ho azy hatrany hatrany izany ambin’ny fanatitra nolevonina tamin’ny afo ho an’ny TOMPO izany. Ny olon-kafa rehetra, izay mikasika izany mofo izany, dia hofaizin’ny fahamasinan’Andriamanitra.»'
  '12':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe: '
  '13':
  - type: text
    content: '«Izao no fanatitra fanaon’i Aharôna sy ireo taranany amiko TOMPO, rehefa voahosotra ho mpisorona izy: koba lafarinina telo kilao isan’andro, ka ny antsasany maraina, ary ny antsasany hariva. '
  '14':
  - type: text
    content: Haroana menaka izany koba izany, dia hendasina amin’ny lapoaly; ary rehefa voaendy izy, dia vakivakîna, vao atao fanatitra
  - type: note
    content: Ny rijan-teny hebreo, amin’ity and ity, dia manjavozavo, ka tsy azo antoka ny dkt aroso.
  - type: text
    content: ' ho hanitra ankasitrahina ho Ahy Tompo.'
  '15':
  - type: text
    content: '«Rehefa misy anankiray amin’ny taranak’i Aharôna voahosotra ho mpisorombe handimby azy, dia hanao izany fanatitra izany koa izy. Anjara raikitra ho Ahy TOMPO izany ka hodorana hanetona avokoa: '
  '16':
  - type: text
    content: ny fanatitra rehetra avy amina mpisorona dia hodorana avokoa, fa tsy misy tavela hohanina.»
  - type: heading
    content: Ny sorona fanalana ny ota
  '17':
  - type: text
    content: 'Dia niteny tamin’i Mosesy indray ny TOMPO '
  '18':
  - type: text
    content: 'mba hamepetra an’i Aharôna sy ireo zanany lahy hoe:'
  - type: text
    content: '«Izao no lalàna momba ny sorona fanalana ny ota:'
  - type: text
    content: '«Eo amin’ny toerana famonoana ny sorona dorana manontolo, dia eo anoloan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO, no famonoana ny sorona fanalana ny ota. Zava-masina dia masina izany, '
  '19':
  - type: text
    content: 'ka ilay mpisorona manolotra azy ho fanalana ny ota no hihinana azy eo amina faritra voatokana, dia eo amin’ny kianjan’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '; '
  '2':
  - type: text
    content: 'mba handidy an’i Aharôna sy ireo zanany hoe:'
  - type: text
    content: '«Izao no lalàna momba ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo:'
  - type: text
    content: '«Ny sorona dorana manontolo dia hajanona eo am-patan’ny '
  - type: text
    content: alitara
  - type: text
    content: ' mandritra ny alina mandra-pahamaraina, ka andrehetana afo tsy miato eo amin’ny alitara. '
  '20':
  - type: text
    content: 'ny olon-kafa rehetra, izay mikasika ny henan’izany sorona izany, dia hofaizin’ny fahamasinan’Andriamanitra. Raha misy fitafiana ipitihan’ny rany, dia hosasana eo amina toerana voatokana ny faritra nipitihany: '
  '21':
  - type: text
    content: 'Ny vilany tany izay nandrahoany azy dia homontsanina; fa raha vilany varahina no nandrahoana azy, dia hodiovina sy hohontsanan-drano ilay vilany. '
  '22':
  - type: text
    content: 'Ny lehilahy rehetra anisan’ny mpisorona no mahazo mihinana io hena io, satria zava-masina dia masina izany. '
  '23':
  - type: text
    content: Kanefa ny sorona fanalana ny ota, izay angalan-dra hoentina ao amin’ny Tranolay fihaonana mba hanaovana ny fombam-pivavahana famelan-keloka ao amin’ny Toeramasina, dia tsy hohanina ny henany fa hodorana amin’ny afo
  - type: note
    content: Jereo 4.3-21
  - type: text
    content: .
  '3':
  - type: text
    content: 'Avy eo dia hiakanjoan’ny mpisorona ny akanjony sy ny kalisaoniny samy vita amin’ny lamba rongony; ary handraoka ny lavenona avy amin’ny sorona dorana levon’ny afo teo ambonin’ny alitara izy, ka hametraka azy eo anilan’ny alitara. '
  '4':
  - type: text
    content: 'Dia hanala ny fanamiany teo ilay mpisorona ka hitafy fanamiana hafa, ary hamoaka ny lavenona ho eny ivelan’ny toby, amina toerana '
  - type: text
    content: madio
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Harehitra tsy avela ho faty ny afo eo ambonin’ny alitara, fa hisy kitay hazo hatohoky ny mpisorona eo isa-maraina; dia halahany eo ambonin’ireo kitay ireo ny sorona dorana manontolo ary hodorany hanetona eo koa ny tavin-kenan’ny sorom-pihavanana. '
  '6':
  - type: text
    content: Ka afo tsy maty no hirehitra lalandava eo ambonin’ny alitara.
  - type: heading
    content: b. Ny fanatitra vokatry ny tany
  '7':
  - type: text
    content: '«Izao no lalàna momba ny fanatitra vokatry ny tany:'
  - type: text
    content: '«Ireo zanakalahin’i Aharôna no hanolotra azy eo anatrehan’ny TOMPO, eo anoloan’ny '
  - type: text
    content: alitara
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Dia hangalan’ny mpisorona anankiray eran-tanan’ila ilay koba lafarinina voararaka menaka mbamin’ny '
  - type: text
    content: vovoka zava-manitra
  - type: text
    content: ' rehetra eo amboniny, ka hodorany hanetona eo ambonin’ny alitara izany fanati-pahatsiarovana'
  - type: note
    content: Jereo 2.2 sy nta.
  - type: text
    content: ' izany mba ho hanitra ankasitrahin’ny TOMPO. '
  '9':
  - type: text
    content: 'Ny sisa amin’ny fanatitra kosa dia hohanin’i Aharôna sy ny taranany; kanefa hataony mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ' izany, vao hohaniny eo amina faritra voatokana, dia eo amin’ny kianjan’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
