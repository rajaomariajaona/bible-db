document_id: 1KI.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpiasam-panjakana ambony tamin’ny fanjakan’i Salômôna
  - type: text
    content: 'I Salômôna mpanjaka no nanjaka tamin’i Israely manontolo. '
  '10':
  - type: text
    content: 'ny zanakalahin’i Heseda, tao Arobôta, no nisahana an’i Sôkao sy ny faritr’i Hefera manontolo; '
  '11':
  - type: text
    content: 'ny zanakalahin’i Abinadaba no nisahana an’i Dôra manontolo (nanambady an’i Tafata zanakavavin’i Salômôna izy); '
  '12':
  - type: text
    content: 'i Bahanà zanakalahin’i Ahiloda no nisahana an’i Tahanàka sy i Megidao ary ny faritr’i Bety-Seàna manontolo (ny faritr’i Bety-Seàna dia mihazo anilan’i Tsaretàna eo ambanin’i Jizrehela ary mipaka any Bety-Seàna sy Abela Mehôlà ka hatrany ankoatran’i Jôknehama); '
  '13':
  - type: text
    content: 'ny zanakalahin’i Gebera, tao Ramôta any Gilehada, no nisahana an’i Havôta-Jaîro izay fananan’i Jaîro zanakalahin’i Manase tao Gilehada, ary koa nisahana ny faritanin’i Argôba izay tao '
  - type: text
    content: Basàna
  - type: text
    content: ': tanàna enimpolo nisy manda manodidina sy hidy halimo ireo; '
  '14':
  - type: text
    content: 'i Ahinadaba zanakalahin’i Hidao no tao amin’ny faritr’i Mahanaîma; '
  '15':
  - type: text
    content: 'i Ahimahatsa no tao amin’ny faritr’i Naftalỳ (izy koa dia nanambady ny zanakavavin’i Salômôna nantsoina hoe Basemata); '
  '16':
  - type: text
    content: 'i Bahanà zanakalahin’i Hosay no tao amin’ny faritr’i Asera sy i Behalôta; '
  '17':
  - type: text
    content: 'i Jôsafata zanakalahin’i Paroa no tao amin’ny faritr’i Jisakara; '
  '18':
  - type: text
    content: 'i Simehỳ zanakalahin’i Elà no tao amin’ny faritr’i Benjamîna; '
  '19':
  - type: text
    content: 'i Gebera zanakalahin’i Orỳ no tao amin’ny tanin’i Gilehada mbamin’ny tanin’i Sihôna mpanjakan’ny '
  - type: text
    content: Amôrita
  - type: text
    content: ', ary ny tanin’i Hôga mpanjakan’i Basàna. Ankoatra ireo, dia mbola nisy koa governora iray tao amin’ny tanin’i Joda'
  - type: note
    content: 'Joda: ny dkt grika tranainy no ahitana io teny io fa tsy ny RM mahazatra.'
  - type: text
    content: .
  '2':
  - type: text
    content: Ireto avy ny anaran’ny mpiasam-panjakana ambony teo aminy
  - type: note
    content: Ampitahao amin’ny lisitra mitovy aminy ao 2 Sam 8.15-18.
  - type: text
    content: ': I Hazarià zanakalahin’i Tsadôka no mpisorona; '
  '20':
  - type: text
    content: Ary ny mponin’i Joda sy i Israely dia marobe tahaka ny fasika amoron-dranomasina. Nanan-kohanina sy hosotroina ireo ka niaina finaritra.
  '3':
  - type: text
    content: 'i Elihôrefa sy i Ahià, samy zanakalahin’i Sisà, no mpitantsoratra; i Jôsafata zanakalahin’i Ahiloda no mpitondratenin’ny mpanjaka; '
  '4':
  - type: text
    content: 'i Benaià zanakalahin’i Jôiadà no filohan’ny tafika; i Tsadôka sy i Abiatara no mpisorona; '
  '5':
  - type: text
    content: 'i Hazarià zanakalahin’i Natàna no filohan’ny governora; i Zaboda zanakalahin’i Natàna no mpisorona sady mpanolotsaina manokan’ny mpanjaka; '
  '6':
  - type: text
    content: i Ahisara no lehiben’ny tao an-dapa; i Adônirama zanakalahin’i Habdà no mpiandraikitra ny asa an-terivozona.
  '7':
  - type: text
    content: 'Nanana governora 12 lahy izay nisolotena azy teo amin’i Israely manontolo koa i Salômôna; ireo no namatsy ny mpanjaka sy ny olona tao an-dapany ka nifandimby nisahana izany andraikitra izany iray volana isan-taona. '
  '8':
  - type: text
    content: Ireto avy ny anarany
  - type: note
    content: Amin’ny and 8, 9, 10, 11 ary 13, ny anaran’ny governora dia tsy ao. Angamba voadika tamin’ny tahirintsoratra simba ny lisitra.
  - type: text
    content: ':'
  - type: text
    content: 'Ny zanakalahin’i Hora no tany amin’ny faritra be tendrombohitra any Efraîma; '
  '9':
  - type: text
    content: 'ny zanakalahin’i Dekera no tao Makatsa sy Sahalbima ary Bety-Semesy sy Elôna-Bety-Hanàna; '
