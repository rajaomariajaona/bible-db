document_id: PRO.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Tompo eo amin’ny fiainana andavanandro
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fikasana no an’ny olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa an’ny TOMPO kosa ny teny farany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny olona mihevitra ny ataony ho mety avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny TOMPO no mitsara ny toe-panahy manesika azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ankino amin’ny TOMPO ny asanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tanteraka izay kasainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Samy misy antony avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zava-drehetra nataon’ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka na dia ny ratsy fanahy aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nataony ho amin’ny androm-pamaizana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Halan’ny TOMPO ny olona miavona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: azo antoka fa hofaiziny ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manafa-keloka ny fitiavana sy ny toetra mahatoky;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanajana ny TOMPO no ialana amin’ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Rehefa sitraky ny TOMPO ny fitondrantenan’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia ny fahavalony aza ampihavaniny aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aleo manan-kely ombàm-pahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay ny karama be azo amin’ny tsy rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny fon’ny olona no maminavina ny hizorany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny TOMPO kosa no mandavorary ny diany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Teny ombàm-pahefàn’Andriamanitra no ambaran’ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba diso ny didim-pitsarana avoakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Araka ny TOMPO ny mizàna sy lela-mizàna marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary asany avokoa ireo vato tsy mandainga ao an-kitapo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Halan’ny mpanjaka ny fanaovan-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria fahamarinana no iorenan’ny sezafiandrianany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Filazana ny marina no sitraky ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay miteny mahitsy no tiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fahatezeran’ny mpanjaka dia iraka mahafaty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny hendry kosa no manao izay hitonian’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha miran-tava ny mpanjaka, dia mamelombelona aina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hatsaram-pony dia toa rahona mitondra oram-pararano.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiainana ara-piaraha-monina sy ara-pitondrantena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aleo mahazo fahendrena toy izay mahazo volamena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aleo mahazo fahaiza-manavaka toy izay volafotsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny lalan’ny olo-mahitsy midify ny ratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitandrina ny alehany no miaro ny ainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny fiavonavonana mialoha ny faharavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fireharehana mialoha ny fahalavoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aleo manetry tena miaraka amin’ny olona mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay mizara babo miaraka amin’ny mpiavonavona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay mahay mandini-draharaha no hahita soa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay matoky ny TOMPO no ho sambatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay hendry fanomban-javatra no atao hoe manan-tsaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny teny mamy no maharesy lahatra kokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Loharanom-piainana ho an’izay manana azy ny fahaizana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny hadalàny ihany no manafay ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny hendry mieritreritra aloha vao miteny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mahatonga ny teniny haharesy lahatra kokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny teny mamy dia toy ny toho-tantely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka sady hafinaretam-panahy no fahasalamam-batana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Misy toetra heverin’ny olona ho mahitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo mankany amin’ny fahafatesana no iafarany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 14.12 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny hanoanana no mahatonga ny mpiasa hiasa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny fanirian-kanina no manesika azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mikotrika faharatsiana ny olon-tsy vanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toa misy afo mandevona eo amin’ny molony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny mpihatsaravelatsihy manangana ady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpanendrikendrika mampisaraka ny mpisakaiza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny olona lozabe manangoly ny namany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitarika azy ho amin’ny lalan-tsy mahasoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Izay mikimpy maso sy manaikitraiki-molotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miteti-dratsy sy mikasa anao izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Satroboninahitra marevaka ny volo fotsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fizorana amam-pahamarinana no ahazoana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny tena mahery dia izay maharesy ny hatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aleo mahafehy tena toy izay mahafehy tanàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ahontsankontsana ny kodiakely hahalalan-javatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mipoitra eo kosa dia avy amin’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mampahatsiahy ilay fomba fampiasana ny kodiakely masina mba hahalalana ny sitrapon’Andriamanitra (jereo Eks 28.30).
    marker-yv: yv-n
  - type: text
    text: .
