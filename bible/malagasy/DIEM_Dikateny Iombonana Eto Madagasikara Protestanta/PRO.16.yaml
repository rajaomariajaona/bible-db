document_id: PRO.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Tompo eo amin’ny fiainana andavanandro
  - type: text
    content: Fikasana no an’ny olombelona
  - type: text
    content: fa an’ny TOMPO kosa ny teny farany.
  '10':
  - type: text
    content: Teny ombàm-pahefàn’Andriamanitra no ambaran’ny mpanjaka;
  - type: text
    content: ka tsy mba diso ny didim-pitsarana avoakany.
  '11':
  - type: text
    content: Araka ny TOMPO ny mizàna sy lela-mizàna marina;
  - type: text
    content: ary asany avokoa ireo vato tsy mandainga ao an-kitapo.
  '12':
  - type: text
    content: Halan’ny mpanjaka ny fanaovan-dratsy,
  - type: text
    content: satria fahamarinana no iorenan’ny sezafiandrianany.
  '13':
  - type: text
    content: Filazana ny marina no sitraky ny mpanjaka,
  - type: text
    content: ary izay miteny mahitsy no tiany.
  '14':
  - type: text
    content: Ny fahatezeran’ny mpanjaka dia iraka mahafaty;
  - type: text
    content: fa ny hendry kosa no manao izay hitonian’izany.
  '15':
  - type: text
    content: Raha miran-tava ny mpanjaka, dia mamelombelona aina;
  - type: text
    content: ary ny hatsaram-pony dia toa rahona mitondra oram-pararano.
  - type: heading
    content: Ny fiainana ara-piaraha-monina sy ara-pitondrantena
  '16':
  - type: text
    content: Aleo mahazo fahendrena toy izay mahazo volamena,
  - type: text
    content: ary aleo mahazo fahaiza-manavaka toy izay volafotsy
  - type: note
    content: Jereo 2.4 sy nta.
  - type: text
    content: .
  '17':
  - type: text
    content: Ny lalan’ny olo-mahitsy midify ny ratsy;
  - type: text
    content: izay mitandrina ny alehany no miaro ny ainy.
  '18':
  - type: text
    content: Ny fiavonavonana mialoha ny faharavana,
  - type: text
    content: ary ny fireharehana mialoha ny fahalavoana.
  '19':
  - type: text
    content: Aleo manetry tena miaraka amin’ny olona mahantra
  - type: text
    content: toy izay mizara babo miaraka amin’ny mpiavonavona.
  '2':
  - type: text
    content: Ny olona mihevitra ny ataony ho mety avokoa;
  - type: text
    content: fa ny TOMPO no mitsara ny toe-panahy manesika azy.
  '20':
  - type: text
    content: Izay mahay mandini-draharaha no hahita soa;
  - type: text
    content: ary izay matoky ny TOMPO no ho sambatra.
  '21':
  - type: text
    content: Izay hendry fanomban-javatra no atao hoe manan-tsaina;
  - type: text
    content: ary ny teny mamy no maharesy lahatra kokoa.
  '22':
  - type: text
    content: Loharanom-piainana ho an’izay manana azy ny fahaizana;
  - type: text
    content: fa ny hadalàny ihany no manafay ny adala.
  '23':
  - type: text
    content: Ny hendry mieritreritra aloha vao miteny,
  - type: text
    content: ka mahatonga ny teniny haharesy lahatra kokoa.
  '24':
  - type: text
    content: Ny teny mamy dia toy ny toho-tantely,
  - type: text
    content: ka sady hafinaretam-panahy no fahasalamam-batana.
  '25':
  - type: text
    content: Misy toetra heverin’ny olona ho mahitsy
  - type: text
    content: kanjo mankany amin’ny fahafatesana no iafarany
  - type: note
    content: Jereo 14.12 sy nta.
  - type: text
    content: .
  '26':
  - type: text
    content: Ny hanoanana no mahatonga ny mpiasa hiasa,
  - type: text
    content: satria ny fanirian-kanina no manesika azy.
  '27':
  - type: text
    content: Mikotrika faharatsiana ny olon-tsy vanona,
  - type: text
    content: ary toa misy afo mandevona eo amin’ny molony.
  '28':
  - type: text
    content: Ny mpihatsaravelatsihy manangana ady,
  - type: text
    content: ary ny mpanendrikendrika mampisaraka ny mpisakaiza.
  '29':
  - type: text
    content: Ny olona lozabe manangoly ny namany,
  - type: text
    content: ka mitarika azy ho amin’ny lalan-tsy mahasoa.
  '3':
  - type: text
    content: Ankino amin’ny TOMPO ny asanao,
  - type: text
    content: dia ho tanteraka izay kasainao.
  '30':
  - type: text
    content: Izay mikimpy maso sy manaikitraiki-molotra
  - type: text
    content: dia miteti-dratsy sy mikasa anao izany.
  '31':
  - type: text
    content: Satroboninahitra marevaka ny volo fotsy;
  - type: text
    content: fizorana amam-pahamarinana no ahazoana azy.
  '32':
  - type: text
    content: Ny tena mahery dia izay maharesy ny hatezerany,
  - type: text
    content: fa aleo mahafehy tena toy izay mahafehy tanàna.
  '33':
  - type: text
    content: Ahontsankontsana ny kodiakely hahalalan-javatra
  - type: text
    content: fa izay mipoitra eo kosa dia avy amin’ny TOMPO
  - type: note
    content: Mampahatsiahy ilay fomba fampiasana ny kodiakely masina mba hahalalana ny sitrapon’Andriamanitra (jereo Eks 28.30).
  - type: text
    content: .
  '4':
  - type: text
    content: Samy misy antony avokoa
  - type: text
    content: ny zava-drehetra nataon’ny TOMPO;
  - type: text
    content: ka na dia ny ratsy fanahy aza
  - type: text
    content: dia nataony ho amin’ny androm-pamaizana.
  '5':
  - type: text
    content: Halan’ny TOMPO ny olona miavona;
  - type: text
    content: azo antoka fa hofaiziny ireny.
  '6':
  - type: text
    content: Manafa-keloka ny fitiavana sy ny toetra mahatoky;
  - type: text
    content: ary ny fanajana ny TOMPO no ialana amin’ny ratsy.
  '7':
  - type: text
    content: Rehefa sitraky ny TOMPO ny fitondrantenan’ny olona,
  - type: text
    content: na dia ny fahavalony aza ampihavaniny aminy.
  '8':
  - type: text
    content: Aleo manan-kely ombàm-pahamarinana
  - type: text
    content: toy izay ny karama be azo amin’ny tsy rariny.
  '9':
  - type: text
    content: Ny fon’ny olona no maminavina ny hizorany;
  - type: text
    content: fa ny TOMPO kosa no mandavorary ny diany.
  - type: heading
    content: Ny amin’ny mpanjaka
