document_id: JOB.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fonjan-kevitr’i Elihò: Mampitandrina ny olona Andriamanitra'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Meteza ianao, ry Jôba, hihaino ny kabariko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampandria sofina amin’ny teniko rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Indro efa hanoka-bava aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa mby eo an-delako ny teny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: An-kitsimpo tanteraka no hitenenako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia hilaza ny tena marina aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa Fanahin’Andriamanitra no nahariana ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fofonain’ilay Tsitoha no mamelona ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Valio aho, raha azonao atao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: omany ny fotokevitrao, ka mifanatreha amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa mitovy isika eo anoloan’Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tanimanga no samy namolavolana antsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny tahotra ahy tsy mampihontsona anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahefàko tsy mitambesatra aminao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Reko ary mbola ato an-tsofiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny feon’ny teninao manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Tsy manan-tsiny aho ary tsy manan-keloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: madio ary tsy manam-pahadisoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nefa Andriamanitra dia mbola mahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: zavatra hokianina amiko ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihevitra ahy ho fahavalony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy mamela ahy handeha an-kalalahana Izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 13.27 sy nta.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mitsikilo ny fihetsiko rehetra.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izany, hoy aho, no mahadiso anao, ry Jôba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria lehibe loatra Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hany ka tsy azon’ny olona ifanandrinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa nahoana Izy no iadianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tsy mamaly izay fanontanianao?
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Na dia miteny aza Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamerimberina izany, dia tsy misy miraika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Rehefa sondrian-tory amin’ny alina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jôb 4.13.
    marker-yv: yv-n
  - type: text
    text: ' ny olona'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka renoka tanteraka eo am-pandriany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny nofy sy fahitana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no fomba itenenan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: anaovany fanambaràna ireo amin’izay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary asiany tombokase ny fampitandremany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: mba hampiala azy amin’ny fanaony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hampifady azy ny fiavonavona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Toy izany no iarovan’Andriamanitra ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho hankany amin’ny fahaverezana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amonjeny ny ainy tsy hiharan-tsabatra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Anarin’Andriamanitra koa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fanaintainana eo am-pandriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa ampangovitin’ny tazo tsy misy farany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mankaloiloy azy ny sakafo amin’izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mampahazoto homana azy izay hanim-py.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mihamahia izy ka ny nofony tsy misy hojerena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny taolany tsy hita taloha no mitranitrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Efa mihamanatona ny fasana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ainy efa ho an-tanan’ny mpaka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' iray ao anatin’ny arivo'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tonga mba hanampy io olona io
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampahafantatra azy ny adidiny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: dia hiantra azy ilay anjely
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hanao amin’Andriamanitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aza avela hidina any am-pasana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa nahita avotra ho azy aho.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia hihatanora indray ny tenan’ilay narary teo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiverina amin’ny andro mahazatovo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mivavaka amin’Andriamanitra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahazo sitraka aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: am-piravoravoana no anatrehany tava
- type: usfm
  marker: q1
  children:
  - type: text
    text: an’Ilay manolotra fahafahana ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hihira izy ka hilaza amin’ny besinimaro hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Efa nanota aho fa nandika ny rariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy arakaraka ny nataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: no namaizan’Andriamanitra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nanavotra ahy tsy hidina any am-pasana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka velona sy mahita ny mazava aho!»
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izany rehetra izany no ataon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: indroa na intelo tamin’ny olona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: mba hamerenany azy tsy ho any am-pasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanazavany azy amin’ny fahazavan’ny velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tandremo, ry Jôba, ka henoy tsara aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mangina kely aloha fa izaho mbola hiteny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Kanefa raha manana havaly ianao, dia lazao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitenena, fa satriko hanana ny marina ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Raha tsy misy havalinao kosa, dia henoy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mangina tsara ianao, fa hampianariko fahendrena.
