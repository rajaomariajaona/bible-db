document_id: JOB.33,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fonjan-kevitr’i Elihò: Mampitandrina ny olona Andriamanitra'
  - type: text
    content: Meteza ianao, ry Jôba, hihaino ny kabariko
  - type: text
    content: ary mampandria sofina amin’ny teniko rehetra.
  '10':
  - type: text
    content: Nefa Andriamanitra dia mbola mahita
  - type: text
    content: zavatra hokianina amiko ihany
  - type: text
    content: ary mihevitra ahy ho fahavalony.
  '11':
  - type: text
    content: Tsy mamela ahy handeha an-kalalahana Izy
  - type: note
    content: Jereo 13.27 sy nta.
  - type: text
    content: fa mitsikilo ny fihetsiko rehetra.»
  '12':
  - type: text
    content: Izany, hoy aho, no mahadiso anao, ry Jôba;
  - type: text
    content: satria lehibe loatra Andriamanitra
  - type: text
    content: hany ka tsy azon’ny olona ifanandrinana.
  '13':
  - type: text
    content: Koa nahoana Izy no iadianao
  - type: text
    content: rehefa tsy mamaly izay fanontanianao?
  - type: heading
    content: '*'
  '14':
  - type: text
    content: Na dia miteny aza Andriamanitra
  - type: text
    content: ka mamerimberina izany, dia tsy misy miraika.
  '15':
  - type: text
    content: Rehefa sondrian-tory amin’ny alina
  - type: note
    content: Ampit Jôb 4.13.
  - type: text
    content: ' ny olona'
  - type: text
    content: ka renoka tanteraka eo am-pandriany,
  - type: text
    content: dia amin’ny nofy sy fahitana
  - type: text
    content: no fomba itenenan’Andriamanitra;
  '16':
  - type: text
    content: anaovany fanambaràna ireo amin’izay,
  - type: text
    content: ary asiany tombokase ny fampitandremany,
  '17':
  - type: text
    content: mba hampiala azy amin’ny fanaony
  - type: text
    content: sy hampifady azy ny fiavonavona.
  '18':
  - type: text
    content: Toy izany no iarovan’Andriamanitra ny olona
  - type: text
    content: tsy ho hankany amin’ny fahaverezana
  - type: text
    content: ary amonjeny ny ainy tsy hiharan-tsabatra.
  - type: heading
    content: '*'
  '19':
  - type: text
    content: Anarin’Andriamanitra koa izy
  - type: text
    content: amin’ny fanaintainana eo am-pandriana
  - type: text
    content: rehefa ampangovitin’ny tazo tsy misy farany.
  '2':
  - type: text
    content: Indro efa hanoka-bava aho
  - type: text
    content: fa efa mby eo an-delako ny teny.
  '20':
  - type: text
    content: Mankaloiloy azy ny sakafo amin’izany;
  - type: text
    content: tsy mampahazoto homana azy izay hanim-py.
  '21':
  - type: text
    content: Mihamahia izy ka ny nofony tsy misy hojerena;
  - type: text
    content: fa ny taolany tsy hita taloha no mitranitrany.
  '22':
  - type: text
    content: Efa mihamanatona ny fasana izy,
  - type: text
    content: ary ny ainy efa ho an-tanan’ny mpaka azy.
  '23':
  - type: text
    content: 'Raha misy '
  - type: text
    content: anjely
  - type: text
    content: ' iray ao anatin’ny arivo'
  - type: text
    content: tonga mba hanampy io olona io
  - type: text
    content: ka hampahafantatra azy ny adidiny,
  '24':
  - type: text
    content: dia hiantra azy ilay anjely
  - type: text
    content: 'ka hanao amin’Andriamanitra hoe:'
  - type: text
    content: «Aza avela hidina any am-pasana izy,
  - type: text
    content: fa efa nahita avotra ho azy aho.»
  - type: heading
    content: '*'
  '25':
  - type: text
    content: Dia hihatanora indray ny tenan’ilay narary teo
  - type: text
    content: ka hiverina amin’ny andro mahazatovo azy.
  '26':
  - type: text
    content: Mivavaka amin’Andriamanitra izy
  - type: text
    content: ary mahazo sitraka aminy;
  - type: text
    content: am-piravoravoana no anatrehany tava
  - type: text
    content: an’Ilay manolotra fahafahana ny olona.
  '27':
  - type: text
    content: 'Hihira izy ka hilaza amin’ny besinimaro hoe:'
  - type: text
    content: «Efa nanota aho fa nandika ny rariny;
  - type: text
    content: nefa tsy arakaraka ny nataoko
  - type: text
    content: no namaizan’Andriamanitra ahy.
  '28':
  - type: text
    content: Nanavotra ahy tsy hidina any am-pasana Izy
  - type: text
    content: ka velona sy mahita ny mazava aho!»
  - type: heading
    content: '*'
  '29':
  - type: text
    content: Izany rehetra izany no ataon’Andriamanitra
  - type: text
    content: indroa na intelo tamin’ny olona,
  '3':
  - type: text
    content: An-kitsimpo tanteraka no hitenenako
  - type: text
    content: ka dia hilaza ny tena marina aho.
  '30':
  - type: text
    content: mba hamerenany azy tsy ho any am-pasana
  - type: text
    content: sy hanazavany azy amin’ny fahazavan’ny velona.
  '31':
  - type: text
    content: Tandremo, ry Jôba, ka henoy tsara aho;
  - type: text
    content: mangina kely aloha fa izaho mbola hiteny.
  '32':
  - type: text
    content: Kanefa raha manana havaly ianao, dia lazao;
  - type: text
    content: mitenena, fa satriko hanana ny marina ianao.
  '33':
  - type: text
    content: Raha tsy misy havalinao kosa, dia henoy aho;
  - type: text
    content: mangina tsara ianao, fa hampianariko fahendrena.
  '4':
  - type: text
    content: Fa Fanahin’Andriamanitra no nahariana ahy
  - type: text
    content: ary fofonain’ilay Tsitoha no mamelona ahy.
  '5':
  - type: text
    content: Valio aho, raha azonao atao;
  - type: text
    content: omany ny fotokevitrao, ka mifanatreha amiko.
  '6':
  - type: text
    content: 'Fa mitovy isika eo anoloan’Andriamanitra:'
  - type: text
    content: tanimanga no samy namolavolana antsika.
  '7':
  - type: text
    content: Ny tahotra ahy tsy mampihontsona anao,
  - type: text
    content: ary ny fahefàko tsy mitambesatra aminao.
  - type: heading
    content: '*'
  '8':
  - type: text
    content: Reko ary mbola ato an-tsofiko
  - type: text
    content: 'ny feon’ny teninao manao hoe:'
  '9':
  - type: text
    content: «Tsy manan-tsiny aho ary tsy manan-keloka,
  - type: text
    content: madio ary tsy manam-pahadisoana.
