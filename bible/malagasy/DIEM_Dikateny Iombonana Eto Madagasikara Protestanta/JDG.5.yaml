document_id: JDG.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tononkiran’i DebôràIty tononkira tranainy dia tranainy ity dia mirakitra andian-teny sarotra faritana ny heviny.
  - type: text
    content: 'Tamin’izany andro izany i Debôrà dia nihira niaraka tamin’i Baràka zanakalahin’i Abinôhama ka nanao hoe:'
  '10':
  - type: text
    content: Ianareo izay mitaingina borikivavy fotsy,
  - type: text
    content: ianareo izay mipetraka eo ambony karipetra,
  - type: text
    content: ianareo izay mandeha eny an-dalana,
  - type: text
    content: mankalazà ny TOMPO noho ny fandresena
  - type: note
    content: Tamin’izay fotoana izay ny borikivavy no fitaingin’ireo lehibe sy olona manan-daza; ny karipetra eto dia karipetra eo amin’ny laselim-borikivavy (10.4; Nom 22.26).
  - type: text
    content: '!'
  '11':
  - type: text
    content: Teo akaikin’ny fampisotroan-drano,
  - type: text
    content: ireo mpizara rano ho an’ny biby fiompy
  - type: text
    content: no nankalaza ny fandresen’ny TOMPO,
  - type: text
    content: dia fandresena nomeny ireo lehiben’i Israely
  - type: text
    content: fony injay nirotsaka hiady
  - type: text
    content: teo am-bavahadin’ny tanàna
  - type: text
    content: ilay vahoakan’ny TOMPO.
  '12':
  - type: text
    content: Mifohaza, mifohaza ianao, ry Debôrà,
  - type: text
    content: mifohaza, mifohaza ianao, ka miventesa hiran’ady.
  - type: text
    content: Ry Baràka zanakalahin’i Abinôhama,
  - type: text
    content: mitsangàna ka ataovy babo ireo mpamabo anao.
  '13':
  - type: text
    content: Nirohotra nankany amin’ny lehibeny ireo Israelita
  - type: text
    content: ary nivory teo amiko ny vahoakan’ny TOMPO
  - type: text
    content: niaraka tamin’ireo lehilahy mahery fo.
  '14':
  - type: text
    content: Ireo taranaka avy any Efraîma
  - type: text
    content: dia efa tonga ao an-dohasaha,
  - type: text
    content: ka narahin’ny fokon’i Benjamîna
  - type: text
    content: izay nifangaro tamin’ny andian-tafiny.
  - type: text
    content: Nipoitra avy amin’ny terak’i Makira
  - type: note
    content: Ny terak’i Makira dia anisan’ny foko manasita, jereo Jos 17.1.
  - type: text
    content: ' ireo mpitari-tafika'
  - type: text
    content: ary avy amin’ny fokon’i Zebolòna ireo manampahefana.
  '15':
  - type: text
    content: Ireo lehiben’i Jisakara dia niandany tamin’i Debôrà;
  - type: text
    content: ary nifikitra tamin’i Baràka ny fokon’i Jisakara
  - type: text
    content: ka niriotra nanaraka azy teny amin’ny tany lemaka.
  - type: text
    content: Tao amin’ny fokon’i Reobena
  - type: note
    content: Ny fokon’i Reobena dia tsy tapa-kevitra ny handray anjara amin’ny ady. Misy foko hafa koa homen-tsiny toy izany, dia ny foko tao Gilehada ary ny foko danita sy aserita (and 17).
  - type: text
    content: ' kosa'
  - type: text
    content: dia adihevitra tsisy farany.
  '16':
  - type: text
    content: Nahoana ianareo no nijanona
  - type: text
    content: teny anelanelan’ny vala
  - type: text
    content: 'hihaino ny siotsiokan’ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry?'
  - type: text
    content: Tao amin’ny fokon’i Reobena tokoa
  - type: text
    content: dia adihevitra tsisy farany.
  '17':
  - type: text
    content: Tsy nihetsika koa ny terak’i Gilehada
  - type: note
    content: 'Gilehada: anarana mahazatra iantsoana ny faritra atsinanan’i Jôrdàna, izay niorenan’ny foko gadita sy ny antsasa-poko manasita (jereo Nom 32.1).'
  - type: text
    content: teny an-dafy atsinanan’i Jôrdàna.
  - type: text
    content: Ary nahoana ny fokon’i Dana
  - type: note
    content: Tamin’izany andro izany ny fokon’i Dana dia mbola tao andrefan’ny faritr’i Benjamîna (jereo 18.1 sy nta). Angamba niasa ho tantsambo tamin’ny sambo fenisianina ny Danita.
  - type: text
    content: no nipetra-potsiny teo anilan’ny sambony?
  - type: text
    content: Ny fokon’i Asera
  - type: note
    content: Ny fokon’i Asera dia nahazo ny lemaka amoron-tsiraka eo avaratry ny tendrombohitra Karmela.
  - type: text
    content: ' koa nonina teo amoron-dranomasina'
  - type: text
    content: ka nijanona teo amin’ny fitodian-tsambony.
  '18':
  - type: text
    content: Ny vahoakan’i Zebolòna mbamin’i Naftalỳ kosa
  - type: text
    content: dia nanaiky hanao vy very ny ainy
  - type: text
    content: teo an-tany fiadiana, na dia ho faty aza!
  '19':
  - type: text
    content: Tonga hiady ireo mpanjakan’i Kanahàna
  - type: text
    content: ka dia nanafika tao Tahenàka,
  - type: text
    content: teo akaikin’ny loharanon’i Megidao
  - type: note
    content: I Tahenàka sy i Megidao dia tanàna kanahanita teo amoron’ny lemaka Jizrehela, ilany atsimo.
  - type: text
    content: ','
  - type: text
    content: nefa tsy nahazo na babo na volafotsy!
  '2':
  - type: text
    content: Efa samy vonon-kiantafika
  - type: text
    content: ny vatan-dehilahy eto Israely
  - type: note
    content: Fitenenana volo misandrahaka no hita eto ara-bakiteny. Kanefa toa fomban’ny miaramila vonon-kiady izany.
  - type: text
    content: ','
  - type: text
    content: nanolo-tena hiady ny vahoaka;
  - type: text
    content: koa isaory ny TOMPO izany!
  '20':
  - type: text
    content: Avy eny an-danitra eny
  - type: text
    content: no nandray anjara tamin’ny ady koa ny kintana,
  - type: text
    content: ka ny fihodinkodinana arahiny
  - type: text
    content: no niadiany tamin’i Siserà.
  '21':
  - type: text
    content: Renirano efa nikoriana hatry ny ela,
  - type: text
    content: dia ny renirano Kisôna
  - type: note
    content: 'Ny renirano Kisôna: jereo ny naoty momba ny 4.7'
  - type: text
    content: ','
  - type: text
    content: no nipaoka ny fahavalo.
  - type: text
    content: Aoka mba hiroso hiady amin-kerim-po koa aho!
  '22':
  - type: text
    content: Dia nihazakazaka mafy ny soavaly;
  - type: text
    content: ka nikatrokatroka ny hitsa-kitrony.
  '23':
  - type: text
    content: Ozòny ny tanàna Merôza
  - type: note
    content: 'Merôza: 12 km eo atsimo atsinanan’i Kedesa any Naftalỳ.'
  - type: text
    content: ','
  - type: text
    content: 'hoy ilay '
  - type: text
    content: anjeli
  - type: text
    content: n’ny TOMPO.
  - type: text
    content: Ozòny, ozòny ny mponina ao aminy
  - type: text
    content: noho izy tsy tonga hikatroka
  - type: text
    content: niaraka tamin’ireo mahery fo
  - type: text
    content: mba hanampy ny TOMPO hiady.
  '24':
  - type: text
    content: ' '
  - type: text
    content: Hotahîna
  - type: text
    content: ' mihoatra noho ny vehivavy rehetra kosa anie'
  - type: text
    content: i Jahela izay vadin’i Hebera lehilahy kenita!
  - type: text
    content: Eny, hotahîna mihoatra noho ny vehivavy rehetra
  - type: text
    content: izay mitoetra an-day anie izy!
  '25':
  - type: text
    content: Fa rano no nangatahin’i Siserà;
  - type: text
    content: nefa ronono kosa no nomeny azy,
  - type: text
    content: dia rononomandry tao anaty tsatokaty marevaka.
  '26':
  - type: text
    content: Avy eo noraisiny tamin’ny tanan-kavia ny tsimaday
  - type: text
    content: ary tamin’ny tanan-kavanana ny tantanan’ny mpiasa,
  - type: text
    content: dia nasiany ka vaky ny lohan’i Siserà;
  - type: text
    content: ary nataony gorobaka ny fihirifany.
  '27':
  - type: text
    content: Teo an-tongo-dravehivavy izy
  - type: text
    content: no nitolefika sy nianjera ary nitsitra;
  - type: text
    content: teo an-tongo-dravehivavy teo izy
  - type: text
    content: no nitolefika sy nianjera;
  - type: text
    content: teo amin’ny nahatolefika azy teo izy
  - type: text
    content: no nianjera ka maty.
  '28':
  - type: text
    content: Nitazana teo am-baravarankely ny renin’i Siserà,
  - type: text
    content: 'teo anelanelan’ny makarakara izy no nitaraina hoe:'
  - type: text
    content: «Nahoana àry no mbola tsy tonga ihany ny kalesiny?
  - type: text
    content: Nahoana àry no mitaredretra any ny kalesiny?»
  '29':
  - type: text
    content: Izay hendry indrindra tamin’ireo andriambavy namany
  - type: text
    content: no nanome azy izao valinteny manaraka izao,
  - type: text
    content: 'ka izany koa no naverimberin’ny tenany hoe:'
  '3':
  - type: text
    content: Mihainoa ianareo, ry mpanjaka,
  - type: text
    content: manongilàna sofina ianareo, ry mpifehy,
  - type: text
    content: fa hihira ho an’ny TOMPO aho;
  - type: text
    content: eny, hikaloako salamo
  - type: text
    content: ny TOMPO Andriamanitr’i Israely.
  '30':
  - type: text
    content: «Manangona babo izay ny miaramila,
  - type: text
    content: 'ary mbola eo am-pizaràna azy:'
  - type: text
    content: tovovavy iray na roa isaky ny mahery fo;
  - type: text
    content: karazan-damba miloko samy hafa
  - type: text
    content: sady vita peta-kofehy ho an’i Siserà;
  - type: text
    content: eny, lamba vita peta-kofehy anatiny sy ivelany
  - type: text
    content: no hahodidina ny vozon’ilay mpamabo.»
  '31':
  - type: text
    content: TOMPO ô, aoka ny fahavalonao rehetra
  - type: text
    content: ho faty tahaka an’i Siserà avokoa;
  - type: text
    content: fa ny sakaizanao kosa anie ho toy ny masoandro
  - type: text
    content: fony izy miposaka mamirapiratra mafy indrindra!
  - type: text
    content: Dia nandry feizay ny tany nandritra ny efapolo taona.
  '4':
  - type: text
    content: Rehefa tonga avy tany Edôma Ianao, Tompo ô,
  - type: text
    content: ka nidina avy teny an-tendrombohitra Sehira
  - type: note
    content: 'Sehira: jereo Gen 32.4.'
  - type: text
    content: ','
  - type: text
    content: dia nihovotrovotra ny tany,
  - type: text
    content: ary nandrotsaka orana ny rahona,
  - type: text
    content: dia ora-mikija avy any an-danitra;
  '5':
  - type: text
    content: ny tendrombohitra niempo teo anatrehanao,
  - type: text
    content: ry TOMPO niseho tany Sinay
  - type: note
    content: Jereo Eks 19.18.
  - type: text
    content: ;
  - type: text
    content: ny tendrombohitra niempo teo anatrehanao,
  - type: text
    content: ry TOMPO Andriamanitr’i Israely.
  '6':
  - type: text
    content: Tamin’ny andron’i Samgary zanakalahin’i Hanata
  - type: text
    content: sy tamin’ny andron’i Jahela
  - type: note
    content: 'Samgary: jereo 3.31. Jahela: jereo 4.17-22.'
  - type: text
    content: dia nidify ity faritra ity
  - type: text
    content: ny andian’ireo mpitaingin-drameva
  - type: note
    content: 'nidify...ireo mpitaingin-drameva: ny Kanahanita tao an-tany lemaka dia nisakana ny fivezivezen’ny olona sy ny andian-drameva teo amin’ny foko avaratra sy tamin’ny faritra be tendrombohitra any Efraîma.'
  - type: text
    content: ;
  - type: text
    content: fa nanaraka lalan-kafa ireo mpandeha.
  '7':
  - type: text
    content: Tsy nisy lehibe intsony,
  - type: text
    content: tsy nisy lehibe intsony teto amin’i Israely,
  - type: text
    content: mandra-pisehoko izaho Debôrà
  - type: text
    content: ho toy ny reny teto amin’i Israely.
  '8':
  - type: text
    content: Nifidy andriamani-baovao ny olona
  - type: text
    content: ka vetivety dia vaky ny ady;
  - type: text
    content: nefa zara raha nahitana ampinga na lefona iray
  - type: text
    content: ho an’ny vatan-dehilahy andiany efapolo teto Israely.
  '9':
  - type: text
    content: Ny ahy ny fo dia miandany
  - type: text
    content: amin’ireo komandin’i Israely;
  - type: text
    content: ny foko dia miandany
  - type: text
    content: amin’ireo vahoaka nanolo-tena hiady;
  - type: text
    content: koa isaory ny TOMPO izany!
