  children:
  - type: text
    text: noho izy tsy tonga hikatroka
- type: usfm
  marker: q1
  children:
  - type: text
    text: niaraka tamin’ireo mahery fo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanampy ny TOMPO hiady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hotahîna
  - type: text
    text: ' mihoatra noho ny vehivavy rehetra kosa anie'
- type: usfm
  marker: q1
  children:
  - type: text
    text: i Jahela izay vadin’i Hebera lehilahy kenita!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hotahîna mihoatra noho ny vehivavy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitoetra an-day anie izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa rano no nangatahin’i Siserà;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ronono kosa no nomeny azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia rononomandry tao anaty tsatokaty marevaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Avy eo noraisiny tamin’ny tanan-kavia ny tsimaday
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tamin’ny tanan-kavanana ny tantanan’ny mpiasa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nasiany ka vaky ny lohan’i Siserà;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nataony gorobaka ny fihirifany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Teo an-tongo-dravehivavy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nitolefika sy nianjera ary nitsitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo an-tongo-dravehivavy teo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nitolefika sy nianjera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’ny nahatolefika azy teo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nianjera ka maty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nitazana teo am-baravarankely ny renin’i Siserà,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'teo anelanelan’ny makarakara izy no nitaraina hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Nahoana àry no mbola tsy tonga ihany ny kalesiny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana àry no mitaredretra any ny kalesiny?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izay hendry indrindra tamin’ireo andriambavy namany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanome azy izao valinteny manaraka izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka izany koa no naverimberin’ny tenany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: «Manangona babo izay ny miaramila,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary mbola eo am-pizaràna azy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tovovavy iray na roa isaky ny mahery fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: karazan-damba miloko samy hafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady vita peta-kofehy ho an’i Siserà;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, lamba vita peta-kofehy anatiny sy ivelany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hahodidina ny vozon’ilay mpamabo.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: TOMPO ô, aoka ny fahavalonao rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho faty tahaka an’i Siserà avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny sakaizanao kosa anie ho toy ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: fony izy miposaka mamirapiratra mafy indrindra!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nandry feizay ny tany nandritra ny efapolo taona.
