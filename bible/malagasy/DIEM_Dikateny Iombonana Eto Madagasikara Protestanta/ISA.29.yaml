document_id: ISA.29,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jerosalema teo am-bava loza nefa voavonjy tampoka
  - type: text
    content: «Indrisy, ry Ariela
  - type: note
    content: Ariela (izay midika hoe tanànan’Andriamanitra) dia manondro an’i Jerosalema eto (and 1,7); fa ilazana ny faritra faratampon’ny alitara*, fandoroana ny sorona (and 2; Ezek 43.15-16).
  - type: text
    content: '!'
  - type: text
    content: Ry Ariela, tanànan’i Jerosalema,
  - type: text
    content: nataon’i Davida fahirano fahiny!
  - type: text
    content: Na hiverina isan-taona isan-taona aza
  - type: text
    content: ny fitsingeringerenan’ny andro fety,
  '10':
  - type: text
    content: Fa ny TOMPO efa nampidina
  - type: text
    content: fanahy mampatory tao aminareo
  - type: text
    content: ary notampenany ny masonareo
  - type: note
    content: Ampit Is 6.10; Rm 11.8.
  - type: text
    content: ','
  - type: text
    content: '–hilazana ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' izany–,'
  - type: text
    content: sady nosaronany ny lohanareo,
  - type: text
    content: –hilazana ny mpahita izany.
  '11':
  - type: text
    content: 'Ny fanambaràna izany rehetra izany ho anareo dia miafina toy ny tenin’ny raki-tsoratra voaisy tombokase. Dia omena izay mahay mamaky teny izany ka iangaviana azy hoe: «Azafady, mba vakio kely ity». Fa hamaly izy hoe: «Tsy azoko atao izany, satria voaisy tombokase io raki-tsoratra io.» '
  '12':
  - type: text
    content: 'Dia omena izay tsy mahay mamaky teny indray izany ka iangaviana azy hoe: «Azafady, mba vakio kely ity»; fa hamaly izy hoe: «Tsy mahay mamaky teny aho.»'
  - type: heading
    content: Mbola hanao zava-mahagaga hatrany ny Tompo
  '13':
  - type: text
    content: 'Ary hoy ny Tompo hoe:'
  - type: text
    content: «Ity firenena ity manatona Ahy am-bava fotsiny
  - type: text
    content: sy manome voninahitra Ahy an-tendromolotra ihany
  - type: text
    content: fa ny fony kosa manalavitra Ahy;
  - type: text
    content: ka fomban’olombelona nianarana ihany
  - type: text
    content: ny fanajana asehony Ahy
  - type: note
    content: Ny and 13 dia averina amin’ny fomba malaladalaka ao amin’ny Mt 15.8-19; Mk 7.6-7.
  - type: text
    content: .
  '14':
  - type: text
    content: Noho izany, indro Aho mbola hanao
  - type: text
    content: zava-mahagaga ho an’ity firenena ity,
  - type: text
    content: dia zava-mahagaga sy mahazendana;
  - type: text
    content: fa ho foana ny fahendren’ny olon-kendriny
  - type: text
    content: ary ho takona ny fahaizan’ny manampahaizany
  - type: note
    content: Ao amin’ny 1Kôr 1.19 dia averin’i Paoly apôstôly ity and ity, saingy araka ny dkt tranainy grika.
  - type: text
    content: .»
  - type: heading
    content: Heverinareo ho iza ny Tompo
  '15':
  - type: text
    content: Lozan’izay manao zavatra an-tsokosoko
  - type: text
    content: ka manafina ny paikany amin’ny TOMPO
  - type: text
    content: sy mamorona teti-dratsy ao amin’ny maizina.
  - type: text
    content: «Iza no mahita antsika, hoy izy,
  - type: text
    content: ary iza no mahalala izay ataontsika?»
  '16':
  - type: text
    content: Oadray ity hadalànareo e!
  - type: text
    content: Ny mpanefy ve hoheverinareo hitovy amin’ny tanimanga?
  - type: text
    content: 'Ny taozavatra ve hanao amin’ny mpanao azy hoe:'
  - type: text
    content: «Tsy ianao no nanao ahy»?
  - type: text
    content: 'na ny fanaka bakoly hilaza amin’ny mpanefy azy hoe:'
  - type: text
    content: «Tsy misy zavatra hainao akory
  - type: note
    content: Ampit Is 45.9.
  - type: text
    content: »?
  - type: heading
    content: Fiovàn-javatra goavana
  '17':
  - type: text
    content: Moa tsy afaka fotoana kely monja
  - type: text
    content: dia hovana ho saha mahavokatra ny alan’i Libano,
  - type: text
    content: ary hovana ho ala ny saha mahavokatra?
  '18':
  - type: text
    content: Amin’izany andro izany ny marenina
  - type: text
    content: dia handre izay voalaza ao amin’ny boky
  - type: text
    content: ary hiala ao amin’ny haizim-pito
  - type: text
    content: ny mason’ny jamba ka hahita.
  '19':
  - type: text
    content: Ny malahelo hiravoravo amin’ny TOMPO hatrany,
  - type: text
    content: ary ny mahantra ho dibo-kafaliana
  - type: text
    content: noho ny amin’Ilay Masin’i Israely.
  '2':
  - type: text
    content: dia hampahorîko ianao, hoy ny Tompo,
  - type: text
    content: ka alahelo sy fahoriana lalina no hanjo anao,
  - type: text
    content: 'ary ho tonga «ariela»-n’ny '
  - type: text
    content: alitara
  - type: text
    content: ' ianao amiko.'
  '20':
  - type: text
    content: Satria tapitra hatreo ny mpanjakazaka
  - type: text
    content: ary ho levona ireo mpaniratsira,
  - type: text
    content: haringana ireo rehetra mitady hanimba ny hafa,
  '21':
  - type: text
    content: ka miampanga lainga azy amin’ny teny
  - type: text
    content: sy mamandrika ny mpitsara
  - type: text
    content: mba hamarina ny tsy manan-tsiny any an-davaka.
  '22':
  - type: text
    content: Noho izany àry, ny TOMPO
  - type: text
    content: Andriamanitr’i Jakôba sy ny taranany
  - type: text
    content: sady mpanavotra an’i Abrahama
  - type: text
    content: 'dia nilaza izao teny izao:'
  - type: text
    content: «Tsy ho menatra intsony ny taranak’i Jakôba,
  - type: text
    content: ary tsy hivaloarika intsony ny tarehiny.»
  '23':
  - type: text
    content: Satria raha mahita izay hataoko eo anivony
  - type: text
    content: ny tenany sy ireo taranany,
  - type: text
    content: dia hanome hasina ny anarako,
  - type: text
    content: hanome hasina Ahy satria Izaho no ilay Masin’i Jakôba
  - type: text
    content: ary hangovitra eo anatrehako
  - type: text
    content: satria Izaho no Andriamanitr’i Israely.
  '24':
  - type: text
    content: Mbola hanan-tsaina indray
  - type: text
    content: ireo nivilivily fanahy
  - type: text
    content: ary hanaiky hampianarina indray
  - type: text
    content: ireo tsy nitsaha-nanakiana.
  '3':
  - type: text
    content: Hanao fahirano anao tahaka ny nataon’i Davida Aho
  - type: text
    content: ary hanisy miaramila hanemitra anao
  - type: text
    content: sy hanangana tovon-tany hamelezana anao.
  '4':
  - type: text
    content: Haetry ianao ka hiteny
  - type: text
    content: avy ao an-kibon’ny tany ao.
  - type: text
    content: Hibitsibitsika ny feonao mamakivaky ny vovoka;
  - type: text
    content: mova tsy feon’ny matoatoa miala avy amin’ny tany
  - type: text
    content: sy misamoina avy ao amin’ny vovoka ny teninao.
  '5':
  - type: text
    content: Toy ny vovoka mitora-jofo ny habetsaky ny fahavalonao,
  - type: text
    content: toy ny akofa misavoana ny olon-dozabe mamely anao.»
  - type: text
    content: Fa ho tampoka dia tampoka kosa
  '6':
  - type: text
    content: no hiavian’ny famaliana hamonjena anao
  - type: text
    content: avy amin’ny TOMPOn’izao rehetra izao,
  - type: text
    content: Izay hombàn’ny kotro-baratra sy ny horohoron-tany
  - type: text
    content: ary firohondrohona mafy,
  - type: text
    content: hombàn’ny tadio sy ny tafio-drivotra
  - type: text
    content: ary ny lelafo mandevona.
  '7':
  - type: text
    content: Toy ny nofy na fahitana mihelina amin’ny alina
  - type: text
    content: no hanjavonan’ireo firenena marobe mamely anao, ry Ariela,
  - type: text
    content: dia ireo rehetra miady aminao
  - type: text
    content: ka manangana tovon-tany hampahoriana anao
  - type: note
    content: Mety ho filazana an-kolaka ny fanafihana tsy nahomby nataon’ny Asirianina tamin’i Jerosalema, tamin’ny taona 701 tal J.K. izany. Jereo toko 36–37; ampit 31.4-5.
  - type: text
    content: .
  '8':
  - type: text
    content: Ho tahaka ny olona mosarena manonofy mihinana,
  - type: text
    content: kanjo nony taitra dia noana ihany ny kibony;
  - type: text
    content: ho tahaka ny olona mangetaheta manonofy misotro,
  - type: text
    content: kanjo nony taitra dia trotraka
  - type: text
    content: fa mbola maina ihany ny tendany;
  - type: text
    content: ho tahaka izany ireo firenena marobe
  - type: text
    content: 'izay miady amin’ny tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: .
  - type: heading
    content: Fahajambana sy fahamamoana
  '9':
  - type: text
    content: Migagà ka mitalanjòna ianareo.
  - type: text
    content: aoka ho jamba ka tsy hahita,
  - type: text
    content: ho mamo nefa tsy amin-divay,
  - type: text
    content: hivembena nefa tsy amin-toaka!
