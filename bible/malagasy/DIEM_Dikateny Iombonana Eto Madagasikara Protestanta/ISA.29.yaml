    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mety ho filazana an-kolaka ny fanafihana tsy nahomby nataon’ny Asirianina tamin’i Jerosalema, tamin’ny taona 701 tal J.K. izany. Jereo toko 36–37; ampit 31.4-5.
