    - type: text
      text: '11'
  - type: text
    text: 'Ny fanambaràna izany rehetra izany ho anareo dia miafina toy ny tenin’ny raki-tsoratra voaisy tombokase. Dia omena izay mahay mamaky teny izany ka iangaviana azy hoe: «Azafady, mba vakio kely ity». Fa hamaly izy hoe: «Tsy azoko atao izany, satria voaisy tombokase io raki-tsoratra io.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia omena izay tsy mahay mamaky teny indray izany ka iangaviana azy hoe: «Azafady, mba vakio kely ity»; fa hamaly izy hoe: «Tsy mahay mamaky teny aho.»'
- type: usfm
