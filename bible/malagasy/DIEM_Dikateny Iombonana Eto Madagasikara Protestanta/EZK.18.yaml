document_id: EZK.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra mitsara ny olona araka ny fitondrantenany avy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ahoana moa no amerimberenanareo izao ohabolana izao ao amin’ny tanin’i Israely hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‹Ny ray aman-dreny no nihinana voaloboka marikivy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny zanany ve no hadilo nify?›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Velona Izaho Tompo ANDRIANANAHARY, ka manao teny hentitra sy mianiana fa tsy hotononinareo any Israely intsony izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa samy Ahy avokoa ny ain’ny tsirairay avy, na ny an’ny ray aman-dreny na ny an’ny zanany; koa izay olona manota ihany no ho faty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny and 4-20, jereo 14.12-20; Deot 7.10; 24.16; Jer 31.29-30 sns.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Aoka hatao hoe misy lehilahy marina iray ka manao izay marina sy mahitsy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy mihinana amin’ny sakafom-panompoan-tsampy eny an-tendrombohitra izy na manompo ireo sampin’ny Israelita, tsy mandoto ny vadin’ny namany na matory amin’ny vehivavy voan’ny fadimbolana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'eny an-tendrombohitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 6.2 sy nta. –Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: vehivavy voan’ny fadimbolana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia heverina ho maloto* ara-pivavahana, jereo Lev 18.19.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy mitsentsitra na mangalatra izy fa mamerina ny antoka amin’ny mpitrosa, ary manome hanina ho an’ny noana sy fitafiana ho an’ireo tsy manana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy mampindram-bola mba hahazoana zana-bola sy tombony izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zana-bola sy tombony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lev 25.36-37.
    marker-yv: yv-n
  - type: text
    text: ', tsy miray tsikombakomba amin’ny tsy marina fa manao fitsarana tsy miangatra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manaraka ny lalànako sy mitandrina ny fitsipiko izy mba hanao izay mahitsy. Olo-marina io lehilahy io ka ho velona tokoa. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Raha ohatra io lehilahy io manan-janaka lahy mandroba sy mamono olona ho faty na manao zavatra mitovy karazana amin’izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy nanao ireo zavatra ireo akory ny rainy, fa ity zanany no mihinana amin’ny sakafom-panompoan-tsampy eny an-tendrombohitra, mandoto ny vadin’ny namany, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'mitsentsitra ny mahantra sy ny fadiranovana, mangalatra amin’ny olona, tsy mamerina ny antoka izay nomen’ireo mpitrosa azy, manompo sampy sady manao zavatra maharikoriko, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mampindram-bola mba hahazoana zana-bola sy tombony. Moa tokony ho velona ve io zanany lahy io? Tsia! Nanao ireo zava-dratsy rehetra maharikoriko ireo izy, ka ho faty tokoa ary ho tompon’andraikitry ny fahafatesany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '«Raha misy kosa lehilahy iray manan-janaka lahy. Izany zanany lahy izany, rehefa nahita ny fahotana rehetra nataon-drainy, dia tsy manahaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy mihinana amin’ny sakafom-panompoan-tsampy eny an-tendrombohitra izy na manompo ireo sampin’ny Israelita ary tsy mandoto ny vadin’ny namany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy mitsentsitra na mangalatra izy sady tsy mitaky antoka amin’ny mpitrosa ary manome hanina ho an’ny noana sy fitafiana ho an’ny tsy manana, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: tsy miray tsikombakomba amin’ny tsy marina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny tsy marina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy izany; ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny mahantra.
    marker-yv: yv-n
  - type: text
    text: 'na mampindram-bola mba hahazoana zana-bola sy tombony. Manatanteraka ny fitsipiko sy manaraka ny lalànako, ka tsy ho faty noho ny fahadisoan-drainy fa ho velona tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny rainy izay nampahory sy nangalatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nangalatra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy sasany izany; ny RM kosa manao ohe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nangalatra ny rahalahiny.
    marker-yv: yv-n
  - type: text
    text: ary nampijaly ny vahoaka nanodidina azy ihany no ho faty noho ny fahadisoana nataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '«Nefa ianareo manontany hoe: Nahoana ny zanaka no tsy mba mizaka ny fahadisoan-drainy? Satria manao izay marina sy mahitsy izy ary mitandrina sy manatanteraka ny lalànako rehetra, ka dia ho velona tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny olona nanota ihany no ho faty. Ny zanaka tsy hizaka ny fahadisoan’ny ray aman-dreniny, ary ny ray aman-dreny tsy hizaka ny fahadisoan’ny zanany. Ny olo-marina dia hovaliana soa noho ny fahamarinany ary ny olon-dratsy kosa hofaizina noho ny faharatsiany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty momba ny and 4.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fananarana hanao ny tsara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Raha misy olon-dratsy miala amin’ny fahotana rehetra nataony, ka mitandrina ny lalànako rehetra ary manao izay marina sy mahitsy, dia tsy ho faty izany olona izany fa ho velona tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hohadinoina ny heloka rehetra vitany ka ho velona izy noho ny marina ataony. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moa sitrako ve ny hahita ny olon-dratsy ho faty? Izaho Tompo ANDRIANANAHARY dia manao teny hentitra fa ny hiovany fitondrantena mba hahavelomany no sitrako. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Kanefa raha misy olo-marina miala amin’ny fahamarinany ka manao heloka araka ny zavatra rehetra maharikoriko izay fanaon’ny olon-dratsy, dia heverinareo ho velona ve izy? Tsia. Hohadinoina ireo asa tsara rehetra nataony, ka ho faty izy noho ny hadisoana amam-pahotana vitany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hoy ianareo hoe: ‹Tsy marina ny fitòndran’ny Tompo!› Henoy tsara Aho, ry Israelita: Ny fitòndrako ve no tsy marina? Tsy ny fitondranareo ve no tsy marina? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha misy olo-marina miala amin’ny fahamarinany, ka manao heloka ary maty amin’izany, dia maty noho ny heloka nataony ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha misy kosa olon-dratsy miala amin’ny faharatsiana nataony, ka manao izay marina sy mahitsy, dia mamonjy ny ainy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ho velona tokoa izy fa tsy ho faty satria nahatsapa ny asa ratsiny ka niala tamin’izany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Kanefa hoy ianareo Israelita hoe: ‹Tsy marina ny fitòndran’ny Tompo.› Tsy ny fitòndrako no tsy marina fa ny anareo! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Noho izany, Izaho Tompo ANDRIANANAHARY dia hitsara anareo Israelita tsirairay avy araka ny fitondrantenany; teny hentitra avy amiko izany. Koa ovay ny toe-dratsy, ialao ny hadisoana rehetra fanaonareo, dia tsy hisy intsony zavatra hitarika anareo amin’ny heloka. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Esory ho afaka aminareo ny asa ratsy rehetra fanaonareo; ka mihavaoza fo amam-panahy ianareo. Ahoana no te ho faty ianareo, ry Israelita? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa tsy sitrako ny hahafaty ny olona. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. Ovay ny toe-dratsy, dia ho velona ianareo.›
