document_id: EZK.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra mitsara ny olona araka ny fitondrantenany avy
  - type: text
    content: 'Nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: '«Raha ohatra io lehilahy io manan-janaka lahy mandroba sy mamono olona ho faty na manao zavatra mitovy karazana amin’izany. '
  '11':
  - type: text
    content: 'Tsy nanao ireo zavatra ireo akory ny rainy, fa ity zanany no mihinana amin’ny sakafom-panompoan-tsampy eny an-tendrombohitra, mandoto ny vadin’ny namany, '
  '12':
  - type: text
    content: 'mitsentsitra ny mahantra sy ny fadiranovana, mangalatra amin’ny olona, tsy mamerina ny antoka izay nomen’ireo mpitrosa azy, manompo sampy sady manao zavatra maharikoriko, '
  '13':
  - type: text
    content: mampindram-bola mba hahazoana zana-bola sy tombony. Moa tokony ho velona ve io zanany lahy io? Tsia! Nanao ireo zava-dratsy rehetra maharikoriko ireo izy, ka ho faty tokoa ary ho tompon’andraikitry ny fahafatesany.
  '14':
  - type: text
    content: '«Raha misy kosa lehilahy iray manan-janaka lahy. Izany zanany lahy izany, rehefa nahita ny fahotana rehetra nataon-drainy, dia tsy manahaka azy. '
  '15':
  - type: text
    content: 'Tsy mihinana amin’ny sakafom-panompoan-tsampy eny an-tendrombohitra izy na manompo ireo sampin’ny Israelita ary tsy mandoto ny vadin’ny namany. '
  '16':
  - type: text
    content: 'Tsy mitsentsitra na mangalatra izy sady tsy mitaky antoka amin’ny mpitrosa ary manome hanina ho an’ny noana sy fitafiana ho an’ny tsy manana, '
  '17':
  - type: text
    content: tsy miray tsikombakomba amin’ny tsy marina
  - type: note
    content: 'ny tsy marina: araka ny dkt grika tranainy izany; ny RM kosa manao hoe ny mahantra.'
  - type: text
    content: 'na mampindram-bola mba hahazoana zana-bola sy tombony. Manatanteraka ny fitsipiko sy manaraka ny lalànako, ka tsy ho faty noho ny fahadisoan-drainy fa ho velona tokoa. '
  '18':
  - type: text
    content: Ny rainy izay nampahory sy nangalatra
  - type: note
    content: 'nangalatra: araka ny dkt tranainy sasany izany; ny RM kosa manao ohe nangalatra ny rahalahiny.'
  - type: text
    content: ary nampijaly ny vahoaka nanodidina azy ihany no ho faty noho ny fahadisoana nataony.
  '19':
  - type: text
    content: '«Nefa ianareo manontany hoe: Nahoana ny zanaka no tsy mba mizaka ny fahadisoan-drainy? Satria manao izay marina sy mahitsy izy ary mitandrina sy manatanteraka ny lalànako rehetra, ka dia ho velona tokoa. '
  '2':
  - type: text
    content: '«Ahoana moa no amerimberenanareo izao ohabolana izao ao amin’ny tanin’i Israely hoe:'
  - type: text
    content: ‹Ny ray aman-dreny no nihinana voaloboka marikivy,
  - type: text
    content: ka ny zanany ve no hadilo nify?›
  '20':
  - type: text
    content: Ny olona nanota ihany no ho faty. Ny zanaka tsy hizaka ny fahadisoan’ny ray aman-dreniny, ary ny ray aman-dreny tsy hizaka ny fahadisoan’ny zanany. Ny olo-marina dia hovaliana soa noho ny fahamarinany ary ny olon-dratsy kosa hofaizina noho ny faharatsiany
  - type: note
    content: Jereo ny naoty momba ny and 4.
  - type: text
    content: .»
  - type: heading
    content: Fananarana hanao ny tsara
  '21':
  - type: text
    content: '«Raha misy olon-dratsy miala amin’ny fahotana rehetra nataony, ka mitandrina ny lalànako rehetra ary manao izay marina sy mahitsy, dia tsy ho faty izany olona izany fa ho velona tokoa. '
  '22':
  - type: text
    content: 'Hohadinoina ny heloka rehetra vitany ka ho velona izy noho ny marina ataony. '
  '23':
  - type: text
    content: 'Moa sitrako ve ny hahita ny olon-dratsy ho faty? Izaho Tompo ANDRIANANAHARY dia manao teny hentitra fa ny hiovany fitondrantena mba hahavelomany no sitrako. '
  '24':
  - type: text
    content: 'Kanefa raha misy olo-marina miala amin’ny fahamarinany ka manao heloka araka ny zavatra rehetra maharikoriko izay fanaon’ny olon-dratsy, dia heverinareo ho velona ve izy? Tsia. Hohadinoina ireo asa tsara rehetra nataony, ka ho faty izy noho ny hadisoana amam-pahotana vitany. '
  '25':
  - type: text
    content: 'Hoy ianareo hoe: ‹Tsy marina ny fitòndran’ny Tompo!› Henoy tsara Aho, ry Israelita: Ny fitòndrako ve no tsy marina? Tsy ny fitondranareo ve no tsy marina? '
  '26':
  - type: text
    content: 'Raha misy olo-marina miala amin’ny fahamarinany, ka manao heloka ary maty amin’izany, dia maty noho ny heloka nataony ihany izy. '
  '27':
  - type: text
    content: 'Raha misy kosa olon-dratsy miala amin’ny faharatsiana nataony, ka manao izay marina sy mahitsy, dia mamonjy ny ainy izy. '
  '28':
  - type: text
    content: 'Ho velona tokoa izy fa tsy ho faty satria nahatsapa ny asa ratsiny ka niala tamin’izany. '
  '29':
  - type: text
    content: 'Kanefa hoy ianareo Israelita hoe: ‹Tsy marina ny fitòndran’ny Tompo.› Tsy ny fitòndrako no tsy marina fa ny anareo! '
  '3':
  - type: text
    content: 'Velona Izaho Tompo ANDRIANANAHARY, ka manao teny hentitra sy mianiana fa tsy hotononinareo any Israely intsony izany. '
  '30':
  - type: text
    content: 'Noho izany, Izaho Tompo ANDRIANANAHARY dia hitsara anareo Israelita tsirairay avy araka ny fitondrantenany; teny hentitra avy amiko izany. Koa ovay ny toe-dratsy, ialao ny hadisoana rehetra fanaonareo, dia tsy hisy intsony zavatra hitarika anareo amin’ny heloka. '
  '31':
  - type: text
    content: 'Esory ho afaka aminareo ny asa ratsy rehetra fanaonareo; ka mihavaoza fo amam-panahy ianareo. Ahoana no te ho faty ianareo, ry Israelita? '
  '32':
  - type: text
    content: Fa tsy sitrako ny hahafaty ny olona. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. Ovay ny toe-dratsy, dia ho velona ianareo.›
  '4':
  - type: text
    content: Fa samy Ahy avokoa ny ain’ny tsirairay avy, na ny an’ny ray aman-dreny na ny an’ny zanany; koa izay olona manota ihany no ho faty
  - type: note
    content: Momba ny and 4-20, jereo 14.12-20; Deot 7.10; 24.16; Jer 31.29-30 sns.
  - type: text
    content: .
  '5':
  - type: text
    content: '«Aoka hatao hoe misy lehilahy marina iray ka manao izay marina sy mahitsy. '
  '6':
  - type: text
    content: Tsy mihinana amin’ny sakafom-panompoan-tsampy eny an-tendrombohitra izy na manompo ireo sampin’ny Israelita, tsy mandoto ny vadin’ny namany na matory amin’ny vehivavy voan’ny fadimbolana
  - type: note
    content: 'eny an-tendrombohitra: jereo 6.2 sy nta. –Ny vehivavy voan’ny fadimbolana dia heverina ho maloto* ara-pivavahana, jereo Lev 18.19.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Tsy mitsentsitra na mangalatra izy fa mamerina ny antoka amin’ny mpitrosa, ary manome hanina ho an’ny noana sy fitafiana ho an’ireo tsy manana. '
  '8':
  - type: text
    content: Tsy mampindram-bola mba hahazoana zana-bola sy tombony izy
  - type: note
    content: 'zana-bola sy tombony: jereo Lev 25.36-37.'
  - type: text
    content: ', tsy miray tsikombakomba amin’ny tsy marina fa manao fitsarana tsy miangatra. '
  '9':
  - type: text
    content: Manaraka ny lalànako sy mitandrina ny fitsipiko izy mba hanao izay mahitsy. Olo-marina io lehilahy io ka ho velona tokoa. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
