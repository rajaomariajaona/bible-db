document_id: ACT.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo olona fito lahy voafidy hanampy ny apôstôly
  - type: text
    content: 'Tamin’izany andro izany, dia nihamaro be ny '
  - type: text
    content: mpianatra
  - type: text
    content: ', ka nifanditra tamin’ny Jiosy miteny hebreo ny Jiosy miteny grika satria natao tsirambina ny mpitondratena teo aminy tamin’ny fizaràna sakafo'
  - type: note
    content: 'fizaràna sakafo: dkt hafa fizaràna fanampiana ara-bola.'
  - type: text
    content: 'isan’andro. '
  '10':
  - type: text
    content: 'kanefa tsy nahatohitra ny fahendrena avy amin’ny Fanahy Masina Izay nampiteny an’i Stefàna. '
  '11':
  - type: text
    content: 'Tamin’izay dia nanarama olona izy ireo hilaza hoe: «Renay nanevateva an’i Mosesy ary nanevateva an’Andriamanitra iny Stefàna iny'
  - type: note
    content: Ampit Mt 26.59-61; Mk 14.55-58.
  - type: text
    content: '.» '
  '12':
  - type: text
    content: 'Nomeny fo koa ny vahoaka sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' ary ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: '. Dia nirohotan’ireo mpanohitra azy i Stefàna, ka nosamboriny ary nentiny ho any amin’ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'sady nananganany vavolombelona mandainga hiampanga azy hoe:'
  - type: text
    content: '–Tsy mitsahatra miteny manohitra ity '
  - type: text
    content: tempoly
  - type: text
    content: ' masina ity sy ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy io lehilahy io, '
  '14':
  - type: text
    content: satria efa renay nilaza fa hoe i Jesoa avy any Nazareta dia handrodana ity tempoly ity ary hanova ny fanao natolotr’i Mosesy antsika.
  '15':
  - type: text
    content: Samy nibanjina an’i Stefàna izay rehetra tao amin’ny Fitsarana ambony ka nahita ny tarehiny miendrika tarehin’
  - type: text
    content: anjely
  - type: text
    content: .
  '2':
  - type: text
    content: 'Dia novorîn’ny 12 lahy ny mpianatra rehetra ka nataony hoe:'
  - type: text
    content: –Tsy rariny raha ilaozanay mitantana sakafo
  - type: note
    content: 'sakafo: dkt hafa asa fandraharahana (ampit 6.1 sy nta). Tsy nionona tamin’ny asa fanasoavana ara-batana fotsiny anefa izy fito lahy, satria nisy nitory ny tenin’Andriamanitra ihany koa tahaka an’i Stefàna sy i Filipo.'
  - type: text
    content: ' ny fitoriana ny tenin’Andriamanitra. '
  '3':
  - type: text
    content: 'Noho izany, ry havana, aoka hisy olona fito lahy hotsongaina avy eo afovoanareo, dia olona tsara laza sady feno Fanahy Masina ama-pahendrena, mba hampiandraiketanay izany raharaha izany. '
  '4':
  - type: text
    content: Izahay kosa dia hilofo amin’ny vavaka sy ny fitorian-teny.
  '5':
  - type: text
    content: 'Nankasitrahan’ny besinimaro izany teny izany. Dia nofidin’ny mpianatra i Stefàna lehilahy vontom-pinoana sy feno Fanahy Masina, ary koa i Filipo sy i Prôkôro, i Nikanôra sy i Timôna, i Parmenà ary i Nikôlà; ka i Nikôlà dia '
  - type: text
    content: hafa firenena
  - type: text
    content: ' avy any Antiôkia, efa mpanaraka ny fivavahana jiosy. '
  '6':
  - type: text
    content: Naroso teo anatrehan’ny apôstôly izy fito lahy ka nanaovan’ny apôstôly vavaka sy nametrahany tanana.
  '7':
  - type: text
    content: Niroborobo ny tenin’Andriamanitra, nitombo be dia be ny isan’ny mpianatra tao Jerosalema, ary nisy mpisorona
  - type: note
    content: Heverina fa nahatratra sahabo ho 8 000 ny isan’ny mpisorona jiosy rehetra tanatin’ny antoko samihafa, tao Jerosalema.
  - type: text
    content: ' maro nanaiky ny finoana.'
  - type: heading
    content: Ny fisamborana an’i Stefàna
  '8':
  - type: text
    content: 'Feno fitahiana sy hery avy amin’Andriamanitra i Stefàna ka nanao zava-mahagaga sy '
  - type: text
    content: famantarana
  - type: text
    content: ' lehibe teo amin’ny vahoaka. '
  '9':
  - type: text
    content: 'Nisy anefa olona sasany nanohitra azy: dia olona avy amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: n’ny Libertina
  - type: note
    content: Ny Libertina na hoe mpanompo afaka dia ireo taranaky ny Jiosy nentin-ko babo sy tonga mpanompo fahiny, tamin’ny andron’i Prompèy mpitari-tafika rômanina (taona 63 tal J. K.) ary nafahana tatỳ aoriana.
  - type: text
    content: ', sy ny sinagôgan’ny Aleksandrianina mbamin’ny sinagôgan’ireo terak’i Silisia sy ny faritany Azia. Niady hevitra tamin’i Stefàna izy rehetra ireo, '
