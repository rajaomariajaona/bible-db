document_id: ACT.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ireo olona fito lahy voafidy hanampy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany, dia nihamaro be ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ', ka nifanditra tamin’ny Jiosy miteny hebreo ny Jiosy miteny grika satria natao tsirambina ny mpitondratena teo aminy tamin’ny fizaràna sakafo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fizaràna sakafo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fizaràna fanampiana ara-bola.
    marker-yv: yv-n
  - type: text
    text: 'isan’andro. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia novorîn’ny 12 lahy ny mpianatra rehetra ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy rariny raha ilaozanay mitantana sakafo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sakafo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: asa fandraharahana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ampit 6.1 sy nta). Tsy nionona tamin’ny asa fanasoavana ara-batana fotsiny anefa izy fito lahy, satria nisy nitory ny tenin’Andriamanitra ihany koa tahaka an’i Stefàna sy i Filipo.'
    marker-yv: yv-n
  - type: text
    text: ' ny fitoriana ny tenin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Noho izany, ry havana, aoka hisy olona fito lahy hotsongaina avy eo afovoanareo, dia olona tsara laza sady feno Fanahy Masina ama-pahendrena, mba hampiandraiketanay izany raharaha izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izahay kosa dia hilofo amin’ny vavaka sy ny fitorian-teny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nankasitrahan’ny besinimaro izany teny izany. Dia nofidin’ny mpianatra i Stefàna lehilahy vontom-pinoana sy feno Fanahy Masina, ary koa i Filipo sy i Prôkôro, i Nikanôra sy i Timôna, i Parmenà ary i Nikôlà; ka i Nikôlà dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' avy any Antiôkia, efa mpanaraka ny fivavahana jiosy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Naroso teo anatrehan’ny apôstôly izy fito lahy ka nanaovan’ny apôstôly vavaka sy nametrahany tanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Niroborobo ny tenin’Andriamanitra, nitombo be dia be ny isan’ny mpianatra tao Jerosalema, ary nisy mpisorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Heverina fa nahatratra sahabo ho 8 000 ny isan’ny mpisorona jiosy rehetra tanatin’ny antoko samihafa, tao Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' maro nanaiky ny finoana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fisamborana an’i Stefàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Feno fitahiana sy hery avy amin’Andriamanitra i Stefàna ka nanao zava-mahagaga sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' lehibe teo amin’ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nisy anefa olona sasany nanohitra azy: dia olona avy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: n’ny Libertina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Libertina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpanompo afaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ireo taranaky ny Jiosy nentin-ko babo sy tonga mpanompo fahiny, tamin’ny andron’i Prompèy mpitari-tafika rômanina (taona 63 tal J. K.) ary nafahana tatỳ aoriana.'
    marker-yv: yv-n
  - type: text
    text: ', sy ny sinagôgan’ny Aleksandrianina mbamin’ny sinagôgan’ireo terak’i Silisia sy ny faritany Azia. Niady hevitra tamin’i Stefàna izy rehetra ireo, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'kanefa tsy nahatohitra ny fahendrena avy amin’ny Fanahy Masina Izay nampiteny an’i Stefàna. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tamin’izay dia nanarama olona izy ireo hilaza hoe: «Renay nanevateva an’i Mosesy ary nanevateva an’Andriamanitra iny Stefàna iny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 26.59-61; Mk 14.55-58.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nomeny fo koa ny vahoaka sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: '. Dia nirohotan’ireo mpanohitra azy i Stefàna, ka nosamboriny ary nentiny ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fitsarana ambony
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'sady nananganany vavolombelona mandainga hiampanga azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy mitsahatra miteny manohitra ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' masina ity sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy io lehilahy io, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: satria efa renay nilaza fa hoe i Jesoa avy any Nazareta dia handrodana ity tempoly ity ary hanova ny fanao natolotr’i Mosesy antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Samy nibanjina an’i Stefàna izay rehetra tao amin’ny Fitsarana ambony ka nahita ny tarehiny miendrika tarehin’
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: .
