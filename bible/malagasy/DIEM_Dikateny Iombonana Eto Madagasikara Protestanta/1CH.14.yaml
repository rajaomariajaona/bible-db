document_id: 1CH.14,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida tao Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 3.5-9; 2 Sam 5.11-16)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nandefa iraka ho any amin’i Davida i Hirama mpanjakan’i Tiro, sady nandefa hazo sedera sy mpipai-bato ary mpandrafitra hazo mba hanao lapa ho azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I Davida kosa nanontany an’Andriamanitra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Handeha hamely ny Filistinina ve aho? Ary hatolotrao ho eo an-tanako ve ireo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny TOMPO taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana fa hatolotro ho eo an-tananao ireo.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia niakatra nankao Bahala-Peratsima i Davida ka namely ny Filistinina tao. Ary hoy i Davida hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny tanako no namakian’Andriamanitra ny fahavaloko hipariaka toy ny rano vaky.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no nanaovana ny anaran’io toerana io hoe Bahala-Peratsima. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia nilaozan’ny Filistinina teo ireo andriamaniny ka nasain’i Davida nodorana tamin’ny afo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Avy indray ny Filistinina ka nandroba tao amin’ny lohasahan’ny Refaîta. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia mbola nanontany an’Andriamanitra indray i Davida ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza miakatra hanenjika azy; fa mivilia lavidavitra azy, dia manatòna azy avy eo amin’ny tandrifin’ny foto-boaroihazo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'foto-boaroihazo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tsy azo antoka loatra ny karazan-kazo; ny dkt sasany manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hazo balsama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary rehefa mahare hoatra ny figodongodon’olona eny an-tendron-kazo ianao, dia miaingà amin’izay hiady, satria efa miainga mialoha anao Andriamanitra mba handresy ny tafiky ny Filistinina.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia nanao araka izay nandidian’Andriamanitra azy i Davida, ka nandresy ny tafiky ny Filistinina hatreo Gibehôna ka hatrany Gezera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gibehôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Mp 3.4 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Gezera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 2 Sam 5.25 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia niely eran’ny tany rehetra ny lazan’i Davida, ary nataon’ny TOMPO matahotra an’i Davida ny firenena rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia fantatr’i Davida tamin’izay fa ny TOMPO mihitsy no efa nanao azy ho mpanjaka teo amin’i Israely satria voasandratra avo ny fanjakany noho ny amin’ilay Israely vahoakan’Andriamanitra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia mbola naka vady indray i Davida tao Jerosalema ka niteraka zazalahy sy zazavavy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ireto no anaran’ireo zanany teraka tao Jerosalema: i Simehà'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Simehà: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Samoà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no ao amin’ny RM, kanefa jereo 3.5.'
      marker-yv: yv-n
    - type: text
      text: ' sy i Sôbaba, i Natàna sy i Salômôna, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'i Jibehara sy i Elisoa, i Elpeleta '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'sy i Nôgà, i Nefega sy i Jafia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: i Elisamà sy i Beheliadà ary i Elifelety.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandresen’i Davida ny Filistinina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Sam 5.17-22)
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nony ren’ny Filistinina fa efa voahosotra ho mpanjaka amin’i Israely manontolo i Davida, dia niakatra ny Filistinina rehetra mba hambabo an’i Davida. Nahare izany i Davida, ka nivoaka hifanehatra amin’ireo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia tonga ny Filistinina ka nandroba tao amin’ny lohasahan’ny Refaîta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny lohasahan’ny Refaîta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia ao atsimo andrefan’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: '. '
