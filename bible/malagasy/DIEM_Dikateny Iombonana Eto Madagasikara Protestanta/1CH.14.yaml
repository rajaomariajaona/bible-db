document_id: 1CH.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida tao Jerosalema
  - type: heading
    content: (Jereo 3.5-9; 2 Sam 5.11-16)
  - type: text
    content: 'Nandefa iraka ho any amin’i Davida i Hirama mpanjakan’i Tiro, sady nandefa hazo sedera sy mpipai-bato ary mpandrafitra hazo mba hanao lapa ho azy. '
  '10':
  - type: text
    content: 'I Davida kosa nanontany an’Andriamanitra hoe:'
  - type: text
    content: –Handeha hamely ny Filistinina ve aho? Ary hatolotrao ho eo an-tanako ve ireo?
  - type: text
    content: 'Ka hoy ny TOMPO taminy:'
  - type: text
    content: –Mandehana fa hatolotro ho eo an-tananao ireo.
  '11':
  - type: text
    content: 'Dia niakatra nankao Bahala-Peratsima i Davida ka namely ny Filistinina tao. Ary hoy i Davida hoe:'
  - type: text
    content: –Ny tanako no namakian’Andriamanitra ny fahavaloko hipariaka toy ny rano vaky.
  - type: text
    content: 'Izany no nanaovana ny anaran’io toerana io hoe Bahala-Peratsima. '
  '12':
  - type: text
    content: Dia nilaozan’ny Filistinina teo ireo andriamaniny ka nasain’i Davida nodorana tamin’ny afo.
  '13':
  - type: text
    content: 'Avy indray ny Filistinina ka nandroba tao amin’ny lohasahan’ny Refaîta. '
  '14':
  - type: text
    content: 'Dia mbola nanontany an’Andriamanitra indray i Davida ka novaliany hoe:'
  - type: text
    content: –Aza miakatra hanenjika azy; fa mivilia lavidavitra azy, dia manatòna azy avy eo amin’ny tandrifin’ny foto-boaroihazo
  - type: note
    content: 'foto-boaroihazo: tsy azo antoka loatra ny karazan-kazo; ny dkt sasany manao hoe hazo balsama.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: Ary rehefa mahare hoatra ny figodongodon’olona eny an-tendron-kazo ianao, dia miaingà amin’izay hiady, satria efa miainga mialoha anao Andriamanitra mba handresy ny tafiky ny Filistinina.
  '16':
  - type: text
    content: Dia nanao araka izay nandidian’Andriamanitra azy i Davida, ka nandresy ny tafiky ny Filistinina hatreo Gibehôna ka hatrany Gezera
  - type: note
    content: 'Gibehôna: jereo 1 Mp 3.4 sy nta. –Gezera: jereo 2 Sam 5.25 sy nta.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: Dia niely eran’ny tany rehetra ny lazan’i Davida, ary nataon’ny TOMPO matahotra an’i Davida ny firenena rehetra.
  '2':
  - type: text
    content: Dia fantatr’i Davida tamin’izay fa ny TOMPO mihitsy no efa nanao azy ho mpanjaka teo amin’i Israely satria voasandratra avo ny fanjakany noho ny amin’ilay Israely vahoakan’Andriamanitra.
  '3':
  - type: text
    content: 'Dia mbola naka vady indray i Davida tao Jerosalema ka niteraka zazalahy sy zazavavy. '
  '4':
  - type: text
    content: 'Ireto no anaran’ireo zanany teraka tao Jerosalema: i Simehà'
  - type: note
    content: 'Simehà: Samoà no ao amin’ny RM, kanefa jereo 3.5.'
  - type: text
    content: ' sy i Sôbaba, i Natàna sy i Salômôna, '
  '5':
  - type: text
    content: 'i Jibehara sy i Elisoa, i Elpeleta '
  '6':
  - type: text
    content: 'sy i Nôgà, i Nefega sy i Jafia, '
  '7':
  - type: text
    content: i Elisamà sy i Beheliadà ary i Elifelety.
  - type: heading
    content: Ny fandresen’i Davida ny Filistinina
  - type: heading
    content: (Jereo 2 Sam 5.17-22)
  '8':
  - type: text
    content: 'Nony ren’ny Filistinina fa efa voahosotra ho mpanjaka amin’i Israely manontolo i Davida, dia niakatra ny Filistinina rehetra mba hambabo an’i Davida. Nahare izany i Davida, ka nivoaka hifanehatra amin’ireo. '
  '9':
  - type: text
    content: Dia tonga ny Filistinina ka nandroba tao amin’ny lohasahan’ny Refaîta
  - type: note
    content: 'ny lohasahan’ny Refaîta: dia ao atsimo andrefan’i Jerosalema.'
  - type: text
    content: '. '
