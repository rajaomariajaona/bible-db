      children:
      - type: text
        text: 'sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Telonohorefy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Jôb 9.9; 38.31.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny kintana Telonohorefy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manova ny haizim-pito ho maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manamaizina ny andro ho alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miantso ny rano any an-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manapariaka azy eny ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny TOMPO no anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izy no mampipoaka ny fandravana hamelezana ny mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka iharan’ny fandravana tokoa ny tanàna mimanda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Halanareo ny olona mananatra eo amin’ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maharikoriko anareo ny vavolombelona milaza ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nohosihosenareo ny malahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nangalanareo am-paham-bary ny vokatra avy aminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho izany, dia tsy hitoetra amin’ny trano vato
- type: usfm
  marker: q1
  children:
  - type: text
    text: voapaika nataonareo ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisotro ny divay avy amin’ny voaloboka tsara nambolenareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy koa ny Tompo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Fantatro fa marobe ireo helokareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahatsiravina ireo fahotanareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo no mpandray tsolotra sy mpanenjika ny olo-marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manodinkodina ny zon’ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny fitsarana,»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Noho izany, dia mangina ny olon-kendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izao fotoana izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria fotoana ratsy izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny tsara no tadiavo fa aza ny ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho velona ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay ny TOMPO Andriamanitr’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiaraka aminareo araka ny lazainareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ankahalao ny ratsy, tiavo ny tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampitoero ao amin’ny fitsarana indray ny rariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Angamba ny TOMPO Andriamanitr’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamindra fo amin’izay sisa amin’ny taranak’i Jôsefa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'taranak’i Jôsefa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 5.6 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa izao no lazain’ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ilay Andriamanitr’izao rehetra izao sady Tompoko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Eny an-kalamanjana rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hisy tomanim-pisaonana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eny amin’ny arabe rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia hisy hanao hoe: ‹Indrisy! Indrisy!›'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpamboly koa hantsoina hiaraka ory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ireo mpiantsa fahoriana hanao hiram-pisaonana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Any amin’ny tanimboaloboka rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hisy tomanim-pisaonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria handalo ao aminareo Aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho TOMPO no miteny.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andro hamaizan’ny Tompo ireo fahavalo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lozan’izay miandrandra ny androm-pamaizan’ny TOMPO!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho inona moa aminareo io androm-pamaizan’ny TOMPO io?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho andro maizim-panahiana izany fa tsy hamiratan-tsoa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: toy ny amin’ny olona mandositra liona
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa mifanehatra amin’ny orsa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na toy ny amin’ny olona tonga ao an-trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mitehina amin’ny rindrina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa kaikerin’ny menarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moa hamiratan-tsoa ve ny androm-pamaizan’ny TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, fa ho andro maizim-panahiana izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho andro maizina tsy misy mangirana mihitsy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fotoam-pivavahana tsy sitraky ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: «Hàlako, maharikoriko Ahy ny fety fivahiniananareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy sitrako ny fivoriam-pivavahanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Na dia anateranareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fanatitra hohanina aza Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hankasitrahiko izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hojereko akory ny zanak’omby matavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: aterinareo ho sorom-pihavanana
  - type: usfm
    marker: f
    children:
