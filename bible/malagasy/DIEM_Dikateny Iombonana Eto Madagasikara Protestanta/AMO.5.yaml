      - type: text
        text: Beera-Seba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toeramasina hafa ao atsimon’ny faritanin’i Joda. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: aza miditra ao Gilgala...tsinontsinona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': ao amin’ny TM dia misy tsilalaon-teny momba ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gilgala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Betela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' mba hanehoana fa tsy maintsy ho avy ary tsy azo idifiana mihitsy ny loza.'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
