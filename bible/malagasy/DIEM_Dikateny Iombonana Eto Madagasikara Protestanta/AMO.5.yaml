      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Betela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 3.14 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gilgala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 4.4 sy nta. –'
    - type: usfm
