  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tadiavo ny TOMPO, dia ho velona ianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha tsy mitady Azy ianareo, ry taranak’i Jôsefa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ry taranak’i Jôsefa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: raha ny tena heviny hentitra dia manondro ny fokon’i Manase sy i Efraîma izany, satria zanakalahin’i Jôsefa ny razany (jereo Gen 48.1). Kanefa raha itarina ny heviny, dia mahafaoka ny fanjakan’i Israely avaratra manontolo izay ny fokon’i Efraîma sy i Manase no lehibe indrindra ao aminy.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hilatsaka aminareo tahaka ny afo Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handevona an’i Betela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy olona hahafaty ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ianareo no mamadika ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho zava-mahafaty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampitsingidina ny fahamarinana amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ilay nanao ny kintana Kotokelimiadilaona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
