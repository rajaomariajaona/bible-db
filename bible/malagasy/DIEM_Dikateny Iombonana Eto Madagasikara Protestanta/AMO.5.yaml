    children:
    - type: text
      text: '1'
  - type: text
    text: Ry taranak’i Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: henoinareo izao teniko izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia hira fisaonana ventesiko momba anareo:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tahaka ny tovovavy maty i Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka potraka tsy mahatsangana intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miampatra eo amin’ny taniny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy misy manarina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Satria izao no lazain’ny Tompo ANDRIANANAHARY
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny amin’ny vahoakan’i Israely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy tanàna mamoaka miaramila arivo hiantafika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa zato no sisa hiverina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy tanàna mamoaka miaramila zato hiantafika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa folo no sisa hiverina
  - type: usfm
    marker: f
