document_id: AMO.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fisaonana ho an’i Israely
  - type: text
    content: Ry taranak’i Israely,
  - type: text
    content: henoinareo izao teniko izao,
  - type: text
    content: 'dia hira fisaonana ventesiko momba anareo:'
  '10':
  - type: text
    content: Halanareo ny olona mananatra eo amin’ny fitsarana
  - type: text
    content: ary maharikoriko anareo ny vavolombelona milaza ny marina.
  '11':
  - type: text
    content: Nohosihosenareo ny malahelo
  - type: text
    content: ka nangalanareo am-paham-bary ny vokatra avy aminy.
  - type: text
    content: Noho izany, dia tsy hitoetra amin’ny trano vato
  - type: text
    content: voapaika nataonareo ianareo,
  - type: text
    content: ary tsy hisotro ny divay avy amin’ny voaloboka tsara nambolenareo.
  '12':
  - type: text
    content: 'Hoy koa ny Tompo hoe:'
  - type: text
    content: «Fantatro fa marobe ireo helokareo
  - type: text
    content: ary mahatsiravina ireo fahotanareo;
  - type: text
    content: ianareo no mpandray tsolotra sy mpanenjika ny olo-marina,
  - type: text
    content: ka manodinkodina ny zon’ny mahantra
  - type: text
    content: eo amin’ny fitsarana,»
  '13':
  - type: text
    content: Noho izany, dia mangina ny olon-kendry
  - type: text
    content: amin’izao fotoana izao
  - type: text
    content: satria fotoana ratsy izao.
  '14':
  - type: text
    content: Ny tsara no tadiavo fa aza ny ratsy,
  - type: text
    content: mba ho velona ianareo;
  - type: text
    content: amin’izay ny TOMPO Andriamanitr’izao rehetra izao
  - type: text
    content: dia hiaraka aminareo araka ny lazainareo.
  '15':
  - type: text
    content: Ankahalao ny ratsy, tiavo ny tsara,
  - type: text
    content: ary ampitoero ao amin’ny fitsarana indray ny rariny;
  - type: text
    content: Angamba ny TOMPO Andriamanitr’izao rehetra izao
  - type: text
    content: hamindra fo amin’izay sisa amin’ny taranak’i Jôsefa
  - type: note
    content: 'taranak’i Jôsefa: jereo 5.6 sy nta.'
  - type: text
    content: .
  '16':
  - type: text
    content: Koa izao no lazain’ny TOMPO,
  - type: text
    content: 'ilay Andriamanitr’izao rehetra izao sady Tompoko:'
  - type: text
    content: «Eny an-kalamanjana rehetra
  - type: text
    content: dia hisy tomanim-pisaonana;
  - type: text
    content: ary eny amin’ny arabe rehetra
  - type: text
    content: 'dia hisy hanao hoe: ‹Indrisy! Indrisy!›'
  - type: text
    content: Ny mpamboly koa hantsoina hiaraka ory;
  - type: text
    content: ary ireo mpiantsa fahoriana hanao hiram-pisaonana.
  '17':
  - type: text
    content: Any amin’ny tanimboaloboka rehetra
  - type: text
    content: dia hisy tomanim-pisaonana,
  - type: text
    content: satria handalo ao aminareo Aho.
  - type: text
    content: Izaho TOMPO no miteny.»
  - type: heading
    content: Ny andro hamaizan’ny Tompo ireo fahavalo
  '18':
  - type: text
    content: Lozan’izay miandrandra ny androm-pamaizan’ny TOMPO!
  - type: text
    content: Fa ho inona moa aminareo io androm-pamaizan’ny TOMPO io?
  - type: text
    content: Ho andro maizim-panahiana izany fa tsy hamiratan-tsoa,
  '19':
  - type: text
    content: toy ny amin’ny olona mandositra liona
  - type: text
    content: kanefa mifanehatra amin’ny orsa;
  - type: text
    content: na toy ny amin’ny olona tonga ao an-trano
  - type: text
    content: sy mitehina amin’ny rindrina,
  - type: text
    content: kanefa kaikerin’ny menarana.
  '2':
  - type: text
    content: Tahaka ny tovovavy maty i Israely,
  - type: text
    content: ka potraka tsy mahatsangana intsony;
  - type: text
    content: miampatra eo amin’ny taniny izy,
  - type: text
    content: fa tsy misy manarina.
  '20':
  - type: text
    content: Moa hamiratan-tsoa ve ny androm-pamaizan’ny TOMPO?
  - type: text
    content: Tsia, fa ho andro maizim-panahiana izany,
  - type: text
    content: ho andro maizina tsy misy mangirana mihitsy.
  - type: heading
    content: Fotoam-pivavahana tsy sitraky ny Tompo
  '21':
  - type: text
    content: «Hàlako, maharikoriko Ahy ny fety fivahiniananareo;
  - type: text
    content: ary tsy sitrako ny fivoriam-pivavahanareo.
  '22':
  - type: text
    content: 'Na dia anateranareo '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo'
  - type: text
    content: sy fanatitra hohanina aza Aho,
  - type: text
    content: dia tsy hankasitrahiko izany;
  - type: text
    content: ary tsy hojereko akory ny zanak’omby matavy
  - type: text
    content: aterinareo ho sorom-pihavanana
  - type: note
    content: 'and 21-22: ampit Is 1.11-14.'
  - type: text
    content: .
  '23':
  - type: text
    content: Halaviro Ahy ny finaonaonan’ny hiranareo;
  - type: text
    content: tsy tiako hohenoina ny feon-dokanganareo.
  '24':
  - type: text
    content: Aoka ny rariny hikoriana toy ny rano
  - type: text
    content: ary ny fahamarinana ho tahaka ny renirano tsy mety ritra!
  '25':
  - type: text
    content: Ry taranak’i Israely,
  - type: text
    content: moa nanolotra sorona sy fanatitra ho Ahy ve ianareo
  - type: text
    content: nandritra ny efapolo taona tany an-taniefitra?
  '26':
  - type: text
    content: Ary nentinareo ve ny sarin’i Sikota, ilay sampy mpanjakanareo,
  - type: text
    content: sy ny sarin’i Kiona
  - type: note
    content: 'Ary nentinareo ve...: misy mihevitra hoe Raha izany àry dia hoentinareo (any am-pahababoana)... –i Sikota sy i Kevàna: andriamanitry ny Asirianina; ny mpandika sora-tanana hebreo dia ninia nandiso ny fanonona ireo anarana roa ireo raha nanome azy ireo ny zana-tsoratry ny teny hoe siqqous (mahatsiravina); izany no niavian’ny dika soratra mahazatra Sikota sy Kiona. –Ny and 25-27 dia tanisaina ao amin’ny Asa 7.42-43 saingy araka ny dkt tranainy grika.'
  - type: text
    content: ', ilay kintana andriamanitrareo,'
  - type: text
    content: izay samy sary nataonareo ho anareo? Tsia!
  '27':
  - type: text
    content: Koa halefako ho babo any ambadika lavitr’i Damasy ianareo.
  - type: text
    content: Izaho TOMPO no miteny izany;
  - type: text
    content: ilay Andriamanitr’izao rehetra izao no anarako.»
  '3':
  - type: text
    content: Satria izao no lazain’ny Tompo ANDRIANANAHARY
  - type: text
    content: 'ny amin’ny vahoakan’i Israely:'
  - type: text
    content: Misy tanàna mamoaka miaramila arivo hiantafika,
  - type: text
    content: kanefa zato no sisa hiverina;
  - type: text
    content: Misy tanàna mamoaka miaramila zato hiantafika,
  - type: text
    content: kanefa folo no sisa hiverina
  - type: note
    content: 'Momba ny and 1-3: jereo Jer 9.18-20; Is 53.6-7.'
  - type: text
    content: .
  - type: heading
    content: Antsoina hiala amin’ny toe-dratsy i Israely
  '4':
  - type: text
    content: Izao no lazain’ny TOMPO
  - type: text
    content: 'amin’ny vahoakan’i Israely:'
  - type: text
    content: «Tadiavo Aho, dia ho velona ianareo.
  '5':
  - type: text
    content: Fa aza mitady Ahy any Betela,
  - type: text
    content: aza miditra ao Gilgala,
  - type: text
    content: ary aza mankany Beera-Seba;
  - type: text
    content: satria ho lasan-ko babo tokoa i Gilgala,
  - type: text
    content: ary i Betela dia ho tonga tsinontsinona
  - type: note
    content: 'Betela: jereo 3.14 sy nta. –Gilgala: jereo 4.4 sy nta. –Beera-Seba: toeramasina hafa ao atsimon’ny faritanin’i Joda. –aza miditra ao Gilgala...tsinontsinona: ao amin’ny TM dia misy tsilalaon-teny momba ny anarana hoe Gilgala sy Betela mba hanehoana fa tsy maintsy ho avy ary tsy azo idifiana mihitsy ny loza.'
  - type: text
    content: .»
  '6':
  - type: text
    content: Tadiavo ny TOMPO, dia ho velona ianareo.
  - type: text
    content: Fa raha tsy mitady Azy ianareo, ry taranak’i Jôsefa
  - type: note
    content: 'ry taranak’i Jôsefa: raha ny tena heviny hentitra dia manondro ny fokon’i Manase sy i Efraîma izany, satria zanakalahin’i Jôsefa ny razany (jereo Gen 48.1). Kanefa raha itarina ny heviny, dia mahafaoka ny fanjakan’i Israely avaratra manontolo izay ny fokon’i Efraîma sy i Manase no lehibe indrindra ao aminy.'
  - type: text
    content: ','
  - type: text
    content: dia hilatsaka aminareo tahaka ny afo Izy
  - type: text
    content: ka handevona an’i Betela,
  - type: text
    content: ary tsy hisy olona hahafaty ny afo.
  '7':
  - type: text
    content: Ianareo no mamadika ny rariny
  - type: text
    content: ho zava-mahafaty
  - type: text
    content: ary mampitsingidina ny fahamarinana amin’ny tany.
  '8':
  - type: text
    content: Fa ilay nanao ny kintana Kotokelimiadilaona
  - type: note
    content: 'Kotokelimiadilaona sy Telonohorefy: jereo Jôb 9.9; 38.31.'
  - type: text
    content: sy ny kintana Telonohorefy,
  - type: text
    content: manova ny haizim-pito ho maraina
  - type: text
    content: sy manamaizina ny andro ho alina,
  - type: text
    content: miantso ny rano any an-dranomasina
  - type: text
    content: sy manapariaka azy eny ambonin’ny tany,
  - type: text
    content: dia ny TOMPO no anarany.
  '9':
  - type: text
    content: Izy no mampipoaka ny fandravana hamelezana ny mahery,
  - type: text
    content: ka iharan’ny fandravana tokoa ny tanàna mimanda.
