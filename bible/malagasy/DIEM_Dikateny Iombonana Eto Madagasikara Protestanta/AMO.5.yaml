    children:
    - type: text
      text: '4'
  - type: text
    text: Izao no lazain’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’ny vahoakan’i Israely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tadiavo Aho, dia ho velona ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa aza mitady Ahy any Betela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza miditra ao Gilgala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mankany Beera-Seba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ho lasan-ko babo tokoa i Gilgala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary i Betela dia ho tonga tsinontsinona
  - type: usfm
    marker: f
