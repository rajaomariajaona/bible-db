  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Halaviro Ahy ny finaonaonan’ny hiranareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy tiako hohenoina ny feon-dokanganareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aoka ny rariny hikoriana toy ny rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahamarinana ho tahaka ny renirano tsy mety ritra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ry taranak’i Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moa nanolotra sorona sy fanatitra ho Ahy ve ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandritra ny efapolo taona tany an-taniefitra?
- type: usfm
  marker: q1
  children:
