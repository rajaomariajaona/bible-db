document_id: 2CH.10
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: TANTARAN’IREO MPANJAKAN’I JODA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fivoriana tao Sekema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 12.1-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nankany Sekema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sekema: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 12.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Rehabohama, satria tao no efa nahatongavan’ny Israelita tavaratra rehetra hampanjaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’izay i Jerobohama, zanakalahin’i Nebata, dia tany Ejipta, noho izy nandositra lavitra an’i Salômôna mpanjaka. Koa rehefa ren’i Jerobohama fa hisy izany fivoriana izany, dia niverina avy tany Ejipta izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nisy olona nirahina haka azy ary tonga izy mbamin’ny Israelita tavaratra rehetra, ka niteny tamin-dRehabohama hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '–Irainao dia nampitondra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zioga
  - type: text
    text: ' mavesatra anay. Fa ankehitriny kosa, raha mba hamaivaninao ny fanompoana mafy tamin-drainao sy ny zioga mavesatra nampiantsorohany taminay, dia hanompo anao izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy ny navalin’i Rehabohama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rehefa afaka telo andro, dia miverena atỳ amiko indray ianareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia lasa nody ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I Rehabohama mpanjaka kosa naka hevitra tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' izay mpandraharahan’i Salômôna rainy fony fahavelony, ka nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana no hevitra omenareo havaliko an’ireo vahoaka ireo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy ny loholona tamin’i Rehabohama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha ho tsara fo amin’ireo vahoaka ireo ianao, ka halemy paika aminy sy hanao teny mamy aminy, dia ho mpanomponao hatrany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanjo tsy noraharahain’i Rehabohama ny torohevitra nomen’ny loholona azy; fa ny tovolahy izay nitovitovy taona aminy sady efa mpandraharahany no nakany hevitra, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona kosa no mba hevitra omenareo havalintsika ny vahoaka izay niangavy ahy hanamaivana ny zioga nampiantsorohan-draiko azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ireto tovolahy ireto tamin’i Rehabohama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Niangavian’ireo vahoaka ireo ianao hanamaivana ny zioga mavesatra nampiantsorohan-drainao azy. Koa izao no lazao aminy: «Ny ankikeliko dia lehibe noho ny sandrin-draiko'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 12.10 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raha nampitondra zioga mavesatra anareo ny raiko, izaho kosa vao mainka hanampy trotraka izany; karavasy tsotra no namaizan-draiko anareo, fa karavasy misy faraingo kosa no hamaizako anareo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’ny andro fahatelo dia nankany amin-dRehabohama i Jerôbohama sy ny vahoaka israelita tavaratra, araka ny tenin’ny mpanjaka hoe: «Miverena atỳ amiko ianareo amin’ny andro fahatelo». '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Teny mahery no navalin’ny mpanjaka ireo vahoaka fa tsy noraharahainy akory ny torohevitry ny loholona; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary araka ny torohevitr’ireo tovolahy no nitenenany taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nampitondra zioga mavesatra anareo ny raiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Nampitondra... ny raiko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy araka ny RM izany fa araka ny stf hebreo maro sy ireo dkt tranainy sady mifanaraka tsara amin’ny 10.11; ampit 1 Mp 12.11,14.
    marker-yv: yv-n
  - type: text
    text: ', fa izaho kosa vao mainka hanampy trotraka an’izany; karavasy tsotra no namaizan-draiko anareo, fa karavasy misy faraingo kosa no hamaizako anareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa tsy nankatò ny fitakian’ny vahoaka ny mpanjaka; fa ny TOMPO no nahatonga izany zavatra izany hahatanteraka ny fampanantenana izay nampilazainy an’i Ahià avy any Silao tamin’i Jerôbohama zanakalahin’i Nebata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 11.29-39.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Ny fanjakana voazara
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Rehabohama mpanjakan’i Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 12.16-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa tsapan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israelita
  - type: text
    text: ' tavaratra rehetra fa tsy nankatoavin’ny mpanjaka ny fitakiany, dia hoy ny navalin’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy manana anjara inona amin’i Davida isika na manana anjara lova amin’ny taranak’i Jisay. Samia mody any an-tranony avy isika, ry Israelita tavaratra! Ianao kosa, ry zafikelin’i Davida, karakarao ny fanjakanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 20.1.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia samy nody ho any an-tranony avy ny Israelita tavaratra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny Israelita nonina tany an-tanànan’i Joda ihany no nanjakàn’i Rehabohama. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary naniraka an’i Adôrama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 12.18 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' mpiandraikitra ny asa an-terivozona i Rehabohama mpanjaka; nefa nitora-bato an’i Adôrama ny Israelita tavaratra ka nahafaty azy. Zara raha afa-nitaingina ny kalesiny haingana i Rehabohama mba handositra any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy izany no nikomian’i Israely avaratra tamin’ny taranak’i Davida mandraka androany.
