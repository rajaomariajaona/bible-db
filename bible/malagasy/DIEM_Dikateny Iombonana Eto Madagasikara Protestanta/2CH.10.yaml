document_id: 2CH.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: TANTARAN’IREO MPANJAKAN’I JODA
  - type: heading
    content: Ny fivoriana tao Sekema
  - type: heading
    content: (Jereo 1 Mp 12.1-15)
  - type: text
    content: Nankany Sekema
  - type: note
    content: 'Sekema: jereo 1 Mp 12.1 sy nta.'
  - type: text
    content: ' i Rehabohama, satria tao no efa nahatongavan’ny Israelita tavaratra rehetra hampanjaka azy. '
  '10':
  - type: text
    content: 'Dia hoy ireto tovolahy ireto tamin’i Rehabohama:'
  - type: text
    content: '–Niangavian’ireo vahoaka ireo ianao hanamaivana ny zioga mavesatra nampiantsorohan-drainao azy. Koa izao no lazao aminy: «Ny ankikeliko dia lehibe noho ny sandrin-draiko'
  - type: note
    content: Jereo 1 Mp 12.10 sy nta.
  - type: text
    content: '. '
  '11':
  - type: text
    content: Raha nampitondra zioga mavesatra anareo ny raiko, izaho kosa vao mainka hanampy trotraka izany; karavasy tsotra no namaizan-draiko anareo, fa karavasy misy faraingo kosa no hamaizako anareo.»
  '12':
  - type: text
    content: 'Tamin’ny andro fahatelo dia nankany amin-dRehabohama i Jerôbohama sy ny vahoaka israelita tavaratra, araka ny tenin’ny mpanjaka hoe: «Miverena atỳ amiko ianareo amin’ny andro fahatelo». '
  '13':
  - type: text
    content: 'Teny mahery no navalin’ny mpanjaka ireo vahoaka fa tsy noraharahainy akory ny torohevitry ny loholona; '
  '14':
  - type: text
    content: 'ary araka ny torohevitr’ireo tovolahy no nitenenany taminy hoe:'
  - type: text
    content: –Nampitondra zioga mavesatra anareo ny raiko
  - type: note
    content: 'Nampitondra... ny raiko: tsy araka ny RM izany fa araka ny stf hebreo maro sy ireo dkt tranainy sady mifanaraka tsara amin’ny 10.11; ampit 1 Mp 12.11,14.'
  - type: text
    content: ', fa izaho kosa vao mainka hanampy trotraka an’izany; karavasy tsotra no namaizan-draiko anareo, fa karavasy misy faraingo kosa no hamaizako anareo.'
  '15':
  - type: text
    content: Koa tsy nankatò ny fitakian’ny vahoaka ny mpanjaka; fa ny TOMPO no nahatonga izany zavatra izany hahatanteraka ny fampanantenana izay nampilazainy an’i Ahià avy any Silao tamin’i Jerôbohama zanakalahin’i Nebata
  - type: note
    content: Jereo 1 Mp 11.29-39.
  - type: text
    content: .
  - type: heading
    content: Ny fanjakana voazara
  - type: heading
    content: I Rehabohama mpanjakan’i Joda
  - type: heading
    content: (Jereo 1 Mp 12.16-25)
  '16':
  - type: text
    content: 'Rehefa tsapan’ny '
  - type: text
    content: Israelita
  - type: text
    content: ' tavaratra rehetra fa tsy nankatoavin’ny mpanjaka ny fitakiany, dia hoy ny navalin’ireo hoe:'
  - type: text
    content: –Tsy manana anjara inona amin’i Davida isika na manana anjara lova amin’ny taranak’i Jisay. Samia mody any an-tranony avy isika, ry Israelita tavaratra! Ianao kosa, ry zafikelin’i Davida, karakarao ny fanjakanao
  - type: note
    content: Jereo 2 Sam 20.1.
  - type: text
    content: .
  - type: text
    content: 'Dia samy nody ho any an-tranony avy ny Israelita tavaratra rehetra. '
  '17':
  - type: text
    content: 'Ny Israelita nonina tany an-tanànan’i Joda ihany no nanjakàn’i Rehabohama. '
  '18':
  - type: text
    content: Ary naniraka an’i Adôrama
  - type: note
    content: Jereo 1 Mp 12.18 sy nta.
  - type: text
    content: ' mpiandraikitra ny asa an-terivozona i Rehabohama mpanjaka; nefa nitora-bato an’i Adôrama ny Israelita tavaratra ka nahafaty azy. Zara raha afa-nitaingina ny kalesiny haingana i Rehabohama mba handositra any Jerosalema. '
  '19':
  - type: text
    content: Toy izany no nikomian’i Israely avaratra tamin’ny taranak’i Davida mandraka androany.
  '2':
  - type: text
    content: 'Tamin’izay i Jerobohama, zanakalahin’i Nebata, dia tany Ejipta, noho izy nandositra lavitra an’i Salômôna mpanjaka. Koa rehefa ren’i Jerobohama fa hisy izany fivoriana izany, dia niverina avy tany Ejipta izy. '
  '3':
  - type: text
    content: 'Nisy olona nirahina haka azy ary tonga izy mbamin’ny Israelita tavaratra rehetra, ka niteny tamin-dRehabohama hoe:'
  '4':
  - type: text
    content: '–Irainao dia nampitondra '
  - type: text
    content: zioga
  - type: text
    content: ' mavesatra anay. Fa ankehitriny kosa, raha mba hamaivaninao ny fanompoana mafy tamin-drainao sy ny zioga mavesatra nampiantsorohany taminay, dia hanompo anao izahay.'
  '5':
  - type: text
    content: 'Dia hoy ny navalin’i Rehabohama:'
  - type: text
    content: –Rehefa afaka telo andro, dia miverena atỳ amiko indray ianareo.
  - type: text
    content: 'Dia lasa nody ny olona. '
  '6':
  - type: text
    content: 'I Rehabohama mpanjaka kosa naka hevitra tamin’ny '
  - type: text
    content: loholona
  - type: text
    content: ' izay mpandraharahan’i Salômôna rainy fony fahavelony, ka nanontany azy hoe:'
  - type: text
    content: –Ahoana no hevitra omenareo havaliko an’ireo vahoaka ireo?
  '7':
  - type: text
    content: 'Dia hoy ny loholona tamin’i Rehabohama:'
  - type: text
    content: –Raha ho tsara fo amin’ireo vahoaka ireo ianao, ka halemy paika aminy sy hanao teny mamy aminy, dia ho mpanomponao hatrany izy.
  '8':
  - type: text
    content: 'Kanjo tsy noraharahain’i Rehabohama ny torohevitra nomen’ny loholona azy; fa ny tovolahy izay nitovitovy taona aminy sady efa mpandraharahany no nakany hevitra, '
  '9':
  - type: text
    content: 'ka nanontaniany hoe:'
  - type: text
    content: –Inona kosa no mba hevitra omenareo havalintsika ny vahoaka izay niangavy ahy hanamaivana ny zioga nampiantsorohan-draiko azy?
