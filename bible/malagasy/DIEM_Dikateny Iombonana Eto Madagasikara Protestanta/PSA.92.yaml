    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa ny olo-marina kosa hamololona toy ny rofia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hisandrahaka toy ny sederan’i Libano:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Toy ny hazo ambolena eo an-tokotanin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mivelatra eo an-kianjan’ny TOMPO Andriamanitsika;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: sady, na antitra aza, dia mamoa hatrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mbola maitso sy milenodenoka;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: izany no porofo fa mahitsy ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy olakolaka ao amin’ilay Mpiaro ahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsara ny midera Anao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny mankalaza Anao an-kira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry ilay Andriamanitra Avo Indrindra,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ka manambara ny fitiavanao raha vao maraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahamarinanao mandritra ny alina,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: amin’ny valiha torifolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny feon-dokanga.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mahafaly ahy ny asanao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manao horakora-pihobiana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manoloana ireo zavatra vitanao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Lehibe tokoa izay nataonao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary lalina aoka izany ny fisainanao!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny ketrina no tsy mahalala izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny adala no tsy mahatsapa.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Na manorobona toy ny ahitra aza ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mamony avokoa ny mpanao ny tsy rariny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny mba haringana mandrakizay.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ianao, TOMPO ô, no ambony indrindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitoetra ho mandrakizay!
