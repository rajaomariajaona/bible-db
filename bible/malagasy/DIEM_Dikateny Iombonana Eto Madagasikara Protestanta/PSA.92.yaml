document_id: PSA.92,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Mahasoa ny midera ny Tompo
  - type: text
    content: ' '
  - type: text
    content: Salamo. Tononkira fanao amin’ny andro
  - type: text
    content: ' '
  - type: text
    content: sabata
  - type: text
    content: .
  '10':
  - type: text
    content: Ireo fahavalonao kosa, TOMPO ô,
  - type: text
    content: eny, ireo fahavalonao dia ho levona
  - type: text
    content: ireo mpanao tsy an-drariny hiparitaka avokoa.
  '11':
  - type: text
    content: Nomenao ahy ny tanjaky ny ombimanga,
  - type: text
    content: nandrarahanao menaka mbola vao aho
  - type: note
    content: Ny menaka na ilomanitra araraka toy izao dia mariky ny fahaiza-mandray olona sy mariky ny fetim-pifaliana; jereo Sal 23.5; 133.2.
  - type: text
    content: .
  '12':
  - type: text
    content: Hitako ny faharesen’ireo mpifanandrina amiko,
  - type: text
    content: ary reko ny fikaikaikan’ireo mpisetrasetra ahy.
  '13':
  - type: text
    content: Fa ny olo-marina kosa hamololona toy ny rofia,
  - type: text
    content: 'hisandrahaka toy ny sederan’i Libano:'
  '14':
  - type: text
    content: 'Toy ny hazo ambolena eo an-tokotanin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' izy'
  - type: text
    content: ka mivelatra eo an-kianjan’ny TOMPO Andriamanitsika;
  '15':
  - type: text
    content: sady, na antitra aza, dia mamoa hatrany
  - type: text
    content: ary mbola maitso sy milenodenoka;
  '16':
  - type: text
    content: izany no porofo fa mahitsy ny TOMPO,
  - type: text
    content: ary tsy misy olakolaka ao amin’ilay Mpiaro ahy.
  '2':
  - type: text
    content: Tsara ny midera Anao, TOMPO ô,
  - type: text
    content: sy ny mankalaza Anao an-kira,
  - type: text
    content: ry ilay Andriamanitra Avo Indrindra,
  '3':
  - type: text
    content: ka manambara ny fitiavanao raha vao maraina
  - type: text
    content: ary ny fahamarinanao mandritra ny alina,
  '4':
  - type: text
    content: amin’ny valiha torifolo
  - type: text
    content: sy amin’ny feon-dokanga.
  '5':
  - type: text
    content: Mahafaly ahy ny asanao, TOMPO ô,
  - type: text
    content: ary manao horakora-pihobiana aho
  - type: text
    content: manoloana ireo zavatra vitanao.
  '6':
  - type: text
    content: Lehibe tokoa izay nataonao, TOMPO ô,
  - type: text
    content: ary lalina aoka izany ny fisainanao!
  '7':
  - type: text
    content: Ny ketrina no tsy mahalala izany
  - type: text
    content: ary ny adala no tsy mahatsapa.
  '8':
  - type: text
    content: Na manorobona toy ny ahitra aza ny olon-dratsy
  - type: text
    content: ka mamony avokoa ny mpanao ny tsy rariny,
  - type: text
    content: dia ny mba haringana mandrakizay.
  '9':
  - type: text
    content: Ianao, TOMPO ô, no ambony indrindra
  - type: text
    content: ka mitoetra ho mandrakizay!
