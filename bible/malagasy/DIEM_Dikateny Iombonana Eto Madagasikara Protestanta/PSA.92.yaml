      children:
      - type: text
        text: '12'
    - type: text
      text: Hitako ny faharesen’ireo mpifanandrina amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary reko ny fikaikaikan’ireo mpisetrasetra ahy.
  '13':
  - type: usfm
