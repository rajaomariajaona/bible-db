document_id: 2TH.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mivavaha ho anay
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Farany, ry havana, mivavaha ho anay mba hiely faingana ny tenin’ny Tompo, ka hankatoavina araka ny voninahitra tandrify azy, toy ny teo aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mivavaha koa mba hanafahan’Andriamanitra anay amin’ny olona tsy valahara sy ratsy fanahy; satria tsy ary manana finoana avokoa ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa mitana ny toky nomeny ny Tompo, ka hampahery anareo sady hiaro anareo tsy ho azon’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ilay Ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 6.13; Jôh 17.15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary omen’ny Tompo fitokiana izahay ny momba anareo, ka azonay antoka fa ny zavatra ameperanay anareo dia efa ataonareo sady mbola hataonareo hatrany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny Tompo anie hitarika ny fonareo hahatsapa ny fitiavan’Andriamanitra anareo sy hanam-paharetana miandry ny fiavian’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hahatsapa... Kristy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ho amin’ny fitiavana an’Andriamanitra sy ny faharetana omen’i Kristy.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fananarana mba tsy ho kamo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ry havana, mamarafara anareo amin’ny anaran’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika izahay: halaviro ny namana kamo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kamo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: misarita-piainana, tsy mitoetra tsara.
    marker-yv: yv-n
  - type: text
    text: ', tsy manaraka ny fampianarana efa nampitainay taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Eny, fantatrareo izay tokony hataonareo hanahafanareo anay. Tsy olona kamo izahay, fony tatỳ aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy nihinana ny sakafon’olona maimaimpoana izahay, fa nikely aina sy nisasatra niasa andro aman’alina mba tsy hanahirana na dia iray aminareo aza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Tes 2.9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izany no nataonay, dia tsy hoe tsy manan-jo handray fanampiana avy aminareo izahay, fa mba hanomezanay ohatra hotahafinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eny, fony tany aminareo izahay, dia namepetra anareo hoe: «Raha misy tsy te hiasa, aoka izy tsy hihinana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Tes 4.11.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izany no lazainay dia satria renay fa misy aminareo kamo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kamo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: misarita-piainana, tsy mitoetra tsara.
    marker-yv: yv-n
  - type: text
    text: 'tsy miasa fa manao zavatra tsisy antony etsy sy eroa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny olona toy izany dia feperanay sady ampirisihinay amin’ny anaran’i Jesoa Kristy Tompo mba hiasa amim-pilaminana ka hihinana ny azy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ianareo kosa, ry havana, aza ketraka amin’ny fanaovan-tsoa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha misy olona tsy manaiky ny teny ataonay amin’ny alalan’izao taratasy izao, dia mariho izy ka aza ifampiraharahana mihitsy mba hahamenatra azy; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: kanefa aza raisina ho fahavalo izy fa anaro toy ny mpiray tampo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsodrano sy fanaovam-beloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny Tompo loharanom-piadanana anie hanome anareo fiadanana mandrakariva amin’ny zavatra rehetra! Homba anareo rehetra anie ny Tompo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Soratanako ireto teny ireo: veloma, hoy i Paoly. Io no sonia famantarana ny taratasiko rehetra; izao no soratro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Homba anareo rehetra anie ny fahasoavan’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika!'
