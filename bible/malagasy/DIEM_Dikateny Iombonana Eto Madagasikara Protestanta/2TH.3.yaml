document_id: 2TH.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mivavaha ho anay
  - type: text
    content: 'Farany, ry havana, mivavaha ho anay mba hiely faingana ny tenin’ny Tompo, ka hankatoavina araka ny voninahitra tandrify azy, toy ny teo aminareo. '
  '10':
  - type: text
    content: 'Eny, fony tany aminareo izahay, dia namepetra anareo hoe: «Raha misy tsy te hiasa, aoka izy tsy hihinana'
  - type: note
    content: Ampit 1Tes 4.11.
  - type: text
    content: '!»'
  '11':
  - type: text
    content: Izany no lazainay dia satria renay fa misy aminareo kamo
  - type: note
    content: 'kamo: dkt hafa misarita-piainana, tsy mitoetra tsara.'
  - type: text
    content: 'tsy miasa fa manao zavatra tsisy antony etsy sy eroa. '
  '12':
  - type: text
    content: Ny olona toy izany dia feperanay sady ampirisihinay amin’ny anaran’i Jesoa Kristy Tompo mba hiasa amim-pilaminana ka hihinana ny azy ihany.
  '13':
  - type: text
    content: 'Fa ianareo kosa, ry havana, aza ketraka amin’ny fanaovan-tsoa. '
  '14':
  - type: text
    content: 'Raha misy olona tsy manaiky ny teny ataonay amin’ny alalan’izao taratasy izao, dia mariho izy ka aza ifampiraharahana mihitsy mba hahamenatra azy; '
  '15':
  - type: text
    content: kanefa aza raisina ho fahavalo izy fa anaro toy ny mpiray tampo.
  - type: heading
    content: Tsodrano sy fanaovam-beloma
  '16':
  - type: text
    content: Ny Tompo loharanom-piadanana anie hanome anareo fiadanana mandrakariva amin’ny zavatra rehetra! Homba anareo rehetra anie ny Tompo!
  '17':
  - type: text
    content: 'Soratanako ireto teny ireo: veloma, hoy i Paoly. Io no sonia famantarana ny taratasiko rehetra; izao no soratro.'
  '18':
  - type: text
    content: 'Homba anareo rehetra anie ny fahasoavan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika!'
  '2':
  - type: text
    content: Mivavaha koa mba hanafahan’Andriamanitra anay amin’ny olona tsy valahara sy ratsy fanahy; satria tsy ary manana finoana avokoa ny olona rehetra.
  '3':
  - type: text
    content: Fa mitana ny toky nomeny ny Tompo, ka hampahery anareo sady hiaro anareo tsy ho azon’
  - type: text
    content: ilay Ratsy
  - type: note
    content: Ampit Mt 6.13; Jôh 17.15.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Ary omen’ny Tompo fitokiana izahay ny momba anareo, ka azonay antoka fa ny zavatra ameperanay anareo dia efa ataonareo sady mbola hataonareo hatrany.
  '5':
  - type: text
    content: 'Ny Tompo anie hitarika ny fonareo hahatsapa ny fitiavan’Andriamanitra anareo sy hanam-paharetana miandry ny fiavian’i '
  - type: text
    content: Kristy
  - type: note
    content: 'hahatsapa... Kristy: dkt hafa ho amin’ny fitiavana an’Andriamanitra sy ny faharetana omen’i Kristy.'
  - type: text
    content: '!'
  - type: heading
    content: Fananarana mba tsy ho kamo
  '6':
  - type: text
    content: 'Ry havana, mamarafara anareo amin’ny anaran’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika izahay: halaviro ny namana kamo'
  - type: note
    content: 'kamo: dkt hafa misarita-piainana, tsy mitoetra tsara.'
  - type: text
    content: ', tsy manaraka ny fampianarana efa nampitainay taminy. '
  '7':
  - type: text
    content: 'Eny, fantatrareo izay tokony hataonareo hanahafanareo anay. Tsy olona kamo izahay, fony tatỳ aminareo. '
  '8':
  - type: text
    content: Tsy nihinana ny sakafon’olona maimaimpoana izahay, fa nikely aina sy nisasatra niasa andro aman’alina mba tsy hanahirana na dia iray aminareo aza
  - type: note
    content: Ampit 1Tes 2.9.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Izany no nataonay, dia tsy hoe tsy manan-jo handray fanampiana avy aminareo izahay, fa mba hanomezanay ohatra hotahafinareo. '
