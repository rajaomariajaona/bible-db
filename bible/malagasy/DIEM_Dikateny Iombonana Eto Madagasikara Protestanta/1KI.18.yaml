document_id: 1KI.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Elià nanambara ny fiafaran’ny hain-tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fotoana elaela tatỳ aoriana, tamin’ny taona fahatelo nisian’ny hain-tany, dia nisy tenin’ny TOMPO tamin’i Elià nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana hiseho amin’i Ahaba, fa handatsaka ranonorana amin’ny tany Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia lasa i Elià niseho tamin’i Ahaba.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Namely mafy ny mosary tany Samaria, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka niantso an’i Hôbadià filohan’ny lapa i Ahaba. Ary i Hôbadià dia fatra-panaja ny TOMPO; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa tamin’ny nandringanan’i Jezebela ny mpaminanin’ny TOMPO, dia mpaminany zato no voavonjin’i Hôbadià rehefa nafeniny nitsinjara dimampolo avy tany anaty zohy ka novatsìny mofo sy rano. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ka hoy i Ahàba tamin’i Hôbadià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha hotetezintsika ny tany hijerena ny loharano sy riaka rehetra, sao hahita ahitra ihany isika hamelomana ny soavaly sy ny boriky mba tsy hamonoana ny biby fiompintsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia notsinjarainy ny tany hotetezina, ka i Ahaba nandeha tany amin’ny lalany ary i Hôbadià kosa tamin’ny azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa raha ilay nandeha tamin’ny lalana iny i Hôbadià, dia nifanena tampoka tamin’i Elià. Fantatr’i Hôbadià izy ka niankohofany ho fanajana azy, ary nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao va ity, ry Elià tompoko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ka novalian’i Elià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Eny, izaho ihany ity. Mandehana lazao amin’i Ahaba tomponao hoe: «Tonga ao i Elià!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy i Hôbadià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona no ratsy nataoko no atolotrao ho eo an-tanan’i Ahaba aho mba hovonoiny ho faty? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Velona ny TOMPO Andriamanitrao ka hizingiziniko aminao fa tsy misy firenena na fanjakana izay tsy nanirahan’i Ahaba olona hitady anao; ary raha misy manao hoe: «Tsy atỳ aminay izy», dia nasainy nianiana ho tsy nahita anao izany fanjakana sy firenena izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ankehitriny anefa dia asainao milaza amin’i Ahaba tompoko aho hoe: «Tonga ao i Elià!» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa vao miala eto aminao aho, dia hoentin’ny Fanahin’ny TOMPO any amin’izay tsy fantatro ianao; ary raha handeha hilaza amin’i Ahaba aho nefa ianao tsy ho hitany, dia hataony maty aho. Hatry ny fahazazàko anefa aho no fatra-panaja ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moa tsy mba notantaraina taminao va, tompoko, izay nataoko tamin’ny namonoan’i Jezebela ho faty ireo mpaminanin’ny TOMPO? Zato tamin’ireny mpaminanin’ny TOMPO ireny no nafeniko nitsinjara dimampolo avy tany anaty zohy ka novatsiko mofo sy rano. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ankehitriny anefa dia asainao milaza amin’i Ahaba aho hoe: «Tonga ao i Elià!» Koa hovonoiny ho faty tokoa aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy i Elià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Velona Andriamanitra TOMPOn’izao rehetra izao, dia ilay Andriamanitra tompoiko, koa hizingiziniko fa hiseho amin’i Ahaba tokoa aho anio.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niseho tamin’i Ahaba i Elià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia lasa nitsena an’i Ahaba i Hôbadià ka nanao tatitra taminy; ary lasa nitsena an’i Elià i Ahaba. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa hitan’i Ahaba i Elià, dia nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hay! Tonga ianao, ry ilay mpitondra loza amin’i Israely!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa i Elià namaly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy izaho no mpitondra loza amin’i Israely, fa ianao sy ny fianakavianao satria nandà ny didin’ny TOMPO ianareo sady nivavaka tamin’ireo andriamanitra Bahala. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ankehitriny maniraha olona hamory ny vahoakan’i Israely rehetra hihaona amiko any an-tendrombohitr’i Karmela miaraka amin’ny mpaminanin’i Bahala 450 sy ny mpaminanin’i Aserà efajato izay mihinana eo amin’ny latabatr’i Jezebela.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Elià sy ireo mpaminanin’i Bahala tao Karmela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nampiantsoin’i Ahaba ho tonga ao an-tendrombohitr’i Karmela ny Israelita rehetra ary koa ireo mpaminany. Rehefa vory avokoa ny besinimaro, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia nankeo amin’ny vahoaka rehetra i Elià ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandra-pahoviana no hampiroaroa saina anareo? Raha ny TOMPO no tena Andriamanitra, manaraha Azy; fa raha i Bahala kosa no tena Andriamanitra, dia manaraha azy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Saingy tsy nisy namaly azy ny vahoaka; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'dia hoy indray i Elià taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho irery sisa no mpaminanin’ny TOMPO, fa ny mpaminanin’i Bahala kosa misy 450 lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aoka homena ombilahy roa izahay; ka ianareo mpaminanin’i Bahala hifidy anankiray hotetehinareo sy hapetrakareo eo ambony kitay mba hatao sorona, saingy tsy hasiana afo ao. Izaho kosa hikarakara ny anankiray ka hametraka izany eo ambony kitay, saingy tsy hasiana afo koa ao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hiantso ny anaran’ny andriamanitrareo ianareo, fa izaho kosa hiantso ny anaran’ny TOMPO; koa izay mamaly vavaka amin’ny fandrehetana ny afo no ho tena Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary ny vahoaka rehetra namaly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Marina izany teny izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy i Elià tamin’ny mpaminanin’i Bahala:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mifidiana ombilahy iray amin’ireo. Ianareo no mikarakarà voalohany, satria maro ianareo; ary antsoy ny anaran’ny andriamanitrareo, nefa aza asiana afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nalain’ireo ny ombilahy izay nomena azy ka nokarakarainy hatao sorona; ary niantso ny anaran’i Bahala izy hatramin’ny maraina ka mandra-pitataovovonan’ny andro nanao hoe: «Ry Bahala ô, mamalia anay!» Kanjo tsy nisy nanoina na namaly akory. Ary nihinjakinjaka nanodidina ny alitara namboariny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’ny mitataovovonana dia naneso azy ireo i Elià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Antsoy mafy ihany fa andriamanitra izy, ka sao dia maro herehina na koa mbola varian-dresaka, na nisy dia nalehany, na koa matory angamba izy ka mila hofohazina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia niantso mafy indray ireo sady niteti-tena tamin’ny sabatra sy ny lefona mandra-pivoa-dra araka ny fanaony. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Rehefa dila ny mitataovovonana, dia mbola nirediredy niantso an’i Bahala ihany izy mandra-pahatonga ny fotoana fanaovany sorona takariva, nefa tsy nisy nanoina na namaly teny amam-pihetsika azy akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy i Elià tamin’ny vahoaka rehetra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manatòna ahy ianareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nanatona azy ny vahoaka rehetra. Rehefa izany, dia namboarin’i Elià ny alitaran’ny TOMPO izay efa rava, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ka naka vato 12 izy araka ny isan’ireo fokon’ny taranak’i Jakôba izay nitenenan’ny TOMPO hoe: «Israely no ho anaranao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 32.29; 35.10.
    marker-yv: yv-n
  - type: text
    text: '». '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ireo vato ireo no nanamboarany alitara ho an’ny anaran’ny TOMPO; ary ny manodidina ny alitara dia nanaovany hady kely mahalany telopolo litatra eo ho eo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nalahany teo ambony alitara ny kitay, dia norasainy ny omby ka napetrany teo ambonin’ny kitay. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Rehefa izany dia hoy i Elià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fenoy rano ny siny efatra ka araraho eo amin’ny sorona dorana manontolo sy amin’ny kitay.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nataon’ny olona izany; fa hoy indray i Elià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy fanindroany!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nataon’ny olona fanindroany izany. Ary hoy ihany i Elià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy fanintelony!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nataon’ny olona fanintelony izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Dia nataon’ny...izany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt tranainy grika; tsy hita ao amin’ny RM ireo teny ireo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary nikoriana nanodidina ny alitara ny rano ka nahafeno ny hady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa tamin’ny fotoan’ny sorona tolakandro dia nanatona i Elià mpaminany ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry TOMPO Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba ô, asehoy ankehitriny fa Ianao no Andriamanitra amin’i Israely; ary izaho dia mpanomponao ka baiko avy taminao no nanaovako izao zavatra rehetra izao. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: TOMPO ô, mihainoa ahy mba hahafantaran’ireto vahoaka ireto fa Ianao TOMPO no tena Andriamanitra, ary Ianao ihany no mampiverina indray ny fony ho aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia nalatsaky ny TOMPO ny afo, ka nandoro ny sorona dorana manontolo sy ny kitay ary ny vato sy ny vovoka sady nandritra ny rano tao amin’ny hady. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Raha nahita izany ny Israelita rehetra, dia niankohoka nitehi-tany ka nanao hoe: «Ny TOMPO no tena Andriamanitra. Ny TOMPO no tena Andriamanitra!» '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary hoy i Elià tamin’izy ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sambory ny mpaminanin’i Bahala ary aza avela hisy afa-mandositra na dia iray aza.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nosamborina avokoa ireny ka nentin’i Elià teo amin’ny lohasahan-driakan’i Kisôna ary novonoiny ho faty teo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fomba izay mora narahiny tamin’ny fotoanandro, jereo and 13. Ireo mpaminanin’izay andriamanitra tsy manan-kery dia natao toy ny vavolombelona mandainga; ampit 2 Mp 10.18-25.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avy indray ny ranonorana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hoy i Elià tamin’i Ahaba:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha mihinana sy misotro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Noho ny hain-tany naharitra, dia nanome baiko hifady hanina*, toy ny tamin’ny fotoan’ny loza lehibe ny manampahefana, ampit Jer 36.9.
    marker-yv: yv-n
  - type: text
    text: ' fa efa reko ny fivatravatran’ny orambe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia nandeha hihinana sy hisotro i Ahaba; fa i Elià kosa nananika ny tampon’i Karmela, ary niankohoka nitehi-tany izy ka ny lohany nataony teo anelanelan’ny lohaliny. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary hoy izy tamin’ny mpanompony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miakara ka mijere mankany amin’ny ranomasina.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niakatra izy ka nijery sady niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy misy na inona na inona.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nasain’i Elià niverina nijery impito izy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ka tamin’ny fanimpitony, dia hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro misy rahona kely hoatra ny totohondry miakatra avy eny an-dranomasina.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy i Elià taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ndeha lazao i Ahaba hamboatra ny kalesiny dia hidina, fandrao ho voasakan’ny orana. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Fa raha nihamaintin-drahona ny lanitra sady nandrivotra be ny andro ary nilatsaka ny orambe, i Ahaba kosa nitaingina ny kalesiny ka lasa nankany Jizrehela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.45 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 42-45:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jak 5.18.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Fa nombàn’ny herin’ny TOMPO i Elià, koa namatotra fehikibo izy ary lasa nihazakazaka teo alohan’ny kalesin’i Ahaba mandra-pahatongany teo am-bavahadin’i Jizrehela.
