document_id: 1KI.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Elià nanambara ny fiafaran’ny hain-tany
  - type: text
    content: 'Fotoana elaela tatỳ aoriana, tamin’ny taona fahatelo nisian’ny hain-tany, dia nisy tenin’ny TOMPO tamin’i Elià nanao hoe:'
  - type: text
    content: –Mandehana hiseho amin’i Ahaba, fa handatsaka ranonorana amin’ny tany Aho.
  '10':
  - type: text
    content: 'Velona ny TOMPO Andriamanitrao ka hizingiziniko aminao fa tsy misy firenena na fanjakana izay tsy nanirahan’i Ahaba olona hitady anao; ary raha misy manao hoe: «Tsy atỳ aminay izy», dia nasainy nianiana ho tsy nahita anao izany fanjakana sy firenena izany. '
  '11':
  - type: text
    content: 'Ankehitriny anefa dia asainao milaza amin’i Ahaba tompoko aho hoe: «Tonga ao i Elià!» '
  '12':
  - type: text
    content: 'Nefa vao miala eto aminao aho, dia hoentin’ny Fanahin’ny TOMPO any amin’izay tsy fantatro ianao; ary raha handeha hilaza amin’i Ahaba aho nefa ianao tsy ho hitany, dia hataony maty aho. Hatry ny fahazazàko anefa aho no fatra-panaja ny TOMPO. '
  '13':
  - type: text
    content: 'Moa tsy mba notantaraina taminao va, tompoko, izay nataoko tamin’ny namonoan’i Jezebela ho faty ireo mpaminanin’ny TOMPO? Zato tamin’ireny mpaminanin’ny TOMPO ireny no nafeniko nitsinjara dimampolo avy tany anaty zohy ka novatsiko mofo sy rano. '
  '14':
  - type: text
    content: 'Ankehitriny anefa dia asainao milaza amin’i Ahaba aho hoe: «Tonga ao i Elià!» Koa hovonoiny ho faty tokoa aho.'
  '15':
  - type: text
    content: 'Fa hoy i Elià hoe:'
  - type: text
    content: –Velona Andriamanitra TOMPOn’izao rehetra izao, dia ilay Andriamanitra tompoiko, koa hizingiziniko fa hiseho amin’i Ahaba tokoa aho anio.
  - type: heading
    content: Niseho tamin’i Ahaba i Elià
  '16':
  - type: text
    content: 'Dia lasa nitsena an’i Ahaba i Hôbadià ka nanao tatitra taminy; ary lasa nitsena an’i Elià i Ahaba. '
  '17':
  - type: text
    content: 'Rehefa hitan’i Ahaba i Elià, dia nilazany hoe:'
  - type: text
    content: –Hay! Tonga ianao, ry ilay mpitondra loza amin’i Israely!
  '18':
  - type: text
    content: 'Fa i Elià namaly hoe:'
  - type: text
    content: '–Tsy izaho no mpitondra loza amin’i Israely, fa ianao sy ny fianakavianao satria nandà ny didin’ny TOMPO ianareo sady nivavaka tamin’ireo andriamanitra Bahala. '
  '19':
  - type: text
    content: Ary ankehitriny maniraha olona hamory ny vahoakan’i Israely rehetra hihaona amiko any an-tendrombohitr’i Karmela miaraka amin’ny mpaminanin’i Bahala 450 sy ny mpaminanin’i Aserà efajato izay mihinana eo amin’ny latabatr’i Jezebela.
  - type: heading
    content: I Elià sy ireo mpaminanin’i Bahala tao Karmela
  '2':
  - type: text
    content: Dia lasa i Elià niseho tamin’i Ahaba.
  - type: text
    content: 'Namely mafy ny mosary tany Samaria, '
  '20':
  - type: text
    content: 'Dia nampiantsoin’i Ahaba ho tonga ao an-tendrombohitr’i Karmela ny Israelita rehetra ary koa ireo mpaminany. Rehefa vory avokoa ny besinimaro, '
  '21':
  - type: text
    content: 'dia nankeo amin’ny vahoaka rehetra i Elià ka nanao hoe:'
  - type: text
    content: –Mandra-pahoviana no hampiroaroa saina anareo? Raha ny TOMPO no tena Andriamanitra, manaraha Azy; fa raha i Bahala kosa no tena Andriamanitra, dia manaraha azy.
  - type: text
    content: 'Saingy tsy nisy namaly azy ny vahoaka; '
  '22':
  - type: text
    content: 'dia hoy indray i Elià taminy:'
  - type: text
    content: '–Izaho irery sisa no mpaminanin’ny TOMPO, fa ny mpaminanin’i Bahala kosa misy 450 lahy. '
  '23':
  - type: text
    content: 'Aoka homena ombilahy roa izahay; ka ianareo mpaminanin’i Bahala hifidy anankiray hotetehinareo sy hapetrakareo eo ambony kitay mba hatao sorona, saingy tsy hasiana afo ao. Izaho kosa hikarakara ny anankiray ka hametraka izany eo ambony kitay, saingy tsy hasiana afo koa ao. '
  '24':
  - type: text
    content: Hiantso ny anaran’ny andriamanitrareo ianareo, fa izaho kosa hiantso ny anaran’ny TOMPO; koa izay mamaly vavaka amin’ny fandrehetana ny afo no ho tena Andriamanitra.
  - type: text
    content: 'Ary ny vahoaka rehetra namaly hoe:'
  - type: text
    content: –Marina izany teny izany.
  '25':
  - type: text
    content: 'Dia hoy i Elià tamin’ny mpaminanin’i Bahala:'
  - type: text
    content: –Mifidiana ombilahy iray amin’ireo. Ianareo no mikarakarà voalohany, satria maro ianareo; ary antsoy ny anaran’ny andriamanitrareo, nefa aza asiana afo.
  '26':
  - type: text
    content: 'Dia nalain’ireo ny ombilahy izay nomena azy ka nokarakarainy hatao sorona; ary niantso ny anaran’i Bahala izy hatramin’ny maraina ka mandra-pitataovovonan’ny andro nanao hoe: «Ry Bahala ô, mamalia anay!» Kanjo tsy nisy nanoina na namaly akory. Ary nihinjakinjaka nanodidina ny alitara namboariny izy. '
  '27':
  - type: text
    content: 'Tamin’ny mitataovovonana dia naneso azy ireo i Elià hoe:'
  - type: text
    content: –Antsoy mafy ihany fa andriamanitra izy, ka sao dia maro herehina na koa mbola varian-dresaka, na nisy dia nalehany, na koa matory angamba izy ka mila hofohazina.
  '28':
  - type: text
    content: 'Dia niantso mafy indray ireo sady niteti-tena tamin’ny sabatra sy ny lefona mandra-pivoa-dra araka ny fanaony. '
  '29':
  - type: text
    content: Rehefa dila ny mitataovovonana, dia mbola nirediredy niantso an’i Bahala ihany izy mandra-pahatonga ny fotoana fanaovany sorona takariva, nefa tsy nisy nanoina na namaly teny amam-pihetsika azy akory.
  '3':
  - type: text
    content: 'ka niantso an’i Hôbadià filohan’ny lapa i Ahaba. Ary i Hôbadià dia fatra-panaja ny TOMPO; '
  '30':
  - type: text
    content: 'Ary hoy i Elià tamin’ny vahoaka rehetra:'
  - type: text
    content: –Manatòna ahy ianareo.
  - type: text
    content: 'Dia nanatona azy ny vahoaka rehetra. Rehefa izany, dia namboarin’i Elià ny alitaran’ny TOMPO izay efa rava, '
  '31':
  - type: text
    content: 'ka naka vato 12 izy araka ny isan’ireo fokon’ny taranak’i Jakôba izay nitenenan’ny TOMPO hoe: «Israely no ho anaranao'
  - type: note
    content: Jereo Gen 32.29; 35.10.
  - type: text
    content: '». '
  '32':
  - type: text
    content: 'Ireo vato ireo no nanamboarany alitara ho an’ny anaran’ny TOMPO; ary ny manodidina ny alitara dia nanaovany hady kely mahalany telopolo litatra eo ho eo. '
  '33':
  - type: text
    content: 'Ary nalahany teo ambony alitara ny kitay, dia norasainy ny omby ka napetrany teo ambonin’ny kitay. '
  '34':
  - type: text
    content: 'Rehefa izany dia hoy i Elià hoe:'
  - type: text
    content: –Fenoy rano ny siny efatra ka araraho eo amin’ny sorona dorana manontolo sy amin’ny kitay.
  - type: text
    content: 'Dia nataon’ny olona izany; fa hoy indray i Elià hoe:'
  - type: text
    content: –Ataovy fanindroany!
  - type: text
    content: 'Dia nataon’ny olona fanindroany izany. Ary hoy ihany i Elià hoe:'
  - type: text
    content: –Ataovy fanintelony!
  - type: text
    content: Dia nataon’ny olona fanintelony izany
  - type: note
    content: 'Dia nataon’ny...izany: araka ny dkt tranainy grika; tsy hita ao amin’ny RM ireo teny ireo.'
  - type: text
    content: '. '
  '35':
  - type: text
    content: Ary nikoriana nanodidina ny alitara ny rano ka nahafeno ny hady.
  '36':
  - type: text
    content: 'Fa tamin’ny fotoan’ny sorona tolakandro dia nanatona i Elià mpaminany ka nanao hoe:'
  - type: text
    content: '–Ry TOMPO Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba ô, asehoy ankehitriny fa Ianao no Andriamanitra amin’i Israely; ary izaho dia mpanomponao ka baiko avy taminao no nanaovako izao zavatra rehetra izao. '
  '37':
  - type: text
    content: TOMPO ô, mihainoa ahy mba hahafantaran’ireto vahoaka ireto fa Ianao TOMPO no tena Andriamanitra, ary Ianao ihany no mampiverina indray ny fony ho aminao.
  '38':
  - type: text
    content: 'Dia nalatsaky ny TOMPO ny afo, ka nandoro ny sorona dorana manontolo sy ny kitay ary ny vato sy ny vovoka sady nandritra ny rano tao amin’ny hady. '
  '39':
  - type: text
    content: 'Raha nahita izany ny Israelita rehetra, dia niankohoka nitehi-tany ka nanao hoe: «Ny TOMPO no tena Andriamanitra. Ny TOMPO no tena Andriamanitra!» '
  '4':
  - type: text
    content: 'fa tamin’ny nandringanan’i Jezebela ny mpaminanin’ny TOMPO, dia mpaminany zato no voavonjin’i Hôbadià rehefa nafeniny nitsinjara dimampolo avy tany anaty zohy ka novatsìny mofo sy rano. '
  '40':
  - type: text
    content: 'Ary hoy i Elià tamin’izy ireo:'
  - type: text
    content: –Sambory ny mpaminanin’i Bahala ary aza avela hisy afa-mandositra na dia iray aza.
  - type: text
    content: Dia nosamborina avokoa ireny ka nentin’i Elià teo amin’ny lohasahan-driakan’i Kisôna ary novonoiny ho faty teo
  - type: note
    content: Fomba izay mora narahiny tamin’ny fotoanandro, jereo and 13. Ireo mpaminanin’izay andriamanitra tsy manan-kery dia natao toy ny vavolombelona mandainga; ampit 2 Mp 10.18-25.
  - type: text
    content: .
  - type: heading
    content: Avy indray ny ranonorana
  '41':
  - type: text
    content: 'Hoy i Elià tamin’i Ahaba:'
  - type: text
    content: –Andeha mihinana sy misotro
  - type: note
    content: Noho ny hain-tany naharitra, dia nanome baiko hifady hanina*, toy ny tamin’ny fotoan’ny loza lehibe ny manampahefana, ampit Jer 36.9.
  - type: text
    content: ' fa efa reko ny fivatravatran’ny orambe.'
  '42':
  - type: text
    content: 'Dia nandeha hihinana sy hisotro i Ahaba; fa i Elià kosa nananika ny tampon’i Karmela, ary niankohoka nitehi-tany izy ka ny lohany nataony teo anelanelan’ny lohaliny. '
  '43':
  - type: text
    content: 'Ary hoy izy tamin’ny mpanompony:'
  - type: text
    content: –Miakara ka mijere mankany amin’ny ranomasina.
  - type: text
    content: 'Dia niakatra izy ka nijery sady niteny hoe:'
  - type: text
    content: –Tsy misy na inona na inona.
  - type: text
    content: 'Nasain’i Elià niverina nijery impito izy. '
  '44':
  - type: text
    content: 'Ka tamin’ny fanimpitony, dia hoy izy hoe:'
  - type: text
    content: –Indro misy rahona kely hoatra ny totohondry miakatra avy eny an-dranomasina.
  - type: text
    content: 'Dia hoy i Elià taminy:'
  - type: text
    content: '–Ndeha lazao i Ahaba hamboatra ny kalesiny dia hidina, fandrao ho voasakan’ny orana. '
  '45':
  - type: text
    content: Fa raha nihamaintin-drahona ny lanitra sady nandrivotra be ny andro ary nilatsaka ny orambe, i Ahaba kosa nitaingina ny kalesiny ka lasa nankany Jizrehela
  - type: note
    content: 'And 42-45: jereo Jak 5.18.'
  - type: text
    content: '. '
  '46':
  - type: text
    content: Fa nombàn’ny herin’ny TOMPO i Elià, koa namatotra fehikibo izy ary lasa nihazakazaka teo alohan’ny kalesin’i Ahaba mandra-pahatongany teo am-bavahadin’i Jizrehela.
  '5':
  - type: text
    content: 'Ka hoy i Ahàba tamin’i Hôbadià:'
  - type: text
    content: –Andeha hotetezintsika ny tany hijerena ny loharano sy riaka rehetra, sao hahita ahitra ihany isika hamelomana ny soavaly sy ny boriky mba tsy hamonoana ny biby fiompintsika.
  '6':
  - type: text
    content: 'Dia notsinjarainy ny tany hotetezina, ka i Ahaba nandeha tany amin’ny lalany ary i Hôbadià kosa tamin’ny azy. '
  '7':
  - type: text
    content: 'Fa raha ilay nandeha tamin’ny lalana iny i Hôbadià, dia nifanena tampoka tamin’i Elià. Fantatr’i Hôbadià izy ka niankohofany ho fanajana azy, ary nilazany hoe:'
  - type: text
    content: –Ianao va ity, ry Elià tompoko?
  '8':
  - type: text
    content: 'Ka novalian’i Elià hoe:'
  - type: text
    content: '–Eny, izaho ihany ity. Mandehana lazao amin’i Ahaba tomponao hoe: «Tonga ao i Elià!»'
  '9':
  - type: text
    content: 'Fa hoy i Hôbadià:'
  - type: text
    content: '–Inona no ratsy nataoko no atolotrao ho eo an-tanan’i Ahaba aho mba hovonoiny ho faty? '
