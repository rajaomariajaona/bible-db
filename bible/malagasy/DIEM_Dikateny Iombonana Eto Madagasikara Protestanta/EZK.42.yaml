document_id: EZK.42,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo trano miankina amin’ny tempoly
  - type: text
    content: 'Taorian’izany dia nentin-dralehilahy nianavaratra ho any amin’ny kianja ivelany aho, ary nampidiriny tamin’ireo efitrano terỳ avaratra manoloana ny toera-malalaka sy ny trano teo ivohon’ny '
  - type: text
    content: tempoly
  - type: text
    content: '. '
  '10':
  - type: text
    content: Teo amin’ny fiandohan’ny tambohon’ny kianja no nisy io fidirana io.
  - type: text
    content: Tamin’ny ilany atsimo
  - type: note
    content: 'Teo amin’ny... fidirana io: araka ny dkt tranainy grika izany. –atsimo: araka ny dkt tranainy grika ary mifanaraka amin’ny and 12; fa ny RM kosa manao hoe atsinanana.'
  - type: text
    content: 'dia nisy efitrano tahaka ireo koa, manatrika ny toera-malalaka sy ny trano teo ivohon’ny tempoly. '
  '11':
  - type: text
    content: 'Nisy lalana teo anoloany. Nitovy endrika tamin’ireo efitrano terỳ avaratra ihany ireto efitrano ireto na momba ny refiny sy ny firindrany na momba ny fahazoana miditra sy mivoaka ny efitrano. '
  '12':
  - type: text
    content: 'Tahaka izany koa ireo varavaran’ny efitrano amin’ity orin-trano atsimo ity. Teo am-piandohan’ilay lalana no nisy varavarana manatrika ny rindrina izay miaro ny '
  - type: text
    content: Toeramasina
  - type: text
    content: '. Avy ao atsinanana no fidirana amin’io varavarana io. '
  '13':
  - type: text
    content: 'Ary hoy ralehilahy tamiko: «Ireo efitrano avaratra sy efitrano atsimo izay manoloana ny kianja ireo dia efitrano voatokana. Ao amin’ireo efitrano ireo manko ny mpisorona izay manatona ny TOMPO no mihinana ny zava-masina indrindra. Eny, voatokana io faritra io, ka ao no ametrahana ny zava-masina indrindra, dia ireo fanatitra vokatry ny tany sy ireo biby natao '
  - type: text
    content: sorona
  - type: text
    content: ' ho fanalana ny ota sy ho fanonerana. '
  '14':
  - type: text
    content: Ankoatra izany, ireo mpisorona izay niditra tao amin’ny Toera-masina dia tsy mahazo mandeha any amin’ny kianja ivelany avy hatrany; fa tsy maintsy ao amin’ireo efitrano ireo no amelany ny fanamiana masina izay nentiny nanompo ny Tompo, ary ao koa no iakanjoany ireo fitafiany hafa alohan’ny hankanesany any amin’ny toerana misy ny sarambabem-bahoaka.»
  - type: heading
    content: Ny refin’ny rindrina ivelany.
  '15':
  - type: text
    content: 'Rehefa vitan-dralehilahy ny fandrefesana ny trano anatiny ao amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ', dia nentiny nivoaka ny vavahady atsinanana aho. Dia nandrefy ny manodidina ny tempoly izy. '
  '16':
  - type: text
    content: Ilay volotara fandrefesana
  - type: note
    content: Jereo 40.3.
  - type: text
    content: ' no nandrefesany azy, ka ny lafiny atsinanana dia nisy 250 metatra ny halàvany. '
  '17':
  - type: text
    content: 'Norefesiny toy izany koa ny lafiny avaratra sy atsimo ary andrefana ka samy 250 metatra avy ny halàvany. '
  '2':
  - type: text
    content: 'Izany orin-trano terỳ avaratra terỳ izany dia dimampolo metatra ny halàvany ary 25 metatra ny sakany: '
  '20':
  - type: text
    content: Toy izany no nandrefesany ny tamboho manodidina ny tempoly tamin’ny lafiny efatra. Efamira ny tamboho manodidina ka samy dimampolo sy roanjato metatra avy ny lafiny efatra; ary io tamboho io no natao hampisaraka ny toerana voatokana ho an’Andriamanitra sy ny toerana hafa
  - type: note
    content: Ny 40.5 –42.20 dia ampit 1 Mp 6.1-38; 2 Tan 3.1-9.
  - type: text
    content: .
  '3':
  - type: text
    content: ny lafiny anankiray dia nanatrika ny toera-malalaka izay misy velarana folo metatra teo amin’ny kianja anatiny; ny lafiny tao am-badika kosa dia nanatrika ny lampivato teo amin’ny kianja ivelany. Nisy lalantsara mirihana telo tao anatin’io orin-trano io
  - type: note
    content: Ny rijan-teny manontolo ao amin’ny and 1–14 dia sarotra adika.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Manoloana ireo efitrano ireo tatỳ amin’ny kianja anatiny, dia nisy lalana izay mirefy dimy metatra ny sakany ary dimampolo metatra ny halavany. Avy any avaratra no fidirana amin’io orin-trano io. '
  '5':
  - type: text
    content: 'Ny efitrano ambony dia tery kokoa noho ireo ambaniny, satria nangalana bebe kokoa ho lalantsarany noho ny efitrano antenatenany sy ny efitrano ambany. '
  '6':
  - type: text
    content: 'Nifanongoa ny efitrano mirihana telo, saingy tsy nisy andry tahaka ireo trano hafa teo an-kianja; fa arakaraka ny niakarana ambony kokoa no nahatery ny efitrano. '
  '7':
  - type: text
    content: 'Teo amin’ny lafiny manatrika ny kianja ivelany, ny rindrina mirazòtra amin’ireo efitrano dia nisy 25 metatra ny halàvany, '
  '8':
  - type: text
    content: 'satria 25 metatra rahateo ny halàvan’ireo efitrano ireo mitambatra. Fa tarỳ amin’ny lafiny manatrika ny tempoly dia nisy dimampolo metatra ny halàvany. '
  '9':
  - type: text
    content: 'Teo ambanin’ireo efitrano ireo, tamin’ny lafiny atsinanana no nisy fidirana iray ho an’ny olona avy any amin’ny kianja ivelany. '
