document_id: DEU.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanajana ny fananan’ny hafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha hitanareo mania ny omby na osy na ondrin’ny mpiray firenena aminareo, dia tsy hialanareo fotsiny izany fa hoentinareo miverin-doha any amin’ny tompony mihitsy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha tsy akaiky anareo ilay tompony na tsy fantatrareo, dia hoentinareo mody eny aminareo ny biby nania ary hitoetra eo aminareo mandra-pitadin’ny tompony azy; ka amin’izay vao haverinareo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Toy izany koa no hataonareo amin’ny boriky na fitafiana na zavatra hafa verin’ny mpiray firenena aminareo ka hitanareo; fa tsy hialanareo fotsiny izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha hitanareo potraka eny an-dalana ny boriky na ombin’ny mpiray firenena aminareo, dia tsy hialanareo fotsiny izany fa hampianareo hanarina azy ny tompony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.4 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 1-4:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 23.4-5.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fepetra isan-karazany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka ny vehivavy tsy hitafy ny fitafian-dehilahy, ary aoka ny lehilahy tsy hitafy ny fitafiam-behivavy; fa zavatra mahatsiravina eo imason’ny TOMPO Andriamanitrareo ny fanaovana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha sendra mahita akanim-borona eo anoloanareo eny an-dalana ianareo, na ambony hazo na amy tany, ka misy vorona efa foy ombàn-dreniny na atody mbola kotrehiny, dia aoka ny zanany tsy halainareo miaraka amin’ny reniny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Halefanareo mihitsy ny reniny fa ny zanany ihany no halainareo ho anareo, mba hahita soa sy ho maro andro ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha manao trano vaovao ianareo, dia hasianareo aro-fanina manodidina ny tampon-tranonareo; fandrao hisy olona hianjera avy eny ka tsy ny tranonareo no hizaka ny andraikitra amin’ny fahafatesan’ilay olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza amafazana voan-javatra hafa karazana ny tanimboalobokareo, fandrao samy hanjary voatokana ho an’Andriamanitra na ny vokatry ny voan-javatra nafafinareo na ny vokatry ny tanimboalobokareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aza mampikambana omby sy boriky hiasa tany anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: aza mitafy lamba volon’ondry izay rongony ny fahany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.11 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 9-11:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lev 19.19.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hasianareo sahondrany ny zorony efatra amin’ny lamba firakofanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Nom 15.37-41.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitandroana ny hasin’ny fanambadiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mety hisy lehilahy mampaka-bady ary miray aminy. Avy eo dia tsy tiany indray ravehivavy, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka haratsiany sy alàny baràka hoe: «Efa nampakatra ity vehivavy ity aho; kanefa tsy nahita ny famantarana maha virijiny azy aho nony niray taminy.» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia halain’ny ray aman-drenin-drazazavavy ny famantarana maha virijiny azy ka hoentiny amin’ny fitsarana, eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: ’ny tanàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo and 17.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hiteny amin’ny loholona ny rain-drazazavavy hoe: «Nomeko ho vadin’io lehilahy io ny zanako vavy; avy eo dia tsy tiany indray izy, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka noharatsîny tamiko hoe tsy nahitany ny famantarana maha virijiny azy. Nefa indreto ny famantarana maha virijiny ny zanako vavy.» Dia hovelarin’ny ray aman-drenin-drazazavavy eo anatrehan’ny loholon’ny tanàna ilay lamba nandriany tamin’ny alin’ny fampakarana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hosamborin’ny loholona izany lehilahy izany ka hofaiziny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hosazîna sekela volafotsy zato koa ralehilahy, ka homeny ny rain-drazazavavy izany, satria nahafa-baràka tovovavy israelita anankiray izy; nefa dia ho vadiny ihany razazavavy ka tsy azony ariana amin’ny andro rehetra hiainany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha marina kosa ny lazain-dralehilahy ka tsy hita ny famantarana maha virijiny an-drazazavavy, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: dia hoentina hankeo anoloan’ny varavaran’ny tranon-drainy razazavavy ka hitora-bato azy ho faty ny mponina ao an-tanànany; zava-pady tokoa teo amin’i Israely manko no nataony, raha nijangajanga fony izy mbola tao an-tranon-drainy. Izany no hanesoranareo ny fanao ratsy ho fongotra eo aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha misy lehilahy azo miray amim-behivavy vadin’olona, dia samy hatao maty izy roroa, na ralehilahy izay niray tamin-dravehivavy na ravehivavy koa. Izany no hanesoranareo ny fanao ratsy ho fongotra eo aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha misy tovovavy virijiny efa fofombadin’olona ka eo an-tanàna izy no hitan-dehilahy anankiray sy iraisany, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: dia hoentinareo hankeo am-bavahadin’izany tanàna izany izy roroa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fofombady manko dia efa vady raikitra mihitsy teo amin’ny Jiosy. Jereo 17.5 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', ka hotorahanareo vato ho faty: ravehivavy moa, satria tsy niantso vonjy nefa tao an-tanàna ihany; ary ralehilahy koa, satria niray tamin’ny vadin’ny namany. Izany no hanesoranareo ny fanao ratsy ho fongotra eo aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa raha any an-tsaha kosa ralehilahy no mahita an’ilay tovovavy fofombadin’olona ka misavika azy sy miray aminy, dia ralehilahy izay niray taminy ihany no hatao maty. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa razazavavy tsy hasianareo na inona na inona, satria tsy misy ota tokony hahafaty azy. (Mitovy amin’ny olona namely ny namany ka nahafaty azy manko izany toe-javatra izany). '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Eny, tany an-tsaha no nahitan’io lehilahy io an-drazazavavy; ary niantso vonjy ihany ilay tovovavy fofombadin’olona, saingy tsy nisy namonjy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Raha misy lehilahy mahita tovovavy tsy mbola fofombadin’olona ka misavika azy sy miray aminy, ary tratra manao izany izy roroa, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: dia hanome sekela volafotsy dimampolo ho an’ny rain-drazazavavy io lehilahy io; ary satria efa nanaovany an-keriny ilay tovovavy, dia hovadiny izy ary tsy ho azony ariana amin’ny andro rehetra hiainany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.29 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 28-29:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 22.15-16.
    marker-yv: yv-n
  - type: text
    text: .
