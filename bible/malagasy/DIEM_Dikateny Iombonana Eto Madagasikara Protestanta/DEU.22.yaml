document_id: DEU.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanajana ny fananan’ny hafa
  - type: text
    content: 'Raha hitanareo mania ny omby na osy na ondrin’ny mpiray firenena aminareo, dia tsy hialanareo fotsiny izany fa hoentinareo miverin-doha any amin’ny tompony mihitsy. '
  '10':
  - type: text
    content: 'Aza mampikambana omby sy boriky hiasa tany anareo; '
  '11':
  - type: text
    content: aza mitafy lamba volon’ondry izay rongony ny fahany
  - type: note
    content: 'And 9-11: jereo Lev 19.19.'
  - type: text
    content: .
  '12':
  - type: text
    content: Hasianareo sahondrany ny zorony efatra amin’ny lamba firakofanareo
  - type: note
    content: Ampit Nom 15.37-41.
  - type: text
    content: .
  - type: heading
    content: Fitandroana ny hasin’ny fanambadiana
  '13':
  - type: text
    content: 'Mety hisy lehilahy mampaka-bady ary miray aminy. Avy eo dia tsy tiany indray ravehivavy, '
  '14':
  - type: text
    content: 'ka haratsiany sy alàny baràka hoe: «Efa nampakatra ity vehivavy ity aho; kanefa tsy nahita ny famantarana maha virijiny azy aho nony niray taminy.» '
  '15':
  - type: text
    content: 'Dia halain’ny ray aman-drenin-drazazavavy ny famantarana maha virijiny azy ka hoentiny amin’ny fitsarana, eo anoloan’ny '
  - type: text
    content: loholon
  - type: text
    content: ’ny tanàna
  - type: note
    content: Jereo and 17.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ary hiteny amin’ny loholona ny rain-drazazavavy hoe: «Nomeko ho vadin’io lehilahy io ny zanako vavy; avy eo dia tsy tiany indray izy, '
  '17':
  - type: text
    content: 'ka noharatsîny tamiko hoe tsy nahitany ny famantarana maha virijiny azy. Nefa indreto ny famantarana maha virijiny ny zanako vavy.» Dia hovelarin’ny ray aman-drenin-drazazavavy eo anatrehan’ny loholon’ny tanàna ilay lamba nandriany tamin’ny alin’ny fampakarana azy. '
  '18':
  - type: text
    content: 'Ary hosamborin’ny loholona izany lehilahy izany ka hofaiziny. '
  '19':
  - type: text
    content: Hosazîna sekela volafotsy zato koa ralehilahy, ka homeny ny rain-drazazavavy izany, satria nahafa-baràka tovovavy israelita anankiray izy; nefa dia ho vadiny ihany razazavavy ka tsy azony ariana amin’ny andro rehetra hiainany.
  '2':
  - type: text
    content: 'Raha tsy akaiky anareo ilay tompony na tsy fantatrareo, dia hoentinareo mody eny aminareo ny biby nania ary hitoetra eo aminareo mandra-pitadin’ny tompony azy; ka amin’izay vao haverinareo aminy. '
  '20':
  - type: text
    content: 'Fa raha marina kosa ny lazain-dralehilahy ka tsy hita ny famantarana maha virijiny an-drazazavavy, '
  '21':
  - type: text
    content: dia hoentina hankeo anoloan’ny varavaran’ny tranon-drainy razazavavy ka hitora-bato azy ho faty ny mponina ao an-tanànany; zava-pady tokoa teo amin’i Israely manko no nataony, raha nijangajanga fony izy mbola tao an-tranon-drainy. Izany no hanesoranareo ny fanao ratsy ho fongotra eo aminareo.
  '22':
  - type: text
    content: Raha misy lehilahy azo miray amim-behivavy vadin’olona, dia samy hatao maty izy roroa, na ralehilahy izay niray tamin-dravehivavy na ravehivavy koa. Izany no hanesoranareo ny fanao ratsy ho fongotra eo aminareo.
  '23':
  - type: text
    content: 'Raha misy tovovavy virijiny efa fofombadin’olona ka eo an-tanàna izy no hitan-dehilahy anankiray sy iraisany, '
  '24':
  - type: text
    content: dia hoentinareo hankeo am-bavahadin’izany tanàna izany izy roroa
  - type: note
    content: Ny fofombady manko dia efa vady raikitra mihitsy teo amin’ny Jiosy. Jereo 17.5 sy nta.
  - type: text
    content: ', ka hotorahanareo vato ho faty: ravehivavy moa, satria tsy niantso vonjy nefa tao an-tanàna ihany; ary ralehilahy koa, satria niray tamin’ny vadin’ny namany. Izany no hanesoranareo ny fanao ratsy ho fongotra eo aminareo. '
  '25':
  - type: text
    content: 'Fa raha any an-tsaha kosa ralehilahy no mahita an’ilay tovovavy fofombadin’olona ka misavika azy sy miray aminy, dia ralehilahy izay niray taminy ihany no hatao maty. '
  '26':
  - type: text
    content: 'Fa razazavavy tsy hasianareo na inona na inona, satria tsy misy ota tokony hahafaty azy. (Mitovy amin’ny olona namely ny namany ka nahafaty azy manko izany toe-javatra izany). '
  '27':
  - type: text
    content: Eny, tany an-tsaha no nahitan’io lehilahy io an-drazazavavy; ary niantso vonjy ihany ilay tovovavy fofombadin’olona, saingy tsy nisy namonjy azy.
  '28':
  - type: text
    content: 'Raha misy lehilahy mahita tovovavy tsy mbola fofombadin’olona ka misavika azy sy miray aminy, ary tratra manao izany izy roroa, '
  '29':
  - type: text
    content: dia hanome sekela volafotsy dimampolo ho an’ny rain-drazazavavy io lehilahy io; ary satria efa nanaovany an-keriny ilay tovovavy, dia hovadiny izy ary tsy ho azony ariana amin’ny andro rehetra hiainany
  - type: note
    content: 'And 28-29: jereo Eks 22.15-16.'
  - type: text
    content: .
  '3':
  - type: text
    content: Toy izany koa no hataonareo amin’ny boriky na fitafiana na zavatra hafa verin’ny mpiray firenena aminareo ka hitanareo; fa tsy hialanareo fotsiny izany.
  '4':
  - type: text
    content: Raha hitanareo potraka eny an-dalana ny boriky na ombin’ny mpiray firenena aminareo, dia tsy hialanareo fotsiny izany fa hampianareo hanarina azy ny tompony
  - type: note
    content: 'And 1-4: jereo Eks 23.4-5.'
  - type: text
    content: .
  - type: heading
    content: Fepetra isan-karazany
  '5':
  - type: text
    content: Aoka ny vehivavy tsy hitafy ny fitafian-dehilahy, ary aoka ny lehilahy tsy hitafy ny fitafiam-behivavy; fa zavatra mahatsiravina eo imason’ny TOMPO Andriamanitrareo ny fanaovana izany.
  '6':
  - type: text
    content: 'Raha sendra mahita akanim-borona eo anoloanareo eny an-dalana ianareo, na ambony hazo na amy tany, ka misy vorona efa foy ombàn-dreniny na atody mbola kotrehiny, dia aoka ny zanany tsy halainareo miaraka amin’ny reniny. '
  '7':
  - type: text
    content: Halefanareo mihitsy ny reniny fa ny zanany ihany no halainareo ho anareo, mba hahita soa sy ho maro andro ianareo.
  '8':
  - type: text
    content: Raha manao trano vaovao ianareo, dia hasianareo aro-fanina manodidina ny tampon-tranonareo; fandrao hisy olona hianjera avy eny ka tsy ny tranonareo no hizaka ny andraikitra amin’ny fahafatesan’ilay olona.
  '9':
  - type: text
    content: 'Aza amafazana voan-javatra hafa karazana ny tanimboalobokareo, fandrao samy hanjary voatokana ho an’Andriamanitra na ny vokatry ny voan-javatra nafafinareo na ny vokatry ny tanimboalobokareo. '
