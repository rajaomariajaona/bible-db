document_id: 2KI.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Norombahin’i Hatalià ny fahefana tao Jerosalema
  - type: heading
    content: (Jereo 2 Tan 22.10-12)
  - type: text
    content: 'Rehefa hitan’i Hatalià renin’i Ahazià fa maty ity zanany lahy, dia niroso nandringana ny taranak’andriana rehetra izy. '
  '10':
  - type: text
    content: 'Nomen’i Jôiadà an’ireo kapiteny y lefona aman’ampingan’i Davida mpanjaka izay natoby tao an-tranon’ny TOMPO. '
  '11':
  - type: text
    content: 'Dia nanao jery atrika sy nitam-piadiana ny miaramila hatreo amin’ny zoro atsimo atsinanan’ny tempoly ka hatrany amin’ny zoro avaratra atsinanana, dia teo anoloan’ny vatan-trano sy ny '
  - type: text
    content: alitara
  - type: text
    content: ', ary efa vonona hanodidina ny mpanjaka. '
  '12':
  - type: text
    content: 'Tamin’izay dia navoakan’i Jôiadà i Jôasy zanakalahin’i Ahazià, ka nampisatrohina ny satroboninahitra maha-mpanjaka sady notolorana ny raki-tsoratra momba ny zo aman’andraikitry ny mpanjaka; ary nohosorany menaka izy hanokanana azy ho mpanjaka, koa dia nitehaka ny olona sy niantsoantso hoe: «Ho ela velona anie ny mpanjaka!»'
  '13':
  - type: text
    content: 'Nony ren’i Hatalià ny kotaban’ny mpiambina sy ny vahoaka, dia mba nankao amin’ny vahoaka tao an-tranon’ny TOMPO izy. '
  '14':
  - type: text
    content: Ary indro hitany ny mpanjaka vaovao nitsangana araka ny fanao tambonin’ny lampihazo
  - type: note
    content: 'tambonin’ny lampihazo: dkt hafa teo akaikin’ny andrin’ny tempoly.'
  - type: text
    content: '; ary ny mpihira sy ny mpitsoka trompetra no teo anilany. Nifaly ny vahoaka rehetra ary nampaneno trompetra ny mpitsoka mozika; fa i Hatalià kosa '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' sady niantsoantso hoe: «Fikomiana! Fikomiana!»'
  '15':
  - type: text
    content: 'I Jôiadà mpisorona moa efa nandrara ny hamonoana ho faty an’i Hatalià ao an-tranon’ny TOMPO, ka dia nomeny baiko ny kapiteny mpifehy miaramila ary nilazany hoe:'
  - type: text
    content: –Avoahy any ivelany any i Hatalià ka ampandalovy eny anelanelan’ny laharanareo; ary izay manaraka azy dia vonoy ho faty amin’ny sabatra.
  '16':
  - type: text
    content: Dia nosamborin’ireo i Hatalià ka notaritaritiny ho any an-dapan’ny mpanjaka; ary rehefa tafapaka ny fidirana teo amin’ny vavahadin-tsoavaly
  - type: note
    content: Mety ho io vavahady io no nampifandray ny kianjan’ny lapa sy ny kianjan’ny tempoly.
  - type: text
    content: ' ravehivavy, dia novonoina ho faty teo.'
  '17':
  - type: text
    content: 'Nampanaovin’i Jôiadà fanekempihavanana tamin’ny TOMPO ny mpanjaka sy ny olona teo mba ho vahoakan’ny TOMPO izy rehetra; ary dia nasainy nanao fifanekena koa ny mpanjaka sy ny olona. '
  '18':
  - type: text
    content: 'Avy eo dia niditra tao an-tempolin’i '
  - type: text
    content: Bahala
  - type: text
    content: ' ny besinimaro ka nandrava azy: nomontsaniny tanteraka ireo alitara sy ireo sarivongan-tsampy, ary novonoiny ho faty teo anoloan’ny alitara i Matàna mpisoron’i Bahala. Tamin’izay koa no voatendrin’i Jôiadà mpisorona ireo olona hitandrina ny tranon’ny TOMPO.'
  '19':
  - type: text
    content: 'Dia novorin’i Jôiadà ny kapiteny sy ny Karianina ary ny miaramila mpiambina hafa mbamin’ny vahoaka rehetra; ary nentina avy tao an-tranon’ny TOMPO ity mpanjaka, ka ny vavahadin’ny mpiambina no nandalovana hanatitra azy ao an-dapany. Rehefa tafapetraka teo amin’ny sezafiandrianana maha mpanjaka azy i Jôasy, '
  '2':
  - type: text
    content: 'Kanefa i Jôsebà zanakavavin’i Jôrama mpanjaka sady anabavin’i Ahazià dia naka an’i Jôàsy zanakalahin’i Ahazià, ka namonjy azy mbamin’ny mpitaiza azy teo anivon’ireo rahalahiny efa novonoina, ary nitondra azy hankao an’efitrano fandriana ao amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: '; nafenin’i Jôsebà an’i Hatalià i Jôasy, ka dia tsy mba voavono ho faty. '
  '20':
  - type: text
    content: dia nifaly ny vahoaka rehetra.
  - type: text
    content: Ary nandry feizay ny tanàna, satria efa matin-tsabatra tao an-dapan’ny mpanjaka i Hatalià.
  '3':
  - type: text
    content: Niery enin-taona tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: note
    content: Araka ny 2 Tan 22.11, i Jôsebà dia vadin’i Jôiadà mpisorona; manazava izany fa afaka nanafina an’i Jôasy tao an-tempoly izy, izany hoe tao amin’ny toerana fonenan’ny mpisorona.
  - type: text
    content: ' i Jôasy mbamin’ny mpitaiza azy; ary i Hatalià no nanjaka teo amin’ny tany.'
  - type: heading
    content: Nohosorana ho mpanjaka i Jôasy
  - type: heading
    content: (Jereo 2 Tan 23.1-21)
  '4':
  - type: text
    content: Tamin’ny taona fahafito dia nampiantso ireo kapiteny mpifehy ny Karianina
  - type: note
    content: 'Karianina: miaramila avy any Azia Minôra nanao ny fiambenana ny lapa sy ny tempoly.'
  - type: text
    content: ' sy ny miaramila mpiambina hafa i Jôiadà ka nitarika azy nankao an-'
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: '; dia nanaovany fifanekena ireo sady nampianianiny tao an-tranon’ny TOMPO, ka nasehony azy ilay zanakalahin’ny mpanjaka. '
  '5':
  - type: text
    content: 'Ary ireo kapiteny ireo dia nomen’i Jôiadà baiko hoe:'
  - type: text
    content: '–Izao no hataonareo: ny antokony iray aminareo dia mandray asa amin’ny '
  - type: text
    content: sabata
  - type: text
    content: '; ka ny andiany voalohany amin’io dia miambina ny lapan’ny mpanjaka; '
  '6':
  - type: text
    content: ny andiany faharoa dia miambina eo am-bavahadin’i Sòra
  - type: note
    content: Ny toeran’izany vavahady izany dia tsy fantatra mazava.
  - type: text
    content: '; ary ny andiany fahatelo dia miambina eo am-bavahady ivohon’ny mpiambina. Ianareo andiany telo ireo no hifandimby miambina ny lapa. '
  '7':
  - type: text
    content: 'Ny antoko anankiroa izay tsy mandray asa amin’ny sabata kosa dia hiambina ny tranon’ny TOMPO izay misy ny mpanjaka. '
  '8':
  - type: text
    content: Ny miaramila rehetra dia hitam-piadiana avokoa ka hanemitra ny mpanjaka ary hanaraka azy na aiza na aiza alehany. Izay mikasa hanatona ny laharanareo dia hatao maty.
  '9':
  - type: text
    content: 'Araka izay baiko rehetra nomen’i Jôiadà mpisorona no nataon’ireo kapiteny; ka ny tompon’andraikitra tsirairay dia samy namory ny miaramilany avy, na izay niala tamin’ny andro sabata, ary dia nankany amin’i Jôiadà mpisorona izy rehetra. '
