document_id: 2KI.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Norombahin’i Hatalià ny fahefana tao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 22.10-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa hitan’i Hatalià renin’i Ahazià fa maty ity zanany lahy, dia niroso nandringana ny taranak’andriana rehetra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Kanefa i Jôsebà zanakavavin’i Jôrama mpanjaka sady anabavin’i Ahazià dia naka an’i Jôàsy zanakalahin’i Ahazià, ka namonjy azy mbamin’ny mpitaiza azy teo anivon’ireo rahalahiny efa novonoina, ary nitondra azy hankao an’efitrano fandriana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: '; nafenin’i Jôsebà an’i Hatalià i Jôasy, ka dia tsy mba voavono ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Niery enin-taona tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka ny 2 Tan 22.11, i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jôsebà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia vadin’i Jôiadà mpisorona; manazava izany fa afaka nanafina an’i Jôasy tao '
    - type: usfm
      marker: it
      children:
      - type: text
        text: an-tempoly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izy, izany hoe tao amin’ny toerana fonenan’ny mpisorona.'
    marker-yv: yv-n
  - type: text
    text: ' i Jôasy mbamin’ny mpitaiza azy; ary i Hatalià no nanjaka teo amin’ny tany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nohosorana ho mpanjaka i Jôasy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 23.1-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tamin’ny taona fahafito dia nampiantso ireo kapiteny mpifehy ny Karianina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Karianina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miaramila avy any Azia Minôra nanao ny fiambenana ny lapa sy ny tempoly.
    marker-yv: yv-n
  - type: text
    text: ' sy ny miaramila mpiambina hafa i Jôiadà ka nitarika azy nankao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: '; dia nanaovany fifanekena ireo sady nampianianiny tao an-tranon’ny TOMPO, ka nasehony azy ilay zanakalahin’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ireo kapiteny ireo dia nomen’i Jôiadà baiko hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no hataonareo: ny antokony iray aminareo dia mandray asa amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: '; ka ny andiany voalohany amin’io dia miambina ny lapan’ny mpanjaka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ny andiany faharoa dia miambina eo am-bavahadin’i Sòra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny toeran’izany vavahady izany dia tsy fantatra mazava.
    marker-yv: yv-n
  - type: text
    text: '; ary ny andiany fahatelo dia miambina eo am-bavahady ivohon’ny mpiambina. Ianareo andiany telo ireo no hifandimby miambina ny lapa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny antoko anankiroa izay tsy mandray asa amin’ny sabata kosa dia hiambina ny tranon’ny TOMPO izay misy ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny miaramila rehetra dia hitam-piadiana avokoa ka hanemitra ny mpanjaka ary hanaraka azy na aiza na aiza alehany. Izay mikasa hanatona ny laharanareo dia hatao maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Araka izay baiko rehetra nomen’i Jôiadà mpisorona no nataon’ireo kapiteny; ka ny tompon’andraikitra tsirairay dia samy namory ny miaramilany avy, na izay niala tamin’ny andro sabata, ary dia nankany amin’i Jôiadà mpisorona izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nomen’i Jôiadà an’ireo kapiteny y lefona aman’ampingan’i Davida mpanjaka izay natoby tao an-tranon’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nanao jery atrika sy nitam-piadiana ny miaramila hatreo amin’ny zoro atsimo atsinanan’ny tempoly ka hatrany amin’ny zoro avaratra atsinanana, dia teo anoloan’ny vatan-trano sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ', ary efa vonona hanodidina ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’izay dia navoakan’i Jôiadà i Jôasy zanakalahin’i Ahazià, ka nampisatrohina ny satroboninahitra maha-mpanjaka sady notolorana ny raki-tsoratra momba ny zo aman’andraikitry ny mpanjaka; ary nohosorany menaka izy hanokanana azy ho mpanjaka, koa dia nitehaka ny olona sy niantsoantso hoe: «Ho ela velona anie ny mpanjaka!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony ren’i Hatalià ny kotaban’ny mpiambina sy ny vahoaka, dia mba nankao amin’ny vahoaka tao an-tranon’ny TOMPO izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary indro hitany ny mpanjaka vaovao nitsangana araka ny fanao tambonin’ny lampihazo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tambonin’ny lampihazo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: teo akaikin’ny andrin’ny tempoly.
    marker-yv: yv-n
  - type: text
    text: '; ary ny mpihira sy ny mpitsoka trompetra no teo anilany. Nifaly ny vahoaka rehetra ary nampaneno trompetra ny mpitsoka mozika; fa i Hatalià kosa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandriatra ny fitafiany
  - type: text
    text: ' sady niantsoantso hoe: «Fikomiana! Fikomiana!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I Jôiadà mpisorona moa efa nandrara ny hamonoana ho faty an’i Hatalià ao an-tranon’ny TOMPO, ka dia nomeny baiko ny kapiteny mpifehy miaramila ary nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avoahy any ivelany any i Hatalià ka ampandalovy eny anelanelan’ny laharanareo; ary izay manaraka azy dia vonoy ho faty amin’ny sabatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia nosamborin’ireo i Hatalià ka notaritaritiny ho any an-dapan’ny mpanjaka; ary rehefa tafapaka ny fidirana teo amin’ny vavahadin-tsoavaly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mety ho io '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vavahady
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' io no nampifandray ny kianjan’ny lapa sy ny kianjan’ny tempoly.'
    marker-yv: yv-n
  - type: text
    text: ' ravehivavy, dia novonoina ho faty teo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nampanaovin’i Jôiadà fanekempihavanana tamin’ny TOMPO ny mpanjaka sy ny olona teo mba ho vahoakan’ny TOMPO izy rehetra; ary dia nasainy nanao fifanekena koa ny mpanjaka sy ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avy eo dia niditra tao an-tempolin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' ny besinimaro ka nandrava azy: nomontsaniny tanteraka ireo alitara sy ireo sarivongan-tsampy, ary novonoiny ho faty teo anoloan’ny alitara i Matàna mpisoron’i Bahala. Tamin’izay koa no voatendrin’i Jôiadà mpisorona ireo olona hitandrina ny tranon’ny TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia novorin’i Jôiadà ny kapiteny sy ny Karianina ary ny miaramila mpiambina hafa mbamin’ny vahoaka rehetra; ary nentina avy tao an-tranon’ny TOMPO ity mpanjaka, ka ny vavahadin’ny mpiambina no nandalovana hanatitra azy ao an-dapany. Rehefa tafapetraka teo amin’ny sezafiandrianana maha mpanjaka azy i Jôasy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: dia nifaly ny vahoaka rehetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary nandry feizay ny tanàna, satria efa matin-tsabatra tao an-dapan’ny mpanjaka i Hatalià.
