document_id: JOB.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Valintenin’i Jôba (tohiny): mila resaka malalaka amin’Andriamanitra izy'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro ny masoko efa nahita izany rehetra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sofiko efa nandre ka nahafantatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izay fantatrareo, mba fantatro ihany koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy manaiky ho ambany noho ianareo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa izaho kosa hiteny amin’Andriamanitra Tsitoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Izy no tiako hitarainana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ianareo dia mpamoron-dainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dokotera tsy mahasitrana avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsara kokoa ho anareo ny mangina tanteraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho mariky ny fahendrenareo izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mba henoy ange ny fiarovan-tenako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataovy izay handrenesanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanoherana aloaky ny vavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fanompoana an’Andriamanitra ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anaovanareo lahateny tsy mitombina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fimasoana Azy ve no ilazanareo fitaka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hiandany aminy ve ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handahatra hisolovava Azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho tsara ve ny hizahany anareo akaiky?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba olombelona Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho azonareo fitapitahina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hahazo tsiny marimarina aminy ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha miangatra na dia mangingina aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy mampihorohoro anareo ve ny fahalehibeazany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mianjady aminareo ve ny fahatahorana Azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Toy ny lavenona manidina ihany ny ohabolana ataonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manda fotaka ihany ny hevi-dalinareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mangina ianareo fa anjarako izao no miteny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mampaninona izay hanjo ahy any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vonona amin’ny zavatra rehetra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia hihatra amin’ny aiko aza izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Teksta araka ny dkt tranainy grika, amin’ny hebreo sy and dia manomboka amin’ny Nahoana?
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Na dia hamono ahy aza Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mampaninona; fa efa very ny fanantenako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa mbola hiaro tena eo anatrehany ihany aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izany indrindra no fandresena ho ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny mpihatsaravelatsihy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia tsy sahy hifanatrika aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa mba henoy tokoa ny teny lazaiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka mba ho ren’ny sofinareo izay ambarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indro efa namelabelatra ny adiko aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria fantatro fa hanan-drariny ny tenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moa misy te hifanandrina amiko ny amin’izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hangina sy ho faty aho, raha toa ka diso.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Zavatra roa no aza atao amiko, Andriamanitro ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia tsy hiafina intsony ny tavanao aho:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Esory amiko aloha ny tananao izay mampahory ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy hanjohy ahy intsony ny fampitahoranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Avy eo miantsoa ahy hofotorinao fa hamaly aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na izaho aloha no hiteny, izay Ianao vao mamaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Firy àry ny heloka amam-pahotako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampahafantaro ahy izay fiodinana amam-pahadisoako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nahoana no manafina ny tavanao Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandray ahy ho toy ny fahavalonao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Misy kilalaon-teny amin’ny hebreo amin’ny teny nadika hoe fahavalo sy ny anarana Jôba.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Iza àry no hazainao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay ravin-kazo manidina ve!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary zovy no enjehinao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mololo maina ve!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: No dia didim-pitsarana mangidy loatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no soratanao hamelezana ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ampanodiavinao ahy mbamin’ny heloky ny fahatanorako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia manisy gadra ny tongotro Ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 33.11.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manara-maso ny fihetsiko rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitsikilo hatramin’ireo dian-tongotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Kanefa mihalevona toy ny hazo boboka ny aiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mova tsy toy ny fitafiana lanin’ny kalalao.
