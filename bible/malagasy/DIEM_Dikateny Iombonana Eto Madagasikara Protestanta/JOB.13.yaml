document_id: JOB.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba (tohiny): mila resaka malalaka amin’Andriamanitra izy'
  - type: text
    content: Indro ny masoko efa nahita izany rehetra izany,
  - type: text
    content: ary ny sofiko efa nandre ka nahafantatra.
  '10':
  - type: text
    content: Hahazo tsiny marimarina aminy ianareo,
  - type: text
    content: raha miangatra na dia mangingina aza.
  '11':
  - type: text
    content: Tsy mampihorohoro anareo ve ny fahalehibeazany?
  - type: text
    content: Tsy mianjady aminareo ve ny fahatahorana Azy?
  '12':
  - type: text
    content: Toy ny lavenona manidina ihany ny ohabolana ataonareo,
  - type: text
    content: ary manda fotaka ihany ny hevi-dalinareo.
  '13':
  - type: text
    content: Mangina ianareo fa anjarako izao no miteny;
  - type: text
    content: ary tsy mampaninona izay hanjo ahy any.
  '14':
  - type: text
    content: Vonona amin’ny zavatra rehetra aho,
  - type: text
    content: na dia hihatra amin’ny aiko aza izany
  - type: note
    content: Teksta araka ny dkt tranainy grika, amin’ny hebreo sy and dia manomboka amin’ny Nahoana?
  - type: text
    content: .
  '15':
  - type: text
    content: Na dia hamono ahy aza Andriamanitra,
  - type: text
    content: dia tsy mampaninona; fa efa very ny fanantenako.
  - type: text
    content: kanefa mbola hiaro tena eo anatrehany ihany aho.
  '16':
  - type: text
    content: Izany indrindra no fandresena ho ahy,
  - type: text
    content: satria ny mpihatsaravelatsihy
  - type: text
    content: 'dia tsy sahy hifanatrika aminy. '
  '17':
  - type: text
    content: Koa mba henoy tokoa ny teny lazaiko;
  - type: text
    content: ary aoka mba ho ren’ny sofinareo izay ambarako.
  '18':
  - type: text
    content: Indro efa namelabelatra ny adiko aho,
  - type: text
    content: satria fantatro fa hanan-drariny ny tenako.
  '19':
  - type: text
    content: Moa misy te hifanandrina amiko ny amin’izany?
  - type: text
    content: Fa hangina sy ho faty aho, raha toa ka diso.
  - type: heading
    content: '*'
  '2':
  - type: text
    content: Izay fantatrareo, mba fantatro ihany koa;
  - type: text
    content: ary tsy manaiky ho ambany noho ianareo aho.
  '20':
  - type: text
    content: Zavatra roa no aza atao amiko, Andriamanitro ô,
  - type: text
    content: 'dia tsy hiafina intsony ny tavanao aho:'
  '21':
  - type: text
    content: Esory amiko aloha ny tananao izay mampahory ahy;
  - type: text
    content: ary aoka tsy hanjohy ahy intsony ny fampitahoranao.
  '22':
  - type: text
    content: Avy eo miantsoa ahy hofotorinao fa hamaly aho;
  - type: text
    content: na izaho aloha no hiteny, izay Ianao vao mamaly.
  '23':
  - type: text
    content: Firy àry ny heloka amam-pahotako?
  - type: text
    content: Ampahafantaro ahy izay fiodinana amam-pahadisoako.
  '24':
  - type: text
    content: Nahoana no manafina ny tavanao Ianao,
  - type: text
    content: ka mandray ahy ho toy ny fahavalonao
  - type: note
    content: Misy kilalaon-teny amin’ny hebreo amin’ny teny nadika hoe fahavalo sy ny anarana Jôba.
  - type: text
    content: '?'
  '25':
  - type: text
    content: Iza àry no hazainao?
  - type: text
    content: Izay ravin-kazo manidina ve!
  - type: text
    content: Ary zovy no enjehinao?
  - type: text
    content: Izay mololo maina ve!
  '26':
  - type: text
    content: No dia didim-pitsarana mangidy loatra
  - type: text
    content: no soratanao hamelezana ahy,
  - type: text
    content: ka ampanodiavinao ahy mbamin’ny heloky ny fahatanorako.
  '27':
  - type: text
    content: Dia manisy gadra ny tongotro Ianao
  - type: note
    content: Ampit 33.11.
  - type: text
    content: sy manara-maso ny fihetsiko rehetra
  - type: text
    content: ary mitsikilo hatramin’ireo dian-tongotro.
  '28':
  - type: text
    content: Kanefa mihalevona toy ny hazo boboka ny aiko,
  - type: text
    content: mova tsy toy ny fitafiana lanin’ny kalalao.
  '3':
  - type: text
    content: Fa izaho kosa hiteny amin’Andriamanitra Tsitoha,
  - type: text
    content: satria Izy no tiako hitarainana.
  '4':
  - type: text
    content: Fa ianareo dia mpamoron-dainga,
  - type: text
    content: dokotera tsy mahasitrana avokoa.
  '5':
  - type: text
    content: Tsara kokoa ho anareo ny mangina tanteraka,
  - type: text
    content: fa ho mariky ny fahendrenareo izany.
  '6':
  - type: text
    content: Mba henoy ange ny fiarovan-tenako
  - type: text
    content: ary ataovy izay handrenesanareo
  - type: text
    content: ny fanoherana aloaky ny vavako.
  '7':
  - type: text
    content: Fanompoana an’Andriamanitra ve
  - type: text
    content: no anaovanareo lahateny tsy mitombina?
  - type: text
    content: Fimasoana Azy ve no ilazanareo fitaka?
  '8':
  - type: text
    content: Hiandany aminy ve ianareo
  - type: text
    content: ka handahatra hisolovava Azy?
  '9':
  - type: text
    content: Ho tsara ve ny hizahany anareo akaiky?
  - type: text
    content: Tsy mba olombelona Andriamanitra
  - type: text
    content: ka ho azonareo fitapitahina.
