document_id: 2SA.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Bahanà sy i Rekaba namono nahafaty an’i Isbôsèta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa ren’i Isbôsèta zanakalahin’i Saoly fa maty tany Hebrôna i Abinera, dia niraviravy tanana izy, ary ketraka ny Israelita rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ity zanakalahin’i Saoly ity dia nanana lehiben’andia-miaramila; ka ny roalahy tamin’ireo lehibe ireo, dia i Bahanà sy i Rekaba samy zanakalahin’i Rimôna avy any Beerôta sady Benjaminita; satria natao ho isan’i Benjamîna koa i Beerôta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Beerôta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tokony ho 15 km avaratr’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: hatramin’ny nandosiran’ny mponiny nankany Gitaîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gitaîma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tsy fantatra mazava fa mety ho any amin’ny faritr’i Loda, ao andrefana avaratr’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' izay mbola onenan’ny taranany mandraka androany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I Jônatàna zanakalahin’i Saoly koa dia nanan-janakalahy izay nalemy ny tongony roa. Dimy taona izy raha tonga tany Jizrehela ny vaovao momba ny nahafatesan’i Saoly sy i Jônatàna. Nentin’ny mpitaiza azy nitsoaka izy; kanjo noho ny fahamaikana dia nianjera teny am-pandosirana ilay zaza, ka tonga nalemy ny tongony. Mefibôseta no anarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nankany an-tranon’i Isbôsèta i Rekaba sy i Bahanà zanakalahin’i Rimôna avy any Beerôta, ary tonga tany tokony ho tamin’ny mitataovovonana, dia ilay mafana be iny indrindra. Teo am-pialan-tsasatra i Isbôsèta tamin’izay. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: Dia niditra tao an-trano toy ny mpaka vary i Rekaba sy i Bahanà rahalahiny; koa rehefa hitany i Isbôsèta fa nandry teo am-parafara tao an’efitra fatoriany, dia notrobarany ny kibony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny dkt tranainy grika ny fisehoan’ny and 6-7 dia tahaka izao: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Natory teo am-pifantenam-bary ny mpiandry varavaran’ny trano; dia nitsoriaka i Rekaba sy i Bahanà rahalahiny ary nitsofoka tao an-trano. Hitany i Isbôsèta...
    marker-yv: yv-n
  - type: text
    text: '. Rehefa matin’izy roalahy izy, dia notapahiny ny lohany ary nentiny nandositra; ka nandritra ny alina no nandehanany namaky ny lemak’i Arabà. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nahatonga ny lohan’i Isbôsèta teo amin’i Davida tao Hebrôna izy mirahalahy ka niteny tamin’ny mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro tompoko ny lohan’i Isbôsèta zanakalahin’i Saoly fahavalonao izay nitady hahafaty anao. Fa ny TOMPO androany no namaly faty anao ny amin’ny nataon’i Saoly sy ny taranany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy i Davida namaly an’i Rekaba sy i Bahanà mirahalahy, samy zanak’i Rimôna avy any Beerôta:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Velona ny TOMPO Izay nanafaka ahy tamin’ny loza rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka izao no hizingiziniko: Ilay nanambara tamiko ny nahafatesan’i Saoly, ka nihevitra ny tenany ho mpitondra vaovao mahafaly, dia efa nosamboriko ary novonoiko ho faty tao Tsiklaga'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.11.
    marker-yv: yv-n
  - type: text
    text: '. Izany no nasetriko azy tamin’ny vaovao mahafaly nentiny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa mainka fa misy olon-dratsy namono nahafaty lehilahy tsy nanan-tsiny tao an-tranony sady teo am-parafarany. Tsy maintsy sazîko ianareo izao noho ny namonoanareo an’i Isbôsèta ho faty; ka hofongorako tsy ho amin’ity tany ity intsony ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nomen’i Davida baiko ireo zatovony ka namono nahafaty an’i Rekaba sy i Bahanà. Avy eo dia notapahiny ny tanany sy ny tongony, ary nahantony teo akaikin’ny dobo tao Hebrôna. Fa ny lohan’i Isbôsèta kosa dia nentina ka nalevina tao amin’ny fasan’i Abinera tao Hebrôna.
