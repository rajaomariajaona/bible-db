document_id: 2SA.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Bahanà sy i Rekaba namono nahafaty an’i Isbôsèta
  - type: text
    content: 'Rehefa ren’i Isbôsèta zanakalahin’i Saoly fa maty tany Hebrôna i Abinera, dia niraviravy tanana izy, ary ketraka ny Israelita rehetra. '
  '10':
  - type: text
    content: 'ka izao no hizingiziniko: Ilay nanambara tamiko ny nahafatesan’i Saoly, ka nihevitra ny tenany ho mpitondra vaovao mahafaly, dia efa nosamboriko ary novonoiko ho faty tao Tsiklaga'
  - type: note
    content: Jereo 1.11.
  - type: text
    content: '. Izany no nasetriko azy tamin’ny vaovao mahafaly nentiny. '
  '11':
  - type: text
    content: Koa mainka fa misy olon-dratsy namono nahafaty lehilahy tsy nanan-tsiny tao an-tranony sady teo am-parafarany. Tsy maintsy sazîko ianareo izao noho ny namonoanareo an’i Isbôsèta ho faty; ka hofongorako tsy ho amin’ity tany ity intsony ianareo.
  '12':
  - type: text
    content: Ary nomen’i Davida baiko ireo zatovony ka namono nahafaty an’i Rekaba sy i Bahanà. Avy eo dia notapahiny ny tanany sy ny tongony, ary nahantony teo akaikin’ny dobo tao Hebrôna. Fa ny lohan’i Isbôsèta kosa dia nentina ka nalevina tao amin’ny fasan’i Abinera tao Hebrôna.
  '2':
  - type: text
    content: Ity zanakalahin’i Saoly ity dia nanana lehiben’andia-miaramila; ka ny roalahy tamin’ireo lehibe ireo, dia i Bahanà sy i Rekaba samy zanakalahin’i Rimôna avy any Beerôta sady Benjaminita; satria natao ho isan’i Benjamîna koa i Beerôta
  - type: note
    content: 'Beerôta: toerana tokony ho 15 km avaratr’i Jerosalema.'
  - type: text
    content: ', '
  '3':
  - type: text
    content: hatramin’ny nandosiran’ny mponiny nankany Gitaîma
  - type: note
    content: 'Gitaîma: toerana tsy fantatra mazava fa mety ho any amin’ny faritr’i Loda, ao andrefana avaratr’i Jerosalema.'
  - type: text
    content: ' izay mbola onenan’ny taranany mandraka androany. '
  '4':
  - type: text
    content: I Jônatàna zanakalahin’i Saoly koa dia nanan-janakalahy izay nalemy ny tongony roa. Dimy taona izy raha tonga tany Jizrehela ny vaovao momba ny nahafatesan’i Saoly sy i Jônatàna. Nentin’ny mpitaiza azy nitsoaka izy; kanjo noho ny fahamaikana dia nianjera teny am-pandosirana ilay zaza, ka tonga nalemy ny tongony. Mefibôseta no anarany.
  '5':
  - type: text
    content: 'Nankany an-tranon’i Isbôsèta i Rekaba sy i Bahanà zanakalahin’i Rimôna avy any Beerôta, ary tonga tany tokony ho tamin’ny mitataovovonana, dia ilay mafana be iny indrindra. Teo am-pialan-tsasatra i Isbôsèta tamin’izay. '
  '6':
  - type: text
    content: Dia niditra tao an-trano toy ny mpaka vary i Rekaba sy i Bahanà rahalahiny; koa rehefa hitany i Isbôsèta fa nandry teo am-parafara tao an’efitra fatoriany, dia notrobarany ny kibony
  - type: note
    content: 'Amin’ny dkt tranainy grika ny fisehoan’ny and 6-7 dia tahaka izao: Natory teo am-pifantenam-bary ny mpiandry varavaran’ny trano; dia nitsoriaka i Rekaba sy i Bahanà rahalahiny ary nitsofoka tao an-trano. Hitany i Isbôsèta...'
  - type: text
    content: '. Rehefa matin’izy roalahy izy, dia notapahiny ny lohany ary nentiny nandositra; ka nandritra ny alina no nandehanany namaky ny lemak’i Arabà. '
  '8':
  - type: text
    content: 'Nahatonga ny lohan’i Isbôsèta teo amin’i Davida tao Hebrôna izy mirahalahy ka niteny tamin’ny mpanjaka hoe:'
  - type: text
    content: –Indro tompoko ny lohan’i Isbôsèta zanakalahin’i Saoly fahavalonao izay nitady hahafaty anao. Fa ny TOMPO androany no namaly faty anao ny amin’ny nataon’i Saoly sy ny taranany.
  '9':
  - type: text
    content: 'Fa hoy i Davida namaly an’i Rekaba sy i Bahanà mirahalahy, samy zanak’i Rimôna avy any Beerôta:'
  - type: text
    content: '–Velona ny TOMPO Izay nanafaka ahy tamin’ny loza rehetra, '
