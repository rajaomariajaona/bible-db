document_id: 1CH.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: LISITRA ARA-TETIARANA
  - type: heading
    content: Hatreo amin’i Adama ka hatrany amin’ny terak’i Hesao
  - type: text
    content: I Adàma
  - type: note
    content: 'Ny mpanoratra ireo Bokin’ny Tantara dia mifantoka indrindra amin’ny fanjakàn’i Davida (1 Tan 10–29) sy i Salômôna (2 Tan 1–9) ary ireo mpanjakan’i Joda (2 Tan 10–36). Ao amin’ny 1 Tan 1–9 izy dia mamintina ny tantara rehetra talohan’i Davida amin’ny alalan’ny lisitra tetiarana. Izany dia narindra avy amin’ireo boky tranainy kokoa, na nalaina mivantana avy tamin’ireo boky ireo ihany (manomboka amin’ny Genesỳ ka miafara amin’ny 1 Samoela), kanefa matetika no misy tsy itoviany kely. –and 1-4: ampit Gen 5; and 5-23: ampit Gen 10; and 24-27: ampit Gen 11.10-26; and 28-31: ampit Gen 25.13-16; and 32-34: ampit Gen 25.1-4, 19-26; and 35-42: ampit Gen 36.10-28.'
  - type: text
    content: ' no rain’i Seta; i Seta no rain’i Enôsa; '
  '10':
  - type: text
    content: 'I Kosy koa no ray niteraka an’i Nimrôda izay nanjary lehilahy mahery mpanapaka voalohany teto ambonin’ny tany. '
  '11':
  - type: text
    content: 'I Mitsiraîma no razambe nipoiran’ny Lodita sy ny Hanamita, ny Lehabita sy ny Neftohita, '
  '12':
  - type: text
    content: ny Patrôsita sy ny Kaslohita ary ny Kaftôrita; ka ny Kaftôrita no niavian’ny Filistinina
  - type: note
    content: Jereo Gen 10.14 sy nta.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'I Kanahàna no ray niteraka an’i Tsidôna (lahimatoany) sy i Heta; '
  '14':
  - type: text
    content: 'i Kanahàna koa no razambe nipoiran’ny Jebosita sy ny Amôrita, ny Girgasîta '
  '15':
  - type: text
    content: 'sy ny Hivita, ny Harkita sy ny Sinîta, '
  '16':
  - type: text
    content: ny Arvadita sy ny Tsemarita ary ny Hamatîta.
  '17':
  - type: text
    content: 'Ny zanakalahin’i Sema dia i Helama sy i Asora, i Arama sy i Arpaksada, i Loda sy i Arama, i Hotsa sy i Hola ary i Getera sy i Mesèka. '
  '18':
  - type: text
    content: 'I Arpaksada no ray niteraka an’i Kaina; i Kaina no ray niteraka an’i Salà; i Salà no ray niteraka an’i Hebera. '
  '19':
  - type: text
    content: 'i Hebera niteraka zanaka roa lahy: ny anaran’ny voalohany dia i Pelega (izay midika hoe «Fizarana») satria tamin’ny androny no nizara ny olombelona teto an-tany; ary i Jôktàna no anaran’ny rahalahiny. '
  '2':
  - type: text
    content: 'i Enôsa no rain’i Kenàna; i Kenàna no rain’i Mahalalela; i Mahalalela no rain’i Jareda, '
  '20':
  - type: text
    content: 'I Jôktàna no ray niteraka an’i Almôdada sy i Salefa, i Hatsarmavety sy i Jarà, '
  '21':
  - type: text
    content: 'i Hadôrama sy i Ozala, i Diklà '
  '22':
  - type: text
    content: 'sy i Hebala, i Abimaela sy i Sebà '
  '23':
  - type: text
    content: 'mbamin’i Ofîra sy i Havilà ary i Jôbaba: ireo no zanakalahin’i Jôktàna.'
  '24':
  - type: text
    content: 'I Sema no rain’i Arpaksada; i Arpaksada no rain’i Sela; '
  '25':
  - type: text
    content: 'i Sela no rain’i Hebera; i Hebera no rain’i Pelega; i Pelega no rain-dRehò; '
  '26':
  - type: text
    content: 'i Rehò no rain’i Seroga; i Seroga no rain’i Nahôra; i Nahôra no rain’i Tera; '
  '27':
  - type: text
    content: i Tera no rain’i Abrama izay hantsoina koa hoe Abrahama.
  '28':
  - type: text
    content: Ny zanakalahin’i Abrahama dia i Itsehàka sy i Jismahela
  - type: note
    content: I Itsehàka dia voatonona alohan’i Jismahela zokiny, satria izy no razan’ny Israelita.
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Ireto avy no taranak’izy telo mianaka:'
  - type: text
    content: 'I Nebaiôta no lahimatoan’i Jismahela, dia i Kedara sy i Abdeola, i Mibsama '
  '3':
  - type: text
    content: 'i Jareda no rain’i Henôka; i Henôka no rain’i Metosela; i Metosela no rain’i Lamèka; ary i Lamèka no rain’i Noà. '
  '30':
  - type: text
    content: 'sy i Mismà, i Domà sy i Masà, i Hadada '
  '31':
  - type: text
    content: 'sy i Jetora ary i Nafisa sy i Kedmà: ireo no zanakalahin’i Jismahela.'
  '32':
  - type: text
    content: 'Ny zanakalahy naterak’i Ketorà, vadikelin’i Abrahama, dia i Zimràna, i Jôksàna, i Medàna, i Midiàna, i Jisbàka ary i Soha. Ny zanakalahin’i Jôksàna dia i Sebà sy i Dedàna. '
  '33':
  - type: text
    content: Ny zanakalahin’i Midiàna dia i Hefà sy i Hefèra, i Hanôka sy i Abidà ary i Eldahà. Ireo rehetra ireo no taranak’i Ketorà.
  '34':
  - type: text
    content: I Abrahama no ray niteraka an’i Itsehàka. Ny zanakalahin’i Itsehàka dia i Hesao sy i Israely
  - type: note
    content: 'Israely: anarana hafa iantsoana an’i Jakôba io, jereo Gen 32.29; 35.10.'
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Ny zanalahin’i Hesao dia Elifaza sy i Rehoela, i Jehisa sy i Jahelama ary i Kôrà. '
  '36':
  - type: text
    content: 'Ny zanakalahin’i Elifaza dia i Temàna sy i Omara, i Tsefao sy i Gahetama, i Kenaza sy i Timnà ary i Hamalèka. '
  '37':
  - type: text
    content: 'Ny zanakalahin-dRehoela dia i Nahata sy i Zerà ary i Samà sy i Mizrà. '
  '38':
  - type: text
    content: 'Ny zanakalahin’i Sehira dia i Lôtàna sy i Sôbala, i Tsibehôna (izay rain’i Hanà sady raiben’i Disôna), i Etsèra ary i Disàna. '
  '39':
  - type: text
    content: 'Ny zanakalahin’i Lôtàna dia i Hôrỳ sy i Hômàna. I Lôtàna dia nanana anabavy atao hoe Timnà. '
  '4':
  - type: text
    content: Ny zanakalahin’i Noà dia i Sema sy i Hama ary i Jafeta.
  '40':
  - type: text
    content: 'Ny zanakalahin’i Sôbala dia i Haliàna sy i Manahata, i Hebala sy i Sefao ary i Ônama. Ny zanakalahin’i Tsibehôna dia i Aià sy i Hanà. '
  '41':
  - type: text
    content: 'Ny zanakalahin’i Hanà dia i Disôna; ny zanakalahin’i Disôna dia i Hamràna sy i Esbàna ary i Jitràna sy i Keràna. '
  '42':
  - type: text
    content: Ny zanakalahin’i Etsera dia i Bilehàna sy i Zahavàna ary i Jahakano. Ny zanakalahin’i Disàna
  - type: note
    content: 'Jahakano na Hakano. –Disàna: araka ny and 38 na dia Disôna aza no eo amin’ny RM (kanefa ny taranak’i Disôna dia efa voalaza eo amin’ny and 41).'
  - type: text
    content: ' dia i Hotsy sy i Aràna.'
  - type: heading
    content: Ireo mpanjaka sy lehibe tao Edôma
  - type: heading
    content: (Jereo Gen 36.31-43)
  '43':
  - type: text
    content: 'Ary ireto kosa ny mpanjaka izay nanjaka tao amin’ny tany Edôma talohan’ny nanjakana mpanjaka tamin’ny Israelita: i Belà zanakalahin’i Behôra, ka i Dinihabà no anaran’ny tanàna fiaviany. '
  '44':
  - type: text
    content: 'Rehefa maty i Belà, dia nanjaka nandimby azy i Jôbaba, zanakalahin’i Zerà, avy ao Bôtserà. '
  '45':
  - type: text
    content: 'Rehefa maty i Jôbaba, dia nanjaka nandimby azy i Hosama avy amin’ny tanin’ny Temanîta. '
  '46':
  - type: text
    content: 'Rehefa maty i Hosama, dia nanjaka nandimby azy i Hadada zanakalahin’i Bedada, ka i Havita no anaran’ny tanàna fiaviany: izy no namely ny Midianita tao amin’ny tanin’i Môaba. '
  '47':
  - type: text
    content: 'Rehefa maty i Hadada, dia nanjaka nandimby azy i Samlà avy any Masrekà. '
  '48':
  - type: text
    content: 'Rehefa maty i Samlà, dia nanjaka nandimby azy i Saoly avy any Rehôbôta amoron’ny renirano. '
  '49':
  - type: text
    content: 'Rehefa maty i Saoly, dia nanjaka nandimby azy i Bahala-Hanàna zanakalahin’i Hakbôra. '
  '5':
  - type: text
    content: 'Ny zanakalahin’i Jafeta dia i Gômera sy i Magôga, i Maday sy i Javàna, i Tobala, i Mesèka ary i Tirasa. '
  '50':
  - type: text
    content: Rehefa maty i Bahala-Hanàna, dia nanjaka nandimby azy i Hadada; ka i Pahò no anaran’ny tanàna fiaviany, ary i Mehetabeela no anaran’ny vadiny, zanakavavin’i Matreda sady zafikelin’i Me-Zahaba.
  '51':
  - type: text
    content: 'Ary rehefa maty i Hadada, dia ireto no lehibem-poko nitondra an’i Edôma: i Timnà sy i Halvà, i Jeteta '
  '52':
  - type: text
    content: 'sy i Ohôlibamà, i Elà sy i Pinôna, '
  '53':
  - type: text
    content: 'i Kenaza sy i Temàna, Mibitsara '
  '54':
  - type: text
    content: sy i Magdiela ary i Hirama; ireo no lehibem-poko nitondra an’i Edôma.
  '6':
  - type: text
    content: Ny zanakalahin’i Gômera dia i Askenaza sy i Difata
  - type: note
    content: Difata na Rifata (jereo Gen 10.3).
  - type: text
    content: ' ary i Tôgarmà. '
  '7':
  - type: text
    content: Ny zanakalahin’i Javàna dia i Elisà sy i Tarsisy ary i Kitima sy i Rôdanima.
  '8':
  - type: text
    content: 'Ny zanakalahin’i Hama dia i Kosy sy i Mitsiraîma ary i Pota sy i Kanahàna. '
  '9':
  - type: text
    content: 'Ny zanakalahin’i Kosy dia i Seba sy i Havilà, i Sabtà sy i Rahemà ary i Sabtekà; ny zanakalahin’i Rehamà dia i Sebà sy i Dedàna. '
