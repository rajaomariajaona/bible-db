    - type: text
      text: LISITRA ARA-TETIARANA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hatreo amin’i Adama ka hatrany amin’ny terak’i Hesao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I Adàma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny mpanoratra ireo Bokin’ny Tantara dia mifantoka indrindra amin’ny fanjakàn’i Davida (1 Tan 10–29) sy i Salômôna (2 Tan 1–9) ary ireo mpanjakan’i Joda (2 Tan 10–36). Ao amin’ny 1 Tan 1–9 izy dia mamintina ny tantara rehetra talohan’i Davida amin’ny alalan’ny lisitra tetiarana. Izany dia narindra avy amin’ireo boky tranainy kokoa, na nalaina mivantana avy tamin’ireo boky ireo ihany (manomboka amin’ny Genesỳ ka miafara amin’ny 1 Samoela), kanefa matetika no misy tsy itoviany kely. –
      - type: usfm
        marker: bd
        children:
        - type: text
          text: and 1-4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ampit Gen 5; '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: and 5-23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ampit Gen 10; '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: and 24-27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ampit Gen 11.10-26; '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: and 28-31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ampit Gen 25.13-16; '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: and 32-34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ampit Gen 25.1-4, 19-26; '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: and 35-42
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ampit Gen 36.10-28.'
      marker-yv: yv-n
    - type: text
      text: ' no rain’i Seta; i Seta no rain’i Enôsa; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I Kosy koa no ray niteraka an’i Nimrôda izay nanjary lehilahy mahery mpanapaka voalohany teto ambonin’ny tany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I Mitsiraîma no razambe nipoiran’ny Lodita sy ny Hanamita, ny Lehabita sy ny Neftohita, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ny Patrôsita sy ny Kaslohita ary ny Kaftôrita; ka ny Kaftôrita no niavian’ny Filistinina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 10.14 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I Kanahàna no ray niteraka an’i Tsidôna (lahimatoany) sy i Heta; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'i Kanahàna koa no razambe nipoiran’ny Jebosita sy ny Amôrita, ny Girgasîta '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'sy ny Hivita, ny Harkita sy ny Sinîta, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ny Arvadita sy ny Tsemarita ary ny Hamatîta.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny zanakalahin’i Sema dia i Helama sy i Asora, i Arama sy i Arpaksada, i Loda sy i Arama, i Hotsa sy i Hola ary i Getera sy i Mesèka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'I Arpaksada no ray niteraka an’i Kaina; i Kaina no ray niteraka an’i Salà; i Salà no ray niteraka an’i Hebera. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'i Hebera niteraka zanaka roa lahy: ny anaran’ny voalohany dia i Pelega (izay midika hoe «Fizarana») satria tamin’ny androny no nizara ny olombelona teto an-tany; ary i Jôktàna no anaran’ny rahalahiny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'i Enôsa no rain’i Kenàna; i Kenàna no rain’i Mahalalela; i Mahalalela no rain’i Jareda, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'I Jôktàna no ray niteraka an’i Almôdada sy i Salefa, i Hatsarmavety sy i Jarà, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'i Hadôrama sy i Ozala, i Diklà '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'sy i Hebala, i Abimaela sy i Sebà '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'mbamin’i Ofîra sy i Havilà ary i Jôbaba: ireo no zanakalahin’i Jôktàna.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'I Sema no rain’i Arpaksada; i Arpaksada no rain’i Sela; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'i Sela no rain’i Hebera; i Hebera no rain’i Pelega; i Pelega no rain-dRehò; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'i Rehò no rain’i Seroga; i Seroga no rain’i Nahôra; i Nahôra no rain’i Tera; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: i Tera no rain’i Abrama izay hantsoina koa hoe Abrahama.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny zanakalahin’i Abrahama dia i Itsehàka sy i Jismahela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Itsehàka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia voatonona alohan’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jismahela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' zokiny, satria izy no razan’ny Israelita.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ireto avy no taranak’izy telo mianaka:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Nebaiôta no lahimatoan’i Jismahela, dia i Kedara sy i Abdeola, i Mibsama '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'i Jareda no rain’i Henôka; i Henôka no rain’i Metosela; i Metosela no rain’i Lamèka; ary i Lamèka no rain’i Noà. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'sy i Mismà, i Domà sy i Masà, i Hadada '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'sy i Jetora ary i Nafisa sy i Kedmà: ireo no zanakalahin’i Jismahela.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ny zanakalahy naterak’i Ketorà, vadikelin’i Abrahama, dia i Zimràna, i Jôksàna, i Medàna, i Midiàna, i Jisbàka ary i Soha. Ny zanakalahin’i Jôksàna dia i Sebà sy i Dedàna. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ny zanakalahin’i Midiàna dia i Hefà sy i Hefèra, i Hanôka sy i Abidà ary i Eldahà. Ireo rehetra ireo no taranak’i Ketorà.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: I Abrahama no ray niteraka an’i Itsehàka. Ny zanakalahin’i Itsehàka dia i Hesao sy i Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Israely: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anarana hafa iantsoana an’i Jakôba io, jereo Gen 32.29; 35.10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ny zanalahin’i Hesao dia Elifaza sy i Rehoela, i Jehisa sy i Jahelama ary i Kôrà. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ny zanakalahin’i Elifaza dia i Temàna sy i Omara, i Tsefao sy i Gahetama, i Kenaza sy i Timnà ary i Hamalèka. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ny zanakalahin-dRehoela dia i Nahata sy i Zerà ary i Samà sy i Mizrà. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ny zanakalahin’i Sehira dia i Lôtàna sy i Sôbala, i Tsibehôna (izay rain’i Hanà sady raiben’i Disôna), i Etsèra ary i Disàna. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ny zanakalahin’i Lôtàna dia i Hôrỳ sy i Hômàna. I Lôtàna dia nanana anabavy atao hoe Timnà. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny zanakalahin’i Noà dia i Sema sy i Hama ary i Jafeta.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ny zanakalahin’i Sôbala dia i Haliàna sy i Manahata, i Hebala sy i Sefao ary i Ônama. Ny zanakalahin’i Tsibehôna dia i Aià sy i Hanà. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ny zanakalahin’i Hanà dia i Disôna; ny zanakalahin’i Disôna dia i Hamràna sy i Esbàna ary i Jitràna sy i Keràna. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ny zanakalahin’i Etsera dia i Bilehàna sy i Zahavàna ary i Jahakano. Ny zanakalahin’i Disàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.42 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jahakano '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hakano
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Disàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': araka ny and 38 na dia '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Disôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' aza no eo amin’ny RM (kanefa ny taranak’i Disôna dia efa voalaza eo amin’ny and 41).'
      marker-yv: yv-n
    - type: text
      text: ' dia i Hotsy sy i Aràna.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo mpanjaka sy lehibe tao Edôma
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Gen 36.31-43)
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Ary ireto kosa ny mpanjaka izay nanjaka tao amin’ny tany Edôma talohan’ny nanjakana mpanjaka tamin’ny Israelita: i Belà zanakalahin’i Behôra, ka i Dinihabà no anaran’ny tanàna fiaviany. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Rehefa maty i Belà, dia nanjaka nandimby azy i Jôbaba, zanakalahin’i Zerà, avy ao Bôtserà. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Rehefa maty i Jôbaba, dia nanjaka nandimby azy i Hosama avy amin’ny tanin’ny Temanîta. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Rehefa maty i Hosama, dia nanjaka nandimby azy i Hadada zanakalahin’i Bedada, ka i Havita no anaran’ny tanàna fiaviany: izy no namely ny Midianita tao amin’ny tanin’i Môaba. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Rehefa maty i Hadada, dia nanjaka nandimby azy i Samlà avy any Masrekà. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Rehefa maty i Samlà, dia nanjaka nandimby azy i Saoly avy any Rehôbôta amoron’ny renirano. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Rehefa maty i Saoly, dia nanjaka nandimby azy i Bahala-Hanàna zanakalahin’i Hakbôra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny zanakalahin’i Jafeta dia i Gômera sy i Magôga, i Maday sy i Javàna, i Tobala, i Mesèka ary i Tirasa. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Rehefa maty i Bahala-Hanàna, dia nanjaka nandimby azy i Hadada; ka i Pahò no anaran’ny tanàna fiaviany, ary i Mehetabeela no anaran’ny vadiny, zanakavavin’i Matreda sady zafikelin’i Me-Zahaba.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Ary rehefa maty i Hadada, dia ireto no lehibem-poko nitondra an’i Edôma: i Timnà sy i Halvà, i Jeteta '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'sy i Ohôlibamà, i Elà sy i Pinôna, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'i Kenaza sy i Temàna, Mibitsara '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: sy i Magdiela ary i Hirama; ireo no lehibem-poko nitondra an’i Edôma.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny zanakalahin’i Gômera dia i Askenaza sy i Difata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Difata '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Rifata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo Gen 10.3).'
      marker-yv: yv-n
    - type: text
      text: ' ary i Tôgarmà. '
