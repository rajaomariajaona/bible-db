document_id: EZK.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra maniraka an’i Ezekiela hankany amin’ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy ilay feo tamiko: «Ry ilay taranak’olombelona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ry ilay taranak’olombelona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ao amin’ny bokin’i Ezekiela dia fiteny matetika izany mba hilazana ny elanelana misy eo amin’Andriamanitra sy ny mpaminany izay tsy inona fa olona manam-petra mety maty ihany.
    marker-yv: yv-n
  - type: text
    text: ', mitsangàna ianao fa hiteny aminao Aho.» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa raha mbola niteny izany ilay feo, dia niditra tao amiko ny Fanahin’Andriamanitra ka nampitsangana ahy; dia nihaino Ilay niteny tamiko aho, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary nilazany hoe: «Ry ilay taranak’olombelona, maniraka anao Aho ho any amin’ireo Israelita, dia ireo andia-mpikomy izay efa nikomy tamiko; fa tahaka ireo razany ihany izy, ka tsy nitsahatra namadika Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ireo olona mafy loha sy be kirina ireo no anirahako anao, ka hitenenanao hoe: Izao no lazain’ny Tompo ANDRIANANAHARY. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa na hihaino anao izy na tsy hihaino, satria vahoaka maditra, dia ho fantany fa misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' eo anivony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Ary ianao, ry ilay taranak’olombelona, aza matahotra ny tenany na ny teniny. Hanohitra anao ireo, ka ho toy ny eo anivon’ny tsilo sy ny maingoka ianao; kanefa aza matahotra noho ny tenin’io vahoaka maditra io na mivadi-po noho ny fihetsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa avereno aminy ihany izay hambarako anao na hihaino izy na tsy hihaino noho ny di-dohany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: «Ary ianao, ry ilay taranak’olombelona, aza miseho ho maditra tahaka ireo, fa henoy izay lazaiko aminao. Sokafy ny vavanao ka hano izay homeko anao.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia indro hitako nisy tanana iray nitsotra nanatona ahy sady nitana boky iray miendrika horonan-taratasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'boky iray miendrika horonan-taratasy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jer 36.2 sy nta. –Momba ny and 9-10, jereo Zak 5.1-4; Apôk 5.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Noborahany teo anatrehako izany, ka voasoratra ny lafiny roa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Matetika dia ny lafiny iray ihany no anoratana, fa eto dia ny lafiny roa no tsy maintsy nanoratana satria betsaka ny teny tsy maintsy hampitain’ny mpaminany.
    marker-yv: yv-n
  - type: text
    text: . Fitarainana sy toloko ary toreo no voasoratra tao.
