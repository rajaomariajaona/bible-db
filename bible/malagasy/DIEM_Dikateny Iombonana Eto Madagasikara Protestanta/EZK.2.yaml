document_id: EZK.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra maniraka an’i Ezekiela hankany amin’ny Israelita
  - type: text
    content: 'Ary hoy ilay feo tamiko: «Ry ilay taranak’olombelona'
  - type: note
    content: 'Ry ilay taranak’olombelona: ao amin’ny bokin’i Ezekiela dia fiteny matetika izany mba hilazana ny elanelana misy eo amin’Andriamanitra sy ny mpaminany izay tsy inona fa olona manam-petra mety maty ihany.'
  - type: text
    content: ', mitsangàna ianao fa hiteny aminao Aho.» '
  '10':
  - type: text
    content: Noborahany teo anatrehako izany, ka voasoratra ny lafiny roa
  - type: note
    content: Matetika dia ny lafiny iray ihany no anoratana, fa eto dia ny lafiny roa no tsy maintsy nanoratana satria betsaka ny teny tsy maintsy hampitain’ny mpaminany.
  - type: text
    content: . Fitarainana sy toloko ary toreo no voasoratra tao.
  '2':
  - type: text
    content: 'Fa raha mbola niteny izany ilay feo, dia niditra tao amiko ny Fanahin’Andriamanitra ka nampitsangana ahy; dia nihaino Ilay niteny tamiko aho, '
  '3':
  - type: text
    content: 'ary nilazany hoe: «Ry ilay taranak’olombelona, maniraka anao Aho ho any amin’ireo Israelita, dia ireo andia-mpikomy izay efa nikomy tamiko; fa tahaka ireo razany ihany izy, ka tsy nitsahatra namadika Ahy. '
  '4':
  - type: text
    content: 'Ireo olona mafy loha sy be kirina ireo no anirahako anao, ka hitenenanao hoe: Izao no lazain’ny Tompo ANDRIANANAHARY. '
  '5':
  - type: text
    content: 'Koa na hihaino anao izy na tsy hihaino, satria vahoaka maditra, dia ho fantany fa misy '
  - type: text
    content: mpaminany
  - type: text
    content: ' eo anivony.'
  '6':
  - type: text
    content: '«Ary ianao, ry ilay taranak’olombelona, aza matahotra ny tenany na ny teniny. Hanohitra anao ireo, ka ho toy ny eo anivon’ny tsilo sy ny maingoka ianao; kanefa aza matahotra noho ny tenin’io vahoaka maditra io na mivadi-po noho ny fihetsiny. '
  '7':
  - type: text
    content: Fa avereno aminy ihany izay hambarako anao na hihaino izy na tsy hihaino noho ny di-dohany.
  '8':
  - type: text
    content: «Ary ianao, ry ilay taranak’olombelona, aza miseho ho maditra tahaka ireo, fa henoy izay lazaiko aminao. Sokafy ny vavanao ka hano izay homeko anao.»
  '9':
  - type: text
    content: Dia indro hitako nisy tanana iray nitsotra nanatona ahy sady nitana boky iray miendrika horonan-taratasy
  - type: note
    content: 'boky iray miendrika horonan-taratasy: jereo Jer 36.2 sy nta. –Momba ny and 9-10, jereo Zak 5.1-4; Apôk 5.1.'
  - type: text
    content: '. '
