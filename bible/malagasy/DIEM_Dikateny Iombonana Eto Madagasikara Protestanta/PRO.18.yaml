document_id: PRO.18,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ny tia tena dia tsy mitady afa-tsy ny tombontsoany;
  - type: text
    content: fa mampisafoaka azy rehefa mety fanampiana.
  '10':
  - type: text
    content: Tilikambo mafy ny anaran’ny TOMPO,
  - type: text
    content: ka ny olo-marina miezaka ho ao dia voaaro tokoa;
  '11':
  - type: text
    content: ho an’ny mpanankarena kosa dia ny fananany no toa tanàna mafy,
  - type: text
    content: ary heveriny ho manda avo miaro azy tokoa izany.
  '12':
  - type: text
    content: Ny fireharehan’ny olona no mialoha ny faharavàny;
  - type: text
    content: fa ny fanetren-tena kosa mialoha ny voninahitra.
  '13':
  - type: text
    content: Izay mamaly teny tsy henony akory
  - type: text
    content: dia hadalana sy henatra ho azy izany.
  '14':
  - type: text
    content: Ny toe-panahy mavitrika dia mandresy ny aretina;
  - type: text
    content: fa zovy kosa no hanarina ny toe-panahy kivy?
  '15':
  - type: text
    content: Ny fon’ny manan-tsaina maniry hahazo fahalalana,
  - type: text
    content: ary ny olon-kendry liana hihaino izany.
  '16':
  - type: text
    content: Ny fanomezana dia mamoha varavarana ny mpanolotra
  - type: text
    content: ary mampiditra azy eo anatrehan’ny lehibe.
  '17':
  - type: text
    content: Amin’ny fitsarana dia izay miteny aloha no toa marina,
  - type: text
    content: mandra-piavin’ny ankilany hanohitra ny voalazany.
  '18':
  - type: text
    content: Ny fanontsanan-kodiakely mety mampitsahatra fifandirana
  - type: text
    content: ary mamaha olana eo amin’ny samy mahery
  - type: note
    content: Jereo 16.33 sy nta.
  - type: text
    content: .
  '19':
  - type: text
    content: Sarotra kokoa noho ny mananika manda
  - type: text
    content: ny manatona rahalahy tafintohina;
  - type: text
    content: ary ny fifandirana dia mafy toy ny hidin-dapa.
  '2':
  - type: text
    content: Tsy mahaliana ny adala izay fahaiza-manavaka,
  - type: text
    content: fa ny haneho ny heviny hatrany no sitrany.
  '20':
  - type: text
    content: Ny vokatry ny tenin’ny olona no hamelomany tena,
  - type: text
    content: eny, ny vokatr’izay lazainy no hivelomany;
  '21':
  - type: text
    content: ny mahafaty sy mahavelona dia miankina amin’ny teny,
  - type: text
    content: ka izay mankamamy miteny no hihinana ny vokany.
  '22':
  - type: text
    content: Izay mahita vady mahita fahasambarana;
  - type: text
    content: sady mahazo fanambinana avy amin’ny TOMPO izy.
  '23':
  - type: text
    content: Mitalaholaho ny mahantra, rehefa miteny;
  - type: text
    content: fa mihenjana kosa ny mpanankarena, rehefa mamaly.
  '24':
  - type: text
    content: Izay maro namana tsy maintsy ho sahirana,
  - type: text
    content: nefa misy sakaiza izay mifikitra noho ny mpiray tampo aza.
  '3':
  - type: text
    content: Ny haratsiam-panahy dia mahatonga fanesoana;
  - type: text
    content: ary ny toetra manala baràka dia arahin-kenatra.
  '4':
  - type: text
    content: Ny teny aloaky ny vavan’ny olona
  - type: text
    content: dia mety ho lalina toy ny ranomasina
  - type: text
    content: sy hamelombelona toy ny ranondriaka,
  - type: text
    content: ary mety ho loharanom-pahendrena
  - type: note
    content: Dkt hafa Ny tenin’ny olona dia mampidi-doza tahaka ny rano lalina, fa ny fahendrena kosa dia mamelombelona tahaka ny ranondriaka mifantsitsitra.
  - type: text
    content: .
  '5':
  - type: text
    content: Tsy tsara ny miandany amin’ny olon-dratsy
  - type: text
    content: mba hahatonga ny marina ho resy amin’ny fitsarana.
  '6':
  - type: text
    content: Mahatonga fifandirana ny tenin’ny adala,
  - type: text
    content: ary miantso kapoka ny zavatra lazainy.
  '7':
  - type: text
    content: Fandringanan-tena ny lazain’ny adala
  - type: text
    content: ary fandrika ho azy ny teny ataony.
  '8':
  - type: text
    content: Toa hani-matsiro ny tenin’ny mpanendrikendrika,
  - type: text
    content: ka any anaty kibo no mikorotsaka.
  '9':
  - type: text
    content: Izay malaina amin’ny asany
  - type: text
    content: dia efa naman’ny mpanimba zavatra.
