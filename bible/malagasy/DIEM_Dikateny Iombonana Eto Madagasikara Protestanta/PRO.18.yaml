document_id: PRO.18
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tia tena dia tsy mitady afa-tsy ny tombontsoany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mampisafoaka azy rehefa mety fanampiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy mahaliana ny adala izay fahaiza-manavaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny haneho ny heviny hatrany no sitrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny haratsiam-panahy dia mahatonga fanesoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny toetra manala baràka dia arahin-kenatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny teny aloaky ny vavan’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mety ho lalina toy ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamelombelona toy ny ranondriaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mety ho loharanom-pahendrena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny tenin’ny olona dia mampidi-doza tahaka ny rano lalina, fa ny fahendrena kosa dia mamelombelona tahaka ny ranondriaka mifantsitsitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy tsara ny miandany amin’ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatonga ny marina ho resy amin’ny fitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mahatonga fifandirana ny tenin’ny adala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miantso kapoka ny zavatra lazainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fandringanan-tena ny lazain’ny adala
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fandrika ho azy ny teny ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toa hani-matsiro ny tenin’ny mpanendrikendrika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka any anaty kibo no mikorotsaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay malaina amin’ny asany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa naman’ny mpanimba zavatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tilikambo mafy ny anaran’ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny olo-marina miezaka ho ao dia voaaro tokoa;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ho an’ny mpanankarena kosa dia ny fananany no toa tanàna mafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary heveriny ho manda avo miaro azy tokoa izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fireharehan’ny olona no mialoha ny faharavàny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fanetren-tena kosa mialoha ny voninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mamaly teny tsy henony akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hadalana sy henatra ho azy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny toe-panahy mavitrika dia mandresy ny aretina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa zovy kosa no hanarina ny toe-panahy kivy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny fon’ny manan-tsaina maniry hahazo fahalalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny olon-kendry liana hihaino izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fanomezana dia mamoha varavarana ny mpanolotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampiditra azy eo anatrehan’ny lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Amin’ny fitsarana dia izay miteny aloha no toa marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-piavin’ny ankilany hanohitra ny voalazany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny fanontsanan-kodiakely mety mampitsahatra fifandirana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamaha olana eo amin’ny samy mahery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 16.33 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Sarotra kokoa noho ny mananika manda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny manatona rahalahy tafintohina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fifandirana dia mafy toy ny hidin-dapa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny vokatry ny tenin’ny olona no hamelomany tena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny vokatr’izay lazainy no hivelomany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ny mahafaty sy mahavelona dia miankina amin’ny teny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka izay mankamamy miteny no hihinana ny vokany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izay mahita vady mahita fahasambarana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mahazo fanambinana avy amin’ny TOMPO izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mitalaholaho ny mahantra, rehefa miteny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mihenjana kosa ny mpanankarena, rehefa mamaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay maro namana tsy maintsy ho sahirana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa misy sakaiza izay mifikitra noho ny mpiray tampo aza.
