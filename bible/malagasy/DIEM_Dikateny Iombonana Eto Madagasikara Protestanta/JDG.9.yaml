document_id: JDG.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tonga mpanjaka i Abimelèka
  - type: text
    content: I Abimelèka, zanakalahin’i Jerobahala
  - type: note
    content: Ao amin’ity toko manontolo ity dia antsoina hoe Jerobahala i Gidehôna jereo 6.32.
  - type: text
    content: ' na Gidehôna, dia nankany Sekema mba hifandinika tamin’ny anadahin-dreniny sy izay rehetra isan’ny fianakavian-dreniny ka nanao taminy hoe:'
  '10':
  - type: text
    content: 'Ary hoy koa ireo hazo tamin’ny aviavy: ‹Andao ianao hanjaka aminay.› '
  '11':
  - type: text
    content: 'Fa namaly azy ny aviavy hoe: ‹Dia holaviko ve ny hanome voa mamy sy matsiro, ka handeha hitsingevaheva eny ambonin’ny hazo hafa aho?› '
  '12':
  - type: text
    content: 'Ary hoy koa ireo hazo tamin’ny voaloboka: ‹Andao ianao hanjaka aminay.› '
  '13':
  - type: text
    content: 'Fa namaly azy ny voaloboka hoe: ‹Dia holaviko ve ny hamokatra divay izay mahafaly an’Andriamanitra sy ny olona, ka handeha hitsingevaheva eny ambonin’ny hazo hafa aho?› '
  '14':
  - type: text
    content: 'Farany, dia ny kirihitra tsilo no nitenenan’ny hazo rehetra hoe: ‹Andao ianao hanjaka aminay.› '
  '15':
  - type: text
    content: 'Ary namaly azy ny kirihitra tsilo hoe: ‹Raha sitrakareo tokoa ny hifidy ahy ho mpanjakanareo, dia avia mipetraka eto ambany alokaloko ianareo! Fa raha tsy hanao izany ianareo, dia aoka hisy afo mivoaka avy amin’ny tsiloko ka handoro hatramin’ny hazo sederan’i Libano'
  - type: note
    content: I Libano, tendrombohitra mitandavana eo avaratr’i Palestinina, dia malaza tamin’ny ala sedera.
  - type: text
    content: aza!› »
  '16':
  - type: text
    content: 'Dia hoy ihany i Jôtama hoe:'
  - type: text
    content: '–Ankehitriny àry, moa rariny sy hitsiny ve ny nataonareo fony nampanjaka an’i Abimelèka ianareo? Mety ve ny nataonareo tamin’i Jerobahala sy ny ankohonany? Araka ny soa vitany taminareo ve no navalinareo azy? '
  '17':
  - type: text
    content: 'Fa niady ho anareo ny raiko ka nanao vy very ny ainy mba hanafaka anareo tamin’ny Midianita; '
  '18':
  - type: text
    content: 'nefa androany dia nikomianareo ny ankohonany. Novonoinareo ny zanany fitopolo lahy teo ambony vatolampy iray ihany; ary nampanjakainareo tamin’ny mponin’i Sekema i Abimelèka zanakalahin’ny mpanompovaviny, satria havanareo izy. '
  '19':
  - type: text
    content: 'Koa raha tàhiny rariny sy hitsiny ny nataonareo tamin’i Jerobahala sy ny ankohonany androany, dia hifalianareo anie i Abimelèka ary hifaliany anie ianareo! '
  '2':
  - type: text
    content: –Mba anontanio ny mponina rehetra eto Sekema ange izay mety aminy kokoa na ny hofehezin’ny fitopolo lahy zanak’i Jerobahala, na ny hofehezin’ny olona iray ihany. Ary tsarovy fa izaho dia isan’ny fianakavianareo.
  '20':
  - type: text
    content: Raha tsy izany kosa, dia aoka hisy afo mivoaka avy amin’i Abimelèka ka handoro anareo mponin’i Sekema sy i Bety-Milao, ary aoka hisy afo mivoaka avy aminareo ka handoro an’i Abimelèka!
  '21':
  - type: text
    content: Taorian’izay dia nitsoaka nandositra nankany Beerà
  - type: note
    content: 'Beerà: tanàna eo amin’ny 15 km ao atsimo atsinanan’ny tendrombohitra Tabôra.'
  - type: text
    content: ' i Jôtama ary nitoetra tany mba hiery an’i Abimelèka rahalahiny.'
  - type: heading
    content: Nikomy tamin’i Abimelèka ny mponin’i Sekema
  '22':
  - type: text
    content: 'Nifehy an’i Israely nandritra ny telo taona i Abimelèka. '
  '23':
  - type: text
    content: 'Taorian’izany, dia nisy fanahy mampikorontana nalefan’Andriamanitra tamin’ny mpanjaka sy tamin’ny mponin’i Sekema ka nikomy tamin’i Abimelèka ireo Sekemita. '
  '24':
  - type: text
    content: 'Izany no ho valin’ny herisetra nataon’i Abimelèka tamin’ny fitopolo lahy zanak’i Jerobahala sy ho todin’ny ran’ny rahalahiny izay novonoiny, sady hamaliana ireo mponin’i Sekema izay niara-nitsikombakomba taminy. '
  '25':
  - type: text
    content: Mba hamelezana an’i Abimelèka, dia nisy mpisakan-dalana napetraky ny Sekemita teo an-tampon-kavoana akaikin’ny tanàna ka izay rehetra nandalo tamin’izany lalana izany, dia norobainy avokoa
  - type: note
    content: Ireny mpisakan-dalana ireny dia tsy ahazoan’i Abimelèka mandray haba amin’ny entana mandalo ao Sekema.
  - type: text
    content: . Koa nampandrenesina izany i Abimelèka.
  '26':
  - type: text
    content: 'Indray andro dia tonga tao Sekema i Gahala zanakalahin’i Hebeda, sy ireo rahalahiny; ary nametraka fitokiana taminy ny mponin’i Sekema. '
  '27':
  - type: text
    content: 'Nandeha nioty voaloboka tany an-tsaha ny Sekemita, ary nanosihosy voaloboka, dia nanomana fety. Nankany amin’ny tempolin’ny andriamaniny izy ary nisotro sy nihinana sady nanozona an’i Abimelèka. '
  '28':
  - type: text
    content: 'Ary i Gahala nanontany azy ireo hoe:'
  - type: text
    content: –Fa iza moa isika eto Sekema no hanaiky hanjakan’i Abimelèka? Ary mba iza moa izy fa tsy zanakalahin’i Jerobahala ary tsy i Zebola ve no nampitondrainy ny tanàna? Koa aoka ianareo tsy hivadika amin’ireo taranak’i Hamôra, ilay mpanorina an’i Sekema
  - type: note
    content: 'I Hamôra, ilay mpanorina an’i Sekema: jereo Gen 33.19.'
  - type: text
    content: '! Tsy misy antony tokony hanompoantsika an’i Abimelèka akory. '
  '29':
  - type: text
    content: Enga anie ka ho eo ambony fahefàko ny vahoaka sekemita, dia haongako i Abimelèka!
  - type: text
    content: 'Avy eo i Gahala dia nanao tamin’i Abimelèka hoe:'
  - type: text
    content: –Hamaroy ny tafikao, ka mivoaha hiady amiko!
  '3':
  - type: text
    content: 'Dia lasa ireto anadahin-drenin’i Abimelèka namerina izany teny rehetra izany tamin’ireo mponin’i Sekema. Koa nanapa-kevitra ireo fa homba an’i Abimelèka satria havany ihany izy. '
  '30':
  - type: text
    content: 'Ary nony ren’i Zebola governoran’ny tanàna ireo tenin’i Gahala zanakalahin’i Hebeda, dia tezitra izy. '
  '31':
  - type: text
    content: 'Koa nandefa iraka miafina ho any amin’i Abimelèka izy hanao hoe:'
  - type: text
    content: '–Indro tonga eto Sekema i Gahala, zanakalahin’i Hebeda, sy ireo rahalahiny ka manainga ny eto an-tanàna hikomy aminao. '
  '32':
  - type: text
    content: 'Koa izao anio alina izao ihany dia miaingà ianao sy ny tafikao ka miafena any an-tsaha. '
  '33':
  - type: text
    content: Ary rahampitso maraina, vao miposaka ny masoandro, dia tongava hanafika ny tanàna; ka rehefa mivoaka hifanehatra aminao i Gahala sy ny olona mpomba azy dia ataovy araka ny tokony hafitsokao aminy.
  '34':
  - type: text
    content: 'Dia niainga i Abimelèka sy ny tafika manontolo mpomba azy nony alina, ka nizara ho antokony efatra ary nandeha niafina tao akaikin’i Sekema. '
  '35':
  - type: text
    content: 'Ary rehefa nivoaka ny tanàna i Gahala ary nijoro teo anoloan’ny vavahady, dia nipoitra avy tao amin’ny toerana niafenany i Abimelèka sy ny antokon-tafika niaraka taminy. '
  '36':
  - type: text
    content: 'Nahita ireo i Gahala ka nanao tamin’i Zebola hoe:'
  - type: text
    content: –Jereonao fa misy tafika midina avy ao an-tampon-kavoana.
  - type: text
    content: 'Dia novalian’i Zebola hoe:'
  - type: text
    content: –Tsia fa aloky ny havoana no heverinao ho olona!
  '37':
  - type: text
    content: 'Nanamafy kosa i Gahala hoe:'
  - type: text
    content: –Jereonao fa tafika mihitsy ireny midina avy amin’ny havoana afovoany ireny, ary misy antokony iray hafa koa avy amin’ny lalana mihazo ny Terebintan’ny Mpanandro
  - type: note
    content: Ny hoe Terebintan’ny Mpanandro dia toa anarana hafa, fiantsoana ny Oakan’i More (Gen 12.6; Deot 11.30)
  - type: text
    content: .
  '38':
  - type: text
    content: 'Dia namaly azy indray i Zebola hoe:'
  - type: text
    content: '–Aiza amin’izay ity vavanao nilaza taminay hoe: «Iza moa i Abimelèka no hotompointsika?» Ka tsy ireo ve ny tafika novingavingainao? Koa miaingà ianao ankehitriny hiady aminy!'
  '39':
  - type: text
    content: 'Dia nivoaka ny tanàna i Gahala nitarika ny mponin’i Sekema, ka niady tamin’i Abimelèka. '
  '4':
  - type: text
    content: 'Ary nanome sekela volafotsy fitopolo avy tao amin’ny rakitry ny tempolin’i '
  - type: text
    content: Bahala
  - type: text
    content: -Berita
  - type: note
    content: Jereo 8.33.
  - type: text
    content: ' ho an’i Abimelèka izy. Izany vola izany no hividianan’i Abimelèka ireo olom-poana sy marivo salosana hanaraka azy.'
  '40':
  - type: text
    content: 'Ary voatery nandositra izy fa nenjehin’i Abimelèka. Maro ireo maty niampatrampatra mandra-pahatongany teny am-bavahadin’ny tanàna. '
  '41':
  - type: text
    content: Ary i Abimelèka dia nandeha nipetraka tao Aromà
  - type: note
    content: 'Aromà: tanàna eo amin’ny 14 km atsimo atsinanan’i Sekema.'
  - type: text
    content: ; fa i Zebola kosa nandroaka an’i Gahala sy ny rahalahiny tao Sekema mba tsy honina ao intsony.
  '42':
  - type: text
    content: 'Ny ampitson’iny, dia niomana ho any an-tsaha ny mponina tao Sekema, ka nampandrenesina izany i Abimelèka. '
  '43':
  - type: text
    content: 'Dia nalain’i Abimelèka ny tafiny ka nozarainy ho antokony telo, dia niafina tany an-tsaha izy. Ary rehefa hitany fa indreny ny olona nivoaka avy tao Sekema, dia nipoitra hamely azy izy. '
  '44':
  - type: text
    content: 'Ary i Abimelèka sy ny antokony niaraka taminy dia niroatra naka toerana teo ambavahadin’ny tanàna, fa ireo antokony roa hafa kosa niroatra tamin’ireo olona tany an-tsaha ka nandringana azy. '
  '45':
  - type: text
    content: Nanohy ny ady tao an-tanàna i Abimelèka ny tontolo andro ka nahazo ny tanàna sy nandringana ny olona rehetra tao; dia noravany ny tanàna ary nofafazany sira ilay toerana.
  '46':
  - type: text
    content: Ary rehefa ren’ny mponina rehetra tao Migdala-Sekema izany, dia niditra tao amin’ny efitrano fierena tao ambanin’ny tempolin’i Bahala-Berita
  - type: note
    content: 'Migdala-Sekema (na hoe Tilikambon’i Sekema) dia toa izay voalaza hoe Bety-Milao etsy aloha ihany, jereo 9.6. –Bahala-Berita: jereo 8.33 sy nta.'
  - type: text
    content: ' izy. '
  '47':
  - type: text
    content: 'Ary nisy nampandre an’i Abimelèka fa tafangona miafina ao ny mponina rehetra tao Migdala-Sekema. '
  '48':
  - type: text
    content: Dia niakatra nankany an-tendrombohitra Tsalmôna
  - type: note
    content: Ny Tendrombohitra Tsalmôna dia angamba manondro ny lafiny anankiray amin’ny tendrombohitra Hebala (jereo Deot 11.29 sy nta).
  - type: text
    content: ' i Abimelèka sy ny tafika manontolo nomba azy. Ary naka famaky izy, dia nikapa sampan-kazo ka nobetainy izany ary napetrany teo an-tsorony; dia nasainy nanao tahaka izany haingana koa ny tafiny. '
  '49':
  - type: text
    content: Koa samy nikapa sampan-kazo iray avy ny miaramilany rehetra ary nanaraka an’i Abimelèka. Ary nentiny ny sampan-kazo ka natobiny teo anilan’ilay efitrano fierena, dia nodorany io mbamin’izay rehetra tao anatiny. Izany no nahafaty ny mponina rehetra tao Migdala-Sekema, dia lehilahy sy vehivavy tokony ho arivo.
  - type: heading
    content: Ny nahafatesan’i Abimelèka
  '5':
  - type: text
    content: 'Ary tonga tao an-tranon-drainy tao Hôfrà i Abimelèka ka namono ny rahalahiny fitopolo lahy zanak’i Jerobahala teo ambony vatolampy iray ihany. I Jôtama, ilay kely indrindra tamin’ireo ihany, no sisa afaka satria niery izy. '
  '50':
  - type: text
    content: Avy eo dia nankany Tebetsa
  - type: note
    content: 'Tebetsa: tanàna eo amin’ny kilaometatra vitsivitsy ao avaratra atsinanan’i Sekema.'
  - type: text
    content: ' i Abimelèka, ary nanao fahirano ny tanàna ka nahazo azy. '
  '51':
  - type: text
    content: 'Nisy tilikambo fiambenana mafy tao afovoan-tanàna, koa nandeha nialoka tao avokoa ny mponina rehetra na lahy na vavy mbamin’ireo lehiben’ny tanàna: nohidiany ny varavarana ary niakatra teny an-tampon-trano izy rehetra. '
  '52':
  - type: text
    content: 'Ary tonga hatrany amin’ny tilikambo i Abimelèka mba hamely izany; dia nanatona teo am-baravarana izy mba handoro ilay tilikambo. '
  '53':
  - type: text
    content: 'Kanjo nisy vehivavy iray nanjera vato lehibe iray teo an-dohany ka nahavaky ny karandohany. '
  '54':
  - type: text
    content: 'Dia nantsoin’i Abimelèka faingana ilay tovolahy mpitondra ny fiadiany ary nodidiany hoe:'
  - type: text
    content: –Raiso ny sabatrao ka vonoy aho, fandrao holazain’ny olona hoe vehivavy no nahafaty ahy.
  - type: text
    content: 'Dia notrobaran’ilay tovolahy tamin’ny sabatra i Abimelèka ka maty. '
  '55':
  - type: text
    content: Ary rehefa hitan’ny vatan-dehilahy israelita fa maty i Abimelèka, dia samy nody any amin’ny fonenany avy izy.
  '56':
  - type: text
    content: 'Toy izany no namalian’Andriamanitra an’i Abimelèka noho ny ratsy nataony tamin’ny rainy fony izy namono nahafaty ireo rahalahiny fitopolo. '
  '57':
  - type: text
    content: Novalian’Andriamanitra toy izany koa ny mponin’i Sekema ka natsingeriny teo an-dohany ny ratsy rehetra nataony, ary tanteraka taminy ireo ozona nambaran’i Jôtama, zanakalahin’i Jerobahala
  - type: note
    content: Jereo 9.20.
  - type: text
    content: .
  '6':
  - type: text
    content: Dia nivory avokoa ny mponin’i Sekema sy ny olona rehetra tao Bety-Milao ka nankeo amin’ny terebinta tao Sekema, teo anilan’ny tsangambato, mba hanangana an’i Abimelèka ho mpanjakany
  - type: note
    content: 'Bety-Milao: toa manondro ny faritra ambony eo amin’ny tanàna Sekema. Ny amin’ny Terebinta tao Sekema dia jereo Jos 24.26.'
  - type: text
    content: .
  - type: heading
    content: Ny tantara an’ohatra nataon’i Jôtama
  '7':
  - type: text
    content: Notantaraina tamin’i Jôtama izany. Koa lasa izy nitsangana teo an-tampon’ny tendrombohitra Gerizima
  - type: note
    content: Jereo Deot 11.29 sy nta.
  - type: text
    content: ', dia nanandra-peo ka niantso mafy hoe:'
  - type: text
    content: –Mihainoa ahy ianareo mponin’i Sekema, dia mba hihaino anareo koa Andriamanitra!
  '8':
  - type: text
    content: '«Indray andro dia nanapa-kevitra ny hazo fa hifidy mpanjaka ho azy, ka niteny tamin’ny hazo ôliva hoe: ‹Manjakà aminay ianao!› '
  '9':
  - type: text
    content: 'Fa namaly azy ny hazo ôliva hoe: ‹Dia holaviko ve ny hamokatra diloilo izay anomezam-boninahitra ny andriamanitra sy ny olona, ka handeha hitsingevaheva eny ambonin’ny hazo hafa aho?› '
