document_id: JDG.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga mpanjaka i Abimelèka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I Abimelèka, zanakalahin’i Jerobahala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ao amin’ity toko manontolo ity dia antsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerobahala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gidehôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 6.32.'
    marker-yv: yv-n
  - type: text
    text: ' na Gidehôna, dia nankany Sekema mba hifandinika tamin’ny anadahin-dreniny sy izay rehetra isan’ny fianakavian-dreniny ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: –Mba anontanio ny mponina rehetra eto Sekema ange izay mety aminy kokoa na ny hofehezin’ny fitopolo lahy zanak’i Jerobahala, na ny hofehezin’ny olona iray ihany. Ary tsarovy fa izaho dia isan’ny fianakavianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia lasa ireto anadahin-drenin’i Abimelèka namerina izany teny rehetra izany tamin’ireo mponin’i Sekema. Koa nanapa-kevitra ireo fa homba an’i Abimelèka satria havany ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nanome sekela volafotsy fitopolo avy tao amin’ny rakitry ny tempolin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: -Berita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 8.33.
    marker-yv: yv-n
  - type: text
    text: ' ho an’i Abimelèka izy. Izany vola izany no hividianan’i Abimelèka ireo olom-poana sy marivo salosana hanaraka azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary tonga tao an-tranon-drainy tao Hôfrà i Abimelèka ka namono ny rahalahiny fitopolo lahy zanak’i Jerobahala teo ambony vatolampy iray ihany. I Jôtama, ilay kely indrindra tamin’ireo ihany, no sisa afaka satria niery izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nivory avokoa ny mponin’i Sekema sy ny olona rehetra tao Bety-Milao ka nankeo amin’ny terebinta tao Sekema, teo anilan’ny tsangambato, mba hanangana an’i Abimelèka ho mpanjakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bety-Milao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toa manondro ny faritra ambony eo amin’ny tanàna '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sekema
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Ny amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Terebinta tao Sekema
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia jereo Jos 24.26.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tantara an’ohatra nataon’i Jôtama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Notantaraina tamin’i Jôtama izany. Koa lasa izy nitsangana teo an-tampon’ny tendrombohitra Gerizima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 11.29 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', dia nanandra-peo ka niantso mafy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mihainoa ahy ianareo mponin’i Sekema, dia mba hihaino anareo koa Andriamanitra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Indray andro dia nanapa-kevitra ny hazo fa hifidy mpanjaka ho azy, ka niteny tamin’ny hazo ôliva hoe: ‹Manjakà aminay ianao!› '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa namaly azy ny hazo ôliva hoe: ‹Dia holaviko ve ny hamokatra diloilo izay anomezam-boninahitra ny andriamanitra sy ny olona, ka handeha hitsingevaheva eny ambonin’ny hazo hafa aho?› '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy koa ireo hazo tamin’ny aviavy: ‹Andao ianao hanjaka aminay.› '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa namaly azy ny aviavy hoe: ‹Dia holaviko ve ny hanome voa mamy sy matsiro, ka handeha hitsingevaheva eny ambonin’ny hazo hafa aho?› '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy koa ireo hazo tamin’ny voaloboka: ‹Andao ianao hanjaka aminay.› '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa namaly azy ny voaloboka hoe: ‹Dia holaviko ve ny hamokatra divay izay mahafaly an’Andriamanitra sy ny olona, ka handeha hitsingevaheva eny ambonin’ny hazo hafa aho?› '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Farany, dia ny kirihitra tsilo no nitenenan’ny hazo rehetra hoe: ‹Andao ianao hanjaka aminay.› '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary namaly azy ny kirihitra tsilo hoe: ‹Raha sitrakareo tokoa ny hifidy ahy ho mpanjakanareo, dia avia mipetraka eto ambany alokaloko ianareo! Fa raha tsy hanao izany ianareo, dia aoka hisy afo mivoaka avy amin’ny tsiloko ka handoro hatramin’ny hazo sederan’i Libano'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Libano, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tendrombohitra mitandavana eo avaratr’i Palestinina, dia malaza tamin’ny ala '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sedera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: aza!› »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy ihany i Jôtama hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ankehitriny àry, moa rariny sy hitsiny ve ny nataonareo fony nampanjaka an’i Abimelèka ianareo? Mety ve ny nataonareo tamin’i Jerobahala sy ny ankohonany? Araka ny soa vitany taminareo ve no navalinareo azy? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa niady ho anareo ny raiko ka nanao vy very ny ainy mba hanafaka anareo tamin’ny Midianita; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'nefa androany dia nikomianareo ny ankohonany. Novonoinareo ny zanany fitopolo lahy teo ambony vatolampy iray ihany; ary nampanjakainareo tamin’ny mponin’i Sekema i Abimelèka zanakalahin’ny mpanompovaviny, satria havanareo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa raha tàhiny rariny sy hitsiny ny nataonareo tamin’i Jerobahala sy ny ankohonany androany, dia hifalianareo anie i Abimelèka ary hifaliany anie ianareo! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Raha tsy izany kosa, dia aoka hisy afo mivoaka avy amin’i Abimelèka ka handoro anareo mponin’i Sekema sy i Bety-Milao, ary aoka hisy afo mivoaka avy aminareo ka handoro an’i Abimelèka!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Taorian’izay dia nitsoaka nandositra nankany Beerà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Beerà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eo amin’ny 15 km ao atsimo atsinanan’ny tendrombohitra Tabôra.
    marker-yv: yv-n
  - type: text
    text: ' i Jôtama ary nitoetra tany mba hiery an’i Abimelèka rahalahiny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nikomy tamin’i Abimelèka ny mponin’i Sekema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nifehy an’i Israely nandritra ny telo taona i Abimelèka. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Taorian’izany, dia nisy fanahy mampikorontana nalefan’Andriamanitra tamin’ny mpanjaka sy tamin’ny mponin’i Sekema ka nikomy tamin’i Abimelèka ireo Sekemita. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izany no ho valin’ny herisetra nataon’i Abimelèka tamin’ny fitopolo lahy zanak’i Jerobahala sy ho todin’ny ran’ny rahalahiny izay novonoiny, sady hamaliana ireo mponin’i Sekema izay niara-nitsikombakomba taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mba hamelezana an’i Abimelèka, dia nisy mpisakan-dalana napetraky ny Sekemita teo an-tampon-kavoana akaikin’ny tanàna ka izay rehetra nandalo tamin’izany lalana izany, dia norobainy avokoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireny mpisakan-dalana ireny dia tsy ahazoan’i Abimelèka mandray haba amin’ny entana mandalo ao Sekema.
    marker-yv: yv-n
  - type: text
    text: . Koa nampandrenesina izany i Abimelèka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Indray andro dia tonga tao Sekema i Gahala zanakalahin’i Hebeda, sy ireo rahalahiny; ary nametraka fitokiana taminy ny mponin’i Sekema. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nandeha nioty voaloboka tany an-tsaha ny Sekemita, ary nanosihosy voaloboka, dia nanomana fety. Nankany amin’ny tempolin’ny andriamaniny izy ary nisotro sy nihinana sady nanozona an’i Abimelèka. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary i Gahala nanontany azy ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa iza moa isika eto Sekema no hanaiky hanjakan’i Abimelèka? Ary mba iza moa izy fa tsy zanakalahin’i Jerobahala ary tsy i Zebola ve no nampitondrainy ny tanàna? Koa aoka ianareo tsy hivadika amin’ireo taranak’i Hamôra, ilay mpanorina an’i Sekema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Hamôra, ilay mpanorina an’i Sekema: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 33.19.
    marker-yv: yv-n
  - type: text
    text: '! Tsy misy antony tokony hanompoantsika an’i Abimelèka akory. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Enga anie ka ho eo ambony fahefàko ny vahoaka sekemita, dia haongako i Abimelèka!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Avy eo i Gahala dia nanao tamin’i Abimelèka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hamaroy ny tafikao, ka mivoaha hiady amiko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary nony ren’i Zebola governoran’ny tanàna ireo tenin’i Gahala zanakalahin’i Hebeda, dia tezitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Koa nandefa iraka miafina ho any amin’i Abimelèka izy hanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro tonga eto Sekema i Gahala, zanakalahin’i Hebeda, sy ireo rahalahiny ka manainga ny eto an-tanàna hikomy aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa izao anio alina izao ihany dia miaingà ianao sy ny tafikao ka miafena any an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary rahampitso maraina, vao miposaka ny masoandro, dia tongava hanafika ny tanàna; ka rehefa mivoaka hifanehatra aminao i Gahala sy ny olona mpomba azy dia ataovy araka ny tokony hafitsokao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia niainga i Abimelèka sy ny tafika manontolo mpomba azy nony alina, ka nizara ho antokony efatra ary nandeha niafina tao akaikin’i Sekema. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary rehefa nivoaka ny tanàna i Gahala ary nijoro teo anoloan’ny vavahady, dia nipoitra avy tao amin’ny toerana niafenany i Abimelèka sy ny antokon-tafika niaraka taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nahita ireo i Gahala ka nanao tamin’i Zebola hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Jereonao fa misy tafika midina avy ao an-tampon-kavoana.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’i Zebola hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia fa aloky ny havoana no heverinao ho olona!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nanamafy kosa i Gahala hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Jereonao fa tafika mihitsy ireny midina avy amin’ny havoana afovoany ireny, ary misy antokony iray hafa koa avy amin’ny lalana mihazo ny Terebintan’ny Mpanandro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Terebintan’ny Mpanandro
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia toa anarana hafa, fiantsoana ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Oakan’i More
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (Gen 12.6; Deot 11.30)'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia namaly azy indray i Zebola hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aiza amin’izay ity vavanao nilaza taminay hoe: «Iza moa i Abimelèka no hotompointsika?» Ka tsy ireo ve ny tafika novingavingainao? Koa miaingà ianao ankehitriny hiady aminy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia nivoaka ny tanàna i Gahala nitarika ny mponin’i Sekema, ka niady tamin’i Abimelèka. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary voatery nandositra izy fa nenjehin’i Abimelèka. Maro ireo maty niampatrampatra mandra-pahatongany teny am-bavahadin’ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary i Abimelèka dia nandeha nipetraka tao Aromà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.41 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Aromà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tanàna eo amin’ny 14 km atsimo atsinanan’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sekema
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ; fa i Zebola kosa nandroaka an’i Gahala sy ny rahalahiny tao Sekema mba tsy honina ao intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ny ampitson’iny, dia niomana ho any an-tsaha ny mponina tao Sekema, ka nampandrenesina izany i Abimelèka. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia nalain’i Abimelèka ny tafiny ka nozarainy ho antokony telo, dia niafina tany an-tsaha izy. Ary rehefa hitany fa indreny ny olona nivoaka avy tao Sekema, dia nipoitra hamely azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary i Abimelèka sy ny antokony niaraka taminy dia niroatra naka toerana teo ambavahadin’ny tanàna, fa ireo antokony roa hafa kosa niroatra tamin’ireo olona tany an-tsaha ka nandringana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Nanohy ny ady tao an-tanàna i Abimelèka ny tontolo andro ka nahazo ny tanàna sy nandringana ny olona rehetra tao; dia noravany ny tanàna ary nofafazany sira ilay toerana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ary rehefa ren’ny mponina rehetra tao Migdala-Sekema izany, dia niditra tao amin’ny efitrano fierena tao ambanin’ny tempolin’i Bahala-Berita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.46 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Migdala-Sekema '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (na hoe Tilikambon’i Sekema) dia toa izay voalaza hoe Bety-Milao etsy aloha ihany, jereo 9.6. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bahala-Berita:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 8.33 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' izy. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary nisy nampandre an’i Abimelèka fa tafangona miafina ao ny mponina rehetra tao Migdala-Sekema. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Dia niakatra nankany an-tendrombohitra Tsalmôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tendrombohitra Tsalmôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia angamba manondro ny lafiny anankiray amin’ny tendrombohitra Hebala (jereo Deot 11.29 sy nta).'
    marker-yv: yv-n
  - type: text
    text: ' i Abimelèka sy ny tafika manontolo nomba azy. Ary naka famaky izy, dia nikapa sampan-kazo ka nobetainy izany ary napetrany teo an-tsorony; dia nasainy nanao tahaka izany haingana koa ny tafiny. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Koa samy nikapa sampan-kazo iray avy ny miaramilany rehetra ary nanaraka an’i Abimelèka. Ary nentiny ny sampan-kazo ka natobiny teo anilan’ilay efitrano fierena, dia nodorany io mbamin’izay rehetra tao anatiny. Izany no nahafaty ny mponina rehetra tao Migdala-Sekema, dia lehilahy sy vehivavy tokony ho arivo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Abimelèka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Avy eo dia nankany Tebetsa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.50 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tebetsa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eo amin’ny kilaometatra vitsivitsy ao avaratra atsinanan’i Sekema.
    marker-yv: yv-n
  - type: text
    text: ' i Abimelèka, ary nanao fahirano ny tanàna ka nahazo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Nisy tilikambo fiambenana mafy tao afovoan-tanàna, koa nandeha nialoka tao avokoa ny mponina rehetra na lahy na vavy mbamin’ireo lehiben’ny tanàna: nohidiany ny varavarana ary niakatra teny an-tampon-trano izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary tonga hatrany amin’ny tilikambo i Abimelèka mba hamely izany; dia nanatona teo am-baravarana izy mba handoro ilay tilikambo. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Kanjo nisy vehivavy iray nanjera vato lehibe iray teo an-dohany ka nahavaky ny karandohany. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Dia nantsoin’i Abimelèka faingana ilay tovolahy mpitondra ny fiadiany ary nodidiany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raiso ny sabatrao ka vonoy aho, fandrao holazain’ny olona hoe vehivavy no nahafaty ahy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia notrobaran’ilay tovolahy tamin’ny sabatra i Abimelèka ka maty. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Ary rehefa hitan’ny vatan-dehilahy israelita fa maty i Abimelèka, dia samy nody any amin’ny fonenany avy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Toy izany no namalian’Andriamanitra an’i Abimelèka noho ny ratsy nataony tamin’ny rainy fony izy namono nahafaty ireo rahalahiny fitopolo. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Novalian’Andriamanitra toy izany koa ny mponin’i Sekema ka natsingeriny teo an-dohany ny ratsy rehetra nataony, ary tanteraka taminy ireo ozona nambaran’i Jôtama, zanakalahin’i Jerobahala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.57 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 9.20.
    marker-yv: yv-n
  - type: text
    text: .
