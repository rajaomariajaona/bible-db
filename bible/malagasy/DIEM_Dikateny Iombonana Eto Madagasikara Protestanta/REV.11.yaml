document_id: REV.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vavolombelona roa mpitondra ny hafatr’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nomena volotara tahaka ny tehina fandrefesana aho, dia nilazana hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mitsangàna, ka refeso ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoli
    - type: text
      text: 'n’Andriamanitra sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' ary isao izay mivavaka ao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Ezek 40.3; Za 2.5-6.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mifaly sy miravo ary mifanatitra fanomezana ny mponina ambonin’ny tany noho ny nahafatesan’ireo, fa nampiferinaina ny mponina ambonin’ny tany ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' roa ireo.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Taorian’ny telo andro sy tapany, dia nisy fofonaina avy tamin’Andriamanitra niditra tao anatin’ireo faty ireo, ary nampijoro azy tamin’ny tongony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Ezek 37.5, 10.
      marker-yv: yv-n
    - type: text
      text: '; ka raiki-tahotra mafy izay olona nahita azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nahare feo mahery avy tany an-danitra ireo mpaminany roa ireo, nanao taminy hoe: «Miakara atỳ!» Dia niakatra ho any an-danitra tao anatin’ny rahona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2 Mp 2.11.
      marker-yv: yv-n
    - type: text
      text: ' ireo, ary nahatazana azy ny fahavalony. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tamin’izay fotoana izay dia nisy horohorontany mafy ka nirodana ny ampahafolon’ilay tanàna ary olona fito arivo no matin’io horohorontany io. Raiki-tahotra ny olona sisa ka nanome voninahitra an’ilay Andriamanitra monina ao an-danitra.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Lasa izay ny loza faharoa; indro hisosoka faingana ny loza fahatelo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny trompetra fahafito
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nitsoka trompetra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' fahafito, ka nisy feo mahery tany an-danitra nanao hoe: «Efa lasan’ny Tompontsika sy ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesiany
    - type: text
      text: ' ny fanjakana amin’izao tontolo izao, ka ho fanjakana maharitra mandrakizay izany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 15.18; Dan 2.44; 7.14, 27.
      marker-yv: yv-n
    - type: text
      text: '!» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' 24 izay samy mipetraka eo ambony sezafiandrianany eo anatrehan’Andriamanitra, dia niankohoka nitsaoka an’Andriamanitra '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'sady nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Misaotra Anao izahay, ry Tompo Andriamanitra Tsitoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay ankehitriny sy taloha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho Ianao naneho ny herinao lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary noho Ianao efa manjaka.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tezitra ireo firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'kanefa tonga ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fahatezeranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fotoana hitsaranao ny maty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga ny fotoana hanomezanao valisoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' mpanomponao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny vahoakanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ireo manaja Anao, na kely na lehibe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga ny fotoana hanimbanao izay olona manimba ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 2.1, 5; 115.12-13.
      marker-yv: yv-n
    - type: text
      text: .»
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia novohana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoli
    - type: text
      text: 'n’Andriamanitra any an-danitra, ka niseho teo anatin’ny tempolin’Andriamanitra ilay vata mirakitra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' nataony; ary nisy tselatra sy kotrokorana ary kotro-baratra sy horohorontany mbamin’ny havandra vaventy.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ', ilay eo ivelany, dia avelao ihany fa aza refesina; satria nomena ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' izany, ka hanitsakitsaka ny tanàna masina izy ireo mandritra ny 42 volana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lk 21.24.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary homeko hery ny vavolombelona roa mpanambara Ahy, ka hitondra ny hafatro mandritra ny 1 260 andro sady hitafy gony.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ireo vavolombelona roa ireo no fototr’ôliva anankiroa sy fitoeranjiro anankiroa, izay mijoro eo anatrehan’ilay Tompon’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Za 4.3; 11-14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ka raha misy mitady hanisy ratsy azy ireo, dia misy afo mivoaka avy ao am-bavany handevona ny fahavalony; ary tsy maintsy hovonoina ho faty toy izany izay mitady hanisy ratsy azy ireo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ireo no manam-pahefana hanidy ny lanitra, mba tsy hilatsahan’ny ranonorana mandritra ny andro hampitany ny hafatr’Andriamanitra; sady manam-pahefana amin’ny rano, ka mahova azy ho ra; ary manam-pahefana hamely ny tany amin’ny loza rehetra isaky ny te hanao izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1 Mp 17.1; Eks 7.17-19; 1 Sam 4.8.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary rehefa nahavita fijoroana vavolombelona ireo olona roa ireo, dia hiadian’ilay biby miakatra avy amin’ny hantsambe ary ho resiny sy hataony maty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Dan 7.3, 7, 21.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ka ny fatiny dia hiampatra eny an-dalamben’ilay tanàna lehibe; io tanàna io no nanomboana ny Tompony tamin’ny hazofijaliana sady antsoina koa hoe '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sôdôma
    - type: text
      text: ' na Ejipta araka ny heviny ara-panahy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 1.9-10. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sôdôma:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Gen 18–19.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Vahoaka sy foko ary olona samy hafa fiteny sy firenena maro no misy mijery ny fatin’ireo mandritra ny telo andro sy tapany, sady tsy avela halevina izy. '
