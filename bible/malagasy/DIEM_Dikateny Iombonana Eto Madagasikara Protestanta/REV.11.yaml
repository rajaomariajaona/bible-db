document_id: REV.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vavolombelona roa mpitondra ny hafatr’Andriamanitra
  - type: text
    content: 'Ary nomena volotara tahaka ny tehina fandrefesana aho, dia nilazana hoe:'
  - type: text
    content: '–Mitsangàna, ka refeso ny '
  - type: text
    content: tempoli
  - type: text
    content: 'n’Andriamanitra sy ny '
  - type: text
    content: alitara
  - type: text
    content: ' ary isao izay mivavaka ao'
  - type: note
    content: Ampit Ezek 40.3; Za 2.5-6.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Mifaly sy miravo ary mifanatitra fanomezana ny mponina ambonin’ny tany noho ny nahafatesan’ireo, fa nampiferinaina ny mponina ambonin’ny tany ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' roa ireo.'
  '11':
  - type: text
    content: Taorian’ny telo andro sy tapany, dia nisy fofonaina avy tamin’Andriamanitra niditra tao anatin’ireo faty ireo, ary nampijoro azy tamin’ny tongony
  - type: note
    content: Ampit Ezek 37.5, 10.
  - type: text
    content: '; ka raiki-tahotra mafy izay olona nahita azy. '
  '12':
  - type: text
    content: 'Dia nahare feo mahery avy tany an-danitra ireo mpaminany roa ireo, nanao taminy hoe: «Miakara atỳ!» Dia niakatra ho any an-danitra tao anatin’ny rahona'
  - type: note
    content: Ampit 2 Mp 2.11.
  - type: text
    content: ' ireo, ary nahatazana azy ny fahavalony. '
  '13':
  - type: text
    content: Tamin’izay fotoana izay dia nisy horohorontany mafy ka nirodana ny ampahafolon’ilay tanàna ary olona fito arivo no matin’io horohorontany io. Raiki-tahotra ny olona sisa ka nanome voninahitra an’ilay Andriamanitra monina ao an-danitra.
  '14':
  - type: text
    content: Lasa izay ny loza faharoa; indro hisosoka faingana ny loza fahatelo.
  - type: heading
    content: Ny trompetra fahafito
  '15':
  - type: text
    content: 'Dia nitsoka trompetra ny '
  - type: text
    content: anjely
  - type: text
    content: ' fahafito, ka nisy feo mahery tany an-danitra nanao hoe: «Efa lasan’ny Tompontsika sy ilay '
  - type: text
    content: Mesiany
  - type: text
    content: ' ny fanjakana amin’izao tontolo izao, ka ho fanjakana maharitra mandrakizay izany'
  - type: note
    content: Ampit Eks 15.18; Dan 2.44; 7.14, 27.
  - type: text
    content: '!» '
  '16':
  - type: text
    content: 'Ary ny '
  - type: text
    content: loholona
  - type: text
    content: ' 24 izay samy mipetraka eo ambony sezafiandrianany eo anatrehan’Andriamanitra, dia niankohoka nitsaoka an’Andriamanitra '
  '17':
  - type: text
    content: 'sady nanao hoe:'
  - type: text
    content: «Misaotra Anao izahay, ry Tompo Andriamanitra Tsitoha,
  - type: text
    content: Ilay ankehitriny sy taloha,
  - type: text
    content: noho Ianao naneho ny herinao lehibe
  - type: text
    content: ary noho Ianao efa manjaka.
  '18':
  - type: text
    content: Tezitra ireo firenena,
  - type: text
    content: 'kanefa tonga ny '
  - type: text
    content: fahatezeranao
  - type: text
    content: sy ny fotoana hitsaranao ny maty;
  - type: text
    content: tonga ny fotoana hanomezanao valisoa
  - type: text
    content: 'ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' mpanomponao'
  - type: text
    content: sy ny vahoakanao
  - type: text
    content: mbamin’ireo manaja Anao, na kely na lehibe;
  - type: text
    content: tonga ny fotoana hanimbanao izay olona manimba ny tany
  - type: note
    content: Ampit Sal 2.1, 5; 115.12-13.
  - type: text
    content: .»
  '19':
  - type: text
    content: 'Dia novohana ny '
  - type: text
    content: tempoli
  - type: text
    content: 'n’Andriamanitra any an-danitra, ka niseho teo anatin’ny tempolin’Andriamanitra ilay vata mirakitra ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataony; ary nisy tselatra sy kotrokorana ary kotro-baratra sy horohorontany mbamin’ny havandra vaventy.'
  '2':
  - type: text
    content: 'Ny '
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ', ilay eo ivelany, dia avelao ihany fa aza refesina; satria nomena ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' izany, ka hanitsakitsaka ny tanàna masina izy ireo mandritra ny 42 volana'
  - type: note
    content: Ampit Lk 21.24.
  - type: text
    content: '. '
  '3':
  - type: text
    content: Ary homeko hery ny vavolombelona roa mpanambara Ahy, ka hitondra ny hafatro mandritra ny 1 260 andro sady hitafy gony.
  '4':
  - type: text
    content: Ireo vavolombelona roa ireo no fototr’ôliva anankiroa sy fitoeranjiro anankiroa, izay mijoro eo anatrehan’ilay Tompon’ny tany
  - type: note
    content: Ampit Za 4.3; 11-14.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ka raha misy mitady hanisy ratsy azy ireo, dia misy afo mivoaka avy ao am-bavany handevona ny fahavalony; ary tsy maintsy hovonoina ho faty toy izany izay mitady hanisy ratsy azy ireo. '
  '6':
  - type: text
    content: Ireo no manam-pahefana hanidy ny lanitra, mba tsy hilatsahan’ny ranonorana mandritra ny andro hampitany ny hafatr’Andriamanitra; sady manam-pahefana amin’ny rano, ka mahova azy ho ra; ary manam-pahefana hamely ny tany amin’ny loza rehetra isaky ny te hanao izany
  - type: note
    content: Ampit 1 Mp 17.1; Eks 7.17-19; 1 Sam 4.8.
  - type: text
    content: .
  '7':
  - type: text
    content: Ary rehefa nahavita fijoroana vavolombelona ireo olona roa ireo, dia hiadian’ilay biby miakatra avy amin’ny hantsambe ary ho resiny sy hataony maty
  - type: note
    content: Ampit Dan 7.3, 7, 21.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ka ny fatiny dia hiampatra eny an-dalamben’ilay tanàna lehibe; io tanàna io no nanomboana ny Tompony tamin’ny hazofijaliana sady antsoina koa hoe '
  - type: text
    content: Sôdôma
  - type: text
    content: ' na Ejipta araka ny heviny ara-panahy'
  - type: note
    content: 'Ampit Is 1.9-10. –Sôdôma: jereo Gen 18–19.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Vahoaka sy foko ary olona samy hafa fiteny sy firenena maro no misy mijery ny fatin’ireo mandritra ny telo andro sy tapany, sady tsy avela halevina izy. '
