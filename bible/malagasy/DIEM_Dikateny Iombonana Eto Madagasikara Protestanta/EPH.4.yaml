        text: Zanak’Andriamanitra
    - type: text
      text: '; ka ho olondehibe isika, mahatratra ny halehiben’i Kristy sy heniky ny hafenoana omeny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tsy ho zaza intsony isika, tsy ho toy ny sambokely ahilangilan’ny onja etsy sy eroa na hatolatolan’ny rivotra samihafa, ka ho voafitaky ny fampianarana aroson’ny olona mpamitaka, izay mahay mamorona tetika hampivaona ny sasany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fitiavana kosa no hanambaràntsika ny fampianarana marina ka amin’ny lafiny rehetra anie no hitomboantsika firaisana amin’i Kristy Izay loha. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy no mahatonga ny tena manontolo hitambatra mafy sy ho voatanan’ny famavàny rehetra hiray; ka rehefa samy miasa araka ny tandrifiny avy ny zavatra anisan’ny tena, dia hitombo ny tena manontolo sady hoentanin’ny fitiavana.
  - type: usfm
    marker: s1
