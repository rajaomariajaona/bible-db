document_id: EPH.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Iray ny tena
  - type: text
    content: 'Koa mangataka aminareo aho, dia izaho izay migadra noho ny amin’ny Tompo: manàna fitondrantena mendrika ny fiantsoan’Andriamanitra anareo. '
  '10':
  - type: text
    content: 'Ilay nidina ihany ho Ilay niakatra any amin’ny lanitra faratampony indrindra, mba hanerana izao rehetra izao. '
  '11':
  - type: text
    content: 'Izy mihitsy no nanolotra fanomezana manokana ho an’ny olona, ka nanao ny sasany ho '
  - type: text
    content: apôstôly
  - type: text
    content: ', ny sasany ho '
  - type: text
    content: mpaminany
  - type: text
    content: ', ny sasany ho mpitory ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ', ny sasany ho '
  - type: text
    content: mpiandry
  - type: text
    content: ' sy ho mpampianatra'
  - type: note
    content: Ampit 1Kôr 12.28.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Ho fampitaovana ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' ireny mba hahatontosana ny asa fanompoam-piangonana, ka hirafetan’ny tenan’i Kristy. '
  '13':
  - type: text
    content: 'Izany no hahatonga antsika rehetra hiray amin’ny finoana sy amin’ny fahalalana tsara ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: '; ka ho olondehibe isika, mahatratra ny halehiben’i Kristy sy heniky ny hafenoana omeny. '
  '14':
  - type: text
    content: 'Dia tsy ho zaza intsony isika, tsy ho toy ny sambokely ahilangilan’ny onja etsy sy eroa na hatolatolan’ny rivotra samihafa, ka ho voafitaky ny fampianarana aroson’ny olona mpamitaka, izay mahay mamorona tetika hampivaona ny sasany. '
  '15':
  - type: text
    content: 'Ny fitiavana kosa no hanambaràntsika ny fampianarana marina ka amin’ny lafiny rehetra anie no hitomboantsika firaisana amin’i Kristy Izay loha. '
  '16':
  - type: text
    content: Izy no mahatonga ny tena manontolo hitambatra mafy sy ho voatanan’ny famavàny rehetra hiray; ka rehefa samy miasa araka ny tandrifiny avy ny zavatra anisan’ny tena, dia hitombo ny tena manontolo sady hoentanin’ny fitiavana.
  - type: heading
    content: Ny fiainam-baovao ao amin’i Kristy
  '17':
  - type: text
    content: 'Koa dia izao no lazaiko sy ambarako noho izaho tafaray amin’ny Tompo: aza atao intsony ny fomba fiainan’ny mpanompo sampy, izay manaraka ny hevi-poanany '
  '18':
  - type: text
    content: 'sady maizin-tsaina. Olon-ko azy amin’ny fiainam-baovao omen’Andriamanitra ireny, satria tena tsy mahalala sady mafy fo tokoa; '
  '19':
  - type: text
    content: efa lany henatra mihitsy, ka mivarilavo amin’ny fihetsika tsy maotina sady revo manaram-po amin’ny fahalotoana isan-karazany.
  '2':
  - type: text
    content: 'Manetre tena lalandava, aoka halemy fanahy sady hahari-po. Mifandefera amim-pitiavana. '
  '20':
  - type: text
    content: 'Tsy mba toy izany kosa no nianaranareo an’i '
  - type: text
    content: Kristy
  - type: text
    content: '! '
  '21':
  - type: text
    content: 'Fa efa nandre ny aminy tokoa ianareo ary efa norosoana ny fampianarana marina ao amin’i Jesoa, araka ny maha kristianina anareo. '
  '22':
  - type: text
    content: 'Noho izany aoka hialanareo ny toetrareo taloha nifandraika tamin’ny fitondrantenanareo fahiny, dia ilay toetra mihasimba noho ny fitaky ny filàndratsy. '
  '23':
  - type: text
    content: 'Aoka hohavaozina tanteraka ny fanahinareo sy ny sainareo; '
  '24':
  - type: text
    content: ary aoka ianareo hitafy ny toetra vaovao, dia ilay toetra noarîna araka an’Andriamanitra
  - type: note
    content: Ampit Gen 1.26-27.
  - type: text
    content: ', ka asehon’ny fiainana mandala rariny sy masina vokatry ny fampianarana marina.'
  '25':
  - type: text
    content: Noho izany, ialao ny lainga; aoka samy hilaza ny marina amin’ny namany avy
  - type: note
    content: Jereo Za 8.16.
  - type: text
    content: ', fa isika rehetra dia samy anisan’ny tena iray ihany ka mifampiankina. '
  '26':
  - type: text
    content: Raha sendra tezitra ianareo, dia aza manota
  - type: note
    content: Ahatsiarovana ny Sal 4.5 araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: ': aoka tsy ho tratry ny masoandro milentika ny fahatezeranareo. '
  '27':
  - type: text
    content: 'Aza omen-toerana ny '
  - type: text
    content: devoly
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Izay nangalatra, aoka tsy hangalatra intsony; fa aleo mikely aina manao zavatra tsara, mba hisy homeny izay sahirana. '
  '29':
  - type: text
    content: 'Aoka tsy hisy teny maloto aloaky ny vavanareo; fa mba teny mahasoa atao, hampandrosoana ny olona amin’ny finoana araka izay sahaza azy, ka hitondra soa ho an’izay mandre. '
  '3':
  - type: text
    content: 'Aoka ny fihavanana no hifamatoranareo, dia hazoto mitana ny firaisana avy amin’ny Fanahy Masina ianareo. '
  '30':
  - type: text
    content: Aza mampalahelo ny Fanahy Masin’Andriamanitra
  - type: note
    content: Ampit Is 63.10.
  - type: text
    content: ' ianareo fa ny Fanahy Masina no tombokase nahatonga anareo ho fananan’Andriamanitra, mba ho tody amin’ny andro hanavotana tanteraka anareo. '
  '31':
  - type: text
    content: 'Aoka ianareo tsy ho mpanao an-dolompo, tsy ho vinitra, tsy ho mora tezitra, tsy ho avo vava, tsy hanevateva: esory lavitra anareo avokoa izany, miaraka amin’ny haratsiam-panahy isan-karazany. '
  '32':
  - type: text
    content: Fa aoka samy ho mora fo sy antra amin’ny namany avy ianareo; mifamelà heloka, tahaka ny namelan’Andriamanitra heloka anareo noho ianareo miray amin’i Kristy
  - type: note
    content: 'Ampit Mt 6.12, 14. –namelan’Andriamanitra heloka anareo: misy stf sasany ahitana hoe namelan’Andriamanitra heloka antsika.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Iray ny tena ary iray ny Fanahy, toy ny maha iray ny fanantenana niantsoan’Andriamanitra anareo. '
  '5':
  - type: text
    content: 'Iray ny Tompo, iray ny finoana, iray ny '
  - type: text
    content: batisa
  - type: text
    content: '; '
  '6':
  - type: text
    content: iray Andriamanitra sady Rain’ny kristianina rehetra, manjaka amin’izy rehetra, miasa amin’ny alalan’izy rehetra ary mitoetra ao amin’izy rehetra.
  '7':
  - type: text
    content: 'Kanefa isika tsirairay avy dia samy nahazo fanomezana manokana arakaraka izay nomen’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Izany no ilazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: «Raha miakatra any amin’ny avo Izy,
  - type: text
    content: dia nitondra babo marobe,
  - type: text
    content: ka nanome fanomezana ho an’ny olona
  - type: note
    content: Jereo Sal 68.19.
  - type: text
    content: .»
  '9':
  - type: text
    content: 'Inona moa no hevitry ny hoe «niakatra Izy», afa-tsy hoe: efa nidina tany amin’ny fanambanin’ny tany lalina indrindra'
  - type: note
    content: 'tany amin’ny fanambanin’ny tany lalina indrindra (fandevenana): dkt hafa tetỳ ambany, izany hoe tetỳ an-tany (fahatongavana ho olombelona).'
  - type: text
    content: ' Izy. '
