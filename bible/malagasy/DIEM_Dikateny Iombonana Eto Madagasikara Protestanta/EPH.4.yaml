  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia izao no lazaiko sy ambarako noho izaho tafaray amin’ny Tompo: aza atao intsony ny fomba fiainan’ny mpanompo sampy, izay manaraka ny hevi-poanany '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady maizin-tsaina. Olon-ko azy amin’ny fiainam-baovao omen’Andriamanitra ireny, satria tena tsy mahalala sady mafy fo tokoa; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: efa lany henatra mihitsy, ka mivarilavo amin’ny fihetsika tsy maotina sady revo manaram-po amin’ny fahalotoana isan-karazany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manetre tena lalandava, aoka halemy fanahy sady hahari-po. Mifandefera amim-pitiavana. '
  '20':
  - type: usfm
    marker: p
    children:
