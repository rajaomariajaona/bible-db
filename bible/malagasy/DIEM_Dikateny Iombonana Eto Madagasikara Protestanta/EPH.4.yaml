  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany aoka hialanareo ny toetrareo taloha nifandraika tamin’ny fitondrantenanareo fahiny, dia ilay toetra mihasimba noho ny fitaky ny filàndratsy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hohavaozina tanteraka ny fanahinareo sy ny sainareo; '
