document_id: GEN.41
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nofin’ny Farao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nony afaka roa taona teo, dia nanonofy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ': Nijoro teo amoron’i Neily hono izy, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary indreo nisy ombivavy fito tsara tarehy sady matavy niakatra avy tao amin’ny ony ka niraoka ahitra teo amoron-drano. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Avy eo dia nisy ombivavy fito hafa ratsy tarehy sady mahia niakatra avy tao amin’ny ony, ka nitsangana teo anilan’ireo matavy teo amoron-drano; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ary ireto ombivavy mahia dia nihinana iretsy matavy. Teo no taitra ny Farao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary renoka indray ny Farao ka nanonofy fanindroany: Indreo nisy salohim-bary fito vokatra be sady tsara amin’ny tahony iray. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Avy eo dia nisy salohim-bary fito manakofa sady main’ny rivotra avy any atsinanana nitrebona taorian’ireo; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ka ireto salohim-bary manakofa dia nitelina iretsy vokatra sady tsara. Dia taitra ny Farao ka nahatsapa fa nanonofy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nony maraina dia nampiantso ny mpimasy sy ny olon-kendry rehetra tao Ejipta ny Farao satria feno tebiteby. Notantarainy tamin’ireo ny nofiny, kanefa tsy nisy nahalaza ny heviny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tamin’izay no niteny tamin’ny Farao ilay lehiben’ny mpandroso zava-pisotro ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tompokolahy ô, tsaroako ankehitriny ny fahadisoako. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Indray mandeha dia tezitra mafy tamin’ny lehiben’ny mpanao mofo sy tamiko mpanomponao ianao, ka nampanao anay an-tranomaizina tao amin’ny lehiben’ny mpiambina. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Samy nanonofy izahay roa lahy indray alina, ary samy nanana ny heviny avy koa ny nofinay. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tao an-tranomaizina niaraka taminay dia nisy zatovolahy hebreo izay nanompo ny lehiben’ny fiambena-mpanjaka. Notantarainay azy ny nofinay, ka nambarany taminay avy ny heviny sy ny dikany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa araka izay efa nambarany taminay tokoa no niseho; niverina ho amin’ny asako aho, ary ilay lehiben’ny mpanao mofo kosa nahantona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nolazain’i Jôsefa ny hevitry ny nofin’ny Farao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nampanantsoin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' i Jôsefa, ka navoaka haingana avy tao an-tranomaizina; dia noharatana ny volom-bavany, nosoloina ny fitafiany ary nentina tany amin’ny Farao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy ny Farao tamin’i Jôsefa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nanonofy aho nefa tsy nisy olona nahalaza ny heviny. Kanefa reko fa ianao, hono, afaka manazava ny hevitry ny nofy izay lazaina aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ka hoy ny navalin’i Jôsefa azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy izaho fa Andriamanitra no afaka hanome azy valiny hampiadana anao, ry Farao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa niteny tamin’i Jôsefa ny Farao nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tao amin’ny nofiko dia hitako nijoro teo amoron’i Neily aho. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary indro nisy ombivavy fito matavy sady tsara tarehy niakatra avy tao amin’ny ony ka niraoka ahitra teny amorony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Avy eo dia nisy ombivavy fito hafa niakatra taorian’ireo ka mahia sady ratsy tarehy sy saozanina. Tsy mbola nahita biby ratsy toy izany aho nanerana ny tany Ejipta manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nohanin’ireto ombivavy fito mahia sady ratsy tarehy ireto ny ombivavy fito matavy izay nialoha azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Kanjo rehefa nihinana ireny izy fito, dia tsy fantatra akory hoe efa ao an-kibony satria mbola ratsy tarehy toy ny teo aloha ihany no fijery azy. Tamin’izay indrindra no taitra aho. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Avy eo dia mbola nanonofy indray aho ka hitako fa nisy salohim-bary fito sady vokatra be no tsara tamin’ny tahony iray. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Manaraka izany dia nisy salohim-bary fito hafa koa nipoitra taorian’ireo ka malazo sady nanakofa ary main’ny rivotra avy any atsinanana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ireto salohim-bary fito manakofa dia nitelina ireo salohim-bary fito vokatra be. Efa notantaraiko tamin’ireo mpimasy izany, kanefa tsy nisy afaka nanazava azy tamiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy i Jôsefa tamin’ny Farao:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Anankiray ihany no hevitr’ireo nofinao roa ireo. Izay efa hataon’Andriamanitra no ambarany aminao, ry Farao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny ombivavy fito tsara tarehy sy ny salohim-bary fito vokatra be dia samy manambara fito taona mahavokatra, ary nofy iray ihany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny ombivavy fito mahia sady ratsy tarehy izay niakatra tafara sy ny salohim-bary fito manakofa sady main’ny rivotra avy any atsinanana dia manambara fito taona koa, saingy fito taona mosarena. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izany, ry Farao, no efa voalazako taminao teo hoe: Izay efa hataon’Andriamanitra no asehony aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Indro hisy fito taona zina tokoa manerana an’i Ejipta manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Avy eo dia hisy taona fito mosarena handimby azy, ka ho hadino ny fahavokarana be nanerana an’i Ejipta fa hamely ny tany kosa ny mosary. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Satria ho mafy loatra ny mosary dia tsy ho fantatra akory izay taon-jina teo aloha. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Niverina indroa taminao ny nofy, satria hentitra ny teny avy amin’Andriamanitra; ary hotanterahiny faingana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa ankehitriny, ry Farao, mijere olona marani-tsaina sady hendry, ka tendreo izy hanam-pahefana amin’ny tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia manendre koa solotena hanangona ny ampahadimin’ny vokatra eto amin’ny tany mandritra ny fito taona zina. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Aoka hangonin’ireo ny sakafo mandritra ny fito taona ho avy, ka hotahiriziny eo ambany fiahianao ny vary ho fiandry any amin’ny isan-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Amin’izay dia hanana tahirin-tsakafo ho amin’ny fito taona mosarena i Ejipta, ka tsy ho fongan’ny mosary ny tany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanjary minisitry ny Farao i Jôsefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Sitraky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' sy ny mpanompony ny soso-kevitr’i Jôsefa, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ka hoy ny Farao tamin’ireo mpanompony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza indray isika no hahita lehilahy manana ny Fanahin’Andriamanitra tahaka ity?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hoy izy tamin’i Jôsefa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Satria nampahafantarin’Andriamanitra anao izany rehetra izany, dia tsy misy olon-kendry sy manan-tsaina toa anao. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Koa ianao no hitantana ny fanjakako, ary ny vahoakako rehetra dia hankato ny baikonao, ka ny maha mpanjaka ahy ihany no maha ambony ahy noho ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Jereo fa efa nomeko anao ny fahefana amin’i Ejipta manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia nesorin’ny Farao teny an-tanany ny peratra maha mpanjaka, ka napetrany teny an-tanan’i Jôsefa, sady nampitafiny akanjo rongony fotsy madinika izy; ary napetrany teny am-bozony ny rojo volamena. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nampitaingeniny teo amin’ny kalesiny faharoa izy; ary ireo mpihazakazaka nialoha azy dia niantsoantso hoe: «Mandohaleha'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.43 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mandohaleha '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: omeo lalana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tandremo!
    marker-yv: yv-n
  - type: text
    text: '!» Toy izany no nanomezan’ny Farao an’i Jôsefa ny fahefana tamin’i Ejipta manontolo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary hoy koa ny Farao tamin’i Jôsefa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho ihany no Farao, kanefa tsy misy olona mahazo mihetsika eran’ny tany Ejipta manontolo, raha tsy mahazo lalana avy aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Avy eo dia nomen’ny Farao anarana hoe Tsafenata-Pahenea i Jôsefa, sady nomeny azy ho vady i Asenata zanakavavin’i Pôtifara, mpisorona tao Ona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.45 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsafenata-Pahenea: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny hevitry ny sasany, io anarana io dia midika hoe «Hoy Andriamanitra, velona izy,» ny hafa kosa dia milaza hoe «Mpamonjy ny fanjakana.» –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ona:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' anaran-tanàna ejiptianina izay nantsoin’ny Grika hoe Heliôpôly, teo akaikin’i «Le Caire», ary nalaza tamin’ny fivavahana amin’ny masoandro.'
    marker-yv: yv-n
  - type: text
    text: '. Dia niainga hisafo ny tany Ejipta manontolo i Jôsefa. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Telopolo taona i Jôsefa raha nentina teo anatrehan’ny Farao, mpanjakan’i Ejipta. Ary niala teo anatrehan’ny Farao izy ka nandeha namakivaky ny tany Ejipta manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Nandritra ny fito taona zina dia namokatra be dia be ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Nangonin’i Jôsefa ny tahirim-bokatra rehetra tany Ejipta nandritra izany fito taona izany ka natobiny tao amin’ny renivohitry ny boriborin-tany ireo tahirim-bokatra rehetra tamin’ny saha manodidina. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Ary nahangona vary be dia be tokoa i Jôsefa, be dia be tahaka ny fasika eny amoron-dranomasina ka tsy hita isa intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Talohan’ny nahatongavan’ny mosary, dia niteraka zaza roa lahy i Asenata vadin’i Jôsefa. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Nantsoin’i Jôsefa hoe Manase ny lahimatoa, fa hoy izy hoe «Nampanadinoin’Andriamanitra ahy ny fahoriako rehetra mbamin’izay rehetra any an-tranon’ny raiko
  - type: usfm
