document_id: GEN.41,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nofin’ny Farao
  - type: text
    content: 'Ary nony afaka roa taona teo, dia nanonofy ny '
  - type: text
    content: Farao
  - type: text
    content: ': Nijoro teo amoron’i Neily hono izy, '
  '10':
  - type: text
    content: 'Indray mandeha dia tezitra mafy tamin’ny lehiben’ny mpanao mofo sy tamiko mpanomponao ianao, ka nampanao anay an-tranomaizina tao amin’ny lehiben’ny mpiambina. '
  '11':
  - type: text
    content: 'Samy nanonofy izahay roa lahy indray alina, ary samy nanana ny heviny avy koa ny nofinay. '
  '12':
  - type: text
    content: Tao an-tranomaizina niaraka taminay dia nisy zatovolahy hebreo izay nanompo ny lehiben’ny fiambena-mpanjaka. Notantarainay azy ny nofinay, ka nambarany taminay avy ny heviny sy ny dikany.
  '13':
  - type: text
    content: Koa araka izay efa nambarany taminay tokoa no niseho; niverina ho amin’ny asako aho, ary ilay lehiben’ny mpanao mofo kosa nahantona.
  - type: heading
    content: Nolazain’i Jôsefa ny hevitry ny nofin’ny Farao
  '14':
  - type: text
    content: 'Dia nampanantsoin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' i Jôsefa, ka navoaka haingana avy tao an-tranomaizina; dia noharatana ny volom-bavany, nosoloina ny fitafiany ary nentina tany amin’ny Farao izy. '
  '15':
  - type: text
    content: 'Dia hoy ny Farao tamin’i Jôsefa:'
  - type: text
    content: –Nanonofy aho nefa tsy nisy olona nahalaza ny heviny. Kanefa reko fa ianao, hono, afaka manazava ny hevitry ny nofy izay lazaina aminao.
  '16':
  - type: text
    content: 'Ka hoy ny navalin’i Jôsefa azy:'
  - type: text
    content: –Tsy izaho fa Andriamanitra no afaka hanome azy valiny hampiadana anao, ry Farao.
  '17':
  - type: text
    content: 'Koa niteny tamin’i Jôsefa ny Farao nanao hoe:'
  - type: text
    content: '–Tao amin’ny nofiko dia hitako nijoro teo amoron’i Neily aho. '
  '18':
  - type: text
    content: 'Ary indro nisy ombivavy fito matavy sady tsara tarehy niakatra avy tao amin’ny ony ka niraoka ahitra teny amorony. '
  '19':
  - type: text
    content: 'Avy eo dia nisy ombivavy fito hafa niakatra taorian’ireo ka mahia sady ratsy tarehy sy saozanina. Tsy mbola nahita biby ratsy toy izany aho nanerana ny tany Ejipta manontolo. '
  '2':
  - type: text
    content: 'ary indreo nisy ombivavy fito tsara tarehy sady matavy niakatra avy tao amin’ny ony ka niraoka ahitra teo amoron-drano. '
  '20':
  - type: text
    content: 'Dia nohanin’ireto ombivavy fito mahia sady ratsy tarehy ireto ny ombivavy fito matavy izay nialoha azy. '
  '21':
  - type: text
    content: 'Kanjo rehefa nihinana ireny izy fito, dia tsy fantatra akory hoe efa ao an-kibony satria mbola ratsy tarehy toy ny teo aloha ihany no fijery azy. Tamin’izay indrindra no taitra aho. '
  '22':
  - type: text
    content: 'Avy eo dia mbola nanonofy indray aho ka hitako fa nisy salohim-bary fito sady vokatra be no tsara tamin’ny tahony iray. '
  '23':
  - type: text
    content: 'Manaraka izany dia nisy salohim-bary fito hafa koa nipoitra taorian’ireo ka malazo sady nanakofa ary main’ny rivotra avy any atsinanana. '
  '24':
  - type: text
    content: Ireto salohim-bary fito manakofa dia nitelina ireo salohim-bary fito vokatra be. Efa notantaraiko tamin’ireo mpimasy izany, kanefa tsy nisy afaka nanazava azy tamiko.
  '25':
  - type: text
    content: 'Dia hoy i Jôsefa tamin’ny Farao:'
  - type: text
    content: '–Anankiray ihany no hevitr’ireo nofinao roa ireo. Izay efa hataon’Andriamanitra no ambarany aminao, ry Farao. '
  '26':
  - type: text
    content: 'Ny ombivavy fito tsara tarehy sy ny salohim-bary fito vokatra be dia samy manambara fito taona mahavokatra, ary nofy iray ihany izany. '
  '27':
  - type: text
    content: 'Ny ombivavy fito mahia sady ratsy tarehy izay niakatra tafara sy ny salohim-bary fito manakofa sady main’ny rivotra avy any atsinanana dia manambara fito taona koa, saingy fito taona mosarena. '
  '28':
  - type: text
    content: 'Izany, ry Farao, no efa voalazako taminao teo hoe: Izay efa hataon’Andriamanitra no asehony aminao. '
  '29':
  - type: text
    content: 'Indro hisy fito taona zina tokoa manerana an’i Ejipta manontolo. '
  '3':
  - type: text
    content: 'Avy eo dia nisy ombivavy fito hafa ratsy tarehy sady mahia niakatra avy tao amin’ny ony, ka nitsangana teo anilan’ireo matavy teo amoron-drano; '
  '30':
  - type: text
    content: 'Avy eo dia hisy taona fito mosarena handimby azy, ka ho hadino ny fahavokarana be nanerana an’i Ejipta fa hamely ny tany kosa ny mosary. '
  '31':
  - type: text
    content: 'Satria ho mafy loatra ny mosary dia tsy ho fantatra akory izay taon-jina teo aloha. '
  '32':
  - type: text
    content: 'Niverina indroa taminao ny nofy, satria hentitra ny teny avy amin’Andriamanitra; ary hotanterahiny faingana izany. '
  '33':
  - type: text
    content: 'Koa ankehitriny, ry Farao, mijere olona marani-tsaina sady hendry, ka tendreo izy hanam-pahefana amin’ny tany Ejipta. '
  '34':
  - type: text
    content: 'Dia manendre koa solotena hanangona ny ampahadimin’ny vokatra eto amin’ny tany mandritra ny fito taona zina. '
  '35':
  - type: text
    content: 'Aoka hangonin’ireo ny sakafo mandritra ny fito taona ho avy, ka hotahiriziny eo ambany fiahianao ny vary ho fiandry any amin’ny isan-tanàna. '
  '36':
  - type: text
    content: Amin’izay dia hanana tahirin-tsakafo ho amin’ny fito taona mosarena i Ejipta, ka tsy ho fongan’ny mosary ny tany.
  - type: heading
    content: Nanjary minisitry ny Farao i Jôsefa
  '37':
  - type: text
    content: 'Sitraky ny '
  - type: text
    content: Farao
  - type: text
    content: ' sy ny mpanompony ny soso-kevitr’i Jôsefa, '
  '38':
  - type: text
    content: 'ka hoy ny Farao tamin’ireo mpanompony:'
  - type: text
    content: –Aiza indray isika no hahita lehilahy manana ny Fanahin’Andriamanitra tahaka ity?
  '39':
  - type: text
    content: 'Dia hoy izy tamin’i Jôsefa:'
  - type: text
    content: '–Satria nampahafantarin’Andriamanitra anao izany rehetra izany, dia tsy misy olon-kendry sy manan-tsaina toa anao. '
  '4':
  - type: text
    content: ary ireto ombivavy mahia dia nihinana iretsy matavy. Teo no taitra ny Farao.
  '40':
  - type: text
    content: 'Koa ianao no hitantana ny fanjakako, ary ny vahoakako rehetra dia hankato ny baikonao, ka ny maha mpanjaka ahy ihany no maha ambony ahy noho ianao. '
  '41':
  - type: text
    content: Jereo fa efa nomeko anao ny fahefana amin’i Ejipta manontolo.
  '42':
  - type: text
    content: 'Dia nesorin’ny Farao teny an-tanany ny peratra maha mpanjaka, ka napetrany teny an-tanan’i Jôsefa, sady nampitafiny akanjo rongony fotsy madinika izy; ary napetrany teny am-bozony ny rojo volamena. '
  '43':
  - type: text
    content: 'Nampitaingeniny teo amin’ny kalesiny faharoa izy; ary ireo mpihazakazaka nialoha azy dia niantsoantso hoe: «Mandohaleha'
  - type: note
    content: 'Mandohaleha dkt hafa: omeo lalana na tandremo!'
  - type: text
    content: '!» Toy izany no nanomezan’ny Farao an’i Jôsefa ny fahefana tamin’i Ejipta manontolo.'
  '44':
  - type: text
    content: 'Ary hoy koa ny Farao tamin’i Jôsefa:'
  - type: text
    content: –Izaho ihany no Farao, kanefa tsy misy olona mahazo mihetsika eran’ny tany Ejipta manontolo, raha tsy mahazo lalana avy aminao.
  '45':
  - type: text
    content: Avy eo dia nomen’ny Farao anarana hoe Tsafenata-Pahenea i Jôsefa, sady nomeny azy ho vady i Asenata zanakavavin’i Pôtifara, mpisorona tao Ona
  - type: note
    content: 'Tsafenata-Pahenea: araka ny hevitry ny sasany, io anarana io dia midika hoe «Hoy Andriamanitra, velona izy,» ny hafa kosa dia milaza hoe «Mpamonjy ny fanjakana.» –Ona: anaran-tanàna ejiptianina izay nantsoin’ny Grika hoe Heliôpôly, teo akaikin’i «Le Caire», ary nalaza tamin’ny fivavahana amin’ny masoandro.'
  - type: text
    content: '. Dia niainga hisafo ny tany Ejipta manontolo i Jôsefa. '
  '46':
  - type: text
    content: 'Telopolo taona i Jôsefa raha nentina teo anatrehan’ny Farao, mpanjakan’i Ejipta. Ary niala teo anatrehan’ny Farao izy ka nandeha namakivaky ny tany Ejipta manontolo. '
  '47':
  - type: text
    content: 'Nandritra ny fito taona zina dia namokatra be dia be ny tany. '
  '48':
  - type: text
    content: 'Nangonin’i Jôsefa ny tahirim-bokatra rehetra tany Ejipta nandritra izany fito taona izany ka natobiny tao amin’ny renivohitry ny boriborin-tany ireo tahirim-bokatra rehetra tamin’ny saha manodidina. '
  '49':
  - type: text
    content: Ary nahangona vary be dia be tokoa i Jôsefa, be dia be tahaka ny fasika eny amoron-dranomasina ka tsy hita isa intsony.
  '5':
  - type: text
    content: 'Ary renoka indray ny Farao ka nanonofy fanindroany: Indreo nisy salohim-bary fito vokatra be sady tsara amin’ny tahony iray. '
  '50':
  - type: text
    content: 'Talohan’ny nahatongavan’ny mosary, dia niteraka zaza roa lahy i Asenata vadin’i Jôsefa. '
  '51':
  - type: text
    content: Nantsoin’i Jôsefa hoe Manase ny lahimatoa, fa hoy izy hoe «Nampanadinoin’Andriamanitra ahy ny fahoriako rehetra mbamin’izay rehetra any an-tranon’ny raiko
  - type: note
    content: Ny anarana hoe Manase amin’ny teny hebreo dia mampahatsiaro ny matoanteny izay nadika hoe Nampanadinoina.
  - type: text
    content: '.» '
  '52':
  - type: text
    content: 'Nantsoiny hoe Efraîma kosa ny faharoa, fa hoy izy hoe: «Andriamanitra efa nampahamaro anaka ahy teto amin’ity tany nijalijaliako ity'
  - type: note
    content: Ny anarana hoe Efraîma amin’ny teny hebreo dia mampahatsiaro ny matoanteny izay nadika hoe mampahamaro anaka.
  - type: text
    content: .»
  '53':
  - type: text
    content: 'Nifarana ny fito taona zina tany Ejipta; '
  '54':
  - type: text
    content: 'ary nanomboka kosa ny fito taona mosarena, araka izay efa voalazan’i Jôsefa. Nihatra tamin’ny tany rehetra ny mosary; fa nanerana an’i Ejipta kosa nisy tahirim-bokatra. '
  '55':
  - type: text
    content: 'Nony nanomboka mosarena ny tany Ejipta manontolo, dia nitaraina sakafo tany amin’ny Farao ny vahoaka; ka hoy ny Farao tamin’ny Ejiptianina rehetra: «Mankanesa any amin’i Jôsefa, ka ataovy izay holazainy aminareo'
  - type: note
    content: 'ataovy izay holazainy aminareo: ampit Jôh 2.5.'
  - type: text
    content: .»
  '56':
  - type: text
    content: 'Ary rehefa nanenika an’i Ejipta manontolo ny mosary, dia nasain’i Jôsefa novohana ny fitahirizam-bokatra mba hivarotana vary amin’ny Ejiptianina, satria namely mafy ny mosary manerana an’i Ejipta. '
  '57':
  - type: text
    content: Tonga tany Ejipta koa ireo avy any amin’ny tany hafa rehetra mba hividy vary amin’i Jôsefa, satria efa namely mafy ny mosary manerana ny tany.
  '6':
  - type: text
    content: 'Avy eo dia nisy salohim-bary fito manakofa sady main’ny rivotra avy any atsinanana nitrebona taorian’ireo; '
  '7':
  - type: text
    content: ka ireto salohim-bary manakofa dia nitelina iretsy vokatra sady tsara. Dia taitra ny Farao ka nahatsapa fa nanonofy izy.
  '8':
  - type: text
    content: 'Nony maraina dia nampiantso ny mpimasy sy ny olon-kendry rehetra tao Ejipta ny Farao satria feno tebiteby. Notantarainy tamin’ireo ny nofiny, kanefa tsy nisy nahalaza ny heviny. '
  '9':
  - type: text
    content: 'Tamin’izay no niteny tamin’ny Farao ilay lehiben’ny mpandroso zava-pisotro ka nanao hoe:'
  - type: text
    content: '–Tompokolahy ô, tsaroako ankehitriny ny fahadisoako. '
