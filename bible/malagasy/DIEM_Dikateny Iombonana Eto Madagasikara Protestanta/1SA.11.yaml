document_id: 1SA.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Saoly mandresy ny Hamônita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tonga nanafika ny tanànan’i Jabesy any Gilehada i Nahasy mpanjakan’ny Hamônita ka nanao fahirano azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hamônita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: firenena nonina tany atsinanan’ny ony Jôrdàna. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Jabesy any Gilehada
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Mpits 21.8 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. Dia hoy ny mponin’i Jabesy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manaova fanekena aminay, fa vonon-kanompo anao izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hoy ny navalin’i Nahasy azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sitrako ny hanao fanekena aminareo raha toa ka hopotseriko avokoa ny masonareo ankavanana; fa ny hahafa-baràka an’i Israely manontolo mihitsy no tadiaviko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy kosa ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Jabesy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Omeo fito andro izahay hahafahanay mandefa iraka manerana ny faritanin’i Israely; fa raha tsy misy mamonjy anay, dia hitolo-batana aminao izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Rehefa tonga tany Gibehà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gibehà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 10.5 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' tanànan’i Saoly ireo iraka ka nitantara ny vaovao misy, dia samy nigogogogo nitomany ny vahoaka rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’izay indrindra no tonga avy any an-tsaha niroaka ny ombiny i Saoly, ka nanontany izay anton-javatra nampitomany ny olona. Dia nitaterana izay voalazan’ny iraka avy any Jabesy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha nandre izany i Saoly, dia nilatsahan’ny Fanahin’Andriamanitra, ary nirehi-pahatezerana mafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Naka omby roa izy, ka notetitetehiny madinika izany, ary nasainy nentin’ireo iraka manerana ny faritan’i Israely, miaraka amin’izao fampitandremana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho toy izao anie ny hanjo ny ombin’izay tsy manaraka an’i Saoly sy i Samoela hiady!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Azon-korohoro ny amin’izay mety hataon’ny TOMPO ireo Israelita ka niainga hiady toy ny olona iray ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nampanaovin’i Saoly matso tao Bezeka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bezeka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tokony ho 70 km any avaratr’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' izy ireo, dia noisainy ka nahatratra andiany telonjato ny avy amin’ireo foko tavaratra ary andiany telopolo ny avy amin’ny fokon’i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ireo iraka avy any Jabesy Gilehàda kosa dia nasaina nilaza tamin’ny mponina any aminy hoe: «Rahampitso rehefa antoandrobenanahary iny, dia ho voavonjy ianareo» Dia lasa ny iraka nanambara izany vaovao izany tamin’ny mponin’i Jabesy, izay faly aoka izany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sady niteny tamin’ny Hamônita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rahampitso dia hitolo-batana aminareo izahay ka ataovy aminay izay tianareo hatao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny ampitso dia nozarain’i Saoly ho antoko telo ny tafiny izay niditra tao amin’ny tobin’ny fahavalo talohan’ny madiva haraina ary namely ny Hamônita hatramin’ny mitataovovonana. Ny sisa tsy maty dia niparitaka tsy afa niara-droa akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ny vahoaka israelita tamin’i Samoela:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza moa ireo olona nilaza fa tsy tokony hanjaka aminay i Saoly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fampahatsiahivana ny 10.27.
    marker-yv: yv-n
  - type: text
    text: '? Atolory anay ireny fa hataonay maty tokoa!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy kosa i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy tokony hisy olona hovonoina ho faty amin’ny andro toy izao, satria androany no nanomezan’ny TOMPO fandresena ho an’i Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy i Samoela tamin’ny vahoaka israelita:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha isika hankany Gilgàla
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gilgàla: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 7.16 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' hanamafy orina ny maha mpanjaka an’i Saoly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia lasa nankany Gilgàla ny vahoaka rehetra. Ary tany, tao amin’ny Toeramasina, no nanambarana ampahibemaso indray teo anatrehan’ny TOMPO, ny maha mpanjaka an’i Saoly; tany koa no nanaovany sorom-pihavanana amin’ny TOMPO. Ary dia nifaly aoka izany i Saoly sy ny mponina rehetra tao Israely.
