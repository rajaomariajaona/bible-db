document_id: 1SA.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Saoly mandresy ny Hamônita
  - type: text
    content: Tonga nanafika ny tanànan’i Jabesy any Gilehada i Nahasy mpanjakan’ny Hamônita ka nanao fahirano azy
  - type: note
    content: 'Hamônita: firenena nonina tany atsinanan’ny ony Jôrdàna. –Jabesy any Gilehada: jereo Mpits 21.8 sy nta.'
  - type: text
    content: '. Dia hoy ny mponin’i Jabesy taminy:'
  - type: text
    content: –Manaova fanekena aminay, fa vonon-kanompo anao izahay.
  '10':
  - type: text
    content: 'sady niteny tamin’ny Hamônita hoe:'
  - type: text
    content: –Rahampitso dia hitolo-batana aminareo izahay ka ataovy aminay izay tianareo hatao.
  '11':
  - type: text
    content: 'Ny ampitso dia nozarain’i Saoly ho antoko telo ny tafiny izay niditra tao amin’ny tobin’ny fahavalo talohan’ny madiva haraina ary namely ny Hamônita hatramin’ny mitataovovonana. Ny sisa tsy maty dia niparitaka tsy afa niara-droa akory. '
  '12':
  - type: text
    content: 'Ary hoy ny vahoaka israelita tamin’i Samoela:'
  - type: text
    content: –Aiza moa ireo olona nilaza fa tsy tokony hanjaka aminay i Saoly
  - type: note
    content: Fampahatsiahivana ny 10.27.
  - type: text
    content: '? Atolory anay ireny fa hataonay maty tokoa!'
  '13':
  - type: text
    content: 'Fa hoy kosa i Saoly hoe:'
  - type: text
    content: –Tsy tokony hisy olona hovonoina ho faty amin’ny andro toy izao, satria androany no nanomezan’ny TOMPO fandresena ho an’i Israely.
  '14':
  - type: text
    content: 'Dia hoy i Samoela tamin’ny vahoaka israelita:'
  - type: text
    content: –Andeha isika hankany Gilgàla
  - type: note
    content: 'Gilgàla: jereo 7.16 sy nta.'
  - type: text
    content: ' hanamafy orina ny maha mpanjaka an’i Saoly.'
  '15':
  - type: text
    content: Dia lasa nankany Gilgàla ny vahoaka rehetra. Ary tany, tao amin’ny Toeramasina, no nanambarana ampahibemaso indray teo anatrehan’ny TOMPO, ny maha mpanjaka an’i Saoly; tany koa no nanaovany sorom-pihavanana amin’ny TOMPO. Ary dia nifaly aoka izany i Saoly sy ny mponina rehetra tao Israely.
  '2':
  - type: text
    content: 'Fa hoy ny navalin’i Nahasy azy:'
  - type: text
    content: –Sitrako ny hanao fanekena aminareo raha toa ka hopotseriko avokoa ny masonareo ankavanana; fa ny hahafa-baràka an’i Israely manontolo mihitsy no tadiaviko.
  '3':
  - type: text
    content: 'Hoy kosa ireo '
  - type: text
    content: loholon
  - type: text
    content: '’i Jabesy taminy:'
  - type: text
    content: –Omeo fito andro izahay hahafahanay mandefa iraka manerana ny faritanin’i Israely; fa raha tsy misy mamonjy anay, dia hitolo-batana aminao izahay.
  '4':
  - type: text
    content: Rehefa tonga tany Gibehà
  - type: note
    content: 'Gibehà: jereo 10.5 sy nta.'
  - type: text
    content: ' tanànan’i Saoly ireo iraka ka nitantara ny vaovao misy, dia samy nigogogogo nitomany ny vahoaka rehetra.'
  '5':
  - type: text
    content: 'Tamin’izay indrindra no tonga avy any an-tsaha niroaka ny ombiny i Saoly, ka nanontany izay anton-javatra nampitomany ny olona. Dia nitaterana izay voalazan’ny iraka avy any Jabesy izy. '
  '6':
  - type: text
    content: 'Raha nandre izany i Saoly, dia nilatsahan’ny Fanahin’Andriamanitra, ary nirehi-pahatezerana mafy. '
  '7':
  - type: text
    content: 'Naka omby roa izy, ka notetitetehiny madinika izany, ary nasainy nentin’ireo iraka manerana ny faritan’i Israely, miaraka amin’izao fampitandremana hoe:'
  - type: text
    content: –Ho toy izao anie ny hanjo ny ombin’izay tsy manaraka an’i Saoly sy i Samoela hiady!
  - type: text
    content: 'Azon-korohoro ny amin’izay mety hataon’ny TOMPO ireo Israelita ka niainga hiady toy ny olona iray ihany. '
  '8':
  - type: text
    content: Nampanaovin’i Saoly matso tao Bezeka
  - type: note
    content: 'Bezeka: tanàna tokony ho 70 km any avaratr’i Jerosalema.'
  - type: text
    content: ' izy ireo, dia noisainy ka nahatratra andiany telonjato ny avy amin’ireo foko tavaratra ary andiany telopolo ny avy amin’ny fokon’i Joda. '
  '9':
  - type: text
    content: 'Ireo iraka avy any Jabesy Gilehàda kosa dia nasaina nilaza tamin’ny mponina any aminy hoe: «Rahampitso rehefa antoandrobenanahary iny, dia ho voavonjy ianareo» Dia lasa ny iraka nanambara izany vaovao izany tamin’ny mponin’i Jabesy, izay faly aoka izany '
