document_id: JOB.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: NY RESAKA MIFAMALY NATAON’I JOBA SY NY SAKAIZANY TELO LAHY
  - type: heading
    content: (3-31)
  - type: heading
    content: 'Mitaraina i Jôba: inona no antony mbola hahavelomana?'
  - type: text
    content: Niloa-bava ihany i Jôba tamin’ny farany ka nanozona ny andro nahaterahany
  - type: note
    content: 'nanozona ny andro nahaterahany: ampit Jer 20.14-18.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Satria tsy nahasakana ny hahaterahako izy
  - type: text
    content: sy ny hahitako izao fahoriana izao.
  - type: heading
    content: '*'
  '11':
  - type: text
    content: Nahoana aho no tsy maty hatrany am-bohòka,
  - type: text
    content: na tsy niala aina fony vao nivoaka avy tany an-kibo?
  '12':
  - type: text
    content: Nahoana no nisy lohalika roa nandray ahy
  - type: text
    content: sy nono roa ninonoako?
  '13':
  - type: text
    content: Tahaka izay aho mba nilamina tany am-pasana
  - type: text
    content: ka nandry am-piadanana feizay
  '14':
  - type: text
    content: niaraka tamin’ny mpanjaka sy ireo mpifehy ny tany
  - type: text
    content: izay nanangana indray ny tsangambato efa rava,
  '15':
  - type: text
    content: na niaraka tamin’ny andriandahy be volamena
  - type: text
    content: sady manana volafotsy mameno trano.
  '16':
  - type: text
    content: Na koa naleoko fotsiny tsy ary
  - type: text
    content: toy ny zaza tsy azo ka nafenina,
  - type: text
    content: dia toy ny zaza tsy nahita mazava.
  '17':
  - type: text
    content: Any ny olon-dratsy
  - type: text
    content: no mitsahatra amin’ny fampahoriana
  - type: text
    content: ary any ny reraka no miala sasatra.
  '18':
  - type: text
    content: Mahita fiadanana koa ny mpigadra,
  - type: text
    content: ka tsy handre intsony ny antsoantson’ny mpiambina.
  '19':
  - type: text
    content: Samy tafakambana any na kely na lehibe
  - type: text
    content: ary ny mpanompo aza dia ho afaka amin’ny tompony.
  - type: heading
    content: '*'
  '2':
  - type: text
    content: 'Nandray fitenenana izy ka nanao hoe:'
  '20':
  - type: text
    content: Nahoana no ataon’Andriamanitra
  - type: text
    content: mahita masoandro ny olona ory
  - type: text
    content: ary ataony velona ireo tototra alahelo?
  '21':
  - type: text
    content: Miandry ny fahafatesana tsy ho tonga izy
  - type: note
    content: Ampit Apôk 9.6.
  - type: text
    content: sady mitady azy fatratra mihoatra noho ny harena.
  '22':
  - type: text
    content: Hibita-kafaliana tokoa ireo
  - type: text
    content: sady ravoravo hahazo fasana!
  '23':
  - type: text
    content: Nahoana no velona ny olona tsy mahita lalan-kombana
  - type: text
    content: fa toa voahidin’Andriamanitra ho anaty tamboho.
  '24':
  - type: text
    content: Eny, toloko hatrany no sakafo fihinako
  - type: text
    content: ka migororoana toy ny rano ny fidradradradrako.
  '25':
  - type: text
    content: Izay atahorako ka mampitebiteby ahy
  - type: text
    content: no tanteraka sy mihatra amiko.
  '26':
  - type: text
    content: Tsy manam-pitoniana na fiadanana aho,
  - type: text
    content: tsy misy fitsaharana fa tebiteby lava.
  '3':
  - type: text
    content: Enga anie ka hofoanan’Andriamanitra
  - type: text
    content: ny andro nahaterahako
  - type: text
    content: sy ny alina izay nanao hoe;
  - type: text
    content: «zazalahy no torontoronina»!
  '4':
  - type: text
    content: Ho tonga haizina anie izany andro izany,
  - type: text
    content: ka tsy hotsarovan’Andriamanitra any ambony any
  - type: text
    content: ary tsy hisy mazava hamiratra aminy intsony.
  '5':
  - type: text
    content: Izay aloka mainty indrindra anie handrakotra azy;
  - type: text
    content: ary aoka hisy raho-matevina hitatao aminy
  - type: text
    content: na koa fanakona-masoandro mahatahotra.
  '6':
  - type: text
    content: Enga anie ka izany no ho alina maizina indrindra
  - type: text
    content: ka tsy ho tafasisika amin’ny marikandro-taona
  - type: text
    content: ary tsy hiditra intsony amin’ny fanisàm-bolana.
  '7':
  - type: text
    content: Ho momba anie izany alina izany
  - type: text
    content: ka tsy handrenesam-pihobiana mihitsy!
  '8':
  - type: text
    content: Hanozona azy anie ny mpanozona andro
  - type: text
    content: izay mahay mamoha ilay dragona lehibe
  - type: note
    content: 'Fampahatsiahivana ireo fomba majika izay mihambo hanao ho andro ratsy hanombohan-javatra ny andro sasantsasany. Ilay dragona lehibe: bibin’angano voalaza ao amin’ny 40.25–41.26 izay misarim-boay. Nomena hery handrapaka ny volana aman-kintana izy.'
  - type: text
    content: '!'
  '9':
  - type: text
    content: Tsy hahita ny kintan’ny maraina
  - type: text
    content: ka hiandry ny mazava tsy ho tonga
  - type: text
    content: ary koa tsy hahatsinjo akory
  - type: text
    content: ny fiposahan’ny mazava atsinanana!
