document_id: JOB.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: NY RESAKA MIFAMALY NATAON’I JOBA SY NY SAKAIZANY TELO LAHY
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: (3-31)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Mitaraina i Jôba: inona no antony mbola hahavelomana?'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niloa-bava ihany i Jôba tamin’ny farany ka nanozona ny andro nahaterahany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nanozona ny andro nahaterahany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Jer 20.14-18.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy nahasakana ny hahaterahako izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny hahitako izao fahoriana izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana aho no tsy maty hatrany am-bohòka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na tsy niala aina fony vao nivoaka avy tany an-kibo?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no nisy lohalika roa nandray ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nono roa ninonoako?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka izay aho mba nilamina tany am-pasana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nandry am-piadanana feizay
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niaraka tamin’ny mpanjaka sy ireo mpifehy ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nanangana indray ny tsangambato efa rava,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na niaraka tamin’ny andriandahy be volamena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manana volafotsy mameno trano.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na koa naleoko fotsiny tsy ary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny zaza tsy azo ka nafenina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny zaza tsy nahita mazava.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mitsahatra amin’ny fampahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary any ny reraka no miala sasatra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahita fiadanana koa ny mpigadra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy handre intsony ny antsoantson’ny mpiambina.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy tafakambana any na kely na lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanompo aza dia ho afaka amin’ny tompony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandray fitenenana izy ka nanao hoe:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no ataon’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahita masoandro ny olona ory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataony velona ireo tototra alahelo?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miandry ny fahafatesana tsy ho tonga izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Apôk 9.6.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mitady azy fatratra mihoatra noho ny harena.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hibita-kafaliana tokoa ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ravoravo hahazo fasana!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no velona ny olona tsy mahita lalan-kombana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa toa voahidin’Andriamanitra ho anaty tamboho.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, toloko hatrany no sakafo fihinako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka migororoana toy ny rano ny fidradradradrako.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay atahorako ka mampitebiteby ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tanteraka sy mihatra amiko.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manam-pitoniana na fiadanana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy fitsaharana fa tebiteby lava.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka hofoanan’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny andro nahaterahako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny alina izay nanao hoe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «zazalahy no torontoronina»!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tonga haizina anie izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hotsarovan’Andriamanitra any ambony any
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy mazava hamiratra aminy intsony.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay aloka mainty indrindra anie handrakotra azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hisy raho-matevina hitatao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na koa fanakona-masoandro mahatahotra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka izany no ho alina maizina indrindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho tafasisika amin’ny marikandro-taona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hiditra intsony amin’ny fanisàm-bolana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho momba anie izany alina izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy handrenesam-pihobiana mihitsy!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanozona azy anie ny mpanozona andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mahay mamoha ilay dragona lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Fampahatsiahivana ireo fomba majika izay mihambo hanao ho andro ratsy hanombohan-javatra ny andro sasantsasany. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Ilay dragona lehibe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': bibin’angano voalaza ao amin’ny 40.25–41.26 izay misarim-boay. Nomena hery handrapaka ny volana aman-kintana izy.'
      marker-yv: yv-n
    - type: text
      text: '!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hahita ny kintan’ny maraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiandry ny mazava tsy ho tonga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa tsy hahatsinjo akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fiposahan’ny mazava atsinanana!
