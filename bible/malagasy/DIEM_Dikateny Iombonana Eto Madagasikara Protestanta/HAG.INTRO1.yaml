  - type: text
    content: rehefa tafaverina avy tany Babilônia nanaovana sesitany azy ny Jiosy tamin’ny fiandohan’ny taonjato fahenina. Lahateny fohy maromaro nataon’ny mpaminany tamin’ny anaran’Andriamanitra nandritra ny taona 520 tal J.K. no ampitainy amintsika.
  - type: text
    content: Ireo Jiosy voalohany tafaverina avy any an-tsesitany nanomboka ny taona 538 tal J.K. dia tokony ho nanangana indray ny tempoly ravan’ny Babilônianina tamin’ny taona 587, nefa dia nalaky kivy. Izany indrindra no nahatonga ny mpaminany hampirisika ireo tompon’andraikitra hanohy indray ny asa tamin’ny taona 520. Nofohazin’i Hagay ny risi-pon’ireo mpihaino azy tamin’ny fanambaràna fa ny vahoaka no mahantra ary ny vokatry ny fambolena no kely dia ateraky ny mbola maharava ny tempoly (1.1-14). Nambarany azy koa fa ny tempoly vaovao dia ho be voninahitra noho ilay rava (2.1-9) ary ny famitana azy no hampitsahatra ny
  - type: text
    content: ' '
  - type: text
    content: fahalotoana
  - type: text
    content: ' '
  - type: text
    content: ara-pivavahana sy ny fahantrana mihatra amin’ny vahoakan’Andriamanitra (2.10-20). Ny governora Zerobabela, taranak’i Davida, dia ampanantenain’Andriamanitra hoavy mamirapiratra (2.20-23).
  - type: text
    content: Ny fiandrasana tempoly be voninahitra noho ilay voalohany sy ny fidiran’Andriamanitra an-tsehatra tamin’ny alalan’ny mpanompo iray izay hofidîny, dia hampisongadina ny fiangonana israelita vaovao taorian’ny sesitany. Ny fampirisihana nataon’i Hagay no naharesy lahatra sy nanosika ny mpiara-belona taminy tsy hiraviravy tanana fa hanao ny asa noho ilay zava-baovao omanin’Andriamanitra.
