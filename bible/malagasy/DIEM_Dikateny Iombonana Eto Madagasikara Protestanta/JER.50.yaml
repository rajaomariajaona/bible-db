document_id: JER.50,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Faharavàn’i Babilôna sy fanafahana an’i Israely
  - type: text
    content: 'Hafatra nataon’ny TOMPO tamin’ny alalan’i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: ' ho an’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' sy i Babilônia'
  - type: note
    content: Ny and 1 dia fanampin-dohateny ho an’ny toko 50–51. –Momba an’i Babilôna sy ny Babilônianina, jereo Is 13.1 sy nta.
  - type: text
    content: .
  '10':
  - type: text
    content: Horobaina ny tanin’ny Babilônianina
  - type: text
    content: ary ho afa-po ireo rehetra mandroba azy,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.
  '11':
  - type: text
    content: Mahazo mifaly sy miravo ianareo izao,
  - type: text
    content: ry mpamotika ny fananako
  - type: note
    content: Ireo mpamotika ny fananan’ny Tompo dia ireo Babilônianina any Palestinina amin’izao itenenan’i Jeremià izao.
  - type: text
    content: '!'
  - type: text
    content: Mahazo mifalihavanja ianareo
  - type: text
    content: toy ny vantotr’ombivavy eny amin’ny ahi-maitso
  - type: text
    content: sy afa-mikiaka toy ny soavaly mpihazakazaka.
  '12':
  - type: text
    content: 'Nefa mba jereo ange ity tanindrazanareo:'
  - type: text
    content: tafalatsaka lalina anaty henatra,
  - type: text
    content: tototry ny fahafaham-baràka.
  - type: text
    content: Indro izy nanjary farany amin’ny firenena,
  - type: text
    content: lasa taniefitra sy tany hay ary tanety ngazana.»
  '13':
  - type: text
    content: Ny fahaviniran’ny TOMPO no nahatonga an’i Babilôna
  - type: text
    content: tsy honenana intsony fa hampahonena tanteraka.
  - type: text
    content: Ho gaga izay rehetra mandalo azy,
  - type: text
    content: ka hivarahontsana noho ny voina rehetra nanjo azy.
  '14':
  - type: text
    content: Ianareo rehetra mpitifitra amin’ny tsipîka,
  - type: text
    content: milahara manodidina an’i Babilôna.
  - type: text
    content: Amelezo azy ny zana-tsipîkanareo
  - type: text
    content: ka aza tsitsîna mihitsy
  - type: text
    content: satria meloka eo anatrehan’ny TOMPO izy.
  '15':
  - type: text
    content: Manaova akoran’ady manodidina
  - type: text
    content: mba hampikoizana azy.
  - type: text
    content: Indro fa nitolo-batana izy!
  - type: text
    content: Rava ny tilikambom-piarovany
  - type: text
    content: ary nianjera ny mandany.
  - type: text
    content: Izany no famalian’ny TOMPO!
  - type: text
    content: Koa valionareo i Babilôna;
  - type: text
    content: araka ny nataony tamin’ny hafa
  - type: text
    content: no mba ataovinareo aminy koa.
  '16':
  - type: text
    content: Foany ao Babilôna ireo mpamafiny
  - type: text
    content: sy ireo mpijinjany amin’ny fararano;
  - type: text
    content: manoloana ny ady mahatsiravina,
  - type: text
    content: dia aoka samy hody any amin’ny fireneny avy izy
  - type: text
    content: ary samy handositra any amin’ny taniny avy!
  '17':
  - type: text
    content: I Israely dia toy ny ondry very
  - type: text
    content: izay nenjehin’ny liona.
  - type: text
    content: Ny mpanjakan’i Asiria no voalohany nihinana taminy; avy eo dia tonga i Nebokadnetsara mpanjakan’i Babilôna nanapatapaka ny taolany
  - type: note
    content: filazana ankolaka mifampitohy ny fahazoana an’i Samaria tamin’ny 722 tal J.K, narahin’ny fanjanahana ny fanjakan’i Israely nataon’ny Asirianina, nampian’ny faharavan’i Jerosalema sy ny fanjakan’i Joda noho ny famelezan’ny tafika babilônianina tamin’ny 587 tal J.K (jereo 39.1-10; 52.1-30).
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Noho izany, dia izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Hirotsaka an-tsehatra hamely ny mpanjakan’i Babilôna sy ny taniny Aho, tahaka izay nirotsahako an-tsehatra namely ny mpanjakan’i Asiria fahiny.'
  '19':
  - type: text
    content: Fa i Israely kosa haveriko
  - type: text
    content: amin’ny kijana fiandrasana azy,
  - type: text
    content: 'ka hirao-bilona any Karmela sy any '
  - type: text
    content: Basàna
  - type: text
    content: ;
  - type: text
    content: ary eo an-tendrombohitr’i Efraîma sy ao Gilehada
  - type: text
    content: no hahafa-po sy hahavoky azy.
  '2':
  - type: text
    content: Ambarao amin’ny firenena ny vaovao,
  - type: text
    content: ampahafantaro amin’ny alalan’ny famantarana,
  - type: text
    content: ampahafantaro fa aza afenina
  - type: text
    content: 'ary lazao hoe: Azo i Babilôna,'
  - type: text
    content: henatra moa izao ho an’ny sampiny
  - type: text
    content: ary haketrahana ho an’ireo andriamani-tsiiziny!
  - type: text
    content: Henatra moa izao ny an’i Bela,
  - type: text
    content: ary haketrahana ho an’i Merôdàky
  - type: note
    content: 'Bela (tompo, na tompon-javatra tahaka an’i Bahala ho an’ny Kanahanita): anaram-boninahitra omen’ny Babilônianina manokana ho an’andriamanitry ny fireneny atao hoe Mardoka.'
  - type: text
    content: .
  '20':
  - type: text
    content: 'Izaho TOMPO dia manao teny hentitra hoe:'
  - type: text
    content: Amin’izany andro izany, na dia hotadiavina aza
  - type: text
    content: ny fahadisoan’i Israely sy ny helok’i Joda,
  - type: text
    content: dia hanjavona tsy ho hita intsony;
  - type: text
    content: satria havelako heloka
  - type: text
    content: ireo sisa notsimbiniko ho velona.
  '21':
  - type: text
    content: Tafiho ny tanin’i Merataîma!
  - type: text
    content: Tafiho izy sy ny mponina ao Pekôda
  - type: note
    content: 'Ny tanin’ny Merataîma na Ibefikomiana angamba dia manondro ny faritra manodidina ny vavaranon’i Eofrata. –Pekôda: ampahany amin’ny faritr’i Merataîma; jereo Ezek 23.23.'
  - type: text
    content: .
  - type: text
    content: Vonoy ho faty ireo ka aringano
  - type: text
    content: hatramin’ny olona farany,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.
  - type: text
    content: Tanteraho izay rehetra voadidiko!
  '22':
  - type: text
    content: Tabataban’ady no tao amin’io tany io,
  - type: text
    content: ary fandringanana goavana!
  '23':
  - type: text
    content: Andray! Potika sy torotoro i Babilôna,
  - type: text
    content: ilay tantanam-pamontsanana ny tany tontolo.
  - type: text
    content: Andray! Tonga taniefitra mahonena izy
  - type: text
    content: eo anivon’ny firenena maro.
  '24':
  - type: text
    content: Namelarako fandrika ianao, ry Babilôna,
  - type: text
    content: ka voan’izany, nefa tsy fantatrao akory.
  - type: text
    content: Tratra sy voasambotra ianao,
  - type: text
    content: satria Izaho TOMPO no niadianao.»
  '25':
  - type: text
    content: Novohan’ny TOMPO ny trano fitehirizany,
  - type: text
    content: ka nalainy tao ireo fiadiana
  - type: text
    content: izay anehoany ny fahavinirany.
  - type: text
    content: Ao amin’ny tanin’i Babilôna
  - type: text
    content: dia izany no asan’ny Tompo,
  - type: text
    content: ilay ANDRIAMANITR’izao rehetra izao.
  '26':
  - type: text
    content: Hatrany am-paran’ny tany, avia avokoa
  - type: text
    content: ianareo rehetra hamely azy.
  - type: text
    content: Sokafy ny fitehirizam-bokany
  - type: text
    content: ka avangongoy ho antonta iray ny remby;
  - type: text
    content: 'fa aringano tanteraka ny tanàna:'
  - type: text
    content: aoka tsy hisy tavela intsony!
  '27':
  - type: text
    content: Vonoy ho faty ny miaramilany rehetra;
  - type: text
    content: aoka hidina any an-toeram-pamonoana ireo!
  - type: text
    content: Idiran-doza ireo fa tonga ny androny
  - type: text
    content: dia ny fotoana hamalian’ny Tompo azy.
  '28':
  - type: text
    content: Injany ireo mpandositra
  - type: text
    content: afa-nitsoaka avy any Babilônia
  - type: text
    content: 'mitondra ny vaovao ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ':'
  - type: text
    content: namaly faty an’i Babilôna
  - type: text
    content: ny TOMPO Andriamanitsika,
  - type: text
    content: namaly faty azy noho ny tempoliny masina Izy.
  '29':
  - type: text
    content: Antsoy ny mpandefa zana-tsipîka,
  - type: text
    content: dia ireo rehetra mpanenjana tsipîka,
  - type: text
    content: ka vorio hamely an’i Babilôna.
  - type: text
    content: Aoka ireo hitoby manodidina azy
  - type: text
    content: ka tsy hamela ny mponiny ho afa-miala.
  - type: text
    content: Aoka hovaliana araka ny ratsy nataony izy
  - type: text
    content: ka izay rehetra nataony tamin’ny hafa
  - type: text
    content: no mba ampiharo aminy
  - type: note
    content: Ampit Apôk 18.6.
  - type: text
    content: ' kosa!'
  - type: text
    content: Satria izy niavonavona tamin’ny TOMPO,
  - type: text
    content: dia tamin’ilay Masin’i Israely.
  '3':
  - type: text
    content: Fa misy firenena iray avy any avaratra
  - type: text
    content: miakatra hamely an’i Babilôna
  - type: note
    content: 'avy any avaratra: ao amin’ny fisainan’ny mpaminany dia matetika avy any avaratra no iavian’ny loza (jereo 1.14). Io fiteny io eto dia ampiasaina amin’ny hevitra an’ohatra, satria ny fahavalo lazaina eto angamba dia i Persia izay ao atsimo atsinanan’i Babilôna.'
  - type: text
    content: ','
  - type: text
    content: ka hanova ny taniny ho lao
  - type: text
    content: tsy hisy mponina intsony;
  - type: text
    content: fa na olona na biby fiompy
  - type: text
    content: dia samy lasa nitsoaka avokoa.
  '30':
  - type: text
    content: «Noho izany dia ho faty eny an-kianja eny ireo zatovony, ary ho ringana ireo miaramilany rehetra amin’izany andro izany, hoy ny teny hentitry ny TOMPO.
  '31':
  - type: text
    content: Indro Aho hifanandrina aminao
  - type: text
    content: ry Babilôna mpiavonavona,
  - type: text
    content: Izaho Tompo ANDRIAMANITR’izao rehetra izao
  - type: text
    content: no manao izany teny hentitra izany.
  - type: text
    content: Fa tonga ny andronao izao,
  - type: text
    content: dia ny fotoana hamaliako anao.
  '32':
  - type: text
    content: Mivembena ary mianjera ilay mpiavonavona,
  - type: text
    content: fa tsy misy manarina azy.
  - type: text
    content: Andrehetako afo amin’ireo tanànany
  - type: text
    content: ka handevona izay rehetra manodidina azy izany.»
  '33':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Samy nampahorìna ny Israelita sy ny Jodeanina;
  - type: text
    content: ary izay rehetra namabo azy
  - type: text
    content: dia mitana azy an-keriny,
  - type: text
    content: fa tsy manaiky handefa azy.
  '34':
  - type: text
    content: 'Nefa Izaho mpanavotra azy dia mahery:'
  - type: text
    content: TOMPOn’izao rehetra izao no anarako.
  - type: text
    content: Horaisiko an-tanana tokoa ny adiny
  - type: text
    content: mba hampiadana ny taniny
  - type: text
    content: sy hampikorontana kosa ny mponin’i Babilôna.»
  - type: heading
    content: Ny tetika hamelezan’ny Tompo an’i Babilôna
  '35':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO:'
  - type: text
    content: «Hisy ady hamely ny Babilônianina,
  - type: text
    content: mbamin’ny mponina ao an-drenivohitra
  - type: text
    content: sy ny mpitondrany ary ny olon-kendriny!
  '36':
  - type: text
    content: Hisy ady hamely ny mpimasiny
  - type: note
    content: 'ny mpimasiny: dkt hafa ireo basivava na mpiteniteny foana.'
  - type: text
    content: ','
  - type: text
    content: ka ho very saina ireo!
  - type: text
    content: Hisy ady hamely ny maherifony,
  - type: text
    content: ka ho ketraka izy!
  '37':
  - type: text
    content: Hisy ady hamely ny soavaliny sy ny kalesiny
  - type: text
    content: mbamin’ny olona rehetra samy hafa firenena ao aminy,
  - type: text
    content: ka halemy toy ny vehivavy izy!
  - type: text
    content: Hisy ady hamely ny haren-tsarobidiny,
  - type: text
    content: ka ho voaroba ireo!
  '38':
  - type: text
    content: Hisy ady hamely ny reniranony,
  - type: text
    content: ka ho ritra ireo!
  - type: text
    content: Satria tany be sarivongan-tsampy io,
  - type: text
    content: dia sary mahatsiravina
  - type: text
    content: sady mahatonga izay manompo azy hirediredy.
  '39':
  - type: text
    content: Noho izany dia ny kary sy ny amboadia
  - type: text
    content: no honina ao Babilôna;
  - type: text
    content: ary ny vorombe koa no hipetraka ao.
  - type: text
    content: Fa tsy honenana intsony izy mandrakizay
  - type: text
    content: ary tsy hitoerana hatramin’ny taranaka mifandimby.
  '4':
  - type: text
    content: Amin’izany andro sy fotoana izany,
  - type: text
    content: hoy ny teny hentitry ny TOMPO,
  - type: text
    content: dia hiara-tonga ny Israelita sy ny Jodeanina,
  - type: text
    content: ka sady mitomany izy no mandeha
  - type: text
    content: hitady Ahy TOMPO Andriamaniny.
  '40':
  - type: text
    content: Tahaka ny nandravako an’i Sôdôma sy i Gômôra,
  - type: text
    content: mbamin’ireo tanàna teny akaikiny,
  - type: text
    content: no hataoko amin’i Babilôna
  - type: note
    content: 'i Sôdôma sy i Gômôra: jereo Gen 18.20–19.29; Jer 49.18.'
  - type: text
    content: ','
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO,
  - type: text
    content: ka tsy hisy olona honina
  - type: text
    content: na hivahiny any intsony.
  '41':
  - type: text
    content: Indro misy vahoaka tonga avy any avaratra
  - type: note
    content: 'And 41-46: jereo 6.22-24. –avy any avaratra: jereo ny and 3 sy nta.'
  - type: text
    content: dia firenen-dehibe iray;
  - type: text
    content: ary mpanjaka mahery no miainga
  - type: text
    content: avy any am-paran’ny tany.
  '42':
  - type: text
    content: Mampirangaranga tsipîka sy lefona
  - type: text
    content: ireo miaramilany lozabe sady tsy mamindra fo.
  - type: text
    content: Mirohondrohona toy ny ranomasina ny feony.
  - type: text
    content: Mitaingin-tsoavaly izy,
  - type: text
    content: ary milahatra toy ny andian-tafika hiady
  - type: text
    content: mba hamely anao, ry Babilôna!
  '43':
  - type: text
    content: Ren’ny mpanjakan’i Babilôna
  - type: text
    content: izany vaovao izany,
  - type: text
    content: ka miraviravy tanana izy
  - type: text
    content: sady tratry ny fanaintainana
  - type: text
    content: toy ny vehivavy raha miteraka.
  '44':
  - type: text
    content: 'Hoy ny Tompo: «Indro Aho ho toy ny liona'
  - type: note
    content: 'And 44-46: jereo 49.19-21.'
  - type: text
    content: miakatra avy ao an-kirihitralan’i Jôrdàna
  - type: text
    content: sy mirifatra mankany amin’ny fonenany
  - type: text
    content: ka ao anatin’ny indray mipi-maso
  - type: text
    content: no hampandosirako ny Babilônianina.
  - type: text
    content: Ary hapetrako ao Babilôna
  - type: text
    content: ilay nofidiko ho lehibeny.
  - type: text
    content: Koa iza no azo ampitahaina amiko?
  - type: text
    content: Iza no sahy hifandahatra amiko?
  - type: text
    content: Ary iza no mpitondra hahatohitra Ahy?»
  '45':
  - type: text
    content: Noho izany, henoy àry ny tetika
  - type: text
    content: novolavolain’ny TOMPO
  - type: text
    content: hamelezana an’i Babilôna
  - type: text
    content: sy ny paika nomaniny
  - type: text
    content: hamelezana ny mponin’i Babilônia.
  - type: text
    content: Ho toy ny fitondra biby fiompy mihitsy
  - type: text
    content: no hitondrana azy any an-kafa
  - type: text
    content: hatramin’ny olona farany indrindra!
  - type: text
    content: Ny fonenany mihitsy aza no manilika azy.
  '46':
  - type: text
    content: Mihorohoro ny tany mandre
  - type: text
    content: 'ny vaovao hoe: «Azo i Babilôna»'
  - type: text
    content: Ary horakoraka no manako
  - type: text
    content: any amin’ireo firenena.
  '5':
  - type: text
    content: 'Hanontany ny lalana mankany '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ireo,'
  - type: text
    content: ka himasoany hizorana izany.
  - type: text
    content: 'Ho avy izy ka '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' mandrakizay'
  - type: text
    content: izay tsy hohadinoiny na oviana na oviana
  - type: text
    content: no hifamatorany mafy amiko TOMPO.
  '6':
  - type: text
    content: Andian’
  - type: text
    content: ondry
  - type: text
    content: ' very ny vahoakako'
  - type: text
    content: 'fa ny '
  - type: text
    content: mpiandriny
  - type: text
    content: ' no nandiso lalana azy,'
  - type: text
    content: ka nampirenireny azy teny an-tendrombohitra.
  - type: text
    content: Nifindrafindra tendrombohitra sy havoana izy
  - type: text
    content: ka nanadino ny vala fandriany
  - type: note
    content: 'Nifindrafindra tendrombohitra sy havoana: filazana ankolaka ny fivavahana fanompoan-tsampy teny amin’ireny toerana ireny izany; jereo 2.20; 3.23; 13.27; 17.2. –vala: ampit 23.3.'
  - type: text
    content: .
  '7':
  - type: text
    content: Izay fahavalo rehetra nahita azy
  - type: text
    content: 'dia nandripaka azy avokoa sady nanao hoe:'
  - type: text
    content: «Tsy misy mahadiso antsika izao,
  - type: text
    content: satria ireo no meloka eo anatrehan’ny TOMPO
  - type: text
    content: izay fonenam-pamonjena sy fanantenan-drazany.»
  '8':
  - type: text
    content: 'Hoy ny Tompo: «Mandosira lavitra an’i Babilôna'
  - type: note
    content: Ampit Apôk 18.4.
  - type: text
    content: ','
  - type: text
    content: ilaozy i Babilônia ka manaova hitsin-dalana
  - type: text
    content: toy ny osilahy mialoha ny ondry aman’osy.
  '9':
  - type: text
    content: Fa firenena lehibe manao andiany
  - type: text
    content: no hotairiko sy halefako hanafika an’i Babilôna.
  - type: text
    content: Ho tonga avy any avaratra ireny
  - type: text
    content: ka hilahatra hiady aminy sy hahazo azy.
  - type: text
    content: Tsy hivena mihitsy ny zana-tsipîkany
  - type: text
    content: fa ho toy ny miaramila zatra ady
  - type: text
    content: ka tsy hiverim-potsiny.
