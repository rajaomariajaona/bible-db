document_id: ZEC.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faharavàn’ireo firenena matanjaka
  - type: text
    content: Vohay ny varavaranao, ry Libano ô!
  - type: text
    content: ary aoka ny afo handevona ny sederanao
  - type: note
    content: 'sederan’i Libano: jereo Ezek 31.3-9. Marihina fa an’ohatra no ilazana ny faharavàn’ireo firenena matanjaka eto (11, 1-3).'
  - type: text
    content: '!'
  '10':
  - type: text
    content: Dia noraisiko ilay tehiko hoe «fihavanana» ka notapahiko mba hahafoana ny fanekempihavanana izay efa nataon’ny Tompo tamin’ny firenen-drehetra
  - type: note
    content: Jereo Hôs 2.20.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Dia foana tamin’izany andro izany ihany ilay fanekempihavanana. Ary nijery ahy ireo mpanondrana ondry ka nahatakatra fa ny Tompo no niteny tamin’izay nataoko. '
  '12':
  - type: text
    content: 'Ary hoy aho tamin’ireto mpanondrana ondry:'
  - type: text
    content: –Raha heverinareo fa mety, dia omeo ahy ny karamako; fa raha tsy izany kosa, dia aoka ihany.
  - type: text
    content: Dia naloany ny karamako sekela volafotsy telopolo
  - type: note
    content: sekela volafotsy telopolo no vidin’ny andevo iray araka ny Fanaf 21.32. Io koa no vola azon’i Jodasy ho sandan’ny famadihany, jereo Mt 26.15.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Ary hoy ny Tompo tamiko:'
  - type: text
    content: –Ento any amin’ny mpandrendrika azy izany volabe nanombanany Ahy izany!
  - type: text
    content: Dia noraisiko ny sekela volafotsy telopolo ka nentiko tany amin’ny mpandrendrika tao an-
  - type: text
    content: tranon’ny Tompo
  - type: note
    content: Tao an-tempolin’i Jerosalema dia nisy mpandrendrika mpamadika ho vongana ireo karazana metaly aterin’ny mpivavaka.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Avy eo dia notapahiko koa ilay tehina «Firaisankina», hanafoanana ny firalahian’i Joda sy i Israely
  - type: note
    content: Ny mpaminany eto dia mety mampahatsiaro ny fisarahana nitranga tokony ho tamin’ny taona 328 teo amin’ny Jiosy tao Jerosalema (Joda) sy ny Samaritanina* (Israely).
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ary hoy indray ny Tompo tamiko:'
  - type: text
    content: '–Raiso ankehitriny ny toeran’ny mpiandry adala. '
  '16':
  - type: text
    content: Fa indro Aho hampijoro mpiandry vaovao eto amin’ity tany ity, dia mpiandry izay tsy hanan-draharaha ny ondry misy mitady hamono na hikatsaka ny very na hitsabo ny marary na hikarakara ny mbola matanjaka; fa dia hihinana ny henan’izay matavy kosa izy sady hamaky ny kitrony.
  '17':
  - type: text
    content: Lozan’ny mpiandry adala
  - type: text
    content: izay mandao ny ondriny!
  - type: text
    content: Enga anie ny sabatra handrotika ny sandriny
  - type: text
    content: sy hanapotsitra ny masony ankavanana!
  - type: text
    content: Ka dia halemy hatrany anie ny sandriny,
  - type: text
    content: ary tsy hahita intsony ny masony ankavanana!
  '2':
  - type: text
    content: Midradradradra, ry kipresy,
  - type: text
    content: fa efa nazera ny sedera,
  - type: text
    content: dia ireo hazo mahafinaritra nijoalajoala.
  - type: text
    content: 'Midradradradra, ry hazo ôkan’i '
  - type: text
    content: Basàna
  - type: text
    content: ','
  - type: text
    content: fa ripaka ny ala mikitroka.
  '3':
  - type: text
    content: 'Henoy ny fidradradradran’ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' firenena'
  - type: text
    content: fa nihintsana ny voninahiny.
  - type: text
    content: Henoy ny fieroneron’ny liona,
  - type: text
    content: fa rava ireo kirihitrala nireharehany
  - type: text
    content: teny amoron’ny ony Jôrdàna.
  - type: heading
    content: Ny mpiandry roa
  '4':
  - type: text
    content: 'Izao no lazain’ny Tompo Andriamanitro tamiko:'
  - type: text
    content: '–Meteza ianao ho '
  - type: text
    content: mpiandry
  - type: text
    content: ' ireo ondry hovonoina. '
  '5':
  - type: text
    content: 'Fa ny mpividy mamono azy dia tsy mihevi-tena ho meloka; ary ny mpivarotra azy kosa manao hoe: «Hisaorana anie ny Tompo fa manan-karena izahay!» Ary na dia ireo mpiandry azy aza tsy mba niantra azy. '
  '6':
  - type: text
    content: Izaho Tompo dia manao teny hentitra fa tsy hiantra ny mponin’ny tany intsony Aho. Indro fa hatolotro ho eo am-pelatanan’ny namany sy ny mpanjakany avy ny olona. Ary handroba ny tany ireo nefa tsy hanafaka olona amin’izany Aho.
  '7':
  - type: text
    content: Ary tonga mpiandry ny ondry aho, dia ny ondry izay kasain’ny mpanondrana
  - type: note
    content: 'mpanondrana (ondry): araka ny dkt tranainy grika, tsy dia mazava ny rijan-teny hebreo.'
  - type: text
    content: ' hovonoina. Naka tehina roa aho; ny iray nataoko hoe «Fihavanana» ary ny iray kosa «Firaisankina». Ary nandrasako ny ondry. '
  '8':
  - type: text
    content: Tao anatin’ny iray volana monja dia telo
  - type: note
    content: 'mpiandry telo: ny mpaminany dia mampahatsiaro tompon’andraikitra telo fantatry ny mpamaky azy, izay nifanesy voaroaka. Angamba mety ho mpisorombe telo izany.'
  - type: text
    content: ' ny mpiandry azy no noroahiko; avy eo dia lotika tamin’ny ondry ny foko, sady izy koa efa tofoka ahy. '
  '9':
  - type: text
    content: 'Dia hoy aho taminy:'
  - type: text
    content: –Tsy hiandry anareo intsony Aho. Izay natao ho faty; izay natao ho ringana, dia aoka izy ho ringana; ary izay sisa velona dia aoka izy hifampihinana!
