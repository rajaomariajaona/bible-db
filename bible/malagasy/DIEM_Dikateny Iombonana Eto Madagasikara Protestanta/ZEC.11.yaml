document_id: ZEC.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faharavàn’ireo firenena matanjaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Vohay ny varavaranao, ry Libano ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny afo handevona ny sederanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'sederan’i Libano:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Ezek 31.3-9. Marihina fa an’ohatra no ilazana ny faharavàn’ireo firenena matanjaka eto (11, 1-3).
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Midradradradra, ry kipresy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa nazera ny sedera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo hazo mahafinaritra nijoalajoala.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Midradradradra, ry hazo ôkan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ripaka ny ala mikitroka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Henoy ny fidradradradran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' firenena'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nihintsana ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henoy ny fieroneron’ny liona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rava ireo kirihitrala nireharehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: teny amoron’ny ony Jôrdàna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpiandry roa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no lazain’ny Tompo Andriamanitro tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Meteza ianao ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ireo ondry hovonoina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny mpividy mamono azy dia tsy mihevi-tena ho meloka; ary ny mpivarotra azy kosa manao hoe: «Hisaorana anie ny Tompo fa manan-karena izahay!» Ary na dia ireo mpiandry azy aza tsy mba niantra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izaho Tompo dia manao teny hentitra fa tsy hiantra ny mponin’ny tany intsony Aho. Indro fa hatolotro ho eo am-pelatanan’ny namany sy ny mpanjakany avy ny olona. Ary handroba ny tany ireo nefa tsy hanafaka olona amin’izany Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary tonga mpiandry ny ondry aho, dia ny ondry izay kasain’ny mpanondrana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: mpanondrana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ondry): '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt tranainy grika, tsy dia mazava ny rijan-teny hebreo.
    marker-yv: yv-n
  - type: text
    text: ' hovonoina. Naka tehina roa aho; ny iray nataoko hoe «Fihavanana» ary ny iray kosa «Firaisankina». Ary nandrasako ny ondry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tao anatin’ny iray volana monja dia telo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'mpiandry telo:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny mpaminany dia mampahatsiaro tompon’andraikitra telo fantatry ny mpamaky azy, izay nifanesy voaroaka. Angamba mety ho mpisorombe telo izany.
    marker-yv: yv-n
  - type: text
    text: ' ny mpiandry azy no noroahiko; avy eo dia lotika tamin’ny ondry ny foko, sady izy koa efa tofoka ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy aho taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy hiandry anareo intsony Aho. Izay natao ho faty; izay natao ho ringana, dia aoka izy ho ringana; ary izay sisa velona dia aoka izy hifampihinana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia noraisiko ilay tehiko hoe «fihavanana» ka notapahiko mba hahafoana ny fanekempihavanana izay efa nataon’ny Tompo tamin’ny firenen-drehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Hôs 2.20.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia foana tamin’izany andro izany ihany ilay fanekempihavanana. Ary nijery ahy ireo mpanondrana ondry ka nahatakatra fa ny Tompo no niteny tamin’izay nataoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy aho tamin’ireto mpanondrana ondry:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha heverinareo fa mety, dia omeo ahy ny karamako; fa raha tsy izany kosa, dia aoka ihany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia naloany ny karamako sekela volafotsy telopolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sekela volafotsy telopolo '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: no vidin’ny andevo iray araka ny Fanaf 21.32. Io koa no vola azon’i Jodasy ho sandan’ny famadihany, jereo Mt 26.15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy ny Tompo tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ento any amin’ny mpandrendrika azy izany volabe nanombanany Ahy izany!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia noraisiko ny sekela volafotsy telopolo ka nentiko tany amin’ny mpandrendrika tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tao an-tempolin’i Jerosalema dia nisy mpandrendrika mpamadika ho vongana ireo karazana metaly aterin’ny mpivavaka.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Avy eo dia notapahiko koa ilay tehina «Firaisankina», hanafoanana ny firalahian’i Joda sy i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny mpaminany eto dia mety mampahatsiaro ny fisarahana nitranga tokony ho tamin’ny taona 328 teo amin’ny Jiosy tao Jerosalema (Joda) sy ny Samaritanina* (Israely).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy indray ny Tompo tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raiso ankehitriny ny toeran’ny mpiandry adala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa indro Aho hampijoro mpiandry vaovao eto amin’ity tany ity, dia mpiandry izay tsy hanan-draharaha ny ondry misy mitady hamono na hikatsaka ny very na hitsabo ny marary na hikarakara ny mbola matanjaka; fa dia hihinana ny henan’izay matavy kosa izy sady hamaky ny kitrony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lozan’ny mpiandry adala
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mandao ny ondriny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enga anie ny sabatra handrotika ny sandriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanapotsitra ny masony ankavanana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia halemy hatrany anie ny sandriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hahita intsony ny masony ankavanana!
