document_id: 1KI.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fisehoan’ny Tompo fanindroany tamin’i Salômôna
  - type: heading
    content: (Jereo 2 Tan 7.11-22)
  - type: text
    content: 'Rehefa vitan’i Salômôna ny fanaovana ny tranon’ny TOMPO sy ny lapan’andriamanjaka ary izay rehetra niriny hatao, '
  '10':
  - type: text
    content: 'I Hirama mpanjakan’i Tiro no nanome an’i Salômôna ny hazo sedera sy ny hazo kipreso ary ny volamena rehetra nilainy nenti-nanaovana ny tranon’ny TOMPO sy ny lapan’andriamanjaka. Nony afaka ny roapolo taona nanoneran’i Salômôna ireo trano roa ireo, dia nomeny tanàna roapolo tany amin’ny faritr’i Galilea i Hirama. '
  '12':
  - type: text
    content: 'Koa niala tany Tiro i Hirama mba hijery ireo tanàna ireo, nefa tsy nisy tiany. '
  '13':
  - type: text
    content: 'Dia hoy izy: «Tsy misy dikany amiko ireo tanàna nomenao ahy ireo, ry Salômôna rahalahiko». Izany no mbola anaovana izany faritra izany mandraka androany hoe «Tany Kabòla'
  - type: note
    content: Ny anarana hoe Kabòla dia mampahatsiaro teny hebreo izay midika hoe toy ny tsy misy.
  - type: text
    content: '». '
  '14':
  - type: text
    content: I Hirama anefa nampanatitra volamena telo taonina sy sasany ihany ho an’ny mpanjaka.
  '15':
  - type: text
    content: Izao no endriky ny asa anterivozona nampanaovin’i Salômôna hanamboarana ny tranon’ny TOMPO sy ny lapan’andriamanjaka, ny tokotany Milao
  - type: note
    content: Teo aloha dia nisy hady na faritra iva izay nampisaraka ny tanànan’i Davida, tao atsimo, sy ny kianjan’ny tempoly, tao avaratra; ary i Salômôna no nanolotra io faritra iva io (Milao =fanotofana).
  - type: text
    content: ', ny mandan’i Jerosalema mbamin’ny tanànan’i Hatsôra sy i Megidao ary i Gezera. '
  '16':
  - type: text
    content: 'Notafihin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta mantsy i Gezera, ka azony ary nodorany rehefa avy naripany ho faty ny Kanahanita mponina tao; dia nataony fanomezana ho an-janany vavy vadin’i Salômôna izany, '
  '17':
  - type: text
    content: 'ka namboarin’i Salômôna indray. Namboarin’i Salômôna ihany koa i Bety-Hôrôna ambany, '
  '18':
  - type: text
    content: 'i Bahalato, i Tamara any an-taniefitra, '
  '19':
  - type: text
    content: ary ny tanàna rehetra nataony fitahirizam-bokatra na fitobian-kalesy na fitoeran-tsoavaly. Natsangany avokoa izay rehetra tiany haorina tao Jerosalema sy tany Libano ary manerana ny tany nofeheziny. Izao àry no endriky ny asa anterivozona nampanaovin’i Salômôna
  - type: note
    content: Io fehezanteny farany io, izay famerenana ny fiandohan’ny and 15, dia asisika eto hahamora ny fahazoan-kevitra.
  - type: text
    content: ':'
  '2':
  - type: text
    content: dia nisehoan’ny TOMPO tahaka ilay nisehoany taminy tao Gibehôna
  - type: note
    content: Jereo 3.4-15.
  - type: text
    content: ' indray izy, '
  '20':
  - type: text
    content: 'Mbola nisy tavela teo amin’ny tany ireo antokon’olona isan-karazany, dia ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' sy Hetita mbamin’ny Perizita sy Hivita ary Jebosita, izay samy tsy anisan’ny Israelita. '
  '21':
  - type: text
    content: 'Mbola nisy tavela teo tokoa ny taranak’ireo fa tsy naringan’ny Israelita, ka dia nampanaovin’i Salômôna asa fanompoana izay tohiziny mandraka androany. '
  '22':
  - type: text
    content: 'Ny Israelita kosa tsy mba nampanaovin’i Salômôna izany, fa narotsany ho miaramila na ho manamboninahitra na ho mpitari-tafika na ho mpiantafika voafantina na ho mpitondra kalesy na ho mpitaingin-tsoavaly. '
  '23':
  - type: text
    content: Ary ny lehiben’ireo mpanara-maso ny asa nampanaovin’i Salômôna kosa dia nisy 250 lahy izay nifehy ny olona mpanatontosa ny asa.
  '24':
  - type: text
    content: Rehefa niala tao an-
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ' ny zanakavavin’ny Farao hankany amin’ny trano naorina ho azy, izay vao namboarin’i Salômôna ny tokotany atao hoe Milao.'
  '25':
  - type: text
    content: 'Intelo isan-taona i Salômôna no nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorom-pihavanana teo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' izay naoriny ho an’ny TOMPO. Ary nampandoro vovo-javamanitra koa izy ho fanajana ny TOMPO. Izany no nampiasany ny tempoly'
  - type: note
    content: 'Intelo isan-taona: jereo Eks 23.17; 34.23; Deot 16.16.'
  - type: text
    content: .
  '26':
  - type: text
    content: 'Ary i Salômôna mpanjaka nanao sambo tao Hetsiôny-Gebera akaikin’i Elôta eo amoron’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: ' any amin’ny tany Edôma. '
  '27':
  - type: text
    content: 'Dia nalefan’i Hirama tamin’ireo sambo ireo ny tantsambony izay matilò nahay ranomasina mba hiaraka amin’ny tantsambon’i Salômôna. '
  '28':
  - type: text
    content: Ary tonga tany Ôfira
  - type: note
    content: 'Ôfira: tany tsy mazava loatra ny misy azy, angamba ao atsimon’ny tany saikanosin’i Arabia, na mety lavidavitra kokoa any amorontsirak’i Afrika na any India.'
  - type: text
    content: ' ireo ka nahazo volamena 12 taonina mahery ary nitondra izany ho an’i Salômôna mpanjaka.'
  '3':
  - type: text
    content: 'ka nilazany hoe:'
  - type: text
    content: '–Efa reko ny vavaka amam-pifonana nataonao tamiko; koa efa voatokako ho Ahy ity trano nataonao ity mba hampitoerako mandrakizay ny voninahitro; ka ho ao aminy mandrakariva ny fiahiako anareo sy ny fitiavako anareo. '
  '4':
  - type: text
    content: 'Ianao kosa, raha mizotra eo anatrehako tahaka ny nizoran’i Davida rainao tamin’ny fo tsotra sy mahitsy, ka manao araka izay rehetra andidiako anao sy mitandrina ny lalàna amam-pitsipiko, '
  '5':
  - type: text
    content: dia hampaharitra mandrakizay ny sezafiandrianam-panjakanao amin’i Israely Aho, araka ny nampanantenaiko an’i Davida rainao ka nilazako fa tsy ho diso taranaka handimby izy eo amin’ny sezafiandrianan’i Israely
  - type: note
    content: Jereo 2.4.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Nefa kosa raha miala amiko ianareo sy ny taranakareo, ka tsy mitandrina ny didy aman-dalàna izay napetrako teo anoloanareo fa mandeha manompo andriamani-kafa sy miankohoka eo anatrehany hitsaoka azy, '
  '7':
  - type: text
    content: 'dia hongotako ianareo, ry Israelita, tsy ho amin’ny tany izay nomeko anareo; ary hariako lavitra Ahy ity tempoly izay natokako hanajana Ahy ity. Amin’izay ianareo Israelita dia ho tonga fandatsa sy fanaraby any amin’ny firenen-kafa rehetra. '
  '8':
  - type: text
    content: 'Na dia avobe aza ity tempoly ity fahiny, dia hivarahontsana izay rehetra mandalo eo akaikiny ka hanontany hoe: «Nahoana no dia nataon’ny TOMPO toy izao ity tany ity sy ity tempoly ity'
  - type: note
    content: Jereo 2 Mp 25.9; 2 Tan 36.19.
  - type: text
    content: '?» '
  '9':
  - type: text
    content: 'Ary hisy olona hamaly hoe: «Satria nilaozan’ny Israelita ny TOMPO Andriamaniny, dia Ilay nitondra ny razany niala tany Ejipta; ary nifikitra tamin’andriamani-kafa ireo sady niankohoka teo anatrehany sy nanompo azy, ka dia nampiharan’ny TOMPO izao loza isan-karazany izao.»'
  - type: heading
    content: Asa samihafa nataon’i Salômôna
  - type: heading
    content: (Jereo 2 Tan 8.1-18)
