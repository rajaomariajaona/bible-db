    marker-yv: yv-n
  - type: text
    text: ' ity, vonjeo ny tenanao, raha '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: ' tokoa Ianao, ary midîna avy eo amin’ny hazofijaliana!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Naneso an’i Jesoa toy izany koa ny lohandoha-mpisorona mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: '–Namonjy olon-kafa Izy, fa ny tenany tsy hainy vonjena. Mpanjakan’i Israely hono Izy, koa ankehitriny aoka hidina avy eo amin’ny hazofijaliana, dia hinoanay. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Andriamanitra no itokiany; koa ankehitriny, raha tia Azy Andriamanitra, dia aoka hanafaka Azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 22.9.
    marker-yv: yv-n
  - type: text
    text: ', fa hoy Izy manko hoe: «Zanak’Andriamanitra Aho.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Dia nandatsa Azy toy izany koa ireo jiolahy nohomboana tamin’ny hazofijaliana niaraka taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miala aina i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 15.33-41; Lk 23.44-49; Jôh 19.28-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Hatramin’ny mitataovovonana dia nanomboka rakotra haizina ny faritany manontolo, ka naharitra hatramin’ny telo tolakandro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary tamin’ny telo tolakandro teo ho eo i Jesoa dia niantso tamin’ny feo mahery nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ely, Ely, lamà sabaktàny? (izany hoe: «Andriamanitro ô, Andriamanitro ô, nahoana no dia nilaozanao Aho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 22.2.
    marker-yv: yv-n
  - type: text
    text: ?»)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ny sasany tamin’ireo olona nijanona teo, raha nandre izany, dia niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Miantso an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Elià
  - type: text
    text: ' ny anao!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Niaraka tamin’izay dia nihazakazaka ny anankiray tamin-dry zareo naka spaonjy; dia novontosany vinaingitra ilay spaonjy ary notohiziny volotara ka natohony an’i Jesoa mba hotsentsefiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 69.22.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Fa ny sasany kosa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avelao hoe hojerentsika raha ho avy hamonjy Azy tokoa i Elià!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Fa niantso tamin’ny feo mahery indray i Jesoa, dia niala aina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Ary indro ny efitra lamba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 26.31-33.
    marker-yv: yv-n
  - type: text
    text: ' tao amin’ny Toeramasina fa nitriatra nizara roa hatrany ambony ka hatrany ambany. Dia nihorohoro ny tany; nitresaka ny vatolampy; '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'ary nisokatra ny fasana ka maro ny olona anisan’ny vahoakan’Andriamanitra efa nodimandry no velona indray. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Dia niala tao am-pasana ireo olona ireo rehefa nitsangana velona i Jesoa ary niditra tao Jerosalema tanàna masina izy ireo, ka niseho tamin’olona maro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary ilay kapiteny sy ireo miaramila niambina an’i Jesoa niaraka taminy kosa, raha vao nahita ny horohorontany sy ny zava-nitranga, dia raiki-tahotra mafy sady loa-bolana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tena '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: ' tokoa io Lehilahy io!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Nisy vehivavy maro koa teo, nitazana avy teny lavidavitra teny: dia ireo niaraka tamin’i Jesoa hatrany Galilea'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.55 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hatrany Galilea: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe hatramin’ny nanombohan’i Jesoa ny asa fanompoany ampahibemaso.
    marker-yv: yv-n
  - type: text
    text: ' ka nanampy Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Anisan’ireo i Maria avy any Magdalà, sy i Maria renin-dry i Jakôba sy i Jôsefa mirahalahy, ary ny vadin’i Zebedeo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Alevina i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 15.42-47; Lk 23.50-56; Jôh 19.38-42)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
