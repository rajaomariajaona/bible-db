    - type: text
      text: '40'
  - type: text
    text: 'ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry Ilay mandrava ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' sy manorina azy anatin’ny telo andro'
  - type: usfm
    marker: f
