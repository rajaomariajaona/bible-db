document_id: MAT.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Entina eo anatrehan’i Pilato governora i Jesoa
  - type: heading
    content: (Jereo Mk 15.1; Lk 23.1-2; Jôh 18.28-32)
  - type: text
    content: 'Nony maraina ny andro, dia nikaon-doha avokoa ny lohandoha-mpisorona sy ny '
  - type: text
    content: loholon
  - type: text
    content: '’ny vahoaka jiosy hamelezana an’i Jesoa, mba hampanamelohana Azy ho faty. '
  '10':
  - type: text
    content: ary nomeko hividianana ny sahan’ny mpanefy vilany, araka ny nandidian’ny Tompo
  - type: note
    content: Mifampidipiditra eto Za 11.12-13 sy Jer 18.2-3; 19.1-2; 32.6-15.
  - type: text
    content: ' ahy.»'
  - type: heading
    content: Alain’i Pilato am-bava i Jesoa
  - type: heading
    content: (Jereo Mk 15.2-5; Lk 23.3-5; Jôh 18.33-38)
  '11':
  - type: text
    content: 'Dia nijoro teo anatrehan’ny governora i Jesoa ary nanontany Azy ny governora nanao hoe:'
  - type: text
    content: –Ianao ve no Mpanjakan’ny Jiosy?
  - type: text
    content: 'Dia hoy i Jesoa:'
  - type: text
    content: –Anao izany teny izany!
  '12':
  - type: text
    content: 'Fa raha niampanga Azy ny lohandoha-mpisorona sy ny '
  - type: text
    content: loholona
  - type: text
    content: ', dia tsy novalian’i Jesoa akory. '
  '13':
  - type: text
    content: 'Tamin’izay i '
  - type: text
    content: Pilato
  - type: text
    content: ' dia niteny tamin’i Jesoa hoe:'
  - type: text
    content: –Tsy renao ve izany zavatra maro iampangany Anao izany?
  '14':
  - type: text
    content: Fa tsy namaly an’i Pilato akory i Jesoa na indraim-bava aza, hany ka gaga mihitsy ny governora.
  - type: heading
    content: Voaheloka ho faty i Jesoa
  - type: heading
    content: (Jereo Mk 15.6-15; Lk 23.13-25; Jôh 18.39–19.16)
  '15':
  - type: text
    content: 'Ary fanaon’ny governora isaky ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ' ny mandefa mpigadra anankiray, dia izay tian’ny vahoaka. '
  '16':
  - type: text
    content: Nisy mpigadra malaza atao hoe [Jesoa] Barabasy
  - type: note
    content: 'Jesoa Barabasy: misy stf maro tsy ahitana ny hoe Jesoa fa dia Barabasy fotsiny ihany; kanefa jereo 27.17.'
  - type: text
    content: ' tamin’izay; '
  '17':
  - type: text
    content: 'koa dia ny vahoaka tafavory no nitenenan’i '
  - type: text
    content: Pilato
  - type: text
    content: ' hoe:'
  - type: text
    content: –Iza no tianareo halefako ho anareo, i [Jesoa] Barabasy sa i Jesoa ilay atao hoe Kristy?
  '18':
  - type: text
    content: Fantatr’i Pilato fa fialonana no nanoloran-dry zareo an’i Jesoa, ilay atao hoe Kristy.
  '19':
  - type: text
    content: 'Ary raha mbola nipetraka teo amin’ny fitsarana iny i Pilato, dia naniraka olona ny vadiny hilaza aminy hoe: «Aza manao na inona na inona amin’io olo-marina io, fa nampahory ahy be ihany izay nanofisako Azy any naraina izay!»'
  '2':
  - type: text
    content: 'Dia nampamatotra Azy ry zareo sy nitondra Azy ary nanolotra Azy an’i '
  - type: text
    content: Pilato
  - type: text
    content: ' governora rômanina.'
  - type: heading
    content: Mananton-tena i Jodasy Iskariôta
  - type: heading
    content: (Jereo Asa 1.18-19)
  '20':
  - type: text
    content: 'Ny lohandoha-mpisorona sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' kosa dia nitaona ny vahoaka mba hitaky ny handefasana an’i Barabasy ary ny hamonoana an’i Jesoa. '
  '21':
  - type: text
    content: 'Dia niteny tamin’ny vahoaka indray i Pilato nanao hoe:'
  - type: text
    content: –Iza amin’izy roa lahy ireto no tianareo halefako ho anareo?
  - type: text
    content: 'Ka hoy ny vahoaka:'
  - type: text
    content: –I Barabasy!
  '22':
  - type: text
    content: 'Dia nanontany azy ireo i Pilato hoe:'
  - type: text
    content: –Ahoana kosa àry no hataoko amin’i Jesoa, ilay atao hoe Kristy?
  - type: text
    content: 'Fa novalian’izy rehetra hoe:'
  - type: text
    content: –Aoka Izy hohomboana amin’ny hazofijaliana!
  '23':
  - type: text
    content: 'Dia hoy ny governora:'
  - type: text
    content: –Fa inona ary no ratsy nataony?
  - type: text
    content: 'Kanjo vao mainka koa niantsoantso mafy ny vahoaka nanao hoe:'
  - type: text
    content: –Aoka Izy hohomboana amin’ny hazofijaliana!
  '24':
  - type: text
    content: Nony hitan’i Pilato fa tsy nahomby izy fa vao mainka nitombo aza ny tabataba, dia naka rano izy ka nanasa tanana teo anatrehan’ny vahoaka
  - type: note
    content: Ampit Deot 21.6-8.
  - type: text
    content: ' sady nanao hoe:'
  - type: text
    content: –Afa-tsiny amin’ny hahafatesan’io Lehilahy io aho! Raharahanareo ny anareo.
  '25':
  - type: text
    content: 'Dia izao no navalin’ny vahoaka rehetra:'
  - type: text
    content: –Aoka ho zakainay sy ny taranakay ny fahafatesany!
  '26':
  - type: text
    content: Tamin’izay dia nalefan’i Pilato ho azy ireo i Barabasy; fa i Jesoa kosa nasain’i Pilato nokapohina ary natolony mba hohomboana amin’ny hazofijaliana.
  - type: heading
    content: Esoin’ny miaramila rômanina i Jesoa
  - type: heading
    content: (Jereo Mk 15.16-20; Jôh 19.2-3)
  '27':
  - type: text
    content: 'Tamin’izay dia nentin’ny miaramilan’i '
  - type: text
    content: Pilato
  - type: text
    content: ' ho any amin’ny lapan’ny governora i Jesoa ary novorîn’ireo hankeo amin’i Jesoa ny tarika miaramila iray manontolo. '
  '28':
  - type: text
    content: Dia nendahin’ireto miaramila ny fitafian’i Jesoa, ary akanjobe jaky
  - type: note
    content: 'akanjobe jaky: fitondran’ny miaramila rômanina.'
  - type: text
    content: ' no nampitafîny Azy; '
  '29':
  - type: text
    content: 'avy eo dia nandrandrana fehiloha tsilo ry zareo ka nasatrony teo an-dohany, ary nampitazona volotara ny tanany ankavanana. Dia nandohalika teo anatrehan’i Jesoa ireto miaramila sady naneso Azy hoe:'
  - type: text
    content: –Arahaba, ry Mpanjakan’ny Jiosy!
  '3':
  - type: text
    content: 'Tamin’izay i Jodasy, ilay nanolotra an’i Jesoa, dia nahita fa voaheloka ho faty i Jesoa. Ary nanenina i Jodasy ka namerina ny sekela volafotsy telopolo tamin’ny lohandoha-mpisorona sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Dia nororan-dry zareo Izy ary nalainy ilay volotara ka nikapohany ny lohany. '
  '31':
  - type: text
    content: Nony avy naneso Azy toy izany ireo miaramila, dia nesorin’ireo ny akanjobe teny aminy ka nampanaoviny Azy indray ny fitafiany; ary dia nentiny Izy hohomboana amin’ny hazofijaliana.
  - type: heading
    content: Homboana amin’ny hazofijaliana i Jesoa
  - type: heading
    content: (Jereo Mk 15.21-32; Lk 22.26-43; Jôh 19.17-27)
  '32':
  - type: text
    content: 'Vao tafavoaka ny tanàna ireo miaramila, dia tojo lehilahy sireneanina atao hoe Simôna, ka nanery azy hitondra ny hazofijalian’i Jesoa. '
  '33':
  - type: text
    content: 'Rehefa tonga teo amin’ny toerana atao hoe Gôlgôtà (izay midika hoe Ikarandoha), '
  '34':
  - type: text
    content: dia nomen-dry zareo divay miharo zava-mangidy
  - type: note
    content: Jereo Sal 69.22.
  - type: text
    content: ' i Jesoa hosotroiny; fa nony nanandrana izany Izy, dia tsy nety nisotro.'
  '35':
  - type: text
    content: Dia nohomboan’ny miaramila tamin’ny hazofijaliana Izy, ary nanaovany loka no fizara ny fitafiany
  - type: note
    content: Jereo Sal 22.19.
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Vita izay, dia nipetraka niambina Azy teo ry zareo. '
  '37':
  - type: text
    content: 'Ary teo ambonin’ny lohan’i Jesoa dia nasiany soratra milaza ny nanamelohana Azy hoe: «Ity no Jesoa, ilay Mpanjakan’ny Jiosy.» '
  '38':
  - type: text
    content: Tamin’izay dia nisy jiolahy roa nohomboana tamin’ny hazofijaliana niaraka tamin’i Jesoa, ka ny anankiray teo ankavanany ary ny anankiray teo ankaviany
  - type: note
    content: Ampit Is 53.12.
  - type: text
    content: .
  '39':
  - type: text
    content: Ireo mpandalo kosa dia nanevateva an’i Jesoa sady nihifikifi-doha
  - type: note
    content: Jereo Sal 22.8.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'sady nilaza hoe:'
  - type: text
    content: –Nanota aho fa nanolotra olona tsy manan-tsiny hovonoina.
  - type: text
    content: 'Fa hoy ireo:'
  - type: text
    content: –Ahoanay inona izany? Raharahanao ny anao!
  '40':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: '–Ry Ilay mandrava ny '
  - type: text
    content: tempoly
  - type: text
    content: ' sy manorina azy anatin’ny telo andro'
  - type: note
    content: Jereo Mt 26.21; Jôh 2.19.
  - type: text
    content: ' ity, vonjeo ny tenanao, raha '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ' tokoa Ianao, ary midîna avy eo amin’ny hazofijaliana!'
  '41':
  - type: text
    content: 'Naneso an’i Jesoa toy izany koa ny lohandoha-mpisorona mbamin’ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' ka nanao hoe:'
  '42':
  - type: text
    content: '–Namonjy olon-kafa Izy, fa ny tenany tsy hainy vonjena. Mpanjakan’i Israely hono Izy, koa ankehitriny aoka hidina avy eo amin’ny hazofijaliana, dia hinoanay. '
  '43':
  - type: text
    content: Andriamanitra no itokiany; koa ankehitriny, raha tia Azy Andriamanitra, dia aoka hanafaka Azy
  - type: note
    content: Jereo Sal 22.9.
  - type: text
    content: ', fa hoy Izy manko hoe: «Zanak’Andriamanitra Aho.»'
  '44':
  - type: text
    content: Dia nandatsa Azy toy izany koa ireo jiolahy nohomboana tamin’ny hazofijaliana niaraka taminy.
  - type: heading
    content: Miala aina i Jesoa
  - type: heading
    content: (Jereo Mk 15.33-41; Lk 23.44-49; Jôh 19.28-30)
  '45':
  - type: text
    content: 'Hatramin’ny mitataovovonana dia nanomboka rakotra haizina ny faritany manontolo, ka naharitra hatramin’ny telo tolakandro izany. '
  '46':
  - type: text
    content: 'Ary tamin’ny telo tolakandro teo ho eo i Jesoa dia niantso tamin’ny feo mahery nanao hoe:'
  - type: text
    content: '–Ely, Ely, lamà sabaktàny? (izany hoe: «Andriamanitro ô, Andriamanitro ô, nahoana no dia nilaozanao Aho'
  - type: note
    content: Sal 22.2.
  - type: text
    content: ?»)
  '47':
  - type: text
    content: 'Ny sasany tamin’ireo olona nijanona teo, raha nandre izany, dia niteny hoe:'
  - type: text
    content: '–Miantso an’i '
  - type: text
    content: Elià
  - type: text
    content: ' ny anao!'
  '48':
  - type: text
    content: Niaraka tamin’izay dia nihazakazaka ny anankiray tamin-dry zareo naka spaonjy; dia novontosany vinaingitra ilay spaonjy ary notohiziny volotara ka natohony an’i Jesoa mba hotsentsefiny
  - type: note
    content: Ampit Sal 69.22.
  - type: text
    content: '. '
  '49':
  - type: text
    content: 'Fa ny sasany kosa nanao hoe:'
  - type: text
    content: –Avelao hoe hojerentsika raha ho avy hamonjy Azy tokoa i Elià!
  '5':
  - type: text
    content: Sady nanipy ny vola tao amin’ny Toeramasina i Jodasy no niala teo, ary dia lasa nananton-tena.
  '50':
  - type: text
    content: Fa niantso tamin’ny feo mahery indray i Jesoa, dia niala aina.
  '51':
  - type: text
    content: Ary indro ny efitra lamba
  - type: note
    content: Ampit Eks 26.31-33.
  - type: text
    content: ' tao amin’ny Toeramasina fa nitriatra nizara roa hatrany ambony ka hatrany ambany. Dia nihorohoro ny tany; nitresaka ny vatolampy; '
  '52':
  - type: text
    content: 'ary nisokatra ny fasana ka maro ny olona anisan’ny vahoakan’Andriamanitra efa nodimandry no velona indray. '
  '53':
  - type: text
    content: Dia niala tao am-pasana ireo olona ireo rehefa nitsangana velona i Jesoa ary niditra tao Jerosalema tanàna masina izy ireo, ka niseho tamin’olona maro.
  '54':
  - type: text
    content: 'Ary ilay kapiteny sy ireo miaramila niambina an’i Jesoa niaraka taminy kosa, raha vao nahita ny horohorontany sy ny zava-nitranga, dia raiki-tahotra mafy sady loa-bolana hoe:'
  - type: text
    content: '–Tena '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ' tokoa io Lehilahy io!'
  '55':
  - type: text
    content: 'Nisy vehivavy maro koa teo, nitazana avy teny lavidavitra teny: dia ireo niaraka tamin’i Jesoa hatrany Galilea'
  - type: note
    content: 'hatrany Galilea: izany hoe hatramin’ny nanombohan’i Jesoa ny asa fanompoany ampahibemaso.'
  - type: text
    content: ' ka nanampy Azy. '
  '56':
  - type: text
    content: Anisan’ireo i Maria avy any Magdalà, sy i Maria renin-dry i Jakôba sy i Jôsefa mirahalahy, ary ny vadin’i Zebedeo.
  - type: heading
    content: Alevina i Jesoa
  - type: heading
    content: (Jereo Mk 15.42-47; Lk 23.50-56; Jôh 19.38-42)
  '57':
  - type: text
    content: Nony hariva ny andro, dia tonga ity lehilahy mpanankarena avy any amin’ny tanàna atao hoe Harimatia
  - type: note
    content: 'Harimatia: tanàna tokony ho 35 km avaratra andrefan’i Jerosalema.'
  - type: text
    content: '; i Jôsefa no anarany ary mpianatr’i Jesoa ihany koa izy. '
  '58':
  - type: text
    content: 'Nanatona an’i '
  - type: text
    content: Pilato
  - type: text
    content: ' izy nangataka ny vatan’i Jesoa; ary dia nasain’i Pilato nomena azy izany. '
  '59':
  - type: text
    content: 'Nalain’i Jôsefa ny vatan’i Jesoa, dia nofonosiny lamba sarobidy madio '
  '6':
  - type: text
    content: 'Ireo lohandoha-mpisorona kosa naka ny vola ary niteny hoe:'
  - type: text
    content: –Tsy azo alatsaka amin’ny rakitry ny tempoly ireto vola ireto satria vidin-dra
  - type: note
    content: vidin-dra na hoe tambin’aina. Jereo 26.15 sy nta.
  - type: text
    content: .
  '60':
  - type: text
    content: 'ary napetrany tao amin’ny fasana vaovao izay nampandavahany ho an’ny tenany tamin’ny vatolampy. Rehefa avy nanakodia vato makadiry teo amin’ny vavafasana i Jôsefa, dia lasa nandeha. '
  '61':
  - type: text
    content: Ary teo i Maria avy any Magdalà sy ilay Maria anankiray hafa ka nipetraka tandrifin’ny fasana.
  - type: heading
    content: Fiambenana ny fasan’i Jesoa
  '62':
  - type: text
    content: 'Ny ampitson’iny andro fiomanana amin’ny sabata iny, dia niara-nivory tany amin’i '
  - type: text
    content: Pilato
  - type: text
    content: ' ny lohandoha-mpisorona sy ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' '
  '63':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: '–Tompoko, tsaroanay fa fony mbola velona iny mpamitaka iny dia izao no teniny: «Amin’ny andro fahatelo, dia hitsangana velona Aho'
  - type: note
    content: Jereo 16.21; 17.23;20.19.
  - type: text
    content: '.» '
  '64':
  - type: text
    content: 'Koa asaovy ambenana ny fasany ambara-pahafaky ny andro fahatelo, fandrao avy ireo mpianany hangalatra ny fatiny ka hilaza amin’ny vahoaka hoe: «Nitsangana velona avy tany amin’ny maty Izy»; ka ho ratsy kokoa ny fitaka farany noho ny voalohany.'
  '65':
  - type: text
    content: 'Dia hoy i Pilato tamin-dry zareo:'
  - type: text
    content: –Manana mpiambina ianareo, koa ndeha ataovy tsara antoka ny fasana araka izay fantatrareo fa mety.
  '66':
  - type: text
    content: 'Dia lasa izy ireo ka nataony tsara antoka ny fasana: nasiany tombokase ny vato hidim-pasana sady nametrahany mpiambina.'
  '7':
  - type: text
    content: 'Rehefa nikaon-doha ry zareo, dia nampiasa ny vola hividianana ny sahan’ny mpanefy vilany mba hatao fasam-bahiny. '
  '8':
  - type: text
    content: 'Izany no iantsoana io saha io mandraka androany hoe Sahan-dra. '
  '9':
  - type: text
    content: 'Tamin’izay dia tanteraka ilay voalazan’ny Tompo tamin’ny alalan’i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe: «Nalaiko ny sekela volafotsy telopolo (karaman’ilay nokaramain’ny Israelita sasany) '
