  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Nony hariva ny andro, dia tonga ity lehilahy mpanankarena avy any amin’ny tanàna atao hoe Harimatia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.57 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Harimatia: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tokony ho 35 km avaratra andrefan’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: '; i Jôsefa no anarany ary mpianatr’i Jesoa ihany koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Nanatona an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' izy nangataka ny vatan’i Jesoa; ary dia nasain’i Pilato nomena azy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Nalain’i Jôsefa ny vatan’i Jesoa, dia nofonosiny lamba sarobidy madio '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'ary napetrany tao amin’ny fasana vaovao izay nampandavahany ho an’ny tenany tamin’ny vatolampy. Rehefa avy nanakodia vato makadiry teo amin’ny vavafasana i Jôsefa, dia lasa nandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Ary teo i Maria avy any Magdalà sy ilay Maria anankiray hafa ka nipetraka tandrifin’ny fasana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiambenana ny fasan’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ny ampitson’iny andro fiomanana amin’ny sabata iny, dia niara-nivory tany amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tompoko, tsaroanay fa fony mbola velona iny mpamitaka iny dia izao no teniny: «Amin’ny andro fahatelo, dia hitsangana velona Aho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.63 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 16.21; 17.23;20.19.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Koa asaovy ambenana ny fasany ambara-pahafaky ny andro fahatelo, fandrao avy ireo mpianany hangalatra ny fatiny ka hilaza amin’ny vahoaka hoe: «Nitsangana velona avy tany amin’ny maty Izy»; ka ho ratsy kokoa ny fitaka farany noho ny voalohany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Dia hoy i Pilato tamin-dry zareo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manana mpiambina ianareo, koa ndeha ataovy tsara antoka ny fasana araka izay fantatrareo fa mety.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Dia lasa izy ireo ka nataony tsara antoka ny fasana: nasiany tombokase ny vato hidim-pasana sady nametrahany mpiambina.'
