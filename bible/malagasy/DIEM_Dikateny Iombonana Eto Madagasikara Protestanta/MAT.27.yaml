document_id: MAT.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Entina eo anatrehan’i Pilato governora i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 15.1; Lk 23.1-2; Jôh 18.28-32)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony maraina ny andro, dia nikaon-doha avokoa ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’ny vahoaka jiosy hamelezana an’i Jesoa, mba hampanamelohana Azy ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nampamatotra Azy ry zareo sy nitondra Azy ary nanolotra Azy an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' governora rômanina.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mananton-tena i Jodasy Iskariôta
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Asa 1.18-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’izay i Jodasy, ilay nanolotra an’i Jesoa, dia nahita fa voaheloka ho faty i Jesoa. Ary nanenina i Jodasy ka namerina ny sekela volafotsy telopolo tamin’ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sady nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nanota aho fa nanolotra olona tsy manan-tsiny hovonoina.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hoy ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoanay inona izany? Raharahanao ny anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sady nanipy ny vola tao amin’ny Toeramasina i Jodasy no niala teo, ary dia lasa nananton-tena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ireo lohandoha-mpisorona kosa naka ny vola ary niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy azo alatsaka amin’ny rakitry ny tempoly ireto vola ireto satria vidin-dra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'vidin-dra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tambin’aina.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Jereo 26.15 sy nta.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa nikaon-doha ry zareo, dia nampiasa ny vola hividianana ny sahan’ny mpanefy vilany mba hatao fasam-bahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izany no iantsoana io saha io mandraka androany hoe Sahan-dra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tamin’izay dia tanteraka ilay voalazan’ny Tompo tamin’ny alalan’i Jeremià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' hoe: «Nalaiko ny sekela volafotsy telopolo (karaman’ilay nokaramain’ny Israelita sasany) '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ary nomeko hividianana ny sahan’ny mpanefy vilany, araka ny nandidian’ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mifampidipiditra eto Za 11.12-13 sy Jer 18.2-3; 19.1-2; 32.6-15.
    marker-yv: yv-n
  - type: text
    text: ' ahy.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Alain’i Pilato am-bava i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 15.2-5; Lk 23.3-5; Jôh 18.33-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nijoro teo anatrehan’ny governora i Jesoa ary nanontany Azy ny governora nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao ve no Mpanjakan’ny Jiosy?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Anao izany teny izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha niampanga Azy ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ', dia tsy novalian’i Jesoa akory. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tamin’izay i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' dia niteny tamin’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy renao ve izany zavatra maro iampangany Anao izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa tsy namaly an’i Pilato akory i Jesoa na indraim-bava aza, hany ka gaga mihitsy ny governora.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voaheloka ho faty i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 15.6-15; Lk 23.13-25; Jôh 18.39–19.16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary fanaon’ny governora isaky ny fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' ny mandefa mpigadra anankiray, dia izay tian’ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nisy mpigadra malaza atao hoe [Jesoa] Barabasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.16 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Jesoa Barabasy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf maro tsy ahitana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesoa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fa dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Barabasy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fotsiny ihany; kanefa jereo 27.17.'
    marker-yv: yv-n
  - type: text
    text: ' tamin’izay; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'koa dia ny vahoaka tafavory no nitenenan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no tianareo halefako ho anareo, i [Jesoa] Barabasy sa i Jesoa ilay atao hoe Kristy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fantatr’i Pilato fa fialonana no nanoloran-dry zareo an’i Jesoa, ilay atao hoe Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha mbola nipetraka teo amin’ny fitsarana iny i Pilato, dia naniraka olona ny vadiny hilaza aminy hoe: «Aza manao na inona na inona amin’io olo-marina io, fa nampahory ahy be ihany izay nanofisako Azy any naraina izay!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' kosa dia nitaona ny vahoaka mba hitaky ny handefasana an’i Barabasy ary ny hamonoana an’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia niteny tamin’ny vahoaka indray i Pilato nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza amin’izy roa lahy ireto no tianareo halefako ho anareo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny vahoaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –I Barabasy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nanontany azy ireo i Pilato hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana kosa àry no hataoko amin’i Jesoa, ilay atao hoe Kristy?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa novalian’izy rehetra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka Izy hohomboana amin’ny hazofijaliana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy ny governora:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa inona ary no ratsy nataony?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Kanjo vao mainka koa niantsoantso mafy ny vahoaka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka Izy hohomboana amin’ny hazofijaliana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nony hitan’i Pilato fa tsy nahomby izy fa vao mainka nitombo aza ny tabataba, dia naka rano izy ka nanasa tanana teo anatrehan’ny vahoaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 21.6-8.
    marker-yv: yv-n
  - type: text
    text: ' sady nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Afa-tsiny amin’ny hahafatesan’io Lehilahy io aho! Raharahanareo ny anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia izao no navalin’ny vahoaka rehetra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ho zakainay sy ny taranakay ny fahafatesany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tamin’izay dia nalefan’i Pilato ho azy ireo i Barabasy; fa i Jesoa kosa nasain’i Pilato nokapohina ary natolony mba hohomboana amin’ny hazofijaliana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Esoin’ny miaramila rômanina i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 15.16-20; Jôh 19.2-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’izay dia nentin’ny miaramilan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' ho any amin’ny lapan’ny governora i Jesoa ary novorîn’ireo hankeo amin’i Jesoa ny tarika miaramila iray manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia nendahin’ireto miaramila ny fitafian’i Jesoa, ary akanjobe jaky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'akanjobe jaky: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fitondran’ny miaramila rômanina.
    marker-yv: yv-n
  - type: text
    text: ' no nampitafîny Azy; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'avy eo dia nandrandrana fehiloha tsilo ry zareo ka nasatrony teo an-dohany, ary nampitazona volotara ny tanany ankavanana. Dia nandohalika teo anatrehan’i Jesoa ireto miaramila sady naneso Azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Arahaba, ry Mpanjakan’ny Jiosy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nororan-dry zareo Izy ary nalainy ilay volotara ka nikapohany ny lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nony avy naneso Azy toy izany ireo miaramila, dia nesorin’ireo ny akanjobe teny aminy ka nampanaoviny Azy indray ny fitafiany; ary dia nentiny Izy hohomboana amin’ny hazofijaliana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Homboana amin’ny hazofijaliana i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 15.21-32; Lk 22.26-43; Jôh 19.17-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Vao tafavoaka ny tanàna ireo miaramila, dia tojo lehilahy sireneanina atao hoe Simôna, ka nanery azy hitondra ny hazofijalian’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa tonga teo amin’ny toerana atao hoe Gôlgôtà (izay midika hoe Ikarandoha), '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia nomen-dry zareo divay miharo zava-mangidy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 69.22.
    marker-yv: yv-n
  - type: text
    text: ' i Jesoa hosotroiny; fa nony nanandrana izany Izy, dia tsy nety nisotro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Dia nohomboan’ny miaramila tamin’ny hazofijaliana Izy, ary nanaovany loka no fizara ny fitafiany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 22.19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Vita izay, dia nipetraka niambina Azy teo ry zareo. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary teo ambonin’ny lohan’i Jesoa dia nasiany soratra milaza ny nanamelohana Azy hoe: «Ity no Jesoa, ilay Mpanjakan’ny Jiosy.» '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tamin’izay dia nisy jiolahy roa nohomboana tamin’ny hazofijaliana niaraka tamin’i Jesoa, ka ny anankiray teo ankavanany ary ny anankiray teo ankaviany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
