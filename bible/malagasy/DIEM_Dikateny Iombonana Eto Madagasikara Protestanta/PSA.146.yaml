  children:
  - type: text
    text: Aoka hidera ny TOMPO aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hidera ny TOMPO aho raha mbola miaina koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hankalaza ny Andriamanitro aho raha mbola velona koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza mba mitoky amin’ny mpanapaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia izay olombelona tsy afa-mamonjy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: vantany vao miala ny fofonain’ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miverina amin’ny vovoka niaviany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka amin’izay indrindra no rava ny fikasany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sambatra izay manana an’Andriamanitra ho Mpitahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay Andriamanitr’i Jakôba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sambatra izay mametraka ny fitokiany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ao amin’ny TOMPO Andriamaniny:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia Andriamanitra nanao ny lanitra sy ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ranomasina mbamin’izay rehetra ao amin’ireny
  - type: usfm
    marker: f
