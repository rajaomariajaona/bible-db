document_id: PSA.146,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny Tompo no mpiaro ny ory
  - type: text
    content: ' '
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  - type: text
    content: Aoka hidera ny TOMPO aho!
  '10':
  - type: text
    content: Hanjaka mandrakizay ny TOMPO,
  - type: text
    content: 'dia ny Andriamanitrao, ry '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ô,'
  - type: text
    content: amin’ny taona mifandimby.
  - type: text
    content: Haleloià!
  '2':
  - type: text
    content: Hidera ny TOMPO aho raha mbola miaina koa;
  - type: text
    content: hankalaza ny Andriamanitro aho raha mbola velona koa.
  '3':
  - type: text
    content: Aza mba mitoky amin’ny mpanapaka,
  - type: text
    content: 'dia izay olombelona tsy afa-mamonjy:'
  '4':
  - type: text
    content: vantany vao miala ny fofonain’ireo,
  - type: text
    content: dia miverina amin’ny vovoka niaviany izy;
  - type: text
    content: ka amin’izay indrindra no rava ny fikasany.
  '5':
  - type: text
    content: Sambatra izay manana an’Andriamanitra ho Mpitahy,
  - type: text
    content: dia ilay Andriamanitr’i Jakôba;
  - type: text
    content: sambatra izay mametraka ny fitokiany
  - type: text
    content: 'ao amin’ny TOMPO Andriamaniny:'
  '6':
  - type: text
    content: dia Andriamanitra nanao ny lanitra sy ny tany
  - type: text
    content: ary ny ranomasina mbamin’izay rehetra ao amin’ireny
  - type: note
    content: Jereo Asa 4.24; 14.15.
  - type: text
    content: ','
  - type: text
    content: mitandro fahamarinana hatrany
  '7':
  - type: text
    content: ka manome rariny ny ampahorîna
  - type: text
    content: ary manome sakafo ny noana.
  - type: text
    content: Ny TOMPO mamaha ny mpifatotra;
  '8':
  - type: text
    content: ny TOMPO mampahiratra ny jamba;
  - type: text
    content: ny TOMPO mampitraka ny mitanondrika;
  '9':
  - type: text
    content: ny TOMPO miaro ny vahiny
  - type: text
    content: sy manohana ny kamboty ama-mpitondratena;
  - type: text
    content: ny TOMPO mitia ny olo-marina
  - type: text
    content: fa mampibirioka kosa ny olon-dratsy.
