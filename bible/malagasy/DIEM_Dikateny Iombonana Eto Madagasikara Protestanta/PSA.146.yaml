  - type: text
    text: ka manome rariny ny ampahorîna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manome sakafo ny noana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny TOMPO mamaha ny mpifatotra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ny TOMPO mampahiratra ny jamba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny TOMPO mampitraka ny mitanondrika;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ny TOMPO miaro ny vahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manohana ny kamboty ama-mpitondratena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny TOMPO mitia ny olo-marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mampibirioka kosa ny olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hanjaka mandrakizay ny TOMPO,
- type: usfm
