      text: ary manome sakafo ny noana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO mamaha ny mpifatotra;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny TOMPO mampahiratra ny jamba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny TOMPO mampitraka ny mitanondrika;
  '9':
  - type: usfm
