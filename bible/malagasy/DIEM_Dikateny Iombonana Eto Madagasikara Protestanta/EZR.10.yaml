          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tamin’ny taranak’i Zakay dia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'i Sasay ary i Saray, '
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'i Hazarela sy i Selemià ary i Semarià, '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: mbamin’i Saloma sy i Amarià ary i Jôsefa;
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: tamin’ny taranak’i Nebao, dia ry i Jehiela sy i Matitià ary i Zabada sy i Zebinà mbamin’i Jadao sy i Jôela ary i Benaià.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo lehilahy rehetra ireo no samy efa naka vehivavy hafa firenena ho vadiny, sady efa niteraka ny vehivavy sasantsasany tamin’ireny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.44 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'sady... tamin’ireny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'rijan-teny hebreo manjavozavo ary dkt tsy azo antoka; misy dkt grika Septoazinta ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dia noroahina mbamin-janany ireo vehivavy ireo.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitsangana i Hezrà ka nampianiana ny lohandohan’ireo mpisorona levita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mpisorona levita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 17.9 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' sy ireo filohan’ny Israelita hanao araka izany tolokevitr’i Sekanià izany; ary dia nianiana ireo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’izay i Hezrà no niala teo anoloan’ny tranon’Andriamanitra ka nankany amin’ny efitranon’i Jôhanàna zanakalahin’i Eliasiba ary nitoetra tao; saingy tsy nety nihinan-kanina sy nisotro rano izy satria nalahelo tokoa noho ny fahadisoan’ireo Jiosy tafaverina avy any an-tsesitany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy teny nalefa eran’i Jerosalema sy i Joda ho an’ireo Israelita tafaverina avy any an-tsesitany mba hivory ao Jerosalema; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary na iza na iza tsy tonga anatin’ny telo andro, araka ny tenin’ireo lehibe sy loholona, dia horobaina ny fananany rehetra ary hesorina tsy ho anisan’ny fiangonana israelita izy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony afaka telo andro, izany hoe ny andro faharoapolon’ny volana fahasivy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'volana fahasivy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nôvambra-desambra, fotoana manorana.
      marker-yv: yv-n
    - type: text
      text: ', dia vory tao Jerosalema ny lehilahy rehetra tamin’i Joda sy i Benjamîna; ary nipetraka teo an-kianjan’ny tranon’Andriamanitra ny vahoaka rehetra ka samy nangovitra noho izany toe-draharaha izany, ary koa noho ny ranonorana be. '
