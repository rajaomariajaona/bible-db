document_id: EZR.10,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Roahin’ny Jiosy ireo vehivavy hafa firenena
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola nanao izany vavaka fieken-keloka izany i Hezrà sady nitomany sy niankohoka teo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’Andriamanitra
    - type: text
      text: ', dia nisy vahoaka israelita maro, lehilahy sy vehivavy mbamin’ny ankizy madinika, nivory nanodidina azy; ary nitomany mafy dia mafy izy rehetra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana i Hezrà ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry lehilahy israelita, efa nanao izay mahadiso tokoa ianareo satria naka vehivavy hafa firenena ho vadinareo ka nampitombo ny fahotan’ny firenentsika. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa samia ianareo miaiky heloka amin’ny TOMPO Andriamanitry ny razanareo sy manao ny sitrapony; ary misaraha amin’ny valovotaka mponin’ity tany ity sy amin’ny vehivavy hafa firenena nalainareo ho vady.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ny olona rehetra tafangona teo ka niredona mafy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Marina ny anao! Izay lazainao dia tsy maintsy hataonay. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nefa maro izahay ary ny andro manorana ka tsy mahatoetra eto alatrano izahay; sady raharaha tsy vita indray andro na indroa andro aza izao; fa maro izahay no efa nanota tamin’izany zavatra izany. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa aoka ny lehibentsika no hisolo toerana ny fiangonana manontolo; dia ny Israelita rehetra izay efa nanambady vehivavy hafa firenena no aoka hankatỳ amin’ny fotoanandro homena azy, miaraka amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' sy mpitsara isan-tanànany avy. Hotontosainay mihitsy izany raharaha izany mandra-pialan’ilay fahatezeran’Andriamanitsika mirehitra amintsika.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jônatàna zanakalahin’i Hasahela sy i Jahizeià zanakalahin’i Tikvà no hany nanohitra izany hevitra izany; ary niandany taminy koa i Mesolama sy ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' atao hoe Sabetahy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny Israelita hafa avy any an-tsesitany dia nanaraka izany avokoa. I Hezrà mpisorona kosa nifidy lehilahy izay loham-pianakaviana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Hezrà...: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rijan-teny hebreo manjavozavo ary dkt tsy azo antoka.
      marker-yv: yv-n
    - type: text
      text: ' araka ny tarika isany avy, sady samy voatonona anarana tsirairay; ka ireo lehilahy ireo no nipetraka handamina izany raharaha izany tamin’ny andro voalohan’ny volana fahafolo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka ny andro voalohany, tamin’ny volana voalohan’ny taona manaraka, vao vita lamina ny raharaha ny amin’ireo lehilahy rehetra naka vehivavy hafa firenena ho vady.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lisitry ny Jiosy nanambady vehivavy hafa firenena
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tamin’ireo taranaky ny mpisorona dia nisy naka vehivavy hafa firenena ho vady, ka ireto avy: tamin’ny taranak’i Jesoa mirahalahy avy, zanakalahin’i Jôtsadàka, dia ry i Mahaseià sy i Elihezera ary i Jariba sy i Gedalià; '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'nametra-teny izy efa-dahy fa handroaka ny vadiny sy hanolotra ondrilahy iray avy ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' fanalana ny otany;'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany no niteny i Sekanià, zanakalahin’i Jehiela sady anisan’ny taranak’i Helama, ka nanao tamin’i Hezrà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa nanao izay mahadiso amin’Ilay Andriamanitsika izahay, satria naka vehivavy hafa firenena anisan’ireo mponin’ity tany ity ho vadinay; nefa na izany aza, dia mbola misy fanantenana ihany ho an’i Israely. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: tamin’ny taranak’i Imera, dia ry i Hanany sy i Zebadià;
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: tamin’ny taranak’i Harima, dia ry i Mahaseià sy i Elià mbamin’i Semahià sy i Jehiela ary i Hozià;
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: tamin’ny taranak’i Pasehora, dia ry i Eliôhenay sy i Mahaseià mbamin’i Jismahela sy i Netaneela ary i Jôzabada sy i Elehasa.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny levita dia ireto avy: ry i Jozabada sy i Simehy mbamin’i Kelaià (atao hoe koa Kelità) sy i Petahià ary i Jehodà sy i Elihezera.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny mpihira dia i Eliasiba.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny mpiandry varavarana dia ry i Saloma sy i Telema ary i Ory.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny sarambabem-bahoaka israelita dia ireto avy: tamin’ny taranak’i Parehôsy dia ry i Ramià sy i Jizià ary i Malkià mbamin’ny Miamina sy i Elehazara ary i Malkià sy i Benaià;'
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: tamin’ny taranak’i Helama dia ry i Matanià sy i Zakarià mbamin’i Jehiela sy i Habdy ary i Jeremôta sy i Elià;
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: tamin’ny taranak’i Zatò dia ry i Eliôhenay sy i Eliasiba mbamin’i Matanià sy i Jeremôta ary i Zabada sy i Hazizà;
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: tamin’ny taranak’i Bebay dia ry i Jôhanàna sy i Hananià ary i Zabay sy i Hatlay;
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'tamin’ny taranak’i Banỳ dia ry i Mesolama sy i Malòka mbamin’i Hadaià sy i Jasoba ary i Seala sy i Jeremôta; '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Aoka hifanaiky amin’Ilay Andriamanitsika izahay fa handroaka mbamin-janany ireo vehivavy rehetra hafa firenena ireo. Harahinay ny anatra nataonao sy naroson’izay fatra-panaja ny didin’Andriamanitra; aoka hatao araka ny lalànany tokoa izany! '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: tamin’ny taranak’i Pahata-Môaba dia ry i Hadnà sy i Kelala ary i Benaià sy i Mahaseià mbamin’i Matanià sy i Betsalela ary i Binoy sy i Manase;
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny taranak’i Harîma dia ry i Elihezera sy i Jisià ary i Malkià sy i Semahià mbamin’i Simehôna
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: sy i Benjamîna ary i Malòka sy i Semarià;
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: tamin’ny taranak’i Hasoma dia ry i Matenay sy i Matatà ary i Zabada sy i Elifelety mbamin’i Jeremay sy i Manase ary i Simehỳ;
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'tamin’ny taranak’i Bony dia ry i Mahaday sy i Hamrama ary i Oela, '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'i Benaià sy i Bedià ary i Keloho, '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'i Vanià sy i Meromôta ary i Eliasiba, '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'i Matanià sy i Matenay ary i Jahasay, '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'i Banỳ sy i Binoy ary i Simehỳ, '
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'i Selemià sy i Natàna ary i Hadaià, '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mitsangàna fa adidinao izao raharaha izao; ary izahay koa vonon-kiaraka aminao. Aoka ho sahinao atao izany!
  '40':
  - type: usfm
    marker: m
    children:
    - type: text
      text: i Maknadebay sy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.40 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'i Maknadebay sy: '
      - type: usfm
