- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Manao fisaonana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ' ireo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa hirahina aho hanome azy ribà fehiloha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho solon’ny lavenona amin’ny lohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanome diloilo manitra ho solon’ny alahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fitafiana fitondra amin’ny fety
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho solon’ny toetra manjoretra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Amin’izay no hiantsoana azy ireo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hazo vokatry ny fitahiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saha nambolen’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanehoany ny famirapiratany.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Haorina indray ireo zavatra rava fahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatsangana indray ny trano nirodana taloha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hohavaozina ny tanàna rava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo efa simba hatry ny ela be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Vahiny no hitsangana hiandry ny ondry aman’osinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: olona avy any an-kafa no hiasa ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamboly voaloboka ho anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ianareo kosa dia hantsoina hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisorona
  - type: text
    text: ' ho an’ny TOMPO»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'na holazaina koa hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mpanao fanompoam-pivavahana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny Andriamanitsika.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanasoavana anareo ny fananan’ny firenen-kafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ianareo no higalabona amin’ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Efa nizaka henatra indroa heny ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady afa-baràka sy nandroran’ny olona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka ho solon’izany, dia hoy Izaho Tompo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handova anjara indroa heny eo amin’ny taniny ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanana fifaliana maharitra mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Satria Izaho TOMPO dia tia rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mankahala ny fandrobana an-kafetsena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: homeko onitra ara-pahamarinana ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanaovako fanekempihavanana mandrakizay.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho fantatra any amin’ny firenen-kafa ny taranakareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo anivon’ireo vahoaka ny solofonareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra mahita azy dia hiaiky
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa taranaka tahîn’ny TOMPO izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hira fisaorana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hifaly dia hifaly amin’ny TOMPO aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hiravoravo amin’ny Andriamanitro
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny famonjena no toa akanjo nampiakanjoany ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahamarinana no toa lamba nampitafiany ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka faly toy ny mpampakatra misatroka fehiloha aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na toy ny ampakarina miraratra ny firavany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Apôk 21.2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa tahaka ny tany mampitrebona ny tsimoka eo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na tahaka ny zaridaina mampitsimoka ny voa nafafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hampitsimohan’ny Tompo ANDRIANANAHARY
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahamarinana sy ny fiderana
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehan’ny firenena rehetra.
