    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitory ny Vaovao Mahafaly amin’ny malahelo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanasitrana ny olona torotoro fo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanambara fanafahana ho an’ireo babo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy famoahana ireo gadra avy ao am-ponja,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: hanambara ny taona hanehoan’ny TOMPO fanambinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny andro hanafaizan’Andriamanitra ny fahavalony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitondra fampaherezana ho an’ny misaona rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61.2 '
    - type: usfm
