    children:
    - type: text
      text: '1'
  - type: text
    text: Ny Fanahin’ny Tompo ANDRIANANAHARY no ato amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa nanosotra ahy ny TOMPO ka naniraka ahy
  - type: usfm
    marker: f
