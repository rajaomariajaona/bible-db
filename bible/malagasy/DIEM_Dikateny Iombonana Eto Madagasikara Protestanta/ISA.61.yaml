document_id: ISA.61,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny asa aman-kafatr’ilay iraky ny Tompo
  - type: text
    content: Ny Fanahin’ny Tompo ANDRIANANAHARY no ato amiko,
  - type: text
    content: satria efa nanosotra ahy ny TOMPO ka naniraka ahy
  - type: note
    content: 'And 1-2: jereo Lk 4.18-19. –And 1: jereo Mt 11.5; Lk 7.22.'
  - type: text
    content: mba hitory ny Vaovao Mahafaly amin’ny malahelo,
  - type: text
    content: hanasitrana ny olona torotoro fo,
  - type: text
    content: hanambara fanafahana ho an’ireo babo
  - type: text
    content: sy famoahana ireo gadra avy ao am-ponja,
  '10':
  - type: text
    content: Hifaly dia hifaly amin’ny TOMPO aho;
  - type: text
    content: eny, hiravoravo amin’ny Andriamanitro
  - type: text
    content: satria ny famonjena no toa akanjo nampiakanjoany ahy
  - type: text
    content: ary ny fahamarinana no toa lamba nampitafiany ahy;
  - type: text
    content: ka faly toy ny mpampakatra misatroka fehiloha aho
  - type: text
    content: na toy ny ampakarina miraratra ny firavany
  - type: note
    content: Ampit Apôk 21.2.
  - type: text
    content: .
  '11':
  - type: text
    content: Fa tahaka ny tany mampitrebona ny tsimoka eo aminy
  - type: text
    content: na tahaka ny zaridaina mampitsimoka ny voa nafafy
  - type: text
    content: no hampitsimohan’ny Tompo ANDRIANANAHARY
  - type: text
    content: ny fahamarinana sy ny fiderana
  - type: text
    content: eo anatrehan’ny firenena rehetra.
  '2':
  - type: text
    content: hanambara ny taona hanehoan’ny TOMPO fanambinana
  - type: text
    content: sy ny andro hanafaizan’Andriamanitra ny fahavalony
  - type: text
    content: ary hitondra fampaherezana ho an’ny misaona rehetra
  - type: note
    content: Ampit Mt 5.4.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Manao fisaonana an’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ireo,'
  - type: text
    content: kanefa hirahina aho hanome azy ribà fehiloha
  - type: text
    content: ho solon’ny lavenona amin’ny lohany,
  - type: text
    content: hanome diloilo manitra ho solon’ny alahelo
  - type: text
    content: sy fitafiana fitondra amin’ny fety
  - type: text
    content: ho solon’ny toetra manjoretra.
  - type: text
    content: 'Amin’izay no hiantsoana azy ireo hoe:'
  - type: text
    content: «Hazo vokatry ny fitahiana,
  - type: text
    content: saha nambolen’ny TOMPO
  - type: text
    content: mba hanehoany ny famirapiratany.»
  '4':
  - type: text
    content: Haorina indray ireo zavatra rava fahiny,
  - type: text
    content: hatsangana indray ny trano nirodana taloha;
  - type: text
    content: hohavaozina ny tanàna rava,
  - type: text
    content: dia ireo efa simba hatry ny ela be.
  '5':
  - type: text
    content: Vahiny no hitsangana hiandry ny ondry aman’osinareo,
  - type: text
    content: olona avy any an-kafa no hiasa ny tany
  - type: text
    content: sy hamboly voaloboka ho anareo.
  '6':
  - type: text
    content: 'Ianareo kosa dia hantsoina hoe:'
  - type: text
    content: «
  - type: text
    content: Mpisorona
  - type: text
    content: ' ho an’ny TOMPO»,'
  - type: text
    content: 'na holazaina koa hoe:'
  - type: text
    content: «Mpanao fanompoam-pivavahana
  - type: text
    content: ho an’ny Andriamanitsika.»
  - type: text
    content: Hanasoavana anareo ny fananan’ny firenen-kafa;
  - type: text
    content: ary ianareo no higalabona amin’ny voninahiny.
  '7':
  - type: text
    content: Efa nizaka henatra indroa heny ianareo
  - type: text
    content: sady afa-baràka sy nandroran’ny olona.
  - type: text
    content: 'Ka ho solon’izany, dia hoy Izaho Tompo hoe:'
  - type: text
    content: Handova anjara indroa heny eo amin’ny taniny ianareo
  - type: text
    content: ary hanana fifaliana maharitra mandrakizay.
  '8':
  - type: text
    content: Satria Izaho TOMPO dia tia rariny
  - type: text
    content: ka mankahala ny fandrobana an-kafetsena;
  - type: text
    content: homeko onitra ara-pahamarinana ianareo
  - type: text
    content: ary hanaovako fanekempihavanana mandrakizay.»
  '9':
  - type: text
    content: Ho fantatra any amin’ny firenen-kafa ny taranakareo,
  - type: text
    content: ary eo anivon’ireo vahoaka ny solofonareo;
  - type: text
    content: izay rehetra mahita azy dia hiaiky
  - type: text
    content: fa taranaka tahîn’ny TOMPO izy.
  - type: heading
    content: Hira fisaorana
