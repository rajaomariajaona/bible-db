document_id: MAT.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mioty salohim-bary amin’ny andro sabata ny mpianatr’i Jesoa
  - type: heading
    content: (Jereo Mk 2.23-28; Lk 6.1-5)
  - type: text
    content: 'Taoriana kelin’izany, dia nandeha namaky tanimbary tamin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' ry i Jesoa. Noana ireto mpianany ka nioty salohim-bary, dia nihinana'
  - type: note
    content: Jereo Deot 23.26.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Nisy lehilahy maty tanana anila tao; ary te hiampanga an’i Jesoa ny olona ka nanontany Azy hoe:'
  - type: text
    content: '–Azo atao ve ny manasitrana amin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: '?'
  '11':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Aoka hatao hoe misy tsy manana afa-tsy ondry anankiray monja aminareo. Raha sendra latsaka any an-kady amin’ny andro sabata ilay ondry, moa tsy handeha ve ny tompony haka sy hanatsoaka azy tao androtr’iny ihany? '
  '12':
  - type: text
    content: Mihoatra lavitra noho ny ondry anefa ny olona; koa amin’izany, azo atao ny manao soa olona amin’ny andro sabata.
  '13':
  - type: text
    content: 'Tamin’izay i Jesoa dia niteny tamin-dralehilahy hoe:'
  - type: text
    content: –Atsory ny tananao!
  - type: text
    content: 'Dia natsotran’ilay marary ny tanany ka sitrana, nanjary salama tahaka ny ilany. '
  '14':
  - type: text
    content: 'Fa lasa nivoaka ny sinagôga kosa ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' ary niara-nioko ny amin’izay hamonoana an’i Jesoa.'
  - type: heading
    content: Ilay Mpanompo voafidin’Andriamanitra
  '15':
  - type: text
    content: 'Nony nahalala izany i Jesoa, dia niala teo amin’io toerana io; ary vahoaka maro no nanaraka Azy. Nositranin’i Jesoa avokoa ny marary rehetra, '
  '16':
  - type: text
    content: 'saingy noteneniny mafy hoe: «Aza manao izay hahafantarana Ahy.» '
  '17':
  - type: text
    content: 'Koa tanteraka ilay voalazan’ny Tompo tamin’ny alalan’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  '18':
  - type: text
    content: «Indro ny Mpanompoko izay nofidiko,
  - type: text
    content: ilay Malalako Izay sitrako.
  - type: text
    content: Ny Fanahiko hapetrako eo aminy,
  - type: text
    content: ka hambaran’ny Mpanompoko
  - type: text
    content: amin’ireo firenena ny rariny
  - type: note
    content: 'ny rariny: ireo didy amam-pitsipika natolotr’Andriamanitra mba ho fototry ny fifandraisany amin’ny olombelona izay ifanaovany fanekempihavanana (Gen 18.25; Deot 4.6-8).'
  - type: text
    content: .
  '19':
  - type: text
    content: Tsy hifanditra aman’olona Izy na hihorakoraka,
  - type: text
    content: ary tsy handrenesana ny feony eny an-dalambe.
  '2':
  - type: text
    content: 'Nahita izany ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' ka nanao tamin’i Jesoa hoe:'
  - type: text
    content: –Jereo ny mpianatrao fa manao zavatra tsy fanao amin’ny andro sabata
  - type: note
    content: 'Tsy ny fakàna salohim-bary na ny fihinanana voam-bary voakosoka no anomezan-tsiny ny mpianatra etoana fa ny fanaovana asa voarara amin’ny andro sabata: ny mioty salohim-bary manko dia mova tsy mijinja vary (Jereo Eks 34.21).'
  - type: text
    content: '!'
  '20':
  - type: text
    content: Ny volotara folaka tsy hotapahiny,
  - type: text
    content: ny lahin-jiro manetona tsy hovonoiny,
  - type: text
    content: ambara-pahazoan’ny Mpanompoko
  - type: text
    content: fandresena ho an’ny rariny.
  '21':
  - type: text
    content: Ary Izy no hitokian’ireo firenena
  - type: note
    content: Is 42.1-4, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  - type: heading
    content: Ny avalin’i Jesoa ny fiampangana natao taminy
  - type: heading
    content: (Jereo Mk 3.22-30; Lk 11.14-23)
  '22':
  - type: text
    content: 'Tamin’izay dia nisy lehilahy azon’ny demony nentina teo amin’i Jesoa. Jamba sy moana ralehilahy ka nositranin’i Jesoa ary dia niteny sy nahita. '
  '23':
  - type: text
    content: 'Talanjona ny vahoaka rehetra sady vaky vava hoe:'
  - type: text
    content: '–Tsy ity ve ny '
  - type: text
    content: Zanak’i Davida
  - type: text
    content: '?'
  '24':
  - type: text
    content: 'Nony nandre izany kosa ny '
  - type: text
    content: Farisianina
  - type: text
    content: ', dia niteny hoe:'
  - type: text
    content: '–Tsy misy androahan’ilay io ny demony, afa-tsy fahefana avy amin’i '
  - type: text
    content: Belzeboba
  - type: text
    content: ', filohan’ny demony!'
  '25':
  - type: text
    content: 'Fantatr’i Jesoa anefa ny eritreritr’ireo Farisianina ka hoy Izy taminy:'
  - type: text
    content: '–Ho rava izay fanjakana miady an-trano, ary tsy haharitra izay tanàna na koa ankohonana miady an-trano. '
  '26':
  - type: text
    content: 'Raha i Satàna no mandroaka an’i Satàna, dia miady an-trano izy samy izy; ka ahoana no haharetan’ny fanjakany? '
  '27':
  - type: text
    content: 'Ary raha fahefana avy amin’i Belzeboba no androahako ny demony, fahefana avy amin’iza kosa no androahan’ny mpomba anareo azy? Noho izany, ny mpomba anareo ihany no hanameloka anareo. '
  '28':
  - type: text
    content: 'Raha Izaho dia ny Fanahin’Andriamanitra mihitsy no androahako ny demony ary miharihary amin’izany fa efa tonga eo aminareo ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: .
  '29':
  - type: text
    content: Hatao ahoana moa no fiditra an-tranon’ny olona matanjaka handroba ny fananany, raha tsy voafatotra aloha ilay olona matanjaka? Dia izay vao robaina ny ao an-tranony.
  '3':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Tsy novakînareo tao amin’ny Soratra Masina angaha izay nataon’i Davida, raha noana izy mbamin’ireo olona niaraka taminy? '
  '30':
  - type: text
    content: Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory amiko dia mampihahaka
  - type: note
    content: 'mampihahaka: mampahatsiahy ny fanaon’ny mpiandry ondry mpikarama (Mt 26.31; Jôh 10.12; 11.52; 16.32) izay mifanohitra amin’ny fitondran’Andriamanitra ny vahoakany (Is 40.11; 49.18; Ezek 34.13; Ezek 34.13,16), dia fitondran’ny mpiandry tsara ny ondriny.'
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Noho izany, hoy Aho aminareo: havelan’Andriamanitra avokoa ny heloka rehetra vitan’ny olombelona ary koa ny fanevatevana rehetra ataony an’Andriamanitra; fa izay manevateva ny Fanahy Masina kosa dia tsy hahazo famelan-keloka. '
  '32':
  - type: text
    content: 'Na iza na iza manao teny manohitra ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' dia hahazo famelan-keloka; fa na iza na iza miteny manohitra ny Fanahy Masina dia tsy hahazo famelan-keloka na amin’izao fiainana izao na amin’ny fiainan-ko avy.'
  - type: heading
    content: Ny hazo sy ny voany
  - type: heading
    content: (Jereo Lk 6.43-45)
  '33':
  - type: text
    content: '–Ataovy hoe tsara ny voany ka tsara koa ny hazo, na ataovy hoe ratsy ny voany ka ratsy koa ny hazo: satria ny voany no ahafantarana ny hazo. '
  '34':
  - type: text
    content: 'Ry tarana-menarana, hataonareo ratsy fanahy ahoana no fiteny zavatra tsara? Izay mameno ny fon’ny olona manko no aloaky ny vavany. '
  '35':
  - type: text
    content: 'Ny olona tsara fanahy dia mamoaka zavatra tsara avy amin’ny rakitra tsaran’ny fony; ary ny olona ratsy fanahy dia mamoaka zavatra ratsy avy amin’ny rakitra ratsin’ny fony. '
  '36':
  - type: text
    content: 'Ary lazaiko aminareo fa ny olona, amin’ny andro fitsarana dia hampamoahina momba ny teny tsy misy antony rehetra nataony: '
  '37':
  - type: text
    content: satria ny teninao no hanomezan-drariny anao ary ny teninao no hanamelohana anao.
  - type: heading
    content: Angatahana famantarana i Jesoa
  - type: heading
    content: (Jereo Mk 8.11-12; Lk 11.29-32)
  '38':
  - type: text
    content: 'Tamin’izay dia nisy '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' sy '
  - type: text
    content: Farisianina
  - type: text
    content: ' sasany nanontany an’i Jesoa hoe:'
  - type: text
    content: '–Mpampianatra ô, mba te hahita '
  - type: text
    content: famantarana
  - type: text
    content: ' avy aminao izahay.'
  '39':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Ratsy fanahy sady mivadika amin’Andriamanitra ny olona ankehitriny: fatra-pitady famantarana nefa tsy homena famantarana afa-tsy ilay momba an’i '
  - type: text
    content: Jônà
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: text
    content: '. '
  '4':
  - type: text
    content: Niditra tao an-tranon’Andriamanitra ry i Davida, ka nihinana ny mofo apetraka eo anatrehan’Andriamanitra izy mbamin’ny olona niaraka taminy; kanefa izany mofo izany tsy azon’izy ireo hanina fa natao ho an’ny mpisorona irery ihany
  - type: note
    content: 'Nihinana... eo anatrehan’Andriamanitra: jereo 1 Sam 21.2-7. –kanefa izany... ihany: jereo Lev 24.5-9.'
  - type: text
    content: '! '
  '40':
  - type: text
    content: Nitoetra telo andro sy telo alina tao an-kibon’ny trozona
  - type: note
    content: Jereo Jônà 2.1, kanefa tsy azo roritina henjana loatra ny fampiharana izany amin’ny elanelam-potoana hatramin’ny nahafatesan’i Jesoa ka hatramin’ny nitsanganany ho velona.
  - type: text
    content: ' i Jônà; toy izany koa, hitoetra telo andro sy telo alina ao an-kibon’ny tany ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '. '
  '41':
  - type: text
    content: 'Amin’ny andro fitsarana, dia hitsangana manoloana ny olona ankehitriny ireo mponina tao '
  - type: text
    content: Ninive
  - type: text
    content: ', ka hanameloka azy; fa niala tamin’ny toetra ratsy ireo mponina tao Ninive nony nandre ny toritenin’i Jônà'
  - type: note
    content: 'Ninive: renivohitr’i Asiria fahizany, niorina teo amin’ny morona atsinanan’ny ony Tigra. –fa niala... tao Ninive: jereo Jônà 3.5.'
  - type: text
    content: '! Indro anefa misy mihoatra noho i Jônà eto. '
  '42':
  - type: text
    content: Amin’ny andro fitsarana, dia hitsangana manoloana ny olona ankehitriny ilay mpanjakavavy avy any atsimo, ka hanameloka azy; fa niala avy any am-paran’ny tany izy mba hihaino ny fahendren’i Salômôna mpanjaka
  - type: note
    content: Jereo 1 Mp 10.1-10.
  - type: text
    content: '! Indro anefa misy mihoatra noho i Salômôna eto!'
  - type: heading
    content: Mitampody ny fanahy ratsy
  - type: heading
    content: (Jereo Lk 11.24-26)
  '43':
  - type: text
    content: '–Rehefa miala amin’ny olona ny fanahy maloto, dia mivezika etsy mivezika eroa any an-tany karakaina, mitady toerana hialana sasatra kanefa tsy mahita. '
  '44':
  - type: text
    content: 'Amin’izay dia hoy izy hoe: «Hody any amin’ny tranoko izay nialako ihany aho.» Miverina izy ary mahita ny tranony teo aloha foana sy voafafa ary voalamina. '
  '45':
  - type: text
    content: Lasa indray izy ka mitondra miaraka aminy fanahy fito ratsy kokoa noho ny tenany ary miara-miditra ao izy rehetra ka miorim-ponenana. Ny toetra hiafaran’izany olona izany dia hahatsiravina kokoa noho ny toetrany voalohany. Toy izany koa no hihatra amin’ny olona ratsy fanahy ankehitriny.
  - type: heading
    content: Ny tena fianakavian’i Jesoa
  - type: heading
    content: (Jereo Mk 3.31-35; Lk 8.19-21)
  '46':
  - type: text
    content: 'Raha mbola niteny tamin’ny vahoaka i Jesoa, dia tonga ny reniny mbamin’ny rahalahiny; nijanona tao alatrano izy mianakavy ary nitady hiresaka aminy. [ '
  '47':
  - type: text
    content: 'Nilazana i Jesoa hoe:'
  - type: text
    content: –Indreo ao alatrano ao ny reninao mbamin’ny rahalahinao mitady hiresaka aminao.]
  '48':
  - type: text
    content: 'Fa hoy ny navalin’i Jesoa ilay nampandre:'
  - type: text
    content: –Iza moa no reniko ary iza moa no rahalahiko?
  '49':
  - type: text
    content: 'Dia nanatsotra tanana nanondro ny mpianany i Jesoa sady niteny hoe:'
  - type: text
    content: '–Indreo no reniko sy rahalahiko. '
  '5':
  - type: text
    content: Sa tsy novakînareo tao amin’ny lalànan’i Mosesy angaha fa amin’ny andro sabata dia mandika ny fepetran’ny sabata ireo mpisorona manao fanompoana ao an-tempoly, kanefa tsy manan-tsiny
  - type: note
    content: Miasa be ireo mpisorona amin’ny andro sabata noho ny fitantanana isan-karazany atao mandritra ny fanompoam-pivavahana sy ny fanoloram-panatitra. Jereo Lev 24.8; Nom 28.9-10.
  - type: text
    content: '? '
  '50':
  - type: text
    content: Fa na zovy na zovy manao ny sitrapon’ny Raiko Izay any an-danitra dia izy no rahalahiko na anabaviko na reniko.
  '6':
  - type: text
    content: 'Ary dia lazaiko aminareo fa misy eto lehibe noho ny tempoly. '
  '7':
  - type: text
    content: 'Raha fantatrareo ny dikan’ity tenin’ny Soratra Masina ity hoe: «Ny hamindranareo fo amin’ny namana no sitrako, hoy Andriamanitra, fa tsy ny hanateranareo sorona'
  - type: note
    content: Hôs 6.6.
  - type: text
    content: '», dia tsy hanameloka ny tsy manan-tsiny ianareo. '
  '8':
  - type: text
    content: 'Eny, ananan’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' fahefana ny sabata.'
  - type: heading
    content: Sitranin’i Jesoa ilay lehilahy maty tanana anila
  - type: heading
    content: (Jereo Mk 3.1-6; Lk 6.6-11)
  '9':
  - type: text
    content: 'Nony niala teo i Jesoa, dia niditra tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: 'n-dry zareo Jiosy. '
