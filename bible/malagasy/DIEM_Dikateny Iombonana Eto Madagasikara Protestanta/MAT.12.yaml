  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nisy lehilahy maty tanana anila tao; ary te hiampanga an’i Jesoa ny olona ka nanontany Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Azo atao ve ny manasitrana amin’ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: '?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka hatao hoe misy tsy manana afa-tsy ondry anankiray monja aminareo. Raha sendra latsaka any an-kady amin’ny andro sabata ilay ondry, moa tsy handeha ve ny tompony haka sy hanatsoaka azy tao androtr’iny ihany? '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mihoatra lavitra noho ny ondry anefa ny olona; koa amin’izany, azo atao ny manao soa olona amin’ny andro sabata.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tamin’izay i Jesoa dia niteny tamin-dralehilahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Atsory ny tananao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natsotran’ilay marary ny tanany ka sitrana, nanjary salama tahaka ny ilany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa lasa nivoaka ny sinagôga kosa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' ary niara-nioko ny amin’izay hamonoana an’i Jesoa.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay Mpanompo voafidin’Andriamanitra
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nony nahalala izany i Jesoa, dia niala teo amin’io toerana io; ary vahoaka maro no nanaraka Azy. Nositranin’i Jesoa avokoa ny marary rehetra, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'saingy noteneniny mafy hoe: «Aza manao izay hahafantarana Ahy.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa tanteraka ilay voalazan’ny Tompo tamin’ny alalan’i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' hoe:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: «Indro ny Mpanompoko izay nofidiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Malalako Izay sitrako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Fanahiko hapetrako eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hambaran’ny Mpanompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ireo firenena ny rariny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny rariny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo didy amam-pitsipika natolotr’Andriamanitra mba ho fototry ny fifandraisany amin’ny olombelona izay ifanaovany fanekempihavanana (Gen 18.25; Deot 4.6-8).
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy hifanditra aman’olona Izy na hihorakoraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy handrenesana ny feony eny an-dalambe.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nahita izany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' ka nanao tamin’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Jereo ny mpianatrao fa manao zavatra tsy fanao amin’ny andro sabata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tsy ny fakàna salohim-bary na ny fihinanana voam-bary voakosoka no anomezan-tsiny ny mpianatra etoana fa ny fanaovana asa voarara amin’ny andro sabata: ny mioty salohim-bary manko dia mova tsy mijinja vary (Jereo Eks 34.21).'
      marker-yv: yv-n
    - type: text
      text: '!'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny volotara folaka tsy hotapahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lahin-jiro manetona tsy hovonoiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambara-pahazoan’ny Mpanompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandresena ho an’ny rariny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary Izy no hitokian’ireo firenena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 42.1-4, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny avalin’i Jesoa ny fiampangana natao taminy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 3.22-30; Lk 11.14-23)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tamin’izay dia nisy lehilahy azon’ny demony nentina teo amin’i Jesoa. Jamba sy moana ralehilahy ka nositranin’i Jesoa ary dia niteny sy nahita. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Talanjona ny vahoaka rehetra sady vaky vava hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy ity ve ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’i Davida
    - type: text
      text: '?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nony nandre izany kosa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ', dia niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy misy androahan’ilay io ny demony, afa-tsy fahefana avy amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Belzeboba
    - type: text
      text: ', filohan’ny demony!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fantatr’i Jesoa anefa ny eritreritr’ireo Farisianina ka hoy Izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ho rava izay fanjakana miady an-trano, ary tsy haharitra izay tanàna na koa ankohonana miady an-trano. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Raha i Satàna no mandroaka an’i Satàna, dia miady an-trano izy samy izy; ka ahoana no haharetan’ny fanjakany? '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary raha fahefana avy amin’i Belzeboba no androahako ny demony, fahefana avy amin’iza kosa no androahan’ny mpomba anareo azy? Noho izany, ny mpomba anareo ihany no hanameloka anareo. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Raha Izaho dia ny Fanahin’Andriamanitra mihitsy no androahako ny demony ary miharihary amin’izany fa efa tonga eo aminareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Hatao ahoana moa no fiditra an-tranon’ny olona matanjaka handroba ny fananany, raha tsy voafatotra aloha ilay olona matanjaka? Dia izay vao robaina ny ao an-tranony.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy novakînareo tao amin’ny Soratra Masina angaha izay nataon’i Davida, raha noana izy mbamin’ireo olona niaraka taminy? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory amiko dia mampihahaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mampihahaka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mampahatsiahy ny fanaon’ny mpiandry ondry mpikarama (Mt 26.31; Jôh 10.12; 11.52; 16.32) izay mifanohitra amin’ny fitondran’Andriamanitra ny vahoakany (Is 40.11; 49.18; Ezek 34.13; Ezek 34.13,16), dia fitondran’ny mpiandry tsara ny ondriny.
      marker-yv: yv-n
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Noho izany, hoy Aho aminareo: havelan’Andriamanitra avokoa ny heloka rehetra vitan’ny olombelona ary koa ny fanevatevana rehetra ataony an’Andriamanitra; fa izay manevateva ny Fanahy Masina kosa dia tsy hahazo famelan-keloka. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Na iza na iza manao teny manohitra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' dia hahazo famelan-keloka; fa na iza na iza miteny manohitra ny Fanahy Masina dia tsy hahazo famelan-keloka na amin’izao fiainana izao na amin’ny fiainan-ko avy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hazo sy ny voany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 6.43-45)
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '–Ataovy hoe tsara ny voany ka tsara koa ny hazo, na ataovy hoe ratsy ny voany ka ratsy koa ny hazo: satria ny voany no ahafantarana ny hazo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ry tarana-menarana, hataonareo ratsy fanahy ahoana no fiteny zavatra tsara? Izay mameno ny fon’ny olona manko no aloaky ny vavany. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ny olona tsara fanahy dia mamoaka zavatra tsara avy amin’ny rakitra tsaran’ny fony; ary ny olona ratsy fanahy dia mamoaka zavatra ratsy avy amin’ny rakitra ratsin’ny fony. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary lazaiko aminareo fa ny olona, amin’ny andro fitsarana dia hampamoahina momba ny teny tsy misy antony rehetra nataony: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: satria ny teninao no hanomezan-drariny anao ary ny teninao no hanamelohana anao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Angatahana famantarana i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 8.11-12; Lk 11.29-32)
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Tamin’izay dia nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' sasany nanontany an’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mpampianatra ô, mba te hahita '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famantarana
    - type: text
      text: ' avy aminao izahay.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ratsy fanahy sady mivadika amin’Andriamanitra ny olona ankehitriny: fatra-pitady famantarana nefa tsy homena famantarana afa-tsy ilay momba an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jônà
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Niditra tao an-tranon’Andriamanitra ry i Davida, ka nihinana ny mofo apetraka eo anatrehan’Andriamanitra izy mbamin’ny olona niaraka taminy; kanefa izany mofo izany tsy azon’izy ireo hanina fa natao ho an’ny mpisorona irery ihany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Nihinana... eo anatrehan’Andriamanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 21.2-7. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: kanefa izany... ihany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Lev 24.5-9.'
      marker-yv: yv-n
    - type: text
      text: '! '
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Nitoetra telo andro sy telo alina tao an-kibon’ny trozona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jônà 2.1, kanefa tsy azo roritina henjana loatra ny fampiharana izany amin’ny elanelam-potoana hatramin’ny nahafatesan’i Jesoa ka hatramin’ny nitsanganany ho velona.
      marker-yv: yv-n
    - type: text
      text: ' i Jônà; toy izany koa, hitoetra telo andro sy telo alina ao an-kibon’ny tany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: '. '
  '41':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Amin’ny andro fitsarana, dia hitsangana manoloana ny olona ankehitriny ireo mponina tao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ninive
    - type: text
      text: ', ka hanameloka azy; fa niala tamin’ny toetra ratsy ireo mponina tao Ninive nony nandre ny toritenin’i Jônà'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.41 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ninive: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: renivohitr’i Asiria fahizany, niorina teo amin’ny morona atsinanan’ny ony Tigra. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: fa niala... tao Ninive
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Jônà 3.5.'
      marker-yv: yv-n
    - type: text
      text: '! Indro anefa misy mihoatra noho i Jônà eto. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Amin’ny andro fitsarana, dia hitsangana manoloana ny olona ankehitriny ilay mpanjakavavy avy any atsimo, ka hanameloka azy; fa niala avy any am-paran’ny tany izy mba hihaino ny fahendren’i Salômôna mpanjaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 10.1-10.
      marker-yv: yv-n
    - type: text
      text: '! Indro anefa misy mihoatra noho i Salômôna eto!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitampody ny fanahy ratsy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 11.24-26)
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: '–Rehefa miala amin’ny olona ny fanahy maloto, dia mivezika etsy mivezika eroa any an-tany karakaina, mitady toerana hialana sasatra kanefa tsy mahita. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Amin’izay dia hoy izy hoe: «Hody any amin’ny tranoko izay nialako ihany aho.» Miverina izy ary mahita ny tranony teo aloha foana sy voafafa ary voalamina. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Lasa indray izy ka mitondra miaraka aminy fanahy fito ratsy kokoa noho ny tenany ary miara-miditra ao izy rehetra ka miorim-ponenana. Ny toetra hiafaran’izany olona izany dia hahatsiravina kokoa noho ny toetrany voalohany. Toy izany koa no hihatra amin’ny olona ratsy fanahy ankehitriny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tena fianakavian’i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 3.31-35; Lk 8.19-21)
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Raha mbola niteny tamin’ny vahoaka i Jesoa, dia tonga ny reniny mbamin’ny rahalahiny; nijanona tao alatrano izy mianakavy ary nitady hiresaka aminy. [ '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Nilazana i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indreo ao alatrano ao ny reninao mbamin’ny rahalahinao mitady hiresaka aminao.]
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Fa hoy ny navalin’i Jesoa ilay nampandre:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa no reniko ary iza moa no rahalahiko?
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Dia nanatsotra tanana nanondro ny mpianany i Jesoa sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indreo no reniko sy rahalahiko. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Sa tsy novakînareo tao amin’ny lalànan’i Mosesy angaha fa amin’ny andro sabata dia mandika ny fepetran’ny sabata ireo mpisorona manao fanompoana ao an-tempoly, kanefa tsy manan-tsiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Miasa be ireo mpisorona amin’ny andro sabata noho ny fitantanana isan-karazany atao mandritra ny fanompoam-pivavahana sy ny fanoloram-panatitra. Jereo Lev 24.8; Nom 28.9-10.
      marker-yv: yv-n
    - type: text
      text: '? '
  '50':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Fa na zovy na zovy manao ny sitrapon’ny Raiko Izay any an-danitra dia izy no rahalahiko na anabaviko na reniko.
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary dia lazaiko aminareo fa misy eto lehibe noho ny tempoly. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Raha fantatrareo ny dikan’ity tenin’ny Soratra Masina ity hoe: «Ny hamindranareo fo amin’ny namana no sitrako, hoy Andriamanitra, fa tsy ny hanateranareo sorona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hôs 6.6.
      marker-yv: yv-n
    - type: text
      text: '», dia tsy hanameloka ny tsy manan-tsiny ianareo. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Eny, ananan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' fahefana ny sabata.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ilay lehilahy maty tanana anila
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 3.1-6; Lk 6.6-11)
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nony niala teo i Jesoa, dia niditra tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: 'n-dry zareo Jiosy. '
