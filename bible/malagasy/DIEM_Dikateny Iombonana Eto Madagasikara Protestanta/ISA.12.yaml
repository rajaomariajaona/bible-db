    children:
    - type: text
      text: Fiderana an’Andriamanitra mpamonjy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry olona voaavotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hiteny ianao ka hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Midera Anao aho, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na tezitra tamiko aza Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia afaka ny fahatezeranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampionona ahy Ianao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro Andriamanitra namonjy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: matoky Azy aho ka tsy mangovitra intsony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no heriko sy fidèrako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izy no mpamonjy ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Andriamanitra mpamonjy ahy, ny Tompo namonjy ahy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'toa misy fampahatsiahivana ny anarana Isaià na Jesahià midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ny Tompo no mamonjy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izany. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'heriko:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Eks 15.2; Sal 118.14.'
      marker-yv: yv-n
    - type: text
      text: .»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amim-pifaliana no hantsakanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny loharanom-pamonjena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hiteny ianareo ka hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Miderà ny TOMPO, antsoy ny anarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambarao amin’ny vahoaka rehetra ny asany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampahatsiarovy azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hay takarina ny anarany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankalazao an-kira ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa asa lehibe no nataony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hampahafantarina eran-tany izany!»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifalia sy miravoravoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ry mponina ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lehibe Ilay eo anivonareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Ilay Masin’i Israely.
