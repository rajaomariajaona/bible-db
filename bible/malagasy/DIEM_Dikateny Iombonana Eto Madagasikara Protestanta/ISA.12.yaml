document_id: ISA.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra mpamonjy
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: ry olona voaavotra,
  - type: text
    content: 'dia hiteny ianao ka hanao hoe:'
  - type: text
    content: «Midera Anao aho, TOMPO ô;
  - type: text
    content: fa na tezitra tamiko aza Ianao,
  - type: text
    content: dia afaka ny fahatezeranao
  - type: text
    content: ka nampionona ahy Ianao.
  '2':
  - type: text
    content: Indro Andriamanitra namonjy ahy,
  - type: text
    content: matoky Azy aho ka tsy mangovitra intsony.
  - type: text
    content: Ny TOMPO no heriko sy fidèrako,
  - type: text
    content: fa Izy no mpamonjy ahy
  - type: note
    content: 'Andriamanitra mpamonjy ahy, ny Tompo namonjy ahy: toa misy fampahatsiahivana ny anarana Isaià na Jesahià midika hoe Ny Tompo no mamonjy izany. –heriko: jereo Eks 15.2; Sal 118.14.'
  - type: text
    content: .»
  '3':
  - type: text
    content: Amim-pifaliana no hantsakanareo
  - type: text
    content: eo amin’ny loharanom-pamonjena.
  '4':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: 'dia hiteny ianareo ka hanao hoe:'
  - type: text
    content: «Miderà ny TOMPO, antsoy ny anarany,
  - type: text
    content: ambarao amin’ny vahoaka rehetra ny asany,
  - type: text
    content: ampahatsiarovy azy
  - type: text
    content: fa tsy hay takarina ny anarany.
  '5':
  - type: text
    content: Ankalazao an-kira ny TOMPO
  - type: text
    content: fa asa lehibe no nataony;
  - type: text
    content: ary aoka hampahafantarina eran-tany izany!»
  '6':
  - type: text
    content: Mifalia sy miravoravoa,
  - type: text
    content: 'ry mponina ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: fa lehibe Ilay eo anivonareo,
  - type: text
    content: dia Ilay Masin’i Israely.
