verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tongava na tsy manam-bola aza
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He! Ianareo rehetra izay mangetaheta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mankanesa amin’ny rano omeko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia tsy manam-bola aza ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avia maka sakafo, dia mihinàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ialam-bola izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Apôk 21.6; 22.17.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avia maka divay na ronono,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy vidina izany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ranonorana sy oram-panala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: milatsaka avy any an-danitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy miverina any raha tsy efa mahavonto ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mahalonaka azy ary mampahavokatra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampahazo masomboly hafafy sy hanin-kohanina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2Kôr 9.10.
      marker-yv: yv-n
    - type: text
      text: ;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ho tahaka izany koa ny teny aloaky ny vavako:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hiveri-maina foana atỳ amiko izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy efa nahatanteraka izay sitrako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nahatratra ny tanjona nanirahako azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amim-pifaliana no hialanareo eto Babilôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amim-piadanana no hampodîna anareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra sy ny havoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hihorakora-pifaliana rehefa mandalo ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hazo rehetra any an-tsaha hiteha-tanana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hazo kipreso no haniry ho solon’ny tsilo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny rotra no haniry ho solon’ny amiana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voninahitra ho an’ny TOMPO izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho famantarana tsy hokosehina na oviana na oviana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny amin’izay nataony ho anareo.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana ianareo no mandany vola
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay sakafo tsy tena mahavoky?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana ianareo no misahirana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny zavatra tsy mahafa-po?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy tsara Aho, dia hihinan-javatra matsiro ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho finaritra amin’ny sakafo mafilotra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankanesa atỳ amiko ianareo, ka manongilàna sofina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: henoy Aho, dia ho velombelona indray ny tenanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Teksta voatsiahy ao amin’ny Asa 13.34 araka ny dkt tranainy grika.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanaovako fanekempihavanana mandrakizay ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka homeko ny fitahiana nampanantenaiko an’i Davida:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro izy fa nataoko vavolombelon’ny fahefàko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny foko isan-tokony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho mpitarika sy mpibaiko ny hafa firenena.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ianao koa, ry Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiantso ny firenena hafa izay tsy fantatrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary firenen-kafa tsy mahalala anao akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hirohotra hanatona anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny TOMPO Andriamanitrao, Ilay Masin’i Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanome anao izany voninahitra izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hohamarinin’ny Tompo ny teny fikasany
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tadiavo ny TOMPO, dieny mbola manaiky ho hita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: antsoy Izy, dieny mbola akaiky anareo.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny olon-dratsy handao ny fanaony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanao ratsy hahafoy ny heviny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiverina amin’ny TOMPO ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hamindra fo aminy Izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiverina amin’Andriamanitsika ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hihoa-pampana ny famelan-keloka homeny azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Teny hentitry ny TOMPO izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny hevitro tsy hevitrareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lalanareo tsy mba lalako.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny haavon’ny lanitra amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no haavon’ny lalako amin’ny lalanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny hevitro amin’ny hevitrareo.
