document_id: ISA.55,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tongava na tsy manam-bola aza
  - type: text
    content: He! Ianareo rehetra izay mangetaheta,
  - type: text
    content: mankanesa amin’ny rano omeko!
  - type: text
    content: Na dia tsy manam-bola aza ianareo,
  - type: text
    content: avia maka sakafo, dia mihinàna
  - type: text
    content: fa tsy ialam-bola izany
  - type: note
    content: Ampit Apôk 21.6; 22.17.
  - type: text
    content: ;
  - type: text
    content: avia maka divay na ronono,
  - type: text
    content: fa tsy vidina izany.
  '10':
  - type: text
    content: Ny ranonorana sy oram-panala
  - type: text
    content: milatsaka avy any an-danitra
  - type: text
    content: dia tsy miverina any raha tsy efa mahavonto ny tany
  - type: text
    content: sy mahalonaka azy ary mampahavokatra azy
  - type: text
    content: ka mampahazo masomboly hafafy sy hanin-kohanina
  - type: note
    content: Ampit 2Kôr 9.10.
  - type: text
    content: ;
  '11':
  - type: text
    content: 'dia ho tahaka izany koa ny teny aloaky ny vavako:'
  - type: text
    content: tsy hiveri-maina foana atỳ amiko izy,
  - type: text
    content: raha tsy efa nahatanteraka izay sitrako
  - type: text
    content: sy nahatratra ny tanjona nanirahako azy.
  '12':
  - type: text
    content: Fa amim-pifaliana no hialanareo eto Babilôna
  - type: text
    content: ary amim-piadanana no hampodîna anareo.
  - type: text
    content: Ny tendrombohitra sy ny havoana
  - type: text
    content: dia hihorakora-pifaliana rehefa mandalo ianareo,
  - type: text
    content: ary ny hazo rehetra any an-tsaha hiteha-tanana.
  '13':
  - type: text
    content: Ny hazo kipreso no haniry ho solon’ny tsilo,
  - type: text
    content: ary ny rotra no haniry ho solon’ny amiana.
  - type: text
    content: Ho voninahitra ho an’ny TOMPO izany,
  - type: text
    content: ka ho famantarana tsy hokosehina na oviana na oviana
  - type: text
    content: ny amin’izay nataony ho anareo.»
  '2':
  - type: text
    content: Nahoana ianareo no mandany vola
  - type: text
    content: amin’izay sakafo tsy tena mahavoky?
  - type: text
    content: Nahoana ianareo no misahirana
  - type: text
    content: amin’ny zavatra tsy mahafa-po?
  - type: text
    content: Henoy tsara Aho, dia hihinan-javatra matsiro ianareo
  - type: text
    content: ary ho finaritra amin’ny sakafo mafilotra.
  '3':
  - type: text
    content: Mankanesa atỳ amiko ianareo, ka manongilàna sofina;
  - type: text
    content: henoy Aho, dia ho velombelona indray ny tenanareo
  - type: note
    content: Teksta voatsiahy ao amin’ny Asa 13.34 araka ny dkt tranainy grika.
  - type: text
    content: .
  - type: text
    content: Hanaovako fanekempihavanana mandrakizay ianareo
  - type: text
    content: 'ka homeko ny fitahiana nampanantenaiko an’i Davida:'
  '4':
  - type: text
    content: Indro izy fa nataoko vavolombelon’ny fahefàko
  - type: text
    content: eo amin’ny foko isan-tokony
  - type: text
    content: sady ho mpitarika sy mpibaiko ny hafa firenena.
  '5':
  - type: text
    content: Ary ianao koa, ry Israely,
  - type: text
    content: dia hiantso ny firenena hafa izay tsy fantatrao;
  - type: text
    content: ary firenen-kafa tsy mahalala anao akory
  - type: text
    content: no hirohotra hanatona anao,
  - type: text
    content: satria ny TOMPO Andriamanitrao, Ilay Masin’i Israely,
  - type: text
    content: no nanome anao izany voninahitra izany.
  - type: heading
    content: Hohamarinin’ny Tompo ny teny fikasany
  '6':
  - type: text
    content: Tadiavo ny TOMPO, dieny mbola manaiky ho hita,
  - type: text
    content: antsoy Izy, dieny mbola akaiky anareo.
  '7':
  - type: text
    content: Aoka ny olon-dratsy handao ny fanaony,
  - type: text
    content: ary ny mpanao ratsy hahafoy ny heviny.
  - type: text
    content: Aoka hiverina amin’ny TOMPO ireny
  - type: text
    content: fa hamindra fo aminy Izy.
  - type: text
    content: Aoka hiverina amin’Andriamanitsika ireny
  - type: text
    content: fa hihoa-pampana ny famelan-keloka homeny azy.
  '8':
  - type: text
    content: 'Teny hentitry ny TOMPO izao:'
  - type: text
    content: «Ny hevitro tsy hevitrareo
  - type: text
    content: ary ny lalanareo tsy mba lalako.
  '9':
  - type: text
    content: Tahaka ny haavon’ny lanitra amin’ny tany
  - type: text
    content: no haavon’ny lalako amin’ny lalanareo
  - type: text
    content: sy ny hevitro amin’ny hevitrareo.
