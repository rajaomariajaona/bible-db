document_id: REV.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’ny Fiangonana tao Sardy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '–Manorata ho an’ny anjelin’ny Fiangonana any Sardy:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Izao no lazain’Ilay manana ny Fanahy Masina ombàm-panomezana fito avy amin’Andriamanitra sy mitana ny kintana fito: Fantatro ny asanao; fantatro fa malaza hoe velona ianao, kanjo maty. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Miambena, ka aoreno tsara ny zavatra sisa efa mila ho faty, satria tsy nisy nahitako lavorary eo anatrehan’Andriamanitro ny asanao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa tsarovy izay fomba nandraisanao sy nihainoanao ny tenin’Andriamanitra ary dia tano izany ka ialao ny toe-dratsinao. Raha tsy miambina ianao, dia ho avy toy ny mpangalatra Aho, ka tsy ho fantatrao izay ora hiaviako aminao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 24.43-44; Lk 12.39-40; 1Tes 5.2; 2Pt 2.10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Kanefa eto Sardy ianao dia manana olona vitsivitsy izay tsy nandoto ny akanjony; ary miakanjo fotsy no hiara-mandeha amiko ireo, satria mendrika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Izay maharesy dia hampiakanjoina akanjo fotsy toy izany koa; tsy hamono ny anarany ao amin’ny horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay Aho; ary hanaiky azy ho mpomba Ahy eo anatrehan’ny Raiko sy ny *anjeliny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'horonamboky... mandrakizay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Fil 4.3. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hanaiky azy...anjeliny:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Mt 10.32; Lk 12.8.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’ny Fiangonana tao Filadelfia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '–Manorata ho an’ny anjelin’ny Fiangonana any Filadelfia:'
- type: usfm
  marker: p
  children:
  - type: text
    text: «Izao no lazain’ilay Masina, ilay Mahatoky, Ilay manana ny fanalahidin’i Davida mpanjaka, Ilay mamoha ka tsy hisy hanidy ary manidy ka tsy hisy hamoha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ampit Is 22.22. Ilay mitana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny fanalahidin’i Davida mpanjaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia nanankinana iraka mitaky toetra mahatoky sy notolorana fahefana feno mba hanatontosa azy. Ankoatra izany koa dia taranak’i Davida mpanjaka i Kristy (jereo Asa 2.30).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fantatro ny asanao. Indro eo anatrehanao efa nasiako varavarana mivoha tsy misy mahahidy; satria kely hery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kely hery: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vitsy an’isa ireo mpino tao Filadelfia.
    marker-yv: yv-n
  - type: text
    text: ' ianao, kanefa nitandrina ny teniko ary tsy mba nandà Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Indro atolotro anao ny sasany avy amin’ireo olona mivavaka amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ': milaza ny tenany ho Jiosy ireo, kanjo tsiizy fa mandainga; indro hataoko tonga hiankohoka eo anoloanao ireo, ka ho fantany fa tiako ianao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 49.23; 60.14; 43.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary noho ianao nitandrina ny teniko ny amin’ny faharetana, izaho kosa hiaro anao ho afaka amin’ilay andro fizahan-toetra, izay efa hihatra amin’izao tontolo izao mba hitsapana ny mponina eto ambonin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ho avy faingana Aho; tano mafy izay anananao, mba tsy hisy haka ny satroboninahitrao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Izay maharesy dia hataoko andry ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoli
  - type: text
    text: n’Andriamanitra, sady tsy hiala ao intsony; hosoratako eo aminy ny anaran’Andriamanitro sy ny anaran’ilay tanànan’Andriamanitro, dia i Jerosalema vaovao, izay midina avy any an-danitra avy amin’Andriamanitra; ary hosoratako eo aminy koa ilay anarako vaovao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 62.2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’ny Fiangonana tao Laôdisia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '–Manorata ho an’ny anjelin’ny Fiangonana any Laôdisia:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Izao no lazain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: ', ilay Vavolombelona mahatoky sy marina, Izay niandohan'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'Izay niandohana:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Ohab 8.22.
    marker-yv: yv-n
  - type: text
    text: '’ny zavaboaarin’Andriamanitra: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fantatro ny asanao; fantatro fa tsy mangatsiaka tsy mafana ianao; satriko ianao mangatsiaka na mafana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Saingy noho ianao matimaty ka tsy mafana tsy mangatsiaka, dia efa haloan’ny vavako ianao! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy ianao hoe: manan-karena sy efa nihary fananam-be aho ka tsy manan-java-mahory; kanjo tsy fantatrao fa ianao no ilay ory sy mampalahelo, mahantra sy jamba ary mitanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa manoro hevitra anao Aho: hividy amiko volamena voadio tamin’ny afo, mba hanan-karena ianao; hividy amiko akanjo fotsy hiakanjoanao, mba tsy hisehoan’ny fitanjahanao mahamenatra; ary hividy amiko fanafody maso hahosotra ny masonao, mba hahiratra ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay rehetra tiako no anariko sy faiziko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ohab 3.12; Heb 12.6.
    marker-yv: yv-n
  - type: text
    text: '; mazotoa àry, ka ialao ny toe-dratsinao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Indro mijoro eo am-baravarana Aho, sady mandondòna; ka raha misy olona mihaino ny feoko sy mamoha ny varavarana, dia hiditra ao an-tranony Aho ka hiara-misakafo aminy, ary izy hiara-misakafo amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: «Izay maharesy dia havelako hiara-mipetraka amiko eo ambony sezafiandrianako; dia tahaka ny nandreseko ihany koa sy niarahako nipetraka amin’ny Raiko eo ambony sezafiandrianany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana.»
