document_id: REV.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hafatra ho an’ny Fiangonana tao Sardy
  - type: text
    content: '–Manorata ho an’ny anjelin’ny Fiangonana any Sardy:'
  - type: text
    content: '«Izao no lazain’Ilay manana ny Fanahy Masina ombàm-panomezana fito avy amin’Andriamanitra sy mitana ny kintana fito: Fantatro ny asanao; fantatro fa malaza hoe velona ianao, kanjo maty. '
  '10':
  - type: text
    content: 'Ary noho ianao nitandrina ny teniko ny amin’ny faharetana, izaho kosa hiaro anao ho afaka amin’ilay andro fizahan-toetra, izay efa hihatra amin’izao tontolo izao mba hitsapana ny mponina eto ambonin’ny tany. '
  '11':
  - type: text
    content: Ho avy faingana Aho; tano mafy izay anananao, mba tsy hisy haka ny satroboninahitrao.
  '12':
  - type: text
    content: '«Izay maharesy dia hataoko andry ao amin’ny '
  - type: text
    content: tempoli
  - type: text
    content: n’Andriamanitra, sady tsy hiala ao intsony; hosoratako eo aminy ny anaran’Andriamanitro sy ny anaran’ilay tanànan’Andriamanitro, dia i Jerosalema vaovao, izay midina avy any an-danitra avy amin’Andriamanitra; ary hosoratako eo aminy koa ilay anarako vaovao
  - type: note
    content: Ampit Is 62.2.
  - type: text
    content: .
  '13':
  - type: text
    content: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana.»
  - type: heading
    content: Hafatra ho an’ny Fiangonana tao Laôdisia
  '14':
  - type: text
    content: '–Manorata ho an’ny anjelin’ny Fiangonana any Laôdisia:'
  - type: text
    content: '«Izao no lazain’ny '
  - type: text
    content: Amen
  - type: text
    content: ', ilay Vavolombelona mahatoky sy marina, Izay niandohan'
  - type: note
    content: 'Izay niandohana: ampit Ohab 8.22.'
  - type: text
    content: '’ny zavaboaarin’Andriamanitra: '
  '15':
  - type: text
    content: 'Fantatro ny asanao; fantatro fa tsy mangatsiaka tsy mafana ianao; satriko ianao mangatsiaka na mafana. '
  '16':
  - type: text
    content: 'Saingy noho ianao matimaty ka tsy mafana tsy mangatsiaka, dia efa haloan’ny vavako ianao! '
  '17':
  - type: text
    content: 'Hoy ianao hoe: manan-karena sy efa nihary fananam-be aho ka tsy manan-java-mahory; kanjo tsy fantatrao fa ianao no ilay ory sy mampalahelo, mahantra sy jamba ary mitanjaka. '
  '18':
  - type: text
    content: 'Koa manoro hevitra anao Aho: hividy amiko volamena voadio tamin’ny afo, mba hanan-karena ianao; hividy amiko akanjo fotsy hiakanjoanao, mba tsy hisehoan’ny fitanjahanao mahamenatra; ary hividy amiko fanafody maso hahosotra ny masonao, mba hahiratra ianao. '
  '19':
  - type: text
    content: Izay rehetra tiako no anariko sy faiziko
  - type: note
    content: Ampit Ohab 3.12; Heb 12.6.
  - type: text
    content: '; mazotoa àry, ka ialao ny toe-dratsinao. '
  '2':
  - type: text
    content: 'Miambena, ka aoreno tsara ny zavatra sisa efa mila ho faty, satria tsy nisy nahitako lavorary eo anatrehan’Andriamanitro ny asanao. '
  '20':
  - type: text
    content: Indro mijoro eo am-baravarana Aho, sady mandondòna; ka raha misy olona mihaino ny feoko sy mamoha ny varavarana, dia hiditra ao an-tranony Aho ka hiara-misakafo aminy, ary izy hiara-misakafo amiko.
  '21':
  - type: text
    content: «Izay maharesy dia havelako hiara-mipetraka amiko eo ambony sezafiandrianako; dia tahaka ny nandreseko ihany koa sy niarahako nipetraka amin’ny Raiko eo ambony sezafiandrianany.
  '22':
  - type: text
    content: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana.»
  '3':
  - type: text
    content: Koa tsarovy izay fomba nandraisanao sy nihainoanao ny tenin’Andriamanitra ary dia tano izany ka ialao ny toe-dratsinao. Raha tsy miambina ianao, dia ho avy toy ny mpangalatra Aho, ka tsy ho fantatrao izay ora hiaviako aminao
  - type: note
    content: Ampit Mt 24.43-44; Lk 12.39-40; 1Tes 5.2; 2Pt 2.10.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Kanefa eto Sardy ianao dia manana olona vitsivitsy izay tsy nandoto ny akanjony; ary miakanjo fotsy no hiara-mandeha amiko ireo, satria mendrika.
  '5':
  - type: text
    content: «Izay maharesy dia hampiakanjoina akanjo fotsy toy izany koa; tsy hamono ny anarany ao amin’ny horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay Aho; ary hanaiky azy ho mpomba Ahy eo anatrehan’ny Raiko sy ny *anjeliny
  - type: note
    content: 'horonamboky... mandrakizay: ampit Fil 4.3. –hanaiky azy...anjeliny: ampit Mt 10.32; Lk 12.8.'
  - type: text
    content: .
  '6':
  - type: text
    content: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana.»
  - type: heading
    content: Hafatra ho an’ny Fiangonana tao Filadelfia
  '7':
  - type: text
    content: '–Manorata ho an’ny anjelin’ny Fiangonana any Filadelfia:'
  - type: text
    content: «Izao no lazain’ilay Masina, ilay Mahatoky, Ilay manana ny fanalahidin’i Davida mpanjaka, Ilay mamoha ka tsy hisy hanidy ary manidy ka tsy hisy hamoha
  - type: note
    content: Ampit Is 22.22. Ilay mitana ny fanalahidin’i Davida mpanjaka dia nanankinana iraka mitaky toetra mahatoky sy notolorana fahefana feno mba hanatontosa azy. Ankoatra izany koa dia taranak’i Davida mpanjaka i Kristy (jereo Asa 2.30).
  - type: text
    content: '. '
  '8':
  - type: text
    content: Fantatro ny asanao. Indro eo anatrehanao efa nasiako varavarana mivoha tsy misy mahahidy; satria kely hery
  - type: note
    content: 'kely hery: vitsy an’isa ireo mpino tao Filadelfia.'
  - type: text
    content: ' ianao, kanefa nitandrina ny teniko ary tsy mba nandà Ahy. '
  '9':
  - type: text
    content: 'Indro atolotro anao ny sasany avy amin’ireo olona mivavaka amin’i '
  - type: text
    content: Satàna
  - type: text
    content: ': milaza ny tenany ho Jiosy ireo, kanjo tsiizy fa mandainga; indro hataoko tonga hiankohoka eo anoloanao ireo, ka ho fantany fa tiako ianao'
  - type: note
    content: Ampit Is 49.23; 60.14; 43.4.
  - type: text
    content: '. '
