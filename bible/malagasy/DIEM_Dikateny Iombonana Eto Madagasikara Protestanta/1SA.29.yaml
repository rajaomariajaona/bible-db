document_id: 1SA.29,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida voaroakan’ny Filistinina
  - type: text
    content: Namory ny miaramilany rehetra tao Afeka ny Filistinina, raha nitoby akaikin’ny loharano iray tao Jizrehèla
  - type: note
    content: 'Afeka: jereo 4.1 sy nta. –Jizrehèla: tanàna eo amin’ny lohasaha mitovy anarana aminy, ka tokony ho 80 km any avaratr’i Jerosalema. Ny loharano angamba dia ilay akaikin’i Haîna-Harôda, tokony ho kilaometatra vitsivitsy ao atsimo atsinanan’ny tanàna, eo am-pototry ny tendrombohitra Gilbôa.'
  - type: text
    content: ' kosa ny Israelita. '
  '10':
  - type: text
    content: Koa mifohaza maraina be ianao sy ireo mpanompo izay niara-dia taminao; samia mifoha maraina ianareo, ary mandehana rehefa mazava ny andro.
  '11':
  - type: text
    content: Dia nifoha maraina be i Davida sy ny olony ny ampitso mba hiverina any amin’ny tanin’ny Filistinina. Ary ny Filistinina kosa niakatra any Jizrehèla.
  '2':
  - type: text
    content: 'Nilahatra teo alohan’ny andian-tafiny ireo filohan’ny Filistinina; fa i Davida sy ireo olony kosa dia tatỳ aoriana no nilahatra niaraka tamin’i Akisy. '
  '3':
  - type: text
    content: 'Dia hoy ireo filohan’ny Filistinina:'
  - type: text
    content: –Inona no ataon’ireo Hebreo ireo eto?
  - type: text
    content: 'Ka hoy i Akisy namaly ireo filohan’ny Filistinina:'
  - type: text
    content: –I Davida mpanompon’i Saoly mpanjakan’i Israely io, saingy efa niaraka tamiko aman-taonany izy izao. Ary tsy mbola hitako izay tsininy hatramin’izay nialany tany ka nifindrany tatỳ izay.
  '4':
  - type: text
    content: 'Tezitra tamin’i Akisy ireo filohan’ny Filistinina ka nanao taminy hoe:'
  - type: text
    content: '–Roahy any io lehilahy io hiverina any amin’ny tanàna izay efa nomenao hitoerany. Aza avela hidina hiara-kiady amintsika izy, fandrao dia isika indray no hifoterany rehefa miady. Fa inona moa no hahazoany sitraka amin’i Saoly tompony, raha tsy ny fanolorany azy ny lohan’ireo olontsika? '
  '5':
  - type: text
    content: 'Moa tsy io Davida io ve ilay nihirana sy nandihizana hoe:'
  - type: text
    content: «I Saoly nahafaty an’arivoarivo,
  - type: text
    content: fa i Davida kosa nahafaty an’alinalina
  - type: note
    content: Jereo 18.7; 21.12.
  - type: text
    content: .»
  '6':
  - type: text
    content: 'Dia niantso an’i Davida i Akisy ary nanao taminy hoe:'
  - type: text
    content: '–Velona ny TOMPO ka milaza marina aho fa olona mahatoky ianao; tiako ny hiarahanao amiko amin’izao ady izao, satria tsy mbola hitako izay tsininao hatramin’izay nahatongavanao teto amiko izay. Kanefa tsy mahazoazo anao ireo filohan’ny Filistinina ireo. '
  '7':
  - type: text
    content: Koa mandehana miverina mody am-piadanana mba tsy hanaovanao izay tsy mahafaly ireo filohan’ny Filistinina.
  '8':
  - type: text
    content: 'Hoy kosa i Davida tamin’i Akisy:'
  - type: text
    content: –Fa inona no nataoko, ry mpanjaka tompoko, ary inona no tsiny hitanao tamiko mpanomponao hatramin’izay nipetrahako tatỳ aminao ka mandraka androany izay, no tsy mahazo mandeha miady amin’ny fahavalonao aho?
  '9':
  - type: text
    content: 'Dia hoy i Akisy namaly an’i Davida:'
  - type: text
    content: '–Tsy misy. Fa mahafinaritra ahy tahaka ny '
  - type: text
    content: anjeli
  - type: text
    content: 'n’Andriamanitra ianao. Saingy ireo filohan’ny Filistinina no nanao hoe: «Aoka izy tsy hiaraka hiady amintsika!» '
