document_id: 1SA.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida voaroakan’ny Filistinina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Namory ny miaramilany rehetra tao Afeka ny Filistinina, raha nitoby akaikin’ny loharano iray tao Jizrehèla
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Afeka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 4.1 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Jizrehèla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tanàna eo amin’ny lohasaha mitovy anarana aminy, ka tokony ho 80 km any avaratr’i Jerosalema. Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: loharano
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' angamba dia ilay akaikin’i Haîna-Harôda, tokony ho kilaometatra vitsivitsy ao atsimo atsinanan’ny tanàna, eo am-pototry ny tendrombohitra Gilbôa.'
    marker-yv: yv-n
  - type: text
    text: ' kosa ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nilahatra teo alohan’ny andian-tafiny ireo filohan’ny Filistinina; fa i Davida sy ireo olony kosa dia tatỳ aoriana no nilahatra niaraka tamin’i Akisy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy ireo filohan’ny Filistinina:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no ataon’ireo Hebreo ireo eto?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy i Akisy namaly ireo filohan’ny Filistinina:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –I Davida mpanompon’i Saoly mpanjakan’i Israely io, saingy efa niaraka tamiko aman-taonany izy izao. Ary tsy mbola hitako izay tsininy hatramin’izay nialany tany ka nifindrany tatỳ izay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tezitra tamin’i Akisy ireo filohan’ny Filistinina ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Roahy any io lehilahy io hiverina any amin’ny tanàna izay efa nomenao hitoerany. Aza avela hidina hiara-kiady amintsika izy, fandrao dia isika indray no hifoterany rehefa miady. Fa inona moa no hahazoany sitraka amin’i Saoly tompony, raha tsy ny fanolorany azy ny lohan’ireo olontsika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moa tsy io Davida io ve ilay nihirana sy nandihizana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «I Saoly nahafaty an’arivoarivo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa i Davida kosa nahafaty an’alinalina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 18.7; 21.12.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niantso an’i Davida i Akisy ary nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Velona ny TOMPO ka milaza marina aho fa olona mahatoky ianao; tiako ny hiarahanao amiko amin’izao ady izao, satria tsy mbola hitako izay tsininao hatramin’izay nahatongavanao teto amiko izay. Kanefa tsy mahazoazo anao ireo filohan’ny Filistinina ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa mandehana miverina mody am-piadanana mba tsy hanaovanao izay tsy mahafaly ireo filohan’ny Filistinina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy kosa i Davida tamin’i Akisy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa inona no nataoko, ry mpanjaka tompoko, ary inona no tsiny hitanao tamiko mpanomponao hatramin’izay nipetrahako tatỳ aminao ka mandraka androany izay, no tsy mahazo mandeha miady amin’ny fahavalonao aho?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Akisy namaly an’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy misy. Fa mahafinaritra ahy tahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’Andriamanitra ianao. Saingy ireo filohan’ny Filistinina no nanao hoe: «Aoka izy tsy hiaraka hiady amintsika!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa mifohaza maraina be ianao sy ireo mpanompo izay niara-dia taminao; samia mifoha maraina ianareo, ary mandehana rehefa mazava ny andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nifoha maraina be i Davida sy ny olony ny ampitso mba hiverina any amin’ny tanin’ny Filistinina. Ary ny Filistinina kosa niakatra any Jizrehèla.
