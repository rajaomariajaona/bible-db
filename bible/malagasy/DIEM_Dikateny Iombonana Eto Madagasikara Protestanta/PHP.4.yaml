document_id: PHP.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fananarana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Toy izany àry, ry hava-malala, no aoka hitomoeranareo tsara miray amin’ny Tompo. Fa tiako tokoa ianareo, ry havako, sady manina anareo fatratra aho; ianareo no fifaliako sy toy ny satroboninahi-pandresena ho ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry i Eodia sy i Sintîka, miangavy mafy anareo aho mba hifanaraka, noho ianareo mpirahavavy ao amin’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ianao koa, ry ilay mpiara-miasa akaiky tamiko, mangataka anao aho mba hanampy azy roa vavy, fa niara-nikatroka nanao izay hielezan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' izahay mbamin’i Klemanta koa sy ny hafa rehetra mpiara-miasa amiko izay samy voasoratra anarana ao amin’ilay horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mpiara-miasa akaiky tamiko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tsy fantatra io olona itenenan’i Paoly io. Araka ny mpanao heviteny sasany, dia mety mifanandrify amina anaran’olona ilay teny grika '
    - type: usfm
      marker: it
      children:
      - type: text
        text: suzugos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' adika eto hoe mpiara-miasa. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'horonamboky... mandrakizay:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Apôk 3.5.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mifalia mandrakariva noho ianareo tafaray amin’ny Tompo. Mbola antitranteriko indray: mifalia! Manehoa fandeferana amin’ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy ho ela, dia ho tonga ny Tompo! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza manahy na inona na inona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 6.25-34.
    marker-yv: yv-n
  - type: text
    text: ' fa ambarao amin’Andriamanitra isaka izay mivavaka ny zavatra ilainareo, ary angataho amin’ny fo feno fankasitrahana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ilay fiadanana avy amin’Andriamanitra sady mihoatra noho ny zavatra rehetra takatry ny fieritreretan’olombelona, dia hiaro ny fonareo sy ny sainareo, satria efa tafaray amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa ianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Farany, ry havana, aoka hoheverinareo izay zavatra tsara sy maha te hidera: dia izay rehetra marina, manan-kaja, ara-drariny, madio, mahatehotia ary tsara laza. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ataovy izay efa nianaranareo sy noraisinareo tamiko ary izay renareo sy hitanareo nataoko. Dia homba anareo Andriamanitra loharanon’ny fiadanana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisaorana noho ny fanomezana nataon’ny Filipianina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nahatsapa hafaliana lehibe tao amin’ny Tompo aho, satria nasehonareo indray ny fiahianareo ahy. Nitohy hatrany ny fiahianareo ahy, saingy tsy mbola nisy fotoana hanehoanareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy noho izaho sahirana no itenenako toy izao, fa efa nianatra ny hianina amin’izay ananako aho. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Haiko ny mihafy, haiko ny manam-be. Efa nianarako ny hianina na aiza na aiza ary na amin’inona na amin’inona, na voky aho na noana, na manam-be aho na sahirana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Afaka miatrika izany rehetra izany aho, noho i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' manome hery ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Kanefa soa izao nataonareo izao: niombom-pahoriana tamiko ianareo ka nanampy ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fantatrareo koa, ry Filipianina, fa nony niala tany Masedônia aho, tamin’ny fotoana niandohan’ny fitoriana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ', dia ianareo no hany Fiangonana nanampy ahy ka nanana kaontin’ny miditra sy mivoaka nifanaovana tamiko'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Masedônia: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 2Kôr 1.16 sy nta. –Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'miditra sy mivoaka:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' mampiasa ny fiteny eo amin’ny fifandraharahana ara-barotra i Paoly eto.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fony aho mbola tany Tesalônika, dia efa indray mandeha amana indroa no nandefasanareo izay nilaiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 15-16:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 17.1; 2Kôr 11.9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy hoe mitady fanomezana aho no milaza izany, fa mitady ny vokatra hiavosa ao amin’ny kaontin’ny miditra ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Eny, manana ny zavatra rehetra ilaiko aho izao sady manana amby ampy; efa voaraiko tamin’i Epafrôdito ny fanomezana avy aminareo, ka heni-tsoa mitafotafo aho. Izany fanomezanareo izany dia toy ny zava-manitra mamerovero atao sorona ka raisin’Andriamanitra sady ankasitrahiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 29.18; Ef 5.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa Andriamanitro kosa hanome mitafotafo izay rehetra ilainareo araka ny harena heni-boninahitra atolony ao amin’i Kristy Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ho an’ilay Andriamanitra sady Raintsika anie ny voninahitra mandrakizay mandrakizay! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanaovam-beloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Veloma any amin’izay rehetra isan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' ka tafaray amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa. Manao veloma anareo ny havana iray finoana, izay tafaraka amiko; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: manao veloma anareo ny vahoakan’Andriamanitra rehetra eto, fa indrindra ry zareo ao an-dapan’ny amperôra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.22 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'lapan’ny amperôra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fomba fiteny ahatsiarovana an’i Rôma, renivohitry ny Fanjakambe rômanina. Nefa ny hoe '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ry zareo ao an-dapan’ny amperôra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mety niantsoana koa ireo mpanao fanjakana amin’ny tanàna ivelan’i Rôma, ka nisy governora rômanina. Ampit 1.13.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Homba anareo anie ny fahasoavan’i Jesoa Kristy Tompo!
