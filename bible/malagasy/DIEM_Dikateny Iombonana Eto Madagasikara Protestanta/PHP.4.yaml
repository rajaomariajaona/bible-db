document_id: PHP.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana
  - type: text
    content: Toy izany àry, ry hava-malala, no aoka hitomoeranareo tsara miray amin’ny Tompo. Fa tiako tokoa ianareo, ry havako, sady manina anareo fatratra aho; ianareo no fifaliako sy toy ny satroboninahi-pandresena ho ahy.
  '10':
  - type: text
    content: 'Nahatsapa hafaliana lehibe tao amin’ny Tompo aho, satria nasehonareo indray ny fiahianareo ahy. Nitohy hatrany ny fiahianareo ahy, saingy tsy mbola nisy fotoana hanehoanareo izany. '
  '11':
  - type: text
    content: 'Tsy noho izaho sahirana no itenenako toy izao, fa efa nianatra ny hianina amin’izay ananako aho. '
  '12':
  - type: text
    content: 'Haiko ny mihafy, haiko ny manam-be. Efa nianarako ny hianina na aiza na aiza ary na amin’inona na amin’inona, na voky aho na noana, na manam-be aho na sahirana. '
  '13':
  - type: text
    content: 'Afaka miatrika izany rehetra izany aho, noho i '
  - type: text
    content: Kristy
  - type: text
    content: ' manome hery ahy. '
  '14':
  - type: text
    content: 'Kanefa soa izao nataonareo izao: niombom-pahoriana tamiko ianareo ka nanampy ahy.'
  '15':
  - type: text
    content: 'Fantatrareo koa, ry Filipianina, fa nony niala tany Masedônia aho, tamin’ny fotoana niandohan’ny fitoriana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ', dia ianareo no hany Fiangonana nanampy ahy ka nanana kaontin’ny miditra sy mivoaka nifanaovana tamiko'
  - type: note
    content: 'Masedônia: jereo 2Kôr 1.16 sy nta. –Ny miditra sy mivoaka: mampiasa ny fiteny eo amin’ny fifandraharahana ara-barotra i Paoly eto.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: Fony aho mbola tany Tesalônika, dia efa indray mandeha amana indroa no nandefasanareo izay nilaiko
  - type: note
    content: 'And 15-16: jereo Asa 17.1; 2Kôr 11.9.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Tsy hoe mitady fanomezana aho no milaza izany, fa mitady ny vokatra hiavosa ao amin’ny kaontin’ny miditra ho anareo. '
  '18':
  - type: text
    content: Eny, manana ny zavatra rehetra ilaiko aho izao sady manana amby ampy; efa voaraiko tamin’i Epafrôdito ny fanomezana avy aminareo, ka heni-tsoa mitafotafo aho. Izany fanomezanareo izany dia toy ny zava-manitra mamerovero atao sorona ka raisin’Andriamanitra sady ankasitrahiny
  - type: note
    content: Ampit Eks 29.18; Ef 5.2.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Fa Andriamanitro kosa hanome mitafotafo izay rehetra ilainareo araka ny harena heni-boninahitra atolony ao amin’i Kristy Jesoa. '
  '2':
  - type: text
    content: 'Ry i Eodia sy i Sintîka, miangavy mafy anareo aho mba hifanaraka, noho ianareo mpirahavavy ao amin’ny Tompo. '
  '20':
  - type: text
    content: 'Ho an’ilay Andriamanitra sady Raintsika anie ny voninahitra mandrakizay mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  - type: heading
    content: Fanaovam-beloma
  '21':
  - type: text
    content: 'Veloma any amin’izay rehetra isan’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' ka tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa. Manao veloma anareo ny havana iray finoana, izay tafaraka amiko; '
  '22':
  - type: text
    content: manao veloma anareo ny vahoakan’Andriamanitra rehetra eto, fa indrindra ry zareo ao an-dapan’ny amperôra
  - type: note
    content: 'lapan’ny amperôra: fomba fiteny ahatsiarovana an’i Rôma, renivohitry ny Fanjakambe rômanina. Nefa ny hoe ry zareo ao an-dapan’ny amperôra dia mety niantsoana koa ireo mpanao fanjakana amin’ny tanàna ivelan’i Rôma, ka nisy governora rômanina. Ampit 1.13.'
  - type: text
    content: .
  '23':
  - type: text
    content: Homba anareo anie ny fahasoavan’i Jesoa Kristy Tompo!
  '3':
  - type: text
    content: 'Ary ianao koa, ry ilay mpiara-miasa akaiky tamiko, mangataka anao aho mba hanampy azy roa vavy, fa niara-nikatroka nanao izay hielezan’ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' izahay mbamin’i Klemanta koa sy ny hafa rehetra mpiara-miasa amiko izay samy voasoratra anarana ao amin’ilay horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay'
  - type: note
    content: 'mpiara-miasa akaiky tamiko: tsy fantatra io olona itenenan’i Paoly io. Araka ny mpanao heviteny sasany, dia mety mifanandrify amina anaran’olona ilay teny grika suzugos adika eto hoe mpiara-miasa. –horonamboky... mandrakizay: ampit Apôk 3.5.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Mifalia mandrakariva noho ianareo tafaray amin’ny Tompo. Mbola antitranteriko indray: mifalia! Manehoa fandeferana amin’ny olona rehetra. '
  '5':
  - type: text
    content: 'Tsy ho ela, dia ho tonga ny Tompo! '
  '6':
  - type: text
    content: Aza manahy na inona na inona
  - type: note
    content: Ampit Mt 6.25-34.
  - type: text
    content: ' fa ambarao amin’Andriamanitra isaka izay mivavaka ny zavatra ilainareo, ary angataho amin’ny fo feno fankasitrahana. '
  '7':
  - type: text
    content: 'Ary ilay fiadanana avy amin’Andriamanitra sady mihoatra noho ny zavatra rehetra takatry ny fieritreretan’olombelona, dia hiaro ny fonareo sy ny sainareo, satria efa tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa ianareo.'
  '8':
  - type: text
    content: 'Farany, ry havana, aoka hoheverinareo izay zavatra tsara sy maha te hidera: dia izay rehetra marina, manan-kaja, ara-drariny, madio, mahatehotia ary tsara laza. '
  '9':
  - type: text
    content: Ataovy izay efa nianaranareo sy noraisinareo tamiko ary izay renareo sy hitanareo nataoko. Dia homba anareo Andriamanitra loharanon’ny fiadanana.
  - type: heading
    content: Fisaorana noho ny fanomezana nataon’ny Filipianina
