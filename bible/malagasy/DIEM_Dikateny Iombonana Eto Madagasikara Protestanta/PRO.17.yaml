document_id: PRO.17
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aleo tapa-mofo maina hanina amim-piadanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay fanasam-be ao amin’ny trano misy fifandirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny mpanompo hendry hisolongona ny zanaka manala baràka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handray anjara lova eo amin’ny mpirahalahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Misy ny memy fisedrana ny volafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fatana fandrendrehana ny volamena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny TOMPO no mizaha toetra ny fon’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny mpanao ratsy manongilan-tsofina amin-dresaka lainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpandainga mihaino ny tenim-panaratsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay maneso ny mahantra miteny ratsy ny Mpanao azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay faly amin’ny fahorian’ny sasany dia hofaizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Satroboninahitry ny antitra ny zafikeliny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary reharehan’ny zanaka ny rainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy an’ny ketrina mihitsy ny hanao teny mihaja,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vao mainka an’ny olo-manankaja ny hilaza lainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny kolikoly dia heverina hanambina ny mpanolotra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampahomby ny zavatra rehetra hataony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mpanolotra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpandray, mpahazo.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay mitady fihavanana manadino ny hadisoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mamoha fota-mandry mampisaraka ny mpisakaiza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mandaitra kokoa ny anatra iray amin’ny olona misaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny kapoka injato amin’ny olona adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny maditra dia fatra-pitady ny hanao ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handefasan’ny Tompo iraka lozabe hamely azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aleo tojo orsavavy very anaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay sendra adala mihetsika hadalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay olona mamaly ratsy ny soa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hialan’ny ratsy ao an-tranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fiandoham-pifandirana dia toy ny mamaky tohandrano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ajanòny izany dieny tsy mbola mihombo ny ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Samy halan’ny TOMPO avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny fanamarinana ny olo-meloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny fanamelohana ny olo-marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hatao inona ny vola eo an-tanan’ny adala?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamidy fahendrena ve? Tsy manan-tsaina hanao izany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny namana dia izay tia amin’ny fotoana rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miseho toy ny mpiray tampo izy amin’ny fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Olona tsy ampy saina izay mipai-tanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: manaiky hiantoka ny trosan’ny hafa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 6.1-5 sy ireo nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay tia fifandirana tia fahotana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay manana hambom-po diso tafahoatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitady fahavoazana ho an’ny tenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay be hafetsen-dratsy dia tsy hahita hasambarana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay miolakola-piteny no hianjadian’ny loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay miteraka adala, hahazo alahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny rain’ny ketrina tsy mba ho faly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny fo falifaly mahasoa ny vatana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahakiviana mahamaina ny taolana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mandray kolikoly mangingina ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamadihany ny fizotran’ny ara-drariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Misoritra amin’ny endriky ny manan-tsaina ny fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mason’ny adala mibirioka any am-paran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny zanaka adala manome alahelo ny rainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fahoriana mangidy ny reniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsy tsara ny manasazy olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ara-drariny ny mamely olona manan-kaja.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay mahalanjalanja ny teniny no feno fahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mahatsindry fo no olona manan-tsaina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: na ny adala aza, rehefa tsy miteny, dia toy ny hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mikombom-bava izy, dia toa manan-tsaina.
