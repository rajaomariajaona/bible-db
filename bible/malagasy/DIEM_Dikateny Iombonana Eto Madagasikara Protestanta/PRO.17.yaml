document_id: PRO.17,396
type_code: plt
verses:
  '1':
  - type: text
    content: Aleo tapa-mofo maina hanina amim-piadanana,
  - type: text
    content: toy izay fanasam-be ao amin’ny trano misy fifandirana.
  '10':
  - type: text
    content: Mandaitra kokoa ny anatra iray amin’ny olona misaina
  - type: text
    content: noho ny kapoka injato amin’ny olona adala.
  '11':
  - type: text
    content: Ny maditra dia fatra-pitady ny hanao ratsy,
  - type: text
    content: ka handefasan’ny Tompo iraka lozabe hamely azy.
  '12':
  - type: text
    content: Aleo tojo orsavavy very anaka,
  - type: text
    content: toy izay sendra adala mihetsika hadalana.
  '13':
  - type: text
    content: Izay olona mamaly ratsy ny soa
  - type: text
    content: dia tsy hialan’ny ratsy ao an-tranony.
  '14':
  - type: text
    content: Ny fiandoham-pifandirana dia toy ny mamaky tohandrano;
  - type: text
    content: koa ajanòny izany dieny tsy mbola mihombo ny ady.
  '15':
  - type: text
    content: Samy halan’ny TOMPO avokoa
  - type: text
    content: na ny fanamarinana ny olo-meloka
  - type: text
    content: na ny fanamelohana ny olo-marina.
  '16':
  - type: text
    content: Hatao inona ny vola eo an-tanan’ny adala?
  - type: text
    content: Hamidy fahendrena ve? Tsy manan-tsaina hanao izany izy.
  '17':
  - type: text
    content: Ny namana dia izay tia amin’ny fotoana rehetra,
  - type: text
    content: ka miseho toy ny mpiray tampo izy amin’ny fahoriana.
  '18':
  - type: text
    content: Olona tsy ampy saina izay mipai-tanana
  - type: text
    content: manaiky hiantoka ny trosan’ny hafa
  - type: note
    content: Jereo 6.1-5 sy ireo nta.
  - type: text
    content: .
  '19':
  - type: text
    content: Izay tia fifandirana tia fahotana;
  - type: text
    content: ary izay manana hambom-po diso tafahoatra
  - type: text
    content: dia mitady fahavoazana ho an’ny tenany.
  '2':
  - type: text
    content: Ny mpanompo hendry hisolongona ny zanaka manala baràka,
  - type: text
    content: ka handray anjara lova eo amin’ny mpirahalahy.
  '20':
  - type: text
    content: Izay be hafetsen-dratsy dia tsy hahita hasambarana;
  - type: text
    content: ary izay miolakola-piteny no hianjadian’ny loza.
  '21':
  - type: text
    content: Izay miteraka adala, hahazo alahelo;
  - type: text
    content: fa ny rain’ny ketrina tsy mba ho faly.
  '22':
  - type: text
    content: Ny fo falifaly mahasoa ny vatana;
  - type: text
    content: fa ny fahakiviana mahamaina ny taolana.
  '23':
  - type: text
    content: Mandray kolikoly mangingina ny olon-dratsy
  - type: text
    content: hamadihany ny fizotran’ny ara-drariny.
  '24':
  - type: text
    content: Misoritra amin’ny endriky ny manan-tsaina ny fahendrena,
  - type: text
    content: fa ny mason’ny adala mibirioka any am-paran’ny tany.
  '25':
  - type: text
    content: Ny zanaka adala manome alahelo ny rainy
  - type: text
    content: ary fahoriana mangidy ny reniny.
  '26':
  - type: text
    content: Tsy tsara ny manasazy olo-marina;
  - type: text
    content: tsy ara-drariny ny mamely olona manan-kaja.
  '27':
  - type: text
    content: Izay mahalanjalanja ny teniny no feno fahalalana;
  - type: text
    content: ary izay mahatsindry fo no olona manan-tsaina;
  '28':
  - type: text
    content: na ny adala aza, rehefa tsy miteny, dia toy ny hendry;
  - type: text
    content: rehefa mikombom-bava izy, dia toa manan-tsaina.
  '3':
  - type: text
    content: Misy ny memy fisedrana ny volafotsy
  - type: text
    content: ary ny fatana fandrendrehana ny volamena,
  - type: text
    content: fa ny TOMPO no mizaha toetra ny fon’ny olona.
  '4':
  - type: text
    content: Ny mpanao ratsy manongilan-tsofina amin-dresaka lainga,
  - type: text
    content: ary ny mpandainga mihaino ny tenim-panaratsiana.
  '5':
  - type: text
    content: Izay maneso ny mahantra miteny ratsy ny Mpanao azy;
  - type: text
    content: ary izay faly amin’ny fahorian’ny sasany dia hofaizina.
  '6':
  - type: text
    content: Satroboninahitry ny antitra ny zafikeliny;
  - type: text
    content: ary reharehan’ny zanaka ny rainy.
  '7':
  - type: text
    content: Tsy an’ny ketrina mihitsy ny hanao teny mihaja,
  - type: text
    content: ary vao mainka an’ny olo-manankaja ny hilaza lainga.
  '8':
  - type: text
    content: Ny kolikoly dia heverina hanambina ny mpanolotra azy,
  - type: text
    content: ka hampahomby ny zavatra rehetra hataony
  - type: note
    content: 'mpanolotra: dkt hafa mpandray, mpahazo.'
  - type: text
    content: .
  '9':
  - type: text
    content: Izay mitady fihavanana manadino ny hadisoana;
  - type: text
    content: fa izay mamoha fota-mandry mampisaraka ny mpisakaiza.
