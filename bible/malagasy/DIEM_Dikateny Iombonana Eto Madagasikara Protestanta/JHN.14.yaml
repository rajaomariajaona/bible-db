segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jesoa no lalana mankany amin’ny Ray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy i Jesoa tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka tsy hangorohoro ny fonareo: minoa an’Andriamanitra ianareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'minoa an’Andriamanitra ianareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mino an’Andriamanitra ianareo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ary mino Ahy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Misy fonenana maro ao an-tranon’ny Raiko; raha tsy izany, dia ho nilaza taminareo ve Aho fa handeha hamboatra toerana ho anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'raha tsy izany... anareo?: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary handeha Aho hamboatra toerana ho anareo; raha tsy izany dia tsy ho nilaza taminareo Aho
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa lasa Aho ka voavoatra ny toerana ho anareo, dia hiverina Aho haka anareo ho eo anilako; ka izay misy Ahy no hisy anareo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary fantatrareo ny lalana ho any amin’izay alehako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy i Tômà taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy fantatray izay alehanao, ry Tompo! Ka ahoana no hahafantaranay ny lalana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no lalana sy fahamarinana ary aina; tsy misy olona mankany amin’ny Ray raha tsy amin’ny alalako. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha mahafantatra Ahy ianareo, dia hahafantatra ny Raiko ihany koa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Raha mahafantatra Ahy ianareo, dia hahafantatra ny Raiko ihany koa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raha nahafantatra Ahy ianareo, dia ho nahafantatra ny Raiko ihany koa.
    marker-yv: yv-n
  - type: text
    text: ; dieny izao no ahafantaranareo Azy sady efa nahitanareo Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I Filipo kosa nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Asehoy anay ny Ray, ry Tompo, dia ampy ho anay izay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izay ela izay no niarahako taminareo ka tsy fantatrao ve Aho, ry Filipo? Izay nahita Ahy, dia nahita ny Ray; koa ahoana no anaovanao hoe: «Asehoy anay ny Ray»? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy mino ve ianao fa Izaho dia ao anatin’ny Ray, ary ny Ray ato anatiko? Ny teny izay lazaiko aminareo, dia tsy ambarako avy amin’ny tenako: fa ny Ray Izay mitoetra ao anatiko no manao ny asany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Minoa Ahy fa Izaho dia ao anatin’ny Ray ary ny Ray ato anatiko; raha tsy mino ny teniko ianareo, dia minoa ahay noho ireny asa ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lazaiko marina dia marina aminareo fa izay mino Ahy dia hanao ny asa ataoko ihany koa; ary hanao asa lehibe noho izany aza izy, satria mankany amin’ny Ray Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary na inona na inona angatahinareo noho ny anarako, dia hataoko izany, mba hahazoan’ny Ray voninahitra eo amin’ny Zanaka. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha noho ny anarako no angatahanareo zavatra amiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'amiko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: misy stf sasany tsy ahitana io teny io.
    marker-yv: yv-n
  - type: text
    text: ', dia hataoko izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampanantenain’i Jesoa ny Fanahy Masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha tia Ahy ianareo, dia hitandrina ireo didiko. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izaho koa hangataka amin’ny Ray, ary Izy no hanome anareo Mpampionona hafa mba homba anareo mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izany Mpampionona hafa izany dia ny Fanahy fahamarinana, Izay tsy azon’izao tontolo izao raisina, satria tsy hitany sady tsy fantany; fa ianareo no mahafantatra Azy, satria mitoetra eo anilanareo Izy sady ho ao anatinareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mpampionona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny FTS amin’ny voambolana hoe PARAKLETO. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: mitoetra eo anilanareo Izy sady ho ao anatinareo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mitoetra eo anilanareo Izy sady ao anatinareo;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ary misy koa ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hitoetra eo anilanareo Izy ary ho ao anatinareo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy hamela anareo ho kamboty Aho, fa hiverina atỳ aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha afaka kelikely, dia tsy hahita Ahy intsony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: '; fa ianareo no hahita Ahy satria velona Aho ary ho velona koa ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amin’izany andro izany, dia ho fantatrareo fa Izaho dia ao anatin’ny Ray, ianareo ato anatiko ary Izaho ao anatinareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay manana ireo didiko sy mitandrina azy no tia Ahy; ary izay tia Ahy dia hotiavin’ny Raiko, ary Izaho koa ho tia azy ka hiseho aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa i Jodasy, (tsy ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Iskariôta
  - type: text
    text: '), nanao tamin’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana, ry Tompo, no aminay ihany no hisehoanao, fa tsy amin’izao tontolo izao koa?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha misy olona tia Ahy, dia hitandrina ny teniko izy; ho tia azy ny Raiko, ary Izaho sy ny Raiko dia hankao aminy ka honina ao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay tsy tia Ahy, dia tsy mitandrina ireo teniko; ary ny teny izay renareo dia tsy avy amiko fa avy amin’ny Ray Izay naniraka Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voalazako taminareo izany, raha mbola mitoetra eto aminareo Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa ilay Mpananatra, dia ny Fanahy Masina Izay hirahin’ny Ray noho ny anarako, no hampianatra anareo ny zavatra rehetra sy hampahatsiaro anareo ny zavatra rehetra nolazaiko taminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fiadanana no avelako ho anareo, ny fiadanako no omeko anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 9.5.
    marker-yv: yv-n
  - type: text
    text: '; tsy mba fiadanana tahaka ny fanomezan’izao tontolo izao no omeko anareo. Aoka izay ny horohoro na ny tahotra ao am-ponareo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Efa renareo fa izao no voalazako taminareo: «Handeha Aho, nefa mbola hiverina ho atỳ aminareo.» Raha tia Ahy ianareo, dia ho faly amin’izao andehanako ho any amin’ny Ray izao, satria lehibe noho Izaho ny Ray. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Niteny taminareo sahady Aho, dieny tsy mbola tonga izany, mba hinoanareo rehefa tonga izany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tsy hilaza zavatra maro aminareo intsony Aho, satria tonga ilay filohan’izao tontolo izao: tsy manam-pahefana amiko velively izy, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: saingy tonga izy mba hahafantaran’izao tontolo izao fa tiako ny Ray, ary araka izay nandidian’ny Ray Ahy no ataoko. Mitsangàna, ndeha isika hiala eto!
