document_id: JHN.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jesoa no lalana mankany amin’ny Ray
  - type: text
    content: 'Ary hoy i Jesoa tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  - type: text
    content: '–Aoka tsy hangorohoro ny fonareo: minoa an’Andriamanitra ianareo'
  - type: note
    content: 'minoa an’Andriamanitra ianareo: na hoe mino an’Andriamanitra ianareo.'
  - type: text
    content: ', ary mino Ahy koa. '
  '10':
  - type: text
    content: 'Tsy mino ve ianao fa Izaho dia ao anatin’ny Ray, ary ny Ray ato anatiko? Ny teny izay lazaiko aminareo, dia tsy ambarako avy amin’ny tenako: fa ny Ray Izay mitoetra ao anatiko no manao ny asany. '
  '11':
  - type: text
    content: 'Minoa Ahy fa Izaho dia ao anatin’ny Ray ary ny Ray ato anatiko; raha tsy mino ny teniko ianareo, dia minoa ahay noho ireny asa ireny. '
  '12':
  - type: text
    content: 'Lazaiko marina dia marina aminareo fa izay mino Ahy dia hanao ny asa ataoko ihany koa; ary hanao asa lehibe noho izany aza izy, satria mankany amin’ny Ray Aho. '
  '13':
  - type: text
    content: 'Ary na inona na inona angatahinareo noho ny anarako, dia hataoko izany, mba hahazoan’ny Ray voninahitra eo amin’ny Zanaka. '
  '14':
  - type: text
    content: Raha noho ny anarako no angatahanareo zavatra amiko
  - type: note
    content: 'amiko: misy stf sasany tsy ahitana io teny io.'
  - type: text
    content: ', dia hataoko izany.'
  - type: heading
    content: Ampanantenain’i Jesoa ny Fanahy Masina
  '15':
  - type: text
    content: 'Raha tia Ahy ianareo, dia hitandrina ireo didiko. '
  '16':
  - type: text
    content: 'Izaho koa hangataka amin’ny Ray, ary Izy no hanome anareo Mpampionona hafa mba homba anareo mandrakizay. '
  '17':
  - type: text
    content: Izany Mpampionona hafa izany dia ny Fanahy fahamarinana, Izay tsy azon’izao tontolo izao raisina, satria tsy hitany sady tsy fantany; fa ianareo no mahafantatra Azy, satria mitoetra eo anilanareo Izy sady ho ao anatinareo
  - type: note
    content: 'Mpampionona: jereo ny FTS amin’ny voambolana hoe PARAKLETO. –mitoetra eo anilanareo Izy sady ho ao anatinareo: misy stf sasany ahitana hoe mitoetra eo anilanareo Izy sady ao anatinareo; ary misy koa ahitana hoe hitoetra eo anilanareo Izy ary ho ao anatinareo.'
  - type: text
    content: .
  '18':
  - type: text
    content: 'Tsy hamela anareo ho kamboty Aho, fa hiverina atỳ aminareo. '
  '19':
  - type: text
    content: 'Raha afaka kelikely, dia tsy hahita Ahy intsony '
  - type: text
    content: izao tontolo izao
  - type: text
    content: '; fa ianareo no hahita Ahy satria velona Aho ary ho velona koa ianareo. '
  '2':
  - type: text
    content: Misy fonenana maro ao an-tranon’ny Raiko; raha tsy izany, dia ho nilaza taminareo ve Aho fa handeha hamboatra toerana ho anareo
  - type: note
    content: 'raha tsy izany... anareo?: dkt hafa ary handeha Aho hamboatra toerana ho anareo; raha tsy izany dia tsy ho nilaza taminareo Aho.'
  - type: text
    content: '? '
  '20':
  - type: text
    content: Amin’izany andro izany, dia ho fantatrareo fa Izaho dia ao anatin’ny Ray, ianareo ato anatiko ary Izaho ao anatinareo.
  '21':
  - type: text
    content: Izay manana ireo didiko sy mitandrina azy no tia Ahy; ary izay tia Ahy dia hotiavin’ny Raiko, ary Izaho koa ho tia azy ka hiseho aminy.
  '22':
  - type: text
    content: 'Fa i Jodasy, (tsy ilay '
  - type: text
    content: Iskariôta
  - type: text
    content: '), nanao tamin’i Jesoa hoe:'
  - type: text
    content: –Nahoana, ry Tompo, no aminay ihany no hisehoanao, fa tsy amin’izao tontolo izao koa?
  '23':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: '–Raha misy olona tia Ahy, dia hitandrina ny teniko izy; ho tia azy ny Raiko, ary Izaho sy ny Raiko dia hankao aminy ka honina ao. '
  '24':
  - type: text
    content: Izay tsy tia Ahy, dia tsy mitandrina ireo teniko; ary ny teny izay renareo dia tsy avy amiko fa avy amin’ny Ray Izay naniraka Ahy.
  '25':
  - type: text
    content: 'Voalazako taminareo izany, raha mbola mitoetra eto aminareo Aho. '
  '26':
  - type: text
    content: Fa ilay Mpananatra, dia ny Fanahy Masina Izay hirahin’ny Ray noho ny anarako, no hampianatra anareo ny zavatra rehetra sy hampahatsiaro anareo ny zavatra rehetra nolazaiko taminareo.
  '27':
  - type: text
    content: Fiadanana no avelako ho anareo, ny fiadanako no omeko anareo
  - type: note
    content: Ampit Is 9.5.
  - type: text
    content: '; tsy mba fiadanana tahaka ny fanomezan’izao tontolo izao no omeko anareo. Aoka izay ny horohoro na ny tahotra ao am-ponareo. '
  '28':
  - type: text
    content: 'Efa renareo fa izao no voalazako taminareo: «Handeha Aho, nefa mbola hiverina ho atỳ aminareo.» Raha tia Ahy ianareo, dia ho faly amin’izao andehanako ho any amin’ny Ray izao, satria lehibe noho Izaho ny Ray. '
  '29':
  - type: text
    content: 'Niteny taminareo sahady Aho, dieny tsy mbola tonga izany, mba hinoanareo rehefa tonga izany. '
  '3':
  - type: text
    content: 'Ary rehefa lasa Aho ka voavoatra ny toerana ho anareo, dia hiverina Aho haka anareo ho eo anilako; ka izay misy Ahy no hisy anareo koa. '
  '30':
  - type: text
    content: 'Tsy hilaza zavatra maro aminareo intsony Aho, satria tonga ilay filohan’izao tontolo izao: tsy manam-pahefana amiko velively izy, '
  '31':
  - type: text
    content: saingy tonga izy mba hahafantaran’izao tontolo izao fa tiako ny Ray, ary araka izay nandidian’ny Ray Ahy no ataoko. Mitsangàna, ndeha isika hiala eto!
  '4':
  - type: text
    content: Ary fantatrareo ny lalana ho any amin’izay alehako.
  '5':
  - type: text
    content: 'Dia hoy i Tômà taminy:'
  - type: text
    content: –Tsy fantatray izay alehanao, ry Tompo! Ka ahoana no hahafantaranay ny lalana?
  '6':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Izaho no lalana sy fahamarinana ary aina; tsy misy olona mankany amin’ny Ray raha tsy amin’ny alalako. '
  '7':
  - type: text
    content: Raha mahafantatra Ahy ianareo, dia hahafantatra ny Raiko ihany koa
  - type: note
    content: 'Raha mahafantatra Ahy ianareo, dia hahafantatra ny Raiko ihany koa: misy stf sasany ahitana hoe raha nahafantatra Ahy ianareo, dia ho nahafantatra ny Raiko ihany koa.'
  - type: text
    content: ; dieny izao no ahafantaranareo Azy sady efa nahitanareo Azy.
  '8':
  - type: text
    content: 'I Filipo kosa nanao taminy hoe:'
  - type: text
    content: –Asehoy anay ny Ray, ry Tompo, dia ampy ho anay izay.
  '9':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Izay ela izay no niarahako taminareo ka tsy fantatrao ve Aho, ry Filipo? Izay nahita Ahy, dia nahita ny Ray; koa ahoana no anaovanao hoe: «Asehoy anay ny Ray»? '
