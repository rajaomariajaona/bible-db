        - type: text
          text: 'amiko: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misy stf sasany tsy ahitana io teny io.
      marker-yv: yv-n
    - type: text
      text: ', dia hataoko izany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ampanantenain’i Jesoa ny Fanahy Masina
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tia Ahy ianareo, dia hitandrina ireo didiko. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho koa hangataka amin’ny Ray, ary Izy no hanome anareo Mpampionona hafa mba homba anareo mandrakizay. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany Mpampionona hafa izany dia ny Fanahy fahamarinana, Izay tsy azon’izao tontolo izao raisina, satria tsy hitany sady tsy fantany; fa ianareo no mahafantatra Azy, satria mitoetra eo anilanareo Izy sady ho ao anatinareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mpampionona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe PARAKLETO. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: mitoetra eo anilanareo Izy sady ho ao anatinareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mitoetra eo anilanareo Izy sady ao anatinareo;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ary misy koa ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hitoetra eo anilanareo Izy ary ho ao anatinareo
      - type: usfm
        marker: ft
        children:
        - type: text
