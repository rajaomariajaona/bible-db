document_id: PSA.90,396
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY FAHEFATRA
  - type: heading
    content: (Salamo 90–106)
  - type: heading
    content: SALAMO Mandalo ny olona fa mitoetra Andriamanitra
  - type: text
    content: ' '
  - type: text
    content: Vavak’i Mosesy, olon’Andriamanitra.
  - type: text
    content: Tompo ô, fialofanay hatrany hatrany Ianao.
  '10':
  - type: text
    content: Tsy maharitra afa-tsy fitopolo taona izany,
  - type: text
    content: na valopolo taona ho an’izay matanjaka;
  - type: text
    content: kanefa hasasarana sy zava-poana no vokany.
  - type: text
    content: Mandalo vetivety tokoa izany fiainana
  - type: text
    content: ary manidina ho any amin’ny varo-tsy mifody izahay.
  '11':
  - type: text
    content: Iza no mahalala ny herin’ny fahatezeranao
  - type: text
    content: ary hanaja Anao araka ny fahaviniranao?
  '12':
  - type: text
    content: Ampahafantaro anay fa voaisa ny andronay
  - type: text
    content: mba hahatonga anay hanana fisainana hendry.
  '13':
  - type: text
    content: TOMPO ô, mandra-pahoviana no mbola hitezeranao anay?
  - type: text
    content: Mba itodiho izahay mpanomponao ka amindrao fo.
  '14':
  - type: text
    content: Fenoy ny fitiavanao izahay raha vao maraina,
  - type: text
    content: dia hihoby sy hifaly amin’ny andro sisa iainanay.
  '15':
  - type: text
    content: Aoka hampifalînao izahay
  - type: text
    content: araka ny andro nampahorînao anay
  - type: text
    content: sy araka ny taona nahitanay loza!
  '16':
  - type: text
    content: Ny ataonao aminay anie ho hitanay maso
  - type: text
    content: ary ny voninahitrao ho tsapan’ny taranakay!
  '17':
  - type: text
    content: Ry Tompo Andriamanitray ô,
  - type: text
    content: aoka ho aminay ny fahamoram-panahinao
  - type: text
    content: ka ampahombiazo ny asan’ny tananay;
  - type: text
    content: eny, ampahombiazo ny asan’ny tananay.
  '2':
  - type: text
    content: Fony tsy mbola ary akory ny tendrombohitra,
  - type: text
    content: tsy mbola voaforonao ny tany sy izao tontolo izao,
  - type: text
    content: dia efa Andriamanitra Ianao
  - type: text
    content: hatrizay ka ho mandrakizay.
  '3':
  - type: text
    content: Averinao ho vovoka
  - type: note
    content: 'Vovoka: jereo Gen 3.19.'
  - type: text
    content: ' ny olona ka ilazanao hoe:'
  - type: text
    content: «Miverena amin’izay niavianareo, rey olombelona.»
  '4':
  - type: text
    content: Fa eo imasonao ny arivo taona
  - type: text
    content: dia toy ny andro omaly efa lasana
  - type: text
    content: na ora vitsivitsy amin’ny alina
  - type: note
    content: Jereo 2Pt 3.8.
  - type: text
    content: .
  '5':
  - type: text
    content: Farananao ny fiainan’ny olona
  - type: text
    content: ka mihelina toa torimaso maraina;
  - type: text
    content: tahaka ny ahitra maniry izy,
  '6':
  - type: text
    content: ka mamony sy mandrobona nony maraina,
  - type: text
    content: fa malazo sy maina nony hariva.
  '7':
  - type: text
    content: Lanin’ny fahatezeranao izahay
  - type: text
    content: ary tonafan’ny fahaviniranao.
  '8':
  - type: text
    content: Napetrakao eo anatrehanao ny helokay;
  - type: text
    content: na ny fahotanay miafina aza dia hitanao mazava.
  '9':
  - type: text
    content: Noho ny haviniranao dia lasana ny androm-piainanay,
  - type: text
    content: ka indray misento monja dia nifarana ny taonanay.
