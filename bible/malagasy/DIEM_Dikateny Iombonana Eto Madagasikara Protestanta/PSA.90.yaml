- type: usfm
  marker: ms1
  children:
  - type: text
    text: BOKY FAHEFATRA
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: (Salamo 90–106)
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Mandalo ny olona fa mitoetra Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vavak’i Mosesy, olon’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tompo ô, fialofanay hatrany hatrany Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fony tsy mbola ary akory ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mbola voaforonao ny tany sy izao tontolo izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa Andriamanitra Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrizay ka ho mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Averinao ho vovoka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '90.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Vovoka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 3.19.
    marker-yv: yv-n
  - type: text
    text: ' ny olona ka ilazanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Miverena amin’izay niavianareo, rey olombelona.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa eo imasonao ny arivo taona
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny andro omaly efa lasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ora vitsivitsy amin’ny alina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '90.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2Pt 3.8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Farananao ny fiainan’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihelina toa torimaso maraina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny ahitra maniry izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ka mamony sy mandrobona nony maraina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa malazo sy maina nony hariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lanin’ny fahatezeranao izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tonafan’ny fahaviniranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Napetrakao eo anatrehanao ny helokay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny fahotanay miafina aza dia hitanao mazava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho ny haviniranao dia lasana ny androm-piainanay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka indray misento monja dia nifarana ny taonanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy maharitra afa-tsy fitopolo taona izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na valopolo taona ho an’izay matanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa hasasarana sy zava-poana no vokany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandalo vetivety tokoa izany fiainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manidina ho any amin’ny varo-tsy mifody izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Iza no mahalala ny herin’ny fahatezeranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanaja Anao araka ny fahaviniranao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ampahafantaro anay fa voaisa ny andronay
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatonga anay hanana fisainana hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: TOMPO ô, mandra-pahoviana no mbola hitezeranao anay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba itodiho izahay mpanomponao ka amindrao fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fenoy ny fitiavanao izahay raha vao maraina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihoby sy hifaly amin’ny andro sisa iainanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aoka hampifalînao izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny andro nampahorînao anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy araka ny taona nahitanay loza!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny ataonao aminay anie ho hitanay maso
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny voninahitrao ho tsapan’ny taranakay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ry Tompo Andriamanitray ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho aminay ny fahamoram-panahinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ampahombiazo ny asan’ny tananay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ampahombiazo ny asan’ny tananay.
