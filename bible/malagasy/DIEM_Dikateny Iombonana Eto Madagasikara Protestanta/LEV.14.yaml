document_id: LEV.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanadiovana ny marary hoditra
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '10':
  - type: text
    content: '«Amin’ny andro fahavalo, dia ireto avy no zavatra hoentiny; zanakondrilahy roa tsy misy kilema, zanakondrivavy anankiray tsy misy kilema sady vao iray taona, koba lafarinina tsara voaharo menaka sady milanja sivy kilao, ary menaka antsasa-litatra. '
  '11':
  - type: text
    content: 'Ny mpisorona, izay mitarika ny fombam-pivavahana fidiovana, dia hametraka ilay olona sy ireo zavatra ireo eo anatrehan’ny TOMPO, izany hoe eo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Dia haka ny zanakondrilahy iray ny mpisorona, ka hanolotra azy ho '
  - type: text
    content: sorom-panonerana
  - type: text
    content: ' miaraka amin’ny menaka antsasa-litatra; hahevahevany eo anatrehan’ny TOMPO no ho fomba fanolotra an’ireo. '
  '13':
  - type: text
    content: 'Io zanakondrilahy io dia hovonoiny eo amin’ny toerana famonoana ny biby hatao sorona fanalana ny ota na hatao sorona dorana manontolo, dia eo amin’ny faritra voatokana hanaovana izany; tahaka ny amin’ny sorona fanalana ny ota no fanao amin’ny sorom-panonerana, ka zava-masina dia masina natao ho anjaran’ny mpisorona izany. '
  '14':
  - type: text
    content: 'Hangalan’ny mpisorona ny ran’ilay sorom-panonerana mba hanentenany an’ilay diovina: dia hatentiny eo amin’ny ravin-tsofiny ankavanana sy ny ankiben-tanany ankavanana ary ny ankiben-tongony ankavanana izany. '
  '15':
  - type: text
    content: 'Hangalan’ny mpisorona koa ny menaka antsasa-litatra, ka haidiny eo am-pelatanany havia; '
  '16':
  - type: text
    content: 'ary hatsobony amin’io menaka izay eo am-pelatanany ankavia io ny fanondrony ankavanana ka hanaovany famafazana impito eo anatrehan’ny TOMPO. '
  '17':
  - type: text
    content: 'Avy eo dia mbola io menaka am-pelatanany io no hanentenany an’ilay diovina; dia hatentiny eo amin’ny ravin-tsofiny ankavanana sy ny ankiben-tanany ankavanana ary ny ankiben-tongony ankavanana izany, dia eo amin’ireo faritra efa notentenana ny ran’ilay sorom-panonerana. '
  '18':
  - type: text
    content: 'Ny menaka sisa eo am-pelatanan’ny mpisorona kosa hararany amin’ny lohan’ilay diovina; ary dia eo anatrehan’ny TOMPO no hanaovany ny fombam-pivavahana fanadiovana azy. '
  '19':
  - type: text
    content: 'Izay ny mpisorona vao hanolotra ny sorona fanalana ny ota sy hanao indray ny fombam-pivavahana fandiovana ho an’ilay diovina ho afaka amin’ny fahalotoany. Aorian’izany, dia hamono ny zanakondrilahy hatao sorona dorana manontolo ny mpisorona '
  '2':
  - type: text
    content: '«Ireto no fepetra momba ny marary hoditra, amin’ny andro '
  - type: text
    content: fanadiovana
  - type: text
    content: ' azy. Hoentina any amin’ny mpisorona ilay marary hoditra'
  - type: note
    content: Jereo Mt 8.4; Mk 1.44; Lk 5.14; 17-14.
  - type: text
    content: ', '
  '20':
  - type: text
    content: 'sy hanolotra azy eo ambonin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' miaraka amin’ny fanatitra lafarinina, ary hanao fanintelony ny fombam-pivavahana fanadiovana ho an’ilay diovina, dia ho voadio tokoa izy.'
  - type: heading
    content: Fanadiovana ny mahantra marary hoditra
  '21':
  - type: text
    content: '«Raha mahantra ilay marary hoditra ka tsy misy harena firy ananany, dia ireto avy ny zavatra hoentiny: zanakondrilahy iray monja hatao '
  - type: text
    content: sorom-panorenana
  - type: text
    content: ' ka hahevaheva eo anatrehan’ny Tompo no fanolotra azy mba hanaovana ny fombam-pivavahana '
  - type: text
    content: fanadiovana
  - type: text
    content: '; koba lafarinina tsara voaharo menaka sady milanja telo kilao; menaka antsasa-litatra; '
  '22':
  - type: text
    content: 'domohina roa na voromahailala roa, arakaraka izay hareny ananany, ka ny anankiray hatao sorona fanalana ny ota ary ny anankiray hatao sorona dorana manontolo. '
  '23':
  - type: text
    content: 'Amin’ilay andro fahavalo, dia hoentin’ilay marary hoditra ho any amin’ny mpisorona ireo zavatra ireo mba hanaovana ny fanadiovana azy eo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', eo anatrehan’ny TOMPO. '
  '24':
  - type: text
    content: 'Dia horaisin’ny mpisorona ilay zanakondrilahy hatao sorom-panonerana sy ilay menaka antsasa-litatra, ka hahevahevany eo anatrehan’ny TOMPO no ho fomba fanolotra an’ireo. '
  '25':
  - type: text
    content: 'Hovonoin’ny mpisorona io zanakondrilahy sorom-panonerana io, dia hangalany ny rany mba hanentenany an’ilay diovina dia hatentiny eo amin’ny ravin-tsofiny ankavanana sy ny ankiben-tanany ankavanana ary ny ankiben-tongony ankavanana izany. '
  '26':
  - type: text
    content: 'Avy eo dia hisy haidin’ny mpisorona eo am-pelatanany ankavia ny menaka; '
  '27':
  - type: text
    content: 'ary amin’io menaka am-pelatanany io no hakany amin’ny fanondrony ankavanana ka hanaovany famafazana impito eo anatrehan’ny TOMPO. '
  '28':
  - type: text
    content: 'Hotentenan’ny mpisorona amin’io menaka io koa ilay diovina, ka hatentiny eo amin’ny ravin-tsofiny ankavanana sy ny ankiben-tanany ankavanana ary ny ankiben-tongony ankavanana izany, dia eo amin’ireo faritra efa notentenana ny ran’ilay sorom-panonerana. '
  '29':
  - type: text
    content: 'Ny menaka sisa eo am-pelatanan’ny mpisorona kosa hararany amin’ny lohan’ilay diovina mba hanaovana ny fombam-pivavahana fanadiovana azy eo anatrehan’ny TOMPO. '
  '3':
  - type: text
    content: 'dia hivoaka ny toby kosa ny mpisorona mba hizaha azy. Raha hitany fa sitrana ny aretin’ilay marary hoditra, '
  '30':
  - type: text
    content: 'Dia horaisin’ny mpisorona ny iray amin’ny domohina na ny iray amin’ny voromahailala, arakaraka izay hareny ananan’ilay olona diovina, '
  '31':
  - type: text
    content: ka hatolony ho sorona fanalana ny ota; ny anankiray kosa hatolony ho sorona dorana manontolo miaraka amin’ny fanatitra lafarinina. Dia eo anatrehan’ny TOMPO no hanaovan’ny mpisorona fanintelony ny fombam-pivavahana fanadiovana ho an’ilay olona.»
  '32':
  - type: text
    content: 'Ireo no fepetra momba ny '
  - type: text
    content: marary hoditra
  - type: text
    content: ' eo amin’ny fanadiovana azy, raha tsy misy harena firy ananany.'
  - type: heading
    content: Ny amin’ny rindrina misy bobongolo
  '33':
  - type: text
    content: 'Dia niteny tamin’i Mosesy sy i Aharôna ny TOMPO nanao hoe:'
  '34':
  - type: text
    content: '«Rehefa tafiditra any amin’ny tany Kanahàna izay omeko ho fanananareo ianareo ka misy trano hasiako pentina bobongolo eo amin’ny tany fanananareo, '
  '35':
  - type: text
    content: 'dia handeha ny tompontrano hilaza izany amin’ny mpisorona ka hanao hoe: ‹Toa hitako misy pentina miseho ao amin’ny tranoko.› '
  '36':
  - type: text
    content: 'Alohan’ny hidiran’ny mpisorona hizaha ilay pentina, dia hasainy hesorina avokoa ny entana ao an-trano, mba tsy hisy zavatra '
  - type: text
    content: haloto
  - type: text
    content: ' amin’ireo entana ireo; izay vao hiditra ny mpisorona mba hizaha ilay trano. '
  '37':
  - type: text
    content: 'Rehefa voazahany kosa ny pentina, ka hitany fa mihady lavaka maitsomaitso na menamena eo amin’ny rindrina, '
  '38':
  - type: text
    content: 'dia hivoaka ny trano hihoatra ny tokonam-baravarana izy mpisorona ka hanidy ny trano tsy hivoha mandritra ny fito andro. '
  '39':
  - type: text
    content: 'Amin’ny andro fahafito no hiverina ao indray ny mpisorona mba hizaha ny trano; raha hitany fa manitatra eo amin’ny rindrina ilay pentina, '
  '4':
  - type: text
    content: 'dia vorona anankiroa velona sady '
  - type: text
    content: madio
  - type: text
    content: ' sy hazo sedera ary lamba jaky sy rantsana '
  - type: text
    content: hisôpa
  - type: text
    content: ' no hasain’ny mpisorona halaina ho an’ilay hodiovina. '
  '40':
  - type: text
    content: 'dia hasainy hesorina ireo vato misy izany, ka hariana amin’izay toerana maloto fanariana azy any ivelan’ny tanàna; '
  '41':
  - type: text
    content: 'ary hasainy hokikisana ny ati-drano manontolo, ka tany voakiky dia hariana koa amin’ilay toerana maloto fanariana azy any ivelan’ny tanàna. '
  '42':
  - type: text
    content: Vato hafa kosa no halaina hasolo ilay teo, ary feta hafa no halaina handalorana ny trano indray.
  '43':
  - type: text
    content: '«Raha tàhiny mipoitra eo amin’ny trano indray ny pentina bobongolo, tatỳ aorian’ny nanesorana ireo vato ireo sy nikikisana ny rindrina ary nandalorana azy indray, '
  '44':
  - type: text
    content: 'dia ho tonga ny mpisorona mba hizaha ilay trano. Raha hitany fa nanitatra tokoa ny pentina, dia bobongolo raiki-tampisaka, ka maloto ilay trano. '
  '45':
  - type: text
    content: Ary horavana izany, dia ny vato mbamin’ny hazo ary ny lalotra manontolo ka hoentina ireo rehetra ireo ho amin’ilay toerana maloto fanariana azy any ivelan’ny tanàna.
  '46':
  - type: text
    content: '«Izay miditra ao amin’izany trano izany mandritra ny fe-potoana manontolo ilazana azy hoe hihidiany, dia haloto mandra-paharivan’ny andro; '
  '47':
  - type: text
    content: izay mandry ao na misakafo ao dia samy hanasa ny fitafiany.
  '48':
  - type: text
    content: «Rehefa tonga tokoa ny mpisorona mba hizaha ilay trano, ka hitany fa tsy nanitatra teo amin’ny trano ny pentina, tatỳ aorian’ny nandalorana azy indray, dia hambarany hoe madio ilay trano satria efa afaka ny pentina bobongolo.
  '49':
  - type: text
    content: '«Mba hanadiovana ny trano, dia ireto avy no zavatra hampanalain’ny mpisorona: vorona roa, hazo sedera, lamba jaky ary rantsana '
  - type: text
    content: hisôpa
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ny vorona anankiray dia hampamonoin’ny mpisorona eo ambony vilany tanimanga nasiana rano avy amina loharano; '
  '50':
  - type: text
    content: 'Ny vorona anankiray dia hovonoiny eo ambony vilany tanimanga nasiana rano avy amina loharano. '
  '51':
  - type: text
    content: 'Horaisiny kosa ny hazo sedera, ny rantsana hisôpa, ny lamba jaky, ary ilay vorona velona, ka samy hatsobony ao anatin’ny ran’ilay vorona novonoina sy ao anatin’ilay rano avy amina loharano, ka hanaovany famafazana impito amin’ilay trano. '
  '52':
  - type: text
    content: 'Ny ran’ilay vorona, ny rano avy amina loharano, ilay vorona velona, ny hazo sedera, ny rantsana hisôpa, ny lamba jaky: ireo rehetra ireo no hanadiovan’ny mpisorona izany trano izany. '
  '53':
  - type: text
    content: Ilay vorona velona kosa halefany hisidina any an-tsaha, any ivelan’ny tanàna. Ary hanao ny fombam-pivavahana fanadiovana ho an’ny trano izy, ka hadio izany.»
  '54':
  - type: text
    content: 'Ireo avy no fepetra momba ny aretin-koditra isan-karazany sy ny kimavo, '
  '55':
  - type: text
    content: 'mbamin’ny mamontsina sy ny manakopery ary ny pentina fotsy mangirana, na momba ny pentina bobongolo amin’ny fitafiana sy amin’ny trano. '
  '57':
  - type: text
    content: Ireo fepetra ireo no ahazoana mamantatra hoe maloto na madio ny olona na zavatra anankiray.
  '6':
  - type: text
    content: 'fa halainy kosa ny vorona faharoa, ka hatsobony miaraka amin’ny hazo sedera sy ny lamba jaky ary ny rantsana hisôpa ao anatin’ny ran’ilay vorona novonoina. '
  '7':
  - type: text
    content: 'Dia hofafazana impito amin’izany ra izany ilay diovina ho afaka amin’ny aretin-kodiny, ka hambaran’ny mpisorona hoe madio ilay olona; ary halefany hisidina any an-tsaha ilay vorona velona. '
  '8':
  - type: text
    content: 'Hanasa fitafiana ilay diovina, sy hanaratra ny volo rehetra eo amin’ny tenany ary handro amin’ny rano, dia hadio. Hiditra ao an-toby izy aorian’izany, kanefa hitoetra eo ivelan’ny tranolainy mandritra ny fito andro. '
  '9':
  - type: text
    content: Amin’ny andro fahafito, dia hoharatany avokoa ny volo eo amin’ny tenany, na volon-doha na somotra na manjamaso na volo hafa rehetra; ary hanasa fitafiana izy sady handro amin’ny rano, dia hadio.
