verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanadiovana ny marary hoditra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '«Amin’ny andro fahavalo, dia ireto avy no zavatra hoentiny; zanakondrilahy roa tsy misy kilema, zanakondrivavy anankiray tsy misy kilema sady vao iray taona, koba lafarinina tsara voaharo menaka sady milanja sivy kilao, ary menaka antsasa-litatra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny mpisorona, izay mitarika ny fombam-pivavahana fidiovana, dia hametraka ilay olona sy ireo zavatra ireo eo anatrehan’ny TOMPO, izany hoe eo anoloan’ny varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia haka ny zanakondrilahy iray ny mpisorona, ka hanolotra azy ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorom-panonerana
    - type: text
      text: ' miaraka amin’ny menaka antsasa-litatra; hahevahevany eo anatrehan’ny TOMPO no ho fomba fanolotra an’ireo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Io zanakondrilahy io dia hovonoiny eo amin’ny toerana famonoana ny biby hatao sorona fanalana ny ota na hatao sorona dorana manontolo, dia eo amin’ny faritra voatokana hanaovana izany; tahaka ny amin’ny sorona fanalana ny ota no fanao amin’ny sorom-panonerana, ka zava-masina dia masina natao ho anjaran’ny mpisorona izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hangalan’ny mpisorona ny ran’ilay sorom-panonerana mba hanentenany an’ilay diovina: dia hatentiny eo amin’ny ravin-tsofiny ankavanana sy ny ankiben-tanany ankavanana ary ny ankiben-tongony ankavanana izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hangalan’ny mpisorona koa ny menaka antsasa-litatra, ka haidiny eo am-pelatanany havia; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary hatsobony amin’io menaka izay eo am-pelatanany ankavia io ny fanondrony ankavanana ka hanaovany famafazana impito eo anatrehan’ny TOMPO. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Avy eo dia mbola io menaka am-pelatanany io no hanentenany an’ilay diovina; dia hatentiny eo amin’ny ravin-tsofiny ankavanana sy ny ankiben-tanany ankavanana ary ny ankiben-tongony ankavanana izany, dia eo amin’ireo faritra efa notentenana ny ran’ilay sorom-panonerana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ny menaka sisa eo am-pelatanan’ny mpisorona kosa hararany amin’ny lohan’ilay diovina; ary dia eo anatrehan’ny TOMPO no hanaovany ny fombam-pivavahana fanadiovana azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Izay ny mpisorona vao hanolotra ny sorona fanalana ny ota sy hanao indray ny fombam-pivavahana fandiovana ho an’ilay diovina ho afaka amin’ny fahalotoany. Aorian’izany, dia hamono ny zanakondrilahy hatao sorona dorana manontolo ny mpisorona '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Ireto no fepetra momba ny marary hoditra, amin’ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanadiovana
    - type: text
      text: ' azy. Hoentina any amin’ny mpisorona ilay marary hoditra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 8.4; Mk 1.44; Lk 5.14; 17-14.
      marker-yv: yv-n
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'sy hanolotra azy eo ambonin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' miaraka amin’ny fanatitra lafarinina, ary hanao fanintelony ny fombam-pivavahana fanadiovana ho an’ilay diovina, dia ho voadio tokoa izy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanadiovana ny mahantra marary hoditra
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '«Raha mahantra ilay marary hoditra ka tsy misy harena firy ananany, dia ireto avy ny zavatra hoentiny: zanakondrilahy iray monja hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorom-panorenana
    - type: text
      text: ' ka hahevaheva eo anatrehan’ny Tompo no fanolotra azy mba hanaovana ny fombam-pivavahana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanadiovana
    - type: text
      text: '; koba lafarinina tsara voaharo menaka sady milanja telo kilao; menaka antsasa-litatra; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'domohina roa na voromahailala roa, arakaraka izay hareny ananany, ka ny anankiray hatao sorona fanalana ny ota ary ny anankiray hatao sorona dorana manontolo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Amin’ilay andro fahavalo, dia hoentin’ilay marary hoditra ho any amin’ny mpisorona ireo zavatra ireo mba hanaovana ny fanadiovana azy eo anoloan’ny varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ', eo anatrehan’ny TOMPO. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia horaisin’ny mpisorona ilay zanakondrilahy hatao sorom-panonerana sy ilay menaka antsasa-litatra, ka hahevahevany eo anatrehan’ny TOMPO no ho fomba fanolotra an’ireo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hovonoin’ny mpisorona io zanakondrilahy sorom-panonerana io, dia hangalany ny rany mba hanentenany an’ilay diovina dia hatentiny eo amin’ny ravin-tsofiny ankavanana sy ny ankiben-tanany ankavanana ary ny ankiben-tongony ankavanana izany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Avy eo dia hisy haidin’ny mpisorona eo am-pelatanany ankavia ny menaka; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'ary amin’io menaka am-pelatanany io no hakany amin’ny fanondrony ankavanana ka hanaovany famafazana impito eo anatrehan’ny TOMPO. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Hotentenan’ny mpisorona amin’io menaka io koa ilay diovina, ka hatentiny eo amin’ny ravin-tsofiny ankavanana sy ny ankiben-tanany ankavanana ary ny ankiben-tongony ankavanana izany, dia eo amin’ireo faritra efa notentenana ny ran’ilay sorom-panonerana. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ny menaka sisa eo am-pelatanan’ny mpisorona kosa hararany amin’ny lohan’ilay diovina mba hanaovana ny fombam-pivavahana fanadiovana azy eo anatrehan’ny TOMPO. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'dia hivoaka ny toby kosa ny mpisorona mba hizaha azy. Raha hitany fa sitrana ny aretin’ilay marary hoditra, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia horaisin’ny mpisorona ny iray amin’ny domohina na ny iray amin’ny voromahailala, arakaraka izay hareny ananan’ilay olona diovina, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ka hatolony ho sorona fanalana ny ota; ny anankiray kosa hatolony ho sorona dorana manontolo miaraka amin’ny fanatitra lafarinina. Dia eo anatrehan’ny TOMPO no hanaovan’ny mpisorona fanintelony ny fombam-pivavahana fanadiovana ho an’ilay olona.»
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ireo no fepetra momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: marary hoditra
    - type: text
      text: ' eo amin’ny fanadiovana azy, raha tsy misy harena firy ananany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny rindrina misy bobongolo
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia niteny tamin’i Mosesy sy i Aharôna ny TOMPO nanao hoe:'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '«Rehefa tafiditra any amin’ny tany Kanahàna izay omeko ho fanananareo ianareo ka misy trano hasiako pentina bobongolo eo amin’ny tany fanananareo, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'dia handeha ny tompontrano hilaza izany amin’ny mpisorona ka hanao hoe: ‹Toa hitako misy pentina miseho ao amin’ny tranoko.› '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Alohan’ny hidiran’ny mpisorona hizaha ilay pentina, dia hasainy hesorina avokoa ny entana ao an-trano, mba tsy hisy zavatra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: haloto
    - type: text
      text: ' amin’ireo entana ireo; izay vao hiditra ny mpisorona mba hizaha ilay trano. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Rehefa voazahany kosa ny pentina, ka hitany fa mihady lavaka maitsomaitso na menamena eo amin’ny rindrina, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'dia hivoaka ny trano hihoatra ny tokonam-baravarana izy mpisorona ka hanidy ny trano tsy hivoha mandritra ny fito andro. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Amin’ny andro fahafito no hiverina ao indray ny mpisorona mba hizaha ny trano; raha hitany fa manitatra eo amin’ny rindrina ilay pentina, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'dia vorona anankiroa velona sady '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: text
      text: ' sy hazo sedera ary lamba jaky sy rantsana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hisôpa
    - type: text
      text: ' no hasain’ny mpisorona halaina ho an’ilay hodiovina. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'dia hasainy hesorina ireo vato misy izany, ka hariana amin’izay toerana maloto fanariana azy any ivelan’ny tanàna; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'ary hasainy hokikisana ny ati-drano manontolo, ka tany voakiky dia hariana koa amin’ilay toerana maloto fanariana azy any ivelan’ny tanàna. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Vato hafa kosa no halaina hasolo ilay teo, ary feta hafa no halaina handalorana ny trano indray.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: '«Raha tàhiny mipoitra eo amin’ny trano indray ny pentina bobongolo, tatỳ aorian’ny nanesorana ireo vato ireo sy nikikisana ny rindrina ary nandalorana azy indray, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'dia ho tonga ny mpisorona mba hizaha ilay trano. Raha hitany fa nanitatra tokoa ny pentina, dia bobongolo raiki-tampisaka, ka maloto ilay trano. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Ary horavana izany, dia ny vato mbamin’ny hazo ary ny lalotra manontolo ka hoentina ireo rehetra ireo ho amin’ilay toerana maloto fanariana azy any ivelan’ny tanàna.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: '«Izay miditra ao amin’izany trano izany mandritra ny fe-potoana manontolo ilazana azy hoe hihidiany, dia haloto mandra-paharivan’ny andro; '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: izay mandry ao na misakafo ao dia samy hanasa ny fitafiany.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: «Rehefa tonga tokoa ny mpisorona mba hizaha ilay trano, ka hitany fa tsy nanitatra teo amin’ny trano ny pentina, tatỳ aorian’ny nandalorana azy indray, dia hambarany hoe madio ilay trano satria efa afaka ny pentina bobongolo.
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: '«Mba hanadiovana ny trano, dia ireto avy no zavatra hampanalain’ny mpisorona: vorona roa, hazo sedera, lamba jaky ary rantsana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hisôpa
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny vorona anankiray dia hampamonoin’ny mpisorona eo ambony vilany tanimanga nasiana rano avy amina loharano; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ny vorona anankiray dia hovonoiny eo ambony vilany tanimanga nasiana rano avy amina loharano. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Horaisiny kosa ny hazo sedera, ny rantsana hisôpa, ny lamba jaky, ary ilay vorona velona, ka samy hatsobony ao anatin’ny ran’ilay vorona novonoina sy ao anatin’ilay rano avy amina loharano, ka hanaovany famafazana impito amin’ilay trano. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Ny ran’ilay vorona, ny rano avy amina loharano, ilay vorona velona, ny hazo sedera, ny rantsana hisôpa, ny lamba jaky: ireo rehetra ireo no hanadiovan’ny mpisorona izany trano izany. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Ilay vorona velona kosa halefany hisidina any an-tsaha, any ivelan’ny tanàna. Ary hanao ny fombam-pivavahana fanadiovana ho an’ny trano izy, ka hadio izany.»
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Ireo avy no fepetra momba ny aretin-koditra isan-karazany sy ny kimavo, '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 55-56
    - type: text
      text: 'mbamin’ny mamontsina sy ny manakopery ary ny pentina fotsy mangirana, na momba ny pentina bobongolo amin’ny fitafiana sy amin’ny trano. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: Ireo fepetra ireo no ahazoana mamantatra hoe maloto na madio ny olona na zavatra anankiray.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'fa halainy kosa ny vorona faharoa, ka hatsobony miaraka amin’ny hazo sedera sy ny lamba jaky ary ny rantsana hisôpa ao anatin’ny ran’ilay vorona novonoina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hofafazana impito amin’izany ra izany ilay diovina ho afaka amin’ny aretin-kodiny, ka hambaran’ny mpisorona hoe madio ilay olona; ary halefany hisidina any an-tsaha ilay vorona velona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hanasa fitafiana ilay diovina, sy hanaratra ny volo rehetra eo amin’ny tenany ary handro amin’ny rano, dia hadio. Hiditra ao an-toby izy aorian’izany, kanefa hitoetra eo ivelan’ny tranolainy mandritra ny fito andro. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Amin’ny andro fahafito, dia hoharatany avokoa ny volo eo amin’ny tenany, na volon-doha na somotra na manjamaso na volo hafa rehetra; ary hanasa fitafiana izy sady handro amin’ny rano, dia hadio.
