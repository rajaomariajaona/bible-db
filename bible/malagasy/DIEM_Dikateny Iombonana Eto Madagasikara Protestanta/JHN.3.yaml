document_id: JHN.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Resak’i Jesoa amin’i Nikôdema
  - type: text
    content: 'Nisy lehilahy anankiray atao hoe Nikôdema, anisan’ny antokom-pivavahana '
  - type: text
    content: Farisianina
  - type: text
    content: ' ary manampahefana teo amin’ny Jiosy. '
  '10':
  - type: text
    content: 'Ka izao no navalin’i Jesoa azy:'
  - type: text
    content: '–Mpampianatra eto amin’i '
  - type: text
    content: Israely
  - type: text
    content: ' ianao, ka tsy mahalala izany ve? '
  '11':
  - type: text
    content: 'Lazaiko marina dia marina aminao fa izay fantatray no lazainay ary izay hitanay no ijoroanay ho vavolombelona, nefa tsy raisinareo izany fijoroanay ho vavolombelona izany. '
  '12':
  - type: text
    content: 'Raha nilaza taminareo ny zavatra etỳ an-tany Aho, dia tsy inoanareo; ka ahoana no hinoanareo Ahy, raha milaza aminareo ny zavatra any an-danitra Aho? '
  '13':
  - type: text
    content: 'Ary tsy nisy niakatra any an-danitra afa-tsy Ilay nidina avy tany an-danitra, dia ny '
  - type: text
    content: Zanak’olona
  - type: note
    content: Misy stf sasany ahitana hoe afa-tsy Ilay nidina avy tany an-danitra, dia ny Zanak’olona Izay any an-danitra. –Ny amin’ny fitambaran’ity andininy ity, ampit Ohab 30.4; Rm 10.6.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Ary tahaka ny nanandratan’i Mosesy ny bibilava varahina tany an-taniefitra
  - type: note
    content: Jereo Nom 21.9.
  - type: text
    content: ' no tsy maintsy hanandratana ny Zanak’olona '
  '15':
  - type: text
    content: 'mba ho velona aina mandrakizay izay rehetra mino Azy. '
  '16':
  - type: text
    content: 'Eny, notiavin’Andriamanitra fatratra '
  - type: text
    content: izao tontolo izao
  - type: text
    content: ', ka nomeny ny Zanany lahitokana, mba tsy ho very izay rehetra mino Azy fa ho velona aina mandrakizay. '
  '17':
  - type: text
    content: 'Andriamanitra manko tsy naniraka ny Zanany ho eto amin’izao tontolo izao, mba hanameloka an’izao tontolo izao, fa mba hamonjy an’izao tontolo izao amin’ny alalany. '
  '18':
  - type: text
    content: 'Izay mino ny Zanaka dia tsy helohina; fa izay tsy mino koa dia efa voaheloka rahateo, noho izy tsy nino ny Zanaka lahitokan’Andriamanitra. '
  '19':
  - type: text
    content: 'Ary izao no anton’ny fanamelohana: efa tonga tamin’izao tontolo izao ny fahazavana, nefa naleon’ny olona ny haizina toy izay ny fahazavana, satria ratsy ny asany. '
  '2':
  - type: text
    content: 'Nanatona an’i Jesoa izy indray alina ary niteny taminy hoe:'
  - type: text
    content: –Mpampianatra ô, fantatray fa Mpampianatra nirahin’Andriamanitra Ianao; satria tsy misy olona mahavita ireo famantarana ataonao ireo, raha tsy ombàn’Andriamanitra.
  '20':
  - type: text
    content: 'Fa izay rehetra manao ratsy dia mankahala ny fahazavana sady tsy manatona ny fahazavana, fandrao hita miharihary ny asa ratsiny. '
  '21':
  - type: text
    content: Izay manao ny marina kosa dia manatona ny fahazavana, mba hiseho fa notontosaina araka an’Andriamanitra ny asany.
  - type: heading
    content: Ambaran’i Jôhany Mpanao batisa indray i Jesoa
  '22':
  - type: text
    content: 'Taorian’izany, dia nankany amin’ny faritany Jodea i Jesoa mbamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ; ary niara-nitoetra tamin’izy ireo tany Izy sady nanao batisa
  - type: note
    content: Jereo 4.1-2.
  - type: text
    content: ' ny olona. '
  '23':
  - type: text
    content: I Jôhany koa nanao batisa ny olona tao Enôna akaikin’i Salîma
  - type: note
    content: i Enôna sy i Salîma dia tanàna anankiroa ao amin’ny lohasahan’ny ony Jôrdàna, kanefa tsy mazava loatra ny toerana misy azy.
  - type: text
    content: ', fa be rano tao; nanatona an’i Jôhany ny olona ka nataony batisa '
  '24':
  - type: text
    content: fa tsy mbola naiditra am-ponja izy
  - type: note
    content: Jereo Mt 14.3; Mk 6.17; Lk 3.19-20.
  - type: text
    content: .
  '25':
  - type: text
    content: Tamin’izay dia nisy fifandiran’ny mpianatr’i Jôhany tamina Jiosy anankiray
  - type: note
    content: 'tamina Jiosy anankiray: misy stf sasany ahitana hoe tamina Jiosy vitsivitsy.'
  - type: text
    content: 'ny amin’ny fomba fidiovana; '
  '26':
  - type: text
    content: 'ary nankany amin’i Jôhany ireo mpianany ka nilaza taminy hoe:'
  - type: text
    content: –Mpampianatra ô, Ilay niaraka taminao teny andafy atsinanan’ny ony Jôrdàna sady nijoroanao ho vavolombelona iny anie ka manao batisa ary hatonin’ny olona rehetra.
  '27':
  - type: text
    content: 'Fa izao kosa no navalin’i Jôhany:'
  - type: text
    content: '–Tsy misy olona afaka mandray na inona na inona, raha tsy nomen’Andriamanitra azy izany. '
  '28':
  - type: text
    content: 'Ianareo mihitsy no vavolombeloko fony aho nilaza hoe: «Tsy izaho no ilay '
  - type: text
    content: Mesia
  - type: text
    content: ', fa nirahina hialoha Azy aho'
  - type: note
    content: Jereo 1.20. Ampit Mal 3.1.
  - type: text
    content: '.» '
  '29':
  - type: text
    content: 'Izay manana ny ampakarina no mpampakatra; fa ny sakaizan’ny mpampakatra dia mipetraka eo anilan’ny mpampakatra sy mihaino azy ary faly tokoa mandre ny feony. Izany hafaliana izany no efa tanteraka amiko ankehitriny. '
  '3':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Lazaiko marina dia marina aminao fa raha tsy ateraka indray
  - type: note
    content: 'indray: ny voambolana grika nadika hoe indray dia mety midika koa hoe avy any ambony. Mifameno sy mifanatevina izany heviteny anankiroa izany.'
  - type: text
    content: ' ny olona, dia tsy afa-mahita ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: .
  '30':
  - type: text
    content: Izy tsy maintsy mitombo, fa izaho kosa tsy maintsy mihena.
  - type: heading
    content: Ilay avy any an-danitra
  '31':
  - type: text
    content: '–Ilay avy any ambony dia ambonin’ny olona rehetra; fa izay avy amin’ny tany dia avy amin’ny tany, ka ny zavatra momba ny etỳ an-tany no lazainy. Ilay avy any an-danitra no ambonin’ny olona rehetra; '
  '32':
  - type: text
    content: 'ka izay efa hitany sy reny no ijoroany ho vavolombelona, saingy tsy misy olona mandray izany fijoroany ho vavolombelona izany. '
  '33':
  - type: text
    content: 'Izay mandray ny fijoroany ho vavolombelona dia manamarina fa azo antoka Andriamanitra. '
  '34':
  - type: text
    content: 'Ilay nirahin’Andriamanitra manko no milaza ny tenin’Andriamanitra, satria tsy misy fetrany no anomezan’Andriamanitra Azy ny Fanahy Masina. '
  '35':
  - type: text
    content: 'Ny Ray dia fatra-pitia ny Zanaka, ary efa nametraka ny zavatra rehetra eo am-pelatanany. '
  '36':
  - type: text
    content: Izay mino ny Zanaka no velona aina mandrakizay; fa izay tsy mino ny Zanaka dia tsy ho velona aina, fa itoeran’ny hatezeran’Andriamanitra.
  '4':
  - type: text
    content: 'Dia hoy i Nikôdema taminy:'
  - type: text
    content: –Hataon’ny olona ahoana no hateraka indray rehefa antitra? Moa afa-miverina any an-kibon-dreniny ve izy ka hateraka fanindroany?
  '5':
  - type: text
    content: 'Ka novalian’i Jesoa hoe:'
  - type: text
    content: '–Lazaiko marina dia marina aminao fa raha tsy ateraky ny rano sy ny Fanahy Masina ny olona, dia tsy afa-miditra ao amin’ny Fanjakàn’Andriamanitra. '
  '6':
  - type: text
    content: 'Izay ateraky ny olombelona, dia olombelona; izay ateraky ny Fanahy Masina, dia fanahy. '
  '7':
  - type: text
    content: 'Aza gaga ianao raha nilazako hoe: «Tsy maintsy ateraka indray'
  - type: note
    content: indray na hoe avy any ambony (jereo and 3 sy ny naoty tandrify azy).
  - type: text
    content: ' ianareo.» '
  '8':
  - type: text
    content: Ny rivotra
  - type: note
    content: 'Amin’ny fiteny grika, dia voambolana tokana no enti-manondro ny rivotra sy ny Fanahy: misy tsilalaon-teny izany eto amin’ity andininy ity.'
  - type: text
    content: ' dia mitsoka amin’izay tiany, ary renao ny feony nefa tsy fantatrao izay iaviany na izay alehany: tahaka izany izay rehetra ateraky ny Fanahy Masina.'
  '9':
  - type: text
    content: 'Dia niteny tamin’i Jesoa i Nikôdema nanao hoe:'
  - type: text
    content: –Hatao ahoana no hahatonga izany?
