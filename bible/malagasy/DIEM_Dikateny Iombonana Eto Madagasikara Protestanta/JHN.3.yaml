document_id: JHN.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Resak’i Jesoa amin’i Nikôdema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy lehilahy anankiray atao hoe Nikôdema, anisan’ny antokom-pivavahana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' ary manampahefana teo amin’ny Jiosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanatona an’i Jesoa izy indray alina ary niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, fantatray fa Mpampianatra nirahin’Andriamanitra Ianao; satria tsy misy olona mahavita ireo famantarana ataonao ireo, raha tsy ombàn’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lazaiko marina dia marina aminao fa raha tsy ateraka indray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'indray: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny voambolana grika nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: indray
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mety midika koa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: avy any ambony.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Mifameno sy mifanatevina izany heviteny anankiroa izany.'
    marker-yv: yv-n
  - type: text
    text: ' ny olona, dia tsy afa-mahita ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy i Nikôdema taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hataon’ny olona ahoana no hateraka indray rehefa antitra? Moa afa-miverina any an-kibon-dreniny ve izy ka hateraka fanindroany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ka novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazaiko marina dia marina aminao fa raha tsy ateraky ny rano sy ny Fanahy Masina ny olona, dia tsy afa-miditra ao amin’ny Fanjakàn’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay ateraky ny olombelona, dia olombelona; izay ateraky ny Fanahy Masina, dia fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza gaga ianao raha nilazako hoe: «Tsy maintsy ateraka indray'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'indray '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: avy any ambony
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo and 3 sy ny naoty tandrify azy).'
    marker-yv: yv-n
  - type: text
    text: ' ianareo.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny rivotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny fiteny grika, dia voambolana tokana no enti-manondro ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rivotra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Fanahy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy tsilalaon-teny izany eto amin’ity andininy ity.'
    marker-yv: yv-n
  - type: text
    text: ' dia mitsoka amin’izay tiany, ary renao ny feony nefa tsy fantatrao izay iaviany na izay alehany: tahaka izany izay rehetra ateraky ny Fanahy Masina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niteny tamin’i Jesoa i Nikôdema nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hatao ahoana no hahatonga izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ka izao no navalin’i Jesoa azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mpampianatra eto amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' ianao, ka tsy mahalala izany ve? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lazaiko marina dia marina aminao fa izay fantatray no lazainay ary izay hitanay no ijoroanay ho vavolombelona, nefa tsy raisinareo izany fijoroanay ho vavolombelona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha nilaza taminareo ny zavatra etỳ an-tany Aho, dia tsy inoanareo; ka ahoana no hinoanareo Ahy, raha milaza aminareo ny zavatra any an-danitra Aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tsy nisy niakatra any an-danitra afa-tsy Ilay nidina avy tany an-danitra, dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: afa-tsy Ilay nidina avy tany an-danitra, dia ny Zanak’olona Izay any an-danitra.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' –Ny amin’ny fitambaran’ity andininy ity, ampit Ohab 30.4; Rm 10.6.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary tahaka ny nanandratan’i Mosesy ny bibilava varahina tany an-taniefitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 21.9.
    marker-yv: yv-n
  - type: text
    text: ' no tsy maintsy hanandratana ny Zanak’olona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'mba ho velona aina mandrakizay izay rehetra mino Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Eny, notiavin’Andriamanitra fatratra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ', ka nomeny ny Zanany lahitokana, mba tsy ho very izay rehetra mino Azy fa ho velona aina mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Andriamanitra manko tsy naniraka ny Zanany ho eto amin’izao tontolo izao, mba hanameloka an’izao tontolo izao, fa mba hamonjy an’izao tontolo izao amin’ny alalany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izay mino ny Zanaka dia tsy helohina; fa izay tsy mino koa dia efa voaheloka rahateo, noho izy tsy nino ny Zanaka lahitokan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary izao no anton’ny fanamelohana: efa tonga tamin’izao tontolo izao ny fahazavana, nefa naleon’ny olona ny haizina toy izay ny fahazavana, satria ratsy ny asany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa izay rehetra manao ratsy dia mankahala ny fahazavana sady tsy manatona ny fahazavana, fandrao hita miharihary ny asa ratsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay manao ny marina kosa dia manatona ny fahazavana, mba hiseho fa notontosaina araka an’Andriamanitra ny asany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Jôhany Mpanao batisa indray i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Taorian’izany, dia nankany amin’ny faritany Jodea i Jesoa mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ; ary niara-nitoetra tamin’izy ireo tany Izy sady nanao batisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 4.1-2.
    marker-yv: yv-n
  - type: text
    text: ' ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I Jôhany koa nanao batisa ny olona tao Enôna akaikin’i Salîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'i '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Enôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy i '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Salîma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tanàna anankiroa ao amin’ny lohasahan’ny ony Jôrdàna, kanefa tsy mazava loatra ny toerana misy azy.
    marker-yv: yv-n
  - type: text
    text: ', fa be rano tao; nanatona an’i Jôhany ny olona ka nataony batisa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: fa tsy mbola naiditra am-ponja izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 14.3; Mk 6.17; Lk 3.19-20.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tamin’izay dia nisy fifandiran’ny mpianatr’i Jôhany tamina Jiosy anankiray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tamina Jiosy anankiray: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tamina Jiosy vitsivitsy.
    marker-yv: yv-n
  - type: text
    text: 'ny amin’ny fomba fidiovana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary nankany amin’i Jôhany ireo mpianany ka nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, Ilay niaraka taminao teny andafy atsinanan’ny ony Jôrdàna sady nijoroanao ho vavolombelona iny anie ka manao batisa ary hatonin’ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa izao kosa no navalin’i Jôhany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy misy olona afaka mandray na inona na inona, raha tsy nomen’Andriamanitra azy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ianareo mihitsy no vavolombeloko fony aho nilaza hoe: «Tsy izaho no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ', fa nirahina hialoha Azy aho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.20. Ampit Mal 3.1.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izay manana ny ampakarina no mpampakatra; fa ny sakaizan’ny mpampakatra dia mipetraka eo anilan’ny mpampakatra sy mihaino azy ary faly tokoa mandre ny feony. Izany hafaliana izany no efa tanteraka amiko ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Izy tsy maintsy mitombo, fa izaho kosa tsy maintsy mihena.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay avy any an-danitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '–Ilay avy any ambony dia ambonin’ny olona rehetra; fa izay avy amin’ny tany dia avy amin’ny tany, ka ny zavatra momba ny etỳ an-tany no lazainy. Ilay avy any an-danitra no ambonin’ny olona rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ka izay efa hitany sy reny no ijoroany ho vavolombelona, saingy tsy misy olona mandray izany fijoroany ho vavolombelona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Izay mandray ny fijoroany ho vavolombelona dia manamarina fa azo antoka Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ilay nirahin’Andriamanitra manko no milaza ny tenin’Andriamanitra, satria tsy misy fetrany no anomezan’Andriamanitra Azy ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny Ray dia fatra-pitia ny Zanaka, ary efa nametraka ny zavatra rehetra eo am-pelatanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Izay mino ny Zanaka no velona aina mandrakizay; fa izay tsy mino ny Zanaka dia tsy ho velona aina, fa itoeran’ny hatezeran’Andriamanitra.
