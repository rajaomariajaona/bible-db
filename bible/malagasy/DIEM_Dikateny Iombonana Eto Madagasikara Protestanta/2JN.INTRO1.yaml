document_id: 2JN.INTRO1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Sava lalana
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ny mpanoratra dia milaza ny tenany ho loholona fotsiny; kanefa ny fomba fiteniny dia mampiharihary fa manam-pahefana sy to teny tokoa Izy eo amin’ireo anoratany. Ny taratasiny dia ho an’«ilay Andriambavy voafidin’Andriamanitra sy ho an’ireo zanany»: izany dia toa manondro Fiangonana amin’ny toerana na faritra anankiray mbamin’ireo kristianina ao aminy (and 1).'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mampirisika ireo mpamaky sy mpihaino ny mpanoratra mba hiaina araka ny hafatra marim-pototra sy ny fitiavana (1-6), sady mampitandrina azy koa eo anoloan’ny olona mampiely hevi-diso (7-11). Ny amaranany ny taratasiny dia filazana ny fahatongavany hitsidika sy fampitana ny famangian’ny Fiangonana rahavavy misy azy (12-13).
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tahaka ny hita ao amin’ny taratasy voalohany avy amin’i Jôhany dia manainga ireo mpihaino na mpamaky azy koa ny mpanoratra ity taratasy ity mba hitandrin-tena sady haharitra ao amin’ny finoana marina.
