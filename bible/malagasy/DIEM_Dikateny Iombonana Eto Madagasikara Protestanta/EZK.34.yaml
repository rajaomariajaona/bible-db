document_id: EZK.34,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Famelezana ireo lehiben’i Israely
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: Mampitandrina anareo mpitondra Aho fa hisampotina hamely anareo; ka hampamoahiko ny amin’ny ondriko ianareo ary hoesoriko tsy hiandry azy intsony; tsy ianareo mpikarakara tena intsony no hikarakara azy. Hoesoriko eo am-bavanareo ny andianondriko ka tsy ho azonareo hatao sakafo intsony.'
  '11':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Ny tenako mihitsy no hiandraikitra sy hikarakara ny andianondriko. '
  '12':
  - type: text
    content: Himasoako ny hanangona azy tahaka izay ataon’ny mpiandry amin’ny andro iparitahan’ny ondry. Izaho handeha haka azy ireny any amin’ny toerana rehetra izay niparitahany tamin’ny andro mandrahona sy maizim-pito
  - type: note
    content: 'andro mandrahona sy maizim-pito: filazana an-kolaka ny amin’ny famaizan’Andriamanitra (eto dia ny faharavan’i Jerosalema sy ny fahababoana).'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Havoakako avy any amin’ny firenena izy ary hangoniko avy any amin’ny tany samy hafa, dia haveriko ao amin’ny taniny; handrasako eny an-tendrombohitr’i Israely sy eny an-dohasahan-driaka izy ary koa eny amin’ny toerana rehetra azo honenana eo amin’ny taniny. '
  '14':
  - type: text
    content: 'Hoentiko eny amin’ny tanim-bilona tsara izy, ka hanana kijàna eny an-tendrombohitra avo amin’i Israely. Any no hialany sasatra amin’ny kijàna tsara sy hiraofany amin’ny tanim-bilona milenodenoka. '
  '15':
  - type: text
    content: 'Izaho no ho mpiandry ny andianondriko ka hampandry azy; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '16':
  - type: text
    content: Hotadiaviko ny ondry very, haveriko izay nisaraka tamin’ny andiany, hotsaboiko izay naratra, hohatanjahiko izay marary, ary hokolokoloiko hatrany
  - type: note
    content: 'ary hokolokoloiko hatrany: araka ny dkt tranainy grika (grika: phulaxô =hebreo: ’asmos), fa ny RM kosa manao hoe fa haringako kosa (hebreo =’asmid). Marihina fa matetika ihany no mety mifangaro ny litera hebreo daleta sy resa.'
  - type: text
    content: izay matavy sy matanjaka. Izaho no hiandry ny ondriko araka ny rariny.»
  - type: heading
    content: Tonga hamonjy ny vahoakany Andriamanitra
  '17':
  - type: text
    content: '«Ary ny amin’ny andianondriny, dia izao no lazain’ny Tompo ANDRIANANAHARY: ‹Indro hotsaraiko ny adin’ny ondry samy ondry sy ny ady ifanaovan’ny ondrilahy amin’ny osilahy. '
  '18':
  - type: text
    content: 'Tsy ampy ny sasany eo aminareo angaha ny miraoka eny amin’ny tanim-bilona tsara no dia hosihosenareo koa ny ahitra sisa? Tsy ampy anareo angaha ny misotro ny rano madio no dia lotoinareo amin’ny tongotrareo koa ny rano sisa? '
  '19':
  - type: text
    content: 'Voatery hihinana ny ahitra voahosihosinareo sy hisotro ny rano voalotonareo ireo sisa amin’ny andianondriko.› '
  '2':
  - type: text
    content: «Ry ilay taranak’olombelona, ijoroy ny maha-
  - type: text
    content: mpaminany
  - type: text
    content: ' anao mba hamelezako ireo lehibe '
  - type: text
    content: mpiandry
  - type: text
    content: ' ny vahoaka Israely, eny, ijoroy ny maha-'
  - type: text
    content: mpaminany
  - type: text
    content: ' anao ka ampitao aminy fa Izaho Tompo ANDRIANANAHARY dia manambara hoe: Lozanareo mpiandry'
  - type: note
    content: Araka ny fomba fiteny amin’iny Atsinanana Akaiky iny taloha, ny mpanjaka dia nantsoina hoe mpiandry ny vahoakany (jereo 34.23). Io voambolana io koa anefa dia azo nampiharina tamin’ireo mpiandraikitra sy lehibe isan’ambaratongany avy (jereo Is 56.11; Zak 11.4-17).
  - type: text
    content: ' ny vahoaka Israely! Fa ny tenanareo ihany no karakarainareo! Moa tsy ny andian’ondry va no tokony hokarakarainareo? '
  '20':
  - type: text
    content: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY amin’ny andianondriny: ‹Izaho mihitsy no hitsara ny adinareo ondry matavy sy ondry mahia. '
  '21':
  - type: text
    content: 'Natositosikareo matanjaka tamin’ny sorokareo sy ny tehezanareo ireo ondry osaosa rehetra, ary nototoin’ny tandrokareo ambara-pandroakanareo azy ho any ivelan’ny tanim-bilona. '
  '22':
  - type: text
    content: 'Koa tonga Aho hamonjy azy mba tsy ho lasan’ny mpangalatra intsony, ary hotsaraiko ny adin’ny ondry samy ondry. '
  '23':
  - type: text
    content: Mpiandry
  - type: text
    content: ' tokana no hatsangako hitarika azy, ka izy no hiandry azy, dia i Davida mpanompoko izany'
  - type: note
    content: I Davida mpanjaka indraindray dia noheverina ho modely sady razamben’ilay mpanjaka ho avy izay nampanantenain’Andriamanitra (jereo Jer 23.5). Kanefa i Ezekiela dia tsy manome azy ny anaram-boninahitra hoe mpanjaka fa miantso azy hoe filoha sady mamaritra azy hoe mpiandry (and 23) sy mpanompo.
  - type: text
    content: '. Izy no hikarakara azy ary ho mpiandry azy tokoa. '
  '24':
  - type: text
    content: Izaho TOMPO no ho Andriamaniny ary i Davida mpanompoko no ho filoha eo anivony. Izaho TOMPO no miteny izany.›
  '25':
  - type: text
    content: '«Hanao fanekempihavanana amin’ny andianondriko Aho: Hofoanako tsy ho eo amin’ny tany ny biby masiaka ka honina am-pilaminana any an-taniefitra izy ary handry any an’ala aza. '
  '26':
  - type: text
    content: Avelako honina eny amin’ny manodidina ny tendrombohitra voatokana ho Ahy izy
  - type: note
    content: 'Avelako...manodidina ny tendrombohitro masina izy: araka ny dkt tranainy grika izany; fa ny RM kosa manao hoe hataoko fitahiana ity tany ity sy ny manodidina ny tendrombohitra. –tendrombohitra voatokana ho Ahy: jereo 20.40 sy nta.'
  - type: text
    content: '. Harotsako ara-potoana ny ranonorana ka hitondra fitahiambe izany. '
  '27':
  - type: text
    content: 'Hamoa ny hazo eny an-tsaha ary hahavokatra ny tany; ka ny vahoakako hilamina eo amin’ny taniny. Hotapahiko ny gadra izay mampahory ny vahoakako, ka hafahako eo an-tanan’ny mpanandevo azy izy. Amin’izay hoekeny fa Izaho no TOMPO. '
  '28':
  - type: text
    content: 'Tsy ho babon’ny hafa firenena na ho rembin’ny bibidia intsony izy, fa honina am-pilaminana, ka tsy hisy hampatahotra azy. '
  '29':
  - type: text
    content: 'Hampaniry ny voly hiadanany Aho, ka tsy hisy olona ho ripaky ny mosary intsony eo amin’ny tany; ary tsy hovesaran’ny latsan’ireo hafa firenena intsony izy. '
  '3':
  - type: text
    content: Nefa tsy mpiandry nikarakara ny andian’ondry ianareo, fa naka ny ronono
  - type: note
    content: 'ronono: araka ny dkt tranainy grika sy latinina, fa ny RM kosa manao hoe jabora.'
  - type: text
    content: 'ho sakafonareo sy ny volon’ondry hotafinareo sady namono ireo biby matavy. '
  '30':
  - type: text
    content: Amin’izay dia hoeken’ny hafa firenena fa Izaho TOMPO Andriamaniny no miaraka aminy ary izy Israelita no vahoakako; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
  '31':
  - type: text
    content: «Ianareo no olona, andian’ondry fiandriko, ary Izaho no Andriamanitrareo; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
  '4':
  - type: text
    content: 'Tsy nohatanjahinareo ny ondry osa, tsy nositraninareo ny narary na notsaboinareo ny naratra, tsy naverinareo ny niala tamin’ny andiany ary tsy notadiavinareo ny very, fa nanampatra ny fahefànareo tamin’ny herisetra sy ny fahasiahana ianareo. '
  '5':
  - type: text
    content: 'Koa niparitaka ireny ondry ireny satria tsy misy mpiandry, ka tonga rembin’ny bibidia. '
  '6':
  - type: text
    content: Ireo ondriko andiany dia nirenireny teny an-tendrombohitra sy teny amin’ny havoana; ary niparitaka teny amin’ny velaran-tany manontolo
  - type: note
    content: 'nirenireny teny an-tendrombohitra sy teny amin’ny havoana: toa misy filazana an-kolaka ny amin’ireo fanompoan-tsampy nataon’ny vahoaka Israely ombieniombieny izany (jereo 6.2-3; sy nta 6.2; 20.20 sns). –ary niparitaka: filazana an-kolaka ny fahababoana.'
  - type: text
    content: ' izy satria tsy nisy niahy na nandeha nitady azy. '
  '7':
  - type: text
    content: 'Koa ianareo mpiandry ny vahoaka Israely, mihainoa ny teniko: '
  '8':
  - type: text
    content: 'Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy nisy mpiandry azy ny andian’ondriko ka lasan’ny mpangalatra sy zary rembin’ny bibidia rehetra. Ireo mpiandry ny ondriko manko tsy miraharaha ny ondry sady tsy mikarakara azy fa ny tenany no karakarainy. '
  '9':
  - type: text
    content: 'Noho izany, dia henoinareo ny teniko ry mpiandry ny vahoaka Israely. '
