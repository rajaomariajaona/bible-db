document_id: EZK.34
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famelezana ireo lehiben’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Ry ilay taranak’olombelona, ijoroy ny maha-
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' anao mba hamelezako ireo lehibe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ny vahoaka Israely, eny, ijoroy ny maha-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' anao ka ampitao aminy fa Izaho Tompo ANDRIANANAHARY dia manambara hoe: Lozanareo mpiandry'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka ny fomba fiteny amin’iny Atsinanana Akaiky iny taloha, ny mpanjaka dia nantsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpiandry
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny vahoakany (jereo 34.23). Io voambolana io koa anefa dia azo nampiharina tamin’ireo mpiandraikitra sy lehibe isan’ambaratongany avy (jereo Is 56.11; Zak 11.4-17).'
    marker-yv: yv-n
  - type: text
    text: ' ny vahoaka Israely! Fa ny tenanareo ihany no karakarainareo! Moa tsy ny andian’ondry va no tokony hokarakarainareo? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nefa tsy mpiandry nikarakara ny andian’ondry ianareo, fa naka ny ronono
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ronono: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika sy latinina, fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: jabora
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'ho sakafonareo sy ny volon’ondry hotafinareo sady namono ireo biby matavy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy nohatanjahinareo ny ondry osa, tsy nositraninareo ny narary na notsaboinareo ny naratra, tsy naverinareo ny niala tamin’ny andiany ary tsy notadiavinareo ny very, fa nanampatra ny fahefànareo tamin’ny herisetra sy ny fahasiahana ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa niparitaka ireny ondry ireny satria tsy misy mpiandry, ka tonga rembin’ny bibidia. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ireo ondriko andiany dia nirenireny teny an-tendrombohitra sy teny amin’ny havoana; ary niparitaka teny amin’ny velaran-tany manontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nirenireny teny an-tendrombohitra sy teny amin’ny havoana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toa misy filazana an-kolaka ny amin’ireo fanompoan-tsampy nataon’ny vahoaka Israely ombieniombieny izany (jereo 6.2-3; sy nta 6.2; 20.20 sns). –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ary niparitaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': filazana an-kolaka ny fahababoana.'
    marker-yv: yv-n
  - type: text
    text: ' izy satria tsy nisy niahy na nandeha nitady azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa ianareo mpiandry ny vahoaka Israely, mihainoa ny teniko: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy nisy mpiandry azy ny andian’ondriko ka lasan’ny mpangalatra sy zary rembin’ny bibidia rehetra. Ireo mpiandry ny ondriko manko tsy miraharaha ny ondry sady tsy mikarakara azy fa ny tenany no karakarainy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Noho izany, dia henoinareo ny teniko ry mpiandry ny vahoaka Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no lazain’ny Tompo ANDRIANANAHARY: Mampitandrina anareo mpitondra Aho fa hisampotina hamely anareo; ka hampamoahiko ny amin’ny ondriko ianareo ary hoesoriko tsy hiandry azy intsony; tsy ianareo mpikarakara tena intsony no hikarakara azy. Hoesoriko eo am-bavanareo ny andianondriko ka tsy ho azonareo hatao sakafo intsony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Ny tenako mihitsy no hiandraikitra sy hikarakara ny andianondriko. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Himasoako ny hanangona azy tahaka izay ataon’ny mpiandry amin’ny andro iparitahan’ny ondry. Izaho handeha haka azy ireny any amin’ny toerana rehetra izay niparitahany tamin’ny andro mandrahona sy maizim-pito
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andro mandrahona sy maizim-pito: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: filazana an-kolaka ny amin’ny famaizan’Andriamanitra (eto dia ny faharavan’i Jerosalema sy ny fahababoana).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Havoakako avy any amin’ny firenena izy ary hangoniko avy any amin’ny tany samy hafa, dia haveriko ao amin’ny taniny; handrasako eny an-tendrombohitr’i Israely sy eny an-dohasahan-driaka izy ary koa eny amin’ny toerana rehetra azo honenana eo amin’ny taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoentiko eny amin’ny tanim-bilona tsara izy, ka hanana kijàna eny an-tendrombohitra avo amin’i Israely. Any no hialany sasatra amin’ny kijàna tsara sy hiraofany amin’ny tanim-bilona milenodenoka. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izaho no ho mpiandry ny andianondriko ka hampandry azy; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hotadiaviko ny ondry very, haveriko izay nisaraka tamin’ny andiany, hotsaboiko izay naratra, hohatanjahiko izay marary, ary hokolokoloiko hatrany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary hokolokoloiko hatrany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika (grika: phulaxô =hebreo: ’asmos), fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fa haringako kosa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (hebreo =’asmid). Marihina fa matetika ihany no mety mifangaro ny litera hebreo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: daleta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: resa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: izay matavy sy matanjaka. Izaho no hiandry ny ondriko araka ny rariny.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga hamonjy ny vahoakany Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Ary ny amin’ny andianondriny, dia izao no lazain’ny Tompo ANDRIANANAHARY: ‹Indro hotsaraiko ny adin’ny ondry samy ondry sy ny ady ifanaovan’ny ondrilahy amin’ny osilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy ampy ny sasany eo aminareo angaha ny miraoka eny amin’ny tanim-bilona tsara no dia hosihosenareo koa ny ahitra sisa? Tsy ampy anareo angaha ny misotro ny rano madio no dia lotoinareo amin’ny tongotrareo koa ny rano sisa? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Voatery hihinana ny ahitra voahosihosinareo sy hisotro ny rano voalotonareo ireo sisa amin’ny andianondriko.› '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY amin’ny andianondriny: ‹Izaho mihitsy no hitsara ny adinareo ondry matavy sy ondry mahia. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Natositosikareo matanjaka tamin’ny sorokareo sy ny tehezanareo ireo ondry osaosa rehetra, ary nototoin’ny tandrokareo ambara-pandroakanareo azy ho any ivelan’ny tanim-bilona. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa tonga Aho hamonjy azy mba tsy ho lasan’ny mpangalatra intsony, ary hotsaraiko ny adin’ny ondry samy ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpiandry
  - type: text
    text: ' tokana no hatsangako hitarika azy, ka izy no hiandry azy, dia i Davida mpanompoko izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Davida
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' mpanjaka indraindray dia noheverina ho modely sady razamben’ilay mpanjaka ho avy izay nampanantenain’Andriamanitra (jereo Jer 23.5). Kanefa i Ezekiela dia tsy manome azy ny anaram-boninahitra hoe mpanjaka fa miantso azy hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: filoha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sady mamaritra azy hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpiandry
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 23) sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpanompo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Izy no hikarakara azy ary ho mpiandry azy tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izaho TOMPO no ho Andriamaniny ary i Davida mpanompoko no ho filoha eo anivony. Izaho TOMPO no miteny izany.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '«Hanao fanekempihavanana amin’ny andianondriko Aho: Hofoanako tsy ho eo amin’ny tany ny biby masiaka ka honina am-pilaminana any an-taniefitra izy ary handry any an’ala aza. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Avelako honina eny amin’ny manodidina ny tendrombohitra voatokana ho Ahy izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.26 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Avelako...manodidina ny tendrombohitro masina izy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika izany; fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hataoko fitahiana ity tany ity sy ny manodidina ny tendrombohitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tendrombohitra voatokana ho Ahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 20.40 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. Harotsako ara-potoana ny ranonorana ka hitondra fitahiambe izany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hamoa ny hazo eny an-tsaha ary hahavokatra ny tany; ka ny vahoakako hilamina eo amin’ny taniny. Hotapahiko ny gadra izay mampahory ny vahoakako, ka hafahako eo an-tanan’ny mpanandevo azy izy. Amin’izay hoekeny fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tsy ho babon’ny hafa firenena na ho rembin’ny bibidia intsony izy, fa honina am-pilaminana, ka tsy hisy hampatahotra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hampaniry ny voly hiadanany Aho, ka tsy hisy olona ho ripaky ny mosary intsony eo amin’ny tany; ary tsy hovesaran’ny latsan’ireo hafa firenena intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Amin’izay dia hoeken’ny hafa firenena fa Izaho TOMPO Andriamaniny no miaraka aminy ary izy Israelita no vahoakako; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: «Ianareo no olona, andian’ondry fiandriko, ary Izaho no Andriamanitrareo; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
