document_id: PSA.118,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Hovisavisaiko ny nataon’ny Tompo
  - type: text
    content: 'Miderà ny TOMPO ianareo fa tsara Izy:'
  - type: text
    content: –eny, maharitra mandrakizay ny fitiavany
  - type: note
    content: Jereo Sal 106.1 sy nta.
  - type: text
    content: '!'
  '10':
  - type: text
    content: Nanodidina ahy avokoa ireo hafa firenena,
  - type: text
    content: fa ny anaran’ny TOMPO no nandringanako azy.
  '11':
  - type: text
    content: Nitangorona tamiko ireo, indray nanarona ahy,
  - type: text
    content: fa ny anaran’ny TOMPO no nandringanako azy.
  '12':
  - type: text
    content: Nanodidina ahy toa renitantely ireo,
  - type: text
    content: kanjo nalaky maty toy ny afo-mololo,
  - type: text
    content: fa ny anaran’ny TOMPO no nandringanako azy.
  '13':
  - type: text
    content: Natosik’ireo aho mba ho lavo,
  - type: text
    content: fa ny TOMPO no nanampy ahy.
  '14':
  - type: text
    content: Ny TOMPO no heriko sy reharehako,
  - type: text
    content: satria Izy no mampandresy ahy
  - type: note
    content: Jereo Eks 15.2; Is 12.2.
  - type: text
    content: .
  '15':
  - type: text
    content: Feo fihobiana sy horakora-pandresena
  - type: text
    content: 'no ao an-dain’ny olona afaka:'
  - type: text
    content: «Naneho hery ny tanan’ny TOMPO,
  '16':
  - type: text
    content: nanandratra anay ny tanan’ny TOMPO,
  - type: text
    content: naneho hery ny tanan’ny TOMPO.»
  '17':
  - type: text
    content: Tsy ho faty aho fa ho velona
  - type: text
    content: mba hitanisa ny asan’ny TOMPO.
  '18':
  - type: text
    content: Nofaizin’ny TOMPO tokoa aho,
  - type: text
    content: kanefa tsy nafoiny ho faty
  - type: note
    content: Jereo 2Kôr 6.9.
  - type: text
    content: .
  '19':
  - type: text
    content: Vohay ny vavahady fidiran’ny olo-marina
  - type: note
    content: Ny vavahadin’ny tempolin’i Jerosalema no tian-kambara amin’izany.
  - type: text
    content: mba hidirako hidera ny TOMPO.
  '2':
  - type: text
    content: 'Aoka ny Israelita hilaza hoe:'
  - type: text
    content: –eny, maharitra mandrakizay ny fitiavany!
  '20':
  - type: text
    content: Ity no vavahady mankao amin’ny TOMPO;
  - type: text
    content: ny olo-marina no aoka hiditra eo!
  '21':
  - type: text
    content: Hidera Anao aho, Tompo ô, fa novalianao
  - type: text
    content: ary Ianao no nahazoako fandresena.
  '22':
  - type: text
    content: Ny vato nolavin’ny mpanao trano
  - type: text
    content: no efa tonga vatofehizoro
  - type: note
    content: Ity and ity dia tsiahivina ao amin’ny Lk 20.17; Asa 4.11; 1Pt 2.7; ampit Is 28.16.
  - type: text
    content: .
  '23':
  - type: text
    content: Avy amin’ny TOMPO izany
  - type: text
    content: ka mahagaga eo imasontsika
  - type: note
    content: Ny and 22-23 dia tsiahivina ao amin’ny Mt 21.42; Mk 12.10-11.
  - type: text
    content: .
  '24':
  - type: text
    content: Ity no andro nataon’ny TOMPO
  - type: text
    content: mba hifaliantsika sy hiravoantsika.
  '25':
  - type: text
    content: Miangavy re, TOMPO ô, omeo fandresena izahay
  - type: note
    content: 'omeo fandresena: na vonjeo, ny teny hebreo mifandraika amin’izany no voasoratra hoe Hosanà amin’ny teny grika sady nanjary antsam-pihobiana midika hoe: Dera anie ho an’ny Tompo. Jereo Mt 21.9; Mk 11.9; Jôh 12.13.'
  - type: text
    content: ;
  - type: text
    content: miangavy re, TOMPO ô, omeo fanambinana izahay.
  '26':
  - type: text
    content: ' '
  - type: text
    content: Hotahîna
  - type: text
    content: ' amin’ny anaran’ny TOMPO anie ilay avy.'
  - type: text
    content: Ianareo koa rarînay fitahiana
  - type: text
    content: avy ato an-
  - type: text
    content: tranon’ny TOMPO
  - type: note
    content: Avahana eto ilay avy (izany hoe ny mpanjaka) sy ianareo (izany hoe ny sarambabem-bahoaka). Jereo Mt 21.9; 23.39; Mk 11.9; Lk 13.35; 19.38; Jôh 12.13.
  - type: text
    content: .
  '27':
  - type: text
    content: Ny TOMPO no Andriamanitra,
  - type: text
    content: ka hanazava antsika anie Izy!
  - type: text
    content: Milahara mitana sampan-drofia,
  - type: text
    content: 'ka manatòna ny zoron’ny '
  - type: text
    content: alitara
  - type: note
    content: 'Ny zoron’ny alitara: (jereo Eks 27.2) dia noheverina ho manan-kasina indrindra eo amin’ny alitara.'
  - type: text
    content: .
  '28':
  - type: text
    content: Andriamanitro Ianao ka hoderaiko,
  - type: text
    content: eny, Andriamanitro ka hasandratro.
  '29':
  - type: text
    content: 'Miderà ny TOMPO ianareo fa tsara Izy:'
  - type: text
    content: –Eny, maharitra mandrakizay ny fitiavany!
  '3':
  - type: text
    content: 'Aoka ny taranak’i '
  - type: text
    content: Aharôna
  - type: note
    content: 'taranak’i Aharôna: jereo Sal 115.10 sy nta.'
  - type: text
    content: ' hilaza hoe:'
  - type: text
    content: –eny, maharitra mandrakizay ny fitiavany!
  '4':
  - type: text
    content: 'Aoka ireo mpanaja ny TOMPO hilaza hoe:'
  - type: text
    content: –eny, maharitra mandrakizay ny fitiavany!
  '5':
  - type: text
    content: Tao an-katerena aho no niantso ny TOMPO,
  - type: text
    content: ka novaliany aho, nomeny halalahana.
  '6':
  - type: text
    content: Miandany amiko IZY ka tsy hatahotra aho;
  - type: text
    content: hahavita inona amiko ny olombelona
  - type: note
    content: Voatsiahy ao amin’ny Heb 13.6 ity and ity.
  - type: text
    content: '?'
  '7':
  - type: text
    content: Miandany amiko ny TOMPO ka manampy ahy;
  - type: text
    content: ireo mpankahala ahy hitako fa resiny.
  '8':
  - type: text
    content: Aleo mialoka amin’ny TOMPO
  - type: text
    content: toy izay mialoka amin’ny olombelona;
  '9':
  - type: text
    content: aleo mitoky amin’ny TOMPO
  - type: text
    content: toy izay mitoky amin’ny mpifehy.
