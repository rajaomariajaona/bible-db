      - type: usfm
        marker: fr
        children:
        - type: text
          text: '118.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny and 22-23 dia tsiahivina ao amin’ny Mt 21.42; Mk 12.10-11.
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: q1
