verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Hovisavisaiko ny nataon’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Miderà ny TOMPO ianareo fa tsara Izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –eny, maharitra mandrakizay ny fitiavany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '118.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 106.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: '!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanodidina ahy avokoa ireo hafa firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny anaran’ny TOMPO no nandringanako azy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitangorona tamiko ireo, indray nanarona ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny anaran’ny TOMPO no nandringanako azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanodidina ahy toa renitantely ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo nalaky maty toy ny afo-mololo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny anaran’ny TOMPO no nandringanako azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Natosik’ireo aho mba ho lavo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny TOMPO no nanampy ahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no heriko sy reharehako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Izy no mampandresy ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '118.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 15.2; Is 12.2.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feo fihobiana sy horakora-pandresena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no ao an-dain’ny olona afaka:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Naneho hery ny tanan’ny TOMPO,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanandratra anay ny tanan’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: naneho hery ny tanan’ny TOMPO.»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho faty aho fa ho velona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitanisa ny asan’ny TOMPO.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nofaizin’ny TOMPO tokoa aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy nafoiny ho faty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '118.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2Kôr 6.9.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vohay ny vavahady fidiran’ny olo-marina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '118.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny vavahadin’ny tempolin’i Jerosalema no tian-kambara amin’izany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hidirako hidera ny TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka ny Israelita hilaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –eny, maharitra mandrakizay ny fitiavany!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ity no vavahady mankao amin’ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olo-marina no aoka hiditra eo!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidera Anao aho, Tompo ô, fa novalianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Ianao no nahazoako fandresena.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vato nolavin’ny mpanao trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no efa tonga vatofehizoro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '118.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ity and ity dia tsiahivina ao amin’ny Lk 20.17; Asa 4.11; 1Pt 2.7; ampit Is 28.16.
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy amin’ny TOMPO izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahagaga eo imasontsika
    - type: usfm
      marker: f
