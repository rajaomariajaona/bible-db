  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Izy indrindra Ilay nolazaiko hoe: «Misy lehilahy tamy aoriako, Izay lehibe noho izaho, satria efa nisy talohako.» '
  - type: usfm
    marker: v
