    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ary novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mino ve ianao satria nilazako fa hitako teo ambany aviavy? Zavatra lehibe noho izany no mbola ho hitanao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
