  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tonga hijoro ho vavolombelona i Jôhany, dia vavolombelona hanambara ilay fahazavana; ka ny hafatra nampitain’i Jôhany no hampino ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy hoe i Jôhany no fahazavana, fa izy no ho vavolombelona hanambara ny fahazavana.
