  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary izaho dia tsy nahalala Azy; fa mba hampisehoana Azy amin’ny vahoaka Israely no nahatongavako hanao batisa ao amin’ny rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I Jôhany no vavolombelona nanambara hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa hitako ny Fanahy Masina nidina avy any an-danitra toy ny voromahailala, ka nitoetra teo amboniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 11.2; 61.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary izaho dia tsy nahalala Azy; fa Andriamanitra, Izay naniraka ahy hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ' ao amin’ny rano, no nilaza tamiko hoe: «Ilay ho hitanao idinan’ny Fanahy Masina sy itoerany eo amboniny, dia Izy no Mpanao batisa ao amin’ny Fanahy Masina.» '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nahita aho, ka dia vavolombelona manambara fa Izy no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpianatr’i Jesoa voalohany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny ampitson’iny indray, dia mbola teo ihany i Jôhany sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' roa lahy; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary nahatazana an’i Jesoa nandalo i Jôhany ka hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro ny Zanakondrin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
