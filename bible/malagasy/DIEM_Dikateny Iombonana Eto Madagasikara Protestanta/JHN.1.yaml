- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nandre an’i Jôhany niteny izany ireto mpianany roa lahy ka lasa nanaraka an’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary nitodika i Jesoa ka nahita azy roa lahy nanaraka, dia nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no tadiavinareo izay?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’izy roa lahy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rabỳ
  - type: usfm
    marker: f
