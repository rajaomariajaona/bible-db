    text: 'Tamin’ny voalohany, fony nahary an’izao tontolo izao Andriamanitra, dia efa nisy ilay Teny; ilay Teny dia nitodika tany amin’Andriamanitra hatrany, ary ilay Teny dia Andriamanitra. '
