    marker-yv: yv-n
  - type: text
    text: ', dia i Jesoa zanak’i Jôsefa, Ilay avy any Nazareta.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary hoy i Natanaela taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa mba mety hisy zava-tsoa ve avy any Nazareta?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’i Filipo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndao ianao hizaha!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Nahita an’i Natanaela tamy nanatona Azy i Jesoa ka izao no teniny momba an’i Natanaela:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izany ka tena '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israelita
  - type: text
    text: ' tsy misy fitaka!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia hoy i Natanaela taminy:'
- type: usfm
  marker: m
  children:
  - type: text
