        text: '1.38 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Rabỳ: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: teny aramianina.
    marker-yv: yv-n
  - type: text
    text: ' ô, (izany hoe Mpampianatra ô, raha adika), aiza ianao no mitoetra?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia, fa ho hitanareo!
- type: usfm
  marker: p
  children:
  - type: text
    text: Koa dia nandeha izy roa lahy ka nahita izay nitoeran’i Jesoa ary nitoetra teo aminy tamin’io andro io. (Tokony ho tamin’ny efatra tolakandro tamin’izay).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'I Andrea, rahalahin’i Simôna Petera, no anankiray tamin’izy roa lahy nandre ny tenin’i Jôhany, ka nanaraka an’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ny nihaonan’i Andrea voalohany dia i Simôna rahalahiny ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa hitanay ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ' (izany hoe i Kristy na hoe Voahosotra, raha adika)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia nentin’i Andrea nankany amin’i Jesoa i Simôna; ary nony nijery azy i Jesoa, dia nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao no Simôna, zanakalahin’i Jônà! Hantsoina hoe Kefasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.42 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kefasy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: teny aramianina.
    marker-yv: yv-n
  - type: text
    text: ' ianao (izany hoe Petera na hoe Vato, raha adika)!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antsoin’i Jesoa i Filipo sy i Natanaela
