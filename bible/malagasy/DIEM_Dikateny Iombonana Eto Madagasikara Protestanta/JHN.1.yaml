document_id: JHN.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay Teny no aina sy fahazavana
  - type: text
    content: 'Tamin’ny voalohany, fony nahary an’izao tontolo izao Andriamanitra, dia efa nisy ilay Teny; ilay Teny dia nitodika tany amin’Andriamanitra hatrany, ary ilay Teny dia Andriamanitra. '
  '10':
  - type: text
    content: Teo amin’izao tontolo izao ilay Teny; ary Izy no nahariana an’izao tontolo izao, nefa izao tontolo izao
  - type: note
    content: Jereo and 3.
  - type: text
    content: ' dia tsy nahalala Azy. '
  '11':
  - type: text
    content: Tonga teo amin’ny taniny
  - type: note
    content: taniny na hoe izao tontolo izao izay fananany.
  - type: text
    content: 'Izy, fa tsy noraisin’ny mpiray firenena aminy. '
  '12':
  - type: text
    content: 'Kanefa izay rehetra nandray Azy ary nino Azy, dia nomeny fahefana ho tonga '
  - type: text
    content: zanak’Andriamanitra
  - type: note
    content: Ampit Gal 3.26; 1Jôh 3.1-2.
  - type: text
    content: ': '
  '13':
  - type: text
    content: izy ireo dia nateraka tsy araka ny fomban’olombelona miankina amin’ny sitrapon-dehilahy, fa araka ny fomban’Andriamanitra.
  '14':
  - type: text
    content: Ilay Teny dia tonga olombelona, ka niara-nonina taminay. Feno fahasoavana sy fahamarinana Izy ary hitanay ny voninahiny
  - type: note
    content: 'niara-nonina: ara-bakiteny kokoa niara-nitoetra an-day. –ary... voninahiny: ampit Is 60.1-2.'
  - type: text
    content: ', dia voninahitra avy amin’ny Ray ho an’ny Zanaka lahitokana. '
  '15':
  - type: text
    content: 'Vavolombelona manambara Azy i Jôhany ka niantso mafy hoe:'
  - type: text
    content: '–Izy no Ilay voalazako hoe: «Ilay tamy aoriako dia lehibe noho izaho, satria efa nisy talohako'
  - type: note
    content: Jereo 1.30.
  - type: text
    content: .»
  '16':
  - type: text
    content: 'Feno harem-pahasoavana ilay Teny ka nandraisantsika rehetra fahasoavana tovozin-tsy ritra: '
  '17':
  - type: text
    content: 'satria ny '
  - type: text
    content: lalàna
  - type: text
    content: ' dia nomen’Andriamanitra tamin’ny alalan’i Mosesy'
  - type: note
    content: Jereo Eks 31.18; 34.28.
  - type: text
    content: ', fa ny fahasoavana sy ny fahamarinana kosa dia tonga tamin’ny alalan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '18':
  - type: text
    content: Tsy nisy nahita an’Andriamanitra na oviana na oviana
  - type: note
    content: Ampit Eks 33.20.
  - type: text
    content: ; fa ny Zanaka lahitokana, Izay Andriamanitra sy miombona tanteraka amin’ny Ray, no efa nanambara Azy.
  - type: heading
    content: Ny hafatr’i Jôhany Mpanao batisa
  - type: heading
    content: (Jereo Mt 3.1-12; Mk 1.1-8; Lk 3.15-17)
  '19':
  - type: text
    content: 'Toy izao no fijoroan’i Jôhany ho vavolombelona. Nisy mpisorona sy '
  - type: text
    content: levita
  - type: text
    content: ' nirahin’ny manampahefana jiosy avy any Jerosalema hankeo aminy, mba hanontany azy hoe:'
  - type: text
    content: –Iza moa ianao?
  '2':
  - type: text
    content: Tamin’ny voalohany, dia nitodika tany amin’Andriamanitra ilay Teny
  - type: note
    content: Ampit and 1-2 sy Ohab 8.22-26.
  - type: text
    content: '; '
  '20':
  - type: text
    content: 'Tsy nandà ny hamaly izy fa nilaza mazava hoe:'
  - type: text
    content: '–Tsy izaho no ilay '
  - type: text
    content: Mesia
  - type: text
    content: '!'
  '21':
  - type: text
    content: 'Ary nanontany azy ry zareo hoe:'
  - type: text
    content: '–Ahoana àry? I '
  - type: text
    content: Elià
  - type: text
    content: ' ve ianao?'
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Tsy izy aho!
  - type: text
    content: 'Ka hoy ireo taminy:'
  - type: text
    content: '–Ilay '
  - type: text
    content: Mpaminany
  - type: text
    content: ' ve ianao?'
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: –Tsia
  - type: note
    content: Jereo Mal 3.23; Deot 18.15,18.
  - type: text
    content: '!'
  '22':
  - type: text
    content: 'Tamin’izay ry zareo dia niteny tamin’i Jôhany hoe:'
  - type: text
    content: –Iza àry ianao, mba hitondranay valin-teny any amin’izay naniraka anay? Lazainao ho iza ny tenanao!
  '23':
  - type: text
    content: 'Dia hoy izy:'
  - type: text
    content: '–Izaho no «feon’olona miantso mafy ao an-taniefitra hoe: ahitsio ny lalan’ny Tompo'
  - type: note
    content: Is 40.3, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: », araka ny tenin’i Isaià mpaminanin’Andriamanitra.
  '24':
  - type: text
    content: 'Ary nisy avy amin’ny '
  - type: text
    content: Farisianina
  - type: note
    content: 'Ary nisy... Farisianina: dkt hafa Ary Farisianina.'
  - type: text
    content: 'ireto olona nirahina teo amin’i Jôhany, '
  '25':
  - type: text
    content: 'ka nanontany azy hoe:'
  - type: text
    content: '–Nahoana àry ianao no manao '
  - type: text
    content: batisa
  - type: text
    content: ', raha toa tsy ianao no ilay Mesia na i Elià na ilay Mpaminany?'
  '26':
  - type: text
    content: 'Ka novalian’i Jôhany hoe:'
  - type: text
    content: '–Ny ahy, ao amin’ny rano no anaovako batisa; fa eo anivonareo misy olona anankiray tsy fantatrareo, '
  '27':
  - type: text
    content: dia Ilay tamy aoriako, ary tsy mendrika hamaha ny fehikapany akory aho!
  '28':
  - type: text
    content: Izany zavatra izany dia niseho tany Betania
  - type: note
    content: 'Betania: tanàna kely tsy dia fantatra toerana mazava tsara teo ampita atsinanan’ny ony Jôrdàna; tsy tokony hampifangaroina amin’ilay Betania akaikin’i Jerosalema (Jereo 11.1).'
  - type: text
    content: ', andafy atsinanan’ny ony Jôrdàna, teo amin’ny fanaovan’i Jôhany batisa.'
  - type: heading
    content: I Jesoa no Zanakondrin’Andriamanitra
  '29':
  - type: text
    content: 'Nony ampitso, dia nahita an’i Jesoa avy nanatona azy i Jôhany ka hoy izy:'
  - type: text
    content: –Indro ny Zanakondrin’Andriamanitra, Ilay manala ny fahotan’izao tontolo izao
  - type: note
    content: Ampit Is 53.6-7.
  - type: text
    content: '! '
  '3':
  - type: text
    content: Izy no naharian’Andriamanitra ny zavatra rehetra, ka raha tsy teo Izy dia tsy nisy ary ny zavatra noarîna
  - type: note
    content: Ampit Gen 1.3; Sal 33.6,9; 1Kôr 8.6; Kol 1.16-17.
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Izy indrindra Ilay nolazaiko hoe: «Misy lehilahy tamy aoriako, Izay lehibe noho izaho, satria efa nisy talohako.» '
  '31':
  - type: text
    content: Ary izaho dia tsy nahalala Azy; fa mba hampisehoana Azy amin’ny vahoaka Israely no nahatongavako hanao batisa ao amin’ny rano.
  '32':
  - type: text
    content: 'I Jôhany no vavolombelona nanambara hoe:'
  - type: text
    content: –Efa hitako ny Fanahy Masina nidina avy any an-danitra toy ny voromahailala, ka nitoetra teo amboniny
  - type: note
    content: Ampit Is 11.2; 61.1.
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Ary izaho dia tsy nahalala Azy; fa Andriamanitra, Izay naniraka ahy hanao '
  - type: text
    content: batisa
  - type: text
    content: ' ao amin’ny rano, no nilaza tamiko hoe: «Ilay ho hitanao idinan’ny Fanahy Masina sy itoerany eo amboniny, dia Izy no Mpanao batisa ao amin’ny Fanahy Masina.» '
  '34':
  - type: text
    content: 'Ary nahita aho, ka dia vavolombelona manambara fa Izy no '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: .
  - type: heading
    content: Ireo mpianatr’i Jesoa voalohany
  '35':
  - type: text
    content: 'Ny ampitson’iny indray, dia mbola teo ihany i Jôhany sy ny '
  - type: text
    content: mpianany
  - type: text
    content: ' roa lahy; '
  '36':
  - type: text
    content: 'ary nahatazana an’i Jesoa nandalo i Jôhany ka hoy izy hoe:'
  - type: text
    content: –Indro ny Zanakondrin’Andriamanitra
  - type: note
    content: Jereo 1.29.
  - type: text
    content: '!'
  '37':
  - type: text
    content: 'Nandre an’i Jôhany niteny izany ireto mpianany roa lahy ka lasa nanaraka an’i Jesoa. '
  '38':
  - type: text
    content: 'Ary nitodika i Jesoa ka nahita azy roa lahy nanaraka, dia nanao taminy hoe:'
  - type: text
    content: –Inona no tadiavinareo izay?
  - type: text
    content: 'Ka novalian’izy roa lahy hoe:'
  - type: text
    content: –Rabỳ
  - type: note
    content: 'Rabỳ: teny aramianina.'
  - type: text
    content: ' ô, (izany hoe Mpampianatra ô, raha adika), aiza ianao no mitoetra?'
  '39':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Avia, fa ho hitanareo!
  - type: text
    content: Koa dia nandeha izy roa lahy ka nahita izay nitoeran’i Jesoa ary nitoetra teo aminy tamin’io andro io. (Tokony ho tamin’ny efatra tolakandro tamin’izay).
  '4':
  - type: text
    content: Ilay Teny no nirakitra ny aina
  - type: note
    content: 'ka raha tsy teo Izy dia tsy nisy ary ny zavatra noarîna (and 3). Ilay Teny no nirakitra ny aina (and 4): dkt hafa (raha ovàna ny maripijanonana ao amin’ny rijan-teny grika fototra) ka raha tsy teo Izy dia tsy nisy zavatra ary; ny zavatra noarîna dia tao aminy no nisy aina.'
  - type: text
    content: ', ary io aina io no nitondra fahazavana ho an’ny olombelona. '
  '40':
  - type: text
    content: 'I Andrea, rahalahin’i Simôna Petera, no anankiray tamin’izy roa lahy nandre ny tenin’i Jôhany, ka nanaraka an’i Jesoa. '
  '41':
  - type: text
    content: 'Ny nihaonan’i Andrea voalohany dia i Simôna rahalahiny ka nilazany hoe:'
  - type: text
    content: '–Efa hitanay ny '
  - type: text
    content: Mesia
  - type: text
    content: ' (izany hoe i Kristy na hoe Voahosotra, raha adika)!'
  '42':
  - type: text
    content: 'Dia nentin’i Andrea nankany amin’i Jesoa i Simôna; ary nony nijery azy i Jesoa, dia nanao hoe:'
  - type: text
    content: –Ianao no Simôna, zanakalahin’i Jônà! Hantsoina hoe Kefasy
  - type: note
    content: 'Kefasy: teny aramianina.'
  - type: text
    content: ' ianao (izany hoe Petera na hoe Vato, raha adika)!'
  - type: heading
    content: Antsoin’i Jesoa i Filipo sy i Natanaela
  '43':
  - type: text
    content: 'Ny ampitson’iny, dia niroso nankany amin’ny faritany Galilea i Jesoa; tafahaona tamin’i Filipo Izy ary nanao taminy hoe:'
  - type: text
    content: –Avia hiaraka amiko!
  '44':
  - type: text
    content: I Filipo dia avy any Betsaidà
  - type: note
    content: 'Betsaidà: tanàna mifanila amin’i Kafarnahòma.'
  - type: text
    content: ', tanàna fiavian-dry i Andrea sy i Petera. '
  '45':
  - type: text
    content: 'Tafahaona tamin’i Natanaela kosa i Filipo ka niteny taminy hoe: «Efa hitanay Ilay voalazan’i Mosesy tao amin’ny bokin’ny '
  - type: text
    content: Lalàna
  - type: text
    content: ' sy voalazan’ireo '
  - type: text
    content: mpaminany
  - type: note
    content: Ampit Deot 18.18; Is 9.5-6; Ezek 34.23.
  - type: text
    content: ', dia i Jesoa zanak’i Jôsefa, Ilay avy any Nazareta.»'
  '46':
  - type: text
    content: 'Ary hoy i Natanaela taminy:'
  - type: text
    content: –Moa mba mety hisy zava-tsoa ve avy any Nazareta?
  - type: text
    content: 'Dia novalian’i Filipo hoe:'
  - type: text
    content: –Ndao ianao hizaha!
  '47':
  - type: text
    content: 'Nahita an’i Natanaela tamy nanatona Azy i Jesoa ka izao no teniny momba an’i Natanaela:'
  - type: text
    content: '–Izany ka tena '
  - type: text
    content: Israelita
  - type: text
    content: ' tsy misy fitaka!'
  '48':
  - type: text
    content: 'Dia hoy i Natanaela taminy:'
  - type: text
    content: –Ahoana no ahafantaranao ahy?
  - type: text
    content: 'Ka novalian’i Jesoa hoe:'
  - type: text
    content: –Talohan’ny niantsoan’i Filipo anao, dia hitako teo ambany aviavy
  - type: note
    content: Araka ny tantaran’ireo mpampianatra jiosy, dia satrin’ny olona mialokaloka eo am-pototr’aviavy rehefa hamaky sy handinika ny Soratra Masina.
  - type: text
    content: ' ianao!'
  '49':
  - type: text
    content: 'Fa i Natanaela kosa nilaza taminy hoe:'
  - type: text
    content: '–Mpampianatra ô, Ianao no Zanak’Andriamanitra, Ianao no Mpanjakan’i '
  - type: text
    content: Israely
  - type: note
    content: Ampit Sal 2.7; Tsef 3.15.
  - type: text
    content: '!'
  '5':
  - type: text
    content: Ary ny fahazavana dia mamirapiratra anatin’ny haizina, ka tsy nahasakana azy ny haizina
  - type: note
    content: 'ka tsy nahasakana azy ny haizina: dkt hafa fa tsy nandray azy ny haizina.'
  - type: text
    content: .
  '50':
  - type: text
    content: 'Ary novalian’i Jesoa hoe:'
  - type: text
    content: –Mino ve ianao satria nilazako fa hitako teo ambany aviavy? Zavatra lehibe noho izany no mbola ho hitanao!
  '51':
  - type: text
    content: 'Dia hoy koa i Jesoa tamin-dry i Natanaela:'
  - type: text
    content: '–Lazaiko marina dia marina aminareo fa ho hitanareo ny lanitra misokatra mbamin’ny '
  - type: text
    content: anjelin’Andriamanitra
  - type: text
    content: ' miaka-midina eo ambonin’ny '
  - type: text
    content: Zanak’olona
  - type: note
    content: Ampit Gen 28.12.
  - type: text
    content: '!'
  '6':
  - type: text
    content: 'Nisy lehilahy anankiray nirahin’Andriamanitra: i Jôhany'
  - type: note
    content: 'I Jôhany Mpanao batisa izany: jereo 1.19-36.'
  - type: text
    content: ' no anarany. '
  '7':
  - type: text
    content: 'Tonga hijoro ho vavolombelona i Jôhany, dia vavolombelona hanambara ilay fahazavana; ka ny hafatra nampitain’i Jôhany no hampino ny olona rehetra. '
  '8':
  - type: text
    content: Tsy hoe i Jôhany no fahazavana, fa izy no ho vavolombelona hanambara ny fahazavana.
  '9':
  - type: text
    content: Ilay Teny no tena fahazavana tonga amin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' sady manazava ny olombelona rehetra. '
