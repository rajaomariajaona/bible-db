  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Tafahaona tamin’i Natanaela kosa i Filipo ka niteny taminy hoe: «Efa hitanay Ilay voalazan’i Mosesy tao amin’ny bokin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
