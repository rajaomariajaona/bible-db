- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia hiaraka amiko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
