document_id: JOB.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Valintenin’i Jôba: Mahery loatra amiko Andriamanitra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly i Jôba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fantatro tokoa fa izany no izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aiza no hahamarina ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jôb 4.17.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha olona no te hiady hevitra aminy, dia tsy hahavaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia fanontaniana iray amin’ny arivo aza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt hafa: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia tsy hovalian’Andriamanitra teny na dia iray amin’ny arivo aza.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lalim-pahendrena Izy sady mahery tsy hay tohaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa iza no hanohitra Azy ka ho afa-maina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Andriamanitra no mamindra ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy ampoizin’ireo akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay manova toerana azy amim-pahatezerana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mampihorohoro ny tany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihozongozona ny andriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mandidy ny masoandro tsy hiposaka Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manidy ny kintana amin’ny fitombo-kase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mamelatra ny lanitra samirery Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandeha eny amin’ny onjan-dranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izy no nanao ny vondron-kintana isan-karazany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny Orsa sy Telonohorefy ary Ikotokelimiadilaona
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny andian-kintana any atsimo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ireo andian-kintana telo voalohany dia tsy azo antoka tsara ny fahamarinan’ny anarany, fa ilay farany kosa dia tena tsy fantatra izay mifandraika aminy. –Ny Telonohorefy sy ny Ikotokelimiadilaona: jereo Jôba 38.31; Ham 5.8.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy takatry ny saina ireo zava-dehibe ataony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hita isa ny zava-mahagaga vitany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mandray ny filazan’i Elifaza eto i Jôba (jereo 5.9).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mandalo ahy Andriamanitra nefa tsy hitako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihelina indray saingy tsy fantatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha misy zavatra voatazony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: zovy no hampamotsotra azy an’izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Zovy no hiteny aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Inona ity ataonao?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy voatana Andriamanitra rehefa tezitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Milefitra eo anatrehany i Rahaba sy ny tariny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 7.12 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mainka fa Izaho indray ve no hamaly Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahafantina izay teny hatao aminy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa na marina aza ny ahy, dia tsy hamaly akory aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hitalaho kosa ny famindrampon’ny mpitsara ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha niantso ihany aho, ka namaly ahy aza izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho nino aho fa nekeny ny fitalahoako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mamely ahy amin’ny tafiotra Izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'amin’ny tafiotra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: misy manao dkt hafa hoe noho ny zavatra bitika.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampitombo ny feriko tsy amin’antony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy avelany mba haka aina akory aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa vokisany fahoriana mangidy kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Raha hery no hampiasaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahery rahateo Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'raha fitsarana indray, dia hoy Izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Zovy no sahy hitory Ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zovy no sahy hitory Ahy? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ireo dkt tranainy grika sy Siriaka, arahin’ireo dkt maro môderina dia mamaky: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Fa zovy no sahy hitory Azy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '?'
    marker-yv: yv-n
  - type: text
    text: ?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na marina aza ny ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hodisoin’ny vavako ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na tsy manan-tsiny aza aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia holazainy meloka ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eny, tsy manan-tsiny aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy mampaninona ahy izay fiainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mankaloiloy ahy ny fisiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Iray ihany izany, ka hoy aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny tsy manan-tsiny na ny meloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy aringan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Raha tonga tampoka ny loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mahafaty ny tsy manan-tsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ihomehezan’Andriamanitra fotsiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahoriana manjo azy ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha mby eo an-tanan’ny olon-dratsy ny tany iray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tapenan’Andriamanitra ny mason’ny mpitsara.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha tsy Izy no manao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mba ho iza kosa àry?
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nandeha faingana noho ny mpihazakazaka ny androko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandositra tsy nahita hasambarana akory,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: nisosa malaky toy ny lakan-jozoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny voromahery miantoraka amin’ny hazany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hoy aho anakampo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hohadinoiko ny fahoriako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatsahatro ny alaheloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho miramirana aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Kanefa mbola mangovitra ihany aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fijaliana rehetra hanjo ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fantatro fa Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hanala tsiny ahy velively.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Satria aminy dia meloka hatrany aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa inona no hisahiranako hanamarin-tena?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Na dia handro amin’ny savony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'amin’ny savony: ny hafa mandika azy ho amin’ny oram-panala.'
    marker-yv: yv-n
  - type: text
    text: ' aza aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanasa ny tanako amin’ny ranon-davenona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: tonga dia harobokao indray ao anaty fotaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'anaty fotaka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay no fandikana amin’ny dkt tranainy grika sy latinina; ny lovantsofina jiosy dia mamaky hoe anaty lavaka be fotaka.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka haloan’ny fitafiako toa zava-maharikoriko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa tsy olombelona tahaka ahy Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho azoko valiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy iarahana miseho amin’ny fitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Raha mba nisy ahay mpanelanelana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nametra-tanana taminay roa tonta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Raha mba nisy...: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika sy siriaka, tohanan’ireo stf hebreo maro; ny rijan-teny hebreo mahazatra dia misy mandika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsy misy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –tanana taminay roa tonta: mba hanambaràna fa manam-pahefana amin’ny mpifanandrina roa tonta izy.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia ho nesoriny tamiko ny karavasin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho nitsahatra ny fampihorohoroany ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ho niteny aminy tsy amin-tahotra aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny toe-javatra tsy toy izany, dia honjohonjoko izaho irery.
