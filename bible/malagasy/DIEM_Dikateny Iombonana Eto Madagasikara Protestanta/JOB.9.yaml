document_id: JOB.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba: Mahery loatra amiko Andriamanitra'
  - type: text
    content: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Tsy takatry ny saina ireo zava-dehibe ataony
  - type: text
    content: ary tsy hita isa ny zava-mahagaga vitany
  - type: note
    content: Mandray ny filazan’i Elifaza eto i Jôba (jereo 5.9).
  - type: text
    content: .
  '11':
  - type: text
    content: Mandalo ahy Andriamanitra nefa tsy hitako,
  - type: text
    content: ary mihelina indray saingy tsy fantatro.
  '12':
  - type: text
    content: Raha misy zavatra voatazony,
  - type: text
    content: zovy no hampamotsotra azy an’izany?
  - type: text
    content: 'Zovy no hiteny aminy hoe:'
  - type: text
    content: «Inona ity ataonao?»
  '13':
  - type: text
    content: Tsy voatana Andriamanitra rehefa tezitra.
  - type: text
    content: Milefitra eo anatrehany i Rahaba sy ny tariny
  - type: note
    content: Jereo 7.12 sy nta.
  - type: text
    content: .
  - type: heading
    content: '*'
  '14':
  - type: text
    content: Mainka fa Izaho indray ve no hamaly Azy
  - type: text
    content: ka hahafantina izay teny hatao aminy?
  '15':
  - type: text
    content: Fa na marina aza ny ahy, dia tsy hamaly akory aho
  - type: text
    content: fa hitalaho kosa ny famindrampon’ny mpitsara ahy.
  '16':
  - type: text
    content: Raha niantso ihany aho, ka namaly ahy aza izy,
  - type: text
    content: dia tsy ho nino aho fa nekeny ny fitalahoako.
  '17':
  - type: text
    content: Mamely ahy amin’ny tafiotra Izy
  - type: note
    content: 'amin’ny tafiotra: misy manao dkt hafa hoe noho ny zavatra bitika.'
  - type: text
    content: ka mampitombo ny feriko tsy amin’antony.
  '18':
  - type: text
    content: Tsy avelany mba haka aina akory aho
  - type: text
    content: fa vokisany fahoriana mangidy kosa.
  '19':
  - type: text
    content: Raha hery no hampiasaina,
  - type: text
    content: mahery rahateo Izy;
  - type: text
    content: 'raha fitsarana indray, dia hoy Izy hoe:'
  - type: text
    content: «Zovy no sahy hitory Ahy
  - type: note
    content: 'Zovy no sahy hitory Ahy? Ireo dkt tranainy grika sy Siriaka, arahin’ireo dkt maro môderina dia mamaky: Fa zovy no sahy hitory Azy?'
  - type: text
    content: ?»
  '2':
  - type: text
    content: 'Fantatro tokoa fa izany no izy:'
  - type: text
    content: aiza no hahamarina ny olona
  - type: text
    content: eo anatrehan’Andriamanitra
  - type: note
    content: Ampit Jôb 4.17.
  - type: text
    content: '?'
  '20':
  - type: text
    content: Na marina aza ny ahy,
  - type: text
    content: dia hodisoin’ny vavako ihany;
  - type: text
    content: ary na tsy manan-tsiny aza aho,
  - type: text
    content: dia holazainy meloka ihany.
  '21':
  - type: text
    content: Eny, tsy manan-tsiny aho,
  - type: text
    content: nefa tsy mampaninona ahy izay fiainana,
  - type: text
    content: mankaloiloy ahy ny fisiako.
  '22':
  - type: text
    content: 'Iray ihany izany, ka hoy aho hoe:'
  - type: text
    content: na ny tsy manan-tsiny na ny meloka
  - type: text
    content: dia samy aringan’Andriamanitra.
  '23':
  - type: text
    content: Raha tonga tampoka ny loza
  - type: text
    content: ka mahafaty ny tsy manan-tsiny,
  - type: text
    content: dia ihomehezan’Andriamanitra fotsiny
  - type: text
    content: ny fahoriana manjo azy ireo.
  '24':
  - type: text
    content: Raha mby eo an-tanan’ny olon-dratsy ny tany iray,
  - type: text
    content: dia tapenan’Andriamanitra ny mason’ny mpitsara.
  - type: text
    content: Fa raha tsy Izy no manao izany,
  - type: text
    content: dia mba ho iza kosa àry?
  - type: heading
    content: '*'
  '25':
  - type: text
    content: Nandeha faingana noho ny mpihazakazaka ny androko,
  - type: text
    content: ka nandositra tsy nahita hasambarana akory,
  '26':
  - type: text
    content: nisosa malaky toy ny lakan-jozoro,
  - type: text
    content: tahaka ny voromahery miantoraka amin’ny hazany.
  '27':
  - type: text
    content: 'Hoy aho anakampo hoe:'
  - type: text
    content: aoka hohadinoiko ny fahoriako,
  - type: text
    content: hatsahatro ny alaheloko
  - type: text
    content: ka ho miramirana aho.
  '28':
  - type: text
    content: Kanefa mbola mangovitra ihany aho
  - type: text
    content: noho ny fijaliana rehetra hanjo ahy,
  - type: text
    content: ary fantatro fa Andriamanitra
  - type: text
    content: dia tsy hanala tsiny ahy velively.
  '29':
  - type: text
    content: Satria aminy dia meloka hatrany aho,
  - type: text
    content: koa inona no hisahiranako hanamarin-tena?
  '3':
  - type: text
    content: Raha olona no te hiady hevitra aminy, dia tsy hahavaly
  - type: text
    content: na dia fanontaniana iray amin’ny arivo aza
  - type: note
    content: 'Dkt hafa: dia tsy hovalian’Andriamanitra teny na dia iray amin’ny arivo aza.'
  - type: text
    content: .
  '30':
  - type: text
    content: Na dia handro amin’ny savony
  - type: note
    content: 'amin’ny savony: ny hafa mandika azy ho amin’ny oram-panala.'
  - type: text
    content: ' aza aho'
  - type: text
    content: ka hanasa ny tanako amin’ny ranon-davenona,
  '31':
  - type: text
    content: tonga dia harobokao indray ao anaty fotaka
  - type: note
    content: 'anaty fotaka: izay no fandikana amin’ny dkt tranainy grika sy latinina; ny lovantsofina jiosy dia mamaky hoe anaty lavaka be fotaka.'
  - type: text
    content: ','
  - type: text
    content: ka haloan’ny fitafiako toa zava-maharikoriko.
  '32':
  - type: text
    content: Fa tsy olombelona tahaka ahy Andriamanitra
  - type: text
    content: ka ho azoko valiana
  - type: text
    content: sy iarahana miseho amin’ny fitsarana.
  '33':
  - type: text
    content: Raha mba nisy ahay mpanelanelana
  - type: text
    content: izay nametra-tanana taminay roa tonta
  - type: note
    content: 'Raha mba nisy...: araka ny dkt tranainy grika sy siriaka, tohanan’ireo stf hebreo maro; ny rijan-teny hebreo mahazatra dia misy mandika hoe tsy misy. –tanana taminay roa tonta: mba hanambaràna fa manam-pahefana amin’ny mpifanandrina roa tonta izy.'
  - type: text
    content: ','
  '34':
  - type: text
    content: dia ho nesoriny tamiko ny karavasin’Andriamanitra
  - type: text
    content: ka ho nitsahatra ny fampihorohoroany ahy;
  '35':
  - type: text
    content: ho niteny aminy tsy amin-tahotra aho.
  - type: text
    content: Noho ny toe-javatra tsy toy izany, dia honjohonjoko izaho irery.
  '4':
  - type: text
    content: Lalim-pahendrena Izy sady mahery tsy hay tohaina,
  - type: text
    content: koa iza no hanohitra Azy ka ho afa-maina?
  '5':
  - type: text
    content: Andriamanitra no mamindra ny tendrombohitra,
  - type: text
    content: nefa tsy ampoizin’ireo akory
  - type: text
    content: Ilay manova toerana azy amim-pahatezerana.
  '6':
  - type: text
    content: Mampihorohoro ny tany Izy
  - type: text
    content: ka mihozongozona ny andriny.
  '7':
  - type: text
    content: Mandidy ny masoandro tsy hiposaka Izy
  - type: text
    content: ary manidy ny kintana amin’ny fitombo-kase.
  '8':
  - type: text
    content: Mamelatra ny lanitra samirery Andriamanitra
  - type: text
    content: ary mandeha eny amin’ny onjan-dranomasina.
  '9':
  - type: text
    content: 'Izy no nanao ny vondron-kintana isan-karazany:'
  - type: text
    content: dia ny Orsa sy Telonohorefy ary Ikotokelimiadilaona
  - type: text
    content: mbamin’ny andian-kintana any atsimo
  - type: note
    content: 'Ireo andian-kintana telo voalohany dia tsy azo antoka tsara ny fahamarinan’ny anarany, fa ilay farany kosa dia tena tsy fantatra izay mifandraika aminy. –Ny Telonohorefy sy ny Ikotokelimiadilaona: jereo Jôba 38.31; Ham 5.8.'
  - type: text
    content: .
