verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'Ny tenin’i Bildada:'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: ny fahefàn’Andriamanitra amin’izao rehetra izao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny i Bildada avy any Soha ka nanao tamin’i Jôba hoe:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An’Andriamanitra ny fanapahana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fahefana mahatahotra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mampitoetra ny fiadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany an-danitra ambony any.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa azo isaina ny miaramilany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no tsy iposahan’ny fahazavany?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahoana no hahamarina ny olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehan’Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ahoana no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hahadio
    - type: text
      text: ' izay tera-behivavy?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro ny volana aza matroka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny kintana tsy madio eo imasony,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mainka moa fa ny olombelona izay tsinontsinona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny kankana aman’olitra.
