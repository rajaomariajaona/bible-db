document_id: JOB.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny tenin’i Bildada:'
  - type: heading
    content: ny fahefàn’Andriamanitra amin’izao rehetra izao
  - type: text
    content: 'Niteny i Bildada avy any Soha ka nanao tamin’i Jôba hoe:'
  '2':
  - type: text
    content: An’Andriamanitra ny fanapahana
  - type: text
    content: sy ny fahefana mahatahotra.
  - type: text
    content: Izy no mampitoetra ny fiadanana
  - type: text
    content: hatrany an-danitra ambony any.
  '3':
  - type: text
    content: Moa azo isaina ny miaramilany?
  - type: text
    content: Ary iza no tsy iposahan’ny fahazavany?
  '4':
  - type: text
    content: Ahoana no hahamarina ny olombelona
  - type: text
    content: eo anatrehan’Andriamanitra?
  - type: text
    content: 'Ary ahoana no '
  - type: text
    content: hahadio
  - type: text
    content: ' izay tera-behivavy?'
  '5':
  - type: text
    content: Indro ny volana aza matroka
  - type: text
    content: ary ny kintana tsy madio eo imasony,
  '6':
  - type: text
    content: mainka moa fa ny olombelona izay tsinontsinona
  - type: text
    content: tahaka ny kankana aman’olitra.
