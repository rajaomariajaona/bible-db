    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ireto no baiko sy lalàna amam-pitsipika izay nambaran’i Mosesy taminy, fony ireo tafavoaka an’i Ejipta '
