  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Ny tany azon’ny Israelita kosa dia manomboka any Harôhera, izay ao amoron’ny lohasahan-driaka Arnôna, ka miafara any amin’ny tendrombohitra Siôny na hoe Hermôna, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ary mahafaoka ny faritany Harabà manontolo atsinanan’i Jôrdàna ka tafapaka hatrany amin’ny Ranomasina Maty eo am-bodin’ny tendrombohitra Pisgà.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '«Araka izay nandidian’ny TOMPO Andriamanitro ahy, indro ianareo efa nampianariko lalàna amam-pitsipika hotanterahinareo any amin’ny tany izay efa hidiranareo mba halainareo ho fananana.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa tandremo sy tanteraho izany, fa hiheverana anareo ho hendry sy manan-tsaina eo imason’ny firenen-kafa; handre ireny lalàna rehetra ireny mantsy izy ka ho loa-bolana hoe: «Mba vahoaka hendry sy manan-tsaina tokoa io firenena lehibe io!» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa aiza no misy firenena, na dia lehibe aza, manana andriamanitra akaiky azy, tahaka ny maha akaiky antsika ny TOMPO Andriamanitsika, Izay mamaly isaky ny antsoina? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary aiza no misy firenena, na dia lehibe aza, manana didy amam-pitsipika marina tahaka izao fehezan-dalàna arosoko eo anoloanareo anio izao?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naneho ny tenany sy ny lalànany tao Hôreba ny Tompo
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Kanefa kosa mitandrema ianareo ka miambena tena fandrao hanadino ny zavatra efa hitanareo maso na hamela izany hiala tao am-ponareo, amin’ny andro rehetra hiainanareo; fa ampahafantaro ny zanakareo aman-jafinareo izany.
