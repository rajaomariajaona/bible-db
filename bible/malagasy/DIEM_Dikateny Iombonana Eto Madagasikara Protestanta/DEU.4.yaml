document_id: DEU.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tandremo ny didin’Andriamanitra
  - type: text
    content: 'Ary hoy indray i Mosesy hoe: «Ankehitriny, ry Israelita, henoy ny lalàna amam-pitsipika izay ampianariko anareo hotanterahinareo, mba ho velona ianareo ka hiditra sy hanana ny tany izay omen’ny TOMPO Andriamanitry ny razambenareo anareo. '
  '10':
  - type: text
    content: 'Aza hadinoinareo ny zavatra hitanareo maso tamin’ny andro nijoroanareo teo anatrehan’ny TOMPO Andriamanitrareo tany an-tendrombohitra '
  - type: text
    content: Hôreba
  - type: text
    content: ', fony ny TOMPO nilaza tamiko hoe: «Avondrony ho eto amiko ny vahoaka israelita, dia hampandrenesiko azy ny teniko, izay hianarany mba hanajany Ahy amin’ny andro rehetra hiainany eto ambonin’ny tany sady hampianariny ny zanany koa.» '
  '11':
  - type: text
    content: 'Dia nanatona ianareo ka nijoro teo am-bodin’ny tendrombohitra; nirehitra afo manaka-danitra kosa ilay tendrombohitra sady rakotra setroka mikitroka sy rahona matevina. '
  '12':
  - type: text
    content: Ary tao anatin’ny afo ny TOMPO no niteny taminareo, ka nandre Azy niteny ianareo fa tsy nahita endrika Azy akory; feo no hany renareo
  - type: note
    content: 'And 10-12: jereo Eks 19.10-25; Heb 12.18-19.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Dia nambarany taminareo ny '
  - type: text
    content: fanekempihavanany
  - type: text
    content: ', izay nodidiany harahinareo, dia ny didy folo; ary nosoratany teo amin’ny takela-bato anankiroa ireo'
  - type: note
    content: Jereo Eks 31.18; 34.28; Deot 9.10.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Tamin’izany andro izany no nandidian’ny TOMPO ahy koa hampianatra anareo lalàna amam-pitsipika mba hotanterahinareo any amin’ny tany izay efa hiampitanareo mba halainareo ho fananana.
  - type: heading
    content: Fampitandremana ny amin’ny fanompoan-tsampy
  '15':
  - type: text
    content: 'Noho ianareo tsy nahita endrika ny TOMPO fony Izy niteny tao anaty afo taminareo tany an-tendrombohitra '
  - type: text
    content: Hôreba
  - type: text
    content: ', dia mitandrema tena tokoa ianareo. '
  '16':
  - type: text
    content: Mitandrema fandrao hihasimba toetra ianareo ka hanao sarin-javatra voasokitra ho sampinareo, dia izay sarin-javatra rehetra miendrika andriamanitra
  - type: note
    content: 'sarin-javatra voasokitra ho sampinareo: jereo Eks 20.4; Lev 26.1; Deot 5.8; 27.15. –andriamanitra: tsy azo antoka ny hevitry ny voambolana hebreo mifanandrify amin’izany.'
  - type: text
    content: ', na sarin-dehilahy, na sarim-behivavy, '
  '17':
  - type: text
    content: 'na sarim-biby miaina etỳ ambonin’ny tany, na sarim-borona manidina eny amin’ny habakabaka, '
  '18':
  - type: text
    content: na sarim-biby mikisaka amin’ny tany, na sarin-trondro mivelona anaty rano any ambany any
  - type: note
    content: 'And 16-18: jereo Rm 1.23.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Mitandrema fandrao hiandrandra hijery ny habakabaka ianareo ka hahita ny masoandro sy ny volana ary ny kintana mbamin’ny planeta rehetra eny ana habakabaka, dia ho voataona hiankohoka eo anatrehan’ireny sy hanompo azy; fa navelan’ny TOMPO Andriamanitrareo ho anjaran’ny firenen-kafa rehetra eto amin’izao tontolo izao ireny fanompoan-tsampy ireny. '
  '2':
  - type: text
    content: Aza ampianareo ny teny izay andidiako anareo ary aza anesorana; fa tandremo ny didin’ny TOMPO Andriamanitrareo, izay ampitaiko aminareo
  - type: note
    content: Jereo 13.11; Nom 22.18-19.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Ianareo kosa dia nalain’ny TOMPO ka nentiny niala avy tao amin’ny memy fandrendreham-by, izany hoe avy tany Ejipta, mba ho vahoaka voatokana ho azy tahaka ny amin’izao anio izao
  - type: note
    content: Jereo Eks 19.5; Tit 2.14; 1Pt 2.9.
  - type: text
    content: .
  '21':
  - type: text
    content: Ary tezitra tamiko ny TOMPO noho ny aminareo ka nianiana fa tsy hita an’i Jôrdàna aho, na hiditra any amin’ny tany soa izay omen’ny TOMPO Andriamanitrareo ho fanananareo
  - type: note
    content: Jereo Nom 20.12.
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Ho faty amin’ity faritany ity aho fa tsy hita an’i Jôrdàna; ianareo kosa no hita azy ka hanana izany tany soa izany. '
  '23':
  - type: text
    content: 'Mitandrema ianareo fandrao manadino ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataon’ny TOMPO Andriamanitrareo taminareo, ka manao sarin-javatra voasokitra ho sampinareo, araka ny endriky ny zavatra rehetra izay efa nandraran’ny TOMPO Andriamanitrareo anareo. '
  '24':
  - type: text
    content: Fa afo mandevona tokoa ny TOMPO Andriamanitrareo; eny, Andriamanitra saro-piaro amin’ny maha Andriamanitra Azy Izy
  - type: note
    content: Jereo Heb 12.29; Eks 20.5. Andriamanitra dia tahaka ny afo mandevona ho an’izay tsy manaiky ny didiny.
  - type: text
    content: .
  '25':
  - type: text
    content: 'Rehefa ela hitoerana eo amin’ilay tany ianareo ka hiteraka sy ho loa-jafy, dia aza mihasimba toetra ka hanao sarin-javatra voasokitra ho sampinareo araka ireo endri-javatra isan-karazany ireo, na hanao izay ratsy eo imason’ny TOMPO Andriamanitrareo ka hampahatezitra Azy. '
  '26':
  - type: text
    content: 'Raha manao izany ianareo, dia miantso ny lanitra sy ny tany ho vavolombelona aho anio no manambara fa vetivety foana dia ho fongotra tokoa ianareo tsy ho eo amin’ny tany izay efa hiampitanareo an’i Jôrdàna mba halainareo ho fananana; tsy ho maro andro honenana eo ianareo, fa haringana tokoa. '
  '27':
  - type: text
    content: 'Haelin’ny TOMPO any amin’ny firenen-tsamy hafa ianareo; ho tonga olom-bitsy izay sisa aminareo any amin’ny firenen-tsamy hafa izay hitondran’ny TOMPO anareo. '
  '28':
  - type: text
    content: Asan-tanan’olombelona no andriamanitra hotompoinareo any, dia vato aman-kazo izay tsy mahita na mandre na mihinana na manimbolo
  - type: note
    content: 'And 27-28: jereo 28.36.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: Kanefa any ianareo no hitady an’ilay TOMPO Andriamanitrareo ka hahita Azy, raha mitady Azy amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo
  - type: note
    content: Jereo Jer 29.13-14.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Efa nahita maso izay nataon’ny TOMPO noho ny amin’ilay '
  - type: text
    content: Bahala
  - type: text
    content: ' tao Pehôra'
  - type: note
    content: Jereo Nom 25.
  - type: text
    content: ' ianareo; fa ny olona rehetra nanompo an’io Bahala io taminareo, dia naringan’ny TOMPO Andriamanitrareo tsy ho eo aminareo intsony. '
  '30':
  - type: text
    content: 'Rehefa hiharan’ireo zavatra rehetra voalazako ireo ianareo any am-parany any ka hozoim-pahoriana, dia hiverina amin’ny TOMPO Andriamanitrareo ianareo ka hihaino indray ny feony; '
  '31':
  - type: text
    content: fa Andriamanitra mamindrafo ilay TOMPO Andriamanitrareo, ka tsy hahafoy anareo na handringana tanteraka anareo na hanadino ny fanekempihavanana izay efa nianianany tamin’ny razambenareo.
  - type: heading
    content: Tombontsoa manokana ananan’i Israely
  '32':
  - type: text
    content: 'Diniho ange ny andro fahagola talohanareo, manomboka hatreo amin’ny andro namoronan’Andriamanitra ny olombelona tetỳ ambonin’ny tany. Saintsaino ange ny zava-mitranga manomboka amin’ny faravodilanitra ankilany ka miafara amin’ny faravodilanitra andaniny. Moa efa nisy zava-dehibe niseho na re tahaka izany ve? '
  '33':
  - type: text
    content: 'Moa efa nisy ve firenena nandre ny feon’Andriamanitra niteny tao anatin’ny afo, tahaka ny efa renareo ka mbola velona ihany? '
  '34':
  - type: text
    content: Moa efa nisy ve andriamanitra sampy nanandrana nanafaka firenena anankiray teo an-tanan’ny firenen-kafa mba hatokany ho azy, ka nampiasa fizahan-toetra sy famantarana ary zava-mahagaga sy ady ombàn’ny fiarovana mahery sy fahefana tsy hay tohaina ary fampatahorana goavana
  - type: note
    content: Fampahatsiahivana ny loza voateny ao amin’ny Eks 7.14–12.36 izany.
  - type: text
    content: '? Tsia, kanefa teo imasoanareo indrindra no nanaovan’ny TOMPO Andriamanitrareo izany rehetra izany ho anareo tany Ejipta. '
  '35':
  - type: text
    content: Ianareo no nampahitany an’izany mba hahafantaranareo fa ny TOMPO no Andriamanitra, sady tsy misy afa-tsy Izy
  - type: note
    content: Jereo Is 45.21; Mk 12.32.
  - type: text
    content: '. '
  '36':
  - type: text
    content: Avy tany an-
  - type: text
    content: danitra
  - type: text
    content: ' no nampandrenesany anareo ny feony hananarany anareo, ary teto ambonin’ny tany no nanehoany anareo ny afony lehibe; ka tao anatin’izany afo izany no nandrenesanareo Azy niteny. '
  '37':
  - type: text
    content: 'Noho ny TOMPO tia ireo razambenareo sady nifidy anareo taranaka amam-parany, dia Izy mihitsy no nitondra anareo hiala tany Ejipta ka nomba anareo tamin-kery lehibe; '
  '38':
  - type: text
    content: 'avy eo Izy dia nandroaka teo anoloanareo firenena maro izay lehibe sy matanjaka noho ianareo, mba hampidirany anareo amin’ny taniny sy hanomezany izany ho fanananareo, tahaka ny amin’izao anio izao. '
  '39':
  - type: text
    content: 'Koa aoka hoekenareo anio sy haraikitrareo ao am-ponareo fa ny TOMPO no Andriamanitra any amin’ny lanitra ambony sy etỳ amin’ny tany ambany, sady tsy misy afa-tsy Izy. '
  '4':
  - type: text
    content: Fa ianareo nifikitra tamin’ny TOMPO Andriamanitrareo kosa dia samy velona avokoa izao anio izao.
  '40':
  - type: text
    content: Dia tandremo ny lalànany sy ny didiny izay ampitaiko aminareo anio, mba hahita soa ianareo sy ny taranaka amam-paranareo ary mba ho maro andro ianareo any amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo amin’ny taona rehetra.
  - type: heading
    content: Tanàna fialofana anankitelo teo atsinanan’i Jôrdàna
  '41':
  - type: text
    content: Tamin’izany i Mosesy dia nanokana tanàna telo tany andafy atsinanan’i Jôrdàna
  - type: note
    content: 'Tanàna fialofana: jereo 19.1-13; Nom 35.9-34; Jos 20.1-9.'
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'mba handosiran’izay nahafaty ny namany tsy nahy ka tsy nankahala azy teo aloha. Ho velona izany mpamono olona izany, raha mandositra ao amin’ny anankiray amin’ireo tanàna ireo: '
  '43':
  - type: text
    content: 'dia i Betsera, eo amin’ny lembalemba any an-taniefitra, ho an’ny Reobenita; i Ramôta any Gilehada, ho an’ny Gadita; ary i Gôlàna any '
  - type: text
    content: Basàna
  - type: text
    content: ', ho an’ny Manasita.'
  - type: heading
    content: LAHATENY FAHAROA NATAON’I MOSESY
  '44':
  - type: text
    content: 'Izao no lalàna naroson’i Mosesy tamin’ny Israelita. '
  '45':
  - type: text
    content: 'Ireto no baiko sy lalàna amam-pitsipika izay nambaran’i Mosesy taminy, fony ireo tafavoaka an’i Ejipta '
  '46':
  - type: text
    content: ka tody tany andafy atsinanan’ny ony Jôrdàna; teo an-dohasaha tandrifin’i Bety-Pehôra
  - type: note
    content: Jereo 3.29 sy nta.
  - type: text
    content: ' ny Israelita tamin’izay, tao amin’ny tanin’i Sihôna izay mpanjaka '
  - type: text
    content: amôrita
  - type: text
    content: ' nonina tao Hesbôna. Nony tafavoaka an’i Ejipta i Mosesy sy ny Israelita, dia nandresy an’i Sihôna '
  '47':
  - type: text
    content: 'ka nahazo ny taniny mbamin’ny tanin’i Hôga mpanjakan’i '
  - type: text
    content: Basàna
  - type: text
    content: '. I Sihôna sy i Hôga no mpanjaka amôrita anankiroa tamin’iny andafy atsinanan’i Jôrdàna iny. '
  '48':
  - type: text
    content: 'Ny tany azon’ny Israelita kosa dia manomboka any Harôhera, izay ao amoron’ny lohasahan-driaka Arnôna, ka miafara any amin’ny tendrombohitra Siôny na hoe Hermôna, '
  '49':
  - type: text
    content: ary mahafaoka ny faritany Harabà manontolo atsinanan’i Jôrdàna ka tafapaka hatrany amin’ny Ranomasina Maty eo am-bodin’ny tendrombohitra Pisgà.
  '5':
  - type: text
    content: '«Araka izay nandidian’ny TOMPO Andriamanitro ahy, indro ianareo efa nampianariko lalàna amam-pitsipika hotanterahinareo any amin’ny tany izay efa hidiranareo mba halainareo ho fananana.» '
  '6':
  - type: text
    content: 'Koa tandremo sy tanteraho izany, fa hiheverana anareo ho hendry sy manan-tsaina eo imason’ny firenen-kafa; handre ireny lalàna rehetra ireny mantsy izy ka ho loa-bolana hoe: «Mba vahoaka hendry sy manan-tsaina tokoa io firenena lehibe io!» '
  '7':
  - type: text
    content: 'Fa aiza no misy firenena, na dia lehibe aza, manana andriamanitra akaiky azy, tahaka ny maha akaiky antsika ny TOMPO Andriamanitsika, Izay mamaly isaky ny antsoina? '
  '8':
  - type: text
    content: Ary aiza no misy firenena, na dia lehibe aza, manana didy amam-pitsipika marina tahaka izao fehezan-dalàna arosoko eo anoloanareo anio izao?
  - type: heading
    content: Naneho ny tenany sy ny lalànany tao Hôreba ny Tompo
  '9':
  - type: text
    content: Kanefa kosa mitandrema ianareo ka miambena tena fandrao hanadino ny zavatra efa hitanareo maso na hamela izany hiala tao am-ponareo, amin’ny andro rehetra hiainanareo; fa ampahafantaro ny zanakareo aman-jafinareo izany.
