      - type: text
        text: '42'
    - type: text
      text: 'mba handosiran’izay nahafaty ny namany tsy nahy ka tsy nankahala azy teo aloha. Ho velona izany mpamono olona izany, raha mandositra ao amin’ny anankiray amin’ireo tanàna ireo: '
