document_id: DEU.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tandremo ny didin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy indray i Mosesy hoe: «Ankehitriny, ry Israelita, henoy ny lalàna amam-pitsipika izay ampianariko anareo hotanterahinareo, mba ho velona ianareo ka hiditra sy hanana ny tany izay omen’ny TOMPO Andriamanitry ny razambenareo anareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aza hadinoinareo ny zavatra hitanareo maso tamin’ny andro nijoroanareo teo anatrehan’ny TOMPO Andriamanitrareo tany an-tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hôreba
    - type: text
      text: ', fony ny TOMPO nilaza tamiko hoe: «Avondrony ho eto amiko ny vahoaka israelita, dia hampandrenesiko azy ny teniko, izay hianarany mba hanajany Ahy amin’ny andro rehetra hiainany eto ambonin’ny tany sady hampianariny ny zanany koa.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nanatona ianareo ka nijoro teo am-bodin’ny tendrombohitra; nirehitra afo manaka-danitra kosa ilay tendrombohitra sady rakotra setroka mikitroka sy rahona matevina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary tao anatin’ny afo ny TOMPO no niteny taminareo, ka nandre Azy niteny ianareo fa tsy nahita endrika Azy akory; feo no hany renareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 10-12:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 19.10-25; Heb 12.18-19.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nambarany taminareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanany
    - type: text
      text: ', izay nodidiany harahinareo, dia ny didy folo; ary nosoratany teo amin’ny takela-bato anankiroa ireo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 31.18; 34.28; Deot 9.10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tamin’izany andro izany no nandidian’ny TOMPO ahy koa hampianatra anareo lalàna amam-pitsipika mba hotanterahinareo any amin’ny tany izay efa hiampitanareo mba halainareo ho fananana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana ny amin’ny fanompoan-tsampy
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Noho ianareo tsy nahita endrika ny TOMPO fony Izy niteny tao anaty afo taminareo tany an-tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hôreba
    - type: text
      text: ', dia mitandrema tena tokoa ianareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mitandrema fandrao hihasimba toetra ianareo ka hanao sarin-javatra voasokitra ho sampinareo, dia izay sarin-javatra rehetra miendrika andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'sarin-javatra voasokitra ho sampinareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 20.4; Lev 26.1; Deot 5.8; 27.15. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': tsy azo antoka ny hevitry ny voambolana hebreo mifanandrify amin’izany.'
      marker-yv: yv-n
    - type: text
      text: ', na sarin-dehilahy, na sarim-behivavy, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'na sarim-biby miaina etỳ ambonin’ny tany, na sarim-borona manidina eny amin’ny habakabaka, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: na sarim-biby mikisaka amin’ny tany, na sarin-trondro mivelona anaty rano any ambany any
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 16-18:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Rm 1.23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mitandrema fandrao hiandrandra hijery ny habakabaka ianareo ka hahita ny masoandro sy ny volana ary ny kintana mbamin’ny planeta rehetra eny ana habakabaka, dia ho voataona hiankohoka eo anatrehan’ireny sy hanompo azy; fa navelan’ny TOMPO Andriamanitrareo ho anjaran’ny firenen-kafa rehetra eto amin’izao tontolo izao ireny fanompoan-tsampy ireny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aza ampianareo ny teny izay andidiako anareo ary aza anesorana; fa tandremo ny didin’ny TOMPO Andriamanitrareo, izay ampitaiko aminareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 13.11; Nom 22.18-19.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ianareo kosa dia nalain’ny TOMPO ka nentiny niala avy tao amin’ny memy fandrendreham-by, izany hoe avy tany Ejipta, mba ho vahoaka voatokana ho azy tahaka ny amin’izao anio izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 19.5; Tit 2.14; 1Pt 2.9.
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary tezitra tamiko ny TOMPO noho ny aminareo ka nianiana fa tsy hita an’i Jôrdàna aho, na hiditra any amin’ny tany soa izay omen’ny TOMPO Andriamanitrareo ho fanananareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 20.12.
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ho faty amin’ity faritany ity aho fa tsy hita an’i Jôrdàna; ianareo kosa no hita azy ka hanana izany tany soa izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mitandrema ianareo fandrao manadino ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' nataon’ny TOMPO Andriamanitrareo taminareo, ka manao sarin-javatra voasokitra ho sampinareo, araka ny endriky ny zavatra rehetra izay efa nandraran’ny TOMPO Andriamanitrareo anareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Fa afo mandevona tokoa ny TOMPO Andriamanitrareo; eny, Andriamanitra saro-piaro amin’ny maha Andriamanitra Azy Izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jereo Heb 12.29; Eks 20.5. Andriamanitra dia tahaka ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: afo mandevona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ho an’izay tsy manaiky ny didiny.'
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Rehefa ela hitoerana eo amin’ilay tany ianareo ka hiteraka sy ho loa-jafy, dia aza mihasimba toetra ka hanao sarin-javatra voasokitra ho sampinareo araka ireo endri-javatra isan-karazany ireo, na hanao izay ratsy eo imason’ny TOMPO Andriamanitrareo ka hampahatezitra Azy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Raha manao izany ianareo, dia miantso ny lanitra sy ny tany ho vavolombelona aho anio no manambara fa vetivety foana dia ho fongotra tokoa ianareo tsy ho eo amin’ny tany izay efa hiampitanareo an’i Jôrdàna mba halainareo ho fananana; tsy ho maro andro honenana eo ianareo, fa haringana tokoa. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Haelin’ny TOMPO any amin’ny firenen-tsamy hafa ianareo; ho tonga olom-bitsy izay sisa aminareo any amin’ny firenen-tsamy hafa izay hitondran’ny TOMPO anareo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Asan-tanan’olombelona no andriamanitra hotompoinareo any, dia vato aman-kazo izay tsy mahita na mandre na mihinana na manimbolo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.28 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 27-28:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 28.36.
      marker-yv: yv-n
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Kanefa any ianareo no hitady an’ilay TOMPO Andriamanitrareo ka hahita Azy, raha mitady Azy amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 29.13-14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Efa nahita maso izay nataon’ny TOMPO noho ny amin’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
    - type: text
      text: ' tao Pehôra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 25.
      marker-yv: yv-n
    - type: text
      text: ' ianareo; fa ny olona rehetra nanompo an’io Bahala io taminareo, dia naringan’ny TOMPO Andriamanitrareo tsy ho eo aminareo intsony. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Rehefa hiharan’ireo zavatra rehetra voalazako ireo ianareo any am-parany any ka hozoim-pahoriana, dia hiverina amin’ny TOMPO Andriamanitrareo ianareo ka hihaino indray ny feony; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: fa Andriamanitra mamindrafo ilay TOMPO Andriamanitrareo, ka tsy hahafoy anareo na handringana tanteraka anareo na hanadino ny fanekempihavanana izay efa nianianany tamin’ny razambenareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tombontsoa manokana ananan’i Israely
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Diniho ange ny andro fahagola talohanareo, manomboka hatreo amin’ny andro namoronan’Andriamanitra ny olombelona tetỳ ambonin’ny tany. Saintsaino ange ny zava-mitranga manomboka amin’ny faravodilanitra ankilany ka miafara amin’ny faravodilanitra andaniny. Moa efa nisy zava-dehibe niseho na re tahaka izany ve? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Moa efa nisy ve firenena nandre ny feon’Andriamanitra niteny tao anatin’ny afo, tahaka ny efa renareo ka mbola velona ihany? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Moa efa nisy ve andriamanitra sampy nanandrana nanafaka firenena anankiray teo an-tanan’ny firenen-kafa mba hatokany ho azy, ka nampiasa fizahan-toetra sy famantarana ary zava-mahagaga sy ady ombàn’ny fiarovana mahery sy fahefana tsy hay tohaina ary fampatahorana goavana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fampahatsiahivana ny loza voateny ao amin’ny Eks 7.14–12.36 izany.
      marker-yv: yv-n
    - type: text
      text: '? Tsia, kanefa teo imasoanareo indrindra no nanaovan’ny TOMPO Andriamanitrareo izany rehetra izany ho anareo tany Ejipta. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ianareo no nampahitany an’izany mba hahafantaranareo fa ny TOMPO no Andriamanitra, sady tsy misy afa-tsy Izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 45.21; Mk 12.32.
      marker-yv: yv-n
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Avy tany an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: danitra
    - type: text
      text: ' no nampandrenesany anareo ny feony hananarany anareo, ary teto ambonin’ny tany no nanehoany anareo ny afony lehibe; ka tao anatin’izany afo izany no nandrenesanareo Azy niteny. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Noho ny TOMPO tia ireo razambenareo sady nifidy anareo taranaka amam-parany, dia Izy mihitsy no nitondra anareo hiala tany Ejipta ka nomba anareo tamin-kery lehibe; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'avy eo Izy dia nandroaka teo anoloanareo firenena maro izay lehibe sy matanjaka noho ianareo, mba hampidirany anareo amin’ny taniny sy hanomezany izany ho fanananareo, tahaka ny amin’izao anio izao. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Koa aoka hoekenareo anio sy haraikitrareo ao am-ponareo fa ny TOMPO no Andriamanitra any amin’ny lanitra ambony sy etỳ amin’ny tany ambany, sady tsy misy afa-tsy Izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa ianareo nifikitra tamin’ny TOMPO Andriamanitrareo kosa dia samy velona avokoa izao anio izao.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Dia tandremo ny lalànany sy ny didiny izay ampitaiko aminareo anio, mba hahita soa ianareo sy ny taranaka amam-paranareo ary mba ho maro andro ianareo any amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo amin’ny taona rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tanàna fialofana anankitelo teo atsinanan’i Jôrdàna
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Tamin’izany i Mosesy dia nanokana tanàna telo tany andafy atsinanan’i Jôrdàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.41 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Tanàna fialofana:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
