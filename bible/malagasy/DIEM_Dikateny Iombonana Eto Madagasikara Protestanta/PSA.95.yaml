document_id: PSA.95,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Amin’ny fotoana isehoana eo anatrehan’ny Tompo
  - type: text
    content: Avia! Aoka isika hihoby ny TOMPO,
  - type: text
    content: hankalaza ilay Vatolampy Mpamonjy antsika!
  '10':
  - type: text
    content: Efapolo taona
  - type: note
    content: 'efapolo taona: jereo Nom 14.33-34.'
  - type: text
    content: ' no nahatofoka ahy izany taranaka izany,'
  - type: text
    content: 'ka hoy Aho hoe: Vahoaka very saina tokoa ireo,'
  - type: text
    content: ka tsy mahatakatra izay lalana itarihako azy.
  '11':
  - type: text
    content: 'Koa nianiana tamin-katezerana Aho nanao hoe:'
  - type: text
    content: Tsy hidiran’ireo ny toeram-pitsaharana nomaniko
  - type: note
    content: 'Ny and 7-11 dia tsiahivin’ny Heb 3.7-11 araka ny dkt tranainy grika. –Ny fianianan’ny Tompo: jereo Nom 14.21-23; Deot 1.34-35; Heb 4.3.'
  - type: text
    content: .»
  '2':
  - type: text
    content: Aoka hankeo anatrehany amim-piderana,
  - type: text
    content: hankalaza Azy amin’ny feon-java-maneno!
  '3':
  - type: text
    content: Fa Andriamanitra lehibe ny TOMPO,
  - type: text
    content: Mpanjaka lehibe ambonin’ny andriamanitra rehetra.
  '4':
  - type: text
    content: Eo ambany fifehezany ny atin’ny tany,
  - type: text
    content: ary Azy koa ny tampon’ny tendrombohitra;
  '5':
  - type: text
    content: Azy ny ranomasina fa nataony,
  - type: text
    content: Azy koa ny tanety fa novolavolainy.
  '6':
  - type: text
    content: Midira, aoka isika hiankohoka sy hitsaoka,
  - type: text
    content: handohalika eo anatrehan’ny TOMPO Mpanao antsika!
  '7':
  - type: text
    content: Satria Izy no Andriamanitsika, fa isika kosa
  - type: text
    content: 'vahoaka '
  - type: text
    content: fiandriny
  - type: text
    content: ', andian’ondry tarihiny.'
  - type: text
    content: Koa enga anie ianareo anio
  - type: text
    content: 'mba hahahaino ny feony manao hoe:'
  '8':
  - type: text
    content: «Aza manamafy ny fonareo
  - type: text
    content: tahaka ny nataon’ny razanareo tao Meribà
  - type: text
    content: tamin’ny zava-nitranga tao Masà
  - type: note
    content: 'Meribà sy Masà: Eks 17.1-7; Nom 20.1-13.'
  - type: text
    content: ', tany an-taniefitra'
  - type: note
    content: Ny and 7-8 dia tsiahivin’ny Heb 3.15; 4.7 araka ny dkt tranainy grika.
  - type: text
    content: .
  '9':
  - type: text
    content: Fa nihantsy sy nitsapa Ahy ny razanareo,
  - type: text
    content: na dia efa nahita ny asa nataoko aza.
