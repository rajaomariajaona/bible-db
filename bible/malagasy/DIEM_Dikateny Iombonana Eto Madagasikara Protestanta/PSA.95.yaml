document_id: PSA.95
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Amin’ny fotoana isehoana eo anatrehan’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Avia! Aoka isika hihoby ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hankalaza ilay Vatolampy Mpamonjy antsika!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka hankeo anatrehany amim-piderana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hankalaza Azy amin’ny feon-java-maneno!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Andriamanitra lehibe ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanjaka lehibe ambonin’ny andriamanitra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eo ambany fifehezany ny atin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Azy koa ny tampon’ny tendrombohitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Azy ny ranomasina fa nataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Azy koa ny tanety fa novolavolainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Midira, aoka isika hiankohoka sy hitsaoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: handohalika eo anatrehan’ny TOMPO Mpanao antsika!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Satria Izy no Andriamanitsika, fa isika kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fiandriny
  - type: text
    text: ', andian’ondry tarihiny.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa enga anie ianareo anio
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mba hahahaino ny feony manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: «Aza manamafy ny fonareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny nataon’ny razanareo tao Meribà
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny zava-nitranga tao Masà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95.8a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Meribà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Masà:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eks 17.1-7; Nom 20.1-13.
    marker-yv: yv-n
  - type: text
    text: ', tany an-taniefitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95.8b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny and 7-8 dia tsiahivin’ny Heb 3.15; 4.7 araka ny dkt tranainy grika.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa nihantsy sy nitsapa Ahy ny razanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia efa nahita ny asa nataoko aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Efapolo taona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'efapolo taona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 14.33-34.
    marker-yv: yv-n
  - type: text
    text: ' no nahatofoka ahy izany taranaka izany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hoy Aho hoe: Vahoaka very saina tokoa ireo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahatakatra izay lalana itarihako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa nianiana tamin-katezerana Aho nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hidiran’ireo ny toeram-pitsaharana nomaniko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny and 7-11 dia tsiahivin’ny Heb 3.7-11 araka ny dkt tranainy grika. –Ny '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: fianianan’
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny Tompo: jereo Nom 14.21-23; Deot 1.34-35; Heb 4.3.'
    marker-yv: yv-n
  - type: text
    text: .»
