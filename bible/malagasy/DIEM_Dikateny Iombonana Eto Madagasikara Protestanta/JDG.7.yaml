document_id: JDG.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Vatan-dehilahy telonjato no voafantina hiaraka amin’i Gidehôna
  - type: text
    content: Vao maraina be i Gidehôna, izay nantsoina koa hoe Jerobahala, no niainga niaraka tamin’ny tafiny manontolo ka nandeha nitoby teo akaikin’i Haîna-Harôda. Ny tobin’ny Midianita kosa dia terỳ avaratra, teo amin’ny lemaka anilan’ny havoana Môre
  - type: note
    content: 'Jerobahala: jereo 6.32. I Haîna-Harôda, izany hoe loharano fangovitana, dia eo atsinanan’ny lemak’i Jizrehela. Ny havoana Môre dia eo atsimon’ny tendrombohitra Tabôra.'
  - type: text
    content: .
  '10':
  - type: text
    content: 'Kanefa raha matahotra ny hanafika ny toby ianao, dia ento midina miaraka aminao aloha i Porà mpanomponao. '
  '11':
  - type: text
    content: Ho renao any izay ambaran’ny olona, dia hanana herimpo hanafika ianao.
  - type: text
    content: 'Dia nidina niaraka tamin’i Porà mpanompony i Gidehôna hatreo amin’ny mpiambina lohalaharana eo amin’ny toby. '
  '12':
  - type: text
    content: 'Ary ny Midianita sy ny Hamalekita ary ireo mpifindrafindra lasy avy any atsinanana dia niparitaka teny amin’ny lemaka fa marobe tahaka ny valala; ny ramevany dia tsy hita isa fa tahaka ny fasika eny amoron-dranomasina. '
  '13':
  - type: text
    content: 'Ary fony tonga teo amin’ny toby i Gidehôna, dia nisy lehilahy iray nitantara ny nofiny tamin’ny namany hoe:'
  - type: text
    content: –Nanonofy aho, ka hitako fa nisy mofo ôrza iray nikodiadia namaky ny tobintsika Midianita; nahavoadòna tranolay anankiray izany ka nampiongana azy hivadika ambony ambany
  - type: note
    content: Ny mofo ôrza dia manondro ny Israelita izay mpamboly, ary ny tranolay dia manondro ny Midianita izay mpifindrafindra lasy.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Fa namaly azy ilay namany ka nanao hoe:'
  - type: text
    content: –Tsy zavatra hafa no asehon’izany fa ny sabatr’i Gidehôna, ilay Israelita zanakalahin’i Jôasy. Efa natolotr’Andriamanitra eo an-tanany isika miaraka amin’ny toby manontolo.
  '15':
  - type: text
    content: 'Rehefa avy nandre ny fitantarana ny nofy sy ny heviny teo i Gidehôna, dia niankohoka hisaotra an’Andriamanitra. Ary niverina tany amin’ny tobin’ny Israelita izy ka niantso hoe:'
  - type: text
    content: –Mitsangàna ianareo fa efa natolotry ny TOMPO eo an-tanantsika ny tobin’ny Midianita.
  - type: heading
    content: Nitsoaka niverin-dalana ny Midianita
  '16':
  - type: text
    content: 'Nozarain’i Gidehôna ho antokony telo ireo telonjato lahy, ka samy nomeny trompetra iray sy siny foana iray ary fanilo iray avy isan-dahy ka hapetraka ao anaty siny. '
  '17':
  - type: text
    content: 'Dia nanome baiko ireo izy hoe:'
  - type: text
    content: '–Mijere ahy ianareo, ka izay ataoko no ataovy raha vao tonga eo an-tsisin’ny toby aho. '
  '18':
  - type: text
    content: 'Raha mitsoka trompetra ny tenako sy ny olona miaraka amiko, dia mba mitsofa trompetra manodidina ny toby koa ka miantsoantsoa hoe: «Ho an’ny TOMPO sy ho an’i Gidehôna!»'
  '19':
  - type: text
    content: 'Ary nony efa madiva hisasaka ny alina, dia tonga teo an-tsisin’ny toby i Gidehôna sy ny antokon’olona niaraka taminy. Vao avy nosoloina ny mpiambina tamin’izay. Nitsoka trompetra ry i Gidehôna sady namaky ny siny nentiny. '
  '2':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Gidehôna:'
  - type: text
    content: '–Maro loatra ny tafika miaraka aminao ka tsy hatolotro eo an-tanany ny Midianita, fandrao hirehareha amiko ny Israelita ka hanao hoe: «Ny herinay ihany no namonjy anay». '
  '20':
  - type: text
    content: 'Dia nanao toy izany koa ireo antokony roa hafa. Samy nihazona ny fanilo tamin’ny tanany havia izy rehetra ary nitana ny trompetra tamin’ny tanany havanana hitsofany azy; dia niantsoantso izy hoe: «Tafiho amin’izay, ho an’ny TOMPO sy ho an’i Gidehôna!»'
  '21':
  - type: text
    content: 'Samy nijoro teo amin’ny toerany manodidina ny toby avy izy rehetra. Fa tao anatin’ny toby kosa dia nihazakazaka ny miaramila rehetra sady niantsoantso sy nandositra. '
  '22':
  - type: text
    content: Ary raha nitsoka trompetra ireo telonjato lahy, dia nampifamonoan’ny TOMPO tamin’ny sabatra ny samy Midianita eran’ny toby manontolo. Ary izay sisa tsy maty dia nandositra hatrany Bety-Sità, an-dalana ho any Tseredà, sy hatrany an-tsisin’i Abela-Mehôlà, akaikin’i Tabata
  - type: note
    content: I Tseredà dia tanàna tsy fantatra mazava ny misy azy; i Abela-Mehôlà dia tanàna teo andrefan’i Jôrdàna; ary i Tabata dia teo atsinanan’i Jôrdàna; araka izany koa angamba i Bety-Sità.
  - type: text
    content: .
  '23':
  - type: text
    content: 'Dia novorina ny vatan-dehilahy israelita avy amin’ny foko naftalita sy i aserita ary koa avy amin’ny foko manasita manontolo ka nanenjika ny Midianita. '
  '24':
  - type: text
    content: 'Ary nandefa iraka nankany amin’ny faritra manontolo be tendrombohitra any Efraîma i Gidehôna hilaza hoe:'
  - type: text
    content: –Midîna ianareo hisakana ny Midianita ka mialohà azy hibahana ny toerana fitàna ny ony Jôrdàna hatrany Bety-Barà.
  - type: text
    content: 'Dia nivory ny vatan-dehilahy efraîmita ka nidina nibahana ny toerana fitàna ny ony Jôrdàna hatrany Bety-Barà. '
  '25':
  - type: text
    content: Nosamboriny ireo lehibe midianita roa lahy, dia i Hôreba sy i Zeeba, ka i Hôreba novonoiny tao amin’ny vatolampin’i Hôreba ary i Zeeba kosa novonoiny tao amin’ny famiazam-boalobok’i Zeeba. Avy eo dia mbola nanenjika ny Midianita ihany izy. Ary ny lohan’i Hôreba sy i Zeeba dia avy teny atsinanan’i Jôrdàna no nentiny tany amin’i Gidehôna.
  '3':
  - type: text
    content: 'Koa izao ankehitriny izao dia ambarao eo anatrehan’ny io tafika io hoe: «Aoka izay rehetra mangovitra'
  - type: note
    content: 'mangovitra: tsilalaon-teny momba ny hoe Harôda, jereo 7.1 sy nta.'
  - type: text
    content: ' noho ny tahotra mba hody any an-tranony!»'
  - type: text
    content: 'Dia nanaovan’i Gidehôna fifantenana ny tafiny; ka andiany roapolo tamin’ireo no niverina nody fa andiany folo sisa nijanona. '
  '4':
  - type: text
    content: 'Nefa hoy indray ny TOMPO tamin’i Gidehôna:'
  - type: text
    content: –Mbola marobe ihany io tafika io, koa ampidino ho eo amoron-drano izy fa eo no hifantenako ho anao. Holazaiko aminao tsirairay izay tokony handeha hiaraka aminao sy izay tsy tokony handeha.
  '5':
  - type: text
    content: 'Dia nampidinin’i Gidehôna hankeo amoron-drano ny tafiny; ary hoy ny TOMPO taminy:'
  - type: text
    content: –Izay rehetra milelaka ny rano amin’ny lelany toy ny fanaon’ny alika, dia avaho amin’ireo rehetra mandohalika hisotro kosa.
  '6':
  - type: text
    content: 'Dia nisy telonjato ny lehilahy nandraoka rano tamin’ny tanany ho amin’ny vavany ka nilelaka azy, fa ny sisa rehetra kosa nandohalika hisotro. '
  '7':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Gidehôna:'
  - type: text
    content: –Ireo telonjato lahy izay nilelaka rano ireo no hamonjeko ny Israelita ka hanolorako ny Midianita eo an-tananao. Ary ny amin’ireo sisa kosa dia aoka samy hody any amin’ny fonenany avy izy!
  '8':
  - type: text
    content: Koa telonjato lahy ihany no notazonin’i Gidehôna hiaraka aminy fa ny Israelita hafa rehetra nalefany hody any amin’ny fonenany avy; saingy notazonina kosa ny vatsy sy ny trompetran’ireo nandeha.
  - type: text
    content: Ny tobin’ny Midianita dia terỳ ambany kokoa tao amin’ny lemaka.
  - type: heading
    content: Fambara fandresena mialoha
  '9':
  - type: text
    content: 'Tamin’io alina io dia hoy ny TOMPO tamin’i Gidehôna:'
  - type: text
    content: '–Mitsangàna ka midîna ao an-tobin’ny Midianita, fa efa natolotro eo an-tananao io. '
