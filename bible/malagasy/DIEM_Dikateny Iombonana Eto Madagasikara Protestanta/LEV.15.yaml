document_id: LEV.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahalotoana mpahavoa ny lehilahy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’i Mosesy sy i Aharôna ny TOMPO '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mahakasika zavatra natao teo ambanin-dralehilahy io dia haloto mandra-paharivan’ny andro; izay mitondra izany zavatra izany kosa dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola tsy nanasa tanana ilay lehilahy mitsika no sendra mahakasika olona, dia hanasa fitafiana sy handro io olona io sady haloto mandra-paharivan’ny andro. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha siny tanimanga na zinga hazo no voakasiky ny lehilahy mitsika, dia hovakîna ny siny tanimanga ary hosasana kosa ny zinga hazo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Rehefa sitrana amin’izany fitsihana izany ralehilahy, dia miandry fito andro izy vao hatao ny fombam-pivavahana fanadiovana azy; hanasa fitafiana sy handro amin’ny ranon-doharano izy, dia hadio. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’ny andro fahavalo, dia hitondra domohina roa na voromahailala roa izy ka hankeo anatrehan’ny TOMPO, eo anoloan’ny varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ', ary hanome ireo vorona ireo amin’ny mpisorona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hanolotra ireo ny mpisorona; ka ny anankiray hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' fanalana ny ota, ary ny anankiray hatao sorona dorana manontolo. Dia eo anatrehan’ny TOMPO no hanaovan’ny mpisorona ho an-dralehilahy ny fombam-pivavahana fanadiovana azy noho ny fitsihany.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha misy lehilahy mandefa lahinaina tsy nahy amin’ny alina, dia hampandro ny tenany manontolo izy sady haloto mandra-paharivan’ny andro. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hosasana koa izay fitafiany sy firakotra hoditra voapentina sady haloto mandra-paharivan’ny andro.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Raha misy vehivavy niray tamin-dehilahy, dia samy handro izy roa sady haloto mandra-paharivan’ny andro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahalotoana mpahavoa ny vehivavy
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha misy vehivavy mararin’ny fadimbolany ka voan’ny fitsihan-dra avy amin’ny taovam-pivaviana, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: haloto
    - type: text
      text: ' izy mandritra ny fito andro. Izay olona mahakasika azy dia haloto mandra-paharivan’ny andro. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hamepetra ny Israelita hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izay lehilahy voan’ny aretina misy fitsihana eo amin’ny taovam-pilahiana, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: haloto
    - type: text
      text: 'n’izany fitsihana izany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay farafara andrian-dravehivavy io sy zavatra ipetrahany mandritra ny fadimbolany, dia haloto avokoa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay olona mikasika io farafara nandriany io na ny toerana nipetrahany dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nisy zavatra tavela teo amin’ny farafara nandriany na teo amin’ny toerana nipetrahany ka voakasik’olona, dia haloto mandra-paharivan’ny andro io olona io. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy lehilahy miray amin-dravehivavy mandritra izany fadimbolany izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 18.19; 20.18.
      marker-yv: yv-n
    - type: text
      text: ', dia itsihan’ny rany izy ka haloto mandritra ny fito andro; ary izay farafara handrian’io lehilahy io dia haloto koa.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha misy vehivavy marary mitsi-dra mandritra ny andro maro ivelan’ny fadimbolany, na raha misy vehivavy mararin’ny fadimbolany ka mbola mitsika ra ankoatran’ny fotoana fadimbolany, dia haloto izy mandritra ny andro aharetan’ny fitsihana, toy ny amin’ny fadimbolany ihany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny farafara izay andrian’io vehivavy io sy ny toerana izay ipetrahany dia haloto, tahaka ny amin’ny fadimbolany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay olona mahakasika ny farafara nandriany na toerana nipetrahany dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Rehefa sitrana amin’ny fitsihany ravehivavy, dia hiandry fito andro izy vao hadio indray. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny andro fahavalo, dia haka domohina roa na voromahailala roa izy ka hitondra ireo ho amin’ny mpisorona, eo anoloan’ny varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na fitsihana mivoaka ivelany na fitsihana mihandrona anaty, dia samy mahatonga azy maloto. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hanolotra ireo ny mpisorona, ka ny anankiray hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' fanalana ny ota, ary ny anankiray hatao sorona dorana manontolo. Dia eo anatrehan’ny TOMPO no hataon’ny mpisorona ho an-dravehivavy ny fombam-pivavahana fanadiovana azy noho ny fitsihany nahaloto azy.»'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mbola niteny tamin’i Mosesy sy i Aharôna indray ny TOMPO nanao hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hasainareo hanalavitra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' ny Israelita rehefa maloto ara-pivavahana, sao ho faty izy ireo noho ny fandotoany ny tranolay fonenako izay eo aminy.»'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo avy no fepetra ny amin’ny lehilahy voan’ny aretina mitsika na mandefa lahinaina tsy nahy ka voaloton’izany, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sy ny amin’ny vehivavy mararin’ny fadimbolany, ary ny amin’ny lehilahy miray amina vehivavy maloto ara-pivavahana.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maloto avokoa ny farafara andrian’io lehilahy io ary maloto avokoa ny zavatra ipetrahany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay olona mikasika io farafara nandriany io dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mipetraka amina zavatra nipetrahan’ilay lehilahy mitsika dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mahakasika ny tenan’ilay lehilahy mitsika dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona madio ara-pivavahana, kanefa nisy lehilahy mitsika nandrora taminy haneso azy, dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haloto izay lasely itaingenan’io lehilahy mitsika io. '
