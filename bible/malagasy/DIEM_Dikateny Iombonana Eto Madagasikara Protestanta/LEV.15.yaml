document_id: LEV.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahalotoana mpahavoa ny lehilahy
  - type: text
    content: 'Dia niteny tamin’i Mosesy sy i Aharôna ny TOMPO '
  '10':
  - type: text
    content: 'Izay mahakasika zavatra natao teo ambanin-dralehilahy io dia haloto mandra-paharivan’ny andro; izay mitondra izany zavatra izany kosa dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '11':
  - type: text
    content: 'Raha mbola tsy nanasa tanana ilay lehilahy mitsika no sendra mahakasika olona, dia hanasa fitafiana sy handro io olona io sady haloto mandra-paharivan’ny andro. '
  '12':
  - type: text
    content: Raha siny tanimanga na zinga hazo no voakasiky ny lehilahy mitsika, dia hovakîna ny siny tanimanga ary hosasana kosa ny zinga hazo.
  '13':
  - type: text
    content: '«Rehefa sitrana amin’izany fitsihana izany ralehilahy, dia miandry fito andro izy vao hatao ny fombam-pivavahana fanadiovana azy; hanasa fitafiana sy handro amin’ny ranon-doharano izy, dia hadio. '
  '14':
  - type: text
    content: 'Ary amin’ny andro fahavalo, dia hitondra domohina roa na voromahailala roa izy ka hankeo anatrehan’ny TOMPO, eo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', ary hanome ireo vorona ireo amin’ny mpisorona. '
  '15':
  - type: text
    content: 'Dia hanolotra ireo ny mpisorona; ka ny anankiray hatao '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota, ary ny anankiray hatao sorona dorana manontolo. Dia eo anatrehan’ny TOMPO no hanaovan’ny mpisorona ho an-dralehilahy ny fombam-pivavahana fanadiovana azy noho ny fitsihany.'
  '16':
  - type: text
    content: '«Raha misy lehilahy mandefa lahinaina tsy nahy amin’ny alina, dia hampandro ny tenany manontolo izy sady haloto mandra-paharivan’ny andro. '
  '17':
  - type: text
    content: Hosasana koa izay fitafiany sy firakotra hoditra voapentina sady haloto mandra-paharivan’ny andro.
  '18':
  - type: text
    content: «Raha misy vehivavy niray tamin-dehilahy, dia samy handro izy roa sady haloto mandra-paharivan’ny andro.
  - type: heading
    content: Fahalotoana mpahavoa ny vehivavy
  '19':
  - type: text
    content: '«Raha misy vehivavy mararin’ny fadimbolany ka voan’ny fitsihan-dra avy amin’ny taovam-pivaviana, dia '
  - type: text
    content: haloto
  - type: text
    content: ' izy mandritra ny fito andro. Izay olona mahakasika azy dia haloto mandra-paharivan’ny andro. '
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Izay lehilahy voan’ny aretina misy fitsihana eo amin’ny taovam-pilahiana, dia '
  - type: text
    content: haloto
  - type: text
    content: 'n’izany fitsihana izany. '
  '20':
  - type: text
    content: 'Izay farafara andrian-dravehivavy io sy zavatra ipetrahany mandritra ny fadimbolany, dia haloto avokoa. '
  '21':
  - type: text
    content: 'Izay olona mikasika io farafara nandriany io na ny toerana nipetrahany dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '23':
  - type: text
    content: 'Raha nisy zavatra tavela teo amin’ny farafara nandriany na teo amin’ny toerana nipetrahany ka voakasik’olona, dia haloto mandra-paharivan’ny andro io olona io. '
  '24':
  - type: text
    content: Raha misy lehilahy miray amin-dravehivavy mandritra izany fadimbolany izany
  - type: note
    content: Jereo 18.19; 20.18.
  - type: text
    content: ', dia itsihan’ny rany izy ka haloto mandritra ny fito andro; ary izay farafara handrian’io lehilahy io dia haloto koa.'
  '25':
  - type: text
    content: '«Raha misy vehivavy marary mitsi-dra mandritra ny andro maro ivelan’ny fadimbolany, na raha misy vehivavy mararin’ny fadimbolany ka mbola mitsika ra ankoatran’ny fotoana fadimbolany, dia haloto izy mandritra ny andro aharetan’ny fitsihana, toy ny amin’ny fadimbolany ihany. '
  '26':
  - type: text
    content: 'Ny farafara izay andrian’io vehivavy io sy ny toerana izay ipetrahany dia haloto, tahaka ny amin’ny fadimbolany. '
  '27':
  - type: text
    content: Izay olona mahakasika ny farafara nandriany na toerana nipetrahany dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro.
  '28':
  - type: text
    content: '«Rehefa sitrana amin’ny fitsihany ravehivavy, dia hiandry fito andro izy vao hadio indray. '
  '29':
  - type: text
    content: 'Amin’ny andro fahavalo, dia haka domohina roa na voromahailala roa izy ka hitondra ireo ho amin’ny mpisorona, eo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Na fitsihana mivoaka ivelany na fitsihana mihandrona anaty, dia samy mahatonga azy maloto. '
  '30':
  - type: text
    content: 'Dia hanolotra ireo ny mpisorona, ka ny anankiray hatao '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota, ary ny anankiray hatao sorona dorana manontolo. Dia eo anatrehan’ny TOMPO no hataon’ny mpisorona ho an-dravehivavy ny fombam-pivavahana fanadiovana azy noho ny fitsihany nahaloto azy.»'
  '31':
  - type: text
    content: 'Dia mbola niteny tamin’i Mosesy sy i Aharôna indray ny TOMPO nanao hoe:'
  - type: text
    content: '«Hasainareo hanalavitra ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' ny Israelita rehefa maloto ara-pivavahana, sao ho faty izy ireo noho ny fandotoany ny tranolay fonenako izay eo aminy.»'
  '32':
  - type: text
    content: 'Ireo avy no fepetra ny amin’ny lehilahy voan’ny aretina mitsika na mandefa lahinaina tsy nahy ka voaloton’izany, '
  '33':
  - type: text
    content: sy ny amin’ny vehivavy mararin’ny fadimbolany, ary ny amin’ny lehilahy miray amina vehivavy maloto ara-pivavahana.
  '4':
  - type: text
    content: 'Maloto avokoa ny farafara andrian’io lehilahy io ary maloto avokoa ny zavatra ipetrahany. '
  '5':
  - type: text
    content: 'Izay olona mikasika io farafara nandriany io dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '6':
  - type: text
    content: 'Izay mipetraka amina zavatra nipetrahan’ilay lehilahy mitsika dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '7':
  - type: text
    content: 'Izay mahakasika ny tenan’ilay lehilahy mitsika dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '8':
  - type: text
    content: 'Ny olona madio ara-pivavahana, kanefa nisy lehilahy mitsika nandrora taminy haneso azy, dia hanasa fitafiana sy handro sady haloto mandra-paharivan’ny andro. '
  '9':
  - type: text
    content: 'Haloto izay lasely itaingenan’io lehilahy mitsika io. '
