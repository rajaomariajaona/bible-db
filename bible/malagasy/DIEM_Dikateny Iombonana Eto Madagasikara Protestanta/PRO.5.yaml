document_id: PRO.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana amin’ny vehivavy hafa
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Anaka, tandremonao ny tenim-pahendreko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary anongilano sofina ny tenim-pahalalako,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ka vahiny no hivoky amin’ny fanananao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: olon-kafa no hitavana amin’ny vokatry ny asanao;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: dia hitoloko ianao amin’ny farany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mihaosa ny tenanao ama-nofonao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia iny ianao fa hilaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nahoana re no nankahala famaizana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy naniratsira fananarana,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ka tsy nihaino ny tenin’ireo mpanabe ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nanongilan-tsofina tamin’ireo mpampianatra ahy?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Efa saiky rembin’ny faharatsiana isan-karazany aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary saiky voailiky ny fiangonana sy ny fiaraha-monina.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tiavo ilay vadinao hatrizay
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny vadinao dia tahaka ny loharano madio
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy toy ny fantsakana ho anao; koa misotroa aminy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa aza avela hikoriana sy hipariaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny an-dalambe fotsiny ny ranony.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Aoka ho anao samirery izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aza ikambanana amin-kafa!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hotahina anie izany loharano madio izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay vadinao hatry ny fahatanoranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mifalia aminy mandrakariva.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa toy ny dieravavy mahatehotia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy toy ny gazela mahafinaritra ny vadinao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahafeno haravoana anao anie ny hatsaram-bikany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahasambatra anao mandrakariva ny fitiavany!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: mba hitandroanao ny fisainana mazava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mba hitenenanao amim-pahaizana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Koa nahoana ianao, anaka, no ho raiki-pitia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay vehivavy vadin’olon-kafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manolo-tena hanafosafo azy?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa izay toetran’ny lehilahy tsirairay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia eo imason’ny TOMPO hatrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dinihiny avokoa izay izorany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny heloky ny olon-dratsy dia mamandri-tena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny fahotany ihany no maningotra azy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ho fatin’ny tsy fahaiza-mifehy tena izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho very noho ny hadalàny mihoa-pampana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eny, mamy toy ny tantely avy amin’ny tohotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny firesaky ny vehivavy ratsy fitondrantena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary malama noho ny menaka aza ny fiteniny.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nefa ny farany mafaitra toy ny hazo mangidy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandratra hoatra ny sabatra roa lela.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa midina ho amin’ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fizotran’izany vehivavy izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miafara any amin’ny toeran’ny maty ny diany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny and 3–5, jereo koa 2.16; 7.6-27, 22.14; Kôh 7.26.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsy manaraka ny lalana ho amin’ny fiainana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa diso lalana tsy mahafantatra izay alehany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Koa ankehitriny, anaka, henoinao Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza miala amin’ny teniko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Halaviro ny lalanao ny vehivavy toy izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza manakaiky ny tokonam-baravarany,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: fandrao homeny ny hafa ny voninahitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho voagejan’izay lehilahy lozabe ny taonanao.
