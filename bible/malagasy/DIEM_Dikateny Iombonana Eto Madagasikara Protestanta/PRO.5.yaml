document_id: PRO.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana amin’ny vehivavy hafa
  - type: text
    content: Anaka, tandremonao ny tenim-pahendreko
  - type: text
    content: ary anongilano sofina ny tenim-pahalalako,
  '10':
  - type: text
    content: Ka vahiny no hivoky amin’ny fanananao,
  - type: text
    content: olon-kafa no hitavana amin’ny vokatry ny asanao;
  '11':
  - type: text
    content: dia hitoloko ianao amin’ny farany,
  - type: text
    content: rehefa mihaosa ny tenanao ama-nofonao.
  '12':
  - type: text
    content: 'Dia iny ianao fa hilaza hoe:'
  - type: text
    content: «Nahoana re no nankahala famaizana aho
  - type: text
    content: sy naniratsira fananarana,
  '13':
  - type: text
    content: ka tsy nihaino ny tenin’ireo mpanabe ahy
  - type: text
    content: ary tsy nanongilan-tsofina tamin’ireo mpampianatra ahy?
  '14':
  - type: text
    content: Efa saiky rembin’ny faharatsiana isan-karazany aho
  - type: text
    content: ary saiky voailiky ny fiangonana sy ny fiaraha-monina.»
  - type: heading
    content: Tiavo ilay vadinao hatrizay
  '15':
  - type: text
    content: Ny vadinao dia tahaka ny loharano madio
  - type: text
    content: sy toy ny fantsakana ho anao; koa misotroa aminy.
  '16':
  - type: text
    content: Fa aza avela hikoriana sy hipariaka
  - type: text
    content: eny an-dalambe fotsiny ny ranony.
  '17':
  - type: text
    content: Aoka ho anao samirery izany
  - type: text
    content: fa aza ikambanana amin-kafa!
  '18':
  - type: text
    content: Hotahina anie izany loharano madio izany,
  - type: text
    content: dia ilay vadinao hatry ny fahatanoranao,
  - type: text
    content: ka mifalia aminy mandrakariva.
  '19':
  - type: text
    content: Fa toy ny dieravavy mahatehotia
  - type: text
    content: sy toy ny gazela mahafinaritra ny vadinao.
  - type: text
    content: Hahafeno haravoana anao anie ny hatsaram-bikany
  - type: text
    content: ary hahasambatra anao mandrakariva ny fitiavany!
  '2':
  - type: text
    content: mba hitandroanao ny fisainana mazava
  - type: text
    content: ary mba hitenenanao amim-pahaizana.
  '20':
  - type: text
    content: Koa nahoana ianao, anaka, no ho raiki-pitia
  - type: text
    content: amin’izay vehivavy vadin’olon-kafa
  - type: text
    content: ka manolo-tena hanafosafo azy?
  '21':
  - type: text
    content: Fa izay toetran’ny lehilahy tsirairay
  - type: text
    content: dia eo imason’ny TOMPO hatrany
  - type: text
    content: ka dinihiny avokoa izay izorany.
  '22':
  - type: text
    content: Ny heloky ny olon-dratsy dia mamandri-tena,
  - type: text
    content: ka ny fahotany ihany no maningotra azy.
  '23':
  - type: text
    content: Ho fatin’ny tsy fahaiza-mifehy tena izy,
  - type: text
    content: ka ho very noho ny hadalàny mihoa-pampana.
  '3':
  - type: text
    content: Eny, mamy toy ny tantely avy amin’ny tohotra
  - type: text
    content: ny firesaky ny vehivavy ratsy fitondrantena;
  - type: text
    content: ary malama noho ny menaka aza ny fiteniny.
  '4':
  - type: text
    content: Nefa ny farany mafaitra toy ny hazo mangidy
  - type: text
    content: ary mandratra hoatra ny sabatra roa lela.
  '5':
  - type: text
    content: Fa midina ho amin’ny fahafatesana
  - type: text
    content: ny fizotran’izany vehivavy izany;
  - type: text
    content: ary miafara any amin’ny toeran’ny maty ny diany
  - type: note
    content: Momba ny and 3–5, jereo koa 2.16; 7.6-27, 22.14; Kôh 7.26.
  - type: text
    content: .
  '6':
  - type: text
    content: Tsy manaraka ny lalana ho amin’ny fiainana izy
  - type: text
    content: fa diso lalana tsy mahafantatra izay alehany.
  '7':
  - type: text
    content: Koa ankehitriny, anaka, henoinao Aho.
  - type: text
    content: Aza miala amin’ny teniko.
  '8':
  - type: text
    content: Halaviro ny lalanao ny vehivavy toy izany
  - type: text
    content: ary aza manakaiky ny tokonam-baravarany,
  '9':
  - type: text
    content: fandrao homeny ny hafa ny voninahitrao
  - type: text
    content: ary ho voagejan’izay lehilahy lozabe ny taonanao.
