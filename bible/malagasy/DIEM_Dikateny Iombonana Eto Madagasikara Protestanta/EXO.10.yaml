document_id: EXO.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza fahavalo: ny valala'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mankanesa ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', fa Izaho no nanamafy fo azy sy ireo tandapany mba hahazoako manao ireo zava-mahagaga rehetra eo anivony. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary mba hahazoanao mitantara amin’ny zanaka aman-jafinao ny nampijaliako ny Ejiptianina ka nanatanterahako ireo zava-mahagaga tao amin’ny taniny. Ho fantatrareo amin’izay fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nankany amin’ny Farao i Mosesy sy i Aharôna ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny TOMPO Andriamanitry ny Hebreo dia manontany anao hoe: «Mandrapahoviana no handavanao tsy hanetry tena eo anatrehako? Alefaso handeha ny vahoakako mba hanao fanompoam-pivavahana amiko! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha mandà ianao, dia handefasako valala ao amin’ny faritaninao rahampitso. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ho rakotry ny valala ny tany ka tsy ho hita intsony. Hohaniny ny voly sisa tsy voan’ny havandra, ary tsy hasiany miangana ny hazo maniry rehetra any an-tsaha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 9.32.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ho feno valala ny lapanao sy ny tranon’ny mpanomponao mbamin’ny an’ny Ejiptianina rehetra. Loza tsy mbola fahita ny toy izany hatramin’ny andron’ny razanao ka mandraka androany».
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia niala teo anatrehan’ny Farao i Mosesy ka lasa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ireo mpanompony tamin’ny Farao:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mandra-pahoviana moa no mbola hamandrika antsika ilehiny? Alefaso handeha hanao fanompoam-pivavahana amin’ny TOMPO Andriamaniny any ny lehilahy israelita: Mbola tsy fantatrao ihany ve fa simba i Ejipta?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa naverina teo amin’ny Farao indray i Mosesy sy i Aharôna ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana manao fanompoam-pivavahana amin’ny TOMPO Andriamanitrareo, nefa iza sy iza avy moa no handeha aminareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izahay rehetra no handeha, na antitra na tanora, na lahy na vavy, miaraka amin’ny ondry aman’osy ary ny ombinay, satria hanao fety ho an’ny TOMPO izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Namaly azy tamin’ny rabiraby kosa ny Farao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka homba anareo anie ny TOMPO, raha izaho no handefa anareo sy ny fianakavianareo! Jereo fa mitady hanao ratsy ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy raikitra izany. Ianareo lehilahy no aoka handeha hanao fanompoam-pivavahana amin’ny TOMPO, fa izay ihany no tadiavinareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia noroahina hiala teo anatrehan’ny Farao izy roa lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahinjiro eo ambonin’ny tany Ejipta ny tananao mba hiantso ny valala, dia hiakatra ao Ejipta ireny ka hihinana ny zava-maniry rehetra sisan’ny havandra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nahinjitr’i Mosesy teo ambonin’i Ejipta ny tehiny, dia nampitsoka rivotra avy any atsinanana nandritra ny andro sy nandritra ny alina tao Ejipta ny TOMPO. Nony maraina dia nitondra valala ny rivotra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Niparitaka nanerana an’i Ejipta ireny ka nipetraka tamin’ny faritra rehetra. Betsaka loatra ny valala ka tsy mbola nisy toa izany na tany aloha na taty aoriana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nandrakotra ny tany manontolo ireny ka maizina ny tany. Nohanin’ny valala ny ahitra rehetra tamin’ny tany sy ny voankazo rehetra sisan’ny havandra, koa tsy nisy zava-maitso tavela intsony nanerana an’i Ejipta manontolo na tamin’ny hazo na tamin’ny zava-maniry eny an-tsaha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 14-15:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Apôk 9.2-3.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Niantso an’i Mosesy sy i Aharôna haingana ny Farao ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Diso tamin’ny TOMPO Andriamanitrareo sy taminareo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mba mamelà ny heloko amin’ity indray mandeha ity, ary mangataha amin’ny TOMPO Andriamanitrareo mba hanesorany amiko izao loza mahatsiravina izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niala teo anatrehan’ny Farao i Mosesy ary mangataka tamin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa mampitsoka rivo-mahery avy any andrefana kosa ny TOMPO, rivotra izay mitondra ny valala, ka mamerina azy ireny tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ranomasin’ny Volotara
  - type: text
    text: '; dia tsy nisy valala tavela intsony tao amin’ny tany Ejipta manontolo na iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Kanefa ny TOMPO mbola manamafy fo ny Farao ka tsy nandefa ny Israelita izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza fahasivy: ny haizina'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Atsangano manondro lanitra ny tananao hisian’ny haizina manerana an’i Ejipta, dia haizina mikitroka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Natsangan’i Mosesy manondro lanitra tokoa ny tanany, dia nisy haizina mikitroka mandritra ny telo andro teo amin’ny tany Ejipta manontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 105.28; Apôk 16.10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tsy afaka mifankahita ny Ejiptianina mandritra ny telo andro, ka tsy nisy nihetsika tao an-tranony. Fa teo amin’ny fonenan’ny Israelita rehetra kosa dia nisy mazava. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa nampiantso an’i Mosesy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' ary nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana, manaova fanompoam-pivavahana amin’ny TOMPO. Mahazo mandeha miaraka aminareo koa ny ankizy, fa ny ondry aman’osy sy ny ombinareo kosa dia tsy maintsy mijanona eto.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Namaly azy i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsia, fa ianao mihitsy no hanolotra eo an-tananay ny biby hataonay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorom-pihavanana
  - type: text
    text: ' sy sorona dorana manontolo amin’ny TOMPO Andriamanitray'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt hafa eo amin’ny and 25-26a: Dia hoy i Mosesy hoe: «Ianao angaha no hanome anay ny biby hataonay sorom-pihavanana sy sorona dorana manontolo ho an’ny Tompo Andriamanitra? Koa hoentinay ny andiam-biby fiompinay...»'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ankoatra izany, hoentinay koa ny andiam-biby fiompinay, ka tsy hisy bibinay havela na iray aza. Tsy maintsy hakanay hatao fanatitra ho an’ny TOMPO Andriamanitray koa mantsy ireo; nefa tsy fantatray hoe iza amin’ireo no hataonay fanatitra, raha tsy efa tonga any an-toerana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny TOMPO manamafy fo ny Farao ka tsy mety handefa ny Israelita izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hoy ny Farao tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana miala eto! Ary tandremo mba tsy hiseho eto amiko intsony; fa raha sanatria miverina eto amiko ianao dia maty!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia novalian’i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny àry! Araka ny efa voalazanao, dia tsy hiseho eto anatrehanao intsony aho.
