document_id: EXO.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny loza fahavalo: ny valala'
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Mankanesa ao amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ', fa Izaho no nanamafy fo azy sy ireo tandapany mba hahazoako manao ireo zava-mahagaga rehetra eo anivony. '
  '10':
  - type: text
    content: 'Namaly azy tamin’ny rabiraby kosa ny Farao hoe:'
  - type: text
    content: '–Aoka homba anareo anie ny TOMPO, raha izaho no handefa anareo sy ny fianakavianareo! Jereo fa mitady hanao ratsy ianareo. '
  '11':
  - type: text
    content: Tsy raikitra izany. Ianareo lehilahy no aoka handeha hanao fanompoam-pivavahana amin’ny TOMPO, fa izay ihany no tadiavinareo.
  - type: text
    content: Dia noroahina hiala teo anatrehan’ny Farao izy roa lahy.
  '12':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Ahinjiro eo ambonin’ny tany Ejipta ny tananao mba hiantso ny valala, dia hiakatra ao Ejipta ireny ka hihinana ny zava-maniry rehetra sisan’ny havandra.
  '13':
  - type: text
    content: 'Nahinjitr’i Mosesy teo ambonin’i Ejipta ny tehiny, dia nampitsoka rivotra avy any atsinanana nandritra ny andro sy nandritra ny alina tao Ejipta ny TOMPO. Nony maraina dia nitondra valala ny rivotra. '
  '14':
  - type: text
    content: 'Niparitaka nanerana an’i Ejipta ireny ka nipetraka tamin’ny faritra rehetra. Betsaka loatra ny valala ka tsy mbola nisy toa izany na tany aloha na taty aoriana. '
  '15':
  - type: text
    content: Nandrakotra ny tany manontolo ireny ka maizina ny tany. Nohanin’ny valala ny ahitra rehetra tamin’ny tany sy ny voankazo rehetra sisan’ny havandra, koa tsy nisy zava-maitso tavela intsony nanerana an’i Ejipta manontolo na tamin’ny hazo na tamin’ny zava-maniry eny an-tsaha
  - type: note
    content: 'And 14-15: jereo Apôk 9.2-3.'
  - type: text
    content: .
  '16':
  - type: text
    content: 'Niantso an’i Mosesy sy i Aharôna haingana ny Farao ka nanao taminy hoe:'
  - type: text
    content: '–Diso tamin’ny TOMPO Andriamanitrareo sy taminareo aho. '
  '17':
  - type: text
    content: Mba mamelà ny heloko amin’ity indray mandeha ity, ary mangataha amin’ny TOMPO Andriamanitrareo mba hanesorany amiko izao loza mahatsiravina izao.
  '18':
  - type: text
    content: 'Dia niala teo anatrehan’ny Farao i Mosesy ary mangataka tamin’ny TOMPO. '
  '19':
  - type: text
    content: 'Koa mampitsoka rivo-mahery avy any andrefana kosa ny TOMPO, rivotra izay mitondra ny valala, ka mamerina azy ireny tao amin’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: '; dia tsy nisy valala tavela intsony tao amin’ny tany Ejipta manontolo na iray aza. '
  '2':
  - type: text
    content: Ary mba hahazoanao mitantara amin’ny zanaka aman-jafinao ny nampijaliako ny Ejiptianina ka nanatanterahako ireo zava-mahagaga tao amin’ny taniny. Ho fantatrareo amin’izay fa Izaho no TOMPO.
  '20':
  - type: text
    content: Kanefa ny TOMPO mbola manamafy fo ny Farao ka tsy nandefa ny Israelita izy.
  - type: heading
    content: 'Ny loza fahasivy: ny haizina'
  '21':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Atsangano manondro lanitra ny tananao hisian’ny haizina manerana an’i Ejipta, dia haizina mikitroka.
  '22':
  - type: text
    content: Natsangan’i Mosesy manondro lanitra tokoa ny tanany, dia nisy haizina mikitroka mandritra ny telo andro teo amin’ny tany Ejipta manontolo
  - type: note
    content: Jereo Sal 105.28; Apôk 16.10.
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Tsy afaka mifankahita ny Ejiptianina mandritra ny telo andro, ka tsy nisy nihetsika tao an-tranony. Fa teo amin’ny fonenan’ny Israelita rehetra kosa dia nisy mazava. '
  '24':
  - type: text
    content: 'Koa nampiantso an’i Mosesy ny '
  - type: text
    content: Farao
  - type: text
    content: ' ary nanao taminy hoe:'
  - type: text
    content: –Mandehana, manaova fanompoam-pivavahana amin’ny TOMPO. Mahazo mandeha miaraka aminareo koa ny ankizy, fa ny ondry aman’osy sy ny ombinareo kosa dia tsy maintsy mijanona eto.
  '25':
  - type: text
    content: 'Namaly azy i Mosesy hoe:'
  - type: text
    content: '–Tsia, fa ianao mihitsy no hanolotra eo an-tananay ny biby hataonay '
  - type: text
    content: sorom-pihavanana
  - type: text
    content: ' sy sorona dorana manontolo amin’ny TOMPO Andriamanitray'
  - type: note
    content: 'Dkt hafa eo amin’ny and 25-26a: Dia hoy i Mosesy hoe: «Ianao angaha no hanome anay ny biby hataonay sorom-pihavanana sy sorona dorana manontolo ho an’ny Tompo Andriamanitra? Koa hoentinay ny andiam-biby fiompinay...»'
  - type: text
    content: '. '
  '26':
  - type: text
    content: Ankoatra izany, hoentinay koa ny andiam-biby fiompinay, ka tsy hisy bibinay havela na iray aza. Tsy maintsy hakanay hatao fanatitra ho an’ny TOMPO Andriamanitray koa mantsy ireo; nefa tsy fantatray hoe iza amin’ireo no hataonay fanatitra, raha tsy efa tonga any an-toerana.
  '27':
  - type: text
    content: 'Ary ny TOMPO manamafy fo ny Farao ka tsy mety handefa ny Israelita izy. '
  '28':
  - type: text
    content: 'Fa hoy ny Farao tamin’i Mosesy:'
  - type: text
    content: –Mandehana miala eto! Ary tandremo mba tsy hiseho eto amiko intsony; fa raha sanatria miverina eto amiko ianao dia maty!
  '29':
  - type: text
    content: 'Dia novalian’i Mosesy hoe:'
  - type: text
    content: –Eny àry! Araka ny efa voalazanao, dia tsy hiseho eto anatrehanao intsony aho.
  '3':
  - type: text
    content: 'Dia nankany amin’ny Farao i Mosesy sy i Aharôna ka nanao taminy hoe:'
  - type: text
    content: '–Ny TOMPO Andriamanitry ny Hebreo dia manontany anao hoe: «Mandrapahoviana no handavanao tsy hanetry tena eo anatrehako? Alefaso handeha ny vahoakako mba hanao fanompoam-pivavahana amiko! '
  '4':
  - type: text
    content: 'Raha mandà ianao, dia handefasako valala ao amin’ny faritaninao rahampitso. '
  '5':
  - type: text
    content: Ho rakotry ny valala ny tany ka tsy ho hita intsony. Hohaniny ny voly sisa tsy voan’ny havandra, ary tsy hasiany miangana ny hazo maniry rehetra any an-tsaha
  - type: note
    content: Jereo 9.32.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Ho feno valala ny lapanao sy ny tranon’ny mpanomponao mbamin’ny an’ny Ejiptianina rehetra. Loza tsy mbola fahita ny toy izany hatramin’ny andron’ny razanao ka mandraka androany».
  - type: text
    content: Dia niala teo anatrehan’ny Farao i Mosesy ka lasa.
  '7':
  - type: text
    content: 'Ary hoy ireo mpanompony tamin’ny Farao:'
  - type: text
    content: '–Mandra-pahoviana moa no mbola hamandrika antsika ilehiny? Alefaso handeha hanao fanompoam-pivavahana amin’ny TOMPO Andriamaniny any ny lehilahy israelita: Mbola tsy fantatrao ihany ve fa simba i Ejipta?'
  '8':
  - type: text
    content: 'Koa naverina teo amin’ny Farao indray i Mosesy sy i Aharôna ka nilazany hoe:'
  - type: text
    content: –Mandehana manao fanompoam-pivavahana amin’ny TOMPO Andriamanitrareo, nefa iza sy iza avy moa no handeha aminareo?
  '9':
  - type: text
    content: 'Dia hoy i Mosesy hoe:'
  - type: text
    content: –Izahay rehetra no handeha, na antitra na tanora, na lahy na vavy, miaraka amin’ny ondry aman’osy ary ny ombinay, satria hanao fety ho an’ny TOMPO izahay.
