document_id: EZK.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famelezana ny mpaminany sandoka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ry ilay taranak’olombelona, ijoroy ny maha-mpaminany anao mba hanohitra ireo mihambo ho mpaminany eto Israely ka maminany araka ny nahim-pony. Asaovy mihaino ny teniko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hiharan-doza ny mpaminany adala, izay manaraka fotsiny ny eritreriny fa tsy manana fahitana akory. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ry vahoaka israelita ô, toy ny amboadia mirenireny ao an-tanàna aolo ny mpaminaninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy nandeha nanamboatra ny banga tamin’ny manda ireo sady tsy nanangana manda hiarovana anareo amin’ny ady rehefa mby ny andron’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andron’ny Tompo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 7.7-14, 19; 22.21-22; 30.2-3; Jl 1.15 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa nilaza fahitana manodoka sy fanambaràna mamitaka izy, ka nanao hoe: ‹Izao no teny hentitra avy amin’ny TOMPO›; nefa Izaho TOMPO tsy naniraka azy akory! Saingy manantena ny hanamafisako ny teniny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moa tsy fahitana manodoka ve ny anareo, hoy Aho? Moa tsy fanambaràna mamitaka ve no ataonareo? Mihambo hilaza teny hentitra avy amin’ny TOMPO ianareo, kanefa Izaho tsy niteny taminareo akory!› '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Noho izany, izao no lazain’ny Tompo ANDRIANANAHARY: ‹Satria nilaza teny manodoka sy fahitana mamitaka ianareo, dia ho avy hamely anareo Aho. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.›'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Ny heriko no hamely ny mpaminany izay milaza fahitana manodoka sy fanambaràna mamitaka. Tsy hanana anjara toerana ao amin’ny filankevitry ny vahoakako izy sady tsy ho voasoratra ao amin’ny lisitry ny vahoaka israelita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Hez 2; Neh 7.5-67.
    marker-yv: yv-n
  - type: text
    text: ' ka tsy hiverina any amin’ny taniny. Amin’izay dia hoekeny fa Izaho no Tompo ANDRIANANAHARY.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Mamitaka ny vahoakako ny mpaminany amin’ny filazana fa fiadanana no manjaka nefa tsy misy fiadanana akory. Manangana rindrina ny vahoakako fa ireo kosa mandalotra azy amin’ny fotaka. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa lazao amin’ireo mpandalotra ireo hoe: ‹Hirodana ny rindrina! Fa ho avy ny ora-mikija, hiraraka ny havandra vaventy, ary hifofofofo ny rivo-mahery. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa mirodana ny rindrina, dia hanontaniana anareo ny nilana ny fotaka nandaloranareo azy.› '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Noho izany, izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hampifofofofo rivo-mahery Aho noho ny hatezerako; handefa ora-mikija Aho noho ny fahavinirako ary handraraka ny havandra vaventy mpandrava Aho noho ny fisafoakako. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Horavako ny rindrina izay nolalorinareo fotaka ka hazerako amin’ny tany, dia hiseho mbamin’ny fototra. Hirodana izy ka ho tototra ao ambaniny ianareo. Amin’izay dia hoekenareo fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hanamparako ny hatezerako ny rindrina sy izay nandalotra fotaka azy, dia holazaina aminareo hoe: ‹Tsy misy intsony ny rindrina. Tsy misy intsony ny mpandalotra azy, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: dia ireo mpaminany israelita izay maminany ny hoavin’i Jerosalema sy manam-pahitana manambara fiadanana ho azy nefa tsy misy fiadanana akory
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny and 10–16, jereo 22.28; Jer 6.12-15; 8.10-12.
    marker-yv: yv-n
  - type: text
    text: . Teny hentitra avy amiko Tompo ANDRIANANAHARY izany›. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famelezana ny mpimasy
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Ary ianao, ry ilay taranak’olombelona, handrino ireo vehivavy israelita izay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maminany
  - type: text
    text: ' araka ny nahim-pony ka ambarao ny hamelezana azy; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hiharan-doza ianareo izay manjaitra fehitanana ho an’ny hato-tanana rehetra, ary manjaitra fehivozona ho an’ny olona isan-karazany mba hangejanareo ny ainy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Manjaitra... saron-doha:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: filazana an-kolaka fomba fanao majika tsy dia fantatra loatra.
    marker-yv: yv-n
  - type: text
    text: '. Tianareo hogejaina ny ain’ny olona anisan’ny vahoakako mba hiarovana ny ainareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Manala baràka Ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Manala baràka Ahy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny majia dia noheverina ho fanehoam-paniratsirana an’Andriamanitra, ary voaheloka ho faty ny olona manao izany, jereo Lev 19.26-31; 20.27; Deot 18.10-12.
    marker-yv: yv-n
  - type: text
    text: ' eo anatrehan’ny vahoakako ianareo noho izay vary eran’ny tanana ila na izay sombimofo vitsivitsy. Raha andainganareo ny vahoakako mora fahanan-dainga, dia mahafaty izay tsy tokony ho faty ianareo ary mamelona izay tsy tokony ho velona.› '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hosimbako ny fehitanana izay angejanareo ny ain’ny hafa. Horovitiko ireny ka hoesoriko eny an-tanany, ary halefako malalaka ny aina izay nogejainareo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Horovitiko ny fehivozony, dia hoafahako amin’ny fahefànareo ny vahoakako ary tsy hogejainareo intsony; amin’izay dia hoekenareo fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny lainganareo dia nahakivy ny olo-marina tsy tiako halahelo ary nampirisika ny olon-dratsy tsy hiala amin’ny toe-dratsiny mba hamelomana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Noho izany dia tsy hisy intsony ny fahitanareo manodoka sy ny fanambarànareo mamitaka. Hoafahako amin’ny fahefànareo ny vahoakako. Amin’izay dia hoekenareo fa Izaho no TOMPO›. »
