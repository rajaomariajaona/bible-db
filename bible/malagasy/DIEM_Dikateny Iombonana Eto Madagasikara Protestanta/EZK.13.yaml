document_id: EZK.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Famelezana ny mpaminany sandoka
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: '«Mamitaka ny vahoakako ny mpaminany amin’ny filazana fa fiadanana no manjaka nefa tsy misy fiadanana akory. Manangana rindrina ny vahoakako fa ireo kosa mandalotra azy amin’ny fotaka. '
  '11':
  - type: text
    content: 'Koa lazao amin’ireo mpandalotra ireo hoe: ‹Hirodana ny rindrina! Fa ho avy ny ora-mikija, hiraraka ny havandra vaventy, ary hifofofofo ny rivo-mahery. '
  '12':
  - type: text
    content: 'Rehefa mirodana ny rindrina, dia hanontaniana anareo ny nilana ny fotaka nandaloranareo azy.› '
  '13':
  - type: text
    content: 'Noho izany, izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hampifofofofo rivo-mahery Aho noho ny hatezerako; handefa ora-mikija Aho noho ny fahavinirako ary handraraka ny havandra vaventy mpandrava Aho noho ny fisafoakako. '
  '14':
  - type: text
    content: 'Horavako ny rindrina izay nolalorinareo fotaka ka hazerako amin’ny tany, dia hiseho mbamin’ny fototra. Hirodana izy ka ho tototra ao ambaniny ianareo. Amin’izay dia hoekenareo fa Izaho no TOMPO. '
  '15':
  - type: text
    content: 'Hanamparako ny hatezerako ny rindrina sy izay nandalotra fotaka azy, dia holazaina aminareo hoe: ‹Tsy misy intsony ny rindrina. Tsy misy intsony ny mpandalotra azy, '
  '16':
  - type: text
    content: dia ireo mpaminany israelita izay maminany ny hoavin’i Jerosalema sy manam-pahitana manambara fiadanana ho azy nefa tsy misy fiadanana akory
  - type: note
    content: Momba ny and 10–16, jereo 22.28; Jer 6.12-15; 8.10-12.
  - type: text
    content: . Teny hentitra avy amiko Tompo ANDRIANANAHARY izany›. »
  - type: heading
    content: Famelezana ny mpimasy
  '17':
  - type: text
    content: '«Ary ianao, ry ilay taranak’olombelona, handrino ireo vehivavy israelita izay '
  - type: text
    content: maminany
  - type: text
    content: ' araka ny nahim-pony ka ambarao ny hamelezana azy; '
  '18':
  - type: text
    content: 'ary ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hiharan-doza ianareo izay manjaitra fehitanana ho an’ny hato-tanana rehetra, ary manjaitra fehivozona ho an’ny olona isan-karazany mba hangejanareo ny ainy'
  - type: note
    content: 'Manjaitra... saron-doha: filazana an-kolaka fomba fanao majika tsy dia fantatra loatra.'
  - type: text
    content: '. Tianareo hogejaina ny ain’ny olona anisan’ny vahoakako mba hiarovana ny ainareo. '
  '19':
  - type: text
    content: Manala baràka Ahy
  - type: note
    content: 'Manala baràka Ahy: ny majia dia noheverina ho fanehoam-paniratsirana an’Andriamanitra, ary voaheloka ho faty ny olona manao izany, jereo Lev 19.26-31; 20.27; Deot 18.10-12.'
  - type: text
    content: ' eo anatrehan’ny vahoakako ianareo noho izay vary eran’ny tanana ila na izay sombimofo vitsivitsy. Raha andainganareo ny vahoakako mora fahanan-dainga, dia mahafaty izay tsy tokony ho faty ianareo ary mamelona izay tsy tokony ho velona.› '
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, ijoroy ny maha-mpaminany anao mba hanohitra ireo mihambo ho mpaminany eto Israely ka maminany araka ny nahim-pony. Asaovy mihaino ny teniko izy. '
  '20':
  - type: text
    content: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hosimbako ny fehitanana izay angejanareo ny ain’ny hafa. Horovitiko ireny ka hoesoriko eny an-tanany, ary halefako malalaka ny aina izay nogejainareo. '
  '21':
  - type: text
    content: 'Horovitiko ny fehivozony, dia hoafahako amin’ny fahefànareo ny vahoakako ary tsy hogejainareo intsony; amin’izay dia hoekenareo fa Izaho no TOMPO. '
  '22':
  - type: text
    content: 'Ny lainganareo dia nahakivy ny olo-marina tsy tiako halahelo ary nampirisika ny olon-dratsy tsy hiala amin’ny toe-dratsiny mba hamelomana azy. '
  '23':
  - type: text
    content: Noho izany dia tsy hisy intsony ny fahitanareo manodoka sy ny fanambarànareo mamitaka. Hoafahako amin’ny fahefànareo ny vahoakako. Amin’izay dia hoekenareo fa Izaho no TOMPO›. »
  '3':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hiharan-doza ny mpaminany adala, izay manaraka fotsiny ny eritreriny fa tsy manana fahitana akory. '
  '4':
  - type: text
    content: 'Ry vahoaka israelita ô, toy ny amboadia mirenireny ao an-tanàna aolo ny mpaminaninareo. '
  '5':
  - type: text
    content: Tsy nandeha nanamboatra ny banga tamin’ny manda ireo sady tsy nanangana manda hiarovana anareo amin’ny ady rehefa mby ny andron’ny TOMPO
  - type: note
    content: 'andron’ny Tompo: ampit 7.7-14, 19; 22.21-22; 30.2-3; Jl 1.15 sy nta.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Fa nilaza fahitana manodoka sy fanambaràna mamitaka izy, ka nanao hoe: ‹Izao no teny hentitra avy amin’ny TOMPO›; nefa Izaho TOMPO tsy naniraka azy akory! Saingy manantena ny hanamafisako ny teniny izy. '
  '7':
  - type: text
    content: 'Moa tsy fahitana manodoka ve ny anareo, hoy Aho? Moa tsy fanambaràna mamitaka ve no ataonareo? Mihambo hilaza teny hentitra avy amin’ny TOMPO ianareo, kanefa Izaho tsy niteny taminareo akory!› '
  '8':
  - type: text
    content: 'Noho izany, izao no lazain’ny Tompo ANDRIANANAHARY: ‹Satria nilaza teny manodoka sy fahitana mamitaka ianareo, dia ho avy hamely anareo Aho. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.›'
  '9':
  - type: text
    content: «Ny heriko no hamely ny mpaminany izay milaza fahitana manodoka sy fanambaràna mamitaka. Tsy hanana anjara toerana ao amin’ny filankevitry ny vahoakako izy sady tsy ho voasoratra ao amin’ny lisitry ny vahoaka israelita
  - type: note
    content: Jereo Hez 2; Neh 7.5-67.
  - type: text
    content: ' ka tsy hiverina any amin’ny taniny. Amin’izay dia hoekeny fa Izaho no Tompo ANDRIANANAHARY.'
