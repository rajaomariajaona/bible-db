document_id: GAL.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aoka hifampitondra izay mavesatra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ry havana, raha misy olona sendra latsaka amin’ny hadisoana, dia aoka ianareo izay manana ny Fanahy Masina hanarina azy amim-pahalemem-panahy; ary aoka hitandrin-tena koa ianao fandrao voataona amin’ny ratsy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa dieny mbola manana andro isika, dia aoka hanao soa amin’ny olona rehetra, fa indrindra amin’ny mpianakavin’ny finoana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anatra farany sy fanaovam-beloma
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jereo amin’ny havaventin’ny soratra fa tanako mihitsy no anoratako ho anareo izao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Izay rehetra te hiseho ho tsara araka ny maha olombelona, dia ireo no manery anareo hoforana; nefa noho izao antony izao ihany: mba tsy hanenjehana azy noho ny hazofijalian’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mba tsy hanenjehana azy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny famorana dia nahatonga ny Jiosy tsy ho voaenjika teo anivon’ny fanjakana rômanina, satria neken’io fanjakana io ny fisian’ireo fitsipika aman-dalana jiosy. Ireo kristianina tsy natao famorana dia tsy manana izany fiarovana izany.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa na dia ny tenan’izy voafora aza tsy mitandrina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: '; kanefa tiany hoforana ianareo, mba hireharehany amin’ny fampiharana izany amin’ny vatanareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Raha ny amiko, dia sanatria raha mba misy hataoko rehareha afa-tsy ny hazofijalian’i Jesoa Kristy Tompontsika: fa tamin’ny alalan’ny hazofijaliany no efa maty '
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' raha ny amiko, ary izaho kosa efa maty raha ny amin’izao tontolo izao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tsy dia ny hoe maha voafora na tsy maha voafora manko no tena zavatra, fa ny maha olom-baovao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary fiadanana sy famindrampo avy amin’Andriamanitra no ao amin’izay rehetra hanaraka io fitsipika io, izany hoe ao amin’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' vahoakan’Andriamanitra.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Amin’ny ho avy, aoka tsy hisy olona hanahirana ahy intsony; fa izaho dia mitondra ny diam-pery eo amin’ny tenako noho ny maha mpanompon’i Jesoa ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny diam-pery: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo mariky ny fampijaliana niaretan’i Paoly teo amin’ny fanompoany an’i Jesoa.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Homba anareo anie, ry havana, ny fahasoavan’i Jesoa Kristy Tompontsika! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mifampitondrà izay mahavesatra, fa izany no hahatanterahanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fa izany no hahatanterahanareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ary aoka izany no hahatanterahanareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ary dia tanterahonareo araka izany.
      marker-yv: yv-n
    - type: text
      text: 'ny lalànan’i Kristy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Eny, raha misy manao ny tenany ho zavatra, kanjo tsinontsinona, dia mamita-tena izy; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fa samia mandinika ny asany avy, ka ny amin’ny tenany ihany no hahazoany mirehareha fa tsy ny amin’ny olon-kafa, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: satria samy hitondra ny anjara entany avy ny tsirairay.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aoka izay ampianarina ny tenin’Andriamanitra mba hanome ampahany amin’ny fananany rehetra ho an’izay mampianatra azy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aza mety hofitahina ianareo. Tsy azo vazivazîna Andriamanitra, fa izay afafin’ny olona ihany no hojinjainy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôb 4.8; Ohab 22.8; Hôs 8.7.
      marker-yv: yv-n
    - type: text
      text: ': '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'eny, izay mamafy ny sitraky ny maha olona mpanota, dia hijinja fahaverezana avy amin’ny maha olona mpanota; fa izay mamafy ny sitraky ny Fanahy Masina, dia hijinja fiaina-maharitra mandrakizay avy amin’ny Fanahy Masina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary aza mba ketraka amin’ny fanaovan-tsoa isika, satria hijinja amin’ny fotoanandro isika raha tsy kivy. '
