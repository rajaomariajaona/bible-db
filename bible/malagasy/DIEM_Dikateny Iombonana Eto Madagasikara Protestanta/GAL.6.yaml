document_id: GAL.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Aoka hifampitondra izay mavesatra
  - type: text
    content: 'Ry havana, raha misy olona sendra latsaka amin’ny hadisoana, dia aoka ianareo izay manana ny Fanahy Masina hanarina azy amim-pahalemem-panahy; ary aoka hitandrin-tena koa ianao fandrao voataona amin’ny ratsy. '
  '10':
  - type: text
    content: Koa dieny mbola manana andro isika, dia aoka hanao soa amin’ny olona rehetra, fa indrindra amin’ny mpianakavin’ny finoana.
  - type: heading
    content: Anatra farany sy fanaovam-beloma
  '11':
  - type: text
    content: 'Jereo amin’ny havaventin’ny soratra fa tanako mihitsy no anoratako ho anareo izao. '
  '12':
  - type: text
    content: 'Izay rehetra te hiseho ho tsara araka ny maha olombelona, dia ireo no manery anareo hoforana; nefa noho izao antony izao ihany: mba tsy hanenjehana azy noho ny hazofijalian’i '
  - type: text
    content: Kristy
  - type: note
    content: 'mba tsy hanenjehana azy: ny famorana dia nahatonga ny Jiosy tsy ho voaenjika teo anivon’ny fanjakana rômanina, satria neken’io fanjakana io ny fisian’ireo fitsipika aman-dalana jiosy. Ireo kristianina tsy natao famorana dia tsy manana izany fiarovana izany.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Fa na dia ny tenan’izy voafora aza tsy mitandrina ny '
  - type: text
    content: lalàna
  - type: text
    content: '; kanefa tiany hoforana ianareo, mba hireharehany amin’ny fampiharana izany amin’ny vatanareo. '
  '14':
  - type: text
    content: 'Raha ny amiko, dia sanatria raha mba misy hataoko rehareha afa-tsy ny hazofijalian’i Jesoa Kristy Tompontsika: fa tamin’ny alalan’ny hazofijaliany no efa maty '
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' raha ny amiko, ary izaho kosa efa maty raha ny amin’izao tontolo izao. '
  '15':
  - type: text
    content: 'Tsy dia ny hoe maha voafora na tsy maha voafora manko no tena zavatra, fa ny maha olom-baovao. '
  '16':
  - type: text
    content: 'Ary fiadanana sy famindrampo avy amin’Andriamanitra no ao amin’izay rehetra hanaraka io fitsipika io, izany hoe ao amin’ilay '
  - type: text
    content: Israely
  - type: text
    content: ' vahoakan’Andriamanitra.'
  '17':
  - type: text
    content: Amin’ny ho avy, aoka tsy hisy olona hanahirana ahy intsony; fa izaho dia mitondra ny diam-pery eo amin’ny tenako noho ny maha mpanompon’i Jesoa ahy
  - type: note
    content: 'ny diam-pery: ireo mariky ny fampijaliana niaretan’i Paoly teo amin’ny fanompoany an’i Jesoa.'
  - type: text
    content: .
  '18':
  - type: text
    content: 'Homba anareo anie, ry havana, ny fahasoavan’i Jesoa Kristy Tompontsika! '
  - type: text
    content: Amen
  - type: text
    content: .
  '2':
  - type: text
    content: Mifampitondrà izay mahavesatra, fa izany no hahatanterahanareo
  - type: note
    content: 'fa izany no hahatanterahanareo: misy stf sasany ahitana hoe ary aoka izany no hahatanterahanareo na ary dia tanterahonareo araka izany.'
  - type: text
    content: 'ny lalànan’i Kristy. '
  '3':
  - type: text
    content: 'Eny, raha misy manao ny tenany ho zavatra, kanjo tsinontsinona, dia mamita-tena izy; '
  '4':
  - type: text
    content: 'fa samia mandinika ny asany avy, ka ny amin’ny tenany ihany no hahazoany mirehareha fa tsy ny amin’ny olon-kafa, '
  '5':
  - type: text
    content: satria samy hitondra ny anjara entany avy ny tsirairay.
  '6':
  - type: text
    content: Aoka izay ampianarina ny tenin’Andriamanitra mba hanome ampahany amin’ny fananany rehetra ho an’izay mampianatra azy.
  '7':
  - type: text
    content: Aza mety hofitahina ianareo. Tsy azo vazivazîna Andriamanitra, fa izay afafin’ny olona ihany no hojinjainy
  - type: note
    content: Ampit Jôb 4.8; Ohab 22.8; Hôs 8.7.
  - type: text
    content: ': '
  '8':
  - type: text
    content: 'eny, izay mamafy ny sitraky ny maha olona mpanota, dia hijinja fahaverezana avy amin’ny maha olona mpanota; fa izay mamafy ny sitraky ny Fanahy Masina, dia hijinja fiaina-maharitra mandrakizay avy amin’ny Fanahy Masina. '
  '9':
  - type: text
    content: 'Ary aza mba ketraka amin’ny fanaovan-tsoa isika, satria hijinja amin’ny fotoanandro isika raha tsy kivy. '
