    children:
    - type: text
      text: '’i Tsefanià dia tamin’ny faramparan’ny taonjato fahafito tal. J.K. ary angamba talohan’ny an’i Habakòka. Tamin’ny fotoana izay nanambaràna azy, dia toa tsy mbola voapetrak’i Jôsià mpanjaka ilay fanitsiam-pivavahana nentiny (jereo 2 Mp 23.1-8); ary ny fanjakan’i Joda dia nandalo fotoana nampitaintaina teo amin’ny tantarany. Ny mpaminany dia mamaly ireo izay manontany raha toa ka miraharaha marina ny olona Andriamanitra ary raha Izy tokoa no mitondra ny tantara. Ambaran’ny mpaminany ny fomba maro samihafa idiran’Andriamanitra an-tsehatra: Ho avy hitsara ny mponin’i Joda sy i Jerosalema Izy (1.1–2.3), hopotehiny ireo vahoaka mpifanila amin’i Joda (2.4-15); avy eo dia hampody indray ny fiandrianan’i Jerosalema Izy rehefa hamongotra ny ratsy sy namela vahoaka tsotra sy mahantra mba hahazoana manova ny olombelona rehetra (3.1-20).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Marihin’i Tsefanià fa tsy hahita fifandraisana marina amin’Andriamanitra indray ny vahoakany raha tsy fongotra tanteraka ireo olona mitady ny tombon-tsoany alohan’ny zavatra takîn’Andriamanitra. Kanefa anehoan’i Tsefanià fitiavana manokana ireo olon-tsotra teo amin’ny tanin’i Joda (2.3; 3.12).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Araka izany, dia tsy misy hevi-baovao loatra natrangan’i Tsefanià, fa noho ny hafanàm-pony hananatra sy hampianatra ny fanolorantena tsotra, dia izay efa nambaran’i Isaià zato taona lasa taloha ihany no nanteriny sy nohamafisiny (1.14-17 ampit Is 2.12-21).
