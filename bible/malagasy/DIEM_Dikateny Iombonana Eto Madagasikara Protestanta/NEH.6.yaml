document_id: NEH.6,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ren’i Sanebalato sy i Tôbià ary i Gesema ilay Arabo mbamin’ny namany fahavalonay fa tafatsangako indray ny manda ka tsy misy banga intsony. Kanefa tamin’io fotoana io dia tsy mbola voalatsako ny lela-vavahady. '
  '10':
  - type: text
    content: 'Indray andro aho dia nankao an-tranon’i Semahià zanakalahin’i Delatà sy zafin’i Mehetabeela, satria nisy sampona tsy nahatongavany tany amiko. Ka hoy izy hoe:'
  - type: text
    content: –Ao an-
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ', ao anatin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ', no ndeha isika hihaona; ary aoka hohidintsika ny varavarana fa ho avy hamono anao ireo mpanohitra anao; eny, ho avy alina hamono anao izy.'
  '11':
  - type: text
    content: 'Fa novaliako hoe:'
  - type: text
    content: –Lehilahy toa ahy izao tsy tokony handositra. Ary olona tahaka ahy ve no hiditra ao amin’ny Toeramasina ka ho velona
  - type: note
    content: 'Ary olona... velona: Tsy mpisorona i Nehemià ka tsy mahazo miditra ao amin’ny Toeramasina (jereo Nom 18.7). –Ary olona... velona: dkt hafa Ary iza no olona tahaka ahy hiditra ao amin’ny Toeramasina mba hamonjy ny ainy?'
  - type: text
    content: '? Tsia, tsy hiditra ao aho! '
  '12':
  - type: text
    content: 'Hitako manko fa tsy Andriamanitra no naniraka an’i Semahià, fa hamitahana ahy no nilazany tamiko izany hafatra izany, satria voakaraman’i Tôbià sy i Sanebalato izy. '
  '13':
  - type: text
    content: Ny nanakaramany azy dia mba hampitahotra ahy hanarahako ny toroheviny sy hanotako, ka hahazoany miteny ratsy ahy sy manala baràka ahy.
  '14':
  - type: text
    content: «Ry Andriamanitra ô, tsarovy i Tôbià sy i Sanebalato araka izany asany izany, ary tsarovy koa i Nôhadià mpaminanivavy sy ireo mpaminany hafa izay nitady hampitahotra ahy.»
  '15':
  - type: text
    content: Ny andro faha-25, tamin’ny volana Elola
  - type: note
    content: 'Elola: volana fahenina amin’ny taona manomboka lohataona, izany hoe aogositra-septambra.'
  - type: text
    content: ', no nahavitana ny manda, izany hoe 52 andro niasana. '
  '16':
  - type: text
    content: Rehefa ren’ny fahavalonay tamin’ny firenena manodidina rehetra izany, dia raiki-tahotra ry zareo sady nahatsapa ny maha tsinontsinona azy. Ary niaiky ireo fahavalonay fa ilay Andriamanitray no nahavitana izany asa izany.
  '17':
  - type: text
    content: 'Tamin’izay ny loholona jiosy dia nampitondra taratasy maro ho any amin’i Tôbià; ary ny taratasy avy tamin’i Tôbià kosa tonga atỳ amin’ireo loholona ireo. '
  '18':
  - type: text
    content: 'Betsaka manko ny Jiosy efa nianiana niray tetika taminy, noho izy vinanton’i Sekanià zanakalahin’i Ara; ary i Jôhanàna zanakalahin’i Tôbià koa efa nanambady ny zanakavavin’i Mesolama zanakalahin’i Berekià. '
  '19':
  - type: text
    content: Nanao tsara laza an’i Tôbià teo anatrehako ry zareo sady nitatitra ny teniko tany aminy; i Tôbià kosa nampitondra taratasy hampitahotra ahy.
  '2':
  - type: text
    content: 'Koa nandefa iraka hankatỳ amiko i Sanebalato sy i Gesema hilaza hoe:'
  - type: text
    content: –Tongava mba hihaona ao Kefirîma
  - type: note
    content: 'Kefirîma: tanàna tsy fantatra ny misy azy; Onao; tanàna akaikin’ny Ranomasina Mediteranea, eo anelanelan’i Lôda sy i Jafao.'
  - type: text
    content: ' amin’ny tany lemak’i Onao isika!'
  - type: text
    content: 'Kanjo nikasa hanisy ratsy ahy izy roa lahy. '
  '3':
  - type: text
    content: 'Dia nandefa iraka hankany aminy kosa aho hanao hoe:'
  - type: text
    content: –Asa lehibe no ataoko ka tsy afa-midina aho; raha ilaozako midina any aminareo manko ny asa, dia hiato.
  '4':
  - type: text
    content: 'Mbola nandefa iraka tamiko inefatra miantoana araka izany ihany izy roa lahy; saingy izany ihany koa no navaliko azy hatrany. '
  '5':
  - type: text
    content: 'Dia nirahin’i Sanebalato fanindiminy hankatỳ amiko ny mpanompony, nitondra taratasy nivelatra teny an-tanany '
  '6':
  - type: text
    content: 'ka izao no voasoratra tao: «Efa mahoraka any amin’ny firenena maro sady lazain’i Gesema koa fa hoe mikasa hikomy ianao sy ny Jiosy; ka izany no anangananao ny manda. Ary, araka izany siosio miely izany, dia maniry ho mpanjakanay ianao. '
  '7':
  - type: text
    content: 'Efa nanendry '
  - type: text
    content: mpaminany
  - type: text
    content: ' mihitsy aza ianao mba hanambara ao Jerosalema fa ianao no mpanjakan’i Joda. Ankehitriny dia ho ren’ny amperôra izany raharaha izany; koa avia isika hiara-mikaon-doha.» '
  '8':
  - type: text
    content: 'Dia nandefa iraka ho any amin’i Sanebalato aho hanao hoe:'
  - type: text
    content: –Tsy marina izany zavatra lazainao izany fa noforoninao fotsiny.
  '9':
  - type: text
    content: Ny hampatahotra anay manko no kendren’izy rehetra, satria heveriny fa ho kivy amin’ny asa izahay ka tsy hahatontosa.
  - type: text
    content: «Koa ankehitriny herezo aho, Andriamanitra ô!»
