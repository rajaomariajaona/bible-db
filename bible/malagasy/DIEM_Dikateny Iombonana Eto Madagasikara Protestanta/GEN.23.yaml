document_id: GEN.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nividy fasana ho an’i Sarà i Abrahama
  - type: text
    content: 'Rehefa niaina 127 taona i Sarà, '
  '10':
  - type: text
    content: Ary i Hefrôna ilay Hetita
  - type: note
    content: 'Hetita: jereo ny FTS amin’ny voambolana hoe AMÔRITA.'
  - type: text
    content: ' tamin’izay dia nipetraka teo anivon’ny olona tafavory. Koa namaly an’i Abrahama izy mba ho ren’ny Hetita rehetra tonga teo am-bavahadin’ny tanàna, ka nanao hoe:'
  '11':
  - type: text
    content: –Tsia, tompokolahy, fa henoy aho! Ny saha dia omeko anao ary ny lava-bato izay eo aminy koa dia omeko anao; eto imason’ireto mpiray foko amiko no anomezako azy maimaim-poana; koa aleveno ao ny fatin’ny vadinao.
  '12':
  - type: text
    content: 'Fa niankohoka teo anatrehan’ny vahoaka tompon-tany indray i Abrahama, '
  '13':
  - type: text
    content: 'dia niteny tamin’i Hefrôna mba ho ren’ny besinimaro ka nanao hoe:'
  - type: text
    content: –Raha marina fa hihaino ahy tokoa ianao, mba raiso avy amiko ny vidin’ny saha efa natolotro; dia haleviko ao tokoa ny fatin’ny vadiko.
  '14':
  - type: text
    content: 'Dia namaly an’i Abrahama indray i Hefrôna hoe:'
  '15':
  - type: text
    content: –Tompokolahy ô, henoy aho! Izay tany lanjambidy efajato sekela volafotsy ve dia ho inona amiko sy aminao? Fa aleveno ny fatin’ny vadinao.
  '16':
  - type: text
    content: 'Dia nifanaraka tamin’i Hefrôna i Abrahama ka nandoa ny vola izay voalazany teo anatrehan’ireto Hetita, dia sekela volafotsy efajato fampiasa amin’ny mpivarotra. '
  '17':
  - type: text
    content: 'Koa ny sahan’i Hefrôna izay tao Makpelà akaikin’i Mamre, izany hoe ny saha sy ilay lava-bato tao aminy mbamin’ny hazo rehetra tao anatin’ny faritra manodidina azy, dia natao varo-maty '
  '18':
  - type: text
    content: tamin’i Abrahama mba ho fananany. Vavolombelon’izany ny Hetita rehetra tonga nivory teo am-bavahadin’ny tanàna.
  '19':
  - type: text
    content: 'Taorian’izany i Abrahama dia nandevina ny fatin’ny Sarà vadiny, tao amin’ilay lava-bato tao amin’ny saha Makpelà akaikin’i Mamre, izany hoe Hebrôna ao amin’ny tany Kanahàna. '
  '2':
  - type: text
    content: 'dia maty tao Kiriata-Arbà, izany hoe tao Hebrôna, any amin’ny tany Kanahàna. Dia tonga i Abrahama mba hisaona sy hitomany an’i Sarà. '
  '20':
  - type: text
    content: Koa ny saha sy ilay lava-bato ao aminy dia nataon’ny terak’i Heta varo-maty tamin’i Abrahama mba ho toeram-pandevenana.
  '3':
  - type: text
    content: 'Dia nitsangana niala teo amin’ny faty izy ary lasa niteny tamin’ny terak’i Heta hoe:'
  '4':
  - type: text
    content: –Vahiny sy mpifindra monina ihany aho eto aminareo. Omeo toeram-pandevenana eto aminareo aho mba handevenako ny vadiko
  - type: note
    content: 'Vahiny: jereo Heb 11.9-13. –Momba ny fividianana fasana: ampit Asa 7.16.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Dia namaly azy ny terak’i Heta hoe:'
  '6':
  - type: text
    content: '–Tompokolahy ô, mba mihainoa anay: filoha '
  - type: text
    content: notahin
  - type: text
    content: ’Andriamanitra ianao teto anivonay, koa aleveno ao amin’izay fasana tsara indrindra eto aminay ny vadinao. Tsy hisy aminay hisakana ny fasany tsy handevenana ny razana.
  '7':
  - type: text
    content: 'Nitsangana i Abrahama ka niankohoka teo anoloan’ny terak’i Heta, vahoaka tompon-tany, '
  '8':
  - type: text
    content: 'ka niteny tamin’ireo hoe:'
  - type: text
    content: '–Raha ekenareo tokoa àry ny handevenana ny vadiko eto, dia anaovy fanelanelanana amin’i Hefrôna zanakalahin’i Tsôhara aho '
  '9':
  - type: text
    content: mba hanomezany ahy ny lava-bato ao Makpelà amin’ny sisin’ny sahany. Aoka ho amin’ny tena vidiny no hanomezany azy ho ahy eto anatrehanareo ho toeram-pandevenana.
