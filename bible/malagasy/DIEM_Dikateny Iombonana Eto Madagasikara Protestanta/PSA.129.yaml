document_id: PSA.129,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Mafy izay nampahoriana ahy izay!
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana.
  - type: text
    content: Mafy izay nampahoriana ahy hatry ny fony kely izay!
  - type: text
    content: '–Aoka ny vahoaka Israely hilaza hoe:'
  '2':
  - type: text
    content: «Mafy izay nampahoriana ahy hatry ny fony kely izay!
  - type: text
    content: Kanefa tsy naharesy ahy ny olon-dratsy.
  '3':
  - type: text
    content: Nanoritana vava asa lava ny lamosiko,
  - type: text
    content: toy ny ataon’ny mpiasa tany eo amin’ny sahany.
  '4':
  - type: text
    content: Mandala ny rariny kosa ny TOMPO,
  - type: text
    content: ka namaha ny fatorana nataon’ireo tamiko.»
  '5':
  - type: text
    content: Aoka ho menatra sy hihemotra
  - type: text
    content: 'izay rehetra mankahala an’i '
  - type: text
    content: Tsiôna
  - type: text
    content: '!'
  '6':
  - type: text
    content: 'Aoka izy ho toy ny ahitra an-tampontrano:'
  - type: text
    content: tsy mbola ongotana, dia efa maina;
  '7':
  - type: text
    content: tsy mahafeno tanana, raha jinjana;
  - type: text
    content: tsy ahazoana amboara, raha angonina;
  '8':
  - type: text
    content: 'ka tsy mampiteny ny mpandalo hoe:'
  - type: text
    content: «
  - type: text
    content: Notahîn
  - type: text
    content: ’ny TOMPO Andriamanitrareo ê!»
  - type: text
    content: Amin’ny anaran’ny TOMPO
  - type: text
    content: no irarianay fitahiana ho anareo!
