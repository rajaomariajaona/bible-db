    - type: text
      text: SALAMO Mafy izay nampahoriana ahy izay!
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hira fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mafy izay nampahoriana ahy hatry ny fony kely izay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '–Aoka ny vahoaka Israely hilaza hoe:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mafy izay nampahoriana ahy hatry ny fony kely izay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy naharesy ahy ny olon-dratsy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanoritana vava asa lava ny lamosiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny ataon’ny mpiasa tany eo amin’ny sahany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandala ny rariny kosa ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka namaha ny fatorana nataon’ireo tamiko.»
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho menatra sy hihemotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay rehetra mankahala an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: '!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka izy ho toy ny ahitra an-tampontrano:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mbola ongotana, dia efa maina;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mahafeno tanana, raha jinjana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ahazoana amboara, raha angonina;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka tsy mampiteny ny mpandalo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «
    - type: usfm
      marker: w
      children:
      - type: text
        text: Notahîn
    - type: text
      text: ’ny TOMPO Andriamanitrareo ê!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny anaran’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no irarianay fitahiana ho anareo!
