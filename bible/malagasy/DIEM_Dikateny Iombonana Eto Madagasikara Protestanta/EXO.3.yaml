document_id: EXO.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niandry ny ondrin’i Jetrao rafozany, mpisorona tao Midiana i Mosesy. Indray andro, rehefa avy nitondra ny ondry aman’osy tany ankoatra ny taniefitra izy, dia tonga tao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hôreba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hôreba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay antsoina koa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sinay
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia lazaina ho tendrombohitr’Andriamanitra satria ao Andriamanitra no hanambara ny tenany; jereo ny toko 19.'
    marker-yv: yv-n
  - type: text
    text: ' tendrombohitr’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tao izy no nisehoan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’ny TOMPO tanaty lelafo teo afovoan’ny roimemy anankiray. Hitan’i Mosesy fa mirehitra afo ny roimemy, kanefa tsy nisy nahalevonana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia tapa-kevitra hanatona i Mosesy mba hizaha io fisehoana mahagaga io hahalalany izay antony tsy ahalevonan’ny roimemy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa hitan’ny TOMPO fa nanatona mba hizaha i Mosesy, dia tao afovoan’ny roimemy Izy no niantso azy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Mosesy! Ry Mosesy!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny navaliny Azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inty aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza manatona ny roimemy! Esory ny kapa amin’ny tongotrao fa tany masina ny toerana ijoroanao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izaho no Andriamanitry ny rainao, Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nisaron-tava i Mosesy fa natahotra ny hijery an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa hitako tokoa ny fahorian’ny vahoakako any Ejipta ary efa reko ny fitarainany noho ny famelezan’ireo mpampahory azy; eny, fantatro ny fijaliany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa tafidina Aho mba hanafaka azy amin’ny fahefàn’ny Ejiptianina, ka hampiakatra azy hiala amin’ny tany Ejipta mba ho any amin’ny tany tsara sy midadasika, any amin’ny tany tondra-dronono sy tantely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tany tondra-dronono sy tantely: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tany mahatsara ny fiompiana (ronono) sy ny fambolena (ny tantely eto dia ilazana ranom-boankazo notehirizina fa tsy tantely avy amin’ny renitantely akory).
    marker-yv: yv-n
  - type: text
    text: ', dia ny toerana misy ny Kanahanita sy ny Hetita, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' sy ny Perizita, ary ny Hivita sy ny Jebosita. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ankehitriny dia efa tonga eto amiko ny fitarainan’ny Israelita, ary efa hitako koa ny fahoriana izay ampijalian’ny Ejiptianina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa izao ankehitriny izao dia irahiko ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' ianao. Mandehana, avoahy hiala avy any Ejipta ny Israelita vahoakako'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 2-10:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 7.30-34.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manambara ny anarany amin’i Mosesy Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy i Mosesy tamin’Andriamanitra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Zinona moa aho no hankany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' ka hamoaka ny Israelita hiala avy any Ejipta?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Andriamanitra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Homba anao tokoa Aho; ary izao no porofo fa Izaho no naniraka anao: rehefa avy namoaka ny vahoaka israelita avy tany Ejipta ianao, dia hanao fanompoam-pivavahana amiko eto amin’ity tendrombohitra ity ianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ka hoy i Mosesy tamin’Andriamanitra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Eny àry fa hankany amin’ny Israelita aho izao hilaza aminy hoe: «Ilay Andriamanitry ny razanareo no naniraka ahy ho atỳ aminareo.» Saingy hanontany ahy ny anaranao izy, koa inona no havaliko azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 6.2-3.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy Andriamanitra tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no Ilay hatrizay ka ho mandrakizay. Koa izao no holazainao amin’ny Israelita: «Ilay hatrizay ka ho mandrakizay no naniraka ahy ho atỳ aminareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Raha Andriamanitra milaza tena hoe: «Izaho no Ilay hatrizay ka ho mandrakizay», dia mandà ny hampahafantatra ny anarany manokana, toy ny ao amin’ny Mpits 13.18. Dkt hafa: «Izaho no Ilay Izaho», izany hoe: «Eo Aho, miaraka aminareo, amin’ny fomba hahitanareo Ahy»; na koa «Izaho no Ilay Misy», izany hoe mifanohitra amin’ireo andriamanitra hafa izay «tsy misy»; ampit Is 43.10. Ny matoanteny hebreo izay nadika hoe: «Izaho no» dia mitovy amin’ny anarana hebreon’ny Andriamanitr’i Israely; jereo ny naoty manaraka. –Ampit amin’ny Apôk 1.4,8 koa ity and ity.'
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia ampio hoe: «Ny TOMPO Andriamanitry ny razanareo, ilay Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba, no naniraka ahy ho atỳ aminareo.» Izany no anarako mandrakizay, ary izany no hahatsiarovana Ahy isaky ny taranaka mifandimby'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny anaran’ilay Andriamanitr’i Israely dia i YHWH izay tsy fantatra ny tena fanononana azy. Nanomboka tamin’ny taonjato faha-4 tal J.K. ny Jiosy no nizatra tsy nanonona io anarana io intsony (
    - type: usfm
      marker: it
      children:
      - type: text
        text: mba tsy hanonontononana azy foana,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 20.7), fa nanao hoe «'
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny Tompo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '» matetika, na nanolo azy tamin’ny fomba fiteny hafa toy ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny Lanitra, ny Anarana, ny Voninahitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ets. Koa rehefa misy anarana hoe YHWH ny rijan-teny hebreo masôretika, dia ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tompo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no nandikana azy ato amin’ity DIEM ity.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mandehana, vorio ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon’
  - type: text
    text: 'i Israely ka ilazao hoe: «Ny TOMPO Andriamanitry ny razanareo, ilay Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba, no efa niseho tamiko ka nilaza fa nitsinjo anareo sy nahita ny fomba afitsoka anareo atỳ Ejipta; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'koa tapa-kevitra Izy fa hanaisotra anareo hiala amin’ny fahoriana atỳ ho any amin’ny tanin’ny Kanahanita sy ny Hetita, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' sy ny Perizita, ary ny Hivita sy ny Jebosita, dia tany tondra-dronono sy tantely'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny and 5 sy nta.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hihaino anao ireo Israelita; koa mandehàna ianao sy ny loholon’i Israely mankany amin’ny mpanjakan’i Ejipta, ka lazaonareo aminy hoe: «Niseho taminay ny TOMPO Andriamanitry ny Hebreo, ilay Andriamanitray, koa mba avelao izahay handeha lalana telo andro ho any an-taniefitra hanolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ho AZY.» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Kanefa fantatro fa tsy hamela anareo handeha ny mpanjakan’i Ejipta raha tsy terem-pahefana mahery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'raha tsy terem-pahefana mahery: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny rijan-teny Samaritanina sy ny Septoazinta ary ny Latinina; ny RM kosa milaza hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: na dia voaterin’ny sandry mahery aza.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izany no hanehoako ny fahefako tsy hay tohaina ka hamelezako an’i Ejipta amin’ny zava-mahagaga rehetra izay hataoko ao anatiny, ary aorian’izany vao halefany ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Homeko tombontsoa eo imason’ny Ejiptianina ity vahoaka ity ka tsy hitondra tanam-polo mody. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny vehivavy israelita tsirairay avy dia samy hangataka amin’ny vehivavy ejiptianina ao aminy na manodidina azy firavaka volafotsy sy volamena mbamin’ny fitafiana. Hampitondrainareo ny zanakalahinareo sy ny zanakavavinareo ireny, ka hataonareo fongana ny Ejiptianina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.22 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 21-22:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 12.35-36.
    marker-yv: yv-n
  - type: text
    text: .
