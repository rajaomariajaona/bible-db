document_id: EXO.3,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Niandry ny ondrin’i Jetrao rafozany, mpisorona tao Midiana i Mosesy. Indray andro, rehefa avy nitondra ny ondry aman’osy tany ankoatra ny taniefitra izy, dia tonga tao '
  - type: text
    content: Hôreba
  - type: note
    content: I Hôreba izay antsoina koa hoe Sinay dia lazaina ho tendrombohitr’Andriamanitra satria ao Andriamanitra no hanambara ny tenany; jereo ny toko 19.
  - type: text
    content: ' tendrombohitr’Andriamanitra. '
  '10':
  - type: text
    content: 'Koa izao ankehitriny izao dia irahiko ho any amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' ianao. Mandehana, avoahy hiala avy any Ejipta ny Israelita vahoakako'
  - type: note
    content: 'And 2-10: jereo Asa 7.30-34.'
  - type: text
    content: .
  - type: heading
    content: Manambara ny anarany amin’i Mosesy Andriamanitra
  '11':
  - type: text
    content: 'Fa hoy i Mosesy tamin’Andriamanitra:'
  - type: text
    content: '–Zinona moa aho no hankany amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' ka hamoaka ny Israelita hiala avy any Ejipta?'
  '12':
  - type: text
    content: 'Ary hoy Andriamanitra hoe:'
  - type: text
    content: '–Homba anao tokoa Aho; ary izao no porofo fa Izaho no naniraka anao: rehefa avy namoaka ny vahoaka israelita avy tany Ejipta ianao, dia hanao fanompoam-pivavahana amiko eto amin’ity tendrombohitra ity ianareo.'
  '13':
  - type: text
    content: 'Ka hoy i Mosesy tamin’Andriamanitra:'
  - type: text
    content: '–Eny àry fa hankany amin’ny Israelita aho izao hilaza aminy hoe: «Ilay Andriamanitry ny razanareo no naniraka ahy ho atỳ aminareo.» Saingy hanontany ahy ny anaranao izy, koa inona no havaliko azy'
  - type: note
    content: Jereo 6.2-3.
  - type: text
    content: '?'
  '14':
  - type: text
    content: 'Dia hoy Andriamanitra tamin’i Mosesy:'
  - type: text
    content: '–Izaho no Ilay hatrizay ka ho mandrakizay. Koa izao no holazainao amin’ny Israelita: «Ilay hatrizay ka ho mandrakizay no naniraka ahy ho atỳ aminareo'
  - type: note
    content: 'Raha Andriamanitra milaza tena hoe: «Izaho no Ilay hatrizay ka ho mandrakizay», dia mandà ny hampahafantatra ny anarany manokana, toy ny ao amin’ny Mpits 13.18. Dkt hafa: «Izaho no Ilay Izaho», izany hoe: «Eo Aho, miaraka aminareo, amin’ny fomba hahitanareo Ahy»; na koa «Izaho no Ilay Misy», izany hoe mifanohitra amin’ireo andriamanitra hafa izay «tsy misy»; ampit Is 43.10. Ny matoanteny hebreo izay nadika hoe: «Izaho no» dia mitovy amin’ny anarana hebreon’ny Andriamanitr’i Israely; jereo ny naoty manaraka. –Ampit amin’ny Apôk 1.4,8 koa ity and ity.'
  - type: text
    content: '.» '
  '15':
  - type: text
    content: 'Dia ampio hoe: «Ny TOMPO Andriamanitry ny razanareo, ilay Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba, no naniraka ahy ho atỳ aminareo.» Izany no anarako mandrakizay, ary izany no hahatsiarovana Ahy isaky ny taranaka mifandimby'
  - type: note
    content: Ny anaran’ilay Andriamanitr’i Israely dia i YHWH izay tsy fantatra ny tena fanononana azy. Nanomboka tamin’ny taonjato faha-4 tal J.K. ny Jiosy no nizatra tsy nanonona io anarana io intsony (mba tsy hanonontononana azy foana, jereo 20.7), fa nanao hoe «ny Tompo» matetika, na nanolo azy tamin’ny fomba fiteny hafa toy ny hoe Ny Lanitra, ny Anarana, ny Voninahitra ets. Koa rehefa misy anarana hoe YHWH ny rijan-teny hebreo masôretika, dia ny Tompo no nandikana azy ato amin’ity DIEM ity.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Mandehana, vorio ny '
  - type: text
    content: loholon’
  - type: text
    content: 'i Israely ka ilazao hoe: «Ny TOMPO Andriamanitry ny razanareo, ilay Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba, no efa niseho tamiko ka nilaza fa nitsinjo anareo sy nahita ny fomba afitsoka anareo atỳ Ejipta; '
  '17':
  - type: text
    content: 'koa tapa-kevitra Izy fa hanaisotra anareo hiala amin’ny fahoriana atỳ ho any amin’ny tanin’ny Kanahanita sy ny Hetita, ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' sy ny Perizita, ary ny Hivita sy ny Jebosita, dia tany tondra-dronono sy tantely'
  - type: note
    content: Jereo ny and 5 sy nta.
  - type: text
    content: '.» '
  '18':
  - type: text
    content: 'Hihaino anao ireo Israelita; koa mandehàna ianao sy ny loholon’i Israely mankany amin’ny mpanjakan’i Ejipta, ka lazaonareo aminy hoe: «Niseho taminay ny TOMPO Andriamanitry ny Hebreo, ilay Andriamanitray, koa mba avelao izahay handeha lalana telo andro ho any an-taniefitra hanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' ho AZY.» '
  '19':
  - type: text
    content: Kanefa fantatro fa tsy hamela anareo handeha ny mpanjakan’i Ejipta raha tsy terem-pahefana mahery
  - type: note
    content: 'raha tsy terem-pahefana mahery: araka ny rijan-teny Samaritanina sy ny Septoazinta ary ny Latinina; ny RM kosa milaza hoe na dia voaterin’ny sandry mahery aza.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Tao izy no nisehoan’ny '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny TOMPO tanaty lelafo teo afovoan’ny roimemy anankiray. Hitan’i Mosesy fa mirehitra afo ny roimemy, kanefa tsy nisy nahalevonana. '
  '20':
  - type: text
    content: 'Izany no hanehoako ny fahefako tsy hay tohaina ka hamelezako an’i Ejipta amin’ny zava-mahagaga rehetra izay hataoko ao anatiny, ary aorian’izany vao halefany ianareo. '
  '21':
  - type: text
    content: 'Homeko tombontsoa eo imason’ny Ejiptianina ity vahoaka ity ka tsy hitondra tanam-polo mody. '
  '22':
  - type: text
    content: Ny vehivavy israelita tsirairay avy dia samy hangataka amin’ny vehivavy ejiptianina ao aminy na manodidina azy firavaka volafotsy sy volamena mbamin’ny fitafiana. Hampitondrainareo ny zanakalahinareo sy ny zanakavavinareo ireny, ka hataonareo fongana ny Ejiptianina
  - type: note
    content: 'And 21-22: jereo 12.35-36.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Dia tapa-kevitra hanatona i Mosesy mba hizaha io fisehoana mahagaga io hahalalany izay antony tsy ahalevonan’ny roimemy. '
  '4':
  - type: text
    content: 'Rehefa hitan’ny TOMPO fa nanatona mba hizaha i Mosesy, dia tao afovoan’ny roimemy Izy no niantso azy nanao hoe:'
  - type: text
    content: –Ry Mosesy! Ry Mosesy!
  - type: text
    content: 'Ka hoy ny navaliny Azy:'
  - type: text
    content: –Inty aho.
  '5':
  - type: text
    content: 'Dia hoy ny TOMPO hoe:'
  - type: text
    content: '–Aza manatona ny roimemy! Esory ny kapa amin’ny tongotrao fa tany masina ny toerana ijoroanao. '
  '6':
  - type: text
    content: Izaho no Andriamanitry ny rainao, Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba.
  - type: text
    content: 'Dia nisaron-tava i Mosesy fa natahotra ny hijery an’Andriamanitra. '
  '7':
  - type: text
    content: 'Ary hoy ny TOMPO hoe:'
  - type: text
    content: '–Efa hitako tokoa ny fahorian’ny vahoakako any Ejipta ary efa reko ny fitarainany noho ny famelezan’ireo mpampahory azy; eny, fantatro ny fijaliany. '
  '8':
  - type: text
    content: Koa tafidina Aho mba hanafaka azy amin’ny fahefàn’ny Ejiptianina, ka hampiakatra azy hiala amin’ny tany Ejipta mba ho any amin’ny tany tsara sy midadasika, any amin’ny tany tondra-dronono sy tantely
  - type: note
    content: 'tany tondra-dronono sy tantely: dia tany mahatsara ny fiompiana (ronono) sy ny fambolena (ny tantely eto dia ilazana ranom-boankazo notehirizina fa tsy tantely avy amin’ny renitantely akory).'
  - type: text
    content: ', dia ny toerana misy ny Kanahanita sy ny Hetita, ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' sy ny Perizita, ary ny Hivita sy ny Jebosita. '
  '9':
  - type: text
    content: 'Ankehitriny dia efa tonga eto amiko ny fitarainan’ny Israelita, ary efa hitako koa ny fahoriana izay ampijalian’ny Ejiptianina azy. '
