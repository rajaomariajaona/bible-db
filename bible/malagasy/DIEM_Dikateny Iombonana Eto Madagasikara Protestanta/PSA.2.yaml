document_id: PSA.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ilay mpanjaka voahosotr’Andriamanitra
  - type: text
    content: Nahoana no mihotakotaka ny firenena
  - type: note
    content: Ny and 1-2 dia voatsiahy ao amin’ny Asa 4.25-26.
  - type: text
    content: '?'
  - type: text
    content: Ireo vahoaka mikomy amin’ny tsinontsinona;
  '10':
  - type: text
    content: Koa misehoa ho hendry, ianareo mpanjaka;
  - type: text
    content: ary minoa anatra, ry mpitsara ny tany.
  '11':
  - type: text
    content: Tompoy amin-tahotra ny TOMPO
  - type: text
    content: ary ekeo amin-kovitra ny fahefàny,
  - type: text
    content: fandrao hirehitra tampoka ny hatezerany
  - type: text
    content: ka ho fatin’ny fikasanareo ianareo.
  - type: text
    content: Sambatra izay rehetra mialoka aminy.
  '2':
  - type: text
    content: ireo mpanjakan’ny tany miomana hiady;
  - type: text
    content: ireo andriana miara-mioko
  - type: text
    content: 'hanohitra ny TOMPO sy ilay '
  - type: text
    content: Mesiany
  - type: text
    content: .
  '3':
  - type: text
    content: «Aoka hotapahintsika, hoy ireo, ny gadra angejàny;
  - type: text
    content: ary hariantsika any izay fanjakazakàny!»
  '4':
  - type: text
    content: Ny Tompo Izay mipetraka any an-danitra kosa
  - type: text
    content: dia mihomehy azy sy maneso azy.
  '5':
  - type: text
    content: Ka itenenany amin-katezerana ireo
  - type: text
    content: 'sy ampihorohoroiny amin-kavinirana hoe:'
  '6':
  - type: text
    content: «Izaho no manendry Azy ho mpanjaka
  - type: text
    content: 'eo '
  - type: text
    content: Tsiôna
  - type: text
    content: ' tendrombohitro masina!»'
  '7':
  - type: text
    content: –Aoka hambarako, hoy ilay mpanjaka,
  - type: text
    content: ny didy navoakan’ny TOMPO;
  - type: text
    content: 'fa hoy Izy tamiko: «Ianao no zanako;'
  - type: text
    content: Rainao niteraka anao Aho manomboka anio
  - type: note
    content: And voatsiahy ao amin’ny Asa 13.33; Heb 1.5; 5.5.
  - type: text
    content: .
  '8':
  - type: text
    content: Koa angataho amiko ny firenena rehetra,
  - type: text
    content: dia homeko ho fanananao ireny
  - type: text
    content: hatrany amin’ny faravazan-tany,
  '9':
  - type: text
    content: ary hofehezinao amin’ny tehim-by
  - type: text
    content: ka ho azonao potehina toa vilany tany
  - type: note
    content: Jereo Apôk 2.26-27; 12.5; 19.15.
  - type: text
    content: .»
