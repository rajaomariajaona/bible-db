segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakàn’i Manase
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 21.1-18)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Feno 12 taona i Manase fony tonga mpanjaka; ary naharitra 55 taona no nanjakany tao Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nanao izay ratsy eo imason’ny TOMPO izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jer 15.4.
    marker-yv: yv-n
  - type: text
    text: ' ka naka tahaka ny fanompoan-tsampy maharikoriko fanaon’ireo firenena izay noroahin’ny TOMPO teo anoloan’ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Naorin’i Manase indray manko ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-panasinana
  - type: text
    text: ' izay efa noravan’i Hezekià rainy ka nananganany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ho an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' sady nanaovany tsatokazo fanajana an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aserà
  - type: text
    text: '; dia niankohofany sy nanaovany fanompoam-pivavahana koa ireo planeta aman-kintana eny ana habakabaka. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary nanorenany alitara hafa aza tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ', dia tao amin’ilay nolazain’ny TOMPO hoe: «Ao Jerosalema no hitoetra mandrakizay ny voninahitro'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 7.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tao anatin’ny kianja roa amin’ny tranon’ny TOMPO tokoa no nanorenany alitara hafa ho fanajana ireo planeta aman-kintana eny ana habakabaka; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary na ireo zanany lahy aza dia natolony ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 16.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' teo an-dohasahan’i Bena-Hinôma'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lohasahan’i Bena-Hinôma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eo atsimon’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: '. Ankoatra izany dia mbola nanandro sady nisikidy sy nanao ody mahery izy, ary naka hevitra tamin’ny olona tsindrian-javatra sy mpanao fitokavana. Dia nahery nanao izay ratsy eo imason’ny TOMPO izy, ka nampahatezitra Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izay sarin-tsampy voasokitra nampanamboarin’i Manase dia napetrany tao an-tranon’Andriamanitra, izay efa nolazain’Andriamanitra tamin’i Davida sy i Salômôna zanany hoe: «Ato amin’ity trano ity sy eto Jerosalema izay nofidiko tamin’ny foko israelita rehetra no hampitoerako mandrakizay ny voninahitro. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa tsy hampirenireny ny Israelita hiala amin’ny tany izay efa notendreko ho an’ny razany Aho, raha imasoany hotandremana izay rehetra nandidiako azy, izany hoe ny lalàna manontolo sy ny baiko ary ny fitsipika nampitaiko tamin’ny alalan’i Mosesy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 21.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Kanjo nampivaona ny mponin’i Jerosalema sy ny Jodeanina i Manase mba hanao ratsy mihoatra noho ny firenena izay naringan’ny TOMPO teo anoloan’ny Israelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Niteny tamin’i Manase sy ny vahoakany ny TOMPO, nefa tsy noraharahainy akory. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nasain’ny TOMPO ho tonga hamely azy ny mpitari-tafiky ny mpanjakan’i Asiria; ary nosamborin’ireo i Manase ka nasiany masombỳ sady nogadrany rojo halimo ary nentiny nankany Babilôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tamin’izay i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Babilôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia teo ambany fifehezan’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asiria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa nianjadiam-pahoriana mafy izy, vao nitaraina tamin’ny TOMPO Andriamaniny sady niaiky heloka teo anatrehan’ilay Andriamanitry ny razany '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ka nifona taminy. Dia nandeferan’ny TOMPO izy sy nohenoiny vavaka ary nampodîny ho any Jerosalema hanohy ny maha mpanjaka azy. Tamin’izay no nieken’i Manase fa ny TOMPO no hany Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Taorian’izany i Manase dia nanao manda teo ivelan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tanànan’i Davida
  - type: text
    text: ', dia teo andrefan’ny loharanon’i Gihôna'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'loharanon’i Gihôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 1.33 sy nta.
    marker-yv: yv-n
  - type: text
    text: . Nitandavana nanaraka ny lohasahan-driaka izany manda izany ka tafapaka hatrany amin’ny Vavahadin’ny Hazandrano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Vavahadin’ny Hazandrano: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: teo amin’ny manda lafiny avaratry ny tempoly.
    marker-yv: yv-n
  - type: text
    text: ' rehefa nanodidina an’i Hôfela'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hôfela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 27.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; avo dia avo no nanaovany azy. Ary nanendreny komandin’ny miaramila ireo tanànamimanda rehetra tao Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nesoriny avy ny andriamani-kafa sy ny sampy tao an-tranon’ny TOMPO; ary nariany teny ivelan’ny tanàna ny alitara rehetra izay naoriny teo an-tendrombohitra misy ny tranon’ny TOMPO sy tao Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Naveriny amin’ny laoniny indray ny alitaran’ny TOMPO ka nanolorany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorom-pihavanana
  - type: text
    text: ' sy sorom-pisaorana teo amboniny; ary nodidiany hanompo ny TOMPO Andriamanitr’i Israely ny Jodeanina. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mbola nanao sorona teny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-pisoronana
  - type: text
    text: ' hafa ny olona, saingy ho an’ny TOMPO Andriamaniny ihany no nanolorany izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny sisa amin’ny tantaran’i Manase, indrindra ny vavaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy tokoa tonom-bavaka antsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vavak’i Manase
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay anisan’ny lahatsoratra deôterôkanônika (na apôkrifa) ankatoavin’ny Ortôdôksa sy Anglikanina sasantsasany.'
    marker-yv: yv-n
  - type: text
    text: ' nataony tamin’Andriamaniny sy ny tenin’ireo mpahita izay niteny azy tamin’ny anaran’ny TOMPO Andriamanitr’i Israely, dia voarakitra ao amin’ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Israely.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny vavaka nataon’i Manase sy ny nileferan’Andriamanitra taminy ary ny antsipirian’ny fahotana amam-pahadisoana rehetra vitany mbamin’ny faritra nanorenany toeram-panasinana sy nasiany tsatokazo fanajana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aserà
  - type: text
    text: ' ary nananganany sarivongan-tsampy fony izy tsy mbola niaiky heloka, dia voasoratra ao amin’ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’i Hôzay.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany kosa i Manase, dia nalevina tao amin’ny sahany. Ary i Amôna zanany lahy no nanjaka nandimby azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakàn’i Amôna
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 21.19-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Feno 22 taona i Amôna fony tonga mpanjaka; ary naharitra roa taona no nanjakany tao Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nanao izay ratsy teo imason’ny TOMPO izy tahaka an’i Manase rainy. Fa ny sarivongan-tsampy rehetra nataon’i Manase rainy dia nanoloran’i Amôna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' sy nanaovany fanompoam-pivavahana; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: kanefa tsy mba niaiky heloka teo anatrehan’ny TOMPO tahaka ny nataon’i Manase rainy izy, fa vao mainka nanota bebe kokoa aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nikomy tamin’i Amôna ireo manamboninahiny ka namono azy ho faty tao an-dapany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa mba nataon’ny mponin’i Joda maty kosa izay rehetra nikomy tamin’i Amôna mpanjaka; ka dia i Jôsià zanany lahy no voatendriny ho mpanjaka handimby azy.
