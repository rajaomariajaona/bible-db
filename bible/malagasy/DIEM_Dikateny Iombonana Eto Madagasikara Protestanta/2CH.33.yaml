document_id: 2CH.33,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakàn’i Manase
  - type: heading
    content: (Jereo 2 Mp 21.1-18)
  - type: text
    content: 'Feno 12 taona i Manase fony tonga mpanjaka; ary naharitra 55 taona no nanjakany tao Jerosalema. '
  '10':
  - type: text
    content: 'Niteny tamin’i Manase sy ny vahoakany ny TOMPO, nefa tsy noraharahainy akory. '
  '11':
  - type: text
    content: Dia nasain’ny TOMPO ho tonga hamely azy ny mpitari-tafiky ny mpanjakan’i Asiria; ary nosamborin’ireo i Manase ka nasiany masombỳ sady nogadrany rojo halimo ary nentiny nankany Babilôna
  - type: note
    content: Tamin’izay i Babilôna dia teo ambany fifehezan’i Asiria.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Rehefa nianjadiam-pahoriana mafy izy, vao nitaraina tamin’ny TOMPO Andriamaniny sady niaiky heloka teo anatrehan’ilay Andriamanitry ny razany '
  '13':
  - type: text
    content: ka nifona taminy. Dia nandeferan’ny TOMPO izy sy nohenoiny vavaka ary nampodîny ho any Jerosalema hanohy ny maha mpanjaka azy. Tamin’izay no nieken’i Manase fa ny TOMPO no hany Andriamanitra.
  '14':
  - type: text
    content: 'Taorian’izany i Manase dia nanao manda teo ivelan’ny '
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ', dia teo andrefan’ny loharanon’i Gihôna'
  - type: note
    content: 'loharanon’i Gihôna: jereo 1 Mp 1.33 sy nta.'
  - type: text
    content: . Nitandavana nanaraka ny lohasahan-driaka izany manda izany ka tafapaka hatrany amin’ny Vavahadin’ny Hazandrano
  - type: note
    content: 'Vavahadin’ny Hazandrano: teo amin’ny manda lafiny avaratry ny tempoly.'
  - type: text
    content: ' rehefa nanodidina an’i Hôfela'
  - type: note
    content: 'Hôfela: jereo 27.3 sy nta.'
  - type: text
    content: '; avo dia avo no nanaovany azy. Ary nanendreny komandin’ny miaramila ireo tanànamimanda rehetra tao Joda. '
  '15':
  - type: text
    content: 'Dia nesoriny avy ny andriamani-kafa sy ny sampy tao an-tranon’ny TOMPO; ary nariany teny ivelan’ny tanàna ny alitara rehetra izay naoriny teo an-tendrombohitra misy ny tranon’ny TOMPO sy tao Jerosalema. '
  '16':
  - type: text
    content: 'Naveriny amin’ny laoniny indray ny alitaran’ny TOMPO ka nanolorany '
  - type: text
    content: sorom-pihavanana
  - type: text
    content: ' sy sorom-pisaorana teo amboniny; ary nodidiany hanompo ny TOMPO Andriamanitr’i Israely ny Jodeanina. '
  '17':
  - type: text
    content: 'Mbola nanao sorona teny amin’ny '
  - type: text
    content: toeram-pisoronana
  - type: text
    content: ' hafa ny olona, saingy ho an’ny TOMPO Andriamaniny ihany no nanolorany izany.'
  '18':
  - type: text
    content: Ny sisa amin’ny tantaran’i Manase, indrindra ny vavaka
  - type: note
    content: Misy tokoa tonom-bavaka antsoina hoe Vavak’i Manase izay anisan’ny lahatsoratra deôterôkanônika (na apôkrifa) ankatoavin’ny Ortôdôksa sy Anglikanina sasantsasany.
  - type: text
    content: ' nataony tamin’Andriamaniny sy ny tenin’ireo mpahita izay niteny azy tamin’ny anaran’ny TOMPO Andriamanitr’i Israely, dia voarakitra ao amin’ny '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Ny vavaka nataon’i Manase sy ny nileferan’Andriamanitra taminy ary ny antsipirian’ny fahotana amam-pahadisoana rehetra vitany mbamin’ny faritra nanorenany toeram-panasinana sy nasiany tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: ' ary nananganany sarivongan-tsampy fony izy tsy mbola niaiky heloka, dia voasoratra ao amin’ny '
  - type: text
    content: Asan’i Hôzay.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Nanao izay ratsy eo imason’ny TOMPO izy
  - type: note
    content: Jereo Jer 15.4.
  - type: text
    content: ' ka naka tahaka ny fanompoan-tsampy maharikoriko fanaon’ireo firenena izay noroahin’ny TOMPO teo anoloan’ny Israelita. '
  '20':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany kosa i Manase, dia nalevina tao amin’ny sahany. Ary i Amôna zanany lahy no nanjaka nandimby azy.
  - type: heading
    content: Ny nanjakàn’i Amôna
  - type: heading
    content: (Jereo 2 Mp 21.19-26)
  '21':
  - type: text
    content: 'Feno 22 taona i Amôna fony tonga mpanjaka; ary naharitra roa taona no nanjakany tao Jerosalema. '
  '22':
  - type: text
    content: 'Nanao izay ratsy teo imason’ny TOMPO izy tahaka an’i Manase rainy. Fa ny sarivongan-tsampy rehetra nataon’i Manase rainy dia nanoloran’i Amôna '
  - type: text
    content: sorona
  - type: text
    content: ' sy nanaovany fanompoam-pivavahana; '
  '23':
  - type: text
    content: kanefa tsy mba niaiky heloka teo anatrehan’ny TOMPO tahaka ny nataon’i Manase rainy izy, fa vao mainka nanota bebe kokoa aza.
  '24':
  - type: text
    content: 'Nikomy tamin’i Amôna ireo manamboninahiny ka namono azy ho faty tao an-dapany. '
  '25':
  - type: text
    content: Fa mba nataon’ny mponin’i Joda maty kosa izay rehetra nikomy tamin’i Amôna mpanjaka; ka dia i Jôsià zanany lahy no voatendriny ho mpanjaka handimby azy.
  '3':
  - type: text
    content: 'Naorin’i Manase indray manko ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' izay efa noravan’i Hezekià rainy ka nananganany '
  - type: text
    content: alitara
  - type: text
    content: ' ho an’ireo '
  - type: text
    content: Bahala
  - type: text
    content: ' sady nanaovany tsatokazo fanajana an’ireo '
  - type: text
    content: Aserà
  - type: text
    content: '; dia niankohofany sy nanaovany fanompoam-pivavahana koa ireo planeta aman-kintana eny ana habakabaka. '
  '4':
  - type: text
    content: Ary nanorenany alitara hafa aza tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ', dia tao amin’ilay nolazain’ny TOMPO hoe: «Ao Jerosalema no hitoetra mandrakizay ny voninahitro'
  - type: note
    content: Jereo 2 Sam 7.
  - type: text
    content: '.» '
  '5':
  - type: text
    content: 'Tao anatin’ny kianja roa amin’ny tranon’ny TOMPO tokoa no nanorenany alitara hafa ho fanajana ireo planeta aman-kintana eny ana habakabaka; '
  '6':
  - type: text
    content: 'ary na ireo zanany lahy aza dia natolony ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana'
  - type: note
    content: Jereo 2 Mp 16.3 sy nta.
  - type: text
    content: ' teo an-dohasahan’i Bena-Hinôma'
  - type: note
    content: 'lohasahan’i Bena-Hinôma: eo atsimon’i Jerosalema.'
  - type: text
    content: '. Ankoatra izany dia mbola nanandro sady nisikidy sy nanao ody mahery izy, ary naka hevitra tamin’ny olona tsindrian-javatra sy mpanao fitokavana. Dia nahery nanao izay ratsy eo imason’ny TOMPO izy, ka nampahatezitra Azy. '
  '7':
  - type: text
    content: 'Izay sarin-tsampy voasokitra nampanamboarin’i Manase dia napetrany tao an-tranon’Andriamanitra, izay efa nolazain’Andriamanitra tamin’i Davida sy i Salômôna zanany hoe: «Ato amin’ity trano ity sy eto Jerosalema izay nofidiko tamin’ny foko israelita rehetra no hampitoerako mandrakizay ny voninahitro. '
  '8':
  - type: text
    content: Koa tsy hampirenireny ny Israelita hiala amin’ny tany izay efa notendreko ho an’ny razany Aho, raha imasoany hotandremana izay rehetra nandidiako azy, izany hoe ny lalàna manontolo sy ny baiko ary ny fitsipika nampitaiko tamin’ny alalan’i Mosesy
  - type: note
    content: Jereo 2 Mp 21.8 sy nta.
  - type: text
    content: '.» '
  '9':
  - type: text
    content: Kanjo nampivaona ny mponin’i Jerosalema sy ny Jodeanina i Manase mba hanao ratsy mihoatra noho ny firenena izay naringan’ny TOMPO teo anoloan’ny Israelita.
