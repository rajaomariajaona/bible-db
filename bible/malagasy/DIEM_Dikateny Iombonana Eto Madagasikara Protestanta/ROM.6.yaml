document_id: ROM.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Maty raha ny amin’ny fahotana fa velona ao amin’i Kristy
  - type: text
    content: Inona àry no holazaintsika? Hitoetra ao amin’ny fahotana ve isika mba hitomboan’ny fahasoavana
  - type: note
    content: Ampit 3.8.
  - type: text
    content: '? '
  '10':
  - type: text
    content: 'Satria maty Izy, dia indray mandeha monja, noho ny amin’ny fahotana; ary izao Izy velona izao kosa, dia velona ho an’Andriamanitra. '
  '11':
  - type: text
    content: Toy izany koa, aoka ianareo hihevitra ny tenanareo ho efa maty raha ny amin’ny fahotana fa velona ho an’Andriamanitra kosa ao amin’i Kristy Jesoa.
  '12':
  - type: text
    content: 'Noho izany àry, dia aoka tsy havela hanjaka ao amin’ny tenanareo mety maty ny fahotana, ka tsy hanaraka ny filàny ianareo. '
  '13':
  - type: text
    content: 'Aoka ny zavatra anisan’ny tenanareo tsy hatolotrareo ny fahotana mba ho fiasana hoentiny hanao ny ratsy. Fa atolory an’Andriamanitra ny tenanareo toy ny olona efa maty no velona indray, ary atolory an’Andriamanitra ireo zavatra anisan’ny tenanareo mba ho fiasana hoentiny hanao ny marina. '
  '14':
  - type: text
    content: 'Tsy hanan-kery aminareo intsony ny fahotana, noho ianareo tsy eo ambany fahefan’ny '
  - type: text
    content: lalàna
  - type: text
    content: ', fa eo ambany fahefan’ny fahasoavana.'
  - type: heading
    content: Mpanompon’ny fahamarinana isika
  '15':
  - type: text
    content: 'Koa ahoana àry? Hanota ve isika satria tsy eo ambany fahefan’ny '
  - type: text
    content: lalàna
  - type: text
    content: ' fa eo ambany fahefan’ny fahasoavana? Sanatria izany! '
  '16':
  - type: text
    content: 'Tsy fantatrareo ve fa raha manolo-tena mba ho mpanompo hanaiky tompo anankiray ianareo, dia manjary mpanompon’io tompo io: na ny fahotana izay mampirona amin’ny fahafatesana'
  - type: note
    content: Ampit Jôh 8.34.
  - type: text
    content: ' izany, na ny fanekena an’Andriamanitra izay mampirona hanao ny marina? '
  '17':
  - type: text
    content: 'Isaorana Andriamanitra fa mpanompon’ny fahotana ianareo fahiny, ary ankehitriny kosa dia manaiky am-po tokoa ny fampianarana naroso taminareo. '
  '18':
  - type: text
    content: 'Natao afaka tamin’ny fahotana ianareo, ary tonga mpanompon’ny fahamarinana. '
  '19':
  - type: text
    content: Miteny araka ny fiheveran’ny besinimaro aho noho ny halemenareo ara-nofo. Taloha dia nanolotra ny zavatra anisan’ny tenanareo ho mpanompon’ny fahalotoana sy ny tsy fanarahan-dalàna ianareo, ka tonga olona ratsy fanahy; toy izany koa ankehitriny, aoka ianareo hanolotra ny zavatra anisan’ny tenanareo saingy ho mpanompon’ny fahamarinana mba hanananareo toetra masina.
  '2':
  - type: text
    content: 'Sanatria izany! Isika izay efa maty raha ny amin’ny fahotana, hataontsika ahoana no mbola ho velona ao amin’ny fahotana ihany? '
  '20':
  - type: text
    content: 'Fa fony mpanompon’ny fahotana ianareo, dia afaka tamin’ny fifehezan’ny fahamarinana. '
  '21':
  - type: text
    content: 'Inona àry no vokatra azonareo tamin’ireny zavatra nataonareo fahiny ireny? Mahamenatra anareo izany ankehitriny satria fahafatesana no iafarany. '
  '22':
  - type: text
    content: 'Ankehitriny anefa, natao afaka tamin’ny fahotana ianareo ary tonga mpanompon’Andriamanitra; ka ny vokatra azonareo dia ny anananareo toetra masina ary fiaina-maharitra mandrakizay amin’ny farany. '
  '23':
  - type: text
    content: Satria fahafatesana no tambin’ny fahotana, dia ny fanomezan’Andriamanitra maimaimpoana kosa dia fiaina-maharitra mandrakizay ho an’izay ao amin’i Kristy Jesoa Tompontsika.
  '3':
  - type: text
    content: 'Sa tsy fantatrareo fa isika rehetra izay natao '
  - type: text
    content: batisa
  - type: text
    content: ' mba ho tafaray amin’i Kristy Jesoa dia natao batisa mba hiombona amin’ny fahafatesany? '
  '4':
  - type: text
    content: Koa tamin’ny alalan’ny batisa dia niombona amin’ny fahafatesan’i Kristy Jesoa isika ary niara-nalevina taminy, mba ho tahaka ny nananganana an’i Jesoa ho velona avy tany amin’ny maty noho ny herin’Andriamanitra Ray be voninahitra no hizorantsika koa amin’ny fiainam-baovao.
  '5':
  - type: text
    content: Koa raha
  - type: note
    content: 'raha: dkt hafa satria (toraka izany ao amin’ny and 8).'
  - type: text
    content: ' fahafatesana mifanahaka amin’ny an’i Kristy no nampiraisana antsika aminy, dia fitsanganan-ko velona mifanahaka amin’ny Azy koa no hampiraisana antsika aminy. '
  '6':
  - type: text
    content: 'Fantatsika fa ny maha olona antsika taloha dia efa niara-novonoina tamin’i Kristy teo amin’ny hazofijaliana, mba ho levona ny tenantsika gejain’ny fahotana ka tsy ho mpanompon’ny fahotana intsony isika; '
  '7':
  - type: text
    content: 'satria izay maty dia afaka amin’ny fangejàn’ny fahotana. '
  '8':
  - type: text
    content: 'Raha niara-maty tamin’i Kristy isika, dia mino fa hiara-belona aminy koa: '
  '9':
  - type: text
    content: 'ary fantatsika fa tsy maty intsony i Kristy rehefa nitsangana velona avy tany amin’ny maty: tsy manan-kery aminy intsony ny fahafatesana. '
