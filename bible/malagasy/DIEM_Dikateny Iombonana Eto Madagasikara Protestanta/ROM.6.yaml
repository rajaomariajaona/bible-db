document_id: ROM.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Maty raha ny amin’ny fahotana fa velona ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Inona àry no holazaintsika? Hitoetra ao amin’ny fahotana ve isika mba hitomboan’ny fahasoavana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 3.8.
      marker-yv: yv-n
    - type: text
      text: '? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria maty Izy, dia indray mandeha monja, noho ny amin’ny fahotana; ary izao Izy velona izao kosa, dia velona ho an’Andriamanitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany koa, aoka ianareo hihevitra ny tenanareo ho efa maty raha ny amin’ny fahotana fa velona ho an’Andriamanitra kosa ao amin’i Kristy Jesoa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany àry, dia aoka tsy havela hanjaka ao amin’ny tenanareo mety maty ny fahotana, ka tsy hanaraka ny filàny ianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ny zavatra anisan’ny tenanareo tsy hatolotrareo ny fahotana mba ho fiasana hoentiny hanao ny ratsy. Fa atolory an’Andriamanitra ny tenanareo toy ny olona efa maty no velona indray, ary atolory an’Andriamanitra ireo zavatra anisan’ny tenanareo mba ho fiasana hoentiny hanao ny marina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hanan-kery aminareo intsony ny fahotana, noho ianareo tsy eo ambany fahefan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ', fa eo ambany fahefan’ny fahasoavana.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mpanompon’ny fahamarinana isika
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ahoana àry? Hanota ve isika satria tsy eo ambany fahefan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' fa eo ambany fahefan’ny fahasoavana? Sanatria izany! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy fantatrareo ve fa raha manolo-tena mba ho mpanompo hanaiky tompo anankiray ianareo, dia manjary mpanompon’io tompo io: na ny fahotana izay mampirona amin’ny fahafatesana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 8.34.
      marker-yv: yv-n
    - type: text
      text: ' izany, na ny fanekena an’Andriamanitra izay mampirona hanao ny marina? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaorana Andriamanitra fa mpanompon’ny fahotana ianareo fahiny, ary ankehitriny kosa dia manaiky am-po tokoa ny fampianarana naroso taminareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natao afaka tamin’ny fahotana ianareo, ary tonga mpanompon’ny fahamarinana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miteny araka ny fiheveran’ny besinimaro aho noho ny halemenareo ara-nofo. Taloha dia nanolotra ny zavatra anisan’ny tenanareo ho mpanompon’ny fahalotoana sy ny tsy fanarahan-dalàna ianareo, ka tonga olona ratsy fanahy; toy izany koa ankehitriny, aoka ianareo hanolotra ny zavatra anisan’ny tenanareo saingy ho mpanompon’ny fahamarinana mba hanananareo toetra masina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sanatria izany! Isika izay efa maty raha ny amin’ny fahotana, hataontsika ahoana no mbola ho velona ao amin’ny fahotana ihany? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fony mpanompon’ny fahotana ianareo, dia afaka tamin’ny fifehezan’ny fahamarinana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona àry no vokatra azonareo tamin’ireny zavatra nataonareo fahiny ireny? Mahamenatra anareo izany ankehitriny satria fahafatesana no iafarany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ankehitriny anefa, natao afaka tamin’ny fahotana ianareo ary tonga mpanompon’Andriamanitra; ka ny vokatra azonareo dia ny anananareo toetra masina ary fiaina-maharitra mandrakizay amin’ny farany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Satria fahafatesana no tambin’ny fahotana, dia ny fanomezan’Andriamanitra maimaimpoana kosa dia fiaina-maharitra mandrakizay ho an’izay ao amin’i Kristy Jesoa Tompontsika.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa tsy fantatrareo fa isika rehetra izay natao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' mba ho tafaray amin’i Kristy Jesoa dia natao batisa mba hiombona amin’ny fahafatesany? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa tamin’ny alalan’ny batisa dia niombona amin’ny fahafatesan’i Kristy Jesoa isika ary niara-nalevina taminy, mba ho tahaka ny nananganana an’i Jesoa ho velona avy tany amin’ny maty noho ny herin’Andriamanitra Ray be voninahitra no hizorantsika koa amin’ny fiainam-baovao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa raha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'raha: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: satria
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (toraka izany ao amin’ny and 8).'
      marker-yv: yv-n
    - type: text
      text: ' fahafatesana mifanahaka amin’ny an’i Kristy no nampiraisana antsika aminy, dia fitsanganan-ko velona mifanahaka amin’ny Azy koa no hampiraisana antsika aminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatsika fa ny maha olona antsika taloha dia efa niara-novonoina tamin’i Kristy teo amin’ny hazofijaliana, mba ho levona ny tenantsika gejain’ny fahotana ka tsy ho mpanompon’ny fahotana intsony isika; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria izay maty dia afaka amin’ny fangejàn’ny fahotana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha niara-maty tamin’i Kristy isika, dia mino fa hiara-belona aminy koa: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary fantatsika fa tsy maty intsony i Kristy rehefa nitsangana velona avy tany amin’ny maty: tsy manan-kery aminy intsony ny fahafatesana. '
