document_id: PSA.137,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Teo amoron’ny onin’i Babilôna
  - type: text
    content: 'Teo amoron’ny onin’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' no nipetraka izahay'
  - type: text
    content: 'ka nitomany mafy nahatsiaro an’i '
  - type: text
    content: Tsiôna
  - type: text
    content: '!'
  '2':
  - type: text
    content: Ny hazomalahelo izay teny ho eny
  - type: text
    content: no nanantonanay ny lokanganay.
  '3':
  - type: text
    content: Dia avy ny mpamabo anay nangata-kira taminay;
  - type: text
    content: 'avy ny mpifaoka anay nitaky antsam-pifaliana hoe:'
  - type: text
    content: «Mba ihirao amin’ny hiran’i Tsiôna izahay!»
  '4':
  - type: text
    content: Fa dia hataonay ahoana
  - type: text
    content: no fihira ny hiran’ny TOMPO
  - type: text
    content: atỳ an-tanin’olona atỳ?
  '5':
  - type: text
    content: Raha manadino anao aho, ry Jerosalema ô,
  - type: text
    content: dia aoka ho tonga malemy ny tanako ankavanana!
  '6':
  - type: text
    content: Raha tsy mahatsiaro anao intsony aho, ry Jerosalema ô,
  - type: text
    content: raha tsy ianao no ataoko antom-pifaliako
  - type: text
    content: ambony indrindra,
  - type: text
    content: dia aoka hiraikitra amin’ny lanilaniko ny lelako
  - type: note
    content: Ny tanana maina sy ny lela raikitra dia toa midika hoe tsy hahay mitendry lokanga sy tsy hahay mihira intsony ilay mpanao salamo.
  - type: text
    content: '!'
  '7':
  - type: text
    content: TOMPO ô, tsarovy ny nafitsoky ny Edômita;
  - type: text
    content: fa tamin’ny andro nandravana an’i Jerosalema,
  - type: text
    content: 'dia ireo no nandrisika hoe: «Fongory io tanàna io,'
  - type: text
    content: eny, fongory hatramin’ny fanorenany!»
  '8':
  - type: text
    content: Ianao kosa, ry tanànan’i Babilôna ô, dia efa horavana.
  - type: text
    content: Sambatra izay hampanody anao ny nafitsokao anay
  - type: note
    content: 'efa horavana: betsaka ny dkt tranainy no ahitana hoe mpandrava. –famaizana an’i Babilôna: jereo Apôk 18.6.'
  - type: text
    content: '!'
  '9':
  - type: text
    content: Sambatra izay hanainga ny zanakao madinika
  - type: text
    content: ka hanorotoro azy eo ambonin’ny vatolampy!
