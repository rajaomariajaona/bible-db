    children:
    - type: text
      text: '1'
  - type: text
    text: 'Teo amoron’ny onin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: ' no nipetraka izahay'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka nitomany mafy nahatsiaro an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny hazomalahelo izay teny ho eny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanantonanay ny lokanganay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia avy ny mpamabo anay nangata-kira taminay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'avy ny mpifaoka anay nitaky antsam-pifaliana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mba ihirao amin’ny hiran’i Tsiôna izahay!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa dia hataonay ahoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no fihira ny hiran’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: atỳ an-tanin’olona atỳ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha manadino anao aho, ry Jerosalema ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka ho tonga malemy ny tanako ankavanana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha tsy mahatsiaro anao intsony aho, ry Jerosalema ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy ianao no ataoko antom-pifaliako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambony indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka hiraikitra amin’ny lanilaniko ny lelako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '137.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tanana maina sy ny lela raikitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia toa midika hoe tsy hahay mitendry lokanga sy tsy hahay mihira intsony ilay mpanao salamo.'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: TOMPO ô, tsarovy ny nafitsoky ny Edômita;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tamin’ny andro nandravana an’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ireo no nandrisika hoe: «Fongory io tanàna io,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fongory hatramin’ny fanorenany!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ianao kosa, ry tanànan’i Babilôna ô, dia efa horavana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra izay hampanody anao ny nafitsokao anay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '137.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'efa horavana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'betsaka ny dkt tranainy no ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpandrava
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –famaizana an’i Babilôna: jereo Apôk 18.6.'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sambatra izay hanainga ny zanakao madinika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanorotoro azy eo ambonin’ny vatolampy!
