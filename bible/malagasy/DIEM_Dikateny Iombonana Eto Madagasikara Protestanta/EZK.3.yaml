document_id: EZK.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy Ilay niteny tamiko hoe: «Ry ilay taranak’olombelona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ry ilay taranak’olombelona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2.1 sy nta. –Momba ny and 1-3, jereo Apôk 10.9-10.
    marker-yv: yv-n
  - type: text
    text: ', hano io horonan-taratasy izay naseho anao io, dia mandehana miteny amin’ny Israelita.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nosokafako ny vavako ary nafahany ahy ilay horonan-taratasy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Izy tamiko: «Ry ilay taranak’olombelona, fenoy ny kibonao ary vokiso amin’io horonan-taratasy omena anao io ny tenanao.» Dia nohaniko izany, ka tao am-bavako dia mamy toy ny tantely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy indray Izy: «Ry ilay taranak’olombelona, mandehana mankany amin’ny Israelita ka ampitao aminy ny teniko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy maniraka anao any amin’ny vahoaka izay miteny fiteny vahiny sarotra takarina Aho, fa any amin’ny vahoakan’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha maniraka anao hankany amin’ireo firenen-kafa izay miteny fiteny vahiny sarotra sy mety tsy ho takatrao Aho, dia tsy isalasalana fa hihaino anao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny Israelita kosa tsy hanaiky hihaino anao satria tsy te hihaino Ahy izy, fa olona mafy loha sady be kirina izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa hataoko sahy mifanatri-tava aminy ianao, ary hataoko mafy loha tahaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eny, hataoko mafy lalandava ny lohanao ary mafy lavitra noho ny vatolampy aza. Ka aza matahotra azy ianao, ary aza mivadi-po noho ny fihetsika ataon’io vahoaka maditra io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia notohizany hoe: «Ry ilay taranak’olombelona, raiso ao am-ponao ary henoy tsara ny teny rehetra izay ambarako anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Avy eo dia mankanesa any amin’ireo babo izay isan’ny mpiray firenena aminao, ka mitenena aminy hoe: ‹Izao no lazain’ny Tompo ANDRIANANAHARY.› Mitenena aminy na hihaino izy na tsy hihaino.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny Fanahin’Andriamanitra nanainga ahy hiala amin’ny tany; dia nandre horakoraka mafy tao ivohoko aho nanao hoe: «Hoderaina anie ny TOMPO any amin’ny toerana izay isehoan’ny voninahiny.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Reko koa ny fikopakopaky ny elatr’ireo zava-miaina izay nifanendry sy ny feon’ny kodiarana teo anilany, ka kotaba moa izao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nentin’ny Fanahy izay nanainga ahy niala avy tamin’ny tany aho. Voasariky ny herin’ny TOMPO aho ka tsy nahatohitra, fa lasa nandeha tamin’ny fo nalahelo sady nangitakitaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tonga tany Tela-Abiba aho ka mby teo anivon’ireo babo izay nipetraka teo amoron’ny ony Kebara; ary niara-nitoetra taminy tao fito andro aho sady talanjona aoka izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ho mpitily ho an’ny firenen’i Israely i Ezekiela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nony afaka fito andro dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Ry ilay taranak’olombelona, ataoko mpitily ho an’ny Israelita ianao; koa hohenoinao ny teniko ary hampitainao aminy ny fampitandremana avy amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Andeha hataontsika hoe misy olon-dratsy iray tiako hilazana fa hahafaty azy tokoa ny afitsony: raha tsy mampitandrina azy ianao hialany amin’ny toe-dratsiny mba hahavelomany, dia ho faty noho ny otany tokoa izany olon-dratsy izany, nefa ianao no tazoniko ho tompon’andraikitra amin’ny fahafatesany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha ohatra kosa ka nampitandrina azy ianao, nefa tsy nanaiky hiala tamin’ny fahadisoany sy ny toe-dratsiny izy, dia ho faty noho ny otany tokoa izy, fa ianao kosa hahavonjy ny ainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Andeha hataontsika hoe misy olo-marina iray miala amin’ny tsara ka manao ny ratsy: hataoko hampidi-doza aminy izany ka ho faty izy. Raha tsy mampitandrina azy ny amin’io loza io ianao, dia ho faty noho ny otany izy; fa tsy hisaiko ny asa soa nataony taloha ary ianao no tazoniko ho tompon’andraikitra amin’ny fahafatesany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa raha nampitandrina io olo-marina io kosa ianao mba tsy hanao ratsy ka mifady ny ratsy tokoa izy, dia mety ho velona izy noho ny fampitandremana nataonao; sady hahavonjy ny ainao koa ianao.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teren’ny Tompo hangina aloha i Ezekiela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary voasariky ny herin’ny TOMPO indray aho, ka hoy Izy tamiko: «Mitsangàna, mankanesa any an-dohasaha fa any no hitenenako aminao.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nitsangana aho, ka nandeha nankany an-dohasaha. Ary indro ny voninahitry ny TOMPO niseho tao tahaka ilay efa nahitako azy teo amoron’ny ony Kebara, koa nikarapoka nihohoka aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tamin’izay dia niditra tao amiko ny Fanahin’Andriamanitra ka nampitsangana ahy. Ary hoy ny Tompo tamiko: «Mandehàna mihidy ao an-tranonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ao no hotadina ianao, ry ilay taranak’olombelona, ka hafatotra tsy ho afa-mivoaka ny trano intsony hankeo amin’ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hampiraiketiko amin’ny lanilaninao ny lelanao, ka hanjary moana tsy ho afa-mananatra io firenena maditra io ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nefa raha misy zavatra holazaiko amin’ny alalanao, dia hataoko afa-miteny ianao. Amin’izay dia hiteny aminy ianao ka hanao hoe: «Izao no lazain’ny Tompo ANDRIANANAHARY». Ny sasany dia ho vonona hihaino anao, fa ny sasany kosa tsy hanaiky hihaino anao satria vahoaka maditra izy.»'
