document_id: EZK.3,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia hoy Ilay niteny tamiko hoe: «Ry ilay taranak’olombelona'
  - type: note
    content: 'Ry ilay taranak’olombelona: jereo 2.1 sy nta. –Momba ny and 1-3, jereo Apôk 10.9-10.'
  - type: text
    content: ', hano io horonan-taratasy izay naseho anao io, dia mandehana miteny amin’ny Israelita.» '
  '10':
  - type: text
    content: 'Dia notohizany hoe: «Ry ilay taranak’olombelona, raiso ao am-ponao ary henoy tsara ny teny rehetra izay ambarako anao. '
  '11':
  - type: text
    content: 'Avy eo dia mankanesa any amin’ireo babo izay isan’ny mpiray firenena aminao, ka mitenena aminy hoe: ‹Izao no lazain’ny Tompo ANDRIANANAHARY.› Mitenena aminy na hihaino izy na tsy hihaino.»'
  '12':
  - type: text
    content: 'Ary ny Fanahin’Andriamanitra nanainga ahy hiala amin’ny tany; dia nandre horakoraka mafy tao ivohoko aho nanao hoe: «Hoderaina anie ny TOMPO any amin’ny toerana izay isehoan’ny voninahiny.» '
  '13':
  - type: text
    content: 'Reko koa ny fikopakopaky ny elatr’ireo zava-miaina izay nifanendry sy ny feon’ny kodiarana teo anilany, ka kotaba moa izao! '
  '14':
  - type: text
    content: 'Dia nentin’ny Fanahy izay nanainga ahy niala avy tamin’ny tany aho. Voasariky ny herin’ny TOMPO aho ka tsy nahatohitra, fa lasa nandeha tamin’ny fo nalahelo sady nangitakitaka. '
  '15':
  - type: text
    content: Tonga tany Tela-Abiba aho ka mby teo anivon’ireo babo izay nipetraka teo amoron’ny ony Kebara; ary niara-nitoetra taminy tao fito andro aho sady talanjona aoka izany.
  - type: heading
    content: Ho mpitily ho an’ny firenen’i Israely i Ezekiela
  '16':
  - type: text
    content: 'Nony afaka fito andro dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '17':
  - type: text
    content: '«Ry ilay taranak’olombelona, ataoko mpitily ho an’ny Israelita ianao; koa hohenoinao ny teniko ary hampitainao aminy ny fampitandremana avy amiko. '
  '18':
  - type: text
    content: 'Andeha hataontsika hoe misy olon-dratsy iray tiako hilazana fa hahafaty azy tokoa ny afitsony: raha tsy mampitandrina azy ianao hialany amin’ny toe-dratsiny mba hahavelomany, dia ho faty noho ny otany tokoa izany olon-dratsy izany, nefa ianao no tazoniko ho tompon’andraikitra amin’ny fahafatesany. '
  '19':
  - type: text
    content: 'Raha ohatra kosa ka nampitandrina azy ianao, nefa tsy nanaiky hiala tamin’ny fahadisoany sy ny toe-dratsiny izy, dia ho faty noho ny otany tokoa izy, fa ianao kosa hahavonjy ny ainao. '
  '2':
  - type: text
    content: 'Dia nosokafako ny vavako ary nafahany ahy ilay horonan-taratasy. '
  '20':
  - type: text
    content: 'Andeha hataontsika hoe misy olo-marina iray miala amin’ny tsara ka manao ny ratsy: hataoko hampidi-doza aminy izany ka ho faty izy. Raha tsy mampitandrina azy ny amin’io loza io ianao, dia ho faty noho ny otany izy; fa tsy hisaiko ny asa soa nataony taloha ary ianao no tazoniko ho tompon’andraikitra amin’ny fahafatesany. '
  '21':
  - type: text
    content: Fa raha nampitandrina io olo-marina io kosa ianao mba tsy hanao ratsy ka mifady ny ratsy tokoa izy, dia mety ho velona izy noho ny fampitandremana nataonao; sady hahavonjy ny ainao koa ianao.»
  - type: heading
    content: Teren’ny Tompo hangina aloha i Ezekiela
  '22':
  - type: text
    content: 'Ary voasariky ny herin’ny TOMPO indray aho, ka hoy Izy tamiko: «Mitsangàna, mankanesa any an-dohasaha fa any no hitenenako aminao.» '
  '23':
  - type: text
    content: 'Dia nitsangana aho, ka nandeha nankany an-dohasaha. Ary indro ny voninahitry ny TOMPO niseho tao tahaka ilay efa nahitako azy teo amoron’ny ony Kebara, koa nikarapoka nihohoka aho. '
  '24':
  - type: text
    content: 'Tamin’izay dia niditra tao amiko ny Fanahin’Andriamanitra ka nampitsangana ahy. Ary hoy ny Tompo tamiko: «Mandehàna mihidy ao an-tranonao. '
  '25':
  - type: text
    content: 'Ao no hotadina ianao, ry ilay taranak’olombelona, ka hafatotra tsy ho afa-mivoaka ny trano intsony hankeo amin’ny Israelita. '
  '26':
  - type: text
    content: 'Hampiraiketiko amin’ny lanilaninao ny lelanao, ka hanjary moana tsy ho afa-mananatra io firenena maditra io ianao. '
  '27':
  - type: text
    content: 'Nefa raha misy zavatra holazaiko amin’ny alalanao, dia hataoko afa-miteny ianao. Amin’izay dia hiteny aminy ianao ka hanao hoe: «Izao no lazain’ny Tompo ANDRIANANAHARY». Ny sasany dia ho vonona hihaino anao, fa ny sasany kosa tsy hanaiky hihaino anao satria vahoaka maditra izy.»'
  '3':
  - type: text
    content: 'Ary hoy Izy tamiko: «Ry ilay taranak’olombelona, fenoy ny kibonao ary vokiso amin’io horonan-taratasy omena anao io ny tenanao.» Dia nohaniko izany, ka tao am-bavako dia mamy toy ny tantely.'
  '4':
  - type: text
    content: 'Ary hoy indray Izy: «Ry ilay taranak’olombelona, mandehana mankany amin’ny Israelita ka ampitao aminy ny teniko. '
  '5':
  - type: text
    content: 'Tsy maniraka anao any amin’ny vahoaka izay miteny fiteny vahiny sarotra takarina Aho, fa any amin’ny vahoakan’i Israely. '
  '6':
  - type: text
    content: 'Raha maniraka anao hankany amin’ireo firenen-kafa izay miteny fiteny vahiny sarotra sy mety tsy ho takatrao Aho, dia tsy isalasalana fa hihaino anao izy. '
  '7':
  - type: text
    content: 'Fa ny Israelita kosa tsy hanaiky hihaino anao satria tsy te hihaino Ahy izy, fa olona mafy loha sady be kirina izy rehetra. '
  '8':
  - type: text
    content: 'Kanefa hataoko sahy mifanatri-tava aminy ianao, ary hataoko mafy loha tahaka azy. '
  '9':
  - type: text
    content: 'Eny, hataoko mafy lalandava ny lohanao ary mafy lavitra noho ny vatolampy aza. Ka aza matahotra azy ianao, ary aza mivadi-po noho ny fihetsika ataon’io vahoaka maditra io. '
