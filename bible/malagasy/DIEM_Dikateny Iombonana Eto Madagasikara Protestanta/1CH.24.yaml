document_id: 1CH.24,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpisorona voazara ho antokony 24
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin’ireo taranak’i Aharôna dia nisy fitsinjarana azy ho antokony. Ny zanakalahin’i Aharôna dia i Nadaba sy i Abihò ary i Elehazara sy i Itamara. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny fahafito, azon’i Hakôtsa; ny fahavalo, azon’i Abià; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny fahasivy, azon’i Jesoa; ny fahafolo, azon’i Sekanià; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny faha-11, azon’i Eliasiba; ny faha-12, azon’i Jakima; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny faha-13, azon’i Hopà; ny faha-14, azon’i Jesebaba; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny faha-15, azon’i Bilgà; ny faha-16, azon’i Imera; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny faha-17, azon’i Hezira; ny faha-18, azon’i Hapitsetsa; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny faha-19, azon’i Petahià, ny faharoapolo, azon’i Ezekiela; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny faha-21, azon’i Jakina; ny faha-22, azon’i Gamola; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny faha-23, azon’i Delaià; ny faha-24, azon’i Mahazià.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no fitsinjarana ny taranak’i Aharôna ho antokony amin’ny fanompoany avy, mba hahatongavany ao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ; araka ny fitsipika izay tena nifandraika tamin’ny didy nomen’ny TOMPO Andriamanitr’i Israely no nampitan’i Aharôna razambeny azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lisitra fanampiny momba ny levita
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maty talohan-drainy sady tsy nanan-janaka i Nadaba sy i Abihò
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 10.1-2.
      marker-yv: yv-n
    - type: text
      text: '; koa dia i Elehazara sy i Itamara no nanao ny raharaha maha mpisorona. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin’ireo levita sisa dia izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ity lisitra ity dia mamerina sy manampy kely indraindray ny lisitra ao amin’ny toko 23, sady koa misy miova ny fanoratana anarana ombieniombieny.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Hamrama dia i Sobaela; ary tamin’ny zanakalahin’i Sobaela dia i Jehedeià. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny zanakalahin’i Rehabià dia i Jisià no filohany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny zanakalahin’i Jitsehara dia i Selômôta; ary tamin’ny zanakalahin’i Selômôta dia i Jahata. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny zanakalahin’i Hebrôna dia i Jerià no lahimatoa, i Amarià no lahiaivo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny zanakalahin’i Hebrôna... i Amarià no lahiaivo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'namboarina avy amin’ny 23.19 izany; fa misy banga eto ny RM izay midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Benay, Jerià, i Amaria lahiaivo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', i Jahaziela no fahatelo ary i Jekamehama no faralahy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Hoziela dia i Mikà; ary tamin’ny zanakalahin’i Mikà dia i Samira. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jisià no rahalahin’i Mikà; ary tamin’ny zanakalahin’i Jisià dia i Zakarià. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Merarỳ dia i Mahilỳ sy i Mosỳ ary i Jahazià. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zafin’i Merarỳ, tamin’i Jahazià zanany, dia i Sôhama sy i Zakora ary i Hibrỳ; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny zafin’i Merarỳ, tamin’i Mahilỳ, dia i Elehazara (izay tsy nanan-janakalahy) '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy i Kisy (izay i Jerahimeela no isan’ny zanakalahiny). '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tatỳ aoriana, dia i Davida sy i Tsadôka taranak’i Elehazara mbamin’i Ahimelèka taranak’i Itamara, no nitsinjara ireo taranak’i Aharôna ho antokony araka ny tandrifin’ny fanompoany avy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zanakalahin’i Mosỳ kosa dia i Mahilỳ sy i Hedera ary i Jerimôta.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no taranaky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' araka ny fianakaviany avy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toraka ireo rahalahiny, taranak’i Aharôna, ny levita koa dia mba notsinjaraina fanompoana tamin’ny antsapaka teo anatrehan’i Davida mpanjaka, teo anatrehan’i Tsadôka sy i Abimelèka, ary teo anatrehan’ny loham-pianakavian’ny mpisorona sy ny loham-pianakavian’ny levita: samy natao antsapaka mifanarakaraka na ny fianakavian’ny zokiny na ny fianakavian’ny zandriny.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hita ho maro kokoa ireo lehilahy loham-pianakaviana tamin’ny taranak’i Elehazara noho ny tamin’ny taranak’i Itamara; ka ny taranak’i Elehazara dia notsinjaraina hisy loham-pianakaviana 16, ary ny taranak’i Itamara dia notsinjaraina hisy loham-pianakaviana valo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samy natao antsapaka ny fitsinjarana azy rehetra, satria samy mpiandraikitra ny Toeramasina sy mpiandraikitra ny raharahan’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tsy fantatra izay tena tondroin’ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpiandraikitra ny Toeramasina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpiandraikitra ny raharahan’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Toa maneho fifampiandaniana teo amin’ny taranak’i Elehazara sy i Itamara izany, kanefa iezahan’ny mpanoratra ny mandravona azy.
      marker-yv: yv-n
    - type: text
      text: ', na ny avy tamin’ny taranak’i Elehazara na ny avy tamin’ny taranak’i Itamara.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Semahià, izay zanakalahin’i Natanaela sady mpitantsoratra anankiray anisan’ny levita, no nanoratra izany fitsinjarazarana izany teo anatrehan’ny mpanjaka sy ny mpanapaka, teo anatrehan’i Tsadôka mpisorona sy i Ahimelèka zanakalahin’i Abiatara, ary teo anatrehan’ny loham-pianakavian’ny mpisorona sy ny loham-pianakavian’ny levita: hatrany hatrany, dia fianakaviana roa no nalaina antsapaka tamin’ny terak’i Elehazara, vao iray kosa tamin’ny terak’i Itamara'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eo amin’ny faran’ny and 6 dia tsy mazava ny RM; ny fahafantarana fa ny taranak’i Elehazara dia avo roa heny miohatra amin’ny an’i Itamara no mahatonga ny dkt aroso.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny antsapaka voalohany dia azon’i Jôiariba; ny faharoa, azon’i Jedahià; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny fahatelo, azon’i Harima; ny fahefatra, azon’i Sehôrima; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny fahadimy, azon’i Malkià; ny fahenina, azon’i Miamîna; '
