document_id: ZEC.13,396
type_code: plt
verses:
  '1':
  - type: text
    content: «Amin’izany andro izany, dia hisy loharano mifantsitsitra hanasa ny loto amam-pahotan’ny taranak’i Davida sy ny mponin’i Jerosalema.»
  - type: heading
    content: Hofoanan’Andriamanitra ny sampy sy ny mpaminany sandoka
  '2':
  - type: text
    content: '«Amin’izany andro izany, hoy ny teny hentitra avy amiko Tompon’izao rehetra izao, dia hofoanako amin’ny firenena ny anaran-tsampy ka tsy hisy hahatsiaro izany intsony. Hoesoriko ihany koa ireo mihambo ho '
  - type: text
    content: mpaminany
  - type: text
    content: ' ary horavako ny fitiavanareo hanompo sampy. '
  '3':
  - type: text
    content: 'Raha mbola misy mihambo haminany ihany, dia ny ray aman-dreniny niteraka azy no hiteny aminy hoe: «Ho faty tokoa ianao satria mihambo hiteny amin’ny anaran’ny Tompo, kanefa dia mandainga.» Ary ireo ray aman-dreniny hanomboka antsy azy mandra-pahafatiny, raha mbola maminany izy. '
  '4':
  - type: text
    content: 'Amin’izany andro izany, ny mpaminany ho menatra ny haminany sy hilaza ny fahitany, ka tsy ho sahy hamita-bahoaka intsony amin’ny fitafiana akanjo volom-biby, '
  '5':
  - type: text
    content: 'fa samy hiteny hoe: «Tsy mpaminany aho fa mpamboly. Hatramin’ny fahatanorako no efa nananako tany'
  - type: note
    content: 'Hatramin’ny fahatanorako no efa nananako tany: mety ho dikan’ny rijan-teny hebreo izay tsy dia mazava ny heviny.'
  - type: text
    content: '!» '
  '6':
  - type: text
    content: 'Ary raha misy manontany azy hoe: «Inona itony ratra amin’ny tratranao itony?», dia hovaliany hoe: «Ratra azoko tany an-tranon’ny namako ireny'
  - type: note
    content: 'tany an-tranon’ny namako: hebreo tany an-tranon’ireo tia ahy; dkt hafa koa tany an-tranon’ny sakaizako, izany hoe ireo andriamanitra sandoka izay nandratran’ireo mpaminany sandoka ny tratrany ho fanomezam-boninahitra azy (jereo 1 Mp 18.28).'
  - type: text
    content: '!»'
  - type: heading
    content: Ny fanekempihavanana nohavaozina
  '7':
  - type: text
    content: 'Dia hoy ny teny hentitry ny Tompon’izao rehetra izao hoe:'
  - type: text
    content: «Ry sabatra, mifohaza hamely
  - type: text
    content: ity mpiandry sady lehilahy namako ity
  - type: text
    content: 'Asio ny '
  - type: text
    content: mpiandry
  - type: text
    content: ', dia hiparitaka ny ondry'
  - type: note
    content: 'Asio ny mpiandry, dia hiparitaka ny ondry: io fehezanteny io dia voalaza ao Mt 26.31 sy Mk 14.27.'
  - type: text
    content: ;
  - type: text
    content: ary hiverina hamely hatramin’ny madinika Aho.»
  '8':
  - type: text
    content: 'Dia hoy indray ny teny hentitry ny Tompon’izao rehetra izao hoe: «Ho faty ny androatokon’ny mponina amin’ny firenena manontolo, fa ny ampahatelony ihany sisa no ho velona. '
  '9':
  - type: text
    content: 'Ary hotsapaiko io ampahatelony io ka hodioviko toy ny fandrendrika volamena sy volafotsy amin’ny afo. Koa hivavaka amiko izy, ary hamaly azy Aho. Dia hilaza aminy Aho hoe: ‹Ry vahoakako› ary izy hanao hoe: ‹Ny Tompo no Andriamanitray'
  - type: note
    content: Jereo 8.3; Fanaf 6.7; Deot 29.12; Jer 7.23; Ezek 11.20; Hôs 2.25.
  - type: text
    content: ›. »
