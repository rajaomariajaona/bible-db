document_id: ZEC.13,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: «Amin’izany andro izany, dia hisy loharano mifantsitsitra hanasa ny loto amam-pahotan’ny taranak’i Davida sy ny mponin’i Jerosalema.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hofoanan’Andriamanitra ny sampy sy ny mpaminany sandoka
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Amin’izany andro izany, hoy ny teny hentitra avy amiko Tompon’izao rehetra izao, dia hofoanako amin’ny firenena ny anaran-tsampy ka tsy hisy hahatsiaro izany intsony. Hoesoriko ihany koa ireo mihambo ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ary horavako ny fitiavanareo hanompo sampy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Raha mbola misy mihambo haminany ihany, dia ny ray aman-dreniny niteraka azy no hiteny aminy hoe: «Ho faty tokoa ianao satria mihambo hiteny amin’ny anaran’ny Tompo, kanefa dia mandainga.» Ary ireo ray aman-dreniny hanomboka antsy azy mandra-pahafatiny, raha mbola maminany izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Amin’izany andro izany, ny mpaminany ho menatra ny haminany sy hilaza ny fahitany, ka tsy ho sahy hamita-bahoaka intsony amin’ny fitafiana akanjo volom-biby, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'fa samy hiteny hoe: «Tsy mpaminany aho fa mpamboly. Hatramin’ny fahatanorako no efa nananako tany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hatramin’ny fahatanorako no efa nananako tany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mety ho dikan’ny rijan-teny hebreo izay tsy dia mazava ny heviny.
      marker-yv: yv-n
    - type: text
      text: '!» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary raha misy manontany azy hoe: «Inona itony ratra amin’ny tratranao itony?», dia hovaliany hoe: «Ratra azoko tany an-tranon’ny namako ireny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tany an-tranon’ny namako: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hebreo tany an-tranon’ireo tia ahy; dkt hafa koa tany an-tranon’ny sakaizako, izany hoe ireo andriamanitra sandoka izay nandratran’ireo mpaminany sandoka ny tratrany ho fanomezam-boninahitra azy (jereo 1 Mp 18.28).
      marker-yv: yv-n
    - type: text
      text: '!»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanekempihavanana nohavaozina
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy ny teny hentitry ny Tompon’izao rehetra izao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ry sabatra, mifohaza hamely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ity mpiandry sady lehilahy namako ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Asio ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpiandry
    - type: text
      text: ', dia hiparitaka ny ondry'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Asio ny mpiandry, dia hiparitaka ny ondry: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: io fehezanteny io dia voalaza ao Mt 26.31 sy Mk 14.27.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiverina hamely hatramin’ny madinika Aho.»
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia hoy indray ny teny hentitry ny Tompon’izao rehetra izao hoe: «Ho faty ny androatokon’ny mponina amin’ny firenena manontolo, fa ny ampahatelony ihany sisa no ho velona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hotsapaiko io ampahatelony io ka hodioviko toy ny fandrendrika volamena sy volafotsy amin’ny afo. Koa hivavaka amiko izy, ary hamaly azy Aho. Dia hilaza aminy Aho hoe: ‹Ry vahoakako› ary izy hanao hoe: ‹Ny Tompo no Andriamanitray'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 8.3; Fanaf 6.7; Deot 29.12; Jer 7.23; Ezek 11.20; Hôs 2.25.
      marker-yv: yv-n
    - type: text
      text: ›. »
