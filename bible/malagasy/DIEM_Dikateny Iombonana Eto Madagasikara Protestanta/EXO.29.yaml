    children:
    - type: text
      text: Ny fanokanana mpisorona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Toy izao no zavatra hataonao rehefa hanokana an’i Aharôna sy ny zanany lahy ho mpisorona ho Ahy ianao:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Makà vantotr’ombilahy iray sy ondrilahy roa tsy misy kilema. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hoentina eo anoloan’ny Tranolay fihaonana ny ombilahy, ka hametrahan’i Aharôna sy ny zanany lahy tanana eo an-dohan’ny ombilahy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hovonoina ho faty eo anatrehako Izaho TOMPO izany, eo akaikin’ny varavaran’ny Tranolay fihaonana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanalanao ny rany ka hatentinao amin’ny fanondro eo amin’ny tandroky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ', ary ny sisa kosa dia haidinao eo am-pototry ny alitara. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Halainao ny sabora izay mandrakotra ny tsinainy mbamin’ny saron’atiny ary ny voany roa mbamin’ny sabora eo aminy, dia hodoranao eo ambony alitara avokoa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' fanalana ny otan’ny mpisorona izany. Fa ny sisa rehetra amin’ilay ombilahy kosa, toy ny henany, ny hoditra mbamin’ny tain-drorohany, dia dory amin’ny afo any ivelan’ny toby.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Avy eo dia halaina ny ondrilahy iray, ka hametrahan’i Aharôna sy ny zanany lahy tanana eo amin’ny lohany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hovonoinao ho faty ilay ondrilahy ary hotantazanao ny rany, dia hafafinao amin’ny lafiny alitara manodidina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hotetehinao ho vongana madinika ny ondrilahy; hosasanao ny tsinainy sy ny tongony ka hapetrakao eo ambony alitara, eo ambonin’ireo vongana madinika sy ny lohany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hodoranao ilay biby manontolo mba ho sorona dorana manontolo ho Ahy TOMPO: ho hanitra ankasitrahina ho AHY io sorona io'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Ef 5.2; Fil 4.18.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Avy eo dia halaina koa ny ondrilahy faharoa, ka hametrahan’i Aharôna sy ny zanany lahy tanana eo amin’ny lohany. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Makà kobam-barimbazaha, ka manaova mofo tsy misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviora
    - type: text
      text: ', mofo mamy misy diloilo saingy tsy misy leviora, ary mofo manify tsy misy leviora sady voararaka diloilo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hovonoinao ho faty ilay ondrilahy, ary hanalanao ny rany ka hatentinao amin’ny tendron-dravintsofina ankavanan’i Aharôna sy ny zanany, ary amin’ny ankiben-tongotra aman-tanany ankavanana avy; avy eo dia hafafinao amin’ny lafin’ny alitara ambony manodidina ny ra sisa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanalanao kely ny ra eo ambony alitara sy ny ilomasina fanokanana, dia hafafinao amin’i Aharôna sy ny fanamiany ary amin’ny zanany lahy sy ny fanamiany; amin’izay dia ho masina i Aharôna sy ny zanany lahy mbamin’ny fanamany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny ondrilahy faharoa dia mariky ny fametrahana ny mpisorona amin’ny raharahany. Koa halainao ny hofany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny hofany '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: no matavy indrindra amin’ny karazana ondry sasany. Ampit Lev 3.9.
      marker-yv: yv-n
    - type: text
      text: ', ny sabora mandrakotra ny tsinainy sy ny saron’atiny, ny voany roa mbamin’ny sabora eo aminy, ary ny sorony havanana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hakanao mofo boribory iray sy mofomamy misy diloilo iray, ary mofo manify iray avy ao amin’ny harona misy ny mofo tsy misy leviora izay apetraka eo anatrehako Izaho TOMPO. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hapetrakao eo am-pelatanan’i Aharôna sy ny zanany ireo, ka hasainao ahevahevany eo anatrehako ho fanatitra ahevaheva. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia halainao eny an-tanany ireo ka hodoranao hanetona eo ambony alitara miaraka amin’ny sorona dorana manontolo: ho sorona atolotra Ahy TOMPO izany, ka ho hanitra ankasitrahina ho AHY. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary halainao ny tratran’ny ondrilahy faharoa izay nanokanana an’i Aharôna ka hahevahevanao eo anatrehako Izaho TOMPO toy ny fanatitra ahevaheva fa iny no anjara ho anao.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hambaranao fa masina ny tratrany sy ny sorony nalaina tamin’ny ondry fanokanana an’i Aharôna ka nahevaheva sy nasandratra teo anatrehako. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, rehefa manao sorom-pihavanana amiko ny Israelita rehetra, dia hanavaka ny soron-kena sy ny tratrany amin’ireo biby mba ho anjara raikitra ho an’i Aharôna sy ny taranany: zavatra avahana ho Ahy TOMPO izany.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Rehefa maty i Aharôna, dia hafindra amin’ny taranany ny fanamiana masina; ka ireo no hiakanjo azy amin’ny andro hanokanana sy hametrahana azy amin’ny raharahany. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ataovy ao anaty harona iray ireo, ary ento ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' miaraka amin’ny vantotr’ombilahy sy ny ondrilahy roa.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpisorona hisolo an’i Aharôna dia hitondra ireo akanjo ireo mandritra ny fito andro, rehefa miditra ao amin’ny Tranolay fihaonana mba hanatanteraka ny raharahany ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: .
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Halaina ny ondrilahy fanokanana, ilay faharoa, dia handrahoina ao amin’ny toerana iray voatokana ny henany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hohanin’i Aharôna sy ny zanany, miaraka amin’ny mofo sisa ao amin’ny harona, eo am-baravaran’ny Tranolay fihaonana izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy ireo ihany no mahazo mihinana izay nampiasaina tamin’ny fanokanana sy ny fametrahana azy eo amin’ny raharahany mba hahazoany famelan-keloka amin’ny Tompo. Tsy misy olon-kafa mahazo mihinana ireo, fa sakafo masina ireo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy sisa tsy lany tra-maraina ny hena sy ny mofo, dia hodorana fa tsy azo hanina satria sakafo masina.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Mifanaraka tanteraka amin’ny torolalana efa nomeko anao no hataonao amin’i Aharôna sy ny zanany. Haharitra fito andro ny lanonana fametrahana azy amin’ny asany.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Isan’andro dia hanolotra ombilahy iray ho sorona ahazoana famelan-keloka ianao. Hataonao izany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hanadiovana
    - type: text
      text: ' ny alitara fisoronana; ary horarahanao diloilo ny alitara mba hanokanana azy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Haharitra fito andro koa io lanonana io; ka raha afaka izany, dia ho masina indrindra ny alitara, ary izay rehetra mahakasika azy na olona na zavatra dia hiharan-doza.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo sorona dorana manontolo fanao isan’andro
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Zanakondry iray taona roa isan’andro no hatolotra tsy tapaka eo ambony '
    - type: usfm
