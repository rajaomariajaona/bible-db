document_id: EXO.29,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanokanana mpisorona
  - type: text
    content: '«Toy izao no zavatra hataonao rehefa hanokana an’i Aharôna sy ny zanany lahy ho mpisorona ho Ahy ianao:'
  - type: text
    content: '–Makà vantotr’ombilahy iray sy ondrilahy roa tsy misy kilema. '
  '10':
  - type: text
    content: '«Hoentina eo anoloan’ny Tranolay fihaonana ny ombilahy, ka hametrahan’i Aharôna sy ny zanany lahy tanana eo an-dohan’ny ombilahy. '
  '11':
  - type: text
    content: 'Hovonoina ho faty eo anatrehako Izaho TOMPO izany, eo akaikin’ny varavaran’ny Tranolay fihaonana. '
  '12':
  - type: text
    content: 'Hanalanao ny rany ka hatentinao amin’ny fanondro eo amin’ny tandroky ny '
  - type: text
    content: alitara
  - type: text
    content: ', ary ny sisa kosa dia haidinao eo am-pototry ny alitara. '
  '13':
  - type: text
    content: 'Halainao ny sabora izay mandrakotra ny tsinainy mbamin’ny saron’atiny ary ny voany roa mbamin’ny sabora eo aminy, dia hodoranao eo ambony alitara avokoa. '
  '14':
  - type: text
    content: 'Ho '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny otan’ny mpisorona izany. Fa ny sisa rehetra amin’ilay ombilahy kosa, toy ny henany, ny hoditra mbamin’ny tain-drorohany, dia dory amin’ny afo any ivelan’ny toby.'
  '15':
  - type: text
    content: '«Avy eo dia halaina ny ondrilahy iray, ka hametrahan’i Aharôna sy ny zanany lahy tanana eo amin’ny lohany. '
  '16':
  - type: text
    content: 'Hovonoinao ho faty ilay ondrilahy ary hotantazanao ny rany, dia hafafinao amin’ny lafiny alitara manodidina. '
  '17':
  - type: text
    content: 'Hotetehinao ho vongana madinika ny ondrilahy; hosasanao ny tsinainy sy ny tongony ka hapetrakao eo ambony alitara, eo ambonin’ireo vongana madinika sy ny lohany. '
  '18':
  - type: text
    content: 'Hodoranao ilay biby manontolo mba ho sorona dorana manontolo ho Ahy TOMPO: ho hanitra ankasitrahina ho AHY io sorona io'
  - type: note
    content: Jereo Ef 5.2; Fil 4.18.
  - type: text
    content: .
  '19':
  - type: text
    content: '«Avy eo dia halaina koa ny ondrilahy faharoa, ka hametrahan’i Aharôna sy ny zanany lahy tanana eo amin’ny lohany. '
  '2':
  - type: text
    content: 'Makà kobam-barimbazaha, ka manaova mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ', mofo mamy misy diloilo saingy tsy misy leviora, ary mofo manify tsy misy leviora sady voararaka diloilo. '
  '20':
  - type: text
    content: 'Hovonoinao ho faty ilay ondrilahy, ary hanalanao ny rany ka hatentinao amin’ny tendron-dravintsofina ankavanan’i Aharôna sy ny zanany, ary amin’ny ankiben-tongotra aman-tanany ankavanana avy; avy eo dia hafafinao amin’ny lafin’ny alitara ambony manodidina ny ra sisa. '
  '21':
  - type: text
    content: 'Hanalanao kely ny ra eo ambony alitara sy ny ilomasina fanokanana, dia hafafinao amin’i Aharôna sy ny fanamiany ary amin’ny zanany lahy sy ny fanamiany; amin’izay dia ho masina i Aharôna sy ny zanany lahy mbamin’ny fanamany. '
  '22':
  - type: text
    content: Ny ondrilahy faharoa dia mariky ny fametrahana ny mpisorona amin’ny raharahany. Koa halainao ny hofany
  - type: note
    content: Ny hofany no matavy indrindra amin’ny karazana ondry sasany. Ampit Lev 3.9.
  - type: text
    content: ', ny sabora mandrakotra ny tsinainy sy ny saron’atiny, ny voany roa mbamin’ny sabora eo aminy, ary ny sorony havanana. '
  '23':
  - type: text
    content: 'Hakanao mofo boribory iray sy mofomamy misy diloilo iray, ary mofo manify iray avy ao amin’ny harona misy ny mofo tsy misy leviora izay apetraka eo anatrehako Izaho TOMPO. '
  '24':
  - type: text
    content: 'Hapetrakao eo am-pelatanan’i Aharôna sy ny zanany ireo, ka hasainao ahevahevany eo anatrehako ho fanatitra ahevaheva. '
  '25':
  - type: text
    content: 'Avy eo dia halainao eny an-tanany ireo ka hodoranao hanetona eo ambony alitara miaraka amin’ny sorona dorana manontolo: ho sorona atolotra Ahy TOMPO izany, ka ho hanitra ankasitrahina ho AHY. '
  '26':
  - type: text
    content: Ary halainao ny tratran’ny ondrilahy faharoa izay nanokanana an’i Aharôna ka hahevahevanao eo anatrehako Izaho TOMPO toy ny fanatitra ahevaheva fa iny no anjara ho anao.
  '27':
  - type: text
    content: '«Hambaranao fa masina ny tratrany sy ny sorony nalaina tamin’ny ondry fanokanana an’i Aharôna ka nahevaheva sy nasandratra teo anatrehako. '
  '28':
  - type: text
    content: 'Noho izany, rehefa manao sorom-pihavanana amiko ny Israelita rehetra, dia hanavaka ny soron-kena sy ny tratrany amin’ireo biby mba ho anjara raikitra ho an’i Aharôna sy ny taranany: zavatra avahana ho Ahy TOMPO izany.'
  '29':
  - type: text
    content: '«Rehefa maty i Aharôna, dia hafindra amin’ny taranany ny fanamiana masina; ka ireo no hiakanjo azy amin’ny andro hanokanana sy hametrahana azy amin’ny raharahany. '
  '3':
  - type: text
    content: 'Ataovy ao anaty harona iray ireo, ary ento ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' miaraka amin’ny vantotr’ombilahy sy ny ondrilahy roa.'
  '30':
  - type: text
    content: 'Ny mpisorona hisolo an’i Aharôna dia hitondra ireo akanjo ireo mandritra ny fito andro, rehefa miditra ao amin’ny Tranolay fihaonana mba hanatanteraka ny raharahany ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: .
  '31':
  - type: text
    content: '«Halaina ny ondrilahy fanokanana, ilay faharoa, dia handrahoina ao amin’ny toerana iray voatokana ny henany. '
  '32':
  - type: text
    content: 'Hohanin’i Aharôna sy ny zanany, miaraka amin’ny mofo sisa ao amin’ny harona, eo am-baravaran’ny Tranolay fihaonana izany. '
  '33':
  - type: text
    content: 'Izy ireo ihany no mahazo mihinana izay nampiasaina tamin’ny fanokanana sy ny fametrahana azy eo amin’ny raharahany mba hahazoany famelan-keloka amin’ny Tompo. Tsy misy olon-kafa mahazo mihinana ireo, fa sakafo masina ireo. '
  '34':
  - type: text
    content: Raha misy sisa tsy lany tra-maraina ny hena sy ny mofo, dia hodorana fa tsy azo hanina satria sakafo masina.
  '35':
  - type: text
    content: «Mifanaraka tanteraka amin’ny torolalana efa nomeko anao no hataonao amin’i Aharôna sy ny zanany. Haharitra fito andro ny lanonana fametrahana azy amin’ny asany.
  '36':
  - type: text
    content: '«Isan’andro dia hanolotra ombilahy iray ho sorona ahazoana famelan-keloka ianao. Hataonao izany '
  - type: text
    content: hanadiovana
  - type: text
    content: ' ny alitara fisoronana; ary horarahanao diloilo ny alitara mba hanokanana azy. '
  '37':
  - type: text
    content: Haharitra fito andro koa io lanonana io; ka raha afaka izany, dia ho masina indrindra ny alitara, ary izay rehetra mahakasika azy na olona na zavatra dia hiharan-doza.
  - type: heading
    content: Ireo sorona dorana manontolo fanao isan’andro
  '38':
  - type: text
    content: '«Zanakondry iray taona roa isan’andro no hatolotra tsy tapaka eo ambony '
  - type: text
    content: alitara
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'Ny iray hatolotra ny maraina, ary ny iray hatolotra ny hariva. '
  '4':
  - type: text
    content: '«Ento hankeo am-baravaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' i Aharôna sy ireo zanany lahy, dia ampandroy amin’ny rano fandroana. '
  '40':
  - type: text
    content: 'Miaraka amin’ny zanakondry amin’ny maraina sy ny hariva, dia hitondrana koba telopolo kilao efa voakapoka amin’ny diloilo tsara iray litatra sy sasany sy fanatitra divay iray litatra sy sasany. Ireo dia ho '
  - type: text
    content: sorona
  - type: text
    content: ' atolotra Ahy TOMPO, ka ho hanitra ankasitrahina ho Ahy. '
  '42':
  - type: text
    content: 'Amin’ny hoavy dia tsy ho tapaka na oviana na oviana ny fanolorana sorona dorana manontolo ho Ahy TOMPO eo am-baravaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', fa eo no hihaonako aminareo sy hitenenako aminao.'
  '43':
  - type: text
    content: '«Eo amin’io toerana io no hihaonako amin’ny Israelita, ka ny voninahitro hanome hasina izany. '
  '44':
  - type: text
    content: 'Ny tenako mihitsy no hanokana ny Tranolay fihaonana sy ny alitara, tahaka ny hanokanako an’i Aharôna sy ny zanany lahy ho mpisorona ho Ahy. '
  '45':
  - type: text
    content: 'Hitoetra eo anivon’ny Israelita Aho sady ho Andriamaniny. '
  '46':
  - type: text
    content: Ka amin’izay no hiekeny fa Izaho no TOMPO Andriamaniny, dia Izaho Ilay namoaka azy hiala tany Ejipta mba hahazoako miara-monina aminy.
  - type: text
    content: «Izaho no TOMPO Andriamaniny.»
  '5':
  - type: text
    content: 'Avy eo dia ampiakanjoy an’i Aharôna ny fanamiana voatokana: dia ny akanjo lava ivelany, ny akanjo vita peta-kofehy, ny efôda ary ny saron-tratra, ka afatory ny samboadin’ny efôda. '
  '6':
  - type: text
    content: 'Apetraho eo an-dohany ny satroka fehiloha, ary apetraho amin’ny satroka fehiloha kosa ny marika maha voatokana. '
  '7':
  - type: text
    content: 'Dia alao ny ilomasina fanokanana ka araraho eo an-dohany, ary atokany izy. '
  '8':
  - type: text
    content: 'Ampanatony ireo zanakalahin’i Aharôna, ary ampanaovy ny akanjo vita peta-kofehy; '
  '9':
  - type: text
    content: apetaho ny fehikibony sy ny satroka boribory
  - type: note
    content: 'Apetaho ny fehikibony: araka ny dkt grika tranainy izany; ny RM dia misy teny fanampiny vitsivitsy hoe Apetaho amin’i Aharôna sy ny zanany lahy ny fehikibony; nefa ny filazalazana ny lanonana momba an’i Aharôna dia mifarana eo amin’ny and 7.'
  - type: text
    content: . Manomboka hatreo dia ho anjara raikitra ho azy ireo ny fisoronana.
  - type: text
    content: '«Ary toy izao no hanamarihanao ny fidiran’i Aharôna sy ny zanany lahy amin’ny raharahany:'
