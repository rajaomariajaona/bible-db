document_id: EXO.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanokanana mpisorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '«Toy izao no zavatra hataonao rehefa hanokana an’i Aharôna sy ny zanany lahy ho mpisorona ho Ahy ianao:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Makà vantotr’ombilahy iray sy ondrilahy roa tsy misy kilema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Makà kobam-barimbazaha, ka manaova mofo tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: ', mofo mamy misy diloilo saingy tsy misy leviora, ary mofo manify tsy misy leviora sady voararaka diloilo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ataovy ao anaty harona iray ireo, ary ento ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' miaraka amin’ny vantotr’ombilahy sy ny ondrilahy roa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Ento hankeo am-baravaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' i Aharôna sy ireo zanany lahy, dia ampandroy amin’ny rano fandroana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avy eo dia ampiakanjoy an’i Aharôna ny fanamiana voatokana: dia ny akanjo lava ivelany, ny akanjo vita peta-kofehy, ny efôda ary ny saron-tratra, ka afatory ny samboadin’ny efôda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Apetraho eo an-dohany ny satroka fehiloha, ary apetraho amin’ny satroka fehiloha kosa ny marika maha voatokana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia alao ny ilomasina fanokanana ka araraho eo an-dohany, ary atokany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ampanatony ireo zanakalahin’i Aharôna, ary ampanaovy ny akanjo vita peta-kofehy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: apetaho ny fehikibony sy ny satroka boribory
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Apetaho ny fehikibony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy izany; ny RM dia misy teny fanampiny vitsivitsy hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Apetaho amin’i Aharôna sy ny zanany lahy ny fehikibony;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' nefa ny filazalazana ny lanonana momba an’i Aharôna dia mifarana eo amin’ny and 7.'
    marker-yv: yv-n
  - type: text
    text: . Manomboka hatreo dia ho anjara raikitra ho azy ireo ny fisoronana.
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Ary toy izao no hanamarihanao ny fidiran’i Aharôna sy ny zanany lahy amin’ny raharahany:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Hoentina eo anoloan’ny Tranolay fihaonana ny ombilahy, ka hametrahan’i Aharôna sy ny zanany lahy tanana eo an-dohan’ny ombilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hovonoina ho faty eo anatrehako Izaho TOMPO izany, eo akaikin’ny varavaran’ny Tranolay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hanalanao ny rany ka hatentinao amin’ny fanondro eo amin’ny tandroky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ', ary ny sisa kosa dia haidinao eo am-pototry ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Halainao ny sabora izay mandrakotra ny tsinainy mbamin’ny saron’atiny ary ny voany roa mbamin’ny sabora eo aminy, dia hodoranao eo ambony alitara avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanalana ny otan’ny mpisorona izany. Fa ny sisa rehetra amin’ilay ombilahy kosa, toy ny henany, ny hoditra mbamin’ny tain-drorohany, dia dory amin’ny afo any ivelan’ny toby.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Avy eo dia halaina ny ondrilahy iray, ka hametrahan’i Aharôna sy ny zanany lahy tanana eo amin’ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hovonoinao ho faty ilay ondrilahy ary hotantazanao ny rany, dia hafafinao amin’ny lafiny alitara manodidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hotetehinao ho vongana madinika ny ondrilahy; hosasanao ny tsinainy sy ny tongony ka hapetrakao eo ambony alitara, eo ambonin’ireo vongana madinika sy ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hodoranao ilay biby manontolo mba ho sorona dorana manontolo ho Ahy TOMPO: ho hanitra ankasitrahina ho AHY io sorona io'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Ef 5.2; Fil 4.18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '«Avy eo dia halaina koa ny ondrilahy faharoa, ka hametrahan’i Aharôna sy ny zanany lahy tanana eo amin’ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hovonoinao ho faty ilay ondrilahy, ary hanalanao ny rany ka hatentinao amin’ny tendron-dravintsofina ankavanan’i Aharôna sy ny zanany, ary amin’ny ankiben-tongotra aman-tanany ankavanana avy; avy eo dia hafafinao amin’ny lafin’ny alitara ambony manodidina ny ra sisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hanalanao kely ny ra eo ambony alitara sy ny ilomasina fanokanana, dia hafafinao amin’i Aharôna sy ny fanamiany ary amin’ny zanany lahy sy ny fanamiany; amin’izay dia ho masina i Aharôna sy ny zanany lahy mbamin’ny fanamany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny ondrilahy faharoa dia mariky ny fametrahana ny mpisorona amin’ny raharahany. Koa halainao ny hofany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny hofany '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: no matavy indrindra amin’ny karazana ondry sasany. Ampit Lev 3.9.
    marker-yv: yv-n
  - type: text
    text: ', ny sabora mandrakotra ny tsinainy sy ny saron’atiny, ny voany roa mbamin’ny sabora eo aminy, ary ny sorony havanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hakanao mofo boribory iray sy mofomamy misy diloilo iray, ary mofo manify iray avy ao amin’ny harona misy ny mofo tsy misy leviora izay apetraka eo anatrehako Izaho TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hapetrakao eo am-pelatanan’i Aharôna sy ny zanany ireo, ka hasainao ahevahevany eo anatrehako ho fanatitra ahevaheva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Avy eo dia halainao eny an-tanany ireo ka hodoranao hanetona eo ambony alitara miaraka amin’ny sorona dorana manontolo: ho sorona atolotra Ahy TOMPO izany, ka ho hanitra ankasitrahina ho AHY. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary halainao ny tratran’ny ondrilahy faharoa izay nanokanana an’i Aharôna ka hahevahevanao eo anatrehako Izaho TOMPO toy ny fanatitra ahevaheva fa iny no anjara ho anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Hambaranao fa masina ny tratrany sy ny sorony nalaina tamin’ny ondry fanokanana an’i Aharôna ka nahevaheva sy nasandratra teo anatrehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Noho izany, rehefa manao sorom-pihavanana amiko ny Israelita rehetra, dia hanavaka ny soron-kena sy ny tratrany amin’ireo biby mba ho anjara raikitra ho an’i Aharôna sy ny taranany: zavatra avahana ho Ahy TOMPO izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '«Rehefa maty i Aharôna, dia hafindra amin’ny taranany ny fanamiana masina; ka ireo no hiakanjo azy amin’ny andro hanokanana sy hametrahana azy amin’ny raharahany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny mpisorona hisolo an’i Aharôna dia hitondra ireo akanjo ireo mandritra ny fito andro, rehefa miditra ao amin’ny Tranolay fihaonana mba hanatanteraka ny raharahany ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '«Halaina ny ondrilahy fanokanana, ilay faharoa, dia handrahoina ao amin’ny toerana iray voatokana ny henany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hohanin’i Aharôna sy ny zanany, miaraka amin’ny mofo sisa ao amin’ny harona, eo am-baravaran’ny Tranolay fihaonana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Izy ireo ihany no mahazo mihinana izay nampiasaina tamin’ny fanokanana sy ny fametrahana azy eo amin’ny raharahany mba hahazoany famelan-keloka amin’ny Tompo. Tsy misy olon-kafa mahazo mihinana ireo, fa sakafo masina ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Raha misy sisa tsy lany tra-maraina ny hena sy ny mofo, dia hodorana fa tsy azo hanina satria sakafo masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: «Mifanaraka tanteraka amin’ny torolalana efa nomeko anao no hataonao amin’i Aharôna sy ny zanany. Haharitra fito andro ny lanonana fametrahana azy amin’ny asany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '«Isan’andro dia hanolotra ombilahy iray ho sorona ahazoana famelan-keloka ianao. Hataonao izany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hanadiovana
  - type: text
    text: ' ny alitara fisoronana; ary horarahanao diloilo ny alitara mba hanokanana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Haharitra fito andro koa io lanonana io; ka raha afaka izany, dia ho masina indrindra ny alitara, ary izay rehetra mahakasika azy na olona na zavatra dia hiharan-doza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo sorona dorana manontolo fanao isan’andro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '«Zanakondry iray taona roa isan’andro no hatolotra tsy tapaka eo ambony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ny iray hatolotra ny maraina, ary ny iray hatolotra ny hariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 40-41
  - type: text
    text: 'Miaraka amin’ny zanakondry amin’ny maraina sy ny hariva, dia hitondrana koba telopolo kilao efa voakapoka amin’ny diloilo tsara iray litatra sy sasany sy fanatitra divay iray litatra sy sasany. Ireo dia ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' atolotra Ahy TOMPO, ka ho hanitra ankasitrahina ho Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Amin’ny hoavy dia tsy ho tapaka na oviana na oviana ny fanolorana sorona dorana manontolo ho Ahy TOMPO eo am-baravaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ', fa eo no hihaonako aminareo sy hitenenako aminao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '«Eo amin’io toerana io no hihaonako amin’ny Israelita, ka ny voninahitro hanome hasina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ny tenako mihitsy no hanokana ny Tranolay fihaonana sy ny alitara, tahaka ny hanokanako an’i Aharôna sy ny zanany lahy ho mpisorona ho Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Hitoetra eo anivon’ny Israelita Aho sady ho Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ka amin’izay no hiekeny fa Izaho no TOMPO Andriamaniny, dia Izaho Ilay namoaka azy hiala tany Ejipta mba hahazoako miara-monina aminy.
- type: usfm
  marker: p
  children:
  - type: text
    text: «Izaho no TOMPO Andriamaniny.»
