      children:
      - type: text
        text: alitara
    - type: text
      text: '. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny iray hatolotra ny maraina, ary ny iray hatolotra ny hariva. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ento hankeo am-baravaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' i Aharôna sy ireo zanany lahy, dia ampandroy amin’ny rano fandroana. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miaraka amin’ny zanakondry amin’ny maraina sy ny hariva, dia hitondrana koba telopolo kilao efa voakapoka amin’ny diloilo tsara iray litatra sy sasany sy fanatitra divay iray litatra sy sasany. Ireo dia ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' atolotra Ahy TOMPO, ka ho hanitra ankasitrahina ho Ahy. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny hoavy dia tsy ho tapaka na oviana na oviana ny fanolorana sorona dorana manontolo ho Ahy TOMPO eo am-baravaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ', fa eo no hihaonako aminareo sy hitenenako aminao.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Eo amin’io toerana io no hihaonako amin’ny Israelita, ka ny voninahitro hanome hasina izany. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tenako mihitsy no hanokana ny Tranolay fihaonana sy ny alitara, tahaka ny hanokanako an’i Aharôna sy ny zanany lahy ho mpisorona ho Ahy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitoetra eo anivon’ny Israelita Aho sady ho Andriamaniny. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka amin’izay no hiekeny fa Izaho no TOMPO Andriamaniny, dia Izaho Ilay namoaka azy hiala tany Ejipta mba hahazoako miara-monina aminy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Izaho no TOMPO Andriamaniny.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia ampiakanjoy an’i Aharôna ny fanamiana voatokana: dia ny akanjo lava ivelany, ny akanjo vita peta-kofehy, ny efôda ary ny saron-tratra, ka afatory ny samboadin’ny efôda. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Apetraho eo an-dohany ny satroka fehiloha, ary apetraho amin’ny satroka fehiloha kosa ny marika maha voatokana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia alao ny ilomasina fanokanana ka araraho eo an-dohany, ary atokany izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ampanatony ireo zanakalahin’i Aharôna, ary ampanaovy ny akanjo vita peta-kofehy; '
  '9':
