      text: Ny filohan’ireo fokon’i Israely
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny fokon’i Efraîma, dia i Hôsea zanakalahin’i Hazazià.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny antsasa-pokon’i Manase, dia i Jôela zanakalahin’i Pedaià.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny antsasa-pokon’i Manase tao Gilehada, dia i Jidao zanakalahin’i Zakarià.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny fokon’i Benjamîna, dia i Jahasiela zanakalahin’i Abnera.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny fokon’i Dana, dia i Hazarela zanakalahin’i Jerôhama.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no filohan’ny fokon’i Israely.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy nanisa ny hatramin’ny roapolo taona no ho midina i Davida, satria ny TOMPO efa nilaza hampitombo ny Israelita ho tahaka ny kintana eny amin’ny habakabaka
    - type: usfm
