document_id: 1CH.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fandaminana ny tafim-panjakana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny lehilahy israelita, na isam-batan’olona na loham-pianakaviana, na komandin-tafika mpifehy arivo sy mpifehy zato, na manampahefana, dia samy nanompo ny mpanjaka. Io fanompoana io dia ny raharaha rehetra momba ny antokon-tafika, izay nifandimby isam-bolana mandavan-taona. Isaky ny antokon-tafika dia nisy andiany 24; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-15
  - type: text
    text: 'ka ireto avy no mpibaiko azy:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana voalohany: I Jasôbehama, zanakalahin’i Zabdiela sady isan’ny taranak’i Peretsa; filohan’ireo mpifehy miaramila rehetra izy amin’ny volana voalohany.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana faharoa: i Dôday, avy any Ahôa; ilay komandy atao hoe Miklôta no manampy azy.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana fahatelo: i Benaià, zanakalahin’i Jôiadà mpisorombe. Lehilahy mahery anisan’ireo «Telopolo lahy» i Benaià; ary rehefa nanjary mpitarika ny «Telopolo lahy» izy, dia i Hamizabada zanany lahy no mpibaiko ny antokon-tafika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Lehilahy mahery... antokon-tafika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lehilahy mahery anisan’ireo «Telopolo lahy» i Benaià sady mpitarika an’ireo; i Hamizabada zanany no manampy azy mibaiko ny antokon-tafika
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –Momba ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Telopolo lahy»
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dia jereo 11.10-47'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana fahefatra: i Hasahela, rahalahin’i Jôaba; ary dia i Zebadià zanany lahy kosa tatỳ aoriana.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana fahenina: i Hirà, zanakalahin’i Hikesy, avy any Tekôa.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana fahafito: i Heletsa, avy any Peleta, isan’ny taranak’i Efraîma.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana fahavalo: i Sibekay, avy any Hosà, isan’ny taranak’i Zera.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana fahasivy: i Abihezera, avy any Hanatôta, isan’ny taranak’i Benjamîna.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana fahafolo: i Maharay, avy any Netôfa, isan’ny taranak’i Zera.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana faha-11: i Benaià, avy any Pirehatôna, isan’ny taranak’i Efraîma.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Volana faha-12: i Helday, avy any Netôfà, isan’ny taranak’i Hôtniela.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny filohan’ireo fokon’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ireto avy no filohan’ny fokon’i Israely: Tamin’ny fokon’i Reobena, dia i Elihezera zanakalahin’i Zikrỳ. Tamin’ny fokon’i Simehôna, dia i Sefatià zanakalahin’i Mahekà.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tamin’ny fokon’i Levỳ, dia i Hasabià zanakalahin’i Kemoela.
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamin’ny taranak’i Aharôna, dia i Tsadôka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tamin’ny fokon’i Joda, dia i Elihò
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Elihò '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia tsy mba voatonona any an-toeran-kafa ho rahalahin’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Davida
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; ny dkt grika tranainy Septoazinta dia manolo azy amin’ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Eliaba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo 2.13; 1 Sam 16.6). Ny voambolana hebreo voadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: isan’ny rahalahin’i Davida
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia azo ahodina koa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: havan’i Davida
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: izay isan’ny rahalahin’i Davida.
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamin’ny fokon’i Jisakara, dia i Hômrỳ zanakalahin’i Mikaela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tamin’ny fokon’i Zebolòna, dia i Jismahià zanakalahin’i Hôbadià.
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamin’ny fokon’i Naftalỳ, dia i Jerimôta zanakalahin’i Hazriela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tamin’ny fokon’i Efraîma, dia i Hôsea zanakalahin’i Hazazià.
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamin’ny antsasa-pokon’i Manase, dia i Jôela zanakalahin’i Pedaià.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tamin’ny antsasa-pokon’i Manase tao Gilehada, dia i Jidao zanakalahin’i Zakarià.
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamin’ny fokon’i Benjamîna, dia i Jahasiela zanakalahin’i Abnera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tamin’ny fokon’i Dana, dia i Hazarela zanakalahin’i Jerôhama.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ireo no filohan’ny fokon’i Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy nanisa ny hatramin’ny roapolo taona no ho midina i Davida, satria ny TOMPO efa nilaza hampitombo ny Israelita ho tahaka ny kintana eny amin’ny habakabaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 15.5; 22.17; 26.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nanomboka fanisana i Jôaba zanakalahin’i Tseroià fa tsy namarana, noho ny fahatezeran’Andriamanitra vokatr’izany tamin’i Israely; ka tsy voasoratra ao amin’ilay boky atao hoe «Tantaran’i Davida mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo 21.1-14; 2 Sam 24.1-15. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Tantaran’i Davida mpanjaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': very io boky io.'
    marker-yv: yv-n
  - type: text
    text: » ny isan’ny mponina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I Hazmavety, zanakalahin’i Hadiela, no mpiandraikitra ny zava-tsarobidin’ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: text
    text: I Jônatàna, zanakalahin’i Hozià, no mpiandraikitra ny trano fitahirizam-bokatra, na tany ambanivohitra na tamin’ny tanàn-dehibe na tamin’ny tanàna kely na tamin’ny tilikambo fiarovana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I Hezrỳ, zanakalahin’i Keloba, no mpiandraikitra ny tantsaha mpiasa tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: I Simehỳ, avy any Ramà, no mpiandraikitra ny tanimboaloboka. I Zabdỳ, avy any Sefama, no mpiandraikitra ny tahirin-divay any amin’ny tanimboaloboka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'I Bahala-Hanàna, avy any Bety-Gedera, no mpiandraikitra ny voly ôliva sy aviavy any amin’ny lemak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: I Jôhasa no mpiandraikitra ny tahirin-diloilo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: I Sitray, avy any Sarôna, no mpiandraikitra ny omby nandrasana tany Sarôna.
- type: usfm
  marker: p
  children:
  - type: text
    text: I Safata, zanakalahin’i Hadlay, no mpiandraikitra ny omby nandrasana tan-dohasaha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I Ôbila, izay Jismahelita, no mpiandraikitra ny rameva.
- type: usfm
  marker: p
  children:
  - type: text
    text: I Jehedeià, avy any Merônôta, no mpiandraikitra ny borikivavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: I Jaziza, izay Hagrita, no mpiandraikitra ny ondry aman’osy.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ireo rehetra ireo no mpiandraikitra ny fananan’i Davida mpanjaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpanolotsain’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I Jônatàna, rahalahin-drain’i Davida sady lehilahy hendry sy be fahalalana, dia mpanolotsain’ny mpanjaka; ary i Jehiela, zanakalahin’i Hakmôny, no teo amin’ny zanaky ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'I Ahitôfela koa dia mpanolotsain’ny mpanjaka; ary i Hosay, izay Arkita, no sakaizan’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ny nandimby an’i Ahitôfela dia ry Jôiadà zanakalahin’i Benaià sy ry Abiatara. Ary ny komandin’ny tafiky ny mpanjaka dia i Jôaba.
