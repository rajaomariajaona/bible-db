document_id: 1CH.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fandaminana ny tafim-panjakana
  - type: text
    content: 'Ny lehilahy israelita, na isam-batan’olona na loham-pianakaviana, na komandin-tafika mpifehy arivo sy mpifehy zato, na manampahefana, dia samy nanompo ny mpanjaka. Io fanompoana io dia ny raharaha rehetra momba ny antokon-tafika, izay nifandimby isam-bolana mandavan-taona. Isaky ny antokon-tafika dia nisy andiany 24; '
  '16':
  - type: text
    content: 'Ireto avy no filohan’ny fokon’i Israely: Tamin’ny fokon’i Reobena, dia i Elihezera zanakalahin’i Zikrỳ. Tamin’ny fokon’i Simehôna, dia i Sefatià zanakalahin’i Mahekà.'
  '17':
  - type: text
    content: Tamin’ny fokon’i Levỳ, dia i Hasabià zanakalahin’i Kemoela.
  - type: text
    content: Tamin’ny taranak’i Aharôna, dia i Tsadôka.
  '18':
  - type: text
    content: Tamin’ny fokon’i Joda, dia i Elihò
  - type: note
    content: Elihò dia tsy mba voatonona any an-toeran-kafa ho rahalahin’i Davida; ny dkt grika tranainy Septoazinta dia manolo azy amin’ny hoe Eliaba (jereo 2.13; 1 Sam 16.6). Ny voambolana hebreo voadika hoe isan’ny rahalahin’i Davida dia azo ahodina koa hoe havan’i Davida.
  - type: text
    content: izay isan’ny rahalahin’i Davida.
  - type: text
    content: Tamin’ny fokon’i Jisakara, dia i Hômrỳ zanakalahin’i Mikaela.
  '19':
  - type: text
    content: Tamin’ny fokon’i Zebolòna, dia i Jismahià zanakalahin’i Hôbadià.
  - type: text
    content: Tamin’ny fokon’i Naftalỳ, dia i Jerimôta zanakalahin’i Hazriela.
  '2':
  - type: text
    content: 'ka ireto avy no mpibaiko azy:'
  - type: text
    content: 'Volana voalohany: I Jasôbehama, zanakalahin’i Zabdiela sady isan’ny taranak’i Peretsa; filohan’ireo mpifehy miaramila rehetra izy amin’ny volana voalohany.'
  - type: text
    content: 'Volana faharoa: i Dôday, avy any Ahôa; ilay komandy atao hoe Miklôta no manampy azy.'
  - type: text
    content: 'Volana fahatelo: i Benaià, zanakalahin’i Jôiadà mpisorombe. Lehilahy mahery anisan’ireo «Telopolo lahy» i Benaià; ary rehefa nanjary mpitarika ny «Telopolo lahy» izy, dia i Hamizabada zanany lahy no mpibaiko ny antokon-tafika'
  - type: note
    content: 'Lehilahy mahery... antokon-tafika: dkt hafa Lehilahy mahery anisan’ireo «Telopolo lahy» i Benaià sady mpitarika an’ireo; i Hamizabada zanany no manampy azy mibaiko ny antokon-tafika. –Momba ny «Telopolo lahy», dia jereo 11.10-47'
  - type: text
    content: .
  - type: text
    content: 'Volana fahefatra: i Hasahela, rahalahin’i Jôaba; ary dia i Zebadià zanany lahy kosa tatỳ aoriana.'
  - type: text
    content: 'Volana fahenina: i Hirà, zanakalahin’i Hikesy, avy any Tekôa.'
  - type: text
    content: 'Volana fahafito: i Heletsa, avy any Peleta, isan’ny taranak’i Efraîma.'
  - type: text
    content: 'Volana fahavalo: i Sibekay, avy any Hosà, isan’ny taranak’i Zera.'
  - type: text
    content: 'Volana fahasivy: i Abihezera, avy any Hanatôta, isan’ny taranak’i Benjamîna.'
  - type: text
    content: 'Volana fahafolo: i Maharay, avy any Netôfa, isan’ny taranak’i Zera.'
  - type: text
    content: 'Volana faha-11: i Benaià, avy any Pirehatôna, isan’ny taranak’i Efraîma.'
  - type: text
    content: 'Volana faha-12: i Helday, avy any Netôfà, isan’ny taranak’i Hôtniela.'
  - type: heading
    content: Ny filohan’ireo fokon’i Israely
  '20':
  - type: text
    content: Tamin’ny fokon’i Efraîma, dia i Hôsea zanakalahin’i Hazazià.
  - type: text
    content: Tamin’ny antsasa-pokon’i Manase, dia i Jôela zanakalahin’i Pedaià.
  '21':
  - type: text
    content: Tamin’ny antsasa-pokon’i Manase tao Gilehada, dia i Jidao zanakalahin’i Zakarià.
  - type: text
    content: Tamin’ny fokon’i Benjamîna, dia i Jahasiela zanakalahin’i Abnera.
  '22':
  - type: text
    content: Tamin’ny fokon’i Dana, dia i Hazarela zanakalahin’i Jerôhama.
  - type: text
    content: Ireo no filohan’ny fokon’i Israely.
  '23':
  - type: text
    content: Tsy nanisa ny hatramin’ny roapolo taona no ho midina i Davida, satria ny TOMPO efa nilaza hampitombo ny Israelita ho tahaka ny kintana eny amin’ny habakabaka
  - type: note
    content: Jereo Gen 15.5; 22.17; 26.4.
  - type: text
    content: '. '
  '24':
  - type: text
    content: Nanomboka fanisana i Jôaba zanakalahin’i Tseroià fa tsy namarana, noho ny fahatezeran’Andriamanitra vokatr’izany tamin’i Israely; ka tsy voasoratra ao amin’ilay boky atao hoe «Tantaran’i Davida mpanjaka
  - type: note
    content: 'Jereo 21.1-14; 2 Sam 24.1-15. –Tantaran’i Davida mpanjaka: very io boky io.'
  - type: text
    content: » ny isan’ny mponina.
  '25':
  - type: text
    content: I Hazmavety, zanakalahin’i Hadiela, no mpiandraikitra ny zava-tsarobidin’ny mpanjaka.
  - type: text
    content: I Jônatàna, zanakalahin’i Hozià, no mpiandraikitra ny trano fitahirizam-bokatra, na tany ambanivohitra na tamin’ny tanàn-dehibe na tamin’ny tanàna kely na tamin’ny tilikambo fiarovana.
  '26':
  - type: text
    content: I Hezrỳ, zanakalahin’i Keloba, no mpiandraikitra ny tantsaha mpiasa tany.
  '27':
  - type: text
    content: I Simehỳ, avy any Ramà, no mpiandraikitra ny tanimboaloboka. I Zabdỳ, avy any Sefama, no mpiandraikitra ny tahirin-divay any amin’ny tanimboaloboka.
  '28':
  - type: text
    content: 'I Bahala-Hanàna, avy any Bety-Gedera, no mpiandraikitra ny voly ôliva sy aviavy any amin’ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: .
  - type: text
    content: I Jôhasa no mpiandraikitra ny tahirin-diloilo.
  '29':
  - type: text
    content: I Sitray, avy any Sarôna, no mpiandraikitra ny omby nandrasana tany Sarôna.
  - type: text
    content: I Safata, zanakalahin’i Hadlay, no mpiandraikitra ny omby nandrasana tan-dohasaha.
  '30':
  - type: text
    content: I Ôbila, izay Jismahelita, no mpiandraikitra ny rameva.
  - type: text
    content: I Jehedeià, avy any Merônôta, no mpiandraikitra ny borikivavy.
  '31':
  - type: text
    content: I Jaziza, izay Hagrita, no mpiandraikitra ny ondry aman’osy.
  - type: text
    content: Ireo rehetra ireo no mpiandraikitra ny fananan’i Davida mpanjaka.
  - type: heading
    content: Ny mpanolotsain’i Davida
  '32':
  - type: text
    content: 'I Jônatàna, rahalahin-drain’i Davida sady lehilahy hendry sy be fahalalana, dia mpanolotsain’ny mpanjaka; ary i Jehiela, zanakalahin’i Hakmôny, no teo amin’ny zanaky ny mpanjaka. '
  '33':
  - type: text
    content: 'I Ahitôfela koa dia mpanolotsain’ny mpanjaka; ary i Hosay, izay Arkita, no sakaizan’ny mpanjaka. '
  '34':
  - type: text
    content: Ny nandimby an’i Ahitôfela dia ry Jôiadà zanakalahin’i Benaià sy ry Abiatara. Ary ny komandin’ny tafiky ny mpanjaka dia i Jôaba.
