  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Hazmavety, zanakalahin’i Hadiela, no mpiandraikitra ny zava-tsarobidin’ny mpanjaka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Jônatàna, zanakalahin’i Hozià, no mpiandraikitra ny trano fitahirizam-bokatra, na tany ambanivohitra na tamin’ny tanàn-dehibe na tamin’ny tanàna kely na tamin’ny tilikambo fiarovana.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Hezrỳ, zanakalahin’i Keloba, no mpiandraikitra ny tantsaha mpiasa tany.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Simehỳ, avy any Ramà, no mpiandraikitra ny tanimboaloboka. I Zabdỳ, avy any Sefama, no mpiandraikitra ny tahirin-divay any amin’ny tanimboaloboka.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Bahala-Hanàna, avy any Bety-Gedera, no mpiandraikitra ny voly ôliva sy aviavy any amin’ny lemak’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sefelà
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Jôhasa no mpiandraikitra ny tahirin-diloilo.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Sitray, avy any Sarôna, no mpiandraikitra ny omby nandrasana tany Sarôna.
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Safata, zanakalahin’i Hadlay, no mpiandraikitra ny omby nandrasana tan-dohasaha.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Ôbila, izay Jismahelita, no mpiandraikitra ny rameva.
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Jehedeià, avy any Merônôta, no mpiandraikitra ny borikivavy.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Jaziza, izay Hagrita, no mpiandraikitra ny ondry aman’osy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo rehetra ireo no mpiandraikitra ny fananan’i Davida mpanjaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpanolotsain’i Davida
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jônatàna, rahalahin-drain’i Davida sady lehilahy hendry sy be fahalalana, dia mpanolotsain’ny mpanjaka; ary i Jehiela, zanakalahin’i Hakmôny, no teo amin’ny zanaky ny mpanjaka. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Ahitôfela koa dia mpanolotsain’ny mpanjaka; ary i Hosay, izay Arkita, no sakaizan’ny mpanjaka. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny nandimby an’i Ahitôfela dia ry Jôiadà zanakalahin’i Benaià sy ry Abiatara. Ary ny komandin’ny tafiky ny mpanjaka dia i Jôaba.
