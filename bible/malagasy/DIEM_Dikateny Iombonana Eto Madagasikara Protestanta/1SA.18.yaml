document_id: 1SA.18,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa vita ny resak’i Saoly sy i Davida, dia voasinton’i Davida ny fon’i Jônatàna, fa tiany tahaka ny itiavany ny tenany i Davida. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny ampitso, dia nisy fanahy ratsy nalefan’Andriamanitra nilatsaka tamin’i Saoly, ka nampirediredy azy eran’ny trano. Toy ny fanaony dia nitendren’i Davida feon-kira tamin’ny harpa i Saoly izay efa nitana lefona. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Natorak’i Saoly ny lefona sady hoy izy hoe: «Hasiako hifantsika amin’ny rindrina i Davida.» Nefa indroa tsy nahavoa izay satria nahay niala hatrany i Davida. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Natahotra an’i Davida i Saoly, satria fantany fa nomba azy ny TOMPO, saingy ny tenany kosa efa nialany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izany no antony nampihatahany an’i Davida tsy ho eo aminy, ka nanaovany azy ho filohan’ny andian-tafika iray. Izy no nitarika ny miaramila niantafika, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary fahombiazana hatrany no azon’i Davida tamin’izay rehetra nataony, satria nomba azy ny TOMPO. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nitombo hatrany kosa ny tahotr’i Saoly, rehefa hitany ireo fahombiazana azon’i Davida. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Eo an-danin’izany anefa, ny Israelita sy ny Jodeanina dia samy tia an’i Davida avokoa, satria izy no nitarika azy isaka izay niantafika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida mampaka-bady an’i Mikàla zanakavavin’i Saoly
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Hoy i Saoly anakampo hoe: «Aoka aho tsy haninona an’i Davida, fa avelao ny Filistinina no hamono azy!» Izany no nitenenany tamin’i Davida hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro i Meràba zanako vavimatoa homeko ho vadinao, raha toa ka manompo ahy amin-kerim-po ianao, ary koa mazoto amin’ireo adin’ny TOMPO.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ka hoy ny navalin’i Davida an’i Saoly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry mpanjaka, iza moa aho ary zinona ny fiainako sy ny fianakaviamben’ny raiko, no ho tonga vinantonao aho?
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nefa tamin’ny fotoana izay tokony hanomezan’i Saoly an’i Meràba ho vadin’i Davida, no nanomezana azy indray ho vadin’i Hadriela avy any Mehôlà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Abely-Mehôlà:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Mpits 7.22 sy nta; 2 Sam 21.8.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tamin’io andro io dia notazonin’i Saoly tao aminy i Davida fa tsy navelany nody tany amin-drainy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa i Mikàla zanakavavin’i Saoly iray kosa, raiki-pitia tamin’i Davida. Koa rehefa nambara tamin’i Saoly izany zavatra izany, dia nahafaly azy; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'hoy izy manko anakampo: «Homeko ho vadiny i Mikàla hahazoako mamandrika azy, ary dia hamono hahafaty azy ny Filistinina.» (Fanindroany izao no nilazan’i Saoly tamin’i Davida ny hahavinantony azy) '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary i Saoly nibaiko ireo minisitra tao aminy mba hiresaka mangina amin’i Davida hoe: «Mankasitraka tsara anao ny mpanjaka ary tia anao koa izahay minisitra. Koa ekeo re ankehitriny ny ho tonga vinanton’ny mpanjaka.»'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia naverin’ireo minisitr’i Saoly tamin’i Davida izany teny izany. Fa hoy i Davida tamin’izy ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Heverinareo fa zavatra kely moa izany ho vinanton’ny mpanjaka izany? Izaho anefa dia olo-mahantra tsy misy dikany.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Notantarain’ireo minisitr’i Saoly taminy izay teny navalin’i Davida azy ireo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ka hoy i Saoly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao indray àry no holazainareo aminy: «Ny mpanjaka dia tsy mila vodiondry aminao afa-tsy tsitsy zato avy amin’ny Filistinina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Filistinina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia olona tsy mifora (jereo ny FTS amin’ny voambolana hoe FAMORANA); ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsitsy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' nentin’i Davida izany no porofo fa nahafaty fahavalon’i Israely tokoa izy.'
      marker-yv: yv-n
    - type: text
      text: ', mba hamaliana faty ny fahavalon’ny mpanjaka.»'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no noheverin’i Saoly fa hianjeran’i Davida eo an-tanan’ny Filistinina. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nentin’ireo minisitra tany amin’i Davida izany teny izany, ka nankasitrahiny ihany ny ho vinanton’ny mpanjaka. Raha tsy mbola dila akory ny fetra nomen’ny mpanjaka, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: dia efa lasa nanafika i Davida sy ny olony ka nahafaty Filistinina roanjato lahy. Nentin’i Davida ny tsitsin’izy ireo ka nasehony tsirairay an’i Saoly, mba hahatonga azy ho vinanton’ny mpanjaka. Dia neken’i Saoly ho vadin’i Mikàla zanany vavy i Davida.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nazava tamin’i Saoly izao fa nomba an’i Davida ny TOMPO ary koa tia azy i Mikàla zanany vavy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Koa nihamafy hatrany ny tahotr’i Saoly an’i Davida, hany ka loza ny fankahalany azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa i Jônatàna kosa tia fatratra an’i Davida, ka nanao dinam-pisakaizana taminy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tamin’izany fotoana izany dia nandeha nanafika ny Israelita ireo andriana filohan’ny Filistinina. Ary isaky ny misy fanafihana, dia mahery hatrany noho ireo miaramila manamboninahitr’i Saoly i Davida, hany ka tonga nanan-daza tokoa izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nalain’i Jônatàna ny akanjobe teny aminy, dia nomeny an’i Davida; natolony azy koa ny akanjo fentiny miady mbamin’ny sabany sy ny tsipîkany ary ny fehikibony.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa isaky ny misy fanafihana ampanaovin’i Saoly azy, dia fahombiazana hatrany no azon’i Davida, koa dia izy no nataon’i Saoly ho kômandin’ny miaramila mpanafika; ary nahafaly tokoa ny tafika manontolo sy ny manamboninahitry ny mpanjaka izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tadiavin’i Saoly hovonoina ho faty i Davida
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tamin’ny fiverenan-dry Davida avy nahafaty an’ilay Filistinina, dia nivoaka hitsena an’i Saoly mpanjaka ny vehivavy avy tamin’ny tanàna israelita rehetra; nihira sy nandihy tamin’ny feon’ampongatapaka sy ny zava-maneno hafa izy ireo, ary velona hobim-pifaliana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nibitaka ireo vehivavy sady nifamaly niredona hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «I Saoly nahafaty an’arivoarivo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa i Davida kosa nahafaty an’alinalina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 21.11; 29.5.
      marker-yv: yv-n
    - type: text
      text: .»
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nahatezitra mafy an’i Saoly izany tononkira izany, ka hoy izy anakampo hoe: «An’alinalina lahy no nomeny an’i Davida, fa an’arivoarivo fotsiny kosa no nomeny ahy! Angamba homeny azy koa ny fanjakana atsy ho atsy!» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nanomboka tamin’io andro io, dia ratsy fijery an’i Davida izy.
