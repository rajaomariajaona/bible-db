    children:
    - type: text
      text: Sava lalana
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Amin’ireo Vaovao Mahafaly efatra dia ilay araka an’i Jôhany no miavaka indrindra. Ankoatra ny tantaran’ny fijalian’i Jesoa (toko 18–19), dia vitsy kely ny lafin-javatra iombonany amin’ireo Vaovao Mahafaly hafa. Etsy andanin’izany, dia i Jôhany irery no mampita sombin-tantara tahaka ny fampakaram-bady tao Kanà (2.1-12) ary koa ny fihaonan’i Jesoa tamin’i Nikôdema (3.1-21) sy tamin’ilay vehivavy samaritanina (4.1-42) na tamin’ilay malemy tao Betesdà (5.1-18) sy tamin-dralehilahy teraka jamba (9.1-41) ohatra. Raha ampitahaina amin’ireo Vaovao Mahafaly hafa, dia vitsivitsy ihany ireo zava-nitranga momba ny fiainan’i Jesoa teto an-tany no voatahirin’ny Vaovao Mahafaly araka an’i Jôhany. Mavesa-danja kosa anefa ny anjara toerana omen’i Jôhany ireo zava-nitranga vitsivitsy ireo, satria ny ankamaroany dia fototra iaingana fampianarana lalina aroson’i Jesoa.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ao amin’ny
    - type: text
      text: ' fitarihan-teny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: (1.1-18) izay miendrika tononkalo mirindra, dia asehon’ity Vaovao Mahafaly ity amintsika fa i Jesoa no ilay Teny mandrakizay avy amin’Andriamanitra, ary Teny tonga olombelona sady miara-monina amin’ny olombelona ka Izy mihitsy no aina sy fahazavana ary fahamarinana miseho vatana eo anivon’ny olombelona.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny tenaben’ity Vaovao Mahafaly ity dia azo atao hoe misy fizaràna vaventy anankiroa ka ny mamitrana azy dia ilay antsoina hoe
    - type: text
      text: ' fotoanandron'
    - type: usfm
      marker: it
      children:
      - type: text
        text: '’i Jesoa: tsy inona io fa ny vaninandro hahafatesany, izay ho vaninandro hanandratana Azy amin’ny voninahitra rahateo koa (12.23; 13.1).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '–Alohan’ny fotoanandron’i Jesoa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '(1.19–12.50): ao amin’ity fizaràna voalohany ity dia mifanesy mifanao tohy vakana aloha ireo fijoroana ho vavolombelona: i Jôhany Mpanao batisa, i Andrea mpianatr’io Jôhany io, i Filipo, i Natanaela dia samy manambara ny zavatra hitany sy tsapany momba an’i Jesoa. Avy eo dia tantarain’ity Vaovao Mahafaly ity ireo fihaonan’i Jesoa tamin’olona samihafa ary koa ireo asa mahagaga fito izay arosony ho «famantarana»: marihina amin’izany fa ny mahatakatra ny dikan’ireny asa mahagaga ireny no tena vontoatin-javatra. Ny amaranan’i Jôhany (mpanoratra ny Vaovao Mahafaly) ity fizaràna voalohany ity, dia karazana tombantombana ankapobeny sy famintinana momba ny hafatra ampitain’i Jesoa (12.37-50).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '–Rehefa tonga ny fotoanandron’i Jesoa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '(13.1): ao amin’ny fizaràna faharoa kosa (13–20) dia amelan’i Jesoa torolalana aloha ireo mpianany, torolalana izay toy ny farahafatra apetrany ho azy ireo (toko 13–16). Avy eo dia misy vavaka iomanan’i Jesoa hiatrika ny fahafatesana ary anankinany amin’Andriamanitra Ray ireo mpianany izay hilaozany (toko 17). Rehefa tantarain’i Jôhany (mpanoratra ny Vaovao Mahafaly) ny fomba nisamborana an’i Jesoa sy nanamelohana Azy ho faty ary nahafatesany teo amin’ny hazofijaliana mbamin’ny nahitana ny fasana foana, dia ifandraisan’i Jôhany indray ny soritra vaventy arahin’ireo Vaovao Mahafaly hafa (toko 18–20). Ny anamarihan’i Jôhany ny andro fandresen’i Kristy tafatsangana ho velona dia ny fisehoany tamin’i Maria Magdalena sy tamin’ireo mpianatra; herinandro taoriana indray dia ny fisehoany manokana tamin’i Tômà. Ny toko faha-21 dia mitantara ny nihaonan’ny mpianatra fito lahy (ary anisan’ireo i Petera) tamin’i Kristy tafatsangana velona, fihaonana teo amoron’ilay farihin’i Tiberiada: izany anefa dia fanampiny notovanana ny tena famaranana ity Vaovao Mahafaly ity.'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Io famaranana io (20.30-31) no manambara ny zava-kendren’ity Vaovao Mahafaly ity: dia ny hitaona ny mpamaky sy mpihaino hiaiky fa i Jesoa no Mesia nampanantenaina sady Zanak’Andriamanitra. Mamy ny miaina ary satrintsika ny ho ela velona: ny finoana an’i Jesoa Kristy no hahitantsika ny fiaina-maharitra mandrakizay, satria marina tokoa fa i Jesoa, ilay iraky ny Ray, «no lalana sy fahamarinana ary aina» (14.6), araka ny voalazan’ny tenany rahateo.'
