document_id: PSA.131,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Tompo ô, tsy mirehareha ny foko
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana. Nataon’i Davida.
  - type: text
    content: TOMPO ô, tsy mirehareha ny foko,
  - type: text
    content: tsy miandranandrana ny masoko!
  - type: text
    content: Tsy mikendry zava-baventy aho
  - type: text
    content: na zavatra ambony tsy sahaza ahy.
  '2':
  - type: text
    content: Afa-po sy milamina aho
  - type: text
    content: toy ny zaza voky am-pofoan-dreniny;
  - type: text
    content: eny, toy izany zaza voky izany
  - type: text
    content: no fahatonian’ny foko ato amiko.
  '3':
  - type: text
    content: Aoka ny vahoaka Israely hatoky ny TOMPO
  - type: text
    content: manomboka izao ka ho mandrakizay!
