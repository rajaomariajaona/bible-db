type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny voampanga miantso an’Andriamanitra hirotsaka an-tsehatra
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: Ry Andriamanitra fidèrako ô,
  - type: text
    content: aza dia mangina fotsiny Ianao,
  '10':
  - type: text
    content: Ho mpirenireny mangataka anie ny zanany
  - type: text
    content: ary ho voaroaka lavitra ny fonenany rava!
  '11':
  - type: text
    content: Halain’ny tompon-trosa anie ny fananany rehetra
  - type: text
    content: ary ho olon-kafa no hifaoka ny vokatry ny asany!
  '12':
  - type: text
    content: Aoka tsy hisy hamindrafo aminy
  - type: text
    content: na koa hiantra ny zanany kamboty!
  '13':
  - type: text
    content: Ho lany tamingana anie izy
  - type: text
    content: ary amin’ny taranaka faharoa
  - type: text
    content: no aoka hanjavonan’ny lazany!
  '14':
  - type: text
    content: Hampahatsiahivina ny TOMPO anie ny heloky ny rainy
  - type: text
    content: ary tsy mba ho voakosoka ny fahotan-dreniny,
  '15':
  - type: text
    content: fa samy hotsarovan’ny TOMPO mandrakariva izany!
  - type: text
    content: Hofoanany eto amin’ity tany ity anie
  - type: text
    content: ny fahatsiarovana an’ireo olona ireo!
  '16':
  - type: text
    content: Izy io tsy mba nahalala namindrafo,
  - type: text
    content: fa nanenjika sy nanao izay hahafaty ny ory
  - type: text
    content: ary koa ny malahelo mbamin’ny rera-po.
  '17':
  - type: text
    content: Tia manozona izy, ka aoka hiantontany;
  - type: text
    content: 'tsy tia '
  - type: text
    content: mitsodrano
  - type: text
    content: ' izy, ka aoka hidifiany!'
  '18':
  - type: text
    content: Ny ozona no tahaka ny lamba itafiany;
  - type: text
    content: ka dia hanenika ny tenany tahaka ny rano anie izany
  - type: note
    content: Ampit Sal 7.4-6; Nom 5.17-28.
  - type: text
    content: ary ho ao anatin’ny taolany tahaka ny tsoka!
  '19':
  - type: text
    content: Ho toa akanjo mandrakotra azy anie ny ozona,
  - type: text
    content: ho toa etra mamatotra azy lalandava!»
  '2':
  - type: text
    content: fa nisoka-bava hamely ahy
  - type: text
    content: ny olon-dratsy sy mpamitaka;
  - type: text
    content: resaka feno lainga no ataony amiko,
  '20':
  - type: text
    content: TOMPO ô, izany no ataon’ny mpiampanga ahy teo aminao;
  - type: text
    content: izany no afitsok’ireo olona mpanendrikendrika ahy.
  '21':
  - type: text
    content: Kanefa, ry TOMPO Andriamanitro ô, hasoavy aho.
  - type: text
    content: Sarobidy ny fitiavanao, koa afaho re aho
  '22':
  - type: text
    content: satria mahantra sy malahelo
  - type: text
    content: sady misy ratram-po ato anatiko.
  '23':
  - type: text
    content: Lasa toa aloka miserana aho;
  - type: text
    content: voaroaka toa valala kopahina
  - type: note
    content: Ny fanilihana olona no ambaran’ny Hebreo amin’izany; ny fanakopahana akanjo dia mba hialan’ny valala mety nipetraka teo.
  - type: text
    content: .
  '24':
  - type: text
    content: Fatra-
  - type: text
    content: pifady hanina
  - type: text
    content: ' aho ka mangozohozo ny lohaliko'
  - type: text
    content: sady mahia kaozatra ny tenako.
  '25':
  - type: text
    content: Dia tonga fandàtsan’ireo olon-dratsy aho,
  - type: text
    content: ka vao mijery ahy izy dia mihifikifi-doha
  - type: note
    content: Jereo Sal 22.8 sy nta.
  - type: text
    content: .
  '26':
  - type: text
    content: TOMPO Andriamanitro ô, mba ampio aho;
  - type: text
    content: vonjeo aho araka ny fitiavanao.
  '27':
  - type: text
    content: Aoka ho fantatry ny olon-dratsy fa asanao izao;
  - type: text
    content: sady Ianao, TOMPO ô, no nanao izany ho ahy.
  '28':
  - type: text
    content: Izy manozona ahy,
  - type: text
    content: Ianao kosa mitsodrano;
  - type: text
    content: ka ny mpamely ahy ho menatra,
  - type: text
    content: izaho mpanomponao kosa hifaly.
  '29':
  - type: text
    content: Ny amin’ireo mpiampanga lainga ahy anie
  - type: text
    content: dia ny fahafaham-baràka no ho toa akanjo itafiany
  - type: text
    content: ary ny henatra no ho toa lamba mandrakotra azy!
  '3':
  - type: text
    content: teny fankahalana no manemitra ahy
  - type: text
    content: ary iadiany tsy amin’antony aho.
  '30':
  - type: text
    content: Ho fatra-pisaotra ny TOMPO izany vavako;
  - type: text
    content: eny, eo afovoan’olona maro no hiderako Azy
  '31':
  - type: text
    content: noho Izy mijoro hiaro ny zon’ireo fadiranovana
  - type: text
    content: mba hamonjy azy amin’izay manameloka ho faty.
  '4':
  - type: text
    content: Ny fitiavako valiany fandrafiana,
  - type: text
    content: fa izaho kosa mivavaka ho azy;
  '5':
  - type: text
    content: ratsy no asetriny ny soa ataoko,
  - type: text
    content: fankahalana no avaliny ny fitiavako.
  '6':
  - type: text
    content: 'Hoy izy ny amiko: «Anendreo olon-dratsy hamely azy'
  - type: note
    content: Ny and 6-19 dia mitanisa ny teny ataon’ny mpiampanga. Kanefa misy mihevitra ireo and ireo ho ozona tononon’ny mpanao salamo amin’ny mpanohitra azy.
  - type: text
    content: ;
  - type: text
    content: aoka hisy mpiampanga hitsangana eo ankavanany!
  '7':
  - type: text
    content: Rehefa hotsaraina izy, dia aoka ho hita fa meloka;
  - type: text
    content: ary na ny fivavahany aza, aoka ho tonga fahotana!
  '8':
  - type: text
    content: Hohafohezina anie ny andro iainany
  - type: text
    content: ary ho lasan’olon-kafa ny andraikiny
  - type: note
    content: Ity andalany ity dia tsiahivin’i Petera apôstôly ao amin’ny Asa 1,20 ka ampihariny amin’i Jodasy.
  - type: text
    content: '!'
  '9':
  - type: text
    content: Aoka ho kamboty ny zanany
  - type: text
    content: ary ho mpitondratena ny vadiny!
