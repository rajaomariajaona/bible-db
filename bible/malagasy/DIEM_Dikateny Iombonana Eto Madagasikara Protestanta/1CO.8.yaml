verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hena natao sorona tamin’ny sampy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Momba ny hena natao sorona tamin’ny sampy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Asa 15.20, 29.
      marker-yv: yv-n
    - type: text
      text: ' dia izao: Fantatsika fa samy manana fahalalana daholo isika. Saingy ny fahalalana dia mampieboebo, fa ny fitiavana kosa mampandroso amin’ny finoana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Satria raha ianao izay manam-pahalalana no hitan’ny malemy ara-pinoana mihinana ao amin’ny trano fanompoan-tsampy, moa tsy hampirisika azy ao amin’ny fieritreretany koa ve izany hihinana ny hena natao sorona tamin’ny sampy? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ka verin’ny fahalalànao ilay malemy ara-pinoana, dia ilay havana izay nahafoizan’i Kristy ny ainy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha manota toy izany amin’ny havanareo iray finoana ianareo ka manimba ny fieritreretan’izy ireo mbola osa, dia i Kristy no anotanareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Koa raha izay hanina àry no hitarika ny havako amin’ny fahotana, dia tsy hihinan-kanina mandrakizay aho mba tsy hitarika ny havako amin’ny fahotana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Raha misy mihevi-tena ho mahalala zavatra, dia mbola tsy mahalala araka izay tokony hahalalany azy akory izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa izay manam-pitiavana an’Andriamanitra kosa dia fantatr’Andriamanitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa azo hanina ve ny hena natao sorona tamin’ny sampy? Fantatsika fa tsinontsinona ny sampy eo amin’izao tontolo izao, ary tsy misy Andriamanitra afa-tsy ilay Andriamanitra tokana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Na dia misy aza izay atao hoe andriamanitra any an-danitra sy etỳ an-tany – toy ny misy andriamanitra maro sy tompo maro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampahatsiahivin’i Paoly eto ireo andriamanitra sampy teo amin’ny fivavahana grika. Jereo koa 10.20-21.
      marker-yv: yv-n
    - type: text
      text: ', – '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'amintsika kosa tokana ihany Andriamanitra, dia ny Ray Izy niavian’ny zavatra rehetra sady iafarantsika; ary tokana ihany ny Tompo, dia i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Izay nahariana ny zavatra rehetra sady nahariana antsika.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Kanefa tsy ary manana izany fahalalana izany avokoa ny olona. Ny sasany, zatra nanatona ny sampy taloha, dia voarohin’izany mandraka ankehitriny, ka homana ny hena toy ny zavatra natao sorona tamin’ny sampy; osa ny fieritreretany, ka dia voaloton’izany hanina izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tsy izay hanina akory no hahasoa na haharatsy antsika eo anatrehan’Andriamanitra: raha tsy homana isika, tsy maty antoka; ary raha homana isika, tsy mahazo tombony'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Rm 14.17.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tandremo anefa ny fahafahanareo sao dia mitarika ny malemy ara-pinoana amin’ny fahotana. '
