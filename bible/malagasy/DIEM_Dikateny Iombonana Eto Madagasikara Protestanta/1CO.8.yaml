document_id: 1CO.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hena natao sorona tamin’ny sampy
  - type: text
    content: Momba ny hena natao sorona tamin’ny sampy
  - type: note
    content: Ampit Asa 15.20, 29.
  - type: text
    content: ' dia izao: Fantatsika fa samy manana fahalalana daholo isika. Saingy ny fahalalana dia mampieboebo, fa ny fitiavana kosa mampandroso amin’ny finoana. '
  '10':
  - type: text
    content: 'Satria raha ianao izay manam-pahalalana no hitan’ny malemy ara-pinoana mihinana ao amin’ny trano fanompoan-tsampy, moa tsy hampirisika azy ao amin’ny fieritreretany koa ve izany hihinana ny hena natao sorona tamin’ny sampy? '
  '11':
  - type: text
    content: 'Ka verin’ny fahalalànao ilay malemy ara-pinoana, dia ilay havana izay nahafoizan’i Kristy ny ainy. '
  '12':
  - type: text
    content: 'Raha manota toy izany amin’ny havanareo iray finoana ianareo ka manimba ny fieritreretan’izy ireo mbola osa, dia i Kristy no anotanareo. '
  '13':
  - type: text
    content: Koa raha izay hanina àry no hitarika ny havako amin’ny fahotana, dia tsy hihinan-kanina mandrakizay aho mba tsy hitarika ny havako amin’ny fahotana.
  '2':
  - type: text
    content: 'Raha misy mihevi-tena ho mahalala zavatra, dia mbola tsy mahalala araka izay tokony hahalalany azy akory izy. '
  '3':
  - type: text
    content: Fa izay manam-pitiavana an’Andriamanitra kosa dia fantatr’Andriamanitra.
  '4':
  - type: text
    content: 'Koa azo hanina ve ny hena natao sorona tamin’ny sampy? Fantatsika fa tsinontsinona ny sampy eo amin’izao tontolo izao, ary tsy misy Andriamanitra afa-tsy ilay Andriamanitra tokana. '
  '5':
  - type: text
    content: Na dia misy aza izay atao hoe andriamanitra any an-danitra sy etỳ an-tany – toy ny misy andriamanitra maro sy tompo maro
  - type: note
    content: Ampahatsiahivin’i Paoly eto ireo andriamanitra sampy teo amin’ny fivavahana grika. Jereo koa 10.20-21.
  - type: text
    content: ', – '
  '6':
  - type: text
    content: 'amintsika kosa tokana ihany Andriamanitra, dia ny Ray Izy niavian’ny zavatra rehetra sady iafarantsika; ary tokana ihany ny Tompo, dia i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Izay nahariana ny zavatra rehetra sady nahariana antsika.'
  '7':
  - type: text
    content: 'Kanefa tsy ary manana izany fahalalana izany avokoa ny olona. Ny sasany, zatra nanatona ny sampy taloha, dia voarohin’izany mandraka ankehitriny, ka homana ny hena toy ny zavatra natao sorona tamin’ny sampy; osa ny fieritreretany, ka dia voaloton’izany hanina izany. '
  '8':
  - type: text
    content: 'Tsy izay hanina akory no hahasoa na haharatsy antsika eo anatrehan’Andriamanitra: raha tsy homana isika, tsy maty antoka; ary raha homana isika, tsy mahazo tombony'
  - type: note
    content: Ampit Rm 14.17.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Tandremo anefa ny fahafahanareo sao dia mitarika ny malemy ara-pinoana amin’ny fahotana. '
