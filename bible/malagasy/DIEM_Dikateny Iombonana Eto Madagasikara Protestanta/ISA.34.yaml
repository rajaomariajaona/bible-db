document_id: ISA.34,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsarana an’i Edôma
  - type: text
    content: Manatòna handre, ry firenen-kafa,
  - type: text
    content: ary mihainoa, ry vahoaka isan-tokony.
  - type: text
    content: Aoka handre ny tany sy izay rehetra mameno azy;
  - type: text
    content: aoka handre izao tontolo izao
  - type: text
    content: sy ny vokatra rehetra avy aminy!
  '10':
  - type: text
    content: ka tsy ho faty na andro na alina izany,
  - type: text
    content: ary hiakatra tsy an-kijanona ny setroka
  - type: note
    content: Ampit Apôk 14.11; 19.3.
  - type: text
    content: ;
  - type: text
    content: hijanona ho tany hay hatrany hatrany i Edôma
  - type: text
    content: ary tsy hisy handalo eo intsony mandrakizay.
  '11':
  - type: text
    content: Ho kianjan’ny tararaka sy ny sokina izy
  - type: text
    content: ary honenan’ny vorondolo sy ny goaika.
  - type: text
    content: Hohenjanin’ny Tompo eo aminy
  - type: text
    content: ny famolaina fandravana sy ny pilao fandrodanana.
  '12':
  - type: text
    content: Tsy hisy andriana intsony hifidy mpanjaka
  - type: text
    content: sady ho foana avokoa ny filohany rehetra.
  '13':
  - type: text
    content: Haniry tsilo ny lapan’ny mpanjaka;
  - type: text
    content: ary songosongo sy voaroy
  - type: text
    content: no hanenika ny trano fiarovany.
  - type: text
    content: Ho fonenan’ny amboadia
  - type: text
    content: sy sehatry ny vorombe ireo,
  '14':
  - type: text
    content: ho fihaonan’ny bibidia sy ny kary;
  - type: text
    content: any no hifampitaona ireo osidia,
  - type: text
    content: any no hiato sy hiala sasatra
  - type: text
    content: ny lilîta mpandehandeha amin’ny alina
  - type: note
    content: 'Jereo Jer 13.21 sy nta. –lilîta: demony vavy izany eo amin’ny mitôlôjia babilônianina, demonin’ny tafio-drivotra; tao Palestinina kosa, dia toa matoatoa miseho amin’ny alina fotsiny izy io.'
  - type: text
    content: .
  '15':
  - type: text
    content: Any koa no hanao lavaka ny bibilava
  - type: text
    content: ka hametraka ny atodiny sy hikotrika azy
  - type: text
    content: ary hanara-maso ny fahafoizany.
  - type: text
    content: Any koa no hivondronan’ny papango
  - type: text
    content: samy araka ny andiany avy.
  '16':
  - type: text
    content: Raha mitady ao amin’ny bokin’ny TOMPO
  - type: note
    content: Ny bokin’ny Tompo dia angamba amboaran-dahatsoratra nirakitra ny sasantsasany tamin’ireo hafatr’i Isaià mpaminany, saingy tsy ananantsika intsony ankehitriny. Ny andalana voalaza eto (and 16b-17) dia mety ho tohin’ny Is 13.20-22.
  - type: text
    content: ' ianareo,'
  - type: text
    content: 'dia ho afaka hamaky izao teny izao:'
  - type: text
    content: Tsy misy tsy ao ireo biby ireo na iray aza,
  - type: text
    content: ary tsy misy sahirana mitady ny andiany
  - type: text
    content: satria ny baikon’ny Tompo no nandidy izany
  - type: text
    content: ary ny Fanahiny no nanangona azy.
  '17':
  - type: text
    content: Antsapaka no nanendreny ny anjaran’ny tsirairay,
  - type: text
    content: noraisiny ny famolaina hizaràna ny tany ho azy;
  - type: text
    content: ireo no ho tompony hatrany hatrany
  - type: text
    content: ka honina ao hatramin’ny taranaka mifandimby.
  '2':
  - type: text
    content: Tezitra amin’ny firenen-kafa rehetra ny TOMPO
  - type: text
    content: sady misafoaka amin’ny tafiny manontolo;
  - type: text
    content: nasainy naringana ireny
  - type: text
    content: ka natolony hovonoina.
  '3':
  - type: text
    content: Izay voavono dia hariam-potsiny
  - type: text
    content: ka hamofona maimbo ny fatiny;
  - type: text
    content: ary handriaka ra ny tendrombohitra.
  '4':
  - type: text
    content: Ny andian-tafiky ny kintana
  - type: text
    content: dia ho potika hiraraka avokoa;
  - type: text
    content: hihorona toy ny horonan-taratasy ny habakabaka;
  - type: text
    content: ary toy ny fihintsan’ny ravim-boaloboka maina
  - type: text
    content: na toy ny fihintsan’ny ravin’aviavy malazo
  - type: text
    content: no hihintsanan’ny planeta aman-kintana
  - type: note
    content: 'Ampit Mt 24.29; Mk 13.25; Apôk 6.13-14. kintana : mahafaoka ny planeta koa izany.'
  - type: text
    content: .
  '5':
  - type: text
    content: Eny ana habakabaka ilay sabatry ny TOMPO
  - type: text
    content: no mandihindihy toa mamo,
  - type: text
    content: ka indro miantonta hamely an’i Edôma
  - type: note
    content: Ny amin’i Edôma na ny Edômita , dia jereo Is 63.1-6; Jer 49.7-22; Ezek 25.12-14; Ham 1.11-12; Hôb; Mal 1.2-4.
  - type: text
    content: ','
  - type: text
    content: dia ilay firenena voatendry haringana
  - type: text
    content: mba ho famaizan’ny TOMPO azy.
  '6':
  - type: text
    content: Feno ra ilay sabatry ny TOMPO
  - type: text
    content: sady mihosina menaka,
  - type: text
    content: dia ran’ny zanak’ondry sy osilahy
  - type: text
    content: ary koa menaka avy amin’ny fonom-boany;
  - type: text
    content: satria misy sorona ataon’ny TOMPO ao Bôtserà
  - type: text
    content: ary fandringanana goavana ao amin’ny tany Edôma
  - type: note
    content: 'Momba ny and manontolo dia jereo Is 63.1-6; Jl 4.19; Sal 137.7; Fit 4.21-22. –I Bôtserà: no renivohitr’i Edôma tamin’izay fotoana izay.'
  - type: text
    content: .
  '7':
  - type: text
    content: Voaripaka miaraka amin’ireo koa ny ombimanga
  - type: text
    content: mbamin’ny vantotr’omby sy ny ombilahy
  - type: text
    content: ka vonton-dra ny tanin’ny Edômita
  - type: text
    content: ary mihosi-menaka ny vovo-taniny.
  '8':
  - type: text
    content: Eny, andron’ny valifaty izany ho an’ny TOMPO
  - type: text
    content: 'sady taona famaliana ho an’Ilay mpiaro an’i '
  - type: text
    content: Tsiôna
  - type: text
    content: .
  '9':
  - type: text
    content: Hanjary toy ny dity ny ranon-driakan’i Edôma,
  - type: text
    content: 'hiova ho '
  - type: text
    content: solifara
  - type: text
    content: ' ny vovo-taniny.'
  - type: text
    content: Hanjary sahan-dity mirehitra io tany io;
