document_id: ISA.34,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitsarana an’i Edôma
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manatòna handre, ry firenen-kafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihainoa, ry vahoaka isan-tokony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka handre ny tany sy izay rehetra mameno azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka handre izao tontolo izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny vokatra rehetra avy aminy!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho faty na andro na alina izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiakatra tsy an-kijanona ny setroka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Apôk 14.11; 19.3.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hijanona ho tany hay hatrany hatrany i Edôma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy handalo eo intsony mandrakizay.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho kianjan’ny tararaka sy ny sokina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary honenan’ny vorondolo sy ny goaika.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hohenjanin’ny Tompo eo aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny famolaina fandravana sy ny pilao fandrodanana.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisy andriana intsony hifidy mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho foana avokoa ny filohany rehetra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haniry tsilo ny lapan’ny mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary songosongo sy voaroy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanenika ny trano fiarovany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho fonenan’ny amboadia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy sehatry ny vorombe ireo,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fihaonan’ny bibidia sy ny kary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any no hifampitaona ireo osidia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any no hiato sy hiala sasatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lilîta mpandehandeha amin’ny alina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 13.21 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lilîta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: demony vavy izany eo amin’ny mitôlôjia babilônianina, demonin’ny tafio-drivotra; tao Palestinina kosa, dia toa matoatoa miseho amin’ny alina fotsiny izy io.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any koa no hanao lavaka ny bibilava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hametraka ny atodiny sy hikotrika azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanara-maso ny fahafoizany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any koa no hivondronan’ny papango
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy araka ny andiany avy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mitady ao amin’ny bokin’ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny bokin’ny Tompo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia angamba amboaran-dahatsoratra nirakitra ny sasantsasany tamin’ireo hafatr’i Isaià mpaminany, saingy tsy ananantsika intsony ankehitriny. Ny andalana voalaza eto (and 16b-17) dia mety ho tohin’ny Is 13.20-22.
      marker-yv: yv-n
    - type: text
      text: ' ianareo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ho afaka hamaky izao teny izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy tsy ao ireo biby ireo na iray aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy sahirana mitady ny andiany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny baikon’ny Tompo no nandidy izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny Fanahiny no nanangona azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Antsapaka no nanendreny ny anjaran’ny tsirairay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noraisiny ny famolaina hizaràna ny tany ho azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo no ho tompony hatrany hatrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka honina ao hatramin’ny taranaka mifandimby.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tezitra amin’ny firenen-kafa rehetra ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady misafoaka amin’ny tafiny manontolo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nasainy naringana ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka natolony hovonoina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay voavono dia hariam-potsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamofona maimbo ny fatiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handriaka ra ny tendrombohitra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny andian-tafiky ny kintana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho potika hiraraka avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hihorona toy ny horonan-taratasy ny habakabaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny fihintsan’ny ravim-boaloboka maina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na toy ny fihintsan’ny ravin’aviavy malazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hihintsanan’ny planeta aman-kintana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ampit Mt 24.29; Mk 13.25; Apôk 6.13-14. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'kintana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': mahafaoka ny planeta koa izany.'
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny ana habakabaka ilay sabatry ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mandihindihy toa mamo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka indro miantonta hamely an’i Edôma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny amin’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Edôma na ny Edômita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dia jereo Is 63.1-6; Jer 49.7-22; Ezek 25.12-14; Ham 1.11-12; Hôb; Mal 1.2-4.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay firenena voatendry haringana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho famaizan’ny TOMPO azy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno ra ilay sabatry ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mihosina menaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ran’ny zanak’ondry sy osilahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa menaka avy amin’ny fonom-boany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria misy sorona ataon’ny TOMPO ao Bôtserà
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fandringanana goavana ao amin’ny tany Edôma
    - type: usfm
      marker: f
