  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaripaka miaraka amin’ireo koa ny ombimanga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny vantotr’omby sy ny ombilahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka vonton-dra ny tanin’ny Edômita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihosi-menaka ny vovo-taniny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, andron’ny valifaty izany ho an’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady taona famaliana ho an’Ilay mpiaro an’i '
    - type: usfm
      marker: w
