        marker: fr
        children:
        - type: text
          text: '34.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ny and manontolo dia jereo Is 63.1-6; Jl 4.19; Sal 137.7; Fit 4.21-22. –I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bôtserà: '
      - type: usfm
