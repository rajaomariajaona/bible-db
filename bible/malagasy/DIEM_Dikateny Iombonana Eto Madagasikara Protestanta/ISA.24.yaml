document_id: ISA.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Simba tanteraka ny tany manontolo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro ny TOMPO fa hanimba ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handrava azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: havadiny ambony ambany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary haeliny ny mponina eo aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manomboka eto ny toko efatra (Is 24.27) izay mifantoka amin’ny fiafaran’izao tontolo izao.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa hitovy ihany ny hanjo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpisorona sy ny vahoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tompolahy sy ny mpanompolahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tompovavy sy ny mpanompovaviny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpivarotra sy ny mpividy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpampindrana sy ny mpindrana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpampisambo-bola sy ny mpisambo-bola.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho simba sy ho rava tanteraka ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa izao teny izao no nambaran’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Misaona sy malazo ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: milofika sy malazo izao tontolo izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: milofika miaraka amin’ny tany koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny habakabaka any ambony any.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny tany dia voaloton’ny mponina ao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nandika ny lalànan’ny Tompo ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nanaraka ny fitsipika
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nivadika tamin’ny fanekempihavanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay maharitra mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa levon’ny ozon’Andriamanitra ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitondra fahoriana ny mponina eo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny heloka nataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hihena ireo ka vitsy dia vitsy no ho tavela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Misaona ny divay vaovao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa milofika ny rantsam-boaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misento avokoa ireo mpifalifaly am-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nitsahatra ny gadona firavoana amin’amponga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nijanona ny horakorak’ireo mpanao korana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nitsahatra koa ny feo fifaliana amin-dokanga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lokanga: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Sal 137.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy misy divay hosotroina intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka foana ny hirahira;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mangidy mbamin’ny toaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo am-bavan’ny mpisotro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny divay no fisotro mahafaly fo ka raha tsy eo izy, dia tsy misy dikany ary tsy misy tsirony na dia ny toaka sy fisotro mahery hafa aza.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rava ilay tanàna feno zava-poana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihidy ny trano rehetra ka tsy azo idirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mitaraina ny olona eny an-dalam-be
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy misy intsony ny divay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanjavona ny firavoravoana rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nisy fifaliana intsony teo amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Zava-mampahonena sisa no tao an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rava sy montsamontsana ny vavahady!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny eto ambonin’ny tany sy eo anivon’ireo firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tahaka ny ôliva avy nahintsana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho tahaka ny voaloboka avy notazana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ahitana zavatra firy intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandihy tsy afa-tavony
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izay sisa velona no manandratra ny feony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihoby ny fahalehibiazan’ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any andrefana any izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no manao horakora-pifaliana hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Aoka homem-boninahitra ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny faritra atsinanana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay TOMPO Andriamanitr’i Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka homem-boninahitra ny anarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amin’ny tany amoron-dranomasina!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hatrany am-paran’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no andrenesanay hira hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Voninahitra anie ho an’Ilay Marina!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa hoy kosa aho anakampoko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Vita ny amiko, vita ny amiko.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lozan’ireo mpamadika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamadika tokoa ny mpamadika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mamadika hatrany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fampihorohoroana sy longoa ary fandrika harato
- type: usfm
  marker: q1
  children:
  - type: text
    text: no miandry anareo, ry mponina eto an-tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.17 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 17-18:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Jer 48.43-44; Ham 5.19.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa izay mandositra ny kiakiaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: vokatry ny fampihorohoroana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho latsaka ao anatin’ny longoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay tafakatra avy ao amin’ny longoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho voan’ny fandrika harato.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misokatra ny hidin-drano any ambony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 7.11; 8.2.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihozongozona ny fanorenan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vakivaky ny tany ary tena mitresaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voadona mafy izy ka mihotsaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mivembena toy ny mamo ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihevingevina toy ny tranobongo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mitambesatra aminy ny heloka vitany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka potraka izy ary tsy afa-miarina intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanombohan’ny fanjakan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Amin’izany andro izany, dia hirotsaka an-tsehatra any ambony any ny TOMPO ka hamely ny andian’ireo planeta aman-kintana; ary hirotsaka an-tsehatra etỳ an-tany koa Izy ka hamely ny mpanjakan’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hangonina ho ao an-davaka toy ny gadra avokoa ireny, ka hohidiana an-tranomaizina; ary rehefa ela ny ela, dia hiseho fitsarana izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Amin’izay noho ny henatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hivoaramena ny volana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hivaloarika ny masoandro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny TOMPOn’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hanjaka ao Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eo an-tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hamirapira-boninahitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehan’ireo loholony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo loholony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Apôk 19.4.
    marker-yv: yv-n
  - type: text
    text: .
