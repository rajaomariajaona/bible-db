document_id: ISA.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Simba tanteraka ny tany manontolo
  - type: text
    content: Indro ny TOMPO fa hanimba ny tany
  - type: text
    content: ka handrava azy;
  - type: text
    content: havadiny ambony ambany izy
  - type: text
    content: ary haeliny ny mponina eo aminy
  - type: note
    content: Manomboka eto ny toko efatra (Is 24.27) izay mifantoka amin’ny fiafaran’izao tontolo izao.
  - type: text
    content: .
  '10':
  - type: text
    content: Rava ilay tanàna feno zava-poana;
  - type: text
    content: mihidy ny trano rehetra ka tsy azo idirana.
  '11':
  - type: text
    content: Mitaraina ny olona eny an-dalam-be
  - type: text
    content: fa tsy misy intsony ny divay;
  - type: text
    content: nanjavona ny firavoravoana rehetra
  - type: text
    content: ary tsy nisy fifaliana intsony teo amin’ny tany.
  '12':
  - type: text
    content: Zava-mampahonena sisa no tao an-tanàna,
  - type: text
    content: rava sy montsamontsana ny vavahady!
  '13':
  - type: text
    content: Ny eto ambonin’ny tany sy eo anivon’ireo firenena
  - type: text
    content: dia ho tahaka ny ôliva avy nahintsana
  - type: text
    content: sy ho tahaka ny voaloboka avy notazana
  - type: text
    content: ka tsy ahitana zavatra firy intsony.
  - type: heading
    content: Mandihy tsy afa-tavony
  '14':
  - type: text
    content: Izay sisa velona no manandratra ny feony
  - type: text
    content: ka mihoby ny fahalehibiazan’ny TOMPO;
  - type: text
    content: avy any andrefana any izy ireo
  - type: text
    content: 'no manao horakora-pifaliana hoe:'
  '15':
  - type: text
    content: «Aoka homem-boninahitra ny TOMPO
  - type: text
    content: any amin’ny faritra atsinanana!
  - type: text
    content: Ilay TOMPO Andriamanitr’i Israely,
  - type: text
    content: aoka homem-boninahitra ny anarany
  - type: text
    content: eny amin’ny tany amoron-dranomasina!»
  '16':
  - type: text
    content: Hatrany am-paran’ny tany
  - type: text
    content: 'no andrenesanay hira hoe:'
  - type: text
    content: «Voninahitra anie ho an’Ilay Marina!»
  - type: text
    content: 'Fa hoy kosa aho anakampoko hoe:'
  - type: text
    content: «Vita ny amiko, vita ny amiko.»
  - type: text
    content: Lozan’ireo mpamadika!
  - type: text
    content: Mamadika tokoa ny mpamadika;
  - type: text
    content: eny, mamadika hatrany izy.
  '17':
  - type: text
    content: Fampihorohoroana sy longoa ary fandrika harato
  - type: text
    content: no miandry anareo, ry mponina eto an-tany
  - type: note
    content: 'And 17-18: ampit Jer 48.43-44; Ham 5.19.'
  - type: text
    content: .
  '18':
  - type: text
    content: Koa izay mandositra ny kiakiaka
  - type: text
    content: vokatry ny fampihorohoroana,
  - type: text
    content: dia ho latsaka ao anatin’ny longoa;
  - type: text
    content: ary izay tafakatra avy ao amin’ny longoa
  - type: text
    content: dia ho voan’ny fandrika harato.
  - type: text
    content: Misokatra ny hidin-drano any ambony
  - type: note
    content: Jereo Gen 7.11; 8.2.
  - type: text
    content: ','
  - type: text
    content: ka mihozongozona ny fanorenan’ny tany.
  '19':
  - type: text
    content: Vakivaky ny tany ary tena mitresaka;
  - type: text
    content: voadona mafy izy ka mihotsaka.
  '2':
  - type: text
    content: Koa hitovy ihany ny hanjo
  - type: text
    content: ny mpisorona sy ny vahoaka,
  - type: text
    content: ny tompolahy sy ny mpanompolahiny,
  - type: text
    content: ny tompovavy sy ny mpanompovaviny,
  - type: text
    content: ny mpivarotra sy ny mpividy,
  - type: text
    content: ny mpampindrana sy ny mpindrana
  - type: text
    content: ny mpampisambo-bola sy ny mpisambo-bola.
  '20':
  - type: text
    content: Mivembena toy ny mamo ny tany
  - type: text
    content: ary mihevingevina toy ny tranobongo,
  - type: text
    content: fa mitambesatra aminy ny heloka vitany
  - type: text
    content: ka potraka izy ary tsy afa-miarina intsony.
  - type: heading
    content: Fanombohan’ny fanjakan’Andriamanitra
  '21':
  - type: text
    content: 'Amin’izany andro izany, dia hirotsaka an-tsehatra any ambony any ny TOMPO ka hamely ny andian’ireo planeta aman-kintana; ary hirotsaka an-tsehatra etỳ an-tany koa Izy ka hamely ny mpanjakan’ny tany. '
  '22':
  - type: text
    content: Hangonina ho ao an-davaka toy ny gadra avokoa ireny, ka hohidiana an-tranomaizina; ary rehefa ela ny ela, dia hiseho fitsarana izy rehetra.
  '23':
  - type: text
    content: Amin’izay noho ny henatra
  - type: text
    content: dia hivoaramena ny volana
  - type: text
    content: ary hivaloarika ny masoandro;
  - type: text
    content: fa ny TOMPOn’izao rehetra izao
  - type: text
    content: no hanjaka ao Jerosalema,
  - type: text
    content: 'eo an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: sady hamirapira-boninahitra
  - type: text
    content: eo anatrehan’ireo loholony
  - type: note
    content: 'ireo loholony: ampit Apôk 19.4.'
  - type: text
    content: .
  '3':
  - type: text
    content: Ho simba sy ho rava tanteraka ny tany.
  - type: text
    content: 'Fa izao teny izao no nambaran’ny TOMPO:'
  '4':
  - type: text
    content: «Misaona sy malazo ny tany,
  - type: text
    content: milofika sy malazo izao tontolo izao,
  - type: text
    content: milofika miaraka amin’ny tany koa
  - type: text
    content: ny habakabaka any ambony any.»
  '5':
  - type: text
    content: Ny tany dia voaloton’ny mponina ao aminy
  - type: text
    content: fa nandika ny lalànan’ny Tompo ireny,
  - type: text
    content: tsy nanaraka ny fitsipika
  - type: text
    content: fa nivadika tamin’ny fanekempihavanana
  - type: text
    content: izay maharitra mandrakizay.
  '6':
  - type: text
    content: Koa levon’ny ozon’Andriamanitra ny tany;
  - type: text
    content: ary mitondra fahoriana ny mponina eo aminy
  - type: text
    content: noho ny heloka nataony;
  - type: text
    content: hihena ireo ka vitsy dia vitsy no ho tavela.
  '7':
  - type: text
    content: Misaona ny divay vaovao
  - type: text
    content: fa milofika ny rantsam-boaloboka,
  - type: text
    content: misento avokoa ireo mpifalifaly am-po.
  '8':
  - type: text
    content: Nitsahatra ny gadona firavoana amin’amponga,
  - type: text
    content: nijanona ny horakorak’ireo mpanao korana,
  - type: text
    content: nitsahatra koa ny feo fifaliana amin-dokanga
  - type: note
    content: 'lokanga: jereo Sal 137.2 sy nta.'
  - type: text
    content: .
  '9':
  - type: text
    content: Tsy misy divay hosotroina intsony
  - type: text
    content: ka foana ny hirahira;
  - type: text
    content: mangidy mbamin’ny toaka
  - type: text
    content: eo am-bavan’ny mpisotro
  - type: note
    content: Ny divay no fisotro mahafaly fo ka raha tsy eo izy, dia tsy misy dikany ary tsy misy tsirony na dia ny toaka sy fisotro mahery hafa aza.
  - type: text
    content: .
