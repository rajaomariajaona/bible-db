document_id: EXO.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mampiseho ny heriny eo imason’i Mosesy Andriamanitra
  - type: text
    content: 'Dia namaly ny TOMPO i Mosesy ka nanao hoe:'
  - type: text
    content: '–Tsy hino ahy ny Israelita ary tsy hihaino ahy, fa hilaza hoe: «Tsy nisehoan’ny TOMPO akory ianao!»'
  '10':
  - type: text
    content: 'Ary hoy i Mosesy tamin’ny TOMPO:'
  - type: text
    content: –Indrisy, ry Tompo, fa tsy mba olona mahay mandaha-teny aho na taloha na hatramin’izao nitenenanao tamiko izao, fa votsa vava sady bada miambakavaka.
  '11':
  - type: text
    content: 'Namaly azy kosa ny TOMPO hoe:'
  - type: text
    content: '–Iza no nanome vava ny olona? Iza no mahatonga azy ho moana na ho marenina na ho mahiratra na ho jamba? Moa tsy Izaho TOMPO ve? '
  '12':
  - type: text
    content: Koa mandehana ianao ankehitriny, fa homba anao Aho rehefa hiteny ianao, ka Izaho no hanoro anao izay tokony holazainao.
  '13':
  - type: text
    content: 'Fa hoy i Mosesy hoe:'
  - type: text
    content: –Mifona aho, Tompo ô, mba olon-kafa re irahina!
  '14':
  - type: text
    content: 'Dia tezitra tamin’i Mosesy ny TOMPO ka nanao hoe:'
  - type: text
    content: '–Manana rahalahy ianao, dia i Aharôna '
  - type: text
    content: levita
  - type: text
    content: '. Fantatro fa mahay mandaha-teny mihitsy izy. Indro efa eny an-dalana izy izao hitsena anao, koa raha vao mahita anao, dia ho faly tokoa. '
  '15':
  - type: text
    content: 'Holazainao azy ary hampitainao aminy izay tokony holazainy. Izaho kosa homba anareo; ka rehefa hiteny ianareo, dia Izaho no hanoro anareo izay hataonareo. '
  '16':
  - type: text
    content: 'Izy no hiteny amin’ny vahoaka hisolo anao, izy no hisolo vava anao; ary ianao kosa aminy dia ho tahaka an’Andriamanitra manolo-tsaina. '
  '17':
  - type: text
    content: Ankoatra izany, dia ento eny an-tananao iny tehina iny mba hanaovanao zava-mahagaga.
  - type: heading
    content: Miverina any amin’ny mpiray firenena aminy i Mosesy
  '18':
  - type: text
    content: 'Nandeha niverina tany amin’i Jetrao rafozany i Mosesy ka nanao taminy hoe:'
  - type: text
    content: –Mba avelao aho handeha hiverina any amin’ireo mpiray firenena amiko any Ejipta, hijery raha mbola velona ihany izy ireo na tsia.
  - type: text
    content: 'Dia hoy i Jetrao taminy:'
  - type: text
    content: –Mandehana soa aman-tsara!
  '19':
  - type: text
    content: Ary hoy ny TOMPO tamin’i Mosesy tao Midiana
  - type: note
    content: 'Midiana: Jereo 2.15 sy nta.'
  - type: text
    content: ' hoe:'
  - type: text
    content: –Ndeha tokoa miverina any Ejipta ianao satria efa maty ireo olona nifofo ny ainao.
  '2':
  - type: text
    content: 'Ary hoy ny TOMPO taminy:'
  - type: text
    content: –Inona moa iny an-tananao iny?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Tehina!
  '20':
  - type: text
    content: 'Koa nalain’i Mosesy ny vadiny aman-janany, natainginy teo amin’ny borikiny, dia niverina ho any Ejipta izy. Ary nataony an-tanana koa ilay tehina nasain’Andriamanitra nentiny. '
  '21':
  - type: text
    content: 'Hoy indray ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Diniho fa efa nataoko eo am-pelatananao ireo zava-mahagaga isan-karazany. Koa rehefa tafaverina any Ejipta ianao, dia ataovy eo anatrehan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' ireny; Izaho kosa hanamafy ny fony ka tsy handefa ny Israelita izy. '
  '22':
  - type: text
    content: 'Dia ambarao amin’ny Farao hoe: «Izao no lazain’ny TOMPO: Zanako lahimatoa ny vahoaka Israely. '
  '23':
  - type: text
    content: Efa nandidy anao Aho mba handefa ny zanako hanao fanompoam-pivavahana amiko, nefa nolavinao; koa hovonoiko ho faty ny zanakao lahimatoa
  - type: note
    content: Jereo 12.29.
  - type: text
    content: .»
  '24':
  - type: text
    content: Nony teny an-dalana, indray alina tao an-tranombahiny, dia nanatona an’i Mosesy ny TOMPO ka nitady hamono hahafaty azy
  - type: note
    content: 'Ny tantara an-tselika voalaza eo amin’ny and 24-26 dia mifono ankamantatra: tsy tena fantatra mazava mantsy ny soloin’ireo mpisolo anarana hebreo. Tsy voatonona ao ny anaran’i Mosesy ary tsy fantatra koa ny hevitry ny hoe vady azo tamin’ny ra.'
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Koa nalain’i Tsipôrà ny vato maranitra, dia noforany ny zanany lahy; ary natehiny teo anelanelam-pen’i Mosesy ilay vato, sady hoy izy tamin’ny vadiny: «Eny, vady azo tamin’ny ra ianao ho ahy.» '
  '26':
  - type: text
    content: 'Dia nialan’Andriamanitra tsy nataony inona i Mosesy. Nolazain’i Tsipôrà hoe «vady azo tamin’ny ra» i Mosesy noho ny '
  - type: text
    content: famorana
  - type: text
    content: .
  '27':
  - type: text
    content: 'Dia niteny tamin’i Aharôna ny TOMPO hoe:'
  - type: text
    content: –Mandehana mankany an-taniefitra hitsena an’i Mosesy
  - type: note
    content: Jereo 3.1 sy nta.
  - type: text
    content: .
  - type: text
    content: 'Dia nandeha i Aharôna ary nifanehatra taminy tao an-tendrombohitr’Andriamanitra, ka nanoroka azy. '
  '28':
  - type: text
    content: 'Notantarain’i Mosesy an’i Aharôna avokoa ny teny rehetra nanirahan’ny TOMPO azy sy ny famantarana rehetra izay nasainy nataony. '
  '29':
  - type: text
    content: 'Avy teo dia niara-nandeha izy mirahalahy, ka namory ny '
  - type: text
    content: loholona
  - type: text
    content: ' rehetra tao amin’i Israely. '
  '3':
  - type: text
    content: 'Ary hoy ny TOMPO hoe:'
  - type: text
    content: –Atsipazo amin’ny tany iny!
  - type: text
    content: 'Dia natsipin’i Mosesy tamin’ny tany izany ka tonga bibilava. Nandositra azy i Mosesy, '
  '30':
  - type: text
    content: 'Nambaran’i Aharôna azy ireo avokoa ny teny rehetra izay nolazain’ny TOMPO tamin’i Mosesy, ary notanterahiny teo imason’ny Israelita ny famantarana. '
  '31':
  - type: text
    content: Nino ny vahoaka ary nahatakatra fa efa nahita ny fahoriany tokoa ny TOMPO, ka nanao izay hanafahana azy. Dia niondrika ny Israelita mba hitsaoka ny Tompo.
  '4':
  - type: text
    content: 'fa hoy ny TOMPO taminy:'
  - type: text
    content: –Ahinjiro ny tananao ka sambory amin’ny rambony io.
  - type: text
    content: 'Dia naninji-tanana i Mosesy ka nitana azy tamin’ny rambony, ary nanjary tehina teo an-tanany ilay bibilava. '
  '5':
  - type: text
    content: 'Koa hoy ny TOMPO hoe:'
  - type: text
    content: '–Izany dia mba hahatonga ny Israelita hatoky fa efa niseho taminao Aho TOMPO Andriamanitry ny razany, Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba. '
  '6':
  - type: text
    content: Ary ankehitriny, atsofohy ao an-tratranao ny tananao.
  - type: text
    content: 'Dia natsofok’i Mosesy tao an-tratrany ny tanany; nefa rehefa notsoahany avy tao, dia indro '
  - type: text
    content: boka
  - type: text
    content: ' ny tanany ka fotsy toy ny oram-panala. '
  '7':
  - type: text
    content: 'Ary hoy koa ny TOMPO hoe:'
  - type: text
    content: –Atsofohy ao an-tratranao indray ny tananao.
  - type: text
    content: 'Dia natsofok’i Mosesy tao an-tratrany indray ny tanany; ka rehefa notsoahany avy tao, dia indro fa niverina tamin’ny laoniny. '
  '8':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Raha tsy mino anao izy ka tsy mihaino anao amin’ny famantarana voalohany, dia hino anao kosa izy noho ny famantarana manaraka. '
  '9':
  - type: text
    content: Ary raha mbola tsy mino anao izy ka tsy mihaino anao amin’ireo famantarana roa ireo, dia makà rano avy ao Neily ka aidino amin’ny tany maina, fa ho tonga ra eo amin’ny tany io rano io.
  - type: heading
    content: Tendren’ny Tompo ho lefitr’i Mosesy i Aharôna
