document_id: EXO.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampiseho ny heriny eo imason’i Mosesy Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ny TOMPO i Mosesy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy hino ahy ny Israelita ary tsy hihaino ahy, fa hilaza hoe: «Tsy nisehoan’ny TOMPO akory ianao!»'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Mosesy tamin’ny TOMPO:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indrisy, ry Tompo, fa tsy mba olona mahay mandaha-teny aho na taloha na hatramin’izao nitenenanao tamiko izao, fa votsa vava sady bada miambakavaka.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly azy kosa ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Iza no nanome vava ny olona? Iza no mahatonga azy ho moana na ho marenina na ho mahiratra na ho jamba? Moa tsy Izaho TOMPO ve? '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa mandehana ianao ankehitriny, fa homba anao Aho rehefa hiteny ianao, ka Izaho no hanoro anao izay tokony holazainao.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mifona aho, Tompo ô, mba olon-kafa re irahina!
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tezitra tamin’i Mosesy ny TOMPO ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Manana rahalahy ianao, dia i Aharôna '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: '. Fantatro fa mahay mandaha-teny mihitsy izy. Indro efa eny an-dalana izy izao hitsena anao, koa raha vao mahita anao, dia ho faly tokoa. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Holazainao azy ary hampitainao aminy izay tokony holazainy. Izaho kosa homba anareo; ka rehefa hiteny ianareo, dia Izaho no hanoro anareo izay hataonareo. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izy no hiteny amin’ny vahoaka hisolo anao, izy no hisolo vava anao; ary ianao kosa aminy dia ho tahaka an’Andriamanitra manolo-tsaina. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ankoatra izany, dia ento eny an-tananao iny tehina iny mba hanaovanao zava-mahagaga.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miverina any amin’ny mpiray firenena aminy i Mosesy
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandeha niverina tany amin’i Jetrao rafozany i Mosesy ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba avelao aho handeha hiverina any amin’ireo mpiray firenena amiko any Ejipta, hijery raha mbola velona ihany izy ireo na tsia.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jetrao taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana soa aman-tsara!
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hoy ny TOMPO tamin’i Mosesy tao Midiana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Midiana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.15 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha tokoa miverina any Ejipta ianao satria efa maty ireo olona nifofo ny ainao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny TOMPO taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona moa iny an-tananao iny?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tehina!
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nalain’i Mosesy ny vadiny aman-janany, natainginy teo amin’ny borikiny, dia niverina ho any Ejipta izy. Ary nataony an-tanana koa ilay tehina nasain’Andriamanitra nentiny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Diniho fa efa nataoko eo am-pelatananao ireo zava-mahagaga isan-karazany. Koa rehefa tafaverina any Ejipta ianao, dia ataovy eo anatrehan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' ireny; Izaho kosa hanamafy ny fony ka tsy handefa ny Israelita izy. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia ambarao amin’ny Farao hoe: «Izao no lazain’ny TOMPO: Zanako lahimatoa ny vahoaka Israely. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Efa nandidy anao Aho mba handefa ny zanako hanao fanompoam-pivavahana amiko, nefa nolavinao; koa hovonoiko ho faty ny zanakao lahimatoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 12.29.
      marker-yv: yv-n
    - type: text
      text: .»
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony teny an-dalana, indray alina tao an-tranombahiny, dia nanatona an’i Mosesy ny TOMPO ka nitady hamono hahafaty azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny tantara an-tselika voalaza eo amin’ny and 24-26 dia mifono ankamantatra: tsy tena fantatra mazava mantsy ny soloin’ireo mpisolo anarana hebreo. Tsy voatonona ao ny anaran’i Mosesy ary tsy fantatra koa ny hevitry ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: vady azo tamin’ny ra.
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nalain’i Tsipôrà ny vato maranitra, dia noforany ny zanany lahy; ary natehiny teo anelanelam-pen’i Mosesy ilay vato, sady hoy izy tamin’ny vadiny: «Eny, vady azo tamin’ny ra ianao ho ahy.» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nialan’Andriamanitra tsy nataony inona i Mosesy. Nolazain’i Tsipôrà hoe «vady azo tamin’ny ra» i Mosesy noho ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famorana
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’i Aharôna ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana mankany an-taniefitra hitsena an’i Mosesy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha i Aharôna ary nifanehatra taminy tao an-tendrombohitr’Andriamanitra, ka nanoroka azy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notantarain’i Mosesy an’i Aharôna avokoa ny teny rehetra nanirahan’ny TOMPO azy sy ny famantarana rehetra izay nasainy nataony. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy teo dia niara-nandeha izy mirahalahy, ka namory ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' rehetra tao amin’i Israely. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Atsipazo amin’ny tany iny!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natsipin’i Mosesy tamin’ny tany izany ka tonga bibilava. Nandositra azy i Mosesy, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nambaran’i Aharôna azy ireo avokoa ny teny rehetra izay nolazain’ny TOMPO tamin’i Mosesy, ary notanterahiny teo imason’ny Israelita ny famantarana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nino ny vahoaka ary nahatakatra fa efa nahita ny fahoriany tokoa ny TOMPO, ka nanao izay hanafahana azy. Dia niondrika ny Israelita mba hitsaoka ny Tompo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hoy ny TOMPO taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahinjiro ny tananao ka sambory amin’ny rambony io.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naninji-tanana i Mosesy ka nitana azy tamin’ny rambony, ary nanjary tehina teo an-tanany ilay bibilava. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hoy ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izany dia mba hahatonga ny Israelita hatoky fa efa niseho taminao Aho TOMPO Andriamanitry ny razany, Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary ankehitriny, atsofohy ao an-tratranao ny tananao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natsofok’i Mosesy tao an-tratrany ny tanany; nefa rehefa notsoahany avy tao, dia indro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: boka
    - type: text
      text: ' ny tanany ka fotsy toy ny oram-panala. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Atsofohy ao an-tratranao indray ny tananao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natsofok’i Mosesy tao an-tratrany indray ny tanany; ka rehefa notsoahany avy tao, dia indro fa niverina tamin’ny laoniny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha tsy mino anao izy ka tsy mihaino anao amin’ny famantarana voalohany, dia hino anao kosa izy noho ny famantarana manaraka. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary raha mbola tsy mino anao izy ka tsy mihaino anao amin’ireo famantarana roa ireo, dia makà rano avy ao Neily ka aidino amin’ny tany maina, fa ho tonga ra eo amin’ny tany io rano io.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tendren’ny Tompo ho lefitr’i Mosesy i Aharôna
    marker-yv: yv-h
