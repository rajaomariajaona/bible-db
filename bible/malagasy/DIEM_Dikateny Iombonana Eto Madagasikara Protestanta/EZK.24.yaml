document_id: EZK.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jerosalema oharina amin’ny vilany harafesina
  - type: text
    content: Tamin’ny taona fahasivy taorian’ny fahababoana
  - type: note
    content: Izany hoe Desambra-589 Janoary 588 tal J.K. (jereo 2 Mp 25.1).
  - type: text
    content: ', nony andro fahafolon’ny volana fahafolo, dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: Atohofy betsaka ny kitay,
  - type: text
    content: dia areheto ny afo,
  - type: text
    content: andrahoy ho masaka tsara ny hena,
  - type: text
    content: ka asio zava-manitra ho fangarony;
  - type: text
    content: ary aoka ho may tanteraka ny taolana.
  '11':
  - type: text
    content: Eo ambonin’ny vainafo eo kosa
  - type: text
    content: no ataingeno ilay vilany foana
  - type: text
    content: mba hampafana azy sy hahatonga ny halimo ho mena;
  - type: text
    content: aoka ho levona amin’izay ireo loto ao anatiny
  - type: text
    content: ary aoka ho kila tanteraka ny harafesiny.›
  '12':
  - type: text
    content: 'Nefa very maina ny ezaka rehetra hanalana ny harafesina! Betsaka loatra ny harafesin’ilay vilany ka tsy afaky ny afo. '
  '13':
  - type: text
    content: 'Ry Jerosalema, nandoto tena tamin’ny filibànao ianao. Te ho '
  - type: text
    content: nanadio
  - type: text
    content: ' anao Aho, nefa tsy nety voadio ianao. Koa tsy hadio ho afaka amin’ny fahalotoanao ianao ambara-pialan’ny fahatezerako manontolo aminao. '
  '14':
  - type: text
    content: Izaho TOMPO no miteny, ka ho tonga izany ary hampihariko tsy misy fisalasalana na nenina na indrafo. Araka ny toetranao sy ny asanao no hanamelohana anao. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  - type: heading
    content: Ny fisaonan’i Ezekiela
  '15':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '16':
  - type: text
    content: '«Ry ilay taranak’olombelona, halaiko tampoka tsy ho eo aminao ilay fifalian’ny masonao. Nefa tsy hitaraina na hitomany na handrotsa-dranomaso akory ianao. '
  '17':
  - type: text
    content: Tano ho anao ny alahelonao fa aza manao fisaonana. Afehezo eny an-dohanao ny hamama ary manaova kapa toy ny mahazatra ianao, aza misarona endrika na mihinana ny mofo fanao amin’ny fisaonana
  - type: note
    content: Raha misy fisaonana dia mitaraina fatratra ny olona, mandeha tsy mikapa sy tsy misatroka (jereo 2 Sam 15.30) ary somary misaron-tava (jereo 2 Sam 19.5).
  - type: text
    content: .»
  '18':
  - type: text
    content: 'Dia niteny tamin’ny vahoaka aho ny maraina; ary ny harivan’iny ihany dia maty ny vadiko. Nony ampitso maraina dia nanao araka izay efa nandidian’ny Tompo ahy aho. '
  '19':
  - type: text
    content: 'Koa niangavy ahy ny olona mba hanazava aminy ny anton’izao fihetsiko izao. '
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, raiso an-tsoratra ny datin’andro anio, satria mitsingerina anio ny nanombohan’ny mpanjakan’i Babilôna nanao fahirano an’i Jerosalema. '
  '20':
  - type: text
    content: 'Dia hoy aho taminy: «Nisy tenin’ny TOMPO tamiko niangavy ahy '
  '21':
  - type: text
    content: 'hanambara aminareo Israelita fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Havelako holotoina ny '
  - type: text
    content: toerako masina
  - type: text
    content: ' izay fireharehànareo fatratra sy fifalian’ny masonareo ary fanantenàm-piainanareo. Ny zanakareo lahy sy vavy, izay tafajanona ao Jerosalema, dia ho fatin’ny sabatra'
  - type: note
    content: 'tafajanona ao Jerosalema: tamin’ny fahababoana voalohany tamin’ny 597 tal J.K., dia ampahan’ny vahoaka ihany no tsy maintsy nandao an’i Joda.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Dia hanao tahaka an’i Ezekiela ianareo, tsy hisarona endrika ary tsy hihinana ny mofo fanao amin’ny fisaonana. '
  '23':
  - type: text
    content: 'Hofehezinareo eny an-dohanareo ny hamama, ary hanaovanareo ny kapanareo, tsy hitaraina ianareo sady tsy hitomany. Nefa hihareraka ianareo noho ny fahadisoanareo, ary hifampitoloko ianareo samy mpiray firenena. '
  '24':
  - type: text
    content: Koa i Ezekiela dia ho famantaram-panairana ho anareo. Tahaka izay rehetra nataony no hataonareo koa; ary rehefa tonga ireo zavatra voalaza ireo, dia hoekenareo fa Izaho no Tompo ANDRIANANAHARY.›
  '25':
  - type: text
    content: '«Ianao kosa, ry ilay taranak’olombelona, mihainoa: Indray andro any, dia hoesoriko tsy ho eo aminy ny toera-masina izay fiarovany sy fahafinaretan’ny voninahiny ary fifalian’ny masony sy hamamiam-piainany; hoesoriko aminy koa ny zanany lahy sy vavy. '
  '26':
  - type: text
    content: 'Amin’izany andro izany dia hisy olona iray handositra ka ho avy hampandre anao ny vaovao. '
  '27':
  - type: text
    content: Androtr’iny ihany dia hisoka-bava hiteny ianao, fa tsy ho moana intsony
  - type: note
    content: Mikasika io nahamoana an’i Ezekiela io, jereo 3.26.
  - type: text
    content: ', ka hiresaka amin’io olona io. Ho famantaram-panairana ianao ho an’ny vahoakako, ka amin’izay dia hoekeny fa Izaho no TOMPO.»'
  '3':
  - type: text
    content: 'Arosoy amin’ny vahoakako maditra ity '
  - type: text
    content: fanoharana
  - type: text
    content: ' ity, ka ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY:'
  - type: text
    content: ‹Manomàna vilany iray
  - type: note
    content: Momba ny sary asehon’ny vilany, jereo 11.3-7 sy ny naoty momba ny 11.3.
  - type: text
    content: ' eo an-tokoana'
  - type: text
    content: ka asio rano ao anatiny.
  '4':
  - type: text
    content: Ary vongan-kena no arotsahy ao,
  - type: text
    content: dia ny vongany tsara rehetra,
  - type: text
    content: na ny feny na ny sorony;
  - type: text
    content: ary fenoy taolana voafantina izany.
  '5':
  - type: text
    content: Ondry voafantina no akao ny hena.
  - type: text
    content: Ary tohofy kitay
  - type: note
    content: 'kitay: araka ny and 10, fa ny RM kosa eto dia manao hoe taolana.'
  - type: text
    content: ao ambanin’ny vilany;
  - type: text
    content: dia ampangotrahy tsara ireo rehetra ireo,
  - type: text
    content: satria handrahoina ihany koa ny taolana.›
  '6':
  - type: text
    content: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY dia milaza hoe:'
  - type: text
    content: ‹Lozan’ny tanàna mpamono olona!
  - type: text
    content: Ny anoharana azy dia vilany misy harafesina
  - type: text
    content: ka harafesina tsy mety afaka ao anatiny.
  - type: text
    content: Loary tsirairay tao ny vongan-kena,
  - type: text
    content: fa aza misy anaovana antsapaka havela.
  '7':
  - type: text
    content: Eny, mbola ao an-tanàna ny ra izay nalatsany;
  - type: text
    content: teo ambony vato mangadihady no nandrarahany azy,
  - type: text
    content: fa tsy naidiny teo amin’ny tany kosa
  - type: text
    content: mba ho voatototry ny vovoka
  - type: note
    content: Noheverina fa ny ra latsaka dia mitaraina amin’Andriamanitra ary mitaky valifaty raha tsy mbola voafokan’ny tany na voatototra vovoka (jereo Gen 4.10; Jôb 16.18).
  - type: text
    content: .
  '8':
  - type: text
    content: Dia navelako tsy hitototra
  - type: text
    content: teo ambony vato mangadihady teo
  - type: text
    content: ny ra izay nalatsany,
  - type: text
    content: mba hampitroatra ny hatezerako
  - type: text
    content: ka hampiharana ny famaizako.›
  '9':
  - type: text
    content: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY:'
  - type: text
    content: ‹Lozan’ny tanàna mpamono olona!
  - type: text
    content: Izaho mihitsy no hanamboatra
  - type: text
    content: fatana goavana handoroana azy.
