document_id: EZK.24,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jerosalema oharina amin’ny vilany harafesina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tamin’ny taona fahasivy taorian’ny fahababoana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izany hoe Desambra-589 Janoary 588 tal J.K. (jereo 2 Mp 25.1).
      marker-yv: yv-n
    - type: text
      text: ', nony andro fahafolon’ny volana fahafolo, dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Atohofy betsaka ny kitay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia areheto ny afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andrahoy ho masaka tsara ny hena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka asio zava-manitra ho fangarony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ho may tanteraka ny taolana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Eo ambonin’ny vainafo eo kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ataingeno ilay vilany foana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampafana azy sy hahatonga ny halimo ho mena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho levona amin’izay ireo loto ao anatiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ho kila tanteraka ny harafesiny.›
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nefa very maina ny ezaka rehetra hanalana ny harafesina! Betsaka loatra ny harafesin’ilay vilany ka tsy afaky ny afo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ry Jerosalema, nandoto tena tamin’ny filibànao ianao. Te ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nanadio
    - type: text
      text: ' anao Aho, nefa tsy nety voadio ianao. Koa tsy hadio ho afaka amin’ny fahalotoanao ianao ambara-pialan’ny fahatezerako manontolo aminao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izaho TOMPO no miteny, ka ho tonga izany ary hampihariko tsy misy fisalasalana na nenina na indrafo. Araka ny toetranao sy ny asanao no hanamelohana anao. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fisaonan’i Ezekiela
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '«Ry ilay taranak’olombelona, halaiko tampoka tsy ho eo aminao ilay fifalian’ny masonao. Nefa tsy hitaraina na hitomany na handrotsa-dranomaso akory ianao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tano ho anao ny alahelonao fa aza manao fisaonana. Afehezo eny an-dohanao ny hamama ary manaova kapa toy ny mahazatra ianao, aza misarona endrika na mihinana ny mofo fanao amin’ny fisaonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Raha misy fisaonana dia mitaraina fatratra ny olona, mandeha tsy mikapa sy tsy misatroka (jereo 2 Sam 15.30) ary somary misaron-tava (jereo 2 Sam 19.5).
      marker-yv: yv-n
    - type: text
      text: .»
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia niteny tamin’ny vahoaka aho ny maraina; ary ny harivan’iny ihany dia maty ny vadiko. Nony ampitso maraina dia nanao araka izay efa nandidian’ny Tompo ahy aho. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa niangavy ahy ny olona mba hanazava aminy ny anton’izao fihetsiko izao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Ry ilay taranak’olombelona, raiso an-tsoratra ny datin’andro anio, satria mitsingerina anio ny nanombohan’ny mpanjakan’i Babilôna nanao fahirano an’i Jerosalema. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia hoy aho taminy: «Nisy tenin’ny TOMPO tamiko niangavy ahy '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'hanambara aminareo Israelita fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Havelako holotoina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: toerako masina
    - type: text
      text: ' izay fireharehànareo fatratra sy fifalian’ny masonareo ary fanantenàm-piainanareo. Ny zanakareo lahy sy vavy, izay tafajanona ao Jerosalema, dia ho fatin’ny sabatra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tafajanona ao Jerosalema: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tamin’ny fahababoana voalohany tamin’ny 597 tal J.K., dia ampahan’ny vahoaka ihany no tsy maintsy nandao an’i Joda.
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hanao tahaka an’i Ezekiela ianareo, tsy hisarona endrika ary tsy hihinana ny mofo fanao amin’ny fisaonana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Hofehezinareo eny an-dohanareo ny hamama, ary hanaovanareo ny kapanareo, tsy hitaraina ianareo sady tsy hitomany. Nefa hihareraka ianareo noho ny fahadisoanareo, ary hifampitoloko ianareo samy mpiray firenena. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Koa i Ezekiela dia ho famantaram-panairana ho anareo. Tahaka izay rehetra nataony no hataonareo koa; ary rehefa tonga ireo zavatra voalaza ireo, dia hoekenareo fa Izaho no Tompo ANDRIANANAHARY.›
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '«Ianao kosa, ry ilay taranak’olombelona, mihainoa: Indray andro any, dia hoesoriko tsy ho eo aminy ny toera-masina izay fiarovany sy fahafinaretan’ny voninahiny ary fifalian’ny masony sy hamamiam-piainany; hoesoriko aminy koa ny zanany lahy sy vavy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Amin’izany andro izany dia hisy olona iray handositra ka ho avy hampandre anao ny vaovao. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Androtr’iny ihany dia hisoka-bava hiteny ianao, fa tsy ho moana intsony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mikasika io nahamoana an’i Ezekiela io, jereo 3.26.
      marker-yv: yv-n
    - type: text
      text: ', ka hiresaka amin’io olona io. Ho famantaram-panairana ianao ho an’ny vahoakako, ka amin’izay dia hoekeny fa Izaho no TOMPO.»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Arosoy amin’ny vahoakako maditra ity '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' ity, ka ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Manomàna vilany iray
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ny sary asehon’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: vilany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo 11.3-7 sy ny naoty momba ny 11.3.'
      marker-yv: yv-n
    - type: text
      text: ' eo an-tokoana'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka asio rano ao anatiny.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary vongan-kena no arotsahy ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny vongany tsara rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny feny na ny sorony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fenoy taolana voafantina izany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ondry voafantina no akao ny hena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tohofy kitay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'kitay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny and 10, fa ny RM kosa eto dia manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: taolana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ao ambanin’ny vilany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ampangotrahy tsara ireo rehetra ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria handrahoina ihany koa ny taolana.›
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY dia milaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Lozan’ny tanàna mpamono olona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny anoharana azy dia vilany misy harafesina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka harafesina tsy mety afaka ao anatiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loary tsirairay tao ny vongan-kena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aza misy anaovana antsapaka havela.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Eny, mbola ao an-tanàna ny ra izay nalatsany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo ambony vato mangadihady no nandrarahany azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy naidiny teo amin’ny tany kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho voatototry ny vovoka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Noheverina fa ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ra latsaka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mitaraina amin’Andriamanitra ary mitaky valifaty raha tsy mbola voafokan’ny tany na voatototra vovoka (jereo Gen 4.10; Jôb 16.18).'
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia navelako tsy hitototra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo ambony vato mangadihady teo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ra izay nalatsany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampitroatra ny hatezerako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampiharana ny famaizako.›
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Lozan’ny tanàna mpamono olona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho mihitsy no hanamboatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fatana goavana handoroana azy.
