document_id: NUM.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manolo-tena ho amin’ny fanompoan-tsampy ny Israelita
  - type: text
    content: 'Nitoby tao Sitima ny Israelita ka nanomboka nijangajanga tamin’ny vehivavy môabita, '
  '10':
  - type: text
    content: 'Ary niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '11':
  - type: text
    content: '–I Pinehasa, zanakalahin’i Elehazara sady zafikelin’i Aharôna mpisorona, no nampiala ny fahatezerako tamin’ny Israelita satria niseho ho saro-piaro momba Ahy teo anivon’izy ireo; ka dia tsy nataoko lany ringana ny Israelita, na dia saro-piaro amin’ny maha Andriamanitra Ahy aza Aho. '
  '12':
  - type: text
    content: 'Noho izany, dia lazao an’i Pinehasa fa omeko azy ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: ' ho loharanom-piadanana; '
  '13':
  - type: text
    content: izany fanekempihavanana izany dia hahatonga ny tenany sy ny taranany ho mpisorona hatrany, satria niseho ho saro-piaro momba Ahy i Pinehasa ka nahazo famelan-keloka ho an’ny Israelita.
  '14':
  - type: text
    content: 'Ilay Israelita, izay novonoina ho faty niaraka tamin’ilay vehivavy midianîta, dia i Zimrỳ zanakalahin’i Salò sady filoham-pianakaviana simehônita. '
  '15':
  - type: text
    content: Ary ilay vehivavy midianîta maty kosa dia i Kôzbỳ, zanakalahin’i Tsora izay filoham-pianakaviana midianîta.
  '16':
  - type: text
    content: 'Niteny tamin’i Mosesy indray ny TOMPO ka nanao hoe:'
  '17':
  - type: text
    content: '–Tafiho ny Midianîta ka aringano, '
  '18':
  - type: text
    content: 'fa fahavalo mpamitaka anareo tamin’ny raharahan’i Pehôra sy tamin’ny raharahan’i Kôzbỳ izay zanakavavin’ny manampahefana midianîta anankiray, ka maty novonoina tamin’ny andron’ny areti-mandringana vokatry ny raharahan’i Pehôra. '
  '2':
  - type: text
    content: 'izay nitarika azy hanao '
  - type: text
    content: sorona
  - type: text
    content: ' amin’ireo andriamaniny. '
  '3':
  - type: text
    content: 'Nanolo-tena hivavaka tao '
  - type: text
    content: Bahala
  - type: text
    content: '-Pehôra ny Israelita, ka nirehetan’ny fahatezeran’ny Tompo. '
  '4':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Alao ny filohan’ny vahoaka; dia eo anoloako no anantony azy manatrika ny masoandro, mba hampitony ny fahatezerako mirehitra aminareo Israelita.
  '5':
  - type: text
    content: 'Dia hoy i Mosesy tamin’ny mpitsara israelita:'
  - type: text
    content: –Aoka ianareo tsirairay avy samy hamono hahafaty ny olom-peheziny izay nanolo-tena hivavaka tao Bahàla-Pehôra!
  '6':
  - type: text
    content: 'Tamin’izay fotoana izay, dia nisy lehilahy israelita iray nitondra vehivavy midianita hankeo amin’ny mpiray foko aminy, teo imason’i Mosesy sy ny Fiangonana israelita manontolo izay nitomany teo am-baravaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Raha nahita izany i Pinehasa, zanakalahin’i Elehazara sady zafikelin’i Aharôna mpisorona, dia nitsangana teo anivon’ny Fiangonana ka nandray lefona; '
  '8':
  - type: text
    content: 'narahiny hatrany an-dainy ilay lehilahy israelita ka nolefoniny niaraka tamin’ny vadiny tao. Dia nitsahatra ny areti-mandringana namely ny Israelita. '
  '9':
  - type: text
    content: Ireo matin’io areti-mandringana io dia nahatratra 24 000.
