document_id: NUM.25,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manolo-tena ho amin’ny fanompoan-tsampy ny Israelita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitoby tao Sitima ny Israelita ka nanomboka nijangajanga tamin’ny vehivavy môabita, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–I Pinehasa, zanakalahin’i Elehazara sady zafikelin’i Aharôna mpisorona, no nampiala ny fahatezerako tamin’ny Israelita satria niseho ho saro-piaro momba Ahy teo anivon’izy ireo; ka dia tsy nataoko lany ringana ny Israelita, na dia saro-piaro amin’ny maha Andriamanitra Ahy aza Aho. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Noho izany, dia lazao an’i Pinehasa fa omeko azy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanako
    - type: text
      text: ' ho loharanom-piadanana; '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: izany fanekempihavanana izany dia hahatonga ny tenany sy ny taranany ho mpisorona hatrany, satria niseho ho saro-piaro momba Ahy i Pinehasa ka nahazo famelan-keloka ho an’ny Israelita.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay Israelita, izay novonoina ho faty niaraka tamin’ilay vehivavy midianîta, dia i Zimrỳ zanakalahin’i Salò sady filoham-pianakaviana simehônita. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ilay vehivavy midianîta maty kosa dia i Kôzbỳ, zanakalahin’i Tsora izay filoham-pianakaviana midianîta.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny tamin’i Mosesy indray ny TOMPO ka nanao hoe:'
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tafiho ny Midianîta ka aringano, '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'fa fahavalo mpamitaka anareo tamin’ny raharahan’i Pehôra sy tamin’ny raharahan’i Kôzbỳ izay zanakavavin’ny manampahefana midianîta anankiray, ka maty novonoina tamin’ny andron’ny areti-mandringana vokatry ny raharahan’i Pehôra. '
  '19':
  - type: usfm
    marker: m
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay nitarika azy hanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' amin’ireo andriamaniny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanolo-tena hivavaka tao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
    - type: text
      text: '-Pehôra ny Israelita, ka nirehetan’ny fahatezeran’ny Tompo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Alao ny filohan’ny vahoaka; dia eo anoloako no anantony azy manatrika ny masoandro, mba hampitony ny fahatezerako mirehitra aminareo Israelita.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Mosesy tamin’ny mpitsara israelita:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka ianareo tsirairay avy samy hamono hahafaty ny olom-peheziny izay nanolo-tena hivavaka tao Bahàla-Pehôra!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay fotoana izay, dia nisy lehilahy israelita iray nitondra vehivavy midianita hankeo amin’ny mpiray foko aminy, teo imason’i Mosesy sy ny Fiangonana israelita manontolo izay nitomany teo am-baravaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nahita izany i Pinehasa, zanakalahin’i Elehazara sady zafikelin’i Aharôna mpisorona, dia nitsangana teo anivon’ny Fiangonana ka nandray lefona; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'narahiny hatrany an-dainy ilay lehilahy israelita ka nolefoniny niaraka tamin’ny vadiny tao. Dia nitsahatra ny areti-mandringana namely ny Israelita. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo matin’io areti-mandringana io dia nahatratra 24 000.
