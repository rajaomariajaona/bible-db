document_id: DEU.31,396
type_code: plt
verses:
  '1':
  - type: heading
    content: FANAOVAN’I MOSESY VELOMA SY FAHAFATESANY
  - type: heading
    content: Voatendry handimby an’i Mosesy i Josoa
  - type: text
    content: 'Dia avy indray i Mosesy nampita ireto teny ireto tamin’ny Israelita ka nanao taminy hoe:'
  '10':
  - type: text
    content: 'Dia nanome didy azy i Mosesy ka nanao hoe:'
  - type: text
    content: –Isaky ny fito taona, amin’ny taona famotsoran-trosa, mandritra ny fankalazana ny Tranotomboka
  - type: note
    content: 'Famoizan-trosa: jereo 15.1-11. –fankalazana ny Tranotomboka: jereo ny FTS amin’ny voambolana hoe FANISANANDRO.'
  - type: text
    content: ', no hamakianareo ny teny raketin’ity Lalàna ity. Amin’izay ny Israelita rehetra ho tonga hiseho eo anatrehan’ny TOMPO Andriamanitrareo any amin’ny toerana hofidiny, ka aoka ity Lalàna ity hovakînareo aminy mba hohenoiny. '
  '12':
  - type: text
    content: 'Vorio ny vahoaka rehetra, na lehilahy, na vehivavy, na ankizy madinika, ary na dia ny vahiny ao an-tanànanareo aza, mba hihainoany sy hianarany izany ka hanajany ny TOMPO Andriamanitrareo sy himasoany hanatanteraka ny teny rehetra raketin’ity Lalàna ity. '
  '13':
  - type: text
    content: Ny zaza izay tsy mbola mahalala ity Lalàna ity, dia mba handre izany ka hianatra hanaja ny TOMPO Andriamanitrareo amin’ny andro rehetra hiainanareo eo amin’ny tany izay efa hidiranareo mba halainareo ho fananana, rehefa tafita ny ony Jôrdàna ianareo.
  - type: heading
    content: Hivadika amin’Andriamanitra i Israely
  '14':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Indro antomotra ny andro hahafatesanao; koa antsoy i Josoa, ary tongava eo anoloan’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' ianareo mba hameperako azy.'
  - type: text
    content: 'Dia nandeha nankeo anoloan’ny Tranolay fihaonana ry i Mosesy sy i Josoa '
  '15':
  - type: text
    content: ka nisehoan’ny TOMPO tamin’ny andry rahona
  - type: note
    content: Jereo Eks 13.21 sy nta.
  - type: text
    content: '; ary nijanona teo anoloan’ny varavaran’ny Tranolay izany andry rahona izany. '
  '16':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Indro hodimandry any amin’ny razanao ianao; ary ity vahoaka ity kosa hiainga hanompo sampy ka hanaraka andriamani-kafa tompoina any amin’ny tany izay efa hidirany honenana. Hilaozany Aho ary hivadihany ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' izay nataoko taminy. '
  '17':
  - type: text
    content: 'Dia hirehetan’ny fahatezerako amin’izany andro izany ity vahoaka ity ka hilaozako ary hanafenako ny tavako; hataon’ny olona levona izy sady hianjadian’ny loza amam-pahoriana maro. Amin’izany andro izany no hitenenan’ny Israelita hoe: «Noho Andriamanitra tsy eto aminay no mahatonga anay hianjadian’izao fahoriana izao!» '
  '18':
  - type: text
    content: 'Eny, hafeniko aminy tokoa ny tavako amin’izany andro izany noho ny ratsy rehetra izay nataony tamin’ny niviliany hanaraka andriamani-kafa. '
  '19':
  - type: text
    content: Ary ankehitriny, aoka hisy hanoratra izao tononkira hampitaiko aminareo izao
  - type: note
    content: Jereo toko 32.
  - type: text
    content: '; ka ianao, ry Mosesy, no mampianara azy amin’ny Israelita. Ary aoka tsy ho afaka am-bavan’ny Israelita izany tononkira izany mba ho vavolombelona hiampangako azy. '
  '2':
  - type: text
    content: '–Feno 120 taona androany aho ka tsy afa-misahana ny andraikitra fitarihana anareo intsony; sady ny TOMPO efa nilaza tamiko hoe: «Tsy hita io Jôrdàna io ianao!» '
  '20':
  - type: text
    content: Any amin’ny tany izay nampanantenaiko ny razambeny manko, dia ilay tany tondra-dronono sy tantely
  - type: note
    content: Jereo Eks 3.8 sy nta.
  - type: text
    content: ', no hitondrako ity vahoaka ity; ary hanan-kohanina izy ka ho voky sy hihamatavy, dia hivily hanaraka andriamani-kafa sy hanompo azy, ary hotsiratsirainy Aho ka hivadihany ny fanekempihavanana. '
  '21':
  - type: text
    content: Rehefa hianjadian’ny zava-dratsy amam-pahoriana maro ity vahoaka ity, dia ho vavolombelona hiampanga azy izao tononkira izao, satria tsy ho afaka eo am-bavan’ny taranany. Fantatro manko ny fisainany, na dia izao ankehitriny alohan’ny hitondrako azy any amin’ny tany izay nianianako homena azy izao aza.
  '22':
  - type: text
    content: Dia nataon’i Mosesy an-tsoratra androtrizay ihany izany tononkira izany ka nampianariny ny Israelita.
  '23':
  - type: text
    content: 'Avy eo dia nofeperan’ny TOMPO i Josoa, zanakalahin’i Nona, ka nilazany hoe:'
  - type: text
    content: –Mahereza sy matanjaha; fa ianao no hitondra ny Israelita hiditra ao amin’ny tany izay nianianako taminy homena azy, Izaho mihitsy no hiaraka aminao
  - type: note
    content: Jereo Jos 1.6.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Rehefa voasoratr’i Mosesy tao anaty boky avokoa ny teny raketin’ity Lalàna ity, '
  '25':
  - type: text
    content: 'dia nofeperany ny Levita, izay mpitondra ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO ka nataony hoe:'
  '26':
  - type: text
    content: '–Raiso ity bokin’ny Lalàna ity, ka apetraho ao anilan’ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO Andriamanitrareo; ka ho eo hatrany izany boky izany mba ho vavolombelona hiampanga ny Israelita. '
  '27':
  - type: text
    content: 'Fantatro fa maditra sy mafy hatoka ireo; izao ankehitriny mbola velona eto aminy izao aza aho, dia efa nikomy tamin’ny TOMPO ireo, ka mainka rehefa maty aho. '
  '28':
  - type: text
    content: 'Vorio eto amiko ny '
  - type: text
    content: loholona
  - type: text
    content: ' sy mpifehy rehetra isam-poko, mba hilazako mivantana izao teny izao; ary hantsoiko ny tany aman-danitra mba ho vavolombelona aminy. '
  '29':
  - type: text
    content: Fantatro fa rehefa maty aho, dia hihasimba tokoa ny Israelita ka hiala amin’ny sori-dalana izay nasaiko hizorany; dia ho tratry ny loza ireo, any am-parany any, satria hanao izay ratsy eo imason’ny TOMPO ireo ka hampahatezitra Azy amin’ny asany.
  - type: heading
    content: Tononkiran’i Mosesy
  '3':
  - type: text
    content: 'Ny TOMPO Andriamanitrareo mihitsy no hita eo alohanareo, Izy no handringana ireo firenena ireo tsy ho eo anoloanareo, mba hahazoanareo ny taniny; ary i Josoa mihitsy no hita eo alohanareo araka izay efa voalazan’ny TOMPO. '
  '30':
  - type: text
    content: 'Avy eo dia nolazain’i Mosesy mivantana tamin’ny Israelita rehetra tafavondrona teo izao tononkira manontolo izao:'
  '4':
  - type: text
    content: 'Tahaka ny nataon’ny TOMPO tamin’i Sihôna sy i Hôga, mpanjaka '
  - type: text
    content: amôrita
  - type: text
    content: ', izay naringany mbamin’ny taniny, no hataony amin’ireo firenena ireo koa'
  - type: note
    content: Jereo Nom 21.21-35.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Hatolotry ny TOMPO eo anoloanareo ireo ka araka ny didy nampitaiko manontolo taminareo no hataonareo aminy. '
  '6':
  - type: text
    content: Mahereza sy matanjaha! Aza matahotra na manahy an’ireo firenena ireo, satria ny TOMPO Andriamanitrareo no miara-mandeha aminareo ary tsy handao anareo na hahafoy anareo.
  '7':
  - type: text
    content: 'Dia nantsoin’i Mosesy i Josoa ka nitenenany teo imason’ny Israelita rehetra hoe:'
  - type: text
    content: '–Mahereza sy matanjaha, satria ianao sy ity vahoaka ity dia hiara-miditra ao amin’ny tany izay nianianan’ny TOMPO fa homena ny razambenareo; ary ianao no hizara izany tany izany ho fananan’ity vahoaka ity. '
  '8':
  - type: text
    content: Ny TOMPO mihitsy no handeha eo alohanao, Izy no hiaraka aminao ary tsy handao anao na hahafoy anao
  - type: note
    content: Jereo Jos 1.5; Heb 13.5.
  - type: text
    content: ; koa aza matahotra na mivadi-po ianao.
  - type: heading
    content: Famakiana ampahibemaso ny Lalàna isaky ny fito taona
  '9':
  - type: text
    content: 'Dia nataon’i Mosesy an-tsoratra izany Lalànan’Andriamanitra izany, ka natolony tamin’ireo mpisorona, taranak’i Levỳ, dia ireo mpitondra ny '
  - type: text
    content: Vatamasina mirakitra ny Fanekempihavanan’ny TOMPO
  - type: text
    content: ', ary koa tamin’ireo rehetra '
  - type: text
    content: loholon’i Israely
  - type: text
    content: '. '
