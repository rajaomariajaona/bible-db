document_id: DEU.31
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: FANAOVAN’I MOSESY VELOMA SY FAHAFATESANY
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voatendry handimby an’i Mosesy i Josoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia avy indray i Mosesy nampita ireto teny ireto tamin’ny Israelita ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Feno 120 taona androany aho ka tsy afa-misahana ny andraikitra fitarihana anareo intsony; sady ny TOMPO efa nilaza tamiko hoe: «Tsy hita io Jôrdàna io ianao!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny TOMPO Andriamanitrareo mihitsy no hita eo alohanareo, Izy no handringana ireo firenena ireo tsy ho eo anoloanareo, mba hahazoanareo ny taniny; ary i Josoa mihitsy no hita eo alohanareo araka izay efa voalazan’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tahaka ny nataon’ny TOMPO tamin’i Sihôna sy i Hôga, mpanjaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: amôrita
  - type: text
    text: ', izay naringany mbamin’ny taniny, no hataony amin’ireo firenena ireo koa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 21.21-35.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hatolotry ny TOMPO eo anoloanareo ireo ka araka ny didy nampitaiko manontolo taminareo no hataonareo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mahereza sy matanjaha! Aza matahotra na manahy an’ireo firenena ireo, satria ny TOMPO Andriamanitrareo no miara-mandeha aminareo ary tsy handao anareo na hahafoy anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nantsoin’i Mosesy i Josoa ka nitenenany teo imason’ny Israelita rehetra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mahereza sy matanjaha, satria ianao sy ity vahoaka ity dia hiara-miditra ao amin’ny tany izay nianianan’ny TOMPO fa homena ny razambenareo; ary ianao no hizara izany tany izany ho fananan’ity vahoaka ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny TOMPO mihitsy no handeha eo alohanao, Izy no hiaraka aminao ary tsy handao anao na hahafoy anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jos 1.5; Heb 13.5.
    marker-yv: yv-n
  - type: text
    text: ; koa aza matahotra na mivadi-po ianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famakiana ampahibemaso ny Lalàna isaky ny fito taona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nataon’i Mosesy an-tsoratra izany Lalànan’Andriamanitra izany, ka natolony tamin’ireo mpisorona, taranak’i Levỳ, dia ireo mpitondra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina mirakitra ny Fanekempihavanan’ny TOMPO
  - type: text
    text: ', ary koa tamin’ireo rehetra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon’i Israely
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'Dia nanome didy azy i Mosesy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Isaky ny fito taona, amin’ny taona famotsoran-trosa, mandritra ny fankalazana ny Tranotomboka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.11 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Famoizan-trosa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 15.1-11. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: fankalazana ny Tranotomboka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo ny FTS amin’ny voambolana hoe FANISANANDRO.'
    marker-yv: yv-n
  - type: text
    text: ', no hamakianareo ny teny raketin’ity Lalàna ity. Amin’izay ny Israelita rehetra ho tonga hiseho eo anatrehan’ny TOMPO Andriamanitrareo any amin’ny toerana hofidiny, ka aoka ity Lalàna ity hovakînareo aminy mba hohenoiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vorio ny vahoaka rehetra, na lehilahy, na vehivavy, na ankizy madinika, ary na dia ny vahiny ao an-tanànanareo aza, mba hihainoany sy hianarany izany ka hanajany ny TOMPO Andriamanitrareo sy himasoany hanatanteraka ny teny rehetra raketin’ity Lalàna ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny zaza izay tsy mbola mahalala ity Lalàna ity, dia mba handre izany ka hianatra hanaja ny TOMPO Andriamanitrareo amin’ny andro rehetra hiainanareo eo amin’ny tany izay efa hidiranareo mba halainareo ho fananana, rehefa tafita ny ony Jôrdàna ianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hivadika amin’Andriamanitra i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro antomotra ny andro hahafatesanao; koa antsoy i Josoa, ary tongava eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' ianareo mba hameperako azy.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nandeha nankeo anoloan’ny Tranolay fihaonana ry i Mosesy sy i Josoa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ka nisehoan’ny TOMPO tamin’ny andry rahona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 13.21 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; ary nijanona teo anoloan’ny varavaran’ny Tranolay izany andry rahona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro hodimandry any amin’ny razanao ianao; ary ity vahoaka ity kosa hiainga hanompo sampy ka hanaraka andriamani-kafa tompoina any amin’ny tany izay efa hidirany honenana. Hilaozany Aho ary hivadihany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' izay nataoko taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hirehetan’ny fahatezerako amin’izany andro izany ity vahoaka ity ka hilaozako ary hanafenako ny tavako; hataon’ny olona levona izy sady hianjadian’ny loza amam-pahoriana maro. Amin’izany andro izany no hitenenan’ny Israelita hoe: «Noho Andriamanitra tsy eto aminay no mahatonga anay hianjadian’izao fahoriana izao!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Eny, hafeniko aminy tokoa ny tavako amin’izany andro izany noho ny ratsy rehetra izay nataony tamin’ny niviliany hanaraka andriamani-kafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ankehitriny, aoka hisy hanoratra izao tononkira hampitaiko aminareo izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo toko 32.
    marker-yv: yv-n
  - type: text
    text: '; ka ianao, ry Mosesy, no mampianara azy amin’ny Israelita. Ary aoka tsy ho afaka am-bavan’ny Israelita izany tononkira izany mba ho vavolombelona hiampangako azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Any amin’ny tany izay nampanantenaiko ny razambeny manko, dia ilay tany tondra-dronono sy tantely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 3.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', no hitondrako ity vahoaka ity; ary hanan-kohanina izy ka ho voky sy hihamatavy, dia hivily hanaraka andriamani-kafa sy hanompo azy, ary hotsiratsirainy Aho ka hivadihany ny fanekempihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rehefa hianjadian’ny zava-dratsy amam-pahoriana maro ity vahoaka ity, dia ho vavolombelona hiampanga azy izao tononkira izao, satria tsy ho afaka eo am-bavan’ny taranany. Fantatro manko ny fisainany, na dia izao ankehitriny alohan’ny hitondrako azy any amin’ny tany izay nianianako homena azy izao aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nataon’i Mosesy an-tsoratra androtrizay ihany izany tononkira izany ka nampianariny ny Israelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Avy eo dia nofeperan’ny TOMPO i Josoa, zanakalahin’i Nona, ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mahereza sy matanjaha; fa ianao no hitondra ny Israelita hiditra ao amin’ny tany izay nianianako taminy homena azy, Izaho mihitsy no hiaraka aminao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jos 1.6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Rehefa voasoratr’i Mosesy tao anaty boky avokoa ny teny raketin’ity Lalàna ity, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'dia nofeperany ny Levita, izay mpitondra ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '–Raiso ity bokin’ny Lalàna ity, ka apetraho ao anilan’ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO Andriamanitrareo; ka ho eo hatrany izany boky izany mba ho vavolombelona hiampanga ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fantatro fa maditra sy mafy hatoka ireo; izao ankehitriny mbola velona eto aminy izao aza aho, dia efa nikomy tamin’ny TOMPO ireo, ka mainka rehefa maty aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vorio eto amiko ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' sy mpifehy rehetra isam-poko, mba hilazako mivantana izao teny izao; ary hantsoiko ny tany aman-danitra mba ho vavolombelona aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fantatro fa rehefa maty aho, dia hihasimba tokoa ny Israelita ka hiala amin’ny sori-dalana izay nasaiko hizorany; dia ho tratry ny loza ireo, any am-parany any, satria hanao izay ratsy eo imason’ny TOMPO ireo ka hampahatezitra Azy amin’ny asany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tononkiran’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Avy eo dia nolazain’i Mosesy mivantana tamin’ny Israelita rehetra tafavondrona teo izao tononkira manontolo izao:'
