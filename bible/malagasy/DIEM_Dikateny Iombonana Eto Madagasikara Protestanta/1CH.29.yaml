document_id: 1CH.29,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanomezana an-tsitrapo mba hanorenana ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia hoy i Davida mpanjaka tamin’ny olona rehetra tafangona teo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–I Salômôna zanako, ilay hany nofidin’Andriamanitra, dia mbola tanora sady tsy za-draharaha; nefa goavana ny asa hatao, satria tsy lapa ho an’olombelona fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ho an’ny TOMPO Andriamanitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nankalaza ny TOMPO teo imason’ny olona rehetra tafangona teo i Davida ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hankalazaina anie Ianao, ry TOMPO Andriamanitr’i Israely razambenay; hankalazaina anie Ianao hatrizay ka ho mandrakizay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hankalazaina anie... mandrakizay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hankalazaina anie Ianao ry Tompo Andriamanitr’i Israely! Hatrizay ka ho mandrakizay dia Ianao no rainay
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '! '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Anao, TOMPO ô, ny halehibiazana sy hery; Anao ny voninahitra sy hamirapiratana ary fiandrianana; satria Anao ny zava-drehetra any an-danitra sy etỳ an-tany! Ianao, TOMPO ô, no mpanjaka; Ianao no asandratra ho filohan’ny zavatra rehetra. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Avy aminao ny harena sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahitra
    - type: text
      text: '; ary Ianao no mifehy izao rehetra izao. Eo an-tananao ny fahefana sy ny hery, ka Ianao no mahalehibe sy manamafy ny zavatra rehetra. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa misaotra Anao izahay, ry Andriamanitray ô, sy midera ny anaranao be voninahitra. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa zinona moa aho, ary zinona moa ny mpiray firenena amiko, no hanan-kery hanolotra fanomezana an-tsitrapo toy izao? Eny, avy aminao ny zavatra rehetra; ary ny avy taminao ihany no nanomezanay Anao. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa toy ny vahiny sy mpivahiny an-tanin’olona izahay eo anatrehanao, tahaka ny razanay rehetra rahateo; miserana tahaka ny aloka ny andronay etỳ an-tany, ka tsy azo ianteherana. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ry TOMPO Andriamanitray ô, ireo harena rehetra novononinay ireo, hanorenana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ho Anao mba hanajana Anao ilay Masina, dia avy taminao; ary Anao rahateo izy rehetra. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fantatro, ry Andriamanitro ô, fa mandinika ny ao am-pon’ny olona Ianao ary mankasitraka ny hitsim-po. Raha izaho, dia tamin-kitsim-po no nanolorako an-tsitrapo ireo fanomezana rehetra ireo; ary ankehitriny, dia amin-kafaliana no ahitako ny vahoakanao izay vory eto, nanolotra an-tsitrapo ny fanomezany ho Anao. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ry TOMPO Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba razanay ô, tahirizo mandrakizay izany toe-tsaina sy toe-po ananan’ny vahoakanao izany ka ataovy mitodika aminao hatrany ny fony; '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ary omeo an’i Salômôna zanako ny fo vonona manontolo hitandrina ny didinao sy baikonao ka hanatanterahany azy rehetra sady hanorina ny tempoly lapanao izay efa nanomanako fitaovana.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nanao izay tratry ny aiko aho namonona fitaovana ho an’ny tranon’Andriamanitro: dia ny volamena hanaovana ny fanaka volamena; ny volafotsy hanaovana ny fanaka volafotsy; ny halimo hanaovana ny fanaka halimo; ny vy hanaovana ny fanaka vy; ary hazo hanaovana fanaka hazo. Nataoko vonona ny vato berila sy vato halatsaka an-tranontranony, ny vatomainty sy vato misoratsoratra, ny vatosoa isan-karazany ary ny vatokaranana betsaka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 1-2:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 22.5.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia hoy i Davida tamin’ny olona rehetra tafangona teo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka ianareo hankalaza ny TOMPO Andriamanitrareo!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nankalazain’izy rehetra ilay TOMPO Andriamanitry ny razany; sady niondrika izy ka niankohoka teo anatrehan’ny TOMPO sy teo anatrehan’ny mpanjaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanandratana an’i Salômôna ho mpanjaka sy fahafatesan’i Davida
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorom-pihavanana
    - type: text
      text: ' sy sorona dorana manontolo natolotra ho an’ny TOMPO, ny ampitson’iny: dia vantotr’ombilahy arivo, ondrilahy arivo, ary zanak’ondry arivo, mbamin’ny fanatitra divay araraka momba ireo. Be dia be tokoa ny sorom-pihavanana ka ampy hamahanana ny Israelita rehetra tonga teo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tamin’izany andro izany, dia tamin-pifaliana lehibe no nihinanan’ny olona sy nisotroany teo anatrehan’ny TOMPO. Dia nanaovana fanambaràna fanindroany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fanindroany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany teny izany dia mampahatsiahy ny 23.1 izay ilazana voalohany ny nanendrena an’i Salômôna handimby an-drainy.
      marker-yv: yv-n
    - type: text
      text: ' ny maha mpanjaka an’i Salômôna ka natolotra azy teo anatrehan’ny TOMPO ny fahefana maha mpanjaka; ary natokana ho mpisorona kosa i Tsadôka. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nipetraka teo amin’ny sezafiandrianana nomen’ny TOMPO azy i Salômôna mba ho mpanjaka handimby an’i Davida rainy; sady nambinina izy ka nanaiky azy i Israely manontolo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Samy nanaiky an’i Salômôna mpanjaka avokoa ny mpifehy sy ny miaramila mahery fo ary na dia ny zanaka hafa rehetra naterak’i Davida aza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.24 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'and 23-24:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Mp 2.12.
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nasandratry ny TOMPO teo imason’i Israely manontolo ny lazan’i Salômôna, ary nomeny voninahitra mihoatra noho ny an’ny mpanjaka rehetra talohany tao Israely ny fanjakany.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nanjaka tamin’i Israely manontolo i Davida zanakalahin’i Jisay. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Efapolo taona no nanjakany: ka fito taona tao Hebrôna ary 33 taona tao Jerosalema'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.4 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Efa tratra antitra tsara sady voky andro sy heni-karena amam-boninahitra izy vao maty; ary i Salômôna zanany no nanjaka nandimby azy.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny tantaran’i Davida mpanjaka, na ny voalohany na ny farany, dia efa voasoratra ao amin’ny boky milohateny hoe «Asan’i Samoela mpaminany manam-pahitana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'i Samoela mpaminany manam-pahitana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo 1 Sam 9.9-11. –Very avokoa ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: boky
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' anankitelo voateny eto amin’ity and ity.'
      marker-yv: yv-n
    - type: text
      text: '» sy «Asan’i Natàna '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: '» ary «Asan’i Gada mpaminany manam-pahitana»: '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ankamamiko tokoa ny tranon’Andriamanitro; ka ho fanampin’ny zavatra rehetra nomaniko ho an’ity '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' ity, dia omeko ho an’ny tranon’Andriamanitro koa izay volamena sy volafotsy ananako manokana: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: voatantara ao avokoa ny zavatra rehetra momba ny nanjakàn’i Davida, sy ny asa nanehoany herimpo mbamin’ny zava-nitranga taminy sy tamin’i Israely ary tamin’ny fanjakana rehetra an-tany hafa.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: dia volamena avy any Ôfira
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'volamena avy any Ôfira: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (jereo 1 Mp 9.28 sy nta) dia nalaza ho madio.
      marker-yv: yv-n
    - type: text
      text: ', milanja zato taonina; volafotsy madio milanja 240 taonina, natao hapetaka amin’ny ati-rindrina isan’efitrano. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Iza àry, amin’izao andro anio izao, no mba mazoto hanolotra fanomezana an-tsitrapo amin’ny TOMPO mba hanaovan’ireo mpahay taozavatra ny fanaka volamena sy volafotsy ary ny asa isan-karazany?
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tamin’zay, dia samy nanolotra fanomezana an-tsitrapo avokoa ny lohan-pianakaviana, ny filohan’ireo fokon’i Israely, ny komandin-tafika mpifehy arivo sy mpifehy zato, mbamin’ny mpiandraiki-draharahan’ny mpanjaka '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ka nanome izay hanaovana ny fanompoana ao amin’ny tranon’Andriamanitra: dia volamena milanja 170 taonina; farantsa volamena miisa 10 000; volafotsy milanja telonjato taonina; halimo milanja eninjato taonina eo ho eo ary vy milanja telo arivo taonina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Izay nanana vatosoa dia nanome azy teo am-pelatanan’i Jehiela, taranak’i Gersôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Io olona io ihany no antsoina hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jehiely
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 26.21.'
      marker-yv: yv-n
    - type: text
      text: ', mba ho zava-tsarobidy tahirizina ao an-tranon’ny TOMPO. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia samy faly ny besinimaro nanolotra fanomezana an-tsitrapo, satria tamin’ny fony manontolo no nanaovany an’izany ho an’ny TOMPO; ary faly dia faly koa i Davida mpanjaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavak’i Davida
    marker-yv: yv-h
