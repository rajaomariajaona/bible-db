document_id: 1CH.29,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanomezana an-tsitrapo mba hanorenana ny tempoly
  - type: text
    content: 'Dia hoy i Davida mpanjaka tamin’ny olona rehetra tafangona teo:'
  - type: text
    content: '–I Salômôna zanako, ilay hany nofidin’Andriamanitra, dia mbola tanora sady tsy za-draharaha; nefa goavana ny asa hatao, satria tsy lapa ho an’olombelona fa '
  - type: text
    content: tempoly
  - type: text
    content: ' ho an’ny TOMPO Andriamanitra. '
  '10':
  - type: text
    content: 'Dia nankalaza ny TOMPO teo imason’ny olona rehetra tafangona teo i Davida ka nanao hoe:'
  - type: text
    content: –Hankalazaina anie Ianao, ry TOMPO Andriamanitr’i Israely razambenay; hankalazaina anie Ianao hatrizay ka ho mandrakizay
  - type: note
    content: 'Hankalazaina anie... mandrakizay: dkt hafa Hankalazaina anie Ianao ry Tompo Andriamanitr’i Israely! Hatrizay ka ho mandrakizay dia Ianao no rainay.'
  - type: text
    content: '! '
  '11':
  - type: text
    content: 'Anao, TOMPO ô, ny halehibiazana sy hery; Anao ny voninahitra sy hamirapiratana ary fiandrianana; satria Anao ny zava-drehetra any an-danitra sy etỳ an-tany! Ianao, TOMPO ô, no mpanjaka; Ianao no asandratra ho filohan’ny zavatra rehetra. '
  '12':
  - type: text
    content: 'Avy aminao ny harena sy ny '
  - type: text
    content: voninahitra
  - type: text
    content: '; ary Ianao no mifehy izao rehetra izao. Eo an-tananao ny fahefana sy ny hery, ka Ianao no mahalehibe sy manamafy ny zavatra rehetra. '
  '13':
  - type: text
    content: 'Koa misaotra Anao izahay, ry Andriamanitray ô, sy midera ny anaranao be voninahitra. '
  '14':
  - type: text
    content: 'Fa zinona moa aho, ary zinona moa ny mpiray firenena amiko, no hanan-kery hanolotra fanomezana an-tsitrapo toy izao? Eny, avy aminao ny zavatra rehetra; ary ny avy taminao ihany no nanomezanay Anao. '
  '15':
  - type: text
    content: 'Fa toy ny vahiny sy mpivahiny an-tanin’olona izahay eo anatrehanao, tahaka ny razanay rehetra rahateo; miserana tahaka ny aloka ny andronay etỳ an-tany, ka tsy azo ianteherana. '
  '16':
  - type: text
    content: 'Ry TOMPO Andriamanitray ô, ireo harena rehetra novononinay ireo, hanorenana '
  - type: text
    content: tempoly
  - type: text
    content: ' ho Anao mba hanajana Anao ilay Masina, dia avy taminao; ary Anao rahateo izy rehetra. '
  '17':
  - type: text
    content: 'Fantatro, ry Andriamanitro ô, fa mandinika ny ao am-pon’ny olona Ianao ary mankasitraka ny hitsim-po. Raha izaho, dia tamin-kitsim-po no nanolorako an-tsitrapo ireo fanomezana rehetra ireo; ary ankehitriny, dia amin-kafaliana no ahitako ny vahoakanao izay vory eto, nanolotra an-tsitrapo ny fanomezany ho Anao. '
  '18':
  - type: text
    content: 'Ry TOMPO Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba razanay ô, tahirizo mandrakizay izany toe-tsaina sy toe-po ananan’ny vahoakanao izany ka ataovy mitodika aminao hatrany ny fony; '
  '19':
  - type: text
    content: ary omeo an’i Salômôna zanako ny fo vonona manontolo hitandrina ny didinao sy baikonao ka hanatanterahany azy rehetra sady hanorina ny tempoly lapanao izay efa nanomanako fitaovana.
  '2':
  - type: text
    content: 'Nanao izay tratry ny aiko aho namonona fitaovana ho an’ny tranon’Andriamanitro: dia ny volamena hanaovana ny fanaka volamena; ny volafotsy hanaovana ny fanaka volafotsy; ny halimo hanaovana ny fanaka halimo; ny vy hanaovana ny fanaka vy; ary hazo hanaovana fanaka hazo. Nataoko vonona ny vato berila sy vato halatsaka an-tranontranony, ny vatomainty sy vato misoratsoratra, ny vatosoa isan-karazany ary ny vatokaranana betsaka'
  - type: note
    content: 'And 1-2: jereo 22.5.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Dia hoy i Davida tamin’ny olona rehetra tafangona teo:'
  - type: text
    content: –Aoka ianareo hankalaza ny TOMPO Andriamanitrareo!
  - type: text
    content: Dia nankalazain’izy rehetra ilay TOMPO Andriamanitry ny razany; sady niondrika izy ka niankohoka teo anatrehan’ny TOMPO sy teo anatrehan’ny mpanjaka.
  - type: heading
    content: Fanandratana an’i Salômôna ho mpanjaka sy fahafatesan’i Davida
  '21':
  - type: text
    content: 'Nisy '
  - type: text
    content: sorom-pihavanana
  - type: text
    content: ' sy sorona dorana manontolo natolotra ho an’ny TOMPO, ny ampitson’iny: dia vantotr’ombilahy arivo, ondrilahy arivo, ary zanak’ondry arivo, mbamin’ny fanatitra divay araraka momba ireo. Be dia be tokoa ny sorom-pihavanana ka ampy hamahanana ny Israelita rehetra tonga teo. '
  '22':
  - type: text
    content: Tamin’izany andro izany, dia tamin-pifaliana lehibe no nihinanan’ny olona sy nisotroany teo anatrehan’ny TOMPO. Dia nanaovana fanambaràna fanindroany
  - type: note
    content: 'fanindroany: izany teny izany dia mampahatsiahy ny 23.1 izay ilazana voalohany ny nanendrena an’i Salômôna handimby an-drainy.'
  - type: text
    content: ' ny maha mpanjaka an’i Salômôna ka natolotra azy teo anatrehan’ny TOMPO ny fahefana maha mpanjaka; ary natokana ho mpisorona kosa i Tsadôka. '
  '23':
  - type: text
    content: 'Dia nipetraka teo amin’ny sezafiandrianana nomen’ny TOMPO azy i Salômôna mba ho mpanjaka handimby an’i Davida rainy; sady nambinina izy ka nanaiky azy i Israely manontolo. '
  '24':
  - type: text
    content: Samy nanaiky an’i Salômôna mpanjaka avokoa ny mpifehy sy ny miaramila mahery fo ary na dia ny zanaka hafa rehetra naterak’i Davida aza
  - type: note
    content: 'and 23-24: jereo 1 Mp 2.12.'
  - type: text
    content: '. '
  '25':
  - type: text
    content: Nasandratry ny TOMPO teo imason’i Israely manontolo ny lazan’i Salômôna, ary nomeny voninahitra mihoatra noho ny an’ny mpanjaka rehetra talohany tao Israely ny fanjakany.
  '26':
  - type: text
    content: 'Nanjaka tamin’i Israely manontolo i Davida zanakalahin’i Jisay. '
  '27':
  - type: text
    content: 'Efapolo taona no nanjakany: ka fito taona tao Hebrôna ary 33 taona tao Jerosalema'
  - type: note
    content: Jereo 3.4 sy nta.
  - type: text
    content: '. '
  '28':
  - type: text
    content: Efa tratra antitra tsara sady voky andro sy heni-karena amam-boninahitra izy vao maty; ary i Salômôna zanany no nanjaka nandimby azy.
  '29':
  - type: text
    content: Ny tantaran’i Davida mpanjaka, na ny voalohany na ny farany, dia efa voasoratra ao amin’ny boky milohateny hoe «Asan’i Samoela mpaminany manam-pahitana
  - type: note
    content: 'i Samoela mpaminany manam-pahitana: jereo 1 Sam 9.9-11. –Very avokoa ireo boky anankitelo voateny eto amin’ity and ity.'
  - type: text
    content: '» sy «Asan’i Natàna '
  - type: text
    content: mpaminany
  - type: text
    content: '» ary «Asan’i Gada mpaminany manam-pahitana»: '
  '3':
  - type: text
    content: 'Ankamamiko tokoa ny tranon’Andriamanitro; ka ho fanampin’ny zavatra rehetra nomaniko ho an’ity '
  - type: text
    content: Toeramasina
  - type: text
    content: ' ity, dia omeko ho an’ny tranon’Andriamanitro koa izay volamena sy volafotsy ananako manokana: '
  '30':
  - type: text
    content: voatantara ao avokoa ny zavatra rehetra momba ny nanjakàn’i Davida, sy ny asa nanehoany herimpo mbamin’ny zava-nitranga taminy sy tamin’i Israely ary tamin’ny fanjakana rehetra an-tany hafa.
  '4':
  - type: text
    content: dia volamena avy any Ôfira
  - type: note
    content: 'Ny volamena avy any Ôfira: (jereo 1 Mp 9.28 sy nta) dia nalaza ho madio.'
  - type: text
    content: ', milanja zato taonina; volafotsy madio milanja 240 taonina, natao hapetaka amin’ny ati-rindrina isan’efitrano. '
  '5':
  - type: text
    content: Iza àry, amin’izao andro anio izao, no mba mazoto hanolotra fanomezana an-tsitrapo amin’ny TOMPO mba hanaovan’ireo mpahay taozavatra ny fanaka volamena sy volafotsy ary ny asa isan-karazany?
  '6':
  - type: text
    content: 'Tamin’zay, dia samy nanolotra fanomezana an-tsitrapo avokoa ny lohan-pianakaviana, ny filohan’ireo fokon’i Israely, ny komandin-tafika mpifehy arivo sy mpifehy zato, mbamin’ny mpiandraiki-draharahan’ny mpanjaka '
  '7':
  - type: text
    content: 'ka nanome izay hanaovana ny fanompoana ao amin’ny tranon’Andriamanitra: dia volamena milanja 170 taonina; farantsa volamena miisa 10 000; volafotsy milanja telonjato taonina; halimo milanja eninjato taonina eo ho eo ary vy milanja telo arivo taonina. '
  '8':
  - type: text
    content: Izay nanana vatosoa dia nanome azy teo am-pelatanan’i Jehiela, taranak’i Gersôna
  - type: note
    content: Io olona io ihany no antsoina hoe Jehiely, 26.21.
  - type: text
    content: ', mba ho zava-tsarobidy tahirizina ao an-tranon’ny TOMPO. '
  '9':
  - type: text
    content: Dia samy faly ny besinimaro nanolotra fanomezana an-tsitrapo, satria tamin’ny fony manontolo no nanaovany an’izany ho an’ny TOMPO; ary faly dia faly koa i Davida mpanjaka.
  - type: heading
    content: Vavak’i Davida
