    - type: text
      text: ' Estera '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia mitantara ny fomba nanafahana vondrom-bahoaka jiosy izay norahonana fa haringana. Ny nitrangan’izany kosa dia tamin’ny fotoanandro nanitaran’ireo Persianina ny fanapahany manerana iny faritra atsinanana manontolo iny, hatreo India ka hatrany Ejipta. Maromaro ny fianakaviana jiosy voasesitany tany Babilônia no tsy niverina an-tanindrazana taorian’ny naharavan’ny fanjakana babilônianina (taona 539 tal J.K.). Matetika ireo Jiosy ireo no nankahalain’ny firenena izay nitoerany, satria niaina araka ny lalàna sy fomba amam-panao manokana izay miavaka amin’ny an’ny hafa. Raha visavisain’ity bokin’i
    - type: text
      text: ' Estera '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'ity amintsika ny fifanoherana teo amin’i Hamàna, praiminisitry ny amperôra Kserksesa, sy teo amin’i Môrdôkay, dia santionan-javatra mampitaintaina momba izany fankahalana ny Jiosy izany no tiany hatolotra. Notantanan’i Môrdôkay i Estera ho tonga mpanjakavavin’i Persia ka afaka nampisinda ny loza mananontanona ny mpiray firenena aminy: ny fomba nahatanterahan’izany zavatra izany dia mampahatsiaro fa natao handamoka hatrany ny tetika mikendry hamongotra ny vahoaka jiosy. Eto amin’ity tantara ity, ny andro naraikitra handringanana ny Jiosy no nanjary andro naharesy sy namonoana ny fahavalony. Ny datin’io andro io dia mifanandrify amin’ny fetin’ny Porîma izay ankalazain’ny Jiosy amin’ny lohataona mialoha ny fetin’ny Paska. Ny zava-nitranga voatantara ato amin’ity boky ity no manazava ny fiavian’izany fety izany.'
  - type: usfm
    marker: ip
    children:
    - type: usfm
