      - type: text
        text: Asongadin’ny bokin’i
    - type: text
      text: ' Estera '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tokoa ny fitandroan’ny Jiosy ny maha firenena azy sy ny faniriany hamaly faty, ka mety mahagaga na mahataitra ny mpamaky. Kanefa tokony horaisina ho fiarovan-tenan’ny Jiosy izany eo anoloan’ny fanilikilihana azy tany amin’ny firenen-kafa. Ny fanavakavaham-pirazanana sy ny fanilikilihana ny hafa mazàna dia miteraka fihetsika toy izany; ary asehon’ny tantaran’i Estera fa ny herisetra no miteraka herisetra. Ankoatra izany, fony nosoratana ny bokin’i
    - type: text
      text: ' Estera, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: izany hoe tamin’ny fotoanandro izay nahavery fanantenana ny Jiosy ny amin’ny hananan’ny fireneny fahaleovan-tena, dia tian’ity boky ity hampahatsiahivina fa mety misy fanafahana lehibe atolotra azy.
