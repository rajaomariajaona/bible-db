document_id: 2CO.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mpiara-miasa amin’Andriamanitra izahay, ka mananatra anareo mba tsy hamela ho very maina ny fahasoavana voarainareo taminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: na dia ampalahelovina aza izahay, dia faly mandrakariva; toa mahantra izahay nefa mampanan-karena olona maro; toa tsy manana na inona na inona, nefa manana ny zavatra rehetra.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Niteny tsotra taminareo Kôrintianina izahay; nosokafanay malalaka taminareo ny fonay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tsy tery fo taminareo izahay, fa ianareo no tery fo taminay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Miteny aminareo toy ny amin’ny zanaka aho: mba ho setrin’ny ataonay, halalaho koa re ny fonareo aminay!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempolin
    - type: text
      text: ’Andriamanitra velona
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Aza miray petsapetsa amin’ny tsy mpino, fa tsy sahaza anareo ny miara-dia aminy. Satria ahoana no ikambanan’ny marina amin’ny ratsy fanahy? Ahoana no hiombonan’ny mazava amin’ny maizina? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ahoana no hifanarahan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' amin’i Beliala'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Beliala: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'isan’ny anarana fiantsoana ny devoly, ka midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ilay tsinontsinona, ilay tsisy ilàna azy.
      marker-yv: yv-n
    - type: text
      text: '? Anjara inona no hiraisan’ny mpino amin’ny tsy mpino. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ahoana no hifandraisan’ny tempolin’Andriamanitra amin’ny sampy? Fa isika no tempolin’Andriamanitra velona, araka ny voalazan’Andriamanitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Honina eo aminy Aho ary handeha eo afovoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho Andriamaniny Aho ary izy ireo ho vahoakako.»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Izany no ilazan’ny Tompo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mialà teo aminy ka misaraha aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'aza mikasika zavatra tsy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia horaisiko ianareo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ka ho Rainareo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ianareo ho zanako lahy sy ho zanako vavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny Tompo Tsitoha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ny and 16-18: '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'and 16:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Fisor 26.12; Ezek 37.26. –'
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 17:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Is 52.11; Ezek 20.34. –'
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 18:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 2 Sam 7.14; Is 43.6.'
      marker-yv: yv-n
    - type: text
      text: .»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa hoy Andriamanitra ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tamin’ny fotoana mety,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia namaly ny antsonao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’ny androm-pamonjena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tonga namonjy anao Aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 49.8.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: m
    children:
    - type: text
      text: Indro ankehitriny no fotoana mety amin’Andriamanitra; indro ankehitriny no androm-pamonjena.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mba tsy hahazoan’ny olona manakiana ny fanompoana sahaninay, dia tsy avelanay hisy zavatra mahasolafaka ny olona, na amin’inona na amin’inona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa ahariharinay kosa amin’ny zavatra rehetra fa mpanompon’Andriamanitra izahay, ka dia zakainay amim-pandeferana tokoa ny fahoriana sy ny fahaterena ary ny tebiteby: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: nokapohina izahay, nahiboka am-ponja
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 16.23.
      marker-yv: yv-n
    - type: text
      text: ', nianjadian-korontana, nampanaovina asa mafy, niari-tory ary nifady hanina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ahariharinay fa mpanompon’Andriamanitra izahay amin’ny fahadiovan’ny toetranay, amin’ny fahalalànay, amin’ny faharetanay, amin’ny hamoram-ponay, amin’ny Fanahy Masina manentana anay, amin’ny fitiavana tsy mihatsaravelatsihy asehonay, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'amin’ny fitorianay ny marina ary amin’ny hery omen’Andriamanitra anay. Izay rariny no fiadiana ampiasainay hanafihana sy hiarovan-tena, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'na omem-boninahitra izahay na alàm-baràka, na ratsy laza izahay na tsara laza. Atao ho mpamitaka izahay nefa mpanambara ny marina, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'atao ho tsy fantatra nefa fantatra tsara, atao ho efa maty nefa dia izao velona izao. Faizina izahay, nefa tsy vonoina ho faty; '
