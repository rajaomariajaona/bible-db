document_id: 2CO.6,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Mpiara-miasa amin’Andriamanitra izahay, ka mananatra anareo mba tsy hamela ho very maina ny fahasoavana voarainareo taminy. '
  '10':
  - type: text
    content: na dia ampalahelovina aza izahay, dia faly mandrakariva; toa mahantra izahay nefa mampanan-karena olona maro; toa tsy manana na inona na inona, nefa manana ny zavatra rehetra.
  '11':
  - type: text
    content: 'Niteny tsotra taminareo Kôrintianina izahay; nosokafanay malalaka taminareo ny fonay. '
  '12':
  - type: text
    content: 'Tsy tery fo taminareo izahay, fa ianareo no tery fo taminay. '
  '13':
  - type: text
    content: 'Miteny aminareo toy ny amin’ny zanaka aho: mba ho setrin’ny ataonay, halalaho koa re ny fonareo aminay!'
  - type: heading
    content: Ny tempolin’Andriamanitra velona
  '14':
  - type: text
    content: 'Aza miray petsapetsa amin’ny tsy mpino, fa tsy sahaza anareo ny miara-dia aminy. Satria ahoana no ikambanan’ny marina amin’ny ratsy fanahy? Ahoana no hiombonan’ny mazava amin’ny maizina? '
  '15':
  - type: text
    content: 'Ahoana no hifanarahan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' amin’i Beliala'
  - type: note
    content: 'Beliala: isan’ny anarana fiantsoana ny devoly, ka midika hoe ilay tsinontsinona, ilay tsisy ilàna azy.'
  - type: text
    content: '? Anjara inona no hiraisan’ny mpino amin’ny tsy mpino. '
  '16':
  - type: text
    content: 'Ahoana no hifandraisan’ny tempolin’Andriamanitra amin’ny sampy? Fa isika no tempolin’Andriamanitra velona, araka ny voalazan’Andriamanitra hoe:'
  - type: text
    content: «Honina eo aminy Aho ary handeha eo afovoany,
  - type: text
    content: dia ho Andriamaniny Aho ary izy ireo ho vahoakako.»
  '17':
  - type: text
    content: 'Izany no ilazan’ny Tompo hoe:'
  - type: text
    content: «Mialà teo aminy ka misaraha aminy;
  - type: text
    content: 'aza mikasika zavatra tsy '
  - type: text
    content: madio
  - type: text
    content: ','
  - type: text
    content: dia horaisiko ianareo.
  '18':
  - type: text
    content: Ka ho Rainareo Aho,
  - type: text
    content: ary ianareo ho zanako lahy sy ho zanako vavy,
  - type: text
    content: hoy ny Tompo Tsitoha
  - type: note
    content: 'Momba ny and 16-18: and 16: Fisor 26.12; Ezek 37.26. –And 17: jereo Is 52.11; Ezek 20.34. –And 18: jereo 2 Sam 7.14; Is 43.6.'
  - type: text
    content: .»
  '2':
  - type: text
    content: 'Fa hoy Andriamanitra ao amin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ':'
  - type: text
    content: «Tamin’ny fotoana mety,
  - type: text
    content: dia namaly ny antsonao Aho;
  - type: text
    content: ary tamin’ny androm-pamonjena,
  - type: text
    content: dia tonga namonjy anao Aho
  - type: note
    content: Is 49.8.
  - type: text
    content: .»
  - type: text
    content: Indro ankehitriny no fotoana mety amin’Andriamanitra; indro ankehitriny no androm-pamonjena.
  '3':
  - type: text
    content: 'Mba tsy hahazoan’ny olona manakiana ny fanompoana sahaninay, dia tsy avelanay hisy zavatra mahasolafaka ny olona, na amin’inona na amin’inona. '
  '4':
  - type: text
    content: 'Fa ahariharinay kosa amin’ny zavatra rehetra fa mpanompon’Andriamanitra izahay, ka dia zakainay amim-pandeferana tokoa ny fahoriana sy ny fahaterena ary ny tebiteby: '
  '5':
  - type: text
    content: nokapohina izahay, nahiboka am-ponja
  - type: note
    content: Jereo Asa 16.23.
  - type: text
    content: ', nianjadian-korontana, nampanaovina asa mafy, niari-tory ary nifady hanina. '
  '6':
  - type: text
    content: 'Ahariharinay fa mpanompon’Andriamanitra izahay amin’ny fahadiovan’ny toetranay, amin’ny fahalalànay, amin’ny faharetanay, amin’ny hamoram-ponay, amin’ny Fanahy Masina manentana anay, amin’ny fitiavana tsy mihatsaravelatsihy asehonay, '
  '7':
  - type: text
    content: 'amin’ny fitorianay ny marina ary amin’ny hery omen’Andriamanitra anay. Izay rariny no fiadiana ampiasainay hanafihana sy hiarovan-tena, '
  '8':
  - type: text
    content: 'na omem-boninahitra izahay na alàm-baràka, na ratsy laza izahay na tsara laza. Atao ho mpamitaka izahay nefa mpanambara ny marina, '
  '9':
  - type: text
    content: 'atao ho tsy fantatra nefa fantatra tsara, atao ho efa maty nefa dia izao velona izao. Faizina izahay, nefa tsy vonoina ho faty; '
