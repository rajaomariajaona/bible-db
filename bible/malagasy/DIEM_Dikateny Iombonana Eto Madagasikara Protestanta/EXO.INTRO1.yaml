  - type: text
    content: Toeramasina
  - type: text
    content: ' '
  - type: text
    content: i Mosesy (25–31), dia nanao izay danin’ny fony kosa ireo Israelita ka nivarilavo nanao andriamanitra miendrika ombalahy volamena; niteraka famaizana mivaivay avy tamin’Andriamanitra izany (32–34). Ny famaranana ny boky dia mitantara ny fanamboarana ny Toeramasina izy hanehoan’Andriamanitra ny fanatrehany (35–40).
  - type: text
    content: Ireo iharan’ny fanandevozana isan-karazany teo amin’ny taona mifandimby dia anehoan’ity boky ity ny tena fanafahana izay Andriamanitra ihany no manatanteraka azy mba hahatonga ny olona hanana fiombonana amin’Andriamanitra sy amin’ireo olombelona namany.
