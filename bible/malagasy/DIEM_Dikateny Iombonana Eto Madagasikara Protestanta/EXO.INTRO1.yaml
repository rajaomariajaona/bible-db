  - type: usfm
    marker: it
    children:
    - type: text
      text: '–«Izaho no Tompo Andriamanitrao, izay namoaka anao hiala tany Ejipta, toera-nanandevozana anao». Io andininy fototra ao amin’ny Eksôdy io (Eks 20.2) no maneho amintsika ny hevitry ny anaran’ny boky (Eksôdy: fialana toerana iray ho any an-kafa) sy ny vontoatin-javatra raketiny: Andriamanitra no mpanafaka ny vahoakany. Io andininy io koa no «fototra iorenan’ny Didy folo»: ilay Andriamanitra izay nanafaka ny Israelita tamin’ny fitiavana dia mandroso tolo-kevitra mba hampiseho ny fitiavany Azy amin’ny alalan’ny fankatoavana ny lalànany.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Rehefa nialokaloka tany Ejipta ny Israelita (Gen 45.17-20; 47.11), dia nanjary vahoaka marobe tany rehefa afaka taonjato vitsivitsy, kanefa lasa nataon’ny mpanjakan’i Ejipta ho andevony. Tsy nihenahena fotsiny teo anoloan’ny fijalian’ny Israelita anefa Andriamanitra fa nifidy an’i Mosesy, anankiray taminy, mba hitarika azy. Famantarana sy famaizana mahery vaika no naneren’Andriamanitra ny Ejiptianina mba hanome fahafahana izany vahoaka izany sy hamela azy handeha (1.1–15.21). Ary rehefa nitarika sy niaro azy ireo tamin’ny famakivakiana ny taniefitra Andriamanitra (15.22–18.27), dia nanokana ny Israelita ho vahoakany ka nanao
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: taminy tao Sinay sady nanome azy ny lalàna (19.1–24.18). Taorian’izany, raha mbola nandray ireo torolalana momba ny fanamboarana ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: i Mosesy (25–31), dia nanao izay danin’ny fony kosa ireo Israelita ka nivarilavo nanao andriamanitra miendrika ombalahy volamena; niteraka famaizana mivaivay avy tamin’Andriamanitra izany (32–34). Ny famaranana ny boky dia mitantara ny fanamboarana ny Toeramasina izy hanehoan’Andriamanitra ny fanatrehany (35–40).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ireo iharan’ny fanandevozana isan-karazany teo amin’ny taona mifandimby dia anehoan’ity boky ity ny tena fanafahana izay Andriamanitra ihany no manatanteraka azy mba hahatonga ny olona hanana fiombonana amin’Andriamanitra sy amin’ireo olombelona namany.
