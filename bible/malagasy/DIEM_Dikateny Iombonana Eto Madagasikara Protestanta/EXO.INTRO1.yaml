  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: '–«Izaho no Tompo Andriamanitrao, izay namoaka anao hiala tany Ejipta, toera-nanandevozana anao». Io andininy fototra ao amin’ny Eksôdy io (Eks 20.2) no maneho amintsika ny hevitry ny anaran’ny boky (Eksôdy: fialana toerana iray ho any an-kafa) sy ny vontoatin-javatra raketiny: Andriamanitra no mpanafaka ny vahoakany. Io andininy io koa no «fototra iorenan’ny Didy folo»: ilay Andriamanitra izay nanafaka ny Israelita tamin’ny fitiavana dia mandroso tolo-kevitra mba hampiseho ny fitiavany Azy amin’ny alalan’ny fankatoavana ny lalànany.'
  - type: text
    content: Rehefa nialokaloka tany Ejipta ny Israelita (Gen 45.17-20; 47.11), dia nanjary vahoaka marobe tany rehefa afaka taonjato vitsivitsy, kanefa lasa nataon’ny mpanjakan’i Ejipta ho andevony. Tsy nihenahena fotsiny teo anoloan’ny fijalian’ny Israelita anefa Andriamanitra fa nifidy an’i Mosesy, anankiray taminy, mba hitarika azy. Famantarana sy famaizana mahery vaika no naneren’Andriamanitra ny Ejiptianina mba hanome fahafahana izany vahoaka izany sy hamela azy handeha (1.1–15.21). Ary rehefa nitarika sy niaro azy ireo tamin’ny famakivakiana ny taniefitra Andriamanitra (15.22–18.27), dia nanokana ny Israelita ho vahoakany ka nanao
  - type: text
    content: ' '
