document_id: PSA.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Izay takîn’ny Tompo amin’ny mpivavaka
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: –TOMPO ô, iza moa no horaisina an-
  - type: text
    content: tempolinao
  - type: text
    content: sy hahazo toerana eo an-tendrombohitrao masina
  - type: note
    content: 'tendrombohitrao masina: jereo Sal 2.6.'
  - type: text
    content: '?'
  '2':
  - type: text
    content: –Izay tsy manan-tsiny, izay mitandro rariny
  - type: text
    content: ka milaza tokoa ny marina ao am-pony;
  '3':
  - type: text
    content: tsy manao teny manendrikendrika olona
  - type: text
    content: sady tsy manisy ratsy ny namany,
  - type: text
    content: na manompa ny mpiara-monina aminy;
  '4':
  - type: text
    content: tsy miraharaha izay lavin’Andriamanitra,
  - type: text
    content: fa manaja an’ireo mpivavaka amin’ny TOMPO,
  - type: text
    content: tsy mivadika amin’ny fianianana vita
  - type: text
    content: na dia maningotra ny tenany aza izany;
  '5':
  - type: text
    content: sady tsy mba manisy zana-bola
  - type: text
    content: rehefa mampisambotra
  - type: text
    content: no tsy mba mandray tsolotra
  - type: text
    content: hamelezana ny tsy manan-tsiny.
  - type: text
    content: Izay manao izany sy izany
  - type: text
    content: dia tsy hihontsona na oviana na oviana.
