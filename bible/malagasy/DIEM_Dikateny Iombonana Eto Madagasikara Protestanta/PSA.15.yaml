  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Izay tsy manan-tsiny, izay mitandro rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka milaza tokoa ny marina ao am-pony;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy manao teny manendrikendrika olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy manisy ratsy ny namany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na manompa ny mpiara-monina aminy;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy miraharaha izay lavin’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manaja an’ireo mpivavaka amin’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mivadika amin’ny fianianana vita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia maningotra ny tenany aza izany;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mba manisy zana-bola
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mampisambotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tsy mba mandray tsolotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamelezana ny tsy manan-tsiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manao izany sy izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hihontsona na oviana na oviana.
