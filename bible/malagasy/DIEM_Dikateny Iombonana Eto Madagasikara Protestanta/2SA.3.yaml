        - type: text
          text: 'hanaisotra... fianakavian’i Saoly: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 15.28. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy '
      - type: usfm
        marker: fk
        children:
